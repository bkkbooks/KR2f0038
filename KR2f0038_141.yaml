body:
  text: 宋名臣奏議卷一百四十一宋趙汝愚編邊防門青唐上神宗論進築河州文彥博臣竊聞議論欲至來春進築河州漸恢逺略臣竊思之以為未可蓋熙州初成猶未全固西蕃內附尚要撫綏積粟未豐屯兵雖衆未宜多事恐纍成功臣以謂且須增固熙州使有保民之利安存蕃部彌堅向漢之心倉廩豐盈士馬壯健以守則固以戰則強根本既堅枝葉自茂然後洮河之役以指顧而就今欲務速臣切深憂古人謂欲速則不達見小利則大事不成又云勞於服逺不若修近斯言可鑒在理必然夫趣時希旨人之甚利犯顔違意人之甚害中人之情鮮不為利多是顧身謀而諂説豈肯為國而危言臣待罪之所地兼將相若括囊無言仰屋切歎辜祖宗之奬擢負陛下之倚任是敢因事極論違衆立議庶幾萬一有補涓毫陛下以臣為納忠報國幸賜採擇以臣為害成沮事甘俟誅夷臣無任惶恐隕越之至熙寧五年十一月上時為樞密使先是神宗即位之初前耀州司户參軍王韶上書言國家必欲討平西賊莫若先以威令制服河湟欲服河湟莫若先以恩信招撫沿邊諸族蓋招撫沿邊諸族所以威服罝氏也威服罝氏所以脅制河西也陛下誠能擇通材明敏之士能周知其意者令往來出入於其間推恩信以撫之使其傾心向慕歡然有歸伏之意但能得大族首領五七人則其餘小種皆可驅迫而用之矣諸種既失則罝氏君臣其敢復簡慢而不歸心於我耶罝氏既歸於我即河西李氏在吾股掌中矣急之可以蕩覆其巢冗緩之可以脅制其心腹此所謂見形於彼而收功在此也今摩正諸族數欵塞面內為中國之用者久矣此其意欲假中國爵命以威其部內也而邊臣以楝戬故莫能為國家通恩意以撫之此所謂棄近援而結逺交貪虛降而忘實附使棟戬得市利而邀功於我誠非取勝之術也今摩正與青唐族首領轄裕勒等在河州轄沁與舅都克戬及沈千族首領蒼揚丹巴等屯結河溪巴烏與龍川首領羅結在黃河頭三者皆罝氏子孫各立文法漢界逺者不過四五百里近者二三百里皆可以并合而兼撫之也謹具和戎六事條列如左一臣切見涇原秦鳯兩路蕃兵及洮河宕疊州武勝軍諸族皆吐蕃遺種也自罝勒斯賚死棟戬繼立文法秪能安集河湟間而近邊諸族自為種落其在疆場之外者皆強梗頑硬不為吾用在內地者又分離散處不相統一此議者所以謂西蕃諸族皆微弱而不足用也臣聞古之善御戎狄者固不患其微弱也惟其微弱然後可以并合而有但國家未嘗得人而親撫之耳臣愚以為陛下必欲合西戎諸族而用之宜擇通材明敏之士心慮軒豁能周知羌人情意者令朝夕出入於其間往來巡行察其疾苦平其寃濫治其鬱結如漢護羌校尉之比有不服者即稍以恩信綏之身與之為帥使其傾心向慕歡然有歸伏之意然後激作而用之則十數萬之兵不出疆場而可集矣一臣切見西蕃種類皆尊大族重故主諸族有承罝氏之後者羌人皆畏服尊之而罝氏諸孫今在洮河間者皆孱弱不能自立如摩正往嵗居洮山有青唐族首領轄裕勒矩嚕胡僧鹿遵事之欲立文法收復洮河疊宕等州及武勝軍諸羌而摩正孱弱終不能自立會秦州遣人逐去今洮河間諸州並無大族為主雖有轄沁及溪巴烏之徒各恃衆自立然文法所及者俱不過一二百里此其勢正可以并合而兼撫之也臣愚以為宜遣人往河州與摩正計議令入居武勝軍或渭源城與漢界相近輔以漢法因選官一員有文武材略者令與摩正同居漸以恩信招撫沿邊諸羌有不從者令摩正挾漢家法令以威之其轄沁及溪巴烏之徒既有分地亦宜稍以爵命制其心腹使其習用漢法漸同漢俗於漢界實有肘腋之助且使西賊不得與諸羌結連此乃制賊之上䇿也一臣切見鄜延環慶兩路畨兵自來各有成法使之戰鬬及守境皆與漢兵無異往往禦敵殺將立功塞外此兩路藩籬所以益固也今四路畨兵並是羌夷舊種雖有吐渾黨項及吐蕃之別然其種姓實皆出於西戎而已何獨在鄜延環慶則可用在涇原秦鳯則不可用豈天地之所生育與人材性分之所授者絶然相異耶臣體問得宣徽使曹瑋在西邊日其用環慶兵皆不及涇原秦鳯只因經略使范仲淹在慶州日與种世衡等處置各盡其宜故今四路之中唯環慶路蕃兵號為得力是知教之在人而不在其性分之相異也臣愚以為陛下宜擇朝臣有文武材略者往涇原秦鳯擇蕃兵可教者教之固其部族合其心力使勸勉奮勵樂為吾用則十萬餘蕃兵不費官中粒食而可以為心腹之用矣一臣以為蕃人欲其可用須令有合有離離之所以弱其勢合之所以齊其力沿邊諸族附塞而居者皆分離散逸無大首領也勢既離弱又須團合所以均其志趣齊其心力使其勸勉奮勵相率而為吾用臣愚以謂涇原秦鳯兩路蕃兵可為十部每部置都巡檢一人以蕃官有材能識略為衆所服者統之而以漢官一員為都大提舉以總之但得蕃人畏其首領而以漢官總其權任自然不敢作過而久逺並為吾用矣一臣謂沿邊蕃部欲其可用莫若使其與漢人雜居今沿邊蕃部畸零田地耕墾所不至者極多但自來官中須得頃畝相連地段相接者方始招添弓箭手臣愚以為本不須地段相連一段三二十畝以上者即三五段便可招一名弓箭手矣切計沿邊諸族不下十餘萬帳大約十餘萬帳可招弓箭手一萬人以一萬人散居十餘萬帳之間則何患其心腹不一思慮不專乎是則招添弓箭手一萬人便可獲畨兵十餘萬人之用也臣切見官中自來欲令蕃兵獻地招致弓箭手多是令其全段獻納盡帳起離此畨人所以顧戀而不肯獻也若田地隘狹招致不足處可令熟户隨其地段多少大約耕百畝者即獻十畝與官中招添弓箭手在其全段獻納盡帳起離則蕃人顧戀所獻者狹若隨其地段割令以獻則山原髙下所獻者廣又令弓箭手得散在沿邊族帳之間使中國羇遊無事之民耕蕃部荒間之地而可以禁其背叛結其心腹語其利害豈不顯然明白耶昔魏絳和戎謂戎狄貴貨賤土其土可賈今之蕃部正同此耳若國家厚以恩信撫之其土地皆可賈易而致臣切案古渭州一帶至洮河蘭鄯之間漢隴西南安金城三郡地所謂湟中閣亹臨羌抱罕邯中大小榆土地肥饒宜榖者皆在洮河蘭鄯之間誠得而耕之其利豈止威伏羌戎而已耶書入上即令樞密院召問方略以為秦鳯路安撫司自古渭寨接青唐武勝軍應招納畨部市易募人營田等事並令韶主之五年韶建用兵之䇿王安石力主其議八月韶舉兵破摩正收復武勝軍十月改為熙州六年八月入河州遂城之復將兵至馬練川降轄烏扎進攻宕州拔之岷州密琳沁疊州欽琳沁洮州郭斯噶爾皆以城降復州五闢地自臨江寨至安卿城東西千里韶加端明殿學士然議者謂韶所上功狀多欺誕不實殺蕃部老弱甚衆能開拓疆土而耗費中國不可勝計紹聖以後王贍復建􅙉鄯之䇿實韶啓之也上哲宗乞熙河選將如折氏世守孫覺臣竊聞熙河困敝陜西以及天下幾十五餘年矣臣聞其嵗費數百萬略以十年計之為四千萬矣朝廷本為熙河舉西師不能斷羌人之臂徑可以復靈夏而包賀蘭前日大舉西師不得羌人一級而坐費數百萬於黠羌兵馬馱乘死者不可勝數器仗棄捐如山邊人至今為國寒心自朝廷開熙河以來負罪官吏無賴遊客冒名入仕與擁高資為富人者不知其幾百家矣吮啜生靈之膏血以厭飫無賴之人何歟臣愚習聞祖宗時河西折氏置之最為得策今天下一百三十餘年而折氏祖父子孫相繼皆忠順徑勇為國捍守此實措置得其道也今熙河之地使帥守得人為朝廷無窮之計蕃將之中如折氏者得一人或兩人漸為措置三五年後擇其可付屬者付之計朝廷不愛官爵以寵之但為我守能捍外寇則世世如折氏可也其它經營久逺之策密院臣寮必有能為朝廷謀者元祐元年上時為右諫議大夫上哲宗乞約果莊討鄂特凌古蘇軾臣聞善用兵者先服其心次屈其力則兵易解而功易成若不服其心唯力是恃則戰勝而寇愈深況不勝乎功成而兵不解況不成乎頃者西方用兵纍年先帝之意本在弔伐而貪功生事之臣唯務殺人爭地得尺寸之土不問利害先築城堡置州縣使四夷憎畏中國以謂朝廷專欲得地非盡滅我族類不止是以併力致死莫有服者今雖朝廷好生惡殺不務逺略而此心未信憎畏未衰心既不服惟有鬬力力屈情見勝負未可知也今日新獲果莊威震戎狄邊臣賈勇爭欲立功以為河南之地指顧可得正使得之不免築城堡屯兵置吏積粟而守之則中國何時息肩乎乃者王韶收熙河全師獨克使韶有逺慮誅其叛者乃以忠順即用其豪酋而已則今復何事其所以兵連禍結罷弊中國者以郡縣其地故也往者既不悔而來者又不以為戒今又欲取講朱城曰此要害地不可不取方唐盛時安西都護去長安萬里若論要害自此以西無不可取者使諸羌知中國有進取不已之意則寇愈深而兵不解其禍豈可量哉臣願陛下深詔邊吏叛則討之服則安之自今以往無取尺寸之地無焚廬舍無殺老弱如此期年諸羌可傳檄而定然朝廷至意亦自難諭將帥未必從也雖日行文書終恐無益宜驛召陜西轉運使一員赴闕面敇戒之使歸以諭將帥而察其不如詔者臣又切聞朝論謂果莊犯順罪當誅死然譬之鳥獸不足深責其子孫部族猶足以陸梁於邊全其首領以纍其心以為重質庶獲其用此實當今之良策然臣切料果莊凶豪素貴老病垂死必不能甘於困辱為久生之計自知生存終不得歸徒使臣子首鼠顧忌不敢復讎必將不食求死以發其衆之怒就使不然老病愁憤自非久生之道果莊若死則其臣子專意復讎必與鄂特凌古合而北交夏人此正胡越同舟遇風之勢其交必堅而溫錫沁介於鄂特凌古夏人之間地狹力弱其勢必危若見并而吾不能救二寇合三面以窺熙河則其患未可一二數也如臣愚計可詔邊臣與果莊約若能使其部族討鄂特凌古而納趙醇忠者當放汝生還質之天地示以必信果莊若從則稍富貴之使其信臣而諭至意焉果莊既有生還之望不為求死之計其衆必從以果莊之衆與溫錫沁合而討鄂特凌古其勢必克既克而納醇忠雖放還果莊可以無患此必然之勢也西羌本與夏人世仇果莊本與鄂特凌古不協若許以生還其衆必相攻縱未能誅鄂特凌古亦足使二盜相疑不合也昔太史慈與孫䇿戰幾殺䇿䇿後得慈釋不誅放還豫章卒立竒功李訴得吳元濟將李祐解縛用之與同卧起卒擒元濟非豪傑名將不能行此度外事也議者謂果莊之獲兼用近界酋豪力戰而得之仇怨已深若放生還此等必無全理臣以謂不然若果莊死於中國其衆讎此等必深若生還其讎之亦淺此等依中國為援足以自全自古西羌之患唯恐解讎結盟若所在為讎敵正中國之利無可疑者臣出位言事不勝恐悚待罪之至元祐二年九月上時為翰林學士先是熙河帥臣奏生擒西畨首領果莊一時大臣或議欲官之或議欲誅之其後卒從文彥博之議命果莊為陪戎校尉鄂特凌古棟戬養子也既立而其國人不附范育議欲納趙醇忠朝論難之故軾建此議育疏見遼夏門上徽宗乞誘諭青唐龔夬臣切聞夷狄之勢分而不一則為中國之利自頃夷狄強盛必賴比近部族自相攜二候伺虜情為國藩翰臣伏見青唐一族世受封爵堅心依漢又嵗出善馬以供和市自熙寧元豐以來朝廷待之尤厚昨因強臣盜有其地至其嗣子國人不附逃難來奔特青唐一亡虜耳而朝廷以為納土之降王引封闕庭超授節鉞為夷狄笑至於道路宴犒之費以巨萬計關市搔擾不可具道今則不唯不得其地而使青唐之人遂無向漢之心其勢必與夏人解仇結約以為邊患和市善馬不復出矣數年之後夏賊兵力稍備青唐不復附漢而合從於虜臣恐朝廷西顧之憂未易言也今既往之失無所營救將來之䇿尚或可圖伏望聖慈特詔邊臣多方誘諭赦其罪戾使之自新待其入貢因撫而有庶使復堅向漢之誠不復歸心於虜以為預備不虞之計邊民幸甚元符三年九月上時為殿中侍御史上徽宗論湟鄯任伯雨臣伏覩熙寧中神宗皇帝所以能用兵取熙河者不獨英謀睿斷委用得人蓋以承仁宗數十年天下富庶之後紹聖之初所以能五路進築者亦以承元祐十年休息之後今日邊隙視紹聖之初為益廣財用視紹聖之初為益乏徑兵健馬視紹聖之初為益耗謀臣宿將視紹聖之初為益少加以鹽池損壞嵗失財用三百餘萬關中纍年荒旱物貴人飢生齒流移十減六七今年雖豐物價猶五倍平日以此觀之邊事不可復生亦明矣去年邊臣邀功為國失信奪貨為寇立召邊患強欲兼并湟鄯二州自去藩屏覆軍殺將已失其一今湟州雖存勢又孤絶荒山窮谷地不可耕道路險厄又難饋運得之無用徒耗中國又湟鄯二州均為罝氏之地鄯大湟小唇齒相依既已棄鄯湟州勢難獨守國家守之且有五患朝廷前年取天都山置西安州取葭蘆寨置晉寧軍無所不可何者此夏賊之地吾讎敵之國取之有名也今湟州乃罝氏之地罝氏世效忠順有功國家真宗仁宗繼嘗封爵乃朝廷與國因與國之亂而貪其土地失信背義取之無名絶夷狄向化之意一患也國家征伐夏賊所以無熙河以西之憂者罝氏為籬落也今既得湟州則罝氏餘族不為吾助吾必有西邊費財用師之備二患也國家買馬嵗二萬匹而青唐十居七八今既為讎則馬不復至二年一匹不買亦可見矣西邊無馬大失邊備三患也河南有朗阿克章族河北有興揚斡族平日與罝氏同輔中國今吾既與罝氏為讎則彼畏吾有吞并之心必與夏賊結連以抗中國四患也萬一夏賊因罝氏之困掩取其地則勢力益強永逺為吾腹背之害五患也況聞自得湟州已來嵗費三百萬貫以守之一州所費如此五路邊面可知矣國家一嵗賦入三百萬者凡有幾也內帑之積三百萬者亦有幾也安可以既乏之財追無窮之欲圖未集之衆棄已成之師耶竊聞陛下備嘗講究其事始差內臣李某復差臣鄭居簡皆知本末本路走馬郝平及姚雄苗履亦嘗具利害敷奏觀此事體所宜多方休養不宜更滋邊患萬一五路同日有警兵困不給財竭不續糧乏不繼冦或奔突侵犯關隴不知朝廷何以支梧又聞陜西運判秦希甫知熙州胡宗回曽有文字互奏邊事不同又聞邊人實封言邊事者甚衆邊人所陳其言必實臣伏願陛下取上件文字類聚一處子細參考則是非利害不可掩矣然後選差謹厚小心得力曉事內臣一員齎手詔往邊上密令帥臣及本路監司將官等各具疏棄守二者劃一利害結軍令狀聞奏以參合希甫宗回及邊人封事臣願陛下更令二府大臣各具已見論列若議論不同即令詰難務盡其詞以是而止如其立異違衆公肆偏見則俾之先具用若干兵馬須若干資糧擇何人往守約何時無患若有敗事先坐首議陛下徐察其所言審其所處則安危之機成敗之效曉然於目前矣昔漢武帝亦嘗令韓安國王恢詰難邊事往返五六其後敗事恢任其責今日治邊正可用此策矣貼黃臣聞陜西買馬自來年額買二萬五千匹將官使臣私下折博交易不在其數自青唐事梗已來二年之間一匹不買加以邊上耗折十死七八雖川陜買馬之數亦減大半臣願陛下下有司會計元豐末年諸處嵗買馬凡有幾紹聖之初嵗買馬凡有幾今日買馬凡有幾則兵之強弱蓋可見矣元符三年十二月上時為左正言先是元符二年春洮西安撫王贍密畫取吐蕃之䇿遣舉人黃亨上其事於朝王厚喜其説下熙河路始議進䇿秋七月二十五日贍引兵渡河取邈川王厚別提麾下兵出省章峽取總噶爾城九月二十贍入青唐嚨贊出降閏九月四日詔以青唐為鄯州仍為隴右節度邈川為湟州總噶爾為龍支城以贍知鄯州充隴右沿邊安撫使兼沿邊都巡檢使以王厚知湟州是冬胡宗回奏又營洮州未幾錫勒默沁乞師夏國夏國遣監軍巴容摩人多保忠點集四監軍兵合吐蕃兵數萬人來攻贍悉以所統兵守西城羌攻東城甚急十二日會李賔討山南族帳解阿爾圍至是始還與羌軍轉戰城內軍士聞之馳赴之羌遂奔潰時邈川同被圍亦會帥司遣苖履姚雄將兵來援羌遽引兵遁去圍始解十章月五日履雄乘勢引兵開路至青唐繼而朗阿克及峽外羌復叛贍與宗回文檄不相通者四十餘日陜西轉運判官秦希甫上其事朝廷始知青唐為難守三年二月命熙河蘭會路兵馬都監兼知河州姚雄統制軍馬救援青唐合贍軍棄鄯州以歸自省章峽以西皆捐之更以湟州為都護建中靖國元年二月朝廷以伯雨等言委姚雄謀度棄守湟州利害雄以為可棄無疑三月十六日詔河西節度使趙懷德知湟州盡賜見在糧草委之招內擕叛許以戎索從事其元置守臣及官吏兵將悉追還除存留湟州城壁樓櫓外沿路堡塞並令毁撤上徽宗論湟廓西寧三州馮澥臣伏覩陛下比年以來知關陜勞弊罷兵偃武與之休息和氣充塞年穀豐稔百姓快樂道路歌舞臣於今年三月到任首問民間疾苦皆云自罷兵之後人若更生疾苦事十已去九唯支移一事尚為民害自本府至湟州千有餘里非唯道里遙逺又為經涉生界民間勞困不易興調臣遂即敷奏蒙恩第加寬免上等不過十程下户不出府界旨下之日萬口歡呼言自今以去更無餘事太平如此尚復何言而臣切有所憂者病本尚在陛下雖欲罷兵而兵安可得罷雖欲息民而民安可得息臣切以湟廓西寧三州本不毛小聚大河之外天所限隔陛下空數路耗內帑竭生靈膏血而取之收復以來何嘗得一金一縷入府庫一甲一馬備行陳而三州嵗用以億萬計仰於官也而帑藏已空取之民也而膏血已竭有司束手莫知為計塞下無十日之積戰士飢餒人有菜色今殘寇遊魂未即歸順黠羌阻命公為唇齒窺伺間隙忽肆姦侮則兵將復用役必再籍殘弊之後尚安可堪陛下以四海九州之大德被萬方威震四夷奈何以二三小聚困弊關陜一方生靈長為朝廷西顧無窮之憂乎臣愚欲采前世羈縻之義擢其酋豪授以旄鉞其首領等級命官使失地無歸之羌復得其巢穴奔禽遁獸各安其故嚴其誓約結以恩信彼將畏威懷德稽顙聽命輸誠效順長為漢守有得地之名無費財之患兵革不用藩籬永固而又可以逆絶北狄之辭旁釋西羌之怨一舉而衆利得䇿無上於此者或以謂朝取暮與取與無常為已甚者此大不然始朝廷慮其為邊患也一舉而取之易於探囊今知無所用也一舉而與之輕若擲芥其擒縱在我取與不計大度無所不包神機不俟終日利便所在何常之有又謂棄地之議未逺罪斥之人未復今而為此彼將有辭又大不然羈縻之義使為臣屬與夫捐棄自不同且此輩沮壞先帝功烈宜加罪誅今之利害彼復何異議方陛下以邊鄙生靈為念含垢忍恥猶或不辭況兹小嫌尚何所恤臣望陛下下臣言於本路帥府使之看詳或遣近臣臨察可否然臣言一出必為衆所咻沮何者蓋無邊事則朝廷之福有邊事則臣下之福用兵以來州縣小官反掌而登侍從行伍賤夫移足而專斧鉞金錢充棟宇田壤連阡陌下至幕府偏禆趨走厮役計其所得略皆稱是故大者稱功德小者論利害欺罔熒惑日陳於前陛下雖欲不作邊事尚安可得雖愛民如赤子亦無暇顧矣臣願陛下懲既往之失窒方來之路奮發威斷顯絀一二以示姦惡以絶欺罔則朝廷之福天下之幸臣逺方疏賤不識忌諱荷陛下非常知遇蒙陛下不次拔擢念非捐軀隕命無以報稱冒萬死為獻使狂瞽獲效萬一則臣雖死之日猶生之年崇寧五年七月上時知鳯翔府先是元年蔡京入相日以興復為事於是侍御史錢適言乞除雪王贍王厚罪名及正當時議棄地者之罪詔厚敘皇城副使贍追復供備庫副使而一時議棄地之臣韓忠彥曽布安燾李清臣蔣之竒范純禮陳次升都貺錢景祥秦希甫龔夬張庭堅並貶責有差收復湟鄯之謀自此始矣至是命厚知河州兼洮西安撫厚請擇人以自助詔遣內客省使童貫與偕二年以王厚權幹當熙河蘭會路經略司童貫為熙河並蘭會路幹當公事六月厚等與蕃將髙永年提兵分道進收復湟州三年四月十二日厚等統大兵入青唐城十九日復廓州五月以鄯州為西寧州一時用師逺略關陜勞弊而所得皆不毛荒瘠之地又逺外難守澥上此奏大忤京意坐責授永州別駕道州安置髙麗上哲宗乞裁抑髙麗人使蘇轍臣伏見髙麗北接契丹南限滄海與中國壤地隔絶利害本不相及本朝初許入貢祖宗知其無益絶而不通熙寧中羅拯始募海商誘令朝覲其意欲以招致逺夷為太平粉飾及犄角契丹為用兵援助而已然自其始通及今屢至其實何益於事徒使淮浙千里勞於供億京師百司疲於應奉而髙麗之人所至遊觀伺察虛實圖寫形勝陰為契丹耳目或契丹常遣親信隱於髙麗三節之中髙麗密分賜豫歸為契丹幾半之奉朝廷勞費不資而所獲如此深可惜也今其復至既朝廷未欲遽絶謂當痛加裁損使無大饒益則其至必疏而我得其便矣切見近日已降朝旨自明州以來州郡待遇禮節率皆減舊而京師諸事未加裁定臣以謂朝廷交接四夷莫如遼夏之重而目前所以遇髙麗者幾比二國非獨於本朝事有不便儻使二國知之亦為未允況髙麗之於契丹大小相絶有君臣之別今館待之數出入之節或皆如一或更過厚其於事體實為不便臣欲乞凡館待送遺並量加裁抑其人從出入即依西北人使舊例其留住月日非汴水未通仍立定日限如此施行亦自不為薄也元祐五年十月上時為御史中丞上哲宗論髙麗人使買書蘇軾臣近準都省批送下國子監狀準館伴髙麗人使所牒稱人使要買國子監文字請詳此印造供赴當所交割本監檢準元祐令諸蕃國進奉人買書具名件申尚書省今來未敢支賣蒙都省送禮部看詳臣尋指揮本部令申都省除可令收買名件外其策府元龜厯代史太學敕式本部未敢便令收買伏乞朝廷詳酌指揮尋準都省批狀云勘會前次髙麗人使到闕已曽許買策府元龜并北史今本部並不檢會體例所有人使乞買書籍正月二十七日送禮部指揮許收買其當行人吏上籍簿者臣伏見髙麗人使每一次入貢朝廷及淮浙兩路賜豫餽送燕勞之費約十餘萬貫而修飾亭館騷動行市調發人船之費不在焉除官吏得少餽遺外了無絲毫之利而有五害所得貢獻皆是玩好無用之物而所費皆是帑廪之實民之膏血此一害也所至差借人馬什物攪撓行市修飭亭館民力倍有陪費此二害也髙麗所得賜豫若不分遺契丹則契丹安肯聽其來貢顯是借寇兵而資盜糧此三害也髙麗名為慕義來朝其實為利度其本心終必為北冦用何也遼足以制其死命而我不能故也今使者所至圖畫山川形勝窺測虛實豈復有善意哉此四害也慶厯中契丹欲渝盟先以增置塘泊為中國之曲今乃招來其與國使頻歲入貢其曲甚於塘泊幸今契丹恭順不敢生事萬一異日有桀黠之徒以此藉口不知朝廷何以答之此五害也臣知此五害所以熙寧通判杭州日因其餽送書中不稱本朝正朔郤退其物待其改書稱用年號然後受之仍催促進發不令住滯及近嵗出知杭州却其所進金塔不為奏聞及畫一處置緣路接待事件不令過當仍奏乞編配狡商猾僧并乞依祖宗編敕杭明州並不許發船往髙麗違者徒二年沒入財貨充賞并乞刪除元豐八年九月內創立許舶客專擅附帶外夷入貢及商販一條已上事並蒙朝廷一一施行皆是臣素意欲稍稍裁節其事庶幾漸次不來為朝廷消久逺之害今既備員禮曹乃是職事近者因見館伴中書舍人陳軒等申乞盡數差勒相國寺行鋪入館鋪設以待人使買賣不惟移市動衆奉小國之陪臣有損國體兼亦抑勒在京行鋪以資吏人廣行乞取弊害不小所以具申都省乞不施行其乖方作弊官吏並不蒙都省略取問今來只因陳軒等不待申請直牒國子監收買諸般文字內有䇿府元龜歷代史及敇式國子監知其不便稟都省送下禮部看詳臣謹按漢書東平王子來朝上疏求諸子及太史公書當時大臣以謂諸侯朝聘考文章正法度非理不言今東平王幸得來朝不思制節謹度以防過失而求諸書非朝聘之義也諸子或反經術非聖人或明鬼神信物怪太史公書有戰國縱橫權譎之謀漢興之初謀臣竒策天官災異地形厄塞皆不宜在諸侯王不可豫詔從之臣竊以謂東平王骨肉至親特以備位藩臣猶不得賜而況海外之裔夷契丹之與國乎臣聞河北𣙜場禁出文書其法甚嚴徒以契丹故也今髙麗與契丹何異若髙麗可與即𣙜場之法亦可廢兼切聞昔年髙麗使乞賜太平御覽先帝詔令館伴以東平王故事為詞却之近日復乞詔又以先帝遺旨不與今歷代史策府元龜及北史切以謂前次本不當與若使以為例即上乖先帝遺旨下與今來不賜御覽聖旨異同深為不便故申都省止是乞賜詳酌指揮未為過當蒙行遣吏人簿書罪臣切謂無罪可書雖上簿薄責至為末事於臣又無絲毫之損臣非為此奏論所惜者無厭之請事事曲從官吏能徇其意雖動衆害物不以為罪稍有裁節之意便行詰責今後無人敢逆其請使意得志滿其來愈數其患愈深所以須至極論貼黃臣謹按春秋晉盟主也鄭小國也而晉之執政韓起欲買玊環於鄭商人子産終不與曰大國之求若無禮以節之是鄙我也又晉平公使其臣范昭觀政於齊昭請齊景公之觴為壽晏子不與又欲奏成周之樂太師不許昭歸謂晉侯曰齊未可伐也臣欲亂其禮而晏子知之欲亂其樂而太師知之今髙麗使契丹之黨而我之陪臣也乃敢干朝廷求買違禁物傳寫鄭衛曲子譜褻慢甚矣安知非黠冦欲設此事以嘗探朝廷深淺難易乎而陳軒等事事為請恐失其意臣切惑之又據軒等語録云髙麗使言海商擅往契丹本國王捉送上國乞更賜約束恐不穩便而軒乃答之風迅不順飄過乃是與狡商巧説詞理許令過界切緣私往北界條禁至重海外陪臣猶知遵稟而軒乃為歸咎於風以薄其罪豈不乖戾倒置之甚乎臣忝備侍從事關利害不敢不奏元祐八年二月上時為翰林侍讀學士兼禮部尚書上欽宗論髙麗人使所過州縣之擾胡舜陟臣伏以漢建武時西域請置都護送侍子光武不許唐貞觀中髙昌王將入朝西域諸國欲悉遣使奉獻魏徴以為不可太宗從之皆不欲以蠻夷弊中國也髙麗弊我國家五十餘年矣政和以來人使每嵗一至淮浙之間不勝其擾所過州縣官私船盡奪為用驅村保挽舟一縣有至數百人田桑之時農業盡廢州縣前期勾集保丁多致凍餓失所沿流亭館寺觀悉陳設排辦所用之物皆出於民官吏督迫急如軍期吏緣為姦民無所訴更有官為之提轄事事過有須索州縣尤畏之鞭笞取辦於民故淮浙間言髙麗一過甚於遭寇朝廷所得貢獻皆玩好無用之物所費皆帑藏之實民之膏血近嵗錫豫尤腆所費不資而有一路饋遺燕勞之用約數十萬緡髙麗人貪利唯欲數至臣不知朝廷蠧國害民以待此小醜果何用耶有為害之大者彼昔臣事契丹今必臣事大金二國能制其死命而我無如彼何故畏敵而不畏我所得賜豫聞與敵分我之山川形勢兵旅衆寡財用虛實往往窺測以報敵人如此不唯有所煩費實養虎貽患豈非為害之大者乎臣近見兩浙路申髙麗人使入朝非久到明州臣恐復如前日騷動淮浙蠧耗邦財今日聖政一新悉革弊事以撫養吾赤子伏望陛下以漢光武唐太宗為法勿使入朝實國之利如使人已到明州止令本州遞表入進遣還使人大率髙麗人入貢於國於民有害焉於州縣贓吏小人有利焉臣願睿明察此去數十年之弊病以慰天下企望之情靖康元年十月上時為侍御史宋名臣奏議卷一百四十一
