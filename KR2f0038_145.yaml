body:
  text: 宋名臣奏議巻一百四十五宋趙汝愚編總議門總議一上太宗論軍國要機朝廷大體田錫臣伏念自忝諫垣今巳周嵗無一言可禆時政無一善上答君恩盖以陛下文明無事可諌朝廷公共無事可言然尸禄曠官憂慙益切盡忠補過夙夜寜忘今輒以軍國要機朝廷大體布在一䟽上達四聰伏乞陛下察而恕之容而用之臣所言軍國要機者一朝廷大體者四今為陛下引諭而言之臣聞古先聖人牢籠天下弛張睿略舒巻人心使萬人之心如一心四海之意如一意有若馭馬又如鑄金善馭者使之馳則馳使之止則止善鑄者使之圓則圓使之方則方茍失其機又失其時則萬人不一心四海不一意亦猶不善馭馬不善鑄金使之馳而不馳使之止而不止使之圓而不圓使之方而不方若是則危與亂雖未萌而不得不憂機與時雖未失而不得不懼故古人云居安思危又曰理不忘亂臣毎念有唐之末天下分離中原土疆不過千里自先帝恢張皇業開闢天下平吳取蜀易如破竹惟河東遺孽終不能平洎陛下一舉取之功名光大世宗先帝所不及也然自河東破後聖駕囬旋諸軍之心皆望賞賜四海之内亦俟霈恩豈謂陛下未覃賞㨗之恩未行䇿勲之禮經今二載所謂踰時今北方之戎不来朝貢幽州孤壘未復封疆臣以國家兵甲之強朝廷物力之盛滅戎人甚易取幽州不難然自古制御蕃戎但在示之以威徳示之以威者不窮兵黷武不勞人費財示之以徳者比之如犬羊容之若天地或来朝貢亦不阻其歸懐或背驩盟亦不怒其侵叛臣伏慮陛下以幽州未取戎賊未平一旦又来擾邊萬乗復思再駕欲快聖意欲展睿謀雖舉必成功動無遺筭然臣請陛下或展郊禋之禮或行封禪之儀因此賞河東之功因此示䇿勲之信人心懈怠者復恱軍功勞苦者終酬帝澤滂沱物情通泰所謂陛下駕馭其意鎔鑄其心使之馳則馳使之止則止使之圓則圓使之方則方茍不以威信鑄其心恩惠馭其意臣恐使之馳則止使之圓則方當是時陛下必念臣今日之言陛下必思臣今日之諌也此謂軍國之要機一也又念交州未下戰士無功春秋謂師老費財兵書曰頓兵挫銳臣聞聖人不務廣於邉鄙唯務廣於徳業武有七徳陛下何不廣之天生四夷陛下何須収之必若聖徳日新皇風日逺逺夷自然入貢外域自然来降茍不来降又不入貢彼國自有災癘彼人自罹凶荒尚書曰惟徳動天又曰四夷来王周易曰聖人先天而天弗違天且弗違况四夷乎臣嘗讀韓詩外傳言成王之時越裳来貢九譯而至周公問其所以来其人曰天無迅風疾雨海不揚波三年矣意者中國殆有聖人盍徃朝之昔太宗征遼魏徴苦諌及貞觀太平之後天下州郡二百有六十羈縻之州有八百屯田置戍悉在外荒豈是一一加兵然後方来内附今陛下取交州何速况大國取交州謂之瘴海去者不習風土兵在彼中留滯頗乆願陛下且罷斯役暫息南征交州未平不足損陛下功業交州既得不足光陛下威聲臣但以師老費財為可慮頓兵挫銳為可惜盖征討之役費用非輕皆生民苦力之財悉諸國所供之賦乞陛下惜輕費之用望陛下念征戍之勞此謂朝廷之大體一也臣嘗讀六典左右拾遺補闕掌供奉諷諌凡發令舉事有不便於時不合於道者小則上封大則廷諌臣又讀唐書見給事中得以封駮詔書封謂封還詔書而不行駮謂駮正詔書之所失又起居郎起居舍人得在天階之下備書王者之言今来諌官寂無聲影設使詔書有所失審制敇有不可行給事中不敢封還而不行不敢駮正其所失給諌既不敢違上㫖遺補又不敢貢直言其次起居郎起居舍人不得立軒陛之間不得紀言動之事使聖朝好事或有所遺而不聞致陛下徳音或有不知而不錄加之御史不敢彈奏左右丞今尚闕員又中書舍人是陛下近臣司陛下誥命臣毎於起居日但見其随班而進拜舞而囬未嘗見陛下召之與言未嘗聞陛下訪之以事臣慮其各有所見欲待問而方言各有所陳欲因便而方奏伏乞陛下或詢訪以事或宣召與言兾各盡其誠心求得觀其噐業又今三館之中雖有集賢院書籍而無集賢院職官雖有秘書省職官而無秘書省圖籍臣伏讀去年九月十一日所降制敕條貫百官仍於朝堂習儀又委憲司申舉此則陛下思復古道大振朝綱臣唯見所習者儀未見所舉者職如職業各舉則威儀自嚴君有君之威儀臣有臣之禮法何患百官不整肅何患庻政不允釐臣乞今後給事中得以封駮詔書起居郎起居舍人得以紀錄言動御史得以彈奏諌官得以抗言左右丞得以糾轄臺司中書舍人得以祗膺顧問中書舍人得備問則皇猷日新左右丞得轄臺司則風憲益整諌官抗言則陛下聞所未聞知所未知御史彈奏則百僚震悚一人尊嚴起居郎起居舍人得在左右則盛事無遺國史大備給事中得以封駮則詔敕無誤出政事無錯行此朝廷之大體二也今天下一家海内萬里四方所凑輦下駢闐萬貨所歸京師富盛軍營馬監無不髙嚴佛寺道宫悉皆壮麗陛下又新西苑復廣御池池若漢之昆明苑若周之靈囿足以為陛下宴逰之所足以為聖朝宏大之規唯尚書省是前代所營公宇低隘南宫二十四司不在其間六尚書無本㕔諸郎官無𪠘宇至於九寺三監寄在内前廊下加以禮部無貢院試處非省垣毎年試舉人權就武成王廟非太平職司之制度非清朝文物之規儀乞陛下俟西苑畢功御池罷役重新省寺用列職官此則朝廷之大體三也臣又毎於行路之次見有羈錮之囚荷以䥫枷不覺自駭不知其人所犯何罪又不知其囚復是何人臣謹按刑統准獄官令枷杻各有短長鉗鍊各有輕重制度尺寸並有刑書未見以䥫為枷者也凡今州縣欲笞一小罪縶一輕囚必詳格文盡依典法奉國家所頒之律遵法寺所定之科以䥫為枷事出法外伏乞陛下釐革此法免傷皇風昔太宗因看明堂圖見人五臟皆系於背聖慈惻隐免人徒刑况太平之時将刑措而不用至仁之主冝欽恤以居先此則朝廷之大體四也臣所言者要機乞陛下審而察之所舉者大體乞陛下採而用之臣不任感恩思報激切屏營之至太平興國六年九月上時守左拾遺上太宗條奏事冝田錫臣備位諌垣出官河朔雖勵忠勤之節未伸謇諤之誠尸素自知傍徨益切何以分陛下憂勤之寄何以副朝廷委用之恩敢不夙夜有思涓埃欲效願以芻蕘之見上希英聖之知今陛下命以頒條委之理郡親民之心無先於此茍若所理之郡事簡獄空所親之民風淳俗厚所謂莅民有術御下有能足以副朝廷任用之恩有以彰陛下憂勤之㫖然事有無從而得簡獄有無因而乆空民風未致於淳和物俗未臻於富厚雖有莅民之術無得而施雖有御下之才無從而設况臣闇懦御下非才以臣愚䝉莅民無術但可言其乆弊恤其未安乆弊者昔近并門鄰於敵境備邊之費禦㓂之兵二十餘年民不遑息未安者今以北狄邇於塞垣屯兵禦戎飛芻輓粟三十餘郡民不甚豐筦𣙜貨財網利太宻躬親機務綸㫖稍頻臣所謂網利太宻者酒麴之利但要増盈商税之利但求出剰或偶有出剰不詢出剰之由或偶有虧欠必責虧欠之過逓年比撲只𬋩増加逓月較量不管欠折然國家軍兵數廣支用處多課利不得不如此征收筦㩁不得不如此比較窮盡取財之路莫甚於兹䟽通殖貨之源未聞適變似不知止殊無定期今乞國家以闗市之征定常其數酒麴之利授以常規或偶有増加不更求出剰或偶有虧折即可令於出剰時補填且如州縣征科農桑稅賦年豐則未聞加納嵗歉則許之倚征自然理得其中民知所措何以言之民生於利亦猶魚生於水也民困於利又如水涸於魚也願更生于讜議别布新條當生民既庻之時是求理酌中之際天下幸甚海内幸甚臣所謂綸㫖稍頻者臣嘗讀揚子法言曰聖人之道猶日中又嘗覧太公六韜曰聖人之道猶龍首龍首謂髙視而逺聽日中謂融明而燭幽是知君有居上之威儀臣有奉上之職業君道務簡簡則號令審而人易從臣道務勤勤則職業修而事無壅臣伏見陛下憂民太過視事太勤毎日早於崇徳殿受百僚之朝至日午於講武殿視萬幾之事或進呈甲仗或揀閱軍人或躬問縲囚或親觀戰馬自匭而進者或詳其詞理撾皷以聞者或詢彼寃誣皆金口言詞人人省問天心揆度一一區分有以見陛下勞萬幾之神自此見臣下虧事君之職况今四方無事多壘盡平何以勞陛下如此太勤何以使三公因此無愧盖陛下慮四聰或有所未達萬幾或有所未知文王之心遂乾乾而夕惕成湯之意貴孜孜於日新然陛下何不移此勤勞於求賢何不改此精專於選士諌官則寘之左右御史即委以糾彈給事中當材者許之封駮詔書起居郎有文者命之紀錄言動百職如是各舉其業千官如是各得其人則何憂事不允釐何慮民不受賜今有司指揮多以劄子取聖㫖官員注擬必湏引見聽敕裁事若允當則既由宸𠂻事若未當則亦歸睿斷如此皆勞天聽安用有司致陛下視事太勤憂民太過况宫闕乃尊嚴之地軒墀列清切之班可以延佇賢良詢求理道豈冝使押来囚繫或病患軍人或虛詞越訴之徒或僥倖希恩之軰引之便殿得面天顔陛下則随事指揮臨時與奪其間有驟承顧問上懼天威或偶有敷陳稍惬聖㫖怯懦謇訥者口雖奏而未盡其心姦詐辨詞者言雖當而未必有理陛下或賜之恩澤或寘以刑名然睿鑒周通出令固無於枉濫而帝庭清肅終朝豈稱於喧囂加以條理事冝或傷頻併施行詔敇遂至稠重禮曰王言如絲其出如綸王言如綸其出如綍喻其以近及逺漸光大於萬方以言訓人可常行於百代簡而且要人則易從繁而又難人則易犯書曰臨下以簡又曰御衆以寛御衆不以寛則獲罪者多臨下不以簡則從令者少况帝王有常道禁令有常程施令貴乎必行設禁貴乎必止若令之無節奉而行之者必難禁之無時遵而止之者亦寡臣所謂網利太宻既如彼綸㫖稍頻又如此願陛下寛臣敢言之罪察而審之望陛下聽臣敢諌之言擇而行之臣復有未喻聖意之事三又有奏請可行之事二未喻者今内職諸司各有公廨禁林近侍各有本㕔中書是宰相職事之堂相府是陛下優賢之地今則於中書外廡置磨勘一司較朝臣功過之有無審州郡勞能之虛實睠言是職本屬考功豈考功之職不修而磨勘之名互出殊非雅稱深損大綱此臣所謂未喻聖意之事者一也其次御史臺本不禁人今為繫囚之所大理寺舊来置獄今為檢格之司授人之職者本貴當材鞫獄以情者自然無濫或諸侯有大過或百姓有深寃乃命臺官委為制使憲府之風規自别刑曹之按鞫無疑今則或撾皷聞天虛詞詣闕多差殿直承㫖使為制勘使臣殊非理獄之才驟委鞫人之罪其間有未明推勘因致淹延或未曉刑章妄加深刻既臨以制書之命寘乎縲紲之中上畏嚴威誰敢拒捍及當錄問皆伏欵詞雖罪致徒流必該申奏案既圓備即據施行豈無䧟於非辜豈無失於有罪虧陛下慈仁之㫖損朝廷欽恤之恩此臣所謂未喻聖意之事者二也臣毎讀史書至於文集或匹婦有正亷之節野人有孝悌之風尚旌彼門閭或賜之粟帛将以勵澆漓之俗亦以行風教之規修身者由此彰名尚義者因兹立節今國家官僚逺官不得般家父母云亡不得離任墨縗視事寜安孝子之心明詔未行深損聖人之教此臣所謂未喻聖意者三也昔漢文在位稱為刑措嵗終斷獄者三十此盖民安其業乃無咎於刑章物失其冝必自罹於天網是以聖人見一物失冝則必加惻隐知一夫失所則必動哀矜御一衣思天下女工之勤嘗一膳思天下農夫之苦故尚書曰不敢侮鰥寡周易曰信及豚魚豚魚至㣲信猶能及鰥寡至賤侮不敢加有以見聖人用心無微不至聖人施惠無所不均今河朔數州衙前軍将應宣命配来之者多江南兩浙之人雖曽有敕文許令自便然各無去著猶係職名其間有不請衣粮只望差使設有得該請受多是折支時寒無衣日餒無食老小相聚凍餓貧窮羈旅無圖咨嗟愁苦與其配之而無用孰若捨之而放歸此乃可言者一也今國家封疆甚廣州縣至多令錄闕員據資勞而遷授簿尉滿任按嵗月以除移其間亷吏雖多抑亦貪夫不少貪者偶無彰露刑罰寜加㢘者未有升聞旌酬弗及言乎賞勸似未精詳冝委諸州遍令申奏州有幾縣縣有幾員奏其善者則不善者自彰奏其㢘者則不廉者自顯或就加奨飭或聊與轉遷則㢘能者既有所歸猥濫者寜無自愧揚清激濁實為致理之先易俗移風冝自親民為始此臣謂可言者二也臣縷陳鄙見煩黷聖聽臣不任惶恐戰慄之至太平興國七年十二月上時以右補闕知相州入逓上此奏上真宗論軍國大政五事王禹偁臣伏覩陛下即位赦書云所冝開諌諍之路㧞茂異之材又奉御史臺告報准詔命内外文武臣寮並許直言極諌此實陛下誕彰聖徳廣達民情速致時雍追用古道之深㫖抑亦宗社無疆之休軍民莫大之幸也臣雖無聞諌則有素先皇帝時初拜右正言直史館即日進端拱箴一篇又上禦戎十事䝉先朝採納擢陞綸閣判大理寺時抗䟽論道安之罪執法雪徐鉉之寃貶官商山咎實因此尋復召用叨塵諌垣又上李繼遷便冝寢而不報俄忝内庭兼駁正亦嘗改更宣命封還敕書雖無報於朝廷盖粗伸於職業伏遇陛下欽奉顧命惟懐永圖嗣位之初赦書既如彼聽政之後詔命又如此臣茍有所見隠而不言是上負先帝用人之心下孤明主求諌之意也伏以聖朝享國四十餘年矣邉鄙未甚寜人心未甚泰求利不已設官太多今陛下治之惟新救之在速臣伏慮書生執言有奏於陛下以為三年無改於父之道可謂孝矣此不知古今異制家國殊塗者也假如帝堯既殂帝舜在位堯時有八元未進四凶未除舜乃流放舉用善惡兩分未聞後之人曰堯不及于舜也舜不孝于堯也伏惟陛下遏老生之常談奮英主之獨斷則天下幸甚謹縁軍國大政奏事五條儻稍動於聖心庻大開於言路其一曰謹邉防通盟好使輦運之民有所休息方今北有强敵西有繼遷强敵雖不犯邉戍兵豈能减削繼遷既未歸命餽餉固難寝停闗輔之民倒垂尤甚臣愚以為陛下即位之初當順人心冝敇疆吏致書外臣使達犬戎請尋舊好下詔赦繼遷之罪復與夏臺臣頃在翰林見繼遷上表云乞取殘破夏州以奉拓㧞氏祭祀先帝雖有批答只與鄜州節度縁繼遷本是反側之人豈肯束身歸國所以詔命不行今陛下嗣統大振皇威亦恐繼遷令人進奉因舉前事彼必感恩此亦不戰而屈人之師也如其不從則備禦誅擒皆有方略且使天下百姓知陛下屈已而為人也或曰富國強兵不可示人以弱此乃誇虛名而忽大計者也二曰减冗兵併冗吏使山澤之饒稍流於下伏以乾徳開寳以来國家之事臣所目覩當時東未得江浙漳泉南未得荆湖交廣朝廷財賦可謂未豐然而擊河東備北虜國用亦足兵威亦彊其義安在所蓄之兵銳而不衆所用之将專而不疑故也自後盡取東南數國又平河東土地財賦可謂廣矣而兵威不振國用轉急其義安在所蓄之兵冗而不盡銳所用之将衆而不自專故也今誠能簡銳卒去冗兵而委之以将帥用恩威法令以駕馭之資以天下財賦而曰兵不振用不豐未之有也臣愚以為陛下冝經制兵賦如開寳中則可以髙枕而治矣至于引唐虞比三代者皆為空言臣所不敢臣又見開寳中設官至少何以騐之臣本魯人占籍濟上未及第時常記只有刺史一人李謙溥是也司户一員今司門員外郎孫賁是也近及一年朝廷别不除吏當時未嘗闕事自後始有團練推官一員今樞宻直學士畢士安是也太平興國中臣及第歸鄉有刺史陳延山通判閻暐副使閻彦逺判官李廷推官栁宣兵馬監押沈繼明監酒稅等又増四員曹官之外更益司理問其租稅减於曩日也問其人民逃於昔時也一州既爾天下可知冗吏耗於上冗兵耗於下此所以盡取山澤之利而不能足也夫山澤之利與民共之自漢以来取為國用不可棄也然亦不可盡也今人謂盡矣何以知之只如茶法從古無稅唐元和中以用兵齊蔡宰相王涯始建稅茶之法唐史稱是嵗得錢四十萬緡東師以濟今則錢數百萬矣民何以堪臣故曰减冗兵併冗吏使山澤之饒稍流於下者也其三曰艱難選舉使入官不濫古者鄉舉里選為擇人士君子行脩於家學推於衆然後薦用登之于朝故從政而政和臨民而民泰自三代渉兩漢雖有沿革未嘗有逺去此道者也隋唐已来始有科試得人之盛與古為侔然自唐初終太祖之世科試未嘗不難矣毎嵗進士不過三十人經學不過五十人重以周髙祖之後外諸侯不得奏辟士大夫罕有資䕃故有終身不獲一第沒齒不獲一官者先皇帝毓德王藩覩其如此臨御之後不求偹以取人捨短從長㧞十得五在位将逾二紀登第亦近萬人不無俊秀之才亦有容易而得如臣者容易中一人爾臣愚以為數百年之艱難故先帝濟之以泛取二十載之霈澤陛下冝紏之以舊章伏望以舉塲還有司如故事至于吏部銓擇官材亦非帝王躬親之事比来五品已下謂之㫖授官今則幕職州縣而已京官雖有選限多不施行太祖已来便殿引見用為常例以至先朝調選之徒多求僥倖或以哀鳴泣涕便獲超資或以捷給山呼便陞京秩吏部官只若備員既無耻格之風漸多闒茸之吏臣愚以為冝以吏部還有司依格注擬其四曰沙汰僧尼使疲民無耗夫古者唯有四民治民者士也故受養於農工以造噐用商以通貨財皆不可闕也而兵不在其數盖周井田之法農即兵也有事則戰無事則耕自秦以来以彊兵定天下故戰士不服農業矣是四民之外又生一民而為五也所以農益困然而執干戈衛社稷理不可去也但使帝王之道不得與三代同風漢明之後佛法流入中國度人修寺歴代増加不蠶而衣不耕而食是五民之外又益一民而為六也故魏晉而下治道不及于兩漢有唐大儒韓愈諫憲宗迎佛骨表云昔黄帝在位百年年一百一十嵗少昊在位八十年年百歲顓帝在位七十九年年九十八嵗帝嚳在位七十年年百五嵗堯在位九十八年年百一十八嵗舜禹皆夀百餘嵗當時未有佛也是知古聖人不事佛以求福古聖人必排佛以救民假使天下有僧萬人毎日食米一升歲用絹一疋是至儉也而月有三千斛之費嵗有一萬縑之耗何况五七萬軰哉而又富僧鉅髠窮極口腹一齋之食一襲之衣貧民百家未能供給此軰既不能治民又不能力戰不造噐用不通貨財而髙堂䆳宇豐衣飽食而已不曰民蠹其可得乎臣愚以為國家度人衆矣造寺多矣計其費耗何啻億萬先朝不豫捨施又多佛若有靈豈不䝉福事佛無効斷可知矣陛下深鑒前王精求理本亟冝沙汰以厚生民若以嗣位之初未欲驚駭此軰且可一二十載不令度人不許脩寺使自銷鑠漸而去之亦救弊之一端也其五曰親大臣逺小人使忠良謇諤之士知進而不疑姦憸傾巧之徒知退而有懼夫君為元首臣為股肱言同體也得其人則勿疑非其人則不用凡今天下言帝王之盛者豈不曰堯舜之道具在方冊堯之時百姓不親五品不遜契作司徒敷五教蠻夷猾夏㓂賊姦宄咎繇作士明五刑伯夷典禮后夔典樂禹平水土益作虞官大哉堯之為君可謂委任責成而無疑矣或曰誠如是堯有何功德耶臣曰有知人任賢之徳爾雖然堯之道去世遼逺恐不可復臣以近事言之唯有唐之政可以損益而行焉臣讀元和賢相裴垍傳憲宗嘗命垍銓品庻官垍奏曰天子擇宰相宰相擇諸司長官諸司長官自擇寮屬則上下不疑而政成矣以陛下之明擇宰相數人猶時有非其人者况臣之不佞擇數十人諸司長官常恐不逮若更令臣擇庻官恐非致治之要當時識者以垍為知言伏望陛下逺取帝堯近鑒唐室既得宰相用而不疑使宰相擇諸司長官諸司長官自取寮屬則垂衣而治矣所謂忠良謇諤之士知進者也臣又聞古者刑人不在君側語曰放鄭聲逺佞人又曰浸潤之譖膚受之愬不行焉可謂明也已矣是以周文王左右無可結韈者言皆賢也夫小人之徒巧言令色先意承㫖事必害正心惟忌賢非聖帝明王不能深察臣又按舊制南班三品尚書方得登殿三班奉職卑賤可知或因遣使亦得陛殿惑亂天聽䙝黷至尊無甚于此伏望陛下振舉紀綱尊嚴視聽在此時矣不可不思所謂姦憸傾巧之徒知退者也臣愚以為今日之所急在先議兵使衆寡得其冝措置得其道然後議吏使清濁殊塗品流不雜然後難選舉以塞其原禁僧尼以去其耗自然國用足而王道行矣今若不去冗兵併冗吏不難選舉不禁僧尼縱欲减人民之賦寛山澤之利其可得乎伏惟陛下承二聖之貽謀鑒千古之治道明比日月幾先鬼神聖智所周不遺一物英斷所及出于百王而又三事大臣受遺輔政豈容郎吏輒議國經盖以臣素被寵光常思報効有所貯蓄不敢緘藏臣又念詔書云言之而不用罪在朕躬求之而不言咎将誰執不勝大願所以輒進狂瞽上干冕旒伏惟陛下踐詔書之言則天下幸甚至道三年四月肆赦五月詔御史臺告諭内外文武羣臣自今人君有過時政或虧軍事否臧民間利害並許直言極諌抗䟽以聞十八日禹偁以刑部郎中知揚州附逓上此奏即召還朝用其䇿以夏綏銀宥静五州賜趙保吉且命復知制誥上真宗荅詔五事陳彭年臣准詔在朝文武百官舉行轉對在外羣臣各許上章奏事者此陛下思納昌言以安庻彚之意也臣雖至愚切期塞詔伏惟明睿少賜裁察今之踐明庭獻封事者多述民間之常務殊非邦國之逺圖臣之所言則異於是臣聞重華之世伯禹叙其九功太甲之朝伊尹陳其一德武王受命訪洪範之九疇成王嗣興制周官之六典咸同古道以資化源伏惟陛下嗣二聖之丕基御千齡之大統羣臣進用百姓阜安誠當焕發洪猷彰明盛徳増修制度剏立憲章變霸俗於累朝復王風於往古使九夷荷其惠澤萬世仰其聲名之日也夫事有雖小而可以建大功理有至近而可以為逺計者臣請言之其事有五一曰置諫官二曰擇法吏三曰簡格令四曰省吏員五曰行公舉此五者實經世之要道致理之坦塗也臣請縷言之夫置諫諍之官開獻替之路堯舜湯武所共然也何者以正直之臣忠信之士參立左右專奉箴規有事必言有闕必諫足以達四方之壅蔽資聖主之聰明今雖有諌官且無言責或出居外任或兼領餘司常箝口以自安少危言而替否是同虛噐何補聖猷臣請依六典員數置諫議大夫司諫正言並選孤立無黨忠直不欺言行相符名實相稱者為之俱以才授不以叙遷使其常立明庭專居諫省入觀朝政出聽輿辭或作事失中或出令未當或選舉無狀或獄訟有寃小則上章大則廷諍然後聖主察其所言可者從之否者罷之嵗終以言事之多少為課最之髙卑忠讜盡規者甄升依阿固位者懲責自然人皆竭節政必無邪臣下不敢偷安朝廷得以震肅矣又人命所繫在於法官官或非才人必無告古者按大獄議大刑雖本於法律亦輔以經義故釋之定國之為廷尉則無寃人張湯趙禹之列九卿乃名酷吏國家重文學之選輕刑法之司故其屬寮未得盡善用忠恕之道則為曠官徇刻深之文乃名奉法唯格律而是守豈經義之能詳若是則囹圄何由空虛鈇鉞何由偃息臣請今後廷尉官属或委所司謹加銓擇不拘資叙唯擢才能使其理一成之刑務於平允用三尺之法志在哀矜無以愛憎舞文無以髙下希㫖自然民知耻格時洽和平又法令者國家之權衡生民之衘轡貴於簡易惡乎滋章乆用則民知適從數變則人無所措近者陛下知制敕之頻䧏懼條科之太繁旋軫聖謨特令刪定既經歴之者皆是名臣則措置之間固皆合理而詔書頒下方及於踰年後敕施行又将於累百或删去者重為條貫或已有者吏亦申明無益憲章徒繁簡牘且理遵畫一則吏無以欺民令或頻更則人得以弄法損益之際豈不明哉古人有言利不十不變法誠謂此也况先朝求理之心陛下繼明之志詔令一出夷夏同歡縱少有闕文亦無妨大體豈煩改作一致多門臣請今後有上封言事請變格法者非有大益毋改舊章庻使號令愈明刑辟漸措又理世之端審官為本審官之道用賢為先不在具員但期得俊故曰官不必偹惟其人又曰省事不如省官今國家州郡至廣官員太多無益公方空蠹國用使有才者莫盡其力不肖者得容其姦請以臣所親經證其利害臣前任蘇州通判日知州喬維岳疾病獨臣與判官崔端任其事次夀州通判日知州喬維岳䘮亡支使甘鴻漸差出獨臣與推官陸文偉同官此時區分獄訟决遣文書皆得及期亦無闕事即今蘇州知州通判外有職事官三員夀州知州通判外有職事官四員官員既衆事分益煩増将吏之衙參添簿書之壅滯又臣本州洵陽縣計户一千一百有官三員漢隂縣計主户六百有官二員率皆人户凋踈路岐荒僻詞訟絶少租賦甚㣲徒使安閑固無勤績臣毎見知郡推官軍監判官並名初等職事然有名雖知郡而事並藩方額是軍監而務多州府或當要道或在邉庭其間知郡則有推官而闕判官軍監則有判官而無通判監當錢榖詳斷刑名凡所責成莫非繁劇然其請受少於判司勞役不均賢愚共見臣請特選明幹朝臣與諸路轉運使相度管内州縣有公事簡少官屬過多處並量减省所省之俸依司理司法参軍例添給初等職官是則冗長之處既以减員要用之官又各加俸自然官無虛設人皆竭誠創此新規益光至理又為邦之道莫切於求賢求賢之方莫先於公舉然隄防不峻則濫進之路興憲網稍嚴則明敭之典廢期臻多士共振宏綱臣請依唐朝故事新授常参官朝謝日並進状舉官自代各随所長具言其状或以文學或以吏能或以強明或以清白務在摭實不許飾詞儻所諳知無避親黨既經御覽即付宰司俟至年終具名條奏在外者委諸路轉運使在京者委本司長官更詳其能以騐所舉如薦揚既數採聽非虛即為量才各加進用其後或不修操行故凟彛章則舉主依法科刑以懲謬舉或政績殊異課最有加則舉主随事旌酬以褒進善賞罰既信清濁自明盖采羣議則人無以私有常規則衆皆知勸清源正本其在於兹臣又伏見唐太宗常召公卿諮詢理體羣臣多拘近俗莫有逺謀唯獨魏徴請行王道太宗既從其議果致太平中華則外户不扄四夷則重譯来貢艱難屢作而締創益新豈非盛徳在人餘慶及後所致歟國家功成理定逺肅邇安萬彚宅心九夷拭目以陛下之聖徳跨越古先誠冝鄙晉魏而不談小髙光而獨出行清靜神明之化恢仁義慈儉之風然後舞干羽以為甲兵畫衣冠以為刑辟坐明堂而朝萬國登岱岳而禮百神則天下之民無聲而應海外之俗不召自来矣咸平四年二月上時知全州宋名臣奏議巻一百四十五
