body:
  text: 宋名臣奏議巻四十一宋趙汝愚編天道門災異五上仁宗論水災係第二狀歐陽修臣伏覩近降手詔以水災為變上軫聖憂既一人形罪已之言宜百辟無遑安之意而應詔言事者猶少亦未聞有所施行豈言者不足採歟將遂無人言也豈有言不能用歟然則上有詔而下不言下有言而上不用皆空文也臣聞語曰應天以實不以文動民以行不以言臣近有實封應詔竊謂水入國門大臣奔走淹浸社稷破壊都城此天地之大變也恐非小有所為可以消弭因為陛下陳一二大計而言狂計愚不足以感動聴覽臣日夜思惟方今之弊紀綱之壊非一日政事之失非一端水災至大天譴至深亦非一事之所致災譴如此而禍患所應于後者又非一言而可測是則已往而當救之弊甚衆未来而可憂之患無涯亦非獨責二三大臣所能取濟况自古天下之治必與衆賢共之也詩曰濟濟多士文王以寧書載堯舜之朝一時同列者夔龍稷契之徒二十餘人此特其大者耳其百工在位莫不皆賢也今欲救大弊弭大患如臣前所陳一二大計既未果為而又不思衆賢以濟庶務則天變何以塞人事何以修故臣復敢進用賢之說也臣材識愚暗不能知人然衆人所知者臣亦知之伏見龍圖閣直學士知池州包拯清節美行著自貧賤讜言正論聞于朝廷自列侍從良多補益方今天災人事非賢罔乂之時拯以小故棄之遐逺此議者之所惜也祠部貟外郎直史館知襄州張瓌静黙端直外柔内剛學問通達似不能言者至其見義必為可謂仁者之勇此朝廷之臣非州郡之才也祠部貟外郎崇正院檢討吕公著故相夷簡之子清静寡欲生長富貴而淡於榮利識慮深逺文學優長皆可過人而喜自晦黙此左右顧問之臣也太常博士羣牧判官王安石學問文章知名當世守道不茍自重其身論議通明兼時才之用所謂無施不可者凡此四臣皆難得之士也拯以小過棄之其三人者進退與衆人無異此皆為世所知者猶如此臣故知天下之廣賢材淪没於無聞者不少也此四臣者名迹已著伏乞更廣詢採亟加進擢置之左右必有禆補凡臣所言者乃願陛下聴其言用其才以濟時艱爾非為其人私計也若量霈恩澤稍陞差遣之𩔖適足以為其人累耳亦非臣薦賢報國之本心也臣伏見近年變異非止水災譴告丁寧無所不有董仲舒曰國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至斯言極矣伏惟陛下切詔大臣深圗治亂廣引賢俊與共謀議未有衆賢並進而天下不治者此亦救災弭患一端之大者臣又竊見京東京西皆有災傷並當存䘏而獨河北遣使安撫兩路遂不差人或云就委轉運使此則但虚為行遣耳兩路運使只見河北遣使便認朝廷之意有所輕重以謂不遣使路分非朝廷優䘏之急者兼又放稅賑救皆耗運司用物於彼不便兼又運使未必皆得人其材未必能救災䘏患又其一司自有常行職事又豈能専意撫綏故臣以為虚作行遣爾伏乞各差一使於此兩路安撫雖未能大段有物賑濟至於興利除害臨時措置更易官吏詢求疾苦事既専一必有所得與就委運司其利百倍也又聞兩浙大旱赤地千里國家運米仰在東南今年災傷若不賑濟則来年不惟民饑國家之物自此闕供此不可不留心也竊以三司今嵗京師粮米已有二年准偹外有三百五十萬餘石未漕之物今年東南既旱則来年少納上供此未漕之米誠不可不惜然少輟以濟急時亦未有所闕欲下三司勘㑹若實如臣所聞則乞量輟五七十萬石給與兩浙一路令及時賑救一十三州只作借貸他時嵗熟不妨還官然所利甚大此非弭災之術亦救災之一端也臣愚狂妄伏望聖慈特裁擇至和元年七月上時為翰林學士上仁宗論災變宜使儒臣據經義以言劉敞臣伏以聖王所甚畏事者莫如天所甚聴用者莫如民是故觀天意於災祥察民情於謡俗因災祥以求治之得失原謡俗以知政之善否誠少留意則皆粲然矣前古賢聖之君莫不循此以導其下忠信之臣莫不縁此以諷其上上下相飭而自天祐之竊見朝廷每有吉應嘉瑞則公卿稱賀至於災異非常可怪之事則寂然莫有言者雖歸美將順臣子之常操而於儆戒吁俞理似未盡陛下復不自延問以求天意恐非所謂小心翼翼昭事上帝聿懐多福者也臣愚以謂五經災異之說最深最切凡四方所上竒物怪變妖孽沴疾有非常可疑者宜使儒學之臣據經義傳時事以言若其言是可以當天意若其言非足以廣聖聰如近日雨雪驟寒人有凍死者此亦災變之一端矣唯聰明睿智憂深思逺順時謹㣲不可不慮也臣忝近列愚不能通古今竊觀前世商髙宗周成王畏天威享福祚之益誠願陛下留意於此不勝區區嘉祐四年上時知制誥上仁宗論日食遇陰雲不見乞不稱賀司馬光臣准太常禮院公文司天監奏今年六月朔太陽交食臣伏覩近世以来每有日食之變厯官皆先具月日時刻及所食分數奏聞至日或為陰雲所蔽或所食不滿分數公卿百官皆奏表稱賀以為大慶臣愚以為日之所照用徧華夷雲之所蔽至為近狹今若太陽實虧而有浮雲翳塞雖京師不見四方必有見者此乃天戒至深不可不察臣聞漢成帝永始元年九月日有食之四方不見京師見谷永以為沈湎于酒禍在内也二年二月日有食之四方見京師不見谷永以為百姓屈竭禍在外也臣愚以為永之所言似未協天意夫四方不見京師見者禍尚淺也四方見京師不見者禍寖深也日者人君之象天意若曰人君為隂邪所蔽災異明著天下皆知其憂危而朝廷獨不知也由是言之人主尤宜側身戒懼憂念社稷而羣臣乃始相率稱賀豈得不謂之上下相蒙誣罔天譴哉又所食不滿分數者厯官術數之不精當治其罪亦非所以為賀也伏望陛下明敇有司若六月一日果有日食之異或四方見京師不見或所食不滿分數皆不得奉表稱賀以重皇天之怒則天下幸甚臣職在禮部掌羣臣慶賀章表不敢不言嘉祐六年五月上時為起居注判禮部是嵗果大雨不見日食不復稱賀自後遂踵以為例上英宗應詔論水災吕誨治平二年八月八日詔曰盖聞古之聖賢在位隂陽和風雨時日月光星辰静黎民阜蕃以底休平朕甚慕之朕猥以眇身託于王公之上夙夜以思惟懼不能以承先帝鴻業而比年以来廼八月庚寅大雨京師室廬墊傷被溺者衆大田之稼害于有秋竊迹災變之来曾不虚發豈朕之不敏於徳而不明於政歟將天下刑獄滯寃賦徭煩苦民有愁嘆亡聊之聲以奸其順氣歟不然則何天戒之甚著也今飭躬焦思欲銷復大異而未聞在位者之忠言進徳自新厥路何繇焉應中外臣寮並許上實封言時政闕失及當世之利病可以輔治者悉心以陳母有所諱執政大臣皆朕之股肱其協徳交修以輔朕之不逮臣伏覩詔音責躬引咎博訪羣臣有以見聖徳之至矣臣聞隂陽和則風雨時王道正則百川理五事不修則物不遂性災沴繇兹而生矣斯政化通於天地見效可信者天以變異告戒人君者欲恐懼修省振起頽弛如其怠荒不新厥徳外無保民之慮中無應變之實則咎罰荐臻危亡及之甚可畏也方秋令向深氛潦當息而霖雨驚驟泉源湧溢蕩覆廬舍墊溺民命京師訛言㡬至生亂誠異常之變矣陛下即位之初事無過舉災沴遽作殆人情乆欝怨愁之氣積隂而成天意愛陛下之深以是譴告不可不求其原也臣謹按洪範曰肅時雨若狂恒雨若肅者貌之恭狂者事之妄居上則言動必謹謀慮必審號令必信賞罰必當一有其妄咎徴斯應五行志曰簡宗廟廢祭祀水不潤下水者北方萬物終蔵之地神道居隂尚乎安静䖍恭廟祭所以昭孝道也廼者濮安懿王一事始議或將與仁廟比崇終罷追封不及燕王之例禮失中而孝不足是亦㡬乎慢也京房𫝊曰飢而不損謂泰厥災水謂下民饑饉上宜减損去冬及春許潁等郡大荒上方多不急之用後苑有淫巧之工宜裁减以崇儉約量入制用正在今日也又曰避遏有徳厥災水盖以有徳之人壅遏而不用也今則官不試職名不副實賢不肖溷淆於下而况前席詳延無非藩邸之舊清塗進用皆出權臣之門忠良之人寧無觧體古者以功舉賢則萬化成而瑞應著以毁譽取人故㓛業廢而災異至斯皆前世已驗之明者陛下當翼翼循思追捄其失庶㡬消復之理也然陛下側身恐懼祇悔誠深方注意輔臣代天理物隂陽不順風雨不時天變於下致時政之闕失咎將安歸臣備貟風憲無補聰明朝綱之頽弛時政之闕失職臣之繇罪在不赦詔命既下著位之臣莫不輸忠畢慮仰副諮詢惟陛下省覽無倦言或可用克已行之日謹一日惟新盛徳更張治具隠䘏民病感召和氣以塞災變如曰休咎數也治亂勢也四輔俱賢百工皆舉不責人事委之天理臣恐天心未應沴氣還復人情動揺邦國傾矣愚臣之言不識忌諱唯聖加察焉治平二年八月上時為同知諌院兼侍御史知雜事上英宗應詔論水災呂大防臣伏覩乙未詔書以水潦之變責躬恤物延問得失禹湯之引咎漢文之恭已不過是也臣伏睹自古人君之失徳必皆有嗜好偏篤難改之行以害政事或好征伐或好田獵或好聲名或好行幸或好治宮室故臣下之言不可入而君上之過終莫能改則天為出變異以警懼之如漢文帝之賢唐太宗之明皆不免此累伏惟陛下纂承大統三年於兹勤修虜好屏棄物玩減後宫之冗罷不急之費早朝晏罷日謹一日於前數者曽無一焉而天變之大如此之甚臣竊思殆非出於陛下之聖躬而率由政事之失臣得為陛下詳布其說盖以天之告人不能諄諄然而常以象𩔖示今雨水之患至入宫城壊廬舍殺人而害物此隂勝陽之沴也以人事而言君弱臣强隂勝也夷狄謀中國盗賊害平民亦陰勝也臣雖愚昧蒙陛下非次拔擢日夕為陛下講求思慮當今之故與今日之所宜無出八事之大一曰主恩不立二曰臣權太盛三曰邪議干正四曰私恩害公五曰夷狄連謀六曰盗賊恣行七曰羣情失職八曰刑法失平何謂主恩不立陛下自即位以来所與日相見者兩府之臣七八人時興之相見少接其語言者兩制主判之臣經筵侍從諫官御史輩又數十人陛下之臣五日一謁於廷下四五百人而所與相見接其語言日纔一二如此則何以通君臣之情哉至如館閣省府之官皆陛下選擇養育以進用之人而有平生未嘗識陛下之龍顔者此臣所未諭也竊料陛下非憚其勞而不見特以故事如此不能遽改而已唐之制有待制本朝建隆乾徳咸平天聖皆常行之又祖宗臨御往往非次宣召臣僚訪以政事或行幸書林接見儒臣臣愚以為宜復轉對之制及許轉運判官辭見并權發遣三司判官授差遣及委審官擇大郡自来選差知州人並令上殿仍乞非時宣召臣寮以問政事羣臣之情達則主恩立矣何謂臣權太盛進退百執事皆由宰司進擬而陛下直可其奏者十則十百則百故中外之臣有被任使當進擢惟知出執政之門而罕有歸恩於陛下士大夫相語以得官為經營有力以失職為某人不喜如此則望宣力盡忠之臣豈易得哉臣愚以為小官冗職不必煩陛下揀擇至於修起居注集賢史館修撰天章閣侍講三司副使此四五職名僅及十貟皆進用兩制之門陛下茍不以留意則庸人下才依託干情從此而進遂為陛下侍從之臣一旦有緩急湏將帥之才則常患無人退之則無名進之則無補置而不用則位髙祿重陛下試觀今日兩制之臣如此者有㡬即可見其所從来者不謹選也陛下何嘗徧接識凡今館閣省府之臣陰察其可用者記之于籍間復參問近輔左右之臣以騐其實乃與大臣議某人堪某官任某事假如修注修撰侍講副使共須十貟則采察二十人以待之遇一官闕陛下召而授之則恩自陛下出矣無經營馳騁之患矣至如其他進擬有不合陛下意者當退而改之如此則臣權不盛矣何謂邪議干正昨者朝廷參議濮安懿王典禮衣冠草茅之士無賢不肖上至陛下左右侍從素所取信之臣皆以為出繼帝統大義甚重不宜復顧私親追榮之禮當據禮經而兩漢衰世故事不可援用然一二姦人内希陛下追懐之意外協大臣不正之議而復結濮宮諸貴人之歡遂不顧公議妄進邪說以白為黑以是為非惑亂聖聴中外切齒臣愚以為應因濮安懿王論奏文字一切付外委未嘗預議近臣覆定可否宣示四方則隂邪之人不敢干正矣何謂私恩害公自古人君即位無不有攀附故舊之臣然賢智之君待故舊之意恩寵甚重而至於議政事論國體則必與天下之才共之漢文帝不訪宋昌而用賈誼袁盎以議當世之政不屬景帝以張武而謂周亞夫為可用唐太宗之論人物薄髙士㢘唐儉而引重劉洎馬周其用王珪魏徴也皆仇敵之餘豈嘗計其新舊親疎哉陛下比日以来數引見藩邸之臣恩禮甚厚外人不知皆以為陛下與之議政事論人物誠如此則害聖徳多矣緣此等人材至下止可待以恩厚不宜置之顯路則私恩雖厚不害公議矣何謂夷狄連謀元昊晚年君臣相疑而父子結隙謀臣壯士往往被誅又累為唃氏所敗遂有休兵願和之意而強臣急於進取徼其成㓛議和之初許與太原嵗遺金帛之直盖三十萬緍戍邉之兵不能大减比之寳元以前戍兵増五六萬而嵗費約二百餘萬故闗中民力乏困而内帑泄於二敵而益虚今諒祚少年繼襲多招亡命與之為謀有窺闗輔劍南之意不獲其意則又邀朝廷乞増賜予而後已頗聞近嵗與北敵交通使人旁午狄人則利羌之賂羌則恃狄之援唇齒相依犄角為冦其可不早為計耶臣愚以為擇將帥増參佐則邉俻可講置都䕶結唃氏則分諒祚之勢絶劍南之患寛禁約撫屬羌則防落漸備乆任堡障之戍得自為政則夷狄見畏矣何謂盗賊恣行今京東之民日夕為盗之家往往不敢申舉者盖官不能得盗復能為害於申舉之家是盗之威勢常大于官司矣久而不禁則屯聚嘯集以覆州縣如反掌耳臣愚以為多盗之邑令監司舉縣尉别為改官之格以激勸之以捕盗殿最以課監司守令則盗賊消矣何謂羣情失職今審官所差知州通判得替而赴闕乆而後差常在一年半之後而待次者又常及一百人知縣監當者畧同其比是常參之官不釐務而請俸者常及其半其弊盖由每嵗流内轉官之𩔖僅及百人其上簿而待遷者又數百人凡諸銓未遷者常及三年而後得此盖法之敝也臣愚以為改磨勘之法量入流之數則羣情不失矣何謂刑罰失所今大理審刑刑部乃天下所觀定法之地用法不當立比不一莫甚於此蓋法官銓擇殊為滅裂臣愚以為更法官之法則刑罰得中矣治平二年八月上時為監察御史裏行上英宗應詔論水災程珦臣伏覩詔勅以年来水潦為沴八月庚寅大雨應中外臣寮並許上實封言時政闕失及當世利病此蓋皇帝陛下承祖宗大業嚴恭天命祇畏警懼之深也天下士民欽聞徳音茍有知見孰不願披忠瀝懇上達天聴臣雖至愚官為省郎職分郡寄敢不竭其區區之誠以應明詔惟陛下寛其狂易之誅賜之省覽則天下幸甚臣聞水旱之沴由隂陽之不和隂陽不和繋政事之所致是以自昔明王或遇災變則必警懼以省躬之過思政之闕廣延衆論求所以當天心致和氣故能消弭變異長保隆平昔在商王中宗之時有桑楮之祥髙宗之時有鳴雉之異二王以為懼而修政行德遂致王道復興皆為商宗百世之下頌其聖明今陛下嗣位之初比年隂沴聖心警畏特下明詔以求政之闕誠聖明之為也然臣觀近古以来引咎之詔自新之詔亦世有之其如人君不由於至誠天下徒以為虚語豈復有如商之二宗興王道於既衰者乎臣願陛下因比天戒奮興善治思商宗之休實鑒後代之虚飾不獨消復災沴於今日將永保丕基於無窮伏觀詔㫖時政闕失當世利病可以佐元元者悉心以陳母有所諱臣竊惟天下之勢所甚急者在安危治亂之機若夫指一政之闕失陳一事之利病徒為小補不足以救當世之弊而副陛下勤求之意也所謂安危治亂之機臣請條其大端所謂安且治者朝廷有綱紀權持總攝百職庶務天下之治如網之有綱裘之有領舉之而有條委之而不紊也郡縣之官得人而職修恵養有道朝廷政化宣達于下也百姓安業衣食足而有常心知孝悌忠信之教率之易從勞之不怨心附於上固而不可揺也化行政肅無姦宄盗賊之患設有之不足為慮盖有殱滅之備而無響應之虞也民心和而陰陽順無水旱蟲螟之災有之不能為害盖倉廪實府庫充官用給于上民食足於下也武備修而威靈振蠻夷戎狄無敢不服雖有之不足為憂盖甲兵利而儲備豐將善謀而士素練也此六者所謂安且治者今之事一皆反是朝廷紀綱汗漫離散莫可總攝本原如此治將安出郡縣之官選不以道更易之數雖時謂才者尚莫能稱其職况庸常者乎循常茍安浸以成俗舉世以為當然政治廢亂生民困苦朝廷雖有恵澤孰能宣布以達於下所與共理者如比天下可知矣百姓窮蹙日以加甚而徭繁賦重剥削之不息天下戸口雖衆而自足者益寡司牧者治其事耳非有師保左右之也其善惡勤惰趨利避害或昧而反之不從其自然而困之陥之之道又非一塗人用無聊茍度嵗月驅之於治則難格率之於惡則易揺民惟邦本本根如是邦國柰何民無生業極困則慮生民不漸善教思利則志動乗間隙則萌姦宄逼凍殍則為盗賊今兹幸無大故尚爾茍安設或遇大饑饉有大勞役姦雄一呼所在必應以今無事之時尚恐力不能制况勞擾多事之際乎天下安危實繋於此保民之道以食為本今自京師至于天下計平時之用率無三年之蓄民困空匱則又甚焉以萬室之邑觀之有厚蓄者百無二三困衣食者十居六七統而較之天下虚竭可知矣豐年樂嵗饑寒見於道路一榖不稔便致流轉卒有方數千里連數年之水旱不知何以待之姦盗蜂起于内夷狄乗隙於外雖欲為之末如何矣戎狄强盛古未有此嵗輸金帛以修好而好不可恃窮天下之力以養兵而兵不足用尚幸恃勇無謀厭小欲而忘大利故我得以紓朝夕之急若其連衡而来則必興數十萬之衆宿於邉境餽餉不繼財用不充將何以濟乎驕惰之兵縱無奔潰之患曠日持乆終有消窮之虞又况征斂興廢而民人轉亡饑饉愁怨而姦雄競起事至于此興衰可知以此觀之天下之勢安乎危乎凡此數端皆有危亡之虞而未至於是者不識朝廷制置能使之然耶抑天幸而偶然耶幸然之事其可常乎先皇帝至仁格天地保持之以至於今歴時既乆言者既已多朝廷遂以為果不足憂也可以常然姑維持之而已雖聞至深至切之言不為動也嗚呼貽天下之患必由於是乎今天下尚無事朝廷宜急思所以救時之道不然臣恐因循嵗月前之所陳者一事至則為之晚矣中人之家有百金之産子孫保守不敢不念陛下承祖宗大業可不懼乎今言當世之務者必曰所先寛賦役也勸農桑也實倉廪也俻災害也修武備也明教化也此誠要務然猶未知其本也臣以為所尤先者有三焉請為陛下陳之一曰立志二曰責任三曰求賢今雖納嘉謀陳善算非君志先立其能聴而用之乎君欲用之非責任宰輔其孰承而行之乎君相協心非賢者任職其能施於天下乎三者本也制於事者用也有本不患無其用三者之中復以立志為本君志立而天下治矣所謂立志者至誠一心以道自任以聖人之訓為可必信以先王之治為可必行不狃滯於近規不遷惑於衆口必期致天下三代之世此之謂也夫以一夫之身立志不篤則不能自修况天下之大非體乾剛健其能治乎自昔人君孰不欲天下之治然而或欲為而不知所措或始銳而不克其終或安於積乆之弊而不能改為或惑於衆多之論而莫知適用此皆立志不堅故也臣觀朝廷每有善政鮮克堅守或行之而天下不從請舉近年一二事以明之朝廷以今之任人未嘗選擇一用薦舉之定式患所舉不得其人也故詔以飭之非不丁寧然而當任者如弗聞也陛下以為自後所舉果得其人乎曾少異於舊乎又以守令數易之害治也詔㢘察之官舉其有善政者俾之再任于今未聞應詔者豈天下守令無一人有善政耶茍誠無之朝廷負生民不已甚乎且以為善政行之何不使天下奉承以見其效若曰非不欲必行也奈天下不從何如此則是政令不行矣將如天下何此亦在陛下而已茍陛下之志先立奮其英斷以必行之雖彊大諸侯跋扈藩鎮亦將震慴莫敢違也况郡縣之吏乎故臣願陛下以立志為先如臣前所陳法先王之治稽經典之訓篤信而力行之救天下深沉固結之弊為生民長乆治安之計勿以變舊為難勿以衆口為惑則三代之治可望於今日也若曰人君所為不可以易易而或失其害則大臣以為不然稽古而行非為易也歴觀前史自古以来豈有法先王稽訓典將大有為而致敗亂者乎惟動不師古茍安襲弊卒至危亡者則多矣事據昭然無可疑惑願陛下不以臣之踈賤而易其言則天下幸甚所謂責任者夫以海宇之廣億兆之衆一人不可以獨治必賴輔弼之人然後能成天下之務自古聖王未有不以求任輔相為先者也在商王髙宗之初未得其人則恭黙不言盖事無當先者也及其得說而命之則曰濟川作舟楫嵗旱作霖雨和羮作鹽梅其相湏倚之如是此聖人任輔相之道也夫圖任輔相必以謹擇為本擇之謹故知之明知之明故信之篤信之篤故任之専任之専故禮之厚而責之重擇之謹則必得其人知之明則仰成而不疑信之篤則人致其誠任之専則得盡其禮禮之厚則禮貌尊而其勢重責之重則自任切而㓛有成是故推誠任之待以師傅之禮坐而論道責之以天下治隂陽和故當之者自知禮尊而任専責深而勢重則挺然以天下為已任故能稱其職也雖有姦諛巧佞知其交深而不可間勢重而不可揺亦將見息其邪謀歸附於正矣後之人主則異於是其始也擇之不謹故知之不明知之不明故信之不篤信之不篤故任之不専任之不専故禮之不厚而責之不重矣擇不謹則不得其人知不明則用之猶豫信不篤則人懐疑慮任不専則不得盡其能禮不厚則其勢輕而易揺責不重則不稱其職是故任之不盡其誠待之不以其禮僕僕奔走若吏史然文案紛冗下行有司之事當之者自知交不深而其勢輕動懐顧忌不肯自盡上懼君心之疑下虞羣議之奪故蓄縮而不敢有為茍循常以圖自安爾君子弗願處也姦邪之人亦知其易揺日伺間隙如是其能自任以天下之重乎若曰非任之難知之惟難且何以知其賢而任之或失其人治亂所繋此人君所以難之也臣以為知人誠難亦繋取之之道如何爾臯陶為帝謨曰在知人禹吁而難之及其陳九徳載采采則曰底可績盖詢行考實人焉廋哉歴觀前史自古以來豈有履道之士孝聞於家行著於鄉德推於朝廷節見於事為其言合聖人之道其履蹈經典之訓及用之於朝反致敗亂者乎用是而求其有差乎若乃人君以為賢而用之卒敗於事者古亦多矣稽迹其由蓋取之不以其道也大率一言一事合於已心則謂之才而用之曾不循核本末稽考名實如前之云傷民害政不亦宜乎四海之大未始乏賢誠能廣揚側陋至誠降禮求之以道雖臯夔伊周之比亦可必有賢徳志道之士皆可得而用也願陛下如臣前所陳既堅求治之志則以責任宰輔為先待之盡其禮任之盡其誠責之盡其職不患其不為患其不能為不患其不能為患其不得為蓋不為者可責之必為不能為者可勉而能惟不得為則已矣所謂不得為者君臣之志不通懐顧忌而不肯自盡此由失待任之道也今執政大臣皆先朝之選天下重望陛下責任之而已臣願陛下延召宰執從容訪問今天下之事為安為危為治為亂當維持以度嵗月乎當有為以救其弊乎如曰當為則願示之以必為之意詢之以所為之政審慮之力行之時不可後事不可緩也如曰非不為也患不能也則天下之廣豈無賢徳可以禮問朝廷之上豈無英髦可以討論有先王之政可以考觀有經典之訓可以取則道豈逺哉不求爾在君相協心勤求力為之而已如曰無妄為也姑守常而已則在陛下深思而明辨之唐文宗之時大權漸奪天下將亂而牛僧孺欺以為治矣史冊書之可為明鑒今陛下聖明執政忠良無是事也伏願陛下不以臣之䟽賤而易其言則天下幸甚所謂求賢者夫古之聖王所以能致天下之治無他術也朝廷至於天下公卿大夫百職羣寮皆稱其任而已何以得稱其任賢者在位能者在職而已何以得賢能而任之求之有道而已雖天下常用易得之物未有不求而得者也金生於山木生於林非匠者採伐不登於用况賢能之士傑出羣𩔖非若山林之物廣生而無極也非人君捜擇之有道其可得而用乎自昔邦家張官置吏未嘗不取士也顧取之之道如何耳今取士之弊議者亦多矣臣不暇條析而言大槩投名自薦記誦聲律非求賢之道爾求不以道則得非其賢間或得其才適由偶幸非知其才而取之也朝廷選任盡自其中曾不虞賢俊之棄遺于下也果天下無遺賢耶抑雖有之吾姑守法於上不足以為意耶將科舉所得之賢已足自治而不乏耶臣以為致天下今日之弊盖由此也以今選舉之科用今進任之法而欲得天下之賢興天下之治其猶北轅適越不亦逺乎臣願陛下如臣前所陳既立求治之志又思責任之道則以求賢為先茍不先得賢則雖陛下焦心勞思將安所施誠得天下之賢置之朝廷則端拱無為而天下治矣此所謂勞於求賢逸於得人也歴觀前史自古以来稱治之君有不以求賢為事者乎有䂓䂓守常以資任人而能致大治者乎有國家之興不由得人者乎由此言之用賢之騐不其甚明若曰非不欲賢也病求之之難也臣以為不然夫以人主之勢心有所嚮天下風靡景從設若珍禽異獸瓌寳竒玩之物雖遐方殊域之所有深山大海之所生志所欲者無不可致盖上心所好奉之以天下之力也若使存好賢之心如是則何巗穴之幽不可求何山林之深不可致所患好之不篤耳夫人君用賢亦賴公卿大臣推援薦達之力今朝廷未嘗求賢公卿大臣亦不以求賢取士為意相先引彚世所罕聞訪道求師貴達所恥大率以為任已可也士將安補今世無賢求之何益夫以周公之聖其自任足矣尚汲汲求賢以自輔也以其聖且好賢與知人之明宜天下之賢皆為之用莫有遺也尚乃日不暇給恐失天下之士後之人其才不及周公而自謂足矣不求賢以自輔也以其不求且知之不明宜賢者在下之多也乃曰天下無賢矣噫何其用意與周公異也欲其助皇明燭幽隐不可得也然亦係上之所為而巳陛下誠能専心致志孜孜不倦以求賢為事常恐天下有遺棄之才朝廷之上推賢援能者登進之蔽賢自任者踈逺之自然天下嚮風自下及上孰不以相先為善行薦達為急務搜㧞既廣雖小才片善無所隐晦如此則士益貴而守益堅㢘恥格而風教厚矣得天下之賢則天下之治不足道也今世人情淺近積習成俗朝廷進人茍循常法則雖千百而取羣伍而用庸惡混雜曾不以為非設或拔一賢一善出於不次則求摭小差衆議囂沸如真廟擢种放先朝擢范仲淹是也設非君心篤信寧免疑惑反自為過此所以非常之舉曠乆不行也伏見近日陛下不由言薦擢范純仁置之言路在今世為非常之舉純仁名臣之子有才名在位多言其能陛下擢之當也然臣願陛下自信勿疑純仁果賢則陛下知人之明也如用之而無顯效則亦曰吾勞心任人雖未得其效亦無愧於天下矣設或大敗厥職則亦曰吾之失也當益務選擇期於得人爾蓋拔十得五才不可勝用求賢而失尚愈於不求誠持是心何患不得賢也方陛下用純仁識者皆喜臣獨憂之何者陛下始奮英斷㧞一人誠恐或有差失遂抑聖心以為専守常規可以無過不復以簡擢為意則天下將何望焉此在陛下自信勿疑而已願陛下不以臣之踈賤而易其言天下幸甚臣前所陳三者治天下之本也臣非不知有興利除害之方安國濟民之術邉境備禦之策教化根本之論可以為陛下陳之顧三者不先徒虚言爾三者既行不患為之無術也願陛下以社稷為心生民為念鑒茍安之弊思永世之策賜之省覽察其深誠萬一有毫髪之補於聖明臣雖被妄言之誅無所悔恨昔賈誼為漢文言治亂漢文不能用者百世之下為譏病陛下勿使後之視今猶今之視昔則天下不勝幸甚狂瞽之言惟聖明裁恕治平二年上時知磁州上英宗應詔論水災鄭獬臣伏見詔書以京師大雨為沴壓溺者衆許中外官僚極言得失者兹實陛下側身求過思有以消復之天衷懇懇至於魚蟲草木莫不感動况於能言者哉臣竊伏思今陛下發詔以求忠言將欲因災異舉故事而藻飾之耶茍欲藻飾之則固無可議者必欲用之則臣願陳其方臣觀前世之君因怪變而求諫者甚衆書之史冊以為美事及考其實則能用其言而載於行事者盖亦鮮矣徒使後世襲蹈以為帝王之值災異者此空言而已矣自徳音一發天下忠義之士必有極其所藴以薦諸朝者此當有益於治道不為妄作然而疊章累疏繁委而並集則陛下果能環復而究覽之耶計陛下一日萬㡬必未能然爾而將欲如平時章疏事闗深宻者則留中不出事係政體者則下中書事屬兵要者則下樞宻院兩府覆奏則又下羣有司及郡邑至於無所行而後止如此則是有求諫之名而無求諫之實與前世之為空言者等耳臣竊謂陛下萬㡬之繁既未能徧覽則選置官屬令専掌今之羣臣所上章䟽日許兩府及近臣番休更直便殿賜坐與之從容條陳講貫其可者則熟究而行之不可則罷之有疑焉則廣詢而後决之羣言得而衆事舉此應天之實也天下之為言也甚難而上之聴者常忽焉自非忠憤激於心則孰肯隳肝膽而冒忌諱者哉古之能建立功業者未甞不好諫也好之者繇其能褒進而招徕之也太祖太宗時言事者多被甄賞自近年以来兹事寥闊仁宗寬仁最能容直言而亦不能甄賞也願陛下采羣臣之章䟽如其宏謀偉論可施於當世者則召見之與之共議不惟質其言且以觀其材大者擢之以職任次者加賜金帛無取焉則報罷之如此則陛下下詔有實言得言有實用且使史冊書之以為某年大水詔求直言用某人言事以絀夫前世之為空言者則無令陛下詔書蔵於有司復為數幅空紙而已唯陛下斷而行之則臣不勝大願治平二年八月上時知荆南宋名臣奏議巻四十一
