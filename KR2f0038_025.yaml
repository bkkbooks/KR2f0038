body:
  text: 宋名臣奏議巻二十五宋趙汝愚編帝系門尊號上太宗論省去尊號只稱帝字宋白臣等奉宰臣傳聖㫖以近降御扎省去尊號今欲只稱帝字令臣等商量者乍聆睿㫖仰測天心見陛下謙尊之誠善下之意寅畏天命超越古先固無得而稱也然則皇帝二字典策昭然數千百年㳂襲不改盖如天之有地日之有月二儀成象兩曜齊明不可斯須而去之也聖意以為非從上古起自嬴秦鄙其兼名欲歸一字然肇于前漢爰至近朝唯此尊名不能去者何哉盖天下行之已久人臣呼之已熟方今萬方一統四海為家士馬精練蠻夷率服民物豐阜前代無雙至於徽號之稱増加即可唯此至尊之字減損實難况夫今古異冝質文互變一定之制千載不刋與其改作而謀新曷若因俗而仍舊臣等職塵内禁上事明庭凡在討論未嘗請免如此大事不敢輕言誓竭微軀各以死請泰山可轉此志不移冒犯冕旒甘當鼎鑊端拱二年十二月庚申詔曰古先哲王託居人上盖務求於至治豈有尚於虚名矧此帝王之稱以極崇大爰自唐室始加美號徇臣子之愛戴著方册之典常踵事増華積習無改朕亦博考載籍追法古道旣異三王之舊制深懼賓實之有踰憮然自思不遑寧處自今四方所上表冝只稱皇帝辛酉呂䝉正等奏曰陛下功德茂盛但可増益尊名今欲省去羣情無不震駭上曰皇帝二字亦不可兼稱盖起秦始皇後代因之不改朕比欲正稱王屬以諸子封王為不便耳朕志以定卿等毋勞確奏白上此疏時為翰林學士上仁宗論頻有災異乞直降御扎不受徽號韓𤦺臣竊以陛下至德合天地至仁越堯舜雖徽號累百亦無得而稱焉盖以三載一郊陛下報本之際臣子之心無以歸美君上故恭薦盛名以達惓惓之意縁近年以來天地之變比比而發陛下亦嘗虚懷以來讜言平刑以降罪戾今者圓丘展祀所冝責躬引咎仰荅天戒其所加尊號欲望不賜恩可如陛下已有聖意謙遜不從莫若直降御扎申諭宰庭具述宸𠂻便斷來表若候章表五上方示推拒此乃從來俞允之例似未恊冝此事動干典䇿望聖明熟慮之寳元元年上時為右司諫供諫職上仁宗乞固辭徽號劉敞臣伏見宰臣率文武百官詣東上閤門拜表乞加上尊號准批答不允此誠見陛下㳟遜持滿惡盈好謙之意且陛下自寳元以來不復加徽號近二十餘年矣沖遜之德上通於天下信於民此上天所以保佑聖躬受福無疆萬民所以愛戴聖政日新一日者也今實不須稍増數字示人自滿臣願陛下固執雅意羣臣雖十上表堅遜不受足以益見積年沖遜之實必大得天人之祐且陛下尊號既已云體天法道欽文聦武聖神孝德盡善極美矣復加大仁不足増光而曰至治則有若自矜今百姓多困倉廪不實風俗未清賢否混淆獄訟繁多盜賊羣輩水旱繼有四夷雖粗定然本以重賂厚利羈縻而服之非畏威慕義者也未可謂至治然則遜而不居於聖德彌髙矣今羣臣皆以加上徽號為請而臣獨望陛下以固辭徽號為願其心則同欲尊君同欲愛君然望陛下裁之聖慮參之美志㫁而行之則有髙世之名與道同符豈數字可盡哉嘉祐四年六月宰臣富弼等請加尊號曰大仁至治詔不許故事每三嵗躬行大禮畢輒受羣臣所加尊號自康定以來罷之至是執政復舉故事以請敞時兼領禮部章表當撰表辭先勸弼以不宜爾弼憮然曰適已奏聞敞不得已為撰五表仍宻上此奏罷之敞時知制誥上仁宗乞固辭徽號係第二狀劉敞臣近上封事欲望陛下堅遜尊號今已兩奉批答不允願陛下遂執此意㫁在不疑且陛下不加尊號已二十年謙沖之德超絶前古簡在帝心人臣歸美夫以二十年行之一旦改之於義不可盖推善歸美以尊君父者臣子之常節也遜德惡盈以保天下者聖人之至道也臣謂陛下永執至道以當天心必有一謙四益之報増加數字未足發揚光輝實恐反累陛下二十年昭升之美又入今嵗以來頗有災異日食地震雨雹大雪飛蝗涌水傷害廣逺以理論之陛下寅畏天命正當深自抑損豈可於此時加上尊號昔伊尹戒商王曰有言逆于汝心必求諸道有言遜于汝志必求諸非道今臣此言逆于心者也而羣臣之請遜于志者也誠望陛下求諸道而已嘉祐四年六月上上仁宗乞固辭徽號係第三狀劉敞臣兩貢愚忠欲望陛下辭不受所加尊號似未䝉采納臣豈敢沮衆人之意豈敢損主上之美實以謂崇陛下之稱號不如明陛下之謙遜徇臣子歸美報上之心不如廣君父克已畏天之道此事至重至大在陛下力能行之不當復詢左右之臣今羣臣已五上表聴之則頓失二十年謙遜之美不聴則合於嚴恭寅畏持盈克遜之義亦令四方無以窺聖徳之淺深臣雖狂暗竊重惜此舉不敢不再三陳聞嘉祐四年七月上上英宗乞不受尊號司馬光臣聞謙徳之美尊而益光施之神人無不恱順竊見陛下將有事于南郊羣臣循襲故事請上尊號以陛下睿智聰明徽柔懿恭享兹鴻名云何不可正以屬者暴雨為災田稼漂沒編户失業吁嗟之聲盈於道路迄今未息陛下當此之際正宜深自抑損以承答天譴釋衆心况尊號非古近出有唐陛下受而有之不足以褒大聖功推而不居足以發揮盛徳所有羣臣上尊號表伏乞陛下拒而勿受仍令更不得上表此亦區區微誠欲裨益萬分之一也治平二年七月宰臣韓𤦺等上表請上尊號光以九月上此奏時知諫院由是羣臣上表終不允上英宗乞不受尊號更下詔書深自咎責司馬光臣聞王者父天母地子育黎元嚴恭鬼神畏懼災異故能安靖國家享有多福自生民以來不易之道也天雖至髙視聽甚邇朝夕不離王者左右順吉逆凶應若影響此乃詩書所載聖人所言豈可謂之漠然無知而簡忽不顧哉臣伏見陛下踐阼已來太陽侵色中有黒子大風晝晦冬温無冰連年大水漂沒廬田以至今嵗災異尤甚彗星彰見光炎隆熾朝東暮西連月乃滅飛蝗害稼日有食之加之陜西河東夏秋乏雨禾既不收麥仍未種赤子恓惶流離滿路西戎内侮邉鄙未安當此之際羣臣宜勸導陛下以祇畏天命勤恤民隠克已謙約博求至言以消復變咎延致善祥而朝廷晏然曽不為意或以為自有常數非闗人事或以為景星嘉瑞更當有福今者又有佞臣建議請上尊號其為欺蔽上天罔誣海内孰甚於此是使上帝鬼神怫鬱不懌自拜表以來陛下嬰此疾疢乆而未愈此皆羣臣諂諛之罪陛下豈得不省寤而深思哉臣不勝區區忘生觸死伏望陛下自以聖意止羣臣所上表章却尊號而勿受更下詔書深自咎責咨謀四方廣開言路求所以事天養民轉災為福之道俟聖體康復政化流通天時豐穰人心恱豫然後推崇徽號何晚之有如此庶幾上帝收還威怒福禄大集聖躬和平勿藥有喜羣生百姓莫不幸甚况陛下曏者郊禮之前辭尊號不受天下稱誦盛德至今未已然則是棄虚名而得實名捨虚美而取實美也於陛下何損焉臣荷國大恩承乏侍從誠見近日羣臣皆以言為諱入則拜手稽首請加鴻名出則錯立族談腹非竊笑終無一人為陛下正言其不可者臣竊痛之是敢妄進狂瞽惟聖明采察治平三年十一月上時為龍圖閣學士判流内銓上神宗乞斷以聖意勿受尊號之請司馬光臣今月十七日准内降曽公亮等上尊號第三表檢㑹舊例合降不允批答已具牓子審取聖㫖去訖臣竊惟上尊號之禮非先王令典起於唐武后中宗之世遂為故事因循至今伏見太祖開寳九年羣臣上尊號有一統太平字太祖以燕晉未平却而不受以是見聖人之志茍無其實終不肯有其名也太宗端拱二年詔曰前所加尊號盡從省去且曰以理言之皇帝二字亦未可兼稱朕欲稱王但不可與諸子同耳羣臣懇請乃受法天崇道四字而已其後終身遂不復増益先帝治平二年辭尊號不受天下莫不稱頌聖德不幸次年有諂諛之臣建言國家與契丹常有往来書彼有尊號中國獨無足為深恥於是羣臣復以非時上尊號論者甚為朝廷惜之昔漢文帝遺單于書以尺一牘單于答以尺二寸牘自稱天地所生日月所置匈奴大單于未聞文帝復為勝大之名以加之也學者至今稱文帝謙德之美未嘗以為可恥也此乃不識大體之言誠不足信耳今羣臣以故事上尊號臣愚以為陛下聰明睿智雖享有鴻名然踐阼未乆又在亮隂之中考之事體似未宜受陛下誠能斷以聖意推而不居既不允所請仍令更不得上表則頌歎之聲將洋溢四海此所謂一謙四益可以捨虚名而得實譽者也伏望陛下更加詳擇熈寧元年七月宰臣曽公亮等上表請上尊號光上此奏時為翰林學士手詔荅云覽卿来奏深諒忠誠朕方以頻日淫雨甲申地震天威彰著日虞傾禍實深憂懐被此鴻名有慙面目况在憂隂亦難當是盛典誠如卿言今已批降指揮可善為答辭使中外知朕至誠實乃内顧慙懼非是欺衆以邀虚名遂終不許上神宗乞深思災變之大勿受徽號韓維臣昨日伏覩中書劄子下禮院以四月一日拜表上尊號夫尊號者非起於治古而生於後世人君之侈心平居為之已累謙徳施於寅畏消復之日實於義理有害何則比年以来地震徧天下而河北尤為已甚自前史故老傳聞罕有若此之異加以冬無宿雪春無嘉雨寒暑晦明反理失節今兹河北地震尚未止流民尚未復畿甸諸道尚未有得雨處而都下風霾日夕發作乃欲以此時褒頌功徳崇上尊號臣竊以為非其時矣且陛下憂憫旱暵徧禱於天地廟社之司計其祝文必須引咎謝譴嘉應未答而遽舉推崇之禮雖陛下沖挹未必當之然而事理相反有異誠一恐不足以動天消變假使此事是聖意切所欲得猶當痛自損抑以答天戒况陛下兼皇帝而稱之尚何顧此數字之美乎伏望聖慈深思災變之大務以至誠為本亟出手詔推而勿受臣愚戇但知有益人君則為之不識忌諱惟陛下寛其言而取其意則天下幸甚熈寧二年宰臣富弼等表上尊號維上此奏詔答不允維時為龍圖閣直學士兼侍講四年六月宰臣王安石等七年七月宰臣韓維等十年七月宰臣吴充等皆上尊號詔答不允元豐三年七月遂降詔曰朕惟皇以道帝以徳王以業各因時制名用配其實何必加崇尊號以自飾哉秦漢以来尊天子曰皇帝其亦至矣朕承祖宗之休宅士民之上凡虚文繁禮悉已革去而近司羣辟猶或時以稱號見請雖出于歸美報上之忠然非朕所以若稽先王之意今後毎遇大禮罷禮部不得表上尊號宋名臣奏議巻二十五
