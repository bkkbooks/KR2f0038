body:
  text: 宋名臣奏議卷十宋趙汝愚編君道門慈孝下上英宗乞講奉養隆顯皇太后之禮傅堯俞臣竊惟皇太后有旨更不于內東門同聽朝政臣伏以皇太后佐佑先帝拔陛下於藩邸有不得已遂權同機務及清躬和豫舉神寶以歸之其始終恩德可勝道哉陛下天畀仁孝思所以報塞固無窮已雖然自去年以來淺見者妄意宫禁中事頗有浮議流於人間此睿聽所具悉者也今陛下於九重之內雖日極曽閔之志行以奉事皇太后天下安得遽聞臣謂宜順承顔色既致其悃愊又取奉養隆顯之禮可以使士民共知者速講而數為之自然聖孝之聲亟傳於四海如是則端拱無為長享天人之助矣至於給事皇太后之人向者既未得專力於陛下茍見皇太后復辟慮其智識鄙短未能測乾坤之量不免有所疑畏臣謂宜録其勤勞少推恩例上足以慰母后慈惠之意下足以安左右疑懼之心愚慮所及不敢不言惟陛下矜其狂愚而特加收採則不勝幸甚治平元年五月上時為殿中侍御史裏行上英宗論治身莫先於孝治國莫先於公司馬光臣伏覩皇太后手書已罷聽政陛下欽承慈旨獨斷萬幾臣聞易曰君子以作事謀始又曰正其始萬事理差之毫釐謬以千里陛下雖踐阼期年於國家大政猶多所謙抑雖時有處分皆常式小事非天下所以望於陛下者也嚮時外間議者皆曰陛下聖體未安倦於聽覽及知聖體已安又曰陛下上畏皇太后之嚴欲盡人子之禮避專命之嫌韜藴聰明未敢施設今皇太后舉國家大柄盡付之陛下則議者無復可咎唯拭目傾耳以瞻望聖政而已矣陛下當此之際治身治國舉措云為不可不謹昔楊朱見岐塗而泣謂其可以左可以右所差甚微所失甚大也人主即政之初亦榮辱安危之岐塗也臣故願陛下留聖心焉臣聞治身莫先於孝治國莫先於公孔子曰孝德之本也又曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮未有根絶而葉茂源涸而流長者也仁宗皇帝以四海大業授之陛下其恩德之大天地不足以為比今登遐之後骨肉至親獨有皇太后與公主數人陛下所當日夜盡心竭力供承撫養以副仁宗皇帝之意嚮者皇太后聽政之時左右侍衛之人不敢不恪求須之物無敢不備既委去政柄臣竊慮有無識小人隨勢傾移侍奉懈慢供給有闕則天下之責皆歸陛下此不可不留意朝夕省察者也又若有不逞之人於兩宫之間刺探動靜拾掇語言外如效忠內實求媚以相間鬭者臣願陛下逆拒其辭執付有司加之顯戮誅一人則羣邪自退納一言則百讒俱進此乃禍亂之機不可不深察也臣聞國事聽於君家事聽於親臣愚以為陛下在外朝之時刑賞黜陟之政當自以聖心決之至於禁庭之內取舍賜豫事無大小不若皆禀於皇太后而後行陛下與中宫勿有所專如此則內外之體正尊卑之序明慈母歡欣於上臣民頌詠於下矣不然皇太后歸政之後若侍衛之人稍有怠惰求須之物小失供擬加以讒邪妄興離間萬一有絲毫闕失流聞於外或皇太后憂思不樂內生疾疢則陛下何以勝此名於天下哉雖百善不能掩矣臣故曰治身莫先於孝也洪範於好惡偏黨之際六反言之重之至也周任曰為政者不賞私勞不罰私怨大學曰欲明明德於天下者必先正其心有所忿懥則不得其正有所好樂則不得其正陛下奮發宫邸入纂皇極爰自濳躍至於天飛舊恩宿怨豈能盡無然今日即政之初皆不可置於聖慮以害至正也凡人君之要道在於進賢退不肖賞善罰惡而已爵祿者天下之爵祿非以厚人君之所喜也刑罰者天下之刑罰非以快人君之所怒也是故古者爵人於朝與士共之刑人於市與衆棄之明不敢以已之私心蓋天下之公議也今以四海之廣百官之衆有賢有愚有善有惡比肩接迹雜遝並進臣願陛下少留聰明詳擇其間茍有才德髙茂合於人望者進之雖宿昔怨讎勿棄也有器識庸下無補于時者退之雖親昵姻婭勿取也有勵行立功為世所推者賞之雖意之所憎勿廢也有懷姦犯禁為衆所疾者罰之雖意之所愛勿赦也如此則野無遺賢朝無曠官為善者勸為惡者懼上下恱服朝廷大治百姓䝉福社稷永安不然陛下若專居深宫自暇自逸威福之柄盡委大臣取適目前不為逺慮賢愚不分善惡失實則所進者皆平生所親愛所退者皆平生所不快所賞者皆諂諛而無功所罰者皆忠諒而無罪如此則中外解體紀綱隳紊羣生失所天下可憂矣臣故曰治國莫先於公也此二者榮辱之大本安危之至要臣願陛下審思而力行之詩云亹亹文王令聞不已陛下誠能行此二者則盛德美譽滂沛洋溢近者傳誦逺者褒歎不過旬月之間遍於天下達於四夷後日之政如順風吹毛乘髙決水可以不勞而成功矣治平元年五月上時知諫院上慈聖皇后乞母子之間因心信相接司馬光臣竊見去嵗仁宗皇帝捐棄萬方皇帝嗣統之初憂哀成疾殿下念社稷之重同聽庶政以安羣情今聖體復初四方無事殿下推而不居自取安逸動靜之節無不合宜率土臣民孰不稱頌臣不自量度欲成殿下之全美猶以螢燭之微明仰裨日月之盛光伏惟殿下稍寬其罪而終聽其辭臣竊以治家之道貴賤雖殊人情一也嘗觀天下士民之家其長幼羣居長者或恩意不備衣食不豐幼者或容貌不恭語言不遜若幼者孝恭而不怨長者慈惠而不責則上下雍睦家道以興若幼者以為怨長者以為責則上下乖離家道以衰其始相失也甚微而終為禍也甚大又加以讒人間之於是乎有父子相疑兄弟相疾亂虐並興無所不至者矣凡閨門之內子婦有以孝恭之心至者則尊親當歡然以慈愛之心接之若其有過則當以忠厚之心教之教之備矣而猶不聽則雖責之可也罪之可也及其既改則又當復以歡心接之不可以一忤顔色而終身惡之遂不可解謝也故骨肉之間有威怒而無憎疾有詰責而無猜忌此自古聖人所以御其親之道也臣竊惟皇帝皇后於殿下兼內外之親幼䝉保育今日為萬民父母享天下富貴孰云非殿下之力臣謂殿下固宜撫存愛念情同所生周旋保護以終大惠不可偶以纎介之失遂蓄久長之怒棄生成之厚恩取疏絶之深怨愚智所同知也皇帝去歲得疾之時禮貌言辭誠有可疑得罪於殿下者臣固已嘗言於殿下云不可責有疾之人以無疾之禮也凡醉而有過醒猶可赦况有疾之人不自省知本非意之所欲為豈可追數以為罪咎邪皇后自童孺之嵗朝暮逰戲於殿下之懷分甘哺果拊循愛育有恩無威今既正位中宫得復奉膳羞盥帨以事殿下其意恃昔日之愛不自疏外猶以童孺之心望於殿下故或有所求須不時滿意則愠懟怨望不能盡如家人婦姑之禮殿下雖怒之責之固其宜也誰曰不可但事過之後殿下若遂棄之不復收恤憎疾如仇讐則臣以為過矣臣在闕門之外無由知禁廷之事竊聞道路之言未詳虛實皆言近日皇帝與皇后奉事殿下恭勤之禮甚加於往時而殿下遇之太嚴接之太簡或時進見殿下雖賜之坐如待疏客語言相接不過數句須叟之間已復遣去如此母子之恩如何得達婦姑之禮如何得施所以使之疑惑恐懼不敢自親者蓋以此也臣竊惟殿下母儀天下踰三十年柔明之譽洽于中外皇帝龍濳藩邸進德修業仁聖之望光于逺邇先帝以至公大義選賢建嗣海內之人皆謂繼統之日慈孝之風必自家刑國誠不意閭巷之民忽有今兹異論推其本原蓋由皇帝遇疾之時宫省之內必有讒邪之人造飾語言互相間諜一則欲詐效小忠以結殿下之知僥求祿位二則自知過失素多畏嗣君之嚴有所不容三則欲竊弄權柄惡長君聰明使已不得自恣是以日夜窺覘拾掇絲毫之失無不納於殿下之耳殿下雖至聰哲不能無疑雖至仁慈不能無怒皇帝以剛健之性屈於衆口無以自伸能不憤悒遂使兩宫之間介然相失久而不解流聞于外致朝野之士有敢竊議其是非者深可惜也今天誘其𠂻殿下濬發慈旨卓然逺覽舉天下之政歸之皇帝此乃宗廟之靈生民之福然臣竊料讒邪之人心如沸湯愈不自安力謀離間彼皆自營一身之私非為國家與殿下之計也臣願殿下深察其情勿復聽納斥逺其人勿置左右召諭皇帝以嚮來紛紛皆此屬所為自今以後母子之間當坦然無疑皇帝必涕泣拜伏感激摧謝然後兩宫之歡一皆如舊凡皇帝皇后進見之際殿下宜賜以溫顔留之從容來往無時勿加限絶或置酒語笑與之欣欣相待一如家人之禮如此則殿下坐享孝養何樂如之心平氣和眉壽無疆國家乂安內外無患名譽光美垂於無窮與夫信任讒慝猜防百端終日戚戚憂憤生疾國家不寧禍亂橫生譏謗之言流於後世二者得失相去逺矣且殿下既能以祖宗之業付皇帝又能以大政授之而獨於恩禮之際終不能豁然回心息怒其故何哉方今宫闈之中殿下骨肉至親止於皇帝皇后長公主及皇子公主數人而已其餘皆行路之人於殿下何有若親者尚不可結以恩信猜而逺之則疏者獨肯受殿下顧遇盡其死力終始無二乎夫貴莫貴於為天子之母富莫富於受四海之養今殿下有此富貴而不能自樂親其所可疏疏其所可親使受恩之子婦倣徨而不自安踧踖而不敢進雖內懷反哺之心而無以施展臣竊為殿下惜之臣父子皆䝉先帝大恩擢於常調之中置之侍從之列心非木石豈能暫忘今先帝晏駕之後臣惟不避死亡以進忠直之言庶幾殿下母子和恱國家安寧是臣所以為報效也不勝區區激切之誠展布以聞惟留神幸察治平元年五月上時知諫院上英宗乞因降逐任守忠詣皇太后閣陳謝司馬光臣伏見陛下嚮者即位之初奉事皇太后䖍恭欵至皇太后撫愛陛下恩渥周備數日之間慈孝之譽達於中外播於逺近聞者無不相慶自聖體不安旬月之間道路之人漸有異議皆云因任守忠等本不樂陛下為嗣故於皇太后之處則言陛下與中宫之短於陛下中宫之處則言皇太后之失遂使兩宫之心互相猜忌間隙一開猝難復合今陛下奮發英斷屏黜讒邪守忠等皆降逐出外中外之人不勝抃悅然臣愚竊恐皇太后尚未能盡知姦人之情與陛下所以斥去之意伏望陛下與中宫親詣皇太后閣頓首陳謝具述從來為守忠等所誤致屢有違忤皇太后之意今守忠等既去願與皇太后母子之恩一如舊日然後朝夕與中宫侍養左右膳羞藥餌躬親進獻承順顔色皆如臣庶之家母子婦姑之禮若左右之人尚有敢相離間者願陛下立行誅竄勿復有疑如此則讒慝黜逺內外雍睦善氣興行災沴消亡宗廟永安令聞長世若失此之際兩宫之歡不能復舊則恐長無可復之期豈惟當今天下之人以陛下為非將傳於史䇿取譏萬世矣此皆聖明所自知而臣復區區進言者欲陛下深更留意治平元年八月上時知諫院傅堯俞亦言臣伏見內侍任守忠以罪降黜中外聞者罔不欣抃罰一勸百固可以破姦猾之膽臣職司風憲失於彈劾聖度回怒幸赦而不誅猶敢有言者兾陛下重加矜察臣謂大姦之去其遺過餘惡方日有上聞小人無知或伺隙修怨枝詞蔓說往往寖及善良疑似之間不可不察陛下若更加論究則讒間且將復起况守忠據權之久附離者多深慮左右之人有所疑畏望陛下霈發德音自此一切不問則天德加厚而人心易安皇太后之慈仁布聞四海舉神器大寶傳付陛下而陛下挾堯舜之資以天下養將用誠孝以鼓舞萬物奈何使交鬭之語得行其間今罪人投竄皇太后必渙然疑釋陛下緣此當益加禮意務盡其歡心則天人交欣共為陛下之福臣言甚忠懇惟陛下留神省覽上哲宗繳進明道詔書范純仁明道二年五月癸酉詔曰莊獻皇太后夙承先顧保佑沖人一紀于兹恩勤備至凡號令之所出或聽斷之從宜日雖機務之繁並用祖宗之憲永惟慈訓居極孝思而上封之人罔識大體務為詆訐有怫聽聞其垂簾日除改及所行詔命不得輒有上言咨爾中外體朕意焉時上躬攬庶政而言者多譏斥垂簾日事惡其持情近薄故降是詔臣近曽録明道二年詔書進呈望陛下稽倣降詔以誡薄俗至今未䝉施行近聞有狂人傳播擬䇿自云嘗已進御又臺官章疏或已取用其說甚非陛下尊奉先太皇太后勤勞公正保佑聖躬之意此詔書不頒行薄俗恐難禁止臣今再録明道詔書繳連上進伏望聖慈遵本朝之舊典法仁祖之聖孝特降明詔以信萬方天下幸甚貼黃今妄為詆訐者已聞多矣陛下容之則妨聖孝懲之則恐不忍不若以詔禁約事得兩全伏望聖眀早降指揮紹聖元年四月上時為右僕射上欽宗論父子天性宜一於誠楊時臣竊惟父子之恩天性也無容私焉一於誠而已矣夫舜之登庸天下之士悅之人之所欲也而不足以解憂富人之所欲也富有天下而不足以解憂貴人之所欲也貴為天子而不足以解憂惟順父母為足以解憂夫豈外襲而取之哉心誠有之也其為法於天下可傳於後世本諸此而已孔子曰本立而道生此之謂也恭惟上皇付陛下以神器之重天下戴之如天就之如日可謂得所欲矣上皇東幸未還陛下寤寐念之憂形於色乾龍上壽亦罷而不講是雖貴為天子富有天下不足以解其憂也非陛下誠於中寧有是夫誠至矣雖天地鬼神猶將感格况於至親乎雖有姦凶造為浮言無自而入矣夫以陛下之恭孝上皇之慈仁其心一也父子之懿人無間言自斯以往讒慝自消矣若夫內藏猜慮外矜觀聽則釁自我作欲其無嫌不可得也疑隙一開窒之難矣不可不慮也若事干朝廷當付之公議而已三省者天下公議所自出也大臣宜任其責陛下亦不得而私焉一徇至公則天下幸甚靖康元年上時為右諫議大夫上欽宗乞迎奉上皇篤其孝心陳公輔臣恭聞道君太上皇帝聖駕將還臣不勝鼓舞欣躍之至此陛下孝誠所感而宗廟社稷之福天下之幸也然議者皆謂上皇左右有懷姦之臣離間陛下父子致有疑心臣切怪之竊惟太上皇帝臨御日久去冬緣金人舉兵深厭萬幾欲行遜禪陛下至誠篤孝感泣退避以至慈諭再三方即大寶此與唐睿宗因星變答天戒遂欲傳位太子惶懼入請其事類矣豈比明皇幸蜀肅宗自即位靈武哉是宜父子歡好之情雖數千百年不復有疑矣若乃陛下更改諸事進退大臣賞善罰惡興利除害皆以宗廟社稷為念合天下公議所以奉承上皇罪已之詔豈有異志邪縱使姦臣離間百端而上皇慈仁陛下孝愛二十餘年人無間言豈一旦能入之哉且父子天性上皇於陛下親邪於羣臣親邪臣謂上皇之親無親於陛下也臣恐臣僚未悉此意或因道路相傳之言致陛下於上皇自有所疑此大不可也况上皇聰明睿智寬厚豁達不防姦邪浸以疑惑今既自感悔斷然不疑以神器授之陛下方未遜位前已下哀痛之詔追悟宿愆盡革弊事雖禹湯罪已周公改過無以復加陛下今日所行皆奉行上皇去年十二月詔書也臣深恐前日所遣如趙野輩不能為陛下感激敷陳以解上皇之疑臣愚欲望更擇一二重臣前路迎候仍齎陛下親書為開具上皇罪已手詔與今日奉行之意使釋然無疑然後迎奉上皇備加禮數內自后妃諸王帝姬外至公卿百官士庶皆出國門使聖意知前日之去匆遽如彼今日之還光豔如此非陛下承付託之重敵兵逺遁京師復安政事修舉人心歡快能若是乎以此慰悅上皇之心方知此時為天子父尊之至也若夫還宫之後一切供奉之物陛下過為儉約上皇務加隆厚著於令式風示四方以勸天下之孝仍乞於宰執侍從臺諫中選有學術行義明忠孝大節者分日請見上皇以備顧問開諭聖意庶幾究性命之至理以適其優遊無事之樂顧不韙哉夫堯舜之道孝弟而已矣孝弟之至通于神明光于四海陛下貴為天子有父可尊此人間莫大之樂伏惟篤其孝心使誠意昭感無纎介自疑則天地神明保佑聖躬靡所不至臣將見陛下全萬年人子之孝而上皇享萬年天子之養國祚延長生靈䝉福自今以始豈有窮哉臣一介微臣不任言責妄意論及陛下父子之間死有餘責惟聖慈裁之不勝幸甚靖康元年三月上時為校書郎上欽宗乞迎奉上皇篤其孝心係第二狀陳公輔臣今月十六日延和殿引對不識忌諱妄有論奏已甘誅夷而陛下不以臣狂妄特賜聽覽更䝉聖慈擢為諫官令臣不候受告先次供職顧臣之愚何敢輒當此選臣已一面具狀辭免然臣以昨來所言有未盡者今輒敢冒死再為陛下陳之臣初謂上皇之怒得於道路傳聞未必的也故不敢深以為言及聞聖語乃知陛下實有此疑夫為人之子若果貽父之怒其可一日安乎宜陛下之所以憂也臣聞帝王之盛莫加於舜舜之言曰惟不順於父母如窮人無所歸故人悅之好色富貴皆不足以解憂唯順於父母然後可以解憂且以瞽瞍之頑而母嚚象傲為舜者亦難堪矣舜終能使瞽瞍底豫而天下化者以盡事親之道而已然則陛下以舜為非可乎况上皇以上聖之資有天下之大興事造業二十六年實聰眀睿智之主陛下茍能如舜之孝寧不足以感動其心而釋其怒哉臣願陛下用臣所言急遣重臣前路奉迎如李綱固可委矣更得一二人節次前去陛下感泣面諭使其上體聖心至誠委曲為陛下言之臣料上皇必無甚怒乃若所改之事如放宫人拆苑囿減玩好之具省應奉之物此自是陛下宫中所不用者若龍德宫别有所須且當許以一面旋行措置陛下若以奉親故薄有所費百姓知之亦豈敢以為非乎上皇久之視陛下自奉如此養親如此亦必自感悔不復過當矣至於其他改更政事但當遵依上皇去年十二月罪已詔書盡與推行亦可以慰四海之望更在宣諭臣僚行移文字回避語言免有指斥以防姦人得以藉口而激怒也臣又恭聞聖語謂皇后亦怒意欲先還禁中理㑹數事此一時躁忿之言陛下未有以解之耳婦人從夫豈有上皇既處龍德而皇后得居禁中邪若果先還臣固嘗面奏陛下當出郊奉迎和容遜辭以理開曉皇后若當此禮方欣慰不暇豈復有怒心哉若夫聖慮所疑恐上皇還宫左右姦邪去之未盡或尚有蠧國害民侵撓朝政於人情有不可從之事處之為難臣謂此不足憂大臣臺諫當任其責若陛下任用大臣得人臺諫稱職皆以公心直道持紀綱守法度上下內外無所不理雖陛下不可得而私况上皇乎若是則陛下不妨以孝而隆私恩德也金人侵犯而陛下威德兼隆宗社復安上皇既歸而陛下至誠篤孝父子無疑自古帝王盛德有加於此乎此臣所以為陛下喜也伏惟聖意勤勤始終如一當使四海生靈受福無疆豈不盛哉靖康元年三月上時為左司諫宋名臣奏議卷十
