body:
  text: 宋名臣奏議卷八十宋趙汝愚編儒學門貢舉上上仁宗乞革科舉之法令牧守監司舉士富弼臣伏以取士之道為國家之大務也三代兩漢専求行實是以風俗淳厚百職修舉隋唐之際純用文辭以篇賦相髙以聲譽相尚公卿將相於是乎出國朝㳂隋唐之制以進士取人祗採辭華不求行實雖間設制舉然大率亦以章句為務是以擇之彌謹而失之愈疏且以陛下臨御以來計之積二十年所得不減三千餘人其間確然為名公巨賢者無幾近日竊見朝廷欲選一二良吏而終未能得其故何哉蓋入仕之初但取空文不求實才實行之所致也今天下多事邊鄙未寧若不求人將何以濟求人之本唯科場最大科場之法行之已久盡革則駭衆不革則乏人臣欲今後科場考試以䇿論為先校度所放人數且取其半餘半詔天下諸州於境內搜訪土著之人自來為鄉黨所推或德行純􅊀或志節方徑或學識該敏或智略詳明或有才可以治民或知兵可以禦敵如此之類者仰逐州官吏同共察訪委實應得上項條目即具名聞奏仍以州郡大小限其人數令長吏以禮津遣年終集於都下朝廷再加較試量髙下擢用若舉薦不當明行降黜或所舉得人則優與酬賞昔漢尚書令左雄建明孝亷之法頒下郡國是時濟隂太守胡廣等十餘人皆坐謬舉黜免唯汝南陳蕃頴川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉東漢得人之盛唯此為最伏惟陛下勉而行之不數年當盡得天下實才實行之士萃於朝廷緩急應用百務俱理又何患乏人哉必若行此取士之數則不加而得人之實則多矣至於明經選試尤為無法乞今後不較字數専以經中否為格仍試時務䇿三道以定髙下每度所放人數祗取其半自然得人而不至冗矣慶歷元年上時為右正言知制誥上仁宗乞薦舉行實之士吕誨臣竊以科場自間嵗以來人數減半取之至艱來者愈濫其間實有才行遺者甚多先朝詔諸路津遣行實之士當時被薦雖有濫名者一二終是比之常調得人稍優若此科不廢誠有所勸臣欲乞詔天下郡守常切搜訪有學識通明履行清潔以名薦於監司委提刑轉運使司同共甄察實可取者津遣赴闕其䇿試且循舊式入官不必優異止賜出身可也如舉薦妄謬亦當重責行之若久得人必多矣嘉祐五年上時為殿中侍御史上仁宗乞舉孝亷及更立明經格式司馬光臣竊以取士之道當以德行為先其次經術其次政事其次藝能近世以來専尚文辭夫文辭者乃藝能之一端耳未足盡天下之士也國家雖設賢良方正等科其實皆取文辭而已近以祫享赦節文應天下士人有素隆節行兼通學術久為鄉里所推者委轉運使提㸃刑獄同加搜訪每路各三兩人仍與本處長吏連名結罪保舉聞奏所舉之人朝廷命本州津遣至則館於太學待遇甚厚考試之際不糊名謄録既而入等補官皆過所望此誠合先王取士之道臣謂國家將除積久之弊立太平之基天下士大夫皆靡然嚮風矣行之未幾忽聞朝廷一切罷之無不悵然失望臣誠戇愚不識所謂若以所舉之人多非實有材行則當治舉者之罪别加搜訪豈可以一二人謬濫廢天下之舉賢因溺而廢天下之舟因噎而廢天下之食也且人之毁譽或出愛憎雖復聖賢不能自免孔子曰衆好之必察焉衆惡之必察焉恐國家亦未可以此遙斷否臧遽行黜陟也就使其人平昔所行誠有虧缺古之或舉於魚鹽或舉於盜賊豈可不容其改行自新而終身棄之乎且人之行能迭有短長若不棄瑕録用而以一節廢之則失人多矣臣愚以為天子撫有四海必用舉者之言授之爵祿茍不嚴為禁約以防其私則請託欺罔無不至矣竊以孝者士之尊行亷者吏之首務故漢世舉士皆用孝亷行之最久得人為多臣欲乞應天下知州府軍監任內聽舉孝亷一人大藩聽舉二人轉運使提㸃刑獄任內聽舉三人並須到任及一年以上方得奏舉夫鄉舉里選雖為古法今之為吏者不得久於其任士之素行或不能盡知若本部無人可舉即聽舉别部之人素所知者以充其數其在京兩制以上聽嵗舉一人其舉狀逐時送下貢院置籍收掌每遇科場詔下即委貢院選擇其日以前舉主最多者取三十人申奏降指揮下本貫津遣赴闕若舉主數同即以發狀先後為次謂若俱有三人舉主則取第三狀日月在前者仍於進士奏名額內減三十人候到闕日陛下臨軒親試或委中書門下試經義一道時務䇿一道但以義理優長為上不取文辭華美若所對經義乖戾聖意及時務全不通曉並行黜落及第受官並與進士第一甲同在明經之人仍於告身前列坐舉主姓名其所舉之人若犯私罪情理重及正入巳贓未及第者舉主減三等已及第者減一等坐之並不以赦原其公罪及私罪情理輕者舉主不坐其未舉以前若曽犯罪除公案見在證驗明白外舉主亦不坐即因勢要屬請求舉及為人屬請并受屬請而舉之者並科違制之罪受贓者並以枉法論即津遣不至者更不就除官若纍經津遣不至即乞朝廷臨時裁度特加聘召不為定制又國家置明經一科少有應者及諸科所試大義有司不以定去留蓋由始者立格太髙致舉人合格者少臣欲乞今後明經所試墨義止問正文不問注疏其所試大義不以明經諸科但能具注疏本意講解稍詳者為通雖不失本意而講解踈略者為粗餘並為不通若能先具注疏本意次引諸家雜說更以已意裁定援據該贍義理髙逺雖文辭質直皆為優等與折二通若不能記注疏本意但以已見穿鑿不合正道雖文辭辨給亦降為不通其明經以六通諸科以四通以上為合格若合格人少即并取粗多者合格人多即減去通少者委試官臨時相度令合元額又舊制明經以周易尚書為小經今欲乞以周易尚書毛詩為一科三禮為一科春秋三傳為一科皆習孝經論語為貼經又說書一科議者多以為不當廢欲乞與明經並置但每次科場止取十人奏名在諸科額內試中授官並與諸科同若自以本科及第或出身者更不得就試說書如此則求賢之路廣請託之源絶浮僞之風息得人之頌興矣嘉祐六年八月上時知諌院上神宗論取士之弊宜有改更孫覺臣竊見朝廷設科以取天下之士而所謂進士明經者乃因隋唐五代之弊行之百有餘年其法愈密得人愈踈其間雖有勞烈之臣建造功業謀謨卓犖有紀於世必皆其人不因循於流俗能自奮拔於昧漏濁淖之中類非科試之方有以得之也臣以謂天下之生才非於古今偏有薄厚在上所以驅之耳今誠有道德之士經綸之彥不由科舉則無以進仕於朝廷是使天下之才皆汨沒於雕蟲篆刻之技棄置於章句括帖之學也古者少而學之壯而行之今也學非所以從仕仕無用其素學天下人才日少而士常不足於用其不自於此歟祖宗之時其法數變矣然一時議者亦多率其私意以傅合當世之宜故其法雖更而其弊猶在也臣竊計來年之春當下詔選士以陛下聰明睿智將大有為於時而取士之法不蚤有所更定則不足以盡天下之才不盡得天下之才則不足以新天下之化臣謹條取士之弊并所當改定者具列如後一文章之於國家固已末矣詩賦又文章之末歟今乃拘以聲勢之逆順音韻之上下配合綴緝甚於俳優之辭近嵗以來朝廷務以經術材識收攬天下之士有司往往隂考論䇿以定去留不専决於詩賦學者亦多治經好古修身謹行至於詩賦之業類不精於往時矣臣謂人情之所共廢者聖人不能强使之興今上下厭棄人人知其無用朝廷因而去之使天下學者學其所可用仕者用其所嘗學顧不美歟願下羣臣講求所當考試以代去詩賦之法一學究諸科多不通經義而猥以記誦為工記誦不能則或務為節抄至斷裂句讀錯謬文辭甚可閔笑仁宗患其如此始立明經科將以變學究諸科之習今西北諸州頗願習為明經矣然變法之初為法太密類非中材可以勉强往者嘗設說書一科亦多通經之士臣願更賜參酌明經新法稍依說書之制其逐州解發并登第人數並減諸科額以處之如此則人數不增於舊而學究諸科習通經術矣一國家所取天下之士専用進士明經數科然東南之進士西北之諸科則數略相埓至於被邊州郡或更十數嵗乃無一人見收取者雖由其業不精無以應有司之格然人情不能無望也取士之意務在得人而臣願朝廷别設科格或以邊臣保任若漢六郡良家専以取邊州材武䇿略之士所得人數即以逐州充進士明經學究之額一進士明經諸科舊各以三百人為額治平中更增五十員三嵗一取士凡六百五十人亦不為少然不足以盡得天下之士何也所以取之之途狹耳士茍可用亦何必進士明經哉臣願以治平新增五十人每遇下詔取士時許諸路轉運使提㸃刑獄知州通判薦文行殊異經術政事或有兵謀材略之人若往時之遺逸并許兩制侍從官不以內外各得推薦一人若二人類所薦之士别於試格足收五十人而止所舉非其人若巳仕而坐法者如律亦因以觀臣下薦賢之能一朝廷自慶歷以來詔天下立學郡縣往往有學舍官田房廊之利京師亦自析國子監之半以為太學太學諸生常數百人州學舍多亦或至百人學校之盛侔於漢唐矣然國家未有學校選士之法臣願詔天下州郡守臣到任一年以上得舉所學者才行尤異升之太學無其人則闕既至官為廩給更以日月詳觀而屢試之每嵗判國子監至直􅊰共薦十人朝廷更以䇿試然後推恩所得人數即以充進士之額其公卿大夫之子弟及舊在學生員即乞别定入學之法右臣所請改定取士凡五條皆博採羣言以為有補天下而便於舊格其後三條稍用保任薦舉法薦取材略文行之士以廣朝廷搜擇之路比之科場泛然收舉者利害不相侔矣然臣不敢具為科格伏望聖慈下兩制雜學士待制以上臺諌官三館祕閣臣寮博加論議必有良法可以行之有論議不同者聼為别狀朝廷取其最優者施行之熙寧元年六月上時為右正言上神宗乞設特舉之科分路考校取人范純仁臣近奉德音以朝廷不能均取四方之士慮有遺才令臣具合設科制及取人之法進呈臣智識淺踈不能畫逺大之䇿上副詔㫖輒以所見粗陳一二竊以自祖宗以來取人唯進士科為盛凡舉擇公卿近侍多取進士出身之人故天下之士竸務此科而進然進士舉業文賦唯閩蜀江浙之人所長至南省則與西北之人一處糊名通考故西北之人得進者少今若明行分别則必東南之人興難進之歎而寄貫巧僞者益多不若用臣前來所上貢舉之䇿先於天下郡縣各立學校養士之法仍擇明師以教之每科詔之下委州郡長吏及學官於進士明經中唯取土著之人先曽入州學各及三百日已上才行優於衆人者許用解額中人數三分之一特為薦送至南省謂之特舉之科南省只試策論經義仍各分路分考校逐路各與優立分數取人至御前亦依分數與放及第則諸路得人無不均一朝廷遂於貢舉優立五路之法又乞詔政府今後舉臺省館閣經筵職司並於明經進士或無出身人中數路參取但擇才行優長不必限以科第如此則四方賢士可以俱進矣更望聖慈詳酌施行熙寧二年上時知諌院上哲宗論選舉六事吕大臨臣竊惟右之長育人才者以士衆多為樂今之主選舉以士衆多為患古之以禮聘士常恐士之不至今之以法抑士常恐士之競進古今豈有異哉蓋未之思爾夫為國之要不越得人以治其事而已如為治必欲得人唯恐才之不足不患乎衆多也如治事皆任其責惟恐士之不至不憂乎競進也今也取人而用不問其可任何事任人以事不問其才之所堪如此而欲得人而事治未之有也今欲立士規以養德厲行更學制以量才進藝立貢法以取賢斂才立試法以試用養才立辟法以興能備用立舉法以覆實得人立考法以責任考功其事目之詳具于後士規州縣皆立學皆立士籍學官正録掌之凡士人不以僑寓土著已仕未仕已仕至升朝官未冠及年及七十者皆不籍并居學不居學應舉不應舉皆委自鄉郭鄰里博訪以姓名申州縣長吏再加審核無遺與學官參考行實無濫然後書于籍皆供本貫三代年齒其在學及應舉者皆供所習舉業巳任者供出身歷任除居學者自有學制外别立士規略如學規禁過條目其大過如兼為工商所遊非僻博賭鬬訟之類其小過如遊匪人非義干求之類皆禁之簿二道一道記善凡有善可記皆記之一道書過凡犯士規者皆書之委州縣學正於學外士人中推擇為衆所服者為外學正州城內量郡大小自二人至六人分坊總之自一人至三人分坊及鄉總之凡預籍者又月輪一人主書善記過謂之直月每月約日羣集于學釋菜于先聖退而食于堂直月以所記過之狀白于外學正外學正與衆評其可否而書之而告其人凡善行許衆採之告于直月直月審其實而記之有過則准許直月察之至㑹人悉告于學正過亦立罰如犯大過既書許其改過不願改及終不悛者去其籍不得與士齒不得服士衣冠先定士及庶人衣冠以别之朝廷考察德行皆質于此其學行素高為衆所推者别加尊禮不與衆同如出遊它所皆具所以遊之事告古者四民不雜處士所習皆有業今也農工商賈尚各有事惟士一職多容遊手罷惰之流士風淪喪人才不興皆原於此自祖宗以來州縣立學惟守令留意者僅能勸督應舉課業而已鄉里服士衣冠而與士大夫遊皆名為士而賢不肖混淆莫之能辨德學之進者既無以旌别無行之人又無忌憚欲望美風俗育人才難矣然比見所立學制多欲士人居學日久此極有害大抵為士者莫不有家仰事父母俯育妻子皆人之大倫養道安可有闕今必使捨此而居學先廢人之大倫縱博聞多識將安用之此失其本不可不革况古之至學亦不在乎朝夕羣聚課試誦讀然後為學蓋必立明師使時往請教有所矜式可矣今之議立士規所以防其失月書善惡所以進善改過非其人者不得與士齒所以清士流此為之兆矣兆足以行則潤澤之方更繫善治者措置如何耳學制凡學之制皆立大學小學小學課讀誦訓詁習少儀十年以上至于十九皆入小學二十以上擇業成者旬一試之十試中格者始得入大學方許應舉未中格者且居小學未得應舉大學分四科一曰德行二曰學術三曰文辭四曰政事德行之科居縣者縣之令佐與學官令衆推擇察得其實以其名薦于州其學行略道其故州之長吏與學官再加審察得其實以禮聘之縣令津遣赴州學州命學官館之數與議論以察其學識旬月而歸以簿籍其姓名俟科場州長吏及學官又參求可以應詔者貢于朝如居州學者惟學官薦之州長吏察之學術之科以多聞博識明義理辨節文考典故為業一曰明經經無多少自一經至於六經經為易詩書春秋禮樂如禮兼明三禮如樂雖無經亦參取六經所言而求之凡明經必兼治孝經論語孟子二曰習史究量歷代治體安危成敗及典故㳂革文辭之科皆習雜文為業如制誥章奏文檄書問碑銘詩賦之類如唐制政事皆務究知利害本末及措置之法如吏文條陳利害如法令修立條約不必文辭惟取措置議論優長為善已上惟德行一科皆從推擇禮聘外自學術文辭政事三科並依科場法許人應舉亦自逐縣官以格升之州學州學學官又選其能者籍之每有科場學官以其名聞于州州申轉運司轉運司選官考試如舊法額定中選人數貢于尚書禮部其課試髙下之法以所習之髙下多少為等凡學術文辭之科皆兼習史及文辭為上所兼習或史或文辭者次之止習三經者又次之止習二經者又次之止習一經或習史者又次之習文辭者次之習政事者為下明經者一經為一場試義三道習史者試䇿三道文辭者試雜文二場每場問目五道如兼習文辭政事止各試一場已上德行科比制舉學術文辭科比進士政事科比諸科古者四十始仕今則成童以上皆得應舉故人之子弟不務積學蓄德自稍有知已奔馳仕進之門又為學之序未嘗分别大小往往躐等以進羣應有司其藝稍中有司之格者十無二三使人才不成實原於此故今立學制分大小學之法自十九以下皆居小學二十以上其藝可升大學者方升之大學始得應舉則童子必能安業所習有序不致有違越之心庶幾成材可得而取又或以德進或以事舉或以言揚未嘗一科取之自漢唐之盛雖未能方古亦數路設科以收人才今専以進士一科取之其所試者止於經義䇿論而已及其中選則百官之事皆得而任之就其素學而論蓋欲明義理而習文辭也當官决事則所知義理莫知所以施為一有辭命則所習之文不足以應用謂之賢歟而不知其德之可任謂之能歟而不知其才之可使蓋所養非所求所求非所用養才取人之失無甚於此議更改科舉復用詩賦此特少濟有司考校之末無益朝廷育才用人之實若明立四科以籠人才則庶幾有得又古之仕者莫非上之人取之非下有求而後豫也故上有下賢之美士無失已之恥今一切使之投牒自進無以異於市井臣僕非所以養士之亷其本已喪則為士者輕為士者輕則雖有美才令德不足任也今欲悉命學官採擇然後州長吏召而試之少厲士風不為無補試法試法者凡初入仕人如初及第人奏薦未出官之類在京委開封府及府界提㸃司在外委監司郡守審察人才可當何等職事先令權攝管局或差委定奪公事以試其才滿嵗考定分為四等政迹可觀為上等職事粗舉為中等職事不廢為下等職事曠廢為劣等除劣等且令守選習學外餘皆保明其才委實可任何官申吏部吏部再審察人才如所保明即依所定等所任官差注所定等為名次高下所任官各分差注其第一任謂之試官於銜中帶試字任滿如前法監司郡守考定四等上等注優便官中等者注合入官下等者再試一任劣等者勒令守選習學凡守選習學者皆滿二年方令再試一年雖係上等遷一資中等不遷改優便官下等如故劣等降一資祿官亦合守選不給俸錢次任依此考定優劣遷降辟法辟法者官長皆許辟屬官一員以自助內則尚書侍郎卿監尚書侍郎許辟郎中員外卿監許辟丞簿各二員外則帥臣監司郡守帥臣監司各舉二員郡守舉職官或曹官一員各辟所知所辟者去官則從而罷所辟非其人許御史録奏學官同此舉法舉法者內則諫官御史郎中祕書博士外則監司郡守縣令學官監局皆得舉授內官及監司許待制以上舉郡守許監司及待制以上舉縣令許監司郡守舉外學官許監司及兩省官御史郎中司業待制以上舉外監局許監司舉係課利及萬者凡內官及監司郡守學官皆云舉者籍其名有闕則擇而用之縣令及監局許監司指名指闕奏舉政迹在優劣等者舉主皆有賞罰考法考法者先立所涖職事主意所在以為責任之詞如守令則曰政平訟理民足士勸恤困窮止姦盜辦賦役之類如監司則曰察舉愆違而不入苛細長財足用而不涉掊克薦滯才舉廢事申無告去積弊之類獄官則曰必得情無久繫寃者得伸有罪者不可茍免學官則曰長育人才必有成就激厲風俗無使偷薄如此類例修立百官殿最之目而有司條格略立大法餘皆聼其自為嵗終一考則定其殿最而升黜之雖無顯過但不如所責者皆在所黜凡授官者如自度不足以當責任許自陳改授它官此四法於選官庶幾盡知蓋試法之立足以區别能否不致多容濫進辟法之立使官長自擇僚佐足以深任其責舉法之立使在上者多知人才緩急之用不患乏人考法之立使非才者不敢幸進無功者不可茍容仕路之清無越於是今之入仕亦有試法止於經義斷案而已所試經義方欲酬對有司非能究達義理固未適於實用如律義斷案但可粗施於法官然亦泥文執法不可常行不若實試以事自見其才舊格惟帥臣監司及朝廷専使許辟一二屬官而已近制復亦罷去大抵關防朋比私謁之敝然自漢唐以來僚屬皆官長辟除所以深責治效雖不能無請求私徇之意茍朝廷責任之嚴人人欲得寮吏以為已助亦安肯多取不才之人如果得其人雖舉子夫復何恤此法不行止可革其小害而失其大利非計之得也非其人既立彈奏之法又孰敢以非才充選乎竊見朝廷每有除授常患乏才此蓋未常素求人物以􅊀一旦之用緩急之際選擇不審則授任失當殊非用人之法莫若立法使各舉所知而籍之又命執政大臣及吏部更審訪其才應與不應所舉一官有闕擇而用之以其人之殿最為舉者之賞罰則濫進者寡矣今之選曹所患者員多闕少按其治行則舉職者寡而不職者衆此乃全無考法責任不精之所致夫樂貴而惡賤樂富而惡貧人之情也如使居髙位者責重居下位者責輕則才薄之人必不敢冀其髙位矣有祿者有責無祿者無責則無才之人亦不敢徼幸於寵祿矣無它責之以實之效也元祐元年上時為太學博士宋名臣奏議卷八十
