body:
  text: 宋名臣奏議卷一百五十宋趙汝愚編總議門總議六上哲宗七事李常一曰崇廉恥臣聞子貢問何如斯可謂之士矣孔子曰行已有恥孟子曰人不可以無恥無恥之恥無恥矣而管子亦曰禮義廉恥是謂四維古之聖賢所以崇尚廉恥如此其切而後世或置而不察良可駭也昔董仲舒當漢武之時歎廉恥貿亂賢不肖混淆蓋廉恥不崇於世則名分不足以塞覬覦賞罰不足以正功罪公議不行人才日壞欲相與隆政治何可得也臣伏見熙寧巳還急於事功易於揀拔超越倫等罕循資格謀利者計息以均賞讞獄者巧詆以拜官矯誣傾奪肆不顧忌今雖窒其所以致之之源而流風餘焰尚有存者士不修巳而以干進為事不務率職而以請託為先每詔下薦士則自媒者盈卿士之門屬託者交車馬於道違公議者莫愧乖物理者不懲以得為心寧復愧畏此風寖長為弊甚大臣愚欲望聖慈深詔有司訓以治體簡求忠實亷退之士進之官師以厚薄俗其不懲艾仍委御史臺彈劾則人知修方而賢不肖别矣賢不肖别於朝則愚夫陋俗亦知化矣二曰存鄉舉臣聞周之取士也其書曰使民興賢出使長之使民興能入使治之未聞以文章選賢也後世法敝衆弊紛起下之人不復以誠事其上而上之人何復誠信而聽之哉此鄉舉所以終廢而試藝之法不可革也今天下三嵗一考士初試於其鄉州再試於京師而官之曾莫原其修之於家行之於其鄉黨朋友者何如也士知不考其素而唯文章之工寧復有自重自修之志哉設有自重自修之士資質粹美問學深博其忠足以事君其才足以治民而不幸不工於文章則終身不得齒仕版立朝廷矣豈不可為之長太息也今有徑寸之璧棄置而不貢之朝莫不為之恨自重自修之士不貴於珠玉哉此臣所以為朝廷惜也臣愚欲乞詔天下州郡當貢士之嵗許於解額內弗試而貢一人擇鄉黨孝弟忠信通博之士俾其間閭里之善士以告守令守令伺察而告之監司監司核實果否而上之禮部萃而察之考其所學等差而上之朝廷朝廷隨其等差參諸貢士而官之仍命有司立為條約無則闕之有其人而不貢則治之舉非其人則坐之如此在天下之士各知修方以行已則以文章選士之弊有時而衰矣三曰别守宰臣伏以四海九州之大生齒之夥朝廷不得家治而人教之也為之衆建州縣張設官吏約以詔條使人循理而趨善安土而樂生雖然朝夕與民相親而易致感者莫如縣令郡守次之監司又次之今吏部之格雖曰以舉官為縣令舉官為縣令者僅得其半而積考多者亦得為縣令然則未必真可以為縣令者也縣令雖以舉官而為知縣所舉者亦未必真善治民者也以未必真善治民者積三四任而為知州其才亦未必真能為州者也如此而欲望州縣皆治何可得也蓋其才不可以為縣令者常為掾丞可也不可以為知州者常為佐二可也臣愚欲乞别異守宰與掾丞佐二為二塗使才不可為守宰者終身為掾丞佐二才可以長民化下者雖久為守宰可也然後於守宰以擇監司或進為朝廷之官如此則才否分而人品别矣今誠能於州掾縣佐選其人可為縣令者授之中下之縣縣治矣授之上縣上縣又治矣授之以難治之縣難治之縣至一再皆治也擢之為知州初則授之以中下之州中下之州既治矣使劇州劇州又治矣而其人不可為監司為省府卿士以備選擢者未之有也若才不可以為縣也雖積嵗益久而寡過也不害其進官而為幕職州佐也夫才不可長民而為幕職州佐以終其身蓋亦幸矣夫何恨哉四曰廢贓貪臣聞為國家者擇士而官之非以幸其身為民而圖治也制祿而頒之非以厚其家代耕而飬廉也今稅民之粟帛損邦之貨泉隨其爵位而祿之矣貪汚之士以賕抵罪者嵗不可勝數非獨為士者上負邦家亦朝廷法制有以召致之然也今吏部四選附籍者幾三萬員而在選者常以數千員賢愚弗别亷汚雜處客食旅館或逾年而得一闕更兩嵗而及其期官冗員多莫如今日臣愚竊以謂仕於朝而食人祿矣公私過咎或不得免而肆然犯法以贓獲罪其迹顯著尚足矜耶而使之因緣赦宥積纍期限而叙復之何也欲望詔有司凡以正贓抵罪者一切廢置示弗復用其或才能卓異不幸絓誤也命卿士以名上之付有司以議之或有可收也降等而官之終弗變也卿士同其罪則官澄而冗革矣五曰謹疑獄臣聞易曰君子以明慎用刑而不留獄書曰與其殺不辜寧失不經夫以天下之大四海之廣獄訟至繁官吏至衆蓋獄訟繁則不得無可疑可愍之情官吏衆則不必皆明習法律之士前日愆雨之初臣不避誅戮嘗陳所以致旱之因矣我朝纍聖臨御欽慎庶獄上遵先王之戒方州之請多原情而䝉貸矣夫以先王之聖智猶曰寧失不經今方州所請將事深文而務殺之耶設或不然又因以罪其官吏官吏畏罪則取可疑可愍者遷情就法而殺之矣安事上請而取咎悔也哉况夫官吏之愚難以遍曉而務在免過希合臣愚伏望朝廷以前日所降詔㫖特加修明廣示海宇俾可疑可愍之獄皆如平日以其實情上請付有司議之或失於妄請也亦如昔日特放其罪如此則疑情愍獄皆得以上聞而好生之德周四海矣六曰擇儒帥臣聞用師之所先財用積器械利城壘堅士卒練將帥擇五者具勝敵之能事舉矣先帝憂勤積嵗以儲兵備今粗㑹常平等積錢餘五萬貫穀帛匹斛亦復稱是財用不謂不積矣熙寧以來萃羽毛齒革之材講犀利之要巧者奏工殆餘十年械器不謂不利矣增城築堡擇當要處守禦之方無不詳盡城壁不謂不堅矣行陳坐作引弓蹶弩擊刺之法靡不講究士卒不謂不練矣虎貔之勇有功必賞賜官授節超逾倫等將帥不謂不擇矣雖然吳子曰凡人論將常觀於勇勇之為將萬分之一蓋言以勇擇將未盡其要勇敢之將迎敵以取勝可也若其制列城専一道撫百萬之衆馭暴武之佐失所能任孫子曰將者智信仁勇嚴也以是言之非通儒學士知國體者不足與知此臣不敢逺陳古事在仁祖時蓋非范仲淹韓琦龎籍之徒不用也然今日所當擇者臣竊兾朝廷加慮而深思也七曰修役法臣聞古者用民之力嵗不過三日而使之以時人不告病後世則不然極人力而疲之莫之愍也昔者疲民之力莫甚於差役差役之甚至有破民家産賣及妻孥以濵死者熙寧元豐之間以差役為病民也使一切輸錢於縣官官為賦閒民而役之方是時朝廷改法則意在息民議法之臣以寬剩為事平民輸之嵗覺不逮復思差科之為幸也今者既詔有司講明差法前日所謂破家産之敝悉巳鐫除而是非猶興議論未一皆以謂上戶特幸中戶役併上戶特幸則求所以抑兼并而均民力中戶役併則其為病有過於輸錢臣愚以謂法無新陳便民者良法也論無彼巳可久者確論也欲望朝廷命有司考二法之至要而裁取之參公論之可行而修定之使人便而久行百世無敝豈不善哉下此役法於四方而付其書於戶部以臣之愚見其必可久也欲乞再承詔㫖許自邦畿以及諸路先召畿令因版籍即新書而裁損之次召近畿數路監司如畿縣之法自近以逮逺因可以革非不踰嵗而天下之役書全矣夫為法之大及物之衆休戚所係治忽隨之為國家者可不慎哉臣所以輒敢冒鈇鉞之誅而不能終默也元祐元年上時為戶部尚書上哲宗論天下大勢可畏者五賈易臣竊以天下大勢可畏者有五而旱乾水溢日星謫見無所與焉一曰上下相䝉而毁譽不以其真二曰政事茍且而官人不任其責三曰經費不充而生財不得其道四曰人才廢缺而教飬不以其方五曰刑賞失中而人心不知所向夫毁譽不以其真則主聽惑主聽惑則邪正無别君子之道日消小人之黨日進政化陵遲亂之所由生也言上下相䝉則是人主聰明壅蔽下情不上逹之謂也可不畏乎夫官人不任其責則萬事隳廢彛倫攸斁惡吏市姦而自得良民受弊而無告愁歎不平之氣充溢乎宇內以干隂陽之和災異所從而起也言政事茍且則是無復有治道而姦吏蠧賊靡所不至也可不畏乎夫生財不得其道則公私困弊衣食之源日蹙用之於無事之時然且有患矣不幸倉卒多事則必狼狽窮迫而禍敗至矣言經費不充則是一切用度皆匱乏而斂散屈伸無及時預備之計人情易搖而根夲有微弱之虞也可不畏乎夫教飬不以其方則士氣浸弱士氣浸弱則節義凋喪偷合茍容之俗滋長背公忘君之風益扇將誰與立太平之基而乂寧王國者哉言人才廢缺則是士君子無賢智可用之實而愚不肖充牣於朝天下所從而否也可不畏乎夫人心不知所向則以非為是以黑為白更相賊害爵之以髙位而不加貴僇之以顯罰而不加懼人君之利勢無以鼓動四方徼利茍免之姦冒貨犯義之俗何所不有言刑罰失中則是人無所措手足姦宄由是而莫禁可不畏乎臣獨恨二聖焦勞念治而天下之勢乃如此之弊任事者不以為憂是猶寢於積薪之上火未及然而自以為安也然則興廢補弊救溢扶衰豈無策乎欲知毁譽真僞之情則莫若明四目逹四聰使下無壅蔽之患讜言直論日至乎前而讒說殄行無以遁其情則賢佞邪正皎如白日中心湛然如止水如定鑒孰敢欺蔽以售其僞耶書曰知人則哲能官人能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬此之謂也欲官人皆任其責而政事修明則莫若詢事考言循名責實故四郊不治則責郡邑之臣以其無敦夲務農之效五品不遜則責師帥之官以其無承流宣化之績夷狄畔渙則責之邉帥獄訟煩苛則責之士師盜賊多有則責之警尉羣司百官因任而責實黜幽而陟明著以一定之制則賢能者樂運其才而疲懦不肖者不敢貪位而尸祿詩曰無競維人四方其訓之不顯維德百辟其刑之此之謂也欲生財不逆其道則莫若敦夲業賤末作崇儉約廢奢侈使四方之民各守其業不見異物而遷講明先王制國用量入為出之法行之天下將使公私富足而九年之食不匱大學曰生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣此之謂也欲教飬人才必以其方則莫若闢四門以廣詳延之路縻好爵以厲廉遜之節明詔公卿大臣使各舉其所知召對延問以觀其能否善者隨宜而用之不善者一切報罷然則巖穴無幽隱之賢朝廷多譽髦之彥矣書曰九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝此之謂也欲人心皆知向正則莫若賞以勸善罰以懲惡不以親踈貴賤為之重輕與天下為畫一故為善於家者必賞於朝為不善於幽暗者被罰於顯明所以風動四方而信於天下也如此故民志一定而放僻邪侈之行不作書曰德明惟明德威惟畏此之謂也舉是數者一以至誠惻怛力行而無倦則太平極治之功何為而不成何求而不獲元祐六年七月上時為侍御史上哲宗論政事之要五梁燾臣聞天之愛飬生靈必命仁聖之君以為之主而又生賢人君子於四方以為人主之用使君倡臣和共修善政以代天理物而成太平之功故人君立政必求其賢人君子布列左右前後以為輔佐所以副天之愛飬生靈之意也恭惟皇帝陛下以仁聖之資荷天授命太母以至公至正恭敬節儉保護清躬九年成德今陛下至明獨斷中外歸心太母可謂有社稷大功而恩及四海矣陛下方當攬政之初正是求賢之日當舉政事之要隨事以任人才各用其所長則上下交修治道成矣是能敬天受命副天愛飬生靈之意也臣竊惟今日政事之要凡有五事一曰人材不純二曰命令不堅三曰朋黨交通四曰百姓窮困五曰夷狄驕橫此五者為敝巳甚須廣求賢人君子各隨其材之所長而用之講求長策以去此五弊陛下必欲人材純一莫若明辨君子小人可用君子而使小人不可用小人而使君子也中正不倚正直公忠者此君子也姦邪阿附蔽賢營私者此小人也既知其為君子則必崇用而信任之既知其為小人則必消退而踈逺之信任之謂當用於要近常令在內也踈逺之謂當隨才領事常令在外也又當求賢人君子於四方則天下之賢才皆得而為用矣書曰立賢無方謂不専用一方之士又曰任賢勿二去邪勿疑謂進君子退小人在果斷而不惑也陛下必欲命令堅明莫若謹於更張審於施設無以淺事輒廢逺慮無以辨言輕動成法蓋條法頻改則人情惑而不安命令二三則主威玩而不重凡造令立事必先謀於大臣使之講究雖大臣以為是未可行也又示於近臣使之參考雖近臣以為是亦未可行也又行於百官使之合議須羣臣皆以為是議論詳熟曲盡人情而不疑也然後可以行之一定而不可復變必使中外上下謹守敬信如日星之燦然可仰也書曰欽乃攸司慎乃出令令出惟行弗惟反謂作命所以示信於天下必謹之於初既行而不可改也又曰慮善以動動惟厥時謂不善不時者不可輕舉也陛下必欲無朋黨交通之患莫若判别邪正辨察真僞無惑先入之說必取衆多之議則事合公當不牽於所愛必察偏私之情則真僞自明常使君子在內小人在外則朋黨自消交通之歡自無矣易之泰卦曰君子道長小人道消謂君子進小人退則邪正分而泰道成矣泰者天下安治之謂也詩曰雨雪瀌瀌見晛曰消雨雪隂也比小人晛陽也比君子謂用君子則小人自消也陛下必欲百姓無困窮之憂莫若賦斂寬平徭役輕簡豐稔和平則安飬富庶之使常有餘力凶荒勞敝則救恤休息之使不至失所臣下有寬百姓之請者擇而行之臣下有掊斂百姓之說者一切罷之郡縣之吏别立舉法以隔私恩如知州通判知縣縣令皆用公舉而不得以恩例為請則多得實材可以分憂矣書曰德惟善政政在飬民又曰能官人安民則惠黎民懷之謂政事必於愛民官得人則善政行民悅而歸心矣陛下必欲夷狄賔順莫若修文德而立威制願面詔大臣精選忠實明信之士付以帥權勿用怯懦輕詐之人終誤邉事保守封疆寸土不可棄之愛飬生靈一民不可失之如其恭順聽命可行恩信如此則文德明矣如其傲慢叛命必用誅伐如此則威制立矣不可屈從俯就損德失威飬成他日之患為朝廷憂也傳曰懷逺以德立德以威謂禦夷狄者必使畏威而懷德也恩威並行則可以制夷狄矣欲救此五者之弊在陛下信任左右大臣謹擇侍從要近公選諫官御史也大臣者陛下同體之臣也必須精察而揀擇之無牽恩私之情以絶僥幸僥幸進則悮國事既悮國事必有後悔及其悔也亦巳晚矣不若謹之於初也無惑左右之說以消讒間讒間進則蔽惑聰明忠直踈逺輔佐失道必有後憂及其憂也亦已晚矣不若謹之於初也大臣之間而宰相尤為之重故宰相重則朝廷重宰相輕則朝廷輕是宰相之任用人得失繫國家重輕社稷安危也而進退之際可不重乎可不謹乎願陛下照之以至明斷之以至公勿為輕聽勿為快意如此則忠賢得用左右得人矣既知其為賢人也無移臣下愛憎之言而或疑之又加信任使之盡忠謀國修輔上德則百官皆得其賢萬事皆得其當天下可以安靜陛下可以無憂也如用失其人則天下未得安靜陛下未能無憂也此而一有失得在今日所繫尤重當陛下用人之初是四方觀政之日不可不謹也侍從要近者陛下左右獻納之臣也得賢人而在位則朝政闕失得以聞人材邪正得以知緩急於其間選用輔佐之任易為得人矣諫官御史者陛下耳目之官也尤須審任而親信之此而得人則所聞皆得其公所行皆得其當不得其人則所聞皆得其私所行皆得其偏如所任得賢正之人則陛下視聽聰明矣可以分别君子小人可以辨定是非曲直可使消除朋黨交通如所任失於姦邪之人則為權臣耳目上蔽陛下聰明顛倒是非淆亂黑白以君子為小人以小人為君子使君子不得進小人日益多如此則朋黨交通之私勝矣此官最為清要此地最當擇人陛下聰明洞逹物情不可不察也臣愚不佞竊嘗留意於賢人君子思有以助陛下今日求賢之意謹以其所知及采於公論有可以為近臣者有可以為言臣者各以其材之所長條具别奏願陛下擇而任之時以名字出於清衷自用三兩人以聳動羣臣耳目使朋黨沮喪失計忠良喜樂盡忠陛下今日欲求輔佐聖德正須用此等人也望聖心斷然必用之以合天下公議則朝廷之福宗社之慶中外之幸也臣子區區報國之心惟陛下財赦而垂聽焉貼黃臣自塵侍從以至擢居近輔竊觀陛下有仁聖之資望陛下行仁聖之事願陛下成仁聖之功天下之大一力不能獨治自古聖帝明王必須臣下共成洪業伏望陛下用此羣賢早成大功以慰臣民之望貼黃臣願聖明聽政之暇熟賜省鑒記其可用之人姓名或面賜宣諭或御批超擢進用或臣下有以愛憎之情妄進讒說望聖意無惑力賜主張而必用之姦邪之計自不行使忠良慶㑹激勵報君之心臣之此言誠欲上助英斷總正權綱伏乞深留宸念元祐八年上時為尚書右丞相上欽宗條畫利害余應求臣昨嘗面奏有治道之得失時政之因革及條畫當今利害文字伏䝉聖慈令臣繳進臣巳進入訖然臣區區之意所謂治道得失時政因革者如盡復祖宗法度兼用元豐元祐之政伏覩陛下巳降詔㫖矣條畫利害如追贈司馬光等內侍依祖宗法罷廉訪使者廢苑囿以賜貧民等事陛下巳施行矣至於前日所條畫有未盡者又不敢隱默陛下虛懷聽納篤於求言如此若畏避嫌疑有所懷而不盡臣之罪也謹具條畫如後一近者太上皇帝東遊逺涉江淮冒犯風露非所以保安聖躬欲乞遣使奉迎歸京深居宸嚴陛下日奉四海之養優游逸樂永保盛福一近年以來凡有中㫖皆降御筆施行稍似稽遲置以不恭之罪百司執事奉行不暇雖或違戾法憲不敢執奏又人臣啓擬有法所不可者取御筆行之尤為非便欲乞自今陛下意所欲行者臨朝與大臣議之毋降宸翰非唯有司可以審覆違戾庶幾權歸於上杜多門之政絶近習私謁僥幸之原一古者文敝救之以質近來文敝劇矣欲乞純法太祖之道尚質厚從簡易捐侈靡去煩苛以厲風俗一古者國有建立更革必集羣議以從衆者為髙自王安石行新法詆異巳者為流俗士大夫議論雷同無所可否六十年近嵗尤甚凡有所為獨建議者謀之不復以利害可否詢於衆庶欲乞自今軍國之事博延羣臣謀之廣廷以盡下情取衆所謂可者而行之庶無敗事一近來宰執並不見賔客所得進者門下親狎故人阿諛茍媚以事干請是以人材之能否生民之休戚國家之安危邉鄙之利害政事之得失恬不聞知欲乞令宰執許於私第見客庶可廣詢世務一君臣之間欲上下交而情通人臣獻言尤所難者陛下既巳虛心屈巳以來天下之言欲乞每遇退朝後開延賢士賜坐從容使陳治亂安危之夲古今興亡成敗之要及令百司無問大小各以夲職言事親加省覽以進忠讜一春秋書災異而不書祥瑞所以示後世人君知警懼也然以臣觀之天下和平民物安樂年穀屢豐乃為上瑞彼雲物鬼神之祥禽獸草木之異吉凶未定也近年四方水旱盜賊不以聞而表賀祥瑞曽無虛月欲乞自今應有水旱盜賊災異毋得隱諱其祥瑞之事一切禁止一祖宗官制簡而易行流品有叙自改官制以來紊亂重復今日尤甚欲乞內外文武內侍伎術等官並依祖宗舊制或謂行之既久未易輕改則乞減省中都職事釐務及州縣冗員以省邦用一近嵗名器輕紊以恩幸除大學士者六七人開府使相者十餘人節度使以上無慮數員若承宣觀察防禦團練遙刺之類奴𨽻皆得為之欲乞例行追降一西清官及三等職名所以賞勞用賢近來公卿戚里子弟及朋附權幸與夫以財利辦職者起躐華要乞盡行降黜今後凡有功於國有勞於民其人之賢允衆議者問除一二以為勸激一諸路監司員數尚多無益於事祗增煩擾乞憲漕之外有可減者併之如茶鹽常平自合漕司兼領一燕雲之役道塗之人皆知其不可而邉臣喜功不恤國事唱為此謀以誤朝廷罪不可貸欲乞凡建議燕雲及後來以燕雲推賞者並行追奪以慰人望一伏覩祖宗肇造區夏佐命功臣封以王爵可也近世褒寵大臣假以王號尤紊憲章欲乞降為國公一戚里後宫之家公卿貴游子弟以恩幸進及士大夫交結中貴列職朝著者尚多欲乞澄汰以清班列一近嵗御前應奉有勞上書文理可采及特赴殿試之人皆一時權幸干請欲乞追奪或勒令致仕不理官品一天下錢糧祖宗時盡總之三司使自改官制以來錢穀散漫不盡屬戶部久矣近世中人總領名色尤不一欲乞令天下錢糧盡歸戶部一軍政久壞邉備不修將帥不遴選兵卒不訓練欲乞以老臣知軍務者為樞使以祖宗之法修軍政復邉備訓練士卒遴選將帥置之京師以待一旦之用一自陛下臨御以來雖降霈恩然民間未受實惠而召兵四方不無煩擾伏乞應民間夏秋二稅只納本色其餘無名科率盡皆放免和預買並乞先次支錢今年以前倚閣賦稅不許監司再行催納諸州上供亦乞參酌近年中數特加減損一茶鹽法雖罷立額減鈔錢然民間猶未便也欲乞講畫取利民便國者行之一常平法行之既久散多納少其法寖壞今若收之則詭名挾戶有籍無人不過監保正長地分人均納民間重困欲乞自今年以前應未納常平錢穀並可放免今後只以見在錢穀願請者給之不須比較年例更行賞罰一免役法雖為便民然所募皆游手姦猾既給雇直又復受賕而保正長等又復有等第者為之則是既出雇錢又不免差役矣兼衙校之類多是借産業抵當率不過數百緍而差押官物或多至萬緍失陷侵盜家業不足以償欲乞參酌祖宗法制重行修立一市易抵當與民爭利所得不償所費失體尤甚欲乞減罷一近年以來賜第之家相望於京師欲乞非國戚主第者並行抅收雖係國戚主第而奢侈過制者改賜小第仍徹去之一臣寮之家所得御筆詔札例皆建閣僥覬恩澤欲乞並令繳納朝廷其閣毁拆今後不得輒有陳請一近嵗公卿大夫下至庶寮玩於安逸専事游燕家置聲樂沉湎無度內則荒亂心術外則隳廢職事尤壞名義陛下既以聖德化之羣臣自當革心欲乞更加訓諭其或不悛重行竄棄一士大夫名節不立行義不修専務奔馳投獻自媒欲乞選擇端靖有守之士置之列位及招山林遺逸以為臺諫一儒生問學不根本原専尚浮華互相蹈襲欲乞復祖宗制科取士及兼用先儒傳注義理之學當以人心所自得者形之於文不可斷以一說以誤後進王安石今之臣子豈宜列位於先聖之次乞降從諸儒之列一緇黃之徒不耕不蠶耗蠧衣食員數寖廣常住田産富於農民飲食服用侈埒王侯甚者招姦利無行業欲乞省併寺觀十存二三並作十方不得甲乙住持無敕額者並行拆去常住田産存留一半其餘納官召人租佃留為飬兵之費逐年課試及恩澤撥放出賣度牒並行停罷戚里後宫及大臣之家並不得置墳寺只以人戶守冢復其冢如古之制減僧道等員其强壯者任便歸民庶幾生齒寖繁戶口日衆以副務農重本之意右件如前臣區區之意欲言者久矣厥路無由伏遇陛下英斷聰明虛懷聽納故敢忘其固陋輒自罄竭欲望采擇其中者誠以守之斷以行之庶幾朞月之間可見太平冒犯天威罪當萬死靖康元年上時為校書郎上欽宗條畫十二事陳公輔臣近者兩䝉聖恩召對親奉玉音事平之後當急於圖治此實天下幸甚臣不勝踊躍抃蹈之至臣聞之聖人不先時而起不後時而縮凡興事造業扶危救衰要當勇於力行敏則有功烏可以後時哉伏自陛下臨御以來天下延頸舉首伺望新政遲遲未聞民惑固矣况今宗廟垂休神祗降福陛下聖德所感强兵宿將皆願盡力軍聲大振敵氣巳奪欲和與和欲戰必克事之可平在旦暮矣然則陛下圖治之計宜早定睿謨以慰天下之望不可緩也臣自念平昔有致君澤民之志有犯顔逆耳之言無路而不得進今幸遭遇陛下慨然願治容受直辭乃臣自效之秋臣不避萬死條畫十二事皆今日治所宜先者預以奏聞伏乞聖慈貸臣狂愚少賜睿覽謹具列其目一曰審因革臣聞聖主立法不矜於同而矜於治故可則因否則革未嘗拘於一而不知變也國家祖宗之法善矣至治平而稍弊故神宗皇帝革而新之凡以隨時之宜適民之欲耳比來専以不變熙豐之法為紹述之孝不問時之所宜民之所欲者曰以不變為孝則是神宗自不當變祖宗法蓋法無必因亦無必革惟其當而已况今吏員猥多賦役煩重政令數易紀綱隳壞以至飬兵取士馭吏牧民皆不如古法至於此而已弊矣尚何紹述為哉臣願考祖宗之法與今日所行善者因之否者革之詳求博取精思熟慮擇其至當者著一代良法不必拘拘以紹述為名而失其實也二曰論大臣臣聞天子所與共天下者七八大臣得人則朝廷正百官治海內和平四夷效順茍非其人天下不安豈可不論哉傳曰人主之職論一相相之難其人久矣古之論相必曰才足以有為識足以有明量足以有容三者固難全矣有一於此亦可任焉乃若以道事君以公滅私則難其人矣惟以道事君則自任以天下之重毁譽得喪不以動心聲色富貴不以纍志可則行之不可則止唯以公滅私則孤忠自許不立朋黨所以鈞陶天下進退人才一付以至公未嘗著意於其間也本朝惟李沆韓琦為真相焉近時此風無復存者陛下承變亂之後將大有為必得賢相共圖治功臣望陛下詳擇而審考之則必有名世之才為時而出者至於樞密之地政事之夲綱轄之任亦必擇其真賢實能人望所歸者儻無其人自可兼之不必備也三曰辨邪正臣聞正臣進者治之表正臣陷者亂之機自古治亂必主乎邪正自古之人君所以任賢勿二去邪勿疑唐太宗知士及之佞德彛之姦而不用至房杜王魏則任之不疑所以成貞觀之治明皇之初委任姚宋以致太平至於末年罷張九齡相李林甫則治亂自此分甚哉邪正不可不辨也然邪人乘間窺伺揣合主意阿權事貴持祿固寵故人主易以信正人責難於君不務茍且直道而行無所附麗故人主易以疑此唐德宗所以於裴延齡輩則委任不移於陸贄則怫然以讒幸逐也臣願陛下於易信者不可以輕信於易疑者斷之以不疑庶幾可得其實也四曰明賞罰臣聞賞當賢則臣下勸罰當罪則臣下畏賞罰者人主之威柄安可以不當哉國家承平既久萬事姑息故爵賞太濫典刑太輕貴遊子弟雖乳臭小兒聫班侍從應奉官吏雖蒼頭奴𨽻躐取顯仕兩府大學而身不任責直閣待制而眼不識字伶倫嬖幸醫卜伎藝身被朱紫家盈金玉豈非爵賞太濫耶漢法大臣有罪皆棄市夷族夲朝祖宗恩德之厚未嘗殺戮大臣然竄逐嶺表固有之矣近時大臣懷姦誤國天下疾之乃令閒居都城坐享厚祿其他朋邪諂佞之徒姦贓狼籍罪惡昭著方且結交權貴與之營救或貸而不問或朝竄夕召豈非典刑太輕耶夫爵賞濫則人多僥幸典刑輕則下不畏法此所以至於危亂也臣願陛下深鑒此弊愛惜名爵不輕以豫人明正典刑不失其罪賞以春夏刑以秋冬如天地之無私則天下之治舉矣五曰廣言路臣觀自古人君茍不至有大惡如桀紂者未嘗不欲納諫然卒至於言路壅塞天下潰亂者皆權臣蔽之元帝之初聽蕭望之劉向所言及恭顯用事則不能容成帝之初數下明詔求言公卿奏議可述及外家擅權則不復聞矣國家祖宗之時大臣皆公心直道故朝廷詔令有未便者臣下得以直言雖天子震怒大臣方極力救之至熙豐以來用事者欲新法必行恐人異已故排斥羣議有出一言則謂之沮壞良法必逐之而後巳諫官御史以其黨為之觀望成風無復公議方太上皇帝詔求直言言之不中亦不加罪及蔡卞乃盡治言者如陳瓘等皆當世端人擯死不用士論痛惜臣觀今日其弊極矣大臣樂軟熟而憎鯁切臺諫之官與夫搢紳之士相習一律閒居議論無敢及國家安危生民休戚况望於人主前爭是非利害耶所以上下欺罔誕謾無所不至而召天下之亂也臣願陛下以前日為鑒擇臺諫官責其言事不稱職者凡政事法度有可議者詔臣下集議各獻其說無令權臣壅蔽聖聰則人人皆願明目張膽效區區之忠下情不患不通矣六曰勵風俗臣聞士大夫者風俗之所繫朝廷用賢士大夫以職業成政事以行義率風俗則民德日歸於厚矣近時士人剽竊記問為讀書不能行其所言以纎艷浮巧為能文不能先以器識以傾險變詐為有材不能持以義節士之所尚如此而在位大臣亦以此為用人之先故奔競成風巧僞相扇禮義廉恥浸以凋喪而天下日流於薄也臣願陛下稍革此弊令廟堂之上選公忠廉退純實篤厚之人用於朝廷其浮躁衒露傾邪險薄者黜之示以好惡則天下之士皆相率為善可以革浮薄之風成忠厚之俗也夫忠質文之政三代所以相救臣觀今日禮法度數失於太繁聲名文物皆非實用習俗淫靡人情澆僞可不救之以質歟七曰收權綱臣聞太阿之柄不可授於人人主之權不可移於下漢自昭帝之時大臣秉權宣帝承之信賞必罰揔核名實所以收威權於上而成中興之功及至元帝牽制文義優柔不斷故漢業衰焉臣觀太上皇帝夲以寬厚曠逹之性在位日久不防姦邪浸以欺惑故羣小狃狎權移於下而威令有至於不行臣願陛下深鑒此弊排斥羣邪奮然獨斷使威權皆出於人主則頽綱廢紀可以復振而天下之治無患不成矣八曰抑宦侍臣聞柔曼傾意佞諛盜朝漢唐禍亂皆原於此不可不知也然此曹蠱惑人主皆以其嗜好入之今陛下勤儉之德出於天性聲色狗馬觀游宴樂皆所不近彼固無所肆其巧矣然尚有可戒者不宜崇其爵位任以事權蓋崇其爵位則志得意驕任以事權則作威作福唐太宗時內侍不立三品不任以事惟閣門守禦廷內掃除可謂深鑒此弊矣至於進退人才尤不宜與之謀孔子不主癰疽瘠環孟子不畏臧倉聖賢君子寧沒身不見任用豈肯附麗幸臣耶其所以夤緣干進者必朋邪憸薄之小人也懷姦之臣皆倚之以為重卒亂天下可不鑒之哉九曰治財賦臣聞古者制國用皆量入以為出是以祖宗盛時斂取有經用度有節無虛費無妄豫故常賦之外未嘗一取於民間而聚斂興利之臣亦不得容其姦矣比年費耗百出征求無藝聚斂興利之臣専以上供為名侵漁百姓無所不至州縣率掠民不聊生陛下今日雖巳盡罷御前供奉所須之物奈何軍興之時財用窘急於取民者尚或未已臣願事平之後詔有司以一嵗經費立為定額常賦之外如茶鹽法刻民尤深者一切講究取其中制輕徭薄賦與民休息使海內富庶如祖宗時國用亦無患其不饒所謂百姓足君孰與不足也十曰崇儉約臣聞儉為德之共侈為患之大帝王所以訓天下未有不以儉德也比年承平既久海內富庶驕侈不期而至故尊卑上下內外逺近皆以淫靡相勝衣服飲食極其珍異車輿屋宅飾以金翠聲樂玩好觀游燕樂其費不資而物價騰踊細民窮苦蓋不可不節之也上之所行下之所效陛下在東宫儉德著聞今日臨御専以敦朴為天下先夫楊綰人臣也以清德在位能使人減騶徹御罷去聲樂况以一人而躬行者乎然羔羊在位節儉雖化自文王而有刑威之政存焉臣願陛下明詔四方痛革前日侈靡之弊有不懲者重置以法自京師貴近始則此風可消而天下富足矣十一曰重外官臣聞監司天子外臺守令民之師帥監司得人則一路受賜守令得人則郡縣被澤此不可不擇也近時除擢監司或出貴幸之門或繇宰執親黨不觀才能不問資格至於郡縣尤不擇人侍從之官得罪朝廷乃付以民社貪叨之吏干求權要乃得除郡士人以縣令為俗吏不肯注受吏部以縣令非要官不加銓擇故為監司者人微望輕不能舉善懲惡為守令者曠官慢法不能承流宣化上下䝉蔽肆為姦欺窮困之人無所告訴臣願陛下謹重外任之官凡監司有闕選卿監省郎藩府有闕選侍從官所以均其內外更其勞逸其餘郡守之闕盡歸吏部如祖宗時以分數資望依格授之仍久其任無令數更易至於縣令雖有吏部選格更令侍從官舉充其有治狀優異委監司御史考察以聞特加升擢使人知郡縣為重不敢不勉而四方萬里皆䝉朝廷德澤矣十二曰修武備臣聞有文事者必有武備治天下國家未有能廢此也祖宗盛時邉備尤謹比來委任非人故守衛中國禦戎安邉之䇿一切壞盡是以夷狄一旦長驅而前良可駭嘆臣願陛下深鑒前日之弊以武事為急內自京師外至郡邑講求兵備盡如祖宗之時况今金冦雖巳出境秋冬决須復來河東河北兩路尤當備禦亦宜早為之計糧不可不積兵不可不募將不可不擇城池不可不固車馬不可不修器械不可不偹臣料此等廟堂講究熟矣不復具陳姑舉其略而已緣臣所論十二事其次第雖有先後然皆今日之急至於武備議者必曰當在所先而臣獨後之者蓋文武以天保以上治內采薇以下治外至於宣王亦曰內修政事外攘夷狄今日雖夷狄深入禦之為先以臣觀之朝廷若法度修舉大臣得人賞罰無私風俗歸厚以至下情得通權綱不失大略如臣前項所陳則天下國家無有不治矣彼夷狄自當懷德畏威望風逺遁豈足憂哉孔子曰逺人不服則修文德以來之孟子曰王如施仁政可使制挺以橽秦楚堅甲利兵臣所聞如此惟陛下不以為迂濶不勝幸甚靖康元年三月上時為校書郎上欽宗論反正六事胡舜陟臣觀春秋傳曰兵猶火也弗戢將自焚老氏亦曰以道佐人主者不以兵彊天下其事好還國家自熙寧間王韶建開邉之說王安石主其議遣將用兵無嵗無之瀘南廣南勤師逺伐至崇寧以來尤甚西開青唐以及夏國南築溪洞以及丹州西南則建祺祥等州皆不毛之地非人之境而驅赤子陷鋒鏑死者不計其數生者竭其膏血凡五十餘年而又王黼童貫合謀以棄契丹百年之好約大金以墟其國是以上帝震怒禍我國家金冦慿陵莫之能禦屠戮士庶攻陷城邑長驅於中原問罪於都城親王宰執為質敵國猶蕩搖邊疆搏噬不巳我師之出無不敗衄蹙國喪氣失威損重此豈非所謂弗戢自焚其事好還乎陛下踐阼適於斯時宵旰焦勞未見於效蓋天怒未解人力豈能勝哉然天之與人相去雖逺其應甚邇今欲上解天怒當修人事以應之書曰惟先格王正厥事此先王修省以應天解上帝震怒之道也臣觀今日祖宗寬大之政泯滅而未舉王安石刻急之法為害而未除法度未得其正也士大夫之欺罔誕謾尚循舊習驕奢貪鄙曽不少悛風俗未得其正也事未見功賞已驟至及其敗事罰不加焉賞罰未得其正也閹官近習猶執事權頡頏恣睢無所忌憚任用未得其正也昔之叨冒恩寵者未加鐫削懷才抱器者陸沉州縣爵祿未得其正也昔之僥幸富貴者一毫不取火耕水耨者困於重斂賦斂未得其正也數者不正豈所謂正厥事乎伏望明詔三省凡是數者悉反之正庶幾人事修而天意得震怒一解妖氣自銷坐致太平增光祖烈靖康元年十月上時為侍御史詔令三省照應施行宋名臣奏議卷一百五十
