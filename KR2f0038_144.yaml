body:
  text: 宋名臣奏議卷一百四十四宋趙汝愚編邊防門盜賊上仁宗乞選任轉運守令以除盜賊富弼臣伏見西鄙用兵以來搔動天下物力窮困人心怨嗟朝廷不能撫存遂使聚而為盜今張海郭貌山等放火驚擾州縣殺傷吏民恣凶殘之威泄憤怒之氣巡檢縣尉不敢向前遂從京師遣兵仍令中使監督尚猶遷延日月倔強山林以至白晝公行平入州縣開發府庫劫取貨財散募凶徒嘯聚漸衆陜西南京唐汝均房金商襄鄧相去凡千餘里殺人放火所在瘡痍賊一經過六親不能相保人民恐懼道路艱難每郡無兵各不自保若大段結集攻陷諸州緩急亦未有所以備之之策賊既轉盛不可不防秦末隋末唐末諸寇或起於畎畝或起於商客或起於士卒或起於負擔其初起莫不甚微尚不得如張海郭貌山輩如此甚盛然以小合大漸成巨盜縱橫難制遂亂天下今兹賊黨未見剪除所宜多設隄防以備滋蔓臣前日曽具劄子奏乞於京西路擇要害數州屯聚兵馬以為諸處聲援此最急務宜速施行臣又思京西諸州長吏皆非其人如襄鄧唐汝均房金商安郢等十餘州盡是盜賊見今往來之處長吏尤須得人伏乞先選轉運兩人徑令往彼體量諸州長吏不才及贓濫老病者急罷之便令於轄下通判或知縣中保舉權充知州如不足則朝廷下審官院選差人填補知州得人則就令選郡內知縣縣令昔前漢宣帝時渤海郡盜起帝選能治之人丞相舉龔遂遂至郡盜賊悉平後漢安帝時朝歌縣盜賊屯聚連年未獲乃以虞詡為朝歌長賊遂駭散此是兩漢時一郡一縣有賊只得龔遂虞詡兩人為守宰自然破滅之驗也今且以上項襄鄧等十餘州論之其知州知縣縣令皆庸謬懦怯尋常之人盜賊所到如入無人之境巡檢縣尉又一一不堪驅使賊不猖狂自恣復何為哉臣竊謂非盜賊果能強盛自是朝廷只守弊法不肯更張唯恐不才不賢者怨恨不早罷去故以州縣委賊任賊殘害臣謂盜賊之起已是遲矣若以朝廷自來處置次第早合賊滿天下但為宗社有靈陛下仁德所感故未至如此然今盜賊已起乃是遍滿天下之漸若朝廷依舊避人怨恨不早更張臣恐賊盜愈多竊據州縣或稱將軍或稱太尉或稱王或稱帝兵戈四起所在僣偽事到如此生靈如何社稷如何朝廷守此一城還得安穩否況今來不同漢唐都關中洛陽各有險固可恃緩急有變用兵守險亦未能便至危窘尚自眀皇德宗俱曽播越唐室危若贅旒者數矣今來都城並無險固所謂八面受敵乃自古一戰場爾若四方各有大盜朝廷力不能制漸逼都城不知何以為計臣每念及此不寒而戰臣又伏思古者亂離無世不有然而傾亡至速者亦各不下三五十年唯唐室之後凡更五代十二帝共只得五十四年國祚短促自古未之有也其故何哉蓋是都城在四戰之地並無險固四方有變直到城下略無障礙之所致也唯是王者能鎮撫天下常使安寧災患不生賊盜不作則是都城也且保無虞故大宋之興實賴太祖英武之才平定禍亂盡削方鎮兵權只用文吏守土及將天下營兵縱橫交牙移换屯駐不使常在一處所以壞其凶謀也又賴太宗相繼尅復諸國一統天下更賴真宗為民屈已與北寇西戎議通和好故能八十餘年都城無事海內富庶不用干戈雖是人謀亦有天幸今則西戎已叛屢喪邉兵北寇愈強且增嵗幣國用殫竭民力空虛徭役日繁率斂日重官吏猥濫不思澄汰人民疾苦未嘗省察百姓無告朝廷不與為主不使叛而為寇復何為哉朝政不舉都城無依五代事迹已復萌露艱虞之運正在今日須是君臣上下同心協力廢寢忘食夙夜整救則數年之內或致小康若猶因循茍且尚務偷安不練人謀只求天幸臣恐五代之禍不旋踵而至矣臣因論京西盜賊遂至理亂憂懼所迫不覺切至陛下便賜萬死亦所甘心臣所乞選京西轉運使知州知縣不可稽緩蓋擾攘之際全藉有才謀轉運使往來按察經營又藉逐處知州知縣守護城池安集百姓及設方略驅除寇盜其餘有朝廷意所不到指揮不及者其良守宰必自能就便處置不至失所州縣既各得一人又得要郡所屯之兵掎角救應則盜賊不難擒捕矣至於巡檢縣尉亦可並委轉運知州揀選不煩朝廷費力此䇿最為簡要無可疑難京西既行次及諸路變故或起倉卒設備皆不可遲朝廷但能不務因循不避怨謗天下之事未有不可為者所有諸路㨂退不才及贓濫老病轉運知州知縣縣令等仰只在元守官處聽候朝旨朝廷只就外指揮更不令赴闕仍乞檢會臣前奏相度施行慶厯八年八月陜西賊張海郭貌山羣行剽劫州縣不能制詔左班殿直曹元結張宏三班借職黎遂領兵往捕九月海自陜西轉入京西其勢愈熾詔監察御史蔡稟為京西安撫使往督捕弼上此奏時樞密副使上仁宗論諸處盜賊事宜歐陽修臣近因軍賊王倫等事纍有論奏為天下空虛全無武備指陳隋唐亡國之監皆因兵革先興而盜賊繼起不能撲滅遂至橫流又見國家綱紀隳頽法令寬弛賞罰不立善惡不分體弱勢危可憂可懼欲乞朝廷講求禦賊之術峻行責下之法兼聞搢紳之內憂國者多皆論盜賊事臣但謂朝廷見已形之患聞衆多之言必動於心略知恐懼及聞樞密院戒勵進奏官不使外人知事方認兩府厭苦獻言之人又見自和州奏破王倫之後更不講求禦賊之䇿又認上下已有偷安之意殊不知前賊雖滅後賊更多今建昌軍一火四百人桂陽監一火七十人草賊一火百人其餘池州解州鄧州南京等處各有強賊不少皆建旗鳴鼓白日入城官吏逢迎飲食宴樂其敢如此者蓋為朝廷無賞罰都不足畏盜賊有生殺時下須從臣恐上下因循日過一日國家政令轉弱盜賊威勢轉強使畏賊者多向國者少天下之勢從兹去矣竊聞京西提點刑獄張師錫為部內使臣與賊同坐喫酒及巡檢縣尉不肯用心曽有論奏其言甚切臣舊識師錫其人恬靜長者遲緩優柔不肯生事今尚有此奏則臣謂天下無賢愚皆為國家憂之獨不憂者朝廷爾嗟夫古之智士能慮未形之機今之謀臣不識已形之禍以患為樂以危為安見盜賊雖多而時有敗者遂生玩寇之意見言事者衆而聽之已熟遂有忽人之心臣近曾求對便殿伏蒙陛下語及賊事憂形于色及退見宰輔從容間暇天下之事深可憂矣今桂陽建昌軍賊數不少想其害為尤甚王倫在於逺處更合留意今自京發兵則道逺不及外處就撥則處處無兵欲乞嚴勑大臣鑒已成難救之患速講定禦盜之法頒行天下使四方漸為備禦攻守擘畫剪撲諸處見在賊數自有賊已來羣臣上言者皆為自來寬法致不肯用心捉賊皆乞峻行法令近見池州官吏各只罰銅五斤乃知言者皆不蒙納臣謂大臣為國計者寧厭忠言之多不厭盜賊之多乃如此行事臣前後上言賊事文字不少仍乞類聚擇其長者講定法制陛下欲知大臣不肯峻國法以繩官吏蓋由陛下不以威刑責大臣此乃社稷安危所係陛下之事也伏望留意而行之慶厯三年八月上時知諫院上仁宗乞諸道置兵以備冦盜富弼臣竊聞知金州比部員外郎王茂先奏九月十三日卯時有羣賊入州城打開軍資庫甲仗庫般運出衣甲物帛散與賊衆及貧民等知州以下只領當直兵士二十四人鬭敵不住州官走出城外任賊劫掠直至未時以來方始出城臣謂賊勢轉盛深可憂虞臣前嵗曽陳備賊之䇿正為今日之事今來纍有羣賊白日入城開軍資等庫劫取衣甲物帛散與賊黨州中兵士不滿三十人州官散走賊徒恣行劫殺殊無畏憚官司勢不能制禦臣前嵗所陳只是過為隄防萬一或有此事不意今來便至如此小寇聚集尚陵侮朝廷臣決知自此後更有大盜殺官吏據州城盡取官私財物召募徒衆必千萬人且賊頭稱王稱朕與朝廷相抗大劫財物散施無涯則貧民樂隨矣恣行劫殺務要震恐則小大脅從矣朝廷賞必有限罰必有條不得如賊之使人樂隨而脅從也若諸處觀望姦雄相應而起賊滿天下則大事去矣秦末隋末唐末皆由此而亂臣夙夜思念實為寒心臣伏思西賊未叛以前諸處雖有盜賊未嘗有敢殺戮官吏者自四五年來賊殺都巡檢縣尉官者約五六十員又西賊未叛以前諸處雖有盜賊未嘗敢入州城行劫自四五年來賊入州縣打劫者約三四十州向來入城尚皆暮夜竊發濳形往來今則白日公行擅開府庫其勢日盛一日自此以往只有轉熾若不早為隄備事未可知臣前嵗所上備賊之䇿當時不曽施行近日因兩府奏事論及淮南賊盜陛下問臣前䇿臣次日再録一本進呈訖然臣䇿只是備兵聚東南九路及京東一路今據金州奏在城只有兵士二十四人顯是無備致盜生心今并京西一路亦於要害聚兵為州郡聲援今諸處賊盜已盛方思設備已失隄防若又遷延則無所及伏乞速賜施行慶厯三年十月上時為樞密副使弼前奏見州郡兵門上仁宗論禦盜之䇿莫先安民余靖臣竊見陜西京西京東淮南荆湖等路各有羣賊大者數百人小者三五十人剽劫州縣恣行殺伐官吏罷軟望風畏懼如張海等輩日肆猖狂逐處州軍為備者唯能乞師以自防援此蓋軍政久弛又少良吏故小有寇盜則上煩朝廷伏見近日遴擇才臣為諸路轉運使提點刑獄等將令上下相維謹於伺察去貪殘之吏撫疲瘵之民此誠求治之本也然臣愚慮思之自數年以來寇賊為害幸而起於軍伍烏合成羣百姓尚懷其生不相應和兹乃國家自祖宗以來輕徭薄賦以結人心至於此也臣聞孟子曰推恩足以保四海不推恩無以保妻子此古今之通論也國家西陲用兵而來經費漸廣故言利之臣日進其術不以安民為意者多矣惟陛下察之大抵民有蓄積能自充足則鄰里親戚共相守衛不忍棄其安逸以就死若朝廷略加存撫則不失其所凡今之所以害於農者謬官狡吏兼并之家遊手之人乘國家賦斂猝暴而射其利以耗其蓄聚也今又加以賊盜驚擾廢其耕桑若皆失業困窮而共為盜則黃巾赤眉之患可憂矣故朝廷尤宜急撫之也夫州郡之兵多則食不充少則不足自衛裁當今之所宜唯兼濟而後可若使朝廷遴擇長吏長吏擇捕盜之官巡檢得自募勇力之士嚴捕賊之令重捕賊之賞賊無不破矣安民之術則但不奪其時不傷其財能禁其為非而去其為害者則皆安堵矣故盜賊之勢不可使其滋蔓唯先求安民之術而已矣欲民之安者在乎謹改作勿爭其利而已矣國家不謹改作而與民爭尋常之利者臣别具條奏慶厯三年十月上時為右正言諫院供職上仁宗乞採訪京東狂謀之事富弼臣近於七月日曽親書劄子聞奏見察訪民間恐有暗行結扇不徒驚劫别蓄姦謀如劉卺之類者候見的實别具申奏次臣後來察訪京東一路甚有凶險之徒始初讀書即欲應舉洎至長立所學不成雖然稍能文詞又多不近舉業仕進無路心常怏怏頗讀史傳粗知興亡以至討尋兵書習學武藝因兹張大胸膽遂生權謀每遇災祥便有竊議自以所圖甚大蔑視州縣既不應舉又不别營進身所臨之官無由肯見往往晦名詭姓潛迹遁形唯是凶徒密相結扇或遇飢嵗必有竊發臣恐此輩一作卒難剪除縱無成謀亦能始禍似此輩類的實甚多散在民間但未發耳又緣不希仕進難以牢籠不可捕而加刑加刑則黨類驚而速為也不可縱而稔惡稔惡則根株成而難去也要在得而縻之使凶謀不能成此最上也欲乞批下於此一路中擇三兩處臣寮可委者密令多方採訪如知姓名居處作草澤遺逸以禮呼召薦于朝廷隨其所能量加恩命則姦謀不成矣或得其稍優者量加異待則徒黨聞之未必不冀望而出因而收拾或可略盡若使此輩不作其他盜賊雖遇飢年蜂起不足為慮也伏望陛下深切留意於此不可忽也貼黃自曹尚劉卺相繼敗露凶徒懲此其謀愈密所以卒難得見須是所委臣寮多方用心尋訪庶幾可得仍須至密若稍漏泄即恐凶徒避禍離去鄉里則愈不可見也臣向來宣撫河北亦曽察訪彼亦有此輩況與京東接境則朝廷亦宜留意慶厯五年上時知夀州兼京東路安撫使上英宗論京東盜賊趙瞻臣伏見羣盜殺害輔郡之官吏繫囚叛起京畿之獄此皆前古禍亂之萌朝廷腹心之慮為最急務而政府唯不過發關移為督責之狀州郡亦不過備遊徼為期會之迹而已文書一報恬為是事但用習常茍求按問未有為國家窮淵藪積姦之原塞萬一不測之計也謹按兩漢故事膠東盜賊起宣帝即用張敞為膠東相渤海左右郡盜起丞相御史即舉龔遂為太守潁川盜賊起光武即以寇恂為太守南山羣盜起大將軍王鳳即薦王尊行京兆尹事據兩漢時盜賊奏至天子與大將軍丞相御史擢舉守臣復尚蠲去繁文假以一切而後激勸吏民鎮安風俗莫不即著成效也平時國家列官校任即一路有安撫總管鈐轄兵馬一郡有知州丞尉提舉巡檢一縣有令尉此皆盜賊之司也今一旦不逞之人數十相聚遂至賊殺官吏顧諸備位誰有受斯責者環視俟變無一援救其間甚者則必有罪其死戰之忠以為貪功辱命然則是無有公家竭力之人矣且昔用一郡守則盜賊屏息今聫官數十員而尤不能禁者何哉蓋昔之責人以實效而今之官司用空文也今盜一發符牒四走則曰吾有文書下一路矣帥府則曰吾有文書下郡矣按具則吾無責也郡則曰吾有文書下巡邏令尉矣關白即吾無責也令尉則曰吾有文書下坊里保伍矣期會即吾無責也此其由來得非自朝廷之守空文邪使因循巽愞之吏傳執曹按而與趣公疾惡之人挈度計校是終無以成實效也今知曹州王得賢不能禁盜賊致成徒黨知濮州戚舜元年力衰老素無才術唯此二州為賊所聚臣今欲乞先於曹濮専責知州通判且令條陳方略更明賞罰許其規畫悉就討捕督以近限約以重劾如其逗遛無所建明即下有司責以無狀别委輔臣舉用才吏京東應諸旁郡悉可依此更張且須成績乃議酬擢處置之宜俾先圖上朝廷更為裁擇官吏自無茍簡足以肅清內郡震帖外夷臣愚不勝懇激之至治平二年四月上時為侍御史上神宗論河北京東盜賊蘇軾臣以庸才備員册府出守兩郡皆東方要地私竊以為守法令治文書赴期會不足以報塞萬一輒思東方之要務陛下之所宜知者得其一二草具以聞而陛下擇焉臣前任密州建言自古河北與中原離合常係社稷存亡而京東之地所以漕輸河北瓶竭則罍恥唇亡則齒寒而其民喜為盜賊為患最甚因為陛下畫所以待盜賊之䇿及移守徐州覽山川之形勢察其風俗之所尚而考之於載籍然後又知徐州為南北之襟要而京東諸郡安危所寄也昔項羽入關既滅咸陽而東歸則都彭城夫以羽之雄略捨咸陽而取彭城則彭城之險固形便足以得志於諸侯者可知矣臣觀其地三面被山獨其西平川數百里西走梁宋使楚人開關而延敵材官騶發突騎雲從真若屋上建瓴水也地宜粟麥一熟而飽數嵗其城三面阻水樓堞之下以汴泗為池獨其南可通車而戲馬臺在焉其髙十仞廣袤百步若用武之世屯千人其上聚櫑木炮石戰守之具以與城相表裏而積三年糧於城中雖用十萬人不易取也其民皆長大膽力絶人喜為剽掠小不適意則有飛揚跋扈之心非止為盜而已漢髙祖沛人也項羽宿遷人也劉裕彭城人也朱全忠碭山人也皆在今徐州數百里間其人以自負凶傑之氣積以成俗魏太武以三十萬人攻彭城不能下而王智興以卒伍庸才恣睢於徐朝廷亦不能討豈非以其地形便利人卒勇悍故耶州之東北七十餘里即利國監自古為鐵官商賈所聚其民富樂凡三十六冶冶尸皆大家藏鏹巨萬常為盜賊所窺而兵衛寡弱同於兒戲臣中夜以思即為寒心使劇賊致死者十餘人白晝入市則守者皆棄而走耳地既産精鐵而民皆善鍛散冶户之財以嘯召無賴則烏合之衆數千人之仗可以一夕具也順流南下辰發巳至而徐有不守之憂矣使不幸而賊有過人之才如吕布劉備之徒得徐而逞其志則京東之安危未可知也近者河北轉運使奏乞禁止利國監鐵不許入河北朝廷從之昔楚人亡弓不能忘楚孔子尤小之況天下一家東北二冶皆為國興利而奪彼與此不已隘乎自鐵不北行冶户皆有失業之憂詣臣訴者數矣臣欲因此以復冶戶為利國監之扞屏今三十六冶冶各百餘人採礦伐炭多飢寒亡命強力鷙忍之民也臣欲使冶户每冶各擇其才力而忠謹者保任十人籍其名於官授以刀槊教之擊刺每月兩衙集於知監之庭而閲試之藏其刃於官以待大盜不得役使犯者以違制論此冶户為盜所擬也久矣民皆知之使冶户出十人以自衛民所樂也而官又為除近日之禁使鐵得北行則冶户皆悅而聽命姦猾破膽而不敢謀矣徐城雖險固而樓櫓弊惡又城大而兵少緩急不可守今戰兵千人耳臣欲乞移南京新招騎射兩指揮於徐此故徐人也嘗屯於徐營壘材石既具矣而遷於南京異時轉運使分東西路畏饋餉之勞而移之西耳令兩路為一其去來無所損益而足以為徐之重城下數里頗産精石無窮而奉化廂軍見闕數百人臣願募石工以足之聽不差出使此數百人常采石以甃城數年之後舉為金湯之固要使利國監不可窺則徐無事徐無事則京東無虞矣沂州山谷重阻為逋逃淵藪盜賊每入徐州界中陛下若採臣言不以臣為不肖願復三年守徐且得兼領沂州兵甲巡檢公事必有以自效京東惡盜多出逃軍逃軍為盜民則望風畏之何也技精而法重也技精則難敵法重則致死其勢然也自陛下置將官修軍政事皆精鋭而不免於逃者臣嘗考其所由蓋自近嵗以來部送罪人配軍等皆不使役人而使禁軍軍士當部送者受牒即行往反常不下十日道路之費非取息錢不能辦百姓畏法不敢貸貸亦不可復得唯所部將校乃敢出息錢與之歸而刻其糧賜以故上下相持軍政不修博奕飲酒無所不至窮苦無聊則逃去為盜臣自至徐即取不係省錢百餘千别儲之當部送者量逺近裁取以三月刻納不取其息將吏有敢貸息者痛以法治之然後嚴軍政禁酒博今此期年士皆飽暖練熟技藝等第為諸郡之冠陛下遣敕使按閲所具見也臣願下其法諸郡推此行之則軍政修而逃者寡亦去盜之一端也臣聞之漢相王嘉曰孝文時二千石長吏安官樂職上下相望莫有茍且之意其後稍稍變易公卿以上轉相促急司𨽻部刺史發揚隂私吏或居官數月而退二千石益輕賤吏民慢易之知其易危小失意則有離畔之心前山陽亡徒蘇令縱橫吏士臨難莫肯伏節死義者以守相威權素奪故也國家有急取辦於二千石二千石尊重難危乃能使下以王嘉之言而考之於今郡守之威權可謂素奪矣上有監司伺其過下有吏民持其長短未及按問而差替之命已下矣欲督捕盜賊法外求一錢以使人且不可得盜賊凶人情重而法輕者守臣輒配流之則使所在法司覆按其狀劾以失入惴惴如此何以得吏士死力而破姦人之黨乎由此觀之盜賊所以滋熾者以陛下守臣權太輕故也臣願陛下稍重其權重責以大綱濶略其小過凡京東多賊之郡自青鄆以降如徐沂齊曹之類皆遴擇守臣聽法外處置強盜頗賜緡錢使得以布設耳目蓄養爪牙然緡錢多賜則難常少又不足於用臣以為每郡可嵗别給一二百千使以釀酒凡使人緝捕盜賊得以酒豫之敢以為他用者坐贓論賞格之外嵗得酒數百斛亦足以使人矣此又治盜之一術也然此皆其小者大者非臣之所當言欲默而不言則又私自念遭值陛下英聖特達如此若有所不盡非忠臣之義故昧死復言之昔者以詩賦取士今陛下以經術用人名雖不同然皆以文詞進耳考其所得多吳楚閩蜀之人至於京東西河北河東陜西五路蓋自古豪傑之場其人沈鷙勇悍可任以事然欲使治聲律讀經義以與吳楚閩蜀之人爭得失於毫釐之間則彼有不仕而已故其得人常少夫惟忠孝禮義之士雖不得志不失為君子若德不足而才有餘者困於無門則無所不至矣故臣願陛下特為五路之士别開仕進之門漢法郡縣秀民推擇為吏考行察亷以次遷補或至二千石入為公卿古者不専以文詞取人故得士為多黃霸起於卒史薛宣奮於書佐朱邑選於嗇夫邴吉出於獄吏其餘名臣循吏由此而進者不可勝數唐自中業以後方鎮皆列選校以掌牙兵時四方豪傑不能以科舉自達者皆爭為之往往積功以取旄鉞雖老姦巨盜或出其中而名卿賢將如髙仙芝封常清李光弼來瑱李抱玉段秀實之流所得亦已多王者之用人如江河江河所趨百川赴之蛟龍生焉及其去而之他則魚鱉無所還其體而鯢鰍為之制今世胥史牙校皆奴僕庸人者無他以陛下不用也今欲用胥史牙校而胥史行文書治刑獄錢穀其勢不可廢鞭撻鞭撻一行則豪傑不出於其間故凡士之刑者不可用而用者不可刑故臣願陛下採唐之舊使五路監司郡守共選士人以補牙職皆取人才心力有足過人而不能從事於科舉者祿之以今庸錢而課之鎮稅場務督捕盜賊之類自公罪杖以下聽贖依將校法使長吏得薦其才者第其功伐書其嵗月使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸出於此塗而姦猾之黨可得而籠取也其條目委曲臣未敢盡言惟陛下留神省察昔晉武平吳之後詔天下罷軍役州郡悉去武備唯山濤論其不可帝見之曰天下名言也而不能用及永寧之後盜賊蜂起郡國皆以無備不能制其言乃驗今臣於無事之時屢以盜賊為言其私憂過計亦已甚矣陛下縱容之必為議者所笑使天下無事而臣獲笑可也不然事至而圖之則已晚矣干冒天威罪在不赦元豐元年十月上時知徐州上神宗論京東盜賊李琮臣伏見自來河北京東常苦盜賊而京東尤甚不獨穿窬袪篋椎埋發冢之姦至有飛揚跋扈割據僣擬之志近者李逢徒黨青徐妖賊皆在京東凶愚之民殆以成俗自昔大盜之發必有釁端今朝廷清明四方無虞而此等常有不軌之意者殆土地風氣習俗使然不可不察也漢髙祖沛人項羽宿遷人劉裕彭城人黃巢宛朐人朱全忠碭山人其餘歷代豪傑出於京東者何可勝數故凶愚之人常以此藉口而其才力心膽實亦過人加以近年改更貢舉條制掃除腐爛専取學術其良民善士既已改業而其朴魯強悍難化之流抱其無用之書各懷不逞之意朝廷雖敕有司别立字號以收三路舉人而此等自以世傳朴學無由復踐場屋老死田里私出怨言幸災伺隙臣每慮及此即為寒心揚雄有言御失其道則天下狙詐咸作敵而班固亦論劇孟郭解之流皆有絶異之姿而惜其不入於道德茍放縱於末流是知人言善惡本無常性若御得其道則向之姦猾盡是忠良故許子將謂曹操曰子治朝之能臣亂世之姦雄使韓彭不遇漢髙與盜賊何異臣竊嘗為朝廷計以謂窮其黨而去之不如因其才而用之何者其黨不可勝去而其才自有可用昔漢武嘗遣繡衣直指督捕盜賊所至以軍興從事斬二千石以下可謂急矣而盜賊不為少衰者其黨固不可盡也朝廷因其才而用之則盜賊自消而豪傑之士可得而使請以唐事眀之自天寶以後河北諸鎮相繼為亂雖憲宗英武亦不能平觀其主帥皆卒伍庸才而能於六七十年間與朝廷相抗者徒以好亂樂禍之人背公死黨之士相與出力而輔之也至穆宗之初劉總入朝而河北始平總知河北之亂權於此輩於是盡藉軍中宿將名豪如朱克融之流薦之於朝冀厚與爵位使北方之人羡慕向進革其亂心而宰相崔植杜元穎皆庸人無逺慮以為河北既平天下無事克融輩久留京師終不録用飢寒無告怨忿思亂會張𢎞靖赴鎮遂遣還幽州而克融等作亂復失河朔今陛下鑒唐室既往之咎當收京東河北豪傑之心臣伏見近日沂州百姓程棐告獲妖賊郭進等竊聞棐之弟嶽乃是李逢之黨配在桂州豪俠武健又過於棐京東州郡如嶽者不可勝數此等棄而不用之即為賊用而不棄即捉賊其理甚明臣願陛下精選青鄆兩帥京東西職司及徐沂兖單濰密淄齊曹濮知州諭以此意使隂求部內豪猾之士或家富而多權謀或通知術數而曉兵或家富而好施如此之類皆召而勸奬使以告捕自效籍其姓名以聞於朝所獲盜賊量輕重酬賞若獲真盜大姦隨即録用若只是尋常劫賊即纍其人數酬以一官使此輩歆艷其利以為進身之資但能拔擢數人則一路自然競勸貢舉之外别設此科則向之遺才皆為我用縱有姦雄嘯聚亦自無徒但每州搜羅得一二十人即耳目遍地盜賊無容足之處矣歷觀自古竒偉之士周處戴淵之流皆出於羣盜改惡修善不害為賢而況以捉賊出身有何不可若朝廷隨才試用異日攘戎狄立功名未必不由此塗出也非陛下神聖英武不能決行此䇿臣雖非職事而受恩至深有所見聞不敢瘖默元豐三年上時為淮南轉運使時蘇軾責黃州為琮代作上哲宗乞除盜賊重法范祖禹臣聞昔季康子患盜問於孔子孔子對曰茍子之不欲雖賞之不竊季康子又問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃臣始讀書蓋嘗疑之以為聖人之言主於教化而已行之未必有近效也及觀太宗初即位與羣臣論止盜或請重法以禁之太宗哂之曰民之所以為盜者由賦役繁去奢省費輕徭薄賦選用廉吏使民衣食有餘則自不為盜安用重法耶自是數年之後海內升平路不拾遺外户不閉商旅野宿焉臣觀太宗之政如此乃始知聖人之言不欺後世行之必有近效也夫以區區之魯國季康子為相孔子猶勸之以不欲所以止盜而況天子之為天下乎季康子魯之執政尤不可以言殺當欲善而已而況天子之於天下乎自古重法以止盜者莫如五代之漢髙祖即位之年患四方盜賊無問贓多少皆抵死仍分命使者逐捕宰相蘇逢吉草詔意云應盜賊其本家并四鄰同保皆全族處斬衆以為盜尤不可族況鄰保乎逢吉固爭不已但省去全族二字由是鄆州捕盜使者張令柔殺平隂縣十七村民其法可謂重矣然盜賊不為衰止至周太祖時竊盜贓滿三匹者猶棄市太祖皇帝代虐以寬稍輕盜法纍聖仁厚遞加減貸故竊盜遂無所刑然編敕所定盜贓尤重於律三倍豈可更增重乎臣伏見熙寧四年中書檢正官奏請開封東明考城長垣等縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兖鄆沂等州淮陽軍别立盜賊重法其後又有他州奏請乞比東眀等處行重法者夫溥天之下誰非君民今獨視此州縣如夷貊之人自行法以來二十餘年不聞盜賊衰止但聞其愈多耳古者開衣食之源立教化之官先之以節儉示之以純朴有邪僻之民然後齊之以刑豈有不治其本専禁其末又重法之地皆舉知縣必擇強健之吏奉法除盜視民如讎一切以擊斷為稱職此豈平世所宜為乎臣愚欲乞悉除重法改重法地分為舉知縣地分夫天下縣令不可不擇獨此諸縣巳先舉吏則不可廢民多姦猾尤須良吏以治之選吏以養民不命吏以敵民也及今四方人情少安改峻法為平法庶可變惡俗為善俗止用常典足以禁姦惟陛下無以教化為不急無以峻法為足恃則民皆可使為善矣元祐六年十二月上時為禮部侍郎宋名臣奏議卷一百四十四
