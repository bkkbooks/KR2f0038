body:
  text: 宋名臣奏議巻一百三十八宋趙汝愚編邊防門遼夏十上神宗論闗中事宜文彦博臣近聞西師巳還中外但知時暫歇泊而未有分屯解甲之㫖人情憂疑皆慮王師必有再舉之計老臣受國恩深義同休戚齒髮如此無復覬望惟有區區欲報之意不能緘黙輙為陛下言之臣切觀陛下臨御以來選拔將帥訓齊師徒修治器械儲峙糗粮皆衆智所不及近世所未有比者夏人昏亂自致天討陛下赫然命將出師以伐有罪師行以來捷音屢上雖未能覆其巢穴係其君長而師行有紀所遇輙克羌人遁逃莫敢抗堂堂之鋒天威神武震慴四夷戰功之多近世未有然而數路進軍興動大衆彌年累月餽輓不貲諸路之民疲於供給將士盡忠竭力為朝廷奮不顧身間闗死亡衝冒寒苦備極勤勞臣以謂國威既已振矣將士之力亦巳殫矣百姓餽運亦已竭矣陛下今日之計正當勞徠將士安附百姓摩拊其疾痛補全其瘡痍使得蘇息按甲養威以全前日之勝如此則外足以懲艾夷狄内足以愛養軍民此宗社無疆之休也今若師徒暫還而復出士氣已衰而再皷民力巳困而調發復興諸路深入而轉餉益逺如此則師之勝敗恐未可知而前功或喪此天下之深憂也兼臣在洛中津遣陜西軍須不少亦聞陜西事體頗詳皆言百姓亦已流離菽粟之價騰踴今冬二麥多不下種將春農事方興又復調發不已必恐應副不前有誤大計臣不言孰當言者伏望陛下以天下為度以蒼生為心不以盡敵然後為功亟詔班師分屯諸路使朝廷恩威並行兵民和附以小羌昏亂如此可以坐待其滅亡矣臣不勝大願貼黄臣聞陜西河東運粮人夫雖所費不貲而逃逸者甚衆至有部夫官亦逃竄恐無人敢子細奏陳春秋戰國時用兵運粮多在中夏故兵有因粮粮不逺載與今之餽運深入夷狄沙漠之地其勢不同易稱髙宗伐鬼方三年克之小人勿用以聖帝伐鬼方尚三年而克之理有不可急者又曰師貞丈人吉丈人嚴莊之稱用之則吉小人勿用用則無功無功則有罪老臣伏望陛下選擇將兵者如輕險而求僥倖之功者當勿用之臣年老眼昏勉力親書此劄子深懼不謹細伏望聖慈矜察兼不敢附逓恐漏洩不達謹遣臣長孫承事郎永世持詣通進司投進元豐四年十二月上時判河南府上答詔曰自逺相見忽經兩年春暄卿比平安前繼閱所論闗中事宜悉至誠惻怛之意非累朝心膂之臣憂國如家曷能惓惓如此寤寐忠嘉不忘於懐朕涉道日淺昧於知人不能圖任將帥以天錫可乗之時上為祖宗殄滅一方世讎深用厚顔爰自六軍還塞將士已憚勞黎民巳告病今日之勢豈復可逺舉深入哉惟固境自全而已近特命於涇原制置者第使之城數亭障制㓂衝軼耳非復有前日之圖也所以張大其名若入討之為者葢兵法有之用而示之不用不用固有示之用耳庶或其可震之來威尋盟則朝廷因得復覊縻之也想卿同體均休戚之誠諒巳悉其措置大槩今因貽慶行特行示諭先是四月种諤奏夏國内亂秉常為其臣所簒乞興師問罪朝廷始大出師攻討李憲王中正髙遵裕等分道深入所向皆捷其後乆攻靈州不下兵連歳不解中國騷然五年九月夏人二十萬䧟永樂城至六年夏國主始請和奉貢前後用兵皆一時小人貪功生事附㑹行之本非神考之意上神宗諫伐西夏滕甫臣素無學術老不讀書毎欲披竭愚忠上補聖明萬一而肝肺枯涸卒無可言近者因病求醫偶悟一事推之有政似可施行惟陛下裁擇臣近患積聚醫云據病當下一日而愈若不下半月而愈然中年以後一下一衰積衰之患終身之憂也臣私計之終不以一日之快而易終身之憂遂用其言以善藥磨治半月而愈初不傷氣體力益全因悟近日臣僚獻言欲用兵西方皆是醫人欲下一日而愈者也其勢亦未必不成然終非臣子深憂君父欲出萬全之道也以陛下聖明將賢士勇何徃不克而臣尚以為非萬全者俗言彭祖觀井自係大木之上以車輪覆井而後敢觀此言雖鄙而切於事陛下愛民憂國非特如彭祖之愛身而兵者凶器動有危亡其䧟人可畏有甚於井故臣願陛下之用兵如彭祖之觀井然後為得也臣切觀自古善用兵者莫如曹操其破袁紹最有巧思請試為陛下論之袁紹以十倍之衆大敗於官渡僅以身免操歛兵不追者何也以緩紹而亂其國也紹歸國益驕忠賢就戮嫡庶並争不及八年而袁氏無遺種矣向使操急之紹既未可以一舉蕩滅若懼而修政用田豐而立袁譚則成敗未可知也其後北征烏桓討袁熙袁尚熙走遼東或勸操遂平之操曰彼素畏尚等吾今急之則合緩之則自相圖其勢然也遂引兵還曰吾方使公孫康斬送其首已而果然若操者可謂巧於滅國矣滅國大事也不可以速譬如小兒之毁齒以漸揺撼之則齒脫而兒不知若不以漸一拔而得齒則毁齒可以殺兒故臣願陛下之取西夏如曹操之取袁氏也方元昊强時謀臣猛將盡其智力十年而不敢近今者主弱臣强其國内亂陛下使偏師一出斬名王虜偽公主築蘭㑹等州此真千載一時天以賊授陛下之秋也兵法有之同舟而遇風則胡越相救如左右手今秉常雖為母族所簒以意度之其世家大族亦未肯俯首連臂為此族用也今乃合而為一堅壁清野以抗王師如左右手此同舟遇風之勢也法當緩之今天威巳震臣願陛下選用大臣宿將素為賊所畏服者使兼帥五路聚重兵境上號稱百萬蒐乘補卒牛酒日至金皷之聲聞於數百里間外為必討之勢而實不出境多出金幣遣間使辨士離壞其黨與且下令曰尺土吾不愛一民吾不有也其有能以地與衆降者即以封之有敢攘其地掠其人者皆斬不出一年必有權均力敵内自相疑者人情不逺各欲求全及王師之未出争為先降以邀重賞陛下因而分裂之即用其酋豪命以爵秩棊布錯峙務使相仇如漢封呼韓邪通西域故事不過於要害處築一城屯數千人置一將以䕶諸部可使數百年面内保境不煩城守餽運豈非萬全之至計哉臣願陛下斷之於中深慮而逺計之夫為人臣計與為人主計不同人臣非攘地効首虜無以為功為陛下計惟天下安社稷固耳陛下神聖冠古動容舉意皆是功德但能措太山之安與天地等壽則竹帛不可勝紀而堯舜禹湯不足過也議者不知出此争欲急於功名履危犯難以勞聖慮臣竊不取古人有言省官不如省事省事不如清心劉洎諌唐太宗曰皇天以不言為貴聖人以不言為德老子稱大辨若訥莊子言至道無文且多記則損心多語則損氣心氣内損形神外勞初雖不覺後必為累須為社稷自愛人臣愛君未有如洎之深切者也臣竊慕之雖謫守在外不當妄言然自念舊臣譬之老馬雖筋力已衰不堪致逺而經涉險阻粗識道路惟陛下哀愍其愚而憐其意不勝幸甚元豐五年上時知筠州上神宗論西師不可再舉范純粹臣伏見朝廷聚兵一道以俟西討將修築堡寨聚積芻粮為進攻必取之計臣以非才職專餽餉雖前後累與同職官條具事狀仰煩聖聽然其所論皆區區餽運職事之所當言者至於攻討得失之勢城堡利害之實師期之緩急民情之戚休所以繫朝廷天下之體者則非臣之職而前此未之言也臣愚以謂畎畆不忘君者葢臣子之常守况臣世荷國恩乆叨器使今事有所覩而心有所懐詎當以非職為閒而隠黙自欺此臣所以自信不疑而欲言者也臣竊聞去年邉事之初議者謂夏人惛亂囚辱其長衆怨親叛席巻可平朝廷大治兵師諸道並進所向力戰而賊巢不拔則是與夫議者之言有間矣今朝廷㑹兵涇原欲為且城且戰之計臣以謂精騎二十萬聚於一方聲勢重大彼必清野以避我鋒決於它路犯邊以為牽制萬一乘虛入冦則事可憂兼涇原進築之衆所食粮米日將萬斛所築城堡不過一二而地里漸逺餽運無可繼之䇿時日漸乆丁夫有奔潰之虞當此之時勢必中罷豈不負陛下興舉之意而繫夷狄觀望乎矧所城堡障深在賊疆存守乆長豈敢自保此又不可不慮者也朝廷休養民力充實府庫久矣去歳兵師一出而公私困弊若此其甚今者再議大舉人氣事力大非去歲之比若今歲事功不就即來歲又將如何國財民力將何以繼此臣所謂攻討得失之勢城堡利害之實者也臣准制置司牒坐到調發時諸路兵馬之期皆在六月切計出兵之日決是初秋去歲涇原環慶兩路各以九月出兵比至中冬漸以還塞然猶士卒疾凍十亡四五今七月行師方是苦暑以二十萬之衆冒犯炎日或被堅禦冦或負重力役渴飲難周瘧痢多有復當大雨時行之月豈無霖潦之虞臣恐疾病傷殘有甚前日内外重兵上繫國體此臣所謂師期之緩急者也臣切見去年調夫出界其上等人户有至獨出數十夫之家其貧下人户亦須數戸共出一夫每夫雇直至百貫文又諸路轉運司接續調發至於再三其間凍餒艱辛若遇賊被害死亡凋弊乆未可復今兹再籍百姓巳諳事勢人必駭畏頗有逃散麰麥在隴秋禾將耘妨奪農時適於此日縁軍興大計動須人力臣等蒙朝廷誡以軍法責令趣辦若人户大段流移闗内騷動根本之地事有可憂異日言者必以臣等為歸咎之地一身之責無足自愛其如國事何此臣所謂民情之戚休者也臣切謂朝廷興計當萬全而不當幸一時之無事發而無成前車可鑒臣切與老於邊事之人曲折講議事可寒心而中外之臣妄意朝廷謀身畏禍無有為陛下言者臣獨何人特以忠義所激不復以職事為閒寧受盡言之罪於今日而不忍被不言之罪於它時故敢以所得衆人之論昧死以聞貼黄臣非不知危言横議自速罪悔切以謂今日盡言葢無負於陛下雖即鼎鑊何所愧心若雷同衆人公肆欺罔茍幸目前之無事使昭昭公議壅塞不聞貽朝廷他日無窮之患非臣所知也今日之論誠若迂誕陛下異日當以為忠言元豐五年五月上時為陜西路轉運使上哲宗繳進後漢光武詔書范純仁後漢光武報臧宫等詔曰黄石公記曰柔能制剛弱能制彊柔者德也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不乆而亡舍近謀逺者勞而無功舍逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣德者彊有其有者安貪人有者殘殘滅之政雖成必敗今國家無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓㬰北狄尚彊而屯田警備傳聞常多失實誠能舉天下之半以滅大冦豈非至願茍非其時不如息人臣伏見夏國差人詣闕多日未見放回近日探到賊中事宜漸却添屯兵馬必是發情疑阻却欲别生邊患伏望聖慈以陜西生靈之故稍從其欲使復常貢庶幾可以罷兵俾華夏復見太平則陛下好生之德洽於生靈祖宗社稷享萬世之安皆在陛下一言之賜爾臣嘗讀後漢光武報臧宫馬武詔書良有深誡臣恐陛下欲聞謹録繳進惟聖心採擇元豐八年上時知慶州上哲宗乞還西夏六寨司馬光臣伏見神宗皇帝以夏國主趙秉常為臣下所囚興兵致討奮揚天威震動沙漠虜攜其種落竄伏河外諸將收其邊地建米脂義合浮圖葭蘆吳堡安疆等寨此葢止以藉口用為巳功皆為其身謀非為國計臣切聞此數寨者皆孤僻單外難於應援田非肥良不可以耕墾地非險要不足以守禦中國得之徒分屯兵馬坐費芻粮有乆戍逺輸之累無拓土闢境之實此衆人所共知也王師既攻靈州不克狼狽而歸卒疲食盡失亡頗多西人知中國兵力所至自此始有輕慢之心是以明年邊臣築永樂城敵潜師掩襲覆軍殺將乆之又舉一國之衆攻圍蘭州期於必取將士堅守僅而得全敵自是鋭氣小挫不敢輕犯邊矣臣聞此數寨之地中國得之雖無所利敵中失之為害頗多何則深入其境近其腹心常慮中國一朝討襲無以支梧是以必欲得之不肯棄捨二年前敵嘗專遣使者詣闕深自辨訴請臣服如故其志無他止為欲求其舊境而巳朝廷既許其臣服敵來請舊境朝廷乃降指揮其前則云所以興舉甲兵本欲執取罪人救拔幽辱非有意侵取疆場土地而已其後乃云止將已得些小邊土聊示削罰豈可更有陳乞還復之理此則朝㫖首尾巳自相違又興師本為振拔秉常拒命者國人之罪豈可更削秉常之地於理差似未安王者以大信御四海羌戎雖微恐未易以文辭欺也於是彼既失望憤怒怨懟移文保安軍辭理不遜云今來賀正旦人使難議發遣自是正旦生辰乃至陛下繼明皆不遣使入賀其不臣大矣然而去歲四遣使者詣闕弔慰祭奠告其母喪并進遺物禮雖不備稍示屈服臣切料虜意不出於三一者猶冀朝廷萬一赦其罪戾返其侵疆二者陽為㳟順使中國休怠隂伺間隙入為邊患三者乆自絶於上國其國中貧乏使者徃來得賜賚之物且因為商販耳昔衛貳於晉取戚田及衛人既服郤缺曰衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懐何以示德遂歸戚田於衛今西人所為如此朝廷既不能拒絶勿受其使又不能招納與之更始彼來則迎送館榖以賔客待之不來則一無所問日復一日將踰二年臣切意朝廷謂西人勢已衰弱心實内附故來則不拒去則不追置之度外不以為虞殊不思數年前王師大舉深入將士所過烈於猛火割其疆場屢請而不還彼怨毒欲報讎之心窺窬欲乘釁之意日夜不忘若渴者不忘飲盲者不忘視也譬如有虎狼在屋側垂頭熟寢人豈可見其不動狎而侮之循其頭躡其尾邪臣每思之終夜寒心以臣愚慮於今為之止有二䇿一者返其侵疆二者禁其私市何謂返其侵疆凡天子即位天地一新滌瑕蕩穢小大無遺昔趙佗自稱南越武帝倔彊嶺南漢文帝即位赦其大罪遣單使徃諭之佗稽首請服累世為臣李繼遷俶擾西陲十有餘年闗中困弊真宗皇帝即位赦其大罪割靈夏等數州除其子趙德明為定難軍節度使由是邊境安寧者四十年此乃前世及祖宗之成法非無所依據也今秉常之罪不大於繼遷也米脂等寨不多於靈夏也陛下誠能於此踰年改元之際特下詔書數其累年不來賀正旦生辰及登寶位等不備之禮嘉其弔慰祭奠告國母喪進遺物之勤曠然推恩盡放赦前罪自今後貢獻賜予悉如舊規廢米脂義合浮圖葭蘆吳堡安疆等寨令延慶二州悉加毁撤元係夏國舊日之境並以還之其定西城蘭州議者或謂本花麻所居趙元昊以女妻之羈縻役屬非其本土欲且存留以為後圖猶似有名禦夷狄者不壹而足俟其再請或留或與徐議其宜亦無所傷至於㑹州尚在化外而經略司遽稱熙河蘭㑹彼常疑中國更有闢境之心不若改為熙河岷蘭經略司如此則西人忽被德音出於意外雖禽獸木石亦將感動况其人𩔖豈得不鼓舞抃蹈世世臣服者乎議者或曰先帝興師動衆所費億萬僅得數寨今復無故棄之中國之恥也昔漢元帝棄珠崖詔曰朕日夜惟思議者之言羞威不行則欲誅之通於時變則憂萬民夫萬民之饑餓與逺蠻之不討危孰大焉遂棄之此乃帝王之大度仁人之用心如天地之覆幬父母之慈愛盛德之事何恥之有國家方制萬里今此尋丈之地惜而不與萬一西人懷怨憤之氣逞凶悖之心悉舉虎狼之衆投間乘隙長驅深入覆軍殺將兵連禍結如曏日繼遷元昊之叛逆天下騷動當是之時雖有米脂等千寨能有益乎不惟待其攻圍自取固可深恥借使敵有一言不遜而還之傷威毁重固已多矣故不若今日與之之為美也此國大事伏望陛下留神熟慮更與執政詳議以聖意斷而行之不可後時失此機㑹悔將無及何謂禁其私市西夏所居氐羌舊壤地所産者不過羊馬氊毯其國中用之不盡其勢必推其餘與他國貿易其三面皆戎狄鬻之不售惟中國者羊馬氊毯之所輸而茶綵百貨之所自來也故其民如嬰兒而中國乳哺之矣寶元慶厯之間元昊負恩僣亂屢犯邊境大入則大利小入則小利中國未嘗蹈其境破其軍擒其將屠其城者以其有害於社稷也而首尾六年元昊遣使因縁邊吏卑辭納欵頓顙稱臣原其私心未必不貪中國之財思和市之利故也舊制官給客人公據方聽與西人交易今私交易者日夕公行彼西人公則頻遣使者商販中國私則邊鄙小民竊相交易雖不獲歲賜之物而公私無乏所以得偃蹇自肆數年之間似㳟似慢示不汲汲於事中國由資用饒足與事中國時無大異故也陛下誠能却其使者責以累年正旦生辰及登寳位皆不來賀何獨遣此使者拒而勿納明勑邊吏嚴禁交易俟其年歳之間公私困弊使自謀而來禮必益㳟辭必益順然後朝廷責而赦之許通私市待之如初然邊民與西人貿易為日積乆習玩為常一旦禁之其事甚難何則若以常法治之則有司泥文動循繩墨審問證左追捕傳送之人停匿之家奏裁待報動涉半年如此則徒使邊民麗刑者衆獄犴盈溢而私市終不能禁也夫三尺之限空車不能登峭峻故也百仭之山重載陟其上陵夷故也今欲嚴禁邊民與西人私市須權時别立重法犯者必死無赦本地分吏卒應巡邏者不覺透漏官員衝替兵士降配仍許人告捉獲者賞錢若干當日内以官錢支給更不以犯事家財充如此縁邊六路各行得一兩人則庶㡬可以聳動人耳目令行禁止人不敢犯矣然人存政舉此事全在邊帥得人昔龎籍為河東經略使下令禁邊民與西人私市有熟户犯禁籍斬於犯處妻孥皆送淮南編管一境凛然無敢犯者其後施昌言為環慶經略使亦禁私市西人發兵壓境昌言遣使問其所以來之故西人言無他事只為交易不通使者懼其兵威輙私許之法遂復壞若邊帥未能盡得其人則此法恐未易可行不若前䇿道大體正萬全無失也元祐元年二月上初元豐末夏人欵塞請還侵疆不許至是臣寮多言還地者其説皆自光發之時為門下侍郎上哲宗答詔論西事范純仁詔曰勘㑹夏人自神宗升遐後遣使弔慰祭奠繼以告國母喪進遺物今者又復遣使入朝謝恩外示恭順稍可見矣然戎情狡獪難測如向者所得邊地雖建立城寨亦慮孤僻不易應援棄之則弱國威守之則終恐戎人在念卿乆在西塞深曉邊情宜罄嘉謀輔予憂勞可條具邊計合如何措置守禦親書實封聞奏毋拘以文臣切見夏國自朝廷用兵以來近漢之民頗失生業並寨二百餘里不敢耕種其國上下之人皆欲講和又自陛下臨御之初聖政鼎新凡有不便於民者悉為蠲除每詔令一下民間讙呼鼓舞以至印賣傳播謂之快活條貫此事即時聞於夷狄又邊上臣僚亦體朝廷意不縱侵擾以此夏國必謂朝廷待之異於前時所以遣使入慰探朝廷之意朝廷待其初來之使禮意既厚是以接續肯來以至累次不失恭順而終未敢復言請地者其意應為前來朝廷拒之太峻却慮啓口之後更失朝廷之意則和好愈難今夏人又將到闕願選擇押伴臣僚使與推誠語論因而談美聖政及陛下好生惡殺捨已從人之德彼必有所對答則夷狄之情亦可測見若有願和之意則可令押伴臣僚自作意度說與自用兵以來甚有陷蕃官吏軍民見在西界若夏國盡底納與朝廷待將虜到生口賜還夏國如有邊上未便之事亦可因而陳請朝廷必應量度應副彼若云前來巳曽請地入貢䝉朝廷不允則可答云前來請地乞貢是梁氏之意宜其朝廷不允今梁氏已死朝廷於國主必無所難彼若無對答則乞委延州趙卨宣布此意其肯還生靈及來請地則可曠然降詔許之亦不須疑其狡獪難測彼將陷蕃官吏軍民押在界上即却將向來所得邊地及城寨内外所居漢人寓户先次漸令移入近裏并勾集前後虜到夏國生口亦在界上先且立定誓表預約期日兩相交還如此措置則取捨有名於國威無損其有向來所得邊地雖是建立城寨其間實有孤僻不易應援供餉之處留之則戎人必須在念邊事難息若却換得陷蕃生靈不惟無損國體兼和氣充塞天地陛下聖德超越古今為中國無窮之利矣若趙卨諭意不肯換易及換易之後尚生狡計别有邀索則朝廷自可絶之嚴戒邊城堅壁静守任其所為如此則我直彼曲則人神共怒滅亡可待我逸彼勞則雖乆不來庭於王道無損所有交際及宣布之時其間合有意度節次更委趙卨條上不得落賊姦計臣倉卒略具大槩仰答聖問未能詳盡如蒙召對尚有口奏事件得以粗陳更在陛下擇而行之天下幸甚貼黄臣所知邊事只熟知環慶及粗知鄜延其他路分非臣所知臣今所陳乃王體當然為萬世之法非一時之利害也又其宣布意度及換易事節先須只作押伴臣僚及帥臣意度者切恐戎人萬一於應對之間失禮不遜則於朝廷無損又將來夏人回日必有答詔便可奬諭其累次遣使恭順及喻以解釋仇怨罷兵息民之意元祐元年二月純仁自慶州召入具奏乞賜宣召上殿面呈邊事奏入太皇太后遣中使以實封手詔賜純仁及吕大防令條具措置守禦純仁上此奏上哲宗答詔論西事吕大防臣伏准詔問戎人狡獪未測其誠心臣愚以為夷狄之情自古無信西夏自繼遷以來專事譎詐惟朝廷御得其道則詐無所施或失其方則驕而益肆待遇之體不可不審然以臣觀之今日夏戎之情略可見矣羌人重於酬報先帝舉大兵徑抵靈武幾入其國而不能以數萬人之衆入塞為報永樂諸將寡謀敗事使北狄僅得以藉口然自是王師深入不虞之咎非其本國舉兵之成功葢未足以為慮冦之無能為一也自來開邊進築之始冦必極力決争乘其未堅至於三四不能得而後已昨蘭州之城攘斥甚廣雖一再至争不能得去歳冰合遂不復來城既益堅冦望亦絶此冦之無能為二也比聞秉常極孱劣梁氏既死而秉常巳亡則内難未已何暇外圖雖使秉常得存亦不足畏今數遣使入朝而不早布誠欵者葢茍欲觀望遷延不敢先發以示弱以臣愚計切聞夏使旦夕到闕可使押伴臣僚且以私意問其來使今主上嗣登寶位自大遼諸國皆遣使入賀夏國是朝廷蕃臣何故獨不至以觀其意足以測其偽矣又詔問向者所得邊地雖建立城寨亦慮孤僻不易應援棄之則弱國威守之則終恐戎人在念臣以謂新收疆土議者多言可棄葢思之未熟也詔㫖以為弱國威真廟筭之逺慮然臣猶謂棄之不止弱國威而已又有取侮於四夷之端焉不可不審計也况蘭州西羌之地本非夏國封境又其君長嘗受朝廷禄秩元昊以來方盜據其地延慶城寨則接近漢界一旦舉而棄之未見其可今日措置之宜只可降詔下本路將㑹州一處更不攻取其蘭州及延慶兩路新建城寨只據見得地界守禦亦可以稍安敵情而為議和之計矣議者不過謂戍兵少則不足以出戰多則無力以供饋臣愚以綏蘭之地皆並塞美田増招民兵墾以足食則供饋之費省專事守計少存戰兵則騎兵可大減矣其増招民兵墾闢曠土分守戰之計減供饋之費如以為可即乞下臣條析子細利害又詔問邊計合如何措置向去如何守禦臣愚以為今日邊計惟擇將帥為先轉運使為次其他施設皆可取辦伏聞國初西戎之患多在環慶太祖皇帝擇姚内斌董遵誨二驍將以守二州租賦之入兵械之費一切付之而聽其自為西人畏之不敢入冦今以四海九州之力奉邊而不足太祖以二州租入之費禦戎而有餘以此言之守禦之方在於得人而已臣愚以陜西五路宜擇威名忠亮之人不限文武為之統帥其次以為將佐又擇公正强明之臣以為轉運使副俾各擇其才能以充其任使之屬官備邊之城專事守計而出戰救援之兵蓄於内郡平居則散而耕冦至則聚而守且為内郡之兵以援之視冦入之多寡深淺而必報之無使其得志亦不妄動以生事守兵雖見大利不得出戰戰兵雖見大利不得久在邊如此則費省而易供守堅而不墮其計矣元祐元年二月上時為吏部尚書上哲宗請以蘭州二寨封其酋長吕陶臣聞朝廷之安危不繫於疆土之廣狹中國之盛衰不在於夷狄之違順取與守難易不同其術内與外輕重各異其宜知守之為難則不敢易於所取知内之為重則不忍輕於事外此得失成敗之機昔之聖人大有為於天下者莫不欲震耀皇武以威四夷空其巢穴絶其種𩔖使之竄伏奔走而惟令之從其規模權略豈非恢宏深逺哉然終有所不為者恐不足以為後世利也臣恭惟太祖皇帝嘗出幽州圖以示趙普普對曰此必曹翰所為翰徃必可得幽州然陛下既得幽州則以何人代翰太祖於是黙然持圖歸内又聞太宗皇帝太平興國中既平汾晉車駕遂北征欲乘勝取范陽王師所至皆克捷降者亦衆竟以士卒疲頓轉輸迴逺乃班師而歸雍熙中又嘗詔欲親征㑹有歧溝之敗而止夫以二聖之睿謀英斷徘徊指顧而四海混合豈獨一幽州而不能取哉葢不欲以大定之天下而耗其力以事一方也恭惟神宗皇帝聖智髙廣有削平夷狄之志既取熙河又取蘭會方將一舉而滅西夏不幸棄四海矣則今日之計固宜權其輕重審其難易而決其予奪也夫元元之疲瘵可謂甚矣陛下深知其然加意惠養仁澤流行非特一事夙夜焦勞既勤且至然而邊鄙有深憂國家有大費則生民何時休息哉所謂蘭州定西城龕谷寨者久在封域之外一旦取而有之地不可耕而食人不可收而使而使廢垣頽壘如狐兔之穴輦金帛以具版築而郡縣力困於饋挽駈士卒以嚴戍守而肝腦或至於塗地今日運鏹數百乘明日致粟數萬鍾然後有累月之用環而視之則帑廪又空矣平居無事一歲之費凡二百萬緍烽候忽警安可勝計坐耗中國莫甚於斯如火銷膏不知自覺非朝廷之福也臣嘗觀有唐之盛其君臣不勤逺略不賞邉功者葢不欲使國家有虛名而生民受實害耳儻得無用地終則捨之或因而封其酋長俾之自守請舉一二以明之昔太宗既擒頡利割其故地置都督以統之擢酋豪為郎將者五百人又嘗克平九姓冊李思摩為可汗使率所部建牙於河北又嘗以䥫勒回紇等十三部内附遂置六府七州各以酋帥為都督刺史葢叛則誅之伏則懷之得推亡固存之義無逺戍勞人之役何必利其土地然後為勝哉魏鄭公禇遂良温彦博狄仁傑輩皆持此議莫不欲肥中國而綏生民也以今天下民力凋弊之後太母垂簾保佑聖君措置萬事尤宜安静以享太平之福彼窮邊荒徼無用之地固當割棄以賜其酋長如唐故事因而封之則一全恩信懐柔之體二息饋運轉輸之勞三則免攻戰死亡之憂朝廷大利莫過於此大臣之議遲遲而不及者必曰先帝神武聖機有鞭笞四夷之意復數百年陷沒之地其功可謂大矣其德可謂盛矣今輙棄之無乃隳大功損盛德乎臣愚竊謂不然中國之待夷狄者惟恩威二柄而已方其未服則威以屈其力及其既從則恩以懐其心於是取與之權我當兩得於内而逆順之勢彼不能逃乎其外先帝昔取之者威也故其力屈陛下今與之者恩也故其心懐然則何累於功德哉亦足以成先帝之志矣向日大臣不能堅守誓書沮折虜使乃捨㳂邊數百里襟要之地而與北狄矣豈數百里之襟要則可損而數城之孤虛則可棄乎且彼數百里者存之未有損去之未有益而遂去之此一州二寨去之則為利存之則為害而反存之又非通論也况守之與棄議不相須可與不可必歸於一有必可守之策然後有不可棄之理今一州二寨之地久陷異域一日復歸於我則事將至於必争争則有勝負是未可必守也處未必可守之勢持必不可棄之論臣恐異時之悔有甚於今日矣昔貞觀既平髙昌以其地為郡縣號西昌州魏鄭公諫以謂不出十年隴右且空既而置安西都䕶府調兵徒罪人以戍禇遂良諫以謂宜擇髙昌可立者立之召其首領悉還本土書皆不報其後突厥冦西州太宗悔不用禇遂良魏公之計抑可為今日監也臣願陛下叅酌古今之迹早決蘭州之議無使重困生民久生邊患則天下幸甚貼黄議者又曰蘭與熙河唇齒之勢今棄蘭州則熙河危矣臣則應之曰是不知本末而言也且熙河岷州通逺軍者本青唐棟戬故地分洮水之東西乃摩正之舊處其蘭州并定西城龕谷寨者乃夏國故地哈瑪爾所管土今若棄之哈瑪爾族𩔖惟知自保其巢穴而已安有既得故土而復侵他人之封境與青唐為仇敵哉則熙河一道自有青唐為之捍蔽也蘭州雖棄熙河不危明矣蘭州四向雖可種但屢為西人所掠是以不可得而食元祐元年閏二月上時為殿中侍御史宋名臣奏議巻一百三十八
