body:
  text: 宋名臣奏議卷九十九宋趙汝愚編刑賞門恤刑上真宗乞除非法之刑錢易臣竊聞聖人之為政也太上以仁其次以智仁智不行上下無信是以刑之設也蓋國家不得已而用之約禮從輕察罪肆赦聖人實有憫傷之心焉是以刑之用期於無刑爾非欲毒於民也凡考罪之獄則五辭五聽無有疑屈然後擇其時而行之古者痛其不可盡行乃施許贖之典則君之省刑愛民斷可知矣堯之時誅四罪止曰殛鯀于羽山竄三苗放歡兜流共工於其處然此四罪者皆殺戮滅絶之典也蓋堯之仁聖而四者雖凶尚惡言殺是故國之重者莫先乎刑刑之傷者無至於殺乃修其法式以節其用刑不本於法則刑黷刑黷則法無據法無據則國政暴國政暴則臣不敢言臣不敢言則一人專善惡之心以制天下燭理不及則幾於亂矣秦任商鞅仁智不行而厚於法天欲喪秦而始皇復酷於民棄三代之法恣一時之威行肉刑族誅之例為秦民者皆寃之殘害父母之體令受苦痛一人有過而九族遭誅漢祖既入關蕭何以文無害居宰相故約秦之法為三章文帝有德詔除肉刑此蓋秦漢是非明在簡䇿夫古之肉刑者劓椓黥刖之類然此刑者非死刑也以其身命尚存令受其刑後代尚以為虐而絶之死刑者有二焉大斬小絞絞者以首領猶全故分二等百代奉之以為常法有司承式罔敢增變竊見近代以來非法之刑不知建於何時本於何法律文不載無以證之亦纍代法吏不敢言而行之至於今日或行劫殺人白日奪物背軍逃走與造惡逆者或時有非常之罪者不從法司所斷皆支解臠割斷截首足坐釘立釘鈎背烙筋及諸雜受刑者身具白骨而口眼之具猶動四體分落而呻痛之聲未息置之闤闠以示徒衆四方之外長吏殘暴更加增造取心活剝所不忍言十五年前抗州妖僧造變數嵗前蜀部兩回作亂事敗之後多用此刑亦恐仁聖之朝不能除之則永為訛法今蓋以巳死之刑復加臠截斷割此即古五虐之刑不酷於今矣凡罪當死故重矣刑止於殺則絞斬行焉復使先受苦痛臠截斷割然後就刑然亦非欲黷於刑所貴誡於後人令無犯者臣淳化中寄居壽春縣見巡檢使生釘一賊而於集衆之際猶盜人物者此豈嚴刑可誡乎若使嚴刑可誡則秦之天下無一黔首為盜賊矣漢文措刑亦亂國矣三代以來當先刑矣齊之以刑亦不當言民免而無恥矣臣愚見以謂一人愛民民亦愛一人既愛於上則奉上而懼茍以嚴刑欲誡則懼未至而怨已深伏惟陛下仁理天下德感中外事天地如父母愛赤子如嬰孺僭偽悉蕩祥瑞疊現古帝王不能行之者皆行之近代未復古者悉復之臣恐近代非法之刑非陛下能除之則後代相承益為常行矣臣又竊見唐文皇以人之五藏繫於背有罪者仍不行鞭背慮傷其命故於今稱善理天下能保社稷皆曰文皇放死罪四百令歸畢農然後就法至期而無一人不到者此豈在嚴也且近廣州僣稱帝號理廣以酷死於毒刑湯煎鋸解靡所不至廣民怨之立於刀刃今之史傳貶以尚刑太祖神德皇帝平之而絶其法廣民於今歌頌鼓舞方保其生死亦無怨今或非法之刑不除亦恐政闕况割心刖脛獨夫受行之矣為萬古所笑今以此為刑臣恥之陛下亦必恥之非臣盡心報政孰肯言於陛下非陛下大聖仁慈孰能信臣而行之哉臣不勝深有所望乞自今後明下詔書斷天下非法之刑止存絞斬則仁政王道盡在此矣陛下從而行之則誅臣一身愚直之罪亦幸矣咸平五年上時通判蘄州上仁宗乞天下死罪皆得一覆奏燕肅臣竊考唐大理卿胡演進月囚帳太宗曰其間有可矜者豈宜一以律斷因詔凡大辟罪令尚書九卿讞之又詔凡決死刑京師五覆奏諸州三覆奏自是全活甚衆貞觀四年斷死罪二十九開元二十五年斷五十八今天下生齒未加於唐而天聖二年斷大辟二千四百三十六視唐幾至百倍京師大辟雖待覆奏而州郡之獄有疑及情可憫者至上請而法守多所舉駮官吏率得不應奏之罪故皆增飾事狀移情就法失朝廷欽恤之意望準唐故事天下死罪皆得一覆奏議者必曰待報淹延臣則以為漢律皆以季秋論囚又唐自立春至秋分不決死刑未聞淹延以害漢唐之治也天聖四年上時判刑部下其章中書王曽以謂天下皆一覆奏則必死之人徒充滿狴犴而久不得決請獄疑若情可矜者聽上請遂下詔曰朕念生齒之蕃扺冒者衆法有髙下情有輕重而有司巧避微文一切致之重辟豈稱朕好生之志哉其令天下死罪情理可矜及刑名疑慮者具案以聞有司無得舉駮上仁宗論開封府公事不經紏察司引問范鎮臣等奏陳開封府勘到桑逹公事不經本司引問便行處斷雖攀援近例即元無正條乞今後一切編勑施行今月十九日準密院劄子節文右開封府緣有上件體例所乞今後一依編敕施行已奉聖旨不行臣等未曉此理檢會開封府前後承受特旨勘鞫公事本非因聖意有所喜怒皆是府縣失職不能禁姦姦發之後尚未舉覺致煩聖聰旁加采聽正是其救過茍免之際然則結案之後一行密問略辨白黑宜無所害何必深自蔽匿偷欲了當或內懷不辜無所申吐恐此但可以成獄吏舞文之敝而未足副朝廷恤刑之意也先帝聖德仁明欽恤庶獄以京師浩穰刑獄最繁故建設紏察一司令澄審真偽欲使凡受罪者自以不寃從建置以來每有大辟倍加精密此則先帝不敢兼於庶獄庶慎惟有司之任聖鑒卓然與文王等矣若以奉聖旨并中書密院所勘公事即不録問無乃非先帝之意亂有司之守大凡設法者必關盛衰以立制防因循以杜漸今既曲許聖旨中書密院所勘公事不復審察未見所以尊朝廷重刑罰之理而適足啓府縣弛慢不勤其職獄吏侵侮無所忌憚罪人銜寃不得告訴之弊此臣所不諭也又竊見朝廷舊法中外通制官府常守皆不許用例破條今或於四方承平之日京師取則之地刑獄極審之司人命至重之際特許廢條用例事理乖舛又臣所不諭也臣等蒙朝廷選委不敢不盡心誠望萬分有一可補聖政非欲採托錯失以為已能但先帝所謹者亦望陛下謹之刑不可濫敝不可啓條不可廢苛不可廣乞今後府司及左右軍巡大辟公事內雖係奉聖旨及中書密院勘送者案成之後一依編敕施行貴得允當嘉祐四年七月同劉敞上時為知制誥糾察在京刑獄上神宗乞春夏不斷大辟蘇頌臣伏思國家以仁思被冒天下祖宗重用刑辟陛下丕承謨烈憲章大備輕重得宜上自朝廷下及州縣遵守條詔無有違者雖笞杖之責不合法令未嘗輒行其已斷之獄猶加審察官司縱出者坐罰深故者或至廢斥而不用臣嘗謂自堯舜以來經史所著用刑詳謹未有及我朝之仁恕平允者也惟論決重辟猶不以時而議者未嘗及之誠恐亦為聖世當行之一事臣愚戇不識大理故敢以前古之説言之傳曰賞以春夏刑以秋冬是以三代之時春夏未嘗行誅殺也史載秦世四時行刑王莽盛夏殺人是皆譏其虐政也漢制斷獄報重常盡三冬之月蓋不於陽盛之時𠞰絶生命所以協天意助人情也東漢以後或行或否近世遂廢而不舉其説蓋患囚繫之淹久耳臣以謂獄官按鞫茍有連逮不以輕重追呼參驗動涉嵗時未嘗以淹久故釋而不問也臣愚欲望聖慈參酌古義采用周漢詔天下獄囚自非惡逆以上決不待時外其餘衆罪並俟秋冬論決免當溫和之日而有愁痛之聲亦足以成聖朝仁恩之美也且無知之民輕犯刑網殺之為可矜貸之為廢法萬一待決踰時或遇恩降得從末減是陛下不廢法而全人命者多矣恩威並行民知畏愛上當天心感召和氣誠太平之髙致也熙寧元年上時知審刑院上神宗論重辟數多吕誨臣聞先聖立法明刑者非以為治將以救衰亂之俗也然世輕世重因時之弊齊其非齊殺以止殺故犯治則重犯亂則輕斯馭威輔正之大要也降及三代稱治莫盛於漢唐髙帝約三章之始人心欣慰逮文景有刑措之風比隆成康貞觀中斷死刑二十九人開元中五十八人得為興隆之盛矣我朝興運一百餘年纍聖繼述仁德純被四方無事刑未至清天聖中嵗計重辟數千而後有增無減漢唐之天下亦今之天下漢唐之官政亦今之官政斷獄繁簡何其遼哉臣竊以古之新一號令必示於人俾其知禁命一官守必先風教今之所理與古相反夫訓道不明則愚民陷焉人有過教未施而刑已加焉欲遷善逺罪而道亡繇也任刑之失正在於此加以賦斂日急力役日煩山澤之利籠入殆盡生齒之聚遊手過半時豐儲嵗食者百無一二不幸水旱相繼流徙無定其等死則何所不至非不忌法勢使之然也矧閭井之人有不事事者悉皆循習以為常州縣熟視而不為除去姦吏養之以濟惡一有敗露抵法者皆良民平時誘脅之致職捕冦者罪爾朝廷推恩與時滌蕩每嵗曲赦三年大霈蒙活者雖衆自新者無幾重辟安得有少衰也觀今之用文大率生刑入於重死刑出於輕犯笞杖者在民則或黥或配在官則衝替停任皆出特旨犯絞斬則遂成疑獄奏讞既上則例皆曲貸舞文者附會其事出入死生在於掌握使幽寃無以訴刑之不清殆為此也廷尉天下取平之地今又欲以謀殺通守惠姦長惡莫斯之甚王符曰賊良民者莫大乎數赦孔明相蜀不赦而國治王通謂無赦之國其刑必平數子者皆知識幾深通乎世務豈無好生惡殺之意蓋知輔政之道本於無刑矣獨唐太宗用是而治嘗詔侍臣曰我有天下以來絶不放赦令四海安靜非常之恩也貞觀之刑不得不簡此其明效矣臣伏望陛下至明燭理盛德圖新總覽權綱欽恤刑典法網宜疏略使之易避禁防宜髙峻使之不越風俗大化屬於循吏號令謹於反覆律文戒於搖動凡有赦恩無失有罪唯有詿誤與之原免仁慈如是而推廣則天下之訟必清重辟之奏必簡太平之治不難成矣狂愚所慮仰副明詔唯聖智詳擇海隅幸甚熙寧二年上時為御史中丞上神宗論肉刑吕公弼臣伏見韓絳嘗奏乞用肉刑今日陛下亦以為然絳又言假如折一支去一指有何不可况堯舜尚用之此徒信古之論不適時變自漢文感一婦人之言罷肉刑而天下歸仁逮今千餘年一旦暴行之駭四海觀聽况古雖有肉刑之法在堯舜之世亦未嘗行之書曰象以典刑流宥五刑堯舜之世用流以寬五刑也若四凶者止於流則五刑無所施焉臣願陛下上法堯舜下體漢文無取迂儒好古之論陛下病今之犯刑者衆臣願審擇守臣宣布惠愛使民各得其所則民不犯上矣今不究其本而徒更其刑辟臣恐民心一駭而動後雖欲全撫之未易安也熙寧二年五月上時為樞密使上神宗論近嵗刑獄枝蔓文彥博臣竊見近嵗以來中外刑獄頗有枝蔓淹延大暑盛寒縲繫囹圄其間豈無寃滯感傷和氣朝廷每至盛夏必行踈決或水旱為災原減輕繫此聖慈欽恤之至也然守臣獄官鮮能上副陛下之意有傷仁厚之化夫刑者所以輔教聖人不得已而用之故三王任德不任刑以德為陽居大夏生成之時以刑為陰居大冬不用之處所施輕重昭然可知臣不敢以經史逺事言之竊以唐之憲宗號為中興任德任刑頗得其理嘗謂宰相曰于頔懷姦勸朕任刑欲朕失人心也且聖人感人心而天下和平人主而失人心邦本何由寧固臣以謂今之牧守監司宜得明惠厚重之人宣布朝廷寬大之澤施豈弟之政變刻薄之風則太平之隆可垂拱而致元豐三年九月上時為太尉開府儀同三司復判河南上哲宗乞遵祖宗舊制降詔恤刑范祖禹臣近準中書省録黃節文尚書省檢準元祐敕諸獄暑月五日一次湯刷枷杻其罪人以時沐浴五月二十五日奉聖旨令刑部遍下諸路開封府界今後每嵗暑月依上條施行者臣檢會祖宗舊制每嵗冬夏降詔恤刑自太宗皇帝雍熙三年以來纍聖遵行未之有改至熙寧二年編修中書條制所奏委逐路提點刑獄司每嵗於四月十月檢舉牒逐州長吏訖奏臣竊惟祖宗欽恤庶獄特從朝廷降詔蓋當盛暑大冬之月使普天之下至於海隅狴牢囹圄之中皆知聖主深居九重而憫念及之此所以為仁恩也今令刑部遍下諸路雖重於提刑司檢舉然州縣奉承宣布及書之史册猶未若恤刑之詔臣竊惜之欲乞依祖宗舊制令學士院每嵗冬夏降詔仍自今年十月為始以副陛下恤刑之意元祐五年六月上時為給事中上哲宗乞用中典勿尚嚴刑為威范祖禹臣竊以先王欽恤庶獄務在於寬刑期無刑蓋非得已也國家一祖五宗以聖繼聖以仁繼仁哀矜於民率用中典此所以祈天永命垂百三十年太平之本也臣伏覩陛下聖性仁厚有堯舜成康之質比聞有司奏獄多務從寬臣願陛下長守此意操之勿失有勸陛下嚴刑峻法以威肅四方者宜拒而勿聽陛下為民父母海內皆赤子也人君之勢其尊如天其不測如神誰敢不畏何患威之不立而必嚴刑以肅之惟陛下聖意專主於寬仁如天地之涵養萬物則刑罰庶可清省矣臣久侍經幄無所裨補今將逺違左右思所以助陛下施陰德益福祚結人心者莫先於此故不敢不言伏望陛下深留聖心天下幸甚紹聖元年四月上時出知陜州自宣仁上仙熙豐餘黨復用盡變更元祐政事欲以嚴刑峻法陷害忠良祖禹逆知其意故臨去上此疏議獄上仁宗乞今後詳審庶事毋輕置詔獄吳育臣聞先王凝旒黈纊不欲聞見人之過失有犯典憲即屬之有司按文處斷情可矜者猶或特從寬典如此則恩歸主上而法在有司人被誅殛死亦無憾祖宗以來不許刑獄司狀外求罪是以人人自安近傳三司判官楊儀下獄自御史臺移勘都亭驛械縛過市萬目隨之咸共驚駭不測為何等大獄及文案具乃止坐請求常事非有枉法贓賄又傳所斷罪名法不至此而出朝廷特旨恐非恩歸主上法在有司之意也且儀身預朝行職居館閣任事省府使有大罪雖加誅斬自有憲章茍不然者一旦至此使士大夫不勝其辱下民輕視其上非所以養廉恥示敦厚也自古刑獄滋彰之時誅家滅族寃枉大半大抵雷霆方震人莫敢言有司以深就深各圖自免或因而為利以希進取使君恩不得下逹人情不得上通感傷至和災變百出陛下為四海愛戴之主忽使道路之口紛紛竊議朝廷之士人人自危此臣所以深為陛下痛惜之也若儀罪未斷臣不敢言今事已往且無救解之嫌止祈聖神此後詳審庶事毋輕置詔獄具案之上自非情涉巨蠧且從有司論讞不必法外重行如此足以安人心靜風俗養亷恥召和平天下之幸也慶厯八年上時知陜州上仁宗乞發遣親事官吳清等照證公事傅堯俞臣近曽上言乞發遣親事官吳清等赴開封府照驗張文政公事至今未蒙施行臣竊思之深為不便豈有報人殺人不從對辨獄詞未盡寃抑可虞固非陛下仁惻恤刑之素意也臣伏料陛下非惜此數人但欲知外事恐沮塞之今後不敢報耳以臣所見實未為得若付之所司辨其是否而賞罰之則實事日聞於陛下惟慮言者多耳儻但縱之使言一切不問則以賕結之者有罪不發以事忤之者無過被報雖刺告盈前於陛下何益適足以煩刑禁而搖善良之心况今吳清等事與前後不同本屬城南地分乃報城東公事事實當賞吳清等而罪城東探報之人事虛則吳清等豈得免責茍罔辨是非蕩無拘檢臣恐此曹過蒙優假因勢作威誣陷平民漸不可長必有謂若沮此曹則陛下無由知外事者以此誤陛下幸深思臣言則事理可見伏望早賜指揮發遣免致淹延刑禁且長小人之權臣不任懇激之至嘉祐六年十月上時為殿中侍御史裏行上仁宗乞發遣親事官吳清等照證公事司馬光臣等伏以祖宗開基之始人心未安恐有大姦陰謀無狀所以躬自選擇左右親信之人使之周流民間密行伺察當是之時萬一有挾私誣枉者則鈇鉞隨之是以此屬皆知畏莫敢為非今海內承平已踰百年上下安固人無異望世變風移宜有釐革而因循舊貫更成大弊乃至帝室姻親諸司倉庫悉被此屬量其過失廣作威福私受貨賂所愛則雖有大惡掩而不問所憎則舉動言語皆被捃托臣等嘗病國家擇天下英才以為公卿大夫而猶不可信顧任此厮役小人以為耳目豈足恃哉今乃妄執平民加之死罪使之幽繫囹圄橫罹楚毒幸而不自誣服僅能辨明若更不聽有司詰問元初巡察之人少加懲誡臣恐此屬無復畏憚愈加恣橫使京師吏民無所措手足豈合祖宗意哉嘉祐六年十二月上時為諫院上神宗論監司官所在多起刑獄張方平臣伏以國朝自祖宗以至陛下積德纍仁重用刑辟急深故之罪寬縱出之罰愛育下民若保赤子致其忠愛可謂至矣近年監司之官所在多起刑獄至於州郡常程公事方行推問未見情實或已經檢斷事理明白於法平允偶其所見愛惡異同即别差官置司推覆事本微小張皇為大因緣騷擾株連枝蔓至有往還數千里勾追證佐盛暑嚴冬淹留牢禁其中有罪犯絶輕亦有無罪之人一身久繫家為破散瘐病飢寒愁痛無告及其結正亦有不移前案者推勘官承望其意巧文鍛鍊雖是平人亦須有虛妄為坐以一州一路為率至於天下銜寃抱枉感傷和氣災害日生且獄者人命所係王者所當深重者也豈容官吏依勢作威事既自外專行朝廷亦無由知得臣到陳州方此親見自三月末赴本任至四月中所司呈公事一件稱有兵士指論冒請糧米事係是去年十二月狀自後行遣會問回報始到遂於四月十二日送司理院方行取勘文案未具當月十九日有轉運判官張次山到州點檢取索一宗狀詞將帶前去尋别差官置院推勘四月末所差官到院至九月初方始結絶歷一百二十餘日前後所經禁繫近六十人往還三千餘里勾追照證炎暑之月係纍道路自夏涉秋其間病患相繼亦有軍員枉遭刑禁及至斷遣並止杖罪推院繳送到所取欵狀二千一百三十一張淨案六百七十張諸雜行遣照證文字三十五卷當時若自本州勘結不過十餘日可了其滋章為弊如此今又有百姓樊宗望公事已經本州奏斷近轉運副使李南公到州點檢取索上件公案將帶前去又已差官令置院推勘臣詳樊宗望公事本州勘結頗巳詳允具狀聞奏法寺定斷尋已準朝旨斷放訖竊慮差官前來置院依前追擾淹延貧細之民飢寒失所欲乞特下法寺取索上件公案看詳委有情節不圎刑名差誤即乞别差官依公取勘施行緣此置獄之弊事干天下伏乞朝廷特降約束諸路非奉朝旨所置推院今推勘官候結案日具録監司所送公事因由據到院出院月日但係勾追禁繫人數於在禁日有無病患死亡所追干繫人州縣程途近逺及斷放刑名開坐申中書送御史臺或法寺看詳事狀其有不當置院推鞫或淹延枝蔓枉繫無罪之人諸有非理伏乞議其多起刑獄巧文鍛鍊之罪則刑辟慎而和氣感召矣熙寧五年五月上時知陳州上神宗論詔獄彭汝礪臣聞人主之所宰制羣動百官萬民如馭一馬進退逺近無不在我非獨威福之效也而有德禮焉上下之道報施而已上施之以禮則下欲報之以禮上施之以德則下欲報之以德其澤蓋非一世而已其遺波餘澤流溢漫衍及數十世而未已也朝廷數以疑似嵗起詔獄卿士大夫摽然懷茍免之心是故爭緣飾虛辭以為容悅故外有事君之禮而無事君之心造偽飾詐趨利亡恥其流及下浸不可止且古者於大臣其罪也甚章較明白尚遷就而為之辭况事或出於嫌惡而多在於疑似此不可不重也故詩曰伐木椅矣析薪杝矣木非不可伐然必椅之恐傷其性也薪之欲析必固杝之不欲逆其理也彼於物如此而况於人乎彼於民如此而况於卿士大夫乎且夫人主之威非特雷霆也而勢非特萬鈞也大臣之生死貴賤在人主而已是至微賤今以雷霆之威萬鈞之勢震壓於至微賤之身而阻之以虎狼之吏罪之以秋毫之法又逼之以狴犴桎梏之具待之如此何所求而不得者夫漢唐之臣入嬰冠冕退就囹圄朝坐廟堂暮戮都市以今視之至有禮也自祖宗以來愛養卿士大夫甚厚天下化之皆肅然有尊尊貴貴之心今廷臣輕於陷法於是浸益陵夷矣臣聞之君子言必慮其所終行必稽其所敝方陛下操與奪抑揚之柄以御羣下必不為已甚然末流之敝恐有甚於漢唐者夫舜咨四罪而天下咸服則刑罰雖盛世有不能無也至於以愛惡而議獄以疑似而論罪實非天下之所以望於陛下者熙寧十年上時為監察御史裏行上哲宗乞罷大理獄朱光庭臣聞易曰聖人以順動則刑罰清而民服恭以陛下上契天心下符人意凡一舉動莫非順理刑罰之清萬民之服適當今日竊聞詔委御史中丞劉摯右諫議大夫孫覺看詳大理獄探報不當事有以見陛下寬仁之盛德其大理獄從而可廢伏緣治獄自有開封府御史臺安用更致此獄且獄名不一非治世之美事又帝居之側豈當致獄之地凡為人臣者不務崇理義以輔太平而乃長刑罰以虧仁德不忠莫大焉臣竊見刑部侍郎崔台符戶部侍郎楊汲務為刻薄致位髙顯久任大理官稔為刑罰虧仁德之事乃不忠之臣也臣欲乞罷大理獄并黜崔台符楊汲刻薄不忠之臣於外俾天下知聖人唯尚仁德以化民則刑罰愈清而萬民咸服矣元祐元年上時為右正言宋名臣奏議卷九十九
