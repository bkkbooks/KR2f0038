body:
  text: 宋名臣奏議卷七十六宋趙汝愚編百官門朋黨上仁宗論公論朋黨繫於上意尹洙臣聞知賢而不能任任之而不能終於治國之道其失一也去年朝廷擢歐陽修余靖蔡襄孫甫相次為諫官臣知數子之賢且久一旦樂其見用又慶陛下得賢而任之所慮者任之而不能終爾以陛下知臣之明修等被遇之深豈有任之而不能終哉蓋聞唐魏元成既薨文皇親為撰碑文以賜之後有言其阿黨者遂仆其碑近世君臣相得未有如唐文皇與魏元成者間言一入則存歿之恩不終臣未嘗不感憤歎息而不能已也以是而論則知之任之為易終之實難可不慮哉屬聞歐陽修領使河北臣以邊任之重故不復以內外為疑今又聞蔡襄出知福州未審襄以親自請為以過斥若以過斥豈當進其官秩若以親請則襄在亰師不三四年巳再省其親士大夫去逺方而仕京師者孰不思其親豈獨襄得遂其私恩哉則襄之不當出明矣陛下優容諫臣在唐文皇上修等之才雖不愧古人然所施為未能少及於魏元成則間毁之言不必待其歿而後發也伏惟念知之之巳明任之之巳果而終之之甚難則天下幸甚然臣愛修等之賢故惜其去朝廷而不盡其才如陛下待修未改於初則臣有稱道賢者之美如其恩遇巳移則臣負朋黨之責矣夫今世所謂朋黨甚易辨也陛下試以所進用者姓名詢於左右曰某人為某人稱譽必有對者曰此至公之論異日其人或以事見踈又詢於左右曰某人為某人營救必有對者曰此朋黨之言昔之見用此一臣也今之見踈亦此一臣也其所稱譽與營救一也然或謂之公論或謂之朋黨則公論之與朋黨常繫於上意不繫於忠邪此御臣之大弊也臣既為陛下建忠謀豈復顧朋黨之責但懼名以朋黨則所陳之言不蒙見采此又臣之深慮也惟聖明裁察焉慶歷四年十一月上時知潞州初吕夷簡罷相夏竦受樞密使復奪之代以杜衍同時進用冨弼韓琦范仲淹在二府歐陽修等為諫官石介作慶歷聖德詩言進賢退姦之不易姦蓋斥夏竦也竦御之而仲淹等皆修素所厚善修言事略不以形迹顧避竦因與其黨造黨論目衍仲淹及修為黨人修乃作朋黨論上之其言明切深得古今黨論之要其詞云臣聞朋黨之説自古有之惟幸人君辨其君子小人而巳大凡君子與君子以同道為朋小人與小人以同利為朋然臣謂小人無朋惟君子則有之其故何哉小人所好者利祿也所貪者財貨也當其同利之時暫相黨引以為朋者偽也及其見利而爭先或利盡而交踈則反相賊害雖其兄弟親戚不能相保故曰小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名莭以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣堯之時小人共工歡兜等四人為一朋君子八元八凱十六人為一朋舜佐堯退四凶小人之朋而進元凱君子之朋堯之天下大治及舜為天子而臯夔稷契等二十二人並列於朝更相稱美更相推讓凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黃巾賊起漢室大亂後方悔悟盡解黨人而釋之然已無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士或投之黃河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗世然皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二臣舜亦不疑而皆用之然而後世不謂舜為二十二人朋黨所欺而稱為聰明之聖者以能辨君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也夫興亡治亂之迹為人君者可以鑒矣上仁宗乞别白朋黨韓琦臣竊聞巳降詔書申誡朋黨此蓋陛下恢善治勸薄俗之深意也臣輒有管穴之見少思開助聖眀竊以自古迄今人臣在朝有忠賢有姦邪有好公之人有挾私之黨既為性之不同則各以類而相附大凡忠賢與好公之人建一事補一官則必公其是非蓋是者言是非者言非唯在於公故政化可興而邦家是賴此乃善者以類而進不可謂朋黨若姦邪與挾私之人建一事補一官則必私其是非蓋是者言非非者言是唯在於私致使白黑不分而上蔽主聽者真所謂朋黨也在聖君審而察之決而行之若有此等朋黨必望陛下重加貶責不可務寬俾其忠賢與好公之人以類而進姦邪與挾私之人以黨而退則朝廷清明朋黨自息也若但行詔諭未賜别白臣恐天下搢紳自今而後欲建一善事稱一善人必再三思之曰得無涉朋黨之迹乎則中道而止矣縱有忠義之人不顧形迹建一善事稱一善人若惡之者譛於上曰此朋黨之為耳則善事與善人皆廢而不用矣惟陛下熟察而必行之天下幸甚慶歷四年十二月上時為樞密副使陜西宣撫使上仁宗論小人欲害忠賢必指為朋黨歐陽修臣聞士不忘身不為忠言不逆耳不為諌故臣不避羣邪切齒之禍敢干一人難犯之顔唯賴聖明幸加省察臣伏見杜衍韓琦范仲淹富弼等是陛下素所委任之臣一旦相繼罷黜天下之士皆素知其可用之賢而不聞其可罷之罪臣雖供職在外事不盡知然臣竊見自古小人讒害忠良其説不逺欲廣陷良善則不過指為朋黨欲動搖大臣則必須誣以專權其故何也夫去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一一求瑕唯有指以為黨則可以一時盡逐至如大臣已被知遇而蒙信任則難以他事動搖唯有專權是上之所惡故須此説方可傾之臣料衍等四人非有大過而一時盡逐弼與仲淹委任尤深而忽遭離間必有以朋黨專權之説上惑聖聰者臣請試辨之昔年仲淹初以忠言讜論聞於中外天下賢士皆爭稱慕當時姦臣誣作朋黨猶難辨明自近日陛下擢此數人並在兩府察其臨事可以辨也蓋杜衍為人清修而謹守規矩仲淹則恢廓自信而不疑琦則純正而質直弼則明敏而果鋭四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹則力爭而寬之仲淹謂契丹必攻河東請急修邉備富弼料以九事力言契丹必不來至如尹洙亦號仲淹之黨及爭永洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤為彰著陛下素已知此四人者可謂天下至公之賢也平日間居則相稱美之不暇為國議事則公言廷諍而不私以此而言臣見衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨可謂誣矣臣聞有國之權誠非臣下之得專也然臣竊思仲淹等自入兩府以來不見其專權之迹而但見其善避權也夫權得名位則可行故好權之臣必貪位自陛下召琦與仲淹於陜西琦等辭至五六陛下亦五六召之至如富弼三命學士兩命樞密副使每一命未嘗不懇辭懇辭之者愈切陛下用之愈堅此天下之人所共知臣但見其遜避太繁不見其好權貪位也及陛下堅不許辭方敢受命然猶未敢别有所為陛下見其皆未行事乃開天章召而賜坐授以紙筆使其條事然衆人避遜不敢下筆弼等亦不敢獨有所述因此又煩聖慈特出手詔指定姓名專責其條列大事而行之弼等遲回近及一月方敢略陳數事仲淹老練世事必知凡事難遽更張故其所陳志雖逺大而多若迂緩但欲漸而行之以久兾皆有效弼性雖鋭然亦不敢自出意見但舉祖宗故事請陛下擇而行之自古君臣相得一言道合遇事便行更無推避臣方怪弼等蒙陛下如此堅意委任督責丁寧而猶遲緩自疑作事不果然小人巧譛已曰專權者豈不誣哉至如兩路宣撫國朝常遣大臣况自中國之威近年不振故元昊叛逆一方而勞困及於天下北敵乘釁違盟而動其書辭侮慢至有貴國祖宗之言陛下憤耻雖深但以邉防無備未可與爭屈意買和莫大之辱弼等見中國纍年侵凌之患感陛下不次進用之恩故各自請行力思雪耻緣山傍海不憚勤勞欲使武偹再修國威復振臣見弼等用心本欲尊陛下威權以禦四夷未見其侵權而作過也伏惟陛下睿哲聰明有知人之聖臣下能否洞見不遺故於千官百辟之中親選得此數人驟加擢用夫正士在朝羣邪所忌謀臣不用敵國之福也今此數人一旦罷去而使羣邪相賀於內四夷相賀於外此臣所以為陛下惜之也伏惟陛下聖德仁慈保全忠善退去之際恩禮各優今仲淹四路之任亦不輕矣惟願陛下拒絶羣謗委信不疑使盡其所為猶有禆補方今西北二敵交爭未巳正是天與陛下經營之時如弼與琦豈可置之間處伏望早辨讒巧特加圖任則不勝幸甚臣自前歲召入諫院十月之內七受聖恩而致身兩制常思榮寵至深未知報效之所今羣邪爭進讒巧而正士繼去朝廷乃臣忘身報國之秋豈可緘言而避罪敢竭愚瞽惟陛下擇之慶歷五年二月上時為河北都轉運使上仁宗論彼此立則朋黨分張方平臣觀古今治亂之變在上下之勢離合而已上下之勢合事無大不成上下之勢離事無小不敗况近司輔臣股肱同體協恭和衷豈容乖異竊聞中書奏事爭辨御前連日紛譁中外喧駭其於事理必有曲直伏以中書政本其所擬議即為命令無作好惡是謂皇極各詢所執何以適治歷代敗亂之兆皆由朝廷立彼此之論而已彼此立則朋黨分朋黨分則勝負生勝負生則攻奪作攻奪作則敗亂之所以起臣願聖心深鑒於此緣中書議論之事頗密外傳不審不敢以為言故陳理亂大體而已慶歷六年上時為御史中丞上哲宗進歐陽修朋黨論范純仁嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人也豫嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以誇耀於世又讀唐實録見文蔚等所為如此未嘗不為之流涕也夫以國豫人而自夸耀及遂相之此非小人孰能為之漢唐之末舉朝皆小人也而君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡矣夫欲空人之國而去其君子者必進朋黨之説欲孤人主之勢而蔽其耳目者必進朋黨之説奪國而與人者必進朋黨之説夫為君子者故常寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至於舉天下之善求其類而盡去之唯指以朋黨耳故其親戚謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者唯以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨得善者必相薦引薦引則謂之朋黨使人聞善不敢稱則人主之耳不聞有善於下矣見善不敢薦則人主之目不得見善人矣善人日遠而小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目必用朋黨之説也一君子在羣小人雖衆必有所忌而有所不敢為唯空國而無君子然後小人得肆志而無所不為則漢魏唐梁之際是也故曰欲奪國而豫人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之説人主可不察哉傳曰一言而可以喪邦者其是之謂歟可不鑒哉可不戒哉臣聞舉直錯諸枉則民服故陛下臨御之初舉用二三正人而天下悅服蓋有泰卦拔茅連茹彚征之象所謂上下交而其志同則陛下得以裁成天下之化而太平可致也近日頗有匪人架造謗言毁黷良善始以疑似之事玷汚一二忠臣漸興朋黨之名將以盡逐善類若陛下辨之不早必致邪正難分眩陛下知人之明失陛下求治之意浸成遁卦否卦之象則是小人道長亦恐聖功難成臣伏惟陛下深居九重博采羣議唯以至公臨御天下故進退百辟悉用臺官諫官之言然則臺諫之所風聞未必皆是善人之所好惡凡所彈奏亦在深詳臣又聞孔子曰衆好之必察焉衆惡之必察焉又曰鄉人皆好之何如曰未可也鄉人皆惡之何如曰未可也不如鄉人之善者好之其不善者惡之大抵善人少而不善人多則是君子不免為小人所惡故雖衆而必察若專取善人之好惡則不善之人架造之言易為辨明若不追監前言無由防其微漸臣竊見本朝歐陽修作五代史於六臣傳後論及朋黨之事輒敢備録上進伏望萬幾之暇略賜觀覽庶幾仰禆四聰之萬一也臣不勝區區激切之至元祐元年上時為同知樞密院事上哲宗乞明論朋黨所在王存臣今月十八日同三省延和殿奏論王覿罷諫議大夫除外任差遣事伏蒙陛下宣諭近日朝廷煞有朋黨臣與吕大防等奏陛下所謂朋黨乞明示臣等庶知懲戒既而不蒙宣諭臣退竊恐悚蓋朋黨者附下罔上紛亂邪正眩惑視聼陰為姦利此人臣之巨蠧而世主所深惡也漢之黨事始於甘陵二部浸淫不已至於衣冠塗炭垂二十年唐二李朋黨互相排斥凡四十年幾危朝廷國家慶歷間亦有朋黨之論當時富弼韓琦范仲淹等頗遭排擯賴仁宗盛德不至傾害去年因張舜民被貶自此議論之人分為二黨亦互相詆毁聖明燭知稍加擯抑今雖其勢頗沮而餘風未殄臣職預敦厲風俗常竊患之今蒙宣諭近日朝廷朋黨未審聖意謂庶官近侍邪抑謂執政之臣必是察見實狀亦當明諭中外厚加譴黜蓋執政之臣同心同德乃克濟務若審知有挾邪朋比之人不可一日使居此位居此位者須待以不疑若懷疑心則必有小人造作飛語乘間而進者倘陛下涵容不欲暴露而執事被疑各懷形迹其害陛下聖政為不細矣臣蒙被拔擢使預機政雖甚愚鄙然粗識為臣去就之節固無貪戀祿位之心所以夙夜黽勉欲效其區區者誠荷陛下不次之遇思有以補報萬一是以心有所懷不敢默默伏望聖慈因延和殿奏對明諭臣等以朋黨所在使得循省如臣迹狀有涉於此願從竄黜以肅在位臣不勝惶懼之至元祐三年五月上時為尚書左丞上哲宗論不宜分辨黨人有傷仁化范純仁臣昨日簾前吕大防奏蔡確黨人甚盛欲陛下留意分别臣奏以為朋黨難辨却恐誤及善人大防以臣言為不然以謂正人必去姦邪朝廷豈有含糊不問臣遂言此事正宜詳審不可容易大防亦取臣言乃云須當審細臣遂引王安石好同惡異之患再三奏陳然尚抱區區之誠未能少開宸聽退而憂惕不能自安然須至重復陳論以竭愚見庶禆聖政少答大恩竊以朋黨之起蓋因趨嚮異同同我者謂之正人異我者疑為邪黨既惡其異我則逆耳之言難至既喜其同我則迎合之佞日親以至真偽莫知賢愚倒置國家之患何莫由斯至如王安石自負學術即非全無知識止因喜同惡異遂至黑白不分引吕惠卿為大儒黜司馬光為異黨至今風俗猶以觀望為能後來柄臣固合永為商監恭惟仁宗皇帝政教施設實為帝王之師從諫審刑任賢容衆正與陛下今日之政相同慶歷中先臣仲淹與韓琦富弼同時大用歐陽修石介以夏竦姦邪因以疾其黨類彼黨遂起大謗誣先臣與琦弼有不臣之心歐陽修尋亦坐罪石介幾至斫棺其時朋黨之論大起識者為之寒心上賴仁宗容覆兩黨之隙帖然自消此事至今以為美談陛下聞之必熟則是仁宗所行陛下可以取為成法今來蔡確之罪自有國家典刑不必推治黨人旁及枝葉臣聞孔子曰舉直錯諸枉能使枉者直則是舉用正直而可化枉邪為善人矣又曰舜有天下舉臯陶不仁者遠則是用仁者而不仁者自當屏迹矣何煩分辨黨人或恐有傷仁化而况陛下聖度包容與天同德至公克已今古無儔前來特降詔書盡釋臣寮往咎不復究治恐纍太和自此內外反側皆安上下人情浹洽盛德之事誠宜久行臣心拳拳實切於斯仰惟皇慈深加采納天下幸甚元祐四年五月上時同知樞密院事上宣仁皇后論黨與類不同劉安世臣嘗於史册之間考前世已然之事蓋有真朋黨而不能去亦有非朋黨而不能辨者此實治亂消長之機不可不察也東漢之衰姦人先以黨事誅戮禁錮天下之賢者而在朝皆小人也故漢以之亡此所謂非朋黨而不能辨者也唐之季世牛李之徒迭進相毁巧詐傾覆而善人君子廢斥無餘其所用者皆庸鄙不肖也故唐以之亂此所謂真朋黨而不能去者也蓋君子之進則至公引類以報國小人之進則徇私立黨以固寵雖世主深疾臣下之背公成朋而小人窺見間隙閉匿其私陽若可信反指君子引類之公為有黨黨之與類相似而不同是非虛實間不容髮辨之不早遂生亂階此正人所以常被誣而小人所以常得志也祖宗逺鑒歷代之弊審擇耳目之官所以開衆正之路塞羣枉之門而近日士論稍有朋黨之迹深恐姦人乘主上沖幼陛下委任大臣之際陰引邪慝漸斥端士孤朝廷之勢而蔽人主之聰明盜刑賞之柄以快羣小之私意此弊浸長非國家之福也臣願陛下深覽前史之戒念終如始奬借臺諌以養多士敢言之氣庶能破姦邪之謀而消未形之變天下幸甚元祐四年上時為左諫議大夫上徽宗論不可去元祐之黨陳祐臣面奉聖旨計會左正言任伯雨同商量論列宰臣韓忠彥援引元祐臣寮事勘會元祐臣寮刑部岑象求賈易工部豐稷趙睿太常張耒楊康國吏部黃庭堅朝補之考功劉唐老司勳陳察人才均為可用特迹近嫌疑而已今若論列付之三省不免改易既非利害所繫徒有分别黨類之名天下之人且妄意朝廷逐去元祐之黨復興紹聖之政事異論蜂起愛惡相攻必復為異時之患目今紹聖人才比肩於朝一切不問元祐臣寮才十數人便輒攻擊是朝廷之上公然立黨也元符三年十一月上時為左司諌上徽宗乞戒朋黨之弊商倚臣嘗聞自古朋黨之論既起未有不為朝廷患臣不敢逺引漢唐敗亂之迹為今日戒臣竊觀紹聖元符間朋黨之説互作豈朝廷所欲為哉亦有傾危變詐之士日以飛箝捭闔為術奔走一二權臣之門陳謀獻計以意求合務希寵利遂使搢紳之禍幾半朝廷而班列為之一空五六年間海內多故君臣無間暇之日此陛下所親見也伏自陛下即位以來治尚簡靜以與天下休息更革庶事唯務便安進用羣臣不間新舊任賢以勿二去邪以勿疑由是朋黨之論不攻而判天下士大夫始得安枕而寢比下明詔以謂為政取人無彼時此時之别又以建中靖國元年為紀年之號則陛下切於致治之意蓋可見矣然臣竊聞近士人中或有乘時射利之徒伺候府第出入權門或巧締讒言以中人或妄生虛譽以舉類或倡異同之論以潛惑上聽或騰反覆之説以陰動柄臣或執異見欲以混淆人物之正邪或騁曲辨欲以變更朝廷之好惡假浮議以奪正任私意以亂公轉是作非駕虛為實豈顧紛紜之害理唯期協附以進身黨與漸成必壞風俗不行禁飭曷底靜安臣願陛下聽覽之際聖慮先及仍詔中書門下特行戒勵及出榜朝堂庶以少慰中外士大夫危疑之心知朝廷深惡朋黨之弊使善人君子可以存立則大中之道何患不建惟陛下察之建中靖國元年九月上時為殿中侍御史上欽宗論朋黨宜辨之於早余應求臣嘗觀李德裕李宗閔各分朋黨互相傾軋因小以至大因私以害公終成牛李之禍文宗患之而不能去每歎曰去河北賊易去朝廷朋黨難臣謂君子小人其勢不兩立猶如氷炭薰蕕之不可並也故君子得位則斥小人小人得路則排君子勢之必然無足怪也唯明君能辨其人為賢為不肖其事為公為私其言為實為誣其心為忠為邪則君子小人自判而朋黨不足患矣文宗暗君也不知察此而患不能去之豈不謬哉國家自元祐紹聖以來起朋黨之論幾四十年然猶假政事之異同以名之也近歲尤甚不問人之賢否㓛罪何如凡為執政所引用者皆指為某黨故有蔡黨王黨之目更相非毁迭為進退不復顧國家之大體唯恐其黨之不進也又其甚者蔡京一門父兄子弟之間自分黨與果何理哉此弊不除為患甚大陛下稟英睿之姿奮剛斷辨忠邪進賢退不肖必無疑二此君子道長而小人退聽之時也自今羣臣誰敢為黨者然而考之師言揆之物情咸謂一二新進大臣與前此用事者議論不能無不協趨向不能無少異已有分爭之語暌間之迹浸浸不已怨隙日深非特不能用心輔陛下惟新之政臣恐小人之黨日盛而君子獨立寡助朋黨之禍又甚於前矣伏惟陛下辨之於蚤壞植散羣無使滋蔓不勝幸甚靖康元年上時為監察御史上欽宗乞分别邪正消除黨與楊時臣嘗考漢唐之所以亡其始皆自於朋黨善乎歐陽修之言曰始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉所謂一言喪邦者其是之謂歟自蔡京用事始進朋黨之説以斥逐異已者使無敢言然後得以肆意無所不為馴致前日之禍上皇晚悟其非以搢紳賢能陷於黨籍形之詔旨而追悔不及此陛下之所宜深監而奉承之者也近聞士大夫間復有為朋黨之説以欺聖聽者或指為蔡黨或指為王黨或指為李黨夫以二十餘年之間而是數人者實秉國政天下之士不仕則已其仕於朝者皆其薦引也非蔡則王非王則李若盡指以為黨而逐之是將空國無人矣此言果行則搢紳之禍未有已時而國之安危未可知也然臣竊謂所以致黨論之興者抑有由矣蔡京之罪甚於王黼而李邦彥動為身謀首畫遁逃之計割地捐金質親王以主和議罷李綱而納誓書其誤國亦與京黼不殊今王黼伏誅而京父子止竄湖外邦彥猶未黜責公議未厭此論者所以疑有其黨也臣伏望睿斷取京父子與邦彥大正典刑投之嶺海庶允公議其間為蔡氏邦彥所用之人當一視之察其賢而用不賢而去分别邪正消除黨與則天下幸甚茍無事實概以黨附為言者是必姦人欲中傷善類不可不察也朋黨之禍昔人論之多矣唯歐陽修所撰五代史書其言最為詳切謹録進呈伏乞詳覽靖康元年上時為右諫議大夫五代史書已見前范純仁繳奉宋名臣奏議卷七十六
