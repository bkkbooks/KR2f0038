body:
  text: 宋名臣奏議卷三十三宋趙汝愚編帝系門公主上仁宗論福康公主選尚乞依五禮之名存其物數吳奎臣聞古者婚姻始用行人告以夫家采擇之意謂之納采問女之名歸夫廟卜而獲吉以告女家謂之問名納吉今選尚一出朝廷不待納采又公主封爵已行誕告不待問名而卜之若納成則既有進財請期則有司擇日宜稍依五禮之名存其物數俾知古者婚姻之事重而夫婦之際嚴如此則亦不忘古禮之義也欲俟公主出降日令李瑋家主婚之人具合用鴈幣玉馬等陳於內東門外以授內謁者進入內中付掌事者受之其馬即不入嘉祐二年同宋敏求韓維上奎時判太常寺敏求維知禮院上仁宗論皇女生疏決賜豫劉敞臣伏見今月二十八日疏決在京繫囚雖恩出一時然在外羣情皆云聖意以皇女生故施此慶澤恐非王者之令典也去年閏月已曾減降尚未半年復行此恩傳稱民之多幸則於國不幸一歲再赦好人喑啞前世明君賢臣論此詳矣雖成事不説臣願朝廷戒之又聞多作金銀犀象玉石琥珀玳瑁檀香等錢及鑄金銀為花果賜豫臣下自宰相臺諫皆受此賜臣謂無益之賜無名之賞殆無甚於此若夸示奢麗為世俗之觀則可矣非所以軌物訓儉也宰相臺諫以道德輔主為職奈何空受此賜曾無一言焉遂事不諫臣願陛下戒之伏惟皇天開祐聖德故後宫有多子之祥陛下當明謹政令深執恭儉以答上天之貺建無疆之基不宜行姑息之恩以損政體出浮冗之費以隳儉德臣雖鄙賤竊獨惜此故敢觸冒陳聞唯賜裁幸嘉祐四年四月上時知制誥上仁宗論兖國公主議行册禮胡宿臣今月二十一日草福康公主特進兖國公主制竊聞議行册禮然於事體頗有未便祖宗以來公主長主未有行此禮者昔漢明帝封皇子悉半諸國明德馬皇后曰諸子食數縣不已儉乎帝曰我子豈敢與先帝子等也唐正觀中太宗長樂公主將出降帝令有司資送倍於永樂公主魏徴曰不可引漢明帝之言為對且曰天子姊妹稱長公主加長字是有所尊崇或可情有淺深無容禮相踰越太宗然其言入告長孫皇后后遣使賜徴金帛陛下即位以來纍曾進封楚國魏國二大長主亦不曾行册禮今施於兖國公主是與大長公主相踰越兼以貴主之故賢妃亦蒙殊典有旨令進綸告不行册禮是母子之間一行一不行禮意尤不相稱書於史册後世將有譏議必謂陛下偏於近情虧聖德之美臣願陛下采漢明之言開文皇之聽遵祖宗舊典如國朝公主曾行此禮行之粗且無嫌如其不曾則宜且罷臣以陛下好忠諫納至言臣職在論思不敢緘默嘉祐六年六月上時為翰林學士上仁宗論召還兖國公主宅內臣司馬光臣近聞有聖旨令召前管幹兖國公主宅內臣二人復還本宅臣與楊畋龔鼎臣同有論列以為非宜未蒙允納臣聞父之愛子教以義方弗納於邪公主生於深宫年齒幼稚不更傅姆之嚴未知失得之理臣謂陛下宜導之以德約之以禮擇淑謹長年之人使侍左右朝夕教諭納諸善道其有恃恩任意非法邀求少加裁抑不可盡從然後慈愛之道於斯盡矣此二人嚮在主第罪惡山積當伏重誅陛下寬赦斥之外方中外之人議論方息今僅數月復令召還道路籍籍口語可畏殆非所以成公主肅雍之美彰陛下義方之訓也臣實憤悒為陛下惜之伏望聖慈察臣愚忠追止前命無使四方指目以為過舉虧損盛德非細故也嘉祐六年十一月上時同知諫院上仁宗論兖國公主宅內臣司馬光臣光曾上言為前管幹兖國公主宅內臣等過惡至大乞不召還近聞傳宣入內內侍省令押上件內臣梁懷吉赴公主宅依舊幹當外議喧譁無不駭異臣聞太宗皇帝時姚坦為兖王宮翊善王有過失坦輒盡言諫正王及左右皆患之左右教王詐疾踰月不朝太宗甚憂之召王乳母入宮問王起居狀乳母曰王本無疾但以翊善姚坦檢束太嚴王舉動不得自由鬱鬱成疾耳太宗怒曰朕選端士為王僚屬固欲導王為善今既不能納用規諫而又詐疾欲使朕逐去正人以求自便其可得乎且王年少不知出此皆汝輩教之耳命捽至後園杖之數十召坦慰勉之太宗非不愛其子也誠以愛之則莫若納之於善若縱其所欲不忍譴訶適所以害之也齊國獻穆大長公主太宗皇帝之子真宗皇帝之妹陛下之姑於天下可謂貴矣然獻穆公主仁孝謙恭有如寒族奉李氏宗親備盡婦道愛重其夫無妬忌之行至今天下稱婦德者以獻穆公主為首獻穆公主豈不知其身之貴哉誠以貴而不驕然後能保其福祿全其令名故也臣謂陛下教子以義宜以太宗皇帝為法公主事夫以禮宜以獻穆公主為法則風化流於四方聲譽施於後世今陛下曲徇公主之意不復裁以禮法使之無所畏憚陷入於惡觸情任性以邀君父憎賤其夫不執婦道將何以刑四方之風垂後世之則易曰家人嗃嗃悔厲吉婦子嘻嘻終吝此言家道嚴不可專以恩治也伏望陛下斥逐梁懷吉等復歸前來貶竄之處其公主左右之人欲使陛下召還梁懷吉等者皆教導公主為不善之人也悉宜治其罪而逐之别擇柔和謹願者以補其缺仍戒敕公主以法者天下之公器若屢違詔命不遵規矩雖天子之子亦不得而私庶幾有所戒懼率循善道可以永保福祿不失善名不然衆人所云甚可畏也嘉祐七年十月上時同知諫院上仁宗論主壻無過被譴𨽻臣有罪得還傅堯俞臣伏聞差駙馬都尉李瑋知衛州事事出倉遽驚駭物聽皆云李瑋素行循謹不聞有過一旦忽然斥逐居外梁懷吉本以罪謫非時召還朝廷事體乖戾為甚惟李瑋夫婦之際外人非所曉知在陛下父子之間賤臣不當開説然主壻無過而被譴𨽻臣有罪而得還使萬口籍籍傳相譏議非所以日新天德光裕時政者也恭惟陛下選瑋尚主之意蓋以寵榮舅家用報章懿皇太后顧復之恩耳當時天下聞之莫不感歎悽惻相勸以孝今聞者未達陛下之心不得不為驚駭況諸主以次成長舉動尤宜重伏望陛下屈意深念不使懷吉徼幸以嚴後戒不使李瑋危疑以全初寵精擇宮嬪以道理磨切貴主則陛下之孝心增廣貴主之浮謗將息區區之心冀陛下加察嘉祐十年二月上時為監察御史裏行上仁宗論兖國公主入居禁中司馬光臣竊聞駙馬都尉李瑋出知衛州兖國公主入居禁中瑋所生母楊氏歸瑋兄璋之宅其公主宅祗應人等悉令散遣外議籍籍無不怪愕伏以陛下始者追念章懿皇太后選瑋使之尚主欲以申固姻戚富貴其家今以公主之故使李氏母子離析家事流落大小憂讋殆不聊生豈始所以結婚之意哉近者章懿太后忌日陛下閲奩中之故物思平生之居處獨無雨露之感悽愴之心乎臣愚以為陛下宜且留李瑋在京師其公主宅祗應人等除作過者逺加竄逐出外其餘並令如舊儲偫什物皆按堵不移以俟歲月之間徐以義理曉諭公主庶幾回意易慮率德遵禮復歸本宮則中外之情無不釋然公主必無復歸李氏之志者則今日致此衆議紛紜煩瀆聖聽皆由公主縱恣胸臆無所畏憚數違君父之命陵蔑夫家豈可使李瑋獨蒙斥逐出外而公主爵邑請受全無貶損非所以示天下至公之道也嘉祐七年二月上有旨公主降封沂國上哲宗論罷黜韓嘉彥彭汝礪臣聞治國者自家始治家者自夫婦始夫夫婦婦天地之道也隂陽之義也夫婦之分不正欲其家治家之政不行欲其國治未之有也周之王姬下嫁於諸侯車服不繫其夫猶執婦道以成肅雍之德詩人美之曰曷不肅雍王姬之車言王姬車服之盛宜以貴驕人而猶執婦道乃所以為美也其事在下然本乃在乎上故其詩曰平王之孫齊侯之子惟有平德故其人化之而有所不能踰惟有齊德故其人畏之而有所不敢違周之盛蓋始乎此夫婦父子君臣其義一也今嘉彥以不能下長公主而廢是婦得以勝其夫矣婦得以勝其夫是子可以勝父臣可以勝君其源一開其流有至於不可塞此不可不謹比聞朝廷無故而除三團練今又以私事而竄一都尉人皆以為政在房闥矣賞罰天之命也故雖朝廷之大人君之尊有不得而專之者天命何在至公而已詩曰無曰髙髙在上陟降厥士日監在兹事至微者天猶監之況其大者乎此不可不畏或曰皇帝陛下仁孝深至出於天性內思所以致皇太妃之敬外思所以致長公主之愛故有此行遣臣聞以道事其親之謂孝以義愛其骨肉之謂仁今使婦得以蒙其夫則人倫悖於上風俗壞於下必非皇太妃所欲為者也今雖能逐韓嘉彥然使謗議歸於朝廷譏誚行於後世所謂愛之適所以傷之也夫婦之情貴賤一也故雖有朝夕之小隙實未傷終身之大愛此惟陛下有以矜而察之而已夫天下至大一安一危指顧之間而已今陛下不欲拂於親而安行之大臣不敢拂陛下而順承之如此欲安天下國家未之有也惟陛下謹之毋忽紹聖元年春正月上時為吏部侍郎郡縣主上仁宗論李綬冒國親事包拯臣竊聞舊開礬鋪進納授官人李綬男與故申王宮承俊為親將就婚卺中外傳聞莫不駭愕檢會御史臺編敕節文應皇屬議親並令其門閥次第委宗正寺官審覆須的是衣冠之後非闒冗庸賤之伍富商大賈之門差涉不實會赦不原其罪仍仰抨彈之官常加采聽又太常禮院敕大宗正司奏不是工商技俳之家聽許為親其李綬男正礙條制竊以伉合之序貴於匹敵氏族之選屬在名勝蓋禮教之重所宜謹嚴人地之華必資參擇按李綬闒冗之餘軒裳所絶嚮緣進納已濫寵恩豈可更冒瀆國婚塵鄙公族使天支之季下偶非類汨紊國制虧損朝美臣請罷其婚姻别求德閥仍乞申命有司今後國親並須依敕選定皇祐三年上時知諫院上神宗乞郡縣主祗於見任文武官中選擇為親劉述臣竊以方今之患在乎官冗官冗由乎入流之衆所以賢不肖混淆耗蠧帑廪而困弊生靈者也今不早為裁節日引月長將如之何伏見皇族郡縣主出嫁其夫並白身授殿直內有閻閭之人但富於財者往往認他人三代有官職者冒為婚姻紊亂國經塵穢天屬莫斯為甚近制亦許就文資恩澤參以士人漸復唐制亦救弊之一端也以臣愚管見今後欲乞祗於見任文武官寮中元非進納出身者選擇為親內京朝官武臣與不隔磨勘特轉一官幕職官三考以上於銓格不妨磨勘者與轉京官州縣官令録資序與兩使職官判官簿尉齋郎監簿之類與初等職官該説不盡者乞從朝廷比類相度指揮所冀稍塞濫源漸清仕綴熙寧元年上時為侍御史知雜事上仁宗乞詳定袒免親婚姻條貫彭汝礪臣十二月論石有鄰與宗室議婚事後所聞益衆乃知上下安於此久矣而臣亦惑之不敢復置論體問宗正司條制雖言袒免親不得與非士族之家為婚然不知如何遂為士族又有不得與諸司出職工商雜類進納惡逆為婚之文止絶於緦麻親以上則既容袒免親與工商進納雜類為親矣以進納者為無礙則雖惡逆者亦可也臣伏思積厚者流長源逺者澤厚蓋以其有所自也天子之所親推而上之至於七世而不忘則推而下之至於所逺亦不可以不稱也今宗室雖係袒免親然皆出於祖宗而同繫於國體乃使汚穢荒逺皆得以貨取此非所以為祖宗光榮也今士大夫之族議親非以德望則猶以門閥或匪其耦則一族以為羞焉況於人君哉夫豪商大賈以財擅於鄉今輸金至三千及五千緡入為助教監簿而竊士族之名又捐數千緡求為宮親而遂得列為官戶竊寵蠧國依威陵弱豈止為國辱哉臣今欲乞詳定袒免婚姻條貫惟陛下念之元祐三年上時為起居舍人宋名臣奏議卷三十三
