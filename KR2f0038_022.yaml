body:
  text: 宋名臣奏議卷二十二宋趙汝愚編君道門詔令上上仁宗乞詔令先定議而後行孫沔臣竊聞景德中知制誥朱巽上言以所降命令不可屢改應合更張請先定議如經久可守者行之不可者止之真皇謂宰臣曰此甚識治體卿等志之故景德祥符之間每下詔令皆可遵守竊見近來臣僚凡有起請或陳利害隨即頒布略無詰難或未踰時或方經月有稱未便又復中變去嵗暴收錢稅今春權罷度僧之類是也故使如綸之言渙汗之號民未嘗以為必信恐非國家致治之道也臣欲乞今後中外臣僚有所見聞陳請者若言禮樂即下太常禮院言刑名即下審刑院言天下錢穀即下三司言民間利害即下轉運司小事半月中事一月仰所屬衆官將前後敕條詳定奏上如係制度大事即下兩制尚書省集議委中書門下更加省察然後施行亦朝廷謹重之意也康定元年上時為右正言上仁宗論中使傳宣諸司煩數張方平臣竊聞近日中使傳宣諸司頗為煩數其至三司日或數次臣聞王言惟作命百官承式洪範五事言曰從從作乂故王者之言是謂號令令出惟行不行則權綱虧矣今夫屑屑冗微之事皆賤者之所親責在攸司各有程式發輸督促動煩宣下所司既被受其有不可奉行者又須禀復或却寢罷下成廢命上為損威習以為常恬弗之怪欲乞今後除有指揮中書樞密院事特降中㫖外自餘細務合下三司提舉司開封府等處者只乞傳宣中書樞密院劄下逐處有司或敢違慢自應合行勘責即事干急速不容留滯即乞宣付入內內侍省相度事體緩急須即施行者具録宣㫖報下所司所冀出納有章上下得體慶厯元年七月上時為三司使上神宗乞追還陳習誤罰昭示信令韓維臣近嘗面奏降黜陳習有虧陛下信令理須追革自爾未聞别有處分尋屬迫近郊祠不及繼有論列臣伏以人主深居九重之中所以鼓動羣衆共成天下之務惟在號令而已則其出之豈可以不謹行之豈可以不信陛下即位之初命羣臣轉對其詔文曰斥言有位之阿私又曰郡縣之官課空文而尸素仰詳明詔之意是開羣臣以盡言使其抱負隱伏悉以上聞然後公聼審擇以輔初政之美陳習所言臣雖不盡知然聞其大略詆人過失耳使其所言而是乃所以上副詢求之意若其非也猶當含忍以勸來者今所言之事未察虛實而言事之人已加斥逐自違明詔之本意而失大信於初政未獲其補乃更有害此臣愚所未諭也昔晋文霸駮之君商君刻核之臣耳尚知假伐原徙木以著其信然後政令可得而行人民可得而使也豈以聖主而不務此乎議者或謂陳習素行非美今其所言頗挾怨害得貶不為不幸此又流俗不識大體者之言無足采信借使習實有此乃自匹夫之惡耳匹夫之惡不懲於朝政未為甚損而使天下之人疑陛下於不信臣竊以為害無大於此者陛下若不以此為失亟加追改而乃欲博詢細故以補聰明臣恐思慮雖逺而所及者愈近施設雖多而所得者愈少也伏望聖慈特賜指揮追還誤罰昭示大信熙寧元年十一月上時為龍圗閣直學士兼侍講上神宗乞追還陳習誤罰昭示信令王安石臣竊聞轉對官陳習坐言人罪惡被黜監當習之為人忠邪願奸臣所不知然陛下施罰如此有未安者二上下之所以相遇者詔令也詔令所以行於天下者信也詔令不信則人主之權廢矣故孔子以為兵與食皆可去而不可以無信今陛下命羣臣使斥言有位之阿私朋比尸素有一人言之則不考問其虛實而絀之則甚害陛下之信此未安者一也人主之聼天下不可以偏偏則有弊偏於惡言人罪則其弊至於姦不上聞真宗但惡人潛行交結隂有中傷故詔言事者不得留中此未有大失也然在位者遂以為人主厭惡言人之惡者其俗之弊乃至大臣奸邪贓汚而真宗終不得聞蓋言人之惡者既衆人所不喜而人主又厭惡之則其弊必至於此今有一人為陛下斥言人臣之罪未知其虛實而陛下遂以為大惡則今孰敢為陛下言人之奸者乎奸不上聞則雖大臣復有贓汚狼籍者陛下亦無由知之而天下之政壞矣此未安者二也臣聞人主之聼天下務在公聼並觀而考之以實斷之以義是非善惡皆所欲聞所不欲聞者誣罔欺誕之言而已即不欲聞人之惡則象恭滔天方命圮族非堯之所得知也堯所以能知共工及鯀之惡而又知舜之善者蓋以能公聼並觀不蔽於左右親習之人而考之以實斷之以義一切斥絶拒塞誣罔欺誕無義之言而已故書之稱堯者以其能疾讒說畏巧言非以其惡言人之惡也人主所以為賞罰者以善惡也欲知善而不欲知惡則是欲有賞而無罰也有賞而無罰有春而無秋非天地之道隂陽之理也臣愚以為陛下此舉過矣其作始則小其弊成於後則大不可不察也改過不吝者成湯之所以聖也伏惟陛下不吝改此則天下幸甚熙寧元年十一月上時為翰林學士上批陳習可特召還與依舊差遣上哲宗乞出令必使大臣協謀門下封駮劉安世臣嘗考載籍以推先王之道雖禮樂刑政號為治具而所以行之者特在命令而已昔之善觀人之國者不視其勢之盛衰而先察其令之弛張未論其政之醇疵而先審其令之繁簡惟其慮之既臧發之不妄而持以必行則堅如金石信如四時敷天之下莫不傾耳承聼聳動厭服此聖人所恃以鼓舞萬民之術也書曰慎乃出令令出惟行弗惟反易曰渙汗其大號傳曰令重則君尊又曰國之安危在出令凡此者聖人謹重之意也臣伏見朝廷命令變易頻數逺不過一二歲近或朞月而已甚者朝行而夕改亦有前詔未頒後令蠲除者吏不知所守民不知所從求其弊原蓋由講議未精思慮未審人情有所未盡事理有所未通或牽於好惡之私或溺於迎合之說是非無所辨取舍無所宗故一人言之而遽為之紛更也方安平無事之時輕慢多變之如此緩急有事之際何以取信於人伏望聖慈深鑒前古之戒謹為今日之慮至於法度之廢置政事之因革必使大臣公心協謀博詢利病廣攬詳擇務當義理更其所可更則不嫌於違俗守其所可守則無憚於襲故申敇門下無使徒為審讀以應故事其有措置失當前後謬戾者必舉封駮之職庶幾詔令清簡吏民信服事可久行不致反汗元祐元年二月上時為右正言上哲宗論安反側不必降詔劉摯元祐元年六月二十八日甲寅詔曰朕惟先帝臨御以來講求法度務在寬厚愛物仁民而搢紳之間有不能推原朝廷本意希功掊尅積其源流乃知其弊此羣言所以未息朝廷所以懲革也敕振風俗修整紀綱茲出大公蓋不得已况罪顯者已正惡巨者巳斥則宜蕩滌隱疵濶略細故豈復究治以纍太和應今日以前有涉此事狀者一切不問言者勿復彈劾有司毋得施行各俾自新同歸美俗布告中外體朕意焉臣聞朝廷議欲降詔中外慰安人情傳聞二三臣不敢信儻果如此臣實未諭伏見陛下即位以來修先朝政事增損法令進退官吏大要專以安民四方曉知上㫖坦然眀白矣至於懷私負釁貴近不赦而忠信之言雖小必録此又人皆能道之臣猶不知國家尚安所疑欲家至而户曉也若謂日者黜責一二臣僚恐附離黨與不無反側故以詔書安之臣謂人情無甚相逺不從上令而從其意動民以言不若示之以行事自古而然朝廷果將吹毛洗垢搜抉宿過則詔令隨行人亦不信今但朝廷罰罪之意出於公議惟責大體不問其餘則雖無所言何患人不知之近者朝廷法令方具功罪眀白吏民按堵自如正宜鎮靖無事而何故自生疑二猥欲望以言語區區過自分說以勝士大夫之心臣恐中外有以窺陛下也前世自漢唐以來因誅鉏叛逆或尅復僭僞危疑之始慮有動搖故亟下詔令慰撫未萌今升黜官吏何時無之何至張皇自生不安之意臣竊以為過矣抑臣聞之人才實難自非大奸大猾懷邪怙終此外安有終身棄置之理古人以功贖過所謂使功不如使過良以此爾前以罪退後以功進是乃國家所以公天下者見之一二則中外將不待言而信矣臣謂安反側計無以尚此何必空言哉伏望睿斷寢降詔之議免四方疑惑以幸天下臣不勝拳拳元祐元年六月上時為御史中丞始鄧綰責滁州言者未已范純仁勸太皇太后勿行太皇太后因欲下詔慰存反側既而中輟及吕公著救賈種民太皇太后復欲下詔公著以為當然遂從之或謂公著曰今除惡不盡將貽患他日公著曰治道去太甚耳文景之世網漏吞舟且人才實難宜使自新豈宜使自棄耶上哲宗論安反側不必降詔係第二狀劉摯臣近兩具狀奏乞寢罷降詔指揮未知聖意賜與不賜省察朝士大夫臆度風㫖轉相傳誦不無非議臣謂降詔本欲安人情而詔令未下事已宣露反使人情疑惑則利害固已可見甚非陛下鎮靜中外之意臣備員言路此而不論臣則有罪是以不避煩紊願畢其說臣謹按齊威公與管仲謀城莒謀未發而聞於國人國人曰君子善謀小人善意臣下竊意之也故朝廷之所不為則已茍有所為雖祕謀密計人且意而知之况陛下已修政事己清人物遂欲闊略細故含垢匿瑕示天下以寬大誠大惠也但此意一定何患人之不知若更施於間事一二則中外諭意坦然洞達矣何必空言喋喋過自分辨急於取信以害國家大體哉詔書大意不過以謂罪惡者已治欲使其餘改行自新恭惟先皇帝養育人才布滿內外其中邪慝不能無之今已行懲勸則是乃所以成就先帝之意若必形於詔書示蕩滌之惠使之自新則似分别前日政事虧損治道無大於此然則人情安與不安乃在陛下立意行事其實何如耳不在降詔詔下之後事體窒礙其害乃至如此臣願陛下深賜省照特罷降詔以全大體臣不勝拳拳元祐元年六月上上哲宗論安反側不必降詔朱光庭臣竊惟王者出號施令示天下之大信唯其合皇極之道上參天心下順物理使四海內外聞之欣躍鼓舞咸曰大哉王言故書載詩歌足以為世法蓋以至公至正而然也伏自陛下臨御以來天下之人上自公卿下逮民庶稱頌陛下之德謂歷古以來未見如此之公未見如此之眀故君子有以伸其直小人不得肆其罔而又信任俊哲放去姦回朝廷清明日就太平臣前日風聞朝廷將欲降詔慰安小人臣竊以謂剛陽之氣常在於生扶持保祐惟恐其不長隂邪之氣常在於殺消除殄滅唯恐其不盡夫剛陽則君子之道也陛下今日固進君子矣然扶持保佑願陛下加意焉隂邪小人之道也陛下今日固退小人矣然消除殄滅願陛下致力焉如此則天下常泰而不否矣臣竊聞將下詔書條列事目慰安姦邪之人今後更置而不問在聖度含洪則善然使姦邪之人有以增氣臣謂此詔不須頒下恐天下之人適足有以窺陛下臣愚不肖荷陛下盛德之遇今日有所懷不敢不竭盡於旒扆之前願陛下睿斷特賜追寢前詔更不頒行臣愚不勝惓惓貼黃今日之詔若遂頒行於天下臣竊恐姦邪小人日有浸長之漸執政大臣懷自安之私意致陛下大公至正之道有所不行今日於詔未下之間尚得進愚忠願陛下特賜采納收還前詔天下幸甚元祐元年六月上時為右正言上哲宗論安反側不必降詔林旦臣近者風聞朝廷欲降詔書戒約言事官不宜疾惡太甚動搖人心初聞之以謂此妄意朝廷之言耳殊不以為信既而傳者益衆不能不以為疑竊惟陛下臨政以還虛已聼納招徠讜言四方之人孰不欣戴此實宗廟社稷之福也今方踰歲若遂厭言有詔戒止凡傾耳以聼企足以望者得不解體耶此必有造謀以誤陛下者臣度其意不過兩端而已一則務為姑息以掠譽於小人一則持此自獻謂能不謗於先帝夫有國之要道在於使君子道長小人道消而已君子道長則德澤日被於天下而為朝廷之福小人道消則疾苦不加於百姓而得四方之心豈有為民除去疾苦而反致人心之不安也若此則虞舜不當放四凶孔子不當誅少正卯矣聖人於殘賊不仁之人殺之而不疑今朝廷寬大眀正其罪惡不過慰塞人望量其官職降其差遣而已何損於其身何愧於天下而便致人心不安也此等小人本無愛君利民之心人疾之久矣又何足矜恤而更姑息之此甚倒置也且先帝聰明睿知憂勤庶政不愛髙爵重祿而與士大夫共之乃望其盡忠竭誠以報稱其恩寵也彼乃結黨相因公肆欺侮醜穢慘虐無所不至使上之人雖有良法美意而澤不下流隂受小民之怨望其負國罔上之罪何可勝誅也向日執政之臣言事之官目擊耳聞不肯以告故使朝廷未正其罪今罪惡悉已暴露然朝廷終不忍深誅而顯戮之雖有貶降亦只是奉行先帝聖意譴斥不忠不良之人且示天下以前日失當之事自各有建言之人奉行之吏非出於先帝之本意也如此豈得為謗先帝乎大凡言事之官招仇觸怨豈所欲為朝廷過奬借之猶有畏懼觀望而不肯盡言者况又有所沮抑之則彼安肯奮不顧身以輸忠於陛下乎臣竊恐由此遂使亮直之人反為羣小指笑玩侮心懷畏避而不得安其位矣若其言事彈擊不實喜怒任情朝廷摘示羣衆罷之可也竄之可也但不當泛下一詔均沮遏之耳今日朝廷正恐姦邪乘間作過惟藉耳目之官防察糾正若自為壅蔽以啓小人之幸則此後執政大臣欲進擬前日不忠不良罪慝顯著之人置在要近誤朝廷委任遂有以藉口而鉗閉臺諌官之言矣此甚非計之得也臣不敢恥過作非而重於立位止是愛惜國體恐天下之人誤認朝廷之意而起疑惑觀望之心爾利害所繫不少願陛下謹之重之貼黃稱陛下去嵗即位之初首下求言之詔其間嘗以迎合扇搖犯分要譽為戒當時中外欲言之人尚畏憚而結舌賴六月再申詔諭於是人始敢言以求言之詔少形戒約人猶不敢言况今下戒言之詔明使不得論列則又豈復有敢言者耶若姦邪進用略有指陳以為犯令若默而不言豈忠臣志士所以事君報國之義乎則此詔一出於國體所繫可謂甚重陛下不可以不慮也元祐元年六月上時為殿中侍御史上哲宗論安反側不必降詔王巖叟臣纍日來風聞陛下欲降詔書以安人心反側則臣不知果有果無然臣既有所聞不可不先事而言以備采擇未審此事出於聖慮耶出於左右者之謀耶出於聖慮則臣以謂陛下私憂過計耳出於左右之謀則臣以謂誤陛下矣自古以來朝廷黜邪退姦亦是常事何須過以為憂反動姦人之心將謂陛下畏之必潛增凶焰隂造禍機傾搖善良窺伺新政矣可不戒哉伏惟陛下即位以來上合天心下從民欲斥逺姦邪奬崇忠直納天下善言而不厭革天下弊事而不疑故能使四夷靖安百姓歌詠以為復見祖宗太平之盛陛下惟當日篤此心隆此道以永社稷無疆之休不宜少移初意也夫姦心抑之且不可止况於進之直言求之且不可得况於沮之長君子而消小人在陛下一言長小人而消君子亦在陛下一言此國家否泰之關而天下治亂之機也陛下不可不深思不可不預防臣恐詔書一出則言之後時故冒犯而先論願陛下納臣愚忠收詔勿下使羣邪自靜以養朝廷之威衆正自安以重國家之勢天下幸甚貼黃稱臣竊思降詔之後老姦宿邪則安矣而忠臣義士必不自安陛下方求天下大治以追祖宗之盛而使忠臣義士不得盡其心非陛下之福也願因臣之言反復思之重此詔書之發幸甚舜去四凶當時四凶之黨不應無人尚在中外未聞下詔安四凶之黨也臣自風聞下詔寢食不復自安必料陛下畏見多言故有此指揮不知令臣今後如何居職有言則犯令不言則負恩進退之間未知所處幸陛下察之無誤此舉言事官當忠於主上公於天下是為稱職忠則不肯立朋黨故言無所隱公則不敢任喜怒故言無所欺或朋邪罔上或意在報私或厚誣其人或以訐為直或隂懷顧忌則陛下當深察其情罷之則可也竄黜之則可也以約束一切閉其言則不可也如果有詔書即望陛下采納臣言只作聖意取入禁中以安言路之心元祐元年六月上時為左司諫上哲宗論安反側不必降詔係第二狀王巖叟臣前日以風聞欲降詔書安搢紳之心輒犯天威論奏不便乞收詔勿下深慮言之未切聖心未加采納竊緣此事出於陛下舉動所繫國體至重臣不敢茍且自安便為俯默負陛下平日待遇之意伏覩陛下即位以來惟以求言為盛德納諫為聖功天下風聞莫不鼓舞雖前代英主有所不及正宜日進此道不倦以終之以副天下之望今方踰年而遽下此詔雖名為安慰罪人其實乃約束言者竊恐四方流聞疑朝廷厭言而拒諫有損陛下盛美臣謂此詔之出上無益於聖德中無益於治體下無益於忠言惟是挫端良之心增姦邪之氣耳不獨如此而又將有人睥睨朝廷以為可以窺測侮易政令以為可以動搖自古欲治之主惟患言之不多天下之善惡有所不聞以塞其聰明未聞禁言者使之不言也言者言之陛下擇可行者而行之仰不纍陛下之明俯不失言者之職則言雖多而何傷臣初為諫官對於簾下親聞德音丁寧諭臣等曰天下之事無大小一一言來當一一主張臣感激至恩恨不傾瀝肝膽以為補報今日詔書臣所未諭陛下求言如此之切不應厭言如此之早也近古好諫莫如唐太宗敢諫莫如魏鄭公太宗一日問曰今日所行與往時何異鄭公曰貞觀之初恐人不言導人使諫三年以後見人諫諍恱而從之一二年來不恱人諫雖勉以聼受然終有難色太宗曰於何事如此鄭公遂一一陳之太宗曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論說過失甚驚公但存此心朕終不違公臣讀之至此每歎美太宗之服義景仰魏公之盡忠願陛下慕太宗貞觀之初心導人使諫羣臣亦當有希魏公事君之大節以報陛下者以詔書未宣布間惟陛下斷自清衷早賜收還天下幸甚臣不勝激切告忠之至貼黃稱臣竊謂進此說者非純誠愛君之人也或出於全身之謀或出於為子孫之計或出於養譽邪正之間欲收人情而兩得或出於懷姦計以誤陛下浸開間隙傾陷忠良援引邪佞復為前日之過深可懼也惟陛下精慮而深思之臣恐詔書既下端人正士知陛下有厭之之心不敢遑安稍自引去後來者必得循默之人以為稱職其次得茍且偷惰之人廢壞紀綱又其次得阿諛柔順之人靡弊政事皆所以為姦黨蔽下情欺罔之患復結矣陛下深居簾幃之中久而安之浸不復得聞天下之事此非陛下今日求治之本意也衆人之說皆謂詔書欲以安反側臣竊怪之所謂反側者乃前世伐叛討逆之後餘黨畏懼誅戮有懷生偷安之心當時恐其為變故以詔書安慰之乃禍亂之時姑息之事也今朝廷清明王道平直自以至公之理行典刑此曹何為而有反側之心陛下何憂而下安慰之詔甚無謂也下詔之後忠良之在近者日益踈則在逺者疑畏而不敢進姦佞之在近者日益親則在逺者踴躍而以類至此人情之所易見而事理之所必然者也元祐元年六月上上哲宗論安反側不必降詔係第三狀王巖叟臣自風聞朝廷欲降詔書安慰搢紳之心雖兩上章論奏不便以聞之未審故言之未詳臣今頗得大槩信如所聞甚可怪也事有大不可者三陛下豈容易而發竊知其間叙列先朝搢紳之惡無所不有雖云臣下所為然於先帝之明如何也陛下下詔之善意本在掩蓋前事不知反所以彰先帝之失此大不可一也陛下即位以來未嘗以喜怒愛憎妄責一人凡有所行必本天下公議大姦大惡不得已而黜者又曲從寬恕百分罪惡不過行一二分而已何有太甚之事今聞詔引疾之已甚之語如是則是陛下臨御以來所行之事皆為過當反成自誣以傷國家之體此大不可二也姦人誑惑陛下張大其事言人心反側故致陛下有下詔之意陛下何不自察今天下生靈之心安與不安何如往前今天下生靈之心所以安只因陛下明辨邪正黜去欺君罔上之人數輩耳若復見陛下姑息此曹未測將來之好惡則天下之心將疑而搖矣陛下之意雖以安罪惡不知反所以動天下之心此大不可三也陛下下詔未見一利而有大不可者三何可為哉臣非故敢逆陛下之情也蓋欲以惜朝廷之舉動全吾君之盛美耳夫為國之道惟渾然深厚示以無心泯迹言語之間使天下君子小人皆不可得而議乃為清寧之本也何為自生疑心無故下詔使天下可得而窺可得而議哉臣恐益為紛紛不能成清寧之治誤陛下初心爾願陛下拂除姦人先入之言省察愚臣繼進之說或䝉聖心曠然一賜開納臣今夕即死無所恨矣惟陛下憐其愚幸甚貼黃稱此事非臣一人之意臣博訪有識之士皆以為今已安靜不消降詔反動衆心臣復恐下詔之後吕惠卿張盛誠一之徒必生怨憾以為朝廷行法不平只爭詔後詔前有幸有不幸臣以謂若不下詔則都無此迹也元祐元年六月上上哲宗論安反側不必降詔王覿臣伏聞近者朝廷以放黜一二大姦十數巨蠧恐人情不安將下詔書以安之又將戒言事官凡臣寮舊惡不得復言臣固未詳其虛實誠出於此臣恐四方有識之士輕議朝廷也其狀於今月三日投進訖臣今又聞詔書有言者勿得彈劾有司毋得施行之戒竊以為過矣夫為陛下之耳目者言事官也為陛下之股肱者有司也小人情僞萬狀宿惡舊姦初多隱伏幸而發露著見則言事官論之有司行之然後小人不得大肆而朝廷清明陛下可以無為而治矣若小人之宿惡舊姦發露著見而言事官鉗口而不得言有司束手而不得治則小人肆行而無所憚矣使小人肆行而無所憚則欺君壞法蠧民害物者蜂起鱗集而爭奮矣朝廷尚安得清明陛下尚安得無為而治哉或言事官忠憤而違詔以舉職有司疾惡而違詔以行法則陛下之詔書乃成虛設言事官有司之違詔者亦不為無罪又須按治則綱紀紊亂賢不肖混淆而意外之憂智者有所不能謀賢者有所不能救矣夫君子小人勢不兩立而迭為盛衰者也故在易君子道長小人道消則為泰小人道長君子道消則為否夫否泰者君子小人消長之間也今朝廷優恤小人而使言者勿復彈劾有司毋得施行是乃抑君子而長小人嵗月之間邪黨漸勝則天下不幾於否乎昔帝舜雖臨下以簡御衆以寬孔子雖謂人而不仁疾之已甚亂也亦未嘗聞箝言者之口而使不得言小人之姦廢有司之職而使不得治小人之惡也今陛下必欲下寬大之詔以安羣小之情則惟用闊略細故以諭之可矣何至壞朝廷之紀綱使小人舊姦宿惡之發露著見者其事狀雖涉於罔上亦一切不問而言者勿復彈劾有司毋得施行以為小人之資也伏望聖慈審繹之熟講之謹於出令無為異日之患天下幸甚貼黃臣待罪諫官專以論議政事為職朝廷進賢退不肖乃政事之大者也凡論人之賢不肖須以素履及已試之事驗之方可信據孔子曰吾於人也誰毁誰譽如有所譽其有所試矣雖譽之猶當以其已試之事况彈劾哉然則今日以往奉詔之後若論及臣僚之素履及其已試之事則不犯詔禁者少矣奉詔愈謹則諫官御史愈成虛設故臣知詔書中言者勿復彈劾有司毋得施行之語尤不可以宣示中外也貼黃借如臣僚或處權要今日以前嘗以罔上之罪今日以後方乃發露論罪則可録論詔則不可言居言責者守詔而不言則坐視侍從權要之地有罔上之人將為天下之大患違詔而進說則不惟廢朝廷之詔令而又將得違詔之罪進退猶豫而不能決則遂至於天下雷同而姦凶得志矣陛下如何處之言事官每月論列動觸權貴之怒豈若不言之安但不敢輒為身謀以誤陛下而已深恐詔令輕出之後不可追改竊聞詔書今尚未下惟聖慈詳酌元祐元年六月上時為右正言上哲宗論不可每事降詔蘇軾臣聞之孔子曰天何言哉四時行焉百物生焉天何言哉天子法天恭已正南面守法度信賞罰而天下治三代令王莫不由此若天下大事安危所繫心之精微法令有不能盡則天子乃言在三代為訓誥誓命自漢以下為制詔皆所以鼓舞天下不輕用也若每行事立法之外必以王言隨而丁寧之則是朝廷自輕其法以為不丁寧則未必行也言既屢出雖復丁寧人亦不信今者十科之舉乃朝廷政令之一耳况已立法或不如所舉舉主從貢舉非其人律犯正入已贓舉主減三等坐之若受賄狥私罪名重者自從重雖見為執政亦降官示罰臣謂立法不為不重若以為未足又從而降詔則是詔不勝降矣臣請略舉今年朝廷所行薦舉之法凡有七事舉轉運提刑一也舉職司二也舉通判三也舉學官四也舉重法縣令五也舉經明行修六也舉十科七也七事輕重略等若十科當降詔則六事不可不降今從一事一詔則䙝慢王言莫甚於此若但取諫官之意或降或否則其義安在臣願戒敕執政但守法度信賞罰重惜王言以待大事而發則天下聳然敢不敬應所有前件降詔臣不敢撰元祐元年九月上時為翰林學士知制誥上哲宗論敕榜當取信天下陳次升臣伏覩紹聖元年七月十九日責降吕大防等敕榜節文云至於射利之徒脅肩成市盍從申警俾革回邪推豫不忍之仁開爾自新之路除已行責降外其餘一切不問議者亦勿復言當是之時朝命初下萬口一辭歡呼鼓舞歌頌聖君含垢溥博如天包容如地不以一眚廢人此盛德之事也天下人心恬然安定近者竊見汪浹李仲送吏部與合入差遣録黃行下緣元祐所獻文字得罪則前件敕榜有其餘一切不問之語殆成虛文將何以取信天下傳曰王言如絲其出如綸王言如綸其出如綍言其已行而不可反也况夫揭榜朝堂遍牒中外明示臣庶俾懷悛革自新之心行之未幾今乃録下浹等得罪之由又如此臣恐虧朝廷號令之信有傷國體伏望睿㫖檢㑹前件敕榜宣示大臣自今以始同共遵守庶使人無反側之心亦所以彰朝廷忠厚之德紹聖三年正月上時為殿中侍御史上哲宗乞寢罷編排元祐臣寮章疏指揮陳次升臣近奏乞宣諭大臣遵守敕榜其餘一切不問之語未見施行今聞差官編排元祐間臣寮章疏仍厚賞以告藏匿採之輿議實有未安須至再瀆天聼臣嘗觀漢光武誅王郎收文書得吏人與郎交關毁謗數千章光武不省㑹諸將軍燒之曰令反側子自安後世書之以為美談恭惟陛下即政之初揭榜許其自新是亦光武安反側之意今又張官置局吹毛求疵考人一言之失致於有過之地是前之詔令乃所以誤天下也後之敕榜又所以誑天下也命令如此何以示信於人乎昔成王與叔虞戲削桐葉為圭以與叔虞曰以此封若史佚請擇日立叔虞王曰吾與之戲耳史佚曰天子無戲言於是封叔虞於唐夫成王非輕其爵命也以王言惟行弗惟反爾矧今御史臺榜示朝堂進奏院遍牒天下惟患人之不知非特戲言而已戲言尚踐而行之豈有明揭榜示曉諭臣庶可反之乎伏望聖慈念光武安反側之言思成王遂削桐之封所有編排章疏指揮乞行寢罷紹聖三年正月庚子詔禮部員外郎徐君平詳定元豐八年至元祐九年四月終臣寮章疏及陳請事編類申納樞密院戊申次升上此疏時為殿中侍御史宋名臣奏議卷二十二
