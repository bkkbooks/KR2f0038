body:
  text: 宋名臣奏議卷一宋趙汝愚編君道門君道一上仁宗論人君之大德有三司馬光臣伏䝉聖恩不以臣無似擢臣為諫官臣自幼學先王之道意欲有益於當時是以雖在外方為他官猶願竭其愚心陳國家之所急况今立陛下之左右以言事為職陛下仁聖聰明求諫不倦羣臣雖有狂狷愚妄觸犯忌諱陛下皆含容寬貸未嘗加罪誠微臣千載難逢之際茍不以此時傾輸胸腹之所有以副陛下延納之意則不可以自比於人死有餘罪矣臣竊惟人君之大德有三曰仁曰明曰武仁者非區區姑息之謂也興教化修政治養百姓利萬物此人君之仁也明者非煩苛伺察之謂也知道義識安危别賢愚辨是非此人君之明也武者非强亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移此人君之武也故仁而不明猶有良田而不能耕也明而不武猶視苖之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治强闕一焉則衰闕二焉則危三者無一焉則亡自生民以來未之或改也臣不勝區區觸死忘生竊見陛下天性慈惠謹微接下子育元元泛愛羣生雖古先聖王之仁殆無以過然自踐位以來垂四十年夙夜孜孜以求至治而朝廷紀綱猶有虧缺閭里窮民猶有怨歎意者羣臣不肖不能宣揚聖化抑陛下之於三德萬分之一亦有所未盡歟臣聞春秋傳曰賞慶刑威曰君臣幸得以修起居注日侍黼扆之側伏見陛下推心御物端拱淵默羣臣各以其意有所敷奏陛下不復詢訪利害考察得失一皆可之誠使陛下左右前後股肱耳目之臣皆忠實正人則如此至善矣或出於不意有一姦邪在焉則豈可不為之寒心哉夫善惡是非相與混殽若待之如一無所别白或知其善而不能賞知其惡而不能罰則為善者日懈為惡者日勸善者懈惡者勸雖有堯舜禹湯文武之君稷契伊吕周召之臣以之求治猶鑿冰而取火適楚而北行也伏惟陛下少垂聖恩以天授之至仁開日月之容光奮乾剛之威斷善無微而不録惡無細而不誅則唐虞三代之隆何逺之有嘉祐六年七月初除中諌官上殿進有㫖留上仁宗論致治之道有三司馬光臣聞致治之道無他有三而已一曰任官二曰信賞三曰必罰康誥稱文王之德曰庸庸祗祗威威顯民言用其可用祗其可祗刑其可刑也臣竊見國家所以御羣臣之道纍日月以進秩循資望而授任茍日月積久則不擇其人之賢愚而置高位資望相值則不問其人之能否而居重職夫人之材性各有所宜而官之職業各有所守自古得賢之盛莫若唐虞之際然稷降播種益主山林垂為共工龍作納言契敷五教臯陶明刑伯夷典禮后夔典樂皆各守一官終身不易茍使之更來迭去易地而居未必能盡善也今以羣臣之材固非八人之比乃使之遍居八人之官逺者三年近者數月輒巳易去如此而望職事之修功業之成必不可得也非特如是而已設有勤恪之臣悉心致力以治其職羣情未洽績效未著在上者疑之同列者嫉之在下者怨之當是時朝廷或以衆言而罰之則勤恪者無不解體矣姦邪之臣衒竒以譁衆養交以市譽居官未久聲聞四達蓄患積弊以遺後人當是之時朝廷或以衆言而賞之則姦邪者無不爭進矣所以然者其失在於國家采名不采實誅文不誅意夫以名行賞則天下飾名以求功以文行罰則天下巧文以逃罪如是則為善者未必賞為惡者未必誅此陛下所以南面孜孜夙夜求治歷載甚久而太平未效者也陛下誠能博選在位之士不問其始所以進及資序所當為使有德行者掌教化有文學者待顧問有政術者為守長有勇略者為將帥明於禮者典禮明於法者主法下至醫卜百工皆度材而授任量能而施職有功則增秩加賞而勿徙其官無功則降黜廢棄而更求能者有罪則流竄刑誅而勿加寬貸如是朝廷不尊萬事不治百姓不安四夷不服臣請伏面欺之誅凡臣所言皆陛下耳所厭聞心所素知然致治之要無以易此知之非艱行之惟艱顧陛下力行何如耳敢昧死陳瞽言惟陛下裁擇嘉祐六年七月上有㫖送中書上仁宗五規司馬光臣竊以國家之事言其大者逺者則汪洋濩落而無目前朝夕之益陷於迂闊言其小者近者則叢脞委瑣徒煩聖聽失於苛細夙夜惶惑口與心謀涉厯纍旬乃敢自決與其受苛細之責不若取迂闊之譏伏以祖宗開業之艱難國家致治之光美難得而易失不可以不謹故作保業隆平之基因而安之者易為功頽壞之勢從而救之者難為力故作惜時道前定則不窮事前定則不困人無逺慮必有近憂故作逺謀燎原之火生於熒熒懷山之水漏於涓涓故作重微象龍不足以致雨畫餅不足以療飢華而不實無益於治故作務實合而言之謂之五規此皆守邦之要道當世之切務也伏望陛下以萬幾之餘游豫之間垂精留神特賜省覽保業天下重器也得之至艱守之至艱王者始受天命之時天下之人皆我比肩也相與角智力而爭之智竭不能抗力屈不能支然後肯稽顙而為臣當是之時有智相偶者則為二力相參者則為三愈多則愈分自非智力首出於世則天下莫得而一也斯不亦得之至艱乎及夫繼體之君羣雄巳服衆心已定上下之分明彊弱之勢殊則中人之性皆以為子孫萬世如泰山之不可搖也於是有驕惰之心生驕者玩兵黷武窮泰極侈神怒不恤民怨不知一旦渙然四方糜潰秦隋之季是也惰者沈酣宴安慮不及逺善惡雜揉是非顛倒日復一日至於不振漢唐之季是也二者或失之彊或失之弱其致敗一也斯不亦守之至艱乎臣竊觀自周室東遷以來王政不行諸侯並僣分崩離析不可勝紀凡五百有五十年而合於秦秦虐用其民十有一年而天下亂又八年而合於漢漢為天子二百有六年而失其柄王莽盜之十有七年而復為漢更始不能自保光武誅除僭僞凡十有四年然後能一之又一百五十有三年董卓擅朝州郡瓦解更相吞噬至于魏氏海內三分凡九十有一年而合於晉晉得天下才二十年惠帝昏愚宗室造難蠻夷乘釁濁亂中原散為六七聚為二三凡二百八十有八年而合於隋隋得天下才二十有八年煬帝無道九州幅裂八年而天下合於唐唐得天下一百有三十年明皇恃其承平荒于酒色養其疽囊以為子孫不治之疾於是漁陽竊發而四海橫流矣肅代以降方鎮跋扈號令不從朝貢不至名為君臣實為讎敵陵夷衰微至于五代三綱頽絶五常殄滅懷璽未暖處宫未安朝成夕敗有如逆旅禍亂相尋戰爭不息流血成川澤聚骸成丘陵生民之類其不盡者無幾矣於是太祖皇帝受命于上帝起而拯之躬擐甲胄櫛風沐雨東征西伐掃除海內當是之時食不暇飽寢不遑安以為子孫建太平之基大勳未集太宗皇帝嗣而成之凡二百二十有五年然後大禹之迹復混而為一黎民遺種始有所息肩矣由是觀之上下一千七百餘年天下一統者五百餘年而巳其間時時小有禍亂不可悉數國家自平河東以來八十餘年內外無事然則三代以來治平之世未有若今之盛者也今民有十金之産猶以為先人所營苦身勞志謹而守之不敢失墜况於承祖宗光美之業奄有四海傳祚萬世可不重哉可不謹哉夏書曰豫臨兆民凛乎若朽索之馭六馬周書曰心之憂危若蹈虎尾涉于春冰臣願陛下夙興夜寐兢兢業業思祖宗之勤勞致王業之不易援古以鑒今知太平之世難得而易失則天下生民至於鳥獸草木無不幸甚矣惜時夏至陽之極也而一隂生冬至隂之極也而一陽生故盛衰之相承治亂之相生天地之常經自然之至數也其在周易泰極則否否極則泰豐亨宜日中孔子傳之曰日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎是以聖人當國家隆盛之時則戒懼彌甚故能保其令聞永久無疆也凡守太平之業者其術無他如守巨室而巳今人有巨室於此將以傳之子孫為無窮之規則必實其堂基壯其柱石彊其棟梁厚其茨蓋高其垣墉嚴其關鍵既成又擇子孫之良者使謹守之日省而月視欹者扶之敝者補之如是則雖亘千萬年無頽壞也夫民者國之堂基禮樂者柱石也公卿者棟梁也百吏者茨蓋也將帥者垣墉也甲兵者關鍵也是六者不可不朝念而夕思也夫繼體之君謹守祖宗之成法茍不隳之以逸欲敗之以讒諂則世世相承無有窮期及夫逸欲以隳之讒諂以敗之神怒於上民怨於下一旦渙然而去之則雖有仁智恭儉之君焦心勞力猶不能救陵夷之運遂至於顛沛而不振嗚呼可不鑒哉今國家以此承平之時立綱布紀定萬世之基使如南山之不朽江河之不竭可以指顧而成耳失今不為已乃頓足扼腕而恨之將何益矣詩云我日斯邁而月斯征夙興夜寐無忝爾所生時乎時乎誠難得而易失也逺謀易曰君子以思患而豫防之書曰逺乃猷詩云猷之未逺是用大諫昔聖人之教民也使之方暑則備寒方寒則備暑七月之詩是也今夫市井禆販之人猶知旱則資舟水則資車夏則儲裘褐冬則儲絺綌彼偷安茍生之徒朝醉飽而暮飢寒者雖與之俱為編户貧富必不侔矣况為天下國家者豈可不制治於未亂保邦於未危乎詩云逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之逮天之未隂雨者國家閒暇無災害之時也徹彼桑土者求賢於隱微也綢繆牖户者修敕其政治也夫桑土者鴟梟所以固其室也賢雋者明主所以固其國也國既固矣雖有侮之者庸何傷哉臣竊見國家每邊境有急羽書相銜或一方饑饉餓殍盈野則廟堂之上焦心勞思忘寢廢食以憂之當是之時未嘗不以將帥之不選士卒之不練牧守之不良倉廪之不實追責前人以其備禦之無素也幸而烽燧息五穀登則明主舉萬壽之觴於上羣公百官歌太平縱娛樂於下晏然自以為長無可憂之事矣嗚呼使自今日已往四夷不復犯邊水旱不復為災則可矣若猶未也則天幸安可數恃哉陛下何不試以閒暇之時思之不幸邊鄙有警饑饉荐臻則將帥可任者為誰牧守可倚者為誰在千里之外使之常如目前至於甲兵之利鈍金榖之盈虛皆不可不前知而豫謀也若待事至而後求之則巳晚矣夫四夷水旱事之細者也抑又有大於是者陛下亦嘗留少頃之慮乎詩云維彼聖人瞻言百里維此愚人覆狂以喜此言逺謀之難知近言之易行也夫謀逺則似迂似迂則人皆忽之其為害至慘也而無切身之急為利至大也而無旦夕之驗則愚者抵掌謂之迂也宜矣國家之制百官莫得久於其位求其功也速責其過也備是故或養交飾譽以待遷或容身免過以待去上自公卿下及斗食自非憂公忘私之人大抵多懷茍且之計莫肯為十年之規况萬世之慮乎自非陛下惕然逺覽勤而思之日復一日長此不已豈國家之利哉臣日夜所以痛心泣血而憂也昔賈誼當漢文帝之時以為天下之勢方病大瘇又苦􅏓盩又類辟且病痱陛下視方今國家安固公私富實百姓樂業孰與漢文然則天下之病無乃更甚乎失今不治必為痼疾陛下雖欲治之將無及巳治之之術非有他竒巧也在察其病之緩急擇其藥之良苦隨而攻之勿責目前之近功期於萬世治安而已矣重微虞書曰兢兢業業一日二日萬幾何謂萬幾幾之為言微也言戒懼萬事之微也夫水之微也捧土可塞及其盛也漂木石沒丘陵火之微也勺水可滅及其盛也焦都邑燔山林故治之於微則用力寡而功多治之於盛則用力多而功寡是故聖帝明王皆銷患於未萌弭禍於未形天下隂被其澤而莫知所以然也周易坤之初六曰履霜堅冰至霜者寒之始也冰者寒之極也坤之初六於律為林鍾於厯為建未之月陽氣方盛而隂氣已萌物未之知也是故聖人謹之曰履霜堅冰至言為人君者當絶惡於未形杜禍於未成也繫辭曰知幾其神乎君子知微知彰知柔知剛萬夫之望謂此道也孔子謂魯公曰昧爽夙興正其衣冠平旦視朝慮其危難一物失理亂亡之端君以此思憂則憂可知矣太宗皇帝命昭宣使河州團練使王繼恩討蜀亂平之宰相請除繼恩宣徽使太宗不許曰宣徽使位亞兩府若使繼恩為之是宦官執政之漸也宰相固請繼恩功大他官不足以賞之太宗怒切責宰相特置宣政使以授之真宗皇帝欲與章穆皇后及後宫遊內庫后辭曰婦人之性見珍寶財貨不能無求夫府庫者國家所以養六軍備非常也今耗散之於婦人非所以重社稷也真宗深以為然遂止由是觀之先帝以睿明卓越防微杜漸如此之深可不念哉昔扁鵲見齊威侯曰君有疾在腠理不治將深威侯不恱曰醫之好利也欲以不疾者為功及在血脈在腸胃威侯皆不信及在骨髓扁鵲望之遂逃去徐福言霍氏太盛宜以時抑制漢宣帝不從及霍氏誅人為之訟其功以為曲突徙薪無恩澤焦頭爛額為上客故未然之言常見棄忽及其巳然又無所及夫宴安怠惰肇荒淫之基竒巧珍玩發奢泰之端甘言悲辭啓僥幸之塗附耳屏語開讒賊之門不惜名器導僭逼之源假借威福授陵奪之柄凡此六者其初甚微朝夕狎玩未覩其害日滋月益遂至深固比知而革之則用力百倍矣伏惟陛下思萬幾之至重覽大易之明戒誦孔子之格言繼先帝之聖志使扁鵲得早從事毋使徐福有曲突之歎則可以修之於廟堂而德冒四海治之於今日而福流萬世優游逍遙而光烈顯大豈不美哉豈不美哉務實周書曰若作梓材既勤朴斫惟其塗丹雘此言為國家者必先實而後文也夫安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立綱紀禮之實也和上下親逺邇樂之實也決是非明好惡政之實也詰姦邪禁暴亂刑之實也察言行試政事求賢之實也量材能課功狀審官之實也詢安危訪治亂納諫之實也選勇果習戰鬭治兵之實也實之不存雖文之盛美無益也臣竊見方今逺方窮民轉死溝壑而屢赦有罪巡門散錢其於仁也不亦逺乎本根不固有識寒心而道宫佛廟修廣御容其於孝也不亦逺乎統紀不明名器紊亂而雕繢文物修飾容貌其於禮也不亦逺乎羣心乖戾元元愁苦而斷竹數黍敲叩古器其於樂也不亦逺乎是非錯繆賢不肖渾淆而鉤校簿書訪尋比例其於政也不亦逺乎姦暴不誅寃結不理而拘泥微文糾擲細過其於刑也不亦逺乎行能之士沉淪草野而考校文辭指抉聲病其於求賢不亦逺乎材任相違職業廢弛而檢勘出身比類資序其於審官不亦逺乎久大之謀棄而不省而淺近之言應時施行其於納諫不亦逺乎將帥不良士卒不精而廣聚虛數徒取外觀其於治兵不亦逺乎凡此十者皆文具而實亡本失而末在譬猶膠板為舟摶土為楫敗布為帆朽索為維畫以丹青衣以文繡使偶人駕之而履其上以之居平陸則煥然信可觀矣若以之涉江河犯風濤豈不危哉伏望陛下撥去浮文悉敦本實選任良吏以子惠庶民深謀逺慮以保安宗廟張布綱紀使下無覦心和厚風俗使人無離怨别白是非使萬事得正誅鋤姦惡使威令必行取有益罷無用使野無遺賢進有功退不職使朝無曠官察讜言考得失使謀無不盡擇智將練勇士使征無不服如是則國家安若泰山而四維之也又何必以文采之飾歌頌之聲眩耀愚俗之耳目哉嘉祐六年上時知諫院上神宗論人君修心治國之要三司馬光臣聞澄其源則流清固其本則末茂臣䝉陛下聖恩拔於衆臣之中委以風憲天下細小之事皆未足為陛下言之敢先以人君修心治國之要為言此誠太平之原本也臣聞修心之要有三一曰仁二曰明三曰武仁者非區區姑息之謂也修政治興教化育萬物養百姓此人君之仁也明者非煩苛伺察之謂也知道義識安危别賢愚辨是非此人君之明也武者非强亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移此人君之武也故仁而不明猶有良田而不能耕也明而不武猶視苖之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治强闕一焉則衰闕二焉則危三者無一焉則亡自生民以來未之或改也治國之要亦有三一曰官人二曰信賞三曰必罰夫人之才性各有所長官之職業各有所守自古得人之盛莫若唐虞之際然稷契臯陶垂益伯夷夔龍各守一官終身不易茍使之更來迭去易地而居未必能盡善也故人主誠能收採天下之英俊隨其所長而用之有功者勸之以重賞有罪者威之以嚴刑譬如乘輕車駕駿馬總其六轡奮其鞭䇿何往而不可至哉昔仁宗皇帝之時臣初為諌官得上殿首曽敷奏此語英宗皇帝時臣曾進歷年圖義以此言載之後序今幸遇陛下始初清明之政虛心下問之際臣復以此語為先者誠以臣平生力學所得至精至要盡在於是願陛下勿以為迂闊試加審察若果無可取則臣無所用於聖世矣治平四年四月初除中丞上殿進上神宗五事劉述臣以不才䝉陛下擢居言責之地惟是朝廷之急務時政之得失天下之利病未能有所建明夙夜循省懼無以禆聖慮資盛德有孤陛下任使之意輒嘗思之得當今之所宜先者三數事謹具條列以聞惟陛下哀其愚𠂻恕其狂瞽留神而財擇之天下幸甚臣聞帝王接物也以至誠為先權數不足任也歷觀六籍之指歸未有不本於至誠者至於天下國家之治亦在誠其意而巳矣夫惟至誠為能終始萬物為能事神接人行之至者雖金石無情猶可以動之况其有知者乎是故人君以至誠接於下則臣下以至誠事其上易曰厥孚交如信以發志是也迹之古人何嘗不然詩曰􅊯􅊯鹿鳴食野之蘋說者曰鹿得蘋􅊯􅊯然鳴而相呼懇誠發於中此言文王以至誠接於下猶鳴鹿之相呼無非出於懇誠者也夫人君能以至誠接於下而臣下不務傾心畢力以報其上者未之有也詩曰憂心悄悄僕夫况瘁此言臣下憂君之極至於僕夫亦皆瘁病其於報上也何如哉若夫任權數以臨人而不繇至誠則人亦將以不誠事之此非所以感人心之道也非徒不足以感人心而已則又將有輕朝廷之心何也夫任權數者舉事於此而用意在彼人將曰今之所以然者意不在是也蓋將有謂焉耳殆非人主所以取重於天下之道也故夫權數者醇德之病中人用之巳為非宜况人主之尊乎臣恐輔導之臣有以此術開陛下者陛下信而行之適足為纍耳其於盛德未見其補也臣又聞聖人不以獨見為明而以羣言為用以堯之聖也知臣下之賢而不自用必俟羣臣僉舉然後裁有所試耳其於退不肖也亦然方鯀之圮族也堯知其不可用而四嶽以為能堯於鯀不敢自斷於已而不用卒徇四嶽之言以試之者何也堯之心以謂知其圮族者獨豫一人而巳而羣臣以為能者且衆而弗成之績又未暴於當世是以不敢斷於已而從衆也且人君自用不足以為世法此堯舜之用心後世之所宜行者也而陋儒之論以為人君必操獨斷之權使威福一出於已臣下不得而與之然後人君之道尊嗚呼其亦不思甚矣夫萬幾之叢脞臣庶之夥繁而欲以一人聰明斷之非前聞也夫所謂獨斷者謀之於衆而斷之以已耳非謂弗詢於下而獨出於上之謂也弗詢於下而獨出於上是為自用耳人君自用使事事能中其理猶得罪於古人又况未能盡然乎輔導之臣有持此說以誤陛下者陛下信而行之適足為纍耳於盛德未見其補也臣又聞人禀一元之氣而生所禀有厚薄故其質有美惡之别焉若辨與訥出於自然非美惡之所繫也是故其質美矣而其辭訥焉不害為君子其質惡矣而其辭辨焉不害為小人知人之術當觀其質性何如不當較其辨與訥也昔漢文帝登虎圈愛嗇夫代上林尉對禽獸簿甚悉詔拜嗇夫為上林令張釋之曰絳侯東陽侯稱為長者此兩人言事曾不能出口豈效此嗇夫喋喋利口捷給哉今以嗇夫口辨而超遷之臣恐天下隨風而靡爭口辨亡其實且下之化上疾於影響舉措不可不察也於是文帝乃止不拜嗇夫當是時文帝能忍已所愛以從直言天下莫不以為賢及武帝之季田千秋以一言取宰相封侯單于聞之曰漢置丞相非用賢也一妄男子上書即得之矣以中國天子之所為而動為夷狄輕笑可不重謹哉孔子曰禦人以口給屢憎於人焉用佞夫言足以為世法者宜莫如孔子臣願陛下深信之而以漢之文武為鑒不貴嘵嘵巧辨之人使中外聞之不敢飾虛言以來應天下幸甚臣又聞王言惟作命命一出則天下風行而影從之不可不謹也書曰愼乃出令蓋出令不愼則其施之也不能無不安之理施之而不安則必更張之又不審則必至于再至于三為令而至於再三則天下安所從乎是故古之人君將有言也必先慮之於心咨之於衆決之於故老大臣然後行之是故渙然如汗而不可反也確然如金石而不可變也今夫令之出也下未及行而已追改之矣一有使令也其人未及往而已易之矣不知左右之臣所與陛下計事者誰與是何不審之甚也昔漢文時人有言季布賢召欲以為御史大夫又言其勇使酒難近至留邸一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有以臣為不可者陛下以一人譽召臣一人毁去臣臣恐天下有識者聞之有以窺陛下今令行而數易臣恐天下之窺陛下有不止如漢文之時也臣願陛下務持重毋易由言研慮於內咨謀於外計其可久而必行之天下幸甚臣又聞君總其治臣分其職君主逸臣主勞勞逸之分要之臣主賢不賢耳是故臣主俱賢則君逸而臣勞主賢而臣不賢則主勞而臣逸臣伏見陛下躬攬萬幾動踰宵旰而未嘗休息彼之所謂輔弼之臣其間才力必有不堪其任者不然何致陛下勤勞之至此也今夫一邑之小丞尉之卑朝廷尚思擇其人而任之况天下之大兩府之重乎荀卿子曰請問為政曰賢能不待次而舉不能不待頃而廢元惡不待教而誅此可謂得為政術也臣願陛下察其不堪任者而絀之舉賢才而屬之亦不可少緩矣何也方今法度日隳紀綱日益不振天下委靡日入於不治此正勤求有為之人使之有為之時也當此之時不求有為之人使之有為而舉庸夫不足與為之人共為之一旦至於亡可奈何然後按刑章以誅之亦亡補於事矣竊譬之人有疾病也初在腠理不治已而傳至血脉藥石之功猶可以及之於斯時也又忽而不治浸淫至于膏肓雖有倉扁亦無如之何古人有言曰為可為於可為之時今日之謂也臣竊觀陛下以英睿之姿躬親庶政焦勞圖治日甚一日虛已以求讜言如恐不及間者嘗詔中外陳時政得失今者又詔廷臣以次轉對欲以聞朝廷之廢闕措天下於安平其用心可謂至矣臣敢不悉心竭慮為陛下具陳為治本末之狀庶幾有補於萬分雖不能正之於將然之前尚冀有以救之於巳然之後恭惟陛下首推至誠以御下而不繇權數博詢衆智而不任獨斷不旌口給之人不出不審再三之令精求蹈道富才忠力有為之人而委任之然後血脉之疾可除而藥石之功加於天下矣臣不勝惓惓之愚治平四年十一月上時為知雜御史宋名臣奏議卷一
