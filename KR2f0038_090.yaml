body:
  text: 宋名臣奏議卷九十宋趙汝愚編禮樂門濮議下上英宗乞罷稱親吕誨臣等伏聞手詔節文稱親之禮謹遵慈訓追崇之典豈易克當固已見陛下守義徇公謹重之至也然稱親之禮殊未為安羣口紛紜不勝嗟憤臣等竊詳皇太后手書稱親之意蓋用漢宣故事欲行於今乃與中書門下元建皇考之議大體相依此不免為兩統二父之失所以議者喧然皆謂母后手書非出慈壽之本意皆建議之臣眩惑交結成就其謀欲自掩其惡而杜塞言者之口也臣觀陛下繼明之始與漢宣故事不同宣帝之時尚為有司所奏禮為人後者為之子請謹視孝昭所為未有却令大宗正統之母追稱小宗所生為親者也錯亂禮法失其本意若欲凖漢宣故事以濮王為親則襄國已降自當為母於皇太后豈得安哉恭惟陛下親受仁宗詔命而為之子故先帝遺詔誕告萬方謂陛下為皇太子即皇帝位四夷諸夏莫不共聞今乃復稱濮王為親則先帝治命之詔不行而陛下繼體之義不一况太后與政府大臣並受先帝顧託言猶在耳永昭陵土未乾止因一二姦臣之謀遂忘而弗顧陷兩宫於有過之地使四方夷狄惑先帝之遺詔疑陛下之過舉移謳歌欣戴之心為忠憤不平之氣可不痛哉萬一强敵姦民以有先帝遺詔為問則執政之臣其將何辭對之然則稱親之禮豈宜輕用首議之臣安得不誅臣等待罪於家屢䝉詔㫖促令供職而踧踖未敢承命者以此故也若必使臣等就職則當合班廷爭以救朝廷之失雖陛下容納直言為天下所聞而臣等不能早悟明主之罪益深益重矣豈可復居言路為耳目之臣哉臣等之心有死無二伏望陛下留神聽納天下幸甚治平三年正月上令中書降劄子趣使赴臺供職誨等復繳還劄子并録前項所奏九狀申中書堅辭臺職誨等前後論此事并彈韓琦歐陽修凡二十六狀上英宗論回避濮王名諱吕公著臣近覩勑文中書門下奏濮安懿王名下一字應中外文書合行回避奉聖㫖依奏數日以來朝野有學識者皆以為未安臣謹按禮文七廟之諱雖不及於天下皆頒告於天下又晉尚書王彪之等議所生之諱臣下不當回避當時以彪之之議為當今來輔弼奏請蓋緣臣子之心陛下未有謙抑之辭切恐四方後世不免譏議臣愚欲乞特降詔可濮安懿王名下一字唯上書奏事並聽回改餘公私文字不須諱避若續降此指揮則與祖宗七廟名諱小有差别在於天下臣子亦安敢故犯臣忝守經術又為禮官臣若不言誰當言者治平三年正月上先是中書請避濮王名下一字置園令及奉園兵公著時判太常上此奏奏入不從公著再具畫一劄子并論不當稱親且言或以章獻稱制曾頒諱于天下况母后事固不足為後世法然今來事體又異于彼禮為父服三年天下之通制惟陛下于濮王服朞年聖人之㫖欲使為人後者降抑其私親事一於所後如頒諱之事足以亂大統非所以尊宗廟也上英宗乞追還詔書復吕誨等職事韓維臣竊聞御史知雜吕誨等以論濮安懿王事得罪並行譴逐羣議喧然皆以謂誨等能審議守職國之忠臣而竊歎朝廷典刑遂至於此臣伏以陛下自入繼大統士大夫莫不首論為人後之大義以謂陛下素好經術必能循用禮典以副先帝顧託之意自兩制之議上聞臣下更白交諌務欲上廣聰明以正此事而今者遂至斥逐憲官以失天下之望誠可痛也臺官之言臣雖不盡聞料其用心不過欲陛下盡如先王之法而止耳即如此者乃是愛君之至安所得罪而逐之也近年以來風俗頽敝士大夫類皆貪固寵利護惜人情姑息茍且為自容之計莫肯為國家悉心營職者陛下厚賞以勸之嚴罰以督之猶恐此風不變而復內牽邪說貶斥正人數以微過放逺善士臣恐自此姦佞得志忠良結舌陛下耳目益壅蔽緩急朝廷有事上無由知此時雖有悔恨亦無及矣方今法度隳廢百職不治國用匱乏民力凋困外無良將士卒驕惰夷狄窺間而有輕中國之心而天災數見地變復作疾疫流行饑饉荐至由此觀之臣恐陛下之憂不在濮王名號未崇臺官不畏威依命也伏望聖慈思社稷安危之計以人情去就為慮亟追昨日詔書還誨職事以救前失以安人情治平三年正月上維時知制誥兼銀臺封駁事先是中書進呈吕誨等所申奏狀修上問執政當如何韓琦答曰臣等忠邪陛下所知歐陽曰御史以為理難並立臣等有罪即當留御史若以臣等無罪則取聖㫖上猶豫久之乃令出御史而曰不宜責之太重于是誨知蘄州純仁通判安州大防知休寧縣維連上疏乞留之上英宗乞留吕誨等司馬光臣聞人主患在不聞其過人臣患在不能盡忠是故忠直敢言之臣國家之至寶也夫以人主之尊下臨羣臣和顔色以求諫重爵賞以勸之羣臣猶畏懦而不敢進又况憚之以威懲之以刑則嘉言何從而至哉竊聞侍御史知雜事吕誨侍御史范純仁監察御史裏行吕大防因言濮王典禮事盡被責降中外聞之無不駭愕臣觀此三人忠亮剛正憂公忘家求諸羣臣罕見其比今一旦以言事太切盡從竄逐臣竊為朝廷惜之臣聞人君所以安榮者莫大於得人心今陛下徇政府一二人之情違舉朝公議尊崇濮王過於禮制天下之人已知陛下為仁宗後志意不專悵然失望今又取言事之臣羣輩逐之臣恐纍於聖德所損不細閭里之間腹誹竊嘆者多是况純仁大防皆陛下簡拔於衆人之中任以為耳目之臣蓋取其忠直非取其阿諛也純仁大防亦欲竭誠盡節以報陛下之知故敢不附政府侃然正論今更以此獲罪則陛下於羣臣之中尚誰親哉若使忠直日退阿諛日進則陛下何以復知臣下之善惡政事之得失如此殆非國家之福也伏望聖慈亟令誨等還臺供職則天下翕然皆歌陛下之聖明雖禹之樂聞善言湯之改過不吝不是過矣不然且為之别改近地一官亦可以少慰外人之心也治平三年正月上上英宗繳納舉臺官勑韓維臣昨日閣門送到勑一道令臣舉官二人充御史臣伏以知人之道古今至難故聖王取士之法必有所試見其迹效可用然後升進乃不失人臣伏見吕誨等剛果强徑守義不回至干犯死亡之誅不顧忌諱以盡論議求之古人如此至少臣又聞陛下嚮者自出范純仁吕大防二人姓名令除御史衆見純仁等能竭節言事皆謂陛下明哲選任得人純仁等不負陛下所知得事君報國之道今一旦斥逐逺去士大夫莫不切歎痛惜陛下毁已成之美受可恥之名失當時之屬望貽後代之譏謗今勑㫖令别舉御史臣伏自忖度臣之駑下何敢少望清光雖欲保舉豈如聖主自擇夫人未試用誠亦難知如誨等則有已試之效矣陛下必欲為官求人來羣言以興至治則臣願復三人以佐陛下招賢納諌之美其舉臺官勑臣已具公文繳納閣門未敢祗受治平三年正月詔翰林學士知制誥御史中丞知雜各舉御史兩人維三月上此奏上英宗繳納舉臺官勑韓維臣今月十三日准中書劄子奉聖㫖令臣依勑舉官聞奏者聖量兼容不責奉詔之稽緩特諭恩㫖便合祗受然臣伏再惟念事君之道義當傾竭若懷不盡之意外竊敢言之名而無益於國事者臣所不忍為也故敢不避鈇鉞之誅以申其說臣竊以自古聖王優待諌諍之臣雖甚狂直必加涵忍者非勢不能黜也以為黜此一人則傷衆多之心遂此一失則敗天下之事故不為也治平以來四方傾聽日望陛下開納羣言勸帥衆力以光祖宗之大業而反復如此臣所以痛心疾首為陛下深憂也自吕誨等被黜至于市井之人皆知此事為非美而在朝廷之臣未聞戮力竭忠為國救此失者則陛下斥逐近臣貶臺官之效已可見矣聖慮偶失為此事而上下雷同便即成就如後日復有它事而人情如此臣恐非陛下之福也今聞傅堯俞等强爭不已則又將黜此三人乎同時而黜六諫臣此危殆之道也陛下欲履之乎臣所以再不奉詔者實冀以區區懇迫之誠終悟聖意伏望陛下察臣前後所言甚經思慮不是妄發特奮英斷回革此事以慰天下之心非臣之利陛下社稷之利也其舉臺官勑見在閣門未敢奉行劄子繳納中書訖所有臣不即奉詔之罪惟朝廷處分治平三年二月上上英宗辭侍御史恩命乞與吕誨同貶傅堯俞臣伏聞罷濮王追崇之典實允公議而稱親未改於禮非安竊度朝廷不過謂哀帝之失既已更改孝宣所為便可依據不知經史所謂親者非父母而何况以孫繼祖與陛下不同而儒者譏議亦具在方冊若不較善惡茍前世嘗行皆可以為後世法則書傳所記是非百端更無不可為者此蓋歐陽修違負先帝啓不正之論倚恃君相有泰山之固故羣諂和附邪說日增搖動人心虧損事體重兩宫之過貽萬世之譏不拔本根蔓延未已伏乞重黜歐陽修然後議韓琦等傅㑹姦人之罪廣發德音譬曉天下濮王封册一用禮官初議為定不然無以慰仁宗付託之心當上天顧諟之意臣新除恩命决不敢秖受亦不敢更赴諌院供職所有使契丹往還公事才候得次依例上殿敷奏謹伏私門以待斧鉞况臣論濮王典禮與吕誨等實同議論乞誅首議之人以謝天下今罪乃獨在吕誨等前此固陛下所知非臣敢有欺紿意合罪均雖死不敢獨免治平三年三月上時同知諌院上英宗論追奉濮王六說趙瞻臣前日伏䝉陛下諭以君臣之大義可掩僚友之小節朝廷之大補可陋狷直之虗名德音慰存聖識深逺臣愚不勝感服之至今日復領詔㫖促令入臺供職臣聞孔子去魯曰遲遲吾行也孟子去齊曰豫豈若是小丈夫然哉諫於其君不受則悻悻然見於其面去則窮日之力而後宿哉夫孔孟事列國僻君其去就猶如此之難况小臣事萬乘之賢主耶此君臣之義誠重而朝廷之補誠切也然孔孟前日所以終去齊魯者豈得巳哉蓋君臣之道未至故留之心不勝其去之義也吕誨等豈願去王庭清切之地而為聖朝竄逐之人哉今陛下守先王之典禮徇天下之至公於其父母不敢過有褒崇此非兩漢之主所可倫比尚有少意未得以盡其美者故臣下深有所未喻也既能遵奉大統不取皇考之名巳協公論矣而復出稱親之說蓋由議者不深考其文義見漢書有司之辭偶稱云親史皇孫宜諡曰悼故引取為據爾然有司以其未有諡號即且以此為稱暨有悼園之諡則親字固自已除之矣豈嘗稱曰親悼園乎况經傳謂孝子事親者統父母之言也謂親廟數者統祖宗而云也於族屬中無有稱親之名是誠不可為禮典以書於史䇿終無益於尊崇而徒妄為此紛更也又若戾太子死難于野故與其子悼皇孫冡位在外則宣帝改葬其父祖置園守冡禮當然矣今濮王朝廷禮葬已固而遽圗遷厝臣恐非濮王神靈之所安也又陛下持正居謙不敢順慈壽恩意之厚辭去親皇及后號誠慰天下之望矣然止用舊爵無所殊異亦衆心之所未喻也禮不可過則不稱大號為得禮矣禮可褒進而直用故封是可疑焉又天子公卿禮皆有廟濮國一品家廟實宜所下詔書不凖禮意直置園寢事違典制徒使言者指擲異端曾無萬分之一益也又陛下恭依經義不廢小宗故令宗朴承襲時祀然安懿王當為萬世不遷之大祖傳之不朽則子之嗣王於義乃允今止封公似為有待今若朝廷特申制詔復下有司去稱親之說仍舊園之安加兼國之封進夫人之號明家廟之數正嗣王之爵用是六說俾其據經協義則中外之臣庶孰不歡快哉顧在言職者斯亦可以塞責矣其建議之非依違之過惟當詔問輔臣必有公議陛下當正其罪以定羣疑邪正分矣若是則雖孔孟猶不屑去况臣等出處之迹哉僚友之議狷直之節夫何足道臣今不敢奉詔伏地待罪治平三年三月上時為侍御史上英宗論典禮必與士大夫公議并乞降黜趙瞻臣前奉中書劄子內聖㫖令臣速赴臺供職後復纍厯陳懇愊以為朝廷未正大議未有歸罪則終不敢奉詔中夜復領御批使依前㫖臣乃知誨等前日至有激訐之過者誠有由而然也且臣所言者國家典禮也乞下有司臣僚㑹議者公論也豈有典禮而不從公論者乎陛下自知濮王不稱皇考又去皇號於公論已為至止矣而尚不欲與天下士大夫同議者何哉豈其猶有不合公論之禮耶自古非禮之作後皆不久廢改是終無益于朝廷而有譏於典䇿此當言責者所以惓惓不能已也今中外之公卿士庶忠憤闐然而獨陛下以一二執政之臣及左右邪佞之黨心雖知非辭尚文過故主先入之說未信臣言爾即不以臣言為是固宜亟賜降黜猶可以悚動後來之人而塞絶議者之望况臣即時違㫖已足譴逐不待纍日然後可罪不勝傍徨待命之至治平三年三月上瞻前後凡三十二奏至是瞻通判汾州堯俞知和州趙鼎通判淄州瞻初接伴契丹使還對延和殿謂上曰陛下為仁宗子而濮王稱皇考非禮也上曰卿嘗見朕欲以皇考事濮王乎瞻曰此大臣之議陛下未嘗自言也上曰此中書過議爾瞻因請諭中書上曰朕意已决亦無用宣諭也上英宗繳蘇寀詞頭論同時斥六諌臣韓維臣今月七日中書送到詞頭一道除刑部郎中蘇寀守本官兼侍御史知雜令臣撰詞者臣竊以自濮安懿王稱親三御史得罪以來羣議洶湧人情不以為愜傅堯俞等復不肯就職論事愈急士大夫竊為朝廷憂之而天變遽作夷狄加慢忠義愛君之人往往竊議庶幾陛下因此警懼刋前詔之失大還放逐赫然有為以新德政今忽除蘇寀為御史知雜則堯俞等豈復可留之望哉同時而斥六諫臣切恐祖宗以來未有此事內失人望外啓戎心虗災異先見之戒開禍敗不測之端臣驟䝉拔擢典司告命不敢阿諛隱諱以孤陛下任使其詞頭不敢奉行己具狀繳納中書訖臣緣此事兩違詔㫖自度罪惡深大必不得復見清光然區區愚忠猶願陛下深畏天戒謹察人情以為社稷之計治平三年三月上時知制誥上英宗乞召還傅堯俞等下詔更不稱親司馬光臣近曾上殿䝉聖恩宣諭以濮王稱親事云此親字官家亦本不欲稱假使只稱濮王與仙逰縣君有何不可臣乃知陛下至公本無過厚於私親之意直為政府所誤以致外議紛紜必謂旦夕下詔罷去親名其已出臺官當别有除改見在臺官亦優加撫諭使之就職昨日忽聞侍御史知雜事傅堯俞知和州侍御史趙鼎通判淄州趙瞻通判汾州中外之人無不驚愕此蓋政府欲閉塞來者使皆不敢言得專秉大權逞其胸臆臣竊惟陛下春秋方壯聖德欽明而今日獨取拒諌之名受孤恩之謗違天下之望失人主之權正由遂政府數人狠心而已不知于陛下有何所利而為之臣不勝區區深為陛下痛惜伏望陛下勿復詢於政府特發宸斷召還堯俞等下詔更不稱親如此則可以立使天下憤悶之氣化為歡欣誹謗之語更為謳歌矣治平三年三月上時為龍圗閣直學士判流內銓上英宗乞早賜責降司馬光臣於今月十一日上殿乞與傅堯俞等一例責降十三日又曾自陳固違聖㫖之罪至今未奉指揮臣嚮於陛下即位之年四月二十七日已曾上疏預戒追尊祖父之事及政府請議濮王典禮陛下令候過仁宗大祥别取㫖臣與傅堯俞甫過大祥即詣政府白以為人後者不得顧私親之議及詔兩制禮官同共詳定之日臣又獨為衆人手撰奏章若治其罪臣當為首其吕誨等並係後來論列已蒙譴逐况如臣者豈宜容恕縱陛下至仁特加保庇臣能不愧於心伏望聖慈依臣前奏早賜責降其嚮所上疏竊慮年月稍久禁中遺失今别録進呈治平三年二月上光嘉祐八年疏引漢宣帝光武故事見慈孝門上英宗乞罷濮王稱親彭思永臣伏見近日以濮王稱親事言事之臣奏章交上中外論議沸騰此蓋執政大臣違亂典禮左右之臣不能開陳理道而致陛下聖心疑惑大義未明臣待罪憲府不得不為陛下明辨其事竊以濮王之生陛下而仁宗皇帝以陛下為嗣承祖宗大統則仁廟陛下之皇考陛下仁廟之嫡子濮王陛下所生之父於屬為伯陛下濮王出繼之子於屬為妷此天地大義生人大倫如乾坤定位不可得而變易者也固非人意所能推移茍亂大倫人理滅矣陛下仁廟之子則曰父曰考曰親乃仁廟也若更稱濮王為親是有二親則是非之理昭然自明不待辨論而後見也然而聖意必欲稱之者豈非陛下大孝之心義雖出繼情厚本宗以濮王是生聖躬曰伯則無以異於諸父稱王則不殊於臣列思有以尊之使絶其等倫如此而巳此豈陛下之私心哉蓋大義所在即典禮之正天下之公論而執政大臣不能將順陛下大孝之心不知尊崇之道乃以非禮不正之號上纍濮王致陛下於有過之地失天下之心貽亂倫之咎言事之臣不能詳據典禮開明大義雖知稱親之非而不知為陛下推所生之至恩明尊崇之正禮使濮王與諸父夷等無有殊别此陛下所以難安而重違也臣以為所生之義至尊至大雖當專意於正統豈得盡絶於私恩故所繼主于大義所生存乎至情至誠一心盡父子之道大義也不忘本宗盡其恩義至情也先王制禮本緣人情既明大義以正統緒復存至情以盡人心是故在喪服恩義别其所生蓋明至重與伯叔不同也此乃人情之順義理之正行於父母之間亦無嫌間至於名稱統緒所繫若其無别斯亂大倫今濮王陛下之所生義極尊重無以復加以親為稱有損無益何哉親與父同而所以不稱父者陛下以身繼大統仁廟父也在于人倫不可有二故避父而稱親則是親與父異此乃姦人以邪說惑陛下言親義非一不止謂父臣以謂取父義則與父正同决然不可不取父義則其稱甚輕今宗室疏逺卑幼悉稱皇親加於所生深恐非當孝者以誠為本乃以無正疑似之名黷於所尊體屬不恭義有大害稱之於仁廟乃有嚮背之嫌去之於濮王不損所生之重絶無小益徒亂大倫臣料陛下之意不必須要稱親止謂不加殊名無以别於臣列臣以為不然推所生之義則不臣自明盡至恭之禮則其尊可見况當揆量事體别立殊稱要在得盡尊崇不愆禮典言者皆欲以髙官大國加於濮王此甚非知禮之言也先朝之封豈陛下之敢易爵秩之命豈陛下之敢加臣以為當以濮王之子襲爵奉祀尊稱濮王為濮國太王如此則敻然殊號絶異等倫凡百禮數必皆稱情請舉一以為率借如既置嗣襲必伸祭告當曰姪嗣皇帝名敢昭告於皇伯父濮國太王自然在濮國極尊崇之道於仁皇無嫌二之失天理人心誠為允合不獨正今日之事可以為萬世之法復恐議者以太字為疑此則不然蓋繫於濮國下自於大統無嫌今親之稱大義未安言事者論列不巳前者既去後者復然雖使臺臣不言百官在位亦必繼進理不可奪勢不可遏事體如此終難固持仁宗皇帝在位日久海㝢億兆涵被仁恩陛下嗣位之初功德未及天下而天下傾心愛戴者以陛下乃仁廟之子也今復聞以濮王為親含生之類發憤痛心蓋天下不知陛下孝事仁皇之心格於天地尊愛濮王之意非肯以不義加之但見誤致名稱所以深懷疑慮謂濮王既稱親則仁廟不言自絶羣情訩懼異論喧囂夫王者之孝在乎得四海之歡心胡為以不正無益之稱使億兆之口指斥謗讟致濮王之靈不安於上臣料陛下仁孝豈忍如斯皆由左右之臣不能為陛下開明此理在於神道不逺人情故先聖謂事死如事生事亡如事存設如仁皇在位濮王在藩陛下既為冡嗣復以親稱濮王則仁皇豈不震怒濮王豈不惻懼是則君臣兄弟立致釁隙其視陛下當如何也神靈如在亦豈不然以此觀之陛下雖加名稱濮王安肯當受伏願陛下深思此理去稱親之文以明示天下則祖宗濮王之靈交歡於上皆當垂祐陛下享福無窮率土之心翕然慰悅天下化德人倫自正久存之名光於萬世矣夫姦邪之人希恩固寵自為身謀害義傷孝以陷陛下今既公論如此不無徜徨百計搜求務為巧飾欺罔聖聽枝梧言者徼冀得已尚圗自安正言未入而巧辨已至使陛下之心無由而悟伏乞將臣此章省覽數遍裁自宸𠂻無使姦人與議其措心用意排拒人言隱迹藏形陰贊陛下者皆姦人也幸陛下察而辨之勿用其說則自然聖心開悟至理明白天下不勝大願治平三年三月上時為御史中丞疏實程頥代作按追崇濮王事至治平四年正月以王子宗朴為節度觀察留後改封濮國公以奉正祀以塋為園立廟制用品稱考稱親之議後卒罷不行上神宗論前代帝王追尊本親及嗣王公襲封故事蘇頌臣伏以漢宣繼昭帝即位詔議故皇太子號諡園邑有司奏請故皇太子宜諡曰戾史良娣曰戾夫人置守冡三十家園置長丞親皇孫諡曰悼親謂父也母曰悼后比諸侯王漢諸侯王母夫人皆曰后園置奉邑三百家後八歲有司復請悼園宜稱尊號曰皇考立廟因園為寢以時薦享戾夫人曰戾后皆益奉園民光武中興上承元帝建武二年以皇祖皇考墓為昌陵後改曰章陵縣置陵令守視皇祖考不加尊稱皇考仍舊稱南頓君十年追尊宣帝為中宗始祠昭帝元帝於太廟前此十一帝主皆納髙廟成帝哀帝平帝於長安舂陵節侯以下四世於章陵節侯光武之髙祖東晉元帝由琅邪繼統即位之後以父恭王無他子立皇子裒為琅邪王奉恭王祀其後王薨琅邪皆更立王終晉之世前代帝王自諸侯入奉大統尊其本親不失禮者三帝也宣光於其父祖惟塋墓置園邑令丞所以異於諸侯也而不加尊稱不封國邑本恭親之義也不加尊稱尊正統也不封國邑子無爵父之義也文雖不著其義可推也亦見於師丹議其曰親曰皇祖曰皇考者有司之失也何以言之父祖之尊不容改更稱謂但以上承大宗不得復顧其私恩故服有降等而名無異稱儀禮喪服傳齊衰期為人後者為其父母師丹議亦曰降其父母期所以云者取其别於他親於義無嫌也今不曰父而曰親而與九族旁宗尊卑無所别異於義安乎不必加稱謂直曰史皇孫則中外無嫌尊卑之義自見也至若皇祖皇考之稱是天子諸侯大夫士奉祭祀之文禮記祭法曰王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟鄭康成云王皇皆君也顯明也祖始也名先人以君名始者所以尊本之意也若是則豈可稱於羣臣論議之間乎故宣帝詔直曰故皇太子是也然則考與父豈有别乎禮記曰生曰父母死曰考妣郭璞注爾雅不取此義然則學者當從禮記為正白虎通曰父矩也度以教子者也考成也言有成德也廣雅云母牧也言育養子也妣嫓也匹於父也曰教曰養親之之辭也曰成德曰匹父尊之之辭也故禮有世父母叔父母之文而無世考妣叔考妣之說此其所以别也宣光之世議者不能推本此意以開導時主使盡禮意故曰有司之失也晉元帝雖越在江介而能定其大義不失統紀者以當時諸儒若賀循輩非一皆有禮學國爵詳正本末不違越於先代不致取譏於後世誠有由也自先帝紹位之始深惟其故追賁宗室諸王獨國爵濮安懿無所加進崇奉之禮不過置園陵立國廟而巳此合乎宣光尊本恭親之美也初議稱親後亦罷寢特封王之子為濮公使世世奉祀以正其國統此又德過於二帝區區晉室不足擬倫也宣光為皇孫南頓君立後後世使羣臣郡國奉祀此師丹所謂無王不正之禮是也哀安威尊其父祖為皇而使王子孫奉祀此失禮之大者也其尊曰皇者禮如天子天子不敢臣之髙祖之於太上皇是也今使羣臣諸侯奉祀神不歆非類皇豈得享之哉故三代所以尊王者後待以不臣得用其國之儀物服色以祀其先王者為此也唐立孝敬皇帝奉天皇帝廟京師皆有司行事追尊遜皇帝以其子孫為嗣寧王奉祀事亦因循前代之失也今欲因改封故王議追尊之禮莫若增陵廟以奉國之名加本國以嗣王之名既合於古義又不違先帝之本意也先帝不追尊仙逰縣君益見聖慮之深逺也魏明皇帝詔曰哀帝以外藩援立董宏等稱引亡秦惑誤時朝既尊共皇立廟京都又寵藩妾使比長信僭差無度人神弗祐其令公卿有司深以前世行事為戒是哀帝一失正禮取誚後來本欲尊親反貽重毁如是豈得為孝乎東晉孝武帝太元中崇進所生母為太妃范寧亦曰子不得爵命其母妃是太子婦必也正名寧可稱母今議尊崇謂宜許其所生宗室子援羣臣封育母之例請加封號朝廷以誕育先帝之故優詔褒述特進大國既緣宗室之請則不失正禮推以先帝私親則其他宗室不敢為比亦可以成先帝之志也或嫌爵母則因濮國以為號可也治平四年十月上時同見太常寺兼禮儀事宋名臣奏議卷九十
