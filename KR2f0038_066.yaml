body:
  text: 宋名臣奏議巻六十六宋趙汝愚編百官門奉使上仁宗乞戒諭所遣使推揚徳音悉究利害蔡襄臣伏覩臨遣使臣循行郡國臣竊謂人主宅中國居法宫而使幽遐異域風謡習尚寃隱沉抑無一不陳於前者其道何哉託聰明於臣下故也人主知其所託之難明賞罰以馭之賞罰既明則臣下不敢蔽欺而聰明無所壅也今天下之俗至有鉅室富家兼并貨財作為奢靡超踰法制交通大吏欺轢愚弱而貧者父子轉流闕養生送死之具不幸孤獨廢疾不得終其天年州縣吏眎而不能掩遏豪猛矜哀窮厄而又侵牟漁奪不識休已或愚繆昏耄無所是非或依倚權勢壊裂公法其焯然有状可指數也監刺之官大率以寛紓含隱為良即發一姦贓衆輙指目以是須其自敗乃始糾擿或有所私慮垂敗之人亦加意覆藏使得脱去甚哉蔽䝉如此監司之設僅與無同欲百姓之無害其可得乎吏之茍偷姑息寖以成俗頃年遣使安撫諸郡比其還奏薦舉雖多而蠧暴不察是徒取善譽而空厥職也夫收材選能誠為治之首務然惡吏不除窮民不恤有使之出不若無出之愈徒使郡國之民交口而議曰是舉也特與被遣之人為勞進梯級耳豈有意於吾民哉臣竊見漢武帝遣謁者博士分行天下存問孝悌力田鰥寡孤獨賜帛有差獨行君子遣詣行在而治苛舉奏又唐太宗遣杜淹廵闗内諸州出御府金贖貧民男女自賣者還其父母其後又遣褚遂良等二十人以六條廵察四方黜陟官吏臣詳觀古之遣使皆務恤窮民除惡吏舉材能收滯逸而已請令使者所至之郡存問鄉里其孝行著聞及年八十九十以上鰥寡篤疾依漢故事量予布帛即貧無所養而有男女僦傭於人償其餘直而追還之若為僧尼僧年四十尼年三十以下並除其籍而歸養更無此等子孫官給糇糧責任親黨鄰里養之以沒其齒孤獨者戒勑所養之家務全其生寃結無告使者擇吏而治其曲直力行篤學衰老淪滯表之以勸風俗郡縣吏治績可稱條列其状顯褒其尤者貪墨腥聞即令責訊材不任職於其職之相倫者易之或雖潔廉而違法慘刻及年七十以上昏老而不知退者咸以名聞願一切罷之其官吏貪墨因使摘發監司之官素所不糾隨而坐之即使者不糾異日傾敗事在使者循行已前并使者坐之伏惟陛下垂意生民而恩澤未大洽於下者蓋督責官吏未盡其道也方使者之行幸嚴賜告諭令其畢力推揚徳音以致於下究悉利害庶有補於政治勿徒使郡縣供具吏民遮列道途迎候往來重為此紛擾也狂愚之言願陛下省覽財擇天下幸甚康定二年正月上時為館閣校勘上仁宗乞置諸路按察使歐陽脩臣伏見天下官吏員數極多朝廷無由徧知其賢愚善惡審官三班二部等處又只具差除月日其人能否都不可知諸路轉運使等除有贓吏自敗者臨時舉行外亦别無按察官吏之術致使年老病患者或懦弱不才者或貪殘害物者此等之人布在州縣並無黜陟因循積弊官濫者多使天下州縣不治者十有八九今兵戎未息賦役方煩百姓嗸嗸瘡痍未復救其疾苦擇吏為先臣今欲乞特立按察之法於内外朝官自三丞以上至郎官中選强幹廉明者為諸路按察使請令進奏官各録一州官吏姓名為空行簿以授之使至州縣徧見官吏其公廉勤幹明著實状及老病不才顯有不治之迹皆以朱書之又有中材之人别無竒效亦不至曠敗者以墨書之又有雖是常材能專長於一事亦以朱書别之使還具奏則朝廷可以坐見官吏賢愚善惡不遺一人然後别議黜陟之法如此足以澄清天下半嵗之間可望致治只勞朝廷精選二十許人充使别無難行之事慶厯三年五月上脩時為知諫院自建此議然朝廷重於特遣使未即行也參知政事賈昌朝前為御史中丞嘗言轉運使朝廷責以按察官吏能否而使名未正於是參取脩議詔諸路運使副並兼按察使副今將轄下州府軍監縣鎮官吏姓名置簿親掌録其功過若績效明著及顯有不治者逐旋以聞外其稱稍著廉勤及僅免敗闕者即每至年終攅寫附遞以聞並須盡公摭實如能稱職别加進用儻務因循亦嚴行黜降提㸃刑獄雖不帶此使名並當准此上仁宗乞置諸路按察使歐陽脩臣曽上言為天下官吏冗濫者多乞遣使分行按察昨日竊覩降敇下諸路轉運使司令兼按察使竊以轉運使自合按察本部官吏今若特置使名更加約束則於常行之制頗為得宜必欲救弊於時則未盡善且臣初乞差按察使者蓋欲朝廷精選强明之士切聞朝議以所選非人故不遣使今所委轉運使豈盡得人乎其間昏老病患者有之貪贓失職者有之此等之人自當被劾豈可劾人其間縱有材能之吏又以斡運財賦有米鹽之繁供給軍須有星火之急既不暇徧走州縣專心察視則稽遲鹵莽不能無之故臣謂轉運使兼按察使不才者既不能舉職才者又不暇盡心徒見空文恐無實效在於事體不若專遣使人伏自兵興累年天下困弊饑荒疲瘵既無力以振救調歛科率又無由減省徒有愛民之意絶無施恵之方若但能逐去冗官不令貪暴選用良吏各使撫綏唯此一事及民最切茍可為人之利何憚選使之勞況自今年累遣安撫豈於今日頓以為難今必恐三丞至郎中内難得其人即乞且依前後安撫於侍從臣僚臺官館職中選差十數人小處路分兼察兩路其侍從臣僚仍各令自辟判官分行採訪用臣前來起請事件施行其轉運兼按察使若能精選其人亦乞著為今後常行之制臣伏思從來臣寮非不言事朝廷非不施行患在但著空文不責實效故改更雖數號令雖煩上下因循了無所益今必務日新求治革弊救時則須在力行方能濟務臣所言者生民之急務也天下之利也不但略言一二以塞言責而已伏望留意詳擇慶厯三年五月上上仁宗乞置諸路按察使歐陽脩臣自初忝諫官於第一次上殿日曽建言方今凋殘公私困急全由官吏冗濫者多乞朝廷選差按察使糾舉年老病患贓汚不才四色之人並行澄汰仍具呈按察之法條目甚詳如臣之議本欲使使者四出而天下悚然知朝廷有賞善罰惡之意然後按文責實其惡者黜其善者升中才之人盡使警勵凡臣所言者皆所以救民急病澄革四十年蠧弊之事若非遭逢聖主鋭意求治之時上下力行之不可也柰何議者憚於作事唯樂因循祗命諸路轉運使兼其職尋亦再具論奏其論格而不行按察空文遂至寝廢生民蠧病日益可哀伏見陛下聖徳日新憂心庶政近發手詔督勵宰輔然天下之事積弊已多如治亂絲未知頭緒欲事事更改則力未能周而煩擾難行欲漸漸整緝則困弊已極而未能速効臣謂如欲用功少為利博及民速於事切則莫若精選强幹朝臣十許人分行天下盡籍官吏能否坐而升黜之如臣前所陳然後可臣聞治天下者如農夫之治田不可一槩也蒿萊蕪穢久荒之地必先力行芟闢然後以時耘耨今特遣之使如久荒而芟闢也轉運兼按察乃以時而耘耨者爾寛猛疾徐各有所宜也漢之刺舉唐之黜陟使考課使之類每嵗遣出祖宗朝亦有考課院蓋按察升黜古今常法非是難行之異事也方今言事者多以髙論見棄或以有害難行如臣所言只是選十餘人明幹朝臣察視官吏善惡灼然有迹易見者著之簿籍朝廷詳之黜其甚者耳臣自謂於論不迂行之有利無害然尚慮議者未以為然謹别條具冗官利害六事以明利博効速而可行不疑伏望聖慈特賜財擇如有可採乞早施行一曰去冗官則民之科率十分減九臣伏見兵興以來公私困弊者不惟賦歛繁重全由官吏為姦每嵗科率一物則貪殘之吏先於百姓而刻剥老繆之人恣為羣下之誅求朝廷得其一分姦吏取其十倍民之重困其害在斯今若去此四色冗官而代以循良之吏事隨便宜絶去搔擾使民專供朝廷實數科率免却州縣分外誅求故臣謂於民力十分減九也比於别圖減省細碎無益者其利博矣二曰不才之人為害深於贓吏國家之法除贓吏困民先發者乃行之其它不才之人大者壊州小者壊縣皆明知而不問臣謂凡贓吏多是强黠之人所取在於豪富或不及貧弱不才之人不能馭下雖其一身不能乞取而恣其羣下共行誅剥更無貧富皆被其殃為害至深縱而不問故臣尤欲盡取老病繆懦者與贓吏一例黜之三曰内外一體若外官不澄則朝廷無由致治今朝廷雖有號令善者降出外方若落此四色冗官之手則或施設乖方不知朝廷本意反為民害或留滯廢失全不施行而又無糾舉多作空文若外邊去却冗官盡得良吏則朝廷行下之令雖有乖錯彼亦能回改或執奏更易終不至為大害是民之得失不獨上賴朝廷全賴官吏善惡以此而言冗官豈可不去四曰去冗官則吏員清簡差遣通流今天下官有定員而入仕之人無定數既無退黜冒濫者多差遣不行賢愚同滯每有一闕衆人競爭得者無廉恥之風不得者騰怨嗟之口濫官之弊近古無之今若擇四色冗官去之則待闕之人可無怨滯五曰去冗官則中材之人可使勸懼今天下官吏豈必盡是不才蓋為朝廷本無黜陟善惡不分若見國家責實求治人人旌别則中材之人皆自勉强不敢因循雖有貪殘亦須歛手六曰去冗官則不過朞月民受其賜方今朝廷雖有憂念恤民之意然上下困乏必未有餘力廣恵及民若但去冗官則民受速賜蓋臣嘗見外處州縣每一繆官替去得一能者代之不過數日民已謌謡今若盡去冗濫之吏而以能吏代之不過朞月民必受賜此臣所謂及民速於事切者也慶厯三年五月上上仁宗論臺官所言按察使不當歐陽脩臣伏見臺官上言意謂按察使等所奏之人多不實或因迎送文移之間有所闕失挾其私怒枉奏平人朝廷都不深思輕信其説臣聞降此約束日夕憂嗟竊思國家方此多事難了之時正當責人展効之際奨之猶恐不竭力疑之誰肯盡其心昨大選諸路按察之初兩府聚㕔數日盡破常例不次用人中外翕然皆為一時之極選凡被選之人亦各負材業久無人知常患無所施為一旦忽䝉擢用各思宣力爭奮所長不唯欲報朝廷寧不更希進用豈可頓為欺罔便徇私情料其本心必未至此茍或如臺官所説則是兩府聚㕔數日選得不公之人或其不至如斯何必更加約束竊以任人之術自古所難能力主張猶或有沮者何況過生疑異使各心闌如此用人安能集事況按察之任人所難能或大臣薦引之人或權勢僥倖之子彼按察使下當怨怒上忤權勢而不敢避者只賴朝廷主張而已今按察者所奏則未能行沮毁者一言則便加輕信皆由朝廷未知官吏為州縣大患而按察可以利民委用之意不堅故毁謗之言已入也所可惜者自差諸路按察今雖未有大效而老病昏昧之人望風知懼近日致仕者漸多州縣方欲澄清朝廷自沮其事臣欲乞聖慈令兩府召臺官上言者至中書問其何路按察之人因挾私怒茍有迹状乞下所司辨明若實無人乃是妄説其近降劄子乞賜抽還不使四方見朝廷自沮按察之權而為貪贓老繆之吏所快慶厯四年七月上脩所指臺官即包拯也拯議見監司門上神宗論不必每事遣使孫覺臣聞朝廷務一切更制庶事将多遣官出諸路以集之臣竊以為過矣本朝承百年之弊事有偏而不舉溢而不救者不可勝數将欲變而新之則在張其綱紀正其法度擇羣材而付之若事事遣使凡皆出於朝廷則臣恐不盡事情而又生勞擾之弊也臣竊以諸路使者多是朝廷素所選擢久更任使幸以成法授之必能集事其間或有繆懦不才不勝任者自可換以才吏若又難得職任相當者則若近嵗權發遣及副使判官之類或召至京師或朝廷臨遣使其法度出於一而議論精詳則自集事矣或諸路使者不可多置不足以分幹庶事則聽其辟舉屬吏若近者發運使之於東南則人知朝廷所以付畀之意而務竭其力今不擇才否一切遣使代治其職則庸者得以偷安而才者不勸矣熙寧二年十月上時為右正言諫院供職上神宗乞重使者之任周尹臣伏見朝廷近年遣使出外大則察訪制置小則幹當公事逺至兼兩路近亦十數州竊原其意豈非以天下至廣人情萬殊髙拱深嚴不能周知夫事物風俗之變環顧僻逺不能親諭以徳意志慮之詳臨遣軺車旁午道路蓋欲其宣布上澤考正法度講求民瘼推行美利擊姦暴振滯淹甄别賢才澄清風俗此堯之聰明舜之考績文王之憂勤而陛下之求治也然将命之人間或不稱所選煩苛掊刻失於大體所至郡縣惟糾擿簿書小失刋正吏文空言變更已成而妄作聰明摧辱監司而自為威重聽任失實措置乖方期㑹之嚴甚於星火以致職司謟事官吏驚憂一方騷然不敢安處有識聞見為朝廷深惜殆非所謂肅肅王命仲山甫将之皇皇者華言逺而有光華之義也近聞朝廷察訪體量幹當公事等官内有任意違法者許本路監司覺察聞奏必以使者不職如前所陳故行約束不令過當然王人銜命乃為外司檢察本末倒置非所以尊大朝廷也臣願陛下重使者之任謹選而時遣之非素有才行曉知民務之人不以将命非廢置利害闗於要切之事不以輕出無令使者為監司所議庶幾君命不辱國體増重崇忠厚之化革偷薄之風熙寧九年三月上時為侍御史上神宗論遣使之煩彭汝礪臣聞人君有視聽之明而不足以周於物有仁民愛物之心而不足以達於天下於是遣使焉将使以興利也非智不足以知之非仁不足以行之将使以除害也不忠則不能無詐然則遣使亦重事也今諸路有都轉運轉運發運提㸃刑獄提㸃常平市易而逐司各有官幹當内有司農市易将作軍器兵部其出使者或三四人或六七人而朝廷特遣之使又皆不與此比所遣既數而所與反多不審小人因縁附託得攝尺寸之柄而乗權勢於一日作為威福以迫蹙州縣将迎少失則發剔微細而吏無容足所如程以閹人将命而很虐悖慢雖近臣往往屢見其為姦利暴於民言獨不知有以告陛下未也如張靚異時號竒俊其在兩浙阿附撓法醜迹今已見矣如張諤判司農使其屬按開祥一日罷去者八人而奏報之妄十幾六七至今留滯未决如軍器監以選人張杲計置皮角而所至凌轢蹂踐郡邑為之紛然陛下之徳恵未施而怨譏先滿於道路朝廷之事未集而威令遂輕於天下以此知使事非可輕也且古者遣使雖數然傳記考之如大小行人訓方氏撢人之屬其所職各一事未有預黜陟予奪如今之易也今司農寺屬官所至皆得檢法而其類尤為横逆臣聞先王之使人其大小輕重各因其才而已少年吏更渉未幾又非有過人之智而委付如此必不克堪矣臣伏思朝廷逐路有職司數人皆為陛下布宣徳意以詔於民者也今遴選其人可以任朝廷事矣國家改為之始青苖之令未行農田差役之事未正故須專使如将作補全城壁軍器計置皮甲亦皆至遣官今事且就緒使職司遣人足矣職司不能集責之可也何用紛紛如此也其他亦申勑所司審出其屬庶幾吏得自盡其力無使國家威令頓輕於天下也熙寧十年三月上時為監察御史裏行宋名臣奏議巻六十六
