body:
  text: 宋名臣奏議巻六十七宋趙汝愚編百官門監司上仁宗論轉運得人許自擇知州范仲淹臣竊見古者内置公卿士大夫助天子司察天下之政外置岳牧方伯刺史觀察使採訪使統領諸侯守宰以分理之内外皆得人未有天下不大治者也今轉運按察使古之岳牧方伯刺史觀察採訪使之職也知州知縣古之諸侯守宰之任也内官雖多然與陛下共理天下者唯守宰最要耳比年以來不知選擇非才貪濁老懦者一切以例除之以一縣觀一州一州觀一路一路觀天下則率皆如此其間縱有良吏百無一二是使天下賦税不得均獄訟不得平水旱不得救盗賊不得除民既無所告訴必生愁怨而不思叛者未之有也民既怨叛姦雄起而收攬之則天下必将危矣今民方怨而未甚叛去宜急救之救之之術莫若守宰得人欲守宰得人請詔二府通選轉運使如不足許權擢知州人既得人即委逐路自擇知州不任事者奏罷之仍令權擢幕職官如是行之必舉皆得人凡擢入者必俟政績有聞一二年方真授之雖以精擇尚慮有不稱職者必有降黜直俟人稱職而後已仍令久其官守勿復數易其有異政者宜就與升擢之若然官脩政舉則天下自無事矣朝廷唯總其大綱而振舉之可也慶厯三年二月上時為參知政事上仁宗薦張昷之等九人可充轉運使副富弼臣近曽兩奏乞令中書樞密院通選諸路轉運使副令逐路轉運選轄下知州逐州選部内知縣縣令若此三種官一一得人則天下自然無事朝廷不勞而治矣然欲知民細微利病須要好縣官欲得好縣官須先擇好知州欲得好知州須先擇好轉運使副欲得好轉運使副須是輔弼大臣用心至公精加揀選親戚故舊者不得蓋蔽可去者必去之仇讐疎逺者不得抑塞可用者必用之去之者勿避其怨謗用之者勿求其感激不邀恩於已不推過於人若能如此則天下賢者才者可以盡為朝廷之用何患不得諸路轉運二三十人而已伏縁國家之事莫非至公須是輔弼大臣用心精選當黜則黜則退黜之人以謂朝廷公行自然無怨人既無怨事乃平貼若有大臣不存公共之心推過與人則退黜者以謂朝廷本不退我只是某人私相見排遂生怨怒架造讒謗君聽既惑事乃破壊此於朝政為害之大者也今既委逐路轉運使副升黜一路知州其權甚重其事亦大須是有才識能分别善惡仍須推心至公而行事果敢然後可當轉運之任今逐路見任及新差下未到任轉運使副共二十八員其間的有才識能分别善惡推心至公行事果敢者無三兩人而已其餘雖别無顯過可黜柰何碌碌常才緩急無用其間亦有作過之人但未敗露或已敗不行若不更張必難集事臣今來於衆論得九人皆謂堪充轉運使副可以委付選擇轄下知州必得盡公不負朝廷差委謹具名次如左三司鹽鐵副使張昷之知雜御史魚周詢史館修撰王質知諫院王素三司判官沈邈知濰州董儲江南東路提㸃刑獄楊紘權三司判官杜杞權三司判官燕度右九人皆搢紳之選今來且充諸路轉運久而皆可拔擢任使更乞令兩府同共銓量施行内董儲是宰臣晏殊逺親然其人實有才用但年齒稍髙而心力不退不可以大臣親嫌而廢也臣又慮諸處見任轉運使副例各未滿或别無顯過恐中書以謂替罷無名臣今欲乞特降詔書告諭天下備陳轉運使職任非輕自來有失精選致職事廢弛物論大以為非昨據樞密副使富弼上疏乞澄汰天下不才轉運使副使下中書樞密院令同共用心推擇中外有才識堪任轉運使副臣寮今據兩司條奏到某人已下若干人堪充轉運使副已今差赴逐路充職幹當務在稱職以副朝廷委任之意又據兩司條奏到見任轉運使副某人以下若干不聞顯効並仰中書門下就便别與差遣若降此詔告諭天下則退者以兩府公黜自當無詞進者以兩府選差孰敢不勉如此行遣不是無名使天下之人耳目一變謂朝廷進善退惡政令清明守官者各知恐懼不敢因循豈不美哉豈不善哉慶厯三年上時為樞密院副使上仁宗論轉運所按吏不必更令提刑體量歐陽脩臣近見淮南按察使邵飾奏為體量知潤州席平為政不治及不教閲兵士等朝廷以飾為未足信又下提刑司再行體量臣竊以轉運提刑俱領按察然朝廷寄任重者為轉運其次乃提刑爾今寄任重者言事反不信又質於其次者而决疑臣不知邵飾果是才與不才可信與不可信如果才而可信則又何疑然又不知為提刑者其才與飾優劣如何若才過於飾尚可取萬一不才於飾見事相背却言席平為才邵飾合得罔上之罪矣若反以罪飾臣料朝廷必不肯行若捨飾與席平俱不問則善惡不辨是非不分況席平曽作臺官立朝無狀只令制勘亦不能了尋御史中丞以不才奏罷朝廷兩府而下誰不識平其才與不才人人盡知何必更令提刑體量然後為定今外議皆言執政大臣託以審謹為名其實不肯生事而當怨須待言事者再三陳状使被黜者知大臣迫於言者不得已而行只圖怨不歸已茍誠如此豈有念民疾苦澄清官吏之意哉若無此意是好疑不决則尤是朝廷任人之失自去年以為轉運使不察官吏特出詔書加以使名責其按察今按察使依禀詔書舉其本職又却疑而不聽今後朝廷命令誰肯信之凡任人之道要在不疑寧可艱難於擇人不可輕任而不信若無賢不肖一例疑之則人各心䦨誰肯辦事今邵飾言一不才顯者所貴朝廷肯行然後部下振竦官吏畏服今反為朝廷不信却委别人則飾之使威誰肯信服飾亦慙見其下今後見事不若不為不獨邵飾一人臣竊聞諸處多有按察官吏皆為朝廷不行人各嗟慙以謂任以事權反加沮惑朝廷之意不可諭也伏望聖慈特勑其邵飾所奏特與施行今後按察使奏人如不才老病灼然不疑者不必更委别官示以不信所貴不失任人之道而令臣下盡心慶厯四年上時為右正言知制誥供諫職上仁宗乞監司不用苛細矯激之人包拯臣竊見諸道轉運司自兼按察及置判官以來并提㸃刑獄等體量部下官吏章疏相繼頗傷煩碎兼聞審刑院大理寺日近奏按尤多倍於往年況無大段罪名並是倚摭微累不辨虛實一例論奏孤弱無援者則按以深文權勢豪猾者則縱而不顧内則徇一身之利以殖其私外則竊振職之名以圖其進効尤無恥唯恐不及至有公清守節之人或不曲事左右為衆所嫉者即被誣罔造成其罪遂使守節之士或負終身之玷可不痛惜哉且治平之世明威之君必務徳澤罕用刑法故董仲舒曰陽為徳為春夏當和氣發生之時隂為刑為秋冬在虚空不用之處以此見天任徳不任刑也王者亦當上體天道下為民極故不宜過用重典以傷徳化昔秦法網凝密動罹酷罰下不堪命卒致潰亂老子曰其政察察其民缺缺其政悶悶其民淳淳願聖明鑒於此言而無忽焉方今民力凋殘國用窘迫若乃專用刻薄好進之吏則民不聊生竊恐非國家之福也雖朝廷累降詔命約束罕或遵禀此弊不去為患寖深欲望聖慈宣諭執政大臣應轉運提刑等並令精選㢘幹中正之人以充其職苛細矯激之輩屏而不用天下幸甚慶厯四年七月上時為監察御史裏行上仁宗論轉運使選用責任考課三法陳升之臣伏以生民休戚繫郡縣之得失今天下州三百縣一千二百其治否朝廷固不得周知付之十八路轉運使而與選者三司副使省府判官提㸃刑獄或以薦引或以敘進才與不才固已混淆一旦付以一道按察之寄雖知其不勝任必重退之是重抑一人希進之心而輕一道生民之命今選用不精又責任無法考課不平其間非闇滯罷懦即凌肆刻薄十常八九所以下之疾苦不得上聞而重其愁歎故也朝廷有意天下之治宜自轉運使始今上選用責任考課三法其選用之法以公正明斷恵愛為本公正可使糾率官吏明斷可使决治繁劇恵愛可使䘏民之隱茍無數者之長即以補它職其禄賜恩禮視轉運使可也其責任之法曰唐虞四岳十二牧三代方伯連帥漢部刺史皆今轉運使之任今居職者非其人專以辦財賦為職業故郡縣之職業不脩獨掊斂刻暴之令行而民受其弊蓋典制不立所致也今舉其切務有五一稱薦賢材各堪其任二按劾貪謬脩舉政事三實戸口増墾田四財用充足民不煩擾五興利除害仍令嵗終具條所施行者以聞其考課之法曰故事轉運使給御印紙嵗終滿上審官院考校之三司亦嘗有考課條其後卒不能行蓋委計司則先財利而忽民事在審官又因循常務而無考第之實按漢世御史中丞外督部刺史宜付御史臺考課為三等中書門下參覆其實其上等量所部事之劇易而褒進之中等仍舊秩下等退補一郡若風績尤異即擢以不次其職事弛廢不俟秩滿即行黜削嘉祐二年上時知諫院上神宗乞假監司之權令察守令劉述臣嘗謂天下守宰如一一得人則和氣可以立召太平可以力致不為難也何以言之朝廷差除守宰多限以資級不能周知其人善惡及臨事之際方見其才之短長徳之良否耳能周知而習見者必也監司之官乎設有一人其資性既醇謹其持身亦清廉柰何才識短謬不能燭知義理區别淑慝而使之居守宰之任則下得侵其權吏得縱其姦蚩蚩細民受弊而無告矣復有一人狡猾貪汚而能屬託吏胥彌縫上下隂為姦贓不見其迹斯二人者人皆知其不可以長民矣而為監司者雖欲發擿而斥逐之而無實状可得且復懼為反噬隱忍而不敢為間或能直以不才貪猥之説聞於朝廷萬一聽而罷黜之旋踵之間則寃愬之聲已聞於上矣醜言巧詆隨而加諸朋姦之人互為梯援無幾何則職任復舊矣彼監司者懲其若是既不能有所禆益不若茍簡循嘿之為宜也為監司計則得矣為朝廷計則非天下之福也伏望聖慈深鑒此弊少假監司之權使得竭忠悉慮精察守宰有如前所謂二人之類為衆所疾深譴而痛繩之投諸四裔可也終身不齒可也而其事權可不假借之乎監司得其權則郡縣綱紀既舉而民受其賜矣然則監司事權朝廷既假借之則推擇之間不可不審也願陛下深詔政府精選轉運使提㸃刑獄唯人是求不必限以資序即得其人矣可以責之力振風教審覈官吏使罷弱不勉者不敢怠其職剛暴失中者不敢肆其情農桑勸而孝悌興徭賦均而獄訟息然後間下特㫖令於守宰中擇有豈弟之政吏畏而民愛事狀灼然者三兩人密加薦拔特與増秩賜金使之再任或升擢任使如此則郡縣有中和之政監司有澄清之功行之不疑當見其効熙寧三年上時為御史知雜事上神宗論除監司條制吕公著臣先准中書批状送兩制議選知州以下條制内一項王珪等議未曽厯知州人不得權入轉運判官以上差遣臣愚以為未便竊以國家承平雖久於人材素養之法有所未備緩急求才猶恐難得若資格愈密則簡拔愈難今知州以下從審官院差遣則嚴其條式可也轉運判官以上自朝廷推擢則不當更増以資格昔荀況稱賢與能不待次而舉疲不能不待頃而廢董仲舒亦稱小才雖累日不離於小官賢才雖未久不害為輔佐且漢之部刺史今之監司如雋不疑乃自布衣拔為青州刺史當時號為稱職方今豪俊之士多伏在下位若必待其已厯知州然後任使則或至白首而不見旌用臣愚以謂知州有治迹者固當升入監司自餘果有才能為衆所推雖資厯尚淺亦繫自朝廷不次選擇充轉運判官權發遣省府推判官及權充知州差遣若試無効自可退從常調如此則勸沮兼行賢愚無滯熈寧二年五月上時為翰林學士上哲宗乞推擇監司與民休息劉摰臣准尚書省劄子十月十八日聖㫖指揮節文比者詔令屢下以寛民力便安公私官吏或致廢格自今州縣悉心奉行監司㸃檢御史臺覺察彈奏者臣有以見陛下誠心愛民謹重政令天下幸甚臣竊謂州縣之政廢舉得失其責宜在監司夫監司之任亦重矣一有賢不肖則環地數千里休戚繫之曩時朝廷大更法度選建推行之人故不以資任務得果徤强鋭焱厲風生之才蓋規以就事倚辦於一時及法行事立矣而其後用人猶復因襲未曽權量時宜有所張弛之也是以至今使者之政刻覈𥚹迫相師成風郡縣承望亦莫敢不然使民不見徳與義而惟刑是覿惟利是聞者蓋亦久矣斯豈政令之本意然哉奉宣繆戾積習至此故也比䝉聖朝哀念元元取監司罪惡已甚者既去之矣然其餘人材頗尚駮雜情志未一各懐所私蓋其隂有觀望者則必習常而慢令以致恵澤之壅其淺中覬利者則又将矯枉而過正或廢所宜治之事二者不可不察也唯得其人庶懲此患臣欲望聖慈詳酌河北河東陜西素號劇部向來所用使者出於暴進多非更厯民事人微望輕雖自過為威刻而下終不服今宜稍復祖宗故事三路各置都轉運使用兩制臣寮充職以重其任自餘諸路亦望推擇資任稍髙練達民政識治體近中道之人分補監司之任明授之以詔令使忠厚安民而不失之寛弛肅給應務而不失之淺薄部使者誠如此州縣之政隨之則先朝之仁政陛下之恩徳庶幾下究而與民休息不難矣考察見任之無狀者一切澄汰之被罷之人茍非有顯過宜還其資考别為任使令不至於失職無聊而已方今先務恐實在此伏望詳酌施行元豐八年十月上時為侍御史上哲宗乞罷提舉官司馬光臣聞書稱明王立政不惟其官惟其人臣少時見天聖中諸路止各有轉運使一員亦無提㸃刑獄惟河北陜西以地里多事置轉運使兩員然朝廷必擇朝士累任知州有聲迹曉錢榖者乃得為之未嘗輕以授人凡一路之事無所不總使按察官吏薦賢發姦愛養百姓興利除害或朝廷有本路事務未能細知利害者則委之相度措置當是之時官少民安事無不舉公私饒樂海内晏清景祐初始復置提㸃刑獄其後或時置轉運判官以其冗長害事尋復廢罷自王安石執政以來欲力成新法諸路始置提舉常平廣恵農田水利官其後每事各置提舉官皆得按察官吏事權如監司又増轉運副使判官等員數皆選年少資淺輕俊之士為之或通判知縣監當資序及選人以權受權發遣處之有未嘗厯親民即為監司者能順已意則不次遷擢小有乖違則送審官院與合入差遣更加責降彼年少則厯事未多資淺則衆所不服輕俊則舉置百事往往乖方衆所不服故依勢立威以行號令舉措率易故慮事不熟壊法害民又利禄誘於前罪戾俟於後由是往往上不顧國家事體下不恤百姓怨咨止務希合以圖進取致今日天下籍籍如此皆由此來也陛下幸念民惟邦本本固邦寧知元元困窮於國家非便欲救而安之詔青苗錢不得抑配免役錢寛剰不得過二分竊聞諸路提舉官州縣猶有於春首抑配青苖錢勒百姓供情願状别作名目占免役寛剰錢但取文具而已如此則朝廷號令廢格不得行於臣下恩澤壅塞不得被於黎民徒存空文何以為政臣聞去草者絶其本救水者回其原提舉官者乃病民之本原也陛下必欲蘇息疲瘵乞盡罷諸路提舉官其轉運使除河北陜西河東外餘路只置使一員判官一員提㸃刑獄分兩路者合為一路共差文臣兩員凡本路錢榖財用事悉委提㸃刑獄管幹仍選知州已上資序累厯親民差遣所至有政迹聰明公正之人方得為監司聰明則知官吏賢不肖公正則黜陟無私部下官吏皆得人事務安有不幹集百姓安有不富庶此乃國家鎮撫四方之本也若以提舉官累年積蓄錢榖財物不少恐轉運司一旦得之妄有耗散即乞樁作常平倉錢物委提㸃刑獄一面交割主管依常平倉法謹伺榖價賤糴貴糶及准備災傷賑貸其餘不得支用若轉運司委的窘乏須至兌那常平錢物者必須至具數先奏朝廷得㫖乃得移牒支撥若以監司數少路分闊逺處廵厯及管幹不辦即乞只依舊法每遍廵諸州更不遍廵諸縣自非要切大事朝廷不令監司親往幹當只令選差本部官除司理司法縣尉獨員監當之類舊條不許差出外其舊條不得隔州差人幹當差及被差之人皆有罪新條諸州管幹及主簿給散月分不得差出之類指揮乞更不施行所貴監司有官可差幹當事務若遇有賊盗乞朝廷只委提㸃刑獄差官或行移文字監督捕盗官捉殺不令親入山監逐如此則監司廵厯管幹職事簡要易為辦事元祐元年閏三月上時為左僕射詔並從之上徽宗論監司不得人而走馬奏事石公弼臣伏以諸路監司為朝廷耳目之寄責任非輕宜得忠誠體國之人有徇公忘私之節尊主愛民之心然後内足以廣陛下之聰明外足以究生民之利害陛下可以坐制四方無為而治也近時監司初不遴選夤縁除授者莫可悉數觀望誕謾貪汚茍賤無所不至達於聖聽十未能一由是走馬承受㢘訪實事有專為蔽欺稍稍奏聞是監司不足以取信而事移於走馬也臣恐久之亦不無弊非陛下循名責實之㫖臣愚伏望陛下謹監司之選擇人而委之其有資望素輕人材凡下者宜有澄汰職事不修附下罔上者重加貶斥陛下之威令已孚賞罰有信革去壅蔽之患示以通信之言然後走馬承受奏事非其本職者罷之廉訪按察責成於監司庶幾官修其方吏肅其業且監司得人則一路之治無慮不舉蓋民之師帥責在守令守令之職責在監司監司之選不可忽也臣以為宜立法以塞僥倖之路大觀三年上時為御史中丞上欽宗論雜科監司不可不盡罷吕好問臣竊見比年以來諸路雜科監司猥多司分既異所行不復相照各執已見意在必行事相牽連首尾相戾文移如雨督責如火官吏書紙尾之不暇矧能及民事乎所廵厯處州縣為之鼎沸又況所任用之人率多闒冗常才非以賄賂及諂佞得之即宰執宦官親戚及堂吏子弟其間以才選者未有一二也此等豈能奉行朝廷寛大之政徒能騷擾天下蠧弊民力實無益於事臣愚欲望陛下詔三省樞密院應雜科監司不必專置司者一切盡罷令轉運司提㸃刑獄司分領如弓箭刀弩手之類令帥臣兼管市舶司之類令轉運司兼管所有存留司分及轉運使提㸃刑獄等官伏望朝廷選擇人才使稱其職庶幾上不蠧國下不害民貼黄臣竊謂諸路監司在於得人不在増員且如弓箭手之類舊屬帥司而藝能精熟自置提舉官以來多有冒濫之人及武藝生疎發運使自來止二員綱運未嘗闕悞止縁近來用非其人遂致住滯非縁官少也近添一員而住滯損壊愈甚以此見増員之無益也貼黄臣伏見近日發運轉運等司時有添差去處深為害事員多則事理商議不合若各以已見行遣文移則州縣何以奉行實悞國事欲望盡罷添差官其不職者自可改易庶幾事皆歸一易責成功靖康元年七月上時為左諫議大夫上欽宗乞擇監司郡守按察贓吏吕好問臣竊以比年以來贓吏為害徧於天下自小至大習以成風株連蔓衍不可復治臣請詳言其事自内及外言之為監司郡守者其初必奔走於權倖之門朝夕請謁貨賂公行計其所納與所得官相當然後得之不然則賂其親戚子弟如此欲激濁揚清何可得也其到官也督責州縣以償其費州縣因重取於民以為獻上則求保明恩賞奏辟差遣下則求薦章免罪責自外及内言之每朝廷抛降科配於民且如一縣當一分之數一分之外則吏人取其八九縣官取其六七又以四五入於監司州郡之公庫監司郡守復以賂京師貴近上下相䝉事不得發然則朝廷之取民也至寡害民也至輕而贓吏之取民也至重害民也至酷民不知怨贓吏獨歸怨朝廷者蓋贓吏以朝廷科率為名爾豈可不為朝廷惜之今陛下既罷科率不取於民亦可以戢姦吏矣欲望陛下審擇監司郡守應官吏姦贓不因按發而自敗露者本路監司并本州按察官皆與等第科罪庶幾各知畏懼不害良民茍有姦贓必能按發靖康元年八月上時為御史中丞宋名臣奏議巻六十七
