body:
  text: 宋名臣奏議卷一百十九宋趙汝愚編財賦門新法十一上哲宗乞罷青苗法蘇轍等臣等屢有封事乞罷青苗皆不䝉付外施行伏以王安石吕惠卿創行此法以來天下之士惟王吕黨人欲以青苗進身者則以其法為是其他士大夫上自韓琦富弼中至司馬光吕誨范鎮下至臣等未有一人以為便者方安石惠卿用事忠言壅塞不得施用小民無告飲泣受害今者二聖臨御盡革弊事天下欣欣日望青苗之去而近日刪立舊法益更滋張中外狐疑不曉聖意切聞近日左右臣僚有以國用不足欲將青苗補其闕乏者聖心未察是以為之遲遲臣等雖愚以為自古為國止於食租衣稅縱有不足不過輔以茶鹽酒稅之征未聞復用青苗放債取利與民爭錐刀之末以富國强兵者也藝祖太宗之世四方未平中國至狹嵗嵗用兵其費不資及真宗東封西祀遊幸亳宋造立宫室仁宗結契丹平定西戎翦滅南冦此皆非常大費而常賦之外無大增加未聞必待青苗以濟國今二聖恭儉安靜無為四海之富與祖宗無異何憂何慮而欲以青苗富國乎臣等以為皇帝陛下覽政帷幄未能博聽羣議聽納之道於斯實難竊謂臣下每有獻言宜一切折以公議彼既欲散青苗而臣等以為不可陛下受其所言而臣等封事遂留中不出不知陛下何以斷其是非而信之如此之篤乎陛下必欲決此深疑即當盡出臺諫所言付之三省使之公議得失不當隱忍不辨是非而隂用其言也如衆議必以罷之為是即乞早賜裁斷以慰民心必以罷之為非亦乞顯行黜謫以懲臣等狂妄元祐元年八月同王巖叟朱光庭王覿上轍時為右司諫狀申三省陳四害自是始詔罷俵散青苗錢後數日巖叟光庭等入對延和殿上曰青苗錢已罷巖叟曰此非陛下聖德髙明何以能行天下幸甚上曰又恐國用不足奈何目下未覺五七年後恐不足巖叟對曰恐非陛下所憂青苗是困民之法今既罷之數年之後民將自足民既足國家何憂不足又曰太皇太后一身則得恐數年之後教他官家缺用不便巖叟曰陛下但自今日養民力政已成太平豐盛之世矣却不須如此過憂又曰今不可比祖宗時緣添起宗室百官不少國家所入却只這箇是巖叟曰自古國家有厯世數百年者何嘗逐旋增賦斂自然亦足上曰可知又曰今固不敢用兵然怎生不防他對曰勸陛下今日養民力政為欲以防邊寇若無事時困却民力不知緩急之際却於何取之上曰邊寇多變詐何可保對曰陛下但務安靜彼豈不願安靜巖叟又進曰天下有四民若四民各安其業便是國家富足之道今四民已安業矣自古人主志在富足則必致困民若在飬民則國家將自富巖叟又曰孔子言不患貧而患不安願陛下省察臣等方事陛下若他日於國家不便豈敢贊陛下行之上曰這箇則可知巖叟又進曰陛下若如此憂不足恐小人窺伺聖意妄獻功利之說以迎合切不可信必誤陛下上曰這箇則不到得光庭曰放債富國終不是好事上曰此則可知上曰太皇太后在簾中何由知外事全賴輔弼得人及臺諫官公正言事巖叟光庭等皆謝曰賴陛下聽納臣等所以得盡愚忠上哲宗論役法合從民便令轉運司定奪文彥博臣切聞天下諸路差雇役法朝廷雖已降指揮而至今未定頗煩擾臣檢會始初司馬光閲天下臣庶奏章多言出錢雇役其法不便遂却復差役之法然司馬光所言甚詳而節目頗繁恐州縣不一一通曉而又朝廷置局詳定議論不一必難通行臣等以謂差役之法本州縣常事其來久矣皆素有定法及其末流不容無弊故當隨時刋改臣曾纍具劄子奏乞先令州縣刺史令佐從民利便各議定其法縣申州州申轉運司看詳定奪奏聞如得允當即降下施行蓋朝廷大號令必當自上而下州縣差役常理須自下而上則各從民便以天下之廣郡縣之衆不可以一切之法行之行之必互有妨礙而局官及諸臣僚紛然上言各任已見不同知利害及秖付所司别無與奪以至州縣希望朝廷風㫖至今其法未定益滋狡吏侵擾若如前請且各付逐路郡縣定奪利害各從其便庶幾下民早得息肩元祐元年十一月上時為平章軍國重事上哲宗乞因災異講求差雇二法李常臣聞漢䇿曰善言天者必有證於人善言古者必有驗於今臣學荒識淺智慮不明豈足以知天烏足以考古又況所謂善言者耶雖然誦詩書之文服師友之訓稽夫往昔驗諸當今以觀天下之際若有可以言者輒妄陳一二干鈇鉞之誅惟陛下裁擇臣伏見今嵗已來日色無光雷不時震怒風屢發甘澤弗降上天示變殆非偶然質之前書甚可畏也易曰垂象著明莫大乎日日者君象也照臨下土暉曜所燭無有不及不容有所掩翳而光烈弗舒者也震迅以時發揚隱伏者雷也刑威之象也不容於發生之辰寂然收聲使人無所懼憚也鼓動萬物幽微必達者風也號令之象也不容狂怒輒發蕩然無時以抑止甘雨者也雨之所及膏潤悅澤長養嘉穀惠澤之象也不容更越時序枯槁百生若無意於哀矜者也臣自不雨以來博行訪問雨澤愆少唯王畿獨甚雖請禱備至而嘉應未臻沉隂欲雨輒復隨起霡霂微潤尋復收霽天其或者將以此警懼陛下乎且古之聖王不以災譴為患患政刑有所不至耳茍能恐懼省察修明政刑而災譴不弭者未之有也臣夙夜伏思陛下臨御以來發政施仁莫不本之先王法乎至德唯恐一物或失其所聽言納善從之如流唯恐設施未當害及元元宜乎和氣感召風雨順理以佐百穀以寬疲瘵矣又自闕雨至今陛下焦勞惻怛憂形言色奔走幣祝致誠乎天地山川及羣小祀親臨軒陛以寬宥獄命官四出以察寃滯然而終未獲應者將政令之大者有所未盡歟先儒謂心和則氣和氣和則形和形和則聲和聲和則天地之和應矣臣伏見今日政令之最大而設施未安致人情不和者役法是也役法之大溥及四海窮邊逺徹山農野叟無不繫其利害休戚今自改更以來日見未便户部雖巧為損益以求可行猶朽木糞牆本根不善終不能必當四海之人形聲靡和嗸嗸莫訴而陛下曾未之察也執政大臣曾未之恤也觀望百執事鉗口奉行曾未之告也然則陛下之明有所蔽而不遍照乎四國矣威刑見玩而有所拂矣號令差忒而設施失當矣德澤不及乎黔黎而欲時雨之應期何可得耶臣請詳言力役之為平民患差與雇利病重輕之不同夫耕農之人身常在野而不見官府入城市天下之情所同願也自租庸調法廢版籍不明差役寖弊國朝因仍前代雖加損益不免就版籍隨重輕等第差科然破家産廢農業非一日之積矣熙寧中講知差法之弊天下州鎮凡因色役害民之事例皆裁減如衙前主管㕑庫承符散從手力充場庫子接送之類也就其不可減者悉使召而賦錢平民平民隨力出錢無事於公家遂得以身常在野不見官府入城市孰便於是耶雖然方是時奉令之臣取民過多務於贏積遂有輸錢不逮之歎農民愈貧之憂而不聞其免徭役而事農業於家為病也陛下即位之初采納羣言念嵗嵗輸錢為非農人之事又不供力役以為非古遂一切罷之復行差法方詔㫖初下愚民未知被差之為害臣於是時亦不能盡知如此四逺之人蓋嘗呼而相慶矣行之既久始覺其患有加於嚮日何也蓋差法之廢十有餘年版籍愈更不明宜重役者輒輕宜輕役者反重交相糾決獄訟紛然因緣為姦公行賕賄鄉寬户多者僅有休息之期鄉狹户窄者頻年在役況今無限田之制上等極力之人昔輸錢有嵗百貫者今止差為弓手嵗雇弓手一名以代身役不過用錢三四十貫中下人户舊出錢不過三貫至二貫而雇承符散從手力之類不下三十貫以是校之勞逸苦樂殊為不均至相倍蓰矣然則今所改法徒能使上等人户優便安閒而第三第四等困苦日甚詩云哿矣富人哀此惸獨正謂是也昔臣待罪户部嘗獻議曰法無新陳便民者良法也論無彼已可久者確論也既而典司邦憲亦屢以此干冒聖聰有司收格曾莫之省以臣料之人情豈甚相逺哉不過謂業已施行憚於改易殊不知茫茫四國仰訴無由蚩蚩微命相顧受敝聚為不和之氣上動天鑒豈國家之盛事耶臣前所奏尚欲令富者輸錢貧者出力折衷二法而為書今也博訪輿言詳究民瘼在上者既無寬剩之求則下户皆願出錢矣而又四方風俗或不同利害或不一當差而願雇者有之誠能使四方隨俗以為法不以一偏之好惡示四方官吏不得觀上所好惡而講法其歸主於寬民便俗上下均一無有偏重而已今示以一偏之意而為法使四海沸騰細民窮困朝廷晏然不知慮卿士大夫畏忌不敢言況希合之人為監司與夫守令哉持之不以介諸懷使陛下致天怒於上人怨於下豈國家社稷計耶臣謬司典憲陛下許其察利害言得失復有所顧避而不言則臣上負朝廷下孤百姓罪不容誅矣伏望聖慈察天意之甚微特詔一二詳練民事臣寮使與賤臣就差雇二法取便百姓者修正之無牽新書無執舊說吾民以為善矣庶乎災變可消和氣可格天下幸甚天下幸甚元祐四年三月上時為御史中丞上哲宗乞力主差役劉安世臣伏見朝廷欲變役法今將四年選官置局講求利病天下之議悉使折衷而承詔立法之意唯以仁民愛物為務謂嘉祐差役之制已便矣然當時嘗見其害者今則損而去之元豐約束之制民以為利者今則取而益之至於風俗之殊尚南北之異宜而本諸人情裁以國論隨方立條罔不具備而更申以明詔諭㫖郡縣若施行之際或窒礙而未通節文之間或疏略而未盡更俾建明為之增損有以見陛下至仁厚重謹民事之深意也新書之下輿情慰恱中外帖息初無間言而姦邪之人內懷顧望造播橫議必欲沮壞至一二小臣敢執偏見妄進邪說欲罷差役依舊募雇當職官吏不能為朝廷固守法度而依違遷就屢有變更天下人情莫不疑惑此最當今之大患也臣聞自古取民之道止於粟帛與民力而已三者皆生之無窮而取之不竭故堯舜三代以來莫之能廢議者乃謂不役其身止令輸錢則公私利便而可以久行臣請有以折之國家泉貨經費所資設官鼓鑄嵗有定額民或盜為罪至論死今弃其易出之力而責其難致之錢固已非理又使上户止納數千則優游卒嵗日益兼并下户自來無役者例使加賦日朘月削寖以困窮損九分之貧民益一分之上户輕重倒置孰甚於此臣竊謂以一家一嵗觀之則輸錢若省而易給以終身纍嵗計之則所出不資而難供今聚斂之臣唯欲誅剝生民而不為天下久長之慮其可信哉議者又謂人户輪差不及三畨處恐差役太重臣亦有以折之且治平之前天下户口一千二百七十餘萬而舊法役人五十三萬六千餘人元豐之口一千八百三十五萬九千有奇較之治平已增五百六十餘萬而新定役人止於四十二萬七千餘人比之舊法却減十萬九千之額謂之輪差不足亦已過矣然而天下州縣或有連值凶嵗人户流離畨次不足之處則在有司通融補助必不可以小節而廢大法也臣伏觀國家受命以來百有餘年差役之法已更六聖隨時損益既皆中理考觀已試之效固可行之不疑而纍年於兹尚容移奪臣竊謂知法之未良改之不可不速知法之已善守之不可不固今差法已善陛下正當善守之執政大臣尤宜協心體國堅堲邪說而乃縱使姦慝倡為異論撓動人情惑亂天下故議者謂今日紛紛之患不在於無知之庶民而特在於挾邪之士大夫也臣聞執狐疑之心者來讒賊之口持不斷之意者開羣枉之門願陛下特奮乾剛力主差役深詔執政固守初議毋使輕徇浮言妄有變易庶幾祖宗之成法不為姦人之所奪天下幸甚貼黃契勘自行差法後來臣僚執一偏之見妄有申請衝改事目不少其間甚有疏略抵牾反為民害者欲望聖慈特降指揮下户部畫一條析聞奏執政聚議除利害的確須合更張及一州一路自有所置不可通用外其應緣邪說遷就變動去處並乞却令依舊施行所貴法度純一天下不惑元祐五年五月上時為左諫議大夫上哲宗論愛民當如父母愛子范純仁臣今月初五日上殿奏事䝉聖慈面賜詢問臣有奏對未盡事理今合再具敷陳䝉聖問先朝青苗等法臣對以先朝愛民之意本如父母愛子而立法付之乳媪若乳媪茍欲應法而無愛心則赤子必生他患更為王安石立法非是激以賞罰所以官吏急切尤為民害尋聞德音謂當時不須立賞臣以奏陳他事未暇詳對今合子細敷陳大凡朝廷立愛民之法不若示愛民之意法行則拘迹茍且應命意通則隨事便宜宣布實惠今陛下愛民正如父母念逺處嬰兒若不教乳媪愛子之心而特為立乳哺燥濕藥餌之節而使行則乳媪將不問兒之大小肥瘦虛實之異及臨時飢渴疾病好惡之情一切執用其法則嬰兒必不自適徒益生其疾苦至有不能言而夭橫者多矣此豈父母之本心哉不若選擇乳媪而委之使各盡其愛兒之心飢渴燥濕隨事得宜而字養之則嬰兒皆自便適其康壯矣今朝廷愛天下之民為立徭役補助之法付之監司守令而行之將不問俗之同異民之好惡利病及施行先後一切守法强民而行則民將失耕田鑿井之樂增加疾苦無告而流亡者多矣此豈朝廷之本意哉蓋拘以文法之害也況天下親民之官能知民疾苦利害者十中無一復能以朝廷立法之意推而合於民心者又加少焉能合於民而不顧身之得失違上之喜怒肯盡已心而行者百無一矣如何使朝廷德澤下究而民不受其弊哉臣願朝廷如臣乳媪之喻選舉監司守令教之以愛民之意則將有實惠及民不煩朝廷立法而天下安矣其青苗等法若當時雖不立賞不免擾民元祐初朝廷聞而更之至今人以為便元祐八年十二月右僕射范純仁丐外上面諭吕大防曰純仁有時望不宜去卿其為朕留之亦遣中使趣純仁歸府又遣中使趣純仁入見純仁既入見上此奏先是大防欲用侍御史楊畏為諫議大夫要純仁同書名奏擬純仁曰上新聽政諫官當求正人畏傾邪不可除因不敢與聞遂固爭避位大防不寤竟超遷畏為禮部侍郎畏尋上疏乞講求神宗法制以成繼述之道上即召畏登對自是悉召用熙豐舊人實畏發之焉上哲宗論御試䇿題蘇轍臣伏見御試䇿題厯詆近嵗行事有欲復熙寧元豐故事之意臣備位執政不敢不言然臣竊料陛下本無此心其必有妄意陛下牽於父子之恩不復深究是非逺慮安危故勸陛下復行此事此所謂小人之愛君取快於一時非忠臣之愛君以安社稷為悅者也臣竊觀神宗皇帝以天縱之才行大有為之志其所設施度越前古蓋有百世而不可變者矣臣請為陛下指陳其略先帝在位近二十年而終身不受尊號裁損宗室恩止袒免減朝廷無窮之費出賣坊場雇募衙前免民間破家之患罷黜諸科誦數之學訓練諸將慵惰之兵置寄祿之官復六曹之舊嚴重祿之法禁交謁之私行淺攻之策以折西戎之狂收六色之錢以寬雜役之困其微至於設抵當賣熟藥凡如此類皆先帝之聖謨睿算有利無害而元祐以來上下奉行未嘗失墜者也至如其他事有失當何世無之父作之於前而子救之於後前後相濟此則聖人之孝也昔漢武帝外事四夷內興宫室財賦匱竭於是修鹽鐵榷酤平準均輸之政民不堪命幾至大亂昭帝委任霍光罷去煩苛漢室乃定光武顯宗以察為明以䜟決事上下恐懼人懷不安章帝即位深鑒其失代之以寬豈弟之政後世稱焉及我本朝真宗皇帝右文偃武號稱太平而羣臣因其極盛為天書之說及章獻明肅太后臨御攬大臣之議藏書梓宫以泯其迹及仁宗聽政亦絶世不言至今韙之英宗皇帝自藩邸入繼大臣過計創起濮廟羣議洶洶者數年及先帝嗣位或請復舉其事寢而不答遂以安靖夫以漢昭章之賢與吾仁宗神宗之聖豈其薄於孝敬而輕事變易也哉蓋事有不可以廟社為重故也是以子孫既獲孝敬之實而父祖不失聖明之稱此真明君之所務不可與流俗議也臣不勝區區願陛下反覆臣言切勿輕事改易若輕變九年已行之事擢任纍嵗不用之人懷私忿而以先帝為詞則大事去矣臣不勝憂國之心冒犯天威甘俟譴責紹聖元年三月上時為門下侍郎上哲宗論御試䇿題蘇轍臣近以御試䇿題有欲復熙寧元豐故事之意尋具劄子論先帝所行善政見今遵行者自已非一其間事有過差元祐以來隨宜修改以安天下者正是子孫孝敬之義未審陛下以臣言為然否然臣竊觀自陛下親政於今已是半年臣等日侍清光若聖意誠謂先帝舊政有不合改更自當宣諭臣等令商量措置今自宰臣以下未嘗略聞此言而忽因策問進士宣露密㫖中外聞者莫不驚怪如家人父兄欲有所為子弟有不預知而亟與行路謀之可乎臣聞兩喜必有溢美之言兩怒必有溢惡之言喜怒不忘於心而以議天下之政必有過甚而不平者朝廷雖有今昔之異其實一家欲有所為當愛惜事體豈可如仇讐之相反唯患不速也哉頃者元祐之初初議改更亦未免此病故役法一事隨改隨復數年而後稍定臣於此時初為諫官後為御史每言差役不可盡行而河流不可强遏上下顧望終不盡從陛下以此察之臣非私元祐之政也蓋知事出匆遽則民受其病耳議者誠謂元豐之事有可復行而元祐之政有所未便臣願陛下明詔臣等公共商議見其可而後行審其失而後罷深以生民社稷為意勿為此匆匆則天下之幸也貼黃臣竊見章惇昔任樞密院與司馬光爭論役法其言有曰免役之法利害相雜又曰見行役法今日自合改更又曰自行免役所遣使者不能體先帝愛民之意差役舊害雖已盡去而免役新害隨而復生今者正是更張修舉之時又曰凡改更政事固有不可緩者有可以緩者如京東西保馬緩一日則民間有一日之害此不可緩者也如役法嵗月之間改更了當誠不為緩陛下謂章惇豈欲破壞元豐故事者哉而言猶若此則元祐更改誠不為過矣紹聖元年三月十四日上御集英殿試進士䇿曰朕惟神宗皇帝躬神明之德有舜禹之學憑几聽斷十九年之間凡禮樂法度所以惠遺天下者甚廣朕思述先志拳拳業業夙夜不敢忘今博延豪英于廣殿䇿之以當世之務冀獲至言以有為也夫是非得失之迹設施於政而效見於時朕之臨御幾十載矣復詞賦之選而士不加勸罷常平之官而農不加富可雇可募之說雜而役法病或東或北之論異而河患滋賜土以柔逺也而四夷之侵未已求利以便民也而商賈之路未通至于吏員猥多兵卒尚缺饑饉薦至寇盜尚蕃此其故何也夫可則因否則革唯當之為貴聖人亦何心焉子大夫其悉意陳之無隱中書侍郎李清臣之詞也二十六日賜進士畢漸以下及第出身時初考官取答䇿者多主元祐楊畏覆考専取主熙寧元豐者故漸為之首轍上此奏詔以散官知汝州上哲宗論大臣唱紹述之說常安民臣竊惟今大臣為紹述之說者其實皆借此名以報復私恩一時朋附之流從而和之遂至已甚張商英元祐時上吕公著詩求進其言諛佞無恥士大夫皆傳笑之及近為諫官則上疏乞毁司馬光吕公著神道碑周秩在元祐間為太常博士親定司馬光諡為文正及近為言官則上疏論司馬光吕公著乞斫棺鞭尸陛下察此輩之言果出公論乎朝廷凡事不用元祐例至王圭家䕃孫五人皆圭身後所生乃引元祐例許奏薦近日講復官制職事官不帶職寄祿官不帶左右至於權尚書侍郎獨以林希李琮之故不復改易如此等事謂之公心可乎故凡勸陛下紹述先帝者皆欲託先帝以行姦謀謂他事難以惑陛下若聞先帝則易為感動故欲快恩讐陷良善者須假此以移陛下之意不可不察宣仁聖烈皇后甚得人心前日陛下駕幸秦楚國夫人第澆奠及輟朝并命勑葬諸費從官給人人無不歡呼髙遵惠為侍郎士論皆以為當聞吳厚向得罪出於宣仁之意近聞待制舍人再繳而大臣尚欲再下願陛下主張此事以順人心今權臣恣橫朋黨滿朝未嘗一言及之唯知論元祐舊事力攻已去臣僚臣荷陛下奬拔不敢負恩摧枯拉朽之事臣實恥為之舉朝嫉臣誣陷非一臣賦性愚直恐終不能勝朋黨之論願乞外任以避之紹聖二年九月上時為監察御史尋罷言職送吏部與知軍上徽宗論紹述陳瓘臣竊惟天下萬事而人主所當問者一事而已用人是也堯舜之法試而後用是以九年然後見伯鯀之罪厯試然後知大舜之聖不試而用其失多矣陛下欲開言路首還鄒浩取其有既往之善可謂得已試之材允合人心無可正救而聞御史中丞安厚卿尚緣往事論浩罪惡欲寢已成之命自明前舉之當其說以謂先朝之事且當遵承國是所繫不可輕改臣請以祖宗故事明其不然昔唐介之忤仁廟也內指貴妃外詆宰相竄於嶺表昭示天下是則鄒浩盡忠之言何異於唐介先帝一時之怒何異於仁祖仁祖有日新之意久而變通是以還介於一年之內先帝有日新之意未及改命而弃天下於數月之間愛君之人念此傷痛光續前緒正在今日豈有事事不改而可以謂之善繼天下皆非而可以執為國是乎國家一繼一述皆本於孝善繼人之志善述人之事以太平之久自堯舜三代乃至漢唐皆不及焉一人有慶兆民賴之孰大於此若夫不改父之臣與父之政則是孟莊子之所謂孝耳戰戰兢兢何足為天子道哉陛下居武王繼述之位而執法之臣揚孟莊子不改之說曲徇其請則臣下享因循之利從公議則聖主被愆忘之譏非上誤朝一以私意風憲之職當如是乎然則鄒浩既來安厚卿可去矣雖聖度寬容姑爾含貸而明示好惡亦不可緩黜幽之典宜自安始伏望即降指揮以警列位天下幸甚元符三年二月上時為右正言上徽宗論國是陳瓘臣竊惟是非之心人皆有之古之聖王以百姓之心為心故朝廷所謂是非者乃天下之公是非也以國是之說其文不載於二典其事不出於三代唯莊王之所以問孫叔敖者乃戰國一時之事非堯舜之法也然其言夏桀商紂不定國是而以合其取捨者為是不合其取捨者為非則是孫叔敖之意亦不敢以取捨之私害天下之公是非也若取捨簡擇一以私意合我者是異我者非此楚莊王所不取也豈聖時之所宜用哉所有國是故事一件謹録奏聞元符三年八月上時為右司諫上徽宗乞以四次改更前事為鑒陳瓘臣竊見自熙寧以來至今三十餘年天下之事已經四次更改熙寧改治平元豐改熙寧元祐改神宗紹聖改宣仁凡所行之事各有先後次第若逐一開敷張陳方見本末今據臣所見畫一具析於後一熙寧之初宋興已得一百八年太平日久天下之事理合變革神考所以大有為也是時専任王安石凡安石所惡之人盡加疏外斥逐如司馬光范純仁等人數甚多一元豐之時王安石既去神考獨攬威柄凡安石所惡之人漸却收用至元豐末年神考因事覺悟大改熙寧之意蘇頌王存之徒皆為侍從孫覺李常之徒漸次進擢蘇軾自貶所放歸司馬光加資政殿學士如此之類甚多但檢當時日厯可以盡見一宣仁垂簾之初先帝沖幼用司馬光母改子之說不待三年大改先政此既往欲速之失也臣謂改之是也欲速非也一紹聖之初大改元祐此乃必致之理天下皆知其然然以用事之臣自任私意既不師古又絶人言所以有誤朝政右四次改更所行之事略已具析如前臣愚所望乎今日者唯願陛下以前事為鑒而已神考變通之意念念日新熙寧之初廢流俗而用安石熙寧之末用人惟已當時日厯所記差除之日可以考也紹聖大臣専以私意主張王氏違神考日新之緒述安石熙寧之迹凡先朝之政所以膏潤天下者皆以為王氏之澤也所謂不敬其親而敬他人悖德民無則焉負神考而欺先帝此政事之所以乖錯而天之所以不助也書曰若稽古帝堯又曰若稽古帝舜又曰若稽古大禹又曰若稽古皋陶自古聖君賢臣皆以稽古為先既往之事有可法者有可鑒者可以自得矣人主之學其要在此紹聖大臣假託經義用士大夫進取之學支離虛誕欺惑先帝其罪與晉之王衍無異范寧曰王衍之罪大如桀紂事可考而知也元符三年九月上上欽宗論紹述吕好問臣聞之古人有言好惡不愆民知所適事無不濟又曰示之以好惡而民知禁夫所謂好惡者求合夫聖人之道不使邪說詖行害夫至當之理此用人之難未若聽言之難也陛下即位以來躬行節儉視朝至於日旰求言甚切不問髙下屈已聽納此堯舜三王之用心也然而羣臣趨向非一識有淺深或有包藏私意務行其說或有遂其前非一逞怨忿此不可不察也本朝開基垂統一百六十餘年聖聖相承天下寧治可因否革未嘗拘執自章惇蔡卞首建紹述之說後蔡京得志專用此術以濟其姦建隆以來凡所施為皆弃而不講獨指熙寧元豐號為紹述及其所行有顯然違於熙寧元豐之法者則又曰此神宗皇帝之志也若以志言之何所考據何往而不可為哉此蓋妄假國論實為身謀已成之效灼然可知至於擠排善類箝塞忠言以正為邪以是為非行之數十年間遂使朝廷無可用之才有司無可久之法公私空竭戎狄侵侮當是時也在廷之臣無有為朝廷施一嘉謀出一奇䇿者陵遲之弊一至於此其為蠧害見於今日伏自陛下受天明命表正萬邦首去邪慝招延善人天下之士解䝉釋蔽如醉醒寐覺四方稱快若出一口陛下前日手詔有云必求實是此乃為政之大體也然邪正難辨是非難分正者固自以已為正矣而邪者亦自以已為是也既自以為正既自以為是真僞相雜實未易分此乃用人之難未若聽言之難也陛下天資聖明理無不燭然衆言淆亂亦安得而遽辨之哉然臣有一說請試言之夫所謂實是者行之而朝廷尊安四民樂業乃為實是行之而朝廷困弱四民失業則非是陛下若驗之於已行之事已用之說則成敗可見不必逺求也臣前日面陳未盡委曲今輒敢再申其說浼瀆聖聽伏望陛下燕閒之餘一賜省覽臣不勝拳拳之至貼黃蔡京専以紹述劫持上下然拆尚書省改左右僕射為太宰少宰修殿中省官制等公然違背神宗皇帝聖恩其他不可一二數也伏乞鑒察靖康元年上時為御史中丞上欽宗乞罷青苗吕好問臣竊見陛下嗣位之初民心仰戴中外胥悅雖寇敵深入人無異意何者天下之人知有休息之日凡所舉動皆順其意所下詔令皆以從祖宗之法為言也今既日久矣陛下圖治之意雖未少改於前而德澤不能下究民心歡悅漸不如初何也蓋由軍旅未戢祖宗之法未行議論之臣借以為詞而奉法之吏倚以為姦也祖宗之法今雖未得盡行其間有可行之以順民心者何為而不為哉臣請舉其大者青苗斂散之法於民為害最甚於官都無利益方今州縣常平錢等率無見在每年俵散之時多以虛劵科率逐都保正長等其實請錢者多是州縣官户公人違法冒名無所不至及送納時只送息錢逐年登帶縣道吏人又因斂散之際恣行乞覔此實無窮之患也民間病此數十年矣今春陛下既降詔㫖從祖宗之法用事之臣如此等事自當即罷今乃遷延却避例不敢言其意不過恐異日天下平定復行紹述之說則已受黜責爾遂使朝廷冒虛數斂實怨可為痛心疾首臣願陛下出自聖意將青苗斂法先次改罷明告天下以固民心其他非祖宗之法逐漸改正行下以息異議無疆之業不勝幸甚貼黃臣切詳當今法度固須參詳處置然後施行唯青苗斂散之法有害無利灼然可見不須更行討論伏望聖慈特賜主張施行靖康元年上先是紹聖二年七月蔡京乞下有司檢會熙寧元豐青苗條約參酌增損適今之宜立為定制九月遂詔府界諸路應緣常平斂散等事除今來申請外並依元豐十年已行條制至是好問始論及之宋名臣奏議卷一百十九
