body:
  text: 宋名臣奏議巻一百十五宋趙汝愚編財賦門新法七上神宗論新法吕誨臣聞忠臣雖在畎畝不忘於君而况備員近綴名為諌官雖居譴謫之地猶分寄委之任與夫畎畝踈逺之人豈不異哉蕭望之身雖補外心在王室亦㣲臣區區之志也臣自夏得疾乆而未愈因有陳奏請就閑官不俟引年亦願還政盖不量力而憂國徒一心而愛君進不得用其言退不得辭其禄憤懣憂積誠有所發願因郵入奏少紓愚忠之萬一上動宸聴死生惟命臣每聞中外論議道路流傳朝政日務更張聖躬鮮聞安静人情不恱致此者其必有以臣聞政者君之所以藏身本於天也天有常道殽以降命日月星辰輝光於外隂陽寒暑生殺以時不見天之運動聲氣而嵗功自成聖人所以藏於形迹法天之常也虞舜髙拱巖廊無為而民自化得此之道也周文翼翼小心日中不食隆殺之異者勞佚之殊也至於衡石量書勞心或過豈帝王之事哉恭惟陛下性禀生知才髙天縱識足以造㡬微眀足以洞幽隠帝王之事業古今之成敗宜得其要而勞心焦思常恐不及似未臻於要道豈聖功獨運而賛襄之力有所未至耶臣聞開基之主踐履艱危下順人心上當天意建一事立一法傳之子孫期於無窮思慮之宜必得其詳守文之君享其安佚繼志紹述之事光昭丕承之業日謹一日此其務也所以成王嗣位述文武之道休功盛烈不敢専有其名故周頌曰念我皇祖陟降庭止言思念先王之徳奉而行之上天歆享鬼神祐之陛下求治誠切運心太過論議者不聞顯揚先帝之盛事争言制度不可用務變更之所更或不可行則士民無所信相與是非羣情擾擾莫之安也陛下釋樂成之業而虚為此紛紛誠可惜也臣聞治天下者審所尚而巳上之所好下必甚焉今大臣不能遵守法度以尊崇王室小臣得以智計謀身迎合時務比來新進之人朝奏暮召小言一發遂要大利歙歙奔競唯恐其後皆自謂不同世俗乃曰賢人舉事必立異是非相反談兵者以起事攘奪為禦戎之䇿言利者以牟歛朘削為恵民之術罔上之論率皆此𩔖一有攻其利害隨即黜逐是特峻法以固新令將使士人不敢公議虧損盛徳莫大於此甚者東南均輸昔張林嘗獻此術於漢朝比下尚書通議皆云非便武帝不聽窮兵黷武算及舟車筦𣙜之禁從而生焉時值亢旱下民皆曰烹桑𢎞羊天必雨其怨可知爾孝昭即位霍光秉政一切寛弛羣心翕然史策書之千古為是自青苗息錢散行諸路貸之甚重取之甚薄但施與未當公私兩損徒起怨咨萬口一同今又以五等民籍與坊郭户等第僧道官戸例均役錢廢衙前奪酒坊以雇庸錢為名其實籠利以入公府詔令既下人心震揺以其㑹歛殆無生意諸路監司與提舉官分行州郡雖曰商量盖示必行官吏畏威惕息而不暇誰復公言以究其利害交相疑議逓成紛擾平時十户之内一二應役則七八遂其休息今徭役不得减省闕空者助其資費勞則均而未見其逸也我朝著令一百餘年富疆者供其力役則貧寠者遂其安息損有餘補不足者正得術矣生民恱戴仁恵淪於骨髓一旦更變莫知所措繇是言之舊法無弊新法未安主議者不究利害自未知信欲下民恱從不亦難乎豈特妄作以生事其實賈怨於天下也孟子所謂國君欲利吾國大夫欲利吾家士庶人欲利吾身是上下交征利而國危矣必圖治在仁義而已董仲舒曰皇皇求仁義而惟恐不足者君子也皇皇求財利而惟恐不足者小人也未有仁而忘其親者未有義而不愛其君者小人見利忘義焉有愛君之心哉淺識者慮非及逺銳於改作以要巳利古語曰利不十不變常利不百不易業庶人猶戒其輕舉况天下之重乎在易之革卦曰已日乃孚利貞悔亡言已日不孚革不當也悔吝生乎動革而當則其悔乃亡又恒卦曰浚恒凶言聖人久於其道而天下化成處其初而浚恒求深物無餘藴害正而無攸利也且如總人榖者莫重於三司制國用者必仰於冡宰今一二大臣制置三司條例小官十數員參議立法三司主判唯知奉行宰相不言得失脂韋於其間書黄札而恬不為意制令每下人必驚駭士議於朝民怨於市商賈謗於路流於四夷得無輕漢之意焉比聞除司馬光樞宻副使鄒何御史裏行皆言條例害公之事固辭乃罷成命言職相繼亦左遷或居家去職闔門待罪臣寮言之甚衆陛下持之益堅古人有云臣専於君謂之不忠子専於父謂之不孝又如隂陽之和不長一𩔖甘露時雨不私一物萬人之主不阿一人今有専君之臣如是中外憂愁望陛下開悟與正人講圖康濟之術不害飢啼而待哺執熱而俟濯也臣切思之専君必有制君之謀用已必有利已之術前世何嘗無之安危在所用爾臣請以戰國時前人事迹明之以為禍亂之監申不害曰有天下而不恣睢命之以天下為桎梏者無它焉不能督責而顧以其身勞於天下之民若堯禹勤儉桎梏其身可謂大繆韓非曰儉節仁義之人立於朝則荒肆之樂輟矣陳說論理之臣開於側則流漫之志詘矣烈士死節之行顯於世則滛康之虞廢矣故明王能外此三者而獨操主術以制聽從之臣而修明其法故身尊而勢重也商鞅說秦變法孝公恐天下議巳鞅曰民不可與樂成論至徳者不和於俗成大功者不謀於衆聖人茍可以彊國不法其故茍可以利民不循其禮孝公惑之遂變秦法李斯曰明申韓之術修商君之法法修術眀而天下亂者未之聞也此謂督責必督責必則所求得所求得則國家富國家富則君樂豐故督責之術設則所欲無不得羣臣百姓救過不給何變之敢圖也四人者尚權詐薄仁義峻刑罰重督責厚歛以毒民肆威以彊國逢君之惡唯利是視當時亦自謂有功於國家愛君納忠隨而是者非謟諛則畏懼使庸主信惑甘心所制卒至於䘮邦姦謀若是謂之無才可乎然本以周孔之道立身攘取卿輔及其得君反用嚴酷申韓之法馭世生靈忿怨不免夷戮家國並滅其愚可知矣且如漢平之世王莽専事外示謙恭招延賢士中藏深險窺玩神器以王尋王邑為腹心甄豐甄邯主擊斷平晏典樞機劉歆典文章孫建為爪牙並以才能置在顯要莽色厲而言方每欲有為諷其黨而言之終至傾覆繇惑於偏聴不寤機詐事權之重朋黨分挈尾大不掉勢不得不然也有以知大姦乘時盗名器而至於竊國者可勝數哉履霜之堅誠有漸也且天下大器也置之安處即安置諸危處即危陛下今當審措置之得失姦邪盜弄威福不可不察如宰相者上佐天子燮理隂陽内正百執外威四夷豈一日可虛其位哉一陳升之去元台遂亦不補是姦人有所覬覦自青苖錢規利以来言者相繼得罪主議者豈不知罪輕而謫重乃固其法爾棄灰於道繩以深文乃商君立法之意今復見矣向者御史一出淮浙路二獄追擾延累者不啻千人又提舉小使數十人分布於外名曰提舉常平倉廪其實㢘察之職也將恐獄訟由此而長必使羣臣百姓救過不給則善人解體忠臣結舌人主孤立於上而天下危矣借若山澤之利錐刀之末籠之得術取之無遺寳貨委積府庫充實陛下不過營宫室廣嬪御事燕游豐賜予銳甲兵輕戎虜適心快志而已誠為樂也顧堯禹勤儉桎梏其身宜矣與其藏於天下孰為廣乎然天下之民盡利以遺之未必束手而赴溝壑一有怨起嘯聚山谷悔將安及且民猶水也能載舟亦能覆舟寧可忽耶臣不識陛下信用險詐之言力沮忠讜之議雖小過而憚改將遂非而不復必以為帝王之舉無過於此而不當悛易則仲虺戒成湯不曰用人惟巳改過不吝秦穆悔過自誓孔子亦為稱美易曰乾徳不可為首盖不可更有尊剛故也臣向忝風憲嘗奉顧問謂之才者將欲大用臣但舉其藝能之優未見其經濟之畧也及朋黨之勢太盛條例之權太重以至得罪補外經年以來但聞朝廷議論紛紛頗合前奏陛下應亦記之書云知人之難堯舜其猶病諸翼奉曰治道之要在知人之邪正人誠向正雖愚為用若乃懐邪智益為害夫人情莫不愛巳莫知愛已者不知自愛也今與之圗治者皆未試之人為謀身希㫖者過半賈天下之怨盡歸聖躬豈愛巳之謂歟臣竊以忠臣不避誅戮故敢直諫豈獨惡生而欲死異於人哉盖遂其死則足以成巳之名得其生則成君納善之美是生死兩得斷於前矣所以區區敢言不忘於君者誠也尚冀千慮之得或有廻天之幸臣伏望陛下詳覽統業之事洞䆒㡬深之理法天所以成嵗之功為政所以藏身之固髙拱巖廊廣虞舜無為之化念我皇祖推周成在疚之心號令戒於未孚言動謹乎過舉賞不及於無功罰不加於無罪圖任老成之人擯斥浮詭之論罷制置條例之司廢諸路提舉之職明詔天下厭慰羣情置器審安危之處結民以忠信之實薰陶庶彚自然洽和凝神清浄豈不休哉經云富貴不利其身所以能保其社稷盖守謹之至也惟聰明察焉臣迂闊之言固不足取敢冀周爰諮諏識其當否身膏斧鉞乃其分矣冒犯宸扆臣無任隕越熈寧三年上時知鄧州上神宗乞免永興軍路青苗免役錢司馬光臣奉敕差充永興軍一路安撫使臣竊見陜西百姓自城綏州以來供應諸般科配及支移稅賦往近邊州軍日近復有環慶事宜加之今年亢旱五稼不熟人戸流移者巳聞不少國家所宜汲汲存恤使人戸安集臣伏見先所散青苗錢貧破百姓為患不細臣已曽累次上言不敢重煩聖聽今又聞議者欲令州縣將諸色役人一時放罷官為雇人祗應却令人户均定免役錢隨二稅送納乃至單丁女户客戸寺觀等並令均出若果行此法其為害必又甚於青苖錢何則上等人戸自来更不充役有時休息今嵗出錢是常無休息之期也下等人戸及單丁女戸等從来無役今盡使之出錢是孤貧鰥寡之人俱不免役也若錢少則不足以雇人公家闕事若錢多則須重歛於民衆心愁怨自古以来徭役皆出於民今一旦變之未見其利也且受雇者皆浮浪之人使之主守官物則必侵盜使之幹集公事則必為姦事發則挺身逃亡無有田宅宗族之累建議者亦自知其不可乃云若雇召人不足即依例輪差又與逐處所定雇錢足了役事則自當有人應募今既無人應募必是錢少不足充役是徒有免役之名而役猶不免但無故普増數倍之稅也彼青苗錢以債與民而取其息巳是困民之法今又使横出數倍之稅民安有不困蹷者哉以富庶之域猶不能堪况陜西累嵗奉邊民力凋弊豈可復為無益之事以擾之乎伏望聖慈特免永興軍一路青苖免役錢以愛惜民力専奉邊費其餘路分則繫自朝廷裁酌熈寧三年十月上先是熈寧二年三月上閱内蔵庫奏有遣衙前越千里輸金七錢庫吏艱阻不受踰年不得還上重傷之乃詔制置條例司講畫十一日條例上言考衆所論獨其言使民出泉雇役者人以為便合於先王使民出財以禄在官庶人之意應當於鄉户差役者悉計省賦錢募民代役以所賦錢禄之願選官分行付以條目博盡衆議奏可於是條諭諸路曰衙前既用重難分數凡買撲酒稅場等舊以酬衙前者並官自賣之以其錢給散其廂鎮場務之𩔖酬奨衙前不可令民買占者即用舊定分數為投名衙前酬奬凡衙前部水陸運舊或官以㣲物占數及領倉驛場務公使庫并及治他事尚多勞擾者今當省使毋費及承符散從官等諸重役逺接送之𩔖舊苦煩費償欠今當改法除弊使無困既减衙前妄使役即重難益少役名人可省承符散從官之𩔖舊占數多而不盡實役者今當省其額凡坊郭戸及未成丁單丁女戸寺觀品官之家有産業物力者舊無役今當使出錢以助募人應役凡此所謂條日也皆委管當官分監司州縣論定久之司農寺言已降朝㫖只是泛下州縣令人具所見官吏既不能盡知法意抑又惑於言者之多築室道謀難以成就欲自司農寺申明所降條約牒諸司相度先自一兩州為始候其成就即令諸州軍倣視施行於是提㸃府界公事趙子㡬以其法奏上下其法司農寺鄧綰曽布更議之始行之府界遂頒其法於天下免役法行盖於此時除知永興軍上神宗論王安石司馬光臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇決不如范鎮誨於安石始知政事之時巳言安石為姦邪謂其必敗亂天下臣以謂安石止於不曉事與很愎爾不至如誨所言今觀安石引援親黨盤據津要擯排異已占固權寵常自以已意隂賛陛下内出手詔以決外廷之事使天下之威福在已而謗議悉歸於陛下臣乃自知先見不如誨逺矣純仁與顥皆與安石素厚安石㧞於庶寮之中超處清要純仁與顥覩安石所為不敢顧私恩廢公議極言其短臣與安石南北異鄉取舎異道臣接安石素疎安石待臣素薄徒以屢嘗同寮之故私心眷眷不忍輕絶而預言之因循以至今日是臣不負安石而負陛下甚多此其不如純仁與顥逺矣臣承乏兩制逮事三朝於國家義則君臣恩猶骨肉覩安石專逞其狂愚使天下生民被荼害之苦宗廟社稷有累卵之危臣畏懦惜身不早為陛下别白言之軾與文仲皆疎逺小臣乃敢不避陛下雷霆之威安石虎狼之怒上書對策指陳其失隳官獲譴無所顧慮此臣不如軾與文仲逺矣人情誰不貪富貴戀俸禄鎮覩安石熒惑陛下以佞為忠以忠為佞以是為非以非為是不勝憤懣抗章極言自乞致仕甘受醜詆杜門家居臣顧惜禄位為妻子計包羞忍恥尚居方鎮此臣不如鎮逺矣臣聞居其位者必憂其事食其禄者必任其患茍或不然是為盜竊臣雖無似嘗受教於君子不忍以身為盜竊之行今陛下唯安石之言是信安石以為賢則賢以為愚則愚以為是則是以為非則非謟附安石者謂之忠良攻難安石者謂之讒慝臣之才識固安石之所愚臣之議論固安石之所非今日所言陛下之所謂讒慝者也伏望陛下聖恩裁處其罪若臣罪與范鎮同即乞依范鎮例致仕若罪重於鎮或竄或誅所不敢逃熈寧四年二月上時光自永興軍移知許州固請留臺未報先是三年舉制科者五人孔文仲對䇿指陳時病語最切直考中第三等上王安石見而惡之密啓於上令流内銓告示發赴軍州團練推官本任其䇿畧曰天下之道三曰王曰霸曰彊國一之以道徳淳之以仁義此王道也行之以仁義雜之以功利此霸道也專用權謀不顧義理此彊國之術也及考其見於效也王道行於數千載之外詠歌畏愛深結於民心而不忍去之霸政僅能及其身至子孫之世則廢弃不講彊國之術民之視上相疾如仇讎伺其有間則相與蹈藉傾覆之矣凡三道者得失之報若白黒然而世主行王道者少適霸與彊國者多何也盖王道所為甚逺而不能取成於倉卒霸政與彊國為敝雖深而能見效於目前人之常情薄逺效而貴速成是所以失趍適之正也臣切觀近日朝野之論而考陛下意之所適求之於古不能无疑且天下之所以治者貴義而不貴利也柰何先之以興利仁人之所以尊者明道而不計功也柰何一之以望功萬事所以成就者遲乆也柰何期之以廹急四方之所以畏愛者愷悌也柰何驅之以威刑臣願陛下曠然大變而行衆人之所不能為卓然自致而行前世之所不能到尊尚王道賤畧彊霸有言逆於心必求諸道有言遜於志必求諸非道用其粹而遺其駮操其要而治其煩凡此者王道之術也又曰臣聞適於耳目之娱而為心腹之害者柔從說順也雖芟夷之而常患其有餘忤於一日之意而為百世之利者剛方讜直也雖長養之常患其不足古之聖人屈已執謙和顔遜志加之以勞来之厚助之以勸賞之至凡以養天下剛方讜直之節使森然立於吾庭為國家廟社之福故夫伏閣趍鼎引衣㫁檻破裂麻制封還詔書如此之𩔖日常有之而不為怪者所以廣聰明而來下情也臣願陛下容忍近臣之獻言開納逺臣之論事貴諫諍之任以助聞見補憲法之官以振紀綱而又加以謙冲假借深養剛方讜直之氣如漢髙祖之於周昌晉武帝之於劉毅然後可以得天下讜直之言以輔治道不然猶却行求前徒舉以訪臣又安補於萬一故臣聞日食地震者陽微隂盛也而或曰日食者厯之常志也臣請辨之一百七十三日有餘而為一交交然後食此歴家之説也而春秋襄公二十一年之九月十月二十四年之七月八月皆未及一交則食此厯之不合一也二漢之政西京為盛東京為衰大率皆二百餘年爾而西京四十五食東京七十四食食之疏密應政之盛衰而无定數此厯之不合二也是日食者非可託於厯其要為隂盛之應也陽浮為天而主於動隂著為地而本於静而動者隂越其分而擬諸陽也陽之與隂君子小人之道也君子道長則陽氣發於祥瑞小人道長則隂陽見於災變此天人相與必然之應也凡天下之道有故有新有大有小有老有弱有正有邪有訥有辯有躁有静以對而言之在上偏者皆陽而君子之道也在下偏者皆隂而小人之道也上偏欲其過厚下偏欲其常損宜厚而薄之宜損而益之則隂盛陽㣲君子道消小人道長其弊至於不可扶持此不可不察也若夫舊勞必遷而新來必合大臣依違而小臣執議老成淪伏而弱少簡抜方直疎逺而柔諛親附辯給者獲用而遲蹇者被退銳進者褒陞而黙守者遺落隂盛陽微之變莫著於此矣天地告戒之意不為不審願陛下思所以應之又曰官各守其分謂之名職各治其事謂之實丞弼之任責之以論道徳和隂陽財計之任責之以通有無足國用諫官責之以直言得失御史責之以彈戢愆違侍從責之以盡規納誨將帥責之以安邊却敵職司責之以一郡一縣之治如此舉名以責其官按實以督其職而庶績弗凝者未之有也今夫大臣下兼財計之柄小臣或侵將帥之權侍從言責不得盡其詞職司守令不得專其治未見其能無虚假也朝廷設百官於内外皆所以治天下萬事非徒為空名以付之也欲立一事重建一官欲治一政重遣一使未見其能底績也又曰陛下愛民欲其富而不足以富國遣使宣恵教而適足以為弊盖失所以先後之序矣夫事有肇禍而法有起患者不謂事之始法之初也累之至乆則弊敗積而禍患起此必至之勢也臣嘗觀富國之論不起於豐盈之世而多出於戰争之際王者揔制六合所以服民心而重國體者在吾道徳之盛大不在財貨之豐盈是以鉅橋雖積而商不能居敖倉雖盈而秦不能守非無財也道徳不建而失天下之心也夫鳥窮則啄獸窮則摶人窮則詐陛下之民可謂窮矣前世所謂無藝極之賦大之山海小之草木其利皆巳入於官而行於今矣陛下徐思弛費息用以寛民財而逸民力若大禹卑官惡服漢文弋綈革舄以澤天下庶㡬不至大匱而復出泉以取其息遣使以厚其征而求富民宣恵之名可得矣乎上神宗論亳州青苗獄乞獨降責富弼臣伏為本州散青苗錢斛事朝廷置獄推勘州縣官吏不敢惜罪臣已三上章乞獨坐臣重責特賜矜貸其餘官吏兼第三奏乞於青苗事上但有諸般違犯不以輕重臣亦合一回招認近日又聞勘院推究職官中有人將簡帖與外縣官員令不散青苗錢斛見行移文牒往來次臣竊觀朝廷力行支散青苗錢斛必謂有利於天下然以臣所聞四方羣議此事害多利少故臣愚意不願支散又縁忝為長吏不欲明行廢格新法將来合散夏料之時即指揮州司依例舉行竊恐諸縣便行支散遂勘㑹得管幹錢斛官徐公衮權觀察支使石夷庚各曽往諸縣提㸃徧識知縣縣令臣因令密與書題不得支散兼令丁寧說向若亂有廣行支俵將來人戸逃移帶却官本錢斛縣司上下公人必著攤陪兼徐公衮石夷庚並曽執覆若如此恐致不便臣即時叱去二人既不敢違臣指揮亦曽因書傳臣之意諭與諸縣遂亦不敢俵散昨来不散青苗錢斛其罪決不在他人而臣専主其事情狀甚明所以臣前來已三上章奏乞獨坐重責正為此也以臣今来招伏罪犯并向之三奏中事理並乞降下推院令照㑹取勘切念臣之意却欲粗存事體若明行指揮州縣不得支散即是顯格朝廷新法若便依法盡令支散即恐向去催督不前必致逃移却貧下人戸又使縣司上下公人枉遭陪填家業兩皆不便所以臣及期舉行條法者是免廢格之名復密諭縣官不令俵散者是不欲使貧民逃竄及不致縣司公人陪填家業似兩得其便也今朝廷既令盡理根究臣亦須至盡理申陳盖事不獲巳也臣今且說青苗一事天下之人不以賢不肖皆知為害愈乆愈深只是朝廷不知此亦無可柰何况自初行法内外大小臣寮及被逐者臺諌官論列不一曲盡弊病又聞後来弊生轉多臣以老病昏塞不能一一條上但乞聖慈檢聚前後臣寮理㑹青苗文字集百官議定便見利害臣如此畧且辨眀者只為因朝廷根勘故難隠黙即不是彊自文飾茍求免過所有今來本州不散青苗錢斛並是臣獨見情願當伏嚴譴雖死無悔其徐公衮以下州縣官吏只有不合隨順臣指揮愆過即望聖慈察其情理别無深切特與矜恕熙寕四年二月上弼時判亳州先是幹當淮南路常平司趙濟言富弼以大臣廢格新法法行當自貴近始若置不問無以令天下詔江淮發運司遣官劾亳州屬縣官吏阻遏願請青苖錢人戸事狀以聞侍御史知雜事鄧綰言知亳州富弼責䝉城官吏散常平錢榖妄追縣吏重笞之又遣人持小札令未得依提舉司牒施行本州籖判徐公衮以書諭諸縣使勿奉行詔令乞盡理根治詔送亳州推勘院其冨弼止令案後收坐以聞弼遂上此奏上神宗論王安石楊繪臣切以知人之難雖聖人不免有失如堯之為君可謂聖人矣禹曰知人則哲能官人惟帝其難之能哲而恵何憂乎驩兠何遷乎有苗何畏乎巧言令色孔壬此言堯亦難乎知人也如孔子之為師可謂聖人矣曰以言取人失之宰我以貌取人失之子羽則孔子亦難乎知人也夫知人之道古聖人以為難而不免有失則今之人不逮於古聖人者其得自謂無難無失乎然在參於衆人不以一已之愛憎而定人之賢否則知人庶乎其無失者矣恭惟陛下聖徳天縱負知人之哲茍知之則用之無不當然天下百官之衆豈能盡出於聖知乎則必責在宰相也今居宰相之任者獨王安石臣謂其人之文章之徳行之政事信為宰相唯於知人之道或恐不能無失焉以臣之愚而觀之其失在於以一已之愛憎而定人之賢否而已臣請以既往之事明之只如吕公著者王安石始而愛之遂力薦之以為天下之賢也一旦言青苗不便終而憎之遂力排之以為天下之不賢也陳升之者王安石始而愛之遂力薦之以為天下之賢也一旦言乞罷條例司遂力排之以為天下之不賢也韓絳者王安石始而愛之遂力薦之以為天下之賢也一旦於陜西捲助役錢牓終而憎之遂力排之以為天下之不賢也薛向者王安石始而愛之遂力薦之以為天下之賢也一旦言助役錢不便終而憎之已沮之劾之矣非逺必將力排以為天下之不賢也至於李常之𩔖不可勝紀其始徇我則愛之薦之以為賢其終違我則憎之排之以為不賢知人之道豈若爾哉然既往之事不足復議臣之所憂者在於將來也安石之位今巳為宰相則尊於往時矣其勢也漸執而専矣人知徇之者得路則刻薄者望風而進矣人知違之者得怒則阿諛者登門而附矣以阿諛而被用者唯富貴是圗必無正人之理以刻薄而受知者唯沽激是務必無愛人之道戾之者日去順之者日衆戾之者日去則其間或有守之君子也順之者日衆則其間或詭隨之小人也陛下之任安石也如此而安石不能知人愛人之徇已也而憎人之違已也如此雖陛下保安石必不作過若萬一有擅權専恣之事既附之者衆而無敢違之者則陛下何由而知乎縱安石實不作過若萬一有思慮不及之政事而行之有害於時者何人敢與安石言之乎觀其愛人之徇已而力薦之憎人之違已而不肯用雖有敢言之者安石其肯舎巳而迴乎上孤而下執臣之所憂在於將來者此也臣願陛下體察安石於知人之道未盡凡百除注無只信其愛憎而更參之於衆人則天下幸甚臣未受命為御史中丞以前未嘗敢以一言上聞誠知陛下信之之篤徒以取憎於執政也今既受命為御史中丞矣則不憚誅謫而言之乃其職爾臣每聞其門下人議論但稍有違安石意者遂相與呼為流俗之議也以今觀之流俗之議安可忽諸無使將来之視今日或有如今日之視去年也邊事外也民政内也外憂如皮膚内患如心腹可得謂之必無哉臣謂今日之後只有順之者而無復有忤之者不同於既往也乞陛下以宗廟社稷為念以天下生靈為念而無重違安石一人之意凡百除注或有未得知人之美者乞參之於衆人或出於聖斷裁正之熙寧四年四月上時權御史中丞上神宗論新法張方平臣伏以中外臣庶各有職事越職而言國有常憲臣守土陳州非有言責而輒言之計其狂愚兹實有罪然臣伏念頃以老疾不任吏事陛下未忍廢棄親擇便地以遂安養將辭之日面奉徳音以為大臣之議皆當為國謀慮不宜以中外為嫌有所不盡古人有言雖爾身在外乃心罔不在王室伏惟聖徳廣大無所不容而臣自到任以來於今一嵗心目昬眩有加無瘳故嘗乞匄餘生求還閭舎區區之誠乆而未獲陛下視臣志氣益衰至此豈復有意别白是非而與世俗争議也哉是以得失之間乆無所與今日竊有所懐上為陛下參之官吏下為陛下驗之百姓而安危之機實在於此自惟受㤙累聖邦之休戚身實同之志力雖衰於義不可嘿巳然臣之所欲言者非敢逺引前古逆探未然以惑陛下之聰明也凡皆陛下之所嘗試而臣愚之所與聞者耳臣伏見陛下即位之始計慮深逺凡有所建動合天心始議山陵深䘏費用之廣推明先帝薄𦵏之命以詔有司四方聞之無不感泣其後一年之間誕布號令勸率宗族崇孝悌之行勉勵州郡先農桑之政復轉對以廣言路議徭役以寛民力盛徳之事不可具紀是時天下大變之後而無不翹然想聞徳音以忘其憂兩宫歡欣九族親睦羣臣萬民䝉福而安紛紜之議不至於朝廷謗怨之聲不聞於里閭陛下優游無為而天下已治矣為國如此豈不樂哉陛下自今視之當日之政其可悔恨者凡有㡬以臣觀之非獨陛下無所悔恨雖天下之人亦未有以為失當者也何者政令簡易而人情之所安耳易曰易則易知簡則易従易知則有親易従則有功有親則可乆有功則可大嚮使陛下推行此道始終不變則臣以為乆大之功可得而致矣其後求治太切用意過當姦臣緣隙得進邪說始議開邊以中上㫖於是延安有横山之謀保安有招誘之計陛下饒之以金帛假之以干戈小人貪功慮害不逺輕發深入結怨西戎攘奪尺寸無用之土空竭内府累世之積大者疲弊秦雍小者身死㓂讎西鄙騷然不寧而陛下始一悔矣然而陛下天資英果有漢武宏達之量雖復兵吏失律而立功之意未嘗少衰是以左右大臣測知此心復進財利之說陛下樂聞其利而未暇深究其害於是舉而從之置條例司而講求天下之遺利己酉之秋新政始出自是以來凡所變革不可悉數其最大者一出而為常平青苖再出而為㨂兵併營三出而為出錢雇役四出而為保甲教閱四者並行於世官吏疑惑兵民憤怨諌諍者章交於朝誹謗者聲播於市陛下不勝其煩為之當宁太息日吳而不食矣然猶幸其成功力排衆人之議而固守之天下方共厭苦而不知其所止也㨂兵併營之䇿其害先見武夫凶悍為怨最深為患最急陛下知其不可於是多支月糧復收退卒以順適其意而陛下既再悔矣然軍中之口猶復洶洶不靖陛下雖推恩撫之而終不以為恵反謂陛下畏之耳不幸邊臣失算再生戎患帷幄之臣謀之不臧不務安而務撓之臨遣執政付以疆事多出金幣豫書誥敕以成其深入之計當此之時天下之心知其必敗矣而陛下與一二臣者方以為萬舉而萬全既而出兵無人之境築城不守之地困弊腹心以求無益之功使秦晉之民父子流離肝腦塗地戎人徼􅓈受詘已築之城隨即傾覆救援之兵相繼潰叛四方震動君臣宵旰而後下罪已之詔投竄元宰以謝二鄙而陛下既三悔矣夫此三者方其未悔也陛下亦以為是耶非耶陛下犯逆衆心行而不顧其必以為是不以為非也然而其終卒至於此然則方今陛下之所是而未悔者無乃亦𩔖此歟臣聞衆而不可欺者民也勇而不可犯者兵也險而不可侮者隣國也今陛下既已欺民犯兵而侮隣國矣夫犯兵侮隣變速而禍小至於欺民則變遲而禍大變速而禍小者瓦解之憂也變遲而禍大者土崩之患也今瓦解之憂陛下既知悔矣而土崩之患陛下未以為憂此臣之所以寒心也易曰不逺復无祗悔元吉事之未敗也陛下不悟其非必俟其敗而後悔如向三者則陛下之復巳逺而悔亦大矣且臣觀之方今陛下之所是而未悔者亦有三而巳青苗助役保甲三者之弊臣不復言矣何也言事者論其不可非一人也百姓毁壊支體燻灼耳目嫁毋分居賤賣田宅以自脫免非一家也陛下其亦知之矣徘徊而不改使民無所告訴加之以水旱繼之以饑饉積憾之民奮為羣盜浸滛蔓延滅而復起英雄乘間而作振臂一呼而千人之衆可得而聚也如此而勝廣之形成此所謂土崩之勢也臣恐陛下至此雖欲復悔而無所及矣故臣願陛下取即位之政與今日之事而試觀之天下擾擾不安孰與今日之盛羣臣交口争辯孰與今日之衆陛下聽覽疲勌孰與今日之多悔恨自責孰與今日之切陛下誠以此較之則不待臣言之終而得失可以自決矣且夫即位之政陛下之本心也今日之事臣下之過計也陛下棄即位之本心而徇臣下之過計臣竊以為過也雖然臣竊聴之道路方今陛下則亦悔之矣悔之而不變非陛下之意也迫於建議之臣耳夫人臣進謀於其君茍事之不遂而變以従衆則人主有以測其深淺人主有以測其深淺則其用捨之命在於人主此人臣之所以不便也臣切痛陛下為社稷之計欲改過以安天下而怙權固位之臣持之而不釋陛下聰明睿智廢置自我而獨為此鬱鬱也臣不勝區區忘身憂國之誠是以勢疎而言切惟陛下察之熙寧四年五月上時知陳州學官蘇轍代作宋名臣奏議巻一百十五
