body:
  text: 宋名臣奏議卷七十八宋趙汝愚編儒學門學校上上真宗請申明太學議孫何臣聞書稱教胄有虞庠辟雍之文易載賔王有鄉舉里選之制皆所以導王化育官材牢籠英雄陶冶風俗必見推於太學方獲譽於公朝從古洎今斯道不易東漢則諸生三萬李唐則學生八千上所揀求必由此出亦有定兹嵗貢擇彼時英或州舉謂之茂才或公車宣為有道縣次給食俾與計偕下詔雖頻中選尤寡及乎孝亷立格進士設科尚皆聘自髙年召從太守上中下郡人數有差餘皆附學讀書方得上名禮部其後士風澆薄世態銷刓賤古道於儒宫慕他岐於天府闒茸之士始入泮林英豪之流例趨京兆而又兵戈繼起經制莫存絃誦之義皆亡郡縣之學盡廢原乎所以抑有其由蓋以定令之初綱條踈闊六館升降縱限門蔭之髙卑兩京薦論曽無科禁以釐革遂令淺俗扇以成風外地絶無學生神州悉號鄉貢下至工商雜類方遊太學廣文伏見近降明制懲科場之積弊立貢士之新規申命有司十取其二違則有辟令在必行斯實聖哲教導之方朝廷畫一之法然臣以為尚有未盡者請為陛下陳之夫理歸宗極事有根源將陳救弊之謀須有從長之論且生徒棄本為日斯多庠序不修其來自久國家必欲開孤進之路闢至公之門莫若再舉令文復嚴經術使寒畯之士由鄉里以升聞世祿之家自成均而出仕太學不得補庶人之子神州不得貢鄉士之門貴介綺羅府送者有罪草莽韋布監牧者黜官其外郡或駢繁縣之富庶者按舊典重立學官俾選耆儒碩生為之博士助教精加課試公與薦延嵗終仍依新條限以人數發解必有軼羣之異行拔俗之英才匪由鄉庠亦許公議得其士受薦賢之賞非其人坐謬舉之刑尋常之流一凖上法易貴變而能久政在改而更張臣謂此令既行可使斯文復振豈直四科取士自當三代同風難者或曰今古異宜質文迭用但求至藝勿繫前言此又委巷之談陋儒之見夫以文取士既已失之取之乖方弊將安救今士子目為鄉舉其實自媒贄投於郡府之門關節於公卿之第屬詞比事合格者不過雕蟲任傳棄經入流者未逾章句若不收之學校選自州閭實慮他時益成薄俗兹事體大惟陛下特達而行之臣出身之初亦自府解豈敢忘本遽陳此謀蓋目擊輕浮心知謬濫是以冒不測之罪罄狂夫之言咸平元年上時為右司諫上仁宗請諸州各辟教官劉敞臣伏見近敕更張貢舉條約欲令四方遊士各歸其鄉里而有司得以觀行聽言絶濫進之敝此誠上近古制下適時宜然臣猶謂必欲人安其居皆有常心漸之於仁摩之於義化民成俗則莫若開庠序以收養之設師弟子以教誨之月考時試以勸勉之教定俗成然後賢不肖立見而真偽不雜矣今州郡幸皆有學學皆有生徒而終患無師以教之但令掾曹雜領其事職既不専教用不明自古儒學之官不兼治民蓋為此也臣欲乞州郡有學處聽長吏各奏辟教授一員於前任判司簿尉中選有文行堪為人師者充仍令以四年為一任與理考數官資俸祿同之掾曹則學有常師教有常業士子竸勸矣於朝廷長育人材之意誠未失也今欲遊士歸鄉而不為設學則無以收之設學而不為置師則無以率之置師而不立課試講習之法則無以成之三者名存實亡則學者不歸雖欲别賢不肖興廉遜崇鄉黨之化不可得矣惟陛下裁許嘉祐二年十二月上時知揚州上神宗請修學校以為王化之本程皓臣伏謂治天下以正風俗得賢才為本宋興百餘年而教化未大醇人情未盡美士人微謙退之節鄉閭無廉恥之行刑雖繁而姦不正官雖冗而材不足者此蓋學校之不修師儒之不尊無以風勸養勵之使然耳竊以去聖久逺師道不立儒者之學幾於廢熄惟朝廷崇尚教育之則不日而復古者一道德以同俗茍師學不正則道德何從而一方今人執私見家為異説支離經訓無復統一道之不明不行乃在於此臣謂宜先禮命近侍賢儒各以類舉及百執事方嶽州縣之吏悉心推訪凡有明先王之道德業充􅊀足為師表者其次有篤志好學材良行修者皆以名聞其髙蹈之士朝廷當厚禮延聘其餘命州縣津遣萃於京師館之寬間之宇豐其廪餼恤其家之有無以大臣之賢典領其事俾羣儒朝夕相與講明正學其道必本於人倫明乎物理其教自小學灑掃應對以往修其孝悌忠信周旋禮樂其所以誘掖激厲漸摩成就之道皆有節序其要在於擇善修身至於化成天下自鄉人而可至於聖人之道其學行皆中於是者為成德又其次取材識明達可進於善者使日授其業稍久則舉其賢傑以備髙任擇其學業大明德義可尊者為太學之師次以分教天下之學始自藩府至於列郡擇士之願學民之俊秀者入學皆優其廪給而蠲其身役凡其有父母骨肉之養者亦通其優遊往來以察其行其大不率教者斥之從役漸自太學及州郡郡之學擇其道業之成可為人師者使教于學縣之學如州郡之制異日則千室之鄉達於黨遂皆當修其庠序之制為之立師學者以次而察焉縣令每嵗與學之師以鄉飲之禮會其鄉老學者衆推經明行修材能可任之士升於州之學以觀其實學荒行虧者罷歸而罪其吏與師其升於州而當者復其家之役郡守又嵗與學之師行鄉飲酒之禮大會羣士以經義性行材能三物賔興其士於太學太學又聚而教之其學不明行不修與才之下者罷歸以為郡守學師之罪升於太學者亦聽其以時還鄉里復來於學太學嵗論其賢者能者於朝謂之選士朝廷問之經以考其言試之職以觀其材然後辨論其等差而命之秩凡處郡縣之學者皆滿三嵗然後得充薦其自州郡升於太學者一嵗而後薦其有學行超卓衆所信服者雖未處於學或處學而未久亦得備數論薦凡選士之法皆以性行端潔居家孝悌有亷耻禮遜通明學業曉達治道者在州縣之學則先使其鄉里長老次及學衆推之在太學者先使其同黨次及博士推之其學之師與州縣之長無或専其私茍不以實其懷姦罔上者師長皆除其仕籍終身不齒失者亦奪二官勿以赦及去職論州縣之長蒞事未滿半嵗者皆不薦士師皆取學者成否之分數為之賞罰凡公卿大夫子弟皆入學在京師者入太學在外者各入其所在州之學謂之國子其有當補蔭者並如舊制唯不選於學者不授以職每嵗諸路别言一路國子之秀者升於太學其升而不當者罪其監司與州郡之師太學嵗論國子之有學術材能者於朝其在學賔興考試之法皆如選士國子自入學中外通及七年或太學五年及三十以上所學不成者辨而為二等上者聽授以管庫之任自非其後學業修進中於選論則不復使親民政其下者罷歸之雖嵗滿願留學者亦聼其在外學七嵗而不中外選者皆論致太學而考察之為二等之法國子之大不率教者亦斥罷之凡有職任之人其學業材行應薦者諸路及近侍以聞處之太學其論試亦如選士之法取其賢能而進用之凡國子之有官者中選則增其秩臣謂既一以道德仁義教養之又専以行實材學升進之去其聲律小碎糊名謄録一切無義理之弊不數年間學者靡然丕變矣豈惟得士寖廣天下風俗將日入醇正王化之本臣謂帝王之道莫尚於此願陛下特留宸意萬世行之熙寧元年上時為監察御史裏行上神宗答詔論學校貢舉之法吕公著臣謹按學記古之教者家有孰黨有庠遂有序國有學王制命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士樂正崇四術立四教順先王詩書禮樂以造士大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之周禮鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以其禮禮賔之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府自堯舜三代以來其養士取人之法雖隨時損益不同然教必夲於學校進必由於鄉里此六七聖人所不易也逮乎秦漢而下聖王之迹既息凡所謂禮樂教化之官皆以廢絶至於設科取士則各出於一時之茍且國家承其極弊之後而因循未暇制作雖天下學校頗嘗修建然取士之路不出於此而欲人之就學也不亦難乎其為科舉之法則専以進士經學大抵皆襲唐制而已夫上之取士者將以治事而長民而所以取之者乃不過試之以辭章記誦之學蓋亦乖矣今誠不能革茍且之弊興廢絶之法而望賢才之加多風俗之漸變終亦不可得也故臣竊以謂貢舉之弊不可不革而學校之制所宜漸復雖進士經學行之既久為有司者安於課試之格為士人者狃於進取之術可以漸去而未可以遽廢莫若先建學校兼而行之學校所進者嵗增則科舉所取者嵗減如此不十數年間士皆以學校進矣所謂學校之法者天子自立太學於京師取道德足以為天下師法者主之自開封府及天下州縣皆立學取道德足以為人師者主之然學校教化所以一道德同風俗之原今若人自為教則師異説人異習故宜博選天下所謂有道德可以為人師先集於太學使講議所以教育之法而朝廷以道揆其得失講議既定然後取其得者置之要會州府使主其學其餘州郡即委轉運司與知州通判於本州及屬縣內選經術通明行誼素著者一人使主州學如本州無人即轉運司於同路州縣選差並令就見朝廷所置學官於本路會府而受朝廷教育之法或本州士人道德可以為人師而不仕者委本州與轉運司發遣赴闕當度其可否特與注官就差本處主學仍於太學受所以教育之法所謂貢舉之法者應天下士人並須本縣公吏等結罪保明鄉貢素行方得入於州學州學每嵗貢士量州府大小大郡貢二人其小郡士人絶少處二嵗若三嵗貢一人並知州通判與主學官於學生內選入學一年以上經明行修者貢於朝廷而升于太學者官為給食太學每嵗於學生內選到住太學一年以上經明行修通世務可以治人者七十人進于朝廷其在上等者委中書門下量才官使其在次等者送流內銓依名次注官計一嵗所貢者七十人三嵗所貢者二百人則後次科場進士經學南省奏名之數內可各減一百人二嵗之後就學者衆諸州所貢人數可以倍增而太學三嵗可增置四百人則進士經學奏名內更各減一百人又行之三嵗科舉可盡罷而士之進者皆出於學校矣其到太學及一年以上經術行誼入下等及經雖稍通行有毁玷者並罷歸本州一不與選願歸者亦聽其自太學罷歸非行有毁玷者並不礙後來選貢應天下知州通判及掌學官所貢士人上等者為最在任皆最者特與旌賞入下等為殿在任皆殿者當行重罰其本郡士人實有經行蔽而不舉者委安撫轉運使提點刑獄及御史臺覺察以聞當行重罰又按舜典命夔典樂教胄子王制樂正崇四術立四教王太子王子羣后之大子卿大夫元士之適子皆造焉周禮大司樂掌成均之法以治建國之子弟焉古者四民各有業而不雜故士之子常為士蓋於治事長民皆其世業則所學所行習見而易入是以王者之於教學莫不以國子為先務蓋庶人非秀異絶倫不得為士士之子非教養有素亦不得在官臣以謂應已有官者並須入國子學取道德足以為人師者主國子監嵗選學生十人或十五人聞於朝廷而升于太學如諸州貢士之法既至太學及一嵗以上委太學官選經明行修通於世務可以治人者天下士衮同進于朝廷如到國子監一年以上不與選願出官者即學官委保經義稍通行無毁玷年及格者聞於朝廷而關送審官院流內銓依無出身人例差注又今來科舉之法既未可遽罷則須權作處置按進士之科始於隋而盛於唐初猶專以䇿試至唐中宗乃加以詩賦後世遂不能易取人以言固未足見其實至於詩賦又不足以觀言是以昔人以鴻都篇賦比之尚方技巧之作此有識者皆知其無用於世也臣以謂自後次科場進士可罷詩賦而代以經先試本經大義十道然後試以論䇿夫試于有司固未能得人之實材然此法既設則人稍宗經今建立學校將以經術教養則代賦以經亦變法之漸也又經學一科雖其來蓋逺然自唐以後始加填帖由是應此科者専務記誦此於章句音切尚不能辨然而舉用之曰此可以治人不待有識者然後知其非也臣以謂自後次科場明經止用正文填帖更不以注而增試大義如此應明經者漸多而諸科之弊自消矣熙寧二年五月上時為翰林學士上神宗答詔論學校貢舉之法司馬光臣準御史臺牒準敕節文天下學校貢舉之法宜令兩府兩省待制以上御史臺三司三館臣僚各限一月具議狀聞奏者臣聞詩云無競維人四方其訓之言欲強於天下者無如得人得人而任之以事則四方斯順之矣臣竊惟取士之弊自古始以來未有若近世之甚者也何以言之三代以前其取士無不以德行為本而未嘗専貴文辭也漢氏始制茂才孝廉等科皆命公卿大夫州郡舉有經術德行䇿試以治道然後官之故其風俗敦尚名節降及末世雖政衰於上而俗清于下由取士之術素加奬厲故也魏晉以降貴通才而賤守節習尚浮華舊俗益敗然所舉秀孝猶以經術取之州郡皆置中正以品其才行一言一動之失或終身為纍士猶兢兢不敢自放隋始置進士唐益以明經等科而秀孝遂絶止有進士明經二科皆自投牒求試不復使人察舉矣進士初但試䇿及長安神龍之際加試詩賦於是進士専尚屬辭不本經術而經明止於誦書不識義理至於德行則不復誰何自是以來儒雅之風日益頽壞為士者狂躁險薄無所不為積日既久不勝其弊於是又設謄録封彌之法蓋朝廷苦其難制而有司急於自營也夫欲搜羅海內之賢俊而掩其姓名以考之雖有顔閔之德茍不能為賦詩論䇿則不免於遭擯棄為窮人雖有跖蹻之行茍善為賦詩論䇿則不害於取髙第為美官臣故曰取士之弊自古始以來未有若近世之甚者非虛言也今幸遇陛下聖明心知貢舉之極弊慨然發憤深詔羣臣使得博議利病更立新規是千載一時也議者或曰古人鄉舉里選今欲知士之德行宜委知州知縣者采察其實保而薦之臣獨以為不然古者分地建國自卿大夫士皆以其國人為之猶患處士之德行不可得而詳也故又擇其鄉之賢者使為閭胥比長自幼及長朝夕察其所為然後士之德行美惡莫得而隱也今夫知州知縣雜四海九州之人逺者三嵗而更近者數月而更或初到官即遇科場遽責之知所部士人德行誠亦難矣又應開封府舉者常不減數千人而開封府獄訟之繁知府者自旦至暮耳不暇聼目不暇視又安有餘裕可使之察數千人之德行乎議者又曰宜去封彌謄録委有司考其文詞參以行實而取之臣獨以為不然夫士之德行知州縣者尚不能知而有司居京師一旦集天下之士獨以何術知之其術不過以衆人之毁譽決之孔子曰衆好之必察焉衆惡之必察焉夫衆之毁譽庸詎足以盡其實乎必如是行之臣見其愛憎互起毁譽交作請託公行賄賂上流謗讟並興獄訟不息將紛然殽亂朝廷必厭苦之而復用封彌謄録矣夫封彌謄録固為此數者而設之也譬猶築防以鄣洚水也今不絶其源而徒去其防則橫流之患愈不可救矣臣雖至愚平生固嘗竭其思慮欲以少救其弊今敢陳二䇿乞陛下俯加裁擇臣聞上之所為下之所歸也國家從來以詩賦論䇿取人不問德行故士之求仕進者日夜孜孜専以習詩賦論䇿為事唯恐不能勝人父教其子兄勉其弟不是過也今若更以德行取人則士之力於德行亦猶是也誠風化清濁之源厯代訛謬而不悟必待聖朝然後正之者也夫德行修之於心藏之於身雖家人有所不知况於州縣况於朝廷將何從知之故必待明哲公正之臣知而舉之然後四海之士皆可得而官使也然舉薦之法既行則干求屬請誠所不能無也要在所舉非其人者國家以嚴法繩之勿加恩貸則茍且徇私之人皆知懼矣且國家既以德行取士則彼貪猾輕躁之人依附權要枉道求進者皆為清議所貶見棄於時雖有舉者必不多矣臣愚欲乞今後應係舉人令升朝官以上嵗舉一人提點刑獄以上差遣者嵗舉二人諌議大夫或待制以上嵗舉二人不以所部非所部鄉里除自已親戚及曽犯真刑或私罪情理重曽經罰贖及不孝不友盜竊淫亂明有迹狀者不得舉外其餘皆得舉之仍於舉狀內明言臣今保舉某州某科某人有學術節行乞賜召試若舉狀既上之後却有前後諸般違礙事發其舉主並依律文貢舉非其人分故失從公私罪定斷受贓而舉者以枉法論其舉狀逐時送下禮部貢院置簿記録若應舉人而不舉者嵗終委貢院勘會姓名聞奏乞嚴加懲罰朝廷每遇三年一開貢舉委貢院截自詔下之日勘會選擇舉主最多者從上取之舉主數同則以舉狀到省月日先後為次其舉主曽有贓罪及見停閉身亡或在合舉人數外者並不使倍於每次科場南省奏名人數具姓名聞奏乞下本貫發遣赴闕其本貫更不考試即具狀申解送赴貢院仍出公憑給付逐人令赴貢院照會限十一月內取齊十二月內引見正月內委貢院內考試其試官或朝廷臨時添差進士試經義三道子史䇿三道時務䇿三道更不試詩賦及論明經及九經等諸科試本經及論語孝經大義共四十道明經加試時務䇿三道其帖經墨義一切皆不試對䇿及大義但取義理優長不取文詞華巧唯所對經史乖謬時務踈濶者即行黜落其奏名人數並依科場舊制若合格者少不滿舊數亦聼至御試時進士明經各試時務䇿一道九經等諸科試本經大義十道所有名字髙下並只以舉主多者為上舉主數同則以舉狀到省月日先後為次其舉人所納家狀及授官後吏部所給告身並須開坐元初舉主人數姓名若及第後犯私罪情理重及贓重其舉主並減一等坐之未及第者減三等皆不以去官及赦原如此則羣臣不敢挾私妄舉士人皆崇尚經術重惜操履士風丕變矣朝廷若不能行此保舉之法其次莫若修學校之法以取之臣伏見慶歷以來天下諸州雖立學校大抵多取丁憂及停間官員以為師長藉其供給以展私惠聚在任官員及市井豪民子弟十數人遊戲其間坐耗糧食未嘗講習修謹之士多耻而不入間有二千石自謂能興學者不過盛修室屋增置莊産廣積糧儲多聚生徒以采虛名師長之人自謂能立教者不過謹其出入節其遊戲教以鈔節經史剽竊時文以夜繼晝習詩賦論䇿以取科名而巳此豈先王立學之意邪於以修明聖道長育人材化民成俗固已踈矣臣欲乞自今天下州學只許置教授一人委本州長吏於本處命官中選擇無過犯有節行能􅊰説為衆所服者舉奏補充若本州無人則奏乞下銓司選差委銓司於見在銓選人內㨂選進士明經諸科出身人厯任無贓私罪能講説經書者奏補充逐州教授仍令國子監試講書經義應舉人初入學者並為外舍生唯赴聽講及公試外不得于學中宿食其教授每日􅊰書畢取在學諸生姓名書於籖上雜置筒中抽取三人問以聽過書中疑義三條使對衆解説通者置簿記録粗者不問不通者有罰每月中兩次公試各試所習舉業委教授考定優劣等第具姓名出榜示訖亦置簿記録其有過犯者小過則罰錢中過則降等謂自內舍髙第降為中等中等降為初等初等降為外舍生外舍生無等可降者勒出學大過則斥出學亦置簿記録每遇春秋釋奠畢委教授選擇外舍生到學及半年以上自前釋奠以來説書多通公試多在優等姓名近上即為優等過犯情輕少即升入內舍為初等生始聽於學中宿食又選擇初等生升為中等生中等生升為髙等生皆如外舍生之法其有二人以上比較難決者即特令説書及試所業以決之皆須具狀申於州委知州通判更加審覆委得公當然後給牒補之如後來有過降等者其牒即毁抹其教授選擇糾舉升降等第若有不公委知州通判覺察取勘聞奏乞行衝替其開封府舉人舊無府學並令寓教於國子監其國子監學人須實是品官子弟方得依條入學其教試選升之法並與外州同以直􅊰比教授判監同判監比知州通判凡國子監開封府及諸州軍內舍髙等生額並用本處解額之半解額有竒數者入學等生額假若解額三人則以二人為髙等生額其中等倍髙等初倍中等若人數未足則闕之不得溢額補人若遇詔下開貢舉委本處判監同判監知州通判截自其日勘會髙等生補及半年以上者具姓名結罪保明聞奏開封府學人只委判監同判監保明仍與給公憑許令免解直就省試其髙等生占不盡解額方許本處其餘舉人取解其中等初等生于取解時仍别立號每七人中取一人奏名如此則舉人亦稍向經術崇行義矣夫經術深淺非程試所能知行義美惡非朝夕所能察今使之處於學校經二三年纍經選擇升至髙等又占解額妨衆人進取之路若其髙等生經術則􅊰説常通文藝則屢入優等過犯則全然輕少行義則為衆所服比之糊名謄録考其一日所試賦詩論䇿偶有所長而取之者相去逺矣况近年舉人或一無行能橫遇恩澤幸得免解者不可勝數今髙等生行能如此裁免一解豈足惜哉此學校之法也若朝廷又不能如此只於舊條之中毛舉數事微有更張則於取士之道並無所益徒更煩苛不若悉循舊貫之為愈也熙寧二年五月上時為翰林學士宋名臣奏議卷七十八
