body:
  text: 宋名臣奏議卷一百宋趙汝愚編刑賞門赦宥上仁宗乞郊禋更不行赦龎籍臣竊見南郊禮畢行赦且禮行於郊而勸賞賜赦者古之人無有也三王之世嵗親祀昊天上帝於圜丘又祀感生帝於泰壇漢朝有井泉五畤之祭綿代而降郊祀不輟至於賞赦皆未之聞也有唐兵興以來事天之祀嵗或廢之迄於五代三年之行還必大賞所以勞衛兵也必大赦所以蕩亂獄也然則所賞既大不可以嵗舉故必三載而躬祀也聖朝承五代之弊興千齡之統應變以制事酌中而立治逺追前古之法近擇後王之迹是以間嵗報本就陽位而展禮一朝錫福御端闈而行赦慶賞二柄行慶之道也謂夫法駕順動六師景從雖無大勞而必隆賞所以勉軍伍而衛社稷也雖至愚以謂賞者國家之大典可以仍舊謂夫狴牢悉啓桎梏並空雖皆大罪而必盡赦所以滌衆故而使自新也雖至愚以為赦者政教之大患不可常用何以明之且有罪者宥之未必自新也被苦者抑之未必無怨也不能自新將復為惡不能無怨將悔為善一赦而使民悔善復惡故以為政教之大患也所謂常赦者除十惡鬭殺劫殺謀殺並為已殺人者及放火官典犯正枉法贓至死不赦外其餘罪咸赦除之設有鬭毆者折筋墮胎折跌人支體及瞎其一目即損二事已上及因舊患令至篤疾以威力取財雖不傷人是皆凶險之大楚毒之極置之常刑則可以舒平民之憤挫惡人之鋭乃復被其大恩出為無罪誠不足以增光盛德適足以塞和氣而已况復將有事於南郊之嵗必告布天下民以是知國將郊禋郊必宥罪乃先其時節用肆其凶暴雖約束之預降終瑕釁之悉蕩宣父有言民可使由之不可使知之今使之知所以為幸陛下誠能布發睿旨昭示天下今後郊禋之日除賞賜之外更不行赦使無敢為虐則善懦者懷惠凶頑者知禁景祐元年二月上時為侍御史上仁宗論仍嵗減降蔡襄臣伏覩比年以來盛夏之月陛下親慮京師繫囚令天下負罪者減降迭從輕典此蓋陛下嗟憫元元重罹禁網冒炎暑之苦而處狴牢之下天衷惻然下寬大之詔實羣生之幸也臣愚無智慮不能識天地無限之施而竊有惑焉臣聞古先帝王躬慮獄囚皆以決寃滯非特專宥過戾也迫隆冬緣亢旱則或行之非一定而不易之制也向者國家行之比三年矣編户之民習蹈前事咸知指時月輕觸憲度豈非屢行之仍滋為弊夫法者天下大公之本也故罪有小大法有輕重今所涖者大罪而所處者輕法以非其罪邪雖輕法不得施安在降其等乎誠當其罪邪重法尚不足以禁顧輕之何以革小人之心而驅之嚮善哉國家每郊禮必大赦貸民之罪固不鮮矣又仍嵗有疏決減降之制臣謂貧弱者多負寃而富強者多蒙宥為惠甚小而其蠧甚大非有補於治體也伏望陛下參前古之制救當今之敝罷減降之詔而責天下州郡吏審辨獄情而勿久繫也臣疏賤而言近不勝隕越之至慶厯二年上時為館閣校勘上仁宗論不可數赦范鎮臣聞古人有言曰一嵗再赦好人喑啞此言赦之惠姦而無益於治道不可數者也屬者京師及畿輔嵗一赦而去嵗再赦今嵗三赦京師兵士又再得賜錢姑息之政無此甚者夫嵗一赦者細民謂之熱恩必其在五六月間也猾胥姦盜倚為過惡指期以待免况再赦乎况三赦乎其為惠姦虧損治道可知矣好人良善也數赦尚猶喑啞蚩蚩愚民其不狃而為姦且盜者無幾矣又今防秋備塞之人無慮五六十萬使聞京師端坐而受賜能無動心乎不可不慮今陛下德音已下賜錢已出臣知不可救已伏乞今後罷所謂嵗一赦者以摧姦猾而使善良有所立也罷兵士之特賜錢者以均內外以防後患而使民力得寬裕於財也昔唐太子承乾為長孫皇后病請賜赦以崇福佑長孫皇后曰赦者國之大事豈以吾故亂天下法乎長孫婦人耳猶能如此陛下聖人堯舜之資顧不為長孫后之所為乎臣竊惜之至和二年八月上時知諫院上仁宗論不可數赦司馬光臣竊以赦者害多而利少非國家之善政也虞書曰眚災肆赦怙終賊刑謂過誤有害則赦之恃惡自終則殺之非不擇罪之有無併赦之也漢大司馬吳漢病篤光武親臨問所欲言對曰惟願陛下謹無赦而已王符亦曰今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣蜀人稱諸葛亮之賢亦曰軍旅屢興而赦不妄下然則古之明君賢臣未嘗以數赦為美也國家承順天心子愛百姓發號出令必先至仁然有數赦之弊猶未能去又古之赦者其出無常嚴謹周密不可前知姦民猶抵冒以待之况今國家三年一郊未嘗無赦每嵗盛夏皆有疏決猾吏貪縱大為姦利害民暴橫侵侮善良百千之中敗無一二幸而發露率皆亡匿不過赦降則晏然自出復為平人往往指望謂之熱赦使願慤之民憤邑惴恐凶狡之羣志滿氣揚豈為民父母勸善懲惡之意哉且疏決之名本以盛暑之際恐囹圄之中有滯積寃結有司不為申理使無所告訴故天子臨軒親加慮問平其枉直無辜則赦有罪則誅使久繫之人一朝而決故能消釋沴氣迎致太和非謂不問是非一切赦之也又祖宗之盛時每嵗不過一次疏決死罪以下皆遞降一等近年以來或至再三自徒以下一切赦之今嵗五月以前疏決之令已再行矣此所以百職隳惰姦邪恣睢者也今縱未能盡革前弊伏望陛下特降指揮下中書今後每嵗疏決不過一次或早或晚使外人不可預期其徒罪仍舊降從杖或遇親祀南郊之嵗更不疏決永為定制庶幾為惡之人有所戒懼嘉祐六年八月上時知諌院上神宗論災異不必肆赦周表臣臣伏見國家每因天文之異水旱之災大則行德音於天下小則曲赦於四京臣竊惑焉夫數赦之為害古人論之詳矣蓋古者赦過宥罪行於過失遺忘而不以惠人陷於刑辟者非盜人貨財則脅弱暴寡者也使為盜者蒙釋則其主必憤疾使衆強者被宥則寡弱必無訴故赦者良民不被其澤而惡人昌矣又况小人習性之愚不能改過自新其既出也大至於讎害其主小至於傷損平人則復穴坯踰垣揭篋探囊故朝脫桎梏夕復殺人朝出囹圄夕復為盜此非一日也國家何姑息於此而赦之乎昔成湯之時其旱可謂久矣湯以六事自責而已未嘗聞赦也高宗有飛雉之鳴可謂異矣祖已訓之以正厥事而已未嘗聞赦也周宣王之時其旱亦可謂久矣詩美其側身修行而已未嘗聞赦也夫遇災應變得如成湯高宗宣王不亦可乎而必赦姦宄以為惠不亦異乎竊原國家之意豈非謂刑罰獄訟或有寃濫故赦之以致和氣茍得其人則自無寃濫矣况近年以來省法弛禁人持近厚之心刑罰清而獄訟理乃使凶姦之人概蒙釋宥恐非國之福也臣願朝廷或遇災異求古明王所以應天之道或修法度政事之未備者或求惠民濟衆之未至者或舉擢有道德才行而隱晦於下位者或出宫嬪之間執事嵗深與無職掌掃灑而幽閉者臣聞太祖皇帝躬履儉約嬪御不滿三百猶以為多嘗因霖雨又出數十人此近事之驗也凡此皆先王舊典或祖宗故事惟陛下博求行之以應變而赦不妄下庶使乎寇賊姦宄無不息矣熙寧元年上時通判利州錫賚上仁宗論無功不當賜第蘇舜欽臣胙於十月二十三日內侍省牒奉聖旨下務支借小宅一所與司天監楊可久今月十八日準三司帖傳聖旨指射舍屋三十間以來與醫官副使桞堯卿居止者竊以賜第之典於國體至重前朝將相非有勳業則不得賜第京師近劉平血戰亡軀家族無託朝廷方推此惠時謂當然今兹醫卜庸流濫有求請煩瀆天聽侵亂邦經况賞罰二端國之神器所以驅駕豪傑示信四方若死行陳之家與伎術之輩均用此賞臣竊恐輕重失宜矣方今西鄙未寧暴師塞外流傳四出何以勸人伏望特降德音即時寢罷况桞堯卿自有居第極為華侈若以其醫藥有效自可以金帛賜之上以重恩賞之科使戰伐者盡其死力下以絶僥覬之望俾貪冒者萌其恥心臣事在職司合有獻納蓋期賞之不僣非敢文而自營上瀆宸嚴無任懇禱之至康定元年十一月上時監在京樓店務上神宗辭賜金司馬光臣前日蒙賜金五十兩并銀合臣以所賜過厚尋問永昭陵禮儀使范鎮知舊例所無不敢當受遂具奏陳乞許令回納伏蒙聖慈特降中使宣諭令受臣上荷恩遇至深至重螻蟻微命不足為報愧懼流汗無所容措然臣竊聞昔韓昭侯有敝袴命藏之侍者曰君亦不仁也不以賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者彼一敝袴猶不以與無功之人况數十兩之金乎魏太祖之為政有功宜賞不吝千金無功妄施分毫不與我太祖太宗之御臣下亦然故能驅駕英豪光啓大業夫明主之不妄賞賜非吝之也誠以賜一無功則天下無功之人皆有徼覬之心有功之人皆懷怨望故也借使一人有功而人主賜之金無功者不得其有功者必喜何則衆人不得而我獨得之是人主知我之功者其榮多矣如是則智者獻其謀勇者竭其力雖使之赴湯火猶將甘而樂之若有功者賜千金無功者亦賜千金其有功者必不恱何則彼無功而我與之均是人主待我無以異於彼也其辱深矣如是則有功者皆懷怨望誰肯竭其智力觸冒死亡以徇國家之急哉故官爵金帛者人主所以鼓舞羣情使之奔走左右而不知者也然則明主愛一嚬一笑豈為過論哉仁宗皇帝天性寬仁承宗廟餘烈府庫充實身雖節儉而好施人羣臣左右貪求恩惠賜豫之例因兹寖廣府庫之積日益減耗不幸又於五年之中再遭大喪左藏內藏奉宸等庫率皆空竭當此之時舊例所有猶宜鐫減以救其弊况可以例外橫賜無功之人乎昔陛下以國用不足之故永厚陵猶遵遺制比永昭陟事裁減而賞賜羣臣之物乃更多於永昭陵之時臣雖小人無知亦安能循此理而自安乎此所以夙夜憂惶無以自處者也况府庫之物乃天下萬民之物也自非有功於民者皆不宜得之臣所以仰違詔命堅辭賜物至於再三者非自飾小亷也乃欲助陛下成治道也伏望聖慈察其誠懇依臣前奏許令將所賜金并銀合回納入庫治平四年六月光奉勑充英宗山陵儀仗使上時降中使賜箔金五十兩並銀合重三十兩光上奏辭之不許故再上此奏時為御史中丞上神宗乞權罷南郊臣寮賜豫錢顗臣伏以邉境未寧軍需至急朝廷經費百倍於祖宗之時帑藏空虛間或兼水旱之患從今不務省減向去何以枝梧然而事有權宜理難固執豈可目前只圖僥幸之利不能力為陛下久逺之謀臣雖至愚言思有補臣謂今冬郊祀之禮陛下在亮隂恭默之中遵先朝三年之舊制是亦不得巳而行之內外供費豈當用平時之例而况覃霈之恩未逺特支之賞亦頻天下之財取之盡毫末數年之內用之無孑遺民力既極困窮國用正宜裁損臣聞在真宗全盛之世尚詔三司減郊祀應奉之物十餘萬載於國史足以為法陛下誠思咸平中府庫之所積孰與今日為比耶所有將來南郊伏乞陛下特降睿旨除三軍賞給外應內外文武臣寮舊例賜豫一切權且寢罷至於應奉不急之費亦乞減削如此則內足以省國用外足以寬民力豈曰小補之哉唯陛下斷在宸衷而力行之天下不勝幸甚熙寧元年上時為殿中侍御史上神宗乞聽宰臣辭免郊賜司馬光臣伏覩宰臣曽公亮等奏以河朔災沴調用繁冗欲望將來大禮畢兩府臣寮更不賜銀絹奉聖旨送學士院取旨議者或以為兩府所賜無多納之不足以富國而於待遇大臣之禮太薄頗為傷體臣愚竊以為不然古者冡宰制國用視年之豐耗量入以為出固不可於飢饉之時守豐登之法也是故嵗凶年榖不登君膳不祭肺大夫不食粱士飲食不樂明君臣上下皆當深自貶損以救民急也臣竊惟國家帑藏素已空虛重以今嵗河北之地災害特甚鄉者慶厯之末河決商胡民田雖傷官倉無損而河北父子相食餓殍蔽野今河決之外加以地震官府民居蕩為糞壤繼以霖雨倉粟腐朽軍食且乏何暇及民冬春之交民必大困甚於慶厯之時國家豈坐而視之不加賑救乎况復城櫓須修河防應塞百役並興所費不資當此之時朝廷上下安得不同心協力痛加裁損以徇一方之急凡宣布惠澤則宜以在下為先撙節用度則宜以在上為始今欲裁損諸費不先於貴者近者則疏逺之人安肯甘心而無怨乎必若為臣有大勳於天下雖錫之山川土田附庸何為不可若止因郊禮陪位而受數百萬之賞臣竊有所不安矣臣前所謂賞賜不節者此亦其一也雖臣下不辭猶應裁減况其自辭減又何損乎倘若但務因循姑息度日欲裁損乘輿供奉之物則曰減於制度大為削弱非所以華國欲裁損大臣無功之賞則曰所減無多虧傷大體非所以養賢欲裁損羣下浮冗之費則曰人情不悅恐致生事非所以安衆如此則國用永無可省之日下民永無蘇息之期必至於涸竭窮極然後已也且君子之所尚者義也小人之所徇者利也為國者當以義褒君子以利悅小人今大臣以災害之故辭錫賚以佐百姓之急義之可褒者也陛下從而聽之乃所以為厚非所以為薄也雖然兩府銀絹止於二萬匹兩不足以救今日之災又國家舊制每遇郊禋大賚四海下逮行伍無不霑洽不可於公卿大夫全無賜豫臣愚以為文臣自兩省以上武臣及宗室自正任刺史以上內臣自押班以上將來大禮畢所賜並宜減半俟他年豐稔自依舊制其文武朝臣以下一切更不減似為酌中臣亦知此物未能富國誠冀國家因此漸思減損其餘浮費自今日為始耳臣素愚戇識慮膚淺所言者皆目前之實狀非竒偉之髙論也伏望陛下更賜裁察若果有可取乞斷自聖志勿為衆言所移實天下幸甚熙寧元年八月上時為翰林學士後數日光與王圭王安石同進呈郊賚劄子於延和殿光言方今國用不足災害荐臻節省冗費當自貴近為始宜聽兩府辭賞為便安石曰國家富有四海大臣郊賚所費無幾而惜不之與未足富國徒傷大體昔常衮辭賜饌時議以為衮自知不能當辭祿今兩府辭郊賚正與此同耳且國用不足非今之急務也光曰衮辭祿猶知廉恥與夫固位且貪祿者不猶愈乎國家自真廟之末用度不足近嵗尢甚何得言非急務耶安石曰太祖時趙普等為相賞賚或以萬數今郊賚匹兩不過三千豈足為多光曰普等運籌帷幄平定諸國賞以萬數不亦宜乎今兩府助祭不過奏中嚴外辦沃盥奉帨巾有何功勤而得比普等乎與安石爭論久之王圭曰司馬光言省費自貴近始光言是也王安石言所費不多恐傷國體安石言亦是也惟陛下裁之上曰朕意亦與司馬光同今且以不允答之可也是日適會安石當制遂以已意批答公亮等因不復辭上哲宗論賜楊琰度牒蔡蹈臣伏覩近降聖旨指揮以金明池修龍舟了畢特支度牒十五道賜供備庫副使楊琰者按琰本木工止緣技巧馴致使名祿養豐厚特有加賜近代以來以工巧被寵遇者未有如琰比也而琰之圖效非有搴旗斬將之勞而操規矩執繩墨以指揮庶工正其責也龍舟之役其費不資朝廷不責其過侈以傷太府之財幸也復以度牒賜之未為允當且今度牒直金二百千以十有五牒計之凡三千緡非不多矣舉而授琰曽不計校甚亡謂也若謂其功可賞耶設或運機精思殫盡竒巧以窮耳目之玩不過百工何足多尚朝廷賞之過厚內外籍籍不無議論凡賞罰所以存勸沮也賞當乎功則天下勸而赴功者有之矣罰當乎罪則天下沮而逺罪者有之矣今以一龍舟之勞而命賞過厚不知意果何在耶若謂其勞不可以不賞則邊陲用命國爾忘家之人緩急不同假令邊陲之士為陛下臨危拒敵而致其死不知何以為賜豫臣等竊聞諸路州郡每有興修河渠水利官府祠廟等於朝廷乞降度牒不唯重惜未即應副而詰問勘當十不得五其重如此而獨於賞琰不以為意何耶臣等愚陋欲望聖慈特賜裁減天下幸甚紹聖三年上時為監察御史上徽宗乞今後非有大勳業者不賜第翁彥國臣伏以慶賞之柄人主所以礪世磨鈍也仰惟陛下勵精致治未明求衣旰食聽事以詔多士士之起以赴功底績者不可勝計於是醲於用賞以示勸焉甚盛之舉也然禮有常數事有藝極過則為濫臣請托所聞而論之伏見比年以來臣寮有被眷異者不惟官職之超躐錫賚之駢蕃多遂賜第者臣聞蒙賜之家則必宛轉計會踏逐官屋以空間為名或請酬價兊買百姓物業實皆起遣居民大者亘坊巷小者不下拆數十家一時驅迫扶老擕幼暴露怨咨殊非盛世所宜有况太平嵗久京師户口日滋棟宇密接略無容隙縱得價錢何處買地瓦木毁撤盡為棄物縱所得地何力可造所失者固巳多矣既而鳩工市材一出公上請托營繕務極壯麗縻費不資陛下知其為恩未知其為害羣臣莫為陛下言者得無惡於害巳歟設將相大臣有大勳大業非尋常賞典所可報賜第可也邇者用為從官一無可紀已聞賜第矣恩幸技術憑藉寵遇攀援僥求漸不可長陛下以天下為度於臣寮慶賞略不小靳此天下所共惜之臣願為之藝極而巳臣寮所得月俸以其終身計之幾何哉至於賞格最厚者不過數百匹兩使嵗月之中比比受賜亦幾何哉奈何嚬笑之頃頓損十百萬為一第之費及斂數十百家之怨為一家之惠陛下何取於此天下之財入之有經用之有節將積如丘山公私富藏可跂而待也入之有經用之無藝江河之流不能實漏巵矣伏望睿慈少賜留神萬一可採請自今以始非有大勳大業暴著天下者弗復賜第雖巳得旨許三省執奏臺論諫爭庶以下息覬覦之心仰稱聖明愛民節用之意大觀三年七月上時為御史中丞宋名臣奏議卷一百
