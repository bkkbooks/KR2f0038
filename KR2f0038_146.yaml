body:
  text: 宋名臣奏議巻一百四十六宋趙汝愚編總議門總議二上真宗論時政張知白臣聞創王業期於無窮者必政事為基是以王業盛者其政事必經乆可取逺大可法然後速見治平之運竊以古今之言事者鮮不以防邉為急務故多舉西北二隅攻守之事以獻方略由是竒兵之謀紛然競興夫五行之中金為兵以五事配之則金為義兵之為用實不可去也乃知言弭兵者罪莫大焉夫戎狄者亦天地之一氣耳其性貪暴惡生好殺與中國絶異是以史籍所載京師為陽而諸夏為隂盖取諸内外之義也夫陽主生物隂主殺物故知四夷擾邉不足異也在制之有道爾又和樂為陽愁苦為隂王者必先内和人心而後制四夷此崇陽抑隂之義也臣伏見去春大雪今夏暴雨稽洪範之書則繫乎咎惡之文伏惟陛下自即大位日謹一日而復温厚恭肅祗畏勤儉討論方䇿思廣治道聖徳無缺則咎惡何從而起豈非政令之間有不便於天時者乎今夫春者發生之月也可生而不可殺也國家每嵗春夏将交之時禁止採捕是仁及鳥獸今建寅之月三元之始孟夏乃是正陽之月况正律所載有秋分已前不决死罪之制月令當春則曰無肆掠不可以隂政犯陽又曰冝行仁而不可以舉義事及夏則曰挺重囚出輕繫並無决死之文唐朝悉依此制若罪在十惡尤為巨蠹者則决不待時自唐氏失馭政事多隳今刑統内唯存晉天福七年敕立春立夏兩日不决死罪盖以天福之間方為戰國天下生靈犯罪戾抵滛刑者不可勝紀殺戮之刑僅無虛日故不可全避春夏盛徳之月止取其兩日以代兩季今天下毎嵗所决大辟至鮮一嵗之中凡有二十四氣毎氣各主十五日臣以為天下列郡毎嵗所决死罪雖不可禁春夏兩季亦可以於立春立夏氣至之時各禁十五日以應一孟之節全發生之陽氣若罪在十惡决不待時者亦可改斬為絞以免流血之刑自餘雜犯死罪者若有已斷具獄可取半月外行决其邉防屯兵之地以軍法從事者不在此限又按禮經季夏中氣之後十五日不可以興土功為土将用事氣欲靜也請詔天下毎嵗起季夏中氣至立秋節半月内非邉陲防警捍敵浚城及修治隄防以禦水害餘並不得起創土功其整葺隳頺者不在此限臣又聞周禮六官其一曰秋官主刑又月令孟秋中氣之後則命有司繕囹圄具桎梏斷薄刑决小罪秋分則申嚴百刑斬殺必當無留有罪無或枉橈此並順上天行肅殺之令也命使决獄多不拘於此時或在三春或當九夏雖勤恤庻獄慮有滯留其如未順四時之令也欲望自今除盛夏仍舊䧏詔恤刑外毎嵗自孟秋中氣之後秋分前遴選周行分道决獄如此則順天行刑而又四方之風謡因之得以知列郡之綱條因之得以振且一嵗之中必順令决獄與其行之於别季不若行之於此時又聞先王垂訓重徳教而輕刑罰所以見王道盛也今法令之文大為時所推尚自中外由刑法而進者甚衆雖有循良之吏亦改節而務刑名也然則刑法者治世之具而不可獨任必参之以徳教然後可以言善治矣夫徳教之大莫若孝悌若捨此而欲使民從化是猶釋舟檝而求濟於無疆涯之津也故冝旌勸孝悌以厚風俗臣伏見朝廷明有詔命優恤孤窮無告之民令異其姓名别為一簿毎遇有科徭賦歛則令去重就輕蠲勞為逸斯則蘇疲羸之一術也其如官吏鮮能奉行成制鄉縣之内因而别致惨舒若令佐盡得其人則孤窮無告之民皆得上簿不得其人則委之人吏責自鄉胥徇私任情移易貧冨嗷嗷之民誰敢吐一言以伸訴必至於委弃溝壑是故将欲興禮義先在舒民心将欲舒民心先在均貧富将欲均貧冨先在正簿書飬民之道郡踈而縣親故知百姓之長不可不精採擇盖列郡之牧數至少而睿鑒可以周知宰序之任官至卑而朝廷難以徧察夫親民之官㢘而不明者則失於馭下明而不㢘者則傷於徇私必待㢘明兼偹中和在躬者然後可用是故備其位者則多中乎選者彌少邦國至大也庻官至衆也有人而致諸散地未可知也當其位而不使盡其心亦未可知也臣是以夙夜為國家思求人之術冝歴選周行經公舉者而用之使先莅大邑試其政事朞年之間較其成績茍能正其簿書均其户籍而孤窮之民得庇為上然後酬之以不次之恩臣又聞聖人居守文之運者将清化源在乎正儒術古之學者其書簡而有限其道精而有益今之學者其書無涯其道非一是故學彌多性彌亂至於經史子集其帙殆萬在於前者悉謂之古法在於編者悉謂之古書殊不知法有可法不可法也書有可傳不可傳也若盡使知之則可謂勞而少功博而寡要當年不能究其學累世不能窮其業今進士之科大為時所進用其選也殊其待也厚進士之學者經史子集也有司之取者詩賦䇿論也故就試者懼其題之不曉詞之不明唯恐其學之不博記之不廣是故五常六藝之意不遑探討其所習泛濫而無著非徒不得專一又使害生其中何謂其然且羣書之中真偽相半亂聖人之微言者既多背大道之宗㫖者非一若使習而成功得不揉淳粹之性蕩中正之氣其為吏也安能分挈治柄使教令必行哉中庸曰率性之謂道脩道之謂教孔子曰性相近也習相逺也是知為儒不可不重其所習董仲舒曰春秋大一統者天地之常經古今之通誼今師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守此仲舒議漢之失引春秋大一統之說言諸侯統於天子不得自專亦猶百家之說不得與聖教並進懼乎亂皇王之大道也今之世望漢之世其章句之學彌盛而異端之書又滋多乎數倍矣安可不定其成制哉况夫儒者之術不以廣記隱奥為博學不以善攻竒巧為能文若使明行政令大立程式毎至命題考試不必使出於典籍外參以正史至于諸子之書必湏輔於經合於道者取之過此並斥而不用然後先䇿論後詩賦責治道之大體捨聲病之小疵如是則使夫進士之流知其所習之書簡而有限知其所學之文正而有要不施禁防而非聖人之書自委棄於世矣不加賞典而化成之文自興行於世矣咸平五年十一月上時為河陽節度判官上覧而嘉之召知白赴闕試舍人院除左正言上仁宗時務十一事范仲淹臣聞巧言者無犯而易進直言者有犯而難立然則直言之士千古謂之忠巧言之人千古謂之佞今臣勉思藥石切犯雷霆不遵易進之塗而居難立之地者欲傾臣節以報國恩耻佞人之名慕忠臣之節感激而發萬死無恨况臣之所言皆聖朝當行之事而未知行之者諒有以也聖人之心豈不至此盖當乎一日萬幾未暇餘論大臣之心豈不至此盖懼乎上疑下謗未克果行臣請言之以發聖慮臣聞國之文章應於風化風化厚薄見乎文章是故觀虞夏之書足以明帝王之道覧南朝之文足以知衰靡之化故聖人之理天下也文弊則救之以質質弊則救之以文質弊而不救則晦而不彰文弊而不救則華而将落前代之季不能自救以至于大亂乃有来者起而救之故文章之薄則為君子之憂風化之壊則為来者之資唯聖帝明王之相救在乎已不在乎人易曰窮則變變則通通則乆亦此之謂也伏望聖慈與大臣議文章之道師虞夏之風况我聖朝千載之㑹惜乎不追三代之髙而尚六朝之細然文章之列何代無人盖時之所尚何能獨變大君有命孰不從風可敦諭詞臣興復古道更延博雅之士布於臺閣以救斯文之薄而厚其風化也天下幸甚臣又聞聖人之有天下也文經之武緯之此二道者天下之大柄也昔諸侯暴武之時孔子曰爼豆之事則嘗聞之聖人救之以文也及夾谷之㑹孔子則曰有文事者必有武備請設左右司馬此聖人濟之以武也文武之道相濟而行不可斯須而去焉唐明皇之時太平日乆人不知戰國不慮危大冦犯闕勢如瓦觧此失武之備也經曰禍兮福所倚福兮禍所伏又曰防之於未亂聖人當福而知禍在治而防亂故善安身者在康寜之時不謂終無疾病於是有節宣方藥之備焉安國者當太平之時不謂終無危亂於是有教化經略之備焉我國家文經武緯天下大定自真宗皇帝之初猶有舊将舊兵多經戰陣四夷之患足以禦防今天下休兵二十餘載昔之戰者今已老矣今之少者未知戰爭之事人不知戰國不慮危豈聖人之意哉而况守在四夷不可不慮古来和好鮮克始終唐陸贄議云犬羊同𩔖狐䑕為心貪而多防狡而無耻威之不悟撫之不懐雖或時有盛衰大抵常為邉患屬方靖中夏未遑外虞因其乞盟遂許結好加恩䧏禮有欲無違而乃邀求浸多飜覆不定託因細事嘖有煩言猜矯多端其斯可騐此唐人之至論也今自京至邉並無闗險其或恩信不守釁端忽作戎馬一縱信宿千里若邉少名将懼而不守或守而不戰或戰而無功再扣澶淵豈必尋好未知果有幾将可代長城伏望聖慈鑒明皇之前轍察陸贄之讜議與大臣論武於朝以保天下先命大臣宻舉忠義有謀之人授以方略委之邉任次命武臣宻舉壮勇出羣之士試以武事遷其等差壮士䝉知必懐報效列於邉塞足備非常其或自謂無虞不欲生事輕長世之䇿茍一時之安邉患忽来人情大駭自古兵不得帥魚肉無殊乃於倉卒戰鬪之間㧞卒為将豺狼競進真偽交馳此五代之前鑒也至於塵埃之間豈無壮士冝復唐之武舉則英雄之軰願在其中此聖人居安慮危之備備而無用國家之福也惟聖意詳之臣又聞先王建官共理天下必以賢俊授任不以爵禄為恩故百僚師師各揚其職上不輕授下無冒進此設官之大端也我國家累聖求理而致太平大約紀綱法象唐室以臣觀之冝法唐興之時不冝法唐衰之後唐興之時特開館閣以待賢俊得學士十八人聲滿天下此文皇飬將相之材以論道經邦而成大化也暨至中興往往得人唐衰之後此選不盛我朝崇尚館閣目為清華相輔之材多由此選三館清宻古謂登瀛近嵗遷出内庭逼居坊陌非唐所謂集仙之館也又其間校讎之職或不由科第以恩而除限以嵗年漸至清顯輕十八學士之選恐非文皇飬将相之材之意也伏望聖慈與大臣議其可否重為制度以法唐興之時而延廊廟之器此國家之大美也又諌官御史耳目之司不諱之朝冝有賞勸自陛下臨政以来未聞旌一諌貟賞一御史若言而無補是選之不精言而有補豈賞之不行徒使犯顔者危緘口者安以集藥石為虛言以陳絲髪為供職三載之後進退雷同臣恐天下竊議朝廷言路未廣忠臣未勸将令諌官御史之徒尸素於朝非國家之福也惟聖意詳之又聞先王義重君臣賞延于世大勲之後立賢為嗣餘子則以才自調不使混淆而後大防一隳頽波千載凡居近位歲進子孫簮􅌧盈門冠盖塞路賢與不肖例升京朝謂之賞延無乃太甚此必前代君危臣僣之際務相姑息因為典故以至於斯又百司之人本避鄉役不踰數嵗例與出官莫非貪忍之徒絶異孝亷之舉使親民政其弊如何開此二途嵗取百數無所不有實累王風恐非任官惟賢之體也人避衆怨不敢上言遂令仕路紛紜禄位填委文武官吏待闕踰年貪者益礪其爪牙㢘者悉困於寒餓徒於禮闈之内増其艱難壯士惜年數嵗一舉廼相奔競至有訟爭而况脩辭者不求大才明經者不問大㫖師道既廢文風益澆詔令雖繁何以戒勸士無㢘遜職此之由其源未澄欲波之清臣未之信也儻國家不思改作因循其弊官亂於上風壊於下非國家之福也儻為長乆之䇿則願與大臣特新其議澄清此源不以謗議為嫌當以治亂為意此國家之福也惟聖意詳之臣聞以徳服人天下欣戴以力服人天下怨望堯舜以徳則人愛君如父母秦以力則人視君如仇讎是故御天下者徳可憑而力不可恃也伏惟皇太后陛下皇帝陛下日崇聖徳以永服天下之心若夫敦好生之志推不忍之心薄於典刑厚於惻隱在物祝網於民泣辜常戒百官勿為苛酷示天下之慈也唯聖人能之耻珠玉之玩罷組繡之貢焚晉武之雉裘出文皇之宫人少度僧尼不興土木示天下之儉也唯聖人能之雞鳴而起孜孜聽政毎有餘暇則召大臣講議文武訪問艱難此皇王之勤也唯聖人勉之貴賤親踈賞罰唯一有功者雖憎必賞有罪者雖愛必罰捨一心之私從萬人之望示天下之公也惟聖人行之自古帝王與佞臣治天下天下必亂與忠臣治天下天下必安然則忠臣骨骾而易踈佞臣柔順而易親柔順似忠多為美言骨骾似強多為直諌美言者得進則佞人滿朝直諌者見踈則忠臣避世二者進退何以辨之但日聞美言則知佞人未去此國家之可憂也日聞直諌則知忠臣左右此國家之可喜也伏惟聖明不可不察自古王者外防夷狄内防姦邪夷狄侵國姦邪敗徳國侵則害加黎庻徳敗則禍起蕭墻乃知姦邪之凶甚於夷狄之患伏惟聖明常好正直以杜姦邪此致理之本也臣又聞聖人宅九重之深鎮萬國之望以静制動以重為威如天之髙如地之深使人不得容易而議也昨覩鑾駕順動稍頻恐非深居九重靜鎮萬國之意况進奏院報於天下天下聞之恐損威重先朝以御宇日深功成天下廵幸之費尚或諌止今繼明之始聖政方新冝加憂勤深防逸豫則人心大恱天道䧏康不比先帝功成之年未可輕為廵幸伏望聖慈再三詳覽毎有順動必循典禮以服天下之望臣又聞人主納逺大之謀乆而成王道納淺末之議乆而成亂政方今聖人在上賢人在側取捨之際豈有未至然而刑法之吏言絲髪之重輕錢榖之司舉錙銖之利病則往往謂之急務響應而行或有言政教之源流議風俗之厚薄陳聖賢之事業論文武之得失則徃往謂之迂說廢而不行豈朝廷薄逺大之謀好淺末之議哉伏望聖慈納人之謀用人之議不以逺大為迂說不以淺末為急務則王道大成天下幸甚臣又聞聖人之至明也臨萬幾之事而不敢獨斷聖人之至聰也納羣臣之言而不敢偏聽獨斷則千慮或失偏聽則衆心必離人心離則社稷危而不扶聖慮失則政教差而彌逺故設百官而不敢獨斷者懼一慮之失也開言路而不敢偏聽者懼衆心之離也今聖政方新動思公共委任兩地出入萬幾萬幾之繁能無得失乃許羣臣上言以補其闕使上無䝉蔽下無壅塞有以見聖人之不獨斷也天下幸甚然而臣下上言宻陳得失未可盡以為實而亦當深究其冝或務窺人短長或欲希㫖上下動摇賞罰之柄離隔君臣之情似是而非言偽而辨雖聖鑒之下能無惑焉偶動宸𠂻無益王道似此宻奏之𩔖更望聖慈深加詳鑒與大臣議論可否然後施行儻宻奏之言便以為實内降處分一面施行則纔譖之人縁隙而進以訐為直以詐為忠使内外相疑政教不一非致理之本也古人有言曰為君難為臣不易者其在此乎伏惟聖明不可不察又自古親近小臣率多纎佞恃國恩寵為人階縁公議未行私請先至如此則人皆由徑政有多門伏望聖慈深為防慮以存至公之道也臣曲陋之人本無精識覽前王之得失究聖朝之取捨因敢罄而陳之伏望聖慈詳擇一二天聖三年四月上時為大理寺丞上仁宗荅詔論時政龐籍臣幸辱班聨獲當次對輙陳管見仰凟纊旒内揣狂愚當從震殛臣聞服忠義者皆懐愛君之意被惠養者咸蓄報恩之心故有委輅納忠嬰鱗陳諌義烈所激無故殞身而况生逢盛隆身事明聖丁寧詔㫖責其盡言非臣韜黙之秋實臣罄勵之日也㳟惟皇帝陛下倚祖宗之淳熈承慈聖之保祐積德彌盛渉道日深罄天咸寜而自謂未乂在理必照而退託不明招尊骾臣虛受讜議不吝過舉恩廣日新此前王之所難而陛下之所易實九廟無疆之福四海永安之基也臣是敢竭至陋之識揣當今之冝可補助聖治之萬一者條之如左伏以推誠任人則布腹心而事上懐疑待下則顯形迹以避嫌腹心布則下無隠情形迹顯則義乖至理夫古今之事固有形近私而實公者祁奚内舉其子而見褒前典亦有形近公而實私者王莽親戮其息而終成大盗是故王者察臣之心而任之推已之誠而信之則内竭其公外宣其力矣是以唐虞之朝興羣臣之遜而不為比周東漢之世立三互之法而無救衰弱故推誠之益如彼而懐疑之損若此謹按唐文皇之世或言魏元成阿黨者按騐無狀温彦博奏其不存形迹逺避嫌疑元成奏曰君臣上下同遵此路則邦之興亡或未可知文皇矍然改容曰吾已悔之故貞觀之治與三代同風又憲宗之時皇甫湜應制舉䇿語切直王涯是其舅時為翰林學士任當覆䇿不以舅甥之嫌而收之為貴倖者所怒及貶涯虢州司馬以湜之盛才而尚不免親累故元和之政不至於太平此乃推誠懐疑之效也臣愚竊窺今日似懐疑而待下矣羣臣似皆存形迹以避嫌矣陛下疑羣臣之私也臣下必有挟私徇情以致陛下之疑者也臣又謂當考其状實退之罪之可也未聞任之而疑疑之而任也書曰任賢勿貳又曰疑謀勿成此之謂也而言事之臣知陛下之有疑也當以理道分判公私昭然不惑使朝廷推至誠廣至公蕩然無猜以至於大同也夫宓子賤古之一縣令耳推誠於下而吏不忍欺况國家精擇信臣置之左右茍推心任之自非囬邪姦佞孰不竭心仰醻倚屬也安可謂推誠不可行於今乎臣竊度今之言事者𩔖皆迎揣上意指似是之事以成其疑是致上之益疑也則其意似欲陛下悉疑於下自取信於聖心以利其身也不然夫豈不知疑之害治也臣恐防疑不巳則上不知所信畏避不已則下無所推公公信兩虧事将安决伏惟陛下至聖至明臣願陛下推至誠廣至公察情偽以臻太平之治臣又聞萬幾之務所應至衆四海之大所揔至廣必在乎立畫一之法守不紊之條持其權綱擥其要命此帝王所以不勞而制天下也是故以一制衆則多至而益整以繁應廣則雖乆而必亂故曰法不一則朋黨生若然則發號施令可得二三哉臣伏見去年十月十七日及二十七日宣傳聖㫖令羣牧司借支帶甲馬二疋並随行草料與新差保州廵檢都監楊懐愍本司為准大中祥符五年宣頭節文今後應有臣寮及使臣脚下已有官馬因差遣並不得乞借官馬礙此條貫遂具劄子於十二月二日進呈得㫖祗令賜馬一疋自備草料樞宻院出䧏宣頭之次至三日又傳聖㫖却令借帶甲馬二疋随行十七日内為一小事四䧏宣㫖三令借馬二疋一令賜馬一疋本司不知所從遂再具進呈當月十六日批䧏聖㫖云已賜與馬其劄子更不行方敢依准宣頭指揮且樞宻院是陛下樞宻發命之司也得㫖畫依方䧏宣命於外頒行之次陛下又以傳宣衝之以在京之司職連大臣則可以進呈更改若踈逺之地使何所依從夫一州之守一邑之宰若政令不一尚有受其弊者况一人之威天下之大茍命令二三安得不慮乎且號令如汗汗出而不返者也故曰安危在出令安危所繫得不謹乎蜀相諸葛亮有云宫中府中皆為一體陟罰臧否不冝異同此實先代名臣之言也矧今寰㝢之大咸遵一軌豈冝號令之發自啓多門萬一處置大事亦如此比恐致不虞以成後悔此遂事既往誠不當言臣願陛下謹號令於此後耳臣又聞守文之體必遵於制度御下之方在謹於憲法制度定則貴不敢驕盈賤不敢踰越憲法正則寛不捨有罪猛不及無辜釋此二者雖堯舜不能治天下也唐文宗嘗言為國之道致治甚難宰相李石對曰朝廷法令行則易此要言妙道也故法行則君主重法廢則朝廷輕輕重之理安危之機乎夫祖宗垂憲軌迹具在固不可改也所可改者請以醫者喻之夫藥所以攻疾也若疾證已移不應但守故藥必更方易劑随其所移而攻之則疾應而痊矣法所以塞姦也若姦源已遷不應但守舊法必更條易科随其所遷而塞之則姦息而政明矣其不可改者亦請以醫者喻之夫三部之脉四時之氣五藥之性針灸之法更歴古今孰可變改也若制度之設尊君卑臣同文一軌防踰僭塞僥倖雖前王後帝亦不可改易也凡人見法令之有改者遂謂制度之皆可易也此世之所以多違越之人也㳟惟國家以聖繼聖典章開具垂之無窮自中書樞宻院下至百司政教所行皆有成憲守而勿失可致治平况祥符中敕文應臣僚上殿奏事不得批依奏並批送合屬中書樞宻院等處以先帝睿明昇平在運小大之政無不洞曉尚不欲便行依可而必令有司奏覆者盖恐破改舊制開啓倖門故也抑又先帝之深意不獨自守法度而已誠欲垂之訓典兾陛下遵之也臣伏見頃来傳宣内䧏嵗有増多夫求丐之人若事合舊典理非所創則雖下有司不憂不行其背違定制創起新例者下於有司必礙法而不可行故須求傳宣内䧏期於必遂是則因一傳䧏廢一制度傳䧏不已嵗月寖深臣恐制度存者無幾制度削則紀綱壊紀綱壊則上下之分何所檢局此臣所以日夜為朝廷惜之也臣願陛下事無大小皆送有司覆奏則事機必當而典制常存矣然帝王行法必從近始使左右貴戚畏而不犯犯而不捨則天下孰敢輕重哉夫左右之臣貴宻之戚出入禁闥綢繆寵遇凡常之見所望惟恩望恩不已驕怨漸積諸葛亮所謂寵之以位位極則賤順之以恩恩竭則慢夫有賤位之心繼以慢恩之意未有不猖蹶踰檢縱肆無憚者矣過惡既盈然後寘之文法此前代之亡身覆族者皆由驕之太過制之不早故也所謂将欲福之適足禍之不若以義而斷其恩以法而制其漸知有過不捨則大過不生矣知無故不賞則僥望自息矣諸葛亮所謂威之以法法行則知恩限之以爵爵加則知榮是也使其操履自守常有懼禍之心寵渥所被必懐感恩之意永保元吉與國同休豈非王者待左右親戚之至仁乎孰若養成癰疽使至决潰也臣頃為開封府兵曹參軍伏見王世融因毆本府客司軍将仇保法當贖銅特勑勒任且仇保京府一走吏耳世融貴戚之子也陛下責其横恣越法停官此實國家用法之至當而保全戚里之深心也若陛下制馭左右貴戚皆如世融則何患法不行而人不畏乎况此數年事耳固未忘於聖心近聞作坊料物庫監官連宫掖之戚侵盗官物事發而逃三司案捕之次䧏㫖不令窮究此非臣本職得自風傳萬一有之未為美事陛下何不使推窮其事付之於法俟其知過後或因赦文稍加收叙或以衣食豢養不使任職若因而悛改是陛下再造其身也此乃公法不屈私恩亦隆臣切惑聖斷異於曩時也計過則此重而彼輕也論屬則彼親而此踈也議罪則彼加法而此貸刑也臣恐中外有或效之者䋲之以法是同罪異罰矣因而寛之是法憲廢矣昔漢武時隆慮公主病因以金千斤錢千萬為子昭平君豫贖死罪上許之隆慮公主卒昭平君驕醉殺人廷尉請論武帝曰法令者先帝所造也用弟故而誣先帝之法吾何面目入髙廟乎又下負萬民乃可其奏哀不能自止且隆慮帝妹也昭平帝婿也復已許其贖死而終不貸貰者盖食言之媿小而廢法之失大也故臣願陛下謹法制以齊中外也謹覽詔文云規朕躬之過失臣伏惟陛下體仁聖之姿躬孝睦之徳鑒照古昔包舉藝文屏絶㳺畋不邇聲樂奨用忠直斥逺佞邪此天下家曉而户知矣然日月不能無薄食之過唐堯不能無哲惠之難故懐多福者小心累大徳者細行臣是敢竭愚慮塞明詔又云陳宰政之闕遺伏以執政之本在内銓擇庻官在外安集百姓今官吏非其人而曠弛之政漸盛考課不得其實而升黜之典或濫夫官吏之體奉公束手以為要胥史之性舞文規利以為資官吏不嚴則胥史縱胥史縱則法令壊法令壊則民受弊此必然之理也夫欲外律郡國當先自京師故曰京邑翼翼四方是則今京任之官以寛縱法制為大體以姑息胥史為美名此已相沿積習矣或有以公䋲下者則羣胥百計而動摇之誠能動揺則来者為戒雖有公心幹略安敢施為乎伏見祥符縣令檢下稍峻羣胥相率逃去尋而罷其縣事是動摇之計行矣况近年来任京職者多狥其私便罕責於才實按局廢弛蠧弊増深而今之奉公稍矯前失朝廷不責狡胥之隂計而戒官吏之峻整臣恐自此孰敢盡公操法束縛羣下乎百司觀之孰不效之乎百司之胥既效之而危其上百司之官亦戒之而縱其下上危下縱乆而風成此為胥史謀則得矣為公家謀何有哉使四方聞之莫可則矣臣願朝廷速變此風無使成俗要在擇人而任責之行法無聽羣黨動揺之也又考課之制偹存令典景行功罪不容隠私今内外之官雖有課歴率無實状盖由刺舉之官或昧於察㢘或狥於私曲推勞舉過多失公實意有發擿則果桃成贓情在容掩則吞舟漏網考課之司但據課歴以入升殿之科無縁察其真偽夫剛正之吏彊猾所以為仇則孤立而多患貪黷之夫奸智足以自衛則有黨而寡禍故有幹亷在公而偶罹文法者考司即為有過而䧏殿之典行矣誅剥害民而贓状不露者考司即為無瑕而升賞之恩及矣如此則䧏之或在非辜既無以戒惡賞之或在有罪又無以觀能實由任選之道不精阿縱之法不嚴察舉之官不懼故也臣願朝廷立嚴制去弊風此乃銓擇之闕也又國之用度節儉為先節儉行於上則府庫實於内雖逢灾沴之數水旱之困上有賑救之備則民無流亡之悲今財賦益屈而土木之功不息浮冗之費日増儲蓄寡備而荒沴之民屢困賙恤之恩不時此輔臣固當苦言陳諌罷土木削浮冗以存濟之此乃安集之闕也儻陛下不輕小臣之言曲加裁擇誠能察情偽審號令謹法制然後責輔臣之公正者推擇天下才行而任之嫌疑之私既去至公之風自行名實不亂賞罰必當官曹嚴整紀綱振張則詔㫖所謂囬邪朋比阿私恣横請託貪殘冝自息矣止土木之功去浮冗之費則失業之民有以濟矣臣聞明王聖主好聞其過忠臣孝子言無隠情至於諱有司悼後害皆非人臣之節也敢效百慮兾補萬分幸當責言之辰罔避論輸之律實祈英睿照其悃誠天聖七年四月上時為羣牧判官宋名臣奏議巻一百四十六
