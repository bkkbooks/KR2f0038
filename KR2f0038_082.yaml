body:
  text: 宋名臣奏議巻八十二宋趙汝愚編儒學門制科上真宗請復設制科孫何臣聞王化基乎儒學而治本根于文章故歴代取人必先文學之士賢輔名將良二千石皆由此途出所謂學非解詁句讀之學也必可以財成制度弼厥治助厥化者焉所謂文非聲病偶對之文也必可以寅亮經綸夀吾民致吾君者焉唐虞夏商簡略難嗣炳焕可法時唯宗周始之以鄉舉里選終之以察言觀行多士之脉由兹而興垂之百王宜無愧色漢懲戰國亡秦之弊追用周制旌表孝悌簡拔茂異或待之不次或歸之常調茍不以納粟拜爵入貲為郎凛然古風庻㡬而復由魏而下迄於陳隋規模齷齪無足比數唐五代之末斟酌㳂革參用古今紀綱四方牢籠俊乂失在禮部得於制舉禮部之失進士明經等科是也制舉所得賢良方正等科是也凡進士明經等科前所謂解詁句讀聲病偶對者也非失而何凡賢良方正等科前所謂財成制度寅亮經綸者也非得而何然是時流品洞分除授有别禮部所第不過典校辟置郡掾縣佐曠日持乆未出平遷制舉所得必皆遺補館殿臺郎御史匪朝伊夕奮為公輔故所失無大害所得必大利事在前史可覆而驗李唐將季干戈日尋無用之詞勝化成之文廢始罷制舉專取禮部五代執守以為故事雖復朝野多故戎馬荐生至於文物寂寥治道蕪雜衣冠千計無一赫赫之稱者未必不由於此國家有天下四十年矣廓土闢宇芟逆夷亂髙視百代巍為太平寤寐雋賢勵精貢舉樂才嗜善夐無與隣然猶未復賢良方正等科清途華貫唯以進士明經逓資而升豈不念林壑非常之士或有遺棄者乎豈不念臺閣所進之人或有僣濫者乎豈不念羣官庻尹或有才略無以自發者乎豈不念一日萬幾或有遺闕無以上逹者乎豈不念取士之制因循近例不可為子孫法者乎意者羣有司百執事未之思耶將兹事體大非賤臣之所知耶不然何當置而未置當復而未復如此之久耶是則士傳言庻人竊議不為僣矣咸平元年上時為右司諌上真宗論制科當依漢制取人田錫臣竊惟唐設制科有道侔伊吕科有識洞韜略堪任將帥科有賢良方正直言極諌科自太祖朝兵部尚書張照奏請興制舉于時據所奏前代制舉内選置三科一賢良方正能直言極諌科一經學優深可為師法科一詳閑吏理逹於教化科勑文略曰應天下諸色人中不限前資任職官黄衣草澤等並可應詔送吏部試䇿論三道共三千言以當日内取文理俱優人物爽秀者方得解送其登朝官亦許上表自舉雖設制科之名未盡取人之理何以明之夫漢詔取人不限對䇿字數隨其所對盡其所見故孝文時鼂錯對䇿不過二千字孝武時董仲舒對䇿不過二千餘字然上覧之而異焉乃復䇿之凡詔䇿三問而所對皆不及二千餘字洎公孫𢎞答䇿纔五百餘字然漢之得賢良斯為盛矣觀董仲舒所對䇿三道亦非以當日内成今但依漢之取人則董鼂公孫軰不獨漢有也咸平三年上時自知泰州召還上仁宗論制科之設不專因災異宜隨科舉下詔吳育臣伏以三代以來取士之盛莫若漢唐惟漢之興髙惠所未遑暇至文帝十五年九月詔舉賢良文學之士上親䇿之則有若鼂錯者出焉是時無災異而舉也至武帝建元元年冬十月詔舉賢良對䇿則有若董仲舒公孫𢎞者出焉所學亦不因災異但䇿中語或及者亦陳事之一端耳非專主災異而舉也唐開元元年六月甲子制其茂才異等咸令自舉是年設直言極諌科迨憲宗元和間制科尤盛有元稹白居易者皆特出之才觀當時䇿目所訪者皇王之要道邦家之大務可以覆視固不專於災異也此漢唐故事有足據者其間不因天變又非時親䇿者則亦有之厥後時君或常自逸謂無闕政及天災巳著時蠧已形然後下詔舉之欲救於臨事此則取士之弊風而後王之未逮也豈足以師為髙矩哉陛下自復制科于今累年隨貢舉而開疏數適中忽以一人之言欲議變常之制若必竢災譴然後詔舉非唯失設科之本意且尤不可者三一則天下賢雋滯淹之士待災異而致身非所以飬亷耻也二則平居不詢變形乃問非所以懼無災也三則輕改信令示天下無渴士之心非所以廣賢路也且漢唐所立孝亷及進士等科皆每嵗常選故制舉不隨而開今禮闈凡數年一啟以制舉隨之則事適其冝何害於事况災異之出不常厥期或彌年所無則此舉奚設或比嵗而有則於事太煩既不因乎天災又不隨乎貢舉而曰非時詔舉浩無端倪乃是遂廢此科芻蕘稍詢則言路有開餼羊一去則禮制都亡今無故而更張使遺才絶望其傷國體不亦大乎乞并下臣奏令兩制詳定若漢唐故事非專為災異而設則冝當執守毋令輕變以惑羣心臣曽應制舉毋容不知知而不言於罪為大慶厯六年六月上時為參知政事先是育與宰相賈昌朝不相能監察御史唐詢於育私怨上疏論制科有私其辭曰臣伏以漢制丞相御史列侯中二千石諸侯相舉賢良方正直言極諫之士由漢渉唐雖用其科而不常置若天見災異政有闕失則詔有位使薦之於朝冀聞讜言亡有所諱又有茂才異等科本朝稽用薦文訖真宗之世三建此科自陛下即位増修六科以來多士兩省若少卿監以上各得奏舉後又止用賢良茂才二科隨進士科設之近年率不用保任之官皆自名科目賢良方正茂才異等皆名號之美者使舉而為之猶曰近古即自顓其美顧所未聞謙遜之風頺替甚矣有應所舉必先之以所著文詞第而列上考於兩制而進退之幸而不遺然後得詔未能親試前集有司而所出論目悉用經史名數其於治亂之體固無所補及對詔䇿大率不過條對義例稽合注解又復牽於文字之數迫於淆雜之間縱使魁磊之士髙明之才胷雖有竒言不得騁既人人所習主於強記博聞辭多泛說而已至於救輔國體開陳䇿畫則何恃哉故始初應詔纔數人後乃至十餘人今及三十人其科益乆其進益多既升本科曽未累嵗悉至顯官雖非其人例不可抑况直言極諌非當無事而求茂才異等豈謂循常之選其弊若此今具兩漢始置賢良方正及茂才異等并因災異詔舉賢良政事前漢武帝建元元年詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諌之士元封元年以名臣文武欲盡詔州郡察吏民有茂才異等可為將相者凢五十四年間一舉茂才孝昭始元元年詔三輔太常舉賢良各二人宣帝地節三年令内郡國舉賢良方正可親民者元康四年舉茂才異倫之士凡二十五年間二舉賢良一舉茂才孝元初元元年詔以地震令丞相御史二千石舉茂才異等直言極諌之士永光二年日食令内郡國舉茂才異等賢良直言之士凡十六年間一舉賢良一舉茂才成帝建始元年河平四年日食水災詔舉賢良方正并令瀕河之郡舉有行能直言之士鴻嘉三年詔以數遭水旱舉朴厚有行能直言者元延元年詔以日食星隕令内郡國舉方正能直言極諌者各一人凡二十六年間四舉方正直言後漢光武建武元年日食勑公卿舉賢良方正各一人七年日食詔公卿司𨽻州牧舉賢良方正各一人凡三十三年兩舉賢良章帝建初元年地震詔令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諌之士各一人五年日食詔公卿以下舉直言極諌者各一人凡十三年兩舉直言和帝永元六年詔以凶饉令三公中二千石二千石内郡守相舉賢良方正能直言極諌之士各一人凡十七年間一舉賢良安帝永初元年日食詔公卿内外衆官郡國守相舉賢良方正直言極諌各一人五年日食地震詔公卿中二千石二千石郡守諸侯相舉賢良方正能直言極諌之士各一人凡十九年間兩舉賢良順帝延光四年京師大疫詔公卿郡國守相舉賢良方正能直言極諌之士永和六年日食詔大將軍公卿舉賢良方正者各一人凡十九年間兩舉賢良本朝但用兩漢之名而非兩漢之制請自今更不與進士同時設科若因國家災異屢見非時舉擢賢俊臨時咨訪近臣審舉之其所舉之人如漢故事親䇿當出要務罷秘閣所試六論上仁宗論制䇿當取直言司馬光臣近䝉差赴崇政殿後覆考應制舉人試巻内􅝲兩號所對䇿詞理俱髙絶出倫軰然􅝲所對命秩之差虚實之相養者一兩事與所出差舛臣遂與范鎮同議以為第三等􅝲為第四等詳定官已定從覆考切知初考官以為不當朝廷更為之差官重定復從初考以􅝲為不入等臣竊以國家置此六科本欲取材識髙逺之士固不以文詞華靡記誦雜博為賢􅝲所試文詞臣不敢復言但見其指陳朝廷得失無所顧慮於四人之中最為切直今若以此不䝉甄收則臣恐天下之人皆以為朝廷虚設直言極諌之科而􅝲以直言被黜從此四方以言為諱其於聖主寛明之徳虧損不細臣區區所憂正在於此非為臣已考為髙等茍欲遂非取勝而巳也伏望陛下察臣愚心特收􅝲入等使天下之人皆曰􅝲所對事目雖有漏落陛下特以切直收之豈不羙哉嘉祐六年閏八月上時為同知諌院覆考制舉人先是時執政以􅝲所試進呈欲黜之上曰其言切直不可弃也􅝲即蘇轍也上仁宗乞施行制䇿所言司馬光臣竊以國家本置六科蓋欲以上觀朝政之得失下知元元之疾苦非為士人設此以為進取之階也臣昨差覆考應制舉人所試䇿竊見上等三人所陳國家大體社稷至計其間甚有可采擇者伏望陛下取正本留之禁中常置左右數加省覧以為儆戒其副本下之中書令擇其所言合於當今之務者奏而行之使四方之人皆知朝廷求直言之士非以飾虚名廼取其實用也及臣前所獻五規雖智識闇淺辭語鄙陋然皆臣夙夜盡忠竭誠以思治世之要道非指陳一事之得失於有司無所施行亦望陛下以視朝之隙時取觀之庻㡬於聖政或有萬分之益嘉祐六年閏八月上上神宗論制科之士不可以直言棄黜韓維臣伏見應賢良方正舉孔文仲對䇿入等以論時政意異詔文仲罷歸仰惟陛下導人使言一有不合便行棄黜此後誰敢有言者陛下嘗嫉言事之人好同流俗沮敗朝廷行事且行事在審理審理在合時變使流言自息乃為善也而欲黜責以止之臣見其無益於行事有損於治道也陛下毋以文仲為一賤士而黜之何損於事古人於事常戒微漸臣恐賢俊由此解體忠良結舌阿諛茍合之人得窺其間而競進為禍不細文仲可取而逐臣恐於文仲未有所損而其損顧在陛下也願改賜處分以幸天下熈寧二年十月上時為翰林學士充羣牧使維時被命考試制舉人文仲既絀維五上章争之其言益切遂請便郡出知襄州上哲宗乞復置制科劉摯臣竊惟漢制因天見災異或政有闕失則詔郡國及在位舉賢良文學之士天子親䇿以求其言至於國朝㳂襲故事於是置為賢良茂材科目隨貢舉召試其於得人視古為盛近時之制遂罷此科臣竊以為國家之道得士欲廣故取之非一塗謂常選不足以致異人故設制科以收超絶之才而每舉中等不過一二人而巳今夫官人之法入流門户日益増多未有澄汰而於三年取一二非常之人則廢其科不用此何謂也臣愚欲乞復置賢良方正及茂材異等科每遇貢舉詔近臣依舊制舉試所以廣言路求人材繼祖宗之制也元豐八年上時為侍御史初熈寧七年五月中書門下言勘㑹䇿試制舉并以經術時務今進士已罷辭賦所試事業即與制科無異於時政闕失即諸色人自許上封事其賢良方正等科自今欲乞並行停罷從之至是摯上此奏上哲宗乞别詳定制科考格王存臣准尚書禮部牒准勑尚書侍郎學士待制兩省御史臺官國子監長貳詳議科舉事臣已與孫永等所議外有制科一項云依舊制此為未安臣竊見近世制科所試論䇿題目務出於僻隠難知是以應此科者競為記誦名數之學非所以稱方正之舉先朝深知其弊遂行廢罷今議復置儻蒙允降若並依舊制即不免襲前日之弊無補治道欲乞下有司重行詳定制科考格所取務先識略不專責以記誦名數之學至於取人多寡推㤙厚薄並乞裁定元祐元年閏二月上時為樞宻直學士上哲宗論制科取士乞加立䇿等増取人數蘇頌臣伏覩今年四月戊申及七月乙邜詔書復置賢良方正能直言極諌科并立定䇿入三等四等次推恩條制有以見陛下勤求俊良樂聞讜論士之抱術略憤懣者當繼踵而赴詔矣然臣竊觀本朝故事制科程式太嚴取人太窄自真宗以來每舉中等者多不過三人少或一人至有全不放者使豪傑之士有老於科舉而不預甄擢恐非朝廷聽言求士之意臣謹按漢文二年始詔舉賢良時對䇿者百人而鼂錯為上等武帝元光元年詔舉對䇿者亦百人而公孫𢎞為第一等歴代沿襲廢置不常至唐每遇親䇿賢良等科中等者不下一二十人建中元年姜公輔等二十五人正元元年韋執誼等一十七人四年崔元幹等一十七人十年裴垍等一十七人元和三年牛僧孺等一十五人長慶元年龎嚴等一十五人寶厯元年唐伸等一十九人大和二年裴休等二十二人自餘幽素將相等㡬數十科取人亦衆其得士若蘇瓌蘇頲父子張説九齡裴垍楊綰崔羣韋處厚姜公輔裴休軰皆出此選卒為輔弼名臣此外竒才博識之士垂名于後者不可勝數信乎制科親䇿可以收攬英俊有補於治道也而當時應詔之人或命州郡薦言或許上書自陳被詔者徑赴御試其推恩等第則第三等中書門下超資與處分第四等優與處分第五等即與處分由是言之程式盖不甚嚴而推恩亦不甚厚至周顯徳四年始詔逐處州郡依貢舉人式例别試解送尚書吏部量試䇿論三道共三千字内取文理俱優者方得解送上都本朝之制又加以六論或試於中書試於秘閣合格方得赴制舉試其所試論題務求深奥每舉轉加艱難致合格者少蓋以推恩過厚故取人益艱况國家承平日乆天下學士陶染風教競習藝文而應此科者尤號該洽其釋文縱非優長未合上等亦皆於古今義理潜心有素若蒙采收施之為政必須優於專經之人不為無益朝廷也臣竊為今來既立定䇿等推恩有厚薄則所取亦冝稍加人數臣愚欲望將來或請應人稍多即乞優加分數如合格人少即乞更加第五等分為上下入此等者只依進士第二甲第三甲注官亦不為徼倖若恐更添入流之人即乞以進士諸科御試不合格人數留充制科數目彼此通融俱無所礙如此則四方特起之人咸有榮進之望聖君搜揚之路蔑有壅蔽之嗟矣元祐二年七月上時為吏部尚書武舉上仁宗論武舉武學冨弼臣聞漢拜韓信舉軍驚笑蜀用魏延羣臣觖望蓋冨貴易為善貧賤難為工也北齊叚孝元云持大兵者如擎盤水傾在俛仰間一致蹉跌求止豈得哉魏元忠曰今朝廷用人𩔖取將門子弟亦有死事之家而䝉抽擢者此本無幹略趙奢之子括少時學兵法以天下莫能當嘗與其父奢言兵事奢不能難然不謂為善其毋問奢何故奢曰兵死地也而乃易之趙若以為將破趙軍必此兒也後果有長平之敗而趙遂弱今不預選將以備不虞臨事而遣是易之之甚也古者命將君跪而推轂曰閫以内寡人制之閫以外將軍制之又賜以斧鉞使得專政且用兵之道主於威而輔以權變若不得專則威挫而權變滯矣且君不可制况令閽寺之賤監督之使舉動不舒羈於俯仰而望成其功雖甚愚者亦知其難矣古之試良將者亦問以䇿夏商時只命六卿未聞卒然命介胄武夫可以集事者也王者治天下唯二柄文武之謂也大槩文以餙治平而武以靖禍亂然亦交相為用故孔子曰有文事者必有武備國家文既冨矣武未甚備臣請為陛下陳之臣聞歴世為天下所患者外夷狄而内姦雄三代以降歴秦與二漢南北十朝唐及五代其危亡宗社無不出乎夷狄與姦雄也今北敵結好西戎請吏誓若皎日藏在天府夷狄之患姑未慮也若夫姦雄則無世不有但觀世事何如爾政教宣逹民心和樂天時豐茂國用充實則姦雄不得志於是蓄銳而退或在畎畝或在商賈或在戎卒或入仕宦或薄㳺四方政教虧損民心離貳天時凶殺國用蹙乏則姦雄得志乗釁而動出農賈奮戎卒棄仕宦起薄㳺横戈一呼羣怨嘯聚陵斥郡邑揺亂區夏小則有割據之患大則致傾亡之禍然禦之有備救之有術未始不由兵也兵之勝敗國之存亡未始不由將也將得其人則安國常安危國復振失其人則安國致危危國遂滅故孫武曰將者人之司命國家安危之主也司馬法曰將不預設亡以應卒太史公曰且欲興聖統惟在擇任將相鼂錯曰君不擇將以其國與敵也伏惟陛下承累聖之業撫乆安之運謂兵已戢謂將無用謂天下不足憂臣甚惑焉故敢以上之四事為請昔者莊憲太后稱制明不外照蔽於近習庻政大擾紛然無紀莊憲既徃陛下一更大變逐宦寺罷女謁邪路既絶羣綱漸整求讜直之士納諌諍之説臣謂革莊憲時弊事則美矣若夫紹祖宗之遺範考治世之徽烈則陛下試自審政教果無虧損者乎此一也國家用度至廣規求無節賦稅過太半之暴徭役有竭作之苦民本無求於公盖自出貨力耕田鑿井以養父母妻子而百計歛之攘肌刺骨及有不足窘於飢凍則未聞開倉廩以賑䘏不惟賑䘏無所又從而鞭扑以求苛殘之賦縱或假貸多不及時皆流徙餓殍之餘是有假貸之名而無其實四方愁怨别求生路則億兆民心果無離貳者乎此二也前二年江淮蟲旱水泉皆竭民十死八九今年京東京西河北河東闗右兩川蟲旱一如江淮但死者差少然至今未息是舉海内盡罹其害荒險之極近世以來未之有也城邑虚廢荆棘徧野物價翔貴人無榖色天時如此陛下以為果無凶殺者乎此三也古者國有九年之蓄曰足無六年之蓄曰急無三年之蓄者謂國非其國今天下郡邑除備邉數郡其餘率無三年之蓄甚者不能備一二年國家居常小有費用必命主計者斡旋移用始可以足今年京東大歉發使詣江淮括三十萬糧以賑之江淮凶歉固已最甚彼自不足安有羡利以及於他哉今幸天下寜敉無干戈之費但賑救饑殍尚已求榖於空虚之地若不幸干戈蹔擾舉十萬之衆日費千金即不知使執事者何從而得之國用如此陛下以為果無蹙乏者乎此四也臣謂四者既如是則隙開釁露今之姦雄已得志矣但未動爾設或一旦有出畎畝捨商賈奮戎卒棄仕宦起薄游乗凶荒之嵗率怨咨之民屯結山林焚蕩邑屋陛下直於此時始欲遣卒命將禦宿謀之冦驅不教之士當必死之鋒臣為陛下危之萬一西北二邉棄信叛約姦雄侮於内夷狄撓於外雖伊吕復生臣恐亦不能為陛下計矣為今之計莫如選將預備之今選將之道雖粗有律令或列制科或設武舉然皆法度齷齪必未能致特起之士何則應制科者必樂為賢良方正材識兼茂恥為將帥邉寄之名盖今人重文雅而輕武節也又考試者欲使難其對必求艱奥煩碎之事為問故令所習不專為有用之學既又限以日刻責以文多設有應者視日足文之不暇其暇究極韜略運動謀猷哉武舉者蹶張馳射儕於卒伍所得庸妄鄙淺固不敢望得異士但稍能警勵有亷恥則焉肯為卒伍之事乎臣不知國家立此二道姑欲示風采耶必欲得將帥耶示風采則可如必欲選竒傑為將帥藩翰四方則非臣所知陛下求相臣即自布衣考文藝試於州縣然後升之朝廷列於臺省館閣及羣有司驗其行實才効為最者則擢之為相至於求武臣自三班及諸軍叙補崇者為歩騎都督殿前帥以至登樞府亦自有次第二者頗為得術而獨於將帥不知術焉豈不謂名武臣者便可為將帥焉茍如是卒然委以重兵託以安危則丘明所云可為寒心賈誼所云可為痛哭者也臣請詔近位及藩鎮大臣於文武官中各舉明兵法有威果習練武略堪任將帥者一二人仍請不限品秩不責罪過限品秩則下位有才者遺矣責罪過則負譴有才者亦遺矣爵禄妄髙齷齪守細行者於事無益於急難無用既而召置闕下量與遷擢隨其品位任於邊塞重難之地使其磨勵且以觀其能否焉或有警急則取之有處遣之不疑與夫臨事而命命而不果夐相遠也雖然備今一時之用則有餘必欲垂永久為不易之制臣復有愚策宜於太公廟建置武學許文武官與白身嵗得入補聚自古兵書置於學中縱其討習勿復禁止朝觀夕覧無一日離乎兵戰之業雖曰不果臣不信也夫習武者讀太公孫吳穰苴之術亦猶儒者治五經捨之則大本去矣今陛下設制科武舉求將帥之才而反禁其所習之書令學者何所師法若禁其所習而兾其所立是由緤韓盧而求其獲絆驥足而望其騁也不亦難乎且國家所禁者葢恐生變臣歴觀自古倡亂如秦末陳勝吳廣及隋末十餘軰皆倔起農畝而卒亂天下其凶謀姦計盖順民好亂之心爾豈盡曉兵法哉况雖欲禁止今蓄書之家往往皆有假使處私室熟習如韓彭蘇李陛下何由知之是禁之適足自禁不能禁人不若不禁之愈也必未能行於天下且可行於學中亦命雜讀史傳令愽知古今勝敗之勢以輔助兵術昔晉文公謀元帥以郤縠説禮樂敦詩書乃命將中軍漢明帝時期門羽林之士悉令通孝經孫權謂吕蒙蔣欽曰冝學問自開益蒙曰軍中日苦多務不及讀書權曰孤豈用卿治經為博士耶渉獵見往事爾蒙乃就學自餘儒將固亦不少焉兵術既精史傳既博然後中年一校三嵗大比當雜問兵術史傳之策才者出試之不才者尚許在學是國家常有良將布於四方夷狄姦雄知我有大備安敢輕動動則威之軍志所謂無恃其不來恃吾有以待之又曰不戰而屈人兵此其要也景祐元年上時通判絳州上仁宗乞詔陜西等路奏舉才武富弼臣伏覩載籍自古取士無如本朝路狹三代以往不復紀列兩漢而下歴南北朝及隋唐十餘代取士之法各有科條大率如賢良孝亷孝弟力田明經秀才進士唐又添制舉五十餘科此外又許藩鎮辟召及諸色人薦舉亦許自薦拜官歴代求人唯務廣博所以天下懐才抱器之士無不牢籠收攬盡為朝廷之所用也國家取人唯有進士明經二科雖近設制舉亦又取人不多是三者大抵只考文辭念誦而已天下之士有大才大行而賦性不能為文辭就舉試者率皆遺之臣竊思近年數牓以來放及第者如河北河東陜西此三路之人所得絶少者何葢此處人物禀性質魯不能為文辭中程試故皆老於科場至死不能得一官豈三路之人獨不樂富貴哉葢求之而不得也今縱有稍在顯官者亦不過三五人而已此數路之人雖不能為文辭若其大才大行及強悍姦雄則諸路不及向時天下無事則此等人或在場屋或在農畝或在商賈或在僧道屈伏不能有所為但怨望思亂而已今元昊冦邊西陲用武覆軍殺將中外震恐兵寡糧匱調發無所當是之時乃此等人踴躍快意皆欲助賊為患或更有盗賊屯聚則為之倡首驚刼州縣自圖冨貴之時也其間忠義者尚思因時駐屯而願為朝廷之用者然朝廷至今未悟不加搜訪臣恐為他人所得則中國處處皆為敵國也臣伏見漢髙祖作歌曰安得猛士兮守四方武帝又親作詔令州郡察吏民舉可為将相及使絶域者唐髙祖亦勑闗内河東諸州召募勇敢以討吐蕃此皆前王所行而有濟時用者也臣又見朝廷向來所用之人多至敗事雖切求人未見可者陛下勿謂在官皆人傑而民間無復有人臣欲乞條列名目如臨難不顧勇敢絶倫武足安邉才任將帥武藝超衆智謀宏逺并可使絶域之𩔖列十餘條特降手詔下陜西河北河東京東京西路轉運使副提㸃刑獄及諸州長吏仰依上項名目察訪舉奏不拘人物不限人數能作文字者即試以䇿問勿限字數不能為文者但令直說事狀或口陳方略亦許詣闕自薦仍各量給裝錢如審知可用即文武資中隨其所欲量髙下補授如此必然得人伏縁太平已久武人在顯位者或以恩澤進或以年勞陞自餘門䕃雜調皆是常人不聞自孤寒中才武擢用臣所以謂非常人多在民間自是不求或求之不至若果行此必非虚設今嵗或有貢舉兼之不妨若貢舉權罷獨行此詔亦不失人寶元二年上時知諌院上仁宗乞選邊上有智勇人與講說兵書范仲淹臣竊聞國家置武學以來若未有人習藝或恐英豪隐晦恥就學生之列儻久設此學無人可教則慮外人規覘謂無英材於體非便欲乞指揮國子監不須别立武學之名如學生中有好習兵書者令本監官員保明委是忠良之人即宻令聽讀臣竊見邉上甚有弓馬精強諳知邉事之人即未曽習學兵書不知為將之體所以未堪拔擢欲乞指揮陜西河東逐路經略司於將佐及使臣軍員中㨂選識文字的有機智武勇久逺可以為將者取三五人令經略部管諸司參謀官員等密與講說兵書討論勝策所貴邊上武勇已著之人更知將略或因而立功則將來有人可任即不得虚張多放人數慶厯四年上時為參知政事宋名臣奏議巻八十二
