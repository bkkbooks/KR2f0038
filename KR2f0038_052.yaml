body:
  text: 宋名臣奏議巻五十二宋趙汝愚編百官門臺諫二上仁宗乞擇守節難進之臣置之諫省歐陽脩臣伏見陛下仁聖聰明優容諫諍雖有狂直之士犯顔色而觸忌諱者未嘗不終始保全往往亟加擢用此自古明君聖主之所難也然而用言既難獻言者亦以為不易論小事者既可鄙而不足為陳大計者又似迂而無速效欲微諷則未能感動將直陳則先忤貴權而又旁有羣言奪於衆力所陳多未施設其人遽已改遷致陛下有聽言之勤而未見用言之效頓疑言事之職但為速進之階蓋縁臺諫之官資望已峻少加進擢便履清華而厭人言者因此亦得進說直云此輩務要官職所以多言使後来者其言益輕而人主無由取信辜陛下納諫之意違陛下賞諫之心臣以為欲救其失唯宜擇沉黙端正守莭難進之臣置之諫省則既無干進之疑庻或其言可信伏見殿中丞王安石徳行文學為衆所推守道安貧剛而不屈司封貟外郎吕公著是夷簡之子器識深逺沉静寡言富貴不染其心利害不移其守安石乆更吏事兼有美才曽召試館職固辭不就公著性樂閑退淡於世事然所謂夫人不言言必有中者也徃年陛下上遵先帝之制増置諫官四員已而中廢復止兩貟今諫官尚有虚位伏乞用此兩人補足四員之數必能規正朝廷之得失禆益陛下之聰明臣叨被榮恩未知報効茍有所見不敢不言嘉祐元年上時為翰林學士上仁宗乞召還唐介等歐陽脩臣材識庸暗碌碌於衆人中䝉陛下不次㧞擢置在樞府其於報効自宜如何而自居職以来已逾年嵗凡事闗大體必湏衆議之恊同其餘日逐進呈皆是有司之常務至於謀猷啟沃蔑爾無聞上辜聖恩下愧清議人雖未責臣豈自安所以夙夜思惟願竭愚慮茍有可採冀禆萬一臣近見諫官唐介臺官范師道等因言陳升之事得罪或與小郡或竄逺方陛下自臨御以来擢用諍臣開廣言路雖言者時有中否而聖慈每賜優容一旦臺諫聫翩被逐四出命下之日中外驚疑臣雖不知臺諫所言是非但見唐介范師道皆乆在言職其人立朝各有本末前後補益甚多豈於此時頓然改節故為欺罔上昧聖聰在於人情不宜有此臣竊以謂自古人臣之進諫於其君者有難有易各因其時而已若剛暴猜忌之君不欲自聞其過而樂聞臣下之過人主好察多疑於上大臣側足畏罪於下於此之時諫人主者難而言大臣者易若寛仁恭儉之主動遵禮法自聞其失則從諫如流聞臣下之過則務為優容以保全之而為大臣者外秉國權内有左右之助言事者未及見聽而怨仇已結於其身故於此時諫人主者易言大臣者難此不可不察也自古人主之聽言也亦有難有易在知其術而已夫忠邪並進於前而公論與私言交入於耳此所以聴之難也若知其人之忠邪辨其言之公私則聽之易也凡言拙而直逆耳違意初聞若可惡者此忠臣之言也言婉而順希㫖合意初聞若可喜者此邪臣之言也至於言事之官各舉其職或當朝正色顯言於廷或連章列書共論其事言一出則萬口爭傳衆目共覩雖欲為私其勢不可故凡明言於外不畏人知者皆公言也若非其言職又不敢顯言或宻奏乞留中或面言乞出自聖斷不欲人知言有主名者葢其言渉傾邪懼邅弹劾故凡隂有奏而畏人知者皆挟私之說也自古人主能以此術知臣下之情則聽言之易也伏唯陛下仁聖寛慈容納直言於大臣尤所優禮常欲保全終始思與臣下愛惜名節尤謹重於進退故臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳目所記景祐中范仲淹言宰相呂夷簡貶知饒州皇祐中唐介言宰相文彦博貶春州别駕至和初吳中復吕景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼罷知蔡州今又唐介等五人言陳升之得罪自范仲淹貶饒州後至今凡二十年間逐臺諫者多矣未聞有規諌人主而得罪者臣故謂方今諫人主則易言大臣則難陛下若推此以察介等所言則可知其心矣昨所罷黜臺諫五人惟是從誨入臺未乆其他四人出處本末迹状甚明可以歴數也唐介前因言文彦博逺竄廣西煙瘴之地頼陛下仁恕哀憐移置湖南得存性命范師道趙抃並因言忤劉沆罷臺職守外郡連延數年然後復用今三人者又以言樞臣罷黜然則介不以前蹈必死之地為懼師道與抃不以中滯進用數年為戒遇事必言得罪不悔蓋所謂進退一節終始不變之士也至於王陶者本出孤寒只因韓絳薦舉始得臺官及絳為中丞陶不敢内顧私恩以義爭議絳終得罪牽顧私恩人之常情爾斷恩以義非知義之士不能也以此言之陶可謂徇公滅私之臣矣此四人者出處本末之迹如此可以知其為人也就使言雖不中亦其情必無它議者或謂言事之臣好相朋黨動揺大臣以作威勢臣竊以謂不然至於去嵗韓絳言富弼之時介與師道不與絳為黨乃與諸臺諫共論絳為非然則非相朋黨非欲動揺大臣可明矣臣固謂未可以此疑言事之臣也况介等比者雖為謫官幸䝉陛下寛恩各得與郡未至失所其可惜者斥逐諫臣非朝廷美事阻塞言路不為國家之利而介等盡忠守節未䝉憐察也伏望聖慈特賜召還介等置之朝廷以勸守莭敢言之士則天下幸甚嘉祐六年六月上時為樞宻副使上英宗乞察言責實時有懲勸吕誨臣先有奏陳以力所不能願辭諫職不意朝命復除御史知雜臣乆尸言職已試不効惟俟幽黜敢有覬覦天慈䝉覆豈不知幸圖報之心宜何如哉臣竊思歴代設耳目之官葢輔人主之不逮不能九重之外無復聞見萬幾之事皆為壅蔽以是論之獻替之言不可一日無之凡事止宜辨論是非稍渉欺妄當行重責不當置其言而不用使之沮辱在賢者翻然以思動為身謀悠悠皆是借如朝廷之事臺諫官不得預聞及其政令行下方始得知比正其所為則曰已行之命難以追改是執政之臣常自取勝耳目之官固難與争矣又聞近日臣僚建議以先帝臨政信任臺諫官所陳已行之事多有追奪欲陛下矯先帝之為凡事堅執不可移易行一繆令進一匪人倡言於外曰出自宸𠂻人必不敢動揺若果有之是欲窒塞聖聰將使拒諌遂事豈公忠愛君之人哉恐非廟社之福也且諫諍者非衮職之闕時政之失不應有所激發上則咈戾聖意下則違忤輔臣以至被紏劾者皆為仇敵豈不知害於身凶於家所利者國家所守者職分爾而又近年朝廷無懲勸之意諛佞者傾附權勢畏避者喑嘿自容坐累嵗月例得遷轉言與不言孰為利哉臣嘗親奉徳音指緘黙者甚衆然終不聞有所誡勵斯無益之大弊也臣竊謂陛下好問之心過於虞舜但未嘗察其言爾求治之功有如漢宣但未嘗責其實爾臣既未得其去敢不以言責自任伏望陛下既問之當察其言既用之當責其實無俾左右蔽惑聰明言事之官宜時有懲勸則人無茍且職事皆舉有禆於朝政太平之基不難成矣矯先帝之為更宜沉慮已行之事果有不便更張何疑不然臣未知職事之所守終不安其分爾治平二年二月上時自知諫院遷侍御史知雜事上英宗乞親擇御史吕誨臣伏覩御筆除授殿中侍御史范純仁監察御史裏行吕大防朝命既出公議皆允臣聞漢孝武即位之初田蚡為相薦人或起家至二千石權移主上帝乃曰君除吏盡未吾亦欲除吏非明哲之君智能燭理則威福之柄幾為田氏專矣臣見陛下始除二人者誠有㫖哉臣向來所陳請令中外兩制官每嵗各舉才能之人籍於禁中要堪任使即請宸𠂻自擇免臨時薦舉可以杜絶請求之路此至公之法願陛下乆而行之被用之人莫不歸感上恩必盡死節以圖報効自昔興王之道未有不繇於是也唯聖慮以操柄之重謹始克終天下幸甚治平二年六月上上英宗乞添置言事官吕誨臣竊以臺諫官者人主之耳目中外之事皆得以風聞盖輔益聰明以防壅蔽臣觀天聖景祐間三院御史常有二十員而後日益衰減葢執政者不欲主上聞中外之闕失然亦不下數員今御史闕中丞者累月御史五員差出者二人唯臣與范純仁吕大防供職封章十上報罷者八九諌官二員司馬光遷領他職傅堯俞出使虜廷諍臣僅同廢置矣自古言路壅塞未有如今日之甚也臣切為聖朝羞之下情何得以上通天聽何因而逺及臣伏乞聖𠂻鍳照斯弊特為振起添置言事官員數以廣聞見實求治道之大要也治平二年二月上上神宗論舉臺官不必校資序吕公著臣近䝉恩充翰林學士伏見本院自來舉臺官並湏前行貟外郎已下至太常博士歴通判一任已上者仍湏衆學士同狀保舉切以御史之職所以上輔天子聰明下䋲紏百職事無大小皆得奏論必湏資性端方學識兼茂然後可以處憲寺任言責由是而求諸多士之中未易中選今乃限以資格而常欲得人必恐其難竊見近嵗以來前行員外郎以上知諌院者並得兼起居舎人朝廷之意務欲廣進人之路而御史兼官之制尚闕盖有司未嘗講求臣又見比來保舉堪充御史裏行或以資淺報罷臣聞唐太宗雅好直言馬周以布衣為監察御史裏行裏行之名自馬周始其後官卑未得真御史者皆除裏行然則裏行之設本以待資淺之人今乃以資淺為不應選正失前代設官之意臣又覩天聖七年言事者以三院御史出為省府判官轉運使其間多是知縣充舉深為僥倖乃詔今後知州通判方得奏舉近日臺官其稱職者雖或次補諫列其不任職者雖眞御史亦以舊資出補外任然則資序髙下不必校量又聞孔子曰舉爾所知爾所不知人其舎諸夫以人才之難必待數人盡知固不可得茍一人知之衆人非出於實信但雷同繫書則又非為國求賢之意凡臣所言灼然易見若増成舊制於體無害伏惟陛下以聖明文武初即尊位左右之臣悉皆訪逮巖穴之士尚将旁求豈獨於御史耳目之官而不能廣開其路伏望聖慈裁許自今後毎御史有闕即輪學士御史中雜一員保舉自正郎前行員外郎並依諫官例除兼御史朝官以上不問資序並除裏行太常博士通判及一年者並依舊制如此則用人之法不致苛宻而舉善之心各得自盡不勝大幸治平四年閏三月時為翰林學士後㫖許舉中行員外郎為侍御史裏行上神宗論諫官貶秩不當再舉其職孫覺臣近准敕命降授前件官同知諫院臣已祗受訖於二十二日正衙二十三日門謝並畢臣竊以告臣之辭云薦引公卿措置職任此而輕肆宜有懲責臣受命巳来夙夜惟思若以臣畎𤱔無狀學問零落不足以拾遺左右論大臣能否則已矣若以臣所論不當於理則臣所學於古者如此敢違臣所學以徇世乎然敕命已下不敢遽有論列既乞補外而三狀聞奏未䝉報可臣欲勉强就職則臣方以言忤㫖得罪奪官傳曰人臣不見察於君不敢立於朝臣雖闇愚敢㤀斯義臣謹上考聖人旁稽傳記反覆一二為陛下言之非以避臣之罪也將以明君臣之義也陛下幸赦其罪使得畢陳臣聞孔子所謂諫臣七人者三公四輔也天子與此七人者處而繩愆紏繆格君心之非羣臣之賢不肖相與謀議而進退之泯然不見其辨爭之迹而治化已成於天下後世七人者不任其責始以小官與人主論辯天下之萬事故諫官雖㣲而與謀於王體與聞於國論宰相與人主進退賢不肖於廟堂之上諫官與人主别白賢不肖於造膝之間其所從來乆矣孔子曰君子之仕行其義也又曰勿欺也而犯之故臣之事陛下也情不敢隠而每犯顔焉義之所在則言之不疑又聞孔子曰君子之事君也將順其羙匡救其惡晏子曰君所謂可而有否焉臣獻其否而成其可君所謂否而有可焉臣獻其可而去其否若如告辭所謂則人臣之義有匡救而無將順有獻否而無成可始得事君之義而無隱情也或者乃謂諫臣小官不當與人主進退大臣之事又或云諫臣雖可以論大臣之賢不肖然不當云以某代某臣又以為不然衛大夫史鰌以蘧伯玊賢而不用彌子瑕不肖而任事數以諫而君不聽死且不懈至以屍諫衛公卒退彌子瑕而用蘧伯玊成帝時御史大夫缺谷永薦薛宣成帝用之鮑宣以諫大夫上言請黜汝昌侯傅商方陽侯孫寵宜凌侯息夫躬而召用故大司馬傅喜故大司空何武師丹故丞相孔光故左將軍彭宣明年上遂召孔光免孫寵息夫躬又召何武彭宣復為三公杜詩以南陽太守上疏稱伏湛柱石之臣宜居輔弼郎顗言黄瓊李固可任時政伊尹傅說不足為比此數人者皆位下言輕或勸人主進退大臣或欲以某代某當時或用或不用焉未嘗以為非也唐之盛在太宗太宗之臣莫如魏徵時有言徵阿黨親戚者太宗使温彦博按之又使彦博責徴不得不存形迹他日徴入奏曰臣聞君臣叶契義同一體未聞不存公道唯事形迹若君臣上下同遵此路則邦之興䘮或未可知太宗改容曰吾巳悔之若徴之言可謂深得治體矣使太宗以形迹待羣臣羣臣以形迹事太宗嫌疑猜阻上下之情不通則與秦之末世何異豈能成貞觀之治哉今使言者論羣臣之非而不言其是論羣臣之惡而不言其美稱其人不得言堪某職述其才不得言堪某任其為形迹豈不甚哉臣雖非魏徴之賢實欲陛下復太宗之治也故臣之事陛下也知盡臣之義而無隱情上不見三公之尊下不知九品之賤愚智忠邪茍知其詳者悉以獻於左右傳曰為人臣者無以有巳明委質以事君則身非已有生殺予奪唯上所令傳曰匹夫不可奪志豈謂可殺可生者身也可予可奪而志不可以奪歟以臣賤㣲言論不合放廢竄逐何傷於治聖恩博大纔奪兩官或周章震擾䘮其所圖遂於陛下懐不盡之意則罪莫大焉况臣自供諫職纔及兩月得對至於五六而章十餘上臣之本末計亦粗簡聖心然臣所言無一見効臣論樞宻院使邵允在位無狀而陛下疑之論御史中丞滕甫姦邪而陛下不信則是臣行猶可疑而言不足聽也陛下置左右耳目之官而取言行無足采者不知將何補於治臣所以區區求去者非徒不得其言亦以深為陛下謀耳伏望聖慈特賜檢臣前後三狀罷臣言職除一外官臣見居家待罪所有實録院檢討同知諫院管幹國子監臣並不敢供職熈寜元年七月上先是陳升之登對上許擢置樞宻覺相繼登對言錢明逺不可治長安上因與言升之宜居宥宻邵允不才向欲使守長安而執政以為無過覺曰韓𤦺自宰相守長安今以代琦不薄特執政自為地不欲允去爾時升之已有成命而覺不知退而上言宜使允知永興升之為樞宻使上以覺為希旨收恩且區處大臣非小臣所宜又怪覺令書吏冩奏故責授太子中允仍知諫院八月出通判越州上神宗論孫覺令吏人書冩章疏王安石臣今日䝉宣諭以孫覺令吏人書論列大臣章疏臣初亦怪其不能謹宻但疑此朋友所當誨責非人主所當譴怒既又反覆思惟陛下以覺為可聽信故擢任諫官進賢退不肖自其職分所當論列雖揚言於朝以廸上心於義未為失也但令吏人書冩章䟽誠不足以加譴怒凡人臣當謹宻者以君子小人消長之勢未分言有漏泄或能致禍如其不宻則害將及身若邅值明主危言正論無所忌憚亦何謹宻之有乎唯有姦邪小人以枉為直懼為公論之所不容則惟恐其言之不宻若得此軰在位陛下何所利乎若陛下疑覺有交黨之私招權之姦則恐盛徳之世不宜如此魏鄭公以為上下各存形迹則國之廢興或未可知若陛下不考察邪正是非而毎事如此猜防則恐善人君子各顧其迹不敢盡其忠讜之言而姦邪小人得伺人主之疑以行䜛慝也若陛下恐陳升之聞此或不安臣亦以為不然漢髙祖雄傑之主也然鄂秋論相國蕭何功次而髙祖不疑乃更加賞亦不聞蕭何以此為嫌陛下聖質髙逺自漢以来令德之主皆未有能企及陛下者每事當以堯舜三代為法奈何心存末世褊吝之事乎書曰任賢勿貳去邪勿疑不明知其賢而任之以為賢不明見其邪而疑之以為邪非堯舜三代之道也陛下以臣為可信故聖問及之臣敢不盡愚今日口對未能詳悉故謹具劄子以聞熈寧元年七月上時為翰林學士上神宗論擇言事官當以三事為先司馬光臣今日面奉聖㫖令臣採訪可為諫官者宻具姓名聞奏臣辭不獲命退而惶恐黙自思忖凡擇言事官當以三事為先第一不愛富貴次則重惜名節三則曉知治體具此三者誠亦難才臣愚何足以識别賢能竊謂已試之人差為可信伏見三司鹽鐵副使吕誨累居言職不畏强禦再經謫降執節不回侍御史吕景外貎和厚内守堅正見得知恥臨義不疑於臣所知之中此兩人似堪其選更乞陛下博訪衆臣裁以聖意熈寧元年八月上時為翰林學士上神宗論人君聽納不當以諫臣為暴巳取名陳襄臣聞君之視臣猶心膂之於股肱耳目也四者相次而成一體則不勞而功用成矣故公卿者人君之股肱而臺諫為其耳目也故古之人君用諫諍之臣必求方直辨博之士司其視聽而補其闕遺其心諰諰然唯恐不聞切直之言以救其失故舜戒其臣曰作朕股肱耳目又曰予違汝弼汝無面從退有後言是也古之人臣諫諍其君茍可以言雖鈇鉞在前無所忌諱者欲以致君於無過而非所以暴其惡將以致臣之節而非所以取其名盖居言之責任其義當爾故易曰王臣蹇蹇匪躬之故書曰斯謀斯猷惟我后之徳故君臣之際同心恊德義成一體上之人茍聞一言之善則雍容聽納不以為暴巳而無所疑下之人茍聞一事之失則周旋切爭不以為干譽而無所隱此所謂信而後諫者也伏望聖慈少察臣之言則天下幸甚熈寜二年四月上時初除知諫院上神宗乞留吕誨劉述臣伏覩罷御史中丞吕誨差知澄州坐言事失實故也臣伏思本臺舊制御史所以許風聞言事者以事方萌芽未至形見及展轉詢採難以究知其詳能先時而言之則可以遏絶禍亂之原救藥事機之失其間固容有不審而於大體無甚害也今聞吕誨因言章辟光狂妄離間岐王以連及輔臣長短乃是誨盡忠於陛下以救朝政之闕耳豈有它哉今遽然絀之士大夫相與驚歎甚為陛下惜此舉也陛下踐祚方三年已罷五中丞矣天下之人不知端末將謂陛下惡聞直言但欲人阿意順指耳豈惟汚損聖德之不細實恐公忠之人由此觧體姦邪之黨縁隙而進以白為黒以正為邪陛下覺悟而悔之巳後時矣而况誨之為人公正峭直知無不為四方之士交口稱譽乃人之望也中司之任朝綱之所寄今乃轉為動揺自壊綱紀臣所未諭也臣愚伏望陛下察誨之無它矜誨之過小追還前詔俾復舊職上全國體下慰人望臣之至願也臣非不知斯言之入即取權臣之怒誠不忍孤陛下之任使耳臣不勝彷徨待罪之至熈寧二年六月上時兼御史知雜事上神宗繳李定詞頭宋敏求臣今月十九日當直中書刑房送到前秀州軍事判官李定特除太子中允權監察御史裏行詞頭伏以御史之官國朝以来其任頗重雖列屬三院各有等差至於肅正外朝紀綱所寄號為清峻選擇盖均舊制湏太常博士經兩任通判方許舉奏入臺盖以歴任既深則更事益多朝廷之儀得以詳熟景祐初以資任難有相當者遂計奏舉博士以上通判未滿任者為御史裏行去嵗驟用京官而遷之今又以幕職官便陞朝著而峻處紏繩之地臣竊恐弗循官制之舊而未厭羣議所有詞頭未敢具草熈寧三年四月上時知制誥上神宗繳李定詞頭蘇頌臣今月二十一日准中書劄子右諫議大夫知制誥宋敏求奏今月十九日當直中書刑房送到前秀州軍事判官李定特除太子中允權監察御史裏行詞頭弗循官制未厭羣議不敢具草伏念國朝近制進補臺官皆詔御史中丞知雜與翰林學士更互於太常博士以上中行貟外郎以下曽任通判官中奏舉充三院其未歴通判者即湏特㫖方許薦為裏行儻非其人或至連坐所以重臺閣之選也去嵗詔㫖專令中丞舉官雖不限資品猶以京秩薦舉縁巳有前詔故人無間言今李定以郡幕職官入居朝廷紏繩之任超越資序近嵗未有臣誠恐有違官法無益治朝敏求所以惓惓而進言者納忠而舉職也議者或曰唐世自諸侯幕府入登臺省者多矣而定之此除豈為過邪臣以謂不然在唐方鎮盛時有奏辟郎官御史以充幕府者由此幕府連茹増重祖宗深鍳此弊一切釐改州郡僚佐皆從朝廷補授大臣出鎮或許辟官亦皆随資注擬滿嵗遷秩並循銓格非復如唐世之比而今之三院事任又重於昔時况定前任未終非時召對不由銓考擢授朝列不縁御史之薦直寘憲䑓雖朝廷急於用才度越常格然墮紊法制必致人言所益者小所損者大再詳敏求前奏頗得允當所有李定除官制未敢具草熈寧三年四月上時知制誥上神宗繳李定詞頭李大臨臣以今月二十二日准中書劄子令看詳宋敏求蘇頌所奏委得公當伏以御史之職紏正内外自國朝故事毎有貟闕必用太常博士已上官然後補之仍湏曽歴通判方許舉薦今李定秀州判官除監察御史裏行不唯超越資序未厭群言抑亦有乖國朝從来法制敏求頌之所陳盖亦有補於朝廷伏望早賜詳酌所有李定除官制未敢具草熈寧三年四月上時知制誥上神宗繳李定詞頭蘇頌臣今月二十三日准中書劄子尚書工部郎中知制誥李大臨狀所有李定除官制内有未便奉聖㫖令蘇頌依前降指揮撰詞臣竊以官品有髙下職事有閑劇皆所以待才能之士擢授有資級保任有常法亦所以抑奔競之塗自古以來兹道不易祖宗之朝或有自起孤逺而登顯要者盖天下初定士或棄草莱而不用故不得不廣捜揚之路自真宗仁宗以來毎有除授雖幽人異行亦不至超越資品葢太平之代事有紀律當循用資品選授之法今朝廷清明俊乂並用進任臺閣動有成規而定以逺州幕官非有積累之資明白之效偶因召對一言稱㫖便授臺官政府既巳奉行有司不能抗議使制命遂下四方聳聞仕進之間豈無觖望况今天下之廣英豪之衆它日或更有非常之人又過於此寅縁進見奏對稱旨則復以何官處之寖漸不已誠恐髙官要秩可以岐路而致事有萬一不可不防臣所以區區建言者上以遵朝廷之法制下以盡有司之職業矣謹案六典中書舎人之職凡詔旨制敕皆案典故而起草制敕既行有誤則奏而正之故前後舎人論列差除用典故而䝉改正者非一今三院御史湏衆學士薦舉朝臣乃典故也或不應此其敢無言去嵗以京官除授所以無言者以前有詔令故也今若先立定制許於幕職官中選擢三院則臣等復有何言而敢違拒耶况定之此除前日敏求大臨洎臣皆知不應近制是以各有論奏今再被詔㫖若便奉行是臣故違官守自作二三上累聖明孰任其責竊謂威福之柄人主得以自專官守有責臣下得以固執若朝廷以定才實非常則當特與改官别授職任随資超用無所不可不必棄越近制處之憲綱若臣上懼嚴誅靦顔起草誠慮門下封駮不肯放過縱門下不舉則言事之臣必湏重有論列或定畏義固執不敢祗受是臣一廢職任而致論議互起煩瀆聖聽則臣之罪戾死有餘責所有李定除官制未敢具草熈寧三年四月上上神宗繳李定詞頭蘇頌臣等檢㑹熈寧三年七月六日奉聖旨今後臺官有闕委御史中丞奏舉不拘官職髙下令兼權如所舉非其人令言事官覺察聞奏臣四月二十八日上殿面奉聖㫖將上件條貫赴舎人院商量草除李定官制者臣等尋將上件條貫赴院同共㸔詳葢為從前臺官湏得於太常博士以上中行員外郎以下奏舉稱職後来為朝行中難得資序相當之人故朝廷特開此制云不拘官制髙下者只是不限博士與中行員外郎耳即非謂選人亦許奏舉也所謂兼權者如舊官資序不相當三丞以下未可為監察故且令上權前行貟外郎以上不可為侍御故令下兼詳此皆不為選人設文也若不拘官職髙下并選人在其間則是秀州判官亦可以權裏行不必更改中允也以此言之選人不可超授臺官明矣至如程顥王子韶等並巳先轉京官因中丞薦舉方䝉特遷中允上權監察今李定是初等職官資序若特與改官只合轉大理寺丞且選人特改京官已是優異若更超授朝籍處之憲臺恩命重疊陞擢非常先朝已来未有此比未知李定有何所長而可當此殊命也臣等所以喋喋有言不避斧鉞之誅者非他也但為愛惜朝廷之法制而遵守有司之職業耳且爵禄賞罰進退黜陟皆陛下得以專之無所不可者若事下有司則具有條制當官者湏奉行而固執也大抵條例戒於妄開今日行之它日遂為故事若有司因循漸致隳紊誠恐倖門一開則仕塗奔競之人皆有僥求希望不次之擢朝廷名噐有限焉得人人而滿其意哉前世所以謹重爵賞不以假人雖有竒才異倫亦湏試以職事俟有成效然後超擢者以此也兼臣等前来論列雖不具記上件條貫亦只指陳選人超授臺官為過當耳如宋敏求言去嵗驟用京官而遷之今又以幕職官便陞朝著而峻處紏繩之地竊恐弗循官制之舊未厭羣議臣大臨言秀州判官除授監察御史裏行不唯超越資序未厭群言抑亦有乖國朝從来法制臣頌言去嵗詔旨專令中丞舉官雖不限資品猶以京秩薦授人所以無言者以前有詔令故也詳此與今來撿舉到不拘官職髙下條制亦不至違戾以此臣等所以湏至再執守初議也臣等非不知再拒嚴㫖獲罪不輕但以意在盡公不敢自為反覆上誤朝廷耳所有臣大臨昨日當草薛昌朝除官制初亦疑慮未得允當既而思之昌朝雖非御史之薦朝廷特除縁已是京官為有程顥王子韶近例所以不敢違拒非如李定選人之比也伏望聖慈更加詳察臣等惓惓之誠所有李定除官制臣等未敢具草熈寕三年四月同李大臨上上神宗繳李定詞頭蘇頌臣今月一日准中書劄子節文李定除太子中允監察御史裏行詞頭奉聖㫖劄與蘇頌所除李定係是特㫖不礙近制令疾速撰詞臣為詳自来本院凡有中書送到詞頭並是當制舍人奉行唯是當制日曽封還詞頭其詞頭再下若元封還之官却再當日即轉送以次官命詞昨日中書劄子送舎人院是臣當制所以獨具劄子奏陳今日輪當李大臨直日上件劄子合是本官奏行却專送臣處顯見不依得自來更直承受體例是同一職事而差使有異臣豈敢越次承受若云因臣論列除改不合條例便送臣處分縁上件論奏是與李大臨一狀同議事體不殊却不依常例送本院輪次承受其劄子已具狀繳納中書門下伏乞依自来體例施行去訖兼臣與李大臨等前後論列李定差除未得允當盖是遵守朝廷之法制奉行有司之職業初等職官超授朝列兼權御史不應近制所以未敢具草今來中書劄子稱係是特㫖除授不礙近降條制臣切謂若果出聖意㧞擢即湏是非常之人名聲顯聞於時然後可以厭服羣議為朝廷美事不然則進用之路自有階漸耳昔馬周為常何作奏條陳得失二十餘事皆當世切務唐太宗㧞於布衣近世張知白上書言事論議卓越真宗皇帝㧞於河陽職官此二臣者可謂有顯狀矣􅑮時遇主可謂非常矣然周猶召直門下省明年方用為御史裏行知白召對稱㫖亦命試舎人院然後授以正言非如定逺州職官素無聲稱偶因孫覺論薦一賜召對便䝉超授縱有竒謀碩畫亦未顯著於時豈足以上稱不次之擢但用其言不試以實天下才辨之士聞之皆思趨走勢要以希薦用此門一開未必為國家之福也故前代用人之法必加詳試俟見成效然後陞擢者亦所以防僥倖之路也今臣不避誅戮再貢瞽言者誠見陛下容受直言可不思獻納少冀禆補耶其李定特㫖除授欲望陛下早賜采納羣議或詢近臣若謂定之才果足以副陛下特㫖之擢則臣自當受妄言之罪萬一臣言不虚即乞再加詳酌或别授一官寘之京師俟它時見其實狀進用未晚如此不唯臣等職事得舉兼亦以養成定之才資免詒異日之論議也臣不勝夙夜惓惓納忠之至然臣巳是五次論列累拒詔命罪在不赦戰恐待罪不敢遑寧熈寧三年五月上上神宗繳李定詞頭李大臨臣今月三日准中書劄子送下蘇頌繳納李定除太子中允監察御史裏行詞頭奉聖㫖所除李定出自特㫖並不礙近制令舍人院疾速撰詞輪次是臣當制竊縁臣與蘇頌前後累次論列屢煩聖聼非不知狂率僣易罪當萬死然猶喋喋不已者無它也盖以職在近列忝賛書命詔勑未便理合奏論既有所懐豈敢緘黙竊以李定自初等職官超授御史不次遷擢舊例所無若云差除特自聖㫖不礙近制大凡朝廷爵賞之出稍有優異皆可謂之特㫖或事有未當豈可以特㫖之故而不許當官者以職事而論列耶以陛下之聖度聰明容納必無不許之理以此臣得以盡所懐而終言之且定自處仕途未聞有卓然稱譽為時所推若謂之有經術行誼則召對數刻之間陛下豈能盡見其所藴之深淺也若陛下以其辨論可取急於任用則遷之以壹官可也徐觀其所為然後别加遷擢可也不當遽然置在憲臺駭動物聼於定未安於國體亦有所損故前頌之所論唐太宗用馬周先置門下省明年方為御史裏行國朝用張知白亦先試於舍人院然後授以正言盖為此也今定之除既未厭羣議若制命一出豈免門下之封駁臺諫之章䟽耶臣當此時雖欲自劾請罪亦無及矣縱陛下容恕不加誅責然臣復何面目以處陛下之左右耶以此湏至先事建言儻䝉聽察不唯在臣職業粗得所守亦於朝廷萬分裨益臣不勝兢惶隕越待罪之至其李定除官制未敢具草伏望聖慈更賜詳酌熈寜三年五月上上神宗論不當復劄下舍人院湏令草李定詞頭司馬光臣竊見近者朝廷除秀州判官李定為監察御史裏行知制誥李大臨蘇頌等累次封還詞頭數日來外間皆言朝廷已為之寢罷今日復聞劄下舍人院湏令草詞臣竊意朝廷知大臨等既累次封還詞頭今復草之則為反覆必難奉詔因欲以違命之罪罪之使今後凡朝廷所行政令羣下無敢立異者若果如此則百執事之人自非偷合茍容者皆不得立於朝政令或有得失陛下復何從知之晏嬰所謂以水濟水賈山引秦之季世以戒漢文帝者正患其如此耳臣前論逐臺諫官今又言大臨等非敢私此數人正為國家惜言路之絶耳伏望陛下審思而謹行之勿使聦明遂至壅蔽則天下幸甚貼黄國家不次用人固無常法然必使衆心厭服然後為美是以堯舜非不聰明也然命官皆先謀岳牧既衆言僉同復明試以功而後用之故舉不失能而上下雍熈也臣素不識李定實不知其行能如何陛下果知其賢何不且試之以漸俟其功効顯著衆皆知之然後不次擢用則誰曰不可何必今日與臣下力較勝負殆非人君廣大之體也熈寜三年五月上時為翰林學士宋名臣奏議巻五十二
