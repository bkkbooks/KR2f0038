body:
  text: 宋名臣奏議卷一百三十六宋趙汝愚編邉防門遼夏八上仁宗論西北議和有大憂者三大利者一韓琦臣伏見朝廷已封冊夏國又契丹以西征回來告當此之時若便為太平無事則後必有大憂者三若以前日之患慮及經逺則後必有大利者一請略言之自羌人盜邉以來于今七年小入大至未嘗挫其鋒今乘纍勝之氣而與朝廷講和者得非凡軍興之物悉取其國人而所獲不償所費又以絶在邊和市上下困乏暫就稱臣之虛名而嵗邀二十五萬之厚賂非為得計邪且契丹勢素强而夏人尚敢與之抗衡若使其嵗享金繒及和市之利國內充實一旦我之邉備稍弛則必有大窺圖關輔之心此臣所謂後必有大憂者一也契丹昨以羌人誘致邉民遽往討伐既不得志而還見朝廷封冊曩霄其心必固不樂近諜者傳契丹國人語云往河西趍沙漠中所得者唯牛羊耳若議南牧則子女玉帛不勝其有臣恐契丹異日或更有邀求或請絶西人之和以隳盟誓且河北兵驕不練忽爾奔衝則必震動京師此臣所謂後必有大憂者二也又昔石晉假契丹力以得天下嵗遺繒帛三十萬今朝廷嵗遺契丹五十萬夏國二十五萬使二虜日以富强而國家取之於民日以朘削不幸數乘水旱之灾則患生腹心不獨在虜此臣所為後必有大憂者三也昨契丹自恃强盛意欲并吞夏人倉卒興師反成敗衄虎狼之性切於復讎必恐自此交兵未已且夷狄相攻者中國之利此誠朝廷養謀待釁之時也若能內葺紀綱外練將卒休息民力蓄斂財用以坐待二虜之弊則幽薊靈夏之地一舉而可圖振耀威靈彈壓夷夏豈不休哉此臣所謂後必有大利者一也臣願陛下深思去大憂而取大利則為天下之福今范仲淹富弼往河東河北經制邉事必有所陳然臣久在陕西敢復陳陜西措置事宜且鄜延環慶涇原秦鳯四路雖罷招討使而邉備不可弛請仍選有才望近臣為之主帥特降手詔委之久任使其經營一方以備羌人翻覆之變又四路所駐兵十分中宜留六分在邉二分令東還二分徙屯近裏州軍其鄜延路屯河中府環慶涇原路徙屯邠州永興軍秦鳯路屯鳯翔府逐路鈐轄一員駐泊都監二員與逐路知州同行訓練而本路仍領之非有事宜不得輒抽動其徙屯兵馬處知州才望輕者請選人代之又四路所抽就糧土兵請委逐路帥臣相度嵗分兩畨一畨在邉一畨放歸本處不唯減節邉上糧草兼使無久戍之勞又陕西州軍經南郊賞給之後官帑例皆空虛今范仲淹若過陜西宣撫則又有軍間特支徒益所費若臣䇿可行陜西亦别無處置不必仲淹更往也復見諸路昨招置宣毅兵近十一萬然朝廷物力未充何以贍給况閭里竊發自有巡檢縣尉可以捕擊若防羣盜只當益屯一路都㑹之地不必每州盡要防守其宣毅兵欲乞除河北河東外其京東京西淮南兩浙江南荆湖福建等路每指揮可減以三百人為額後有闕即招填之今天下兵冗不精輕蠹財用陜西河東河北京東州軍已曽差官㨂選其餘路亦乞選近上內臣分往揀選所貴冗食可蠲而經費可給也慶歷五年十一月上時為樞密副使上仁宗論河北及嶺南事冝宋祁臣竊聞用兵者不幸敵之亂而欲已之不可亂不畏彼之侵而患所以來其侵也今聞契丹興端造隙欲敗和誓外倚虛驕搖脅近邉不顧曲直唯利是視是謂貪兵貪兵者亂此可乘而取之然陛下無良將邉陲之臣類皆才下又甲胄不堅密弓弩不射逺行無䭾幕出無營壘馬乏精突士習驕惰外不能扞患內能為患此陛下未有可冀敵之不能亂也雍溪之蠻最脆弱者今乃離去巢窟略地千里㺯兵安行無一能拒蟲飛蠅營拿而不散此官濫吏庸招其所以侵也事弊及此不振而張之不可謂謀謀之不臧使得遺禍不可謂國臣伏見陛下諸臣急則念治緩則偷安天下無事時見利害之小者則鄙之以為不足事及大利害則憚曰安可卒行又曰據今日之安未及于危小者鄙之大者難之逺者蔑之於是天下之事日損一日嵗耗一嵗經制不立綱紀頽陵賴陛下盛德四海晏然無事而治不可以恃今幸二邉少警朝廷上下留心士爭獻謀人意必向臣請先舉二方言之今河北既分部管等路各有屬州是唐諸節度兵也然而未有都統以節進退臣請因建大帥以一之使部分各得其人則金鼓旗幟卒伍號令便當一禀於帥綴鎧磨兵益養馬閲師而討之講求法度朝廷密詔以虜入某處以某部軍當之某路以師援某所以濟糧咨大帥而聽命焉擊首尾應擊尾首應犄角屈伸包裹彌縫明立賞罰閫外之務不從中制此所謂不可亂也不亂則陛下可用而勝彼之亂也嶺南外區瘴厲薰蒸北方戍人夏秋往者九死一生多發兵則糧乏少則事不集急責功則蠻遁逃不肯出緩則復來擾人是宜有以制之也今聞發北兵踰萬人戍嶺外下濕上蒸病死必多料羣蠻勢不久屯擊之必散臣謂不如選一二健將嵗才留北兵五千人分屯要害處得善吏十數人分治諸州募土人為鄉軍復其租調視州大小户多少為之數統以部伍教以進退皆以彼所長技與相追逐率百人給北兵三十以徑弩利兵佐之冬春則使深入擾其居夏秋則使謹守防其略彼雖能誘納中國亡命要之食盡必出鹵掠若其來也一大斬獲則終身創矣我威已立然後可議招來與之盟則固許之臣則久逺期五年近止三年南方無事矣臣切恐有司茍且復仍舊弊多留客兵自取死亡又不先以威而務招懷不為逺圖而求近效故雖盟必違雖臣必叛夫前日之失已不可追自今之利便當審料恐諸將功成之後議者泰然遂便因循授吏鹵莽設防不為陛下議長久計雖一賊死百賊生故臣曰彼侵不足畏患所以來其侵也臣愚陋不識禁忌惟陛下裁赦用之皇祐四年上時知成德軍上仁宗論河北根本在鎮定宋祁臣伏念行年五十有六素自衰怯不達時宜內治一郡習刀筆簿領計校米鹽與俗吏爭課最以報萬分不意陛下過聽乃使守邉居真定不半年徙定武任過所能早夜震惶然嘗聞天下根本在河北河北根本在鎮定以其犯賊衝為國門戶且契丹弭靜五十年習不畏人貪餮之心不能無動今厲兵秼馬欲慿陵者唯定與鎮二軍不戰則進搏深趙邢洺笮脆撞虛血吻婪婪有其患矣臣所以日夜深計者以為欲兵之彊莫如多榖與財欲士訓練莫如善擇將欲人歆艷樂鬭莫若賞重而罰嚴欲賊顧望不敢前莫如使鎮重而定彊夫耻怯尚勇好論事甘鬭而忘死河北之人殆天性然陛下少勵之不憂不戰以欲戰之士不得善將雖鬭猶負無榖與財雖鎮金城定湯壕勢必輕今朝廷擇將練卒制財與糧返以陜西河東為先河北為後非計也夫西戎兵鋭士寡能略邉不能深入河東天險虜憚為寇唯河北不然失長城之防自薊而南直視千里賊鼓而前如席袵上行故曰謀契丹必先河北謀河北捨定與鎮無可議矣故臣願先入榖鎮定鎮定已充可入榖餘州列將在陜西河東有功狀者得遷鎮定則鎮定重天下久平馬益少臣請多用步兵夫閧然聚忽然散雲奔飈馳抄後掠前此馬之長也彊弩巨梃長槍利刃什什相聫伍伍相縫大呼薄戰此步之長也臣料朝廷與敵相攻必不深入窮追毆而去之及境則止然則不待馬而步可用矣臣請損馬而益步故馬少則騎精步多則鬭健我能用步所長雖契丹多馬無所用之夫鎮定一體也勢不可離今判為二恐謀之未詳先帝以為一道帥専而師不分故定椹其胸則鎮搗其脅勢自然耳今其顯顯有害屯寨山川要險之地裂而有之平時號令文移不能一賊脫叩壘則彼此不相謀誰肯任責耶臣請合鎮定為一路願以將相大臣領之無事時以鎮為治所有事則遷治定指授諸將權一而責有歸士無茍且意䇿之上也惟陛下與中書樞密院當安思危熟計所長必待事至而後圖之殆矣河東馬彊士習善馳突與鎮定若表裏然東下井陘不百里入鎮定矣賊若深走以河東健馬佐鎮定兵掩契丹之惰而歸者萬出萬全此一竒也臣聞事切於用者不可以文陳所論增步兵及入榖分兵𨽻禆將等諸條件目繁碎要待刀筆吏委曲可曉臣已便俗言之輒别封上至擇善將多蓄財乞委樞密院三司條具以聞臣一諸生弗知軍旅事偶有所見不敢隱特以受大恩思亟報也恐議涉迂暗有司疑詰更乞付臣令悉意條陳然後施行皇祐五年上時知定州上仁宗論城古渭州有四不可劉敞臣今月二十二日奏公事臣得預上殿親聞德音以謂古渭州存之則為害弃之則傷威兩者未決詢及左右指意懇惻臣誠獨美陛下聰明謙遜好謀無窮也臣雖不聞公卿之議然臣之愚以為棄之便何者朝廷與羌戎約和久矣今一旦奪其地而城之棄明信規小利使夷狄有以窺中國不可一也羌戎種落非一族也自見稍侵必人人懷疑交謀間諜以新城為比或能相率大為邉患不可二也自始築城到今半年耳所費已巨萬計秦州為之空竭而調給饋運不可勝紀設復屯兵守之日引月長財盡力竭則關中皆可憂不可三也向者虜出爭利多殺官軍數千人後雖擊破其衆足以相當而虜怨益深其志復得故地而已兵若不解憂患方起不可四也假令新城足以蔽秦州長無羌胡之虞雖傾國守之可也不然地形便利賊能乘之以窺邉圉雖傾國爭之可也今何所重輕而縻國財用困民力損士卒之命以貪此咫尺之地計功則可辱言利則可恥慮患則可憂昭昭甚明而談者不忍決之謂為傷威臣所不諭也昔者舜伐三苖三苖不服益贊于禹班師振旅而有苖來格由此觀之帝王之威在使物畏之不在使物惡之故動以義順於理則物畏之矣動以利逆於理則物惡之矣畏之則服惡之則侮自然之道也武帝黜丞相御史之請而止不田車師輪臺則天下復平元帝用賈捐之之䇿而罷珠崖則中國復安故以德言之則不過舜禹以彊言之則不過漢武帝馭夷狄也患枉於義不患力不足也患逆於理不患威之損也惟陛下察於此兩者以觀利害之熟在謀之貴多斷之貴獨明鑑所以見容古事所以知今臣不勝狂直之至皇祐五年上時為直集賢院上仁宗論邉備弛廢吕誨臣切以戎敵講好積有嵗月邉備久隳兵威不振因循玩寇豈居安慮危之長計也臣非知兵者但纍任陜西官稔聞四路之事方陛下厲精求治臣嘗言兵防宜為之首務故略舉邉鄙數事以聞宸聽臣以謂今邉備最可憂者陜西民財匱乏仍嵗不稔不比寶元康定間事力萬一小有警急必無彊勝之勢斷可知矣自西戎通好以來儒臣樂為邉帥者特以寄任事權為意何嘗經略庶務為兵防久逺之計哉臣伏見近年生户自入漢界居住者奄有土田如蹈無人之境所屬堡寨都不禁止州縣亦無由得知雖知亦不行遣慮恐生事風塵忽起為賊內應皆此類也熟户自慶歷中經厯戰鬪消折人數甚多後來雖有折生增口未嘗籍其姓名緩急要用如何㸃集兼自來威彊之族往往為西人利誘皆有背心藩籬不固將來禦敵無所慿恃不可不憂也弓箭手自西事後來闕數不曾招填多為堡寨官貟私役百種侵漁人甚苦之以致教閲隳廢今㳂邉堡寨使臣多不擇人唯利在轉官酬奬聚積俸祿乘時射利一切營私至有家不蓄馬弓弩不牽挽者責其禦敵之效其可得乎至如土兵最是得力寶元中籍民充弓手尋刺為保捷等軍當時公私損費不知紀極既而分配指揮訓練已成倫序西事既平逃亡死損更不添填今所存無幾少者皆五十餘嵗即日㨂擇殆盡則二十餘年蓄養訓練之功一旦廢棄良可惜也至如四路帥臣且以涇原一路言之地最平衍賊馬出入正當奔衝控守尤難康定中纍戰大敗皆在此路施昌言昏老且病當此重寄如倚長城得為之安乎臣愚嘗思之今邉鄙無事正是可為之際宜早擘畫亦有以為待寇之備臣欲乞朝廷選差諳邊事朝臣一兩員别作名目密與轉運使一員同共體量四路如果有宿弊無憚更張應自來生户遷入漢界住者並依熟戶例摽撥田土明行給授置簿拘管分立頭項俾人員領轄所有舊來熟户亦將元人㸃檢內或有生戶溷雜久居今來不以新舊人重編排等級增置人員立定帳籍所貴應急可以㸃集其弓箭手只㸃檢元籍闕額人數令逐旋招收補填所有備邉堡寨使臣盡令閲試弓馬相度人才不至怯懦可以被驅使者俾之久任若不稱職者委所差官于近裏州軍使臣內選㨂對換應是土兵只擇其子弟驍勇有武藝者不以等級為限許壯者得以代其老弱其利相萬也四路帥臣乞選揀才略公忠之人或文或武不限官職如得其人使之久任此數事臣愚自謂之便又非創新擘畫並是祖宗舊規但痛惜其隳廢敢覬陛下留神省察與大臣確論以臣言是當遂施行不宜稽緩以臣言非亦乞宸𠂻記録異日當驗所以乞差官體量者緣久隳之事皆是邉臣茍安三二年間更替而去養成深弊上下固護不欲朝廷聞知若只降詔命令逐處修飭武備終無實事與不行均矣惟聖聰採納嘉祐五年上時為殿中侍御史上英宗乞戒邉城濶略細故司馬光臣聞明主謀事于始而慮患于微是以用力不勞而收功甚大切見國家所以禦戎狄之道似未盡其宜當其安靖附順之時則好與之計校末節爭競細故及其桀傲暴橫之後則又從而姑息不能深討是使戎狄益有輕中國之心皆厭于柔服而樂為背叛近者西戎之禍生于髙宣北狄之隙起于趙滋而朝廷至今終未省悟尤以二人所為為是而以循理守分者為非是以邉鄙武臣皆鋭意而生事或以開展荒弃之地十數里為功勞或以殺略老弱之虜三五人為勇敢朝廷稱其才能驟加擢用既而虜心忿恨遂來報復屠翦熟户抄劫邉民所喪失者動以千計而朝廷但知驚駭增兵聚糧其致寇之人既不追究而守邉之臣亦無譴責如此而望戎狄賓伏疆場無虞是猶添薪扇火而求湯之不沸也臣愚切惟真宗皇帝親與契丹約為兄弟仁宗皇帝赦趙元昊背叛之罪冊為國主嵗損百萬之財分遺二虜豈樂此而為之哉誠以屈已之愧小愛民之仁大故也今陛下嗣已成之業守已安之基而執事之臣數以爭桑之忿心不思灌瓜之大計使邉鄙之患紛紛不息切為陛下惜之近者聞契丹之民有于界河捕魚及于白溝之南剪伐栁栽者此乃邉鄙小事何足介意而朝廷以前知雄州李中祐不能禁禦為不才别選州將以代之臣恐新將之至必以中祐為戒而以趙滋為法妄殺虜民戰鬭之端往來無窮矣况今民力凋弊倉庫虛竭將帥乏人士卒不練夏國既有憤怨屢來侵寇禍胎已成若又加以契丹失歡臣恐國力未易支也伏望陛下嚴戒北邉將吏若契丹不循常例小小相侵如魚船栁栽之類止可以文諜整㑹道理曉諭使官司自行禁約不可輕以矢刃相加若再三曉諭不聽則聞於朝廷雖專遣使臣至其王廷與之辨論曲直亦無傷也若又不聽則莫若博求賢才增修德政俟公私冨足士馬精强然後奉辭以討之可以驅穹廬於漠北復漢唐之土宇與其爭漁栁之勝負不亦逺哉治平二年六月上時為天章閣待制知諫院上英宗乞留意邊事司馬光臣切見近年以來趙諒祚雖外遣使人稱臣奉貢而內蓄姦謀窺伺邉境隂以官爵金帛招誘中國不逞之人熟户蕃部聞其亡命叛去及與潜交通者已為不少而朝廷不能一一盡知也其熟户蕃部有違拒不從者諒祚輒發兵馬公行殺掠弓箭手有住在㳂邉者諒祚皆逼逐使入界將帥之臣但坐而視不能救援遂使其餘熟户皆畏憚凶威怨憤中國人人各有離叛之心及朝廷遣使賫詔責問諒祚拒而不納縱有所答皆侮慢欺冒之辭朝廷亦隱忍含容不復致詰諒祚又數揚虛聲以驚動邉鄙而將帥之臣率多懦怯别無才謀以折衝禦侮只多聚兵馬以自衛其身一路有警三路皆聳盡抽腹內州軍下畨兵士置在麾下使之虛食糧草數月之後寂無影響然後遣還未及休息忽聞有警又復抽去如此往還疲於道路訖無一事曽有施為臣雖愚駑不習邉事切以私意料之諒祚所以依舊遣使稱臣奉貢者一則利於每嵗所賜金帛二十餘萬二則利於入京販易三則欲朝廷不為之備也其所以招誘不逞之人者欲以采訪中國虛實之事平居則用為謀主入寇則用為鄉導也其所誘脅熟戶迫逐弓箭手者其意以為東方客軍皆不足畏唯熟户弓箭手生長極邉勇悍善鬬若先事剪去則邉人失其所恃入寇之時通行無礙也所以數揚虛聲驚動邉鄙者欲使中國之兵疲於奔命耗散儲蓄公私貧困既而邉吏習以為常不復設備然後乘虛入寇也凡此事若不早為之慮使姦謀得成切恐其為國家之患不可量也臣謂朝廷宜宵衣旰食以為深憂而但見其遣使奉貢即以為臣節未虧得其侮玩之語以為恭順得其欺謾之語以為誠實蓋朝廷非不知其本心欲其未發止求目前之暫安不顧異時之深患臣日夜思之不勝憤悒何戎狄為謀之深而中國慮事之淺也臣愚伏望陛下於邉鄙之事常留聖心特降詔書明諭中外應文武臣僚有久厯邉任或曽經戰陳知軍中利害及戎狄情僞者並許上書自言陛下勿以其人官職之踈賤及文辭之鄙惡一一略加省覽擇其道理稍長者皆賜召對從容訪問以即日治兵禦戎之䇿何得何失如何處置即得其宜若其言有可取者即為施行仍記録其姓名置于左右然後選其中勇略殊衆者擢為將帥若能稱職有功則勸之以爵賞昏懦敗事則威之以刑誅加以選練士卒留精去冗申明階級之法抑揚驕惰之氣誠能如此行之不懈數年之後俟將帥得人士卒用命然後惟陛下之所為雖北取幽薊西取銀夏恢復漢唐之疆土亦不足為難况但守今日之封略制戎狄之侵侮豈不沛然有餘裕哉治平二年十一月上時為龍圖閣直學士上英宗論西邊可攻四事歐陽修臣伏見諒祚狂僣釁隙已多不越嵗必為邉患臣本庸愚不達時機輒以外料敵情內量事勢鑒往年已驗之失思今日可用之謀雖兵不先言俟見形而應變然坐而制勝亦大計之可圖謹具條陳庶禆萬一臣所謂外料敵情者諒祚世有夏州自彛興克睿以前止於一鎮五州而已太宗皇帝時繼捧繼遷始為邉患其後遂陷靈鹽盡有朔方之地蓋自淳化咸平用兵十五餘年既不能剪滅遂務招懷適㑹繼遷為潘羅支所殺其子德明乃議歸欵而我唯以恩信復其王封歲時俸賜極於優厚德明既無南顧之憂而其子元昊亦壯遂併力西攻回紇拓地千餘里德明既死地大兵强元昊遂復背叛國家自寶元慶歷以後一方用兵天下騷動國虛民弊如此數年元昊知我有厭兵之患遂復議和而國家待之恩禮又異於前矣號為國主僅得其稱臣嵗豫之物百倍德明之時半於契丹之數今者諒祚雖曰狂童然而習見其家世所為蓋繼遷一叛而復王封元昊再叛而為國主今若又叛其志可知是其欲自比契丹抗衡中國以為鼎峙之勢爾此臣切料敵情在此也夫所謂內量事勢者蓋以慶厯用兵之時視方今邉備較彼我之虛實强弱以見勝敗之形也自真宗景德二年盟北狄於澶淵明年始納西夏之欵遂務休兵至寶元初元昊復叛蓋三十餘年上下安于無事武備廢而不修廟堂無謀臣邉鄙無勇將將愚不識干戈兵驕不知戰陳器械朽腐城郭隳頽而元昊勇鷙桀黠之虜也其包蓄奸謀欲窺中國者纍年矣而我方恬然不以為慮待其謀成兵具一日反書來上然後茫然不知所措中外震駭舉動蒼惶所以用兵之初有敗而無勝也既而朝廷用韓琦范仲淹等付以西事竭力經營而勇夫鋭將亦因戰陳稍稍而出數年之間人謀漸得武備漸修似可枝梧矣然天下已困所以屈意忍耻復與之和此慶厯之事爾今則不然方今甲兵雖未精利不若往年之腐朽也城壘粗嘗修緝不若往年之墮頺也土兵藩落增添訓練不若往年寡弱之驕軍也大小將校曾經戰陳者往往尚在不若往年魏昭炳夏隨之徒膏梁子弟也一二執政之臣皆當時宣力者其留心西事熟矣不若往年大臣茫然不知所措者也蓋往年以不知邉事之謀臣馭不識干戈之將用驕兵執朽器以當桀黠新興之虜此所以敗也方今謀臣武將城壁器械不類往年而諒祚狂童不及元昊逺甚往年忽而不思今又已先覺可以早為之備茍其不叛則已若其果叛未必不為中國利也臣謂可因此時雪前耻收後功但顧人謀如何爾若上慿陛下神威睿算係纍諒祚君臣獻于廟社此其上也其次逐狂虜于黃河之北以復朔方故地最下盡取山界奪其險而我守之以永絶邉患此臣內量事勢謂或如此臣所謂鑒往年已驗之失者其小失非一不可悉數臣請言其大者夫夷狄變詐兵交陳合彼佯敗以為誘我我貪而追之或不虞橫出而為其所邀或進陷死地而困于束手此前日屢敗之戒今明習兵戰者亦能知之此雖小事也亦不可忽所謂大計之繆者攻守之策皆失爾臣視慶歷禦邉之備東起麟府西盡秦隴地長二千餘里分為路者五而分為州為軍者二十有四而軍州分為寨為堡為城者又幾二百皆須列兵而守之故吾兵雖衆不得不分所分既多不得不寡而賊之出也常舉其國衆合聚為一而來是吾兵雖多分而為寡彼衆雖寡聚之為多以彼之多擊吾之寡不得不敗也此城寨之法既不足自守矣而五路大將軍所謂戰兵者分在二十四州軍欲合而出則懼後空而無備欲各留守備而合其餘則數少不足以出攻此當時所以用兵纍年終不能一出者以此也夫進不能出攻退不能自守是謂攻守皆無策者往年已驗之失也臣所謂可用之謀者在定出攻之計爾必用先起制人之術乃可以取勝也蓋列兵分地而守敵得時出而撓於其間使我處處為備常如敵至師老糧匱我勞彼逸昔周世宗以此策困李景于淮南昨元昊亦用此策以困我之西鄙夫兵分備寡兵家之大害也其害常在我以逸代勞兵家之大利也其利常在彼所以往年賊常得志今誠能反其事而移我所害者豫敵奪敵所利者在我則我當先為出攻之計使疲于守禦則我亦得志凡出攻之兵勿為大舉我每一出彼必呼集而來拒彼集於東則别出其西我歸彼散則我復出而又集我以五路之兵畨休出入使其一國之衆聚散奔走無時暫停則無不困之虜矣此臣所謂方今可用之謀也蓋往年之失在守方今之利在攻昔至道中亦嘗五路出攻矣當時將相為謀不密蓋欲攻黠虜方强之國不先以謀困之而直為一戰必取之計大舉深入所以不能成功也夫用兵難事也故謀既審矣則其發也果故能動而有成功也凡用兵之形勢有可先知者有不可先言者臣願陛下遣一重臣出而巡撫遍見諸將與熟圖之以定大計凡山川道路蕃漢步騎出入所宜可先知者悉圖上方略其餘不可先言付之將帥使其見形應變因敵制勝至於諒祚之所為宜先屈意含容而曲就之既以驕其心亦少緩其事以待吾之為備而且嚴戒五路訓兵選將利器甲蓄資糧常具軍行之計待其反書朝奏則王師暮出以駭其心而奪其氣使其枝梧不暇則勝勢在我矣往年議者亦欲招輯橫山蕃部謀取山界之地然臣謂必欲招之亦須先藉勝捷之威使其知中國之强則方肯來附也由是言之亦以出攻為利矣凡臣之言者大略如此然臣足未嘗踐邉郵目未嘗識戰陳以一儒生偏見之言誠知未可必用直以方當陛下勞心西事廣詢衆議之時思竭愚慮備芻蕘之一說耳治平二年正月上時為恭知政事上神宗論納橫山非便司馬光臣聞王者之於夷狄或懷之以德或震之以威要在使之不犯邉境中國獲安則善矣不以踰葱嶺誅大宛絶沙漠擒頡利然後為快也竊聞有邉臣言趙諒祚部將清諾爾和斯欲以橫山之衆攻取諒祚歸命聖德朝廷已有指揮許令招納臣近者雖曾論列以為非宜尚懼語言踈略未盡本末不敢不再為陛下陳之今進謀者但言其利不言其害臣請試言其害雖逆盛意願陛下勿遽加弃置略賜省覽與進謀者參校其是非臣聞戎狄之俗自為兒童則習騎射父子兄弟相與羣處未嘗講仁義禮樂之言也唯以詐謀攻戰相尚而已故其民習於用兵善忍饑渴能受辛苦樂鬬死而耻病終此中國之民所不能為也是以聖王與之校德則有天地之殊與之校力則未能保其必勝也以舜禹之明征三苖而三旬逆命商髙宗之賢伐鬼方而三年乃克漢髙祖之雄傑為冒頓所圍七日不火食國朝以太宗之英武北舉河東南取閩浙若拾地芥加之猛將如雲謀臣如雨天下新平民未忘戰當是之時繼遷背叛太宗以鄭文寶為陜西轉運使用其計䇿假之威權以討之十有餘年卒不能克發關中之民飛芻挽粟以饋靈州及清逺軍為敵所抄掠及經沙磧饑渴死者十七八白骨蔽野號哭滿道長老至今言之猶歔欷酸鼻及真宗即位㑹繼遷為潘羅支所殺真宗因洗滌其罪弔撫其孤賜節鉞使長不毛之地訖于天聖明道四十餘年為不侵不叛之臣關中户口滋息農桑豐富由是觀之征伐之與懷柔利害易見矣及元昊背恩國家發兵調賦以供邉役關中既竭延及四方東自海岱南踰江淮占籍之民無不蕭然苦于科斂自其始叛以至納欵才五年耳天下困弊至今未復仁宗屈己賜以誓誥冊為國主嵗與之物凡二十五萬豈以其罪不足誅而功可賞哉計不得已也向者諒祚雖時有偃蹇禮節不備或誘掠熟户驚擾邉民然猶稱臣奉貢未敢顯然自絶也今乃誘其叛臣以圗之縱使誠梟諒祚之首復靈夏之土以王者之兵言之猶可恥也况其成敗未可知乎臣恐邉事之興生民之苦由此而始也王者之於諸侯叛則討之服則撫之是以諸侯懷德畏討莫不率從去嵗諒祚攻大順城殺掠吏民今春朝貢之使不以時至當是時不能討也今朝廷既赦其罪與其賜物受其使者納其貢獻又從而誘其叛臣激其忿心是常欲其叛而不欲其服也信義賞罰將安在乎議者或以為彼誘我民我誘彼臣何為不可是特閭閻小人之語非知國家大體者也彼僻陋小羌竊誘我民以益其衆乃欲以天子億兆之富而效其所為邪譬如鄰人竊己之財己以正議責之可也豈可復竊彼之財以相報邪臣聞諒祚隂蓄姦謀為日固久招納不逞之人以為謀主誘脅熟戶以撤中國之藩籬常有據關中窺河東之心雖未必能然若縱其毒蠚亦足以為亭鄣之患未可以小種之羌孱弱之人待之也國家不幸比遭大憂帑藏空虛關中之民自經西事以來仍苦鐵錢財力凋弊熟戶屢經殺掠亡失大半縱其在者亦懷二心非復得如景祐寶元之時也當此際陛下深詔邉吏崇信誓保分界嚴守備明斥堠以待之猶懼諒祚狼子野心不識恩義乘我釁隙侵噬疆場又况彼不動而擾之不求而召之乎臣又聞虜中間諜所在甚多中國動靜毫髮皆知其和斯自程戡在鄜延時已有聲聞云欲歸降自是至今已經數年朝廷屢召邉臣與之謀議外人往往知之亦有邸吏傳報四方安有虜中獨不覺悟寂然無事曽無誅討之意乎臣切疑其內挾詐謀未可信也或者諒祚久懷逆計以朝廷待之恩禮優厚無因而發故遣其部將詐降以卜之若朝廷受之則將歸曲而責直得以為背叛之名或者使其部將詐言勢孤力微不能獨制諒祚乞朝廷遣將出師為助而隂設伏兵以徼大利此二者皆未可知也若萬一有之則今日受之正墮其計中矣縱使和斯實有降心蓋亦私有忿恨或别負罪惡反側不安欲倚大國之威以逼其上其所部之民未必肯盡從也雖其自言權勢之彊甲兵之盛有謀善戰為民所附蓋欲自誇以求售耳未必然也借令實能舉兵以與諒祚為敵戰而勝之則是滅一諒祚生一諒祚也若其不勝必引其餘衆南奔中國諒祚悉其境內之兵以追之怒氣直辭長驅入塞當是之時非口舌文移所能解也臣恐朝廷不惟失信於諒祚又將失信於和斯也若和斯餘衆無幾猶可以縛而送之以緩諒祚之兵然形迹已露諒祚必叛無疑也若和斯餘衆尚多還北不可入南不受窮無所歸必不肯如山遇束手就死將突據邉城以救其命更為中國之患未有涯也陛下不見侯景之事乎臣聞羽翼未成不可以髙飛近者未恱不可以來逺自堯舜禹湯文武之王下至齊桓晉文之霸未有不先治其內而能治于外者也故孔子曰善人教民七年亦可以即戎矣又曰以不教民戰是謂棄之今陛下新即大位尚未逾年朝廷之政未盡修也封域之中未盡治也內郡無一年之蓄左帑無纍月之財民間貧困十室九空小有水旱即化為流殍承平日久戎事不講將帥乏人士卒驕惰上下姑息有同兒戲教閲稍頻則愠懟怨戾賜與不時則揚言不遜被甲行數十里則喘汗不進遇鄉邑小盜則望塵奔潰此乃衆人所共知非臣敢為欺罔兵法曰知彼知已百戰不殆知彼不知已一勝一負不知彼不知已每戰必殆陛下視今天下如此而欲謀境外之事起兵革之端挑陸梁之虜冀難立之功此臣所為寒心者也為今日之計莫如收拔賢俊隨才受任以舉百職有功必賞有罪必罰以修庶政謹擇監司澄清守令以安百姓屏絶浮費沙汰冗食以實倉庫詢訪智略察驗武勇以選將帥申明階級剪戮桀黠以立軍法料簡驍鋭罷去羸老以練士卒修整犀利變更苦窳以精器械俟百職既舉庶政既修百姓既安倉庫既實將帥既選軍法既立士卒既練器械既精然後惟陛下之所欲為復靈夏取瓜沙平幽薊收蔚朔無不可也今八者未有其一而欲納邉吏之狂謀信黠寇之詭辭臣恐不能得其降者數百而敵騎大至覆軍殺將邉城晝閉朝廷乃為之宵衣旰食焦心勞思興兵運財以救其急使天下愁困如康定慶厯之時已而卒無可奈何然後忍耻以招之卑辭以諭之尊其名以悅之增其賂以求之其為損也不亦多乎斯乃國之大事安危所係非特邉境之憂而已願陛下深留聖思勿為後悔乃天下之福也彼進謀者皆非實為國家斬將搴旗拓土闢境建衛霍甘陳之功也但以利口長舌虛辭大言一時誑惑聖聰欲盜陛下之官職耳他日國家有患不預其憂是豈可哉凡邉境有事則將帥遷官士卒受賞無事則上下寂寂無因徼幸此乃人臣之利非國之利陛下不可不察也冶平四年九月上時權御史中丞先是六月知青澗城种諤奏諒祚纍年用兵人心擕二橫山首嶺嵬名山結綏銀州人數萬共謀歸順乞朝廷早令向化陕西轉運使薛向主之時髙遵裕使夏州還亦言招納之利上召經略司掌機宜文字張穆之問穆之為薛向所諜遂言諤謀必可成七月詔下諤奏付知延州陸詵及向諤密議措置以聞詵等共畫三䇿使名山直取諒祚不能取則守其地以拒之最下乃退保兩界不耕地詔使髙遵裕宣密㫖欲諤依詵等所上䇿未嘗許其發兵深入諤于是遣諜者與名山約日㑹綏城不復告詵十月諤悉發所部兵與折繼世會于保寧寨庚申諤入綏州遂興版築壬戌繼世入銀州嵬名山部其族帳悉降陸詵得諤狀大驚即劾諤擅興而薛向力主諤具奏云實遣諤為此綏州既城議者以為孤城深寄賊境難守不如棄之諤獨謂此厄三大川口虜人號曰李主心古曰上郡言其地形髙下視諸郡也不可棄請乘勢大舉盡復河南陳五可取之䇿朝廷後用韓琦議卒存綏州也上神宗論种諤擅入西界鄭獬臣伏見十月二十四日召兩府大臣入議外言切皆傳种諤已提兵入據綏州橫山豪酋挈族內附審如是是豈朝廷之福耶聚謀纍日䇿將安出事雖隱祕不漏針芒然趣賈逵竇舜卿就道以母沆為轉運使發京師兵及銀數十萬兩備芻餉出錦袍銀帶賜降者觀此則殆將兩持首尾未有決然判安危之至䇿也臣前言不可納橫山及見手詔以諒祚順向深戒邉臣無得生事臣以為信今乃知朝廷外示綏靜內包隂計兹豈帝王之大略哉尊用變詐之士務為掩襲之謀乃戰國强暴之君所為也况陛下初履天位猶處諒暗宜念祖宗䝉成太平之業以淵靜鎮海內仁澤結民心不及慮此而過聽一二邪臣之說欲以竒譎幸邉功此天下盡知其不可而陛下獨以為可冒而行之聞者莫不寒心然种諤之奪綏州若不奉陛下之風指安敢一日不俟上報徑驅數千卒直搗虜境乎不然則擅興有罪陛下何為而不行誅夫中國以信義撫四夷既約束邉臣無得生事詔墨未乾而奪其地信義俱棄其曲在我彼將嫚辭以請罪則朝廷何以報之如彼懷不順袵氊裘而犯邉我不得已而起應之則士卒雖肝腦塗野而不辭蓋舉天下之怨在彼也今無故而先擾之彼將率其犬羊之衆而來爭則士卒有旅拒躊躇而不行者矣蓋舉天下之怨在我也豈唯士卒之不樂哉府庫之空乏此四海所共患千金之費不給則必賦諸民則將見隳産壞家棄父母鬻妻子供軍餉者矣萬一有姦雄之徒窺隙而乘之嘯為盜賊小則剽屋廬大則跨郡縣於此之時潰爛而不救則於社稷生靈得無有負乎事有謀小而妨大者正為此也而种諤不顧國家始末之大計乃欲以一螻蟻之命以天下為兒戲茍貪微功以邀富貴此正天下之姦賊若不誅之則無以厲其餘臣以為陛下必欲逆折禍亂之機牙使不為異日之悔則莫若下詔聲諤之罪誅於塞下及薛向髙遵裕楊定張穆之等皆付有司次第以治其罪然後遣一介之使持手詔還諒祚以綏州及橫山之降民遂明告以諤等生事已次第伏罪則彼又將何求於我如此則顯示中國履信之美而復收夷狄向化之心無遺鏃折㦸之費而事立解矣如有言者希望尤以為不然此皆非忠臣豈敢以犬馬之餘生而保天下之事乎臣以為太白經天四方地震皆為兵象切恐兵禍起於橫山之議今見其端矣無使臣言之驗則朝廷之福也伏望陛下上觀天戒下察人事以宗廟社稷為念以四海生靈為意無令天下無罪之民為姦臣所誤今誅一姦臣而天下定其利害較然可見陛下決意行之無疑臣不勝區區之懇治平四年十一月上時為翰林學士宋名臣奏議卷一百三十六
