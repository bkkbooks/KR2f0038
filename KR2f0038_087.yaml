body:
  text: 宋名臣奏議巻八十七宋趙汝愚編禮樂門宗廟上上仁宗乞親行祫饗大禮富弼臣謹按天地宗廟社稷皆為大祀自古天子親祠之其間尊與親兼之者惟廟焉國朝崇奉祭祀嚴而不瀆毎三歳天子必親行南郊之祀其於事天之道可謂得禮獨於宗廟祇遣大臣攝行時享而已親祀未講誠為闕典檢㑹今年冬至當有事於南郊又孟冬亦當合饗於太廟禮曰三年一祫祫為大祭所以合羣廟之主於祖宗而祭之自來亦祇遣近臣攝行今欲望詔有司講求祫祭大禮将來聖駕有事於太廟庶乎國家事天事親之道兩得其宜所有降赦推恩則並用南郊故事嘉祐四年上時為平章事祫享大禮使上神宗議僖祖祧遷王安石臣等聞萬物本乎天人本乎祖故先王廟祀之制有疏而無絶有逺而無遺商周之王斷自稷契以下者非絶嚳以上遺之以其自有本統承之故也若夫尊卑之位先後之序則子孫雖齊聖有功不得以加其祖考天下萬世之通道也竊以本朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今毁其廟而藏其主夾室替祖考之尊而下附於子孫殆非所以順祖宗之孝心事亡如事存之義求之前載雖或有然考合於經乃無成憲因情制禮實在聖時伏惟皇帝陛下仁孝聰明紹天稽古動容周旋惟道之從宗祀重事所宜博考乞以臣等所奏付之兩制詳議而擇取其當熈寜五年三月八日上時為平章事治平四年閏三月敕遷僖祖廟主藏之夾室至是安石建此議詔答曰廟祧之事蓋有典彛所以上承先王下法後世朕嗣宅大統獲奉宗祀而世次遷毁禮或未安討論經常屬我哲輔於以佐朕不逮而仰稱祖宗追孝之心朕覽之矍然敢不祗服宜依所請施行詔學士院集兩制議上神宗議僖祖祧遷韓維臣伏以親親之序以三為五以五為九上殺下殺旁殺而親畢聖人制事存送終之禮皆以此為限是衆人之所同也若其不與衆人同者則又因事之宜斷之以義而為之節文也昔先王既有天下迹基業之所由起奉以為太祖所以推功美重本始也蓋王者之祖有繫天下者矣諸侯之祖有繫一國者矣大夫士之祖繫其宗而止矣亦其理勢然也荀卿曰王者天太祖諸侯不敢懷大夫士有常宗所以别貴始貴始徳之本也若益有天下之始若后稷有一國之始若周公大夫士之始所以貴以配天地不祧也有常宗也此其所以别也今直以契稷為本統之祖是下同大夫士之禮非荀卿之所謂别也或曰湯文武去契稷皆十餘世其間子孫衰微奔竄者非一湯文武之有天下契稷何與哉而南宫适曰禹稷躬稼而有天下孔子曰君子哉若人禹之有天下則然矣稷契諸侯也而曰有天下何哉豈非積累功德至文王而興乎孟子曰王不待大湯以七十里文王以百里然則小國者亦王之所待也所謂七十里者非契稷所受以遺其子孫之國乎由是言之商周所以興契稷不為無所與也則正考父作頌追道契湯髙宗商所以興子夏序詩稱文武之功起於后稷豈虗語也哉國語亦曰契勤商十有四世而興后稷勤周十有五世而興穀梁曰始封必為祖南宫适孟軻卜子夏丘明穀梁赤生於周代其所言皆親聞而見之者其學問又俱出於孔子宜若可信則尊始祖以其功之所起秦漢諸儒亦有所受之也後世有天下者皆特起無所因故遂為太祖所從來久矣伏惟太祖皇帝孝友仁聖睿智神武兵不血刃坐清大亂子孫遵業萬世䝉澤功徳卓然為宋太祖無少議者僖祖雖於太祖髙祖也然仰迹功業未見其有所因上尋世系又不知所以始若以所事契稷奉之切恐於古無考而於今有所未安也臣以為均之論議未有以相奪莫如仍舊便若夫藏主合食則厯代嘗議之矣然今之廟堂室與古殊制古者毎廟異宫今所以奉祖宗者皆在一堂之上西夾室猶處順祖之右考之尊卑之次似亦無嫌至於禘祫自是序昭穆之際僖祖東饗禮無不順所謂雖齊聖不先父食者也孔子曰於其所不知蓋闕如也如臣絳等議非臣所知此臣所以闕而不敢同也熈寜五年四月上時為翰林學士絳元議以為商周所以祖契稷者尊祖而巳非敢以有功與旡功而冇重輕也先儒適見契稷有功於陶唐夏商之際遨以為祖有功祖必有功則夏后氏獨可以郊鯀乎今僖祖之主有功於太祖之室則是僖祖與順祖宣祖祫祭之時皆可㑹布合食也情文不順無甚於此謂宜存僖祖合於先王之禮意絳議乃曽布之文也上神宗議僖祖祧遷孫固臣聞先王之禮本之人情而為之節文者也故不慕古而違時措之宜不因文而失㳂情之實親有踈戚世有同異此禮之所以損益變正之不一也伏惟太祖皇帝受天命一四海創業垂統為宋立萬世無窮之基其為宋始祖而配天受饗理在不疑今聞廼欲以僖祖為始封之祖復其祧主夫既以僖祖為始祖則遂當受東嚮配天之享此臣切所以未安也七世之廟親盡而祧此萬世大公之通法未聞有以易之者也故僖祖之主於陛下世以親盡而祧在禮適為得正而今議者以謂人必本乎祖太祖既已追尊僖祖則今日當以僖祖為本始之祖是未推夫王者興起有殊異而所當之世各不同也夫開國者先嘗有功而受封則後之子孫有天下而推以為始祖可矣若未膺受天命特起而得天下者為太祖亦宜矣此實先王之禮人情之所順而前世之所已行也今為議者乃鄙絶漢唐之所行而純取三代之制以為法故有僖祖之廟與契稷無異之説臣竊以為過矣夫本朝之興與商周異商周之王本由契稷故自湯武而上其流有源皆可推而考之契布五教民以知禮其統緒畧與周同而猶不若周之懿也周自后稷公劉以來教化流行以至太王王季世世修德益茂迨於文武受命奄有天下則源流之來豈無所自哉仲尼曰郊祀后稷以配天宗祀文王於明堂以配上帝則周公其人也夫周而上堯舜禹湯之世非不美也其祭之禮仲尼不談而獨舉周者豈非其德與世獨為備哉故曰周公其人也言惟周公能備此禮爾夫稷當堯民阻飢之時始播百穀使萬世粒食其為功大矣詩曰思文后稷克配彼天言以其德能配天也夫以文王之德而不得預配天之祭者特以后稷之功大爾使周無后稷之祖則周公之祀宜不得舎文武而他及且後世之興其先既無周之后稷而郊天之配不先創業之君乃逺取追尊之祖此豈先王之禮而近於人情者哉今之議者又以祭法禘郊祖宗之禮言商周非絶嚳以其自有本統承之本朝自僖祖以上世次不可得知則必以僖祖為始祖臣又以謂不然矣自秦滅學六經皆被焚棄不復為全書而禮經尤為殘蕩其後漢之諸儒髣髴聖人之餘委曲加意而編綴之故多駁雜不經之説附以鄭康成牽合之言而聖人之意益不明若祭法之禘郊宗祖者是其一矣其言曰商人禘嚳而郊㝠祖契而宗湯信斯言也則禘祭冝無易嚳者今商頌之長發大禘之詩也其曰有娀方将帝立子生商又曰𤣥王桓撥受小國是逹受大國是逹者廼專歌述契之功德一篇之間了無及嚳之語則祭法之言禘嚳者臣亦未敢取以為信也雖然就其説而考之亦自非大有功德者不可以郊天取配何則鯀障洪水雖疏導失宜而禹因之以成功身被殛死故夏人郊之冥業其官而死於水故商人郊之后稷粒食之功被於萬世故周人郊之今未見㝠稷之功而欲同冥稷之祀臣竊以為非宜也漢髙之得天下與商周異故太上皇不得為始封而光武之興不敢尊舂陵而祖髙帝且景帝唐室始封之君而元皇帝乃神堯之父髙祖之時以景皇帝為配而太宗之初已奉髙祖於圜丘景皇帝不得預郊天其後杜鴻漸等復請以景皇帝郊配天地黎幹力詰其非禮而正之夫景皇帝親授唐國之封且不得配天則未嘗啟有土宇而欲以為始祖臣亦慮其難矣恭惟太祖皇帝削平禍難功格上天百餘年間天下之人涵泳生養而安樂於無事者太祖之恩徳也今天下惟知尊奉太祖而廼欲替其親郊配天之祀豈厭於人情哉今議者遂将斥絶唐漢上法商周此臣所謂慕古而違當世之宜者也太祖皇帝受周禪僖祖始被追尊而建隆之郊配以宣祖僖祖不得預焉夫以太宗真宗仁宗英宗之世未嘗郊配僖祖而陛下一日隆而祀之蓋有所隆者未有所替今使太祖之禮有替於四宗之時此豈孝思之心哉此臣所謂因文而失沿情之實者也夫非所居而祀之則神有所不受非所宜而配之則天有所不饗所謂郊而配天者以天於萬物其德不可形容故人君之大有功徳被生靈而施後世者謂足以配之而已今僖祖之徳不昭見於生民不明被於後世廼欲以齊后稷之廟當始祖之禮臣恐僖祖之神非所居而不受上帝之靈非所配而不饗非陛下所以尊祖事天之意也陛下為太祖子孫繼太祖基業據南面之尊而饗四海九州之奉皆太祖皇帝之所授也則今日之所尊事宜莫加於太祖矣或曰禮别子為祖契稷皆帝嚳之子而得姓者故商周以為祖而奉之今宋自僖祖為始祖臣曰是又不然也若以得姓者為祖則趙之得姓逺矣自造父封於趙城而趙衰始得姓今若必欲推考其先世則遂欲上祖趙衰其可乎其不可明矣或又曰今朝廷欲存僖祖為始祖爾至於祀天為配亦不輕議也臣曰是不可也今既以僖祖為始祖是必配天僖祖配天則太祖之祀替矣此臣以為不可者也或又曰今毁僖祖之廟藏其主夾室而下附子孫可乎臣曰是又一堂夾室在西祧主臧室中而居順祖之右固已順矣蓋非所謂下附子孫之室而替其尊也必猶以為不可者臣今欲乞特為僖祖立室置祧主其中由太祖而上親盡迭毁之主皆藏於僖祖之室當禘祫之時以僖祖之主權居東向之位太祖之主順昭穆之列而從之取其毁廟之主而合食焉則僖祖之尊自有所伸此韓愈所謂祖以孫尊孫以祖屈之義也以僖祖立廟為非則周人别廟以祀姜嫄不可謂非禮今以陛下之時因情立禮取聖人之制為萬世法不亦美歟事與商周有殊禮文從而亦異此臣所謂先王之禮本人情而損益變正之不同者也如曰不然臣恐違古今之義逆天人之情而天地祖宗之神靈有所不饗也伏惟陛下聰明仁孝以宗廟重事恐其於禮有所乖違故令下兩制臣寮議陛下茍以臣言為可用伏乞裁自聖斷如或猶以為疑乞送禮院叅詳臣竊惟宗廟祧配朝廷大禮反覆思慮於心有所未安不敢茍立異説伏望陛下力加採納熈寜五年四月上時為天章閣待制上神宗議僖祖祧遷張師顔臣等伏以天下大禮莫重於宗廟崇孝事神以臨照四海是以聖王重之必務極其至當伏惟僖祖神主祧藏夾室於禮不順有司失之矣冝其輔臣建立明詔訪逮而垂為萬世法然議者因其藏主有失遂欲推為始祖臣等敢以此為議昔者商周之興本於契稷考諸前載其指有二曰因其始封也䝉其功德也契有大功始受封國十有餘世世祀不失至湯而有天下修其世祀因其封國舉天下之大而謂之商者由契以致之也稷有大功始受封國十有餘世世祀不失至武王而有天下修其世祀因其封國舉天下之大而謂之周者由稷以致之也然則契稷為商周之祖其傳已久其禮素定後世固無得而易之矣奉之為太祖以主廟祀有以盡一時之宜也詩之長發言商家興廢之乆歴夏之世其來長逺昊天有成命言后稷巳有王命生民思文皆歌后稷之功傳稱禹稷躬稼而有天下不可謂為祖不因功德也後世受命之君功業特起不同先代則親廟迭毁身自為祖鄭康成云夏五廟無太祖自禹與二昭二穆而巳唐張薦云夏后以禹始封遂為不遷之祖是也若始封世近上有親廟則擬祖上遷而太祖不毁魏祖文帝則處士迭毁晉祖宣帝則征西迭毁唐祖景帝則洪農迭毁此前世祖其始封之君以法契稷之明例也既巳法契稷矣則上之親廟不得不毁勢當然也借使魏晉欲不祖武宣而越取處士征西不惟上推世數未知更當及於何人且其如始封何唐有天下因以為法韓愈有言事異商周禮從而變臣等取之矣要之始封世近則親廟不可不立若特以親廟及逺便為始封而抑之則前古未嘗聞也晉琅琊王徳文曰七廟之義自由徳厚流光饗祀及逺非是為太祖申尊祖之祀其説是也禮天子七廟太祖之逺近不可以必故但云三昭三穆與太祖之廟而七未嘗言親廟之首必為始祖也國家治平四年以僖祖親盡而祧之奉景祐詔書以太祖皇帝為帝者之祖自以别子之故非以有功與封國為輕重是不然也别子之法自謂公子不繼世故子孫為大夫士者祖之百世不遷非天子諸侯之禮也使湯武但為諸侯則尚不祖此别子况天下之君而可用大夫士之法乎若夫禹不先鯀則所謂子雖齊聖不先父食自以正文公之逆祀非尊祖之論也唐仲子陵所謂安知非夏后廟數未足之時而言禹不先鯀邪伏惟宋之為宋由太祖皇帝應天受命首創洪業建大號於天下異乎商周之為商周可知也僖祖雖為聖裔之先而有廟直由太祖親盡則遷合之正義今欲以有廟之始為説援而進之以為始祖臣等固疑其與契稷異矣使契稷本無功徳初不受封引以為據庶其或可若其不然臣等不得判然無疑也設欲必據此論則臣等又有可言者焉蓋三昭三穆是不刋之典一定之論也國初張昭任澈之徒不能逺推隆極之制因縁近比請建四廟遂使天子之禮同諸侯若使廟數備六則更當上推兩世而僖祖次在第三亦不可謂之始祖也若謂世次不可推則斯言也詔㫖所不著史臣所不錄厯百餘年莫知當時之實不敢以私意逆推而言也謹按建隆四年親郊崇配不及僖祖開國已來大祭虗其東向斯乃祖宗巳行之意也自祖宗巳來不以太祖之位易之今而易之恐失祖宗之意矣巍巍太祖如神如天垂祚萬世無以云報奉之以為帝者始祖於禮無不冝者或謂儀禮諸侯及其太祖天子及其始祖之所自出今謂始祖為太祖乃諸侯制也臣等以為逺祖受封子孫世襲親雖盡而廟不毁是謂諸侯及其太祖也若始封之君既以為國之祖矣後世子孫自諸侯而為天子則始祖不易理勢自然是謂天子及其始祖也若必求太微之精神靈之感謂為始祖之所自出将見遷就生説竒譎無已彌失聖人之意矣唐神龍初議云既立七廟須崇始祖而張齊賢云始祖即太祖太祖之外更無始祖此前儒講之熟矣大抵契稷不以功徳為祖無必然之論特起之君自為一代之祖無不可之理若乃藏主未順宜必改定蓋夾室者子孫廟之正也或者謂神道尚右失其㫖矣然則僖祖之主必有所歸按周禮守祧掌守先公先王之廟祧其廟則有司修除之其祧則守祧黝堊之所謂廟者后稷文武諸廟也祧者所藏先公先王之遷王也先公遷主藏於后稷之廟僖祖猶周之先公也冝有藏主之祧雖無始封逺祖上為之主而先主之祧不可以闕臣等參詳乞畧倣此制築别廟以藏之大祭之歲祀於其室太廟則依舊制虗東向之位郊配之禮仍舊無改事之宜而情之順也魏晉及唐嘗議逺廟之主矣魏鍾繇髙堂隆衞臻皆當世名儒並云處士嘗遷故景初之制三祖不毁其餘四廟親盡則遷一如后稷文武廟祧之禮晉永和中尚書議云周人之王太祖世逺故遷有所歸今晉廟宣帝為主而四祖居之是屈祖從孫也祫祭在上是代太祖也范宣謂可别築一室以居四主四主迭遷則宣帝位正矣自虞喜劉詡韋泓王松子蔡謨之徒並同其議唐陳京議請據魏晉舊制改築别廟以藏憲懿栁冕王詔等七十餘人亦同其説雖卒藏於興聖然本無異於别室也惟顔真卿引蔡謨權東向之一句而不本其改築之議獲譏於時此前世之論皆有考據本於經意不敢謂後世之史而一切黜之也記曰禮雖先王未之有可以義起又曰亡於禮者之禮况有前人商榷盡理之論乎或曰夾室非便當為别廟則既正其大節矣合食要皆孝饗之道但以於屬既尊不可寘昭穆之列依准前代祭之别廟得禮之變復何嫌哉云不可分食當合於太廟不惟永虗東向且使下從子孫孰為得失是則僖祖别藏列聖不動神靈安妥情文皆得其於義也合矣恭惟陛下仁孝天成尊事宗廟古之盛王所不逮也臣等學術淺陋討論非長徒能述遵朝廷正失之意别白議者未通之論冀以稱上聖因情制禮之道焉惟陛下幸留神詳擇熈寜五年四月上時同判太常寺與張公裕梁燾同状至是安石總衆議而論之曰竊以聖王議禮固有因循至於逆順之大倫孰敢違義而變古今或以夾室在右謂於宗祏為尊或以本統所承措之别宫為當𩔖皆違經背禮臣等所不敢知於是遂奉僖祖為太廟始祖宋名臣奏議巻八十七
