body:
  text: 宋名臣奏議卷一百四宋趙汝愚編財賦門稅賦上真宗論江南二稅外㳂征錢物陳靖臣聞為國之本重乎蒸黎致理之先存乎教化蒸黎泰而國祚永教化行而理道昌前古哲王光宅天下未有不由是而能君兆庶保宗祧享奕世綿綿無疆之休也然則蒸黎之所以泰者必在衣給食足賦均斂平使安得其居樂得其業無非辜而陷法無為盜而憎主故曰民惟邦本本固邦寧是也教化之所以行者必在刑簡政亷德廣信篤使禮有所設樂有所施無密法以害人無違分而取利故曰德惟善政政在養民是也今國家奄有萬國垂五十年聲教所及遐邇必至然臣學非博物材不逮人罔能周知四方是非休戚唯敢極言本職利病根源伏願聖慈子細詳覽而留意焉臣今年正月內准􅎁差充淮南轉運副使兼同發運事於二月四日到任方欲求民疾苦報國寵光計未遂心治且移所自受江南轉運使僅踰半年俗病民疵十得七八其小者乃當官而行固不避事其大者實干邦計非可自專然或隱不言誠恐得罪且江南僞命日於夏稅正稅外有元征錢物曰鹽博紬絹加耗絲綿戶口鹽錢耗腳斗面鹽博斛斗醖酒麴錢率分紙筆錢析生望戶錢甲料絲鹽博綿公用錢米鋪襯蘆䕠米麵腳錢等凡一十四件悉與諸路不同乃煜父子僭竊江淮糜費爵祿尋納朝廷之琛賮又失淮海之土田物力不充征斂苛暴太祖恭行天罰誠欲弔民而自克復之初舊弊不去者蓋樊知古始怨僞朝不與名第擔簦去國獻䇿復仇屬天運之有歸遂甘心於故土然小人之見無大略於時既任轉輸罔思鼎革而輒思怒其主流毒其民使我皇朝只得伐罪之名未見弔民之實因仍舊貫以至于今又其㳂征數內醖酒麴錢鹽博紬絹鹽博斛斗者江南舊日許人私下造酒等第科納麴錢及嘗散與官鹽博換紬絹斛斗歸復之後酒則禁斷鹽則不支上件㳂征准前輸納其次耗腳斗面加耗絲綿詰其所由亦皆類此前後巡撫採訪制置茶鹽承受體量發賑貸等皆承委寄不察疲羸不唯不察疲羸而復益之瘡痏遂使貨家鬻産償積疊之征科去土離鄉入逋亡之簿籍目擊堪嘆天髙莫聞加以纍年荐饑甚不堪命今歲雖稔亦罕寧居實病本之轉滋致仁化而未洽矧夫否極則泰感而遂通通泰之期計在今日伏惟陛下膺圖受籙繼業承祧念太祖丕變之實難省太宗治平之不易恭默思道期庶績以咸熙惕厲為懷畏一物之失所故臣得以有犯無隱者誠謂陛下必能澄流於源也又臣嘗觀周書兼之漢史見文王髙祖開國創業勞苦艱辛無所不至武王孝惠纘功述德而猶天下多故域中未寧洎乎周成漢文治定刑措者非文王武王不及成王之英睿髙祖孝惠不及文帝之智略蓋開國創業之際定霸爭雄也纘功述德之時去愚取賢也誠雄霸之未分賢愚之相半果斷靡暇舉置惟艱故顯忠遂良然後治定刑措萃於成王文帝之世也我皇朝太祖東歸江浙西克巴岷南平越裳北掃澤潞非定霸爭雄歟太宗殄三晉之昏迷斥兩河之醜虜黜羣邪於荒服採多士於草萊非去愚取賢歟夫如是太祖則文王髙祖之時太宗則武王孝惠之日陛下則成王文帝之世太祖太宗巳無愧文武髙惠於前陛下必超邁成王文帝於後也今江南州郡民物凋殘太祖太宗未果安輯非獨二聖遺善以貽嗣君抑亦周漢治平悉在三世噫周祚八百載漢祚四百年厯代延洪無出於是陛下得不動心哉臣所貢芻蕘蓋當職任陛下倘允愚計確賜主張則顯忠遂良治定刑措起於此而成於彼亦將不逺矣陛下果賜主張無令沮難則臣願竭忠亦復得為陛下剖析而别白也矧江南歸命二十有七載賦斂關市山澤榷酤至於百貨之珍竒庶物之巨細每歲所入有增無虧執事于外者得以叙為勞能坐邀恩爵㑹計于內者得以資為績用固保隆崇只謂財帛之繁食貨之富足以實國足以供軍殊不知物貨悖取人民之受弊人民受弊盜賊之必興盜賊必興干戈之不戢干戈不戢郡邑之罔寧郡邑罔寧農桑之失業農桑失業則國食無所出貨帛無所求然後欲圖潤昌不唯不克全有抑亦庶幾于亂則蜀川事殷鑒未逺也臣雖甚狂瞽亦識便宜挽粟飛芻誠為本事聚財積穀敢不用心然或踐彼常途昧於至理不過每到州府長索事分接問刑獄之清濫拘檢錢穀之盈虛降次小大之務場稽考出納之文簿孜孜㸃算一一看詳有欺罔則尋究元由有錯誤則責撻胥吏遇羡剩之額録為已功堪榷易之財奪其民利茍且隨時之譽希求進秩之榮待至官滿歸朝動不失所如此亦為稱職亦可安身其或有暗君親無益政教臣所不忍也臣今所陳前項㳂征一十四件者並僞朝舊弊也其順歸之後亦更有甚於此者臣未敢輒言陛下睿哲聰明孜孜求理茍或審其子細必是大惻聖懷臣終俟他時盡布愚欵又上件㳂征數內亦有可永且仍舊亦有可易而從新亦有可推作國恩亦有可施為民便若微臣専擅擘畫料朝廷必未施行何者供億尚煩儲蓄未備衆人不知别有微㫖或相排沮故也願陛下察此愚管且許留中然後密抽微臣赴闕質問儻事可采擇則繫於否臧如理涉虛浮則甘俟典憲復慮陛下以臣欲歸京闕别有希求且臣自是逺人所得巳踰始望崇階貴秩非敢有心但恨天賦性靈不能茍徇時俗致此喋喋煩瀆聖明大中祥符元年上時為江南轉運使上仁宗論體量畿內减放劉隨臣伏覩去年十一月十九日赦書千里之畿四方取則如聞賦租之式倍於郡國之名積有嵗年動成逋負豈外臺之俗久賜輕徭而甸服之民仍供重斂求之於古詎若是乎將救蒸民所宜寬恤開封諸縣人戶夏秋稅賦及㳂納錢物選差清强官與本縣令佐具逐縣稅數聞奏當議體量減放者伏自太祖開基因仍五代建都汴水是為東京當時江浙淮南荆湖交廣川峽四路并汾一隅各擅土疆不稟正朔國家弔民伐罪二十餘年挽粟飛芻畿內居首但是降國盡去煩苛惟有王畿旋增賦斂昨者德音濬發歡聲四馳朝廷務在均平將欲絶其僥幸遂令逐戶自供地盤嚴切指揮不令隱漏罪及鄰保非不丁寧然自降敕以來頗聞疑懼以為校定此畝必是增添稅租蚩蚩之民多不曉㑹縣胥誑惑窺圖貨財緣而為姦無以禁止然則本欲恤而安之翻成勞而擾之前史云事有招禍法有起姦好事難行居常如此況畿內之民去秋不熟重遭驚擾益成困窮伏望聖慈體念愚民且令停罷候一二年間大假豐熟民間盡信却乞施行其巳載赦書不欲權住即乞更不檢責田假只令為見管夏稅額一例普減分數如此則獄訟不興春農無廢司吏不能作弊鄉村亦自安寧時雨所霑民乃受賜天聖九年上時為侍御史知雜事上仁宗論兩稅折納見錢余靖臣切聞三司計度預於淮南江浙荆湖等路今年夏秋稅內折納見錢四百貫傳聞道路不知信否臣聞治國之要安民為本地有常産不外其求民有定賦不盡其力男耕於野女蠶於家各輸所有以待國用自堯禹以來守為彞制先期而輸古無此法況纍年之間科率頻併當今天下錢貨至少江淮之地名為錢荒謂宜改制泉刀以救其弊而乃令百姓盡委田野蠶絲之利一之於錢必將倍棄其物以就所售百貨既輕兆人嗷嗷力屈財盡散為盜賊雖有噬臍之悔將無及矣臣又聞竭澤而漁明年無魚百姓不足君於何取伏乞聖慈特賜矜允裁減其半令納本色其第四第五等貧下人戶願納本色並聽仍各依每年夏秋期限送納於國家賦稅亦無所損而江淮之民不至流散則朝廷之大惠也慶厯三年上時為右正言諫院供職上仁宗論折變當隨土地之宜劉敞臣聞聖王之處民也順其性是故居山者不使居川居渚者不使居中原其取民也任其宜是故山虞不以魚鱉為賦川衡不以材木為貢蓋順其性者知天者也任其宜者知地者也聖王之功不變天地是以其養易足其教易成其求易供其取不匱今之時善言政者莫不欲富民欲富民而常患奪其財者由有司取之反其性而戾其宜於是或以穀為金或以芻為帛稗非精也而求之不舍民是以困窮是以流亡是以盜爭朝廷豈不恤哉蓋不得巳也臣以謂方今用度不足之時欲盡如古蓋亦未可且敕有司毋責魚鱉於山毋索材木於川則百姓亦庶幾矣臣非敢虛言也臣所治州十縣其五皆種穜稑而有司乃使以糯與粳為賦一不如約吏當坐之若此者上則不順於天下則不因於地中則不恱於人去聖王之功逺矣惟陛下哀憐之臣幸備執事以治民為職詔書問可以寬民者臣切疑莫先於此夫賦稅固自古有之臣願敕諸路轉運使必不得巳而折變變其所有毋變其所無變其所可得毋變其所不可得則民疾不困矣慶厯七年上時為通判蔡州上神宗論江西重折苖錢呂公著臣切聞江南西路去年米價每斗約四十五以來轉運司和糴每斗五十以來所有人戶合納苖米却令納一色見錢每斗九十以來比市價增及一倍比和糴價亦增四十有餘臣切以米者地之所生而錢非農人所蓄捨其所有責其所乏則固巳非義況復於常計之外取增倍之入竭澤而漁何以過此伏惟陛下乘公私交匱之際奮然興起求所以足國裕民之術固非欲掊民自利也然而小大之臣未必能盡知陛下仁民愛物之意至有巧譎不仁之吏求為小忠近效以規一時之寵利刻薄茍且無所不至及乎害及於民而怨歸上則上下相䝉恬不為慮陛下為民父母民為陛下赤子然而所任之吏負法害民至敢如此若復不加譴責則雖有仁民愛物之意何以取信於天下兼聞本路轉運司並是受指揮尚亦有此處置伏乞朝廷特賜訪察施行熙寧三年上時為御史中丞寬恤上仁宗乞因明堂赦書大施曠蕩之澤包拯臣伏聞先帝時冬十二月雷震司天監奏主國家發惠布澤未及黎庶上召輔臣謂之曰此上天所以警朕也且河北關西戍兵未息民人勞止又三司轉運使率擾之事名類實繁大者宜即減省小者悉蠲除之將來改元赦書卿等宜盡采民弊著為條目務澤及黎庶也大哉先帝愛民之心如是之至以陛下求治之心亦先帝之心也臣切聞見陜西用兵之後朝廷急於饋運多所經畫丁夫征賦有常數矣若踰之則盡為無名之率其他酒稅錢穀之類亦有定額矣而貪於寵利者唯務聚斂掊克於下前後務以相勝前者增幾十萬以圖厚賜後者則又增幾十萬以圖優賞日甚一日何窮之有而民力困且竭矣所以瘡痍天下于今未息用是觀之其實豈為國乎若果為國豈不以愛民為念哉禮曰與其有聚斂之臣寧有盜臣則先王顧生民何如哉今雖用度微窘而諸州旱潦相繼亦當寬養黎庶固其大本大本不固則國家從何而安哉況朝廷比下詔令未嘗不以寬民恤物為先而有司往往不即遵行是陛下有憂民之心而民無繇知使王澤壅於上民情鬱於下此皆向者有司之失恐非所以流布愷悌慰安元元之深㫖也臣欲乞應自西事以來一切權宜之事因循未釐革者將來明堂赦書盡采餘弊著之條目悉與改正為定制若民間夏秋二稅除依例輸納外不得非橫支移折變茶鹽酒稅課利一切依舊額趂辦勿許擅有增減諸色缺負自來每遇恩貸不以存亡必根究本末但務追攝罕得除放乞令今後於理合該蠲免者更不縲繫逮捕重為煩擾並令疾速檢㑹除放若有司稽違必嚴行黜責如此則上可以遵先帝之意下可以救當世之患俾四方之人知陛下曠蕩之澤實及於下則海內幸甚皇祐二年上時知諫院上仁宗乞面釋逋缺人包拯臣伏覩明堂赦書應今日以前天下缺負官物并於干繫保人名下催納元非侵欺盜用或雖是侵盜見今本家并干繫保人內委無抵當者令屬縣及轉運司保明聞奏其纍經官吏保明三司未與除放者限赦到一月內令本處先具自來保明度數申本路轉運司疾速保明繳連聞奏當議並與除放此誠陛下憂恤元元如是之至也然臣厯觀前後赦文凡有恩貸無不周悉而有司往往廢格不即遵行臣切聞真宗咸平年中親御便殿放三司所引諸色違缺凡四千一百六人計物八萬三千數蓋先帝以恩詔每宥逋責有司必究問本末或縲係追逮益為煩擾故命以籍引對而面釋之大哉先帝憂民軫物之心唯恐不及伏望陛下特降指揮委三司將應係諸色逋缺人各具因依一一類聚備録申奏並令引見詳酌除放如此則恩出於上弊絶於下矣皇祐二年上時知諫院上哲宗乞除放倚閣稅賦梁燾臣伏見去冬苦寒今秋大旱被災之民如卧焦灼日望睿澤湔濯瘡痏陛下恐懼天戒惻怛民隱誠意內修政事外飾未損靜治願寬聖憂但當采用公言講求仁術坐致明恩實惠遍及四海則降監昭昭還受嘉福矣臣以謂人巳久困嵗復洊饑今來凍餒巳足深憂向去流離尤為大患正在朝廷衣食拊循固結其意以父母妻子為愛以墳墓閭井為戀相扶而不二相死而不去不二則盜賊不起不去則田野不曠固本寧邦其要在此臣聞天下倚閣稅賦編敕以限年催理雖催理之令行於豐年而多值災傷間獲小稔官曹執法督迫期㑹縱得十分豐熟亦隨百色分張故民間愁怨紛紜常以缺負為苦官中所入既有限數之內往往不足至有嚴刑峻令僅獲無遺官帑小補而民室大空矣三年一遇大禮竟用赦恩蠲免在公徒有理缺之名在私乃有刻剝之弊是存空名於公家而行實弊於私門也為害如此何益治體臣欲乞聖慈特降指揮勘㑹災傷路分自元祐二年以前有見在倚閣稅賦一切除放以救百姓今日目前之急如此則明恩實惠下及幽逺感激歡欣咸歸聖德若郡縣得人欽體詔㫖更求勞徠安集之方免凍餒流離之苦前接麥熟終保安全和氣既充隂陽自順四時協序百穀用成數年之間稅賦之入可以加倍倚閣之數矣陛下必欲救全百姓此事最為切當伏望斷自宸衷無容回奪使中外明知非常之恩出自兩宮則天下幸甚貼黃切以明年大禮自有恩霈合以赦書除放倚閣若今來便行除放只是早得一年況大禮恩霈乃是常事民間人人指望今來惠澤乘此災傷救得百姓目前難急非民間冀幸所可及也與其使䝉惠於指望之中不若使受賜於冀幸之外其為感激德施萬萬過於尋常矣乃是以尋常之事為非常之恩銷百姓愁怨之氣收四方歡恱之心在於政道誠是機㑹不可失也伏乞睿慈深留聖念貼黃臣恭謂法座之前不踰尋尺當使四海萬里之外歡欣依戴之心常集此地不可使匹夫愁怨之意乘之也此前代聖帝明王所以得人而有天下之要道也伏望聖慈念兹在兹夙夜兢而不忘也臣不勝大願元祐二年上時知潞州上哲宗乞不限人數收養貧民范祖禹臣伏見陛下以今冬大寒異於常年聖心憂軫救恤小民無所不至近又出禁中錢十萬貫以賜貧民此誠博施濟衆堯舜之仁也禮記曰財聚則人散財散則人聚臣謂此財一散而人心皆聚於朝廷矣古聖人未有不矜恤孤窮者堯命舜舜命禹皆以四海困窮為記書稱不虐無告不廢困窮為帝堯能之蓋置而不恤則是虐之矣棄而不養則是廢之矣伊尹稱湯曰先王子惠困窮周公曰文王懷保小民惠鮮鰥寡孟子曰文王發政施仁必先鰥寡孤獨夫聖人養天下之民使貧者不至失所則不貧者自安是故古者為政必先恤困窮之民國朝祖宗以來惠恤孤寡仁政非一每遇大雨雪則放公私房錢以至糶米賣炭散錢死者則賜錢瘞埋惠及存沒近日朝廷無不舉行而又發內帑之錢降非常之恩德澤之厚無以加矣陛下勤恤小民如此而臣忝在左右切思有可以少補聖政之萬一者獨忍默而不言哉古者鰥寡孤獨廢疾皆有養既養之則不至於凍餒而死朝廷自嘉祐巳前諸路有廣惠倉以救恤孤貧京師有東西福田院以收養老幼廢疾至嘉祐八年十二月又增置城南北福田共為四院此乃古之遺法也然每院止以三百人為額臣切以為京師之衆孤窮者不止千二百人又朝廷每遇大冬盛寒則臨時降㫖救恤仁恩雖溥然民已凍餒死損者衆矣夫救飢於未飢之時先為之法則人不至於飢死救寒於未寒之前預為之備則人不至於凍死今每嵗收養與臨時救濟二者等為費用不若多養之為善也臣愚以為四福田院增蓋官屋以處貧民不限人數並依舊法收養委左右廂提舉使臣每至冬月多設方略救濟或給米豆設糜粥不必専散見錢其使臣存活到人數書為課績量與酬奬死損多者亦立殿罰如四廂使臣提舉難遍即委吏部臨時更選差使臣四員相兼提舉量與添給仍理為重難差使存活死損殿最亦依四廂使臣法其天下廣惠倉切慮州縣不以為急乞更申明成法每嵗以時舉行委逐路監司丁寧行下所屬州縣及因巡厯按視或於逐州别差官㸃檢使知朝廷掛意令官吏用心賑恤須要實惠及貧民不得輕易以為末事畿內諸縣亦乞令擘劃官屋依京師收養無令逺者聚於都下重立條禁以絶主掌支散之人減刻之弊如此則物不虛費而所活益多矣國家富有四海每嵗用係省錢一二萬緡於租賦之入無異海水之一勺而飢窮之人日得十錢之費升合之米則不死矣此乃為國者所當用王政之所先也況朝廷幸不惜費唯更增修舊法推廣祖宗仁政以副陛下慘怛愛民之意夫何難哉臣切惟陛下近日所行萬萬於此而臣之所陳事乃至微然古之聖人莫不以此為先務所以拯生民之性命其法不可不備也臣言稍有可采伏乞詳酌施行貼黃臣竊見四福田院條制逐院每年特與僧一名紫衣行者三人剃度推恩至厚而所養人數不多今若增添人數其恩澤亦乞詳酌立定分數每存活若干人即與剃度一名如死損及若干人即減剃度一名所貴各務存養人命元祐二年十二月上時為著作郎上哲宗論積缺蘇軾臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年于兹仁孝慈儉可謂至矣而帑廩日益困農民日益貧商賈不行水旱相繼以上聖之資而無善人之效臣竊痛之所至訪問耆老有識之士隂求其所以皆曰方今民荷寬政無他疾苦但為積缺所壓如負千鈞而行免於僵仆則幸矣何暇舉首奮臂以營求於一飽之外哉今大姓富家昔日號為無比戶者皆為市易所破十無一二矣其餘自小民巳上大率皆有積缺監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為篳門圭竇矣自祖宗以來每有赦令必曰凡缺官物無侵欺盜用及雖有侵盜而本家保伍人無家業者並與除放祖宗非不知官物失陷姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盜賊之所憑藉故舉而放之則天下恱服雖有水旱盜賊民不思亂此所謂捐虛名而收實利也自二聖臨御以來每以施舍已責為先務登極赦令每次郊赦或隨事指揮皆從寬厚凡今所催缺負十有六七皆聖恩所貸矣而官吏刻薄與聖意異舞文巧詆使不該放監司以催缺為職業守令上為監司之所迫下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然日有所得若一旦除放則此等皆寂寥無獲矣自非有力之家納賂請求誰肯舉行恩貸而積缺之人皆鄰於寒餓何賂之有其間貧困掃地無可蠶食者則胥教令通指平人或云衷私擅買抵當物業或雖非衷私而云買不當價似此之類蔓延追攝自甲及乙自乙及丙無有窮巳每限出空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取蓋無虛日俗謂此等為縣胥食邑戶嗟乎聖人在上使民不得為陛下赤子而皆為姦吏食邑戶此何道也商賈販賣例無見錢若用見錢則無利息須今年索去年所賣明年索今年所賖然後計算得行彼此通濟今富戶先巳殘破中民又有積缺誰敢賖賣物貨則商賈自然不行此酒稅利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘於財用例不肯放稅縱放亦不盡實雖無明文指揮而以喜怒風曉官吏孰敢違者所以逐縣例皆拖缺兩稅較其所缺與依實檢放無異於官了無所益而民被追擾鞭撻之苦近者詔㫖凡積缺皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以謂有㫖依閣者方得依十料指揮餘皆並催縱使盡依十料吏卒乞覔必不肯分料少取人戶既未納足則追擾常在縱分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積缺所壓日就窮蹙死亡過半而缺籍不除以致虧缺兩稅走陷課利農末皆病公私並困以此推之天下大率皆然矣臣每屏去吏卒親入村落訪問老父皆有憂色云豐年不如凶年天災流行民雖乏食縮衣節口猶可以生豐年舉催積缺胥徒在門枷棒在身則人戶求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積缺故流民不敢歸鄉臣聞之孔子曰苛政猛於虎者常不信其言以今觀之殆有甚者水旱殺人百倍於虎而人畏催缺乃甚於水旱臣切度之每州催缺吏卒不下五百人以天下言之是常有二十餘萬虎狼散在民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以檢察本州積缺為事內巳有條貫除放而官吏不肯舉行者臣即指揮本州一面除放去訖其於理合放而於條未有明文者且令本州權住催理聽候指揮其於理合放而於條有礙者臣亦未敢住催伏望特留聖意明詔大臣早賜與決行下元祐七年五月上時為龍圖閣學士知揚州軾所陳六事文多不載宋名臣奏議卷一百四
