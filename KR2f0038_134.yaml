body:
  text: 宋名臣奏議卷一百三十四宋趙汝愚編邊防門遼夏六上仁宗論元昊請和當令權在我余靖臣竊聞賊昊差私置官入境相次到闕欲與朝廷通和事伏以息兵減費夷狄順命國家大臣至於邊將咸欲息肩以休士卒臣愚料之以謂挫北狄之氣折西羌之鋭不如不和最為得䇿假如元昊貪我財貨甘心臣伏此之為禍大於今日臣請别白言之伏自國家用兵五年已來三經大戰軍覆將死財用空虛天下嗷嗷困於供給今乃因敵人一介之使馳其號令遂使二國通好君臣如初吾數年之辱而敵人一言解之若敵人又遣一介有求於我以為其謝其將何詞以拒之若國家又有所惜必將興師責我謂之背約則北鄙生患二境受敵矣矧西戎自僣名號未嘗挫折何肯悔禍輕屈於人今若因其官屬初來未有定約但少許之物無滿其意堅守名分以抑其僣雖賜之甘言彼必不屈則吾雖西鄙受敵而北狄未敢動也何以知之昨梁適使敵之時虜主面對行人遣使西邁意氣自得自言指呼之間便令元昊依舊稱臣則是北狄之威不能使西羌屈伏彼自喪氣豈能來責故臣謂今之不和則吾雖西鄙受敵而北冦未敢動也若便與西戎結盟則我之和好權在夷狄中國之威於是盡矣北寇責我則二鄙受敵其憂深矣伏願陛下與執政大臣密謀而深思之無令陷敵計中則天下社稷幸甚必不得巳而與貨財須作料錢公使名目便將靈鹽銀夏作兩鎮則賜豫倍於往時而君臣名分不改矣或欲速成和好而屈名分則天下共耻之雖強兵在境有血戰而已矣若他年賊自有釁來求和者權在我而不必拒之也惟陛下裁之慶厯三年二月上時為集賢校理上仁宗不可待西使太過冨弼臣近者竊聞昊賊遣其僞六宅使賀從勉齎書到闕欲議通好事頗祕密臣不知審實但外人傳說昊賊來書未肯稱臣别圖位號兼臣昨在西京間居飬疾竊見傳宣下河西一路州軍排備祗候西使次第甚盛又令逐州通判就驛相看置酒管領臣甚憂事體太過必恐下面難為處置有失中國制馭夷狄之術也臣又竊聞西使之來非自然之意蓋契丹特遣使往河西教之令來既是元昊禀畏契丹使來貢奉元昊不敢不從即不假匆忙可且持重與之商議縱時下未合必有後圖今來請和既不由元昊使人豈能專其可否以此思之朝廷待西使不必過當大凡措置機事在乎制之於初初若失冝後難救應臣又今日竊聞西使入見賜與甚多既許人使僞官之稱則元昊所圖勢難止遏茍一一遂其所欲臣不知向去事體如何况臣去年兩使北庭所議西事甚是分明臣前後邀勒度數頗多不能一一記憶臣今省得再去時與館伴劉六符所說一節臣謂六符云北朝將來令元昊如何歸附須是却令依舊納欵不可令别有所望六符云固是如此况元昊自來稱臣於南朝今來更待望甚定是須令納欵稱臣况南朝與北朝書云彼若翻然效順此必待之如初臣今記得上項一節甚明伏乞朝廷檢會臣再奉使過日别録照對方見的實向者所許北庭歲添金帛之數蓋為令他指揮西事初既不避張此名聲今來又却不依舊約則是虛受前耻而不獲後效甚可痛惜也此事朝廷須是廣為思慮何者北狄元許却令稱臣今來自是朝廷過有許可亦恐北狄意不欲謂元昊於中國尚不肯稱臣於我豈肯甘分則是因此致使北狄亦難制元昊元昊亦自此所圖愈大也若北狄遣使以此來問則朝廷何辭以對又慮元昊若不稱臣於朝廷則北狄必曰元昊本稱臣於我亦稱臣於南朝今元昊既於南朝不復稱臣漸為敵國則是元昊與南朝等惟我契丹獨尊矣臣謂北狄因此益熾必自喜名分暗定異日稍有釁隙緣此若有所求則未知朝廷何以待之臣旦夕思此二事將必有一焉不可不深圖不可不早慮願朝廷且執北狄所約更加裁擇不可容易過許則不至别生後患臣又恐延州及京師幹當事人且貪成功不為國家思後來之患伏乞陛下與兩府臣寮深切計慮必無後悔然後從而行之則天下之幸宗社之福臣不勝懇懇之至慶厯三年四月上時為翰林侍讀學士上仁宗論西鄙議和先防北狄歐陽修臣伏見朝廷方遣使與西賊議通和之約近日竊聞邊臣頻得北界文字來問西夏約和之事了與未了茍實如此事深可憂臣以謂天下之患不在西戎而在北狄縱使無此文字終須貽患朝廷與契丹通好僅四十年無有纎芥之隙而輒萌姦詐妄有請求竊以戎狄貪婪性同狼虎遇強則伏見弱便欺見我無謀動皆屈就謂我為弱知我易欺故添以金繒未滿其志更邀名分抑使必從無事而來尚尤如此若使更因西事攬以為功别有過求將何塞請此天下之人無愚無智共為朝廷寒心者也今若果有文字來督通和之事則臣謂醜虜狂計其漸已萌不和則詰我違言既和則論功責報不出年嵗恐須動作茍難曲就必至交兵至於選將練師既難卒辦禦戎制勝當在機先然臣竊怪在朝之臣尚偷安靜自河以北絶無處置因循弛慢誰復掛心豈可待虜使在庭冦兵壓境然後計無所出空務倉黃而已哉今國家必謂兩意雖乖尚牽盟誓邊防處置未敢張皇以臣思之莫若精選材臣付與邊郡使其各圖禦備密務營修此最為得也况今北邊要害諸郡不過十有餘處於文武臣寮中選擇十餘人不為難得各以一州付之使其各得便冝如理家事修城壘訓兵戎習山川蓄糧食凡百自辦不煩朝廷經度以兹預備尚可支梧至如鎮定一路最為要害張存昔在延州以不了事罷去今乃委以鎮府王克基凡庸輕巧非將臣之材而任定州其餘州郡多匪其人臣欲乞陛下特詔兩府大臣取見在邊郡守臣可以禦敵捍城訓兵待敵者留之其餘中常之材不堪邊任者悉行換易若使秋風漸徑虜隙有端陛下誠思邊鄙之臣誰堪力戰朝廷之將誰可出師當臣初受諫職之時見朝廷進退大臣陛下鋭意求治必謂羣臣自此震懾百事自此修舉西北二事最為大者自當處置不待人言及就職以來已數十日而政令之行漸循舊弊惟言事之臣拾遺補闕者勉強施行其一二至如講大利害正大紀綱外制四夷內紓百姓凡廟堂帷幄之謀未有一事施行於外者臣忝司諫諍豈敢不言伏望陛下不忘社稷之深恥無使夷狄之交侵峻發天威督勵臣下仍乞詢問兩府大臣西鄙議和能保契丹别無辭說否茍有所說能以廟謀竒算沮止之否茍無謀以止之則練兵選將備邊待冦賊至而後圖能不敗事否臣願陛下勿謂去歲六符之來可以賄解今而有請則事難從矣勿謂纍年西賊為患習以為常若此事一動則天下搖矣臣所言者社稷之大計也願陛下留意行之慶厯三年六月上時為知諫院先是四月朝廷遣邵良佐使夏州喻以所齎來文字名體未正却令齎回其稱男雖見恭順然父子亦無不稱臣之禮自今上表只稱臣名朝廷當行封冊為夏國主賜詔不名仍許置𣙜場保安軍嵗賜絹十萬匹茶三萬斤命良佐與從勉等同往議定以聞七月元昊復遣羅尼儒克丹伊實羅壘旺裕勒和爾與良佐俱來所要請凡十一事其欲稱男而不為臣尤執前議上仁宗論廷議元昊通和事歐陽修臣近有奏論今後軍國大事不須祕密請集百官廷議近聞元昊再遣使人將至闕下和之與否決在此行竊計廟謀合思成算臣謂此最大事也天下安危係之今公卿大夫愛君憂國人人各為陛下深思極慮惟恐廟堂之失䇿落夷狄之奸謀衆口紛紜互有論議一曰天下困矣不和則力不能支少屈就之可以紓患一曰羌夷險詐雖和而不敢罷兵則與不和元無異是空抱屈就之羞全無紓患之實一曰自屈志講和之後不過退而休息練兵訓卒以為後圖然此亦必不能者只以河朔之事可知蓋慮才和之後便忘發憤因循弛廢為患轉深一曰縱使元昊稱臣西邊減費不弛武備不忘後圖然猶有大可憂者北戎將攬通和之事以為已功過有邀求遂興兵革是暫息小患於關西復生大患於河北臣忝為耳目之官見國有大事旁採外論所聞如此異同然大抵皆謂就和則難不和則易不和則害少和則害多然臣又不知朝廷之意其議云何臣見漢唐故事大事必須廷議蓋以朝廷示廣大不欲自狹謀臣思公共不敢自強故舉事多臧衆心皆服伏思國家自兵興以來常祕大事初欲隱藏護惜不使人知及其處置乖違豈能掩蔽臣謂莫若採大公之議收衆善之謀待其都無所長自用廟謀固亦未晚其元昊請和事伏乞於使人未至之前集百官廷議臣只自朝夕已來諸處詢訪巳聞衆說如此若使並集於廷各陳所見必有長䇿以裨萬一慶厯三年七月上上仁宗論元昊來人不可令朝臣管伴歐陽修臣風聞朝㫖欲以殿中丞任顓管伴元昊遣來一行人等臣竊知元昊此來全無好意不肯稱臣索物太多其志不小乃是欲以強相迫脅爾朝廷既不能從則待其來人凡事不可過分至於禮數厚薄賜與多少雖云小事不足較量然於事體之間所係者大兵交之使來入大國必須窺伺將相勇怯覘察國家強弱若見朝廷威怒未息事勢未削必內憂斬戮次恐拘留使其偶得生歸自為大幸則我弱形未露壯論可持今若便損國威過加厚禮先為自弱長彼驕心使其知我可欺則議論愈難合矣必欲成就其事尤須鎮重為先况其議必不成可惜空損事體前次元昊來人至少朝廷只以一班行待之今來漸盛則必須差近侍矣是彼轉自強我轉自弱况聞邵良佐昨來往彼僅免屈辱而還則彼雖夷狄不為無謀今其來人必須極騁辭辨以圖相勝若能先薄其禮以折之亦挫之之一端也其元昊來人欲乞更不差人管領送置驛中不須急問至於監視饋犒傳道語言一了事班行足矣臣料今國家若不能曲從其意即不須尊寵來人厚加禮遇元昊不免出兵攻冦逞彼忿心等是不和何必自虧事體不若急修邊備以圖勝算慶厯三年七月上上仁宗論西賊議和利害歐陽修臣伏自如定等到京以來竊聞朝議必欲令其稱臣然後許和乃國家大計廟堂得䇿蓋由陛下至聖至明不茍目前之事能慮向去之憂斷自宸衷決定大議然數日來風聞頗有不識之人妄陳愚見不思逺患欲急就和臣雖知必不能上惑聖聰然亦慮萬一少生疑沮則必壞巳成之計臣職在言責理合辨明伏自西賊請和以來衆議頗有同異多謂朝廷若許賊不稱臣則慮北戎别索中國名分此誠大患然臣猶謂縱使賊肯稱臣則北戎尚有邀功責報之患是臣與不臣皆有後害如不得巳則臣而通好猶勝不臣然於後患不免也此有識之士憂國之人所以不願急和者也今若不許通和不過懼賊來冦耳且數年西兵遭賊而敗非是賊皆善戰蓋由我自繆謀今如遣范仲淹處置邊陲稍不失所則賊之勝負尚未可知以彼驕兵當吾整旅使我因而獲勝則善不可加但得兩不相傷亦足挫賊鋭氣縱仲淹不幸小敗亦所失不至如前後之戰是比於通和之後别有大患則所損猶少此善算之士見逺之人所以知不和害小而不懼未和也臣謂方今不羞屈志急欲就和者其人有五一曰不忠於陛下者欲急和二曰無識之人欲急和三曰姦邪之人欲急和四曰疲兵懦將欲急和五曰陕西之民欲急和自用兵以來居廟堂者勞於幹運在邊鄙者勞於戎事若有避此勤勞茍欲陛下屈節就和而自偷目下安逸他時後患任陛下獨當此臣所謂不忠之臣欲急和者也和而偷安利在目下和後大患伏而未發此臣所謂無識之人欲急和者也自兵興以來陛下憂勤庶政今小人但欲茍和之後寬陛下以太平無事而望聖心怠事因欲進其邪佞惑亂聰明大抵古今人主憂勤小人所不願也此臣所謂姦邪之人欲急和者也屢敗之軍不知得人則勝但謂賊來常敗此臣所謂懦將疲兵欲急和者也此四者皆不足聽也惟西民困乏意必望和請因宣撫使告以朝廷非不欲和而賊未遜順之意然後深戒有司寬其力役可也其餘一切小人無識之論伏望聖慈絶而不聼使大義不沮而善算有成則社稷之福也慶厯三年七月上上仁宗論備禦七事韓琦臣聞漢文帝襲髙惠承平之後躬行節儉國治民富刑措不用時賈誼上書言事尚以為可慟哭太息豈其過哉蓋憂深思逺圖長久之計欲大漢之業垂千萬世而無窮者今陛下紹三聖之休烈仁德逺被天下大定民樂其生者八十餘載矣而臣竊觀時事謂可晝夜泣血非直慟哭太息者何哉蓋以西北二敵禍釁巳成而上下泰然不知朝廷之將危宗社之未安也臣今不暇廣有援引請粗陳其大槩切以契丹宅大漠跨遼東據全燕數十郡之雄東服高麗西臣元昊自五代迄今垂百餘年與中原抗衡日益昌熾至於典章文物飲食服玩之盛盡習漢風故意氣愈驕自以為昔時元魏之不若也非如漢之胸奴唐之突厥本以夷狄自處與中國好尚之異也近者復幸朝廷西方用兵違約遣使求關南之地以啓爭端朝廷愛念生民為之隱忍嵗益金幣之數且固前盟而尚邀獻納之名以自尊大其輕視中國情可見矣又元昊父祖以來畜飬姦謀招納亡命雖外示臣節而內恃兵力至元昊則好亂逞志併甘涼諸蕃以拓境土自度種落強盛故僣號背恩北連契丹欲成鼎峙之勢非如繼遷昔年跳梁於銀夏之間爾元昊纍歲盜邊官軍屢衄今乘定州全勝之氣遣人約和則知其計愈深而其事可虞也議者謂昨假契丹傳道之力必事無不合豈不思契丹既能使元昊罷兵豈不能使元昊舉兵乎比來辭禮驕慢殊未屈下北狄之言既巳無驗亦恐有合從之䇿以困中原朝廷若軫西民之勞暫求休飬元元且以金帛啖之待以不臣之禮臣恐契丹聞之謂朝廷事力巳屈則又遣使移書過邀尊大之稱或求朝廷不可從之事隳其誓約然後驅虎狼之衆直趍大河復使元昊舉兵深冦關輔當是時未審朝廷以何術而禦之或西鄙稱藩專事北狄陛下親御六師臨澶淵以待之即未知今之將卒事力與環衛統帥比真宗北征時何如欲駐蹕北京以張軍勢臣恐敵衆由德博度河直趍京師則朝廷根本之地宗廟宫寢府庫倉廪百官六軍室家所在而一無城守之略陛下可擁北京之衆却行而救之乎臣所以謂可晝夜泣血者誠憂及于此兾陛下一悟而急為拯救也朝廷若謂今之盟約尚可固結則前三十年之信誓朝廷何負二寇而一旦違之哉彼狼狽之心見利而動又可推誠以待之乎夫得於先見預為之防則功逸而事集若變生倉卒駭而圖之雖使良平復生為陛下計亦不能及矣臣是以夙夕思之朝廷若不大新紀律則必不能革時弊而弭大患臣輒畫當今所宜先行者七事條列以獻其大略一曰清政本樞密院本兵之地今所主多苛碎眇末之務中書公事雖不預聞恐亦類此謂宜詔中書樞密院事有例者著為法可擬進者無面奏其餘微瑣可悉歸有司使得從容謀議賜對之際專論大事二曰念邊事今政府循故事才午即出欲稍留則恐礙衆退朝食罷匆遽簽書而去何暇及疆事哉謂宜須未正方出延此一時以專邊論三曰擢才賢自承平以來用人以叙遷之法故遺才甚多近中書樞密院求一武臣代郭承祐聚議纍日不能得謂宜倣祖宗舊例於武臣中不次超擢以試其能四曰備河北自北狄通好三十餘年武備悉廢慢書之至騷然莫知所為宜選轉運使二員密授經略責以嵗月使營守禦之偹則我待之有素也五曰固河東前嵗昊賊陷豐州掠河外屬戶殆盡麟府勢孤絶宜責本道帥度險要建城堡省轉餉為持久之計六曰收民心祖宗置內藏庫蓋備水旱兵革之用非私蓄財而充已欲也自用兵以來財用匱竭冝稍出金帛以佐邊用民力可寬而衆心安矣七曰營洛邑今帝都無城隍之固以備非常議興葺則為張皇勞民不若隂葺洛都以為游幸之所嵗運太倉羡餘之粟以實其廪庾則皇居壯矣慶厯三年七月上時為樞密院副使上仁宗乞訪問執政專以寇患為急田況臣伏以朝廷豫契丹金帛歲五十萬朘削生民輸將道路疲弊之勢漸不可久而近者西羌通欵歲又豫二十萬設或復肆貪黷再有規求朝廷尚可從乎臣至愚不當大責每念至此則怨嘆不已矧兩府大臣皆宗廟社稷天下生民所望而繫安危者豈不為陛下思之哉每旦垂拱之對不過目前政事數條而已非陛下所以待輔臣非輔臣所以憂朝廷之意也有唐故事肅宗以天下未乂除正衙奏事外别開延英以詢訪宰相蓋旁無侍衛獻可替否曲盡討論今北寇桀慢而河朔將佐之良愚甲兵之善窳道路之夷險城壘之堅弊軍政之是否財糧之多少在兩府輔臣實未有知之者萬一變發所忽制由中出少有蹉跌則事不測矣如前嵗蕭英劉六符始來和議未決中外惶擾不知為計此臣所目覩也和議既定又復恬然若無事者豈得為安哉願因燕間召執政大臣於便殿從容賜坐訪逮時政專以寇患為急則人人惟恐不知以誤應對事事惟恐不集以孤聖懷日夕憂思不敢少懈同心協力必有所為今不此為務而日以委瑣之事更相辨對議者羞之臣備近列實同休戚惟陛下不以人廢言也慶厯四年四月上時為知制誥上仁宗和守攻備四策范仲淹等臣等䝉聖恩非次奬擢待罪兩府日夜憂迫恐負陛下委用之意臣等誠無所長但塞下初還粗知邊事不敢有隱臣等聞三代以還皆有戎狄之患以至侵陵中國被于渭洛齊晉逐之於前秦漢驅之於後中原始清人倫乃叙逮于西晉之弱羣起猾夏天寶之末石晉之際中國不幸皆罹其害自周世宗北征之後雖疆土未復夷夏稍分我祖宗奕世修備大庇生民今西北二寇復相交結來困中國元昊率先叛命兵犯延安次犯鎮戎殺傷軍民曾無虛嵗中國之兵討伐未利而北狄舉十萬衆謂元昊是舅甥之邦責中國不當稱兵此交結之跡更何疑哉國家以生民之故增物帛以續盟好彼既獲利方肯旋師今乘西夏通順之議又欲主盟邀功以自尊大元昊屢戰屢勝且倚北戎事勢雖求通順實欲息肩亦如北戎大獲厚利候其功力稍豐可以舉衆則必長驅深入有吞并關輔之志何以知之昨定州之戰我師不利彼作僞詔誘邊人定關中其謀不細蓋漢多叛人陷於窮漠衣食嗜好皆不如意必以苻堅劉元海元魏故事日夜游說元昊使其侵取漢地而以漢人守之則富貴功名衣食嗜好得如其意乃知非獨元昊志在侵漢實漢之叛人日夜為賊之謀也朝廷若從其通順則北戎邀功自為主盟邀求無厭多方困我而終於用兵矣若拒絶其意則元昊今秋必復大舉北寇亦必遣使問我拒絶之故或便稱兵塞外張勢脅我國家至時寧不疑懼必於陜西選將抽兵移入河北未戰而西陲已虛元昊乘虛而來必得志於關輔此二寇交結之勢何以禦之臣等思度是和與不和俱為大患然則為今之謀者莫若擇帥練兵處置邊事日夜計略為用武之策以和好為權宜以戰守為實事彼知我有謀有偹不敢輕舉則盟約可久矣如不我知輕負盟約我則乘彼之驕可困可擊未必能為中國之患也臣等請畫一言之和䇿臣觀西戎蓄禍積有嵗年德明在時巳聞僣擬元昊方壯遂肆凶驕外倚北戎內陵中國屢戰屢勝未嘗挫衄而乃輒求通順實圖休息所獲者大利所屈者虛稱然猶干請多端姦謀未測國家以生靈為念不可不納如唐髙祖太宗應天順人百戰百勝猶屈於突厥當戎主始亡為之舉哀廢朝三日遣百寮詣館弔其來使其屈禮之甚也又太宗馳六騎於渭上見頡利與語復親與之盟頡利既退左右勸擊之太宗謂我擊彼敗懼而修德後患必深乃周旋俯就使之驕怠一旦遣李靖擒之威振四極此盛王之謀也陛下如唐髙祖太宗隆禮謹信以盟好為權宜選將練兵以攻守為實事彼不背盟我則撫納無倦彼將負德我則攻守皆宜如此則結好之䇿未有失也守䇿元昊自來通順之時嵗受恩賜朝廷撫納甚厚未嘗有失尚猶時擾邊境殺戮將吏暨叛命以來纍次大舉曾無沮敗乃求通順實蓄隂謀非屈伏之志也朝廷若以權冝許之更當嚴作守備然陜西久屯大兵供億殫竭減兵則守備不足不減則物力已困臣等請緣邊城寨愈加繕修使戎敵之心無所窺伺又久守之計須用土兵各諳山川習戰鬭比之東兵戰守功倍然緣邊次邊土兵數少分守不足更當於要便城寨招置土兵若近裏土兵願改𨽻邊寨者即遷其家團集之况昨來慶州創起大順城欲置振武保捷兵兩指揮仍於永興華耀土兵中召其願守塞者而應募甚衆何則關內諸州土兵多在邊上或得代歸營數月之間復出逺戍豈徒星霜之苦極傷骨月之思征夫不保其家嫠婦頗多犯法人情不免久則怨起如得并遷其家於緣邊住營更免出軍父母妻子樂於團聚戰則相救守則相安或謂若土兵攜家居于塞下則全分請給其費尤多不然土兵月給差少又素號精強使之戍邊於東兵數復可減然於逐路漸為增益一年已來方能整習固非一朝可驟改也又陜西新刺保捷土兵其中脆弱不堪戰陳者宜沙汰之使歸于田畝既省軍費復增農力然後東兵三分一分屯邊以助土兵之勢一分移入次邊或屯關輔以息饋餉之困一分歸京師以嚴禁衛之防彼如納欵未變則東兵三分中更可減退又緣邊無稅之地所招弓箭手各使聚居險要每一兩指揮共修一堡以全其家與城寨相應彼戎小至則使屬户蕃兵暨弓箭手與諸寨土兵共力禦捍彼戎大舉則二旬之前必聞舉集我之次邊軍馬盡可勾呼駐於堅城以待敵之進退緣邊山坂重復彼之重兵必循大川而行先求疾速俟其得勝使我師沮而不出方敢散兵虜掠過越險阻更無顧慮我若持重不戰則彼之重兵行川路中糧草無所給牛羊無所獲不數日人馬困弊彼之重兵更不敢越險又未能決勝必不得巳而散兵虜掠我於山谷村落中伏精鋭以待之彼散掠之兵輕而寡弱可擊可逐使散無所掠聚不得戰欲長驅深入我則使諸將出竒以躡其後欲全師以歸我則使諸城出兵以乘其弊彼將進而有禍不三兩舉勢必敗亡此守䇿之要也攻䇿元昊巢穴實在河外河外之兵懦而罕戰惟橫山一帶蕃部東至麟府西至原渭二千餘里人馬精徑慣習戰鬭與漢界相附每大舉入冦必為前鋒故西戎以山界蕃部為強兵漢家以山界屬户及弓箭手為善戰以此觀之各以邊人為强理固明矣所以秦漢驅逐西戎必先得山界之城彼既逺遁然後以河為限冦不深入儻元昊歸欵則請假和䇿以待之如未通順或順而翻覆則有可攻之䇿非窮兵黷武角勝於絶漠之外臣等常計陜西四路之兵數幾三十萬非不多也然各分守城寨故每嵗戰兵大率不過二萬餘人坐食芻糧不敢舉動嵗嵗設備常如冦至不知賊人之謀果犯何路賊界則不然種落散居衣食自給忽爾㸃集併攻一路故虎狼之衆動號十餘萬人以我分散之兵拒彼專一之勢衆寡不敵遂及於敗且彼為客當勞而反逸我為主當逸而反勞我若復用此計彼勞我逸則取勝必矣臣等請於鄜延環慶涇原路各選將佐三五人使臣一二十人步兵二萬騎兵三千以為三軍以新定陳法訓練嵗餘候其精勇然後觀賊之隙使三軍互掠于橫山降者納質厚賞各令安土拒者併兵急擊必破其族假若鄜延一軍先出賊必大舉來應我則退守邊寨或據險要不與大戰不越旬日彼自困弊勢將潰歸則我環慶之軍復出焉彼若再圖㸃集來拒王師則又有涇原之師乘間而入使賊奔命不暇部落携怨則我兵勢自振如宥州綏州金湯曰豹折薑等寨皆可就而城之其山界蕃部去元昊且逺求援不及又我以堅城據之以精兵臨之彼既樂其土復逼以威必須歸附以圖安全三五年間山界可以盡取此春秋時吳用三師破楚之䇿也元昊若失橫山之勢可斷其右臂矣矧漢唐之舊疆豈今日之生事也備策臣等於陜西緣邊頗䆒利害所陳三䇿必可施用而國家禦戎之計在北為大臣等敢不經心且北戎久強在後唐日以兵四十萬送石髙祖至洛陽立為天子而還遂與石晉為父子之邦邀求無厭晉不能支旦釁起長驅南牧直抵京師虜石少主及當時公卿盡室而去幽燕遂陷為中原千古之耻尚未能雪國家以生靈之故與之結和將休兵飬民有所待也及天下無事人人懷安不復有征戰之議前年北戎驟變詭謀稱兵燕薊有背盟之虞割地之請國家倉卒無備難於用兵遂增重賂以續前好彼既獲利方肯旋師今乘元昊通順之議又欲邀主盟之功其勢愈重茍不大為之備禍未可量臣等固請朝廷力行七事以防大患一密為經略二再議兵屯三專於選將四急於教戰五訓練義勇六修京師外城七密定討伐之謀一密為經略者自河朔罷兵以來幾四十年州郡因循武事廢弛凡謀興葺則罪其引惹昨朝廷選差轉運使蓋欲革去舊弊預為之防然既有本職則日為冗事所嬰未暇周慮請選有材識近臣假以都運使之名暫往經畫使親視邉壘精䆒利害凡邊計未備者皆條上而更置之不出半年歸奏闕下更令中書樞密院子細詢訪熟議經久之計若敵情驟變則我有以待之矣二再議兵屯者自來真定府定州髙陽關分為三路其所轄軍馬未甚整齊及有一州兵馬却屬兩路之處又未曉本路將來於何處控扼合用重兵若干又甚處只宜固守合屯兵若干及三路互相應援次第須差近臣往彼密為經略方可預定法制臨時不至差失或事宜未動亦當相度兵馬合挪減於何處駐泊使就芻糧以省邊費庶免先自匱乏至用兵之日重困生民三專於選將者委樞密院於閣門祗候使臣巳上選人三班院於使臣中選人殿前馬步軍司於軍旅中選人或有智略或有材武堪邊上試用者逐旋進呈據選到人數以籍記之候本路有闕則從而差授如此則三二年間得人多矣四急於教戰者於陜西四路抽取曽經押戰隊使臣十數人更授以新議八陳之法遣往河北閲習諸軍使各知竒正循環之勢應敵無窮五訓練義勇者今河北所籍義勇雖約唐之府兵法制三時務農一時教戰然未見府衛之官而法制不行號令不一須别選知州知縣縣令可治兵者并增置將校使人人各知軍中之法應敵可用斯則強兵制勝之本矣六修京師外城者後唐無備契丹一舉直陷洛陽石晉無備契丹一舉直陷京師故契丹之心于今驕慢必謂邊城堅而難攻京師坦而無備一朝稱兵必謀深入我以京師無備必促河朔重兵與之攻戰戰或不勝則敵騎益驕更無顧慮直叩澶淵張犯闕之勢至時遣使邀求欲以大河為界我既無備將何以禦從之不可拒之必難又逼京師何以為計若京城堅固則戒河朔重兵勿與之戰彼欲戰不能戰謀深入則前有堅城後有重兵必將沮而自退退而不整則邀之可也是則修京城者非徒禦冦誠以伐深入之謀也漢惠帝時起六百里內男女城長安二年而畢唐明皇時城長安九十日畢考法於古擇利于今京城之修蓋無疑矣然須二年成之則民不勞苦人不驚駭矣七密定討伐之謀者彼幽燕數州人本漢俗思漢之意子孫不忘太宗皇帝既克河東乘勝北討數州吏民望風請命惟幽州未破我軍虛驚班師以來嵗月綿逺如天限其北無復輕議一昨盟好已搖安保其往當訓兵養馬密為方略以待其變未變則我不先舉變則我有後圖指彼數州決其收復使彼思漢之俗復為吾民成太宗皇帝赫怒之志雪石晉千古之耻則陛下之功如天如日著于無窮矣慶厯四年五月同樞密院使韓琦上仲淹時為參知政事宋名臣奏議卷一百三十四
