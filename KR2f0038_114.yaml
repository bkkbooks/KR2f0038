body:
  text: 宋名臣奏議卷一百十四宋趙汝愚編財賦門新法六上神宗乞不分析青苗虛認二分之息李常今月十九日准中書劄子奉聖㫖令臣分析甚處州縣使善良避結納之費虛認貫百以輸二分之息聞奏者右臣伏以諫諍之官為朝廷耳目事無大小皆許風聞以言陛下不以臣不才使備位諫省臣所論青苗錢事蓋為立法不良為害甚大不䝉省納寢罷乃令分析州縣所在是謂不正本而攻其末者上失朝廷設官之意下廢愚臣職業之守必以臣智識不明言事無狀則重誅逺屏臣何敢辭所有分析指揮不敢奉詔况臣居家待罪為日已久屢違詔㫖不供職伏望聖慈早賜貶竄以戒狂訕之臣熙寧三年四月上時為右正言先是常言散青苗錢毒流四海事至悉上問李常疏如何處置王安石曰常言善良有不納錢只認二分之息者可令常分析是何州縣如此曽公亮陳升之皆曰諫官許風聞言事豈可令分析上曰衆議洶洶如此有何意安石曰緣大臣或能內諷臺諫外結方鎮則不患無衆議也公亮曰安石為執政亦見執政諷諭諫官乎安石曰臣豈能知此但正人即不可諷邪人則何所不可公亮曰安石但欲已議論勝耳卒令常分析上神宗論青苗陳襄臣聞臣之事君有犯無隱夫犯顔忤㫖以取君父之怒豈其所欲哉蓋義有可言而不言非愛君之道此臣所以昧死而不敢隱默者也臣近以青苗之法騷擾不便欲乞寢罷以安人心未蒙俞㫖施行陛下聖性聰明固已曉然開悟但以王安石執議不變重違其情物論喧然不加聽察事之可者則置而勿問其不可者則無所不行豈非條例之臣為自安之計巧為飾說誣罔聖聰近者韓琦上言以河北俵散青苗錢立定貫百均與等第人户比之他路獨取利息三分顯是提舉之官違條抑配而朝廷並無黜責琦之論列足以知其非便而特寢不行吕景以畿縣之民逋負官物尚有五十餘萬不冝更與預支實慮虧陷官本而却令取勘夫擅行抑配者既無罪黜則掊克之吏無所不至不忍為搔擾者反蒙按劾則民之司牧何所措其手足哉故臣前曰此法一行騷動天下正謂此也陛下近以司馬光為樞密使中外翕然皆以陛下知光之言為是而悟制置司之為非今復遽然罷之者豈又以光言為非耶必以其辭而不受也然則光之所以不受者以陛下不行其言爾知其言而不用猶可以去又况有所受命乎如欲用之行其言而已矣何吝而不為哉輕進退於大臣失孚號於天下非所謂令出弗反之義也李常職在諫官既聞中外之議不敢不言事雖不實誠亦符之輿論况國家舊制自許風聞言事若令分析是欲使其必去將以杜言者之口恐非所以待諫臣之體而廣言路之道也凡此數事雖聖慮一時之失豈非聽者之誤乎禮曰有所忿􅓰則不得其正有所好樂則不得其正亦在陛下追而正之爾書曰改過不吝湯之德也自陛下臨政以來事無過舉唯用安石然後有更改之暴聖人施為自有法度合於道者取之不合於道者去之任天下之羣才取天下之公議堯舜三王之治可以指期而至又何必徇一士之曲議以貽黎元之患哉所有制置條例司如有可行事件欲乞只歸三司相度施行青苗之法早賜停寢則天下幸甚熙寧三年四月上時為侍御史知雜事上神宗論青苗鄭獬臣竊見青苗之法朝廷非不丁寧不欲强民而使其自便也故臣奉行亦不敢强以率民榜於諸邑召其所願請至於纍月而無一人至者此非其所願也明矣常潤蘇秀類皆如此近自提舉官入境所過諸郡方以次支散且將及於杭杭民聞之皆相告以為憂張榜纍月而無一人願請一日提舉官入境則郡縣更相希合舉民以與之此非强民而何是豈朝廷立法之意兩浙方今荒歉處處食糟溫台大疫十死七八將來豐凶未可知兼為增和買絹及置場市絹商賈阻絶物價不登若更散青苗錢則取於民者毋乃太甚乎民得數百錢隨亦費盡不計後日之輸納茍納之不足陛下若貰之耶必期於盡取也必期於盡取則非酷吏苛法不能行於是鞭撻禁錮以督之則將見撤屋廬賣妻子計甚窮則弃鄉里而逃矣當此之時陛下安忍以饑羸之赤子加鞭箠以求債耶若緩而不理則是朝廷無故捐數百萬緡於糞壤間虧損國家亦非細故是未覩青苗之為利而其害已如此宜其天下之致論多也臣初不敢論奏者以臣在杭必能為陛下守立法之意不敢强民以徇時今既易守青州方將去此而提舉官到且與諸邑合議而行臣實不忍杭州之民將有無辜而陷刑網者所以不能自已也伏乞陛下指揮兩浙路如已支散處則依條施行未支散處特賜寢罷庶使一路疲民逺沾聖澤熙寧三年四月上時以翰林侍讀學士知杭州徙青州未行上神宗論青苗文彥博臣位忝三公職當論道事有所聞深虧聖政默而不言則上負陛下眷倚之重近日以來中外喧傳以諸路散青苗錢深為不便臣比不知本末今訪聞知其由深可驚駭不近人情有玷聖化無甚於此臣謂此事豈可不達聖聰皆云朝廷主張及諸路所差之官承稟風㫖威福州郡故無有敢言於朝廷者臣曽見河北轉運司榜開析提舉常平官約束條目云所散青苗錢每十户以上結成一保須第三等以上有物力户充甲頭此乃是恐向去收納不足勒令上戶填納又欲散與坊郭人户其錢不得過抵當家業所直價錢之半且謂之青苗錢却支與坊郭户皆是廣圖利息不顧理道兹豈常平散斂之舊法朝廷救濟之本意此法於鄉村之民行之以待夏秋成熟折還斛斗絲帛即謂之舉放若祗令納本利見錢即謂之課錢將新抵舊遷延嵗時諸般折還未嘗了足以其有利債負官司不許受理今乃官自為之從古以來未嘗有此豈當聖朝而公行此法殊乖理道况聞鄉縣之民有窮迫之甚者即皆願請錢一時聊濟窘急向去必難填償此乃下民從來常事州縣既以逋缺必須散行催督追呼笞責何所不至兼聞州縣之民尤有積缺稅租貸糧并預支紬絹錢數甚多將來一併催納何由取濟所散官錢又成積缺提舉之官徼兾旌賞務成功利剝下媚上何恤於人州縣承風不敢申理臣恐緣此煩擾必致興起事端所有提舉官乞下本路勘驗事狀特行朝典以戒非理聚斂之臣書曰殷鑒不逺在夏后之世臣不敢以逺事證之且以唐開元末用宇文融楊慎矜王鉷等二十餘人建中初用趙贊陳京之䇿百方裒斂剝下害民歸怨于上當時執政議臣以姦佞結黨以財利媚上方被寵信不敢指言其非唯張說陸贄苦言之不蒙聽納仍遭踈斥馴致祿山涇師之亂鮮不由斯禮云與其有聚斂之臣寧有盜臣信不誣矣方今朝廷清明表裏無事以天下之廣財賦所入比之祥符以前其增有及倍者亦可謂無遺利矣若以用度稍乏自當減節冗費省罷不急之務不作無益之事濟之以儉示民不奢百姓自足君孰與不足易曰節以制度不傷財不害民此之謂也夫與治同道罔不興與亂同事罔不亡陛下視開元之末與建中之初所用宇文融楊慎矜趙贊陳京之法治之道耶亂之事耶兹固不言可知誠可為聖朝之商鑒近時以來中外臣寮上言興利者甚衆大抵希時幸進妄作者多徒自紛紜必寡成事伏願一切罷之唯內外計臣尤須遴選州縣長吏得忠願亷謹之人臺閣近臣無憸邪朋黨之士則不治自治太平可期陛下可以垂衣端拱而化成矣臣愚不識忌諱發於至誠冒昧以聞伏增惶懼隕越之至熙寧三年上時彥博為樞密使纍言青苗不便上曰吾令中使二人親問民間皆云甚便彥博對曰韓琦三朝宰相不信而信二閹乎王安石每有中使宣召及賜豫所贈之物必倍舊制隂結入內副都知張若水押班藍元震因能固上之寵上使二人潜察府界俵錢事還言民皆情願無抑配者故安石行其法益堅上神宗論新法不敢赴臺供職張戩臣近乞罷制置司及諸路使者并言散錢取利為害及王安石處事乖謬專為聚斂好勝遂非狠愎日甚吕惠卿險薄姦凶尚留君側而曽公亮陳升之趙抃等心知其非依違不斷觀望回避顛危莫扶及臣識昧知幾言乖悟主均為得罪乞正嚴誅等事並未施行今大惡未出橫斂未除不正之司尚存無名之使方擾臣自今月十二日以後更不敢赴臺供職居家待罪熙寧二年四月上時為監察御史裏行既上疏又詣中書力爭辭氣甚厲安石怒戬遂落職知江陵府公安縣上神宗論新法乞降責程皓臣聞天下之理本諸易簡而行之以順道則事無不成故曰智者若禹之行水行其所無事也捨而至於險阻則不足以言智矣蓋自古興治雖有專任獨决能就事功者未聞輔弼大臣人各有心睽戾不一致國政異出名分不正中外人情交謂不可而能有為者也况於措置失宜沮廢公議一二大臣實無大計用賤凌貴以邪妨正者乎凡此皆天下之理不宜有成而智者之所不可行者設令由此僥幸事小有成而興利之臣日進尚德之風寖衰尤非朝廷之福矧復天時未順地震連年四方人心日益搖動此皆陛下所當仰測天意俯察人事者也臣奉職不肖議論無補望允前奏早賜降責熙寧三年四月上時權監察御史裏行由是罷為權發遣京西路同提㸃刑獄上神宗辭提刑程皓臣伏䝉恩差權京西路提刑已瀝懇誠不敢祗受願從竄謫日兾允俞不避煩瀆輒再陳請臣出自冗散過䝉陛下拔擢置在言責伏自供職以來每有論列唯知以憂國愛君為心不敢以揚已矜衆為事陛下亮其愚直每加優容故常指陳安危辨析邪正知人主不當自聖則未嘗為諂諛之言知人臣義無私交則不敢為阿黨之計明則陛下幽則鬼神臣之微誠實仰臨照然臣學術寡陋智識濶踈徒有捧土之心曽微回天之力近以力陳時政之失併論大臣之非不能禆補聖明是臣墮廢職業既已抗章自劾屏居俟命豈意刑書未正而恩典過頒使臣粗知亷隅必不敢䝉耻願就如或見利忘義􅌤面受之陛下有臣如此亦將安用况臺諌之任朝廷紀綱所慿使不以言之是非皆得進職而去臣恐綱紀自此弛廢臣雖無狀敢以死請伏望陛下開白日之照厲嚴霜之刑投謫荒陬實所甘分熙寧三年四月上上謂王安石曰人情如此紛紛奈何安石曰陳襄程皓專黨吕公著都無助陛下為治之實今當邪說紛紛之時乃用襄知制誥皓提㸃刑獄又稱其平正此輩小人若附公著得行其志則天下之利皆歸之既不得志又不失陛下奬用何為肯退聽而不為姦乃以為僉書鎮寧軍節度判官事上神宗論王安石李常臣聞易曰王臣蹇蹇匪躬之故臣自惟狂瞽冒拂天威固已數矣然其縷縷之誠所以不已者切服大易之義知有犯無隱不知其身之可保也然臣非不知朝夕蒙誅不忍輒有伏藏不盡之意為無窮之恨請一二陳之惟陛下裁擇臣伏見陛下即位未幾起王安石於江湖之上曽未數對遂參機務方是之時中外相慶以為三代之隆可以立俟也安石乃首建制置三司條例天下之人始議其身任大政而專有司之事然善士猶或恕之謂其先公家之所不足將佐陛下以仁義理財賦節儉先天下交物以道奉養以禮重損浮費圖實廪庾凡教化之事猶有待也已而立均輸之議造青苗之法天下之人固已大駭而善士猶未之深議謂其志在便民均一有無逺希先王補耕助斂以為於理無嫌及降詔取利牽合經㫖謂周公資用於國服之息利害已白而持之不改雖善士不復以為是直謂其誑惑朝廷愚瞽海內所以議論交起不可抑止者其故何也義與利之為道異也始稱倣古以行義故君子猶或恕之終則不顧以嗜利雖衆人莫之與也及發七難以拒言者其辭迂其理僻天下之人益知其所存盡於此不復有義理之實徒欲文過求勝豈以生靈存亡之命社稷安危之機為計哉今條例司於浮費無所節損日造罔民之法均輸官不能通天下之有無百端以射利提舉官奉青苗之令納民於困窮陛下固嘗謂溥天沸騰黎民騷擾矣夫政莫酷於剝民以無度禍莫大於知過而不改古之所以亡國喪天下未有不漸於此者噫今日之弊豈難濟哉改之而已昔者周公蓋有過矣孟子曰其為過也人皆見之及其更也人皆仰之孔子則自訟其過矣曰丘也幸茍有過人必知之又曰過則勿憚改又曰過而不改是為過矣安石不知慮此陛下又從而不悟何也臣亦略聞其所以遂非而不改者有三焉不堪怨仇與士大夫之所譏議而不改一也狹中自信恱諂諛惡誠直遂不以為非而不改二也慿依小人日滿其門進退榮悴繫於事之興廢競為諂辭以恱之忿言以怒之使其持之益堅期於必勝不問義理之所在因以不改三也此三者皆安石自為也所以受敝者陛下之百姓也所以當慮者陛下之社稷也此臣所以竊為陛下惑也陛下仁明睿智早聞道要未壯御宇享祖宗久安之基視圖按籍惻然悼黔首之未乂延見卿士慨然歎人才之不足方欲盡收天下之英俊共講平治之術創為可繼之業今乃相與守區區之弊法又欲卿士大夫阿意順㫖而奉行之其不然者從而竄逐之非獨安石負陛下任使之意陛下亦負天下所以用安石之初心矣臣不知陛下甘其所以得利而力行之耶徒恱其順適心意而惡違忤之耶抑曲徇安石而茍為之耶臣請陳此三者凡苛朘巧削之不可臣前論列多矣不待再講而後明也今陛下深居九重豈盡知百姓之困苦謂其比户溫飽倉有餘粟篋有餘帛可以任權數而採取之耶四海一家皆陛下之赤子而欲效管仲以千里之齊罔鄰國之人耶又况術疏䇿陋為之輒有後灾乎方今中下之户農桑之所得才足以輸稅者往往皆是也嵗惡不入不食草根木皮者寡矣尚忍以巧斂之法而虐之乎今陛下甘其所以得利臣姑以利言之凡百姓之有兩稅猶人之有終身之病也夏稅之輸常至九月十月秋稅之輸常至明年四五月秋稅未絶夏稅又起催矣每催理不足縣令懼踰限之責必強人吏代納然後以鞭笞追還之非為令者懈慢不職民貧不可以迫遽取辦故也兩稅病民如是青苗錢又可及時以斂之乎且十八路之廣一嵗之間必有三路罹蟲蝗水旱之灾者則其逋亡倚閣失陷之數不為少也又况不幸遭大饑饉捐瘠流離起為盜賊所謂本利者復何有哉假如一嵗貸錢千萬為利才二百萬臣恐二百萬之利不足以償失陷之數尚可望其息錢以資國用耶且以利言之不足以得利較然甚著矧悖義傷化殘民害物斂怨召亂不可一二道哉陛下雖甘其利而力行之其無益可謂明矣今朝廷患財用之不足未聞陛下以節儉先天下而一宫殿之費或以百萬計一宴逰之費或以數萬計而欲錙銖取於困窮之民偏聽獨任非順適心意之言不取又將悉誅而去之是欲上下雷同小大阿黨而無一言異者陛下謂如此為朝廷之福耶非也孟子曰入無法家拂士則國常亡又稱文王之德者曰以諤諤昌凡古之所謂衆賢和於朝與舜命九官濟濟然和之至者非雷同阿黨能順適人主之心意之謂也昔齊景公謂梁丘據曰據與我和晏子曰是同也非和也公曰和與同異乎曰和如羮焉君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否古之君臣以獻可替否為和非雷同之謂也君臣之間既不可雷同如此卿士大夫進則陳力就列退則遊從講習又可得而阿黨哉周公之事召公嘗不恱矣孔子之舉子路嘗愠見矣子夏之言子張嘗不取矣昔趙宣子用韓厥為軍司馬厥戮其僕宣子以為可賀左雄薦周舉為尚書舉劾其罪雄自以為知人吕公著孫覺與王安石皆平日相友善之人也豈欲一旦遽相絶哉蓋朝廷之事不可以私好廢公議不得以枉道為阿黨也是朝廷之所樂得安石所當願聞也前日孫覺之奉詔出按非以其法為可行也已而避免豈有他哉直以為不俟往而知其法不可行也陛下原其心為有罪者耶吕公著陛下任為御史中丞矣臣雖不知其言之詳然禍亂之機危亡之漸御史中丞且不得言孰得而言者今摘其造辟之言以為罪臣恐上下顧避大小觀望交事鉗默陛下聰明不復廣矣陛下雖罪孫覺為反覆公著為誣藩鎮天下之人皆謂陛下為其忤㫖又為其忤安石之意也儻陛下之意皆不為前所陳二者姑欲曲徇安石而茍行之則復有大駭深憂者安石狹中自信寖違義理以必行為期以取勝為事無復以生靈之存亡社稷之安危為念凡異巳者必致之罪而擠去之同已者無問能否而進擢之臣不知陛下負扆南面傳祖宗百年之業而揔四海九州之命為其遂非角勝之資以慶賞刑誅之柄為其立朋報怨之具深為陛下不取也近者司馬光移書安石條例之司常平之使曰可罷則天下之人咸被其澤曰不可罷則天下之人咸被其害方今生民之憂樂國家之安危係安石之一言爾誠如光言則是行與否雖陛下不得專矣况安石忽事而輕信徒有忿克之心因其性蔽而隂導之者吕惠卿也今安石喜怒好惡事之用舍唯惠卿之聽則是生民之憂樂國家之安危亦不獨係於安石之一言又係於惠卿矣嗚呼古之陪臣執國命政逮大夫者豈異此也司馬光固非狂悖不思以出此言也陛下將不以為慮耶噫社稷大寶也生靈重事也蓋不可忽易守也昔詩人傷周室之大壞不過曰曽是強禦曽是掊克曽是在位曽是在服陛下試察此四者於今為少耶詩曰不自為政卒勞百姓又曰盜言孔甘亂是用餤臣願陛下燭之以獨智斷之以心術博取輿論曲循至理純取先王之道改謀長世之䇿無為盜言之孔甘殘弊百姓以階亂豈獨臣之幸社稷生靈之幸也孔子曰不曰如之何如之何者吾末如之何也已矣蓋言智者察於未萌明者見於未形不使無可奈何之悔至大駭而後圖之也臣鄙野之人分甘貧賤自去夏以來四乞外任不䝉俞允誤被責任復不獲避自顧狂妄譏訕為多今復發憤悶悉肺腑愚直之誠期死而後已設陛下終不以其言為然願懲任使之失早賜竄戮不勝幸甚熙寧三年四月上時為右正言上神宗乞自擇臺諌司馬光臣切見近日臺諫上言制置三司條例司害民及吕惠卿奸邪者率被責降或更加以惡名如吕公著告辭云乃誣方鎮有除惡之謀中外聞者無不愕駭切惟朝廷之意無他止欲懲戒來者使不敢復言耳國家置臺諫官以為天子耳目唯恐政事有闕失百姓有疾苦大臣專恣左右奸邪天子深居九重不能得聞故也今臺諌官稍有懷剛直之志畏天下公議憂念朝廷哀憫百姓忤犯大臣刺譏左右者陛下輒罪而逐之更使大臣自擇所親以代其任萬一又為公論則又逐之是必得庸懦阿諛不知亷耻附下罔上背公死黨之人然後止耳若言路皆此等之人則禁闥之外陛下耳目之所不及雖有至大之事陛下何從知之如此豈宗廟社稷之福也晏子曰君所謂可臣亦曰可君所謂否臣亦曰否若以水濟水誰能食之今陛下使大臣自擇臺諫官大臣又取同於已者存之異於已者去之則陛下獨與大臣為天下足矣何必更置臺諫官也且條例司之害民吕惠卿之姦邪天下之人誰不知之獨陛下與王安石未之悟耳豈可更為之黜逐臺諌以長其威福成其氣勢臣切為陛下寒心今臺諌官已被逐者臣不敢留唯願陛下自擇公正剛直者布之言路以明四目達四聰勿使為羣下所欺蔽則天下幸甚臣受陛下過分之恩不敢塞默雖死仇怨之手猶賢於竊祿偷生者也熙寧三年四月上時為翰林學士上神宗論青苗陳襄臣近以青苗之法擾民為害欲乞寢罷其制置司立法之誤中外言者已詳臣故不一一論列上煩聖聽但以方今天下生民凋弊財力殫竭二稅之外更有無名科率何啻十色有餘若復俵散青苗錢實恐民不堪命陛下以至仁求治凡欲更張法度皆以為民安有取民脂膏以為貸息而謂周公太平已試之法哉陛下之心必不為此然則天下之人皆知誤陛下者王安石也誤安石者吕惠卿也以陛下聰明觀天下之論議其法利害固已灼然可知奈何安石持强辨以熒惑於前惠卿畫詭謀以隂助於後加以反覆比周之小人隨時觀望平日公論則舉知其法之非一揉於利則又言其法之是此雖陛下之至聖不能無惑雖臣等之至忠亦不免指為朋黨也近者諫官李常以言事待罪尚令分析孫覺以奏對反覆落職外遷御史中丞吕公著而下皆以不職為言乞從責降而臣獨區區未敢以請者尚兾犬馬之誠一悟聖意許以青苗之法下議百官如臣等之言非則甘從逺竄以戒妄言如臣等之言是則安石惠卿亦乞特行貶黜以謝天下熙寧事年四月上時為侍御史知雜既而有㫖召襄試知制誥於中書襄以言不行辭不就試乞補外王安石請用為集賢殿修撰陜西轉運使命未下上批别進云遂罷知雜事為同修起居注上神宗論青苗歐陽修臣伏見朝廷新制俵散青苖錢以來中外之議皆稱不便多乞寢罷至今未蒙省察臣以老病昏忘雖不能究述利害茍有所見其敢不言臣今有起請事件謹具畫一如後一臣竊見議者言青苗錢取利於民至煩聖慈命有司具述本末委曲申諭中外以朝廷本為惠民之意然告諭之後搢紳之士論議益多至於田野之民蠢然固不知周官泉府為何物但見官中放債每錢一百文要二十文利爾是以申告雖煩而莫能諭也臣亦以謂等是取利不許取三分而許取二分此孟子所謂以五十步笑百步者以臣愚見必欲使天下曉然知取利非朝廷本意則乞除去二分之息但只令納元數本錢如此始是不取利矣蓋二分之息以為所得多耶固不可多取之於民所得不多耶小利又何足顧何必以此上纍聖政一臣檢詳元降指揮如災傷及五分已上則夏料青苗錢令於秋料送納秋料於次年夏料送納臣竊謂年嵗豐凶固不可定其間豐年常少而凶嵗常多今所降指揮蓋只言偶然一料災傷爾若才遇豐熟却須一併催納則農民永無豐嵗矣至於中不熟之年不該得災傷分數合於本料送納者或人户無力或頑猾拖延本料尚未送納了當若令又請次料合俵錢數則壓積轉多必難催索臣今欲乞人户遇灾傷本料未曾送納者及人户無力或頑猾拖延不納者並更不支俵與次料錢如此則人户免積壓拖缺州縣免鞭朴催驅官錢免積缺失陷一臣竊聞議者多以抑配人户為患所以朝廷屢降指揮丁寧約束州縣官吏不得抑配百姓然諸路各有提舉管幹等官往來催促必須盡錢俵散而後止由是言之朝廷雖指揮州縣不得抑配百姓請錢而提舉等官又却催促盡數散俵故提舉等官以不能催促盡數散俵為失職州縣之吏亦以俵錢不盡為弛慢不才上下不得不遞相督責者勢使之然各不獲巳也由是言之理難獨責州縣抑配矣以臣愚見欲乞先罷提舉管幹等官不令催督然後可以責州縣不得抑配其所俵錢取民情願專委州縣隨多少散之不必須要盡數亦不必須要州縣之民户户盡請如此則自然無抑配之患矣右謹具如前臣以衰年昏病不能深識逺慮所見青苗之議久已喧然中外羣臣乞行寢罷者不可勝數其所陳久逺利害必已詳盡而無遺失一日陛下赫然開悟悉採羣議追還新制一切罷之以便公私天下之幸也若中外所言雖多猶未能感動天聽則見行不便法中有此三事尤係目下利害如臣畫一所陳伏望聖慈特賜裁擇熙寧三年五月上時為觀文殿學士知青州宋名臣奏議卷一百十四
