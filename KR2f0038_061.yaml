body:
  text: 宋名臣奏議卷六十一宋趙汝愚編百官門內侍上上仁宗論都知以下不可無名優加使額韓琦臣伏聞寒暑順則嵗功成賞罰明則君柄重故王者興化立政動法天道必功而議賞必罪而行罰若春夏之生殖秋冬之肅殺物無不從也茍異於是猶當寒而燠當燠而寒物無不違也善為國者能執其中以馭天下則堯舜之盛可得齊焉臣材朽職近猥參諌諍之末有所聞見每願竭肝膈上補醇治少副陛下隆寬廣問之意故莫敢容默于位以負甄擢惟陛下矜而察之臣伏見近者睦親宅告成自提舉臣寮而下有詔增秩用勸勞者入內內侍省副都知張永和實總其事故有遙領團練之命逮夫同列旋亦推恩當時公言共謂非是蓋以其一官之故而衆人䝉賞故也或以謂省局之內官次相妨因而叙遷未甚為害臣是以不敢遽有論列今聞前省都知以降又復優加使額臣竊觀衆論益以懷疑誠以勸沮之方爵賞為大若匪問其官簿酬以年勞則必顯著功籍時申寵拜或不由是皆涉無名故書曰官不及私昵惟其能爵罔及惡德唯其賢昔衛人賞于奚以邑辭請繁纓以朝而許之孔子聞之曰惜也不如多與之邑惟名與器不可假人東漢館陶公主為子求郎明帝不許賜錢千萬而曰茍非其人民受其殃是以難之斯皆古先哲王謹刑賞之源也伏望陛下念恩私於近則勞臣必怨失知其救則大猷日新特示至公亟行追寢使褒一功而天下勸正一罪而天下服為善者彌思於勵行不仁者更務於革心式臻嘉靖之風永協大中之化景祐三年九月上時為右司諌諫院供職上仁宗論都知押班不可升於閣門引進之上乞收回先降劄子更不施行孫沔臣竊聞內侍别立主司中官自通禁省有唐四品不過於典制五局兼置於令丞所以分中閫之政不使挾外廷之議如此檢節尚至侵陵故聖宋以來明制斯在太宗著令式之文真皇述針規之訓明詔近習各守行藏豈令輕干國柄竊弄天機一言成於毁譽三事出於吹噓所繫安危尤加約束是以先朝秦翰等數人履行端謹節義深厚心皆好善意不害人出則總邉方之寄歸則守內庭之職俾之兼領亦不侵官止守使名終無殊命今聞欲以都知押班之資外干閣門引進之上隳國家之舊典起宦寺之威權况內殿起居則别班外朝集㑹則不預安用異數竊據橫行蓋因幹當局務之間多與文武官員同事爭列名銜自尊位貌遂欲改革品秩僥冀寵榮誰啓厲階輒敗經制今邊陲用武賞罰是先遴㨂官資尚難激勸豈冝閽寺之人更居侯伯之上竊恐將帥之臣耻居其下䇿勳之際不重此官大紊紀綱事亦非細伏望皇帝陛下守祖宗之規式戒左右之權幸則朝廷之福天下之幸也所有先降劄子下閣門重定都知押班立次乞更不施行慶厯元年上時為右正言上仁宗乞都知押班奏䕃一仍舊制張方平臣昨聞重定二省都知押班等著在閣門使之上物議雜起深以為非當時有司無人論執茍從其請既已失之今又聞二省陳乞奏授子孫恩澤於常秩上更加一等此事若行不唯違越祖宗法度隳紊朝廷典章必致陛下有私近習之名大臣有阿親幸之醜內侍有恣橫之議諌官御史有隱默之尤且都知押班地處親近冝為朝廷愛惜事體動循軌度孜孜徇公如此僥求何以示外易曰履霜堅冰至言當戒其漸也漢之事臣嘗為陛下言之矣伏乞聖斷深賜察納其都知押班奏䕃恩例伏乞一仍舊制慶厯元年五月上時知諌院上仁宗論內臣權任稍過乞加裁抑包拯臣伏覩先朝實録竊見真宗皇帝因對輔臣言及前代內臣恃恩恣橫蠧政害物朕常深以為戒至於班秩賜與不使過分有過未嘗矜貸此輩常亦畏懼王旦等對曰先代事跡昭然足以為龜鑑而聖慮言及於此社稷之福也臣竊見近年內臣祿秩權任優崇稍過恐非所以保全之也以陛下英明神斷有罪必罰此輩或不敢為大過然在制之於初免貽患於後伏願陛下佩服先帝之言以為格訓凡事更加裁抑則天下不勝幸甚慶厯四年上時為監察御史裏行上仁宗乞罷王守忠兩使留後俸料何郯臣伏聞降敕命以昭宣使王守忠修祭器物勞效特除景福殿使仍賜節度觀察留後月俸臣始初風聞內批指揮止授守忠宣慶使次日聞授節度觀察留後今雖節度觀察留後之命不行仍以月給賜之復遷改使名勞淺賞重中外之議頗不為允夫爵位之設以待勞臣而勸忠義故賞之厚薄視功之大小歸乎不虛授而已至於舉一職領一事有所幹濟蓋人臣戮力之常分也以常分而受賞典已為過矣賞又厚焉適足以啓僥濫之源也且守忠之掌修祭器亦人臣領一事戮力之常爾然陛下重宗廟之事以報其勞自昭宣使超授宣慶使恩奬之行不過不薄適其中也而守忠曽不滿望仍要君命夫以小勞職分之常而所求猶如此過當則後來有冒矢石捍邉冦之臣果有顯效則將何爵賞以稱其意焉况內臣領遙郡祖宗之制止於觀察使然非積勞未嘗妄授今守忠雖不授兩使留後而得給其祿人情所希皆起於漸既得其祿必欲其官茍又從之是何位之不可求也夫事戒其始末猶不禁况不戒焉則弊將橫流矣其王守忠欲乞只依元降指揮授以宣慶使所有兩使留後俸料亦乞罷給陛下如欲優示寵待則乞厚以金帛賜之足為恩假至於爵祿公器不可輕授授之不濫則朝廷紀綱庶可存焉臣以空踈獲備耳目遇事即言因無忌諱伏望聖明特賜省納慶厯八年八月上時為侍御史知雜事上仁宗論王守忠預紫宸殿上宴何郯臣伏聞閣門近進四日紫宸殿宴人使坐圖入內都知王守忠亦在楊景宗下預坐臣訪聞得閣門儀制內外臣寮帶刺史節度觀察留後並係遙郡不得正官班列以至賜與進獻頗甚殊絶唯正刺史巳上凡遇宴㑹坐次方許列在殿上今若以守忠帶兩使留後便依正官例升殿預宴即是自今內外臣寮凡帶遙郡皆合殿上預坐啓僭壞法莫此之甚且朝廷儀品所以辨尊卑上下之分不可輕棄舊章以生紊亂况祖宗典法未嘗有內臣殿上預宴之事此弊一開所損不細伏望指揮下閣門速行改正一遵舊制仍令今後遇有宴㑹臣寮職位不合預坐之人不得妄有升進坐次所兾示朝廷紀綱之正戒人臣僣差之望慶厯八年十一月上時為侍御史知雜事初景福殿使梓州觀察使入內都知王守忠領武信留後尋詔守忠如正任班他無得援例守忠遂移閣門使綴本品坐宴西上閣門使錢晦言天子大朝㑹令宦官齒士大夫坐殿上必為四夷所笑然竟為奏定坐圖及郯有言守忠自知未允宴日辭而不赴上仁宗論不冝貸何誠用何郯臣昨訪聞修瓊林苑看池樓兵士經三司論告監官內臣張繼升盜官材木方下軍巡院勘劾為事連及御藥院祗侯何誠用尋奉中㫖釋放臣於十月十日已具劄子論列乞重下有司勘鞫用辨虛實至今未䝉指揮處置緣繼升所犯情狀於法不輕未正典刑頗涉物議臣既有聞見理當盡言夫聖王御天下其要在刑政齊一而治化興焉莫怨於仇讎而有功必賞莫愛於親戚而有罪必罰賞不以仇讎廢罰不以親昵弛然後綱紀法令莫不粲然而政之廢舉猶有逺近事之利害猶有大小朝廷親昵之臣近也有罪不治其害大天下疏外之臣逺也有罪不治其害小何則朝廷本也天下末也繩小自其大正末從其本將欲正天下必先正朝廷將欲正朝廷必先正親昵未有親昵正朝廷亂未有朝廷正天下亂也伏以陛下自紹休聖圖刑政之柄修舉不墜臣庶有犯少所寬假今宥繼升豈非誠用因方在親侍以纍及為請故薄其罪以貸之夫以誠用被陛下恩私故貸其刑是罪均而罰異也或將盡宥則政弛而法隳也此則溺愛之弊越於前而害政之隙開於後也人君制刑罰於親踈無異也非不仁也蓋將正一罪則使千萬人懼也今以恩貸一繼升必將啓百繼升之犯從而赦之是獲安全者寡而陷僇辱者衆也昔漢武帝時隆慮公主子坐殺人廷尉請論罪帝不敢以親故誣先帝法遂可其奏唐憲宗時五坊使楊朝汶因理五坊息利錢囚捕平人裴度因對極言上曰欲與卿商量東軍些小事我自處置度曰用兵小事也五坊使捕平人大事也兵士不理只憂山東五坊使暴橫恐亂輦轂上大悟乃罪朝汶推是而觀二主非薄於骨肉親昵示不以私恩害公義也伏望陛下以漢唐二主為監割不忍之恩正罪人之名使中外之人釋然知刑政無所私則天下幸甚臣踈逺而議親近豈不知誠用方被眷遇威權甚盛言發則禍及無所畏避者蓋職在言責不忍負陛下奬用也謹録漢武帝唐憲宗所行事迹二條進呈伏乞聖慈特賜省察并臣前奏下中書施行慶厯八年上時為侍御史知雜事上仁宗乞不許內外臣寮奏舉近上內臣何郯臣伏見近日臣寮纍有舉奏近上內臣乞陛進職任差遣朝廷亦多從其請酌其事體於理非便緣內臣雖在外任遇赴闕奏請公事非時出入禁中於陛下左右最為親近或有干請易為通達不冝使外臣與之交結以長弊幸况外臣薦舉內臣本亦不為朝廷擇人皆是希附恩幸為因緣進取之階此風不除必敗綱紀伏望聖慈特降指揮戒約內外文武臣寮自今更不許舉薦近上內臣若奏狀下中書樞密院亦望不行其間或有不可任使之人則乞從朝廷選擇如此則使中外之臣各有分守可以杜苞苴請託之弊慶厯八年上時為御史知雜事上仁宗論內臣有過犯曽經落職之人更不許充入內內侍省都知等職次何郯臣伏聞近日入內內侍省都知職次有闕例當遞遷緣此職任日夕在陛下左右最為親近所冝遴擇循謹無過之人充選其有罪纍降黜之流不可復議除授况朝廷近日申明內臣條約曽經落職更不許充入內內侍省都知等職次自再立此條約今方第一次遷改切冝遵行以明命令之信其或自棄定制除授失當竊恐命行之後羣情不允必致人言煩黷聖聽臣所以先事論列者欲兾朝廷採擇凡一爵賞無有過差以厭人心伏望聖慈特賜宣諭中書樞密院大臣今來遞年入內內侍省都知等職次並令依近日申明條貫施行其過犯曽經落職內臣不在進擬之限所貴遴擇親侍預選必䖍皇祐元年上時為御史知雜事上仁宗論葛懷敏復內侍名職臣聞昔者葛懷敏先任入內內侍省副都知管幹皇城司公事宿衛不謹致逆徒竊變震驚宫闈嚮非宗廟社稷之重陛下乘輿幾殆及逆徒既獲又不生致規滅姦人之口天下之議罪在懷敏楊景宗二人而巳臣每念此事痛心扼腕陛下仁聖不忍加重誅止解內職令居外任今因奏事忽有此命若再復內侍名職且赴本任是不久將復入內侍省之職也若再居內省則宿衛之變復未可知兼條制內臣都知副都知之職有過降充外任便不許再居舊職所以防一切之微誠深逺之法制也伏望陛下令有司檢詳舊制追寢今命法制一壞復之良難有此違礙臣不敢草制其中書送到詞頭一道臣輒封還皇祐元年十一月上時為知制誥上仁宗論王守忠不當除節度使孫抃臣伏聞內降詔㫖付中書除授入內都知王守忠充節度使臣初聆此言驚駭未信何也自陛下臨御以來三十年矣其聖意卓然髙邁前古者有三舅家之親頗循法度中宫近戚亦自斂職內侍貴人不敢踰越此皆前世所難之事而陛下誡飭訓勵鮮有妄干天下大賢正人歌頌宸𠂻皆謂周成康漢文景不能如是故雖夷狄外強蝗旱內作而元元晏然不失太平乃陛下數事感天地信生靈使之然今一旦以統帥之官付中貴豈陛下之心哉臣謹按唐制大總管大都督之職帶使持節則謂之節度使所以尊嚴將領專制軍事安危成敗一以繫焉豈冝中官得處其任太宗朝王繼恩平劒南有大功朝廷議其賞止進順州防禦使乃别立宣政之號以寵之陛下若以守忠勤盡嵗久則富祿之安佚之奬慰之可也獨不當假大官秩以踰祖宗典法以損陛下聖明臣謂此議必不可行外取天下四夷之笑伏乞聖斷於制敕未降已前特賜寢罷皇祐五年上時權御史中丞上仁宗乞禁止輒宫童幼吳及臣聞書云官師相規工執藝事以諌臣不肖親逢寬仁之主為執法吏輒原刑罰之本願效愚忠惟陛下幸憐赦臣以畢其說竊惟前世肉刑之設斷肢體刻肌膚使終身不忘以至屨賤踊貴有鼻者醜刑罰之濫乃如此漢文感緹縈之意謂刑者不可復屬雖欲改行為善其道無由故於肉刑易之以鞭笞曰斬左趾者笞五百劓者笞三百然已死而笞未止外有輕刑之譽內實殺人景帝益寬之僅有存者祖宗覽既往之弊蠲除煩苛顧我細民愛同赤子始用折杖之法新天下之耳目兹蓋曠古聖賢思所未至一旦决而行之海隅元元如被父母之教惠澤之厚淪於骨髓矣陛下至明如日廣覆如天髙拱法宫深惻民隱何嘗不申敕羣吏親覽庶獄而疑讞屢報罔不䝉生歷代用刑未嘗如本朝之清冝乎天報之佳瑞鍚以純嘏陛下方當隆盛之際未享繼嗣之慶者臣竊惑焉臣聞天地之性人為貴王者之治故當上調隂陽下順萬物一蟲魚之細一草木之微不當其冝則執政者有罪焉耳况乎肖方圓之貌禀精粹之靈乎天其意者宦官太衆而陛下未悟也何者古者肉刑之一曰宫聖人除之所以重絶人之世今陛下不以為意使宦官之家競求他子勦絶人理希爵賞為門户之庇童幼何罪陷於刀鋸因而夭死者未易具數夫有疾而夭者治世所羞况無疾乎有罪而宫者前王不忍况無罪乎臣又聞漢永平之際中常侍四員小黃門十人爾唐太宗定制無逾百員臣不敢逺引漢唐取必於當世請以祖宗近事較之陛下試觀祖宗時宦官凡幾何人今凡幾何人衆寡之差不待臣言而陛下可見臣愚以謂胎卵傷而鳯凰未至宦官盛而繼嗣未育伏望陛下順陽春施生之令濬發德音詔巗廊大臣詳為條禁進獻為宦官者一切權罷進獻罷則不足任使臣謂非不足也弊在掌典他務之過也陛下若令宦者兼領外事則雖多而不足如令專守中禁則雖少而有餘且宣傳聖㫖分幹職任則有外廷三班之臣在外何必區區於中人哉今三班使臣待闕都下率三二嵗未能補吏至於出妻鬻子嗟怨道途和氣既傷亷隅都盡抑亦內臣侵牟員闕所致今既罷去進獻絶領他務姑可許飬子得以為後但勿去其勢耳於內臣之計則不至傷恩於陛下之私則不為害物若然天心必應聖嗣必廣召福祥安社稷之䇿無先於此孟子有言老吾老以及人之老幼吾幼以及人之幼惟陛下留意中外不勝幸甚至和元年上時為審刑院詳議官上仁宗論石全斌等護葬妄兾恩澤范鎮臣九月中上言外議皆謂石全斌等緣溫成葬事妄兾恩澤陛下上顧月入南斗之戒重謹爵祿不可輕授是時陛下面諭臣本無此議又云若與此輩轉官是幸朝廷之禍也臣退而竊喜陛下之言至明至聖又以為外議不足聽也比自臣接伴回至雄莫間道路傳聞石全斌自作坊使轉宫苑使自綿州防禦使轉利州觀察使其餘幹當使臣例轉兩資臣惟天子之言豈有不信臣下者如此必全斌等日久求請陛下重違拒之大臣又不為陛下執奏使天下之人有以議陛下者章獻皇太后輔佐陛下臨御天下章懿皇太后輔佐陛下章惠皇后保護陛下三太后皆有母道於陛下其葬之日監護之臣遷拜未嘗如此之寵也賜與未嘗如此之多也使天下之人議陛下篤溫成之愛而有輕三太后之心實繇全斌輩之冒濫也繇大臣之不執奏也本朝觀察使未有緣護葬而輕授者臣為諌官若不論奏是臣負陛下責任之意乞以臣章下中書樞密參詳以臣言為非乞罷臣職放歸田里使免尸素之咎以臣言為是乞追還全斌告敕以塞衆議至和元年十一月上時知諫院上仁宗論石全斌不當除入內副都知劉敞臣竊見入內押班石全斌為入內副都知臣謹按全斌昨已有制㫖除宫苑使利州觀察使未能三日復换此命朝令夕改古人所非有若因全斌自陳探其不滿之意曲徇所求以恱其心便是朝廷恩典本無定制唯繫宦官臨時徼乞宣布天下必以為惑傳示後世必以為笑何則陛下賞罰當信天下當教後世不知全斌功勤凡有幾何昨者嶺外之行已曽受賞今後溫成葬畢賞又不薄不知厭足愈求遷進朝廷亦當愛惜事體無冝輕改成命全斌閨闥之臣尚如此姑息萬一復有權勢重於全斌者如何待之臣雖鄙賤實惜此體不敢輒撰告詞至和元年十一月上時知制誥上仁宗論帶御器械須得老成謹畏之人趙抃等臣等竊聞內臣閻士良巳得指揮帶御器械伏覩前年中郭申錫上言內臣舊制須經邉任五年又帶御器械五年仍限五十嵗已上及歷任無贓私罪方預選充押班等尋聞陛下聽納中外傳播以為得冝蓋欲得老成謹畏無過之人在陛下左右聞下樞密院常令執守施行今來詔墨未乾已聞除士良帶御器械竊以御帶職名將來多是承例叙遷押班須是自御帶之任便須選老成謹畏無過之人况士良為性狡獪自來與中外大臣交相結託久在河北張皇事勢天下具知及歷任曽有贓罪至徒今來密院殊無執守首紊著令所有士良新命乞賜寢罷别擇善良以懲勸陛下左右之人至和二年七月上時為殿中侍御史上仁宗乞罷內臣暗轉官例吕誨臣伏聞設官制祿以待其人用為賞勸過是則非所以公於天下也竊見近日除管幹御藥院入內供奉劉保信王保寧鄧保夀王世寧四人遙郡團練刺史傳聞中外駭動人聽臣輒以國朝故事言之髙品黃門三十年供奉官十年一轉蓋不使此輩坐而竊祿如咸平中洛苑使入內內都知秦翰與雷有終討王均之亂既而有功授以內園使恩州刺史即不知保信等立何勞效與秦翰恩賞一同只是攀援暗轉無名之例伏乞追還成命特與平轉屬邉疆多事之際恐因此內臣無功進秩掌兵授律者不肯用命鶴有乘軒衛人無戰意斯有國者為之深誡惟聖斷無以私昵害天下之至公乃臣拳拳之望也嘉祐三年十一月上時為殿中侍御史上仁宗乞罷內臣暗轉官例吕誨臣伏聞寶元前諸閣分內品之類不過一二十人比來增及數倍除身分俸外更請本閣料錢四時衣服又破三司折食價錢冗費甚多繇此歷天章閣後苑內東御藥院最為優厚或因監督工作一切小勞便理績效得聖㫖盡下則超資躐等謂之暗轉自內品供奉不數年間授諸司使遙領刺史防團之任向時石全育何承用盧昭序張茂則馮承用之類其名甚多不可殫舉既與之暗轉則俸祿隨而增給如此濫恩非特亂先朝之典制較之前古亦未之聞也如前班武臣更歷外任及沿邉立顯功著效者未有酬賞若是之速焉竊以國家設爵均祿砥礪才能顯其進用以成大業豈特為內官假貸而賈天下之怨言謂主上恩厚於私昵甚為朝廷惜之臣即不知祖宗之制度何緣而廢至當陛下即位之初太后臨朝制命出於帷幄威福假於內官斜封墨敕授之匪人故外廷鮮得聞知疑暗轉之例自兹而始暨明道而後陛下躬覽萬幾北司之弊不聞剗革奈何復使熾盛於前也然宣命降於內省遷擢誥敕亦關於兩府蓋自來上下循持蔽而不言以陛下爵祿植為私恩交結貴幸因緣致身於近輔者比比有之以是積弊寖久陛下無由而知蠧公害政莫甚於此都城之下髙門大第寶貨充積冨貴窮極皆幸臣之所有也傾府庫之貨財竭生靈之膏血以資無功何所取益臣恐人神怨怒非朝廷之福也設若保信等出居外任薄立勞效陛下復以何官待之臣竊謂先帝賞秦翰討賊之功宜守之為例則小人覬覦之心自息伏乞指揮入內內侍省檢㑹諸閣分寶元以前人數比類今日如員數過多即行减省及管幹天章閣後苑內東門御藥院各限定人數或與三年一替並令入內內侍省將印紙歷子具有無公過事件批書如因勞效得㫖酬賞格即時與叙遷送中書出給誥敕所貴內侍省與樞密院中書相關不敢蔽欺得以盡公其暗轉俸給一切非例伏乞裁罷仍追寢劉保信等前命止與平轉俾中外臣寮升進均一賞有所勸天下大幸嘉祐五年十一月上上仁宗論押班須年五十司馬光臣伏見朝廷近除帶御器械蘇安靜充內侍省押班臣竊聞國家舊制兩省押班須年五十以上方得為之安靜年未五十特䝉擢用臣恐今後內臣求進者援以為例乃有年齒極少遂居衆首國之舊章因此隳壞竊為朝廷重之伏望陛下追寢安靜前命以存典法嘉祐六年上時知諌院上仁宗論朱潁士干求內降乞行勘責傅堯俞臣近以朱潁士管幹汴口兩有文字干冒天聽傳聞差遣雖罷而潁士等未嘗勘責得之則為僥百倍失之則無損萬分此正中貪欺者之䇿也臣聞明主好要而失之在煩夫百官幾人一日幾事欲人人丁寧而事事戒敕則所遺者何可勝舉唯間取其過甚者痛繩之則庶官相勉萬事俱理此最要務而陛下所冝留神其潁士因緣內降內侍省不覆奏依條取勘都水監迎合舉官伏乞早賜指揮勘責施行不然貪覬者未已欺罔者無懼壞陛下之法者日衆煩陛下之聽者日多再三之瀆伏俟誅譴嘉祐七年七月上時為監察御史裏行上仁宗論李允恭不合薦孫永昌傅堯俞臣伏聞入內都知李允恭奏男供備庫副使堯佐之子永昌為入內黃門竊聞內臣許養子一人而初補入內都知亦無恩典允恭既不合薦孫堯佐亦未當養子一旦破條越例事出非次此命一行必有扳援而進者則陛下之成法遂廢大凡因事以啓僥幸為易置防以限恩澤則難官賞之弊近方粗革徼幸之塗膠固拘礙未能剗除者甚多其已行之法惟陛下持之如金石勿遽轉移則天下幸甚永昌新命乞行追寢允恭久侍左右條例非不詳知公違制敕亦望特行勘責况內侍省條例甚明而永昌違礙非一不敢具陳以煩聖聽伏乞指揮仔細勘㑹免致䝉蔽嘉祐七年七月上上仁宗再論朱潁士李允恭傅堯俞臣近纍狀奏彈幹當汴口朱潁士雖䝉追罷差遣其朱潁士不合干求內降內侍省並不依條執奏取勘潁士都水監阿附權幸保舉潁士尚未曽勘責及入內副都知李允恭不合奏男堯佐之子永昌充入內黃門緣內侍只許養子一人而初授都知别無恩典有堯佐則允恭不合薦孫允恭在則堯佐未當養子鄧保夀失行之事不當攀援甘昭吉引例之請又已寢罷進退違戾事狀明白御史中丞王疇亦有劄子論列皆不䝉降出臣愚賤亡狀未能感動天聽慙懼之極不知所處獨念陛下造為法令以維持綱紀幸臣壞之執政既徇而曲從法官論之陛下又寢而中止是法令伸於四海而屈於朝廷請求禁於踈外而行於近密上之所為必有甚焉者將何以揭示後來取信天下陛下之法初未動搖無狀者尚敢干犯儻犯而容之則誰與共守臣恐綱紀之紊漸有不可復正者乞將朱潁士李允恭各加勘責庶干求者知所警畏推薦者不敢幸邀則法令明而綱紀正矣嘉祐七年七月上宋名臣奏議卷六十一
