body:
  text: 宋名臣奏議卷八十四宋趙汝愚編儒學門釋老上仁宗論僧紹宗妖妄惑衆韓琦臣伏見興國寺有外來僧紹宗自今月十四日于本寺後三門上燃燈穿膝出榜行疏驚惑民庶意在規求易動之徒觀施相屬臣竊見天聖編敕節文僧道俗人有捨身燒臂煉指截手足戴鈴掛燈毁壞身體之類并科斷訖僧道勒還俗配邊遠州軍編管居停主人及本院三綱知事僧尼廂鎮所由容縱者亦行科斷天下遵守有犯無赦豈兹皇居之側都市所㑹恣令妖妄曽無止絶此乃本寺庸猾之輩誘令至京將欺惑於朝廷欲經營于建立責其奸狀固匪容誅臣又慮佞佛之徒曲聞上聽以至宫闈之內戚里之間冀有頒霑益其夸大茍損財而為助固傷化之實深臣欲乞特降聖㫖指揮檢㑹元敇早賜施行如或國家畏重天戒已停興葺撙節邦用惜其耗費少寬犯令特許行權則當任彼化緣俾從人願固不可因而崇奉有害政猷輒論列於未萌幸矜裁於無隱景祐三年上時為右司諌上仁宗乞罷迎開寶寺塔舍利蔡襄臣竊聞開寶塔為天火焚燒因發塔基取入舍利宫中嬪嬙煉臂削髮者甚衆喧傳滿街無不驚駭又聞以二十二日大具僧儀迎舍利歸寺臣聞救天下之患必有濟時之術施行之事若慿依神靈以要福利是為非道也今令僧徒迎舍利自禁廷歷都市萬人瞻觀衆口傳道下惑民心上虧聖德取笑無窮非細事也所有迎引舍利伏乞寢罷宫嬪煉臂削髮亦望嚴加禁止慶厯四年六月上時知諌院同前係第二狀蔡襄臣昨日竊聞宫中因取塔基舍利入內宫嬪煉臂落髮者甚衆及擬二十二日大具僧儀迎舍利歸寺臣已具奏聞乞賜寢罷尚慮至誠未能上回聖意臣聞治天下之道驅生民于富壽皆由教化刑政修舉以臻太平至於非理之福不可徼求況奉佛無效前世甚多臣竊見唐代宗時令僧百人於宫中念誦謂之內道場每有西蕃入寇令講仁王經以至人事不修羌戎犯闕至今言大厯紀綱弛壞皆由事佛之致也舍利有光前世有之何足為靈今天下生民困苦四夷驕慢陛下正當修人事救時弊若專信佛法以徼福利豈可得耶陛下增置諌官本為規正過失今迎引舍利事出於中專損陛下聖德臣終夕不寐須至頻煩天聽伏乞陛下力賜寢停佛若有靈必以臣言為是如能妄行威福臣犬馬之軀自當其罪所有開寶塔舍利伏望指揮送還本寺不令迎引慶厯四年六月上上仁宗乞罷迎開寶寺塔舍利余靖臣伏見開寶寺塔為天火所燒五行之占本是災變朝廷所宜戒懼以答天意尋聞遣人於塔基掘到舊瘞舍利內廷看畢送還本寺許令士庶燒香瞻禮者道路傳言舍利在內廷之時頗有光怪臣恐巧佞之人推為靈異惑亂視聽先自內廷外及四方抄斂錢物再圖營造臣忝備諫職見此事體不可不言臣聞帝王行事但能勤儉修德感動人心則雖有急難後必安濟臣觀今天下自西垂用兵以來國帑虛竭民間十室九空陛下若勤勞罪巳憂人之憂則四方之民咸䝉其福矣如其不恤民病廣事浮費豈所望於當今且佛者方外之教理天下者所不取也割黎民之不足奉庸僧之有餘且以侈麗崇飾甚非帝王之事或有戒臣者曰若有營造必不出於府庫但取內廷無用之物凖其直而與之亦不誅求於民任自僧徒化其願施之者積嵗纍月而成之庸何傷哉臣應之曰天下之民皆厭賦役之煩不聊其生至有父子夫婦攜手赴井而死者其窮至矣陛下若恤民之病取後宫無用之物內帑有餘之幣出助邊費勿收中民一年田租明降指揮布告中外此則陛下結天下之心感召和氣雖造百塔無以及之若作無用浮侈之事民益怨矣又二年以來减省後宫請給皆言內中煎迫不似往前今一旦捨施則財物無紀何以取信四方哉竊緣市井之人有知者少既見內廷崇奉則遽相扇動傾箱竭槖為害滋深若以經火不壞便為神異則本在土底火所不及若言舍利能出光怪必有神靈所慿此妄言也且一塔不能自衛為火所壞又何福可庇於民哉今朽木腐草皆有光水精及珠之圓者夜亦有光況舍利本外國怪異之物有光亦非今日之瑞昔梁武帝造長塔時舍利亦常有光及臺城之敗何能致福視此可以監之矣其開寶寺舍利塔伏乞指揮更不營造上以見陛下不惑之明下以昭國家愛民之意仍乞更不迎入內中供養且胡人軍校皆呼舍利入宫不祥之語尤宜謹之其燃頂爛臂之人亦乞禁絶慶厯四年六月上時為右正言上仁宗請焚瘞物故妖僧錢彥遠臣風聞在京景德寺僧人俗謂之言法華者因病物故而道路皆傳內降使臣令用布漆其骨留于本院供養謹按其僧本由病後言語乖越其徒轉相誑惑小人從而唱之意在希求聾俗捨施財物今既自化别無異迹忽令漆其殘骨留貯寺中竊恐不逞之徒妄傳神變别起妖幻伏緣昨來恩州叛卒始皆假託此術以脅多衆乃至朝廷臨遣大臣督戰方能擒滅不爾為國生事今此僧近在輦轂尤動人心萬一之間不可不慮五代時定州狼山寨有尼姓孫名曰深意及死坐而不壞寨民孫方諌者奉之遠近神其事聚衆頗盛遂因為定州節度使仍自立弟行友為兵馬留後至太祖時遣兵擒行友至京及訪狼山輦其尼尸焚于京城西北隅自此定州方始朝廷除節度使蓋深達情僞建威銷萌之至況釋氏本教亦不許其示相於外徼福于無況此朽穢之骨復何所為伏望聖慈詳察邪正本末上法祖宗英斷特降指揮令開封府監勒本院僧徒將所謂言法華者於城外依本教焚化如有燼餘之骨即于城外瘞藉即不得放入京城諸門及於寺院聚人供養所貴不至有惑民聽慶厯八年十一月上時為右正言上仁宗論道士傳授符籙惑衆趙抃臣竊聞有信州龍虎山道士王守和見在壽星觀內寄居昨秋中曽糾集京師官員百姓婦女等一二百人以授符籙神兵為名夜聚曉散兼知近日此法浸盛傳衆作法希騰街坊又欲取今月十五日夜於本觀登壇聚衆作法希求金帛惑亂風俗豈宜輦轂之下容庇妖妄之人深屬不便臣欲乞特降指揮下開封府捉搦勘斷押回本鄉免致動民生事至和元年十月上時為殿中侍御史上仁宗乞止絶臣寮陳乞創寺觀度僧道陳襄臣昨授敕差判尚書祠部纍准中書劄子指揮多是近上臣寮陳乞創造墳㽵寺院剃度童行事又西天譯經僧法護遺表特與剃度十人并安國院每年與度二人二年與紫衣一名及知鄆州趙槩奏列子廟乞度道士每三名特與一名披戴臣竊以謂方今釋老二氏之法蠧惑天下上自王公下逮民庶莫不崇信其術傷風壞教無甚于兹陛下縱未能蠲除其弊可且持循舊規不宜增置轉令滋蔓況臣寮所乞奉親立剃度人為僧考之先王無此典制蓋陛下慈仁孝德俯從其欲因緣恩例覬寵先塋然非聖朝所以優臣子之義貽將來之法也臣因檢㑹本部在京諸道州軍寺觀計有三萬八千九百餘所僧尼道士女冠計有三十一萬七百餘人數目極多慶厯以前自有著令不許文武臣寮宗室戚里僧道等人陳乞創造寺觀名額仍委御史臺覺察彈奏及每年試經撥放人數亦無所增近年以來輒增二倍而又自宫闈以至文武近臣勳賢子孫宦官僧道等人一例陳乞墳㽵寺觀除編入舊敇自皇祐三年以後增置名額六十餘所放度僧道又計一百八十餘人蓋是當時秉政大臣不與陛下固持國法首為此事黷亂典刑恩例一出無由禁止自為之者既不敢論言事之臣又無彈奏見今節次有人攀援體例未見其已若遂行之不禁臣恐不數十年天下無知之民競為僧道轉令失業非細事也臣欲乞自今以後在京諸道州軍寺觀及每年試經撥放人數只以舊額為定一依慶厯編敕更不許文武臣寮等人陳乞增創名額如陛下未即止絶再降指揮臣實不敢奉行其見在兩府臣寮近日送下乞置墳㽵寺觀等劄子雖已施行如尚未曽興建時乞行追寢以率天下庶使向後臣寮等人不敢僥求恩例所有近降法護遺表乞度童行及趙槩奏乞度道士劄子二道未敢施行嘉祐三年八月上時以祕閣校理判尚書祠部上仁宗乞罷寺觀賜額司馬光臣伏覩近降敕節文應天下係帳存留寺觀院舍自來未有名額者特賜名其在四京管內者雖不係帳今日以前蓋到舍屋及百間以上者亦賜名額竊以釋老之教無益于治而聚匿游惰耗蠧良民此明識所共知不待臣一二言也是以國家明著法令有創造寺觀一間以上者聽人陳告科違制之罪仍時毁撤蓋以流俗戇愚崇尚釋老積弊已深不可猝除故為之禁限不使繁滋而已今若有人公違法令擅造寺觀及百間以上則其罪已大幸遇赦恩免其罪責可矣其棟宇瓦木猶當毁撤沒入縣官今既不毁而又明行恩命錫之寵名是勸之也臣聞為人上者洗濯其心一以待人是以令行禁止而莫敢不從今立法以禁之于前而發赦以勸之于後則凡國家之號令將使民何從而信乎臣恐自今以往姦猾之人將不顧法令依慿釋老之教以欺誘愚民聚斂其財以廣營寺觀務及百間以上以須後赦冀幸今日之恩不可復禁矣方今元元貧困衣食不贍仁君在上豈可復倡釋老之教以害其財用乎事有微而患深令有近而害遠者此之謂也伏望陛下追改前命應天下寺觀院舍不係帳者不以舍屋多少并依前後敕條處分其昨來赦文內四京寺觀院舍雖不係帳亦賜名額一節乞更不施行庶使號令為民所信而游惰不能為奸也嘉祐七年九月上時知諌院上哲宗乞禁士大夫參請孫升臣伏以先王修心治性之道載於六藝學士大夫有窮年沒世不能究其倣佛至于治家居官修身事上不盡其誠不合於義者多矣況所謂道德性命之奧乎比來京都士大夫顧不自信其學乃卑身屈禮以求問于浮屠之門其為愚惑甚矣臣訪聞慧林法雲士大夫有朝夕游息於其間而又引其家婦人女子出入無間參禪入室與其徒雜擾昏暮而出恬然不以為怪此于朝廷風化不為無損伏望聖慈特降指揮應婦人不得以參請為名輒入禪院如違止坐夫子仍令開封府于諸禪院門曉示庶幾士大夫之家稍循禮法不辱風化元祐元年上時為殿中侍御史上哲宗乞戒約士大夫傳異端之學朱光庭臣竊以聖人之道純一無間君君臣臣父父子子兄兄弟弟夫夫婦婦誠意正心修身齊家治國平天下自開闢以來未有易此者也堯舜禹湯文武之所以為君周公孔子之所以為臣以此為已任以此為世教明如日月固不欺于萬世也自後漢以來王道寖微胡法始乘間而入蔓延至于晉宋梁隋王道日衰胡法日熾有唐賢儒間出力行排斥然而邪說入人之深譬之病者正氣已耗邪氣入於心腹淪于骨髓未易除去賢儒出力扶道有如珍藥良劑僅能涵養正氣爾聖人有言曰窮理盡性以至於命為吾儒者所當學也然未嘗學也反謂胡法了然見性不生不死此其高明者也聖人有言曰未知生焉知死為吾儒者所當致知也然未嘗致知也反謂胡法真有輪回此又其次者也聖人有言曰作善降之百祥作不善降之百殃為吾儒者所當畏敬者也然未嘗畏敬也而反謂胡法尊信可以求福田利益此又其下者也緣此三惑上智以至下愚混然都入于迷塗而不自覺也口誦聖人之書身被儒者之服而區區北面尊胡法學性命免輪回求福田所謂舍巳之田而耘人之田臣未見其得也方今朝廷尊尚儒術並用賢俊將欲發明大道必先斥去異端則可以振起斯文化成天下臣訪聞今月二十日相國寺有一冲長老者開堂說法士大夫奔走其門牆環拜于座下者甚衆當聖朝尊尚儒術之際而士大夫不知自重敗壞如此可不懲之乎臣欲乞詔執政詰問今月二十日赴相國寺冲長老座下聽法臣寮遍行戒敕令今後更不得造其門傳習異端學官傳先王之道禮官守先王之法如有違經弃禮前日亦曽至其門聽法者并行責罰以正違經弃禮之罪士大夫以至民庶之家今後亦不得令婦女入寺門明立之禁庶幾可以息邪說距詖行正風俗明吾堯舜禹湯文武周孔之道以開天下之惑幸甚幸甚元祐元年上時為右正言上哲宗乞戒約士大夫傳異端之學係第二狀朱光庭臣竊以天覆於上地載于下人位於中三才一貫純粹不雜有聖人作因天叙而立五典因天秩而庸五服因天討而用五刑然後三綱五常立而萬事咸治聖人惟能以皇極之道彌綸輔相於其中故天下無一民一物不得其所此極盛之治後世無以復加也不幸三代既還王道不振黃老雜之於前釋氏亂之于後黃老之術主于清靜虛無世惑猶淺惟是釋氏最為大惑人無賢愚皆被驅率高明之士則沉溺于性宗中下之才則纒縛于輪回愚淺之俗則畏懼於禍福甚可怪也聖人曰天命之謂性儒者盡心而後知茍不務知此而求他可乎聖人曰未知生焉知死儒者當窮理而後知茍不務知此而求他可乎聖人曰惠迪吉從逆凶惟影響儒者當親履而後知茍不務知此而求他可乎聖人言行布在方冊明如日星可師可法今士大夫被儒者之服當師法聖人言行而乃自暴自棄區區奔走從事胡法古者學非而博在四誅而不以聽今去先聖之言從胡人之學無乃學非而博者乎豈可以不禁之也學官教多士以禮義禮官正朝廷之典禮若習異端尤當深責古者道路男子由右婦人由左重其有别今之士大夫與民庶之家婦女恣入寺門敗壞風俗莫此之甚此不可以不禁也臣訪聞今月二十日相國寺慧林院長老開堂衣冠大集座下聽法者曲拳致恭環拜致禮無所不盡在無知輩不足責其士大夫背弃吾道不知自重如此不可以不責也臣昨日上章乞詔執政詰問今月二十日于相國寺長老座下聽法臣寮乞行戒敕今後更不得造其門傳習異端又學官禮官前日亦曽詣門聽法者乞正違經棄禮之罪仍乞今後應士大夫與民庶之家婦女並不得入寺門明立之禁臣所以為陛下力言者方聖明御厯俊乂滿朝尊吾堯舜禹湯文武周孔之道以致太平而不當縱異端之術以惑天下伏望聖慈特賜睿斷施行元祐元年上上哲宗論佛老岑象求臣讀孟子至於禹抑洪水周公兼夷狄孔子作春秋以懼亂臣賊子欲正人心息邪說以承三聖嘗三復其言知楊墨之教與洪水夷狄亂臣賊子異致同害而軻之排異反正其功亦不後于三聖也何者天下之害莫大於無形而有形者次之有形者淺而易見無形者深而難知洪水夷狄亂臣賊子有形者也楊墨之教無形者也洪水不抑則民死于水夷狄不制則民死于兵亂臣賊子不去則民死于亂楊墨之道不息則民無父無君胥為禽獸尚三死之不若也嗚呼楊墨之教止行於衰周之時而佛老之教至今數千年矣楊墨之罪止在於誣民而佛老之徒困民以自封亦數千年矣此其為害又非特洪水夷狄之類也其害非特洪水夷狄而學周孔者皆忽略而不顧無一人出力以排之非特不能排之又相與屈身而尊事之增其高益其深使其盛大繁衍自以為莫已若甚可怪也臣謂其害之大者有三焉可為流涕者二可為太息者一而執事大人曽不以為慮也不耕而食不織而衣出入百用一取足於民往往蕃貨賄擅商賈農民之利田疇跨州縣委積如京坻窮奢縱欲不知紀極使吾民日削月朘寖以窮匱有不得糟糠藍縷以實腹蔽體者焉今年作某宫明年造某寺以葺以造嵗無虛日使土木被金玉衣文采陸離眩轉功侔鬼神天下名山勝地皆據而有之使吾民庇茅茨暴支體有不得聚廬而託處者焉此可為流涕者一也不知禍福之原而虛示天堂地獄之變不知性命之㫖而妄肆高仙下鬼之論日夜鐫諭鼓動流俗使人輸五榖以為之食奉絲麻以為之衣驅子弟以為之童奴彼其割口體之奉捐骨肉之愛者非樂于飢寒而無愛親之意也持善不固動作有所未正故惑其言信其事恐禍之及其身而未嘗有人以中國禮義之說開其所蔽而然也見王侯公卿大夫居其上者皆敬畏承事之無一人出片言以道其非是安得不悅而從之小以徼福於今生與來世大以冀出離生死故近者競出疏日就太學生員掠錢而太學生員至有秋試不中捨儒業而事之者用夷變夏無甚于此法雲僧亡而士大夫及其妻女有相率哭臨之者風俗蠱惡無甚於此是二者皆不祥之道此可為流涕者二也祖宗時天下道士常近二十萬僧常近四十萬其童奴倍焉今雖不逮於此而京師列郡既有嵗度之數又有撥放之目使游手惰足之輩離鄉輕家為之服役嵗月既深則受牒易衣遂終身安逸矣南畝之民終嵗勤苦猶不免于飢寒宜其去此而就彼也故釋老益衆農夫益少一夫耕而數百人食之一婦蠶而數百人衣之農何為不蹙與民何為不困與此可為太息者一也三者之害沉涵漸漬牢固深結其甚如此奈何益尊崇而張大之乎昔章聖皇帝恭儉寬慈子養黎庶仁深澤厚民到于今頌之徒以天下無虞符貺屢至故依道家之說造玉清昭應宫鳩工役衆朞年而後成㑹靈祥源相繼而作當時府庫羡溢之資由是無餘矣臣傳聞章聖皇帝在御李沆為宰相王旦為參知政事旦一日謂沆曰每見相公四方奏祥瑞即便收之奏災異即須敷陳恐上誤聖意沆曰今天下無事慮聖人無所用心萬一事四夷惑佛老恣酒色三事中如有一事即可憂也沆老矣但恐同年將來費力後旦為宰相上聽道家之說起玉清昭應宫東封西祀幸亳社祠老子及迎奉天書等旦不能諌止但畫李沆像供養而已其後上清玉清昭應宫福聖護國二塔集禧醴泉二觀興國青黃二閣乾明崇夏開寶三寺並遇火災琳宫紺宇皆化為煨燼以是度上天之意固有所在矣臣伏見陛下不以上天警戒為念復起上清儲祥宫內捐十六七萬緡以給其費迄今錫與未已又給修宫殿巨材以為之用雖遂事不諌然臣深為陛下惜之也何則十六七萬緡中人千家之産也以濟邊用則邊有餘糧以遺貧民則民有餘食漢文以十家之産罷露臺而陛下以千家之産為無益之事臣安得不為陛下惜之哉國家自太平興國至天聖間屢詔天下普度僧人無圗之流皆得𨽻名僧籍而僧之為盜賊冒刑禁者不可勝計故張知白奏言臣向嘗斷劫盜有全是僧徒者于時仁祖有宜漸加澄革之言惜乎聖㫖有其意而臣下不能推明而奉行之也國家崇奉佛老不為不至未嘗享其小利而天下陰受其大害而不知覺可不念哉抑又聞建隆初太祖嘗詔天下凡寺之廢於顯德者不得更興雍熙中太宗嘗詔天下鄉村不得創修寺觀天禧中真宗嘗詔公主貴戚近臣不得以建寺為請祖宗之深計遠慮如此其至今縱未能行沙汰之法驅天下僧道歸之農畝亦當思祖宗之美意止其泛濫于末流也臣愚以為宜立崇飾塔廟之禁罷兩府貴戚得造寺度僧之制裁嵗度撥放之額立常住計口占田之限凡寺觀僧道少者併之其頺弊者毁之明詔中外諭以至意自然天下百姓循服五常之教不為異物所遷而游惰者日少耕墾者日衆倉廩充實而風俗歸厚矣佛老之徒見臣詆之深切必謂臣不曉其師之說而妄加毁訾焉臣之所言非毁釋迦老聃也蓋斥其徒之誕妄陰害天下之民而已臣請就其說而言之夫佛之理有二焉有藏教有禪宗所謂藏教者臣嘗觀而詳味之矣雖卷帙浩穰詞說繁猥然可以一言蔽之無出於空寂不動而已蓋四方謂寺為伽藍伽藍者華言所謂靜住也謂其徒為僧陀僧陀者華言所謂乞士也稱其居為靜住目其人為乞士則佛所以責其徒者何如哉今不能精進戒律篤修行業而乃多求厚藏享美饌衣鮮衣獵吾民之財以奉其身而嚴飾其居處是大違戾其師之說也所謂禪宗者臣嘗周詢而深究之矣雖言辭深隱㫖趣幽微然可以一理要之不過於圓通無著而已蓋欲不起一念不依倚一物不與萬法為侣此其極至也今其徒不能泯思慮忘形骸虛心以㑹道而乃雞鳴而起孜孜然馳騖于聲利之場惟恐人之不我信嚮惟恐人之不我資給是大違戾其師之說也道家之書雖亦甚多然老聃止有五千言論道德之意固未嘗及神仙羽化之事其他皆黃衣之徒浮淺誕妄務以廣其衣食之源而已是尤不足信者也夫神仙羽化之事皆出於傳聞天下之人固未嘗見也安足信哉且黃衣之徒恥不及釋氏弟子以綴緝言詞竊相模倣故僧云南無西方而道云歸命東方僧云極樂世界而道云逍遙世界其說譎虛誑率皆是也臣觀老子之道大要不過清靜無為而已老子言清靜無為則是與佛之圓通無著同其大㫖也佛之言圓通無著則是與孔子之寂然不動感而遂通天下之故同其大㫖也其道既本于清靜無為圓通無著則尚安俟於紛華外飾邪昔唐久視中欲鑄大像使天下僧人日施一錢以為不費國用而狄仁傑諌之謂工不使鬼必是役人物不天來皆從地出睿宗造寺而辛替否諌之謂佛教以清靜為本慈悲為主故嘗體道以濟物不為利欲以損人常去已以全真不為榮身以害教三時之月掘山穿地損命也殫府虛帑損人也廣殿長廊榮身也損命則不慈悲損人則不濟物榮身則不清靜豈大乘之心乎公主外戚造寺度人姚崇諌之謂佛不在外近在於心但發心慈悲行事利益則即是佛身何用妄度姦人令壞正法彭偃議澄汰佛道二教而謂佛之立教清靜無為若以色見即是邪法天生蒸民必將有職游行浮食王制所禁今天下僧尼不耕不織廣作危言險語以惑愚者一僧衣食嵗計三萬有餘五丁所出不能致此舉一僧以計天下其費可知四人之言皆著明深切可為至戒其他言者不可悉陳至於禍福吉凶則遠近小大各以類至未有不因行事是否而得之者也六沴不降六極不臻天下曠然咸樂其生優游無為埀休後嗣是天子之福也職修事舉譴罰不加是百吏官人之福也事父母育妻孥安分守業身無禍殃是士庶人之福也四者為福雖殊而所以取之則一曰修身謹行而已禍福之應既在於人則天莫得而私之矣天且不能容私于其間而況於佛老與況佛老之徒與憲宗迎佛骨供養於內而韓愈力陳歷代有佛無佛及其享國長短以諫仍指其骨為凶穢之餘傅奕請去佛教而曰佛是胡中桀黠欺誑夷俗皆邪僻小人模寫莊老微言文飾妖幻之教於國家有害二人論佛幾於詈矣以佛威神之力二人宜夭橫短折坎坷以死而卒以壽命晏然而終何也蓋其論公天下而言非以逞其私也佛果有威神之力安能降禍於公論無私之人哉昔者三代之盛時道行而俗純美國富而民和樂當此之際固未嘗有佛老也天下百姓惟知有堯舜五常之教無異端之說惑亂其意而耗蠧其生是以至於此也梁武皇帝信人天因果之論起寺度僧窮極盛麗大設齊㑹推衍教文以至捨身給事欲僥取福利卒不免臺城之禍則為善果不在於供僧道事佛老矣凡有所動作涉於形相皆有為之法而一切有為之法佛譬之夢幻泡影蓋言其非真實也言其易散滅也言其不可依據也由是論之佛之教人豈在於營造供事之間哉黃老之教人亦無異于此也今國家以二聖降誕節及祖宗忌辰凡有所禱請無不集緇黃鼓鐘磬鐃鈸設幡幢誦持歌唄歸敬於二教甚非先王之法也以為子孫臣下推奉先報本之意而奉先報本之意果在于此乎若更以為必能感神致福則萬無此理近嵗朝廷減出賣祠部度牒而增其直若非二聖知道愛民何由及此然貴戚妃后之家起造寺觀莫知其數如曹佾起休糧道者院張敦禮建法雲寺皇親蓋洞真宫敕修開寶寺乾明寺殿相國寺東塔之類以至天下郡縣營造不可悉記土木之功所在甚盛若不禁止稍行减廢則興作耗蠧無有窮極將不勝其弊矣臣願陛下思周孔之格言行堯舜之常道體老子清靜無為之理而損宫觀章醮之繁儀原釋氏圓通無著之意而裁寺宇齊㑹之末節勿以臣之淺陋而廢其言將臣此疏下兩禁儒臣博議采臣上所陳六說詔有司行之是將陰獲大利於天下矣决數千年之疑惑減億兆人之耗蠧使法埀後代名播千古在陛下思之而已狷直之言上瀆聖聽罪當萬死幸陛下裁赦元祐五年十二月上時為殿中侍御史方伎上仁宗論許申妄薦狂人孫沔臣聞左道亂政大姦不可逃刑間邪存誠明哲故能早辨言僞既誅於兩觀德凶必屏於四方俾諸諂佞之臣以絶僥求之路竊見三司判官工部郎中許申久塵寵祿莫著功名昔居刑獄之司劾無狀而寢命後列尹京之幕起公議以歸班既已黜而復升見多歧而挾詐近者風聞罷官漕運入覲闕廷旋列計司纍膺殊用不思展效惟急趨時乃妄薦於狂人妄言精氣俾先容於內寺上瀆威顏而況氣行無間隙不在大毫芒之失為害必深呼吸之中其慮安測古人謂服藥有害微臣謂行氣亦然豈可肆行幻惑栁泌以合煉丹藥終不免誅杜景之求訪異人盡為怪誕茍久習於左右必貽患於君親衆實有言罪當無赦又聞錫以白金五百兩無名受寵亦駭聽聞忝為人臣不知忠孝接引詭道狂冒天聰盜竊厚恩益長奸弊將巧圖于進用必有玷于觀瞻大紊國綱宜除君側伏望追還所賜免摽濫賞之名黜去匪人以杜傾邪之漸景祐元年二月上時為監察御史裏行上仁宗乞責罰醫官蔡襄臣竊見近寶和公主及鄆國公主相繼夭傷供藥醫家巳聞下開封府取勘者臣切知豫王鄂王薨時醫官亦足取勘只降一兩官未旬月間尋得牽復切慮今來亦只似此行遣久遠不便況近來小兒醫官不一二年超升官資賞賜無數奏薦異姓恩澤過於兩制官寮賤者立貴貧者立富若以死生有命藥餌難工自來所醫疾病盡是命當痊愈此等何故濫受恩賞恣為僥幸若以從來痊愈因藥合受恩賞今日所醫無驗自當伏就刑罰臣竊聞先朝周王薨其時醫官李某杖背遠配廣南陛下一二年間皇子皇女繼亡六人盡在此輩數人之手兼臣聞醫官各是臨病互相推託不肯及時下藥以致病深雖有良醫無由措手其罪至重比於李某合更加刑其術至謬求之今人不為難得伏望陛下念祖宗社稷之重特因此時深行刑法庶使後人知懼藥餌盡心實為久遠保育皇嗣之計慶厯三年八月上時知諫院上仁宗乞選醫師教授生徒范仲淹臣觀周禮有醫師掌醫之政令嵗終考其醫事以振其祿是先王以醫事為大著于典冊我祖宗朝置天下醫學博士亦其意也即未曽教授生徒今京師生人百萬醫者千數率多道聽不經師授其誤傷人命者日有之臣欲乞出自聖意特降敕命委宣徽院選能講說醫書三五人為醫師於武成王廟講說素問難經等文字召京城習醫生徒聽學并教脉候及修合藥餌其針灸亦别立科教授經三年後方可選試高第者入翰林院充學生祗應仍指揮今後不由師學不得入翰林院如在外面私習得醫道精通有近上朝臣三人奏舉者亦送武成王廟比試更委宣徽院覆試取醫道精深高等者方得入翰林院祗應如內中及諸宫院使不經官學百姓醫人有功效者只與支賜如祗應十年以上纍有效者即與助教或殿侍三司軍大將安排即不得入翰林院所有諸道州府已有醫學博士亦令逐處習生徒并各選官專管仍指揮轉運使提㸃刑獄轉運判官所到㸃檢其學醫生徒候念得兩部醫書精熟即與免户下諸般差配如祗應州府纍有功效者即保明聞奏與助教安排所貴天下醫道各有源流不至枉人性命所濟甚廣為聖人美利之一也慶厯五年上時為參知政事上仁宗乞檢束醫官吕誨臣竊以醫師之職備於庶官亦當粗擇其人無俾濫處風聞近日醫官院多不整齊其庸惡甚者秦宗一甄立里二人惟親附北司以求援引出入內庭曽無限節況宗一頃嵗曽盜竊禁中器物內東門搜獲當時勘鞫只言借得豈有宫閣器用外通假借以此知上下欺蔽迹狀甚明停廢之後不數年間遽復舊官不知何緣而至此立里素不曉方書人所共知娶觀察使楊景安女為妻嘗誇衒於人妻妹見為宫掖嬪御張皇事勢動有慿恃如此不務檢束恐因緣作過誠為不便臣欲乞朝廷勘㑹宗一的曽有此過犯及立里實連宫掖親戚特行黜責庶幾警戒其衆不敢恣橫各思祗畏仍乞指揮醫官院今後止令使副與尚藥奉御大方脉及內有應用數科令更遞直宿如遇宫禁使喚并須兼一名有年齒諳㑹方藥者同共察脉庶互相檢束醫治亦不至差謬於體甚便嘉祐五年上時為殿中侍御史上仁宗論董吉燒煉趙抃臣等風聞散直剩員兵士董吉以燒煉之術為名因緣入內副都知鄧保信援引入留禁中外議籍籍以為不便臣等伏以自古亂臣賊子興妖造奸必僞稱化金寶益年壽之術以取媚人主外託愛君之迹內為亂政之弊漢之文成五利唐之普思靜能濫恩既深顯戮旋被至其甚者權移羣小勢傾朝廷稔成禍殃延及宫禁唐太宗憲宗二帝號為英主亦以服餌貽疾取笑四夷文宗之時中尉王守澄引薦李訓鄭注訖成甘露之亂皆由依宦官而結主假藥術以市奸故也或謂燒變金銀則天子以慈儉為寶不當務此或謂合煉丹藥則前世為藥餌所悮可以為鑒左道無赦古制有刑今保信復引董吉禁中蓋當事之初理如無害洎為弊之末禍或從生其董吉伏望聖慈早賜斥逐免致熒惑聖聽鄧保信亦乞誡勵施行嘉祐五年十月上時為右司諫上徽宗論道士燒煉丹砂石公弼臣伏覩近降指揮內東門司自今後應使臣醫官等並不得將帶經火製煉毒藥如伏火砒硫黃朱砂之類入㑹通門入內許諸色人陳告酬賞臣有以見陛下造道深妙聖慮獨高凡挾方伎進者所不能欺也蓋丹藥出於方士之說事不經見率是誑誕凡人尚當審謹豈可供進宫禁固宜重為關防以塞妖妄之源臣愚以為皇城諸門禁令尤不可不嚴亦宜此施行如臣寮以此陳獻或援引製煉之人亦乞立法止絶所有見今燒製道士挾持惑衆臣訪聞稍稍招權作過修蓋葆真宫約費錢十二萬餘貫今既不用其術臣以為其人不宜留置京師欲乞特降睿㫖奪去師名押歸本貫葆真宫修造如可減節即乞減節施行大觀三年八月上時為御史中丞宋名臣奏議卷八十四
