body:
  text: 宋名臣奏議卷一百二十一宋趙汝愚編兵門兵議下上仁宗論兵九事蔡襄臣近上國論要目十二篇以謂當今之急務強兵為第一事富國為第二事欲修治道自此而始兵不強則國不富國不富則民不安是故始於強兵而終於安民本末之論也強兵之説如何一曰消冗謂兵不可以暴減當有術以消之二曰選擇謂老弱疾病不堪戰陳之人即揀擇而去之三曰省兵謂不應置兵處與置之過多者則省之四曰訓練謂兵雖少壯而訓練不得其術與不教同五曰立法謂兵絶無統制故不可用用之則敗此五者偹修則兵少而精矣少則財用饒財用饒則國冨矣兵精以戰則勝以守則固而兵強矣其説皆世人常論也然而行之則為治道之始不行則為天下大患是世人之常論乃當今之急務臣故謂之第一事一事中書不與知兵增兵多少不知也樞密院要兵則添財用財用有無不知也管軍將帥少兵則請增不計校今日兵籍倍多何故用之不足也三司但支辦衣糧日日增添不敢論列謂兵非職事也四者各為之謀以至於此若通而為一則可以計校兵籍多少財用有無不至於冗臣欲乞招置增添兵數樞密院中書共議之先令三司計度衣糧如何足用管軍每乞增置必須詰問其所少之因必不得已方可具奏如此謹重乃省兵之一端也一事近年置諸路安撫鈐轄添屯禁軍自亰西江南東西廣南東西兩浙福建等駐泊禁軍皆是北人南方水土異冝水行不知舟楫之利山行不堪阻厄之險一往三年死亡殆半其不便一也只如差二萬人駐泊及至當替又須二萬人常須四萬人可了辦以此屯戍之多軍還到營未及三兩月又復出軍不惟道路勞苦妻孥隔濶人情鬱結其不便二也今欲除亰東淮南外諸路鈐轄安撫司所管駐泊禁軍候其年滿量留合要人數差補外並只放還本營更不填闕或問南方難用北軍祖宗平定南方盡是北軍今來何故難用曰祖宗之兵誅討大計未有不從中出兵今者南方但當作禦盜賊之計若禦盜賊諸路各有招置禁軍練習精熟可以驅使賊勢大者暫遣北軍不為失策此省兵之一端也一事陜西河東自慶歷巳來用兵之際置寨柵數多所以添兵寨柵本以通糧道護耕農非有益於攻守今當先去無用寨柵或只量留兵卒隨冝罷遣以寬難置糧草之費亦省兵之一端也一事防邊兵卒老弱病患先須揀選若在邊鄙不唯虛費糧儲兼亦不堪戰鬭千兵若有百人老弱遇敵而先奔即是千人皆廢如此為患須至選揀馬有不堪入陳者而為患與老弱之兵同陜西河東方今無事時若先選揀不唯訓練精熟倉卒有偹大可減省糧草以寬國用一事或曰招置土兵如前日陜西弓箭手之類只給與田不費衣糧於事為便且如河北招置土兵為害深矣士兵一人可給戍兵三人兼又父子相承未嘗出城驕蹇難動故曰為患深矣河北義勇十九萬人昔年差點人情驚動今耳目巳熟但須整緝訓練緩急得力於其間更選強壯須及十萬人不費衣糧可與土兵相制屯戍之兵可減也一事養兵之費禁軍一兵之費以衣糧特支郊賚通計一歲約費錢五十千廂軍一兵之費歲約三十千通一千一十八萬餘人一歲約費四千八百萬緡此其大較也若減禁軍十萬嵗減緡錢五百萬減廂軍十萬嵗減緡錢三百萬欲減禁軍先減屯戍欲減廂軍先減綱運此其要也一事諸路廂軍一指揮有六七百人檢尋舊額並無條制蓋年嵗既逺亡失舊文今若朝旨諸軍指揮并將校以下不得過五百人舊額不滿五百人即依舊額今日以前有剩者並令依舊候及五百人一依今來指揮輒敢額外添人並以違制論不在去官原赦之限一事禁軍指揮近年添置軍額名目數多指揮將窠雖全兵卒只有三二百人虛費將窠請受今若逐路軍額先與條約謂若兵士三百人即有將窠三十人見在人數巳多者仍舊或移補别軍候及三百人更不補填漸可併省也一事欲減廂軍先減綱運今天下無名綱運最為枉費兵士邊郡兵官替移迎候送還廂軍動皆數百人多者至千人自來明有條制州郡皆以人情不敢禁約此一事也南方替罷官貟近由江浙逺自湘潭一舟十人至二十人一嵗往還京師可了一次一舟之費小者五百千大者七百千所載官物不過數千緡之直衣糧所費幾何此二事也天下州郡自太平以來廨宇亭榭無有不足每遇新官臨政必有改作土木之功處處皆是不惟枉費財用必須多役兵卒此三事也天下持送官物入京如牛皮兵器之類多由陸路若委本路轉運司不急用者罷省之或令水路可以減省兵役此四事也養兵挽船不若和雇則止於程限之資養兵則終嵗給之其費必倍此五事也大要舉此五事嚴與條約廂軍可省矣治平元年上時三司使上英宗乞罷招軍司馬光臣近聞朝廷於在京及諸路廣招禁軍其災傷之處又招飢民以充廂軍臣愚以為國家從來患在兵不精不患不多夫兵少而精則衣糧易供公私充足一人可以當十遇敵必能取勝兵多而不精則衣糧難贍公私困匱十人不足當一遇敵必致敗北此利害之明有如黑白不為難知也是以太祖之時天下兵數不及當今十分之一而猶日加選練簡去羸老專取精鋭故能征伐四克混一區夏自景德以來中國既以金帛綏懷戎敵不事征討至今六十餘年是宜官有餘積民有餘財而府庫殫竭倉廩空虛水旱小愆流殍滿野其故何哉豈非邊鄙雖安而冗兵益多之所致乎此乃天下共知非臣一人之私言也慶歷中趙元昊叛西邊用兵朝廷廣加召募應諸州都監押募及千人者皆特遷一官以此之故天下冗兵愈衆國力愈貧近嵗又纍次大揀廂軍以補禁軍之數即自係籍之兵已為不少矣何苦更復直招禁軍及招飢民以充廂軍臣不知建議之臣曽與不曽計較今日府庫之積以養今日舊有之兵果為有餘為不足乎此蓋邊鄙之臣庸愚怯懦無他材略但求添兵在廟堂之臣又恐所給之兵不副所求他日邊事或有敗闕歸咎於已是以不顧國家之匱乏只知召募取其虛數不論疲軟無所施用此羣臣容身保位茍且目前之術非為朝廷深謀逺慮經久之畫也諺曰多求不如省費此言雖小可以喻大今以十口之家衣食僅足一旦頓增五口必不能贍若不顧囷中之粟篋中之帛所餘幾何而唯冗口是貪能無窮匱乎國家之勢何以異此羣臣既不能為陛下忠謀陛下又不自以為憂則誰當憂之臣恐邊臣之請兵無窮朝廷之募兵無已倉庫之粟帛有限百姓之膏血有涯不知國家長此沉瘵何時當瘳乎臣又聞即日災傷之處軍無見糧煮薄粥以飼飢民猶不能給况刺以為兵將以何物養之終身乎且畎畝農民止因一時飢饉故流移就食若將來豐稔則各思復業今既刺以為兵是使之終身失業也於官於民皆為非便謀策之失孰甚於此臣願陛下斷自聖志速降指揮應在京及諸路並宜罷招禁軍但選擇將帥使之訓練舊有之兵以偹禦四夷不患不足其災傷之處州縣不得妄招飢民以充廂軍但據所有斛斗救拯農民俟向去稍豐使各復舊業則天下幸甚臣自陛下踐祚以來不自知其狂愚見朝廷政令有未便差除有未當屢獻瞽言浼瀆天聼陛下未嘗為之變一政令改一差除如臣者亦可以不言矣然猶區區獻言不已者誠恥居位而不言不恥多言而見厭也治平三年正月上時知諫院上神宗論揀禁軍司馬光臣竊聞道塗之言未審虛實或云朝廷欲揀在京禁軍年四十五以上微有疾病者盡減下請給并其妻孥徙置淮南以就糧食若實有此議臣竊以為非宜何則在京禁軍及其家屬率皆生長京師親姻聨布安居樂業衣食縣官為日固久年四十五未為衰老微有疾病尚任征役一旦别無罪負減其請給徙之淮南是橫遭降配也諸軍之內沙汰甚多必恐人情惶惑大致愁怨雖國家承平無事綱紀具張此屬恟恟不安亦無能為患然詔書一下若萬一有道路流言驚動百姓朝廷欲姑務省事復為收還則頓失威重向去無以復號令驕兵若遂推而行之則衆怒難犯專欲難成意外之變不可不防梁室分魏博之兵致張彥之亂此近事之可鑑者也故臣願朝廷更當深思熟議未冝遽下此詔也夫水未至也而虛為之防水雖不至亦無所害謂水不足憂而不為之防一旦水至則防無所及矣故君子貴於思患而豫防之也且國家竭天下之財養育兵士本欲偹邊陲今淮南非用武之地而多屯禁兵坐費衣食是養無用之兵置諸無用之地也又使邊陲常無事則已異日或小有警急主兵之臣必爭求益兵京師之兵既少須使者四出大加召募廣為揀選其數倍多於今日所退之兵舊兵尚請衣糧未去而新兵更添衣糧是棄巳教閲經戰之兵而收市井畎畝之人本欲減冗兵而冗兵更多本欲省大費而大費更廣竊恐非計之善者也臣愚願朝廷且依舊法每嵗減禁軍有不任征戰者減免充小分復不任執役者放免百姓聽其自便在京居止但勿使老病者尚占名籍虛費衣糧人情既安於所習皆無怨嗟國家又得其力用不虛設冗兵既去大費自省在理甚明於事為便臣偹近臣兹事繫國安危不敢不言熙寧二年上時為翰林學士上神宗論冗兵陳襄臣觀治平二年天下所入財用大數都約緡錢六千餘萬養兵之費約五千萬乃是六分之財兵占其五禁兵之數約七十萬一夫錢糧賜豫嵗不下五十千則七十萬人有三千五百萬緡之費廂軍之數約五十萬一夫錢糧賜豫嵗不下三十千則五十萬人有一千五百萬緡之費則是廂禁共費五千萬矣惟餘一千萬以偹國家百用之費今若裁損廂禁人數五分之一則可以減錢糧之費一千萬以助縣官用度比之常嵗倍增其數百度經費有二千萬足以贍給有餘矣况藝袓朝中外之兵止一十二萬真宗之時三十餘萬章聖之時已號為多然不過五六十萬人大抵兵貴在強不在衆今若選揀精悍之士而去其懦弱羸老者凡五分之一則猶有九十六萬精兵不為不足矣熙寧二年上時知諫院上神宗論兵制不宜遽有更易文彥博臣向因進對蒙詢及兵民利害臣與吳充即時略具大旨上對然而天威之下頃刻之間固未詳悉臣退而復思自陛下臨御以來焦勞庶政以兵者大事尤所垂意三四年前樞密院檢録得開寶初至治平中內外兵馬大數頗詳偹遂議酌中定為永額比至道前即差多方慶歷中即頗減內壯根本外護邊除去冗留精適用省費搜補訓練皆有條理又以三路鄰於邊境進有屬户蕃兵弓箭手之類以至次邊州軍盡置義勇緩急調發以應征防若守處之得冝經久必無闕事兼向時諸路郡縣額外增置弓箭手亦欲防虞盜賊如此綱紀臣已謂深協方今之宜頗得偹預之理設有未至或有廢墜即當彌縫振舉之可也恭惟太宗之定天下也止用此兵真宗仁宗英宗之守天下也亦用此兵纍聖相承而無異道歷年彌久而無異法故臣以謂協當今之宜得偹預之理有未至而廢墜者彌縫而振舉之可也今陛下以睿聖之德承祖宗隆盛之業中原之人不識兵戈者幾百年歷觀前古至治未有如此之安且久也故生齒蕃多愈於二漢封疆廣逺過於三代所謂民不改聚地不改闢施之仁政而不煩擾則太平之效又何加焉陛下必欲捨此而别求治道以致太平更易兵制以張威武固非臣愚所及况臣偹位樞府所主惟兵不能上副盛意委曲經畫尸祿之責所不能逃伏望聖慈察臣前後纍上章奏聽解樞機之重柄并還將相之印綬得以散秩俾守外郡從愚臣知止之分全朝廷退人之禮臣久蒙天地之恩敢忘犬馬之報竊謂兵民猶水水能載舟亦能覆舟禁暴戢兵武之七德不戢自焚自古所戒凡更制維御之方深願謹之重之區區之誠庶補萬一熙寧四年上時為樞密使上神宗諫用兵張方平臣聞好兵猶好色也傷生之事非一而好色者必死賊民之事非一而好兵者必亡此理之必然者也夫惟聖人之兵皆出於不得已故其勝也享安全之福其不勝也必無意外之患後世用兵皆得已而不已故其勝也則變遲而禍大其不勝也則變速而禍小是以聖人不計勝負之功而深戒用兵之禍何者興師十萬日費千金內外騷動殆於道路者七十萬家內則府庫空虛外則百姓窮匱飢寒逼迫其次必有盜賊之憂死傷愁怨其終必致水旱之報上則將帥擁衆有跋扈之心下則士衆久役有潰叛之志變故百出皆由用兵至於興事首議之人冥謫尤重蓋以平民無故緣兵而死怨氣充積必有任其咎者是以聖人畏之重之非不得已不敢用也自古人主好動干戈由敗而亡者不可勝數臣今不敢復言請為陛下言其勝者秦始皇既平六國復事胡越戍役之患被於四海雖拓地千里逺過三代而墳土未乾天下怨叛二世被害子嬰就擒滅亡之酷自古所未嘗有也漢武帝承文景富溢之餘首挑胸奴兵連不解遂使侵尋及於諸國嵗嵗調發所向成功建元之間兵禍始作是時蚩尤旗見長與天等其春戾太子生自是師行三十餘年死者無數及巫蠱事起京師流血橫尸數萬太子父子皆敗班固以為太子生長於兵與之終始帝雖悔悟自克殁身之恨已無及矣隋文帝既下江南繼事夷狄煬帝嗣位此志不衰皆能誅滅強國威震萬里然而民怨盜起亡不旋踵唐太宗神武無敵尤善用兵既已破滅突厥高昌吐谷渾等猶且未厭親駕遼東皆志在立功非不得已而用其後武氏之難唐室陵遲不絶如線蓋用兵之禍物理難逃不然太宗仁聖寬厚克已裕人幾至刑措而一傳之後子孫塗炭此豈為善之報也哉由此觀之漢唐用兵於寬仁之後故其勝而僅存秦隋用兵於殘暴之餘故其勝而遂滅臣每讀書至此未嘗不掩卷流涕傷其計之過也若使此四君者方其用兵之初隨即敗衄惕然戒懼知用兵之難則禍敗之興當不至此不幸每舉輒勝故使狃於功利慮患不深臣故曰勝則變遲而禍大不勝則變速而禍小不可以不察也昔仁宗皇帝覆育天下無意於兵將士惰偷兵革朽鈍元昊乘間竊發西鄙延安涇原麟府之間敗者三四所喪動以萬計而海內晏然兵休事已而民無怨言國無遺患何者天下臣庶知其無好兵之心天地鬼神諒其有不得已之實故也今陛下天錫勇智意在富強即位以來繕甲治兵伺候鄰國羣臣百寮窺見此指多言用兵其始也弼臣執國命者無憂深思逺之心樞臣當國論者無慮害持難之識在臺諌之職者無獻替納忠之議從微至著遂成厲階既而薛向為橫山之謀韓絳效深入之計陳升之吕公弼等隂與之協力師徒喪敗財用耗屈較之寶元慶歷之敗不及十一然而天怒人怨邊兵背叛京師騷然陛下為之旰食者纍月何者用兵之端陛下作之是以吏士無怒敵之意而不直陛下也尚賴祖宗積纍之厚皇天保佑之深故使兵出無功感悟聖意然淺見之士方且以敗為恥力欲求勝以稱上心於是王韶搆禍於熙河章惇造釁於橫山熊本發難於渝瀘然此等皆戕殺已降俘纍老弱困弊心腹而徒取空虛無用之地以為武功使陛下受此虛名而忽於實禍勉強砥礪奮於功名故沈起劉彛復發於安南遂使十餘萬人暴露瘴毒死者十而五六道路之人斃於輸送資糧器械不見敵而盡以為用兵之意必且少衰而李憲之師復出於洮州矣今師徒克捷鋭氣方盛陛下喜於一勝必有輕視四夷陵侮敵國之意天意難測臣實畏之且夫戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀耳至於逺方之民肝腦屠於白刃筋骨絶於餽餉流離破産鬻賣妻男薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚甘死者甚苦使陛下見其號呼於挺刃之下宛轉於刀几之間雖八珍之美必將投筯而不忍食而況用人之命以為耳目之觀乎且使陛下將卒精強府庫充實如秦漢隋唐之君既勝之後禍亂方興尚不可救而況所在將吏罷軟凡庸較之古人萬萬不逮而數年以來公私窘乏內府纍世之積掃地無餘州郡正稅之儲上供殆盡百官俸廩僅而能繼南郊賞給久而未辦以此舉動雖有智者無以善其後矣且飢疫之後所在盜賊蜂起京東河北尤不可言若軍事一興橫斂隨作民窮而無告其勢不為大盜無以自全邊事方深內患復起則勝廣之形將在於此此老臣所以終夜不寐臨食而歎至於慟哭而不能自止也且臣聞之凡舉大事必順天心天之所向以之舉事必成天之所背以之舉事必敗蓋天心向背之迹見於災祥豐歉之間今自近嵗日蝕星變地震山崩水旱癘疫連年不解民死將半天心之向背可以見矣而陛下方且斷然不顧興事不已譬如人子得過於父母惟有恭順靜思引咎自責庶幾可解今乃紛然詰責奴婢恣行箠楚以此事親未有見赦於父母者故臣願陛下逺覽前世興亡之迹深察天心向背之理絶意兵革之事保疆睦鄰安靜無為固社稷長久之計上以安二宫朝夕之養下以濟四方億兆之命則臣雖老死溝壑瞑目於地下矣昔漢祖破滅羣雄遂有天下光武百戰百勝祀漢配天然至白登被圍則講和親之議西域請吏則出謝絶之言此二帝者非不知兵也蓋經變既多則慮患深逺今陛下深居九重而輕議討伐老臣庸懦私竊以為過矣然人臣納忠於君因其既厭而止之則易為力迎其方鋭而折之則難為功凡有血氣之倫皆有好勝之意方其氣之盛也雖布衣賤士有不可奪自非智識特逹度量過人未有能勇於奮發之中舍巳從人惟義是聽者也今陛下盛氣於用武勢不可回臣非不知而獻言不已者誠見陛下聖德寬大聽納不疑故不敢以衆人好勝之常心望於陛下且意陛下他日親見用兵之害必將哀痛悔恨而追咎左右大臣未嘗一言臣亦將老且死見先帝於地下亦有以藉口矣惟陛下哀而察之熙寧十年上時為宣徽南院使檢校太傅東太一宫使此疏實蘇軾代作上神宗論養兵吕大忠臣聞天下之患終在腹心而始在邊鄙邊鄙之患輕在禦敵而重在養兵漢以胸奴千里轉餉而天下困唐以藩鎮耗竭國用而人心離則是今日養兵之弊終為他日腹心之大患不可不察也夫養兵所以制敵將使邊鄙安靖而腹心受其賜也今養之太冗而處之無法朘削腹心以供其費而猶不足雖能勝敵無所用之况不能勝者哉雖然邊不可不防兵不可不養弊之甚者則宜更之患之大者則宜消之必使天下井牧其地伍兩其民無事則耕有事則戰是臣之願也未可遽行如漢之屯田唐之府兵亦足為善法而不能盡用則今日養兵終危道也危道之中又有甚焉以疲弱失教之兵置之極塞不毛之地日耗貴直之粟嵗勞挽饋之力寇小至則不足與校而強校之寇大至則不能以支更求益兵而申其致師之計則是以有限之財供無涯之費非徒費也又將起腹心大患豈非危道之甚者邪為今之計亦可以回顧少思而去其太甚者矣臣謂今日之寨户近於屯田今日之義勇近於府兵如廣募而精教之以銷禁兵之弊一寨戶之勇過於禁兵十人五義勇之費不敵禁兵一人以此校之養兵大費已省其半矣臣又聞自古及今有一國當一邊一州當一道者祿賞自足未聞取備於內也秦漢之際一燕一代自當胸奴本朝之初慶州姚內斌雄州李允則自當一道此無他兵精而無冗食也時使而不久戍也巖險其壘而不多留兵也通其互市以致州粟也多置屯田以息逺餉也廣募土人以減禁旅也冦不至則吾戒疆吏毋輕犯以致敵也冦既來則吾飭守將不與其幸勝也冦將退則吾度其盛衰雖空壘以􅊞之可也事既寧則吾計曲直雖益兵而報之亦可也凡此者雖非先王之法不猶愈於今日之弊哉以臣之愚雖不足以權大事欲望聖慈試以臣言參問邊臣許其極論是非覆奏如以為非則是邊臣欺罔陛下終不能銷天下腹心之患或以為是則願陛下不憚一時之勞盡講遺法而行不三四年國力民心庶可蘇矣臣無狀奉使以挽饋為職不能廣謀財利以應一切之急而言及養兵之弊人皆以臣為不善避嫌獨臣之愚志安社稷不忍緘默以自取容也元豐二年上時為河北路轉運判官宋名臣奏議卷一百二十一
