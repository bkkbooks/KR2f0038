body:
  text: 宋名臣奏議巻一百十一宋趙汝愚編財賦門新法三上神宗論王廣淵和買抑配取息李常臣近聞京東轉運使王廣淵以陳汝義所進羨餘錢五十萬貫隨和買絹錢俵散今却令每貫納見錢一貫五百於常税折科放買之外又取此二十五萬貫大凡挾轉運使之勢臨郡縣以鞭笞强百姓出息錢雖倍稱猶可雖然此而不懲臣恐姦利小人交以掊克為事不思窮閻敗室日益困窮陛下徳政不復下浹而禍亂起矣今中下之户有田不過二頃二頃之收不過百斛數口之家一歲之食過半而輸租糞田吉凶疾病之費悉資於榖粟今又强之使出錢錢非農夫所常有者不以粟易則賣田土而得之或奪其食或廢其生生之業如此而望民俗安堵冦賊不作難矣竊聞御史程顥已嘗言乞付有司施行熈寧三年正月上時為右正言先是二年六月京東轉運司言方春農事興而民困匱兼并乘具急而貸與之以要利昨冇旨以本路錢帛一百萬賜河北宜留半以貸貧民歳終可得息二十五萬中書以謂先時歳貸民錢一千收絹一匹今宜不收絹止收其直得利當半直下轉運司施行上批不須歲定所得息錢數或遇絲蚕不熟必致强民認數管納可詔轉運司民願輸納絹者亦聼隨稅輸納不得抑配至是監察御史裏行程顥言聞京東轉運使王廣淵去歳因和買紬絹多抛數日於人戸上配散每錢一千買紬一匹後來却令買絹并稅絹每匹令輸錢一千五百文乂配上等戸俵粟豆錢廣淵妄迎合朝廷意故致此語轉運司分析以聞廣淵言散粟豆錢本以濟民乏皆取民願和買依舊比無抑配者王安石為上言廣淵在京東功狀且曰廣淵為人誠不可知然見陛下欲責功實乃能趨赴以向聖意所在古者設官諭主意所好惡使民辟行之恐不當罪其迎合也遂置廣淵不問降詔日巳行常平新法其粟豆錢自今勿給紬絹本錢撥𨽻北京封樁息錢納内藏庫上神宗論變更舊制張方平臣䝉恩朝對今已奉辭竊惟孤陋之才適偶聖神之㑹上膺眷遇有異等倫今承特召而來安敢緘黙而去輒獻愚忠仰禆天聽臣聞人心惟危患生所忽動之甚易安之實難禁衛六軍邉防三路撫御之法善制具存民心戎事國之大本動靜之機安危所繫若民心危揺戎事興動䇿慮一失綏輯非易祖宗謨烈國家大計甚所謹重惟此二者不同小事隨宜改易縱有利害容得更張民猶水也可以載舟亦以覆舟兵猶火也可以焚物亦以自焚焚溺之害當在吉之先見造形而反已是後時害成乃悔則何及矣夫人臣之分出處是常國家大業天下重器譬之輜重豈可輕離願陛下思所以置器於安審所以藏身之固廣聰聽於符同之外採公議以得失之前深察軍民之情厚為社稷之慮使人安其業上下無怨溥天之下欣戴盛德高拱巖廊之上保此泰山之安朝廷尊而國體平順氣應而嘉生遂退就誅殛實所甘之熈寧三年正月方平自留守西京入覲除判都省固辭不受遂知陳州入辭上此奏上神宗論王廣㢘青苗取息李常等臣等伏見河北提舉常平廣惠倉王廣亷近至京師倡言青苗新法已曉諭河北取三分之利又聞制置條例司欲取其法行之天下臣竊以為過矣臣畧聞其歛散之法云下戸恐其負之不敢輒給其上戸則十有七八願者若爾則與立法之意相違戾矣新法以摧兼并惠貧弱為意而下戸不及又以贍上等之有餘則是助大賈蓄家以乘民之不給也何以為輕重盈虛之術乎况朝廷詔令云凡皆以為民而公家無所利其入是亦先王散惠興利以為耕歛補助裒益多寡而抑民豪奪之意也今纔數月而取利三分則與詔㫖甚相乖戾異時姦吏旁縁與聚歛之臣刻剥日滋則雖倍稱之息未可知也劉歆為新莽開賖貸設五均其弊至于亡國但云計贏所得受息毋過歲什一周禮凡民之貸者以國服為之息康成之注亦引莽制以為解今使人什三則又過亡新二矣既許其一歲再貸則其息遂至于什六下何以堪之哉詩曰曽是掊克歛怨以為德以陛下之睿聖有意於三代之隆若生財有道用財有節臣恐天下之財充牣委積而不可勝校而廣㢘小人造端以籠天下之利一旦生民重賦至于無聊而怨及於上為害豈淺哉臣愚伏望陛下寘廣廉于理可懲擅命之吏明詔有司推法之本意諭所遣提舉官勿以强民一切隨其所願倘䝉聖慈昭然辨其難以遽行止且試之河北陜西數路不勝幸甚天下至大生靈至衆不可以倉卒治也熈寧三年正月同右正言孫覺上初敕㫖散青苗錢並聽民從便毋得抑勒而提舉官務以多散為功又民富者不願取而貧者乃欲得之即令隨戸等高下品配又令貧富相兼十人為保首王廣㢘在河北第一等給十五貫第二等十貫第三等五貫第四等一貫五百第五等一貫民間喧然不以為便而廣亷入奏稱民間歡呼鼓舞歌頌聖徳言者遂交攻之上神宗論青苗陳襄臣近有奏狀為諸路俵散青苗錢官員内有生事擾民擅違朝㫖乞特與减黜及青苗已行俵散者只令送納本錢如未俵散處並令罷支等事未䝉朝旨施行竊詳條例司元降指揮以常平廣惠變為青苗之法申嚴賞罰督責州縣以謹其給納雖以優民救乏為名其實不異民間舉放之事以漁民取利而已豈陛下聖明之主所宜為之就使國家帑藏空虛財用不足亦未至如經紀小民放本取利事體削弱如此之甚也今來訪聞諸路所差官吏為見朝廷屬意財利莫不望風希㫖務為誅剥以覬幸酬賞茍免黜責或以三分取息或將陳舊之物紐作貴價兊換支散或不以民之貧富一例抑配事初如此其後可知臣恐此法一行騷動天下希錐刀之利失億兆之心貽禍之端未必不由兹始况興事改法繫國家安危大計上有公卿謀議下有臺諫糾察豈可只由條例一司獨專其事置陛下於有過使黎元之不安茍利一時歛怨天下非細事也臣欲乞將中外臣寮前後上言常平青苗等不便事件章疏并臣前狀降付中書令與宻院一處看詳定奪可否及下兩制臣寮供析利害聞奏庶陛下得以盡天下之公議知事體之難行特賜寢罷以安人心熈寧三年正月上時為侍御史知雜事上神宗論新法范鎮臣竊以常平倉始於漢之盛時賤則貴而歛之恐傷農也貴則賤而散之恐傷民也最為近古雖唐虞之政無以易也而青苗者唐衰亂之世所為也所為青苗苗青在田賤估其直收歛未畢而必其償是盜跖之法也今以盜跖之法而變唐虞不易之政此人情所以不安而中外驚疑也陛下以上聖之資厲精求治宜先道德以安民心而服四夷有司乃皇皇於財利使中外人心驚疑不安臣恐四夷有以窺我也廼者天雨土地生毛天鳴地震皆民勞之象也伏惟陛下觀天地之變罷青苗之舉歸農田水利於州縣追還使者以安民心而解中外之疑熈寧三年正月上時為翰林學士上神宗論新法范鎮熙寧三年正月二十三日詔諸路常平廣惠倉給散青苗錢本為恵䘏貧乏並取民情願今慮官吏不體此意追呼均配抑勒翻成騷擾其令諸路提㸃刑獄官體量察違者禁止立以名聞敢沮抑願請者按罰亦如之臣伏覩近降中書劄子四十道散下諸路約束分俵青苗錢不得抑配人戸並召情願者特申前詔耳非臣前所奏之謂也陛下嫉富人之多取而少取之少取與多取猶五十步之與百步耳何擇焉今有二人坐市市物其一人從其傍下其直以相傾奪則人皆知惡之况朝廷乎朝廷者非王道不可為乃欲為市道之所惡者乎異時下戸之舉息者大率千家纔數十百家今又盡敺而予之錢是天下之下戸皆舉息矣天下之下戸既皆舉息則其心乃常恐乎公上之責其償而莫寧其志也且始之予之也則人莫不願其得及責其償則豈能如予之之願乎臣恐官廩一散若貸糧之不時得收文移愈宻而天下多事矣貧富之不均久矣貧者十蓋七八何也力役科買之數也非富民之多取也富者纔二三既𣙜其利又責其保任下戸下戸逃則於富者取償是促富者使貧也貧者既已貧矣又促富者使貧萬一契丹渝盟秉常盜邉敺貧民與之守禦豈不殆哉且富民有道在於節費節費有道在於减兵减兵有道在於以漸為之十年則歲積緡錢五百萬矣積而不已以之為國則國用足以之治民則民力寛何用遣使汲汲於聚歛而取怨於天下之民乎宋興百一十年雖三代太平未有如今日之長也何則祖宗之規模在於州縣州委之生殺縣委之賦役慮其或失於中也為之轉運使提㸃刑獄以按察而糾舉之其委任謹重之道至矣一旦遣使數十人分撓其權欲天下之心不驚疑可乎而言者乃謂富人動揺又建議欲設賞以捕繫之是監謗也監謗而可為於此世乎亦猶興利者之為也臣無言責然陛下比者詔書丁寧今兹事體又大不敢緘黙伏乞檢臣前奏罷青苗錢歸農田水利差役於州縣而召還使者則天下幸甚熈寧三年正月上上神宗乞罷青苗及諸路提舉官韓琦准轉運及常平廣惠司牒支俵青苗錢每十戸以上結成一保須第三等以上有物力人充甲頭第五等并客戸不得過一貫五百文第四等每戸不得過三貫文第三等每戸不得過六貫文第二等每戸不得過十貫文第一等每戸不得過十五貫文如所支錢外更有剰數其第三等以上人戸委本縣量度物力於今來所定錢數外更添數支給若更剰錢如坊郭人戸實有自已物業可充抵當願借請官錢者仍五家以上結為一保依鄉村青苗例支錢借不得過物業抵當所直價錢之半其逐縣即不得避出納之煩令諸色人扇揺人戸却稱不願請領仰逐縣官吏用心曉告如不願請領即具結罪文狀入馬逓申赴當司以憑選差清强官徃彼曉諭人戸如却願請領其本縣干繫人必别作行遣如事理稍重必具事由申奏應夏秋收成合納所請過價錢斛㪷如物價稍貴願納見錢者當議於市價上减樸錢數仍比附元請價錢上十分中不得過三分假令一戸請過錢一貫文如送納見錢不得過一貫三百文臣竊以國之頒號令立法制必信其言而使民受實惠則四方觀聽孰不欣服伏詳熈寧二年詔書務在優民不使兼并乘其急以邀倍息凡此皆以為民而公家無所利其入謂合先王散惠興利抑民兼并之意也今乃鄉村自第一等而下皆立借錢貫三等以上更許增添坊郭戸有物業抵當者依青苗例支借且鄉村上三等并坊郭有物業戸乃從來兼并之家也今皆多得借錢每借一千令納一千三百則是官放息錢與初詔抑兼并濟困乏之意絶相違戾欲民信服不可得也又鄉村保須有物力人為甲頭雖云不得抑勒而上戸既有物力必不願請官吏防保内下戸不能送納豈免差充甲頭以備代陪復峻責諸縣人不願請即令結罪申報若選官曉諭却有願請者則干繫人别作行遣或具申奏官吏懼提舉司勢可升黜又防選官曉諭之時豈無貧下浮浪願請之人茍免捃拾須行散配且下戸見官中散錢誰不願請然本戸夏秋各有稅賦又有預買及轉運司和買兩色紬絹積年倚閣借貸麥種錢之類名目甚多今更増納此一重出利青苗錢愚民一時借請則甚易至納時則甚難故自制下以來一路官吏上下惶惑皆謂若不抑散則上戸必不願請近下等第與無業客戸雖或願請必難催納將來必有行督索及勒干繫書手典押耆長戸同保人等均陪之患大凡兼并者所放錢雖取利稍厚縁有逋欠官中不許受理徃徃舊債未償其半早已續得貸錢兼并者既有資本故能使相因歲月漸而取之今官貸青苗錢則不然須夏秋隨稅送納災傷及五分已上方許次料催還若連兩料災傷則必官無本錢接續支給官本因而寖有失陷其害明白如此更有縁此煩費虛擾之事不敢具述去歲河朔豐熟常平倉糴米斗錢不過七十五至八十五以來若乘時收歛遇貴出糶不唯合於古制而無失陷之弊兼民被實惠亦足收其羨贏今諸倉方有糴入而提舉亟令住止蓋盡要散充青苗錢指望三分之利收為巳功縣邑小官敢不奉行豈暇更䘏貽民乆逺之患哉諸路所行必料大率如此朝廷若謂陜西嘗放青苗錢官有所得而民以為便此乃轉運司因軍儲有闕遇自冬涉春雨雪及時麥苗滋盛决見成熟行於一時則可也今乃差官置司為每歲春夏常行之法而取利三分豈陜西權宜之比哉兼初詔且於京東淮南河北三路先行此法候成次第即令諸路施行今此三路方憂不能奉行而遽於諸路徧差提舉官以至西川廣南亦皆置使伏惟陛下自臨御以來夙夜憂勞勵精求治况承祖宗百年仁政之後民浸德澤唯知寛䘏未嘗過擾但躬行節儉以先天下常節浮費漸汰冗食自然國用不乏何必使興利之臣紛紛四出以致逺邇之疑哉欲望聖明更賜博訪若臣言不妄乞盡罷諸路提舉官只委提㸃刑獄官依常平舊法施行熈寧三年二月上時判大名府上親袖琦奏出示執政曰琦真忠臣雖在外不㤀王室朕始謂可以利民不意乃害民如此出令不可不審且坊郭安得青苖而使者亦强取之乎王安石進曰茍從其所欲雖坊郭何害因難琦奏曰陛下修常平法所以助民至於收息亦周公遺法也且如桑𢎞羊籠天下貨賄以奉人主私欲此乃所謂興利之臣也今陛下置官為天下理財非以佐私欲則安可謂之興利之臣乎上曰坊郭俵錢如何曽公亮陳升之皆以為不當俵安石曰坊郭所以俵錢者以常平本多農田所須已足而有餘則因以賑市人乏絶又以廣常平儲也廣常平儲所以備百姓之凶荒不知於義有何所害公亮曰坊郭上等户則無所用之下等户則難於輸納安石曰既取情願則無所用者自不俵既有保甲則難於納者自不能誚矣升之曰但恐州縣避難索之故抑配上戸耳安石曰抑配誠恐有之然俟其冇嚴行黜責一二人則其弊自絶如河北路則恐不可抑配聞韓琦自諷諭諸縣言百姓皆不願投狀唯一縣初以為不便而為司録陳紘者說譬曰若朝廷更選人體問而百姓反稱情願則奈何於是乃不敢投狀儻河北一路有一人不願則韓琦必受其狀以聞今琦自入奏乃無此則百姓不以為不便提舉官不敢抑勒可知矣然上終以韓琦所説為疑安石曰臣以為此事至小利害亦易明且使州縣抑配上戸俵十五貫錢又必令出三分息錢一戸所倍止三貫錢因廣常平儲蓄以待百姓㓙荒則比之前代科百姓出米為義倉米未為不善况又不令抑配有何所害而上煩聖心過慮臣論此一事已及十數萬言然陛下尚不能無疑如此事尚為異論所惑則天下何事可為上曰要須盡人言料文彦博呂公著亦以為不可但腹非而已韓琦獨肯來說真忠臣也安石曰事誠當盡人之情偽事之是非若於情偽是非不能深察唯務多納人言則恐非但常平事不可為事事皆無可為者翌日安石遂稱病不出詔以琦奏付三司制置條例司上神宗乞罷提舉官吏及住散青苗錢吕公著臣竊聞近日中外臣寮累有章疏乞罷昨差提舉常平廣惠倉官吏及住散人戸青苗錢至今未有施行臣伏思朝廷所以特遣使人頒行新法本欲惠恤百姓非為剥下奉上朝廷之意固已甚善然而朝野沸騰皆以為不便者蓋由朝廷處置前後自相違戾如昨來元本敕㫖止於河北京東淮南三路後來忽然續差官吏徧行天下所差官吏往往多不得人如蘇涓王廣亷皮公弼之徒張皇事勢必欲生事邀功朱經李元瑜之輩庸猥下才所在為人輕笑其間取利之條日増惠民之意漸失所以人心揺動日益不寧臣欲乞應前來所遣官吏可一切罷歸其青苗錢且只於近京一兩路專委提刑司或轉運司相度俵散務要惠民不必取利候散及一二年如見得於公私無損實有惠濟推之諸路亦未為晚兼人心亦自信服若一二年間民猶以為不便則朝廷亦宜改作不可必遂前失如此則人心自安無不得所熈寧二年二月上時為御史中丞上神宗再論青苗錢吕公著臣近具劄子言制置三司條例司本出權宜合從廢罷諸路散青苗錢違戾元降敕㫖及遣提舉官等不當並宜追還昨日亦曾面奏未䝉施行臣伏思近日朝廷頗有更張其意雖欲便民然其間事理豈能盡當茍博采羣言事有未便者不憚改作則善莫大焉若舉措既失人心已揺專以朝廷之威欲勝衆多之口則恐執之愈久物情益更不安至於迷而後復所失多矣伏乞特賜檢㑹臣前奏降出施行熈寧三年二月上上神宗乞罷條例司常平使者司馬光臣蒙聖恩除樞宻副使仍屢遣陳承禮等趣臣就職德意汪洋天隆地厚非臣隕身糜骨所能報稱然臣切惟陛下所以用臣之意蓋察臣狂直庶㡬有補於國家臣所以事陛下之心亦不過竭其愚𠂻以禆聖德之萬一若陛下徒以禄位榮臣而不取其言則是以天官私非其人臣徒以禄位自榮而不能救生民之患則是盜竊朝廷名器以私其一身誠恐上累陛下之至公下䘮微臣之素守此臣所以屢違詔命不敢祗受者也臣伏見陛下天縱英明勵精求治思得嘉謀以新天下而建畫之臣不能仰副聖意思慮未熟講議未精徒見目前之小利不顧永久之大害憂政事之不治不能輔陛下修祖宗之令典乃更變亂先王之政刑患財利之不足不能勸陛下以恭儉節用乃更遣聚歛之臣誅剥齊民設官則以冗增冗立法則以苛益苛使四海危駭百姓騷然猶且堅執而行之不肯自以為非也臣先曾上疏言不當設制置三司條例司又言天下之事當委之轉運使知州知縣不當别遣使者擾亂其間又嘗因經筵侍坐言散青苗錢不便自後朝廷更遣使者四十餘人分行天下以提舉管當常平廣惠倉相度差役農田水利為名其實專使之散青苗錢臣竊自疑智識淺短不足以知天下變通之務又疑因臣之言激怒建畫之臣使行之更力由是閉口不敢復言今行之纔數月中外鼎沸皆以散青苗錢為不便然後臣乃敢發口復言彼言青苗錢不便者大率但知所遣使者或年少位卑倚勢作威陵轢州縣騷擾百姓止論今日之害耳臣所憂者乃在十年之後非今日也夫民之所以有貧富者由其材性愚智不同富者智識差長憂深思逺寧勞筋苦骨惡衣菲食終不肯取債於人故其家常有贏餘而不至狼狽也貧者啙窳偷生不為逺慮一醉之外無復贏餘急則取債於人積不能償至於鬻妻賣子凍餒填溝壑而不知自悔也是以富者常借貸貧民以自饒而貧者常假貸富民以自存雖苦樂不均然猶彼此相資以保其生今縣官乃自出息錢以春秋貸民民之冨者皆不願請貧者乃欲得之而提舉官欲以多散為功故不問民之貧富各隨戸等抑配與之富者與債仍多貧者與債差少多者至十五緡少者不减千錢州縣官吏恐逋欠為負必令貧富相兼共為保甲仍以富者為之魁首貧者得錢隨手皆盡將來粟麥小有不登二稅且不能輸况於息錢固不能償吏督之急則散而之四方富者不去則獨償數家所負力竭不逮則官必為之倚閣春債未畢秋債復來歴年寖深債負益重或值㐫年則流轉死亡幸而豐稔則州縣之吏併催積年所負之債是使百姓無有豐㐫長無蘇息之期也貧者既盡富者亦貧臣恐十年之外富者無㡬何矣富者既盡若不幸國家有邉隅之警興師動衆凡粟帛軍須之費將從誰取之臣不知今者天下所散青苗錢凡㡬千萬緡若民力既竭加以水旱之災州縣之吏果有仁心愛民者安得不為之請於朝廷乞因郊赦而除之朝廷自祖宗以來以仁政養民豈有視其流亡轉死而必責其所負其勢不得不從請者之言也然則官錢㡬千萬緡已放散而不返矣官錢既放散而百姓又困竭但使閭胥里長於收督之際有乞取之資此可以謂之善計乎且常平倉者乃三代聖王之遺法非獨李悝耿壽昌能為之也榖賤不傷農榖貴不傷民民賴其食而官收其利法之善者無過於此比來所以隳廢者由官吏不得人非法之失也今聞條例司盡以常平倉錢為青苗錢又以其榖換轉運司錢是欲盡壞常平專行青苗也國家每遇㐫年供軍食自不能足用固無羨餘以濟饑民所賴者止有常平倉錢榖耳今一旦盡作青苗錢散之向去若有豐年將以何錢平糴若有㐫年將以何榖賙贍乎臣竊聞先帝嘗出内藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢榖共約一千餘萬貫石今無故盡散之他日若思常平之法復欲收聚何時得及此數乎臣所謂散青苗錢之害猶小而壞常平倉之害尤大也今國家每有大費三司所不能供者陛下輒取内藏庫物以給之彼内藏庫者乃祖宗累世之所蓄聚以備軍旅非常之用也使其物常如泉源流出於庫無有窮竭之時則可矣若本皆歛之於民以實之則有時而空矣昔漢文帝欲作露臺召匠計之直百金上曰百金中人十家之産也吾何以臺為太宗時兖王嘗作假山召寮屬置酒觀之翊善姚坦獨俛首不視王强使視之坦曰坦唯見血山耳不見假山王驚問其故坦曰坦在田舎時見州縣督稅里胥臨門捕人父子兄弟送縣笞撻血流滿身愁苦之聲不可忍聞此假山皆民租賦所為非血山而何是時上亦自為假山聞之遽命毁之今陛下令薛向於江淮為貿易以一二百萬緡畀之又散青苗錢數千萬緡其餘五十萬三十萬者固不足數爾其為露臺假山之費不亦多乎陛下聰明仁儉固不減漢文帝及太宗然而視弃財物如糞土者蓋未知其所從來皆出於生民之膏血耳陛下若終信條例司所言推而行之不肯變更以循舊貫十年之外富室既盡常平已壞帑藏又空不幸有方二三千里之水旱餓殍滿野加以四夷侵犯邉境羽書狎至戎車塞路攻城不已轉餉不休當是之時民之羸者不轉死溝壑壯者不聚為盜賊將何之矣秦之陳勝呉廣漢之赤眉黄巾唐之黄巢皆窮民之所為也大勢既去雖有智者不能善其後矣臣竊惟太祖太宗躬擐甲胄櫛風沐雨跋履山川䝉犯矢石以為子孫成光明盛大之業如此其美也陛下試取臣所進歴年圖觀之自周末以來至于國初一千三百六十有二年其間亂離板蕩則固多矣至於中外無事不見兵革百有餘年如國朝之盛者豈易得乎此臣所以尤為陛下痛惜者也書曰民不靜亦惟在王宫邦君室臣切觀方今四夷親附邉鄙不聳五榖和熟盜賊稀簡是宜為天下和樂無事之時而中外恟恟人不自安者無他故也正由朝廷有制置三司條例司諸路有提舉管當常平廣惠倉使者爭獻謀畫各矜智巧變更祖宗法度侵奪細民常産掊歛財利以希恩寵非獨此青苗一事而已至於欲計畝率錢雇人充役決汴水以種稻及溉民田及欲洩三十六陂水募人耕佃若此之𩔖不可悉數道路之人共所非笑而條例司自以為高奇之䇿以授常平使者必欲行之天下恐其興作之不已皆如青苗為害於民也故小大惶惶不敢自安茍不罷廢此局則生民必無休息之期矣陛下誠能昭然覺悟采納臣言罷制置三司條例司及追還諸路提舉管當常平廣惠倉使者其官員並送審官院與合入差遣青苗錢巳散者令州縣官豐熟日催收本錢更不取利未散者毋得更散其常平倉錢榖依舊封樁令提㸃刑獄司管當則太平之業依然復故矣兹事明如白黒易如反掌陛下何憚而不為也如此臣雖盡納官爵但得為太平之民以終餘年其幸多矣茍言不足采陛下雖引而寘諸二府徒使天下指臣為貪榮冒寵之人未審陛下將何所用之不勝惓惓狂愚之誠惟聖明裁處熈寧三年二月上光懇辭樞副章六七上上神宗封還罷司馬光副樞劄子范鎮臣准中書送司馬光劄子奉聖㫖依乞收還樞宻副使敕告依舊供職送學士院降詔旨臣伏見司馬光稱近曽上疏乞罷制置三司條例司及追還諸路常平廣惠倉使者未聞朝廷少賜采録但聞條例司愈用事催散青苗錢愈急中外人情愈惶惶不安臣當此際獨以何心敢當高位臣竊以姚元崇以十事要明皇明皇盡用之然未有大於此者而開元之政遂致太平今光但以一事欲除其害之徧天下者乃未拜命時所言而陛下乃追還光樞宻副使之命者考求義理竊所未安臣前日進讀延英閣吕惠卿言青苗錢皆是民間情願就令臣為富家使臣保任九家下戸令官中取債則臣實不願以臣之心觀天下之心恐不相逺更乞陛下宣問二府大臣及左右侍從之臣此言是與不是天下人心如此不如此今臣所陳大抵與司馬光相類而光追還新命則臣亦合加罪責所有下學士院文字未敢行下謹具封納伏乞陛下特賜詳察熈寧三年三月上時為翰林學士兼銀臺司上神宗論罷司馬光樞宻范鎮封駮司不當孫覺臣前日延和面奉聖㫖議改青苗法復常平舊制又患諸路提舉非其人有意更易臣切喜嘆以為中外之論正欲如此而聖諭及之真臣等之所望四方之所幸也翹足企首以俟德音昨日又聞罷司馬光樞宻副使罷范鎮通進封駮司若以司馬光爭論青苗新法拒違詔除鎮從而和之駮正而不肯下則是青苗之議持之尚堅而延和宣諭或亦有不果者歟臣屢嘗奏聞青苗新法極為細事徒以大臣講求不詳議論不審而倉卒茍且擾動天下故人情不安論難鋒起當此時雖有善謀良法難以推行况考之於古而或差施之於今而未當措置舛錯如此其甚者哉奈何以難行之法惡人議之至罷一樞宻副使絀一封駮司流聞四方所損不細傳載後世何以觀法昔成王剪桐葉以戲叔虞史佚從而封之曰天子無戲言西府之重何止如封國司馬光之直諒豈但方於叔虞誥敕之嚴固不並於桐葉陛下有戲言之過則號令之所被眩人以空虛無用之文誥命之所加示人以玩弄可移之物書曰令出惟行不惟反易曰汗其大號令行而更收汗出而復反何以使人信而誅其或惰者乎朝廷設官分職固欲人守其官士稱其職也范鎮封駮識者莫不是之不能聽用其言奈何罷其職任傳曰守道不如守官鎮能守其官是封駮之得人也遽然罷之豈將患其不順已耶不順陛下者多見容不順執政者輒見斥臣恐人主之權或移於下矣失職者固法之所誅守官者又朝廷之所弃不知陛下將取固禄保位茍容其身以備員充數乎不然何宜進者反聽其罷宜任者反從而黜耶臣以陛下致今日之紛紜而在朝羣臣徃徃求去者何耶徒以青苗新法人情不安所遣使者多非其人大臣建議而不從言者力爭而不聽至於罷免柄臣之新命黜責禁近之守官推劾諫臣之風聞内外騰沸駭動四方臣切憂他變相縁而生治亂從此分矣伏望聖慈采羣論之所長奮乾剛之獨斷稍復常平之舊法悉罷提舉之庶官自然人情復安中外如故熈寧三年三月上時為右正言宋名臣奏議巻一百十一
