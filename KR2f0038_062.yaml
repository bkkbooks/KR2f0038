body:
  text: 宋名臣奏議巻六十二宋趙汝愚編百官門内侍中上仁宗論趙繼寵不合越次幹當天章閣傅堯俞臣伏聞差贈淑妃董氏閣使臣供奉官趙繼寵幹當天章閣仍指揮在幹當使臣之上事不均平人用嗟怨竊縁舊法内東門有闕依名次差天章閣使臣天章閣有闕即差後苑使臣後苑有闕即差延福宫使臣兼嘉祐三年八月申明甚確今天章閣而下延福宫以上幹當者凡十三人亦皆久侍左右以勞進遷繼寵何功直居前列将來内東門闕官便當次補敗紊綱紀増長僥倖樞密院殊不檢詳條例有請必行貪覬之徒迭相觀效實恐舊條日益隳廢臣又聞至和元年十一月楊永徳幹當延福宫但依先後繼差其時亦有約束今後延福宫後苑天章閣更不添人陛下念其乆事淑妃收奨繼寵候延福宫有闕日特差於繼寵恩意固已隆厚其天章閣上名之命伏望即行追寢凡有遷改乞於舊法從事則天聽日清人心無憾嘉祐七年十月上時為監察御史裏行上仁宗再論李允恭趙繼寵傅堯俞臣近有状乞追李允恭之孫永昌恩命及奪供奉官趙繼寵差遣皆不䝉降出事權膠固孤力難移早夜顧思措身無所伏念倖人徼寵破壊常法樞密院茍徇人情恣其求請致臣區區屢煩睿聽然臣所以不避誅譴而喋喋不巳者冀陛下矜憐特加收採防微杜漸緝正綱紀臣若顧避便不復言日往月來浸以増甚不知於朝廷損乎益乎凡事止於蘖芽差易為力謂小無害積悔将深使李永昌若即正典刑繼寵者豈敢妄有覬倖今此二人儻不追奪則兩省内侍攀援趨近各生意於繩墨之外矣美官重禄率歸私謁明敕著令舉為空文惟陛下留神念之此豈為政之體今朝廷闕失獨賴臺諫官數人故陛下時有所聞窒此一途聰明何寄臣謂其言可聽願陛下奮然行之有不能容不若明加竄黜忠義之士猶有不顧而言者如其是非置而不辨章奏入而不下使黙黙以食息悠悠於圏牢則有志者豈肯為陛下安職業而久留哉是不徒孤臣之羞亦非陛下之福至於今後依先降條貫餘人不得援例如此指揮最為深弊臣雖亡狀不願數聞陛下豈不惡之但未之思耳伏乞将臣前後論列李永昌文字及趙繼寵兩狀付外早賜盡法施行嘉祐七年十月上上仁宗再論李允恭趙繼寵傅堯俞臣累狀乞追李永昌恩澤奪趙繼寵差遣終未䝉降出近聞鄭睹者将十數年前事援繼寵例又幹當後苑人言未已倖進相仍事聞搢紳莫不驚駭因縁攀引殊無已時豈有為法馭下執政不用設官使言而陛下不聽如此是條禁不須設而御史可以廢也臣非不知掇拾細微聊以供職上不違陛下下不忤貴臣可以無害患而速富貴恐臣今日所得未多陛下異時為悔已甚故獨區區顧思而不能自已者也張昇廢陛下之法恃倖臣之援蔑視言者謂如無人且昇者嘗任御史厯知雜事遂為中執法當日謂陛下者云何而今乃所為如是陛下略加省察可以見其心矣伏望聖慈出臣前後論列文字依條施行不然誅臣以快權倖臣忠憤所激言不能文惟陛下留神裁處嘉祐十年十一月上上仁宗論御藥院劉保信等與授外任不得闇理官資司馬光臣伏見祖宗以來擇内臣謹信者幹當御藥院以其職任最為親近恐名位寖崇嵗月稍久則權勢太重不可制御故常用供奉官以下為之轉至内殿崇班則出為外官此乃祖宗深思逺慮防微杜漸髙出前古詒謀萬世者也近嵗以來頗隳舊法居此任者往往闇理官資請其俸給久而不革殊失祖宗之意深為不便今兹踐阼之初所宜革去積弊率由舊章竊聞幹當御藥院劉保信等四人亦曾自陳乞因覃恩别授外官伏望皇太后殿下皇帝陛下各依逐人所請及應自來内臣闇理官資者並除正官授以外任别擇供奉官以下素知心腹忠信謹慤之人使幹當御藥院仍自今後凡轉官至内殿崇班以上者並須出外一遵祖宗之制不得闇理官資依舊留任内廷差遣嘉祐八年五月上時為諫院上英宗論張茂則年未及五十不可為押班司馬光等臣等竊聞祖宗舊制内臣年未五十不得充内侍省押班近除張茂則年方四十八今陛下踐阼之初尤宜謹守祖宗法度以御左右之臣示天下至公若茂則果有才幹可用雖更留此闕二年俟其年至然後授之又何晚也臣恐茂則一開此例則内臣攀援求進者多畫一之法從此隳壊人人相效不可禁止不若正之于事之初也臣等區區所為國家重惜在此而已嘉祐八年十月上時知諫院上英宗論任守忠十罪司馬光臣近者兩次上言任守忠奸邪事迹乞正典刑至今未聞施行臣迫於忠懇不能自已竊見守忠早以小臣獲事先帝幸䝉奨拔榮禄俱極日侍左右不能以忠言正道補益萬分專以詼諧謟諛茍求悦媚其罪一也總領近侍委之差遣而凌蔑同列與奪自恣附已則愛悦逆意則憎疾援引親黨排抑孤寒任情徇私略無顧避其罪二也從來所授俸禄賞賜亦不為少而恣性貪惏老而益甚盜竊官物受納貨賂金帛珍玩溢於私家第宅産業甲於京師聚歛之心曾无紀極其罪三也交結朋援專據權勢縱逞胸臆妄行威福所愛者雖有大罪掩蓋不言所惡者小有瑕疵糾擿成事使宫禁之内側足屏息畏憚守忠無以為比其罪四也濮王之薨守忠監護葬事賣弄國威輕蔑皇族乗其有喪丐奪財物所得甚多終不滿意遂誣長子宗懿以為不孝使之被譴感憤成疾以至沒身不能自雪其罪五也先帝以春秋寖髙未有繼嗣深思宗廟生民之重屬意聖明固非一日而守忠隂蓄奸心沮壊大䇿深忌國家立長立賢自欲於倉卒之際居中建議擇幼弱昏懦之君以邀大利如有唐之季定䇿國老門生天子賴先帝聰明卓然逺覽斷志不疑不然則太平之業幾墜於地其罪六也及陛下既為皇子守忠内懐憂懼日於先帝之前離間百端隔絶内外進對甚希使先帝為陛下之父不得施為父之恩陛下為先帝之子不得展為子之親其罪七也先帝晏駕陛下纉統不幸遇疾皇太后權同聽政守忠乗此之際大逞姦謀闚伺語言撰造事迹往來革面進退異辭使皇太后以文母之慈不免投杼之疑陛下以曾閔之孝乃有負恩之謗交鬬兩宫遂成深隙計其隂謀無所不至賴皇太后聰明確然執義不可傾移不然禍變之興豈可具道其罪八也及聖體既安皇太后躬還大政守忠不勸導陛下以勤修子道承顔順意報荅盛徳恢廣令譽而相時隨勢翻異炎凉欲詐輸新忠以巧遮舊惡用昔時讒陛下之計為今日讒皇太后之辭雖陛下未必聽受而使皇太后聞之不能不以介意終日涕泣悒怏成疾守忠但欲左右反覆自為身謀並不顧天下之人議陛下之善惡其罪九也皇后正位尚新天下聳觀令徳守忠輙為皇后畫䇿並不稟問皇太后矯傳教㫖開祖宗寳藏擅取金珠數萬兩以獻皇后既取悦一時又坐享厚賜逆婦姑之禮開驕侈之源使皇后受其惡名而已身收其重利為臣奸邪孰甚於此其罪十也守忠有大罪十皆陛下所親見衆人所共知其餘欺慢為姦恣横不法事類繁多不可勝言誠國之大賊人之巨蠧伏望陛下盡發守忠之罪明示四方斬於都市以懲姦慝治平元年八月上時知諫院上英宗乞御藥院等處親加選擢司馬光臣向時上殿伏見陛下宣諭以内臣差遣並一切委之都知司臣當日已曽奏陳以為非便今入内内侍省都知任守忠恃此權勢背公立私奉之者坐獲進擢忤之者立致排擯威福之柄盡在其手遂使宫禁之中畏憚其人過於人主罪盈惡積幸賴陛下神斷已斥而去之然儻不收還威福之柄則是去一守忠生一守忠無益也臣愚伏望陛下自今日巳後除内臣常程差遣依舊令都知司定差外其幹當御藥院内東門龍圖天章閣後苑化成殿延福宫等處及非時差管幹裏外要切公事之人並乞陛下親加選擢試之以事觀其為人忠謹有功者則加賞拔姦邪不職者則加貶退不必一一勘㑹資序檢尋體例如此則誰不懐徳畏威輸忠竭力豈獨内臣而已雖外朝之臣亦可用此道而治也治平元年八月上時知諫院上英宗論差中官為陜西鈐轄吕誨臣近聞陜西四路各差中官一員充鈐轄專管蕃部公事及支公使庫錢千貫仍每嵗入奏邊事權勢甚重驚駭羣聽臣不識聖算之逺但聞羣臣之議不以為便亦恐為陛下之謀者思之未至耳但有唐以來舉兵不利未有不自於監軍者我朝因循前弊尚多久未更革柰何又増置此員如走馬承受官品至卑一路已不勝其害況今鈐轄寄重其實已均安撫使之權矣原朝廷之意必為昨來熟戸背叛弓箭手逃亡使之以時犒設專行姑息何其疎也臣嘗見熟戸耕佃官田並無征徭遇戰鬬方出一人一騎兹外更無侵擾熙熙安業界外生戸羡慕不足常苦諒祚誅求願為漢民不可得爾有以知熟戸無背漢之心明矣但為諒祚誘之以厚利刼之以重兵邊臣坐視殺戮不為救護彼將逃死豈得已也若威加邊外戎人不敢内侵熟戸自然安堵不爾雖豐牛酒日為犒設徒有損費何益於事哉至如士卒久不訓練蓋兵官不務協同借若五將軍中有一員内臣不喜教閲動為姑息由此卒伍驕惰他將稍嚴紀律則怨謗競起帥臣畏懼唯恐生事上下因循茍簡軍旅无繇精鋭斯中官姑息之效也疆場之事果只如此處置未知其利而但見其害藩籬不日隳壊将盡藩籬隳則邊城危矣臣前奏上乞於无事時整齊熟戸弓箭手大臣合議終不以為然臣觀今日處置誠未為便喑黙不言則負任使所謂鈐轄四人者臣欲乞朝廷省罷精擇帥臣凡事一切付委庶幾閫外之權專制則於責重矣惟聖智擇焉治平二年三月上時為侍御知雜事上英宗論差中官為陜西鈐轄傅堯俞臣聞近差内臣四人分為陜西四路鈐轄俾專安輯熟戸而理其寃結仍許每嵗一入奏事臣獨念之未以為得縁所以置安撫經略使者正為此等耳夫不能慰安使叛而從賊與無故為羌戎所刼有司之過一也茍謂帥臣力不可為則雖内臣何益豈有邊鄙藩籬為賊掠去迺无一人責其任也今邊事方作處置不可失宜臣謂安輯之要當專督帥臣但寛其覊勒使得盡其才力儻猶不職重行黜免則後效可圖而威靈伸矣况理有非便庸可不思将來李若愚奏事茍不以為信與无用同言而必從則安撫經略之權遂歸於四人矣彼帥臣者将謟奉之不暇又敢與之較事體而爭是非哉縱若愚等審謹无過猶不足以為後法便著成效益有可慮古人謂塞其㳙㳙況勢非㳙㳙者乎伏乞收採芻蕘特行寝罷前事之失具存方冊臣不敢詳言惟陛下留神省察治平二年三月上時同知諫院上英宗論差中官為陜西鈐轄趙瞻臣伏聞古者天子推轂遣将則曰自閫以外将軍制之蓋明委任之專也故唐於諸道行軍而置總管節度以至領押諸蕃部落及近界諸蠻之類率入階銜遂成定制國朝自起西師分置戎府外有四路以扼虜境然招討經略安撫總管之司責任至重故未嘗不選文武賢明之臣以領其柄内則數州之軍民外則諸部之蕃落威恩刑賞處置制宜敢於纎微有不振舉比者戎事稍息人自謀安繒絮飲食失於侈靡藩籬族聚不復顧䘏向即已稱兩面今遂絶為匪人去嵗西夏兵勢壓邊思順酋豪既為統率諸族離弱固自歸投中國不為救營熟戸隨亦翻叛致此疆場蕩無斥堠賊若犯境徑至城下固宜朝廷熟慮更制近乃特以内臣王昭明四輩各當一路招撫近蕃雖留神則甚勤在制宜則殊失竊觀唐室興兵最多更用官人率致敗事如觀軍容及宣慰等名常為切齒之患令招集蕃部鎮安方陲悉皆大将之權豈容偏帥所撓一委斯柄将襲往弊兵機牽制統帥何安臣愚所見不若以此等事盡付帥臣是其官守誰執其咎既塞分權生事之隙又明委任責成之專即罷閹官無侵軍政足以前鑒史戒而後息亂原矣臣以久居闗陜寖識事宜比自西來兼訪道路邊人議士率言此失願陛下特留神斷不憚改更隨意招懐以安攜貳治平二年三月上時為侍御史上英宗論差中官為陜西鈐轄趙瞻臣伏䝉陛下特出聖意擢在言職犬馬猶知報効臣子豈忘奮勵況聞輿論敢自循黙近日於垂拱殿輙已具劄子敷奏以内臣王昭明等四人分制邊任侵撓帥權乞賜更置專責大将至今未䝉采聽是臣所負言責之未塞者也此事一書國史已玷陛下元年之大政今又不察臣言遂為國家異日之遺恨茍能遽追前命慰快羣情即於反掌之間更彰納諌之徳故人人莫不為陛下深惜之也且如帥府處置蕃部乃是邊事萬分之一今以一事偶失即為添置中官将來復有事生又欲何以為計況彼各受密㫖嵗入朝謁邊臣疏逺日慮傾危軍政異同孰能主執外未制敵内先壊事昔程元振誣來瑱之罪魚朝恩間子儀之功故穆質諌用宦人為将而吐突承璀終無功于鎮定裴度奏罷諸軍監陣而李愬逐賊于淮蔡至如本朝鄜延敗事則斬徳和于河中麟府喪師則流元道于海裔豈非古今得失之明效哉然猶使議者惓惓疑宸𠂻之未斷怪輔臣之依違斯可謂事機之切不可不亟諫也臣至微賤愚忠所激義忘後害殊不知有一身一門之私計亦不知有羣閹羣邪之勢力上冒天威死有餘戮臣愚不勝激切之至治平二年三月上上神宗論御藥院髙居簡司馬光臣聞古人有言堂上不糞則郊草不瞻矌芸言近者不治則不暇及逺也竊見幹當御藥院髙居簡性資姦回工讒善佞久處近職罪惡甚多臣謹按祖宗舊制幹當御藥院官至内殿崇班以上即須出外蓋以日月寖久官資稍髙則防其憑恃威靈竊弄權柄逺鑒漢唐之禍深為子孫之慮故也陛下即位之初内臣以覃恩遷官者盡補外職獨留御藥院四人天下首以此一事譏陛下之失況居簡於衆人之中最為狡猾而陛下特加寵信待以腹心中外指目大玷聖徳臣職在繩糾不敢不言伏望聖慈遵祖宗令典應幹當御藥院官至崇班以上者盡授以向外差遣其髙居簡乞逺加竄逐以解天下之惑治平四年七月上時為御史中丞上神宗論御藥院髙居簡司馬光臣近曾上言幹當御藥院髙居簡工讒善佞乞逺加竄逐未䝉施行昔周公以立政戒成王至虎賁綴衣趣馬小尹左右攜僕百司庶府亦皆擇人穆王命伯冏為大僕正曰昔在文武侍御僕從罔匪正人又曰簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖自古聖帝明王雖左右小臣未嘗不謹擇端良之人以自防逸豫之生也況陛下嗣膺寳命聖徳惟新善惡興衰於此乎分而使讒佞如居簡旦夕常在左右又寵信之此乃異日禍亂之根腹心之疾也臣職在去邪不敢不再三上言伏望聖明依祖宗舊制應幹當御藥院官崇班以上者並令出外其髙居簡仍乞逺加竄逐治平四年七月上上神宗論御藥院髙居簡司馬光臣昨日前上殿言幹當御藥院髙居簡自先帝時竊弄權柄陛下復寵而信之大為聖徳之累乞治其罪陛下許臣送樞密院施行至今未聞有指揮不知居簡以何道結陛下能如此之深也居簡所能止於讒佞佞者不過巧言令色希意迎合快人主之欲以市其權使人主溺於荒宴而不自知也讒者不過離人君臣間人骨肉惑人主之心以固其恩使人主陷於傾危而不自悟也有是二者不可不察向使陛下即位嵗久功業已成而有讒佞之臣始得弄權天下有識者猶當寒心何則知其必為禍亂之階也況今初承大統當鋭精求治之時而遽留居簡於左右仍加寵信根蔕已牢則異日之憂可勝道哉此臣所以不避死亡而必當力爭者也或聞陛下欲待居簡自求引退然後遣去臣誠戇愚未曉所謂若國之大臣耆年有徳聞望素髙一旦偶有小失未為外人所知陛下務存終始使自引去以全其名則可矣其挾姦作慝者猶宜明正刑書況居簡閨闥小臣罪惡盈積所宜肆諸市朝宣示四方以戒憸人而尚足為之隱乎且居簡姦邪播聞逺近陛下今日雖為之隱天下耳目庸可蔽乎凡居簡所以能為惡者以其自託宫禁譬如狐䑕依憑城社彼唯恐離去左右豈肯自陳求退乎伏望陛下盡出羣臣前後所言居簡事状送居簡赴所司明治其罪以彰至公之道治平四年七月上上神宗論御藥院王中正乞盡罷寄資令補外官司馬光臣伏見陛下前者盡罷寄資内臣髙居簡等令補外官中外欣然無不稱頌聖徳尋聞復留陳承禮劉有方二人又以王中正幹當御藥院衆頗失望臣竊惟祖宗之意以御藥一職最為親密過供奉官以上輙令罷去者迺以防微杜漸詒謀萬世憂深思逺誠自古帝王之所不及子孫所宜謹守不可失墜者也近嵗以來左右之臣顧戀權勢又貪禄位遂求闇理資序豫支俸給名曰寄資以欺誑外人此豈祖宗之意耶今陛下欲振舉紀綱一新治道必當革去久弊一遵正法夫法如隄防常應全固迺得無患一有蟻壤泄之則漸至潰敗不可復救近習之臣朝夕在側因縁祈恩無有窮極不以祖宗舊法制之恐陛下他日亦将厭之也況王中正素聞姦猾頗好招權今處之要職是生一居簡也伏望陛下依前降指揮盡罷寄資者令補外官以成聖徳之美别擇内供奉以下樸直廉謹者使幹當御藥院以存祖宗之法治平四年七月上時為御史中丞上神宗再論王中正及不當令内臣采訪外事司馬光臣竊聞陛下好令内臣采訪外事及問以羣臣能否臣愚竊以為非宜陛下内有兩府兩制臺諫外有提轉牧守皆腹心耳目股肱之臣也陛下誠能精擇其人使之各舉其職薦舉賢能糾按姦慝論政事得失述民間利害皆令列於奏牘明白啟陳其有尸禄偷安及挾私欺罔者小則罪黜大則誅竄誰敢不盡公竭誠以承休徳如此則天下之事猶一堂之上陛下何患於不知哉今若深處九重之内詢於近習之臣采道聽途説之言納曲躬附耳之奏不驗虚實即行賞罰臣恐讒邪得以逞其愛憎而陛下為之受其譏謗也近聞王中正差往陜西幹當公事有知涇州劉渙等曲加謟奉鄜延路鈐轄吳舜臣違失其意俄而渙等進擢舜臣降黜衆人皆言中正所為審或如此則是中正弄權已有其驗今陛下又置之肘腋委以腹心臣恐天下之人将重足接迹而畏之輿金輦璧而奉之矣外議又言山陵禮畢韓琦必求引退兩府當有遷臣切慮兩制以上萬一有無廉恥之人或隂結此屬以求進用者夫以堯之聰明咨于四岳衆言僉同然後用人猶失之於鯀況可决於近習之口乎凡公忠正直之士必不肯借譽左右以求自售齊威王所以賞即墨大夫而烹阿大夫正謂此也昔漢唐之衰宦官所以壊亂紀綱傾覆國家者皆由人主與之謀議帷幄進退羣臣故也此乃治亂安危之本不可不察伏望聖慈詳思臣言凡欲知天下之事當詢訪外廷之臣其王中正不可令幹當御藥院或姦佞之臣豫設機謀以經營兩府者必不可用則天下幸甚治平四年八月上時為御史中丞上神宗論不當差王中正等往外幹事楊繪臣謹按春秋君之始年變一年而謂之元年者欲其善於始也變一月而謂之正月者欲其正於始也恭惟陛下肇升大寳新布大令天下之民傾耳拭目以觀聽乎聖功睿業實所謂善之於始正之於始之時也凡百注措可不謹諸近聞差幹當御藥院王中正往陜西幹事續又差幹當御藥院李舜舉繼徃未幾又差押班王昭明繼往御藥院押班最為親近之職祖宗已來差出甚少外之官吏茍奉上所親近之人不唯擾民抑甚駭物今乃旬月之中差御藥院二人押班者一人接跡而行陛下以此輩為腹心乎則館閣臺省之臣乃朝廷所養以待用者豈無一人可為腹心而必用此輩乎臣近又聞冬至節假百官頗循舊例遊相國寺聞有小黄門隨而抄劄姓名臣不審陛下以之為耳目而使之然乎抑此輩自欲以媚於上乎如陛下使之然則非前旒蔽明人主不窺私之義也若其自媚於上則蔽陛下之聰明其可量哉臣竊意陛下之所為慕居堯舜之上而反有不鑑漢唐之季臣竊惑之伏乞委腹心耳目之任於世之賢者無俾宦者之權從此漸盛乃所以為善之於始正之於始之術也治平四年十一月上時為知諫院上神宗乞定著内臣員數年未及四十不得入諸閨閤孫覺臣風聞日近行遣内臣白茂先事如茂先所坐宜在誅戮之科貸以不死聖恩甚厚然内臣出入宫闈宜在防限臣聞先帝時後宫甚肅内臣出入皆更相戒飭聳慄祗畏在仁宗朝入内内臣亦常限年年未四十者不得入諸閨閤臣謂因此事定著員數仍以年為限隔便使重為保任自非通詔令之處一切減損蓋宫省之内不可以不清而防微杜漸亦宜及其未然熙寧元年上時為右正言諫院供職上神宗論遣李憲措置邊事周尹等臣等伏見朝廷以熈河路鬼章為冦遣内侍省押班李憲往以秦鳳熙河路計議措置邊事司為名中外之論皆謂憲雖名計議措置邊事而軍前諸将皆受憲節制其實大帥然自詩書以降迄于秦漢魏晉周隋上下數千載間不聞有以中人為将帥者此其故何也勢有所未便也蓋有功則負恃驕恣陵轢公卿何所忌憚無功則挫損國威傳笑四夷非細事也唐自睿宗以前未嘗以将帥屬中人至明皇承平日久志大事奢稍委近習㑹安南蠻渠梅叔鸞叛而楊思勉請行遂許之然猶以宗楚客為大都護及覃行章亂黔中始以思勉為招討使雖有擒滅醜虜之功而唐之禍萌於此矣及代宗用魚朝恩拒史思明討僕固瑒而恃功擅命幾危社稷倚元載除之寒心者數月以程元振判元帥行軍司馬權震天下元勲故老皆見斥逐洎犬戎内侵集天下兵無隻輪入闗者此皆已然之效也至憲宗時王承璀叛以吐突承璀為行營招討處置使諫官李鄘許孟容吕元膺段平仲白居易等衆對延英謂古無中人位大帥恐為四方笑乃更為招討宣慰使而承璀卒以無功輕謀弊賦得罪及後世區區踵其故迹而唐之禍有不可勝言者其源蓋起於開元也今陛下更易百度未嘗不以先王為法忽降詔命以中人為帥搢紳士大夫皆莫知所謂夫以陛下之仁聖神武駕馭豪傑雖憲百輩臣等知其無能為也然陛下獨不長念郤慮為萬世計乎使後世襲㳂故迹狃以為常進用中人常據兵柄則天下之患又将有不可勝言者矣陛下其忍襲開元故迹而忘天下之患乎方今雖乏人然文武之士布滿中外豈無一人可以任陛下邊事憲出入近密荷國寵榮詔下之日大臣不敢言小臣不敢議臣等代匱憲府以言為職故敢盡其狂愚熙寧九年十二月上同鄧潤甫蔡承禧彭汝礪上時為侍御史上神宗論遣李憲措置邊事係第三狀周尹等臣等於十九日奏為用李憲專措置煕河事宜乞寢成命至今未䝉施行臣等重念古者奄人以典司内事而已雖漢唐之始亦未聞任事至後世始以政機兵柄假於所私而漢唐自是衰矣陛下議事造法逺取於三代以漢唐之盛為不足道而肯安襲已敝之法重回既成之命臣等備數憲府終未敢安也惟奄人柔媚非深長計慮也左右便辟以逆人君之嗜好作為聰明以投人君之耳目其初未嘗無不可與而其終未嘗不致天下之亂傳記所載非可誣也且陛下宫中所指令皆此屬陛下既數假寵於憲則其類莫不畏向而服從之而其情日自侈大憲功益髙賞不可不進及其盛而抑之則其中必不自滿矣以柔媚之性日習於侈大挾不自厭滿之心得所信向服從之類以事陛下於中此不可不戒也臣等知陛下聖智神武以犬馬用憲覊紲銜勒必無狂逸奔踶之憂而臣等區區誠如過計然反復思念自古未有以兵寄奄人而不亂者夫天下之事忽於其始則其終也必有害陛下以一方事宜屬之憲後執以為例則兵權必歸焉陛下以薛昌朝役於憲人習以為常則士大夫必見摧傷矣此必然之效也惟陛下深念之故臣等以謂鬼章之患小用憲之患大憲功不成其禍小有成其禍大昔漢唐及藝祖皆以兵定天下方其初中國𤓰析為八九世方乏才人不知學而祖宗震起於攙搶擾攘之中所以安寧者亦自多士而已未聞此屬有與焉今鬼章狗偷䑕盗非可畏之與國也祖宗恩徳庇覆之久陛下作成人才之盛非無可用之忠臣也陛下何重於憲而忽忘天下之士怠功臣之心兆後世之患哉陛下神明淵奥非羣臣所能窺測然臣等於此日夜念之至熟而無疑者也蓋陛下謀于心臣等謀於衆人陛下欲權一時臣等為萬世計惟少屈意聽納早賜指揮寢罷以安物論貼黄臣等訪聞煕河事宜如漸次衰息誠如此憲尤當早賜追還切恐憲到熙河復與王中正邀功生事幸如茂州之賞方事之多惟冀國家務求寧謐以恵天下臣等本欲固奏然以謂此事所繫稍大得自聖斷寢罷尤允天下之議熙寧九年十二月上宋名臣奏議巻六十二
