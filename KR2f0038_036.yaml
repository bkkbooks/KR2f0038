body:
  text: 宋名臣奏議卷三十六宋趙汝愚編天道門祥瑞上太宗論麟徐鉉等臣等按春秋傳云麏身而有角者麟瑞應圖云麟者仁獸也又云麟王者之嘉瑞春秋感精符云麟一角者明海內共一主也伏以陛下道冠百王慶延萬世睿智順隂陽之變聖文昭日月之光尚從欲以推恩每好生而布令帝功潛運天意著明果錫神休以彰至德表皇家之大慶垂青史之鴻猷而復道在謙光義形好問俯從輿議俾考前經諭旨曰朕素不崇重符瑞之事此又見大君去華務實之意也上天以符瑞彰聖功聖人以增修答天貺上下交感用臻太和斯實蒼生無疆之福也臣等不勝大慶太平興國九年十月嵐州獻牡獸一角似鹿無斑角端有肉性馴善人不能辨示羣臣參驗以聞鉉為右散騎常侍同右諫議大夫膝中正中書舍人王祐上此奏宰臣朱祁等奏請宣付史館太宗曰珍禽異獸無濟於事非朕所尚但時和嵗豐天下乂安此為上瑞近年以來禽獸之異所獻甚多止令飬於園圃遂其生生之性不欲揚之於外也上真宗論周伯星現張知白臣伏覩司天監奏周伯星現請宣付史館羣臣詣闕稱賀者臣聞人君之德可以動天至仁積於中則休氣應於外祥瑞之出皆有所因諒感應之攸致非徒然爾故天人相與之際其道甚大頃者河朔之間連年地震陛下知上天之垂戒考前王之格言以為隂氣過盛則積而當然地者其道卑柔其體安靜今動而不止誠有所謂且念國家開創以來基業洪大干戈之役皆不得巳而用之然而太平興國至咸平而來二十年內邉防多虞華戎之人幾殞百萬兵者其義主殺殺者其事屬隂隂氣之盛不亦宜乎復念致治之源惟息兵為大務前年北胡之來議欲通好陛下不矜兵力之強不恃邦威之盛姑以安民在念惡殺為事不阻其誠許以盟約由是動植遂其生全億兆知其休息然後發德音施惠澤賑貧民省寃獄敷求時病精選良吏側身思道引咎於已益兢兢焉翼翼焉思答天譴得不感羣心招和氣哉故未踰期年有是福應所謂德動於天而辰象昭瑞也昔桑楮共生於朝七日大拱太戊修仁桑楮遂枯祅不勝德見驗久矣今陛下修德可謂至矣非獨弭祅災復能致瑞應斯實我朝之盛美過前代逺矣然而皇王之道在乎戒謹休祥荐至而講德愈隆不恃太平之基而驕盈不矜大寶之位而荒怠懼亂者治必興焉思危者安必久焉斯前代之明鑒也古之君天下也患不恤黎元之疾苦患不知軍旅之勤勞患奢侈畋遊之無度患聲樂之不節患政事之不勤患壅蔽之不除患諫諍之不納今陛下薄賦斂省征徭勸農桑務稼穡恤黎元之疾苦矣優恩撫士厚賞懋功解衣哺食推心置腹知軍旅之勤勞矣宫室臺榭不以竒邪害工服御乘輿不以雕飾過制所貴惟榖帛所寶惟賢才絶侈靡之風矣弋獵之娛棄捐而不顧禽荒之戒祗畏而無忘澤被蟲魚仁及鳥獸去畋遊之暴矣樂府新聲國伶妙伎存而勿廢用之有時善逺於聲樂矣觀書乙夜求衣未明躬決萬機將周十稔雖隆暑沍寒無愆於一日雖飄風暴雨不廢於崇朝克勤於政事矣明四目逹四聰辨讒邪杜權幸使下情上逹決壅蔽之方已流聞於天下矣延直臣啓言路詢求讜議樂聞上失納諫之規固超絶於百代矣斯不亦天下幸甚陛下誠能寶兹數事雖休勿休則瑞星不出臣亦賀鴻祚無窮而青史有光矣茍異於是則瑞星雖出臣亦不敢同衆人之賀矣夫善言古者必有證於今善言天者必有證於人自古以還仗富強之基居隆盛之運怠於政事以啓危亂者不可勝紀況今西北兩隅雖罷征戰之役然而比夫古者屈膝稱臣欵塞內附則亦事異而體殊矣得不虞哉臣以謂一星為瑞善則善矣若倚之而責承平之效則慮羣心小弛而警備之方因而不謹矣恭惟聖德之大無不周知臣聞三才者人居其中乃天地之和氣人心和則隂陽和隂陽和則日月星辰咸順其晷雪霜風雨不失其時則知陛下一言之善必上動於天心一事之美必上關於天道人君言動視聽必上法於天法天之義誠深矣大矣臣雖懵昧然稽之於大易粗知之矣夫乾之體六陽備焉乾之用萬物生焉人君之象也非聖人孰能行之孔子稱其象曰天行健君子以自強不息蓋天之運行其道不止終古如一未常懈倦茍怠於一息差於一刻則六氣大紊萬物咸病王者之道亦當如是今陛下法天之義亦已至矣行健之德無不備矣復能念此乾元終始不易則萬方受無疆之賜萬乘享無窮之休臣愚陋無取涉道誠淺然佩名教服儒素考之方䇿得之師傳知君親之義至重治道之要至大故不敢避刑辟愛身名默而自守狂夫之詞聖人採之或足以輔朝廷之謀開諫諍之路伏兾天慈收一二於萬分之中則臣不勝至幸景德三年五月一日司天監言先四月二日夜初更見大星色黃出庫樓東騎官西漸漸光明測在氐三度鄭之分野壽星之次後益潤澤謹按星經瑞星有四其一曰周伯色黃煌煌然所見之國大昌又按太一占云王者制禮作樂內外咸得其宜四方之事無留滯君上壽考國運大昌則周伯星出天示殊休允符聖運乞付史館從之六月知白以右正言為京東轉運使上此奏上曰知白諫官雖在外而陳此言可謂知職業矣特詔奬諭上真宗論受天書戚綸臣伏覩詔書受天書者臣謹按稽載籍歷考祕文仰惟帝德之厖鴻握乾符而臨御見天人之相接驗靈鑒之垂祥然未覩昭晰炳煥若今之明著者也伏惟陛下道掩百王功髙二古躅二聖之丕業啓萬世之鴻基蒸蒸之孝日躋翼翼之心無怠勤行企道恭默思元寬仁為布政之規慈儉示固身之寶巍巍盛德不可形容亹亹令猷固難擬議武王齋戒思見丹書之言漢武虔祈遙啓竹宫之拜繇是上天即鑒瑞牒爰臻遐垂奕葉之祥昭示臨民之戒於鑠景命奚九齡之足稱赫矣鴻休伊七百之何算臣叨逢景運獲睹嘉祥為太平之民已知大幸遇希世之事實繫前聞敢載伸言誠由過慮萬一有補是為愛君竊以流俗之人古今一揆恐託國朝之嘉瑞寖生幻惑之狂圖或詐託於神靈或偽形於木石妄陳符瑞廣述禨祥以人鬼之妖詞亂天書之真旨少君欒大之事往往有之伏望陛下端守元符凝神正道參內境修身之要資五千致治之言建皇極以御人寰寶太和而延聖算仰答天貺俯惠蒸黎大中祥符元年正月上時為龍圖閣待制上真宗論羣臣數奏祥瑞孫奭臣聞五載巡狩虞書常典觀民設教犧易明文何須紫氣黃雲始能封嶽嘉禾異草然後省方今乃野雕山鹿並形奏簡秋旱冬雷率皆稱賀將以欺上天則上天不可欺將以愚下民則下民不可愚將以惑後世則後世必不信腹非竊笑有識盡然上玷皇明不為細也大中祥符三年十二月上時為龍圖閣待制上真宗論天書孫奭臣伏見朱能者姦險小人偶塵驅使驟為侯伯皆由妄言祥瑞而陛下崇信之以至屈至尊以迎拜歸祕殿以奉安中外臣僚降及黎庶靡不痛心疾首不敢直言臣所以不避死亡之誅敢言之者誠以佩荷國恩思報萬一聼之罪之惟在聖斷昔漢文成將軍以帛書飯牛陽言牛腹有竒書殺視得書天子識其手迹而斬之後有五利將軍妄言方多不讎坐誅漢武以能誅文成五利前史謂之雄才先帝時有侯莫陳利用者始以方術暴得寵用一旦發其姦誅于鄭州至今輿誦謂之英斷唐明皇得靈寶符上清護國經寶勝等皆王鉷田同秀等所為明皇不能顯戮怵于邪説自謂德實動天神必福我夫老君聖人也儻實降語應不妄言今按唐史自安史亂離乘輿播越兩都蕩覆四海沸騰豈天下太平乎明皇雖僅得歸闕復為李輔國劫遷西內卒以餒終此豈聖壽無疆長生久視乎夫明皇以睿哲之資處髙明之位禍患猥至曽不聞知良由在位多年驕亢成性謂人莫已若謂諫不足聼心玩居常之安耳熟導諛之説復又內惑寵嬖外任姦回曲奉鬼神過崇妖妄今日見老君于閣上明日見老君于山中大臣尸祿以將迎端士畏威而緘默既惑左道即紊政經民心用離浸不復振及至祿山兆亂輔國劫遷老君寧肯禦兵寶符安能排難身危名辱負愧包羞大命既傾前功併棄今朱能所為頗似王鉷等事願陛下逺思漢武之雄才近法先帝之英斷中鑒明皇之召禍庶幾災害不生禍亂不作享萬世無疆之休天禧三年四月上時知河陽又言天且無言安得有書天下皆知朱能所為獨陛下一人不知耳乞斬朱能以謝天下時太子右諭德魯宗道上疏略曰天道福善禍淫不言示化人君政得其理則作福以報之失其道則出異以戒之又何有書哉臣恐姦臣肆其誕以惑聖聼也上仁宗論金芝韓琦臣近聞西京南京及畿內諸縣遣使疏決刑獄金明池等亦設齋醮此必司歷者陳垂象之變以獻于上使陛下聖懷欽翼勤懇如是雖古先哲王之感悟飭身正事無以過也臣去歲中不曉禁忌嘗進狂瞽以謂上穹譴告惟增修德政可以除患而致福若禮神宥過即伸禳謝殆非方册所載消伏災眚之義前奏粗悉不敢煩述今又聞金芝産於化成殿柱率詔近列咸覩嘉事臣竊以春秋之法但紀災異至于祥瑞略而不書豈不以君于人者閲瑞牒則意安覩災符則心懼意之安則其政怠心之懼則其德修聖人垂誠之深其旨斯在臣愚伏望陛下開發聖慮特以天戒為重於政教之間思所未至隨其變以應之亦猶日食修德月食修刑之理是也至如珍祥竒瑞雖陛下仁聖所感亦望日謹一日以雖休勿休為念則穹昊垂貺答陛下夤畏之心生靈遂宜浸陛下慈惠之澤自然家給人足時和年豐永獲上瑞之報豈不盛歟景祐四年五月丙寅有芝生於化成殿柱召近臣宗室觀之仍出御製瑞芝詩賜宰臣王隨等以下翼日儒臣並為詩頌以獻琦時為右司諫上此奏前奏乃見災異門上仁宗論石龜韓琦臣聞通利軍奏衛縣民得石龜一其上鐫刻讖文略云道士趙永昌於顯慶元年鐫記後至三百六十五年出現時有聖君治世皇后劉氏合有聖子紹位觀其文字鄙俗固不能上惑天聼臣竊計唐高宗顯慶元年至國朝天禧四年方及三百六十五年蓋是當年造偽人妄求恩幸有此刋刻後恐事迹彰敗是故隱而不言至今又經一十八年方為縣民所獲即於讖文自巳乖謬陛下至明至聖固已洞鑒其妄即緣却降下本處軍資庫收附乃是未詳真偽猶示祕藏臣恐中外聞知有以來欺詐之漸欲乞特降聖旨下本軍令知軍當面毁棄訖奏所貴偽端不起羣聼無疑臣以其事雖小而於體大故敢上言寶元元年上時為右司諫上仁宗論澧州瑞木歐陽修臣近聞澧州進瑞木成文有太平之道四字其知州馮載本是武人不識事體便為祥瑞以媚朝廷臣謂前世號稱太平者須是四海晏然萬物得所方今西羌叛逆未平之患在前北敵驕悖藏伏之禍在後一患未減一患已萌加以西則瀘戎南則湖嶺凡與四徼連接無一處無事而又內則百姓困弊盜賊縱橫昨京西陜西出兵八九千人捕數百之盜不能一時翦滅只是僅能潰散然却於别處結集今張海雖死而逹州軍賊已劫百人又殺使臣其勢不小興州又奏八九十人州縣惶惶何以存濟以臣視之乃是四海騷然萬物失所實未見太平之象臣聞天道貴信示人不欺臣不敢逺引他事只以今年內事驗之昨夏秋之間太白經天纍月不滅金木相掩近在端門考於星占皆是天下大兵將起之象豈有才出大兵之象又出太平之道字一嵗之內前後頓殊豈非星象麗天異不虛出凡於戒懼常合修省而草木萬類變化無常不可信慿漸生懈怠臣又思若使木文不偽實是天生則亦有深意蓋其文止曰太平之道者其意可推也夫自古帝王致太平皆自有道得其道則太平失其道則危亂臣視方今但見其失未見其得也願陛下憂勤萬務舉賢納善常如近日不生逸豫則二三歲間漸期修理若以前賊張海等少衰便謂後賊不足憂以近京得雪便謂天下大豐熟見北敵未來便謂必無事見西賊通使便謂可罷兵指望太平漸漸安逸則此瑞木乃誤人事之妖木耳臣見今年曾進芝草者今又進瑞木竊慮四海相效爭造妖妄其所進瑞木伏乞更不宣示臣寮仍乞速詔天下州軍告以興兵纍年四海困弊方當責已憂勞之際凡有竒禽異獸草木之類並不得進獻所以彰示聖德感勵臣民慶歷二年十二月上時為右正言供諫職上仁宗論麒麟齊唐臣竊見交趾所進麒麟二頭臣得之道路圖寫其形大底牛身象耳狗足魚鱗臣謹按爾雅釋獸麏􅍪身牛尾一角郭璞注謂春秋所獲麟也又云麠大麃牛尾一角即漢武郊雍所獲麟也又云驨如馬一角不角者麒即元康中九真郡所貢也又唐龍朔三年麟見于介山又聖朝太平興國九年嵐州獻獸一角似鹿無斑角端有肉性甚馴善當時以為祥麟上表稱賀臣以前典觀之則麒如馬狀麟似鹿形況麟鳯四靈國家大瑞天下稱賀青史具書故唐改元年漢名書閣太平之瑞莫大於斯臣竊聞此獸頗與書史所聞不同閉以檻車與象相觸所食草木皆中國所無萬一非是祥麟海外别有名目即朝廷殆為蠻夷所詐又交趾以進麟為名私齎行貨不少經過州縣津送之役動數千人以至京師民間之費不下百萬嶺表之民例皆貧弱典賣産業以給公費儻應圖合驗為瑞聖朝則固不憚民勞以成一代之盛事果非瑞物則豈可以無名之怪獸而困一路之生靈哉伏惟陛下居尊御極垂四十年焦勞萬幾愛惜黔首誠願日謹一日雖休勿休勿以所役細微則武王有旅􅋙之戒勿以綏懷逺俗則文帝有却馬之言昔西漢因鶡雀飛入府舍遂為瑞鳥隋文帝好祥瑞有野雀集于宫掖因改儀鸞之殿取笑當世貽羞史策以斯為鑒固宜審詳伏乞陛下延訪博物之臣遍考瑞圖所載確有符驗方可進呈事果非真即宜罷黜以寬一方百姓之弊臣素以寡聞昧於通識進言不用默守常聨儻一詞有補於毫釐一舉少全於疲瘵則退甘鼎鑊萬死無逃臣不勝區區越職言事俯伏待罪嘉祐二年唐附南雄州遞上此奏職未詳上神宗乞不宣取瑞木曾公亮等臣準降到建州崇安縣草澤楊緯進狀稱今年三月所居之西空中有黃龍蜿蜒於晦冥之間於其下獲一瑞木厥狀猶龍至七月風雨晦冥如初復有飛龍騰驤見木龍之尾翼連足在焉畫到圖一面乞宣取奉聖旨可指揮福建轉運使令指揮建州於楊緯本家取索上件所陳木龍看驗若實非偽造如所圖樣即差齎擎赴闕進呈并圖樣降下臣等竊詳南方山木偶類鳥獸狀者頗多不足以異伏覩真宗至道三年詔書節文以刑清俗阜為嘉祥以嵗稔時和為上瑞至於毛羽表異草木效靈豈涼德之所堪亦前聖之不取諸州今後不得以珍禽異獸及諸瑞物等來獻又覩仁宗慶歷四年詔曰諸珍禽竒獸及諸瑞物等不得進獻臣等欲望踐行纍詔更不宣取熙寧二年上時為昭文相上徽宗論幸潛宫觀芝草陳師錫臣恭聞今月六日駕幸懿親宅蔡王位觀芝草於龍德宫聖人所居明神相之德氣覆之發為禧祥以表休應宜屈萬乘以注清視臣伏見祖宗詔有司不得奏祥瑞蓋慮道未備德未盛雖祥圖瑞牒溢于史館可以為美終未為善唯賢者在位能者在職朝廷之祥瑞也隂陽氣和風雨時若日月光華星辰順度天地之祥瑞也百榖順成萬民和樂郡縣之祥瑞也四夷安靖五兵不試邉境之祥瑞也格此四瑞仰賴陛下以道治心以德為政而已心以道治則明政以德為則仁故能感人心而天下和平甘露降醴泉出麟鳯至朱草生理之自然物之遂性耳佞人乃謂之祥瑞稱頌歸美以驕帝王之心祖宗所以戒之臣愚狂妄或有小補不避斧鉞之誅冒聞天聼伏乞政事之暇曲賜睿聼臣不勝拳拳之至元符三年九月上時為殿中侍御史宋名臣奏議卷三十六
