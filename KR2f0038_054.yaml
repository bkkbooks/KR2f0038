body:
  text: 宋名臣奏議巻五十四宋趙汝愚編百官門臺諫上哲宗論張舜民罷言職傅堯俞臣伏聞今月二十四日敇以監察御史張舜民因論邊事文彦博照管劉奉世失實罷言職差權判登聞鼓院竊以朝廷置御史蓋慮下情壅塞開廣聦明故許風聞言事所謂言之者無罪而聞之者足以戒也今舜民一言不當便奪官改差遣於舜民何損而無益陛下亦非彦博所安者伏乞速賜追還以恊易不逺復之義上全聖徳下判羣疑臣不勝大幸大願元祐二年四月上先是舜民言夏人政亂權歸梁氏巳乆自秉常死後乾順專横滋甚去年雖數遣使入朝然强臣爭權傳聞多端乾順存亡未可知朝廷未冝遽加爵命近差封冊使劉奉世等及所賜金帛願勿遣縁大臣有欲優假奉世者為是過舉且起居郎天子近臣不冝屈使屬羌今戎心桀鷔冝即加兵問罪大臣指文彦博也三省樞宻院奏舜民謂文彦博照管劉奉世遂差充夏國封册使勘㑹差奉世即非文彦博照管故舜民有是責堯俞時為御史中丞前後凡九奏此其第一奏也上哲宗論張舜民罷言職係第四狀傅堯俞臣近累論奏罷張舜民監察御史不當未䝉施行竊以言事之官人所憎畏在權重者尤甚何則持權旣重則人莫敢違忤獨言事者伺察而彈劾之其憎之也固冝而所以畏之者非衣冠顔狀之有異蓋人主信任而崇奬之爾夫人臣旣辱知遇又行其言故輕紱冕捐軀命為國家正紀綱以伸萬分之報若少加摧抑則人亦何憚况直為大臣而罷黜之臣恐而今而後有不忠於陛下而事權臣者矣不但偷合取容而已也陛下豈可不加意而念之自古諫官御史之患在敢攻人主之短不敢忤權臣之意若舜民者冝被擢賞而反䝉廢黜豈所以勸忠義之節哉臣前日奏事延和親奉徳音謂舜民之言可行而不可怒也今詔㫖甚峻極駭物聼必有借彦博之重以激怒陛下而行其私忿者此陛下不可不察陛下欲慰安老臣放罷舜民言職今採公議不得已而還之是陛下待老臣之禮備矣於彦博何傷彦博四朝宰相冝有體國之誠豈敢以此望陛下哉願勿輕臣言而詳其區區之心特奮睿斷早賜指揮元祐二年四月上上哲宗論張舜民罷言職王巖叟臣謹按舜民䟽中引文彦愽照管劉奉世之語非出自譔乃是收采衆論聞之朝廷此蓋言事常體復有何罪若聞外議心知其非而不告陛下得為忠乎况外人之議亦有所以縁奉世是彦博門下之人待遇最厚今封册夏國旣屬重事外人不知出於執政同奏但傳以為彦博照管亦不足恠舜民據所聞而言乞朝廷裁察别有何意詩曰言之者無罪聞之者足以戒正謂此也果是則有益於聦明果非則何傷於彦博書曰狂夫之言聖人擇焉况舜民非狂言皆有理行與不行在陛下擇之而巳遂加之罪臣恐而今而後居言職者以言為諱他日大臣有大惡陛下欲聞亦不得聞矣此非社稷之福也今朝政闕失猶許盡言豈有大臣不受一言之觸國家置御史正欲警察權强雖有過論亦當優容今舜民以一言獲罪臣疑非陛下本意必有誤聖聼者矣此事於舜民殊無所損所惜者朝廷之事體陛下之舉動天下之觀望也伏望特廽聖意還舜民言職使忠臣義士得盡其心以事陛下而衆庶之情不壅於上聞不勝幸甚貼黄言事官因言權臣而責之是為權臣報怨陛下豈可不思方兩宫聼政簾下正宜抑强臣以伸主威之時而反欲沮塞言路甚非陛下之利也元祐二年四月上時為侍御史岩叟前後凡八奏此其第一奏也上哲宗論張舜民罷言職朱光庭臣竊以正直之臣以遭時遇主為盛事蓋敢言之氣雖天與有素非聖君飬之厚容之深則敢言之氣未易伸也歴古而來青史之上直臣無幾不獨天生其才難而遇聖君飬其才尤為難也㳟惟陛下自臨御以來以堯舜之徳飬直臣之氣以堯舜之量容直臣之言故去天下之邪如拉朽除天下之弊如反掌千載以來一人而巳方今内外清明百度脩舉人民乂安此已試之效也唯在乆而不息則堯舜巍巍成功不難致矣臣竊見吏部闗報臺官張舜民為言文彦博照管劉奉世特罷言職臣以謂御史之職自許風聞言事使舜民之言盡中義理陛下固當行之設若未當止于不行而巳豈可遽罷其職也今陛下從而罷之豈不沮敢言之氣哉竊以古今之治天下唯使忠勁之氣充塞朝廷然後紀綱正法度立姦邪無間而入臣與舜民接跡頗熟稔聞其有正直之節司馬光賢之薦充館職陛下擢寘御史士論皆以謂得人今視職纔兩月正直之節未少伸一言不合大臣巳聞罷職自陛下臨御以來天下之人唯知從諌如不及聖徳冠古今若因舜民一言不合大臣遽使罷職致陛下今日有逐言事官之名臣為陛下惜之伏望聖慈開天地之量容飬正直之臣以増敢言之氣特降聖詔還舜民舊職以盡其材臣愚不勝惓惓之忠元祐二年四月上時為左司諫光庭前後凡四奏此其第一奏也上哲宗論張舜民罷言職梁燾臣近論奏不宜以大臣之故輒罷御史乞還其言職至今未䝉指揮臣竊以為始拒直言損納諫之美下移威罰失權斷之公所可愛者君徳所可惜者君體也决知此事不出聖意臣敢復論之國家所以尊安者以法度修而紀綱振也御史者守法度持紀綱之官也人主或有闕失猶且直筆正論至於犯顔逆耳無所回忌况臣下過惡安得畏避而不言哉今御史敢言大臣者天下之公議也大臣不快御史者一夫之私心也罪天下敢言之公議便一夫不快之私心非大公至正之法度也大臣雖重人臣也御史雖微法官也徇大臣而廢法官非尊君卑臣之紀綱也况兩宫臨御之時必使上有尊嚴不可犯之勢下有報義忘私之臣安得假天威屈正論以中傷議巳者乎自古全治之世必用天下清議故清議伸則正直之道行聦明之助多清議屈則姦邪之計得欺罔之患作今日清議喧然不平皆謂陛下之優大臣者亦巳至矣大臣之事陛下者未有以副人望也清議之罪大臣者日益以深則恐非所以安大臣也伏望聖慈以保君徳為難以全國體為重即日召還御史以正權綱然後慰藉大臣優加恩禮尊朝廷而强主威萬世之法也元祐二年四月上時為左諫議大夫燾前後凡十奏此其第二奏也上哲宗論張舜民罷言職王巖叟臣連上封奏乞復張舜民言職尚未䝉指揮施行臣以舜民志在盡忠雖一言失當而無可罷之罪清議沸騰以為過舉義不敢安理當極論惟陛下少賜采納幸甚臣讀汲黯傳每竊歎息其為人惷直好諌遇事輒發如公孫𢎞張湯軰懐詐飾智以阿人主他人所不敢言黯常面觸之故不獨漢庭之臣知所畏憚至淮南王欲謀叛以黯在朝為之寢謀直臣之於國家戢姦慝消祸亂其益如此故天下之愛其君者莫不願得而用之愚臣區區之𠂻實在於此今日之論非私於舜民也為陛下惜一敢言之臣也非争一屬官也為陛下惜言路也言路重則朝廷尊風憲陵遲國體隨弱皆必然之理也陛下於此幸加反思非好臣之説勝也好人主之道勝也臣以言為職言而見用與言而得罪皆所以報陛下唯知而不言則為負徳爾舜民得敢言之名朝廷被罪言之謗臣竊恨之伏望聖慈檢㑹臣等前章早賜付外施行使怨歸言路而美在朝廷臣不勝大願貼黄陛下之意常欲朝廷清静人無間言甚盛徳也然而事順理則静逆理則争必然之勢也今御史以言為職却以一言微侵大臣便行罷斥數日以來滿廷之臣喧然不平唯説此事葢縁事不順理所以如此臣等雖欲自静不可得也須至交章煩瀆聖聼伏望陛下深思所以順事理息人言天下幸甚元祐二年五月上上哲宗論張舜民罷言職係第五狀王巖叟臣累上章言張舜民罷職非罪乞令還臺未䝉采納施行此事所繫不在一張舜民而在人主在國家臣所以夙夜憂懼不知所處陛下開言路之初言事官多與權臣為敵怨仇不易當毎徳音丁寧既慰藉之又嘉賞之謂朝政闕失大臣私邪百姓疾苦事無大小一一但言欲賜一一主張言事之臣恃陛下照鑒如此故敢遇事必言無所回隱然古今之公患患在執政大臣多不便之而隂為巧説以害其忠必使主信之而不覺終至於忠言不用而權臣得以行其志所以人之言曰寧觸人主怒莫忤權臣意葢人主無心雖怒必觧權臣私意一忤不忘此人情不得不畏也茍非守節死義之士誰能忘其家而遺其身以取權臣之怒哉陛下雖加奬激未必便得其人今又罪而斥之臣恐忠義知難而退藏佞邪乗間而進取隂附大臣為自安之計不復以陛下之事為事矣前日御史中丞黄履殿中侍御史劉次莊隂附蔡確為姦方確用事陛下何由得知確去而其姦始敗使確且在位履與次莊進用蓋不可量今日舜民忠嚮陛下因論邊事偶有一言旁及大臣又無所傷遽以大臣不説而罷之是附人主不若附權臣也事在耳目非臣妄言臣伏覩陛下初降出舜民論封册疏必不以彦博照管奉世之言為毁傷彦博亦未必須欲朝廷逐御史臣恐執政大臣有忿舜民攻其所諱而増飾老臣之言以動聖心而擠舜民以快其私忿者陛下不可不察又非獨擠一張舜民也其意乃欲以盡傾言路也葢知舜民之罷臺諫必争封奏紛紜言詞憤激必拂聖意聖意不喜則言路皆可揺而去矣此其姦謀陛下又不可不察也姦人以此惑陛下一事既行後必有甚於此士大夫之所以為朝廷憂也臣度聖心豈不欲復舜民言職恐不能慰彦博意故兩難耳臣竊伏思陛下特屈公議黜御史以為老臣者亦足矣今以公議不可奪而復還之非陛下得巳也老臣豈不亮陛下之心哉尚何以為憾乎由此而言臣以謂陛下處之不兩難耳臣聞君子之愛人也以徳而不以姑息願陛下以徳愛老臣勿使受姑息之議則陛下所以待之者厚於黜御史矣誠䝉陛下幸聼臣言則朝廷過舉反而為盛徳老臣謗議變而為美談破姦謀於欲肆激忠義於已銷社禝之福多矣非臣之利也臣傾盡肝膽以告陛下今日遂死無所恨矣惟聖主留意毋忽貼黄舜民疏言廟堂欲茍免一時之責任又曰夏人强弱之勢可謂都不知又曰執政大臣不能為陛下盡心謀謨臣觀舜民此言於國則忠於身則愚矣願陛下憐而察之元祐元年五月上上哲宗論張舜民罷言職傅堯俞詔三省樞宻院召臺諫官赴都堂宣諭曰朝廷選任卿等為耳目之官正要别白是非視聽無惑故自來章奏多所允從今張舜民所言不當豈止言文彦博主張劉奉世一事且如建言乞問罪夏國事或從其言豈不生事乃只令解罷言職盖恐將來更有論奏難於取信若復留言職恐誤視聽今將舜民原奏示卿等更宜詳悉之臣等仰認聖懐不勝感懼此非陛下亮舜民之志本在盡忠而察臣等之心在於惜體則何以慰藉若此臣等幸甚欲報至恩莫知死所聖諭謂且如建言乞問罪夏國事或從其言豈不為國生事臣等詳閱舜民章奏云今臣所奏請不是欲興師問罪亦非要終了不封祗乞止使人不必如此遄速此語甚明别無他意唯欲朝廷審謹而巳伏望聖慈更加省鑒則舜民之過宜䝉恕矣既罪之之實不見於文又罷之之名有傷於體臣等所以不得不言願陛下開逹聦明以盡四方之聞見言責之臣事雖過計無惜采收語或小差亦皆包納使人人敢展四體以事君傾腹心而報國則臣等之願也伏乞降臣等前後章疏付三省公議早賜施行元祐二年五月上時詔堯前巖叟同舉監察御史二人堯俞巖叟繳還敕書以舜民罷職難别舉官又同梁燾朱光庭王覿孫升韓川累奏不絶已而詔三省樞宻院召臺諫官赴都堂宣諭堯俞等皆不受命退而列銜復上此奏上哲宗論張舜民罷言職係第三狀傅堯俞等臣等所論張舜民罷職不當事䝉宣諭後又兩疏開陳舜民本無罪由大臣造成乞賜照察復許還職尚未䝉聼納施行臣等恐進説者咸謂御史無已罷復還之體請舉故事陛下考焉方開元之初明皇勵精於事是非明而不可欺紀綱正而不可亂典刑無私而不以姑息事有䝉蔽不知則巳知則必行故端良得以盡其忠姦邪無所用其巧昔崔日知為京兆尹貪暴不法侍御史楊瑒與御史大夫李傑謀劾舉之傑反為日知先譛罷言職瑒廷奏曰紏彈之司若遭恐脅以成姦人之謀則御史臺固可廢矣上以其言切直令傑依舊視事貶日知為歙縣丞當時天下不稱楊瑒之能言而服明皇之能聼不矜日知之被逐而喜李傑之復用不髙風憲之得全而快姦言之終破明皇不吝於改過而其益如此史册一書流美萬古今大臣以是為非誤陛下之聽有甚於日知御史憃直敢言忠信獲罪有寃於李傑言責之臣守義以争且多於楊瑒又陛下聖哲之資十倍明皇察之宜深改之宜速而遲遲如此此愚臣之所惑也不知自古設諌官御史者欲以順朝廷之意耶欲以正朝廷之事耶若欲以順意則臣以謂不須置若欲其正事則臣以謂不可廢陛下以萬乗之尊與臣論勢臣之言不得而行也陛下虛方寸之地與臣論理臣之言庶幾於用也伏望陛下觀開元之所以賢聖心略回破姦言而全風憲易若反掌矣臣等以堯舜望陛下非敢以明皇始勤終倦比於全徳也陛下以為可則乞行臣等之言以為不可則乞罷臣等之職紀綱之地由臣等不振以為朝廷羞得䝉誅殛以塞至公臣等之幸也元祐二年五月上上哲宗論張舜民罷言職傅堯俞臣前日䝉聖恩召赴都堂令執政宣諭張舜民罷職事已具别章論奏臣有親聞於都堂與外議所傳相契之事不敢不盡以告陛下臣之愚忠以謂有隱而偷榮不若盡言而得罪韓維自言舜民之責是維於簾前奏乞施行仍云權量重輕難惜一新進御史此維誤陛下之聽也若論張舜民則輕若論御史天子耳目之官朝廷紀綱之任則不為輕矣今黜耳目之官是將塞人主之聦明隳紀綱之任是將亂國家之法制究觀歴代唯有蔽言路則啟禍源不聞抑權臣而生後患也然則師垣之有無未比憲司之興廢而維以御史為輕臣不知其可也又范純仁語雖喋喋不切義理臣謂韓維所論豈不上負陛下之望下失士大夫之心哉朝廷慰安老臣當自有道必使上下無損老臣可安乃善謀也今維之摧風憲壊紀綱動天下之心傷國家之體而欲以安老臣使老臣而少知義其能安乎陛下意欲安之不知反所以使之不安也幸陛下降意思之恐不若改之為便也聖人之所以成聖人由改過不吝爾吝而不改恐徳日益虧改而勿憚則美日益全惟陛下擇之自古端人正士誰不欲盡忠於人主人主亦豈不欲聞盡忠之言常患執政大臣離間於中使明主之初心遂移忠臣之雅懐不盡以為痛恨爾執政之蔽唯欲人主不信言事臣則得以行其私陛下不可不知也舜民一賤士不能為禍福於臣臣何苦上違陛下之情下忤權臣之意而言之不已此陛下之所當察也陛下愽通書史觀古今治亂之迹熟矣國家之事有臣力諍則善耶無人諍則善耶臣以言為職言而不用亦何靣目出入朝廷間哉願䝉竄黜以謝無功貼黄按舜民本疏論册封夏國主事但有移文致詰之言元無興師問罪之語而左右之臣便以移文為興師誑惑陛下殊不言邊上移文徃來自是常事安有興師之理至如雄州與北邊事無小大亦朝夕文字相問何甞有它虞葢不言用兵則不足以動陛下之心而激怒聖意此權臣陷害忠良之深計也陛下信之正落其計矣元祐一年五月上上哲宗論張舜民罷言職係第二狀傅堯俞臣前日與御史王巖叟列銜申奏乞檢㑹前後言張舜民文字降出施行至今未聞詔㫖臣聞忠義之士精貫白日誠洞金石臣雖無狀肺肝竭矣實冀夫精誠上通有以感悟聖意臣竊見近日執政憎厭言事之官徃徃形於詞色今遂伺間而逐之不知若何而後可以厭其意也臣讀唐史見宰相裴垍𫝊云諫官言得失大抵執政多忌之唯垍奬勵使盡言初拾遺獨孤郁李正辭嚴休復三人者遷及過謝垍垍獨責休復曰君異夫二人孜孜獻納者前日進擬上固為疑休復大慙臣不敢望執政以臯夔之心輔陛下如裴垍足矣今非徒憎惡言事者既逐之又移過於陛下使陛下本無一事横被拒諌之名此得謂之忠乎且風聞言事舊矣既黜舜民尚有言職不識自此以徃凡百須勘當得實而後言耶或風聞之事獨不行於大臣耶亦乞明降指揮臣既不得其言又未知所守豈敢黙然伏俟譴黜元祐二年五月上上哲宗論張舜民罷言職係第七狀梁燾臣近屢論朝廷不當假借大臣罷斥御史命令失當公議不平玷陛下至仁求言之明損國家大公馭下之制非所以全飬忠勁之氣感勵敬順之心也陛下未即垂聴而至恩優容靣命相臣布宣慈㫖臣等廹於公議願以至公之道上廣聖意下厭人望不敢奉詔而復再上章矣伏望陛下勿以既下之命為難改勿以巳宣之㫖為難回唯强其剛明之徳從諌如轉圜之易也臣聞唐宣宗將幸華清宫已命治道兩省官拜章極諌宣宗謂宰相曰卿勉諭諌官勿更論列宰臣奉㫖召兩省官宣諭俄而諌章再入宣宗謂宰臣曰諌官疏極懇切朕决不為遊華清之行矣卿宜説我此意宣宗唐室英明之主也行幸一時娯樂之事也諌臣猶且懇切進言之初未能回聽既令宰相宣諭而諌臣進言不已宣宗幡然感悟遂輟其行又令宰臣告以聽納之意是能自屈至尊欣納直諌真得人君之道矣故終獲忠賢之助而太中之政號為中興聲明輝映前代至今流為美談㳟惟陛下之聦明逺過唐宗之徳朝廷綱紀法度不比華清之事臣軰區區陳誠意皆激切甞䝉聖恩曲賜宣諭臣祗知尊君卑臣為萬世之計不知畏附權强便不論列陛下喜忠納諌上法仁祖言事之臣得盡誠節更覬留神省察主張必行追還成命以觧羣言遂使朝廷益見清明之象天下馴致安静之理明徳日躋可以並隆堯舜矣雖宣宗賢主何足為陛下道哉元祐二年五月上右僕射吕公著慮言將激怒上意致朝廷有罪言者之失乃奏陛下臨政以來納諌之盛近世未有臺諌前後言事既多不能一一盡忠若以其言失當便行罷黜則今日以前不避仇怨為朝廷言事不少欲且一向包容則慮向後愈更紛拏朝廷却不能保全欲乞稍與優遷令觧言職於是王巖叟等皆遞遷而燾遂詰誚給事中張問不駮正為集賢殿修撰知潞州上哲宗論羣罷臺諫是自塞絶言路劉摯臣伏自罷去言職待罪都省以來不復章疏論事葢以謂職在執政茍有所見自當與同列僉議進對顯奏公論而行之不當私有宻請恐非謂直道事上也必料陛下亦巳察臣之意在於如此而已今乃有不得巳之事須至一言冀效萬一十五日吕公著送下内降批㫖罷諌官梁燾等或移易或免黜者共十數人臣竊料陛下必以近日張舜民事言者救觧紛紛不已雖然仁恕包㴠而又欲加彈壓故不行重責但罷其言路此足以見聖度廣大愛惜數人之才黽勉而為此也臣觀舜民之論文彦博止有照管劉奉世一言而已此一言小事也奉世有才可用方出入彦博門下受其知遇而照管之乃大臣所宜則於彦博何傷兼彦博自不以槩意而議者私憂過計恐彦博有所不樂致陛下為罷舜民舜民之罷亦小事無足道也而言事者若欲論之一再言足矣何至議論鋒起相繼並作紊瀆天聽至煩宣召申論尚且不已誠有罪也夫舜民輕言以及元臣一失也議者欲慰説大臣而罷御史又一失也言者之救舜民以全言路而不能體聖明優禮故老之意又一失也今朝廷又從而移罷臺諌則恐不止於三失而朝廷之失最處其大者也此臣所以夙夜傍徨深為陛下惜之也古之賢君明主唯以開廣耳目優飬直臣為甚盛之徳故曰主聖則臣直唯堯舜及三代之盛王乃有其事而陛下今優游行之自前嵗以來聞善若飢渴從諌若轉圜臺諌言茍可采無不行者雖有失當一切包納故臣子無戮辱之懼罔避權要舒心展誠知無不言所以飬就今日忠直之氣然上下姦邪摩牙切齒嫉惡臺諌亦巳乆矣夫臺諌以區區小官上則觸龍鱗而犯忌諱下則結仇怨而取禍患不知其何所利也葢恃陛下之主張謹其官守以盡事君之義爾一旦以小故摧沮罷去之適足以快憎怨之氣開私枉之門非朝廷福也若言者有所私徇渉於傾陷近於朋黨則不可不深責而痛治之乃若出於公議則雖有强直乖忤之言古之聖人一皆容之考於傳記不可勝數今夫以一言旁及大臣而罷之則後來者不肯言大臣矣以一言彈給事中而罷之則後來者不肯言近侍矣以多言而去之則後來者循黙不言矣以剛勁而黜之則後來者柔和取容矣人情不逺相與為戒必然之理也深惟陛下㳟黙未言太皇太后陛下簾闥行政之日正宜大開聦明以廣萬事之聽而乃杜絶言路是自蔽其耳目也言路一塞何事不生天下之朋黨大吏之私邪百官之罪惡逺方之利害陛下何由一一知也今成命已行臣不敢盡乞改正所以區區言之者非獨為數人葢所惜者朝廷事體爾内梁燾孫升外議皆以為責之太重臣欲望聖慈詳酌寛此二人之責還其職任以救言路以扶持忠臣之氣且天下之廣莫知其詳但見臺諌官連羣罷去凡與前日之事不同必疑謂朝廷厭倦言者則姦諛者張目攘臂而動矣後來所用未必皆得如此數人邪正既不可知言路風采一變豈不有損盛徳之治臣天生愚直孤立於朝受陛下異恩至深至厚夙夜思報唯有竭誠以主公道不敢雷同倡和茍有所見可以禆補若不盡言於陛下則將何告訴也因此得罪亦不敢辭伏望赦其狂愚特賜詳察開允貼黄昨召臺諌官至都堂宣諭聖㫖既畢公著與臣等因而再三開説内燾與升指陳事理其語氣最為勁直今乃得罪最重外議所以尤疑也貼黄臣非謂自言路進遂欲主張言路者葢以此事繫朝廷不敢過避形迹故盡其底裏以告于陛下若幸聼臣之言留燾升二人足以救萬一之失今雖巳有成命命猶未下比至進告尚須一兩日伏望聖慈再三回慮深思此事早賜裁處不誤陛下舉動元祐二年五月上時為尚書左丞上哲宗乞召用傅堯俞等以銷姦黨劉摯臣備位左右憂深責重雖夙夜盡瘁恐終無所補報竊謂國家先務莫如得人近臣事君唯有進善臣伏見知陳州傅堯俞知齊州王巖叟知潞州梁燾通判虢州張舜民知廣徳軍賈易皆早䝉陛下識擢分任言責不幸志業未伸謗嫉横作罷職補外各已數月按堯俞等皆忠直之臣守正不撓在職未乆知無不言此固陛下素所奬愛必未棄捐然臣私憂過計恐有補外漸乆朝廷漸亦忘之不避僣越輙效一言夫人才不同所用亦異或長於政事或善於文學或言語侍從或行義師表今多士盈庭於此數色固無乏事至於公忠朴直不避仇怨不附朋黨一節自守可當大事肯為國家效死守法之人則非獨今日難求也從前世以來不易得也譬如人之一身耳目手足肌膚爪髮闕一誠不可然而强四支者必以骨為主故自古人君崇奬忠直謂之骨鯁之臣傳曰山有猛獸藜藿為之不采言猛獸在山則山中之物不敢犯者如直臣立朝則姦佞有所畏憚也今堯俞等皆有骨鯁大節公論所重邪黨所畏况當今陛下明辨忠邪汲汲進賢之日而反使數人流落外郡為姦邪所快臣實痛惜兼觀近日言路稍異於昔雖章奏交上議論不少然而所推薦者非豪强則親舊所排擊者非孤寒則怨隙朋比之心公無忌憚陛下試取近來言事章疏宻察其意其間心出於至誠言出於忠信憂國如飢渴謀議知大體有如堯俞者乎孤立不懼彈劾權强赤心事上略無私意有如巖叟者乎守正堅確不憚大吏不黨同列嫉邪指惡有如舜民燾及易者乎以此騐之真偽立見今聖明在上方修善政而羣小不快争進於下布列朋黨造作謗議欲以傾陷善良動揺政令紛紛籍籍甚可懼也然上下相罔誰為陛下辨之者當此之時唯且收聚人才使在朝廷若正直之路廣則邪枉之志銷而治道成矣臣疎賤拙直天下無毫髪親黨之助獨䝉二聖選㧞致位於此恩至厚矣則報效之心豈宜自比衆人故當知無不為寧敢避罪臣願聖慈深賜省察特發睿斷召此數人忠正之臣入備任使以慰公議以消朋黨幸甚貼黄吕公著等亦曽同議此數人皆與臣意無異但以未測聖意所以未便奏陳臣故密獻此言若候因臣僚進擬而後召之即不若特降中㫖付之三省庶使恩命出於陛下元祐元年十一月上上哲宗論屢罷言事官劉安世臣近被聖恩擢寘諌列内惟譾薄媿無以稱尋具辭免不䝉俞允竊伏思念陛下所以不次用臣者豈徒備二省之員為朝廷美觀而已葢授之以名者必求其實任之以職者必責其效故臣拜命之初未敢指陳政事而首論治亂之本原人君之大體庶有以副公朝圖任之誠意盡愚臣平昔之所學惟陛下母憚煩而試聽之臣聞書稱堯之徳曰稽于衆舍巳從人舜戒其臣曰予違汝弼汝無靣從退有後言伊尹之告太甲曰有言逆于汝心必求諸道有言遜于汝志必求諸非道傅説之復于髙宗曰惟木從繩則正后從諌則聖然則古之聦明睿智之君所以能大過於人者未有不以求諌為先務也今陛下居乆安之時乗不拔之勢崇起教化脩舉法度粲然追迹於三代之隆者豈有他哉特以陛下至誠虛已首開言路故人人自竭樂告善道而天下之情無不通也然臣尚有疑者自去嵗以後屢罷言事之官中外臣民不知其詳徃徃竊議以謂陛下好賢之志稍異於初年納諌之心漸怠於昔日臣切憂之㳟惟祖宗以來尤以臺諌為重雖所言者未必盡善所用者未必皆賢然而借以彈擊之權飬其敢言之氣者乃所以制姦邪之謀於未萌防政令之失於未兆也今陛下深居九重政在大臣之際固宜開廣聦明留意採納而前日臺諌數人相繼罷去甚者至於不究其所論之是非不察其所争之當否陽餌以美遷隂奪其言責使忠正之臣憤懣而不能發修潔之士愧赧而不敢受若果出於陛下之意耶則虧損聖徳不可不戒若出於大臣之計耶則陛下宜察其用心不過欲排天下之公議以快其私意而已臣竊謂姦人用事之始任臺諌足以折其謀至於禍胎既成雖聖賢不能救其害視今日何如祖宗之朝而乃一聴大臣之所為蔽耳目之任而挫忠義之氣非所謂謹終如始者也臣之所以先獻此言者非為忝列諫垣敢要君以固位也實以上闗宗廟社稷安危之機下繫君子小人消長之漸是以反覆論列期有以感動宸𠂻若夫世俗之人指以為嫌疑者臣固有所不避也伏望萬幾之暇詳覧瞽言奬進端良容受直諫參之以公議持之以誠心所愛者必知其善所憎者必知其惡使臣下不能窺伺間隙以售其私則忠言嘉謀將繼此而進矣臣天賦愚直不識忌諱惟陛下察其愛君憂國之誠少賜留聴不勝幸甚元祐三年二月上時為右正言宋名臣奏議巻五十四
