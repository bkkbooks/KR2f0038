body:
  text: 宋名臣奏議卷十四宋趙汝愚編君道門用人二上仁宗論包拯不當代宋祁為三司使歐陽修臣聞治天下者在知用人之先後而已用人之法各有所宜軍旅之士先材能朝廷之士先名節軍旅主成功惟恐其不趨賞而爭利其先材能而後名節者亦勢使之然也朝廷主教化風俗之薄厚治道之汙隆在乎用人而教化之行於下也不能家至而諄諄諭之故常務尊名節之士以風動天下而聳勵其偷薄夫所謂名節之士者知亷恥修禮遜不利於茍得不牽於茍隨而惟義之所處白刃之威有所不避折枝之易有所不為而惟義之所守其立於朝廷進退舉止皆可以為天下法也其人至難得也至可重也故為士者常貴名節以自重其身而君人者亦常全名節以養成善士伏見陛下近除前御史中丞包拯為三司使命下之日中外喧然以謂朝廷貪拯之材而不為拯惜名節然猶兾拯能執節守義堅遜以避嫌疑而為朝廷惜事體數日之間遽聞拯已受命是可惜也亦可嗟也拯性好剛天姿峭直然素少學問朝廷事體或有不思至如逐其人而代其位雖初無是心然見得不能思義此皆不足怪若乃嫌疑之迹常人皆知可避而拯豈獨不思哉昨聞拯在臺日常自至中書詰責宰相指陳前三司使張方平過失怒宰相不早罷之既而臺中僚屬相繼論列方平由此罷去而以宋祁代之又聞拯亦嘗彈奏宋祁過失自其命出臺中僚屬又交章力言而祁亦因此而罷而拯遂代其任此所謂蹊田奪牛豈得無過而整冠納履當避可疑者也如拯材能姿望雖别加進用人豈為嫌其不可為者惟三司使爾非惟自涉嫌疑其於朝廷所損不細臣請原其本末而言之國家自數十年來士君子務以恭謹靜重為賢及其弊也循默茍且頽墮寬弛習成風俗不以為非至於百職不修紀綱廢壞時方無事固未覺其害也一旦强敵犯邊兵出無功而財用空虛公私困弊盜賊並起天下騷然陛下奮然感悟思革其弊進用三數大臣鋭意於更張矣於此之時始增置諌官之員以寵用言事之臣俾之舉職由是修紀綱而繩廢壞遂欲分别賢不肖進退才不才而久弊之俗驟見而駭因共指言事者而非之或以為好訐隂私或以為公相傾陷或謂沽激名譽或謂自圖進取羣言百端幾惑上聽尚賴陛下至聖至明察見諸臣本以忘身徇國非為巳利讒間不入遂荷保全而中外之人久而漸信自是以來二十年間臺諌之選屢得讜言之士中間斥去姦邪屏絶權幸拾遺救失不可勝數是則納諌之善從古所難自陛下臨御以來實為甚盛於朝廷補助之效不為無功今中外皆安上下巳信纎邪之人凡所舉動每畏言事之臣而事無巨細亦惟言事是聽原其自始開發言路至今日之成效豈易致哉可不惜哉夫言人之過似於激訐逐人之位似於傾陷而言事之臣得以自明者惟無所利於其間爾而天下之人所以為信者亦以其無所利焉今拯併逐二臣自居其位使將來姦佞之人得以為說而惑亂主聽今後言事者不為人信而無以自明是則聖明用諌之功一旦由拯而壞夫有所不取之謂亷有所不為之謂恥近臣舉動人所儀法使拯於此時有所不取而不為可以風天下以亷恥之節而拯取其所不宜取為其所不宜為豈自薄其身亦所以開誘他時言事之臣傾人以覬得相習成風此之為患豈謂小哉然拯所恃者惟以本無心爾夫心者藏於中而人所不見迹者示於外而天下所瞻今拯欲自信其不見之心而外掩天下之迹是猶手探其物口為不欲雖欲自信人誰信之此臣所謂嫌疑之不可不避也况如拯者少有孝行聞於鄉里晚彰直節著在朝廷但其學問不深思慮不熟而處之乖當其人亦可惜也伏望陛下别選材臣為三司使而處拯他職置之京師使拯得避嫌疑之迹以解天下之惑而全拯之名節不勝幸甚臣叨塵侍從職號論思昔嘗親見朝廷致諌之初甚難今又獲見陛下用諌之效已著實不欲因拯而壞之者為朝廷惜也臣言狂計愚伏俟誅戮嘉祐四年三月上時為翰林學士上英宗論優待大臣以禮不必過為虛飾呂大防臣伏覩前古至治之世君臣相與之際必以至誠而無虛飾故光武能以赤心置人腹中而取天下唐太宗納魏鄭公之言不事形迹而開忠言之路竊見陛下待遇臣下禮數太隆雖使臣以禮聖人之所重然禮既過厚則誠有所不通至如富弼病足不能侍從請解機務章十餘上凡幾及一年莫非懇至至以牛馬自比而陛下不納張忭年幾八十體力巳衰聰明巳耗樞密之務紛然不舉忭哀乞骸骨而陛下不從吳奎有三年之喪自古人君不呼其門而陛下召其子而呼之者再遣使而召之者又再程戡辭老不能當邊事至恐死塞上免以尸柩還家為請而陛下不從外間物議衆皆以為不當然而臣亦以為過矣弼賢臣也陛下將用其人不止於今日使其病時得休於外則不病之日為報陛下深矣奎才臣也陛下將用其人亦不止於今使其服喪之日得盡其孝於所親則服除之日必能盡忠於陛下矣忭與戡既老矣又皆哀請而求去矣陛下欲盡君臣之分則皆與之閒務使盡其餘年如此非獨弼奎忭戡之幸抑使中外羣臣皆知陛下優待大臣進退以禮亦何必過為虛飾曲事形迹使四人者之誠不得通於陛下哉伏惟留神財幸治平二年上時為監察御史裏行上神宗論採聽既多當辨君子小人富弼臣伏自陛下踐祚以來未對天表䝉差入內供奉官李從政傳宣撫問密㫖丁寧特荷非常之眷絶出流品仰戴恩德天地莫量方屬疾恙所纒步趨殊梗不得入奉冕旒略舒臣節輒以病中傳聞一二事不避斧鉞之誅附李從政上奏伏惟聖明一賜觀省不勝大幸臣竊聞陛下始臨御好博采兼聽務廣聰明此古聖王之所尚而君道之至美也四方鼓舞歌頌以謂臣下情僞時政得失必不能逃聖覽而太平可立致也然其間事體有萬類人品有百端自古人君採聽之際至難至慎得其人則必以正道而忠以告之所說固有益於時也不得其人則專務窺伺循情阿㫖變曲直者有之挾愛憎者有之以至陷害忠良援引邪僻張皇威福聳動觀聽大則規取官職小則希求貨財事至如此則人君採聽之至德翻成虧損之大弊也何哉蓋自古以來君子常寡小人常衆人君採聽之際故得人常少不得人常多得人少故好事常不足不得人多故惡事常有餘何謂也君子力行仁義尊主庇民為好事也君子則惟道是從不計身之進退用則進而行道不用則退而無悶也小人則不然惟利是嚮若為正道所抑其身不得進則蹙蹙不肯休千歧萬路不顧名節經營鑽刺得其進而後巳也既以進身為急惟知富貴之可樂則何道之肯守何善之肯為哉又况君子常為小人所勝故從古以來治世少而亂世多者此也緣君子則可以致治小人只以致亂也若是君子小人並立於朝實所難辨蓋小人外則文飾其詞所說理道不減於君子而其心及其所為迹則如水火之異也書曰知人則哲惟帝其難之注云帝謂堯也夫堯為大聖人仲尼比之如天而尚未盡得知人之道况乎居堯之下者哉自三代以降諸侯失國天子失天下子孫散而為皂𨽻宗社廢而為丘墟者皆因用小人而致之也由此觀之小人豈當親而用之又豈當信而任之耶臣以謂帝王都無職事所以别君子小人乃帝王之職也然千官百職豈盡煩帝王辨之乎但精求任天下之事所謂大臣者不越十數人不使一小人參用於其間則千官百職委諸大臣分而選之因而漸及天下州縣之吏莫不得人矣顧雖欲亂不可得也恭惟陛下天賦睿明神受英略守祖宗之基業行堯舜之道德博取衆人之善欲盡萬物之情為君之難無甚於此然願陛下勿謂所采既廣便望所得必多其間須防姦詐小人惑亂聖聽姦謀似正詐辭似忠疑似之間不可不早辨也大抵人君生殺權在乎手不患人不諂奉而密附之也只患人不肯盡忠而有失即諫也諂奉則順情而喜人君喜則富貴可得也諌之則逆耳而怒人君怒則殃禍可致也順情而取富貴者小人也逆耳而受殃禍者君子也取富貴者百則百千則千其不避殃禍而欲致人主於無過之地者百千人中未有一二此惟在陛下審察之謹擇之既得其人則專信之力行之無容姦佞破壞則朝廷自理萬方無事陛下可髙枕也又聞昔賢有英俊沈下僚之歎形於諷詠若英俊果沈滯於下誠宜急取進之以服士心其有內行不守素履非嘉績效無聞公論不與所以久而不用如此之輩必恐使其朋黨訴以寃抑妄陳危苦之狀以動淵衷亦願陛下深察究其所從來之迹直俟見其實而進退之可也又聞王者端拱垂衣以治天下然所以勸奬羣動而能役使之俾自奔走於職業者無他惟官與賞二柄而巳捨此復有何道哉官謂爵位賞謂金帛茍德稱其官功協其賞雖官至髙賞至厚不為過也先王所以重惜之而不妄與人者非吝之也蓋恐德不稱功不協人有不平之論則無以為勸也近日上殿臣僚頗䝉面賜緋紫者臣不知當賜與未當賜但聞多於往時耳爵位金帛固不可非次而與之其餘唯章服華顯人亦貴重亦可以為勸奬之物若賜之不以勞又不以年其有勞有年而得之者不以為貴而反恥之為不足勸也陛下凡所賜與本使人知感而勸令勤其職也若徒俾僥幸者喜而有勞有年者恥而不勸則是棄之也何勸勵之有焉書曰車服以庸傳曰惟名與器不可以假人唐有中書令衣緋宰相衣緑者以此知不可不稍貴之惜之以為勸奬之一端也臣少而康壯已不及人今既老且病志氣衰索固無所取而妄以狂瞽之說塵凂天聽者實恃陛下虛懷待物無所不容乃敢然也惟聖慈特賜詳覽恐亦有補治平四年八月上時以使相判河陽上神宗論除拜大臣當密富弼臣在河陽於七八月間東有人自京師來北有人自河朔來亦有南自蔡許西自陜洛來者皆云公以病求解使相章奏頻切上將許之却為上盡疑今之兩府大臣復欲用公入相公既未能步趨拜起則必召公作宮觀使且留都下以備訪問時政得失臣輒每問來者此皆朝廷大機宜大除拜理當至密外人何由得知來者則云此固不可得而知也臣雖聞此說然終不之信以謂陛下必不如此既而傳聞韓琦文彥博陳升之郭逵相次皆求罷免又非備禮並有必去之意以至侍從及主兵之人各有去位之意其未求去者非欲不去蓋為求去者巳多未敢有求爾雖勉彊且住誰復更肯盡心乎若後有許去者則必節次更有人求去上撓宸衷臣續聞此說略無虛日則臣向之不信亦成疑矣今又䝉差臣充集禧觀使盡如兩月前四方傳來之語都無小異如何使臣不信哉捧詔之日汗流驚駭豈有此等國機大事預令四方人皆知四方尚知則兩府大臣安有不知者邪陛下既如此疑二則執政者不得不求去也臣曉夕思惟必慮陛下微失防謹政事泄漏使人人不安各懷疑懼而盡欲解去此田文所謂主少國疑大臣未附百姓不信正如今日陛下之事然魏王時自然如此今此則或恐陛下聖慮偶有未周而致其疑也致其未附也致其不信也陛下必欲解其疑使之附而信莫若罷臣新命推誠以待諸人必若其間有難久留者則當徐圖去就所貴事體兩全况韓琦巳下七人盡是兩朝顧命大臣各有忠義之心豈宜輕議出處以招天下云云之論哉臣若貪冒恩寵便為觀使優遊輦下醫藥尤便亦無一郡之責於臣之幸天下無比然却有所大不便者何哉臣若遂居觀職陛下雖都不遣中使傳宣撫問京師四方之人亦疑日有使至也雖或遣使只是問疾而都不問及他事京師四方之人亦疑凡百朝政皆來問臣也雖或遣使時復問事臣都不敢答一語京師四方之人亦疑凡百朝政臣皆刺口議論其短長也陛下試思之此三節果能使人不疑乎臣知萬無不疑之理也若皆疑之則今兩府八人者還有不解體者乎臣亦知萬無不解體者也漢宋昌云公事公言之若言私王者不受私今乃使臣於間宮觀中靜坐竊議朝廷之政致見任大臣一一解體是公耶是私耶臣亦知京師四方之人不論賢不肖必皆謂之私也臣徇從陛下私竊之恩而輒便當之則是臣如何人耶不惟取罪今世至於千古之下亦不能逃責矣臣獲罪責於今古之人固不足惜然於陛下為君之道治國之體還無所損乎臣亦知所損無大於此也伏緣天下治亂安危之際全繫天子任人當與不當若當則更繫信與不信爾齊晏子謂用賢而不信是大不信豈可目為常事而容易措置乎大凡罰一人衆皆懼而不敢犯則罰之賞一人衆皆悅而有所勸則賞之尋常賞罰尚須如此謹重况用捨大臣豈宜倉卒乎今陛下欲用臣一人反使衆大臣皆解體而不肯住則陛下豈宜遂其事而必行之哉夫人情亦不難回但請陛下如臣所乞速放令臣早還本任仍更臨朝分明宣諭大臣云朕欲一見富弼者無他只為是先朝舊人都無固必他既堅來辭免即却令歸河陽天下事豈在一富弼乎吾自有諸賢倚賴無所憂慮即衆心自安何必更敢求去乎陛下若決能用臣此說則前失尚可十救五六若終不用臣說則大臣與侍從兵輦官往往離心離德無術可救無事可回即陛下更與何人共謀國事哉惟願聖慈萬萬熟慮幸不一向堅用前意而不移用誤大事臣又聞陛下詢訪太多聽信太雜因而小人各有希望之心無所不說說者既衆是非溷淆此說巳行他說又奪展轉相效無有紀極陛下所聞之事盈塞於心萬務日生何暇辨别則所行必有當否所用必有差失政無一定之論人無自保之心上下紛紜包藏禍患臣前附李從政所奏劄子正為此也更望聖慈並此文字時賜一覽非臣之幸乃宗社生靈之幸也治平四年九月上時判河陽除左僕射充集禧觀使上神宗論今世亦有房杜之才鄭獬臣比因賜對論及房喬杜如晦陛下問臣今世有此人否臣對以房杜者曠世無之茍所見未至則安知今世無有如房杜者哉臣退思陛下思得房杜用之此唐太宗之用心也但在陛下求之至與未至耳自古帝王何嘗求異世之士而用之當大業之際富貴乎廟堂之上者天下止知有宇文述虞世基而已又孰知有房杜也則房杜者乃隋室之棄士也及太宗龍躍乎太原於是二人者攀鱗而起左攜右挈遂定天下當是時天下灑然始知有房杜焉則今之處幽約甘藜糝者焉知其人不及房杜者耶顧陛下網之未密搜之未至耳夫天下之士有材在已者思有為於世猶寒者之欲衣飢者之欲食其求用之心尤切於世主求賢之意而其迹無由而至前或湮廢而不遂者可勝言哉惟有道之士以義自勝則雖老死於巖穴間無憾也至於雄傑之士則不然如其蹉跌則潜心世變幸有風埃之警遂躡而擾之故劉備久不跨馬而髀肉生見而流涕此其志豈斯須忘功業哉而欲漢室之不搖豈可得乎故世主必渠渠懇懇欲得賢而為我用者正為此也虛懷屈已以訪之髙爵厚禮以來之上之所好其下必有應者好之而未至不可遽曰今世無房杜髙宗思賢其精誠乃通乎夢寐於是得傅說焉此用心之顓也臣願陛下推此心繼之以不倦則必有如房杜者杖䇿而至矣言陋意拙惟陛下裁赦熙寧元年上時為翰林學士上神宗論知人在務學孫覺臣前日獲奉清光親承聖諭以知人為難臣時倉卒以對不盡所懷退竊私喜聖諭及此則以同符帝堯天下幸甚夫堯以神明之德睿聖之慈而以知人為難故四凶舜禹雜處其朝而終能辨之知所信任蓋天下之事難之則易易之則難堯以知人為難故終享其易而成巍巍之功季世之君易於知人信任偏蔽以致禍敗者不可勝數臣竊惟孔子曰不知言無以知人中庸曰取人以身修身以道然則知人之要在於知言知言之方在於修身而務學羣臣進見者其言亂雜而不一其情隱伏而難知倉卒須㬰之間未可以試之而見也人主茍能貫乎聖人之道通乎天下之理則言出而知其所指事至而要其所歸譬之權衡不可欺以輕重法度不可欺以長短茍為不學而燭理不明物來則眩矣尚何人之能知哉陛下躬上聖之資兼孔孟之業固足以燭萬務而察羣下之情臣願陛下益聞所未聞見所未見使天下之理明白昭晰心如定鑑不將而不迎則賢不肖判然君子小人辨矣惟留神財擇熙寧元年五月上時為右正言供諫職上神宗論人主不宜有輕羣臣之心孫覺臣風聞臣下之論陛下睿聖聰明之資不世出之才以臨羣臣羣臣未有以望清光佐下風者故陛下有輕羣臣之心雖未知信否而臣竊惑焉竊以帝主之興亦各用其一時之人耳終不借才於異世也方今人才雖為乏少陛下欲興太平宜且隨才試用將有真賢大儒可與成功者至矣若必臯夔稷契然後為相太公方召然後為將則臣恐難以待也昔者燕昭市骨終得樂毅齊威不拒九九之數以成伯功譬之創大厦者棟梁榱桷之材無所棄成大車者輪轅衡軏之用無所遺以其各有所施各適其用故也昔魏武侯謀事而當羣臣莫能逮退朝而有喜色吳起憂之楚莊王謀事而當羣臣莫能及退朝而有憂色申公巫臣與之魏武之驕其臣楚莊王之自以為憂其度量相去逺矣書曰能自得師者王謂人莫巳若者亡夫王之與亡其為道不同甚矣然其所以至此者乃在乎驕士與求益之間夫求益而不巳則天下之善歸之人主而兼天下之善不王何也驕士而不已則不聞其過日與讒諂面諛之人居如是雖謂之亡可也故古者天子聽政使公卿至於列士獻詩瞽與史獻書師針瞍賦䝉誦百工諌庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉夫矇瞽庶人非有以賢於王者然且不廢况於朝廷之士哉詩曰詢于芻蕘書曰天下愚夫愚婦一能勝豫若芻蕘之賤夫婦之愚王者皆有所取則其兼覽廣聽而至於幽隱及於微物者此道素行也今者公卿侍從之官皆天子所與朝夕謀議以揆事圖䇿於堂上者今其見也近者不過數刻逺者無召問賜對之期其或乞至左右乃須待命數日然後得前以疏逺難見之人迫於須㬰倉卒之問則其言不能達其情其論不能究其事必矣陛下又或易之而意不在焉則見其才愈下其論愈卑也陛下若能改用此道數見以盡其恩切問以觀其意使其所懷得伸而無遁情則下莫敢不盡雖其疏逺者亦且于于然而來矣陛下遍得天下之士而大小各當於用則太平不旋踵而興若以人才皆不足與有為而類忽之則臣恐其賢者容默茍簡以求去不肖者偷合諂諛以投陛下之隙若是則所失雖近而為禍甚逺也易曰言出乎身加乎民行發乎邇見乎逺可不謹哉陛下垂意聽察不勝大幸熙寧元年六月上時為右正言供諫職上神宗論君臣相疑之弊孫覺臣風聞羣臣竊論陛下聖質甚美每加於初而聖治未能有改於他日此由聖心所以待遇羣臣者未能曠然無疑羣臣之所以事陛下者亦往往自疑於未信也臣嘗以謂天下之患最大而尤切者莫甚於君臣相疑而相遇以僞夫以誠待物物之格者幾何若以疑焉則誰敢自盡陛下欲使羣臣人人自盡而比周朋黨之行不設讒誣譛謗之說不行則莫若事至而制之以義言至而窮之以理也夫臣下欲為比周朋黨讒誣譛謗以蔽惑人主之聰明者其大則欲擅主之權其小則欲干主之利陛下知權之所在而謹持之知利之所出而謹守之則二者之患息矣所謂持權者非以羣臣為不可任也陛下事至而不制之以義言至而不窮之以理一切惟大臣之聽則權在大臣必矣若將不任大臣而顧訪於他臣亦事至而不制之以義言至而不窮之以理一切惟他臣之聽則權又在他臣矣屑屑然徒取諸此以益彼未見持權之善也臣以謂陛下欲羣下之不為比周不為讒譛莫若察之以明而謹夫義理之所在欲羣下之不擅權利莫若進賢逺佞而賞當功罰當罪也臣觀陛下即位以來進擢羣臣其初未嘗不崇奬優異其後則或厭棄疏外僅不陵藉之耳禮曰進人若將加諸膝退人若將墜諸淵此人主之所尤宜戒者也臣竊以謂凡如此始信而終疑之者雖其才或下不足以備訪逮堪任使類或為人所間釁端一開則不得為全人臣恐陛下持此道不變數年之後可以備任使者少矣伏願察之以睿哲考之以理義進退黜陟惟義所在則孰敢背公而循私比下罔上以自近於誅戮哉熙寧元年六月上時為右正言供諫職上神宗論任賢使能之異孫覺臣前日崇政論事或未至切者反䝉陛下曲賜嘉納有事似至小推之所害極大臣雖反復言之未䝉省察臣性愚訥奏對之際未能悉盡事情退而追誦陛下之言未盡於理者臣請得備論之臣歷觀書傳見人君用臣二道而已任賢使能之分既殊任使之方亦異有道德仁義忠言嘉謀可以任天下之重揆萬事之理治亂安危之幾未能兆於四海而見之堂上詼詭譎怪若不可以用於時而收采捃托無不盡其所長此可謂役物而不役於物用人而不為人用者也王者得此人焉任之者與之同心同德猶元首股肱焉付之以天下而上心不疑託之以四海而人言不能間至於所知有限量所能有彼此譬之爼豆樽罍之為器輪轅棟宇之為木方圓大小短長曲直各適於用而止耳此功用役使之士可以處外而不可處內可以責之事功而不可責之言議謂之賢也則仁且有智德備而才全不以富貴貧賤動其心不以用舍得喪違其操人主不與之同量合德則不可得而屈立其朝而道不行則去故道德之士常擇君而後起豈以人主之取舍輕重移其心哉故人主之得此士也大則師之其次友之則天下治矣謂之能也則奔走役使之人耳可貴可賤可滎可辱豫奪而進退之惟上所令猶恐恐然惟懼其君之厭已也然而世無是人則誰為君役誰為君使者故明主謹視其臣之賢能而馭之各以其道善馭臣者譬之馭馬若夫鸞旗在前屬車在後清道而後行不數十里而舍則非稱德之驥倍至之馬不可以駕君之車及用之戰陳用之馳逐則非駿足疾驅超軼而絶塵者不可以獲多而取勝善馭馬者亦謹視其所用而巳周禮以八柄馭羣臣漢書亦曰泛駕之馬跅弛之士亦在御之而巳豈不信哉臣又聞詩曰文武吉甫萬邦為憲又曰侯誰在矣張仲孝友說詩者曰宣王與孝友之臣處內以文武之士征伐在人主左右而可處乎內者非孝友之臣不可也書曰其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽然則備從官而不得正人無乃非先王之意乎臣所謂近侍之官不可輕以與人者以此故也陛下欲興太平以盡革天下之弊而即位以來所奬拔數人者多有口才而無實行務行險以徼幸而不循常理孔子曰逺佞人周公曰繼自今立政其惟克用常人蓋佞人者其言似忠信其行似方直然而規以售君之寵而肆其志焉為其甚似而非也非至明莫之能察非至剛莫之能勝故雖若顔子者孔子猶使逺之常人者奉法循理忠信而篤實終不以亡為有以虛為盈隨其所用大小各以見效至於無常之人雖巫醫之賤不得為之為其變亂善惡顛倒是非足以害上之政也今陛下欲尊寵孔子之所逺而棄忽周公之所用無乃非政化之美歟陛下聖質髙明絶出羣臣之上羣臣未有以望萬分者故陛下思得卓越不羈之士與之有為臣謂此輩獨可藉其精力收其智能駕馭而使之不可以為侍從親近之臣也臣恐日浸月長若此曹彚征牆進充滿於朝廷則賢人去正人逐其為患禍尚可以一二而言之哉伏願陛下觀詩書之所任使周公孔子之所用舍無速於近功小利則王道可成禮樂可興伏惟留神察之不勝大幸熙寧元年六月上時為右正言供諫職宋名臣奏議卷十四
