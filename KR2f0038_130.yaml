body:
  text: 宋名臣奏議卷一百三十宋趙汝愚編邊防門遼夏二上太宗乞懷柔北狄李至臣今月十一日奉宣御札以北狄犯邊廣延羣議天慈惻隱睿訓丁寧仰承屈已之仁俯愧素餐之責伏聽綸㫖戰汗交并臣謬以庸愚叨塵侍從國家之事首合上言但以章句之能記問之學徒欲循先賢之陳迹習迂儒之懦謀豈敢自衒於多士之朝輕瀆於至聖之鑒今陛下戒臣以鉗口責臣以惜言既迫威嚴輒陳狂瞽臣竊惟北狄為患自古而然不足致怒唯在御之得其道爾若綏之以德則其用功也逸其經費也約其見效也速其保安也久而無衒耀彰灼之名但有安樂富夀之實若懾之以威則在良將徑兵竒謀詭道士冒鋒鏑霜露民竭資財糧穀伏尸流血搴旗斬將然後振旅凱樂獻功清廟此誠天下之壯觀臣非不欲之也直以非被堅執鋭之士無運籌借筯之智欲之而不能致之也春秋傳云人有能有不能臣豈強以所不能而誣惑於天聽哉若其懷柔之術粗能言之請陳其一二昔者漢高祖既定天下唯胸奴為梗奉春君獻議請以魯元公主妻之望其執子壻外孫之禮高祖欣然納之臣以為奉春之䇿愚之甚者也彼單于冒頓親殺其父而奪其位肯顧外祖哉以高祖聰明神武豈不知此謀之拙蓋有以也是時民困已久皆望息肩高祖所以屈萬乘之尊捨骨肉之愛為百姓請命於胸奴爾百姓見高祖如此則仁義浸於骨髓感激盈於胸臆始肯奮不顧命以扞國天意見高祖如此始肯霈然垂佑以致和平遂以至愚之䇿而獲萬世之福此理出於杳冥微妙非尋常所能見也至于孝文能遵前訓亦不以萬乘為貴四海為大卑事胸奴所以海內富夀粟腐貫朽幾致刑措至于孝武承纍大之業任雄武之才奮兵而出收河南之地取渾邪之域摧凶殄寇功冠前古及其連兵不巳國家疲弊戶口減半於是罷輪臺之役下哀痛之詔然後僅安則知威懾之與德綏利害不侔矣此乃前古之顯效也近者李繼遷以蕞爾之衆侵擾西邊為我疥癬之患陛下尚能憫西民之勞苦下惻隱之命赦繼遷之罪加保以恩化狂悖為忠順變殺戮為生成凡在含識莫不上感聖德此又目前之顯效也昔者仲尼垂持滿之誡曰聰明睿智守之以愚功被天下守之以遜勇力振世守之以怯富有四海守之以謙此天道也夫四德者陛下可謂兼之矣而有邊寇之患者天意將警戒陛下欲遵仲尼之教守不世之烈以永八百年之基乎所以臣昧死上言願陛下上恭天意下徇民情霽雷霆之威霈雨露之澤追禹湯罪已之㫖下漢武哀痛之詔開懷以待之玉帛以撫之文告以諭之明神以要之使彼服義懷仁則我無遺鏃之費保覆盂之安如使驕很不悛則我之士民怒氣自倍則後日之戰必無前日之遷延也臣愚暗昏耄所見止此塵瀆天鑒伏俟刑書謹奉表以聞端拱二年正月上時為吏部侍郎上真宗論禦戎畫一利害孫何一臣聞禦戎之道選將為難將求邊鄙之乂寧必假英雄而鎮撫居其位不可一日無其寵得其人不可一日無其權責成之效既多錫命之儀須重謹按史記漢高祖將定三秦擇良日齊戒設壇場拜韓信為大將軍部管諸將魏故事遣將出征符節即授節鉞跪而推轂北齊命將出征則太卜諸廟灼龜授鼓旗於廟皇帝陳法駕服衮冕拜於太廟遍告訖降就中階引上將操鉞授柄將軍既執斧鉞對曰國不可從外治軍不可從中制臣即授令有鼓旗斧鉞之命而無一言之命於臣帝曰茍利社稷將軍以之將軍就載斧鉞而出皇帝推轂度門曰從此以外將軍制之也今國提封萬里臣妾四夷唯此契丹獨迷聲教暴犯我疆理殺傷我士民以陛下英武天資睿謀神授可以斷胸奴之右臂焚老上之龍庭而無戰之師或聞挫衄久安之地亦被憑陵者良由將帥或非其人委任未能盡善監制之臣寮稍衆倚毗之恩禮猶輕所賴陛下親御六師按巡河朔盡逐虎狼之類方安黎庶之心臣伏見駐泊行營都部管即古之將軍大總管之任也授任赴鎮之際錫賜甚厚公使稍優之外縱握十萬之師但受尺一之詔前所謂築壇告廟之禮皆闕而未建良可惜也又都部管副部管之任多是將領久經勞苦攀附鱗翼特沐寵光或決裂以無謀或遷延而玩冦所以動煩聖算鮮有成功謹按太公六韜有妻子之將有十人之將百人之將千人之將萬人之將百萬人之將則風彩名聲器度權變亦不可不察之察之亦不可不精也伏乞於中外文武臣寮中以將將之術采赫赫之名取其文武相資智勇兼備者盛其禮重其權使受命之初可以聳動人聽出疆之日可以震懾虜庭先是監陳先鋒之類本用中官內使者減去其半皆以偏將為之庶其各禀指蹤無憂掣肘果用此道則四塞可以高枕萬里如有長城矣設若探刺邊情宣傳機事必藉使者以寧衆心則乞於親信臣寮中選如有所聞亦乞閲其實事然後指揮一臣聞契丹之為患中國也久矣周曰獫狁漢曰胸奴晉有五胡周有蠕蠕隋有突厥唐有吐蕃皆伺隙窺邊乘間犯塞蜂蠆有毒殺掠吏民豺狼無厭吞噬亭障前代憤其如此亦嘗按劒憑怒命將出征或十萬以橫行或五千而深入而虎狼之衆部落繁滋不諭文告之言不以遁逃為恥蜂屯大漠鳥散窮荒有利即來無得而去中國奪其地不足耕墾獲其人不足訓齊徒勞師而費財終有損而無益故宣王之詩曰薄伐獫狁至于太原蓋譬乎蚊虻螫人驅之而已終不與外國角乎勝負逺夷計其短長唯始皇孝武秣馬利兵長驅萬里雖南牧暫息而中國蕭然故嚴尤以為漢得下䇿周得中䇿秦無䇿焉與夫保境庇民訓兵練將來則勿縱去即勿追固不可同年而語矣且契丹者邊鄙小蕃雄長北方料其土地計其人民固不敵中原之數郡多行不義公肆無厭惡既貫盈天當勦絶但沿邊將吏等亦有設竒沽譽恃勇貪功遇彼射鵰便稱敵衆逢其餘馬即舉邊烽間隙一生干戈不已及逢大敵又怯先登或堅壁以自安或死戰而無益兵連禍結何莫由斯伏乞嚴誡邊防俾謹疆界運權謀而制勝嚴斥堠以防奸彼將動以必知此有謀而皆祕若虎狼之侵軼必在驅除如將帥之張皇亦宜禁戢昔羊祜之鎮襄漢李牧之守鴈門破敵却胡皆此術也惟陛下不以臣愚而用其言則邊民幸甚一臣聞唐堯建國有此兾方亷頗帥師思用趙卒蓋土風雄毅民性剛方靜足以控壓四方動可以驅除七狄故杜牧有言曰河北視天下猶珠璣也天下視河北猶四支也當六雄之角立則大魏為優洎三鎮之橫行則常山最盛豈不以慣聞金鼓狃習干戈不憚轉餉之勤不怨征戰之死國家恭行天討屢出王師雖睿算所加舉無遺䇿靈旗所指告厥成功然推鋒陷堅之人斬將搴旗之士不居貝兾必出邢洺與夫河南之人主客既巳不同勇怯又甚遼絶伏見陛下去冬以來講求軍政詳究武經惻隱防虞形於詔㫖憫疲民之轉粟蠲彼賦租念猛士以守方優其月給凡是㕔直靜塞雲翼驍捷之類皆降宣㫖升為禁軍甚叶機宜頗聞效用但或聞沿邊屯駐駐泊兵士等尚多河南之人亦有江浙西川廣南等揀到軍伍臣恐土宜既異習俗不同緩急之間誤纍邊事況㝢縣之地至廣鎮守之處亦多何必強其不能違其本性欲乞特降宣命應是河南及江南兩浙西川廣南軍人並不令邊上駐泊屯駐却支分於別處防遏一則使趙魏之士固彼疆場一則使吳蜀之人彰其畏懦鬭志既皆齊一軍聲亦皆雄豪臣愚以為斯事亦防秋備寇之大端惟陛下采而行之咸平二年上時為右司諫上真宗答詔論邊事錢若水臣官忝二卿曾叨大用國家得失臣合先言但以仲夏朝廷舉兵以來秋末犬戎鈔邊之後凡有機事臣莫得聞是以不敢上言恐成狂瞽今陛下躬擐甲胄蒙犯霜雪駐蹕大名巳踰旬浹一日遍詢輿論明發德音大率不過即今禦戎之䇿將來安邊之術耳唯兹二事試為陛下言之臣聞孫武著書以伐謀為上漢高將將以用法為先伐謀者何蓋將帥料敵制勝也用法者何蓋朝廷能賞罰不私也今傅潛領數萬雄師閉門不出坐看戎敵俘掠生民上則孤陛下委注之恩下則挫陛下鋭師之氣此蓋傅潛不能制勝朝廷未能用法使然也軍法臨陳不用命者斬若陛下明申重法斬潛以徇然後擢如楊延昭楊嗣者五七人增其爵秩分授兵柄使各將萬人間以強弩令分路討除孰敢不用命哉犬戎聞我將帥不用命退則有死豈不懼惻豈獨思遁耶亦來嵗不敢犯邊矣如此則不出半月可以坐清邊塞然後鑾輅還京陛下威聲振四海矣臣嘗讀五代史見周世宗即位之始劉崇結犬戎遣大將楊衮領騎數萬隨崇至高平當時懦將樊愛能何徽等臨敵不戰世宗知之翌日大陳宴會斬愛能徽等拔偏將十餘人令分兵擊太原劉崇聞之股栗不敢出犬戎即日而遁是以兵威大振爾後收淮甸下秦鳳平關南如席卷耳以陛下睿聖神武豈愧於周世宗乎此所謂即今禦戎之䇿也其將來安邊之術臣不敢廣引前事慮煩聖聰止以近事言之太祖朝制最得其宜止以郭進在邢州李漢超在關南何繼筠在鎮定賀惟忠在易州李謙溥在隰州姚內斌在慶州董遵誨在通逺軍王彥升在原州然但得沿邊巡檢之名不授行營部管之號皆十餘年不易其任立功者厚加賞賚其位皆不至觀察使位不高則朝廷易制久不易則邊事盡知然後授以聖謀不令生事來則掩殺去則勿追所以十七年中北戎西蕃不敢犯塞以至屢遣戎使先來乞和此皆布在耳目陛下之所知也伏望遵太祖之故事察下臣之愚衷精擇名臣分理邊場罷部管之號使其不相統臨置巡檢之名俾其遞相救應如此則出必擊冦入則守城不數年間可致邊烽罷警矣咸平二年十二月上時為工部侍郎集賢學士上真宗答詔論邊事趙安仁臣以為當今有急務者二經久有大要者五急務二者其一激勵戎臣舉賞罰之典何者自防秋以來有保一軍守一壘而有功者有握重兵居重地而無功者故未能屏黠寇之迹止猾夏之謀今若有功者被加等之賞益以強兵使居要害之地無效者奪主兵之柄賜之重罰以懲逗撓之失則軍威自振邊塵自消故賞罰不可不舉也其二振救邊民行優恤之惠何者自犬戎入冦以來邊民有鬭敵之時沒於兵刃者遣使收瘞之有骨肉支離廬舍焚毁者本部撫恤之陛下光宅中興照臨四海以一方之騷動勞萬乘之撫巡今封疆之臣既行信賞邊鄙之俗又叶來蘇所宜歸奉宗祧以安逺近則神武不可不重也大要五者其一選將略當今兵卒素練而其數甚廣用之邊方立功至少誠由主將之無智略也豈非有一夫之勇者不足以為萬人之敵乎昔郤縠為將敦詩閲禮杜預平吳馬上治春秋蓋儒學之將則洞究存亡深知成敗求之今世亦代不乏賢太祖太宗親選天下士令布在中外不啻數千人其間有材武知兵法可以為將者固有之矣若選而用之則總戎訓旅安邊制敵不猶愈於一夫之勇者乎況其識君臣父子之道知忠孝逆順之理與夫不知書者固亦異矣其二持兵勢京師天下之根本也澶魏河朔之咽喉也鎮定股肱之地也是知根本在乎深固咽喉在乎控制股肱在乎運用蓋用兵衆寡貴得其宜若支大於體末重於本是以利器授人也其三求軍謀古者用軍必有成算咨謀籌畫以贊戎機比來用兵都無此選自今凡命將守邊仍取識孤虛成敗知寇戎情狀者為參謀入官階資優與選職況今武舉已議復行其軍謀宏逺武藝絶倫科望依唐室故事復開此選其四修軍政古之名將必得衆心師克在和戰則必勝投醪挾纊史冊具陳若非畏愛兼行豈得士卒樂用故穀梁傳云善為師者不戰言敵人畏其法令也今之將帥請先以軍政能否黜陟之則人人自謹於法令矣其五愛民力國家邊備尚嚴經費猶廣今嵗輦運固已重勞茍或未議蠲租與免緣科折變不須給復可息疲羸仍望特戒有司務令省事用全民力以備軍須陛下以上聖之資兼神武之略蕩平邊寇止在朝夕臣之狂言姑以竭愚忠之一效烏足以資廟勝之成算也咸平二年十二月上時為右正言直集賢院上真宗論備邊之要有五錢若水臣今月十二日中使賫御劄子臣伏讀聖㫖忽承清問云以何方而禦備邊寇用何術而翦滅蕃戎盡陳決勝之謀以副克平之望仰畫利害密具奏聞者伏思前古致治愛民之君未有如陛下若此之用心也臣祗膺明詔俯度非才區區之心何以塞問臣嘗讀前史見先賢論胸奴者多矣在漢則婁敬樊噲季布賈誼朝錯主父偃徐樂王恢韓安國朱買臣董仲舒大率不過陳征伐與和親兩途耳且漢至今僅千年時事措置不同今日其言雖存譬之膠柱臣所以不敢取之為法在唐室則有李靖魏徵溫彥博郭正一狄仁傑大率不過論戰守而已度其事宜與今亦異臣又不敢引之為證洎乎石晉有宰相桑維翰上禦戎之疏晉祖竒之臣觀其言止請不背約耳先朝故相趙普陳胸奴之䇿太宗稱之臣觀其言止請回軍耳然以今日事勢比之皆無可取臣試為陛下陳之請賜觀覽臣之幸甚天下幸甚臣聞唐室三百餘祀北戎未嘗侵擾魏博者何也況當日戍兵甚少於今時今時富庶不及於當日何不同之甚也臣之愚見粗知其由蓋當日幽薊於唐北門命帥屯兵扼其險阻所以胡馬不敢南牧自晉祖割地之後朝廷自定州西山東至滄海千里之地皆須應敵是以設三關分重兵以鎮之其間少失隄防則戎人內侵所以晉末則直渡長河漢初則屢侵邊徼周祖在位復擾中山世祖臨朝來窺上黨此皆見於史氏陛下之所明知也今御札云用何術而翦滅蕃戎臣愚以為未得幽州城契丹不可滅今若有人為陛下陳翦戎之䇿者誠可斬也何以明之臣見後唐莊宗善用兵者也在河北時先令周德威攻取幽州及得其地知北方不足慮然後南向爭天下向使幽州未下安敢決渡河之計乎又聞前代翦戎之䇿不可恃兵強須皆逢釁隙單于爭立漢宣帝所以得志頡利縱欲唐太宗所以成功若恃兵強則漢髙祖平城之圍是也臣不敢為陛下陳翦戎之略直以今之急務陳備邊之要望陛下開懷而納之夫備邊之要有五一曰擇郡守二曰募鄉兵三曰積芻粟四曰革將帥五曰明賞罰何謂擇郡守夫今之所患在戰守不同心伏望陛下選沉厚有謀素諳邊事者任為邊郡刺史兼沿邊巡檢恣其召武勇之人為隨身部曲慮其贍給不充則官為廩賜可也然後嚴亭障明斥堠每得事宜密相報示冦來則互為救應齊出討除冦去則不令逺追各務安靜仍望茍無大過不與替移儻立微功就加爵賞如此則戰守必同心戎敵不敢近塞矣何謂募鄉兵夫今之所患患在不知戎情伏望陛下逐州召邊民為招收軍給與衣糧蠲其租賦彼緣兩地之中各有親族使其懷惠來布腹心彼若舉兵此必預知事茍預知則百戰百勝矣何謂積芻粟夫今之所患患在困民力伏望陛下令沿邊土地各廣營田州郡長官兼其使領每嵗秋夏較其課程立旗鼓以齊之行賞罰以勸之如此則地無遺利兵有餘糧仍縱商人沿邊入粟儻鎮戍有三年之備則胸奴不敢動矣何謂革將帥夫今之所患患在重兵在外輕兵在內也去嵗𫝊潜以八萬騎屯中山魏博之間鎮兵全少非鑾輅親征則城邑危矣伏望陛下精選將臣任以河北近鎮仍依舊事節制邊兵恐未能削部管之名且望減行營之字遇舉動則暫巡邊徼當事平則却復舊藩豈獨不啓戎心況復待勞以逸如此則不失備邊之要又無舉兵之名且使重兵不一處此實機事言難盡陳望陛下細而詳之何謂明賞罰夫今之所患患在戍卒驕惰臣自知府已來見侍衛殿前兩司送到邊上走回軍卒人數甚多臣問其由皆言為思骨肉斯蓋令之不嚴也平時尚敢如此況臨大敵乎伏望陛下特以此言示其將帥俾申嚴法令務誡此徒古人云賞不勸謂之沮善罰不懲謂之縱惡又曰法不可移令不可違臣嘗預修國書見太祖用郭進在西山每遣戍卒太祖必諭之曰汝等謹奉法我猶赦汝郭進殺汝矣其假借也如此故郭進所至兵未嘗小衄陛下鑒前事之不忘即後世之元龜也臣今舉此五事皆是略陳大綱詔㫖如行細具條奏臣又聞胸奴用兵唯觀太白與月耳按天文志太白者將軍也辰星者廷尉也合則有戰臣以此推之北戎一二年間未敢深入陛下若用臣此言卒嵗之內則邊鄙不聳矣邊鄙不聳則胸奴不召而自來也太宗臨御十七年間未嘗令疆場生事故胸奴先遣使上書乞和此明驗也焉在其須舉兵翦除哉必望陛下思兵者凶器戰者危事不可倒持鏌鎁授人以柄且自五代以來為將北征者大則跋扈小則喪師此皆布在舊史陛下所明知也豈不謹之豈不誡之臣嘗見嚴尤論自古禦戎未得上䇿臣竊笑之臣以為王者守在四夷嘗以靜勝此上䇿也臣逢千年之運受二聖之知恨未能隕身以報陛下陛下詢於芻蕘臣是以敢奉大對狂瞽之罪甘俟誅夷咸平三年上時知開封府上真宗論陜西事宜張齊賢臣竊見昨者清逺軍陷沒以來青岡寨燒弃之後靈武一郡援隔勢孤賊遷必窺覘城池劫脅熟戶兵力傷沮難固壘垣況塞北未寧方有調發若果分兵西面亦恐兩失機宜以今日西鄙事勢言之窮討則不足防遏則有餘其計無他惟在激勵自來與繼遷有讎蕃部招誘逺處大族首領啖之以官爵誘之以貨財推恩信以導其誠述利害以激其志若山西蕃部響應逺處族帳傾心則凶醜之勢減矣以弓箭手及旋㸃義軍對本城兵士臣責得十三州軍有二萬餘人若更於他州及近處對替又合得五六千人其本城兵士試加料揀亦甚有材勇可捍邊者若沿邊兵得及五萬餘更誘蕃部踰十數萬彼出則我歸東備則西擊使其奔命不暇矧更能外侵哉仍許蕃漢兵獲得馬畜資財悉令自取明行曉諭逺近皆知則蕃漢將士之心孰不見利爭進今靈州軍民不翅六七萬陷之死地危難可知臣又慮賊遷謂來春必發兵救援靈武於我未舉兵之際盡驅蛇豕併力攻圍則靈州孤城亦必難固萬一陷失賊勢益增縱使多聚兵革廣積財貨亦難保必勝矣所以臣乞封博囉齊為六谷王及厚賜金帛仍先敦諭彼必向風恐遷賊旦暮用兵斷彼族賣馬之路茍朝廷信使得達博囉齊則尼瑪等族西南逺蕃不難招輯西蕃既已稟命沿邊兵勢自雄則鄜延環慶之淺蕃原渭鎮戎之熟戶自然齊心討賊竭力聖朝設能與對替兵甲及駐泊軍馬互為聲援伺間而興則萬山聞之必不敢於靈州河西頓兵矣萬山退縮則賀蘭山蕃部亦稍叛遷賊矣如此靈州孤壘未至憂虞今議者謂六谷虛名終冝吝惜靈州孤壘翻未籌量與其濫賞而收羌夷之心臣謂濫賞之失輕矣茍若蹙地而稔豺狼之勢則蹙地之恥大矣今議者不過曰名器不可假人刑賞不可濫及此乃聖人治中國之道非議於夷狄者也陛下即位之初以銀夏一管盡與繼遷委髙爵於匪人屋王臣於穹帳分儲廩以悅其志輦金帛以慰其心有以見陛下愛全生靈恥用凶器惠此中國以綏四方者也朝廷於遷賊之恩可謂厚矣殊不知契丹慮遷賊感大國之恩斷右臂之勢防患甚切其謀甚深置王爵以賜之遣戎使以鎮之王爵至則旌節之命輕矣旌節之命適所以資之也戎使至則動靜皆伺之向背之心異矣我使往適所以堅之也夫西平之命亦虛名也契丹命之有何損哉以今日言之當時之䇿豈不為失乎且六谷者西北之逺蕃也羌夷之內推為雄豪若於平時但以市馬須示羈縻則一懷化將軍亦已厚矣酌今日事體似失權宜兼恐今後邊事兵機更有準前失中即於國家大有妨損昨清逺之陷是使奸凶轉成豐富兵民官吏六七千餘或含恨重泉或永囚異域傷和致沴思之痛心顧惟靈州還同穽獸外則虞寇戍之逼內則憂變故之生朝夕之間垂餌虎口然而握兵者畏懦逗遛坐觀覆敗運籌者安然自若曾不憂邊臣雖至愚不勝忠憤且戎敵之性變詐多端必恐醜類之謀潛俟間隙伏望明諭邊將內備外虞臣不任憂國思報之至咸平四年八月李繼遷遣牙將來貢馬然冦鈔邊部益甚上以邊臣玩寇朔方餉道愈難命齊賢為涇原儀渭邠寧環慶鄜延保安鎮戎清逺等州軍安撫經略使即日馳騎而往九月繼遷陷清逺十月齊賢使還上此奏時為兵部尚書上真宗乞進兵解靈州之危張齊賢臣伏見遷賊包藏凶逆招納叛亡建立州城創置軍額有歸明歸順之號務且耕且種之基仍聞潛設中官全異羌夷之體曲延儒士漸行中國之風覩此作為志實非小況靈州自遷賊為逆以來危困殊甚五鎮連陷奸威益張道路阻難音耗逮絶當城鎮堅全之日磧路未梗之時大凡中外常人言合棄者已衆矧清逺軍近遭攻青岡寨輒自陷焚燒兵勢人心傷沮數倍即今來所議棄者益多靈州斗絶一隅旁無援助南去鎮戎約五百餘里東去環州僅六七日程如此畏途不須攻奪則城中之民何由出城中之兵何以歸欲全軍民理須應援少發兵則復虞邀劫多發兵則廣費資糧與其應援以出兵曷若用竒而取勝小勝則軍民可出大勝則形勝復全匪惟禽討之有方抑亦進退而獲利與其虛勞甲卒枉殺齊民示弱稔奸萬萬相逺也果能更益精兵合西邊見屯田卒雜以對替之衆使其兵力有餘量分師徒與原渭鎮戎合彼中與山西熟戶從東亦擇穩便處入界若嚴約師期兩路齊進茍或繼遷敢來援助彼則分兵而應敵我則乘勢而易攻且奔命道途首尾難衛千里趍利不遁則禽臣謂兵鋒未交靈州之危自解矣因取靈州軍民置於蕭關武延以來據險就水建立一寨僑置靈州羈係蕃漢土人之心裁候平寧却歸然後縱蕃漢之兵伺便奮擊我則按重兵而觀利度賊勢以設謀臣謂破賊成功十有八九矣咸平四年十二月上時為朝議欲棄靈州上出手札訪於齊賢齊賢上此奏上真宗論棄靈州為便楊億臣嘗讀舊史漢北築朔方之郡平津侯諫以為罷敝中國以奉無用之地願罷之上使辨士朱買臣發十䇿以難之平津不能對臣以為平津漢之賢相深明經術習知利害屬武帝以雄侈自任志在開拓買臣等以詞辨獲進並侍左右前史稱平津每朝會議論但開陳其端使人主自擇不敢面折廷諫由此言之非不能折買臣之舌蓋所以將順人君之意爾築朔方非便有自來矣且地在要荒之外固聲教不及元朔中大將衛青攘却胸奴取其河南之地列置郡縣今靈州是赫連昌地後魏置州屬朔方之故墟胸奴之舊壤僻介西鄙邈絶諸夏數百里之間無有水草烽火不相應亭障不相望當邊境謐寧羌戎即叙道路不壅餉饋無虞猶足以張大國扞蔽自胡雛作梗邊邑屢驚羌夷為其脅從凶黨因而猖熾待之以爵賞頗驕蹇而不恭討之以甲兵又遁逃而無獲凡有贏糧之役必興徂擊之謀每至靈武轉輸大須發卒防援離去內郡皆無鬪心經涉畏途多有菜色自曹光實白守榮馬紹忠及王榮之敗資糧扉屨所失至多將士丁夫相枕而死以至募商人入穀輸帛賞以數倍之價復于積石孤壤別築清逺一城邊城繹騷國帑匱乏既不能制黠虜之死命又不能救靈武之爭心雖數年之間凶黨逾盛靈武危堞巍然僅存河外五城繼聞陷沒但堅壁清野坐食糗糧閉壘枕戈茍度朝夕且使繼遷橫行沙漠俶擾邊陲擊列鎮之戍兵侵屬國之蕃部雖有警急無堠望而誰知縱或憑陵但繕全而自保未嘗出一兵馳一騎敢與敵校此靈武之存無益明矣平津所言罷敝中國以奉無用之地正為今日也臣以為存之有大害棄之有大利且如國家募人入粟償以十倍之直發卒轉送涉兹不毛之地此古之所謂率三十鍾而致一石驅民于死者今棄之即以嵗省戍卒分守內郡一卒之費可給十夫國家免飛芻挽粟之勞士卒免暴露流離之苦謂廢之則虧失土地傷損威重且如堯舜夏禹聖之盛也地不過數千里而明德格天四門穆穆武丁成王商周之明主也地東不過江淮西不過氐羌南不過荆蠻北不過太原而頌聲並作號為至治及奏漢拓土窮兵逺略雖疆里益廣而干戈日尋府庫之資屢空生靈肝腦塗地校功比德豈可同年而語哉夫蝮蛇螫手壯士斷腕蟻壤不塞將漏江河今靈武之存為害甚於蝮蛇供饋之費為蠧甚於蟻壤無鴻毛之益有太山之損豈可忽逺大之略信悠悠之談昔西漢賈捐之嘗建議棄珠崖當時公卿亦有異論元帝能排衆多之說奮獨見之明下詔廢之人懷其德元帝之意寧欲自棄其地當其內屬為郡固已置吏而按循及其稱兵作亂豈可勞民而往戍故其詔書議者以棄珠崖為威令不行夫通乎時變則憂萬民萬民之飢餓危孰甚焉且宗廟之中凶年不備況夫避不嫌之辱哉臣以正與今日靈武之事相類必以失地為言即幽薊八州河湟五郡所失多矣何必此為議者又以西北諸蕃戎馬是産資其控制以通貿易環慶諸州內附蕃落藉其屏翰以免繹騷此迂濶之甚且戎人為利所誘故互市於邊關蕃部之族自強故能庇於種類必來寇於環慶固無隔於藩籬百雉危城千里阻隔自救不暇豈及於他議者又謂其土田沃饒有漢陂之利恐賊遷因而播殖益以富彊況戎人但以攻剽為生罔知耕稼之事河隴之外棄地甚多延袤百城提封萬井西漢屯田之所疆畔猶存儻事力耕可以積穀何必獨耕靈武乃能足食若靈武於賊有大利即是必爭之地當朝夕攻取豈至于今皆為孟浪之談殊非經久之計況又嵗有調發動致擾攘借寇兵而資盜糧竭民力而耗國用為患之大無出於斯雖庸人孺子亦知其可棄也若或遴選單介間道而行齎持詔書宣布王命令其盡焚廬舍自拔而歸丁壯悉令持兵老弱以之襁負古稱歸不可遏又曰置之死地而後生當此之時人百其勇臨難思免其鋒莫當又須申命偏師揚言出塞軍聲既振賊勢自分即靈州遷民不虞邀擊之患雖有剽劫易為枝梧且國所惜者土民所急者財用豈可以驍勇之族委餒虎之蹊府藏之實棄廬山之壑今棄去靈武退守環慶卒免戍于絶域民期保其室家供饋不出于郊圻恩澤自淪於骨髓民力不竭士氣益揚何敵不摧何戎不克陛下又憤兹黠寇志欲翦除臣以為不可黷武以窮兵止可伐謀而制勝臣料賊遷盱睢邊塞之外倔強沙漠之中脅制諸羌嘯聚不逞無耕農之業無蠶織之功為鼠竊之謀以資衣食聚烏合之衆以撓塞垣致蕃夷之服從用凶威而驅迫非有厚利能誘其人朝廷今廢棄靈州每嵗更無饋運絶其覬望何所規圖平夏之西鹽池斯在先是貿易粟麥用資餱糧令禁甚嚴法網尤密無敢逾越漸致攜離皆困賊遷之術也臣竊見太祖朝命姚內斌領之軍市之租不從中覆用能士卒致命羌戎畏威朝廷無旰食之憂疆場無羽書之警臣欲望于武臣之中選有將帥之才知邊鄙之事設十數人各布諸郡量其所將兵力多少除廩祿之外賜一大縣租賦恣其犒設令開幕府召髦俊為僚佐咨以䇿略勇力之士禀其指蹤之用軍旅之政許以便宜而行儻賊遷侵邊郡軍城擾內屬蕃部並唇齒相援腹背夾攻或戰馬正肥武士思奮即召發內屬討虜生羌俘獲之餘盡分麾下且戎利于降附明立賞格厚答戰功即遷賊腹心稍稍奔潰親離衆叛事去運乖煢居獨行誰與為伍但塞外一邊人耳安能與大邦為讎哉若欲謀成廟堂功在刻漏臣以為此寇方黠其財猶豐驍健之羣如臂使指未可以嵗月破也直須廢棄靈州退保環慶然後以計困之爾如臣之䇿祗得兩三驍將付之以一二萬精卒以數縣租賦給其用度分守邊郡賊遷可以計日成擒朝廷可以高枕無事耳咸平四年十二月上時靈州勢危詔羣臣議棄守之宜億上此奏明年三月繼遷大集諸司攻陷靈州億時為知制誥上真宗議澶淵事宜寇準臣伏奉聖㫖擘畫河北邊事及將來駕起與不起如起當至何處者一臣伏覩邊奏犬戎游騎已至深州以來竊緣三路大軍見在定州魏能張凝楊延昭田敏等又在威虜軍等處東路深趙貝冀滄德等州別無大軍駐泊必慮虜騎近東南下寨輕騎打劫不惟老小驚騷兼使賊盜團聚直至天雄軍以來人戶驚移若不早張軍勢必恐轉啓戎心臣欲乞先那起天雄軍兵馬一萬人往貝州駐泊令周瑩杜彥鈞孫全照部轄若是虜騎在近即仰近城覔便掩殺兼令間道將文字與石普閻承翰照會掩殺蕃賊及召募強壯入賊界燒蕩鄉村劫殺人口仍乞照管南北道路多差人探報蕃賊次第奏聞及報天雄軍一則貴安人心二則張得軍勢以疑敵人之謀三則石普閻承翰等聞王師北來壯得軍威四則與邢洺地里不逺張得犄角之勢一隨駕兵士衛扈宸居固不可與犬戎交鋒原野以爭勝負天雄軍至貝州兵馬車駕未起以前不過三萬人萬一犬戎至貝州以南下寨游騎漸更南來即須那起定州兵馬三萬人騎令呼延贊等結陳南來鎮州及令河東雷有終手下兵士出土門路與定州兵馬會合相度事勢緊慢那至洺州以來方可聖駕順動假萬乘之天聲合數路之兵勢更令王超等在近城排布照應魏能張凝楊延昭田敏等處兵馬令作會合次第及前來纍降指揮牽拽候抽移得定州河東兵馬附近始得幸大名一或恐萬一定州兵馬被犬戎於鎮定間下寨抽那不起邢洺之北游騎侵掠天雄軍東北縣分老小大段驚移須是分定州三路精兵差在彼將帥等會合及令魏能張凝楊延昭田敏等兵馬漸那向東傍城下寨牽拽如此則犬戎必有後顧之患亦未敢輕議引軍深入若是車駕不起轉恐蕃賊殘害生靈或是鑾輅親征亦須過大河即且幸澶淵就近易為會合兵馬兼控扼津梁右臣叨列宰司素無竒略即承清問合罄鄙誠伏覩皇帝陛下睿智淵深聖猷宏逺固已坐籌而決勝尚猶虛已以詢謀兼彼契丹頗乏糧糗惟恃嘯聚之衆必懷首尾之憂豈敢不顧大軍但圖深入然亦慮其凶狡須至過有防虞煩瀆天聰伏增戰懼景德元年閏九月上時為兵部侍郎同平章事宋名臣奏議卷一百三十
