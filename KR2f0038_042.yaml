body:
  text: 宋名臣奏議卷四十二宋趙汝愚編天道門災異六上英宗應詔論水災呂公著臣聞水旱之災雖聖人在上不能免也然聖人在上雖有水旱而終不為害者遇災而懼見異而修德夙夜自省以答天戒故災可以轉而為福危可以徙而為安後世人君不知禍福無常而謂天命為已有不知人情可畏而謂力可以制之災害既作矣猶不自知其非也乃引堯湯水旱以為比而不知疇咨自責之獲終吉也故人心不從天命不祐災害不已怪異隨之怪異不已傷敗隨之由是觀之水旱之災不能使必無於世而其終所以安危存亡者在懼與不懼耳伏惟陛下蒞政以來日孳孳於庶事然纍嵗旱潦人多疫疾又近者大雨為沴下民昏墊陛下徹宴損膳下毋諱之詔開直言之路將克巳自新以求天意然臣愚獨以為此皆常事猶未足以弭大災也唯當兢兢業業以求已過自奉先養親以至於任官使人求賢納諌愛民節用無不物物而思之行所未行補其闕誤以謝天心以順人意則社稷幸甚治平二年上時為龍圖閣直學士判流內銓上英宗論星變張方平臣自到闕伏見陛下以垂象之變避正殿减膳降服恤刑罷宴徹聲樂弛力役所以修省答天戒者甚至竊聞退就宮閣尤為憂勞至以聖躬為民祈請臣深惟陛下以上聖之資自在藩邸其稽古好德令聞夙著於四方繼天纂統越今四年始初清明厲精求治然未嘗有以修明紀律震耀威靈以究治亂根本為議也前史推彗星之占率以為除舊布新之象中外之因循久矣官失其守事忘其舊綱目頽紊憲章隳弛天其或者儻將以是為先先賢以為政譬之鼓瑟不調甚者必當解而更張之竊觀朝政殊未遑及此晉紀何曽侍武帝退而告其子曰吾每對見未嘗聞經國逺圖唯平生常事非貽厥孫謀之兆也及身而巳後嗣其殆乎後天下亂危果如其言今夫萬幾庶政屬在兩府願陛下以燕暇之時就清間之處延召執政之臣從容賜坐垂意訪逮各使悉心陳治道之要以陛下之明而參擇其言舉其可施行者以興敝舉廢為救時急務匪唯修人事抑以承天意又比來災眚間作率由隂沴夫隂也者臣道也妻道也夷狄之道也庶民之象也陛下推是而求之則天意可見而消復之道得矣唯陛下留神幸察治平三年三月上時為翰林學士承㫖上神宗乞訪四方雨水司馬光臣竊見陛下近以久旱為災命使遍祈嶽瀆靡神不舉精誠感通甘露降集誠中外之大慶然暑月暴雨多不廣逺臣竊慮四方州縣尚有未霑足之處王者以天下為家無有逺邇當視之如一不可使惻隱之心止於目前而已今者京城雖已得雨伏望陛下不可遽以為秋成可望怠於憂民凡內外臣寮有四方來者進對之際皆乞訪以彼中雨水多少苗稼如何榖價貴賤閭閻憂樂互相參考以驗虛實既可以開益陛下聰明日新盛德又使逺方百姓皆知陛下燭見幽逺無所遺忽銜戴上恩傾心歸附又使州縣之吏皆知陛下憫恤黎元留心稼穡不敢自恃僻逺殘民害物陛下一發德音以收此三善非獨可以行之今日亦願陛下永久行之誠天下幸甚治平四年五月上時以右諌議大夫權御史中丞上神宗論地震錢顗臣伏以今月甲申至辛卯京師連日地震者五竊觀人事以考變異皆隂盛陽微之象也故易𫝊曰凡災異所生各以其政變之則除消之亦除古之王者或因天地譴告則必責躬修德祇畏省懼思所以致之之咎務所以改之之理日新庶政以答天變故詩曰惟此文王小心翼翼昭事上帝聿懷多福此之謂矣臣竊思國家以來災變不一日月薄蝕星辰陵犯天雨毛雹害稼始則蝗旱作孽終則秋霖為沴河北諸郡大河决潰地復震裂廬舍摧塌人民壓溺幾以萬數其餘百川涌溢天下被水患者十有五六殊可駭愕雖春秋所記災異未有若此之甚也陛下臨御未久精心萬幾以至德深仁愛育元元躬有日昃之勞而無暇豫之樂然猶嘉氣尚凝隂陽繆盩豈廟堂之燮理有非其人乎天下郡縣刑獄有所寃濫者乎深宮之中女謁有過盛者乎左右近習有竊弄威權者乎三陲蠻夷兵革有所隂謀者乎中外姦臣有潛懷不順者乎讒人昌而下情有不通者乎土木盛而興不急之役者乎號令數易而賞罰有所不當者乎賦役重困而民心有所愁嘆者乎水災地震二者應驗尤急豈非隂盛陽微之極也伏望陛下深思逺慮以杜未萌陛下無謂堯湯水旱為天數也日月之食為三辰之行也彼箕子之陳洪範劉向之傳五行皆非空言也要在應之以誠感之以德宋景公小國之諸侯耳有不忍移過之言熒惑為之退舍况陛下之聖明其肯忽之哉臣願陛下詢求至言矯革前弊密推至誠以應天變何災之不除何福之不至也臣叨居言職不敢緘默熙寧元年七月上時為殿中侍御史裏行上神宗論水災地震鄭獬臣竊見去嵗自京師西南至於海隅地皆震今嵗自京師而北至於朔方又大震迄今不已城郭陷入地民廬悉摧仆長河决溢灌深冀間兹豈細故哉震者隂盛而迫於陽其發必有所召而不為虛應考之古而驗於今似可究其涯略漢和帝永元二年郡國十三震說者謂竇太后由房闥而制天下今二宫非竇氏之比則不為宮闈發也建光元年郡國三十五震或地裂壞城郭說者謂中常侍江京樊豐擅天子權今內省非江京樊豐之比則不為寺人發也晉元帝太興元年震說者謂王敦擁兵陵上哀帝興寧二年震說者謂桓溫跋扈顓朝今大臣非王敦桓溫之比則不為執政者發也是數者無所當則殆將有兵禍乎光武時郡國四十地震而武溪蠻反晉成帝時象州震而蘇峻亂近者仁宗時欣代間大震而元昊不庭用此以較之則非兵而何臣之所憂不在河北而在陕西何者河北雖被災而南方大稔流離之民相擕而南亦可以就榖此惟煩朝廷戒敕所在務為存恤不令餒死于草莽則無慮矣至於陕西則自城綏州以來至今兩議不决首尾一年凡自京師所餉縑金已費四百萬至於發卒乘器甲轉芻糧雜出於民者尚不在此數即不知國家以四百萬縑金而與羌人爭何事耶雖得一綏州而所費如此其利害亦概可見矣事不早决何止於此則將見國力殫于內民財屈於外怨讟並起姦人搖足其將奈何此不可不深慮也如聞羌人率其螻蟻之衆窺我境上料其裹糧蓄牧必未能久駐逮將遁矣然而數出兵而無所攻取者此所以困我也彼來則我不可不應兵馬既發糧芻既集彼復解而去異時則又來使我奔走為備之不暇此正墮其術內也則朝廷亦宜破其姦謀以靜自守不為之動彼無所得而退我無所失而守若是者彼來雖多而我備有餘也夫世之治久而之亂不過百年世之亂久而之治亦不過百年此大勢也本朝藝祖自平定四方已來將百年矣治亂之際正在陛下臣以為治今之難難於祖宗之時何則自安史之亂至五代之末四方之彊諸侯已死其立者皆孱子弱孫勢與數俱窮故太祖太宗一起而掃刈之若草菅然易於為力也至于真宗仁宗之初民已離兵革喜見太平故收功報成垂拱而天下治亦甚易也今陛下非開基之日過已盛之時萬一浸以衰弊此所以難於為力而甚於祖宗之時也則豈得不深思逺慮講求所以致治之術乃欲以玩夷狄取武功茍有差跌則遂成衰亂之勢可不謹哉如羌人引衆而遁則陛下斷之正論早與通好涵養生靈俾之安處則天災自息雖日有震搖亦不能以勝我矣熙寧元年七月恩冀州河决水災又河北州軍地大震自秋距冬沿邉尤甚至有聲如雷移時纍刻不止獬八月上此奏時為翰林學士上神宗論淫雨地震呂公著臣伏見夏秋之交淫雨為沴乃甲申地震京師天威不逺譴告甚明此誠陛下抑畏修省之時也臣竊考自昔人君每有變異或因恐懼而致福或以簡誣而致敗蓋古之王者知禍福無不自已故側身修行以求消復則天之應也敏若影響此所謂恐懼以致福者也至於後世乃以為天地災眚皆有常數或専修外事或歸過於下則是坐視天災無復自飭此所謂簡誣以致敗者也恭惟陛下以聖德在位將興太平然而災害重仍殆有以警懼陛下臣愚以為必須歷考庶事正所未正則災可轉而為福書曰惟德動天無逺弗届言至誠之道修於已則足以感人神也又曰天聰明自我民聰明君能感人然後可以動天也蓋人之情僞最為難知上雖以至誠待下猶恐有不應者是以古之王者臨朝接物莫不以此為大務故衆多之臣皆思盡誠以應之而不敢挾機以事其君國爾忘家主爾忘身上下如一至誠無間如此而天意弗豫變異不消者未之有也在易之咸曰君子以虛受人夫衆人之言不一而至當之論難見君子者能不自用而考合天下之公議猶恐未能盡天下之善也然而論議者固有其言不正而可喜其理似是而實非者不幸而先入之則後雖有至當之論亦難於必受也是以古之王者去偏聽獨任之弊而不主先入之語故能慮無遺策而不為邪說所亂昔顔淵問為邦孔子曰逺佞人蓋佞人之在君側也先意承旨惟恐不合於君則其勢必久而愈親賢者之在君側也直言正行惟恐不合于義則其勢必久而愈踈此孔子所以欲逺之也書曰常厥德保厥位厥德靡常九有以亡言天子者臣下所禀命不常其德則人無所措手足是以古之王者思為可久之德而事不輕發方其令之未出也無所不謹則令之既出也無所不行書曰三載考績三考黜陟幽明夫以堯舜之聰明其于羣臣之能否必至於三考九載而後黜之者蓋以知人至難而功用復不可遽見若徒以一事之得失一人之毁譽不待乎久不究其他因以定臣之賢不肖而進退之則所處未必盡當所處未當則復有更易更易既多則人懷茍且之心而世無安治之實矣昔商宗遭鼎雉之異而祖巳訓諸王曰惟先格王正厥事夫災變之來固不虛發而天意所指蓋亦難知惟王者能因事修飭以答明戒則精祲之交安有不達然自漢儒以來言災異者始穿鑿經意附㑹時政人君若聽其所言専備一事脫非災變之所為起則得不違天心乎臣是以竊慕祖巳之義不敢為漢臣之說伏望陛下省留聖意未行者勉而行之既行者勉而終之則天下幸甚熙寧元年七月上時為翰林學士兼侍講上神宗論災變而非時數富弼臣伏見近嵗以來災異頻數天文變於上地理震於下人情恐懼物論紛紜臣被詔至都復用為相雖蒙給假治疾未遑朝見而坐於私室如在氷淵况蒙纍遣使臣促令陛對驚惶隕越寢食不安然偶於災異之間或聞有說者不近正道臣甚憂之比俟入見日面具開陳又恐差緩蓋救患不可不急施惠不可後時臣夙夜揣摩事無大於此者今遽以狂瞽上瀆冕旒切望聖慈更賜裁擇伏聞陛下自始即位躬親萬幾每有凶災憂形玉色孜孜詢訪以求聞失此真得修講朝政答謝天譴之道也然臣竊知纍有人奏請凡百災變皆繫時數不由人事者不知有之乎若誠有之此乃姦人諂佞之說上惑聖聰臣所謂不近正道者也陛下明睿英哲必不信納又慮姦人口才捷給能以甘辭致陛下或時信之信則恤災救患答謝天譴之意有時而怠怠則虧陛下之德損陛下之政不為宗社生民之福無甚於此焉臣上所云天變地震此天下皆知之皆見之大可懼者也昔仲尼作春秋不書祥瑞而獨書災異者蓋欲以警戒人君使恐懼修德以應天地之變不聞以災異歸之於時數也至西漢董仲舒𫝊仲尼春秋之學對武帝策曰臣觀天人相與之際甚可畏也國家將有失道之敗天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至董仲舒為西漢羣儒之首所陳災異謂盡由朝政而致豈虛語哉亦不聞以災害怪異歸之於時數也夫上天之變幽眇髙邈下民或有不見而不知者若數路地震之異河北特甚則人皆見之而親被其害不可諱也因而人民流散捨棄墳墓骨肉而適他土去如鳥獸茫茫不知所止餓凍病疾死於道路者不少甚可痛惜也孟子對梁惠王曰塗有餓莩而不知發人死則曰非我也嵗也是何異于刺人而殺之曰非我也兵也王無罪嵗斯天下之民至焉孟子獨得聖人之道為最深而勸梁惠王専尚仁政不可罪嵗是亦足以為後世法陛下冝深信而行之可以回災異為嘉祥變禍患為純嘏致宗社生民之福豈有窮也其姦人虧德損政諂佞不正之語必不可令眩惑于其間也又臣少時讀書頗嘗探尋天人之理竊怪有唐韓愈栁宗元劉禹錫三子談天皆不得其要臣今試陳其梗槩夫太極既判遂生兩儀形而上者曰天形而下者曰地天地之間蓋載者曰萬物萬物至衆不出乎動與植而已植物不靈不能有所運用造作惟動物為有命比植物為靈然亦未能為善惡知喜怒獨夫人又動而有靈者也可以為善可以為惡者是人人自為者也自為善自為惡者皆小焉天地亦隨而應之以禍以福故書曰作善降之百祥作不善降之百殃易曰作善之家必有餘慶作不善之家必有餘殃蓋祥與殃只及其人與家者也夫所謂可以喜可以怒者非人人之喜怒也天下人之喜怒也天下人之喜怒實繫乎帝王之所為而然也帝王所為之政和則天下人喜人喜則其心亦和和氣既生充於上下天地自然以和氣應之天地氣和則隂陽順百榖成衣食自豐夭橫不作故民躋富夀常懷樂康雖欲使之為亂而叛去必不可得也若帝王之政不和則天下之人不喜不喜則悲愁怨怒心亦不和不和之氣既生天地自然以不和之氣應之天地之氣不和則隂陽不順百榖不成衣食不豐夭橫並作故民皆窮困離散父母兄弟妻子不能相保其不思為亂而叛去者未之有也天下之喜怒所以能感動天地致禍于國家如此之可必者何也本緣天地萬物通是一氣所生無有纎間惟是氣之清者為天氣之濁者為地清濁之餘氣散于天地之間是為萬物萬物之最靈者為人以此觀之天地萬物同為一類則最靈之人豈不能以衆喜衆怒之氣感動天地而致福致禍於國家者乎是故先聖以萬物中獨以人配天地謂之三才是知人者與天地本同而末異體均而氣通不可輕視虛用之也為帝王者宜先以仁政調和人心使之安樂自固而不叛去以為國家永永之福捨此而望天地順成天下無事决不可得也尚書洪範九疇八曰庶徴謂人君行肅乂哲謀聖五善道則雨暘燠寒風五氣時而為其休徴乃百榖用成俊民用章家用平康也人君行狂僭豫急蒙五惡道則雨暘燠寒風五氣常而為其咎徴乃百穀用不成俊民用微家用不寧也夫雨暘燠寒風雖先後說之實則一也然而可以為休可以為咎者只繫乎人君為善為惡而遂分也洪範者二帝三王所行之常道也後之君人者當信而師尚之不可謂陳迹不信用也信之則為福不信則為禍書又曰天視自我民視天聽自我民聽又曰天聰明自我民聰明天明畏自我民明威夫天本無心無耳目亦無喜怒愛威作書者假視聽聰明以為之說故易曰聖人以神道設教者是也其實只緣天地人本是一氣善惡動靜必然相應合若符契間不容髮無謂天人形體隔絶至逺便謂兩不相干而不以為信也氣既相貫氣動則應人有喜怒天應如響亦猶冬至一陽生夏至一陰生其氣眇然人不可得而見惟以葭灰驗之無不刻期以應天下人喜怒之氣能感動天地之氣亦皆刻期而應也是故治天下者直宜以仁政恱民心和民氣使其氣自通於天地日星山澤又皆有神靈主之則必能默觀君人者所為善惡及人之善惡助其自然之氣降福降禍豈不尤速耶豈不尤可懼耶以此益見天地災變不可盡歸之於時數而不修人事以應之然可以歸之時數者故時亦有焉獨堯水湯旱是也夫堯湯之為君必不使人心有不和之氣以感動天地而致其水旱也蓋堯湯大聖人其佐亦賢上下協心戮力無一夫不獲無一物失所故其水旱不得已可以歸之於時數也然雖有水旱之災而不聞有重役橫斂勞民驚衆之事亦不聞有流移播散凍餒死亡於道之人惟聞常有九年之蓄民無菜色而天下奉堯湯亦如無水旱之時愛之如父母敬之如神明人心熙熙和氣不减乃是雖遭水旱而民不被其害國不憂其危也自秦漢以降則不然凡有災變怪異皆由時君世主不能舉直錯枉用賢退不肖復有不能行善道施仁政恱民心和民氣此其以人事致天地災異必然之理也必不可歸之於時數也災異既作又不能恐懼修省行消復之道坐視蒼生赤子棄墳墓離鄉土父母妻子兄弟奔逃播徙不能相保守往往君自君臣自臣民自民不相為恤而不加救拯民既如此被其害而不悲愁怨怒以思為亂者鮮矣民既怨怒思亂而國不危者又鮮矣彼既上下乖戾不能同心協力以致災變害民而危亡其國乃妄欲比堯湯水旱以已之所致災異歸於時數是欺天欺民之甚也胡可信耶夫地者至大至厚至靜不可動搖之物也古今固亦有震動之時隨其所震大小逺近必災患以應之然未嘗聞數路皆震也震且不一有日或十數震者也又不一日而止有至今踰半年尚震而未止者也是豈不為大災害耶大怪異耶此陛下正當窮究致震之由推至誠行至德思所以厭塞其變以謝天之譴告焉不然則恐董仲舒所謂敗傷乃至者必將不能免也陛下即位未久而天下但聞聖德勤儉恭孝不聞有過此變非由陛下而致然陛下若不為祖宗任其事則天地之變誰復可以任之哉陛下既任其事則固宜兢兢業業夙夜憂勤登用正人興行正道思與天地合其德而濟之以不懈使天下皆知陛下恐懼修省視民如傷恱其心和其氣則天地之氣亦和而應之茍如此何患災異之不息人民之不安乎其姦人謀身害國罪在殺無赦其所說願陛下絶之不復留於心術而稍有所惑其為宗社之福邦家之慶必不出乎此也若陛下萬一惑其所說以災異歸於時數而聖懷坦然不以為懼有司之不職者不加擇政事之不平者不加治萬民窮困失所者不加恤天下人心必益愁怨而不喜則隂陽之氣何由而和天地之變何由而息也大凡姦佞之人阿諛巧詐善移人主之意其說雖目前可喜而終無益於世其大指已達者不過欲持身固祿未達者不過欲希進厚已而都不以生靈禍福國家安危為念也是可謂大忍人也大姦邪也夫違天賊民背公棄理臣故曰罪在殺者也此須陛下詳觀其語熟察其意復以其人前後所為而參考之則邪正自見必不能逃聖鑒矣臣蒙陛下召作宰相以疾尚未能一對天表而不避忤犯輒敢懇懇如此之切者何哉蓋觀今災變不與常等實恐姦人以脂韋善柔之說移陛下憂勞之志安陛下克責之心而致陛下不専心於救患恤災以誤陛下至大之事也惟聖慈深賜裁察非臣之幸乃天下之幸宗廟社稷之幸貼黃臣以此奏詞頗繁多然以誠激於中惟恐陛下未賜信察臣所以務盡犬馬之志故不覺詞之多也然直書實事文字鄙拙不敢徒事章句而巳伏望陛下萬幾之餘時賜一覽必亦粗有禆益如陛下未以為狂妄之罪即臣方敢更以管穴之見仰塵天聽也熙寧元年十二月弼既拜相以足疾未能入見有于上前言災異皆天數非人事得失所致者弼聞之歎曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪說故先導上以無所畏使輔弼諌諍之臣無所復施吾不可以不速救即上此疏上神宗乞以無災為懼孫覺臣竊見朝廷自今嵗以來四方有年大河北流二邉不警上下歡焉相慶以為陛下側躬修德任賢去邪興滯補弊於萬事之先故上天報之以德而動如聖意發祥薦祉皇子挺生此固宗社無窮之休朝廷莫大之福然臣竊聞楚莊王天不見妖地不出孽則禱於山川曰天其忘余歟此能求過於天安不忘危故能成霸功臣觀朝廷之上未可謂皆賢四方幽隱未可謂無事號令施為未可謂盡當北狄西羌未可謂受賜鰥寡孤獨未可謂有養陛下中天地而立盡有四海之廣治教政刑粗略如此天之報貺乃如極治之時此豈所謂飢者易為食渴者易為飲歟人情既爾天意亦猶是耶恐諂諛之人進容恱之論淺聞之士伐太平之功陛下如信而矜之則臣憂天幸不可以為常禍故多藏於隱微而發於人之所忽也伏願陛下安不忘危存不忘亡日新盛德而勤儉過於平時損宴游嗇浮費不邇聲色不殖貨利若楚莊無災以為戒懼垂法後嗣𫝊之無窮則華夷蠻貊草木昆蟲莫不幸甚臣不勝惓惓熙寧二年十一月上時為右正言供諫職上神宗論華州山變呂大防臣今月某日中使馮宗道至伏奉聖旨令臣照管山摧處見存人户以次存恤施行次第間奏訖臣纍日以來伏思聖慮深逺憂及逺民以致疲病矜寡皆有恩意雖堯舜用心宜不過此然臣之愚忠有私憂者三過計者一輒敢條列如左一山變之地當谷起嶺山髙者五十餘步臣謹按十月之詩曰燁燁震電不寧不令百川沸騰山冢崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲水之為患至於懷襄而山之傾摧固亦其理然詩人猶以為大變哀其時人不懲其禍今不震電而驚不因水而摧不圮於其下而徙之於逺岸之髙者不止於為谷谷之深者不止於為陵方之詩人所紀尤為竒怪唐世亦有新豐赤水山阜移涌之變方武氏僭亂固不足論方今聖治日新厲精庶政災沴之作尤為可駭此臣所憂者一也一山變之地有大石自立髙四丈周一百七十餘尺臣謹按漢昭帝時泰山有大石自立髙丈五尺大四十八圍說者以為石隂類小人特起之象觀今之變則過於前史所載此臣所以私憂者二也一數年以來人情洶洶皆言有陽九之㑹臣謹按班固厯志所述經嵗四千五百六十災嵗五十七推數者取以為據臣以為天命難知孔子罕言固非衆人之所能知然閭巷之民無所忌憚竊語相𫝊謂之必有竊恐姦猾小人乘此天地之變人情不安之際狂圖妄作僥幸萬一此臣之所私憂者三也一三路京東人情豪悍最冝防備臣伏覩三路緣邉則有城池兵械作可恃之具至於內地州郡守具素墮將帥之臣未至選擇三路京東守臣密付方略以備戎狄為名令葺治城池講葺守備其州縣政事但涉撓動人情者一切緩之以待他日庶使姦猾好亂之人無所窺其隙萬一如有緩急亦吾有以待其變矣此臣之所過計者一也右謹具如前臣伏聞畏天之威于時保之此先王之所以興也我生不有命在天此後王之所以壞也太戊有桑穀之祥其書曰伊陟贊于巫咸作咸乂四篇太戊贊于伊陟作伊陟原命髙宗有鼎雉之異其書曰惟先格王正厥事桑穀共生飛鳥之集未為大異然君臣相勸戒至於數四原天命修政事以應之豈古明王祗畏之道當如此乎伏惟聖神昭鑒洞察古今不待瞽狂之言乃極事理之要惟乞仰承天威俯酌時變為社稷至計天下幸甚貼黃守帥之臣早望精擇須藉忠義敦朴任重致逺之人乃可以消患於未然至如輕俊之人目前敏給似可任使緩急必不得力伏望聖慈深察又貼黃三路內地州軍守備惟陕西最為不講伏望敕守臣以備西戎侵軼為名早令修葺今嵗內地小豐春初可以興役又貼黃去嵗慶州叛卒散亡之黨才數百人並逃匿山林未嘗干犯城邑其內地州郡已各驚擾失措即知守備素不修矣熙寧五年九月丙寅少華山前阜顯谷嶺摧陷其下平地東西五里南北十里潰散濆裂涌起堆阜各高數丈長若隄岸至陷民居六社凡數百戶林木廬舍亦無存者鄰近並山之民言比年以來谷上常有雲氣每當風雨即隱有聲是夜初昏略無風雨忽于山上雲霧起有聲漸大地遂震動不及食頃即有此變大防因上此奏時知華州上神宗答詔論彗星富弼熙寧八年十月十二日詔曰朕以寡薄猥承先帝末命獲奉宗廟顧德弗類不足仰當天心比年以來災異數見山奔地震旱暵相仍今彗出東方變尤大者內惟淺昧敢不懼焉已避正殿减常膳慮未足以祇天戒應中外臣僚並許直言朝政闕失朕將虛心以改庶以消天之變焉臣伏念向緣衰疾加之年已及格不能奔走職事遂求致政伏蒙聖慈俯從愚懇退處衡茅之下杜門自守屏絶私務朝夕待盡而已近日忽聞特宣大赦出於非常又聞别降手詔許中外臣寮直言朝政闕失洛城士庶歡呼鼓舞喧于道路聲徹幽逺推是而往則天下之人無不感動矣臣伏覽赦詔二文始以彗星東出昭示譴告陛下仰觀天變恐懼疚懷濬發德音恩霈寰海臣固知一出聖斷必無左右之助也臣再詳陛下手詔乃陛下親筆非學士所作以至比年災異如山摧地震旱蝗之類前後包括一一歸咎於已辭㫖哀痛深切明白忠義之士讀之莫不感泣而又避正殿减常膳設齊醮屏侍御前代帝王禳災弭患責躬罪已之法陛下盡行之矣所以上天降鑒知陛下發於至誠故星變不旋踵而滅臣溫衣飽食坐享安佚災禍之至殊無干及一見聖詔驟發即日感動天地譴異消伏速如影響臣尚能踴躍欣蹈不知紀極彼天下之人身被災害家罹荼毒流落破散不能相保者其為歡喜感戴當何如也人心既喜和氣充塞則天意不得不早回天災不得不遄息此理固然也臣竊知去年久旱陛下曾降手詔許臣寮上封論事人方喜恱日俟朝廷施設而不知何人者上纍聖德遽成反汗於是天下大失所望臣近于三月中仰答聖問略曾引及今天變益大詔命益切陛下萬必不復蹈前車之誤况云朝政闕失朕將虛心以改此足見聖意畏天愛民其已至矣然臣竊聞外議皆云天下弊病甚衆官家多應不知人人咸願條列達于天聽冀幸有所剗革爾已大發聖詔許其開陳忠憤者必能不避誅戮仰竭肝膽悉以上聞也臣願陛下盡取羣奏不遺踈賤萬幾之暇一一親閲擇其衆說所合者斷在不惑力賜施行踐虛心以改之辭應天文尤大之變使澤及普率急若置郵則人心恱天道順天人相應立致和平國家享無疆之休者正在此時也豈復有災眚出見而上駭聖慮哉萬一姦詐互入宸聽少惑俾夫忠告為妄說恩詔為空文利澤不出於上人心復愁于下則天將曰是以虛辭答我迄無實效必回今日之喜為異日之怒災變之作當又甚於前日之彗者矣但以近事證之此乃必然之理非臣輒敢狂率也惟望陛下深賜裁察為宗廟社稷生靈之計不勝天下大幸手札子臣未致仕前雖有舊疾筋力粗可驅策尚不能從官今致仕已數年衰老益甚退伏草野未嘗與人相接榮辱禍福都不干預而輒敢以狂瞽之說妄陳天聽者實見陛下仰觀星變恐懼修省若不自容也又聞天下生民窮困已甚無所伸訴恐成嘯聚為腹心之患也亦慮手詔或致中廢天譴未息則後來别生災害也臣所以不顧身之老病而彊作此奏庶幾有所補助而報陛下大恩之萬一也緣臣閒居終日與野老相見民間弊病盈塞耳目皆是實事然所說者尚未盡一二伏乞聖慈略賜省鑒而少留聖意焉臣又輒敢煩陛下親閲羣奏者若委臣寮置局必恐不能上體聖意憂勞之切羣奏中利害有所不盡亦恐所委臣寮更存顧望尚或隱蔽或陳巧說妄有沮難則誤聖君畏天愛民不吝改悔之意也臣固無他腸所憂者如此惟望陛下特賜矜察幸甚熙寧八年十月乙未彗出軫丁酉太史以聞弼上此奏時以使相致仕上神宗答詔論彗星呂公著臣伏覩今月十三日詔書許中外臣寮直言朝政闕失者臣世受國厚恩陛下蒞政之初首被選擢自外藩召入翰林故在左右日口陳手奏數進愚忠頗蒙採納今雖散處間外其于愛君憂國惓惓之心未嘗敢忘伏見陛下祗畏天戒焦勞懇惻實天下幸甚臣聞晏子曰天之有彗以除穢也考之𫝊記皆為除舊布新之象皇天動威固不虛發意者陛下之仁恩德澤猶未布於天下而政令施設所以厲民者衆乎何其譴告之明也陛下既有恐懼修省之言必當有除穢布新之實然後可以應天動民消伏變異伏惟陛下留神幸察臣竊觀陛下自即位以來早朝晏罷勵精庶務其規模蓋宏逺矣固將致堯舜三代之治以光太祖之業豈特區區守文之主哉然臨朝願治為日已久在廷之士益乖戾而不和中立敢言者罹讒而放逐阿諛附勢者引類而升進其外則郡縣煩擾民不安業畎畝愁歎上干和氣携老挈幼流離道路官倉庫廪所在闕乏又無以廣賑濟至於骨肉相食轉死於溝壑者多矣上下相蒙左右前後莫敢正言者陛下有欲治之心而無致治之實者何哉殆任事之臣負陛下之髙志也何以言之邪正賢不肖蓋素定也今則不然前日舉之以為天下之至賢後日逐之以為天下之極惡前後紛紛玷黷聖慮者蓋不一矣其於人才既反覆而不常則於政事亦乖戾而不審斷可知也陛下獨不察乎况如一二人者方其未進用之前天下固知其姦邪小人也但取其一時附㑹故極力推進此所以終纍陛下則哲之明者也自昔人君委任而責成者蓋有之矣如齊之桓公是也為其勞於求賢而逸於任使也今則不然水旱不時人民困乏則無以分陛下之焦勞戎狄桀驁疆場有事則陛下不免於旰食又况加之以天變地震之異乎未見陛下任人之得也古之為政而初不順於民者亦有之矣鄭之子産是也子産之為政也一年而輿人誦之曰孰殺子産吾其與之三年又誦之曰子産而死誰其嗣之今陛下垂拱仰成七年于兹矣輿人之誦亦未異於七年之前也陛下雖慮亦及此而終未幡然者殆左右之臣蒙蔽陛下使天下之事不得聞也臣伏思陛下自即尊位以來上奉兩宫仁孝篤至下逮諸王纍朝貴主無不極於恩禮春秋方富而無聲色之過孝友恭儉發自天性宮中之事人無間言而德澤獨不被於民者何哉臣聞安危在出令治亂在所任故臯陶戒舜曰在知人在安民願陛下以知人安民為先除穢布新以答天戒則轉災為福不旋踵而應矣臣昨在朝廷嘗蒙訪逮當時議者謂祖宗制度不可少變朝廷用人必循資級臣固曰不然何則興治補弊者乃人主之先務任賢使能亦不宜専較嵗月但一出於至公當則可爾臣今所言亦非謂今日法令皆不可行也陛下誠能開廣聰明延納正直公聽並觀盡天下之議事之善者固當存之其未善者則當損之茍為非便不為已行而憚改言有可取不以異議而見廢如此則不勞陛下神明不驚衆人耳目而庶事條理百姓安定然後可以足兵食禦外侮矣臣伏自去國六年未嘗有一言仰達聖聰至于私居接人亦未嘗輕議時政今日所以輒進愚悃者誠恐陛下不於此時感悟則後日雖欲改為非竒謀髙策亦未易為也熙寧八年十月上時提舉中太子宮公著謂陛下垂拱仰成比年于兹者蓋自熙寧二年二月以後王安石始執政也宋名臣奏議卷四十二
