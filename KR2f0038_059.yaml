body:
  text: 宋名臣奏議卷五十九宋趙汝愚編百官門館閣上仁宗乞開內館恢景德之制謝絳臣聞唐室麗正史官之局並在大明華清宫內太宗肇造三館更立祕閣于升龍門左親飛白題額作贊刻石于閣下景德中圖書寖廣大廷天下英俊之士乃益以內帑西庫二聖因數臨幸親加勞問遞宿廣內有不時之召人人力道術究藝文知天子尊禮甚勤而名臣髙位繇此其選也往者延燔之後簡編略盡訪求典籍是正疑文而筆工坌集有司引兩省故事别創外館以從繕寫考校之便然直舍卑喧民櫩叢接太官衛尉供擬滋削非先朝所以隆儒育才之本意陛下未嘗迂翠蓋降玊趾寥寥冊府不聞輿馬之音曠有日矣議者以謂慕道不篤於古待士少損於前士無延訪之勤而因循相尚不自激發文雅漸弊竊為聖時惜也願開內館以恢景德之制天聖八年上時為直集賢院上英宗進館閣取士劄子歐陽修臣竊以治天下者用人非止一端故取士不以一路若夫知錢榖曉刑獄熟民事精吏幹勤勞夙夜以辦集為功者謂之材能之士明於仁義禮樂通於古今治亂其文章論議與之謀慮天下之事可以决疑定䇿論道經邦者謂之儒學之臣善用人者必使有材者竭其謀故以材能之士布列中外分治百職使各辦其事以儒學之臣置之左右與之日夕謀議講求其要而行之而又於儒學之中擇其尤者置之廊廟而付以大政使總治羣材衆職進退而賞罰之此用人之大略由是言之儒學之士可謂貴矣豈在材臣之後也是以前世英主明君未有不以崇儒嚮學為先而名臣賢輔出於儒學者十常八九也臣竊見方今取士之失患在先材能而後儒學貴吏事而賤文章自近年以來朝廷患百職不修務奬材臣故錢榖刑獄之吏稍有寸長片善為人所稱者皆以擢用之矣夫材能之士固當擢用然専以材能為急而遂忽儒學為不足用使下有遺賢之嗟上有乏材之患此甚不可也臣謂方今材能之士不患有遺固不足上煩聖慮唯儒學之臣難進而多棄滯此不可不思也臣以庸謬過蒙任使俾陪宰輔之後然平日論議不能無異同雖日奉天威又不得從容曲盡拙訥今臣有館閣取士愚見具陳如别劄欲望聖慈因燕閒之餘一迂睿覽或有可採乞賜常留聖意劄子臣竊以館閣之職號為育材之地今兩府闕人則必取於兩制翰林學士謂之內制中書舍人知制誥謂之外制今并雜學士待制通謂之兩制兩制闕人則必取於館閣館閣者輔相養材之地也材既難得而又難知故當博採廣求而多蓄之時冀一得於其間則傑然而出為名臣矣其餘中人以上優游養育以奬成之亦不失為佳士也自祖宗以來所用兩府大臣多矣其間名臣賢相出於館閣者十常八九祖宗用人初若不精然所採既廣故所得亦多也是以有文章有學問有材有行或精於一藝或長於一事者莫不蓄之館閣而奬養之其傑然而出者皆為賢輔相矣其餘不至輔相而為一時之名臣者亦不可勝數也先帝循用祖宗舊制收拾養育得人尤多自陛下即位以來所用兩府之臣一十三人而八人出於館閣此其驗也祗自近年議者患館職之濫遂行釐革改更之初矯失而太過立法既峻取人遂艱使下多遺賢之嗟國有乏材之患今先朝收拾養育之人或已被遷擢或老病死亡見在館者無幾而新法艱阻近年全無選進臣今略具館閣取人舊制并新格則可見取人之法如何得人之多少也一舊制館閣取人以三路進士髙科一路也大臣薦舉一路也嵗月酬勞一路也進士第三人以上及第者并制科及第者不問等第並祗一任替回便試館職進士第四第五人經兩任亦得試此一路也兩府臣寮初拜命各舉三兩人即時召試此一路也其餘歷任繁難久次或寄任重處者特令帶職此一路也今三路塞其二矣自科場改為間嵗後第一人及第者須兩任回方得試自第二人至第三人更永不試制科入第三等者亦須兩任回方得試凡五七次科場未有一人中第三等者其餘等第者並永不試則進士髙科一路已塞矣兩府大臣所薦之人並只上簿候館閣有闕則於簿內㸃名試其如館閣本無員數無有闕時故自置簿來至今九年不曽㸃試一人則大臣薦舉一路又塞矣唯有酬勞帶職一路尚在爾一新制館閣共置編校八員本為館中書籍久不齊整而館職多别有差遣不能専一校正乃别置此八員故選新進資淺人令久任而専一校讀所以先令作編校二年然後升為校勘未是正館職為校勘四年然後升為校理始是正館職為校理又一年方罷授别任差遣然自置編校後適值館閣取人之路漸廢今議者遂祗以編校為取士新格往時直館直院直閣校理皆無定員唯材是用不限人數今編校限以八員為定以此待天下之多士冝其遺材於下矣八員之內仍每七年方遇一員闕而補一人以此知天下滯材者衆矣右以臣愚見編校八員自可仍舊每有員闕令中書擇人擬進陛下必欲牢籠天下英俊之士則冝脫去常格而奬拔之今負文學懷器識落落竒偉之士知名於世而求為時用者不少惟陛下博訪審察悉召而且置之館職養育三數年間徐察其實擇其尤者而擢用之知人自古聖王所難然不以其難而遂廢但拔十而得一二亦不為無益矣况中人上下養育奬成之不止十得一二也治平三年十一月上時為參知政事詔宰執舉文行士可充館職者各五人上神宗乞增館閣之選吕公著臣聞濟濟多士文王以寧方周之興至於兔罝之人有可以當腹心干城之任者今三館祕閣之職乃朝廷之華選前世以來將相名臣多出其間得人之盛難以遽數臣在皇祐至和中備員館閣當時同輩後亦往往至通顯比來雖有簡拔其數不多其中或以勞進者又皆外補朝廷平日艱於收採緩急必乏使令以至近者遣使髙麗頗煩聖擇古人有言士不素養無以重國臨事倉卒乃求非所以尊朝廷也臣竊以謂天下未嘗乏才也求之而後至用之而後知耳臣愚願陛下考合庶言斷自聖見更得雋偉之士疏通之才稍增館閣之選平日足以優游飭厲緩急惟所用之以重朝廷不勝幸甚元豐元年七月上時為端明殿學士知審官西院上哲宗乞依治平故事詔執政舉館職王巖叟臣伏以國家之所急在人材而人材之難不可以倉卒而得必及其閒暇廣聰明以求之則一日有用隨取隨應無顛沛之患矣求而得之冝優異寵榮以發其光華雍容嵗月以濡其德美而養其望使人人有以見於天下而後進而用之則朝廷尊名器重天下之人信且服矣臣伏覩祖宗所以盛儒館之選萃天下之賢而育之者此道也故巨公名卿莫不由此途出今祕書之官限員太狹不足盡天下英豪之選充國家緩急之求臣竊惜之伏望聖慈依治平故事詔執政各舉可充館職者五人既以收羣材之美且以觀大臣之能方陛下親聖政以光明先業之時臣以謂求材養賢最先務也惟陛下留神采納元祐元年四月上時為右司諫上哲宗乞詔執政舉館職係第二狀王巖叟臣聞荀子曰下臣事君以貨中臣事君以身上臣事君以人故歷古以來明主莫不以求賢為急忠臣莫不以薦士為先臣雖甚愚輒慕此義伏讀先帝御集治平四年十一月十二日戒敕二府薦士手詔所以警厲大臣求賢責實之意曲盡事情亦非創有指揮乃本祖宗故事後因王安石専權任已不欲薦舉出於他人故此舊章廢而不用至今公論以為歎息陛下修復典常追祖宗之美有利國家無所不講獨此先務尚爾缺然臣竊惜之伏望聖慈特依先帝詔書令二府准例各舉所知者三人庶廣陛下汲汲求賢之意少盡臣子區區事君之願元祐元年四月上翌日遂降詔曰朕惟古之君子能長育人材則天下喜樂之矣詩曰既見君子樂且有儀今夫蘭臺延閣皆圖書祕記之所藏而校讎論撰位序多闕永惟祖宗樂育賢俊嘗詔二府薦士置之祕府養其德器以待試用朕甚慕焉執甚重也冝各舉文學政事行誼之臣可大臣吾之所充館閣之選者三人亟以名聞朕將考觀其材器而甄升之上哲宗論館職乞依舊召試劉安世臣伏見祖宗初定天下首闢儒館以育人材纍聖遵業益加崇奬處於英俊之地而厲其名節觀以古今之書而開其聰明廪食太官不任吏責所以成就德器推擇豪傑名卿賢相多出此途得人之盛無愧前古然自近嵗以來寖輕其選或緣世賞或以軍功或酬聚斂之能或徇權貴之薦未嘗較試遂加貼職漸開僥幸之門恐非祖宗之意伏望陛下明詔執政今後館職無俾輕授必求文學行誼有聞於時詳察其才實可長育然後一依近降條制召試而命庶使名器漸重不容幸得循致賢能以備官使元祐三年七月為右正言詔應大臣奏舉館職並依條召試除授其朝廷特除不用此令上哲宗論館職乞依舊召試係第二狀劉安世臣近嘗奏請今後館職欲乞並依元立條制召試而授已奉聖㫖施行然臣伏覩所降指揮尚有未盡輒復論列庶幾小補臣嘗謂祖宗以來新進入館之人鮮有不試而命者惟是搢紳宿望治效顯著或纍持使節或移鎮大藩欲示優恩方令貼職今陛下過聽臣言追復舊制雖云大臣奏舉到館職並依條召試方得除授而繼云其朝廷特除者不在此限則是不問人才之如何資歷之深淺但非奏舉皆可直除名為更張弊原尚在臣愚欲乞特降指揮依倣故事約自轉運使以上資序特除者方得不用此制庶能塞僥幸之門重館閣之選元祐三年七月上上哲宗乞詔大臣首薦名士孫升臣聞太平之基必在得賢大臣之功莫如薦士天下未嘗無材搢紳之士如林而朝廷每以人材乏用為患大臣有志於天下者必以人材為先人主有意於太平者當以養士為急古人謂士不素養而欲求賢譬如不琢玉而求文采也祖宗置三館圖書之府聚四海英俊之材優其祿賜異其資任試以內外要劇之務觀其進退去就之節待其器業之成以為廊廟之用此實致太平之本也世固有知道不茍之士懷難進自重之節知之匪易薦之甚難若僕僕然自鬻於權門惟恐其不售者雖得千百何補於國哉祖宗登用大臣必俾之薦一二名士朝廷內外由是以知大臣之賢否而下及後世推此可考其人知識之淺深冨弼韓琦功在社稷名光後世者薦士之力也陳執中王圭身死名滅為天下戮者蔽賢之罪也蓋不以天下為心専為持祿固位之計自待不厚則以薦士為嫌恭惟陛下臨御之初首詔大臣各薦異材以試館閣可謂急所先務矣此舉寂寥今復已久為國者徒知人材乏用為患不以薦賢養士為急願陛下明詔大臣各依近制首薦名士既觀今日之所舉可考平日之所存則濟濟多士不獨見於周也元祐四年上時為殿中御史上哲宗論差道士校黃本道書范祖禹准中書省録黃祕書監王欽臣等乞差真靖大師陳景元校黃本道書每月支錢伍貫文三省同奉聖㫖令祕書省具道書目録付陳景元據目録於道藏取索先校定成本供祕書省委本省官對校餘依所申者臣竊惟祖宗置三館祕閣以待天下賢材公卿侍從皆由此出不専為聚書設校理校勘之職亦非専為校書也六經之書不可不尊孔氏之道不可不明至於諸子百家神仙道釋蓋以備篇籍廣異聞以示藏書之冨無所不有本非有益於治道嘉祐中增置編校之官繕寫黃本自此書籍益廣充牣四館朽蠧相仍居其中者固未能周覽而編校也今又使道士陳景元校道書臣愚竊所未諭議者必曰漢武帝時劉向校經𫝊諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技今使道士校道書亦其比也臣竊以為不然漢之時以竹簡寫書在天下者至少非祕府不能備非如後以紙𫝊寫流布天下所在皆有也劉向總校羣書非一人之力所能獨了故又用任宏等三人然兵書數術方技皆為有用非異端之學也任宏等亦非異教之人也今館閣羣聚天下賢才冝有詳見洽聞之士博極羣書乃陳景元先取道藏之書校定成本供祕書省委本省官對校皆取正於景元不亦損朝廷之體羞當世之士乎又道書除老子莊列已立於學官其餘多虛誕不經儒者所不道天下名山宫觀自有道藏館閣所藏唯備數可矣不必使方外之士讎校以崇長異學也漢武帝時董仲舒對䇿以為諸不在六藝之科孔子之術者皆絶其道勿使並進武帝感其言遂罷黜百家表章六經今館閣之書下至禆官小說街談巷語道聽塗說之所造者無所不有既使景元校道書則它日僧校釋書醫官校醫書隂陽卜相之人校伎術其餘各委本色皆可用此為例豈祖宗設館閣之意哉夫聖王作事必防其微命出于上不可不謹昔熙寧中王韶開拓熙河王安石使其門僧智緣隨韶誘說木征時人號為安撫大師今館職之外已置校黃本官又於黃本之外有校書道士天下之人必謂之編校大師事雖甚微實損國體其祕書省所請乞更不施行元祐六年閏八月上時為給事中宋名臣奏議卷五十九
