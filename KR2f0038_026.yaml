body:
  text: 宋名臣奏議卷二十六宋趙汝愚編帝系門皇太后上章獻皇后乞還政劉隨臣恭惟皇太后天資聖明手扶宗社爰自先朝不豫萬幾倦勤皇帝養德東朝選賢咨善太后預聞政事參決居多洎皇帝膺龍躍之期年尚沖幼太后承顧託之命心如堅石垂簾以對羣臣盡力以報先帝戎夷率服華夏乂寧終始不渝中外咸仰於國家顯隆平之業於皇帝極慈愛之情天地之功全母子之道備光輝簡冊垂億萬年然天下治矣王業崇矣皇帝長矣太后勤矣而猶祁寒盛暑勞苦聖躬一日萬幾煩於聽斷臣聞虛心以致遐夀澄神以保太和是以神仙夀同天地者不勞心而役神也臣愚欲乞今後軍國常務並逐日專取皇帝處分所貴清神養素延聖母萬夀之期內侍問安成皇帝孝治之德天下幸甚天聖八年上時為侍御史知雜事上慈聖皇后論任人賞罰要在至公名體禮數當抑損司馬光臣恭惟皇帝繼統哀毁成疾未能親政恭請殿下同決庶務臣愚伏計殿下念宗廟社稷之重為四海黎元之計不得已而臨之非中心所欲也若皇帝聖體不日康寧殿下必推而不居若藥石未效則殿下方且總攬萬幾未暇自安故凡舉措動靜不可不戒謹留心焉方今天下之勢危於纍卵小大戰戰憂慮百端若非君臣同心內外協力夙夜勤勞以徇國家之急則禍難之生豈可勝諱哉夫安危之本在於任人治亂之機在於賞罰二者不可不察也若中外百官各得其人賢能者進不肖者退忠直者親讒佞者疏則天下何得不安任職之臣多非其人賢能者退不肖者進忠直者疏讒佞者親則天下何得不危賞不因喜罰不因怒賞必有所勸罰必有所懲則天下何得不治喜則濫賞怒則妄罰賞加於無功罰加於無罪則天下何得不亂然則天下安危治亂不在於他在於人主方寸之地而已矣凡御下之道恩過則驕驕則不可不戢之以威威過則怨怨則不可不施之以恩恩威之道聖人所以制世御俗猶天地之有隂陽損之益之不失中和以生成萬物者也夫恩者欲物之親已也有時而生怨威者欲物之畏已也有時而生慢小人之性恩過則驕驕而裁之則怨矣爵祿賞賜妄加於人則其同類皆曰我與彼才相若也功相敵也彼得之而我獨不得何哉是出一恩而召羣怨也故曰恩有時而生怨也威嚴太盛則人無所容刑罰煩苛則濫及無辜則其同類皆曰是過也人誰無之彼既不免行將及我於是乎窮迫思亂為其上者乃更畏恐而求姑息是始於嚴而終於慢也故曰威有時而生慢也如是則為人上者豈不至難哉蓋善為人上者不然恩必施於有功而罰必加於有罪恩雖至厚而人不敢妬者何也衆人之所與也罰雖至重而人無所怨者何也衆人之所惡也大行皇帝天性至仁羣臣之功或未足言而賞之以厚罪或不可容而罰之至輕善則善矣而小人不識大恩者或幾乎驕慢矣臣竊意殿下今茲繼而為政必將糾之以嚴糾之以嚴誠是也然天下之人涵濡大行皇帝聖澤日久一旦暴加繩檢恐駭而離心伏願殿下徐以義理教之戒之有不聼從而尤無良者然後加刑罰焉則誰敢不肅此善之善者也往者大行皇帝嗣位之初章獻明肅皇太后保護聖躬綱紀四方進賢退姦鎮撫中外於趙氏實有大功但於自奉之禮或崇重太過外親鄙猥之人或忝汚官職左右讒諂之臣或竊弄權柄此所以負謗於天下也今殿下初攝大政四方之人莫不觀聽以占盛德臣以為凡名體禮數所以自奉者皆當深自貶抑伏乞盡依章獻明肅皇太后故事以成謙順之美副四海之望大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者殿下當信用之與共謀天下之事鄙猥如馬季良讒諂如羅崇勳者殿下當踈逺之不可寵以祿位聽采其言也臣聞婦人內夫家而外父母家况后妃與國同體休戚如一若趙氏安則百姓皆安况於曹氏必世世長享富貴明矣趙氏不安則百姓塗地曹氏雖欲獨安其可得乎是故政者正也為政之道莫若至公臣願殿下熟察羣臣之中有賢才則舉之有功則賞之雖賤如厮役憎如仇讐逺在千里之外皆不可棄遺如此則人誰不勸矣羣臣之中職事不修則廢之有罪則刑之雖貴為公卿親為兄弟近在耳目之前皆不可寬假如此則人誰不懼矣夫為善者勸為惡者懼百官稱職萬民樂業天下之安猶倚太山而坐平原也尚何憂哉然後俟皇帝聖體平寧授以治安之業自居長樂之宫坐享天下之飬則殿下聖善之德冠絶前古光映後來雖周之文母漢之明德不足比也臣備國家侍從之臣以諫諍為職不勝區區之誠妄冒以聞伏惟殿下置之几席少加聽察臣光昧死再拜上疏嘉祐八年四月十三日上上慈聖皇后乞少避東殿吕誨臣恭以殿下保佑聖子積三十年輔翊邦政又逾期月寰區泰定廟社安固慈恩至矣功德大矣然而成全聖德是惟艱哉以萬幾浩繁殿下勞心焦思曽未少休非所以燕怡福夀之本也况皇帝躬親治事勤勵如此在於聖慮可以慰安臣愚以謂東殿簾幃宜五七日一御咨詢大臣無俾曠事庶少均暇逸於翊政之道亦無所損當在沈幾奮于獨斷豫宣教命誕告明庭外形謙遜之宜中遂優游之樂上順天道下厭羣情享是全美豈不休哉仰祈聰悟天下幸甚治平元年三月上時為同知諌院上慈聖皇后乞罷簾前奏事龔鼎臣臣伏以先帝以萬世根本之計擇主上立為子實殿下相之自宫車晏駕殿下銜哀隱苦定䇿於須臾立主上為天子主上纒憂遇疾大臣無所取決請殿下共聽庶政從容輔養數月自中都至於夷夏奠枕如昔者皆所賜也今主上聖躬既豫車駕兩立宜於此時詔罷兩府簾前奏事以終始天地之功則太姒太任之事何足道哉治平元年四月上時為御史知雜事上慈聖皇后乞罷簾前奏事傅堯俞臣聞之於傳曰未信而諌則以為謗已臣今進說於殿下者其幾是與然臣備位外廷才微身賤俟見信而後言蓋無期矣此臣所以犯賢哲之誡冒謗讟之嫌惓惓而不能自已者也惟殿下留神裁察臣於正月十九日嘗奏疏乞還政事訖未䝉施行臣之所言固朝廷之大議殿下之深益夫何未之思也今物議喧然疑有讒間交進故兩宫之情似有所未甚通者夫以天下與人猶或疑之則何以信於人哉審如是臣竊以為過矣且一飯之恩匹夫未之敢忘况皇帝以明睿之資貫通古今而受人天下者乎臣謂殿下今日黜逺讒間使不得前則慈孝之聲明日並隆於天下矣至於忠讒之辨古今以為難臣獨謂之不然何則從容和解掩所不及欲殿下母子安康者忠言也揭一為十似是而非使殿下心志熒惑者讒言也此豈可謂之難辨者哉臣前疏謂殿下積行纍功於數十年間一旦定䇿援長君以安宗廟乃復猶豫不斷將損盛德者非茍云也顧察之未熟爾今天象差忒旱虐為變臣恐元元艱食盜賊浸起四方寧謐或不可常朝廷能中外一心思消弭之術為制御之策則庶幾其憂不大惟人事動于下則天譴形于上殿下當斷之于心復辟于皇帝則朝廷之事體正事體正則天下之疑憂解疑憂解則和氣應和氣應則緯象之忒旱虐之變可消而制馭之䇿可為殿下退就安榮挹萬世無窮之福不知念此而玩信諛詞忘忽至計懷萬萬必無可慮之疑豈不纍睿哲先見之明乎今皇帝康復已久仁宗祥練踰四十日億兆延頸以聽明詔事若早定可髙視於今古議不時決且貽誚於當世殿下顧利害何如哉况事不出于遺制非殿下之本意竊為殿下惜之臣恐縉紳之士章疏交上言涉譏詆而後圗之美名大業虧缺已多實不如先事之善也殿下勿謂臣言輕所陳者肺腑之素藴勿謂臣職卑所持者人臣之公論惟殿下取臣兩章極精而慮之則臣之言不為謗讟而可以取信矣此疏不敢露于人謹於外題狀奏以聞治平元年五月十日上時為殿中侍御史戊申皇太后乃出手書付中書還政是日遂不復處分軍國事上慈聖皇后乞歸符寶吕誨臣伏覩殿下近降手書以皇帝既安堅罷同政聖子恭孝遂成母志雖前世有還明辟之事亦未聞期月而成翊輔之功乃形謙遜之㫖休聲茂實當垂光於萬世矣然聞外議以符寶未歸於上前臣有以知非殿下之意焉何則國政猶不欲其久而復眷留符寶哉萬一所司行遣之間稍有稽緩涉此議論甚非有益於聖躬亦恐前降書㫖或未孚於中外則有纍全德始終之際不可不謹爾臣所以瀝懇而言萬死無避唯祈鑒照天下幸甚治平元年五月上時同知諫院上宣仁皇后論文德殿受冊范純仁臣近聞將來大皇太后冊禮並依明肅太后故事於文德殿受冊緣明肅太后當時禮官議定合於崇政殿受冊仁宗皇帝特降詔書移於前殿蓋是人主尊奉母儀出於一時之詔非有司所定常行之禮今恐三省取㫖之際不曽詳悉奏聞遂降敕命直依明肅故事更不用皇帝降詔便御文德殿受冊不惟不顯皇帝尊奉之意兼不稱太皇太后謙沖之德緣自太皇太后同政以來至仁盛德髙掩前古所行典禮為萬世尊仰不必專稽明肅伏望特自太皇太后聖㫖指揮更令禮官子細詳定務合中制以副聖意貼黃易謙卦天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙一謙而四益隨之又曰謙尊而光尚書曰滿招損謙受益此皆經典之法言在聖明正所當務臣不勝區區犬馬之誠乞賜采録元祐三年二月十八日三省同奉聖㫖將來太皇太后受冊依章獻明肅之事皇太后受冊依熙寧二年故事皇太妃與皇太后同日受冊皇帝於殿上發冊令尚書禮部太常寺詳定儀注聞奏純仁上此奏時同知樞密院上宣仁皇后論文德殿受冊陸佃臣伏惟太皇太后陛下自同聽斷以來保護聖躬裁決萬事敬天愛人動懷謙畏至公至明度越前古尚慮臣下未能將明聖意一切檢用章獻明肅皇后故事弗加討論萬一典禮闕失或纍盛德故臣雖愚陋輒慕古人事上篤於愛敬之意竊見天聖中翰林學士李維等嘗上章獻明肅皇后御崇政殿受冊儀注復改御文德殿緣文德在紫宸垂拱之外故至今公議猶以維等所定儀注得禮之中惜其不果施行方當太皇太后陛下至誠虛心每事求當乘此嘉㑹或䝉收採特詔有司改御崇政殿受冊明內外之辨自我神母垂訓萬世不勝大幸况於盛德至仁有光無損臣職在禮官茍有所懷義當罄竭仰瀆聖慈臣無任惶懼隕越之至元祐二年二月上時為禮部侍郎上宣仁皇后論文德殿受冊曽肇臣伏聞已降敕命將來太皇太后受冊依章獻明肅皇后故事臣伏考故事皇帝於大安殿發冊今大慶殿皇太后於文德殿受冊今來詔㫖遵用舊典臣子之誼復何所言然臣伏見太皇太后自聽政以來止於延和殿垂簾視事受契丹人使朝見亦止御崇政殿未嘗出就外朝豈非以聽決萬幾出於權宜垂簾視事蓋非得已而外朝者天子之正寧太皇太后崇執謙德不欲臨御以為天下後世法耶推此言之受冊外朝殆非太皇太后之意特以故事當然爾竊詳故事天聖二年兩制定皇太后受冊於崇政殿仁宗出自聖意特詔有司改文德殿此蓋人主一時之制非臣下之所得議也今皇帝述仁宗故事以極崇奉之禮孝敬之誠可謂至矣臣竊謂太皇太后儻於此時特下明詔發揚皇帝孝敬之誠而固執謙德屈從天聖二年兩制之議止於崇政殿受冊則皇帝之孝愈顯太皇太后之德愈尊天地神靈孰不歡喜華夏蠻貊孰不推仰兩誼俱得顧不美歟伏惟太皇太后聰明睿聖慈仁恭儉功德之被天下堯舜禹湯不能逺過非獨秦漢以來母后之所不及則雖日御外朝未足為過而臣乃於一受冊之際猶以為言者誠見太皇太后執心謙沖至公至正動容周旋必務中禮非如漢唐母后私於其身必不以受冊外朝為巳之欲臣愚故願因此增廣盛德使天下曉然知聖心所在垂之萬世以為典則而後之言禮者必曰母后不踐外朝自太皇太后始豈非希世之髙行哉臣伏見昨者太皇太后志在愛人毅然獨斷令即英宗神御殿後建祖宗神御殿詔㫖深切聞者感動至於垂涕此自古明智之君未必能為而太皇太后行之無毫髮吝則知今日退就便殿受冊必非所難此臣所以敢言而不疑也夫一日出踐外朝事至微也然臣竊有私憂過計者不得不極言之章獻太后非獨受冊文德殿而已元日御㑹慶殿受朝賀南郊禮成御㑹慶殿受賀長寧節御㑹慶殿百官上夀其後又入太廟行恭謝之禮此皆天聖明道故事竊恐有司以次行之不足以仰稱太皇太后為宗廟社稷權宜聽政之心克已復禮謙恭抑損之盛德臣之私憂過計實在於此也太皇太后博覽古今詩書以來母后得失蓋無不知則於此舉必能自擇豈待臣言而後思然臣待罪侍從以論思為職茍有所見不敢默默元祐二年二月上時為中書舍人三月二日內批付三省將來太皇太后受冊有司雖檢用章獻明肅皇后故事當御文德殿顧豫涼薄豈敢上比章獻明肅皇后所有將來受冊可只就崇政殿宜令三省叙太皇太后此意降詔施行蘇軾撰詔曰祥禫既終典冊告具而有司用章獻明肅皇后故事豫當受冊于文德殿雖皇帝孝愛之意務極尊崇而朝廷損益之文各從宜稱矧豫涼薄常慕謙沖豈敢躬御治朝自同先后處之無過之地乃是愛君之深所有將來受冊可只就崇政殿五日內降札子所進詔本從常慕字以下二十六字㫖意稍涉今是不免却有昔非之義可叙述太皇太后顧德不及章獻不敢必依章獻御文德殿故事宜三省改此意度進入六日中書改定詔本祥禫既終典冊告具而有司遵用章獻明肅皇后故事豫當受冊于文德殿雖皇帝孝養之德務極尊崇而朝廷損益之文各從宜稱仰惟章獻明肅皇后輔佐真廟擁佑仁皇茂業豐功宜見隆異顧豫涼薄絶企徽音稽用舊儀實有慚德所有將來受冊可只就崇政殿七日降出行下上宣仁皇后論坤成節百官上夀曽肇元祐二年元日尚書省送到禮部狀勘㑹將來太皇太后坤成節宰臣以下合行上夀之禮今來本司參詳准近降詔書太皇太后御崇政殿行受冊之禮所有坤成節亦合於崇政殿上夀其臣寮上夀升殿賜酒并文武百官拜表班次並乞比附天聖三年故事施行六月十八日三省樞密院同奉聖㫖將來坤成節依天聖三年長寧節故事於崇政殿上夀仍令文武百官諸軍將校隨班行上夀禮臣伏見太皇太后陛下昨者深自抑損特發德音不欲臨御外朝退就崇政殿受冊詔書一下中外嗟歎忠義之士至於感泣况臣待罪侍從嘗獻瞽言不謂偶合聖心特加收採非惟陛下克已復禮之聖又以知陛下虛心納諫之明士生此時不能竭忠盡智裨補萬一茍有所見懷而不言則竊位欺天何所逃責此臣所以不避冒黷之誅傾寫肝膽置于上前儻一言有補萬死無悔臣竊聞近日有司建議坤成節於崇政殿上夀其升殿賜酒并文武百官拜表班次並比附天聖三年故事施行臣伏考天聖三年故事宰臣樞密三司使學士知制誥待制節度使留後觀察使契丹使班于殿廷上夀如禮賜酒三行百官詣內東門拜表稱賀至天聖九年始御㑹慶殿百官上夀如乾元節之儀蓋自天聖三年至八年以前凡六年盡如三年之制亦足以見當時君臣守禮畏義之心可謂至矣今者三省樞密院乃不全用天聖三年故事及今日有司之議特降朝㫖令文武百官諸軍將校隨班行上夀禮此臣之所未諭也太皇太后昨降詔書以謂不敢自同章獻太后出臨外朝故就崇政殿受冊竊詳聖意務從抑損今乃令百官將校皆赴崇政殿廷立班上夀則是天聖八年以前之所未有禮更增於舊在陛下謙恭抑損之志前後本末似不相稱臣愚以謂此殆非太皇太后之意特執政大臣失於不思爾伏惟太皇太后陛下躬前世母后不可及之盛德有休息百姓覆育萬物之大功受四海九州歡心愛戴之備養其為尊榮亦巳極矣豈待百官將校旅列於庭然後為貴哉臣愚故願特詔有司一用天聖三年長寧節故事比附施行使天下之人知陛下謙恭抑損之志前後如一本末相稱書之史冊垂法萬世豈不美哉書曰不矜細行終纍大德為山九仞功虧一簣惟陛下留意無忽貼黃臣竊見崇政殿廷不至寬廣遇雨又須經繇延和殿前簷赴坐竊聞議者謂百官不赴則夏國使人亦不得與上夀賜酒臣愚以謂天聖中非無夏國使人自可遵用故事若以其外夷逺來奉貢特許入與上夀賜酒出自恩㫖宜亦可為更自聖意裁酌禮部符准太皇太后已降指揮長寧節故事內文武百官諸軍將校隨班行上夀禮緣係天聖九年章獻明肅皇后御㑹慶殿典故今來豈敢比用所以將來坤成節崇政殿上夀可只依天聖八年以前章獻明肅皇后御崇政殿行上夀禮典故施行七月十日三省同奉聖旨依今來所得指揮施行肇時為中書舍人上宣仁皇后乞還政梁燾臣恭以皇帝陛下富於春秋早有天下仁聖孝愛之實藹聞于外性資成定盛德日新太皇太后陛下擁護聖躬夙夜不倦保佑之功永福宗社臣民歡欣四海仰戴今來選正中宫已得賢淑冬至大禮自當郊見天地天意人事上下協應惟是政機之煩久勞同聽歸斷人主不可過時此陛下今日甚盛之舉也退託深宫頥神內景逺光前人垂法萬世豈不美歟願早賜處分以彰全聖如以臣言為然伏望明出手詔付大臣施行天下幸甚貼黃此事在陛下必久已思慮固不在臣下之有言臣輒控至誠上干宸聽以廣聰明之益以決左右之惑唯願早出睿旨直以還政為指揮不須更問故事如臣下别有獻議伏望斷然勿聽如有合用手詔文字望降密㫖遣使到院諭臣即當進入元祐七年上時為翰林學士上宣仁皇后乞還政係第二狀梁燾臣昨在翰苑日嘗密具劄子披露肝膽冒聞聖聰陛下聖明洞察不賜疏斥嘉其忠藎用之輔政臣仰體眷遇益堅臣節重以身䝉寵榮而未行其言是以夙夜不遑寧處期必補報不敢少懷不盡之意致陛下有後時之悔陛下每有宣諭必以不喜管事為言常欲安靜此聖意之本也臣未嘗一日不思竊惟淵宸逺慮深識用臣前言適其時矣伏望檢㑹前奏早賜詔音歸斷人主以全大功臣不勝激切盡言之至元祐七年七月上時為尚書右丞上欽宗論宣仁誣謗未明瑶華位號未復楊時臣聞天下之本在國國之本在家竊惟宣仁聖烈皇后誣謗鬱而未明瑶華無辜纍經赦宥位號未復此二者陛下家事也寃抑不申如天下何臣幸得備位諫省膠口不言無以逭責謹列事之本末條具于左臣昔見元豐末年伏見神宗皇帝不豫哲宗幼沖宣仁聖烈皇后有㫖令歧王嘉王非宣召不得入內其周防之慮深矣是時王圭首建大議請立延安郡王為皇太子餘人無言者退批聖語在中書仍關實録院衆官簽書本末詳具天地鬼神臨之在上質之在傍不可誣也至元祐中蔡確以罪去其黨始造為姦言以惑衆聽冀徼異日之福紹聖中章子厚蔡卞用事欲中傷舊臣報復私怨遂實其說上誣聖母而以大逆之名加王圭以定䇿之功歸蔡確謂已亦與有力焉其為此謀非私於蔡確也其實自為因以中傷元祐之人耳天下銜寃積憤而不得發幾四十年伏遇陛下嗣守神器如大明之升無幽不燭而臣幸得備位諫省不得不為陛下言之也凡元祐政事著在甲令者皆以焚毁滅迹則當時所批聖語必無遺矣然紹聖中所修時政記具在祕書省國史案猶可考也此天實存之以遺陛下伏乞下祕書省取索元祐時政記一賜覽觀足以究見事實而後昭洗王圭為臣不忠之名追奪蔡確冒受褒贈之典濫恩所被悉行追改以釋天下積年憤鬱之氣臣不勝幸願之至臣竊惟元祐皇后廢處瑶華皆緣內侍郝隨造成此禍中外寃之以為非辜無所赴訴上皇即位之初欽聖憲肅皇后垂簾聽政自瑶華召還禁中復其位號天下無不稱慶未幾欽聖上賓姦臣造為浮議旋即廢黜使其實有罪惡必不為欽聖所容議者或謂叔無立嫂之文尤為非理方欽聖垂簾始復婦位於嫂叔何與焉臣願陛下斷自宸衷復其位號上以承欽聖矜恤無辜之意下以副中外輿議之公不勝幸甚靖康元年上時為諫議大夫宋名臣奏議卷二十六
