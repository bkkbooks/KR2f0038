body:
  text: 宋名臣奏議巻一百十六宋趙汝愚編財賦門新法八上神宗論助役楊繪臣竊以堯舜之為君禹皐陶之為臣可謂至治矣然考之於書皐陶之所以矢謨於舜而禹亦稱為帝其難之者在知人在安民二者而巳安民則惠豈非治道之先哉又况乎畿甸之民也臣竊見近日有東明等縣百姓約千百人詣開封府告訴為超陞等第出助役錢事本府不肯接狀却稱不曽受得朝㫖及司農寺闗報百姓既無所訴遂突入相府宰臣王安石諭云此事相府元不知待與指揮不令超陞等第仍問汝等來時知縣知否並言不知至十五日聚來御史臺前臣為本臺無例收接訴狀尋諭令散去退而訪聞得司農寺超陞等第因依乃是不依逐縣元定戸活等第却從司農寺將見管户口品量等第均定助役錢數抛降與逐名令管認戸力次第陞降重別造成牋簿依條限曉示人户知委須管於農務前了當臣今舉一縣以言之只如酸棗縣鄉村第一等元申一百三十户今司農寺抛降却要二百四户即是陞起七十四戸第二等元申二百六十户今司農寺却抛降三百六户乃是陞起四十六户第三等元申三百三十九户今司農寺却抛降四百五十九戸乃是陞起一百二十戸臣竊謂凡等第陞降葢視人戸家活髙下須憑本縣本縣須憑戸長里正戸長里正須憑隣里自下而上乃得其實今來却自司農寺預先畫下數目令本縣依數定簿豈得民心甘服哉譬如所以為帶者為腰也所以為履者為足也帶之長短須隨腰之豐瘦履之濶狹須準足之小大今若帶長而有餘則增腰以滿之履狹而不足則削足以就之可乎超陞等第以就多出錢何以異此况京畿者天下之根本不可不掛聖慮據此次第人户紛擾詞訴卒急未了雖欲委府界提㸃脅以止之竊恐川壅而潰其傷必多可不念哉自來措置民事何嘗不自州及縣豈有文字下縣州府不知之理竊詳司農寺不闗報開封府之意顯是自知所行之事於理未安指望諸縣畏威不敢異議若闗京尹或致争執則事體稍重有礙施行所以公然不顧直行下縣兼今來巳是農務之月如何農務前定要了當欲隨夏稅起催乎臣又訪聞得中書見差孫迪張景温下諸縣體量仍令諸縣將不願出錢人户别作一項開坐臣竊恐待將不願出錢人戸困以重役以此威脅誰敢不從臣願陛下沉思熟慮畿内之民從來驕養有同赤子今來巳被團保之法行之猝暴惶駭未巳若又不住陵虐所憂不細書云民惟邦本本固邦寧民可近不可下詩云商邑翼翼四方是則春秋内中國而外諸夏可不務安之乎今判司農寺乃鄧綰曽布一為知雜一為都檢正非臣言之誰敢為陛下言之者熈寧四年六月上時為御史中丞上神宗論助役劉摯臣聞孟子曰徒善不足以為政言人君雖有仁心仁聞茍不因先王之道為良法度以行之則亦不免於民不得被其澤恭惟陛下至誠好治憂念元元謂天下役法久失其平故慨然有意其大均之也然有司建議立法頗無以上副詔㫖而下協人情者臣請言之其法曰率錢助役官自雇人臣謂其事不可勝言而略陳其十害天下戸籍均為五等十七路三百餘州軍千二百餘縣凡户之虛實役之重輕𩔖皆不同今斂錢用等以為率則所謂不同者非一法之所能齊若隨其田業腴療因其所宜一州一縣一鄉一家各自立法則紛錯數殊何所總統非所謂畫一者其害一也新法患等籍之不得其實故令品量物力别立等第以定錢數然舊籍既不可信則令之品量何以得其無失不獨騷擾生弊亦使富者或輸少貧者或輸多其害二也上戸常少中下之戸常多上戸之役數而重故或以今之助錢為幸下戸之役簡而輕故皆以今之助錢為不幸優富苦貧非法之意其害三也新法所以令品量立等不取舊簿者意欲多得雇錢而患上戸之寡故臨時登降陞補髙等以充足配錢之數疲匱之人何以堪命近日府界其事巳驗其害四也嵗有豐㐫而役人有定數助不可闕則是助錢非若稅賦有倚閣減放之期其害五也夏秋二稅農人唯有絲絹麥粟之𩔖而助法皆用見錢故須隨時貨易逼於期㑹價必大賤借使許令以物代錢亦復有退揀壅滯及夤縁乞索之患其害六也兩稅及科買貸責色目已多使常無㐫災猶病不能了公私之費又起庸錢竭其所有恐斯人無悅而願為農者天下戸口日當耗欠小則去為商賈為客戸為惰游或父母兄弟不相保或抵冒法禁析而入下戸大則聚而為盗賊其害七也徼幸之人又能夤縁法意虚收大計如近日兩浙科起一倍錢數欲自以為功而使國家受聚斂之謗其害八也夫既為之民而服役於公家廼所謂治於人者事人天下之通義也况鄉縣定差循環相代上等大役至速者猶須十餘年而一及之至於下役則動須一二十年乃復一差今使概出緡錢官自召雇雇之之直不重則不足以募不輕則不足以給輕之則法或不行重之則民不堪命其害九也夫役人必用鄉戸葢其有常産則必知於自重性愚實則罕至於欺公舊法雖有替名鄉人自任其責今既雇募恐止得輕猾浮浪姦偽之人則所謂帑庾場務綱運凡所以主財者不惟不盡心於幹守亦恐縣官之物不勝其盗用而抵冒法令罪獄日報至於弓手耆壯承符散從手力胥吏之𩔖職在捕察盗賊發行文書追督公事者則恐遇冦有畏逸之患因事有騷擾之姦而舞文鬻獄無有虛日其害十也夫民可安而不可動財可通而不可竭以臣之淺聞寡見而所列如此其沸於民口有大于此而臣未敢有言者其又何窮然臣嘗為陛下博訪而深計之蓋天下差役莫重於衙前今司農新法一項云鄉戸衙前更不抽差其長名人等並聴依舊將天下官自出賣到酒稅坊場并州縣坊市人戸助役錢數以酬其重難臣謂此法有若可行然坊市十等戸自來已是應官中配買之物及饑饉盗賊河防城壘緩急科率郡縣賴之今亦難為使之均出助錢外舊來官中將場務給與衙前折役過分數然多是估價不盡虧却官中實數今既官自拘收用私價召賣則所入固多又應係衙前當役去處事件官為裁省使無舊日縻費而支酬之際稍優其數則人情必當樂為可寛鄉戸重役而似無害民之事臣乞陛下將此一路法詔有司講求其詳若逐路坊場錢數可以了得本路召雇衙前酬奬則乞詳具條目行而觀之以三二年間見其利則其他役法更革無難矣所有助錢之法伏望早賜睿斷一切寢議以幸天下夫更令創制可以漸而不可以暴况欲内自畿甸外至海隅一概率錢可謂重斂又欲廹急而成之使生靈何以自全陛下安得不謹重其事哉熈寧四年六月上時為監察御史裏行上神宗分析曽布劄子劉摯臣近曽上言論助役之法其害有十今奉聖㫖批送下司農寺曽布劄子條件詰難奉聖㫖令臣分析者竊以助役之法大臣主之於中書有中書之屬官及御史知雜者講畫於司農寺有大臣所選擇監司提舉官行之於諸路上下布置其勢若此可謂易行矣然曠日彌年未有定論可以為法者其故何也不順乎民心而巳矣民之所不欲古今未有可以勢力彊而成者也故雖命使者奔馳道路稟之於内而劫之於外然其擬議參差條制殊異紛然自不知其可行之計則此法利害明若觀天矣臣有言責者也是故前日采中外士民之說敷告於陛下令司農寺之辯說既如此陛下以臣言為是耶則事盡於前奏其可以覆視陛下以臣言為非耶則貶黜之而已雖復使臣言之亦不過所謂十害者是以不復條陳不唯費辭文過煩紊天聴而風憲之官豈與有司較是非勝負交口相直如市人之紛競者則無乃辱陛下耳目之任哉謂臣等險詖欺誕則上有陛下之聰察而下有中外之公議所謂中有向背則臣所向者公所背者私所向者義所背者利所向者君父所背者權臣今辨助法之利害而無故立向背之論以朋黨之意教誘天下此可駭也所謂曾無畏忌則陛下之法臣所畏也陛下容受忠直臣為御史實不敢隠情自為忌諱今司農欲使臣畏忌權臣則誠臣之所不能者也伏望陛下將臣前後所論助役章奏與司農之言宣示二府大臣中外百官以考是非若臣言有所取則乞速罷助役以安天下之心若稍有欺罔則乞重行竄逐以謝專權之人而戒妄言者熈寧四年七月上時為監察御史裏行上神宗分析曽布劄子係第二狀劉摯臣昨日准聖㫖批下司農寺曽布劄子為詰臣所言助役事尋巳具分析奏聞去訖臣竊以耳目之於人也事物過者必見必聞以赴其心而心必受之未有不信其耳目而反以其能視聴為疑者先王以言置官代天子耳目内外相信無以異於一體之相為用也其言雖直必容雖多必受則國家安治不然則反此故謗木諫鼓不設危亂之國鼎鑊斧鑕不在聖明之朝恭以陛下躬上聖之德好問樂善凡延見臣下雖賤官小吏必温恭和容以誘達之此堯舜之盛也然至於臣等以職事為言則使之分析者中外皆知非陛下意乃司農挾寵以䕶改作大臣設法以蔽聰明爾因事獻忠敢一言之今天下之勢陛下以謂安耶未安耶治耶未治耶茍以為未安未治也則以陛下之睿智言動起居躬蹈德禮夙夜勵精以親庶政而天下未至於安治者將誰致之耶陛下即位注意責成倚以望太平而自以太平為巳任得君專政安石是也三二年間開闔動揺舉天地之内無一民一物得安其所者蓋自青苗之議起而天下始有聚斂之疑青苗之議未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未乂而漳河之役作漳河之害未平而助役之事興其間又求水利也則民勞而無功又淤田也則費大而不效又省併州縣也則諸路莫不彊民而應令又起東西府也則大困財力禁門之側斧斤不絶者將一年而未已其議財也則商賈市井屠販之人皆召而登政事堂其征利也則下至於厯日而官自鬻之推此而往不可究言古之賢人事君行道必馴致之有漸持久而後成至於設施皆有次序今數十百事交舉並作欲以嵗月變化天下使者旁午牽合於州縣小人挾附佐佑於中外至於輕用名器混淆賢否忠厚老成者擯之為無能俠少儇辯者取之為可用守道憂國者謂之流俗敗常鑿民者謂之通變能附已者不次而進之曰吾方擢才不可招者為名而斥之曰吾方行法凡政府謀議所以措置經畫除用進退獨與一屬掾曽布者論定然後落筆同列預聞乃在布後故奔走乞丐者布門如市雖然猶有繫國家之體而大於此者祖宗累朝之舊臣則䥴刻鄙棄去者殆盡國家百年之成法則剗除廢亂存者無幾陛下豈不怪天下所謂賢士大夫比嵗相引而去者凡幾人矣陛下亦嘗察此乎踈舊臣則勢位無有軋巳者而權可保也去異已者則曰凡要路皆可以用門下之人也去舊法則曰今所以制馭天下者是巳之所為而陛下必將久任以聴其伸縮也嗟夫此事之實也其名則曰革弊而興治是以陛下樂聞其名而難察其實也夫賞罰號令乃陛下所以砥礪天下而鼔動四方以為勸信者今有人焉能舞公事以傾勲舊造大獄以逐官吏其事是耶乃其職爾何至超任以為職司耶趙濟是也又有人焉以渭源田欺罔始既以此得罪而終復以此増秩王韶是也程昉事漳水以興大役困一方而無成功趙子幾挾情以違法禁案吏以防民言則皆置而不問乃是賞反施於聖人之所當罰罰不及於王法之所當誅也畿邑之民以助錢為訴也陛下聖㫖令召情願東明知縣以不能禁民有訴而被劾也陛下聖㫖正令劾擅陞户等之事二者皆獨斷之善政而中書皆格而不下此則陛下之令不行也西師無功而曰非朝廷本謀天下但見給軍之費輦出於京師空名之誥馳下於西路又命一知制誥於將幕使專代天子之言報復號令絡繹於道茍以為非耶何不止之迨其事敗則曰非政府謀也損費緡錢以千萬計秦晉之人肝腦塗地失軍旅之心結邉疆之釁而不自請咎乃致陛下發中詔以責躬抑徽號而不受忠義之士誰不痛心而疾首至如助役之法臣嘗言之矣其條制纎悉臣雖未能究見然臣大意終以謂使天下百姓賦稅貸責公私息利之外無故作法陞進戸等使之槩出緡錢皆非為人父母愛養基本之所宜為者故臣謂之聚斂非妄言也陛下任遇輔臣如此其重而致主之術乃是此道是大臣之誤陛下而大臣所用者誤大臣也今既顛謬乖錯敗亂綱紀知天下之不容懼宸𠂻之回悟以謂雖中外之士畏避無敢言者然其尚敢言者獨御史有職爾故又使司農熒惑天聽作為偏辭令臣等分析以摧沮風憲之體艱梗言路欲其憂憚茍容而緘黙或欲撩其危言從而擠逐不知忠臣節士雖戮辱不懼所以盡事君之義耳今羌夷之疑未入反側之兵未安三邊瘡痍疲潰未瘳河北大旱諸路大水民困財力縣官匱竭聖君恭勤思治萬方之所知而在輔弼者方欲蔽天聰明使下情不得而上達其何心耶臣願陛下思祖宗基業之艱難念天下生靈之危苦少回幾慮收還威柄深恐異時專權肆志將有陛下不能堪者則必至於虧失君臣之恩是今日養之適所以害之也若夫馮京王珪同列預政皆依違自固不扶顛持危雖心悟其非而無所捄正已之進退又媕婀而不决皆非所謂輔臣之體臣四海之内孤立獨進陛下過聽任以風憲嘗竊思之近嵗臺諫官疊以言事罷免豈其言皆無補於事歟豈皆願為訐激險直之語以自為名而㓗去歟嘗以謂欲言政府之事者其譬如治湍暴之水可以循理而漸導之不可以隄防激鬭而發其怒不唯難為功亦為患滋大故臣自就職以來竊慕君子之中道欲其言直而不違於理辭順而不屈其志庶幾愚𠂻少悟天聽而亦不敢悻然如淺丈夫以一言一事輕决去就致聖朝數數逐去言事者而無所裨補思以上全國體而下亦庶幾能久其職業而成功名兩月之間纔十餘疏其言及助法者止三疏耳當天下多事之時而臣言簡緩又不足以感悟則其負陛下已多矣不意大臣之怒已至如此令臣等分析之事前代無之祖宗無之近年已來乃為此法以摧言者之氣方陛下孜孜聽治喜於納諫而大臣所為則不得正目而視此所以發臣之狂而不能黙也伏願陛下深察事物之變用安靖之臣以休生民有所措置以大小緩急為先後之序以義利經權為本末之辨自兹凡有獻替於陛下者乞有以誘掖奬勵之罷分析之命以尊嚴朝廷而養多士敢言之氣臣不勝惓惓憤懣愛君待罪之心熈寧四年七月上先是曾布疏駁楊繪及摯等所言差役不便事王安石欲劄與繪摯令分析繪具錄前四奏以自辨摯上此兩奏張琥以為繪罪輕於摯摯言尤無狀安石曰摯狂妄愚而易見繪狡詐難知古所謂壬人雖堯舜所當畏陛下不可不察於是繪摯皆罷繪以翰林侍讀學士知鄭州摯監衡州鹽倉上神宗乞崇用忠實仁厚之吏王存臣准御史臺告報當臣轉對者臣聞為治不在多言顧力行何如此至論也陛下自即位以來克巳一心憂勤庶政未嘗事燕游之好擢任材能修明法度有黽勉不倦之心内經貨財外明威武有長轡逺馭之略觀前世求治之主規模宏廓而勵精如此者不見一二謂宜天下震動鼓舞以趨太平然為之累年而人情未安衆論不一其故何耶豈非所以為法有未諭於民心而所任行法者有不厭於物論耶陛下亦盍反求所以然矣蓋治貴適宜不必舎近而慕逺事蘄當理不必尊古而狹今祖宗法制行逾百年固有陵夷偏弊而不舉者陛下作而振起之是當爾也先王善政有可施於今者祖宗未遑及焉陛下舉而推行之是亦當爾也然議者遂以為本朝之法卑狹潰壊必盡更其故然後為治臣恐好議論者過也古人有言徒善不足以為政徒法不能以自行此言雖有善法必得人而行之竊見比年擢用之人才惠有餘而忠實不足行法之吏刻暴相勝而仁厚無聞羣情惑而横議興未必不由於此然則所謂行法適足以壊法也臣恐澆薄相扇寖以成風今卿大夫聚於朝論刑而不及德士庶人交於下言利而不及義夫朝廷進人之賢否風俗繫之風俗之厚薄盛衰隨之仰惟陛下恢堯舜舎已從人之美體仲尼察言觀行之明深抑巧佞險薄之風崇用忠實仁厚之吏使大宋之風俗淳厚於三代陛下之德化比隆於二帝豈不盛哉臣愚不識忌諱伏惟陛下幸赦而省察之臣不勝拳拳熈寧四年上時為館閣校勘上神宗論王安石王巖叟臣聞事之急者無徐行心之痛者無緩聲今天下事急而臣已痛矣尚忍徐行緩聲以忽君親之憂哉臣為此書唯恐人知臣不盗名今日之事唯恐君父不知臣不避禍使陛下自無心於生靈臣雖抱忠姑亦巳矣葢潛聽天下深識之士相與而言曰夫畋遊之快心聲色之悅意浮華之玩情喜有溢賞怒有過刑雖古之歴嘗艱難而老於為國者之所難免而吾君以鼎盛之春秋臨無事之天下乃能不快心於畋遊不悅意於聲色不玩情於浮華賞不以喜刑不以怒憂勤恭儉唯以治道未舉於堯舜三代之隆為急此可謂盛德矣然而有人焉有逆常理蠱壊萬事以蠹陛下盛德而使四海内外不得覩日新之光輝而同登於堯舜三代之域此忠臣義士之所以拊膺而切齒也臣謹按王安石性非忠良心不造道徒能著空文而欺世談髙致以要君可謂借鳳羽翰以文梟音者矣人以為鳳臣以為梟天下皆知陛下所存則是求治之心而安石所為乃召亂之本陛下以腹心委安石而安石不以腹心事陛下自求死黨據滿要津司農曰布彊悍而險刻中丞曰綰善柔而隂讒曰向剥下附上曰起很深曰絳苛佞曰繹曰琥險回忮忌曰定曰秩藏姦包慝曰埛曰確狂誕輕狡曰子厚曰將阿諛辯巧曰宦官昉暴横㐫忍荼毒一方威焰所向人莫敢指曰唯惠卿姦邪之才又冠其黨雖持喪家居而中外畏之猶若在朝其下蜮狐山鬼夜號窟居以恐動人者處處皆是不足一一為陛下道也蓋未嘗公心求一吉士以為朝廷故天下謂其不以腹心事陛下者非妄也陛下知以權與之而不知與之之過知以誠信之而不知信之之蔽與之過故難制信之蔽故易欺三四年來天下不知有朝廷而只知有安石福隨其喜禍逐其怒四方之人如瘖如啞不敢吐氣以至青天白日舞姦攘權以斵王室而曽不畏人此臣所以不能徐行緩聲而告也臣知王室作之甚苦成之甚難陛下豈不為祖宗愛惜之而容他人壊之耶臣請為陛下䟽其大者至於紛紛交舉以撓萬𩔖者未暇種種而數也夫王室之所以重者雖以人主之尊不敢以名器輕授人也而今也塗巷之人朝遊私門則暮紆金朱矣取名器於萬乘之旁而曽不少顧安石可謂陵王室矣王室之所以尊者以老成在側忠骾在庭也而今也離間老成棄逐忠骾獨為陛下引頑童進柔佞安石可為卑王室矣王室之所以彊者以綱紀振法度修賞罰正也而今也綱紀則亂之法度則毁之賞罰則倒之安石可謂弱王室矣王室之所以安者以能使百姓有餘力而樂其生也而今也斂於民者煩督於民者急奪於民者盡而人人救死恐不暇安石可謂危王室矣夫王室之所以明者以人情不壅於上聞而萬里兼聽也而今也朋邪壅之或近在輦轂之下國門之外而君父不知赤子嗷嗷控告無路安石可謂翳王室矣忠臣義士言之及此往往聲淚俱發臣知陛下方倚望太平必以臣言為非是然願陛下密擇一二正人以他事使於四方使潛採公議及遴選一二親信訪於都城使盡録衆說則必有甚於臣所陳者矣臣猶恐未必敢以其實告陛下也其為忿嫉億兆所同唯陛下穆然凝䆳獨不得聞臣每思奉天之變盧杞養成未嘗不為陛下寒心故人怨而不知天下之深忌也以危為安天下之深禍也惟陛下念之無忽臣嘗讀易至於孔子之雜卦曰親寡旅也不覺為君父掩書而泣夫惟天下之忠信為可親陛下試察今左右前後之臣皆忠信耶非耶為權臣用耶為陛下用耶彼其唯相朋以逢迎陛下以窺伺陛下以䝉蔽陛下為權臣地爾而君父獨立於羣邪之中可謂所親者寡矣奈何以南面之尊天下之勢多士之盛而自謂旅人也陛下學備古今獨不見朱温之事乎先使昭宗孑然寄身於汴人之間而後為亂唯天下之至明為能見之於至㣲而破之於未大願陛下少回天幾以照之社稷幸甚陛下若惓惓於其賢以為用之未盡則何不靜心潛思自用之以來四年于今其益于陛下者何事成於天下者何功施於生民者何惠可埀後來者何法進於列位者何賢投於四荒者何佞陛下心通目明能不昭覺豈待臣一一指其人而條其事也意者陛下數年以來力排天下之議主張斯人而赧於卒不效不果去之耶此又臣以為固無傷陛下之明而適足示陛下之聖也前日聞天下譽之則用今日見天下怨之則舎是用以天下舎以天下也陛下何私哉不出反掌之間而取泰於否轉危為安聖人之能孰過此者陛下幸思臣言勿復以為疑且歴古以來賢王英主所與取天下守天下者莫非中原偉人今陛下坐中原不與中原端厚之士共之而獨引逺荒竒邪輕淺之人與議大計臣切恐中原豪傑有侮笑陛下於林間者矣以陛下天資如此自勵又如此真得忠賢而用之堯舜三代不難到天下何時無真賢今日取之者非其道爾彼真賢不以辯給為能不以文采為髙不以聚斂為智獨能平心正意深思逺謀為社稷久計爾顧肯屑圖近利以誤蒼生哉然其人誰不欲為君父用者但恥以其身出於權臣之門故逡巡晦縮而不肯進豈嘗須臾忘陛下陛下曠然奮英斷自收主權誅大姦而竄羣惡以一清中外而下半紙詔書以謝天下曰聽任之偏大事幾去天啟朕明洞掃疑蔽今願復與士民相親也則可以激忠義於巳䦨消禍災於欲起堯舜之治咫尺在前可不為陛下賀也如不留意於斯焉後日之事臣不忍言矣惟陛下察之熈寧五年上時管幹北京國子監上神宗論市易文彦博熙寧五年三月二十六日詔曰天下商旅物貨至京多為兼并之家所困往往折閱失業至於行鋪禆販亦為較固取利致多窮窘宜出内藏庫錢帛選官於京師置市易務商旅物貨滯於民而不售者為収買隨抵當物力多少均分賖請立限納錢出息其條約委三司本司官詳定以聞市易之行盖始於此臣近因赴相國寺行香見市易於御街東廊置义子數十間前後積累果實逐日差官就彼監賣分取牙利且果𤓰之㣲錐刀是競竭澤專利所得無幾徒損大國之體秪斂小民之怨遺秉滯穗寡婦何資况宻邇都亭敵使所館豈無覘國之者將為外夷所輕伏乞嚴敕有司趣令停罷使毫末餘利均及下民惠澤分沾必召和氣熈寧六年正月上時為樞宻使上神宗論市易係第二狀文彦博臣近言市易司於御街東廊設义子差官監賣果實分取牙利損大國之體斂小民之怨乞行寢罷至今涉旬未聞施行亦不䝉詢詰未審聖意以為何如退省僣狂伏増惶懼臣竊慮陛下以其事小故不足恤而臣愚以謂所損甚大决不可為區區盡言葢由於此且京邑翼翼四方取則魏闕之下治象所觀今乃官作賈區公取牙利易所謂理財正辭者豈若是之瑣屑乎周官泉府斂市之不售貨之滯於民用以待不時而買者各從其故價亦不如是之規利也凡衣冠之家罔利於市縉紳清議衆所不容豈有堂堂大國皇皇謀利而不為物論所非者乎斯乃龍斷之事孟軻恥之臣亦恥之復不忍聚斂小民希進妄作侵漁貧下玷累朝廷不勝憤悶輒敢屢言伏望聖慈俯垂詳擇若以臣所言非當甘從誅責熈寧六年正月上彦博奏入王安石白上曰陛下近嵗放百姓貸糧至二百萬支十斗全糧給軍一嵗増費亦計數十萬緡以至添選人俸増吏禄給押綱使臣所費又亦百萬緡天下愚智孰不以此知陛下不殖貨利豈有所費如此而乃於果實收數千緡息以規利者直以細民久困於官中須索又為兼并所苦故為立法耳彦博所言遂寢不報上神宗進流民圗鄭俠臣伏覩去年大蝗秋冬亢旱迄今不雨麥苖焦枯黍粟麻豆皆不及種旬日以來米價暴貴羣情憂惶十九懼死方春斬伐竭澤而漁大營官錢小求升米草木魚鼈亦莫生遂蠻夷輕肆敢侮君國皆由中外之臣輔相陛下不以道以至於此臣竊惟災患有可致之道無可試之形其致之有漸而其來也如疾風暴雨不可復禦流血藉尸方知喪敗此愚夫庸人之見古今有之所貴於聖神者為其能圗患於未然而轉禍為福也當今之勢猶有可救願陛下開倉廩賑貧乏諸有司斂掠不道之政一切罷去庶幾早召和氣上應天心調陰陽降雨露以延萬姓垂死之命而固宗社億萬年無疆之祉夫君臣際遇貴乎知心以臣之愚深知陛下愛養黎庶甚於赤子故自即位以來一有利民便物之政靡不毅然主張而行陛下之心亦欲人人夀富而躋之堯舜三代之盛耳夫豈區區充滿府庫盈溢倉廩終以富衍彊大誇天下哉而中外之臣略不推明陛下此心而乃肆其叨懫劓割生民侵肌及骨使大困苦而不聊生坐視其死而不恤夫陛下所存如彼羣臣所為如此不知君臣際遇欲作何事徒只日超百資意指氣使而已乎臣又惟何世而無忠義何代而無賢德亦在乎人君所以駕馭之如何耳古之人在山林畎畆不忘其君芻蕘負販匹夫匹婦咸欲自盡以贊其上今陛下之朝臺諫黙黙具位而不敢言事至有規避百為不肯居是職者而左右輔弼之臣又皆貪猥近利使夫抱道懐識之士皆不欲與之言不知時然耶陛下有以使之然耶以為時然則堯舜在上便有夔稷湯文在上便有伊吕以至漢唐之明君我祖宗之聖朝皆有忠義賢德之臣布在中外君臣之際若腹心手足然君唱於上臣和於下主發於内臣應於外而休嘉之德下浸于昆蟲草木千百世之下莫不慕之獨陛下以仁聖當御撫養為心而羣臣所以和之者如此夫非時然抑陛下所以駕馭之道未審爾陛下以爵禄名器駕馭天下忠良而使之如此甚非宗廟社稷之福也夫得一飯於道傍則遑遑圖報而終身饜飽於其父則不知德此庸人之常情也今之食禄往往如此若臣所聞則不然君臣之義父子之道也故食其禄則憂其事凡以移事父之孝而從事於此也若乃思慮不出其位尸祝不代庖人各以其職不相侵越至於邦國善否知而不言豈有君憂國危羣臣乃飽食厭觀若視路人之事而不救曰吾各有守天下之事非我憂哉故知朝廷設官位有髙下臣子事君忠無兩心與其得罪于有司孰與不忠於君父與其茍容於當世孰與得罪於皇天臣所以不避萬死干冒天閽以告訴于陛下者凡以上畏天命中憂君國而下念生民耳若臣之身使其粉碎如一螻蟻無足顧愛臣切聞南征西伐者皆以其勝捷之勢山川之形為圖而來獻料無一人以天下之民質妻賣兒流離逃散斬桑伐棗拆壊廬舎而賣於城市輸官輸粟遑遑不給之狀為圖而獻前者臣不敢以所聞謹以安上門逐日所見繪成一圖百不及一但經聖明眼目已可嗟咨涕泣而况數千里之外有甚於此者哉如陛下觀圖行臣之言十日不雨即乞斬臣宣德門外以正欺君謾天之罪如稍有所濟亦乞正臣越分言事之刑熈寧七年三月上時俠監京師安上門以疏及圖詣閤門投進不納遂於本門勾馬逓於銀臺通進司奏為宻急事疏入上覽畢反覆觀圖長噓者數四初韓維對延和殿上曰久不雨朕夙夜焦勞奈何維曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變書曰惟先格王正厥事願陛下痛自責已下詔廣求直言以開壅蔽大發恩令有所蠲放以知人情至是維又言近日畿内諸縣督索青苖者甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之際重罹屯苦夫動甲兵危士民匱財用於荒夷之地朝廷處之不疑行之甚銳至於蠲除租稅寛格逋負以救愁苦之良民則遲遲而不肯發望陛下自奮英㫁行之過而養人猶愈於過而殺人也上感悟即命維草詔二十八日詔出人情大悅三日大雨自俠上疏至雨纔及浹辰四月初七日早朝羣臣既賀雨上出俠所進圖宣示宰執且責之曰卿等每言法度脩明禮樂興行民物康阜雖唐虞三代無以過今來外事如此丞相以下各謝罪是日有㫖放俠擅發馬逓之罪安石因遷定力寺求出其黨不樂争言於上或以為心狂以為非毁良法或以為擅發馬逓驚御乞追逮所司勘罪御史臺直請以俠付臺推劾遂有㫖下開封取勘宋名臣奏議巻一百十六
