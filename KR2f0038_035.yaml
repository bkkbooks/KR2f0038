body:
  text: 宋名臣奏議卷三十五宋趙汝愚編帝系門外戚下上哲宗論韓忠彥為左丞以其弟嘉彥尚主未當傅堯俞臣伏見近除韓忠彥為尚書左丞繼又以其弟嘉彥尚主物議籍籍以為未當臣不敏不敢臆度其是非臣竊謂李德裕實唐之名相建言舊制駙馬都尉與要官禁不往來開元中訶督尤切今乃公至宰相及大臣私第是等無他直泄漏禁密交通中外耳請白事宰相者聽至中書無輒詣第當時防禁如此今乃萃於一門議者之言良可取也况君舉必書而書事必謹其始陛下自臨御以來勵精政事未有過舉而首開此塗異日援以為比其弊將深且書於史冊云始於陛下使後世指為譏議顧不惜哉願陛下深思之陛下用臣輩為聰明臣茍知而不言負陛下之罪不容誅矣元祐四年六月上時為御史中丞上哲宗乞罷韓忠彥政事范祖禹臣伏見韓嘉彥巳宣繫授駙馬都尉其兄忠彥執政祖宗以來無此故事陛下動遵成憲懋建大公豈可使後世姻戚預政自今日始夫祖宗舊典君臣當共守之而不可隳也伏乞罷忠彥政事以為後法元祐四年七月上時為右諫議大夫同前范祖禹臣竊聞韓嘉彥巳選尚公主此先帝遺意而陛下成之韓琦勳在王室其子尚主天下之人誰曰不宜此於太皇太后陛下為至慈在皇帝陛下為至孝然臣伏見國朝以來祖宗諸公主婚姻之家皆無預政事者今嘉彥巳選定宣繫而忠彥執政此非祖宗故事不可為子孫法使後世姻戚預政自陛下始臣竊惜之陛下一言一動當以祖宗為法況執政繫安危治亂最為大事一開此例後不可止陛下自聽政以來於親戚無毫髮之私天下之人無不服陛下之至公今獨於韓琦如此非以報功也陛下念琦之功富貴其家可也至於執政必選天下之望不可專以勳舊如是趙普曹彬子孫何嘗執政豈是祖宗不念功乎自用忠彥以來外議籍籍至今未已今國家既與之為婚罷之有名陛下欲富貴之但使曾歷執政與之前執政官無所不可若必待其有過然後黜之則已傷恩是欲厚韓琦之家反薄之也不若保全忠彥無使至於滿盈顛覆臣今已䝉除新職罷言職不當更論執政然臣前上殿已嘗面論今又變祖宗故事所繫甚大雖欲去職不敢不為陛下一言臣與忠彥是親素無嫌隙但不忍上負陛下任使不欲陛下有所不知耳今在朝廷之人多出於韓琦之門雖忠彥不協人望以琦之故皆莫肯言亦乞陛下知察祖宗以來無彊族根據朝廷今忠彥執政弟尚公主恐權戚太甚宜防其漸元祐四年七月上時知諫議大夫上徽宗論士大夫交結向族子弟鄒浩臣伏見陛下即位之初皇太后權同聽政所以協濟艱難為宗廟社稷無窮之計本朝故事惟慈聖光獻皇后垂簾之日與章獻明肅皇后宣仁聖烈皇后事體稍異然猶久之方始復辟今皇太后乃深自退託不敢引三后為比初降手書期以祔廟禮畢不復與政既又不候祔廟亟踐初言自古以來方册所載母后之美未有如皇太后功德如此之盛者也易曰進退不失其正者其唯聖人乎皇太后可謂不失其正矣普天之下雖三尺童子尚知歌舞稱頌況忠義有識之士哉陛下天性仁孝思所以報功德者甚切是以向宗回等以次超擢莫不曲盡其厚雖非陛下以此為私而宫禁之間所以奉皇太后之歡心者無所不至蓋可推此而知也今士大夫或不深惟陛下厚待母族之意往往奔走其門務相交結甚者隂使腹心密致誠欵似欲因緣勢力以為進身固位之地一時公議頗亦疑之然臣聞舊來向族子弟所為稍有不善皇太后必遣使切責以此人人畏懼唯務寡過而向宗回等又素以修飾見稱于時縱使士大夫切於自謀决不為之改操但恐向族子弟至多其間豈無思慮不審之人萬一為士大夫所誤不能逺嫌以動公議臣寮有以聞者不知陛下何以處之若不行則無以正祖宗之法度若行之則無以慰慈闈之至念不唯陛下難處在皇太后處之亦甚難也且陛下之立也大臣固有異議者賴皇太后以宗廟社稷為心斷然不搖大計以定而陛下既立之後天地協應人心自歸六合之間盡為和氣故雖蠻夷戎狄逺在聲教之外亦莫不稽首面內幸不世出之遭遇是則皇太后之功德又孰得而形容之邪功德如此皇太后乃委而弗居深自退託雖帝堯之克遜大禹之不伐何以復加方且含飴弄孫尊享太平之福與陛下同之如天長地久安可使難處之事輒有聞於天下乎臣愚伏願陛下於從容省侍之際密以此事禀皇太后乞自皇太后密加覺察若外議無實則已果有其實乞自皇太后密加訓敕以杜其漸庶幾外則不廢祖宗之法度內則不動慈闈之至念使天下咸仰陛下奉親之聖孝咸仰皇太后立子之功德永永萬年無有窮已而向族子弟保其令名亦有無窮之顯豈不美歟臣昨以罪逺竄分死瘴鄉䝉恩生還復以舊職實在陛下即位之初皇太后垂簾之日今身體髮膚皆陛下皇太后之所再造所以圖報大恩尤非其餘臣寮之比若於此時有所見聞噤不啓口至它日臣寮有奮不顧身而言者然後亦從而言之則臣之罪大矣敢不豫以奏陳伏望聖慈赦其狂妄而納其愚忠不勝幸甚不勝幸甚元符三年六月上時為右正言上徽宗乞罷王師約樞密都承㫖陳瓘臣聞成王即政之初羣臣進戒之詩曰陟降厥士日監在兹蓋言升黜人材上合天意然後可以慰天下之心初政之所宜謹無大於此也臣伏見駙馬都尉王師約近除樞密院都承㫖非祖宗用人之法違神考設官之意臣不可以不論也本朝矯衰唐之弊駙馬都尉無有任權要者惟王貽永尚太宗女鄭國公主一年而主薨貽永即納所賜第後三十年乃歷邉任仁宗知其賢擢任樞密當此之時貽永名為帝壻實已疏外今師約賜第猶存而未歷邉任豈可用貽永之例而遽擢於樞密之地乎神考詔樞密院置都承㫖以文臣為之副承㫖以武臣為之或參求外戚之可任者以充此選然一文一武不相紊也今以師約據文臣之位豈神考設官之意乎陛下逺師堯舜近法祖宗四方萬里無不延頸舉踵以觀初令未拔寒俊而遽以姻戚先之巖穴之士將何望焉三省樞密院進擬如此失天下之心矣願陛下守祖宗用人之法稽神考設官之意罷師約新除以允公議元符三年八月上時為右正言同前係第二狀陳瓘臣十二日曽具奏狀言駙馬都尉王師約除樞密院都承㫖非祖宗用人之法違神考設官之意乞行寢罷未䝉施行臣所當論未可已也師約在元豐中嘗為神考之所試用其人修謹寡過士論亦頗與之然而臣之所言非論師約之賢否特以初政用人不循舊章未拔寒士先擢姻戚恐失巖穴之心以為廟堂之纍區區之忠非立異也若䝉陛下採狂瞽之言寢已行之命則用衆從善實為兩得伏望聖慈特降睿㫖罷師約新除以全初政之美元符三年八月上上徽宗論向宗良兄弟交通賓客陳瓘臣聞知幾而預戒則君無過舉先事而早諌則臣無智名君明臣良上下兩得治道所以隆也臣以駑散之才冒處言職適遭明聖之主竊慕良臣之義事有臨機不當默者安可有待而不早言乎宋有天下一百四十一年矣太平之久堯舜三代乃至漢唐皆不及也譬如安樂之人年過百嵗尤當兢兢畏謹護飬元氣無使疾患乘間而入則愈老愈健永保康寧之福矣祖宗以聖繼聖古無有也母后繼有聖德亦古無有也天覆地載一健一順萬物生成各遂其性至神考而治道益隆至皇太后而家道益光可謂盛之極矣盛必有衰安可不預戒乎漢之衰也以外家太盛人不敢言以至亡國陛下守祖宗之成法監衰漢之覆轍宋德方隆內外無患然以臣所聞宜預戒者有一事焉恐陛下未知也恐皇太后未知也向宗良兄弟交通賓客漏泄機密陛下知乎皇太后知乎皇太后功德隆備格于皇天陛下極天下養未足以報惟使我宋固萬年不拔之基外家享與國無疆之福夫然後足以為報漢唐母后稱制有至終身或欲威福之柄久出于已或因左右之請貪戀權制惟我皇太后恬寂足以全威福嚴明足以戢左右不待祔廟果於還政事光前古名垂後世陛下所以報皇太后者宜如何臣恐假借外家不足以為報也乃者還政以前陛下欲除向宗良等開府儀同三司將鎖學士院矣而皇太后詔寢此命中外傳聞咨歎仰知皇太后以撝謙為德而陛下以養志為孝也漢章帝欲加恩三舅馬后曰吾觀富貴之家祿位重疊猶再實之木其根必傷何必營外家之封違慈母之拳拳至孝之行安親為主此吾家之事故得專之吾當含飴弄孫不能復關政矣於是章帝不封其舅貼黃馬后不復關政之言惻怛如此可謂賢矣然後以兄弟干政後世議焉唐之長孫皇后曰漢之馬后不能撿抑外家使預政事乃戒其車馬之侈此所謂開本源而恤末事也是以太宗問后政事后不欲言再三要之終不肯對蓋以馬后為戒也今皇太后盛德全備與天同功非馬后之比臣之所言但欲有補於外家而已想亦皇太后之所樂聞也若不逹聖母之心而自為猜嫌之慮當言不言臣所不忍臣謂馬后之所以詔其子章帝之所以順其親內慈外孝兩得之矣陛下及皇太后前日之事撝謙養志正與此同天下之所以服也漢哀帝之初急封諸舅孔光諫曰天下者陛下之家也肺腑何患不富貴不宜倉猝若是其不久長矣帝以逼於傅太后不能從也今皇太后詔寢成命不待孔光之言陛下恭禀慈訓遂無倉猝之舉此乃前古難行之事於今見之皇太后之聖德可勝言乎陛下所以報皇太后者宜如何哉臣恐假借外家不足以為報也陛下雖受天眷命歷數在躬然而力摧異議獨定大䇿者皇太后也蓋有功於陛下者天及皇太后而已天道公而不私陛下之所以報天者宜如何哉皇太后為而不恃功成不居陛下之所以報皇太后者宜如何哉陛下以道制情無一毫之私則可以服人之心服人之心則可以得天之心得天之心則可以合皇太后之意矣神考之所以報慈聖者用此道也治平之末韓琦為相中外協心定䇿為易前日之事章惇秉政首唱異議定䇿為難然則皇太后之功比之慈聖又為光矣陛下之所以報皇太后者宜如何哉唐之衰也天以定䇿之功付于矜伐之臣於是責報不已而有負心門生之語主道之強弱可見於此矣貼黃唐宦者楊復恭䇿立昭宗後稍恣橫責報不已昭宗後厭之因令致仕遂與其兄子守亮書曰吾披荆榛立壽王為天子既有天下遂廢定䇿國老奈負心門生何門生謂昭宗也今者功出聖母國本既正唯陛下永思所以圖報而已大公之報報之上也假借外家豈足以為報乎宗良兄弟依倚國恩慿藉慈䕃夸有目前之榮盛不念倚伏之可畏所與游者連及侍從希寵之士願出其門裴彥臣無甚幹才但能交通內外漏泄機密貼黃臣聞紹聖之初裴彥臣管幹造慈雲寺因婦人阿王赴户部及御史臺理㑹地界後來并此一寺屢曾遷徙竟不成就臣竊恨此也皇太后為追薦愛主所以施財造寺此寺既不成就而郝隨之徒因緣恣橫敢慢東朝外人皆有不平之心所恨哲宗不知耳當時戶部及御史臺官司有以彥臣為是者有以彥臣為非者是非自有公議以臣觀之只因彥臣幹當不了以致生事臣故曰彥臣無甚幹才也遂使物議籍籍或者以謂萬機之事黜陟差除皇太后至今與也良由中外關通未有禁戒故好事之人得以溢傳耳若非皇太后明諭聖意嚴加約束則籍籍之口未易塞也仁宗篤於舅家尤以李瑋為賢詔瑋舉官為將領瑋言有賓客之禁無以知士人之賢否仁宗特許瑋見賓客而命日抄所見賓客名氏以聞蓋仁宗之所以保全外家者委曲周旋至於如此神宗敬厚曹佾加以王爵然而佾口不敢薦一人佾門不敢接一人不過以自娛樂而已神考所以厚佾而無厭者以其得外戚之體也宣仁聖烈皇后戒訓外家尤為切至紹聖時利口之禍幾及門户然而高氏之族終獲免者則亦宣仁訓戒之明效也皇太后功德之大光於前人念保持之艱為無疆之慮事戒其漸正在今日老子曰為之其未有也治之其未亂也凡未有之事今雖無之後或漸有既有而後圖不如未有而先戒之漢之馬廖章帝之舅也傾身交結冠蓋之士爭趨赴之遂至於私贍三輔第五倫之所言者是也今雖未有此事安可以不戒其漸乎王氏依東宫之尊假甥舅之親以為威重內外要官皆出其門推譽者登進忤恨者誅傷劉向之所言者是也今雖未有此事安可以不戒其漸乎杜欽谷永自託於外戚專攻人主之身而無一言敢及王鳯遇有災變則反推天異歸之他人以為外戚之地懷二心之士如杜欽谷永者何代無之今雖未有此事安可以不戒其漸乎成帝之時外家子弟據勢滿朝成帝欲以劉歆為中常侍臨欲拜官而左右奏曰未白大將軍不肯奉詔帝雖堅執終不能奪由是朝廷之事只由外家不由成帝今雖未有此事安可不戒其漸乎王音王根奢僣不法天子怒之於是兄弟欲自黥劓以謝太后封侯之日黃霧四塞諫議大夫楊興等以王氏為言於是大將軍惶懼乞骸辭職然而外家强盛故人主之威終不得行今雖未有此事安可以不戒其漸乎神考有言曰荒墜顛危可見前車之失亂賊姦宄厥有履霜之漸臣愚以謂欲見前車之失則往古之事不可以不考欲辨履霜之漸則方今之事不可以不戒老子曰合抱之木生於毫末九層之臺起於纍土事之有漸者無不然也貼黃王鳯擅權以王商不附巳使人上書極言詆毁商暗昧之過商發病嘔血死王章不親附王鳯乃奏封事言日食之咎皆鳯擅權蔽主之過天子感悟納之謂章曰微章直言不聞社稷計且惟賢知賢君試為豫求所以自輔者於是章薦馮野王王音竊知其語以告大將軍鳯鳯用杜欽計稱病乞骸太后聞之為垂涕不御食成帝乃優詔報鳯強起之於是鳯視事後下章吏廷尉致其大逆罪章竟死獄中妻子徙合浦自是公卿見鳯側目而視馮野王竟免官衆庶多寃王商議朝政者杜欽復為鳯畫䇿詔求直言極諫以救前過漢之王商王章皆當時之賢臣因為王鳯所惡一則死于暗昧之過一則死于縲紲之中當此之時外家之勢已如合抱之木九層之臺豈一手之所能拔豈一鍤之所能平哉商等區區可憐而諫諍後時戒之不早何益於事今臣所論乃在於纍土毫末之初遏萌杜漸何難之有在陛下從容求皇太后一言之詔而已自古戚里侵權便為衰世之象外家干政即是亡國之本亦如州縣之政只要權出於一若使守令人家子弟親戚交通賓客關節無禁如此則姦人鼓舞良民咨嗟此陛下及皇太后之所不取也以小喻大有以異乎臣願陛下採芻蕘之言遵神考之訓合太母之心以疏逹于慈闈若䝉皇太后察臣愚直以慈愛之則自今日已往憂國忘身之士皆欲竭忠自效而無所畏矣臣下盡樂告之忠朝廷有不諱之善好察如虞舜不吝如成湯貼黃中庸而好察邇言舜之事也詩曰唯邇言是聼幽王之事也此二者相去逺矣在分聽察兩字而已聖德日躋治道日隆我宋固萬年不拔之基外家享與國無疆之福豈特賤臣一身之幸乎如其不然則臣有僣易妄言之罪罷黜投竄理不可逃在陛下命之而已臣以孤寒逺賤之迹誤䝉陛下過有拔擢責臣不輕眷臣方厚臣是以及時而言先事而諫豈敢以身之不肖而自廢其所當言乎孔子曰君子不以言舉人不以人廢言臣雖不肖而區區之言有益於朝廷有補於外家若不以臣之不肖而取之則忠言由此而並進若以臣之不肖而廢臣之言則諂言由此而交入聽言治之基也信諂亂之本也貼黃古者忠信之士語及外家則讒諂之人必中傷之指為離間以激怒內外然後姦謀祕計無所不行此計若行則言者必危言者既危則天下之士以言為戒如此則亂可必矣臣故曰信諂者亂之本也國家治亂之機在此一舉臣一身螻蟻之命安危生死豈足道哉臣不勝惶懼待罪之至元符三年九月上上欽聖皇后乞戒敕外家豐稷臣竊觀自古母后臨朝危社稷亂天下載在史册可考而知手書還政未有如聖母退抑謙遜之盛德可為萬世法諫官陳瓘何從而知尚與政事臣嘗具奏非宫省親近之臣即外戚招權者妄傳於外臣今外則唯聞向宗回宗良藉勢妄作欺惑於人內則唯聞張琳裴彥臣等凶諂焰熾翰林學士承㫖蔡京交通其間宫禁預政之言中外喧傳人誰不知諫官陳瓘不勝哀憤獨先抗章冀開寤二聖之心臣愚欲乞戒飭外家竄逐琳等黜京於外聖母燕處宫闈清心養性小大之事不關睿慮安享聖子晨昏之奉四海之養恬淡無為以永萬壽兩宫和樂朝廷清明非特援立功德輝映古今抑亦合易之謙卦天道虧盈益謙鬼神害盈福謙之義坐致五福流令問於無窮豈不至善至美乎臣自踈逺伏遇垂簾拔擢至此不敢緘默孤負明恩惓惓愚誠伏乞俯垂聽察元符三年九月上時為御史中丞上徽宗論蔡京交結外戚陳瓘臣近為言事不根謫授監揚州糧料院受告方得數日便䝉改差知無為軍聞命皇惑唯知感涕臣聞聖人之過也如日月之食焉人皆見之及其更也人皆仰之朝廷以一時之怒黜忠諫之臣此如日月之食也今兹改命可見聖人之心矣天下有識之人誰不歎仰豈獨賤臣一身之私幸乎臣雖上感聖恩而未敢便受新命者誠有說也明道中仁祖欲率羣臣為皇太后上壽范仲淹諫曰人主無北面之禮明肅大怒而仲淹得罪元祐中蔡確之貶范純仁以為不可宣仁大怒而純仁得罪此二臣者可黜可逐而尊主不二之心不可以威勢奪也方劉氏甚危之日極力救護却是仲淹以宣仁晚年翻然逺慮復思純仁知忠言之有益於國家也大抵忠臣之心唯欲保全國體為千萬年久長之慮豈忍使天下議論及於慈闈今宗良等內外交通迹狀甚明蔡京交結之迹天下之所共知也京作內縡墓志曰吾平生與士大夫遊無如承㫖蔡公與我厚者京為從官而與外戚相厚書於碑刻以自矜夸如此之類非止一事而已又京與弟卞久在朝廷同惡相濟卞則出矣京則牢不可拔自謂執政可以决取人皆謂京因慈雲寺得裴彥臣交結之助外議訩訩衆所知也京作向宗良麻詞云元豐末命嘗有嘉言嘉言若出於宗良則大謗必歸於宣仁矣京亦自謂曽帶開封府劊子携劒入內欲斬王圭以沮宣仁懷異之謀京以禁中疑似之傳書于制命揚於天庭自謂與宗良皆社稷之功而使宣仁負無窮之謗京之諂事外戚不畏上天一至如此豈惟有害於朝廷實亦無益於外家臣盡忠於陛下盡忠於皇太后所以言也皇太后聖德大功冠絶今古陛下承顔養志方以大舜武王為法入修家人之禮則恭順無闕出治朝廷之事則威柄不分大舜武王之孝何以加於此乎京所謂孝則不然但欲陛下授柄於外家而已此蔡氏之利非宗社之福也陛下以聖德嗣位春秋方富如漢文帝宣帝即位之年矣盡孝於東朝勵精於政事獨操大柄足以有為而京之所以脅持陛下者原其用意謂陛下未可以獨為也哲宗躬攬之初聖意本無適莫章子厚雖挾功自恣然其初猶有兼取元祐之意自京卞首發邪論盜攘國柄凡有所請必以繼述為說稍違其意則欲以不忠之名加于上下假朝廷之誅賞示私門之好惡輕君誤國首尾八年至于今日狃於故態又以此意脅持陛下傅㑹繼述之論假託報功之說密持離間之謀伺察陛下包藏禍心若有所待京之出言用意諒無逃陛下之聖察也且陛下述神考之聖德報太母之大功豈獨陛下之私心是亦臣子之所願合臣子之所願盡四海之歡心然後陛下有慶兆民賴之天子之孝孰大於此今京所賴非兆民之所同賴也陛下一違京意則京必以不孝之名責陛下矣陛下狥一京脅持之私名而不畏天下至公之大義乎畏天下至公之大義當流竄蔡京以安國家而已臣前日之言不負天不負陛下不負皇太后果䝉陛下移臣差遣若非皇太后察臣之忠陛下必不欲如此指揮也然而京在朝廷則家國未安臣雖移得差遣有何安乎臣之不敢受命者其說如是臣露章所言未甚子細復以此章干瀆聖聽所以盡惓惓之誠也皇太后以無我之慈至明之照既已察臣之忠矣臣今日之言必是亦䝉照察今雖未察終無不察之理臣雖逺去朝廷仰賴慈芘縱未牽復於臣無損臣所望者當以流竄蔡京為急不當以移臣差遣為先也蓋恐京在朝廷則煩言日進煩言日進則聖慮日勞朝廷雖嚴示威刑而天下公議終不可遏蓋公議若必以威勢奪之則人心離矣人心既離則主勢孤弱主勢孤弱則外陵內侮何所不至非所以奉承宗廟而慰安東朝也然則蔡京之所謂孝者果天子之孝乎願陛下勿愛一京而切為國家之慮也臣愚不勝惓惓愛君憂國之心惟陛下裁赦幸甚元符三年九月瓘自右正言謫監揚州糧料院尋改知無為軍上此奏上欽聖皇后乞不以陳瓘之言為念陳次升臣竊惟哲宗皇帝彌留之際殿下奮獨斷之明斥排異議援立真主上當天心下協人望功施社稷流於無窮皇帝嗣服之初殿下謙恭退託聖功不居皇帝勤請繼之以泣方同聽政暫濟艱難仍以祔廟為期及夫因山之葬載臨寧神之禮未畢又下手書先復明辟三尺之童皆知參預國政非殿下所欲誠出於不得已也近者諫官陳瓘風聞不審猶以預政為言皇帝重行貶降以明其妄謫命方下改守軍壘中外相傳聖恩深厚臣下何以圖報瓘之言雖甚不根然臣採之輿論竊謂皇帝躬行仁孝晨省昏定之際萬幾之務慮或以聞而殿下之意豈欲參議哉竊慮宫省執事之人或但聞其語而不知其詳或欲張大其事而不考其實妄有傳播蓋亦未可知也而瓘之言乃得於傳播之妄烏足為盛德之纍哉況殿下自同聽政之初以至復辟之日手書屢降至誠勤懇昭若日月焉可誣也伏望聖慈不以瓘之言為念而以來忠讜安社稷為心雍容禁闥粹養天和是非不足以關其慮萬務不使以纍其中日加撫育之恩以享榮養之樂不獨保聖壽於億萬斯年而餘光流澤亦足以為族系之慶豈不偉歟元符三年十月上時為侍御史上徽宗論鄭居中除同知樞密院事吳執中臣竊惟祖宗垂訓百有餘年戚里宗屬不以與政非待之薄遇之不厚也其憂深慮逺可謂至矣養之以豐祿髙爵而不使之招權擅事從容進退以永保其安榮誠所以厚之不薄也乃者陛下降德音下明詔追述成憲戒前世禍亂之失俾自今勿復援韓忠彥例以戚里宗屬為三省執政官世世守之著為甲令布之天下孰不以為至當繼嘗以鄭居中同知樞密院事而後宫恐懼知詔㫖之不可違也懇請罷免陛下以其陳義堅慤終不可奪即以居中為中太一宫使詔書傳播聞者欣欣有以見陛下正家以治天下之效也曾未半嵗乃復以前命擢用居中自此中外未免疑矣臣竊為陛下惜之陛下手詔當與典謨並傳示萬世而遽自改易以開他日外戚任事之端非所宜也後宫承陛下道化乃能推逺權勢以祖宗典則屢陳義懇請居中儒者也不知出此偃然居位曽莫之避獨不愧於心乎祖宗遺訓著之金石陛下明詔爛如日星衆目所視不可掩也為居中計者宜深自警懼以逺嫌疑優游祠宫涵泳聖世坐享寵祿長無憂虞世豈復有居中比者伏願陛下勉徇公論申明丁亥二月詔㫖罷居中政事俾復以宫使奉朝請信示萬世以釋羣疑臣不勝幸甚大觀二年二月上時為御史中丞宋名臣奏議卷三十五
