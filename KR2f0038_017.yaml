body:
  text: 宋名臣奏議巻十七宋趙汝愚編君道門用人五上哲宗論為政之要在辨邪正之實梁燾臣聞人主之德莫大於知人朝廷之政無先於急賢德以聦明為髙而政以忠厚為本恭惟太皇太后陛下至公至正明而有斷皇帝陛下仁孝莊敬静淵䟽通閲天下之事日益多進天下之材日益廣講求祖宗治體日益熟察見中外人情日益詳然而聦明或有所遺而忠厚未至於成者臣竊疑之或者聖心未加意於執要乎今日為政之要在於辨邪正之實也唐李德裕有言曰邪正相攻上惑主聽正人呼邪人固為邪矣邪人亦呼正人為邪人主何以辨之臣故曰在辨其實也所謂正之實者能推公心以愛君憂國為計不附下不罔上樂進善𩔖愛惜生靈臨大節而忘其身事兩宫而一其志為陛下常求長乆安寧之計近思自於左右宫庭之間遠慮至於夷夏海隅之際皆欲得其歡康寧無事上下一意其為安静真切如此者是正人也此𩔖進則聦明開廣内外大安豈不為國家忠厚之福耶所謂邪之實者緩公急私復仇報怨外陽為忠直内隂懷姦曲其言似忠而其實欺罔也其氣似敢而其實凶險也自謂介特而其實朋黨也自謂純一而其實二三其德也貪禄競進猜忍傾奪專以傷害善良為謀而又附託權要出死力為之鷹犬不憚不恥以肆其毒不恤國之憂危務伸其志不懼上之悔患務行其言其為傾揺多端如此者是邪人也此𩔖進則聦明眩惑内外大恐豈不為國家忠厚之患耶今聽其言而求其用心之㣲觀其行而考其處巳之端其向背之異有無之殊雖未能盡究而亦可以槩見矣願陛下自信素知之心而守之以定深辨姦詐之說而斷之以不疑斥其邪人以安正人正人知所依歸恃以無恐得以奮忠竭節畢身圖報則朝廷之理不難致也臣不勝惓惓納忠之至貼黄臣向在言路得侍清光伏見陛下照物必盡其情偽而量有包容論政深達其義理而語有次序雖古之英主不能過也臣等累曾奏聞以謂邪正不可並用陛下深以為是知邪正之必相攻也今並用矣臣等又謂邪人在外正人在内則可治陛下亦以為是知邪人在内則害政也今邪人在内矣臣等又謂使邪人少正人多則可治陛下亦以為是知邪人之多則交相朋比損正人之道也今邪人多矣以在内衆多之邪人與寡少之正人並用勢自不敵豈能乆安而終無憂悔乎柰何與前日之聖意不同耶必有姦人移惑聖意也如不悟則姦邪乗隙數數進計終至於成其禍此聖明所宜早辨勿為清𠂻它日之憂悔也貼黄陛下自御政以來選用可信之臣以忠孝報陛下之恩者今在朝廷不過數人羣小怨嫌隂結為朋力謀排陷者不一日也其心欲盡去此數人則姦謀可行大姦有復來之望此數人者方以時事難守為憂孤立難安為懼若非陛下知其從來忘身忘家當怨去姦有愛君憂國之心力賜主張則豈能安全至於今日也在於今日之勢尤為難立仰賴聖造終始主張也此數人者亦未足深惜但恐小人復興攻擊轉多萬一如此則為太皇太后陛下即日之悔為皇帝陛下他日之憂此可為大懼也願聖明凝神深慮以杜其漸待其事起而後處則其勢必强横難制縱終能制之憂勞亦巳深矣伏望聖慈每當進擬人材之際丁寧審問謹重開可使私邪漸少朋黨自衰朝廷日有安静之望聖政日有清明之益此道既行可以緩憂矣小人姦言最是難辨盖其巧美似忠害善似直狠愎似敢誣罔似公人主聽之一誤則德業俱損若不早辨則終至憂患故聖人曰惡利口之覆邦家者自古人君以為戒聖明不可不察也元祐六年十二月上時為翰林學士上哲宗論臣寮上殿不得差遣蔡蹈臣竊見朝廷近日引見上殿臣寮已䝉賜對退而俟命十有七八不報而去臣伏思踈遠小臣偶縁薦引乍瞻天顔罔不震懼進對之際倉卒遺忘所不能免若其辭貌不近柔佞而有鄙野之氣就列之乆㑹有變革且器使之以觀其能既而無所取材斥之未晚先王之時務得人材雖侏儒聾瞶有司大修聲蘧蒢䝉鏐之用所謂器而使之者也今朝廷方患人材乏少職事官員闕自左右僕射而下以至寺監丞簿往往通攝無以充數今其進既難則人材益見乏少因而自抑不敢以賜對為望則遠近相傳士志畏怯不自勸勉殆非養才也詩曰芃芃棫樸薪之槱之傳曰量才而任官度德而定位又曰與人不求備如此則下無遺才而朝無虛位矣官人之盛雖成周不得過也惟陛下圖之紹聖三年三月上時為監察御史上徽宗論君子之道直而難合小人之言遜而易入曾肇臣聞治天下在於正朝廷正朝廷在於辨邪正朝廷之上邪正不分而欲有為於天下難矣盖正者君子邪者小人君子在上小人在下君子在内小人在外則君子道長小人道消而朝廷尊天下治矣小人在上君子在下小人在内君子在外則小人道長君子道消朝廷不得其尊天下不得而治矣君子小人之不並立猶冰炭之不可同器鑿枘之不能相入也何則君子所鄉者公正小人所鄉者私邪也君子所知者遠且大小人所知者近且小也君子所趨者義小人所趨者利也君子所守者一定而不可移小人則觀望希合隨時上下而未甞一也是以君子之道常直而難合小人之言常遜而易入自非明智不惑之君未有不屈彼而伸此者故以堯之聖而曰畏巧言令色孔壬以舜之聖而曰堲讒説以孔子之聖而曰遠佞人善為國者必使君子小人兩得其所而不能相叅然後君子有以御小人小人不能害君子茍為朝廷之上忠佞並進賢不肖雜處則其於圗事揆策任賢使能取舍必有不同取舍不同則主聽惑主聽惑則君子有時而屈小人有時而伸矣君子見絀則君子之𩔖不得立小人見伸則小人之𩔖更相援引充塞要路以是為非以白為黒蒙蔽欺罔無所不為禍亂之源甚可畏也夫自昔為人君者豈樂屈君子伸小人以啓禍亂之源哉盖小人聽其言則似辨任之事則似材又能先意承志以逢人主之好姦言曲學以避人主之惡浸淫滋蔓日漸月磨故能使人主甘心而不悟也然則何以辨之亦在虛心正志以察之而巳昔者舜禹共兠雜處堯朝堯能賢舜禹而退共兠故大治孔子與季孟皆仕於魯魯公賢季孟而退孔子故大亂由是觀之君子小人豈能自消長哉在人主取舍何如爾昔者劉向嘗為漢元帝好儒而優游不斷故向以謂執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消元帝不能用向言而委政恭顯漢室繇是而衰諸葛亮嘗與蜀先主論親賢臣遠小人先漢所以興隆親小人遠賢臣後漢所以傾頽君臣相勉卒成三分之業至如齊桓公任管仲隰朋則九合諸侯一匡天下任䜿貂易牙則身䝉其禍為世大僇唐明皇用姚崇宋璟則有開元之治用李林甫楊國忠則有天寶之亂一人之身而前後成敗之效如此然則邪正果可不辨哉臣故以為治天下在於正朝廷正朝廷在於辨邪正惟陛下留神省察元符三年正月上時為中書舍人上徽宗論惟材是用無係一偏曾肇臣竊觀唐太宗初即位急於求治搜拔賢雋不以一途故取魏徴於仇讎取馬周於布衣取王珪杜淹韋挺於流竄其餘罪亡俘虜之臣咸引在朝唯材是任卒賴其助以成貞觀之治及我太祖皇帝踐祚之始亦以人材為先方是時乗五代衰亂之餘太祖皇帝征伐四方粗定天下制度典章尚多闕略又自郭周以後藩鎮幕府不得奏辟士大夫罕有資廕入官之門唯進士經學二途而巳然歲取進士止三十人經學止五十人選舉既難不無滯材太宗知其然故在位二十餘年所擢士以萬計舍短取長不求其備一時草澤遺逸之人収拾略盡本朝名臣多繇此出後世稱誦以謂太宗明於治體以天下為度非衆人所及故能越去拘攣以牢籠豪傑為國之用此誠不世出之英主後嗣所宜師法者也臣伏見近歲以來内則臺省清要外則藩府守將𩔖多闕員或曰乏材而然臣謂古者不借材於異代無世而無材患在用之不廣爾用之不廣則取人有限取人有限則材者不必用用者不必材是以上之政事有曠廢不舉之憂下之懷能抱器之士有鬱塞不伸之嘆此宜今日之所留意也陛下臨御以來銳於更化其所引拔固巳不專一途然臣愚過計尚意左右之臣或未盡以皇極大中之道啓廸陛下於用人之際不能無方致陛下勵精求治之初有人材不足之慮伏望陛下遠稽唐貞觀所以致治之繇近以太宗皇帝振舉滯淹為法無惑於浮言無係於一偏斷自聖心唯材是用収其大者以為棟梁柱石其小者亦足備榱桷扂楔之任庶於經營清朝無施不宜以成治功以通衆志豈獨天下之幸實社稷無疆之福也在易之泰曰包荒用馮河不遐遺朋亡得尚于中行盖當上下交泰君子道長小人道消之時荒穢者包之馮河不中者用之遠者不遺忘近者不朋比如此故得尚于中行所以為盛在書之皇極曰無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直如此故能作民父母以為天下王惟陛下留聽毋忽元符三年正月上上徽宗乞示好惡明忠邪龔夬臣聞好惡未明人迷所嚮忠邪未判衆聽必疑臣頃在外服側聞朝廷聖政日新遠邇忻戴及被命詣闕又聞進退人材皆出睿斷此固甚盛之舉也然而姦黨既破則彼將早夜為計以謀自安不可不察或遽於革面以求自入或申執邪說以拒正論或妄稱禍亂以動朝廷或託言祖宗以迫人主或巧事貴戚或隂結左右大抵姦人之情其計百出不可盡舉其要則欲變亂是非渾殽曲直以疑誤朝廷將幸其既敗復用巳去復留而巳矣君子直道而行不為機變則必墮姦人之術内若然則天下之治殆未可知也故必在朝廷洞判忠邪斷而行之若小不忍則害大政恭惟先皇帝聦明聖神臨政願治臣昔蒙賜對親被聖訓勿為阿附以期自守今臣不言則為上負厚恩下廢所守朋姦罔上自取犯義之罪惟陛下深察臣言以示好惡以明忠邪而陟降多士使遠近皆知進賢退姦之意將見天下鼔舞聖化太平之治不難致也元符三年三月上時為殿中侍御史上徽宗論任賢去邪在於果斷陳師錫臣聞堯舜禹稷之相遇其朝夕都俞勸戒不過於任賢勿貳去邪勿疑盖為君之先務在此也夫知任賢而任之之意不專賢不可得而任矣知去邪而遲疑不斷雖有去邪之意邪亦不可得而去矣昔齊桓公問管仲曰吾欲酒腐於爵肉腐於爼得無害覇乎管仲曰此極非其善者然非害覇也任賢而使小人間之害覇也又曰郭何以亡管仲曰以其善善而惡惡桓公曰善善而惡惡何以亡管仲曰善善而不能用惡惡而不能去郭由是亡由此言之人君不得任賢去邪之道大不可以王小不可以覇守而不變將至於亡其能覇且王乎管仲且猶知此况不為管仲者乎宋興一百五十餘載矣號稱太平饗國長乆遺民至今思之者莫如仁宗皇帝臣竊嘗考致治之本亦不過於開納直言善御羣臣賢必進邪必退自明道中親攬萬機見政事之多僻知輔佐之失職自宰相呂夷簡樞宻使張耆叅副夏竦陳堯佐范雍晏殊等一日皆罷去天下巳服其英斷矣寶元之初地震冬雷用諫官韓琦之言而宰相王隨及同列陳堯佐盛度韓億石中立同時見黜甞用夏竦為樞宻使諌官歐陽修論其姦邪即日罷竦判河陽晏殊為宰相諌官蔡襄言其不恤邊事廣置田宅即日出殊知潁州其後不次擢用杜衍范仲淹富弼韓琦以致慶厯嘉祐之治為本朝甚盛之時遠過漢唐幾有三代之風若仁宗牽於偏聽優柔不斷臺諌備位言不見用賢善不進朋姦不去則安能饗四十有二年太平之福乎臣願陛下遠思堯舜禹稷任賢去邪之道中采齊桓管仲善善惡惡之戒近法仁祖納諌御臣之意則太平之盛指日可見伏望陛下留神省察元符二年五月初除殿中侍御史上徽宗乞為政取人無熈豐元祐之間江公望臣日者獲邇清光親承聖訓以今日之治體當以繼述為先復賜宴間側聆睿旨以今日朝廷而患元祐人為多臣退而思之既持繼述之論必牽於元祐之説此理勢之必至者也夫孝子之心莫不以繼述為美哲廟固孝於神考矣持繼述之論牢不可破輔政非其人以媚於巳為同忠於君為異一語不相合時政必目為流俗一談不相侔時事必指為横議借威柄以快私隙必以亂君臣父子之名分以感動人主故元祐之臣投荒屏裔為之一空所引隂險憸佞輕浮刻薄之小人内結中貴以窺伺主意外生邊事以持乆禄位人力困竭國用匱乏天下為之騷然泰陵不得盡繼述之美大臣持論不平之過也昔成周之時作興人材化雨德風浸潤披拂菁菁有阿陵之飬芃芃足薪槱之用一遭幽厲之禍人才凋落至宣王中興有德輶如毛民鮮克舉之愛莫助之之歎宣王知人才可以培植而生可以護養而成若芑之新田菑畝培植護養有力故南征薄采而足用也元祐人才皆出於熈寧元豐培養之餘遭紹聖竄逐之後凋踈落漠所餘無幾天假殘息若有待焉陛下有作萬物興覩雨露滂沛咸被湔洗不旋踵召寘禁近或布在臺省要藩便郡班班有之萬無一生之人既獲全活百有十非之者一切俱原豈惟不失前日仕宦亹亹焉有進擢之望人非木石豈敢不懷恩陛下不用則巳用之則若臂之使指若手足之扞頭目豈復有不應我哉陛下持繼述之論而以元祐人為多不過患其不為使爾此正非所慮也陛下操利勢持名器體乾剛之德用皇極之道以臨御天下以役使羣物人臣結髮辭親委質就仕既移所事事陛下豈有驁然不為使哉陛下不迫其所難不强其所不能得欲同心協力遵奉神考巳成之法度徐將講求繼述之美意與天下共享其利爾昔齊桓釋射鉤之讎而管仲得以濟其功晉文不宿斬袪之怨而勃鞮得以成其名王珪魏徴易所事而不以隂計為諱唐太宗用其直而卒成仁義之治神考於元祐之臣其先非有射鉤斬袪之讎陰計之隙也先帝信仇人而黜之陛下黜仇人而用之用其隙猶足以濟治况非其隙而用之者乎其肯為陛下盡心也必矣陛下若立元祐為題必有元豐紹聖為之對有對則争興争興則黨復立矣搢紳之禍何時巳也可不痛哉陛下嘗榜朝堂并布告天下以為政取人無彼時此時之間損益惟時之所宜用捨惟義之所在又改元詔㫖亦稱思建皇極嘉靖庶邦盖當端好惡以示人本中和而立政皇天后土實聞此言陛下欲渝此言其如皇天后土何論述事則一無所作述之而巳此詩所謂率由舊章而閔子騫所謂仍舊貫何必改作者也論繼志則治雖不同同歸于治而啓之敬承禹道武王之卒其伐功者也惟道是從豈泥于已陳之迹哉二帝常道也可則若之否則稽之何常之有惟其不常是乃所以為常道也伏望陛下以繼述為大計以因時損益為盡美雖步驟馳騁不越於神考法度之間皆足以為治是猶王良造父之挾輿馬駕御疾徐之節在我雖欲頓領而為之用勢亦不可得巳况非迫其所難而强其所不能也揚雄曰御得其道天下狙詐咸作使御失其道天下狙詐咸作敵治天下者審所御而巳能審所御雖狙詐且為之使况不為狙詐者乎故有國者惟患人才之不多不患多而不可用惟患不能用而巳陛下明諭羣臣以朕之所謂繼述者如此朕之所以遇元祐之臣者如此咸勉承聖訓各務同心協力以成繼述之美以保富貴安榮朕於爵禄何所愛焉儻陽為公心隂結死黨專立異論務沮成法或怏怏非其君而驁不為使則明行誅斥以戒在位朕於汝無愧汝負朕為多自速之禍也悔何及焉先之以訓誥之情申之以丁寧之義終之以惻怛之意此周公所謂予不惠若兹多誥盖有不獲免者矣如是元祐之人惟患其不多繼述之美無患其不盡天下何患其不治也在陛下御之而已矣仁者善合人不仁者善離人惟聖人能置人於其間是猶水火之不相能也置鼎焉故能濟烹飪之功成五味之和今宰相執政侍從臺諌陛下善置人焉雖水火之不相能也必有足以濟治者矣此尤不可不察也建中靖國元年上時為右司諫上欽宗論用人太易楊時臣聞書曰天命有德五服五章哉天討有罪五刑五用哉夫命有德討有罪皆天也人君不得而私焉奉天而已矣臣竊觀陛下即位以來未三月更易宰輔凡八九人大臣民之表古之天子禮貌之而厲其節者也其進之也易故其去之也輕欲其自重而不茍難矣孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之夫上自左右卿大夫之言下逮庶人之議皆曰賢則用之可以無疑矣然猶察之見賢焉然後用之其考審豈不至矣夫湯之用人惟巳由此道也昔季布為河東太守人有稱其賢者文帝召之欲以為御史大夫又言其使酒難近罷之季布曰陛下以一人之譽召臣又以一人之毁去臣恐天下有識者聞之有以窺陛下也若季布之為人固無足為陛下道然其言有足取者臣恐陛下用人如此天下聞之亦有以窺陛下也近見百司羣吏有待次一二年者而復除它人代之此近日嬖倖受賄賂而私請者之所為前此無有也陛下欲盡循祖宗之法不可復用此例謹之於始猶懼不終始之不謹後將若何臣伏望陛下重惜名器無輕以授人一非其人則民受其弊亂之所由生不可忽也仍願聽言而加察焉見賢而後用見不賢而後去無容私焉奉天而巳天下幸甚靖康元年二月上時除右諫議大夫上欽宗論用人太易余應求臣聞重爵位則多士勸謹用人則朝廷尊盖與之不重則下輕上爵易於用人則去之必速此理之必然者近者朝廷此弊尤甚末流至今未之能革陛下臨御甫三月矣凡用四宰相九執政列侍從者十餘人初不謹取故去之毎速近日除用尤為超躐有趣召未至而巳屢遷者有未收功効而與峻職者有自下僚徑為侍從者有取其一言解褐為師儒者有一日差除至二十餘人者其人之賢愚能否固未暇論然視爵位亦太輕矣用人亦太易矣夫賢才之士有可不次用者如湯之於伊尹髙宗之於傅說不過一人而巳未聞當時百執事之衆皆然也方今名器冗濫而未清仕進僥倖而未抑誠宜大有剗革以新初政乃復輕易如此臣竊惜之願詔執事特加詳謹毋備具官僚毋超躐除授毋徇私愛毋用非才使綸綍之下當人心而無煩言則朝廷尊而多士勸政事修而夷狄服矣靖康元年上時為監察御史宋名臣奏議巻十七
