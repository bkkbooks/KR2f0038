body:
  text: 宋名臣奏議卷八十一宋趙汝愚編儒學門貢舉下上哲宗乞置經明行修科司馬光臣伏覩朝廷改科場制度第一場試本經義第二場試詩賦第三場試論第四場試䇿試雜科明法除斷案外試論語孝經義奉聖㫖令禮部與兩省學士待制御史臺國子監司業集議聞奏臣竊有所見不敢不以聞凡取士之道當以德行為先文學為後就文學之中又當以經術為先辭采為後是故周禮大司徒以六德六行賓興萬民漢以賢良方正孝亷質朴忠厚取士中興以後取士尤為精審至於公府掾屬州從事郡國計吏丞史縣功曹鄉嗇夫皆擇賢者為之茍非其人則為世所譏貶是以人人思自砥礪教化興行風俗淳厚及至後世陵夷雖政刑紊於上而節義立於下有以姦回巧僞致富貴者不為清議所容此乃德化之本原王者所先務不可忽也熙平中詔引諸生能文賦者待制鴻都門下蔡雍力爭以為辭賦小才無益於治不如經術自魏晉以降始貴文章而賤經術以詞人為英俊以儒生為鄙朴下至隋唐雖設明經進士兩科進士日隆而明經日替矣所以然者有司以帖經墨義試明經專取記誦不詢義理其弊至於離經析注務隱爭難多方以誤之是故舉人自幼至老以夜繼晝腐肉爛舌虛費勤勞以求應格詰之以聖人之道瞢若面牆或不知句讀或音字乖訛乃有司之失非舉人之罪也至於以詩賦論䇿進士及於末流專用律賦格詩取捨擲其落韻失平側偏枯不對蜂腰鶴膝以進退天下士不問其賢不肖雖頑如跖蹻茍程試合格不廢髙第行如淵騫程試不合格不免黜落老死衡茅是致舉人專尚辭華不根道德涉獵鈔節懷挾勦剽以取科名詰之以聖人之道未必皆知其中或遊處放蕩容止輕儇言行醜惡靡所不至者不能無之其為弊亦極矣神宗皇帝深鍳其失於是悉罷詩賦及經學諸科專以經義論䇿試進士此乃革歷代之積弊復先王之令典百世不易之法也但王安石不當以一家私學欲盡掩先儒令天下學官講解及科場程試同已者取異已者黜使聖人坦明之言轉而陷於竒僻先王中正之道流而入於異端若其論果是先儒果非何患學者不棄彼而從此何必以利害誘脅如此其急也又黜春秋而進諸子廢六藝而尊百家加之但考校文學不勉勵德行此其失也凡謀度國事當守公論不可希時又不可徇俗宜校是非之小大利害之多少使質諸聖人而不謬酌於人情而皆通稽於上古而克合施之當世而可行然後為善也今國家大議科場之法欲盡善盡美以臣所見莫若依先朝成法合明經進士為一科立周易尚書詩周禮儀禮禮記春秋孝經論語為九經令天下學官依注疏講說學士博觀諸家自擇短長各存所見春秋止用左氏傳其公羊榖梁陸淳等說並為諸家孟子止為諸子更不試大義應舉者聽自占習三經以上多少隨意皆須習論語於家狀前開坐習某經某經又每嵗委升朝文官保委一人不拘見在任不在任是本部非本部各舉所知若係親戚亦於舉狀內聲說其舉狀內稱臣竊見某州某縣人某甲有何行能臣今保舉堪應經明行修科於後不如所舉臣甘當連坐不辭候奏狀到朝廷下禮部貢院置簿各分逐路抄録本人姓名注舉主官位姓名於其下仍下本州出給公據付本人收執及令本州亦如貢院置簿抄録准偹開科場日考驗公據其舉狀既上之後若所舉之人犯贓私罪至徒以上情理重及違犯名教候斷訖仍收坐舉主奏乞朝廷取勘施行其人未及第者减五等已及第者减三等坐之一如舉選人充京官法臣竊料此法初行其奔競屬請固不能免若朝廷必坐舉主毋有所赦行三五人後皆自謹擇其人不敢妄舉如此則士之居鄉居家獨處暗室立身行已不敢不謹唯懼玷缺有聞於外矣所謂不言之教不肅而成不待學官日訓月察立賞告訐而士行自美矣每遇開科場其有舉主者自稱應經明行修舉仍於所投家狀前開坐舉主官位姓名有司檢㑹簿上合同方許收接其無舉主者只稱應鄉貢進士舉如常法每舉人三人以上自相結為一保止保委是正身及是本貫不曽犯真刑無隱憂匿服此外皆不保其本州及貢院考試並依舊法差封彌謄録監門巡鋪官程試之日嚴加檢察如舊試經學諸科法各令求已毋得移坐位相從託商量相聚傳義傳本懷挾代筆違者扶出第一場先試孝經論語大義五道內孝經一道論語四道先須備載正文次述注疏大意次引諸家異義次以巳見評其是非以援據精詳理長文優者為通其次為粗援據疏略理短文拙者為否三通以上為合格不合格者先次駮放合格者榜引次場就試如舊試經學諸科法或合格人數太少則委試官臨時短中求長詳酌放過次場試時務次場試尚書次場試周禮次場試儀禮次場試禮記次場試春秋次場試周易大義各五道令舉人各隨所習經就試考校過落如孝經論語法次場論二道一道於儒家諸子書內出題一道於歷代正史內出題次場試䇿三道皆問時務考策之日方依解額及奏名人數定去留編排髙下以經數多者在上經數均以䇿論理長文優在上其經明行修舉人並於進士前别作一項出榜解發及奏名至御前試時務䇿一道千字以上封彌官於號上題所明經及舉主人數候考校詳定畢編排之時亦以經數多者在上經數均以䇿理長文優者在上文理均以舉主多者在上其經明行修舉人亦於進士前别作一項編排先放及第其推恩注官比進士時加優異他時選擇清要官館閣臺諌等並須先取經明行修人其舉主姓名常於官誥前聲說如此則舉人皆務尊尚經術窮聖人指趣不敢不精旁覽子史不敢不博又不流放入於異端小說講求時務亦不敢不知所得之士既有行義又能明道又能博學又知從政其為國家之用豈不賢於今日之所取乎所有今來乞復詩賦者皆嚮日舉人止習詩賦不習經義應舉不得故為此說欲以動搖科場制度為已私便朝廷若不欲棄捐舊人候將來科場進士有特奏名者令試詩賦隨其優劣等第推恩亦無傷也不可以此輕改成法復從弊俗誤惑後生若以為文章之士國家所不可無即乞許人於試本經合格日投狀乞試雜文於試論次場引試或古詩或律詩或歌行或古賦或頌或銘或贊或四六表啓臨時委試官出題目試某文字篇數字數共須及五百字以上取辭采髙者為合格候得解及奏名及第日編排姓名髙下各在經數同等人之上如此則文章之士亦不乏矣至於律令勑式皆當官者所須何必置明法一科使為士者豫習之夫禮之所去刑之所取為士者果能知道義自與法律冥合若其不知但日誦徒流絞斬之書習煆錬文致之事為士已成刻薄從政豈有循良非所以長育人材崇厚風俗也朝廷若不欲廢棄已習之人其明法曽得解者依舊應舉未曽得解者不得更應則收拾無遺矣臣愚所見如此伏乞以臣所奏及禮部等官所議榜國子監門及遍下諸州有州學處榜州學門令舉人限一月內投狀指定何法為善仰本州附遞以聞候到京齊足更委其他執政看詳參酌從長施行元祐元年三月上時為尚書左僕射上哲宗論經明行修科宜罷投牒乞試糊名謄録之制曾肇臣奉詔詳議三省所定科舉條制其經義詩賦等科已與吏部尚書孫永等連狀詳定奏聞外有經明行修舉人一項臣竊有愚見須至別議臣伏以國家取士之制人材之盛衰風俗之美惡繫焉今設經義詩賦等科施之一時則可矣然皆取人以言而不本其行方之於古臣竊以為未也至於詔內外官舉經明行修之士中第之日稍優其禮則不獨取之以言又本其行其意庶乎近古然徒使舉之而不繇鄉里之選又無考察之實與斯舉者隨衆投牒試於有司糊名謄録校一日之長則不唯士失自重之誼且於課試之際無以别異於衆人則所謂本其行者亦徒為虛文而已恐未稱所以命官薦舉優其恩典之意也竊觀三代兩漢人材之盛風俗之美後世所以不能及者取士以行不專以言故也今雖未能盡復古制故經義詞賦等科未可盡廢然馴致先王之治亦宜有漸則經明行修謂冝别立一科稍倣三代兩漢取士官人之法因今之冝斟酌損益要之無失古意而已至於投牒乞試糊名謄録之類非古制者一切罷之待遇恩數盡居經義詩賦等科之上庶使學者知尊經術篤行誼人人勉於自修自一鄉推之以至一縣一縣推之以至一州一州推之以至一路一路推之以至天下則四方之士莫不知尊經術篤行誼以待上之求應上之用如是而人材不盛風俗不美未之有也人材既盛風俗既美則所謂經義詩賦等科非以行誼進者人將恥為之不期於廢而自廢矣如此則經明行修之舉有得士之實不為虛文而已也或謂以行取人則有浮僞矯詐之敝盡去防檢則有交通請謁之私臣以謂此殆論者之私憂過計也夫左道亂衆色取仁而行違者固聖人之所深惡然必有以察之試之於利害得喪之地則可見矣凡人之情孰不好善朝廷誠能正心誠意進任正人明義利之分辨榮辱之境以示天下則雖蚩蚩之民莫不用情以應上况於士哉然則所謂浮僞矯詐之敝非所憂也明考察之方公進退之法以任人之得失為舉者之賞罰行之以信持之以久風俗日入於厚則交通請謁之私又非所憂也三代兩漢之治去今遠矣然臣猶惓惓以此為言者幸遇朝廷欲得經明行修之士故臣欲繇此充之以至於復先王之制以成朝廷之美意其言雖迂其效雖遠然有志於古者恐不能以彼而易此也伏望聖慈特加詳察如臣言萬一可採其設科舉士之制願詔有司取三代兩漢之法見於今者參時之冝裁定其當元祐元年上時為中書舍人上哲宗論奏舉經明行修不冝用升朝官泛舉劉摯臣伏覩近制升朝官各舉進士經明行修一人及升等推恩理為舉主過犯同罪等事臣竊原朝廷之意患程試考校徒得文辭故更立此制以進行實天下幸甚臣退而熟計及考校士大夫之議以謂法則善矣然使升朝官舉之不若使郡守以上舉之臣謹條上利害按國朝舊制臣寮任通判知州乃得舉官蓋知人實難非行已謹閲事久誠未可責以保任今升朝官無贓罪若私罪重此外不計資任不察能否門調諸科刀筆之吏一切得薦士此不可一也經術深淺問而可知也至於行義汙潔非鄉里庠序羣居久處毁譽素著誰能知之今不拘路分但非有服親皆得奏舉臣恐流離之人虛僞見售此不可二也天下升朝官無慮幾二千人則所薦士亦如之積纍嵗月不被薦者無幾矣人人升等推恩無以示勸此不可三也議者謂朝士固皆選擇可任使之人然入流不一貟品猥衆今勢利相市必有受賕致訟以撓陛下之法者臣誠淺薄不敢臆度朝士大夫以為必然亦不敢以為不然然則舉選之利未見而奔競之俗先成此不可四也傳曰十室之邑必有忠信計今天下之士一郡一邑隨其衆寡必有善士考鄉里之行詢庠序之論其勢親其事察無如州郡之吏至於監司則朝廷所任以按察臺諌侍從亦朝廷所倚以議論故臣願每遇科場詔下委逐州長吏奏舉經明行修進士一名仍以應舉實數二百人為率不滿二百聽舉一名每二百人加一人至三人止監司轉運司判官以上於本路在京臺諌以上於開封國子監各許奏舉一名非鄉貢及不經學校或無可應詔並聽勿舉自餘升等推恩理舉主同罪犯等事並依元降朝㫖臣愚以謂三代鄉舉之制未易遽復欲少放古則諸侯嵗貢之法莫此為近元祐元年六月上時為御史中丞始詔朝官通判資序以上人方許保舉上哲宗論特奏名舉人蘇軾等臣等伏見從來天下之患無大於人人能言其弊而不能去其害唯往年韓琦富弼等獨能裁减任子及展年磨勘發議之初士大夫相顧莫敢以身當之者以為必致謗議而琦等不顧既立成法天下肅然無一人非之者何則私欲不可以勝公議故也流弊之極至於今日一官之闕率四五人守之爭奪紛紛亷恥道盡中材小官闕遠食貧到官之後求取漁利靡所不為而民病矣今日之弊譬如羸病之人負千鈞之重縱未能分减豈忍更添臣等自入貢院四方免解舉人投狀稱今來係是龍飛榜乞為敷奏法外推恩者不可勝數臣等一切不行兼不住有經朝省下狀䝉送下本院只是坐條告示近准聖㫖依逐舉體例下第舉人各以舉數特奏名已約計四百五十人今日又准尚書省劄子取前來聖㫖特奏名外各遞减一舉人數若依此數則又添數百人雖未知朝廷作何行遣不當先事建言但恐朝命已行即論奏不及臣等伏見恩榜得官之人布在州縣例皆垂老别無進望唯務黷貨以為歸計貪冒不職十人而九朝廷所放恩榜幾千人矣何曽見一人能自奮勵有聞於時而殘民敗官者不可勝數以此知無益有損不言可知今之議者不過謂即位之初宜廣恩澤茍以悅此僥幸無厭數百人者而不知吏部以有限之官待無窮之吏戶部以有限之財祿無用之人而使州縣舉罹其害乃即位之初有此過舉謂之恩澤非臣等所識也伏乞斷自聖意明勑大臣特奏名舉人只依近日聖㫖指揮仍詔殿試考官精加考校量取一二十人委有學問詞理優長即許出官其餘皆補文學長史之類不理選限免使積弊之極增重不已臣等非不知言出怨生既忝近臣理難緘默貼黃稱臣覺見備員吏部親見其害闕每一出爭者至一二十人雖川廣福建烟瘴之地不問日之逺近唯欲爭先注授臣竊怪之隂加訪聞以為受官之後即請雇錢多者至五七十千又既受逺闕許先借料錢逺者許借三月又得四十餘千以貪婪無知之人又已衰老到官之後望其持亷奉法盡心治民不可得也元祐三年二月以翰林學士權知貢舉同孫覺孔文仲上上哲宗論殿試冝依神宗故事用䇿傅堯俞臣等伏以天子親䇿貢士自漢以來未之有改唐之進士雖試詩賦然有司奉行而巳國朝開寶六年太祖始召進士親試於廷當時公卿不知建明易以䇿問而唯詩賦之用因㳂著令莫知能改神宗皇帝以為非天子臨軒所以延見貢士詢求治道之體熙寧三年始改問䇿迄于元豐五賜䇿矣乃者陛下遵先帝之舊親䇿進士所問災異外敵官冗財費之類皆今日急務不可以已而議者獨疑以為定例之可預造且韋布草野之士修於家肄於學日夜講說者固所以待問於上也誠能攄其藴蓄應問如響不失所對雖預備而貫穿之何害於得士若夫知捃掇陳說充以蕪語無當於對問而弗加汰擇知荒唐濫中侫諛希合以異為瑞之類而弗加紏絀皆考官之過非䇿之訾也議者徒知對䇿之宿造預作不知辭律之學亦有記誦編集之患知進士之能備問不知賢良茂材之備問尤詳也臣等以謂學校教諸生州郡發解禮部考貢士今巳悉用詩賦足審其辭所有御前進士冝一依先帝故事試䇿合於古義於體為允其御試對䇿雖有文采而於問義不相當若詞涉諛媚及文理踈淺者冝約舊制量定分數取㫖絀落不得雷同入等如此則士無濫中而考官不敢率意升降矣貼黃稱制䇿所問安有定制或古今政務或天下名數疑難之類如漢董仲舒對符命性情文質之異杜欽以經對六事繫自臨時取㫖非疏逺所能一一預度不當偶以前日隂雪衆人所知而謂皆可宿造也元祐四年上時為御史中丞宋名臣奏議卷八十一
