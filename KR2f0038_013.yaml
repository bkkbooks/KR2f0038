body:
  text: 宋名臣奏議卷十三宋趙汝愚編君道門用人一上真宗乞用宿舊大臣以小人為戒謝泌臣伏覩詔書以近日不逞之徒所陳述者皆閭閻猥媟之事臣聞古先哲王詢於芻蕘察於邇言者蓋慮視聽壅蔽故採此以達於物情亦罕聞用其言不察其實而遽行其事也易曰小人勿用必亂邦也先朝時侯莫陳利用陳廷山鄭昌嗣趙贊之徒喋喋利口人心惟危賴先帝聖聰尋各誅剪然為患已深矣此皆陛下備見之也自陛下臨御以來盡去此輩是以天下咸知日月之明乾坤之大詩云靡不有初鮮克有終望陛下行之久而惟新唐明皇初用姚宋則治晚用林甫國忠則亂此亦望陛下深加聖慮臣聞工欲善其事必先利其器古者輔聖帝佐明王建萬世之基立不拔之䇿者必倚老成之人至於成康刑措蓋從周召之謀文景清靜亦用蕭曹之畫明皇太平復是姚宋之䇿夫精練國政斟酌王度未聞市井之徒塵走之吏可當其任也陛下深察前古用小人則亂用大臣則治然後小人不敢萌心而大賢得以畢力也咸平元年上時知虢州上仁宗乞令韓琦范仲淹更任內外事富弼臣伏聞近降敕命除陜西四路招討經略使韓琦范仲淹並授樞密副使仰認聖意只從公論不聽讒毁擢用孤逺天下之人皆謂朝廷進用大臣常如此日則太平不難致也然議者惟云進用大臣雖則美矣其如西冦未殄亦須藉才若二人俱來或恐闕事羣論皆願一名召來使處內一名就授樞副之命且令在邊表裏相應事無不集以臣愚慮亦謂羣衆所說甚得允當然近日或聞有異議者謂樞密副使不可令帶出外任恐他時武官援此為例深不穩便此乃橫生所見巧為其說沮陛下獨斷之明害天下至公之論臣謂立此異議者必知韓琦范仲淹以西事方急堅辭此職既未肯從命而來又不令帶出外任是欲惑君聽抑賢才姦邪用心一至於此况先朝纍曾有大臣帶兩府職任應急出外事畢還朝不聞後來有武臣援以為例臣願陛下無信異說專採公論一名召來使處於內一名就授樞副之職且令在邊或許二人一嵗一更均其勞逸亦甚穩便內外協濟無善於此臣旦夕來聞韓琦范仲淹已有奏報西事未了懇辭恩命朝廷乘此處分深合事宜臣不勝懇懇激切之至慶厯三年四月上時為資政殿學士兼侍讀學士上仁宗乞令韓琦范仲淹更任內外事蔡襄臣伏見陜西路招討使韓琦范仲淹等各除樞密副使並以西寇未寧懇辭恩命朝廷再賜手詔督令赴闕臣竊料琦等必再有陳論辭免於未決之間而異同之說有三焉曰使琦仲淹偕來也曰一處乎內一處乎外也曰皆留在邊也使之偕來者此朝廷之本意蓋陛下推獨斷之明採至公之論以二人久處邊陲詳知本末致之宥密思有變更將以求破賊之計耳然論者之說曰邊臣最苦者奏報文字或有稽緩或即裁制動不如意所以久無成功今得邊臣而任之則細大可知表裏相應也用兵不勝由軍制未立無部分統轄之法若不更變未見可勝之期今得邊臣而任之可責以更變之術所以宜一處乎內也西寇雖已請盟而戎心不可倚信琦等素習兵事上下之情通浹今盡還朝新帥鄭戩山川之險易未知軍旅之部伍未練若賊乘我機便忽有奔突必難制禦此所以宜一留於外也曰皆留在邊者此沮抑之論也惡琦仲淹者若於陛下前百般毁短之陛下必不信矣若稱其材德而言陛下不得不疑也必謂仲淹等威名已著羌戎甚畏今將去邊必有侵擾臣謂不然仲淹作招討使羌戎既畏其威名今在樞府正議兵謀其畏必甚矣若謂關中民情素所倚賴今既還朝衆所失望臣又謂不然在陜西民既倚賴今在樞府必陳利病而行之所賴者愈大以是校之情僞甚明然或者謂二人孰宜處於內外臣以物議言之二臣之忠勇其心一也若以才謀人望則仲淹出韓琦之右處內者謀之而處外者行之故仲淹宜來琦當留邊於理甚當也其韓琦范仲淹伏乞朝廷不聽辭避各授恩命上以明陛下任賢之堅意下以協衆庶之公論也慶厯三年四月上時為祕書丞知諫院上仁宗論用韓琦范仲淹不宜使後有讒間不盡所長蔡襄臣伏見去月以來陛下拔任諫官都下翕然稱慶又數日罷夏竦樞密使用韓琦范仲淹作樞密副使制命一出士大夫賀於朝庶人喜於路至有飲酒叫號以為樂者謂陛下去邪任忠可刻日以觀太平矣臣聞易泰之彖辭曰內君子而外小人君子道長小人道消否之彖辭曰內小人而外君子小人道長君子道消然則君子進則天下泰小人進則天下否陛下退一邪臣進一賢人而舉國歡欣者豈以一邪一賢獨能關天下利害乎蓋以一邪退則其類退一賢進則其類進衆邪並退而衆賢並進而天下不泰者無有也雖然臣竊憂之頃年莊獻明肅太后初棄六宫陛下親臨庶政一日出令邪臣沮氣天下觀聽灑然快意期於一變以臻大治自後數年方內無事左右之臣易於襲常而恬於茍安陛下憂勤之心且亦少懈已而西羌背違舉兵寇邊遣將興師屢戰屢敗饋運賦斂百姓困窮北庭乘勢窺我彊弱遣使求地京師震駭幸而增賂以得暫息四海嗷嗷日憂一日以將來之患當如何也然猶指忠賢之士而屬望焉幸而進用庶其叶力而大有為以解焦勞之急陛下奮發剛斷博採物論拔而任之人人歡欣而臣獨竊憂者誠恐進用之後或有讒間或拘舊例使之不盡所長而去則天下必有遺材之恨所損不細矣當今天下之病臣請譬諸病者其安時調養適宜固不病矣其在皮膚醫者能早去之病且安矣此二者皆已不及而病在肢體正待良醫之時陛下又選任良醫儻信任不疑聽其設施非徒愈病又致民於壽考茍於此時使良醫不得盡其術則天下之病愈深雖有和扁之妙難責速效矣願陛下思祖宗社稷之重矜四海生民之困憤西北二敵之恥發乾剛夬決之道拔賢材收衆䇿不憚改作以成大功天下幸甚慶厯三年五月上上仁宗乞令韓琦居中范仲淹在外歐陽修臣風聞如定等不久放還竊緣此來議論未必諧和須慮驕賊猖狂忿兵攻寇凡關防邊備正要枝梧伏覩朝㫖已差范仲淹田況等為宣撫使今日風聞韓琦以仲淹已作參政欲自請行不知是否以臣愚見不若且遣仲淹速去琦與仲淹皆是國家委任之臣材識俱堪信用然仲淹於陜西軍民恩信尤為衆所推服今若仲淹外捍寇兵而琦居中應副必能共濟大事庶免後艱若陛下以新用仲淹責其展效則且令了賊一事俟邊防稍定不兩三月自可還朝既先弭於外虞可漸修於闕政今邊事是目下之急不可遲緩以失事機伏望斷自宸𠂻趣仲淹速去以備不虞慶厯三年七月范仲淹為陜西宣撫使八月丙申田況為陜西宣撫副使丁未仲淹參知政事癸丑韓琦代仲淹為陜西宣撫使故修上此奏時知諫院上仁宗乞力拒浮議終責任范仲淹等歐陽修臣伏聞范仲淹富弼等自被手詔之後已有條陳事件必須裁擇施行臣聞自古帝王致治須待同心叶力之人相與維持而君臣相得之難謂之千載一遇今仲淹等遇陛下聖明可謂難逢之㑹陛下有仲淹等亦可謂難得之臣陛下既已傾心待之仲淹等亦又各盡心思報上下如此臣謂事無不濟但顧行之如何爾况仲淹弼是陛下特出聖意自選之人初用之時天下已皆相賀然猶竊謂陛下既能選之未知用之如何耳及見近日特開天章從容訪問親寫手詔督責丁寧然後中外喧然既驚且喜此二盛事固以朝報京師暮傳四海皆謂自來未曾如此責任大臣天下之人延首拭目以看陛下用此二人欲作何事此二人所報陛下果有何能是陛下得失在此一舉生民休戚繫此一時以此而言則仲淹等不可不盡心展效陛下不宜不力主而行使上不玷知人之明下不失四海之望臣非不知陛下專心鋭志必不自怠而中外大臣且憂國同心必不相忌而沮難然臣所慮者仲淹等所言必須先絶僥幸因循姑息之事方能救數世之積弊如此等事皆外招小人之怨怒不免浮議之紛紜而姦邪未去之人亦須時有讒沮若稍聽之則事不成矣臣謂當此事初尤須上下叶力凡小人怨怒仲淹等自以身當浮議姦讒陛下亦須力拒待其久而漸定自可日見成功伏望聖慈留意終成之則社稷之福天下之幸也慶厯三年十月上時知諌院上仁宗乞平時蓄養賢俊余靖臣竊聞京西轉運使杜把准中書劄子奉朝㫖抽赴闕欲令計置收捉宜州蠻賊者臣以為朝廷蓄養賢俊當如民家收積財貨平時先有營度至急乃得其用伏自去年以來陜西舉知州始用杜把三司擇通判則又用杞京西多盜賊則又用把今兹蠻人作叛則又用把皆席未遑暖而即移之是使杜把有奔命之勞朝廷有乏賢之嘆如斯事體良亦可惜臣親見杜把言京西之政始有端緒而未盡施設今遽捨去不成績效此屢易官之患也伏惟廟堂之上當思天下有多少賢才可與共了天下事者廣為詢訪預作處置某人可了某職某人可當某路一旦緩急用之如指諸掌此乃廟堂之䇿當有素定者也今二年之內講求賢俊只知有一杜把何觀聽之不廣示天下以狹也設使别路更有賊盜則將又移杜把無乃取笑四方乎每見大臣謀事當平居無事時優游暇逸如不足憂者及一隅有警則倉皇移易如素不經心者且去年冬兩府大臣共選諸路轉運使故田瑜為廣西轉運使梁載為判官必謂才能出人今蠻徼才動未見瑜等如何處置有甚利害早已疑之此擇人之術不自信矣始若不知不如勿用只如近差王絲往湖南安撫待其奏報不中事節乃知其人不可委任知人不明為害不細伏望陛下敕諭兩府大臣廣思博採天下賢才以應萬務無使臨事倉卒有乏才之歎則社稷之福古人有言曰霸王之主終不採將於往賢求相於後哲自是識拔不明求之不至不可厚誣四海謂之乏賢惟陛下圖之慶厯四年四月上時為右正言同修起居郎上仁宗論用人太察之弊尹洙臣聞至治之本在於務大體不在乎任察也漢明帝察察唐德宗以察為明皆著譏前史非盛德之論然則衆之好惡必察之臣之忠邪必察之非為究發隱微作為聰明者也近聞詔獄所治類多善士因醉飽之失發曖昧之罪臣竊以為過矣大抵士君子少長修飭始終如一者皆純固介特之士舉朝論之百不一二至於年位尚輕頗或疏縱及寄責稍重始自矯厲而能建事功於世立名節之效者不可勝紀此殆常人之情明主所深亮也兹事雖往臣所慮者上下相伺動輒得咎刻薄之風寖以成俗於盛明之治所損不細非特為二三子言也又比年以來既行之恩尚或中寢既用之法罕䝉開釋豈搏擊之言易以進寬厚之論難為陳哉伏惟陛下采漢臣窺私之誡鑒吳主校事之弊因慶澤之後發寬大之詔明諭有司凡臣下纎介之惡非虧損教誼侵害民物者勿復以聞至若暴亂之萌驕僣之原誣罔朋比狥私滅公此王誅之所先願陛下留神聽察無志其細而遺其大則善者聳而惡者戒矣狂瞽之言惟聖明財擇慶厯四年十一月甲子監進奏院左班殿直劉㢲大理評事集賢校理蘇舜欽並除名勒停工部貟外郎直龍圖閣兼天章閣侍講史館檢討王洙落侍講檢討知復州太常博士集賢校理刁約通判海州殿中丞集賢校理江休復監蔡州稅殿中丞集賢校理王益柔監復州稅並落校理降太常博士周延雋為袐書丞集賢校理章岷通判江州著作郎集賢院同修起居注呂溱知楚州殿中丞周延讓監宿州稅校書郎館閣校勘宋敏求簽書集慶軍節度判官事將作監丞徐綬監汝州葉縣稅先是杜衍范仲淹富弼等同執政多引用一時聞人欲更張庶事御史中丞王拱辰等不便其所為而舜欽仲淹所薦其妻又衍女也少年能文章議論稍侵權貴㑹進奏院祠神舜欽循前此用鬻故紙公錢召妓女間席㑹賔客拱辰亷得之諷其屬魚周詢劉元瑜等劾奏因欲搖動衍事下開封府治於是舜欽及㢲俱坐自盜洙等與妓女雜坐而休復約延雋延讓又服慘未除益柔并以謗訕周孔坐之同時斥逐者多知名士世以為過薄而拱辰等方自喜曰吾一舉網盡矣時為直龍圗閣知潞州上仁宗論誠與疑乃治亂興亡之本何郯臣聞興邦國之治在通上下之情通上下之情在體天地之道故天地交而萬物生由至和被焉君臣交而衆情達緣至誠感焉在易有之上下相交而志同則為泰蓋人情亨通而至也上下不交而志乖則為否由物情乖阻而然也斯道得失繫時興亡傳曰商以兆人離周以十人同離則自疑生同則由誠至唯誠與疑乃治亂興亡之本人君可不鑒哉恭惟陛下以寬大之資紹宅丕緒以博厚之度信待羣后純用一德懷來衆心然而厯選大臣其間豈無一持詐之老博求多士其間豈無一懷欺之人然不可以一臣詐而疑衆臣一士欺而疑衆士嚮以陛下懲艾所任疑阻微生羣臣承風殊少開悟獻計議者迎陛下之意多有嫌避明約束者窺陛下之㫖動設猜防日增月加寖成其弊於國體有損於人情靡安今略舉疑二之大端足以明其害而監其失夫擇官者宰輔之職今補一吏則疑其涉私故常務頗勞於親決矣分閫者將帥之任今專一事則疑其異圖故多方而加其羈制矣博訪者大臣之體今見一士則疑其請託故賓客有時而不許接矣相先後者士人之常今進一善類則疑其朋黨故推薦不得而行矣分邪正者言官之職今斥一邪人則疑其愛憎故忠憤不得而伸矣凡兹任事者皆公卿士大夫之職周旋忠力乃其責也彼之觸法皆胥吏小人之事乾沒姦利乃其分也今持周旋忠力之人防如乾沒姦利之類欲其廉恥興行人物忠厚不可得矣一生此風遂致弊俗非但君疑於下抑亦臣疑於上焉故大臣疑用之不專則不敢任事矣小臣疑待之不厚則不敢輸忠矣備顧問者疑言之不從則不敢抗論矣懷忠讜者疑誠之不達則不敢盡規矣慕功名者疑任之不固則不敢專行矣若循此不返是朝廷無必可信之士無必自保之人君臣上下交相疑而欲天下無否塞之患猶却行而求及前人也此非陛下素志之然皆臣下避忌順成之過也夫不忌不克周文所以基王迹也豁達大度漢髙所以成帝圖也雄猜多忌魏武所以失君德也唐太宗於君臣去形迹而致貞觀之治德宗待宰輔多疑二而召奉天之亂此數君者皆非常主也然而無忌克能豁達則興邦致治之如此持雄猜懷疑二則失德召亂之如彼是皆往世明驗顯效不得不戒之爾伏望陛下體天地所以交泰而推誠於君臣之際監周文漢髙唐太宗所以興邦致治而圖其安戒魏武德宗所以失德召亂而防其危分國政以授之相委戎事以歸之將至於羣司多士各付所職使尊者執其要卑者治其詳陛下髙拱而統臨之唯威福政令則必自已出其他盡付之有司孰敢不為陛下悉力也傳曰疑則不任任則不疑斯理之然也以陛下今求治之心其事在一易慮之間耳何憚而不為也但慮及之則風俗可丕變天下可亨㑹治平之風夫何逺之有臣以愚淺素懵治體然病今之公卿大夫以疑阻相承以成陛下之失故敢覼縷而陳之夫志忠則語切而辭多伏惟聖明不以狂愚而遺其言則死生幸甚慶厯七年上時為言事御史上仁宗論宰執進賢當去形迹包拯臣伏見朝廷纍年以來凡進用庶官裁處大事必避形迹以為公道上下相蔽習以為常有才者以形迹而不敢用不手者以形迹而不敢去事有可為者以形迹而不為事有不可行者以形迹而或行此蓋茍避中傷以防後害爾為身謀則可為國謀則不當如是此最時政之大害也且天子擇宰相宰相擇諸司官長諸司官長參舉僚屬俾公卿大夫而下各稱其職然後推誠委任坦無疑二則中外協濟政務修舉如此而不臻古治者臣所未諭也臣伏見唐書太宗朝或言魏徵阿黨者帝使溫彥博驗之無狀因令彥博責之且曰今後不得不存形迹他日徴入奏曰臣聞君臣協契義同一體豈可不存公道惟事形迹若君臣上下同遵此路則邦之興喪或未可知帝矍然改容曰吾已悔之矣又髙宗嘗責侍臣不進賢才李安期對曰聖帝明王莫不勞於求賢逸於任使設使堯舜苦已癯瘠不能用賢亦王化不行况天下至廣非無英彥但比近公卿薦引即遭囂謗以為朋黨况沉滯者未伸而在位者已損所以人思茍免競為緘默若人主虛已招納廣務搜訪不忌恩讎惟能是用讒既不入誰敢不竭忠誠此皆事由君上非臣下所能致也髙宗深納其言所以貞觀水徽之代最號太平者蓋由廣延納之道推至公之心使之然矣宜乎載在史冊煥為美談伏自陛下嗣守神器已逾三紀日御便殿孜孜求治雖古先格王未有如是之焦勞也而時多疵癘民未冨庶國廪罕蓄邦計益削者何也蓋知人用人之道恐有所未盡爾昔齊桓公問管仲曰何者害霸對曰不能知人害霸也知而不能用害霸也用而不能信害霸也既信而又使小人參之害霸也夫管仲一諸侯佐爾况巍巍盛德復將有所間然乎伏望陛下奮乾剛之威確然獨斷申命宰執進用賢雋斥去形迹之弊以廣公正之路判忠佞抑僥幸察左右愛憎之說延中外讜直之議重惜名器振舉綱目則可使教厚於上民恱於下召天地之和氣致邦家於永寧惟在陛下日謹一日力行而已皇祐二年上時以天章閣待制知諫院上仁宗論吳充不當以譴責禮生被逐劉敞臣伏聞同知太常禮院吳充鞠真卿並除知軍差遣館閣補郡蓋是常事資序之間亦無重輕今者在外論議皆云鞠真卿曾因自陳先有指揮而吳充只緣公事譴責禮生以此忤㫖不審虛實但此聲既布此體可惜何者吳充官則博士職則禮院朝廷欲有興為詢求宜適而胥吏輒敢擅發印狀曾不禀問此則豈惟輕侮吳充而已實亦上忽詔㫖在於事體不得不怪而太常寺長官初不糾按開封府受牒又曲為容庇觀此首尾乃是禮生可誅太常寺可責開封府可劾而吳充可賞也今既未然禮生一以贖論禮官隨而斥罷自然衆情不能無惑也朝廷久安吏習因循百司庶府處處茍且稍激厲振職尚未知如何更行此事恐淺近之徒因以為戒且云吳充以振舉職事被謫以譴劾胥吏被逐不如茍且豈不傷事豈不害政哉先王所以下酌民言釋疑止謗蓋為此也伏望聖慈追正前命臣初拜官謝恩面䝉開許有不便事得以奏陳奉承以還不敢失墜竊謂外間此議實稱不便至和元年十一月上時知制誥上仁宗論人主不宜好疑自用與下爭勝歐陽修臣聞自古有天下者莫不欲為治君而常至於亂莫不欲為明主而常至於昏者其故何哉患於好疑而自用也夫疑心動於中則視聽惑於外視聽惑則忠邪不分而是非錯亂是非錯亂則舉國之臣皆可疑盡疑其臣則必自用其所見夫以疑惑錯亂之意而自用則多失失則其國之忠臣必以理而爭之爭之不切則人主之意難回爭之切則激其君之怒心而堅其自用之意然後君臣爭勝於是邪佞之臣得以因隙而入希㫖順意以是為非以非為是惟人主之所欲者從而助之夫為人主者方與其臣爭勝而得順意之人樂其助已而忘其邪佞也乃與之并力以拒忠臣夫為人主者拒忠臣而信邪佞天下無不亂人主無不昏也自古人主之用心非惡忠臣而喜邪佞也非惡治而好亂也非惡明而欲昏也以其好疑自用而與下爭勝也使為人主者豁然去其疑心而回其自用之意則邪佞逺而忠言入則聰眀不惑而萬事得其宜使天下尊為明主仰為治君豈不臣主俱榮而樂哉與其區區自執而與臣下爭勝用心益勞而事益惑者相去逺矣臣聞書載仲虺稱湯之德曰改過不吝又戒湯曰自用則小成湯古之聖人也不能無過而能改過此其所以為聖也以湯之聰明其所為不至於繆戾矣然仲虺猶戒其自用則古之人主惟能改過而不敢自用然後得為治君明主也臣伏見宰臣陳執中自執政以來不叶人望纍有過惡招致人言而執中遷延尚玷宰府陛下憂勤恭儉仁愛寬慈堯舜之用心也推陛下之用心天下宜至於治者久矣而紀綱日壞政令日乖國日益貧民日益困流民滿野濫官滿朝其亦何為而致此由陛下用相不得其人也近來宰相多以過失因言者罷去陛下不悟宰相非其人反疑言事者好逐宰相疑心一生視聽既惑遂成自用之意以謂宰相當由人主自去不可因言者而罷之故宰相雖有大惡顯過而屈意以容之彼雖惶恐自欲求去而屈意以留之雖天災水旱飢民流離死亡道路皆不暇顧而屈意以用之其故非他直欲阻言事者爾言事者何負於陛下哉使陛下上不顧天災下不恤人言以天下之事委一不學無識諂邪很愎之執中而甘心焉言事者本欲益於陛下而反損聖德者多矣然而言事者之用心本不圖至於此也由陛下好疑自用而自損也今陛下用執中之意益堅言事者攻之愈切陛下方思有以取勝於言事者而邪佞之臣得以因隙而入必有希合陛下之意者將曰執中宰相不可以小事逐不可使小官動搖甚者則誣言事者欲逐執中而引用他人陛下方患言事者上忤聖聰樂聞斯言之順意不復察其邪佞而信之所以拒言事者益峻用執中益堅夫以萬乘之尊與三數言事小臣角必勝之力萬一聖意必不可回則言事者亦當知難而止矣然天下之人與後世之議者謂陛下拒忠言庇愚相以陛下為何如主也前日御史論梁適罪惡陛下赫怒空臺而逐之而今日御史又復敢論宰相不避雷霆之威不畏權臣之禍此乃至忠之臣也能忘其身而愛陛下者也陛下嫉之惡之拒之絶之執中為相使天下水旱流亡公私困竭而又不學無識憎愛挾情除改差繆取笑中外家私穢惡流聞道路阿意順㫖專事逢君此乃諂上傲下愎戾之臣也陛下愛之重之不忍去之陛下睿智聰明羣臣善惡無不照見不應倒置如此直由言事太切而激成陛下之疑惑爾執中不知廉恥復出視事此不足論陛下豈忍因執中上纍聖德而使忠臣直士卷舌於明時也臣願陛下豁然回心釋去疑慮察言事者之忠知執中之過惡悟用人之非法成湯改過之聖遵仲虺自用之戒盡以御史前後章疏出付外廷議正執中之過惡罷其政事别用賢材以康時務以拯斯民以全聖德則天下幸甚臣以身叨恩遇職在論思意切言狂罪當萬死至和二年六月同賈黯上時為翰林學士上仁宗論欲用忠賢當去左右之私言馬遵臣聞自古人君皆欲求忠以自助求賢以自為然而治少而亂多者蓋其所謂忠者不忠而賢者不賢也故知人則哲堯舜其難今陛下至仁求治堯舜之用心也其於知人亦不為易必欲得忠賢而用之莫若去左右之私言采中外之公議則其人可知矣知而用之則朝廷無事而天下太平矣狂言聖擇或補萬分至和二年上時為言事御史上仁宗論用人之要在先察毁譽之人歐陽修臣伏覩近降制書除賈昌朝為樞密使旬日以來中外人情莫不疑懼搢紳公議漸以沸騰蓋緣昌朝禀性回邪執心傾險頗知經術能文飾姦言善為隂謀以陷害良士小人朋附者衆皆樂為其用前在相位屢害善人所以聞其再來望風畏恐陛下聰明仁聖勤儉憂勞每於用人尤所審謹然而自古毁譽之言未嘗不並進於前而聽察之際人主之所難也臣以謂能知聽察之要則不失之矣何謂其要在先察毁譽之人若所譽者君子所毁者小人則不害其為進用矣若君子非之小人譽之則可知其人不可用矣今有毅然立乎朝危言讜論不阿人主不附權臣其直節忠誠素為中外所稱信者君子也如此等人皆以昌朝為非矣宦官宫女左右使令之人往往小人也如此等人皆以昌朝為是矣陛下察此則昌朝為人可知矣今陛下之用昌朝與執政大臣謀而用之乎與立朝忠正之士謀而用之乎與左右近習之人謀而用之乎或不謀於臣下斷自聖心而用之乎昨聞昌朝隂結宦官創造事端謀動大臣以圖進用若陛下與執政大臣謀之則大臣勢在嫌疑必難啓口若與立朝忠正之士謀之則無不以為非矣其稱譽昌朝以為可用者不過宦官左右之人爾陛下用昌朝為天下而用之乎為左右之人而用之乎臣伏料陛下必不為左右之人而用之也然左右之人謂之近習朝夕出入進見無時其所讒諛能使人主不覺其漸昌朝善結宦官人人喜為稱譽朝一人進一言暮一人進一說無不稱昌朝之善者陛下視聽漸熟遂簡在於聖心及將用之時則不必與謀也蓋稱薦有漸久已熟於聖聰矣是則陛下雖斷自聖心不謀臣下而用之亦左右之人積漸稱譽之力也陛下常患近嵗以來大臣體輕連為言事者彈擊蓋由用非其人不叶物議而然也今昌朝身為大臣見事不能公論乃交結中貴因內降以起獄訟以此規圗進用竊聞臺諫方欲論列其過惡而忽有此命是以中外疑懼物論喧騰也今昌朝未來議論已如此則使在其位必不免言事者上煩聖聽若不爾則昌朝得遂其志傾害善人壞亂朝政必為國家生事臣愚欲望聖慈抑左右隂薦之言採縉紳公正之說早罷昌朝還其舊任則天下幸甚臣官為學士職號論思見聖心求治甚勞而一旦用人偶失外廷物議如此既有見聞合思裨補嘉祐元年十一月上時為翰林學士宋名臣奏議卷十三
