body:
  text: 宋名臣奏議巻三十宋趙汝愚編帝系門皇太子上上眞宗乞早建儲闈田錫臣竊覩唐憲宗即位改元元和四年冬十月御宣政樓冊皇太子又按李絳論事集元和三年翰林學士李絳等上言曰古先哲王以天下為大器知一人不可以獨理四海不可以無本故立太子以副已設百司以分職然後人心大定宗社永寧有國家者不易之道也陛下嗣膺大寳四年于兹矣而儲闈未建典冊不行是開窺覦之端乖重謹之義非所以承宗廟重社稷也憲宗依所請下制所司擇日備禮冊命今陛下自纂承大位改元以來五年于兹矣儲闈未建典冊不行豈不慮窺覦之端豈不思重謹之義宜速以宗社永寧為圗也咸平元年上時為侍御史知雜事上仁宗乞遴擇宗親試以職務張述臣聞漆室之女有憂國之心倚檻而嘆臣位於朝二十五年而區區之慮不蚤為陛下建長世之䇿是漆室之不若也臣實憂之有生之命繫於宗廟社稷之重而以繼嗣為之本匹夫匹婦有百金之産猶能定謀託後事出于素况有天下者哉建隆乾徳之臣子孰不願太祖皇帝享年億萬者而端拱天禧之臣子其心亦莫不若此然天地有運行日月有盈昃隂陽之數有俊有章氣至而回事極而變理之必然者也藝祖以神器付太宗太宗以傳真宗真宗以傳陛下陛下承三聖之業傳之于千萬年斯為孝矣而春秋四十四宗廟社稷之繼未有託焉此臣所以夙夜彷徨而憂也陛下知此矣而以嫌疑不決非孝也羣臣知此矣而以避諱不言非忠也陛下享天下之貴而不自怠有天下之冨而不自侈過成康文景逺矣謂宜黙祈天地嶽瀆分寵六宫用均愛施或未之獲則遴擇宗親才而賢者異其禮秩試以職務俾内外知聖心有所屬則天下大幸皇祐五年上時為太常博士同前係第二狀張述臣聞明兩作離大人以繼明照于四方離為日君象也二明相繼故能乆照東昇西没一晝一夜數之常也陛下御天下將三紀是日之正中也而未聞以繼照為慮臣誠疑之夫嗣不早定則有一旦之憂而貽萬世之患厯觀前世事出倉猝則或宫闈出令或宦官主謀或姦臣首議貪孩孺以乆其政冀闇昧以竊其權安危之機發於頃刻而朝議恬不為計豈不危哉至和元年上上仁宗乞參考祖宗故事以定大計范鎮臣伏惟陛下置諫官者為宗廟社稷計也諫官而不以宗廟社稷計事陛下者是不知諫官之任也陛下不以臣愚任之諫官臣敢不以宗廟社稷計獻于陛下乎二月中臣使契丹還過河北河北之人籍籍紛紛皆謂陛下方不豫時有言曰我為宗廟社稷計以廣孝憂勞而成此疾陛下所謂宗廟社稷計而憂且勞者得非皇嗣未立乎是時中外皇皇莫知所為而陛下以宗廟社稷為念是陛下之計慮至深且明也今陛下既已平復御殿聽政願推向者之言而終行之行之之術非明則不審非果則不決惟審與決而宗廟社稷之計定矣方今祖宗後裔蕃衍盛大信厚篤實伏惟陛下擇其尤賢者優其禮數試之以政與圖天下之事以係天下人心異時誕育皇嗣復遣還邸則真宗皇帝時故事是也初周王既薨真宗皇帝取宗室子養之宫中者天下之大慮也太祖皇帝捨其子而立太宗皇帝者天下之大公也伏惟陛下觀太祖皇帝之公心考真宗皇帝時故事㫁于聖心以幸天下臣不勝大願臣考之于昔參之于今謀之于心書之于疏疏成而累月不上者大懼無益于事死今之世以累陛下之明伏惟赦臣萬死之罪審之決之以定宗廟社稷之至計非獨臣䝉更生之賜乃天下之心也不勝區區之愚嘉祐元年五月上時知諫院同前係第四狀范鎮臣聞傳曰決者智之君需者事之賊盖言有所需待而決則賊於事也季文子三思而後行孔子曰再斯可矣何者再思則是非定至于三則惑况過于三者乎則是非已定而復思之者惑也孔子之所不與也臣近奏乞參考祖宗故事選宗室子優其禮數以係天下人心竢有聖嗣復遣還邸此是非之至辨而無可惑者及今月餘不決故天雨而不止雲隂而不解此是應也陛下方不豫時尚不忘宗廟社稷之計而形於言今已平復肯㤀而不行之耶必不然也臣恐大臣不為陛下推明之爾陛下恭事宗廟仁覆海内上天之報必生聖嗣臣今所請乃祖宗故事以權係天下人心者何惑而不為之乎伏惟上觀天意乆雨之變速加處定以示中外臣不勝大願嘉祐元年五月上上仁宗論天下之本貴於前定趙抃臣聞聖人之制變不可無權宜天下之能事不可失機㑹至於去禍以歸福却亂以成治救亡以圖存轉危以置安者用權宜適機㑹也向者伏覩陛下聖體偶一違豫中外人心莫不動搖賴宗廟社稷之降靈天地神明之垂祐四海䝉福宸躬寖康然猶上有謫見之文迨無虚月下有妖言之俗至于再三天其或者豈非以陛下皇嗣未立人心未有所係垂厥祥異明白丁寧警誡陛下意欲陛下深思逺圖亟事所為而然也權宜也機㑹也今其時矣書曰一人元良萬邦以貞易曰大人以繼明照于四方叔孫通以謂天下之本柰何以天下為戲韓愈亦曰前定可以守法不前定則爭且亂臣不勝大願願陛下思所以答謫見妖言之警誡思所以固三聖百載之基業思所以安中外臣庶之憂惑思所以破姦雄隂賊之窺覦㫁宸衷發天意擇用宗室賢善子弟或教育宫闈或封建任使左右以良士輔導以正人磐石維城根本深固有是二者惟陛下示天下以至公而擇焉伏惟陛下春秋富盛福夀延洪一旦皇子慶誕少陽位正儲貳事體何損權宜方今施為且適機㑹轉禍亂危亾將然之勢為福治安存無疆之基豈不盛哉豈不休哉臣職有言責計無家為戴陛下之恩極泰山之重顧愚臣之命等鴻毛之輕儻一毫有益於朝廷則萬死甘從於鼎鑊干冒旒冕臣無任納忠待罪激切屏營之至嘉祐元年六月上時為殿中侍御史上仁宗乞謹擇儲貳或典宿衛尹京邑以鎮安人心司馬光臣竊以人臣之進言捨其急而議其緩則言益繁而用益寡人君之聽納忽其大而謹其細則心益勞而功益淺明主不惡逆耳之言以察治亂之原忠臣不避滅身之禍以論安危之本是以上下交泰而事業光美也臣竊見陛下自首春以來聖體小有不康天下之人側足而立累氣而息恟恟憂懼若蹈氷炭間者雖已痊平而民間猶有妄為訛言以相警動者雖有司以嚴刑束之彼口不得言中心惶惶何所不慮耶陛下胡不試思其所以然者何哉豈非儲貳者天下之根本根本未定則衆心不安也賈誼有言抱火措之積薪之下而寢其上火未及然因謂之安當誼之時漢孝文帝春秋鼎盛有孝景以為之太子中外乂安公私富溢誼猶有是言使誼處於今日當云何哉陛下好學多聞愽覽經史試以前古之事質之治亂安危之幾何嘗不由繼嗣哉得其人則治不得其人則亂分先定則安不先定則危此明白之理皎然如日得失之禨間不容髮於朝廷至大至急之務孰先於此而陛下晏然不以為憂羣臣愛身莫以為言此臣所以日夜痛心疾首忘其身之疎賤而不顧鼎鑊之罪者也伏惟陛下哀而察之今夫細民之家有百金之寳猶擇親戚可信任者使謹守之况天下之大乎三代之王以至二漢所以能享天之禄若是其乆者豈非皆親任九族以為藩輔乎使親者猶不可信則疎者庸足恃乎臣竊惟陛下天性純孝振古無倫事無大小關於祖宗者未嘗不勤身苦體小心翼翼以奉承之况所受祖宗光明盛大之基業豈可不為之深思逺慮措之安平堅固之地以保萬世無疆之休哉臣聞天子之孝非若衆庶止於養親而已盖將謹守前人之業而傳於無窮然後為孝也故經稱天子之孝曰德教加於百姓刑於四海諸侯之孝曰保其社稷而和其民人卿大夫之孝曰守其宗廟士之孝曰保其禄位而守其祭祀庶人之孝曰謹身節用以養父母此皆聖人之言非臣之狂瞽也今陛下所以奉事祖宗其道至矣若獨於此未留睿意早定大議則曏時純孝巍巍之德皆無益矣此天下所共為陛下重惜非特愚臣而已臣聞禮大宗無子則同宗為之後為之後者為之子也故為人後者事其所後禮皆如父所以尊尊而親親也伏惟祖宗受天明命功德在人本支百世子孫千億而陛下未有皇嗣人心憂危伏望陛下深念祖宗之艱難基業之閎美神器之大寳蒼生之重望勿聴茍且之言勿從因循之計斷自聖志昭然勿疑謹擇宗室之中聰明剛正孝友仁慈者使攝居儲貳之位以俟皇嗣之生退居藩服儻聖意未欲然者或且使之輔政或典宿衛或尹京邑亦足以鎮安天下之心如此則天神地祗宗廟社稷實共賴陛下聖明之徳况羣臣兆民其誰不歡呼鼓舞乎昔魯漆室之女憂魯君老太子幼彼匹婦也猶知憂國家之難盖以魯國有難則身必與焉故也况臣食陛下之禄立陛下之朝又得承乏典冊之府比於漆室之女斯亦重矣誠不忍坐視國家至大至急之憂而隠嘿不言誠知言責不在臣言之適足自禍然而必言者萬一冀陛下采而聴之則臣於國家譬如螻蟻而為陛下建萬世無窮之基救四海生民之命臣榮多矣願陛下勿以臣人微位賤謂之狂狷而忽之試以臣言自為聖意延問大臣忠於社稷者儻以為非臣請伏妄言之誅儻以為是願陛下決志而速行之焚臣此奏勿以示外足以明臣非敢徼冀毫釐之幸也虞書曰勑天之命惟時惟幾陛下當此之時變危為安變亂為治易於反掌若失時不斷使天下之人有以議陛下之純孝者則臣雖欲畢命捐軀以報陛下亦無及巳臣不勝區區憤懣之誠干冒冕旒伏地待罪嘉祐元年六月上時以集賢校理通判并州上仁宗乞厯選宜為嗣者龎籍臣伏以中外之任各有分局職外陳事皆為出位在臣則不然早自寒儒偶升朝序荷陛下千世之遇寘于侍從付之權任遂登樞府逮冠台司臣之椎愚進無他路凡在恩擢莫非帝力今身已頽憊猶居一方上將之位則國家大事敢以守屏自外忍黙不言上負大恩慙責重矣恭惟陛下至聖臨御三紀日謹一日徳全業大憂勤機務焦勞夙夜今春之初偶嬰微疹萬方臣庶心如焚灼祈禱穹昊冀集福聖躬天地降休廟社垂慶藥劑有喜亟臻平復夀康之永人神有賴然臣今昧萬死而思有所陳者盖以陛下儲嗣未立宫坊虚位誠願陛下深思祖宗統緒之重下察臣民繫望之懇發日之明親加精慮厯選宗室宜為嗣者速決聖㫁制命一出四海懽抃天序既定羣心大安如此則陛下増基業之固奉宗廟之孝無大於此也至如天禧之時先帝違豫溥率之誠雖懷憂戚而中外帖然安心者以陛下在東宫故也此理昭昭於耳目矣伏見唐世方鎮之臣上議儲宫者數人當時不以為非而並䝉采用遂得福歸王室况臣感主之深愛君之切茍以益國而死愈於負恩而生所以冒重禍而不疑不悔也且臣年垂七十逼於休退固無他希冀惟陛下保萬世之業䝉無窮之幸乃臣之大願矣瀝血上控祈賜裁擇不勝輸誠待罪之至嘉祐元年上時以觀文殿學士昭徳軍節度使知并州上仁宗論水災乞速定副貳之位係第六狀范鎮臣伏見天下以水災奏者日有十數都城大水天雨不止所謂水不潤下也傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下陛下恭事天地神祗肅祇祖宗山川之祀罔不秩舉至於號令必順天時也非廢祭祀也非不禱祠也然而上天出此變者曉諭陛下以簡宗廟乎陛下即位以來虚副貳之位三十五年矣臣近奏擇宗子賢者優其禮數試之以政以係天下人心竢有聖嗣復遣還邸及今兩月餘不行正謂簡宗廟也此變所以發也伏惟陛下深念宗廟之重必有副貳以臣前所上章降付執政大臣速為裁定以塞天變嘉祐元年六月上時知諫院同前李大臨臣竊以比来大雨入都門壞廬舍溺人民祖宗以来未之有也謹按漢書五行志曰簡宗祀不禱祠則水不潤下今朝廷祭祀非不恭時享非不至而反謂簡慢者何皇嗣未立主鬯有闕故也夫水萬物之本太子天下之本今天下之根本未立上天深示災變伏望陛下鑒天之戒早擇儲嗣以前定天下之心古者天子即位必有儲副以受宗廟易曰主器者莫若長子又曰明兩作離大人以繼明照于四方是天子必有儲副而天下獲安今儲副未定祭祀㡬廢故天之示變深切著明也伏乞陛下無逆天時為社稷蒼生留意焉臣之朴忠憂國大計昧死以聞嘉祐元年上時為秘閣校理上仁宗乞立太祖太宗之曽孫吴奎臣聞王者以社稷為本宗廟為重社稷必有奉宗廟必有主今陛下在位三十四年而嗣續未立天地祖宗開發聖意不然何故陛下無大過朝廷無甚失輒降如此之災異乎在禮大宗無嗣則擇支子之賢者漢成之於哀帝孝和之於安帝皆兄弟之子也若以昭穆言之則太祖太宗之曽孫以近親言之則太宗之曽孫陛下所宜建立用繫四海之心者也陛下春秋猶盛竢有皇子則退所為後者頗優其禮於宗室臣子之心誰曰不然陛下勿聽隂邪巧計以誤大事假如倉卒之際柄有所歸致社稷宗廟不血食書之史冊為萬世憤臣不願陛下以聖明之質當危亡之比也此事不宜優游願速裁定定之不速必有姦人隂賊其間然亦不獨陛下之過輔弼之臣未聞力爭致宗祀無本鬱結羣望感召沴氣毒流天下所宜深罪推之咎罰無大于此嘉祐元年上時知制誥上仁宗論根本未建係第二状司馬光臣先於六月十九日輒以瞽言干犯聖聽伏地傾耳以俟明詔於今月餘一無所聞陛下寛仁不加誅於狂愚之臣然亦未賜采納臣竊自痛人品猥細言語吃訥不能發明國家安危大體致陛下輕而棄之此皆臣之罪也雖然臣性誠愚位誠賤而意誠忠語誠切願陛下不以人之愚賤而廢忠切之言少留聖心於宗廟社稷之至計則天下幸甚竊以國家者政有小大事有緩急知所先後則功無不成議者或曰當今之務大而急者在於水災汎溢是大不然彼水災所傷不過汚下及濱河之民若積雨既止有司少疏而塞之則民皆復業豈能為國家之患哉又曰然則在於穀帛窘乏是又不然夫以四海之富治平之乆若養之有道用之有節使良有司治之穀帛不可勝用也豈能為國家之患哉又曰然則在於戎狄侵盜是又不然夫戎狄侵盜不過能驚擾邉鄙之民若禦之有道備之有謀可使朝貢相繼豈能為國家之患哉以臣之愚當今最大最急之患在於根本未建衆心危疑釋此不憂而顧憂彼三者是捨其肺腑而救其四肢也不亦左乎借有髙才之臣能復九河之道儲九年之食開千里之邉而本根未建猶無益也况復細於彼三事者烏足道哉今陛下聖體雖安四方之人未能遍知尚有疑懼者陛下不以此時早擇宗室之賢者使攝居儲副之位内以輔衛聖躬外以鎮安百姓萬一有狂妄之人出於意外喧譁驚衆雖知萬全無慮然亦豈可不過為之防哉臣竊意陛下聖智聰明洞照安危䇿慮巳定而尚宻之未欲宣示於外審或如此亦恐不可何則今天下之人企踵而立抉耳而聴以須明詔之下然後人人自安又何待而密哉若以儲副體大非造次可定者或且使之輔政或典宿衛或尹京邑亦足以遏禍難之原靖中外之意今安危之機間不容髮日失一日貴在及時而朝廷置之意外不為汲汲朝夕所議大抵皆目前常事非甚大而急者臣恐髙拱雍容養成國家之患從而理之用力難矣此臣所以日夜區區寢不能安食不能飽不避死亡之誅進言不已者也伏望陛下察其愚衷特賜詳擇臣前日所奏及今狀内事理稍有可施行者乞決計而速行之以安天下元元之心然後理臣僣妄建言之罪不敢辭也嘉祐元年八月上時通判并州上仁宗論彗出主兵乞速定大議係第七状范鎮臣伏見五月二十四日昏時二星相繼西流一出天江一出天市出天江者主大水出天市者主散財當是時朝廷不知觀天之變以圖消復又不為防以備其災纔及一月而都城大水居民室廬及軍營漂壞者不知幾十萬區大變之不虚發也如此近日以來彗星出東方孛于七星其色正白七星主急兵白色亦主兵天意若告陛下將有急兵至欲陛下與大臣相救儆懼以求消復之術不可晏然復如前日也陛下自正月不豫至于今二百餘日既已平復然羣臣稀得進者又不與語天下大計天下之人其心皇皇所以感動上天之變也方此時豈無乗間觀釁起為盜賊如大水之入都城者乎陛下即位三十五年以納諫為徳以畏天為心至于小小論議未嘗不虚懐開納今乃宗廟社稷之至計反拒諫而不用違天而不戒乎臣職當言不敢愛死黙黙以負陛下陛下以臣言為然乞以臣前所上章與大臣速定大議以臣言為不然乞加臣萬死之罪何者陛下素有納諫之美因臣奏疏使陛下有拒諫之名臣更不敢復奉朝請謹閉門以待萬死之罪嘉祐元年八月上時知諫院同前係第九狀范鎮臣伏見天禧三年六月彗星見未幾而冊陛下為皇太子方是時真宗皇帝只有陛下一人天下人心已有所係然真宗皇帝遽立陛下為皇太子者欲預定其分以塞覬覦之路也非私於陛下也為宗廟社稷之計與天譴之變皆當然也今陛下未有皇嗣天下人心無有所係故天初見流星繼以大水告陛下以簡宗廟之罰陛下君臣不知覺悟故天出彗以告陛下而陛下君臣晏然復如前時此臣當言之責所以恐懼而待罪也初流星示變時大臣豈意必有大水乎及大水入都城大臣親領徒役以捍水患今大水巳定而不知致大水之本本由簡宗廟而不為宗廟計故天又出彗也彗之變主急兵大臣又不知先定大計以備兵變及兵如水之至而後親捍之雖勤勞如捍水之時亦無益矣陛下為民父母視民有厭溺之患又忍使遭戮辱之禍而不為宗廟社稷計以答天譴乎嘉祐元年八月上上仁宗乞早定至䇿係第三狀司馬光臣先於六月十九日八月一日兩曽上言乞擇宗室賢者進而用之盖以上則輔衛聖躬下則鎮安百姓迄今未聞聖朝少垂采聴臣誠愚昧不達國家髙逺之意若臣所言非耶當明治其罪以示天下若其是耶亦謂聖心不宜棄忽豈可直以臣之愚賤不察其言若投羽毛於滄海之中杳然莫知其所之豈疎逺所望哉臣不勝憤懣敢復剖析肝膽陳布以聞雖抵罪萬死亦無怨悔臣聞書曰逺乃猷詩云猶之未逺是用大諫凡國家之弊在於樂因循而多忌諱不於治安之時豫為長逺之謀此患難所從而生也竊觀漢室以至有唐簡䇿所載帝王即位則立太子此乃古今不易之道也其或謙遜未暇則有司請之所以尊宗廟重社稷皆國家莫大之慶未聞人主以為諱惡也及唐中葉以来人主始有惡聞立嗣者羣臣莫敢發言言則刑戮隨之是以禍亂相尋不可復振殊不知本強則茂基壯則安此乃國家所當深鑒而不足以為法也今天下之人上自公卿下至庶人茍有知識忠於國家者其心皆知當今之務無此為大無此為急而各畏忤旨之誅莫敢進言臣獨不敢愛犬馬之軀為陛下言之陛下豈可不少留聖意而聴察之耶臣嘗厯觀春秋以來迨至國初積一千六百餘年其間天下混一内外無患兵寝不用者不過四百餘年而巳至如聖朝芟夷僣亂一統四海内平外順上安下和使在朝在野之人自祖及孫耳目相傳不識戰鬭盖自上世以来治平之乆未有若今之盛者也臣竊見國家於州縣倉庫㪷糧尺帛未嘗不嚴固扃鐍擇人而守之况如是融明閎茂之業豈可不謹擇親戚可信可任者使助陛下守之乎此則賢愚之人所共為陛下重惜者也陛下當此之時頥指如意不早決至䇿以固萬世不拔之基獨不念太祖太宗跋履山川經營天下真宗宵衣旰食以致太平之艱難乎此臣所以夙夜遑遑起則思之臥則夢之感嘆涕泗不能自已不避煩瀆之誅再三進言者也或者謂臣身賤居外而言朝廷之事侵官也臣愚以為治古諫諍無官自公卿大夫至於庶人百工商旅矇瞍芻蕘無有不得言者所以達下情而察國政也若置官而守之非其官者皆不得言則下情壅而不通如是則國家雖有迫切之憂行道之人皆知之而在上者莫得聞也此其為害豈不深乎况臣食陛下之禄於今三世先臣以廉直恬退特為陛下所知擢自孤微升之侍從此恩之重子子孫孫何時敢忘而又陛下曏以水災親下明詔延訪中外勤求得失臣獨何人身逢盛際捨此大節隠而不言其餘瑣碎何足道哉抑又聞之元后作民父母陛下臣父也安有為人之子見危而不告其父乎伏望陛下察臣區區之心不為私其一身不惜少頃之間取臣前後所奏略賜省覽其中萬一茍有可施行者乞以陛下之意㫁而行之宣告中外使逺近渙然無復憂疑則自然神靈恱於上而災異伏衆庶恱於下而姦宄消至於草木昆蟲靡不䝉被其福其為功業豈不盛哉夫時者難得而易失惟陛下早留神詳察嘉祐元年九月上時通判并州上仁宗辭侍御史知雜事乞定大議係第二十狀范鎮臣待罪中䝉除知雜御史七降聖㫖臣雖甚愚知陛下必以臣言為是然乆而不知決者竊恐左右近習以為陛下已安不用為此以惑陛下是皆佞邪無識之人不可不察古人所謂小人愛人以姑息者正謂此輩臣愚謂陛下既安尤當為之以答天意天意報貺必䝉子孫無疆之慶此天人相與之際必然之理願陛下黜小人姑息之淺見察臣之至言則大臣不敢畏避必能盡力輔佐陛下以為宗廟之計臣前後上章凡十九次竊恐留中大臣不得盡見今具録進呈乞付中書樞密大臣同共參議有異議者乞與臣廷辨謂臣不然即乞明加臣罪解臣言責臣之至情盡在於此貼黄臣竊聞臣所上文字只降中書而樞密院絶不與議伏縁兹事體大乞以臣前後所上章疏降付中書樞宻院令中書樞密大臣同共平章鎮至和三年五月初建議至嘉祐元年十一月凡二十狀竟辭言職不就宋名臣奏議巻三十
