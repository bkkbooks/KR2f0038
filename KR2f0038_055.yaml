body:
  text: 宋名臣奏議卷五十五宋趙汝愚編百官門臺諌上哲宗乞寬王覿之罪范純仁臣昨與吕公著等并今日與文彥博等兩次簾前奏陳乞寬王覿之罪蓋欲假借臺諌使人敢言其間雖有不當亦須稍垂寬宥以彰朝廷容諌之美况陛下臨御以來未嘗嚴責諌臣一旦行之恐傷仁化又慮來者或多若一一竄逐寖失朝廷清靜之體其心止於如此更無他意側聞聖訓以謂朋黨甚多宜早施行恐於卿等不便以臣愚見朝廷本無朋黨只是善惡邪正各以類分陛下既用善人則匪人皆憂難進遂以善人之相稱舉者皆指以為朋黨欲得人主深防嚴戒盡行貶逐自然君子道消小人可以得志所以臣等不避違忤縷縷開陳罄竭愚誠莫回天意臣若面從順㫖則茍容之臣何足以副陛下簡求何面目處羣臣之右又况彥博公著等皆是纍朝舊人陛下留在左右已二三年輔翊皇猷未嘗有闕今日豈肯雷同罔上庇護黨人蓋其愛君之心與臣無異唯在陛下深加採納所有先降貶謫王覿文字臣未敢簽書更乞聖心熟慮貼黃臣自先朝言事不合擯斥處外幾二十年遭遇陛下一新庶政從諫任賢夷夏歡呼古今無比此皆聖心所悉非愚臣獨敢妄言而一旦拔臣於疏逺之中驟致於丞弼之位故臣夙宵盡瘁恐負聖知豈有容庇朋黨自損身名玷辱家聲取笑千古蓋是愛惜聖政思報大恩螻蟻之誠惓惓不已今若陛下决以臣言無取即乞謫臣補外則指為朋黨者自明臣雖一身斥逺若遂决朝廷大疑則是猶有少補不辜簡拔則臣死之日猶生之年矣貼黃臣面謝日已曽奏聞昔先臣與韓琦冨弼蒙仁皇同時用為執政三人各舉所知引用忠良有匪人之不得進者遂撰造謗語指為朋黨先臣與韓琦冨弼皆得補外所用之人類遭貶逐當時造謗之人皆欣快相賀曰且得一網打盡此事未逺衆人猶知亦可以為朝廷深戒元祐三年五月胡宗愈除尚書右丞右諌議大夫王覿疏宗愈自為御史中丞論事建言多出私意不可以執政內批王覿論列不當落諌議大夫與外任差遣仍不得帶職吕公著言覿責降未當又與文彥博劉摯吕大防范純仁等論於簾前純仁退而上此疏時為同知樞密院上哲宗繳王覿外任詞頭曽肇臣今月十八日吏房送到詞頭五月十五日奉內降指揮王覿言事不當與一外任合入差遣不得帶職十八日三省同奉聖㫖差知潤州者臣承乏近侍職在訓辭理有未安合具敷奏臣伏見陛下臨政以來開廣聰明大闢言路雖怫意逆耳詆訐狂妄常人之情所不能容者莫不虛心克已溫辭降色以受之天下之人歌詠頌歎以謂古之聖帝明王不過如此一二年來不唯朝廷政事人情以至四方萬里幽深隱伏之利病莫不畢聞於上者言路無壅故也是以在廷之臣人人勇於自效至不以出位為嫌而以不能盡言為恥振起天下敢言之氣始自今日故如覿者身在言責有所聞見不得不為陛下盡言而無隱也陛下未以其言為然猶當寬大含容未宜遽棄何則以言賞人猶有觀望畏縮而不敢進者以言罪人人將鉗口結舌望然去矣其肯以身陷禍而覬萬一之聼察哉故覿之一身出入內外不足以為重輕而陛下言路之通塞人情之伸屈在此一舉此臣不得不為陛下慮也陛下寄腹心於大臣寄耳目於臺諌二者相須不可闕一今覿一言論及執政即去之是何異愛腹心而塗耳目豈不殆哉且執政大臣朝夕在人主左右據利勢國柄人情之所難言者也導之使言猶或不聞其過今一言及之遂至逐去臣恐在廷之臣以覿為戒依違顧望莫肯正論執政大臣雖有罪惡陛下亦將不得聞矣此可為寒心者也陛下臨政以來何獨至於覿一言之入遽不能容示天下以不廣也覿以小官不二三年拔擢至此今以言獲罪猶補便郡於覿何損臣所惜者於聖政不為無纍爾伏望陛下深念祖宗付託之重愛惜朝廷臺諌之體不以容納狂直為難而以壅塞言路為懼以覿所論質之公議茍其言可取固當行之如無足採亦願陛下容之度外使天下之人知朝廷不罪人言終始如一而執政大臣有所畏忌增益陛下虛心納諌之明是一舉而數美從之也其可忽哉臣備位侍從首尾三年常恨不能補報萬一今輒緣職事冒進狂瞽惟陛下留神省察幸甚所有制辭未敢修撰貼黃臣伏見豐稷昨任諌官所論者陛下骨肉間事猶且含容矜貸更獲美遷聞者皆服陛下仁慈寬厚有天地之量豈獨於覿而不能容伏望聖慈更加省察元祐三年五月上時為中書舍人上哲宗乞終始從諌梁燾臣愚不肖䝉恩還以言職夙夜思所以副聖知者不敢以為榮而獨以為懼臣前日建言正綱紀明法度以尊君卑臣强公家弱私室正以皇帝陛下富於春秋未專宸斷太皇太后陛下保佑聖主制政簾帷權臣易為强悍姦人易為䝉蔽外之人情有可畏可恤者必欲陛下遍察外之事勢有可憂可疑者必欲陛下周知欲臣節忠一而人無欺罔欲君勢隆重而下皆敬畏此臣自誓報陛下之心雖萬死不可變也竊謂陛下復置臣於言路者必以臣前日之言為是必以臣前日之心為忠臣前日之言為是則今日之不言為非矣臣前日之敢言為忠則今日之不敢言為負矣陛下既能知臣之忠必能用臣之言則臣報陛下之心豈可怠於前日哉臣聞人主不以受諌為難而以臣下敢言之為難人臣不以敢言為難而以君上從諌之為難唐李絳曰小臣晝思夜度將有上諌欲諌十事至時巳除五六逮其緘封又削其半其得上逹者十無一二信乎敢言之難也如此又曰聖主知直言有益於已正諌有禆於時溫顔容納奬勵勸導忠臣抱義不顧其身懷忠不避禍患茍有致君濟時之益不識觸忌冒諱之誅何哉顧食君之祿其事不得不然也信乎聽諫之難也如此夫人主以臣下敢言之為難是也然而有忠臣則不難矣人臣以主上從諌之為難亦是也然而遇明君則不難矣臣幸親逢兩宫之明竊不以敢言為難在陛下信而聽之也辨姦人之妄而塞其讒誣折權臣之强而抑其排斥使多士以臣為法而進其忠勿使多士以臣為戒而挫其直當今之事所可言者尚不為少臣方且次第上之願陛下清心諦察而必行之至有切於聖德急於民隱者不敢猶豫以留清𠂻後時之憂也致陛下有開納諍諌之美名有收攬權綱之明威朝廷尊嚴而清靜宗社長久而安寧此臣愛君謀國自誓之本志也唯陛下裁擇臣不勝惓惓盡節之至元祐四年二月上時為左諌議大夫上哲宗論楊畏除監察御史劉安世等臣等近嘗論奏楊畏差除不當未䝉施行臣等伏覩祖宗故事天禧二年二月詔諌議大夫樂黃目知制誥陳知微於常參官舉公清强敏材堪御史者各一人臣等竊惟聖訓皆有微㫖何則御史之任所以紏察百寮茍非剛正無私不可濫居此職故先須擇舉主使之引類是以受詔者知明主眷倚之厚遴簡忠良被舉者體朝廷責任之嚴敦尚名節得人之盛無愧前古厥後方令兩制資次舉官當時議者已謂無善惡皆得薦士故多非其人然未嘗專出於執政也今兩制等初以名聞則猥曰巳係監司省郎更令别舉後來所薦既巳應格則又棄而不用乃以私意外召楊畏且畏見授永興軍路提刑獨非監司乎前日以此拒人而今日躬自蹈之威福自任反覆如此舉官之詔遂成空文祖宗之法日益廢壞臣等竊為陛下惜之况二聖臨御仰成輔弼若言路漸布私黨則政事闕失何由盡逹天聰為大臣之計則安為陛下之慮則踈矣伏望聖慈鍳前代姦邪䝉蔽之患循聖人開廣聰明之理罷畏新命以示至公元祐五年三月上時為左諌議大夫上哲宗論臺諌言事乞明辨是非蘇轍臣聞孟子有言有官守者不得其職則去有言責者不得其言則去故祖宗朝凡任臺諌言而見聽則居職言而不用則黜罷理之必至前後悉然唯有去年臺諌論回河不當言既不從而言者皆獲美遷今年復論鄧溫伯不可任翰林承㫖言既不效而言者亦䝉進職雖人臣迫於朝㫖黽勉就位而中外觀望不知曲直所在為損不細誠使朝廷偶有過舉聞善而改適足以增開納之光其或言者論事不當據法罷免亦足以示進退之公今者不辨是非一加進擢朝廷則負諱過便私之毁臣下則被茍簡懷祿之非風俗漸成士節陵替載之史册不為美事臣今待罪執法才力疲軟何能發明然在職思憂不敢不勉若所言中理望陛下力賜主張行下無吝一有不當亦乞明加流竄以懲妄言唯乞勿為隱忍包含之計使臣主俱受其謗不勝幸甚元祐五年五月上時為御史中丞上哲宗論執政自擇臺諌蘇轍臣聞書稱堯舜之德曰明四目逹四聰蓋人君居髙宅深其勢易與臣下隔絶若不務廣耳目則不聞外事無以預知禍福之原臣不敢復論前代請陳本朝故事每當視朝上有丞弼朝夕奏事下有臺諌更迭進見內有兩省侍從諸司官長以事奏禀外有監司郡守走馬承受辭見入奏凡所以為上耳目者其衆如此然至於事有壅蔽猶或不免今自太皇太后陛下皇帝陛下垂簾以來每事謹重羣臣得對於前者唯有執政及臺諌官而巳然天下之是非可否既决於執政陛下欲於執政之外特有所聞者又獨有臺諌數人而已臣觀今日臺官二員諌官二員其間非執政私人特出聖意所用者又不過一二人孔子有言今吾於人也聼其言而觀其行陛下試取此五人言行之實而諦聽之則其邪正向背槩可見也漢成之世王鳳用事羣臣莫敢盡言唯劉向王章力言其惡無顧避皆為鳳所不喜言卒不用或繼以死而鳳推薦其門人如杜欽谷永之流使上封論事欽等所言皆掩蔽鳳短專攻帝失由此直言不聞漢以不競今陛下深處帷幄耳目至少唯有臺諌數人若又聽執政得自選擇不公選正人而用之臣恐天下安危大計無由得逹於前而朝廷之勢殆矣惟陛下留神省察無忽臣言則社稷之福也元祐五年九月上時為御史中丞上哲宗乞明降召用裴綸為御史因依孫升臣切聞新除監察御史裴綸辭免除命甚堅議者皆言綸之擢用外廷不知所以被召因依夫未經試用之臣聲迹踈逺一旦為人主所知任之為耳目非緣近臣論薦則必有章奏感悟人主如唐之馬周也且觀逺臣以其所主進不以禮主或非人雖孔子猶見疑於衆人必待孟子以為之辨况裴綸言行未足以信於天下而召用未明宜乎綸辭避而不敢當其命也御史居耳目紀綱之地以正色敢言不避權强為職其進也豈可不自重哉伏望聖慈詳察明降召用裴綸因依付外不獨使綸有以自明立朝無愧亦所以示天下後世用人之心公也元祐五年九月上時為侍御史上哲宗乞六察官兼言事龔夬臣聞唐虞稽古建官惟百夏商官倍亦克用乂然則先王建官因革不常其來尚矣臣伏見言事御史自皇祐以來員數不常昨置六察官方推行之初事務繁劇故令專領察事今來按察之法久已就緒在京官司無敢如日前遲者則治察御史其職太簡臣備員臺屬適值兩院闕官兼領六察未見廢闕然則人治兩案俾兼言職自不相廢况元豐三年八年并紹聖令察官各兼言事伏望聖慈特賜詳酌令監察御史三員兼掌論議庶幾益廣言路以稱朝廷明目逹聰之意紹聖三年七月上時為監察御史上徽宗乞留龔夬陳瓘臣聞先甲三日易後甲三日難諌而不早足以取名而於事無益忠臣之義但求有益而不顧取名臣今日先事之言為欲有益於朝廷也臣伏聞殿中侍御史龔夬言翰林學士承㫖蔡京告訐周穜等語言事乞罷黜京而朝廷謂京無過不以夬之所言為信夬既不得其言難以復在言職雖朝廷未加斥逐理當求去夬尚未去而臣已言及此其所以為先事之言也蓋言事之官乃朝廷耳目之所寄也耳目不通則有䝉蔽之患故自祖宗以來奬勵言官屈意聽納飬其徑氣不使小挫非重其人所以重朝廷之耳目也自紹聖以來七年之間五逐言者初逐常安民次逐孫諤次逐董敦逸次逐陳次升次逐鄒浩此五人者皆與蔡京所見不同雖其間或以他罪被逐而京之所惡則無不去者今夬之言京又將罷去則是兩朝言官前後六人無不為京而去也陛下以聖德嗣位上法祖宗內禀慈訓數月之間德澤廣被內外安靜人情歡悅此千載之一時也今若緣此一事又去言官臣恐後之言者人人不已可惜安靜之勢忽成紛紛其於初服豈能無纍若待臨事而諌孰若先言之有益也臣願陛下察夬所言忠於為國特回睿聽曲賜允從庶使敢言之士意向朝廷䝉蔽之風自此衰息伏望陛下上禀慈闈議其可否小臣狂妄冒犯天威陛下矜赦幸甚貼黃臣近曽靣奏為蔡卞是臣之舉主而臣言其罪雖於公議無愧而私議未安臣之自劾求去固有日矣今所言者非自為也非為夬也為朝廷耳目之官耳伏望聖慈特賜矜察元祐二年五月上時為左正言上徽宗論張庭堅送吏部任伯雨臣今月初五日有奏狀言張庭堅送吏部事竊以紹聖時章子厚蔡卞用事諌官御史盡出子厚卞引用不唯無所建明率皆附㑹子厚卞欺誣朝廷自陛下即位揔攬權綱自擇臺諌然臣謂臺諌官始用之既重其選終罷之必正其名臣欲乞今後臺諌以言事罷去者皆坐其所言以正其罪蓋妄冒不才者其罪小欺誣朋附者其罪大庭堅近以言事不當除京東運判既而改汝州今又送吏部中外疑惑不知所以臣伏願陛下斷自聖意降出庭堅章疏考其所言若欺罔朋附則送吏部為尚輕若止妄冒則送吏部為太重正名定罪庶足勸戒無使言路自今以往以庭堅為戒貼黃張庭堅送吏部若陛下見其欺誣朋附出自聖意則庭堅不敢逃其罪若非出自聖意止是三省伺陛下之意遂再三取㫖重行用以恐脅臺諌則此事不可不察言官畏三省非國之福也元符三年十二月上時為左正言吏部尋以庭堅通判陳州庭堅謝表云疏不外宣命從中出又云罪所自來獨臣心之了了不知竟坐何事上徽宗論除授臺諌三省不得進擬陳次升臣竊以祖宗以來臺諌闕員詔近臣薦二員召對便殿去取選任一出上意報政大臣不得干預蓋臺諌官所以司察大臣過失若出大臣則朋附之人至忠讜之路塞明主雖欲明目逹聰虛心聼納嘉謀嘉猷何緣而至哉近者監察御史闕二員命翰林學士御史中丞共薦六人今聞所召者一人而已未審出於陛下之意耶復出宰執之意耶若出陛下之意則可然未應祖宗故事若出宰執進擬則權歸大臣朝廷闕失誰復擬議此源既開臣恐異日臺諌皆出大臣之門而陛下孤立矣書曰惟辟作福維辟作威傳曰慶賞刑威曰君願陛下念兹今後近臣奉詔薦舉臺諌官並須引對親閲人材去取獨出聖斷庶不廢祖宗故事臺諌得人建中靖國元年六月上時為左諌議大夫上徽宗乞重惜憲臺之權陳堯臣臣聞天下所恃以安者朝廷之紀綱紀綱所恃以立臺諌之風采若臺諌有所拘忌受制於人而風采不存則朝廷莫之紏彈容姦於國而紀綱以壞是故人君借之事權不繫於官長不拘於大臣飬其志氣不挫於權豪不畏於强禦雖其人未必皆賢其言未必皆當許以風聞而貸其不實之愆納以虛懷而開其敢言之路豈徒然哉凡欲以破姦雄之膽救陵夷之患也唐文宗曰御史臺朝廷綱紀臺綱正則朝廷正朝廷正則天下理楊瑒曰紏彈之司若遭恐脅以成姦人之謀御史臺固可廢矣臣惟方今天下平治固無姦臣之足慮然間有擅權挾寵之徒肆為敗俗亂常之惡孝不足以移忠功不足以掩過內恃强援奧知以脫常刑重憲恬然自得莫敢誰何蔑視風憲之官不翅奴僕之役若非處以私人終必視為仇怨然慮其攻巳則先設隄防以拒其來聞其有言則廣行營救以反其罪不擠以今事則必中害以他非不謂在昔與我為讎則曰於今與誰為黨或以離間其君臣為辭或以踈隔其恩戚為語指切直者為沽名謂納忠者為訕上巧言令色千計百端是致發意欲彈者改遷抗章才及者貶竄前者沉滯流落而不聊其生後者惴恐憂思而深以為戒忠義風采消委始盡臺臣雖備位名存實亡臣愚以謂恐非朝廷之福乃者官吏猥冗財費浮濫紹述失其本意紀綱浸以隳弛而霜臺坐視不發天下恨之逮至陛下獨奮離明斷以乾健減罷裁抑一遵熙豐之舊繼又廢黜拱默選任臺臣中外方且鼓舞然未聞有所建明或即旋行遷易天下疑之夫彈劾之職紀綱所繫當急先其大者譬如捕盜先其渠魁去草急在根本今使置其大者而言其小者是猶捨渠魁而攻疲羸留根本而摘枝葉適以激其怒而滋其萌是豈除惡務本之意乎臣恐天下紛紛籍籍者特未定也故臺臣屢遭恐脅則姦回無所畏憚就有特然奮勵衆必為之寒心知其必蹈禍機而謂不若且已雖因時薄有所彈終不敢直肆其說至使明目張膽之士化為結舌鉗口之流臣恐自是積習成風人知畏避遂致姦臣欺蔽君上紀綱既紊何所不為且姦人始兆在紏劾而非難其惡巳成雖鈇鉞而何及故治國家者平時宜有直言敢諫之士則悠久庶無姦謀指鹿之臣今陛下仁天廣覆智燭旁臨賞罰如寒暑號令如風雷所以舉直錯枉防微杜漸者固不患不至所患者姦回植黨牢不可破或左右先容或前後救援不能無誤聞聼至有逆已行之命或方頒而旋改沮必罰之威或朝黜而暮升蠧國害民之事或遏而復熾欺公罔上之人或沮而復起國是動搖人心惶惑其根原有在於强援奧知之間而已夫擊搏之任豈人樂為公議所在有不得巳人孰不欲保其父母妻子孰不願享其冨貴安榮何事而取怨於權臣犯顔於人主邪聼言之道當以事觀茍惟在已無愆則於人言何恤安用預設隄防茍唯事干國體則亦何黨何讎奚事廣行營救臣願陛下深惟此理上體祖宗之成憲下為萬世之來規重惜憲臺之權優飬直士之氣使姦回必劾而無遺罪戻必罷而無赦止其防備之私絶其救援之弊明出詔令應今後凡臺臣有所論列職非三省而輒出位謀政與夫干請私謁拯姦護惡巧為粉飾者置之重辟庶使姦無所緣綱紀一正天下幸甚宣和二年十月上時為御史詔所陳甚當出榜朝堂及吏部上欽宗乞監察御史言事胡舜陟臣竊以御史耳目之官以言為職故監察御史自唐以至本朝皆論政事擊官邪正與殿中侍御史同元豐紹聖著在甲令至崇寧間大臣營私欲其便巳遂變祖宗成憲使人君無兼聽之明而南臺御史始有不言事者名存實亡害治尤甚今多事之時以開言路為急伏望睿㫖下本臺令增入監察御史言事之文以復祖宗之制靖康元年二月上時為監察御史詔依祖宗法上欽宗論貶逐臺諌乞不施行日下出門指揮李光臣伏覩前諌議大夫唐重等五人與郡日下出門流傳四方士論驚駭陛下新即大位開懷聽納之初宜優容直言禮遇臣下今重等備員臺諌不知所論何事既令日下出門議者遂致紛然造飾語言稱師驥論十事孫覿李擢等攻擊宰執緣此被逐蓋朝廷未嘗降出得罪之因宜其紛然有以議陛下也重等既各與便郡如同棣和皆天下膏腴處正使自擇不過此耳何至迫逐使之倉皇若此哉臣伏見祖宗朝斥逐言官雖逺在嶺外未有日下出門者熙寧中王安石為宰相急於行法惡人之議巳始有此行遣後來蔡京王黼用事欲行巳私循用此例緣此言路塞絶豈可施於今日艱難之時哉伏望特降睿㫖將日下出門指揮更不施行庶令般挈家屬收拾行李以示陛下優納之意靖康元年三月上時為左司諌上欽宗乞內中置籍録臺諌章疏程瑀臣聞君猶心也宰執猶之股肱臺諌猶之耳目耳司聽目司視視聽不廢運用股肱無為於中而治者此心所以為真君也人君亦何為哉相與論治道者臺諌也相與行治道者宰執也天下之事不過利與害臺諌曰是宰執曰非人君察焉果非也過在臺諌不在宰執若以是為非則宰執何所逃罪哉宰執曰利臺諌曰害人君察焉果害也過在宰執不在臺諌若以利為害則臺諌何所逃罪哉萬幾至繁吾之所以用聰明者特在於審是與非辨利與害此以一應萬之要也茍不能致知乎此使是非利害灼然胸次則真贋不分朱紫混淆勞精疲神於末流天下之治不可兾矣蓋人非堯舜不能舉事皆善罔計其善而悅人讃已是謂求諂諛而成暗昧昔諸葛亮當主幼國新之際獨總朝政顧何所賴於羣下一旦發教乃諄諄力求轉相違覆以補曠敗太宗貞觀之治庶幾成康一時輔拂亦少貶矣嘗謂執政曰朕常恐因喜怒妄行賞罰故願公等極諌公等亦宜受人諌不可以已之所欲惡人違之使宰執能以此待臺諌人君能以此待宰執天下之治不難圖矣朝廷之上事無過舉則臺諌何所復言及其有言必與朝廷違異乃所以相成也唯朝廷不以異巳為嫌而事求其當則天下幸甚本朝之盛無踰仁宗稽考治迹蓋周成王漢文帝不足進焉宰臣則前有王曽李迪後有韓琦富弼執政則有歐陽修范仲淹之徒由今視之其人何如哉然當時諸臣深逹治體朝廷之上既已務和而不務同至於臺諌有所論列不以人微而易之不以意異而詘之唯是之從而不嫌議不出已亦不難於改過從善當時議宰執以為奉行臺諌文書是不知此乃諸臣深逹治道用心過人者洎王安石用事已來專以摧折臺諌為事然當時人材承纍朝飬育而砥礪名節之風不衰論議風生以斥逐為榮未為安石下也至蔡京用事師法安石而殘狠過之議已者置之死地臺臣引用私黨藉為鷹犬搏噬正士創置官司冗濫蠶食而諌省列位寢闕弗補惡政弊事流毒四方陛下既親見之臨御以來疏逺讜直之士布在臺諌虛巳聼納下詔敦諭是誠有意祖宗之治矣然以臣觀陛下蓋喜受人言而未可謂之善用言蓋喜納人諌而未可謂之能從諌何者用言從諌必深思而熟計之當理則行不俟旋踵若受而不能用與不受同實無益也三代以降能用言從諌者無如漢髙祖唐太宗蓋髙祖智略初無踰人奮布衣取天下未嘗畫一謀出一計唯其善用羣䇿非獨張良陳平之腹心外如酈食其婁敬之徒一言合理信用不疑此所以成帝業太宗脅父殺兄以就大事其天資何如哉唯其樂聞已過有諌必聼始也孫伏伽之徒賞之使言久之得魏徴往往諭意於言辭顔色之表不待力爭强辨此所以躬平禍亂而坐致太平人主誠欲聼言納諌以二君為法可矣陛下天性元良憂勤庶事聼言納諌宜無艱者顧尚有愧於二君臣知其由矣陛下以沉晦為事而有纍於明以柔遜為事而有纍於斷明與斷兩未見焉而大臣承蔡京餘風不能以韓琦富弼諸人之心為心故臺諌章疏或沮格而不行或稽留而不下未閲數月已有擠陷之事如余應求陳公輔者蹤跡孤外志操凛然金寇在郊京師震恐之時抗章乞對慷慨論事䝉陛下延問開納寇過之後擢為臺諌士大夫方慶言路得人而應求等亦感激奮勵知無不言正道少伸邪人側目一旦論事稍涉嫌疑陛下未能洞察執政因而擠之是何異蔡京所為哉覆轍在前不憚蹈之亦可哀矣夫任耳目以廣視聼將以運用股肱今也壅蔽耳目有傷害之者矣陛下將誰與為治乎臣聞真宗時常詔諭諌官御史各令舉職仍令中書籍記其言事行與不行嵗終具奏蓋非特稽所言當否用以知其人亦以防壅蔽之患伏望陛下特賜舉行仍內中創置臺諌章疏文籍隨所上録之聼政之暇雍容觀鍳不唯裨補治道因考其事有合行而稽留未進呈者時與督責執政庶幾耳目股肱之任不至偏廢而治道可望在明斷而行之臣備員諌省賜對之初巳懇懇為陛下言之伏望曲留聖心天下幸甚靖康元年六月上時為右正言宋名臣奏議卷五十五
