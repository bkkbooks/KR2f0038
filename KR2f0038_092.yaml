body:
  text: 宋名臣奏議卷九十二宋趙汝愚編禮樂門朝㑹上太宗論入閣圖張洎臣准中書劄子奉聖㫖入閣圖宜令史館修撰楊徽之等四人將舊圖比對錯誤文字改正修畢却送閣門者臣伏以朝廷典憲簡冊具存近代因循多違舊式今陛下以入閣圖慮文字錯誤再令比對即知聖念於臨朝儀注謹重至矣臣幸因詔㫖敢貢管窺㳂襲之宜惟明主裁酌切以今之乾元殿即唐之含元殿也在周為外朝在唐為大朝冬至元日立全仗朝萬國在此殿也今之文德殿即唐之宣政殿也在周為中朝在漢為前殿在唐為正衙凡朔望起居及冊拜妃后皇子王公大臣對四夷君長試制䇿科舉人在此殿也今之崇德殿即唐之紫宸殿也在周為內朝在漢為宣室在唐為上閣即隻日常朝之殿也昔東晉太極殿有東西閣唐置紫宸上閣法此制也且人君恭已南面向明而理紫宸黃屋至尊至重故巡幸則有大駕法從之盛御殿則有鈎陳羽衛之嚴故雖隻日常朝亦猶立仗前代謂之入閣儀者蓋隻日御紫宸上閣之時先於宣政殿前立黃麾金吾仗俟契勘畢喚仗即自東西閣門入故謂之入閣今朝廷且以文德正衙權宜為上閣甚非憲度况國家丕承正統宇內治平凡百憲章悉從損益唯視朝之禮尚屬因循竊見長春殿正與文德殿南北相對殿前地位連橫街亦甚廣博伏請改創此殿以為上閣作雙日立仗視朝之所其崇德殿即唐之延英殿是也為雙日常時聽斷之所庶乎臨御之式允叶前經今輿論乃以入閣儀注為朝廷非常之禮甚無謂也臣竊按舊史中書門下御史臺謂之三司為侍從供奉之官今常朝之日侍從官先入殿廷東西立定俟正班入一時起居其侍從官則東西對拜甚失北面朝謁之禮今請凖舊儀侍從官先次入起居畢在左右分行侍立於丹墀之下故謂之峨眉班然後宰臣率正班入起居庶免侍從官有東西對拜之失得遵正禮臣又聞古之王者躬勤庶務其臨朝之疏數視政事之繁簡唐始受命五日一朝景雲初年復修貞觀故事自天寶兵興之後四方多故由肅宗而下咸隻日臨朝雙日不坐其隻日或遇大寒盛暑隂霪泥濘亦放百官起居其雙日宰臣以下奏覆公事即時特開延英召對或蠻夷入貢勳臣歸朝亦特開紫宸引見陛下自臨大寶十有五年未嘗一日不雞鳴而起聽天下之政雖剛健不息故天德之常然而游焉息焉亦聖人之謨訓儻君父焦勞於上臣子緘默於下或不能隕身碎首引大體以爭則忠亮之心有所不至矣臣欲望陛下依前代舊規隻日視朝雙日不坐其隻日遇大寒盛暑隂霪泥濘亦放百官起居其雙日大官進食之後於崇德崇政兩殿召對宰臣常參官以下及非時蠻夷入貢勳臣歸朝亦特開上閣引見並請准前代故事處分臣聞易曰聖人久於其道而天下化成茍動靜有常恬智相養憂勤宵旰則當躬政於冕旒端拱穆清則可怡神於元默夫如是聖君嚮明御極之治勞逸相均髙明配天博厚配地悠久而無疆矣臣向承朝命叨居館職邦國儀注合預參詳當文思有截之時獻虛薄無庸之說儻禆萬一雖死猶生淳化二年十月上時為諌議大夫初太宗以入閣舊圖承五代草創禮容不備於是命徽之等討論故事别為新圖十二月朔遂行其禮於文德殿洎與徽之等同撰定新儀又獨奏此疏上仁宗乞約先天制度前殿取㫖宋綬臣伏見五日一御承明殿垂簾奏事常至日晏唐五日一開延英止與宰相近臣論議政事今承祖宗基業盡有舊制酌中立制正在今日唐先天中睿宗為太上皇五日一次聽朝處分軍國重務及三品以除授决重刑明皇日聽朝授三品以下决徒刑請令中書樞密院約先天制度自今非軍國大事及大除拜皆前殿取㫖臣寮亦止於前殿對見天聖九年太后稱制久上未嘗獨對羣臣故綬上此奏由是忤太后意自翰林學士改龍圖閣學士出知應天府上英宗論後殿起居司馬光臣竊見國家從來以垂拱崇政為便殿乘輿每旦先御垂拱退御崇政是以侍從近臣已於垂拱起居者非有職事奏對更不復至崇政近嵗以來乘輿間日一御垂拱有司不詳事體本末遂令學士待制及兩省官只赴垂拱不赴崇政起居近以山陵未畢乘輿不御垂拱將近旬月學士以下遂廢起居之禮豈有名為侍從近臣動踰旬月不得瞻望黼扆臣恐朝廷之儀由此相承寖益訛謬欲乞今後乘輿御前殿並令學士待制及兩省官赴後殿起居或以太煩即令兩日一次起居嘉祐八年九月上時為天章閣待制知諫院上神宗乞宰臣押班一依舊制司馬光臣伏覩五月七日敕文准四日手詔今後宰臣赴文德殿押班自春分後或遇辰牌上秋分後遇辰正牌上垂拱殿視事未退止令傳報宰臣更不過令御史臺一面放班餘日並依祥符敕命指揮永為定制所有前降下太常禮院詳定文字更不施行者臣竊見從來垂拱殿視事比至中書樞密院及其餘臣寮奏事畢春分以後少有不過辰初秋分以後少有不過辰正自陛下臨御以來惟近因服藥曾於辰牌以前駕起入內自餘皆在辰牌以後然則自今以往無事之日宰臣永不赴文德殿押班也臣竊惟文德殿為天子正衙宰臣為百寮師率百寮既在彼常朝則宰臣理當押班斯乃前世舊規自祖宗以來未之或改今陛下即政之始事非有大利害者恐未須更張伏望陛下特降聖㫖令宰臣一依國朝舊制押班若陛下以前者已降手詔必欲限以時刻者即乞自春分後遇辰正牌上秋分後遇巳牌上並依今月四日指揮施行猶庶幾此禮不至遂廢治平四年五月上時為御史中丞乃詔今後春分秋分後遇辰正牌上垂拱殿視事未退宰臣更不過文德殿押班餘依前降指揮上神宗乞釐正文德正衙之制滿中行臣伏見文德正衙之制尚存常朝之虛名襲橫行之謬例有司失於申請未能釐正兩省臺官文武百官赴文德殿東西相向對立宰臣一員押班聞傳不坐則再拜而退謂之常朝遇休假併三日已上應內殿起居官畢集謂之橫行自宰臣親王已下應見謝辭者皆集赴文德殿謂之過正衙然在京釐務之官例以别敕免參宰臣押班近年已罷而武班諸衛本朝又不常置故今之赴常朝者獨御史臺官與審官待次階官而已今垂拱內殿宰臣已下既已日參而文德常朝仍復不廢舛謬倒置莫此為甚至於橫行參假與夫見謝辭官先過正衙雖㳂唐之故事然必俟天子御殿之日行之可也有司失於申請未能釐正欲望特賜指揮先次罷去元豐四年十一月上時為侍御史知雜事詔下詳定官制所本所言今天子日聽政于垂拱以接執政官及內朝之臣而更於别殿宣敕不坐實為因循之誤兼在執事升朝官五日一赴起居而未有職事者反日參踈數之節尤為未當又辭見謝自已入見天子則前殿正衙對拜自為虛文其連遇朝假則百官自赴大起居不當復有橫行參假中行乞罷常朝及正衙橫行為是從之燕饗上仁宗論正旦日蝕請罷宴富弼臣學術空踈才識庸懦謬䝉奬擢充職諫垣茍有見聞安敢緘默伏以日者君之象日有食則人君恐懼修省損膳徹樂衣素服避正殿求萬務所失許百寮上封事食於常時已謂非吉况在嵗旦尤為深災今月一日午後伏覩太陽虧蝕衆所觀仰稽諸前籍可謂大異臣竊聞戎使在館欲取今日御宴若用常禮盛饌作樂是重敵國而忽天譴殊無恐懼之心臣甚為陛下不取也假令臣子有過陛下未欲加責且示戒勵而絶無憂恤怠惰如故怒之之意當何如也天之留意於陛下亦猶是焉伏望陛下出自聖慮罷此宴㑹或恐定制不可遽已即宜令戎使就館别日遣近臣押賜御筵更慮戎使已入難於中輟即今之㑹秖且徹樂亦無所妨不可謂之張皇亦不謂之輕易天文謫見萬姓皆覩罷㑹徹樂不出內庭非張皇也救天之災惟恐不速感天之意不可不深觀變側身宜不旋踵非輕易也如此則上可以秖警天戒下可以慰說人心亦使戎人見陛下修德禳災傳聞外夷足為巨美僧道法事一切不用此外更乞陛下夙夜戒懼以塞變異則聖躬無疆之慶亦宗社無疆之休臣不勝大願昨日申未時臣赴館宿於街衢間見此虧食遇夜投進文字不及伏望聖慈恕此忽迫之罪康定元年正月上時知諫院上神宗論久旱罷聽樂上壽富弼臣於今月二日率百寮拜第二表上陛下尊號及請聽樂今日早䝉降第二批答所上尊號不允已斷來章在庭數千人無不相顧稱歎謂古之帝王雖甚盛德者無以過之陛下即位未久萬方歌頌者不可勝道今又作此一事人益悅服茍美利之德相繼不絶自中及外由士大夫以至黔庶轉相告報則何憂乎天地災變不息臣實內極欣抃賀陛下非常之美也然聽樂批答不許而未有斷章指揮臣竊慮聖慈未欲遽拂羣情更容上一二表而止又慮陛下用服除常典不得已且從衆請此臣所以更竭愚管竊有所陳也初二日臣與曾公亮已下共聞宣諭以久旱未雨尚欲避殿自責臣退而慚惕無地容身然臣雖萬千其數憂懼以及於死終不若陛下一人內發至誠側身修省則立可以感動上下神祇也昔周成王不知周公之聖天大雷電以風拔木偃禾王悟出郊即時天雨反風嵗則大熟宋景公時熒惑守心公有三善辭熒惑亦即時退度是知人君修德消變天應如響只恐誠意有所未至耳伏自去秋以來災變特異人情恐駭于今不寧在於尋常譴告尚須損膳徹樂豈於今來反欲於降聖節日令百寮稱觴上壽而有聽樂作歡之理哉聖意以北使在館且欲循用常禮臣謂當此之際正是陛下以中國之大天子之尊推行至德以彰示敵國之時也臣見仁廟康定元年日食正旦在日者之說最為不祥臣時作諫官立上章乞避殿撤樂以應天變其賀正北使只令就館宴設而參知政事宋庠力勸仁宗不納臣議臣别日面奏云昨朝廷已却遣人使敵恐敵庭舉行此禮則大為中國之羞也久之奉使者回果云是日敵主傳宣日蝕皇帝不聽樂只令就館宴南使仁宗思臣前奏深以為悔然事已不及矣今來聽樂之請伏望陛下亦如尊號拒而不從并聖節上壽亦乞權罷則上可以答復天譴下可以慰悅人望陛下至誠至德孰曰不能感動天地亦所以使敵人知中國天子所為與尋常相逺萬萬也熙寧二年四月上時為左僕射門下侍郎同中書門下平章事上神宗論誕日罷燕雨澤之應富弼臣今日與曽公亮以下議於十五日拜表陛下御正殿聽樂復膳此實臣子之至意也臣等不可不請陛下不可不從然竊觀陛下近日戒懼謙損深自刻責雖古之聖帝明王無以過此陛下答上天不可謂不至上天報應陛下不可謂不速夫避殿減膳徹樂此三大事誠合典禮然陛下濬發之至惟於誕日特罷稱觴最為至切者蓋此事諂佞易為進說上下易為取惑而陛下聰哲英悟斷然不疑促降詔書即日宣布獨此一事所以遽能感動天地當日得雨幽靈降格如在目前聖意天心合如影響人情欣悅和氣頓生矧令戎使日覩中國異事尤為陛下非常之慶也然臣之極為喜者又甚於此何哉緣纍年災變實為至多地震朔方益可驚駭時覽奏報至今未已天有常道必不虛發臣大為朝廷憂之今陛下一發至誠行所難行之事上天立有報答明白卓越昭示天下乃知天意諄諄未厭宋德更俟陛下恐懼修省常若不及逺離奸佞親近忠良恭畏上天始終不改即災異可弭而太平可致也此臣所以為極喜又甚者也伏願陛下無以今日雨澤為喜當以纍年災變為懼兢兢業業日謹一日凡百舉動常為義理之所存對接上天近若咫尺祗畏惕厲夙夜無忽如誕日甘澤之應者自此必常有焉茍異於斯漸生逸豫則天意人事實未可知蓋修德致雨其速如此萬一於德有損其災應豈有緩耶惟陛下念之不忘乃天下之幸也今上表所請或令再三而允所貴始末相應也熙寧二年四月上上親批手詔答曰義忠言直理正文簡非意在愛君志存王室何以臻此敢不置諸几席銘諸肺腑終老是戒更願公勿替今日之志則天災不難弭太平可立俟也上神宗論誕日罷燕雨澤之應富弼臣於今月十四日因具劄子奏欲上表請陛下聽樂復膳還御正寢因進愚慮乞陛下無以今日感應為喜而當以纍年災變為懼益修聖德以答天意十五日晚夜漏上後伏䝉陛下特賜內降一封親灑宸翰密布淵㫖捧讀之次驚喜交極其略曰置之枕席銘諸肺腑終老是戒夫狂瞽之見何足當聖意如此之厚昔漢文帝集上書囊為殿帷唐明皇寫無逸圖置於內殿憲宗以自古居臣善惡事迹畫於屏風施諸便殿臣校之今日陛下過於三主逺甚何也上書囊乃天下議論所貯無逸篇乃周公之辭屏風畫君臣書迹乃古先衆戒所聚今陛下只以臣一妄庸人所說而遽已置之枕席是所謂市骨始隗之意若果有真賢出而為朝廷謀謨天下之事則陛下待之將如何耶臣故曰陛下過三主逺甚者以此也又曰更願公不替今日之志則天災不難弭太平可立俟也此臣尤所惕懼戰汗達旦不寐終日不食臣本何人徒荷陛下誤聽付以大柄臣前在政府氣壯志鋭尚何所補今者且病氣志凋耗陛下復何望焉然臣不敢不勉惟日力疾少副陛下所以用之之意第恐才業空疏尚不驅逐目前之務况營道致治乎又况弭天災立太平乎惟是圖報之心死而後已豈有替於今日哉然臣向者已嘗為陛下粗陳其一二臣只能舉朝廷得失告諸陛下而止矣必欲變禍為福反災為祥須在陛下信納主張而力行修至德而盡至誠則方能感動天地招來善應書曰皇天無親惟德是輔民心無常惟惠之懷又曰民罔常懷懷于有仁鬼神無常享享于克誠陛下上事天下安民修至德推至誠此皆必然日行之事不可斯須而離也離之則弭天災致太平也逺矣又不止於逺董仲舒所謂天出災害而不知省出怪異而不知變傷敗乃至者臣恐必將有焉更望陛下憂勤厲翼夙夜不懈皇天監于上生民應於下則陛下可奠枕而卧垂衣而治矣犬馬之懇筆舌難盡熙寧二年四月上上哲宗論亢旱乞罷春宴曾肇臣伏見去年諸路災歉京西陜西人至相食冬間屢得嘉雪粟麥甚茂飢民嗷嗷待此以濟而雨不時應旱氣已成麥苗萎黃勢將槁死雖有收成之處所得固已無多若饑饉荐臻公私受弊有不可言者此正君臣側身畏懼憂恤百姓之時而恬然莫以為意此臣之所未喻也皇帝陛下太皇太后陛下畏天愛民海內所知豈忍生靈轉徙溝壑恐是上下蒙蔽茍寬聖心但云雨澤小愆未至害事九重深逺何由盡知臣等承乏從官不敢雷同隱默敢效小補仰禆萬一伏見已定今月十七日春宴臣愚切謂天菑方作民食未充乃於此時君臣相與飲食燕樂恐無以消伏天災導迎和氣伏望特賜德音為罷春宴使百姓咸知陛下之意人心既悅天意亦順必有膏澤應聲而至猶足以救垂死之苗獲豐登之望蓋輟一日之適而成終嵗之功在於聖心宜無難者唯留神無忽天下幸甚元祐四年上時為中書舍人先是春旱李常請罷宴執政不行三月十五日肇與彭汝勵同上此奏十六日批出罷宴臨幸上仁宗論陰雪乞罷上元放燈歐陽修臣伏以上元放燈不出典禮蓋自前世習俗所傳皆俯徇衆心欲同民樂勉出臨幸非為嬉游若乃時和嵗豐民物康富以為樂事亦是人情今自立春以來隂寒雨雪小民失業坊市寂寥寒凍之人死損不少薪炭食物其價增倍民憂凍餓臣本府日閲公事內有投井投河不死之人皆稱因為貧寒自求死所今日有一婦人凍死其夫尋亦自縊竊惟里巷之中失所之人何可勝數昨日聖恩差官俵錢正為如此日下隂雪未解使便得晴明坊市不免泥淖聖駕所歷衝冒風寒况方以日食之災避殿減膳聖心畏憂中外所知欲乞特罷放燈所有常年酌獻之禮若至日未得晴明亦乞差大臣攝事所有見今供擬遊幸及修道路寒凍兵士並乞放罷庶幾上副陛下畏天憂民之心嘉祐四年正月上時為翰林學士知開封府上仁宗乞罷上元連日游幸司馬光臣等伏見今嵗以祈榖改日之故車駕併以十三十四日幸諸寺觀臣等竊惟上元觀燈本非典禮正以時和年豐欲與百姓同樂為太平之榮觀而已去嵗四方諸州多罹水旱鰥寡孤獨流離道路伏計陛下念此未嘗去心竊恐有司不明大禮務循故事無所減損不稱陛下子愛元元之意又連日游幸在於聖體亦為煩勞伏望陛下比之每嵗特減游觀之處以閔恤下民安養聖神天下幸甚嘉祐七年正月上時同知諫院上神宗論饑疫乞罷上元放燈彭汝礪臣體問今年上元遊宴例皆仍舊臣伏念獨樂樂不若與人之樂與少樂樂不若與衆之樂故古者於荒政則蕃樂於大變大災則弛樂蓋能同天下之至憂則能同天下之至樂也臣伏思乾德之禍廣西幾殱焉官吏屠戮尸骸未斂頻年京淮江浙東西死於飢疫者至數十萬病者未興流散者未還集於道路村野有蕭然為狐狸豺狼之墟矣威茂之師未勞洮隴之役復新十萬之兵宿於煙瘴其以戰及疾死者甚衆孤寡泣涕惸獨悲啼相號於路而招魂於萬里之外災害變故莫大焉古人於此不敢私燕樂於一食之間而陛下供張宴游尚循前之舊未聞少損臣以謂此非樂以天下之意也臣知陛下有堯舜之仁愛恭儉園圃無非時之遊幸倡優無過誤之恩寵一朝之樂决非陛下之所固欲也亦將同民欲而已然吏民死於凶禮死於兵役死於瘴癘皆陛下所子者宜與之同其憂而乃欲同其樂臣終疑之臣欲上元自神宗神御殿酌獻外特賜罷其餘游觀而明此意詔天下臣知窮民戰卒當有聞而感泣知陛下所以哀矜之者無一飲食不在其衷而使天下官吏知陛下所以愛惜其民如是也釋宴樂之私而慰中外之望致勤畏之誠以答因仍之天變其為計善亦昭昭然明白矣老子曰殺人衆多以悲哀泣之戰勝以喪禮處之蓋不欲以戰屈人故也孟子曰今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色蓋與同樂故也惟陛下念之臣愚不知忌諱惟陛下裁察熙寧十年正月上時為監察御史裏行上哲宗論愆亢乞罷上元游宴劉安世臣伏見去冬以來時雪愆亢詢問四方亦多旱曠關陜淮浙民已艱食物價翔踴日益增甚雖朝廷廣行賑恤而嵗事失望荐飢可憂臣嘗觀周禮大司徒荒政之目十有二品救民之道最為詳備其九曰蕃樂蓋嵗有凶歉人君憫恤元元為之閉藏樂器而不作也禮曰雖有凶旱水溢民無菜色然後天子食日舉以樂先王之制具在方冊聖明之主所宜留心伏惟陛下繼天奉元仁民愛物有年之瑞宜不絶書雨雪失時人且狼狽雖兩宫憂勞軫念無或少忘而逺方之民未見陛下至誠惻怛之意今上元密邇有司舉行常例猶欲張燈臣愚欲望聖慈明諭執政特以嵗旱俾罷遊宴使四海之內莫不戴陛下勤恤之德庶幾天人感通風雨時若天下幸甚元祐四年正月上時為右正言上欽宗論不當因孟享游宴陳公輔臣竊惟陛下以孟享景靈東西二宫遂幸陽德佑神觀臣誠淺陋不熟本朝故事不知享親之後退而游幸祖宗有是例邪但近世為之若近世為之自不可為法設或祖宗之例亦有可議焉夫誠心齊戒以薦祖廟仰瞻英靈如在其上退而思之不忘乎心豈容於此日擁嬪御具聲樂肆游幸之樂耶臣恐此舉不足以示孝也臣又觀陛下自初即位恭謝之時輿服朴素儀衛簡少與夫供帳什物伶倫官侍皆少如今日而百姓見之莫不歡欣感戴以手加額謂陛下恭儉之德過乎仁祖矣至于今日之出輿服鮮明儀衛衆多與夫供帳什物伶倫官侍皆盛如前時而百姓見之已有相顧駭歎竊議之者安知其不腹誹心謗謂陛下恭儉之德不及仁祖仰惟陛下聖性淵懿聰明勤儉自養德東宫以至即位未嘗少變臣料今日之事必左右近習之臣以謂陛下有崇髙富貴之勢當務為光榮盛大以夸耀一時之觀聽夫貴為天子富有四海區區於此是示天下以不廣也况今寇難未平民力未裕財用未饒臣下之奢僣未革風俗之侈靡未除全在陛下躬儉節用如大禹文王以救今日之弊豈可漸為奢靡異乎初即位時使百姓議之乎臣竊為陛下不取也太上皇帝奉養素厚陛下不可薄於親必須損已所有以供奉之若陛下不自過為儉約而供奉上皇又欲豐厚天下財用何以給之哉臣愚欲望陛下今後孟享既畢即詔車駕還宫其餘游幸除龍德寧德二宫外皆願暫罷臣又慮上皇既深居外宫非時不出恐陛下亦自不當游幸仍望鑾輿之出務令簡儉但如初即位時可也此臣得於百姓之言不敢不冒死以聞然陛下無以百姓之言為非彼見陛下自初即位簡儉如此今不兩月儀物稍多自此若天下無事後豈不復肆侈靡之好邪非獨百姓憂之臣固以為深憂也傳曰有始有卒者其惟聖人乎伏惟陛下謹終如始俾盛德大業逺跨唐虞三代實宗廟社稷之福而天下之幸也靖康元年上時為左司諫宋名臣奏議卷九十二
