body:
  text: 宋名臣奏議巻七十五宋趙汝愚編百官門戒勑上仁宗乞戒止奔競劉隨臣聞風俗信厚草木被於仁恩世道澆漓郡國所以愁歎仁恩洽則邦家益固愁歎甚則王室下衰三代巳來理亂之政布在經史埀誡後王是故歴代聖君因時立制治於未亂安於未危其術何也在乎法令必行賞罰公當止塞僥求之路興行禮遜之風如此則忠賢得以盡誠姦佞無由妄進百司舉職列郡向方徇公滅私天下無事自古稱垂拱而治者用此道也伏以皇帝御歴三后繼明建不㧞之洪基張率仁之景化兩宫臨御萬國歡康禮重大臣延納端士欽恤庶獄儉約豐財小大必親上下無壅此皆上古帝王之能事也近年文武之列内外庶官則有志務僥求公行請託對見旒扆或洒涕以期恩勞効纎微或自矜而無愧或茍且進用或規避逺官或干犯有司違之則動生謗議或唐突執政違之則頗扇是非即有寄任蕃宣位望崇重或表章不遜或奏請無厭況於無事之時尚懐悖慢若當要用之際寜盡公忠至於按察之司宴安顧望以容姦為大體以舉職為近名以巧詐為俊賢以恬退為愚拙以至貪殘之吏黷於貨財老疾之徒罔知止足務進者都忘於廉恥營私者不顧於典刑雖教導以彌勤而奔競之猶甚若無約束寖壞紀綱慮傷忠厚之風殊非國家之利伏望特頒眀詔徧示臣寮俾知戒懼之心共賛熈隆之運茍無悛改當遂奏陳寘彼簡書用肅有位天聖九年十月上時為侍御史知雜事上仁宗乞戒飭臣寮不和歐陽修臣伏覩方今敵國外强公私内困盗賊並起蝗旱相仍陛下軫念生民深思禍患憂勤之意夙夜焦勞而中外臣寮未能為國家逺慮謀建長䇿少濟時事以寛聖懐近日以來風俗尤薄搢紳之列不務和同或徇私意以相傾或因小事而肆忿紛然毁譽傳布道塗飾巳短以遂非各期必勝進偏辭而互說上惑聖聰當陛下思念逺圖之時致陛下自厭紛紜之議至於朝廷得失邦國安危熟視恬然各思緘黙陛下仁慈睿聖務存大體未欲明行責罰以戒澆浮伏望聖聰特降詔書戒勵中外革茲時弊各使同心憂國捨小謀大然後陛下不以小事紛紜煩於聽覽則可以坐運宸筭以康時艱慶歴三年上時知諫院上仁宗乞禁止無名子傷毁近臣歐陽修臣竊見前年宋庠等出外之時京師先有無名子詩一首傳於中外尋而庠罷政事近又風聞外有小人欲中傷三司使王堯臣者復作無名子詩一篇略聞其一兩句臣自聞此詩日夕疑駭深思事理不可不言伏以陛下視聽聰明外邊事無大小無不知者竊恐此詩漸廣須達聖聰臣忝為陛下耳目之官不欲小人浮謗之言上惑天聽合為論列以杜姦䜛況自兵興累年繼以災旱民財困竭國帑空虚天下安危繫於財用虚實三司之職其任非輕近自姚仲孫罷去之後朝廷以積年蠧弊貧虚窘乏之三司付與堯臣仰其辦事乃是陛下委信責成之日堯臣多方展効之時臣備見從前任人率多顧惜禄位寜可敗事於國不肯當怨於身如堯臣者領職以來未及一月自副使以下不才者悉請換易足見其不避嫌怨不徇人情竭力救時以當身事今若下容䜛間上不主張則不惟才智之臣無由展効亦恐忠義之士自茲解體臣思作詩者雖不知其姓名竊慮在朝之臣有名位與堯臣相類者嫉其任用故欲中傷只知争進於一時不思沮國之大計伏自陛下罷去吕夷簡夏竦之後進用韓琦范仲淹以來天下欣然皆賀聖德君子旣䝉進用小人自恐道消故只喧然務騰䜛口欲惑君聽欲沮好人不早絶之恐終敗事況今三司蠧弊巳深四方匱乏巳極堯臣必須大有更張方能集事未容展効巳被謗言臣近日巳聞浮議紛然云堯臣更易官吏專權侵政今又造此詩語揺惑羣情若不止之則陛下今後無以使人忠臣無由事主䜛言罔極自古所患若一啟其漸則扇惑群小動揺大臣貽患朝廷何所不至伏望特賜詔書戒勵臣下敢有造作言語誣訐隂私者一切禁之及有轉相傳誦則必推究其所來重行朝典所貴禁止䜛巧保全善人慶歴三年時知諌院上哲宗乞復賜臣寮儒行中庸及文武七條文彦博臣伏覩先朝賜臣寮儒行中庸篇及文武臣七條所以激勵士大夫修飭行檢及中外臣寮謹奉官箴其出外任者朝辭日各賜一本仍令閤門丁寜宣諭凡在臣下靡不恭受而奉行慶歴中先朝以乆罷賜七條儒行中庸篇甞降詔書申明然而後來臣寮乆不受賜無所警䇿至有士行不修進取無恥官守失職茍簡無功臣欲乞舉行此法依例於朝辭日閤門給賜及宣諭戒勵之臣愚以謂崇奬士類鎭静風俗激勸官吏恪守忠廉斯乃為治之大本循致太平之道故敢竭此區區上干宸聽庶禆聖政伏乞付外施行貼黄臣昔任河東路轉運使每巡按部下州縣守令㕔事屏風並無書冩七條雖間有刻石者亦無幾又文字細暗難以朝夕披閱用為訓戒元祐三年上時為平章軍國重事辭免上英宗乞罷樞密使富弼臣妻妾晏氏於今月九日入内澆奠仁宗皇帝及奉慰皇帝皇太后伏䝉聖慈宣赴御座前問臣所患次第仍令說與臣者晏氏至家以陛下宣問之語盡說向臣愚夫愚婦相對感泣所䝉問臣肌體因甚不大瘦弱伏縁臣所患只為元初左脛瘡口徑方七八寸走失氣血極多至今此一支自胯股下至膝腕酸軟無力即於臟腑苦無相干所以肌體不至大段羸瘦然比來請假以前飲食減半蓋由端坐絶少運動所致也又問臣因甚不只在京將息須乞出外伏縁臣在假半年以上巳是大段多時又相度得所患全無減退向去朝叅卒未有期乆占重位密院闕人幹當事體不便臣心不自安所以乞一閑郡養疾所貴不妨朝廷别差人密院供職兼為臣年命見在一倒射運中據術者云是甲辰年正月生目下大運到壬申壬來射甲事屬不順故謂之倒射倒射者為災至深甲本主禄於法合射却禄位所以須着罷權減禄方可應得天災即災禍有所減夫天災者是天降譴怒也今若不顧天怒並無恐懼之心依舊執大權請厚禄揚揚然出入朝廷日在帝王左右奉行天下賞罰則天須增其譴怒臣必死矣臣實則懼天怒恐遂死滅是故以此血懇上告君父欲乞暫罷極職出守一郡權位俸都且減削則上天知臣有畏天之心肯捨重權厚禄其倒射災禍雖不能全免或不致於死滅所以切告陛下欲乞一郡者只為此也又問臣若是臣寮有災便要迴避帝王有災不知甚處逥避此益足以見陛下眷臣至厚畱臣至切之意也臣將何以報如此恩徳然禮曰儗人必於其倫帝王與臣下不是倫類不可比儗況又聖凡絶然不同豈可同日而語哉大抵臣下有災為官者須是罷權位減俸禄退就閑散之地即災患稍息矣無禄者須是謹身省事杜門不出畏懼官方條法即刑禍亦輕矣惟帝王所具之福與天地等然亦不能無災若有災眚動於天下及宗廟社禝尤須恐懼修省上畏天命小心翼翼兢兢業業求民間疾苦罷宫禁奢侈以至減珍膳撤聲色身衣素服不御正殿此乃帝王迴避災譴之道也茍或以天子自尊傲忽天命但極巳欲不䘏人事謂神道至幽而不足信謂天災難考而不足憂積累凶災直至成禍而天不降祐人不歸心則大事去矣其甚者以至流離播越覆亡宗社天下四海遂屬他姓以此觀之與夫臣下一身之災一命之殞䂓䂓屑屑其大小豈不甚異乎又問云賜此物去充醫藥之費因甚須更辭遜臣前來蘇利涉陳承禮傳宣回時巳曾各具手劄子極陳愚懇今更不敢重疊布叙恐煩聖聴大抵只是為私家閑居並無分毫勤効坐受厚賜於臣實是不安又絶無使用之處所以不敢承領屢煩君父之命實知死罪不是飾遜掠取虚名今旣丁寜戒諭更不敢避謹巳祗受上感聖恩其前後陳乞情理更望陛下稍迴天造略賜矜察臣的是憂死須至懇告聖慈乞與臣殘喘一二年間或得不死却再受陛下馳䇿亦不為晚臣因上荅聖問不免喋喋哀鳴披瀝嘉祐八年四月上時為檢校太師樞密使上神宗叙述前後辭免恩命以辯䜛謗富弼臣有不合自陳而須至冒犯誅戮陳於冕旒之前者盖事不獲已也伏望聖慈寛其罪戾使得畢其誠不勝大幸臣近日方知有人聞於陛下曰富某本無病乃託疾避事又曰所患已愈必不復起自謂仁宗舊相不欲更在朝廷其辭意痛害深切大扺云云皆此類也事是臣傳聞未知虚的假使的然有之臣仰認陛下知臣之深終必不信然臣倉皇恐駭自無容措之地或對案不食或通夕不寐不知身世之所在此䜛者固亦無他只因臣乆患足膝累辭陛下恩寵不喜臣者縁而造作謗毁必欲䧟臣於不測之罪也臣之有病無病及所患愈與未愈累曾披瀝更不叙述今直具臣歴事三朝埀四十載前後皆有避恩辭寵之迹不只今日輙敢昧死陳露上煩天聽此所謂合自陳而須至陳之盖不獲巳者也臣於仁宗天聖末初沗名第自絳州通判回召試館職臣以不善作賦尋會免試只求外任朝廷特令試以䇿論自後登制科人遂以為例慶歴二年契丹以嫚書遣使欲復關南舊地朝廷差臣報聘臣其時初知制誥兩次於北界徃來其契丹自要割地朝廷自許和親二事皆行罷議只添歳與之物還時朝廷便議行賞臣累曾面告仁宗臣昨奉使只為邊防乆廢武備是致於敵帳前不敢以死力争深恐激起干戈朝廷全無枝梧大成邊患遂且量增金帛以為疑兵之計爾即未是乆長之䇿臣不足為功乞不行賞臣若受賞乃是臣安穩朝廷之心他日契丹復有渝盟必誤國家大計是因臣受賞而致也惟望朝廷急修武備急選將帥俟其有隙因而吊伐以雪今日邀盟之恥仁宗不納須欲與臣推恩初授臣禮部貟外郎樞密直學士累表辭之不數月又授臣翰林學士亦累表辭之其時巳有數人近侍臣寮妄指他事䜛臣奉使不了乞斬於都市次年三月中又與賈昌朝並命昌朝以館伴授參知政事臣以奉使授樞密副使臣又力持前說累章懇辭而罷至七月再授臣樞密副使臣更不曾上章直擕所降綸誥上殿又叙前懇面辭仁宗從之遣中使送綸誥於中書而罷臣恐恩命未巳因累乞外任不允八月中復授臣樞密副使臣亦欲擕綸誥上殿面懇是日適會西人朝辭巳班於紫宸殿仁宗尚坐垂拱急傳宣云只候卿入密院班即駕過紫宸累遣都知御藥院及諸中使督迫推擁臣為紫宸立班多時及乆滯聖駕不得巳且赴密院班方俟西人辭訖退班再求上殿求免傳宣不許遂徑詣中書復陳除授未便之理宰相章得象晏殊謂臣曰曾看綸誥否臣對以旣不敢受此恩命即綸誥亦未敢觀覽得象等復曰前日進入勑誥上次日臨朝傳宣諭得象等曰冨某堅不肯以奉使為功云恐乆逺誤事今來誥詞中尚說奉使必又不受不如更不叙此一節但只作朝廷特命必然難辭今誥中巳落下奉使一事但請觀之臣退而展讀誠如得象等所說臣知必不可辭遂勉而受之然自此䜛言愈起日甚一日其所䜛者盡是竊弄威權惑亂朝廷謂臣欲謀廢立以至使其黨學臣等三兩人所書字體偽冩作臣等徃復簡帖商量廢立之事又别使人繳進此所以取仁宗必信之謀也臣其時恐懼如坐燃薪之上自亦不敢安於其位若便求退必亦不許遂與叅知政事范仲淹竊議云吾軰上為朝廷盡忠竭節而為羣䜛䧟害如此深切未顧一身性命各且保取家族但求得一事出去避此謗䧟他輩得進則自然稍息仲淹深以為然臣即因保州軍亂乃堅乞得河北宣撫仲淹亦得宣撫河東陜西兩路遂各且出使約數月果然仲淹就知邠州臣就差知鄆州兼西路安撫使相次會臣一相識秘閣校理石介病死於兖州又有人䜛臣怨望朝廷石介詐死却是冨某密使入北敵結連起兵冨某欲以安撫司一路兵應之則朝廷危即日遂罷臣安撫使在鄆州逾二年移臣知青州亦兼東路安撫使䜛者自知北兵無驗又别䜛臣云北敵結連不起冨某却遣石介徃登萊州結連金坑無賴凶惡數萬人欲舉兵為辭朝廷以至累遣本路監司相度擬發石介墓以觀其死之虚的兼當時所遣之官至今猶有在者所造終無成而罷乆之河北水災其流民盡來京東界内臣青州安撫部下尤多朝廷以臣粗曾安䘏遂以為勞尋授臣禮部侍郎臣以此事是安撫使本職累上章辭懇不拜不乆齊州兩營禁兵謀叛欲應貝州城下有隔路密來告臣且云竊發有日其時適會一中使張從訓來青州幹當臣以事急遂權牒本官及密牒齊州尋皆捕獲推究斬配百人朝廷又以為勞再授臣禮部侍郎臣復用前懇累上章不拜在中書為首相丁母憂歸西京持服仁宗五遣中貴人及御藥院使臣詔臣起復臣每次瀝懇拜章願滿三年之制終免起復之行英宗朝臣作樞密使以足疾假滿求解樞職凡二十餘章始遂所請乃除授右僕射使相判河陽臣以恩澤太厚又上八章方只減罷僕射而使相依舊洎至河陽踰年陛下巳即位臣又累表乞免相伏䝉聖慈曲賜允許又䝉兩次授臣集禧觀使欲令且在左右陛下此意於臣尤為優絶臣以乆病及事體未便瀝懇辭免皆䝉矜允各許歸藩此以上所陳辭避三朝恩寵並是辭而得允者方敢叙述其不得允者即更不敢備載今朝廷諸司盡有當時行遣照據臣私家亦有當時所上章表粗存不敢輙有一語妄以增損上惑天聽也陛下試觀臣上項所陳乃見臣前後重疊辭免官職自有本末不獨只於陛下今日意外狂狷而屢有辭避煩瀆聖明也夫冨貴者人之所欲臣至為庸淺本亦好冨貴喜功名其如事有無可奈何而須當辭者遂辭之即不是樂處貧賤而甘在人下也所以前後辭免恩命不是無名盖各有所謂皆出於無可奈何或以巳所不能而辭或以夷夏事理不便恐誤國家大計而辭或避䜛解禍以出使為名而辭或以幹本職公事不足為勞而辭或以丁憂去官不當起復而辭或以乆病在告不能供職而辭或以恩澤太厚而辭或以病守閑郡不敢坐享髙官厚禄而辭或以所患未能趨朝及於事體未安而辭皆出於無可奈何而必當辭之也在中外之人則謂臣所辭皆以為允其如不喜臣者盡以為非又恐臣粗得虚名異時復用所以常自有心及使其朋類依約影響架造䜛謗大則欲臣䧟於死禍小則欲臣永廢不用臣每靜思生平未甞有一事復人之讎立朝唯務包容含忍且欲共成國家之務而䜛人所以不容臣者無他只是忌前好勝不欲臣有寸長片善在巳之上又臣為相日憸佞險惡小人多不得進以此臣所以常被䧟害而側目相視也臣毎觀書傳見從古以來君臣之間無不患䜛人之為患也尚書舜典曰䜛說殄行震驚朕師注謂驚動我衆人也毛詩采葛篇曰一日不見如三歳兮注謂臣下懼䜛一日不見君如三年也又采苓篇曰舍旃舍旃茍亦無然注謂為善者謗訕之人欲使捨而貶退也又青蠅篇曰營營青蠅止於棘䜛人罔極交亂四國注謂蠅之為蠱汙白使黒汙黒使白喻䜛人變亂善惡也又巷伯篇曰取彼譖人投畀豺虎豺虎不食投畀有北注謂曰北方沍寒而不毛䟽謂欲凍死之也又曰有北不受投畀有昊注謂欲昊天制其罪也又十月篇曰無罪無辜䜛口囂囂下民之孽匪降自天噂沓背憎職競由人此外又有浸潤媒孽翕訾交鬭鑠金銷骨投杼掇蜂如此等語極多不可悉數以至周孔大聖荀孟大賢尚不能免臣本何人而望免夫䜛舌謗口之毁不亦難乎所賴者三朝聖人察臣愚短本無他腸力賜主張而保全之也在陛下垂眷老臣尤為深篤臣所恨病患未能便就死地上報聖恩萬分之一近日又䝉聖慈專遣中使押賜國醫診視調理恩寵轉厚自此臣恐不喜者愈生憎嫉而䜛譛益至也雖陛下天縱明聖洞見忠邪老病孤危之臣必保首領其如臣心自不安寜恐以憂死與其驚憂而死不若死於國事又縁未能捨杖亦未免用人扶䇿行步拜起尚甚艱梗所以未敢受京師差遣如觀使者以此故也若陛下且欲驅䇿即乞一近下路分扶病宣力所貴在外任出處自便管事之餘不妨將養衰體也昔孫臏刖足猶立戰功葛亮輿尸尚能走敵臣之才力固不逮二子然且當竭盡駑蹇以免避事之謗爾俟臣疾體平復路分中或無敗事即別聽陛下任使亦未為晚犬馬之懇惟聖情裁照熈寜元年十一月上時以觀文殿大學士判汝州上神宗辭免樞密副使司馬光臣前者兩曾辭免樞密副使未奉俞㫖竊慮區區之誠未能上達須至詳悉復有奏陳臣聞人之材性有能有不能人主量材然後授官審能然後授事是以官不曠而事無敗也臣幸生承平之時家世為儒臣自髫齔至於弱冠杜門讀書不交人事仕宦以來多在京師少歴外任故於錢榖刑獄繁劇之務皆不能為況於軍旅固所不習獨於解經述史及以愚直補過拾遺不避怨怒則庶幾萬一或有可取是以毎於拜官之際辭所不能而不辭其所能向者除開封府推官以繁劇曾辭後除修起居注知制誥翰林學士以文采不工曾辭除龍圖閣直學士以乆在諌職無效曾辭再除翰林學士兼侍讀學士以言事未了曾辭除史館修撰以方修資治通鑑恐朝廷修國史難以兩處供職曾辭自餘除國子監直講館閣校勘史館檢討集賢校理直秘閣起居舍人同知諌院天章閣待制兼侍讀知諌院權御史中丞此皆朝廷清要之職除書始下臣即時受命未甞輙辭所以然者自度駑鈍可以䇿勵不至曠敗故也天下之人見臣屢辭恩命或以為不慕榮貴或以為飾詐邀名是皆不知臣者也臣自㓜習詩賦論䇿應舉就試毎三年一次投狀乞磨勘豈不慕榮貴者耶臣若隂有營求陽為辭避乃可謂之飾詐邀名陛下察臣何甞如此豈飾詐邀名者邪臣之愚心正欲辭所不能而巳今二府之任自非天下英傑之士不可輕處豈臣愚淺下才所能堪稱或遇國家大事叅陪末議有毫釐之差使陛下有旰食之憂以累知人之哲臣雖伏斧鑕不足塞責加之素有目疾不能逺視近日以來頗多健忘居常供職猶懼廢闕況以衰病當茲重任是用披肝瀝膽昧冒上陳違犯詔㫖至于再三觸法抵罪不自知覺伏望聖慈特賜矜察依臣前奏追還新恩俾守舊職熈寜三年二月上時為翰林學士上神宗辭免樞密副使恩命係第五状司馬光臣伏以陛下聖恩無窮愚臣辭避不巳盡下之德愈盛慢上之罪愈深憂惶失圖無地自處臣竊惟陛下今茲不次用臣必以識慮為小有可采臣亦以受陛下非常之知不可以全無報效是以乞罷制置三司條例司及諸路提舉幹當常平廣惠倉使者若陛下果能行此勝於用臣為兩府臣若得此言果行勝於居兩府之位儻或所言皆無可采臣猶何顔敢當重任伏望聖慈矜察更不復遣使臣宣召追還樞密副使恩命庶使賤臣差獲自安貼黄李舜舉傳聖㫖諭臣以樞密院本兵之地各有職分不當更引他事為辭臣今若巳授樞密副使勑告即誠如聖㫖不敢更言職外之事今未授恩命猶是侍從之臣於朝廷闕失無不可言者所以區區貪進小忠庶幾少禆聖政之萬一況所言二事並是去年巳曽上言以其無效所以不敢當今日新恩非為侵官乞聖明裁察兼臣又膝下見患一瘡有妨拜起入見未得伏望聖慈更不差使臣宣召臣只候膝瘡稍愈自乞入見面奏懇誠熈寜三年二月上上神宗辭免樞密副使恩命係第六状司馬光臣伏准幹當御藥院方傳宣撫問兼問臣取幾日入見令早入者聖恩深厚不忘微賤存恤勤至臣螻蟻之命無足報塞惶恐無措伏念臣即今膝瘡雖稍減可尚未全愈有妨拜起未知可以入見之日不獨如此兼為臣近曽上䟽言乞罷制置三司條例司及追還諸路常平廣惠倉使者未聞朝廷少賜采録但聞條例司愈用事催散青苗錢愈急中外人情愈遑遑不安臣當此際獨以何心敢當髙位故寜被嚴譴未敢輙出臣聞古者國有大事謀及卿士謀及庶民參酌下情與衆同欲是以事無不當令無不行未甞有四海之内卿士大夫農商工賈異口同辭咸以為非獨信二三人之偏見而能成功致治者也伏望陛下出臣近所上䟽宣示中外臣庶使共决是非若臣言果是乞早賜施行若臣言果非更不差使臣宣召早收還樞密副使勑告治臣妄言及違慢之罪明正刑書庶使是非不至混淆微臣進退有地不為天下之所疑怪熈寜三年二月上是時王安石用事方行新法光有此除命以爭論不從固辭不拜内一䟽多論新法見新法門上神宗辭直舍人院天章閣侍講陳襄臣今月十三日延和殿侍立又䝉内臣傳宣召臣面諭聖㫖令臣受命臣雖再三辭避不䝉俞允又以侍講之命前來巳降御批宣諭責臣以經義之益亦令勿辭臣雖至愚上荷聖恩之厚惶恐之際難以固違退而思之終是義理未安不敢祇受故臣區區之誠尚有未盡者不避罪戮須至再煩天聽惟陛下俯加察允則愚臣幸甚臣聞之君子之仕行其義也非以為利也夫所謂義者食其食而憂其事不以一身之所利而忘天下之所患道之行也言之從也雖禄之以萬鍾而不辭道之不行也言之不從也則致為臣而去此古人之所以去就也今也中國一君内外莫非其臣捨乎是則夷狄之國無可去之義矣故其道之不行言之不用烏乎必也辭尊以居卑辭冨以居貧辭内以居外如斯而巳矣則是臣今日之去就固可知矣向者臣得待罪於憲司不能諌正朝廷之失同時言事之臣皆被竄逐而臣獨畱而不去固巳得罪於古人矣方斯時也惟其辭大以就小辭冨以居貧豈冝更冒恩榮不度於義自聞除目之下寵數便蕃中外聞之莫不驚駭皆謂臣之顧惜利禄言事依違善承人主之意有以得之事雖不然顧其迹烏得使人不疑至此哉故口言之心不存之則人不信心存之身不行之則人不服此臣今日之去就正在乎力行於身而求合於義也易曰莫益之或擊之立心勿恒凶臣之謂也況夫典誥之文所以宣布王命勸講經籍之義所以開悟聖心今也言不足以見用於前身不足以為法於後且欲望其號令孚天下而道義信人主其可得哉故臣之所以不敢承命者此也所有前件勑三道並未敢祇受伏望聖慈早賜追寢熈寜三年五月上時修起居注先是㐮為御臾知雜甞論新法不便及斥王安石吕惠卿等同時言者劉述等皆逐而襄獨遷故力辭上又手詔畱之曰朕素慕卿經術行義深惜逺去庶幾左右經席漸磨道義以釋所願今覽來奏尚欲固辭豈未悉朕意歟還所來章冝急就職宋名臣奏議巻七十五
