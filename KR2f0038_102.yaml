body:
  text: 宋名臣奏議卷一百二宋趙汝愚編財賦門理財中上仁宗論理財三事乞置總計使司馬光臣聞昔楚莊王以無災為懼曰天豈棄不榖乎范文子曰唯聖人能外內無患然則嵗小不登邊鄙有警未必非國家之福也伏見今春天久不雨陛下憂勞於內公卿惶恐於外豈不以公私之積素不充實若遇飢饉將無以相恤乎一朝京師得雨逺方未遍則君臣釋然相慶不復以民食為念陛下安知來嵗之旱不甚於今嵗乎蓋天降災沴蠻夷猾夏冦賊姦宄此堯舜所不能免也即不幸有大水大旱方二千里戎狄乘間而窺邊細民窮困而為盜軍旅數起久未有功府庫之蓄積巳竭百姓之生業已盡陛下當此之時將以何道救之乎臣不知陛下與公卿大臣以此為必無而不足憂乎將以為有之而不為之備俟事至然後憂之也雖以陛下之聖明得益稷太公以為輔佐臣以為不及矣何則聖賢之治皆積以嵗月然後有功欲天下之家給人足固不可一日具也周易既濟之象曰君子以思患而豫防之思患而豫防之此其時矣失之愈逺救之愈難奈何日復一日取適目前而已矣晉武帝時何曽謂其子孫曰吾每見主上所説皆平生常語未嘗及經逺大計吾子孫其及於亂乎其後五胡爭亂中州覆沒生民塗炭幾三百年由是觀之上下偷安不為逺謀此最國家之大患也詩曰哀哉為猶匪先民是程匪大猶是經維邇言是聼維邇言是爭如彼築室于道謀是用不潰于成方今之政何以異此此臣之夙夜所為痛心疾首者也古之王者藏之於民降而不能乃藏於倉廪府庫故上不足則取之於下下不足則資之於上此上下所以相保也今民既困矣而倉廪府庫又虛陛下儻不深以為之謀臣恐國家異日之患不在於他在於財力屈竭而已矣今朝廷不循其本而救其末特置寬恤民力之官分命使者旁午四出爭言便宜以變更舊制米鹽之事皆非朝廷所當預者張設科條不可勝紀或不如其舊益為民患或朝三暮四移左於右其間果能利民者不過放散縣官之物以豫民耳是誠損上益下王者之仁政也然臣聞古之聖人養之有道用之有節上有餘財然後推以豫民是以上下交足而頌聲作矣今入者日寡出者日滋其竭可立待也公家既竭不取諸民將焉取之是徒有利民之名而無利民之實果有益哉夫寬恤民力在於擇人不在於立法若守令得人則民力雖欲毋寬其可得乎守令非其人徒立苛法適所以擾民耳自置此官以來於今纍年臣訪之民間未聞其困弊小瘳於前也然則為今之術奈何曰在隨材用人而久任之在養其本原而徐取之在減損浮冗而省用之何謂隨材用人而任之夫人之材性各有所宜雖周孔之材不能遍為人之所為况其下乎固當就其所長而用之今朝廷用人則不然顧其出身資敘何如耳不復問其材之所堪也故在兩禁則欲其為嚴助司馬相如任將帥則欲其為衛青霍去病典州郡則欲其為龔遂黃霸尹京治縣邑則欲其為張敞趙廣漢司財利則欲其為孔僅桑𢎞羊世豈有此人哉故財用之所以匱乏者由朝廷不擇專曉錢榖之人也國初三司使或以諸衛將軍諸司使為之判官則朝士曉錢榖者皆得為之不必用文辭之士也先朝以數路用人文辭之士置之館閣曉錢榖者為三司判官曉刑獄者為開封府推判官三者職業不同趣舍各異莫相涉也然後人主以時引對訪問以察之使令以試之積久以觀之核其真偽辨其臧否考其功效然後進之退之未必歷其職者皆須進用不可復退也故羣臣各宣其用而萬事交舉矣夫官久於其業而後明功久於其事而後成是以古者世官相承以為氏姓先朝陳恕在三司十餘年至今稱能治財賦者以恕為首豈恕之材智獨異於人哉蓋得久從事於其職故也至於副使判官堪其事者亦未數易也是以先帝屢行大禮東封西祀廣修宫觀而財用有餘者用人專而任之久故也近嵗三司使副使判官大率多用文辭之士為之以為進用之塗不復問其習與不習於錢榖也彼文辭之士習錢榖者固有之矣然不能專也於是乎有以簿書為煩而不省以錢榖為鄙而不問者矣又居官者出入遷徙有如郵舍或未能盡識吏人之面知職業之所主巳捨去矣臣頃判度支計院甫二年耳上自三司使下至檢法官改易皆遍甚者或更歷數人雖有恪勤之人夙夜盡心以治其職人情稍通綱紀粗立則捨之而去後來者意見各殊則嚮之所為一皆廢壞况怠惰之人因循茍且唯思便身不顧公家者乎如此而望太倉有紅腐之粟水衡有貫朽之錢臣未知其期也凡百官莫不欲久於其任而食貨為甚何則二十七年耕然後有九年之食今居官者不滿三嵗安得有二十七年之效乎臣愚以為朝廷宜精選朝士之曉練錢榖者不問其始所以進或進士或諸科或門蔭先使之治錢榖小事有功則使之權發遣三司判官事及三年而察之實效顯者然後得權三司判官事又三年更有實效然後得為正三司判官其無實效者退歸常調勿使收用其諸路轉運使不復以路分相壓使之久於其任有實效者或自權為正自轉運副使為轉運使無實效者亦退歸常調勿復收用每三司副使闕則選三司判官及諸路轉運使功效尤著者以補之三司使闕亦選於副使以補之三司使久於其任能使用度豐衍公私富實者增其秩使與兩府同而勿改其職如此則異日財用之豐耗不離於已不得諉之他人必務為永久之規矣其文辭之士則自有資望不必使為錢榖之吏以輕之也何謂養其本源而徐取之善治財者養其所自來而收其所有餘故用之不竭而上下交足也不善治財者反此夫農工商賈者財之所自來也農盡力則田倍收而租有餘矣工盡巧則器斯堅而用有餘矣商賈通流則有無交易而貨有餘矣彼有餘而我取之雖多不病矣今之有司自謂能治財者臣見之矣凍餒其民而豐積聚者也掃土以市祿位而不恤後人者也捃拾麻麥而喪丘山者也保惜一錢而費萬金者也不操白刃而為冦攘者也姦巧簿書而罔君上者也必曰養其所自來而收其所有餘則聞者以為笑矣夫使稼穡者饒樂而惰遊者困苦則農盡力矣堅實便用者獲利浮偽侈靡者不售則工盡巧矣公家之利捨其細而取其大散諸近而收諸逺則商賈流通矣農工商賈皆樂其業而安其生則公家何求而不獲乎夫農天下之首務也古人之所重而今人之所輕豈獨輕之又困苦莫先焉何以言之彼農者苦身勞力衣粗食糲官之百賦出焉百役歸焉嵗豐則賤貿其榖以應官司之求嵗凶則流離凍餒先衆人填溝壑如此而望浮食之民轉而緣南畝難矣彼直生而不知市井之樂耳茍或知之則去而不返矣故以今天下之民度之農者不過二三而浮食者常七八矣欲倉廪之實其可得乎臣愚以為凡農民租稅之外宜無有所預衙前當募人為之以優重相補不足則以坊郭之民部送綱運典領倉庫不費二三而農民常費八九何則儇利戇愚之性不同故也其餘輕役則以農民為之嵗豐則官為平糴使榖有所歸嵗凶則先按籍簿賙贍農民而後及浮食者民有能自耕種積榖多者不籍以為家資之數如此則榖重而農勸矣彼百工者以時俗為心者也時俗貴用物而賤浮偽則百工變而從之矣時俗者以在上之人為心者也在上好朴素而惡浮侈則時俗變而從之矣其百工在官者亦當擇人而監之以工緻為上華靡為下物勒工名謹考其良苦而誅賞之取其數則器用無不精矣彼商賈者志於利而已矣今縣官數以一切之計變法更令棄信而奪之彼無利則棄業而從他縣官安能止之哉是以鹽茶棄捐征稅耗損凡以此也然則縣官之利果何得哉善治財者不然將取之必豫之將斂之必散之故曰日計之不足而嵗計之有餘此乃白圭猗頓之所知豈國家選賢擇能以治財用其智顧不如白圭猗頓耶患在國家任之不久責近效而遺逺謀故也夫伐薪者惜其條枝養其本根則薪不絶矣若并本根而伐之其得薪豈不多哉後無繼矣是非難知之道也然有司不為者彼其心曰吾居官不日而遷不立效於目前以自顯顧養材以遺後之人使為功吾何賴焉是非特有司之罪也亦朝廷用人之法驅之使然也何謂減損浮冗而省用之昔太祖初得天下之時止有一百一十一州耳江南兩浙西川富饒之地皆為異域又承五代荒亂之餘府庫空竭豪傑棊布於海內戎狄窺覦於邉境戎車嵗駕四方多虞當是之時內給百官外奉軍旅誅除僣偽賞賜巨萬未嘗聞財用不足如今日之汲汲也陛下承祖宗之業奄有四百餘州天下一統戎狄欵塞富饒之土貢賦相屬承平積久百姓阜安是宜財用羡溢百倍於前奈何竭府庫之所蓄罄率土之所有當天下無事之時遑遑焉專救經費而不足萬一有不可期之災患將何以待之乎夫以國初之狹隘艱難財用宜不足而有餘今日之廣大安寧財用宜有餘而不足陛下亦嘗熟思其所以然之理乎得非太祖所養者皆有功可用之人陛下所養者未必盡有功可用乎臣竊見陛下天性恭儉不好侈靡宫室苑囿皆因祖宗之舊無所更造或隳頓荒翳不加修治飲膳衣食器皿帷帳適足供用不極精華或苦惡弊綻亦不更易雖唐虞之土階三尺茅茨不翦殆無以過然左右侍御之人宗戚貴臣之家第宅園圃服食器用往往窮天下之珍怪時時鮮明唯意所欲無復分限以豪華相尚以險陋相誓厭舊而好新月異而嵗殊是以費用不足則請求無厭丐貸不止甚者或依慿詔令以發府庫之財假託供奉以糜縣官之物真偽莫辨多少不會陛下聖度寬仁不欲拒塞惡聞人過不加案詰至於頒賜外廷之臣亦皆踰溢常數不循舊規如嚮者皇女初生所散包子之類費用不可勝紀臣嘗聞耆舊之人言先朝公主在宫中俸錢不過月五千其餘後宫月給大抵倣此非時未嘗輕有賜豫亦不甚豐竊聞近日俸給賜豫比於先朝何啻數十倍矣漢明帝曰我子豈宜與先帝子等乎夫等猶不可又况過之是以祖宗之積窮於賜豫困於浮費臣不能知其詳以外望度之十耗七八矣內藏已虛而浸淫於左藏矣夫府庫者聚天下之財以為民也非以奉一人之私也祖宗所為置內藏者以偹飢饉兵革非常之費非以供陛下奉養賜豫之具也今內藏庫專以內臣掌之不領於三司其出納之多少積蓄之虛費簿書之是非有司莫得而知也若皆以奉養賜豫而盡之一旦有飢饉兵革之事三司經費自不能周內藏又無所仰斂之於民則民巳困竭得無狼狽而不支乎此臣夙夜所凛凛也今陛下所以有唐虞之德而無唐虞之治者其失在於不忍而好豫不忍則不誅有罪好豫則不待有功不誅有罪則姦邪欺罔而不忌不待有功則貪佞徼幸而無厭治道之所以不格於上下者凡以此也昔韓昭侯有敝袴命藏之侍者曰君亦不仁矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者彼小國諸侯猶能重賞如是而國以富強况以四海之主不行無功徼幸之賞杜塞甘言悲辭之請則唐虞之治何逺之有哉夫府庫金帛皆生民之膏血州縣之吏鞭撻其丁壯凍餒其老弱銖銖寸寸而誅之今以富大之州終嵗之積輸之京師適足以供陛下一朝恩澤之賜貴臣一日飲宴之費陛下何獨不忍於目前之羣臣而忍之於天下之百姓乎夫以陛下恭儉之德擬乎唐虞而百姓窮困之弊均於秦漢秦漢竭天下之力以奉一身陛下竭天下之力以資衆人其用心雖殊其病民一也此臣之所以尤戚戚者也又宫掖者風俗之原也貴近者衆庶之法也故宫掖之所尚則外必為之貴近之所好則下必效之自然之勢也是以內自京師士大夫外及逺方之人下及軍中士伍畎畝農民其服食器用比於數十年之前皆華靡而不實矣嚮之所有今人見之皆以為鄙陋而笑之矣夫地之産有常而人類日繁耕者寖寡而遊手日衆嗜欲無極而風俗日奢欲財力之無屈得乎哉又府史胥徒之屬居無廪祿進無榮望皆以陷民為生者也上自公府省寺諸路監司州縣鄉村倉場庫務之吏詞訟追呼租稅徭役出納會計凡有毫釐之事關其手者非賂遺則不行是以百姓破家壞産者非縣官賦役獨能使之然也大半盡於吏家矣此民人之所以重困也又國家比來政令寬弛百職隳廢在上者簡倨而不加省察在下者侵盜而恣為姦利是以每有營造貿置其所費財物十倍於前而所收功利曽不一二此國用之所以尤不足者也又自古百官皆有常員而國家用磨勘之法滿嵗則遷日滋月益無復限極是以一官至數百人則俸祿有增而無損矣又近嵗養兵務多不務精夫兵多而不精則力用寡而衣糧費衣糧費則府庫耗府庫耗則賜賚稀是以不足者豈唯民哉兵亦貧矣䇿之失者無甚於此也凡此數事皆以竭民財者陛下安得熟視而無所變更耶臣愚伏願陛下觀今日之弊思將來之患深自抑損先由近始凡宗室外戚後宫內臣以至外廷之臣俸給賜豫皆循祖宗舊規勿復得援用近嵗僥幸之例其踰越常分妄有干求者一皆塞絶分毫勿許若祈請不巳者宜嚴加懲譴以警其餘凡文思院後苑作所為竒巧珍玩之物不急而無用者一皆罷省內自妃嬪外及宗戚下至臣庶之家敢以奢麗之物夸眩相髙及貢獻賂遺以求悅媚者亦明治其罪而焚毁其物於四逹之衢專用朴素以率先天下矯正風俗然後登用亷良誅退貪殘保祐公直消除姦蠧澄清庶官選練戰士不祿無功不食無用如此行之久而不懈臣見御府之財將朽蠧而無所容貯太倉之粟將彌漫而不可蓋藏農夫棄糧於畎畝商賈遜財於道路矣孰與今日汲汲以應目前之求凛凛以憂將來之困乎夫食貨者天下之急務今窮之如是而宰相不以為憂意者以為非巳之職故也臣願陛下復置總計使之官使宰相領之凡天下金帛錢榖𨽻於三司如內藏庫奉宸庫之類總計使皆統之小事則官長專逹大事則謀於總計使而行之嵗終則上其出入之數於總計使量入以為出若入寡而出多則總計使察其所以然之理求其費用之可省者以奏而省之必使嵗餘三分之一以為儲蓄備禦不虞凡三司使副使判官轉運使及掌內藏庫奉宸庫之官皆委總計使察其能否考其功狀以奏而誅賞之若總計使久試無效則乞陛下罷退其人更置之議者必以為宰相論道經邦燮理隂陽不當領錢榖之職是皆愚人不知治體者之言昔舜舉八愷使主后土奏庶艱食貿遷有無地平天成九功惟敘周禮冡宰以九職九賦九式九貢之法治財用唐制以宰相領鹽鐡度支戶部國初亦以宰相都提舉三司水陸發運等使是則錢榖自古及今皆宰相之職也今譯經潤文猶以宰相領之豈有食貨國之大政而謂之非宰相之事乎必若府庫空竭閭閻愁困四方之民流轉死亡而曰我能論道經邦燮理隂陽非愚臣之所知也臣不勝狂愚犯忌諱惟陛下裁察嘉祐六年上時同知諫院上神宗論國計張方平臣竊惟天之生民以衣食為命聖人因是而為之均節立君臣貴賤等衰之分以止其爭且亂故禮也者文飾此者也刑也者防禁此者也凡所謂賞罰法令仁義亷恥皆緣此而後立者也衣食不足何禮刑之有哉內無以保其社稷外無以制其夷狄國非其國矣故食貨者人事之確論非髙談虛辭之可致者也今京師砥平衝會之地連營設衛以當山河之險則是國依兵而立兵待貨食而後可聚此今日天下之勢也臣在仁宗朝慶厯中充三司使嘉祐初再領邦計嘗為朝廷精言此事纍有奏議所陳利害安危之理究其本原冗兵最為大患略計中等禁軍一卒嵗給約五十千十萬人嵗費五百萬緡臣前在三司勘會慶厯五年禁軍之數比景祐以前增置八百六十餘指揮四十餘萬人是增嵗費二千萬緡也大祖皇帝制折杖法免其徒初置壯城牢城偹諸役使謂之廂軍後乃展轉增創軍額今遂與禁軍數目幾等此其嵗增衣糧幾何是皆出於民力則天下安得不困臣慶厯五年取諸路鹽酒商稅嵗課比景德會計録皆增及三數倍以上景德中收商稅四百五十餘萬貫慶厯中一千九百七十五萬餘貫景德中收酒課四百二十八萬餘貫慶厯中收一千七百十萬餘貫景德中收鹽稅課二百五十五萬餘貫慶厯中收七百二十五萬餘貫但茶亦有增而不多爾天下和買紬絹本以利民初行於河北但資本路軍衣遂通其法以及京東淮南江浙景祐中諸路所買不及二百萬匹慶厯中乃至三百萬匹自爾時及今又二十年但聞比校督責不聞有寬減也如此峻取天下豈復有遺利自古有國者貨利之大無若是之多其費用亦無若是之廣也昔唐室自天寶之亂肅代之後國力大窘禁軍之餉畿甸百姓至挼穗以供兵食登都城門以望四方貢賦之至可謂危蹙矣然患難既平則兵有時而解兵解則民力紓矣今中外諸軍坐而衣食無有解期天下困敝已如此而上下恬然不圖營救寶元康定中夏戎阻命西師在野既聚軍馬即須入中糧草在京支還交鈔錢銀物帛一嵗約支一千萬以上三司無以計置即須內帑供給慶厯二年三年連年支撥內庫銀紬絹只此兩次六百萬匹兩三司以補不足尋即支盡西事已定二紀於茲中間亦不聞有所處置者邦家大不幸變故仍臻頒賚之餘府庫虛匱宿藏舊積蓋無餘幾萬一因之以飢饉加之以冦戎臣恐智者難以善於後矣夫茍且者臣下及身之謀逺慮者陛下家國之計茲事體大在陛下所憂無先於此財計之任雖三司之職日生煩務常程計度簿書期會則在有司至議有繫於軍國之體事有關於安危之機其根本在於中書樞密院非有司可得預也今夫賦斂必降宣是祖宗規模二府共司邦計之出入也今欲保大豐財安民固本當自中書樞密院同心協力修明真宗巳前舊典先由兵籍減省以次舉其為敝之大若宗室之制官人之法諸生事造端非簡便者裁而正之至於微末細故於國計盈虛不足為損益屬之有司可矣提其綱則衆目張澄其源則下流清易曰窮則變變則通通則久又曰變而通之以盡利節卦之辭曰節以制度不傷財不害民故傷財害民之事當為制度以節之爾若但遵常守故齪齪細文避猜嫌顧形迹恤浮議而廢逺圖忽人謀而徼天幸日月逝矣嵗不我與雖噬臍何嗟及矣臣服在近列荷恩三朝竊見時事日以迫急不勝憂憤輒罄狂瞽惟陛下留神省察治平四年閏三月上時為翰林學士承旨宋名臣奏議卷一百二
