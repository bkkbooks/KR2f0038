body:
  text: 宋名臣奏議卷一百二十六宋趙汝愚編方域門宫禁上仁宗論皇門禁馬遵臣聞古者常刑宥過無大至臣子之於君父則義有所不容故舟船飲食之類有不如法皆不稱誤所以許世子止躬不嘗藥春秋加大惡之名唐長孫無忌入不解刀校尉被誅死之議所責者重所慮者深杜慢隙而消禍萌理當然也嘗聞太祖朝內酒坊火監官守卒並從極斷豈徒峻法蓋欲防患竊見朝廷法令素具皇城門禁尤為謹嚴而挾刃䦨入頻年有之雖常行遣終不戒懼今麥昭吉襆被入直中有劒器歷諸門抵便殿曽無檢察略不覺悟若姦盜包藏而為之何由而露哉公謾憲禁無甚於此今昭吉雖已具獄而諸門監官守卒未聞處置伏乞陛下察詳事理特出聖斷常法之外更賜重行用謹大防庶弭來患至和元年上時為殿中侍御史上仁宗論內東門使臣藏挾女口闌入禁庭馬遵臣聞內東門使臣於車子內藏挾女口闌入禁庭事已彰露未聞行遣竊緣東門密近御所最是要切隄防之地著籍出入素有條憲用親近使臣監掌務在謹嚴至敢公然自犯輒入外人若置而不問則啓釁容奸必兆於今日伏乞聖斷指揮付外所司根勘重行朝典所貴戒勵後人杜絶來患至和元年上同前係第二狀馬遵臣近曽彈奏內東使臣輒以女口闌入禁庭至今數日未聞處分竊緣宫門出入條約具存峻為之防猶懼不肅而監掌之人公然自犯法之不容自近者始而天下之所公也陛下聖明必不私於小臣而屈天下之法或慮所司未禀宸斷使中外之議日益喧然所損不細伏乞聖㫖早賜施行至和元年上上仁宗論公主非時入宫吕誨臣聞近日兖國公主深夜出入宫禁內外驚駭罔知其繇竊以宫鑰謹嚴以時啓閉蓋備非常況公主起居覲省既非其時守閽之吏輒敢通奏此而不禁後將為常一有竊發何以備禦斯不可不為之深慮也所有公主宅祗應使臣及皇城司應經歷門户管幹人伏乞朝廷取勘重行責降以肅禁衛之事嘉祐五年九月上時為殿中侍御史上仁宗論公主非時入宫王陶臣伏以周禮閽人掌宫門之禁時其啓閉寺人掌女宫之令糾其出入以謹嚴周衛杜絶非常故漢光武出獵夜還上東門候郅惲拒關不納光武從中東門入明日賞郅惲而貶中東門候魏武之子臨淄侯植開司馬門晝出魏武怒公車令坐死然則公主夜歸未辨真僞輒便通奏開門納之直徹禁中略無譏防其所歷皇城宫殿內外監門使臣請並送開封府勘劾嘉祐五年三月上時為左正言尋詔公主宅都監入內供奉官梁全一等九人並逺小處監當內梁懷吉配西京灑掃班上仁宗論夜開宫門司馬光臣竊聞今月二十五日十三公主薨其日宫中送殯出城留宫門及城門至夜深方閉物情駭異以為非宜雖陛下慈愛至深然門闕之禁不可不嚴若以式律言之夜開宫殿門及城門者皆須有墨敕魚符其受敕人具録所開之門并出入人帳送中書門下自監門衛大將軍以下俱詣閣覆奏御注聽即請合符門鑰監門官司先嚴門仗所開之門內外並立隊燃炬火對勘符合然後開之符雖合不勘而開若勘符不合而為開及不承敕而擅開閉若得出入者剩將人出入其刑名輕者徒流重者處絞今以乳兒出殯之故內自禁掖外達郊野諸門洞開一如晝日車馬往來絡繹不絶出入之人無復譏訶有如萬分之一姦險不逞之人雜處其間豈可不為之寒心哉伏望陛下深慮安危防微杜漸自今宫殿門城門並須依時開閉非急切大事勿復夜開必不得已須至夜開者即乞陛下親降手敕加以御寶受敕之人仍寫出入人帳委宿衛當上之官衆共驗敕文真的然後覆奏候再見御批方請門鑰與監門官親自監開依帳㸃閲人數放令出入即時下鑰進納門鑰其宿衛監門官司若不見手敇及御批而輒敢開者依不承敕而擅開門律文施行雖有手敕御批不參驗及不親自監開㸃閲人數者依符雖合不勘而開律文施行庶可以養萬乘之威尊消姦宄於未萌也嘉祐六年閏八月上時為同知諫院上徽宗請嚴宫禁之法任伯雨臣風聞內苑作工匠盜所結真珠事敗有㫖更不得治監官醫官院人力懷刃為盜捕獲有㫖不復推經由門户中外聞之莫不撫髀而歎頓足寒心皆謂陛下誤以為小事切以監官之設本為監臨主守司門之設本為譏察出入今珠璣至貴之物失至數萬匹夫挾刃入數重門如涉無人之境皆非小事不止因循乃一切赦之後來更有犯者陛下不赦之則罪同罰異人人皆怨陛下又赦之則事事廢法紀綱遂壞雖有監官司閽將何用也且宫禁之門法最嚴密周官小宰治宫禁之法獨有大刑在律亦宫禁之法為最重蓋聖人立法之意防慮幾微謹備不測以嚴衛一人今陛下多愛不忍幾於姑息廢萬世之成憲棄祖宗之大法紀綱不立左右恃恩廢弛積日纍月事體陵遲忽有不測之虞誰復知所職守陛下豈不為宗廟社稷自重乎臣伏願陛下罷前降㫖揮敕有司依法律推治干繫所貴人人盡心各知職守不至弛玩以産禍亂則宗廟之休社稷之福也建中靖國元年上拜為左正言都城上仁宗論修建北京范仲淹臣危言孤立久荷聖知當此旰昃之憂豈可循默自守雖以言而取罪亦以盡臣子之心臣先於景祐三年五月初在開封府曽進劄子言西洛帝王之宅絶無儲備乞聖慈以將有朝陵為名使東道有餘則運而西上西道有餘則運而東下數年之間庶幾有備太平則居東京舟車輻輳之地以便天下急難則守西洛山河之宅以保中原當時臣言西洛可營者以備急難也今北事既動營洛已晚臣今别有愚見請一二以陳之臣竊聞修建北京以禦大敵以臣料之可張虛聲未可為倚何哉河朔地平去邉千里胡馬豪健晝夜兼馳不十數日可及澶淵陛下乘輿一動千乘萬騎非數日可辦倉卒之間胡馬已近欲進北京其可及乎此未可一也又承平已久人不知戰聞寇大至羣情憂恐陛下引憂恐之師進涉危地或有驚潰在爪牙之臣誰能制之此未可二也又北京四面盡平絶無險厄之地儻乘輿安然到彼而胡馬旁過直趨河南於澶淵四面乘凍而渡京師無備將何以支宗廟社稷宫禁府庫皇宗戚里之屬千官百辟之家六軍萬民血屬盡在無金城湯池可傍無堅甲利兵可禦陛下行在河朔心存京師豈無回顧之大憂乎此未可三也假使大河未凍寇不得渡而直圍守澶淵聲言向闕以割地㑹盟為請當此之時京師無備胡塵俯逼陛下能堅守不動而拒請乎唐眀皇時祿山為亂舊將哥舒翰以四十萬兵屯守潼關請不出戰且以困賊楊國忠促令進討一戰大敗遂陷長安今京師無備寇或南牧朝廷必促河朔諸將出兵截戰萬一不勝則有天寶之患朝廷將安往乎昔煬帝盤遊淮甸違逺關中唐祖據之隋室遂傾明皇出幸西蜀非肅宗立于朔方天下不復為唐矣德宗欲幸益郡李晟纍奏乞且幸山南以繫人心乃知朝廷萬邦之根本今陜西河北聚天下之重兵如京師搖動違逺重兵則姦雄奮飛禍患四起臣聞天有九閽帝居九重是以王公法天設險以安萬國也易曰天險不可升地險山川丘陵王公設險以守其國正在今日矣臣請陛下速修東京髙城深池軍民百萬足以為九重之備乘輿不出則聖人坐鎮四海而無煩動之勞鑾輿或出則大臣居守九重而無回顧之憂矣彼或謀曰邉城堅牢不可卒攻京師坦平而可深犯我若修固京師使不可犯則伐彼之謀而沮南牧之志矣寇入之淺則邉壘已堅寇入之深則都城已固彼請割地我可弗許也彼請決戰我可弗出也進不能為患退不能忘歸然後因而撓之返則追之縱有鈔掠可邀可奪彼衰我振未必不大勝豈非陛下保社稷安四海之全䇿哉或曰京師王者之居髙城深池恐失其體臣聞後唐末契丹以四十萬衆送石髙祖入朝而京城無備閔宗遂亡石晉時叛臣張彥澤引契丹犯闕而京城無備少主乃陷此皆無備而亡何言其失體哉臣但憂國家之患而不暇顧其失體也若以修築城隍為失體不猶愈於播遷之禍哉朝廷大臣百辟必曉此事但懼議者謂其失體而不敢言臣任在西陲非當請間而言此事誠罪人也然臣子之心豈敢忘君親之憂況臣素來愚拙唯知報國而不知其受謗矣昔奉春君負販之夫勸髙祖都關中而張良贊之翌日命駕臣叨預近列而輒建言比之奉春君之僣未甚為過至於西洛帝王之宅太祖營修有意在子孫表裏山河接應東京之事勢連屬關陜之形勝又河陽據大川之險當河東之㑹要為西洛之北門又長安自古興王之都天下勝地皆願朝廷留意常委才謀重臣天下幸甚慶歷二年八月上時為陜西四路安撫沿邉招討使上仁宗乞罷修京城余靖臣竊聞大臣建議內有修京城置府兵二事者伏以廟堂謀議天下具瞻帝王言動萬世為法安危所繫舉措非輕事之幾微不可不謹難與慮始人之常情臣願陛下深思逺圖以安民為本臣請縷陳二事望陛下擇其可否臣聞西賊僣號之初宋庠請修函谷此時關中動搖謂朝廷棄關西而自守今無故而修京城乃是捨天下之大而為嬰城自守之計四方聞之豈不動搖强弱之勢正在此矣無戎而城春秋所譏守在四夷義不如此又前嵗以邉鄙之警而河北諸路揀㸃鄉兵之利未集而先致其害也況今北胡之賂既厚西戎之好既講雖知信誓不可卒保嗸嗸蒼生咸望帖泰而都畿之下先自擾之根本不寧四方何望哉昔魏侯恃險吳起以為失詞宣王料民山甫談其害政惟是二者皆古今之所重而安危之所起乞陛下捨此二䇿别議逺圖之術慶歷四年五月上時知諫院上哲宗乞罷修京城劉安世臣伏見近降朝㫖於京東河北差崇勝奉化兵士各五百人及招填廣固四指揮各令及八百人之額立限五年修築京城又許支朝廷應于封樁錢和雇人夫二千人令作四季開撅城壕臣雖至愚慮不及逺詳觀事理甚有未安輒進瞽言以黷天聽惟陛下留神省覽臣伏覩陛下聽政之始沛發德音修城兵夫悉令散遣道路歌頌歡仰聖澤四年于此未嘗有枹鼓之警今元元之民方就休息四夷順軌外無戎事而遽興大役衆謂無名又於京東河北再發廂兵人心驚疑不可不慮況修城與開壕之工幾百萬計其費用固已不資方二聖崇尚寬厚前日利源之入去其太半封樁錢物尤宜愛惜而乃竭有限之財應不急之役非計之得也兼臣訪聞近日朝市之間往往切議以謂朝廷將復治茶以收其利雖廟堂之論不能知其有無而庶人之言何因而起臣恐𫝊之四方皆謂陛下前此所罷之事漸欲復講搖動人心所害不細伏望聖慈深賜詳察特罷修城之役非唯為國家惜費便民亦可以杜塞小人妄意陛下為惠不終之議唯冀獨賜睿斷早降指揮元祐四年四月上時為左司諫上哲宗乞罷修京城范祖禹臣伏聞開修京城壕日役三四千人雖和雇夫力調發不及民其錢不屬户部然財出於民一也豈可不計校愛惜而枉費用之臣聞開濠深一丈五尺濶二百五十一步廣於汴河三倍自古未聞有此城池也新城周世宗所築太祖因之建都于此百二十年無山川之險可恃所恃者在修德在用人在得民心此三者纍聖所以遺後嗣子孫也神宗時宋用臣提舉修京城大興土功版築過當小人之情唯欲廣用民力多費國財上則徼幸爵賞次則隱盜官物故役無有不大費無有不廣此姦臣之所利本非先帝意也陛下始初聽政散遣修城役夫百姓皆歡呼鼓舞今欲終成前功但全之而已可也何必廣作無益以害有益乎又京城外門正門即為方城偏門即為甕城其外門皆用純鐵褁之此祖宗時所無有也甕城乃邉城之制非所以施於京師今東西南三面偏門亦欲為甕城臣不知大臣以何見而為此謀也必以為威北狄也使北狄果渝盟南向大臣將坐守此以受敵乎春秋時囊瓦為令尹城郢沈尹戌曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯卑守在四鄰四鄰卑守在四境固其四境結其四援民狎其野三務成功民無內憂而入無外懼國焉用城今民是懼而城於郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待今大臣不修德政而急於城池此囊瓦城郢之計也唐神龍中張仁願為朔方總管築三受降城不置甕門曲敵戰格或曰邉城無守備可乎仁願曰兵貴攻取賤退守寇至當併力出拒敢回望城者斬何事守備退忸其心哉後常元楷代為總管始築甕門議者益重仁願而輕元楷今於京城為受矢石之備是不如張仁願之守邉城也自修城浚池以來議者皆以為無戎而城無寇而溝公宫此言不可不畏其北門甕城已就改之重勞臣欲乞降指揮東西南三面偏門止為方城其濠廣濶可減三分之二稍正王城之體以惜民力以省國用元祐四年五月上時為右諫議大夫上哲宗乞罷修京城梁燾臣竊以都城之役程工浩瀚開廣池隍最為大事全如受敵邉備動搖人心盡發封樁官錢蠧耗國力毁徹廬舍生者不得安掀剔墳隴死者不得息棄土山積旁無曠地稍已湮沒園林浸至壅閼道路近城居民深以為勞兼冒寒暑怨通幽明纍德損政莫甚於此言者相繼指擲明白日聽蠲罷邈未蒙省敝病之時橫在十目愁怨之聲達于四海未諭朝廷何憚不革且以糾殊異之情久則難齊任困苦之事極則生變羣疑不解理有可虞今若但省工料别期嵗月未免久勞終是無益臣愚欲乞聖慈特賜指揮放散見雇人夫只留廣固軍工濠塹已聞處令結未了常城壁據未堅處令漸次修築除冗費之患去妄作之擾使民情安恱而氣和人力舒暇則功倍輦轂之下先見安靜誠今日聖政之所宜為也伏望深留宸念貼黃城圍既峻三面自合周全濠池已濶兩隅不須通鑿況丈尺甚廣費用艱難未見一利已集衆害雖欲其成勢亦不可茍於就功終恐生事伏望聖慈斷在不疑罷此煩役已行之後乞賜采聽當知逺近人情上下安悅臣聞先帝朝知開封府王安禮以修城發掘民間墳墓數多羣情愁怨因此建言先帝惻然即日指揮裁罷人用安寧惠浹幽顯以此見先帝聖意愛民深切但臣下蒙蔽不言故有所不知知則未嘗不曲軫念慮亟為措置也若聞今日之事當立有處分知陛下納用忠言憫恤民害罷修城壕以慰都人是能承先帝之意何嫌而不為也伏望聖慈早賜指揮廣固指揮自有三千餘人每年更有差到廂軍一千人自是日役四千餘人已為不少可以責辦工料次第修治舊管使臣十員可以分頭管幹元祐四年七月上時為右諫議大夫宋名臣奏議卷一百二十六
