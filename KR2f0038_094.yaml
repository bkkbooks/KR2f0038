body:
  text: 宋名臣奏議巻九十四宋趙汝愚編禮樂門喪禮下上仁宗論張貴妃喪禮過制孫沔臣最處孤迹特荷聖恩如遇有聞事干大體不敢隠黙自求安全茍狂言有所開悟雖誅責亦足補報竊見貴妃夭亡上心感悼欲加異禮尤宜節情史筆一書後世為戒故不可不謹也臣雖叨近班莫聞中議實有所疑合具陳奏庶幾更資討論免貽中外之議一皇儀殿乃祖宗太后權厝之所今遷妃子在内恐非一品所宜必是倉卒之間禮官之失又聞諸宫之親朝夕聚衆縗裳千人號泣踰月且正寢至近在上全無避忌何僣如是使魂而有知必不得安况凶穢之氣干犯尊嚴尤為不便懼知禮者傳笑四方更乞酌其舊典速行遷殯庶協中道一恭德之諡蓋禮官務取美名以奉上意未暇開陳恐成敗事至於三朝聖后以孝以章皆以後來孝思尊易諡法今貴妃便以恭德為號實可驚駭詳稽前志無此失禮何况因情自我為繆必致起謗上玷聖明唯乞審議免貽後誚至於郭氏張氏二后並無諡號前規盡在速乞削去恭德二字一園陵監䕶使竊見郭后張后並在奉先殯蓋於體不宜起陵議葬于西京今以貴妃特欲興陵之役未知以何名擇地而為制度人臣豈敢盡言况今經冬無雪數千里災旱加之疾疫是四方多虞之時宜且靜以鎮之若役萬兵之衆費百萬之財於國賦民力實為大損不若便俟豐年徐議其制臣前日聞宰臣初議殯於普安院最為得體臣愚鈍少文乆守外方不盡知朝廷體要聞有識者皆以奉貴妃之議太過蓋佞人阿㫖不以直道禆聖意將以服勞而求爵賞爾况禮不自天降地出在於人情而已茍得其中則為後世令典朝家延洪慶基百年中外無患難者蓋仁義深而禮法正爾陛下當為祖宗惜之伏望遷妃子之靈出皇儀殿罷哭泣之儀去恭德之號省園陵之名然後重加詳酌所貴中禮天下幸甚干凟天威難避誅責臣不勝惶懼激切之至至和元年正月貴妃張氏薨上悲悼不已謂左右曰昔者殿廷徼衛卒夜入宫妃挺身從别寢來衛又朕嘗禱雨宫中妃刺臂血書祝詞外皆不得聞宜有以追賁之入内押班石全彬探上意請用后禮於皇儀殿治喪諸宦官皆以為可入内都知張惟吉獨言此事須翌日問宰相既而太常寺翰林學士承㫖王拱辰知制誥王洙等皆附全彬議宰相陳執中不能正遂詔近臣宗室皆入奠于皇儀殿移班慰上于殿東楹時輟視朝七日命參知政事劉沆為監䕶使全彬及幹當御藥院劉保信為監䕶都監凡典禮皆全彬與沆合謀處置而洙等奏行之沔上此奏時為樞宻副使上仁宗論張貴妃追册皇后孫抃臣伏見貴妃薨逝陛下以數年内助之益議欲追册后諡舉行園陵號名既崇事體尤重參較禮典頗未合宜况自去年秋冬至于春首雨雪不降粟麥未敷必慮百司難為供應伏望陛下先詔大臣商㩁次命禮官議定然後施行所貴聖朝事典動有根據亦所以惜人力而答天意至和元年五月癸丑追册貴妃張氏為皇后賜諡温成抃上此奏時為御史中丞上仁宗論温成䕶葬宜減損正禮孫抃臣在病假中聞朝廷議貴妃事累具劄子論奏數日間留中不降今制命已出必不可更生議論但臣愚深為聖朝惜此一舉欲望陛下特降詔㫖申諭四方言前追册之命止旌褒貴妃生前勤效若挺身以衛宸極割臂以書奏章之𩔖其將來䕶葬次第宜減損正禮務從簡易至於諸般遺賞恩例並須一一檢尋國家故事施行如此則尚可以稍救前失惟新聖德方今自秋不雨終冬無雪春陽浸逺粟麥未敷人心皇皇疾疫相繼災異之大莫甚於此陛下恤民勞憂國力答天意順物情在此行也臣不勝拳拳之至至和元年正月上上仁宗乞免讀温成哀册孫沔臣今月十七日午時授勅差讀温成皇后寶及哀册文尋令本院檢討前典見景德四年中書劄子葬章穆皇后時讀哀册文差翰林學士起居舍人李宗諤及諸般行事盡差兩制官又檢景祐四年中書劄子葬莊惠皇太后時讀哀册文差知樞宻院韓億今䝉勅差臣攝侍中中書令不敢推避縁比來追諡温成已於禮未協頗興物議更僣太后之尊儀並以兩府躬執其事恐於義不便臣自十一月至今凡七日不獲進對不曽親奉德音又不預禮官參議竊恐異日有辨論得失為聖朝之闕是上下相䝉無一士建明以達神聰臣實恥之况兩制官不少速乞改差庶遵舊制所有今來差攝侍中中書令勅二道未敢奉行至和元年正月上時為樞宻院使詔不許辭免翌日執䇿立柩前具言故事如此使孫沔讀則可使樞宻副使讀則不可遂置䇿而退宰臣陳執中取而讀之上仁宗論温成立忌劉敞臣伏聞勅㫖為温成皇后立忌禮官請對不許臣竊惑之凡朝廷常務百司小事猶當上稽舊典下探衆論何况宗廟大禮至尊至重豈可以一時之寵獨决聖心義有僭失貽笑萬世虧損盛明悔不可追今議者乃云有邪臣宻啓眩惑聖聰導陛下以非禮勸陛下以拒諫若此無實尚非美事設有其實罪亦大矣當伏兩觀之誅以謝天下且自太祖以來后廟四室皆陛下之妣也猶不立忌奈何以温成私昵之愛變古越禮則是貴妾於妣尊嬖於嫡上無以事宗廟下無以教後嗣恐祖宗神靈不樂於此非陛下奉先思孝之意也昔成湯改過不吝故稱聖王格于皇天願陛下毋篤於嬖近之寵毋安於邪佞之說毋變先帝之舊典毋枉宗廟之正禮回易意慮割情去私詢于司存追寢過命使萬萬億年無復譏議天下幸甚臣以無能沗備儒館禮樂之失臣得預焉至和元年正月有司請立温成忌敞上此奏時直集賢院上仁宗論為六后立小忌孫抃等臣等昨聞朝廷欲為后廟四室并章惠皇后各立小忌已具劄子論奏至今尚未降出臣等伏覩太祖太宗真宗三朝故事皇后不闕室者皆不立忌此國家大典禮大制度陛下不可不遵守且孝惠孝章淑德章懐章惠是陛下三世尊屬别廟崇奉多厯年所即未嘗有此擬議今因循之間遽爾更改中外聞聽咸謂陛下因温成而遂追及先朝諸后布之詔命則取四方之譏書之史䇿則貽萬世之誚陛下臨御天下踰三十載聖功神德卓若堯舜今忽録此一事遂成非錯俾盛美光大有愧於疇昔陛下安忍如是欲望特降聖㫖集百官議定然後行下制勅所貴禮典詳協以順天人之心至和元年正月劉敞蔡襄爭温成立忌事不聽於是併孝惠孝章淑德章懐章惠皆立忌抃時為御史中丞上此奏尋詔罷立忌上仁宗論温成皇后䕶葬官妄兾改遷范鎮臣伏見前月六日月入南斗月屬隂南斗主爵禄天意若告陛下將有隂小人干冒爵禄者而欲陛下謹爵祿也近日以來在外傳聞皆謂温成葬事將畢石全彬以下及諸工巧人公然揚言妄兾遷改陛下不可不祗畏天戒以固拒之也夫爵賞之出本於慶嘉如縁温成葬事而施爵賞是以慶嘉而幸温成之喪也天意人情俱為不可而外議如此紛紛臣若不先事建言萬一有此而後論列是徒暴朝廷之過於中外而事為無益也至和元年九月上時知諫院上仁宗論温成壙中不當以錦繡珠翠金玉備焚瘞范鎮臣竊聞温成皇后壙中皆以縷金為飾又以錦繡珠翠金玉衣服什物以備焚瘞者甚多此等事於死有益於生無損不可為况於死無益而於生有損乎古先聖賢丁寧以戒厚葬者其思慮至深也今壙中之飾已然之事不可改已其錦繡珠翠金玉之物以備焚瘞者願發明詔一切停減以代下户租賦非惟上益聖德亦為温成皇后遺惠之無窮也至和元年十月上上仁宗乞不臨幸温成祠廟歐陽修臣伏見今月八日聖㫖踈决禁囚特行減降及軍士各有特支陛下聖慈本以興國寺奉安真宗皇帝御容有此恩㫖而中外之議紛然不一皆為正月八日是温成皇后周年故有此特支踈决又見聖駕朝謁萬壽宫又云温成畫像在彼所以聖駕親臨自去年追册温成皇后之後朝廷每於典禮過極優崇遂致議者動皆疑惑今又聞來日聖駕幸奉先寺酌獻宣祖皇帝外議喧然又云温成皇后祠廟在彼伏以陛下聖德仁孝本為祖宗神御以時酌獻不可使中外議者謂陛下意在追念後宫寵愛託名以謁祖宗虧損聖德其事不細臣欲乞明日幸奉先寺酌獻畢更不臨幸温成祠廟以解中外之疑以止議者之說臣職忝侍從無所禆補聞外人議論不敢不言不惟臣有愛君之心合具陳述陛下舉動為萬世法亦不可不謹至和二年正月上時為翰林學士辛未上幸奉先寺朝謁宣祖神御殿遂不復入温成廟致奠上仁宗乞議温成廟裁損其制韓維臣聞忠臣不為畎畆之逺而輟其圖報之心聖主不以芻蕘之賤而易其納善之慮故下靡不盡之情上無或遺之䇿臣位雖微賤然以討論載籍參議典禮為職竊不自薄有愛君之言惟陛下少加聽覽臣伏見國家為温成皇后立廟備三獻官設五時之祭金石牢具一侔宗廟臣上求禮經下尋本朝故事皆所未有不知當時誰為陛下謀此者臣聞孝惠皇后太祖皇帝之正配也其沒也即陵建殿嵗時所祀不過常饌而已其後方得列於皇后别廟元德皇后真宗皇帝之母也其沒也别廟而祭自爾羣臣請升祔者相繼先帝謹重其事不敢即從至於十年而後許之今陛下一旦奉嬪御之主廟而樂之與祖宗等稽於先王之禮則不合求之本朝之事則非故搢紳之士無所誦說下民觀之不知所化甚非太祖真宗謹重典禮之深㫖也伏惟陛下即位以來凡所興造必問其遺訓而咨於故實稀闊盛事靡不畢講今又將以孟冬吉時親祼宗廟循大祫之禮蓋祫者序昭穆正尊卑之祭也所宜罷黜不經昭示大順以成祀典之美而陛下以奉祖宗之禮而臣妾亦得享之非所以致隆極廣孝恭也臣愚以為宜以此時發德音詔有司使議温成皇后之廟有不如禮者一皆裁去以明陛下不私後宫專奉祖宗之意使聖朝典制幽昧復光宗廟神靈懽欣顧享此盛德之舉也陛下不可不留聖意焉昔漢文帝幸上林袁盎引却慎夫人坐以明妾主之義前史書之爛然不妄今崇建廟祏甚於上林之坐僭擬祖宗非特妾主之别陛下聖德過於漢文無使愚臣不得申袁盎之志貼黄陛下若以温成皇后乆在左右不忘軫悼則嵗時遣宫嬙内侍厚加祭奠亦足致其恩意何必僭用禮典取議後代此於温成后非有所益而於聖德為損不細陛下即位以來動循禮典未嘗有此過舉臣願陛下特奮神斷使有司得從改正以全盛德之美臣父子受國厚恩實欲以少伸補報幸不以臣位下而棄其言也嘉祐四年上時同知諫院上仁宗乞議温成廟裁損其制係第二狀韓維臣所領職以同知禮院為名禮有不正知而不言則負朝廷所以命臣之意而失臣所以事上之禮也故敢不避誅殛而言臣誠見温成皇后廟樂牲器僭比祖宗稽之禮經則先聖之所不道質於故事則本朝之所無有臣竊聞其時臣下有以唐武惠妃事上惑聖明者惠妃之沒雖嘗立廟然至乾元之後祀享即絶自當時已知其非禮豈足為聖朝法哉臣近奏疏願因親祫宗廟特詔有司裁損其制以全陛下廣孝愛禮之美封章奏御累日寢而不下臣竊惑之陛下無謂數楹之屋兩簋之器施之未損於治盖聖人所以異等威明風教以觀示天下者禮存之於此也如不以臣言為信則并臣前章付中書門下使大臣參議事有可采乞早賜施行嘉祐四年上上仁宗乞改温成廟為祠殿吕公著臣伏見故追尊温成皇后於城南立廟四時孟月祭奠以待制舍人攝事牲幣祼獻登歌設樂並同太廟之禮盖當時有司失於講求非有典據昔商宗遭變飭已思咎祖已訓以祀無豐於昵况以内寵列於秩祀非所以享天心奉祖宗之意也欲乞改温成廟為祠殿嵗時只遣宫臣行事薦以常饌以明祀事有漸嘉祐七年正月上先是諫官楊畋等上言洪範五事傳曰簡宗廟則水不潤下去年夏秋之交乆雨傷稼澶州河决東南數路大水為災其七廟之享必有失於順者惟陛下積思而矯正之於是詔太常禮院檢詳郊廟未順之事公著時為禮官乃上此奏及議三聖並侑詔下兩制詳翰林學士王珪等議曰惟親親以享親仁之極也親不可以僭故廟止其先今後宫有廟欲以廣恩也而適所以僭乎享親請如禮官之所議詔改温成廟為祠殿嵗時令宫臣以常饌薦之宋名臣奏議巻九十四
