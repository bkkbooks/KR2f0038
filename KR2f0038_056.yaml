body:
  text: 宋名臣奏議卷五十六宋趙汝愚編百官門給舍上上太宗論封駮故事柴成務臣等昨奉敇命差臣等同知給事中事制敕如不便依故事封駮臣等尋檢㑹到門下省故事并合起請事件具劄子進呈繳送付中書續准敕命自今後應除職官勳爵不以廢置封贈並下畫敕其刑政損益并起請釐革制置公事並不正宣宜令魏庠已下候到省詳依令敕施行駮正追改者臣等考求舊典具有明文封謂封還詔書不即行下駮謂駮正臺議然後奏聞蓋王者謹出令重改作之制也今若詔書已行方勒追改稽諸故事頗異前聞而况設官居方是為著位職司其事必有正言茍名實之相違慮典章之斯廢詔敕輕行之失請以近事眀之中間竊覩敕下西路釐革青白鹽法又覩差使制置江湖諸茶鹽皆聞妨害公私尋並停罷比行追改已紊成規蓋於經度之初而闕討論之理臣等欲乞起今後除職官勳爵不以廢置封贈秪下畫敕外其有上章起請釐革制置公事並望且下中書議其可否候議定令門下省審覆奏請付外施行公當者量與旌酬妄誕者明加懲戒賞罰並舉浮競悛心如此則詔敕無追改之名官曹有陳力之地稍符典故用叶彌綸淳化四年六月上時同知給事中事上仁宗乞宣敕並送封駮司審省余靖臣聞國家之興必先於綱紀號令所出必正其源流古者以四海之廣萬務至衆専巳臨斷慮其闕失故羣司設官以相維制示至公於天下也唐制凡有制敕命令則中書宣行進內畫可以付門下門下審省申覆以付外施行若有不便並令封駮改正今之官誥編書三省官位各結題年月則皆古之制也國朝淳化中始自樞密院分出銀臺通進二司兼領門下封駮事令兩制已上主判凡制敕有所不便者准故事封駮張詠向敏中咸領此職此時宣敕無不經歷門下近年以來舊制坐廢唯選人黃甲猶准故事其餘宣敕百無一二到彼則是官有封駮之名曽無改正之實臣今欲乞凡有宣敕除處分邊事機宜依舊實封入遞祭祀行事敕仍舊差人送付本官外其餘遷免官資升降差遣及斷遣刑名改更敕令應是告身宣頭敕牒並令中書樞密院准故事進內發付門下封駮司審省申覆如有授官非稱斷刑失中但未便於事者則令封駮改正如此則官司之守各有綱條詔令所頒克正根本紀律可振無有過舉矣其門下封駮司乞差剛正公平大臣主判庶其舉職無可畏避慶厯四年上時知諌院上仁宗論舍人不得申請除改文字王安石臣等准今月八日中書劄子奉聖㫖今後舍人院不得申請除改文字竊以為舍人者陛下近臣以典掌誥命為職除改乃其職事所當參審若詞頭所批事情不盡而不得申請則是舍人不得復行其職事而事無可否一聽執政所為自非執政大臣欲傾側而為私則立法不當如此前日具論其故兾䝉陛下省察而至今未奉指揮臣等不知陛下以為是而不改乎將不必以為是而特以出於執政大臣所建而不改乎將陛下視臣等所奏未嘗有所可否而執政大臣自持其議而不肯改乎為是而不改則臣等考尋載籍以來未有欲治之世而設法蔽塞近臣論議之端如此者也不必以為是而特以出於執政大臣所建而不改則是陛下不復考問義理之是非一切茍順執政大臣所為而巳也若陛下視臣等所奏未嘗有所可否而執政大臣自持其議而不肯改則是政已不自人主出而天下之公議廢矣此所以臣等惓惓之義不能自已者也臣等竊觀陛下自近嵗以來舉天下之事屬之七八大臣天下之人初亦翕然幸其有為能救一切之弊然而方今大臣之弱者則不敢為陛下守法以忤諫官御史而専為持祿保位之謀大臣之強者則挾聖㫖造法令恣已所欲不擇義理之是非而諫官御史亦無敢忤其意者陛下方且深拱淵默兩聽其所為而無所問安有朝廷如此而能曠日持久而無亂者乎自古亂之所生不必君臣皆為大惡但無至誠惻怛求治之心擇利害不審辨是非不早以小失為無傷而不改以小善為無補而不為以阿諛順已為恱而其說用以諒直逆已為諱而其言廢積事之不當而失人心者衆矣乃所以為亂也陛下以臣等所言為是則宜以至誠惻怛欲治念亂之心考核大臣改修政事誠欲改修政事則今月八日指揮為當先改矣若以臣等所言為非則臣等狂瞽不知治體而誣謗朝廷政事當明加貶斥以懲妄言之罪而别選才能通達之士以補從官臣等受陛下之寵祿典領朝廷職事不得其守則義不得不言而朝廷以為非也則義不敢辭貶斥伏乞詳酌早賜指揮嘉祐六年六月上時為知制誥上英宗乞知制誥詳擇人材張方平臣伏以知制誥之職所以代王言為誥令由此召入禁林充學士非才譽充洽何以當其選比來朝廷率以體例次補日近誥命或有鄙淺𫝊為口實前代國家有事之際或以單札之辭折衝千里之外使三軍感勵萬方恱勸背逆凶醜或以革心夷狄異類或以向化故知文辭書命有足以助國威宣王澤也祖宗之世有自州縣之職拔處詞禁有自兩禁黜為管庫者蓋唯才而是用豈為人而擇官其修起居注史館修撰即次除知制誥之資序也今朝士不修亷恥至冒憲章法座之前輒自干請竊謂若此除授宜詳加推擇必其人流才地詞學器識他日可以備大臣之用而後擢處其職文物盛於本朝光華照於天下使名器以重陛下以隆天下幸甚治平元年上時為翰林學士上英宗論吕誨等敕不由封駮司韓維臣昨日聞御史知雜吕誨等以言事被黜至今不見敕至封駮司訪聞乃是中書直封送本家臣竊以封駮司給事中之任也凡制敕必由此而下有所不便得以封還論奏古今之通制也今罷黜御史事關政體而遂不使有司預聞紀綱之失無甚於此臣伏思王者建立官局張設法度擇人守之所以防檢繆失共成治道而朝廷自壞其法不知為此將以何利也伏望聖慈指揮中書追誨等敕命令由本司使臣得申論議以正陛下之官法治平三年正月上時知制誥兼通進銀臺司兼門下封駮事上英宗論吕誨等敕不由封駮司韓維臣近以御史知雜吕誨等降黜敕命不由門下封駮司直送本家嘗具論奏乞追還以正官法至今纍日未見施行臣伏思古者並建庶官各有法式所以共成治體逺防禍敗雖王者不得而私也况大臣乎淳化中命樞密直學士向敏中張詠㸃檢看讀發放敕命其實封敕文並仰中書房候印押下送向敏中等看讀㸃檢了却實封發放祖宗所以審重號令防檢繆失如此其至今朝廷一旦騁私意以壞聖王之法快目前而忘後世之慮獨何謂也方今官失其法人怠其職百事隳廢日就衰靡臣愚竊謂宜有以力振頽敝而陛下君臣方共為此事臣竊為國家憂之伏望聖慈以臣此奏并前所上章早付中書施行臣懦不能為陛下守官伏待譴黜治平三年正月上上英宗論吕誨等敕不由封駮司韓維臣近以降黜吕誨等敕命不由銀臺司纍具論奏今又聞罷傅堯俞等敕亦是直送本家臣竊以法制者天下之公器非天子所得私而有臣下所不敢輒廢也故法有不便事則易之未有設而不行者人有不稱職即去之未有存而不用者也陛下才畢亮隂即降詔戒厲臣下曰內外因循惰職者衆未聞推利及民盡心憂國者又訓以易慮孳孳各修厥職詔下以來未及一年不聞羣司有所進益而公卿大臣乃自壞法度違戾詔文臣雖區區為陛下愛惜此事章三四上不䝉省察京都之內禁門之中尚且如此而欲以風勸天下推利及民豈可得哉孟子有言曰有官守者不得其職則去有言責者不得其言則去今有言責者既不得其言而去矣不得其職者尚且胡顔茍處乎况臣兩還詔㫖今又不能仰遵聖訓為官守法罪戾仍重豈可久玷侍從尚竊封駮之名伏望聖慈特賜罷黜所有銀臺司等職事臣更不敢僉書見居家待罪治平三年正月上上神宗論司馬光告敕不由封駮司吕公著臣近為降下司馬光等告敕到封駮司尋以為不便遂具封駮聞奏竊知已直降光等告敕付閣門臣伏以祖宗置封駮之職蓋以朝廷政令不能一一盡當故使有司得各竭其意以補闕遺臣既繆當官守茍有愚見誠不敢自默以失祖宗置司之意是以即有論列今來朝廷既以臣言不當自當顯行黜責其所降敕告亦須經由本司蓋臣雖可罪而此職終不可廢若因臣一言不當遂使今後封駮之司不復能舉正職事則是祖宗法度由臣而壞伏望聖慈正臣封駮不當之罪特加顯黜以振綱紀治平四年九月上上神宗論差提舉常平官敕不由封駮司李常臣伏聞近差諸路提舉常平廣惠倉臣僚敕㫖不由封駮司中書以為係是舉差臣竊以為過矣國朝因唐故事置門下封駮司自是非機密宣敕皆使詳讀然後頒下其或失當得以釐正所以謹出制命之意亦已至矣故祖宗以來多選方正望重之臣典領是職緣於朝廷所補非輕其為責任甚重今遣使四出得興置利害舉察州縣使事之重與監司略等而不付之有司參考能否墮廢綱條理實未順兼封駮之任雖人主親所選任皆得以其職言今日舉差臣所未諭臣恐朝廷典則寖得緣事廢紊伏望聖慈特賜指揮並依舊制庶命令所加務於詳審有司職業貴以修舉熙寧三年二月上時為右正言上哲宗論除吕公著文字不經書讀范純仁臣伏以近除門下侍郎吕公著文字不經臣書讀尚書吏部亦將不經門下省文字直行慮别有被受按門下省繳覆中書省録黃樞密院録白有與侍郎妨礙或係親戚並貼黃奏知欲今後侍郎兩貟皆合避親或妨礙及獨貟除依舊奏知外許令給事中繫書繳覆元祐元年閏二月上時為給事中詔令别出畫黃送門下省仍今後急速不係利害文字不過門下省並關門下省照㑹施行上哲宗繳駮安燾除知樞密院王巖叟臣伏以左司諌之職屬門下省近䝉本省批狀差兼權給事中給事中職當論駮臣雖暫權義難茍且今日伏覩畫黃除安燾知樞密院公議不允臣不敢放過門下緣過門之後即是施行既已施行益難追改據燾不才無補陛下而玷處廟堂坐尸厚祿考之物論謂當置之散地别進賢才今乃超遷總領機務位愈髙而德愈不類任益大而才益不宜必恐多致人言上煩聖聽臣所以輒先封還乞陛下更加裁慮或陛下必憐其人未欲遽行罷免則願且勿升其位但令與范純仁並為同知院可也臣亦再三為陛下思之唯如此頗為易處伏望聖慈恕臣疏虞僣易之罪察臣區區愛國之心特垂採納貼黃臣䝉陛下任之言責唯願陛下無一毫差錯臣始心安若聞一人有議朝廷除用未當則如臣之身自有過失所以不避煩瀆一一進言幸陛下省納使臣得盡其愚以圖補報燾之闒茸不才終不是當大任之人候陛下别得賢才即宜罷免以協公言元祐元年閏二月上時以右司諌權給事中上哲宗論安燾敕命不送給事中書讀王巖叟臣兩次論駮除安燾知樞密院敕命久之不下意謂聖慈巳賜開納今竊聞巳有指揮門下省更不送給事中書讀令疾速施行臣聞命皇恐不知所容陛下必以臣為違拒睿㫖遂一面施行臣仰惟國家置官司正要上下相關防相審察唯恐有失誤所以重審之至况給事中喉舌之任若不由過則不成命令何所不可臣違君之命至於再三雖陛下優容未加誅戮臣自知罪不容矣然臣少而讀書本學事君之道今不敢不以所學事吾君也臣位可奪也而守官之志不可奪也身可忘也而愛君之心不可忘也守官之志可奪則陛下今日雖喜臣從命後日將不復信臣矣愛君之心不忘則陛下今日雖未亮臣後日將復念臣矣陛下聰眀照微豈不察臣之所以區區效愚忠而不巳者為陛下耶臣自為耶每與大臣結怨仇而不避者為國計耶為身耶陛下欲人阿意順㫖則易欲人抗言執議則難臣不為易而為其難亦何心哉但恐因臣不能為陛下守職事而獲沮抑則人人務為其易非朝廷之福也古人有言曰賞當賢則臣下勸罰當罪則姦邪止此國家之大柄而人主不可以不謹也陛下一日逐章子厚於汝州可謂罰當罪矣一日擢范純仁為執政可謂賞當賢矣然安燾之進則未見其當此臣之所以當力為陛下言也陛下曰必行之臣曰必不可行則是以臣抗君也宜乎死有餘責然臣言之不巳為之不疑者以臣職當然也守職而不敢曠乃所以奉陛下也貼黃臣豈不知即時奉行上則可以順陛下之意下則可以恱大臣之心順陛下之意是臣之志也然國體之所深繫恱大臣之心非臣之志也况公議之所不與臣但知以守官盡臣職不敢將職事作人情若少為俯仰便失忠義欺明主誤朝廷是臣負天下國家為罪大矣此臣所以冒犯天威再三論列兾陛下開納也元祐元年閏二月上上哲宗論安燾敕命不送給事中書讀劉摯臣等伏聞除安燾知樞密院事因給事中兩次封駮不當遂䝉特降指揮更不送本官書讀直下吏部施行臣等竊見安燾差除未論當否然朝廷命令之出必由門下書省審而後行所以謹重防察示至公於天下也今陛下除一大臣因其封駮不當遂廢給事中職業不令書讀則是命大臣以私矣私門一開將何以振肅公道維持紀綱乎伏惟陛下臨御以來政事之舉皆合至公獨此一事設施乖戾恐於盛德所損不細臣等深為陛下惜之伏望速降指揮追還告命及詳覽臣寮前後論列安燾章疏别賜指揮以全朝廷典法貼黃制敕不由門下及省審書讀不備則不成命令其經歷之司必不敢過被受之人必不敢當元祐元年閏二月同孫升等上時為御史中丞上哲宗論安燾敕命不送給事中書讀蘇轍臣等前月二十八日奏論安燾除知樞密院告不令給事中書讀直下吏部施行事人微言輕未能仰回聖意竊惟封駮故事本唐朝舊法祖宗奉行未嘗敢廢其法而不守也蓋此法之設本以關防欺弊君臣所當共守今安燾差除未允公議有司舉職實不為過而陛下即令廢法以便一時古語所謂若有短垣而自踰之臣等竊恐百司法度自此隳廢君臣之間無所據執何以經久近日朝廷除吕公著門下侍郎止因中書吏人行遣差誤不經門下而給事中范純仁以失職為言朝廷為之行遣以申眀舊法及今未幾乃以一安燾之故特開此例况燾與純仁並命二告皆不經書讀竊料純仁必不肯不顧前言黽勉而受純仁既不受命則燾必不敢不辭燾既力辭而給事中又封駮不巳臣等必恐此命無由復行伏乞陛下克巳為法檢㑹前奏且令燾依舊供職陛下必謂先朝舊臣無大過惡不可輕棄則同知樞密院任用不輕陛下必謂巳行之命不可中止則命之未行臣等無由預議若既行之後又不得言則朝廷設置臺諫竟將安用陛下明聖其必不然臣等區區所惜者祖宗法度非敢必行已意以廢格明詔惟陛下裁擇元祐元年三月上時為右司諫上哲宗乞追還安燾等告命及施行經歷付受官吏之罪劉摯臣近見安燾范純仁告命不由給事中直付所司臣以謂朝廷之大失政也故尋具狀及與臺官連狀共四次論列至今未䝉追正臣誠不知陛下命令不使給事中書讀此何意也將憚其封駮耶厭其封駮耶天下之理不過是非當否而巳陛下試思之今來進用燾等若果當其人不緣私授則天下必以為是而給事中雖百十封駮猶當終使之經歷而後行不然罷其人可也若燾等之進不由公道理有未安天下不以為是而給事中乃能封還駮正則是拾遺救失善守其官有補於國者陛下當嘉納而改為之乃盛德之事也不當厭憚其言而廢其職也今陛下以給事中之言為是耶為非耶而陛下何故自隳典憲為此委曲行政不由於直道命官乃出於斜封不知誰為陛下建此謀者今於門下之録黃明書云奉聖㫖更不送給事中書讀於吏部之告身給事中銜下明書云奉聖㫖更不書讀制命乖當未見有如此者實恐取謗四方貽譏後世不可忽也録黃初下既見批㫖則門下侍郎合行進駮不合放出既出之後尚書省左右僕射左右丞亦合執奏不合承行既行之後命令不全吏部亦合申稟不合書告是官司上下皆阿諛茍且失其職守壞亂紀綱成此繆誤以纍聖德臣不知陛下以名器祿食養大臣置百官將何所用之凡人主出令差誤古今所不能無但左右之臣將順救正之則不至於成其失矣况皇帝陛下富於春秋淵默之日而太皇太后陛下聽政不出房闥之時乎夫斜封墨敕濫官橫賞乃前古之所以召亂者也今大臣欲以此事事陛下若門户一開何所不有欲望聖慈詢問大臣命令如此施行是與不是茍以為是則可謂罔上迷國茍知其非而不言則可謂不忠尚有可以任人之國乎伏請速降指揮追還燾等告命依國朝典故行下所有門下侍郎及尚書省官屬吏部官吏各有前項罪狀伏乞以臣此章并前後論列文字付外施行貼黃進任大臣而不使告命遍歷門下乃是陛下先以私自處也制書不全而受之是臣下以私自進也上下如此則何以厭服中外臣固知燾等之必不敢受也貼黃陛下臨御方踰年正當謹守祖宗法度以銷壓權僣今差除告命偶有差失左右執政既不肯建明而臺諫之言又不䝉聽納則朝廷闕失誰復救之陛下既已沮壞給事中所守而又欲隳言路職業臣所以夙夜憂懼不能自巳非獨論燾之進退而上惜朝廷紀綱所以防微杜漸而巳元祐元年三月上上哲宗再辭書讀乞差官權給事中王巖叟臣封還安燾除知樞密院敕黃伏䝉御批以國家進退大臣皆須以禮况前日延和奏事巳嘗面諭卿今復如是非豫所以待大臣之意也可速書讀無執所見者臣既居諫諍之地又假封駮之任不敢俯仰姑息而為陛下守官不敢顧避從諛而為陛下持法今燾差除未安巳纍恩德命令斜出尤損紀綱此事至重實繫國體臣所以夙夜思慮殆廢寢食屢進愚忠兾回天意陛下初以燾次補而進之終以燾自辭而聽之是進退大臣之禮也臣以燾為不才不當雜羣賢並進所以上助聖眀判白賢佞使在位端亮名節之人知陛下聰眀旌别感激自勵是所以副陛下待大臣之意也及延和殿對䝉被天奬使臣得安心言事必賜主張在臣之分何以為報須事無大小有利國家者知無不言乃可以副睿眷况今日之事諫官御史議論如一臣之區區豈敢偏執所見伏望聖慈察臣之心恕臣之罪特依前奏早賜施行貼黃臣竊恐陛下之意謂已行之命重於更改緣給事中之任本為封駮凡所封駮皆巳行之命置官之意蓋以封駮為重而不以已行為重也自唐室以來命令既出由給事中封駮之故改而後行者不可勝數陛下固已熟知如此更願優容開納使有司得為陛下守官以正綱紀臣以謂為臣之罪莫大於反覆臣既再三論列義難却行書讀伏望陛下別賜指揮差官權給事中以全孤臣之守元祐元年三月上宋名臣奏議卷五十六
