body:
  text: 宋名臣奏議巻六宋趙汝愚編君道門帝學中閲經史上眞宗進經史子集要語田錫臣聞古者帝王盤盂皆銘几杖有誡起居必覩夙夜不忘故湯之盤銘曰德日新日日新太公之金匱云武王欲造起居之誡乃銘于几杖曰安無忘危存無忘亡熟惟二者後必無凶墨子曰堯舜禹湯書其事於竹帛篆之盤盂曰君子福大而愈懼爵隆而益恭逺察近視俯仰有則矧黄帝輿几皆銘焉曰吾居民之上惴惴恐不及武王户席必訓焉席之銘曰無行可悔户之銘曰難得而易失聖人修德罔怠然佩服鑒戒終日不忘故至德大業永保天下也臣又嘗讀唐書見髙宗命黄門侍郎趙智講孝經於百福殿因謂之曰大㫖朕知之矣即舉此經要切處言之以禆不逮智曰天子有争臣七人雖無道不失其天下㣲臣敢以此言上獻帝大恱又憲宗聽政之暇採漢史三國而来經濟要事撰書十四篇號曰前代君臣事跡書之六扇屏風置於御座之右出入觀省之臣每覽經史子集因取其要語總一十巻輙用進獻可書於屏寘之御座出入觀省所冀聖德日新與堯舜禹湯文武比隆也咸平三年上時宋白舉錫應賢良方正自知泰州召歸朝上哲宗進無逸圖文彦博臣伏觀周公作無逸以戒成王後代聖君皆奉爲至戒以成治道以克永世臣又觀唐史見宰相崔植對穆宗云明皇初得姚崇宋璟爲宰相二人者夙夜孜孜致君于道璟嘗手寫尚書無逸一篇以獻明皇置之内殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圖朽壊始以山水圖代之自後既無座右箴規又信姦臣用事天寳之末稍倦於勤王道隳缺今陛下虚心求治伏望以無逸爲元龜穆宗善其對臣恭惟皇帝陛下聰明稽古嚮學思道間日御邇英延儒臣講讀經史臣近觀邇英北壁有仁祖朝講官王洙所寫無逸圖臣慮禁中或未有此圖輙敢寫録四軸并一巻上進望於殿内張掛及置於几案以便聖覽臣愚不勝區區之至元祐二年上時平章軍國重事上哲宗乞置無逸孝經圖范祖禹臣竊以無逸者周公之至戒孝經者孔子之大訓陛下嗣守祖宗鴻業方以孝治天下二書所宜朝夕觀省以益聖德昔仁宗皇帝初建邇英閣即書無逸於屏間其後歲乆而弊又命侍讀學士王洙書之仁宗曰朕不欲背聖人之言乃置之左方又諭侍讀學士丁度取孝經之天子孝治聖治廣要道四章對爲右圖命知制誥蔡襄書之又命學士承㫖王拱辰爲二圖序亦令襄書之仁宗尊崇經訓如此陛下宜以爲法今邇英閣尚書圖序于屏間而無逸孝經二圖不復張列臣欲乞指揮所司檢尋如舊圖尚在乞置之左右如已不存即乞特命侍臣善書者書之其蔡襄所書圖序從來置在御座之後昨因修展邇英閣方徹去却書于屏間此圖乃祖宗舊物臣竊惜之伏乞依舊張掛三圖並列如仁宗朝故事以彰陛下欽明稽古仰遵先烈之意元祐二年十月上時爲著作郎兼侍講上哲宗乞詔儒臣討論唐故事以備聖覽蘇頌臣聞前事不忘後事之師也在昔聖帝明王莫不稽考古道爲有國之先務故能享御永世垂無疆之休然往古所行或文或質施之今日各有所宜臣竊謂國朝號令風采超邁百王原其典章文物刑名法制大抵㳂襲唐舊其間或有損益亦不相逺然唐之事迹紛紜無統史官所記善惡咸備善者可以爲規彠惡者可以爲商鑒往在慶厯之初仁宗皇帝因臣僚上言請留意近代典故遂詔儒臣檢討唐朝故事日進五條曽未期歲省閱殆徧嘗聞德音宣諭以爲有助聽斷臣伏見陛下祗紹先烈勤勞萬機治理之間多用仁宗故事外則邇英講讀經史内則臣僚進獻封事古今得失之迹忠賢治安之䇿固巳溢黈聰而積淵慮矣而臣愚管見猶有所陳者誠見陛下稽古奉先之心孳孳不怠故敢僣越而盡言也臣聞之荀卿曰道不過三代道過三代謂之蕩言其逺而難信也本朝去唐正同三代其事近而易考所宜宸扆之留聽也臣欲望聖慈特舉慶厯故事詔史官學士采録新舊書中列帝王所行之事與夫羣臣獻替之言每日上奏數事清燕之間特賜覽觀所兾螢燭末光増輝日月臣不勝惓惓之願元祐二年十一月上時爲吏部尚書兼侍讀詔講讀官日進唐故事二件頌每於逐事後論其得四失大㫖同列遂以爲例尋得㫖令分門編修成冊進呈年書成上詔以邇英要覽爲名上哲宗進經書要言以備聖扎范祖禹臣近於邇英閣進講嘗陳尚書要切之語望陛下因習筆扎書之以置座右臣退而伏思古之人君雖在閒燕之中出入起居必存儆戒左右前後動有箴規所以正心脩身自强於德以舜之聖而益戒之曰罔失法度罔游于逸罔滛于樂禹戒之曰無若丹朱傲湯有盤銘武王於扆席之四端爲銘於几杖爲銘於衣帶爲銘於履爲銘於觴豆爲銘於户牖爲銘舜湯武王其自脩如此而况於後世之君乎今陛下纂承累聖日勤問學若於翰墨之際不出聖人之經略舉要言以爲明鑒置之左右朝夕觀省與夫舜禹之戒湯武之銘其揆一也臣職在勸講無補毫分茍有愚見不敢不盡謹節略尚書論語孝經要切之語訓戒之言得二百一十九事以備聖札所兾陛下手書之目覩之心存之庶可以少助進德之萬一臣不勝拳拳元祐三年四月上時爲著作郎兼侍講上哲宗乞常觀圖史范祖禹臣伏見仁宗皇帝慶厯元年七月出御製觀文覽古圖記以示輔臣皇祐元年十一月御崇政召近臣三館臺諌官及宗室觀三朝訓鑒圖臣竊以古之帝王常觀圖史以自戒仁宗皇帝講學之外爲圖鑒古不忘箴儆以養聖心又圖寫三朝事迹欲子孫知祖宗之功烈如目覩之二圖皆常頒賜臣僚禁中必有本臣願陛下以永日觀書之暇間覽此圖可以見前代帝王美惡之迹知祖宗創業之艱難不唯有所戒勸易於記省亦好學不倦之一端也元祐五年五月上時為右諫議大夫上哲宗乞進讀陸䞇奏議蘇軾臣等猥以空踈備貟講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所爲竊謂人臣之納忠譬如醫者之用藥藥雖出於醫手方多傳於古人若已經效於世間不必皆從於已出伏見唐宰相陸䞇才本王佐學爲帝師論深切於事情言不離於道德智如子房而文則過辯如賈誼而術不踈上以格君心之非下以通天下之志但其不幸仕不遇時德宗以苛刻爲能而䞇諌之以忠厚德宗以猜疑爲術而䞇勸之以推誠德宗好用兵而䞇以消兵爲先德宗好聚財而䞇以散財爲急至於用人聽言之法治邊馭將之方罪巳以收人心改過以應天道去小人以除民患惜名噐以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使德宗盡用其言則貞觀可得而復臣等每退自西閤即私相告言以陛下聖明必喜䞇議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文爲之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸䞇夫六經三史諸子百家非無可觀皆足爲治但聖言幽逺末學支離譬如山海之崇深難以一二而推測如䞇之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之座隅如見䞇面反復熟讀如與䞇言必能發聖性之髙明成治功於歲月臣等不勝區區之意元祐八年五月與范祖禹等同上時爲禮部尚書兼侍讀學士上徽宗乞觀貞觀政要陸䞇奏議曽鞏臣竊觀近世帝王善爲治者莫如唐太宗人臣善言治者莫如唐陸䞇太宗貞觀之治論者以謂庶幾成康自漢以下莫及焉雖聰明英武出自天資然其要乃在於廣延賢智博考古今容受直言從諌不倦故唐史官掇其大者别爲一書謂之貞觀政要陸䞇事唐德宗自爲學士至宰相知無不言言無不盡葢其論議反復條暢切於事情周於世用而要其歸必本於帝王之道必稽於六藝之文雖賈誼董仲舒不能逺過焉今其言見於世者有奏議數十篇此二書雖一代之文章實百王之龜鑑巻帙不繁詞理明白臣愚伏願陛下退朝之暇紬繹經史之餘取二書置之座右留神省覽如御珍羞必有以開廣聰明上當聖意發言行事以此爲準庶於盛德有補萬一元符三年上時爲翰林學士兼侍讀上徽宗乞讀資治通鑑陳瓘臣竊謂人君稽古之學一經一史經則守之而治身史則考之而應變天下之事其變無窮故往古可監之迹不可以不詳知也仁宗嘗謂輔臣曰朕聽政之暇於舊史無所不觀思考歴代治亂事迹以爲監戒也英宗命儒臣論次歴代君臣事迹可以爲監戒者既上通志八巻又命置局續脩書成取㫖賜名神考繼志述事賜其名曰資治通鑑又親製序文炳若雲漢爲章于天自然之功變化出焉臣嘗三復明訓掩巻歎息以謂諸史所載數千年事文字繁多不可勝覽窶儒寒生業專習一窮年皓首猶或昧陋仰窺聖作區判事𩔖數語之間盡史之要翕受以蓄德敷施而日新堯舜之所謂稽古何以加此而况不忘謙抑俯比漢唐自謂於文宣太宗無間然矣自餘治世盛王得賢之一體者皆有取焉至于荒墜顛危之主亂賊姦宄之臣可觀可監無不悉論以著聖志葢自祖宗以來聖聖相繼稽古之學同乎一心以後述先非一日之積也至于神考然後典刑之總㑹䇿牘之淵林底于成就繼而張之正在今日恭惟皇帝陛下道隆業大極本該末揆萬事而復乎一制羣節而適於變六經妙義既自得於心術之㣲而於前古巳陳之迹又盡心焉今經筵將開而進讀之官尚循習舊例泛讀諸史文字繁複事實支離不得其要未周于事伏望聖慈特降睿㫖候經筵開日令侍讀官讀資治通鑑以承神考所以繼述英廟緝熈聖學垂訓後嗣之意元符三年上時爲右正言上徽宗乞觀無逸及漢文宣唐太宗事陳瓘臣聞商之髙宗舊勞于外作其即位不敢荒寧享國乆長爲後王法無逸所陳是也漢之與唐四十餘君賢而可紀者三君而巳漢之文宣唐之太宗是也文帝年二十有三來自代邸而有天下後世恭儉之主莫有及焉宣帝年十有八興於民間而有天下後世勵精之主莫有及焉太宗年十有八舉兵除亂又數年而有天下後世納諌之主莫有及焉此三君者方其在外之時斯民之利病朝政之臧否耳聞目見皆得其實後雖深處九重而考往騐今不忘鑒戒此其所以爲賢也恭惟陛下乆處潜藩充養聖德亦如髙宗舊勞于外春秋鼎盛厯數在躬亦如三君自外而入置無逸於座右採唐漢之所長則文宣太宗之事葢有燦然可觀者矣神考所謂吾無間然者臣愚願有稽焉元符三年九月上時爲殿中侍御史上徽宗論宣取畫圖陳師錫臣伏聞今月八日有聖㫖宣取秘書省畫圖進覽格入神妙可以閱目非有補於盛德六經載道諸子談理歴代史籍祖宗圖書天人之藴性命之妙治亂安危之機善惡邪正之迹在焉以此爲圖天地在心流出萬物以此爲圖日月在目光宅四海伏望聖慈觀心於此則天地沖氣生焉注目於此則日月祥光麗焉唐以山水圖代無逸左右前後無所警戒動静語黙無所龜鑑社稷至於陵替不可支持臣聞心以道觀則正目以德視則明國壽可以不損天下可以不亂愚夫之言智者擇焉願留聖懐無忽元符三年九月上時爲殿中侍御史宋名臣奏議巻六
