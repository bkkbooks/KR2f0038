body:
  text: 宋名臣奏議卷一百二十九宋趙汝愚編邊防門遼夏一上太宗諌北征李昉等臣等竊以北狄驕悍自古為寇乘時犯塞往往有之一昨輒率種落來擾疆埸陛下櫛風沐雨衝冒嚴凝親御戎衣以攘民患凡兹醜類畏威而逃因而翦之易於拉朽况幽薊之壤久陷匪人慕化之心倒垂斯切今若擁百萬橫行之衆弔一方徯后之民合勢而攻指期可定其如大兵所聚轉餉是資且河朔之區連歲飛挽近經蹂踐尤極蕭然雖偶荐於豐穰恐不堪其調發屬兹寒冽益復罷勞况今強寇宵奔邊陲寧肅若親巡塞下震耀威容固是懼彼殘妖亦恐勞於大舉伏望申戒羽衛旋斾京都善養驍雄精加訓練嚴勑邊郡廣積軍儲講習武經繕修攻具俟府藏之充溢洎閭里之富全期歲之間用師未晚太平興國五年十一月契丹寇雄州巳酉詔巡北邊癸丑關南言破契丹萬餘衆斬首三千餘級戊午駐蹕於大名府雄州言契丹皆遁去上遂欲進攻幽州十二月戊寅命曹翰劉遇為部管趙延溥白欽祚為都監復命宰相問昉及扈蒙等事之可否昉等同上此奏上深納其説下詔南歸昉時為翰林學士上太宗論幽燕未下當先固根本張齊賢臣竊惟方今海內一家朝野無事關聖慮者豈不以河東新平屯兵尚衆幽燕未下輦運為勞以生靈為念乎臣每料之此不足慮也自河東初降臣即權知欣州捕得契丹納米專典皆自山後轉般以援河東以臣料契丹能自備軍食則於太原非不盡力然終為我有者蓋力不足也河東初平人心未固嵐憲欣代未有軍寨入寇則田收頓失擾邊則守備可虞而反保境偷生畏威自固及國家守要害增壁壘左控右扼疆事甚嚴恩信巳行民心巳定乃於鴈門陽武谷來爭小利此則戎狄之智力可料而知也聖人舉事動在萬全百戰百勝不若不戰而勝若重之謹之戎寇不足吞燕薊不足取自古疆場之難非盡由戎狄亦多邊吏擾而致之若緣邊諸寨撫御得人但使峻壘深溝蓄力養鋭以逸自處寧我致人此李牧所以稱良將於趙用此術也所謂擇卒未如擇將任力不及任人如是則邊鄙寧矣邊鄙寧則輦運減輦運減則河北人民獲休息矣獲休息則田業增而蠶織廣務農積穀以實邊用且戎狄之心固亦擇利避害安肯投死地而為寇哉臣又聞家六合者以天下為心豈止爭尺寸之事角戎狄之勢而巳是故聖人先本而後末安內以養外人民本也戎狄末也中夏內也夷狄外也是知五帝三王未有不先根本者也堯舜之道無他廣推恩於天下之民爾推恩者何在乎安而利之民既安利則戎狄斂袵而至矣陛下愛民利天下之心真堯舜也臣所慮羣臣多以纎微之利尅下之術侵苦窮民以為功能者彼為此效相習已久至於生民疾苦見之如不見聞之如不聞斂怨速尤無大于此伏望審擇通儒分路採訪兩浙江南荆湖西川河東有偽命日賦斂苛重者改而正之因而利之使賦稅課利通濟可經久而行為聖朝定法除去舊弊天下諸州有不便於民事委長吏聞奏如敢循常不以上聞自當嚴加典憲使天下耳目皆知陛下之仁戴陛下之惠此以德懷逺以惠利民則幽燕竊地之寇沙漠偷生之類擒之與屈膝在術內爾太平興國五年十二月上時為左拾遺直史館上太宗論邊事田錫臣聞動靜之機不可妄舉安危之理不可輕言利害相生變易不定用捨無惑思慮必精夫動靜之機不可妄舉者動謂用兵靜謂持重應動而靜則養寇以生姦應靜而動則失時以敗事動靜中節乃得其宜今北鄙繹騷蓋亦以居邊任者規羊馬細利為捷捕斬小勝為功賈怨結仇乘秋致寇召戎起釁職此之由伏願申飭將帥慎固封守勿尚小功許通互市索獲蕃口撫而還之如此不出五載河朔之民得務三農之業亭障之地可積十年之儲前歲俶擾邊陲親迂鸞輅今兹張皇聲勢頗動人心若玁狁來侵六龍夙駕戎羯既退萬乘方歸是皆失我機先落其術內所以兵不得分屯農人不得收斂勞頓斁耗可勝言乎軍國大端固當謹始戎族未亂無煩強圖狄勢未衰何勞力取待其亂而取之則克乘其衰而兵之則降既心服而志歸則力省而功倍自古貪利薦食不獨胸奴邀功起戎亦自邊將當鑒前軌以恢永圖昔漢安帝時東夷犯境連年不息漢頗患之其主云亡其子繼立漢乃命使弔之東夷感恱還漢生口一隅晏然至於南蠻亦嘗畔渙始由邊吏增賦乘怨寇掠光武時西戎犯邊班彪請置護羌校尉通其貨之有無治其人之寃枉塞垣遂安誠願考古道務逺圖示綏懷萬國之心用駕馭四夷之䇿事戒輒發理在深謀臣又謂安危之理不可輕言國家務大體求至理則安捨近謀逺勞而無功則危為君有常道為臣有常職是務大體也上不拒諌下不隱情是求至理也帝王之道惡萌欲心漢武帝躬秉武節遂登單于之臺唐太宗手結雨衣往伐遼東之國率義動之衆徇無厭之求輸常賦之財奉不急之役是捨近謀逺也沙漠窮荒得之無用夷狄遺種殺之更生是勞而無功也臣又謂利害相生變易不定者兵兵書曰不能盡知用兵之害者則不能盡知用兵之利蓋事有可進而退則害成之事至焉可退而進則利用之事去焉能審利害則為聰明以天下之耳聽之則聰以天下之目視之則明故書曰明四目達四聰惟此聰明在無壅塞盡去相蒙之弊乃協知幾之神臣又謂取捨不可以有惑故曰孟賁之狐疑不知童子之必至思慮不可以不精故曰差若毫釐繆以千里自國家圖燕以來連兵未解財用不得不耗人臣不得不憂恢復弔伐之名雖建洪業可否禍福之實宜留聖心願陛下精其思慮決其取捨無使曠日持久窮兵極武為國大計不得不然太平興國十年五月上時以左拾遺知相州上太宗諌親征李至臣伏以幽州早陷胡塵久隔皇化方屬混同之運獨為叛渙之方國家士馬精強戈甲犀利府庫羡饒敖粟紅腐以陛下文武雄略聖謨天討雖太山壓卵烈火燎毛未足以方其易也然而兵者凶器戰者危事用之之理必務萬全且幽陵之邦敵之右臂王師既擊彼必拒張攻城之人不下數萬兵多費廣必須大備糇糧假令一日剋平必作十旬準擬未知邊庾可充此乎又賊城之傍坦無陵阜去山既逺取石尤難金湯之堅非石莫碎未知飛炮之用將安得乎儻有闕如臣願陛下且務繕修更資訓練蓄威以養鋭觀釁以伐謀縱涉歲年未為稽晚所兾長鯨之戮斷在不疑封豕之誅義無再舉必也聖心獨斷睿算巳成則京師天下之根本願陛下不離京闕恭守宗廟示敵人以間暇慰億兆之衆多䇿之上也大名河朔之咽喉或暫駐鑾輿揚聲自將以張兵勢壯軍威䇿之中也至於逺提師旅親幸邊陲北則戎援可虞南則中原可慮則曵𥚑之懇切斷鞅之狂愚臣雖不才亦耻在二賢之後也雍熙三年正月上時為參知政事上太宗請班師趙普臣自二月中伏覩忽降使臣差般糧草及詳勑命知取幽州既奉指揮尋行科配非時舉動莫測因由爾後雖聽捷音未聞成事稍稽剋復俄及炎蒸飛芻挽粟以猶繁擐甲持戈而未巳民疲師老漸恐有之臣自此月以來轉增疑慮潛思陛下萬幾在念百姓為心聖略神功舉無遺算至于平取浙右力取河東垂後代之英竒雪前朝之憤氣四海咸歸於掌握蒼生將致於雍熙唯彼蕃戎豈吾敵對蓋遷徙鳥舉自古難得制之前代聖帝明王無不置於化外任其隨逐水草皆以威德御之此際官家何銷挂意必是有人扶同諂佞誑惑聰明因興不急之兵稍涉無名之議非論曲直且覺淹延將成六月之征頻有千金之費以此忖度深抱憂虞竊念臣雖寡智謀粗親墳典千古興亡之理得自簡編百王善惡之由聞於經史其間禍淫福善莫不如影隨形煥若丹青明如日月常為大訓歷代寶之臣讀史記見漢武帝時主父偃徐樂嚴安輩所上長書及唐明皇時宰相姚元之直奏十事可以坐鎮患害立致升平唯慮至尊未能留意醫時救弊無出於斯又聞前事為後事之師古人為今人之則據其年代雖則不同量彼是非必然無異輒思抄録專具奏呈伏望聖慈特垂披覽伏念臣謬以庸材叨居顯位幸偶千年之運深承二聖之知從白屋而上青霄非由智略出卑寮而登極品只是遭逄恩私何啻於豚魚報荷不知於犬馬粗懷性識常積兢皇所恨者齒髮衰殘精神減耗既不能獻謀闕下又不能效命軍前唯有微誠書章上奏今者伏自朝廷大興禁旅逺伐山戎驅百萬之生靈咸當輦運致數州之土地半失耕桑則何異為鼷鼠而發機持明珠而彈雀所得者少所失者多只於得少之中猶難入手更向失多之外别有關心全未見於便宜可重興於詳酌臣又聞聖人不凝滯於物見可而進知難而退理貴變通情無拘執故前書所謂事苦則慮易兵久則變生臣之愚誠深懼於此秦始皇之拒諌終纍子孫漢武帝之回心轉延宗社若或遲晚恐失機宜而况旬朔之間便為七月之慮內地先困邊廷早涼北狄則弓硬馬肥漸難擒制中國則民疲師老或誤指蹤臣今獨興沮衆之言深負彌天之愆輒陳狂瞽抑有其由竊以臣暮景殘光能餘幾日酬恩報義正在今時恐勞宵旰之憂寧避僣踰之罪虔希聖聽早議抽軍聊為一縱之謀别有萬全之䇿伏望皇帝陛下安和寢膳惠養疲羸長令外戶不扄永使邊烽罷警自然殊方慕化率土歸仁既四夷以來王料契丹而焉往又何必勞民動衆賣犢買刀有道之事易行無為之功最大如期弔伐是為萬全臣又竊料陛下非次興兵恐因偏聽其奈人多獻佞事失防微大凡小人難保始終但務身謀誰思國計或承宣問皆不實言盡解欺君寧憂敗事得之則姦邪為利失之則社稷懷憂昨者直取幽州未審誰為謀者必無成算俱是狂言其於虛實之間此際揔應彰露臣緣不知頭主無以指射姓名伏望官家尋其尤者特正姦人之罪免傷聖主之明所貴詐偽悛心忠良盡力共畏三千之法同堅八百之基臣此時欲吐肺肝先寒毛髮驚疑猶豫數日沉思往哲臨終尚能尸諌微臣未死爭忍面諛明知逆耳之言不是全身之計但緣恩由卵翼命直鴻毛將酬國士之知豈比衆人圖報投荒棄市甘當此日之誅竊祿偷安不造來生之業唯祈明聖特賜察量更有細微列具劄子條奏冒犯旒冕臣無任傾心瀝懇憂國忘家涕泗倣惶激切屏營之至手劄子一臣以濫守藩方聊知稼穡見當州界承前多是荒涼戶小民貧程遙路僻量其境土五縣中四縣居山驗彼人家三分內二分是客昨來差配甚覺艱辛伏緣在此直至莫州來往四千餘里或是無丁有稅須至雇人般糧每斗雇召之資賤者不下五百元配二萬石數約破十萬貫錢直如本户自行費用無多所較乃是二萬家之貧户出此十萬貫之見緍所以典桑賣牛十間六七其間兼有鬻男女者亦有棄性命者仍加善誘偶赴嚴期自從起發去來巳及二十餘日近知內有人户𠂻私却到鄉村皆云裝起軍糧未有送納去處緣無口食再取盤纒既莫辨其真虛又難行於考覆訪聞街坊竊議前後説得多般稱彼契丹圍却軍都兼被劫却糧草及令尋勘皆却隱藏蓋緣臣無以知軍前事宜只聽得外面消息况九重嚴密事應不泄於朝廷奈百姓流言巳相傳於道路詳其住滯必有艱難伏望聖慈早令停罷更或遲久轉費糧儲潛思今日人情不可再行差配如或再行徭役決定廣有逃移假令收下幽州轉慮干戈未息忽然生事未見理長必因僣濫之徒姦邪之黨但説契丹時逢暗主地有災星以此為詞曲中聖旨殊不知蕃戎上下幽州俱置生涯土宿照臨外處不可征討若彼能同衆意縱幼主以難輕不順羣情無災星而亦敗誠宜守道事貴無私如樂禍以貪功慮得之而不武此蓋兩省少昌言之士憲臺無有識之人而况補闕拾遺合專思於規諌天文歷算須預定於吉凶成兹誤失之由各負踈遺之罪若無懲誡何戒後來一臣緣久居近職備見人情至於後殿三班前朝百辟文武雖異是非略同才奉委差便思僥幸難詢利害各避嫌疑而况毁譽生心貪求恣意狀同誑妄率以為常其間久歷事者明知而佯作不知初為官者不會而仍兼詐會多非當實少得純良而又凡關宣敕委差便是帝王心腹方資視聽切要精詳就中用軍不同間事必料曾使沿邊相度往彼參詳不知能有幾人應得當時言語如今比較並見直虛乞誅罔上之輩流便作抽軍之題目自此則潛銷媚佞免誤朝廷唯此區分以為激勸一唯有勾抽不同舉發一則我無鬪志一則彼有讐心而况契丹懷桀驁之情恃胡馬之力乘兹恕捨即慮追奔須作過防免輸姦便伏乞皇帝陛下密授成算遐宣睿謀但令硬弩長槍周施禦捍前歌後舞小作程塗凡遇交鋒何憂乏力只應信宿尋逺城池便可使戰士解鞍且作防邊之旅耕夫歸舍重為樂業之人是多難興王巳垂芳於往昔從諌則聖宜頌美於當今此事施行天下幸甚一臣今將本末細具敷陳常思發迹之由實有殊常之幸其於際會近代無倫伏自宣祖皇帝滁州不安之時臣蒙召入卧內昭憲太后在宅寢疾之日陛下喚至床前念以傾心皆曽執手溫存撫諭不異家人唯懷竭節輸忠以至變家為國慙虧德望有以遭逢先皇開創之初尋居密地陛下纂承之日將入中書蒙二聖之深知當兩朝之大用不唯此世應係前生禮雖限於君臣恩實同於骨肉是以凡關啓沃罔避危亡蓋緣每思陛下本是天人暫來塵世是以生知福業性稟仁慈潛聞內裏看經盤中戒肉今者願忍一朝之忿常隆萬劫之因如或未止干戈必恐漸多殺害即目民愁未定戰勢方搖仍於夢幻之中大作煩勞之事是何微類誤我至尊乞明驗於姦人情不容於首惡興言及此涕淚交流又念臣雖寡智謀實同榮辱都緣意切不覺詞繁冒犯宸嚴不勝戰越雍熙三年五月上時為武勝軍節度使兼侍中詔答曰朕昨者興師選將止令曹彬等頓於雄邉褁糧坐甲以張軍聲俟一兩月間山後平定潘美田重進等會兵以進直抵幽州共力驅攘俾狄人之黨逺遁沙漠然後控扼險固恢復舊疆此朕之志也奈何將帥等不遵成算各騁所見領十萬甲士出塞逺鬪速取其郡縣更還師以後輕重往復勞弊為戎人所襲此責在主將也况朕踵百王之末粗致承平蓋念彼燕民陷於胡羯將救焚而拯溺匪黷武以佳兵卿當悉之也邉防之事巳大為之備將來敢肆侵撓必當盡殱醜類卿勿為憂卿社稷元臣也忠言苦口三復來奏嘉愧實深上太宗答詔論邊事田錫臣伏覩今月十一日御札宣示內外文武臣寮以北鄙多虞戎人為患延佇良䇿降諭德音詢禦侮之嘉謀問安邊之逺略俾悉陳於異見將擇用其所言臣之顓愚豈足上副宸旨臣之狂直敢不罄盡鄙懷儻敡納可禆事宜明聖不罪於狂瞽臣每讀史傳詳觀古來戎狄騷邊乃是常事朝廷設備自有常規舉其大略而言之不過訓練師徒選擇將帥廣蓄儲備多置屯田嚴其池城明於斥候謹於烽火利其甲兵行間諜以離狄心禁侵擾以怠敵意待彼羸弱因勢取之候其賔服以德綏之此皆方册備陳采擇可用也捨此則未見禦戎之術用此在臨事之宜兵機則不可定謀邊議則須依古制今具條奏惟陛下擇而行之一今之禦戎無先於選將帥既得將帥請委任責成不必降之以陳圖不須授之以方略自然因機設變觀釁制宜以此無不成功以是無不破敵昔漢之西羌犯塞攻城邑殺長吏趙充國年七十矣上使丙吉問曰誰可為將充國對曰無踰老臣以是言之則請令宰臣巳下各舉堪為將帥者又令宿舊武臣素有問望者亦令自舉然後陛下詳擇而用之又趙充國既為將宣帝遣問曰將軍度羌虜如何當用幾人充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略然羌戎逆天背叛滅亡不久願陛下以屬老臣勿以為憂以是言之昔充國為老將尚謂百聞不如一見况今委任將帥而每事欲從中降詔授以方略或賜與陳圖依從則有未合宜專斷則是違上旨以此制勝未見其長伏乞速命宰臣令舉良將及令素有問望宿舊武臣自舉其能及舉所知者也一將帥行恩信恤士卒必豐財貨方得士心昔趙奢為將所得王之賞賜盡與軍吏又李牧為將軍市之租皆用享士卒魏尚守雲中其軍市租盡以給士卒出私養錢享賔客軍吏是以胸奴不近雲中之塞今國家所命將帥雖古今異宜凡有給賜今則誰敢效古散家財賞士卒去吝嗇有幾何人哉若以年年供億挽運老師費財曷若厚給將帥使之賞用也又聞近侯伯亦有廳直三五十人習騎射為心腹每出入陳敵得以廳直隨身翼衛主帥後來不敢養置昨來楊業陷陳訪聞亦是無自巳腹心從人護助捍禦以致為狄之所獲今雖時異事殊然廢置利害亦繫詢訪行之一今之禦戎以沿邊諸郡有勇智者命為刺史委之自用方略警急利便事訖方奏使人人各盡其才術此必為陛下各立殊勳控制侵侮昔後漢郭伋為漁陽太守時胸奴數抄郡界邊境苦之伋乃整飭士馬設攻守之略胸奴畏憚不敢入塞人得安業在職五歲戶口增倍又張堪為騎都尉破胸奴於高栁拜漁陽太守捕繫姦猾賞罰必信人皆樂為用胸奴以萬騎入漁陽堪乃率數千騎奔擊大破之郡界以靜乃於孤奴開稻田八千餘頃勸人耕種以致豐富百姓歌之視事八年胸奴不敢犯塞以此言之則沿邊諸郡請令擇有智勇者為刺史必副陛下之憂寄也一今之禦戎更在恱取軍情凡經揀退尚堪力役者却與元本料錢其歿陳及守戍死亡兵士所有在營老幼宜矜憫優恤或給賜令各存活勿使寒飢無所歸向又不可取充灑掃裁縫之𨽻其次揀中新招到軍雖稍有身首人材未宜便令管轄舊人須是經歷行陳稍知軍伍次第微有勞效者方令充節貟所貴巳下亦各甘心兼易為驅使若曽有功勞未得優賞者即乞别作名目優異酬賞臣未知朝廷府庫錢帛之大數亦不知國家支費用度之衆寡若陛下省罷塔廟之費耗回充軍旅之賞給則孰不革其怨心孰不致其死力若是破敵必副陛下平戎之心也一今之禦戎亦宜别設條例等第立賞若得一堡壘或復一障亭與某官與若干賞賞不踰時必誠必信條例不煩令軍中曉會此必有果敢智謀之士副陛下之立賞也一今之禦戎又宜以重賞召募敢死之士仍以古來選士之科以取士卒亦於軍中擇取應得選士之條目令舉其六七更可詳酌增損且據兵書言之取曾習韜鈐者有謀畫者又取能知敵情偽者取能知山川險易徑路迂直者取強弓過人能斬虜搴旗者又取往復數百里不及暮至者又取能破格舒鈎或負數百斤行五十步者又取趫捷若飛能踰塹壘出入無形堪窺覘者各區别技能置立部分以副將帥之指使也一今之禦戎外則委任將帥內則詢謀宰臣行一事必使宰臣知之出一詔必令宰臣議之臣聞前年出師向北命曹彬以下欲取幽州是侯利用賀令圖之輩悮惑聖聰陳謀畫䇿而宰臣昉等不知又去年招置義軍刺配軍分宰相普等亦不知之豈有議邊陲發師旅而宰相不與聞若宰相非才何不罷免宰相可任何不詢謀今宰相普三入中書再出藩鎮重望碩德元老大臣人所具瞻事無不歷乞陛下以軍旅之事機密之謀悉與籌量盡其規畫此乃國體君父至公臣聞偏信生姦獨任成亂侯利用賀令圖等既誤陛下機宜於前無令似侯利用賀令圖者復誤陛下機宜於後伏乞陛下一一與宰臣謀議事事與宰相商量悔目前獨斷之明詳今後公共之理則事無不允當下無不盡忠則大臣之間足以副陛下憂勤之旨也一今之禦戎在乎辨邊上奏報之虛實察左右蒙蔽之有無奏失利則未必盡言報大捷則不足深信陛下未當信而先信陛下本欲知而未知如此何以料安危如此何以䇿成敗安危成敗之理乞陛下詳而察之一今之禦戎無先用諜兵書曰事莫密於間賞莫重於間狄中自有諸國未審陛下曽探得凡有幾國否幾國與胸奴為讐若悉知之可以用重賞行間諜間諜若行則夷狄自亂夷狄自亂則邊鄙自寧昔李靖用間破突厥心腹之人自離二也書在唐史其事可知以募能往絶域鬪亂蕃部使交相侵害如漢之陳湯傅介子之流則不勞師徒自然歸化此可以緩陛下憂邊之心也其餘謹烽火明斥候亦可以依古法為警備趙充國傳曰五星出東方中國大利蠻夷大敗太白出高用兵深入敢戰者吉雖天道逺而難知然昭昭垂象緯者為陛下言兵之利害也一今之禦戎凡召發兵士或儲糧草亦宜謹靜勿使喧煩臣竊聞去年於戶稅上折科馬草及官中和買當買納未足之間即有使臣催督貧下户婦女有行科校者又聞汴河乾淺遂分南河水添注汴河以待漕運國家計度何在而臨時一至於此輦轂之下豈無外國諜人臣即不知國家見在軍儲支得幾年若是無九年之糧實為無備若是無三年之糧實為窘急若不窘急則何以科校婦女而納草添注河水而待漕運也一今國家冨有天下精卒利兵計有百萬然無將帥為陛下治兵昔吳起為將為士卒吮癰霍去病為將漢帝欲為治第去病曰胸奴未滅豈以家為竇嬰為將得所賜金千斤陳於廡下軍吏過者量取為用未諭陛下以今之將帥如吳起霍去病否若以臣所見即將帥必無其人何以知之將帥肯與士卒吮癰乎若賜第宅肯不要乎將帥非材即無威名何以使胸奴望風而懼今有居顯位食厚祿為國之謀即不足奉身之謀即有餘何以副陛下致太平之心何以致陛下成清靜之理然以臣所見凡小小公事不勞陛下一一用心若以社稷之大計為子孫之逺圖則在乎舉大略求將相帝王之大體也設如人欲理身先理心心無邪則身自正欲理外先理內內既理則外自安臣謂邊上動由朝廷動之邊上靜由朝廷靜之任賢相於內則百職舉而紀綱振委良將於外則四夷靜而邊鄙安臣之愚𠂻備於此矣巳然之患既陛下遍訪直言未然之虞乞陛下常切留意一巳上條奏悉是國家巳然之事所以勞陛下謀及卿士詢于芻蕘凡百臣寮悉陳所見然臣謂國家復有未然之事得不為陛下言之得不為陛下憂之今戎主一姥而巳用黠虜為謀主頗有輕中國之志今春夏必漸退秋冬必復來制之禦之惟在前所籌數事而巳若將狄人禦之而不去邊境備之而未寧加以胸奴間諜於西蕃漢家未斷其右臂即秦隴千里之外瓜沙玊關之西恐非國家之所有萬一兵歉相仍寇盜多起此時何以謀之此時何以禦之聖人不能不災而能禦災今陛下聖德合天三邊無虞萬里晏然居安思危之計得不由未然之事而豫防之此亦禦戎之逺意也右臣備位掖垣忝司誥命祗奉睿旨俾陳方略昧於時事思慮不精然於狂愚庶或可采端拱二年正月上時為知制誥上太宗答詔論邊事王禹稱臣伏以中國之病胸奴其來久矣故書云蠻夷猾夏寇賊姦宄則五帝之所不免也又詩云薄伐玁狁至于太原則三王之所為患也爰自秦漢降及隋唐擊伐通和布在方册皆陛下之所詳覽矣臣今獨引漢之文帝時事迹以為警戒望陛下留意而覽之則天下幸甚蓋以漢之十二帝言乎聖明者文景也言乎昏亂者哀平也然而文景之時單于最為強盛大有侵掠候騎至雍火照甘泉宫哀平之時呼韓耶單于每歲來朝委職稱臣邊烽罷警此豈繫乎歷數而不由于道德邪臣以為不然矣且漢文當單于強盛之時而外能任人內能修德使不為深患者由乎德也哀平當單于衰弱之際外無良將內無賢臣而使之來朝者繫于時也臣以為國家廣大不比漢朝陛下聖明豈減文帝犬戎之強盛未及單于時至如撓亂邊土觸犯天威豈有候騎至雍而火照甘泉之患乎在陛下外任其人內修其德矣以臣計之外任其人內修其德之道各有五焉謹列如左外任其人有五者一曰兵勢患在不合將臣患在無權陛下固未能專委一人則請於沿邊要害之地為三軍以備之若有唐受降城之類如國家有兵三十萬則每軍十萬人使互相救援責以成功有功者行賞無功者明誅則犬戎不能南下矣二曰伺邏邊事罷用小臣用小臣則邊情有隱而不盡知也臣伏見往來邊上者多闒茸小臣雖有愛君之心而無愛君之實恐邊疆塗炭而不盡奏邊民哀苦而不盡聞陛下誠能用老成大僚往來宣撫賜以溫顔使盡情無隱則邊事濟矣三曰行間諜以離之因釁隙以取之臣風聞犬戎中婦人任政荒淫不法陛下宜委邊上重募邊民諳練蕃情者間諜蕃中酋長啖之以厚利推之以深恩蕃人好利而無義待其離心因可取也四曰以夷狄攻夷狄中國利也今國家西有趙保忠折御卿為國心腹陛下亦宜勑此二師率麟府銀夏綏五州張其犄角聲言直取勝州則犬戎懼而北保矣此實不用但張其勢而巳五曰下哀痛之詔以感激邊民頃歲陛下首伐燕薊蓋以本是漢疆晉朝巳來方入戎狄既四海一統理宜取之而邊民蚩蚩不知陛下之意皆以貪其土地致犬戎南牧陛下宜下哀痛之詔告諭邊民則三尺童子皆奮臂而擊之矣然後得蕃人一級者賜之帛得胡地一馬者還其價得酋帥者與之散官如此則人百其勇而士一其心也內修其德有五者一曰併省官吏惜經費也竊以唐虞稽古建官惟百夏商官倍亦克用乂周設六官寮屬漸廣秦併六國郡縣益多食祿者日增力田者日耗降及漢魏以至隋唐員數有加職名無減清介者止餘俸料貪濁者又恣侵漁是以約人命官斯為中矣今百官之內三班之中若備論冗食且恐迃回有煩聽覽只如臣舊知蘇州長洲縣七千餘家自錢氏納土巳來聖朝命官之後七年無縣尉使主簿領之未嘗缺一事三年置縣尉主簿又存之未嘗立一功以臣詳之天下大率如是臣請黜陟庶寮併省羣吏賢者得以陳力不肖得以歸耕誠能省官三千貟減俸數十萬以供邊備以寬民賦亦平戎之大計也二曰重選舉伏自陛下臨御以來力崇儒術親至文闈志在得人未嘗求備上自文士下及腐儒大則十數年之間便居冨貴小則數月之內便預官常或一行可觀一言可采寵賜之數動踰千萬不獨破十家之産抑亦起三軍之心臣亦其人因自言爾臣恐擐甲之士有使鶴之言望陛下減儒官之賜均戰士之恩矣三曰信用大臣參決機務蓋以分閫外之事者在乎將帥用堂上之兵者在乎相臣宜資帷幄之謀以決安危之䇿方今君臣親愛宰執賢明振古而來未之有比然而限以常禮隔以朝儀情恐未通言恐不盡臣每見千官就列萬乘臨軒中書有平章之文密院有機務之奏三司有出納之計歷階而進禮成而退為定制也臣望陛下坐朝之暇聽政之餘頻召大臣共議邊事定而後行無容小臣間厠即係單于之頸斷胸奴之臂必有人矣四曰不貴虛名戒無益也臣以為聖人無名神人無功迹用不彰品物自化道德既喪功名始生五帝之時猶能不伐三代而下多有自矜討蠻夷則重困生靈得土地則空標史册禍敗之本何莫由斯方今萬國駿奔四方康樂聖德被矣神功著矣唯兹北狄未服中原以臣思之恐是宗廟之靈天地之意慮陛下驕于大寶怠于萬幾用廣聖謨以為警戒陛下誠宜作備邊之計示憂民之心不必輕用雄師深入虜境竭蒼生之衆力矜青史之虛名如此則天道順人心恱年歲之間可緩而圖也五曰禁止遊手厚民力也夫牧民者君也聚人者財也産財用者土地也闢土地者人民也民衆則土地闢土地闢則財用足財用足則國家安矣方今雖務農桑尚多涼薄耕織者鮮矣衣食者衆矣加以飛芻挽粟之勞妨鑿井耕田之力若無條禁曷禦凶荒臣請陛下先問户部則輸稅之家可見矣又問吏部則食祿之人可知矣又問兵部則軍人受食者可數矣又問祠部則僧道蠹人者可明矣復有臺寺之小吏府監之雜工揔其數而計之聚其人而校之臣恐以三分勤耕苦織之人贍七分坐衣待食之輩欲望民泰不亦難乎况今郡縣雖多要荒且逺河北備邊之民力可用者唯東至登萊西至秦鳯南抵淮西而巳此數十州者乃中土之根本不可不惜也望陛下少度僧尼少崇寺觀勸其風俗務于田農則人力強而邊民實也若輦運勞於外遊惰耗於內人力日削邊用日多不幸有水旱之災則寇不獨在外而在乎內也惟陛下熟計之端拱二年正月上時為右拾遺直史館宋名臣奏議卷一百二十九
