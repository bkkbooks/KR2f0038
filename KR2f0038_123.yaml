body:
  text: 宋名臣奏議卷一百二十三宋趙汝愚編兵門民兵上上真宗論㸃集強壯田錫臣伏覩近日多雨秋稼頗傷近京諸州積潦為害加以差遣使命㸃集鄉兵人情不安物聽可駭謂一家雖有數口三丁必抽兩丁定以強壯之名備於緩急之用雖不刺靣各遣歸農其如終𨽻軍名向去須在戎伍當北寇未賔之際值西戎為害之時豈不知臨時抽差以補正軍闕少如此壯丁之家父母妻男有哀慟之哭聲實感傷於和氣朝廷宜制理於未亂樞相當經始而圖終臣竊聞國家府庫稍虛倉廪不實不然則何以急急於聚斂財貨孜孜於備禦邉防况廟堂無人軍旅無將居崇官者皆莫知危亡之漸食厚祿者悉坐觀成敗之人邊上奏報繼來戎敵侵軼漸近其好佞言而安聖心者則曰國家何患無逺慮而有近憂者不過請聖駕親征望陛下以宗社為憂乞陛下以芻蕘可聽臣每奉聖㫖凡有見聞即令敷陳敢不遵守干冒宸扆臣無任惶恐激切屏營之至咸平五年五月上時為侍御史知雜事先是詔集近京諸州丁壯選𨽻軍籍錫上此疏上真宗論揀選強壯失信田錫臣伏覩去秋以來霖雨作沴近畿諸處水潦為災雖聞檢覆蠲免租稅又聞相度低下開决溝渠雖憂恤之心似有所濟而利害之半莫知適從古者不奪農時慮妨營種或遇歉嵗即念困窮故有賑貸糧儲除放徭役免令凋瘵不至流亡今國家為少闕軍兵防備邊戍遂於曹單宋亳陳蔡汝潁之間㸃集鄉村揀選強壯得五七萬人訪聞始降宣命指揮只令在本城防守及至奏聞都數即並抽赴京師昨近臣何以商量如此失信令下民皆懷怨望豈得無詞况陛下常好讀書有儒臣時得侍講春秋謂君命無二又曰信不由中諒在聖聰盡逹微㫖豈有命令既宣於羣下而誠信不由於厥中若外國差人在京探事事無巨細境外既必盡知知而圖謀邊上未得安靜其所謀者謂古者以民為邦本食為民天今國家取丁壯為兵以失邦本以災傷去食寧有民天糧儲何止無餘邊備亦恐不濟以此得計以此乘時此外國所謀之小者也其所謀之大者以關西去年秋稼不登京東今嵗春種已失國家營救之不暇廟堂圖慮之未精欲以新集未慣之兵授非才無勇之將僥幸求勝輕敵寡謀此外國所謀之大者也加以自春以來多隂少晴每遇朔風其來數日不定變陽春和平之令為邊塞動靜之占臣不曉占書不知兵略但以經史所言之事求災祥可見之證以愚意裁量望聖慈採納雖兵者凶器不得已而用之民為邦本不得已而取之今五七萬人並離農畝日近更差使臣揀㸃豈無物議憂虞以災沴之餘寇盜若起適足為戎敵之利有勞宵旰之懷檢災傷乃是虛名行賑貸且非實事斯乃今日之務最急而非時之患可憂也臣謂非十年不足以聚蓄財貨非十年不足以生育黎元二十年間治之得其宜則無慮治之失其宜則有患非二十年尚未能蓄聚財貨生育黎元况臨事欲制置乎望陛下思今日之急務慮非時之所憂示信以結之善謀以成之若信不由中事出慮外必恐國家多難自今日始臣受先朝拔擢不敢不言臣受陛下指揮不敢不奏咸平六年三月上時為侍御史知雜事先是五年十一月令近京諸州募強壯願充軍者給衣服裝錢送闕下錫上此奏上仁宗乞河東依陜西例㸃強壯文彥博臣於去年二月初曽上言乞河東路每三丁㸃一丁充強壯緩急為守禦之備自後朝廷差吳遵路等於河東路㸃差到強壯共一十四萬三千餘人內一十三萬三千餘人是主戶九千餘人是客戶皆兩丁內㸃一丁充強壯臣令遍歷到諸州軍竊見所㸃到強壯太多而不精兼頗妨奪農事臣檢㑹咸平中曽降敕㸃差強壯本路除晉絳慈隰麟府六州不㸃差外共㸃差到強壯四萬四千餘人今來雖添晉絳慈隰四州㸃差強壯即比咸平舊數幾及三倍况本路主客人戶共三十一萬勘㑹才及陜西人戶之半昨來陜西所㸃弓手只十萬人以此况之即河東所㸃集太多而妨農也臣欲乞依陜西體例每三丁㸃一丁充強壯猶可得八萬餘人所貴務農作者不致妨廢習武事者頗得精專如允臣所奏更不鈔㸃據丁口數目而去留之並不騷擾動衆康定二年上時為河東路轉運使河北河東強壯自咸平以來有之承平嵗久州縣不復閲習多亡其數康定元年因彥博等言始詔二路㸃差又增廣其數并及陜西諸路至是彥博又上此疏朝廷亦莫之從也慶歷二年悉揀其徑勇者為義勇指揮不願者釋之而存其籍以備守葺城池自是強壯寖廢矣上仁宗論刺四路弓手充保捷宣毅張方平臣伏見宣差朝臣分路往陜西河東京東西路於前來㸃差強壯弓手內招募願充軍人分配宣毅保捷指揮者臣竊思此舉事繫安危敢竭微𠂻上裨國論謹列不便事件及臣愚所見如左一自去嵗初降敕命㸃差強壯弓手之時民間喧然皆言此時㸃差雖以強壯弓手為名實欲黥補軍籍敕㫖屢下丁寧再三諭以朝廷㸃差之意只要各護縣鄉必不起從征戍郡縣又多方安輯民猶猜譁及經去冬教習尋放歸業鄉閭竊語方以少定然名在弓手之籍者居常猶恐不能自安每聞一使出行州縣輒相扇動謂來調發今此命忽下果如民所素料此後命令無復可信此其不便一也一宣命雖令使人招召情願緣先來㸃差弓手多是高資之家例皆衣食無闕豈有情願充軍之人臣聞所差朝臣已相與議云此來受命朝廷意在倚辦若至郡縣無人應募須與逐處官吏迫致之爾竊惟所差使臣蓋皆期於集事尋常淺見之人復思郡縣官吏材術足任者無幾今既設以賞利唯知用心若其謀之匪臧或致變生不測姦猾乘釁相激譟聚萬一驚擾更成厲階此其不便二也一所差使臣既與郡縣官吏抑迫百姓令伏充軍即須團練結甲赴京師充軍之人既非情願若其上路因與親戚離訣更有悔心中道逃散安能防遏既不敢各歸本土聚依蒲澤逺近相應展轉結連或姦豪之有謀乘郡縣之無備其勢一擾必勞安輯此其不便三也一今京東西路頗為饑歉民既艱食居常猶為寇盜一夫首難奔赴必多此其不便四也一強壯弓手各在郡縣未去農業若朝廷用漢代更之術因唐防秋之法入耕出戰遞為防戍則是農不去業兵不乏備不因帑廪之積常得丁壯之人今既籍為正兵處之連營則其衣食財用終身仰給縣官此其不便五也一已降御札冬至將行郊禮逺近郡縣尤宜肅靜夫愚而不可欺弱而不可勝者百姓也綏之斯和動之斯危武有七德安民為本事規未兆敝猶不救若又迫之是啓亂也則朝廷之憂不在四鄙夫禍起所忽慝生有階秦之勝廣漢之黃巾唐之巢勛是皆始於烏合之衆此其不便六也凡此六患昭然在目不可不深慮不可不過防臣以一介賤微見識淺近誠不足以參國論贊聖謀但以職在諫曹義當有犯無隱故陳愚管上祈裁擇臣謂陜西河東其近裏州郡乞將前來㸃差強壯弓手等中分其半戍邊每九月防秋至二月放歸嵗一更代留其半防守本州以時訓練當就戍之時依出軍人官與裝費冬給衣賜日支口食蓋民所以懼乎籍之為兵者不唯前冒鋒刃矢石之難且重去其土終身與親愛姻族永相隔别此其大戚也今若畨休遞戍終是不離本鄉兾望邊事漸寧即當息肩安業昔太宗皇帝籍兩河之人以為鄉兵于時識者亦悼其失業蓋不若因兩河強壯使之扞邊壯者入籍衰者出役不衣庫帛不食廪粟邊不闕戍民不去農何在乎蓄之營堡而後為官軍也又聞於時籍鄉兵之際因大軍方興之威猶恐其亂乃密誡諸州郡尅期一日而事畢故民雖奸謀相動不復及矣今朝廷既惜強籍之名為必籍之事命兩朝臣分使一路周環三二十郡幅員三數千里或未能親到但行文移州縣官吏方且各率所見異同紛起但恐使人一出民心一搖後雖悔之或所難及願朝廷審加圖議事不憚改追還所下逐路轉運司宣命停所差官勿遣實天下幸甚國家之福也慺慺丹誠切兾昭納慶歷元年八月上時知諫院初康定元年六月詔陜西河北河東京東京西等路量州縣戶口籍民為鄉弓手強壯以備盜賊至是又詔京東西等路弓手強壯悉刺充宣毅軍陜西路悉刺充保捷軍仍分遣朝臣往曉諭招補之方平上此疏上仁宗論刺四路弓手充保捷宣毅係第二狀張方平臣近覩宣命差官往陜西等四路募強壯弓手之充軍者事甚不便已於十九日具狀奏論未䝉朝廷别有處分臣不勝憂疑敢奏論其事至諸召募之狀已具條陳今但言其必不可之理有二若召人情願充者而後籍之臣料必不集事今此遣使徒使朝廷失大信於天下州縣惶惑人心驚擾而巳必欲集事則非強致之不可果強而致之喧譁相動禍變不測故此召募寬之則事不集急之則促亂臣前言所謂必不可之理有二此之謂也臣雖愚淺忝居諫列非不知邊陲勢急戎備事大衛兵禁旅調發不足今日之舉蓋朝廷非所獲已臣愚深思募人所以防禍難若今日之為人未必為國家用適所以致禍難者但恐朝廷之憂不在邊鄙而在四郊之外矣向者羣盜竊發潜匿山谷發卒數十倍捕之猶不能即擒久乃幸得自潰近日州郡奏報比有奸盜相聚又京東西旱潦相仍民方艱食正月向盡麥種未入朝廷尚須留意安輯振其不足更下此令民心謂何凡民之籍者四路不啻三十萬人今各不自保於去留之間此其相扇唱和可不過為防慮萬一不逞之輩乘隙嘯動臣恐郡縣官吏不棄城而遁即拱手就擒雖以墨翟之智不能以無備守也以陛下神聖威德而宗廟之靈天贊神助則臣非所敢知者若專以人事料之但見危形未見安理往者唐氏自高祖至懿宗傳十九主矣其間戎寇侵軼數至畿甸大盜滔天輿駕出狩屢矣而卒全大業者所恃民心不去根本未搖信令尚行也及懿宗之世南蠻陷交州大起天下兵轉貨食以事之徐方戍卒相率回戈連陷江淮遂啓仙芝黃巢之寇生民塗炭因此遂危社稷今日之舉唐鑒未逺矣夫賢智之謀事有萬全之形而後有一缺之虞猶不以僥幸為之今天下猶古也陛下奈何處成敗之計如是之易乎伏願陛下更與大臣從容講求至如京東西州郡見管廂禁諸軍亦不少比州郡患於乏人每使命㨂不無留占若量逐處民兵隨其衆寡分畨於本州防守盡代見軍赴邊此亦人情所便也朝廷機事非臣詳之揣摩以言精切未盡屢展螳蜋之臂上冒雷霆之威蓋惟大義之所存故於蕞軀而無愛不勝宗廟之憂區區激切之至慶歷元年八月上疏入卒不從凡刺宣毅十四萬人保捷九萬人皆不可用而宣毅驕甚所在為寇有識者以不從方平言為恨上仁宗論河北訓練鄉兵代禁旅戍邊包拯臣近曽上言以河北沿邊州軍蓄兵愈多積粟常少乞留防守外其屯駐駐泊就糧兵士等或令歸營及分屯於河南鄆等諸州遇有警急即時起發必無後期不及之患若謂邊兵不可全减即時將義勇鄉兵以代其數臣復見慶歷年中朝廷於本路先鈔㸃到鄉兵內揀刺得少壯約十八萬餘人作兩畨教閲每畨三箇月自九月一起教至二月終罷續准樞密院劄子只委自逐縣令佐分為兩畨教閲自十月至正月終放更不支口食訪聞後來因循不教恐非所以紓患預備之長䇿也雖議者欲省資糧以為惜費之一端又况鄉兵十八萬餘人若分為兩畨每人月支口食九㪷鹽二斤共約支糧斛三十二萬餘石鹽七十餘萬斤乃河北一州之賦耳河北地方千里二十餘州軍若以一州之賦給鄉兵十八萬人比之屯駐駐泊就糧兵士一月之費可充鄉兵一嵗之用計其費則甚寡校其利則至博兼土人生而徑悍若訓練稍精足可代戍邊禁旅分屯內地此則利害灼然甚明欲望聖慈特賜指揮檢㑹臣前進劄子必賜裁處指揮皇祐元年三月上時知諫院上仁宗乞揀放保捷指揮何郯臣伏見陜西路頃嵗邊鄙用兵之際朝廷指揮以諸州新弓手刺面充保捷指揮用備戰守一路之兵僅增十萬緣當時倉卒不暇精擇其間甚有疲弱不堪征役之人驅之行陳固難得力自休兵至今嵗月已久尚未聞一加選汰所費廪食不可勝計况其人並是郡縣等第之家係在軍籍甚非所願伏望敕本路諸州令告諭應係新置保捷兵士除人員節級外其餘年五十以上及短弱不及等之人如願不在軍者許令自陳委監司長吏相度减放歸農此等久習武藝今若放罷亦須置籍拘管仍乞以所居鄉社相近處如河北義勇團作指揮置人員節級管轄其邊郡每以此軍畨遞防守處亦令比舊减數非特邊上或有警急其罷放之人尚可追集守城却代精兵出戰於事又無廢闕方今財力大屈所患在於冗兵竭天下所出之物僅能供應陛下幸聽臣言特行處置一路之內可減三數萬人乃亦省費之一端近包拯被命往陜西制置解鹽伏乞下臣此議使其就近覆驗所兾審擇利害然後施行皇祐元年十月上時為侍御史知雜事疏入樞密使龐籍獨以郯所言為是十二月始降指揮凡不任役者聽歸農放歸者凡三萬五千餘人皆歡呼返其家在籍者尚五萬餘人皆悲泣恨不得去陜西沿邊計一嵗費緡錢七十千養一保捷兵自是嵗省錢二百四十五萬陜西之民力稍蘇上英宗乞募陜西義勇韓琦臣伏以三代漢唐以來皆籍民為兵故其數雖多而贍養至薄所以維制萬㝢而威服四夷又非近所蓄冗兵可及也唐置府兵最為近古天寶以後廢不能復因循至於五代廣募長征之兵故困天下而不能給今之義勇河北幾十五萬河東幾八萬勇悍純實生於天性而有物力資産父母妻子之所係若稍加簡練亦唐之府兵也陜西當西事之初亦嘗三丁選一丁為弓手其後刺為保捷正軍及夏國納欵朝廷揀放於今所存者無幾河北河東陜西三路當西北控禦之地事同一體今若於陜西諸州亦㸃義勇止刺手背則又知不復刺靣可無驚駭或令永興河中鳯翔三府先刺觀聽既安然後次及諸郡一時不無少擾而終成長利治平元年十一月上時為右僕射平章事兼樞密使詔從之樞密副使胡宿欲且刺沿邊州軍上曰不若即了之韓琦意亦欲如此乃命陳安石等往除商虢二州不籍餘悉籍義勇凡主户家三丁選一六丁選二九丁選三年二十至五十材勇者充止刺手背以五百人為一指揮使并副二人正都三人十將將虞候承局押官各五人嵗以十月畨上教閲一月而罷又詔秦州成紀等六縣有買保毅田承名額者三丁刺一六丁刺二九丁刺三悉以為義勇人賜錢二千總得十五萬五千八百七十三人其後復詔秦隴儀渭涇原邠寧環慶鄜三十二州義勇遇召集防守日給米二升月給醬菜錢三百上英宗乞罷刺陜西義勇司馬光臣傳聞朝廷差陜西提㸃刑獄陳安石於本路人戶三丁之內刺一丁充義勇不知虛實若果如此大為非便臣竊意議者必以為河北河東皆有義勇而陜西獨無近因趙諒祚寇邊故欲廣籍民兵以備緩急使之捍禦也臣伏見康定慶歷之際趙元昊叛亂王師屢敗死者動以萬數國家乏少正軍遂籍陜西之民三丁之內選一丁以為鄉弓手尋又刺充保捷指揮差於沿邊戍守當是之時閭里之間惶擾愁怨不可勝言耕桑之民不習戰鬪官中既費衣糧私家又須供送骨肉流離田園蕩盡陜西之民比屋凋殘至今二十餘年終不復舊者皆以此也其謀䇿之失亦足以為戒矣是時河北河東邊事稍緩故朝廷但籍其民以充義勇更不刺為軍雖比之陜西保捷為害差小然國家何嘗使之捍禦戎敵得其分毫之益乎今議者但怪陜西獨無義勇不知陜西之民三丁之內巳有一丁充保捷矣自西事以來陜西困於科調比於景祐以前民力减耗三分之二加之近嵗屢遭凶歉今秋方獲小稔且望息肩又值邊鄙有警衆心已搖若更聞此詔下必致驚擾人人愁苦一如康定慶歷之時是賊寇未來而先自困弊也况即日陜西正軍甚多不至闕乏何為遽作此有害無益之事以循覆車之轍也伏望朝廷審察利害特罷此事誠一方之大幸治平元年十一月上時知諫院上英宗乞罷刺陜西義勇係第二狀司馬光臣近曽上言乞罷刺陜西義勇軍未審朝廷曽與不曽别為商議臣前次上殿乞陛下留意備邊所謂備者非但添屯軍馬積貯糧草而巳在於擇將帥而修軍政今將帥不材者未聞有所更改軍政頽弊者未聞有所振舉而或取腹內州軍之民盡刺以為兵外人聞之無不駭愕今陜西沿邊正軍動以萬數朝廷若能擇有方略膽勇之人以為將帥使之簡去疲弱選取精鋭勤加教習明行賞罰則雖欲取銀夏而稅其地擒趙諒祚而制其命有何所難况但止其鈔盜乎今朝廷不孜孜以將帥軍政為急而無故籍耕桑之民使之執兵徒有驚擾而實無所用臣不知誰為陛下畫此䇿也昔康定慶歷之間朝廷以元昊犯邊官軍不利已曽籍陜西之民以為鄉弓手始者明出勑榜云但欲使之守護鄉里必不刺充正軍出屯邊境榜猶未收而朝廷盡刺充保捷指揮令於邊州屯戍當是之時臣丁憂在陜備見其事民皆生長太平不識金革一旦調發為兵自陜以西閭閻之間如人人有喪戶戶被掠號哭之聲彌天亘野天地為之慘悽日月為之無色往往逃避於外官中縶其父母妻子急加追捕鬻賣田園以充募賞暨刺面之後軍人員教頭利其家富百端誅剝衣糧不足以自贍須至取於私家或屯戍在邊則更須千里供送祖父財産日銷月鑠以至於盡况其平生所習者唯桑麻耒耜至於甲胄弩槊雖日加教閲不免生踈而又資性戇愚加之畏懦臨敵之際得便即思退走不唯自喪其身兼更拽動大陳自後官中知其無用遂大加沙汰給與公憑放令逐便而惰游巳久不復肯服稼穡之勞兼田産巳空無所歸復皆流落凍餒不知所在長老至今言之猶長嘆出涕其為失䇿較然可知足以為後來之戒而不足以為法也今朝廷雖云所籍之民止刺手背農隙之時委州縣召集教閲只在鄉里不令戍邊而民皆懲往年之事必大興訛言互相驚擾朝廷號令失信前後巳多雖州縣之吏遍至民家面加曉諭亦終不肯信逃亡避匿刑獄必繁怨嗟之聲周遍一方足以動搖羣心感傷和氣若使分毫有益於國亦無所固執此其有害無益顯然明白近在目前設使教習得成一旦諒祚大舉入寇邊臣不能捍禦而使之深入三輔東過潼關乃欲驅此烏合村兵以拒之不亦難乎此適足以取戎敵之笑而巳伏望陛下軫念生民深察得失其刺義勇事早賜寢罷治平元年十一月上上英宗乞罷刺陜西義勇係第四狀司馬光臣近日已三次上言乞罷刺陜西義勇事未䝉朝廷采納臣欲止而不言則不忍坐視一路之民橫受困苦而自圖一身之安又恐遷延日久則無及於事是以不敢避斧鉞之誅繼上封奏為陛下極陳其害臣比日以來熟思此事誠於民有世世之害於國無分毫之利何謂於於民有世世之害臣竊見河北陜西河東自景祐以前本無義勇凡州縣諸般承役並是上等有物力人戶支當其鄉村下等人戶除二稅之外更無大假差徭自非大饑之嵗則溫衣飽食父子兄弟熙熙相樂自寶元慶歷之間朝廷因趙元昊叛亂契丹壓境遂於三路鄉村人戶之中不問貧富等第但有三丁之家即揀一丁充鄉弓手及彊壯其時西邊事宜尤急尋將陜西一路鄉弓手盡刺面充保捷指揮正軍其河北河東事宜稍緩遂只將鄉弓手及强壯刺手背充義勇自此三路之人始騷然愁苦矣其河北河東之民比於陜西雖免離家去鄉戍邊死敵之患然一刺手背之後則終身拘綴或欲逺出幹事糴賤賣貴或遇水旱凶荒欲分房逐熟或典賣田産欲浮遊作客皆慮官中非時㸃集不敢東西又當差㸃之際州縣之吏寧無乞覔教閲之時軍員教頭寧無斂掠是於常時免役之外添此一種科徭也若果如議者之言無害於民則民皆樂從官中何必更刺手背以防逃竄乎以此觀之義勇為害於兩路之民已可知矣况陜西於慶歷年中民家巳各喪一丁刺充保捷流落不歸今又取其次丁刺充義勇不亦甚乎朝廷近年分命朝臣遍往諸路减省諸般色役謂之寬恤民力今乃無故一旦刺一路之民十有餘萬以為義勇何朝廷愛之於前忍之於後憫之於小而忘之於大乎且今日既籍之後則州縣義勇皆有常數每有逃亡病死州縣必隨而補之則義勇之身既羈縻以至老死而子孫若有進丁又不免刺為義勇是使陜西之民子子孫孫常有三分之一為兵也臣故曰於民有世世之害也何謂於國無分毫之利太祖太宗之時未有義勇至於正軍亦不及今日十分之一然而太祖取荆湖平西川下廣南克江南太宗取兩浙克河東一統天下若振槁拾遺此豈義勇之力也哉蓋由民政修治軍令嚴肅將帥得人士卒精練故也康定慶歷之間趙元昊負纍朝厚恩無故逆命侮慢不恭侵犯邊境朝廷竭天下之力以奉邊鄙劉平任福葛懷敏之師相繼覆沒士卒死者動以萬數正軍不足益以鄉兵外府不足繼以內帑民力困極財物殫盡終不能出一旅之衆涉甌脫之地以討其罪而不免含垢忍耻假以寵名誘以重賂僅得無事當是之時三路新置鄉兵共數十萬何嘗得一人之力乎以此觀之義勇無用亦可知矣賈誼有言曰前車覆後車戒康定慶歷禦戎之䇿國家當永以為戒今乃一一檢當時體例而行之是後車又將覆也有難臣者必曰古之兵皆出民間豈民兵可用於古而不可用於今乎臣則對曰三代之時用井田之法以出士卒車馬居則為比閭族黨州鄉行則為伍兩卒旅師軍為之長者皆卿大夫也唐初府兵各有營府不屬州縣有將軍郎將折衝果毅以相統攝是以令下之日數萬之衆可以立具無敢逃亡避匿者以其綱紀素偹故也今鄉兵則不然雖有軍員節級之名皆鄉黨族姻平居相與拍肩把袂飲博鬪毆之人非如正軍有階級上下之嚴也若安寧無事之時州縣聚集教閲則亦有行陳旗鼓弓弩坐作呌噪真如可以戰敵者彼若聞戎寇大入邊兵巳敗邊城不守敵騎殺掠蹂踐卷地而來則莫不迎望風聲奔波迸散其軍員節級將鳥伏鼠竄自救之不暇豈有一人能為縣官率士卒而待寇乎以臣觀之此正如兒戲而已安有為國家計驚騷一路之民使之破家失業而為兒戲之事乎臣故曰於國無分毫之利也凡此利害之明有如白黑伏望陛下不以臣愚賤而忽其言少留聽察其刺陜西義勇事早賜寢罷則一方幸甚治平元年十二月上上英宗乞罷刺陜西義勇係第五狀司馬光臣近者已曽四次上言乞罷刺陜西義勇别白利害極其懇惻終未䝉省察方今陜西一路之民小大皇皇如在湯火之中而朝廷晏然略無拯救之意臣職在針諫安可塞默不敢廣為援引以煩聖聽請以目前顯驗言之今建議以義勇為便者必曰即日河東河北不用衣糧而得勝兵數十萬皆教閲精熟可以戰敵又兵出民間合於古制臣請言其不然彼數十萬者虛數也教閲精熟者外貌也兵出民間者名與古同而實異也何以言之河北河東州縣既承朝廷之意各揀刺義勇只求數多據帳籍言之誠有數十萬之衆矣若萬一强寇在近官中急欲㸃集之時則一人不可見矣豈非虛數乎平常無事州縣教閲之日觀者但見其旗號鮮明鉦鼓備具行列有序進退應節即歎美以為真可戰敵殊不知彼皆隊舞聚戲之類若聞强寇之來則瓦解星散不知所之矣豈非外貌乎古者兵出民間民耕桑之所得皆以衣食其家故處則富足出則精鋭今既賦斂農民之粟帛以贍正軍又籍農民之身以為兵是一家獨任二家之事也如此民之財力安得不屈豈非名與古同而實異乎以臣愚見河北河東巳刺之民猶當遣放况陜西未刺之民乎陛下欲知利害之實何不試召建議者而問之曰河北河東自置義勇以來敵寇凡幾次深入至腹內州軍用義勇拒戰而敵寇敗退今既有義勇之後三路正軍皆可廢而不用乎若果然敵寇曽深入因得義勇之力而敗退今來刺義勇之後正軍皆可廢罷此乃萬世之長䇿也願陛下行之勿疑若自置義勇以來未嘗經陳敵使用今來雖有義勇正軍亦未可廢罷則何忍以十餘萬無罪之赤子盡刺以為無用之兵乎天生聖君以為民也民今如此陛下豈可全不為之動心乎臣之所言盡於此矣陛下若以為稍有可采乞早降指揮下陜西令罷刺義勇以救一方之民若以為勑命巳行不肯遽改即乞且免刺手背候邊事寧息依舊放散則民有一時騷擾之勞猶免終身羈縻之苦若以臣所言皆孟浪迂闊不可施行則臣之智識愚暗無以勉強變更不可久汚諫諍之列伏望聖慈特賜降黜别擇賢才而代之治平元年十二月上上英宗乞罷刺陜西義勇係第六狀司馬光臣昨日上殿為言乞罷陜西義勇事陛下宣諭臣以為命令巳行臣退而思之不勝鬱悒終夕不寐深痛陛下此言之失臣案周易復之初九曰不逺復無祗悔元吉祗大也蓋言人誰無過雖聖賢亦不能免然聖賢皆能不逺而復故雖有小悔不至於大而終保元吉也其上六曰迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征蓋言失之已逺迷而不復無事不凶而人君尤甚故孔子贊之曰迷復之凶反君道也自古明聖之君聞一善言而立為之變更號令者多矣不可悉數唯近嵗大臣自知思慮不熟號令巳失無以抑奪臺諫之言則云命令已行難以更改此乃遂非拒諫之辭陛下新臨大政當求善無厭從諫如流之時而亦有此言天下將何望焉且唐室以前諫議大夫拾遺補闕皆中書門下省屬官日與中書令侍於天子之側議論大政茍事有闕失皆得隨時規正今國家凡有大政唯兩府大臣數人相與議論深嚴祕密外廷之臣無一人知者及詔勑已下然後臺諫之官始得與知或事有未當須至論列又云命令已行難以更改則是國家凡有失政皆不可復救也如此豈惟愚臣一人無用於時諫諍之官皆可廢也以臣所見但當論其事之得失言之是非不當云命令巳行不可改也今陜西一路之民小大皇皇正如在湯火之中若忽得朝廷指揮云所有義勇且住揀刺其已刺手背者並給與公憑放令逐便是得出湯火之中死而復生也其誰不歡呼鼓舞感戴聖恩豈有一人云命令已行不當復改耶陛下萬民之父母萬民陛下之赤子豈有父母誤墜其子於井而曰吾已誤矣遂忍不救耶昔舜稱堯之德曰稽于衆舍巳從人仲虺稱湯之德曰用人惟已改過不吝臣願陛下勿以先入之言為主虛心平意以察臣前後五次所言果然為是為非若其是歟即乞早降指揮罷刺陜西義勇若其非歟即乞如臣前來所奏特賜降黜别擇賢才而代之所有命令巳行之言伏望陛下自今永以為戒不可使天下聞之塞絶善言之路也治平元年十二月上按光前後論次凡六章其後以言不行又六狀乞降黜終弗許光至中書與韓琦辨琦諭光曰兵貴先聲後實今諒祚方桀然使聞陜西驟益二十萬兵豈不震懾光曰兵之用先聲為無其實也獨可以欺之於一日之間耳少緩則敵知其情不可復用矣今吾雖益二十萬兵然實不可用過十日西人知其詳寧復懼乎琦不能答復曰君但見慶歷間陜西鄉兵初刺手背後皆刺面充正軍憂今復然爾今已降勑榜與民約永不充軍戍邊矣光曰雖光亦未免疑也琦曰琦在此君無憂此語之不信光曰光終不敢奉信非獨不敢但恐相公亦不能自信爾琦怒曰君何相輕甚耶光曰相公長在此可也萬一均逸偃藩他人在此因相公見成之兵遣使運糧戌邊反掌間爾琦默然竟不為止其後十年義勇運糧戍邊率以為常矣上神宗乞罷招正兵益講民兵府衛之法吕公著臣竊以古者兵農不分而耕戰並事平居無不耕之民有事無不戰之家故兵籍雖廣而財力不屈後世唯唐之府衛最為近古開元以後其制復壞國家承五季之亂雖庶事草創未復古制然祖宗之初兵不過數十萬故當時未見其害是後招募之數日增而簡練之法益弛平居則常苦於冗食有事則不足以應敵故建議之臣頗謂民兵可復而正兵可消誠以今之禁兵率以中等校之每人嵗用錢糧衣賜計直五十緡千人則嵗費五萬緡至於兵民則非有廩給唯是給之土田或只將見今有地人戶稍寬其租稅省其力役以正兵千人之費足以得民兵數萬人然今之正兵亦不可驟行减放但當即罷招填益講民兵府衛之法使財力不屈而戰守有備以之強國捍邊實萬世之利也臣欲乞詔輔臣選識治體曉兵法或先曽獻議其言可用者數人使議兵制施行熙寧二年上時為御史中丞上神宗乞不令陜西義勇戌邊及刺充正軍司馬光臣先任諫官日伏見國家揀刺陜西義勇臣纍曾論列以為徒使百姓愁苦無益於用近聞環慶路用義勇與西賊戰鬪望風奔潰死傷甚多致主將陷沒此義勇不可用之明驗也臣竊聞議者猶欲教閲義勇以抗西賊若止令州縣教閲守護鄉土猶於人情不至大擾若發以戍邊或如慶歷中刺為正兵則衆人覩環慶之敗譬如無罪往就死地恐於人情大有不安國家既重賦斂以盡其財又逼之戰鬪以絶其命是驅良民使為盜賊也彼為官軍則惜生故望風退走彼為賊盜必致死自可以一敵百臣恐今日教之挽射擊刺乃他日為盜之資也廟堂之議臣所不得知萬一有之詔下之日臣論列不及况當逺離朝廷故不得不先事而言也熙寧三年九月上時除知永興軍宋名臣奏議卷一百二十三
