body:
  text: 宋名臣奏議卷一百十八宋趙汝愚編財賦門新法十上哲宗乞省覽農民封事司馬光臣伏覩近降農民訴疾苦實封奏狀王嗇等一百五十道除所訴重複外俱已簽帖進入竊惟四民之中唯農最苦農夫寒耕暑耘霑體塗足戴星而作戴星而息蠶婦育蠶治蠒績麻紡緯縷縷而積之寸寸而成之其勤極矣而又水旱霜雹蝗蜮間為之災幸而收成則公私之債交争互奪穀未離場帛未下機已非已有矣農夫蠶婦所食者糠籺而不足所衣者綈褐而不全直以世服田畆不知捨此之外更有可生之路故其子弟遊市井者食甘服美目覩盛麗則不復肯歸南畆矣至使世俗俳諧共以農為嗤鄙誠可哀也又況聚斂之臣於税租之外巧取百端以邀功賞青苗則强散重斂給陳納新免役則刻剥窮民收養浮食保甲則勞於非業之作保馬則困於無益之費可不念哉夫農蠶者天下衣食之原人之所仰以生也是以聖王重之臣不敢逺引前古竊聞太宗皇帝嘗遊金明池召田婦數十人於殿上賜席使坐問以民間疾苦田婦愚戇無所隠避賜帛遣之太宗興於側微民間事固無不知所以然者恐富貴而忘之也故每臨朝無一日不言及稼穡真宗皇帝乳母秦國夫人劉氏本農家也喜言農家之事真宗皇帝自幼聞之故為開封尹以善政著聞及踐大位咸平景徳之治有宋隆平之極景徳農田勑至今稱為精當昔周公相成王作無逸曰先知稼穡之艱難乃逸則知小人之依蓋以一盂之飯一尺之帛莫不出於艱難人主既知之則不肯用之於無益散之於無功驕侈之心無自而生矣伏惟太皇太后陛下深居九重皇帝陛下富於春秋自非今者濬發徳音大開言路使畎畆之民皆得上封事則此曹疾苦何由有萬分之一得達於天聴哉其文辭鄙俚語言叢雜皆身受實患直貢其誠不可忽也伏望太皇太后陛下與皇帝陛下同賜省覽庶以開廣聰明資益聖性於民間情偽靡不周知異日太平之業由此為始矣元豐八年九月上時為門下侍郎上哲宗乞罷青苗免役保甲王巖叟臣聞忠臣之事君猶孝子之事親一家之事知而不言非孝也言而不盡亦非孝也有人於此為姦言詭説隂蔽善謀以欺其親而幸利焉而其親未之察則當告乎勿告乎孝子不忍以此心事親忠臣不忍以此心事君臣雖至愚慕孝子之心以為事君之法臣昨在外方聞皇帝陛下即政之始太皇太后陛下垂簾之初内批廢罷京師民情不便十餘事及屏出宋用臣等數人中外喧呼交相慶快又協天下之望登用忠賢以為輔弼積年之弊指日可除而七月於今未聞勇決猶鬱天下之望何也蓋忠賢少而姦邪衆隂為朋黨沮隔於其中耳臣誠惜陛下有哀矜庶物之心有愛育羣生之意四方疾苦又盡知之而未得曠然以發於天下也姦朋邪黨既已辜負聖君於前日又欲欺惑陛下於此時臣竊痛心彼見四方之人密封交進以訴疾苦於陛下則亦自知為朝廷謀者不忠矣其心顛沛唯恐陛下有所更張蓋其事既窮則其過自顯而其身難立不得不多方以自為計也固有與忠賢佯為相親而心實忌惡之以伺其倦厭者有明肆悖戾以侵侮忠賢而欲撓之使去者有黙黙不言是非兩可而茍容於其間者大抵皆欲以自固其權自蓋其惡爾故議者曰姦邪不易去忠賢不易留治亂安危在忠邪去留之間爾此陛下不可不思也陛下知孤忠之難立則定力以主之可也知羣邪之難却則盡意以圖之可也先民之語曰屋漏在上知之在下今在下之人則皆知某人為忠賢某人為姦邪而不知朝廷之上宫闈之中能種種知乎以陛下之聰明宜無不知然臣私憂姦計密行羣邪浸長則陛下之仁心無復得施左右之忠賢無復能立朝廷之公議無復可伸四海之生靈無復受福天下之勢危矣此臣所以寤寐反側而為陛下憂之也今民之大害不過三五事而已儻陛下如聴政之初直從中批出指揮令罷某事罷某事則姦心自沮而陛下之聖澤行矣臣昨在河北為知縣奉行青苗免役保甲之法親見其害至深至悉非若他人汎汎而知之也如青苗實困民之本須盡罷之百姓乃蘇而近日指揮但令斂散不立額而已則所以困民之本十分之八九猶在此必陛下不知也役錢天下億兆之家所共苦也須如舊來復行差法民乃便安而近日指揮但令減寛剰錢而已億兆之家所共苦者十分之七八猶在此必陛下不知也保甲之害三路之民如在湯火未必皆法之弊蓋由提舉一司上下官吏逼之使然而近日指揮雖令冬教然尚存官司則所以為保甲之害者十分之六七猶在亦必陛下不知也此皆姦邪遂非飾過而巧辭强辨以欺惑聖聴将至深之弊略示更張以應副陛下聖意而已非至誠為國家去大害復大利以便百姓為太平長乆之䇿者也此忠義之良心所以尚愆也天下識者皆言陛下不絶害源百姓無由樂生不屏羣邪太平終是難致臣願陛下奮然獨斷如聴政之初行此數事則天下之大體無事陛下髙枕而卧矣臣不勝憤懣納忠之至貼黄如執論者以為青苗免役遽罷之恐國用不足則乞陛下問以治平嘉祐之前國用何以不闕願令講究而行之臣䝉聖恩召自疎逺誓不為朋黨以欺天聰以孤忠上事仁聖言觸衆怨惟陛下力賜主張臣得盡其愚以效萬分密為聰明之助幸甚元豐八年九月上時為監察御史上哲宗乞議革新法之不便者司馬光臣伏見陛下自臨政以來夙夜孜孜以愛百姓安國家為事蓋善治疾者必究其所來攻其所急救之欲速去之欲盡臣觀今日公私耗竭逺近疲弊其原大槩出於用兵夫兵者凶器天下之毒財用之蠧聖人除暴定亂不得已而用之耳自有唐中葉藩鎮跋扈降及五代羣雄角逐四海九州𤓰分糜潰共相吞噬生民塗炭二百餘年太祖受天明命四征弗庭光啓景祚太宗繼之克成厥勲然後大禹之跡悉為宋有於是載戢干戈與民休息或自生至死年及期頤不見兵革吏守法度民安生業雞鳴狗吠煙火相望可謂太平之極致自古所罕侔矣及神宗繼統材雄氣英以幽薊雲朔淪於契丹靈夏河西専於拓跋交趾日南制於李氏不得悉張置官吏收籍賦役比於漢唐之境猶有未全深用為恥遂慨然有征伐開拓之志於是邊鄙武夫窺伺小利敢肆大言祇知邀功不顧國患争賈餘勇自謂衛霍不死白面書生披文按圖玩習陳迹不知合變競獻奇䇿自謂良平更生聚斂之臣捃拾財利剖析秋毫以供軍費専務市恩不恤殘民各陳遺利自謂桑孔復出相與誤惑先帝自求榮位於是置提舉官强配青苗多收免役以聚貨泉又驅畎畆之人為保甲使捨耒耜習弓矢又置都作院調筋皮角木以多造軍器又養保馬使賣耕牛市駔駿而農民始愁苦矣部分諸軍無問邊州内地各置将官以領之自知州軍總管鈐轄都監監押皆不關預捨祖宗教閱舊制誦射法效戎服機械陣圖競為新奇朝晡上場罕得休息而士卒始怨嗟矣置市易司强市榷取坐列販賣增商税色件下及菜果而商賈始貧困矣又立賒貸之法誘不肖子弟破其家又令民封狀增價以買坊場致其子孫鄰保籍沒貲産不能備償又增茶鹽之額賤買貴賣强以配民食用不盡迫以威刑破産輸錢又設措置河北糴便司廣積糧穀於臨邊州縣以備饋運教兵既久積財既多然後用之而承平日久人已忘戰将帥愚懦行伍驕惰加以運籌決勝者乃浮躁巧偽之士不知彼已妄動輕舉是以頓兵靈武力疲食盡自潰而歸執兵之士荷糧之夫暴骨塞外且數十萬築堡永樂怠忽無備縱冦延敵闔城之人翦為魚肉曾未足以威服戎敵而中國先自困矣先帝深悔其然厭截截諞言思畨畨良士未及下哀痛之詔息兵富民而奄弃天下此臣所謂痛心疾首泣血追傷者也伏惟皇帝陛下肇承基緒太皇太后同聴庶政首戒邊吏毋得妄出侵掠俾中外兩安今契丹繼好秉常納貢乾徳拜章征伐開拓之議皆已息矣則比置提舉官散青苗斂免役錢㸃教保甲置都作院養保馬置将官市易司封狀買坊場增茶鹽措置河北糴便司皆為虚設陛下幸詔臣民各言疾苦其已至者千有餘章未有不言此數事者足知其為天下公患衆人所共知非臣一人之私言也利害著明皎如日月何所復疑而羣臣猶習常安故憚於更張雖頗加裁損而監司按堵将官具存保甲猶教閱保馬猶養飼邊州屯戍不減軍器造作不休茶鹽新額常在差役舊法未復是用兵雖息而公私勞費猶未息也如此因循不知改轍數年之後萬一遇水旱大饑盜賊羣起其為國家憂患豈敢盡言哉伏願陛下斷自聖心凡王安石等所立新法果能勝於舊者則存之其餘臣民以為不如舊法之便者痛加釐革雖非一日可行之事欲乞陛下宣諭執政令因臣民上封事熟議利害進呈以聖鑒裁決而行之昔夏遵禹訓商用湯法周循文武之典蓋創業垂統之王貽厥孫謀後世所宜謹守不可失也若凡百措置率由舊章但使政事悉如熙寧之初則民物熙熙海内太平更無餘事矣議者必曰革弊不可倉猝當徐徐有漸此何異使醫治疾而曰勿使遽愈且勿除其根原使盡也其為醫者謀則善矣其為疾者謀奚利哉元豐八年十二月上時為門下侍郎上哲宗乞罷免役劉摯臣竊以聖人之治雖一道亡敝而道之寓於刑名法數者必有偏而不起眊而不行者聖人因時而變之變則通通則久以盡天下之利此五帝所以異制而三王之所以不同體也國家承唐末五代熟爛之後祖宗創制造法趍時之宜順事之變雖聖聖相繼而其法令日增嵗損或舉或廢未嘗同也至於寧民適治所謂道之亡敝者則未嘗異也神宗以仁智之慮達因革之數凡政令制度急絃慢軫大解而更張之故天下䝉其利然至於今殆二十年所謂偏而不起眊而不行者蓋復有之矣其事則非一而其大者則役法是也於役法之弊相為首尾之牽連當更者則坊場吏禄是也始者以徭役不得其平農民勞費故命有司議所以均施之而有司不深惟其故乃一剗祖宗差役舊勑為官自雇人之法率户賦斂以充雇直曰助役又曰免役自上户至於下五等從來無預差役之家一槩斂之蓋於賦税科調百色求取之外又生此重斂毎嵗輸納無有窮期古人有言平地無銅礦農家無錢鑪今所輸必用錢而地土所出唯是絲帛穀粟幸嵗豐收成而州縣逼迫不免賤價售之無以養其私若嵗凶則破易資産或以倍稱之息舉債於兼并以應期限更無減放之法州縣上户常少中下之户常多自法行以來簿籍不正務欲敷配錢數所在臨時肆意升補下户入中中户入上今天下往往中户多而下等户少富縣大鄉上户所納役錢嵗有至數百緡或千緡者毎嵗輸納無已至貧竭而後有裁減之期舊來鄉縣差役循環相代上等大役至速者十餘年而一及之若下役則動須三二年乃復一差雖有勞費比之今日嵗被重斂之害孰為多少也今天下錢日益重貨日益輕民日益困矣若之何坐視而不䘏也哉然則前日有司立法非有意於寛役利民正在聚斂刻剥損下益上為國取謗大失朝廷惠綏生靈本意臣竊見徭役昔者有至於破産而民憚為之者唯衙前一役爾今天下場務官司收入自行出賣嵗得民錢無慮數百萬以為衙前雇募支酬之直計一嵗之入為一嵗之出蓋優有餘裕則衙前一重役無所事於農民矣農民既除此一重役外唯有散從承符弓兵手力耆長壯丁之𩔖此役無大勞費宜並用祖宗差法自第一等而下通任之比於舊制徭役輕矣治於人者事人古今之通義則安用給錢為哉坊場之法舊制撲户相承皆有定額不許增擡價數輒有剗奪祖宗非不知增價之為公家利也所以不許者知其恱目前之利必有後日之害故也新法乃使實封投狀許價髙者射取之於是小人徼一時之幸争越舊額至有三兩倍者舊百緡今有至千緡者交相囊橐虚造柢本課額既大理難敷辦於是百敝隨起決至虧欠州縣勞於督責患及保任監錮繫累終無償納官司䕶惜課額不為減價則誰人復肯承買今天下坊場如此者十五六矣故實封增價之所得於敗闕之所失殆不相補也蓋財則可以通之而已不可盡也少捐分數與民共之則公私相濟其利長久臣欲乞罷實封投狀之法應天下坊場委逐路轉運提舉司将見今買名浄利額數與新法以前舊額相對比量及地望𦂳慢取酌中之數立為永額一用舊法召人庶乎承撲者無破敗之患而官入之利有常而無失也吏禄之法天下吏人舊制諸路及州縣法各不同有鄉户差充者有投名者有鄉差投名雜用者入役之後既以案司之優重迭相出入以為酬折又積累嵗月有出職之望行之久逺人自以為便此時有司見禮經有庶人在官之禄遂假其説資以掊民殊不知三代已逺其事不可行於今日者多矣夫庶人在官之禄雖有其文而在法與數不可見其詳乃鑿空造端槩斂民錢給為吏禄不重之則不足以募不輕之則不足以給今内外之吏除重法之外其它每月所給無幾於吏固未足以有濟而官積所給天下蓋已不貲無故竭民財而為此費誠何為哉至於所謂重禄以行倉法尤非義理夫一錢以上以徒坐之謂之嚴刑可也遂以謂吏懼而不受賕則臣不敢知也今主議者曰禁既嚴則吏必畏故令下已來犯者少臣以謂非犯者少敗者少也非敗者少正其罪者少也網之密則與者取者藏聲匿跡亦将避之故曰敗者少也一錢坐徒誰則忍之誰敢易之故茍有敗者若稍涉疑晦及自非有告人當賞則官司往往遷就平反釋重入輕若外路則雖使者亦或諭意州縣使之如此亦人之情也故曰正其罪者少也借使犯者皆正其罪固亦先王制之所無而聖人之所不忍也吏受賄於律自有刑名而曲法者一匹以上至徒則刑亦不為輕矣今變先王之刑而重之又多賦吏禄以買法之行無謂也臣愚欲乞行熙寧以前舊法外應新法所創及增給吏禄並行減罷臣愚誠不知忌諱今衙前之役則待之以坊場價錢弓手等役則均之以祖宗差法吏禄非舊法所給則皆罷去應役人縻費私役之𩔖則禁之以熙寧新法茍如是也則所謂免役錢者於是可以一切蠲除矣或謂免役錢籍於常平固非獨以待募役也縣官它費多有賴乎此即未可以利害論也臣以謂役錢領於司農非有特勑未嘗以給常費今罷去無損於國用況祖宗以來至於役法未改役錢未斂以前百餘年間不知可以為國否亦曰用之有節則取之有道矣今天下百姓疲筋骨忍飢寒冒鞭笞終嵗汲汲為公家納錢耳不幸有連年灾荒之變實恐窮苦之人流亡轉徙為溝中瘠而强梁者賒死忍命不得為陛下之良民矣然則役錢乃生民性命天下安危之所繫奈何欲以為不刋之令哉古者富藏於民誠令百姓賦税之外有以自養則其贏餘乃國之外府緩急取之而已無事之時坐困竭之非計也臣故以謂役錢宜一切罷之役錢罷則提舉常平官司亦可罷去以見存職事付之轉運司足矣天下既減罷監司數十人則州縣稍得從容上下省事非小補也雖然此大法也顧臣之言蓋其略耳至於法之纎悉或參差牴牾宜有畫一之論欲乞於兩制臣寮選差明於治體深於民事者三兩員置局講議裁立格條三省執政官典領之以待聖斷施行元祐元年正月上時為侍御史閏三月十八日詔付韓維等相度以聞上哲宗乞罷免役司馬光臣切以免役之法其害有五舊日差役之時上户雖差充役次有所陪備然年滿之後却得休息數年營治家産以備後役今則年年出錢無有休息或有所出錢數多於往日充役陪備之錢者此其害一也舊日差役之時下户元不充役今來一例出錢免役驅迫貧民剥膚椎髓家産既盡流移無歸弱者轉死溝壑强者聚為盜賊此其害二也舊日差役之時所差皆土著良民各有宗族田産使之作公人管幹諸事各自愛惜少敢大段作過使之主守官物少敢侵盜所以然者事發遺亡有宗族田産以累其心故也今召募四方浮浪之人充役無宗族田産之累作公人則恣為姦偽曲法受贓主守官物則侵欺盜用一旦事發則挈家亡去變易姓名往别州縣投名官中無由追捕官物亦無處理索此其害三也自古農民所有不過穀帛與力凡所以供公賦役無出三者皆取其身而無窮盡今朝廷立法曰我不用汝力汝輸我錢我自募人殊不知農民出錢難於出力何則錢非民間所鑄皆出於官上農之家所多不過莊田榖帛牛具桑柘而已無積錢百貫者也自古豐嵗穀賤已自傷農官中更以免役及諸色錢督之則穀愈賤矣平時一斗直百錢者不過直四五十文更急責之則直三二十矣豐年猶可以糶穀送納官錢若遇凶年則穀帛亦無不免賣莊田牛具桑柘以求錢納官既家家各賣如何得售唯有拆屋伐桑以賣薪殺牛賣肉今嵗如此來嵗何以為生是官立法以殄盡民之生計此其害四也提舉常平倉司唯務多斂役錢廣積寛剰以為功効希求進用今朝廷雖有指揮令役錢寛剰不得過二分切慮聚斂之臣猶依並役錢别作名目隠藏寛剰使幽逺之人不被聖澤此其害五也陛下近詔臣民各上封事言民間疾苦所降出者約數千章無有不言免役錢之害者足知其為天下之公患無疑也以臣愚見為今之計莫若直降勑命應天下免役錢一切並罷其諸色役人並依熙寧元年以前舊法人數委本縣令佐親自結五等丁産簿定差仍令刑部檢會熙寧元年見行差役條貫雕印頒下諸州所差之人若正身自願充役者即令充役不願充役者任便選雇有行止人自代其雇錢多少私下商量若所雇人逃亡即勒正身别雇若将帶却官物勒正身陪填如此則諸色公人盡得其根柢行止之人少敢作過官中百事無不修舉其見雇役人候差到役人各放逐便數内唯衙前一役最號重難曏者差役之時有因重難破家産者朝廷為此始議作助役法然自後條貫優假衙前諸公庫設㕑酒庫茶酒司並差将校幹當諸上京綱運召得替官員或差使臣殿侍軍大将管押其麄色畸零之物差将校或節級管押衙前苦無差遣不聞更有破産之人若今日差充衙前料民間陪備亦少於曏日不至有破家産者若猶以為衙前户力難以獨任即乞依舊於官戸僧寺道觀單丁女户有屋業每月掠錢及十五貫莊田中年所收斛斗及百石以上者並令隨貧富分等第出助役錢不及此數者與放免其餘産業並約此為準所有助役錢令逐州樁管據所有多少數目約本州衙前重難分數每分合給幾錢遇衙前合當重難差遣即行支給然尚慮天下役人利害逐處各有不同欲乞於今來勑命更指揮行下開封府界及諸路轉運司謄下諸州縣委逐縣官看詳若依今來指揮别無妨礙可以施行即便依此施行若有妨礙致施行未得即仰限勑到五日内具利害擘畫申本州仰本州𩔖聚諸縣所申擇其可取者限敕書到一月内利害擘畫申轉運司仰轉運司𩔖聚諸州所申擇其可取者限敕書到一季内具利害擘畫奏聞朝廷候奏到委執政官再加看詳各隨宜修改别作一路一州一縣敇施行務要所在役法曲盡其宜元祐元年二月上時為門下侍郎上哲宗論蔡確等觀望不肯協心改法吕陶臣聞君子小人之分辨則王道有成邪正雜處於朝則政體不能純一此天下安危治亂所繫甚大世主當審其取捨也恭惟太皇太后陛下臨御以來念祖宗積累之難思先帝倚託之重保祐聖嗣安養生民剗除敝事覃布徳惠召用一二舊老與之裁正法度緝全紀綱以傳萬世欲皇帝陛下他日循而守之則宗社乂安如泰山之四維聖心所存豈不善哉豈不逺哉然大臣之異議者則不能盡誠竭力以稱太皇太后之意尚且依違偷惰務習故態觀望反覆互持兩端推原其情蓋有三説一曰先帝之法豈可遽改他日嗣皇親決萬幾則吾屬皆有罪二曰國家用度至廣非取於民何以能足今一切蠲放餘利則遂見闕乏三曰司馬光老且病将不能終其事萌此心者蔡確韓縝章子厚張璪是也安燽李清臣則依阿其間俯仰徘徊以伺勢之所在而歸之爾謂先帝之法不可遽改乎三王之政不免有敝為其有敝而改之所以宜民利物而全其治體臣嘗觀去年正月詔書乃曰嘉與四海洗心自新則先帝彼時已知法之為敝有欲改之意矣今太皇太后以母道臨制天下順元元之所欲而與時損益蓋以成先帝之志也且君子愛人以徳小人愛人以姑息責難於君謂之恭謂吾君不能謂之賊今之大臣欲改法者使天下無憾於先帝是待其君甚厚而愛之以徳也於先帝為忠也其不欲改者使天下憾於先帝是待其君甚薄而愛以姑息也恭惟皇帝陛下端重仁孝出自天縱他時親總萬幾而見天下有太平之實追觀今日之事是非得失洞鑒其端則必以厚於先帝而愛之以徳者為是薄於先帝而愛之以姑息者為非忠於其君者為得賊於其君者為失矣然則欲改法者他日将至於無罪不欲改者他日将至於有罪不當私憂而過計也謂國家用度非取於民不能足乎則今日之議法非不取也唯患小人倚法削民而取之多故參酌中道而除去煩苛乃百姓足君孰與不足之義也伏惟太皇太后皇帝陛下慈愛恭儉徳與性成内無土木遊玩華靡之費外無干戈攻戰過濫之賞節用裕民既得其道何俟過取而後給哉謂司馬光且病将不能終其事乎則修講法度本於宗社萬世之計不問光之存亡假使光雖物故則朝廷圖治之意豈肯中輟哉亦何必望望然幸光之死也謀人之國而措意如此是昔日負先帝今日負陛下也當熙寧元豐之際小人之黨棊布於天下急利者争取財急功者争用兵結民怨起邊禍日甚一日嵗甚一嵗彼數人者當此之時或領大農或處近侍或總計省或居二府然而未嘗獻告一言建明一事唯持禄固位茍度嵗月以民事驗之其極也則有市易之意有堆垜之求有江湖之鹽法有京師之茶禁以軍政驗之其極也則有乞弟之役有蘭州之取有靈武之復有永樂之陷凡此數者結民怨則深起邊禍則大然皆非先帝之本意乃大臣無所補報而有以成之臣故曰昔日負先帝也今太皇太后惻然念生民之困窮思有以安固邦本乃講求治道舉偏補敝改正法度以付嗣君為萬世之福天下之人傾耳側目日望太平數人者當此之時不能引咎改過猶懐向之三説觀望而不欲為或為之而不欲盡其事是以罷市易則尚存抵當放保甲則須俟嵗首黜江淮運鹽之臣則遷延累月而後乃行遣川蜀按茶之使則巧為之詞而不欲發至於邊鄙之大患存捨之長䇿皆置而不議及司馬光一獻差役之法則昌言其疎竊笑其速其徒從而和之妄傳章子厚有五利七難之説喧播於外士民聞者莫不駭嘆臣故曰今日負陛下也此數人者其處心積慮大略如此當此之時決不可鎮社稷矣若乃居家之隠慝在朝之細過聞望之素輕踐厯之太幸則言者陳之已詳陛下知之已久臣近領臺職不敢復道今蔡確章子厚已罷免人皆快之縝璪輩猶備位實未厭天下公論也伏望陛下特出聖斷以辨君子小人之分無使邪正雜處於朝罷黜縝等以謝天下則王道之成政體之純一易如反掌耳元祐元年四月上時為殿中侍御史上哲宗乞罷青苗王巖叟等臣等累日前連章上言乞依臺諫官前後論列早賜罷支青苗錢事尚未䝉指揮施行臣等未諭聖意仰惟自青苗之法行天下困弊日甚一日不如昔時陛下静則以堯舜之心為心動則以祖宗之法為法髙明博大無所不通必知行青苗以來百姓皇皇日甚一日天下之人議論沸騰者今十六七年矣必不肯復以為便力主而行之竊聞有大臣妄進姦言惑亂聖聴謂恐國用不足覬陛下以此為富國之計便可見其無識今匹夫放債取利為之不已而終必自敗況為國乎富國有大道養民有大本豈有匹夫朝夕之事可為富國長久之計哉比者四民不循其分不安其業故所得者皆茍得所圖者皆茍圖今陛下即位以來四民得安其分得安其業天下之富自将有餘為士者不敢狂言妄作徼功倖進以生事於四方而耗公私之財嵗之所惜自已無窮此一富也為農者絶誅求之苦息調發之勞罷不急之役寛非時之擾天下從此無逃民四海從此無荒田耕桑以時常賦不闕嵗之所入不可勝計此一富也為工者不窮竭材用以治兵器不傾極功能以事土木崇儉尚朴而華靡纎巧無所陳於前日有所省月有所積而富不可勝用也為商者無均輸之政以害其生無市易之法以奪其利而後皆得自竭其計自運其財以流行於四方人人之得有餘而國家征税之入無算此其富不可勝用也四者所得孰與青苗之息乎為陛下大臣不知以此開陛下之心而乃嵗初而出之嵗終而入之朝而出之暮而入之以求毫分之息以自利者匹夫富者之事也豈有為天下而為匹夫之事哉陛下只當思養民不須思富國若主於富國則民必自窮若志在養民則國将自富發之於心曾靡毫釐之差覩之於事遂爭千里之逺唯在審處之也伏望陛下檢會臣等前奏留神省納早賜施行元祐元年四月全臺上上哲宗乞罷市易韓川臣伏以朝廷更市易之法捐減所收息數宿逋放釋殆盡自罷賒賣以來實用錢物交易日入不過三百千收一分之息月得九百千又未必滿一分也慮貨之陳積但及五釐足以免罰則亦出之月息纔四百五十千而倉務共占官六員専副書吏庫級等不減百人月給俸食幾千緡所收之息不補所費之半竊惟市易之設雖曰平均物直而其事則不免貿易交以取利使獲其利實足以佐用尚不可而又所收不補所費顧可為邪請於市易務監官監門内各留一員及實用公人催納欠負外結絶見在物貨畫日更不收買元祐元年六月上時為監察御史先是元豐八年七月上疏詔罷諸市鎮市易抵當八月又詔罷諸州縣市易至是川上疏始詔罷在京市易務上哲宗約束州縣抑配青苗錢司馬光臣檢會先朝初散青苗錢本為利民故當時指揮並取人户情願不得抑配自後因提舉官速要見功務力多散諷脅州縣廢格詔書名為情願其實抑配或舉縣勾集或排門抄劄亦有無賴子弟謾昧尊長錢不入家亦有他人冒名詐偽請去莫知為誰及至追集皆歸本戸朝廷深知其弊故悉罷提舉官不復立額考較天下莫不欣戴昨於四月二十六日有敕命令給常平錢穀限二月或正月只為人戸欲借請者及時得用又令半留倉庫半出給者只為所給不得輒過此數至於取人戸情願不得抑配一遵先朝本意慮恐州縣不曉勑意將謂朝廷復欲多散青苗錢穀廣収利息勾集抑配督責嚴急一如曏日置提舉官時今欲續降指揮下諸路提刑司告示州縣並須候人戸自執狀結保赴縣乞請常平錢穀之時方得勘㑹依條支給不得依前勾集抄劄彊行抑配仍仰提㸃刑獄常切舉察如有官吏似此違法騷擾者即時取勘施行元祐元年上時為左僕射上哲宗繳駮青苗法蘇軾臣伏見熙寧以來行青苗免役二法至今二十餘年法日益嚴刑日益峻盜日益多穀帛日益輕細數其害有不可勝言者今廊廟大臣皆異時痛心疾首流涕太息欲已其法而不可得者況二聖恭已唯善是從免役之法已盡革去而青苗之事乃猶因舊稍加損益欲行紾臂徐徐月攘一雞之道如人服藥病日益增體日益羸飲食日益減而終不言此藥不可服但損其方劑變其湯使而服之可乎熙寧之法本不許抑配而其害至此今雖復禁其抑配其害固在也農民之家量入為出縮衣節口雖貧亦足若令分外得錢則費用自廣何所不至況子弟欺謾父兄人户冒名詐請如詔書所云似此之𩔖本非抑勒所致昔者州縣並行倉法而給納之際十費二三今既罷倉法不免乞取則十費五六必然之勢也又官吏無狀於給散之際必令酒務設鼓樂倡優或關撲賣酒牌子農民至有徒手而歸者但每散青苗即酒課暴增此臣所親見而為之流涕者也二十年間因欠青苗至賣田宅雇妻女投水自縊者不可勝數朝廷忍復行之歟臣謂四月六日指揮以散及一半為額與熙寧之法初無小異而今月二日指揮猶許人户情願未免於設法網民使快一時非理之用而不慮後日催納之患二者皆非良法相去無幾也今者已行常平糶糴之法惠民之外官亦稍利如此足矣何用二分之息以賈無窮之怨或云議者以為帑廩不足欲假此法以贍邊用臣不知此言虚實若果有之乃是小人之邪説不可不察昔漢宣帝世西羗反議者欲使民入穀邊郡以免罪蕭望之以為古者藏於民不足則取有餘則與西邊之役雖户賦口斂以贍其乏古之通義民不以為非豈可遂開利路以傷既成之化仁宗之世西師不解蓋十餘年不行青苗亦何妨闕況二聖恭儉清心省事不求邊功數年之後帑廩自溢有何危急而以萬乗君父之尊負放債取利之謗錐刀之末所得幾何臣雖至愚深為朝廷惜之欲乞特降指揮青苗錢今後更不給散所有已請過錢候豐熟日分作五年十料隨二税送納或乞聖慈念其累嵗出息已多自第四等以下人户與放免庶使農民自此息肩亦免後世有所譏議兼近日謫降吕惠卿告詞云首建青苗力行助役若不盡去其法必致姦臣有詞流傳四方所損不細所有上件録黄臣未敢書名行下元祐元年八月上時為中書舍人先是二月詔青苗錢穀用常平舊法施行四月二十六日乃詔給常平錢穀限二月或正月以散及一半為額時同知樞密院范純仁以國不足實建此議司馬光方以疾在告不與也已而臺諌共言其非皆不報光尋具入劄子乞約束州縣抑配者軾至是又繳奏乞盡罷之光始大悟遂力疾入對簾前對曰不知是何姦邪勸陛下復行此事純仁失色却立不敢言宋名臣奏議巻一百十八
