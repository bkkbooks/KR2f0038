body:
  text: 宋名臣奏議卷一百八宋趙汝愚編財賦門茶法上太宗乞罷𣙜山行放法張洎臣伏奉中書宣諭聖意令訪聞茶法其𣙜山通商各有何利害者臣才識鄙陋預聞天旨退就衡泌惶悚實深謹略具𣙜山放法利害仰對大問惟聖明察之伏以茶貨之興其來尚矣資民豐國利潤之功博焉𣙜山放法損益之制肇自有唐創茲茶法流行天下無異米鹽兆姓所須逺近同俗今獻議者言貨茶利害蓋有二焉一曰𣙜山一曰放法歷代制置雖或不同舉要而言則𣙜山之害深放法之利廣也然而幹司邦計之臣必曰朝廷𣙜山大獲厚利儻從放免徒利茶商此蓋老生之常談近世之弊法徒傷大體豈務通經者乎今請一二而言之夫南國土疆山澤連接逺民習俗多事茶園上則供億賦租下則存活妻子營生取給更絶他門及其官𣙜茶山利歸公室衣食之源日削採造之役歲增課額既漸虧刑罰又屢及以至貼田賣屋力辦課程物産既空死亡寧救所以出茶之處郡縣凋殘民不聊生職由於此其弊一也禁𣙜之地法令斯嚴銖兩之茶即該憲網公私追擾獄訟繁興大則破族亡家小則身填牢戶州縣公事大半為茶朝禁夕刑繫縲相繼戶口由兹減耗田野為之汙萊蠢爾蒸民墜於無告獄連禍結莫甚於斯其弊二也茶貨在山同夫五榖常持愛養即獲滋豐及夫朝廷𣙜山鄉原失業茶戶逼於寒餒日有逃亡者茶園陷於姦幸歲有荒廢者年華漸久殘破益深眷彼靈苗鞠為茂草追呼覺察已失課程雖欲改張噬臍安及其弊三也謹按唐史穆宗朝宫中營造臺觀國計不充王播希恩請增茶稅李珏上疏曰𣙜率救弊起自干戈厚斂於人殊傷國體歲終上計其利幾何未見阜財已云斂怨矣至大和九年鹽鐵使王涯始奏行𣙜茶之法江淮間百姓茶園官自造作分命使者主之百姓公言曰果行是法止有盡殺使臣入山叛耳其後甘露事發涯竟就誅故史臣謂王涯欲希恩幸重困蒸人然而竄身姦邪之間與其謀而危其國豈非鬼瞰神奪駕斯禍以懲之乎前史書之以為鑒誡國家膺圖御極子育黎元澤浹窮荒仁及行葦唯兹茶法未叶大中改絃更張正在兹日今若罷𣙜山之制行放法之條益國便民其利有五夫先王創制貴在通行規利竭民政斯濫矣𣙜山弊法舉而棄之則委頓者獲全流庸者盡復東南郡縣百萬遺氓送死養生得安舊業其利一也造茶之戶既專物産必能經營地利愛養茶園封殖柯條防護山澤十年之內茶貨大興通商惠農國賦增集其利二也𣙜山既放密網減除愛人而義在必行畫象而民將不犯普天之下實省刑章利用厚生莫先於此其利三也比來般運盡出公家涉歷江湖按漕河洛方舟巨艫經途萬里風濤沒溺官吏姦偷陷失茶綱比歲常有若行放法此患自除其利四也國家𣙜買茶貨歲入無窮堆貯倉場充積州部及乎出賣之際則大半陳腐積年之後又多至焚燒今若許放𣙜山任民貿易則國中永無棄貨天下咸喫新茶惠潤公私實為要道其利五也或曰國家制置茶法蓋有歲年一旦通商大虧國計贍用不足其將奈何對曰聖后當陽政先惠下將建無窮之䇿非急一時之利况兹變法未見虧官𣙜放便宜謹條件如後𣙜山一天下郡國所出茶貨品類至繁且以湖南一道所出茶貨約度為凖訪聞湖南山色茶每斤官中𣙜買用本錢二百二十文輦運支費約破錢一百文輦運之稍逺即不啻一百文道途稍近即不及一百文今將道途逺近尅折算計一槩且以百錢為凖官中於地頭出賣計收錢九百六十文除算出本錢并纒裹錢共三百二十文外合收淨利錢六百四十文其淮南兩浙江南等道茶貨雖出賣價例或小有不同其所收淨𣙜茶貨利大約不踰於此國家所𣙜茶貨歲月漸深即有減價出賣者逺年陳惡不堪支用即有逐時燒棄者今請朝廷且將天下一年所納茶貨較算其元使用本錢及輦運錢都合計若干於地頭出賣所收淨利錢都合得若干却於淨利錢內尅折出逐年減價出賣及官中燒棄茶貨外其所有的實淨利合有若干如茲算合即所賣茶貨除尅折外每斤價錢又恐不能及六百四十文放法一國家若放𣙜山任民買賣理財之道宜通規天下諸道州府出茶之處請各於緊要地置立務局其茶貨離山場之日不計多少每一大斤茶戶納錢一百文茶商納錢三百文茶商出賣地頭更納錢二百文其茶商所賫博買茶貨金銀匹帛等經歷舊買茶處向外州郡其州郡又依例納稅統而言之即官入茶租與𣙜山之日所獲淨利不相懸矣或曰朝廷改變茶法貴要利民若茶商茶戶所納之錢過為繁重豈惠下之道也答曰𣙜山之時商客買官茶一斤計用錢九百六十文改法之後且約將錢四百文為茶本四百文納官都計八百文若更將一百六十文剩錢納官方只得𣙜山之時買茶舊額况放法之後民皆取便既絶官司上下侵擾又免官中陳茶就山場買賣得一色新茶商販之人獲利誠厚更令納鏹尚為輕賦况見出茶本以𣙜山之日猶未登舊額者乎又茶戶賣茶入官甚為艱苦或將逺年陳惡雜物折給或得低價一色見錢然而經歷官司動遭刻削茶稍低下即被焚燒逮于住場僅同白納今既改法將茶貨賣與商客且約得價錢四百文除將一百文納官尚有三百文見鏹比𣙜納之日所獲利潤不亦復饒乎或曰官中所取茶租若加重厚民於茶價須至增添茶價既增於人便否答曰茶為食物天下所資日用於人同夫鹽酒雖價例增長非有害於時焉在昔有唐宰相令狐楚嘗奏茶法云賦率之時既節級增價商人轉賣必價稍貴即是錢出萬國利歸有司既無害茶商又不擾茶戶詳楚之所奏理甚顯明茶價雖增實有利而無害矣今國家大更茶法式洽民心所慮者賦入不登或虧邦計今兹放𣙜其利昭然舉而行之實久長之計也二𣙜山之時商販艱阻今既放法民皆自便普天之下茶貨流通利入公門必當增倍商人所到州郡賣茶納錢此則率賦二百錢非長行稅賦宜令本處稅院别置文歷逐時收管俟年終上計考校課程三國家贍用之茶不可令闕宜計度逐年所支費多少據合留數目令折稅茶戶依舊𣙜納或慮折稅茶數目浩汗逐年𣙜納不盡即可據都額分為畨次令茶戶三年一次輸納庶均苦樂永冀通行竊以理財聚衆聖人之大業興利除害有國之常規國家受命上天光宅中土交修庶政歷載于兹大道汚而復隆墜典缺而咸補唯財貨一節未行寬簡豈不以覆燾至大贍用攸廣將安區夏須資物力者乎臣以為司計之臣失於經度所致也何則普天之下中外資用四海九州之租賦關市山澤之稅率𣙜山煮海之冥利一歲所入其數幾何郊廟社稷之嚴奉少府中禁之支費六軍羣吏之資贍一歲所出其數幾何司計之臣茍能按經常調虛實量入以為出則國內財貨可得而均節矣天下利病可得而明察矣其或聖朝歲時攴費未能放行計度但掊克以困黎元貨殖程財未見其可也况茶貨害政為日滋久儻從變法孰匪至公舉而行之又何疑也端拱二年上時為戶部郎中判考功上仁宗乞弛茶禁張方平臣等伏見茶課緡錢歲當二百四十四萬八千嘉祐二年才及一百二十八萬有奇是為本錢才又募人入錢皆有虛數實為八十六萬而二十九萬有奇是為本錢才得子錢四十六萬九千而已其輦運縻費喪失與官吏兵夫廩給雜費又不與焉至於園戶輸納侵擾日甚小民趨利犯法刑辟益蕃獲利至少為弊甚大宜約至和之後一歲之數以所得息錢均賦茶民恣其買賣所在收算請差官詢察利害以聞嘉祐三年著作郎何鬲三班奉使王嘉麟皆上書請罷給茶本錢縱園戶貿易而官收稅租錢與所在征算歸𣙜貨務以償邉糴之費可以疏利源而寬民力時富弼韓崎曽公亮執政決意向之八月命翰林學士韓絳知諫院御史知雜吕景初即三司置局議弛茶禁十月方半為三司使上此奏遂遣司封員外郎王靖等分行六路及還皆言如三司議便四年二月下詔曰古者山澤之利與民共之故民足於下而君裕於上國家無事刑罰以清自唐建中始有茶禁上下規利垂二百年如聞比來為患益甚民被誅求之困日惟咨嗟官受濫惡之入歲以陳損私藏盜販犯者實繁嚴刑重誅情所不忍是於江湖之間幅員數千里為陷穽以陷吾民也朕心惻然念此久矣間遣使者往就問之而皆歡然願弛其禁歲入之課以時上官一二近臣件析其狀朕猶若慊然又於歲輸裁減其數使得餘阜以相為生剗去禁條俾遁商利歷世之奬一旦以除著為經常弗復更制損上益下以休吾民尚慮喜於立異之人緣而為姦之黨妄陳奏議以惑官司必置明刑無或有貸其後知制誥劉敞言改租錢不便大要謂先時百姓之摘山者受錢於官而今也顧使之納錢於官受納之間利害百端先時百姓冒法販茶者被罰而今悉均賦於民賦不時入刑亦及之是良民代冒法者受戮子子孫孫未見其已先時大商富賈為國懋遷而州郡收其稅今大商富賈不行則稅額不登且乏國用此三者最其害也翰林學士歐陽修亦言改法五害時朝廷方排衆論而行之卒不用敞等議上神宗論蜀中置場買茶不便吕陶臣今具本路置場買茶往熙河博賣并盡諸州茶貨入官便收三分利息旋行出賣致令細民失業枉陷刑憲大於逺方不便謹具畫一條例如後一臣伏以國家富有四海山澤之利多與民共自仁祖臨御以來深知東南數路茶法之害制詔有司一切弛放任令通商貨法流行德澤深厚聖時盛事高出前世今天下茶法既通而蜀中獨行禁𣙜此蓋言利之臣不知本末茍於勞費而妄為之非所以安靜逺方之意况川峽四路所出茶貨北方東南等處十不及一日月所照文軌混同法無二門仁不異逺豈可諸路通商兩川却為禁地虧損治體莫甚於斯乃為害之大者故臣敢先言之伏望聖慈特寬茶禁所貴法令平一以幸逺方一本路既為置場買茶將往熙河等處并逐旋取利出賣之後更不許民間𠂻私買賣遂令諸色人告捕依編勑禁𣙜茶法斷罪州縣承此指揮後來纍有成都府卭州百姓馬吉等為𠂻私賣茶被人告捕有至徒罪各追賞錢一路之民遂生怨誹蓋緣立法太重有害於人大凡官中元有之物民間私侵其利方是犯禁只如解州有鹽民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園本是百姓兩稅田地不出五榖只是種茶賦稅一例折科茶園稅每三百文折絹一匹三百二十文折納紬一匹十文折納綿一兩二文折納禾草一束役錢亦須均出自來採茶貨賣以充衣食伏緣此茶本非官地所産乃是百姓已物顯與解鹽晉礬事體不同一旦立法須令中賣與官或敢私下交易便成犯禁斤數稍重乃至徒刑仍沒納隨行物色别理賞錢恭惟陛下仁聖恤物之心必不如此伏乞别立條約以救苛刻之弊免使刑辟滋彰有傷和氣一本州導江縣蒲村堋口小唐興木頭等鎮各準茶馬司指揮盡數收買茶貨入官並已施行民之受弊大率均一惟導江縣一處尤為切害蓋緣本處是西山八州軍隘口自來通放入城郭部落博易買賣其蕃部别無見錢交易只是將到椒蠟草藥之類於鋪戶處換易茶貨歸去食用謂之茶米或有疾病用此療治旦暮不可暫闕今來官中須要見錢出賣則蕃部難更將椒蠟等物入場博買若於鋪戶處博易則官茶每斤取三分息錢官中每斤若用一百文買即作一百三十文賣若用五十文買即作六十五文賣鋪戶價例自然增長蕃部買賣便致阻隔况茂州軍興之後人情方始安帖豈宜更使茶貨不通别生邉事右謹具如前所有茶禁不通細民失業刑辟太重最於逺方不便事理並已條析如前臣切見熙寧七年朝廷差李把蒲宗閔入川相度買茶往熙河博馬等事當時使者急於進用不察事體遂認逐年息錢四十萬貫應副熙河後來運茶積滯歲課不足即便擘畫却於彭漢二州逐年收買狹布各十萬匹名為折當腳錢其實將布上所得之息充入茶利自後又恐買布亦難敷及元數則乞却雇回船車般解鹽入川洎至鹽法難行則又乞將川中有茶去處並行收買前後乖錯非止一事只是欲竊功賞不恤民間弊病臣愚伏望聖慈特賜采察所貴逺方之俗被惠安生至如官吏費耗道途阻節稅額虧損得不補失則臣不敢喋喋開陳以浼天聽伏乞以臣此奏下本路安撫轉運提刑司相度利害特賜施行熙寧十年三月上時知彭州陶凡三次論奏此係第一狀上哲宗論蜀茶劉摯臣伏覩陛下即位聽政以來嘉與天下休息於安治凡法令之弗宜于民者疏通損益之官吏之弗良于政者罷免廢黜之中外欣戴人人如被大賚然事猶有在逺方重地為害尤甚者則河北江湖之鹽法福建川蜀之茶禁是也數路之害同而河北江湖福建已蒙朝廷遣使亷治之獨蜀之茶害未聞詔旨臣切嘗博訪於知其事者槩得其説曰蜀地陋而狹茶之所出不過十數州而已始時人賴以為生今茶司盡𣙜而市之大約園戶有茶一本而官市之額已至數十斤矣官所給錢米耗於公者名色不一如預借息錢驗引錢頭子錢打角錢稅錢之類費於吏者常已過半每歲春官司預以勸借錢糧必以牙儈保任之及輸入之日驗引交稱又牙儈主之故其費于牙儈者又不知幾何則是官豫園戶名為平市而實奪之也園戶欲增植則加市故其俗謂地非生茶也地實生禍也茶為息始者息一出於茶也其後市之價愈下取之息愈多園戶不勝為之也故作茶日少裁足以應官額而已於是主茶息者議不獨賴茶而又為博易以充之也博易之事它貨百物買販苛刻錐刀瑣屑無不為者依茶為名通曰茶息商稅務坐視漏失歲課而不敢有所論也至於商賈請算者平時更私散之州郡茶地今則一集于成都一都場高其估以與之又總計平時所之州郡逺近道里之費入之故都場之取息又如此商旅之所以難行也官吏以息為功第賞既多進官減年矣又以息額之餘錢使與胥吏牙儈分取入已曰用市易法也市易之賞固非法也然其取息猶曰與民和市而茶之取息嚴用重禁網羅致之亦無功甚矣奈何均用一法賞之也今一任有分錢少者不下數千緡而減年磨勘至有三十餘年者此何理哉法亦可謂敝矣而朝廷遣使未之及者豈非以蜀之茶法與熙河蘭會之經制相為用者歟蜀茶之利以給熙河蘭會者天下十之三熙河蘭會之費不止而蜀茶之害未可息也然熙河蘭會之費今昔有不同昔者事邉之外前有王韶後有李憲提兵革財用之大權朝廷捐金帛市租莫知紀極聽其自用不領於有司無所會計非徒私二家也於是依阿茍合之客罔功興事以利相市之徒公取公豫莫見其迹則熙河蘭會大費外又有以泄之者如此今既制之於有司無二人者之橫蠧若又於邉計外凡冗名濫費一切大為之節約則蜀之茶雖未可以弛其禁而所謂十之三者殆必可損矣伏望聖慈選遣使指考茶法之弊欺者會計緣茶公家之所費與實息之數大減歲市之額稍增斤重之價削納茶無名之錢以休養園戶裁官吏之員牙儈之數以省冗給罷息賞之濫分錢之弊以革欺幸而以其事與轉運司通治之如此則蜀民之困苦庶乎可以蘇也臣待罪言路既有得於人之言敢不亟以上聞然此其大略至於利害纎悉則願敕使者詳究焉元祐元年為侍御史二月上時按察川路茶法詔戶部郎中黃亷具利害以聞上哲宗論蜀茶劉摯臣伏見朝廷近罷市易事不與商賈爭利四民各得其業欣戴聖德無有窮已唯有益利秦鳳熙河等路茶場司以買賣茶虐害生靈又以茶法隱蔽市易販者百物州縣監司不敢訶問為害不細而朝廷未加禁止臣聞五代之際孟氏竊據蜀土國用褊狹始有𣙜茶之法及藝祖平蜀之後放罷一切橫斂茶遂無禁民間便之其後淳化之間牟利之臣始議掊取大盜王小波李順等因販茶失職窮為剽劫凶焰一扇西蜀之民肝腦塗地久而後定自後朝廷始因民間販賣量行收稅所取雖不甚多而商賈流行為利自廣近歲李把初立茶法一切禁止民間私買然猶所收之息止以四千萬貫為額供億熙河至劉佐蒲宗閔提舉茶事取息太重立法太嚴逺人始病是時知彭州吕陶奏乞改法只行長引令民自販茶每茶一貫出長引錢一百文得旨依奏民間聞之方有息肩之望又却差孫逈李稷入川相度始議極力掊取因建言乞許茶價隨時增減茶法既有增減之文則取息依舊由是息錢長引二説並行而民間轉不易矣而稷等又益以販鹽乃能增額及六十萬貫及李稷引陸師閔共事又增額至一百萬貫師閔近歲又乞於額外以一百萬貫為獻朝廷許之於是奏乞於成都府置都茶場客旅無見錢買茶許以金銀諸貨折博遂以折博為名多遣公人牙人公行拘攔民間物貨入場賤買貴賣其害過於市易又以本錢質典諸物公違條法欺罔朝廷蓋茶法始行至今法度凡四變矣每變取利益深民益困弊然供熙河止於四十萬貫其餘以供給官吏及非理進獻希求恩賞而害民之餘辱國傷教又有甚者夫逐州通判本以按察吏民諸縣令佐亦以撫字百姓而計算息錢均與牙儈分利至於監茶之官發萬馱即轉一官知縣亦減三年磨勘國之名器輕以與人遂使貪冒滋章亷恥不立深可痛惜又案盜賊之法贓及二貫止徒一年出賞伍貫今民有以錢八百私買茶四十斤者輒徒一年出賞三十貫文又遞鋪文字事干軍機及非常盜賊急腳遞日行四百里馬遞日行三百里違二日止徒一年今茶遞往還日行四百里違日輒徒一年立法太重茍以自便不顧輕重之冝蓋造立茶法皆傾嶮小人不識事體俱以逺民無由伸訴而它司畏憚不敢辨理是以公行不道自始至今十餘年矣蜀人泣血無所控告臣乞朝廷哀憐逺民罷放𣙜法令細民自作交易但收稅錢不出長引止令所在場務據數抽買博馬求勿失朝廷武備而已如此則救民於網羅之中使得再生以養父母妻子不勝幸甚如朝廷以為陜西邉事不欲頓罷茶事即乞先弛𣙜禁因民販茶正稅之外仍收長引錢一歲之入不下數十萬貫以見今長引錢數計之可見而商旅通行東西諸貨日夜流轉所得茶稅雜稅錢及酒課增羡又可得數十萬貫以未𣙜茶以前及𣙜茶後來年分自蜀至陜西沿路酒稅務歲課較之可見而罷置茶遞無養兵衣糧及官吏緣茶所費食錢息錢之類其數亦自不少則𣙜茶可罷灼然易見若異日西邉無事然後更罷長引錢如舊收稅而止然臣再詳師閔所營茶利雖使之裒斂一一如數止於二百萬貫無復贏矣若以前件茶引茶稅雜稅酒課利等錢約七八十萬貫折除止約有利一百二十餘萬貫若更除茶遞兵衣糧及官吏緣茶所費約三四十萬貫即是師閔百端非理凌虐細民止得八十萬貫前件兩項錢並且從小約計故師閔得利有八十萬貫若依實計之恐不及得此數假令萬一蜀中稍有飢饉之災民不堪命起為盜賊或如淳化之比臣不知朝廷用兵幾何殺人幾何可得平定今但得七八十萬貫錢置此不慮臣竊惑也兼臣訪聞陸師閔去年自成都移治永興仍取成都供給有本府衙前楊日新者為之賣酒至十一月中師閔自覺非法始移牒成都府止就用永興供給其違法差衙前賣酒及多請過成都供給即不曽舉覺其貪冒無恥一至於此亦乞令所差官便行體量如是詣實乞重行黜謫以慰逺方積年之憤貼黃陸師閔久擅茶事欺罔朝廷奏請如意為吏民所憚若留在本職雖特遣使命恐必難以體量實害生靈乞先罷師閔職任及利州路轉運使蒲宗閔昔同建議𣙜茶曽竊冒恩賞顯有妨礙亦乞指揮不得同簽書體量事所貴官吏不憂後害敢以實告元祐元年二月上時為右司諫詔以摯所論劄付黃亷其蒲宗閔仍不得預簽廳事上哲宗論蜀茶黃亷臣奉被使旨所至訪求利害至熟𣙜茶之法實有害於川陜之民蓋官司不原朝廷立法本意希功幸賞以得為多於是禁網滋繁百姓受弊陸師閔立法最虐故取利最多上纍國體下斂民怨中外臣寮所言茶事害民六科皆有事實若遽論之不若盡以豫民使園戶自賣商賈自販官收稅引及歇馱錢並復熙寧以前博馬之䇿無交易之煩無腳乘之勞抉去故敝一從私便無復可議若致詳於公私之際則先當議民其次商賈其次邉計利害各有所在也蜀民通患幣輕錢重商旅賫携息不償費若損榷茶盡豫商賈則百貨未能通流腳乘未能猝備非唯園民之貨鬱滯絶其資生之路若蕃市交易萬一不繼亦足以害經久之法今若捐十一州之茶與商賈仍以川陜四路及關中諸路與之則受茶之地宜若可以盡泄川茶以補蜀民久困而官以善價取雅州興元府所産以贍熙秦諸州酌中法以為邉備於理為可元祐五年二月上亷時為戶部郎中按察川路茶法亷至蜀先奏罷成都府博馬都茶場止令産茶州縣元置場處未置都茶場日前任便販賣從之上欽宗乞罷茶鹽𣙜法楊時臣伏覩陛下屢降德音欲盡復祖宗之舊崇寧紛更唯是茶鹽二法最為民害𣙜茶自唐末始有祖宗蓋嘗行之矣積年之久流弊滋甚仁宗詔有司會𣙜茶淨利均為茶租戶輸之弛其禁使自興販縣官坐收榷茶之利而民得自便無冒禁抵刑之患可謂公私兩利也當時詔書有曰私藏盜販犯者實繁嚴刑重誅情所不忍是於江湖數千里設穽以陷吾民也又曰歷世之弊一旦以除著為經常不復更制尚慮喜於立異之人緣而為姦之黨妄陳奏議以惑官司必置明刑以戒狂謬其訓告丁寧至矣固後世子孫所宜守也今茶租錢輸如故而𣙜法愈密是𣙜之又𣙜也二浙窮荒之民有經歲不食鹽者茶則不可一日無也一日無之則病矣昔時晚春採造謂之黃茶每斤不過三二十錢故細民得以厭食今買引之直已過數倍未有茶色民間例食貴茶而細民尤被其害行法之初裒刻之吏以配賣引數多為功茍冒恩賞其後以歲課最高為額上戶有敷及十數引陪費無慮十五六千則人不易供矣諸犯𣙜貨不得根究來歷自祖宗迄于熙豐未之有改也今茶法獨許根究盜販者皆無賴小民一為捕獲則妄引來歷以報私怨官司不敢沮抑追呼枝蔓狴犴充斥經時不能決良可憫也𣙜鹽自漢有之非一日也周世宗征河東河朔之民遮道訴鹽法之不便世宗會所得息均之人户從民願也熙寧中有議再𣙜者朝廷不行方神宗大有為之時凡可以益國而利民者知無不為以是為不可行則是終不可也今鹽息敷在人戶者亦輸之如故而又設官置司與它路等其為害深矣江浙有蠶鹽於春初均與之為蠶繅之用蠶熟以絹償之未為厲民也今蠶鹽不支而償絹不免則鹽之利入官已多矣山谷之民食鹽之家十無二三而州縣均敷鹽鈔民間陪費與茶引等官吏迫於殿最之嚴皆計口授之以充歲額人何以堪今朝廷不立歲額不比較歲課必虧使者持節一路豈肯坐視而恬不加察乎前此定賦之後蓋嘗不立額比較矣而歲額大虧鹽事監司切責州縣不覺察盜販致有虧欠州縣茍逭譴責不免敷配取辦雖名為不比較而比較之實仍舊也臣切謂宜一遵祖宗之法罷提舉茶鹽司使之自便無敷配之弊而人始受賜矣往時鹽息諸路所得各無慮數十萬緡以充經費故漕計不乏漕計不乏則橫斂不加於民而上下裕矣議者必謂罷茶鹽二法中都必至乏用臣切以為不然舊日榷貨務所積皆充御前用戶部所得無幾矣今陛下恭儉節用一毫不妄費焉用此物為哉兼𣙜貨務在祖宗時鹽鈔自有常數以備經費舉而行之兩無所妨陛下早降睿旨罷此二法以幸天下靖康元年上時為諫議大夫鹽法上仁宗論河北𣙜鹽余靖臣切聞臣寮上言禁𣙜河北鹽貨以收遺利者臣切以前歲事宜已來河北之民揀點義勇強壯及諸色科率數年之間未得休息臣常痛燕薊之地陷於北敵幾百年而民忘南顧之心者戎狄之法大率簡易鹽麴俱賤科役不煩故也昔者太祖皇帝特推恩意以惠河朔故許通鹽商止令收稅今若一旦𣙜絶價必騰踊民茍懷怨悔將何及伏緣河朔土多鹽鹵小民稅地不生五榖唯刮鹻煎之以納二稅今若禁止便須逃亡鹽價若高犯法必衆邉民怨望非國之福伏乞且令仍舊通商無輒添長鹽價以鼓民怨慶歷三年上時為右正言供諫職先是河北監務在滄濱二州歲課九千一百四十五萬以給一路自開寶以來聽人貿易官收其算為額錢十五萬緡上封者嘗請禁𣙜以收遺利靖奏入其議遂寢上仁宗論河北𣙜鹽張方平臣伏見河北諸州所産鹽貨自太祖開寶年降詔罷禁通商止令收稅于今多年民享其利昨聞臣寮擘畫欲𣙜買滄濱鹽入官召商旅入中邉上糧草算請且欲𣙜滄濱鹽即須禁止諸州小鹽不禁則侵官中課利若禁則十數州軍從此民必受弊何者河北一路除滄濱出鹽外其深冀邢洺等十數州地多鹹鹵不可耕殖民唯以煮小鹽為業衣食賦稅皆仰於此若禁斷一旦窮民失業散而為盜則所虞非細近因朝廷指揮下本路都轉運司相度事雖未行民心已致疑惑况本路諸色鹽官中久來各已定起稅額每年所入課利數亦不少今雖改用𣙜法或商旅未信不來算請所得年額未必增兼聞都轉運使魚周詢已條具利害論列亦云𣙜法不可行而止乞增稅臣切謂此舉於事體利害最大其臣寮所請𣙜鹽且乞停罷如朝廷已議不行猶恐彼處民或未知亦乞指揮下本路諸州軍告諭人民以朝廷今來比用舊例不復行禁𣙜之意使一方之人各安生業慶歷六年十一月上時為監察御史初王拱辰為三司使復建議悉𣙜滄濱二州鹽下其議於本路都轉運使魚周詢以為不可乃言商人販鹽與所過州縣吏交通為弊所算十無二三請勑州縣以十分算之聽商人至所鬻州縣並輸算錢歲可得緡錢七十餘萬三司奏用其䇿上曰使人頓食貴鹽豈朕意哉於是三司更立𣙜法而未下也時張方平權三司使見上問曰河北再𣙜鹽何也上曰始議立法非再也方平曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅錢而弛其禁世宗許之今兩稅鹽鐵錢是也豈非再𣙜乎且今未𣙜也而契丹常盜販不已若𣙜之則鹽貴虜鹽益售是為我斂怨而使虜獲福也虜鹽滋多非用兵莫能禁邉隙一開所得鹽利能補用兵之費乎上大悟方平曰宜語宰相立罷之不可自有司出也上大喜命方平密撰手詔下之河朔父老相率拜迎于澶州為佛老會七日以報上恩且刻詔書北京其後父老過詔書下必稽首流涕上仁宗論陜西鹽法乞仍舊通商包拯臣奉敇差往陜西與轉運使并范祥面議鹽法利害緣臣前任本路轉運使備知前來鹽法自慶歷二年因范宗傑擘畫禁𣙜之後差役兵士車牛及逐州衙前等般運鹽席往往州官自置場出賣以致兵士死損公人破蕩家業比比皆是嗟怨之聲盈於道路所不忍聞前後臣寮纍言不便乞復舊法通商以救關中凋弊有司執議終不施行昨因范祥再有起請兼葉清臣曾知永寧軍見其為患之甚因乞依范祥擘劃用通商舊法令客人於沿邉入納見錢收糴軍糧免虛擡貴價入中斛斗於𣙜貨務代支官錢兼寬得諸般差復勞擾此乃於國有利於民無害理甚灼然但以變法之初豪商猾吏悉所不樂而議者沿其歲入課利稍虧於前而橫有沮議乞復舊法若舊法誠善復之無疑但恐為害浸深耳且法有先利而後害者有先害而後利者若復舊日禁𣙜之法雖暴得數萬緡而民力日困久而不勝其弊未免隨而更之是先有小利而終為大害也若許其通商雖一二年間課額少虧漸而行之必復其舊又免民力日困則久不勝其利是先有小害而終成大利也且國家富有天下當持經久之計豈忍爭歲入數十萬緡不能更延一二年以責成效輕信橫議不唯命令數有改易無信於下而又騷擾四方使百萬生靈何以措其手足臣細詳范祥前後所奏事理頗甚明白但於轉運司微有所損以致異同耳臣固非憚往來之勞妄有臆説實亦為國家惜其事體不欲徇一時之小利而致將來大患臣欲乞候到陜西相度如沿路近裏州軍糧儲有備錢物可以那容得行新法公私未至大害其間有未便之事即與逐司將已前舊法與今來新法公共從長商量損益且令通行如沿邉糧儲闕乏公私為大不便即具畫一事狀乞朝廷詳酌施行皇祐元年十月上時為戶部副使先是御史何郯言范祥改鹽不便乞朝廷遣明幹臣寮一員往陜西令與本路轉運司并范祥面議利害如新法不可行即乞一切且令復舊於是遣拯至陜西益主祥所變法但請商人入錢及延環等八州軍鬻鹽皆量損其直即入鹽八州軍者增直以售上英宗乞減江淮諸路鹽價范純仁臣伏見江淮諸路鹽價太高致私販之人獲利轉厚及所立刑名亦重過於首賊而又不分強竊利厚則誘民犯法而刑不可禁刑重則民思茍免而竭力拒捕不分強竊則民知等罪而務結羣黨是致販鹽之人千百為羣州縣之力無能禁止若非朝廷别立法制則恐更相扇誘羣黨轉盛凶年飢歲遂為盜賊伏望聖慈指揮將江淮南荆湖福建等路官賣鹽價並比附兩浙體例逐斤減價出賣及令三司將私鹽條貫更行刪定分為兩等如持杖及不持杖十人已上即依舊條施行如不持杖不滿十人者並依空手竊盜法計贓定罪其贓各以逐處鹽價估定如此則法制平一民漸知禁治平三年正月上時為殿中侍御史上哲宗論河北𣙜鹽之害王巖叟臣竊見河北二年以來新行鹽法考觀其文纎悉皆具所以用意於國家收利於公上不為不至然立法之初必以謂官不勞而法可行民無苦而利可得臣今觀之大異於此運載之車名為和雇而郡縣鎮寨或無可雇者則不免有配車於上戶之擾主司移文則惟知和雇郡縣應辦則其實均科一歲之間或至數四其能勝乎載而至官官自賣之勢須凖留以備消耗故買者又不免有分兩不足之弊平日商旅通行隨力大小乘時輦置鹽亦有餘民間不知有闕絶之患今車腳既艱運載不續則又不免有時闕數謂之良法固如此乎臣竊度計議之人必曰止籠商賈之利以歸公家而無所增於民今則在在處處民間鹽價增貴一倍乃是既奪商賈之利又增居民之價以為息爾所以萬口咨嗟以謂不慣日食貴鹽如此又未嘗買之艱難如此也仍聞去城稍逺貧家下戶往往不復食鹽至有以鹽比藥之語夫增價於民而收息於官以為異效其誰不能雖十倍之亦無難也顧於百姓何如爾伏惟河朔天下根本祖宗以來推此為惠願陛下不以損於民為利而以益於民為利復鹽法如故以為河北數百萬生靈無窮之賜貼黃稱慶厯六年嘗有臣寮擘劃鹽法一嵗之間止舊數可增錢五十九萬二千八百餘貫利之所得可謂厚矣仁宗曽不以為意而惻然發德音云朕慮河北軍民頓食貴鹽可且令依舊至今耆舊言之往往流涕其勑書刻石於北京今録本上進庶幾陛下得見仁宗之意體而法之以益盛德為社稷無疆之休又稱慶厯六年鹽稅額止一十九萬餘緡今若依元豐六年未推行𣙜法以前嵗收鹽稅為額自巳三十三萬餘緡比舊亦增矣元豐八年十月上時為監察御史上哲宗論河北𣙜鹽之害王巖叟臣伏覩朝旨差范諤相度河北轉運使范子竒所奏乞令鹽稅收十分稅錢事臣昨在河北亦知商賈有自請於官乞罷𣙜買而願納倍稅者此蓋出於商賈患𣙜買之得其利而巧為此謀主計者但知能於商賈倍得稅緡以為利不知商賈將於民間復增賣價以為定也臣近因論河北鹽法𣙜買不便且録慶厯六年仁宗勑書繳進意謂得經聖覽不復更有此指揮今既未然理當再有論列伏以仁宗既不行三司𣙜買之法又不從都運司增稅之請直批云朕慮河北軍民頓食貴鹽可且依舊一言感人淪於骨髓刻之琬琰明若日星方是時計嵗所增幾六十萬緡仁宗豈不為公家之利博且久邪意以謂藏之官不若藏之民圖於近不若圖於逺故特捐數十萬緡無窮之息以為數百萬家無窮之惠嵗月雖舊而恩意則新今陛下即位之始正宜復以祖宗一言感恱天下豈宜以小利失人心也夫小利得之易人心得之難陛下豈不惜邪借此使者復命以增為可行陛下遂將用其言而增之邪然則如仁宗勑書之語自河而北人人共知不可違而違之如陛下名議何臣誠知陛下初無此心特為朝議者未之思耳且以利害義非善謀也以怨易恩非忠告也要之前日之德音不可忘今日之歡心不可失至理在目了無可疑臣乞罷諤勿遣特以慶厯勑書申諭言者以昭陛下惠愛之心以塞訃臣聚斂之意則不獨河北之人幸甚實天下幸甚元豐八年十月上上徽宗乞罷河北𣙜鹽上官均臣竊聞河北自來不係𣙜鹽地分周世宗初𣙜河北鹽世宗北伐父老遮道泣訴願以鹽課均之兩稅而弛其禁世宗許之今兩稅鹽錢是也嘉祐中三司使王拱辰乞本路𣙜鹽仁宗皇帝降詔曰朕不欲河北軍民頓食貴鹽詔書既下北京父老感戴聖恩聚僧道作道場七日至今碑刻詔文具在北京紹聖四年因宣德郎竇訥誣罔朝廷奏請𣙜鹽當時訥妻父宰相章子厚遂從其請施行巳及三年臣近緣使事經由河北州縣官吏皆以為自行𣙜鹽官中獲利甚少而民食貴鹽被刑出賞為害不少蓋河北淮南諸路如北京澶恩諸郡頗多鹵地既不可耕種係出稅賦又納鹽錢下戶貧民取煎小鹽貨賣供官贍家今來官中𣙜買既非竈戶不能剗取煎賣却依舊納稅更出鹽錢下戶轉見貧窘往往犯法一人冒禁纍及同保共備賞錢州縣督責雖明知貧乏以提舉茶鹽司按簿催促不免經年監錮貧民迫於衣食不足必至為盜兼詢得州郡自行𣙜鹽官中雖獲息錢然商賈稀少却有虧損稅錢去處通計一路就使息錢增多然民間鹽價比昔日倍貴又多伴和泥土烹煎不精至於犯法被刑督責賞錢為害不細兼河北係黃河行流人使經由道路每年人戶應副工役比於它路尤為勞費昨因大河移改決溢淹浸田廬又纍年飢荒流移餓殍人數不少今年稍得豐稔未便蘇息尤藉州縣官吏協力寬恤伏願陛下深飭有司考究𣙜鹽公私獲利多寡循守仁宗手詔德音罷去禁𣙜養貧乏寧固根本以副陛下惻怛仁民愛物之意建中靖國元年上時為給事中宋名臣奏議卷一百八
