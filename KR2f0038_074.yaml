body:
  text: 宋名臣奏議巻七十四宋趙汝愚編百官門致仕上仁宗論以禮法待君子吳奎臣伏以國家謹禮法以維君子眀威罰以御小人君子所顧者禮法也小人所畏者威罰也繇文武二選為士大夫是皆君子之地也儻不以禮法待之即是廢名器而輕爵禄也七十而致仕載之禮經臣下引年而自陳分之常也君上推恩而固畱權之至也自三代以來雖衰微之世未有不謹斯禮以塞貪冒聳廉隅也近者光禄卿勾希仲吏部郎中直昭文館陸軫等並以年髙特與分司初欲風動羣倫而在位殊未有引去者乞早以臣前所奏施行皇祐三年四月上時知諌院上英宗乞許張昪程戡致仕趙瞻臣伏聞國有大政必諮故老君所共事必任舊人是皆書傳據援歴代所尚至若田千秋乘小車入殿蔡義用兩吏持行斯漢史所最著者焉然於武昭之朝遇臣誠厚而若千秋及義則後世終不稱此為賢蓋於進退之分有所闕然也陛下自即大位已再周星將相大臣無不獲禮如張昪程戡屢上章䟽情皆懇到諫臣臺司亦嘗論列陛下皆未聽從此乃復見大漢之盛事矣然聖君之恩遇為已厚矣二臣之誠禮為已備矣天下臣子亦莫不知之矣今機務浩䌓邊防要重而陛下猶固留之非欲用之盖欲用名位寵禄以榮之爾曩者戡昪揚歴事任幸著聲迹帥府憲臺風望甚壯國家得人足備書録今乃於筋力衰朽之時當内外將相之任未即引退豈無虚曠使天下士大夫之論不以為是本欲榮之終為陷辱是陛下待賢者之意未深而爲老成之恵非至也今之臣僚上書求去或亦聊塞物議未能盡是本心士論之疑誰可曉也然則陛下獨有推恩之美而戡昪難逃持禄之迹惟陛下全二臣始終之善辨天下指目之謗遂其勤請成其令名實亦戡昪之幸莫大於此治平二年六月上時為侍御史上神宗乞致仕官給四分俸錢吕公著臣竊以古之仕者七十而致仕雖有不得謝者然年至而去實禮之常制蓋當其壯也既竭勤瘁以任其事故及其老也則使之優逸以終其身此君上之至恩而臣下之極榮也然自本朝以來凡致仕者雖例改官資或推恩子弟年及而願退者常少議者以疲癃老疾之人其精神筋力不足以任職則或至於蠧政而害民故著令應年及而不退者自知州以下皆降為監當然比年以來致仕者亦不加多矣昔為守倅而今釐務雖至愚之人豈不以為辱然所以被辱而不去者亦由朝廷立法有以致之何則古之為士者終身食其地今之致政者即日奪其廪古之仕者不出鄉里今則有奔走南北之勞古之仕者常處其職今則有罷官待次之費故自非貪吏及素有經産則其禄已常苦不足一日歸老則妻子不免凍餒是以雖廉潔之士猶或隱忍而不能去議者不推其本則曰此皆無恥之人宜思所以重辱之此朝廷之恩所以愈薄而臣下之節所以益壊也臣愚欲乞應文武官致仕非因過犯及因體量者並依外任官例與給四分俸錢歲時州郡量致酒粟之問如此則自非無恥之甚者莫不感抱恩德而争自引去矣朝廷優之如此而猶不能去則雖重辱之亦不為甚過也或曰今國用方患不足吏禄豈宜有增臣竊以為今日所議正為年及而不退者彼若年及而不退則其禄故未嘗絶如自此人多引去則今之去而受禄者乃向之不去而居官者也臣所論者其實國無所費而足以全遇下之恩臣無重辱而足以去瘝官之弊伏惟陛下方以至仁厚德風化天下則於優養耆老固所先務伏乞詳酌施行熈寧二年上時為翰林學士上神宗乞致仕范鎮臣請致仕已四上章歴日彌旬未聞報可縁臣所懷有可去者二不敢不陳臣言青苖不見聽一可去薦蘇軾孔文仲不見用二可去負二可去重之以多病早衰其可以已乎今有人言獻忠與獻佞孰是必曰獻忠是納諫與拒諫孰是必曰納諫是蘇軾孔文仲可謂獻忠矣陛下拒而不納必有獻佞以誤陛下者不可不察也若李定避持服遂不認母是壞人倫逆天理者而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求罷李大臨罷蘇頌諫院罷胡宗愈王韶上書肆意欺罔以興造邊事敗則置而不問反為之罪帥臣李師中及御史一言蘇軾則下七路捃摭其過孔文仲則遣之歸任以此二人况彼二人以彼事理觀此事理孰是孰非孰得孰失陛下聰明之主其可以逃聖鍳乎惟審思而熟計之朝廷所恃者賞罰而賞罰如此如天下何如宗廟社稷何至於言青苖則曰有效矣夫所謂見效者豈非嵗得緡錢數十百萬乎數十百萬者非出於天非出於地非出於建議者之家一出於民民出之而不巳則數嵗之後將如之何民猶魚也財猶水也水深則魚活財裕則民有生意養民而盡其財譬猶養魚而欲竭其水也今之官但能多散青苗急其期會者則有自知縣擢為轉運判官擢為提㸃刑獄急進僥倖之人豈復顧陛下百姓乎但知趨賞爾臣恐陛下百姓相濡於涸轍中矣陛下有納諌之資大臣進拒諌之計陛下有愛民之性大臣用殘民之術臣職獻替此時而無一言則負陛下多矣臣知言入必觸大臣怒則罪在不測雖然臣甞以忠事仁皇帝仁皇帝不賜之死才聴解言職而巳以禮事英皇帝英皇帝不加之罪才令補畿郡而巳不以所事二帝之心而事陛下是臣自棄於世也臣為此章欲上而中止者數矣旣而自謂曰今而後歸伏田閭雖有忠言嘉謀不復得聞朝廷矣所以上之決然不疑惟陛下裁赦乞早賜除臣一致仕熈寕三年十二月上時為翰林學士上神宗乞致仕吕誨臣本無宿疾偶值醫者用術乖方殊不知脉候有虚有實有逆順診察有標本治療有後先妄投湯劑率任情意差之指下禍延四支寖成風痺遂難行步非秖憚偏辟之苦又將虞心腹之變勢巳及此為之柰何雖臣一身之微固未足惜其如九族之託良以為憂是思逃禄以偷生不俟引年而還政熈寜四年五月上時王安石方用事更變祖宗法度誨屢諌不從病中上此奏蓋以身疾喻朝政也後七日誨卒上神宗論舊臣多求退楊繪臣竊見唐尚書左丞孔戣年及七十致仕得請韓愈上䟽言自古以來及聖朝故事年雖高但視聽心慮茍未昏錯尚可顧問委以事者雖求退罷無不畱止優以禄秩不聽其去以眀人君優賢貴老之道也禮曰大夫七十而致仕若不得謝則必賜之几杖及引詩云雖無老成人尚有典刑此言老成人重於典刑不可不惜而畱也臣竊謂孔戣年巳七十致仕得請愈猶以老成可惜而畱之則近日老舊之臣年未及七十而堅求休退者巳聼數人矣范鎭始六十有三而致仕吕誨約六十而致仕歐陽修六十有五而致仕冨弼年六十有八被劾後歸養疾司馬光王陶始踰五十雖皆未致仕而得閑散地雖彼數臣自以知止足為高節臣所疑何獨近來高者之多乎唐大中時吏部侍郎孔温業求外遷宰相白敏中顧同列曰吾等可少警孔吏部不樂居朝矣彼白敏中一庸相也尚能以賢人不樂居朝自警而況陛下以大聖之資孜孜求治而老舊之臣相繼有不待年而求去者乎老者退而少者進舊者逺而新者衆得不微軫於聖懐哉但恐訪於偏辭者則曰彼皆姦邪之人畏陛下之神眀而逺遁矣否則曰彼皆沮止新法者今新法旣巳便故皆羞忸而退矣臣願勿信於偏而少加警於聖慮則天下幸甚矣為國任臣之道惟其用之當而巳故無老少舊新之分也然而老而舊者常過於重謹而難以與變法少而新者常喜於進取而易以與作事臣以為二者之說宜參取之乃得其當若取之偏則少而新者可與圖其始之利而不肯慮其終之害老而舊者能防其終之弊而不肯謀其始之變若能用易於作事者俾圖其始之利而裁之聽難於變法者俾慮其終之害而防之則事得其宜矣古有云老者之知少者之決此之謂矣竊恐少而新者言其利則易從老而舊者言其害則難入而或有利十而害百者但聞其利不復聞其害焉民或被其害而無由上達矣熈寜四年上時為御史中丞䕃補上仁宗乞定文武䕃子弟人數孫沔臣伏覩國朝自景德祥符間屢行大禮旁流慶澤凡文資自帶職貟外郎武職自諸司副使巳上每遇南郊及知雜御史巳上逐年聖節並許奏䕃子孫弟姪雖推恩至深而永式未立今臣寮之家皇親母后外族皆得奏薦略無定數多至一二十人少不下五七人不限才愚槩居禄仕未離襁褓已列簪紳或自田畆而來或從市井而起官常之位巳著而僕𨽻之態猶存是則將國家有數之品名給人臣無厭之私惠故使父兄不知教訓子弟不修藝業俾之從政只以害民若不急為更張巳見積成弊倖欲乞今後帶職貟外郎正郎只許䕃叙一名子弟少卿給諌二人丞郎三人尚書四人僕射巳上五人致仕及物故各更與一名武職等次比類官品皇親母后之族及兩府大臣亦乞約立人數用分等級臣叨司遺事合舉大綱伏望聖慈特差近上臣寮定其乆制以為萬世之法慶歴元年上時為右正言上仁宗乞臣寮奏䕃親属以年月逺近為限何郯臣伏見朝廷以文武官入流無限審官三班院流内銓皆除注不行故甞詔羣臣博講利害以求省官之榮今選人改官巳増立年考胥史出職又議塞他岐唯貴勢奏薦子弟不加裁損則除弊之源有所未盡臣檢會文武臣寮奏薦親属條制文臣自御史知雜巳上武臣自閤門使巳上毎歳遇乾元節得奏親属一人諸路轉運使提㸃刑獄三司判官開封府判官推官郎中至帶館職員外郎諸司使至副使遇郊禋得奏親属一人揔計員數上自公卿下至庶官子弟以䕃得官及他横恩毎三年為率不減千餘人舊制須以服紀親疎等降推恩然未立年月逺近為限所以恩例頻數臣寮䕃補近親外多及疎属遂致入仕之門不知紀極漢法保任唐制資䕃本止及子孫他親無預又不著為常例今本朝沛恩至廣人臣多繼世不絶恩固甚厚然事乆則弊亦當改張以救其失臣欲乞今後文武臣寮官序合每歳遇乾元節得奏薦親属之人除子孫依舊外朞親候遇郊禋許奏一人其餘親属再遇郊禋許奏一人其官序毎遇郊禋得奏薦親属之人除子孫依舊外朞親候再遇郊禋許奏一人其餘親属候三次遇郊禋許奏一人如此等級裁減一年内可省入官數十人積年而計所省漸多則仕路之冗不澄汰而自清矣朝廷向來巳曾更改資䕃條制然而親子孫亦以限年釐革是致人心怨嗟遂即復故臣今所請以奏薦親疎為等降皆縁人情蓋人情於近親則恩甚厚於疎属則恩漸薄今旣許近親依舊制其疎属止以年月逺近為限不盡隔絶酌於衆心計亦無怨唯聖明斷而行之則官濫之源庶或可塞其邊臣及路分合得恩例即乞依舊如許施行仍乞候過今秋大享後為始皇祐八年上時為侍御史知雜事上仁宗論䕃補旁親之濫范鎭臣謹按唐制五品以上䕃孫三品以上䕃曾孫而無䕃兄弟叔姪之文今文官自知雜御史以上歳奏一人自帶職貟外郎以上三歳奏一人武官自横行以上歳奏一人自諸司副使以上三歳奏一人又無兄弟叔姪曾孫之品限而旁及疎從所以入流寖廣仕路益雜臣欲乞見任兩府聽䕃兄弟叔姪見任學士正任團練使以上比唐三品得䕃曾孫知雜御史正刺史以上比唐五品得䕃孫帶職員外郎諸司副使以上專得䕃子兄弟叔姪降曾孫一等曾孫降孫一等孫降子一等又歳奏一人與三歳奏一人自有京官試御齋郎之别武官亦如此欲乞歳奏一人者亦令三歳奏一人於所得官上逓加一等或二等以優異之若得奉禮郎大祝者與大理評事諸寺監丞之類議者若曰今自學士而下捨兄弟叔姪而專任子孫非所以廣親愛之道臣竊以為不然兄弟叔姪於公則刑不相及於私則財不相及著令因官置到資産不及兄弟叔姪至於朝廷爵賞則輕加之為不可也臣欲乞除品合得䕃外朝廷必欲徇其私愛加惠旁宗且令依舊奏補無使入流如有才藝自隨科目貢舉課試中科目者比類白身人優與推恩其無子孫者特聽奏旁親一人入流如此則下不失私親之愛上無冗官濫賞之弊嘉祐元年上時知諫院上英宗乞罷進奏補外親司馬光臣竊見諸路轉運使提㸃刑獄知州軍等各遣親属進奉至京師朝廷不問官職髙下親属逺近一例推恩乃至班行幕職權知州軍或所遣之人不係親属者亦應齋郎及差使殿侍此蓋國初承五代姑息藩鎭之弊故有此例後來人主嗣位之初大臣因循故事不能革正然以理推之國家爵禄本待賢才及有功效之人今使此等無故受官誠為太濫況近日官吏繁冗十倍於國初之時朝廷深知其弊所以數年前别定條例減省諸色奏䕃之數若進奏之人皆得一官則併又增數百入仕之人向來減省䕃奏委為虚設今縱不能盡罷此等恩澤其進奏人若係五服内親者或乞等授一官其五服外親及不係親属者並量賜金帛罷去庶幾少救濫官之失嘉祐八年上時知諫院宋名臣奏議巻七十四
