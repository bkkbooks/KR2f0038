body:
  text: 名臣奏議詔令奏議類二奏議之屬提要臣等謹按名臣奏議一百五十巻宋趙汝愚編前有淳熙十三年劄子稱嘗備數三館獲觀祕府四庫所藏及累朝史氏所載忠臣良士便宜章奏收拾編綴殆千餘巻文字紛亂疲于檢閲自假守閩郡輒因政事之暇因事為目以𩔖分次而去其複重與不合者猶餘數百巻釐為百餘門始自建隆迄于靖康推尋數月粗見本末若非芟繁舉要恐勞乙夜之觀欲更於其間擇其至精至要尤切於治道者每繕冩十巻一次投進又有淳祐庚戍史季温序稱其開端于閩郡奏書于錦城是其經厯嵗時屢經簡汱乃成是編故其去取頗不茍自稱上可以知時事之得失言路之通塞下可以備有司之故實其大㫖以備史氏之缺遺非夸飾也凡分君道帝系天道百官儒學禮樂賞刑財賦兵制方域邉防總議十二門子目一百一十四每篇之末各附註其人所居之官與奏進之年月亦極詳核其奏劄自序及史季温序皆稱名臣奏議而此本題曰諸臣奏議豈以中有丁謂秦檜諸人而改其名歟案朱子語録云趙子直要分門編奏議先生曰只是逐人編好因論舊編精義逐人編自始終有意今一齊節去更拆散了不見其全意矣云云今此集仍以門分不以人分不用朱子之説盖以人而分可以綜括生平盡其人之是非得失為論世者計也以事而分可以叅考古今盡其事之沿革利弊為經世者計也平心而論汝愚所見者大矣乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書宋名臣奏議目錄君道門君道帝學政體慈孝恭儉法祖宗用人廣言路勤政聴斷詔令風俗帝繫門尊號皇太后皇后皇太子嬪御宗室公主外戚天道門祥瑞災異百官門宰執侍從學士待制經筵臺諫給舍六部寺監館閣史官東宫官屬内侍三衙諸將帥臣奉使監司守令官制謹名器省官優禮薦舉考課重外官久任致仕辭䕃補戒敕辭免朋黨轉對見辭謝儒學門學校貢舉制科武舉學術釋老方技禮樂門郊祀明堂祖宗侑祀宗廟濮議褒崇先聖羣祀朝㑹臨幸宴饗喪禮諡法䘏典士庶五禮雅樂賞刑門賞罰法令禁約恤刑議獄赦宥錫賚財賦門理財稅賦寛䘏勸課營屯田荒政内帑封樁庫常平義倉茶法鹽法新法兵門兵議禁衛州郡兵民兵蕃兵馬政方域門宫禁都城河議營造邊防門遼夏青唐髙麗女真蠻猺盗賊總議門總議宋名臣奏議原序古之人臣所以告其君者不可得而詳矣考之於書臯陶之矢厥謨伊尹之作伊訓傅説之作説命周公之作無逸大抵皆後之諫䟽也至於君奭之篇所以告召公者既厯舉商之諸臣而又曰有若虢叔閎夭有若散宜生太顛有若南宫括併及乎周之賢臣而申言之葢古聖賢之相告相勉者無非以前聞人為法雖五臣之謀謨不可見以周公之言推之則遺風餘烈尚可想也漢興將相名臣議論務在寛厚意其當時蘭臺石室之所藏金匱玉版之所載一時名臣奏陳未必不萃此書降武宣以後博士議郎備中朝顧問應對者未聞舉一言以告其主宜乎武宣之治不能守髙文之舊若魏相條漢興以来賢臣賈誼鼂錯董仲舒所言奏請施行雖曰得國家之大體然考其時濫趙葢韓楊之誅開金張許史之漸宣帝雖以中興之君而為基禍之主烏在其為條陳故事也惟我國朝淳化懿綱逺接三代小臣不佞竊窺累朝國論則淳厚見於立國之初中正作於慶厯之際矯激起於熙寕之後方其淳厚也如太羮𤣥酒淡乎其味朱弦䟽越純如其音及其中正也則朝陽鳴鳳而見者歌舞法筵龍象而聞者作興至其矯激也則大冬嚴霜而松柏不彫驚湍駭浪而巨石不轉即諸臣之言以考一代之治雖醫者用藥各有不同而參苓烏喙皆足以收藥石之效故當時公道大行盡言無隠忠言極諌皆萃於朝流芳簡冊足以垂萬世之宏規逮夫紹聖以後議論一反一覆鉗天下以一人之口揜天下以一人之目而祖宗良法美意無復一存夫以先朝名公鉅卿章䟽聮篇累牘未易管窺然要其大綱則畏天命也法祖宗也恤人言也而或者乃以三不足之説反之遂使小人祖述其説以禍天下始作俑者未嘗不痛恨於荆舒也眀鑒之垂前車之戒凡有志於國家者其可捨是而他求哉先正丞相忠定福王趙公曩嘗編𩔖國朝名臣奏議開端于閩郡奏書于錦城亦巳上徹乙覧淳熙至今踰六十年矣蜀舊鋟本巳燬于兵公之孫尚書閣學必愿繩武出鎭嘗命工刋刻而未就適季温以臬事攝郡捐金命郡文學掾朱君貔孫繼成之念昔先大父薌室曾受忠定之知嘗同蜀之名流預討論之列今既遂尚書之志亦可發揚先祖舊事自兹家藏此書舉以告君推以治國以復我宋純懿之治猶有望焉詩云子子孫孫勿替引之尚二家臣子拳拳繼世之忠云淳祐庚戌立秋日朝請大夫權福建路提㸃刑獄公事兼本路勸農提舉河渠公事提舉弓手寨兵借紫眉山史季温序進宋名臣奏議劄子臣嘗讀漢魏相𫝊見相好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而巳臣竊惟自古以來凡有國家者莫不自有一代規模制度其事切於時而易行不必逺尋異世之法故相為丞相數條漢興以來國家便宜故事及賢臣賈誼鼂錯董仲舒等所言奏請施行之此最明於治體之要者也臣學術淺陋不足仰晞古人萬一然嘗備數三館獲觀秘府四庫所藏及累朝史氏所載忠臣良士便宜章奏論議明切無愧漢儒臣私竊忻慕收拾編綴厯時寖乆箧中所藏殆千餘巻而臣識性遲鈍不能強記每究尋一事首尾則患雜出於諸家文字紛亂疲於撿閲自昨蒙恩假守閩郡輒因政事之暇與數僚友因事為目以𩔖分次而去其重複與不合者猶餘數百巻釐為百餘門始自建隆迄于靖康推尋嵗月粗見本末上可以知時政之得失言路之通塞下可以備有司之故實史氏之闕遺然雖廣記備言務存聖代之典若匪芟煩舉要恐勞乙夜之觀臣欲更於其間擇其至精至要尤切於治道者每繕冩成十巻即作一次投進伏望時於閒燕深賜考詳庶因藥石之規能致涓塵之益然則臣身雖在嶺海猶如日侍冕旒之側也幸甚幸甚如䝉聖慈允臣所奏伏乞送尚書省劄付臣照㑹施行取進止淳熙十三年正月一日三省同奉聖㫖依奏進宋名臣奏議序臣竊惟國家治亂之原係乎言路通塞而已盖言路既通則人之邪正事之利害皆得以其實上聞人君以之用捨廢置罔有不當故其國無不治言路不通則人之邪正事之利害皆壅於上聞雖或聞之亦莫得其實人君以之用捨廢置不得其當故其國無不亂臣嘗以是歴觀前古上自周秦下及五季相望數千載間或治或亂俱同一轍然則天地之至理古今之常道無易於是矣恭惟我宋藝祖開基累聖嗣業深仁厚澤相傳一道若夫崇建三館増置諫貟許給舍以封還責侍從以獻納復唐轉對之制設漢方正之科凡以開廣聰明容受讜直海涵天覆日新月益得人之盛髙掩前古逮至王安石為相務行新法違衆自用而患人之莫巳從也於是指老成為流俗謂公論為浮言屏棄忠良一時殆盡自是而後諂諛之風盛而朋黨之禍起矣臣伏覩建隆以来諸臣章奏考尋嵗月盖最盛於慶歴元祐之際而莫弊於熙寜紹聖之時方其盛也朝廷庶事微有過差則上自公卿大夫下及郡縣小吏皆得盡言極諫無所諱忌其論議不巳則至於舉國之士咸出死力而争之當是時也豈無不利於言者謂其强聒取名植黨干利期以動揺上心然而聖君賢相卒善遇而優容之故其治効卓然士以増氣及其弊也朝廷有大黜陟大政令至無一人敢議論者縱或有之其言委曲畏避終無以感悟人主之意而獻諛者遂以為内外安静若無一事可言者矣殊不知禍亂之機發於所伏今尚忍言哉臣仰惟陛下天資睿眀聖學淵懿顧非羣臣所能仰望而若稽古訓虚受直言二紀于茲積勤不倦嘗命館閣儒臣編𩔖國朝文鑑奏䟽百五十六篇猶病其太略茲不以臣既愚且陋復許之盡獻其書萬機餘閒幸賜紬繹推觀慶厯元祐諸臣其詞直其計從而見効如此熙寜紹聖諸臣其言切其人放逐而致禍如彼然則國家之治亂言路之通塞盖可以鑒矣臣不任惓惓之誠臣趙汝愚謹序
