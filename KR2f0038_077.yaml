body:
  text: 宋名臣奏議卷七十七宋趙汝愚編百官門轉對上英宗乞令朝臣轉對司馬光臣竊見祖宗之時纍曾令朝臣轉對或遇災異更廣求直言真宗咸平景德之間詢訪尤切其詔書云涉詆訐者固可優容乏詞藻者許其直致是時羣臣上書言事者日不下百餘封每戒敕閣門令疾速進入詔樞密直學士馮拯陳堯叟令詳定以聞所以然者不唯考時政之得失亦以觀羣臣之能否也是故太宗時得寇凖真宗時得張知白皆上書言事驟加擢用後為宰相俱著名跡景德元年六月內出朝士邉肅等二十四人姓名令於崇政殿引對在外者驛召赴闕其後稍稍進用多為名臣此皆近事可法者也陛下踐阼未久羣臣能否恐未遍知欲乞依祖宗舊制每遇內殿起居日常令朝臣兩人轉對其餘在京及外處臣寮有欲上書言事者所在官司皆不得壅滯彼必欣然承命各竭所懷然後陛下親加省覽必有所得若上書者稍多陛下不能一一遍觀即乞擇近臣識慮明逹用心公正者二人先次看詳但求道理切當不取文辭華美分為數等各以貼黃節出事宜置之於前然後奏御陛下更以聖意擇其善者特令引對靣加詢訪若實有可采其所言之事即為施行仍於禁中籍記姓名每遇有重難公事試委之幹辦俟果有㓛效乃加進用如此則天下之才盡在目前可以器使雖堯舜之世嘉言罔攸伏野無遺賢亦不是過也不然若但循故事止作虛名所上之書未必省覽雖復省覽亦無施設則無益於事不如不為也治平二年上時知諫院上英宗乞降詔令臣寮各上封事及依次轉對范純仁臣近日曾上封奏乞降詔令兩制及三司副使已上臣寮逐員各上封事及諸司主判常參官等依次轉對至今不䝉施行伏惟陛下臨御方初天下延頸企足觀望聖化正宜博覽羣䇿通逹下情使四方之利病必聞羣下之能否皆見然後可以布順民之政恢太平之風固不當以聽覽為煩而以多言為厭也况自古昔有敷奏以言之法官師相規之誡瞽為詩工誦針大夫規誨士傳言皆所以深采羣言禆助時政之道也近世則有百寮轉對之法本朝纍聖悉曾行之非臣至愚獨有是說伏望聖慈體明目逹聰之道念羣情壅蔽之弊將臣所奏付中書門下檢㑹施行則天下幸甚治平三年上時為殿中侍御史上神宗乞因轉對召訪以事閲其能否楊繪治平四年十一月四日詔曰朕惟眇德初踐丕圖欲躋方夏於已安浩若巨川之未濟聰明所及固不能燭萬事之幾夙夜雖勞將何以救羣元之失煢然在疚殆此淹年顧善化以寖微懼皇猷之弗嗣遂緣象緯之發欽承譴告之仁氣焰感通陰陽愆繆星文屢變地震不寧切聞成王畏天之明深嘉大禹拜言之美咨爾羣辟夙夜公朝特舉舊章俾從轉對尚慮盈庭之士未知側席之懷宜立明科庶來讜議其或補朕躬之遺闕針時政之靡臧斥有位之阿私糾在朝之朋比述為邦之急務貢禦敵之密謀通人情壅蔽之端救民力困窮之弊以至臺省之職崇嚴而吏道日濫賦入日增而國用日虧或變風俗之澆訛或駮刑名之得失或議當今之所尚或陳往事之可懲號令有所未孚恩澤有所未究並宜極論式副明揚多文者無闊於事情寡詞者直述而已播告中外咸體至懷其令御史臺每遇起居日令百寮轉對臣竊以人君之所難者其惟知人乎人藏其心非察其言之可采必觀其行必試以事然後其才能可得而用矣虞書曰萬方黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸此之謂也恭以百寮轉對不行者十數年陛下即位首復其事此真明目逹聰兼視廣聽之術也然而止取其名乎將取其實乎如取其名則書之史冊傳之四方亦足以為美矣如取其實則今之轉對者前一日入奏於上閣至其日再拜於上前而退則所奏之事有可採者或假手於人若因而進用之則僞濫者何由而旌别乎欲乞先觀其言設有可采即於轉對之時召而訪以事閲其能否真僞之狀既審其可用仍未可以言而遽進之先命之以事而觀其才用之實而擢於位如此則敷奏以言明庶以功車服以庸之典復仃於今日熙寧元年上時知諌院上神宗乞收百官轉對封章留中採擇王存臣竊觀陛下自初即位憂勤庶政率祖宗故事詔百官以起居日轉對德音丁寧為首務者補聖躬之遺闕針時政之靡臧斥有位之阿私糾在朝之朋比推至誠來讜議追夏禹拜言之美此甚盛德非羣臣所能當然自降詔書四年於兹轉對者固多矣未聞有一言能開悟聖聽一事有推行於時者豈言盡不足采其事皆不足行邪昔之人君有謀事而當羣臣莫能及退而有憂色曰以吾議於朝而羣臣莫能及吾國其殆哉今在廷之臣言事四年而卒無可采者其為朝廷所宜憂逺矣使萬一其言有可收録而不見省焉則所以丁寧而求者恐乖至誠之道也陛下萬幾之繁百官封事固難悉覽頃令館閣臣寮分閲屬近臣看詳而總擇其可否此乃陛下謹於聽納不以獨見為明然議者猶以為可否羣臣之言當在人主宜非臣下所得預也今又不然罷近臣看詳而悉付中書執政之大臣中書執政之大臣未必得暇盡覽則屬之掾屬掾屬又未必能詳擇乃間委外廷之臣使之可否迭為重輕羣臣誠淺薄不足以仰望清光在陛下聽言之體為輕矣古之聖王詢於芻蕘而擇狂夫之言者豈謂芻蕘狂夫其慮有過於聖王哉所以博詢兼聽而來善言者也夫善言者非言之為難得其所以言為難也故信而後諫可以言而後言誠使自處如此者轉對於廷其言有深切至當而陛下聽覽有所未至例出其封章可否於公府之掾屬下及外廷之小臣則彼以為愧悔莫甚為後來者孰肯勵精竭誠輸切至之言哉且人臣進言莫不希人主一省而有懼後患之心如知陛下不必親覽而悉送中書則孰補聖躬之遺闕針時政之靡臧知其言必暴於公府掾屬外廷之臣則孰敢斥有位之阿私糾在朝之朋比若是則詔書所求者殆為虛語耳伏望陛下收百官所上封章取其補聖躬針時政斥阿私糾朋比者留中採擇須付外者刋其姓名自餘建言功利非干大體者擇兩制近臣看詳可否其言果有便利於時者付中書施行使中外曠然知陛下前日之詔書出於至誠雖小善畢來而無所厭薄則必有忠誠切至之言繼此而言矣臣疏愚不識忌諱惟陛下留神裁察熙寧四年上時為史館檢討知太常禮院上哲宗乞復轉對曾肇臣伏覩令文臣下得言時政闕失公私利便者臣聞帝王即位之初必有以順天下之心答中外之望其為之有序在知其要而已伏惟皇帝陛下仰承顧命而履天下之尊太皇太后陛下俯徇權宜而議軍國之務此正華夏蠻貊洗心注目顒顒觀聽之時也端本謹始實在今日臣愚輒不自揆敢布腹心伏惟留神聽察幸甚臣伏覩先帝嗣位以來憂勤恭儉日謹一日神功聖德充塞天地固非臣言所能髣佛也陛下繼之承之任大責重然四海之廣萬事之煩億兆之衆不可家至而人接之則欲逹天下之情成天下之務豈有他哉在廣言路爾言路廣則人人得盡其情人人得盡其情則上無不聞之事下無不通之志政令之得失百姓之休戚羣臣之忠邪賢不肖雖在四方萬里之外陛下不出户庭不降几席可以周知而備見矣然後察政令之得者則力行之彌綸未至者則損益之百姓之所願欲則與之百姓之所疾苦則除之顯忠而去邪任賢而退不肖夫然故上澤得以下及下情得以上聞百官有司奉法遵職貴者不以崇髙而敢肆賤者不以踈逺而敢欺陛下深處法宫之中端拱無為而天下治矣夫任已聰明則其察愈詳其蔽愈甚因衆之聰明則所視者逺所聽者周故先王設進善之旌立敢諌之鼓陳誹謗之木又使瞽獻書師針䏂賦蒙誦工諫近臣盡規親戚補察彼豈聰明之不足哉知任已不如任衆也舜之繼堯所守一道然舜初受命則闢四門明四目逹四聰以謂繼治世者耳目尤不可以不廣故也三代以還咨詢訪納固非一途然近世之所嘗行祖宗之所已試則命百官轉對實今日之要務也昔唐太宗初即位延見羣臣或論往古成敗或究民間利病每言及稼穡艱難則上下相規務遵勤儉言及閭閻疾苦則君臣感歎議息征徭故能創業垂統成貞觀之治下至代宗每於紫宸聽朝常限三人奏事敢言者賞其盡規不言者責其隱默故陸贄以謂諫雖未從且不深忤情茍有阻終獲上通周世宗即位之始亦延羣臣使陳當世之務故能外强兵威內修政事而顯德之政獨髙五代先帝熙寧之初亦詔百官咸以次對故事不逺行之非難此臣愚惓惓所以有望於陛下也今學士大夫布滿周行人有所懷皆願自竭但慮詢求之末廣聽納之未至爾陛下沛然發德音下惻怛之詔使之極言無有忌諱則孰不踴躍奮勵各罄所知以補聰明之萬一哉陛下察其言之當者納之用之而勸之以賞言而未當或過於訐直者寬裕包涵而不加以罪非但舉空文循故事而已如此則四海之內知陛下有好問之美有聽言之實忠謀讜論日聞於上而阿諛壅蔽之私不得行矣天下之情孰有鬱塞而不伸天下之務孰有怠廢而不起者哉故臣愚過計以謂今日之要務未有易此者也至於廣收骨鯁敢言之人充耳目之任敇左右侍從之官責以論思獻納是皆朝廷之所素講不待臣言而悉者也伏惟聖慮深逺無所不周如臣賤微不識大體顧以世荷國恩兄弟皆蒙先帝不次收採不勝犬馬之私貪於自效愚者千慮兾有一得冒進狂瞽干犯典刑惟陛下察其用心而赦其僣易不勝幸甚元豐八年四月上時為户部郎中上哲宗乞審議轉對之制范百祿臣恭聞太祖皇帝建隆三年詔自今每五日內殿起居翰林學士及文班常參官轉對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦咸採訪以聞事有要切者許非時詣闕上章不得須候次對既又命尚書省集官議其可者而行之為民求治之心可謂至矣真宗皇帝詔有司録轉對章疏一本留中聽言擇善之志可謂勤矣祖宗之於轉對其勤且至如此今一歲之中視朝有數臣寮轉對者每次二員凡不過十餘人借使人悉知而言言皆見用亦不過十數事耳臣竊惟太皇太后陛下皇帝陛下固常有太祖為民求治之心真宗聽言擇善之志然於此事今昔有異心跡未侔補闕拾遺必在旁通於衆志博覽兼聽未能全美於前聞臣雖甚愚竊惜言路之未廣而恐人情之恬默茍有所聞則積為蔽塞伏願陛下法堯之詢於衆蹈舜之取諸人使四目盡明庶言必逹則時政之得失可以周知朝廷之急務能無小補刑獄寃濫百姓疾苦必無壅於上聞而有禆於聖德矣孔子曰四方有敗必先知之斯可謂民之父母茍不周咨於人言物論何以臻兹伏望宸慈詔執事審議轉對之制率由太祖真宗之舊章則天下幸甚元祐六年八月上時為翰林學士兼侍讀上哲宗乞詔天下皆得直言及百官次對曾肇臣聞自昔有為之君欲以收攬威柄修立政事一新海內之耳目則必公聽並觀大開言路使朝廷得失民情利病百官忠邪賢不肖畢聞於上然後虛心審察揆以古誼參以時變出於天下之公而無悖於前可施於後者則斷而行之出於一人之私而於前為無稽於後為有弊者則絀而不用以此經綸天下之務酬酢萬物之變故能所為必成所欲必獲古之興王所以功施一時澤及後世未有不出於此者伏惟皇帝陛下躬至德開大明方且夙寤晨興以總攬權綱更革時弊為志然後發德音下明詔使人人得直言時事無有所諱以廣聰明以通壅塞正在此時而中外寂然未聞有所咨訪此臣之所未喻也論者或曰方今宇內無事朝廷清明陛下循守舊章足以稱治尚何事於言哉臣竊思之斯言過矣何則舜之繼堯無異道也方堯老而舜攝固也闢四門明四目逹四聰及其命九官則天地人神草木鳥獸之政無所不舉而終之命龍作納言蓋雖舜之盛德又當極治之世所以通天下之情者猶不敢不以言為急又况德未臻堯舜之盛世未若唐虞之治者乎惟是臣下用事則或蔽於自私而惡聞其過於是多為關防杜塞言者指鯁言正論為矯激以循默取容為忠厚此則任事者之所便非朝廷之忠計也昔漢宣帝之初上書者皆為二封領尚書者先發副封所言不善屏去不奏及魏相執政白去副封然後天下之情無不上聞宣帝所以知人疾苦成中興之功魏相所以總領衆職號稱賢相者能去壅蔽故也陛下無有為之志則已茍有志焉而不廣開咨詢訪納之路臣未見其可也臣愚欲願陛下明詔天下皆得直言又詔百官使以次對諭以至誠求助之意責以盡忠無隱之誼其言而有益則不惟納用且加以賞言而亡益則一切包容置而不問如此則逺近之人知陛下有求言之實有聽言之明孰不感激奮勵應上之求哉雖然四海之大士民之衆不必人人皆知義理方陛下虛已下問之時豈無乘間投隙以姦言私說惑亂聖聽者此則在陛下聽納之際有以辨之而已孔子曰將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈孟子曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮孔孟所以知言用此而已蓋人之以言接於我者不能使之齊而能使吾不為彼之所惑者辨之有道故也辨之有道則雖姦言私說雜陳於前安能移我之意哉茍畏其惑亂而遂廢咨詢是何異憂噎而廢食也臣愚待罪從官轉徙五郡道路傳聞皆謂陛下聖質髙明濟以果斷其志將以有為於天下日夜傾耳以聽德音而久之未有所聞輒因賜對首敢以是為獻伏惟留神采擇紹聖元年閠四月上時除知杭州過闕上徽宗乞修轉對之制詔百官民庶極言時政曾肇臣伏讀詩書見周成王即政之初咨嗟求助至於再三羣臣進戒亦皆至誠懇惻無所諱避然考其時猶在除喪朝廟之後及康王嗣立自乙丑至癸酉才九日而君臣更相訓告如恐不及夫詩書所載固非空言而康王纍然在喪服之中上下相飭如此其急豈非天位至重守之至難祗畏恐懼尤在其始故雖宅憂之際虛心納善亦不敢以已乎恭惟皇帝陛下聰明恭儉天質夙成孝友慈仁形於言動自出居邸第雖未有所施為而天下稱頌以為賢主及踐阼數日弛張廢置出於獨斷者莫不曲盡物情大慰民望則又天下歡呼以為英主此誠宗廟社禝之福夷夏生靈之慶也然臣以謂四海之逺非一人視聼之所能周萬幾之衆非一人思慮之所能給必須合天下之目為之視合天下之耳為之聽合天下之心為之思慮如是則陛下不視而明不聽而聰無思無為而天下治矣夫為此者非他在開言路而已言路開則上無不聞之事下無不逹之情以之振舉敝壞蠲除疾苦考核能否判别忠邪唯陛下之所欲為無施而不可也昔者以舜繼堯所守一道然猶明四目逹四聰及禹繼舜亦拜昌言在漢宣帝始親政事則詔民上書去其副封以防壅蔽唐太宗初即位孫伏伽以小事諫太宗厚賜勉之以誘言者至於本朝可謂平治而祖宗以來數詔百官使以次對神宗舉而行之於熙寧之初以興起事功為後世法臣願陛下逺觀舜禹成康之所行近迹神考之故事修轉對之制下不諱之令明詔百官下及民庶使得極言時政無有所隱然後陛下擇其善者而行之且報之以賞大則加以爵秩小則豫之金帛其言不足採若狂妄抵牾者一切置之不以為罪庶以鼓動天下敢言之氣紓發鬱堙壅塞之情當今先務無大於此願陛下亟行之元符三年二月十九日上時為中書舍人上徽宗乞因日食命百官轉對江公望臣伏見神宗皇帝即位三月即詔內外文武羣臣直言時政至十一月再下詔書每遇起居日輪百寮轉對當是時日食來年正旦故神宗寅畏天威咨詢闕失以圖消伏以廣聰明甚盛德之舉也今連年日食皆在正陽之月考之前志殆非小變陛下去歲已嘗下詔求言獨轉對之制闕而未講臣愚伏望因兹薄蝕特降德音每遇起居日輪百寮轉對庶幾上䖍天戒之丁寧下通人情之壅塞以追先志以廣聖德因之修舉故事正在此時伏乞留神詳察速賜施行建中靖國元年四月上時為左司諫見謝辭上仁宗乞許邊臣過闕朝見韓琦臣竊見朝廷近來每於外任就移臣寮往㳂邊委寄任使內有路由京師經過者多是陳乞朝見例各不䝉允許豈非朝廷以乞朝見者只是欲陳乞恩澤希求錫賜遂一例不允其請只令將所見入遞以聞臣竊以臣寮久在外任必有素藴兾得一望清光開陳本末理既周盡事必易行陛下若因而勉之責其效命則必挺身忘死思有以報陛下寵遇之厚若或别有陳乞亦在朝廷詳其可否必不容其僥幸况今西陲設備之際以此移赴邊任臣寮自當詔令入對慰而遣之豈有邉臣到闕不靣天顔使其自陳猶行沮遏甚非國家撫御將帥之術也臣欲今後就移邊任委寄臣寮因經過到京乞朝見者並賜恩許若因此妄有陳乞即繫在朝廷斷在不行豈可防小故而失於大體臣兼聞見有新差知渭州張元經過到京纍狀陳乞朝見未見俞㫖亦望特賜允可寶元二年上時為右司諌供諫職上仁宗論張耆等乞免衙謝辭賈昌朝臣伏見護國軍節度使兼侍中張耆赴河陽武勝軍節度使髙化赴相州乞免衙辭河陽節度使楊崇勳復平章事乞免衙謝兼聞上件官等並乞只於後殿見謝辭者按近制臣寮見謝辭並合在前殿仍詣正衙除假故外若事急速或許於後殿或免過正衙並繫臨時特㫖耆等位為節制久去朝闕辭見不由前殿出入不詣正衙或扶以拜君或揖而受賜既稱衰病且冒寵榮雖聖上眷待老臣特推異數猶宜避免以示恪恭豈可輒上奏封自求優便今國家外扞邊冦方任武臣所宜並示恩威不可專用姑息仍恐文武臣寮自此更輕慢朝廷之儀慶歷二年五月上時權御史中丞詔自今應臣寮入見并辭謝如值假故不御前殿即依舊制並放外若事急速許令後殿見謝辭及放正衙並繫臨時特降朝㫖即不得輒自上章陳乞仍榜示朝堂上仁宗論乞上殿三班外亦聽諫臣求對錢明逸臣伏見閣門儀制每日上殿不得過三班緣三司開封府日有公事上殿外只有審刑院或大兩省班次即其餘並皆隔下且諫臣職在諫諍大抵言朝政得失詔令賞罰稍稽頃刻則事涉已行隨而更張國體非便欲乞今後諫臣有本職事求對雖已有三班外亦聽上殿敷奏慶歷四年十二月上時為右正言供諌職上英宗乞復知州人上殿吕誨臣聞漢宣帝拜刺史守相必親見問觀其所繇退而察其行以質其言有名實不相副必知其所以然斯最切於治道也國朝故事親民官通判以上擬任先引見仍於中書呈身替還知州許上殿言利便三事乃察言觀行之體也比來引見呈身如故但未嘗親問中書不閲實言利便三事亦皆罷之天下郡守不得人者十五六豈聖朝求治之意哉踈逺之臣有終身不得近清光伸一言以紓素藴者欲君臣之道相屬上下之誠相接不亦難乎臣欲乞今後凡除擬知州人引見日令上殿親有所問審察其人仍俾中書閲其可否然後授之以任替還依舊許言利便三事因而總核必得其實治平二年十一月上時知諫院兼侍御史知雜事詔自今鄭兖曹蔡襄邢同青夀胡明宣河中等知州府辭見許上殿上神宗乞察官依諫官例登對張戩等臣等每有本職公事欲上殿敷奏必奏候朝㫖既許上殿伺候班次動經旬日儻遇朝廷政或闕失及外事有聞係於機速不容後時者如此稽遲則已無所及况使往復待報必由中書萬一事干政府則或致阻抑耳目之司雖欲應急陳聞安可得也伏覩天禧詔書或詔令不允官曹涉私措置失宜刑賞踰制誅求無節寃濫未伸並委諫官奏論憲臣彈舉是蓋臺諫之職言責既均則進見之期理無殊别何獨憲臣隔絶疏異欲乞朝廷推原天禧書詔之意使依諫官例牒閣門即許登對或所言急速仍乞先次上殿所貴遇事入告無憂失時熙寧二年十月戩與程皓同為監察御史上詔三院御史及裏行有公事並許直申閣門上殿上哲宗乞令臺諫先次上殿朱光庭臣竊以事之機密者不可以口陳心之精微者固難以書盡夫天下之廣萬幾之繁其間情僞萬狀取舍兩塗一失其當咎緣而生朝廷增置諫員實司陛下耳目之任凡天下之事無不得言者若忠賢之未進姦佞之未除刑賞之失中政令之違常如此之類皆得以聞上使之日對清光獻納論奏尚虞未盡况天門九重邈若霄漢儻令祗上封奏不得靣覩威顔則事之機密心之精微何緣盡逹伏自陛下臨御以來除執政外餘皆未許上殿臣遂於去年十二月內奏乞上殿至今未奉俞音兼臣或聞故事改元後許令臣寮上殿今已改元矣望出自宸斷檢㑹故事早賜指揮令臺諫先次上殿上以廣陛下之聰明下以盡愚臣之職事貼黃伏緣增置諫職蓋欲廣陛下之聰明豈有不許上殿之理竊慮姦臣故為壅蔽使天下之事不得一一上逹伏望聖慈特賜明察元祐元年正月上時為左正言上哲宗乞令臺諫先次上殿孫覺臣昨自先帝祔廟後曾具劄子乞賜指揮許臣寮奏對庶幾人情不至壅隔至今未奉聖㫖竊以人情壅隔則乖離疑惑之患生假竊盜亂之禍作於易乾下坤上為泰泰者上下交而其志同也坤下乾上為否否者天地不交而萬物不通也今者皇帝陛下太皇太后陛下大統萬國天臨四方即位以來且一年矣羣臣望清光聆德音者三省樞密院大臣八人而已使此八人者聰明有餘論議皆當中立而無所附麗方正而無所阿私可也萬有一人焉不足以任此而曲折反覆不可以見於文字而御史不得請對諫官不得面陳則陛下何由而知之且諫官之設本以拾遺補闕為任密啓面陳乃其職也今一切須具章疏劄子然後可得上聞則與夫百執事等矣伏望聖慈特許諫官御史上殿奏事貼黃臣竊以諫官御史陛下耳目之所寄今者久未指揮許令上殿則若自蔽其聰明深恐小人因之得志肆行而無所忌憚伏乞早降指揮臣竊以太皇太后皇帝陛下臨御以來執政官外未曾引對庶寮臣以為今日之執政亦前日之庶寮也豈可謂庶寮之中德性才器皆出執政之下乎臣以為因其上殿奏事知其才能短長亦可以備他時揀拔任使元祐元年二月上時為給事中上哲宗乞依舊制許臣寮上殿蘇軾臣謹按唐太宗著司門令式云其有無門籍人有急奏者皆令監門司與仗家引奏不許關礙臣以此知明主務廣視聽深防蔽塞雖無門籍人猶得非時引見祖宗之制自兩省兩制近臣六曹寺監長二有所欲言及典大藩鎮奉使諸路出入辭見皆得奏事殿上其餘小臣布衣亦時特賜召問非獨以通下情知外事亦以考察羣臣能否情僞非茍而已伏見陛下嗣位以來唯執政日得上殿外其餘獨許臺諫官及開封知府上殿不過十餘人天下之廣事物之變决非十餘人者所能盡若此十餘人者不幸而非其人民之利病不以實告則陛下便謂天下太平無事可言豈不殆哉其餘臣寮雖許上書言事而書入禁中如在天上不加反覆詰問何以盡利害之實而况天下事有不可以書載者心之精微口不能盡而况書乎恭惟太皇太后以盛德在位每事抑損以謙遜不居為美雖然明目逹聰以防壅塞此乃社禝大計豈可以謙遜之故而遂罕與羣臣接哉方今天下多事饑饉盜賊四夷之變民勞官冗將驕卒惰財用匱乏之弊不可勝數而政出帷簿决之廟堂大臣尤宜開兼聽廣覽之路而避專斷壅塞之嫌非細故也伏望聖慈更與大臣商議除臺諫開封知府已許上殿外其餘臣寮舊制許請間奏事及出入辭見許上殿者皆復祖宗故事則天下幸甚元祐二年五月上時為翰林學士知制誥兼侍讀上哲宗乞依天聖舊制引對臣寮孫升臣愚不肖伏䝉誤恩再玷言職夙夜思念恐無以塞責而孟子以謂敬其君莫如陳堯舜之道伏蒙二聖臨御以來仁厚之澤結於人心微如蠢動逺暨幽荒莫不愛戴鼓舞自三代以來未有如今日之治臣竊以謂至治之世銷患於無形居安慮危防微杜漸正在今日夫堯舜以聰明文思濬哲文明之德而必曰明四目逹四聰又曰稽於衆舍已從人者廣耳目以防壅蔽也壅蔽之傷國其患為大陛下深居九重仰成輔弼一日萬幾之微四海九州之廣天下之利病生民之休戚安危治亂之所係茍睿智未達則耳目安得不廣而壅蔽之患安得不防也天聖垂簾聽政未久臣寮上殿並如常儀今二聖臨御五年矣而此制缺未講中外竊有疑焉士大夫懷忠抱義欲望簾幃披瀝肝膽有不可者四海九州之利病休戚陛下有不得聞者壅蔽之患不可不防治忽之機不可不戒伏惟太皇太后睿智燭理可洞判於羣言皇帝陛下聖德日躋宜習聞於庶務收天下之耳目以為聰明兼四海之見聞以資聽覽此堯舜之所先而聖政之不可後也伏乞明詔有司依天聖舊制引對臣寮並如常式實堯舜之所先明目逹聰之舉也伏望聖慈少留聽焉天下幸甚元祐四年上時為殿中侍御史上徽宗論减罷監司守臣上殿曾肇臣聞朝廷政事以民為本與民親者莫如逐路監司及州長吏祖宗以來常重其選故監司辭見皆得上殿而州長吏人數猥多不可人人延見則擇其州之要重繁劇與夫沿邉守禦之地為長吏者則許上殿舉天下之大無慮三百餘州而長吏得對清光親承訓敕者不及百人不為多矣近者伏覩詔書知州軍辭見合上殿者减罷其半於半之中又減朝辭上殿者二十有二州其辭見得上殿者才二十有三州而已紹聖四年文臣一路兵鈐及監司職任並須上殿指揮又罷不行臣愚竊所未諭也夫祖宗必令監司知州軍上殿者豈茍然哉視其貌則疲癃老疾無所掩與之言則能否邪正莫能欺因此以察執政用人則精粗得失無不見矣為監司長吏者受命而行躬聞德音則人人曉逹上㫖有所遵守政成而歸親面天顔則人人各述所知口陳指畫而上下之情無有不通者矣非獨如此躬親庶政收攬威權者人主之大柄延見臣下咨詢不倦者人主之盛德祖宗以來所以不憚日昃之勞不厭應接之煩蓋有以也今陛下初即寶位方當勵精為治日接羣臣以廣聰明以通衆志之時而遽有此變更臣愚竊恐四方聞之或意陛下倦於咨詢或意陛下略於待士而為監司長吏者亦將茍且因循無自勵之志非所以崇美德興治功也夫自古帝王有志於治者未嘗不廣延羣臣博問兼聽而於治民之官尤所注意在漢宣帝每拜刺史守相輒親見問觀其所繇退而察其行以質其言有名實不相稱必知其所以然嘗曰庶民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎故西漢二百餘年獨宣帝世循吏為盛漢之刺史即今監司之任也漢之守相即今知州軍之任也宣帝所以綜核名實為漢賢王其本在此以陛下明聖方將興建德業比隆三王如宣帝所行為之甚易臣愚欲願陛下近守本朝成憲遠稽漢宣帝故事出自聖意申命輔臣自今監司知州軍辭見上殿並如舊制內監司及帶一路兵鈐仍依紹聖四年指揮其餘則依今年六月十六日詔書施行所貴上循祖宗之典下貽子孫之法其於政體蓋非小補惟陛下留意毋忽天下幸甚元符三年七月上時為翰林學士宋名臣奏議卷七十七
