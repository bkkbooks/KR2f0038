body:
  text: 宋名臣奏議巻二十三宋趙汝愚編君道門詔令下内降上仁宗論干求内降乞降詔止絶韓𤦺臣竊以國家祖宗以來躬決萬務凡於賞罰任使必與兩府大臣於外朝公議或有内批指揮皆是出於宸衷只自章獻明肅皇后垂簾之日有奔競之輩貨賂公行假託皇親因縁女謁或於内中上表或只口為奏求是致僥倖日滋賞罰倒置法律不能懲有罪爵祿無以勸立功唐之斜封今之内降臺綱寖壊為害至深陛下聖徳日新厲精為治惟此乆弊沿而未除臣竊謂固非陛下聖恩聽其妄請必謂付外之後自有攸司執奏而止其如中㫖或至再三不容一一論正臣欲乞特降詔今後除諸宫宅皇族有已分事方許於内中奏陳自餘戚里之家及文武臣僚或有奏請事件並於閤門及合屬去處進狀更不於内中批㫖輒敢因緣請託及自於内中請乞特批指揮即望降出姓名并為奏求人送有司勘劾重行貶責犯者斷在必行如此則聖政無私朝規有叙寳元二年五月上時為右司諫上仁宗乞止絶内降包拯臣竊見天聖中凡有内降莫測夤緣盡由請託蓋傾邪之輩因左右之容假援中闈乆瀆聖化洎陛下親攬庶政首革兹弊僥榮濫賞人不能以倖求頃年以來此路寖啓妨公害政無甚於此臣欲乞今後應中外之人隂有交結冒請勞效以圖榮寵或比緣罪犯茍希横貸伏望聖慈特降指揮止絶如更妄有陳乞並令中書樞密院三司開封府等處詳定先降指揮依公執奏毋得阿徇上累明聖皇祐二年八月上時為天章閣待制知諌院至九月即因明堂别為手詔禁内降私謁與赦文俱下手詔見後曽肇所陳八條之内上仁宗乞謹守杜絶内降詔吳奎臣伏見陛下十數年以來每降詔令及所行事為横議所移或姦謀所破中外不甚為信以此皆謂陛下言之雖切而不能行行之雖銳而不能久也自明堂下詔杜絶内降忠賢莫不増氣群小莫不革心願陛下謹守前書堅於金石雖甚寵愛之人如敢私撓必加之罪如是則太平之風有望於兹矣皇祐三年十月上時同知諌院上仁宗論傳宣與内臣轉官二府不執奏乞正其罪范鎮臣伏見近降指揮今後傳宣除依得法律賞罰外餘並仰中書樞密及所屬官司執奏今月十八日一日之中内臣無名改轉者凡五六人俱是過恩不合法律中書樞密院大臣並不執奏臣竊謂陛下近降指揮可為萬世法曽未一月而大臣輒廢不行大臣在陛下左右號稱執政而廢法如此欲法行四方安可得哉夫天子之言出而為令大臣廢令在法不赦伏乞明正中書樞宻大臣之罪以示天下使人知陛下之法不可輕廢至和二年二月宰臣劉沆面奉徳音傳宣内降其當行者自依律賞罰外餘令二府及所屬官司執奏三月入内副都知任守忠等九人並遷官故鎮上此奏時知諫院上仁宗論法令數變范鎮臣伏見今月十三日殿直寄班鄧維一為私役兵士修屋致屋倒壓死兵士進呈特勒停京西路編管經恩未得叙用十五日傳宣與免編管其法令數變如此又道士李可壽本初與三司吏人陳知深善及陳知深犯贓李可壽轉託鐵佛寺僧初不知情巳従重斷李可壽因緣内降遂不問罪其法令不當如此所有鄧維一乞依前降指揮依前編管李可壽亦乞依法施行以絶姦倖今一殿直一道士至㣲賤者而能闗通中禁變陛下法令大臣不能奏論後有大於此者將如之何伏乞陛下與大臣更相飭厲設張紀律無使小人數變法令則天下幸甚至和二年上上仁宗論内降指揮差臺官勘張懐恩等事馬遵臣竊聞有内降指揮差臺官吳中復往澶州取勘張懐恩李仲昌修河不公等罪事従中出不知所來内外聞之無不疑駭何則従來仲昌等妄違朝㫖輒壊河事枉費財力罪固不輕朝廷雖行降責而臺官累有彈奏乞寘重典尋有指揮止令今赦未叙而巳各人降官巳經數月未知今者陛下聖聽得於何人而有此特㫖向者臺官力言而不用今以或者之言而行之既差臺官推勘而又監以内臣是臺官未足取信於陛下也中書者陛下執政之司事無不總疑則勿用用則勿疑今差臺官置詔獄出於内降而中書奉行文書初不預議執政之任豈如是乎是中書亦未能取信於陛下也中書者陛下腹心之地臺官者陛下耳目之司所以倚責而成治也若陛下外疑耳目内疑腹心内外交疑而無所倚責臣恐聖慮日勞而多門之弊或生於其間矣然則刋章飛語之事或可緣間隙而興優游無為之治未可以嵗月期也可不惜哉李仲昌等雖法外重行正合臺官前日之論無可議者臣今所言蓋為國家政體惟陛下財擇嘉祐元年九月上時為右司諌同前係第二狀馬遵臣近為朝廷差臺官置獄一出内降指揮國柄動揺物議騰沸臣以當職兩具奏封尋以齋宿行事未敢繼陳章削干黈旒之嚴如聞内臣傳宣催促繼有降文字付吳中復等中外聞之寖以喧駭何則朝廷賞罰自當公行禮曰爵人於朝與士共之刑人於市與衆棄之皆謂公也今仲昌等二小臣犯法非急切幾事若陛下聞之語言見之文字即宜付外施行若謂巳經中書則宜移之密院何煩内降文字駭物情而損國體哉緣内降之弊害政之大者皇祐明堂之後嘗有特詔止絶天下歌舞流為頌聲今陛下享壽昌之慶行恭謝之儀肆赦改元新天下之耳目豈可却行弊事壊皇祐之成憲取吏民之深譏哉若習以為常行之不巳臣恐時事日多聖心日勞非所以成簡易之法取康寧之福也然則威權可易紀律可隳自古亂階由此途出漢唐不逺厥鑒甚明不可不深思不可不熟慮伏望陛下博采公議特出英斷追改前敇以李仲昌等文字付外施行若謂已經中書即乞改付密院仲昌等茍有深犯自存嚴科如此則獄合乎大公而一代之典可用權綱歸乎至正而多門之弊不生制治保安實由此路嘉祐元年九月上上仁宗論内降指揮差臺官勘張懐恩等事趙抃臣昨自四月至七月累次論奏李仲昌等脩河敗事乞重行貶黜雖朝廷量與責降然亦未快羣議陛下采收下情憫傷重役將窮究仲昌等罪狀正國家之典刑宣諭中書輔臣行之可也若事有干涉付樞密院治之可也柰何一旦事従中出差一臺官以訊劾之遣四内臣以監視之纔及數日之内三出内降文字張皇大獄中外驚駭外議以謂初發二小臣之罪者誰為奏陳今起二小臣之獄者孰與評議所可惜者國體之重不詢於公卿大臣政事之權乃付之宦官女子至於政府見如此等事始不預議終無執持將順奉行焉用彼相臣恐斜封墨敕之弊不足罪於昔時告密羅織之風復基禍於今日矣臣愚伏望陛下特賜指揮追還内降之命檢㑹臺官并臣前後論奏仲昌等章疏詳酌重行貶竄如此則朝廷綱紀不遂隳壊人情物論庶無憂疑也嘉祐元年九月上時為殿中侍御史上仁宗乞執奏干求内降并根究因縁干請之人歐陽修臣伏見諌官陳旭起請僥求内降之人委二府劾奏干請者之罪䝉朝廷依奏施行尋聞李璋因内降責罰自後罕聞敢求内降以希恩賞者以此見至公之朝必信之法可以令行而禁止也然旭所請只為恩賞一端而小人僥求無所不至臣自權知開封府未及兩月之間十次承准内降或為内官及干繫人吏等本府毎具執奏至于再三而干求者内降不已至於婢妾賤人犯姦濫等事亦敢上煩聖聰以求私庇宦𥪡小臣自圗免過反彰聖君曲法之私雖有司執奏終許公行然小人干求未有約束止絶臣今欲乞今後應有因事敢干求内降者依舊許本府執奏外更乞根究因緣干求之人奏攝下府勘劾重行責罰如本人自行干請者亦乞一就勘鞫加元犯本罪二等斷遣其情理稍深及干求不已者亦許本府一面牒報御史臺彈糾勘劾施行所貴止絶小人干亂公朝敗紊綱紀嘉祐三年七月上時以翰林學士權知開封府上仁宗論内臣梁舉直事封回内降歐陽修臣勘㑹本府見勘内官梁舉直公事兩曽執奏三准内降特與放罪臣伏見近年權倖之臣多是公然作過不畏憲法恃干求内降紊亂綱紀所以前後臣寮累具論述陛下特降明詔許承受官司執奏不得施行布告天下著為信令今梁舉直累煩睿聴干求不已本府遵依前後詔敕再具執奏未許公行伏以曲庇小臣撓屈國法自前世帝王茍有如此等事史冊書之以著人君之過失今梁舉直不欲受過於身寧彰陛下之過舉直此罪重於元犯今縱未能法外重行以戒小人干求内降者其元犯本罪豈可曲恕舉直茍為愛身之計不思愛君之心乃是小人全無知識爾如臣忝被恩寵列於侍從職在獻納合思裨補豈可阿意順㫖為陛下曲法庇縱小臣以彰聖君之失其内降臣更不敢下司謹具狀繳連進納嘉祐三年上上仁宗乞止絶内降凡進用悉與大臣議其可否傅堯俞臣竊聞近日内降指揮樞密院除何誠用帶御器械尋有臣僚上言遂罰誠用事有不便諌臣輸忠天髙聴卑遽行追寢上下之分交得中外之心相慶然臣猶有所未諭者伏以内降之名古今以為非是陛下不窒其源乃制防檢付之有司既而輒復違之須人言而後止在納諌之美則曠古無並於剛一之徳固未為増益伏望自此凡左右敢以私事干陛下者乞従睿斷根逐嚴加貶責果陛下所欲進用者不必従中降㫖於視朝之際與大臣公議可則行之不可則罷之不使如誠用事數暴於人聽則陛下日月之明無分毫之累矣臣孤拙無狀荷陛下任使思以塵露粗裨海嶽幸不以人廢其言深留聖慮則不勝幸甚嘉祐六年十一月上時為監察御史裏行上哲宗進仁宗朝戒飭内降詔書事迹乞禁止請謁曾肇臣伏見太皇太后陛下皇帝陛下自臨御以來正身率下杜絶請謁裁抑恩倖凡自内出無非徳政未嘗以私撓公以人亂法親戚近習斂袵安分退就繩墨朝廷清明紀綱肅然論者以謂秦漢以來母后共政未有若斯之懿非二聖一心秉誼克已何以致此謂宜終始守之貽則萬世而近日以來頗有干求内降特與差遣者雖其事至微未足仰累二聖大公至正之盛德然竊恐僥倖之人乘間伺隙轉相拔援煩瀆聖聴雖二聖天地之度坦然無私但慮左右干祈迫切不免曲徇其意杜漸防微宜自今日此臣之惷愚竊抱惓惓愛君之心傾竭肺肝庶有補於萬一也臣竊觀前史伏見仁宗在位四十餘年下詔書約束臣下干求内降令中書樞宻院如内降與臣僚遷官及差遣者並具條執奏以聞推劾干請之人明正其罪下御史臺閤門牓諭仍著為法丁寧懇至出於誠心當時羣臣亦每以禁止内降為言輒見納用故一時朝廷號為肅清雖間有干請而不能虧損聖政者上下維持之力也大抵人情茍務便私樂於僥倖此門一開浸滛不止始自一二至於三四至於五六漸無紀極則國家名器繇此輕矣朝廷百度繇此隳矣其源至小流弊至大此臣之所大懼不得不為陛下極言之也且朝廷爵祿有限人之私欲無窮茍不持之以公因緣請託將至於不勝其煩陛下亦將厭之矣伏望聖明不以臣言為狂妄試加省察若有人材可用或聨近親出自聖意欲與恩澤者自可明諭輔臣度其所宜公行除授其餘一切禁止無得私請仍詔輔臣如有内降與臣僚遷官及差遣者並執奏以聞推劾干請之人明正其罪下閤門御史臺常加覺察牓諭朝官使人明知上意如此則聖徳日新朝無粃政邪枉之門塞公正之路開逺繼祖宗之明實社稷無疆之福也臣備位侍従以論思為職竊有所懐不敢隠黙謹并錄上仁宗朝緣内降戒飭詔書事迹凡八條别為一通伏乞置之座右少助省覽元祐三年八月上先是内降左班殿直錢珏特差幹當牛羊司内殿崇班劉言特差幹當翰林司肇上此奏時為中書舎人詔書八條具列于後天聖九年十月詔曰朕遵列聖之謀荷慈宸之教于兹八載雖至小康而搢紳之間名節罔勵致臺文之上奏謂吏議之不容矜勞者掠巳以近名希進者行險以徼寵詆誣執政干撓有司分屏翰者或奏請之靡厭主按察者或寛縦之為得貪而無恥姑務營私老而非賢曾不知退繇㢘恥之未飭致風化之靡醇臨朝以思於朕何望用稽彛訓申儆羣倫茍少冒於官箴將自投於公憲布告遐邇體朕意焉侍御史知雜事劉隨言近年内外庶官多營求内降公行請託至有涕泗上前以希恩澤者請指其事以申戒之故降是詔明道二年四月詔比來臣僚宗室外戚命婦多以進納為名干祈恩澤自今非著例一切罷之凡表奏毋得緣親戚投進禁中事有傳宣令有司實封覆奏内批改官及與差遣未得即行委中書樞宻院審取處分天下毋得創修寺觀所進乾元節香合及山儀並停罷惟功徳表疏聽附驛以聞例有賜者令内東門司取㫖康定元年十月詔如内降指揮與臣僚遷官及差遣者並令中書樞密院具條執奏以聞慶厯四年十二月諌官余靖言太常博士王翼西京按事回上殿求改章服請自今臣僚入對有輒求恩澤者令有司劾其罪從之慶厯六年四月權御史中丞張方平言中書樞宻院比嵗以來除授多預批聖㫖俟半年或一年後與轉官或改職且遷除之體率有常規若因勞賞擢之不次孰曰不然事出僥倖縱賒嵗月曷厭羣議譬之賈人交易於市作為契券立時待價非惟滋長濫恩實亦有虧治體請自今文武官輒依前比而希遷改者並明行責降従之皇祐二年九月賜中書門下詔曰朕躬庶政之機持大公之柄而比有憸幸肆興妄圗或違理覬恩或負罪希貸率求内出間亦奉行蠧政虧風莫斯為甚雖屢頒於詔約曽未絶於私求兼慮臣庶之家貴要之列交通請託巧詐營為隂致貨賕宻輸珍玩夤緣結納侵撓權綱矧宗祀之㳙成屬祥釐之均被嘉與中外絀此非宜勉於自新以底于治自今内降指揮仰中書樞宻院并所承受官司執奏毋得施行敢以貨賂結託貴近者令諌官御史劾奏之先是上謂輔臣曰比有貴戚近習夤縁請託以圖内降雖頗抑絶然未免時有侵撓可於赦文中禁止之庶澄清宿弊示信天下輔臣等對曰陛下躬行大祀以新庶政闢至公之路杜私謁之蹊實天下幸甚然載之赦條恐未盡聖意上乃别為手詔與赦同降嘉祐二年八月知諌院陳升之言比日内降營求恩賞者多雖許執奏而有司時有奉行自今請令中書樞密院推劾以正干請之罪從之嘉祐二年十月鎮海軍節度觀察留後李璋罰銅三十斤初璋求内降轉官而為知諌院陳升之引近詔劾奏也上哲宗論李倬妄干求内降挾私罔上劉安世臣近以幹當内東門李倬得内降指揮欲置啓聖下院常住白地以為墳塋而衆僧列狀陳訴以謂倬之所請皆非白地事屬欺罔不可滋長遂具論奏乞行按劾比聞已有朝㫖前降指揮更不施行而倬挾私罔上之罪未覩推治竊縁賞罰之柄實繫國體欲使信於天下要在行以至公議有未安固難緘黙再黷宸聽必冀開納臣竊謂倬陳請之日若使陛下知其竹林園木萬數浩瀚生者有居室死者有墳墓必不至徇其私謁輕降玉音良由倬志在茍得熒惑天聽致朝廷命下之日違咈人情存者不得寧其居葬者不得安其地玷累盛徳咎皆自倬書曰宥過無大刑故無小蓋偶然罣誤情在可矜雖曰大過亦可全宥其或心無忌憚故犯典刑事雖細微必寘於法此乃三代堯舜以來不易之道也今倬妄干中㫖飾詐欺君罪實故為情無足恕萬一聖度赦而不誅臣恐異時更有甚於此者然則何以詰之伏望陛下心存去惡事戒履霜無牽近習之私不惑衆多之口罷倬近職付之有司劾其誕謾重行降黜庶使綱紀修舉姦邪知畏元祐四年上時為右正言上哲宗論李倬妄干求内降挾私罔上係第二狀劉安世臣近嘗論奏李倬挾私罔上僥求中㫖乞付有司按治其罪今已累日未覩施行檢准元祐編敇節文傳宣或内降若須索及官司奏請雖得㫖係元無條制者並隨事申中書省樞宻院覆奏取㫖臣竊謂倬之所請出於一時固非常法若執政承受上件聖㫖自合依條覆奏或再得指揮許令施行亦合子細契勘有無違礙今倬志在茍得罪實欺君三省奉行初不勘當使國家命令之下違咈人情生者不得寧其居𦵏者不得安其地原倬之犯雖無足赦亦大臣奉法不謹之過也臣謂祖宗以來亦有内降之事茍人情有所未便公議有所未安當時輔弼往往執而不下著之信史皆可稽考臣竊謂人主之徳多尚仁恩或有請求難於面折但以其奏付之外廷若大臣守法而不回則私謁雖多而無患蓋不違其請足以示聖王之仁斷之於公足以嚴朝廷之政如此則恩歸於上而法行於下矣臣愚欲望陛下威克厥愛逺自近先正倬罪以示無私然後明敇三省樞密院今後内降指揮並令勘當若於法無違於民無害仍煩覆奏方得施行所貴紀綱全宻杜絶僥倖元祐四年上時為右正言上哲宗論内降乞有司執奏李常臣愚不佞熈寧中常預編中書條例伏見仁宗皇帝屢詔中書欲令内降三省執奏及未得便令行下如此之𩔖指揮不一臣方是時竊怪詔㫖重複如此細詳仁宗聖意蓋為非時内降亦有不得已而出者正賴臣僚執持覆奏以拒止之也又竊見杜衍為宰相凡内降積至十數連封而面還之仁宗嘗謂諌官歐陽修曰外人只知杜衍封還内降吾居禁中有求恩澤者毎以杜衍不可告之而止者多所封還也其助我多矣伏以太皇太后陛下皇帝陛下臨御以來内降恩澤幾於屏絶一以至公待天下未嘗以私恩加親黨内外臣庶之所共知而歌詠矣近日李倬乞買白地事臣竊料陛下以白地為小事或不得已而許之事無小大孰為得已要在有司執守法度如杜衍之事仁宗可也臣以謂遇人以恩者人主之事也守法盡公者人臣之事也人主之恩有不得巳而降㫖臣下可不守法度而執奏耶買白地事曽不聞反覆執奏而遽行之曽不根究為何地而遂不省察也今據僧人所陳乃有墳墓及竹木園菜圃李倬妄以為白地固當深治凡今後可不務於懲止哉伏望聖慈特詔有司應内降並須反覆執奏或理當奉行必先取索圓備詳究可否於詔條無害於物情無妨乃得行下如此則人主之恩自全而臣下獨當執守之責矣元祐四年上時為御史中丞上徽宗論内降指揮不可直付有司曽肇臣伏見陛下即位以來更張政事除民疾苦開廣言路收拔滯淹毎一令之出内外無不驩呼相慶以至未明求衣辨色臨朝躬親聽斷夙夜不懈推今日欲治之心為之不已太平之功指日可待然臣竊有所見不敢緘黙臣待罪右省伏覩内中時有批降指揮除付三省樞宻院外亦有直付有司者雖陛下睿明必無過舉然忖之事體終有未安蓋帝王號令不可輕出必經中書㕘議門下審駁乃付尚書省施行不經三省施行者自昔謂之斜封墨敇非盛世之事神宗皇帝正三省官名其意在此臣愚伏願陛下凡有指揮須付三省樞宻院施行更不直付有司以正國體其三省樞宻院若奉内中批降指揮亦須將前後敇令相㕘審度可否然後行下不可但務急速奉行以為稱職蓋三省樞宻院皆執政大臣陛下委以平章政事之人其任非輕不同胥吏但以奉行文書為事帝王號令務要簡大若夫立法輕重委曲關防皆有司之職非人主之務書曰文王罔攸兼于庶言庶獄庶慎惟有司之牧夫蓋謂此也至於内外臣寮干求内降恩澤侵紊綱紀増長僥倖以陛下明聖必不容許臣亦不復以為言更願陛下戒之謹之嚴行杜絶無使小人乘間得入天下幸甚元符三年上時為中書舎人上徽宗乞法仁宗下詔禁絶干求内降曽肇臣伏見仁宗皇帝在位四十二年屢下詔書約束臣下干求内降令中書樞宻院如内降與臣寮遷官及差遣者並具條執奏以聞推劾干請之人明正其罪下御史臺閤門牓諭仍著為法皇祐二年因祀明堂肆赦嘗諭輔臣曰比有貴戚近習夤縁請託以圖内降雖頗抑絶然未免時有侵撓可於赦文中禁止之庶澄清宿弊示信天下時輔臣對以載之赦條恐未盡聖意乃别為手詔與赦書同降蓋仁宗之仁如天於人之欲有不能違然一切徇情則侵紊紀綱虧損刑政故令執政大臣具條執奏人主致恩人臣守義上下維持交相儆戒又令推劾干請之人明正其罪則人自不敢因縁請託故一時朝廷號令肅清間有干請之人輒為諌官御史所劾仁宗雖有不忍人之心而終不至於優柔牽制者其術蓋出於此也恭惟陛下天姿寛仁正身率下論者謂有仁宗之徳夫寛則無所不容仁則有所不忍臣愚竊慮内外之人因此有干祈陛下雖正身于上而迫於請禱無以却之執政大臣又或不能一一執奏日積一日則侵紊紀綱虧損刑政其為禍患有不可勝言者矣臣愚伏願陛下監觀仁宗所以防制左右杜絶恩倖之意特下詔書戒飭内外之人不得干求内降如有内降指揮非憲章所存者令執政大臣具條執奏推劾干請之人明正其罪仍責諌官御史常加覺察牓諭朝堂著之于法使内外明知聖意所在如此則聖治日新朝無粃政小人安分於私室請謁不行於公家以成陛下寛仁之徳以稱陛下正身率下之意垂之萬世貽訓子孫豈惟天下之幸實社稷無疆之福也惟陛下裁擇元符三年十月上時為翰林學士兼侍講上徽宗乞今後内降所屬無得輒受任伯雨臣聞外議皆言近日内降頗多下至僧人恩澤開封府大理寺所勘公事往往指揮釋放此言虛實雖未可必萬一果有而陛下不知則九重深逺詐傳敇命俯仰之間所繫不輕若止因左右懇求陛下寛仁不得巳重違其意則干亂政刑此風不可滋長且鴻都賣爵墨敇斜封皆出漢唐季世不可不戒昔仁宗慶厯亦嘗有之宰相杜衍不肯奉行毎積至數十即面繳納仁宗嘗謂侍臣曰外人秖知杜衍封還内降不知朕以衍不肯而拒之者過於封還也又嘗内降開封府吏扈玉遷職一等尚美人遣内侍韓從禮傳教㫖免工人市籍府判龐籍奏其事仁宗立命杖韓從禮詔今後内降無得輒受以此觀之所司守法自當執奏臣伏願陛下降臣劄子付三省宻院指揮所屬去處今後内降無得輒受此亦仁宗皇帝故事如此則僥倖干求庶幾息矣建中靖國元年上時為右正言上欽宗論御筆中㫖余應求臣伏覩近年以來凡有中㫖皆降御筆施行期限嚴促稍有稽違寘以不恭之罪三省有司奉行不暇雖有違戾法憲前後重複者不敢執奏或被受即行不申三省事之甚微亦煩宸翰其始因中人領事内中奏陳而為之其後士大夫倚中人以進欲興功利而於法不可者亦為之最後執政大臣或行事有戾於法或差除不允僉議或爲親知私謁干請者亦為之由是號令日紊綱紀日壊矣夫三省宻院是之謂朝廷陛下與謀議大事出命之所也人君擇賢而任之固當委以庶事若宰執不才易之可也豈有自攬細務悉降御筆而可以為治哉陛下初政清明委用宰輔宜無此弊然竊聞尚有臣僚直達奏陳内中批降施行者此與前日御筆何異哉臣以謂内侍與臣僚所陳獻利害措置事宜皆可付三省樞宻院商議進呈取㫖而行庶幾不戾於法憲不惑於異同人主大權不移於下可以杜多門之政可以絶近習僥倖之原政事之大無先於此惟陛下裁擇靖康元年上時為監察御史上欽宗論御筆手詔不由三省而下者取㫖方行許翰臣聞天下之法當與天下共之有司守之以死雖天子不得而私也而後天下之大公始立比年以來有司阿意撓法以徇一時是以條約文具而不守伏願陛下明詔内外今後指揮若有害事病民違戾條制並令有司具條執奏御筆手詔不由三省而下者官司被受審覆取㫖乃得施行必使法嚴信如四時而後令一而民定可以立政矣靖康元年二月上時為御史中丞宋名臣奏議卷二十三
