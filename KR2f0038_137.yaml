body:
  text: 宋名臣奏議卷一百三十七宋趙汝愚編邊防門遼夏九上神宗論种諤擅入西界劉述臣昨以种諤不稟朝命擅興兵馬城西界綏州有違誓詔為國生事曽具奏聞乞并同謀人枷送下獄從朝廷差官制勘依軍法施行續又奏薛向楊定張穆之髙遵裕王中正輩表裏相結誑惑聖聰妄興邊事乞行根勘以正典憲未蒙朝廷盡理施行臣伏思之陛下新紹大統方在亮隂之中所賴者兩府大臣協心畢力修輔庶政以安民心以固根本至於疆場之事尤宜戒飭帥臣講信修睦撫寧遐荒而乃輕用姦臣之言遽議用兵之䇿失信於外國結怨於邉民而况關陜之西比年飢饉民力凋弊國帑空虛自寶元康定以來人間瘡痍尚未全復今又使之奉期會之役供倉卒之求彼獨何以勝其苦哉故臣慮有不堪其憂者也又風聞每於中書南廳會議其間多顧避形迹不務昌言或各持巳見靡從正論至有纍日不能決者夫軍國之事常有緩急若機會一失則如奔川逸驥弗可救止今兩府大臣依違如是使之適變而應猝豈不殆哉昔唐太宗謂黃門侍郎王圭曰近日中書所行詔敕頗有意見不同互相是非或有茍避私隙相惜顏面知非不正遂即施行惜違一官之小情偽為萬人之大弊此實亡國之道也隋內外庶官正以依違而致禍亂茲誠人主獨見事機委任責成之先務也臣愚欲乞陛下面戒兩府今後並須戮力一心堅守正道凡所議事皆當原始要終不可偷為一切以貽久逺之患詔旨有所未便亦須據理執奏毋事循默仍乞密加聖鑑辨其邪正其辨邪正之術如唐絳所言試取惡事假以上意為善而問之或取善事假以上意為惡而問之其人或不顧事實好惡便隨聖心而言則忠信傾邪立可識矣此得其要也其間或有無所禆益唯務阿附之人宜加罷出以警在位則賢否分而職業修矣臣以戇愚動觸忌諱忠憤所激豈敢愛身惟陛下念之治平四年十二月上時為知雜御史上神宗論种諤擅入西界楊繪臣聞帝王之道唯信為大仲尼以為兵食可去信不可去晉文霸國之君爾猶曰得原失信何以庇民今為國家患唯西北二虜然而數十年無烽燧之警生民不識戰鬭之苦者豈專仗金帛而然乎亦恃乎信誓之言而巳矣比者西戎新納信欵切聞髙遵裕詐傳聖旨與种諤等納西夏叛人首領近三十人仍深入虜界地名綏州築城以居之臣切謂朝廷若遂從其計則失信於戎狄生起邊事無窮極矣為今計者莫若貶謫其矯制擅興之罪以正典刑仍差使告諭西夏示非朝廷之命如此則大信不失興功生事之徒少有懲矣臣又聞西戎有僣逆之狀巳五七年擅置官司輒更年號而但倔強於巢穴中終不敢顯然出兵為邊鄙之患者何哉彼雖戎狄亦不敢無名而舉矣今既納其逃叛者則彼之作過有名矣以中國而失信於外夷一不可也既失信於西則北戎亦從而疑信誓之不實是一舉而兩失之二不可也興師有曲直直者奮而曲者怠左傳所稱我怠彼奮是也今若生起邊患則差往戰鬭者必曰彼邀功生事髙遵裕种諤實當其名而被堅執鋭出生入死則使吾徒為之有不伏之心而生懈怠焉則難以必勝三不可也有此三不可之大患則朝廷何恤於二子而不惜於邊鄙大患乎方今公私帑藏近巳空竭糧運不繼當取於民民將不堪則患起於內矣臣切料扶其議者必曰若貶二子歸其逃者則西虜亦未必息兵不若因而成功臣切謂朝廷自不失信而虜作過則直在我矣我直彼曲雖興軍擾民軍民何辭以怨乎外人議者咸曰茲事蓋起於薛向鹽馬之法行之六七年今將弊矣薛向欲求脫去而使他人乘其弊故與楊定髙遵裕种諤等建為此謀欲求邊任而罷轉運使之職致陜西之民從夏秋以來倡言朝廷欲收復橫山而不恤陜西之民甚有怨咨近外人又傳惑陛下之聽於外者楊定也惑陛下之聽於內者王中正也致陛下鋭於橫山之議者職斯二人臣雖愚昧豈不知此事之非實但願陛下早賜指揮則外人浮議自弭矣臣忝諫職敢不盡言治平四年十二月上時知諫院熙寧元年二月种諤奪四官隨州安置上神宗論种諤薛向劉述臣切聞趙瞻勘到种諤詐稱得密旨擅發兵馬城綏州公案止斷追官安置而已案內亦不一就勘到薛向張穆之髙遵裕王中正等人外議喧然皆謂未得公當夫矯制發兵人臣之罪無大懷姦罔上國家之法不容一則見不忠於主茲實叛亂之漸為天下者不可不深懲也昔漢馮奉世矯制斬莎車王傳首京師威震西域宣帝欲加爵土蕭望之以為不可恐後奉使者為國生事武帝時王恢用馬邑豪聶一計欲舉兵攻胸奴與韓安國論難往復數四武帝從恢議後無成功下恢廷尉廷尉以為當斬太后以田蚡之言謂武帝曰恢為馬邑事今無成而誅恢是為胸奴報仇也武帝曰首為馬邑事者恢故發天下兵數十萬今不誅恢無以謝天下恢聞乃自殺恢當時稟命於朝廷而舉事不成武帝猶謂不誅無以謝天下蓋慮後來狂易之人妄興邊事殺傷士卒疲弊中國故以為戒爾今种諤詐稱密旨擅發兵馬以致邉境騷然公私勞費此而不誅孰為可誅者所幸賴者陛下仁聖之心充格天地天地神靈擁佑聖德故致諒祚死不然兵連禍結百姓受弊於今巳不淺矣伏望陛下深思宗社之計早絶禍亂之源發於聖斷斬諤以謝邊民以誡後來專輒興事以遺國家之患者天下幸甚天下幸甚其次薛向臣採諸衆論其人本為擘畫用鹽博馬事今來鹽鈔布滿中外賣之折錢而復不顧其法已弊矣向切欲擺脫未有緣由故於上前妄陳橫山可取之議欲作邊帥以邀巳利耳非忠於朝廷也洎過本路遂將公文并手書與諸將稱得密旨圖取橫山以致种諤狂發貪功恐為他人所先輒作此事迹其所由首惡者乃向也今种諤既議追官安置而巳向乃猶不失為州臣恐用法未適輕重之宜縱使陛下當時曾許向經營此事乃為向以甘言厚利眩惑之故所謂懷姦罔上者非向而誰漢武帝所以不赦王恢者正為此爾中外皆謂向憸巧之人善結權貴致位至此悉用此道陛下既為此人面欺當須覺悟而怒之不當曲為主張掩蓋其罪也臣恐今後姦邪之人窺見此意别生事端誑誤陛下以為朝廷招天下之患陛下又將主張掩蓋之邪將不然邪臣聞聖人無常心以百姓心為心言從衆也仁宗皇帝未嘗私意喜怒天下之人謂之善則用之天下之人謂之惡則棄之是以天下稱其聖此陛下所宜法而行之者也今薛向之罪惡中外切齒關陜之人恨不食其肉而寢其皮而陛下獨未悟臣所未諭也其勘官趙瞻既勘得种諤辭連薛向等人便合追攝勘證豈得再取朝廷指揮顯見黨庇懷姦首惡之人伏請選差公正強明臣僚并趙瞻一處勘鞫以正邦憲以厭人心臣前已具奏乞不差趙瞻作勘官恐因與薛向鄉里之舊曲為黨庇今乃果然臣恐兩府大臣中亦有黨庇薛向如趙瞻者陛下不可不察也臣職在糾姦故敢觸冒忌諱昧死陳誠惟陛下念之熙寧元年二月上時為知雜御史上神宗論不可伐喪劉述臣伏覩夏國諒祚死亡遣使人來告哀朝議損其恩禮以其納欵之後曾犯大順城及擅殺傷楊定等所以貶之也今風聞欲遣使責問其國不修賀登極并正旦等事及聞邊臣建議欲乘其喪禍飢困之際以重兵深入討虜不知果然否以臣愚思之恐非所以哀喪恤災綏懷夷狄之道也夫夷狄者豈可以禮義責之哉弱則畏服強則侵叛從古以然也今諒祚既死將責何人不若因而撫之為得䇿也真廟景德初繼遷死其子德明尚幼因邊臣奏報即降詔慰諭由此德眀遣使奉誓書歸順爾後邊事寧敉垂三十年關右之人無科率轉餉之勞安耕織生養之業公私富實朝野歡娛當是時真宗皇帝非不知乘其喪禍微弱之際用兵窮討蓋以金革之事勝敗不常匪唯耗蠹貨財亦復殺傷士卒於是推天地父母之心務以德懷不以力伏是以終德眀之身不敢有負朝廷乃前事之眀驗也以當時之事力視今日之虛實萬相逺矣當時尤不欲為而今日復欲為之豈不悖哉臣伏願陛下追鑑前世用兵和戎之利害深察今日兵威財力之強弱愛惜生靈之命保固祖宗之業丁寧二府撿詳景德年趙德眀故事仍先遣一介之使慰撫其國人存問其嗣子仍諭之云如朝廷推封爵之恩即須别納誓欵方可乞行制命彼既孤弱且貪賜豫則欣然聞命矣乃可以救前日种諤擅興之失使知非朝廷之意則曲不在我矣若用邊臣之言以重兵壓境乃為權謀之事欲彼懼而速盟可也若作深入之計則為無䇿矣今諒祚之斃不在先後而適在今日乃上天之靈擁佑聖德俾於斯時除去邊患昭然可識矣陛下可不順承天意撫柔夷狄以安中國乎事之機會正在此時一失其宜蕩不可救惟陛下留神省覽天下幸甚熙寧元年三月上時為知雜御史上神宗論自治以勝夷狄之患孫覺臣切見陛下去年經營西事議不素定邊臣二三至令偏禆輕易出師深入營建城壘轉輸饋運數道為之騷然終之楊定見誘喪元於敵今又或傳交趾爭立內相誅夷為更易廣帥以至閩越諸州大抵改置牧守矣而北戎亦輒為誓約擅刺兩地邊民中國四陲而三方皆警此蓋陛下新即大位夷狄未見威德故敢或為侵侮以窺我邊朝廷整飭戎備選置任使未為失計也然臣切聞之虞書曰柔逺能邇惇德允元而難任人蠻夷率服夫以堯舜之時聖賢相會宜長䇿成算以厭伏四夷然其言專以難任人為本蓋任人處內則主聽眩主聽眩則任使不眀忠邪雜進雖有智勇安所設施或任人放逺則智者竭其智勇者獻其力夫如是則何蠻夷之足患哉臣又聞六月詩之序曰小雅盡廢則四夷交侵中國微矣蓋小雅王道之序凡其所言皆綱紀人倫惠養萬物君臣相遇以誠而知羣下之勞苦遣使勞還恩意愈篤反復以自治為先故能周道中興夷狄逺迹臣愚切以夷狄之患雖盛王所不免唯知自治者為能勝之伏望陛下雖講邊備選帥臣而深以詩書為監日新盛德使任人不能眩聽而次序以興小雅之廢則臣將見四夷畢來陛下深拱以享太平之報熙寧元年五月上時為右正言諫院供職上神宗論治邊之略孫覺臣伏見陛下深以戎狄為念而治邊防儲軍實臨朝慨然思古之將帥至親撰文以祭前朝大將之有功者垂老降虜賜之服章延見訪逮以此見陛下之於夷狄懷不平之憤而欲上為列聖攄之於無窮也臣竊不自料謹上治邊之略伏惟留神采擇國家與虜和好六七十年雖時有邀求或小侵嫚然未嘗敢頓隳信誓深入大擾邊民白首不見兵革朝廷雖嵗捐金繒厚禮重幣以結其歡心然吾之元元得父子相保以養其家不至於暴露流離肝腦塗地者列聖之賜也其賄益厚其勢益驕其弊終至於用武何也與者倦而其取無厭約既久則其終必弊則其至於用武也豈得巳哉老子曰兵者不祥之器非君子之器聖人不得巳而用之茍不得巳則軍儲不可以不實邊防不可以不修將不可以不擇卒不可以不練吾之糧械既巳備足戎人守信誓謹疆場則吾固待之如初若大有所求違約妄作或舉重兵以臨境上恃吾有以待之則以戰以守惟上所令臣雖未嘗至邊州以臣之所聞見切恐今日之將卒器械糧廩未可以與虜角也臣聞李牧之為趙將居邊軍市之租皆自用享士賞賜決於外不從中覆委任而責成功故李牧乃得盡其智能選車千三百乘騎萬二千匹百金之士十萬是以北逐單于破東胡滅襜襤西抑強秦南支韓魏委任邊將必若趙之於李牧可也太祖皇帝神武聖謨燭知邊事故關南用李漢超瀛州用馬仁瑀常山用韓令坤易州用賀惟忠棣州用何繼筠延州用趙贊慶州用姚內斌環州用董遵誨原州用王彥升靈州用馮繼業逺者至二十年近者亦不減十餘嵗其家留京師者撫恤之甚厚郡中管榷之利悉以與之恣其市易免所過征稅令募驍勇以為爪牙每來朝必召對賜坐飲食之其還也厚加賜賚故邊臣皆富於財得以養士用間通知蕃人情狀敵將入冦我巳先知設伏掩擊多能以寡勝衆以至平蜀取荆下嶺表收江南二十年間用兵四方而不以西北為慮者諸將守邊之力也臣以謂才能䇿略若此十數人者不乏於世顧所以委任責成之道何如耳誠能講求擇將之方於諸州要處試而用之其才果可任也則付之一州以便宜從事地可墾闢聽招土兵卒可選用聽其廢置財可聚散聽其出入間諜往來聽其自便率嵗來朝燕見加禮使君臣之際洞見心腑則將輸其忠士盡其力是被邊諸州皆得李牧以守之也如此則冦之進退常在中國至於無厭之邀求無故之侵侮彼將望風而自沮矣孰敢赴湯蹈火以取糜爛者哉夫以衰周之諸侯唐室之藩鎮皆以一國或數州之地外抗夷狄內拒天子蓋用志不分者能以小敵大委任責成者能以寡勝衆也今以天下之大四海之富而鰓鰓然嘗有夷狄之患用人不專而間説者衆不假人以權而朝廷自任責故也臣聞治天下者譬之飬身身之血氣不可偏有所養養血以勝氣養氣以勝血皆以致疾而害其身文武之為用亦何以異此國家自西師講和以來天下以兵為諱武事之不講也久矣陛下天錫勇智兼用文武方將大拯天下之弊以為宗廟無窮計慮則夫備邊選將之方特其小小者耳伏望陛下日新盛德聽用賢俊收采衆䇿以期成功天下幸甚熙寧元年六月上上神宗論小人妄陳邊事范純仁臣聞舜難任人而蠻夷率服詩讒人罔極交亂四國易曰小人勿用必亂邦也有以見小人用之則交亂邦國逺之則能伏蠻夷皆前世之眀效而聖人之深戒也伏見近日因陛下求治之初延訪之勤時有小人之言上惑聖聰聞之似若可采行之必纍至眀蓋其天性憸邪智識淺狹效小忠而忘大體貪近利而昧逺圖急於營身不思害國皆以巳之所好便為致主之謀行於其身尚為衆人所惡采而治國豈能有補大猷如昨來薛向等起橫山之謀西陲至今受弊及河北王臨始奏邊事亦多細瑣不實自謂朝廷委信帥臣難為節制并諸路走馬承受亦有不遵條約輕妄奏論搖動邊臣過當生事朝廷每有升黜適足助其威勢若不早加禁約實恐深蠹紀綱伏望陛下法宣尼逺佞之言體虞舜疾讒之道凡是憸人近習其言不可輕信及乞宣諭二府如有妄奏邉事及曽引惹生事之人不得令在邊任候有急難方得用之及委轉運使提點刑獄等體量諸路走馬承受不得於元降條約外妄陳邊事及言人長短其所奏文字亦乞降樞密院公行如此則小人道消太平可致熙寧二年三月上時同知諫院上神宗論中國當守信義不可輕議用兵司馬光臣向任御史中丞日聞國家招納夏國降民曽上言方今百職未舉庶政未修百姓未安倉庫未實將帥未選軍法未立士卒未練器械未精八事不全不可興兵智慮迂踈不合聖心俄而种諤等起綏州之役楊定為夏虜所殺陜西騷然困於餽戍朝廷悔前之失故謫降种諤以謝夏虜再三招撫方能得其稱臣奉表復遵舊約朝廷特遣使者以誓詔䇿命及金帛雜物賜之尚未返命今切聞陛下復詔种諤等詣闕引對不知陛下欲何所為聞者無不寒心夫布衣不守信義尤見輕於鄉黨况王者臨御四夷當叛則威之伏則懷之使信義之眀皎如日月若戎狄幸而臣服無故擾之及其背誕則從而忍之得其臣服又從而擾之其於信義威懷何如哉國家以信義臣畜戎狄百有餘年前日种諤等舉而棄之興兵掩其不備以邀之僅能得不食之地百餘里飢虜萬餘人耳今地則歸之虜庭民則逃散略盡朝廷有何所得而發兵守衛轉粟饋餉公私之費以巨萬計其為失䇿豈不昭然今瘡痍未復憂患未弭臣前所言八事一無所修敵疑忌中國警備已嚴怨毒之心蓄而未發諤等乃欲復為前日所為臣見其無復綏州之功而必有大敗覆沒之事兵連禍結不可救解公私困竭盜賊將生此乃社稷之憂非獨邊鄙之患也孔子曰過而不改是謂過矣伏望陛下留神深念至于再至于三當先修內政未可輕議用兵天下幸甚熙寧二年六月上時為翰林學士兼侍讀上批付樞密院召蔡延慶等八人赴闕上神宗諫西師富弼臣切知陜西用武諸路入討至今巳是數月調發輸斂不無勞費陛下躬親萬務勤於訪逮臣所恨未能一效死力少寬陛下西顧之憂且念靈夏數州自太宗割賜之後幾百年所存者唯是空壘而巳今所得城壁切恐未償所費既巳克下又須守禦自此勞費卒無已時伏緣西夏與北狄常為犄角之勢蓋北狄山前後十八州每恐朝廷有復取之意慶歷初因元昊叛仁宗不免討伐而北狄遂有嫚書興割地之隙其書大意自謂我與西夏是甥舅之國南朝不合加兵臣不能盡記其辭惟記一句云殊無忌器之嫌此大可見其意也臣其時兩使羌廷每見元昊遣人在彼密令詢問云來借兵此皆臣始末親經目覩不是剽聞以昔校今不敢謂必無此事今北狄亦須疑朝廷既平西夏即移兵北伐必有借助西夏之謀不可不過慮及此也設或二虜相應兩邊起事即各用人力如何枝梧其間軍情民心須常加防察不可使至於此極也况今天威巳振王師巳捷或且令退修邊備講守禦之䇿更俟表裏安集别圖後舉以為萬全之計亦為未晚伏乞陛下特賜詳擇而審處之熙寧三年十二月上時為武寧軍節度使檢校少師左僕射判亳州先是八月夏人侵順安綏平綏德黑水等寨判延州郭逵擊却之壬申遂舉國入冦攻圍大順城等環慶路都監髙敏等萬人戰歿陕右大震九月參知政事韓絳出宣撫陜西吕大防為判官自是西鄙用兵數年乃息上神宗諌西師司馬光臣不才誤承朝廷委用待罪長安兼領一路十州兵民大柄朝辭之日蒙陛下面諭以凡邊防事機及朝廷得失有所聞見令一一奏聞臣受命以來且愧且懼所愧者聖恩深厚責任至重所懼者智識淺短無以堪稱夙夜疚心不敢寧居臣入境以來見流移之民道路相望詢訪閭里皆云今夏大旱禾苖枯瘁河渭以北絶無所收獨南山之下稍有所存而入秋霖雨經月不霽禾雖有穗往往無實雖有實而往往無米雖有米率皆細黑一斗之粟舂簸之後不過得米三四升榖價涌貴民間纍年困於科調素無積蓄不能相贍以此須至分房減口就食西京襄鄧商虢等州庸賃客作或燒炭採薪或乞丏剽竊以度朝夕當此之際國家惟宜鎮之以靜省息諸事減節用度則租稅自輕徭役自少逋負自寬科率自止四患既除民力自足民財自饒閭里自安流亡自還固不待陛下憂勤於中宰相劬勞於外然後人人得其所也茍或不然國家雖欲輕租稅寬逋負其所費之財何由可得雖欲少徭役止科率其所營之事何由可成四患不除雖日下恩澤之詔民猶不免於流移轉死也蓋欲止沸者莫若絶薪欲安民者莫若省事此目前之驗也非難知也臣到官以來伏見朝廷及宣撫等司指揮分義勇作四畨欲令以次於沿邊戍守選諸軍驍鋭及募閭里惡少以為竒兵造乾糧糗飯布囊力車以備餽運悉取嵗賜秉常之物散給沿邊諸路又竭內地府庫甲兵財物以助之且以永興一軍言之所發人馬甲八千副錢九萬貫銀二萬三千兩銀碗六千枚其餘細瑣不可勝數動皆迫以軍期上下相驅急於星火官吏狼狽下民驚疑皆云國家將今春大舉六師長驅深入以討秉常之罪臣以踈賤不得預聞廟堂之議未知茲事虛實昨者親承德音以為方今邊計惟宜謹嚴守備俟其入寇則堅壁清野使之來無所得兵疲食盡可以坐收其弊臣退而思念聖謀髙逺深得王者禦戎狄之道實天下之福及到關中乃見凡百處置皆為出征調度臣不知有司在外不諭聖意以至有此張皇將陛下默運神算不令愚賤之臣得聞其實也臣不勝皇恐晝則忘食夜則廢寢心寒股栗切為陛下危之夫兵者凶器聖人不得已而用之自古以來國家富強將良卒精因人主好戰以致危亂者多矣况今公私困竭將愚卒懦乃欲驅之塞外以捕狡悍之寇其無功必矣豈惟無功兼後患甚多不可盡言也若朝廷初無出征之意則何為坐散府庫之財疲生民之力訖無分毫之事萬一將來敵騎入寇府庫巳竭民力巳困將何以禦之臣先任御史中丞日朝廷將興綏州之役臣曽上言國家先當舉百職修庶政安百姓實府庫選將帥立軍法練士卒精器械八事皆備然後可以征伐四夷今此八事未有一者勝於曩時而况關中飢饉十室九空為盜賊者紛紛巳多縣官倉庫之積所餘無幾乃欲輕動大衆橫挑猛敵此臣之所大懼也或者又云國家未討秉常先欲試兵誅一小族若果如此尤為不可何則今者竭關中之財力大興師衆乃捨有罪之強冦誅無辜之小種勝之不武不勝為笑將無以復號令夷狄矣此二䇿皆為不可伏望陛下深鑒安危之機消之於未萌救之於未形速下眀詔撫諭關中之民以朝廷不為出征之計其義勇更不分畨於沿邊戍守亦不選募竒兵凡諸調發為餽運之具者悉令停罷愛惜內地庫倉之儲以備春深賙救飢窮之人如此豈惟生民之幸亦社禝之福也不勝憂迫直輸赤誠惟陛下裁察熙寧三年十二月上時為端眀殿學士知永興軍上神宗答詔問北邊事宜韓琦臣伏蒙聖慈特差入內內侍省東頭供奉官幹當內東門司裴昱齎賜臣手詔以朝廷通好北狄八十年近嵗以來生事彌甚代北之地素有定封而輒開釁端妄來訴理比敕官吏同加按行雖圖籍甚眀而詭辭不伏今橫使復至意在必得朕以祖宗盟好之重固將優容敵情無厭勢恐未巳萬一不測何以待之古人大政必詢故老卿夙懷忠義歷相三朝雖爾身在外乃心罔不在王室其所以待遇之要禦備之方密具以聞臣晚年多病心力耗殫日欲再乞殘骸保此頽暮不意陛下以北狄生事深思預防記及孤愚曲有詢逮敢不勉竭以塞聖問臣切以契丹與中國抗者蓋一百七十餘年矣自石晉割地并有漢疆外兼諸戎益自驕大在祖宗朝屢嘗南牧極肆凶暴當是時豈不欲悉天下之力必與敵角哉終以愛惜生靈屈就和好疆場所有興作深以張皇引惹為戒以是七十年間二邊之民各安生業至於老死不知兵革戰鬭之事至仁大惠不可加也臣觀近年以來朝廷舉事則似不以大敵為恤敵人素以久強之勢於我未嘗少下一旦見形生疑必謂我有圖復燕南之意雖其主孱而佞佛豈無強梁宗屬與夫謀臣䇿士引先發制人之説造此釁端故屢遣使以爭理地界為名觀我應之之實如何耳所以致敵之疑者臣試陳其大略髙麗臣屬契丹於朝廷久絶朝貢向浙路遣人招諭而來且髙麗小邦豈能當契丹之盛來與不來國家無所損益而契丹知之謂朝廷將以圖我此契丹之疑也秦州古渭之西吐蕃部族散居山野不相君長耕牧自足未嘗為邊鄙之患向聞強取其地建熙河一路殺其老少以數萬計所費不資而河州或云地屬董氊即契丹壻也既恐闢地未巳豈不往訴而契丹聞之當謂行將及我此又契丹之疑也北邊地近西山勢漸髙仰不可為塘泊之處向聞差官領兵遍植榆栁兾其成長以制敵騎然興於界首無不知者昔慶歷嫚書所謂創立隄防障塞要路無以異矣然此豈足恃以為固哉但使契丹之疑也河朔義勇民兵置之嵗久耳目巳熟將校甚整教習亦精而忽團保甲一道紛然義勇舊人十去其七或撥入保甲或放而歸農得增數之虛名破可用之成法此又徒使契丹之疑也自敵人辨理疆界河朔沿邊與近裏州郡一例差官檢計修築城壘開淘壕塹兾北京役者尤衆敵樓戰棚之類悉加換葺增置防城之具率令備足逐處兵甲器械纍次差官檢視排垜張盤前後非一又諸處創都作院頒降新樣廣謀造作澶州等處創為戰車此皆衆目所覩諜者易窺且敵人未有動作彼無秋毫之損而我巳費財殫力先自困弊此又徒使契丹之疑也近復置立河北三十七將各專軍政縣不得關防雄州地控極邊亦設將屯兵其隨軍衣物有令兵士自辦者有令本營增置者有令官造給付者以至預籍上戶車馬騾驢準備隨行眀作出征次第不可蓋掩此又深使契丹之疑也夫北狄素為敵國設如此則積疑起事不得不然亦其善自為謀者也今橫使再至初示偃蹇以探朝廷况代北與雄州素有定界若優容而與之恐彼情無厭浸淫不巳誠如聖詔所諭固不可與或因其不許彼遂持此以為已直縱未大舉勢必漸擾諸邊卒隳盟好蓋事有因緣而致此者乃煩眀詔訪以待遇備禦之要自顧老朽夙夜思之其將何䇿上助聖算臣聞言未及而言謂之躁言及之而不言謂之隱臣昔曽言散青苖錢不便事而言者輒肆厚誣非陛下之眀幾及大戮自此新法之下雖其間有未協人情者實避嫌疑不敢更有論列今親被詔問事繫國家安危言及而隱是大不忠罪不容誅矣臣嘗切計始為陛下謀者必曰自祖宗以來紀綱法度率多因循茍簡非變之不可也治國之本當先有富強之術聚財積榖寓兵於民則可以鞭笞四夷盡復唐之故疆然後制作禮樂以文太平故始散青苖錢使民出利所得之利復以為本但務多取嵗增本錢無有定數又為免役之法自上等以至下户皆令次第出錢募人應役從來上戶輪當衙前重難故其間時有破敗者今上戶一嵗出錢不過三十餘緡安然無事而令下戶素無役者嵗嵗出錢此則損下戶而益上戶雖百端補救終非善法又役錢之內每嵗更納寬剩錢以備他用此所謂富國之術也且農民送納夏秋稅賦一年兩次納不前者始有科校之刑今納青苖與役錢已是加賦有過限者亦依二稅法科校則是一户一嵗之中常負六次科校民不勝駭矣稍遇水旱則逋負官錢流移失業是巳著見孰敢言者又內外置市易務盡籠天下商旅之貨官自取利主以得利為功圭刀必取小商細民遂無所措手加以新制日下更改無常州縣官吏茫然不能詳記稍有違者坐以徒刑雖經赦降去官不得原免監司督責以刻為眀薄法之苛過於告緡故州縣之間官吏惴惴然日茍一日皆以得罪為幸夫農者國之本也商者能為國致財者也官吏者助朝廷之教化者也今農者則怨於畎畝商者則歎於道路官吏則所在不安其職恐陛下不能盡知也夫欲攘捍四夷以興太平而先使邦本困搖衆心離怨振古以來未聞能就此功者也此則陛下始謀者之大誤也陛下有堯舜之聰眀知其所誤能改不吝聖人之大德也又今好進之人不顧國家之利害但謂邊事將作富貴可圖獻䇿以干陛下者必云敵勢已衰特外示驕慢耳以陛下神聖文武若擇將臣領大兵深入敵境則幽薊之地一舉可復此又未之思也今河朔纍嵗災傷民力大乏沿邊次邊州郡芻糧不充新選將官例皆粗勇保甲新點未經訓練若驅重兵頓于堅城之下糧運不給敵人四向來援腹背受敵欲退不可其將奈何太宗時雖曹彬米信名德宿將猶以致歧溝之敗也臣愚今為陛下計謂宜遣使往報優致禮幣開示大信達以至誠具言朝廷向來興作乃修備之常與北朝通好之久自古所無豈有它意恐為諜者所誤耳且疆土素定當如舊界請命邊吏退近者侵占之地不可持此造端欲隳祖宗纍世之好永篤信約兩絶嫌疑望陛下將契丹所疑之事如將官之類因而罷去以釋敵疑萬一聽伏則可遷延嵗月陛下益養民愛力選賢任能踈逺姦諛進用忠鯁使天下悅服邊備日修塞下有餘粟帑中有羡財俟敵果有衰亂之形然後一振威武恢復舊疆快忠義不平之心雪祖宗纍朝之憤陛下功德赫然如日照耀無窮矣如其不伏決欲背約則河北諸州深溝髙壘足以自守敵人果來入冦所在之兵可以伺便驅逐大將持重以全取勝自此彼來我往一勝一負兵家之常不可前料即未知何時復遂休息也至於清野之法則難盡行倉卒之際不可率一境之民比戶將牛馬餱糧盡入城郭蓋至時或有往保生寨者或有挈家渡河者或有留人看守莊舍者或有就近入居城郭者當使人得自便方保安全固不可按圖先定必令城郭而居雖有嚴令必不從也在祖宗朝屢經北狄之擾鄊民避冦率亦如此願朝廷不須一一處置臣歷事三朝十年輔相官巳極品歸榮故鄊萬事無不足者年將七十宿疹在身每思告老而去庶全始終此緣聖問之及因敢一貢藎言非嫉善也非求進也用是只以自信今天下之人漸不敢以直言為獻臣實不忍負纍朝眷遇之恩猶覬愚瞽一悟聖心為社稷之盛福惟陛下加察賜以不疑非獨老臣幸甚天下幸甚熙寧八年四月上時以侍中判相州上神宗答詔問北邊事宜富弼臣素乏才業忝塵二府昔在壯時精力尚不及人今老且病氣志衰耗何足備大政之問然臣實非巳見今但舉衆人所得聞者録以上奏惟聖眀裁擇臣五六年來切聞綏州婁熙河辰錦戎瀘交趾咸議用兵唯交趾中寢其餘諸路皆有攻討或尅獲或喪失即傳播天下而綏州婁熙河始初興舉便傳聞云朝廷必復靈夏平賀蘭既又大傳有人上平燕之䇿此説尤盛北狄必巳探知相備復傳聞朝廷修整器甲簡練兵伍增築城壘積聚芻糧加之招致髙麗為牽制之援近又分置河北三十六將按閲愈急喧布漸久事機參合此敵人所以先期啓釁以發代北侵境之端而不肯巳也其平賀蘭平燕之䇿虛實固不可知然傳者既多且久萬口一詞誰敢辨白設有辨者逺夷何以取信今釁端巳成代北各屯兵馬境上爭議逾年未決橫使再至事歸朝廷此邊城之職而朝廷自當之則恐理難欵緩便要可否違之則兵立起而患速順之則河東斥堠窄狹為患雖遲而久逺不便臣謂不若一委邊臣令其堅持久來圖籍疆界為據使其盡力交相詰難然北狄非不自知理曲蓋故欲生事遂興干戈以氣吞我以勢陵我是欲奪我纍年所作之事彼非敢無故驟興此端實有以致其來也惟陛下深省熟慮不可獨謂敵人結釁背盟也彼若萬一入冦事不得巳我持嚴兵以待之來則禦戰去則備守此自古中國防邊之要也若朝廷乘忿便欲深入討擊臣實慮萬一蹉跌其害非細更或與西夏為犄角之勢則朝廷宵旰矣事既至此邊奏警急兵糧皆缺窘於應用須防四方凶徒必有觀望者謂國家方事外虞其力不能制我遂相嘯聚蜂蝟而起事將奈何臣願陛下以宗社為憂生民為念納汚含垢且求安靜更俟嵗時豐稔窮困稍蘇流亡漸歸民粗安業稅賦不失倉廪不虛恩信宣布人心固結然後别圖萬全之舉貴免一跌之失此天下之願也亦臣之志也向又喧傳陛下決為親征之謀中外益更憂懼心殞膽落陛下雖英睿天縱必有成算然太平天子與創業之君事體絶異尤不可槩然輕舉又恐朝廷且作聲勢固無實心事若如此乃是我以虛聲而邀彼實來也張虛聲者必有踈略之虞作實來者必有周密之慮以踈略之虞而當周密之計其成敗豈不灼然耶假令入討得志而還此契丹一種事力自大况夏國罝勒斯賚髙麗黑水女真達靼等諸蕃為之黨援其勢必難殄滅使無噍類即由此結成邊患卒無已時大非長轡逺馭之道也臣切謂因橫使之來且可選人以其疑我者數事開懷喻之云朝廷凡所為武偹乃中國常事非願外興征伐向者用武之地皆小蕃有過者朝廷須合問罪若吾二大邦通好巳是七十餘年無故安肯輒欲破壞恐是姦人造作妄興間諜或是彼聞我整肅邊事即疑我有所興作我既知之豈免大為凖擬蓋因此互相疑惑養成釁隙遂有今日爭理朝廷更有可説諸事但盡説之須令釋然無惑乃一助也橫使始不納即遣報聘者於戎主前具道此意庶幾一聽必有所益緣彼大藉朝廷嵗與方成國計既有顧藉之心豈無安靜之欲只以疑情未釋遂成倔強若與開解眀白必肯回心向化凡百芥蒂盡可脫略茍互相疑忌兩情不通禍患日深必成後悔臣歷觀春秋洎戰國時諸侯遞相征伐兩兵巳合飛矢在上行人在下辨説解釋遂各交締而退却復盟好者比比皆是况今釁端漸啓兵尚未合且可多方以理解釋或能有濟與其用征戰而決勝負萬萬不侔也彼此致疑及禦戎二事臣並得之羣論非出胸臆是皆目前衆所共知所共見必然之理非事外别生竒異之䇿也臣更望陛下兼求博訪不宜専聽一偏之説恐有迎合聖意及畏避用事之人不敢盡以實事上奏有誤國家大計臣今所以及此者切聞去春以久旱陛下特降手詔許人極陳朝政得失中外歡抃咸謂聖情巳大開悟尋聞上章論列者甚多隨而或遭貶降陛下殊不以手詔召人極諫為意而優容之反令得罪士大夫自此皆務鉗結忠藎之語不敢復出于口臣謂下情不能上達者乃朝政莫大之患也願陛下深思極慮之早令天下受賜及朝廷無事不勝大幸此奏出於匆遽又且欲事理眀白不敢加飾及援據古事但直書利害而巳昔楚相子反謂區區之宋尚有不欺人之臣况中原大國巳與北寇結隙今若更不推誠以待之則恐不能解疑釋惑也伏乞聖造特加裁恕煕寧八年四月上時以使相韓國公致仕自蕭禧等再來議地界神宗特出手詔問計弼等弼等答詔皆主不與之論會王安石再入相獨言將欲取之必故與之以筆畫地圖授韓縝悉與之蓋東西棄地五百餘里實縝承安石風旨行之其後元祐初諌官蘇轍論縝棄地之罪其言云自古四夷外侮必於新故更代之際主少國疑之時故孝惠髙后之世胸奴桀驁唐太宗初即位突厥奄至渭北今二寇蓄謀安危未分折衝禦侮專在輔弼去嵗虜使入朝見縝在位使副相顧反唇微笑此何意也敵誠見縝無狀舉祖宗七百里之地無故與之今其為政我之利也故喜而竊笑耳啓姦辱國必始於是北寇地界之謀出於耶律用正今以為相寇以闢國七百里而相用正理固當爾而朝廷以促國七百里而相縝臣愚所未諭也臣聞之河東父老云韓琦為太原欲置范家東堡范家西堡及赤泥膠三旨揮弓箭手恐寇以為言乃召弓箭手節級髙正使幹其事正率其徒於斯賚臺之南北候伺寇人樵採者輒毆傷之寇以為言則曰此漢界也移文爭之往反十數卒得其要約自斯賚臺以南為漢界而三旨揮弓箭手大獲其用及韓縝定地界皆割與之主戶約二千五百餘戶客戶三四倍之驅迫內徙墳墓廬舍及所種田畝皆委之而南老幼慟哭所不忍聞遂以天池嶺為界天池北距斯賚臺尚二十五六里異時寇欲祈福修天池廟必牒安撫司而後敢入以眀廟之屬漢今也亦為敵有髙正者土豪也有威名於北方畨漢目之為髙大王而天池廟神亦曰髙大王廟方割屬敵時正拊膺大慟謂其徒曰我兄嫂今日陷蕃百姓數千人皆大哭縝為侍從仗節出使而賣國黨冦曽不如一弓手節級此而可忍孰不可忍正數年前為大皇平巡檢年七十餘每見人論縝與燕復之姦即欲食其肉復火山軍三界首唐隆鎮一商人也入粟得司戶參軍韓絳為宣撫始奏換武邊人疑其細作而縝與之交私狎昵無所不至呼為燕二亦謂二哥割地之謀皆出于復敵使梁永蕭禧本以橫山下大川為界至七蕃嶺下乃斗入漢地圍裏此嶺凡二十八里意欲自此直至分水嶺為界邊民大怒有焦家弓箭手二百人毆擊北使奪下梁永等柱斧交倚冦不敢復南仍自七蕃嶺北轉而西以大川為界燕復至雁門寨亦為弓箭手所毆匍匐入寨閉門僅免由此觀之邊民皆忠憤不伏而北狄亦自知理曲無詞使縝稍有臣子忠孝不負本朝之心則七百里之地必不至陷于寇仇之境也火山寧化之間山林饒富財用之藪也自蘆牙平荷葉山雪山一帶直走瓦窑塢南北百餘里東西四五十里林木薪炭足以供一路麋鹿雉兔足以飽數州今皆失之雪山有廟河東一路牲幣所走今亦為夷鬼矣人神共怨皆縝之罪中國從來控扼卓望形勢之地如五蕃嶺六蕃嶺七蕃嶺黃嵬山之類今皆為敵巢下視欣代人馬可數異時用精兵數十萬人未易復取而用兵之䇿誰敢復議以此知縝賣國之罪百世不磨若祖宗有靈必不赦縝陛下近降出吳居厚王子京蹇周輔之流皆以立法害民耳出其人改其法不數月而民復業矣如縝之罪智者不能復謀仁者不能復安疆場之患有不可測者而陛下獨赦之臣不勝為國疾姦憂深思逺之至伏乞檢臣前後章疏下三省兩制雜議正縝之罪以告四方有不如臣言甘伏訕上之罪縝竟罷相宋名臣奏議卷一百三十七
