body:
  text: 宋名臣奏議卷九十五宋趙汝愚編禮樂門諡法上仁宗論夏竦不當諡文正司馬光等臣等伏覩故贈太師中書令夏竦以舊在東宫特賜諡文正臣聞大戴禮曰諡者行之迹也行出於己名生於人所以勸善沮惡不可私也臣等叨預禮官諡有得失職有當言不敢隱默謹按令文諸諡王公及職事官三品以上皆録行狀申省考功勘校下太常禮院擬諡訖申省議定奏聞所以重名實示至公也陛下聖德涵容如天如地哀愍舊臣恩厚無已知竦平生不協衆望不欲委之有司槩以公議且將掩覆其短推見所長故定諡於中而後宣示於外臣等謂猶宜擇中流之諡使與行實粗相應者取以賜之亦非羣臣所敢議也今乃諡以文正二者諡之至美無以復加雖以周公之才不可兼取况如竦者豈易克當所謂名與實爽諡與行違傳之永久何以為法伏以陛下睿智聰明燭見微逺如竦所為豈不素聞乃欲以恩澤之私強加美諡雖朝士大夫畏竦子孫居美仕不敢顯言四方之人耳目炳然豈可掩蔽必曰夏竦之為如是而諡文正非以諡為公器也蓋出於天子之恩耳此其譏評國家之失豈云細哉臣等所以夙夜惶懼不敢避誅戮之辜報讎之禍狂僭妄言正為此耳伏乞陛下留神幸察改賜一諡庶協中外之論以為萬世之法臣等無任懇欵悚懼之至皇祐四年七月上時同知禮院上仁宗論夏竦不當諡文正係第二狀司馬光等臣等近以故贈太師中書令夏竦賜諡文正輒有奏陳乞賜改更至今未奉俞旨臣竊以凡為人臣受祿不必多居位不必高茍當官不言則刑戮之人也是以夙夜惶懼不敢默默伏惟陛下不以鄙賤而忽其言臣等竊迹諡法本意所謂道德博聞曰文者非聞見雜博之謂也蓋以所行所學不離於道德也靖共其位曰正者非柔懦茍偷之謂也蓋詩云靖共爾位好是正直也今竦奢侈無度聚斂無厭內則不能制義於閨門外則不能立效於邊鄙言不副行貌不應心語其道德則貪淫矣語其正直則回邪矣此皆天下所共聞非臣等所敢誣加也陛下乃以文正諡之臣等戇愚不達大體不知復以何諡待天下之正人良士哉且陛下所以念竦如此之厚者以竦嘗為東宫之臣故也向者東宫之臣死而得諡者非一陛下未嘗親有所定至於竦獨不然豈非知竦所為不合衆心耶陛下必以竦為正直無疑則何不委之有司付以公議然則陛下掩覆其短適所以彰之也陛下念竦不已則莫若厚撫其家至於諡者先王所以勸善沮惡非供恩澤之具也議者將以諡為虗名何害借人臣等請試言其害凡國家所以馭臣下者不過禍福榮辱而已為善者生享其福死受其榮為不善者生遇其禍死蒙其辱天下雖欲不治安何可得也如有不令之臣生則盜其祿位死則盜其榮名善者不知所勸惡者不知所懼臧否顛倒不可復振此其為害可勝道哉虞書曰兢兢業業一日二日萬幾孔安國傳曰言當戒懼萬事之微夫事之方微治之易絶及其既著誰得治之况天下之人皆知竦為大邪陛下雖諡之以正此不足以掩竦之惡而適足以傷國家之至公耳且諡法所以信於後人者為其善善惡惡無私也今以一臣之故而敗之使忠良雋傑之士蒙美諡者後世皆疑之則諡法將安用哉臣等所以冒犯天顔區區不已與人父子為怨者誠惜國家勸沮大法不可因循虧廢也伏惟陛下憐察少加採擇特依前奏所陳改賜竦諡天下幸甚臣等不勝惶恐待罪之至皇祐四年七月上奉聖旨改諡文莊上仁宗請諡陳執中榮靈韓維臣聞尊卑親踈賢不肖之辨所以立人倫也禮者所以維持人倫使不斁敗之具也朝廷之位廟寢之制車服之數金石爼豆之容皆有章也章不眀則尊卑親踈賢不肖紛亂而人倫斁矣故有天下者不可不先禮也竊見國家受命百年而郊廟之位尚有未正朝廷之儀尚有未尊祭祀婚葬車服之等尚多不備所以然者患在棄禮而任人情也夫禮所以撙節人情使一於正今任人情而廢禮是以民俗無羞惡之風士大夫寡亷遜之節禮制雖繁而下不率法禁滋密而姦不勝蓋有當先而後冝興而廢者矣伏惟宋至陛下比之於周成康之世也方當修起廢墜興造禮樂以成一家之制典章之有失者此臣所以不得默也臣聞溫成之喪陛下疑所以處中夜令就宰相陳執中第問之眀日遂發喪而下禮之大不可者有四夫皇儀殿者先帝先后之所嘗治喪也雖宫禁給使之人知其不當處之而處之矣大不可一也皇后者上配宸極天下之母也位號至重豈容僣瀆中宫在上而發册殿廷且以后禮送之大不可二也樂禁之內大祀用樂者備而不作大祀者非天地日月則宗廟社稷也而殺厭其禮大不可三也殿而不廟不備四時之享者奉孝惠皇后之禮也孝惠皇后者非太宗之正配也猶以為未足而立廟用樂遂與祖宗等大不可四也别廟四后章惠皇后不立忌日久矣緣此而立之事巳施行賴陛下聖眀采諫者之言而復止不然此又不可一也臣伏思溫成皇后雖追册位號其實陛下之後宫也今以尊奉後宫而瀆臣主之分殺天地之祀僣祖宗之禮竊計此非陛下本意何以言之臣伏見陛下謙儉寅畏謹於事神篤於奉先祠享常禮之外過自抑損以極孝恭不冝有此蓋當時臣下莫為陛下正言者陳執中位居師長曽無一言之補夫為國謀事而至於瀆臣主之分僣祖宗之禮可謂乖戾矣生既竊陛下之爵位以厭其欲若死又得美諡以成其志是執中終始獲幸而獨留非理之名使後世有以議陛下也臣不勝憤悶謹因其家請諡責其大節之失加以榮靈之諡言其寵祿則厚而令名不立也其義欲使天下知為臣當盡忠事君當以禮又使阿諛竊位之臣知生雖茍一時之榮而死不免萬世之戮不然議虗名將朽之骨臣何獨為此區區也且諡者周公所作萬世之公法也臣之所言天下之公議也陛下寵待大臣亦已至矣而使有司得以萬世之公法天下之公議貶之亦天下之至公也伏惟陛下幸聽臣言以成天下至公之法豈不大哉臣備位禮官凡儀典之遺闕得以討論又大臣之薨卒者得秉筆為議以美惡諡之皆臣之職也義有所在不忍緘默嘉祐四年四月上時知太常禮院先是維議曰執中幸得以公卿子遭世承平因緣一時之言遂至貴顯皇祐之末天子以後宫之喪問所以葬祭之禮執中位為上相不能總率羣司考正儀典以承答天問而治喪皇儀非嬪御之禮追册位號於宫闈有嫌建廟用樂踰祖宗舊制遂使聖朝大典著非禮之舉此不忠之大者閨門之內禮分不眀夫人正室踈薄自絀庶妾賤人悍逸不制醜聲流布行路具知此又治家無足言者夫宰相者所當秉道率禮以弼天子正身率家以儀百官執中不務出此而方杜門深居謝絶賔客曰我無私也我不黨也豈不陋哉謹按諡法寵祿光大曰榮不勤成名曰靈執中出入將相以一品就第可謂寵祿光大矣得位行政不為不逢死之日賢士大夫無述焉可謂不勤成名矣請合二法諡曰榮靈上仁宗論陳執中不當得美諡韓維臣近與孫抃等議故太師侍中陳執中之諡論有異同遂具狀中書門下臣以為朝廷且將復下有司使議執中所以得諡恭之狀然後決其是非遽聞降敇考功諡為恭字臣伏思之不勝皇惑臣以榮靈諡執中者正謂責其廢禮不恭失為臣之節而朝廷遂用恭法此臣不得不惑也臣聞孟子曰責難於君謂之恭謂以難行之道進於君而勉之也孔子曰恭近於禮逺耻辱也蓋禮之意非恭不立而恭不近禮適足以招耻辱也書曰官師相規工執藝事以諫其或不恭邦有常刑此言治古之世自公卿大夫以至百工各以其職諫有不如此謂之不恭也執中備位宰相遭眀主以仁恕臨下賦事行政惟大臣是咨惟古訓是式前代人君之所難陛下皆易之此誠人人自竭盡之秋而執中內懷阿倚援不正之説僭瀆大禮尚不能成眀主之所易可謂責難乎陛下中宫在上而妃嬪之沒治喪發册近在殿中此雖宫省使令之人猶知其不可執中尚不能及使令之所知可謂近禮乎有司上孝惠祠殿之禮不享不樂罷斥其議而遂僭祖宗之制執中表帥羣臣縱不能復治古各以職諫而首自亂禮此又常刑之所不赦也且恭之法曰不懈於位夫位以宅才才以治事茍事之不治雖修潔其衣冠莊嚴其色辭終日危坐無少懈之容何益哉執中犯不恭者三而顧以恭為諡如此則諡法可廢而官守無用也夫設法而至於可廢命官而同於無用臣愚不識朝廷處此於義何當伏望陛下亟詔有司格敕未行復令禮官得盡諡恭之説然後并以臣議下尚書都省集百官參定臣論有少屈退伏妄言之誅誠無所恨嘉祐四年四月上時知太常禮院上仁宗論陳執中不當得美諡係第二狀韓維臣近兩上章論故太師侍中陳執中不當諡恭字至今未蒙朝廷俞允竊聞敕在考功有司以不應常法未即奉行臣敢復進其愚説臣聞聖人治天下所以得人而用之其大法有五士之處也則教育之其將進也則辨論之其已任也則校其功罪以升黜之既沒也又作史以紀其善惡制諡以著其賢不肖所以教育奬勸聳懼者如此故士之為善也固其逐惡也力在上者總其才而用之此天下之所以治也後世茍簡教育辨論之法既蕩然矣作史制諡止以備官而不責其實至於升黜則非有成法可考或舉或廢各因其時在上者方患才之難得官之不修不知所以教育奬勸聳懼之法不立也臣請以執中一事眀之夫執中問學之不講義理之不達而遂至貴顯此教育辨論巳廢之驗也既位宰相首亂國典瀆尊卑親踈之義而優遊受寵以一品自終此升黜不行之效也今臣區區欲加公議於已然之後而同寮不以為得朝廷不以為善徑黜其論曽不少加參考此又備官而不責其實也所未知者但史官耳若史官又廢其守則是聖人之法都盡矣方今風俗頽弊百職隳惰謂宜力加振肅以消因循之弊而乃奪有司之職使不盡其法退至公之論使不極其理臣恐非朝廷之福也伏望陛下觀聖人制法之意鑒後世茍簡之弊察當今之所宜急使有司不失其職公論得有所立非臣之幸實天下幸甚嘉祐四年四月上上仁宗以議諡不合乞罷禮院韓維臣近議故太師侍中陳執中之諡者蓋悼典禮之淪斁憤臣節之不立傷官法之久廢區區之心實欲以此少佐治體一奏議而見黜三上章而不報此皆在臣愚論議淺薄不足以感動天聽臣既不能為陛下守職而尚竊俸入以禮官為稱臣實耻之伏望聖慈特許罷臣禮院除一外任差遣庶圖民政上報國恩嘉祐四年四月上同前係第二狀韓維臣近以守官無狀嘗具奏乞除一外任差遣未奉聖旨不敢自安臣誠至愚豈不知循往舊之迹則易處附衆多之議則見從持寬假之計則寡怨然而不為者蓋以為所守者朝廷之官不敢緣私而廢所論者聖人之法不忍與俗而遷今臣既不得少伸所職而尚冒居其任則是臣於官有不能守之罪於義有不能去之責伏惟陛下愛飬臣下全其名節幸哀狂愚使有自處之地臣不勝至願嘉祐四年四月上恤典上仁宗乞録用劉平石子弟蘇舜欽臣近到闕聞黃德和以退軍及妄奏劉平石元孫叛逆朝廷已從軍法處分然劉平石元孫以血戰陷沒死於賊手初朝廷未能辨眀即時以兵卒監圍其第及德和既已伏辜二族未沾恩澤遷延纍日人頗疑惑古者捨爵䇿勳貴其速也此雖敗衄是亦勤勞於時伏望陛下斷自睿意詔有司於西郊備禮致祭陛下出素服西向舉哀故禮云君有憂則素服哭於庫門之外赴車不載櫜韔蓋古者義也即日降册追贈賻其家族爵其子弟使死者有知豈無冥助生者懷感必當盡忠烈士義夫聞之震激人人思為陛下用也劉平石子弟雖不識聞其頗知邊事用敵西寇必有成功况國耻家讐異於他將則吳用子胥唐拜田布即其義也康定元年四月上時知長垣縣還到闕上神宗乞録用魏元成裔孫韓琦臣讀唐史見魏元成之輔太宗能盡忠切諫卒致貞觀之治所以後代欲治之主知納諫為先是其功不止一時而實及百世此其裔孫乃夷民伍又本家見執前來州縣判慿得免差役今乃一刺義勇一充衙前真可憐憫欲乞朝廷特與家長道嚴一官仍免本戶差役庶使為臣者聞異代忠賢之後猶蒙奬録則今日能忠於朝廷者誠有所勸也兼臣據魏道嚴賫到逺祖處哲洽官誥二道處哲乃元成之孫洽乃重孫今道嚴等鄉里在臣官下既再有敘陳合具敷奏熙寧元年上時以使相判相州上哲宗乞推褒吕誨劉摯臣伏以辨大姦而救未萌人臣之先識褒遺忠而發潛德國家之令典臣嘗觀熙寧之初王安石以道義文學起而輔政先帝舉天下聼之天下士民亦罔不指日以望太平上下向之無異辭當此之時故諫議大夫吕誨為御史中丞獨以為不然屢有奏論其略曰安石居廟堂天下必無安靜之理又曰誤天下蒼生必此人誨坐是貶官於外未幾亡沒其後安石與其黨變亂祖宗法度專以聚斂為事顛倒邪正進退失其當廢民之所同欲興民之所同害欺罔朝廷天下被其患者十七八年其間雖有踵事增虐之人然要之權輿造端實自安石始四海困擾皆如誨言誨可謂有前知之眀矣誨名臣之後為人忠信剛正立朝行已有古人之節大臣之風在言路前後三黜皆以擊姦邪權勢最後猶以直道大義為公論所高誨之死於散地在熙寧四年官至侍從而朝廷未嘗有所贈恤誨之妻今在生事微薄有子皆碌碌小官恭惟陛下臨御以來惠綏生民修眀庶政以成就先帝求治本指昭顯於世而開奬言者孜孜聼納凡臣子在前日輸忠獻直嘗有一言於朝者莫不收拾褒用之而誨不幸既亡不見遇於今日此天下有志之士所以歎息而不能巳臣不勝愚慮欲望聖旨嘉誨之有識敢言言不獲用利不得及於世哀其志節特賜褒贈及賜諡以表顯之録其諸孤稍賜任使非獨以慰幽壤蓋亦以勸天下之忠義而愧人臣之為姦諛者非小補也元祐元年七月上時為御史中丞於是尚書右丞吕大防同知樞密院事范純仁俱請復加吕誨贈典録用諸子之才者以旌名臣之後誨特贈通議大夫男由庚與堂除令入差遣上哲宗乞追贈張載張舜民臣伏覩鳯翔府橫渠鎮居住故崇文院校書張載學際天人誠動金石義之所在白刃可蹈心有不厭萬鍾何加口如不能言體若不勝衣議論感激凛如秋霜雖萬軍之將不足言其勇也平居與人言退然若不知讀書者坐而講貫剖判是非談辨如流雖滔滔江漢不足方其廣也著書萬言名為正蒙隂陽變化之端仁義道德之理死生性命之分治亂國家之經罔不究通方之前人其孟軻揚雄之流乎如荀况輩不足望於載也關中學者靡然就之謂之橫渠先生一登其門言行皆知孝悌仁義有如夙成雖去載千里之逺十年之久不敢一蹈非義常若載之臨其左右前後也自此西土學者灑然知先聖賢之學乃知鄉者誦説之冨組繡之文特小道爾在熙寧中纍薦朝廷召至闕下授以崇文院校書未幾以疾辭歸熙寧末年再至闕下神宗方將任用使行其所言其疾再作謁告西歸死於道路當時議者以謂載身逢眀天子緣飾禮文修眀治具之時再至朝廷竟不能伸其一言以終此載之短薄則不幸也有士如此當年不能興舉舉於老疾垂死之時治國者亦不得無慊然於心也載之死於今十有五年中外臣僚猶録其平生以言於朝廷者略以十數或乞賜田或録其子或乞降諡然天聽高邈未蒙響答今載止有一妻一子衣食不足寄託親友日來月往人情憒煩飢寒之憂其勢甚迫若不干告朝廷何所赴訴且君子平日修身謹行固不為身之與子孫也朝廷褒賢録善豈特為其賢者之後乎如孟軻荀卿揚雄於今千有餘年學者徒能讀誦其書而已至於禮貌寂寥孰肯來括大朝一旦列之封爵血食廟堂使後世觀之賢於孟軻荀卿揚雄乎賢於本朝乎故知臣今日之言非為載也伏乞朝廷檢會纍次臣寮奏陳於録子賜田追諡三者之間凡可以厚載者舉一而足庶使褒賢之典獨見於本朝為善之風不墜於今日元祐四年上時為秦鳯路提點刑獄上哲宗乞録用石介之後孫固等臣等伏見故太子中允直集賢院石介在仁宗朝文學行義名重一時經術博深議論堅正以扶持名教為巳任嘗與孫復胡瑗為國子監直講教飬人才士風丕變故至今論學校者稱慶厯之風然介志氣剛大不肯枉道以阿世而喜於分别邪正嫉惡太眀以此忤權貴取怨擠逐傾陷至其死猶不巳天下皆寃之其後誣謗雖已眀而歷年浸久無復為言之者今聞其子編於民籍略無生業日有飢寒之苦士議歎惜以為盛朝尚賢不應使名臣之後零落至於此極也臣等不勝拳拳欲望聖慈特詔有司録介之後以子若孫一人賜以一命使獲薄祿不墜厥世以副聖朝崇奬善人之意而為天下守忠義者之勸貼黃稱仁宗時館職石延年直講孫復身沒之後蒙官其子近日推恩吕誨包拯劉庠之子各任以職事天下感動如介之後冝在所録伏乞比類施行元祐五年正月上時為知樞密院事同韓忠彥趙瞻等上有旨官石佛中上欽宗乞褒贈江公望等吕好問臣聞之孔子曰示之以好惡而民知禁書曰王播告之修不匿厥旨夫惟不匿厥旨則莫若眀示好惡使民知禁而自從也所謂好惡者賞善而罰惡勿任已之私意而已矣臣竊見朝廷近曰用人賢不肖雜進所以好惡不分是非不别臣謂陛下冝先推眀以示四方潛德隱惡各有所處以定民志有不可緩者元符之末多士盈朝故司諫陳瓘江公望正言張廷堅任伯雨殿中侍御史龔夬等皆以忠直自奮知無不言捐軀徇國不顧妻子其後蔡京趙挺之等得志首加擠陷意欲使之必死不遺餘力巧發竒中衆為寒心賴太上皇仁恕力為保全得免誅戮死亡之後妻子窮困至今未復今京略正典刑而此數人尚在責籍子孫凍餒人皆憐憫獨陳瓘已贈諫議大夫任伯雨一子得官外江公望張廷堅龔夬等並未昭敘非所以示好惡而不匿厥旨也伏望陛下特降睿旨將公望等並行褒贈仍各官其子孫周恤其家使天下後世為善報國者知所勸勉而姦雄巨惡常有畏懲此誠所冝先也靖康元年七月上時為御史中丞宋名臣奏議卷九十五
