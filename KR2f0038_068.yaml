body:
  text: 宋名臣奏議巻六十八宋趙汝愚編百官門守令上真宗論資䕃人與知州流外人注縣令孫何臣聞為官擇人以爵馭貴共治之任牧守居先親民之官令長為急故前代目為遴選擇彼清流黜幽而陟明信賞而必罰或自剖竹之職入為三公或由握蘭之資出宰百里所以民無愁歎吏絶煩苛國家車書混并制度宏逺取士之法雜以隋唐考績之方參用周漢雖復名臣接武循吏連衡尚有由資䕃以登朝權知千里自胥徒而祗役正授一同或目不知書或心唯黷貨擾齊民而斯甚干大典以何多方属盛明尤宜釐革欲乞特降制命下審官院吏部流内銓應升朝官并京官資䕃入仕者非有灼然勞績未得與知州差遣應州縣官流外出身者非有殊常行止未得注擬縣令必若績用有聞功勤可録則有教無人卓茂魯恭為時而出咸平三年上時為京東轉運使上真宗乞委大臣銓擇守宰魯宗道臣嘗讀近書自唐季接五代或三四年或五六年亂離塗炭寃號天地金血之氣鑠盡冲和愁苦之聲求息不暇天禍既悔至聖勃興故太祖皇帝以神武大畧定天下有反掌之易太宗皇帝以至仁善繼恢域中成光大之業陛下奉而守之勤而行之彞倫叙矣故云亭泥檢睢壤恭祀謁太清之真館薦玉皇之大號至於必躬聽斷勵精理道以宵旰為宴樂處菲薄而久安從古王者徒載簡策爾唯親民之官政事最切未見區别其如民何今審官例差一知州縱耄昏無識以何道推降之銓司平配一縣令雖菽麥不分且無由擯斥之今為天下親民之官以十分論之黷貨害政未寘刑章者有其三清濁混然巧於情偽使在上知而不能糾舉者又次焉暗懦不能制猾吏不能審法令凝滯於物者又次焉貴游親属望風䕶養而不言者又次焉是則介然自守約已恕物不諂上不瀆下為陛下孜孜於民政者十不一二焉欲民之安其可得乎宣帝凡拜刺史守相必親見之考察其言觀其能否今或未然凡除知州通判京朝官知縣候滿三五人且令大臣具宴見之禮以遣之訊之以言而察其應對觀其詞氣而考其否臧才能者奬之不肖者退之縣令則擇臺閣有風鑒聞望臣寮主遣之能否之間各具其狀恐於聖政稍得其宜又審官之任本宰相之職宜妙選英哲以委之庶激濁揚清漸得良牧賢宰則斯民之大幸也或詔參預宰司覆令按驗亦不為煩唐故事宰相帶兵吏部者午前在中書午後歸本司治事是亦内外兼領之制臣不任狂狷干犯冕旒待罪之至天禧元年上時為左正言上仁宗乞非歴縣令不得為長吏包拯臣聞古之所重為民父母者縣令耳今之所賤而不能振起風教者亦縣令耳蓋擢用之際未精其選凡有清流素望或稍挾權勢之人即茍謀佗官恥為縣令但庸人下品甘於其職雖郡𨽻吏卒皆能訶制茍免罪戾之不暇欲振起風教為民父母其可得乎且今朝廷仕進清選大臣子弟偶縁文墨或希辟命即自下寮擢陞館職不然纔出外任例為簽判不繇為縣便作通判知州洎為長吏昧於民情懵然其間不知治道之出况四方多務令長尤在得人欲乞今後貼職并簽判及京朝官凡歴任中不曾任縣令及知縣者不得便為長吏按察之官且令歴知縣方得入通判知州如此則宰邑得其人長吏亦不能僥求而至慶厯三年上時為監察御史裏行上仁宗條奏牧宰利害錢彦逺臣伏以生民休戚繫於牧宰當國家委寄非有才識學術則為政疏矣朝廷授受之際固小文常事而千里取舎倚辦斯人故漢宣帝云與我共此者唯良二千石本朝太祖皇帝甞曰下民雖不分菽麥藩侯不為蓄養朕斷不容之誠聖人之深見逺慮知治天下之本在此而近歳審官院推擇知州並不以賢愚器識而選止用資考與至院後令自占員闕差定其間或面牆經術庸猥冗瑣老眊罷癃殘虐貪暴混淆雜進不敢裁黜暨拜吏而出豈復究心政事唯計圭田多少市估重輕苞苴稛載以濟所欲不然酷刑罰以快怒心飾厨傳以邀妄譽雖有循理君子茍身逺譽寡無階朝廷則汨没下流不能自振監司薦舉亦為虚名而容鄙淺人坐享厚禄通都㑹府積日可至况今諸道水沴螟害荐臻民之性命責在長吏若圖朝夕近効誠亦未可願少革弊事漸期蘇息具管見如左一欲乞天下知州除藩方舊除兩省以上及節將判知㳂邊武臣外其餘州軍並依故事量大小要劇分𦂳望上中下五等其𦂳望州送中書門下除上中下審官院一乞先命兩省官以上於曽任知州成資人内各舉一人須是履行潔白才識政事優長者送中書門下更令咨訪銓擇才器名實委能相副令分知緊州則如任内政績有聞特行超擢其所舉官亦乞奬拔如不稱職業貪猥阿枉并坐所舉官重行黜責一上州乞令審官院不以先次名目差定揀選合入知州人歴任内曽有兩省已上臣寮轉運使副提刑朝臣共七人保舉及曽知中州成資有勞績人除授仍委中書門下於都堂坐引與相見訪其學藴測其器度堪任牧長者方許降勅如知上州任内政績殊絶即令審官院磨勘引見送名中書門下亦與緊望州其勞績即不得以催驅省税理欠負除破應在課利増溢為數須是的為生民興利除害衆所共知者應如元因舉主擢用知上州其賞罰並依與緊望例所貴舉者不妄一中州即委審官院依名次先後差除候差定中書門下依上州例訪問才術如堪任牧長方得降勑其初任者入下州次任者無遺曠方與中州逺近資序並依舊勑如歴任内有贓罪及七十以上不得差注只與通判則貪夫息心懦夫自厲一武臣除主兵㳂邊差使外如合入内地知州即委樞密院具歴任勞績資序送中書門下施行一緊望知州添支俸料圭田從兵並乞比舊當路節鎮例稍増名數其合増俸料即以本州贓罰錢充每州所增不過數十千而可以養廉恥慰清節上州亦乞優立則例中下州即依舊一廣南西川有知州當知縣者自來例用新轉京官或移人充皆是新學小生未練政事雖地極僻左人民乃亦陛下赤子更賦輸入刑罰用捨與内地不殊何苦輕委其人加以去闕庭迂逺萬一不幸為庸人所擾嗸嗸無告况受命之日優賜頗多俸料加厚欲乞差合入逺地通判人充一内外文武臣寮不得以恩澤陳乞子弟親戚陞陟差遣資序委御史臺彈奏黜責一今既分列州郡地望以為資序遴揀惟人即望朝廷少假權任寛其銜策不為小人脅持盡所藴蓄一通判知縣縣令乞委所司依知州例銓量條奏右具如前臣所陳列事節皆臣愚者之慮大體如此且今天下郡國四百有餘以朝廷濟濟多士歳取英髦動百千計入流雜色亦以倍增求四百之才分守郡國不為艱矣使生民帖泰衣充食給則太平之効如指諸掌願皇帝陛下特留睿覽如允臣所奏乞送中書門下詳酌施行慶厯八年上時為右司諫上神宗乞寛假長民之官吕公著臣伏見審官院流内銓以知縣縣令闕多凡選人被舉充職官及轉京官者例差知縣已被差者不通舉辟不許避免臣竊以為當國家有道之時付之以百里之地有民人社稷之重則士子所宜願為今乃設一切之令强所不欲與坐殿負犯者亡異此殆郡縣法網太密而勸别之道不明吏有盡心奉法治行明白者未聞有所褒異一罹微文則不能自免於譴斥加以近歳朝廷以更改法度郡縣之吏或不能奉行故於常法之外峻其黜典經赦去官多不原免積累歳月坐此殿累者益衆臣愚以為長民之官朝廷宜少寛假非有贓私顯狀及罷軟尤不勝任者雖坐小法無輕替易仍詔諸路監司牧守其所属令長有奉公愛民治効尤異者每歳别薦三二人間或奬拔待以不次其次如職事修舉有舉主合轉京官者特與依諸州教授例就任改官許令再任如此則勤廉者得以自保勞能者有所激勸中才足以强勉異効不至滯留熈寧二年上時為翰林學士上哲宗乞十科外增撥煩一科上官均臣竊見前日勅令太中大夫諫議待制以上每歳以十科薦士兹見陛下博收羣才因能任官之意自三代以來設官分職雖多寡不同然取人大要不過或以徳行言語政事文學而已今以十科取人其於徳行言語政事文學之選固已兼取然論政事止於治財賦聽獄訟斷請讞三事而已竊恐政事之目有所未盡何則能治財賦者未必長於聽獄能聽獄者未必長於斷讞能此三者未必寛信敏惠足以長人今之所謂長人之官者守令是也今之守令雖有累歳月用薦舉闗陞之法然至於劇郡大邑若止循資序不加選擇恐未必得人有傷士敗材之弊不獨如是自比年以來郡縣考課之法文具而不行未聞擢一良守進一賢令以聳動天下故郡縣之吏亦務為碌碌細謹守繩墨治簿書督租賦而已未聞諄諄慈良以治人為務蓋自非豪傑自信之士未有不待賞而後勸也若褒賞不加薦舉不及天下守令長於理劇者豈復有亹亹樂進之心哉臣欲乞於十科外更益以才堪治人能撥煩者别為一科劇郡大邑有闕因以除授如此則人無遺才而天下之守令莫不勸矣守令勸則郡縣之政理天下之民被朝廷之徳澤而太平之功立矣元祐元年七月上時為監察御史上哲宗乞十科外增撥煩一科係第二狀上官均臣昨於七月二十二日嘗具奏論太中大夫諫議待制以上每歳以十科薦士外更益以才堪治人能撥煩者别為一科至今未䝉施行臣竊以為治天下之道以民為本朝廷之政令法度加於四方者莫不在民而治民之親者實在守令之能否守令能否實係政令之廢舉生民之休戚自漢及唐號為至治者如孝宣太宗明皇未嘗不孜孜選任以守令為急當是之時徳澤流暢逺近乂安無疾苦愁嘆之聲者誠郡縣得人之助也今天下列郡三百為縣千餘其守令治績章章可稱者罕見其人則朝廷徳澤之壅閼逺近民庶之未安蓋有由矣兹豈人材之不迨曩昔耶由奬勸選任之術未至耳奬勸之術無它在夫使貴臣薦之而朝廷旌用之而已彼天下之士大夫雖均為守令有以才見稱為達官之薦使治劇郡大邑則才者樂於在上之見知而四方之守令莫不觀望而勸進故薦舉拔用不過數十而天下郡縣之吏靡然鄉風矣不過數十年而天下之良守賢令彬彬布於州邑逺近之民豈憂不治哉又郡縣之政訟有聽斷聽斷有得失民有賦役賦役有當否至於政有寛猛獄有繁簡民有喜怒守令之能否較然彼薦舉之官恐有不稱之責且不敢妄薦則薦舉之不得人非所患也今以十科薦士下至理財斷獄請讞皆得預選彼寛厚明敏長於治人者獨不備數郡縣之吏必以為朝廷輕守令之選而不以民事為重也夫賞之則勸沮之則惰者人之常情也薦舉不及奬勸不加而責天下之守令鋭意於治民而奉朝廷之法令臣愚竊恐其未能也夫守令之職以愛養安治為本清心治已為要自非寛厚明敏學道愛人者鮮能及之蓋春秋長於治人由求孔門之髙弟僅能宰千室之邑治千乘之賦况其下者乎今十科薦士下至理財讞獄之細皆得被選至於寛厚明敏善於民事者獨不及之是取小而遺大畧本而詳末天下郡縣之吏將且怠惰茍且不復勸勵朝廷之徳澤志慮誰與宣而奉行歟蓋朝廷出一令立一法實繫四方之觀聽百官之趨嚮不可不審其發也願陛下詳覽臣之愚言若粗闗治體不為無益乞增薦條以備遺缺元祐元年八月上上哲宗乞察守令能否朱光庭臣竊以當今圖治最先務者莫先於擇守令郡守得其人則千里受其賜縣令得其人則百里受其賜朝廷更新法度惠養元元獨於擇守令所當先務者而反後之此臣之未諭也臣欲乞朝廷先謹擇監司然後令諸路歳以郡守能否諸州歳以縣令能否聞於朝不必如向時殿最之法須拘一二事狀但欲稱職者必聞非才者必舉其後朝廷或遣使詢察或採聽風謠審考其詳以校監司州郡所上得實者為稱職失實者為非才蓋守令能否萬口所稱尚不能知欲其察知民間微隱不亦難乎便當廢斥不得復為按察之官如此懲激孰敢不盡其心守令有善政者即加旌别使之久任如此則率土之人皆䝉惠澤太平之功成有日矣元祐二年上時為左司諫上哲宗乞差知州先舉主後資任吕陶臣竊以今日任官之弊其輕且濫者唯郡守為甚也封疆千里生聚萬衆休戚所繫而不問能否一以資格用之為半刺兩任有薦者三人則得之矣侮法慢令戕民害物十郡之中常有二三暗塞不治又有一二舉天下億兆之衆十分而言失其惠養者將半矣承流宣化又何望焉方今朝廷清明百度備舉憂勞元元以固邦本唯恐一夫不獲而牧守之弊紛紛至此甚可痛也昔兩漢盛時政平訟理民安其業者皆循吏之效唐之貞觀開元號為善治太宗亦嘗自擇刺史誌其姓名於屏風而用之當時名臣如馬周張九齡輩皆極言刺史不可輕任載在史冊足為龜鑑前日朝廷患監司不得其人乃詔近臣舉用而監司之選稍稍清矣至於郡守尤為親民畧而未議是棄民也臣伏請詔内外待制太中大夫以上於通判資序人内歳舉堪知州者三人朝廷更加審察送吏部籍記名氏凡遇有闕先差有舉主者如資任未及即差權知其次方差資序合入人庶牧守之職有以庇民循良之風無愧前古貼黄天下民事之重大則一路付之監司中則一郡付之太守下則一邑責之縣令如臂指之相附如綱目之相維國朝之制既舉監司以清一路又舉縣令以治一邑則一郡之守亦宜舉矣自八路差注已來此選尤濫蓋於本道就短求長自知縣兩任則得為通判自通判兩任遂為知州其猥濫庸謬不可勝言今已收闕歸吏部似此等人皆可指占州郡之寄雖人材絶無所取而資任合入則不可不與虛授濫除生民何賴伏請特立薦格以清其流元祐二年三月上時為殿中侍御史宋名臣奏議巻六十八
