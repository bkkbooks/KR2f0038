body:
  text: 宋名臣奏議巻三十八宋趙汝愚編天道門災異二上仁宗論火災地震韓琦臣聞動民以行不以言應天以實不以文先儒之讜議也故宋景公以熒惑守心不忍移臣庶之咎子韋稱君有至德之言熒惑必徙三舍此則以實應天之效也唐明皇以太陽虧蝕悉令赦徒𨽻之人宋璟謂可以至誠動天不在德音頻降此則以文應天之弊也載籍所記前範至詳不敢煩陳粗此槩舉臣伏覩近者興國寺災延及開先祖殿不踰數刻但有遺燼伏觀垂象或失經行蓋人事之已形致天災之嗣發其猶影響諒匪徒然當是時臣謂陛下宜虚宁以求讜言側身以修庶政有功則賞以絶其徼幸之路有罪則罰以清其姦慝之原旌别賢愚撙節財用抑宴私過度之樂休營造不急之務決獄使之無濫出令斷於必行斯以念祖業之艱難荅天意之警悟也而陛下眷三京以肆赦宥走羣望以罄詞祝中自禁掖外及觀寺並設齋醮逮越晦朔今北道數郡繼以地震上聞即命使軺就崇法供矧玆近塞俯接殊邦豈無間諜之人往道祈禳之事徒彰自恐或誚無稽雖陛下欽順皇天之誠可謂至矣其於銷伏災眚之道則猶未焉夫弛刑網以貸頑悖之民損國貨以奉游惰之軰將欲召丕貺感靈心是猶却行以求前揚湯而止沸無益之驗信昭然矣臣茍隠情惜已不能獻忠盡言使陛下常以禮緇黄薦牲幣為修德除患之本則臣豈不上負陛下懼災思政之意哉謹按五行傳曰火南方揚光輝為明者也其於王者南面嚮明而治賢佞分明官人有序率由舊章愛重功勲則火得其性若乃信道不篤或耀虚偽讒夫昌邪勝正則火失其性自上而降乃濫火妄起焚宗廟燒宮館雖興師衆不能救也此臣前所謂宜辨賢諂明賞罰謹命令戒奢逸者由此而言也曷有流化興政之若是而天不降福者哉且地震者說者以謂天陽也地隂也陽君象隂臣象君宜轉動臣宜安靜乃女謁用事臣下專政之應此乃飭宮壼禀教臣鄰奉法以當斯變又夷狄者亦中國之隂也今震在北或恐上天孜孜譴告俾思邊㓂之為患乎亦望自今而後務在嚴勵守臣密修兵備審擇才謀之帥悉去懦弱之士明軍法以整驕惰之卒豐廪實以増儲峙之具或曰今夷狄守盟誓約甚固奉朝廷有禮初無釁隙保不騷動未可生事以疑戎心此寛陛下宵旰之憂可也為國計則疎矣臣辭意狂鄙不識禁忌儻陛下聽斷之暇一紓睿覽采而行之少助萬分之一則臣退就鈇鑕死無所恨景祐四年十二月上時為左司諫上仁宗論星變韓琦臣近者竊聞星變數見輙貢瞽見備言禳謝之理殆將百日不賜妄言之誅是陛下知臣所陳歸於朴忠而非惑上好訕也然臣意有所未盡更思竭愚區區鄙誠萬一開悟臣近日又聞大慶殿及諸處復建道塲及分遣中使偏詣名山福地以致精禱臣以謂陛下俯從常禮不得已而為之是亦達寅亮之深旨也臣竊以天垂祅象地見災異前世之君覩之感悟以為祈禳之法則必徹樂減膳修德理刑大則至有下詔以求讜言側身以避正寝是以天意悅穆轉禍為福臣願陛下法而行之復恐此後宮中或有宴飲之事欲望比於常時稍用減節不獨仰奉於天戒斯實上安於聖躬臣子之心所以昧萬死而獻言者正為是也且大慶殿者國之路寝朝之法宮陛下非行大禮被法服則未甞臨御臣下非大慶㑹則不能一至於庭豈容僧道凡庸之人繼日累月喧雜于上非所謂正法度而尊威神也昔髙宗立皇太子将㑹命婦於宣政殿博士袁利諫曰前殿正寝非命婦宴㑹之地望請命婦會於别殿自可備極恩私帝納之即命移于麟德殿臣亦望今後凡有道塲設醮之𩔖並於别所安置臣親逢求諫之朝復在可言之職宜推無隠思所為報願陛下特霽天威一加詳納天下幸甚景祐四年十二月上上仁宗論星變地震冬無積雪韓琦臣旬日前竊聞民間傳言星躔示變及京師曾有地震之異亦聞朝廷建置道場臣自忝諫職數因災變陳事意謂陛下粗記臣言故遷延未敢更獻愚瞽數日來又聞河東忻州地震連日大壞官私舍宇傷損人命臣慮陛下近歲以來頗有災異而常事待之且未足多掛聖念但齋醮道場而止臣是以不敢無言更思禆補臣聞以實應天則天必報以德勝妖則妖自息今上穹頻頻謫見以感陛下蓋欲觀變而懼増修德政則将轉禍而為福豈其虚發哉若陛下以為無足可驗不思警悟之理或上天倦而且怒則黙而為禍矣今躔次之變知星者必具言其事至于地震之理稽于舊史則大臣專政後宮用事陽不足而隂有餘之應也今朝廷凡百行事皆由政府陛下雖知其是非而不加聖斷亦大臣專政之應後宫之事非外臣所知亦望禁其太盛以答天變臣願陛下每覩灾異先詳其理而應之然後省身之所未思而思政之所未至夫崇儉約以訓九族而純德變於天下節宴遊以謹萬幾而勤政率於天下亦修身之大略也輔弼得人而庶務恊其序賞罰得中而二柄歸於上邉陲廣備而将帥擇其材亦修政之大略也陛下若舉其要而行之則上天豈不降福而為災沴乎況陛下首相久病髙臥私室備禮上章無堅退之意安祿固位上不分聖憂下不畏人言假令病愈而出則中書之事必更無倫理蓋才短識暗而然也陛下豈不思求才而代之使修正紀綱亦禳謝之一端也又今冬以來尚無積雪旬浹之間將及春序不惟已覺愆旱兼恐人民疾疫欲望陛下躬行精禱庶獲喜應今舉朝之人皆以不言為利無一人為陛下切直而言者臣非不知直言為患然選任之恩不欲碌碌雷同衆人故昧死論列不顧鼎鑊之罪惟望少采狂愚天下幸甚景祐四年十二月忻代并三州言地震壞廬舍覆壓吏民忻州死者萬八千七百四十二人傷者五千六百五十五人畜牧死者五萬餘代州死者七百五十九人并州千八百九十人自是河東地震連年不止或地震裂泉涌或火出如黑沙狀一日四五震民皆露處琦上此疏上仁宗論并忻州地震龐籍臣聞應天以實不以文動人以行不以言所以天意順感而人心悅隨也伏惟陛下躬仁聖之至德紹積累之慶基亨嘉式應文武並用邊隅不聳年穀屢登然而秋冬以來雷雪不時流星為異今又地震并忻之郡傷殞人命甚可駭也推本天戒必有厥由以陛下恭勤寅畏動遵軌範宜不當招致災眚臣竊思之恐在時政有所差失人情有所壅蔽也將欲應乎天而動乎人必當求其實而篤其行誠在陛下與執政之臣力行之也力行之道莫若先正其綱紀恭以祖宗垂業典刑具在守而勿失可臻至治將外制四海當首自京師故三聖以來因事立制凡百司務皆著條敕所以禁踰越塞僥倖也向來或因一時為例而破之或因臣下營私而廢之法既動揺政或隳紊而欲訓齊諸司規表天下難矣故要在執政大臣持守之也持守之者要在以身律人先國後家以求賢之意為急以子孫之計為末至公既立誰敢為私然後可以守畫一之法使無踰越塞私謁之路使無僥倖施恩必平不以勢地為異罰罪必當不以惠姦為寛國之紀綱此實至要在力行之而已至於前代因天地之異莫不廣求厥理而消復之下罪已之詔開直言之路人情暢於下則天理順於上此誠今之切務未聞朝廷行之恐但用釋道齋醮之文無所益也臣迹孤地寒材駑識闇上賴陛下天地父母之恩獲立忠義之地敢冒天威輙陳愚悃者亦犬馬之思報也惟陛下矜憐而察之景祐四年十二月上時為侍御史知雜事上仁宗論衆星流散月入南斗韓琦臣竊聞近日司天監上言占見衆星流散又奏月入南斗中臣職在諫列得於風聞不敢隠情惜已容黙于位實願輸盡愚瞽有補萬分之一焉臣聞人事失于下則天變發于上惟明聖之君覩之感悟責躬修德所以除患而福至是猶影響相應之速也而朝廷自去年秋熒惑失度及太平興國寺災乃命疏理繫囚自大慶殿至諸寺觀並集僧道以為禳謝之法繼之以地震北郡遣使興建道場近者又聞太隂失行復詔三京減降罪人於金明池等處亦設齋醮臣屢上封奏極言無益所期庸妄之説少開聖聦而前月中杭州又奏有大風雨悉壞官司廬舍復有獻謀于陛下者乃降敕本郡崇佛事以禳之外方有識之士必有非笑者焉陛下若以災異數見非政教之失但可竭財以奉僧道寛禁以貸罪惡是謂天戒可答靈心必回則今日之謫見又何從而致哉今天之譴告孜孜不已者得非陛下未達警悟之意耶夫赦者前賢以為偏枯之物非明世之所行也茍行之則小人之幸而君子不幸矣又金銀錢帛出自蒼生膏血取之以供國之用尚宜撙節又況枉費以資游惰之僧道乎以陛下之聦明睿智諒久知其不可今若再舉禳災之術復踵前弊適足誤陛下也臣不敢妄究星緯但取前史所載開陳其端夫月為太隂之精刑罰之義列之朝廷諸侯大臣之象也故大臣用事兵刑失理則月行乍南乍北又南斗者丞相太宰之位主褒賢進士選授爵祿若小流星百數四面行衆庶流移之象也今天之所戒者恐宰輔之任未副聖心褒賢授祿或失其宜故太隂罰斗以應之夫代天當軸之臣未副聖心則政教浸隳矣政教浸隳則隂陽失和而水旱移時水旱移時則衆庶流移之患亦從而至矣漢史曰宰相上佐天子爕理隂陽戴記曰邇臣守和言近臣調和君事者也今聞政府議事未甚和協互執所見或有違戾即如近斷一大刑名此特有司之事又復别旨議定於理明白而猶固執紛競上煩聖斷豈大臣之體哉廟堂之上論道之際必有甚於此者固非下臣所知矣如此而望隂陽調君事和政不失于下變不形于上其可得乎方今之宜莫若注意賢宰協輔朝政使其同心一意推用所長然後賞罰二柄更思其中謂名器不可輕授也則賞不加於無功謂紀綱不可寖弛也則刑必行於有罪知財貨之有限也則量用度而裁減之知軍旅之久惰也則明號令而約束之一令之出必信於人一言可嘉必用其計盡平僥倖之路精辨愛憎之言推此以斷天下之務則陛下髙居穆清垂拱而治太平之基既隆且固矣雖有象緯之變流行之災自當易而為嘉祥散而為和氣矣芻蕘賤言不曉禁忌思有報君父甄擢之遇非敢訐上而取直也唯陛下熟察之景祐四年上時為右司諫上仁宗論星變地震火災宋祁臣聞王者父事天明母事地察政合而祥至道失而咎臻自然之應也然至亂之世不能絶祥甚治之代不能無咎僻君以祥而自泰故益侈而趣亡賢主以咎而自警故修德而蒙祉蓋祥無必慶咎無固凶視銷伏之如何耳臣伏見頃歲以來災眚數見陛下奉承郊丘歲豐月㓗當䝉介福翻致大異何哉得非事有召姦法有階隙天於宋室諄諄存顧先幾預慮以啟聖心欲陛下據易圖難緣微警著奮揚剛德固執主威壓銷未明以光丕業也臣伏讀前史五行志以驗于今累威重譴不可不察若乃羣星流散則民人蕩析之象也月行黄道地震州邑則邊戎窺間臣下擅恣后妃将盛年穀且饑之兆也去年火災興國寺浮屠延燔藝祖神御殿已而盗壞宗廟釦器者再則神不昭格之意也自昔災異之發逺者十數年近者三四年隨方輙應𩔖無虚已陛下何不暫形清慮推求其端方今典刑設張上下禔穆而臣便論危事必難取信然陛下試一念之假有蕩析以何䇿固安假有饑空以何理振救脱致窺間可任之将謂誰儻令擅恣可防之姦有幾災異不驗國之福也茍使遂驗則陛下禦之之慮得不素具於胷中哉然請先言其要臣聞君以操柄為重臣以奉命為恭柄捨之則重者反輕命竊之則恭者更僣伏惟陛下念爵賞之典刑罰之權雖覧羣言一決宸慮無委成假借以開貴近牽制之私書稱惟辟作福惟辟作威威福者天子之所以固大寳制兆人之術臣有作福作威則害于而家凶于而國古之王者亦何能使刑悉當罪賞皆值功要之事出于主則納忠者有歸政出於臣則植私者必遂傳曰倒持太阿言柄之不可失也又曰吐珠必含言失之不可收也若夫後宫戚里祈恩丐賞者日月不乏陛下且當斷而不聽以示至公内省黄門給事左右亦宜數加訓敕使恩不出位此皆助陽抑隂之術也臣聞伯禹三王之長逢災引慝宣王成周之良遇患側身故能感徹神祗收還威怒回沴氣為太和化已衰為中興陛下覽照今古至詳至熟今變眚日著中外暴聞而罪巳之問不形於詔書思患之謀不留於詢逮委逺天戒虚而未荅踰時越月羣下黙然間者但引緇黄晨齋夕唄修不經之細祀塞可懼之大變人且未信天胡可欺臣誠至愚竊恐銷伏之間未為得計也伏望陛下不以災之未應遂為宴安不以歲之屢豐便忘荒饉普使百執各貢所懷庶幾天下條貫粲然先見臣粗舉六事以禆萬一聨寫于左如有可采續當條陳科别惟陛下裁赦其罪姑垂省閱寳元元年正月上時為直史館同知禮院上仁宗應詔論地震春雷之異蘇舜欽寳元元年正月十日詔曰朕紹膺景命撫育中區對天地之宏休奉祖宗之成憲常懷惕厲靡敢怠荒一志于玆十有六載兵戈偃戢方隅底平百稼屢登億姓咸乂雖未臻至化抑可謂小康而去歲以來衆異間作星文流變謫見於穹昊坤載震揺沴生於邊鄙定襄之郡為害将深室廬墊䧟以實蕃黎民壓覆而斯衆飛奏繼至予心惻然而又春候方初蟄户俄振退而脩省罔究端倪蓋朕體道雖勤燭理猶昧以凉德而處尊位以眇質而保鴻名致此禨祥敢忘戒懼爰申誕告式佇讜言其或朕躬之闕遺執事之阿枉政教未臻於理刑獄靡協于中在位有壅蔽之人效官有貪墨之吏仰諫官御史縉紳百寮密疏以言悉心無隠限半月實封進納朕當親覽靡及有司擇善而行固非虚飾咨爾多士宜體朕懷臣昨初到京師聞河東地大震裂涌水壞屋廬城堞殺民人幾十萬厯旬不止臣始聞惶駭疑惑竊思自編冊所紀前代衰微喪亂之世亦未嘗有此大變方今四海接統内外平寧戎夷交懽兵革偃息固與夫衰微喪亂之際頗異是何災變之作反過之耶且妖祥之興神實尸之各以𩔖告未嘗妄也臣以謂必無是事是亦傳言之濫耳厯問一二朝士皆曰有之因退思念天人之應古今之鑑大可恐懼凡朝廷政教昏迷下受其弊積鬰不和之氣上動于天天於是為下變異以警戒之使君人者回心修德飜然向道則民安而災息是故古之王者逢天地之變則必避正寝徹樂省饌詢訪正議考求失德而更去之蓋以上帝聦明所作必驗茍弗知懼則非常之孽隨之今此異既告豈徒然哉則王者豈宜常安於逸豫信任近狎而不省政事乎廟堂之上執事者豈有非賢才或專威福而侵君者乎其所施設之政豈有不便於民者乎深宫之中豈有隂教不謹或以媚道濫進者乎臣從逺方來不知近事心雖疑而口不敢道宫禁夷狄之事固未可知朝廷已然之失則聽輿論而有聞焉又訝朝廷知此大異殊不修補闕政以厭天戒而安民心黙然不怪如平常無事時諫官御史亦不聞進牘白見鋪陳災害之端以開上心然民情汹汹聚首横議咸有憂悸之色豈時與古不同今朝不宜倣古以為事耶又念有天下者未有不監古而治棄古而亂也豈上位者務在鎮静不須與民同憂耶則又民為邦本未有本揺而枝葉不動者豈民愚暗不當憂而憂耶則地之震天之所為也民雖愚天豈愚哉反復思之不覺驚怛流汗自以世受君祿身齒國命涵濡惠澤以長此軀便欲盡吐肝膽以拜封奏又昨見范仲淹以剛直忤姦臣果罹中傷言不用而身竄謫甚可悲也是時降詔天下不許越職言事臣今茍務激切不避權右必恐横遭傷害無補於時因自悲嗟不知所措既而孟春之初雷電暴作臣以謂國家之失衆臣無有為陛下言者惟天丁寧以告陛下也陛下極聖至明其肯忽之果能霈發明詔許臣僚皆得獻言臣初聞之踴躍欣忭又謂雖有災異陛下能講求嘉言革去時弊故可變化而召嘉祥也旬餘日來聞頗有言事者其間豈無切中時病而絶不聞朝廷從而行之是言皆虛言而不根實效也臣聞惟誠可以應上天惟實可以安下民今應天不以誠安民不以實徒布空文増人太息耳将何以謝神靈而救弊亂也豈大臣䝉塞天聽不為陛下行之豈言事者迂闊無所取而不足行也此則未可知今臣竊見綱紀隳敗政化闕失其事甚衆不可槩舉謹條大者二事詣匭以聞伏望陛下少賜觀覽茍有所采乞㫁自睿意即時行焉言或狂瞽乞付臣鈇鑕以非所宜言罪之一曰正心夫治國如治家治家者先修於已修已者先正於心心正則神明集而萬務理也今則民間喧傳陛下數年以來多引俳優賤人於深宫之中燕樂無節賜予過度燕樂無節則志荒蕩賜予過度則心侈泰志荒蕩則政事不親心侈泰則用度不足臣竊觀國史見祖宗逐日視朝旰昃方罷猶坐於後苑門有白事者立得召對委曲詢訪小善必納真宗末年不豫始間日視事今陛下春秋鼎盛實宵衣旰食求治之秋而乃隔日御殿此政事不親之效也今又府庫匱竭民鮮蓋藏誅歛科率殆無虛日三司計度經費二十倍於祖宗時此用度不足明矣政事不親而用度不足斯大可憂也伏望陛下修已以御人洗心而鍳物勤於聽㫁舍其燕安放棄俳優近習之纎人親近剛明骾正之良士因此災變以思永圖效祖宗之勤勞惜社稷之廣大則天下之幸甚也二曰擇賢夫明主勞於求賢而逸於任使然盈廷之士不須盡擇在擇一二輔臣及御史諫官而已今陛下用人似不謹擇昨王隨自吏部侍郎轉門下侍郎平章事超越十資復為上相此乃非常之恩必待非常之才而王隨虛庸邪諂非輔相之器降麻之後物論沸騰故疾纒其身災仍於國此亦天意愛惜我朝陛下必鑒之又石中立頃在朝行以詼諧自任士人或有宴集必置席間聽其語言以資笑噱今處之近輔不聞嘉謀物望甚輕人情所忽使災害屢降而朝廷不尊蓋近臣多非才者陛下左右尚如此天下官吏可知矣實恐北庭輕笑中國伏望即時罷免别建賢才臣又竊見方今以張觀為御史中丞髙若訥為司諫此二人者皆登髙第本望以詞華進用素履温和軟懦無剛鯁敢言之才斯皆執政引拔建置欲其謹黙不敢舉揚其私時有所言必暗相闗説旁人窺之甚可笑也故御史諫官之任臣欲陛下親擇之不令出執政門下臺諫官既得其人則近臣不敢為過乃馭下之䇿也臣以謂陛下身既勤儉輔弼臺諫又皆得人則天下何憂不治而災異何由而生伏望陛下少留意焉非有難也臣不勝區區之意寳元元年正月上時監在京店宅務上仁宗應詔論地震春雷之異宋祁臣伏讀丙午詔書陛下祗悼變異不忘元元受愆引咎端自克責延問有位廣謀于衆推變所自前事立防将欲還威譴於天極荅震眚於坤順雖姒王罪已商宗念德蔑以加之羣臣莫不延頸企踵恭聽允令使誠有鹵莽之慮窽啓之詞咸樂自效納于聰聽益潤澤附輝煌以成日新之美臣愚不肖職在史氏位為臺郎𩔖非無知不容自棄輙敢條列近事上對冲旨詔曰朕躬之闕遺臣伏惟陛下即位以來十有六年孜孜翼翼動守先訓不侈宫室不飾游畋偃兵緩罰愛重人命無它過失聞于天下雖自謂闕遺愚臣昧死不敢奉詔然有将來可慮者臣願一一陳其崖略陛下試參之聖慮揆之人事測之天災質之古義有可行者不以人賤而廢其言則臣生死幸甚臣聞賞罰操決天子之權也奏請可否大臣之事也下陳可否以佐上操決則百度乂寧一人尊彊竊見陛下臨視庶政深執謙德不自先㫁專委大臣使大臣人人如臯陶家家為后稷尚且不可況有託國威而肆忿寄公爵以植恩者哉臣請粗陳其要且如陛下自欲有所拔擢大臣以為不可陛下從而罷之又如自欲有所黜去大臣以為不可陛下從而任之如此則權常在臣政不在君昭然可見矣陛下何所忌憚而不略加裁詰遂使中材之人料時之如此欲自結於朝者還附於權黨欲自徇於公者反入於私門威柄寖移人心攸繫此将來可慮一也伏望陛下自今以徃審察臣下果有盡忠守正可器用者進擢於朝但論其材勿限資序陛下以萬㡬餘景引入便殿賜以清宴普詢闕漏又以所得參校時政質其是非俾之中外相應更相推紏則彼之投身納報惟陛下之歸不在它矣臣聞邪之與正譬猶白黑可以立辨今陛下既以此事為正俄而有以為邪者因復中止更為猶豫此最不可之大者夫謀之雖衆決之欲獨劉向曰持不斷之慮者開羣枉之門蓋指此也臣願陛下臨事即斷勿復持疑無令浮議熒惑敗亂美政臣聞忠臣之事君造膝而言詭辭而出所以啟心防患也陛下亦宜隠秘其語保全其人儻漏露主名則為所譏刺者皆切齒而思報矣興譏造謗不退不止一旦罹患而後來者傳以為戒皆茍容媮合背公入黨則陛下雖有盈庭之士朱紫雜襲誰肯與權貴立敵進言而取禍哉此無異絜仇以授姦人自閉其耳目萬事之安危天子不得復聞之矣臣比見兹事已驗於前伏望陛下考大易失臣之義無襲春秋陽處父之枉此将來可慮二也臣伏惟陛下春秋鼎盛皇嗣未立後宮所御當貫魚序進廣求螽斯子孫之福伏望豫示敕誡昭判貴賤使上下有制不相踰越讒謁毁間明垂防禁數詔后妃習知謙退和柔之懿無令僭妬得萌其中此将來可慮三也詔曰執事之阿枉臣不足以慮之然所為怪諫官御史本以選進鯁亮震肅權綱為天子之耳目也今則不然有勢者其姦如山結舌而不問無援者索疵吹毛飛文而厯詆未及滿歲已干宰司希兼職而求進秩矣如此則宰相有失諫官御史肯為陛下盡言乎使言者捨當用而取不急陛下果可聽之乎臣故曰諫官御史出宰司之進拔者非陛下之利也夫輕授重責難以得人但賞不罰難以肅下今若令居是官者終歲不言及言而不當坐不任職退挾持私意有所回匿坐故縱誅不畏彊禦議劾嚴正者陛下自意擢之無令有司得與此亦救阿枉之一也詔曰政教未臻于理刑罰靡協于中在位有壅蔽之人效官有貪墨之吏臣聞傳曰正其本萬事理又曰人存則政舉人亡則政息茍使天子持柄于上羣臣率職於下如臣前所陳者大猷幾務将交修畢舉矣安有政未臻理刑靡協中乎至於海縣浩繁官不失善或察亷無状或貪冒公行或民窮無訴或事紛未治大且抵死小則免官案章一下交手受械事輕人末曷足應天變而闗國體乎要之災異之發政數之本在朝廷君臣之間耳詔曰擇善而行固非虛飾此誠陛下勤懇悃愊紬繹下情申啓言路而必收治效也臣聞徒善不足為政徒法不能自行天之感物不為偽動今陛下惴恐自反已降德音羣臣将畢精極慮隨事納説必有可采伏望朝廷開許施行此則順民心承天意轉禍為福聖人銷伏之實也然臣尚有所慮者今臣下準詔例得獻言不深切則事不明白或恐有昧儀矩罔識禁忌論安危則便云泰山累卵指宴飲則直曰酒池肉林望陛下納汚含垢一切裁赦兼容博聽以取其長勿令有坐狂言而得罪者則聖德愈光大矣寳元元年正月上時為直史館同知禮院上仁宗應詔論地震春雷之異係第二狀宋祁臣伏以陛下躬至聖開大明數引近臣延謀急政退託不敏開敢言之路日昃便坐以須告猷夫人君據安而念危則終不危操治而慮亂則終不亂何則幾微之兆成敗之端森然前判於胷中矣臣向已被詔對所欲言事聞於上未合明德陛下赦其無狀再降德音似欲竭盡下情以禆萬一顧臣敢無辭而對人臣之所以有朋黨者何也由忠邪不早判耳且君子得位必引其𩔖使協濟忠力不為私也小人獲進亦引其𩔖使扇動聲勢不為公也君子指小人所引因曰朋黨小人指君子所引亦曰朋黨君子常少小人常多此人君所以易惑而難辨也陛下何不質之以事驗之以言其言也隂賊忌害巧為迎合聽之似可用察之而無實小人也其言也質直蹇正多所補益聽之似逆耳察之而有實君子也又以其言驗其人之行事事與言合者為忠事與言反者為邪不黜其邪不進其忠則朋黨終不除矣臣下之所以䜛佞得行者何也由朝廷聽言之路太廣也夫正人能言邪人亦能言古者稱言之無罪者謂有道之言也若邪人憑虚以害有位架妄以間忠臣亦以為不可加罪則是以言喪邦矣且邪人緣隙投詐寄事造姦詆人必以難驗之文傷人必以似是之語使進不得自辨於主退有以離間於君於是正人幽憤有功抑退如此者陛下雖加罪焉可也正人則不然毅焉中立侃焉正論引古今之宜根刑政之本質之衆則無害措之事則可行不為勢傾不為利奪如此者陛下雖加賞焉可也故大闢言路而正言不賞妄言不罰則䜛佞終不去矣今議者皆曰朝廷誠安且治臣以為不然夫三患未去安得為治直亂之未作耳請試言之夫與賢人謀事而與不肖者斷一患也重選大臣而輕任之二患也大事不圖而小事是急三患也何則賢人必為國計而不肖者專為身謀為國計者必恃至公故言直而援少為身謀者專挾已私故喻巧而援多人君不能察之則姦詐行矣於是言長利者則破之以小害使終不能為利圖大功者急之以近效使終不得立功善令方下而謬令移之矣公議始行而私議奪之矣且不肖之人已不能忠而忌人之納忠已為不善而能敗人之為善改白作黑以是為非若朝廷已知其姦不能斥去郭公所以戒亡也已知其賢而與不肖者並任之劉向所以獲罪也此方今患之最切者也夫大臣左輔右弼參贊權綱朝訪夕對彌縫漏闕既以為忠且賢而擢之材且能而任之矣是宜待之以無二責之以一心今或指纎瑕采飛語小則被疑大則賜罷朝為臯夔暮為檮杌遂令家無全節人無全行何其有道之世而賢者之乏耶誠任之失其理矣徒使繼至者瞻前畏後偷合取容事存形跡日防猜阻捨國事而不慮茍身謀以自安大臣如此陛下何賴焉且君視臣如手足彼將以手足為報君視臣如路人彼亦将以路人為報此患之次也聚天下莫急於財鎮天下莫切於兵制四夷莫神於機任天下莫謹於官今財已匱而不肯計兵甚冗而不能擇機至而不敢謀官濫而不知選而執事者但且計小利害責小經費羣對而旅前取旨而奉行日循一日歲偷一歲陛下又不念此寧是朝廷福耶此患之又次也假如萬一邊境有事盗賊相扇甲兵宿野糧饋在路此時三患不去誰能出身為國與陛下共此安危耶誰能執節慷慨與陛下前死不顧耶臣故曰非能治也直亂之未作耳陛下誠能詔中書門下使擇天下之冗官稍清流品詔樞密院去天下之冗兵寖明紀律斷自宸慮必取成功不使渙汗復收匪石中轉則縣官之財有數年之饒為萬一不虞之備䇿之善者臣智識庸暗不足上當清問輕率狂狷惟陛下裁貸其誅寳元元年正月上宋名臣奏議巻三十八
