body:
  text: 宋名臣奏議卷三十一宋趙汝愚編帝系門皇太子下上仁宗乞因兖國公主出降選立皇子歐陽修臣聞言天下之難言者不敢冀必然之聽未必聽而不可不言者所以盡為忠之心况臣遭遇聖明容納諫諍言之未必不聽其可默而不言臣伏見自去嵗以來羣臣多言皇嗣之事臣亦嘗因災異竊有奏陳雖聖度包容不加誅戮而愚誠懇至天聽未回臣實不勝愛君之心日夜區區未嘗忘此思欲再陳狂瞽而未知所以為言今者伏見兖國公主近巳出降臣因竊思人之常道莫親於父子之親人之常情亦莫樂於父子之樂雖在聖哲異於凡倫其為天性於理則一陛下嚮雖未有皇嗣而有公主之愛上慰聖顔今既出降漸踈左右則陛下萬機之暇處深宫之中誰可與語言誰可承顔色臣愚以謂宜因此時出自聖意於宗室中選材賢可喜者録為皇子使出入左右問安侍膳亦足以慰悅聖情臣考於書史竊見自古帝王雖曰至尊未嘗獨處也其出而居外也不止百司公卿奏事而巳必有儒臣學士講論於間宴左右侍從顧問語言其入而居內也不止宦官宫妾在於左右而巳其平居燕寢也則有太子問安侍膳於朝夕其優遊宴樂也多與宗室子弟歡然相接如家人計其一日之中未嘗一時獨處也今陛下日御前後殿百司奏事者往往仰瞻天顔而退其甚幸者得承一二言之德音君臣之情不通上下之意不接其餘在庭之臣儒學侍從之列未聞一人從容親近於左右入而居內則至于問安侍膳亦闕於朝夕則陛下富有四海之廣躬享萬乘之尊居外則無一人可親居內則無一人得親此臣所以區區而欲言也伏惟陛下荷祖宗之業承宗廟社稷之重皇子未降儲位久虛羣臣屢言大議未決臣前所奏陳以謂未必立為儲二而且養為子既可以徐察其賢否亦可以待皇子之降生於今為之亦其時也臣言狂計愚伏俟斧鉞嘉祐二年八月上時為翰林學士上仁宗乞擇親賢優以封爵使入侍禁中吳及臣聞帝王之治必隆骨肉之愛而以至親夾輔王室詩曰懷德維寧宗子維城故同姓者國家之屏翰儲副者天下之根本陛下以海宇之廣宗廟之重而根本未立四方無所係心上下之憂無大於此謂宜發自聖斷擇宗室子以備儲副以服屬議之則莫如親以人望言之則莫如賢兼親賢然後優封爵以寵異之選重厚朴茂之臣以導之聽入侍禁中示欲為後使中外之心悚然瞻望曰宫中有子矣陛下他日有嫡嗣則異其恩禮復令歸邸於理無嫌於義為順弭覬覦之心屬天下之望宗廟長久之策也嘉祐三年二月上時為右正言諫議供職上仁宗乞表異親賢鞏固王室包拯臣伏讀前史見聖王之御天下也初纂大業即建儲二蓋所以安億兆危疑之心絶中外覬覦之望乃有國之常典而厯代所遵守者也伏自陛下紹隆丕緒已逾三紀仁孝恭儉之德格于上下孜孜求治未嘗一日少怠兹固羣臣仰望清光之不暇但以東宫虛位日久天下之心憂危至切雖前後臣寮論列者多矣卒不聞有所處置未審聖意持久不決者何也夫萬物皆有根本而太子天下之根本也根本不立禍孰大焉今既皇嗣未降亦當采詩人磐維之義固天下根本之地不可忽也臣願陛下特出宸斷密與執政大臣協議精擇宗室中親而有德望衆所推重者優以封爵置在左右日加訓誨仍與增補寮屬選用厚重方正之士令就禁邸諭以善道益其聞見如此則不唯表異親賢抑亦鞏固王室可以挫姦雄觀望之意也俟皇嗣誕育則以優禮而進退之此亦古今之通義陛下何憚而不為哉伏覩藝祖以艱難得天下以聖繼聖傳於陛下垂及百年陛下豈可不念祖宗之業當傳之無窮若乃徇目前之適忽經久之策必稔禍於將來恐非社稷之福也陛下得不留神而熟慮乎臣以踈外之迹纍當言責之任今陛下以臣愚直擢在憲府若畏罪不言是上孤陛下委用之意臣不忍為惟陛下審其當否斷而行之則天下幸甚嘉祐四年六月上時為右諫議大夫權御史中丞上仁宗乞擇藝祖太宗子孫立為皇子張述臣讀書為儒厯覽經史而效官州縣唯有忠義常盡瘁於職業自登朝列伏見皇嗣未立中外憂之十餘年間已五次上書所言皆指陳宗廟社稷可安可危之事自知卑微天聽髙邈伏慮衡石程書之時不足感悟宸聽又恐言詞激切觸犯忌諱為左右隱蔽臣伏念三聖寶位傳付陛下陛下在位既四十年未有繼嗣陛下曾不細思之耶若子細思之則憂宗廟社稷俾繼嗣不絶矣若未子細思之耶不當因循委順天命一祖二宗傳付陛下寶位欲其宗廟社稷世世嗣續不絶則陛下方為孝矣臣愚敢引杜太后之言庶激切感悟陛下之心杜太后臨終以藝祖得天下謂無長君所以藝祖得之藝祖奉杜太后之言所以不忍傳之子而傳之太宗是也向使世宗在位更十數年少帝嗣位藝祖豈得有應天順人之事乎陛下當思之陛下昔誕育豫王若天意與陛下則今已成立矣近聞一年中誕四公主若天意與陛下則其中有皇子矣上天之意如是陛下合當悟之陛下在位四十年當其安寧萬歲時宜審擇藝祖太宗賢子孫且立為皇子但且異其爵位試之官政繫天下之望陛下詳察有賢德可以傳付則立之所以謹重大事俾宗廟社稷得其主矣而況天地之大五行休王皆有數在天地之中固不可逃其數也一旦卒有萬一不可諱倉皇之際危急之間寶位神器而欲使宫闈左右中官兩府遞相觀望而一言謀之豈陛下之心輕祖宗之基業如是之易也當陛下安康之時不能擇而為之欲至倉皇之際顧令左右取次謀之此陛下不謹重三聖之基業同尋常之事爾夫繼嗣有賢有不賢則朝政有治有亂宗廟社稷有安有危陛下之心固亦知之矣今陛下在位歲久萬機之政稔聞熟見但欲凝神淵默垂拱仰成威福賞罰雖曰出自朝廷即陛下不專於巳賞罰不專於巳而威福漸移於下臣愚實憂之書曰惟辟作福易曰其所由來者漸矣履霜堅氷至蓋言漸之不巳則東漢陵夷之禍復見於今矣臣愚生不能有益聖世所以吐肝瀝膽觸犯忌諱狂言僣説庶有感悟陛下之心若有所感悟而能擇繼嗣紹隆宗廟社稷俾世世祭享不絶臣雖赴鼎鑊萬死之日猶生之年而名不朽挂於忠義之列所求遂矣嘉祐六年六月上時為職方員外郎提點淮浙銅場上仁宗乞罷禱祠立副君胡宿臣被旨令為青詞禱諸陵山川以求儲嗣臣聞漢文帝二年有司請豫建太子是時文帝已有元子猶對有司稱楚王吳王淮南王皆秉德以陪朕何為不豫哉太祖皇帝感昭憲太后遺言捨魏王而立太宗自開闢以來神武英斷未有如太祖皇帝陛下必待聖嫡然後擬議非居安思危之道願察宗室敦厚慈仁可以為副君者立之則儲二之分定天下之心安矣欲望聖慈特賜睿斷臣不勝區區之情嘉祐六年上時為翰林學士疏奏遂罷祈禱上仁宗論皇嗣如已有所屬乞宣示中書密院奉行韓琦臣竊見近歲以來內外忠孝之臣以陛下臨御四海已四十年而皇嗣未育天下無所係心不避重誅繼有論奏乞於宗室中擇幼而可教者權為嗣陛下慈仁崇儉冠絶今古天監至明非晚必生聖子以為廟社無疆之慶至時宗室中權為嗣者優加職秩使之退就宫邸誠善議也臣愚竊怪陛下何疑而不行之然兹事至大當獨斷於聖心雖至親至近之人不可預議如陛下素有所屬已得其人則望宣示中書樞密院使奉而行之以慰中外之意若謂賢愚難審選擇當謹則臣曾乞於內中建學取宗室中幼而謹厚勤於為學者置于內學陛下每於聽斷之暇或休假之日親幸學舍觀其道業進退應對長短不年歲間陛下必盡知其能否然後聖慮取其可屬者權而命之則無不當矣臣蒙陛下非次拔擢使待罪宰相思有以報上而事無重於此者故昧死盡言惟聖度寬納則天下幸甚嘉祐六年閏八月上時琦為首相面謝日即奏此疏上仁宗乞檢會至和中三狀早賜施行司馬光臣先於至和三年通判并州事日曽上言乞陛下早定繼嗣以遏亂源當是之時臣疏逺在外猶不敢隱忠愛死數陳社稷至計況今日侍陛下左右官以諫諍為名竊惟國家至大至急之務無先於此若捨而不言專以冗細之事煩瀆聖聰厭塞職業是臣懷姦以事陛下罪不容於葅醢伏望陛下取臣嚮時所進三狀少加省察或有可取乞斷自聖志早賜施行如此則天地神祗宗廟社稷羣臣百姓並受其福唯有陛下一言而已嘉祐六年閏八月上時同知諫院光既具劄子復面請之上時簡默不言雖執政奏事首肯而已聞光言沈思良久曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及爾光曰臣言此自謂必死不意陛下開納上曰此何害古今皆有之因令光以所言付中書光曰不可願陛下自以意諭宰相同前係第二狀司馬光臣近於前月二十六日上殿敷奏乞檢會臣在并州所奏三狀早定繼嗣事陛下聖意昭然即垂聽納凡所宣諭皆非愚臣所能及此乃天神地祗保佑皇家實萬世無疆之休也臣謂陛下朝夕當發德音宣告大臣施行其事今將近一月未有所聞豈陛下以兹事體大精選宗室未得其人將左右之人有所間沮熒惑聖聽臣皆不得而知也臣聞為人後者為之子也著於禮律皆有明文漢孝成帝即位二十五年年四十五以未有繼嗣立弟子定陶王欣為太子今陛下即位之年及春秋皆已過之豈可不為宗廟社稷深思逺慮哉況今亦未使之正東宫之名但願陛下自擇宗室仁孝聰明者養以為子官爵居處稍異於衆使天下之人皆知陛下意有所屬以係逺近之心俟他日皇子生復使之退歸藩邸有何所傷此誠天下安危之本願陛下決意而速行之嘉祐六年九月上時同知諫院光既上奏且面言臣向者進説陛下欣然無難意謂即行矣今寂無所聞此必有小人言陛下春秋鼎盛子孫當千億何遽為此不祥之事小人無逺慮欲令倉卒之際援立所厚善者爾唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者此禍豈可勝言哉上大感悟曰送中書光至中書見琦等曰諸公不及今議異日夜半禁中出寸紙以某人為嗣則天下莫敢違琦等皆唯唯曰敢不盡力上仁宗乞鑒東漢之禍蚤立皇子陳洙臣聞孟子之言曰生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也臣官為御史身有言責當世之事繫安危興亡之本原者計身而不言則失事君之大義切言而不避則蹈死亡之顯誅臣敢捨生取義攄瀝肝膽仰聞於陛下誅之容之惟君父命伏以陛下仁侔帝堯孝同周武體元居正已四十年惠滂澤流浹民肌骨陛下視億兆之人如赤子億兆之人視陛下如慈父未有為人之子而不憂其父之憂者也天下之本未立吾君之子未育此天下所以皇皇而同慮也臣輒探天下之心採天下之論而開陳之方今皇嗣未降人心未安公府大臣無敢言者朝廷安危莫大於是厯代治亂之迹甚明臣不復條舉姑借東漢之事言之順沖質之際漢祚幾絶清河王蒜最親賢而不得立姦臣梁冀立蠡吾侯志是為桓帝忠臣杜喬李固雖力爭就死曽何益於漢哉桓帝既立政移五幸刑淫三獄而宗社自此危矣迹其所以然蓋辨之不早計之後時也嚮使李杜之策行於前梁冀之謀不得用則炎厯長久其可量乎思東漢之事則知姦邪之臣幸時失制廢明立昏棄長扶幼以危亡其邦家皆可見也然則可不預為久安之策哉臣愚伏願陛下決自清衷發於聖斷擇宗室之賢者立為皇子置之左右使日聞陛下之訓言日觀陛下之德政則天下之憂去而姦臣之謀戢矣皇天輔德其應如響陛下至仁至義至慈至孝行將天錫聖嗣繼照四海復俾宗室退還舊藩九州四海之人孰曰不然夫先機而謀則事克濟失時而慮則禍已萌臣失今不言而異時倉猝言之不過能效李杜之死耳曽何益於朝廷哉陛下如不亮臣愚忠以臣為懷異日之圖莫若先殺臣之身而用臣之言臣雖死之日猶生之年也伏望聖慈宣示臣章付執政大臣而行之天下大幸嘉祐六年九月上時為殿中侍御史裏行元祐元年宰相司馬光奏乞官洙一子其奏云竊以嘉祐中仁宗皇帝未有繼嗣故殿中侍御史陳洙奏乞擇宗室之賢者立以為後既發奏狀謂家人曰我今日入一文字言社稷大計若得罪大者死小者貶竄汝輩當為之備下奏狀者未返洙得疾而卒臣時為諫官親聞見此事竊憐其亡身徇國繼之以死而天下莫知近見故職方員外郎張述亦以當時乞建儲二子申伯特補大廟齋郎伏望聖慈依張述例除一子官以旌忠義上仁宗乞檢會前後臣僚奏議早為定斷吕誨臣竊聞中外臣僚屢有密疏以聖嗣未立精擇旁繼指斥祖宗分别裔緒臣子之心詎當如是蓋憂懼隕穫發於忠誠而深虞機會之失也雖然宗室有親踈天資有賢愚委付親賢當出聖慮人臣安得陳露事機以萌非冀惟陛下思忠言奮剛斷遏未然之亂無使後時此防微之深慮也又聞日官奏彗星躔心宿請備西北謹按天文志三星天王之正位中曰明堂前為太子後為庶子星直則失勢明則見祥質之知星者以謂既直且暗而妖星所犯變見之驗恐不在西北臣又聞自夏秋京師淫雨諸路水潦數州地震江河泛溢民户墊溺斯陰盛之沴固有冥符唐神龍初洛水暴盛宋務光曰自登皇極未建元良非所以守器承祧養德贊美姻戚之間謗議所集積疑成災厥罰斯至乃已然之明驗有以知皇天愛陛下之深數以災異感動若尚不加警悟殆非畏天保國之深慮也臣又聞近宗室中訛言事露流傳四方人心驚疑是亦陰沴之應窺覦之心不可不知其漸伏望陛下念根本之重為宗廟之計檢會前後臣僚奏議延對大臣周爰忠讜審擇宫邸以親賢稽合天意況宗枝蕃茂豈無賢德上副聖念脫或宸謀已定當使天下共知以安國本萬一姦臣陰有附會陽為忠實以緩上心此最為患之大者不可不察也漢成帝惑王根邪説捨中山而立定陶及孝安之際梁冀姦謀貪樂安沖幼而畏清河嚴明卒至於亂向用正人讜論則東西二京基祚可量哉惟陛下思祖宗造宋之艱難監成安隳漢之基祚窒姦臣附會之漸絶後世窺覦之患早為定斷慰安人心天下大幸嘉祐六年九月上時知江州初司馬光既以所上章送中書內復出誨章宰相韓琦等與同列奏事垂拱殿讀光誨二章未及有所啓上遽曰朕有此意多時矣但未得其人因左右顧曰宗室中誰可者琦曰此事非臣下敢議當出自聖擇上曰宫中嘗養子二人小者甚純然不慧大者可也琦請其名上曰宗實者今三十許歲矣議定將退琦復奏曰此事至大臣等未敢施行陛下今夕更思之來日取旨明日奏事垂拱殿又啓之上曰決無疑也琦曰事當有漸容臣等商量所除官時英宗猶居父喪乃議起復泰州防禦使知宗正寺上喜曰如此甚好琦又曰此事若行不可中止陛下斷以不疑乞從內批出上曰此豈可使婦人知之只中書行可也至十月壬寅遂降詔上仁宗論既擇宗子知宗正寺不可復猶豫遲疑王陶臣伏覩自至和中聖躬不豫之後天下之人顒顒惴惴無所寄命日望上穹眷命降生聖嗣內承九廟祀享之重外安四海億兆之心天貺莫期未如民志朝廷百執事州郡之吏下至韋布草萊之士抗疏交章引古今陳災異請擇宗室親賢早建儲嗣危言切語感動天聽者以數百人為是議者豈皆懷不忠不孝為姦利託附之人哉蓋發於至誠為宗廟社稷無窮大計他日四海生靈死亡之命豫求安全深思逺慮而已陛下納諫從善博通古今治亂之要知聖人先天而天弗違後天而奉天時之道在乎順民欲而安衆心也故前嵗親發德音稽唐故事擇宗子使知宗正寺上以先後天心導迎景貺而俟與子之祥次以尊崇宗廟欽重祭享而修主鬯之職下以順悅人情表的聖意而示強宗之勢中外聞之咸謂此舉設施安穩不驚人耳目而天下搖搖之心一旦而定他日聖嗣降育則稍遷其秩使歸本邸進退之命無傷國體莫不稱慶陛下有堯之至仁舜之大孝漢文之恭遜而睿謀英斷非近代中庸之主所可跂及厥後寖聞稽緩四方觀聽豈免憂疑或罪宗實以為自唐以來判宗正寺者皆用宗子求之典故乃一尋常差遣何必過為辭避或者流言云事由宫中嬪御宦臣姑息之言聖思因而微惑且婦人近幸不識國家大計茍務一時慰悅陛下而不知返沮壞美政睽隔英斷為害甚大也風聞宗實自有此命而來夙夜恐懼閉門不敢見人昨自二月服除今半年有餘矣臣恐天下之人謂陛下始者順天心人欲而命之今者聽左右姑息之言而疑之不獨百世之後使人嘆息聖政始卒之不一亦恐自今逺近中外姦雄之人得以窺伺間隙矣自古天下禍亂之始未有不由繼嗣不立付屬之心不豫定而遂致後世爭奪危亡使天下赤子糜爛塗地而受弊者也況數歲以來災異頻數不可勝紀今春徐陳許蔡逮京畿之民訛言相傳掘土而食近又龍鬪於南京之舊驛盛夏火王金當消伏太白芒角盛大陵犯熒惑又太白經天與歲星晝見天地人事皆見變異其占為兵為凶為人心不安為甚可懼太史必有以其術為陛下言之者陛下於此時豈可尚復優遊不斷恐懼修省急答天戒哉夫天下者聖祖神宗之天下傳至陛下使陛下永置生民於安全之地陛下當思先帝付託之重使宗廟社稷生民有所依賴天下忠臣節士有所取正無令漢成帝獨有美名也前日未命宗實人人言早建儲嗣今日乃無一人敢言者非今日之人不忠也蓋前日未有主名泛為公言而陛下不疑也今日補一宗正官雖非繼嗣似有主名又陛下猶豫遲疑自冬徂秋十月矣中外之人無貴賤賢愚人人自顧私計懼陛下見疑獲罪不敢出一言但日聽朝廷所為以卜治亂而已臣職為諫官儻又不言則誰為陛下言者故臣區區憂國之心顛沛倣徨而不能自已也嘉祐七年七月上時為右正言供諫職陶上此疏因請對曰宫嬪宦官有以上惑聰明而使之畏避不敢前仁宗問陶欲别與一名目如何陶對曰此止是一差遣名目但可繫屬人心亦甚穩當陛下若欲别與名目乞與執政大臣議之仁宗曰當别與一名目於是韓琦等始有立為皇子之議上仁宗乞遣近上內臣召皇姪就職司馬光臣伏以陛下以皇姪宗實知宗正寺宗實辭遜多日不肯就職陛下兩次遣使者召令受敕中外之人無不欣悅以為非陛下睿智聰明深謀逺慮斷自聖志確然不惑何以及此夫王者以大庇生民為仁安固基業為孝仁孝之道莫大於此今陛下一舉而兩有之天下聞之安得不喜又爵祿者人之所貪往往校量絲毫干求爭訟不顧廉恥今宗實特受陛下簡拔恩寵殊異而以榮為懼辭遜懇切首尾十月尚未受詔其智識操行必賢於人益足彰陛下知人之明此天下所以尤喜也然陛下之於宗實屬則父也尊則君也在禮父召無諾唯而起君命召不俟駕今陛下兩遣使者召之宗實雖不受恩命亦當入見面自陳述豈可在家堅卧不起臣愚伏願陛下更遣近上內臣往傳聖意責以禮法彼宜不敢不來來則陛下面加敦諭使知聖心懇惻發於至誠彼宜不敢不受如此則陛下仁孝之德純粹光大本末如一無以復加此皆陛下即今所行而臣復區區進言者誠欲陛下守之益堅行之不倦嘉祐七年八月上時知諫院上仁宗乞早令皇子入內司馬光等臣等伏聞擇今月二十五日差內臣宣皇子宗實入內而宗實猶復稱病未入臣等竊以臣子有君命召不俟駕之禮使者有受命不受辭之義今宗實但以恐懼不敢便當陛下非常恩寵而所差內臣亦合以臣子事君父之禮曉諭切責使即奉命豈得備禮致命默然往復殊不副陛下聖意其今月二十五日宣宗實內臣伏乞特行責降以懲不職之罪況皇子之名本非官職無容避遜今詔命已下二十餘日而宗實既為陛下之子禮當朝夕定省備人子之職不宜久處外宅伏望聖慈速賜選差都知御藥諭以君父之命不可違臣子之職不可闕催迫切責使即時入內并下大宗正司及本宫亦仰以禮敦遣不得更容遷延嘉祐七年八月同王陶上時同知諫院上英宗乞淮陽郡王出閣傅堯俞臣竊嘗讀記傳採國家之要務見聖人之教其子也未有不思所以護其闕而養其全是以事作軌儀物有防檢蓋夫恩惟父子義則君臣必恩義之兩行實古今之通道天下之本庸可易乎故滯愛生愆具存規戒異宫而處用别嫌疑臣雖至愚輒有深慮竊見淮陽郡王爵分茅社位列鼎司體何但於勝衣年已踰於志學雖即外傅尚居中禁臣謂非所以養其德望而廣其嚴恭者也伏願陛下稍抑私情務存大體俾之出居别館稍親諸務問安內寢著為定規飲食起居必有常度左右前後皆用正人上以隆父子之恩下以著君臣之義養全教本此其始乎嘉祐八年九月上時為殿中侍御史至十二月淮陽王始出閣門上英宗乞早立淮陽郡王為皇太子吕誨臣竊以事之遽者步寧思於中矩心之切者言何假於文為況任居言責世有憂危焉敢恝然自持為全身之計哉臣以謂王者所以尊髙於人上慘舒於天下以賞罰之柄專其有也故威福不可移於下謹重操守而已恭惟陛下踐祚以來聖體違豫雖天光臨下而德音鮮聞萬機之事未嘗可否悉付中書密院然皇太后關決於中自匪輔臣雖承旨兩制近侍亦不得造簾箔之下況踈逺之臣耶如是爵賞刑威一歸於政府盡公則已脫或差謬何繇取正下情不無蔽壅所以中外慊然未安者此也尚賴忠良一意上下無間萬一姦邪得進盜弄威福勢不可不防其漸也為陛下謀者莫若早建元良自輔號令威福自中而出人知所歸則下無異心此當今之速效也漢文帝即位之初有司請豫建太子文帝英睿之君景帝賢明之嗣尚以不豫為憂誠有謂也況淮陽王天資敏悟位當冡嫡速宜建立以固本根旁絶窺覬慰安人心斯萬世之慮也伏望陛下大開聰聽俯納愚忠審操柄不可移於下思機會不可失於時法漢文豫建之策為廟社長久之計上有聖后之翊輔下有元良之倚賴陛下髙拱巖廊仰成庶政臣私謂雖泰山之安莫安於此也清靜不言而化人神胥悅天意昭輔勿藥之喜計日可期天下幸甚嘉祐八年十一月上時同知諫院上神宗乞早定國本張方平臣聞王者大居正謂王者君國當先正其統本也三代逺矣漢唐之盛君即位皇后太子多同時建立太子必以長其緩者不過二三年不然則必有故史策具存矣本朝太祖開國知天命屬在太宗故不與子然以儲位寓於京尹太宗自京尹踐祚真宗自京尹登儲位仁宗未嘗出閣即登儲位先帝入纂天統尋登尊位尹京故事蓋未嘗行陛下即位及今九年受天之祜早有前星之慶正統大本謂宜時定上以尊宗廟下以繫天下之心國之大事僣議罪也然陛下特以恩意留臣在朝愚慮所及敢有不盡故不避嚴誅輒陳忠悃熙寧九年上時為宣徽使宋名臣奏議卷三十一
