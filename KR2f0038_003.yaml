body:
  text: 宋名臣奏議卷三宋趙汝愚編君道門君道三上哲宗論修德為治之要十事呂公著臣近準詔書令臣發來赴闕巳於今月二十日朝見訖竊聞近日臣僚未有上殿班次臣雖忝先朝執政之臣亦未獲一親法座少奉德音然自忖纍世蒙被厚恩惓惓報國之誠不能自已輒具奏封陳其一二冒瀆聖聰臣無任惶懼之至臣伏覩皇帝陛下紹履尊極方逾數月臨朝穆穆有君人之度太皇太后陛下勤勞庶政保佑聖躬德澤流行巳及天下臣逺從外服召至左右竊思人君即位之初宜講求修德為治之要以正其始然後日就月將學以緝熙于光明新而又新以至大治是用罄竭愚誠考論聖道槩舉十事仰贊聰明一曰畏天二曰愛民三曰修身四曰講學五曰任賢六曰納諫七曰薄斂八曰省刑九曰去奢十曰無逸皆隨事解釋粗成條貫不為繁辭以便觀覽伏望陛下留神幸察如言有可採即乞置之御座朝夕顧省庶於盛德少助萬一謹列如右畏天書曰皇天無親惟德是輔又曰惟上帝不常作善降之百祥作不善降之百殃蓋天雖高逺日監在下人君動息天必應之若修已以德待人以誠謙遜靜慤慈孝忠厚則天必降福享國永年災害不生禍亂不作若慢神虐民不畏天命則或遲或速殃咎必至自古禹湯文武以畏天而興桀紂幽厲以慢神而亡如影隨形罔有差忒然自兩漢以來言天道者多為曲説以附會世事間有天地變異日月災眚時君方恐懼修省欲側身修道而左右之臣乃據經傳或指外事為致災之由或陳虛文為消變之術使主意怠於應天此不忠之甚者也詩曰我其夙夜畏天之威于時保之然則有天下者固當飭已正事不敢戲豫使一言一行皆合天心然後社稷人民可得而保也天人之際焉可忽哉愛民書曰撫我則后虐我則讎人君既即尊位則為民之父母萬方百姓皆為已子父固不可以不愛子若布德施恩從民所欲則民欣戴欣戴不已則天降之福若取民之財不憂其困用民之力不恤其勞好戰不休煩刑以逞則民必怨叛怨叛不已則國從而危故曰民為邦本本固邦寧然自古人君臨朝聽政皆以赤子為憂一旦用兵則不復以生靈為念此蓋獻䇿之臣設姦言以導上意以開邊拓境為大功以暫勞永逸為至計此世主所甘心而不悟也夫用兵不息少壯從軍旅老弱疲轉餉伏尸流血而勝負得失猶未可知也民勞則中國先敝夫何足以為功兵興則朝廷多事亦不得而安逸也故凡獻用兵之䇿者欲生事以希寵媚上而營私耳豈國家之利哉修身天下之本在國國之本在家家之本在身夫欲家齊國治而天下化莫若修身修身之道以正心誠意為本其心正則小大臣庶罔敢不正其意誠則天地神明皆可感動不誠則民不信不正則令不行况人君一言一動史臣皆書若身有失德不惟民受其害載之史䇿將為萬代譏笑故當夙興夜寐以自修為念以義制事以禮制心雖小善不可不行雖小惡不可不去然人君進德修業實繫乎左右前後夫習與正人居不能無正猶生長於齊不能不齊言也習與不正人居不能無不正猶生長於楚不能不楚言也故曰僕臣正厥后克正僕臣諛厥后自聖講學王者繼祖宗之業君億兆之上禮樂征伐之所自出四方萬里之所視效智足以窮天下之理則讒邪不能惑德足以服天下之心則政令無不行自非隆儒親學何以臻兹然天子之學與凡庶不同夫分文析字考治章句此世之儒者以希祿利取科級耳非人主所當學也人主之所當學者觀古聖人之所用心論歷代帝王所以興亡治亂之迹求立政立事之要講愛民利物之術自然日就月將德及天下書曰王人求多聞時惟建事又曰念終始典于學厥德修罔覺故傅説之告髙宗者修德立事而已至漢之鼂錯以為人主不可不學術數錯之意欲人主用機權巧譎以參制羣下而景帝用之數年之間漢罹七國之禍而錯受東市之誅蓋其所主者不出於誠信而已由是觀之擇術不可不謹也任賢昔成王初蒞政召康公作卷阿之詩以戒之言求賢用吉士蓋為治之要在乎任賢使能能者不必賢故可使賢者必有德故可尊小賢可任以長民大賢可與之謀國若夫言必顧國家之利而行足以服衆人之心夷險一節而終始可任者非大賢則不能也人君雖有好賢之心而賢猶或難進者蓋君子志在於道小人志在於利志在於道則不為茍合志在於利則唯求茍得夫忠言正論多咈於上意而佞辭邪説專媚於君心故君子常難進而小人常易入不可不察也自古雖無道之君莫不欲治而惡亂然而治君少而亂國多者其所謂忠者不忠而所謂賢者不賢也書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道人主誠存此心以觀臣下之情則賢不肖可得而知矣納諫昔書稱成湯之德曰從諫弗咈改過不吝湯聖君也不曰無過而曰改過者言能捨已而從諫則不害其為聖也及紂為天子強足以拒諫智足以飾非紂非無才智也然身滅國亡而天下之惡皆歸之者言愎諌自用則才智適足為害也前代帝王無不以納諌而興拒諌而亡者在史册一一可考蓋貴為天子富有四海貴則驕心易生富則侈心易動一日萬機則不能無失固當開道而求諌和顔色而受之其言可用則用其言而顯其身言不可用則恕其罪以來諌者夫忠直好諌之臣初若逆耳可惡然其意在於愛君憂國諂佞阿諛之士始若順意可喜然其情在於媚上而徼寵人君誠察此則事無過舉身享美名故曰木從繩則正后從諌則聖薄斂古人有言曰百姓足君孰與不足百姓不足君孰與足人君恭儉節用取於民有制則民力寬裕衣食滋殖自然樂輸租賦以給公上若暴征峻斂侵奪民利物力巳屈而驅以刑辟勢必流轉溝壑散為盜賊為人之上者將何利於此故善言治道者尤惡聚斂之臣曰與其有聚斂之臣寧有盜臣前代帝王或耽於聲色或盤於遊畋或好治宫室或快心攻戰於是小人乘間而肆其邪謀為之斂財以佐其橫費世主不悟以為有利於國而不知其終為害也賞其納忠於君而不知其大不忠也嘉其以身當怨而不知其怨歸於上也昔鹿臺之財巨橋之粟商紂聚之以喪國周武散之以得民由是觀之人主所當務者仁義而已何必曰利省刑夫臨下以簡御衆以寬百王不易之道也昔漢髙祖去秦苛暴約法三章以順民心遂定王業孝文循之以清靜而幾至刑措然則為治之要果在於省刑而不在於繁刑也况人主之刑獄其勢不能親臨則必委之於臣下故峻推鞫則權在於獄吏廣覘伺則權在於小人肆刑戮則權在於強臣通請謁則權在於近習自古姦臣將欲誅鋤善人自專威柄必數起大獄以搖人心何則其情難知鍛鍊出入一繫於獄吏及夫奏成獄具則雖有寃抑人主亦何從而察哉然則欲姦雄不得肆其威善良有以安其性莫若省刑而巳自三代以還有天下者數十姓惟宋受命逮今一百二十有六年中原無事不見兵革稽其德政所以特異前世者直以誅戮之刑內不施於骨肉外不及於士大夫至於下民之罪一決於廷尉之平而上自天子下至於有司不復措慮輕重於其間故能以好生之德感召和氣而致無窮之福祖宗所以消惡運遏亂原者嗚呼逺哉雖甚盛德蔑以加矣去奢昔夏禹克勤于邦克儉于家而為三王祖漢文帝即位宫室苑囿車騎服御無所增益而天下斷獄四百幾至刑措然則節儉者固帝王之髙致也况以天子之尊富有天下凡有四方萬物所以奉養於上者蓋亦備矣然而饗國之日寖久耳目之所御者習以為常入無法家拂士出無敵國外患則不期於侈而侈心自生佞諛之臣又從而導之於是窮奢極侈無不為已是以先王制法作竒伎淫巧以蕩上心者殺無赦夫竭天下百姓所以相生相養之具而以供人主無窮之欲致人主於喪德損壽之地而以邀已一時之榮雖誅戮而不赦固未足以當其罪也昔紂為象箸而箕子諫夫以天子而用象箸未為過侈也然箕子以為象箸不已必金為之金又不已必玉為之故箕子之言所以防微而杜漸也至漢公孫𢎞相武帝以為人主病不廣大人臣病不節儉當是時帝方外伐四夷內治宫室為千門萬户由是天下之户口減半盜賊蜂起而𢎞猶病其不廣大何其不忠之甚哉故人主誠能不以箕子之言為太過而察見公孫𢎞之大佞則夏禹漢文之德不難及已無逸昔周公作無逸之篇以戒成王其略曰昔商王中宗治民祗懼饗國七十有五年其在髙宗不敢荒寧饗國五十有九年厥後立王生則逸不聞小人之勞惟耽樂之從自時厥後亦罔克壽或十年或七八年或五六年或四三年嗚呼非愛君憂國之深其言何以至此又曰繼自今嗣王無淫于觀于逸于遊于田無若商王受之迷亂酗于酒德哉小人怨汝詈汝則皇自敬德亂罰無罪殺無辜怨有同是叢于厥身蓋人君初務縱逸小人必怨而大臣必諌至于淫刑亂罰以杜言者之口然後流連忘反不聞其過而終至於滅亡故曰無逸之書後王之元龜也唐明皇初即位宋璟為相手寫無逸圖設于帝座明皇勤於政事遂致開元之治其後宋璟死所獻圖亦弊而徹去明皇遂怠於政親見天寶之亂由是觀之靡不有初鮮克有終人君誠能慎終如始不敢逸豫則德有堯舜之名體有喬松之壽豈不美哉右臣聞孟子曰我非堯舜之道不敢以陳於王前今朝廷始初清明臣雖術學淺陋惟是前代聖帝明王所以致治之迹可以為法與夫暴君暗主所以兆亂之道可以為戒者乃敢告于左右古人有言曰舜何人也豫何人也夙夜以思去其不如舜者就其如舜者是亦舜而巳矣陛下加意無忽則社稷幸甚天下幸甚元豐八年六月上時召為侍讀提舉中太一宫到闕朝見未對先上此奏上宣仁皇后論治道在審識人情韓維臣聞治天下之道不必過求髙逺止在審識人情而巳識人情不難以已之心推人之情則可見矣大凡貧則思富苦則思樂困則思息鬱則思通陛下誠能常以利民為本則民富矣常以愛民為心則民樂矣賦役非人力所堪者去之則勞困息矣法禁非人情所便者蠲之則鬱塞通矣推此心而廣之盡誠心而行之則聖子神孫觀陛下之法不待教而自成聖德賢士聞陛下之風不煩諭而爭先效忠矣元豐八年六月上時知陳州過闕上哲宗論為君難四事王巖叟臣聞孔子曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎臣竊以君道之大無所不難茍得其要而持之則所難者少矣臣請略舉其要陛下試垂聽幸甚言無所隱之謂忠心無所欺之謂信忠於主者不避嫌信於已者不思謗所以忠信或至於獲罪故人君以察忠信而主之為難巧於言之謂佞順於事之謂柔巧言則易得順事則易從所以佞柔常至於日親故人君以辨佞柔而逺之為難廣大業者存乎勤而人情常易於生倦以隳其業故人君以久而不倦為難成大謀者存乎斷而人情常牽於小不忍以亂其謀故人君以棄小不忍為難臣以謂為國之要能察忠信而主之使得盡言辨佞柔而逺之使不害政行之以勤而無廢弛之憂濟之以斷而無優遊之患則治道成矣陛下盛德日新四事之要曽無所難而皆自得益願陛下不以易心處之則德日新又日新矣元豐八年六月上時為監察御史上哲宗論治道貴清靜儉約王巖叟臣觀歷代君臣講治道者多矣然莫如貴清靜而敦儉約蓋天下本無事因擾之而事多事多則民勞民勞則怨民怨則國家有緩急雖賞之而不為用此所以莫如貴清靜也天下之人所以養生送死者本自足由奪之而後困困而後為盜賊若不厚其本而徒嚴其末雖殺之而不禁此所以莫如儉約也臣竊傷比歲以來好進之人紛紛建議天下勞於多事百姓困於不足故臣願陛下以清靜儉約養天下使百姓安且樂百姓安樂則自然隂陽和而風雨時海內將不勝其富矣人以為難臣以為易何則陛下自巳有此心惟在守之而勿失爾不勞陛下費精神用智力臣故曰易如蒙採納乞以臣言詔輔臣使體聖意幸甚元豐八年六月上時為監察御史上宣仁皇后論治性之道傅堯俞臣聞之於書曰慎厥初惟其終又曰慎厥終惟其始始則念終不敢不謹也終則念始不敢不勉也臣愚伏念陛下考古御今修明法度恭儉以克巳慈惠以愛人登崇老成開廣言路大義明著仁聲流聞總覽萬機得其綱要所以欽崇祖宗導世成俗為子孫百世之慮甚備非臣筆舌所能形象雖詩書所載丹青所傳殆未有以過也可謂有其始矣臣愚不勝拳拳謂陛下雖聖性得之猶當加聖心焉夫天地無全功聖人無全能此不可不思傳曰審好惡理情性而王道畢矣治性之道必審巳之有餘而強其所不足有餘則養之不敢矜不足則勉之以為戒然後無間可窺而巧偽之徒不得比周而望進今陛下不出房闥而天下嚮風百僚奉職者無他以陛下通達平均而政出於大公云爾茍一有所偏則好惡之情露百邪羣枉必爭隙而入矣陛下前日積勞之所成就將中廢而不全矣豈可不兢兢業業日謹一日以圖厥終哉敬願陛下留神省察則天下幸甚元祐元年十一月上時初除御史中丞上殿上哲宗論君道在立巳知人曽肇臣伏見陛下即位以來早朝晏罷負扆端莊淵默弗言雖在深宫之中不為佚豫之好可謂有克肖祖宗之聖質退朝燕處翰墨是親日御邇英虛心恭巳以延講誦可謂有急於問學之誠心夫有克肖祖宗之聖質又有急於問學之誠心則引而達之廣而大之正今日之所務也蓋聖人之性與人同在謹其初而已夫性之初若火之始然泉之始達火之始然一熒爝之微爾及其至也其明足以燭萬物其用足以鑠金石其利博矣然設之弗當則燎原野焚玉石而不勝其害也泉之始達一勺之多爾及其至也大而為江河細而為溝澮其利博矣然導之非理則暴怒悍突懷山襄陵而不勝其害也人之性何以異於是哉况夫有天下之大享四海之富靡曼之聲妖淫之色足以移其耳目宫室狗馬珠玉綺繡之玩足以移其心志與賢人處矣而不肖者參之與正士遊矣而邪人間之日漸月漬習與性成則明者或至於昏仁者反而為暴豈其天資之固然哉設之弗當導之非理故也故以舜之為君而禹告以無若丹朱傲以禹之為君而其戒見於五子之歌以武王之為君而太保作旅獒以訓至於成王而訓戒益詳周公作無逸又作七月之詩召康公作公劉以戒民事又作泂酌以言皇天親有德饗有道其誨可謂諄諄矣故以成王中材之主而能持盈守成卒為賢君者設之得其當導之適其理故也自古治世少而亂世多天下之柄或移於權臣或假於外戚或出於宦寺諸侯或強大而不可制夷狄或驕慢而不可屈兵或恣睢而不可使海內之賦入或專於強藩悍將而縣官不能有也百里之長或專殺而司冦不能治也有一於此人主雖有特起之資欲治之志而其勢不能以大有為此古今之通患也本朝承平百有餘年政出於一羣臣奉法遵職外戚奉朝請宦寺供掃灑而巳州縣之勢如臂使指夷狄引首待我衣食制兵與賦皆得其要刑罰清平又前世之所未有也六聖相傳以至陛下言其德則光大言其業則富有言其勢則便利陛下又有克肖祖宗之聖質有急於問學之誠心引而達之廣而大之欲王則王欲帝則帝惟陛下之所嚮而已孔子曰為君難知為君之難固有時而易矣何以言之君道莫難於立已莫難於知人已非禮不立人非言不知也孔子曰不知禮無以立也不知言無以知人也臣請為陛下言之夫所謂禮非制度文為之事也姦聲亂色不留於聰明淫樂慝禮不接於心術非正勿視也非正勿聽也非正勿言也非正勿動也視聽言動由於禮則內之非僻之思無自而生外之非僻之習無自而入內有以正其心外有以正其行夫然故施於事親則孝施於兄弟則順施於族姻則睦施於郊廟則敬施於朝廷則莊施於治民則仁施於軍旅則威無所施而不當矣孔子曰一日克已復禮天下歸仁焉其守豈不約其效豈不博哉至於知言其事尤難蓋言亦多端矣有辨有訥有華有質有是而非有迂而直不可不察也非獨如此人主必有好惡之心有是非之心所好者正所惡者邪以忠為是以佞為非則固善矣不幸反此則小人必將逢其所好避其所惡矜其所是諱其所非以售其姦言以行其私説故人主好髙逺則窽言入好卑近則邇言至好刑名則慘刻之説進好功利則興作之謀用上以此求於下下以此應於上同者謂之賢異者謂之愚而君子雜處於小人之間方且逆其所順強其所劣君所謂可而有否焉必獻其否以成其可君所謂否而有可焉必獻其可以替其否如是而君不察焉則小人日親君子日踈小人日進君子日退君子道消小人道長此治亂安危之所以分也治亂安危之分在於聽言之際豈不可畏也哉故漢文帝聽張釋之而退嗇夫則風俗至於篤厚唐太宗聽魏鄭公而絀封倫則致治幾於太平齊桓公不聽管仲而進易牙苻堅不聽王猛而信慕容垂則不旋踵而敗亡其效豈不深切著明哉伏惟陛下有克肖祖宗之聖質有急於問學之誠心宜其於禮不勉而中於言不思而得然臣猶惓惓以是為獻者蓋天下之物接於我者無窮而不能以道觀物則為物所引而欲必至於敗度縱必至於敗禮尚何以立已哉天下之言接於我者無窮而不能以道觀言則為言所蔽而浸潤之譛膚受之訴無所不行尚何以知人哉臣愚願陛下及此春秋方富血氣未定早為之制不邇聲色不殖貨利出入起居凡所以害德之事勿為也左右前後凡可以蕩心之物勿近也便僻側媚逺之而勿親直諒多聞親之而勿逺動容周旋唯禮之從則已無不立矣無作好惡無作聰明使人不能窺有言逆于心必求諸道有言遜于志必求諸非道使姦言不得入虛心廣覽以揆衆論辭寡者知其人之吉辭多者知其人之躁辭遊者知其誣善辭枝者知其心疑以至詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮則人無不知矣有以立已充而至於美風俗不難矣有以知人推之以修政事不難矣方今海內雖號治安然內則忠邪雜揉是非紛亂士節不勵奉公守義者寡而交私合黨者多外則爭訟盜敓法不勝姦歲論大辟五千餘人祖宗以來未嘗如此風俗未可謂美也朝廷上下紀綱不肅百司庶務類多文具官不勝其冗而未有以革財不足於用而未有以制哀矜惻隱之書日下而百姓之力未裕也是故和風未洽而歲之順成者常少恩信未孚而夷狄之侵侮者尚多以至冦賊姦宄所在竊發政事未可謂修也陛下誠能蚤留意於此正已以先之得人而任之力行以久馴致以漸則豈惟卿士大夫相化以義哉芻牧之微禆販之陋可使忠厚而知恥矣豈惟朝廷之上百工得其職哉海隅障塞之逺抱關擊柝之賤亦皆嚮方而宿業矣如是而風俗不美政事不修未之聞也捨是而不務則接物而不能無纍聽言而不能不惑接物而纍則雖有克肖祖宗之聖質而敗之者衆聽言而惑則雖有急於問學之誠心而蔽之者多如是則風俗愈入於薄惡政事愈入於弛壞貴者不能自克况其賤者哉近者且猶弗治况其逺者哉非獨如此人事不立而望天道之助順中國不尊而望夷貊之允懷抑又難矣臣愚故曰陛下有克肖祖宗之聖質有急於問學之誠心則引而達之廣而大之正今日之所務也不然則用心雖勞而去道愈逺用力雖勤而為術愈踈雖日接多士日求讜言而終於無補也書曰惟聖罔念作狂惟狂克念作聖傳曰學而不思則罔思而不學則殆陛下欲致此非他學以求之思以精之而已惟陛下留意毋忽則天下幸甚元祐三年十月上時為中書舍人上哲宗論洪範三德王巖叟臣伏以人主言而為天下法動而為天下則聖人思所以嚴百王之心而重其事故置右史以記言左史以記動伏惟陛下即位以來恭默思道敬畏不言五年于今臣幸得以右史入侍願聞德音而書之不啻飢渴者亦有時矣昨日臣預立邇英侍講臣康講洪範九疇至乂用三德陛下忽啓聖問曰只此三德為更有德臣不覺心躍而神竦既以初聞堯言為喜又以陛下問德得其要為慶臣敬已書之於册以示萬世竊伏思念陛下既能審而問之必將體而行之三德者君人之大本得之則治失之則亂不可須臾去者也臣請為陛下别白而言之夫明是非於朝廷之上判忠邪於多士之間不以順已而忘其惡不以逆已而遺其善私求不徇於所愛公議不遷於所憎竭誠盡節以先國家之急而忘其身者任之當勿二附下罔上以盜寵祿而不恤百姓之患者棄之當勿疑惜紀綱謹法度重典刑戒姑息此人主之正直也聲色人之所好也而逺之盤遊人之所樂也而絶之財利人之所貴也而賤之勇於救天下之弊果於斷天下之疑邪説所不能移非道所不能恱此人主之剛也居萬乘之尊而不驕饗四海之富而不侈聰明有餘而處之如不足俊傑並用而求之猶弗及虛心以訪道屈已以從諫懼若臨深淵怯若履薄氷此人主之柔也三者足以盡天下之要顧人主力行何如耳陛下誠能用洪範之三德以修已推臯陶之九德以用人則堯舜三王之盛可坐而致矣斯無難在陛下勉之而已元祐四年二月上時為起居舍人上宣仁皇后乞先正君心范祖禹臣蒙陛下擢受諌職才力淺薄懼不克勝受命以來夙夜不遑寧處深思天下之事自非大者逺者未之敢先恭惟祖宗受天命百三十年自三代以來未有承平如此之久纍聖基業付畀子孫成之至難壞之至易是以古之明王欲治天下先正其本其本在於人君一心而已天下治亂出於君心君心一正則萬事無不正孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣易曰正其本萬事理差之毫釐失之千里臣侍經筵因進講每及人君正心修身之要君子小人繫於治亂之際未嘗不反覆開陳伏計陛下聞之已熟今有言責不敢忘此竊惟天下之本在於君心臣愚伏望太皇太后陛下日以祖宗之艱難治天下之勤勞萬民之疾苦羣臣之邪正政事之得失説諭皇帝存之於心若皇帝陛下聖心曉然明於邪正是非他日衆説不能惑小人不能進則萬事定矣臣竊熟思莫大於此惟陛下深留聖意以幸天下元祐四年五月上時為右諌議大夫上哲宗論王道六事蘇軾臣始之學也以適用為本而恥空言故其仕也以及民為心而慙尸祿乃者屢請治郡兼乞守邊欲及殘年少施實效而有志莫遂負愧何言今乃以文字為官常語言為職業下無所見其能否上無所考其幽明循省初心有靦面目故於拜恩之日少陳有益之言孔子曰一言可以興邦而孟子曰一言正君而國定昔漢文帝恱張釋之長者之言則以德化民輔成刑措之功孝景入鼂錯數術之語則以智馭物馴致七國之禍乃知為國安危之本只在聽言得失之間恭惟皇帝陛下即位以來學如不及問道八年寒暑不廢講讀之官談王而不談霸言義而不言利八年之間指陳文理何啻千萬雖所論不同然其要不出六事一曰慈二曰儉三曰勤四曰謹五曰誠六曰明慈者謂好生惡殺不喜兵刑儉者謂約已省費不傷民財勤者謂躬親庶政不邇聲色謹者謂畏天法祖不輕人言誠者謂推心待下不用智數明者謂專信君子不雜小人此六者皆先王之陳迹老生之常談言無新竒人所忽易譬之飲膳如服藥石則天人自應福祿難量而臣等所學先王之道亦不為無補於世若陛下聽而不受受而不信信而不行如聞春禽之聲秋蟲之鳴過耳而已則臣等雖以三尺之喙日誦五車之書反不如醫卜執技之流簿書奔走之吏其為尸素死有餘誅伏願陛下一覽臣言少留聖意天下幸甚元祐七年十一月上時為端明殿學士兼翰林侍讀學士守禮部尚書軾上謝表因以規諌上哲宗論四者歸心之道梁燾臣聞聖主之興必敬天道以修人事故曰惟天為大惟堯則之恭惟皇帝陛下聰明仁孝得於天資興嗣明德蚤有宗社天之付畀陛下者如此之重陛下必有以報天順帝而靈承之以對萬壽之福也天之所喜者在安民民之所安者在仁政仁政之道本於安靜而不擾夫安靜而不擾者人心之歸也人主以一身之尊居四海之上必得人心之歸已則享國長久安寧而成太平之功矣今陛下覽政之初是四方觀德之日宜有上當天心下慰人望克承祖宗之休敬用太母之訓安兩宫之慈垂萬世之法此廟社之福天下之幸也臣願獻愚忠以助聰明之萬一焉夫親近法座日侍清光莫如左右之人也人人願效腹心以副眷遇必知其所用心則可使盡節竭忠也臣願陛下戒喜怒平愛憎略小過以盡人之善録小勤以勸人之忠如臂之使指如手之捍衛頭目始終責其力焉此左右所以歸心也夫正朝廷明國體莫如廷臣以道佐人主者有輔弼論思獻納者有侍從拾遺補過者有諌官繩愆糾繆者有御史此王官之要也聚於朝廷各有職守不可使有交通不可使有朋黨交通則蔽聰明亂國政而為姦詐欺罔朋黨則害良善而隔正直此不可不察也常使君子得進小人勿用君子小人相反者也君子正小人邪君子忠小人佞君子得權則敬戒而愈恭小人得權則傲很而難制君子可以與權小人不可以與權臣故曰常使君子得進小人勿用也陛下方以至明獨斷正要左右前後皆得正人以助英睿若不收攬人材何以多得公忠之人任用耶臣願陛下清心正慮以觀羣臣清心在至公無偏正慮在不惑姦説辨别邪正銷除朋黨任賢勿二去邪勿疑辨讒以進忠容諌以養直謹聽以廣謀剛斷以明事信任以保功必求忠實正直之臣以信任之謙恭以求助屈人主之勢以感臣下之心則必有忘身報國之效必有輔佐之功此廷臣所以歸心也安國家保社稷莫如百姓聖人有言曰民惟邦本本固邦寧蓋民定則國定民富則國富用度百索出於民間常令足衣足食無困無怨則事事樂供於公上矣君臣相與謀謨經綸者在此而巳臣願陛下明信法令平易刑賞寬省賦斂輕簡徭役豐穰和平則安養富庶之使有餘力凶荒勞敝則救恤休息之使不失所臣下有寬愛百姓之請者面詔大臣必行之臣下有掊斂百姓之説者面飭大臣深責之此百姓所以歸心也夫繫中國之強弱安危者莫如夷狄當使其畏威懷德謹職修貢敵國則有主賓之義禮信之所接屬國則有忠臣之道命令之所加常處於義信之間而後可以言中國矣自古以夷狄懷德畏威為強不務以闢地為強也以先制人為安不以受制於人為安此不可不察也臣願陛下面命大臣必精選忠賢材略之士付以帥權無用私愛諛從之人終誤邊事謹守疆場寶有土地明信重威制貪禦侮兵戢而時動不得已而用之不茍且目前無事養成後患為朝廷他日之憂必也有恩有威使之知懼服從奔走之不暇此夷狄所以歸心也此四者誠得忠賢上助聖謨然後安靜可成矣陛下今欲發其聰明廣其仁孝上安兩宫之慈下收四海之望始自於宫掖左右中逮於朝廷羣臣下至於百姓逺及於夷狄歡然一意歸心於明君可謂安靜矣若夫羣心歡欣和氣充塞可以致隂陽順序風雨應節年榖豐登人民富壽帝王之能事畢矣臣蒙殊恩擢自侍從塵歷輔佐竊觀陛下有仁聖之資願陛下行仁聖之事望陛下成仁聖之功此老臣區區報國之心也惟陛下財赦而垂聽焉臣不勝懇懇納忠之至元祐八年上時知潁昌府宋名臣奏議卷三
