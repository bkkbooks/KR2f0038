body:
  text: 宋名臣奏議巻二十四宋趙汝愚編君道門風俗上仁宗論謹習司馬光臣以駑蹇之質再為諌官陛下寵祿之優責任之重夙夜震恐不遑寧處思極竭愚忠以報塞萬一顧瑣瑣細務皆不足以煩瀆聖聽竊以國家治亂本於禮而風俗之善惡繫於習赤子之啼無有五方其聲一也及其長則言語不通飲食不同有至死莫能相為者無他焉所習異也至於古今亦然有服古衣冠於今之世則駭於州里矣服今衣冠於古之世則僇於有司矣衣冠烏有是非哉習與不習而已矣夫民朝夕見之其心安焉以為天下之事正應如此一旦驅之使去此而就彼則無不憂疑而莫肯從矣昔秦廢井田而民愁怨王莽復井田而民亦愁怨趙武靈王變華俗效胡服而羣下不悦後魏孝文帝變胡效華俗而羣下亦不恱由此觀之世俗之情安於所習駭所未見固其常也是故上行下效謂之風薰蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及其風化已失流俗巳成則雖有辨智不能諭也强毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫之能變也周易履之象曰君子以辯上下定民志故天子之令必行於諸侯諸侯之令必行於卿大夫士卿大夫士之令必行於庶人使天下之勢如身之使臂臂之運指莫不率従詩曰勉勉我王綱紀四方此禮之本也昔三代之王皆習民以禮故子孫數百年享天之祿及其衰也雖以晉楚齊秦之強不敢暴蔑王室豈其力不足哉知天下之不已與也於是乎翼戴王命以威懐諸侯而諸侯莫敢不従所以然者猶有先王之遺風餘俗未絶於民故也其後日以衰薄下凌上替晉平公之世魯子服囘如晉還謂季孫意如曰晉之公室將遂卑矣六卿强而奢傲將因是以習習實為常能無卑乎其後趙魏韓氏卒分晉國習於君臣之分不明故也降及漢氏雖不能若三代之盛王然猶尊君卑臣敦尚名節以行義取士以儒術化民是以王莽之亂民思劉氏而卒復之赤眉雖羣盜猶立宗室以従民望王郎矯託名氏而燕趙響應董卓之亂袁紹以誅卓為名而州郡雲合曹操挾獻帝以令諸侯而天下莫能與之敵自魏晉以降人主始貴通才而賤守節人臣始尚浮華而薄儒術以先王之禮為糟粕而不行以純固之士為鄙樸而不用於是風俗日壊入於偷薄叛君不以為恥犯上不以為非惟利是従不顧名節至於有唐之衰麾下之士有屠逐元帥者朝廷不能討因而撫之拔於行伍授以旄鉞其始也取偷安一時而已及其久也則衆庶習於聞見以為事理當然不為非禮不為非義是以在上者惴惴焉畏其下在下者睽睽焉伺其上平居則酒食金帛甘言屈體以相媚恱得間則銛鋒利刃很心詭計以相屠膾成者為賢敗者為愚不復論尊卑之序是非之理陵夷至於五代天下蕩然莫知禮義為何物矣是以世祚不永逺者十餘年近者四五年敗亡相屬生民塗炭及大宋受命太祖太宗知天下之禍生於無禮也於是神武聰明躬勤萬機征伐刑賞斷於聖志然後人主之勢重而羣臣懾服矣於是剪削藩鎮齊以法度擇文吏為之佐以奪其殺生之柄擥其金榖之富選其麾下精銳之士聚諸京師以備宿衛制其心腹落其爪牙使不得陸梁然後天子諸侯之分明而悖亂之原塞矣於是節度之權歸於州鎮員之權歸於縣又分天下為十餘路各置轉運使以察州縣百吏之臧否復漢部刺史之職使朝廷之令必行於轉運使轉運使之令必行於州州之令必行於縣縣之令必行於吏民然後上下之序正而紀綱立矣於是申明軍法使自押官以上各有階級以相臨統小有違犯罪至殊死而後行伍之政肅而士用命矣此皆禮之大節也故能四征不庭莫不率服汛掃九州以陟禹之迹至于真宗重之以明徳繼二聖之志夙夜孜孜宣布善化銷鑠惡俗以至于今治平百年頑民殄絶衆心咸安此乃曠世難成之業陛下當戰戰慄慄守而勿失者也臣竊見陛下有中宗之嚴恭文王之小心而小大之政多謙遜不決委之臣下誠使所委之人常得忠賢則可矣萬一有姦邪在焉豈不危甚矣哉古人所謂委任而責成功者擇人而授之職業叢脞之務不身親之也至于爵祿廢置殺生予奪不由巳出不可也洪範曰惟辟作福惟辟作威臣之有作福作威害于而家凶于而國威福之柄一失於人而習以為常則不可復收矣此明主之所謹也又頃以西鄙用兵權置經略安撫使總一路之兵得以便宜従事及西事已平因而不廢其河東一路總二十二軍州向時節度使之權不能及矣唐始置沿邊八節度亦如是而已以其權任太重故後世有跋扈之臣洛誥曰毋若火始燄燄厥攸灼叙弗其絶言謹其微也又將相大臣典諸州者多貴倨自恃轉運使欲振舉職業往往故違戾而不肯従夫將相大臣在朝廷之時則與轉運使名位固相逺矣及在外為知州則轉運使統諸州職也烏得以一身之貴庇一州之事轉運使不得問哉漢刺史以六百石吏督察二千石豈以名位之貴賤哉又自景祐以來國家怠於乆安樂因循而務省事執事之臣頗行姑息之政於是胥吏驩譁而斥逐御史中丞輦官悖慢而廢退宰相衛士凶逆而獄不窮姦澤加於舊軍人罵三司使而法吏以為非犯階級疑於用法朝廷雖特誅其人而已停之卒復收養之其餘有一夫流言道路而為之變令推恩者多矣凡此數者殆非所以習民於上下之分也夫朝廷者四方之表儀也朝廷之政如是則四方必有甚者矣於是元帥畏偏裨偏裨畏將校將校畏士卒姦邪怯懦之臣至有簡省教閱使之驕惰保庇羸老使之繁冗屈撓正法使之縦恣詆訾粟帛使之憤惋甘言諂笑靡所不至於是士卒翕然譽之而歸怨於上矣彼既為之則此效之下既言之則上従之前既行之則後襲之茍彼為而此不效下言而上不從前行而後不襲則怨怒聚於其身而禍亂生矣長此不已日滋月益民之耳目習而安之此有以異唐之季世乎後魏孝明帝時征西將軍張彛子仲瑀上封事欲抑損武人不預清品羽林虎賁千餘人焚彞第殺彛父子官為收捕凶強者八人斬之其餘大赦以安之懐朔鎮人髙歡時奉使至洛陽見之歸而散家財以結客曰朝政如此事可知矣於是始有飛揚之志由是觀之紀綱不立則姦雄生心矣夫祖宗苦身焦思以變衰唐之俗而陛下髙拱熟視以成後魏之風此臣之所以為陛下痛惜也臣愚以為陛下當奮剛健之志宣神明之徳凡羣臣奏事皆察其邪正辨其臧否熟問深思求合於道然後賞罰黜陟斷而行之則天下孰不曠然恱喜詩曰君子如怒亂庶遄沮君子如祉亂庶遄巳蓋言無所臧否之為患大也經略安撫使有征討之事則置之無事則當廢之儻未能變則軍事迫急不暇奏知者使專之可也其餘民事皆委之州縣一斷於法或法重情輕情重法輕可殺可徒可宥可赦並聽本州申奏決之朝廷何必出於經略安撫使哉轉運使規畫號令行下諸州而諸州違戾不從者朝廷當辨其曲直若事理實可施行而州將恃貴勢故違之者當罪州將勿罪轉運使將校士卒之於州縣及所統之官或公卿大臣有悖慢無禮者明著階級之法使斷者不疑將帥之官有廢法違道以取說於下歸怨於上者當随其輕重誅竄廢黜公正無私御衆嚴整者當量其才能擢用褒賞如是則上之人難動而下用命矣上之人難動而下用命此所以尊朝廷也上下已明綱紀已定然後修儒術隆教化進篤厚退浮華使禮義興行風俗純美則國家保萬世無疆之休猶倚南山而坐平原也嘉祐七年六月上時以天章閣待制知諌院上神宗論以質厚徳禮示人回天下之俗彭汝礪臣聞天下之事其出無窮而相尋於無所終始者疑若甚勞而古之人君乃至於無為能得其本而已以四方爲逺故所正者惟京師以一國為大故所正者惟其家以萬民為衆故所正者惟百官又以國家百官之富為不可勝治也故所正者惟其身而已所守者約而所施者博此古之要道也陛下有仁孝之行恭儉之德至誠惻怛之心至於此不難也而臣自京師觀之淫麗之文勝淳厚之樸䘮誕謾之風長正信之俗微非所以示逺方也自宫邸觀之公侯放於奢淫而不禁婦妾習於侈靡而不嚴非所以示國人也自官府觀之相尚以取譽相引以趨勢相傾以就利為上者殘其下為屬者恃其長非所以示萬民也陛下欲為漢唐則固軼於漢唐矣欲至三代而於此未正焉臣以為未也蓋古之人修身以正天下而其俗既成之後雖抱衾之賤妾知自克以義而非止於闗雎之后妃也雖衰世之公子篤於信厚而非止於麟趾之盛時也雖江漢之匹夫皆知無思犯禮而非止於京邑之近也雖牛羊之賤吏皆知有所不忍傷而非獨公卿大夫之賢也以古準今何其寥寥也敝亦必有在矣陛下誠反而思之其躬行之未篤歟其昔者奢侈之敝因循而未革歟亦教之未至而制之不嚴歟所求於士者止以語言而不以徳歟所取於臣下者急於功利歟不然何風俗之難回也陛下有聖人之才有崇髙富貴之資嚬呻俛仰再撫四海之外無為而巳為之無不可至也臣觀四方之人其語言態度短長巧拙必問京師如何不同則以為鄙焉凢京師之物其衣服器用淺深濶狹必問宫中如何不同則以為野焉以此知能以質厚示之則無不従而質厚也異時皇族未嘗知經術也及陛下以經術造之而莫不欲知經術異時士人未嘗知法律也及陛下以法令進之而莫不欲言法令以此知能以徳禮示之則無不従而為徳禮也夫天生蒸民有物有則所謂質厚徳禮皆其所固有者也因性之所固有而順導之蓋無難焉在陛下加之意而巳君子之徳風小人之徳草草上之風必偃此無足疑也小臣以䟽逺妄及陛下之家事以卑職妄及百官之嗜好以聖徳之廣淵而道尋常之務以聖學之日新而言已塵之迹雖臣亦自知其疎濶也考之於古竊以為庶幾焉惟陛下念之熈寧九年十月上時為監察御史裏行上哲宗論帝王之治必先正風俗蘇轍臣伏見皇帝陛下以至孝純仁承統踐祚太皇太后陛下以聰明睿智親攬庶政二聖協徳以幸天下曾未朞嵗而敝事稍去寛政復行元元之民免於流離之患蒙更生之福海内釋然無意外之憂不勝幸甚伏惟陛下㳟勤祇畏發於天性猶復選於羣臣増廣諌員求直言以自助天下之士風聞相慶臣實何人得於今日備位於此然臣聞帝王之治必先正風俗風俗既正中人以下皆自勉以為善風俗一敗中人以上皆自棄而為惡中人自勉於善則人主耳目衆多易與為治中人自棄於惡則臣下朋黨蕃殖易以為非蓋邪正盛衰之源未有不始於此者也昔真宗皇帝臨馭羣下奬用正人一時賢雋争自託於明主孫奭戚綸田錫王禹偁之徒既以諌顯名則忠良之士相繼而起其後耄期厭事丁謂乘間將竊國命而風俗已成朝多正士謂雖懐姦慝而無與同惡謀未及發旋即流放仁宗皇帝仁厚淵嘿不自可否是非之論一付臺諌孔道輔范仲淹歐陽修余靖之流以言事相髙此風既行士恥以鉗口失職當時執政大臣豈皆盡賢然畏忌人言不敢妄作一有不善言者即至隨輒屏去故雖人主寛厚而朝廷之間無大過失及先帝嗣位執政大臣變易祖宗法度下至小民皆知其非而卿士大夫従風而靡則風俗之變於此見矣是時惟有吕誨范鎮等明言其失二人既已得罪臺諌有一言及之者皆紛然逐去由是風俗大敗無一人復正言者天祐皇室啓迪聖徳臨政未幾而以言路為急天下竦然思見祖宗遺俗然臣自至闕廷聞臺諌封事一切留中不出既不施行又無黜責臣不勝憂疑夫朝廷所以待臺諌者不過二事言當則行不當則黜其所上封事除事干機宻人主所當獨聞須至留中外並須降出行遣上所以正朝廷之紀綱使無廢職業下所以全人臣之名節使無負公議若當而不行不當而不黜則上下茍且㢘恥道廢風俗衰陋國將従之臣願陛下永惟邪正盛衰之漸始於臺諌修其官則聽其言言有不當隨事行遣大者可黜小者可罷使風俗一定忠言日至陛下垂拱於上羣臣肅雍於下則太平之治可立而待也惟陛下留神省察天下幸甚元豐八年十月上時初除為左司諌上徽宗論士風之壊游酢臣聞天下之患莫大於士大夫無恥士大夫至於無恥則見利而已不復知有義如入市而攫金不復見有人也始則衆笑之少則人惑之乆則天下相與而效之莫之以為非也士風之壊一至於此則錐刀之末將盡争之雖殺人而謀其身可為也迷國以成其私可為也草竊姦宄奪攘矯䖍何所不至而人君尚何所賴乎古人有言禮義㢘恥謂之四維四維不張國非其有也今欲使士大夫人人自好而相髙以名節則莫若朝廷之上唱清議於天下士有頑頓無恥一不容於清議者將不得齒於縉紳親戚以為羞鄉黨以為辱夫然故士之有志於義者寧飢餓不能出門户而不敢䘮節寧厄窮終身不得聞達而不敢敗名㢘恥之俗成而忠義之風起矣人主何求而不得哉惟陛下留意元符三年上時為監察御史上徽宗論士氣不振節義不立張叔夜臣竊以天下官吏非不衆廩祿非不厚所宜奉承命令究心政術砥礪名節以副陛下惠養元元修明法度之意而乃務於茍簡趣辦目前以恤民隠者為迂儒以親庶務者為俗吏見利茍進而人不以為非忘公自營而心不以為媿懐祿養交慢令曠職士氣不振節義不立衆志相扇懼成風俗雖然未可以此期天下之士亦幸陛下留神采聽或下詔丁寧以訓飭之或因事奨進以激勸之則士風可革不詳年月時為中書舎人給事中遷禮部侍郎上欽宗論風俗由大臣倡導余應求臣聞大公至正之道不行於時乆矣人懐私意士失常心㢘恥道䘮名節不立諂諛相夸詐誕成風以全身保位為賢以竭忠盡節為愚以奔競進取為能以恬退自守為拙以刻剥辦事為有才以重厚長者為無用廢直道而徇私情背公家而任已恩財賄交通於權門侈靡濫溢於私室憎㢘潔為矯詐惡正直為介僻敢言者謂之狂妄正論者謂之迂濶奮不顧身者衆必沮之賢有才者則妬忌之背君忘國不啻路人卑賤之態甚於狗彘禮教陵夷風俗大壊日益滋甚莫可禁止原其所以致此者實用事大臣非其人無以倡導之故也夫大臣者百僚之表萬民之視效也大臣欺君而罔上故小臣誕謾以求合大臣持祿以固寵故小臣僥倖以求進大臣貪冒而不法故小臣並縁而為姦大臣聲色以自娛故小臣奢縦以相髙夫公卿士大夫所為若爾欲望士行之正直風俗之純厚豈不難哉作而興之理若有待陛下以甚盛之徳照臨百官進用忠良退斥浮偽開公正之路杜邪枉之門抑僥倖之求受讜直之言節儉以化天下憂勤以帥羣辟破朋黨以消小人用忠厚以進君子勿昵於嬖幸勿徇於私謁勿間於讒諂大公至正之道復見於今日矣昔者文王節儉正直在位化之羔羊之詩是也今縉紳之徒下至民庶莫不化陛下節儉之徳矣至於在位皆正直臣猶以為未也蓋朝廷之上名器未謹號令未孚好惡未明賞罰未當因縁僥倖者未盡斥姦贓狼籍者未盡誅冒恩濫賞者未盡裁抑諂諛頗僻者尚或隂肆其謀躁進茍合者尚或得請其私背公死黨之習未除附下罔上之風猶在此而不革何以為治願下明詔申嚴訓飭一有不悛重寘于理庶幾士風丕變民俗歸厚以副陛下惟新之政靖康元年上時為監察御史上欽宗乞革欺罔之風范宗尹臣竊謂方今天下之事可革者甚衆而欺罔之風革之尤不可緩夫鹿之與馬相去逺矣然髙謂鹿為馬而二世惑焉者蓋以天下而欺一人故也以天下而欺一人其禍可勝言哉臣觀國家自崇寧以來上自宰輔大臣下至州縣賤吏莫不以欺罔相髙是以財用匱竭生靈愁痛災異數見盜賊羣起而道君不知也前日之禍職此之由今陛下纘紹之初國步艱難之際正當明四目達四聰之時而臣下尚有肆為欺罔者使此風復熾則天下之禍將有甚於前日者矣願明詔臺諌自陛下即位以來中外之臣有曽為欺罔者事無巨細已敗未敗悉仰檢舉彈奏以聞然後聲其罪於天下而重加誅責使天下曉然知欺罔不可復為則陛下深仁厚澤得以究矣靖康元年上時為監察御史宋名臣奏議巻二十四
