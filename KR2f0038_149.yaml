body:
  text: 宋名臣奏議卷一百四十九宋趙汝愚編總議門總議五上英宗十事傅堯俞臣伏自念愚拙無狀久無所補不敢頻乞入對以煩天聽今有十事條列於後一竊見軍營摧倒極多材用人力卒未能辦集恐朝廷以軍人暴露督役苛急今積潦方甚天氣漸寒伏乞據材用人力以責功限但使無惰慢者足矣如此免使役之人更生咨怨且令營造頗得堅偹一竊聞僧慶輔內降指揮與鑒義雖未即施行候有闕與試緣斜封內降今古以為惡政不意陛下復啓其端在先帝詔條慶輔合行勘責臣以其事小不欲露章奏劾伏望今後如此等事一切停罷一竊見近日擢用多新進之士久在仕塗者豈皆是非材今充滿外庭率未聞選擢此曹既無崇顯之望益自懈退伏望參用舊人以勵其力一設官分職各有司存今百司備具而每有興作營造必差他官領之故耗蠧益多而不中程度伏望一切委之有司茍不修舉則重行降黜一伏見三代治道猶不免弊必隨宜而救之昔周人尚文文之弊小人以僿故救僿莫若忠今風俗多浮文少實事可謂弊極矣伏望進質朴悃愊之士抑華而救之一竊見近日王宫官進用頗速臣以為選材以輔導皇子茍得其人宜頗持久庶相諳悉有所禆益今開王邸乃仕官之捷徑耳惟陛下留意一伏以以疏間親是謂不遜臣雖至愚荷陛下拔擢過寵不敢以疏逺自外輒及陛下之親者然非敢有所間也今遭遇陛下者人多附而趨之其識分守道者必不肻輒為此態有附有不附則愛惡隨而生矣其毁譽之言望陛下審察一伏見先帝事無巨細必徇至公雖輔弼恩幸一有公議無偏主者故大臣與內臣無極盛之權所以多厯年所力省而無事不知體要者謂先帝崇奬言事者過當宜一切矯之臣以為果如是於陛下無益適足長輔弼恩幸之權耳恐陛下久逺力費而事多雖欲悔之無由也一竊見士大夫以至吏民皆以陛下為不納忠諌陛下以睿聖之資而得此聲於天下豈不惜哉臣觀聖度閎深雖苦言訐斥亦不加怒所少者未能擇善而從之耳不能擇善而從雖日對千人且無益於事臣恐朝廷之公議日鮮陛下之聰明日塞此事非細願深思之一伏見近日陛下於皇太后禮意有加兩宫頗甚歡睦雖禁庭邃密莫審端倪然其知者莫不慶抃陛下畏天戒進修子道此事宜不虛矣願陛下日謹一日益盡孝誠天將報陛下以大福固不獨人情之悅喜也右皆當今切務有益光明輒效知無不言不復更擇臣既不敢徒為髙論又不敢飾為繁文言淺意深願陛下必賜收采治平二年九月上時為殿中侍御史上神宗十事程皓臣竊謂聖人創法皆本諸情極乎理雖二帝三王不無隨時因革踵事增損之制然至乎為治之大原牧民之要道則前聖後聖豈不同條而共貫哉蓋無古今無治亂如生民之理有窮則聖王之法可改後世能盡其道則大治或用其偏則小康此厯代彰灼著明之效也茍或徒知泥古而不能施之於今姑欲循名而遂廢其實此則陋儒之見何足以論治道哉然儻謂今之人情皆已異於古先王之迹不可復於今趨便目前不務髙逺則亦恐非大有為之論未足以濟當今之極弊也謂如衣服飲食宫室器用之類茍便於今而有法度者豈亦遽當改革哉惟其天理之不可易人所賴以生非有古今之異聖人之所必為者固可概舉然行之有先後用之有緩速若夫裁成運動周旋曲當則在朝廷講求施設如何耳古者自天子逹於庶人必須師友以成就其德業故舜禹文武之聖亦皆有所從學今師傅之職不修友臣之義未著所以尊德樂善之風未成於天下此非有古今之異者也王者必奉天建官故天地四時之職厯二帝三王未之或改所以百度修而萬化理也至唐猶僅存其略當其治時尚得綱紀小正今官秩淆亂職業廢弛太平之治所以未至亦非有古今之異也天生蒸民立之君使司牧之必制其常産使之厚生則經界不可不正井地不可不均此為治之大本也唐尚能有口分授田之制今則蕩然無法富者跨州縣而莫之止貧者流離餓殍而莫之恤平民雖多而衣食不足者蓋無紀極生齒日益繁不為之制則衣食日蹙轉死日多此乃治亂之機也豈可不漸圖而制之哉亦非有古今之異者也古者政教始乎鄉里其法起於比閭族黨州鄉鄼遂以相聨屬統治民相安而親睦刑法鮮犯廉恥易格此亦人情之所自然行之則效亦非有古今之異也庠序之教先王所以明人倫化成天下今師學廢而道德不一鄉射亡而禮義不興貢士不本於鄉里而行實不修秀民不養於學校而人材多廢此較然之事亦非有古今之異者也古者府史胥徒受祿公上而兵農未始判也今驕兵耗匱國力亦已極矣臣謂禁衛之外不漸歸之於農則將貽深慮府史胥徒之役毒遍天下不更其制則未免大患此亦至明之理非有古今之異者也古者民必有九年之食無三年之食者以為國非其國臣觀天下耕之者少食之者衆地力不盡人功不勤雖富室強宗鮮有餘積况其貧弱者乎或一州一縣有年嵗之凶即盜賊縱橫飢羸滿路如不幸有方三二千里之災或連年之歉則未知朝廷以何道處之則其患不可勝言矣豈可曰昔何以不至是因以幸為可恃也哉固宜漸從古制均田務農公私交為儲粟之法以為之備此亦無今古之異者也古者四民各有常職而農者十居八九故衣食易給而民無所困苦今京師浮民數逾百萬觀其窮蹙辛苦孤貧疾病變詐巧偽以自求生而常不足以生日益嵗滋久將若何事已窮極非聖人能變而通之則無以免患豈可謂無可奈何而巳哉酌古變今矜孤恤寡漸為之業以救之耳此亦非有古今之異者也聖人奉天理物之道在乎六府六府之任治於五官山虞澤衡各有常禁故萬物阜豐而財用不乏今五官不修六府不治用之無節取之不時豈唯物失其性林木所資天下皆已童赭斧斤焚蕩尚且侵尋不禁而川澤漁獵之繁暴殄天物亦已耗竭則將若之何此乃窮弊之極矣唯修虞衡之職使將養之則有變通久長之勢此亦非有古今之異者也古者冠昏喪祭車服器用等差分别莫敢踰僣故財用易給而民有常心今禮制未修奢靡相尚卿大夫之家莫能中禮而商販之類或踰王公禮制不足以檢節人情名數不足以旌别貴賤既無定分則姦詐攘奪人人求厭其欲而後已豈有止息者哉此爭亂之道也則先王之法豈得不講而損益之哉此亦非有古今之異者也此十者特其端緒耳臣特論其大端以為三代之法有必可施行之驗如其綱條度數施為注措之道則審行之必也稽之經訓而合施之人情而宜此曉然之定論豈徒若迂疏無用之説哉惟聖明裁擇熙寧二年上時為監察御史上神宗論時政富弼臣近者因拜謝章輒敢略具南事附奏伏計愚懇尋逹天聽蠻冦大擾即已竄歸然王師遂行必謀弔伐水陸並進威德兼施若夫討禦之方得失之際則非臣庸之所預知也伏望陛下密詔郭逵等候至二廣熟計攻守利害速具奏聞可往則往如不可往則令别圖去就以全王師之重海嶠阻逺恐難責其固必也臣又竊聞秦隴之外數年用兵尅取熙河等五州别立一路闢地進境開拓故疆誠為國朝美事足光史册也然而逺近共傳當時殺戮人命不可勝計費耗財用莫知紀極是皆主事者公為欺罔不以實數上奏致陛下無由得聞而進止也今既立成部分建置官屬屯兵守禦各有定制即須所得之地所出之物以供贍一路自能取足不假外求然後可為長逺之利遂成開拓之益則向者人命不為枉殺財用不為虛費也奈何罷兵後唯聞朝廷自京師輦運金帛監司從內地支撥糧草增添轉遽遞鋪奔走不絶於道滔滔而去尚云不足一二年來又云彼中米麥每斗計錢四五百文賤亦不減三百以上公私皇皇汲汲日憂不逮若常如此則不唯枉殺虛費而又自此國家府庫如何供億民間物力如何出辦遂使官私俱困得之何用况陜西乏用即今上下窮窘已甚事茍得實臣竊憂之伏願陛下親選無所畏憚公忠臣寮不與其時用事人為黨者往彼按視土地可耕否所收物貨足用否人情可安否久逺可守否俟得其實然後委二府會議方見經久利害如何若不審行考校但務竭力勞費臣謂末等之家有十金之産者且猶未肻如是况乎為天下之計哉惟陛下深切留意也唐宣宗朝北方亦曽自舉十數州內附未嘗少加攻取既而供饋闕乏終却叛去唐亦不復顧藉更乞略賜檢詳亦可以為證矣臣又竊聞代北之地狄人妄有爭占意在先發殊無義理朝廷以其倔強難制遂欲盡與此説傳播甚盛然終未知虛的萬一是的則聞者莫不憂駭何哉蓋夷狄貪婪後患彌大彼曲我直事甚明白且宜以理辨析未易可許昔趙王欲賂強秦六城而虞卿不從東胡欲求胸奴甌脫而冒頓勿與觀其簡册足為龜鑑願陛下取此二説以今疆事反覆參校始末輕重與二府議定決然利害奏稟而後行此須特出宸斷也臣又竊聞纍年新法所行之事條目甚多陛下近已深見為害但虛懷隱忍未即更張此誠大得為君之道從容優裕而不欲迫急也然所謂為害者皆害及天下之人被害既久則豈尚容舒緩哉度今事勢正如解倒垂之急唯恐解之不速也亦如人之感疾疾深則難愈木之受蠧蠧深則難補惟陛下所見害事既明芽蘖已著者宜早圖之必無太早之失更或稍緩則遂成疾蠧深患朝廷益難奠枕矣况天下不以賢愚共知陛下始欲講求大治比迹唐虞前代帝王用心非所能及而不意為人所誤至此事皆成弊究其端由實非陛下之失唯是衆口共責為謀者恨不食其肉焉今聖情既巳開悟稔知其非而猶隱忍護惜不速更張却恐遂玷聖德也臣更願陛下於左右臣僚中不以職位髙下常視其反覆狡獪者疏之純良方正者與之反覆狡獪者雖有姦才強辨可以惑人其如自取名位及援引親舊結成朋黨互相保庇表裏膠固牢不可破如此之類者豈可置之左右而任之以事乎蓋本無一定之志不恥不仁不畏不義不見利不勸必無忠藎慤實安肯乃心於國家也純良方正者才辨誠有不及狡猾之人然其心不二持守堅篤中立不倚傍無朋比用之則直道而進捨之則奉身而退不為利回不為義疚忠亮之節至死不移不肯欺昧朝廷自求多福如此等人終無妄誤必能為國家立事假有未能立事者亦不為害也陛下臨御既久當盡照見固難上逃聖鑑此尤宜常挂宸念恐非須臾可忽也緣誤用一二姦人則展轉援致連茹而進分布中外大為朝廷之害卒難救整唐文宗所謂破河北賊易破朝廷朋黨難者正為此也天子無職事唯辨别大臣邪正而進退之此其職也切乞謹之臣狂瞽之説實有愛君憂國之心固無他志伏乞俯賜聽納早賜裁處不勝宗社生靈之幸熙寧九年四月上時以司徒致仕上哲宗五事邢恕臣竊惟皇帝陛下纂紹大統太皇太后陛下躬親庶政于茲纍月政事之大者略已損益施設矣然自古巳來政事出房闥其患常在大臣擅權同列暌乖互相傾軋羣下各有附麗造為朋黨則不能同心協力王室卑弱而太皇太后聖情簡嚴其於政事無有適莫唯是之從務合僉諧不信偏入之言不惑背憎之説聽言必驗之以事疑似必究其情實故左右不得以誣欺相傾軋如是則羣下固無所附麗不得造為朋黨矣前代母后臨制常患外戚僣驕盈溢交通請謁以紊刑賞而太皇太后爰自內輔英宗檢制外家曲有禮法以致總覽政事族人畏謹加甚前日則外戚固無驕盈之漸矣漢唐諸后茍専聽斷者北司要人未嘗不鼎貴強盛而太皇太后端居凝然罕所降接雖至親近持法謹嚴不私假借泊然無欲自宫省老於事者率以為莫能窺測無不惴惴小心則北司固無貴盛之嫌矣自先皇帝寢疾外廷大臣曽未及建一言而太皇太后獨斷出於聖心儲二之建旬浹巳前固已先定及先皇帝奄棄羣臣而皇帝即大位太皇太后以嫡祖母保抱擕持天性之親根於自然間諜之語不起慈愛之聲日聞至於拔用人材修舉政事自前世以來號為明王聖主殆無以過制政下令不出房戶簾帷之間而惠澤流於八區仁聲動乎萬里誠能益虛聖心務受盡言克勤以繼之則巍巍乎赫赫乎書契已來未之有也然而太皇太后止於今日便謂天下無事可以髙枕而卧則固未也何則今邊兵未解夷狄方將窺伺中國動搖疆場以修怨刷恥坐費厚賂而民力積困今幸年榖豐稔政事設張雖已先其急者而恩澤未浹惡吏尚繁命令之出或未能奉承而朝廷美意不得下究倘遇飢饉師旅天下未免猶有盜賊之憂此正聖心夙夜焦勞講求治體之時大臣忘身徇國背私向公同心合力之日臣請姑條五事以獻臣竊惟皇帝方育德思道未即親事太皇太后雖總覽大綱而不悉留神於細故則不得不倚辨責成於大臣所以布為朝廷耳目賴以互相檢察者不得不偹設臺諌大臣誠能存心盡公處事必當則臺諌雖設而可以無言陽城為諌議大夫六年未嘗論事及德宗罷陸贄欲相裴延齡然後以死固爭若陽城則所謂逹大體也至於臺諌時論細故末節以摧折大臣為大臣者誠能體國則亦不宜以此嫌忌臺諌朝廷亦不當以細故末節而於大臣輕為厚薄進退如此則國威伸於上主恩行於下大臣得體而臺諌舉職矣唐德宗初即位代宗將藏山陵禁屠殺而郭子儀家奴殺羊裴諝以職事劾奏或曰小事不足以傷大臣諝曰尚父方貴盛天子新即位必謂黨附者衆故劾其細過以明不持權也吾上以尊王室下以安大臣不亦可乎若裴諝者可謂有逺慮矣今誠備設臺諌而大臣存心至公所失不過細故末節則不言者固為逹大體而言者未害其有逺慮也然則增廣臺諌之為有益明矣如是則朝廷耳目布於下而太皇太后可以雍容頥養保心固體萬夀於上仁宗末年大抵淵默罕復親事委政大臣大臣不敢懷姦挾私者用此道也而况太皇太后振提其綱領乎雖然設之不得其人猶不設也臣愚以為莫若深詔大臣人各舉其所知而後合議於上前太皇太后考其素履有某事可稱有某節可尚然後舉而用之則所失者亦鮮矣一也古者天子一嵗或五嵗一出巡狩察吏善惡究知民間疾苦後世人主深居九重之中不能冒風雨犯霜雪為寒暑之所匽薄疲筋力於道路自秦以來始置御史監察郡縣而漢改為刺史乘傳行部嵗終得奏事京師唐之所謂採訪使今之所謂轉運使副判官提點刑獄常平倉官之類皆是也此即代天子巡狩者其任不輕也明矣國朝故事率先厯知州差遣然後擢為監司或自通判先擢權知州然後擢為監司自通判擢用者間亦有之而幾希矣唯是臺諌官出為監司乃有資序未深者然昔者官未升朝則不得舉臺官朝官往往曽厯知縣比為臺官又為監司則資序亦率通判已上當是時監司髙者厯知州下者率歷知縣其更事老成可倚辦者多矣詩曰雖無老成人尚有典刑魏太祖曰吾非聖人也更事多矣然則老成人固重於典刑而更事多者至竊比於聖人則老成人更事之為益亦明也古之任人所以四十強而仕五十命為大夫者蓋此意也頃者方急人才以便事功初置提舉官率用京官為之有朝脫銓選暮為監司者此乃一時用人之意非持久經逺之法也故先帝末年選用尚書省官非知府不得為郎官非通判不得為員外郎則先帝固知資序之不可廢而老成更事之人有益也特以施設先後有不暇給故於監司未遑釐正耳今誠深計天下之利害郎中員外郎典領職事止於一曹而監司按察乃一道逺者綿地千里州縣百數官吏數百千而户口生齒以萬億計則其利害輕重不相凖明矣然而資序之限特設於郎中而未及於監司者豈先帝開其端而資其終者有待於今日乎臣愚以為提舉以上非通判資序自今不宜除授即自臺諌除者不在此限庶得更事老成之人布為監司而天下之民浸被聖澤此今日之急務也且又可以息馳騁之弊而使官吏稍安職業于以收成材矯薄俗所謂一舉而包兩利二也商書曰眀王奉若天道樹后王君公承以大夫師長不惟逸豫惟以亂民古語曰天之生民非為君也天之立君以為民也周之太王為狄所侵以愛惜民命去邠遷岐寧棄其國不忍鬭其民詩人以為太王肇基王迹以得其民也此孟子所謂得乎丘民為天子者也夏書曰民惟邦本本固邦寧然則民之急也如是三代而下西漢之文帝柬漢之章帝號為仁德之主竊讀二帝本紀恤民惻怛見於詔令嵗嵗有之漢宣起於閭閻知民疾苦時之要務每歎息曰與我共治天下者其惟良二千石乎漢郡太守得自辟除進退縣令長太守得人則縣令長無不良故漢所選用者惟二千石耳隋唐以來州縣守宰率皆命於朝廷則郡縣最為親民之任治天下者以民為急而守令最為親民不可不選不可不激厲唐之開元號為盛際所以致之者有姚崇宋璟以為相也臣嘗讀元稹連昌宫詞稱姚宋之所致治之大略不過於燮理隂陽偃戢兵革遴揀守令皆出宰相而已比嵗守令善狀罕有聞焉詢諸往來或舉一路郡縣百數而良守令難以屈指一二計則生民受弊者為不少矣方朝廷用人如不及之時掄選才能比比出於疏賤而獨於守令以治績超擢者無幾也得毋偶未之及耶今誠欲簡拔守令以勸循良使惠及吾民則先謹擇監司非其人則朝廷雖有甄别守令之意而監司蒙蔽朝廷不得其事實則所謂良者不良所謂能者不能矣臣愚以為今日天下監司未足倚信則莫若先敇執政大臣聚議博採拔求守令治狀尤異者數人舉天下之廣宜不難得大抵宜以愛民惻怛為先奉公營職為後蓋後世之法茶鹽酒𣙜征管之利多岐雜出不若堯舜三代之法一出於愛民故唐陽城有撫字心勞催科政拙之語而德宗嘗令縣令對策宰相欲第其髙下未知所出薛珏曰今取縣令不専文辭宜以意在愛民者為先也宰相從之既而所取莫不得人則守令宜以愛民惻怛為本亦可見矣以此求之誠得其人則其資任髙下優加進擢見於訓辭務從褒異且以厲天下所取不過數人而為守令者莫不慕效則四海之內億兆之衆人人被潤澤蒙厚德矣然後深詔御史臺舉劾監司尤無狀者稍加澄汰監司之選既清而付之以考察則守令之良能者必出矣三也有子曰百姓足君孰與不足或問揚子曰桑𢎞羊𣙜利而國用足如何曰譬之為人父而𣙜其子縱富如子何未有子富而父貧者也禮記大學亦曰未有府庫財非其財者也故曰富有天下則天生地長舉天下之物莫非人君所有在民在君誠無以異前日陜西五路進兵百姓負糧入界和雇一夫率費百千初時民力尚全莫不相率竭其力以應命及後再三調發民力弗堪王師迄不能再舉然則民力弗堪國家固不能以舉事則富民者乃所以富國也漢武帝末年深悔既往之征伐下哀痛之詔罷輪臺之戍乃封丞相為富民侯此武帝所以為雄材大略蓋能知悔又知所救敝也唐自中葉已後既經安史之亂王室微弱藩鎮強盛皆自擅其財賦故有常貢之外别進羡餘以希恩寵人主急於用度因而假借蓋以方鎮既擅財賦朝廷難於調發故耳今四方萬里內外一體詔令一出迅如雷霆屈伸自如勢若身之使臂臂之使指縣官之於百姓即有所取何求不獲不必令轉運使於平居無事日為倉卒征斂之計時以民財濫圖恩賞也昔仁祖時蘇順元為淮南轉運使嘗進羡餘有詔免劾所進錢止令留住夲路以備災傷臣愚以謂今日誠欲生民蘇息逺近蒙福宜下詔書明敇諸路轉運司不得獻進羡餘即嵗計有餘可但令留充夲路次年支費抑非徒此而已也發斂之際又有抑配之弊支移折變之苛官出則以陳粟腐麥代見錢支俵如充青苗和買之類以率計之號為千錢者民間所得不過數百此所謂抑配之弊也賦入則法當近送者又令逺輸如南州所納則支移北州道理皆逺負輦滋費則併以腳乘課令出錢法當出粟者乃折令出麥麥固加貴於粟既已出麥則又折令納錢錢固難得於麥矣於是有斗當三四十金而所納至於百錢者轉運使止以咳唾指麾坐獲倍利此所謂支移折變之苛也凡此皆法所當禁而轉運使比多公違詔條無所忌憚願敇所在安撫使都鈐轄提刑司覺察聞奏及許州縣守令吏民自陳如此則掊克之吏庶知畏戢矣且青苗錢取息終嵗不過二分而向者議論紛紜纍年不定今轉運使公違詔條肆行抑配支移折變旬朔之間取民倍利豈不甚哉或曰轉運司財賦所仰給今束之太急將無以舉職是大不然使轉運使果才嵗計所須止於詔條之中自可以應辨有餘矧復嵗計之外朝廷不求羡溢加以善政所感年榖必應租賦所入不緣水旱蠲減何患不足豈有公違詔條力脅州縣出則以片言估物而就髙價入則以尺紙粗色而取貴直以此論功無異戲㺯此正不才者之所為又法所當禁何謂束之太急哉四也賈誼有言人主之尊如堂羣臣如陛衆庶如地陛九級上廉逺地則堂髙髙者難攀卑者易陵故人主之勢非能獨尊也自一命之吏纍而至公卿次第益尊而人主加焉然後為至尊耳國朝故事拜宰相樞密使官必除侍郎同知樞密院已上必除諌議大夫三司使必除給事中若侍郎權御史中丞必除諌議大夫以直龍圖閣權領邊帥官小猶除正言自天章閣待制巳上則固凖此四方大郡帶都鈐轄或大都督府為守者非帶館職則諸曹郎官吏民聳然知所尊奉以其異於他官也權同知樞密院已上皆政事之臣權御史中丞乃紀綱之任而三司使實主邦計故髙者則必處以侍郎其次則兩省官為之諌議大夫是也直龍圖閣為邊帥事任要重天章閣待制已上乃侍從官故必以小兩省官為之正言是也假使不論職名而官直為正言則固已可貴矣當是之時官職清濁髙下錙銖方寸皆有分别不得淆亂踰越故朝廷尊榮人知嚮慕先皇帝獨患名實不正故改為官制以寄祿官寓品秩名實既正而推行之日淺其於甄别流品遷敘次苐固未有暇向者官制雖行而有旨命兩省官修補其法則此固在所講也今以堂堂有宋盛明之朝自尚書已上率多試官豈不陋哉然為尚書者原其所自來則皆嘗厯學士職其品秩與尚書不甚相逺為侍郎者率多由天章閣待制除用與侍郎名品亦略相當然一為職事官則必除去職名故有承議郎試尚書者見者不知其職嘗為學士也苐見承議郎與昔國子博士等爾乃為尚書豈不可輕哉名藩大郡或臨制一道或鎮一都會而既無三館貼職又無諸曹郎中員外捨直龍圖閣待制已上則皆朝奉朝散郎若大夫為之其下與通判簽判知縣監當官名無異也內外體勢浸以卑損上下陵遲吏士軍民率有慢輕之意陛廉太削非所以尊朝廷也加以官制之行于茲已逾三年率以滿任今諌議大夫中書舍人給事中侍郎遷比待制爾若遷尚書則為太峻即自諌議舍人給事遷侍郎則與自大卿太常少卿除侍郎者為一等反不為之遷矣是遷敘未得也今欲除用人物或資與官相對而其才不必稱或才與事適當而據資不相凖譬猶户部侍郎闕為天章閣待制固可入其才不必稱為龍圖閣直學士才或稱任則資不可屈是除授未便也矧自直龍圖閣而上所存職名皆禁奧殿閣圖書之任今以寄祿官在外則有加焉而在京師則不可本末倒置體勢未順且朝廷職名本待賢俊今雖其人宜在朝廷而一除職名則必出補外如趙彥若可以留備臺諌而緣除龍圖閣待制故出知亳州孫甫年少任職可當省部繁劇而緣除直龍圖閣故出知陜府授受之際巳見其拘牽矣臣愚以謂今日官制之論不過秦漢漢之加官若諸吏左右曹散騎給事中之類即今之職名也官制祖述止於唐六典而三館貼職集賢院學士六典具載夲職施於朝廷今自直龍圖閣已上職名誠許令職事官兼帶則不害其為正名也而又有三利焉以待制學士職為尚書待制則試官可去中外有所瞻仰吏民知所尊奉陛廉之勢益峻而可以尊王室隆主威遷授之際職雖學士可以下為侍郎待制可以兼領卿監直龍圖閣可以冠省寺之職為官擇人無所留礙殿閣圖書之任得兼內外本末不至顛倒體勢順序所謂三利也故事職名自校勘至龍圖粗而論之猶有四等其上又有集賢殿史館修撰集賢院視職事之髙下官品之大小而加焉亦有始加即為修撰直龍圖閣者必其差遣內則三司副使同提舉在京百司之類乃得為之外則帥臣三路轉運使江淮發運使久次為監司典大州若都鈐轄大都府之類乃得為之其他皆以嵗久次第纍遷而後至職雖為直龍圖閣修撰又必差遣事任要重然後得遷待制諌議大夫其法至詳密故朝廷用之有所勸激而士大夫由之以進不得僥幸今既盡削去三館貼職而獨存直龍圖閣凡須寵以職名者無有髙下一切為之故有府界提點而帶直龍圖閣者今日與之既失於太優而後日一遷則其上為天章閣待制將又失於太峻於此時不復早計前慮則他時用之必困者也今果職名為可去則當一切除之然而直龍圖閣之類尚存者果不可去也職名果不可去而待制以下獨存直龍圖閣何哉今既獨存直龍圖閣又必以寵帥臣資望之淺者欲以聳人觀聽也然而聳人觀聽者不獨至於帥臣而後然其餘典大州當方面據都會若江淮發運使三路轉運使之類皆當係人觀聽者也今寄祿官既已通為一等又無清曹郎官臺諌之屬則所以稍辨異者唯有職名爾而一以直龍圖閣待之其可乎臣愚以謂昔日館職為優幸者唯為校理一年即理通判資序三年理知州為太過爾今誠於此裁損率以二年成資為一任而盡復校勘已上至修撰等貼職此固於正名於官制可以並行救其所不及使髙下等級粲然有序朝廷用之而有所激勸士大夫由之而不得僥幸流品分别吏民尊信五也今誠行此五者皆國家之大體時之要務以太皇太后之聖智宜無所疑即參之大臣訪之羣議恐無以易五者畢行私徇滅而德意彰民心固而主勢隆然後揆之以道將之以德以虛心為本以無我為用唯大公是存唯至正是守無有偏黨唯是之從所謂道也體道而不失不為好惡所奪不為喜怒所遷有得於身所謂德也道德立於上而公卿觀法於下上下相濟然後奬忠義以尊吾君長廉恥以消羣枉用人必以信行為主而後論才能考績必以功實為先而後責文具謹擇能吏練習公家臺省故事者裁省簿書行移務在先急闊略苛辟使人力足以勝事倣唐律令格式事有經常者著為定式不須上問官曹小事有所建請次苐得専裁決不必一一奏覆小懲大戒付之省寺俾得警胥吏之違慢以防滯留如此則小大畢舉太皇太后可以優遊泮渙質成於上保護將就皇帝聖質至於成德則所謂宗社之慶蒼生之福豈有極哉臣自惟太皇太后親政已來首蒙拔擢度越比倫則臣之所以圖報效亦不宜自同於衆人冒瀆宸嚴臣無任祈天俟命惶懼屏營之至元豐八年上時為起居舍人宋名臣奏議卷一百四十九
