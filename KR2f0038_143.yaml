body:
  text: 宋名臣奏議卷一百四十三宋趙汝愚編邊防門交趾上神宗論李憲討交趾楊繪臣伏聞交趾猖狂上負聖化方議討伐雖神謀睿算已決勝於千里之外而臣不度愚昧敢陳芻蕘出於愛君之切然也伏乞采其狂言臣聞軍志有之善攻者攻其所不守善守者守其所不攻今側聞潭廣易帥修飾守備而南閩泉福之守未聞議焉雖越廣然後抵閩然慮泛海使便風或有出其不意亦未宜忽於守其所不攻也交蠻擾於南方其於出師命將及偏禆之選皆西邊北邊之官素號能者在行然臣亦慮國家鋭意南討而忽於西邊北邊之備設萬一有乘虛掩不備之寇則其憂又大矣則亦非所謂守其所不攻之義也臣所謂西北之備者非謂增兵嚴警張皇其事但隂留驍勇諳練謀慮之將不盡遣行於南討庶乎有以備西北緩急之用也竊見癰疽之醫未嘗不先用托裏之藥蓋治病於皮膚者必先固護於心腹此雖醫工之智亦不可謂不知所先後也唯願陛下察其先後而慮乎皮膚心腹之害焉臣又覩招討副使李憲年三十五六官已為防禦使職已為押班況聞有才今仗宗廟之威靈禀陛下之聖䇿功其必成臣願陛下儲思於他日成功之後也成功之後賞爵必崇年又未髙權又益盛乞陛下處之得其當而已伏惟陛下聰聞眀覽其於古今安危之機歷代興亡之轍中貴任權之成敗不假臣縷細而述謹按唐憲宗命吐突承璀為行營招討使于時白居易為翰林學士上疏切諫在其集中臣非不知陛下聖德神功過憲宗逺甚今李憲又止是副使非如承璀之比然臣遭逢聖恩忝在白居易之位而又翰林學士三員鄧綰入試院陳繹出知府本院宿直唯臣一人則臣之榮幸又過於居易臣不欲使唐憲宗朝獨有翰林學士白居易敢言事而陛下聖德神功過唐憲宗逺甚乃無翰林學士白居易者是敢進其區區伏望陛下赦其狂僣之罪而賜之深思逺慮熙寧八年十二月交趾以經略使沈起劉彛連年生事侵擾舉國怨憤遂舉兵寇雍州詔以趙卨充安南道安撫招討使內侍李憲為副使繪上此奏時為翰林學士九年二月命郭逵為經略招討使改趙卨副罷李憲上神宗論蠻獠侵犯乞詔諸道以寬民為務富弼臣退伏草茅不預人事近者竊聞蠢爾蠻獠犯我疆封二廣致災五嶺嚴備雖為手足之患諒煩宵旰之憂然而命將得人出師有日上禀宸算必成武功臣又竊聞淮南纍嵗尤為荒䭑流亡餓殍賑濟難周今驟起數萬之徒間由諸路而往兵馬所到糧草須辦監提守宰唯務供軍府庫倉箱殆難足用既各求於集事恐必致於擾民又有按察之官繼行督責之令上下逼迫公私煎熬人心不寧實可矜惻臣又竊聞南方鄉村城郭重疊逋缺官司錢物其數浩浣若監司州縣又相迫催理仍與此時贍軍所費一併取足則民不堪命無以為生嘯聚驚騷或難禁戢陛下天賦仁聖纍降寬恤之詔其如所在闕用出於無可奈何須至侵漁方能濟集而又官吏各思一時茍免罪責不暇為國家憂及後患而為長久之計也臣又竊聞諸處興修水利之類役人甚衆多或至於一二十萬此傷耗民財事亦不細伏願陛下深詔有司并下諸道以寬民為務凡所逋缺可蠲者與蠲放理難蠲放者多分料次且令迤邐輸納及權罷諸般興作全養民力一意専以破賊為急俟嶺南寧息嵗時稍豐然後别上圖議以稱朝廷有為之心固亦未晚也臣杜門謝事祗如聾瞽但時得於四方之人傳聞者今録以上奏茍有妄說惟陛下恕其愚而憐其心以來衆正之路熙寧九年六月上時以司徒致仕居洛陽上神宗論交趾備禦九事張方平臣伏見交趾自李日尊以來貢職已廢朝廷濶略不問邊臣茍慢防禁益弛凶惡恣賊姦蠧之民諸配徒者不無逋逃頗從亡匿亦有士人頑嚚不逞投身亡命赴其招進教之治兵助為邪計故今乾德敢奸王命凶黨用事多是華人往時遣使例抵其國見城中無居民府舍湫陋茅竹屋數十百區以為軍營兵器有弓弩木牌梭槍竹槍弱不堪用勢不能為中國患故逺而易之至景德中李氏竊此封域及今七十餘年王人久不涉其地不復知其虛實今聞其城栅隍塹乃有數重兵力民衆必益充足頗略旁近占城等諸小國事勢設施比前為强大而嶺南長吏猶習故常本非經逺之才又忽不虞之戒狂妄輕脫為國生事蠻性狠悍有不能堪告訴不聽投書不受事情壅塞積成忿恨及其戰艦抵岸軍鼓叩城如入無人之境略無交鋒之備寇兵所至城邑為墟遷致貨財係纍婦女封豕長蛇恣其酷毒傳聞其事可為痛心然此為既往之咎方當慮將來之䇿謹條九事列于左方一事今淮甸兩浙江東西湖南北州縣仍嵗旱蝗陂澤竭涸野無青草人户流散窮荒極弊事可憂痛方當散利薄征緩刑弛役布德施惠以撫存保息而盜起南裔王師大興此時民力何以復堪賊發臣愚以為今兹上䇿當以謀取不可以力勝謂宜且擇廣桂二守臣精密毅重識略足任者屬之方面付以便宜使各選部下文武將吏其兩路職司官朝廷為遴選令協力從事招集户口各安本業為發禁卒以代荆湖見兵益令募土丁壯分屯緣邊城邑使足以保守要害更相救赴則賊不敢窺徼內自取殱夷峙糧儲積芻茭為事及其有備揣情觀變臨事制宜嵗年之時經營進取蓋中國御蠻夷固有大體圖功宜審慮害宜深務在保威靈紓民力全士馬之用惜金帛之費先取多福以絶後虞此為全勝之算經逺之道倘謂業已興舉難於散遣猶有中䇿具諸下條二事蠻寇自入欽廉以至陷雍州殘暴黎庶吞食城邑既而席卷還其藪穴及今已纍月朝廷旌死事者而録其孤推恩厚矣然及民之惠尤有闕者春秋傳魯莊公曰小大之獄雖不能察必以情曹劌曰此可以戰蓋謂其重人命也謂宜特降德音下廣南荆湖以慰安逺人之情使知陛下哀痛傷惻之意凡四路百姓耗病之事加惠優恤之庶國家仁恩無所不逮至如解釋罣誤以安吏卒之反側開設賞募以招溪洞之酋豪祭酹其亡魂掩藏其殘骼皆前代常行之事也夫文之所加者深即武之所伏者大德之所施者博則威之所制者廣震曜殺戮生殖長育功用相承此天之道也三事東南六路災荒已甚官私匱乏莫相救恤又緣青苗助役市易之法農民困於輸錢工商窘於射利謂之錢荒人情日急今王師薄伐聚于荆潭調發賦輸即以軍興從事荐饑之際供億實勞臣聞豐財用兵之本也所有荆湖南北廣南東西四路青苗助役市易法伏望特賜先罷役法令復依舊制施行以此宣布德澤慰說民心易曰說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉四事臣聞兵者死生之地存亡之道不可不憂深而思逺知天知地勝乃可全地者逺近險易廣狹也彼蠻之舉事非謂其衆可以抗王師非謂其智謀可以勝中國而敢為暴害至是者負山海之險林藪之深可以出為寇患可以入與戰鬭乘其無備因而得逞傳聞蠻界其崖壑深阻處篁叢林薄不通人行人有操持器仗者縱橫不得回轉頃年貢象治路略容象行謂之象路象過尋復蓊塞蠻行如鳥獸奔竄山藪間自知其路外人不得而入也今業已失備致寇蠻又悉衆而歸王師出征是行天討非救急之兵也救急則欲速要之致誅而已不計收功之緩當圖全勝之䇿今興師十萬日費千金鋭士不可久於瘴鄉驍騎不能馳於鳥徑營栅無所立糧道不能通長兵無所施行器無所用財殫力屈徒沮國威先有自困之形未見必舉之勢何也若士馬而得用則螻蟻之衆何足平若士馬而不得用則熊虎之力無所展儻今冬蠻未撲滅則來春兵須抽退更圖後舉臣竊難之臣識暗志衰安知軍旅之事但以古今方䇿亦足比測事宜向者嶺南有萬兵蠻何敢輕入切謂今來弔伐兵在於精不在於衆可以計取難以力爭况淮浙江湖公私罄匱人至相食豈有積蓄計置芻糧若令諸軍且駐襄鄧將佐僚吏省去冗員隨行廂軍量充役使自餘浮食一切勒回以寬轉輸省齎送國財民力實為大計襄鄧間比年豐稔倉廪充實軍留就食足支嵗月士飽馬肥暮秋引發乘鋭誅賊軍氣自振後無艱乏方可圖功五事臣觀蠻事可以計取難與力爭蓋交趾氣俗與諸蠻不類諸蠻貴種姓服從貴種義不可奪今交趾自國朝以來已易四姓皆由大校以權黨篡奪乃是唐末藩鎮遺風故其勢易為翻動竊聞乾德尚幼諸酋共事而主三人今年入寇大獲金帛子女各得所欲蠻夷不義唯利是貪歸國爭功豈能相下如其三郡分授三酋各為主領被之告命使達蠻中事縱不行必生猜二以至他日其釁常在多方以撓之則功易舉矣兵法曰軍莫親於間事莫密於間非精知微密不能用之間之術神妙之道也唯時㑹之難得今實得其時㑹惟陛下深念所以可付之人誠為上䇿六事林邑國在交州南境本象林之地漢時列為郡縣後有功曹區連者殺縣令自立為王因别為國歷江南六朝嘗羈屬之隋仁夀中擊破其國尋而自復至唐朝貢不絶國朝以來為交趾所隔遂不復至然自晉宋歷代常侵寇交州南史以為林邑素無土田貪日南地沃常欲略之故乘釁即入日南九德諸郡輒留不去唐末亦是為羣獠搖扇以陷交州為中國患今揣能害交趾者唯林邑且林邑與交趾相去才千里本共象州一州之地今桂州至雍州尚十四程則是林邑交趾之間比雍桂中間程途猶近意者募能使外國之人諭以討交趾事約之師期使自一面入㑹王師如能破交趾者以日南九德之地委之蠻夷貪重利必自為力亦伐國一竒也七事竊見安南後軍見在本府待師期所領南京一將外又涇原秦壠之兵約二千五百騎聞約取七月到本府正是六七月間在路到此又便南行夏秋盛熱比至桂州已行萬里臣前已陳蠻界山林崖壑之險不通人行馬實難用頃年儂賊作亂狄青破之聞在雍州西北適近山坡地勢寬平馬得施力故當時破賊馬軍之力為多今日行軍深入蠻地事與儂賊不同儂賊溪峒一首領入我郡縣之間止是劇盜擊破即麋爛矣今交趾自是一國竊有土宇恃其險逺主客勢殊秦渭馬軍弓箭手本備羌戎皆是捍邊鋭兵徑騎有到京師猶謂不伏水土輒生疾病而乃驅之瘴霧沮洳之中巉巗險惡之地水多沙毒草無藁秸進又不可以馳突決勝其能還者無幾矣況西北戎虜睢盱顧望如聞王師逺出邉騎多行忽起風塵來犯亭障東西往還萬里莫相赴應又不比海隅之失備矣凡言國家大事必曰軍馬軍馬者戎事之本不可忽也今邉塞簡選一鋭士調習一壯馬甚不易得盡心於國者方知之爾所有昨召邉要將官及騎兵願各遣還本道使荆湖多募丁壯搜補諸州土軍其將士諳識山川地利其騎亦只用南馬格式雖下筋力自壯慣行隘險安其水草使與中國之人相先後勢之便者也且使戎虜知朝廷之力一方有警邉備晏然不為動也八事伏見安南招討司期留請兵以八月中旬悉至潭州潭州去桂州十四程竊聞嶺外嵐瘴八月九月尤甚謂之黃茅瘴草黃時瘴氣方盛十月已後氣候始肅湖南飢荒糧草難致久留就食實費供輸若使引行觸冒瘴毒士馬未用恐多病疫若展一月期㑹可省一月芻糧湖湘之民大寬事力比至其時新榖已熟暮秋湖外風土調適免致人騎枉有損傷國計軍行兩為便利九事本朝祖宗有邉防大事亦嘗博採羣議今安南之舉興師十萬萬里討伐涉危度險利害甚多然聖志先定國論已協伏願特降璽書內外近職之臣各令獻䇿以示博訪之道使四方知陛下重謹之意三軍知陛下憂軫之懷觀其臧否亦以見羣臣之才識愚者千慮尚須有得採擇所長不為無補也熙寧九年六月上時為宣徽南院使知應天府上神宗論再征交趾蔡承禧臣聞漢儒之言曰聖人以天下為度傳曰江海納汙國君含垢則知天下之治亂無窮若銖銖以較之則道有所不及故聖人限要荒之俗以不治治之而天下無不治也伏自交寇之弗率一隅之間兵死于道者相屬丁男之轉輸而弊于行者相繼糜都內之財以億萬二嵗之久可謂勞矣而所得者廣源數州之地而已夫瘴海窮山蛟虺霧毒之淵藪飛鳶墮於上溫風泊其間殆非人境雖盡得之顧何補於天下今若討安南之罪則已伏罪矣雖三苗弗率而七旬班師義亦何以加此然而郭逵趙卨尚未罷歸邊兵未還營伍外議喧傳以為李乾德之降疑不深自引慝朝廷再欲興師不識有此否乎夫蠻蛋之俗介居荒服之外通譯而能書亦已多矣臣知朝廷必不計其意之厚薄而與之較也夫所謂限之以荒服者三代之治蓋詳密矣亦以為不足治何也不欲以逺而勞近以夷而困夏若朝廷以為蠻夷以讎劫為事既已收取其境土而殪其元惡俘其黨類慮其復為異日之患聊用逵卨之徒以守之使其怯於攻討之勢而不來可也萬一有再舉之䇿臣願更且詳思熟講假湖廣之人安息數年俟瘡痍平殄然後留意未可輕議以恢陛下納汙含垢之量臣誠識淺言輕干冒天威熙寧十年上時為監察御史裏行蠻徭上仁宗論討戎瀘小夷不必自秦鳳興師文彥博臣今覩梓州路奏㳙井監夷人作過事體不小乞依慶厯四年例於秦鳳路差撥兵馬赴本路救應事臣勘㑹慶厯四年夏瀘州界夷人作過是時臣任秦鳳路都部管經略等使准朝㫖令臣發禁軍兩指揮赴瀘州救應臣以秦州去戎瀘四十餘程地逺必赴救不及枉有拖曳兵甲臣雖知不便當時以朝㫖丁寧不敢稽留異議遂發禁軍兩指揮赴瀘州未及中路夷人果已退去其上件兩指揮兵士只到遂州駐泊是時川界州軍見此兵士經過人情頗亦驚恐兼為遂州官吏不曉軍政不能平心撫馭動有猜疑幾至生事臣知益州日鑒此舉動之失曽具利害擘畫聞奏以謂戎瀘些小夷人作過只是本處白艻子弟及寧逺兵士自可禦遏若賊勢稍大則計㑹梓夔益利兩路就近差郍兵甲可以討擊蓋蠢爾小蠻來則禦之不可窮其窟穴豈煩逺自秦鳳興師空自勞弊兼恐别有驚擾況嘉眉州皆是益州鈐轄司屯兵之處若發兵救應乘舟下水不三四日便至瀘州赴救之勢最為神速臣之奏章必在樞府可以復視伏乞更不自秦鳳發兵只令速計㑹益州鈐轄司相度量差兵甲由水路赴瀘州䇿應尤為允當慶厯七年上時為樞密使上仁宗請罷五溪之征劉敞臣聞舜為天子禹為司空伯益贊之君臣之盛自古未有也以伐三苗曽不能得咫尺之地因班師振旅而歸晉郤缺率諸侯之師八百餘乘挾公子捷菑以攻邾婁斥候不設城門不閉以韋帛通語言諸侯皆罷故曰非吾力不能攻義實不爾克也此二者皆不可謂善戰矣然舜禹不以其故貶聖伯益郤缺不以其故損賢理有逆順義有曲直也今武溪諸彭父子結怨而邉臣輕發兵為子討父得無非春秋王伯之略乎臣以謂過矣智者欲騁其巧勇者欲用其力矯箭纍弦勵劍負㦸以深入為事甚非治天下之大體臣聞古者三王之伐征不貢討不朝今彭氏父子所以爭一旦之命者乃自以失職不得朝貢也臣以謂可聽以休邉民此舜禹之䇿益郤之義所以眀於典謨春秋也往年嵗星在鶉尾則宜厚仁義以應之而始誅五溪逆父子之節難以得天今盛夏動衆下潦上霧多毒蛇惡草之害難以得地天地之道者自古五帝三王之所務通而順也雖有聖辨莫之能變其說而況縱欲貪功徼一時之勝者乎恐此為人臣之利而非國家之福也臣願朝廷謹之嘉祐元年上時為知制誥上哲宗乞徙瀘州戍兵歸內郡吕陶臣竊見昔年瀘州乞弟入寇始因求索一髦骨價事至毫末而邉吏貪功覬賞擅行殺戮以至敗軍覆將搔動一方上煩朝廷兩次命帥西討調發數萬公私之費其數不資兩蜀瘡痍今未全復初林廣統領大兵深入巢穴及到乞弟住坐處止有茅屋數間賊亦遁去竟不能獲乃是以天地之力與螻蟻計較毫釐以生民膏血棄如糞土爾此朝廷固未詳知也其後以王光祖為瀘南安撫意欲生致賊酋光祖怙權作威肆其殘虐藩漢被害怨淪骨髓經營數年亦無所得此朝廷亦未詳知也今瀘州內外屯兵萬餘作為聲勢欲致此賊其䇿亦踈矣夫欲致賊而不匿其形賊不可得且萬兵之費饋運日勞雖無寇至坐耗民力臣愚以謂乞弟之存亡違順不足上煩朝慮宜一切置而不問唯徙重兵歸內郡以省橫費戒邉臣守疆場示不必取之意要以嵗月當有成效貼黃今春瀘南傳乞弟已死又云相次投降乃是招安將輩妄為之辭以要小利皆不足信唯宜置而不問元祐元年上時為殿中侍御史上徽宗論沿邉納土三害馮楫臣伏見夔峽廣南邉臣開納土之議誘置熟蕃接武請吏金銀繒絮以啖其欲髙官厚俸以侈其心開闢荒蕪草創郡邑一部不下三四州而縣又倍之入版圖者存虛名充府庫者無實利而官吏廩祿軍兵餉饋修治城郭日月彌廣官吏支持不暇百姓奔走輸送之不給其為害一也建築以來調發害於民間者不可勝計而費出縣官者亦不為不多其初監司核實布賞名為軍須唯恐其後常平使者不復執奏已失元祐立法之意而漕司於經費之外復有饋運未免侵支封椿折變科率其為害二也州縣之吏躐庶官而升法從脫選調而位正郎武辨轉橫行布衣竊仕版白丁黥徒為將校者又不論也名器既已假人而祿廩因而耗蠧有司嵗計已數倍於熙豐矣其為害三也不毛之地既不可耕而狼子野心頑不可革建築之後西南夷獠交寇綿茂而播州溪洞之蠻亦復跳梁犬豕之衆果無足慮蜂蠆之毒不能無傷士卒死干戈官吏沒王事生民肝腦塗地往往有之以此知納土之議非徒無益而又害之也莫若委擇帥臣或監司令條具建築以來財用出入之數商較利病核實以聞可省者省之可併者併之縣不足建則易之以鎮寨官吏不必衆則總之以護戎戎兵可減饋運可省夷狄可撫而邉鄙之患可息矣自今以往邉臣招地之請邀功生事之隙不可不嚴禁而杜絶之也宣和三年四月上時為蜀州教授詔令成都潼川夔州廣西路帥臣監司同共相度控扼緊慢利害合省併存廢處聞奏宋名臣奏議卷一百四十三
