body:
  text: 宋名臣奏議卷九十一宋趙汝愚編禮樂門褒崇先聖上仁宗論孔宗願襲文宣公祖無擇臣伏見至聖文宣王四十七代孫孔宗願襲封文宣公乃是其人未死已賜諡矣臣切觀前史孔子之後襲封者衆在漢魏則曰褒成褒聖宗聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封以鄒國唐初曰褒聖或為君或為侯為公為大夫使奉祭祀唯漢平帝追諡孔子為褒成宣尼公遂以均為褒成君至唐開元二十七年追諡為文宣王又以其後為文宣公是皆以祖之美諡而加後嗣生而諡之不經甚矣欲乞明詔有司詳求古訓或封以小國或取尊儒褒聖之義别定美號加以封爵著于令式使千古之下無以加於我朝之盛典也至和二年四月上時為太常博士有㫖送兩制詳議上仁宗論孔宗願襲文宣公劉敞等臣等謹按漢元帝初元元年以師孔霸為關內侯食邑八百户號褒成君而霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食八百户祀孔子及霸卒子福嗣福卒子房嗣房卒子莽嗣皆稱褒成君至平帝元光二年始更以二千户封莽為褒成侯而追諡孔子曰褒成宣尼公以此觀之則褒成者國也宣尼者諡也公侯者爵也褒成宣尼公者猶曰河間獻王云爾蓋推宣尼以為褒成祖非用褒成以為宣尼諡也唐世不深察此義以褒成為夫子之諡因疑霸等號封褒成者皆襲其祖之舊耳故遂封夫子文宣王而爵其後文宣公考校本末甚失事理因循承襲至今不改先帝既封泰山親祠闕里又加文宣以至聖之號則人倫之極致盛德之顯名盡在此矣尤非其子孫臣庶所宜襲處而稱之者也臣等以謂無擇議是可用其文宣王四十七代孫孔宗願伏乞改賜爵名若褒成奉聖之比上足以尊顯先聖有不可階之勢下不失優異孔氏使得守繼世之業改唐之失法漢之舊傳曰必也正名又曰正稽古立事可以永年此類之謂也至和二年四月上時為知制誥勑文宣公可特改衍聖公上神宗乞罷追帝孔子李清臣等臣伏准批送下判國子監常秩李定黃履吕升卿等劄子奏為乞追諡孔子帝號及乞於孔子廟庭建立孟軻揚雄像貌加以爵號嵗時從祀等事送臣等詳議者臣聞堯舜用道以治天下孔子明道以傳後世堯舜君也孔子臣也同為聖人道德同也堯舜聖人也孔子亦聖人也而或為君師位號不必同也故道德存于人而所歸常同位號受于天而所遭常異此事理之固然而名分之所不能齊也然則孔子雖無位豈害孔子之聖哉故歷代尊之廟貌薦奠服被衮冕弟子侍配自天子以下皆北面師事之或封其子孫世世不絶今陛下以不世出之聰明有堯舜之位而用孔子之道德以制作法度養育天下其於二三聖人之業可謂兼之矣而左右之臣推原道之所自建畫大義謂宜追諡孔子而帝之意義甚美然臣愚惓惓竊有未同者昔子路欲使門人為臣孔子之所不與今無位而帝之慮非先聖之本意且孔氏雖聖異姓也究考古今自非推五嶽之天神及追諡祖宗之同體而以異姓為帝號於故事亡有若以之顯號發䇿動觀聽於天下臣誠以為未安也陛下若深採儒老從官尊廣道德之意折衷其論發自聖斷特詔有司升先聖釋奠為大祀使列於郊廟日月天神之次禮樂祠事皆增而大之及封爵孟軻揚雄賜諡立像侑坐配食卓然異於武成之祀亦足以示陛下興儒隆師修德明道之大㫖臣愚職為禮官獲奉明詔使得預兹議不敢回隱所見以茍免違異之罪惟聖神裁幸熙寧七年十二月國子監常秩等言切惟孔子之道萬世帝王所宜師法歷代之主雖知慕其名而不能行其道雖嘗崇其號而不能盡其實今陛下發明經術陶成天下之士至於作新百度又未嘗不推原其意可謂能行孔子之道矣然其爵號猶襲唐制臣等聞皇以道帝以德若孔子可謂道德之至者也宜因盛時追諡帝號以盡聖人之實以稱尊崇之意其冕服祠事乞下有司詳定制度又言孔子之後能明聖人之道者莫如孟軻揚雄而歷世以來未嘗加以爵號又不載之祀典欲乞於孔子廟庭建立像貌加以爵號嵗時從祀以稱陛下崇尚儒術之意詔兩制與國子監禮院官詳定以聞於是翰林學士元絳等言參詳自生民以來莫盛孔子雖當時無位不得以有行然其載之後世者上自天子下逮黔首莫不師用其道則其德業盛大不待論之而後著也中間有唐雖嘗加以王號在於後世尚為臣爵誠不足以仰稱先聖道德之實欲乞依國子監所請尊加帝號委得允當所有冕服祠祭等乞下有司别詳定制度孟軻揚雄出於孔子之後能明其道以闢邪說其於後世誠為有功各乞封以公爵餘欲並依國子監所請孔子舊號有所未盡乞别賜改諡清臣時判太常寺上此奏上神宗論孟子配饗林希臣伏見古者配饗及從祀但取著德立功其道有以相成者不必皆用同時之人如蠟之祭也主先嗇而祭司嗇先農之祠則以后稷配神農勾芒為少昊氏之子祝融為髙辛氏之子今春秋之祭則勾芒配伏羲祝融配大庭迎氣之日又為之從祀是異代之人得為配享明矣唐貞觀二十一年詔以伏勝髙堂生杜預范寧之徒二十一賢與顏子俱配享孔子廟堂至今猶為從祀孟子於孔聖之門當在顏子之列至於荀况揚雄韓愈皆發明先聖之道有益學者久未配饗誠為闕典伏請自今春秋釋奠以鄒國公孟子配饗文宣王設位於兖國公之次所有荀况揚雄韓愈並以世次先後從祀於左丘明等二十一賢之間所貴上稱聖朝褒崇儒賢備修祀典之意貼黃檢㑹左丘明至范寧二十一人並封伯爵如允所請即乞荀况揚雄韓愈並加封爵自國子監及天下至聖文宣王廟皆塑鄒國公像其冠服同兖國公仍畫荀况等像於從祀之列荀况在丘明之下揚雄在劉向之下韓愈在范寧之下冠服各從封爵元豐七年四月先是晉州奏據雄州防禦推官知秀州崇德縣事充州學教授陸長愈狀切聞朝廷近降敕命追封孟軻為鄒國公長愈幸蒙推擇備數外學以督州徒遭遇聖世崇嚮儒術推原道德發明之由以孟氏為有功於聖人特加爵號不惟錫土封賁廟祠而已將使天下學者知所尊尚而不失其指歸此當今甚盛之舉往者之所未嘗及也天下幸甚然長愈猶有管見伏覩每嵗春秋釋奠于先聖至聖文宣王以先師兖國公顔子配享近制十哲皆得分獻長愈竊以謂朝廷既封孟軻為鄒國公則亦宜從祀蓋爵位既加禮數必異躋之於先師則為已隆班之於十哲則為已殺惟與顔子並配為得其宜至於序坐則非長愈所敢議也孔子之得顔回則回也見而知之孟軻之學孔子則軻也聞而知之見而知之而為聖人之亞聞而知之而為聖人之徒其時雖殊其道則一此長愈所以謂並配為得其宜也論其知覺之先後居世之近逺則門人為親而顔必處孟上以其聞先聖之道距楊墨之言後世為有功而孟不在顔下此長愈所以謂序坐則非所敢議者也欲乞今後春秋釋奠並以兖鄒二公配享如允所請即乞下禮部定奪次序立式伏乞備録聞奏本州據陸長愈狀奏聞得㫖下太常寺定奪本寺看詳以謂先聖文宣王先師顏子配享以次從祀皆其門弟子也孟子之道固當尊禮然於孔子異代難與顏子並行配享本官所請難議施行者希時為禮部郎官上此奏上哲宗論孔子後凡五事顔復臣聞二帝三王之道至孔子而大明百家之辨不能誣萬世之逺不能晦有天下國家者既有其教思隆其報故與社稷並祀自古皆有土邦無化不立有生皆欲食俗無禮不成由是論之其功輕重又可喻矣歷代致治之君又爵其後使襲美號以昭聖人之澤賜田給廪以豐其享然制度未立聖人之祀容有時而不振度今之可行者其要有五一曰專其祠享二曰優其田祿三曰復其廟幹四曰司其法則五曰訓其子孫專其祠享者漢魏以來皆以嗣侯專奉祠事國朝乾德以來嘗詔其後宜延世助任曲阜官使嚴時享又詔襲封人令常任近便官不得逺去家廟近世孔氏雖紹孔聖公爵多任外官違離陵廟名實乖異無主祭之責爼豆之事勢難精䖍欲乞今後襲封之人並理所入資序留奉祭祀如有卓異才行為朝廷採擢及通判以上並擇以次當承襲人權主廟事子孫未立通擇近屬漢孔霸元帝即位為帝師錫爵關內侯食邑八百户號褒成君上書求奉孔子祭祀詔以所食八百户祀孔子故霸還長子福于魯奉夫子祀乃其故事優其田祿者前代褒成褒聖崇聖奉聖侯食至千户唐曽給百户為采邑國朝太平興國二年免其家租賦至真宗朝又增賜田至二百頃後因京東監司奏官為制撲嵗課甚薄欲乞賜增良田俾其家自墾庶仰祀俯養僅得封公之祿復其廟幹者自漢以來孔子之廟或以吏卒百户守衛或又增户以備灑掃國朝祥符中給近便户以奉塋廟又給守兵後定差鄉兵五十人謂之廟户以備庶役熙寧役法之更此制漸削今差使仍舊欲乞復差廟户五十人以守衛灑掃師廟及充王祀者白直其約束並用役人之法則人不知勞悅乎輸力不悖聖師使民之義司其法則者孔氏祭享恭怠財賦均滯使人厪逸皆繫一時主家之人使刻薄之吏得以托闕而為言致緣其小故以廢其大者由無立法防弊之素也欲乞置官一員或就擇本邑佐掌其祭祀之式財用之例役使之科郡縣以時鈎考而懲勸焉則弊消于未然而師門益尊矣訓其子孫者祥符初賜曲阜宣聖廟九經書疏釋文史集令本州選儒生講授祖宗錫聖人之裔又如是之深厚後人不能茂明以及廢失是可惜矣欲乞朝廷命有經行官或選儒生而秩以祿俾講授闕里誨勵孔氏及其鄉黨則能者成才罷者逺罪鄒魯之風教易復行不止能保其祭祀而已五者並用則聖朝崇儒報本之實淳粹悠久度越前代逺矣元祐二年上時為禮部員外郎上哲宗乞定子思封爵朱光庭臣朱某准朝㫖抽索看詳禮曹文字取到禮部公案一件元祐四年八月二十一日承受都省送下宣義郎孔若䝉狀乞追封孔伋爵號本部八次符太常寺勘㑹經隔年月未能結絶今檢㑹朝㫖一項事干大體仍令申取朝廷指揮已牒禮部促令結絶去訖須至奏請者右臣竊詳孔若䝉陳乞孔子之子鯉孫伋封爵事伏緣古者封爵之及或以德或以功或以言如鯉雖孔子之子然始聞詩聞禮德未著見而早世伋字子思嘗學於曽子得聖道之傳著為中庸一書垂之萬世君臣父子兄弟夫婦朋友盡斯道者可以造聖賢之域至于窮性命之理究中和之致講天德之微㫖論至誠之妙用孟子師之然後得其傳固非荀揚韓之可企荀揚韓尚䝉聖朝茅土之封而獨未及子思誠闕典也伏乞朝廷特下禮官定子思之封爵以顯朝廷尊隆聖道之意乃盛德之舉也伏乞聖慈特賜施行貼黃昔孔子仕魯從大夫之後鯉無襲封之理後世尊孔子以王禮今日特正襲封以屬若䝉乃其禮也又緣鯉之見於經祇有學禮之訓德未著於世而早亡子思則傳聖人之道見於世者也孟子師之然後得其傳荀韓揚固未及其堂奧今聖朝封孟荀韓揚獨不及子思於義誠以為未足伏望聖慈特正子思封爵以永萬世尊儒之道元祐五年四月上時為右諫議大夫羣祀上仁宗論修火祀胡宿臣伏以火正閼伯之祠在南京國朝受命之地自祖宗以來未領祠官切為朝廷惜之按春秋傳髙辛氏之二子長曰閼伯季曰實沈居於曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商丘以主辰故辰為商星遷實沈於大夏以主參故參為晉星又襄公九年傳陶唐氏之火正曰閼伯居商丘祀大火而火紀時焉且五行之官祀為貴神每嵗五時祀之謂之五祀火正又配食於火星者以其於人有功祭火星又祭之漢書曰古之火正謂火官也掌祭火星行火政季春昏心星出東方而咮七星鳥首正南方則用火季秋星入則止火以順天時以救民疾云爾大辰房心尾也大火謂之大辰周官保章氏之職以星土辨九州之地所封之域皆有分星鄭氏引十二次之分則云大火宋也左氏傳亦曰宋大辰之墟漢書地理志宋房心之分野周分微子於宋今睢陽是也按圖經云商丘在宋城縣西南二里髙八十丈周回二百步今閼伯之祠直當其上蓋房心天帝之明堂太祖皇帝於此受命奄宅天下以宋建號以火紀德都梁宋之郊當房心之次則大火之精閼伯之靈擁祐福蔭國家潛受其施者深矣而傳序四聖享祀弗及祥符中交修大禮拱揖諸神雖偏方逺國山林之祀不出經據偶在祀典者尚秩王公之爵增牲牢之品而大火閼伯國家蒙福之地又陶唐氏之火正宋興八十年祠官不以聞此有司之闕也又按左氏國語董因逆晉文公於河公問曰吾其濟乎對曰君之出也嵗在大火閼伯之星也是為大辰辰以成善又曰嗣續其祖如榖之滋韋昭以為辰為農祥周先后稷之所經緯以成善道子孫繼續其祖如穀之蕃滋推此而言則東方七宿房心通有農祥之稱若因舊立古祠除潔壇地臨遣近臣對祭閼伯不惟講修火正亦足以祈求年豐以陶唐之舊祀祖宗之闕典一旦陛下恢而復之為萬世法詒厥子孫永錫純嘏臣不勝區區康定元年上時為集賢校理同判吏部南曹詔下太常禮部言伏以閼伯為堯火正實居商丘主祀大火能宿其官後世因之祀為貴神配火侑食亦如周棄配稷后土配社之比下歷千載遂為種祠祖宗已來郊祀上帝而大辰已在從祀閼伯之廟每因赦文及春秋委京司長吏恭致沃奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火德宜因興王之地商丘之舊作為壇祧秩祀大火以閼伯配之每建辰建戌出納之月內降祝版詔留司長吏奉祭行事籩豆牲幣得視中祠雖非舊章特示新禮其閼伯舊廟并壇祧之制請如宿所奏官為修崇之其言比年國家數有火災宜遣使告謝然消復變異專在君德恐未可施行上神宗論鬻祠廟張方平臣伏見司農寺奏請降下新制應祠廟並依坊場河渡之例召人承買收取淨利本府勘㑹在府及管下所管祠廟五十餘處尋已依應施行訖內有閼伯廟宋公微子廟已係百姓承買閼伯廟納錢四十六萬五百文微子廟十二貫文並係三年為一界臣竊以閼伯逺自唐堯遷此商丘之土主祀大火而火為國家盛德所乘而王本朝歷世尊為大祀微子宋之始封君開國于此亦為本朝受命建號所因載于典禮垂之著令所當䖍潔以奉時事又有雙廟乃是唐張巡許逺以孤城死賊所謂能捍大患者今既許承買之後小人以利為事必於其間營為招聚紛雜冗䙝何所不至慢神瀆禮莫甚於此蓋聞有天下者祭百神故咸秩無文毖于羣祀先聖哲王所以致恭于鬼神者所以為國家萬民六經訓典備矣故曰克典神天俾作神主此人君之職也今既嵗收微細而損國體至大臣愚欲乞朝廷詳酌留此三廟更不出賣以稱國家嚴恭典祀追尚前烈之意熙寧九年八月上時知應天府上批司農寺鬻天下祠廟辱國黷神此為甚者可速令更不施行其司農寺官吏令開封府劾之又批擅鬻祠廟為首之人已劾罪其赦後不覺舉改正官可並劾之又詔司農寺市易司創改條制可並進呈取㫖不得一面擬進行下上哲宗乞考正歷朝之祀顔復臣聞禮或失中寧過于厚過厚之積不可致逺國之大事無若于禮禮者謂有其舉之莫敢廢也有其廢之莫敢舉也言固厚矣然皆本先王立法而後言三代之時不無不正可疑之祀由聖人裁之以義是者存之否者去之為天下不刋之通法雖有髙才强辨莫能舉廢也近世拘儒不考本義操寧厚之疑論謂歷代之祀有出于秦滅學之餘時君迫取俚儒無根之說者有原于緯候妖妄之書者有由諸儒解經一時臆見穿鑿傅㑹者有取傳記非聖雜書者有本方士術家禬禳陰陽拘忌之術者既謂莫敢廢之與常祀共行則民疑致力祝多愧辭有司奔走不勝媟煩學者觀之莫原其禮雖齊明盛服思度如在嘉玉吉幣豐牲潔粢至神不榮矣國家襲唐之舊有加無損皇帝陛下寅畏三靈勤毖羣祀太皇太后陛下明德格神萬方伊嘏唯歷朝之弊未深講明此達禮者夙夜惓惓于盛時也伏乞降詔禮官考經為正凡于䜟緯及諸儒曲學前古汚朝茍制諸子疑禮道士醮祈術家厭勝一切刪去然後大小羣祀皆合聖人之制行之無瀆慢之嫌奉者免繼倦之色潢汙可薦黍稷惟馨上帝居歆百神享止三時不害景福來同矧禮成樂備之世是以臣愚冒昧喁喁有望于陛下也惟陛下留神則臣與達禮之士不勝大願元祐元年上時為太常博士宋名臣奏議卷九十一
