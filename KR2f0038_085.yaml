body:
  text: 宋名臣奏議巻八十五宋趙汝愚編禮樂門郊祀上英宗乞罷郊宫無益工作吕誨臣竊以國家之大事莫重於郊祭罄明察之心尚質崇簡所以稱天子之徳也天神之祐荅以靈貺享是精誠而已陛下纂紹之初方修大禮自詔下中外災祥屢至霖雨之後積隂不解繼之以雪民之困窮饑凍迫切咨怨之聲喧于衢路且人心悦則天意順今民憂結不解和氣從何而生乎殆陛下奉天之意有所未至佐佑之臣或慢其事未盡䖍恭之誠爾况冬至俯邇乗輿臨幸之處經雨摧壞未修者尚多期限既促督役愈急在有司不得不然也豈唯冒寒工作滅裂枉費物料罷癃之卒不僵仆則自經而死可勝其數傷和氣之尤甚臣以為陛下一意崇祀經歴之處雖有頽垣壞居何害於行禮宜尚質崇簡以副天心如臨祭之處土木興作丹雘雕飾青城浮華之設工作無益者權令停罷少寛人力以塞怨望至若災沴之際禱祈之事固亦有之雖當遣輔臣詣宫觀齋㓗求晴然人臣未足以動天釋老何徳以庇民所切者陛下之誠宣布於外聊以慰都人之望此二事唯聖慈留念早降指揮祀事更在䖍修以召和氣臣不勝惓惓之至治平二年上時為侍御史知雜事上神宗論青城勞費乞建齋宫吕誨臣伏覩累降詔勅裁減浮費有以知講求治體崇儉為先中外共聞莫不慶抃臣切謂裁約用度事體至輕有司奉行當有條理唯南郊青城所須數十萬緡勞費至廣無益奉祠之大者謹按周禮掌次之職旅上帝祀五帝則張大次小次居止于壇壝之外蓋所以示䖍恭之至矣近世制作無度禮意俱失虚設梁棟純被繪綵規摹宸居極其華麗甚者山亭水池蟲魚之戯綵花交映禽物萬狀游觀之勝無不具焉前期旬浹縱士庶嬉游其間是豈蠲㓗事神之謂哉徒成侈靡夸大一時臣雖至愚甚為聖朝惜之且大禮尚質猶懼不稱乎天德而華觀所居恐非得以清乎齋戒儀衛之盛今古不同大次之位豈須幄帟不若營建齋宫以圗永久臣嘗觀太廟齋宫制度儉約事神之體得為中禮臣欲乞規此憲度剏建郊宫中㓗齋居外嚴宿衛非特事祀克循簡易庶幾國用大省勞費我朝興隆一百餘年未暇改為陛下一旦經始人心必悦有益聖德於事易行伏望留神省察天下幸甚熈寧元年上時知諫院上神宗論諒隂合行郊禮王珪臣等謹按王制喪三年不祭唯祭天地社稷為越紼而行事傳謂不敢以卑廢尊也則居喪而可得見天地也春秋僖公三十三年傳凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟杜預以謂新主既特祀於寢則宗廟四時常祀自當如舊是則居喪而可得見宗廟也周公稱商髙宗諒隂三年不言子張疑之以問仲尼仲尼荅曰何必髙宗古之人皆然髙宗不云服喪三年而云諒隂三年者杜預又謂古者天子諸侯三年之喪既葬而服除諒隂以居心喪不與士庶同禮也然則服除之後郊廟之祭可勿舉乎南齊以前代君嗣位或仍前郊之年或別自為郊下有司議而王儉乃援晉宋以來皆改元即郊而不用前郊之年又自漢文以來皆即位而謁廟至唐德宗以後亦踰年而行郊況本朝景德二年真宗居明德皇太后之喪既易月而服除明年遂享太廟而合祀天地於圜丘臣等伏請皇帝將來冬至躬行郊廟之禮其服冕車輅儀物音樂縁餙事者皆不可廢熈寧元年四月上時為翰林學士承㫖上神宗論天地合祭為非禮陳襄臣伏承聖意以天地合祭於圜丘為非禮之正詔令更定臣謹按周禮大司樂以圜鍾為宫冬日至於地上之圜丘奏之六變以祀天神以函鍾為宫夏日至於澤中之方丘奏之八變以祭地示夫祀必以冬日至者以其陽氣來復于上天之始也故宫用夾鍾于震之宫以其帝出乎震也而謂之圜鍾者取其形以象天也三一之變圜鍾為宫三變黄鍾為角太蔟為徴姑洗為羽各一變合陽竒之數也祭必以夏日至者以其隂氣潛萌于下地之始也故宫用林鍾于坤之宫以其萬物致養于坤也而謂之函鍾者取其容以象地也四二之變函鍾為宫太蔟為角姑洗為徴南吕為羽各二變合隂偶之數也又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭貍沈疈祭其在地者而以黄琮禮之皆所以順其隂陽辨其時位倣其形色而以氣𩔖求之此二禮之不得不異也故求諸天而天神降求諸地而地示出得以通精誠以逆福釐以生烝民以阜萬物此百王不易之禮也去周既逺先王之法不行漢元始中姦臣妄議不原經意附㑹周官大合樂之説謂當合祭平帝從而用之故天地共犢禮之失自此始矣由漢歴唐千有餘年之間而以五月親祠北郊者唯四帝而已如魏文帝之太和周武帝之建德隋髙祖之開皇唐睿宗之先天皆希闊一時之舉也然而隨得隨失卒無所定垂之本朝未遑釐正恭惟陛下恢五聖之述作舉百王之廢墜典章法度固已比隆先王之時矣豈襲後世一切之禮乎是以臣親奉德音俾正訛舛之禮首宜正其大者大者不正而末節雖正無益也況天地嵗祀令亦不廢顧惟有司攝事而已誠未足以上盡聖恭事之意也臣以謂既罷合祭則南北自當別祀伏請陛下每遇親祀之嵗先以夏日至祭地示於方丘然後以冬日至祀昊天於圜丘此所謂大者正也然議者或謂先王之禮其廢也久不可復行古者齋居近古者致齋路寢儀衛省用度約賜予寡故雖一嵗徧祀而國不費人不勞今也齋居逺儀衛繁用度廣賜予多故雖三嵗一郊而猶或憚之況一嵗兩祀乎必不獲已則三年而迭祭或如後漢以正月上丁祠南郊禮畢次北郊或如南齊以正月上辛祠昊天次辛瘞后土不亦可乎臣竊謂不然記曰祭不欲疎疎則怠夫三年迭祭則是昊天大神六年始一親祀得無已怠乎記曰大事必順天時二至之交周公之制也捨是而從後王之失禮可謂法歟彼議者徒知茍簡之便而不睹尊奉之嚴也伏惟陛下鑒先王已行之明效舉曠世不講之大儀約諸司之儀衛損大農無名之費使臣得以講求故事參究禮經取太常儀注之文以正其訛謬稽大駕鹵簿之式以裁其繁冗唯以至恭之意對越大抵以迎至和以格純嘏庶成一代之典以示萬世元豐元年二月上時為樞密直學士先是詔襄同王存李清臣張璪黄履陸佃何洵直楊全等討論郊廟奉祀禮文清臣佃等各有奏意皆主分祭與陳襄議略同故不具載上神宗論夏至祭地遣冢宰攝事張璪臣伏見天地合祭議者不一而臣竊謂陽生於十一月隂生於五月則隂陽之生天地致用之始先王於是順隂陽之義以冬日至祀天於地上之圜丘夏日至祭地於澤中之方丘以至牲幣器服詩歌樂舞形色度數莫不倣其象𩔖故天神地示可得而禮由此觀之則夏日祭地於方丘而天子親涖之此萬世不可易之理也議者以謂當今萬乗儀衛加倍於古方盛夏之時不可以躬行乃欲改用他月不唯無所據依又失所以事地順隂之義必不得已臣以謂宜即郊祀之嵗於夏至之日盛禮容具樂舞遣冢宰攝事雖未能皆當於禮庶幾先王之遺意猶有存焉元豐三年五月上時為翰林學士初陸佃等議未决璪又兼詳定因建此議詔禮院速詳定以聞於是禮官請如璪議尋詔親祠北郊並依南郊儀如不親祠即上公攝事仍別修定攝事儀制上神宗論合祭宜循舊典陳薦臣竊惟議者以天地合祭始於王莽稽之典禮有所未合故罷之臣切有疑謹案周頌曰昊天有成命郊祀天地也前漢志載郊祀歌十九章其七章曰惟泰元尊媪神蕃釐説者曰泰元天神也媪神地神也第八章言㳙選休成天地並況此天地同祀可以槩見恐非自王莽始也夫國之大事莫大於天地宗廟之祀有其舉之莫能廢也古者祀事皆天子親行降及後世事與古異或因或革各從其宜故多遣官攝事今聖朝郊廟之祭三嵗一親行必先朝饗景靈宫薦太廟然後合祭天地於圜丘蓋參用舊章得禮之中而議者又謂親郊之嵗夏之時不可躬行宜遣冢宰攝事而罷冬至天地合祭臣亦謂夏至方丘之祀决不可躬行雖大備禮樂上公攝祭亦恐此議未能合古終不若天地合祭之日親執圭幣誠志内盡禮容外重也況天子父事天母事地既親禮天神而不親禮地祗質之情文深恐未安陛下聰明睿智聖學深博古今萬事無一不昭其本原其三嵗親郊天地合祭之禮伏乞且循舊制以昭恭事三神之意元豐三年六月上時判太常寺上哲宗乞議皇地祗親祠之禮許將臣近准勅差夏至祭皇地祗攝事竊考祀儀見乃者詳定禮文所奏親祀南郊合祭天地非禮乃建議罷圜丘皇地祗并從祀位郊祀之嵗不及親祠地祗即冢宰攝事已且為儀行之臣伏以王者父天母地並為大神自古祭祀雖有異同然未有偏正而不躬行者也且三嵗冬至天子親祀徧享宗廟祀天圜丘而其嵗夏至方澤之祭乃止遣上公則是皇地祗遂永不在親祠之典此大闕禮也不可不議伏望聖慈博詔儒臣講求典故斟酌其宜正祀典以為萬世法元祐五年五月上時為尚書右丞詔禮部太常寺詳議以聞禮部太常寺言郊祭之禮國之大典乞與尚書侍郎兩省及侍從官同議從之至七年二月禮部乞依元豐六年五月修定到親祀及攝事宜罷聚議禮部郎中崔公度論特祀難行乞依舊合祭詔令侍從及尚書侍郎給舎臺諫禮官集議以聞上哲宗乞合祭顧臨等臣等近於尚書禮部集議親祠皇地祗已具聞奏伏請南郊合祭未聞聖㫖指揮臣等竊以天地特祭經有明文然自漢以來不能行之千有餘年矣昔商因夏禮周因商禮皆有損益孔子曰其或繼周者雖百世可知也可知者亦猶商因於夏周因於商也時異事變不可盡知雖有聖人繼周亦必損益是以先代之禮後代有不相㳂前王之禮後王有不相襲唐虞五載一廵守周則十二年豈可謂唐虞非乎盖周不能行也先帝朝獻景靈宫十一殿一日而徧陛下一嵗乃徧亦因時制宜欲可行也合祭之禮臣等不敢逺引前代自太祖建隆四年初郊至于元豐百二十年已成一代之禮後嗣可以遵承天地父母理無不可以並不得言瀆太祖平一海内太宗真宗皆致太平仁宗享國長久英宗神宗紹休聖緒率用此禮神祗饗荅非不䝉福報也唯元豐六年用詳定郊廟奉祀禮文所議云殆非所謂以𩔖求神之意遂遷皇地祗之位蓋以地祗當祭於方丘樂以八變不可以升圜丘也夫周之后稷本朝之太祖皆當享於宗廟樂以九變而周公制禮以祖配天未有或非之者也祖可以配則地何為不可以並乎然先帝所以行之者决欲親祠北郊也若先帝能力行之而陛下未能猶當且復其舊況先帝尚未行乎設先帝已行而復知其難未必不改而從舊也宋興以來太祖郊四太宗郊五真宗郊五仁宗郊九英宗郊一神宗郊三皆合祭不合祭者唯元豐六年一郊耳陛下嗣位八年已再饗明堂當並見天地今初郊祀若循祖宗之舊他日果能行北郊之禮然後罷合祭未為失也今未能用周禮而先罷之他日欲親祠則不果欲合祭則已罷父天母地偏而不備伏恐聖慮未得安也若北郊既不可行而復議合祭則慢神已甚雖宴享賓客猶不可以如此況事大神祗乎臣等不知今欲親祠北郊如之何而可也一年再郊此必不能且夏日之至未易行也減損北郊之儀以就可行是於父母有隆殺也南北郊與明堂間祀則南祀愈疏亦未為得禮也或六年或九年而一郊此豈周禮乎如此則北郊之禮必為空文未有可行之日也今近捨祖宗百餘年已行之禮而欲逺復三代千餘年不舉之祭去所易而就所難守周禮之空文虚地祗之大祀失今不定後必悔之㐲望聖慈早以時决無疑於祖宗之舊以昭大孝之隆圜丘合祭依熈寧十年典禮則四海羣生並受其福臣等忝備近臣義不敢黙元祐七年五月上時為翰林學士同范祖禹等八人上實祖禹之文也上哲宗乞分祭曽肇臣近奉詔集官議南郊合祭天地事已具議狀奏聞訖臣職在典禮再三思惟此天地大祭國家重事況當陛下郊祀之初尤宜敬重舉錯一有未安貽議萬世尚慮前狀開陳未盡敢再冒昧以聞伏以天地合祭非先王之禮學士大夫所共知之不待臣言而信也然使合祭於承事神祗無不順之理雖非先王之禮何為而不可行蓋以聖人之於祭求之於茫昧不可知之中故必因其方順其時而用其𩔖以致之是以因髙以事天因下以事地兆五帝於四郊朝日於東夕月於西兆司中司命於南兆風師雨師於北兆山川丘陵墳衍各因其方而春夏秋冬各順隂陽之性其於祭事或燔或瘞或埋或沈以至圭璧幣牲坎壇樂舞各從其𩔖先王非茍為之以謂求之如此之盡然後庶幾神之來享也茍為反是則其於格神也難矣今論者以罷合祭則天子未有親見地祗之時夏至親祠北郊則以五月行禮為難欲因南郊并舉地祭此施於人事以求自便則可矣以此為親見地祗之實則未也何則事之非其方致之非其𩔖又違其時施於羣小祀且猶不可況地祗之尊乎以此事地地祗未必來享而便謂此為親見地祗之實此臣之所未喻也且屈已從神與屈神以從已二者孰安今以五月行禮為難而引地祗以就冬祭茍從人事之便恐失陛下恭事地祗之意此又臣之所未喻也聖人之事神洞洞乎其忠属属乎其敬舎忠舎敬常情所不肯為而謂陛下肯安之乎臣愚故謂合祭不可復親祠不可廢但當斟酌時宜省去繁文末節則親祠之禮無不可為已於前狀論之矣唯陛下留神省察逺推先帝復古之心持以至誠不倦之意無從茍簡自便之説以成躬事地祗之實則上下神祗孰不顧享天下後世孰不稱頌臣以職事誼當罄竭伏望聖慈詳加採擇不勝幸甚元祐七年五月上時為禮部侍郎初詔集議顧臨蘇軾范祖禹等八人主合祭范純禮曽肇劉安世等二十二人主分祭肇又獨上此奏至九月宰臣吕大防進呈卒從顧臨等議於是下詔曰祖宗以來郊廟常祀皆以時遣官攝事惟三嵗一行親郊之禮因徧享廟室並祭天地於圜丘昨因詳定郊廟禮文所建議見祠合祭不應古義先帝有詔定親祭北郊之儀命下而未果行是嵗圜丘罷設皇地祗位而廟享尚循權制今朕以臨御之初郊見上帝因得躬享太廟然地祗大祀獨闕不講深惟王者察於事地義不可緩其今嵗圜丘宜依熈寧十年故事設皇地祗位以申始見之禮候親祠北郊依元豐六年五月八日指揮宜令有司擇日遣官奏告施行仍候禮畢日依前來指揮集官詳議將來親祠北郊合行事件及郊祀之嵗廟享典禮奏聞上哲宗乞分祭曽肇臣伏覩詔書冬日至南郊宜設皇地祗位以嚴並況之報此蓋皇帝陛下急於親祭地祗不待考正典禮遽下此詔然臣切詳詔㫖亦云合祭不應古義今則設皇地祗位於南郊乃是復行合祭之禮既以為非又自行之一詔之中前後違戾詔書又云厥後躬行方澤之祀則修元豐六年五月之制是則異時北郊禮行合祭復罷天地大祀國家重事而輕易變更頗𩔖兒戯廢置神位幾於弈碁此臣所以聞詔愕然不知所措也臣伏思陛下之意無他以謂王者父天母地尊親並行即位以來親見上帝而未及地祗恐乖明察之義又為議者所惑以謂五月祭地必不可行則是長闕事地之禮故因南郊并舉地祭欲以致誠敬於地祗爾以臣所見欲以致誠反近於怠欲以致敬反近於瀆何則南郊非祭地之處冬至非見地之時樂以圜鍾為宫其變以六非致地祗之音燔柴升煙非祭地祗之禮不問神之享與不享姑欲便於人事不近於怠乎今世之人家有尊長所居異宫子弟致敬必即其處尚不敢屈致一堂況天子事地可不如家人之禮哉前日以合祭為非而罷之今日復行異日復罷謂神無象廢置自由不近於瀆乎陛下志在誠敬而所行反近於怠且瀆此無它為陛下謀者以古為迂率意改作務從茍且趣便一時故也臣愚不達時變竊為陛下痛惜之陛下即位八年兩行明堂大享之禮今兹有事南郊凡與天神舉皆從祀次第行之則將來郊祀之嵗親祠北郊并及諸神固未為晚何苦遽為此舉以渉非禮之議哉況五月祭地前世之所嘗行本朝開寳中亦曽四月行雩祀之禮古人尚以六月出師孰謂夏至有不可行禮者哉臣愚伏望陛下速降德音收還前詔今冬南郊禮畢即命有司詳定親祠北郊儀物仍令斟酌時宜省去繁文末節以從簡便俟至郊祀之嵗斷在必行如此則於承事神祗不失誠敬先帝已正禮文不至無名改作使萬世之後以謂復行先王祭地之禮自陛下始不亦善乎臣䝉恩擢備從官職在典禮朝廷舉措得失臣與其責故自聞詔以來彷徨累日言之則為逆㫖不言則為失職熟慮再三寧以逆㫖獲罪不敢失職以負陛下任使也是以罄竭狂愚觸犯忌諱庶幾萬一有補聖明則臣雖受重誅所不敢避唯陛下留神省察不勝幸甚元祐七年十月上上哲宗圜丘合祭六議蘇軾臣伏見九月二十二日詔書節文俟郊禮畢集官詳議設皇地祗事及郊祀之嵗廟饗典禮聞奏者臣恭覩陛下近者至日親祀郊廟神祗享荅實䝉休應然則圜丘合祭允當天地之心不宜復有改更臣竊惟議者欲變祖宗之舊圜丘祀天而不祀地不過以謂冬至祀天於南郊陽時陽位也夏至祀地於北郊隂時隂位也以𩔖求神則陽時陽位不可以求隂也是大不然冬至南郊既祀上帝則天地百神莫不從也古者秋分夕月於西郊亦可謂隂位矣至於從祀上帝則以冬至而祀月於南郊議者不以為疑今皇地祗亦從上帝而合祭於圜丘獨以為不可則過矣書曰肆𩔖于上帝禋于六宗望于山川徧于羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祗豈有此理哉武王克商庚戍柴望柴祭上帝也望祭山川也一日之間自上帝而及山川必無南北郊之別也而獨略地祗豈有此理哉臣以知古者祀上帝則并祀地祗矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而説者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祀而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廩萬億及秭為酒為醴烝畀祖妣以洽百禮降福孔皆歌於秋可也歌於冬亦可也昊天有成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熈單厥心肆其靖之終篇言天而不及地頌所以告神明也未有歌其所不祭祭其所不歌也今祭地於北郊歌天而祀地豈有此理也臣以知周之世祀上帝則地祗在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也春秋書不郊猶三望左氏傳曰望郊之細也説者曰三望太山河海或曰淮海也又或曰分野之星及山川也魯諸侯也故郊之細及其分野山川而已周有天下則郊之細獨不及五岳四瀆乎岳瀆猶得從祀而地祗獨不得合祭乎秦燔詩書經籍散亡學者各以意推𩔖而已王鄭賈服之流未必皆得其真臣以詩書春秋攷之則天地合祭久矣議者謂合祭天地始於王莽以為不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也尚采用元始合祭故事謹按後漢書郊祀志建武二年初制兆於洛陽為圜壇八陛中又為重壇天地位其上皆南鄉西上此則漢世合祭天地之明驗也又按水經注伊水東北至洛陽縣圜丘東大魏郊天之所準漢故事為圜壇八陛中又為重壇天地位其上此則魏世合祭天地之明驗也唐睿宗將有事於南郊賈曽議曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀郊之與廟皆有禘禘於廟則祖宗合食於太祖禘於郊則地祗羣望皆合於圜丘以始祖配享盖有事祭非常祀也三輔故事祭于圜丘上帝后土位皆南面則漢嘗合祭矣時褚元亮郭山惲等皆以曽言為然明皇天寳元年二月勅曰凡所祠享必在躬親朕不親祭禮將有闕其皇地祗宜如南郊合祭是月二十日合祭天地於南郊自後有事于圜丘皆合祭此則唐世合祭之明驗也今議者欲冬至祀天夏至祀地蓋以為用周禮也臣請言周禮與今禮之別古者一嵗祀天者三明堂享帝者一四時迎氣者五祭地者二享宗廟者四凡此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之𩔖亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先享宗廟並祀天地自真宗以來三嵗一郊必先有事景靈徧享太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而嵗行之不以為難今之禮親祭如此其少而三嵗一行不以為易其故何也古者天子出入儀物不繁兵衛甚簡用財有節而宗廟在大門之内諸侯出爵賞必於太廟不止時祭而已天子所治不過王畿千里唯以齋祭禮樂為政事守此則天下服矣是故嵗嵗行之率以為常至於後世海内為一四方萬里皆聽命於上機務之繁萬倍於古力有所不能給自秦漢以來天子儀物日以滋多有加無損以至于今不復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃已下至文武官皆得䕃補親属非周禮也自宰相宗室已下至百官皆有賜賚非周禮也此皆不改而獨於地祗則曰周禮不當祭於圜丘此何議也議者必曰今之寒暑與古無異而宣王薄伐玁狁六月出師則夏至之日何為不可祭乎臣將應之曰舜一嵗而巡四岳五月方暑而南至衡山十一月方寒而北至常山亦今之寒暑也後世人主能行之乎周所以十二嵗一巡者唯不能如舜也夫周已不能行舜之禮矣天之寒暑雖同而禮之繁簡則異是以有虞氏之禮夏有所不能行夏商之禮周有所不能用時不同故也宣王以六月出師驅逐玁狁蓋非得已且吉父為將王不親行也今欲定一代之禮為三嵗常行之法豈可以六月出師為比乎今議者必又曰夏至不能行禮則遣官攝祭祀亦有故事此非臣之所知也周禮大宗伯王不與則攝位鄭氏注曰王有故則代行其祭事賈公彦疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮也後世人主不能嵗親祭故命有司行事其所從來久矣若親郊之嵗遣官攝事是無故而用有故之禮也議者必又曰省去繁文末節則一嵗可以再郊臣將應之曰古者以親郊為常禮故無繁文今世以親郊為大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟出郊冠通天乗大輅日中而舍百官衛兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏事天則備事地則簡是於父母有隆殺也豈得以為繁文末節而一切欲省去乎國家養兵異於前世自唐之時未有軍賞猶不能嵗嵗親祠天子出郊兵衛不可簡省大輅一動必有賞給今三年一郊傾竭帑藏猶恐不足郊賚之外豈可復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祀地是非臣之所知也三年一郊已為疏闊若獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壊若復古而背古愈逺神祗必不顧享非所以為禮也議者必又曰當郊之嵗以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者惟欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶抑變禮之權耶若變禮從權而可則合祭圜丘何獨不可十月親祭地十一月親祭天先地後天古無是禮而一嵗再郊軍國勞費之患尚未免也議者必又曰當郊之嵗以夏至祀地祗於方澤上不親郊而通爟火天子於禁中望祀又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在境内而不在四郊者故逺望而祭也今所在之處俛則見地而云望祭是為京師不見地乎此六議者合祭可否之决也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圜丘方澤皆親祭之為是也蓋以時不可行是故參酌古今上合典禮下合時宜較其所得已多於漢唐矣天地宗廟之祭皆當嵗徧今已不能嵗徧是故徧於三年當郊之嵗又不能於一嵗之中再舉大禮是故徧於三日此皆因時制宜雖聖人復起不能易也今並祀不失親祭而北郊則必不能親徃二者孰為重乎若一年再郊而遣官攝事是長不親事地也三年間郊當祀地之嵗而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地决非今世之所能行議者不過欲於當郊之嵗祀天地宗廟分而為三耳分而為三有三不可夏至之日不可以動大衆舉大禮一也軍賞不可復加二也自有國以來天地宗廟唯饗此祭累聖相承唯用此禮此乃神祗所歆祖宗所安不可輕動動之則有吉凶禍福不可不慮三也凢此三者臣熟計之無一可行之禮伏請從舊為便昔西漢之衰元帝納貢禹之言毁宗廟成帝用丞相衡之議改郊位皆有殃咎著於史冊徃鑒甚明可為寒心伏望陛下詳覽臣此章則知合祭天地乃是古今正禮本非權宜不獨初郊之嵗所當施行實為無窮不刋之典願陛下謹守太祖建隆神宗熈寧之禮無更改易郊祀廟饗以敉寧上下神祗仍乞下臣此章付有司集議如有論即須畫一解破臣所陳六議使皆屈伏上合周禮下不為當今軍國之患不可但執更不論當今可與不可施行所貴嚴祀大典早以時定貼黄唐制將有事于南郊則先朝獻太清宫朝享太廟亦如今禮先二日告原廟先一日享太廟然議者或亦以為非三代之禮臣謹按武王克商丁未祀周廟庚戍柴望相去三日則先廟後郊亦三代之禮也元祐八年三月上時為禮部尚書自元豐元年始詔議南北郊陳襄議既罷合祭則南北二郊自當別祀請毎遇親祠之嵗先以夏日至祭地祗於方丘然後以冬日至祀昊天於圜丘李清臣議常嵗有司攝事于南郊亦不合祭其合祭之意止縁親祠欲徧及爾乞毎遇親郊宿太廟以告宿北郊以祭宿南郊以祀王存議備物而後動不可以不相天時歴代祀天地之月率皆不同若間有事于北郊用孟冬純隂用事之月理無不可陸佃議郊後必冇望祭請冬至親祠因即圜丘之北別祠地祗張璪議謂宜即郊祀之嵗於夏至之日盛禮容具樂舞遣冢宰攝事元祐中曽肇議國朝以來三嵗一見天地祖宗未甞廢闕今冬至若罷合祭而夏至又以有司攝事則不復有親祭地祗之時於事天則躬行於事地則遣官以徃其於父天母地之義若有隆殺願親祀南郊之嵗以夏日至備禮躬款北郊以存事地之義孔武仲等議乞檢㑹王存奏議以孟冬詣北郊行親祠之禮杜純議遇北郊上公攝事請於後苑中設望祠位舉爟火以望拜盛陶等以謂宜用先帝北郊儀注以時躬行罷去合祭之禮太常少卿王子詔議周禮夏日至祭地於方澤聖人制禮垂訓萬世不易之典元祐七年南郊從顧臨等議權行合祭仍詔集議軾上此奏至紹聖三年正月又下詔罷合祭以夏至之日躬祭地祗於北郊元符元年南郊始獨祭天建中靖國元年八月又詔將來南郊見天地之初權合祭天地於圜丘崇寧三年又罷合祭悉如元豐三年之儀至政和三年九月詔自今毎遇冬祀大禮後祭地於方澤其儀物仗衛悉從減省十二月九日又詔以來年夏至祭地於方澤四年五月十二日詔始躬行北郊之儀自四年至宣和五年凢三行此禮焉宋名臣奏議巻八十五
