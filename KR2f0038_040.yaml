body:
  text: 宋名臣奏議卷四十宋趙汝愚編天道門災異四上仁宗答詔論旱災錢彥遠慶厯七年三月詔曰朕臨御以來於今二紀夙夜祗懼不敢康寧庶合治平以至嘉靖自去嵗冬時雪已愆今春大旱赤地千里百姓失業無所告勞朕思災變之來不由他致蓋朕不敏於德不明於政號令弗信聽納失中俾兹眚灾下逮黎庶天威震動以戒朕躬大懼不能承宗廟之靈負社稷之重苦心焦思惶悸失圖是用屈已以謝愆省躬而上叩不御正殿不舉常珍外求直言以答天譴冀髙穹之降鑒閔下民之無辜與其降疾於人不若移災於朕庶用感格以底休成自今月十九日後只坐崇政殿仍减常膳應中外文武臣寮並許實封言當世切務三事大夫其協心交警輔豫不逮臣伏覩兩浙轉運司翻録三月十九日詔敕節文以今春大旱應中外文武臣寮並許實封言當世切務者竊念臣近以直言極諫登科恩擢不次敢自緘默茍養資格謹條方今急政要事水旱原本少盡千慮之得臣聞天地有常數隂陽有常度當進退盈虗之際兩適均等則氣和氣和則風雨時風雨時則萬物育矣然隂盛則水陽盛則旱二者自然之理故陽主德隂主刑德不可以獨任德過則弛刑不可以專任刑過則慘天之愛物甚矣春夏生之必秋冬以節之所以相為表裏而成嵗功求其端正其本繫人之事故在易之泰曰后以裁成天地之道輔相天地之宜言泰極則安而無節無節則過其害猶不及也惟元后輔相而裁成之在春秋魯僖公之三年春王三月夏四月兩書不雨者以僖公能克已求過放佞臣理寃獄精神感天不雩而雨故顯書不雨以旌之此聖人精微極致謂天人相與應如影響俾人君戒之謹之之㫖也伏自陛下即位二十餘載內無聲色之娛外無畋漁之逸外戚近侍循循守法未有專權之失前嵗地震起雄霸滄登旁及荆湖幅員數千里雖往時定襄之異未有大於此者今復大旱以臣愚料之非他也蓋天警陛下爾誠以國家備冦之術未盡要牧民之吏未盡良天下之民未盡安上天垂意陛下欲因而大治故先出災異告焉陛下知天戒所在因而修之則宗廟社稷之巨福茍簡忽大事規規求亡用之言唯減常膳避正殿臣愚謂非應天以實不以文之意臣願為陛下别白明之臣前所謂禦冦之術未盡要者夫西北二虜者我之堅敵天性驁悍以戰鬬為生業非可與以首爭首校一旦之命且古之所謂夷狄言語衣服殊於華夏其來不過驅略老弱畜産故詩曰薄伐獫狁至於太原逐去則止今北戎据幽燕山後諸鎮元昊盜靈武銀夏皆我之州郡其衣冠車服子女玉帛與漢同欲加以日夜伺我間隙收我亡叛迹其深心非止驅略畜産而已往時元昊負固不服朝廷責戰甚速出入五載邉臣未有效首虜者而天下已騷然困矣下及牛馬諸畜皆殘衄罷極他物可知暨納欵錫命亦朝廷不得已而為之紓一時之患可也我當按甲蓄威節財嗇用講過救失論長短利害以困虜而臣見自元昊之降上下安然器械城壁治葺稍緩主兵之官備邉長吏皆以次補用不復銓擇士大夫髙冠侈服恥言軍旅臣懼一旦北虜負恩乘利送死西結元昊兩道並來則國家之力未易支也臣嘗中夜以思寒心疾首臣懼如景祐康定中待元昊之謀則殆矣北虜土地廣甲兵壯凶黨多非元昊比也臣願陛下無輕待焉事不預備不可應猝此陛下宜深留意而又湖廣一道蠻獠繹騷聞其戕害劫掠生民流離調發督斂軍須百出而置之不問但責一二儒生非有竒藴祕略但能治文書辦期㑹深可歎也亦用兵三年未聞尺寸之效嵗月持久其憂不細惟陛下以此三方之急因天戒之明命大臣講長久之計以安元元性命天下幸甚臣前所謂牧長之吏未盡良者大凡生民之命舒慘休戚繫之刺史縣令雖遠近間要有郡縣大小然耕田鑿井出租稅皆陛下赤子茍守吏之失則一方受弊旦夕利害切於身飢寒逼於內彼不起為盜賊則當危苦愁厄而死危苦愁厄之氣所以致水旱臣伏見江淮諸郡地近京輔皆國家之外府而守吏年七十者十率三四往往耳目昏惑神明耗竭罷癃俯傴唯以圭田稍食為意縱有心力克壯者則倚其年齒陵轢吏民夫長吏執千里之柄而昏惑耗竭則必輸其柄於下吏下吏操刺史之威而毆良民無所不至甚於長吏之自貪也江淮一方計之尚或如此况天下僻左之地乎况縣令之猥衆乎臣願陛下悉按其門閲功狀命之納祿致仕優賜子弟官秩俾之自養精擇天下長吏此根本之論也議者將云國家惠養老臣不當如此謂之曰古之養老蓋賜珍膳財帛豈任之以政事且陛下胡忍此老眊百十輩而不忍天下千萬人受其弊願陛下思之臣前所謂天下之民未盡安者臣聞隋唐之制有賦租庸調四者之入自楊炎變兩稅法天下稱便自五代迄今斂名雜出兩稅之法漸弊民已竭力供矣加以非時配率和市舉放利盡歸官而主計之司不復設輕重均輸之法乘用兵之急唯督取諸路緡錢之用速濟經費至專遣內使四出趣迫郡國承望風㫖竭取乃已殊不知錢者以通流移用則利入公上民得資販今四方之錢月取嵗輸一去不復故天下之民嗸嗸商賈失業酒𣙜商算課入益虧此蓋專取緡錢之過平日已囂囂苦不足况能禦水旱在先朝時常患其若此有三說之法俾商人入粟邉郡而受鹽茗雜物於內郡邉食不復給緡錢則天下之貨通矣其三說之法副在有司朝廷逮事先帝諸臣皆能言之陛下舉而行之然後詔主計者講利害輕重之術不許專取緡錢於諸路俾百姓息肩易曰何以聚人曰財所以感人心而天下和平矣再念臣身逺慮淺實緣陛下詔㫖而言之故安危之語無所隱避伏願陛下不以人廢言不以治忘亂降意才傑謹明賞罰庶幾災異消釋導迎善氣天下幸甚慶厯七年四月上時知潤州上仁宗論旱災得雨包拯臣竊見冬春以來天下旱乾為虐而陛下避殿徹膳纍下詔書勤求直言踈理刑獄寬省民力雖古之聖帝明王責躬罪已無此之甚焉故詔音所至甘澤隨降和氣應於上民心悅於下天意聖德合若符契當上穹眷佑之如是則陛下尤宜勵精求治以答殊貺臣聞法令者人主之大柄而國家治亂安危之所繫焉不可不謹緣近嵗以來賞罰之典或尚因循且人知法令之不足信則賞罰何以沮勸乎昔唐文宗問宰臣李石天下何以易治李石對以朝廷法令行則易治誠哉治道之要無大於此伏望陛下臨决大政信任正人賞者必當其功不可以私進罰者必當其罪不可以幸免邪佞者雖近必黜忠直者雖遠必收法令既行紀律自正則無不治之國無不化之民在陛下力行而已慶厯七年上時為戶部判官上仁宗答詔論星變文彥博等詔曰朕據宸極之尊託億兆之上懋謹盈成之戒豈忘勵翼之懷然而監於猷為未臻古治動於精祲靡致善祥比來星文屢有謫見夙夜畏肖匪敢寧居蓋慮德政闕修刑賞差濫人有寬滯而無控雪之路民已匱困而無寬恤之實官局具設而職務或弛典章備存而綱紀不振科役煩重肆成暴刻軍政簡墮莫為經制教令輕出有所未安賢智在下遺而弗舉姦幸妄求而不抑惠澤旋壅而不流有一於兹足戾和氣朕深惟廟社之重祗荷祖宗之休欽畏天民詢敕人事嘉與近輔交修警闕庶答靈戒以底休平宜令中書門下樞密院將此十二條於軍國庶務中推求實事有合更張振舉者密具條上朕當悉心詳究即議施行咨爾股肱咸體豫意臣等各以非才忝居大任不能裨補聖政燮和隂陽以致星文屢有變異下飭人事上貽聖憂陛下曲示包容未賜罷免責以來效使之極言詔㫖丁寧睿思寬大跪受伏讀兢慙失圖恭以陛下堯舜用心禹湯罪已欽若天戒增修聖政弭災召和宜集休應聖詔曰德政闕修刑賞差濫臣以謂刑不為貴近而屈賞不可僥幸而求則無差濫矣刑賞不濫則德政自修又曰人有寃滯而無控雪之路民已匱困而無寬恤之實臣以謂人有寃滯必由郡縣及按察之司節級陳訴若猶未伸又許檢鼓撾訴固無壅遏之理然更須州郡官吏常得其人為之伸理則民無寃滯矣今冗費無藝國用窘乏故嵗一不登下民艱食雖欲恤之而力不足也若減不急之務罷無功之賞及兵籍官吏之浮冗者稍澄汰之則庶幾國用不乏可以有恤民之實矣又曰官局具設而職務或弛典章備存而綱紀不振臣謂為官擇人不使僥幸者求而得之久於其任考其殿最而升黜之無使屢遷速易不為茍簡之政則職務焉敢廢弛祖宗之法備在典冊舉而行之似若甚易但不為權幸所撓則為至難茍上下一意守兹典章堅如金石行此號令信如四時則綱紀振矣又曰科役煩重而肆成暴刻軍政簡惰而莫為經制臣以謂前之所謂減不急之務罷無功之賞澄汰兵吏之冗則國用不乏國用不乏則可以省科役之煩重州郡官吏常得其人雖有科役亦不至於暴刻矣謹擇將帥稍假威權撫安士卒不務姑息勿使貴臣驕將撓於其間則軍政自肅而有經制矣又曰教令輕出有所未安賢智在下遺而弗舉臣以謂令出惟行謹乎始出出而不謹故行之未安近嵗以來兹弊頗甚由議臣輕建言而須必行行之無效而終無責或雖有嘉謀而事無近效人之多言橫為沮議朝廷不能持之故多中變條其事狀比類尤繁舉賢任官宰相之職宰相不能悉知其人但當謹擇臺省長官及州縣大吏使如近制各舉所知庶幾無遺才矣又曰姦幸妄求而不抑此至今之所患臣等嘗議之矣又曰惠澤旋壅而不流臣以謂朝廷推恩靡不下究然恐郡縣之吏不稱朝廷之意或逋負之物合除而未除流竄之人可釋而不釋如此類者更宜申明聖詔曰將此十二條於軍國庶務中推求實事有合更張振舉者密具條上朕當悉心詳究即議施行有以見陛下求治之心勤切之至所恨臣等空踈不能上副好問雖然敢不罄竭愚短粗有所裨然今所陳乃其大略蓋慮繁詞終成虗語徒煩睿鑒無補大猷臣等欲將十二條事日舉一兩條細述合更張振舉事件逐時面奏委曲敷陳所冀言之必行行之必當斯亦舜禹臯陶吁謨都俞之義也臣等不勝區區舉行十二條事件聖詔曰德政闕修刑賞差濫臣等近奏以謂刑不為貴近所屈賞不為僥幸所求則無濫矣臣等請舉一端如往年蘇舜欽劉巽以進奏院賽神輒用官錢即皆坐除名去年曽奭宋永宗賽神亦用官錢其罰當與舜欽輩均而曽奭等止停見任近日史昭文等以不覺手下人吏取受梢場錢物衝替未得與差遣尋有監梢場官閻繼隆等却為昭文所發亦是不覺察專典取受一例衝替而昭文即時却令與差遣其同事馮經亦連茹牽復而繼隆等衝替如故蓋昭文曽奭輩以親近而從輕罰舜欽繼隆等以踈逺而受重責又去年親事官作過皇城司官吏當坐重責然皆是近臣貴戚止於降秩補外才逾年即皆復職或更遷官往年張沔以保州及李敡事降黜數經大赦至今未復舊職言體則皇城司事為重議罪則張沔等輩為輕升擢棄廢理似未均不惟刑罰失平實恐貴幸壞法臣等以謂今後用法理當振舉更務均平賞典之濫則如近日司天監周琮李用晦止以選課日辰便乞轉官任子醫官别無勞績妄乞額外轉遷如馮琦潘象蘇惟和沈遇明之輩賴陛下聖斷皆與裁抑然未悉如先朝之制及前後條貫更欲申明遵守聖詔曰人有寃滯而無控雪之路臣等以謂人有寃滯必由郡縣按察之官節級陳訴若未伸雪又許檢鼓院撾訴計無壅遏之理今欲更敕約轉運提刑司凡有理訴並令仔細究詳如事理稍涉寃枉即選官就近覆勘勿令煩擾延及貧窮無辜聖詔曰官局具設而職務或弛典章備存而綱紀不振臣等以謂官得其人職務自舉選才任官止是臣等之責若官須擇人不甚拘以資地事須責實當時校其殿最三載考績必行黜陟百官修方孰敢懈弛臣等請略舉其弊只如省府之官及外計之任近嵗以來遷改頗速有如假道豈暇舉職所以務為一切茍簡之政而職業不修臣等欲乞更頒詔敕約束中外之官必須二年之外方許遷替考其殿最而升降之若特敕擢才則不在兹限所謂典章者朝廷之大法祖宗之舊制舉而行之執而用之豈有綱紀不振哉蓋近嵗以來緣貴幸之臣墮大法壞舊制者多矣臣等略舉其尤者祖宗之制官有定員今員外而置官者多矣如幹當皇城軍頭司及醫官使副之比是矣又俸祿之法各有定制等級賦與固不可差今則有任觀察使而請留後俸者如此之類其徒實繁臣等欲乞今後更不溢舊額而置官逾本官而受俸一守祖宗舊制不為貴幸所侵則綱紀振矣乞特頒一詔處分聖詔曰賢智在下遺而弗舉臣等常謂舉賢擇才輔臣之職輔臣不能悉知衆才惟當謹擇臺省長官州郡大吏使如近制各舉所知庶幾無遺才矣然臣等敢不益勵憃愚博求才智將期得士之美上副任賢之心聖詔曰姦幸妄求而不抑臣等以謂近日貴戚醫工卜祝及諸司人吏因緣請託妄述微勞希求內降如此之類盡守條制一切裁抑則官邪之蹊可以漸塞聖詔曰惠澤旋壅而不流臣等嘗謂凡有推恩靡不下究猶恐州郡之吏不稱朝廷之意或逋負之物當除而未除流竄之人可釋而未釋臣等欲乞應經前年大赦合放負缺物色如省司以未見保明文字州郡以未受朝省指揮至今尚行催理者令速勘依赦蠲除編配之人除屬揀選路分外有已經量移情理輕者令具元犯奏聞看詳依赦釋放聖詔曰民已困匱而無寬恤之實又曰科役煩重肆成暴刻臣等以謂國用窘則科役煩科役煩則民困匱民力既困國用自乏雖欲恤民不可得已臣等請言其國用窘乏之由恭惟祖宗以來置兵與吏及賞賚賜豫皆有定制量入以出故財不屈乏自康定用兵之後添募新兵幾四十萬數年以來雖逃亡減廢之外猶不減三十萬餘每嵗所費衣糧錢物等共約三千萬貫匹兩石束賜賚之數不在焉兼自慶厯二年後來添給二寇金帛每嵗共四十餘萬匹兩加以頻遭水旱復除租賦則國用不得不窘故國用窘則科役煩科役煩則民力困今將恤民之困窮寬民之科役正在省冗費而已省冗費之大者在減冗兵臣等已嘗奏述欲於今冬别立揀兵之格密降付逐路轉運使俟至春首依常年例計會帥臣同共依新格擇選必甚減得冗費其次則罷不急之土木停無功之賜豫抑僥幸之求請省員外之冗官衣服用度務崇質素多方節約諸事簡儉年嵗之間漸期足用國用既足則科役不煩科役之不煩則是恤民之實矣聖詔曰軍政簡墮莫為經制臣等嘗謂謹擇將帥不務姑息勿使貴臣驕將害之軍政自肅矣聖詔曰教令輕出有所未安臣等嘗謂謹乃出令令出惟行若輕出之必有未允則數易屢改此為政之大弊若近日錢令鹽法為弊不細而建言者謀之不臧未嘗有責此所以致輕改作而易受弊也往年建言諸州招刺義軍去嵗却揀配諸軍人心騷然其始不能詳謹致不數年便有改易臣略舉此數條蓋事之稍大者也皇祐元年上時為昭文館大學士中書門下平章事上仁宗論水災吳奎臣竊見近嵗以來水不潤下盜賊橫起皆隂盛所致陛下寅畏天命宜格善祥而反應以災沴其故何哉夫帝王之美莫大乎進賢退不肖賢者進則君子各以類升而陽勝陽勝而善祥可致也不肖者退則小人各以類伏而隂虧隂虧而災沴可銷也今天下之人皆謂之賢陛下亦知其賢然不能進天下之人皆謂之不肖陛下亦知其不肖然不能退重以內寵驕恣近習回撓夷狄桀驁奸邪交傷隂盛如此寧不致大異哉且朝廷之過常在乎無事之時因循而不為有事之後顛沛而失錯中外臣寮平時建一䇿舉一官雖有可取皆沮抑而不行又從而媒孽謂之生事如河北河東盜賊行路之人皆已傳布大臣不以為事至執通判傷巡檢然後倉皇於數路之間移易官守立重賞以募之不亦晚乎事將有大於此者將如之何幸陛下留意皇祐三年八月上時知諌院上仁宗論天久不雨劉敞臣伏以古今之通義主逸而臣勞陛下親聽萬幾日昃不倦與羣臣等勤矣今又聞以天久不雨之故降服徹膳躬自暴露夜輒升壇禱祠達旦不寐此則聖躬之勞過於羣臣羣臣實未有及陛下者也臣竊聞之不勝其憂且水旱之數未可前測設復彌月連旬不如聖意陛下何能專以萬乘之體為羣臣代勞哉如令萬一冒風寒霜霧之苦有所不怡陛下當使誰受其責而宗廟社稷之憂獨在陛下陛下不可不自愛也詩書百家聖賢精論皆曰人者天地之心人和則天地之和至矣近者大赦恩及四海解宿逋裁減常稅宥過除罪與之自新德厚如此和氣宜應而愆亢尤甚者臣之愚竊意今日政事所褒進所刑罰所施舍所廢置猶有未合人心不當天意者故令隂陽否隔也陛下誠少加聖恩延問正直日新其德則和氣可致時雨可望何必降服徹膳躬自暴露涉風寒霜霧之險增宗廟社稷之憂非計之安者也陛下視羣臣百姓如子羣臣百姓望陛下如父父以子將失所之故深自克責不避災疾而子方晏然自若不可謂孝臣雖賤切不勝犬馬之心又以謂救旱之術在彼不在此故敢冒昧陳聞惟陛下裁擇皇祐四年上時知制誥上仁宗論水旱乞裁節國用范鎮臣竊聞陛下每遇水旱或時災變必露立向天痛自克責盡精竭慮無所不至堯舜用心亦不過是然願陛下稍推廣之推廣之術在於使官吏稱職民力優裕而已今民力困甚而朝廷取之不已是官吏不稱使陛下憂勤於上而人民愁苦於下也伏見國家用調責之三司三司責之轉運使轉運使責之州州責之縣縣責之民至民而止民竭其力以佐公上而用猶不足則怨嗟之氣干戾天地此水旱災變所以作也願陛下推前憂勤之心明詔中書樞密大臣使考求祖宗朝及天聖中兵數與官吏之數與天下賦入之數斟酌損益立為條章上下遵守則國用有常而民力有餘陛下雖髙拱深居無所事而天地之和至矣又何憂水旱災變之患而自克責如此其勞乎臣居常念此至熟今䝉陛下選任不敢不自竭盡然亦不敢逺引前古難行之事所陳惟祖宗時及天聖中陛下躬親之政伏惟留神采擇至和元年八月上時知諫院鎮後有三疏具兵制門上仁宗論黑氣蔽日及風雨寒暑變異范鎮臣伏以去冬多南風今春多西北風乍寒乍暑欲雨不雨又有黑氣蔽日此皆人事之所感動也黑氣隂也小人也日陽也君象也黑氣蔽日者隂侵陽小人惑君也欲雨不雨者政事不决也陳執中為相不病而家居者百日矣陛下以御史之言決一婢死而欲退宰相為是即乞速退執中以解天意以御史之言為非乞敕執中起視事無使天意久不決也寒暑者賞罰也乍寒乍暑不當賞而賞不當罰而罰也鄧保吉有過於法不當為內侍都知鄧宣言不歷邉任於法不當為內侍都知押班未幾又改官石全彬不當為觀察使為觀察使未幾為內侍副都知其餘攀緣改遷皆不應法律是不當賞而賞也陛下有㫖不應法律賞罰聽中書樞密大臣執奏而中書樞密大臣不執奏是當罰而不罰也冬而多南風春而多西北風皆逆氣也風主號令主思慮陛下思慮若為小人所惑而號令數變易也天變之發或發於未然之前或發於已然之後皆所以覺悟人君也君修人事以應天變則災異可為福祥也陛下如欲應乍寒乍暑之變莫若追還鄧保吉等過恩而明正中書樞密大臣之罪也陛下如欲應欲雨不雨之變莫若速定陳執中進退之勢以決中外之惑也陛下如欲應冬多南風春多西風之變莫若精其思慮而不數變號令也凡此皆古聖賢通天人之術著乎經史使後世為人君者視之以奉天為人臣者法之以事君者也非臣之臆說也陛下無以臣非才廢臣所陳先聖賢之言則臣之幸也非特臣之幸也天下之幸也社稷之福也惟妖星之變及今一年臣消息所未知也今春諸路無麥苖禾種不入而山東尤甚山東盜所起處萬一盜起陛下將何以待之妖星之變殆恐為此此臣所以居言責之地而不得默默也臣四嵗而亡父七嵗而亡母今食陛下之祿父母之養為不及已其所可為者合忠孝一意以事陛下耳若於此時畏避而不盡言則臣負不忠不孝之罪於陛下也至和二年三月上時知諫院上仁宗論水旱之本劉敞臣伏見城中近日流民衆多皆扶老擕幼無復生意問其所從來或云久旱耕種失業或云河溢田廬蕩盡竊聞聖慈憫其如此多方救濟此誠陛下為民父母之意足以感動羣心臣猶謂但可寬目前之急而已非救本之術也譬如良醫療病必先審其病源病源不除彊食無益今百姓之病已可見矣父子兄弟不能相保鰥寡孤獨不能自存彊者流轉弱者死亡所以致此者其源在水旱也所以致水旱者其本在隂陽不和也所以致隂陽不和者其端在人事不修也然則三公之職主和隂陽而議臣之任主明天人陛下何不責三公以其職使之陳隂陽不和之理詢議臣以其學使之述天人相與之際參之聖心以觀今日政事若陛下所委任皆已得人所施為皆已應天則水旱者蓋無妄之災不足憂矣若天人之際少有不合豈得安然坐視其病心知其源不思救之哉臣言似迂其理實切今羣臣為陛下謀者不過煮粥糶米名為救濟其實亦欲欺聰明自解免而已非謀國之體也又今天氣當暑反寒率多常風雨澤愆候秋成不可必願陛下速思所以救其本者召致和氣無令聖心重增焦勞則天下幸甚至和二年上時知制誥上仁宗論水旱之本范鎮臣伏見今嵗無麥苖朝廷為放稅免役及以常平倉軍食倉拯貸存恤之恩不為不至矣然而人民流離父母妻子不能相保者平居無事時不少寬其力役輕其租賦嵗雖大熟使民不得終嵗之飽及一小歉故雖加重施固已不及事矣此無他重斂之政在前也今特一穀不熟耳而流民如此就使九穀皆不熟朝廷將如之何臣竊以水旱之作由民之不足而怨民之不足而怨由有司之重斂有司之重斂由官冗兵多與土木之費而經制不立也又聞許汝鄭等處蝗蝻復生蝗蝻之生亦由貪政之所感也天意以謂貪政之取民猶蝗蝻之食苖故頻年生蝗蝻以覺悟陛下也春秋魯宣公十五年秋初履畝冬蝝生說者以謂緣履畝而生此所謂貪政之感也國家自陜西用兵增兵以來賦役煩重近年不惜髙爵重祿假借匪人轉運司復於常賦外進羡錢以助南郊其餘無名斂率不可勝計此皆貪政之發發於掊刻暴虐此民所以怨也所以干天地之和也水旱之所作也臣前所言官冗兵多民困者屢矣未䝉報下伏乞陛下敕大臣檢臣前所上章考今官數兵數與賦入之數立為經制又罷土木之費使民得足食而少休則天地之和至矣古人言太平者止於民之足食也今誠能立經制省官與兵節土木之費使民足食陛下髙拱深居而太平坐致顧陛下責任大臣如何耳至和二年四月上時知諫院上仁宗論水災歐陽修臣伏覩近降詔書以雨水為災許中外臣寮上封言事有以見陛下畏天愛人恐懼修省之意也竊以雨水為患自古有之然未有水入國門大臣奔走淹浸社稷破壞都城者此蓋天地之大變也至於王城京邑浩如陂湖衝溺奔逃號呼晝夜人畜死者不知其數其幸免者屋宇摧塌無以容身縛棧露居上雨下水纍纍老幼狼藉於天街之中又聞城外墳塜亦被浸注棺槨浮出骸骨漂流此皆聞之可傷見之可憫生者不安其室死者又不得藏此亦近世水災未有若斯之甚者此外四方奏報無日不來或云閉塞城門或云衝破市邑或云河內決千百步濶或云水頭髙三四丈餘道路隔絶田苖蕩盡是則大川小水皆出為災遠方近畿無不被害此陛下所以警懼隱惻至仁之心廣為咨詢冀以消復竊以天人之際影響不差未有不召而自至之災亦未有已出而無應之變其變既大則其憂亦深臣愚謂非小小有為可以塞此大異也必當思宗廟社稷之重察安危禍福之機追已往之闕失防未萌之患害如此等事不過一二而已自古人君必有儲嗣所以承宗社之重而不可闕者也陛下臨御三十餘年而儲嗣未立此久闕之典也近聞臣寮多以此事為言大臣亦嘗進議陛下聖意久而未決而庸臣愚士知小忠而不知大體者因以為異事遂生嫌疑之論此不思之甚也且自古帝王有子至三二十人者甚多材髙年長羅列於朝者亦衆而為其君父者莫不皆享無窮之安豈有所嫌而斥其子耶若陛下鄂王豫王皆在至今則儲宫之建久矣世之庸人偶見陛下久無皇子忽聞此議遂以云云爾且書曰一人元良萬邦以貞蓋謂定天下之根本上承宗廟之重亦所以絶臣下之邪謀自古儲嗣所以安人主也若果如庸人嫌疑之論是常無儲嗣則人主安有儲嗣則人主危此臣所謂不思之甚也臣又見自古帝王建立儲嗣既以承宗廟之重又以為國家美慶之事故每立太子則不敢專享其美必大赦天下凡為人父後者皆被恩澤所以與天下同其慶喜然則非惡事也漢文帝初即位之明年羣臣再三請立太子文帝再三謙遜而後從之當時羣臣不自疑而敢請漢文帝亦不疑其臣有二心者臣主之情通故也五代之主或出武人或出夷狄如後唐明宗尤惡人言太子事羣臣莫敢正言有何澤者嘗上書乞立太子明宗大怒謂其子從榮曰羣臣欲以汝為太子我將歸老於河東由是臣下更不敢言然而漢文帝立太子之後享國長久為漢太宗是則何害為明主也後唐明宗儲嗣不早定而秦王從榮後以舉兵窺覬陷於大禍後唐遂亂此前世之事也况聞臣寮所請但欲擇宗室為皇子爾未即以為儲二也伏惟陛下仁聖聰明洞鑒今古必謂此事國家大計當謹重而不可輕發所以遲之耳非惡人言而不欲為也然朝廷大議中外已聞不宜久而不決昨自春首以來陛下服藥於內大臣早夜不敢歸家飲食醫藥侍於左右如人子之侍父自古君臣未有若此之親者也下至羣臣士庶婦女嬰孩晝夜禱祈填咽道路發於至誠不可禁止以此見臣民盡忠䝉陛下之德厚受陛下之恩深故屬陛下之慮遠也今之所請天下臣民所以為愛君計也陛下何疑而不從乎中外之臣既喜陛下聖躬康復又見皇子出入宫中朝夕問安侍膳於左右然後文武羣臣奉表章為陛下賀辭人墨客稱述本支之盛為陛下歌之頌之豈不美哉伏願陛下出於聖斷擇宗室之賢者依古禮文且以為子未用立為儲也既可以徐察其賢否亦可以俟皇子之生臣又見樞密使狄青出自行伍遂掌樞密始初議者以為不可今三四年間外未見過失而不幸有得軍情之名且武臣掌國機密而得軍情豈是國家之利臣前有封奏其說甚詳具述青未是竒材但於今世將率中稍可稱耳雖其心不為惡不幸為軍士所喜深恐因此陷青以禍而為國家生事欲乞且罷青樞務任以一州既以保全青亦為國家消未萌之患蓋緣軍中士卒及閭巷人民以至士大夫間未有不以此事為言者惟陛下未知之耳臣之前奏乞留中而出自聖斷若陛下猶以臣言為疑乞出臣前奏使執政大臣公議此二者當今之急務也凡所謂五行災異之學臣雖不能知然其大意可推而見也五行傳曰簡宗社則水為災陛下嚴奉祭祀可謂至矣惟未立儲二易曰主器莫若長子殆此之警戒乎至於水者隂也兵亦隂也武臣亦隂也此推類而易見者天之譴告茍不虛發惟陛下深思而早決庶幾可以消弭災患而轉為福應也臣伏覩詔書曰悉心以陳無有所諱故臣敢及之若其他時政之失必有羣臣應詔為陛下言臣言狂計愚惟陛下裁擇至和三年七月上時為翰林學士宋名臣奏議卷四十
