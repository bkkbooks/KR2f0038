body:
  text: 宋名臣奏議卷十一宋趙汝愚編君道門恭儉上仁宗乞罷雇珠玉匠龐籍臣近者伏見傳降聖旨差雇玉工真珠匠小臣疏賤不知所造服用然而職在耳目之官茍有愚見不敢緘默恭惟陛下自纂位以來積德修道日謹一日近無耽好之玩逺無追求之勞古之聖明未易能過然今水旱相仍公私俱困北有林胡之抗敵西有元昊之凶狡尤宜恭儉齊紀律惜國用以豐實制兵威而震耀臣愚以謂不急之服玩近奢之器物悉宜屏絶以勸天下書曰不矜細行終纍大德禮曰無作淫巧以蕩上心願陛下視珍奇為棄物以奢侈為覆車昧死瀆聖唯俟罪戾明道二年上時為殿中侍御史上仁宗封進草子乞抑奢侈范仲淹臣昨到太平州界體量安撫本處檢會廣德軍判官錢中孚當塗縣主簿兼嘉祥縣尉溫宗賢等狀稱往諸鄉檢旱竊見貧民多食草子名曰鳥昧并取蝗蟲曝乾摘去翅足和野菜合煮食别無虛妄者臣竊思之東南上供糧米每歲六百萬石至於府庫物帛皆出於民民於飢年艱食如此國家若不節儉生靈何以昭蘇臣今取前件草子封進伏望宣示六宫藩戚庶抑奢侈以濟艱難仍乞密下裁造務後苑文思院糧料院撿祖宗之朝每嵗用度之費數目比於今時則奢儉自見伏望聖慈特降進止則天下幸甚明道二年七月上時為右司諫江淮南體量安撫上仁宗論宫中所費宜取先朝為則龐籍臣伏見連年災異天久不雨臣謂弭災消禍在朝廷自修比年費用奢廣倉廪出納不嚴內中須索既多有司以憑由除破無緣鈎較虛實臣竊為凡乘輿所用宫中所費宜取先朝為則今宿師西鄙力戰重傷方獲功賞而內官醫官樂官無功時享豐賜故天下指目謂之三官願少裁損無厚賚豫專勵戰功強寇不足平也康定元年五月上時為陜西轉運使上仁宗諫獵何郯臣竊以古者天子具四時之田所以講威武而勤逺略不徒事逰戲而玩小娛載之䇿書具有典法前日伏聞法駕將獵近郊中外之人聽者頗惑良以去嵗車駕已嘗出畋羣臣抗言隨即停罷忽兹再舉未諭聖心伏以陛下繼統以來動遵法度不喜弋獵不數豫遊恭儉之風足邁前古而今之舉事固必有因豈陛下以宇內有年方隅無事故於農隙以講武經欲為都邑遊觀之盛乎抑有獻議者謂田獵之事具有禮文行之以時蓋舉墜典則嚮者諫止之言不足顧乎若聖意果然如是先定則非愚臣之所敢議也然其中事有切於利害者尚可得而言焉恭自真宗皇帝即位之後遂下詔書罷放五方鷹鷂獵事不講踰四十年校聨之籍率非宿時士卒久不便習其事官司又不素詳其義倉卒而行必多曠闕竊聞去嵗乘輿之出往返甚勞一日之間殆馳百里而又兵衛不肅警蹕不嚴從官不及侍行有司不暇供億逮於暮夜始入都門此豈非士不習其事官不詳其儀而致然歟而况以騎乘而有疾馳之勞在原野而弛嚴衛之備或御者蹉跌變生銜橛愚民迷誤犯及車塵臣子之罪將何贖焉雖則仁聖之資固有神靈之衛然不可不備非常且西北二隅變故難測豈無姦偽雜於稠人廣衆之中由是而言益當深慮傳曰千金之子坐不垂堂矧於萬乘之尊乎賈誼曰射獵之娛與安危之機孰急今不獵猛獸而獵田彘不搏強寇而搏蓄兔玩細娛而不圖大患非所以為安也伏望陛下罷省出遊無重過舉遵烈考詔書之旨念前人警誡之規優遊養神樂過從獸拱揖在御慮無乘危則宗廟生靈實有慶賴臣職當言責理合開陳罔逃嚴誅貴少云補慶厯七年三月上時為殿中侍御史先是上再畋近郊南城之役衛士不及獵而歸夜有雉殞于殿中占者以為不祥是月詔將復出諫者甚衆郯上此疏明日有旨罷獵上仁宗論乞悉罷燕飲安神養氣司馬光等臣等竊見今嵗以來災異屢臻日食地震江淮騰溢風雨害稼民多菜色此正陛下側身克已未敢擅去之時而道路流言皆云天子近日宫中燕飲微為過差賞賚之費動以萬計耗散府庫調斂細民况酒之為物傷性敗德禹湯所禁周公所戒殆非所以承天憂民輔養聖躬之道也陛下恭儉之德彰信兆民議者皆以為後宫奢縱務相誇尚左右近臣利於賞賚陛下重違其請屈意從之夫天以剛健為德君以正固為事奈何徇後宫左右之欲上忽天戒下忘民病中不為宗廟社稷深自重惜臣等愚惑竊為陛下不取伏望陛下當此之際悉罷燕飲安神養氣後宫妃嬪進見有度左右小臣賞賚有節及厚味臘毒之物無益奉養者皆不宜數御以傷於和乃可以解皇天譴告之威慰元元窮困之望保受命無疆之休也嘉祐六年八月內上時知諫院上神宗論百姓侈靡乞身先儉約劉述臣竊觀方今天下之事可謂困弊之極矣如久疾之人肢體羸苶氣息奄奄不能自持所可恃者脈理未憊而已誠得良醫而救藥之輔其氣血調其飲食時其寒溫庶幾可以復全也陛下有明德嘉道孳孳庶政醫之良者也所謂輔其氣血者輕徭薄賦以寬民力以固民心俾無怨畔是也調其飲食者道民務本教之儉約雖有水旱之困而無捐瘠之患是也時其寒溫者為擇良守宰以撫綏之利有可興者興之害有可去者去之是也百姓習於久安競以侈靡相尚居處服用率多僭差婚姻喪葬不計其費而以不若人為恥因而破産者有焉其致非他由禁令不設故也管子曰倉廩實而知禮節衣食足而知榮辱若禁令不設人得自恣則倉廩奚由而實衣食奚由而足欲望其知禮節榮辱不可得也教化之行率自上起臣愚欲望陛下躬行節儉以化天下臣聞太祖皇帝常服浣濯之衣乘輿服用皆尚質素寢殿設青布葦簾宫闈施布幕無文錦之飾嘗出麻履布裳以賜左右曰此我舊所服者也真宗皇帝嘗謂輔臣曰國家所務儉約為先當須節用愛人以富庶天下張齊賢對曰書稱大禹克儉于家老氏三寶儉居其一上好儉則國有餘財下不僭則家有賸資如此則天下自然富夀矣大哉聖人之德皆能抑情損欲而以身率人也如是經曰下之事上也不從其所令從其所好上好是物下必有甚者也臣固願陛下躬行節儉以化天下也至於賜豫之事非有功德可以激勸於人者不可輕為也昔韓昭侯使人藏弊袴侍者曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰非爾所知也吾聞明主愛一嚬一笑嚬有為嚬而笑有為笑今夫袴之與嚬笑逺矣吾必待有功者而與之善哉人君之不妄賞人也如是古人有言曰人主不妄賞非徒愛其財也賞妄行則善不勸不妄罰非徒矜其人也罰妄行則惡不懲賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣陛下誠能以身先之然後敕下有司設為科條以絶僭侈之弊仍戒飭長吏使傳諭朝廷之意務崇約素以厚風俗若是則民之生業日益厚矣雖遇水旱之困而有儲蓄以禦之矣民財既充國用復省則徭賦之事自然輕薄矣兹實太平之基而萬世之利也在陛下勤而行之固而執之耳臣不勝惓惓之愚治平四年上時為御史上神宗論買燈蘇軾臣嚮蒙召對便殿親奉德音以為凡在館閣皆當為深思治亂指陳得失無有所隱者是以臣每見同列未嘗不為道陛下此語非獨以稱頌盛德亦欲朝廷之間如臣等輩皆知陛下不以疏賤間廢其言共獻所聞以輔成太平之功業然竊謂空言率人不如有實而人自勸欲知陛下受其言之實莫如以臣試之故臣願以身先天下試其小者上以輔助聖明之萬一下以為賢者卜其可否雖以此獲罪萬死無悔臣伏見中使傳宣下府市司買浙燈四千餘盞有司具實直以聞陛下又令減價收買見已盡數拘收禁止私買以須上令臣始聞之驚愕不信咨嗟纍日何者竊為陛下惜此舉動也臣雖至愚亦知陛下遊心經術動法堯舜窮天下之嗜欲不足以易其樂盡天下之玩好不足以解其憂而豈以燈為悅者哉此不過以奉二宫之歡而極天下之養耳然大孝在乎養志百姓不可以户曉皆謂陛下以耳目不急之玩而奪其口體必用之資賣燈之民例非豪民舉債出息蓄之彌年衣食之計望此旬日陛下為民父母惟可添價貴買豈可減價賤售此事至小體則甚大凡陛下所以減價者非欲以與小民爭此豪末豈以其無用而厚費也如知其無用何必更索惡其厚費則如勿買且內庭故事每遇放燈不過令內東門雜物務臨時收買數日既少又無拘收督迫之嚴費用不多民亦無憾故臣願追還前命凡悉如舊京城百姓不慣侵擾恩德已厚怨讟易生可不謹歟可不畏歟近日小人妄造蜚語士人有展年科場之説商賈有京城榷酒之議吏憂減俸兵憂減廩雖此數事朝廷決無然致此紛紛亦有以見陛下勤恤之德未信於下而有司聚斂之意或形於民當責已自求以消讒慝之口而臺官又勸陛下以嚴刑悍吏捕而戮之虧損聖德莫大於此而又重以買燈之事使得因緣以為口實臣實惜之方今百冗未除物力凋弊陛下縱出內帑財物不用大司農錢而內帑所儲孰非民力與其平時耗於不急之用曷若留貯以待乏絶之供故臣願陛下將來放燈與凡遊觀苑囿宴好賜豫之類皆飭有司務從儉約頃者詔旨裁減皇族恩例此實陛下至明至斷所以深計逺慮割愛為民然竊揆其間不能無少望於陛下唯當痛自刻損以身先之使知人主且猶若此而况於吾徒哉非惟省費亦且弭怨昔唐太宗遣使往涼州諷李大亮獻其名鷹大亮不可太宗深嘉之詔曰有臣若此朕復何憂明皇遣使江南採鵁鶄汴州刺史倪若水論之為反其使又令益州織半臂背子琵琶捍撥鏤牙合子等蘇許公不奉詔李德裕在浙西詔造銀盝子粧具二十事織綾二千匹德裕上疏極論亦為罷之使陛下內之臺諫有如此數人者則買燈之事必須力言外之有司有如此數人者則買燈之事必不奉詔陛下聰明睿聖追迹堯禹而羣臣不以唐太宗明皇事陛下竊嘗深咎之臣忝備府僚親見其事若又不言臣罪大矣陛下若赦之不誅則臣又有非職之言大於此者忍不為陛下盡之若其不赦亦臣之分也熙寧二年十二月上時直史館權開封府推官上宣仁皇后乞崇儉戒奢范祖禹臣伏以祥禫將終即吉方始服御器用內外一新奢儉之端皆由此始臣愚以為珠璣金玉之飾錦繡纂組之工凡可以蕩心悅目者不宜有加於舊增多於前也皇帝方嚮儒術親學問睿質日長聖性未定覩儉則儉覩奢則奢陛下所以訓導聖德者宜動皆有法不可不謹也自古聖帝明王莫不以儉為美德侈為大惡帝堯所居之室土階三尺茅茨不剪舜稱禹曰克勤于邦克儉于家孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕黻冕祭服也伊尹曰慎乃儉德惟懷永圖言儉之可以長久也文王卑服即康功田功周公戒成王以先知稼穡之艱難凡此皆陛下所宜日以啓迪皇帝之志者也東漢明德馬皇后常服大練左右但衣布帛無香薰之飾欲以身率下前史以為美談臣竊惟陛下聖政度越前古必不使明德馬后專美漢朝若崇儉敦朴飭正後宫以輔養皇帝之德使目不視靡曼之色耳不聽淫哇之音非禮不言非禮不動則學問日益聖德日隆此宗社無疆之福也孔子曰少成若天性習貫如自然老子曰不見可欲使心不亂古語有之曰貴不與驕期而驕自生富不與奢期而奢自至夫少習儉約長猶侈靡少習侈靡長將若何今天下之大生民之衆繫在陛下陛下儉於上則百姓富於下陛下奢於上則百姓貧於下比年以來天災流行年穀不熟國用虛乏百姓困弊幸賴陛下勤恤民隱存養休息視之如子有所不便輒弛禁以利民民方有樂生之意小康之望當今之務宜痛為節約昭示儉朴以率天下自古為國未有不先儉而能致四海富實者也漢文帝身衣弋綈慎夫人衣不曳地帷帳不得文繡以示敦朴為天下先景帝遵業務農訓儉以雕文刻鏤傷農事錦繡纂組害女工下詔戒之故太倉之粟陳陳相因紅腐而不可食都內之錢貫朽而不可校稱賢君必曰文景以比周之成康及其衰微民心思漢而不能忘以文景恭儉德澤及民者深也臣願陛下上觀帝堯舜禹文王之法考伊尹周公孔子之言下視文景之效則皇帝少而習之長而安之唯知儉約不知侈靡他日海內富庶自今日儉德為之始生民之類受陛下之賜豈有窮極哉臣竊聞奉宸庫已取珠子至六十斤戶部已用金至三千六百兩不為不多矣臣所以先事而言者恐增加無已滋長侈心也唐太宗問禇遂良曰舜造漆器禹雕其俎諫者十餘人何也遂良對曰奢靡之始危亡之漸也漆器不已必金為之金器不已必玉為之古之諍臣必諫其漸若事已橫流則無所諫矣是以紂為象筯箕子歎曰為象筯必為玉杯因思逺方珍怪之物而御之矣輿馬宫室之漸自此始不可救也古之人見微而防患如此唐明皇開元之初悉取珠玉錦繡服玩之物焚之於庭以示儉德及其末年猶以窮極奢侈天下敗亂今臣區區之愚竊以皇帝即吉之始若一開侈靡之端恐後日奢費之無已也故願豫為之防止於未然臣愚不識忌諱惟陛下裁赦元祐二年四月上時為著作郎兼侍講上哲宗論龍船費用陳次升臣伏聞金明池所造龍船費用萬貫不少肆為侈靡窮極工巧必非陛下之意也臣觀書之稱禹曰克勤于邦克儉于家以禹之德非無可稱也而所稱者勤儉而已蓋以有天下非不足於財也而必嗇於用者欲示敦朴以先天下故也恭惟陛下躬不世之資襲祖宗之慶勤儉過於夏禹天下所共仰有司不能宣明陛下德意所造不乘之舟其費如此而遊幸之日天乃大風豈非愛佑陛下而使覺悟有司之過乎兹事已往雖不可救亦足以為來者之戒伏望聖慈今後如有興造乞敕有司無令過度庶免虧損陛下儉素之德不勝幸甚紹聖四年三月上時為殿中侍御史上徽宗論玩物害治江公望臣聞理無隱而不彰事無晦而不顯言君子之樞機故不可不謹居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎惟君為風下民為草草上之風未有不偃者也故有所不言言無不彰有所不為為無不顯君唱之下民未有不應者也陛下居九重之中可謂崇深閟逺臣民耳目之所不接一有出言未嘗不彰一有所為未嘗不顯蓋民離之則愚合之則神合衆論則崇深閟逺者皆得而知之皆得而議之臣側聞陛下邇來政事之暇蓄能鳴善鬭之禽籠竒羽佳喙之鳥以資賞玩之習使誠有之亦未足以害治也然臣讀書至於五子之歌知太康之失邦不過內作色荒外作禽荒而已所謂禽荒不必馳騁畋獵然後為荒也心有欲而不禁則志荒志荒則政怠矣昔唐太宗之時一臺使有諷李大亮以名鷹為獻而大亮密表以陛下絶畋獵久矣求鷹必非陛下意而太宗悅其正諫玄宗遣使求鵁鶄鸂鶒於南方而倪若水上言以賤人貴鳥非所以望陛下而玄宗賞其説向使二君縱欲而無度拒諫而不改豈復有貞觀開元之盛治乎若以為資房闥之悅豈不聞華陽后樊姬之所為乎秦王好淫聲而華陽后為不聽鄭衛之樂楚莊好畋獵而樊姬為不食鳥獸之肉口非惡味也耳非惡聲也抑所好以率二君於無過之地爾中宫淑質徽音母儀天下未聞有過舉事出於陛下為之中宫當以華陽后樊姬之事以相警戒矣若事出於中宫以資戲樂陛下當以關雎求賢葛覃尊傅以相規正故刑于二女所以為大舜刑于寡妻所以美文王歟惟陛下財幸建中靖國元年七月上時為左司諫上徽宗諫獵江公望臣聞邇日傳聞道路之言有姓賈中貴人臂鷂鶻入後苑捕逐禽鳥臣未之信豈有禁御之中雖是近習之人敢肆猖獗一至於此徐思之必有伺得聖意然後敢爾再思之陛下未應至此然終疑而不釋也陛下所以得天下者以仁而已豈有仁者之君而務遊畋者乎又况陛下即政方踰年未明求衣日昃不食刻意勵志好賢樂善聽言從諫期底于道尚恐負宗廟社稷之靈無以慰天下蒼生之望豈復有暇逐禽獸為樂乎春搜冬狩特重於宗廟之禮毁卵覆巢尤戒於生誕滋育之時豈有仁者之君不因奉先祭祀而於生誕滋育可戒之時為毁卵覆巢之虐乎千金之子尚有垂堂之戒萬乘之主豈無犯車之虞和鑾之節清道而行猶慮於銜橛之變况馳騁驅逐與禽獸爭道於萬死一生之地豈不殆哉豈有仁者之君不自愛重而為虞人之所為乎得一禽則喧呼號歡分賜金帛不恤其費豈有仁者之君輕百姓之膏血以重微禽之軀乎臣以此揆之陛下必不然也雖然與其後事而引悔孰若先事而知戒此臣所以不惜萬死雖得之傳聞之不審亦為陛下道而不敢隱也五子之歌曰內作色荒外作禽荒有一於此未或不亡老聃曰馳騁田獵令人心發狂心狂志荒何事不忘莊周曰用志不分乃凝於神志分於外神亦隨之神志不一何事不失王者之治斷可識矣夫鳥託深林獸育豐草魚鱉不亂於網罟草木不夭於斤斧人不苦於苛政斯乃仁者之君所以治天下之道也昔文王有靈德故麀鹿白鳥在其囿而有濯濯翯翯之態魚在其沼而得充牣跳躍之樂陛下不大苑囿之奉數畝之地蠢動飛走恃陛下天地之仁德依陛下日月之末光生誕滋育得性之樂不異於文王之囿今反張喙橫羽延喘假息於馳驅啅噪之餘碎首決心飛毛灑血於猛鷙爪翮之下數畝之地依陛下尚不得保全其生况四海九州山林川澤之廣逺何以逃無辜夭折之禍哉蠢動雖微與人同一性也生植雖逺與人同一理也以強并弱以貴吞賤以其不能告訴殺之若無罪豈不思易所謂信及豚魚詩之仁及草木果何理也嘗聞荆文公得如黃之狗箘簬之矰畋於雲夢三月不反聽保申之諫受束矢之笞務治乎荆兼國三十非師保之訓則國亡矣玄宗嘗獵苑中必視左右曰宰相韓休知否已而疏輒至非宰相之言則社稷計已矣司馬相如賦上林以諷漢武帝揚雄作羽獵以諫成帝言近而指逺詞婉而意迫孰謂詞臣無補於國也詩有刺虞有針皆以遊畋之無益於治祗取亂亡爾今陛下師保不陳訓宰相不抗疏詞臣不獻賦書無歌詩無刺虞人無針所賴以知過失者諫臣爾臣或不言陛下如宗廟社稷何如天下蒼生何臣言縱不實亦足以為異日之鑒唐髙祖喜走馬射帖孫伏伽進諌以謂此直少年諸王務爾既為天子尚行之乎齊桓公以酒腐於俎得無害霸乎管仲以此固非善然無害霸也夫從禽止少年諸王務也陛下一日為之未足以害政第以天子為諸王少年之務何自輕乃爾非萬乘取重於天下之道也傳有之耕道而得道獵德而得德臣願陛下驅騖於仁義之場遊觀於六經之囿網多士弋羣凶天宇掃清王道砥平天下之望也社稷宗廟之福也上干天威自速誅戮陛下矜其以諫為職少貸狂易天下幸甚建中靖國元年上時為左司諫宋名臣奏議卷十一
