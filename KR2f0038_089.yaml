body:
  text: 宋名臣奏議卷八十九宋趙汝愚編禮樂門濮議上上英宗乞下有司議濮安懿王合行典禮韓琦臣等伏聞出於天性之謂親緣於人情之謂禮雖以義制事因時適宜而情必主於恩禮不忘其本此古今不易之常道也伏惟皇帝陛下奮乾之健乘離之明擁天地神靈之休荷宗廟社稷之重即位以來仁施澤浹九族既睦萬國交歡而濮安懿王德盛位隆宜有尊禮陛下受命先帝躬承聖統顧以大義後其私恩謹之重之事不輕發臣等忝備宰弼實聞國論謂當考古約禮因宜稱情使有以隆恩而廣愛庶幾上以彰孝治下以厚民風臣等伏請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙逰縣君任氏合行典禮詳處其當以時施行治平元年五月上琦等時任宰輔尋得旨候過仁宗大祥别取旨次年四月再進呈得旨送太常禮院與兩制已上同共詳定聞奏上英宗議乞依先朝封贈期親尊屬故事王圭臣等謹按儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之為所後者之祖父母妻妻之父母昆弟之子若子若子者言皆如親子也又為人後者為其父母報傳曰何以期也不二斬也何以不二斬也特重於大宗者降其小宗也又為人後者為其昆弟大功傳曰何以大功也為人後者降其昆弟也以此觀之為人後者為之子不敢復顧私親聖人制禮尊無二上若恭愛之心分施於彼則不得專一於此故也是以秦漢以來帝王有自旁支入承大統者或推尊父母以為帝后皆見非當時取議後世臣等不敢引以為聖朝法况前代入繼者多宫車晏駕之後援立之䇿或出母后或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祇承天地之意於宗室衆多之中簡拔聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕冨有四海子子孫孫萬世相承者皆先帝之德也臣等愚淺不逹古今竊以為今日所以崇奉濮安懿王典禮宜一依先朝封贈期親尊屬故事髙官大國極其尊榮譙國太夫人襄國太夫人仙逰縣君亦改封大國太夫人考之古今實為宜稱治平二年六月上圭時任翰林學士先是既有詔議圭等相顧不敢先天章閣待制司馬光獨奮筆立議議成圭即命吏以光手藁為案上英宗乞下兩制禮官詳定合稱何親韓琦臣等伏凖內降翰林學士王圭等奏崇奉濮安懿王典禮一凖先朝封贈期親尊屬故事髙官大國極其尊榮譙國太夫人襄國太夫人仙逰縣君亦改封大國太夫人考之古今實為宜稱者伏詳王圭等所奏未見詳定濮安懿王當稱何親名與不名欲乞下王圭等詳定聞奏治平二年六月上上英宗議合稱皇伯王圭臣等參詳真宗大中祥符八年楚王元佐以皇兄詔書不名仁宗即位涇王元儼以皇叔贊拜不名天聖五年加詔書不名此國朝崇奉尊屬故事今濮安懿王於仁宗皇帝其屬為兄於皇帝合稱皇伯而不名謹具狀奏聞治平二年六月上時議者或欲稱皇伯考天章閣王待制吕公曰真宗以太祖為皇伯考非可加於濮也上英宗請集三省御史臺官再議韓琦臣等伏凖內降翰林學士王圭等狀稱臣等參詳國朝崇奉尊屬故事今濮安懿王於仁宗皇帝其屬為兄於皇帝合稱皇伯而不名者臣等謹按儀禮為人後者為其父母報及按令文與五服年月勑並云為人後者為其所後父斬衰三年為人後者為其父母齊衰期即出繼之子於所繼所生皆稱父母又漢宣帝光武皆稱其父為皇考今來王圭等議稱皇伯於典禮未見明有引據狀請下尚書省集三省御史臺官定議聞奏治平二年六月上上英宗乞如兩制禮官所議宋敏求臣等謹按勑文稱儀禮為人後者為其父母報傳曰何以期也不二斬也何以不二斬也特重於大宗者降其小宗也為人後者孰後後大宗也曷為後大宗大宗者尊正統也疏曰此謂其子後人及來為父母在者欲其厚於所後薄於本親抑之故次在孫後也儀禮謂本親亦曰父母蓋追本其所自出若不明言父母則無辨别亦無以為言也勑又曰令文與五服年月勑皆曰為人後者為其所後父斬衰三年為人後者為其父母齊衰期即出繼之子於所生皆稱父母謹按令文五服年月皆出於儀禮也勑又曰漢宣帝光武皆稱其父為皇考謹按宣帝乃武帝之曽孫嗣昭帝後實孝昭孫屬也以其父為悼皇考宜也光武起於民間中興漢祚而推以世數上繼元帝固非元帝親命為子以南頓君為皇考宜也陛下既為仁宗皇帝親立為子矣仁宗乃陛下之皇考也今若又以皇考之名加於濮安懿王臣等以為甚非禮之不二斬也尊無二上之義也勑又曰議稱皇伯於典禮未見明有引據臣等謹按出繼之君稱本生為皇伯叔則前世未聞也漢安帝紀載清河王薨但不名爾此蔚宗特變常例也至於袁宏紀則亦名之安帝即位清河王尚在當時别無殊禮按本朝真宗謂秦王為皇叔仁宗謂楚王昭成太子並為皇伯是則皇伯叔之名在本朝稱之久矣蓋遵用舊文有所自也或以謂可加為皇伯父者謹按荀子與史記並載周公自稱我文王之為子武王之為弟成王之為叔父詩魯頌王曰叔父建爾元子俾侯于魯箋曰叔父謂周公也成王告周公曰叔父我立汝首子使為君于魯謂欲封伯禽也是詩人追述成王封伯禽時周公尚在故稱叔父者是生稱之辭既沒則未有稱為叔父者又經書稱伯父叔父同姓之臣也前代帝王多不通親屬冠於爵位之上西晉則封皇從伯父望為義陽王皇叔父幹為平原王亦生之稱又或謂皇伯考者謹按父與考存殁之稱考者成也言其德行之成祖與考有君德而成之也晉武帝稱景帝明皇稱中宗本朝真宗稱太祖皆曰皇伯考是興王業履尊位乃可稱伯考也又或謂可依漢宣帝故事稱親史皇孫如淳曰親謂父也謹按禮大傳曰親者屬也王制注曰周制太祖及文王武王二祧與親廟四是自始祖至父皆稱親漢宣為昭帝孫屬乃得以悼皇考為親與上皇考義同蓋親者父也皇考也不可以稱也臣等謂今來褒崇濮安懿王宜如兩制禮官所議以示萬世至公之法治平二年七月上時以制誥判禮部上英宗乞如兩制禮官所議吕大防臣伏見自古人君臨御之始施為舉措必有以厭服天下之心者或以至公大義或以深仁厚德非此二者不足以得天下之心漢髙祖除秦苛法與民更始者深仁厚德也光武非平帝之親以天下思劉氏乃追繼元帝之後不極尊其父祖者至公大義也至如太祖皇帝始即位則除五代之苛酷禁從兵之巷市太宗皇帝始即位則親試天下士補羡官者數百人真宗皇帝始即位則放天下逋負數十萬緡仁宗皇帝景祐親政之初則亦用考士補官之法四聖相繼率用此法者蓋知天下之心不可以智巧得而可以公義結也伏自陛下臨御以來除禫之始天下之人顒顒觀望乃陛下結天下人心之日而大臣曽不思慮者欲加濮安懿王非正之號以惑天下之觀聽有識之士逺近驚歎以為大臣上負先帝顧託而導人君于非義臣巳纍狀奏陳備其本末未蒙施行臣非不知阿順陛下聖意乃為自安之計然臣荷陛下非次拔擢置於言路親加訓奬形于誥諭臣若不極于誠使陛下由此失天下之心臣復何顔以事陛下伏惟少留聖意以社稷為計以天下人心為念以四聖親政之始皆有以得天下之心為法特頒手詔出自聖斷濮安懿王典禮以兩制禮官之議為定則陛下以至公大義結天下人心自今日始矣治平二年六月上時任監察御史裏行上英宗乞如兩制禮官所議范鎮臣等竊以為父母天下莫隆焉至于繼大宗則殺其服何也大宗之統不可絶而父母有嫡長之奉也視其服紀之隆殺而知聖人制禮之意也知名之不可以二也名也者天下之辨也所以别嫌明微而不可以不謹也為父母報云者記禮者之文其勢然也不可云為伯叔報也律令亦猶是也漢宣於昭帝為孫光武於平帝為祖容可以稱其父為皇考然議者咸以為非何也謂其以小宗而合大宗之統也陛下既稱仁宗皇帝為皇考又欲稱濮安懿王為皇考則是兩統而又二父又重於漢之失也非所以嚴宗廟也非聖人制禮之意也爾雅父之昆弟先生為世父後生為叔父國朝之制伯叔兄弟子姪皆加皇字今濮安懿王於仁宗皇帝為先生則陛下亦宜依爾雅及國朝故事稱皇伯而不名如前議為便至於漢之稱皇考稱帝稱皇立寢廟序昭穆皆非陛下聖明之所法今以儀禮及漢諸儒論議魏明帝詔凡五篇其間議有是非事有當否惟陛下裁處之大抵祖儀禮者為合乎經也治平二年六月上時為翰林學士判太常寺執政怒召鎮責曰詔書云當令檢詳何遽列上耶鎮曰有司得詔書不敢留即以聞乃其職也奈何更以為罪于是臺官自中丞賈黠以下各有奏乞早從王圭等議上英宗論不當罷集議乞别降詔以王圭等議為定吕誨臣伏覩近降勑命下尚書省集三省御史臺定議濮安懿王稱皇伯不合典禮未見明有引據續準手詔以論議不一權罷集議當令有司博求典故庶合禮經者臣竊以朝廷既知議論不一當辨正是非參合衆意明所適從豈可事未有定遽罷三省集議還付所司詔命反復非所以示至公於天下也輒徇愚見敢以上聞臣謹按儀禮為人後者為其父母報蓋為大宗後當為大宗斬還為小宗周不二斬明於彼而判於此也又按令文與五服年月勑出繼之子於所繼所生皆稱父母稱父母者所以别其本正於後也在屬籍當行除附斯令之意又可明也如漢宣光武皆稱父為皇考者二帝上承本宗皆非旁繼於今事體略不相類據王圭等議濮安懿王於仁宗皇帝其屬為兄於皇帝合稱皇伯而不名於禮得矣及引元佐元儼稱皇叔皇兄之類皆本朝典禮安得謂之無據臣竊原敕意直欲加濮安懿王為皇考與仁廟同稱如是則尊有二上而服有二斬禮律之文皆相戾矣臣恭以陛下鱗躍藩邸入繼大統南面尊臨皆先帝之德也俯終祥禫尚未遑廟謁遽有斯議搢紳之士皆未為然方陛下躬勤孝養上奉慈闈承顔猶懼其不足矧復顧私恩别親疏而忘大義哉就如有司循情酌禮以濮安懿王為考仙逰為妣示於中外得為安乎臣竊謂兹事非出清衷必佞臣茍悅聖情二三輔臣不能為陛下開陳正論又將啓其間隙違背禮義惑亂人情忘先帝之眷倚陷陛下於非正得謂之忠乎臣伏望陛下開廣聖慮精勤孝治不作無益以害至公既罷三省集議當别降詔旨以王圭等議為定以前後所獻不一之論盡降出外辨正是非明其罪罰置之於法可以渙釋羣疑杜絶邪論不然何以明陛下之無私判中外之深惑傳之永久所損不細臣備員臺憲敢不盡言唯冀睿哲斷之於中早賜施行以息浮議治平二年六月上時為侍御史知雜事初執政請集百官議意朝士必有希合而臺諌皆是王圭等所定議論洶洶太后聞之內出手詔切責琦等且欲緩其事須太后意解遂降詔罷議故誨亟下此奏上英宗論不當罷集議乞别降詔以王圭等議為定趙瞻臣伏見比下兩制儒臣會議濮安懿王稱親以仁宗皇帝早年鞠養陛下于宫掖遂于往歲下明詔以陛下為皇子嗣承顧命柩前即位故用為人後者為子之義特重大宗典禮甚明則濮王實仁宗之兄於陛下尊行為伯昭然無疑而議者復稱禮拜所生所養猶有父母之文以為論難明知禮無兩父二斬之義乃取文辭一字以亂正典且如文有去婦出母去巳非婦出不為母不書其名將何以考又稱漢宣光武追尊父為皇考且孰不知宣與光武逺繼祖世不為昭元之子妄傳為義詿誤聖朝昔漢董宏阿附丁傅開發邪議師丹守正終折僭號至魏明帝敕戒公卿則曰敢為佞邪導諛時君謂考為皇稱妣為后則股肱大臣誅之無赦今夫為臣而自為董宏之行復待陛下不以魏明之賢上負先帝下背所學詭引文辭諷為詔意遂下三省臺官集議朝廷正士莫不發憤欲建正論今且復頒手詔以為論議不一權罷此會仍俾有司博求典故臣愚聞命竊謂未允且衆議未上安知不一國家議事本擇僉謀委一有司孰若多士典章沿革莫不講聞今云博求豈復如此蓋由邪説直塞羣言不思據經自欲作古存著未定之意沮格前議之端中外歡驚指名有在趨嚮如此心迹可察伏乞陛下昭示不一之議廷詰立異之黨如彼於禮經為是即可施行或臣與前議為非請從誅竄况國之䇿命不當因循朝之縉紳豈乏學問願敕建議之者使與臣等對辨邪正一定以慰天下之望治平二年六月上時為侍御史上英宗乞行禮官所奏典故吕大防臣等纍具封章為濮安懿王典禮乞依兩制臣寮定議伏覩手詔再下禮官詳求典故切知太常禮院已具典故奏陳臣等於今月二十一日同到中書咨議執政臣寮皆稱禮官奏狀留中不下兼臣等曽親奉德音且候禮官檢討至今多日未聞施行伏緣陛下臨御之初敦敘皇族自燕王已下各加恩禮更封進國恩榮兼至况濮安懿王於陛下有顧復之恩封國優崇宜極人臣之典而不宜在諸王後矣特以大臣立議太過禮不時舉致物論不同中外驚歎遂使追崇之禮至今闕然仰虧陛下孝思之義而未厭四方顒顒之望非所以榮親而廣盛德也臣等愚陋以為濮安懿王典禮抑禮而不舉不若屈情而亟行伏乞禮官所奏典故早下有司施行如禮將使安懿如在之靈樂於陛下之中禮太廟降觀之鑒喜於陛下之至公顒顒之望四海如一治平二年六月上時為監察御史裏行上英宗乞行禮官所奏典故司馬光臣聞聖人舉事與衆同欲故能下協人心上順天意洪範曰三人占從二人言蓋國有大疑則決之於衆自上世而然矣臣伏見嚮者詔羣臣議濮安懿王合行典禮翰林學士王圭等二十餘人皆以為宜凖先朝封贈期親尊屬故事凡兩次會議無一人異辭所以然者蓋欲奉濮王以禮輔陛下以義也而政府之意獨欲尊濮王為皇考巧飾詞説誤惑聖聽不顧先王之大典蔑棄天下之公議使宗室疏屬皆已受封贈而崇奉濮王之禮至今獨未施行此衆人所以怫欎而未為稱愜者也或者恐陛下未能決知二議是非臣請更為陛下别白言之政府言儀禮令文五服年月敕皆云為人後者為其父母即出繼之子於所繼所生皆稱父母臣按禮法須指事立文使人曉解今欲言為人後者為其父母之報若不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣按宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇祖考以其與昭帝昭穆同故也光武起布衣誅王莽親冒矢石以得天下名為中興其實創業雖自立七廟猶非太過况但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業傳曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎政府若以二帝不加尊號於其父祖引以為法則可矣若謂皇考之名亦可施於今日則事理不侔矣設使仁宗尚御天下濮王亦萬福當是之時命陛下為皇子則不知謂濮王為父為伯若先帝在則稱伯沒則稱父臣計陛下必不為此行也以此言之濮王當稱皇伯又何疑矣今舉朝之臣自非挾姦佞之心欲附會政府誤惑陛下者皆知濮王稱皇考為不可則衆志所欲亦可知矣陛下何不試察羣臣之情羣臣誰不知濮王於陛下為天性至親若希旨迎合不顧禮義過有尊崇豈不於身有利而無患乎所以區區執此議者但不欲陛下失四海之心受萬世之譏耳以此觀之羣臣之忠佞邪正甚易見矣臣願陛下上稽古典下順衆志以禮崇奉濮安懿王如王圭等所議此亦和天人之一事也治平二年六月上時為天章閣待制知諫院上英宗乞令樞府大臣同定典禮是非吕誨臣竊以國朝承五代餘弊文武之政二府分領任重體均其實一矣然而軍國大事皆得合議今議崇奉濮王此事體至大者始欲集三省合議而終不謀于樞府臣所未喻兩制及臺諫官論列者半年外臣抗疏言者不一而樞府大臣恬然自安如不聞知訖無一言以正朝廷典禮豈所謂以道事君固如是耶今佞人進説惑亂宸聽中書遂非執守邪論當有以發明經義解釋羣疑臣欲乞中旨下樞密院及後來進任兩制臣寮同共詳定典禮以正是非久而不決非所以示至公于天下也治平二年十二月上時為侍御史知雜事上英宗乞正宰執懷邪詿誤之罪吕誨臣等聞豺狼當路擊逐宜先姦邪在朝彈劾敢後伏見參知政事歐陽修首開邪議妄引經證以枉道悅人主以近利負先帝欲纍濮王以不正之號將陷陛下於過舉之譏朝論駭聞天下失望政典之所不赦人臣之所共棄哀威之失既難施於聖朝褒猶之姦固莫逃於公論當屬吏議以安衆意至如宰臣韓琦初不深慮固欲飾非傅會其辭詿誤上聽以至儒臣輯議禮院講求經義甚明僉言無屈自知已失曾不開陳大臣事君詎當如是曽公亮及趙概備位政府受國厚恩茍且依違未嘗辨正此而不責誰執其咎臣等地居言職勢不敢默請尚方之劍雖古人所難舉有國之刑况典章猶在伏請致修于理及正琦等之罪以謝中外且議既不一理難並立昔師丹之説行則董宏坐其罪董宏之論勝則師丹廢于家臣等及修豈可俱進言不足用願從竄謫上不辜陛下之任使下不廢朝廷之職業臣等之志足矣治平三年正月七日與吕大防范純仁趙瞻同上時為侍御史知雜事先是誨等前後十一奏乞依王圭等議早定濮王典禮皆不報乞免臺職又不報至是遂劾奏之上英宗再論宰執懷邪之罪吕誨臣等近列狀奏彈參知政事歐陽修首啓邪議加濮王非正之號稱引無據阿諛不忠乞下有司議正其罪及宰相韓琦等不當飾非遂過宜加顯責至今未蒙施行竊以自古人君之御天下未嘗不以人心為本得之則中才可以免危亂失之則賢智不能保治安故曰民猶水也可以載舟可以覆舟人心之得失可不謹哉豈有身備大臣與國同體希合上意內營已私移過於人君失望於天下為臣之惡莫重於斯伏惟陛下紹膺大統稱尊御極生育之恩禮宜追厚然當俟先帝祥禫之既畢陛下德澤之已行然後講求典禮褒崇本親况修博識古今精習文史明知師丹之議為正董宏之論為邪利誘其衷神奪其鑒廢三年不改之義忘有死無二之忠仁宗虞主始祔陵土未乾而遽開越禮之言欲遵衰世之迹致陛下外失四海臣庶之心內違左右卿士之議原修之罪安得而赦陛下自臨御以來厲精為治遇災而懼則有周宣之風至誠感神則蹈虞舜之德至如徽稱所加却而不受皆前代難行之節治朝可紀之政推而行之和氣可致然而中外人情囂然不安者良由邪説震驚大義未定今不正濮王之禮則無以慰羣心不罪首惡之臣則無以清朝政伏望聖慈早出臣等前後章奏付外施行治平三年正月上上英宗以言不行居家待罪吕誨臣等自去秋以來相繼論列中書門下不合建議欲加濮王非正之號不蒙開納又于近日臣等三次全臺列狀奏彈參知政事歐陽修不當首啓邪議導諛人君及韓琦曽公亮趙槩等依違傅會不早辨正乞下有司議罪亦未蒙付外施行蓋由臣才識淺陋不能開悟聖心早正典禮又不能擊去姦惡肅清朝廷遂致大議久而不決中外之人謗論洶洶若安然尸祿不自引罪則上成陛下之失德下隳臣等之職業臣等已將元授御史告身隨狀繳納自今月二十二日更不赴臺供職居家待罪伏望聖慈早賜黜責治平三年正月上是時執政密議欲令皇太后下手書勇濮王為皇夫人為后皇帝稱親又令上下詔謙遜不受尊號但稱親即園立廟以示非上意誨等聞之遂上此奏上以御寶封告勑遣內侍趣誨等入臺誨等雖受告猶居家待罪上英宗論濮安懿王稱安懿皇司馬光臣聞諸道路未知信否或言朝廷欲追尊濮安懿王為安懿皇審或如此竊恐不可陛下既為仁宗後於禮不當顧私親臣先時言之已熟不敢復煩聖聽今臣不知陛下之意固欲追尊濮王邪前世帝王以旁支入繼追尊其父為皇者自漢哀帝為始其後安帝桓帝靈帝亦為之哀帝追尊其父定陶恭王為恭皇今若追尊濮安懿王為安懿皇是正用哀帝之法也陛下有堯舜禹湯不以為法而法漢之昏主安足以為榮乎仁宗恩澤在人淪於骨髓海內之心所以歸附陛下者為親受仁宗之命為之子也今陛下既得天下乃加尊號於濮王海內聞之孰不解體又安足以為利乎夫生育之恩昊天罔極誰能忘之陛下不忘濮王之恩在陛下之中心不在此外飾虗名也孝子愛親則祭之以禮今以非禮之虗名加于濮王而祭之其于濮王果有何益乎三者無一可而陛下行之臣竊惑之此蓋政府一二臣自以鄉者建議之失已負天下之重茍欲文過遂非不顧于陛下之德有所虧損陛下從而聽之臣竊以為過矣臣又聞政府之謀欲託以皇太后手書及不稱考而稱親雖復巧飾百端要之為負先帝之恩虧陛下之義違聖人之禮失四海之心政府之臣秖能自欺安能欺皇天上帝與天下之人乎臣願陛下急罷此議勿使流聞逹於四方則天下幸甚臣今雖不為諫官然嚮日已曽奏聞身備近臣遇國家有大得失不敢不言治平三年正月上光時為龍圗閣直學士兼侍講上英宗論濮安懿王稱親吕公著正月二十二日皇太后手書吾近聞羣臣議請皇帝封崇濮安懿王至今多日未見施行吾再閲前史乃知自有故事濮安懿王譙國太夫人王氏襄國太夫人韓氏仙逰縣君任氏可令皇帝稱親仍尊濮安懿王為濮安懿皇王氏韓氏任氏並稱后皇帝手詔朕面奉皇太后慈旨為議濮安懿王典禮久未施行已降手書付中書濮安懿王譙國夫人王氏襄國夫人韓氏仙逰縣君任氏令朕稱親仍尊濮安懿王為濮安懿皇王氏韓氏任氏並稱后朕以方承大統懼德不勝稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園增置吏卒守衛即園立廟俾王子孫主奉祠事皇太后諒兹誠懇即賜允從宜令中書門下依此施行中書劄子奉聖旨宗朴候服闋與除節度觀察留後主奉濮王祠事改封濮國公臣伏覩降敕下太常禮院濮安懿王皇帝稱親臣忝預禮司曉夕惟慮義有未安不敢自默竊以稱親之説蓋用漢宣帝時有司奏請史皇孫故事謹按皇孫即宣帝所生之父宣帝為昭帝後是以兄孫遙繼祖統於漢家無二考之嫌史皇孫初無爵諡有司奏請之始故且稱親其後既已立諡秖稱悼園然則親字非所以為稱謂且陛下以聖明之德仁宗皇帝拔自旁支入繼大統雖天下之人三尺童子皆知陛下濮王所生今但建立園廟以王子承祀是於安懿王無絶父之義於仁宗皇帝無兩考之嫌可謂兼得之矣其親字既稱謂難立且義理不安伏乞更不施行治平三年正月上公著時判太常寺奏入不報上英宗乞追罷園廟指揮吕誨臣伏覩六月中敕下議濮王典禮引漢宣光二帝稱考故事今月二十三日詔不敢當皇太后追尊父皇母后之禮且欲以塋為園立廟俾王于孫以奉祠事臣愚以為今日與漢宣事體不同當時太子與皇孫俱死于外因其地葬之故曰戾園悼園即位後八年有司言父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢後議者以父為士子為天子祭以天子者乃謂堯舜禹湯周文漢髙受命之君非謂繼統為後者考廟悼園宜毁勿修乃從其請今濮王陪葬熙陵别子孫之序奉邑守衛皆巳嚴具必欲别起園寢增廣制度當須改卜易其靈竁不惟熙陵隔絶亦與潤王分别顧其典禮疑有未安漢悼皇止一子是為宣帝雖承大宗不可絶小宗之祀故建立寢廟不為過矣議者猶曰考廟悼園宜毁勿修蓋禮不踰間而當專意於昭帝也况濮王嗣續衆多奉祀何闕陛下不專意於仁廟而復顧於私親示諸天下其如公議何臣竊原二詔之意盡出首議之臣全襲定陶之事遂追哀帝之迹向言權罷人皆竊笑今日且欲誰其取信衷誠接下猶或違之譎詭示人何可久也陛下獨不念先帝恩德七廟威靈陟降在庭禍福所繫臣雖甚戇內實寒心伏望聖慈克崇孝道無惑邪説黷亂典章俯順人心仰答天意其園廟指揮特行追罷首議之臣不可寬宥慰安中外兹為急務臣繳納綸誥擅去官守之罪不敢茍避早冀黜謫治平三年正月上時為侍御史知雜事上英宗言母后不宜自出詔令范純仁臣伏聞皇太后手書追尊濮王為皇夫人為后陛下巳降勑命施行竊以追崇濮王之事始因中書不正之譏陛下謙謹未行之間聞皇太后曾降手書切責政府因此權罷今皇太后復降命令追崇為皇始末不同天下將何取信况皇太后自撤簾之後深居九重未嘗預聞外政豈當復降詔令有所建置蓋是政府臣寮茍欲遂非掩過不思朝廷禍亂之原耳且三代已來未嘗有母后詔令施於朝廷者自秦漢已後母后方預幼主之政自此權臣欲為非常之事則必假母后之詔令以行其志往往出於逼脅而天下不幸不知事由權臣今陛下以長君臨御於兹四年萬幾之務當出宸斷內奉慈闈唯宜竭仁孝之誠盡四海之養而已豈須更煩房闥之命參紊國章一開其端流弊極大異日或為權臣矯託之地甚非人主自安之計也伏望陛下深察臣言追寢前詔凡繫濮王典禮陛下自可採擇公議而行何必用母后之命施於長君之朝也臣方待罪於家日俟誅竄而區區之誠不能自已者尚冀一悟明主之聽以安宗社臣雖萬死亦復何恨治平三年正月上時為侍御史詔諭純仁等供職上英宗黜責歐陽修吕誨臣等今月二十四日列章論奏濮王典禮雖去殊號首議之臣未加顯黜及乞正臣等不合納告去職之罪依前居家俟命並未蒙開納上忤威顔戮有餘責內存忠憤死而後已伏緣臣等本以歐陽修首啓邪議詿誤聖心韓琦等依違附會不早辨正纍具彈奏乞付朝典近覩皇太后手書追崇之典並用哀威衰世之事乃與政府元議相符中外之論皆以謂韓琦密與中官蘇利涉髙居簡往來交結上惑母后有此指揮蓋欲歸過至尊自掩其惡賣㺯之迹欲蓋而彰欺君負國乃敢如此陛下知其不可急降手詔雖去殊號然而尚許稱親復建議之罪未正典刑陛下縱以輔臣同議勢難全責而修為首惡豈宜曲貸凡人臣得罪君上猶或可赦修乃得罪祖宗故無可赦之理自來大臣有過為憲司所劾例皆闔門憂畏拜章引咎蓋權勢之臣理當如是今修氣貌揚揚出入如故又復巧作姦狀熒惑中外陛下聖鑒清明觀修為人稍失控御何所不至伏望特出聖斷將修黜責臣等亦有不合納告去職之罪亦乞一時施行臣等雖死之日猶生之年臣等與修理不兩立修茍不黜臣等終無就職之理治平三年正月上宋名臣奏議卷八十九
