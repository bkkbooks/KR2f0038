body:
  text: 宋名臣奏議巻九十八宋趙汝愚編刑賞門法令上仁宗論編敇當任逹識大儒宋庠臣伏以國朝以來詔數下而建條比牒連名充曹創府煩科碎目與日而增毎罰一辜斷一事有司引用皆連篇累牘不能徧舉率不紀嵗則别加論次謂之編敕條貫飭盡綱目畢張大可含元細不容髪王者之制揭若日月動如雷霆其言易而文其禁切而廣伏見今日編敕者繁長猥俗與府縣文符無異用字乖舛遣辭重複寧所謂明白温醇之㫖邪實由不専任逹識大儒而多用執法之吏夫法吏者奉行其法可也寧制法之人哉古人有言治國如治家耕當問奴織當問婢今欲與法吏謀致治之本是猶使奴織而婢耕要其成功不可得也臣欲乞專委鴻博之老及輔弼大臣商較敕條畧依律文為體裁制其文布四海使識朝廷之尊傳萬世俾知文雅之盛仍自今日以往有臣庻上言欲釐改舊章建設條禁者願陛下謹其俞㫖必先付之兩府參之羣吏若前條確見其短今文率以為便可行於經乆者即再下兩制令以所陳之狀去其蕪雜取其精意倣約律令著為章程若事止苛文不足發明利害者皆寢而勿報如此則法不數變而民知所從言者必難臣曰今若依律令以為敕天下官吏必不能曉臣對曰今天下所頒律令曹局小吏猶能用之而依律為敕獨不能曉此膠柱之論也又必難臣曰夫詔敕者多先帝所定而不當改臣對曰凡詔敕之設本臣庻上陳之見寜一出先帝之口哉况聖人以便利萬物為至仁不以因循陳跡為孝且太宗皇帝改建隆之敕真宗皇帝革興國之法是皆不可乎此守株之談也明道二年上時為三司户部判官上哲宗乞修敕令劉摯臣竊以法者天下之大命也先王制法其意使人易避而難犯故至簡至直而足以盡天下之理後世制法惟恐有罪者之或失也故多張綱目而民於是無所措其手足矣世輕世重惟聖人能變通之祖宗之初法令至約而行之可乆其後大較不過十年一變法豈天下之大民物之衆事日益滋則法不可以不宻歟臣竊以謂非事多而後法宻也殆法繁而後姦生神宗皇帝逹因革之妙謹重憲禁元豐中命有司編敇令凡舊載於敕者多移之於令盖違敕之法重違令之罪輕此足以見神宗皇帝仁厚之徳哀矜萬方欲寛斯人之所犯恩施甚大也而所司不能究宣主徳推廣於其間乃增多條目離析舊制用一言之偏而立一法因一事之變而生一條其意煩苛其文晦隐不足以該萬物之理逹天下之情行之幾時盖已屢變今所謂續降者毎半年一頒毎次不减數帙矣夫法者天下之至公也造之而不能通故行之而不能乆其理然也又續降多不顯言其所衝改故官司州縣承用從事參差牴牾本末不應非所謂講若畫一通天下之志者也臣愚以謂宜有所加損潤澤之去其繁宻合其離異務在簡易明白使民有所避而知所謂遷善逺罪之意伏望聖慈酌時之宜全法之用選擇儒臣一二有經術明於治體練逹民政者將慶厯嘉祐以來舊𠡠與新勑參照去取畧行刪正以成一代之典施行無窮元祐元年上時為御史中丞上哲宗乞别修改奏讞不當免駮勘條范百禄臣竊以堯舜大典罪疑惟輕至周之時刑疑則從罰罰疑則從赦漢詔獄疑者讞有司不能决獄廷尉今敇所謂刑名疑慮者盖本乎此書稱宥過無大周官以三刺三赦三宥之法求民情斷民中而施上服下服之罪原情定辟冀有以生之不得已焉然後刑殺令敕所謂情理可憫者亦出乎此祖宗立法以此為輕重賞罰之權以此為人主好生之徳但令有司審謹罪罰必當不妄貸凶暴當誅之人則為善矣故熈寧敇云如非疑慮可憫而輒奏者免駮勘此正合於漢詔所謂有合讞而後不當讞者不為失之意至元豐則已刪去上件與免駮勘之文中間雖曾申明然敇意終是未備至於去年十一月二十四日敇則云不得一槩將舊例貸配仍委三省㸃檢如有不當許用例破條奏乞取勘施行本部自承准著令已來毎擬斷大辟固不敢一槩用例貸配然官吏上下自非明恕不惑鮮不顧避㸃檢畏懼奏勘故罪案條法雖在疑慮可憫之間稍不灼然明白則徃徃入重不憚論殺以茍逭一時之責兼不住看詳得其間疑慮可憫者屢以批退故從依斷以此比之已前年分大辟論殺分數為多仍訪聞比來在外諸州知有此約束亦頗承望風㫖不敢奏讞死刑臣愚以為上件著令雖革得往時用例破條之弊不失有罪之人深恐行之積年將見其間罪人必有當輕而重者不少矣甚違寧失不經之義殆非朝廷好生之徳謹具録熈寧元豐敕并去年十一月二十四日敕條及元豐六年以後并自降去年敇條指揮後來十箇月斷貸過大辟分數繳連進呈伏望聖慈特賜詳酌指揮下有司覆詳去年十一月二十四日條貫參用熈寧元豐敕意重别刪修立法庻使平國之刑協於中正天下幸甚元祐二年上時為刑部侍郎上哲宗論省曹寺監法令繁宻蘇頌臣聞在昔帝王之發號出令也必因時而施宜視俗而興化時朴野則濟之以文俗彫偽則示之以質随變所適使民宜之故能久於其道而天下化成質文損益百世可知也國家剗五季之弊續有唐之緒累聖創制或革或因其道粲然於是大備仁宗皇帝以承平日久事多因循曠然有改作之志故開廣言路整緝治綱至於先皇帝遂大有為䑓閣之務無所不舉然而事目寖廣法令益繁陛下臨御之初深知其故推原先志精加裁損數年之間講明備至而法令之繁尚未盡革何以言之先皇帝改定官制本欲憲章百王歸於簡要而奉行之際羣臣不能究宣上㫖各務便文事有未詳更復立法積乆不已遂致滋章故今日之弊良由闗防傷於太宻而畫一傷於太煩則難於通融盖省臺寺監萬務所萃置長立貳承之以僚屬所以裁處事務助成至治也而官不任職毎事立條事務日新欲以有司之文而盡天下之務雖使臯陶制法蕭何造律勢不能遍况百司所職條目不同而一司之間又有細務或通於彼而礙於此故有求之人不能悉曉遂至紛争或經臺省投牒披訴文移往復虚煩取㑹其可行者無一二徒自奔競無益風教夫闗防宻則有司執文重疊問難小或違戾遂格而不行使有求者抑塞而不舒妄訴者牽制而不斷近者陛下特軫宸衷將革其弊故丁酉詔書分命近臣抽索文案看詳檢㸃内有拘文害事不近人情者許并元條删改詔意如此可謂察見事情大慰羣望然而行移彌月取索甚多定奪去取有礙他條不能盡如詔書之意誠由闗防太宻之所致耳拘礙如此亦可以謂之弊矣誠能少損其文致而濟之以忠厚則三代循環之政亦不過此臣愚欲望聖慈特詔近臣遍行取索應省曹寺監見用條制格式仍召集諸司官吏使之反覆詰問看詳定奪可刪者删之可改者改之擇其要切者著為新令務從簡易使便於施用其餘令式所不能備者小事則從省曹長官専決大事則禀於朝廷簿書期㑹悉付衆僚催督結絶若官司措置失當及㣘私廢公致有赴訴並委臺察紏案如得實狀其當職官吏次第書罰有渉欺妄亦行懲責如此則臺閣規模有宏逺之致朝廷法度循簡易之規矣元祐五年上時為翰林學士承㫖禁約上真宗乞禁銷金丁謂臣准詔開封府民吳遂違制造蹙金服已决訖准别敕配𨽻令三司申明舊禁者竊以儉以制用有國之彛典奢則不遜庻民之大防國家撫育黎元務厚風俗而輦轂之下㕓肆相望競造金箔用求厚利况山澤之寳所得難致儻縱銷鎔實為虚費今約天下所用嵗不下十萬兩惜此上幣棄於下民雖王者居尊不貴難得之貨而有司守職須條革弊之方自今金銀箔線貼金銷金泥金間金蹙金線金裝貼什器土木玩用之物並請禁斷非命婦不得用為首飾冶工所用器悉送上官違者所在捉搦許人紏告並以違制論告者給賞錢仍以犯人家財充大中祥符元年二月上時為三司使上仁宗乞斷祅巫夏竦臣聞左道亂俗祅言惑衆在昔之法皆殺無赦盖以奸臣逆節狂賊失規多假鬼神摇動耳目漢之張角晉之孫恩偶失防閑遂至屯聚國家宜有嚴制以肅多方竊以當州東引七閩南控百粤編氓右鬼舊俗尚巫在漢欒巴已嘗翦理爰從近嵗傳習滋多假託禨祥愚弄黎庻勦絶性命規取貨財皆於所居塑畫魑魅陳列幡幟鳴擊鼓角謂之神壇嬰孺襁褓已令寄育字曰壇留壇保之𩔖及其稍長則傳習祅法驅為僮𨽻民之有病則門施符篆禁絶徃還斥逺至親屏去便物家人營藥則曰神不許服病者欲食則云神不聽飱率令疫人死於饑渴洎至亡者服用又言餘祟所凴人不敢留規以自入若幸而獲免家人所資假神而言無求不可其間有孤子單族首面㓜妻或絶户以圖財或害夫而納婦浸滛既乆習熟為常民被非辜了不為怪奉之愈謹信之益深從其言甚於典章畏其威重於官吏竒神異像圖繪嵗增邪籙祅符傳寫日夥小則鷄豚致祀歛以還家大則歌舞聚人餕其餘胙婚葬出處動必求師劫盗鬭争行須作水蠧耗衣食眩惑里閭設欲扇揺不難連結在於憲典具有條章其如法未勝姦藥弗瘳疾宜頒峻典以革祅風當州師巫一千九百餘户臣已勒令改業歸農及攻習鍼灸方脉所有首納到祅妄神像符籙神衫神杖魂巾魂㡌鍾角刀笏紗羅等一萬一千餘事已令焚毁及納官訖伏乞朝廷嚴賜條約所冀屏除巨害保宥羣生杜漸防萌少禆萬一天聖元年上時知洪州上仁宗乞禁夜聚曉散及造儀仗事神劉隨臣聞好生惡殺往聖之大猷先徳後刑前經之令範成兹盛美允屬公朝臣近知侍御史李應言等制勘京東李定禄等公事干連甚衆具獄聞奏兩宫聖慈特加欽䘏除首四人悉從寛典所謂好生之徳洽於民心朝野聞之無不相賀臣久歴外任粗知其由閭閻之中似此多矣不食葷血迷謬相傳誘之以天堂怖之以地獄夜聚曉散謂之修善無識之民多陷邪僻原其本情皆為妄求佛果也目為不軌恐渉非辜愚迷者不知國法所禁捕盗者但以發姦為公卒逄捕掩之期遂求奔竄之路計窮拒捍或騁兇麤捶拷及身詿誤不少聖情軫念昭雪至多足以見泣辜推人感召和氣也臣又伏見京東羣民間有拜岳大㑹率歛財物千百為羣造作王者儀仗及有真假兵器結束人物私自推補僣侈相尚搔率户民原其本情皆為妄求福佑也若不嚴行禁制深慮别長姦兇或因捉搦送官恐將指為叛逆既有乗輿之物獄官何以申明若遂寘於深刑實慮成於枉濫各宜曉諭庻絶澆訛且夜聚曉散之徒為其虧損風教已有條制頭首及强梁者處死造乗輿兵器祀神者慮其兇黨竊發所宜特降明文臣欲乞似此違犯其頭首及强惡者並從違制本法科罪率從者勿治仍乞以此二事散下諸道令鄉村要路粉壁書冩重新曉諭使民知禁不陷刑章庻明善教之方用廣率人之化天聖五年上時為右司諌上仁宗乞逐去妖人張恵真劉随臣聞神怪之事天子不言妖妄之徒聖人切禁所以防惑亂而止刑殺也臣竊知開封府有犯罪無目人張惠真妄稱數百嵗見在京師誑嚇聾俗若不早為逐去竊慮别長妖訛牽掛平人漸紊刑法臣伏見天禧中西京河陽妖怪大起不經旬日已到京師或云變化多般或云形狀怪異逓相驚恐街坊不寧遂出榜文定其爵賞許人告首庻獲妖人自後捉到夜聚曉散人張子元數百人命吕夷簡制勘决殺頭首六人其餘免死驚擾捕逐數月方安盖因此徒造作幻術常加禁止尚恐妖興忽若信其妄言便恐别生怪異其張惠真採其羣議死必有餘本府盖藏上惑聖聽免其誅戮奬信妖訛伏望聖慈不聽邪言速令逐去仍加防守勿縱妖狂庻兹巧偽之徒不傷清浄之化貼黄臣讀書見漢武帝好神仙方術之事封欒大等為文成五利將軍館於宫中與之抗禮自後詐偽俱發並皆誅死即知神仙之徒必不自言竒異張惠真必是夜聚曉散妖妄之人伏望聖慈速令逐於逺惡去處只如長眉行者之𩔖亦不宜乆在京師惑亂衆庻天聖五年上上仁宗乞禁匿名文字吳育臣伏見近年以來多有造作䜟忌之語疑似之文或不顯姓名暗貼文字恣行毁謗以害讎嫌或宻聞朝廷自謂忠赤若是公直無隐何不指事明言若凴虚造作必藴邪謀更與隐祕姓名正使奸人得計臣恐自今忠良立身易為傾䧟國家舉事便欲動揺惑君害時無大於此在古之法皆殺無赦雖然陛下聰明必不熒惑亦不可使聖朝長此風俗寳元二年上時為右正言諫院供職上仁宗乞禁戚里權要之家塗金錢彦逺臣伏見真宗皇帝詔書以塗金冗費上自宫掖下及庻民一皆禁止三十年間不敢有犯陛下奉以儉約遵守祖宗舊章雖申明塗金之敇嵗下而近日戚里諸親權要族黨並以塗金衣服首飾相尚日增盛麗以至三朝慶㑹被服入宫蔑視刑典習為慣事且此巧偽之物蕩昏心目無益寒饑風俗所以趨競者禁雖立而法不行故好之愈甚况真宗皇帝崇本冲素講求制度欲為萬世之戒豈可使之廢墜此乃國家守成大要屬在陛下今欲乞嚴行禁約塗金匠人依舊條處斬如情理稍輕刺面决配千里外牢城臣寮之家用使造作者並科違制皇親戚里即不支俸錢一年其失於紏察賞罰並依先朝之舊仍乞指揮内東門司使臣如有諸親命婦郡縣主等入内輒服金衣首飾者並畫時禁止不令入内一面具姓名申奏勘責如本非私情别因事彰露亦與同罪所貴先朝之制遵行天下皇祐元年上時為右司諫上仁宗乞禁止臣寮上封章告人之罪吕誨臣竊以著令臺諫官許風聞言事盖欲廣其採納輔益聰明邇來中外臣寮宻上封章告人之罪既非職分實亦侵官而又事多不根言無指實理非干已情縁報怨甚至詆訐平素之實暴揚曖昧之事朝廷既難明辨善人無以伸寃刻薄之徒寖成風矣况禮貴徙善法許自新日月既已經乆赦降自當洗滌事儻渉於厚誣理固宜於反坐臣伏乞今後非在言職輒以章奏指計他人日前過犯及事非干已者即以所上文字付有司鞫勘在外則置院推勘所貴止絶狂妄紊煩旒扆仍乞詔示中外嚴行遵守嘉祐六年上時知諫院上神宗乞立制度禁侈靡吳大忠臣伏見朝廷比修常平之法將以抑兼并振乏絶可使民富而無離散失所之憂然行之累年雖䝉貸助之惠猶粒米狼戾而無嵗月之儲一有凶災散亡道路臣嘗究其然矣時平日乆文法闊踈小民不知謹身節用之道以惰為樂以侈相驕膳飲必精有一人而兼數人之食服御必華有一日而用數日之費况飲酒般樂游蕩無度畧無法禁安得不貧臣聞古者大夫無故不殺犬豕七十者始食雞豚狗彘之肉今則庻人日以宰羊豕為食不縁賔祭不為飬老安得芻豢而共之古者庻人五十可以衣帛黼黻繡繪以章有徳今則朱紫之飾不間府史美錦文綺逮於臧獲安得女工而供之至於宫室輿馬器皿之奉率皆稱是而又釋老之徒齋薦塔廟神祠巫祀鼓舞祈賽所費益以不貲故田野之民不安其業滅裂鹵莾從事於農所獲既以不足則不免貸於私家私貸不足又以貸於公府常平之息誠薄民貸於公者誠願然一入其手侈費者十有六七若博奕飲酒又不止此此殆法禁有所未具也臣愚伏願陛下深詔有司申明法令畧立制度禁侈費以為用財之法民間無職者皆書於籍任之以九職之事不能任則轉移執事又不能則給以常餼以共公上之役如是則游手有歸財不妄費富足之道足以馴致助成良法其防禁條目已具别奏伏望詔下有司詳擇立法推行天下元豐元年時為河北路轉運使宋名臣奏議巻九十八
