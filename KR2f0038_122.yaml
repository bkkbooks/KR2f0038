body:
  text: 宋名臣奏議卷一百二十二宋趙汝愚編兵門禁衛上仁宗論京師衛兵單寡張方平臣伏以京師本古之陳留郡天下四衝八逹之地自唐室以前嘗為重藩五代朱溫始封梁王後因其宫府定而為都五姓相承共十一帝四十九年亂亡之速自古無有抑由都城四向無險阻之形藩籬之固逼近戎敵方鎮握彊兵於外乘禁衛之虛弱本末倒置也國朝太祖皇帝深慮安危之計始削諸節度之權屯兵於內連營畿甸又修治西京宫室蓋有建都之意然利於汴渠漕挽之便因循重遷先帝通好北戎即叙西戎爾時可以減戍消兵致生民於富厚矣太平三十年使軍士坐費倉庫以困天下非不深思逺謀也知祖宗本意依重兵而為國勢不可去也近昊賊犯邊漸發禁兵西屯四路在京軍旅所留無幾今又北寇事釁已萌兩敵合從人心搖動外有武帥分總兵而宿衛之師日益單寡尾大不掉根虛必搖勢之當然不可忽也願留聖慮為社稷計京都宜常宿重兵以封殖根本且乞勘㑹見在指揮人數若果闕少請從內出金帛召募材力訓齊教練必須精鋭以充禁衛無更外屯夫猛虎所以百獸伏者以其爪牙利也若虎而去其爪牙則犬豕鹿麋皆可以相狎兵衛者國之爪牙也足兵足食乃可以威服四方彈壓姦亂矣慶歷元年上時知諫院上仁宗論衛士之變乞黜責皇城司及當直臣寮何郯等臣等伏聞今月十八日夜崇政殿前宿直皇城司親事官四人毆打人貟至死并劫取庫兵緣上殿屋驚動御寢其罪人除捉獲及傷死外餘黨二人二十日捕獲之時稱被衆人爭奪致死捉獲一名雖覩勘斷訖所有當職臣寮或聞已傳宣釋放傳之中外頗駭羣聼伏緣殿廷所置宿衛本為人主預備非常今衛士自生變故所為凶悖意不可測兼後來所獲餘黨走入最為要害仍聞纍傳聖㫖令未得殺死而全不依禀蓋是本管臣寮懼見捕獲之後勘鞫得情理深切所以容縱手下衆人毆死以圗滅口欲輕失職之罪情狀如此理無可恕太祖皇帝朝酒坊火發本處兵士因便作過太祖皇帝以本坊使副田處巖等不能部轄並處極法今乘輿咫尺賊亂竊發凶惡之狀無大於此而居職者既不能察舉當宿者又不即擒捕未正典刑何塞公議深恐朝廷威令從此寬弛伏乞斷自聖意特降指揮將應係幹當皇城司及當夜宿直臣寮並等第重行黜降用振威罰所貴禁近之司不敢曠慢慶歷八年閏正月上時為侍御史知雜事上仁宗論衛士之變乞責降楊懷敏何郯等臣等兩次上殿面奏及具劄子奏狀論列乞重行黜降幹當皇城司并前月十八日夜內宿臣寮已施行外唯楊懷敏獨䝉寬宥尋奉中書召臣等傳諭聖㫖兼不以臣等所言煩瀆曲加詔諭足以見聖眀開納之量寬臣下進越之罪固宜退伏以聽命安可更頻干聰明自取罪戾然臣等以國體人情酌之不可便已須當復陳夫人主所以享有天下之重蓋由法令等級明辨使人不敢陵犯然後極其尊爾故法令行則朝廷以之強法令偏則紀綱以之紊自昔治亂雖殊莫不由此階也至於宫闈之變下人輒敢謀亂者前代間㦯有之皆由人君失德所致且陛下仁厚之德撫恤禁旅未嘗以喜怒妄行刑誅雖甚無識寧不愛戴今衛士持刃直入禁庭欲陵犯乘輿是匹夫而有窺伺之意皆由有司不舉職法令寬縱所生也為大臣之計宜為陛下深責有司失舉之罪用行法令如楊景宗等並當誅戮以謝天下若以其過非自取止可貸其正坐并宜流竄以戒不職今楊景宗等既以輕罰楊懷敏獨又聊行降黜蓋兩府大臣以陛下左右之人不能堅執祖宗之法以避怨怒若當賊發之際懷敏能指揮衆人於後殿即時捕獲以此論功乃可贖罪今賊已入禁庭兩夕之間陛下被此震懼固亦甚矣懷敏縱有先報之效其可贖失察之罪乎且以人主之尊寬一懷敏之罪固亦細事茍於事體無傷臣等何必苦更論列所惜者朝廷典法無逺近無親疏當一而行之乃允衆望況有司失察之罪無大於此其可貸乎太祖皇帝朝元舅杜審肇知澶州只坐界內河決免官歸私第太宗皇帝朝楚王宫火災廢楚王元佐為庶人以懷敏職在近侍孰與元舅諸王之親以懷敏失察賊亂孰與誤河决火焚之僃利害大小較然可知而審肇元佐重責如彼懷敏之寬假如此伏望陛下舉祖宗之法以塞公議正左右之罰以示無私不惜一懷敏慰中外臣子之望則天下幸甚臣等論列此事今已數四在於言責固亦無負然喋喋未已者蓋忠義之心不勝感憤兹事體大若遂不言恐於聖德無益由臣等之罪也兼臣今日上殿再有奏陳已䝉聖㫖開允伏乞速賜施行慶歷八年閏正月上上仁宗論衛士之變乞責降楊懷敏吳奎臣竊見自行春令以來連隂不解此洪範傳所謂皇之不極時則下人有伐上者今衛士之變起於肘腋賴宗廟神靈陛下仁聖即時擒獲然流聞四方驚駭羣聼不祥之甚也傳稱主憂臣辱陛下此日可謂憂矣未知任其辱者果何人邪臣聞幹當皇城司六人其五已被謫獨懷敏尚留外人咸謂陛下私近幸而屈公法臣竊為陛下痛惜之况中外傳聞獲賊之際陛下宣令勿殺而左右輒殺之裂其支體此必有同謀者恐事露泄而殺之以滅口不然何以不奉詔也慶歷八年二月上時為監京東排岸司上仁宗論禁中內臣坐甲何郯臣伏聞禁中自盜發以來逐月分布內臣坐甲宿直以至伐木拆屋繕修垣墻增置關鍵其於僃豫之方固亦甚至然臣以事體酌之恐為陛下計者誤也夫體有尊卑事有小大尊者繫於君卑者繫於臣君而尸小事則失所稱臣而專大名則非所宜以人君之舉所務必博大所謀必經逺崇位號以習民之奉修政刑以防民之踰不廢禮以杜僭逼之萌必行法以除暴亂之本使邇莫敢犯逺莫敢陵如此則等威辨而上下無邪心然後知天子之所以尊也今夫衛士生變事出非意皆由朝廷恩過而不知感官司令寬而不能禁也為今之宜其在一震威怒以示誅罰正大法以絶其慢舉大刑以討其姦斥邪僞附下之類先絶其萌芽究賊亂犯上之徒務去其根本不恕無良而與衆棄不漏有罪而示之公法令既行綱紀既正以此御下孰敢不䖍雖不增宫闈之警而其僃修不加省户之衛而其守固與夫區區從細末之事者不同年而語矣臣况聞陛下從頃年來過自警戒中宫之樂工已盡罷後苑之獵具已盡除其於謹天戒以飭聖躬雖詩書所稱遇災修德之君逺不能逮然於禁防之設所舉者近而所忽者逺所謹者小而所遺者大臣竊惑焉伏乞聖慈以臣愚言命公卿大夫當廷公議一舉法令威刑之柄以除邪僞賊亂之階庶主威益尊國命益振內患既弭外虞自除則天下幸甚慶歷八年二月上時為侍御史知雜事上仁宗論步直兵士作過錢彥逺臣風聞嘉慶院見制勘軍頭司步直兵士等擬欲作過及於皇城內搜獲先埋藏器仗者竊以軍頭司在崇政殿橫門之南與軍器庫相連最為近密其兵士日逐隨本司臣寮出入甚熟而敢興意外幸賴宗廟威靈先事敗露今已下獄推劾臣慮其人等凶黨結連人數衆多或自來通行飲食之人心內自疑别生他變所繫極大伏望聖慈特降指揮令制勘院先且疾速根究枝黨如有姓名畫時追捕入院并器仗所埋藏經歷地分人貟節級數目立具奏聞使中外聞之所貴禁衛安貼凶黨盡去貼黃臣近曽以連隂奏密狀伏乞嚴賜指揮宿衛謹選左右􅉏御小人以深遏惡原今來兵卒等果有結連欲乞更賜指揮宿衛禁門倍加嚴整皇祐元年八月衛士王安與其黨相惡置刀衣篋中從幹當引見同楊景宗入禁門既為閽者所得景宗輒隱不以聞尋置制勘院推勘彥逺上此奏時知誎院上仁宗論步直兵士作過係第三狀錢彥逺等臣等風聞制勘院見勘軍頭司步直兵士擬欲作過事雖一時狂妄之謀然迹其造惡本心為人臣者所共切齒況兵刃之屬已藏在皇城門幸賴祖宗威靈上天豫垂變戒故先事敗露儻因循未彰驚屬車之清塵臣謂雖赤其族不可塞責今既下獄推劾緣所繫至大頗搖人心傳聞四方震駭物聽姦豪小人從而扇惑故根究枝黨必須盡具案行罰不可緩不盡則他變生少緩則妄意起且昨來殿中親事官作過之時法稍寬捨推索凶黨不盡故此輩忲習乃復有此結連益大於前今若復用輕典臣慮後來之虞寒心疾首伏望聖慈以祖宗社稷自重不用一時恩貸特降指揮令制勘院疾速推究元謀頭首及枝黨等急行圎結公案申奏其應作過人並乞族誅於都市以示四方庶小人少戒建威消萌在此舉矣兹事尤不可緩望特留聖意貼黃其兵刃經歷門戶埋藏地分親事官長行人貟及監門內臣乞早令制勘院先具當日人數姓名申奏乞更不令宿衛免别生他事其人據唐漢之法皆合誅戮今來乞並行决配逺惡州軍庶中外整肅願以昨來親事官法寬為戒皇祐元年八月上上仁宗論步直兵士作過係第四狀錢彥逺臣伏以王者任宗廟社稷之尊身繫天下安危故必嚴宿衛盛宫室重門復道以謹他虞是以法至重禁至密蓋將遏絶亂源防微杜漸深計逺慮而為祖宗社稷之本也故唐太尉長孫無忌誤帶刀至上閣而監門校尉不覺察有司處以死刑我太祖皇帝嘗以內酒坊在厚載門外逼近宫掖而中夜遺火凡自監官至工匠斬五十餘人訖太祖一朝內中無遺火者此法行刑重而人畏古今之成效今風聞制勘院所勘得懷器刃入皇城人主名應門戶地分干繫親事官人貟節級將欲斷遣次竊緣所懷器刃已入皇城雖其人結連虛實未辨而門衛地分晏然不知則國家以重糧溫衣養之何用本以禦捍意外而耳目之前上下公然畏避權勢輕弛法禁不行譏察況昨來內中親事官作過之時由斷遣稍輕是致小人慣習復有此事不輕上繫宗廟社稷豈得復惜此數十兵卒而不思後患伏望聖慈察安危本末應制勘院所勘到不覺察懷刃入皇城把門及地分親事官人貟兵級等乞不以常法斷遣其本處正管門戶地分兵級並乞刺配沙門島其餘干繫人貟兵級並乞刺配廣南逺惡州軍所貴臣子益勵忠孝之心使小人自此戒懼皇祐元年八月上楊景宗責授左監門衛大將軍均州安置上仁宗論步直兵士作過係第七狀錢彥逺等臣等今月二日准宰執請赴中書奉傳聖意以皇城軍頭司臣寮行遣並依法者伏以法者緣人情而生較其大旨止欲防微杜漸禁民為非尊君卑臣歸於至正然有情重法輕情輕法重者故酌重輕而處刑柄在人君專之非所司可得而議是以兩漢有決事比若今之用例本朝斷罪有敕旨所以壓天下公議戒小人妄意而今來宿衛下卒挾刃直入禁門雖其謀别有所在緣去便殿內閣才百十步藏之纍日上下一無覺察此為人臣者所當共怒安可本司官屬過止罰金而云法當然爾甚失天下之望且昨來親事官作過之時由用法太寬牽於權幸人情不塞羣小人無所戒懼遂致小人復思遂其狂計交㦸之衛行若坦途事既暴露方貸以寬典誠陛下至仁至聖欲全羣臣奈宗廟社稷之重天下臣子之心何謹按尚書云威克厥愛允濟愛克厥威允罔功說者謂威刑能克勝所愛近則人懼而事可濟辦若威刑而愛近所惑則人怠而事無成功此聖人眀訓治國家大要是豈樂用嚴酷哉蓋所慮者逺今若以近臣而輕其罰恐非威克之道臣慮今之議論謂此事與親事官作過時不同言彼則挾刃踰屋此唯埋藏意在誣告他人不當為例甚不然也且王者設門禁列宿衛重其刑嚴其制者先慮其事也必若俟挾刃踰屋而後罰無所濟也且刃已入門則蕭墻之內其憂不細安得忽略後患而徇一時之談臣等忠義憤發外採公議咸以為未當故不避再三上瀆天聼人臣之節死而後已伏望陛下覽尚書威克之義思祖宗社稷之重以親事官作過時罰輕為戒其皇城軍頭司臣寮並依臣等前後纍狀重行黜責所貴厭快人情允協公議貼黃宿衛之制唯門禁最重蓋以出入所自今刃巳入而云未曾作過故用輕典且門禁之失唯論入與未入豈繫作過與不作過者乎且國朝自祖宗以來凡用法皆有司鋪條臨時勑旨裁輕重而斷遣故有特勒停者衝替者未得與差遣者就移監當者此皆法外行罰豈可有如此事而本司臣寮並止依輕法也皇祐元年八月上州郡兵上真宗乞江湖諸郡置本城守捉兵士王禹稱臣伏以體國經野王者保邦之制也易曰王公設險以守其國又曰重門擊柝以待暴客傳曰僃豫不虞古之善教也自唐廣眀之季天下亂離各據城壘繕治兵甲豆分瓜割七十餘年太祖潛躍之初則復關南平淮甸受禪之歲再駕伐叛取庸蜀下荆湘克番禺討金陵是十分天下而有其七矣太宗纘嗣洪業克輯大勳平定并汾懷來閩越天下一家無不臣妾當時議者乃令江淮諸郡毁城隍收兵甲徹武僃者三十餘年書生領州大郡給二人小郡給五人以充常從號曰長吏實同旅人名為郡城蕩若平地雖則尊京師而抑郡縣強幹弱枝之術亦非得中道也臣比在滁州值發兵挽漕關城無人守禦止以白直代主關閉城池既圯器仗不全及徙維揚稱為重鎮乃與滁州無異嘗出鎧甲二十副與巡警使臣蹶弩張弓十損四五蓋不敢擅有修治又地濕曝涼為難上下因循遂至於此今黃州城雉器甲復不及滁揚萬一水旱為災盜賊竊發雖欲禦僃何以枝梧臣按司馬遷天官書云天運三十歲一小變一百年一中變五百年一大變此常數也古聖知其如此設僃以待之雖變不亂國家以建隆甲子歲下西川甲午歲復亂三十年之應也當時西川止益梓睂遂有城可守惟郭載棄而先走為賊所據餘皆固守無城之處悉為賊據此有僃之明效也陛下纘服二聖恢隆長世必有非常之制改轍更張因時立法固無拘執太祖削諸侯跋扈之權不得不爾太宗平僞國夷妖巢本以杜覬望之術法久則弊生救弊之道在乎從宜漢髙懲暴秦郡縣之失封建其子弟及七國勢强文景乃行削奪唐德宗乘安史厭兵遂有貞元姑息之政憲宗覩齊蔡巨猾遂有元和討賊之議蓋見幾而作為社稷逺圖疾若轉規不可膠柱今江淮州郡大患者三城池墮圮一也兵仗不全二也兵不服習三也今濮賊之興慢防可見望陛下特行神斷參之妙算如且因而修治不欲張皇凡江浙荆湖淮南福建等郡約民户衆寡城池大小並許置本城守捉軍士不過三五百人勿令差出止於城中閲習弓劍漸葺城壘繕治甲胄郡國張禦武之僃長吏免剽略之虞咸平三年十二月上時知黃州先是濮州有盜賊入城略知州王守信監軍王昭度禹稱聞之以為國家武僃不修故盜賊竊發近輔因有此奏上仁宗乞東南諸郡募兵以防冦盜冨弼臣聞天下大器也非法制網羅不可以守矣生民重畜也非智力控御不可以保矣是故先王兢兢業業日謹一日唯恐失大器而喪重畜也臣伏見西戎僭叛屢冦邊境本道不足以支朝廷悉發京東京西淮南江南荆南湖南兩浙福建廣南東西凡十一道兵以屯關中十一道兵素寡弱又罹此調發故關中得之未足以充而十一道之兵已盡矣朝廷獨念京東鄰河朔京西次關陜此二道不可以無僃遂遣使閲鄉民俾習武以代軍兵東南九道則不之省臣未諭也伏思朝廷用度如軍食幣帛茶鹽泉貨金銅鉛銀以至羽毛膠漆盡出此九道朝廷所以能安然理天下而不匱者得此九道供億使之然爾此九道者朝廷所仰給也固宜保守之今盡取其兵是不加保守一日乘虛盜起梗其津要則京師無故而坐困矣凡姦賊好窺覬者無世不有今西鄙用兵天下兵與將皆集於西方力必不能及他道則就無僃而作焉以臣觀此九道州軍或一豪傑率數十夫伺州官朔望行香畢集持鋤䥳白挺羣呼奮擊可盡殺之誰復禦者然後開府庫復劫取豪家物散施召募必應者如雲一日可得千計鼓行而前處處無兵又城壘不修諸郡縣鎮所至必陷俟奏至朝廷即時發兵亦不減三兩月方至則其徒必及萬數何可破邪臣又慮陛下以謂巨冦必不能猝至臣不敢逺稽前古略引隋唐以來東南為冦者以明之隋大業年中劉元進起餘杭朱燮管崇起吳各擁數十萬冦江浙諸州朱粲起譙郡擁兵數十萬冦宏起鄱陽蕭銑起羅縣各衆數萬攻陷諸郡唐咸通年中桂林戍卒五百人殺其將以判官龎勛為都頭剽掠湘潭後陷徐宿等州又乾符年中海賊王郢江賊柳彥章各聚徒數萬餘光化年中魯景仁起連州黃岫起桂陽沈行收起邵陽各擁兵萬餘攻本郡邑殺戮守長其甚盛者則江西鍾傅廣南劉隱湖南馬商福建王潮皆割據焉臣謂東南九道負山阻水為冦者足以倔強故自古為冦淵藪唯王者能鎮撫之則冦不能生於其間不然則亂之必矣今九道大小一百三十餘郡若每郡皆宿兵固不可得也臣欲乞於九道中擇要害約十餘郡如泗揚升吉潭荆桂廣福杭越之類按地里相去均者於本處募兵大郡五千小郡三二千以多補少不過四五萬人以東南百三十郡之富豈不能贍養哉訓為精兵勿復差役每郡置二督護專領之每道别置一都護經略之九道又置一總管者居中以節制之如此則欲為冦者知朝廷有僃豈不顧憚耶設有盜起則發兵有所濟師有地乘其未甚熾而撲滅之不為難矣臣前所謂天下生民宜網羅而控制之者以此道也臣伏念京東京西雖置鄉兵而軍兵絶寡亦未見久安之理夫鄉兵無營壘散處村堡又各持兵仗其部伍上下終不得如軍兵之肅也或因饑饉為姦桀倡之安能使必不為盜又宜得軍兵兩相制禦況山東自古尤多冦盜隋大業年中韓進甄寶起濟北張金稱起清河竇建德格謙孫宣雅起渤海孟襄杜伏威起齊逐郡各擁衆十餘萬人劫掠諸郡唐乾符中王仙芝起濮州聚衆亦十餘萬轉攻河南十五郡以至黃巢起宛朐擁衆百萬陷覆兩京橫行天下雖然觀其初起草莾蓋亦甚微當時制禦失策遂至滋蔓今亦乞擇要害數郡募兵立帥如東南之制則可無虞矣議者或謂財用不足恐難成此夫以天下安全之業尚患財窘而不能立久長之䇿不幸小有冦聚則如之何伏惟陛下以宗社為憂以生民為念裁制私欲損節橫費則數萬之衆不日可募此無疆之基也康定元年十月上時知制誥上仁宗論不當明言體量州縣酷虐軍人歐陽修臣等風聞朝廷近降指揮與諸路轉運使令體量州縣官吏酷虐軍民者臣料朝旨如此必是因韓綱酷虐近致光化兵士作過故有此指揮竊以昨來光化兵變雖因韓綱自致其如兵亦素驕處置之間須合中道韓綱自當行法驕兵亦合討除如此兩行方始得體今若明行號令遍約官吏則驕兵增氣轉更生心長吏畏避無由行事其所降與轉運司文字切慮朝夕之間傳播中外扇動羣小引惹事端然已失之令既不可追伏乞速降指揮與諸路轉運使令密切禀行不得漏泄所貴别不生事慶歷三年上時知誎院上仁宗論州郡武僃張方平臣前在諫院纍曾論郡縣武僃所陳意見朝廷未加精察比來軍興多事賦役煩數顧亦天幸而屢有年姦游之民猶聚為盜至擁旗鼓入城邑殺官吏堂堂無所憚不幸而荐飢民稍艱食勢必羣聚蜂起為盜或數輩匿村閭至聚吏兵千計縣鄉為之殘敝而不能時擒即氣熖稍盛兵連禍結豈在戎敵也漢唐之時未嘗無四夷之患至或長驅而犯宫闕然無害於根本之固及黃巾巢賊竟以大壞天下國家創艾五代之亂藩鎮不得擅兵常番禁旅外屯州郡乃自近歲悉還戍邊其州郡兵之壯者亦率㸃選配諸禁衛所餘乃罷弱羸卒供雜役使官吏𨗳從而已豈知執兵之事今愚細之民知窺此隙故昨王倫等賊起沂州並淮渡江歷數千里若蹈無人之地乃始下京師之甲而趨躡之使民間而有姦桀豈不生易朝廷之心歟伏以先朝置諸道提舉兵甲司所以專督盜賊抑有經逺之旨粗存方面之制比來忽略頗為虛名今能稍付事權自可外張形勢計諸藩郡有兼提舉兵甲處其為要地自用重臣鎮守自餘地望稍輕亦領此名者不過七八誠選用有風望方略之士以任長吏各於本路除鈐轄或都監一貟量其路分輕重提封近逺約置兵之數令於本郡及所部州軍見兵中選取壯強集成指揮因昨所置武衛為名而廩給之若見兵籍取不足則令招募及數明降朝旨更不揀選調發赴邊亦不得輒差逺出內有逃亡隨即收捕所有器甲必令精良每道選差班行使臣一兩人或令長薦舉比監押巡檢資序專管教閲若所部郡縣有冦盜結集之處即量事勢發卒赴應使之統領追捕其所部州軍都監監押巡檢縣尉諸督盜官吏令得察亷其能否勇怯以聞而升黜之若所部郡縣強惡姦蠧之民得以檢察追逮按情科罪移配逺方若賊羣黨稍衆鈐轄都監親督吏卒㑹合掩殺自餘賞罰科條更自朝廷比議指揮如此則不惟壯郡縣武僃抑稍復方鎮事體庶以式遏冦虐消除暴害慶歷五年上時為翰林學士上仁宗乞撥併諸路軍額放停老弱錢彥逺臣伏以今天下兵卒最為冗多較於祖宗三朝數增十倍然皆老弱羸怯混淆其間堪戰精鋭百才三四而國家竭民力以贍之日困一日何以取濟其已在軍籍者誠未可立行措置求折衷之策則莫若窒其源本欲乞天下除禁軍巳有指揮住招填外餘諸路本城不係披帶諸軍且未得招填其有名額空存而人數不滿一百者并撥併入本州諸軍及遇㨂選半糧剩員之時并委自逐州當職官吏審驗六十五以上如堪執役即且存留七十以上一例放停不得竊主恩而為已惠收小人之妄譽所有在京除見幹當職事文武官吏合依勑破兵士當直外並不得妄作名目占留陳乞在他幹當見有者仰逐處一面抽下其本城諸軍候及三年逐州具計減得多少人數今來約合留多少人數申奏委大臣議定經久措置所貴軍政益修國財稍給禁軍若久不招填又恐不可乞以即今見在為額轉旋㨂去老弱者招少壯者填之慶歷八年八月上時為右司諫上仁宗論增置土兵孫抃臣伏見兵家征行守禦之法其所用士旅以知人情者為先熟地里者次之諳土風者又次之何則知人情則強弱先辨熟地里則險易先知諳土風則寒暖先僃故臨事也便而取效也速是以所安者平原易地置之險阻則懼矣所習者大陵髙阜移之溪㵎則危矣古聖賢確論皆然國朝有天下所置州郡必招置本土人充軍或三兩指揮名額各異比年以來逐處凡有緩急此等人號為得力非他知人情熟地里諳土風故也然而軍數寡少月給微薄防托之際事功難集臣欲乞應沿邊州郡密邇蕃夷部落溪㵎去處元有本土軍分者望朝廷相度稍益其數目量增其請受以時而練習之一則團結部伍漸成次第鄰近蕃夷冦賊不敢作過二則衣糧差足可以收其盡瘁之報皇祐五年上時為御史中丞宋名臣奏議卷一百二十二
