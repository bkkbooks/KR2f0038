body:
  text: 宋名臣奏議卷三十七宋趙汝愚編天道門災異一上太宗應詔論火災田錫雍熙元年六月詔曰朕以不敏不明託於兆人之上夙夜祇惕罔敢怠荒賴九廟儲祥上天垂佑萬務粗治於今九年而數日前迅雷之中烈火遂作既延災於正殿蓋示譴於眇躬抑畏震驚不遑寧處上天警戒必有由然豈非刑賞之有愆處置之未當或近習有屏蔽致物情之壅塞賦調未得均一賢良多所淪滯有一於此是斁政經豫心惕然思聞其失內外羣臣等所宜各竭忠懇共申讜議必期無隱朕將覽焉臣伏念臣才謀不逮於古人職次忝居於諫省敢不常思補報用答休明六年九月十三日詣閣上書昧死言事陛下於是下御札俾人直諫降敕書奬臣敢言七年十二月十四日又再上奏疏雖入而不知達與未逹直言雖求用而不知行與未行今日陛下有所因方渴聞至言有所為方切待直諫引咎自戒修德彌新臣謂責在近臣而不在聖躬罪在臣輩而不在陛下日近陛下有朝令夕改之事由制敇所行時有未當而無人封駮者給事中之過也給事中若任得其人制敇若許之封駮則所下之敇無不當所行之事無不精事無不精則垂為典彛敇無不當則編為格式豈有朝令夕改之弊豈有不精不當之虞也臣所以謂責在近臣而不在聖躬也臣又見陛下有捨近謀逺之事由言動所為未合至理而無人敢諫諍者是左右拾遺補闕之過也今遺補是侍從之臣而不得在左右職分當獻替之事而未有上封章自此國家舉事有不便於時遺補不敢諫朝廷法令有不合於道遺補不敢言加以時久升平天下混一致陛下謂升平自得資陛下以功業自多日遷月移浸成聖性左取右奉無非睿謀所以陛下出一言乃以謂湯武可偕陛下行一事乃以謂堯舜可繼自纘大位於今九年四方未寧萬國雖靜然刑罰未甚措水旱未甚調陛下謂之太平誰敢不謂之太平陛下謂之至理誰敢不謂之至理方欲為民求福報天之功有事於太山展禮於上帝人謀雖克天意未從火於禁中將覺悟於英主詔下海內遂布告於輿人近臣聞陛下感悟之言寧不惕厲諫官閲陛下憂勤之詔誰不倣徨臣所以謂過在近臣不在聖躬罪在諫官不在陛下臣死罪死罪然臣兩度上疏而陛下不用一二今臣在外而陛下委之以分憂碌碌隨衆憂曠瘝之靡暇皇皇有志思諫諍之未能今幸天啓聖心神贊皇運感陛下虛佇待犯顔之諫致陛下專精求逆耳之言臣是以再罄愚衷復伸鄙見臣所謂陛下有朝令夕改者試舉其一二以明之置而尋廢者農師禁而不嚴者車服也臣所謂陛下有捨近謀遠者試舉其一二以明之宰相不得用人而委員差遣近臣専受責而求令録封章也自此章奏必多聽用必廣聽用既廣則條制必繁條制既繁則依從者少既依從者少則是法令不行法令不行則由規畫不當有如前年敕下令鄰近州府互差司理判官至今年敕下却令本州仍舊差置又如前年敕下應征科官吏限前得了即與超升限外未了即當降黜即不以縣有大小之分稅有難易之征土田沃瘠之不同歲時豐稔之不等風俗勤惰之各異官吏能否之各殊而一槩以程限所拘一例以升降為定自後未聞限外欠者降一官限前了者升一人此無乃垂之空言示之寡信乞今後凡有所奏或有所陳幸陛下察而審之令大臣議而行之蓋臣下言之則謂封章陛下行之則出為法令法令可簡而不可使繁制度可永而不可屢變變易不定是彰思慮之不精繁多難依是令手足之無措也尚書曰臨下以簡又曰能自得師者王今宰臣若賢願陛下信而用之宰臣非賢願陛下擇可用而任之何以置之為具臣而疑之若衆人也百官若舉其職願陛下聽而用之百官未稱其職願陛下量其才而用之何以置之為備員而待之若冗秩也臣謂百職若舉則萬事從而自理百官未修則萬務從而亦隳必若任而疑之則上下非一心疑而用之則君臣非一體何則疑能生謗謗能生疑疑從謗生則父子之道或偶虧於慈孝謗因疑起則君臣之際或變成於怨尤魏文侯焚謗書陛下固當知之令狐楚有辨謗論陛下時宜覽之若然則保得臣下始終全得君上恩信方謂君為元首臣作股肱也雍熙六年八月上時以右補闕知睦州太平興國六年九月七年十二月兩疏見總議門上太宗論彗星趙普臣昨覩御批劄子云所為彗星謫見引證古今莫知所措自旦及暮實不遑寧每以恤寡矜孤卿等應知朕意又云千思萬慮莫測其由者臣等伏捧真蹤同承聖旨兢惶戰懼各不勝任其間老臣最負深過三十年之重位但愧叨塵一千載之明君將何輔弼謬列三台之首慙無一日之長自知政術疏遺寧免祅星謫見撓至尊之懷抱皆臣下之作為都緣蒙蔽聰明隱藏苦疾被虐者無由披訴偷安者不敢指陳雖衆議以明知奈皇情而莫測隱蔽之咎惟臣最多甘俟嚴誅仰期待罪今則人心頗鬱上象仍差起狂夫思亂之謀生醜虜犯邊之計天時人事不比尋常惟有今年倍須保護伏審陛下初知妖異親諭德音便欲遍與覃恩優加賞賜發此一言之善須增萬福之祥全由惠物之心必有變災之望才經旬朔似有改移竊聞司天臺內妄陳邪佞之言深惑聖明之聽猥云妖異合滅契丹臣竊慮俱是諂諛未明真偽乞加詢問須見實情乞問司天臺內所有前件奏陳未委按何經典臣今將所按經典逐件進呈伏望陛下親賜看詳便知可否臣聞五星二十八宿至於五嶽四瀆皆居中國不在四夷而又尚書萬方有罪罪在朕躬豈可謂契丹封疆不屬萬方之數臣今老邁豈會陰陽惟將正理參詳復以前書證驗三墳五典必可依憑今録到故事五件謹具分析如後一按漢書天文志及諸書云歲星辰見東方行疾則不見遲則變為妖星石氏云為攙搶為天棓音捧又曰彗星者所謂掃星也其本類星其末類彗也小者數寸長者或竟天彗狀如帚亦為孛孛然或如紛絮形狀雖異其殃一也皆是逆亂凶悖非常惡氣之所生也見則為兵為喪除舊布新之狀不有大亂必有大兵天下合謀暗閉不明破軍流血死人如麻哭聲遍天下干戈並出四夷來侵餘災不盡為水旱飢疫凶惡之事不可具載又云凡關天象變異下方必有災殃如人臟腑生疾必先形於面色象不虛發惟聖德可以消除一按左傳云齊有彗星只出齊之分野諸國不見齊侯使禳之祭以禳除也晏子曰無益也祇取誣焉誣欺也天道不諂諂疑也不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國詩大雅翼翼恭也聿述也回違也言文王德不違天人故四方之國歸往焉君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡逸詩也追監夏商之亡皆以亂故若德回亂民將流亡祝史之為無能補也公説乃止其後齊國果有田氏篡奪之禍國有穢惡彗星不可禳也惟有聖德可以禳也一按晉書天文志魏文帝黃初六年五月壬戌熒惑入太微又按蜀志先主傳明帝問黃權曰天下三分鼎立何地為正對曰當驗天文即可知也往者熒惑守心而魏文帝殂吳蜀無事此其驗也時魏文帝居中國蜀先主居西川一按梁書武帝大通元年熒惑犯南斗武帝跣足下殿走以厭之是年後魏孝明帝殂武帝嘆曰索虜亦應天道時後魏孝明帝居中國梁武帝居江南一按唐書云髙宗總章元年四月有彗見於五車上避正殿減常膳令內外五品以上各上封事極言得失許敬宗上言星雖孛而光芒小此非國眚不足上勞聖慮請御正殿復常膳髙宗不從敬宗又曰星孛而東北王師問罪此髙麗將滅之證上曰我為萬國之主豈得推過於小蕃哉二十日而星滅其許敬宗者本諂佞人也乃是希髙宗旨贊成廢王皇后立武昭儀并殺長孫無忌者不由正道因此用為宰相身亡之後定諡為謬右具如前臣今撿尋故事聞達宸聰兾將師古之文聊證順情之説伏望陛下勤求理道獨出前王雖然彗星呈祅自有皇天輔德臣所願者除舊布新之事專乞陛下親行變災為福之祥乃為陛下已有如此則商髙宗之桑榖遂至中興周武王之資財須行大賚伏望陛下恭承天戒大慰物情明施曠蕩之恩更保延長之祚蓋緣凡關世事否泰相隨倚伏盈虛豈能常定聖朝開國已三十年國富兵強近古無比諸方僣偽並受驅除無一國不亡無一人敢敵可謂鞭撻宇宙震懾華夷若非聖德神功何以當兹盛事又聞物忌太盛前聖不欲恣情今則垂象頻差兆民未泰爭戰勞役寧有了期雖哲后修仁本意固無所虧闕而羣生造業隨緣有近于感招儻時運以相逢於聖賢而不免堯水湯旱乃是明時臣又竊聞陛下自覩星文深勞帝念轉積動天之德思覃及物之恩則知多難興王但傳聞於往昔殷憂啓聖方式見於當今可謂何福不生何災不滅臣今更有誠懇思達冕旒仍須面具敷陳不敢形於翰墨伏恨言詞蹇澀氣力衰羸步履猶艱未任拜跪自從發動多有風涎如或一息不來便憂一詞難措以兹情抱惟有感傷乞於間暇之時伏望略賜宣喚貴將微細皆具奏聞兼緣臣自知久負過愆因此合專陳首伏以臣謬將鄙陋虛受恩榮既不能致主安民又不能除姦殄冦叨據秉鈞之任忽招如彗之祅方抱恥於朝廷實難安於祿位伏見前代每逢天變必先册免三公今遇盛時乞行嚴憲明加黜責用激忠良端拱二年七月司天監言六月十八日彗見積水西光芒長五尺行拂右攝提星至今月十九日隱伏西方太宗命撤樂避正殿進素食分遣使者往諸道平決刑獄廣布恩宥以答天戒普八月上此奏時為太保兼侍中上太宗論旱災田錫臣今奉敕差在太一宫用青詞文設醮行祈雨者竊以時雨愆亢聖慮焦勞自秋涉冬諸寺及廟雖遍祠禱未彰感通以至陛下親降乘輿躬詣諸廟寺觀有以見仁主憂民之旨聖人恤物之心雖災沴流行何代蔑有而帑廩儲積可備不虞然自今歲以來天見星祅秋深雷震繼以旱暵之沴可虞饉飢之災此實陰陽失和調燮倒置上侵下之職而燭理未盡下知上之失而規過未能所以成兹咎徵彰乎降鑒或天文示變或沴氣生祅昨陛下以天垂謫告之文御樓行赦德音朝發祅星夕消天不言而感報昭彰神幽贊而應答遄速今以粟麥未種甘雨未降人心不寧農望已失或聞小小冦盜聚散靡常嗷嗷蒸黎憂畏實甚愆陽既盩於寒沍厥疾乃生於癘疵民或流亡穀必翔貴尚賴陛下聖德宗廟慶靈蠢爾獯戎騷邊稍息惠然諸國底貢交修不然人心一搖盜計斯得何以靜潢池弄兵之嘯聚何以禦胡馬南牧之奔衝惟是秋冬久無雪雨此乃天意尚欲垂戒聖心諒亦深思豈刑繫之間尚未平允法令之設尚爾煩苛或力役未悉矜蠲或奢靡未盡撙節言路雖啓蹇諤者未必一一聽從王道雖行孤苦者未必人人受賜或刑賞過於常理或喜怒失於厥中嘉言納忠見破於橫議任賢待下或難於至誠若然則雖旰食勞懷宵衣軫念孜孜萬務適足勞於聖躬翼翼小心尚未臻於至化今舉大略上犯宸嚴禮曰王言如絲其出如綸書曰慎乃出令令出惟行今朝廷所言或異於是謀始稍虧於審謹令出無愧於改更以是知急速機務寧無錯行臣之愚𠂻豈敢逭於誅戮臣之遭遇安忍負於聖明是以因事上言庶裨萬一伏望陛下因此時旱更降詔書引咎責躬以答天戒進德覃慶以安民心蠲減征徭簡約科禁搜察淹滯登進才良猛士守方無使黜賢召怨朝臣典郡正宜選亷任能或旌别勤勞或省閲浮泛振廩通貨以救餓殍加估收儲以備闕乏蕃戎蹂踐之處士庶陷殁之家哀亡恤存憫其餘苦掩骼置奠慰彼沉寃閭里再命於復除孤寡量優其給賜儉約奉已以合禮謹靜息民以安邊詳延忠鯁之臣詢究災祥之理弭災求理正在此時變沴致祥屬當今日若旱沴不已歲歉相仍盜聚葦蒲伺隙而動狄乘饉塞幸災為虞是則國家之慮實深朝廷之憂非淺也端拱二年十月上時知制誥上真宗應詔論彗星旱災朱台符咸平二年閏三月七日詔曰朕處九五之尊託億兆之上撫臨四海倐及兩期軫宵旰之憂勞奉祖宗之憲度誠不感於穹昊惠未及於黎元歲罔豐登氣尚湮鬱將厯炎蒸之候荐成愆亢之災緩獄恤刑雖是哀矜之旨側身思咎彌深惕懼之懷比者纍降詔書大開言路頗多叢脞不足頒行且念古先哲王來狂瞽之諫納芻蕘之言克濟大猷以臻至治咨爾簮紳之士洎乎嵓穴之倫必能辨朝政之是非察下民之疾苦無懷畏避當委敷陳體豫不諱之心副此惟行之命自今並宜直言極諫密疏以聞其靡尚於虛詞當直書其所見言善者必加甄賞理短者亦為優容勿習餘風復談鄙事誕告中外知朕意焉臣伏準詔令內外文武臣並直言極諫密疏以聞此乃陛下祇畏上穹憂勤庶政懼一物之失所俾下情之盡達廣視遠聽求治深切之旨也臣雖不佞奉明詔承德音有所藴蓄豈敢緘默而不言乎臣聞皇天無親王者無私上下合符有如影響若王政缺於下則天譴見於上自然之理也伏惟陛下受先帝之顧命膺兆民之樂推大孝彰聞小心畏謹動遵禮法不愆舊章所宜得天必獲嘉應而踐祚以來三年之內彗星一見時雨再愆者豈非凶醜未盡服政令未盡順天所以示兹警戒也夫災變之來必以類應故彗星見者兵之象也時雨愆者澤未流也何以知其然今北敵未賔西羌作梗荆蠻有猖狂之冦江浙多飢饉之民慮其來犯邊陲變為賊盜蜂屯蟻聚之衆須使討平鼠竊狗偷之羣亦勞逮捕此彗星之所以見也陛下即位肆赦臨朝聽政覃恩而宥罪施惠而及物然未蠲免殘租許行榷利山海之貨悉歸於上酒稅之饒不流於下元元之民未盡蒙渥澤此時雨之所以愆也陛下宜深惟二者之所以然設備以禦之修政以厭之不然則事有可慮者琴瑟不調者必更絃而改張之聖朝享國四十年括地一萬里經營非不久統御非不衆而治或未至政或有闕意者法術制度尚有可改而更張者乎臣雖不敏輒敢條奏其事陛下垂意而覽臣聞農者國之本也其利在粟多兵者國之命也其功在戰勝此二者存亡所繫也方今之患在農少而粟不多兵多而戰未勝農少則田或未墾兵多則用常不足故儲蓄空虛而聚斂煩急矣民財盡歸於國國用盡入於軍所以民困而國貧也夫周公之制用積九年此堯湯水旱而民所以無飢色也今郡國闕三月之糧貧民無終歲之食稼不一熟則有飢餓死者軍儲自贍不足何暇賑貸之乎且地方百里每畝取粟一斛歲計得粟五百四十萬斛今甸服之內凡方百里者百所曾不能供足軍食而區區運糧於江淮間終歲所得不過百里之出者由是而論有以見農政之不修也臣愚以謂陛下宜詔三事大臣輔相天地燮和陰陽使風雨弗迷水旱不作省徭役以寬其力勸遊惰以增其衆男悉心於畎畝女盡力於蠶桑種必刈穫養必紡績不出數年自然家有餘食而人有兼衣賈誼有言曰積貯者天下之大命也茍粟多而財有餘何為而不成以攻則克以守則固以戰則勝懷敵附逺何招而不至今驅民而歸之農皆著於本土使天下各食其力末技遊手之民轉而歸南畝則人樂其所矣此農政之修也國家養兵百萬士馬精強器甲堅利可謂無敵於天下矣然自距馬失律以還夏廷逆命之後軍聲不震廟勝無聞一紀於兹蒙恥未雪何者將帥弗用命而委任不專也卒既驕惰而不習知邊事也有以見軍政之不修也夫將帥者王之爪牙登壇授鉞鑿門推轂閫外之事將軍裁之所以克敵而制勝也近代動相牽制不許便宜兵以竒勝而節制於陳圖事惟變適而指蹤以宣命勇敢無所施智謀無所用是以動而奔北也孫武曰不知軍之可以進而謂之進不知軍之可以退而謂之退是謂糜軍此之謂也臣愚以謂疑則勿用用則勿疑謹擇其人專委其任有功者寵以爵位有罪者威以斧鉞明示刑賞斷在必行孰敢不用命哉古者井田之法兵則民也民則兵也出則戰入則耕人各自供官無所贍今農人不知戰戰士不知農離為二途絶不相用臣愚以為古制不可全取宜參驗當今便利酌中而漸制之况江浙舊有義軍秦隴見屯強壯執柯取則其事可行以天下土地之饒士民之衆各於郡縣量置義軍本户略與復除歲時少加賞賜動則就便召發靜則任從營養陛下於王畿千里之內蓄兵十萬以制之天下孰敢動搖哉州縣本城隨宜定額溢剩者不令招置老病者盡放歸休果行此道則天下之兵減大半矣緣邊人物氣稟崆洞便於弓馬勇於鬬戰蓋天性也措置之術如上所陳妙選有文武才略之士為吏以統之仍以厚利召募願為正軍者隨郡大小差厥數以備城守止於趙魏之間少屯王師以䇿其後亦足減戍卒之大半矣且耕且戰足食足兵削調斂之煩苛免飛挽之勞苦此軍政之修也臣愚以為不任人無以安邊不安邊無以省兵不省兵無以惜費不惜費無以寬民不寬民無以致治捨此數事雖有智者不能為陛下計之矣刺史縣令親民之官有民人焉有社稷焉蓋三代之諸侯也故漢宣帝曰與我共治者其惟良二千石乎光武亦曰郎官上應列宿出宰百里茍非其人民受其弊誠重之也頃者不除刺史止以知州代之其差委也上自僕射尚書下至京官奉職率多輕受未盡當任權不足以威吏民祿不足以惠貧乏政皆茍且事出因循意者國家以刺史之官為武夫之任有支賜公使之費奏薦僧尼之例重難其事而不以授人乎孔子曰名不正則言不順言不順則事不成今文武登朝官諸司使副不啻千餘貟代不乏才豈無循吏但未選任之耳臣愚以謂宜詔執事精練名實明揚俊賢各以檢校官出為刺史但不得支賜公使奏薦僧尼其縣令乃子男之任與民最親切者也邇來除授率多冗徒諸司吏人分據大邑職暗則莫能燭理祿微則鮮克持亷州縣之職大抵相類欲其盡誠於奉上極力於安民其可得乎臣愚以謂宜詔有位舉爾所知申命銓司惟才是擇諸司吏人不得處大縣不得為長吏凡牧宰者復俸户增其月入受空土為其職田俾其衣食足以恤家車服足以示衆專其任以勸效委其權以行事漸崇教導專務勸課每歲久用令文考課之法以户口增減墾田多少定其殿最而黜陟焉如是則人民受利矣簡易者事不黷節儉者財有餘今建置之過也官吏森羅於羣邑差命之煩也使者旁午於道路廩祿之費耗驛劵之供給何可勝數無名之賞賜不急之造作亦無限量土木窮其麗工巧極其淫他費百端動計千萬故兩稅之外悉取山海之貨酒榷之饒而用猶不足也加以教化未甚明租賦未甚均刑獄未甚簡藩籬之倚未甚固帷幄之謀未甚臧法有滋章之條吏無惻隱之實其餘背理傷道便文自營非為公家忠計者不可一二偏舉也陛下亟宜詔問大臣以當世之務如上所陳湯沐而櫛浴之瞑眩而針砭之使百度正彛倫敘生靈泰社稷安上下協和章程明密建皇極之道立太平之基陛下坐九重負斧扆南面而聽斷端拱而無為垂子孫之貽謀光祖宗之大業豈不休哉臣愚以為當今之急莫若修兵農之政擇牧宰之官節軍國之用弛管榷之利稽古以行道隨時而立法易權宜之制定久長之䇿陛下撫一統之運居萬方之尊號令必行禁止必舉兹數者易如反掌耳傳曰雖有鎡基不如待時雖有智慧不如乘勢今誠陛下立聖功之時興王道之勢矧陛下躬臨大寶已三年矣今之天下古之天下也今之人民古之人民也厯代陳迹簡册具存三王已前逺而難見魏晉而下陋不足數陛下自視當今事勢何如漢唐之盛時哉有土者不可以言貧有民者不可以言弱以陛下神聖聰明資之以天下之大而未能比隆於漢唐竊為陛下惜之伏惟陛下全王業之艱難握帝圖之宏逺誕布惟新之政博求無隱之言臣備位周行宣風外計管穴之見曷窺於髙明芻蕘之言願預於詢採臣又念御札云善者必加甄賞短者亦為優容臣不間忌諱輒進狂瞽理誠短矣幸陛下優容之咸平二年閏三月上時為京西轉運副使上真宗論黃州虎鬭雞鳴冬雷之異王禹稱臣際會昌辰忝冒通籍况在分憂之任豈忘報祿之心凡有見聞皆合論奏然而言關災異事涉機宜茍非不諱之朝即恐犯時之忌今者不避逆耳用明匪躬仰冀聖恩稍寬死罪臣本州去年十一月城南長圻村兩虎夜鬭一虎死食之殆半當時即欲密奏便值鑾駕北征既非吉祥懶聞行在臣但只隄防盜賊撫恤軍民而已又今年八月十三日十四日夜羣雞忽鳴至今時復夜鳴未止又十月十三日雷聲自西北起與盛夏無殊臣伏讀洪範五行傳及春秋災異史記天官書兩漢五行天文志等以此詳校虎者毛蟲屬金金失其性則有毛蟲之祅又云虎相食者其地當大飢雞者羽蟲屬火火失其性則有羽蟲之祅又云雞夜鳴主兵革昔人聞雞夜舞是矣雷者震也屬木木失其性則有冬雷之祅又云發雷之地飢饉此皆得於儒學不在禁書然事有數年而後應者亦有終不應者要在臣下無隱帝王盡知或修德以答天心或設備以防時難故詩曰敬天之怒無敢戲豫易曰觀乎天文以察時變只如咸平元年彗星出吕端等請臣作避位表臣具言星見虛危齊分請於青齊間設備以應天戒端等俱以為然不知自後作何措置臣緣不在司言之地不敢侵官去年胡虜犯邊果入齊地是天以文象告人人不自知備也端雖物故李沆已下皆見臣言今黃州有此災祥不能依前寢默雖祅不勝德終無纍於聖明而遇事敢言亦粗申於忠鯁今年禾小稔目下無虞然恐應在它時即合先有制置伏望陛下恕臣拙直察臣愚衷於淮甸之間防飢荒之事假令災祥不驗猶勝臨事無備矣臣又念古之循吏政感神靈宋均猛虎渡江臣則有虎相食啖魯恭雉馴桑下臣則有羣雞夜鳴百里嵩甘雨隨車臣則有冬雷暴作此皆臣化人無狀布政失和合置常刑亦當自劾又慮他人陳奏臣則有昧蔽之愆冒犯聖慈無任僣越咸平三年上時知黃州上仁宗論水旱蟲螟之異劉隨臣聞天地定位陰陽運行二氣至和萬物資始且上天不言不能自治遂生聖人以治之聖人至尊不能獨治遂求賢明以佐之茍聖人推誠以御下賢臣盡忠以事上刑罰當其罪爵賞合其宜賦役均平暴橫不作天地之間無一夫不獲無一物失所則至和之氣為豐年為祥瑞為安寧為壽考其或刑不當罪賞不當功勞役不時賦斂繁重君子在下而未見進用小人在上而未聞屏黜侵壞綱紀怨讟並興有一於兹足傷和氣氣或繆戾則為凶年為水旱為災沴為疾疫自古常然甚猶影響今則兩宫明聖信任大臣一日萬幾宵衣旰食刑必審謹恩無偏私誠宜歲必豐穰物無疵癘而乃去年大水包山襄陵墊溺居民傷害禾稼今年經夏時雨甚愆旱苗欲乾晚田未種兼聞磁州大水損壞城池仍知河北數州蟲蝗作孽繆戾若此必有其由竊慮執政大臣措置失所遷除之際或異至公聽受之間或容獻佞或崇不急之務或縱詭隨之情循默自安彌縫或爽又慮凡關百執官守因循事有依違或公行請託侵剝及於苛細喜怒由於愛憎刑獄之中不無寃枉賦役之內豈盡公平或慮諸路使車州郡守長縱侵漁之吏刻剝下民聽狡獪之胥翻覆事實或支移折變有所不均或配率科須不從出産以容姦為大體以受欺為吉人贓濫之徒善承迎而無失清亷之士踈取奉以致嫌則有互掩瑕疵指為和睦巧詞詭詐目為能官詢求若訪於吏人善惡遂乖於審實是以紀綱失序寃訴不伸如此之徒十常五六積其湮鬱有傷至和水旱蟲螟殆因此作臣賦性愚昧備位諫官參校古書比方時事上塵聽覽伏竊兢惶伏乞將臣此言宣示兩地究其事類何吝改更拾遺補闕臣之職業天聖五年上時為右司諫上仁宗論星變劉隨臣聞在天成象在地成形上自帝王降及輔相宰制萬物感應天文是以政教紊於下則躔次變於上自古聖帝明王兢兢業業不敢私縱者畏天命也若政有失而不改天垂戒而不懼者危亡之道也近者天象變異驚駭羣情避殿曲赦深叶古典臣雖不知星緯之術備觀史䇿之文謫見於天警誡人主伏自兩宫臨御於兹七年體貌大臣延納直亮觸鱗犯諱者未嘗加罪巧言令色者必察其非恭儉仁慈動遵典禮故得上下無壅華夷乂安闕政無聞咎將安在臣晝夜思慮疑者二焉切慮邪佞小人急圖富貴顧其資望未得升遷致有潛結姦雄密為表裏謀傾陷於端士期進用於明時不思撓敗國家且務致身榮達稍萌凶慝亦動星辰前史稱太白食昴白虹貫日者皆古人精思密謀之驗也惟望聖慈深加審察邪謀不入災異自消兼慮三聖在天百孫繁衍定王之外封册未行雜於庶寮之間班在駙馬之下北使每至無以威示逺方聖祖貽謀實欲本支茂盛因循歲久未舉典章百官固有嗟嘆三聖豈無動念伏望聖慈於皇族中選其賢明依唐朝故事封嗣王羣王三五人以應祖宗之意用固磐石之基其次選用大臣必從公議古者詢於卿士謀及庶民審重之至也至於才髙位下公議所歸或因例合遷久未升奬者亦乞申命兩府次第舉行昔者宋景善言祅星乃退商湯自責化為豐年而况太后聖明皇帝慈儉上天變異不足憂虞臣職在諫垣殊無器識敢陳狂瞽不避靈誅貼黃臣伏見唐堯至聖有四凶在朝大舜繼明方乃誅逐是知小人君子自古並生君子多則小人衰而天下治小人多則君子衰而天下危自古離亂則多太平甚少其故何也蓋佞言似忠謀身巧計是以小人多獲進用直言正色邪佞憎嫌是以君子多遇讒謗此乃邪正各異故相憎也失於防察禁制漸難故書曰為君難為臣不易也今兩宫明聖君子道行小人之心皆不遂志多方求進或受貨財保證姦邪上惑天聽伏乞聖慈特加防察天聖六年上時為右司諫上仁宗論玉清宫災蘇舜欽臣聞烈士不避鈇鉞而進諫明君不諱過失而納忠是以懷䇿者必吐上前蓄寃者無至腹誹則上下之情不鬱教令之出恱隨然言之之難不如容之之難容之之難不如行之之難有能言之則必容之容之則必行之如此則欲治之主三代之迹也願陛下留意焉臣伏覩今歲自春徂夏霖雨陰晦未嘗少止農田被災者幾於十九民情嗸嗸如昏墊焉臣謂近位之失人政令之多僻賞罰弗公之所速也天之降災欲悟陛下陛下反謂刑獄濫寃之致故肆赦天下以救之殊不念如此則殺人者不死傷人者不抵罪其為濫寃則又加甚古者決留獄斷滯訟以平水旱不聞用赦也故赦下之後陰霾及今前志曰積寃生陰積陰生陽陽生則火災見焉乖戾之氣發泄於玉清宫震雨雜下烈熖四起樓觀萬疊數刻而盡誠非慢於禦備乃上天之深戒也陛下當降服減膳避正寢責躬罪已下哀痛之詔罷非業之作拯失職之民在輔弼無裨國體者去之居左右竊弄威權者去之精心念政刑之失虛懷收芻蕘之言庶幾變災以答天意辰浹之間不聞有此告諭竊知陛下將計工役再謀興修都下之人聞者駭惑往往聚首橫議咸謂非宜皆曰章聖皇帝勤儉十餘年天下富庶帑府流衍無所貯藏乃作斯宫及其畢功而海內為之虛竭陛下即位未及十年數歲連遭水潦雖征賦咸入而百姓頗甚困乏若大興土木之功則費用不知紀極財賦耗於內征役勞於下內耗下勞何以濟矣况天災而已違之是欲競天無省已之意逆天不祥安巳難任欲祈厚貺其可得乎豈天譴告而陛下弗悟耶豈知而故為之耶豈再造以祈天之祐耶臣不得不反覆而量也今為陛下計者莫若來吉士去佞人姑務修德以勤至治使百姓足給而寬其征稅則可以謝天意而民情安矣賢君見變能修道以除凶亂君無象天不譴告今幸得天見之變是陛下修道之日豈宜忽哉昔漢宣帝三年茂陵白鶴館災下詔曰乃者火災降於孝武園館朕戰栗恐懼不燭變異罪在朕躬羣有司又不肯極言朕過以至於斯將何悟焉夫茂陵不及上都也鶴館不及此宫也彼尚降詔四方以求已過是知古帝王急治如此夫火不炎上之罰正為是焉臣謹按前漢五行志云賢佞分别官人有敘帥由舊章禮重功勳如此則火得其性矣若信道不篤或耀虛偽讒夫昌邪勝正則火失其性矣自上而降及濫炎妄起燔宗廟燒宫室雖興師而不能救故魯成公三年新宫災劉向謂成公信三家子孫之讒逐父臣之應也襄公九年春宋災劉向謂宋公聽讒逐其大夫華弱奔魯之應也今宫災豈得亦有是乎願陛下恭默而內省之省而既知之願陛下悔過而追革之罷再造之勞役行古先之典法非惟大光基業亦天下之幸甚也臣愚妄之言不足益國體之萬一陛下茍容而行之三代兩漢之風指顧而可致也天聖七年六月丁未大雷雨玉清昭應宫災宫凡二千六百一十楹獨長生崇壽殿存焉翌日太后對輔臣泣曰先帝立成此宫一火延燔殆盡猶幸一二小殿存爾樞密副使范雍度太后有再興葺意乃抗言曰不若燔之盡也太后詰其故雍曰先朝以此竭天下之力遽為灰燼非出人意如因其所存又將葺之則民不堪命非所以祇天戒也宰相王曾吕夷簡亦助雍言夷簡各推洪範災異以諫太后默然舜欽時年二十一為太廟齋郎上此奏宋名臣奏議卷三十七
