body:
  text: 宋名臣奏議巻六十三宋趙汝愚編百官門内侍下上神宗論遣李憲措置邊事蔡承禧臣伏覩詔除内侍省押班李憲充秦鳳路計議措置邊事其一路将領皆取憲約束臣等伏見藝祖之朝中官不過給使太宗使以黄衫給事禁中方是之時四方可謂多事以不稱之才而天下士民罔不服從以之興大統傳後世逮唐之晚乃以吐突承璀為招討處置而侍從之官論奏不已憲宗屈天下之議而用之終以無功而罷蓋一方之警欲以擾一路為難以天下之力治一小警為至易此理順故也理順則無逺而不從理屈則雖近而不服煕州小警大不過覬幸朝廷之爵禄嵗時之賜與小不過欲以刼掠本界倉廪牛馬況封疆之臣所聚者一路之勇所用者一路之智也彼夙夜砥礪欲以捐軀命而承徳音乃使潜氣屏息以順適奄尹之指令乎臣等又聞名言兹在兹茍有兹事必在兹義今雖委曲傳就更為計議措置之名其實使一路将領出於指麾乃是行招討經略之職欲以厚誣議者安可得乎況今天下之廣士民之衆豈無一憲輩而顧必用之何示天下以不廣哉伏望朝廷鑒藝祖太宗之所以裁抑中人業成若此念唐憲宗之所以崇用之而功卒無成之若彼明所與以稱所施天下幸甚熙寧九年十二月上時為監察御史裏行上神宗論遣李憲措置邊事係第二狀蔡承禧臣近具章疏論列李憲不合充秦鳳路計議措置邊事悉陳區區之愚陛下赦其狂瞽開納聽受至今未奉指揮寢罷臣自度智謀愚下訥於辭説不足上回宸慮此事實繫國體重輕貽訓将來不可遂已臣語直辭拙言不達意而憲以敏給辨慧能當陛下之意臣進見開陳有時不能盡事情萬一而憲朝夕得侍清光詳復巧説臣孤立無蜉蝣蟻子之助而憲内外之人觀望稱美以為才能勢不均敵而臣獨冒萬死拂上㫖惓惓若此者豈為臣一身之計重念祖宗基業之難而臣荷陛下識擢奨憐使之盡言不忍緘黙自同衆人惟陛下留神而熟思之熙寧九年十二月上上神宗論遣李憲措置邊事係第三狀蔡承禧臣自聞詔除内侍省押班李憲充秦鳳煕河計議措置邊事臣兩有論列未奉聖㫖指揮臣竊以陛下通知古今明曉治體非不知中人之出為害政中人之柄兵不可示後世而必欲使之者非以其便敏能適於㫖令歟非㨗給能有以應對歟非以在煕河曽經行伍之間乎此聖意孜孜果於用之欲以救生民一時之患而忘其可慮之逺者臣故仰服陛下垂意於一世之功矣然而便敏似才㨗給似智又曾經行伍必以為有功臣請言便敏之害於政者夫中人之出務於集事而不度事之淺深一槩以束下為能既居兩路經略使之間則必以陛下之威氣使兩路經略使不敢議其可否縱事有未便則無敢言者矣無敢言者則雖有害於邊防陛下無由而聞矣臣請言㨗給之害於事者陛下深居法宫之中羣臣進見以時而憲以親侍陛下言之親莫如憲日侍左右莫如憲其為固已易於信從而又嘗厯煕河其性慧巧必能有以投陛下之意其所言於邊防有害則陛下雖聖明悉知之乎憲之處煕河謂之有功也豈憲之獨能然哉上有大帥下有偏裨煕河軍吏以陛下俾親信之出也有功必推憲其無功敢議憲以聞上乎故憲能累積以至此豈憲之必能然哉而以陛下之明聖必有以照亮而未肯遽易者豈非出此乎臣有一言望陛下少垂清慮復之熟之陛下今命諸路之帥都副總管以為可以任邊以今差将官正副七十餘人以為可以将領矣至於小郡列堡而以才武名者不可勝數小有事宜豈無一人可任者至以中人為專帥而臨制兩路雖曰計議又帶措置之名四夷聞之豈不輕視中國乎況今秦鳳熈河之凋敝常俸自已難給而又一二十㫖揮之兵以食之鬼章者如聞潜已遁去臣恐憲慮無功又别生邊事以邀覬伏望聖慮特回徳音以慰安中外天下幸甚凡今得侍左右皆有以将順而臣獨仰拂宸㫖豈臣之所欲哉惟陛下思之干冒宸旒不勝萬死熙寧九年十二月上上神宗論遣李憲措置邊事彭汝礪臣昔言不當付寺人以兵陛下以為非是及李憲師出自洮以西遂至無事而臣言絀矣然臣之言非以憲為不足以成其慮亦不在憲故臣言自黜於議猶信天下之事固有趣時而為之者然其大綱亦不可以一槩言也今以周官觀之考其數蓋不及百人而所事亦略可見以今視之其多少輕重何如也蓋古者因民之有是疾故擇而任焉非以使令之故刑無罪之人而為之也彼其類非無聰明賢智無故使以刑徒失身廢絶其類至踰千百焉此非先王以仁愛人之道也古人唯酒漿醯醢司服守祧而已其他莫與焉今以一道之權予之此非先王以義制事之意也憲辟薛昌朝不聽切齒扼腕以謂為腐儒所賣自是不復回顧士人矣張茂則不阿事頡頏作氣官屬罕見其面雖達官大吏俛首不敢與抗而姦詐之人稍復趨附以僥倖萬一之利陛下以是觀之使其有可以輕士之勢其心如何也且朝廷比年之役其最可憂慮者洮西闗蜀其最繫議論者濟川之役今日之役最為大者洮河之役數者在寺人是陛下所愛親尊寵之士大夫無一可屬任者也且彼其初非無敏健精悍可用之力及稍任事者則窺覦玩弄藉蹈士大夫矣詩曰殷鑒不逺在夏后之世陛下試取漢唐以來宦官之事觀之亦足以知矣自古人君方其無事之時未見其害則士大夫之言為不足信亦莫之聽也及其禍亂並作本末顛沛至於無可柰何而後已自古及今人非一二也惟陛下為宗社計之不勝幸甚熙寧十年五月上時為監察御史裏行上哲宗彈奏王中正等四宦官之罪劉摰臣竊以陛下臨御以來運動政機以時弛張述成先帝制治立法之意使光昭於天下利興害除四方鼓舞至於清明朝廷分别邪正斥逐姦佞鋤去强梗皆妙慮神斷優游閑暇不出於喜怒不見於言色而天下之善惡已辨是非已正矣何其盛歟然於此時臣竊怪天地之和氣尚未應忠臣義士之論尚或未平此其故何也臣嘗究之蓋天下之元惡猶有稽誅天下之大姦猶有漏網而國法猶有未正此中外所以猶未厭也國之失政莫大於使姦惡幸而免今論其大者則前日之四三宦官是也臣待罪風憲雖知觸權倖言出而患入然臣有言責貪報恩遇則何䘏乎身之危哉謹為陛下言之王中正元豐四年将王師二十萬由河東入界計有隨軍齎運役兵民夫通數十百倍衆矣中正徘徊於境上殆半月而後出翺翔乎疆外頓沙漠而不進公違詔書不赴興靈㑹師之約天寒大雪士卒飢凍坐使物故十之七八古之将帥固有無功而還者然猶當保全師旅歸報於國今精兵勁騎一無所施自取狼狽死亡殆盡按之軍法宜即顯誅中正略不自劾請罪而先帝以天地之量無所譴詞又遣使賜予問勞然後中正徐徐求閑局厚俸自佚而去此國法未正者一也李憲之於煕河貪功生事一出欺罔朝廷之威福柄令持於其手官吏之廢置用舍出於其口監司帥守而下事憲也如父兄而憲之頤指氣役之也如奴𨽻縣官財用聽其取與内之府庫金帛轉輸萬里外之生靈膏血漁奪百端傾之於憲如委諸壑出沒吞吐神鬼莫見而一切不㑹于有司興靈之役憲首違戒約避㑹師之期乃頓兵以城蘭州遺患今日及永樂之圍憲又逗留不急赴援使數十萬衆肝腦塗地罪盈惡貫不失於總兵一路此國法不正者二也宋用臣奮其私智以事誅求摧奪小民衣食之路𤨏細毫末無所不為使盛朝之政機甚於弊唐除陌間架塌地之事傷汙國體不䘏怨讟其出入将命㨗若風火務以巧中取悦事無不諧動畫密㫖故擅作威福侵凌官司冒昧貨財更無案籍都城為之憔悴商旅故以不行瘡痍蠧害至今棼然而莫能理然亦不失享禄于善地此國法不正者三也石得一領皇城司夫皇城司之有探邏也本欲知軍事之機密與夫大姦惡之隱匿者而得一以殘刻之資為羅織之事縱造伺察者所在碁布張屏而設網家至而戸到以無為有以虚為實上之朝士大夫下之富家小人飛語朝上而暮入於狴犴矣有司無古人持平守正之心以謂詔獄也成之則有功反之則有罪故凌辱箠訊慘毒備至無所求而不得無所問而不承其隂害不可勝數於是上下之情惴惴朝夕不敢自保相顧以目者殆十年莫得一發之今不失厚俸安坐此國法不正者四也是四人者權勢鋒焰震灼中外毒流于民怨歸于國宰相執政知而不以告于上諫官御史懼而不敢論其非幸而出於聖人在上之時以先帝神武英氣鎮壓其姦不然其為禍患豈若漢唐之宦官哉以堯之聖不免四凶之在朝至舜起而後誅殛之孔子為魯司冦七日而誅少正卯然先帝未肆其誅于市朝而以遺陛下陛下所宜以舜之事自任今閲嵗時尚不聞以典刑詔有司臣所未諭也伏乞聖慈以臣章付外議正四罪暴之天下而竄殛之以明國憲以服天下元祐元年四月上時為御史中丞詔李憲降節度觀察留後一官提舉亳州明道宫王中正降遥郡團練使刺史兩官提舉兖州太極觀並赴本處居住石得一降為左藏庫使管幹西京崇福宫宋用臣降為皇城使差遣如故上哲宗論李憲王中正以罪降黜不當假以使名蘇轍臣伏以朝廷典章百世所守因事變法為患常多祖宗之世使相節度不領京師官局其奉朝請必改它官或為東宫三師或為諸衛将軍太平興國中以趙普元勲自河陽還朝止為太子少保以向拱張永徳之舊並為環衛至今諸道鈐轄總管以防團歸老者亦以諸宫使處之蓋其遺法也至明道中錢惟演以章獻皇后親嫌罷樞使始以保大節度為景靈宫使治平中李憲愿以長公主子亦以武康節度為醴泉觀使恩倖一啟自是戚里以節察居京邑不治事者肩相摩也然猶未見以罷降黜而以觀察團練享厚祿居謫籍者伏見近日李憲以宣州觀察使提舉明道宫王中正以嘉州團練使提舉太極宫二人貪墨驕横制軍失律罪惡山積雖死有餘責聖恩寛貸皆寘之善地而又首亂國憲假以使名臣恐後世推壊法之始歸咎今日謂宜考修制度追還誤恩以存舊典且使罪人知有懲艾元祐元年八月上時為右司諫上哲宗論陳衍採訪外事梁燾臣風聞中貴陳衍採訪外事密奏兩宫衍近來頗自表異凌狎羣輩氣岸不遜臣以謂兩宫聖明輔陛下施為有宰執論事得失有臺諫百司各守其職循名責實則事無廢弛豈可使閹尹賤𨽻上玷聰明若此人言為可信有傷聖徳漸不可長元祐五年五月上時為御史中丞上哲宗論自古及今用内臣之害范祖禹臣聞書曰與治同道罔不興與亂同事罔不亡漢有天下四百年唐有天下三百年及其亡也皆由宦官相去五百餘年如循一軌蓋與亂同事未有不亡者也漢自元帝任用石顯委以政事殺蕭望之周堪而廢劉向等漢之基業壊於元帝東漢鄧后臨朝中官用事手握王爵口含天憲順帝以後五侯專朝桓帝靈帝之時十常侍擅天下子弟親黨割剥百姓毒流四海附之者寵及三族違之者滅及五宗大考黨獄夷戮天下名士於是黄巾賊起朝野乖離及袁紹誅宦官獻帝奔播困餓而曹操因之以簒漢唐自明皇使髙力士省决章奏宦官始盛李林甫楊國忠等皆因力士以進唐亡之禍基於開元肅宗任李輔國末年寝疾輔國以兵刼遷明皇於西内殺張皇后及二主明皇以幽殂肅宗以駭沒貴為天子上不保其父中不保其身下不保其妻子由用輔國一人而已代宗用程元振功臣畏讒吐蕃冦陷京師播遷于陜徳宗用宦官分領神䇿禁兵其後天子由其所立唐室終以此亡憲宗服金丹躁忿為陳洪志所賊敬宗亦為劉克明所賊文宗欲討憲宗之賊謀泄仇士良殺四宰相及朝臣滅其族流血成渠朝廷半空文宗憂憤以至于沒武宗以後皆由宦官所立僖宗呼田令孜為父天下大亂黄巢賊起播遷于蜀又幸興元楊復恭自稱定䇿國老呼昭宗為負心門生天子劉季述等廢昭宗於東内韓全誨等刼昭宗幸鳳翔於是崔裔誅中官而朱全忠刼遷昭宗遂殺之因以簒唐觀漢唐亡國之禍其酷如此後之人主豈不可以為剖肌刻骨之戒哉太宗時王繼恩有平蜀之功中書欲除宣徽使太宗曰朕讀前代書史不欲宦官預政事宣徽使執政之漸也宰相懇言繼恩有大功非此不足為賞太宗切責宰相等乃命學士别立宣政使之目以授繼恩布衣韓拱辰詣檢院上言繼恩功大賞薄太宗大怒以拱辰妖言惑衆杖脊黥面配流崖州太宗可謂深鑒前古而塞禍亂之源矣英宗服藥任守忠往來交間兩宫致慈聖太后與英宗不相悦言者劾奏其罪貶蘄州安置盡逐其黨然後慈聖英宗母子如初宫省清肅至煕寧元豐間内臣之中李憲王中正宋用臣三人者最為魁傑憲總兵煕河兼領三路中正總兵河東兼領四路其權勢震動内外自陜以西人不敢斥言憲名中正敕募兵州郡不敢違師徙凍餓奔潰死亡最甚憲陳再舉之䇿以誘夏賊致永樂陷沒在煕河僣擬不法用臣興土木之役無時休息㩁舟船置堆垜網市井之微利奪細民之衣食專用刻剥為國歛怨此三人者雖加誅戮未足以謝萬姓朝廷止從寛典量加廢黜惟憲獨死中正用臣猶存陛下近召内臣十人續又召數十人而李憲王中正之子皆在其中又除押班二人帶御器械一人中外無不駭愕既而聞二人以執政言其有過先罷三人以舍人繳詞頭且居然前來指揮首違故事又李憲王中正之子既得入侍則中正用臣亦将進用人心不得不憂故臣敢極言之陛下與太皇太后同聽政之初外逐蔡確章子厚吕恵卿及羣小人故朝廷肅清内逐李憲王中正宋用臣等及羣小人故宫禁肅清内外皆無凶人故天下安靜臣厯觀近代内外肅清未有如今日也祖宗法度所以維持後世不可輕變陛下柰何先自壊之陛下所以居南面之尊䝉已成之業四方萬里奔走而聽命者以朝廷公正天下心服也陛下何不謹守法度規矩增修徳政使過於垂簾之時然後不失天下之望今未及進一賢行一善先驟用中官如此之盛四方聞之必以為政出宫掖無復綱紀如衰季之世豈不大失人心哉夫人心一失欲復收之甚難陛下若作一二事使中外悦服四方竦動則他日所為有順流之易人心先信故也若作一二事使中外憂疑四方解體他日雖有美意人已不信在前豈得便心服乎如此而望徳業之光名譽之隆非臣之所知也今中官止是陛下左右給事使令臣雖至愚亦知其必未有害政之事然欲治外者必先治内欲治逺者必先治近是以明王遴選左右任人堯舜畏之佞人孔子逺之恐其有損而不自覺也昔唐之時仇士良教其黨曰天子不可令閒常宜以奢靡娛其耳目使日新月盛無暇更及他事則吾輩可以得志切勿使之讀書親儒生彼見前代興亡知憂懼則吾輩疎斥矣士良以此固其權寵故能專恣二十餘年夫漢唐之事當今必無然以先帝天資英睿聖學髙明可謂不世出之主而内外為小人所悞外興師旅内興百役先帝未嘗享太平之樂終以憂勤損夀凡不便民之事皆羣小所為而使先帝受天下之謗臣常痛之故不願陛下復近小人蓋以此也陛下誠能聽臣之言悉追罷除用内臣指揮未到者别與差遣已入者復受外官則中外之人稱頌聖徳萬口一辭以為至美乃可以解衆庶之惑洗陛下之謗如此反掌之易何難而不為哉自聞近日兩次㫖揮以來外議洶洶皆云大臣不能爭執陷陛下於過舉臺諫之臣又皆畏避中人莫敢一言但恐陛下未知耳若使知之必不為也臣侍經筵八年日望一日嵗望一嵗期陛下為令徳之主唯恐有纎毫之失故不避違拂聖意數進苦切之言陛下每留睿聽以臣愚直見知臣亦不量微力竊以獻納自任今兹事體實繁朝政汚隆人情去就臣義均休戚榮辱不忍黙黙坐視敢冒萬死而獻其忠惟陛下裁察元祐八年十一月上時為翰林學士兼侍講上哲宗論監設獄中使不當受大理囚訴蔡蹈臣近者竊聞敇遣中使鄭舉詣大理寺設獄囚有對舉聲寃者舉輙受其訴甚駭衆聽臣伏見大理獄朝廷所重非刑部御史臺不得詳覆糾察而監設使臣本無省獄之命而敢聽其辭生事犯分莫此為甚臣嘗覩大中祥符詔書曰比來内臣将命出外如聞有收受牒訴恐縁致枉抑自今宜切禁止違者重論之臣竊聞祖宗之意防微杜漸可謂明且逺矣臣愚欲望陛下少加聖慮特降睿㫖下大理寺根問施行庶使使命小臣知所禁戒不敢因縁生事紹聖三年三月上時為監察御史上徽宗乞謹擇左右近習之人江公望臣讀孟軻之書至戴不勝曰子謂薛居州善士也使之居於王所在王所者長幼尊卑皆薛居州也王誰與為不善在王所者皆非薛居州也王誰與為善一薛居州獨如宋王何迺知成人君之善非一人之力也周公作立政戒成王雖綴衣趣馬左右攜僕必以吉士乃知左右前後雖便嬖近習亦惟其人也人君位尊勢隆唯左右大臣日一見有事則公言之諫官御史月對不過三四有事則昌言之天下之士獲登文陛以望清光者萬無一二焉戰慄惶怖言若不出諸口矧能劇談天下利病哉與陛下朝暮起居從事莫非左右前後便嬖近習之人一不謹所擇則憸佞柔媚進於君側承風順指悦意便情有所不欲欲無不得有所不聞聞無不盡朝餌夕㗖日浸月潤切於身則蠧性命之情延於外則移朝廷之政唐宦者仇士良嘗語其輩人君不可令閒暇閒暇必觀書見儒臣而又納諌智深慮逺減玩好省游幸吾屬恩且薄矣莫若以財貨鷹馬毬獵聲色蠧其心極侈靡使悦不得息則斥經術暗外事機在於我矣此尤見便嬖近習其不擇之害有至如士良者臣望陛下思孟軻之言以求多士之助佩周公之訓戒雖攜僕必惟其人觀士良與其輩密計驗朝夕從事便嬖近習之忠佞如是則貨財鷹馬毬獵聲色之欲不萌於心左右前後既無逢迎之人朝夕從事莫匪端人善士雖欲為之不可得已夫言不及大而論小事不到逺而渉邇非所當及也然小者大之基邇者逺之積知微之君尤所當戒陛下思之母忽建中靖國元年上時為左司諫上徽宗論郝隨特許復官任伯雨臣伏見進奏院報郝隨特許復官中外聞之莫不駭歎竊以虧哲宗盛徳起哲宗侈心者隨也月臺玉虚之作窮奢極侈殫工盡巧以糞土用邦財以冦讐用民力不經有司擅自支費因縁為姦乾沒無限以至内帑珠金率意取之並無歸着此天下之所知陛下在潜邸之所目擊也陛下即位灼見時事罷繕修之役略侈靡之觀天下聞之莫不鼓舞方且薄責未正典刑命有司查勘支用之費珠金之數而有司小人不能上體陛下恭儉恤物之意一切觀望略不根究人人聞之莫不扼腕今日却遂叙用是國家帑藏可以私取朝廷典刑可以人廢昔仁宗皇帝即位之初見真宗末年修蓋宫觀窮極土木顧謂輔臣曰當時何人執政何人監修造誠可罪也宰相吕夷簡曰當時侈費至今帑藏一空仁宗曰朕當以此為戒夫侈靡溺心古今所患茍有斯人誠為國賊昔唐太宗時姜確有巧思善於營造魏元成作相預斥逺之恐起侈心以興工役則自古君臣所有及祖宗所行亦可見其逺慮矣願陛下深思逺慮屏絶佞人亦足以使左右近習不敢以親近竊威權不敢以非道説聖意恭儉之徳自此日新矣建中靖國元年二月上時為右正言上欽宗論不可復近奄人楊時臣竊考自古奄人用事未有無後患者漢唐之末是也漢之竇武何進以肺腑之親因天下怨怒收攬英豪如李膺陳蕃輩共起而除之卒不勝皆駢頸受戮唐之昭宗信狎宦者至有東宫之幽其為厯世之禍大矣國家用童貫握兵為國生事二十餘年覆軍殺将朝廷不得聞中外耗竭而貫之私藏厚積不可以千萬計人怨神怒馴致今日陛下之所親見也臨御之初謂宜屏去此曹使與輿臺皂𨽻服掃除之役而已不可復近比聞防城所仍用奄人提舉授以兵柄此覆車之轍不可復蹈也使氣燄一熾則後不可制矣恩倖持權貪饕得志上皇晚雖悔悟而追救不及不可不鑒也靖康元年正月上時為邇英殿説書上欽宗論不可復近奄人係第二状楊時臣竊見自古奄人用事未有無禍者漢唐之末是也比年以來此曹氣熖尤盛皆縁蔡京王黼輩首為亂階開通交結假以重權使相應援僥倖之門一開至不可遏童貫握兵權於外梁師成擅大柄於内陶鑄将相垂二十年其餘恩倖持權肆為貪暴者故人怨神怒幾至喪邦原其禍根皆蔡京王黼輩為之也陛下即位天下響應異時之為惡者碎於國人之手投哀請命乞寄官資不煩芟夷而隂自消伏似非人為實出天意此宗社之福生靈之幸也人無賢愚莫不稱慶比聞外廷之臣有懐姦患失務為身謀而不為國家逺慮者復效京黼輩所為隂謀交結漸令用事以陛下之英明剛斷又嘗親見其弊宜無有此然臣竊有疑焉伏見梁平李彀之徒皆持權自若氣熖復熾未識陛下亦嘗察其所以然否乎臣謹按梁平嘗為大理寺開封府承受結為隂獄殺無罪之人不可數計罪盈惡貫人所切齒陛下之所知今復處之御藥院果何意邪李彀嘗管幹京城監造軍器姦欺侵蠧無所不至近興復濠之役調夫數萬減尅口食殘虐百端役夫至於殍踣逃亡亦不可勝計近在國門之外陛下其亦聞之乎至於直下元豐庫取珠子及送親事官於開封府處斬之類並不經由三省外議亦以為皆宦官為之故態漸長使陛下受疑於天下所繫豈小哉臣謂省臺寺監百執事者初不乏人何苦信用此曹駕覆車而履其轍也如邵成章輩人或稱之以為稍賢於其徒然此曹縱賢亦不可用但使之服掃除通詔令可也蓋外廷姦臣一見其用事則向風觀望隂以為肘腋腹心之託内外相應馴致禍災非特不利於國亦非所以利此曹也大抵此類善伺人意巧為便佞浸潤膚受尤難隄防自非監古視今以為深戒日多漸漬未有不為所惑者禍亂之機發於至微漸不可長拳石之多積而為丘山不可不謹也宦女之禍古人所戒著在方册非臣私言謹取五代史書宦者傳繕寫進呈伏望燕閒之際一賜覽觀永為龜鑑天下幸甚靖康元年正月上上欽宗論中人預軍政之漸余應求臣嘗觀自古中人預軍政未有不為患者故齊寺人貂漏師于多魚夙沙衛殿而二将見獲唐用監軍每無成功此可為後世深戒者也國家近年邊事專委童貫譚稹終成大禍幾危社稷今兵革未弭選将命帥固當任責以成效所遣中人不過隨軍承受奏報文書而已不使之預聞軍政也近者河東承受王嗣昌奏請畫一乞令日報将兵覆驗首級提㸃犒賜催趣糧草及差發探報動息出入皆報承受所則是雖名承受其實監軍也軍政不專於主帥而闗決於承受則動有牽制進退狐疑又唐之監軍多擁精兵自衛勝則坐分功賞不利則引兵先遁今嗣昌又令以隨軍步馬各二隊自衛若近裏幹當隨行防護是又踵唐監軍之跡也如此豈有同心赴敵死於行陳之意哉朝廷不察其意而從之臣恐将帥依違不能專制又慮積日累月異時為監軍所制将自兹始矣臣觀童貫之初用事也為熙河蘭㑹路承受而已繼而為措置邊事又為安撫制置使又為宣撫使終之爵郡王職樞筦譚稹初用事也亦熙河蘭㑹路承受而已繼而為幹當公事又為淮浙制置末乃為河東宣撫使蓋其由有漸非一日之積也今嗣昌初為承受許預軍政師還有功後或用之豈不少假之權浸以隆盛安知數年之後不復為貫稹乎易曰履霜堅氷蓋言防微杜漸當辨之於早也陛下方修法度以治内命将帥以事外委任甚專不從中制而嗣昌陳請乃欲干預軍政擁兵自便首為梗階漸不可長伏望聖明追還所請重賜竄責以為中人預軍政之戒以示專任将帥之意不勝幸甚靖康元年四月上時為監察御史上欽宗乞罷隨軍承受余應求臣訪聞河東河北制置使司承受盧公裔自二月間受命至四月半尚留京師擁兵卒置吏屬添俸給居私第功成則被上賞征戰則不履行陳於公裔私計誠便矣又官司文移皆稱監軍審如此既無承受奏報文字之實而坐竊監軍之名增重權勢深為未便今河東承受王嗣昌既已奏罷則隨軍承受自不須置所有盧公裔乞令罷制置使司承受其不赴軍中之罪亦乞重賜黜責更有似此置承受去處亦乞依此施行靖康元年四月上上欽宗論宦人蠱惑人主陳公輔臣聞宦寺之亡人國家其來已久漢自和帝後中官始盛至靈獻之時極矣故袁紹誅常侍以逞然曹操因之漢遂以亡唐自明皇後中官始盛至僖昭宗時極矣故崔嗣血軍容以甘心然朱温因之唐遂以亡大抵假威柄于外以内攘姦人則大臣愈專主權愈卑譬灼火攻蠧蠧盡木燒漢唐之亡皆由此輩豈不哀哉恭惟本朝祖宗積徳深厚其厯年之長固非漢唐可比比年以來國家承平宫廷使令日益増廣加以財用富足而横恩濫賞覃及閹寺故宦官由之而盛竊弄威權恣為姦状雖朝士大夫憤疾之甚曽無以處之乃縁士庶伏闕獻書因而諠譁遂逞積年之忿殺害宦官二三十人不由朝廷命令不假威柄于人使此曹無所肆怨而氣勢稍衰與漢唐異矣此何以致其然耶實天祐我宋以延宗社無疆之福也陛下今日固當上承天意下順人欲因而摧抑此輩不使復振臣竊聞近來稍稍復用事如盧公裔王若冲邵成章之徒是已臣仰惟陛下臨御以來崇尚儉約聲色狗馬畋游玩好一切屏絶此曹将無所肆其巧然大率宦人蠱惑人主决非一端唐仇士良謂人主不可使間暇間暇則觀書近儒臣故我曹不得進用而恩澤始衰本朝楊戩亦戒其徒曰汝輩不可令天子罷修造我所得恩澤及財物皆縁修造陛下觀此輩用心果可不防哉臣區區之心望陛下鑒唐之亡因今日之天意專以此輩為戒無使其乗間伺隙以移陛下聰明也至於進退人才尤不宜與之謀孔子不主癰疽孟子不畏臧倉賢人君子决不肯因嬖倖以圖富貴其所以附麗以進者貪饕無恥巇險逞欲之小人故前日蔡京王黼王安中等專倚此曹為重此天下所共知伏惟陛下留神於此日夜念之無忘小臣之言實宗廟社稷之福而天下之幸也靖康元年五月上時為右司諫宋名臣奏議巻六十三
