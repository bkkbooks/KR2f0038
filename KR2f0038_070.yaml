body:
  text: 宋名臣奏議卷七十宋趙汝愚編百官門省官上仁宗論官冗四弊李柬之臣伏以建官設爵所以待賢才齊萬務非以車服祿廪供人之欲給人之求也古者上自公卿大夫下及抱關擊柝皆有定員故官無茍得人無他覬漢儒謂爵祿者天下之砥石聖王所以礪世磨鈍又曰爵祿者人主之操柄蓋聖世制人御俗其於爵祿也謹重之如此國家四聖接統治安百年聲明文物比隆三代其如吏員雜冗上下繁多若不澄其源復加數年則益難淘汰今選舉之路未精補廕之門太廣恩幸之路未息因緣之弊未除唐制明經進士及第每嵗不過五十人今三四年內放四五百人校年纍舉不責詞藝謂之恩澤者又四百人又陜西兵起保恩二州卒叛廣南儂賊冦掠而逐路舉人悉加録用荒唐淺陋被恩者不可勝數諸科唯専記誦質其義理一所不知加之生長畎畝不習政術臨民治衆能曉人事者十無一二嵗并放五百餘人此所謂選舉之路未精也西漢吏二千石以上視事滿三嵗得任一子為郎王吉尚謂今使俗吏得任子弟率多驕驁不通古今文武官三司副使知雜御史少卿監刺史閣門使而上嵗任一子帶職員郎諸司副使以上三嵗得任子文武兩班可任子者比之祖宗朝多逾數倍遂使膏粱子弟充塞仕途一士遭逢子孫皆在仕宦稚兒外姻並沾簮笏之榮而又三丞已上致仕者任一子况七十致仕古之常制少登仕宦晚至三丞恩惠未見及民功業未聞及國至其退罷更令任子退一老者進一孺子甚非國家優賢取士之道此所謂任子之恩太廣也漢宣帝躬親庶務王吉上疏謂外家及故人可厚以財不宜使居位蓋以位者待才用之宅不可以恩私得也位無髙下皆當愛惜外家故人尚當若此况嬪嬙近列宗姻之外親乎今嬪嬙之侍宗室之妻有邑號視品者皆得奏薦弟姪及皇親納壻皆白身受官行賂求婚多得市井浮薄之人以汚宗室以至內臣之家因㳂事任奏授甚多此所謂恩幸之路未塞也三省暨百司胥史本於主行文書供給役使調官補吏已為冗多而又因緣權勢悉換班秩至於權貴之家給役之輩明有恩例亦授班行嵗增日益莫知其數所謂因循之弊未除也入仕之門雜補官之路多而士大夫皆以為患而言者不為少事未宣行而物論興者何也蓋僥幸厚者未嘗裁損恩澤薄者先議減除如向來孔道輔等止欲釐百司吏人是也往年減省䕃補近臣之家靳惜厚恩務全已欲但於服屬踈者舉行數事而已使天下論議多不厭伏者率由措置之未公也大凡立法自貴者始則人無怨心請先自嬪御宗室及兩府大臣以至帶職員外郎諸司使副已上及內臣之家一切裁減之十年當見成效尚循舊貫不圖改為欲望起治道清仕途不可得也至和二年九月上時為右諫議大夫上哲宗乞清入仕之源上官均臣聞朝廷設官分職所以治事才者並用則職修而事治才者不用則事紊而職廢才否並用則政事之不治者常半今之士大夫列于版籍者可謂至冗矣京官自承務郎至朝議大夫凡二千八百餘人選人一萬餘人大使臣二千五百餘人小使臣一萬三千餘人舉天下之員闕不足以充入仕之人故吏部左右選用闕京朝官及大小使臣大率一年以上選人須及二年以上或三年而闕次之逺者莫如選人大抵一官之闕在任與夫已授而又擬之者凡三人故自得替如不該移令待試法之中否須近一年而後擬呈已擬差必待闕三年而後就職七年之間方成一任京朝官待次幾一年而後得差遣待闕一年然後就職五年之間方成一任以常人言之三十而仕又十五而改官至七十而致政共成七任耳又況三十未必仕仕者未必皆至七十而又有不幸私故陷於吏議年雖及之未必滿七任也故舉天下之士大夫其才可以治事不至曠職者未必及半就令及半居閒之日常多而治事之日常少此天下之郡縣所以不治閭井之民未純被朝廷之德澤者良以此也臣以為欲郡縣之治在夫才者居職欲才者居職在乎使其居閒之日少欲其居閒之日少在乎清入仕之源切觀今之自文職入流者凡四進士補䕃與夫納粟得官百司胥吏是也自武職入流者凡三武舉補䕃與夫百司胥吏是也計其才行可以居官治事者納粟胥吏不如補䕃補䕃不如進士武舉何以言之為進士者自十年就學加之十年而後能治經閲史綴緝文詞又加之十年而後能問學通博成就其志其學可謂勞矣及夫有司試之必擇其明達義理而稍工文詞者方得薦送又求其尤者始預禮部之選又加廷試而後賜第擇之可謂至詳矣三年一取士舉天下學者群試于有司亡慮數萬人而賜第者僅五百人取之可謂至艱矣彼貴遊子弟恃其父兄之䕃補類多驕墮不學僅通經義稍成文詞者則必中選就令屢試不中年及三十亦得出仕其視進士篤志講學趣操自立冝有間矣百司胥吏主行文書積年寡過例該祿仕又豪右之家以資授官其才品庸下素不知義又外臺郡守奬薦之所不及彼固分甘自處於卑賤之地豈復有奮勵之意其視補䕃子弟聞父兄之教少壯就官有鄉進之心冝有間矣由此觀之計才量行可居官治事者納粟胥吏不如補䕃補䕃不如進士理之必然也又進士科所謂特奏名者凡五等其最濫者但曽一次預薦僅及三十年即該推恩其就廷試則試題平易字數減少有司考校又加寬假但粗成文理不至甚紕繆者皆置第四等以上未滿七十者即更不須保任便許出官昨元豐八年特奏名係第四等以上者四百餘人可謂冗矣夫進士自秋試至省殿三處考校僅取五百其間尚容幸得又況偶獲一薦纍試見黜年髙才耗學術忘廢其比進士實固相逺而又五路學者鮮少取人數寬但獲一薦雖不事學坐待及二十年便該仕祿大率多年五六十以上既就仕宦誰肯舉薦夫以血氣衰耗有茍得之心薦舉不及無向進之意其能精明治事廉潔自守者十無一二智識才力方之進士固有間矣夫以特奏得官與夫補䕃流外之人學術才行皆不足以方進士而入仕之數常多於賜第之人並趨吏部吏部按格不計入流清濁才行髙下但以到部先後注擬授差遣以此待次者常至七八百人注擬二年以上員闕故負才可用之人率為特奏名得官與夫資䕃胥吏之流冗占壅滯此肩待闕居閒之日多而治事之日少者常以此也不清其源欲官之不濫才者之獲進不可得也臣以為四者之冗有可罷者納粟得官是也有可以裁抑者特奏名資䕃胥吏是也竊聞嘉祐四年以後係特奏名者才數十人自治平至熙寧三年止有百餘人自熙寧六年至今每次推恩入仕不減四五百人臣欲乞參酌祖宗故事須曽取到文解或經殿試計若干舉方許就省試實得文解及經殿試若干舉方許就殿試其就殿試文理稍優者方得充四等以上每等限定人數不過若干人其在四等外者不理選限其曽預一薦雖及三十年不在推恩之限蓋纍曽取到文解或經殿試即須稍有文學不至空踈四等以上限以人數則有司所取不至冗濫如此則稍可以革特奏之弊矣臣又見廣南攝官取本路曽預兩薦者權攝簿尉一任無過遂得正授雖曰優假逺方士人然僥幸太過若量加舉數即可以損入流之冗矣臣以為古人之仕者世祿蓋使為之後者一人世焉祿廩之而已矣詩人之所譏謂棄賢者之後絶功臣之世今之寄祿官自大夫以上初升大夫即奏補子弟一人其後兩經郊恩與致仕之日皆許奏䕃其為大夫以上嵗月深久往往奏薦多至數人夫廉謹無過積日叙遷而為大夫者未必有功而賢者也官其子弟一二人以寵其後固已厚矣臣欲乞自兩省兩制以下至大夫奏補之數冝加裁減限以多少則可以革資䕃之濫矣百司胥吏積勤纍日大率須及二十餘年方得出仕唯三省人吏最為優幸每以㸃檢諸處文書酬奬減年出官最速其不願出官者坐理資任至為郡守冝加裁抑使無過厚則可以損雜流之弊矣四弊既損則入仕之源清而才行可用者不久於待闕不久於待闕則治事之日多而職業無不舉矣臣聞張官置吏所以為民今若捐虛授之祿以養害民之吏姑息不才之士以妨有才之進豈為民設官之意耶願陛下明詔有司講求官冗之弊澄清入仕之源以幸天下實非小補元祐元年八月上時為監察御史優禮上仁宗乞優禮李允則朝迥劉隨臣伏覩近降除書以客省使康州防禦使李允則特授寧州防禦使仍放朝謝與假將治行恩加勳舊事出非常凡居將帥之臣各勵公忠之節竊以李允則素懷韜略動有機權屢委邊防務期安輯不邀功以生事無縱敵而失謀雖古之名將無以加矣是以行命之日中外皆喜必若制置軍馬經略亭鄣樞近大臣成算之外若召而賜對詢以方略則老將諳練必有所長臣又伏見太子少保致仕朝迥端莊植性冲淡自居歷任三朝垂五十載徊翔兩制踰二十年先帝寵遇便蕃講求典禮議論詳正無不參預加以繼司文柄時謂得人今之臺閣清流州郡循吏迥之論辨所得居多近者引年致政斯為達禮五常百行蓋無缺焉文苑指為宗師朝野推為君子有兹儒雅之望未行優異之恩臣亦願兩宫聖慈特同允則近例賜以全俸豐其燕居其或朝廷將行大禮時議大政宰司裁成之外特開延英訪以經史耆儒詳練必有可觀每遇萬幾餘閒溫凉得所詳延二老賜之從容俾說往古治亂之因國初經制之務如此則文事武備盡美於昌朝養老乞言有光於古昔尊體宿舊益厚於時風傳示方來用光史冊臣以為文武班中功名雅望終始一致以至髙年者唯此二人允謂時賢恐須旌别天聖二年八月上時為左正言上仁宗乞加禮杜衍等馬遵臣聞推隆耆年則民德歸厚崇勵髙節則薄夫以敦此前籍之通規而先王之達禮也竊見皇祐中明堂大赦曽召兩府舊臣杜衍任布等陪位雖各人辭疾不預侍祠之列陛下降詔禮遣使軺賜豫備厚復恩其子殊榮異禮照耀一時陛下優賢養老之意白於天下而人知勸矣今杜衍且八十德望愈隆使古禮復行當在更老之位至如近侍致政而歸者張昷之之公直劉夔之清方如此等皆為良士今陛下享夀安之福行恭謝之儀凡在髙年正冝加禮臣愚欲乞聖慈指揮中書候將來大慶禮畢檢㑹明堂恩例特賜施行使衍等黃髮復見太平之事書之史冊足為美談庶幾冒榮越禮之人睹而知愧化薄歸厚或出此塗嘉祐元年九月上時為左司諌上英宗論呼官過禮張方平臣聞君尊臣卑人倫大義所以立朝廷之體定上下之分不易之道也故君前臣名著自上古陛下紹膺寶命光宅萬邦隆意虛懷優遇羣下大小之臣進對率稱其官此乃等夷相推民吏奉上之言非所以正尊極而隆堂陛明王制而崇主威也孔子曰必也正名乎名不正則言不順言不順則事不成以至禮樂不興刑罰不中真宗嗣位之始厚待先朝宰相吕端李沆初不呼名二臣上表固辭尋如常禮陛下厯數在躬及兹四年君臣之際尊卑之分别嫌明微在乎言動願陛下總攬權綱威恩並用呼官過禮乞從寢削曰公曰卿足正名分長轡逺馭使無遺力則百職並修庶務以濟此逺者大者之體也治平三年上時為翰林學士承㫖上哲宗乞優待文彥博而勿煩以事吕陶臣聞三公者上應台階下同元首表正萬邦儀刑四海不必備其官不可名以職委任之重則以論道經邦燮理隂陽為事體貌之隆則御坐為起在輿為下非若六卿庶尹分曹治事而各有常責也漢世以來典章因革與古不同乃以丞相兼三公之事至成帝時始從何武之議特置此官光武中興孝明繼治皆勵精以親庶政然而不知稽古建官之本意不明道揆法守之事冝乃以吏事課核三公其人或失而其禮稍薄甚者有至罪斥詬辱之纍君臣始終安得不戒今太師文彥博弼亮四世位冠一品才業推髙於朝廷威名取敬於强敵陛下渴見儀形特降褒詔供饋許肯異數優密前代莫擬深合古先聖人尊崇元老之義有大論議詢之而後定可也有大措置審之而後行可也經筵講道接之則師範嚴矣敵使在廷望之則國體重矣若乃居以一官責以庶事則臣愚猶以為未安蓋三省之務參總萬目巨至於命令機權細至於簿書期㑹紛紛坌集日交於前而丞輔之職無所不統一有闕失責亦隨之雖彥博康寧强健材力裕然猶若閒暇而年過八十無預齊喪豈可處之以勞唯冝待之以佚且古之養老以祝噎祝鯁居其前後豈為所養之人皆至衰耄而設之蓋情之所恤者深則禮之所加者備安可因其康壯則必煩以事哉恭惟先帝考古作法更新官制以三省大臣執國之柄釐治萬務唯師傅之官久虛其位而有一人焉以四世輔弼之舊適居此職則固冝以論道經邦責之不必纍以官事庶幾上顯朝廷褒崇勳德之意不乖四海具瞻之心臣待罪言路不敢以輕賤自默陛下恕其狂瞽而裁之以義元祐元年四月上時為殿中侍御史上哲宗乞令文彥博朝朔望劉摰臣伏見陛下降詔遣使召太師文彥博赴闕唯彥博以勳名之重翊亮四朝可謂社稷元臣冝乎陛下思見其人而加禮起之甚盛事也臣竊觀自古以來莫不貴德而尚齒然宗工大老遇之必以禮而處之必以道故或尊之以為師保或養之以為三老五更或使之朔望一朝或間趨朝廷平章重事或有大政就而咨決考於前載故事具存今彥博之來在聖謀神慮必有以處之將一見其儀形而已耶又將有所咨訪耶將留之朝廷以自輔耶又將任之以政耶今外議但見宰相虛位久未除人皆以謂陛下必將以三省長官命彥博矣雖臣愚意亦不免出於此然臣切謂誠若議者所料付以三省之政緣有官則有職有職則有事四海之大萬務之繁大小無所不總日夕裁決朝㑹陟降殆恐非八十餘年老臣之聰明筋力所能冝也有職事則不能無得失使任其責則傷恩釋而不問則廢法又非所以養元勳而尊舊老也彥博雖老矣然忠厚敦大足以慰士大夫心其氣略足以彈壓强悍其威望足以鎮服强敵誠冝今日優游左右以為朝廷重古之人以老成有過於典刑蓋為是也臣欲望聖慈詔彥博以本官朝朔望遇有軍國大事特賜宣召詢以籌䇿不須以事攖之夫以三師之尊獨承天子清問獻納以決大議而不勞以事此陛下之所以尊禮舊德者至矣不親於權以進强君道不疲於職以休養老境而無纍於出處之際此亦臣子之可以處而安也恩協義稱無以易矣伏望决自聖心使天下無異辭臣不勝區區元祐元年四月上時為御史中丞上哲宗乞以陪祠召張方平劉摰臣近見詔書以季秋大饗召南京太子太保致仕張方平赴闕陪位今聞方平已有辭免者臣謹按方平盛德元老其學誼志藴極髙明而盡精微在仁宗時以文學論議居風憲侍從之任啓沃獻替風采凛然而尤䝉英祖之知神考在位熙寧初擢為參知政事未及旬朔以家難去位除服還朝而王安石秉政矣方平論既不合又剛毅不肯少屈於是去國在外以至退老平生之才曽未少施天下所惜自陛下臨政以來收進耆舊凡名德之老皆在朝廷出入陟降有以敦風俗而重廟社化姦慝而鎮强敵中外翕然復見祖宗人物之盛豈不休哉而於此時獨遺方平未見及之士大夫切以為疑焉臣載惟國家每遇郊饗大事必召舊人故老使來待祠乃君臣之間至恩盛典然從來止舉故事備禮一詔之故其人亦備禮一辭之少有至者上下恩意滅裂施之虛文而已今陛下春秋鼎盛太母簾闈施政於斯時也惟患舊德之不盡集於朝也况陛下初展帝饗而方平天下之大老臣愚欲望聖慈特遣中使稍加禮數止以大禮陪位詔之則方平不應不至既至召見賜之延問閲其議論考其志識或有可用則留之朝廷以自輔翼亦不必攖以職事若其無足以當聖心則祠事既畢以禮遣歸而已亦自可以成就陛下尚賢貴齒渴見老成之意臣不勝震越元祐元年九月上時為御史中丞上哲宗乞加張方平恩禮蘇軾臣伏見太子太保致仕張方平以髙才絶識博學雄文出入中外四十餘年號稱名臣仁宗皇帝眷遇至重特以受性剛簡論髙寡合故齟齬於世然趙元昊反西方用兵纍嵗不解公私疲極方平首建和戎之䇿仁宗從之民以息肩書之國史又於熙寧之初首論王安石不可用及新法之行方平皆逆陳其害大節如此其餘政事文學有補於世未易悉數神宗皇帝知人之明擢為執政㑹丁憂服除為安石等不恱而方平亦不為少屈故不復用今已退老南都以患眼不出灰心槁形與世相忘臣竊以為國之元老歷事四朝耄期稱道為天下所服者獨文彥博與方平范鎮三人而已今彥博在朝鎮亦復用方平雖老杜門難以召致猶當加恩勞問表異其人以示二聖貴老尊賢之義今獨置而不問有識共疑以為闕典願因大禮之後以向者召陪祠不至特出聖意少加恩禮或遣使就問國事觀其所論必有過人臣忝備禁近不敢自外昧冒陳列戰越待罪元祐元年十月上時為翰林學士知制誥上哲宗乞許文彥博等辭避免拜蘇軾臣近奉聖㫖撰賜文彥博吕公著今後入朝免拜詔書今又准內降指揮撰不允彥博辭避免拜批答臣謹按禮經八十拜君命一坐再至所謂拜君命者𫝊命而拜非朝見也然且不免周天子賜齊威公胙曰伯父耄老無下拜公曰天威不違顔咫尺下拜登受所謂無下拜者拜於堂上非不拜也然且不敢鍾繇以足疾乘車就坐疑若不拜然亦無明文君前乘車豈足為法而馬燧延英不拜蓋是臨時優禮無今後遂不復拜之文祖宗舊例如吕端之流以老病進對亦止於臨時𫝊宣不拜今來彥博公著今後免拜指麾自是朝廷優賢貴老度越古今無可議者但臣是有司合守典禮兼恐彥博公著終不敢當以臣愚見不若允其所請若聖恩優閔老臣眷眷不已遇其朝見間或𫝊宣不拜足以為非常之恩臣忝備侍從懷有所見不敢不盡所有不允批答臣未敢撰元祐二年八月二十四日詔賜文彥博吕公著曰朕聞几杖以優賢著之典禮耋老無下拜書於春秋魏太傅鍾繇以足疾乘車就坐自爾三公有疾以為故事而唐司徒馬燧亦以老病對於延英詔使無拜今吾耆老大臣四朝之舊德隆而望重任大而憂深者唯卿與公著而巳方資其蓍龜之告豈責以筋力之禮今後入朝凡有拜禮冝並特免卿其專有為之報略無益之儀毋或固辭以乖朕意二十八日彥博等上章辭不拜恩命軾為翰林學士上此奏遂詔曰朕優禮師傅達德齒之尊以亟拜為可略古之道也卿謹嚴朝廷明君臣之分以不拜為未安禮之節也道並行而不悖義有重而難違勉徇所陳不忘嘉歎所請冝允仍詔公著以步履稍難自今每遇入朝特許令男一人入殿扶掖上哲宗乞聽文彥博以太師就第留備訪問范祖禹臣伏聞陛下已許文彥博求退降詔俟至中春議從所欲者彥博年八十五爵位已極唯是得解重任歸休私第乃其幸也陛下憫其過老以其纍請而從之為彥博身計私計則可謂美矣若為朝廷計則臣請試言之彥博為相四十餘年厯事四朝仁宗時為樞密宰相八九年先帝已加優禮許其致仕陛下嗣位復召而起之蓋藉其威名宿望以為朝廷之重也京師及四方軍民久服彥博之名以在朝廷則朝廷必重向若陛下不復召之則亦巳矣今既起之則不可使輕去朝廷彥博雖老精力尚强卧置京師足以為重外則西北二敵必懷畏憚夫以四海之大若常無事則人人皆可為大臣矣豈無萬一非常之慮哉彥博在朝非謂日月有用蓋備緩急或有時而用之耳當先帝之時足以容彥博間退今二聖垂拱委政大臣尤冝得老成之人以服天下之心詩曰雖無老成人尚有典刑言老成人重於國之典法也蓋以其經歷既多但問以纍朝之事所知尤勝他人况其别有所補哉今舊老唯彥博一人若去則其餘在朝者皆是後進無前輩矣老者任用之日不久國家所宜惜臣自聞陛下許彥博之去朝夕思慮竊謂陛下若欲彥博更得優逸但聽其解軍國重事以太師就第留之京師以備訪問不必再除致仕朝廷有貴老尚賢之美足以繫屬天下人心所補實多陛下進退元老臣不當預論議然臣職在侍從茍有益於國不敢不言惟陛下深留聖思更賜裁擇其劄子仍乞留中元祐五年正月上時為給事中宋名臣奏議卷七十
