body:
  text: 宋名臣奏議卷十九宋趙汝愚編君道門廣言路下上哲宗乞詔內外百官條陳本職及所經歷利害范純仁臣伏覩六月二十三日詔書應中外臣僚及民庶並許實封直言朝政闕失民間疾苦者有以見聖心求治之深也臣雖至愚不敢泯默竊以陛下方啓重熙之運布日新之政天下之人翹首以望至治固未覩闕政之可陳也所謂民間疾苦則陛下臨御之初聊整數事而百姓鼓舞歡呼者是也蓋近在畿輦之下事理著明者陛下得熟聞而更之其在僻遠幽微者則陛下莫得而聞矣固宜明詔求之廣也然中外臣民猶未能深副聖意極有所陳者蓋民庶之愚雖有疾苦不能自言唯舉人胥吏有能言者又以利害不切於巳而不言也臣僚則亦有不能言者矣或有所畏避而不言者矣有踈遠而謹靜者矣有怠於憂國愛人者昔未嘗言而今愧於言矣如此者皆不言也儻非陛下深詔執事及羣有司使各罄其所聞自陳於上則懼聖詔將為空文而天下之情終不能盡也蓋向來朝廷修立法度付之有司以施於天下固欲便民而益國也如慈父寄食哺兒意豈有不善哉而哺者無愛兒之心不量飢飽多少之節曰唯知哺之而巳不恤其他則兒不病而死者幾希矣今吏人行法者不恤民之利害惡欲曰唯知行法而巳不恤其他則宜其百姓疲弊而無告也然則郡邑之弊守令知之一路之弊職司知之茶鹽利害民兵刑法差役之弊提其局及受其害者知之邊防之弊守邊者知之伏望陛下特下明詔內則敇六曹四司九寺三監三師百司外則敇監司提舉提點邊臣牧守以至令佐監當曹掾各使條陳本職及所經歷之利害無或隱蔽曰某事利人益國可以興行某事煩密勞費可以簡省某事蠧害公私可以整革限一月內聞奏亦可因其所陳略知其人之才識然後陛下參命近侍與大臣審擇而行之流為霈澤被於萬方如此則朋龜獻兆庶績咸熙堯舜三代之政可不勞而成惟陛下留神省察特賜施行則天下幸甚元豐八年六月上時知慶州上哲宗論民封事乞降出施行司馬光臣伏見陛下詔開言路至今巳涉旬月必有臣僚民庶上言朝政闕失民間疾苦奏狀巳多未見有付外令三省或樞密院商量施行者如此則徒煩聽覽何所裨益昔漢昭帝時吏民上書言便宜有異輒下杜延年正處復奏先帝初即位詔中外上言得失亦令臣與張方平同詳定選擇可取者與元奏狀同進入內或降付三省樞密院施行臣竊計今來臣民所上文字其間是非臧否雖錯雜嘉謀長策不可謂無以睿明所燭諒毫髮無遺豈可一槩棄置全不采用欲乞選其可從者降出施行或以萬機之繁未暇遍加省覽即乞依臣前奏降付三省及執政官分取看詳擇其可取者用黃紙簽出再進入或留置左右或降付有司施行元豐八年七月上時為門下侍郎上哲宗乞早施行四方所言疾苦事王巖叟臣伏以陛下憂四方之疾苦而惻然下詔使人人得以自言甚盛德也四方之人承詔鼓舞爭以其情赴訴陛下延望至恩有踰飢渴臣竊謂陛下不問則已問之則必行之問而不行不若不問之為愈也蓋既問之則人人有必期惠澤之心或議者以謂事大而未敢決害小而不足行日復一日養患益深恐非陛下所以憯怛求言之意且懼四方之人謂陛下以空言恱之後日别有命令不肯取信朝廷此陛下臨政之初不可不謹者萬邦觀政在此一時伏望特留聖念早敕施行以副天下朝夕之望元豐八年上時為監察御史上哲宗論看詳臣民封事乞留備規戒或議施行司馬光臣聞舜明四目達四聰王者視四海之內皆如户庭閭閻之間皆如指掌然後能治其天下恭惟太皇太后陛下深居九重皇帝陛下富於春秋四海之廣大閭閻之微隱未嘗身親而目覩也非采聽臣民之言雖以天縱睿智之性何由知之陛下近詔天下臣民皆得上封事言朝政闕失民間疾苦仍降出令臣與諸執政官看詳其第一次降出者三十三卷臣謹與諸執政選擇其中除無取及冗長之辭外其可取者已用黃紙簽出進入訖伏乞陛下取簽出者更賜詳覽或留置左右以備規戒或付有司商議施行如此則忠言日進聰明日廣誠生民之厚幸社稷之盛福也嚮者執政請聽臣僚上殿陛下謙退以為國家政事多未習知臣僚欲言事者自有章疏何必上殿今臣民章疏舉集於前若非陛下勤加省覽則朝政闕失民間疾苦何由上聞國家政事無時而習知也其間亦有一事而衆人共言者臣亦重復簽出蓋欲陛下知天下所共患衆情所同欲也夫為政在順民心民之所欲者行之所惡者去之則何患號令不行民心不附國家不安而名譽不榮哉惟陛下斷志而力行之耳元豐八年八月上時為門下侍郎上哲宗乞養誠心以來諌王巖叟臣伏以社禝有安危天下有治亂羣生有憂樂繫人君措之何如爾夫以一身之寡而應萬機之繁以九重之深而察萬里之遠非諌諍以寄聰明於萬有使人人為我視物物為我聽則何以遂羣生之樂成天下之治保社稷之安哉然聽諫非難來諫為難來諫非難在誠心以好之誠心以行之而已矣百姓至愚也誠心則可以感四海至廣也誠心則可以達鬼神至幽也誠心則可以通天地至大也誠心則可以動而况於其餘乎人主茍誠心於好諌而誠心以行之則天下之人皆願以誠心告之惟恐其後爾惟恐其不至爾好名之君蓋亦未嘗不自以為好諌也然天下之善不至於前而天下之美不歸焉者何也無誠心以將之也無誠心以將之者患在蔽於有所偏好爾有所偏好則小人得乘間以進而君子之論遠矣小人固亦自以為能諌也特順其所好而補助之以為説豈諌也哉然其君自以為忠於我而日加親近曽不知所以説巳而成已之惡也君子之於諌直拂其意以攻其偏好而勉之於大道然其君或以為異巳而惡之甚者至以為謗巳而害之此安危治亂憂樂之所以分也臣以謂養誠心有道守之以至靜處之以至虛持之以至平行之以至公而不置毫釐他意于其間則誠心得矣誠心得則明明則是非不亂而忠邪判矣忠邪一分天下之治可坐而致也伏惟皇帝陛下始初清明聖德方進願養誠心以來天下之善不立偏好以杜小人乘間而使君子之論日聞于前天下幸甚社稷幸甚元豐八年九月上時為監察御史上哲宗乞於求言詔書內除去限百日指揮朱光庭臣伏覩元豐八年八月二十四日敕中書省檢會今年六月二十六日巳降詔書應中外臣僚民庶並許實封直言朝廷闕失民間疾苦自降詔後雖有奏到文狀數尚不多猶慮臣庶未盡奏陳八月二十三日三省樞密院同奉聖旨令開封并諸州軍各於要閙處出榜曉示如有所見疾速依前降指揮奏陳仍自元降詔書到後一百日外不在收接之限須至論奏臣竊以自古以來甚盛德之朝必兼天下之智以為聰明中庸曰夫婦之愚可以與知及其至也雖聖人有所不知焉詩曰先民有言詢于芻蕘故敢諌之鼓進善之旌誹謗之木皆所以通治道而來諌者也固未嘗限以日月伏覩六月詔書俾天下臣庶並許實封直言此盛德也必使知無不言而言無不盡然後與諌鼓善旌謗木之設初無以異若乃上之治底于無為下之人至於不議然博訪之道不可少廢况聖政日新方欲聞所未聞豈可於求言之始為日月限哉欲望聖慈復詔天下臣庶依今年六月詔書並許實封直言更不限以日月如此則輿情盡達朝政常無壅塞之弊而聖治可不勞而成矣貼黃所有昨來天下臣庶所言事臣未審朝廷曽與未曽採擇施行臣竊以謂執政大臣日以贊襄為事竊恐不能究觀天下直言章奏臣今欲乞將降詔後來并今後再許天下臣庶所言事並奏兩省官參詳內有可以施行者即具事狀條列聞奏取自朝廷指揮所貴下不徒言而上收實用元豐八年上時為右正言上哲宗論為君難不可不求言范祖禹臣聞禹戒舜曰后克艱厥后臣克艱厥臣政乃乂黎民敏德舜曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆捨巳從人不虐無告不廢困窮惟帝時克后克艱厥后者知為君難也臣克艱厥臣者知為臣不易也君知為君之難則不可不求言於臣臣知為臣之難則不可不極言於君如此則政乃治黎民化之敏於為德矣君知為君之難此孔子所謂一言而可以興邦也不知為君之難則所樂者惟其言而人莫敢違也夫為人君出言不善而人莫敢違此孔子所謂一言而喪邦也舜知此故答禹曰信如此則嘉言無所隱伏人臣得行其言則天下之士願立於朝故野無遺賢賢人皆在朝則萬國咸寧矣人君能盡天下之善言不遺天下之賢人又動必稽于衆捨巳以從人故能不虐無告皆得其所不廢困窮皆得其養惟帝堯能之禹以道陳戒故以此告舜舜以堯為法故以此答禹其要在於聽言用賢從衆愛民而巳臣今日所講孟子不敢勸齊王發粟以救飢則與此正相違齊王為民父母坐視齊國飢饉其民將轉死溝壑而孟子不敢復言譬之馮婦搏虎豈得嘉言無所伏哉臣觀齊王不忍一牛之死以羊易之非無仁心也然而不能推愛牛之心而愛民見牛將死則知愛之見民將死則不知愛是以民飢而不救此所以為不仁也齊人無以仁義與王言者孟子非堯舜之道不敢陳於王前孟子見之時少齊人見之時多譬如萌生之物一日溫之十日寒之雖欲其生豈可得哉此所為不智也齊王不仁不智由不能聽言用賢也昔仁宗謂輔臣曰如聞州郡嘗於夏秋之際先奏時雨霑足稼穡登茂後或災傷畏罪不敢以聞使民不得免賦租甚非長吏愛民之意乃著令不罪州郡吏而聽除民租又有奏水災過實者有司請加之罪仁宗曰州郡多奏祥瑞至於水旱之災或抑而不聞今守臣言墊壞官私廬舍意亦在民豈當加罪也仁宗聖心恤民如此若使孟子遇仁宗之時豈有不言者哉臣願陛下以舜禹之言為法以仁宗之心為心以齊王為戒知為君之難不可不求言求言不可不訪問使嘉言日聞賢人日進則四海生民幸甚仁宗故事伏乞常留聖覽元祐七年七月上時為翰林學士上徽宗論求言之詔未及舊弼陳瓘臣竊覩陛下近因日食詔許中外臣民實封言事天下之忠必自此而進矣然而求言之詔普逮於臣民而乞言之禮未加於黃耉竊慮耆德故老久去朝廷或在謫籍或巳得謝忠於徇國意欲有言泛然應詔則非舊弼之體密貢封事則有強聒之嫌若非聖問俯及隆謙示敬則黃耉之言或不樂告是以周家忠厚尊事黃耉秦穆改過復詢黃髮詩書所載聖主之所宜行也願因側身懼變之時明示養老乞言之禮必有嘉謨來助初政格王正事無先於此伏望陛下上稟慈闈議而行之天下幸甚元符三年三月上時為右正言上徽宗乞罷編類元祐臣僚章疏曽肇臣待罪右省伏見置局編類元豐八年五月巳後至元祐九年四月十二日終應干臣僚章疏及申請事件以給舍都司郎官兼領自紹聖二年冬置局至今巳及五年據本局人吏稱巳編寫一千九十册投進又各寫淨册納尚書省門下省訖見今書寫樞密院中書省淨册未曽申納續準中書省送下章疏約五百餘件見編類次臣以職事須至論列竊見祖宗以來臣僚所上章疏未嘗置局編寫蓋緣人臣指切朝政彈擊臣下皆是忘身為國不顧後禍朝廷若有施行往往刋去姓名只作臣僚上言行出文字所以愛惜言事之人不欲暴露使招怨怒若一二編録傳之無窮萬一其人子孫見之必成深隙祖宗以來未嘗編録意恐在此今所編録既非祖宗故事又有限定年月且元豐八年四月巳前上至國初元祐九年四月十二日巳後下至今日章疏何為皆不編録而獨編此十年章疏耶臣所未諭臣愚欲乞指揮將見寫樞密院中書省淨册量留書吏立限催促修寫了當外其續送到章疏更不編録只送中書省上簿收管其餘編節雜寫人等並各放罷所貴朝廷事體均一不至多留人吏枉費請給元符三年四月上時為中書舍人初紹聖二年十二月詔給舍都司官自元豐八年五月後至元祐九年四月十一日終應干臣寮章疏及申請事件逐名編類修寫成册申納三省後三日章子厚言三省巳得旨編類元祐以來臣寮章疏及申請文字密院亦合編類許將奏上乞便施行上從之置局凡五年至是始以肇言而罷上徽宗乞至誠終始納諌鄒浩臣伏讀虞書見舜命羣臣作股肱耳目而戒之曰豫違汝弼汝無面從退有後言夫面從以成其違者是諛也後言以指其違者是謗也二者非事君之道也有虞之臣皆大賢豈不知之舜且以此戒焉是知拂心忤意非人臣之所樂在於人君有以導之而巳此帝舜之聖所以為萬世法也臣愚切觀陛下即位以來憲天聰明首闢言路旋因日食亟降詔書咸使納忠無有忌諱言果當理欣然聽從增秩賜官風動天下故雖踈遠芻蕘之賤莫不鼓舞遭遇思日罄竭以補初政之萬一而况股肱耳目之寄又安有不盡其忠者乎帝舜之聖今復見於陛下然臣觀唐太宗乃近古明君魏鄭公且曰陛下貞觀之初導人使諌三年以後見諌者恱而從之比一二年勉強受諌而終不平質以其詳悉有據驗太宗悟曰非公無能道此者人苦不自覺耳於是知納諌固難而謹終尤為難也子思曰誠者物之終始也不誠無物伊尹曰終始惟一時乃日新彼太宗聞之而悟真大過人者顧不能持以至誠日新無敝使鄭公不得而窺焉則其去舜也遠矣陛下方稽古以御今如太宗之事亦願取以為鑒以隆太平之偉績臣又伏思上書之人所言不一其泛論大體指陳邪正如此類者自可留之禁中以備觀覽至於陳述利害事干有司者即乞降付政府委官看詳有可施行旋具聞奏此則聖詔之出不為空文施之國家固非小補唯陛下留聽元符三年四月上時為中書舍人上徽宗乞法英宗旌賞直言曽肇臣伏見陛下發德音下明詔使人直言無有所諱此堯稽衆舜好問之盛德先王立謗木諌鼓詩人詢于芻蕘之誼也天下幸甚臣竊以謂陛下惻怛詢訪之誠心既巳形於號令則其於開導奬激使人樂於盡忠獻納亦須有術况詔書巳有其言可用朕則有賞之文則宜實其言以信天下臣伏聞治平四年英宗皇帝踐祚之初即求直言尋又下詔上書人所陳政體時務材識出衆者命官特加甄擢其次則賜詔書奬諭布衣即令有司召問條對有理量材録用當時咨謀勸誘如此其詳至有朝上書暮召對者是以四方萬里人人奮勵爭竭腹心唯恐在後神宗皇帝廣覽兼聽片善必收寸長必録斟酌損益以修政事故熙寧元豐十九年間百度修舉功崇業巨雖聰明睿智出於聖性亦虛心採納羣言之助也臣愚伏願陛下明諭輔臣討尋治平四年之令舉而行之其上書言事有合聖意者速加旌勸則遠近聞之孰不感激智者效其計忠者獻其誠陛下不出戶庭而海內之情畢聞於上不勝幸甚元符三年上時為左正言上徽宗論太學生不當以言事殿舉鄒浩臣準中書省刑房送到録黃一道為太學生張寅亮等妄言裁減皇太后園陵浮費各殿一舉事臣尋觀寅亮等所上書其言狂謬固當懲戒以示天下緣士大夫巳在選擢而詳練滋久者尤有不能體悉朝廷用意之深况山野一介布衣之賤乎陛下察其無知特從輕典又且追改屏出學押出門指揮則是寅亮等固已在所矜容矣止殿一舉誠不為過但近年以來言路壅塞為時大弊自陛下勸奬開導始克通達世以相賀獲仰太平今寅亮等若未免殿舉竊恐自此以後人復畏避不敢獻言天下之事無由周知亦聖政所當深慮者也傳不云乎烏鳶之卵不毁而後鳳凰集誹謗之罪不誅而後良言進臣愚亦願陛下以此赦之而已所有録黃臣未敢簽書行下建中靖國元年三月上時為中書舍人上徽宗論太學生不當以言事殿舉上官均臣聞聖人擇狂夫之言好問至於芻蕘者樂於聞善也誹謗之罪不誅者欲以來直言也蓋君臣之勢隔如霄壤進言直則有犯分之嫌持論髙則有出位之罪畏嫌避罪則愛身者熟視拱默而不敢論矣政事有闕偷安固祿而不敢論則九重之奧萬事之機安得聞歟賈山有言人主之威非特雷霆勢重非特萬鈞開道而求諌和顔色而受之用其言而顯其身士猶恐懼而不敢自盡况震之以威壓之以重豈有不摧折者如此則人主不得聞其過失矣聖人知盡言之難也故賞諌臣以厲諛恱之臣貸狂直以開正直之路使工誦針諌瞽誦詩諌公卿比諌士傳言諌庶人謗於道商賈議於市所以集天下之善而成巍巍之功也自陛下即位之初開廣言路虛懷開覽擇其可用者賜官增秩以奬其言四方之士歡欣鼓舞人人出其所長發其所藴露章抗疏幾無虛日陛下神明天縱道術精微固所自得至於政事之臧否人臣之邪正法宫之奧纎悉洞照者殆亦收覽衆言之助也臣以為進士殿舉比士大夫貶官非輕罰也張寅亮等踈愚狂瞽誠不識朝廷忌諱然志非懷邪比庶人謗於道可也今被之以重罰疑非陛下開廣言路之意臣竊妄度陛下聖度容納非加怒於無知之小臣特以其言有及執政之意言涉犯分故稍正刑罰以明上下之體然四方之遠難以戶曉必以為陛下前日許中外之人得上封事既招其來又罪其言前日賞之今日罪之妄意朝廷有厭言之意自中人以下安寵顧利政事之有闕往往趦趄畏縮而不敢正議矣且加罪一二進士固未足惜竊恐沮直臣之氣鉗多士之口自此始矣臣以為狂言犯分貸而不罪其為害輕誅責賤士以沮直言其為害大臣願陛下揆之聖心權其輕重更加矜容以稱陛下初政之意以解四方之疑天下幸甚建中靖國元年二月上時為給事中上徽宗乞養直臣以素江公望臣聞漢武帝殺人如剃草而汲黯數以直見不少降帝終下之黯在朝淮南之謀為寢一戇直之臣甚微而朝廷輕重繫焉是以養之不可不隆聽之不可不察去之不可不謹今朝廷以言得譴不過黜官去國而巳然未聞有汲黯之切直何也蓋養之不素未必充其才既充其才遇之未必盡其禮禮或加厚聽之未必察其情去之未必當其罪以人君之威逐一小臣不啻若怒飇之振稿翩翩然徑逝矣而不知適以資讒諂囁嚅相賀之語也傷君之明喪臣之直無甚於此自昔人君之明廣大度以優容虛誠心而延佇推內恕以假借忍難行而聽納所以養成人臣之直故其進諌也無首鼠之疑謀有批鱗直前之勇氣事無不聞理無不盡上無過舉下無逆情姦人破膽黠吏縮手民賊屏迹國狗希鳴蹇直之氣日益尊矣故曰茍得其養無物不長茍失其養無物不消陛下德度宏博出於天性羣臣進諌涉狂未嘗誅戮復加優賚天下之士孰不欲為陛下盡忠況在言責者乎傳曰興王賞諌臣逸王罰之信斯言也然臣聞唐太宗貞觀之時導人使諌三年之後諌者恱而從之又一二年勉強受諌而終不平蓋受難堪之言常在於慷慨願治之初必厭於玩習巳安之後漢武帝剛忍之主也而有容直之得唐太宗強明之君也而卒有怠惰之失相去逺矣惟陛下覽焉建中靖國元年五月上時為右司諌上徽宗乞闢衆正之路開不諱之門李光臣聞帝王之美莫大於詢謀治安之時尤先於警戒歷觀前世有為之君雖聰明有餘而切直之言不絶於耳雖天下大治而幾微之念不忘于懷恭惟陛下以睿智寬仁之資膺祖宗積纍隆平之業勞心求治幾三十年華夏乂安天地交泰符瑞之應史不絶書所謂太平盈成之期實在今日陛下所當憂勤宵旰虛巳以聽納羣臣所宜精白勉勵夙夜以戒近嵗以來士大夫狃於因循安於寵祿諛佞成風至妄引荀卿有聽從無諌諍之説以杜塞言路多士盈庭莫敢開説是陛下有容納之德羣臣進拒絶之計朝政之闕失臣下之姦邪生民之利病海內之休戚何由盡聞乎古人有言堂上遠於百里堂下遠於千里門庭遠於萬里蓋言壅隔之禍深也臣愚伏望陛下博延羣臣明詔天下闢衆正之路開不諱之門使忠良蹇諤之士有所規益而讜言進傾邪讒巧之徒不壅塞而下情通實天下幸甚宣和六年閏三月上時為司封員外郎王黼見其奏而惡之送吏部差知陽朔縣上徽宗論學校謗傷事許翰臣聞萬人所聚必有公言傳曰防民之口甚於防川大決所犯傷人必多是以監謗而衰周亂禁言而強秦亡無逸之訓曰小人怨汝詈汝則皇自敬德不啻不敢含怒此疏川而導之之術也昔者鄭人遊於鄉校以議執政之善否或謂子産盍毁鄉校子産曰其所善者吾則行之其不善者則改之是吾師也毁之何為國家自王安石持矯拂世俗之説流弊至今其患可見陛下方將公聽並觀力矯此弊優容受納務盡羣情前日宰相吳敏留李邦彥止是避嫌分謗因以鎮撫士民而或者未達其心謂為力排公議或私相譏謗責臣不言臣謂但使朝廷德日以勝則此等疑論自當衰熄竊聞臺臣論奏學校謗傷宰相等事臣恐陛下遂行其言則將使忠鯁杜塞譏毁不聞朝廷蔽蒙復如前日此亂亡之機也不可不審伏望聖慈勿下其奏以來四方之言而通天下之志靖康元年二月上時除御史中丞上欽宗乞官陳東還吳若舊職余應求臣仰惟陛下聖度如天容受忠讜之言未嘗少拒雖舜之好問禹拜昌言不過是也又取其尤者而爵賞之導人使言凡有知識孰不竭愚畢慮以貢芻蕘之萬一哉近者太學生陳東首為忠言獻之闕下皆國家大計人所難言姦佞惡之肆為浮言以誤天聽學官承指幾欲屏斥非賴聖明獻忠者身幾危矣太學生吳若數上書議論不撓言事者以為鼓唱諸生是致朝廷亦行罷黜如此則何以來天下之言伏望睿斷賜東一官還若職以昭陛下容受忠讜之心靖康元年上時為監察御史上欽宗乞官陳東陳公輔臣竊惟陛下臨御之初詔求直言而太學諸生皆上封事陛下不倦聽覽又從而官之如張炳雷觀是已古者聽納之君雖堯舜禹湯不能過也然諸生竊有疑焉以謂陳東之書遠勝炳觀陛下不官東而官此二人非唯諸生不平炳與觀亦固厚顔矣臣竊思之陛下必謂東不當伏闕上書以致百姓紛亂夫東固未嘗與百姓也李綱之罷東以忠義感奮恐其言不能上聞故率諸生伏闕爭之不謂是日百姓亦來臣詢之諸生皆曰方李邦彥等退朝百姓皆詬罵東與諸生力遏之既而百姓喧譁東皇恐憂懼面若死灰遽欲退避而百姓遮擁求出不得然則東豈有意率百姓為亂哉臣觀東非唯學問淹該善論天下事亦忠誠奮發之士陛下若用之於朝必能有為議者又謂東書深詆李邦彥而大臣有庇邦彥者不欲陛下官之如是則陛下欲以公議用人大臣以私意沮之也安能免人之言哉臣願陛下不惜一官以勸盡忠之士以慰太學諸生之心實天下幸甚臣職在言責茍有所聞不敢默默惟陛下察之靖康元年上時為右司諌宋名臣奏議卷十九
