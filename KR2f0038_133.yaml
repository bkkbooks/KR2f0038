body:
  text: 宋名臣奏議卷一百三十三宋趙汝愚編邊防門遼夏五上仁宗論范仲淹答元昊書孫沔臣伏自前月以來聞中外言昊賊使髙延德持書至延州有歸伏朝廷之意范仲淹以書諭之令去僣號方可納欵仍聞大臣頗有異議或言忠義可賞者或言專命可戮者此數人皆平斷天下事何是非智識其相逺悖如是又臣寮上言者多相矛盾竊恐衆論紛撓以致惑亂視聽臣曉夕思之未知孰得今偶有所見揣昊賊情僞之計原邊臣得失之謀其理有三敢悉陳之萬一上合聖聰亦愚人之極慮也一者以西陲蕃戶久來貿鬻羊馬藥物嵗數百萬至于米鹽飲食皆取資於內地自昊賊背逆凡二年謹察邊方禁絶交易彼又驅率鬬戰殺害父子量其蕃族怨望者衆矣今忽來歸順者蓋知中國必未納其姦謀將紿其族類必曰我為爾請和通其有無朝廷未允耳此將以激怒其衆使為邊患也二者近聞昊賊入冦涇原騎十餘萬此亦慮我知其盡鋭離於巢穴而以别路攻其不備故使延德僞來貢欵而緩我鄜延一路之兵也三者范仲淹夙負時望多士歸慕今處邊任得將士心軍民受賜夷狄所聞故昊賊未測其才謀因用延德為反間以謀撓我師使疑而退黜之賊得其計矣臣又謂仲淹移書有利害者三焉一者賊請歸欵以我不許為激衆之謀今仲淹答而許之則賊之䇿不得行此亦我權其利也二者賊以計緩我鄜延一路入攻之兵則我本無深討之䇿雖其詐來之意于邊境之慮亦無害也三者賊謀撓我師而仲淹答其書雖於軍政無損實亦自蹈危機今大臣果責其專命或言其可斬者若有姦謀深利此言使賊知之因致悖慢之言僞為交結之意起市虎拾塵之說設並馬草具之事冀朝廷疑仲淹而朋比有嫉害者從而媒蘖之大則受誅滅之罪小則必竄逐其身使國家一朝失賢三軍無帥去邊地之長城開賊衆之大路此實可憂之甚者也臣又見前嵗王德用被罪廢黜本其事發之因亦由臣寮以䜟記之言形貌之肖章奏交上何止於三使曾參被殺人之名而不得自明也蓋德用至公之節得軍中之情有總統之望為逺人所知驟獲憂疑忽然廢棄使邊鄙無大將而朝廷終不敢起德用豈非昊賊以密謀挾邪而中害良善也今仲淹盡誠許國立義忘軀獨處逺徼不顧危亡求之品流罕有倫擬在陛下聖哲推其本心令得盡節則天下之幸也臣恐昊賊即設姦計復答其書矯陷仲淹暗合臣說則望陛下念之以辨其詐使賢材不為賊所欺逐則夷狄亡滅立可俟矣或曰蕃冦小醜安有逺圖臣對曰預備則無患過慮則少失若昊賊實欲歸欵料之雖過于事無損即如前嵗賊使六十餘人峨冠變服託以貢奉宣言僣稱之意時宰執謀議固無異術但下詔削奪遣還而唯知制誥吳育上言以聖朝太平既久兵戰不習乞且因而撫之然後備邊練將以議攻取為便當日柄臣皆誚其怯今二年連陷將帥覆沒兵衆豈復可以小冦待之然欲行吳育之䇿而未能也况仲淹以書移賊自是閫外事宜若昊賊因而歸順亦國家軍事之利于朝廷有何纍哉今韓琦督戰無功敗軍殺將尚不欲黜削恐傷國體况仲淹以計䇿或有得失且於事未有大過豈宜輒加其罪諒陛下神幾聖斷盡在䇿中不待言而後知也臣與琦仲淹皆故舊深知今論事之際必盡公言決安危之計非愛憎之心也伏望陛下萬幾之暇乙夜詳覽幸甚慶歷元年上時為右正言上仁宗論邊機軍政所疑十事張亢臣伏以太平日久人不知兵元昊反逆以來民力凋弊而邊機軍政措置未得其宜今輒陳臣之所疑者十事臣切謂王師每出不利豈非節制不立號令不明訓練不至器械不精或中賊之詭計或自我之貪功或左右前後自不相救或進退出入未知其便或兵多而不能用或兵少而不能避或為持權者之所逼或因懦將之所牽或人馬困飢而不能奮或山川阻險而不能通此皆將不知兵之弊也未聞深究致敗之由而處置之雖徒益兵馬亦未見必勝之理臣之所疑者一也去春賊至延州諸路發援兵而河東秦鳳各踰千里涇原環慶不下十程去秋賊出鎮戎又遠自鄜延發兵且千里逺鬬豈能施勇如賊已退乃是空勞師徒異時更冦別路必又如此不戰而自弊臣之所疑者二也今鄜延副總管許懷德兼環慶軍馬環慶副總管王仲寶復兼鄜延其涇原秦鳳總管等亦兼鄰路雖令互相䇿應然環州至延州十四五程直路亦不下十驛涇原至秦州又逺于此若一處有事自此發兵赴援而山路險惡人馬已困欲責其功何可得也臣所疑者三也四路軍馬各不下五六萬朝廷盡力供億而邊臣但言兵少每路欲更增十萬人亦未見成功之效且兵無節制一弊也無竒正二弊也無應援三弊也主將不一四弊也兵分勢弱五弊也有此五弊如驅市人而戰雖有百萬亦無益于事臣所疑者四也古之教習須三年然後功成今之用兵已三年將帥之中孰賢孰愚攻守之術孰得孰失纍年敗衄而居邊要者未知有何謀設更數年或未罷兵國用民力何以克堪若因之以飢饉加之以師旅安危之策未知何如臣所疑者五也今言邊事者甚衆朝廷或即奏可使定奪以聞或劄下逐處或不令下司前條方遂施行後令復即衝改胥吏有抄録之勞官員無看詳之暇邊防軍政一無定制臣所疑者六也夏竦陳執中皆朝廷大臣凡有邊事皆付之不疑今但主文書守詔令每有宣命則翻録行下如諸處申稟則令候朝廷指揮如此則何必以大臣主事所疑者七也前河北用兵減冗官以省費今陕西日以增員且如制置青白鹽使副招撫蕃落使臣等十餘員所占兵士千餘人請給嵗約數萬緡復有都大提舉馬鋪器甲之類又諸州一例招到新兵克敵制勝保捷廣鋭宣毅等指揮久未教閲但費軍廪無益邊備臣所疑者八也國家竭財用以贍軍士有手藝者管兵之官每一指揮抽占三人一如延州諸將不出即有兵二萬餘五千守城之外其餘正兵萬五千若有事宜三日內不能團集况四十里外便是賊境一有奔衝緩急何以支梧臣所疑者九也陕西教習鄉兵共十餘萬人其中無賴之輩名挂尺籍心薄田夫豈無姦盜雜於其中茍無措置它日為患不細臣所疑者十也乞暫許臣赴闕面陳利害如臣狂率不可用即行降黜慶歷元年七月上時為鄜延路都鈐轄知延州上仁宗乞因郊禋肆赦招懷西賊張方平臣伏以前景祐五年有事于圓丘西戎貢職不至始發釁端次年春遂稱兵犯邊殺掠吏民邊將備禦無䇿賊數入冦輒以勝歸濟其凶謀氣焰益盛今日陕西四路河東麟府逺近屯戍輸挽供給天下為之勞弊而解嚴息甲未可以日月期也臣嘗問自邊來者詢賊中事蓋今羌戎乃漢唐郡縣非以逐水草射獵為生皆待耕穫而食賊每㸃集資糧器用人自為備須嵗年為計乃能一大舉雖破城寨不能得我寸土也而又絶其俸賜禁其互市賊中尺布直錢三百邊防守備繕修益固賊情見勢屈自當改圖然猶騎虎不可復下雖有悔心亦何由自通誠欵朝廷雖欲招來若非時無名事亦難舉儻因今來郊禮覃慶之故特開曠蕩之恩示以綏懷之意或特降一詔或著之赦書其辭意大略則曰夫王者以天下為度含生之類罔不亭育况朔方靈武河西五郡聲教所暨莫非王民頃自德明已來克保外臣之節朝廷眷待恩禮至隆去年元昊遣使人來稱為本蕃推戴緣其附順三十餘年忽此奏陳不無疑駭見情未審遂至興兵使邊人不寧師徒暴露今親郊上帝盛禮告成慶賜溥行囚繫盡釋乃眷西顧惻然軫念虧於撫育吾甚傷之今後夏州或有使人至者候人不得遏絶或有願通於朝廷之意即令邊臣受而上聞且泛告邊臣以謹守封略罔或生事令榜而揭諸塞上或邊臣之有威望者遣單使以朝㫖往為開諭足彰陛下德義之厚無損朝廷威重之體且賊妄自尊大於巢窟中久矣王者固宜以鳥獸蓄之豈足與之辨名器等威之分哉賊若有悔禍之心稱藩納貢陛下優為封爵名號以服擾之出府庫之餘以嵗時豢餌之使天下知陛下深謀逺慮為生靈計至于天地鬼神亦當助仁而佑順仁者無敵於天下况一賊歟若賊悍然自恃凶愎不移亦足以驕怠彼心激怒我衆邊臣必曰天子之恩愛如此賊無革心我不可以不奮身而為國致討矣戰士必曰天子不以賊之不義而必窮誅是哀吾屬之久戍也今賊無革心吾屬不可以不效命鬬戰矣自邊之人至于天下之民必曰天子所以赦賊蓋念賦役之煩擾吾人之困勞今賊無革心吾人不得不竭力以奉邊矣賊黨必曰天子幸加恩而不我誅也而其主茍不思焉是驅我於鋒刃之下以濟其欲而已夫兵猶火也不戢將自焚使我怒彼怨賊有自焚之勢則成敗有所分矣今言者聞臣之說必難臣曰賊自入冦無不尅何困之有今雖招懷之徒示國之弱賊肯革心乎臣請對曰昔遷賊之為邊患也號為驍悍有謀略者陷朔方靈武國家喪地且千里而其衆亦大弊爾時繼遷雖不為六谷所殺勢亦不支矣故其死時戒德明曰爾當傾心歸順朝廷如一兩表未蒙開納但連上封章以祈見聽故德明欵附畢世不渝今賊非遷比也不幸自其初叛而我守邊匪人是故賊纍得志而其衆嗜為冦之利向使我無大敗彼無大獲而以賊之虐用其下尋應疲潰矣今朝廷處畫邊事守遏益固將卒用命財用不乏雖未能大殘其衆姑使來無所掠獲即賊自窮蹙今先開其歸路以為後圖縱賊未懷於國何損必又難臣曰賊雖致欵戎心可保乎即有其實邊備得以徹之乎臣請對曰昔景德初契丹大入河朔先帝親駕北狩于澶淵虜主始遣使議通和好俄又其統軍達蘭中伏弩以死和議遂定于時邊陲可保戎心徹警備而謂繼好至今之堅乎在朝廷所以撫納控馭而已今事邊之費嵗且千萬用師以來係纍殺戮幾千萬人故自古以來論邊事者莫不以和戎為利征戎為害蓋深念此也伏願陛下延召二府大臣試詳此議儻蒙採聽則生民之福實所繫賴慶歷元年十月上時知諫院上曰此吾心也命方平以疏付中書吕夷簡讀之拱手曰公言及此社稷之福也上仁宗攻守二䇿范仲淹臣竊觀西事已來每議攻守未見適中或曰必行進討以期平定臣謂諸路進討則兵分將寡氣不全盛絶漠風沙迷失南北饋運輜重動有抄掠賊之巢穴敻阻河外非竒將不能襲至若冦邊常併兵來擾一路每有朝㫖令入界牽制其如將帥方略非有素定茫然輕進不知所圖但求虛弱之處以剽竊為功既不能大振兵威固不能少分賊勢此進討牽制之無效也或曰宜用守䇿來則禦之去則勿逐臣觀今之守邊多非土兵不樂久戍又無營田必煩逺饋久戍則軍情危殆逺饋則民力將竭嵗月綿久恐生他患此守禦之未利也臣荷國重寄曾無寸勞夙夜營營思有所補而才疏迂昧終無發明今採邊人而成末議固不敢謂其可用亦不敢望其必行在朝廷以衆議參之擇其可否如無所取乞賜寢罷今具下項攻守之議依聖㫖指揮交付梁適齎回赴闕議攻臣謂進討未利則又何攻臣切見延安之西慶州之東有賊界百餘里侵入漢地中有金湯白豹後橋三寨阻延州慶州經過道路使兵勢不安䇿應迂逺自來雖曾攻取無招降之意据守之謀漢兵才回邊患如舊臣謂西賊更有大舉朝廷必令牽制則可攻之地其在于此可用步兵三萬騎兵五千鄜延路步兵一萬二千騎兵三千涇原路步兵九千騎兵一千環慶自過馬步一萬除官軍外蕃兵更可七八千人軍行入界當先布號令生降者賞殺降者斬得精强者賞害老幼婦人者斬拒者併力以戮之服者厚利以安之逃遁者勿追疑有質也居者勿遷俾安土也乃大為城寨以据其地如舊城已險而增修半守地則别擇要害之處以錢召帶甲之兵熟戶强壯兼其士役作奉朝㫖令修緣邊城寨臣以兵方檣事將縣官間雜錢并勸令近上人户以雇夫錢散與助土兵士食錢其帶甲兵士翕然情願諸寨並以畢工俟城寨堅牢當留土兵以守之方諸舊寨必倍其數使范全趙明以安撫之范全令為麒麟副使慶州北都巡檢趙明令為東頭供奉官柔逺寨都巡檢使必嚴其戒曰賊大至則明斥堠召援兵金湯東去德靖寨四十里西去東谷縣六十里西南柔逺寨八十里白豹西去柔逺寨十里南去慶州一百五十里堅壁清野以困之小至則扼險設伏以待之居常髙估入中及置營田以助之如此則分彼賊勢振此兵威通得延慶兩路軍馬易於應援所用主兵官員使臣勇夫身死者居其前王信狄青劉拯范全劉貽孫張建侯可用䇿應者居其次任守王信達王遇王文張宗武談嘉震王守思使臣中可當一隊者參於前隊張信張忠郭逹張懷忠有心力幹事者營立城寨周美張璨李緯楊鄜劉兼濟張繼勳臣觀後漢段紀明以騎五千步萬人車三千兩錢五十四億三冬三夏大破諸羌又觀唐馬燧引戰車行則戴甲兵止則為營陳或塞險以遏奔衝臣以此路山坡大車難進當用小車二十兩銀絹錢二十萬以賞有功將吏及歸降蕃部并就糴芻粟亦稍足用其環州之西鎮戎之東復有胡蘆泉一帶蕃部與明珠滅藏相接阻環州鎮戎經過道路明珠滅藏之居北接賊疆多懷觀望又延州南安去故綏州四十里在銀夏川口今延州兵馬東渡黃河北入嵐石却西渡黃河倒來麟府䇿應蓋以故綏州一帶賊界阻斷經過道路已上三處內鄜府一路臣不曾到彼更乞下本處訪問及畫圖即見山川道路次第也如此取下一處城寨平定則更圖一處為據守之䇿比之朝去暮還此稍為便穩議守臣觀西戎居絶漠之外長河之北倚逺恃險未易可取建官置兵不用祿食每舉衆犯邊一毫之物皆出其下風集雲散未嘗聚養中國則不可逺戍之兵久而不代負星霜之苦懷鄉國之望又日給廩食月給庫緍春冬之衣鞋饋輸滿道不絶國用民力日以屈乏軍情愁怨須務姑息此中原積兵之憂異於夷狄也臣謂戎虜縱降塞垣鎮守當務經逺古豈無謀臣觀漢趙充國興屯田大獲地利遂破先零魏武於征伐之中令帶甲之士隨宜墾闢故不甚勞大功克舉數年之中所在積粟倉廩皆滿唐置屯田天寶八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸侯以其利而利之使食其地之毛實役其人民之力故賦稅無轉徙之勞徭役無怨曠之嘆臣昨在延州見青澗城种世衡言欲於本處漸興田利今聞僅獲萬石臣觀今之邊寨皆可使弓手土兵以守之因置營田據畝定課兵獲羡餘中糶於官人樂其勤公收其利則轉輸之患久可息矣且使其徙家寨下重田利習地勢顧父母妻子而堅其守比之東兵不樂田利不習地勢復無懷戀者功相逺少田處許蕃部進納荒田以遷資酬奬或量給與價直儻朝廷許行此道則委臣舉擇官員約古之義酌今之宜行於邊陲庶幾守愈久而備愈充雖戎狄時為邊患不能困我中國此臣所以言假土兵弓手之力以置屯田為守利也然臣觀前漢髙帝之盛中有蕭張決勝千里下有百戰之師以四十萬人之衆困于平城乃約丐奴和親至髙后文景代代如之不絶其好而丐奴屢變往往犯塞殺戮吏民不勝其酷至于書問傲慢下視中國而人主以生民之故屈已含容不為之動孝文即位將軍陳武請議征討以益封疆孝文曰兵凶器也雖克所願動必耗病謂百姓逺方何今胸奴內侵軍吏無功邊民父子荷兵日久朕動心痛傷何日忘之未能銷距願且堅兵設候結和通使休寧北陲為功多矣且無議兵故百姓無內外之徭得息肩於田畝天下富實雞鳴犬吠烟火萬里可謂和樂者乎司馬遷以文帝能和樂天下協于大樂故著于律書為後代法臣謂國家用攻則宜取其近而兵勢不危用守則必圖其久而民力不匱然後取文帝和樂之德無孝武哀痛之悔則天下幸甚慶歷元年十一月上時知慶州詔答曰將帥纍次挫衄未甚勇果若幸於或勝恐未為良籌假令克獲又須守備若且勤訓練嚴加捍禦逺設探候制其奔衝見利而進觀釁而動庶可養鋭持久即宜深體此意與鄰路互相應援叶心畢力有便宜密具以聞上仁宗再議攻守范仲淹臣切維國家太平日久而一旦西戎背德陵犯邊鄙公卿大夫爭進計策而未能副陛下憂邊之心且議攻者謂守則示弱議守者謂攻必速禍是二議卒不能合也臣前至延安所謂復諸寨為守禦之備次則幸其休兵輒遣一介示招納之意朝廷以羣言之異未垂采納今臣領慶州日夜思之乃知攻有利害守有安危何則蓋攻其逺者則害必至攻其近者則利必隨守以土丁則安守以東兵則危臣謂攻逺而害者如諸路深入則將無素謀士無素勇或風沙失道或雨雪彌旬進則困大河絶漠之限退則有乘危扼險之憂臣謂攻近而利者在延安慶陽之間有金湯白豹之阻本皆漢寨陷為賊境隔延慶兵馬之援為蕃漢交易之市姦商往來物貨叢聚此誠要害之地如別路入冦數百里外應接不及則當逺為牽制金湯白豹等寨可乘虛取之因險設陳布車橫塹不與馳突擇其要地作為城壘則我無不利之虞至于合水華池鳳州平戎柔逺德靖六寨兵甲糧斛可就屯泊固非守備之煩也環州定邊寨鎮戎軍乾興寨相望八十餘里二寨之間有胡蘆泉今屬賊泉為義渠朝那二郡之交其南有明珠滅藏之族若進兵據胡蘆泉為軍壁地斷賊路則二族自安宜無異志又朝那之西秦亭之東有水洛城亦為之限今䇿應之兵由儀隴二州十驛始至如進修水洛斷賊入秦亭之路其利甚大非徒通四路之勢因以張三軍之威也臣謂守以土兵則安者以其習山川道路之利懷父母妻子之戀無久戍之苦無數易之弊臣謂守以東兵則危者蓋費厚則困于財戍久則聚其怨財困則難用怨聚則難保民力日窮志日離他變之生出于不測臣所謂攻宜取其近而兵勢不危守宜圖其久而民力不匱招納之䇿可行于其間今奉詔宜令嚴加捍禦觀釁而動與鄰道協心而共圖之又覩赦文謂彼無驕動則我不侵掠臣恐賊冦一隅逺在數百里外應援不及須為牽制之䇿以沮賊氣至時諸路重兵豈能安坐如無素定之畫又無行營之備恐當牽制之時茫然無措雖見利而莫敢進觀釁而莫敢動冦至愈盛邊患愈深叛亡之人日助賊算不可不大為之謀也願朝廷于守䇿之外更備攻術彼冦其西我圖其東彼冦其東我圖其西寧有備而不行豈當行而無備也所謂備者必先得密㫖許抽將帥便宜從事并先降空名宣敇之類恐可行之日奏請不及臣前曾遣人入界通往來之問或更有人至不可不答如朝廷先降密㫖令往復議論嵗年之間當有成事若謂邊將之恥未雪而不欲俯就臣恐諸路更有不支其恥益大賊或潜結諸蕃并勢合謀則禦之必難且兵馬精徑西戎之所長也金帛豐富中國之所有也禮義不可化干戈不可取則當任其所有勝其所長此霸王之道也臣前知越州每嵗納稅絹十二萬和買絹二十萬一郡之入凡三十萬儻以啖戎是費一郡之入而息天下之弊也慶歷二年正月上時知慶州上仁宗論范仲淹攻守之䇿龎籍臣近奉詔詳范仲淹所上攻守之策及范仲淹近遣本州推官張問至具述延慶之間合力出兵之議臣竊謂敵衆之舉齎糧不過十日而利于速戰短于攻城彼攻我城則常多死傷我速與戰則屢成挫衄若諸寨有樓櫓矢石芻糧水泉之具即委之使攻既齎無久糧野無所掠就使十日不退我以重兵乘之觀釁而動誠得全師禦戎之體萬一它路力不能支須至用仲淹之䇿然由德靖出師路沿洛河涉春泥濘步騎難進若久留賊界人心多搖川谷之險皆可以邀擊我軍意外之慮恐不能盡如豫算或冦深入患大亦不免與仲淹合謀而入擇地而攻也仲淹所陳守用土兵則安東兵則危今土兵之數無多而難於招募東兵亦未可去也且當撫馴訓練興營田減冗費為持久寬民之計賊來則力禦之有隙則間之以俟其弊且西羌之俗嵗時以耕為事略與漢同近年屢有㸃集人多失業每入冦邊郡計其掠獲僅足償所費人尚不多若堅壁清野使無所得則勢益窮心必益怨嵗月之間釁變必生心危勢動然後招納之䇿始可行焉仰料朝廷固不吝財貨以安方隅但深思極慮事體有大于此者耳慶歷二年二月上時知延州上仁宗備邊六事賈昌朝臣竊惟太祖初有天下鑒唐末五代方鎮武臣土兵牙校之盛盡收其權當時以為萬世之利及太宗所命將帥率多攀附舊臣親姻貴胄賞重於罰威不逮恩而猶仗神靈稟成算出師禦冦所向有功自此已來兵不復振近嵗因恩幸子弟飾厨傳沽名譽不由勳效坐取武爵者多矣其志不過利轉遷之速俸賜之厚爾禦侮平患何望于兹然乘邊鄙無事尚得以自容昨西羌之叛驟擇將領鳩集士衆士不素練固難指縱將未得人豈免屢易以屢易之將御不練之士故戰必致敗此削方鎮兵權過甚之弊也且親舊恩幸已任軍職者便當為將兵謀戰法素不知曉一旦付千萬士卒之命使庸人致之死地此用親舊恩幸之弊也臣謂守鎮之地無數更易管軍并刺史以上官秩宜審其所授以待有功如楊崇勳李昭亮輩恩幸之人尚在邊任宜速別擇人代之此臣所陳救弊之端也方今備邊之尤切者凡六事其一曰馭將帥古帝王以恩威馭將帥于內將帥以賞罰馭士卒于外故軍政行而大功集乾德中詔王全斌等伐蜀是冬大雪太祖皇帝著暖帽被貂裘御講武殿氊幄顧左右曰今日此中寒不能御况伐蜀將士乎即脫所服裘帽遣中使馳騎往賜全斌此御以恩也又曹彬李漢瓊田欽祚等討江南召彬立于前漢瓊等立于後授匣劎曰副將而下不用命者得以專戮之漢瓊等股栗而退此御以威也今命將帥心先疑二非近侍不信非姻舊不委錫與金帛巨萬而心無感悅者以例所當得也蓋向來錫與一皆用例如舉兵之際須特出非常然後可以動其心也又陕西四路自部管而下鈐轄都監巡檢之屬軍政必相參謀計之未成事已先漏彼可則我否上行則下戻雖有主將不專號令故動則必敗也請自今命將去疑二推恩意捨其小節責以大效爵賞威刑皆得便宜從事偏禆而下有不聽令者以軍法論至于管榷賦稅府庫之物皆得而用之如太祖監方鎮過盛雖朘削武臣之權然邊將一時賞罰及財用則皆聽其專有功則必賞有敗則必誅此所謂馭將之道也其二曰復土兵今河北河東强壯陕西弓箭手之屬蓋土兵遺制也且戎狄居苦寒沙磧之地惡衣食好馳射自古御冦却敵非此不可然河北鄉兵其廢已久陕西土兵屢為賊破其存者十無二三臣以為河北河東强壯除已詔近臣詳定法制外每因閲習則視其人武力兵技之優劣又擇其家丁夫之壯者以代老弱每鄉為軍其能絶類者籍記其名姓而遞補之陕西蕃落弓箭手貪召募錢物利月入糧俸多就㸃刺混為營兵今宜優復田疇安其廬舍使力耕死戰世為邊用則可以減屯戍而省供餽為不易之利內地州縣增置弓手亦當約如鄉軍之法而閲試之其三曰訓營卒太祖下令諸軍食無肉衣無帛營舍之門有鬻酒肴者則逐去之士卒有服繒綵者則詰責之異時被甲鎧冒風霜攻苦服勞無不一以當百今營卒驕惰臨敵無勇此殆素所資用之過也舊例三年轉資謂之落權正授者雖未能易此制即不須一例使為部管鈐轄宜于其間擇實有才勇可任將者授之又今之兵器類多詭狀造之不精且不適用虛費民力宜按八陳之法依五兵之用以時教習之使啓殿有次序左右有形勢前却相附上下相援令之曰失一隊將則合隊皆誅何患衆不為用乎其四曰制戎狄今戎狄蕩然與中國通北方諸國則臣契丹其西諸國則臣元昊而二虜合從以犄角中國之勢就使西戎來服不免與之重賄是朝廷嵗遺二虜不可勝計古之備邊西則金城上郡北則雲中鴈門今自滄之秦綿亘數千里非有山海峻深之阻獨恃州縣鎮戍爾凡嵗所供贍又不下數千萬以天下嵗入之數才可取足而一穀不熟則或至狼狽也契丹近嵗兼用燕人治國建官一同中夏昊賊據河南列郡而行賞罰善於用人此中國之患也宜度西戎諸國如沙州罝勒明珠滅藏之族近北如黑水女真髙麗新羅等處皆舊通中國今為二虜隔絶可募人往使誘之來朝如此則二虜必憾於諸國矣憾則為備為備則勢分此中國之利也其五曰綏蕃部且屬户者邊陲之屏翰也如延有金明府有豐州皆戎人內附之地朝廷恩威不立撫馭乖方比為强寇脅從而塞上諸州藐焉孤壘蕃部既壞土兵亦衰恐未有破敵之期請令陕西諸路緣邊知州軍皆帶安撫蕃部之名多設方略務在招集財賦法令得以自專擇其族盛而有勞者以為酋帥如河東折氏髙氏之比庶可為吾藩籬之固矣其六曰明探候古者守封疆出師旅居則有行人覘國戰則有前茅慮無其審謹若此太祖命李漢超鎮關南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠領𨽻州郭進控西山武守琪守晉陽李溥謙守隰州李繼筠鎮昭義趙贊領延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武管榷之利悉輸軍中仍聽貿易而免其征稅召募勇士以為間諜蕃夷情狀無不預知二十年間無西北之憂善用將帥精於覘候之所致也今西鄙刺事者所遺不過數千錢但略涉境上盜聽傳言塞命而已故虜情賊狀與夫山川道路險易之利勢絶而莫通夫踐不測之戎入萬死之地覘伺微密探索機會非有重賂厚賞孰肯自效乎願鑒藝祖將帥之制邊臣財用一切委之專使養勇士為牙爪而臨戰自衛無殺將之辱募死力為覘候而坐知敵情免陷兵之恥也慶厯三年十一月上時為御史中丞上仁宗論元昊請和不可許者三大可防者三范仲淹臣等久分戎寄未議策勳上玷朝廷俯慙鄙懷心究利害目擊勝負三年于茲備詳本末今元昊遣人赴闕將議納和其來人已稱六宅使伊州刺史觀其命官之意欲與朝廷抗禮臣恐不改僣號意朝廷開許為鼎峙之國又慮尚懷隂謀卑詞厚禮請稱烏珠以緩國家之計臣等敢不為朝廷思經久之策防生靈之患哉臣等謂繼遷當時用計脫身竊弄凶器德明外示納欵內實養謀至元昊則悖慢侮常大為邊患以纍世奸雄之志而屢戰屢勝未有挫屈何故乞和雖朝廷示招納之意契丹邀通好之功以臣等料之實因纍年用兵蕃界勞擾交鋒之下傷折亦多所獲器械鞍馬皆歸元昊其下胥怨無所厚獲其橫山蕃部㸃集最苦但漢兵未勝戎人重土不敢背賊勉為驅馳爾今元昊知衆之疲聞下之怨乃求息肩養鋭以逞凶志非心服中國而來也臣等謂元昊如大言過望為不改僣號之請則有不可許者三如卑辭厚禮從兀卒之稱亦有大可防者三何謂不可許者三自古四夷在荒服之外聖帝明王恤其邊患柔而格之不吝賜與未有假天王之號者也何則與之金帛可節儉而補也鴻名大號天下之神器豈私假於人哉唯石晉藉契丹援立之功又中國逼小才數十州偷生一時無卜世卜年之意故薦號於彼壞中國大法而終不能厭其心遂為吞噬遽成亡國一代君臣為千古之罪人自契丹稱帝滅晉之後參用漢之禮樂故事勢强盛常有輕中國之心我國家富有四海非石晉逼小偷生之時元昊世受朝廷爵命非有契丹開晉之功此不可許者一也又諸處公家文字并軍民語言皆呼昊賊人知逆順去就之分尚或逋亡未由禁止今元昊於天都山營造所居已逼漢界如更許以大號此後公家文字并軍民語言當有西帝西朝之稱天都山必有建都郊祀之僣其陕西戎兵邊人負過必逃其地蓋有歸矣至於四方豪士稍不得志則攘臂而去無有逆順去就之分彼多得漢人則禮樂事勢與契丹並立夾困中國豈復有太平之望邪此不可許者二也又議者皆謂元昊胡人也無居中國之心欲自尊於諸蕃爾臣等謂拓拔圭石勒劉聰苻堅赫連勃勃之徒皆胡人也並居中原近則李克用父子沙陀人也進據太原後都西洛皆漢人進謀誘而致之昨定州事後元昊有僞詔諭鎮戍兵民有定關輔之言此其驗也漢家之叛人不樂處夷狄中心謀侵據漢地所得城壘必使漢人守之如契丹得山後諸州皆令漢人為之官守或朝廷假元昊僣號是將啓之斯為叛人之助甚矣此不可許者三也何謂大可防者三元昊以纍世姦雄之資一旦僣逆初遣人至猶稱臣奉表及劉平之陷賊氣乃驕再遣賀九言至上書朝廷便不稱臣其辭頓慢而後屢勝當有大言過望乃人情之常也若卑辭厚禮便肯從烏珠之稱皆隂謀也是果以山界之困暫求息肩使中國解兵三四年間將帥懈慢士卒驕惰邊備不嚴戎政漸弛却如前暴發則中國不能支梧此大可防者一也又從德明納欵之後經謀不息西擊吐蕃回鶻拓疆數千里至元昊事勢稍盛乃稱尊悖禮背負朝廷結連北戎情跡盡見大為邊患偶未深入今復起詐端以欵我兵而休息其衆又欲併力專志并吞罝勒斯賚等諸蕃去秦州一帶籬落為將來再舉之利緣元昊初叛之時親攻延州是本有侵陷郡國之志今復彊盛豈便息心且朝廷四十年恩信所被一朝反側豈有發既叛之謀蓄未挫之鋭而能久守盟信者乎此大可防者二也又從德明納欵後來使蕃漢之人入京師賈販憧憧道路百貨所歸獲中國之利充于窟穴賊因其事力乃興兵為亂今兹五年用度必困乃卑詞厚禮迎合我意欲復圖中國之利待其給用既畢却求釁興兵以快本意狼子野心固難馴伏今若通和或再許靈夏蕃漢之人依前出入京師深為不便緣自前往來叛狀未彰情無蠧害今既為强悍之敵稔禍未巳必窺伺國家及夾帶亡命入蕃或與姦人别有結連或使刺客竊發驚擾朝廷又此類必所在恣縱甚於昔時有事何以處置此大可防者三也臣等乞朝廷俟元昊所遣人至觀其所請彼如大言過望堅求僣稱則乞朝廷答云上畏天地宗廟不可私許大號壞中國之法彼卑辭厚禮止是求烏珠之稱則按唐單于可汗故事有許之之理亦預防其隂謀嚴飾邊臣修葺城寨訓練軍馬儲蓄糧草以備虛詐俟一二年間見其表裏及邊備牢固方可那减戌兵於近裏屯泊緣西戎自古翻覆朝廷不可休兵以啓不虞之變如求割熟戶則乞答云靈夏甚有漢户能割歸朝廷否况橫山蕃部安於內附一旦驅之則驚擾生事必不為西界之用彼如求至京師依前來出入賈販則乞答云昨來戰鬪之後甚有軍民沒陳其子孫骨肉銜怨至深必恐道塗之中多有讐殺致西界相疑更却生事只於邊上建置𣙜場交易有無各得其所彼如邀我自今而後罷修城寨駐兵方能鎮靜使各安居爾若自餘更有非禮之求朝廷或難應副即且拒之不必從也但厚遣來人善詞回答使遷延往來即逾四月賊不能舉至秋則無足畏也何以言之臣等觀朝廷信賞必罰今巳明白帥臣奉詔得以便宜又舊將漸升前弊稍除將責實效約束將佐不令輕出訓練軍馬率多變法但今極邊城寨或未堅全新集之兵未可大戰若賊今春便來以臣等計之尚可憂慮然大軍持重竒兵襲擊宜無定州之負也如候秋而來則城寨多固軍馬已練或堅壁而守或據險而戰無足畏矣臣等巳議一二年間訓兵三四萬使號令齊一陳伍精熟又能使熟戶蕃兵與正軍參用則橫山一帶族帳可以圖之降我者使之納質厚其官賞各令安居籍為熟戶拒我者以精兵加之不從則戮我軍鼓行山界不為朝去暮還之計元昊聞之若舉國而來我則退守邉寨足以困彼之衆若遣偏師而來我則據險以待之蕃兵無糧不能久聚退散之後我兵復進使彼復集每嵗三五出元昊諸廂之兵多在河外頻來應敵疲於奔命則山界蕃部勢窮援弱且近於我自求內附內選酋豪以鎮之足以斷元昊之手足矣乞朝廷以平定大計為意當軍行之時不以小勝小衄黜陟將帥則三五年間可集大功仍詔中國臣寮不得諱言邊事以沮永圖我太祖太宗統闢四海創萬世之基業今以三五年之勞再定西陲豈為晚耶契丹聞國家深長之謀必懼而保盟不復輕動然後中國有太平之期臣等所言彼賊非禮之求不必從者蓋有此議也或曰今王師不利者數四而未思戢兵何也臣等謂不然國家太平日久將不知兵兵不習戰以致不利非中國事力不敵四夷非今之軍士不逮古昔蓋太平忘戰之弊爾今邊臣中有心力之人鍳其覆輒各思更張將有勝賊之計昔漢楚之戰不以多負罷兵而終有天下安祿山之亂所向無前郭子儀日夜謀慮王師復振而終滅大盜今國家以天下全盛之勢豈有偶勝偶負而自謂中國不可振而夷狄不可禦邪斯惑之甚矣或曰兵不可久久則民困而財匱臣等謂不然爭勝逐利之師則有巧遲拙速之異如其外禦四夷則自古未嘗廢兵是以山海之利皆歸邊用抑為此也况即日邊上城壘經今春修葺漸以險固兵民力役自當減罷又每嵗春夏之交軍馬甚可抽退於數百里間就食芻糧亦足省入中之費减饋運之勞庶乎民不困而財不匱非如西事之初人人畏懼未測寇情所屯軍馬不敢少退臣等更思興利减費之算以為之助臣等早䝉聖奬擢二清班西事以來供國粗使三年塞下日勞月憂豈不願聞納和少圖休息非樂職矢石之間蓋見西賊强梗未衰挾以變詐若朝廷處置失宜他時悖亂為中原大禍豈止今日邊患哉臣等是以不敢念身世之安忘國家之憂須罄芻蕘少期補助其元昊來人到闕伏望聖慈於納和禦侮之間審其處置為聖朝長久之慮天下幸甚慶歷三年正月元昊遣僞六宅使伊州刺史賀從勉來納欵持書至保安軍知延州龎籍令保安軍簽書判官公事邵良佐視其書元昊自稱號邦泥定國烏珠曩霄上書父大宋皇帝從勉又言契丹使人至本國稱南朝遣梁適侍郎來言南北修好巳如舊西界未寧知此界與彼為婚姻請喻令早議通和故本國遣從勉上書緣本國自有國號無奉表體式其稱烏珠蓋如古單于可汗之類從勉亦請詣闕籍具以聞二月始許從勉赴闕仲淹等上此疏時為陜西西路安撫使宋名臣奏議卷一百三十三
