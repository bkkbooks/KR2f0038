body:
  text: 宋名臣奏議卷一百二十宋趙汝愚編兵門兵議上上太祖諫伐河東范質臣氣疾發動近將兩月不面天顔攀戀聖慈深負憂責臣今有芻蕘上聞睿聽內量僭越甘伏罪譴後來臣雖疾病在假伏聞陛下有親征河東之意半月已來顯然外議皆云必行固無改易臣切料河東劉鈞自潞州奔敗之後乃數年遭天軍討蕩即日困蹙兼肘腋之間自有翻變契丹削弱不能援助鑾輿若到城下攻取少時必是成功然須十分之中七八分則料其必取三二分料其未得未得者何若大軍三數月間在賊城下料草不接即須抽退雖無損軍勢且虛困自家一二十州百姓枉費朝廷事力近聞般運糧草才第一轉所在鄉村甚有逃户蓋是晉絳蒲陜汝洛懷孟及㳂山諸州人民頻年以來秋夏不熟陛下八年令免供輸尚自逃走若是更有差遣自然難為駐足百姓般運艱難更不一一敷陳又聞所般運糧草且至潞府晉州將來大駕到河東城下三五十萬糧草潞府晉州百姓無多不知更差何人津置此事須掛宸衷請陛下子細勘算軍馬糧草准備之數必若有備則更復何憂臣竊見七八處大藩方皆要害之處即日並未有主帥皆是儒士懦弱權輕力小若是四方無事之時大駕不離京闕則必無憂慮若是兵戈稍動烽煙未弭之間須憂凶豪不逞之徒生心冀望緣此輩無識無知不算道理遇便即發視死如間萬一有之陛下出軍在外爭得安心中間世宗親征河東之時近畿小小兵士亦有姦謀者賴尉氏兵馬監押擒獲事雖不大人心可知願陛下稍掛宸衷臣竊見河東物力軍勢百倍不及大朝窮困危迫日憂亡滅乃是本分朝廷强盛軍馬天下無敵北至燕東至海南至五嶺西至隴右百六七十州之地無不懾服陛下即位四年有此基址以前開基創業之主三五十年尚未如此又何必須為河東六七州險阻窮困之地虛躁聖懷更俟三二年時嵗稍熟收拾糧草諸事有備賊界漸困此時動未為遲晚臣竊料河東六七州孤危如是不計幾時必無霸盛且劉崇乘世宗即位之初假契丹雄盛之力全軍南來一戰大敗將校軍士十分去九此天不助一也陛下初有天下李筠以方州之地歸投河東陛下才登太行立平冦賊劉鈞蒼忙奔走不暇拋棄兵刃甚於髙平此天不助者二也天意人事不言可知即日尸居餘氣茍延嵗月之命必無與大朝爭衡願陛下以生靈為念所貴資洪福益聖夀以社稷為重端坐鎮靜不輕舉動則天下幸甚臣位居上相受國深恩國家大事動繫安危茍或不言是辜天地惟陛下詳察乾德元年十二月上時以侍中平章事上太祖諫伐河東乞班師李光贊臣竊惟陛下應天順人體元御極戰無不勝謀無不臧四方恃險之邦僭竊帝王之號者昔日與中國為鄰今日與陛下為臣蠢爾晉陽豈須親討重勞飛挽結怨黔黎況天之命天子也猶父之任子也其或不由父命奪我以時則必有非常之災陛下豈不畏天命乎且太原得之未足為多失之未足為少國家貴靜天道惡盈所慮向來恃險之邦今日歸明之國聞是役也竭府庫之財盡生民之力其心踴躍各有覬覦傳曰鄰之厚君之薄也豈若回鑾浚都屯兵上黨使夏取其麥秋取其禾既寬力役之勞便是蕩平之䇿惟陛下裁之況時屬炎蒸候當暑雨儻或河津之溢道路艱阻輦運稽遲恐勞宸慮開寶二年閏五月上時為太常博士詔始議班師上真宗論輕於用兵田錫臣竊惟國家斷徒以上罪皆須勘鞫子細案牘圓備斷官録問然後行刑其大辟罪將決斷即給與酒食命他官監決慮有稱寃及斷訖即録案申奏奏下大理寺寺司㸃檢送至審刑院院吏披詳如案未圓理未盡即罪有司所謂王者之心重用刑而惜人命也及至北冦騷邊西戎犯境不先計而後出兵不先謀而後決戰戰失利則士卒陷歿者既多人民俘虜者不少不知斷徒以上罪至用刑於大辟一何用心精密之如彼而不先計而後出兵不先謀而後決戰致陷歿士卒者衆俘虜人民者多一何用心粗疏之如此用心精密之如彼者是帝王重人命也用心粗疏之如此者由將帥輕人命也州郡戮一死罪不當即罪州郡大理寺審刑院㸃檢披詳漏落各罪官吏洎至士卒陷歿人民俘虜則宰相不過罷免歸班為尚書將帥不過黜降其官為庶人此乃朝廷用刑輕重之相逺也咸平五年上時為侍御史知雜事上仁宗請嚴軍法文彥博臣伏見比者用兵西鄙有臨陳先退望敵不進之人及置獄鄰郡而推劾之際枝蔓淹延啓幸生之路稽慢令之誅將何以厲衆心而趨大敵乎且將權不可不専軍法不可不峻兵法曰畏我者不畏敵畏敵者不畏我使之畏我非嚴刑何以濟乎故對敵而伍中不進者伍長斬之伍長不進什長斬之以什伍之長尚得専殺統帥之重乃不能誅一小校則軍中之令可謂隳矣議者以今冦非大敵兵未深入故不必峻法不知冦非大敵兵未深入尚臨戰先退儻遇大敵則孰肯奮耶穰苴之戮莊賈非大敵也止於會而後期爾孫武之斬美人非深入也止於習戰而非笑爾終於齊師勝晉吳人入郢委任専而法素行也國朝著令禁軍將校之有過而從中覆當施之於平居無事之時今邊防用兵逾數十萬將不専權軍不峻法何以御人哉康定元年三月上時為殿中侍御史上仁宗請置親兵韓琦臣竊見前日山外之戰諸將多亡歿所部兵衆故不可一槩問罪今不立法制則各務生全豈復以主將亡歿為意若人數不多則軍法可必行請陜西河東諸路部管許置親兵百五十人鈐轄百人招討都監等七十人月加給錢二百其出師臨敵主將亡歿者並斬慶厯元年十一月上時為秦鳳路經略安撫使上仁宗論削兵當澄其冗弛邊當得其要富弼臣聞茶鹽之法漢唐之所取贍也孔僅建白有鈦趾之刑桑羊畫䇿為安邊之本張林衛覬踵陳其方此煮海之利也至如張滂始倡於正元之間王涯繼議於太和之後鄭注趙贊並㳂其術此摘山之稅也國家茶鹽之利兼唐數十倍矣向以邊隅用兵經費不足主計之吏益求其贏新舊之法屢更是非之議紛起羣商咨怨逺近喧然究其弊端奚厚利之可致哉試陳一䇿或可取焉臣嘗究桑羊之說觀兒寬之論從大夫之計則曰修鄣塞備屯戍必蕃貨長財以禦不軌通有無調緩急必建本抑末以制豪人覽文學之䇿則曰廣道德開仁義必本修民慤以興教化遏貪鄙尚至誠必防塞利門以劭農業二者之術交尚而相勝卒無所歸準由是溺利權者不知興王致治之本談古誼者不知佐財備邊之急今徒能語興王致治而不能思其急則腐儒之議也止能語佐財備邊而不能思其本則霸圖之駮也今國家追王風黜霸略國用稍艱而利課不裕者兵不可削籍而邊不可弛候故也然兵有可削之術邊有可弛之謀所謂兵有可削者非能去之也在乎澄其冗者而已所謂邊可弛者非不備之也存乎得其要者而已今中自京畿外至州縣防戍之卒屯駐之兵其籍盈數百萬無技勇者有之矣癯弱朽邁則虛為耗蠧是皆可澄之者也今屯備之要存乎西北自西羌叛命以來朝廷制禦之術為不少矣其北鄙雖結歡奉好無輕儳冦鈔之患然烽候不可不嚴堡鄣不可不備且邊陲所恃唯騎與射若夫徑弩大㦸長矛巨盾鏃之所中刃之所挂洞胸連腋則非彼之所能加也儻釋騎而就步則參伍不能當中國之一必若馳髙騖下規回矩折則非中國之騎所堪也中國之馬駔駿既少騎士或非精習戰陳之際步兵整頓騎士馳突多或蹀亂誠宜損其駑下存其精鋭以增步兵東漢嘗詔邊郡增置步兵列屯塞下此其效也而況給一騎之芻粟可以贍步兵數人矣得不違害而就利哉此又可以澄之者至如今之邊候多屯內兵土宜非所堪技能非所習而坐食儲跱貫汰給賜久恬安逸靡知艱苦有未嘗識陳伍而聞金鼓者忽有一旦之用擐三屬之甲雪霜增其慘瘃墯切其身則恐疲瘁顛仆之不暇非全勝之師也夫邊徼之人土俗懻忮便騎射能寒苦與戎人習尚一同冦或暴至皆能全保聚有鬭心雖討擊驅攘亦嘗參用然什不得伍所遺實多莫若嵗乘農餘鳩集勇壯教以長技繕其利兵示之以進退之形權之以賞罰之柄分之以部隊領之以幹臣粟帛可以不供賦租可以自贍角前犄後翼以內兵則為全勝之師矣此所謂得其要者如此而後利途可以寬本業可以阜教化可以振貪鄙可以消而免譏乎腐儒之議漸逺乎霸圖之駮也願陛下不以臣說為妄特留聖意慶厯三年上時為樞密副使上仁宗乞汰冗兵田況臣竊見比來災咎頻仍蝗潦繼作陛下責躬引咎不遑寧處以至躬祈道佛並走羣望薰祓之意可謂至矣求當世之弊驗致災之由其實役斂重而民愁和氣傷而為沴役斂之重由國計之日窘國計之日窘由冗兵之日蕃今天下兵巳踰百萬比先朝幾三倍矣自古以來坐費衣食養兵之冗未有如今日者雖欲斂不重民不愁和氣不傷災沴不作不可得也昔董仲舒劉向以謂春秋所書螽螟之災皆政貪賦重之所致今陜西河北河東三路民力凋弊人共知之臣不復言矣且以江淮之間言之今江淮菽麥已登矣而責民輸錢數㪷之費不供一㪷之價物遂大賤而農傷絹已輸矣民間貿易無餘而暴令復下又配市之織絍之家寒不庇體而利盡歸於富賈纍年已來刻剝不已民間泉貨已匱竭其凡百科調峻法爭利不可勝計便聞東南之民大率中産已下往往絶食民之愁窘致傷和氣如此而未聞陛下與兩府大臣議所以救之之術乃欲以一爐香數祝版上塞譴咎此臣所以不得已而言也夫國之所養之兵其上者戰其下者役茍不能堪此則為冗食今諸路宣義廣捷等軍其間孱弱者甚衆大不堪戰小不堪役逐處唯欲廣募邀其賞格豈復顧國家之利害哉宜分遣幹臣選揀諸路宣義廣捷等軍其不堪戰者並降為廂軍廂軍之不堪役者並放停議者必曰兵驕日久一旦遽加澄汰則恐致禍亂此慮事者之疏也且孱弱之兵既不堪戰則勇强者恥與為伍去年韓琦汰邊兵萬餘人豈聞有為亂者今天下財用不足以贍冗食之兵尚或顧惜細故而不思救弊之原臣切憂之惟陛下裁擇慶厯三年七月上時為知制誥上仁宗乞邊兵三月後減半就糧內郡宋祁臣本書生不當妄言兵革但以事勢料之參驗今古有灼然易了者敢為奏請臣伏見自古以來防邊守塞未有屯結兵馬經年亘嵗常在城寨無有休息者傳曰久暴師則國不足雖有智者不能善其後只如秦漢時與胸奴更相酬報出入鈔掠亦是兵罷即歸不令屯結亦不如聖朝長令兵馬守備邊上既不出攻坐費糧運是故用兵未及六年天下之財已告匱竭良由邊將不知休兵朝廷不授成算億萬之費耗散而不計若更十年未知多少財用可濟其艱臣請言其驗賊界自三月後馬瘦放在野草不能負重關陜人皆知之則背春向夏賊不能大舉其驗一也賊無餽運每入漢界常因糧於中國中國自二月以後才有麥熟其餘禾稼未成無糧可因賊不能大舉其驗二也又有髙山大川溪谷相銜春夏之後雨水時行霖潦為阻賊不能大舉其驗三也是賊兵鋭於秋冬而屈於春夏其勢可見臣欲乞朝廷詳度許令應㳂邊州軍城寨每年自三月後抽減一半兵馬入內地州府就糧直至九月却住元駐劄去處號為防秋況所抽兵士雖在內郡其校習訓練一如邊上此乃事之至便不足多疑一則邊土州軍愛惜得所支糧草二則兵馬有休息之時三則兵士到內地州府易為支費四則關陜之民免得轉般糧草是邊上一年支準可展為二年也議者必難臣曰賊知朝廷自三月後抽退兵馬必選擇壯騎精兵出其不意入來漢界作過恐大段深入抄掠人民破蕩城寨何以為備臣對曰假如令賊有壯馬精兵能於盛夏入漢界作過三五萬抄掠界上些小熟户人民且無糧草可食賊又不會攻打城壁朝廷但只令所在城寨堅守不出兵及州軍只披城立柵相對不與賊戰則見在一半人馬已自足用萬一假令賊敢謀深入即令內郡就糧兵馬旬日內勾集令大將將數萬之兵結陳徐驅往救應亦只立硬寨相持勿與賊爭鋒使賊進則不敢退又粘逐常擇便地自逗留至二十日以上賊必有糧盡或雨水之阻又何能破蕩城寨大段深入也但自來朝廷不肯明下成算與邊將令抽退兵馬是以邊將畏避責罰長要占留在邊上圖常有準擬其添到軍馬以死固執無因肯減一人一騎今若朝廷明降成算使之遵守如賊非時入界萬一有少敗衄朝廷自任其責自然邊將必無固執斯議者也伏望降付中書樞密院子細商量慶厯三年上時為翰林學士上仁宗乞那移河北兵馬以蘇民力包拯臣聞屯兵備邊古今常例所患民賦有限兵食不充必須廣為經度以給用度或嵗有凶歉或冦至益兵則暴斂橫取何所不至民既困矣敵何禦焉此亦必然之事也河北自失山後六州之險無以固守則蓄兵積粟常患不足如頃年冦忽生變雖復請和終非經久之計兼㳂邊沃壤又盡為陂塘租稅既無所入皆給縣官雖竭天下之財以贍一隅當無事之時日常窘迫無數嵗之備若少有屯集如何取濟豈可坐觀其弊而不務救之之䇿哉欲望聖慈特出宸斷宣諭執政大臣應㳂邊及近裏州軍兵馬除合留防守外其屯駐駐泊諸軍或令歸營就糧諸軍即分屯於河南兖鄆齊漢曹濟等諸州況逐處地利富實糧儲易致率三年一代遇有警急即時起發不旬日可到豈有後期不及者邪且前代防邊之兵三時務農一時教戰公私自足未有冗而且衆坐糜廩食虛困疲民如今之甚者然執干戈禦戎敵固不可闕在養之教之得其宜則上下無困乏之患緩急用之則沛然有餘力矣議者若以戍兵不可全減即有往年義勇强壯十八萬餘人以充其數緣河朔之民稟性徑悍生習邊鄙之利害素諳戎敵之情僞較之南兵絶為精鋭一則不費供饋二則羣情樂為其訓練之法則有舊制存焉若謂兵食粗足敵好方堅趣過目前以為成算憚於更張措置臣恐日削月朘中外益以殫竭一旦用武即暴加重斂民心怨叛則肘腋之下皆為仇怨豈暇禦外冦哉此國家根本之患若不表裏協心鋭意而速圖之臨事無及矣唯聖慮裁擇皇祐四年上時為河北轉運使上仁宗論益兵困民范鎮臣嘗言方今官冗兵多民力不堪乞下中書樞密大臣條理施行及今纍月不報退自伏念當世之務莫急於此而大臣恬然不以為怪此臣區區不得隱默而再以冒聞也夫慮之有素為之有備事至而應則安靜而詳實慮之無素為之無備事至而應則倉猝而乖牾大抵近事多失於倉猝而不安靜者慮之不先而備之不豫也前日契丹使至虛言紛紛朝廷自顧國用之不足民力之凋弊無以待之也大臣不知計之所從於是乎募兵以自塞責是何異欲救火而益以薪惡流之濁而復撓其源也景德中契丹內冦靈夏不臣是時兵不滿五十萬西備北禦沛然有餘今兵倍之矣而尚若不足者臣不識所謂也虜才遣一介之使至而增益者又數萬及其去也中外相慶謂為無事殊不知新兵之費嵗增已百萬矣百萬之費非出於天非出於地非出於建議者之家一出於民也方民愁苦之時又重賦之以為備豫計者未見其可也此所謂倉猝而乖牾也夫兵不在衆在練之與將何如爾去年儂智髙冦嶺南前後兵將不知幾萬亡死奔北不可勝紀陛下親遣狄青然而卒能取勝者蕃落數萬騎爾此兵不在衆近事之效也陛下何不持此說以詰大臣之欲益兵者臣愚以為備契丹莫若寬河東河北之民備靈夏莫若寬關陜之民備雲南莫若寬兩川湖嶺之民備天下莫若寬天下之民民力寬則知自愛知自愛雖有外虞人人可用為兵用人人自愛之兵以禦外虞何往而不克何征而不服哉古人所謂猶手臂之捍頭目子弟之衛父兄者用此兵也臣所謂慮之有素為之有備者此也今夫官所以養民者也兵所以衛民者也養民衛民者反殘民矣而大臣不知救臣恐朝廷之憂不在四夷而在冗兵與窮民也近年以來地數震動河不軌道日月星辰謫見於天皆民怨之感也伏乞陛下明勑大臣求今所以息民之術以應天地之變而為宗廟社稷計臣不勝大願愚直之罪伏惟裁赦至和元年十月上時知諌院上仁宗論益兵困民范鎮臣比奉使河北伏見河北連嵗招兵未已皆是坊市無賴及隴畝力田之人冒為軍營子弟誠是軍營子弟則今日詔下明日便當投牒豈有及今一年尚未盡至其為坊市無賴隴畝力田之人明矣況今田甚曠民甚稀賦役甚重國用甚不足所以然者正由兵多也先朝用兵時兵才四十餘萬今不用兵而兵已倍之臣不知大臣以何見而為此議也必以為備契丹也今塘水東西三百餘里多於先朝也嵗豫金繒五十萬禮聘又十餘萬亦多於先朝也以多於先朝之塘水多於先朝之金繒以備契丹而與之和也宜省兵以息民而益多兵以困民者臣所以深惑也契丹自知顧塘水之限貪金繒之利而不敢動者五十年於今矣方契丹貪利而不敢動之時其民宜富貴而反日以困國用宜饒足而反日以蹙此無他兵多而民稀田曠與賦役重也使契丹而有一日之警將何以繼之哉大臣終不知念此而但以多兵為有備此臣所以深惑也今契丹五十年不敢南入為冦者貪金繒之利厚也就使弃利為冦則大河以北婦人女子皆是乘城之人其坊市無賴隴畝力田者又將焉往況契丹貪利而不敢動而預畜養之以困斯民乎夫取兵於民則民稀民稀則田曠田曠則賦役重賦役重則民心離寓兵於民則民稠民稠則田闢田闢則賦役輕賦役輕則民心固與其離民之心以備契丹契丹未至而民力已先困國用已先匱孰若固民之心以備契丹契丹雖至而民力有餘國用有備其利害若視白黑若數一二大臣以為難者臣所以深惑昔漢武以兵困天下者用兵以征丐奴欲以得所欲也今陛下以兵困天下者不用兵以至是也非以快所欲也何苦而為是乎五口一家尚知量入以為出況天下大計其可以不校出入其可以無經制乎臣伏見今之世有失入徒罪若流若死者陛下必加罪有司其在選人必加停殿後雖用之不得遷改此所以見陛下恤民之心至矣今大臣舉天下之民而困之豈特失入徒流死罪之比而陛下略不加問是捨所大而急所細也臣愚豈得默焉陛下誠能罷今招兵勑大臣使具太祖時賦入若干兵若干官若干太宗時賦入若干兵若干官若干真宗時賦入若干兵若干官若干陛下天聖中賦入若干兵若干官若干約今賦入之數兵數官數酌取中道立為經制以賦入之數十分為率以七分給郊廟宫省諸費三分留備水旱及緩急非常為之十年僅可以言治古者國無九年之蓄曰不足無六年之蓄曰急無三年之蓄則國非其國今自京師至天下州郡大率無二年之蓄邊城甚者或三數月耳不幸有連二年之水旱將何以養此兵乎此兵不足以養則其憂不在契丹也此臣所謂言責也陛下所宜留念大臣所宜盡心悉力之時也伏乞下臣章中書樞密大臣并臣前奏看詳若不以臣非才而信用其言先罷招兵然後量今天下賦入以為國用使上下寬裕非獨臣之幸也乃天下之幸也至和二年五月上時知諫院上仁宗論益兵困民范鎮臣竊聞契丹新立其叔領兵盤旋山後召不肯赴深恐邊臣緣此張皇更請益兵今河北河東養兵三十餘萬五十年矣又益以義勇三十萬是常有六十萬兵積於兩路正為緩急非常而塞下每一小警即奏疏旁午以搖朝廷者亦五十年矣廟堂議臣邊鄙謀將中外狃習安為故常所以兵益多糧益困國用益不足而不知所以營救此臣懇懇而不能已也今義勇三十萬為稍近古禁兵三十餘萬皆仰縣官就三十餘萬中半皆老弱怯懦老弱怯懦之人遇敵則先自敗亡非獨先自敗亡適所以為驍壯者之纍是驍壯者不可不揀練而老弱怯懦者不可不抑去也驍壯者不揀練則兵殆老弱怯懦者不抑去則費廣費廣則民罷民罷則不自愛養殆兵以衛不自愛之民臣恐朝廷之憂不在塞外而在塞內也臣竊計慮契丹新主嗣立遂定則與故主無殊盟好亦必堅久就使其叔爭立國中有變待蕃漢懷服其勢不五七年不得平定朝廷乘五七年之間懲前之失謀揀練驍壯抑去老懦使民力得紓國用得饒以待冦至必勝之道也古人請十萬衆橫行胸奴中今以六十萬衆重之以髙城深池惴惴常恐不足者殆將相不任責也陛下誠能専責將相委以經略非特邊鄙無事將見天下得復太平也臣願勑大臣平章如不以臣愚而廢其言必有萬一之補至和二年八月上時知諫院宋名臣奏議卷一百二十
