body:
  text: 宋名臣奏議卷九十六宋趙汝愚編禮樂門士庶五禮上神宗請定婚嫁喪祭之禮吕大防臣伏見朝廷厲新庶政舉以三代先王為法而獨於典禮制度似未及漢唐之盛昨聞特下眀詔置局考定禮文得失有以見聖慮高眀急所先務臣之愚素未欲聞於朝者庶得申於今日矣臣竊觀今之公卿大夫下逮士民其婚喪葬祭皆無法度唯聽其為而莫之禁夫婚嫁重禮也而一出於委巷鄙俚之習喪祭大事也而率取於浮屠老子之法至於郡縣公私禮之大節古所謹重者一切茍簡略無義理臣謹按開寶通禮乃太祖皇帝所立本朝一代之典臣歷觀四方唯於淄州嘗見之以備考試舉人而巳禮之不行無甚於此周禮八則禮俗以馭其民蓋謂庶民則可參之以俗而士以上當專用禮也臣愚欲乞詔諭禮官先擇開寶通禮論定而眀著之以示天下違者有禁斷以必行雖未能下逮黎庶而小人所視足以成化况臺省官視事州縣祭社稷釋奠之類巳略用禮矣推此而為之亦非絶俗難行之事又今之所行者於禮之中才舉數事以漸善俗義在於此伏惟陛下留神財省立萬世法天下幸甚元豐元年正月上時知秦州上哲宗乞詳議五禮以教民朱光庭臣聞孔子之言曰立於禮書曰天秩有禮自我五禮有庸哉則是禮者與天地並而不可斯須廢也自三代巳後其禮遂亡漢唐規規不足道也今聖政日新講修治具臣愚以謂為治之道無先於禮蓋人情之檢柙王政之綱維莫不由此夫禮廢而不講久矣今天下之人自丱角已衣成人之服則是何嘗有冠禮也鄙俗雜亂不識親迎人倫之重則是何嘗有婚禮也火焚水溺隂陽拘忌歲月無限死者不葬葬者無法五服之制不眀重輕則是何嘗有喪禮也春秋不知當祭之時祭日不知早晚之節器皿今古之或異牲牢生熟之不同則是何嘗有祭禮也冠昏喪祭禮之大者莫知所當行之法朝廷之上未嘗講修但沿襲故事而巳曽未盡聖人之藴公卿士大夫之間亦未嘗講修但各守家法而巳何以為天下之法車輿服食器用玩好法禁不立僭侈尤甚冨室擬於王公皂𨽻等於卿士風俗如此一出於無禮而然也臣今欲乞陛下詔執政大臣各舉眀禮官參議五禮上自朝廷所行之制度下至民庶所守之規矩纎悉講眀䆒極先聖人之藴以古參今酌人情之所安天下可通行以為法者著為一代之大典垂諸象魏頒諸四海以正人倫以變禮俗此則三王之舉也臣願陛下勉之而巳記曰王者治定制禮恭惟祖宗以來纍聖相承仁功德澤洋溢天下固可以謂之治定矣伏自陛下盛德臨御興滯補弊朝廷日益清眀此眀王當制禮之時也願陛下不以臣言為微時賜留神以幸天下貼黃朝廷盛化無逺不被然而五禮之制多出沿襲未盡講修人不知其所止其間冠昏喪祭之禮尤當先講修以示天下俾得遵行以為規矩然朝廷之上與公卿士大夫之家皆未有成法伏望聖慈令眀禮之臣與禮官委曲講修以厚風俗元祐元年上時為右司諫上哲宗乞詳議五禮以教民顔復臣資材俚陋幸因儒術備位禮官充職以來推道揆分守之要庶舉萬一上報器使因思竭中瘁外參古稽今以贊朝廷日興之儀不若一眀禮實庶補風教以趨大治則臣分職之心無負愧者臣謂治世之禮發乎威儀撙節之間至民保皇極家無異尚化行於上俗成於下不可謂名見而實不虛也不然好之雖篤崇之雖華皆入循名失實之譏無少益於治體當王者盛時以人情莫不本良心而後安故行禮未嘗外民大而郊廟禋祼之節小而閭里酺禜鬼神之儀邇而朝覲聘問之度逺而庠序射享飲食之事盛而搜苗獮狩類禡之制卑而農畝頒禽獻豜之則崇而加元服降王姬登賢飬老之容下而比族冠婚正齒位讀邦法書孝姻之序內而賑災賻囏之惠踈而私室送終之式雖隆殺不同致其恭眀其叙發其和復其本汲汲以為嵗月日時當行之事而不敢斯須曠怠其志意一也上躬帥之下說隨之如指臂相縈如源流相通渾然無少間隙是以德風大成和氣充牣災害不生刑罰不試知天下有禮之實矣三代而後沿襲茍簡禮樂之存虛名而巳間有不世之君致時之臣恢眀考類煩密光輝止於郊廟朝廷之上崇植風猷張大聲采不及都門之外歸於畏之太嚴勉勉不敢置爾皆不知其義以安之輔世道民之效漠不可期其實之喪久矣國家太平百年規模宏逺下視漢唐太常之禮成書定簡何止千篇嵗舉郊廟朝㑹侍臣有司考復論難貫附六經取㑹沿革上下數千年其制冨贍精緻凡事不匱彬彬然可師而士民之禮踵歷代之咎未降彜制下無矜式使有志之士動虛名失實之歎此甚可為治朝惜也雖然民之至情雖不教不勉自見蓋天畀之源本善不可蔽禦不教則失中失中則流祭享之禮不教則流於祝禬佛齊婚姻之禮不教則流於委巷俚習賔客之禮不教則流於游衍嬉樂師田之禮不教則流於夷風暴俗喪紀之禮不教則流於道釋數術國之正禮格而不下民之良心奪於異習而加愚欲風淳而治隆如北行而之粵緣木而求魚勢無可得臣之愚誠欲乞皇帝陛下太皇太后陛下特發德音下詔禮官㑹萃經史古今儀式至諸家祭法嵗薦時享家範書儀之類可取者高而不難近而不迫成士民五禮不必冕辨以為冠韠韍以為衣爼豆以為器儷皮以為幣馭車而行坐席而食就其便安以頒郡縣緩驅以令使樂而不駭勸曉以文使徐而知義誘掖本心則善之思思則辨辨則安安則起居動息造次顛沛莫不在忠順孝弟仁義之間人皆有士君子之器至化成矣王者牧民設刑以輔禮今律民之書一字有易則置郵而下郡縣士民常禮以至無書本末重輕不稱從可眀矣惟陛下留神則天下幸甚元祐元年上時為太常博士議樂上仁宗論詳定雅樂韓琦臣伏聞樂音之起生於人心是以喜怒哀樂之情感於物則噍殺嘽緩之聲隨而應非器之然也故孔子曰樂云樂云鐘鼓云乎哉者其言斯有在孟子之對齊宣王亦有今樂猶古樂之說言能與百姓同樂則古今一也唐太宗聽祖孝孫新樂乃謂樂之作蓋聖人緣物設教治之隆替亦由於此魏元成對以樂在人和不由音調此皆聖賢述樂之大方以臣識暗藝薄素非知音陛下設賜甄采使待罪諫列首被詔㫖令與丁度等詳定胡瑗阮逸鄧保信所造鍾律事臣粗考前志參驗今古二家之說差舛未盡逸瑗之圍方分保信之用長黍質之典據皆無所聞伏自藝祖造邦仁宗接統縟禮具舉熙事咸備通用王朴之樂悉無更易以至黎庶康乂兵革銷戢天下無事垂八十載為樂之用非不和也頃因燕肅獻規妄加磨鑢適㑹李照赴闕謂非克諧陛下發天縱之能留日昃之聽精加練核許之改作逮於成功即薦郊廟暨逸瑗繼至盛言照樂穿鑿再令造律即又圍徑未合保信續上新法亦乃長廣乖古竊以祖宗舊樂遵用斯久屬者徇一士之偏議變數朝之定律賜金增秩優賞其勞曽未周朞又將易制臣慮後人復有從而非者不惟有傷國體實則虛費邦用歷觀前代議樂古之管尺尚存而猶是非紛紜纍年方就未見今之速而易也臣竊計之不若窮作樂之原為政治之本使政令平簡民物熙洽海內擊壤鼓腹以歌太平斯乃上世之樂可得以器象求乎既達其原又當究今之急以佐隆業國家方夏寧一朝廷晏清西北二垂久弛邊備犬戎之性豈能常保弱則卑順强則驕逆渝盟背約何代而無必思密備不虞禾可全推大信此陛下之與左右弼臣宵旰所慮宜先及之緩兹求樂之誠移訪安邊之議急其所急在理為長臣欲乞詔下攸司盡記二家律法及所造管尺鐘磬權量存而未行再命天下有精曉音律者俾之詳正然後施用候一二年間訖無至者則將王朴逸瑗保信三法别召稽古近臣取其中多合志者以備雅奏固亦未晚今之定奪權且停罷萬一裁擇不勝至幸景祐三年九月上時為右司諫先是景祐二年判太常寺燕肅言鐘磬壞損乞行修換眀年修畢上之而李照以為今樂高五律乞更定尺律改造新器詔復內侍禮賔副使鄧保信參其事其年又詔天下搜訪曉達音律者而胡瑗阮逸等出焉三年七月始詔李照丁度及琦取保信逸瑗等鐘律定奪得失可施行與否以聞而度等皆以為不可用詔悉罷之琦又獨上此疏上仁宗議李照所定樂余靖臣聞道路傳言已降指揮今月十六日皇帝御後殿令中書樞密院及修樂書臣寮同於上前詳議李照胡瑗所定雅樂是非事臣竊謂樂者因聲以布其和聲者因器以宣其用故假金石以為器然後聲得而和分宫商以為音然後樂可以審今李照之說形器可辨胡瑗之議音聲未傳以此異同欲定優劣不亦難乎又况言有辨訥意有巧拙又安能頃刻之間定之乎臣又以為古之作樂者知聲有清濁故吹律以制其中恐久而失傳故纍黍以存其法後世增損不能識其本聲若以古法求之尚或得其髣佛疑古而不用未知慿何可從况胡瑗所陳頗有經據何不試令造鐘磬一編與李照之樂更考迭奏取其絲竹之聲諧和而不相奪者定以為優而後行用彼時集議亦未為晚臣頃聞談者云云並言李照學無師法自傳損益又挾閻文應以為內助故得紛然恣其偏見而律度疏長鐘聲震掉不守古制不可垂法察於衆言照未全是若以樂為政之大者當謹重改作則冝謹於李昭未改之前今既改而未定又冝詳考律吕審的制度以防其失臣故謂當令胡瑗作為鐘磬而與照樂兩辨其聲然後是非灼然如在衡鑑不辨而可知也臣不任區區瞽言待罪之至景祐四年上時任祕閣校理上仁宗請復用王朴舊樂韓琦臣先於景祐三年秋曽奉聖㫖令與丁度胥偃高若訥同共定奪阮逸胡瑗鄧保信等所造鐘律尋將歷代典志文字及將漢錢分寸較量得王朴舊樂於太祖朝曽令和峴以司天監景表尺减定與漢唐尺度差近其胡瑗阮逸鄧保信并李照等鐘律俱不合古遂具聞奏再奉聖㫖令將漢錢分寸及景表尺别造律管參校臣與丁度等各陳述不曉音律乞再訪知樂者俾令詳定後䝉寢罷其時臣曽將景祐廣樂看詳備見實紀李照不依古法出意制造律度之事今來南郊在近陛下躬行大禮不可以李照所造違古之樂上薦天地宗廟臣竊聞和峴减定王朴舊樂鐘磬等見今並存欲乞特降聖㫖下太常寺將來郊禋用舊樂所貴國制咸備神聽惟和寶元元年上時知諌院於是詔太常樂悉仍舊制李照所造勿復施行上仁宗議樂宋祁臣伏覩右司諫直集賢院韓琦奏劄子節文謂曽將景祐廣樂記看詳備見實紀李照所造違古之樂不可以上薦天地宗廟竊聞和峴减定鐘律等見今存在欲乞特降聖㫖指揮下太常寺復用舊樂者奉敕巳差資政殿大學士宋綬等與兩制同共詳定聞奏伏緣臣自景祐元年中曽䝉差赴太常寺與燕肅等同共磨治鐘磬後來親見李照重定律度及相次提舉胡瑗别造鐘磬臣於太常樂器粗知本末茍有所見不容隱默謹具畫一於後一李照所造鐘磬當時只是將太府寺布帛尺一靣定法改造比舊樂頓下四律伏緣李照資性詭僻辨論専固莫非自出私意不循古法其尺約長王朴尺二寸其斗法以六百二十黍為一籥六籥為一合自古十籥為合今頓差四合十合為一升十升為一㪷謂之律㪷其稱以升水之重為一斤比今太府見用官稱一斤零十兩十斤為一稱今太府以十六斤為稱謂之律稱又减鐘磬十六枚為十二枚自古經史中無十二枚為一架其鐘之形狀並不依典故聲韻遙長掩遏羣樂及李照自造大竽大笙亦充大樂行用皆惉懘新韻不依古制及有新降到雙鳯管樂工吹之並不成聲李照雖自稱曉音律其實與伶官賤工識見無異遂敢敗壞祖宗以來舊樂使朝廷以不法之器薦見天地祖宗四海傳聞莫不竊議只如照所定黃鍾之管乃是南吕倍聲舊黃鍾九寸正聲却降在太蔟夾鐘之間其黃鍾宫聲君聲君位也今君聲降在臣位羽聲米處尊宫三年有餘於理尤害天災人事不合常禮皆不祥之大也如此數事人無愚智所共眀知陛下况深達律吕可以斷自聖慮便行改正應於李照曽請添損者並違經背古乞如韓琦所奏一切皆令停罷盡復祖宗舊制一太常寺舊樂本自唐昭宗時雅樂亡散器無孑遺尋有博士商盈孫參酌典故更造鐘聲其後五代相傳習而不改至周時王朴重定尺度略加添正太祖朝又詔和峴以景表尺重加磨治稍令聲下昨緣景祐二年燕肅始乞修正樂器其時只得王朴律凖又無王朴所定律尺律管參驗音韻而燕肅只據律凖與鐘聲按定高下即是此太常舊樂比王朴時巳自不同况和峴减定後又經真宗朝景德中李宗諤一次修飾至燕肅凡經三度磨鑢然俱不先立尺律律管所以後來無處根正法度音律然其舊器傳自唐宋歷祖宗三聖無人輕議用之薦享八十餘年雖非的然如舜韶周武法度眀備要之沿襲本末實與典禮最近非同李照率意詭妄製作不經今若陛下且以考舊典差近法度即乞先取景表尺裁鑄律管以案王朴律然後和峴當時所定聲律高下確然可見况舊鐘尚有七百餘枚係本寺收管略加磨鑢令與聲律相協所有舊磬為李照定樂時盡底界截破壞無見存者若且將李照所定石磬自太蔟以下刻磨長短亦與舊樂黃鍾以下髣佛相近及將夲寺磬撲二百餘片相兼添補亦可諧合音律與鐘粗得三架即可於將來南郊大禮前一時了畢不過數月便可見功其餘絲竹諸器只是移正聲調便成雅樂况禮樂之本出自天子今陛下天縱睿聖通知音律復古順道何所致疑伏乞即下有司速令修復以旌善述之美一景祐三年詔令臣監領胡瑗鑄造鐘磬一架臣伏見胡瑗曉算法能將先儒所說黃鍾管內八百一十分為方分算法並與鄭康成周禮注及班固律厯志古法相合自隋唐以來諸儒辨論黃鍾一籥之法皆不及瑗相次於雜物庫請銅鑄之時忽於雜銅內得古鐘三枚即不知甚年及是何州縣納到臣與故翰林侍讀學士馮元即時驗認其鐘古質精妙項鎛皆有亷隅上有三十六乳餘外瑑雲氣為飾有兩欒之制如鈴不圎正與周禮所說形制相符一鐘破損二鐘尚可叩擊遂子細洗滌於鐘上有篆文兩行其篆亦字體古簡推本其文不是近代所造乃是漢魏間所用者其文曰越作朕皇祖文考寶和鐘越思萬年子子孫孫永保用享凡二十二字臣與馮元商量此既古器又合經典除三十六乳與鄭康成說小異康成以為鐘每面三十六乳即一鐘合七十二乳遂畫圖子進呈後一靣勒令胡瑗悉依古鐘形狀造製新鐘成一十六枚其胡瑗所定律尺律管比王朴鐘只下半律鐘磬甚得諧韻其時不曽許當面進呈遂只送太常寺收係即目見在後來又䝉別差官詳定李照胡瑗等律尺管其時議者皆云胡瑗實籥之黍或有小大不同以為未盡合古遂抑而不行至於八百一十分之法則盡以為然無有非者臣以為胡瑗之尺黍雖有長短大小之差未盡合古然比舊樂又近法度如更使諸儒略加論討庶可施行而合雅正矣臣又竊謂陛下用心詳定雅樂之日獲此古鐘乃是瑞應因此若便定律尺律管使諸儒極意論難從其長者定為尺法然後作鐘石以聲之有何不可而前來議者固執李照不法之器以為此樂已經郊祀天地不可輕改更候有知音者然後改之且祖宗舊樂相傳八十餘年經真宗東封西祀一旦李照狂妄率然敗壞却無輕改之憚今欲依據經典裁正律度反以為更俟知音假如今世遂無知音則是李照不經之器便傳後代取笑千載此亦陛下昭然可判議者之大謬也臣以為陛下既自眀律度不須更以知音為言夫知音自古難得非獨今也若世無夔牙則且當以法自據雖有清濁高下其失不逺故臣願陛下只將胡瑗八百一十方分之法詔取上黨秬黍擇其中者差一二精力宦官及左右一二信臣於宫中重加校定陛下因以餘暇親臨制决黍定求寸寸定求尺尺定則律度量衡四物皆正矣然後依古法將新尺試以推步晷景若合此一不謬也試以新管埋地候氣氣候若應此二不謬也然後可以遂班天下眀告以律度量衡之法因之修定雅樂詔當今稍知音律經術者同加討論事無不濟然此一事雖非朝夕急政陛下能以萬幾之暇慮而定之亦千載不刋之美也其有先獲古鐘恐禁中忘記當時進呈圗樣今再畫到一本隨狀進呈右具如前臣以儒史為業合為文辭敷啓又緣臣久在病假既不獲乞上殿面奏今來事涉辨論不敢修飾文語貴要暢盡事理是敢直說本末慶厯元年上時為翰林學士上仁宗乞復用舊樂范鎮臣伏見國家自廢祖宗舊樂用新樂以來及今四五年日食星變冬雷秋雹風雨不時寒暑不節不和之氣莫甚於此者使樂無所感動則已樂而有所感動則衆異之至未必不由此也去年十二月晦大雨雪大風宫架輒壞元日大朝㑹樂作而陛下疾作臣恐天意以為陛下不應變祖宗舊樂而輕用新樂也不然何以方樂作之時而陛下疾作天意警陛下之深自初議樂時臣嘗論新樂非是其間畫一一通最為詳悉今再具進呈乞下執政大臣參詳臣畫有如可采伏乞且用祖宗舊樂以俟異時别加制作嘉祐元年八月上時知諫院先是朝廷命胡瑗等詳定大樂最後宋祁薦益州進士房庶曉音律且進其書三卷鎮主其議㑹瑗樂已成罷之鎮上書言臣竊惟樂者和氣也發和氣者聲音也聲音之生生於無形故古人懼後人不能知也乃以有形之物傳其法俾後人參考之參考而是然後無形之聲音得而和氣可道形者何秬黍也律也尺也籥也釜也斛也算數也權衡也鐘也磬也是十者必相合而不相戾然後為得也今皆相戾而不相合則為非是矣有形之物非是而欲求無形之聲音和安可得哉臣謹條十者非是之驗列於左惟陛下裁擇焉臣按詩誕降嘉種維秬維秠誕降者天降之也詩注云秬一稃二米又云一秠二米後漢任城縣産秬黍三斛八斗實皆二米史官載之以為嘉瑞蓋古人以秬黍為酒者謂之秬鬯宗廟降神惟用一樽諸侯有功惟賜一卣以眀天降之物世不常有而貴重之也今秬黍取之民間者動至數斛秠皆一米河東之人謂之黑黍設有真黍以為取數至多不敢送官此秬黍為非是一也又按先儒皆言律空徑三分圍九分長九十分容千二百黍積實八百一十分今律空徑三分四釐六毫圍十分三釐八毫是圍九分外其大一分三釐八毫而后容千二釐百黍除其圍廣則其長正七十六分二釐矣說者謂四六毫為方分古者以竹為律竹形本圎而今以方分置算此律之為非是二也又按漢書分寸尺丈引本起黃鍾之長又云九十分黃鍾之長黃鍾之長者據千二百黍而言也千二百黍之施於量則曰黃鍾之籥施於權衡則曰黃鍾之重施於尺則曰黃鍾之長今遺千二百之數而以百黍為尺又不起於黃鍾此尺之為非是三也又按漢書言籥其狀似爵爵謂爵盞其體正圎故籥當貟徑九分深十分容千二百黍積八百一十分與律分正同今籥乃方一寸深八分一釐容千二百黍是亦以方分置算也此籥之非是四也又按周禮釜法方尺貟其外深尺容六斗四升方尺者八寸之尺也深尺者十寸之尺也何以知尺有八寸十寸之别按周禮璧羡度尺好寸三以為度璧羡之制長十寸廣八寸同謂之度尺以為度則八寸十寸俱為尺矣又王制云古者以周尺八尺為步今以周尺六尺四寸為步八尺者八寸之尺也六尺四寸者十寸之尺也同謂之周尺者是周用八寸十寸尺眀矣故知以八寸尺為釜之方十寸尺為釜之深而容六斗四升千二百八十籥也積實一百三萬六千八百分今釜方尺積千寸此釜之非是五也又按漢書斛法方尺圎其外容十斗旁有庣焉當隋時漢斛尚在故隋書載其銘曰律嘉量斛方尺圎其外庣旁九釐五毫羃百六十二寸深尺容一斛今斛方尺深一尺六寸二分此斛之非是六也又按算法貟分謂之徑圎方分謂之方斜所謂徑三圍九方五斜七是也今圎分而以方法算之此算數非是七也又按權衡者起千二百黍而立法也周之釜其重一鈞聲中黃鍾漢之斛其重二鈞聲中黃鍾釜斛之制有容受有尺寸又取其輕重者欲見厚薄之法以考其聲也今黍之輕重未真此權衡為非是八也又按鐘有大小有輕重有厚薄是今無大小無輕重無厚薄而以一黃鍾為率此鐘之非九也磬一律謂之博二律謂之股三律謂之鼓凡此者十二律各別也今之磬一以黃鍾為率此磬之非是十也凡此者皆有形之物也易見者也使其一不合則未可以為法况十者之皆相戾乎臣固知其無形之聲音不可得而和也今尺律本末未正而詳定修制二局工作之費無慮數萬計矣此議者所以云云也然議者不言有司議論依違之失而顧謂陛下作樂為過舉又言當今宜先政令而禮樂非所急此臣之所尤惑也儻使有司合禮樂之論以相是非而陛下親臨决之於政令所失不已大乎上神宗乞參酌王朴等樂以考中聲劉元等臣等伏見太常大樂鐘磬凡三等王朴樂一也李照樂二也胡瑗阮逸樂三也王朴之樂其聲太高此太祖皇帝所嘗言不俟論而後眀仁宗景祐中命李照定樂乃下律法以取黃鍾之聲是時人習舊聽疑其太重李照之樂由是不用至皇祐中胡瑗阮逸再定大樂比王朴樂微下而聲律相近及鑄大鐘成或譏其聲弇鬱因亦不用於是郊廟依舊用王朴樂樂工等自陳若用王朴樂鐘磬即清聲難依如改製下律鐘磬清聲乃可用益驗王朴鐘磬太高難盡用矣今以二等鐘磬參校其聲則王朴阮逸樂之黃鍾正與李照樂之太蔟相當王朴阮逸之樂編鍾編磬各十六雖有四清聲而實差黃鍾大吕之正聲也李照之樂編鍾磬各十二雖有黃鍾大吕而全闕四清聲非古制也聖人作樂以紀中和之聲所以導中和之氣清不可太高重不可太下使八音協諧歌者從容而能永其和乃中和之謂也臣等因精擇李照編鐘編磬十二參於律者增以王朴無射應鍾及黃鍾大吕清聲以為黃鍾大吕太蔟夾鍾之四清聲俾衆樂隨之歌工兼清聲以詠之其聲清不太高重不太下中和之聲可以考矣欲請下王朴樂二律以定中和之聲就太常鐘磬擇其可用者用之其不可修者則定從而别制元豐三年同吳雍上時為祕書監致仕宋名臣奏議卷九十六
