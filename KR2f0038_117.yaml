body:
  text: 宋名臣奏議卷一百十七宋趙汝愚編財賦門新法九上神宗應詔言朝政闕失司馬光臣準西京牒準三月三十日詔敕朕涉道日淺暗于致治政失厥中以干陰陽之和乃自冬迄春旱暵為虐四海之內被災者廣間詔有司損常膳避正殿兾以塞責消災變歷日滋久未蒙休應嗷嗷下民大命近止中夜以興震悸靡寧永惟其咎未知攸出意者朕之聽納不得於理歟獄訟非其情歟賦斂失其節歟忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆歟何嘉氣之久不效也應中外文武臣寮並許實封直言朝廷闕失朕將親覽考求其當以輔政理三事大夫其務悉心交警成朕志焉臣伏讀詔書喜極以泣昔成湯以六事自責今陛下以四事求諌聖人所為異世同符凡詔書所言皆今日之深患陛下既巳知之羣臣夫復何云曾子曰尊其所聞則髙明矣行其所知則光大矣陛下誠知其如是復能斷志無疑不為左右所移則安知今日之災沴不如太戊之桑榖髙宗之鼎雉成王之雷風宣王之旱魃更為宗廟生民之福乎然自詔下以來臣不知中外之臣亦有以當今之急務生民之疾苦力為陛下別白言之者乎蓋必有之矣而臣未得聞也臣竊不自揆伏念父子受國厚恩備位侍從嚮在朝廷妄以狂瞽塵浼聖聰間以疾衰自求間官不敢復預國家之議四年於兹矣幸遇陛下發不諱之詔問以朝政闕失斯實千載一時古人雖在畎畝猶不忘君况居位食祿者乎是以不敢畏當塗避衆怒愛微軀保妻子心知時事之可憂而塞默不言也竊觀陛下英睿之性希世少倫即位以來鋭精求治恥為繼體守文之常主髙欲慕堯舜之隆下不失漢唐之盛擢俊傑之才使之執政言無不聽計無不從所譽者超遷所毁者斥退垂衣拱手聽其所為推心置腹人莫能間雖齊桓公之任管仲蜀先主之任諸葛亮殆不及也執政者亦悉心竭力以副陛下之欲恥為碌碌守法循故事之臣每以周公自任是宜百度交正四民豐樂頌聲旁洽嘉瑞沓至乃其效也然六年之間百度紛擾四民失業怨憤之聲所不忍聞災異之大古今罕比其故何哉豈非執政之臣所以輔陛下者未得其道歟所謂未得其道者在於好人同已而惡人異已是也陛下既全以威福之柄授之使之制作新法以利天下是宜與衆共之捨短取長以求盡善而獨任已意惡人攻難羣臣有與之同者則擢用不次與之異者則禍辱隨之人之情誰肯棄福而取禍去榮而就辱於是天下之士躁於富貴者翕然附之爭勸陛下益加委信順從其言嚴斷刑罰以絶異議如是者往往立取美官比年以來中外執事附權者皆此屬也其懷忠直守亷恥者皆擯斥廢棄或罹罪譴無所容立至於臺諫之官天子耳目所以規朝政之闕失糾大臣之專恣此陛下所當自擇而亦使執政擇之彼專用其所親之人或小有違忤即加貶逐以懲後來必得佞諛之尤者然後使為之如是則政事之愆謬羣臣之姦詐下民之疾苦逺方之寃抑陛下何從得聞見之乎又奉使詢訪利害於四方者亦莫非其所親愛之人皆先稟其意指憑其氣勢以驅迫州縣之吏善惡繫其筆端升黜由其唇吻州縣之吏承迎奉順之不贍何暇與之講利害立同異哉其入奏則云州縣守宰咸以為便經久可行陛下但見文書粲然可觀以謂法之至善詢謀僉同豈知其在外之所為哉或者更增為條目務求新巧互陳利病各事改張使畫一之法日殊月異久而不定吏民莫知所從蓋由襲故則無功出竒則有賞彼皆進身之私計非有益國便民之志也又今使者督責所在監司監司督責州縣上下相驅競為苛刻奉行新法稍不盡力則謂之非才不職及沮壞新法立行停替或未熟新法誤有違犯皆不理赦降去官與犯贓者罪同而重於犯私罪者州縣之吏唯奉行文書救免罪戾之不暇民事不復留心矣又潛遣邏卒聽市道之人謗議者執而刑之又出榜立賞募人告捕誹謗朝政者臣不知自古聖帝明王之政固如是耶昔堯稽于衆舍已從人舜戒羣臣豫違汝弼汝無面從退有後言此其所以為帝王稱首者也秦惡聞其過殺直諫之士禁偶語之人及其禍敗行道之人皆知之而巳獨不知此所以為萬世戒者也子産相鄭鄭人遊於鄉校以論執政然明請毁之子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞從善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也何今之執政異於古之執政乎齊景公謂梁丘據曰惟據與我和晏子對曰據亦同也焉得為和和如羮焉水火醯醢鹽梅以烹魚肉宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之今朝廷之臣對揚啓沃亦有異於梁丘據者乎衛君言計非是而羣臣和者如出一口子思曰以吾觀衛所謂君不君臣不臣者也人主自臧則衆謀不進事是而臧之猶却衆謀况和非以長惡乎夫不察事之是非而悅人贊已暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以在民上民不與也若此不已國無類矣子思言於衛侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生今執政主新法羣下同聲賢之有以異於衛國之政乎是以士大夫憤悶鬱結視屋竊歎而口不敢言庶人飢寒憔悴怨嗟號泣而無所控告此則陛下所謂忠謀讜言鬱於上聞而阿諛壅蔽以成其私者也茍忠讜退伏阿諛滿側而望百度之正四民之樂頌聲之洽嘉瑞之臻固亦難矣方今朝之闕政其大者有六而已一曰廣散青苗錢使民負債日重而縣官實無所得二曰免上户之役斂下户之錢以養浮浪之人三曰置市易與細民爭利而實耗散官物四曰中國未治而侵擾四夷得少失多五曰結保甲教習凶器以疲擾農民六曰信狂狡之人妄興水利勞民費財若其他瑣瑣米鹽之事皆不足為陛下道也捨其大而言其細捨其急而言其緩外有獻替之迹內懷附會之心是姦邪之尤者臣不敢為也凡此六者之為害人無貴賤愚智莫不知之乃至陛下左右前後之臣日譽新法之善者其心亦知其不可但欲希合聖心附會執政盜富貴耳一旦陛下之意移則彼之所言亦異矣臣今不敢復費簡札敘利害以煩聖聽但願陛下勿詢阿諛之黨勿徇權臣之意斷志罷之必有能為陛下言其詳者矣此六者之中青苗免役錢為害尤大夫力者民之所生而有也榖帛者民可耕桑而得也至於錢者縣官之所鑄民不得私為也自未行新法之時民間之錢固已少矣富商大賈藏鏹者或有之彼農民之富者不過占田稍廣積榖稍多室屋修備耕牛不假而已未嘗有積錢巨萬於家者也其貧者藍縷不蔽形糟粳不充腹秋指夏熟夏望秋成或為人耕種資采拾以為生亦有未嘗識錢者矣是以古之用兵各因其所有而取之農民之役不過出力稅不過榖帛及唐末兵興始有稅錢者故白居易譏之曰私家無錢爐平地無銅山言責民以所無也今有司為法則不然無問市井田野之民由中及外自朝至暮唯錢是求農民值豐嵗賤糶其所收之榖以輸官比常嵗之價或三分減二於斗斛之數或十分加二以求售於人若值凶年無榖可糶吏責其錢不已欲賣田則家家賣田欲賣屋則家家賣屋欲賣牛則家家賣牛無由可售不免伐桑棗撤屋材賣其薪或殺牛賣其肉得錢以輸官一年如此明年將何以為生乎故自行新法以來農民尤被其患農者天下之本農既失業餘民安所取食哉今貨益重物益輕年雖飢榖不甚貴而民倍困為國計者豈可不少思其故哉此皆斂錢之咎也北盡塞表東被海涯南踰江淮西及卭蜀自去嵗秋冬絶少雨雪井泉溪澗往往涸竭二麥無收民已絶望孟夏過半秋種未入中戶以下大抵乏食採木實草根以延朝夕若又如是數月將如何哉當此之際而州縣之吏督迫青苗助役錢不敢少緩鞭笞縲紲唯恐不逮婦子遑遑如在湯火之中號泣哭天無復生望臣恐鳥窮則啄獸窮則攫民困窮已極而無人救恤羸者不轉死溝壑壯者不聚為盜賊將何之矣若東南西北所在嘯聚連羣結黨日滋月蔓彌漫山澤蹈藉城邑州縣不能禁官軍不能討當是時方議除去新法將奚益哉緑林赤眉黃巾黑山之徒自何而有皆苦於賦斂復值飢饉窮困無聊之民耳此乃宗廟社稷之憂而廟堂之上方晏然自得以為太平之業八九已成此臣所謂痛心疾首晝則忘食夜則忘寢不避死亡欲默不能者也易復之初六曰不逺復無祗悔元吉言過而能改雖悔不大也其上九曰迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征言迷而不復凶且有災於君道尤不利也昔秦穆公敗于殽作誓曰惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猶詢兹黃髮則罔所愆蓋悔棄老成之逺慮用利口之淺謀以取覆敗而思補其過也故能終雪前恥強霸西戎漢武帝征伐四夷中國虛耗賊盜羣起又喪二師之軍乃下痛哭之詔曰乃者以縛馬書遍示丞相御史二千石諸大夫郎為文學者皆以虜自縛其馬不祥甚哉公車方士太史太卜皆以為吉今計謀卦兆皆反謬蓋始寤公卿方士之諂諛對不以誠致誤國事有悔于心也故禁苛暴止擅賦力本農天下復安自國家行新法以來天下之心祈口禱唯兾陛下之覺悟而拯救其失以蘇疲民如望上天之膏澤日復一日以至于今及今改之猶可救也過是則民力屈竭一旦渙然離散乃始勞心安集豈不難哉切觀陛下詔書寅畏天災深自咎責丁寧懇惻以求至言是陛下已知前日之失而欲有所改為也若徒著之空文而於新法無所變更是猶臨鼎哀魚之爛而益薪不已將何補哉陛下誠能垂日月之明奮乾剛之斷放逺阿諛勿使壅蔽自擇忠讜為臺諫官收還威福之柄悉從已出詔天下青苖錢勿復散其見在民間逋欠者計從初官本分作數年催納更不收利息其免役錢盡除放差役並依舊法罷市易務其所積貨物依元買價出賣所欠官錢亦除利催本罷拓土闢境之兵先阜安中國然後征伐四夷罷保甲教閲使服田力穡所興修水利委州縣相度凡利少害多者悉罷之如此則中外歡呼上下感悅和氣薰蒸雨必沾洽矣彼阿諛之人附會執政者皆緣新法以得富貴若陛下以為非而捨之彼如魚之失水必力爭固執而不肯移願陛下勿問之也臣竊聞陛下以旱暵之故避殿撤膳其焦勞至矣而民終不與其澤不若罷此六者立有溥博之德及於四海也又聞京師近雖獲雨而畿甸之外旱氣如故王者以四海為家無有逺近皆陛下之赤子願陛下雖徇羣臣之請御正殿復常膳猶應兢兢業業憂勞四方不遽自寬以為無復災也又諸州縣奏雨往往止欲解陛下之焦勞一寸則云三寸三寸則云一尺多不以其實不可不察也又聞青苗之法災傷及五分則倚閣其間官吏不仁者至有抑逼百姓止放四分以下稅此尤可罪者也臣在冗散之地若朝政小小得失臣固不敢預聞今坐視百姓困於新法如此將為朝廷深憂而陛下曾不知之又今年以來臣衰疾寖增恐萬一溘先朝露齎懷忠不盡之情長抱恨於黃泉是以冒死一為陛下言之儻陛下猶棄忽而不之信此則天也臣不敢復言熙寧七年四月上時判西京留守司御史臺上神宗論新法畫一蘇轍臣自少讀書好言治亂方陛下求治之初上書言事陛下不廢狂狷召對便殿親聞德音九品賤官自此始得登對論事當此之時陛下好問之聲震動海內愚賤之人篤信寡慮以為天下之事可得徐陳遍舉指顧而定矣既而誤蒙恩澤受職條例抗論得失與有司不合得請外補於今七年而天下之治安終未可見臣竊疑之伏惟陛下天縱聖德聰明睿智不學而具於謀慮措置曾何足云然自頃嵗以來每有更張民率不服蓋青苗行而農無餘財保甲行而農無餘力免役行而公私並困市易行而商賈皆病上則官吏勞苦患其難行下則衆庶愁歎願其速改凡此四者豈陛下之聖明有所不知耶臣以為非也陛下之聖明無所不知何以言之二年以來陛下之聖明英斷廢置大吏數其罪愆明示臣庶凡天下之所共疾惡者陛下無一不知由此觀之凡天下之所共怨苦者陛下何所不察今者皇天悔禍啓導聖意易置輔相中外踴躍思覩寬政而歷日彌月寂寞無聞衆心皇皇如久飢而不得食臣雖愚狂竊獨為陛下恨也陛下自即位以來求治之心常若不及意將以堯舜之隆平易漢唐之淺陋不幸左右不明陵遲之極以至於此天下之人孰不知之今也既知其不可用而去之又循其舊術而不改將遂代之任咎此臣之所以為陛下恨也且今天下之安危智者不再計矣水旱連年死者將半遺民飢困盜賊滿野疆場未寧軍旅在外府庫空竭邊餽寡少事之可憂者何可勝數術之不效斷可見矣然陛下獨遲遲而不決意者已為之而已廢之恐天下有以窺其深淺耶臣聞人主之德如天天之於物也熾然而旱赤地千里草木皆死可謂虐矣然至雷雨時作膏澤洋溢百榖奮起民復粒食鼓舞盛德而忘旱之虐何者度量廣大改過無疑也如使密雲而不雨既雨而中止遲疑猶豫久而不忍則天下生物盡矣傳曰君子之過也如日月之食焉其過也人皆見之更也人皆仰之今陛下誠先治其心使虛一而靜湛乎彼我得失莫能嬰也去惡如棄塵垢遷善如救飢渴與民一新罷此四事青苖之既散者要之以三嵗而不收息保甲之既團者存其舊籍而不任事復差役以罷免役之條通商賈以廢市易之令行之期年而觀之茍民不安居水旱復作盜賊復起財用復竭誠有一事以憂陛下臣請伏罔上之誅以謝左右陛下誠不信臣數年之後親受其弊矣古人有言曰一慙之不忍而終身慙乎惟陛下為社稷籌之臣謹列四事之害畫一以獻不勝愚忠憤悶之誠干犯天威伏候鈇鉞畫一狀臣謹案青苗免役保甲市易四事得失最為易見上自中外臣寮下至田父野老無有不知者但以朝廷所行言其是則有功言其非則有罪是以畏避鉗默不敢正言臣今謹采衆議人所共知灼然可見者畫一開坐如後一議者皆謂富民假貸貧民坐收倍稱之息是以富者日富貧者日貧今官散青苗取息二分收富人兼并之權而濟貧民緩急之求貸不異於民間而息不至於倍稱公私皆利莫便於此然公家之貸其實與私貸不同私家雖取利或多然人情相通别無條法今嵗不足而取償於來嵗米粟不給而繼之以芻藁雖雞豚狗彘皆可以還債也無嵗月之期無給納之費出入閭里不廢農作欲取即取願還即還非如公家動有違礙故雖或取息過倍而民恬不知今官貸青苗責以見錢催隨二稅鄰里相保結狀請錢一家不至九家坐待奔赴市城縻費百端一有逋竄均及同保貧富相逮要以皆斃而後已朝廷雖多設法度以救其失而其實無益也一議者又謂平時差役破壞民家一夫為役舉家失業故使逐户出錢官為雇人謂之免役出錢雖多而民免於破家之患以此為説行之不疑然不知三代之民以力事上不專以錢近世因其有無各聽其便有力而無財者使效其力有財而無力者皆得雇人人各致其所有是以不勞而具今也棄其自有之力而一取於錢民雖有餘力不得效也於是賣田宅伐桑柘鬻牛馬以供免役而天下始大病矣且夫錢者官之所為米粟布帛者民之所從生也古者上出錢以權天下之貨下出米粟布帛以補上之闕上下交易故無不利今青苗免役皆責民出錢是以百物皆賤而唯錢最貴欲民之無貧不可得也至如京師百司郡縣刑法之吏無祿而役為日久矣周制庶人在官雖曰有祿而事簡少勢或易供非如今時員數猥多不可供億况三代兵出於民而今世之兵坐而仰給若又兼舉大費為力實難然議者以為給之以祿然後可責之以亷蓋朝廷選吏之精必不如擇官之謹祿吏之厚必不如祿官之多今謹擇多祿之官猶不免於貪而况於吏人乎且昔之為法也計贓得罪無祿者減等今用倉法則吏之得罪反重於官顛倒失宜尤為未可若朝廷誠患吏貪但使官得其人則吏之受賕自有分限若猶未也則雖重祿深法不能禁矣一議者又謂三代之盛兵出於農故團結伍保以寓軍今朝廷喜其近古亦謂可行然而三代之民受田於官官之所以養之者厚故出身為兵而不怨今民買田以耕而後得食官之所以養之者薄而欲責其為兵其勢不可得矣蓋自唐以來民以租庸調與官而免於為兵今租庸調變而為兩稅則兩稅之中兵費具矣且又有甚者民之納錢免役也以為終身不復為役矣今者既以免役而於捕盜則用為耆長壯丁於催稅則為户長里正於巡防則用為巡兵弓手一人有三役具焉民將何以堪之且其為巡兵弓手也一保甲之中丁壯既出老弱守舍盜賊乘間如入無人之境而其上畨之期又不過旬日坐作進退未能知也代者既至相率而反往來道路勞弊何益至使盜賊縱橫官吏蒙責嘯聚羣黨攻剽州縣未必不由此也古之循吏使民賣劍買牛今也使之棄其農具而置兵器小民無知緣以為惡良民之畏事者一入而終身不得脫姦民之好權者一補而終身不得免其患害有不可勝言者矣一議者常患百貨輕重制在富民少則貴賣以取嬴多則賤買以要其利利有所壅商賈難通於是置市易之官以平貴賤有司誠守此議不更别有所營則雖繁碎難行然亦未有深害今自置市易無物不買無利不籠命官遣人販賣南北放債取利公行不疑杜絶利源不與民共觀其指趣非復制其有無權其輕重而已也徒使小民失業商旅不行空取專利之名實失商旅之利國體卑辱海內離心巍巍盛朝何苦如此况復小民好利類無逺見爭取官債以救目前欺謾兄弟妄引抵當期限既迫逃陷無所婦子離散行路咨嗟奈何為此陷穽誘而納之也至於姦民巨賈窺伺間隙取利則多或輸滯積不售之貨以易見錢或指殘破無用之屋以賖實貨巧智百出難以具言有司蒙蔽指以為利帛幣一散汗漫難收官之所藏徒文具而已竊聞朝廷近日將議窮究然而既弊之法施行未巳買賣百物猶且如故譬如含茹毒藥喉舌破敗胸腹脹滿知其非矣且閉口不吐安坐切脈廣求方書其於速愈之術疏矣右臣所陳畫一事件皆是耳目所接衆庶共知朝廷清明豈有不察若誠有意改易非復難行但朝出一紙詔書四弊夕去非如前代積弊或在列國或在四夷欲議更改恐其搖動海內故且維持含養茍自便安今事在朝廷出命則已衆所系望勢難久留而私自顧戀遲遲不決以失天下之心臣竊不取也愚憃之人志在憂國言詞激切干犯典刑區區寸誠甘俟誅戮熙寧九年十一月上時自齊州學官官滿赴闕上哲宗論新法便民者存之病民者去之司馬光臣竊見先帝聰明睿智勵精求治思用賢輔以致太平委而任之言行計從人莫能間雖周成王之任周公齊桓公之任管仲燕昭王之任樂毅蜀先主之任諸葛亮殆不能及斯不世出之英主曠千載而難逢者也不幸所委之人於人情物理多不通曉不足以仰副聖志又足已自是謂古今之人皆莫已如不知擇祖宗之令典合天下之嘉謀以啓迪清𠂻佐佑鴻業而多以已意輕改舊章謂之新法其人意所欲為人主不能奪天下莫能移與之同者援引登青雲與之異者擯斥流溝壑專欲遂其很心不顧國家大體人之常情誰不愛富貴而畏刑禍於是縉紳大夫望風承旨競獻䇿畫務為竒巧捨是取非興害除利名為愛民其實病民名為益國其實傷國作青苗免役市易賒貸等法以聚斂相驅生此厲階迄今為梗又有邊鄙之臣行險徼幸大言面欺輕動干戈妄擾蠻夷夫兵者國之大事廢興存亡於是乎在而其人茍榮一身之官賞不顧百姓之死亡國家之利病輕慮淺謀發於造次御軍無法僅同兒戲深入敵境坐守孤城糧運既竭狼狽奔潰築寨極邊功猶未畢輕敵不備闔城之地使兵夫數十萬暴骸於曠野資仗供億棄捐於異域又有生事之臣欲乘時干進建議置保甲户馬保馬以資武備變茶鹽鐵冶等法增家業侵街商稅等錢以供軍須遂使九土之民失業窮困如在湯火此皆羣臣躁於進取誤惑先帝使利歸於身怨歸於上非先帝之本志也臣荷先帝大恩常思報稱嚮在朝廷之時屢言新法非便觸忤權貴冒犯衆怒爭辨非一先帝憐其孤忠不以為罪仍蒙寵擢置之樞廷臣以所言未行力辭不受臣非惡富貴而好貧賤正欲感寤先帝知臣為國不為身庶幾采納狂瞽使百姓獲安基圖永固而已既又自乞冗官退伏閭里雖身處于外區區之心晨夕寤寐何嘗不在先帝之左右所以不敢自赴闕廷如是之久者亦猶辭樞廷之志也熙寧七年歷時不雨先帝遇災而懼深自刻責誕布詔書廣開言路臣當是時不勝踴躍極有開陳而建議之臣知所立之法不合衆心天下之人必盡指其非恐先帝覺寤而受誤國之罪伏欺罔之刑乃勸先帝繼下詔書言新法巳行必不可動臣之所言正為新法新法不動臣尚何言自是閉口不敢復預朝廷議論十有一年矣然每覩生民之愁怨憂社稷之阽危於中夜之間一念及此未嘗不失聲長歎也葵藿之志猶望先帝一賜召對訪以外事得吐心極言退就斧鉞死無所恨不意上天降禍先帝升遐臣之寸誠無由披露鬱抑憤悶自謂終天及奔喪至京乃蒙太皇太后陛下特降中使訪以得失是臣積年之志一朝獲伸感激悲涕不知所從顧天下事務至多臣思慮未熟不敢輕有條對但乞下詔使吏民皆得實封上言庶幾民間疾苦無不聞達既而聞有旨罷修城役夫撤詗邏之卒止御前造作京城之人巳自歡躍又臣歸西京之後繼聞斥退近習之無狀者戒飭有司奉法失當過為煩擾者罷物貨等場及民所養户馬又寬保馬年限四方之人無不鼓舞聖德傳布一日千里頌嘆之聲如出一口溢于四表乃知太皇太后陛下深居禁闥皇帝陛下雖富於春秋天下之事靡不周知民間衆情久在聖度四海羣生可謂幸甚凡臣所欲言者陛下略巳行之臣稽慢之罪實負萬死夫為政在順民心茍民之所欲者與之所惡者去之如決水於髙原之上以注川谷無不行者茍或不然如逆阪走珠雖竭力以進之其復走而下可必也今新法之弊天下之人無貴賤愚智皆知之是以陛下微有所改而逺近皆相賀也然尚有病民傷國有害無益者如保甲免役錢將官三事皆當今之急務釐革所宜先者臣今別具狀奏聞伏願決自聖志早賜施行議者必曰孔子稱孟莊子之孝其他可能也其不改父之臣與父之政是難能也又曰三年無改於父之道可謂孝矣彼謂無害於民無損於國者不必以已意遽改之耳必若病民傷國豈可坐視而不改哉易曰幹父之蠱有子考無咎象曰幹父之蠱意承考也蠱者事有蠱弊而治之也幹父之蠱迹似相違意則在於承繼其業成父之美也又曰裕父之蠱往見吝象曰裕父之蠱往未得也裕者饒益之名也若不忍違異益父之過往而不返未為得宜也昔漢文帝除肉刑斬右趾者棄市笞五百者多死景帝元年即改之笞者始得全武帝作鹽鐵榷酤均輸等法天下困弊盜賊羣起昭帝用賢良文學之議而罷之後世稱明唐代宗縱宦官公求賂遺置客省拘滯四方之人德宗立未三月悉禁止罷遣之時人望致太平德宗晚年有宫市五坊小兒暴橫為民患鹽鐵月進羡餘順宗即位皆罷之中外大悅是皆改父之政而當者人誰非之哉况先帝之志本欲求治而羣下干進者競以私意紛更祖宗舊法致天下籍籍如此皆羣臣之罪非先帝之過也為今之計莫若擇新法之便民益國者存之病民傷國者悉去之使天下曉然知朝廷子愛黎庶之心吏之苛刻者必變而為忠厚民之離怨者必變而為親譽德業光榮福祚無窮豈不美哉夫天子之孝在於得萬國之歡心以事其親措置如此歡心孰大焉事親孰備焉今幅貟之內所在嗷嗷有倒垂之急延頸傾耳以俟改法庶得蘇息若朝廷不以為意日復一日萬一遇數千里之蝗旱公私匱竭無以相救失業之民蜂起為盜安知無姦雄乘之而動則國家有纍卵之危申屠剛曰未至豫言固常為虛及其已至又無所及朝廷當此之際解兆民倒垂之急救國家纍卵之危豈暇必俟三年然後改之哉况今軍國之事太皇太后陛下權同行處分是乃母改子之政非子改父之道也何憚而不為哉惟聖明裁察元豐八年四月命光知陳州光先上此奏上哲宗論更張新法當須有術呂公著臣伏見陛下自臨朝以來留神庶政以休息生民為念凡所施為皆中義理如罷導洛堆垜等局減放市易見欠息錢罷人户養馬放積欠租稅差官體量茶鹽法使者之刻剝害民如吳居厚霍翔王子京等內臣之生事斂怨如李憲宋用臣等皆從罷去中外聞之無不欣喜踴躍今來復蒙陛下不遺踈拙特降清問臣雖無狀敢不竭盡愚見臣伏思先帝初即位召臣充翰林學士當時親見先帝至誠求治嘗令臣草詔書以寬省民力為意自王安石秉政變易舊法羣臣有論其非便者則以為沮壞法度必加廢斥自是青苗免役之法行而取民之財盡保甲保馬之法行而用民之力竭市易茶鹽之法行而奪民之利悉若此之類甚衆今陛下既已深知其弊至公獨斷不為衆論所惑則更張之際當須有術不在倉卒且如青苗之法但罷逐年比較則官司既不邀功百姓自免抑勒之患免役之法當須少取寬剩之數度其差雇所宜無令下户虛有輸納上户取其財中户取其力則公私自然均濟保甲之法止令就冬月農隙教習仍只委本路監司提按既不至妨農害民則衆庶相得安業無轉為盜賊之患如此三事並須别定良法以為長久之利至於保馬之法先帝已知有司奉行之謬市易之法先帝尤覺其有害而無利及福建江南等路配賣茶鹽過多逺方之民殆不聊生俱非朝廷本意恐當一切罷去而南方鹽法三路保甲尤宜先革者也以上數事皆略陳大槩其它詳悉非書所能盡然臣所深慮者陛下必欲更修庶政使不驚物聽而實利及民莫若任人為急故臣前日輒獻愚誠乞陛下廣開言路選置臺諫官誠得中正之士布在要職使講求天下利害議所以更修之術朝廷上下協心同力斟酌而裁制之則天下不難為矣若不得其人則雖有欲治之意終不可以濟事功臣又竊慮議事者以為若更張青苖助役等法則向去國用必至不足然自來提舉常平司等處錢物並係封樁自不許撥充軍國常費况今日正是息民省事之時既外不輕用兵革內無土木橫費自然國計易給兼罷得上件掊斂則民力巳覺漸舒只如近日方罷導洛司堆垜場沿汴稅額巳有增數此古人所謂百姓足君孰與不足者也元豐八年四月召知揚州資政殿大學士吕公著兼侍讀六月十一日公著入見太皇太后遣中使梁惟簡諭公著曰當此拯民疾苦更張何者為先二十八日公著上此奏太皇太后封公著劄子付司馬光詳所陳更張利害有無兼濟之才直書當與未當以聞上哲宗論吕公著所陳利害司馬光臣今月一日夜蒙降到吕公著劄子一道付臣看閲所陳更張利害有無兼濟之才直書當與未當具悉奏來者臣自公著到京止於都堂衆中一見自後未嘗私相見及有簡帖往來今公著所陳與臣所欲言者正相符合蓋由天下之人皆欲如此臣與公著但具衆心奏聞耳臣聞書曰有廢有興出入自爾師虞庶言同則繹言國家政事欲有所改更必先謀於衆人所言皆同然後行之則無失也傳曰上酌民言則下天上施言為人上者當采酌民言從其所欲則在下之人戴上如天受其恩施也伏望陛下察公著所陳參以臣民所上實封奏狀若與之同者斷志行之勿復有疑臣見太平之功不日可成矣公著一言而天下受其利可謂有兼濟之才所言無有不當惟有保甲一事欲就農隙教習臣愚以朝廷既知其為害於民無益於國便當一切廢罷更安用教習容臣續具劄子奏聞次其公著劄子謹同封上元豐八年六月上時為門下侍郎宋名臣奏議卷一百十七
