body:
  text: 宋名臣奏議巻二十九宋趙汝愚編帝系門嬪御上仁宗乞序正宫掖龎籍臣前月十一日曽上封奏為内侍韓從禮等傳美人尚氏教㫖令開封府放免工匠單慶等六人本行差遣事特䝉悉聽科斷韓從禮等及敕下諸司今後宫闈教㫖並不得施行中外聞之孰不歡快有以見陛下英斷實九廟無疆之休四海永安之福也臣愚更願陛下使宫掖之間上下有序不以恩寵隂啟禍階蠧耗金珠漸困國力通私謁以亂政縱外親而干法上損聖德次紊朝綱實天下幸甚景祐元年四月上時為開封府判官上仁宗論宫禁五事孫沔臣聞虞舜治家而納麓姬文刑寡而御邦周南歌闗雎之德仲尼刪詩著為三百篇之首魯史先經以紀元妃丘明直書為十二公之始易以風自火出為家人之象言號令之行乎外由中正而明于内非嚴風火之威則難以正于家矣禮云身修而家齊家齊而國治國治而天下平王政之本基乎此矣是知先聖懼昵情之為患而立教於將来者也恭以皇帝陛下仁深溥博明達照臨好善無厭從諫弗咈紹三朝之謨訓躬萬幾之憂勤旰食在念將二十年雖古之聖帝明王致志行事無以過也今朝無專權之臣上無失道之事然而隂陽未和災變未息法令不行恩威不著者豈治内之道有所未至歟臣不欲迂闊引喻前古願以聞見五事而陳之若以言獲罪臣之職也伏以中宫正位徳配至尊主治隂教為天下母三妃九嬪世婦御妾上下分統無使僣差百世不易之論也伏自景祐巳來三黜寵闈兩犯宸扆盖所起幽微不勝恩遇身貴則性悍福極則患生退屏繼跡踰僣如舊茍不建立嚴制竊恐漸生厲階昨見上元嘉節内庭出遊美人才人多不隨從飛盖蔽景流車激霆各崇華衛分道爭行衆目共觀與后為並此非所以示外而垂範者也臣乞今後貴品嬪御等並令修備禮節戒約奢侈常隨皇后出入不得各排儀衛輒自矜越仍乞選擇端嚴近上夫人一兩員立為宫師以佐内則所冀上下有别而中外不惑矣竊以宫政之設内職是先尚書侍御司記典言一百二十人則為大備故先朝之數侍史不過五百人俸給止于千二十貫皆有紀律不甚奢盈今聞十倍増人已踰二三千十倍添俸或至二十萬私身養女數復過之百司供億簿書可知一嵗之中所用何極非所以示節儉也臣乞取索宫中諸院宫人及私身養女都大數目呈取進止若非遊幸之所宜令檢勘合用人量留外並放歸本家任從其便而請給之數現在者宜節減其半此所以消幽曠之氣而省財廩之費也竊以内侍之職最為親近宣傳國命出納王言常行抑制尚或騰陵今遷秩不踰年賞賜無虚日甲第連坊名園接畛玉帛盈於後房絲竹聞於别院官尊禄厚職重貟多若不立之儀式必恐亢於寵榮臣欲乞御藥依舊只用二貟御帶押班都知並乞選擇謹重公嚴勤畏舊有心力者充三年一遷官不許非次改轉未有嗣者令養䕃一子則内無乆貴之人下有進身之路亦一代之永制也竊以勾陳九重華盖萬乗垣直太紫庭儼雲龍非深嚴不為尊非禁戒不為備闌入則抵罪誤至則伏誅使内言不出於閫外言不入於閫所以防未然而限中外也今上之起居言語衆無不知帷箔宴遊外無不傳内降斜封坦夷若道免刑要賞響應如神皆由左右之人出入為地邇臣頗邪能伺動靜迎合巧中率用斯道若不早辨以防微竊恐長姦而忽變臣欲乞應合入内及聽喚中人並用五十已上十五已下者諸宫院子須限七十已上分定畨次上下不得參雜出入仍令内東門司專切㸃檢其暗祗候俳優人及公主院擔子官各放歸本營所有内道場乞今後㫁絶此則整肅於宸庭足以輝光於史牒竊以王者所須嵗終不㑹此天下之財天子用之有司不得而吝也其或出納不謹支費不節豈可容姧不詰其敝今御寳慿由司内東門劄子取諸庫犀玉金銀錢帛一嵗至三百餘萬貫但有入内之名不知所用之處此數既多不可悉記昨聞胥吏偽取庫金三十兩抵法况御寳是中禁所掌外人何計而詐得之竊恐前後妄用非此一吏也乞差不干礙公幹有心力臣寮置司將寳元後來係御寳慿由及内東門劄子取左藏庫等金銀犀玉錢帛大數對簿帳及謝恩表狀造作文厯并内藏庫亦自寳元後来内中支使金寳錢帛都數逐件磨勘即見無涯費用積乆欺弊仍乞今後諸宫閤凡有取索出到慿由劄子先下内侍省都知入内覆奏然後置簿抄上畨換通簽正牒下諸庫藏方得支官物不得直行取索或更别設闗防節減用度亦經乆之利也此五事者實政教之本源昇平之基業也中宫正則内宰之制行于六宫而寵嬖不犯於上矣宫禁嚴則中閫之事絶于衆口而朋黨不結於外矣宫人不減則用度不給怨曠以感隂陽之沴矣内侍不禁則威柄不一引薦以來邪佞之𩔖矣御寳不嚴財貨不計則盜詐公取而無慮矣噫恩能勝威昵可消正甘言令色遜于志先意希㫖㑹其事仁愛浸深忍情難決非至聖至明不可免也伏望皇帝陛下以公道制私情大日月之輝發雷霆之㫁柔媚不干於聰明愛倖盡決於道義則何患天下之不治哉書曰威克厥愛允濟易曰揚于王庭剛決柔也傳曰棖也慾焉得剛非用天之剛健中正則於㫁也難矣今昊賊侵軼西鄙攻守臣未敢進一䇿盖儒者不知兵不可預言也若大臣盡心諸將用命恐亦未為大患也夫手足之疾侵于皮膚積為瘡痍發于指掌未有所損也心腹之疾迫於膏肓壅為癰疽潰于頭目不可卒救也此五事措置得宜則有無窮之福此五事因循弗舉恐為不測之慮履霜至于堅氷然火在於積薪非一朝一夕之故也惟㫁之在不疑行之恐不及動無失機間不容髮則百世之利萬方之幸此皆陛下家事非人臣所得及也至於政教之綱紀未舉輔相之心德未同朋黨之邪正未分著位之材愚未辨進賢難於起死去佞過於拔山法令撓於親恩賞及於濫豈不謂根蘖於内而斤斧不施者乎若聖人一慮及此則庶事自正其條例悉數之名俟聰明聴然其說異日為陛下言之也臣素非博識惟盡愚誠不厯詆於羣公不專攻於上徳但慮切直速怨貴權不能保身貽憂老母至於事君之心則無所愧矣伏望夙夜之餘再賜詳覽幸甚慶厯元年正月上時為左正言知諫院上仁宗乞止絶宫人出入孫沔臣伏見芳林園南宅見安故豫王靈輿至三月初三日方行攅殯諸宫奠酹慰禮已畢今見大内車盖出入朝暮往還非全痛戚之情頗涉朋遊之便道途窺覘僕御喧譁禁士縱欲嚴呵宫人難於檢察誠為隠暗亦合防微伏恐姦細乗時駭機竊發人之所忽事不可知伏諒陛下以苦切在中周思未及臣叨司視聽須至達聞欲乞指揮故豫王本宫人在彼祗候朝夕祭奠餘並止節勿令輒出深為利便慶厯元年二月上上仁宗論美人張氏恩寵宜加裁損歐陽脩臣近風聞禁中因皇女降生於左藏庫取綾羅八千匹染院工匠當此大雪苦寒之際敲冰取水染練供應頗甚艱辛臣伏思陛下恭儉勤勞愛民憂國似此勞人枉費之事必不肯為然外議相傳皆云見今染練未絶臣又見近日内降美人張氏親戚恩澤太頻臣忝為諫官毎聞小有汚損聖德之事須合力言難避天譴臣竊見自古帝王所寵嬪御若能謹儉柔善不求恩澤則可長保君恩或恣意驕奢多求恩澤則皆速致禍敗臣不敢逺引古事只以今宫禁近事言之陛下近年寵尚氏楊氏余氏苗氏之𩔖當其被寵之時驕奢自恣不早裁損及至滿盈今皆何在况聞張氏本良家子昨自脩婉退為美人中外皆聞以謂與楊尚等不同故能保寵最乆今一旦宫中取索頓多恩澤日廣漸為奢侈之事以招外人之言臣不知陛下欲愛惜保全張氏或欲縱恣而敗之若欲保全則須常令謙儉不至驕盈臣料八千匹綾羅必非張氏一人獨用不過支散與衆人而已乃是枉費財物盡為衆人中外譏議則陛下自受以此而言廣散何益昨正月一日曹氏封縣君至初五日又封郡君四五日間兩度封拜又聞别有内降應是疎逺親戚盡求恩澤父母因子而貴可矣然名分亦不可太過其他疎逺皆可減罷臣謂張氏未入宫之前疎逺親戚各皆何在今日富貴何必廣為閑人自招謗議以累聖徳若陛下只為張氏計亦宜如此况此事不獨為張氏大凡後宫恩澤太多宫中用度奢侈皆是汚損聖徳之事繫於國體臣合力言伏望聖慈防微杜漸早為裁損慶厯二年上時為知諫院上仁宗論女御以御寳白制除才人范師道臣聞禮以制情義以奪愛常人之所難惟聰明睿哲之主然後能之近以宫人數多出之此盛徳事也然而事有繫風化治亂之大而未經留意者臣敢為陛下言之竊聞諸閤女御以周董育公主御寳白制並為才人不自中書出誥而掖庭覬覦遷拜者甚多周董之遷可矣女御何名而遷乎才人品秩既髙古有定員唐制止七人而已祖宗朝宫闈給侍不過二三百人居五品之列者無幾若使諸閤皆遷則不復更有貟數矣外人不能詳知止謂陛下於寵幸太過恩澤不節爾夫婦人女子與小人之性同寵幸過則瀆慢之心生恩澤不節則無厭之怨起御之不可不以其道也且用度太煩須索太廣一才人之俸月直中户百家之賦嵗時賜予不在焉况誥命之出不自有司豈盛時之事耶恐斜封墨敕復見於今日矣嘉祐四年六月上時知諫院上英宗論後宫等級司馬光臣聞王化之興始於閨門故易基乾坤詩首關睢前世皆擇良家子以充後宫位號等級各有貟數祖宗之時猶有公卿大夫之女在宫掖者其始入宫皆須年十二三以下醫工診視防禁甚嚴近嵗以來頗隳舊制内中下陳之人競置私身等級寖多無復限極監勒牙人使之雇買前後相繼無時暫絶致有軍營市井下俚婦女雜處其間不可辨識此等置之宫掖豈得為便臣常念此不勝憤惋今陛下即位之初百度惟新嬪嬙之官皆闕而未備臣謂宜當此之時定立制度依約古禮使後宫之人共為㡬等等有㡬人若未足之時且虚其貟數既足之後不可更増凡初入宫皆當幼年未適人者若求乳母亦須選擇良家性行和謹者方得入宫傳之子孫為萬世法此誠治亂之本禍福之原不可以為細事而忽之嘉祐八年十二月上時以天章閣待制知諫院上神宗乞減放宫人錢顗臣伏以厯代聖明之君臨御四海之初必有甚美之事以順人情必竭至誠之心以感天意陛下紹膺大寳憂勤庶政有弊必去聞善必行然猶隂陽未和災異數見豈聖化有所不洽者耶臣竊伏思其一端臣恭聞仁宗及英廟兩朝之間見在宫人尚多幽閉掖庭豈無怨隔之思以汨和氣臣伏乞陛下特軫宸衷沛然下詔法祖宗開寳祥符之制量數放出務令從便無曠時之苦有遂性之樂上足以感天意下足以順人情哲王懿範莫過於此也熈寧元年上時為殿中侍御史裏行上神宗乞罷十閤之制吕誨臣竊聞去年下京東買黄金數萬兩本路科率太暴民頗怨之又廣南新錢監許買真珠上京傳說將備宫中十閤用度盖愚者無知因其民言造為端意謂陛下春秋富盛祥禫既除將邇聲色漸求暇逸此其惑也臣有以知聰明睿知以天下為心必不留神於此爾然重思之天下有道庶人不議明盛之朝不當使民如是論議似亦啟之有因不可不䘏也臣職在言責敢不為陛下一一而陳之臣聞宫禁職位自有班序十閤創置非古儀也或云仁廟晚年欲廣繼嗣諛言闚間遂成其事英宗踐阼因循舊制真作無益害有益也何則既名閤分則異嬪御供具之外仍置官管幹増長事勢動有踰僣且禮之所設本防其漸作法於儉其敝猶奢今日之為實繫聖慮而况陛下尊奉兩宫與仁宗事體不同且虞倖進之臣漸陳無益之計臣愚欲乞陛下沈機慮始臨事制宜俯畢三年之喪首罷十閤之制徳音遂發人心自恱矧復舉動之間使人窺伺莫及豈止成一時之盛美將見垂萬世之休光區區之誠所願至矣熈寧三年五月上時為右諫議大夫御史中丞上神宗乞放内人景氏楊繪臣竊聞内人景氏者曽在仁宗朝為御侍後放出嫁許宗賢近已聴離却召入内者臣竊以文武之政治於衽席家人之道脩於近小而况已經從良豈可復塵於禁掖哉伏乞放之於外以清物議治平四年十月上時知諫院上哲宗乞進德愛身范祖禹臣伏見陛下嗣位以来端拱淵黙專意學問臣侍經席於今累年陛下天縱生知聖徳純茂接對臣下日月如一未嘗小有差失此實上天眷佑皇家保育生民宗廟社稷無疆之福也恭惟太祖皇帝肇造區夏櫛風沐雨削平僣亂以立子孫萬世之基傳之太宗至于真宗遂致太平仁宗年十三即大位章獻明肅太后安定邦家調䕶聖性是以四十二年之間徳澤深結於民天下至今思慕不忘英宗自藩邸入繼大統四海之内同心愛戴先帝勵精求治宵衣旰食躬勤萬事十有九年不幸早棄天下陛下年始十嵗嗣登大位當此之時人心懍懍憂危萬端幸賴太皇太后保佑扶持勤濟艱難斥退凶邪登進忠良詔令所至百姓歡呼皷舞數年以来中外晏然北狄西戎無不從順此皆太皇太后之德也臣不知陛下將何以報之臣竊思陛下所以報之惟在於進徳愛身而已陛下進徳則為太平髙世之主光顯祖宗之烈發揚文母之訓使天下之人皆欣然曰祖宗之德太皇太后之力如此則豈惟皇天祖宗饗佑陛下太皇太后亦不虚勤勞矣陛下愛身則無疾疢不貽太皇太后之憂武伯問孝孔子曰父母唯其疾之憂夫父母之憂莫切於子孫之有疾疢他日陛下有子當自知之陛下若不進德不愛身雖極四海九州之養亦未足為孝也臣自今秋聞外人言陛下於後宫已有所近幸臣初聞之不以為信數月以來傳者益多或云已有懷娠將誕育者言之所起必有其端臣誠至愚不能不惑故敢先事懇切言之陛下内承慈訓外勤聖學方當祇畏以事天地誠孝以奉宗廟思六聖之勤勞念帝業之艱難四方之人無不延頸舉踵注目傾耳觀聴陛下德業之光名譽之隆以想望太平陛下可不謹哉今陛下未建中宫而先近幸左右好色伐性傷於太早年少之時血氣未定戒之在色言人少時血氣未定而先傷伐根本則損夀考之福故君子戒之陛下今年十四嵗而生於十二月其實猶十三嵗也豈近女色之時乎陛下上承天地宗廟社稷之重守祖宗百三十年基業為億兆之人父母豈可不愛惜聖體哉孟子曰事孰為大事親為大守孰為大守身為大守身所以事親也愛身所以愛天下也陛下上有太皇太后皇太后休戚皆繫於陛下之一身豈可不愛惜聖體哉中庸曰君子之道本諸身未有不先愛身而可以進道者也陛下方嚮學問躬儒術欲為堯舜禹湯文武成康之君堯舜禹湯文武之君未有不勤而成者也昔先帝年十五六講學東宫一言一動天下傳之是以多才多藝羣臣莫及今陛下聖學天下未有所聞而先以嗜慾聞於天下此臣之所甚憂也陛下有上聖之性必行上聖之事有上聖之位必求上聖之名豈可不愛聖體哉方今羣臣之心萬民之情正望朝廷如天聖以來所願陛下法則仁宗而已祖宗天下百三十年如寳器之無缺陛下行純德備如美玉之無瑕臣竊為陛下寳之惜之愛之重之陛下豈可不愛惜聖體哉臣聞仁宗未納皇后以前未嘗近幸後宫是以氣體康實在位最乆臣今觀陛下氣怯恐不能如仁宗少時豈可不愛惜聖體哉前世人君多所經厯乃能周知天下之情今陛下生長深宫稼穡艱難未知也人之情偽未見也國家政事未習也六經聖人之言未盡讀也前世興亡之戒未盡閱也天下至大萬事至衆何所不關聖慮豈可不愛惜聖體哉古人有言後宫盛色則賢者隠處佞人用事則諫臣杜口陛下春秋鼎盛方當崇經術邇端士崇尚素朴屏去紛華不宜先留意女色使天下失望以啓小人之心何則陛下如好德則賢人皆動其心欲助陛下之徳而圖天下治安故於陛下有益陛下如好色則小人皆動其心欲奉陛下之欲而圖一身富貴故於陛下有損賢人進則治小人進則亂不可不謹也陛下於此二者將何擇焉昔漢成帝自為太子時以好色聞其後逸欲無節終為漢室昏亂之主漢之基業由成帝而壞豈可不謹其細哉唐太宗欲納鄭仁基女魏徴諫而止之憲宗時教坊使稱密詔選良家子納禁中李絳上疏乃悉還之文宗沒李孝本女入宫魏謩諫即出之古之忠臣愛君必拂其邪心防其嗜欲置君於無過之地使天下莫得而非議也人君所愛莫切於身人臣亦莫切於愛君之身臣濫備勸講以輔導聖德為職懷此憂慮已二三年不能言於未然致陛下已有聲聽流聞於外此臣之罪也臣今若不言他日陛下或專意聲色綱紀壞亂政事荒僻使天下以陛下為逸欲之主則臣之罪豈勝其責雖悔恨萬狀何所及哉伏望陛下察臣之言專精一意勉强學問日新徳業無時逸豫事親則思孝居處則思敬動作則思禮祭祀則思誠服用則思儉養民則思仁使人則思恕心則思道視則思正當食則思天下之饑當衣則思天下之寒陛下每思及此而強學不巳則將以道徳為麗以仁義為美豈聲色之可移哉唯陛下抑情制欲以愛養聖體為先則動植之類無不䝉福生靈幸甚臣不勝拳拳愛君之心元祐四年十二月上時為給事中侍講上宣仁皇后乞保䕶聖體范祖禹臣伏見陛下臨御天下于今五年昧爽聽朝親斷萬事所以勞心竭力者凡皆為祖宗社稷億兆人民將以太平天下付之皇帝也臣愚竊謂陛下憂勤天下之事必先憂天下之本愛養四方之民必愛一人之身夫一人之身天下之本也孟子曰天下之本在國國之本在家家之本在身天下安危繫於人君之一身身安則天下安天下治亂出於人君之一心心正則天下正欲安天下必先安身欲正天下必先正心此二者當今之急務乆逺之計慮也陛下内保佑聖躬調䕶起居外成就睿徳勉進學問前此未嘗聞有纎毫之失今之所聞則異於前外議籍籍皆謂皇帝已近女色後宫將有就館者有識聞之無不寒心皇帝今年十四其實猶十三嵗耳千金之家有十三嵗之子猶不肯使近女色而况於萬乗之主乎陛下愛子孫而不留意於此非愛子孫之道也譬如美木方長正當封植培壅以待其蔽日凌雲若戕伐其根豈不害哉臣嘗見司馬光言章獻明肅太后保護仁宗皇帝最為有法自即位以後未納皇后以前仁宗居處不離章獻卧内所以聖體充實在位厯年長乆章獻於仁宗此功最大臣考之國史仁宗在乳褓章獻使章恵太后護視章獻臨朝仁宗起居飲食章惠必與之俱所以保佑扶持恩意勤備然則章惠保護仁宗乃章獻太后之意今陛下臨朝日有萬幾至於左右護視皇帝臣不知有如章恵者乎若未能如章恵則陛下豈得不留聖意也陛下以朝事責宰相以邉事責將帥人君闕失羣臣邪正責諫官御史皇帝學問責講讀官若朝事不治宰相之罪也邉鄙不寧將帥之罪也人君闕失不知羣臣邪正不分諫官御史之罪也皇帝學問不進臣等之罪也至于皇帝早夜起居之節嗜欲之際此最切身之事豈可無任其責者乎陛下博覽史冊洞知古今古之帝王何嘗不以女色損夀考之福惟傷於太早敗於無節耳思之至此可為切骨之戒臣所以不避誅戮為陛下言之伏望陛下與皇太后太妃詳論此事有損聖徳不益聖體宜戒敕保傅令以章恵為法今聖心已有所知雖不能防於未形猶可以止其將然俟中宫既建然後漸廣繼嗣之路則陛下亦可以不勞聖慮矣今若不知止節女色爭進數年之後敗徳亂政無所不有陛下雖欲悔之豈可及乎臣竊觀皇帝天質純粹有上聖之資年益長則宜徳益進方當嚮學以養聖功天下引領以望輝光之新傾耳以聴名譽之隆聰明之開發睿智之深逺皆繫於十五六之時不可失也陛下必欲皇帝氣體康強徳性成就以為宗社無疆之福莫切於今日矣不宜先以好色聞於天下失衆庶之望臣所以拳拳而不能已也惟陛下深思逺慮察臣狂瞽之言元祐四年十二月上同上范祖禹臣於今月二十七日至門下省見宰臣吕大防諭臣二十四日面奉聖㫖兩諫議并臣所言後宫御幸無此事者臣等所聞外議皆是虚傳陛下恕臣狂愚不賜誅責復䝉宣諭令臣具委臣且喜且懼不能自勝實天下幸甚然臣所言皇帝進德愛身所宜常以為戒太皇太后保䕶皇帝安身正心乆逺之慮亦願因而勿忘今外議雖虚亦足為先事之戒也臣竊惟皇帝有上聖之資方養德嚮學涵育仁義臣侍經左右而有聞於道路實懐私憂是以不存形迹不知忌諱發於誠心愛上不敢避妄言之罪凡事言於未然則誠為過慮及其巳然則又無及雖言無益陛下寧受未然之言勿使臣等有無及之悔因聞虚言以為實戒則四海生靈動植之類永被其福臣䝉寛宥罪戾無任恐懼喜幸之至伏縁聖㫖令大防諭臣合具奏知元祐四年十二月上上哲宗再論進徳愛身劉安世臣伏自前月末聞聖㫖權罷講筵是時近龍興節意謂將有燕饗是以暫輟邇英之幸用施慶禮今復半月别無政事亦非有前嵗大雪苦寒之故而罷之臣乆不得望見清光固巳疑之矣迺者民間喧傳禁中見求乳母竊謂陛下富於春秋尚未納后紛華盛麗之好必不能動蕩淵衷雖聞私議未嘗輒信近日傳者益衆考之頗有實狀臣忝備言職當諌其漸伏惟皇帝陛下天賜睿聖纂承大業太皇太后陛下慈仁正順保佑備至覆載之内莫不傾耳拭目以望風化而或者之言乃謂陛下稍疎先王之經典寖近後庭之女寵此聲流播實損聖德昔者堯之受命惟以天下為憂而不敢以位為樂成湯不邇聲色不殖貨利著之方冊萬世稱誦皇帝陛下不可以不勉太皇太后不可以不勸伏望聖慈為宗廟社稷之大計清間之燕頻御經帷仍引近臣與之論議前古治亂之要當今政事之宜悉俾開陳以助聖學無溺於所愛而忘其所可戒天下幸甚元祐四年十二月上時為左諫議大夫同前係第二狀劉安世臣今月二十七日給事中范祖禹至本􅈦宻傳宰臣吕大防所聞德音諭臣所論後宫事實未嘗有者稽首承命感抃交集臣厯觀前世之主鮮有不以聲色為累至於近之太早御之無節則又不能保固真源増益夀考聖賢所戒可為寒心且世俗之間粗有百金之産猶知愛其子孫以為嗣續之託而况國朝百三十年之太平六聖憂勤積累世之基業陛下繼而有之可不自愛自重以為宗廟社稷無窮之計乎臣誤䝉聖恩擢寘諫列使陛下日新之德未有以大著於四海而親近女寵之謗先播於衆口臣雖愚暗亦深憂之所以不避譴訶先事進戒若陛下實未嘗為則臣之所言猶不失諫官之職若陛下萬一有之則臣之進說巳為後時雖不敢逃曠官之誅顧已何補於事惟冀陛下愛身進徳留意學問清心寡慾増厚福基臣不勝惓惓愛君之至元祐四年十二月上時為左諫議大夫上哲宗論内車子爭道亂行蘇軾臣謹按漢成帝郊祠甘泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其略曰想西王母欣然而上夀兮屏玉女而却虙妃言婦女不當與齋祠之間也臣今備位夏官職在鹵簿准故事郊祀既成乗輿還齋宫改服通天冠絳紗袍教坊鈞容作樂還内然後后妃之屬中道迎謁已非典禮而况方當祀事未畢而中宫掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不恱服今車駕方宿齋太廟而内中車子不避仗衛爭道亂行臣愚竊恐於觀望有損不敢不奏乞賜約束仍乞取問隨行合干幹當人施行元祐七年南郊軾以兵部尚書為鹵簿使上此奏宋名臣奏議巻二十九
