body:
  text: 宋名臣奏議巻六十宋趙汝愚編百官門史官上太祖乞委宰執抄録言動送付史館扈䝉臣嘗讀唐書見文宗毎開延英召大臣論事必命起居郎起居舍人執筆於殿堦螭頭之側以紀時政故文宗一朝實録稍為詳備至後唐明宗亦命端明殿學士及樞宻直學士輪修日厯旋送史館近世已来此事都廢毎季雖有内庭日厯樞宻院抄録送付史館所記者不過對見辭謝而已帝王言動莫得而書亦縁宰相以漏洩為虞無因肯說史官以踈逺是隔何由得聞徒䖍著撰之心難紀憂勤之徳伏望今後凡有裁制之事優䘏之恩發自宸𠂻合書簡冊者並委宰相及參知政事毎月輪次抄録送付史館以憑修撰日厯所貴睿德神功歴千年而不朽嘉謨聖政垂萬世以為光開寳七年閏十月上時為知制誥史館修撰詔從之仍以参知政事盧多遜專掌其事上太宗乞復左右史之職張佖臣竊以史官之職掌修國史不虛美不隠惡凡天地日月之祥山川封域之分昭穆繼世之序禮樂師旅之政本於起居注以為實録然後立編年示褒貶伏覩聖朝編年謂之日厯惟紀報狀略叙敕文於聖政嘉言皇猷美事羣臣之忠邪善惡庻務之沿革弛張汗簡無聞國經曷紀謹案六曹故事起居郎掌修記事之史凡記事以事繫日以日繫月以月繫時以時繫年必書朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅罰黜免以懲惡季終則授之國史起居舍人掌修記言之史錄天子制詔徳音政事之制臣欲請置起居院修左右史之職以記錄為起居注與時政記逐月終送史館以備修日厯如此則聖朝稽古必焕發於典墳信史成文固度越於周漢矣淳化五年四月上時為左諌議大夫史館修撰奏入太宗曰朕方興史職佖有奏為助國家為好事也即詔從之遂徙置院於禁中命起居舍人史館修撰梁周翰掌起居郎祕書丞直昭文館李宗諤掌起居舎人事有修撰體式委周翰等檢討故事以聞上仁宗論修日厯歐陽脩臣伏以史者國家之典法也自君臣善惡功過與其百事之廢置可以垂勸戒示後世者皆得直書而不隠故自前世有國者莫不以史職為重伏見國朝之史以宰相監修學士修撰又以兩府之臣撰時政記選三館之士當陞擢者乃命修起居注如此不為不重矣然近年以来員具而職廢其所撰述簡略遺漏百不存一至於事闗大體者皆沒而不書此實史官之罪而臣之責也然其弊在於修撰之官惟據諸司供報而不敢書所見聞故也時政記雖是兩府臣寮修纂然聖君言動有所宣諭臣下奏議事闗得失者皆不紀錄惟書除目辭見之類至於起居注亦然與諸司供報文字無異修撰官祗據此銓次繫以日月謂之日厯而已是以朝廷之事史官雖欲書而不得書也自古人君皆不自閱史今撰述既成必錄本進呈則事有諱避史官雖欲書而又不敢書也加以日厯時政記起居注例欲承前積滯相因故纂錄者常務追修累年前事而嵗月既逺遺失莫存至於事在目今可以詳於見聞者又以追修積滯不暇及之若不革其弊則前後相因史官永無舉職之時使聖朝典法遂成廢墮臣竊見趙元昊自初僣叛至復稱臣始終一宗事節皆不曽書亦聞修撰官甚欲紀述以修纂後時追求莫得故也其於他事又可知焉臣今欲乞特詔修時政記起居注之臣並以徳音宣諭臣下奏對之語書之其修撰官不得依前祗據諸司供報編次除目辭見並湏考騐事實其除某官者以某功如狄青等破儂智髙文彦博等破王則之類其貶某職者坐某罪如昨來麟州守将及并州龐籍縁白草平事近日孫沔所坐之類事有文據及迹狀明白者皆備書之所以使聖朝賞罰之典可以勸善懲惡昭示後世若大臣用情朝廷賞罰不當者亦得書以為警戒此國家置史之本意也至於其他大事並許史院據所聞見書之如聞見未詳者直牒諸處㑹問及臣寮奏議異同朝廷裁置處分並書之已上事節並令修撰官逐時旋據所得錄為草巻標題月分於史院躬親入櫃封鎻候諸司供報齊足修為日厯仍乞毎至嵗終命監修宰相親至史院㸃檢撰官紀錄事迹内有不勤其事隳官失職者奏行責罰其時政記起居注日厯等除今日以前積滯者不住追修外截自今後並令次月供報如稍有遲滯許修撰官至中書樞宻院催請其諸司供報拖延及史院有所㑹問諸處不畫時報應致妨修纂者其當行手分並許史院牒開封府勾追嚴斷其日厯時政記起居注並乞更不進本所貴少修史職上存聖朝典法此乃臣之職事不敢不言嘉祐四年上時為翰林學士史館修撰上徽宗乞别行刪修紹聖神宗實錄陳瓘臣伏聞王安石日錄七十餘巻具載熈寜中奏對議論之語此乃人臣私錄之書非朝廷之典冊也自紹聖再修神宗實錄之書請以此書䧏付史院凡日厯時政記及神宗御集之所不載者往往專據此書追議刑賞奪宗廟之美以歸故臣建掌書之官以修私史考之往古並無此例唯唐武宗時宰相李徳裕引鄭亞之徒改修憲宗實錄増損筆削專美其父其後宣宗即位追念憲考不能平也故大中三年九月制曰委國史於愛婿之手寵祕文於弱子之身擅敢改張罔有畏忌奪他人之懿績為私門之令猷於是徳裕鄭亞皆從貶竄盖以國史實錄皆欲顯揚宗廟之美非人臣之所得私也神考之信任安石雖成湯之於伊尹不過如此安石宻贊之言強諌之語何必盡宣於外然後見君臣相得之盛乎昔者周公之訓曰爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳安石日錄所載嘉謀嘉猷既入告而發於命令則斯謀斯猷皆神考之徳也豈可以繼志述事為名而專紹人臣之美乎伏惟陛下若稽如堯舜繼述如武王棄斥人臣不改之小孝光神考日新之聖緒忍使裕陵之美皆為私史所攘改而正之理不可緩所有紹聖神宗實錄願詔史臣别行刪修以成一代不刋之典元符三年五月上時為右正言詔令三省参考進呈按紹聖初蔡卞曽布等以乆不得進用欲力攻元祐諸臣盡復王安石所行政事故指范祖禹趙彦若等所條神宗實錄為詆誣先烈因請用王安石日錄改修其言皆出一時私意變亂是非於是元祐史官皆得罪迨徽宗初即位陳瓘及陳次升相繼論列雖常䧏詔刪修然卒為京卞所蔽不克是正在紹興間髙宗皇帝灼見邪正之實乃命范冲等重修天下之議始定上徽宗論哲宗實録不當止差蔡京兼修陳瓘臣聞公而不私則朝廷無過舉之事私而不公則天下有不服之心臣伏見近差翰林學士承㫖蔡京兼修哲宗皇帝實錄此朝廷過舉之大而人心不服者也國家自太宗以後毎朝實録提舉修撰皆有正官用度雖多不敢惜費命官雖衆不敢憚煩所以重大典而敬先朝也今修哲宗實録獨用兼官而已豈非以蔡京欲擅史局而朝廷不欲重違其意乎蔡京得兼局而哲宗史事不得其官輕一朝大典違祖宗故事皆為一京則是朝廷之所以厚京者過於哲宗矣臣前章所謂朝廷大政無不委曲遷就而為一京之地者此亦其一事也陛下篤於天倫曲致其厚毎對臣下語及泰陵則聖顔慘戚感動左右豈肯以天下而儉於先朝之史事乎今物議訩訩皆有公私厚薄之說無不歸過於陛下矣京為陛下畫不忠之䇿陛下為京受不厚之名京無忌憚人不敢言陛下孤立人不敢助卑君尊臣陵壓主道豈有朝廷事勢倒置如此而可以乆安乎昔者為修王安石日錄專一局今者為修哲宗實録則兼官而已王氏尊於神考蔡氏重於哲宗三家僭魯六卿分晉原其起因不過如此前古巳陳之事安可以不監戒乎臣自十八日不得上殿次日又復隔下自知必有重譴理當誅竄然而未受謫命猶在言職豈敢以身之危辱而棄其所當言乎願詔三省樞宻㑹累朝差官修實錄故事如臣所言不誣乞行改正以稱陛下厚於泰陵之意元符三年九月上時為右司諫上徽宗論神宗實録多用王安石日録陳次升臣訪聞前右司諌陳瓘嘗論史院修神宗實録多用王安石家日録頗失事實不聞施行者臣竊惟神宗皇帝聰明英睿超絶古今熈寜元豐間勵精庻政更新百度盡出宸斷而執政大臣但奉行而已如聞安石日錄多稱已善謂一時制作皆自已出矯誣詞訓前無祖宗上薄神考厚誣天下事非一端其於聖徳掩蔽多矣瓘常指陳數事朝野相傳皆謂得實今不聞改正兼風聞史院先因曽布請用安石日錄遂准得朝㫖謂修入實錄必取㫖而後用不知其果然乎果有之不委史院曽無取自聖㫖陛下貴為天子持萬乗之權而神考一朝大典儻容史官任其私意紊亂事實不行究治何以彰聖孝之至伏望聖慈早賜指揮施行元符三年五月上時為侍御史上徽宗請復還史館之職石公弼臣竊考唐貞觀職官故事天子御正衙則起居郎居左舍人居右有命則臨陛俯聽退而書之毎仗下議政事亦必随輔臣入殿執筆記錄于前史官随之及仗在紫宸内閤則夾香案對立殿下上記得失繇是事之機要言之㣲宻人之忠邪皆得書之方冊昭示将来明主賢臣之事罔或缺遺一代之典文燦然大備且唐天下垂三百年號稱至治莫盛於貞觀而謀猷設張制度文采勲蹟治効必可垂法後世而當時崇尚史官載錄如此繇今考之事之存者猶十之五六此史官之不可不知故事也永徽以後髙宗不躬萬幾重臣許李綰權持政姦謀邪計杜塞不聞畏避羣臣自是起居稍奪故事止於對仗承㫖仗下論議不復與聞至長夀中宰相姚璹始建議執政大臣録仗下論議多出於股肱輔弼之臣史官職在記錄而已利害殊絶較然可知若夫時政記使宰相為之賢者則推美避譽邪臣則飾過隠非事闗機要或疑謀泄而功沮言及臣寮或慮隙開而怨售巧事形迹互相依倚銓次不廣筆削自私此時政記之在當時屢建而屢罷者此也臣竊惟國家受命以来累聖相繼百度修明度越前古獨史臣之職未復故事修時政記即未免有昔時之累起居注及史館日厯意在塞責具員茍免以編制敕類除免叙年月為纂述聖主言動仗下與便坐論議既不與聞而羣臣奏䟽諌官言事留中者未嘗宣諭焚藁者往往無傳神機天筭竒謀碩畫内安社稷外撫四夷可以輝焕竹帛儀刑今古者或在當時未嘗撰述至於異日稍稍訪求則必耳目不接真偽相冐是非雜揉失實傳之後世其可信乎事之出於羣臣者家人故吏因兹縁飾朋黨仇怨得以成私文字増加委曲生意虛美溢惡不可勝聽遂使髙文直筆是非猶豫褒貶自疑忠臣義士視既往之迹晻昧不章因有自悔不前之心臣竊以邪正辨而有好惡好惡形而為是非施於有政也則為刑為賞列之國史也則為褒為貶必著明萬世既有以旌别於生前又有以追錄於已死如此為善者自堅造非者觧體二者皆人主之操柄教化之樞機不可不審也方今史官之選必天下文學修絜之士若止以編制敕類除免叙年月為奉職則但通曉文字求之二省一令史足矣何必擇人哉且唐天寳以後天下多故起居之職因循曠弛然後百家傳記之說雜然並興瀰漫流行不可勝數率皆耳剽口傳轉相紀述文辭侈靡誑亂事實猥發宫闈之私傳致難知之事采獲怪竒雜以詼笑施之當時未免無疑傳之後世豈得不信古者禮失求之於野孔氏學官名於郯子皆以事乆難明茍可考焉必為事實唐褚遂良知起居事太宗問曰朕有不善卿必記耶對曰臣職載筆君舉必書劉洎曰使遂良不書天下之人亦記之矣夫起居之錄不詳則臣下之記逾廣機失於上則柄任於下自然之理也近世綴文之士頗為傳記有所論列臣愚以為不復其本則其原未可卒禁臣愚伏願陛下詔大臣講求故事稍還史館之職使之得以悉意記錄善惡必書至纎至悉無所或遺凡羣臣奏䟽諌官言事或行或否並望即時宣示史官刪叙潤色書之緗簡使後世知陛下有納諌之明知直臣立不諱之朝知議事有羣臣之論知陛下無偏聽之聰羣臣拜免必叙遷責之由使後世知陛下無好惡之私儻或史官因循廢職著譔不時則必明加黜責庻幾君臣行事廊廟規圖纎微必著後世有所考法焉臣又以為唐制起居供奉仗内而史官必隨其後者意欲記注臣寮與修撰學士皆得親見事實與聞謨訓然後銓次不相牴牾此最䇿之得者也又臣嘗考漢事記注無定員而太史有常職是時近臣皆持槖簮筆入侍左右盖欲有所紀述而天下計書先上太史副上丞相繇是事得廣載書可責成此兩漢遺史所以為後世模楷也今近臣非職事者自見聖君言動固不敢有所紀而天下計書亦未嘗上羣臣列傳事非章章尤著者則唯取信行狀行狀者門人故吏之所為非大公至正之語尤難依據者也臣又以古之史官皆乆於職如司馬遷班固皆父子繼纂其事唐張說致仕亦必修史呉兢被貶以藁自隨方今史臣遷擢不時前後相承文書猥積修舊不給何暇議新以至軍國政要纂錄後時乆而訛謬事多此類難一一陳至於宰相監修劉子元以為十羊九牧書或成進本朱子奢以為開後世史臣之禍如此等事所冝變更伏望聖慈俯察狂瞽如前所陳萬有一分儻合聖意即乞詔公卿議定其例大觀二年上時為起居郎上徽宗論起居注書祥瑞不應經典宇文粹中臣聞人君忠利以導民則民安其政信順以事神則神饗其徳神民不相雜擾則天下之物有非人力可校而自至者故禮記言四靈為畜謂至和浃洽而物遂其性也周詩言貽我来麰謂五榖順成而得所飬也物遂其性民得所養修徳錫符之應莫大於此若夫鱗毛羽介之孽虹蜺光景形色變怪之祥華實之非其時孽育之非其類則月令書之以為異洪範五行傳記之以為妖先儒董仲舒劉向之徒論之詳矣臣伏覩近年起居注所書祥應猥冗而不經煩雜而無所别擇如檜枝生黄花菜果有佛像白氣騰空紅光燭天桃李冬實仙人影晝見之類皆前世以為妖異今一切紀為瑞應昔桑榖共生于亳廷則伊陟巫咸賛太戊修徳以禳之飛雉升于鼎耳則祖已訓髙宗正厥事以應之今州郡諛佞成風裒集境内妖怪繪圖奏陳其意曰此臣治理之效三省集諸路所奏拜表稱賀其意曰此皆爕理之功而數月之間動以千數夫物反常為變天反時為災所以警懼告戒者今不以為憂又從而講慶賀之禮史官所紀乃天子言動政事誥命而雜以諛佞無實之事豈不為典冊之累乎㳟惟陛下内徳淳茂昭假于三靈惠澤洋溢丕冒于四海天地助順祖宗儲福何必假此虛誕蕪翳盛美伏望明詔史官應禮部所闗報祥瑞騐以經典而載其大者若常雨常燥青眚赤祥凡前史以為災異者直書其事不必㸃綴文辭遷就附合庻幾弭災報貺可以仰當天地之心無虛美無溢言可以垂訓于千百世之後大觀四年二月上時為起居舎人上欽宗乞改正宣仁皇后謗史楊時臣聞天下之本在國國之本在家竊惟宣仁聖烈皇后保佑哲宗皇帝殆十年枉被誣謗乆而未明臣謹條其本末于左昔元豐末伏見神宗皇帝不豫哲宗㓜冲宣仁聖烈皇后有㫖令二王非宣召不得入内其周防之慮深矣是時王珪首建大議請立延安郡王為皇太子餘人無言者退批聖語在中書仍闗實錄院衆臣簽書本末詳具天地鬼神臨之在上質之在傍不可誣也至元祐中蔡確以罪去其黨始造其姦謀兾徼異日之福紹聖初章惇蔡卞用事欲中傷舊臣報復私怨遂實其事上誣聖母而以大逆之名加王珪以定䇿之功歸蔡確而已亦與焉其為此謀非私於蔡確其實自為因以中傷元祐之人耳天下銜寃積怨幾四十年伏遇陛下嗣守神噐如大明之升無隠不燭而臣幸得備員諌省不得不為陛下言之也凡元祐政事著在甲令者皆巳焚毁則當時所批聖語在中書者必無遺矣所幸紹聖中修時政記具在祕書省國史案猶可考也此天實存之以遺陛下伏乞下祕書省國史案索元祐時政記一賜覧觀庻以究見事實昭洗王珪為臣不忠之名追奪蔡確冐受褒贈之典濫恩所被悉行改正以釋天下積年憤鬱之氣臣不勝幸願之至靖康元年上時為右諫議大夫上欽宗乞改正宣仁皇后謗史陳過庭臣聞周公遭管蔡流言上天動威雷電以風禾偃木㧞以彰周公之徳盖聖人用心與天地合不幸而遭變故必有感格而震動㳟惟陛下聖聖相繼中外乂寜將二百年自紹聖崇寜大觀宣和以来星文變見日食地震水旱連年盗賊滿野遂至金人猖獗直犯京闕非特姦邪用事忠良擯斥庻政不修百姓愁苦之所致也宣仁聖烈皇后保佑哲宗功在社稷垂裕無窮而乃負誣謗於天下者垂四十年天地幽鬱人神憤怨前日之變幾至大亂未必不由此也日近搢紳之士咸謂臣曰當宣仁聖烈垂簾聽政登用耆舊惠飬黎元如章子厚曽布蔡京及卞姦險刻薄之徒棄黜弗用小人懐憾務在報復及其得志託紹述為名凡元祐正士禁廢弗用一時輔相侍從之賢死於遐陬荒裔者何可勝計及章子厚晚年被斥頗有悔過之意其謝表則曰極力以遏徐王覬覦之謗一心以明宣仁保佑之功觀此則知當時固嘗起徐王之謗而掩宣仁保佑之功矣范純仁嘗曰矧宣仁誣謗之未明致保佑憂勤之不顧純仁懐忠發憤遂有此言然伸幽直枉正在今日伏望陛下詳酌令三省樞宻院及侍從臣寮共議其事辨明休烈振發潛光然後敷明詔以喻中外差大臣以告陵廟上以慰在天之靈次以攄幽明之憤天意披豁人心感恱則中興之業當自此有成矣靖康元年十月上時為御史中丞東宫官屬上真宗乞置東宫師保陳靖臣伏見皇太子光踐承華照臨方内洊雷成象正位於青宫五輅和鈴炳儀於清廟惟賔寮之具爾獨師保之闕如且夫師者師法其規模保者保安於徳義茍曠厥任未協前經臣是以展轉三思揣摩羣籍兾有確論上賛昌朝粤自五帝選賢三王授子雖揖遜之或異在訓導以攸同虞舜之書則曰教胄子姬周之典則曰延冲人著于格言莫重尊教雖然服冕裘陳鹵簿此可以荘禮容於外也至若就道徳敦孝㳟此可以發智理於内也伏願陛下隆邦家之本考沿襲之文延揖公台充備師傅體二聖之基緒副三靈之宅心人謀大同知有尊於調䕶神噐光屬亦共貫於守成又惟陛下頒列藩房夙昭聖範歴試京邑之䌓重備嘗稼穡之艱難雖勿用以居潛已重暉而合照故太宗皇帝英心奮斷大略制權謂六傳而可虛俾庻務而從簡今皇太子適膺儲位方在妙齡是冝設彼師臣豐其禮數恢七教以興之徳業廣五行俱下之聰明春誦夏弦徧遵行於故事左輔右弼率永頼於正人臣謹按漢書始元五年六月詔曰朕以𦕈身獲保宗廟戰戰慄慄夙興夜寐修古帝王之事通保傅者是知保傅之重不可不備也又伏覩唐貞觀十七年散騎常侍劉洎以謂皇太子初立宜尊賢重道以昭聖徳遂上書論列亦有憲章然而師傅之名未聞沿革之制臣學識寡陋罔測津涯伏乞陛下選載筆之洪儒俾其檢討召秉鈞之元輔計之乆長庻使左右周儲頼旦奭之耆徳羽翼漢室躡園綺之髙蹤上符宗社之靈下副華夷之願臣適當暮齒尚玷周行請老歸田案禮經而愧晚封章言事表臣節之有終儻䝉宸鑒俯囬離明増耀不獨臣死生幸甚抑亦使兆庻同歡天禧元年上時為兵部員外郎直史館上英宗乞委伴讀官提舉皇太子左右之人司馬光臣伏見陛下差直史館王陶充皇子伴讀祕閣校理孫思㳟充本位說書此誠國家之首務聖哲之逺圖然臣聞三代令王置師傅保以教其子又置三少與之燕居至於左右前後侍御僕從之人皆選孝悌端良之士逐去邪人毋得在側使之日見正事聞正言然後道明而徳盛心愉而體安福被兆民功流萬世此教之所以為益也今陶等雖為皇子官屬若不日日得見或見而遽退言語不洽志意不通未嘗與之論經術之精微辨人情之邪正究義理之是非考行已之得失教者止於供職學者止於備禮而左右前後侍御僕從或有佞邪䜛巧之人雜處其間出入起居朝夕相近誘之以非禮導之以不義納之以謟諛濟之以詐偽雖皇子資性聰明端慤難移然親近易習積乆昜遷謟諛易入詐偽易惑如此則雖有碩儒端士為之師傅終無益也臣聞孟子曰雖有天下易生之物一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣又曰一齊人傅之衆楚人咻之雖日撻而求其齊言不可得也臣愚伏望陛下多置皇子官属博選天下有學行之士以充之使毎日在皇子位與皇子居處燕逰講論道義聳善抑惡輔成懿徳其左右前後侍御僕從亦皆選小心端慤之人使所属官司結罪保明然後得入仍專委伴讀官提舉覺察若有佞邪䜛巧之人誘導皇子為非禮之事者伴讀官紏舉施行即時斥逐不令在側若皇子自有過失再三規誨不從者亦聽以聞如此則必進徳修業日就月將善人益親邪人益踈天下之幸也大理評事趙彦若者孝友温良謹潔正固博聞強記難進易退國子監直講李寔好學有文修身謹行祕閣校理孟恂清純豈弟始終如一此臣之所知也伏望陛下擇此三人及廣求其尤以備皇子官屬臣推心盡忠不敢形迹僣越妄言伏俟譴謫嘉祐八年五月上時知諫院上英宗論淮陽王當且設師友未冝建置僚屬翊善王陶等宜先正職任呂誨臣伏覩淮陽郡王宫置翊善侍講等官又聞翊善王陶等請郡王當拜禮者臣竊思之盖名有不正禮固失冝敢不論列上禆宸聽今王出閤儀非開府當且設師友未冝建置僚屬國朝至道元年中書奏案唐文宗朝李石言太子有侍讀諸王亦有侍讀無隆殺之禮請改為奉諸王講讀皇姪皇孫是環衛之職請以教授為名從之先帝為夀春郡王命張士遜崔遵度為友至天禧中士遜為諌議大夫兼太子庶子詣資善堂參見猶令升階列拜自是始有跪受之禮事體甚明臣欲乞朝廷先正陶等職任名位既正禮分自安又况郡王年已長立當早出閤以奉朝請如此開府建官翊善侍講自為僚属於禮冝矣嘉祐八年九月上時同知諌院上英宗乞選置頴王府官屬呂大防臣伏覩皇子頴王以元子之重㓜年盛徳出閤開府二年于兹雖陛下聖心謙遜未遑正位東宫而社稷之本天下之望實有繫焉至于師友寮宷冝用道徳英俊一時之賢或以方嚴見憚或以行義可法庻可以行輔導之職發揮皇子聰明仁義之姿歴觀前古未嘗不謹於此故在虞則有夔周有周召史佚太顛散冝生閎夭漢則有留侯四皓二踈石奮丙吉韋元成鄧禹桓榮晋則有山濤張華王導賀循皆以元臣巨儒輔正儲貳故踈廣言於宣帝曰太子國儲副君師友必天下英後張佚言於光武曰為天下立太子則冝用天下賢才此可見其遴選之意所以重國本而尊宗廟也竊見近除頴王府記室陳薦侍講孫固道義無聞學問至淺初薦之被選已為時論所非而固之獲進重取識者之笑皆以為謟事公卿致身於此又安能儀刑藩邸輔翼元良也哉臣愚以為冝飭輔臣更選經行修明可師範者以備王府官属薦固之才量其所堪改授别職及乞依著令置王傅友官擇兩制之臣有道德學問者充其任則朝廷尊榮天下幸甚治平二年上時為監察御史裏行上英宗乞推擇頴王府翊善張方平臣竊惟頴王地居嫡長春秋鼎盛方當稽古向學修誠進徳若其左右前後有位之士所以朝夕納誨咨告法度出入起居罔有不欽一人元良萬國以正社稷之本也今遴選官寮進用時俊嵗年之間即復遷易於此假途以陞要近乃令搢紳之列指為仕宦㨗徑非所以資王之重也願留聖慮申諭執政王府記室顧當兼用詞翰之選至于翊善保傅之業亦冝於兩省以上推擇老成舊望行安而節和者得以乆處其職俾典領宫中之政至於侍御僕從便僻側媚以非正之事云為者察而聞於王小者懲戒大者上聞而斥之無有憸人得在王門以著王之令聞兹國家無疆之休惟陛下留神幸察治平三年上時為翰林學士承㫖上神宗乞為皇太子立傅黃履臣聞古之至治之時太子雖在孩提有識之間必選天下孝悌博聞之士以衛翊之盖欲其見正事聞正言行正道也㳟聞皇太子妙齡浸加保傅未立雖其神靈徇齊得於天縱而樂以修内禮以修外至於其成也懌而㳟敬温文深知父子君臣之道則亦有所教也伏惟皇帝陛下動容周旋莫不中禮使之觀之固有黙然而喻者聖學髙逺肆口所言皆可為法使之聞之固有曉然而循者然而主之以恩不責以善必立傅以養之審道以示之觀徳以喻之盖二帝三王之盛亦莫不然也臣愚不肖不足以明當世要務與夫先王立治之本徒守愚學輒傳經以言臣不勝惓惓犬馬之情元豐六年五月上時為禮部尚書宋名臣奏議巻六十
