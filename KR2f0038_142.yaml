body:
  text: 宋名臣奏議巻一百四十二宋趙汝愚編邊防門女真上徽宗論女真決先敗盟宋昭臣聞犬戎之性不可以信義結去來無定叛服不常雖成周盛世猶有玁狁之難故自古禦戎未見上䇿漢唐以還或盛或衰乍叛乍服其禦之之術率非良䇿皆不足為聖世道故畧而不論迄我有宋寰區之内靡不歸順而景徳中亦有澶淵之役真宗皇帝天威一震敵兵瓦解當是時乘勝逐北則契丹之種無噍𩔖矣真廟聖慈深厚特以兩國生靈為念故推天地之量貸螻蟻之命啖以厚利與之議和為天下後世萬萬年安全之計故北人謹守盟誓不敢南下而牧馬者誠以天地之洪恩不敢忘也自爾聖聖相承明明繼照雖睿智神武堯仁湯徳足以懐柔然實亦恃此以為長城神宗皇帝熈豐之間銳意北伐選將練卒積榖理財葺城郭修器械十九年間倉廪實府庫充貔貅之士無不一當百當是時鼓噪而前則自燕以北其人皆俎上肉矣亦以河朔祖宗興王之地不忍騷動安可快一時之忿失百年之好故終莫之舉也陛下即位以來禦戎之術實得上䇿北使之來宴犒賜予恩數曲盡故懐徳畏威向風慕義稽首稱藩介胄之士櫜弓偃息黔黎之民鼔腹詠歌歴觀三代以來傾心悅服至誠面内莫如今日實太平希世之盛事也比者王黼童貫力引狂生李良嗣董才之徒妄興邊事致煩宸慮遣大臣提重兵久屯塞上倉廩府庫為之一空官卒民兵死亡無數前所奏陳悉皆誕妄財用尚可復全死者何由更生欺君罔上蠧國害民罪不容誅臣願斷此數人頭以令天下不唯慰安敵人之心使明知陛下徳意無復猜忌謹守盟好庶幾姦臣賊子欺君罔聖妄興邊事僥覬功賞者有所懲戒臣固知陛下聖慈不忍誅戮臣下然此數人不誅則敵人猜忌之心未易可解臣願陛下勿以馭賢臣之禮馭此姦賊則不勝幸甚臣聞敵中頻歳不登斗米千錢雖或請和恐非本心特出於不得巳耳萬一養銳數年歳穀小稔秋髙馬肥士氣稍振復來侵擾則干戈相尋無時而已較其利害輕重則姦臣數人之誅不足恤也又況李良嗣董才皆彼中叛臣心懐怨望故附㑹邊臣撰造虚語欲假中國之勢以復私讎耳實兩朝之姦賊豈復忠義之可望哉臣竊料議者謂歳賜浩澣虛蠧國用是不知祖宗建立𣙜場之本意也葢祖宗朝賜予之費皆出於𣙜場歳得之息取之於敵而復以予敵中國初無毫髪損也比年以來𣙜塲之法寖壊遂耗内帑臣願遴選健吏講究𣙜場利害使復如祖宗之時則歳賜之物不足慮也或者又謂九州中國之地皆上饒膏腴之田歳得甚厚是曽不慮屯戍守禦之備戰鬬犒賞之費歳幾百萬計耶貪其所得既不足以償所失而又戰鬭死亡之士横被屠戮之民幾人也哉徒有闢國之虚名而無補國之實利或者又謂山後之民皆有思漢之心咸欲歸順此尤誕妄之易見者不唯北人為備日久山後之民往往徙居漠北又自唐末至於今數百年間子孫無慮已易數世今則盡為畨種豈復九州中國舊民哉皆由邊臣用人無術致探報者利於所得恣為誕謾帥臣庸暗更加縁飾妄議邊事僥覬功賞或者又謂北方比年以來為女真所困侵城掠地横亘千里勢以迫蹙願與女真合從腹背攻射則撲滅之易甚於反掌是亦弗思之甚也滅一弱敵而與强敵為鄰恐非中國之福徒為女真之利耳且北敵雖夷狄然久漸聖化粗知禮義故百餘年間謹守盟誓不敢妄動者知信義之不可渝也今女真性剛勁善戰鬭北人以夷狄相攻尚不能勝儻與之鄰則將何術以禦之不過修盟誓以結鄰國之外好而巳本朝與北庭通好百有餘年一旦敗之女真果能信其不渝乎異日女真決先敗盟為中國患必矣此理之必然事之必至雖使伊周復生不能易此議也臣又聞兩國之誓敗盟者禍及九族陛下以孝理天下其忍忘列聖在天之靈乎陛下以仁覆天下其忍致河北之民於塗炭之中而使肝腦塗地乎臣竊謂凡今之人臣不負陛下諏訪之意愛君憂國論奏忠赤者間亦有之其希意承㫖背公營私茍求爵賞富貴者不可勝數遂使忠赤之臣志不得伸言不見用此臣所以痛心疾首扼腕憤悶犯顔逆鱗以蹈萬死者豈得已哉誠以國之大事實係安危下情壅遏不得上達今而不言其如後患何譬猶人之一身中氣痞隔陽不降陰不升則百脉不調四體不充久而不治病在膏肓雖有良醫不能愈也今疾幸在膚腠是正宜投藥石之時也臣願為陛下出疆說諭北人云比因北朝亡失國主深慮擾攘之時疆陲不戒姦人作過邊臣生事故遣近臣使之防邊果有羣寇妄託北朝驚却邊民雖降處分不得殺戮止牒北界𦂳行捕捉切慮尚懐疑貳妄興兵馬務在謹守祖宗之盟無失百年之好如女真侵削不已力不能勝則許求援於中國報使復來厚加恩禮以釋其疑使之外捍女真内屏中國則陛下奠枕永無憂於北顧百姓安業得盡力於南畆實天下萬萬年無窮之利臣固知疎逺微賤輒以狂瞽冒犯天威難逃誅戮然臣聞忠臣徇義志士徇名故忠義發於内則鼎鑊忘於外愛君之心切則慮患之志深也況頑石五色尚有補天之功愚夫千慮豈無一得之長願陛下勿以人廢言留神聽察則撮土之微尚能增山岳不厭之髙爝火之光尚可禆日月不照之明矣臣向任陜州靈寳知縣日因論列陜右錢法䝉恩召對面奉徳音欲除監司旋致煩言猶叨貳郡未到任間復䝉聖恩除臣提舉江南茶鹽事以歳課增衍又䝉特轉一官臣每以未能仰報天地為恨今者伏覩奸賊敢爾欺君義當竭節圖報涓埃是敢越職輒貢芻蕘萬一臣言可采乞不降出庶使天下皆知斷自宸衷不由人言足以竦動神靈激昂士𩔖北人聞之恩歸陛下則臣報上之心足矣倘或上誤聖聰置諸鼎鑊亦臣之所甘心也惟陛下擇而處之宣和四年五月童貫蔡攸等師既行即降㫖妄議北事者必罰無赦執政廷臣皆無一言獨昭上此書論之時為朝散郎前提舉明道宫書既上王黼見之大怒九月昭除名勒停送連州編管靖康元年臣寮言昭書切中今日之病乞加擢用詔赴都堂審察昭相州人也上欽宗乞將相勿争私忿早定和戰之計余應求臣嘗讀六月之詩有曰文武吉甫萬邦為憲又有曰侯誰在矣張仲孝友葢宣王既使文武之將征伐於外矣若内無孝友之臣以與王居則讒毁之言日至忠謀不見用雖有吉甫烏能成其功哉至唐穆宗則不然裴度以元臣宿望出討幽鎮烏重𦙍李光顔皆一時名將勢若甚易而元稹用事恐度有功妨已進取所畫軍事皆從中沮壊之故屯守踰年迄無成功夫内外之事相須如此可不監哉方今强敵窺伺四郊多壘講和之計雖決而金帛之數未足兵將之勢已振而師出之日無期是宜内外之臣同心一意共議國事以雪恥辱之時也而道路籍籍皆言宰執大臣與將相異謀朝夕諠争未有定論審如是豈誠心為國者哉夫和親征戰之說漢廷臣論之詳矣今日之䇿未可偏廢然金幣既不足敵人必不肯退師又三鎮三闗之地向以兵力寡弱不得不姑從之今諸將援師繼至而城下要盟神弗信也若敵人必要金幣之足與三鎮三闗之地又豈得憚於用兵哉陛下既以兵事委李綱與諸將矣願詔執政大臣以孝友張仲為心和以濟事無争私忿先公而後私庶幾大功可立如或不悛與夫妨功害能之人當顯出之求所謂孝友者而任之可也雖然戎馬在郊城門未啓中外不通已再旬矣和戰之計亦宜早定願詔宰執將帥僉議於黼座之前使將帥出師與之對壘然後遣辯士以利害禍福成敗曲直與之言若能休兵講和以繼好息民䇿之上者茍貪惏而無厭旅拒而不受陛下雖欲勿戰得乎又況事直師壯人有鬭心以宗廟社禝之靈何憂不克所可慮者北人逺來出萬死不顧一生之計其鋒甚銳願更詔將帥持重應機無輕接敵以取萬全之䇿不勝幸甚臣一介書生不知兵謀忠憤所激欲默不能惟陛下裁擇靖康元年正月上時為監察御史上欽宗論要害三鎮楊時臣竊觀自漢迄唐待戎狄之道無如祖宗之時者百年之間民生戴白不見兵革賊臣要功為國生事與惡而棄好馴致今日方敵騎逼城備禦無素卑詞厚禮以紓目前之急葢勢有不得巳而然者割要害之地以為盟好則非經逺計也臣固嘗論之矣比聞金人駐兵磁相竊慮無有紀極破大名成安一縣驅掠子女二千餘人殺令佐二人而去誓書之墨未乾而背不旋踵吾雖欲専守和議不可得也昔趙割六縣之地使趙郝約事於秦虞卿謂趙王曰秦之攻王倦而歸也秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也今日之事正𩔖於是夫去其部落越數千里之逺而犯人之國都葢危道也使其力能攻之則城中之物皆其有也尚何事求和哉彼見吾髙城深池未易陵犯勤王之師四面而至姚平仲固嘗與之交兵忍而不敢怒請和而去則其情可見葢亦懼而歸非愛我而不攻也朝廷割三鎮二十州之地與之是亦助冦而自攻也聞蕭王初與之約及河而返今挾而往此敗盟之大者臣竊謂朝廷宜以蕭王為問責其敗盟必得蕭王而後已三鎮之民以死拒之於前而吾以重兵擁其後其勢必得所欲者若猶未從則聲言其罪而討之夫師以直為壯是舉也直在我矣三鎮聞之士氣必振此萬全之計不可失也若三鎮窮蹙而王師不救則其民必謂朝廷視其塗炭而莫之恤則戴后之心懈而大事去矣不可不慮也竊聞出師之令廟算不一屢行而屢反如是則士氣必惰欲其成功難矣昔憲宗平淮西韓愈謂凡此蔡功惟斷乃成未有舉大事不斷而能有成也伏望陛下斷自宸衷無惑於浮議則天下幸甚靖康元年二月上時為右諫議大夫上欽宗乞復用种師道許翰臣伏見宣制罷樞宻使种師道提舉中太一宫中外聞之悵然失色按師道名將沈毅有謀山西士卒人人信服臣以臺制不得身見師道然素聞其賢如此自兵興以來臣所詢訪數百人皆言師道雖以老疾智慮不衰而獨聞諸朝廷以為老無計䇿不可復用異於國人臣考古進賢之法在易之晉其六三曰衆允之志上行也夫人各有私合衆則公故必衆允其賢也而後可進此孟子所謂國人皆曰賢然後察之者人君之所聽察如此陛下欲求知人之術則觀諸易象而質諸孟子臣恐左右諸大夫一旦之論种師道不如國人素信之審也昔秦始皇老王翦而用李信兵辱於楚乃見王翦謝之曰將軍雖病獨棄寡人乎其後王翦卒能走楚軍略定荆地漢宣帝老趙充國使問充國誰可將者對曰無踰於老臣者矣充國與羌相拒堅守不戰羌豪相數責曰語汝無反今天子遣趙將軍來年八九十矣善為兵今請欲得鬭而死可得邪後終漢之世無西戎之患者充國之力也前世自吕望以來用老將收功如此者難一二數至於趙用趙括蜀用馬謖宋用王元謨皆見其平日論兵智略縱横使之當敵制變卒皆折北不救以古揆今則師道之老而木訥未當謂不可用也今令師道復統河朔之師委制閫外之重將吏素服士卒素信夷狄素畏易以定功此上䇿也處之樞府選將將兵威名方略可以折衝此次䇿也今無故解其兵權委之道館使士氣銷沮民心疑惑臣竊恨之金人此行存亡所係今一大創使失利去則中原可保四夷可服失此機㑹則非特將來再舉必有不救之憂臣恐西戎南夷共知中國太弱争圖深入為金人之所為則我困於奔命必不支矣廷臣間憒憒不曉者固不足道至於近有識者多能知之然知之者莫肯力言言之者莫肯疏奏是又何也知為身謀畏執其咎一有疏奏形迹可按不如容黙成敗不與鄙夫事君自古而然臣遭陛下休明之運銜陛下之恩自頂至踵巳許國矣又當言責不敢不盡竊聞臺臣諌官屢劾宇文虚中朝廷重去虚中而輕罷師道此非特臣所不喻也或謂師道足不良行害於馳驅朝謁奏事此與國之安危誰為輕重若孫臏坐輜車中為齊軍師田千秋得乘小車至漢殿尊賢尚能古有之矣伏望聖慈哀臣惓惓憂國之計更與大臣參之靖康元年二月上時為御史中丞先是金兵北歸師道見上言北兵惰歸乘其過河半渡擊之決勝可也上不從師道歎曰必為後患尋罷為中太一宫使翰累疏言師道不當罷上曰師道老矣難用當使卿見之翰見師道言姚平仲城下用師之失師道言我衆彼寡但分兵諸寨控守要害使糧道不通可破也翰歎息其言復上此奏上欽宗論決戰及任用老將許翰臣伏見王師既行廟算未定此疑事也今古葢未有疑事成功者故朝廷之意惑則將帥之心不一將帥之心不一則士卒之氣不銳斷而必行鬼神避之此精神之力也陛下欲斷今日之議當究為和為戰卒當如何而已矣其中小小利鈍非大計之所係也昔漢髙帝蜀先主皆號聰明神武為一代之英雄考其用兵敗北無數然其志氣挫而愈勵抑而更揚者大計已定於中此其所以為英雄者也陛下決和議則臣欲陛下取太史公史記虞卿傳覽其反復此往古之鑑也方今若失三鎮二十州之地則天下之勢巳斷西北無河東則陜不可守無河朔則汴不可都計不過謀渡江南臣考永嘉渡江能為東晉者乃王導謝安英賢相繼扶危救傾僅能立國而中原丘墟陷於劉石後世有王導謝安之才則東晉宗廟可復立也社禝可復建也盜入陵寢取一坏土則將若之何言而至此可為流涕陛下永念方來之艱則今日雖復騷動天下尤不得已何者擇禍莫若輕也或者以為太祖即位未有江南晉蜀而卒能混一區宇臣以為不侔矣太祖生長兵間非若陛下繼體守文建隆將士百戰精銳非若方今將不素養兵不素練也冦在掌握縱而不取使之益張若之何而以太祖為言故凡守和議者以國與人者也陛下欲決戰議則臣之所陳可戰者五已具前奏矣今使敵不釋憾則渡河之師當戰戰則必有漕運之役有應援之兵有屯據之要皆當素治不計小却但責成功而後將帥志一士卒氣奮三鎮之守有死無二若我將以疑遣師以茍行則精銳已亡何以取勝凡今為和議茍取目前之無事然亦未可必也自古用兵必有異議成王之時周公東征民有十夫予翼而巳其他罔不反曰艱大晉武與杜預謀取江南大臣賈充等皆力争之獨一張華贊定大計唐憲宗用武元衡裴度謀討淮西盜殺宰相朝廷震恐請罷裴度以安諸鎮憲宗大怒討蔡益急唐之威令自是復振書曰惟克果斷乃罔後艱陛下所以疑者度衆人必以姚平仲前日之敗自持其說近种師道為臣言平仲所以不利者刼寨之法不用大兵當少擾之使自蹂藉而後可乘又地勢横入江河中利於誘使出戰不利以兵薄敵也臣以是知師道有謀故前日之功在不用老將而用驍勇不恃謀將而恃詞說非兵不可用也昔石晉開運之變契丹始入敗不窮追近冬復大來遂陷都城國朝景徳契丹入寇澶淵之役亦不窮追而與之和親夫開運景徳驅逐之䇿同而成敗之效異者何也開運之時中國方弱而示之以畏故敵復來景徳之間中國正强受之以和故事遂定今議者不鑒開運縱敵之患欲為景徳之寛大則可謂不知時矣陛下何以不試使議割地者身任數年敵不復入則臣知議者必將難之夫國不保數年而欲定萬世之䇿必不能矣乞下臣章使有司定議靖康元年二月詔安危之䇿甚大可令三省宻院議取長䇿以付諸將上欽宗乞廷議守禦四事李綱臣昨任太常少卿日於去年十二月二十八日上殿劄子論事内一項言金國遣使有所邀求其他可從唯求割河北之地雖尺寸不可許但當答以祖宗境土為人子孫固當守之且河北燕山接境賴塘濼以為固今割以與之則險阻之地盡在彼疆何以立國當擇使以死争之其後金人犯闕遣使議親王宰相為質還歸朝人割三鎮之地索金銀物帛之數復與李邦彦等廷争以謂宰相當往而親王不可往歸朝官當與而三鎮之地不可與金帛犒師之數當量力以予之不然後且有悔當時議論與羣臣不合因再拜丐罷䝉陛下厚恩慰撫再四俾専治兵方時艱難不敢力請至於誓書之𩔖並不預聞然猶力留三鎮之詔以待勤王之師俟其大集因欲以帥師之意檄軍前以改誓書既而姚平仲妄作小衂臣亦罷黜而三鎮之詔遂行金人退師巳逺挾質以往必期於得地而後巳如三鎮果下則異時河東必不能守密邇畿甸宗社可憂萬一三鎮為朝廷固守不下彼必挾親王以行陛下手足之愛何以為懐由此觀之當時計議奉使之臣得不深罪自金人退師後數日方遣兵防守葢以親王之故然而金人本約親王至河而反今已爽約又沿路屠戮横屍滿野則和親盟約巳不可守異時既得三鎮别求釁端不旬日而至城下其患豈淺乎今雖遣姚古种師道渡河三鎮民必揺動或不能守將來建置帥府與之對壘當於何郡控扼防禦當以何兵蓄聚糧草當以何法遣使命將當以何人夫四者不可不預為之隄防臣昨已具劄子奏聞乞令臣寮措置未䝉施行當今所急無大於此願下臣此章令在朝之臣集議取其所長而施行之天下幸甚靖康元年三月上時為知樞密院事上欽宗乞戒大臣究心邊事陳公輔臣竊聞河東用兵不利陛下聖慮憂勞臣子之心夙夜不寧然臣竊料之此未必不為宗廟社禝之福也伏惟少寛聖心容臣之言葢有難則懼無難則怠人情之常也朝廷日見河北金人出界雖未解圍幸其師老必自解散遂至稍緩其事廟堂大臣相與謀議者多不急之務或窮究往事或經營私意論經術是非究禮文詳畧至於兩路邊事曾不究心緩急失宜先後倒置内外人情雖知秋冬在近深為可憂然非朝廷用事之臣徒憤歎終日無如之何也今若不縁用兵不利往往遂以為無事因仍媮惰至秋冬萬一金人結集諸夷空國而來以助河東之師則吾之倉卒無備又復如前日矣可不慮哉臣愚伏望陛下因此一失深戒大臣凡不急之務一切暫罷専以河北河東兵事為先經畫措置多方應辦仍仰各盡所聞勿懐異意并令今後臣寮上殿亦須先及邊事陛下留意聽納不厭其多或有可行盡付三省樞密院令斟酌施行夫漢之所以勝楚以屈羣䇿而愚者千慮必有一得勿謂羣臣之言皆無可採也陛下若今如此曉夜圖之則不徒以濟今日之急將來秋冬亦不失備矣臣故曰此未必不為宗廟社禝之福也臣區區憂國之言望陛下不以愚棄之豈獨臣之幸哉靖康元年五月上時為右司諌上欽宗乞救中山胡舜陟臣伏見陳亨伯蠟書其詞哀切首陳真定城破屠戮生靈不知幾萬人敵據髙城愈難追退臣讀之流涕竊歎朝廷何忍其如此未嘗遣一兵一馬為援也李邈三四十狀奏陳略不見報朝廷豈不惜土地而愛人民但以與敵講和不敢動兵一何失計之甚耶臣請為陛下言之古者列國兵交使在其間推論利害釋二國之患是以息民而貴和今敵遣使來而我使亦往彼此按兵不動乃所謂和也今敵人用兵不已今日陷一城明日陷一邑尋侵而南有并吞席卷之志時遣一使邀求寳貨詭詞為順使不為備我之使往脅之以威不得吐一語但以敵人甘言奏聞而朝廷不察其情偽便謂和議巳定宣撫使見講和如此亦不遣兵救援真定以至於亡陳亨伯所以言彼受和議之使留置寨中而任意攻取無人救解彼何計之得而我何計之失也今敵悉力中山城下朝夕必攻城矣朝廷又以講和之故不令宣撫司應援必失中山失中山則河北諸郡不攻而自下矣河北下則京師不可都而宗廟社禝危矣陛下何不以宗社為念乎亨伯又言彼既攻城殺人放火而我師援之理不為曲朝廷若任諸鎮之存亡不復顧恤則更無可論若欲保全伏乞速賜指揮宣撫司火急遣兵前來亨伯之言如此可謂切矣陛下若聽大臣之論謂既講和不復應援則非為安宗社至計第恐土地人心必兩失之若大臣謂今日無兵何以為援臣以為河北之民皆兵也使諸郡縣傾廪庫與民共之朝廷以好爵縻之何患人不為用但係措置何如耳亨伯乞宣撫司兵自深冀來祁㑹合馬忠兵宣撫兵擊其西祁兵擊其東中山兵為内應則轉禍為福易敗成功其言似亦有理伏望陛下詔三省樞宻院日下詳酌施行靖康元年十月同御史中丞吕好問等上時為侍御史宋名臣奏議卷一百四十二
