body:
  text: 宋名臣奏議卷六十九宋趙汝愚編百官門官制上仁宗論詳定官制劉敞臣等昨奉敕為翰林學士韓絳上言國家奄有四海承平百年官制未修方苦其陋欲望討論唐百官制及本朝官制品秩事件量加裁定正其名體等事奉聖㫖差臣等同共詳定臣等纍曾懇辭不䝉允許尋具劄子陳乞且未置局容臣等取前代官制將今日官位職位商度可改正者可裁損者可申明者各條三兩事先送中書門下更加商量若果有施行即置局辟官次第刪定奉聖㫖依奏臣等今詳定到事件如左一漢置丞相其後改置三公官皆公府辟召掾屬唐制以尚書門下中書三省長官為宰相尚書令僕射侍中中書令是也官品未至者同中書門下三品今平章事即其比也參知政事唐初亦是正相崔溫等嘗為之國朝之制下宰相一等若用唐制正其名體則四輔之任當悉用平章依漢制即須立丞相府一唐制御史大夫一人中丞二人國朝之制大夫不置以中丞為臺長它官或以給事中諫議大夫權之若欲改正官制置丞相府則大夫當復輕重乃等一唐制無公卿為樞密使五代用兵始與中書對掌機密即欲改正官制當以院事還中書及尚書兵部一尚書省二十四司既為虛名所以官冗員衆即欲正官制當罷三司復二十四司及九卿官使有定員其郎官不在本省治職事者並以前資及散官處之其涖外任者或依唐制置上中下等州刺史及别駕之類隨官品任之或欲輕其權則曰知某州刺史之類一文武散官及檢校兼官勳爵實封等在開元已前頗有實事於今唯散官猶叙服色粗繫輕重其餘悉皆虛名無益治體即欲改正官制當例行省罷若以假虛名而任實職兼存亦可已上所謂改正者也略舉一隅若於今可行即推此類具正之一大理寺决天下之獄刑部覆之於事已足又加審刑院則為駢衍即欲裁損官制當以院事官屬還刑部一吏部尚書侍郎分領銓事則當差以輕重分别流品今審官院掌京朝官磨勘差遣而流內銓惟典州縣幕職官體制不倫即欲裁損官制當以審官院職事歸尚書銓州縣幕職官歸侍郎銓一羣牧司提舉司糾察司之類皆古無此職即欲損官制悉當省罷還屬尚書九卿已上所謂裁損者也略舉一隅若於今可行即推此類具正之一左右史並當隨宰相入立仗下以記言動今史官之任不及聞前殿政事故德音善政多失紀録欲申明復此舊制一中書出制敇唐制並經門下審覆然後尚書出告身經歷三省比來唯於中書發敕虛置三省官名今欲申明復此制國朝令文具載一國朝近制觀文殿大學士惟待舊相自資政殿大學士至天章閣待制已上其間多有無員數除受浸廣者繇邊幅不立也諸舊有員者宜依舊數未有者宜差定其員著為久制以革溢員之濫一唐制舍人六人分判尚書六曹事所以佐丞相謹政令欲乞申明此制一舊制九卿之職不𨽻尚書今卿監職事三司關領者宜取還寺監亦省侵官之類一唐制左右丞相判尚書省事中書判門下省事中書舍人判中書省事國朝門下省權用近臣判之中書省即舍人年深者判與唐制略同准昨來言者稱近臣判省太重考按唐制似不如此惟常衮自以同中書門下事即當兼判中書省是時崔祐甫以舍人判省謂袞侵官士論由此不平袞也一三班自供奉官至殿侍差使之類唐制武選皆無此名目宜徙置於外以區别華冗一朝廷若欲從改正之說即俟改正之後設官分職如周唐乃可約六典著書垂之後世若未能如此而欲著書惟可將會要及諸司編勑并格令刪繁取要因今日官名粗書職分而已已上所謂申明者也略舉一隅若於今可行即推此類具正之嘉祐三年十二月同翰林學士胡宿上時知制誥上哲宗論官制之失䕃補之濫畢仲游臣恭惟國家承五季之後典章制度號令文采雖未純於三代蓋皆有三代之意而髣佛焉至於省刑罰息兵革施仁布德愛養元元得天下之心則有與三代比獨百官名自宰相而下至於百執事循用五季之舊而不知改天子臨朝太息於上而公卿大夫咨嗟悼歎發憤於下者不知幾年矣及神宗皇帝同人心决大策以階寄祿而修復漢三省之制宜其歡呼鼓舞以慶朝廷之盛德而行之五年公卿大夫稱有不懌於官制者豈未改之前嘗厭五代之弊法既改之後復云漢唐之非是則官制之所失如何而不革國朝雖循三省之舊而二十四司之名皆第之以待百官當遷者在省之官反假他官以制之如兵部為樞密使吏部為銓審庫部金部為三司水部為都水刑部為大理名𨽻尚書而事在他局者不可以為後世法則先帝之改制無可議者而改制之中有非漢唐之舊而未合於今日之務舊平章事遷中書令國朝以來未有遷至中書而今儀同三司一階兼昔日宰相纍遷之官舊禮部尚書遷户部工部遷刑部刑部遷兵部而今銀青光祿大夫一階兼昔日尚書纍遷之官舊禮部侍郎遷户部户部遷吏部吏部遷刑部刑部遷兵部而今正議大夫一階兼昔日侍郎纍遷之官卿寺亦然昔之官品難於進今之階秩易為髙而又降七品為八品降五品為六品降三品為四品至其不可用也則議請減䕃反以舊品為定而章服之令徒降五為六降三為四以遷就新品之失而不知義理之所在則所謂非漢唐之舊而不合今日之務者可驗於此然猶未有害也舊尚書省不總天下之政而中書門下合而為一則其治速今尚書省總天下之政而中書門下析而為二則其治緩此理之固然者至所謂書黃録黃符牒關刺由上而下復由下而上近者浹旬逺者纍月有夜半停印待報而其務乃比於竹茹木屑之細或者補衣貸食未得其缺而事久失於期會則非惟不合今日之務而良有害公卿大夫所以不懌於官制者以此亦在上之人損益之而已矣蓋隋唐二十有九而今寄祿階二十補䕃入流者甚衆一歲之選至千萬計豈特賞延世祿而已邪舊日之制歲得任其子弟者易以為三歲之制復易為六歲而猶患其濫則殆非歲數之近䕃補人之多故也今若於定制之外復增歲數則士大夫絶望於䕃補沮事之議將不可止非所以順人心助和氣而官冗之弊又未必能去為今之策莫若因仍歲數逺近而漸責其試法試而中於法者然後入仕則是第存䕃補之舊名而已無入仕之新患順於人心所利有五不增䕃之期無所觖望一利也公卿之子弟患於不學而今責其試法則自勸於學二利也得好學之人以為政不病於民三利也一不中選者猶欲再而中選再不中選者猶望三而中不絶其望四利也官冗之弊可以漸省五利也豈惟䕃補凡天下之入仕者皆為試法以考之使人人勇於自試而止取百人則百人而已數百人則數百人而已終無意外之濫雖行之萬世未見其弊又不失虞舜賞延文王世祿之㫖矣元祐二年上時為開封府推官上哲宗論寄祿官宜分左右丁騭臣竊見官制已行流品混并不足以激勸來者適足以長奔競之風且如官制未行已前自前行郎中今朝請大夫是也考滿當遷進士出身則遷太常少卿今朝議大夫是也非進士出身則遷司農少卿或衛尉少卿自司農衛尉少卿入光祿少卿然後轉少府監如此三遷凡十二年今自朝議大夫一遷為中散大夫舊所謂光祿卿是也自中散一遷即為中大夫舊所謂祕書監是也中大夫一遷為太中大夫舊所謂諫議大夫是也太中大夫一遷為通議大夫舊所謂給事中是也通議大夫一遷為正議大夫舊所謂六部侍郎是也官制未行已前侍從臣寮自禮部遷户部自户部遷吏部常調臣寮自工部遷刑部自刑部遷兵部三遷凡十二年今自通議大夫一遷即為正議大夫自正議大夫一遷為光祿大夫舊所謂左右丞是也自右以至於左凡八年今一遷即為之矣自光祿大夫一遷為銀青光祿大夫舊所謂六部尚書是也侍從臣寮則自禮部遷户部户部遷吏部常調臣寮則自工部遷刑部刑部遷兵部纍而至吏部凡五遷謂之細轉今二十四年之官八年俱歷之矣夫聖人用名為教故為之差别品類辨明科目一定其號人不敢有覬望之心僥幸之意今賢愚混淆清濁同流非所以為善處天下之物也臣愚欲乞出自聖斷付之有司略行改正若執政大臣則由朝廷除授不由資級臣故不論若侍從臣寮自朝議大夫已上至通議大夫五等依官制所定自正議大夫已上至金紫光祿大夫分左右可也其餘無出身常調臣寮則自朝議大夫已上皆分為左右可也如此則賢愚不混淆清濁不同流無覬望之心無僥幸之門矣若夫絶類離倫卓然有所見於世者則在乎人主躐等而用之耳何限於資格哉元祐三年上時為右正言二月六日詔自今朝議中散正議光祿銀青光祿金紫光祿大夫並置左右進士中出身及帶職轉至左朝議中散為二員餘人轉至朝議中散分左右字為四員已上合理七年磨勘其正議至金紫並分左右字為八資應今官已及此者悉加之上哲宗論犯贓人於寄祿官削去左右字劉安世臣伏見自行官制後來一切以寄祿名官至於流品無復旌别乃者朝廷以為未盡始詔吏部因其舊名分為左右自是清濁有辨衆論稱允後來竊聞新士大夫之犯贓者並改右字法既未備人以為疑且有出身之人茍以贓汚抵罪左降於右自可示懲緣無出身者自合稱右今若一旦混淆於貪墨之徒彼將以仕宦為恥非惟失先王礪世磨鈍之術亦恐本帶右階之人或有犯者朝廷以何名處之臣愚欲乞今後贓汚之吏並與削去左右量其所犯之輕重而制為貶降之歲若限內别無他罪仍有舉主即與約經赦叙用之法許以牽復如此則名器自正而負罪者通改過自新之路勸懲之道可得而行矣伏乞睿明亟追前令别加修改庶協政體元祐五年四月上時為左諫議大夫謹名器上仁宗論吕夷簡僕人受官歐陽修臣伏見國家每出詔令常患官吏不能遵行不知患在朝廷自先壞法朝廷不能自信則誰肯信而行之然多因小人僥幸而不知抑絶所與之恩雖少所損之體則多臣聞去年十月中曾有臣僚上言乞今後大臣厮僕不得奏薦班行敕㫖頒下才三四月已却用吕夷簡僕人袁宗二人為奉職夷簡身為大臣壞亂陛下朝政多矣茍有利於其私雖敗天下事尚無所顧况肯為陛下惜法但朝廷自宜如何今一法才出而大臣先壞之則其次臣寮僕人豈可不與不與則是行法有二與之則近降敕㫖今後又廢有司為陛下守法者不思國體但徇人情或云二僕得㫖與官在降敕前奈何授官在降敕後凡出命令本為釐革前弊法家以後敕衝前敕今袁宗等雖曾得㫖而未授命間已該新制自合釐革夷簡不能止絶而恣其僥幸朝廷又不舉行近勑而自隳典法今後詔令何以遵行其袁宗等伏乞特追奉職之命别與一軍將之類名目足示優恩不可為無功之臣私寵僕奴而亂國法慶厯三年九月上時為知諫院上仁宗論兩府遷官何郯臣等伏見前任兩府臣寮繼有除拜非復差功計勞特出一切恩命近時典故未見此比物議喧然不知其由夫爵祿故上所得專豫以其可以厲世磨鈍使天下之人赴忠義立事功至於徇節捐軀而不自悔故古之王者至重至謹賞一人必使天下之人皆知以為當然不敢用為已私而輕天下之所重也今若授受之際皆出無名則何以勸有功有功者不足勸是古之所重今更以為輕雖極顯官厚祿將無以磨礪天下而人人有覬覦徼幸之心復何所恃而為治哉况股肱大臣天下所望而為表則者豈特以一官自私而不為國家惜大體也臣等固知爵命之行必有遜而不受者伏望朝廷察臣等言稽之典故如今來例行除授事體有輕重必當即乞明示中外使灼然曉知若祗出一時之恩願下臣等章奏詢之公議儻以為然或難於追寢前命因其表遜悉停過恩如此則上無虛授之譏下有相遜之勸與其一舉兩失事相萬也臣等待罪言責不敢顧避緘默貼黃稱侍中官秩隆峻不可為節相序遷之資稽之典故未嘗有輕授者唯晏殊前來已為刑部尚書朝廷若以左降歲久自從牽復恩例皇祐元年七月河陽三城節度同平章事夏竦兼侍中宣徽北院使判并州鄭戩為奉國軍節度使觀文殿大學士禮部尚書知陳州晏殊為吏部尚書資政殿學士吏部侍郎知許州張觀為尚書左丞觀文殿學士兼翰林學士兵部侍郎丁度為户部侍郎資政殿學士户部侍郎知應天府王舉正為吏部侍郎資政殿學士給事中知杭州范仲淹資政殿學士給事中新知河南府吳育並為禮部侍郎太子少卿致仕杜衍為太子太保太子少傅致仕石中立任師中并為太子少師太子少保致仕任布為太子少傅初上軫念執政舊臣宰相文彥博因贊以鄭戩夏竦等十四人皆遷官加職而弼與琦各領一路安撫使仍優除之郯時為侍御史知雜事同監察御史陳升之上此奏上仁宗論明堂覃恩太濫包拯臣伏覩明堂赦書應文武百官內臣並與遷轉臣先以風聞曾具論列并乞召對不䝉開可退用憂迫弗皇啓處竊以爵祿者天下之公器而邦國之大柄也唯士之有功與德所宜處之非此二者不可濫與夫人君者固宜愛之惜之茍輕用之則壞公器而失大柄一綱或紊百目皆隳雖善為治者亦末如之何况今吏員益衆財用益殫為國計者自當澄汰冗雜以寬調度豈可不辨能否普加官爵是於承平之世行此姑息之事但恐賦租之廣不足給其用秩廩之多不足充其欲紀律一弛天下蕩然有不可救之弊矣臣又伏讀近降詔㫖今後應內降特與恩澤及免減罪犯並仰中書樞密院并已承受官司具前後詔勑執奏不得施行有以見陛下勵精革弊求治之切至也唯此覃恩頗蠧政之甚伏望陛下上稟祖宗之訓下為社稷之計所有今來遷轉恩澤乞賜特行裁處免千古之下以纍聖德之萬一臣過叨寵擢位疏責重區區之懇不能自已惟陛下留神省察天下幸甚皇祐二年十月上時知諫院上仁宗論不宜給麥允言鹵簿司馬光臣聞仲叔于奚有功於衛衛人使之繁纓以朝孔子曰惜也不如多與之邑惟器與名不可以假人夫爵位尊卑之謂名車服等差之謂器二者人主所以保蓄其臣而安治其國家不可忽也今允言近習之臣非有元勳大勞過絶於人而贈以三公之官給以一品鹵簿其為繁纓不亦大乎陛下雖欲寵秩其人而適足增其罪纍也何則三公之官鼎足承君上應三台鹵簿者所以褒賞元功皆非近習之臣所當得者陛下念允言服勤左右生已極其富貴死又以喪事之禮為之送終鼓吹笙鐃烜赫道路是則揚其僣侈之罪使天下側目扼腕而疾之非所以為榮也惟陛下覽仲叔于奚之傳垂意孔子之言則知名器之重不可加非其人况唐制羣臣於國立大功者婚葬則給鹵簿餘不在給限伏望陛下追寢前命其麥允言更不給鹵簿毋使天下人竊議指目以為朝廷過舉不勝幸甚皇祐二年上時為殿中丞同知諫院上英宗論兩府遷官司馬光臣曾上言兩府臣寮遷官太頻恐失天下之望乞陛下聽其辭避以成其美未䝉采納臣非憎此數人嫉其遷官乃是欲全其令名使之輔佐陛下重惜大柄耳先帝親選聖明傳以天下今陛下乃歸功大臣臣固知其人必不敢當也借使當日實曾贊成先帝聖意乃是欲安宗廟社稷若今日受賞則是預邀非常之福罪孰大焉然則陛下賞之是掩其盡忠之心使為徇利之人何榮之有臣所謂欲全其令名者此也夫爵位者人主所以御羣臣之大柄也然品秩髙下本皆虛名但以難得之故為人所貴若其易得則為人所賤譬如金玉珠璣茍或道路階庭處處有之則與瓦礫無異矣近歲以來官冗賞濫兩府大臣豈不素知今遇陛下即政之初宜開導聖聰以懲革斯弊今陛下以纂紹之際及聖體未安之時中外平寧為兩府之功加以厚賞則宿衛將帥宗室外戚四方藩鎮內侍近臣皆有冀望若一一稱滿其意則國家官爵賤於泥土將無以役使羣臣若抑而不與則人不自知更生觖望是始於推恩而終於聚怨也且輔佐之臣自於朞年之間連併遷官而欲禁止他人之幸進誠亦難矣臣所謂欲使之輔佐陛下重惜大柄者此也或者陛下以為曹佾無功尚加之使相况輔弼大臣當國家艱難之際輸力盡瘁不可不賞臣愚以為不然陛下所以賞曹佾者非以為功也乃以皇太后之德至深至厚無以為報故褒崇元舅以慰母心今若緣此推恩次及后族次及兩府次及他人則是曹佾隨衆遷官不為優異於皇太后之心何所慰哉然則陛下虛捐盛恩而衆人皆以大例遷官何足為喜也臣豈不知陛下欲褒賞大臣而臣區區不量其力以橫議干之非身之利然為朝廷忠謀無恤其他惟陛下察之治平元年六月上時知諫院上英宗論近臣濫恩司馬光臣昨者上言近歲官冗賞濫兩府大臣遇陛下即政之初宜開導聖聰以懲革斯弊今陛下以紹纘之際及聖體未安之時中外平寧為兩府之功加以厚賞則宿衛將帥宗室外戚四方藩鎮內侍近臣皆有冀望若一一稱滿其意則國家官爵賤如泥土將無以役使羣臣輔佐之臣自於朞年之間連併遷官則難以禁止他人之幸進伏䝉陛下面諭臣以兩府大臣皆有大功所以遷官他人無功何敢輒望臣再三敷奏以陛下若寢兩府恩命則他人自然不敢僥求若見兩府遷官則誰肯自謂無功不求榮進恐至時陛下亦不能裁抑兩府亦不敢奏當時陛下聖意確然終不開納今兩府才受恩命竊聞入內內侍省都知任守忠等已一例遷官臣竊料向去其餘臣寮互相形比繼續遷官卒無窮盡蓋官爵者人主之利器所以驅策羣臣制御四海今陛下曾不愛惜容易與人一至於此臣竊惜之凡制令之行必自貴近為始前者濫恩已施之於貴臣不可復收若止之於近臣猶可救其大半所有任守忠恩命伏望聖慈特賜追還以塞向去僥幸之路治平元年七月上時知諌院上英宗論重名器何郯臣聞聖人之養賢也能品其德能量其才能授以官於是分之為三上賢使之為三公次賢使之為臺諫監司下賢使之為守令所以寓權而悅之也於是為之宫室輿馬以養其體為之旌旗冕辨以養其貴為之鐘鼓琴瑟以養其樂為之弓矢斧鉞以養其威然而不可以私授惟其德惟其才而已矣茍授非其人則覬幸之端啓有小人者得之則胥效奔嚮而求之若固有於已寖以成俗人人皆以取之甚易而無難矣一旦聖人將革其弊而廢黜之莫不怨望盈耳是非小人之過其過在於人主授之之輕也人主不禁之於前而止於後蓋無及已嗚呼用人之際可不謹歟昔衛以鞶纓授仲叔于奚仲尼非之館陶為子求郎漢明拒之知名器如此其重也今陛下紹德業之崇卜基圖之永大設綱紀思合天人行於前必慮其後圖於始必全於終惟是選用之艱尤所可重品其德然後授其官量其才然後定其位使朝廷上下公卿大夫皆得以服其榮安其分士無覬覦職無虛授則天下官冗之弊息名器之用正夫以大理評事之卑而太宗猶謂之清望官不以授伶人之子况其大者乎惟陛下重之治平二年上時為龍圖閣直學士上神宗論王廣淵章服職名司馬光臣纍言廣淵姦邪乞盡奪去職名與逺地監當今聞廣淵帶職知齊州仍賜章服如此乃是賞之非黜之也嚮使廣淵自改京官以來謹身守分不為姦諂以至今日不過作第二任通判今所得乃如此豈可謂為姦諂無益哉孔子稱唯器與名不可假人今之章服所謂器也職名所謂名也二者皆無用之物然而天下貴之者為其非賢材則不能得之故也唐宣宗重惜章服不輕以與人有司製緋紫衣以備賜與經年不用三兩領故當時服緋紫者人以為貴夫名器者譬如珠玉若使之易得如瓦礫尚安足貴乎近歲兩次覃恩服緋紫者已為泛濫今又如陳鑄王廣淵輩皆賜章服是使今後受賜服者皆以為恥不以為榮也且陛下使廣淵出補外官者心已知其姦邪之迹也今又復以職名章服寵之是勸人使效廣淵所為也臣竊恐非國家之福伏望聖斷依臣前奏盡奪去廣淵職名并所賜章服與逺地監當使賞善罰惡皎然明白治平四年五月上時為御史中丞上神宗論郭昭選除閣職司馬光臣竊聞陛下嚮時直省官郭昭選等四人近有特㫖並除閣門祗候衆言籍籍頗謂僥忝國初草創天步尚艱故祖宗即位之始必拔擢左右之人以為腹心羽翼豈以為永世之法哉乃遭時不得已而然也自後嗣君守承平之業繼聖考之位亮隂未言之間有司因循踵為故事凡東宫寮吏一槩超遷謂之隨龍以此昭選之徒得自厮役直除班行其為幸已多矣乃敢妄有攀援邀求無已曾不自省有何功勳小人之心終無厭極不可縱也且閣門祗候祖宗所以蓄養賢才以待任使之地也其與班序差遣事體不同譬諸史臣則館閣之流也豈可使厮役之人為之哉况東宫其餘吏卒甚衆茍一人得之則皆有冀望之心此書所謂啓寵納侮者也陛下既承大統則率土之濱誰不為臣而獨私於東宫之人則所與親者至狹矣臣昨除御史中丞初上殿之日首以官人賞罰為言誠以三者致治之本自上世以來不易之道也今昭選等以賤𨽻而叨美職是官不擇也無橫草之勞而數月之間恩命相繼是無功受賞也姦慝明著如髙居簡等尚保而庇之是有罪不罰也陛下始初清明方勵精求治而乃輕其官爵慢其賞罰如此將以興太平之功猶適楚而北轅也今臣所以區區進言者但為陛下惜此而已所有昭選等新除閣門祗候乞賜追寢治平四年七月上時為御史中丞上哲宗論執政轉官劉摯臣伏覩近降麻制執政臣寮各特轉一官聖恩優厚中外聳動及臣伏讀麻制之詞乃以山陵寢廟奔走職事加臣子之異恩於是臣竊疑焉夫應奉山陵寢廟奔走職事乃臣之分也若欲以酬勞則應不止於執政若旌其送往則執政未嘗俱行授受之間未有名義伏聞所司檢會嘉祐年體例進入依應施行伏緣嘉祐八年英宗皇帝既推即位之恩臣寮各已覃轉後來以弗豫進藥而輔導調護鎮寧中外以至聖躬康復親决庶政誠天下之慶謂輔臣實與有勞故又命各人進一官然當時臣寮再三辭避纍日不敢受命至遣近臣趣令以新官入謝不降坐以待之方敢祇受又治平之末神宗皇帝嗣位覃霈改官之後適值韓琦以山陵使回懇求去位尋以兩鎮外補然猶虛上宰之位自曾公亮而下並不遞遷故與特轉一官以補轉㕔之恩考求兩朝故事各有因依則今來遷官别無義說惟過賞踰僣在聖人不足以廣恩而於義未安恐臣下終難於冒處伏望謹重國體愛惜名器授之以道則亷恥之風行欲望聖慈照㑹兩朝故事不同如執政臣寮辭免新命伏乞特賜允從無傷事體區區臣言庶幾有補元豐八年十二月上時為侍御史宋名臣奏議卷六十九
