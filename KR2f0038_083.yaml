body:
  text: 宋名臣奏議卷八十三宋趙汝愚編儒學門學術上仁宗乞删去九經正義中䜟緯之文歐陽修臣伏見國家近年以來定貢舉之科以為取士之法建立學校以為養士之方然士子文章未純節行未篤不稱朝廷勵賢興善之意所以化民成俗之風臣愚以謂士之所本在乎六經而自暴秦焚書聖道中絶漢興收拾亡逸所存無幾或殘編斷簡出於屋壁而餘齡昏眊得其口傳去聖既遠莫可考證偏學異說因自名家然而授受相傳尚有師法暨晉宋而下師道漸亡章句之篇家藏私蓄其後各為箋傳附著經文其說存亡以時好惡學者茫昧莫知所歸至唐太宗時始詔名儒撰定九經之疏號為正義凡數百篇自爾以來著為定論凡不本正義者謂之異端則學者之宗師百世之取信也然其所載既博所擇不精多引䜟緯之書以相雜亂怪竒詭僻所謂非聖之書異乎正義之名也臣欲乞特詔名儒學官悉取九經之疏刪去䜟緯之文使學者不為怪異之言之所惑亂然後經義純一無所駁雜其用功至少其為益則多臣愚以謂欲使士子學古勵行而不本六經欲學六經而不去其詭異駁雜欲望功化之成不可得也伏望聖慈下臣之言付外詳議至和二年上時任翰林學士上仁宗論龍昌期學術乖僻劉敞臣聞人主所謹一嚬一笑誠以衆人所望視天下所倣效也古者聖王之行賞也服物之章不可幸得府庫之財不以濫豫前日朝廷以龍昌期所著書下兩制臣等觀其穿鑿臆說詭僻不經甚者至毁訾周公疑誤後學難以示遠乞下益州毁棄版本未聞朝廷卓然有所施行今忽加賜五品章服及絹百匹臣未知誰主為奸邪崇僞飾虛附下罔上以誤陛下執政又曽不能謹重政體顧畏公議茍慰藉人情賣弄國恩其失豈特嚬笑之間哉按昌期之書違古畔道所謂言僞而辨學非而博是王制之不聽而誅者也陛下哀其衰老未便伏少正卯之刑則幸矣又何賞之哉昔孔子作孝經以非聖人者無法乃比不孝之罪要君之罰而朝廷顧多昌期之毁周公臣所不曉也且陛下使臣等議之臣等不敢不盡忠既而弃其言焉豈以臣等為蔽賢而害能乎夫蔽賢而害能人臣之大罪也願陛下因正臣等之罪而大表顯昌期之書使天下皆服誦而習尚之則可以釋謗於萬世矣自非然者置臣等之言而不用縱昌期之妄而不誅乃反褒以命服厚以重幣是非貿亂沮勸顛倒使迷國之計行於側而非聖之俗倡於下臣竊為陛下不取也書曰天命有德五服五章哉夫章服固天所有而財力又民之所出也陛下奈何曲狥大臣之意而茍榮小人之身乎將使遠方寡見淺聞之民奔走於辨僞之學沉沒於非聖之論迷而不反非國家之利也伏乞追還詔書斷天下之疑毋使有識之士窺朝廷之淺深臣不勝拳拳嘉祐四年八月上時為知制誥上神宗論近歲士人習高竒之論誦老莊之言司馬光臣聞國之政治在於審官官之得人在於選士士之嚮道在於立教教之歸正在於擇術是知選士者治亂之樞機風俗之根原也竊見近歲公卿大夫務為高竒之論喜誦老莊之言流及科場亦相習尚新進後生未知臧否口傳耳剽翕然成風至有讀易未識卦爻已謂十翼非孔子之言讀禮未知篇數已謂周官為戰國之書讀詩未盡周南召南已謂毛鄭為章句之學讀春秋未知十二公已謂三傳可束之髙閣循守注疏者謂之腐儒穿鑿臆說者謂之精義且性者子貢之所不及命者孔子之所罕言今之舉人發口秉筆先論性命乃至流蕩忘返遂入老莊縱虛無之談騁荒唐之詞以此欺惑考官獵取名第祿利所在衆心所趍如水赴壑不可禁遏彼老莊弃仁義而絶禮學非堯舜而薄周孔死生不以為憂存亡不以為患乃匹夫獨行之私言非國家教人之正術也魏之何晏晉之王衍相與祖述其道宅心事外選舉者以此為賢仕宦者以此為榮遂使紀綱大壞胡夷並興生民塗炭神州陸沉今若於選士之際用此為術臣懼向去仕宦之士皆何晏王衍之徒則政事安得不隳風俗安得不壞正始永嘉之弊將復見于今矣伏望朝廷特下詔書以此戒勵內外公卿大夫仍指揮禮部貢院豫先曉示進士將來程試若有僻經妄說其言涉老莊者雖復文辭髙妙亦行黜落庶幾不至疑誤後學敗亂風俗熙寧元年上時為翰林學士上神宗論王安石之文有異志楊繪臣竊見人君獨享天下之奉其勢至隆也以一人而塊居深宫之中其身至孤也以其勢之至隆固不可不先絶乎覬覦也以其身之至孤固不可不深防乎危禍也故周易之埀訓未嘗不戒之於無焉如坤之初六當一陰生之時應建午之月豈惟無堅氷而已兼亦無履霜也而曰履霜堅氷至斯不謂戒之於無哉其象曰履霜堅氷陰始凝也馴致其道至堅氷也其文言曰陰疑於陽必戰由辨之不早辨也一陰始生其卦為姤其九五曰有隕自天志不舍命也臨卦才二陰始生爾聖人已逆戒之曰至於八月有凶豈亦不謂戒之於無哉蓋謂必無而忽之則有時而或有也謂之為或有而備之則必無矣是以古聖賢者之著書立言埀教於後世未嘗不先以辨君臣尊卑為首務也昔高郢作魯議夫以天子禮樂祀於周公之廟止施於死者也高郢猶著論以非之者蓋天子之禮樂不可以兩用之臣觀古史凡有得建天子旌旗者未有不至于大故然後知高郢之論於防微之道著也唐陳越伊尹論亦斯之類焉云此皆賢聖之權臣竊謂古聖賢未嘗不以尊君卑臣為常道至於權者出於聖賢之不得已亦未敢明著於書者蓋懼後世亂臣賊子如莽操師溫之輩假之以為名也臣欲一言於陛下然未委陛下恕之乎不恕之乎恕之則不漏其言臣之禍猶賖不恕之乎臣之禍不測然臣豈得畏不測之禍而不進忠於陛下也臣竊見唐賢多以所為之文見其人一生行事如蓍蔡之不謬如李紳作閔農詩士稱其有宰相器韓愈稱歐陽詹亦曰讀其書知其於慈孝最隆也丁謂詩有天門九重開終當掉臂入王禹稱讀之曰入公門鞠躬如也天門豈可掉臂入乎此人必不忠後果如其言臣聞王安石文章之名久矣嘗聞其詩曰今人未可輕商鞅商鞅能令政必行今覩其行事已頗類之矣臣竊嘗惑其文今謹昧死而條之乞陛下恕臣罪而反覆詳之王安石雜說曰魯之郊也可乎曰有伊尹之志則放其君可也有湯之仁則絀其君可也有周公之功則用郊不亦可乎王安石雜說曰周公用天子禮樂可乎周公之功人臣所不能為天子禮樂人臣所不得用有人臣所不能為之功而報之以人臣所不得用之禮樂此之謂稱王安石雜說曰有伊尹之志而放君可也有周公之功而伐兄可也有周之后妃之賢而求賢審官可也夫以后妃之賢而佐王以有天下其功豈小補哉與夫婦人女子從夫子者可同日語乎臣竊謂孟子勸齊王無毁明堂者蓋當時天下無定主故敢爾若言之于一統之世則孟子豈不為罪人今王安石於君尊臣卑重熙纍盛之朝而顯然再三丁寧於伊尹放君周公用天子禮樂之事臣願陛下詳其文而防其志臣言必死罪不敢辭熙寧四年上時為御史中丞上哲宗乞戒學者遵守正道朱光庭臣聞聖王之治天下以教育人材為先務教育之道在學得乎正而已學得其正則始於誠意正心而終於致君澤民足以成君子之事業然則所謂正者何也乃堯舜禹湯文武周公孔子孟軻之正道非釋老莊列申韓之他道也學者茍得其正則幼而誦習長而講解久而入心成德至於終身踐履不離乎正則養就美才皆此塗也伏自陛下臨御之初患天下學者狃習異端未能純一向道嘗下明詔申勑有司不得於莊老出題及引用釋氏申韓之說此可謂教天下學者適正之本也今來科場詔已降竊聞學者狃習異端未至悛革兼有司將來考校自當遵前日之詔進退多士臣愚欲乞朝廷申明前詔內自太學之官外至諸州教授俾告諭學者一意遵守正道不得依舊狃習異端不唯自可以應科舉之選庶幾從此人人適正養就美材隆太平基址伏望聖慈特賜施行元祐五年三月上時為諌議大夫上欽宗論王安石學術之謬楊時臣伏見蔡京用事二十餘年蠧國害民幾危宗社人所切齒而論其罪者曾莫知其所本也蓋京以繼述神宗為名實挾王安石以圖身利故推尊安石以王爵配享孔子廟廷而京之所為自謂得安石之意使人無得而議其小有異者則以不忠不孝之名目之痛加竄黜人皆結舌莫敢為言而京得以肆意矣然則致今日之禍者實安石有以啓之也謹按安石挾管商之術飾六藝以文奸言變亂祖宗法度當時司馬光已言其為害當見於數十年之後今日之事若合符契其著為邪說以塗學者耳目敗壞其心術者不可縷數姑即其為今日之害尤甚者一二事以明之則其為邪說可見矣神宗皇帝常稱美漢文惜百金以罷露臺曰朕為天下守財耳此慎乃儉德惟懷永圖正宜將順安石乃言陛下能以堯舜之道治天下雖竭天下以自奉不為過守財之言非正理曾不知堯舜茅茨土階未嘗竭天下自奉其稱禹曰克儉于家則竭天下以自奉者必非堯舜之道其後王黼朱勔祖其說以應奉花石之事竭天下之力號為享上實安石竭天下自奉之說有以倡之也其釋鳬鷖守成之詩於末章則謂以道守成者役使羣動泰而不為驕宰制萬物費而不為侈夫鳬鷖之五章特曰鳬鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱詩之所言止謂能持盈則神祗祖考安樂之而無艱難耳自古釋之者未有為泰而不為驕費而不為侈之說也安石獨倡為此說以啓人主之侈心其後蔡京輩輕費妄用專以侈靡為事蓋祖此說耳則安石邪說之害豈不甚哉臣伏望睿斷王安石學術之謬追奪王爵明詔中外毁去配享之像使邪說淫辭不為學者之惑實天下萬世之幸靖康元年上時為諌議大夫上欽宗論王氏及元祐之學崔鶠臣伏覩詔書詔諌臣直論得失以求實是此見陛下求治之切也然數十年來王公卿相皆自蔡京出其餘擢居要路以待相繼而用者又充塞乎臺省要使一門生死則一門生生一故吏逐則一故吏來更持政柄互秉鈞軸歷千百年無一人立異雖萬世子孫無一人害已此蔡京之本謀也安得實是之言聞於陛下且如馮澥近日上章其言曰熙寧元豐之間士無異論太學之盛也此姦言也昔王安石用事除異已之人當時名臣如富弼韓琦司馬光吕公著吕誨吕大防范純仁等咸以異論斥逐布衣之士誰敢為異乎士攜策負笈不遠千里游乎學校其意不過求仕宦耳安石著三經之說用其說者入官不用其說者黜落於是天下靡然雷同不敢可否陵夷至于今大亂此無異論之大效也而尚敢為此說以熒惑人主乎又曰崇寧以來博士先生狃於黨與各自為說附王氏之學則詆毁元祐之文服元祐之學則詆誚王氏之說尤為欺罔豈有博士先生敢有為元祐之學而詆誚王氏之說乎自崇寧以來京賊用事以學校之法馭士人如軍法之馭卒伍大小相制內外相轄一有異論居其間則纍及上下學官以黜免廢錮之刑待之其意以為一有異論則已之罪必暴於天下聞於人主故耳博士先生有敢詆誚王氏者乎欲乞下太學取博士講解覆視則澥之誕謾見矣至如蘇軾黃庭堅之文集范鎮沈括之雜說畏其或記祖宗之事或記名臣之說於已不便故一切禁之坐以嚴刑示以重賞不得藏匿則禁士異論其法亦已密矣澥言為元祐之學詆誚王氏之說其欺罔不亦甚乎欺罔之言公行則實是何從而見也然先王之求實是亦有道矣皇帝清問下民周官詢于衆庶孟子不以左右卿大夫之言為然必詢于國人則實是見矣臣乞以澥所上言章并臣之章垂于象魏揭于通衢以驗國人之論而賞罰之以戒小人欺罔君父者此陛下之福天下之幸也靖康元年五月上時為右正言上欽宗論王氏及元祐之學李光臣愚昧朴拙當陛下初政偶承乏擢置言路每因進對備聞德音未嘗不以紹復祖宗法度為說忠臣義士莫不歡欣鼓舞日須德化之成也臣今月十七日入臺伏覩三省降到黃榜一道臣寮上言以王安石為名世之學發明要妙著為新經天下學者翕然宗師又言熙寧元豐間內外安平公私充實法令備具賦役均平其意專以王氏之說為是公肆誕慢無復忌憚以陛下聖明未可遽欺既以司馬光與安石俱為天下之大賢又云優劣等第自有公論觀言者之意必不肯以光為優以安石為劣夫光與安石行事之是非議論之邪正皎若白黑雖兒童走卒粗有知識者莫不知之當熙寧元豐間如韓琦富弼歐陽修之屬尚皆無恙安石惡其議也皆指為因循之人擯斥不用卒以憤死恭惟太祖太宗創業之艱難真宗仁宗守成之不易規模宏遠矣安石欲盡廢祖宗法度則為說曰陛下當制法而不當制於法欲盡逐元老大臣則為說曰陛下當化俗而不當化於俗蔡京兄弟祖述其說五十歲間搢紳受禍生靈被害海內流毒而祖宗法度元老大臣掃蕩禁錮幾無餘藴矣幸賴宗廟社稷之靈上皇悔悟以祖宗不拔之基全付陛下今言者又創為熙豐之說以安石為大賢臣恐此榜一出流聞四方鼓惑民聽人心一失不可復收非朝廷之福也靖康元年五月上時為侍御史宋名臣奏議卷八十三
