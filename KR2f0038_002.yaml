body:
  text: 宋名臣奏議卷二宋趙汝愚編君道門君道二上神宗要務十事錢顗臣每讀書傳見忠義之臣事聖明之君誠無所不通言無所不從臣雖至愚未嘗不掩卷感激思得其位以竭臣子之節庶幾有所補報也而蒙陛下不以臣之踈賤使待罪言職臣夙夜念慮無以答陛下恩遇之萬分唯有狂瞽敢言而已又况陛下天臨萬幾焦勞庶政孜孜求治之心雖堯舜之稽古禹湯之責已無以加也臣豈可以持祿茍安而不務獻納哉臣謹采當今之要務參以祖宗之成訓條為十事以冒宸聽幸陛下赦臣之愚而賜財擇焉一曰為君大體臣聞體者履也自古王者有治世之常法綏民之要術可履而行之履得其道則天下蒙其澤履失其道則天下受其弊亦勢之然也故唐太宗謂長孫無忌曰朕即位之初上書者或言人主必須獨運威權不得專委臣下或欲耀兵振武懾服四夷唯有魏徴勸朕偃武興文布德施惠中國既安逺人自服朕從其言語天下大寧我太宗亦嘗與呂蒙正言致治之要曰莫若撫夷夏和隂陽使百度修理一人端拱無為此皆前聖後聖得為君之體也臣願陛下法而行之則祖宗之能事復見於今日矣二曰正心御下臣聞治國者如治家治家者先修其已修巳者先正其心傳曰正心以正朝廷修已以安百姓豈虛言哉唐李珏嘗對文宗云貞觀中房杜王魏每進忠言只乞太宗不易初心自古以來靡不有初能克終厥德者實萬世無疆之休臣竊見國史言藝祖大內既成坐寢殿中令洞闢諸門皆端直開豁無有壅蔽因謂左右曰此如我心小有邪曲人皆見之矣臣願陛下鑒此而審思之則言動好惡無不合於道也三曰審察邪正臣聞治道之要在知臣下之邪正而審察君子小人之分而巳也巧詐辨給者謂之竒才可乎聚斂強濟者謂之稱職可乎沉靜敦厚者不可謂之無能砥礪名節者不可謂之迂闊有一惑於此足以纍於朝政也為國家者其審察君子小人不可不早也孔子曰逺佞人王弼云放善柔乃萬世之訓也我太宗嘗謂近臣曰唯姦邪無狀若為內患深可懼也帝王用心常須謹此兹見聖人深思逺慮以杜未萌之意也臣願陛下視此以為戒則天下何憂不治也四曰選任大臣臣聞之書曰任官惟賢才左右惟其人則知君人者雖有上聖之姿自誠之性必由忠賢輔佐然後優遊几席之上坐視天民之阜也古之言至治者莫尚乎禹湯禹得臯陶湯用伊尹而王業大也故曰昔在文武聰明齊聖小大之臣咸懷忠良其是之謂乎太宗嘗謂宰臣吕端曰廟堂之上固無虛授但能進賢退不肖便為稱職至哉斯言是輔弼之任繫天下之安危不可不選也故曰天子擇宰相宰相擇百官然後各稱其職而庶政修舉臣願陛下力行而不倦則天下之幸也五曰聽斷不惑臣聞聖王端處於法宫之中而大小之臣邪正紛紛羣言競進雖然聽之於耳則必斷之於心茍不悅於導諛則無憂於悔吝是知聽斷之際其可忽乎儻容片言之惑小則繫人心之休戚大則極天下之安危不可不謹也我太宗嘗謂近臣曰人君聽斷茍能盡誠人之情偽四方逺近無不通達臣願陛下體蹈而精思之不行小人浸潤之譖不聽近習容悅之言進忠賢而不疑斥邪佞而不用雖堯舜之聰明亦無以過於此也六曰謹出號令古者命令之出議其經久可用然後宣布於天下吏奉行而不敢慢民聽受而不敢忽管子曰凡國之重器莫重乎令令重則君尊君尊則國安故書曰令出惟行弗惟反賈誼亦云先王執此之政堅如金石行此之令信如四時此皆古之激切之言也國家命令之下隨事變更其能取信於天下乎臣聞太祖一日朝罷御便殿俯首不言內侍王繼恩進曰陛下退朝不同常日不知其故帝曰爾謂帝王可容易行事耶早來誤指揮一事史官必書之此所以不樂也太祖初臨萬幾偶然一事之差憂形於色况發號出令其肯忽之哉其肯忽之哉臣願陛下思祖宗之所以謹於出令則天下未有不臻於極治也七曰公行賞罰臣聞賞罰者人主之操柄非至公之道不可以行之也蓋賞者所以旌天下之有功罰者所以懲天下之有罪賞當功則為善者無不勸罰當罪則為惡者無不沮夫善者有所勸而惡者有所沮故朝無幸位民無幸生由是觀之則賞不可以喜而及罰不可以怒而用要在公行於上而必信於下故曰賞以侔春夏刑以象秋冬此之謂也如藝祖之黜王全斌罰之公也太宗之升楊延昭賞之公也臣願陛下廓日月之明奮乾剛之斷謹厥終惟其初不賞無功不罰非罪克紹祖宗之大業斯亦五帝三王之舉也八曰恭儉惜費竊以國家用度之廣其出百端內外供須日增一日甚可慮也臣聞仁廟慶厯中嘗令近臣裁減冗費時議為允以今較之國用空乏民力凋困又愈於慶厯未減時也臣願陛下酌古今之宜思萬事之弊先自一人減損至於後宫服玩工巧竒技一切屏絶示天下以儉約故曰節以制度不傷財不害民又曰損上益下其道行也宜乎罷不急土木之役去無益內外之費大臣遷職無名厚賜皆可寢削以寬民力庶幾可為水旱兵革之備臣聞故老説太祖創業垂統躬履儉德常服浣濯之衣乘輿服御之物皆尚質素此得前史所謂敦朴為天下先之義也臣願陛下遵先訓而行之則恭儉之德不獨專美於漢之文景也九曰仁恕恤民臣聞仁者三王之治具也孔子曰君子之道忠恕而巳仁則濟衆有方恕則用刑不暴惟仁與恕有國家者所宜先之也書稱民非后罔戴后非民無以守邦孟子曰民為貴社稷次之又曰仁民而愛物觀斯言則民其可不恤乎臣謂恤民之道無他在乎薄賦斂謹好惡而已故太祖嘗謂侍臣曰苦民奉已之事朕必不為之真宗亦曰非理害民朝廷所不可行兹見二帝仁恕勤恤之心至矣臣願陛下法此以御四海則治古之道何患不及哉十曰鑒戒安危臣聞觀鑑可以見形觀古可以鑒今覆車在前後車必戒故曰不善者善人之師斯言得之矣臣竊觀自古有天下者必鑒於治亂安危之迹故創業之君勞而易治也守成之君逸而易亂也治則安亂則危此亦必然之理也何謂守成多逸而召於亂也臣請言其略方天下無事之時左右進言者必曰國既治矣民既富矣有前世常行之法令足以施設可高拱而無為矣有四海所入之財賦足以宴樂可優遊而自肆矣於是君志日盈君心日驕紀綱敗壞而不知興復吁可惜哉後之人君得不以是而為戒也乎故真宗謂王旦曰前代帝王好窮兵黷武懈於幾務惑聲色事奢侈此大過也朕固不為之先皇所以恢治安之業致太平之道蓋由此也臣願陛下鑒於古視於今循其言襲其迹夜以思之旦以行之則祖宗之休德盡發揚於陛下之聖明也非臣之幸乃天下之幸熙寧元年十月上時為御史裏行上神宗論人主當不為血氣所變孫覺臣聞血者隂也氣者陽也二物合而成人雖合而成人而無心術之妙精神之運則亦下愚而已矣昔者孔子深見此理而推言之曰血氣未定戒之在色以謂二物之交爭則人之欲心甚熾無妙道至神以勝之則至于違禮義而戕壽命矣又曰血氣方剛戒之在鬭二物既盛則令人喜鬭衆人之鬬則尚氣好勝取必於人以爭淺小而忘後患人主之鬬則強兵右武拓土開邊以爭利於夷敵凡鬬皆所以傷神明而悖性理矣又曰血氣既衰戒之在得凡人之老必嗇而貪血氣之衰自然及此故年彌高而德彌邵者謂之孔子之徒此三者蓋論常人之情常人為隂陽所役故一人之身而少壯老三變聖賢則不然知禮義之可貴壽命之可寶潛心於妙道至神則少之時不惑於色知神明之可尊性理之可樂夷敵禽獸不足以校勝負爭強弱則壯之時不恱於鬬少而寡欲長而盡性則血氣雖衰而不貪隂陽為之役而不得與之變故心間而神明體佚而壽考陛下以睿明之質鼎盛之年求治甚切而聽覽不倦真可謂有意天下者矣然臣之愚竊獨私憂而過計願陛下深鑒孔子之言而終始以三者為戒則宗廟幸甚天下幸甚熙寧元年閏十一月上時為右正言上神宗論求治不可太急范純仁臣伏見陛下即位已來切於求治思欲革去舊弊速致太平此固聖明之君盛德之舉也然而道逺者理當馴致事大者不可速成人才不可以急求積弊不可以頓革道不馴致則有揠苖之患事欲速成則有不達之憂人急求則才佞進而巧偽生弊頓革則人情擾而怨憤作所以景帝削七國而鼂錯受戮東漢疾橫議而黨錮大興宋襄公急於求霸以致喪師唐文宗切於除姦而訓注禍作此皆前世之明效而後王之龜鑑也故帝王之圖治必有顯仁藏用自下升高人材以長育而成功德以積纍而大通其變而使民不倦神其化而使民不知無象無為而天下自安矣故傳稱堯之德曰蕩蕩乎民無能名焉稱舜曰夫何為哉恭已正南面而已矣稱文王則曰不識不知順帝之則是聖人之治以無為而成也又稱孔子曰毋意毋必毋固毋我又曰無適也無莫也義之與比洪範曰無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平此則聖人之心毋固毋必無適無莫不作偏黨好惡而邪正自辨萬事無惑也故水止則方能鑑物心清則可以理事自古人君有以才略自任果於興作欲其事功速就必為僉佞所乘迎合之人則以才能被寵忠直之論皆以沮排見疑以沮排被疑則不暇察其忠以合意為才則無以覺其佞自然善惡無辨賞罰不明人情怨怒而不知禍亂已成而莫見以至國家顛危者多矣此果於興作之害也孔子曰豫無樂乎為君惟其言而莫豫違也不幾乎一言而喪邦乎此有以見小人承順之言可懼也陛下聰明仁孝修已篤躬自有堯舜之資可以垂衣而治不須急務於近效乃雜五霸之為豈惟徒勞睿思實恐以小妨大伏望陛下清心簡事尊德委賢以知人安民為大方以富國強兵為末務覆之如天容之如地四海被不言之化生民躋仁壽之域與三王並美唐虞比隆使後世歌頌無窮在陛下留神而巳熙寧二年上時知諫院上神宗論人君在知道得賢務修法度陳襄臣聞為人君者在知至道其次務得賢其次務修法度知斯三者則知所以治天下矣至道之要求之不逺在乎養心治性擇乎中庸而已天之所命之謂性性之未變之謂中中者天下之大本也而有五善其端也若甚微而不可明及其至也塞乎天地矣感物而動之謂情情者天下之大欲也而有邪有正率善而行之謂正率不善而行之謂邪故正者天之道也邪者人之偽也茍得其正則彼之所謂情者喜也怒也哀也樂也無所處而不為中矣即易之乾曰利貞者性情是也茍失之邪則吾之所謂善者仁也義也禮也智也信也無所往而不為偽矣即孟軻所謂物交物則引之而巳是也堯舜得之天故曰性之也禹湯治之人故曰身之也正矣五霸失之偽故曰假之也邪矣是王霸之辨而君子之所以謹擇者也其始也在於博學以盡其心盡心以明其善明善以持其志持志以養其氣養氣以充其體至誠高明博厚而不息也然後能定定則至於廣大精微而不惑也然後能應能定能應則七情者不能偽而五善者無所不至矣喜非吾喜也而未嘗不喜怒非吾怒也而未嘗不怒哀樂非吾哀樂也而未嘗無哀樂莫不與天下公共之也其為貌也必正禮而無所不莊其為言也必正辭而無所不治其為視也必正色而無所不辨其為聽也必正音而無所不謀其為思也必正道而無所不達故其應務也舉天下之變不得以困吾心其任人也舉天下之才不得以罔吾道其治民也舉天下之政不得以盩吾仁其行法也舉天下之情不得以易吾義邇之則虛一而靜逺之則通乎倫類而知建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑斯道也百王之所相傳而不易者也君得之傳之臣臣得之致之君大者以為聖小者以為賢或並世而以其身傳或異世而以其言示堯之於舜禹臯陶則以身傳之也彼則見而知之於湯文王則以言示之也彼則聞而知之文王之於武王周公太公則以身傳之也彼則見而知之於孔子孟軻則以言示之也彼則聞而知之伊尹之於太甲也甘盤之於高宗也周公之於武王也嘗致之矣而天下平孔子孟軻不得其君而致之也而天下亂行乎百世之上言乎百世之下而若合符節其用捨則殊其所以傳之者一也為人君者有其道則聰明不足以自任也可以取而取之有其位則權勢不足以自私也可以與而與之故其心公焉居天下之廣居攬天下之多務而不敢獨為之也必求天下之賢者而任之相與共濟焉堯非不聖也方其洪水之時中國猶未乂堯思天下之賢者宜莫如舜舉而敷治焉舜思天下之賢者宜莫如禹又以命禹而平水土水土既平益火山澤禽獸之害人者去之稷教耕稼民得安居而食又懼夫無教而亂也使契為司徒教以人倫而臯陶以刑輔之而天下以寧故孔子曰舜有臣五人而天下治孟軻曰堯以不得舜為已憂舜以不得禹臯陶為已憂知其所以為大也得其小以失其大烏足以為堯舜哉隋文帝每一臨朝或至日昃宿衛之士傳飱而食唐文宗議政延英每對宰臣率漏下十數刻此二主者非不用心勤勞然終無益於治者由親細務而暗大體不知其術然也臯陶曰元首叢脞哉股肱惰哉萬事墮哉此可知矣夫法度者人情之防範也為國而不修先王之法度是猶輸之不以規矩正方圓而曠之不以六律治五音也古者先王之建國一事一政無非法者將以定民之志而立民之極雖其迹之不必因然其制作之意不可一日而忘也故其車服宫室皆有數度人徒械用皆有等宜貢賦皆有節師田學射皆有法冠昏喪祭皆有禮姦聲姦色者舉廢亂名亂政者舉誅器服不中度者舉毁禽獸不中殺者舉禁是以國家優裕風俗淳一而物無疵癘矣周衰禮樂壞王道陵夷上無聖賢之君下無法度之臣天下蕩然無綱紀制度漢興有揚雄者可謂法度之臣矣而無可致之君唐太宗有為之主也而房杜之徒不足以言禮樂此其所以不王也伏惟陛下饗國以來孜孜庶政二帝三王之事必欲舉而行之臣居斯時不以堯舜之道陳於陛下之前則不恭之罪莫大焉昔者孟軻見滕文公言必稱堯舜文公中才之主也軻猶以此待之况陛下天資聖德聰明智勇之若此臣敢隱默而不言哉方今天下之患者皆謂黎民未乂戎狄未恭政令未明財用不足以臣思之不足為患所以過慮者在陛下中庸之未擇性理之未充賢才之未多法度之未立也伏望陛下略機務之繁進誠明之學稽經信道頥養神明精選搢紳有道之臣旁求巖穴篤行之士日與講求性命之理道德之源養而充之以至神妙斯可以不言而化矣然後建學校隆師儒首自京師達於州邑羣百辟之才以長育之隆三物之教以統一之則賢人衆多足以任使矣求一德以居論道之司舉庶尹以付任官之責簡用儒臣以分按察之權均布循吏以膺守宰之寄自然百司羣吏莫不任職則政令自白而黎元安矣詔奉常以禮學之士修五禮於朝委大農以制置之司節百用於國則浮費自省而財用有餘矣陛下身先恭儉以訓於上小大之臣畏法遵繩以守於下民以是化政以是淳國富兵強可使制梃以撻戎敵之兵矣凡有司之事一切付之陛下但優遊巖廊以神道設教此堯舜之舉也易曰火在天上大有君子以遏惡揚善順天休命惟陛下不以臣言為迂闊少賜留意則天下幸甚熙寧二年四月上時知明州被召除修起居注上神宗論王霸之辨在審其初程皓臣伏謂得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也王道如砥本乎人情出乎禮義若履大路而行無所回曲霸者﨑嶇反側於曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之而霸則霸矣二者其道不同則在審其初而巳易所謂差若毫釐繆以千里者其初不可不審也故治天下者必先立其志正志先立則邪説不能移異端不能惑故力進於道而莫之禦也茍以霸者之心而求王道之成是衒石以為玉也故仲尼之徒無道桓文之事而曾西恥比管仲者義所不由也况下於霸者哉陛下躬堯舜之資處堯舜之位必以堯舜之心自任然後為能充其道漢唐之君有可稱者論其人則非先王之學考其時則皆駮雜之政乃以一曲之見幸致小康其創法垂統非可繼於後世者皆不足為也然欲行仁政而不素講其具使其道大明而後行則或出或入終莫有所至也夫事有大小有先後察其小忽其大先其所後後其所先皆不可以適治且志不可慢時不可失惟陛下稽先聖之言察人事之理知堯舜之道備於已反身而誠之推之以及四海擇同心一德之臣與之共成天下之務書所謂尹躬暨湯咸有一德又曰一哉王心言致一而後可以有為也古者三公不必備惟其人誠以謂不得其人而居之則不若闕之之愈也蓋小人之事君君子所不能同豈聖賢之事而庸人可參之哉欲為聖賢之事而使庸人參之則其命亂矣既任君子之謀而又入小人之議則聰明不專而志意惑矣今將救千古深錮之弊為生民長久之計非夫極聽覽之明盡正邪之辨致一而不二能勝之乎或謂人君舉動不可不謹易於更張則為害大矣臣獨以為不然所謂更張者顧理所當耳其動皆稽古質義而行則為謹莫大焉豈若因循茍簡卒致敗亂者自古以來何常有師聖人之言法先王之治將大有為而反成禍患者乎願陛下奮天錫之勇智體乾剛而獨斷霈然不疑則萬世幸甚熙寧二年上時為監察御史裏行上神宗論修身配天始於至誠無息李常臣聞孔子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章夫堯之為德至民莫能名功業高大法度煥明如此其盛者配天故也所以配天者能則天也亦何獨堯為然王天下者莫不欲然也易曰天行健君子以自強不息則王者之事也中庸曰肫肫其仁淵淵其淵浩浩其天配天王者之德也夫立天下之正位行天下之大道不求則天而配其德可乎臣竊聞陛下即位已來聖德日新殆將天縱碩儒元老自愧不及追帝王之盛際將在今日臣所以樂為陛下言也昔者子思論為天下國家有九經所以行之者修身而巳誠能修身天下國家之治尚足道哉其修身之敘亦必始於至誠無息而極乎高明上配天德然則志在於配天者何可息也詩曰於乎不顯文王之德之純孔子曰我學不厭皆言其不息也臣願陛下就天質之至明因聖術之巳著法文王孔子之意勉之又勉極夫廣大而盡乎精微比德於唐堯之盛尚慮功業法度不輝耀乎萬世不垂譽於無窮乎非愚臣茍以責難之義事陛下誠以陛下睿智之資為此甚易故也熙寧三年春上時為右正言上神宗論五帝親事之説文彥博臣讀漢史鼂錯之䇿云五帝神聖其臣莫能及故自親事臣謂錯之言乖繆頗甚因試論之夫易之乾曰天道也君道也坤曰地道也臣道也天地既位君臣之象著矣君臣交濟邦家之治隆矣而錯乃云不及君故自親事則古之聖帝明王安用輔相而致治乎所謂五帝者堯舜為聖之優故仲尼刪詩書則斷自唐虞為萬世法二典之載堯則有命羲和為天地四時之官允釐百工庶績咸熙舜則命禹平水土棄為稷官契為司徒臯陶作士垂為共工益為朕虞伯夷秩宗夔典樂龍納言皆選於衆而後用其人各任以職且云僉曰汝諧遴揀之至也所以百工允釐熙帝之載如此則堯舜豈自親事仲尼曰舜何為哉恭已正南面而已錯所謂自親事豈非乖繆乎若後之人君謂錯言為是乃以一身一心兩耳兩目獨任自用以周天下之萬務豈不殆哉又將使厥后自聖無復察邇言好問之裕仲尼云一言幾於喪邦者謂人莫已若則錯之言亦幾於兹乎臣故著論深切以明之元豐三年九月上時除太尉開府儀同三司復判河南府過闕入覲上神宗論人君在至誠至仁呂公著臣聞人君以至誠為道以至仁為德守此二言終身不易堯舜之主也何謂至誠上自大臣下至小民內自親戚外至四夷皆推赤心以待之不可以絲毫偽也如此則四海之內親之如父子信之如心腹未有父子相圖心腹相欺者如此而天下之不治未之有也絲毫之偽一萌於心如人有病先見於脈如人飲酒先見於色聲色動於幾微之間而猜阻行於千里之外強者為敵弱者為怨四海之內如盜賊之憎主人鳥獸之畏弋獵則人主孤立而危亡至矣何謂至仁親臣如手足視民如赤子戢兵省刑時使薄斂行此六事而已矣禍莫逆於好用兵怨莫大於好起獄災莫深於興土功毒莫甚於奪民利此四者陷民之坑穽而伐國之斧鉞也去此四者行彼六者而仁不可勝用矣傳曰至誠如神又曰至仁無敵審能行之當獲四福以人事言之則主逸而國安以天道言之則享年永而卜世長此必然之理古今巳試之效也去聖益逺邪説滋熾厭常道而求異術文姦言以濟暴行為申商之學者則曰人主不可以不學術數人主天下之父也為人父而用術於子其可乎為莊老之學者則曰聖人不仁以百姓為芻狗欲窮兵黷武則曰吾以威四夷而安中國欲煩刑多殺則曰吾以禁姦慝而全善人欲虐使厚斂則曰吾以強兵革而誅暴亂雖若不仁而卒歸於仁此皆亡國之言也秦二世王莽嘗用之矣皆以經術附會其説書曰惟辟作福惟辟作威此言威福不可移於臣下也欲威福不移於臣下則莫若捨已而從衆衆之所是我則與之衆之所非我則去之夫衆未有不公而人君者天下公議之主也如此則威福將安歸乎今之説者則不然曰人主不可以不作威福於是違衆而用已己之耳目終不能遍天下要必資之於人愛憎喜怒各行其私而浸潤膚受之説行矣然後從而賞罰之雖名為人主之威福而其實左右之私意也姦人竊吾威福而賣之於外則權與人主侔矣書曰威克厥愛允濟愛克厥威允罔功威者畏威之謂也愛者懷私之謂也管仲曰畏威如疾民之上也從懷如流民之下也畏威之心勝於懷私則事無不成今之説者則不然曰人君當使威刑勝於惠愛如是則豫不如奪生不如殺堯不如桀而幽厲威靈之君長有天下此不可不辨也元豐七年上時為資政殿學士知揚州此疏實蘇軾代作上哲宗論人君修心治國之要三司馬光臣聞本固則末茂源濁則流渾昔仁宗皇帝擢臣知諫院臣初上殿即言人君之德三曰仁曰明曰武致治之道三曰任官曰信賞曰必罰英宗皇帝時臣曾進厯年圖其後序言人君之道一其德有三其志亦猶所以事仁宗也神宗皇帝新即位擢臣為御史中丞臣初上殿言人君修心治國之要其志亦猶所以事英宗也今皇帝陛下新承大統太皇太后同聽萬幾不知臣愚猥蒙訪落臣且愧且懼無以塞責謹復以人君修心治國之要為獻其志亦猶所以事神宗皇帝也所以然者臣歷觀古今行事之端盡平生之思慮質諸聖賢之格言治亂安危存亡之道舉在於是不可移易故區區首為纍朝言之不知臣者以臣為進迂闊陳熟之語知臣者以臣為識天下之本源也夫治亂安危存亡之本原皆在人君之心仁明武所出於內者也用人賞功罰罪所施於外者也出於內者雖有厚有薄有多有寡稟之自天然好學則知所宜從力行則光美日新矣施於外者施之當則保其治保其安保其存不當則至於亂至於危至於亡行之由已者也所以能當在於至明所以能明在於至公是以明君善用人者博收逺舉拔其殊尤德行高人謂之賢智勇出衆謂之能賢不必能能不必賢各隨所長授以位任有功則賞有罪則罰其人茍賢能雖讎必用其人茍庸愚雖親必棄賞必有所勸罰必有所懲賞不以喜罰不以怒賞不厚於所愛罰不重於所憎必與一國之人同共好惡是以古者爵人於朝與士共之刑人於市與衆棄之如此安有不當者乎臣故曰所以能當在於至明所以能明在於至公也昔齊桓公置射鈎而使管仲相漢高祖知人善任使茍為不才雖見喜亦棄之茍才矣雖負販酒徒亡將戍卒亦升用之此所以能奮布衣取天下也館陶公主為子求郎明帝不許而賜錢千萬郎賤官也猶惜之况其貴者乎故永平之治至今稱之宋高祖事蕭太后甚孝太后欲以子道憐為揚州刺史高祖以其貪愚不許故功業之高冠於南朝唐太宗殺建成元吉而用其官屬魏徵王圭等與房杜無異卒得其效宣宗事鄭太后甚謹問舅鄭光以政事不能對罷其方鎮故時人稱美謂之小太宗此用人之公明者也韓昭侯惜弊袴不以賜左右之無功者漢高祖深怨雍齒而不忘其功魏太祖勳勞宜賞不吝千金無功望施分毫不與唐宣宗重惜服章故當時得緋紫者以為榮此賞功之公明者也豎牛殺孟丙仲壬立叔孫昭子昭子數其罪而殺之孔子善其不懷丁公脫漢髙祖於厄高祖以為不忠而斬之武帝妹隆慮公主且死屬其子昭平君昭平君殺人武帝流涕而誅之唐明皇弄臣黃㼐掀捕盜官墜馬明皇杖殺之宣宗謂樂工汝惜羅程藝我惜高祖太宗法此罰罪之公明者也臣略舉此數者以為明驗其餘在陛下博覽載籍以考之知臣所言不為謬妄臣以一夫之愚不能周知天下之務近冒上奏乞下詔書開言路伏望聖慈早賜施行元豐八年四月上時知陳州宋名臣奏議卷二
