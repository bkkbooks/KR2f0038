body:
  text: 宋名臣奏議卷一百四十七宋趙汝愚編總議門總議三上仁宗答詔條陳十事范仲淹臣伏奉手詔今來用韓琦范仲淹富弼皆是中外人望不次拔擢韓琦暫往陜西范仲淹富弼皆在兩地所宜盡心為國家諸事建眀不得顧避兼章得象等用心憂國足可商量如有當世急務可以施行者並須條列聞奏副朕拔擢之意者臣智不逮人術不通古豈足以奉大對然臣蒙陛下不次之擢預聞政事又詔意丁寧臣戰汗惶怖曾不獲遜臣聞歷代之政久皆有弊弊而不救禍亂必生何哉綱紀寖隳制度日削恩賞不節賦斂無度人情慘怨天禍暴起惟堯舜能通其變使民不倦易曰窮則變變則通通則久此言天下之理有所窮塞則思變通之道既能變通則成長久之業我國家革五代之亂富有四海垂八十年綱紀制度日削月侵官壅於下民困於外夷狄驕盛冦盜橫熾不可不更張以救之然則欲正其末必端其本欲清其流必澄其源臣敢約前代帝王之道求今朝祖宗之烈采其可行者條奏願陛下順天下之心力行此事庶幾法制有立綱紀再振則宗社靈長天下蒙福一曰眀黜陟臣觀書曰三載考績三考黜陟幽眀然堯舜之朝建官至少尚乃九載一遷必求成績而天下大化百世之後仰為帝範我祖宗朝文武百官皆無磨勘之例唯政能可旌者擢以不次無所稱者至老不遷故人人自勵以求績效今文資三年一遷武職五年一遷謂之磨勘不限內外不問勞逸賢不肖並進此豈堯舜黜陟幽眀之意耶假如庶僚中有一賢於衆者理一郡縣領一務局思興利去害而稍有為也衆皆指為生事必嫉之沮之非之笑之稍有差失隨而擠陷故不肖者素餐尸祿安然而莫有為也雖愚暗鄙猥人莫齒之而三年一遷坐至卿監丞郎者厯厯皆是誰肯為陛下興公家之利救生民之病去政事之弊葺綱紀之壞哉利而不興則國虛病而不救則民怨弊而不去則小人得志壞而不葺則王者失權賢不肖渾淆請託僥幸遷易不已中外茍且百事隨廢生民久苦羣盜漸起勞陛下旰昃之憂者豈非官失其政而致其危耶至若在京有司金穀浩瀚權勢子弟長為占據有虛食廩祿待闕一二年者暨臨事局挾以勢力豈有恪恭其職使祖宗根本之地綱紀日隳故在京官司有一員闕則爭奪者數人其外任京朝官則有私居待闕動踰嵗時往往到職之初便該磨勘無一勤效例蒙遷改此則人人因循不復奮勵之由也臣請特降詔書今後兩地臣僚有大功大善則特加爵命無大功大善更不非時進秩其理狀循常而出者祇守本官不得更帶美職應京朝官在臺省館閣職任在審刑大理寺開封府兩赤縣國子監諸王府并因保舉及選差監在京重難庫務者並須在任三周年即與磨勘若因陳乞并於中書審官院願求在京差遣者與保舉選任不同並須幹當通計及五周年方得磨勘如此則權勢子弟肯就外任各知艱難亦有後來之人因此植立可以進用如今日已前受在京差遣已幹當者且依舊日年限磨勘其未曽交割幹當却求外任者並聽其外任京朝官到職幹當及三年者與磨勘內前任幹當年月日其公程日限并非因陳乞而移任在道月日及升朝官在京月日並令通計其逺官近地勞逸不同并在假待闕及公程及住滯或因公事非時移替在道月日委有司别行定奪聞奏如任內有私罪并公罪徒巳上者至該磨勘日具情理輕重别取進止其庶寮中有髙才異行多所薦論或異略嘉謀為上信納者自有特恩進改非磨勘之可滯也又外任善政著聞有補風化或纍訟之獄能辨寃沈或五次推勘人無翻訟或勸課農桑大獲美利或京城庫務能革大弊惜費巨萬者仰本轄保眀聞奏下尚書省集議為衆所許則列狀上聞並與改官不隔磨勘或有異同各以所執取旨出於聖斷仍請詔下審官院流內銓尚書考功應京朝官選人逐任得替眀具較定考績結罪聞奏內有事狀猥濫并老疾愚昧之人不堪理民者别取進止已上磨勘考績條件該説不盡者有司比類上聞如此則因循者拘考績之限特達者加不次之賞然後天下公家之利必興生民之病必救政事之弊必去綱紀之壞必葺人人自勸天下興治則前王之業祖宗之權復振於陛下之手矣其武臣磨勘年限委樞密院比附文資定奪聞奏二曰抑僥幸臣聞先王賞延於世諸侯有世子襲國公卿以德而任有襲爵者春秋譏之及漢之公卿有封爵而殁立一子為後者未聞餘子皆有爵命其次寵待大臣賜一子官者有之未聞每嵗有自薦其子弟者祖宗之朝亦不過此自真宗皇帝以太平之樂與臣下共慶恩意漸廣大兩省至知雜御史以上每遇南郊并聖節各奏子充京官少卿監奏一子充試銜其正郎帶職員外郎并諸路提點刑獄以上差遣者每遇南郊奏一子充齋郎其大兩省等官既奏得子充京官眀異於庶僚大示區别復更每嵗奏薦積成冗官假有任學士以上官經二十年者則一家兄弟子孫出京官二十人仍接次升朝此濫進之樞極也今百姓貧困冗官至多授任既輕政事不舉俸祿既廣刻剝不暇審官院常患充塞無闕可補臣請特降詔書今後兩府并兩省官等遇大禮許奏一子充京官如奏弟姪骨肉即與試銜外每年聖節更不得陳乞如别有勳勞著聞中外非時賜一子官者繫自聖恩其轉運使及邊任文臣初除授後合奏得子弟身事者並候到任三年無遺闕方許陳乞如三年內非次移改者即許通計三年陳乞三司副使知雜御史少卿監以上並同兩省遇大禮各奏薦子孫其正郎帶職員外郎并省府推判官外任提點刑獄以上遇大禮合該奏薦子孫者須是在任及二周年方得陳乞已上有該説不盡者委有司比類聞奏如此則內外朝臣各務久於其職不為茍且之政兼抑躁動之心亦免子弟充塞銓曹與寒畯爭路輕忽郡縣使生民受弊其武臣入邊上差遣并大禮合奏薦子弟者乞下樞密院詳定比類聞奏又國家開文館延天下英才使之直祕庭覽羣書以待顧問以養器業為大用之備今乃登進士髙第者一任才罷不以能否例得召試而補之兩府兩省子弟親戚不以賢不肖輒自陳乞館閣職事者亦得進補太宗皇帝建崇文院祕閣自書碑文重天下賢才也陛下當思祖宗之意不宜輕之臣請特降詔書今後進士三人內及第者一任回日許進干教化經術文字十軸下兩制看詳作五等品第中第一第二等者即賜召試試又優等即補館閣職事兩府兩省子弟並不得陳乞館閣職事及讀書之類御史臺書一時彈劾并諫院論奏如館閣闕人即委兩地舉文有古道才堪大用之士連名同舉并兩制列書表章稱薦以充其職如此則館閣職事更不輕授足以起朝廷之風采紹祖宗之本意副陛下遴選矣三曰精貢舉臣謹按周禮鄊大夫之職各教其所治三年一大比考其德行道藝乃獻賢能之書於王賢謂有德行能謂有道藝王再拜受之登於天府天府太廟之寶藏也蓋言王者舉賢能所以上安宗社故拜受其名藏於廟中以重其事也鄉大夫之職廢既久矣今諸道學校如得名師尚可教人六經傳治國治人之道而國家乃專以辭賦取進士以墨義取諸科士皆捨大方而趨小道雖濟濟盈庭求有才有識者十無一二况天下危困乏人如此將何以救之乎教以經濟之業取以經濟之才庶可救其不逮或謂救弊之術無乃後時臣謂四海尚全朝謀而夕行庶乎可濟安得晏然不救坐俟其亂哉臣請諸路州郡有學校處奏舉通經有道之士專於教授務在興行其取士之科即依賈昌朝等起請進士先策論而後詩賦諸科墨義之外更通經旨使人不專辭藻必眀理道則天下講學必興浮薄知勸此最為至要近歐陽修蔡襄更乞逐場去留貴文卷少而考較精臣謂盡令逐場去留則恐舊人扞格不能創習䇿論亦不能旋通經旨皆憂棄遺别無進路臣請進士舊人三舉已上者先䇿論而後詩賦許將三場文卷通考互取其長兩舉者皆是少年足以進學請逐場去留諸科中有通經旨者至終場别問經旨十道如不能命辭而對則於知舉官員前講説七通者為合格不會經旨者三舉已上即逐場所對墨義依自來通粗施行兩舉初舉者至於終場日須八通者為合格又外郡解發進士諸科人本鄉舉里選之式必先考其履行然後取以藝業今乃不求履行唯以詞藻墨義取之加用封彌不見姓字實非鄉里舉選之本意也又南省考試舉人一場試詩賦一場試䇿人皆精意盡其所能復考較日久實少舛謬及御試之日詩賦文論共為一場既聲病所拘意思不逺或音韻中一字有差雖生平苦辛即時擯逐如音韻不失雖末學淺近俯拾科級既鄉舉之處不考履行又御試之日更拘聲病以此士之進退多言命運而不言行業眀君在上固當使人以行業而進而乃言命運者是善惡不辨而歸諸天也豈國家之美事哉臣請重定外郡發解條約須是履行無惡藝業及等者方得解薦更不封彌試卷其南省考試之人已經本鄉詢考履行却須封彌試卷精考藝業定奪等第進入御前選官覆考重定等第訖然後開看南省所定等第內合同姓名偶有髙下者更不移改若等第不同者人數必少却加封彌更宜兩地參較然後御前放榜此為至當內三人已上即於髙等人中選擇聖意取放其考較進士以䇿論髙詞賦次者為優等䇿論平詞賦優者為次等諸科經旨通者為優等墨義通者為次等已上進士諸科並以優等及第者放選注官次等者守本科選限自唐以來及第人皆守選限國家以收復諸國郡邑乏官其新及第人權與放選注官今來選人壅塞宜有改革又足以勸學使其知聖人治身之道則國家得人百姓受賜四曰擇官長臣聞先王建侯以共理天下今之刺史縣令即古之諸侯一方舒慘百姓休戚實係其人故厯代盛眀之時必重此任今乃不問賢愚不較能否纍以資考升為方面懦弱者不能檢吏得以蠹民強幹者唯是近名率多害物邦家之本由此凋殘朝廷雖至憂勤天下何以蘇息其轉運使并提點刑獄按察列城當得賢於衆者臣請特降詔書委中書樞密院且各選轉運使提點刑獄共十人大藩知州十人委兩制共舉知州十人三司副使判官同舉知州五人御史臺中丞知雜三院共舉知州五人開封知府推官共舉知州五人逐路轉運使提點刑獄按察列城各同舉知縣縣令共十人逐州知州通判同舉知縣縣令共二人得前件所舉之人舉主多者先次差補仍指揮審官院流內銓今日以後所差知州知縣縣令並具合入各人歷任功過舉主人數聞奏委中書看詳委得允當然後引對如此舉擇則諸道官吏庶幾得人為陛下愛惜百姓均其徭役寬其賦斂各獲安寧不召禍亂天下幸甚五曰均公田臣聞易曰天地養萬物聖人養賢以及萬民此言聖人養民之時必先養賢養賢之方必先厚祿祿厚然後可以責亷隅安職業也皇朝之初承五代亂離之後民庶凋弊時物至賤暨諸國收復天下郡縣之官少人除補至有經五七年不替罷者或才罷去便入見闕當物價至賤之時俸祿不輟士人之家無不自足咸平已後民庶漸繁時物遂貴入仕門多得官者衆至有替後守選一二年又授官待闕一二年者在天下物貴之後而俸祿不繼士人家鮮不窮窘男不得婚女不得嫁喪不得葬者比比有之復於守選行闕之日衣食不定貸債以茍朝夕到官之後至有冒法受贓賖貸度日或不恥賈販與民爭利既為負罪之人不守名節吏有姦贓而不敢發民有豪猾而不敢制姦吏豪民得以侵暴於是貧弱百姓理不得直寃不得訴搖役不均刑罰不正比屋受弊無可奈何由乎制祿之方有所未至真宗皇帝思深慮逺復前代職田之制使中常之士自可守節婚嫁以時喪葬以禮皆國恩也能守節者始可制姦贓之吏鎮豪猾之人法乃不私民則無枉近日屢有臣寮乞罷職田以其有不均之謗有侵民之害臣謂職田本欲養賢緣而侵民者有矣比之衣食不足壞其名節不能奉法以直為枉以枉為直衆怨思亂而天下受弊豈止職田之害耶又自古常患百官重內而輕外唐外官月俸尤更豐足簿尉俸錢尚二十貫今窘於財用未暇增復臣請兩地同議外官職田有不均者均之有未給者給之使其衣食得足婚嫁喪葬之禮不廢然後可以責其廉節督其善政有不法者可廢可誅且使英俊之流樂於為郡邑之任則百姓受賜又將來升擢多得曽經郡縣之人深悉民隱亦致化之本也惟聖慈深察天下幸甚六曰厚農桑臣觀書曰德惟善政政在養民此言聖人之德惟在善政善政之要惟在養民養民之政必先務農農政既修則衣食足衣食足則愛膚體愛膚體則畏刑罰畏刑罰則盜冦自息禍亂不興是聖人之德發於善政天下之化起於農桑故詩有七月之篇陳王業也今國家不務農桑粟帛常貴江浙諸路嵗糴米二百萬石其所糴之價與輦運之費每嵗共用錢三百餘萬貫文又貧弱之民困於賦斂嵗伐桑棗鬻而為薪勸課之方有名無實故粟帛常貴府庫日虛此而不謀將何以濟臣於天下農利之中粗舉二三以言之且如五代羣雄爭霸之時本國嵗飢則乞糴於鄰國故各興農利自至豐足江南舊有墟田每一墟方數十里如大城中有河渠外有門閘旱則開閘引江水之利潦則閉閘拒江水之害旱潦不及為農美利又浙西地卑常苦水沴雖有溝河可以通海唯時開導則潮泥不得而堙之雖有堤塘可以禦患唯時修固則無摧壞臣知蘇州日點檢簿書一州之目田係出稅者三萬四千頃中稔之利每畝得米二石至三石計出米七百餘萬石東南每嵗上供之數六百萬石乃一州所出臣詢訪髙年則云曩時兩浙未歸朝廷蘇州有營田軍四都共七八千人專為田事導河築堤以減水患于時民間錢五十文糴白米一碩自皇朝一統江南不稔則取之浙右浙右不稔則取之淮南故慢於農政不復修舉江南墟田浙西河塘大半隳失東南之大利今江浙之米石不下六七百文足至一貫文省比於當時其貴十倍而民不得不困國不得不虛矣又京西路有卑濕積潦之地旱年國家特令開渠決之開決之後水患大減今罷役數年久已堙塞復將為患臣請每嵗之秋降敕下諸路轉運司令轄下州軍吏民各言農桑之間可興之利可去之害或合開河渠或築堤堰陂塘之類並委本州軍選官計定工料每嵗於二月間興役半月而罷仍具功績聞奏如此不絶數年之間農利大興下少飢嵗上無貴糴則東南嵗糴輦運之費大可減省勸課之法宜選官討論古制取其簡約易從之術頒賜諸路轉運使及面賜一本付新授知州知縣縣令等此養民之政富國之本也七曰修武備臣聞古者天子六軍以寧邦國唐初京師置十六將軍官屬亦六軍之義也諸道則開折衝果毅五百七十四府以儲兵伍每嵗三時耕稼一時習武自貞觀至於開元百三十年戎臣兵伍無一逆亂至開元末聽匪人之言遂罷府兵唐衰兵伍皆市井之徒無禮義之教無忠信之心驕蹇凶逆至於喪亡我祖宗以來罷諸侯權聚兵京師衣糧賜賞豐足經八十年矣雖已困生靈虛府庫而難於改作者所以重京師也今北疆為梗邊備未撤京師衛兵又多逺戍或有倉卒輦轂無備此大可憂也逺戍者防邊陲之患或緩急抽還則外禦不嚴戎狄追奔便可直趨關輔新招者聚市井之輩而輕囂易動或財力一屈請給不充則必散為羣盜今生民巳困無可誅求或連年凶飢將何以濟贍軍之䇿可不預圖若因循過時臣恐急難之際宗社可憂臣請密委兩地以京畿見在軍州同議有無闕數如六軍未整須議置兵則約唐之法先於畿內并近輔州府召募強壯之人充京畿衛士得五萬人以助正兵足為疆盛使三時務農省給贍之費一時教戰可防虞外患其召募之法并將校次第並先密切定奪聞奏此實強兵節財之要也候京畿近輔召募衛兵巳成次第然後諸道倣此漸可施行惟聖慈留意八曰減徭役臣聞漢光武建武六年詔曰夫張官置吏所以為人也今戶口耗少而縣官吏職所置尚繁其令司隸州牧各實所部減省吏員縣國不足置長吏可并合者上大司徒大司空二府於是條奏并省四百餘縣天下至治臣又觀西京圖經唐會昌中河南府有戶十九萬四千七百餘戶置二十縣今河南府主客户七萬五千九百餘户仍置一十九縣主户五萬七百客户二萬五千二百鞏縣七百户偃師一千一百户逐縣三等而堪役者不過百家所供役人不下二百數新舊循環鰥寡孤獨不能無役西路之民最為窮困臣請因後漢故事遣使先往西京併諸邑為十縣其所廢之邑並改為鎮令本路舉文資一員董榷酤關征之利兼煙火公事所廢公人除歸農外有願居公門者送所存之邑其所存邑中役人却可減省歸農則兩不失所候西京併省稍成倫序則行於大名府然後遣使諸道依此施行仍先指揮諸道防團州已下有使州兩院者皆為一院公人願去者各放歸農職官廳可給本城兵士七人至十人替人力歸農其鄉村耆保地里近者亦令併合能併一保亦減役十餘户但少徭役人自耕作可期富庶九曰覃恩信臣竊覩國家三年一郊天子齋戒衮冕謁見宗廟乃覲上帝大禮既成還御端門肆赦天下曰赦書日行五百里敢以赦前事言者以其罪罪之欲其王澤及物之速也如此今大赦每降天下歡呼一兩月間錢穀司有督責如舊桎梏老幼籍沒家産至於寬賦斂減徭役存恤孤貧振舉滯淹之事未嘗施行使天子及民之意盡成空言有負聖心損傷和氣臣請特降詔書今後赦書內宣布恩澤有所施行而三司轉運司州縣不切遵稟者並從違制徒二年斷情重者當行刺配應天禧年以前天下欠負不問有無侵欺盜用並與除放違者仰御史臺提點刑獄司常切覺察糾劾無令壅遏臣又聞易曰先王以省方觀民設教故有巡狩之禮今不可復行而民隱無窮天聽甚逺臣請降詔中書今後每遇南郊赦後精選臣寮往諸路安撫察官吏能否求百姓疾苦使赦書中所及民事一一施行天下百姓莫不幸甚十曰重命令臣聞書曰慎乃出令令出惟行準律文諸被制書有所施行而違者徒二年失錯者杖一百又監臨主司受財而枉法者十五匹絞蓋先王重其法令使無敢動搖將以行天下之政也今覩國家每降宣敕條貫煩而無信輕而弗稟上失其威下受其弊蓋由朝廷采百官起請率爾頒行既昧經常即時更改此煩而無信之驗矣又海行條貫雖是故違皆從失坐全乖律意致壞大法此輕而弗稟之甚矣臣請特降詔書今後百官起請條貫令中書樞密看詳會議必可經久方得施行如事干刑名者更於審刑大理寺究明會法律官員參詳起請之詞刪去繁冗裁為制敕然後頒行天下必期遵守其衝改條貫並令繳納免致錯亂誤有施行仍望别降敕命今後逐處當職官吏親被制書及到職後所受條貫敢故違者不以海行並從違制徒二年未到職已前所降條貫失於檢用情非故違者並從本條失錯斷杖一百餘人犯海行條貫不指定違制刑名者從失坐若條貫差失於事有害逐處長吏别見機會須至便宜而行者並須具緣由聞奏委中書樞密院詳察如合理道即與放罪仍便相度别從更改慶厯三年九月上時為參知政事特降詔督促又開天章閣召對賜坐給筆札使疏于前仲淹與富弼皆皇恐避席退而列上此奏時上方信嚮仲淹等稱述其説當著為令者皆以詔書畫一次第頒下獨府兵輔臣共以為不可而止上仁宗答詔條畫時務曽公亮臣今月十六日面奉御札曰朕承祖宗大業賴文武良臣夙夜兢兢期底於治間者西陲禦備天下驛騷趣募冗兵急調軍食雖常賦有增而經用不給纍嵗於兹公私匱乏加以承平寖久仕進多門人浮政濫員多闕少滋長奔競縻費廩祿又牧守之職以惠綏吾民而罕聞奏最將帥之任以威伏四夷而艱於稱職豈制度未立不能變通於時邪豈簡擢靡臻不能勸勵於下邪西北多故敵態難常獻竒譎空言者多陳悠久實效者少備豫不虞理當先物朕思濟此急務罔知所從以卿碩望故兹訪逮躬佇條畫臣才識淺陋仰膺聖問謹昧死條對上進一伏覩詔書謂間者西陲禦備天下驛騷趣募冗兵急調軍食雖常賦有增而經用不給纍嵗於兹公私匱乏此實方今之先務也臣竊謂國家經用不給者非有他焉由冗兵之所耗食也朝廷所以未能斥減者豈不為沿邊三路尚須屯戍疆塞廣袤用之猶且不足乎臣計今疆塞未多於建隆開寶之年是時外捍夷狄內有河東西蜀江南嶺南之戍而所蓄禁兵止十二萬而已至乾德中兩川江嶺已平則又減二萬太宗盡有天下所添之兵才三十餘萬真宗初年亦止三十八萬至乾興中始及八十餘萬以此知兵少則訓習齊一所向無敵兵多則雜冗難齊所施寡效其理甚眀也今乃自慶歷以來既廣招募又升廂軍為禁軍凡總一百餘萬然而用之罕聞成功者非獨將佐之不武由所用之卒不精爾不精之由無他在乎多而不得齊一也而况廣費廪給竭天下之財力可不深慮乎臣以謂事已久定非可旦暮措置須用數年圖之可籍見兵之數專委信臣精加選擇取力伉健軼羣超等一夫可以敵二三者别為部伍俾如太宗及真宗初年三十八萬之數改立名額練為精卒付於善將後有亡逸亦用此格招填使之捍邊是用精良之少而代疲冗之多安得不足也而况二宗之制未逺哉其餘疲軟老耄則散屯東南闕兵之郡就食賤穀有亡逸者更不招補數年之內十必減四十年之內必可消弭不唯減天下之蠧耗實亦得精兵以為用也方今二虜衰弱兵械休息朝廷不速圖之則臣恐小有水旱糧餉微梗則陛下焦心旰食於上矣圖之實宜早焉若舍此為計是皆迂論臣又竊聞宣毅兵久為東南之弊料上封者言之多矣况南方小郡有舉城無二三千户者乃置禁兵數百坐食膏血官不得人往往為患自昔祖宗之制東南諸州唯迭遣廂軍屯駐至於藩鎮則量加禁兵駐泊以為旁郡式遏行之甚久頗適事要止從慶歷之初創置此兵今諸路轉運供億艱苦逺郡官吏憚於統制臣以謂除京東西路外其餘諸路悉可罷廢揀入别軍其老弱者令入本城役作唯一路藩鎮許揀留千人依舊教閲以鎮遏旁郡此又減費弭患之一端也臣仍願自今置廢興作須樞臣熟議毋得不問財賦而專有添創如慶歷初年之失臣伏聞祖宗舊制三司每季供糧草文帳一本赴樞密院夫樞密不主財賦而使供帳者是欲置廢兵馬常使與芻糧照對也往嵗樞臣不練事體稱糧草本屬中書密院供帳久為間冗乞自今罷之則知樞密總兵自來罕問糧草之有無如此謀國豈天下取安之計也今聖慮軫及中外大幸願陛下畢舉而行之使太平可致也一伏覩詔書謂承平寖久仕進多門人浮政濫員多闕少滋長奔競縻費廪祿此誠方今之大患也臣不敢逺引前代請以唐制眀之貞觀中太宗平定天下創立法度是時文武定員唯六百四十三員天下不為不治法度不聞不立也至永徽神龍中方內已寧朝綱已備髙宗不能遵守太宗之業遂容濫官於員之外既置員外員外之上又置同正及武后亂政又增置員外官二千餘員是時朝廷益多事綱紀益隳壞官之繁簡蓋利害眀矣臣且聞景祐中審官三班流內銓吏員之數已多於祥符景德之日今則比方景祐中又多一倍臣嘗原之蓋由寶元以來陜西用兵或獻方略或陳武伎或因邊臣薦引自經略部管已下每出並奏命有司胥吏諸班人權授管部或以微勞録用擢軍班之材勇開進納之恩限所以三班餘曹官倍景祐之數也又如崇班已上謂之內朝臣祖宗所置本無數年磨勘之制多因功績乃與遷轉止因朝廷宰相寡謀啓此僥幸諸司使額遂為殽雜也故臣之冗基自京官按真宗朝銓司磨勘選人每甲止見一員一月不過三四甲亦無逐甲皆轉是一月之內轉是官者一二而已率皆考任已多績狀可取始被此選近嵗每間日見磨勘選人一員二年已來改為數日一見每見五員盡得改轉甫及三載又升朝序故審官員闕漸見不足差擬此審官三班銓曹之蠧根也夫古之職官則今之差遣職任是也皆居有曹局局有員數固不可得而多也陛下若欲鑒纍世之失大有改為臣請自三省官及橫行諸使已下並按舊典議定員數如御史臺官是也於舊員之外量數加置以備出使員額之外一不許置有勞當擢者但容遇闕先補唯軍功重任始得越此遷轉立制既定雖有近幸僥踰亦無由進矣陛下若重於改作但薄欲懲創則臣請自今應進納人直除七品上佐官不令蒞事廢方略之舉臣寮保薦弟姪者他日犯罪與同罪舉官之例諸司禁補額外正名大臣不得奏任門客常從限邊臣之薦引汰賞功之泛濫每嵗經學之選素未精核不通義理止誦空文施於政事實非有益請用慶歷四年張方平等重定貢舉條約則濫進者少矣諸司人吏在地司司農糧料兵部之類本無異勞而例得遷資減選請一切罷之則選限有常矣如此則入流之路稍隘也至若銓司引見之式樞密三班磨勘之例祖宗舊制可以復行如此則朝行之內亦不數年員闕可以相當矣其或普加澄汰廣欲去留奪其見官恐未可亟行於兹日也唯此末議庶幾無損一伏覩詔旨謂牧守之職以惠綏吾民而罕聞奏最臣伏思之由選之不精遇之不重勸之不至而使然也何以言之今審官差擇知州無問賢拙但考深資至則授焉故弛慢者有之耄老者有之病廢者有之姦贓者有之此選之不精者也又如朝廷重內輕外寖成風體遂使縉紳之流稀肯以州任為貴夫州郡古二千石之職也今雖自京府推官而往亦視為左遷凡臺閣不勝其任則授郡以遣去故能臣幹吏多在錢穀刑獄之任以仕不脫知州為恥此遇之不重者也及其居官為政茍有善狀上不過提刑轉運一發薦啓幸朝廷用之則止於付審官記姓名而已卒未聞政有善譽而朝廷一加遷拜此勸之不至者也古者天子擇宰相宰相擇羣吏臣請自今審官擇知州皆引詣中書詢察然後擬奏昔兩漢時郡守乃與九卿令僕迭相出入其政理尤異至有直拜三公者今願峻其等威如漢故事使雜流不得妄入則賢者樂居其職矣商書曰德懋懋官功懋懋賞雖堯舜三代羣臣猶須官賞以勸立德功而况今人哉臣請别立典州考課之等委監司采察三考有善政者則升其官資兩任有善政者則升其任使顯無狀者則罷黜之庶幾可以副陛下憂民之意也一伏覩詔旨將帥之任所以威服四夷而罕聞稱職臣嘗觀太祖太宗之時征伐海內建威定亂或太平於十九年之中將帥得人固可知矣唯自咸平已來真宗嘗與陳堯叟馬知節共論將帥之難得至於今日陛下復以將不稱職為憂豈天下之人獨生才哲於建隆興國之間而咸平以來逮今五十餘年絶然無一臣之能繼乎是必不然也臣慮選之未得其要或用之不盡其才爾軍志曰三試然後授事是欲先視其才實然後任之以事昔趙奢與子括論兵奢不能屈退而歎曰兵危事也括易言之用之必敗李靖為將似不能言則知將之才能其難知也如此臣昨見陜西用人固未聞朝廷有試以實效者如趙珣因上圖説便委萬兵之任卒至於敗臣所以慮選之未得其要者皆此類也其次雖得善將而任之不盡其才何哉恭以太祖太宗之朝軍政巳講廟堂之宰練知兵體故帥臣之進一言畫一計利病用捨雖從中覆及其畫奏報下無不適其事機將之有材可以竭盡矣咸平而後守文偃革大臣當柄者罕厯邊務故帥臣進一言畫一計尚如祖宗之時利病用舍悉從中覆及其畫奏報下茍一事不適機要則將有不得盡其才慮者矣望其立功何可得哉故咸平逮今乏善將者其弊未必不由此也孫子曰不知三軍之事而同三軍之政則軍士惑矣不其信哉方今二邊不警朝廷得以講備臣請自今擇將未加遷擢必先試以行陳疆場之事所試有效至於三四始與顯官厚祿以重其任然後委其命而勿制用其言而勿疑此孫子所謂將能而君不御者勝是也一伏覩詔旨謂西北多故敵態難常獻竒譎空言者多陳悠久實效者少備豫不虞理當先物此蓋陛下得安不忘危有偹無患之深旨也臣伏思朝廷北有契丹西有拓跋二邊講備為日久矣今北寇之勢纍年孱弱向欲報仇夏臺猶不能舉矧肯捨嵗入之厚利而輕犯中國也雖豺虎之性難以保信料勢利束之當不能動也况今大河之北重兵列戍已有藩籬之固矣西夏新有巨釁君少國疑料其衆心猶懼大國之見絶豈遑自出為盜也四路見兵備之有餘矣臣以謂朝廷方今之慮不在二寇而在山東河北之地刀鋸之慘人心尚危小有水旱姦凶必乘為寇宜常得要官才吏以分鎮要州庶幾可以消患於未萌也右臣祇奉聖問條對如右識慮暗淺塵冒天聽慶歷八年三月上時知制誥宋名臣奏議卷一百四十七
