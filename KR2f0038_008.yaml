body:
  text: 宋名臣奏議卷八宋趙汝愚編君道門政體上太宗乞體貌大臣簡略細務張觀臣憑藉光寵備位風憲每遇百官起居日分立于庭司察不如儀者舉奏之因見陛下天慈優容多與近臣論政德音往復頗亦煩勞至于有司職官承意將順簿書叢脞咸以上聞豈徒褻瀆至尊實以輕紊國體况帝王之道動則左史書之言則右史書之列於緗素垂為軌範不可不謹也若夫方今之急者胸奴未滅邊鄙猶聳陰陽未序倉廩猶虛淳朴未還奢風尚熾縣道未治逋逃尚多刑法未措禁令猶密墜典未復封祀猶闕凡此數者朝廷之急務也誠願陛下聽斷之暇宴息之餘體貌大臣與之商榷使沃心造膝極意論思則治體化源何所不至臣又嘗讀唐史見貞觀初始置崇文館命學士耆儒更直互進聽朝之隙則引入內殿講論文義商確時政或日旰忘倦或宵分始罷書諸信史垂為不朽况陛下左右前後皆端士偉人幸望端拱凝旒回視反聽釋尋常之務養浩然之氣深詔近位闡揚真風上為祖宗播無疆之休下為子孫建不拔之業自然成康文景不獨專美於昔時堯舜禹湯自可追蹤於今日與夫較量金穀剖析毫釐以有限之光陰役無涯之細務者安可同年而語哉淳化二年正月上時為監察御史上仁宗論治必有為而後無為文彥博臣頃因奏事親聞德音謂古稱無為而治者必當先有為而致無為臣雖即時仰對曰虞舜垂衣而治者亦皆先有為而致無為誠如聖意臣退而伏思曰陛下有堯舜求治之心而臣愚無臯夔致君之術夙夕悚懼啓處不遑又以奏對之際蹇訥未周謹尋前典所述虞舜之德著於簡牘仰塵鑒觀庶幾愚忠上裨聖政仲尼曰無為而治者其舜也歟夫何為哉恭已正南面而已先儒之解以為任官得其人故無為而治考於虞書則舜之始也流共工於幽州以其心很貌恭足以惑世也放歡兜於崇山以其掩義隱賊黨於共工也竄三苖於三危以其貪冒食貨崇侈不才也殛鯀于羽山以其頑囂傲狠治水無功也四罪而天下咸服兹所謂去邪不疑而罰當其罪也於是詢四嶽以謀政治闢四門以求衆賢明四目達四聰以廣視聽於天下命禹作司空以平水土棄為后稷以播百榖契作司徒以敷五教臯陶作士以典五刑垂作共工益作朕虞伯夷作秩宗以典三禮夔典樂以教胄子龍作納言出納朕命惟允既命以官因戒敕之曰各恭其職乃能立天下之功然後三載考績三考黜陟幽明庶績咸熙兹所謂任賢勿二而官得其人也夫明四目達四聰去四凶命庶官其勤至矣得不謂之先有為乎及夫庶績熙天下服垂衣裳正南面而已得不謂之後無為乎臣究觀前史之載舜之至德也有大功二十舉十六相去四凶也十六相謂八元八凱稷契臯夔之倫去四凶則朝廷無姦邪之黨舉十六相則左右皆賢哲之輔如是而天下不治者未之有也故後世聖帝明王莫不勞於求賢而逸於致治勞於求賢則先有為也逸於致治則後無為也恭以陛下紹祖宗之丕基行堯舜之至化黜邪逺佞去四凶之志也求賢審官舉十六相之意也然而一日萬務尚勞宵旰兹乃臣愚不稱職之效也臣以為方今之務正在謹守祖宗之成法使爵賞刑罰不失其當矣爵賞當則姦邪無功者不敢僥幸而希進刑罰當則貴近有罪者不敢請求而茍免紀綱正而朝廷尊號令行而天下服如此則陛下髙拱穆清之中無為無事而與堯舜比隆下視三代之盛矣皇祐元年上時為集賢相上仁宗論不宜下行有司事范鎮臣伏見三司開封府居常以明有條貫事作情理輕重上殿進呈及進入取旨又諸司事有叢脞微細者並皆奏聞乃是陛下以天子之尊下行三司使及開封知府與諸司事皆有司不能任責以至上煩聖慮非惟上煩聖慮又失為政之要而虧損國體伏乞旨揮今後三司開封府公事內有情理輕者聽便宜行遣諸司事內有無條貫須至申明者許申都堂委大臣參詳處分所貴責歸有司不至煩瀆聖慮而盡為政之體要嘉祐元年正月上時知諫院上英宗論政要在擇人賞善罰惡司馬光臣聞舜與臯陶賡歌相戒以明良為美以叢脞為非蓋以王者奄有四海君臨億兆若事無巨細皆以身親之則所得至寡所失至多矣古語有之曰察目睫者不能見百步察百步者亦不能見目睫非不欲兼之勢不可也是以明王總其大體執其樞要精選賢能任以百職有功者賞有罪者誅故處躬不勞而收功甚大用此道也臣伏見陛下自親政以來厲精求治孳孳不倦未明求衣日昃不食雖大禹之勤勞文王之懿恭無以過此然而政有本末事有細大舉其綱則萬目張挈其領則衆毛理臣願陛下先其本後其末急其大緩其細擇人而任之此政之本也賞善而罰惡此事之大也陛下當先察羣臣之邪正與其材能之所堪然後思天下有某事不治者當使某人治之其公忠勤恪功效顯著者勸之以厚賞姦回惰慢無功敗事者威之以嚴刑如是則萬事無不舉兆民無不安陛下可以髙拱無為而名配堯舜矣至於簿書之煩碎文法之微密錢穀之出納體例之有無此乃羣臣百吏之所守非陛下所當留意也陛下若捨彼而取此則臣恐徒有大禹之勤勞而不獲其功文王之懿恭而不見其治也臣之獻替為職遇陛下勤政之初虛心求諫此乃千載一時不敢以細末之事煩汙聰明伏望陛下深思此道乃自古及今致治之大本勿以為迂闊陳熟之言而忽之則天下幸甚治平元年七月上時以天章閣待制知諫院上仁宗論人君之職不當詳察細務司馬光臣聞臯陶贊於舜曰元首明哉股肱良哉庶事康哉蓋言人君明則百官得其人百官得其人則衆事無不美也又曰元首叢脞哉股肱惰哉萬事隳哉蓋言人君細碎無大略則羣臣不盡力羣臣不盡力則萬事皆廢壞也此二者治亂之至要也荀子曰明主好要暗主好詳明主好要則百事詳暗主好詳則百事荒故為人君者自有職事固不當詳察細務也然則人君之職謂何臣愚以為量材而授官一也度功而加賞二也審罪而行罰三也材有長短故官有能否功有髙下故賞有厚薄罪有小大故罰有輕重此三者人君所當用心其餘皆不足言也臣伏見國家舊制百官細事如三司鞭一胥史開封府補一廂鎮之類往往皆奏聞崇政殿所引公事有軍人武藝國馬芻秣之類皆一一躬親閲視此蓋國初艱難權時之制施於今日頗傷煩碎陛下龍興撫運聖政惟新臣愚以為宜令中書樞密院檢詳中外百司自來公事須申奏取㫖及後殿所引公事其間不繫大體非人君所宜身親者悉從簡省委之有司陛下養性安身以專念人君之三職足以法天地之易簡致虞舜之無為誠天下幸甚治平四年上時為御史中丞上神宗論所急者近效所勤者小數孫覺臣近陳愚欵願陛下時御便殿召大臣或從官各以其類數人偕進侍坐以講求治道因定國是興太平之功臣竊計陛下日力且不足矣何則陛下御前殿復御後殿退則覽中外章奏而可否之往往至於暮夜大禹勤儉文王日昃不遑暇食亦何以過此臣愚竊以謂此所急者近效所勤者小數而於逺圖或有所遺大道或有所蔽也上下因循其弊之積乃至於此臣聞祖宗之時躬於便殿臨試士伍短長之技角馬足之疾徐觀器械之精苦事出於權宜且一時之制也今天下承平百年紀綱法度有所未備顧但守祖宗一切之法而不知變則何以異於膠柱鼓瑟刻舟求劍哉臣以為若軍頭引見殿前司公事日至於便殿者可悉付之殿前司而責其課中外章奏有不足以煩聖覽者可令執政一人從官二人取奏目閲視凡可以付有司使之任責者不必悉奏也蓋古者致治必皆品式章程全具周密事出於有司非人主所宜親者一切付之而已以歲月考其成而加誅賞焉今有司無式可守故雖至細至易有司所宜任者亦須聖旨而後行尊者反任其煩卑者反任其簡紀綱倒錯未有甚於此者也臣願陛下詔有司約取唐式著本朝式一編付之有司永永遵用有不如式者以法從事如此陛下日力有餘矣及其閒暇以與大臣從官講求治道按夫先後本末而行之則至治不難成衆務不難舉矣熙寧元年五月上時為右正言供諫職上神宗論親決庶政范純仁臣伏見陛下即位以來孜孜求治親決庶政日煩聖謨萬乘增宵旰之勤羣下負尸素之責君勞臣逸顛倒衣裳異天德不言而成虧聖人無為之治又况人主詔令當務簡而必行萬幾之多寧免一失先有司則不容差謬當職者得以糾繩出上意則事關綸言為臣者難於輕議行之寖久益少損多蓋夫尊者當領其要卑者當任其詳尊卑之殊其職亦異盡心謹職督察細事者有司之職也經國阜民選賢任官者宰相之職也容載如天地廣大如江河巍巍蕩蕩無得而名者王者之德也以卑僭尊則不恭而失職以上逼下則太察而勞神故易稱黃帝堯舜曰垂衣裳而天下治又孔子稱堯舜曰惟天為大惟堯則之詩稱文王曰不識不知順帝之則是皆簡易博大無思無為之明效也惟聖心稽而行之易若反掌伏望陛下察虞舜叢脞之戒思老氏清淨之言潛晦聰明頥養聖慮擇宰司而委以萬務謹庶長而責其成功廣聽納以導羣情察邇言而安庶政大臣無不以之怨多士懷得職之喜愚智效力上下盡心自然端拱垂衣太平可致熙寧二年上時知諌院上神宗論體要司馬光臣准御史臺牒伏奉四月二十日詔敕傳曰近臣盡規以其榮恥休戚與上同也今在此位者視朕過失與朝廷政事之闕默而不言乃或私議竊歎若以為其責不在已夫豈皆習見成俗以為當然其亦有含章懷寶待唱而發者今百度隳弛風俗偷惰薄惡烖異譴告不一此誠忠賢助朕憂惕以創制改法救弊除患之時宜令侍從官自今視朕過失與朝廷政事之闕無有巨細各具章奏極言無隱噫言善而不用朕有厥咎導之而弗言爾為不恭朕將用此考察在位所以事君之實明黜陟焉臣以駑下之材自仁宗皇帝時䝉擢在侍從服事三朝恩隆德厚殞身喪元不足為報雖訪問所不及猶將披肝瀝膽以效其區區之忠况聖意采納之勤督責之嚴諄諄如此臣敢營私避怨匿情愛已不為陛下别白當今之切務庶幾少補萬分之一邪臣聞為政有體治事有要自古聖帝明王垂拱無為而天下大治者凡用此道也何謂為政有體君為元首臣為股肱上下相維內外相制若網之有綱絲之有紀故詩云勉勉我王綱紀四方又云豈弟君子四方之綱古之王者設三公九卿二十七大夫八十一元士以綱紀其內設方伯州牧卒正連帥屬長以綱紀其外尊卑有叙若身之使臂臂之使指莫不率從此為政之體也何謂治事有要夫人智有分而力有涯以一人之智力兼天下之衆務欲物物而知之日亦不給矣是故尊者治衆卑者治寡治衆者事不得不約治寡者事不得不詳約則舉其大詳則盡其細此自然之勢也益稷曰元首明哉股肱良哉庶事康哉言君明則能擇臣臣良則能治事也又曰元首叢脞哉股肱惰哉萬事墮哉言君親細務則臣不盡力而事廢壞也立政曰文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹言文王擇有司而任之其餘皆不足知也康誥曰庸庸祗祗威威顯民言文王用其可用祗其可祗刑其可刑専明此道以示民也是故王者之職在於量材任人賞功罰罪而已茍能謹擇公卿牧伯而屬任之則其餘不待擇而精矣謹察公卿牧伯之賢愚善惡而進退誅賞之則其餘不待進退誅賞而治矣然則王者所擇之人不為多所察之事不為煩此治事之要也臣竊見陛下日出視朝繼以經席將及日中乃還宫禁入宫之後竊聞亦不自間省閲天下奏事羣臣章疏逮至昏夜又御燈火研味經史博觀羣書雖中宗髙宗之不敢荒寧文王之日昃不食臣以為不能及也然自踐祚以來孜孜求治於今三年而功業未著者殆未得其體要故也祖宗創業垂統為後世法內則設中書樞密院御史臺三司審官審刑等在京諸司外則設轉運使知州知縣等衆官以相統御上下有叙此所謂綱紀者也今陛下好使大臣奪小臣之事小臣侵大臣之職是以大臣解體不肯竭忠小臣諉上不肯盡力此百官所以弛廢而萬事所以隳頽者也而陛下方用為致治之本此臣之所大惑也臣微賤不得盡知朝廷之事且以耳目所接近日數事臣所知者言之其餘陛下可以類求也昔漢文帝問陳平天下一歲決獄及錢穀出入幾何平曰陛下即問决獄責廷尉問錢穀責治粟內史必也使卿大夫各得任其職此乃宰相事也若平者可謂能知治體矣今之兩府皆古宰相之任也中書主文樞密主武若乃百官之長非其人刑賞大政失其宜此兩府之責也至於錢穀之不充條例之不當此三司之事也陛下茍能精選曉知錢穀憂公忘私之人以為三司使副判官諸路轉運使各使久於其任以盡其能有功則進無功則退名不能亂實僞不能掩真安民勿擾使之自富處之有道用之有節何患財利之不豐哉今乃使兩府大臣悉取三司條例别置一局聚文士數人與之謀議改更制置三司皆不與聞臣恐所改更者未必勝於其舊而徒紛亂祖宗成法考古則不合適今則非宜吏緣為奸農商失業數年之後府庫耗竭於上百姓怨困於下衆心離駭將不復振矣且兩府於天下之事無所不總若百官之職皆使兩府治之則在上者不勝其勞而在下者為無所用矣又監牧使主養馬四園苑主課利今乃使監牧使不屬羣牧司四園苑不屬三司提舉司則在下者各得專權自恣而在上者為無所用矣陛下方欲納天下於大治而使百官在上者不委其下在下者不禀其上能為治乎若此之類臣竊恐似未得其體也凡天下之事在一縣者當委之知縣在一州者當委之知州在一路者當委之轉運使在邊鄙者當委之將帥然後事乃可集何則久在其位識其人情知其物宜賞罰之權足以休戚所部之人使之信服故也今朝廷每有一事不委之將帥監司守宰使之自為方略責以成效而施其刑賞常好别遣使者銜命奔走旁午於道所至徒有煩擾之弊而於事未必有益不若勿遣之為愈也夫事之利害吏之能否皆非使者所能素知不免臨時詢采於人所詢者或遇公明忠信之人猶僅能得其一二或遇私暗姦險之人則是非為之倒置矣此二者交集於前而使者不能猝辨也是以往往害事而少能為益非將帥監司守宰皆賢而使者皆愚也纍歲之講求與一朝之議論積久之采察與目前之毁譽精粗詳略其勢不同故也其有居官纍歲而不知利害臨人積久而不知能否或雖知利害而不能變更雖知能否而不能黜陟此乃愚昧私曲之人朝廷當察而去之更擇賢者以代其位不當數遣使者擾亂其間使不得行其職業也又庸人之情茍䇿非已出則媢嫉沮壞惟恐其成官吏若是者十常五六借使使者所規畫曲盡其宜在彼之日其當職之人已怏怏不悅不肯同心以助其謀協力以成其事曰朝廷自遣專使治之我何敢與知及返命之日彼必敗之於後曰使者既謀而授我我今竭力而成之功悉歸於首謀之人我何有哉此所以謂不若毋遣使者而屬任當職之人為愈也夫使者所以通逺邇之情固不可無然今之轉運使即古使者之任茍得人而委之賢於暫遣使者逺矣若監司自為姦慝貪縱或有所隱蔽欺罔或為部內之人所訟或所謀畫之事未得其宜朝廷欲察其罪惡審其虛實判其曲直決其是非然後别遣使者按之若按得其實監司有罪則當刑不才則當廢豈有但已者也今每有一事朝廷輒自京師遣使者往治之是在外之官皆無所用也使者既代之治事而當職之人亦無所刑無所廢是只使之拱手旁觀偷安竊祿者矣若此之類臣竊恐似未得其體也今朝廷之士左右之臣皆曰陛下聰明剛斷威福在已太平之功可指日而致臣愚竊獨以為未也臣聞古之聖帝明王聞人之言則能識其是非故謂之聰觀人之行則能察其邪正故謂之明是非既辨邪正既分姦不能惑佞不能移故謂之剛取是而捨非誅邪而用正確然無所疑故謂之斷誅一不善而天下不善者皆懼故謂之威賞一有功而天下有功者皆喜故謂之福今陛下聰眀剛斷則誠體之矣欲𢎞威福之柄則誠有其志矣然於所以為之之道尚或有所未盡故臣以為太平之功未可期也夫帝王之道當務其逺者大者而略其近者小者國之大事當與公卿議之而不當使小臣參之四方之事當委牧伯察之而不當使左右覘之儻公卿牧伯尚不能擇賢者而任之小臣左右獨能得賢者而使之乎若茍為不賢則險詖私謁無不為已今陛下好於禁中出手詔指揮外事非公卿所薦舉牧伯所糾劾或非次遷官或無故廢罷外人疑駭不知所從此豈非朝廷之士左右之臣所謂聰明剛斷威福在已者邪陛下聞其言而信之臣竊以為過矣夫公卿所薦舉牧伯所糾劾或謂之賢者而不賢謂之有罪而無罪皆有迹可見責有所歸故不敢大為欺罔若姦臣密白陛下令陛下自為聖意以行之則威福集於私門怨謗歸於陛下矣安得謂之威福在陛下邪且陛下向時中詔所指揮者率非小事至於兩禁美官邊藩將帥省府職任諸路監司此皆衆人之所希求治亂之所繫屬當除授之際竊恐未必一一出聖志也若乃姦邪貪猥之人陛下所明知而黜去者或更改官而升資或不久復進用然則威福之柄果不在陛下而陛下偶未之思也以此觀之面譽陛下聰明剛斷威福在已太平可立致者非愚則諛不可不察也陛下必欲威福在已曷若謹擇公卿大臣明正忠信者留之愚昧阿私者去之在位者既皆得其人矣然後凡舉一事則與之公議於朝使各言其志陛下清心平慮擇其是者而行之非者不得復奪也凡除一官亦與之公議於朝使各舉所知陛下清心平慮擇其賢者而用之不肖者不能復爭也如此則謀者舉者雖在公卿大臣而行之用之皆在陛下安得謂之威福不在已邪陛下此之不為而顧彼之久行臣竊恐似未得其要也夫三人羣居無所統一不散則亂是故立君以司牧之羣臣百姓勢均力敵不能相治故從人君決之人君者固所以決是非行刑賞也若人君復不肯決當使從誰決之乎夫人心不同如其面焉國家凡舉一事朝野之人必或以為是或以為非凡用一人必或以為賢或以為不肖此固人情之常自古巳然不足怪也要在人主審其是非而取捨之取是而捨非則安榮取非而捨是則危辱此乃安危榮辱之所以分也是以聖主重之故博謀羣臣下及庶人然而終決之者要在人君也古人有言曰謀之在多斷之在獨謀之多故可以觀利害之極致斷之獨故可以定天下之是非若知謀而不知斷則羣下人人各欲逞其私志斯衰亂之政也詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猷匪先民是程匪大猷是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成此言周室之衰人臣不知先王之大道務爭近小之事人君不能定其可否而事終無成也漢世國家有大典禮大政令大刑獄大征伐必下公卿大夫博士議郎議其議者固不能一必有參差不齊者矣於是天子稱制決之曰丞相議是或曰廷尉當是而羣下厭然無有不服者矣今陛下聽羣臣各盡其情以議事此誠善矣然終不肯以聖志裁決遂使羣臣有尚勝者以巧文相攻辨口相擠至于再至于三互相反覆無有限極臣愚深恐虧朝廷之政體損陛下之明德流聞四方取輕夷狄非嘉事也夫天下之事有難決者以先王之道揆之若權衡之於輕重規矩之於方圓錙銖毫忽不可欺矣是以人君務明先王之道而不習律令知本根既植則枝葉必茂故也近者登州婦人阿云謀殺其夫重傷垂死情無可愍在理甚明已傷不首於法無疑中材之吏皆能立斷事已經審刑院大理寺刑部斷為死罪而前知登州許遵文過飾非妄為巧說朝廷命兩制定奪者再命兩府定奪者再敕出而復收者一收而復出者一爭論縱橫至今未定夫以田舍一婦人有罪在於四海之廣萬幾之衆其事之細何啻秋毫之末朝廷欲斷其獄委一法吏足矣今乃紛紜至此設更有可疑之事大於此者將何以決之矣夫執條據例者有司之職也原情制義者君相之事也分爭辨訟非禮不決禮之所去刑之所取也阿云之事陛下試以禮觀之豈難決之獄哉彼謀殺為一事為二事謀為所因不為所因此苛察繳繞之論乃文法俗吏之所爭豈明君賢相所當留意邪今議論歲餘而後成法終於棄百代之常典悖三綱之大義使良善無告姦凶得志豈非徇其枝葉而忘其本根之所致邪若此之類臣竊恐似未得其要也此皆衆人之所私議竊嘆而莫敢明言者臣獨以受恩深重不顧斧鉞為陛下言之惟聖明裁察熙寧二年八月上時兼翰林侍讀學士判都省上哲宗論寬猛二道上官均臣聞治天下有二道寬與猛而已寬過則緩而傷義政事有廢弛之弊猛過則急而傷恩官吏有避法茍免之患術雖不同其蠧政害民一也自熙寧以來朝廷以法度整齊四方諸路監司不能深明朝廷之意往往務為慘核刻深之政郡縣望風畏栗大抵以趣辦為事類文具而無實不暇長計逺慮以便民為意而四方之民有憔悴愁歎之音此傷猛過急之弊也自陛下臨御數下德音務從寬大四方欣然仰戴德澤然比聞諸道監司又不能明陛下之美意妄意朝廷風旨一切以茍簡縱弛為事疲愞汙庸之吏視而不劾紛糾紊繆之政知而不察外求寬厚之名以要譽於一時此矯枉過寬士大夫守義不篤之患也方陛下講修百度以差役之法行於四方尤在郡縣夙夜悉心以推行朝廷愛民之政若怠惰不舉委成於胥史太守玩而不察監司視而不糾養成偷墮苟簡之風天下之民必有受其弊者矣臣願詔四方以寬不縱惡恩不傷惠之意若郡縣之吏庸惰不職監司太守不加糾劾如朝廷遣使亷訪頗有其實或風聞於上當顯責以厲逺近庶幾按察之吏不敢寬縱郡縣之官不敢偷惰人人警懼修職宣布陛下之德澤以惠黎庶元祐元年十一月上時為監察御史上哲宗論聖人處晦而觀明處靜而觀動蘇軾臣聞天下治亂出於下情之通塞至治之極至於小民皆能自通大亂之極至於近臣不能自達故易曰天地交泰其詞曰上下交而其志同又曰天地不交否其詞曰上下不交而天下無邦夫無邦者亡國之謂也上下不交則雖有朝廷君臣而亡國之形已具矣可不畏哉臣不敢復引衰世昏主之事只如唐明皇中興刑措之君也而天寶之末小人在位下情不通則鮮于仲通以二十萬人全軍陷沒於瀘南明皇不知馴致其事至安祿山反兵已過河而明皇猶以為忠臣此無他下情不通耳目壅蔽則其弊必至此也臣在經筵數論此事陛下為政九年除執政臺諫外未嘗與群臣接然天下不以為非者以謂垂簾之際不得不爾也今者祥除之後聽政之初當以通下情除壅蔽為急務臣雖不肖䝉陛下擢為河北西路安撫使沿邊重地此為首冠臣當悉心論奏陛下亦當垂意聽納祖宗之法邊帥當上殿面辭而陛下獨以本任闕官迎接人衆為詞降旨拒臣不令上殿此何義也臣若伺候上殿不過更留十日本任闕官自有轉運使權攝無所闕事迎接人衆不過更支十日糧有何不可而使聽政之初將帥不得一面天顔而去有識之士皆謂陛下厭聞人言意輕邊事其兆見於此矣臣備位講讀日侍帷幄前後五年可謂親近方當戍邊不得一見而行况疏逺小臣欲求自通亦難矣易曰天行健君子以自彊不息又曰帝出乎震相見乎離夫聖人作而萬物覩今陛下聽政之初不行乘乾出震見離之道廢祖宗臨遣將帥故事而襲行垂簾不得已之政此朝廷有識所以驚疑而憂慮也臣不得上殿於臣之私别無利害而於聽政之始天下屬目之際所損聖德不小臣已於今月二十七日出門非敢求登對然臣始者本俟上殿欲少效愚忠今來不敢以不得對之故便廢此言惟陛下察臣誠心少加采納古之聖人將有為也必先處晦而觀明處靜而觀動則萬物之情畢陳于前不過數年自然知利害之真識邪正之實然後應物而作故作無不成臣敢以小事譬之操舟者常患不見水道之曲折而水濱之立觀者常見之何則操舟者身寄於動而立觀者常靜故也奕碁者勝負之形雖國工有所不盡而袖手旁觀者常盡之何則奕者有意於爭而旁觀者無心故也若人主常靜而無心天下其孰能欺之漢景帝即位之初首用鼂錯更易法令黜削諸侯遂成七國之變景帝往來兩宫間寒心者數月終身不敢復言兵武帝即位未幾遂欲用兵鞭撻四夷兵連禍結三十餘年然後下哀痛詔封宰相為富民侯臣以此知古者英睿之君勇於立事未有不悔者也景帝之悔速故變而復安武帝之悔遲故幾至於亂雖遲速安危小異然比之常靜無心終始不悔如孝文帝者不可同年而語矣今陛下聖智絶人春秋鼎盛臣願虛心循理一切未有所為默觀庶事之利害與羣臣之邪正以三年為期俟得利害之真邪正之實然後應物而作使既作之後天下無恨陛下亦無悔上下同享太平之利則雖盡南山之竹不足以紀聖功兼三宗之夀不足以報聖德由此觀之陛下之有為惟憂太蚤不患稍遲亦已明矣臣又聞為政如用藥方今天下雖未大治實無大病古人云有病不治常得中醫雖未能盡除小疾然賢於誤服惡藥覬萬一之利而得不救之禍者逺矣臣恐急進好利之臣輒勸陛下輕有改變故輒進此說敢望陛下深信古語且守中醫安穩萬全之䇿勿為惡藥所誤實社禝宗廟之利天下幸甚臣不勝已身憂國之心冒死進言元祐八年九月上時知定州朝辭上徽宗乞通下情防太察江公望臣聞人君明目達聰所以通下情也前後有旒左右有纊所以防太察也太察則聞人之過下情不通則不見己過聞人之過則姦生而刑滋不見已過則心塞而禍萌此周之厲王以防口而召亡漢之顯宗以耳目隱發為明而速亂也邏者之興推求其意不過以求瑕搜匿鈎致盜詐出於不備擲發如神此一酷京兆之俗才爾使京兆為之猶可羞矧以天下為度海內為家而為京兆不為者乎陛下即政之三日一切罷去天下聞之翕然歸心開口張膽人人自安告許不長風俗向厚比聞稍稍復置益舊額通為七十人一人量以十人為耳目十人之中一人又以十人為之散于通途永巷不啻數千百人矣夫婦醜詆之言仇隙怒傳之語增情飾狀擲隱抉伏何所不至人人局蹐各各疑慮親戚不敢誠朋友不敢信目不敢注視手不敢直指若此定非清世之美事也昔吳主孫權用呂一輩舉罪糾姦纎介必聞深案醜誣排陷無罪以作威福步隲力詆其非權尋誅一覺悟尚早蓋小人因緣銜命不務奉公利在憑藉威勢杜絶人口公然作過使上聰不達威柄潛移刑及無辜睽睽萬目由聞人之過不聞已過之所致也老子曰察見淵魚者不祥以察為明是誠不祥之召也陛下豈不思畿甸之外非陛下之民乎人各有心能使之昏昏不喻朝廷之所為乎人各有口能使之默默不議陛下政事乎既不可掩於天下何獨察察於輦轂之下以為明哉語曰天下有道庶人不議信乎有道不可得而議也伏望陛下以道御天下使人蕩然不疑無得而議何為蹈吳之故轍而不知革彼猶能因言以誅一輩孰謂陛下鑒此而不能之乎願黜獻議之人通舊額人數一切罷去除禍者必鋤其根植福者必封其本毋謂昔有額而不可去也其根尚存枝葉他日復生矣不可不察建中靖國元年上時為左司諫宋名臣奏議卷八
