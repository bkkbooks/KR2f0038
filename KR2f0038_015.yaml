body:
  text: 宋名臣奏議卷十五宋趙汝愚編君道門用人三上神宗論果於用善斷於去惡孫覺臣聞易否泰之辭曰君子道長小人道消內陽而外隂內君子而外小人則為泰泰者通而治也小人道長君子道消內隂而外陽內小人而外君子則為否否者閉而亂也易之意謂天道不能無隂陽人道不能無小人君子若陽氣盛長萬彚通達則羣剛用事而隂伏於外矣聖人在上賢人道亨則君子用事於內小人在外矣君子小人迭相消長迭相勝負譬圓方之不相入氷炭之不同器然聖人在上則賢人出見於世將以有為此其氣類感通自然之應也易曰雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也臣又聞傳曰舜有大功二十舉十六相去四凶也舜之治天下功德多矣傳不言其他而以八元八凱之進於朝鯀共工歡兜之流於外以為功謂舜能辨羣臣之正邪處君子小人而當於內外則朝廷清明天下大治萬務雖衆何以加於此哉臣又聞管子曰齊桓公之郭問其父老郭何以亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也然則人主有善善惡惡之心於用舍之際遲疑而不忍及其久邪臣進而正臣退小人得志而君子潔身以去則其不亡者希矣臣又聞書曰爾無昵于憸人充耳目之官迪上以非先王之典謂人主所任以為耳目者必皆正人吉士則其行篤實其言忠信所以道上者皆先王之法言也人主之患莫大於昵近小人小人之言人主不必盡用萬一見聽害政大矣古之人君亦有知其小人而用數以役之者初則愛其才藉其力謂可以駕馭而用之及其既久狎熟慣習先意承旨卜射人主所好惡之事焉人主忽不自覺其説茍得行則正人相引去而亂敗隨之矣故曰與不善人居如入鮑魚之肆久而不知其臭也臣竊惟陛下以堯舜之質濬明不世出之才即位未幾進退大臣如數白黑四海九州莫不注心拭目以望太平而朝廷之上忠邪混淆君子齰舌而不敢言正人徊徨而欲去嵗且再期而功緒落落未有治安之漸以陛下之明判此無難者然優遊牽制有所不忍恐其有以得於陛下而陛下惑猶未解也若爾則臣知陛下之計誤矣陛下幸少垂意臣言法否泰之象使君子小人各得內外之常處以成虞舜進賢去佞之大功果於用善斷於去惡不為郭父老所憂一清耳目之路使先王之典日陳於前臣知天下不足治太平不難成也熙寧元年七月上時為右正言供諫職上神宗論內外大小臣不和由君子小人並處富弼臣伏蒙聖造擢冠宰司雖步履尚艱稍稽入覲屢得寬告跧局私門然不敢安居常思當今切務欲伸報塞而事頗紛綜固非筆墨可盡今且以一事最大者仰塵天聽伏惟聖慈更賜裁察夫君臣之道本是一體君者元首也執政者股肱心膂也諌官御史侍從論思者耳目也內外羣有司者筋肌支節血脈也體若具備方得成人為君者上下之官亦具而無闕方得成國為國者正如為人之體也人之體一脈不和則為疾矣君之國一官不和則為害矣體之不和為疾最大者股肱心膂也國之不和為害最大者執政也夫執政者輔贊萬幾為國大臣日至君前議論天下之事賞善罰惡進賢退不肖喜怒繫乎人情之舒慘邪正繫乎朝廷之盛衰是執政者天下之所觀望羣有司之所師表也執政不和則羣有司安得而和哉羣有司不和則萬務安得而治哉萬務不治則天下之民受其弊矣民既受弊則國家喪亂隨之此萬萬必然之理也是故為國者欲求治且安非天下和不可也欲天下人和非中外官司皆和不可也欲中外官司皆和非執政先和不可也執政者乃朝廷教令之所出天下治亂之所繫也安得不和也尚書臯陶曰同寅協恭和衷哉注衷善也周武王曰紂有億兆夷人離心離德豫有亂臣十人同心同德注夷平也康王曰三后協心同底於道注三后周公君陳畢公也夫三后皆當時聖賢此足見聖賢若不和亦不能同致其道也且夫執政者和則類無猜疑所議皆合事必極其理盡其善然後行下人固悅服而稟從之承流宣化風動草偃遂使天下蒙其利則豈有不治而安者乎及其至也乃能致升平而令國家享祚於數百年者矣昔西漢陳平為右相周勃為左相勃既誅諸呂平以勃功髙遂以右相推勃及平對文帝決獄治粟事有條理勃自知能不如平復推平為右相唐太宗召宰相房喬議政喬以杜如晦能斷大事如晦復謂喬善謀而太宗卒用喬䇿兹四相者非用心至和以天下為任安肯互相推薦為國逺慮如是之切而不自爭勝耶此乃臣前所謂執政者和則致時升平使國家享祚數百年之明效也若執政者不和則議事之間動有疑二或忿爭於官府或辨别於君前咸蓄不平之心必無至當之論假使強自牽合終成乖戾互相厭苦隂肆傾擠門下賓朋助為搖撼彼此窺伺是非分拏貪逞私憾之讐何恤公家之事既行於下人不悅服而不肯稟從淪胥展轉遂至天下受其弊則豈有不衰而亂者乎其甚者至有賈禍召亂為國大患而不可救者矣昔唐憲宗相裴度時方鎮跋扈度勸帝用兵諸道叛亂者悉皆歸服憲宗遂成中興之業王室大振既而誤用李逢吉為相逢吉大姦邪嫉度功令門下朋黨號八關十六子者創造謗訕百般中傷以至撰作謠讖謂度有天分憲宗既惑度遂罷去尋致河朔徐汴再陷賊庭王室復弱矣僖宗用鄭畋盧擕為相爭黃巢邀請節旄事擕以畋語至切遂拂袂投硯而起喧於都下然衆議畋語為是擕議為非時又用宰相王鐸為都統出討黃巢擕大不悅益固執不與巢節旄只授以率府其意欲激黃巢之怒使鐸功不成以快巳志殊不以天下安危為慮而僖宗不明終用擕説巢果大怒擁衆百萬自嶺表橫行天下是時大亂無一州一縣不用兵者俄而兩京陷沒僖宗幸蜀生民塗炭之極自古無比久之巢雖漸敗而朱溫自巢軍投來終移唐祚自號大梁兹二相者營私徇巳用心不公擠陷忠良敗壞時政或剪弱王室或覆亡宗社為臣至此隕族何足償此臣前謂賈禍召亂為國大患而不可救者之明效也以此足見執政者和與不和實繫乎天下治亂之本存亡之機也如人股肱心膂之疾可以喪其生也至於諌官御史侍從論思及內外羣有司亦不可謂其小職而容有不和也茍有不和則如人耳目筋肌支節血脈之疾安得謂其小而不治之使和平哉周武王曰紂有臣億萬惟億萬心豫有臣三千唯一心夫三千者舉其內外官也成王曰庶官惟和不和政厖注厖亂也禮曰和者天下之達道也漢劉向亦曰衆賢和於朝萬物和於野昔賢又以烹調鼎鼐更張琴瑟操執轡馭合煉藥石設多方以為喻者或大或細未有不以和為主也為君者不可不察也不可不謹所擇也夫內外小大之官所以致其不和者何哉正由乎君子小人並處其位也蓋君子小人方圓不相入曲直不相投貪亷進退不相侔動靜語默不相應如此而望議論協和政令平允安可得邪安可幸而致耶易泰卦君子道長小人道消則時自泰矣否卦小人道長君子道消則時自否矣若使君子小人並位而處其時之否泰必無兩立之理君子常寡小人常衆則小人必勝君子必不勝君子不勝則奉身而退樂道無悶萬一小人不勝則隂相交結互為朋比駕虛交扇白黑雜揉千歧萬轍眩惑主聽必得其勝然後肯巳也小人既勝則益復肆毒於良善梟心虺志無所不為所以自古泰而治世少否而亂世多者亦止由乎小人常勝君子常不勝之所致也小人但能為亂不得致治若小人或能致治則易更三聖必不於小人道長之時謂之為否也凡六十四卦三百八十四爻大抵諸聖以意象配君子小人而分善惡至多不可悉數也易曰小人不恥不仁不畏不義不見利不勸不威不懲也夫小人者聖賢無不鄙而惡之故易曰小人而乘君子之器盜思奪之矣詩曰憂心悄悄愠于羣小此皆聖賢鄙惡小人之甚者也書曰君子在野小人在位民棄不保天降之咎注棄叛咎災也此謂用小人則民叛而天降災也仲尼曰君子中庸小人反中庸荀子亦曰君子小人相反也夫小人所為既與君子相反戾則安可使之並處哉所議安能得其協和哉夫天子無官爵無職事但能辨别君子小人而進退之乃天子之職也自古稱明主明君明后者無他惟能辨别君子小人而用舍之方為明矣其若煩思慮親細故則非所以用明之要也夫前車者後車之所望也古事者今事之所鑒也仲尼刪書於堯舜大禹皆稱曰若稽古傅説戒髙宗亦曰事不師古以克永世匪説攸聞恭惟皇帝陛下稟上聖之資嗣纍朝之業纘服未久勤勞巳至更望考前世盛衰治亂之迹近代安危存亡之機凡於選求力辨邪正所喜者未可遽用之所怒者未可遽棄之禮曰愛而知其惡憎而知其善者是也又人所毁者未必為惡人所譽者未必為善仲尼曰衆好之必察焉衆惡之必察焉者是也孟子尤於進退善惡之説至詳齊宣王問曰吾何以識其不才而捨之孟子對曰國君進賢如不得已將使卑踰尊疏踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之夫一國之人皆曰賢皆曰不可亦可以謂之出於衆議而不可不從之也然孟子尚以謂未可信而進退之猶復躬自察焉直俟王親見其果賢則用之親見其果不可則去之此所以大防姦人朋類毁正譽邪也亦所以防偏見者以丹素甘辛而好惡之差也蓋恐用捨或爽則所損多也實謹之至也茍如是而失之者尚恐不免然終鮮矣陛下君臨天下必不得如孟子之辭盡聞天下所議論若夫左右之説及在廷諸人之語則皆可聞之矣然固未可遽信而遽行之更在博詢而參校之也所詢之者須詢於可詢者也詢之必不肯誤陛下也若詢及姦險浮薄不正之人則向所謂愛憎毁譽偏見者皆有焉有之則邪正錯亂是非混淆陛下至英至睿亦莫得而辨之也兹事雖自古聖王亦以為至難臯陶曰在知人在安民禹曰惟帝其難之帝謂堯也仲尼獨取堯比之如天尚以知人安民為難况自堯而後者哉由是而語陛下可不謹之謹之又謹之大抵有天下者得人則治而安不得人則亂而危至甚則又遂繫乎存亡也臣前所援據特一二而巳但且欲證臣狂瞽非臆説焉其有在方册者比比皆是不可殫引陛下開卷則見之矣惟望謹之謹之又謹之熙寧二年二月上時為左僕射門下侍郎同平章事上神宗論責君子太重奬小人太深范純仁臣纍言張靖不合責降薛向不合仍加奬用不蒙聽納緣臣備位諌垣職在針補時政非是賞罰差失必須竭力陳論况臣曽任陜西親見向之姦迹豈敢偷安茍祿結舌保身况居聖神之朝當盡強直之説愚臣自叨近職固亦上體聖心無非奬善旌能去邪黜枉深欲明示好惡將使天下風從而乃執政之心喜人承順故不能分别邪正以致賞罰不平使天下之人有疑於陛下必謂督責君子太重崇奬小人太深委近習則務優容而來其言用臣僚則因違忤以沮其志蓋以近事明之不得不謂之如此且如呂誨是御史中丞詔許風聞言事才有失實即坐左遷此責君子太重也薛向外官固合守法而敢違條罔上罪迹顯聞不獨曲被優容而復驟加奬用此則奬小人之太深也陛下間或遣內臣走馬承受輩體訪外事固巳不使臣僚得知其或言不審詳必隱而不責又况肯使與罪人對辨而反坐其言者哉此則務優容而來其言也且薛向在陜西壞法已七八年張靖一旦往彼體量不能盡見根柢詢訪之際容有不詳朝廷忘其元初被旨使與罪人對詞一有不詳先被黜辱此則因違忤以沮其志也責君子太重則忠臣難立奬小人太深則姦邪易滋優假以來之則近幸之言皆進違忤者沮之則中人之性盡移如此而望風俗之不偷聰明之不惑不可得巳陛下天資睿聖超越前古臣之遭遇千載一時微臣尚恥於枉尺直尋於陛下固不可啓寵納侮豈止爵及惡德實亦有害邦家伏望聖慈捨巳從人勿憚改作近者二人之命悉賜追還不惟賞罰均平實亦天下幸甚熙寧二年七月上時為同修起居注兼同知諫院上神宗論推擇太精羣材難進呂公著臣竊惟陛下以聖哲之資將興致治其於臣下能否固所周知然臨朝而歎常苦乏人臣竊以為人之難知堯舜猶病然自昔有為之君亦不借賢於異代况今之人才衆人之所共知而陛下之所熟講者蓋亦不少若用之既盡然後可以言乏才試之不效然後可以言難知今則不然左右之任尚多闕員而大小之賢鮮得彚進陛下雖推擇至精可以無濫賞之過然羣材難進誰與致非常之功昔唐之德宗非不愛惜名器由其責人太密授任至難至於東省閉凡纍月南臺唯一御史故陸贄以為太精而失士臣竊觀之自昔用人之際所以常多疑二者患在君臣之間未免形迹居嘗謀事則多巳睽異至於議論則尤難協同臣伏願陛下與執政之臣凡選任之際務存公坦忘去形迹則俊乂咸事天工不曠矣熙寧二年十月上時為御史中丞上神宗論臧否人物宜謹密吕公著臣聞易曰君不密則失臣臣不密則失身幾事不密則害成夫人主延見羣臣與講天下之事而論及人物之臧否此所宜謹密者也茍人主謹密而有所不至則人臣悼後害之及念失身之戒而不敢盡其所欲言此易之所謂不密則失臣者也况人君用人既用其所長固欲知其所短若知其所短而暴之則莫肯盡其心方將同舟而濟共輿而馳茍不能使人人盡其力則其勢未可知也惟留意幸甚熙寧二年十月上時為御史中丞上神宗論不當召對小臣詢兩府臺閣人物孫覺臣聞近者召對臣僚雖或疏逺微賤陛下亦霽天威賜以清問此固聖主好問盡下推誠不疑甚盛之德也或聞進對之間陛下時時論及人物上自兩府大臣下至臺閣新進使之區處題品此雖陛下欲廣其聰明不専一人之言以為信但欲周知羣下之智能長短情狀曲折然臣竊以謂知人堯舜所難孔子亦曰不如鄉人之善者好之其不善者惡之得對之人未必皆賢而公其好惡就令才識可采亦未必盡知人之明問答之際陛下不能不微見聖懷流俗之情多事容悅度所喜者飾其賢觀所惡者詆其醜或陛下少加酬對必漏其所言大臣聞之必懷顧慮小臣聞之必事朋黨臣以謂人主不得不知羣臣之忠邪人才之髙下茍於侍臣從官之中忠信篤實而好惡不私材資敏明而鑒裁不眩者時賜考察參伍其人亦不至於失士熙寧二年十月上時為右正言供諫職上神宗論不當遣張載按獄程皓臣伏聞著作佐郎張載往明州推勘苖振公事竊謂載經術德義久為士人師法近侍之臣以其學行論薦故得召對蒙陛下親加延問屢形天奬中外翕然知陛下崇尚儒學優禮賢俊為善之人孰不知勸今朝廷必欲究觀其學業詳試其器能則事固有繫教化之本原干政治之大體者儻使之講求議論則足以盡其所至夫推按詔獄非謂儒者之不當為臣今所論者朝廷待士之道爾蓋試之以治獄雖足以見其鈎深練核之能攻摘斷擊之用正可試諸能吏非所以盡儒者之事業徒使四方之人謂朝廷以儒術賢業進之以獄吏之事試之則抱道修潔之士益難自進矣於朝廷尊賢取士之體將有所失伏乞朝廷别賜選差貴全事體熙寧二年閏十一月上時為監察御史裏行上神宗論御臣之要呂大防臣伏見陛下求治之意可謂至矣四方孤逺卑賤之吏或一善可稱或一詞可録不問其秩之髙下皆傳召而見之燕間從容盡其所藴聖心退託猶以為未至又詔百官之在朝者各封上其所欲言而以次對於廷下自爾以來且將數年伏惟陛下觀天下之人才不為不多而閲天下之事理不為不衆矣然人才多則賢不肖並進而難知事理衆則可與不可雜至而易惑恭惟聖鑒之明固無遁照然區區之愚竊謂古今人主之臨涖動則皆稱御蓋天下者車也羣臣者馬也法度者轡䇿也要在人主善御之而已御得其要則車安而馬習轡緩而䇿簡御失其要則車危而馬敝轡急而䇿煩人主之所以貴要者無他在此而已臣愚以謂御臣之要必先退纎柔而進朴直略言詞而責行實然後為得臣竊見近年被召見用之臣其善事固不少矣而以浮辨巧説而進者或有之臣竊原其理蓋有二途或以一切逢迎徼幸速進及考其成敗則不足經逺或援引古義以證巳見不度宜適而謂今世可行者雖所以言者異而敗事蠧理其害則同此陛下不可不熟察也自古雖聖人在上未嘗不以巧言為戒者蓋美言之於人易眩而難察易聽而難行故雖堯舜在上亦以巧言令色為畏以靜言庸違為患以壬人讒説為憂况其下者哉以此論之故宜專進崇實忠良之士以奉成聖化雖言有怫戾行有簡直乍若不合者亦在陛下容養而成就之漢武帝愛司馬遷嚴助之才華而尊汲黯卜式唐太宗好許敬宗李義府之文章而信任王圭魏徴此明主之鑒有以區處之矣以陛下之文明致治將躋於二帝三王之盛而知人之辨必不在漢唐二主之後也熙寧三年上時直舍人院上神宗乞謹好惡重任用劉摯臣竊以為治之道唯知人為難蓋善惡者君子小人之分其實義利而巳然君子為善非有心於善而唯義所在小人為惡頗得依真以售其偽而欲與善者混淆故善與惡難為君子小人之辨而常至於不明世之人徒見其須臾而不能覆其久也故君子常難進而小人常可以得志此不可不察也恭惟陛下承百年太平大有為之會寤寐人物不次而用至於今日未見卓有功狀可以補國利民仰稱詔旨而中外頗有疑者此何謂也豈所以用之者或未能盡得其人歟臣且以將命出使者言之其規畫法度始皆受之於朝廷也一至於外則大異矣興利於無可興革故於不可革州縣承望奔命不暇官不得守其職業農不得安其田畝以掊削民財為功以興起刑獄為才陛下振乏均役之意變而為聚斂之事陛下興農除害之法變而為煩擾之令守令不敢主民生靈無所赴訴臣以謂此等非必皆其才之罪特其心之所向者不在乎義而巳賞之志每在事先公之心每在私後故顛倒繆戾久無所成其能少知治體有愛君之意出憂國之言者皆無以容於其間是故今天下有二人之論有安常習故樂於無事之論有變古更法喜於敢為之論二論各立一彼一此時以此為進退則人以此為去就臣嘗求二者之意蓋皆有所是亦皆有所非樂無事者以謂守祖宗成法獨可以因人所利據舊而補其偏以馴致於治此其所得也至昧者則茍簡怠惰便私膠習而不知變通之權此其所失也喜有為者以謂法爛道窮不大變化則不足以通物而成務此其所是也至鑿者則作為聰明棄理任智輕肆獨用強民以從事此其所非也彼以此為亂常此以彼為流俗畏義者以並進為可恥嗜利者以守道為無能二勢如此士無歸趨臣謂此風不可寖長東漢黨錮有唐朋黨之事蓋始於斯在易之象以君子道長小人道消為泰小人道長君子道消為否傳曰惟君子為能通天下之志書曰皇建其有極又曰無有作好遵王之道無有作惡遵王之路記曰一道德以同俗又曰舜執其兩端用其中於民今天下風俗可謂不同情志可謂險阻而消長之勢可謂不明矣臣願陛下虛心平聽默觀萬事之變而有以一之其要在乎謹好惡重任用而巳爾前日意以為是者今求諸非前日意以為短者今取其長稍抑虛譁輕偽志近忘逺幸於茍合之人漸察忠厚謹重難進易退可與有為之士抑髙舉下品制齊量收合過與不及之俗使會通於大中之道然後風俗一險阻平民知所向而忠義之士識上之所好惡無有偏陂莫不奮迅而願為之用則施設變化惟陛下號令之而已臣謂方今之政無大於此惟陛下幸察熙寧四年六月上時為監察御史裏行上神宗乞參舉才德之士錢協臣聞天下之治有因有革祖宗遺德在人法度明備此陛下之所宜因而世習久治弊隨以生此當今之所宜革也伏惟陛下操大有為之志而當不可不為之時凡所以不憚更張而務以興利除害堯舜文武之用心也臣竊嘗深計熟慮當今之宜其先務之要不過擇人而巳今陛下先器能而後履歷惟材是舉可謂急於擇人矣然臣尚慮有所獻者以謂人才不悉同而所用有宜適用不盡其才則雖才且無益多才而不涉道則為患大於不才惟道德規矩之士而其才足以經濟世務者此自陛下所宜養育成就以待非常之用者也自餘百執事之任有才智通敏可以辦集事務而不能深知禮義之科指者此足充繁使而不可居內外表率之官而抱公守道難進易退之士雖無敏捷趨走之便而堪屬大事者此居內可備顧問而居外可為表率臣願陛下參舉才德各盡其用必使有德者先進而有才者佐之俾上不失經國之體下不失便民之利以陛下至明不惑之資洞見情偽器而使之天下幸甚熙寧四年八月上時為三司鹽鐡判官上神宗乞召對之人量加試用劉孝孫臣伏見陛下講修衆務㨂拔人材雖毫善寸長畢蒙收采英識睿鑒前古罕及然其間有召自遐逺使之對揚天資髙明聖問宏奧幽仄之士乍對清光舉動語言過於兢畏偶有罷去能無沮傷蓋其始召也皆以為榮及其罷去也不勝其辱况士人或緣臣僚薦舉或為朝廷所知比之輩流必有可采茍就其材器各加試用不惟不沮傷其志是亦陛下覆載涵育之德也熙寧五年三月上時為御史上神宗乞廣收人才呂公著臣伏覩近詔舉才行堪任升擢官竊觀陛下自臨御以來虛心屈已以待天下之士士之起草茅由小官而超至顯近者不可勝數然猶孜孜以求賢為急誠欲廣收人才無所遺棄臣伏思自昔有為之君不借賢於異代然唐虞之際亦稱才難則世固未嘗乏賢而人才亦不可多得今陛下降由中之詔非徒為虛文也中外所舉蓋百有餘人雖不盡當誠參考名實而試用之宜有可以塞厚望應明指者臣又竊詳今日詔意謂乏才然數年以來天下之士陛下素知其能嘗試以事而中就間外者尚多恐其間亦有才實忠厚欲為國家宣力者未必盡出於迂濶繆戾而難用也漢武帝時公孫𢎞初舉於朝以不稱旨罷後再以賢良舉帝以親擢為第一不數年間遂至宰相由是觀之人固未易知而士亦不可忽何則昔日所試或未能究其詳數年之間其才業亦各有進惟陛下更任之事以觀其能或豫之對以考其言兼收博納使各得自盡則盛明之世無滯才之歎不勝幸甚熙寧十年十一月上時自河宫陽召赴闕提舉中太一上神宗乞選用前日議論之人不終遺棄呂公著臣聞臯陶陳謨以知人為難孟子論道以知言為要所謂知人則哲能官人何憂乎歡兜何畏乎巧言令色孔壬者知人也詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮者知言也故曰帝王之德莫大乎知人而成敗之機在於察言是以堯舜在上明目達聰詢四嶽以難任人命納言以堲讒説使惡直醜正者不能亂天下之俗服讒搜慝者不能遷人主之意然後四門穆穆而朝廷清明權歸於上而天下無事臣向蒙陛下擢在樞府中謝曰不敢縷陳細務輒論及判别忠邪之道嘗謂陛下勵精為治十年不懈小大政事日欲增葺而朝廷之間邪説尚勝大抵小人之害君子必求要切之語以中之使之不能自解方朝廷修改法度之初凡在朝野孰無論議陛下聖度兼包豈嘗記録而小人賊害指目未巳茍昔有異同之論而今不為言者所容則必指以為沮壞法度之人不可復用非陛下加意省察則端人良士類遭排格當時粗陳此語陛下頗賜開納近日除顧臨開封府推官程皓判武學縉紳聞之皆以為皓昔任御史嘗有所言陛下不以為過有稍用之意朝廷用人不終遺棄必料傳之四方士人無不欣仰然命下數日復因言者而罷去則知臣前所陳者其風猶未殄也臣實不佞嘗為一二識者私道陛下盛德竊以為陛下春秋鼎盛履崇髙之位操生殺之柄而記人之功忘人之過極天地山海之量此羣下所以愛戴而人人願立於朝也小大之臣雖姦回頗僻如鄧綰者猶降責不踰年遽復侍從授以方面則是盛明之世本無棄絶之人邪正賢不肖亦未易以一言而定也臣愚以謂今日公卿士夫嘗於朝廷法令有所可否然其愛君許國之心愈久而益明者甚衆其唱和雷同承迎附會而姦言汙行卒為陛下所照者蓋亦不少然則人固未易知而士亦不可忽也况如皓者陛下早自知之其立身行巳素有本末講學論議久益疏通且其在言路日時有論列皆辭意忠厚不失臣子之體使得復見用於聖世其奮身報國未必在時輩之後兼所除武學差遣亦未為仕宦之要津而小人齗齗必以為不可者直欲深梗正路廣沮善人其所措意非特一二人而巳臣區區所慮者讒説殄行之徒日以熾盛則守正向公之士愈難自立其於聖政不為無損臣受恩與常人不同茍有所當言不敢顧避緘默以負陛下優遇惟陛下幸察元豐元年上時為同知樞密院事上神宗論自古治亂在用諛佞讜直之人富弼臣聞自古致天下治與亂者大綱不出用諛佞讜直之人二端而巳諛佞者進則人主不聞有過惟惡是為所以致亂也讜直者進則人主日有開益惟善是從所以致治也此乃人主致治亂之大略焉臣自離朝廷退居林下時亦仰知朝廷所為大率諛佞者競進讜直者多處於外雖有在朝者蓋恐觸忤姦佞亦皆結舌不敢有所開陳又聞近日中外或有事緒上撓聖懷而忠義之士但仰屋竊歎不見有聞於上者致陛下不得知而又更張之此實非朝廷之福也惟願陛下開衆正之路杜羣枉之門講求善政變禍為福俾天下受賜坐致太平此老臣有望於陛下其間事目甚多亦不敢妄有條列但舉其大要惟聖君留神而擇焉不爾即恐浸漬漸深禍亂將至則於時益煩宵旰之憂而亦無所濟矣老臣犬馬區區之志略陳其端伏望聖慈無少忽而深思之力行之乃天下之幸宗社之福也元豐六年閏六月上時以司徒使相致仕疏奏上語輔臣曰富弼有疏來章子厚曰弼言何事上曰言朕左右多小人子厚曰盍令分析孰為小人上曰弼三朝老臣豈可令分析王安禮曰弼之言是也罷朝子厚責安禮曰右丞對上之言失矣安禮曰吾儕今日曰誠如聖諭明日曰聖學非臣所及安得不謂之小人子厚無以對宋名臣奏議卷十五
