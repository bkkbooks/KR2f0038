body:
  text: 宋名臣奏議卷三十二宋趙汝愚編帝系門宗室上仁宗乞分王宗室壯觀洪業劉隨臣聞宗子維城用期磐石之固異姓為後適茂本支之榮宗周則並建懿親炎漢乃分王善地有唐開國彌重親賢嗣王郡王推恩甚衆皆所以强大宗室為策久長豈比夫秦懷封建之疑卒無子弟之援也伏自皇家御極但推至公尊禮勳臣謙抑宗族親王之子不封郡王親王既沒不立嗣王闕典未行屬在繼聖今者臣僚遷擢多至尊官皇族絲聨未登顯位雖天地之道義在無私而東平之賢宜推異數臣伏覩每遇聖節宴於錫慶院見皇親數人坐於駙馬都尉之下進退俯仰同於庶僚北使在筵顧揖不及非所以壯觀洪業威示逺人之道也方今兩宫明聖四海㑹同北朝歡盟人使交午爵秩班序恐須商量庶使銀潢分𣲖將溝洫以異流天枝擢秀與樗櫟而殊等臣職當言事難避僣踰親睦之恩允資聖斷天聖五年四月上時為右司諫上仁宗乞令宗室幹當在京諸司富弼臣近上河北事宜以胸奴強盛朝廷為藩屏之固慮為夷狄所輕乞陛下親擇宗室中堪任外處差遣者充近京千里內知州鈐轄及畿甸知州縣以壯觀王宗議下兩府至今未上必謂體大無例難以施行此議事于皇親必涉議論然茍利於國安可避免臣前奏或未決行欲望且令幹當在京諸司如皇城司軍頭引見在京百司省中衙司羣牧司儀鑾司翰林司御厨庫院府界提㸃之類使之稍接人事亦教育之階也俟其間見得才效有可外補者然後用臣前議漸次差出慶厯四年上時為樞密副使弼所上河北事宜見遼夏門上仁宗乞宗子以次補外范鎮臣伏見方今宗子衆多睦親廣親二宅狹隘居處不便又皆賦以重祿别無職業使展其效祖宗後裔豈無賢才而一概廢而不用深可惜也臣欲乞族屬稍踈者以次補外使無廢才以副陛下睦親之意如允臣所乞其入官資序及諸約束乞委大臣裁酌施行至和元年上時知諫院上仁宗論宗室濫賞趙抃臣等伏覩近日皇親非次建節移鎮遷官增祿幾二十人道途喧傳不測恩命之所自出臣愚欲望陛下稽考祖宗故事杜絶僥幸之路特賜聖㫖裁損無令外議有宗室濫賞之名亦詩所謂至于兄弟以御于家邦之議也至和二年六月時為侍御史率同列上此奏得㫖令止絶皇親遷宫上仁宗論宗室爵秩祿廩乞守舊制馬遵臣伏覩近日宗室中屢有除授已是頻煩復聞更有扳援體例希望恩澤者上干宸聽相繼未已國家秩叙親族至於爵秩祿廩皆因祖宗舊制循守施行垂之經久不宜過有優假以隳後法伏乞聖斷詳察特賜指揮至和二年六月上時為殿中侍御史上英宗論皇第二子恩意禮秩當與潁王差逺傅堯俞臣伏聞以疏而謀親者忠蔽於慈愛緣始而圖逺者言近乎迂闊惟推心於大公則愛不能惑鑒古而深念則迂有可察臣所以自忘其身疏而長慮於事始者也然詞略則在理難悉語深則於事非便輒陳梗概惟陛下思之臣獨念古先哲王總攬天下其臨斷萬務則罔或不周及於父子之間鮮克無悔豈非愛牽於內而義不勝情者哉伏見皇第二子開國東陽位與潁王相去才一階耳起居出入事頗均齊雖出閣封王具存故事又其天資信厚久炙聖訓友于雍睦固異於人臣獨恐異時年各成長左右使令迭至毁譽歲月寖久或有可念夫有始有卒蓋聖人難之陛下學通古今當為萬世垂法臣謂宜及皓等幼少便為節制待皓以下恩意禮秩當與潁王差逺使限隔無可陵之勢則社稷無疆之福昔者但告外廷臣不敢遽獻愚瞽今輒復陳露者望陛下默留聖意治平元年八月上時為殿中侍御史上英宗論皇子三位當示降差趙瞻臣伏聞别嫌明微者禮之大經並后匹嫡者事之深戒商周庶子外為藩屏漢魏諸王出就封國此所以尊儲二之定分著宗室之大法不使寵愛之私窺圖之計得以萌心也竊見皇子三位興造大備歲荒夏疫作已為譏況宫制院名居非其所雖人子性行自隆友悌而國家禮法貴示降差並列東宫恐乖古典昔唐太宗移太子承乾之弟魏王泰居于武德殿魏文正諫之以為太逼東宫太宗遽然省悟遣還外第然以一存此意終致後患故爭常起於所軋而禍常生於所忽厯觀前代聖君賢父率亦不能盡斯亂原惟陛下精察熟慮使安其所下此議于儒臣俾援證于典禮庶乎朝廷陵僣之疑一定而於骨肉孝悌之意愈深焉至如宫邸之制過麗則侈心生工徒之役違時則乖氣應因兹垂恤一切漸罷實為天下之幸治平二年上時為侍御史上神宗論封太祖後劉攽甲子手詔曰昔藝祖之興以天發之期肇造區夏大謨偉烈被諸萬世而莫髙焉朕奉承聖緒夙夜不敢康乃顧後之子孫而有司未嘗議封爵之文豈朕所以尊大統推親親之意哉且積厚者流必逺施大者報必豐其令中書門下考大宗之籍以屬近而行尊者一人裂土地而王之使常從獻于郊廟世世勿絶以示朕尊祖報本之志焉臣伏見手詔推求太祖皇帝諸孫屬近行尊者立以為王以光大成功偉業此誠陛下追孝祖廟聖恩無已舉百王之所未嘗用而行之則傳所謂禮雖先王未之有可以義起也然竊觀詔㫖所處猶有未諭恭以太祖皇帝傳國太宗雖為兄弟相傳譬猶商之諸王大統所在繼體之君皆太祖子孫也盛德之祀澤厚流光舉在是矣何待復求諸孫而王之如是則祖廟有功不毁之稱列聖繼統丕承之美反不及置一國乎古者惟列國之君無嗣則有求其子孫而紹封之者祖宗之尊不可與此同議又諸侯不得祖天子今封王當自為其國之祖終不敢上承太祖明矣臣以謂陛下欲褒揚藝祖豈無其說按春秋傳曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也文王造周為周太祖子孫封國最多後世不敢與並漢明帝亦曰我子豈可與先帝子等故世祖諸子皆封大國而明帝子才半之也然則帝者之世崇厚始祖之子常必異於繼體矣太祖皇帝之子惟德昭德芳二人陛下何不崇此二國之後世世不降其爵與周漢等盛宗廟祭祀使之在位則藝祖巍巍之慶陛下蒸蒸之孝無不休顯著明矣臣以愚戇待罪禮官知陛下推崇祖廟聖慮超越非羣臣所及猶願考合典禮使其大義可以講說為萬世法故敢冒進瞽言伏望少加采擇熙寧元年八月上時知太常禮院上神宗乞酌古今之宜限服紀之禮楊繪臣竊以帝之盛者宜莫如堯今考諸堯典曰克明俊德以親九族九族既睦平章百姓夫九族之外同姓之親不為少矣而堯所親睦止於九族云者以服紀之異也服紀者其禮之用乎恩生於情者也恩之以無窮之情節之以有限之禮蓋明乎親之不可以無盡也族盡於九法陽之極數也服盡於五法五行之成數也然則服之紀雖盡則同其所自出者忍儕於路人乎於是復為大宗小宗之法以維之為大宗者百世不遷也為小宗者五世則遷也周雅云文王孫子本支百世是由帝堯以來訖于周親睦九族之制蓋殫此矣有天下者曷不欲逺尊其祖然而統之以太祖之廟而不毁外至於六世之上則去廟而為祧去祧而為壇去壇而為墠去墠而為鬼蓋亦明乎親之不可以為無盡也臣謹按春秋魯桓僖宫災孔子在陳聞之曰其桓僖乎蓋以桓僖之廟宜毁而不毁故天以火災戒之也伏覩睦親宅被火災者二廣親宅被火災者亦二旬月之中如此之併豈適丁其時乎臣竊以春秋之義推之蓋二宅之中有親已盡服紀無者而未經裁節於有限之禮故天以火災戒之乎厯考上世尊族或封以就國或官而任外而自唐明皇而後世叢於宫宅而不任以政故本朝依其制也然國初之制凡以蔭授官率皆以其父祖合任之數授之今則長男生踰年而受官其下之男皆生五年而受官矣舊制止授班行今則皆授南班官矣十年前止滿數百今則踰千人矣又其間子孫衆多者數房而共一室者矣安可不更張其事哉欲乞陛下酌古今之宜限服紀之禮廣采衆議裁其䕃子之數立其出官之制設大宗小宗之法以正其統其餘支庶之服紀盡者並許出居於外以合於帝堯親睦九族之道熙寧二年上時知諫院十一月下詔曰自我祖宗親敘九族大則疏封於爵土次則屬籍於閨臺並留京師參奉朝議然而世緒寖逺皇枝益蕃服有親踈則恩有隆殺才有賢否則祿有重輕今而一貫於周行是亦奚分於流别雖親睦之道誠廣而德施之義未周故廷臣數言宰相繼請謂宜定正限以等彛朕推親戚之間經史有訓漢唐之世典故具存或以九族定尊卑或以五宗紀逺近或聽推恩而分子弟或許自試而效才能或宗子之賢得從科舉或諸王之女自主婚姻盡前世之所行顧當今之未備况我朝制作動法先王豈宗室等衰乃無定著因俾羣公之合議將為一代之通規載攬奏封具陳條目以謂祖宗昭穆是宜世出之封王公子孫抑有親親之殺若乃服屬之既竭洎乎才藝之並優在隨器以甄揚使當官而勉懋至於任子之令通婚之儀凡曰有司之常一用外官之法僉言既久朕意何疑告於將來用頒明命依中書樞密院所奏施行上神宗乞立宗子課試法趙彥若臣伏見本朝宗室舊有召試出身之令及熙寧初始命宗子出補外官分事任列於有職之臣此誠天下至公盛德之事祖宗所未嘗有至陛下已自得之加以聖澤涵育宗英衆多當此之際有司不能宣德明恩建白所職請廣選舉以協隨時之義少佐當寧勤求之意而牽常抱俗取過目前則素餐竊位於何塞責昔漢之取人不限踈近而宗正有郡國歲計上籍之文劉向以宗室髙才進對待詔唐宗正寺歲送進士二十人與國子監京兆府相此李程李肱皆為舉首雖復繼周而下去古已久未可以諭當世然取其稍近古今者或可施行今宗正寺侍祠之外專掌玉牒屬籍而不豫薦士在於聖時竊恐臣之本職有所未稱謂宜具為條統俾諸教官依國子監外官學例為課試法每遇秋試許就宗正寺投狀鎖試别立人數頗示優異著為格令俾其競勸賢戚並用紀綱四方何獨棫朴之雅乎凡天下事皆如權衡重於此則輕於彼矣宗室之間自有考校賢者獲升不肖者退抑分當裁損必無觖望夫親賢兼進布列中外以鎮安四海為磐石之固與愚智混淆聚於一處徒殫祿廩而無所事者不可同日語也元豐元年五月上時知宗正丞上神宗乞特燕宗室以齒黃履臣聞常棣之詩曰儐爾籩豆飲酒之飫兄弟既具和樂且孺蓋言安寧之時有禮有儀然後能不失其親族之心也伐木之詩曰既有肥羜以速諸父又曰籩豆有踐兄弟無逺蓋言以禮著誠每有隆而無殺也司儀曰王燕則諸侯毛中庸曰燕毛所以序齒蓋言燕之以齒而孝悌之道達矣臣伏覩陛下之於宗室以爵貴之以祿冨之以詩書禮樂教之以忠孝仁義成之可謂得親敘之道矣至於與羣臣同戚休而有暇乎飲食燕樂則亦未嘗不使之與也然而特燕以齒猶未之講恭惟萬機之暇誠一行之以為太平盛事蓋亦美矣熙寧六年上時知太常禮院上哲宗乞早安存遭火災宗室王巖叟臣竊聞日近宗室火災熾大延及至廣顛沛倉皇不知所舍寓於佛寺暴露庭廡一無壅蔽都人觀望虧損事體極不為便料聖恩已加存撫不待臣言然臣聞聽所得思慮所及不敢遂默此誠陛下所當留念伏望睿慈嚴敕有司速尋可居之地早令安處以昭陛下救災恤難篤於宗族之仁心以示陛下禁非防邪護惜國家之大體元祐元年三月上時為左司諫上哲宗應詔論宗室二事王巖叟臣前日伏聽德音以旱暵為災憂勞惻怛發於至誠引咎自責惟恐有所不及令臣等講求闕失以應天變臣敢不極盡思慮冀補萬分惟陛下察其愚而憐其志幸甚一王者之道以篤親親隆仁愛為先也臣聞宗室不係賜名授官孤遺之家二十餘戶六十餘人全無祿食朝夕不能自存將有流落之憂京師士民無不傷之皆言雖為踈逺終是祖宗苖裔國家於事體合有處置不當便若路人視而不恤聞昨因人言已送禮部立法今將半年不見了當􅑏獨困窮勢何可待臣謂此事若執政大臣留意須㬰之間可以裁定伏望陛下批降指揮更不下禮部只令執政速議可行之法早使宗支霑被聖澤以成王室之美一昔者世居不道自取誅絶固無足哀然世之仁人君子亦欲陛下有以施厚恩崇盛德臣不忍不言按漢景帝二年吳楚七國宗室遂除其籍至武帝元光二年復七國宗室絶屬者厯代以為漢武之美今天下皆曰世居之惡非若七國武帝之仁非及陛下猶能復七國之籍使上屬於宗室臣以謂緣世居絶屬者願陛下亦許復之庶幾一開幽鬱有感至和臣不勝愚忠元祐元年四月上時為左司諫上哲宗薦令畤蘇軾臣聞之詩曰懷德維寧宗子維城宗室之有人邦家之光社稷之衛也周之盛時其卿士皆周召毛原非王之伯叔父則其子弟也逮至兩漢河間東平之德歆向之文天下以為口實而唐之宗室武略如道宗孝恭文章如白與賀者不可以一二數而以功名至宰相者有九人焉自建隆以來纍聖執謙不私其親幹國治民不及宗子雖有文武異才終身不試神宗皇帝實始慨然欲出其英髦與天下共之故增立教養選舉之法行之二十年出入中外漸就器使未見有卓然顯聞稱先帝意者夫豈無人蓋朝廷未有以大聳動之耳臣伏見左承議郎令畤事親篤孝內行純備博學經史手不釋卷更事通敏文采俊麗志節端亮議論英發體兼衆器無適不宜臣嘗見其所著述筆力雅健博貫子史蓋清廟之瑚璉明堂之杞梓也使其生於幽逺猶當擢用而況近託肺腑已䝉試用者乎伏望聖慈特賜考察召致館閣養其髙才而遂其賢業以風動宗室觀示海內成先帝之意不以臣人微言輕而廢其請也元祐七年五月上時以龍圖閣學士知潁州上哲宗論宗景以妾為妻陳次升臣風聞有㫖判宗司濟陽郡王宗景妻亡立侍姬楊氏為正室者切以宗景身居尊屬職在判宗一有動作皇族取則今若以楊氏為妻在卑者必以為尊在幼者必以為長豈惟名分紊亂不足以表儀宗室其在人情亦有未安兼宗室嫁娶於條必須一代有官其進納伎術工商雜類之家皆不許為親楊氏起於卑微若為正室未審果不戾於上條乎求之禮經考之條法皆未為允昔齊桓公霸者耳葵邱之㑹盟誓之戒猶曰無以妾為妻況明天子在上禮義法度之所自出而宗藩大臣乃爾傳之天下書之典策其於聖朝寧不為纍伏望睿㫖降付有司考求禮法如有違戾即乞改正施行不勝幸甚紹聖二年十二月上時為殿中侍御史上徽宗乞不根治蔡王之獄江公望臣聞天下之理有隙則物皆可入故聖人塗隙於未開之前有跡則瑕皆可指故聖人泯跡於未形之際物皆可入則親者離矣瑕皆可指則疑者實矣在物之理雖甚踈逺者尚且如此矧閨門之內骨肉之間其可不察耶臣訪聞蔡王指使列況告鄧鐸者有不順之語浸淫恐行及蔡王矣開封府已行根治臣聞之駭汗流浹驚悸不自持豈有孝治之世太平之時乃容銜私怨逞不軌謀離間陛下骨肉之親者乎象之於舜焚廩浚井其逆心已萌矣舜未嘗藏怒宿怨卒封之有庳而富貴之唯恐不得象之心也至魏文帝褊忿疑忌一陳思王且不能容故有煮豆燃豆萁相煎何太急之語為天下後世笑豈不思兄弟人之大倫也有手足相捍之親有首尾相應之義有塤箎之和有友于之樂故孔子有以不間父母昆弟之言為孝蓋親隙不可開隙開則言易乖離疑二之跡不可顯跡顯則事難磨滅陛下得天下天人歸之也章子厚嘗簾前持異議已有隙跡矣蔡王出於無心年尚少未達禍亂之萌故恬不為恤陛下一切包容已開之隙復塗已顯之跡復泯矣恩意渥縟觀陛下之情已不失兄弟之歡矣與夫區區未能忘天下操心自狹者不啻相十百矣伏望陛下勿以曖昧無根之言置諸至親骨肉之間俾陛下有魏文相煎太急之隙而忘大舜親愛之道豈治世之美事也伏望陛下密語所司凡無根之言勿形案牘捶楚之下何求弗得一有浸淫旁及蔡王之語不識陛下將如何處之莫若略治所告之人粗見嫌怨情狀並流之嶺表以示天下神器非人心天命弗得非口舌強力可爭也以示天倫之愛雖天下莫之奪也雖善為間言莫之離也儻形案牘有瑕可指一入胸次終身不忘雖父子之間尚未能磨滅況兄弟乎跡不可泯隙不可塗則骨肉離矣陛下將何道以治天下也蔡王萬一䝉犯霧露之疾神考在天之靈豈不知之陛下將何面目見神考於太廟乎書曰克明俊德以親九族九族既睦平章百姓詩曰刑于寡妻至于兄弟以御于家邦故至德要道足以風動天下未有不自親者始也伏望陛下厚而勉之建中靖國元年七月上時為左司諫上徽宗論宗子有文行才術者乞加旌别仲渙臣伏覩方今宗室蕃衍陛下親敘族屬教養作成于兹有年才能並出咸拭目以幸千載之遇然混於常例格於銓選有志於事業者不為不多若不特加旌别無以昭示激勸欲望聖慈特降睿㫖應宗子有文行才術名實顯著者許本司具以名聞斷自淵衷不次升擢庶使人人奮勵以副陛下樂育之意宣和二年六月上時知大宗正寺宋名臣奏議卷三十二
