body:
  text: 宋名臣奏議巻一百三宋趙汝愚編財賦門理財下上神宗乞去三冗蘇轍臣聞善為國者必有先後之次自其所當先者為之則其後必舉自其所當後者為之則先後並廢書曰欲登髙必自下欲陟遐必自邇世未有不自下而能髙不自近而能逺者然世之人嘗鄙其下而厭其近務先從事於髙逺不知其不可得也詩曰無田甫田維莠驕驕無思逺人勞心忉忉以為田甫田而力不給則田莠而不治不若不田也思逺人而徳不足則心勞而不獲不若不思也欲田甫田則必自其小者始小者之有餘而甫田可啓矣欲求逺人則必自其近者始近者既服而逺人自至矣茍由其道其勢可以自得茍不由其道雖强求而不獲也臣愚不肖盖嘗試妄論今世先後之宜而竊觀陛下設施之萬一以為所當先者失在於不為而所當後者失在於太早然臣非敢以為信然也特其所見有近於是者是以因其近似而為陛下深言之伏惟陛下即位以來躬親庶政聪明睿智博達宏辯文足以經治武足以制斷重之以勤勞加之以恭儉凡古之帝王曠世而不能有一焉者陛下一旦兼而有之矣夫以天縱之姿濟之以求治之心施之於事宜無為而不成無欲而不遂今也為國厯年於兹而治不加進天下之弊日益於前世天下之人未知所以適治之路災變横生川原震裂江河湧沸人民流離災變繼作厯月移時而其變不止此臣所以日夜思念而不曉疑其先後之次有所未得者也今世之患莫急於無財而巳財者為國之命而萬事之本國之所以存亡事之所以成敗常必由之昔趙充國論邊備之計以為湟中榖斛八錢糴三百萬斛羌人不敢動矣諸葛亮用兵如神而以糧道不繼屢出無功由是觀之茍無其財雖有聖賢不能自致於跬步茍有其財雖庸人可以一日而千里陛下頃以西夏不臣赫然發憤建用兵之策招來横山之民將奪其險阻破壊其國而後巳方是之時夏人殘虐失衆横山之民厭苦思漢而又乗其荐饑茍加之以兵此非計之失者也然而縁邊無數月之糧關中無終嵗之儲而所興之役有莫大之費陛下方且泰然不以為憂以為萬舉而有萬全之功既而邊臣失律先事輕發亦既入踐其國係虜其民矣然而陛下得其地而不敢收獲其人而不敢臣雖有成功而不敢繼也其終卒至於廢黜謀臣而講和好夫陛下謀之於朞年之前而罷之於既發之後豈以為是失當而悔之哉誠無財以繼其後爾且夫財之不足是為國之先務也至於鞭笞四夷臣服異𩔖是極治之餘功而太平之粉飾也然今且先之此臣所以知其先後之次有所未得者也今者陛下懲前事之失出秘府之財徙内郡之租賦督糧運之吏備沿邊三嵗之蓄臣以此疑陛下之有意乎財矣然猶以為未也何者秘府之財不可多取而内郡之民不可重困可以紓目前之患而未可以為長久之計此臣所以求効其區區而不能自巳也盖善為國者不然知財之最急而萬事賴焉故常使財勝其事而事不勝財然後財不可盡而事無不濟財者車馬也事者其所載物也載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以渉塗泥而車不僨登坂險而馬不躓今也四方之財莫不盡取民力屈矣而上用不足平居惴惴僅能以自足而事變之生復不可料譬如弊車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有隂雨之變陵谷之險其患必有不可知者故臣深思極慮以為方今之計莫如豐財然臣所謂豐財者非求財而益之也去事之所以害財者而巳矣夫使事之害財者盡去雖不求豐財然而求財之不豐亦不可得也故臣謹為陛下言事之害財者三一曰冗吏二曰冗兵三曰冗費冗吏之說曰請原古之所以置吏之意有是民也而後有是官有是官也而後有是吏量民而置官量官而求吏其本凡以為民而巳是以古者即其官以取人郡縣之職缺而取之於民府寺之属缺而取之於郡縣出以為守令入以為卿相出入相受中外相貫一人去之一人補之其勢不容有冗食之吏近世以來取人不由其官士之來者無窮而官有限極於是兼守判知之法生而官法始壊浸滛分散不復其舊是以吏多於下上下相窒譬如决水於不流之澤前者未盡來者巳至填堙充滿一䧟於其中而不能出故布衣之士多方以求官巳仕之吏多方以求進下慕其上後慕其前不愧詐偽不恥爭奪禮義消亡風俗敗壊勢之窮極遂至於此夫人情紓則樂易樂易則有所不為窘則懣亂懣亂則無所不至今使衆人相與皆出於隘足履相躡肩肘相逮傍徨而不得進又將禁其奔走而爭先者茍將禁之則莫如止來者而闢其隘今也敺市人而納之不勝其多也設險於中塗而艱難之是以法愈設而爭愈甚惟陛下以時救之下哀痛之書明告天下以吏多之故與之更立三法其一使進士諸科増年而後舉其額不増累舉多者無推恩其說曰凡今之所以至於不可勝數者以其取之之多也古之人其擇吏也甚精人知吏之不可妄求故不敢輕為士為士者皆其脩潔之人也今世之取人誦文書習程度未有不可為吏者也其求之不難而得之甚樂是以羣起而趨之凡今農工商賈之家未有不捨其舊而為士者也為士者日多然而天下益以不治舉世所謂居家不事生産仰不養父母俯不恤妻子浮游四方侵擾州縣造作誹謗者農工商賈不與也祖宗之世士之多少其比於今不能一二也然其削平僣亂創制立法功業卓然見於後世今世之士不敢望其萬一也士之多不及於今世而功則過之無足怪者取之至少則人不敢輕為士其所取者皆州郡之選人也故為是法使人知上意之所向十年之後無實之士將不黜而自减且夫設科以待天下之士盖將使其才者得之不才者不可得也吾則取之而彼則不能得猶曰雖不能得而累舉多者必取無棄則是以官徇人也且累舉之士𩔖非少年矣耳目昏塞筋力疲勌數日而計之知其不能有所及者也則其為政無所賴矣今有人畜牛羊而求牧既取其壯者又取其老者取其壯者曰吾喜其壯而巳取其老者曰吾憐其老而巳如憐其老則曷為以累牛羊哉茍誠以為有遺才焉則今所謂遺逸之書有以收之矣其二使官至於任子者任其子之為後者世世禄仕於朝襲簪紱而守祭祀可以無憾矣然而為是法也則必始於二府法行於賤而屈於貴天下將不服天下不服而求法之行不可得也盖矯失以救患者必有所過而後濟臣非不知二府之不可齒庶官也其三使百司各損其職掌而多其居職之嵗月其說曰百司臣不得而盡詳也請言其尤甚者莫如三司三司之吏世以為多而不可損何也國計重而簿書衆也臣以為不然主大計者必執簡自處而以繁寄人以簡自處則心不可亂心不可亂則利至而必知害至而必察以繁寄人則事有所分事有所分則毫末不遺而情偽必見今則不然舉四海之大而一毫之用必㑹於三司故三司者案牘之委也案牘既積則吏不得不多案牘積而吏多則欺之者衆雖有大利害不能察也夫天下之財下自郡縣而至於轉運轉相鈎較足以為不失矣然世常以轉運使為不可獨信故必至於三司而後巳夫茍轉運使之不可獨信而必三司之可任則三司未有不責成於吏者豈三司之吏則重轉運使與故臣以為天下之財其詳可分於轉運司三司嵗攬其綱目既使之得優㳺以治財貨之源又可頗損其吏以絶亂法之弊茍三司猶可損也而百司可見矣然而此三法者皆世之所謂拂世戾俗召怨而速謗者也今且將行之臣非敢犯衆人之怒而行此危事也以為有可行之道焉何者自臺省六品諸司五品一郊而任一人自兩制以上一嵗而任一人此祖宗百年之法相承而不變者也仁宗之世則損之三載而考績無罪者遷其官自唐以來亦未始有變者也而英宗之世則増之此二者夫豈便於世俗哉然而莫敢怨者以為吏多而欲損者天下之公義其不欲者天下之私計也以私計而怨公義其為怨也不直是以善為國者循理而不䘏怨知其無能為也且今此三法者固未嘗行也然而天下亦不免於怨何者士之出身為吏者捐其生業棄其田里以盡力於王事而今也以吏多之故積勞者久而不得遷去官者久而不得調又多為條約以沮格之減罷其舉官破壊其考第使之窮窘無聊求進而不遂此其為怨豈減於布衣之士哉鈞之為怨皆將不免然使新進之士日益多國力匱竭而不能支十年之後其患必有不可勝言者故臣願陛下親斷而力行之茍日増之吏漸於衰少則臣又將有以治其舊吏使諸道職司每嵗終任其所部郡守監郡各任其属曰自今以來未有以私罪至某贓罪正入已至若干者二者皆自上鈞其輕重而裁之已而以他事發則與之同罪雖去官與赦不降也夫以私罪至某贓罪正入已至若干其為惡也著矣而上不察則上之不明亦可知矣故雖與之同罪而不過今世之法任人者任其終身茍其有罪終身鈞坐之夫任人之終身而無過任其未然之不可知者也任人之嵗終而無過任其已然之可知者也臣請得以較之任其未然之不可知雖聖人有所不能任其巳然之可知雖衆人能之今也任之以聖人之所不能既不敢辭矣而况任之以衆人之所能顧不可哉且按察之吏則亦不患其不知也患其知而未必皆按曰是無損於我而徒以為怨云爾今使其罪及之其勢將無不問陛下誠能擇奉公之臣而使行之陛下厲精而察之去民之患如除腹心之疾則其以私罪致某贓罪正入巳至若干者非復過誤適䧟於深文者也茍遂放歸終身不齒使姦吏有所懲則冗吏之弊可去矣冗兵之說曰臣聞國朝創業之初四方割據中國地狹兵革至少其後蕩滅諸國拓地既廣兵亦随衆雍熈之間天下之兵僅三十萬方此之時屯戍征討百役並作而兵力不屈未嘗有兵少之患也自咸平景徳以來契丹内侵繼遷叛逆每有警急將帥不問得失輒請益兵於是召募日増而兵額之多遂倍前世其後寳元慶厯之間元昊竊發復使諸道㸃民為兵而沿邊所屯至八十萬自是天下遂以百萬為額雖復近嵗無事而關中之兵至於二十八萬舉雍熈天下之衆適以備方今關中一隅之用兵多之甚於此見矣然臣聞方今宿邊之兵分𨽻堡障戰兵統於將帥者其實無㡬每一見賊賊兵常多我兵常少衆寡不敵每戰輒敗往者將帥失利未有不以此自觧者也夫祖宗之兵至少而常若有餘今世之兵至多而常患於不足此二者不可不察也兵法有之曰興師十萬出征千里百姓之費公家之奉日費千金内外騷動怠於道路者七十萬家而爵禄百金不能知敵之情者不仁之至也故三軍之士莫親於間賞莫重於間間者三軍之司命也臣竊惟祖宗用兵至於以少為多而今世用兵至於以多為少得失之原皆出於此何以言之臣聞太祖用李漢超馬仁瑀韓令坤賀惟忠何繼筠等五人使備契丹用郭進武守琪李謙溥李繼勲等四人使備河東用趙賛姚内斌董遵誨王彦升馮繼業等五人使備西𦍑皆厚之以關市之征饒之以金帛之賜其家属之在京師者仰給於縣官貿易之在道路者不問其商稅故此十四人者皆富厚有餘其視棄財如棄糞土賙人之急如恐不及是以死力之士貪其金錢捐軀命冒患難深入敵國伺其隂計而効之至於飲食動静無不畢見每有入㓂輒先知之故其所備者寡而兵力不分敵之至者舉皆無得而有喪是以當此之時備邊之兵多者不過萬人少者五六千人以天下之大而三十萬兵足為之用今則不然一錢以上皆藉於三司有敢擅用謂之自盗而所謂公使錢多者不過數千緡百需在焉而監司又伺其出入繩之以法至於用間則曰官給茶綵夫百餅之茶數東之綵其不足以易人之死也明矣是以今之為間者皆不足恃聽傳聞之言采疑似之事其行不過於出境而所問不過於熟户茍有藉口以欺其將帥則止矣非有果能知敵之情者也敵之至情既不可得而知故常多兵以備不意之患以百萬之衆而常患於不足由此故也陛下何不權其輕重而計其利害夫關市之征比於茶綵則多而三十萬人之奉比於百萬則約衆人知目前之害而不知嵗月之病平居不忍棄關市之征以與人至於百萬則恬而不知怪昔太祖起於布衣百戰以定天下軍旅之事其思之也熟矣故臣願陛下復脩其成法擇任將帥而厚之以財使多養間諜之士以為耳目耳目既明雖有彊敵而不敢輒近則雖雍熈之兵可以足用於今世陛下誠重難之臣請陳其可減之實何者今世之彊兵莫如沿邊之土人而今世之惰兵莫如内郡之禁旅其名愈髙其廩愈厚其廩愈厚其材愈薄往者西邊用兵禁軍不堪其役死者不可勝計𦍑人每出聞多禁軍輒舉手相賀聞多土兵輒相戒不敢輕犯以實較之土兵一人其材力足以當禁軍三人禁軍一人其廩給足以贍土兵三人使禁軍萬人在邊其用不能當三千人而常耗三萬人之蓄邊郡之儲比於内郡其價不啻數倍以此權之則土兵可益而禁軍可損雖三尺童子知其無疑也陛下誠聽臣之謀臣請使禁軍之在内郡者勿復以戍邊因其老死與亡而勿復補使足以為内郡之備而止去之以漸而行之以十年而冗兵之弊可去矣冗費之說曰世之冗費不可勝計也請言其大與臣之所知者而陛下以𩔖推之臣聞事有所必至恩有所必窮事至而後謀則害於事恩窮而後遷則傷於恩昔者太祖太宗輯睦九族以先天下方此之時宗室之衆無㡬也是以合族於京師久而不别世厯五聖而太平百年宗室之盛未見有過此時者禄廩之費多於百官而子孫之衆宫室不能受無親疎之差無貴賤之等自生齒以上皆養於縣官長而爵之嫁娶䘮葬無不仰給於上日引月長未有知其所止者此亦事之所必至而恩之所必窮者也然而未聞所以謀而遷之古者天子七廟三昭三穆與太祖而七以人子之愛其親推而上之至於其祖由祖而上至於百世宜無所不愛無所不愛則宜無所不廟茍推其無窮之心則百世之祖皆廟而後為稱也聖人知其不可故為之制七廟之外非有功徳則迭毁春秋之祭不與莫貴於天子莫尊於天子之祖而廟不加於七何者恩之所不能及也何獨至於宗室而不然臣聞三代之間公族有以親未絶而列於庶人者兩漢之法帝之子為王王之庶子猶有為侯者自侯以降則庶子無復爵土盖有去而為民者有自為民而復仕於朝者至唐亦然故臣以為凡今宗室宜以親疎貴賤為差以次出之使得從仕比於異姓擇其可用而試之以漸凡其秩禄之數遷叙之等黜陟之制任子之令與異姓均臨之以按察持之以寮吏威之以刑禁以時察之使其不才者不至於害民其賢者有以自効而其不任為吏者則出之於近郡官為廬舍而廩給之使得占田治生與士庶比今聚而養之厚之以不訾之禄尊之以莫貴之爵使其賢者老死鬰鬰而無所施不賢者居處隘陋戚戚而無以為樂甚非計之得也昔唐武徳之初封從昆弟子自勝衣以上皆爵郡王太宗即位疑其不便以問大臣封徳彛曰爵命崇則力役多以天下為私奉非至公之法也於是疎属王者降為公夫自王而為公非人情之所樂也而猶且行之今使之爵禄如故而獲治民雖有内外之異宜無有怨者然臣觀朝廷之議未嘗敢有及此何者以宗室之親而布之於四方懼其啓姦人之心而生意外之變也臣竊以為不然古之帝王好疑而多防雖父子兄弟不得尺寸之柄幽囚禁錮齒於匹夫者莫如秦魏然秦魏皆數世而亡其所以亡者劉氏與司馬氏而非其宗室也故為國者茍失其道雖胡越之人皆得謀之茍無其釁雖宗室誰敢覬者惟陛下蕩然與之無疑使得以次居外如漢唐之政此亦去冗費之一端也臣聞漢唐以來重兵分於四方雖有末大之憂而饋運之勞不至於太甚祖宗受命懲其大患而略其細故歛重兵而聚之京師根本既强天下承命而服然而轉漕之費遂倍於古凡今東南之米每嵗遡汴而上以石計者至五六百萬山林之木盡於舟楫州郡之卒弊於道路月廩嵗給之奉不可勝計往返數千里饑寒困廹每每侵盜雜以他物米之至京師者率非全物矣由此觀之今世之法直以其力致之而不計其患非法之良也臣願更為之法舉今每嵗所運之數而四分之其二即用舊法官出船與兵而漕之凡皆如舊其一募六道之富人使以其船及人漕之而所過免其商稅能以若干至京師而無所欺盜敢失者以今三班軍大將之賞與之方今濱江之民以其船為官運者不求官直盖取官之所入而不覆較者得其贏以自潤而富民之欲仕者往往求為軍大將以此推之宜有應募者其一官自置場而買之京師京師之兵當得米而不願者計其直以錢償之夫物有常數取之於南則不足於北捨之於東則有餘於西此數之必然而不可逃者也今官欲買之其始不免於貴貴甚則東南之民傾而赴之赴之者衆則將反於賤致賤必以貴致貴必以賤此亦必然之數也故臣願為此二者與舊法皆立試之利害而較其可否必將有可用者然後舉而從之此又去冗費之一端也臣聞富國有道無所不恤者富之端也不足恤者貧之原也從其可䘏而收之無所不收則其所存者廣矣從其無足䘏而棄之無所不棄則其亡者多矣然而世人之議者則不然以為天下之富而顧區區之用此有司之職而非帝王之事也此說之行於天下數百年於兹矣故天下之費其可已者常多於舊臣不敢逺引前世請言近嵗之事自嘉祐以來聖人迭興而天下之吏京秩以上再遷其官天下郡守職司再補其親戚自治平京師之大水與去嵗河朔之大震百役並作國有至急之費而郊祀之賞不廢於百官自横山用兵供億之未定與京師流民勞徠之未息官私乏困日不暇給而宗室之喪不俟嵗月而葬臣以此觀之知朝廷有無足䘏之義臣誠知事之既往無可為者然茍自今從其可䘏而收之則無益之費猶可漸減此又去冗費之一端也臣不勝拳拳私憂過計故為是三說以獻伏惟陛下思深謀逺聽斷詳盡於天下之事無所不矚臣之所陳何足言也然臣愚以為茍三冗未去要之十年之後天下將益衰耗難以復治陛下何不講求其原而定其方畧擇任賢俊而授之以成法使皆乆其官而後責其成績方今天下之官泛泛乎皆有欲去不久之心侍從之官踰年而不得代則皇皇而不樂今雖不能使之盡久然至於諸道之職司三司之官吏沿邊之將佐此皆與天子共成事者也天下之事將責之而不久其任開其源者不見其流發其謀者不見其功此事之所以不得成也陛下誠擇人而用之使與二府皆久於其官人知不得茍免而思長久之計君臣同心上下協力磨之以嵗月如此而三冗之弊乃可去也然而為此猶有所患何者今世之士大夫惡同而好異疾成而喜敗事茍不出於巳小有齟齬不合則羣起而譟之借如今使按察之官任其屬吏嵗終而無過此其勢必將無所不按得罪者必將多於其舊然則天下之口紛然非之矣不幸而有一不當衆將羣指以罪法一不當不能動不幸而至於再三雖上之人亦將不免於惑衆人非之於下而朝廷疑之於上攻之者衆而持之者不堅則法從此敗矣盖世有耕田而以其耜殺人者或者因以耕田為可廢夫殺人之可誅與耕田之不可廢此二事也安得以彼而害此哉故夫按人而不以其實者罪之可也而法之是非則不在此茍陛下誠以為可行必先能破天下之浮議使良法不廢於中道如此而後三冗之弊可去也三冗既去矣天下之財得以日生而無害百姓充足府庫盈溢陛下所為而無不成所欲而無不如意舉天下之衆惟所用之以攻則取以守則固雖有西戎北狄不臣之國宥之則為漢文帝不宥則為唐太宗伸縮進退無不在我今陛下不事其本而先舉其末此臣所以大惑也臣不勝憤懣越次言事雷霆之譴無所逃避熈寧二年三月上時為大名府留守推官上神宗乞明法度以養天下之財曽鞏臣聞古者以三十年之通制國用使有九年之蓄而制國用者必於嵗杪盖量入而為出國之所不可儉祭祀是也然不過用數之仂則先王養財之意可知矣盖用之有節則天下雖貧而富易致也漢唐之始天下之用嘗屈矣文帝太宗能用財有節故公私有餘所謂天下雖貧其富易致也用之無節則天下雖富其貧亦易致也漢唐之盛時天下之用常裕矣武帝明皇不能節其制度故公私耗竭所謂天下雖富其貧亦易致也宋興承五代之弊六聖相繼與民休息故生齒既庶而財用有餘且以景徳皇祐治平校之景徳户七百三十萬墾田一百七十萬頃皇祐户一千九十萬墾田二百二十五萬頃治平户一千二百九十萬墾田四百三十萬頃天下嵗入皇祐治平皆一億萬以上嵗費亦一億萬以上景徳官一萬餘員皇祐二萬餘員治平幕職州縣官三千三百餘員緫二萬四千員景徳郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆一倍於景徳郊之費亦一倍於景徳官郊之數不同如此則皇祐治平用財之端多於景徳也誠詔有司按尋載籍而講求其故使官之數入者之多門可考而知郊之費用財之多端可考而知然後合議其可罷者罷之可損者損之使天下如皇祐治平之盛天下之用官之數郊之費皆同於景徳二者所省者盖半矣則又以𩔖而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之約者必本其所以約之由而從之如是而力行以嵗入一億萬以上計之所省者十之一則嵗有餘財一萬萬馴致不已至於所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每嵗之入存十之三耳盖約而言也今臣之所陳亦約而言之今其數不能盡同然要其大致必不逺也前世於彫敝之時猶能易貧而為富今吾以全盛之勢用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下冲静質約天性自然乘輿器服尚方所造未嘗用一竒巧嬪嬙左右掖庭之間位號多闕躬履節儉為天下先所以憂憫元元更張庶事之意至誠惻怛格於上下其於明法度以養天下之財又非陛下之所難也臣誠不自揆敢獻其區區之忠惟陛下裁擇元豐三年十一月上時判三班院上哲宗乞裁減冗費韓忠彦臣等近奉敇裁減冗費上自宗室貴戚下至官曹胥吏旁及宫室器械凡無益過多之用皆得量事裁減惟獨宫掖浮費名件不少有司不得盡見未敢輒議竊見近降詔書以方將裁損入流以清取士之路遂命今後每遇聖節大禮生辰太皇太后皇太后皇太妃合得恩澤並四分減一欲以身先天下詔書既出中外臣庶皆知聖朝以私徇公至有感激流涕者臣等仰測聖意克巳為人無所不可有欲裁損宫掖浮費與裁損私門恩澤何異然而至今未見施行者盖有司失於建明則臣等之罪也謹按寳元二年嘗命近臣詳定裁損冗費時諫官韓琦建言請令三司取入内内侍省并御藥院内東門司先朝及今來賜予支賞之目比附酌中減省其無名者一切罷去時有詔禁中支費只令入内内侍省御藥院内東門司相度減省報詳定所其臣寮支賜即許㑹問入内内侍省等處施行及慶厯元年又詔入内内侍省等處取先帝時帳籍比較近年内中用度之數以聞是時所損浮費數目極多為益不細臣等欲乞陛下推廣前日減省恩澤已行之心仰法寳元慶厯祖宗已試之效使天下明知陛下節用裕民自宫禁始則凡有裁損誰不心服臣等不勝區區干犯鈇鉞元祐三年閏十二月上時為户部尚書同蘇轍韓宗道上上徽宗進國用須知陳瓘臣伏見仁祖之時臣寮上言曰周制冡宰制國用唐宰相兼鹽鐵轉運使或判户部或判度支然則宰相制國用從古然也今中書主民樞宻主兵三司主財各不相知故財已匱而樞宻院益兵不已民已困而三司取財不已中書視民之困而不知使樞宻院減兵三司減財以救民困者制國用之職不在中書故也臣謂當仁祖之時官制未立自元豐以来制國用之職在三省矣户部右曹之所掌乃天下財用之根本也神考理財之政所以法先王而慮萬世元祐之臣雖有紛更然天下所積財物朝廷亦不盡取今則一年之間連下五敕凡提舉司所積錢取之殆盡竭天下根本之財壊神考理財之政繼志述事豈宜然哉今具五次朝㫖下項一元符三年九月八日勅府界諸路見管坊場錢除本路一年合支數外將剩數更留一半准備支用餘一半特令起發上京應副朝廷支用一元符三年十一月十九日勑府界諸路見管常平役錢除本路一年合支數外將剩數更留一半准備支用餘一半特令起發上京應副朝廷支用一建中靖國元年二月二十三日勑諸路提舉司將見在抵當息錢並起發上京應副朝廷支用一建中靖國元年三月初一日勑諸路提舉司將見在量添酒錢依抵當息錢已得指揮施行今後支使不盡錢數並封樁准備朝廷支用一建中靖國元年三月初二日勑府界諸路提舉司所管錢物除依指揮起發及除留出本年合支散外餘剩更留一半錢數不多深屬闕少糴本今於元祐年中所納助役錢内撥一半充常平糴本餘一半許𣙜貨務召人入便或計置起發上京兊那往三路添助常平糴本臣竊惟神考立法之意取民之財還以助民故天下諸路州州縣縣各有蓄積將以待非常之用不使有偏乏之處故右曹錢物不得與别司交雜違條輒用者徒二年自元豐七年以常平等積剩財物補助邊費嵗取二百萬緡為額只以三年為期盖不欲多費天下民財以資邊用神考愛民之慮可謂深矣逺矣今當紹述此意豈宜取三十年間根本蓄藏之物一切大違成憲而偏用之於一方乎且上件五項所取之𩔖以天下計之萬數不少於此𩔖内河東陜西京西三路之撥與提刑司者其數㡬何河北路交撥與措置糴買司者其數㡬何川陜西路具樁管數目關鄰路召人入便及與茶馬司對數交兊者其數㡬何臣謂凡此八路那移兊撥皆主於邊費而巳自餘路分起發入京西飛於塞下者又不知其㡬何然則天下蓄積之物皆運之於邊矣若使一勞而久逸暫費而永寧則三十年積之而一日用之猶足以濟一時之權成不得巳之計今則不然但剔割諸路以補一方之瘡痍而已臣恐一方瘡痍補之未合而天下乏財之患有不可深言者矣臣生長南方不能周知四境之事且以意度之西邊財用匱竭則供億調度必取諸東南東南積剩之物今於無事之時既巧取而偏用之矣或有東南意外不庭之患又將取之於何地乎臣竊考唐武徳以後開拓邊境地連西域置都督列州縣開元中置節度使以統之軍城戍邏萬里相望然而當此之時糗糧出於屯田馬牛出於監牧戍卒繒布取足於山東而巳未嘗罄天下之積以從事於一方也今五勑之所取非嵗嵗常有之數方主議臣充位之時賴此紓目前之急為廟堂久逺之慮當如之何制國用者既不䘏此議棄地者又執偏見不詢衆庶之論不盡邊臣之說各以私意自復其言因循相仍馴致大患縱以闕乏為憂不過請行鬻爵之𩔖耳神考創法比隆於三代彼中世之陋法如鬻爵之𩔖乃熈寧初議之所不取也當時條例司臣寮參議論者今為輔相忍不為陛下一言之乎又况神考自有為之初以至法度之成憂勤不倦非一日之積也所以建子孫萬世之業為四海無疆之慮何意今日繼述先緒乃復遽取中世之陋法而行之者也使財用有餘則朝廷議論自不至此然則神考十九年焦勞之慮特為今日目前之費爾豈不痛哉又聞獻議之臣欲裁損州郡供給減削吏人請受以佐國用樞宻院減罷陜西諸路准備官員數以節冗費此不得巳之計非無毫髪之助也然使神考理財之政不為廟堂所壊則臣寮議論亦不至此此等不得已之事不免漸漸為之則筭間架除錢陌貸富人錢榖賣御史告身之𩔖安保其不漸為也主議大臣既去之後設有此事則其歛謗欲使何人當之故凡户部不得巳之下策皆非神考大有為之初意也漸用不得已之策頓改大有為之意名曰建中而偏為過甚之舉名曰繼述而大違神考之緒甚矣其可痛也陛下嗣位之初肆赦天下大弛逋欠此廼真宗之所嘗行而神考之所欲為也紹聖役法有一倍三料之文神考素意欲候嵗久積多則時一弛之所以逺繼成周馭民之法而俯取漢文弛租之政以悅斯民以召和氣以為後嗣之式也夫上之所弛者其數既多則下之所獲者不為僥倖周官八則所謂予以馭其幸者雖非日行之常事是乃馭民之美意陛下式祖宗而行之可謂得繼述之義而人臣之所宜將順者也然方國用匱乏之時而所弛之物其數太多故所謂傾天下之財而使無孑遺者言者之所當慮也然赦敕之所放陛下所以廣恩惠五敕之所取大臣所以備邊乏廣恩惠以收人心有益之事也因邊費而壊成法無益之舉也又赦敕所放其數止於二千餘萬五敕所取其數不知其㡬萬萬也陛下為有益之事以法祖宗其數又少方乏財之時尚不可以不言大臣為無益之舉以壊先憲其數甚多方乏財之時安可以不慮乎竊惟神考承祖宗久安之緒熈寧之初國用匱乏而理財之政未修也王安石曰有天下者豈以乏財為患哉於是講理財之法立天下之政緝熈増損十有餘年至於元豐之間法度成就然後州州縣縣皆有蓄積天下無偏乏之處將以待非常之用則所謂有天下者不以乏財為患信不誣矣今則不然耗根本之財壊已成之法雖西邊用度目前不乏而天下方匱乏患將由此而作矣盖神考為子孫萬世之慮故政事既立而天下無乏財之患今日壊神考之法則天下之患必自乏財而生此必然之理也且自祖宗以來天下諸路轉運司或有非常之用必須干告朝廷既在經費之外於理自合應副然自熈寧以前常患無可應副者以理財之政未脩故也由元豐以來根本蓄積之財州州縣縣聚如江海法防堅固内外充溢轉運司經費之外設有干求以此應副不患不足然而神考愛惜民財謹守交雜之法轉運司雖有干求亦不輕與故當時轉運使劉攽之徒妄有乞貸者皆被謫罰今則邊方用度百倍於昔轉運司匱乏廹窘異於平時雖有乞貸理合應副然朝廷於其所請例皆峻拒朝廷豈為愛惜民財謹交雜之法乎良以乏財而巳矣諸路誤以乏財廢事為轉運使者安肯受無名之謫乎夫州州縣縣蓄積之物一年之内皆以五敕取之而尚以乏財為患可不慮哉臣願陛下詔宰臣制國用脩户部右曹之政明提舉官覆奏之法委官選吏㑹計五敕所起都數若干已到若干未到若干自餘八路那移兌撥以充邊用者若干陜西河東邊費除繫本路錢物及朝廷以錢應副外已用五敕所及外應支五敕所起者其數各若干除已用應支外所餘之數尚有若干凡巳往之費不可追究未來之費所宜㑹也前此朝廷遣使㑹計邊費巳用之數所得者簿厯盈車不可覆考重有煩費無補於事今臣所論者右曹根本之財而已不知五敕所起可以為西邊㡬年之用否困天下之力壊神考之政而數年之後未免闕絶廟堂之上今亦可以覺悟矣惟陛下熟計之幸甚建中靖國元年上因進國用須知時為右司員外郎宋名臣奏議卷一百三
