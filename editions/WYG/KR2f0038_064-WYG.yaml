body:
  text: 宋名臣奏議巻六十四宋趙汝愚編百官門三衙上仁宗乞擇人分揔禁衛張方平臣伏見昨差出許懷德後馬歩軍皆闕都帥遂自環慶路抽回殿前都虞候王元令權幹當歩軍司公事其王元又已年老衰病至于揔司軍政亦恐精力不逮竊以殿前馬歩軍逐司公事不少非唯率宿衛務要齊整亦須諳熟軍制稍通吏用太宗朝侍衛都虞候以上常置十員職位相亞易於遷改且使軍伍素相服習邉藩緩急亦得選用先朝時馬歩軍嘗闕帥殿前都指揮使髙瓊頗知軍中舊事上言及此先帝甚然之今内則禁兵寖驕極須彈壓外則邉患不測常資防備李昭亮王元恐未任專幹心膂除郭承祐好進多事累被彈奏不堪入典禁軍外乞於以次管軍將校中擇取一兩人赴闕分揔禁衛左右扈翼於體為便慶歴四年上時知制誥上哲宗乞定差管軍臣寮蘇轍臣伏見管軍臣寮見闕三人頃者竊聞大臣議除張利一張守約陛下以謂二人皆資任淺下用之則為躐等又利一張耆之子而得一誠一之兄故不可用特出聖意欲用王文郁姚兕大臣既退輒寝文郁兕而進擬利一守約右丞許將既隨衆簽書進擬而復論奏其不便因此進擬文字為聖㫖所却經今一月有餘廢不復議臣竊以祖宗故事凡有管軍皆以資任先後相壓不復有移易自非戰守功効尤異豈可超授今利一守約資淺才下别無出衆勞效而利一家世又如聖㫖所論大臣力行巳意力欲進擬其為不便不言可見許將既知其失自合與衆人公議止其進擬今乃外同簽書内行論奏反覆之狀殊非大臣之體由此互相疑阻遂使差除之政廢不時舉以臣愚見實恐自此專擅之迹與窺伺之風交行於上浸滛不止皆非朝廷之福也況自祖宗以來以管軍八人揔領中外師旅内以彈壓貔虎外以威服夷夏職任至重豈以大臣商量未得如意闕而不補臣欲乞指揮以本朝故事參近日聖㫖茍非邉功尤著衆所推服罪惡顯白世所共棄且當循守資格速加除授以允公議元祐五年十一月上時為御史中丞上哲宗論曹誦不可權馬軍司范祖禹臣伏見樞宻副都承㫖曹誦權馬軍司事候姚麟囬日依舊雖非正授止是暫權然於事理有二不可祖宗制兵之法天下之兵本於樞宻有發兵之權而無握兵之重京師之兵揔於三帥有握兵之重而無發兵之權上下相維不得專制此所以百三十年無兵變也自唐室衰季以及五代樞宻之權偏重動為國患由手握禁旅又得興發也今副都承㫖為樞宻屬官權任管軍是本兵之地又得握兵合而為一非祖宗制兵之意其不可一也自英宗以來不用外戚管軍蓋以管軍之臣止有三人而外戚素非將領又無勲勞止縁恩澤遂為統帥豈得將士心服哉神宗時曹佾雖為中書令封郡王止奉朝請而巳今陛下初聽政而開外戚管軍之漸示人以私非所以為後法其不可二也臣無言責然備位侍從國家事有未便無所不當言與其言之於大不若言之於小言之於著不若言之於㣲伏以先太皇太后九年之中内外無毫髮之私天下未嘗有間言陛下揔攬庶政四海方屬耳目臣之愚誠不欲使有識之人指其事不善曰此先太皇太后時無之今陛下有之所以拳拳而不能巳也伏望聖慈特降指揮改正庶不違祖宗故事元祐八年十二月上時為翰林學士諸將上真宗乞叅用儒將孫何臣逺祖武有言曰將者人之司命國家安危之主蓋得其人則用無弱卒戰無堅敵失其人則禍有不測宗社攸寄黎民所賴其委任而尊崇之也故有築壇告廟而授者有推轂分閫而遣者軍功爵賞皆决於外參佐僚屬許之自辟昔趙衰舉郄縠於晉侯曰敦詩書而閱禮樂晏嬰薦穰苴於齊侯曰文能附衆武能却敵非謂彎弧擊劍䝉輪㧞棘矜匹夫之勇决一旦之命也厯代將帥多出儒者臣不敢援引三代請以炎漢之後言之光武有鄧禹劉備有諸葛亮西晉有羊祜杜預東晉有祖逖謝𤣥符堅則有王猛後魏則有崔浩梁則有謝艾隋則有髙熲至於唐室儒將尤多若郭元振之鎮隴右狄仁傑之帥河北裴度之平淮蔡温造之定興元此數臣者皆有尊主庇民之功善始令終之德一時武臣未有出其右者朱梁後唐以馬上為治文武之柄離而為二文者專治筆硯恥言軍旅之事武者狃習戈㦸罕有帷幄之謀交相是非坐觀成敗今塞北有未賔之狄河西有強項之羌偶未成擒病在此耳夫善師不陣上將伐謀事權宜專號令貴一古者元戎之外餘皆偏禆悉授指蹤且無顧望近代加以副貳參以監臨事有嫌疑動相牽制而為將者又多武人崛起軍候稍遷恩不足以懷雜虜威不足以御羣校鮮有司馬之兵法韓信之謀畫亞夫之持重闗羽之勇敢或逗留而翫冦或險果而輕敵黠虜假息事皆由此歴觀前代之備邉也或振旅薄伐或整兵深入或取贍於軍市或因粮於敵境或以屯田周給或以輕齎自隨而士皆宿飽師出無敵亦有旁招小國近撫諸蕃或厚賂以結其心或反間而收其效不困巳之士卒不竭已之饋餉計中術内使之挫衂鼂錯有言曰用蠻夷攻蠻夷中國之長算故陳湯因烏桓而郅支㓕任延藉西域而匈奴敗未聞空荒之地使者旁午動息之間贏粮景從臣嘗竊算國家士人之衆土地之廣巳百倍於羌虜而兵戈屢動未能垂藁街之首輦運交馳未能撤榆塞之警其故何哉蓋選將之術任人之道或有所未盡之也今之節度使昔之大行䑓今之都部管昔之大揔管將帥列䘖至今猶帶度支營田等使者盖元戎之任無不統攝也原其責成之道欲使民不告勞師有必勝且耕且戰足食足兵也爰近代始有供軍粮料之名隨軍轉運之目使額既衆適從無所司計者不知尺籍伍符之數握兵者不恤飛芻輓粟之苦羣口交沸互相督責託稱上㫖而實戾成算動必中覆而大費官帑陛下何惜上將之旗鼓通侯之印綬不於文資大臣擇訪委以節制而使此二虜時聳邊方唯祀與戎斯為大事唯名與器必在得人改而更張正在今日伏願陛下洞開城府妙選公卿勿俾武人擅其權勿使中使撓其事閫外之漕輓一以付之境内之租賦𣙜利一以與之使其有牛酒而犒軍有黄金而傾敵舊所謂監陣先鋒之類咸取偏將為之仍令禀其節度果用是道臣見幽薊之故地河湟之舊墟三年之内皆為國家郡縣與夫列校齊驅近臣迭徃不可同年語矣難者或曰利器不可以示人大柄不可以歸下此又膠柱之常談也夫為國者患賢之不得不患權之分保民者患邉之不寜不患將之重茍得其人則可以寄社稷之事况疆場之任乎茍非其人則州縣之職亦不可委况貔貅之衆乎陛下若謂今之武臣宣力巳久不可勃然改革自可伺其秩滿俟其員闕互以儒將代之統兵醻其前勞改授近地况文武參用典故具存亦非聖朝創立此制太祖以不殺之略降巴蜀平昇潤下荆湖太宗以非常之謀取并汾朝吳越來漳泉豐功厚利炳在信史天其或者留此二虜啓發神武待陛下而盪平剪滅之不可稽誅如此之久也斯事機要非小臣所當議然備位諫列受詔讜言茍此際不能罄竭狂瞽即尸禄曠官甚矣瀝懇章奏惟陛下特達而行之咸平元年上時為右司諫上真宗乞訽求將相田錫臣嘗讀唐太宗實録見李靖文武材略隋將韓擒虎即其類也靖每與擒虎論兵未嘗不稱善撫之曰可與論孫吴之術也初事隋為殿内直長吏部尚書牛𢎞見而重之曰李靖王佐才也今國家自先帝平晉之後與戎狄結隙將相舊人相次薨謝邉鄙間州縣屢為戎狄所䧟皇威不振久矣時議乃以將相無人亦久矣即不知今來朝廷公卿大夫間有如韓擒虎與李靖論兵否有人如牛𢎞知李靖有王佐才否若有人能論兵有人負王佐才未審陛下知之否有人善論兵有人負王佐才乃是帝王合先知之矣自來皇城司差人探事又别差探皇城司探事人如此察探京城民間事無巨細皆達聖聦近又差朝臣為廵撫使及差朝臣以㸃檢酒務名目出外採訪所採訪之事不過民間利病不過官吏能否而巳即未聞委公卿大夫察訪善論兵之人詢求有王佐之才者也由是見所求者瑣屑而所忽者逺大也陛下若以宗廟社稷為憂以生靈為念即宜以逺大為務求將相為急也臣每奉聖謨令陳鄙見仰祈英睿特賜披詳咸平六年八月上時為右諫議大夫史館修撰上仁宗乞責臣寮舉智勇之人范仲淹臣竊見邉上將帥常患少人今髙繼嵩纔亡人情頗駭恐鎮戎不能守禦却須藉朱觀徃彼朱觀既去則鄜延路又闕敢勇之將國家奄有四海未必乏才豈天地生人厚於古而薄於今盖選之未精用之未至今諸軍諸班必有勇智之人多被管軍臣寮人員等逓互彈壓不得進用坐至衰老只如朱觀元是軍班出身因歴邉任方得將名伏望聖慈專督管軍臣寮等於諸班中捜羅智勇之人各舉一名不以將校長行或試以武藝或觀其膽略出衆便可遷轉於邉上任使如將來頗立戰功則明賞舉主或屢敗軍事亦當連坐所貴諸路漸次得人不致頻有那移免使戎狄謂大國乏才愈增驕氣况西北二方將帥之闕實非細事乞國家常為預備早加遷擢康定元年九月上時知延州上仁宗乞别議求將之法歐陽脩臣伏見國家自西鄙用兵累經敗失京師勁卒多在征行禁衛諸軍全然寡小又無將帥以備爪牙方今為國計者但務外憂夷狄專意邉陲殊不思根本内虛朝廷勢弱事有萬一無以支吾今軍帥暗懦非其人禁兵驕墮不可用朝廷自以為患不待臣言而可知也臣亦歴考前世有國之君多於無事之際恃安忘危備患不謹使禍起倉卒而至敗亡者有矣然未有於用兵之時而反忘武備如今日者兵法曰將者民之司命國家安危之主也外以李昭亮王克基軰當契丹内以曹琮李用和等衛天子如當今之事勢而以民之司命國之安危繫此數人安得不取笑四夷遭其輕侮臣謂去嵗北敵忽興狂悖今年元昊妄有請求若使朝廷有一二人中材之將叩頭効死奮身請戰誓雪君恥少増國威則戎狄未敢侵凌朝廷未至屈辱柰何自中外都無一人既無可恃以力爭遂至甘心於自弱夫天下至廣遂無一人者非真無人也但求之不勤不至耳臣伏思自用兵以來朝廷求將之法不過命近臣舉朝士换武官及選試班行方略等人而巳近臣所舉不過俗吏才幹之士班行所選乃是弓馬一夫之勇至於方略之人尤為乖濫試中者僅堪借職縣尉叅軍而巳於此求將而欲捍當今之患此所以困天下而敗於夷狄者也臣不知朝廷以此數事為求將之術果是乎果非乎以為是則所得何人知其非則盍思改革又不知朝廷以將為易得乎為難得乎為易則數嵗未見一人知其難得則當多方用意早賜采擇俟其臨患何可得乎伏望陛下特詔兩府大臣别議求將之法盡去循常之格以來非常之人茍非不次以用人難弭當今之大患臣亦常有愚見久欲條陳若必講求庶可參用臣伏見唐及五代至乎國朝征伐四方立功行陣其間名將多出軍卒只如西鄙用兵以來武將可稱者徃徃出於軍中臣故謂只於軍中自可求將試略言求將之法謹條如左凡求將之法先取近下禁軍至廂軍中年少有力者不拘等級因其技同每百人團為一隊而教之較其技精而最勇者百人之中必有一人矣得之以為隊將此一人技勇實能服其百人矣以為百人之將可也合十隊將而又教之較其技精而最勇者十人之中必有一人矣得之以為禆將此一人之技勇實能服其千人矣以為千人之將可也合十禆將而又教之夫技勇出千人之上而難為勝矣則當擇其有識見知變通者十人之中必有一人矣得之以為大將此一人之技勇乃萬人之選而又粗知變通因擇智謀之佐以輔之以為萬人之將可也幸而有技勇既足而才識出乎萬人之外者此不世之竒將非常格之所求也臣所謂只於軍中自可求將者也誠能如此得五七萬兵隨而又得萬人之將五七人下至千人百人之將皆自定然後别立軍名而為階級之制每萬人為一軍以備宿衛有事則行師出征無事則坐威天下比夫以豐衣厚禄養驕惰無用之卒而逓遷以補至于校帥皆是凡愚暗懦之人得失相萬矣若臣之說果可施行俟成一軍則代舊禁兵萬人㪚出之使就食于外新置之兵便制其始稍増舊給不使太優常役其力不令驕惰比及新兵成立舊兵出盡則京師减冗費得精兵此之為利又逺矣右臣所陳只是選勇將訓衛兵之法耳如捍邊破賊竒才異略之人不可謂無伏乞早賜留意精求慶歴三年上時知諫院上神宗乞擇將久任錢顗臣竊以朝廷之患莫患於無將帥也盖承平日久中外臣寮唯能孜孜講及文法不及於武備豈所謂安不忘危之意也而况北敵猶梗西戎未賔非朝廷無事之時也陛下試環視中外可為將者誰耶可為帥者誰耶陜西河東河北三路九十餘州軍見邊任有謀略有果勇威望可以壓服夷狄者復何人哉此宜為國者預謀而深慮也臣聞祖宗之時外多名將皆委之久任而責其成效若李漢超之守闗南趙賛之守延安皆十餘年倚若長城著立功勲無西北之患者將帥得人也國家求將之心雖切選將之路不廣近臣雖曽奉詔舉將領奈何限以資品武勇智略之在下位者無由而進雖有頗牧之才焉得而用之今之命帥則唯用侍從貴官遣將則多以閥閱子弟素不諳練兵術一旦委之要地授以重柄前日横山之謀為國生事蓋失於不久任也臣願陛下詔二府大臣兩制近侍及中外文武監司知州巳上各舉堪充將領者二人不以官職髙下果敢有武勇者為一等沉厚有方略者為一等籍其名而用之分布三路法祖宗之久任責其成効有功則不次遷擢厚加賞賚激將師之心沮蠻夷之氣天下久安之䇿不過此也伏乞朝廷裁擇施行熈寜元年六月上時為殿中侍御史裏行上哲宗乞罷將官司馬光臣於去年四月二十七日曽上言州縣者百姓之根本長吏者州縣之根本根本危則枝葉何以得安自古以來置州縣必嚴其武備設官吏必盛其侍衛所以安百姓衛朝廷也秦㓕六國以為兵不復用雖置郡守而以御史監之墮名城銷鋒鏑故陳勝吳廣起而郡縣莫能制至多殺長吏以應之雖由其殘虐取亡亦守令無權無兵之所致也晉武帝平吳亦以為天下既一兵無所用悉去州郡兵陶璜山濤皆言州郡武備不可廢及永寜以後盗賊羣起州縣無備天下遂大亂國朝置緫管鈐轄都監監押為將帥之官凡州縣兵馬其長吏未嘗不同管轄知州則一州之將知縣則一縣之將也熈寜中謀臣建議分天下禁軍每數千為一將别置將官以領之訓練差使抽那一出其手其逐州緫管以下及知州知縣皆不得闗預量留羸弱下軍及剰貟以充本州白直及諸般差使而巳凡設官分職上下相維如身之使臂臂之使指紀綱乃立今為州縣長吏及緫管等官而於所部士卒有不相統攝殆如路人者至於倉庫守宿廵邏亦皆乏人雖於條有許差將下兵士者而州縣不得直差須牒將官將官往徃占䕶不肯差撥萬一有非常之變州縣長吏何以號令其衆制禦姦宄哉臣目覩前宰相西京留守韓絳謁嵩山起建道場其將下禁軍充白直者於條不得出城經宿所敢留者剰員七八人而巳况僻小州縣其守禦之備侍衛之衆可知矣臣當時乞悉罷將官其逐州禁軍並委長吏與緫管等同共提舉教閱及諸處差使其州縣長吏所給白直皆如嘉祐編勑以前之數臣自上此文字後來不聞朝廷有所施行竊見近嵗諸處多闕雨澤盗賊頗多州縣全無武備長吏侍衛單寡盖將官多與長吏争衡長吏勢力逺出其下萬一有如李順王倫攻城䧟邑之患或如王均王則竊發肘腋之變豈不為朝廷旰食之憂耶王者制治於未亂保邦於未危豈可自恃太平之久謂必無此等事邪又自祖宗以來諸軍少曽在營常分畨往㳂邊及諸路屯駐駐泊盖欲使之均勞逸知艱難識戰闘習山川自置將官以來茍非有征討全軍起發與將官偕行外其餘常在本營不復分畨屯駐駐泊飽食安坐養成驕惰之性嵗月滋久恐不可復用又每將下各有部隊將准備差遣指使之類一二十人而諸州總管鈐轄都監監押員數亦如舊設官重複虛費廪禄凡將官之設有害無利天下曉軍政者莫不知之臣愚欲望朝廷如臣前所奏盡罷諸路將官其禁軍各委本州縣長吏與緫管鈐轄都監監押等管轄一如未置將官巳前之法其諸州軍兵馬全少不足守禦之處量與立額招添其守禦有備而冦賊之發不能逆遏或棄城逃避或率吏民迎賊或歛民財賂賊雖責之以死彼亦甘心今平居騶從且不能備一旦冦至責以死節不亦難哉元豐八年四月上時除知陳州上哲宗請内外臣寮各舉堪任將帥者張舜民臣伏見近年以來宿將凋零今嵗為甚雖其間人才固有精粗是皆自英考神宗識㧞切磨收養出生入死之人也使其分有脩短何獨至於今日摧頺剥落之為甚也臣雖愚昧陰以為懼臣竊觀自古守邊選將未必專以攻戰為事要在精神折衝而巳如必欲戰而取勝則是兵家之下䇿故有中朝而興歎側席而為憂在趙則強秦不敢加兵在漢則鮮卑不敢南牧者此豈皆戰之功其聞望精神有以服人者也其聞望精神有以服人豈一朝一夕之事哉必有素養乃可至此方今强敵未殄疆場屢騷天怒未加而爪牙先缺此何理也傳云内無良將外有敵國此秦之君臣猶以為憂况以天下之大者乎臣竊惟天之降才地之生物其杶幹栝栢何時而乏然自毫末以至凌雲培之植之以充梁柱又非一朝一夕之事也唯其先幾有備之實能免倉卒不及之患臣今欲乞聖慈詳酌指揮内則侍從臺諫管軍臣寮外則帥臣監司各舉所知堪任帥者三兩人不限出身要在人才實有謀勇然後朝廷面加審擇其所降指揮乞嚴立條式以示朝廷必用之意非若常舉之汎汎臣之瞽言若䝉采聼然其驗猶在十數年之後貼黄臣今所言若䝉朝廷采納其所舉人巳經選任若路分都監巳上更不在奏舉之限所貴人才在下者皆得上達近日蘭州种誼身亡臣常黙計其代者兩日而無所得竊惟廟堂遴選之際亦巳為難矣當平時擇一邉州守臣猶爾難得况一旦應急任人從而可知臣所以出位進言其在於此紹聖三年三月上時為陜西路運使宋名臣奏議巻六十四
