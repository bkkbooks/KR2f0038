body:
  text: 宋名臣奏議巻六十五宋趙汝愚編百官門帥臣上仁宗乞韓琦兼領大帥鎮秦州余靖臣准五月七日詔勑節文令後三館臣僚如有邉防要切機宜及朝廷大事並令具實封奏臣竊聞已降勑命差韓琦等充涇原等四路都部管韓琦范仲淹並於涇州駐劄仍差文彦博知秦州者臣聞兵之勇怯在乎將勝敗在於氣竊見賊昊侵軼邉鄙以來大戰者三矣延安之役人猶勇闘好水之師䧟虜伏中定川之敗不戰而走此皆賊乘屢勝之氣而吾將勇怯之分也臣觀賊昊雖曰小羌其實黠虜其所舉動咸有次序必先剪我枝附壞我藩籬先攻易取之處以成常勝之勢金明之族最近賊庭故先取之豐州之地援兵難集故次取之涇原將帥軟懦故又取之此乃賊知先後之計也臣竊料㳂邉諸郡最富最實者秦州耳賊所以盤旋未敢攻秦州者三焉邈川尚強雜羌未附而韓琦為守也此賊昊之所畏朝廷之所恃也今可憂者邈川置族為賊所侵漸已挫折一恃去矣其餘雜羌附漢者未必全歸賊者未必誅向我堅者往徃族㓕而不能救今雖受我封賜賊兵若至其肯死力而援我乎此二恃去矣若使韓琦且守秦州招懷部落撫以恩信訓勵士卒聳以忠果猶須擇材勇以為闘將庶幾全輯三恃使賊有所畏可也今乃專委文彦博許懷德守此一路臣深為朝廷憂之臣亦非敢横議沮事但以三軍所恃者將耳韓琦數年在邉雖未成功羌賊知名士卒信服今一旦使文彦博代之恩信未洽緩急有難兵將肯用其命乎且彦博新進懷德無聞羌賊固將輕之矣今雖以韓琦范仲淹在涇原遥節制諸路以為聲援但益秦州之憂耳賊若出其上䇿以一軍守瓦亭則涇渭之師不得南矣以一軍趨隴坻則岐隴之兵不復西矣以一軍直擣秦州而援兵不至族羌外附則秦州非我之有也賊若出其下䇿前驅雜羌所在掠奪則吾之救兵雖可至勝負未可知也若謂賊輕去巢穴以為不然此所以出我不意也臣以為當今之計不若急遣韓琦兼領大帥歸鎮秦州増兵故闗以扼衝要諸路有急不妨應援此最安危之機也益涇州之戍以當兵衝以成輔車之勢一大將居之足矣更宜擇材勇以代懷德亦最急也賊自崛強以來未嘗挫折若得勇將以摧其鋒則庶可屈伏矣朝廷措置大事臣妄言其間甘俟鼎鑊慶歴三年十一月上時集賢校理上仁宗論郭承祐不可帥真定歐陽脩臣伏聞朝㫖用郭承祐為真定部管臣自聞此除改夙夜思維國家用兵巳五六年未有纎毫所得挫盡朝廷威勢困却天下生靈細思厥由其失安在患在朝廷拘守常例不肯越次擇材心知小人付以重任後雖敗事亦終不悔今每有除擬人或問於大臣則曰雖知非材捨此别無人甚者欲塞人言則必曰爾試别思更有誰可用乎臣亦嘗聞此言每退而歎息夫所謂别無人者豈是天下真無人乎蓋不力求之耳今不肯勞心選擇越次而用但守常循例輕用小人寜誤大計一誤不悔後又復然至如葛懷敏頃在西邉天下皆知其不可當時議者但曰捨懷敏别未有人難為換易及其戰敗身亡横屍原野懷敏既不復生亦須别求人用臣謂今日任承祐亦猶當時用懷敏也况如承祐者凡庸奴𨽻之才不及懷敏逺甚頃在澶州只令築城幾至生變豈可當此一路臣謂朝廷非不知承祐非才議者不過曰例當叙進别更無人此乃因循之說爾方今強敵釁生禍端巳兆中外之士見國家輕忽戎患弛武備北方人皆獻言願早為備忽見如此除改誰不驚憂前六符之來朝廷忍恥就議蓋謂河朔無可自恃難與速争須至屈意茍和少寛禍患今幸得此自紓之計所宜多方汲汲精意將臣先為禦備猶恐不及豈是因循守例輕任小人之日也其郭承祐欲乞早移與不用兵處知州或召還别與一閑慢職秩若欲録其勲舊優其戚里之恩閑官厚禄足可飬之不必須令居此要任伏願陛下深思大計不憚改為則天下幸甚慶歴三年七月上時知諫院上仁宗論鄭戩不可為招討歐陽修臣伏覩勑除鄭戩知永興軍兼陜西都部管自聞此命外之議論皆以為非在臣思之實亦未便竊以兵之勝負全由處置如何臣見用兵以來累次更改或四路置都部管或分而各領一方乍合乍離各有利害唯夏竦徃年所任鄭戩今日之除失策最多請試條列臣聞古之善用將者先問能將幾何今而不復問戩能將幾何直以闗中數十州之廣蕃漢數十萬之兵㳂邉二三千里之事盡以委之此其失者一也或曰戩雖名都部管而諸路自各有將又其大事不令專制而必稟朝廷假如邉將有大事先稟於戩又稟於朝廷朝廷議定下戩戩始下於㳂邉只此一端自可敗事其失二也今大事戩既不專若小事一一問戩則四路去永興皆數百里其寨柵逺者千餘里使戩一一處分合宜尚有遲緩之失萬一耳目不及處置失宜則為害不細其失三也若大小事都不由戩而但使帶其權豈有數十州之廣數十萬之兵二三千里之邊事作一虛名使為無權之大將若知戩可用則推心用之若知不可用則善罷之豈可盡闗中之大設為虛名而以不誠待人其失四也今都部管名統四路而諸將事無大小不稟可行則四路偏禆各見其將不由都帥則上下相效皆欲自專其失五也今都部管是大將反不得節制四路而逐路是都帥部將却得專制一方則委任之意大小􅆾殊軍法難行名體不順其失六也若知戩果不可大用但不敢直罷其職則是大臣顧人情避巳怨如此作事何以弭息人言其失七也料朝廷忽有此命必因韓琦等近自西來有此擘畫琦等身在邉陲曽為將帥豈可如此失計臣今欲乞令兩府之臣明議四路不當置都部管利害其鄭戩既不可内居永興而遥制四路則乞落其虛名只令坐鎮長安撫民臨政以為闗中之重其任所繫亦大而使四路各責其將則事體皆順處置合宜慶歴四年二月上時為知制誥知諫院上仁宗論狄青不可獨當一路余靖臣近奏狄青知渭州尹洙知晉州不恊物議未䝉朝㫖者臣切謂若非大臣全無憂邊之心即是㣲臣當坐罔上之罪二者之間必有一焉臣伏思陜西四路惟涇原山川寛平易為衝突若戎馬之勢不遏則為闗中之憂闗中之憂則天下之憂也故國家自冇西事以來長以涇原為統帥之府前嵗葛懷敏䘮師之後朝廷欲差范仲淹徃彼綏輯尚先遣中使諭之以意其時仲淹不敢獨當此任乞差韓琦同徃朝廷遣韓琦范仲淹同共經略又差張亢知渭州狄青同為一路部管琦等雖名四路招討其實只是營度涇原亢領州寄青為闘將即是朝廷憂涇原如此之深也及至去年召琦仲淹赴闕又使中使問仲淹何人可以為代於是差鄭戩替韓琦仲淹充四路招討尹洙代張亢知渭州至秋又差韓琦田况往彼宣撫則固知朝廷未嘗忘涇原也今年巳罷鄭戩歸永興又移尹洙知晉州遂令狄青一身兼領三人職事且仲淹號為最曉邊事不敢獨當孫沔亦是朝廷精選而託疾不行是涇原有可憂之勢豈青匹夫獨能當之仲淹豈忘之乎大臣必謂韓琦仲淹二年涇原成規可守故專任狄青足以了事臣實以為不然伏自懷敏覆没之後兵氣沮䘮未有小勝百姓遭刼掠之餘雖或歸復而生業未備幸賊未至而謂全實議和未定而早懈怠抽减將帥軍民之心尚何所望而敢自安乎且向來於生戸界中脩一城寨尚有刼奪殺傷不能相保賊馬若至誰復安心是大臣全無憂邊之心明矣初縁昨者狄青尹洙倉猝行事上煩朝廷臣竊料朝廷之意謂此二人徇偏見之情以相倡和故換孫沔在青之上欲令庶事在所商量今來只因孫沔稱病遂將涇原路兵馬專令狄青進止豈天下之廣更無一竒才可以知渭州與青共事者是大臣不思之甚也况始因行事猝暴朝廷不欲問罪遂得專兵柄不知是何賞罰且縁青驟自行間未著大功䝉恩超擢又其為性率暴鄙吝偏禆不伏所以劉滬敢罵尹洙乳臭狄青一介耳今來以青獨當一路豈不憂偏禆不伏而敗國家之事乎雖傳聞仲淹請行若朝廷從之不過本州駐劄大節須别得渭州知州與青緩急商量戰守之勢又况龎籍守延猶與王信等同事今來反不及青獨當最難一路無乃籍等羞與為伍以懷怨望乎朝廷乏賢一至於此伏乞陛下詢問大臣如或將來賊馬衝突涇原狄青果能保必勝之勢不貽朝廷之憂則臣甘先就誅竄以當罔上之罪慶歴四年六月上時為右正言同修起居注上仁宗論狄青宣撫當置副使劉敞臣聞朝廷以狄青宣撫荆湖經制盗賊而議不置副臣以謂不便或曰置副而使中人為之臣又以謂不便臣聞上古王者之遣使命將也必為之設介貳參佐非獨司紀綱廣謀策而巳亦所以謹大事備不然也今擁數萬人之衆連四路之廣節制萬里吉凶所繫而單車臨之孤拱獨立猝有疾病不意之虞無所仗託莫相維持非計之全也狄青起於行伍而遷樞近天下誠未見其羙方以盗賊之急擁兵而出故人人想望風采願聞成功宜得正固幹略之臣參職共事設以中人為之必大失事望足以示陋非朝廷之光也臣故曰議不置副不便置副而使中人為之亦不便此臣所以拳拳也蓋先事而言者常若迂濶後事而言者常若不及惟陛下留意芻蕘謹重軍旅之任皇祐四年九月上時直集䝨院判尚書考功上英宗論五路置帥不當更以馮京為安撫趙瞻臣伏見陜西置永興秦延慶渭五路安撫經略使各開帥府以制西戎今又忽差馮京安撫諸路風聞士論莫測所謂不知朝廷以諸帥臣皆不能安撫本路邪是國家欲深究邉事而專委近臣經畫之也帥臣非才自當更置直欲經畫暫至豈能究知是皆未有以補疆場之萬一而足以愧邉帥擾戍兵矣犒師勞將遷易卒伍浮費百出虛聲交至闗陜之民必大恟動臣愚固以為無益至有損也昔杜預使王濬先入石頭避其親受節制裴度為韓𢎞巳為都統遂不更稱招討深達國體共成邉功古之用人今悉相反以臣所見乞罷馮京之行茍欲精求利病即有文彦博孫沔新付兵柄未出國門授以聖謨廟算彼皆元老可以仰成臣愚不識事機願進區區之慮治平二年四月上時知侍御史上神宗乞令孫永依舊知秦州以責後效范純仁臣前次上殿親承德音以孫永守邉失䇿更且責其後效有以見聖心寛大使過責成深得秦繆公任孟明視之道矣今日却聞孫永降職移知和州以李師中代為秦帥臣竊以帥臣之職尤須久任方能諳熟邉事共輯逺略若因事屢更則不惟迎送勞人兼亦百事更變兵民之情不無煩擾兼臣舊與孫永李師中相識各粗知其性行孫永雖無應變長材然忠謹鎮静足可使之安守李師中實有材力急難可用然好進任術不能靖安其職若邉事稍寜必須躁動别圖進用如此則乆長之效未必得如孫永欲乞且依前來聖訓孫永與降職且令依舊知秦州以責後效李師中且令在河東徐觀其政績兼免移易勞人庶事煩擾貼黄臣與孫永相識頗熟今言之則有營救之疑不言則有曠職之懼被疑則臣身受責若曠職則誤朝廷臣是以再三思慮不敢不言唯在聖明採納又仁宗朝韓琦以好水川事敗亦只降官仍知秦州今若以一寨移一帥則恐邉上得力將帥不易安職如臣言可採只乞作聖意更改熈寜二年四月上時同知諫院上神宗論安撫領使如古之州伯彭汝礪臣聞昔先王之為國也其所以緫領而維特之者可謂備矣九州四海之逺所君者一人而巳以為不足也則分天下之士為公侯伯子男凡五等也猶以為不足也則列天下之國為屬長連帥卒正者凡七等也猶以為不足也則并諸侯之國而為之伯者二人也上下相維若網之在綱而天子總方國之逺制於一堂之上諸侯厥角稽首以聽號令循法度若指之應臂其有不率則其長得而治之然又以為未足也於是冇廵狩焉至於其邦問百年者就見之命太史陳詩以觀民風命市納賈以觀民之好惡命典禮考時月定日同律度量衡禮樂制度衣服正之而有黜有流有誅有賞此諸侯所以謹度而民莫不安也自侯國之廢學士之言不及此矣今天下縣有令郡有守列郡有提刑有轉運有發運所治者財榖而已事有不與也有安撫鈐轄有總管經略所制者兵而巳而民事或不與也夫以古之侯國其德之所以相長者如此之衆而今之郡縣所以總領者如此之約而任之未必當責之未必久此無恠乎天下之未治也臣欲乞因今之所謂安撫鈐轄而以重臣任之稍重其任使職司皆得以統攝而一道之利害黜陟皆得以安撫領使如古之州伯也三嵗遣近臣出使以盡民間之禍福利害而察百官之賢智愚不肖使如古之廵狩也如此則逺近内外無有不安者矣熈寜十年上時為監察御史裏行上哲宗論祖宗不任武人為大帥用意深逺劉摰臣昨者去年十一月二十四日訪聞有㫖除劉昌祚知渭州臣竊聞劉昌祚嘗以小功先朝用之管軍知延州中外不以為允先朝升遐召入宿衛物議稍以慰惬今者渭州之命羣議復駭臣竊聞祖宗之法不以武人為大帥專制一道必以文臣為經略以總制之武人為總管領兵馬號將官受節制出入戰守唯所指麾國家承平百有二十餘年内外無事以其制御邊臣得其道也臣嘗伏念禦邊禦戎深得上䇿所以遺後世者久而不可以改此其一也唐先天開元中薛訥郭元振張嘉正張說李適之等自莭度入相李林甫疾儒臣以邊勞至大任欲杜其漸以固其權說明皇曰以陛下雄才國家富强而夷狄未滅者由文吏為將憚矢石不身先不如用蕃將彼生長鞍馬矢石間陛下用之必盡死力明皇然之以安思順代李林甫領節度擢安禄山髙仙芝等為大將林甫利其蕃將無入相之資故安禄山得兼三道勁兵卒稱兵蕩覆天下唐室遂㣲臣竊謂祖宗之法不任武人為大帥用意深逺非淺見者所能測之如昌祚人材未為難得誠使卓然過人可以付屬而祖宗之法由此廢矣伏願選内外文臣從官可以守邊者使之即守則祖宗之法常存而不廢不幸後世有引此時為比使武人帥邊而不虞之禍如前世之甚者豈可不預防其漸乎元祐元年正月上時為侍御史上哲宗論帥臣當使便宜行事孫覺臣竊聞陜西諸帥臣皆朝廷夙所選擢及被邉稍有警急事事聞於朝廷從來倉猝又須應副臣恐委任帥臣之道為未盡也臣以為諸路帥臣之中唯陜西五路朝廷之所留意萬一有警帥臣自有所處則朝廷無事矣今御帥臣之法太急不敢以便宜行事故帥臣凡邉事不以大小悉聞於朝廷臣謂宜稍略其法使帥臣便宜於邊境之間然後責以邊事事之小者不以聞于朝廷稍習用祖宗御邉帥之道則帥臣悉心朝廷無事矣貼黄臣聞定州韓忠彦時有請於朝廷不敢以邉事為任帥臣之中不任責朝廷又不責之如此則帥臣虛設矣元祐二年上時為給事中上哲宗論不可以走馬一言輕易元帥王巖叟臣伏覩初六日除目延安趙卨太原滕元發皆進職臣當行制忽得指揮收還臣不知所以固巳疑之今日乃以頴昌范純仁易元發竊聞用本路走馬奏章遂有此除臣謂朝廷進退大帥固當重謹不可輕用一人之言而行之或其言出於愛憎喜怒之私意而欺罔公議豈不損主上之明誤國家之事果若可疑自當令本路監司公共體量信如其言行之未晚况聞元發在河東頗有顯效為士大夫所稱按本路每嵗入秋即自近裏州軍發馬兵徃戍河外渉春乃還坐耗芻粮於難得之地不知幾萬計前此帥臣度知無事未有敢不遣戍者去秋元發獨能不遣為國惜費其利甚博蓋其明見事機以身任責故為之不疑衆論莫不嘉元發有大帥之畧臣計陛下必不知之知之宜不遽易也今言者蔽其所長而不以告摘其所不足而暴之則其愛憎之情自巳可見夫有顯效不録而陰言亟行四方聞之又誰為陛下盡心者既以走馬一言易元帥元帥將人人畏憚此曹有不自保之憂此曹將人人侵侮其帥有驕横之勢陛下不可不察也此風浸長非朝廷美事昔季布為河東守孝文嘗召至京師留邸一月而罷還布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下今臣至無所受事罷去此人必有毁臣者矣陛下以一人譽召臣一人毁去臣恐天下有識者聞之有以窺陛下孝文謝焉臣願陛下思季布之言察元發之事勿蹈孝文之失以為識者歎惜臣愚忠不勝惓惓貼黄一元發不足惜所惜者朝廷進退帥臣之事體爾如臣言可採伏望指揮少留告命速詔大臣别加詳議施行陛下以方面屬人毁譽之聽不可不審善惡之實不可不考若其人材略足以當事雖小有疾苦何害於卧理如其無能雖壯安用元祐五年五月上時為中書舍人上哲宗請於監司中養才以備將帥范祖禹臣竊見朝廷常患將帥難得其人仁宗時每帥臣闕或自禁近除授試之藩閫然後大用外任則都轉運使待制雜學士可用者常數人未嘗言乏才由朝廷養之有素也將帥之選多出於監司先自逺路漸擢至京東西淮南其資望最深績效尤著者乃擢任陜西河東河北三路及成都路自三路及成都召為三司副使其未可輟者或與理副使資序自副使出為都轉運使夫自初為監司至三路及三路副使者其人年勞巳深資歴已多㳂邉山川道路甲兵錢榖皆所諳知故帥臣有闕可備任使中才之人亦能勉强自王安石用資淺之人為監司使之推行新法是故才與不才兩皆廢壞而資序一切不用二聖臨御以來又未嘗以逺近為之資序每邉帥有闕則不知可用者為誰由朝廷養之無素也臣愚欲乞復祖宗時用監司之法邉臣有闕於此選授則可用之才必多矣今監司或初除即與近路及三路自三路却遷之逺地則人情巳不樂在三路者或乆而不遷其才能資望又不足以當邉帥之任此所以人才常乏也今若復祖宗之法其提㸃刑獄轉運判官亦擇才能者與諸路更互為之使徃來出入於三路者常多則知邊事者必衆矣元祐六年十一月上時為翰林學士上徽宗論西北帥不可用武人任伯雨臣風聞外議皆言朝廷以西北諸帥闕人議欲益以武臣紛紛累日事雖未詳臣為諌官敢不先慮萬一果如此行今日雖未有害異日便為禍階此唐室方鎮之患所由起也唐自開元以前諸邊帥多用儒將緝綏懷附内外帖然及李林甫為宰相欲久其位惡儒臣有勞入為輔弼乃建議悉用蕃將武人遂召禄山之亂肅代以後大盗略平武夫悍將皆巳有功強藩巨鎮以次分授既有其土地又有其人民又有其甲兵重權在手唇齒相依跋扈自恣遂不可制終唐之世以此亂亡本朝太祖太宗時四方未平西北未服乃用武臣分主要地時勢所係不得不然及至大宗以後迤邐悉用儒將至於並邉小郡始用武人此祖宗深思逺慮鑒唐室藩鎮之弊以為子孫萬世之計也今若因闕帥臣遂用武人自此以後人人皆有作帥之望茍其才不相上下功不相先後有得有不得則内有怨心外有慚色悻悻不服以朝廷輕巳及其臨事豈肯用心如其巳得則位尊權重侈然自大有貪功名之心則生事邀功有黷貨財之心則侵剥夷漢跋扈驕蹇不循法度朝廷若不體問則飬成其惡為禍愈深若便體問則畏禍懼罪必不順命或有移徙非其所欲則脅衆留巳以干朝廷從之則損威違之則生亂彼此視效結黨相芘伸縮進退莫不掣肘翫習既久人人以為當然則方鎮之患自此成矣况朝廷闕帥自可於省寺卿少郎官外路轉運使副有才望資序深者權試其才平時守邊若無大事萬一不任亦止一時外患若用武臣漸成方鎮之勢則國家内患非止一朝一夕之故也或謂朝廷盛強雖用武臣未必為患前此間有武臣為帥矣臣謂不然且前此雖有乃卓然有才非同輩所敢比者是以人不僥倖且規事建議必圖萬世之固預防未然之禍方林甫建議不用儒將豈知後世有方鎮之患耶臣願陛下深思逺慮鑒前代之事遵祖宗之制審所處置以安萬世無窮之基天下幸甚建中靖國元年上時為左正言上欽宗論四道置帥胡安國臣准中書省兵房送到録黄一道臣僚上言天下之勢治平則宜重内遭變則宜重外乞分置四道帥臣以都緫管為名付之一面為衛王室御大敵之計以臣愚見自古及今内外之勢適平則安偏重則危昔東漢季年王室多故劉焉建議以為四方兵冦由刺史威輕宜改置州牧及焉求益郡劉表出襄陽袁紹得冀曹操取兖争相割據自此不復有王室矣唐僖宗時黄巢入冦用髙駢為都統意令討賊及巢入長安詔駢舉兵而駢恃甲兵財賦之强終不奉詔自太祖鑒觀前弊削奪藩鎮之權行至于今州郡太輕理宜通變然一旦遽以數百州之地二十三路之廣分為四路各統一面事得專决財得通用吏得辟置兵得誅賞其事權太重又非特州牧之比也使此四人者果能盡忠君父心在王室倉卒之際合從救援則固善矣假令萬一抗衡䟦扈號召不至如劉焉表操紹髙駢之所為又何以待之乎五大在邊古人所戒以身使臂於理乃宜臣之愚計欲乞只據見今二十三路所置帥司選擇重臣付以都總管之權專治軍旅之事毎嵗終按察其部内或有警急京城戒嚴即各帥所屬守將逐急應援如此則既有擁衛王室之勢又無尾大不掉之虞一舉兩得伏望聖慈更賜裁酌特降聖㫖施行靖康元年九月上時為中書舍人宋名臣奏議巻六十五
