body:
  text: 宋名臣奏議巻四十九宋趙汝愚編百官門侍從上仁宗乞侍從與聞邉事余靖臣竊見朝廷毎有契丹遣使到闕元昊差人來朝大臣商量唯欲祕宻兩制兩省御史中丞已下雖名侍從供奉之官當時並不聞知及處置既了縱或不便無由論列臣思國家建置侍從之官以備顧問諌諍之官以救闕失盖欲謀無遺䇿且書不云乎謀及卿士謀及庶人謀及卜筮是大疑之事謀之欲其衆也漢武帝征伐西戎開置邉郡侍從之官嚴助朱買臣之徒常與大臣論議大臣數屈漢史稱之以為美談今柄臣宻議外不得聞一慮或失救之不及勢之可憂者也伏乞宣諭大臣凢北虜西戎之事繫於安危者侍從諌諍之官悉令聞之使陳利害不為漏洩𫝊云謀之欲多㫁之欲獨此御國之要也惟陛下裁之慶厯五年上時知諌院上仁宗乞許兩制兩省上章論事何郯臣竊以古者人君聴政以天下至廣非一人聰明所能盡是故内取公卿大夫謀於朝外採百工庶人議於下使下情無不通然後中外相濟政理所以無過差焉今國家設侍從之官自翰林學士至天章閣待制皆取文學極選以備顧問公卿之材並由此出自頃相承朝廷惟以文翰待之而不責其言議臣下亦以職分當爾而自安於循黙以天下利害之大被言責者唯御史臺官僅十餘員而欲陛下聰明無遺政理無所失者不可得矣唐太宗置十八學士與之議天下事故貞觀一代稱為至治斯從臣輔助之明効也在明皇時則有集賢學士張說以圖國政在徳宗時則有翰林學士陸贄以參戎機以至憲宗得李絳而斥近倖之弊敬宗因韋處厚而辨忠邪之分皆由時君開懐用意以待臣下故感慨之士得以効其節今天下多故政令舛失者不一使賢智之士驅馳尚恐不足救其弊若猶復雍容拱黙為高以言議非所責則朝廷之事何寄焉近日伏聞中詔命羣臣論議時事斯誠陛下求治之志務通塞蔽然恐天下利害非一日可盡條陳欲乞特頒詔㫖告諭兩制兩省臣寮自今有聞朝廷闕失政令過差軍機利害雖非言職並許上章論列仍委中書置籍具録所上章疏遇欲進用臣寮令取有禆補多者用為選首所冀親侍之臣各知責任務圖傾竭以助政化慶厯八年二月上時為殿中侍御史上仁宗論吕溱等補外劉敞臣伏以馭臣之道在分别邪正正臣當親而近之邪臣當疎而逺之至於天下之人亦皆以此窺朝廷若正臣聚於朝則姦雄屏息治平可望若邪臣聚於朝則僥倖競進傾敗可待者不可勝察也臣伏覩朝廷太平積乆賢能衆多然其間邪正亦雜有之或愛君憂國公正發憤或朋黨比周背公植私亦有循黙自守不能為善又不敢為惡陛下臨御三十餘年矣以上聖之資監群下所為固無遁形固無隠情然有可戒謹者在此而巳凢正臣常難進而易退邪臣常易進而難退何以言之正臣者惟義所在言則逆君之耳是所以難進也言或不用不欲自顯因事而去是所以易退也邪臣者惟利所在言則逢君之欲是所以易進也行雖惡不顧禮義名雖醜不知愧耻患失之耳是所以難退也此兩臣者願陛下參伍觀之母使當親者疎當疎者親則朝廷尊榮而社稷安矣近者翰林侍讀學士吕溱樞宻直學士蔡襄繼出典郡今又聞御史中丞孫抃翰林學士歐陽修知制誥賈黯韓絳並乞補外此六人等皆有直質無邪心論議不阿執政有益當世者也誠不冝許之使四方有以窺朝廷而姦佞僥倖之雄因而競起此則邪正分别之一端也臣以孤拙忝侍從日夜思惟無以少禆聰明恐陛下忽於正臣之易退而忘左右前後直道之不容也臣不勝其愚謹獻所聞惟賜采擇至和二年六月上時知制誥同判吏部流内銓上仁宗論吕溱等補外係第二狀趙抃臣伏以天子南面之尊左右前後湏得正人賢士為之羽翼朝廷有大賞罰可以詢訪有大闕失可以禆益有大急難可以謀議有大禮法可以質正竊見近日以來所謂正人賢士者紛紛引去朝廷奈何自剪除羽翼臣未見其能致逺也憂國之人莫不為之寒心如吕溱知徐州蔡襄知泉州呉奎被黜知夀州韓絳知河陽府此皆衆所共惜其去又聞歐陽修乞知蔡州賈黯乞知荆南府侍從之賢如修軰無㡬今堅欲請郡者非他盖傑然正色立朝既不能曲奉權要而乃日虞中傷皆欲扳溱襄奎絳而去耳今陛下又從其請而外補之臣恐非朝廷之福朝廷萬一有緩急事則陛下何從而詢訪也何從而禆益也何從而謀議也何從而質正也所失既多雖悔何及詩不云乎濟濟多士文王以寜此謂文王雖大聖人得居尊而安寜者盖在朝多賢哲之士而致之然也臣愚伏望陛下鑑古於今勿使修等去職留為羽翼以自輔助則中外幸甚至和二年六月上時為殿中侍御史詔修黯依舊供職上英宗乞詔侍從直宿以備訪問司馬光臣聞天尊地卑道之常也而周易乾下坤上謂之泰者盖言人君降心以接臣人臣竭忠以事君然後上下交而其志同也若人君驕亢以自尊人臣怠慢以自疎則上下之情不通而否道成焉是以孔子語舜之徳曰舜好問而好察邇言其斯以為舜乎竊見祖宗之時閒居無事常召侍從近臣與之從容講論萬事至於文武朝士使臣選人凢得進見者徃徃召之使前親加訪問委曲詳悉無所不至所以然者一則欲使下情上通無所壅蔽二則欲知其人能否才器所任是以黜陟取捨皆得其宜太平之業由此而致㳟惟陛下潜徳藩邸踰三十年一旦龍飛奄有四海雖聖賢英睿得於天縱然與當世士大夫未甚相接民間情偽未甚盡知臣謂宣詔侍從近臣毎日輪一員直資善堂夜則宿於崇文院以備非時宣召若有事故請假則與以次官互換直宿其餘羣臣進見及奏事者亦望聖慈稍觧嚴重細加訪問以開廣聰明禆益大政嘉祐八年十月上時知諫院上英宗乞詔侍從直宿以備訪問司馬光臣前者兩次上言乞詔侍從近臣毎日輪一員直資善堂夜則宿於崇文院以備非時宣召若有事故請假則與以次官互換直宿亦曽面奉徳音云欲自以聖意宣諭政府施行此事自後至今未聞施行臣不避煩凟天聴再三進言者盖以為國之要在於審察人材周知下情而已審察人材之謂明周知下情之謂聰明則百官稱其職聰則萬機當其理百官稱其職萬機當其理治之極也賢不肖混淆之謂昏下情不上通之謂蔽昏則百職隳曠蔽則萬機乖戻亂之至也極治則安至亂則危故聰明昏蔽者治亂之大本也今陛下即政之初厲精求治而不以此事為先欲以興隆祖業垂裕後昆是猶却行而求及前人也故臣不得不勤勤懇懇為陛下再三言之書稱堯之徳曰稽于衆舎已從人稱舜之徳曰賔于四門明四目達四聰故能咸熈庶績格于上下至今言聖人者無不以二帝為首何哉聰明故也秦二世納趙高之謀恐譴舉不當見短於大臣而深拱禁中漢靈帝惑趙忠之言謂人君登髙則百姓散離而不敢登臺榭北齊後主志度柔懦不喜見朝士非私昵未嘗交語隋煬帝沈湎淫泆常在後宫盗賊滿天下恐人言之是以上下怨叛至於殺身滅國而終不自知後世言無道者無不以四君為首何哉昏衰故也太祖太宗起於側㣲天下艱難民間情偽無不備知然南面之日延訪羣臣唯恐不及晝日不足繼之以夜下至役夫田婦無不詢察以盡其情用能創業垂統力致太平陛下以帝王子孫長生冨貴朝士大夫素未相接耕織勞苦不經耳目當兹親政之始雖孜孜下問朝夕不倦以察人情猶恐不盡況深居九重非視朝之時不見羣臣羣臣非官位職事有例上殿無由進見顒卬淵黙以嚴重自居將使幽逺之民銜寃失職者何由上聞疎賤之臣懐材蘊徳者何由自達哉國家安危之所分將於此乎在臣所以不勝憤懣區區盡忠重為陛下陳之伏望陛下察為國之要觀唐虞之所以興秦漢齊隋之所以亡繼祖宗之志以守太平之業檢㑹臣前來所奏兩剳子内事節早賜施行寔天下幸甚治平元年六月上上英宗乞詔侍從直宿以備訪問司馬光臣屢曽上言乞詔侍從之臣每日輪一員直資善堂夜則宿於崇文院以備非時宣召亦曽面奉徳音云候秋凉當頻有宣召今已秋凉尚未聞有曽被召之人臣始者上言之時竊見陛下欣然開納將謂即時施行自後遷延日乆聖意漸以為難臣竊意内外之臣必有欺惑天聴沮難此事竊欲陛下常居禁中不與羣下相接以壅蔽聰明固權寵者此豈忠臣之所為而陛下之福邪臣願陛下深察此情斷自聖意使之更直陛下毎日聴政餘暇宫中無事之時特賜召對與之從容講論古今治體民間情偽使各竭其胷臆所有而陛下更加采擇是者取之非者捨之忠者進之邪者黜之如此則下情盡達聖徳日新矣若以資善堂體例稍生則學士待制於崇文院輪宿自有舊條只乞陛下傳宣崇文院今後直宿者並湏從早在彼祗候宣召其有事故請假者湏與以次官互換直宿此事極非難行而所益甚大惟陛下留意治平元年八月上上神宗乞降詔督責侍從論朝廷闕失范純仁臣竊以古者三公之下即建九卿皆所以左右王朝恊贊治道盖禄厚者其報冝重位髙者其責當深理之必然不容僣濫本朝自兩府之下亦設侍從之官自待制諌議巳上學士舎人皆是古來九卿之職朝廷待之恩禮既異士民瞻仰位貌亦崇是冝朝夕論思同共休戚今乃忘本徇末擇易捨難只將主判司局便為巳之職事言寵名則亞於四輔論補報則同於庶僚人情既務因循朝廷不加考核况來災異之後是陛下宵旰之時凢在近臣正宜盡瘁而其間甚有優㳺緘黙養望待遷無愛君憂國之言乏盡忠補過之義或有時政得失唯能退有後言處之不慙僅同胡越未必人人茍禄盖因習以成風不稼取禾莫斯為甚伏望陛下明降詔旨督責近侍凢是朝廷闕失並湏論列奏陳所上封章並付政府其盡心論奏而言多中理者稍加褒進其持禄不言或言而無取者量行黜責如此則朋龜効靈庶職修舉朝廷獲多士之助近臣免尸素之譏熈寜二年上時同諌院有㫖降詔施行詔詞具見鄒浩奏劄中上哲宗乞輪侍從官進對孔武仲臣伏見前日近臣論奏乞罷侍從官轉對而専責以朝夕論思之効朝廷尋已施行臣以謂論思者侍從之事然茍不持之以法度則責無所歸言與不言各從其意論思之効果安在也昔唐太宗聞直諌則奬激之乆不言事則誚薄之風聲所感羣下自勵是以終貞觀之世中外無壅蔽之事朝廷無佞媚之臣政理之效優出近世仁宗皇帝嘗御陽門親䇿羣臣又嘗開天章閣召執政八人賜坐授以紙筆使條陳政事之要嘗謂輔臣曰近日上封言政事得失何其少也豈非言路壅塞所致乎英宗皇帝嘗謂范純仁曰近日風俗可嘉羣臣能屢來言事如此人君日有益矣仁祖英宗汲汲乎求人言如此是以至和嘉祐治平之政至今稱頌昨日陛下親御經筵許講讀官進對凢預講讀者不過五六人陛下聞其規戒之言亦多矣况侍從官不止五六人其能言天下之事者固多患在未有以率之而已伏望逺稽唐太宗及仁祖英宗懃求人言之義近推經筵許侍臣進對之意輪流侍從官二人進對令各陳所見擇其是者推行之則轉對之法雖廢論思之責猶在也元祐七年八月上時為中書舎人上哲宗論近臣不當以直言罷制彭汝礪臣竊聞禮部侍郎曽肇以議禮不當乞從罷黜䝉恩降知徐州給事臺諌臣有言臣竊謂南北郊合祭事朝廷自許近臣集議或同或異乃是常理必以此罷黜一從官如肇用意真國家忠臣朝廷容納直言愛惜人才義當為改命令體問畫黄巳到吏部臣以為過矣臣伏念才難乆矣人常千百億而無一二茍或有之或流落而不偶幸而有之又既得之或棄於無所用故治安之日常不足而危亂之日常有餘孔子曰如有所譽必有所試如肇者其文可以當大命令其學可以决大謀議頃在西掖屢能補縫闕漏及還禮部遂能是正典常循名觀寔謂之賢可矣且並祭之禮不經見如臣軰皆莫遑安其能奮不顧身忤大臣為陛下言者獨肇而已朝廷既不用其言又遂黜其人故臣以為過或曰朝廷非惡肇議禮謂其言過當而已夫言不直則道不見今病者之求藥唯病之愈是望故雖五毒徧施針砭切骨而不為過使唯香味顔色之恱則豈唯不足治病適足以誤病書曰有言逆於汝心必求諸道有言遜于汝志必求諸非道肇之言雖有所拂以道觀之為當矣夫欲安榮惡危辱人情之所同也臣願陛下少留神明以其理度之今人不肖朋比大臣而肇為朝廷明是非論然否非為其身耶以國家故耶順從緘黙則速得福奮厲激昻則速得禍而人臣終不忍不言以負陛下此其心不在其身而在人主不在其私而在國家可見如曰人臣瀝肝膽披腹心為陛下國家長乆慮患而陛下屏去不容此甚非計也夫上所好惡人之表也今侍從之臣不能依随大臣而陛下去之則孰不願附大臣今一有言而陛下去之則孰不欲學不言近臣與國家同安危共休戚使皆附大臣而不以國為憂閉口不言而為妻子計此非社稷之福也惟陛下察之念之方朝廷多事宜盡得心膂之賢徧置左右博求骨骾之士並為輔拂盖猶恐不足今有一曽肇而不能留故臣以為過非獨臣也凢忠於陛下者皆然南北郊祭議始下臣嘗與肇言天地之祭至大至重今欲易於改作寔所未安肇云使無言責某决不敢緘黙肇為禮官其言當在肇遂有論議肇既逐臣亦難處肇終不可留臣亦願與同罪焉肇命巳下而未行臣至愚欲望太皇太后殿下皇帝陛下深以愛大才容直言為念出自聖㫁且留肇置朝廷肇守官任職必有以報國臣言或謬靡所逃誅夫改易差遣常事也留賢者盛徳也在朝廷盖優為之矣元祐七年十月上時為吏部侍郎肇疏見郊祀門上徽宗乞如神考故事詔侍從言事鄒浩臣伏見神考嘗詔侍從官言事其略曰𫝊曰近臣盡規以為榮耻休戚與上同也今在此位者視朕過失與朝廷政事之闕黙而不言乃或私議竊歎若以其責不在巳夫豈習見成俗以為當然其亦有含章懐寳待倡而發者也冝令侍從官自今視朕與朝廷政事之闕無有巨細各具章極言無隠噫言善而不用朕有厥咎道之而弗言爾為不㳟朕將用此考察在位所以事君之寔而明黜陟焉夫自五帝以來神聖超卓如我神考可謂羣臣莫能及矣然猶咨訪闕失不敢忽如此今陛下寵待近臣甚厚是亦神考之用心顧近臣未必皆能上體聖意敢以所見極言無隠欲望如神考故事特降詔書諭以至懐庶㡬人人思自罄竭陛下從而覧之豈唯兼收博采坐以無事而臣下忠邪得失之情亦因以灼知而盡見此要道也元符三年三月上時為右正言學士待制上仁宗論學士不可令中書依資差除歐陽修臣近見翰林學士蘓紳葉清臣等相繼觧職風聞侍從之臣内有姦險小人頗急經營爭先進用至有喧忿之語𫝊聞中外者既虧亷遜之風又損朝廷之體臣伏思翰林學士職重於唐世乃是天子親信朝夕謀議内助之臣當時號為内相故其進用尤極精選只取才識不限資品徃徃自州縣官擢而拜者國朝近嵗於此一職頗非其人既其材識愚下不足以備訪問人主因之薄其待遇亦漸疎外同於冗官遂容小人得以濫進臣思其弊盖由不合令中書依資差除且學士之職本要内助天下講論外朝闕失今若却令中書除人置於内制則是恩出中書之人雖在天子左右與無同也伏乞自今後翰林學士不必足員用人不限資品但擇有才望正人堪充者出自聖意擢用以杜小人爭進之端而天子左右更無姦邪之人庶清侍臣之列慶厯五年五月上時以知制誥知諌院上仁宗乞限定學士待制員數錢彦逺臣以侍讀待制職名乃漢文學諸吏唐常侍給事之官清貴嚴近職在侍從獻納規諷謀謨非資重才周文華兼美不授非以恩例叙遷可得國朝㨂任精極先帝時待制張知白自參知政事方除翰林侍讀學士出外及祥符中特置待制四員令更直祕閣以備顧問則聖人求賢擇才之意深矣而近嵗除授頗多凡任使稍重例帶此職邉防列鎮印綬纍纍不唯名數益輕兼恐奬擢有濫夫爵禄品秩其選謹則職事修舉其流雜則賢愚混淆一失本源沮勸何賴臣欲乞今後自翰林侍讀樞密直龍圖閣直等學士及龍圖天章閣待制並依翰林學士知制誥故事各限定員數遇有闕方許除授其三路帶安撫使臣寮並乞别除職名所貴内外流品有殊朝廷之官益重皇祐元年上時知諫院上仁宗乞依舊制命學士獨員舉臺官歐陽修臣近准勑為見闕臺官下學士院令臣與孫抃等同共保舉兩人聞奏者伏以學士之職置自有唐初以文辭供奉人主其後漸見親信至於朝廷機密及大除拜每被詢訪皆與參决當時居是職者選擢既精信任亦重下至五代莫不皆然國朝遵用唐制尤重其任自比年以來選用之際時容謬濫職以人廢官以人輕徃時臺官闕人只命學士一員獨舉今乃令三人共舉若以為俱可信則一員只以公舉若以為俱不可信則雖衆舉亦豈為得人若以為有可信有不可信則自冝捨不可信者専委可信者其不可信者既不稱職罷黜之可也以臣思之朝廷所以遽改舊制而學士不足取信皆由用非其人如臣是也今在院學士三員孫抃胡宿各曽舉人伏念臣材識庸暗不能知之使臣随衆書名則臣寔為恥欲三人所見皆一則理必不能欲望聖慈免臣共舉却依舊例只命學士一員専舉况孫抃胡宿嘗曽舉官可以不疑如以臣為不可獨任乞候將來續有臺官員闕更不差臣専舉非敢避事直以任非其才不足取信致煩朝廷改更舊制以此不敢不言至和元年上時為翰林學士上仁宗乞限定學士待制員數歐陽修臣竊以學士待制號為侍從之臣所以承宴間備顧問以論思獻納為職自祖宗以來尤精其擇茍非清徳美行藹然衆譽高才博學獨出一時則不得與其選用至艱員數至少官以難得為貴人以得職為榮搢紳之望既隆則朝廷之體増重其後用人頗易員數漸多徃時學士待制至六七十員近年以來稍謹除拜即今猶及四十餘員臣謂愛惜名器不輕授人朝􅋝既已知之矣而為國家計者冝於此時創立經制今唯翰林學士中書舎人知制誥各有定員其餘學士待制未有員數臣今欲乞檢詳前史及國朝故事自觀文殿大學士至待制並各立定員數遇有員闕則精擇賢材以充其選茍無其人尚可虚位以待如允臣所請乞賜詳議施行至和二年二月上時為翰林學士上英宗論范鎮乞郡韓維臣竊聞翰林學士范鎮上章求補郡外議籍籍皆以為陛下以鎮作宰臣批荅不稱㫖諭令觧去不知此事虚寔果如此臣竊為陛下不取也鎮誠有罪自可明正典刑若其所失止在文字之間茍非甚悖義理猶當含容以全待近臣之體陛下前黜錢公輔中外莫不以為太重至或相𫝊謂公輔别有過慮主上不欲暴揚故行遣至此陛下連退二近臣而衆人皆不曉然知其所謂臣恐自請例湏換職領郡於鎮何損但可惜者陛下不眀朝廷賞罰耳臣近對延和嘗論人君好惡當明見賞刑以示天下使人知所從避則風俗可移又以為雖聖賢思慮不能全無過差假如陛下誤有處分改之則足彰納善從諌之美此語甚近陛下亦應記省臣驟蒙㧞擢不敢俛黙自同衆人伏望聖慈思臣嚮者所言更於此事精加思慮及其未有成命速賜回革所冀不至上累聖徳治平三年正月上時知制誥上哲宗論職事官帶職朱光庭臣等伏覩三月十八日聖㫖職事官許帶職内尚書候二年加直學士中丞侍郎給事諌議通及一年加待制臣踰月于兹反復思之不得其義多士紛紛之説不可勝紀聊採十說以陳於前惟陛下垂聴幸甚説者曰立為此法庶職事官罷日不煩商量便可令帶出臣以謂為中書自便則可於朝廷體要則未安也不若因其除外易以職名在人主恩意則新於臣下寵光亦異今既平居無事先以與之則一日補外何以示恩更進則太優不加則近薄雖曰善遷廼如少貶此不可一也借如自尚書一年餘罷則當與之直學士耶與之待制耶與待制則無以别於侍郎與之直學士則不應今日所立新制此不可二也或尚書侍郎而下以罪被謫於尋常例當落職者不知止落職事官之職耶并落職名耶不落職名則與平遷善罷無以異矣落則是不問過之輕重皆當奪兩重職矣此不可三也官制以來由諌議大夫中書舎人方為給事中由給事中方為侍郎而御史中丞又在侍郎之上其為等差如此今一年之後合為待制則等差紛紛然莫可辨矣此不可四也昨有自尚書除御史中丞者豈可一年之後亦止於加待制則為降官與直學士則為亂法舊制知雜御史乃今侍御史其於中丞相去甚逺猶有不歴月踰時或纔滿嵗遂遷待制者今為中丞一年方得待制是今中丞反輕於前日之知雜御史也舊制知制誥乃今中書舎人自居待制之上次遷當為翰林學士其或遷雜學士雖至於侍讀學士若不與權三司使及權知開封府皆不為美遷今一年之後乃得加待制是今日中書舎人亦輕於前日之知制誥也又既為中書舎人以典制誥為職事其於侍從最為親近豈湏更帶待制此不可五也六曹之官容以衆材並進或以錢榖稱或以刑法用使為尚書侍郎則可使兼學士待制則不可不然名品混殽而清濁一流矣此不可六也從來以寄禄官為行守試則試者多而行守少加職之後以職為行守試則試者少而行守多暗陞資格隂益俸錢而陛下不知此不可七也官制以前待郎尚書類為叙遷之官故更以帶職為寵官制以後以階為寄禄而尚書以下寔行其職故自以職事官為重恩數之優非昔日比無更稍加職之例豈可以專官制之重職又兼舊制之寵名此不可八也人主之所以厲世磨鈍屈天下英雄之心俱入於術中者唯名與器而已故美官重器必使有難得之勢則人以得為榮為勸若予之不加重不予不加輕嵗月所積例以授之則鄙夫以茍得自矜而高材以同受為恥矣此不可九也待制職備顧問非學術該通議論雅正誰宜為之祖宗之世其選最精出入朝廷纔一二人而巳故當世人人皆以為貴今乃立法無有定員將一年之後待制滿朝必有斗量車載之謠以玩陛下名器此不可十也方陛下修明法度齊正典章之時而官制職名參錯如此臣謂終不可以並行伏望聖慈特詔輔臣别加講議裁定歸一適於至當庶行之當世而無礙垂之將來而可乆貼黄唐室中間清職要官失於冗濫故時人為之語曰補闕連車載拾遺平斗量杷椎侍御史盌脱校書郎至今以為笑談臣誠恐明年以後待制太多天下之人亦生輕侮在陛下清明之朝不可不謹也元祐元年四月上時為右正言宋名臣奏議巻四十九
