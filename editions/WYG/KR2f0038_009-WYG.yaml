body:
  text: 宋名臣奏議巻九宋趙汝愚編君道門慈孝上上英宗論謹始數事司馬光臣愚竊惟先皇帝春秋未甚髙以宗廟社稷之重昭然逺覽確然獨斷知陛下仁孝聦明可守大業擢於宗族之中建為嗣子授以天下其恩徳隆厚踰於天地固非微臣所能稱述今不幸奄棄萬國陛下哀慕泣血以夜繼晝過於禮制以至成疾中外聞者無不感泣知先皇帝能為天下得人治平之期企踵可待羣臣百姓不勝大幸今者聖體痊平初臨大政四海之人拭目而視傾耳而聽舉措云為不可不謹易曰君子以作事謀始召誥曰王乃初服嗚呼若生子㒺不在厥初生自貽􅈒命夫為政之要在於用人賞善罰惡而已三者之得則逺近翕然嚮風從化可以不勞而成無為而治三者之失則流聞四方莫不解體綱紀不立萬事墮頽治亂之原安危之機盡在於是臣願陛下難之謹之精心審慮如射之有的必萬全取中然後可發也陛下思念先朝欲報之徳奉事皇太后孝謹撫諸公主慈愛此誠仁孝之至過人逺甚臣願陛下雖天性得之復加聖心夙夜匪懈謹終如始以結億兆之心刑四方之化則福禄流於子孫令問垂於無窮矣古者人君嗣位必踰年然後改元臣願陛下一循典禮勿有變更於中年也三年之喪自天子達於庶人一也自漢氏以來始從權制以日易月臣願陛下雖仰遵遺詔俯徇羣情二十七日而釋服至於宫禁之中音樂逰燕吉慶之事皆俟三年然後復常以盡慎終追逺之義焉禮為人後者為之子故為所後服斬衰三年而為其父母齊衰不杖期為所後者之親皆如子而為已之親皆降一等蓋以特重於大宗則宜降其小宗所以専志於所奉而不敢顧私親也漢之宣帝自以為昭帝後終不敢加尊號於衛太子史皇孫光武起於布衣親冒矢石以得天下自以為元帝後亦不敢加尊號於鉅鹿都尉南頓君此皆徇大義明至公當時歸美後世頌聖至於哀安桓靈或自旁親入繼大統皆追尊其祖父此不足為孝而適足犯義侵禮取譏當時見非後世臣願陛下深以為鑑杜絶此議勿復聽也凡此數者伏計陛下聦明皆素知之然臣復區區進言誠懼不幸有諂䛕之臣不識大體妄有開説自求容媚陛下萬一誤加聽從聖言一出布聞於外則足以傷陛下之義虧海内之望臣雖欲捐軀争之亦無及已是以不敢不先事而言庶㡬聖徳純粹全美不有秋毫之缺使一夫竊議於草莱者臣之志也輕冒宸嚴不勝悃欵惶悸之至嘉祐八年四月上時為天章閣待制知諫院上英宗論兩宫當相恃為安司馬光臣聞天地交謂之泰天地不交謂之否天地者上下之象也施諸人事君仁而臣忠父慈而子孝兄愛而弟恭皆泰也君不仁臣不忠父不慈子不孝兄不愛弟不恭皆否也泰則上下之情通内外之志和國以之治家以之安否則上下之情塞内外之志乖國以之亂家以之危治亂安危之分不在於他在於審察否泰之端而已矣書曰立愛惟親立敬惟長始于家邦終于四海自古聖王治天下之道未有不自孝慈始者也恭惟先帝屬籍之親凡數百人獨以天下之業傳於聖明皇太后承顧命之際鎮撫中外決定大䇿其恩徳隆厚踰於天地何可勝言皇帝至性烝烝哀以執喪恭以致養夙夜憂勞以成疾疹其於慈孝之美可謂至矣然臣猶竊有所懼不可不過慮於萬一先事而進言者臣聞金隄千里潰於蟻壤白璧之瑕易離難合况社稷之重非特金隄也骨肉之親非特白璧也在於守之至謹執之至固全美無間然後福禄無疆也夫姦邪之人專闚上意茍有釁隙則因而乗之於是離間人君臣交鬬人父子使之上下相疾内外相疑然後得奮其詐謀以盜其大權私其重利自古以來喪國敗家未有不由此者也今雖睿聖在上朝廷清明中外之臣咸懐忠良然禍福之原其來甚微舉措聴納不可不謹臣愚竊惟今日之事皇帝非皇太后無以君天下皇太后非皇帝無以安天下兩宫相恃猶頭目之與心腹也皇帝聖體平寧之時奉事皇太后承順顔色宜無不如禮若藥石未效而定省温凊有不能周備者亦皇太后所宜容也孔子曰孝哉閔子騫人不間於其父母昆弟之言蓋言誠信純至表裏著明而他人不能間也孟子曰父子責善賊恩之大者也蓋言骨肉至親止當以恩意相厚不當較錙銖之是非也臣愚伏望皇帝常思孔子之言皇太后無忘孟子之戒萬一姦人欲有開説涉於離間者當立行誅戮以明示天下使咸知讒佞之徒不能欺惑聖明也方今天地鬼神羣臣百姓鳥獸草木皆恃兩宫以為安若兩宫懽忻於上則天地鬼神得以歆其禋祀鳥獸草木得以遂其生息况羣臣百姓孰不願保首領以樂太平之化哉嘉祐八年六月上時知諫院上慈聖皇后乞益加慈愛司馬光臣聞聖人之徳使四海之外編户之民皆輻湊而歸之如孝子之奉父母其故何哉推仁愛惻怛之誠以加之也故詩云豈弟君子民之父母夫四海至逺也編户至微也誠之至也猶可以為之父母况閨門之内血氣之親乎昔漢明帝馬皇后無子明帝使養賈貴人之子炟以為太子且謂之曰人不必自生子但患愛養不至耳后於是盡心撫育勞悴過於所生及明帝殂太子即位是為章帝章帝亦孝性純篤恩性天至母子慈愛始終無纎介之間前史載之以為美談臣恭惟仁宗皇帝憂繼嗣之不立念宗廟之至重以皇帝仁孝聦眀選擢於宗室之中使承大統不幸踐祚數日遽嬰疾疹雖殿下撫視之慈無所不至然醫工不精藥石未效竊聞曏日疾勢稍増舉措言語不能自擇左右之人一一上聞致殿下以此之故不能堪忍兩宫之間微相責望羣心憂駭不寒而慄今仁宗新棄四海皇帝久疾未平天下之勢危於累卵惟恃兩宫和睦以自安如天覆而地載也豈可效常人之家争語言細故使有絲毫之隙以為宗廟社稷之憂哉臣是用日夜焦心隕涕側足累息寕前死而盡言不敢幸生而塞嘿也伏以皇帝内則仁宗同堂兄之子外則殿下之外甥壻自童幼之嵗殿下鞠育於宫中天下至親何以過此又仁宗立以為皇子殿下豈可不以仁宗之故特加愛念包容其過失耶况皇帝在藩邸之時以至踐祚之初孝謹温仁動由禮法此殿下所親見而明知也茍非疾疹亂其本性安得有此過失哉夫心者神明之主也若其有疾則精爽迷亂冥然無知言語動作不自省記不識親疎不擇貴賤此乃有疾者之常不足怪也殿下聦眀睿智天下之理無所不通豈可責有疾之人以無疾之禮耶今殿下雖日多憂勞徒自困苦終何所益以臣愚見莫若精擇醫工一二人以治皇帝之疾旬月之間察其進退有效則加之以重賞無效則威之以嚴刑未愈之間但當深戒左右謹於侍衛其舉措語言有不合常度者皆不得以聞庶㡬不増殿下之憂憤殿下唯寛釋聖慮和神養氣以安靖國家綱紀海内俟天地垂祐聖躬痊復然後舉治平之業以授之不亦美乎古之慈母有不孝之子猶能以至誠惻隱撫存愛養使之内愧知非革心為善况皇帝至孝之性稟之於天一旦疾愈清明復初其所以報答盛徳豈云細哉臣之愚慮苦言盡此而已乞殿下更賜裁擇嘉祐八年十月上時知諫院上英宗乞益致孝謹司馬光臣先於四月二十七日及六月二十三日皆曽上疏以陛下受仁宗皇帝之天下欲報之徳當奉事皇太后孝謹撫諸公主慈愛勿使姦邪之人有所離間致兩宫有隙以上貽宗廟之憂下為羣生之禍叩心瀝膽極其懇惻未審臣言得達聖聽或萬㡬之繁未甞奏御也此乃成敗之端安危之本不可不察臣聞漢章帝乃賈貴人之子明帝使明徳馬皇后母養之后盡心撫育勞悴過於所生皇帝亦孝性淳篤恩性天至母子慈愛始終無纎介之間馬氏三舅皆為卿校列侯賈貴人終不加尊號賈氏親族無受寵榮者此前世美事今日所當法也詩云父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之徳昊天㒺極然則父母之恩不獨以其生已也拊畜長育居其大半焉陛下自齠齔之年為皇太后所鞠育恩亦至矣又况今日為仁宗皇帝之嗣承四海之大業乎臣謂陛下宜夙興夜寐昏定晨省親奉甘旨承順顔色無異於事濮王與夫人之時也近者道路之言頗異於是紛紛籍籍深可駭愕臣竊惟陛下孝恭之性著於平昔豈容一旦遽肯變更蓋曏者聖體未安之時舉動語言或有差失不能自省而外人訛傳妄為増飾必無事實雖然此等議論豈可使天下聞之也周書曰小人怨汝詈汝則皇自敬徳古人有言曰禦寒莫如重裘弭謗莫如自修陛下疾疹未平固無如之何若既愈之後臣愚伏望陛下親詣皇太后閤克已自責以謝前失温恭朝夕侍養左右先意承志動無違禮使大孝之美純粹光顯過於未登大位之時如此則上下咸悦宗社永安今日道路妄𫝊之言何能為損也古之至孝者雖有不慈之母猶能使之感悟驩悦回心易慮况皇太后聖善之徳著聞四方自陛下有疾以來日夜泣涕禱於神祗憂勞困悴以冀陛下之安寧如耕者之望收涉者之求濟陛下豈不思有以慰安之也臣不勝區區干冒以聞乞留神采擇嘉祐八年十一月上時知諫院上英宗乞上奉慈闈以全孝徳吕誨臣聞置天下方乎置器者蓋在君人者審乎安危之勢所以有守成之難有持盈之戒者正謂是矣我太祖太宗造宋之艱難承五季之弊平諸夏以為一援生靈於塗炭安寰海於覆盂真宗以神武定二虜以文徳綏萬方薦功髙厚著于金石仁宗在宥四十一年循持憲度何嘗殺一不辜失一有罪恵澤下流有生畢遂可謂仁信之至集百年之昌期纂四聖之丕緒矣而褒豫鄂王相繼不育意者天以陛下當其歴數錫之休命席乎成業有以恢隆萬世之基而又知先帝明哲拔陛下於公族授之以震器皇太后鞠養聖躬保䕶成徳一旦恭宣玉几之命謀先輔弼之助陛下安步中外帖然功徳為重矣恩徳為厚矣陛下報之之道宜如何哉然自踐祚三日之内親決數事至明燭理人皆慰忭有望於治平矣屬以聖候爽和嬰仍于今竊聞所上湯劑未甞服餌太醫診脈而不敢言病内臣依違而不敢進藥良以天威違拂震慴靡遑日度一日殊不知誤天下之大矣且百金之子尚有倚衡之誡而萬乘之貴殊無保邦之慮邪矧又聞流議騰沸謂陛下視朝之後燕適宫中言動無節嘻笑不常執喪之禮未至奉親之道或闕以至晨昏省問曠絶者踰月虧損盛徳莫大於此但外臣不知端倪果如是乃陛下重違天意不以繼承為念忽先帝顧託之命輕萬乘崇髙之體忘聖母鞠育之恩違孝子承顔之道何以上奉宗廟率教於天下也臣重思違豫而來已逾半嵗萬㡬之事都無可否而賴皇太后處内大臣盡心中外循常理軍民無怨言直以累聖恩徳浹人之深爾尚恐曠日持久人心動搖變生於内将安寄處臣竊為陛下寒心也臣備員諫列既有所聞痛心疾首敢復緘黙以謂聖帝明王好聞已過忠臣孝子不隱其情是以懇懇切言不避諱忌伏望宸聦循省既往不逺而復起居必謹言動必思上奉慈闈克全孝徳念先帝付託之重審置器安危之勢知良藥可以利病則勉勤服餌謂忠言可以利行則廣其開納流言自弭休聲日至天下幸甚嘉祐八年十一月上時同知諫院上慈聖皇后乞調治聖躬建立儲副呂誨臣竊以兩漢而後諸侯王入繼聖統者甚衆或以功或以賢或以親或以黨四者之繼隆替之所係以功與親賢者何嘗不興隆於寶緒繇黨附而至者未有不基乎禍亂哀平桓靈之𩔖是也千百載之下為之監戒今上生而敏睿天資英􅈒先帝知其厯數在躬又當近屬實以親而賢授之寶器及誕告于外讙聲翕然殿下以積勲之後配徳仁宗主宣陰教天下䝉福上自潜徳之初殿下鞠育保護者三十年矣先皇厭代宣導遺旨掌握機柄佐佑聖嗣克安天下永我帝業丕功茂實固不待愚臣一二而談矣上違豫而來重煩聴斷庶務允輯中外賴焉比聞流議喧傳上疾未間言或荒忽承顔之禮時有所闕殿下㡬至不能容覆外臣㒺測謂之然矣臣竊慮小人乘間幸兩宫如是陰為交鬭以生他事殿下察其素履知其有疾故當責忠臣之輔助擇太醫之調理又聞上意自倦服藥以致醫工久無效驗然病者苦其瞑眩斯亦常情誠恐奉御之人但能備禮不敢强以服餌積日之深其誤不細惟殿下廣乎容納之度忌其惰慢之禮親閲湯劑力為調治强之以嚴威撫之以恩愛如此人神和悦得不降祐上之起居必遂安適不然恩禮中闋慈孝兩失人言不已其如天下何其如宗廟何其如先帝何三十年保育之功一朝而棄臣竊為殿下惜之臣重思療治之法即如是言萬世之計敢不為殿下陳論漢馬皇后畢明帝世克全美徳以至鞠養章帝勞悴過於所生母子慈愛始終無纎介之隙章帝終為賢聖之主其保助亦已明矣史􅁽書美世逺益光臣伏願殿下循修以為法度念先帝之顧託體聖躬之憂危宫中間言不可不察方四海顒顒日期振治萬㡬取決不可持疑雖神宇暫勞而宋祚安矣俟上躬平和還居清浄燕怡夀考豈不休哉况淮陽王及諸孫天資淳篤宜均撫育以盡愛慈繼繼承承本根為重儲副之位安可暫虛殿下宜上承天意下順人心謀及輔臣助成君徳早議建立旁絶闚覦則廟社之福天下之幸嘉祐八年十一月上時同知諫院上英宗乞奉養始終如禮司馬光臣竊聞近日陛下聖體甚安奉事皇太后昏定晨省未甞廢闕非獨羣臣百姓之福乃宗廟社稷之福也陛下既為仁宗皇帝之後皇太后即陛下之母也今濮王既殁陛下平生孝養未盡之心不施之於皇太后将何所用哉臣聞君子受人一飰之恩猶不忍負之必思報荅况皇太后有莫大之徳三陛下豈可斯須忘之先帝立陛下為嗣皇太后有居中之助一也及先帝晏駕之夜皇太后決定大䇿迎立聖明二也陛下踐祚數日而得疾不省人事中外衆心惶惑失措皇太后為陛下攝理萬㡬鎮安中外以俟痊復三也有此一徳者則陛下子子孫孫報之不盡况兼三徳而有之陛下所以奉養之禮若有絲毫不備四海之人其謂陛下為如何天地鬼神其謂陛下為如何此不可以不留聖心也今陛下已能奉養如禮而臣復區區進言者誠欲陛下戒之謹之始終無倦外盡其恭内盡其愛使孝徳日新令聞四達以叶天下之望保萬世之禄而已若萬一有無識小人以細末之事離間陛下母子不顧國家傾覆之憂而欲自營一身之利者願陛下付之有司明正其罪使天下曉然皆知陛下聖明仁孝不負大恩而讒佞不能間也治平元年三月上時知諫院上英宗乞謹奉養勤聽斷司馬光臣累曾上言乞陛下加意奉養躬親萬㡬言辭澁訥未䝉采納臣竊惟當今切務無大於此是敢不避斧鉞重有敷陳至於奉親之禮報徳之義為君之職訪善之道臣嚮來文字叙述已詳不敢復煩聖聽獨以目前利害言之陛下誠詳擇焉竊以皇太后母也陛下子也皇太后母儀天下已三十年陛下新自藩邸入承大統若萬一兩宫有隙陛下以為誰逆誰順誰得誰失又仁宗皇帝恩徳在民藏於骨髓陛下受其大業而無以報之則何以慰天下之望若陛下上失皇太后之愛下失百姓之望則雖有大寳之位将何以自安凡人主所以保國家者以有威福之柄也故民畏之如神明愛之如父母今陛下即位將近期年而朝廷政事除拜賞罰一切委之大臣未甞詢訪事之本末察其是非有所與奪臣恐上下之人皆以為常威福之柄寖有所移則雖有四海之業將何以自固位則不安業則不固於陛下果何所利乎陛下必以為事皇太后之禮止如是亦不失矣親萬㡬之務止如是亦無闕矣臣竊以為不可臣聞陛下昔在藩邸事濮王承順顔色備盡孝道凡宫中之事濮王皆委陛下幹之無不平允陛下事皇太后當一如濮王然後可視天下之政當一如宫中之事然後可况濮王之親以恩皇太后之親以義其奉養之謹非特有所加則無以取信也宫中之事小天下之事大其聽斷之勤非特有所加則無以致治也儻奉養極其謹聽斷極其勤則陛下仁孝之名流於萬世英睿之徳達於四表宗廟永安子孫䝉福於陛下有何所害而久不肯為哉凡此利害之明有如白黒取舍之易有如反掌陛下今日回意易慮猶未為晚若固守所見終無變更臣恐日月寖久釁隙愈深不可復合威權已去不可復收後雖悔之或無及已臣受國家累世大恩不敢愛死為陛下極陳社禝之計肝膽所蓄盡此而已伏望陛下少留意察之治平元年三月上時知諫院上英宗乞謹奉養勤聽斷係第二状司馬光臣近以私懇求鄉便一州伏䝉聖恩令宰臣宣諭以臣曏所言事略皆施行令臣且在諫院供職未得求出臣以駑下之質生於盛明之世得備諫官為幸已大况陛下謙恭接下容受直言此乃愚臣千載一遇畢命報國之秋豈願離去左右自棄於疎逺之地誠以父母墳墓久不展省人子之心皇皇不安所以有此陳乞今忽奉聖㫖宣諭如此臣惶恐慚悚無地自容夙夜循省進退維谷臣竊惟曏時所言欲陛下以事濮王之禮事皇太后又欲陛下延訪羣臣躬親政事今陛下雖奉事皇太后加於往日猶未及事濮王之時承顔順意曲盡歡心也雖省覽庶政猶未嘗訪問羣臣講治亂之切務也陛下若以二者為止當如此則兩宫之意無由和洽萬㡬之務無由治辨禍亂之原尚在太平之期尚逺臣雖日侍丹扆有何所益陛下若奉養之禮日増月益訪求治道勤勞不倦使慈母歡忻於上百姓安樂於下則臣雖在逺方猶在陛下之側也臣聞為人子者事其親而親不悦不敢怨也退而自責曰我之愛不至歟愛至矣而猶不悦則曰我之禮不恭歟禮恭矣猶不悦則曰我之誠不盡歟誠既盡矣則大孝之名達於四海通於神明神明且猶助之而况人乎臣又聞為人君者視天下有一事不治以為已過有一民失所以為已憂天下已安已治矣猶復思將來之患而豫防之天下未甞無事也在人君思與不思而已矣思之則治安不思則亂危陛下儻能以此二者自勉則臣安敢廢公家之急而徇私家之務乎治平元年三月上時知諫院上英宗乞親決政事而内盡子道呂誨臣恭聞近日聖體平復中外均慶然萬㡬之事未聞親決議者謂陛下遜避有所待焉果如是恐未為順敢不為陛下委曲而陳之且以兩漢而下母后臨朝者衆皆嗣君沖幼親為輔翊並坐簾帷之下專其聽㫁幼君既長有復辟之議今日之事有異於是先帝拔陛下於公族之中以賢且長付託之意正為今日也當陛下違豫之時非皇太后内輔則政無所寄大臣建䇿於國忠也然而陛下臨朝御前殿百官朝罷兩府大臣方至内東門是綱領柄權皆在於手陛下自未專決何所待也臣伏望宸𠂻感悟無以此為念唯内勤孝養率中宫盡禮則婦姑之情相接母子之愛益親躬修政務操守威福日與近臣講求治道事無過舉體斯為順自然皇太后慰安恩意無間燕適深宫優㳺清靜含飴弄孫不復關政豈非皇太后之心耶臣區區罄于是矣治平元年三月上時知諫院宋名臣奏議巻九
