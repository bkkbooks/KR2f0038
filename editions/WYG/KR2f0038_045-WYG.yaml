body:
  text: 宋名臣奏議卷四十五宋趙汝愚編天道門災異九上徽宗論建火星觀以禳赤氣任伯雨臣聞天人之交不啻影響災祥之來必有象𩔖故格王先正厥事而聖人惟能畏天嘗聞修德以弭災未有因祈禳而消變六經所載百世可知臣風聞近日内臣打量太一宫側欲建火星觀以禳赤氣之異臣始聞之深所不信亦既累日傳者益衆臣為諌官當救其源聞雖未詳敢不先事犬馬之心懐不能巳竊以陛下躬道徳生知之資膺天人共與之運然即位以來災異屢降盖天之於人君猶父之於其子愛之深則教之至數有災異或者欲陛下戒懼以謹厥初歟陛下固宜小心修徳克已正事謹按洪範以五事配五福而說者謂視之不明是謂不哲時則有赤祥陛下當益廣聰明判别賢佞攬權綱以信賞罰專威福以察功罪使皇明赫赫事至必斷則乖異之象轉為休祥昔太戊有桑楮之祅髙宗有鼎雉之異皆能寅畏克正厥事成中興之功延過歴之年盖未聞勞人費財留心土木也若使修徳之效不及祈禳則聖人六經何獨不載又若祈禳有感修徳不應則無私上天乃可私禱人之所欲天必從之天豈厲民以求報哉陛下必若建此臣竊妄計其費不下百萬矣陛下取之有司耶則帑藏空虚經費不足取之有司必且不辦取之内庭耶則括刷内庭亦已廹矣河北一路物貴人饑前年至今流移滿道朝廷熟視無力可救與其捐所急以事無用孰若緩所用以恤所急如此則所費有名所惠成徳人人鼓舞天下相慶皆以陛下損已便民道光前古人心恱而天意得矣赤氣之異豈不轉而為祥哉臣伏願陛下逺稽格王仰測天意畏之以心謹之於事不泥世俗之論罷去祈禳之役則人情自孚上穹昭荅矣建中靖國元年正月上上徽宗論月暈圍昴畢任伯雨臣先曽論湟州事乞陛下俯稽衆議早定棄守之䇿又曽論赤氣事乞陛下仰推天變豫防夷狄竊發之虞天道幽逺理難取必方此恐懼以俟妄言之罪乃今月初八日夜伏見月暈圍畢昴謹按漢志曰畢昴天街也其北為胡其南為漢而參為趙魏之郊昔漢髙帝七年月暈參畢遂有平城之圍以此觀之象不虚示必有可考夫以陛下躬堯舜之資乘千載之運小心順帝動無過舉而天象屢變其故何也盖天心深憂陛下欲陛下畏懼修省先事為備故變之來併在數月推考衆𩔖皆為兵應雖非諄諄理不虚示臣謹為陛下先論湟州次論陜西五路終論河北略具畫一如後一湟鄯二州罝勒斯賚地罝氏世効忠順有功朝廷為國家興國在真宗時繼遷為冦罝氏之兵牽制卒使兵敗困於六谷朝廷以其功大封武威郡王及康定寶元元昊不順又常出兵以助中國仁宗再封武威王自是凡有夏賊之虞罝氏必為中國之助朝廷所以無熈河陜西之憂者以罝氏為藩籬也前年因瞎征竊據失國出走王瞻胡宗囘乘彼之亂妄稱納土殺降攘貨自去藩屏覆軍殺將失信夷狄朝廷一切不治其罪既巳棄鄯湟獨尚留不惟孤絶地不可耕饋糧艱阻勢難獨守亦恐罝氏衘怨結連夏賊或勢力微弱為所并自此西方吐蕃諸族必盡服屬夏賊益彊國家邊面益廣由成文龍直抵蜀道悉隣西賊之境盖不啻五千餘里其為國家之患豈特一州之地陜西嵗失買馬之利而已哉臣願陛下更詳前後臣庶所論湟州棄守利害如不可守先下手詔選命邊帥一員令於境上召興揚斡與大小嚨贊等喻以前年邊臣生事非朝廷本意斬王瞻於境上黜宗囘於逺方還其湟州擇所當立之酋責以如祖宗以來世守忠順則費財逺守自開邊面之虞庶幾息矣今不早定去取設若力屈不守覆軍殺將挫損國威又欲如前年置而不問耶昔瀘州邊事韓存寶止以不即追乞弟神宗命斬於邊上王瞻之罪盖不止百倍於存寶故必斬首始足以息邊人之寃憤矣一臣聞往者朝廷許於諸路進築人人務深入虜界多築堡砦以希功賞故不復計勢之險易地之逺近守之可否兵廣財屈為國瘡痍捨可守之疆城不毛之地規難臣之虜䘮既練之師且夷狄之性貪而怙亂侵其土地彼巳不分建立城砦又非所欲今日納欵特以力困耳彼其為心亦豈不一日思有逞哉逺不過三五年近不出三嵗天時人事必有邊警且闗中嵗歉貴巳六年矣去年雖豐物價至今猶倍于平日不獨糧食殫窘加以財用匱竭官員俸給累月無支諸軍料錢往往併月平居如此萬一有事無以應副財竭兵亂理有必至臣願陛下特下手詔嚴敕諸路帥臣俾其各畫地圖指陳攻守之䇿盖新築城砦僅全舊有堡砦漸廢欲新舊並守則財力不支欲捨舊守新則饋運滋逺地理滋逺則鏬隙必多鏬隙既多則救應必難萬一冦至虜衆限隔内外暌阻首尾不應則堡砦逺者不特無益適足為患故臣願陛下敕帥臣新舊堡砦何者為可守何者為可廢何者可以兼存何者可以兼罷俾之直論不得觀望成敗之際嚴立刑賞然後下兩府大臣公共參議萬一異議俾任其責如漢武之責王恢自然不敢逞其私意矣昔仁宗嘗御龍圖天章閣以西方多故將帥不得人令具數以對况今日邊事之重大臣於此可以悉心公論矣一臣聞前日河北水災居民流移自永靜以北居民所存三四自滄州以北所存一二其他郡大率𩔖此千里蕭條間無人煙去年雖豐無人耕種所収苖稼十不一二河北朝廷根本宻邇彊敵居民流散倉廪空虚城郭不修甲兵不利萬一有警何以為計今朝廷雖行鬻爵以佐用度縱使多鬻所得有幾又地土不耕収穫至寡雖鬻爵入粟勢豈贏餘取之本路無由仰足臣願陛下力節浮費痛减用度廢内帑之積募人漕東南之粟誘民歸業課農力耕宻敕監司牧守繕器械修城壘揀選將領訓齊卒伍雖為無虞常若有待盖赤氣之起月暈所主趙魏之郊不可無備此天象之變可質而知也又聞前年水災流民有入北界者幽薊之間往往刺之為軍中國虚實彼固知矣北主老病比年轉甚嗣子鷙猛性頗好戰譎詐為心難以信結萬一乘我無備有所趦趄則國家預備之䇿安可緩哉此人事可質而知也昔真宗嘗謂輔臣設險興功守邊之利茍漸為之害莫大焉祖宗之事足以為法矣國家太平百五十年財用彫竭無甚今日昔仁宗積之數十年而神宗用之哲宗積之十餘年而紹聖耗之陛下適承彫耗之後逺無熈寧之富庶近無紹聖之蓄積去年哲宗山陵甫畢今日太后園陵又作既建西宫又饗明堂支用之廣不可勝計陛下方事節儉痛加約損經費常用尚恐不足以此事勢豈宜更有邊事伏願聖慈留神采覧更俾二府大臣公共論議毋使偷安以幸無事臣孤賤譾才誤蒙陛下擢置言路小大之事知無不言出於愛君不暇他恤惓惓之心不勝千萬貼黄臣伏以今日西人雖已欵塞湟州雖已固守萬一忽有邊警不知朝廷指凖何處錢物應副乞令二府預議國家湟州嵗費三百萬貫不知自得湟州巳因事發怒刺數千人為兵更乞朝廷密賜審察虚實不可不慮建中靖國元年正月上時為右正言上徽宗論日食赤氣之異曽肇臣伏見陛下即位之初首罷後苑工巧之技放免京城末作之人數百家使得衣食其業又罷皇城司探報公事以省刑獄滋彰之敝又罷逺方収買明珠翠羽之𩔖宫室服玩滛侈過甚者屏而弗御數日之間内外歡呼震動都邑既又振㧞滯淹申理無告流放竄逐皆得生還増耳目之官以廣視聽下不諱之詔以開言路仁心仁聞洋溢方外逺夷聞風咸知敬慕宜其上應天心和氣充塞災害消弭符瑞日臻而乃連年日食皆在正陽之月今嵗正旦赤氣亘天變不虚生必有所自意者陛下簡儉清靜之化或衰於前而宫室服玩之侈聲色技巧之好或萌於心歟抑刑獄滋彰之敝復生而閭里有不安者歟不然則朝廷上下忠邪賢不肖未辨而政令賞罰有未當歟抑左右前後有阿諛壅蔽切弄威福之人而四方萬里衘寃失職之民有不得伸者歟此宜陛下反復循察一日三省萬一有纎毫之失固當痛自克責改過不吝使皆無之猶須戒謹乎其所不覩恐懼乎其所不聞博延忠良使之交儆庶以荅塞天變轉災為祥至於備邊鄙之虞防奸宄之發在於今日皆不可緩然蕭墻之内則所當先未有腹心和而四支有疾朝廷正而四逺不治者也在昔太戊以桑楮武丁以鼎雉中興商邦宣王以旱菑中興周室天人相與之際敏於影響災異之來未必不為福也董仲舒所謂天心仁愛人君欲止其亂廼出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至推此言之今日之變豈非天意欲以覺悟陛下増益聖徳以為宗廟社稷無疆之福哉此誠陛下正心誠意恐懼修省之時也若夫避殿損膳寛宥縲繫此特歴世相承以為文爾非應天之實也惟陛下不以臣言為狂妄深思而力行之天下幸甚建中靖國元年三月上時為翰林學士上徽宗荅詔論彗星四事毛注大觀四年五月二十二日詔曰朕以寡昧獲奉宗廟顧徳弗𩔖不足以仰當天心彗出東方茲為大異永思厥咎朕甚懼焉自五月十八日避正殿損常膳許在京任職侍從官直言朝政缺失朕虚心以改庻以迎休嘉之應焉臣恭覩陛下恐懼修省小心翼翼雖夏后之謹天戒周王之畏天威不能過也以陛下憂勞若此臣誤任言責未知所以殊身之地遂不自揆仰瀆天聽敢罄區區之愚臣聞應天以實不以文惟善政修於下則天心應於上如文飾浮言非敢上進謹列政事之為當今急務者四冒昧以聞一曰省邊事二曰足財用三曰収士心四曰禁技巧古人備邊之䇿不過來則禦去則守以謂得地不足以耕得人不足以用近年以來邊臣貪功生事不顧朝廷之利害惟僥倖一時之茍得昔所入貢者今必城為郡縣昔所羈縻者今盡納其土疆進築之勞轉輸之擾殫内地之金帛以事窮荒不可計之費士卒傷殞不可勝數而官吏冒賞莫知等級今黔南巳有處分如夔路新邊之役宜在裁省廟堂謀謨當亦先定此省邊事宜在所先也天下財匱無甚於今日方平居無事之時官軍俸廪多或不給或倉卒以備不虞則計將安出執政大臣恬不為慮此臣所未諭也臣謂運鹽昔主於漕計以助嵗給今則移於他司則漕計如之何而不匱常平昔積於郡縣以備凶荒今則直便而盡輸於京師則緩急以何移用鈔法不更則邊儲糴入終莫能平其價臣願陛下亟詔二三大臣選知財用之官盡講復元豐舊制若利柄昔主於漕司錢物昔積於州縣者宜悉還復罷科買之擾蠲不急之貢使外計稍足則朝廷泰然亡憂矣古人禱雨有以士失職為辭盖天之視聽在民而士特為民之秀士或失職宜其有招於天譴也陛下修崇學校逈絶前古慮士有三年之淹而嵗為之貢可謂盡善盡美士生斯時實為千載之遇宜失職非所患者然學校養士州有常額則額外之士無復預教養矣天下州郡士人之多者有至三五千人預教養者惟四之一嵗之入貢多不過三四十人少止三五人補闕以備數者嵗惟止此則自餘無可進之地其失職疑巳甚矣如留貢餘三二分暫存科舉以待學外之士則士心翕然有歸而終不為棄物和氣可襲而至是亦應天之一也古人以用漆器為之力諌者盖防工技滛巧之漸也近年以來更増造作置局累年後苑工匠亦無虚日以至花石綱舡綿亘不絶作局則所需百出數郡為之騷擾花石則虚張事勢一路莫敢誰何驅廹保伍牽挽舟舡道路怨歎有傷和氣伏蒙巳降睿㫖造作罷局花石停運臣慮監作董造之官利於自私夤縁奏請尚或循舊臣願陛下斷以必行速賜禁止敢有違詔重行放黜以至後苑工匠製作與京城土木營造有不急之務者並宜權暫住罷惡勞喜逸人情之常抑末敦本亦聖政之所先人心恱則天意解矣臣夙夜自勵思所以圖稱任使之萬一而智識淺暗終莫能深逹政事之原惟陛下赦其狂而加擇焉大觀四年五月上時為侍御史上徽宗論水災李綱臣伏覩陛下以積水暴集淹浸民居廹近都城累降御筆處分遣官吏固䕶隄防拯濟漂溺仰見陛下聖慮焦勞曲盡防患之理然臣竊謂國家都汴百有六十餘載未嘗有變故今事起倉卒逺邇驚駭誠大異也臣嘗躬詣郊外竊見積水之來自都城以西漫為巨浸東拒汴堤停蓄深廣湍悍浚激東南而流其勢未巳以宗廟社稷之靈惟雉堞防守之固萬無他虞然或淹浸旬時因以風雨有不可不慮者此誠陛下寅畏天戒􅀶詢衆謀之時而羣臣竭智効力捐軀報國之秋也累日以來傾耳以聽缺然未聞臣竊恠之夫變異不虚發必有感召之因災害非易禦必有消去之䇿周官於國危則有大詢之禮臣愚伏望陛下斷自淵𠂻特詔在庭之臣各具所見以聞擇其可採者非時賜對特加驅䇿施行其說因衆智恊衆力濟危圖安上以荅天地之戒下以慰億兆之心天下不勝幸甚臣仰荷陛下天地父母之恩親加識擢得侍清光常思奮不顧身以徇國家之急輙有已見急切利害事須面奏伏望聖慈降㫖閤門許臣來日因侍立次直前奏事庶幾得盡狂瞽仰禆聖意之萬一宣和元年六月上時為起居郎上徽宗論水災係第二状李綱臣近嘗奏請以水潦為患乞賜燕閒敷陳利害今月十四日崇政殿侍立閤門𫝊㫖令臣先退惶懼戰慄居家待罪不敢供職聖恩寛厚未奉誅責日夕惴恐跼蹐無地伏念臣愚憃謏聞孤立寡與惟知仰事陛下以國家為心比見積水暴集逼邇都城私憂過計輙貢狂瞽情廹意切言皆不倫觸盛意犯隆㫖自干雷霆之威死有餘罪自非陛下恕其愚直天地父母矜而憐之誰復為臣言者竊以水旱之災雖堯湯有所不免惟聖人為能遇災而懼側身修行博詢衆謀以銷去之故堯於洪水方割之時有疇咨之言湯於旱既太甚之日有六事之責皆轉災以為福易沴以為和此古聖人之明騐也今者水患之來起於倉猝人心惶懼逺邇震驚仰頼宗社之靈陛下睿筭之審屢降御筆處分䟽導通駛巳漸退落雖畿甸旁近皆罹其災而都城無虞人意漸定然臣竊以謂水災既退之後朝廷未可以為無事正宜謀究利害増其固防夤念天戒益以修省不可忽也臣愚戇不揆輙復妄發昧死上便宜六事一曰治其源二曰弱其勢三曰固河防四曰恤民隠五曰省煩費六曰廣儲蓄惟陛下留神幸察臣恭惟國家卜世定鼎建都大梁平原沃野彌望千里非有髙山峻嶺為之險阻而都城以西京索交流陂澤相接自西徂東地勢傾下加以雨淹不能吞納則决溢東注俯灌都城其勢然也為今之計莫若相視陂塘䟽導京索増卑培薄固以隄防節以斗門旱則水有所泄雖經霖雨其勢不得接連城下可以為萬世之利此則治其源之䇿也臣觀自昔善捍水患者必為長隄以制其衝其意以為以數仭之城而拒方至之水風濤之所鼓薄亦已危矣限以長隄殺其怒勢然後人力可施而城益堅今積水之來自都城之西浩若江湖東抵汴岸南阻新隄雖停蓄深廣而卒不能至城下者有隄以為之阻也由隄而行散漫湍激至都城之南則徑抵護龍河者無隄以為之阻也為今之計莫若距城數里之外因髙地勢繚以長隄使雖有積水決溢之患循隄四㵼不能薄城可以禦一時之急此則弱其勢之䇿也國家都汴處大河之下流其所恃以為固者埽岸堅而法制嚴也比年以來玩習茍簡護衛之卒散於抽差備禦之儲耗於轉易河嚙隄防日朘月削恬不加恤如廣武埽其距清汴纔百餘歩去東危亦屢矣其不决溢者特幸耳使夏秋之交乘霖雨湍暴之勢果能保其無虞乎夫以陂澤積水暴集之患猶可驚駭况大河之勢可不為之深慮哉臣愚願擇深知河事者相地形回清汴使與大河相逺仍詔有司遵守法制存留兵卒儲積材用敢有抽差轉易者必正典刑此則固河防之䇿也今茲積水之來衝白沙蕩中牟廹都城散漫畿甸之邑淹浸屋廬漂溺民畜損傷苖稼不可以計數今又决其南以注於陳蔡之郊决其北以注於相衛之境䟽汴渠之下流於陳留則數千里之内悉被其患矣陛下惻怛憂勞降詔拯濟徳意甚厚臣猶竊慮州縣監司未能悉意奉行也願詔諸路應災傷地分今年秋租並與蠲免水過之後安集民居借貸賑濟務令復業無使失所以副陛下之意此則恤民隐之䇿也臣切惟去嵗江淮泛溢東南之民悉皆流移頼陛下聖慈以六路上供米斛廣加賑濟民得無死徳至渥也然州縣蕭條帑廩匱乏迨今未復今畿甸旁近又有積水之患矣何以堪之臣愚願陛下斷自淵𠂻凡營繕工役花石綱運有可省者權令减罷數年之間民力漸復國用以足然後惟陛下之所命且裕民豐財莫此為大臣所謂罷不急之務者此也臣又惟古者九年必有三年之蓄二十七年必有九年之蓄然後無旱乾水溢之患教化行習俗美而頌聲興是為太平治之至也祖宗以來舊有封樁米斛以千萬計所以為兵民之備宗社之本也比年以來工役浸多仰食者衆嵗以侵耗遂至殫竭今國計所仰者獨東南六路轉輸嵗額耳假使一方水旱嵗額不登將胡以自給靜以思之可為寒心臣愚願陛下明詔有司裁蚕食者幸嵗豐登自朝廷多降糴本委彊幹官吏廣行収糴别項上供以充封樁之數嵗嵗一如祖宗舊額而後止此朝廷之所優為何不留意而獨為此懔懔也養兵足國莫是為急臣所謂廣國計之儲者此也凡此六者皆當今之要務顧臣智識淺陋文字荒踈言不足以逹意惟陛下財擇下臣章宰執議其可否如可採録望施行臣比者嘗獻愚計伏䝉聖慈寛假未賜鈇鉞之誅輙復自竭冒昧天聽庶幾芻蕘之言有補萬一仰報盛徳貼黄臣伏以水患暴至失於隄防慿陵都邑乆未退息厥異甚大誠不可忽伏望陛下畏天戒固民心収士用嚴守衛以弭寜災害大慰天下之望避殿損膳告於天地宗廟社稷所以畏天戒也法禹湯之罪巳以詔萬方親御六龍率羣臣負土石以先士卒所以固民心也誅治水之不勝任者以正典刑擇材智而驅䇿之與共患難所以収士用也輟營繕花石之不急者併卒伍而部分之以備不虞所以嚴守衛也四者既具又在陛下修胷中之誠感動天心如此而災害不弭和氣不臻未之聞也臣不勝惓惓盡死節唯陛下裁察貼黄臣區區之誠以謂暴水之災理不虚發在廷之臣瘖黙取容無肯奏知陛下以克謹天地告戒之意者不勝憤懣嘗罄狂愚冒瀆聖聽今又不能自巳輙復妄發伏望陛下察臣之心少賜寛假無使忠義之士鉗口結舌視臣為戒天下不勝幸甚宣和元年上靖康元年徽宗幸東南欽宗遣綱奉迎因奏對言臣昨任左史論都城水灾實偶有所見自古雖無道之國水猶不冒其城郭天地之變各以𩔖應止為今日兵革攻圍之兆大抵災異變故譬猶一人之身病在五臟則發於氣色形於動息善醫者能知之非有物使之然氣之先至者耳所以聖人觀變于天地而修其在我者故能制治保邦無危亂之憂也徽宗以為然上欽宗論隂盛陳公輔臣聞隂盛則陽衰隂消則陽長此天地自然之理也四月純陽用事隂氣退聽之時又陛下誕生之月宜乎陽徳方升昭明盛大隂所不能掩者自數日來天氣清寒日色微薄濃雲不開霪雨繼作其故何哉盖隂有以蔽之也臣嘗原其所由謂夷狄之彊耶然前日賊兵在外圍廹京城而日景晏温清明自若今既欲講和好稍稍遁去恐咎不在夷狄也謂女謁之盛耶然陛下即位不邇聲色後宫嬪御不過三二百人亦無位號隆重者此中外所共知恐咎不在女謁也以臣料之奸邪去之未盡而大臣不和百司茍玩皆隂盛之象此不可不知也自崇觀以來諛臣佞士務為夸滛之説媚悦人主未嘗有敢言灾異者往往以臘月雷為瑞雷三月雪為瑞雪拜表稱賀作詩詠讚者有之矣夫灾祥咎異雖治世不免此天所以警懼人君欲其修徳以銷天變也豈可諱而不言哉臣今日區區首論及此盖不敢復效諛佞之徒以欺陛下聰明也臣聞蔡京王黼童貫朱勔數軰其為奸邪有不可勝言者天下之民思食其肉今雖各曽行遣然或處善地或全腰領其子孫親戚尚有未曽盡行竄殛田宅物産尚有未盡行籍没若是豈非奸邪去之未盡耶陛下謙虛退託以待臣寮而宰執忿爭上前無所畏避或詆毁同列或中傷善良豈非大臣不和耶陛下勤儉祗恪留心萬幾羣臣尚仍舊態不能服勤職事至有人主暇日猶御便殿引對臣下而百官有司却作休務豈非百司茍玩耶臣願陛下將蔡京王黼童貫朱勔等數軰重行誅戮其子孫親戚並當流竄田宅物産並當籍没以快天下之心則四海歡欣鼓舞自足以召和氣而隂霪寒濕之咎無有不殄矣然後下臣此章告諭大臣各務恊心盡力以輔贊聖明絶其私心平其宿憾而百司庶府亦當察其奸邪怠惰不切奉公者特與懲戒如此則不至於君弱臣强君勞臣逸足以使陽徳昭升隂氣消伏矣然此雖小變未足深憂臣必以是為言恐陛下忽此而不以為戒也又况蚕麥適時若隂雨不止不能無損亦不可不謂之災伏惟陛下少留神焉臣不勝幸甚靖康元年上時為左司諌上欽宗論彗星吕好問靖康元年八月詔曰朕獲承宗廟託於士民之上嗣位旬日敵人犯順乃至郊甸迨今三時邊鄙未寜調發轉餉勤動四方惟徳不𩔖無以仰當天心日夜祗懼毎御便坐希臨正衙凡所以自奉者務從貶損至於常膳百品减去七十放遣宫女凡六十餘人未嘗輙奏音樂備置臺諌廣通言路公車上疏乙夜躬覽庶幾少自警戒而日者彗出東北方考之前載是為大異畏天之威弗敢寜處念將循舉故事而率皆已行深懼虚文不能應譴告之實熟復再四意朕之不明元元愁痛無聊者衆是用求民之疾苦者皆行條具除苛解嬈冀以感召和氣以格休應咨爾卿士其體朕意毋忽臣聞民間多言近日彗出寅位臣雖未嘗親覩要之天垂象所以示警戒於下也彗者除舊布新之謂若能恐懼修徳改革弊政退斥小人引用君子不惟可以弭災變轉禍為福亦在於此矣昨崇寜大觀間彗星兩見太上皇恐懼改革之意見於當時詔令赦文可覆視也然而羣小滿朝閹宦内助正人終不得用政事終不得改蔡京大惡也逐之未乆而復召况肯逐小惡者乎張商英未為甚賢也用之未乆而巳貶况肯用大賢乎黨籍雖毁而禁錮益牢言路雖開而箝塞益急罷諌官虚講筵使太上皇不聞身之過差不念古之治亂是以天意震怒犬戎深冦黎庶驚惶遂𫝊位陛下陛下亦念之乎臣竊思之陛下即位以來躬行節儉視民如傷非有過咎形於多方而天變復見者陛下欲行善政多為左右䥴改盖今所用之人乃昔日之人也所施之政猶昔日之政也名為進用賢者而賢者之言未得盡行名為踈逺小人而小人之欲率皆如志又况隂害正道顯倡邪論欲復祖宗百年之成法而至今未能復欲去蔡京紹述之姦說而至今未能去致使陛下仁政不得施於朝廷仁澤不得流於寰宇故上天昭告如是以此見天之愛陛下之深也書曰惟先格王正厥事幸陛下體天之意除舊布新以正其事則天下之願望陛下留意靖康元年八月上時為御史中丞上欽宗論彗星王襄臣伏讀八月三日星文責躬詔書節文念將循舉故事而率皆已行深懼虚文不能應譴告之實臣愚無識竊所未諭臣聞天子父天而母地兄日而姊月皇天之愛聖主如慈父之愛賢子凡有謫見不虚發意者欲警悟陛下而増益其所未至者乎臣伏思陛下即位以來綿歴三時天下之民戴目傾耳如旱苖之得甘澤餓夫之望美食雖祖宗法度日形於詔㫖而京貫規模未改於章程詔㫖以謂循舉故事率皆巳行臣恐皇天昭昭在上有所未孚也京貫用事二十餘年京變法度於内貫壊邊鄙於外王黼益之以至於今日今日之法度非祖宗之法度亦非熈豐之法度乃蔡京之規模也今日之邊鄙非祖宗之邊鄙亦非熈豐之邊鄙乃童貫之施設也陛下守蔡京之規模而不改遵童貫之施設而不除在廷之臣懐畏避而不敢輕言踈逺之人希榮利而不敢輙議而欲致休祥召和氣豈易能哉蔡京為相恣為紛更祖宗熈豐之法無一事不遭變改者凡所變改者未有不為害者也若悉舉而具陳之雖窮年閱月有所未徧况於尺牘之間而能盡其萬分臣願試以今日之急務國家之大政四事言之夫養兵之制祖宗所以威天下者也東南運漕宣武因之以為帝都者也財用之出所恃以為國者也陜西五路今日以為根本者也臣聞五代不綱兵疲將弱凡一遇敵無不奔潰故五十年間離亂相尋周世宗自斬宿將樊愛能等知藝祖神武俾治軍政藝祖悉汰老弱坐食之人選練精鋭無前之衆當時中原不過數十州禁旅之卒不過數萬人六七年間南取淮南北定三闗謳歌者有歸遂有天下因襲前代之迹建京師於平土以謂非重兵不足以制四海也故皇城之内有諸班之兵京城之内有禁衛之兵京城之外列營猶數十里中夜則造朝入則奔趨營居西者必給東倉之米以逺其途負糧兩石不得雇代以閱其力諸班娶妻則太祖引視之諸軍支糧則太祖臨幸之諸班之妻盡取女子之長者欲其子孫魁傑世為禁衛而不絶也太祖甞謂雖京師有警皇城之内已有精兵數萬况天下乎其養之教之親之愛之然後嚴治以整齊之厚賞以激勸之加之深思逺慮為後世子孫無窮之計至於府界諸邑輔郡縣鎮但係何路易致糧餉者無不屯兵三數千人重内制外如此其周密也及王安石為相思復三代民兵故創教保甲而潜消禁旅臣元豐間往來京師道中京南自延嘉以北廢營壊壘三十餘里當時禁衛精兵不知幾千萬人也其後蔡京枉費軍儲闕乏衣糧不充則教閲之法弛人無顧惜則姑息之心生故弱者鬻食於市强者負擔於路髙俅壊之於内童貫斃之於外數十年間不知其銷折幾何人皇城諸班之地今為殿閣池臺矣京城廢營之地今為苑籞甲第矣郡縣之民佃空營地以自給者盖千百計富室大家尚養健僕數輩以待暴客陛下以萬乘之尊威懾四海而皇城之内無諸班以宿衛京城之中少禁旅以鎮守近畿輔郡兵將備禦殆同戲事一有邊警則逺追閩越之人盡舉淮浙之衆此軰飲食異好風土異宜往來萬里載罹寒暑雖未遇敵而疾病勞憊者十巳四五萬一南方䑕竊狗偷如異日之警則何以待之借使無警全然得歸萬里之人豈可再致是動天下之兵而困天下之衆也此臣略言養兵非祖宗之法者也臣聞王公設險以守其國自古帝王之都皆可考矣惟宣武之為都獨自朱梁而始晉天福末就糧而遷焉祖宗以謂非重兵不足以制天下也故宿重兵以制之以重兵非漕運不足以給餉也故仰東南之運以養之東南運漕取於六路年額六百餘萬石其資以為本者三舡也倉也鹽也造舡之法六路之舡以供江外之綱淮南之舡以供入汴之綱常六千隻以六千船運六百萬石則一舟之運嵗常千石人舡之力有餘故不勞而能辦其後漸廢至章惇為相舡祗四千而撥東河之舡運西河之石每一大石升舡一舟輙壞比及運畢壞者過半蔡京更改法度廢為直逹此舡法壞也祖宗置真揚泗倉名曰轉般六路綱運冬月不止江水低下運河髙淺冬月潮小水不登應則閉閘而不通故真州置倉以卸之潮大放閘則揚泗以次卸之六路未至則發運司収糴儲於倉中加息充代而責其直汴綱六千又近者而運之故一年嵗課應期而敷倉木鉅萬皆美材也京悉取之以供京師之營造中間雖復興起曽不足以庇風雨而發運司糴本又盡於無益之求矣此倉法之壞也臣竊觀蔡京之姦謀困民之大害無甚於鹽法者祖宗河北之鹽不榷以利河北之民河東自置鹽監以便河東南収稅上供委鹽六路以暗為六百萬石之本又發運司因之以制諸綱優重賞罰焉故三邊充足不資朝廷之應副東南運漕常足六百萬石之嵗額蔡京欲取善治財物之功且以供無益之費也故盡取鹽利歸之中都祖宗飛錢於三邊蔡京収利於㩁貨故中都豐足而三邊匱矣西北之糧由是而空西北之兵由是而不繕治而河北之民驅其車牛役其人丁般輦鹽貨不得耕織者不知其破幾千百家天下縣鎮趨賞避罪廵門散鹽以及茶礬吏縁誅求騷擾百出者殆不可勝言况又六路轉運司直供運漕之嵗額取之於民今亦罄矣天下章䟽鉅萬山積其間果無一人言及此者豈非國家邊事未息尚資鹽利以為用未敢遽言之哉然而祖宗熈豐之時以至建中靖國之初當時未収鹽利也國用縁何而足府庫縁何而充豈非祖宗之經入法度有所未復冗員浮費有所未减於今日者講求興復之裁省抑免之以代鹽利可也必欲守鹽法不變而求東南運漕如祖宗之盛運漕不繼而求内外兵馬如祖宗之强臣恐未可以嵗月冀此臣略言運漕非祖宗之法者也祖宗之時外置轉運司以漕一路之賦内置三司使以緫天下之財委任而責其成功耳神宗皇帝聖文神武將大有為用財有式節財有政始分天下之財以為二司轉運司獨用民常賦與州縣酒稅之課其餘財利悉收於常平司掌其發斂儲之以待非常之用罷三司而為户部轉運之財則左曹𨽻焉常平之財則右曹𨽻焉當是時雖一鎮一縣無不貫朽粟陳者及蔡京用事舉天下之財而盡用諸路漕臣靡然從風本路無以周給而進羡餘百姓常稅不納而急横賦諸縣嵗終無以塞責則令民取常平錢斛轉易而為二稅州郡視之而不敢禁常平知之而不敢劾上下䝉蔽以姑息茍且取急於一時貪汚之吏竄名詭冒猾胥頑民亦中分而有之斂取之時辭訴紛委常平之政殆將廢矣常平之財殆將竭矣雖欲求明健之吏為振舉之職天下詭冒之獄不勝其推治也天下請納之民不勝其追逮也州縣官吏不勝其誅罰也編户民財不勝其斂取也如此則常平之政雖云不廢而其實廢常平之財雖云未竭而其實竭天下貨財不知其失䧟者幾千萬億尚何區區於青苖助役是非利害之辨此臣略言財用非祖宗熈豐之法者也陜西秦鳯路祖宗開拓鞏州矣熈豐之時又闢熈河蘭㑹州以為熈河路阻河為界設為三闗平土豐草可以耕牧甚美功也神宗皇帝時有獻青唐之䇿者神宗以為國家之外廐而不取也神宗皇帝得疊宕等州盡空三百里地而漢蕃兩不居之也盖青唐之馬最良而蕃食肉酥必得蜀茶而後生故熈豐時置茶馬司大率以茶一籠計費三千而易百千之馬嵗以蜀茶易馬二萬匹以三十年為率則國用馬常四十萬矣中國之兵安得不强夷狄之勢安得不弱自湟鄯廓州之入中朝而茶司之本又盡於市珠玉國馬至今盖無幾矣神宗皇帝之不建疊宕等州豈不以城之無利守之實難又且以賜忠順之蕃使耕牧於其間也疊宕之地既皆不毛而湟鄯諸州萬山埆瘠殆非人跡之所渉童貫仰國家之財悉兵民之力收復三州増築城寨又於熈豐所空之地建城而自以為功分屯兵將轉輸糧食夫弓箭手民兵五路之根本也每差戍守一月一易則必人市頭口負乾糧器械所需之物而趨焉路逢蕃冦則多致殺掠或得戍滿三數月間又當復往如此勞費無有已時而熈河包氏之兵最為忠順神宗皇帝特寵異之心一不滿勢必不為吾用此熈河之兵所以寡弱而不振四路之兵恐亦復然今之士夫見邊兵之凋弊則以謂未必勝於東兵見西馬之病瘠則以謂未必及於東馬盖不見其强盛之時而獨見其衰弊之後耳陜西之財百萬為率常以七十萬獨供熈河而以三十萬供秦鳯涇原環慶鄜延永興軍路也熈河之財十常七八以供新邊之費則是童貫之新邊常困竭陜西之諸路陜西之諸路常煩朝廷之應副而貽患於天下之諸路矣自宣武之為京師恃河北河東陜西以為根本故祖宗之時優恤河北民則不横賦兵則不出戍鹽則不拘㩁也自蔡京竭其財㩁其鹽困其民疲其兵加以中間盗賊之蜂起今嵗邊事之未寜河東河北之民方仰朝廷之援救不足恃之以為强而陜西兵將尚為朝廷緩急之用則陜西之為根本眀矣陛下安得不顧惜其根本而封殖之臣料廷臣慮非不及於此自見兩責黨人棄地之罪畏懼常瞻前却顧而不敢言耳此臣略言邊防非祖宗之法度者也臣願陛下考復臣言而詳思之則陛下今日政事果悉舉祖宗之故事乎果因循京貫之規模乎京貫之惡天下無不欲殺之者盖以其蟊賊生靈蠧害國家以至於今日也借使京之鹽法不改貫尚有功於國行之數十年而不可易臣恐其大不然矣雖然常平之政不可廢在修弊起廢處之以中制新邊之地不可棄在因事制宜轉敗而為成若夫養兵之制運漕之法又在謹審而力行之夫祖宗之法犬牙相制不可偏廢也如論養兵則干運漕如論運漕則干鹽法如論財賦則干常平如論邊防則干茶馬千條萬目豈易遽言廟堂之股肱朝廷之肺腑必有竒材大略能為陛下處之者非臣踈逺之敢竊議也昔仲山甫周之賢相耳詩人歌詠其功徳以謂愛莫助之况聖君巍巍在上恭儉寅畏宵旰焦勞减珍味者七十品放宫女者六十人常御便坐不奏音樂雖堯舜茅茨土階夏禹卑宫菲食不是過也而臨御三時治功未進豈非有合周雅愛莫助之者乎恭惟陛下以繼體守文之時應創業垂統之運當以太祖之神武英斷戡定禍亂仁宗之仁慈納諌安養蒼生神宗之聰明剛健修舉百度不可優游退託日復一日以緩事機也天下之事巳遲三時矣昔禹惜寸隂况當救焚援溺之時而可以坐閱二十七旬乎且自古君臣必有道合徳契披肝膽以相照雖骨肉之親不可間也故商髙宗以傅說為旱嵗之雨劉先主以諸葛亮為如魚得水盖不如是不足以有為也書傳所載少有能兼將相之任者漢髙祖相蕭何而將韓信則西楚不足滅矣然薦韓信者蕭何也唐太宗相房杜而將英衛則天下不足平矣然濟英衛者房杜也陛下體此以觀之則將相之任定將相之任定則廟堂敢措議於軍旅將帥得注意於功名廟堂之上運用天下如身使臂如臂使指若杜黄裳之平西蜀李徳裕之平河北指縱發䇿不離於樽爼而兩路平今朝廷人材豈無杜黄裳李徳裕軰至於條令之未便官吏之貪汚斂求之違法奉行之未善此皆毛舉小小監司郡守片言可除之弊何足以多繫聖慮哉臣年力衰病待盡朝夕祈欲一言而首丘耳干冒冕旒惟陛下留神靖康元年九月上宋名臣奏議巻四十五
