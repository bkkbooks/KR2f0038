body:
  text: 宋名臣奏議巻三十九宋趙汝愚編天道門災異三上仁宗答詔論地震春雷之異張方平臣伏讀丙午詔書以星文流變坤載震揺先春而雷衆異間作陛下惕然戒懼思所以當天意爰下明詔誕告庶官凡上躬之闕遺政刑之差失阿枉之黨䝉罔為姦咸使密疏以言悉心無隠朕将親覽靡及有司臣伏讀詔書悵然感慨遠惟祖宗造基立法之勤先帝持盈垂裕之意敕天之命撫此下人無疆惟休亦無疆惟恤陛下天資神智英睿聦明紹隆基圖恭承帝事治民祇畏罔自暇逸嚮若僕臣皆正股肱惟良協心弼違将順其美陛下可以高揖成康之上徐步唐虞之域惜乎人主有仁明之德人臣乏輔翼之材因循蔽欺偷取一切治而無法弊不謀救沴氣成象變咎荐臻遑遑焉獨貽憂於陛下也臣愚孤遠學識疎陋猥逢詔㫖詢于芻蕘謹稽探天人之情參古今之論上原厥罰之本下陳至治之方儻日月之明照此心之忠義斧躓之下免報讎於權彊是由陛下至明豈獨微臣受賜陛下少留神慮察臣狂言臣伏思詔書曰星文流變者臣鄙儒不通天官之學謹按前志説春秋星殞如雨為王者失勢臣下專恣之應况紫微垣太微垣上帝之座天子之廷列星布位近臣之象流移失次乃邇臣不恭其職更相慿附懐貳茍容不忠王室之咎也坤載震揺者臣竊考載籍歴世以還地震之異未有若今兹之甚者謹按前志陽伏而不能出陰迫而不能升於是有地震兹謂不陰夫坤為陰體臣道也妻道也夷狄之道也陽薄於陰而不能勝相乘而震且定襄之地直王城西北正在乾位君德所在天之警告夫豈虚發春雷震者臣謹按前志雷當以二月出其卦曰豫言萬物因雷出地皆悦豫也以八月入其卦曰歸妹言雷復入地則孕育根荄保藏蟄蟲雷本陽氣有人君之象故先時而聲猶陽不閉藏發泄無度也又正月以來日䝉少光輒或數日不解臣謹按前志䝉如塵臣私禄及親兹謂罔辟厥異䝉䝉先大温也䝉日不見行善不請于上兹謂作福䝉一日五起五解下專刑兹謂分威䝉而日不得明知佞厚之兹謂痺䝉甚而温此䝉大畧也臣聞上天無言示人以象人君省躬應天以實是故考政者必求于天端弭災者必推于人事天人之際其應甚明臣謹按春秋之義舉往以明來觀著而思微天地之變國家之事粲然皆見無所疑矣故夫星流而隕地震而裂先春而雷日䝉不解其咎皆由乎陽德舒緩隂道專縱下為阿比以蔽聰明者也臣愚不達道敢因四變推明七事臣聞之書曰無敢伏小人之攸箴葢言明王求理不遺下言也臣議雖鄙竊以為今世之切務治道之至要難尚此矣陛下幸加惠不以臣之疎遠而廢其言天下幸甚何謂七事其一曰密機事二曰用威斷三曰廣言路四曰重圖任五曰正有司六曰信命令七曰示戒懼何謂密機事臣聞之易曰君不密則失臣臣不密則失身機事不密則害成故春秋之義譏君之漏言是以人臣造膝而對詭辭而出人君明以察之斷以行之謹之至也韓子云事以密成語以泄敗臣比見羣下之言事者深言切論陛下或播之於左右囊章密疏陛下多付之於有司凡國之庶政得失之跡莫不繋乎二府者故諸臣下之言其有指擿時病及諸治亂者則用事之臣必所不悦而陛下更暴其言而露其章縁是而䝉譴者有之矣此葢陛下體貌大臣篤其誠於勿貳疎外羣下忽其言之未然大臣固不可以忌疑下言固未可以輕信然亦在深思其意㫖徐察其情偽參諸理道辨其臧否言茍可行自當聴納言之未善置而勿傷使下竭其忠各效所見則姦謀僻行不萌于下嘉猷正論日聞于上致理之要何以先此而今清問之對封奏之事開言為怨府灑翰為禍胎沮忠義之言成忌克之俗人悼後害孰敢獻納下情壅隔國之大禍也臣深願陛下先務此道以為立政之本凡臣下入告之議宜斷在聖心清問之言姑謹於外泄念大易失臣之戒防春秋漏言之譏則天下有心之人皆為陛下用也其二用威斷何謂也臣聞書洪範曰惟辟作福惟辟作威臣無有作福作威臣之有作福作威則害于而家凶于而國故春秋之義譏鄭忽之弱以其挈於權臣也君人之柄惟賞與罰必賞必罰惟斷而已夫乾體以剛天行以健故能中正無邪運用不息人君之德配乾而法天者葢取乎剛且健也以陛下之英明温睿而濟之以斷天下不足治也往年莊獻晏駕陛下親政革弊去蠹拔材賞忠斷自淵衷不撓于下典刑立政樞極一新天下翕然皆謂陛下天機如藝祖神畧如太宗萬世一時無窮之福也今者道路之言皆謂陛下寛厚仁恕徽柔廣容事存大體動循往例臣竊惑之此葢怙權之臣摟取邦柄故説陛下以為人主之孝莫大於奉先孝守成規夫祖宗之所以建基圖垂謨訓炳如日星信如四時雖百世其可易諸至于操紀律明賞刑用正人去邪慝治不忘亂安不忘危以和其民人而保其宗廟此孝之大也且政由俗革彼此一時事體權宜各有云設或迹存而理異或法久而姦生必踐而行以為無改於祖宗之道尚安足以為孝乎易曰窮則變變則通通則久故復而不厭久而不弊之謂道遵常守故非聖人之事因時損益乃建治之理昔先王之作為爵禄賞罰臨事而制宜是以為天下之主見勞授賞則衆譽不能進無功見惡行誅則衆讒不能退無罪若政無賢愚弛張用捨一取諸例是爵禄賞罰不在人主而在簿書也予奪之柄於陛下何有一吏持簿書按例而足矣此葢用事之臣自謀之慮不才而例進者收恩在已才而例退者怨歸于君人主欲賞拔忠良擢用才俊而用事之臣不悦者輒曰於例不可用事之臣猥引親舊妄援謬庸而人主欲詰其故輒曰於例宜然以致今兹臺閣混淆賢愚揉雜典刑都弛名器益輕于後執時柄者便於引例之説終無發明之言臣嘗讀漢書至晁錯之事惟錯謀策宏遠達於權義有致主經世之志戮姦讒之口而史氏不能褒其忠更譏以變古易常之説臣竊憤厲痛忠臣之難為也臣又讀晉書至何曽之事誡其子曰吾毎進見未嘗聞經國逺圖但道平生常事此非貽厥孫謀之兆及身而已且曽為上公逺圖之不建誰任其咎而史氏不能貶其罪更美以知㡬先識之善臣竊惋悼痛諛臣之誤國也嗟乎忠諛之無報淑慝之不顯其已久矣又何獨長嘆於兹乎臣愚伏願陛下奮乾威發天斷裁正無不忍之愛采拔罔疎賤之隔大稽諸古小驗于今使天下之耳目常新萬世之本原必正無曰引例合義而已帝王之制不亦光大乎其三曰廣言路何謂也臣聞書美堯之德曰詢于衆春秋之義大君命譏大夫之專者今天下之士不思結知於人主思見知於貴臣願歸恩於彊臣不願受恩於人主何歟得彊貴之心者身不涉危而長保富貴䝉陛下之遇者亦未及安而已罹禍咎而又多逐善人指為鉤黨使陛下腹心無所寄耳目無所託姦無所發惡無所彰九重之深漸成孤立陛下天縱将聖知㡬其神此理甚明豈不其悟昔漢魏相白去尚書副封以防壅蔽而宣帝得以知禍變之微為漢明主唐太宗躬勤政理明於聴受著司馬式云其無門籍人有論奏者皆令監門司馬引對不許闗礙又制大臣入論事輒令諫官随入或對問之言有虧理道即從而諍之此唐太宗致太平之跡也至肅宗時元載為相邪慝不法懼為人君所知因議凡羣臣奏事皆先聞諸司長官闗白宰相而後得上聞時顏真卿奏疏曰往日李林甫欺君擅權姦矯用事羣下指言者率皆因事陰中傷之猶不敢顯為條約絶言路以為元載之惡過於林甫也惟在陛下開延讜直虚中接納無限卑遠茍造膝而有益雖犯顏而必恕以通天下之志以成天下之務其惟廣言路乎其四曰重圖任何謂也臣聞書曰鄰哉臣哉此帝堯所嘆以為已密近之臣必有德也又曰欽四鄰此帝舜所嘆以為在已左右前後之臣必正人也故春秋之義以為天子之宰通乎天下重之至也夫國之所謂大臣者莫尊乎宰相君為元首宰相乃其股肱動静休戚義猶一體宰相之職朝夕王所論道官材圖議天下之政者也安有居宰相之位而足不至王庭面不見旒扆言不聞君聴者乎大臣疾病君為之軫憂上醫治療内使臨問數賜告加恩意禮厚矣若其偃息臥家遂罷其朝謁曠時彌嵗則未之有也伏以台司為具瞻之地廟堂非養疾之所朝廷之儀不可慢社稷之重不可輕況今災釁荐作人心恟懼安危所繋實在柄臣伏願陛下為宗社之大計畧恩禮之小節高選德望考謹厥相應譴告于上穹示大公于天下且自災異之作陛下憂勞謙畏誕降德音舉諸闕政至誠罪已而元臣當國莫肯任咎茍安寵禄以妨賢路禮義㢘耻何以訓下自餘三事任政之臣志行忠邪材智深淺必料陛下知臣之明悉存乎聖慮矣其五曰正有司何謂也臣聞夫子曰必也正名乎春秋之義君不尸小事臣不專大名故尊者主要卑者任勞所以正位分明堂陛也人君逸於任使垂拱而治三公論政九卿分職羣有司各事其事故端本而影直振領而襟整衆務百職各安其局今夫津官亭吏一命之微米鹽貨利毫杪之細莫不闗決衡石煩黷天衷三公不修其職而猥侵羣有司之事羣有司茍謀期課莫安所守上下姑息習以為常偷慢茍安風俗益弊臣愚以為方今國體所繋政府而下分職之重臺省備矣而豸冠乏匪躬之士蒲規鮮替否之言當衡鑑者循資格而無賢愚之别絶勸賞澄清之義運計籌者張空簿而責錐刀之末無斂散輕重之權政失其本事忘其舊其所召弊由來漸矣臣愚伏願陛下少運神智詳思世務諸如此弊宜有興改撮其機要謹其闗柅莫如擇任三吏切摩治本使夫摠百揆者則謀用庶官之長列庶長者則各選衆職之任付之柄臣而責其效盡其才而安其成官守典刑無相侵紊有廢厥職必正于罰如此則陛下優游太紫之上執賞罰之柄而羣下莫敢不奔走其職庶務肅然而理矣其六曰信命令何謂也臣聞書曰謹乃出令令出惟行夫命令者以簡為重以信為本簡則易從信則必行易從則不犯必行則可久此之謂為國之要為政之經臣比見朝廷出令或尋即衝改或俄復停廢吏易之而奉行不固民忽之而茍慢多違揆大體而論之此害政之深者夫滋彰召乎巧詆文煩所以法輕今條令重累盈乎几閣自明習者不能徧覩况郡縣承用者乎陷愚憃於無辜無告之地其咎由乎格令之煩多而不信故姦吏因縁而為市也臣請今後凡諸臣有請釐改條制審覆勘會益加詳審無稽之言勿聴弗詢之謀勿庸俾萬姓咸曰大哉王言又曰一哉王心自然民無起詐之端吏息侮文之巧祥刑善制咸中有慶矣其七曰示戒懼何謂也臣聞書曰惟吉凶不僭在人惟天降災祥在德是故或無災以傾其邦或有災以興其國無災者驕怠所以起有災者戒懼所由生故堯湯遭水旱之期中高有桑雉之異一則以有備而無患一則以修德而弭妖今兹之變亦在陛下惟德之修而已丞弼之臣戒其權重者侍從之臣戒其阿諛者帷幄密近之任戒其用事之勢掖庭嬪御之嬖戒其燕溺之惑服羞戒其過制優戲戒其蕩心嗇用無小侈費無微念四方惟正之供憫小人作業之勞至于邊防之守兵食之備器乘之用將帥之材臣謂宜加存乎聖慮矣故臣曰惟備之戒此其槩矣夫修省之方惕厲之意雖陛下兢兢夙夜不忘于懐然天下之人莫之知也按春秋左氏傳晉梁山崩晉侯召伯宗而問焉對曰山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉今震謫之異衆變重累何啻山川之災臣愚以謂陛下宜于常禮有所降損齋居澄慮深思天意揆陰陽之道察政教之闕其在陛下者臣願陛下勿悋其失必易其度其在臣下者臣願陛下内斷于心明正其罰俾彛倫咸叙以邀天之福則七世之廟傳裕於無窮烝民之生率同於慶賴矣臣位卑而言高有陵越之尤迹疎而意忠有激訐之咎但使臣言一經聖覽微悟主心幸以涓塵於國家而有補則雖鼎鑊捐軀命而不辭寶元元年正月上時為秘書省著作佐郎通判睦州上仁宗答詔論地震春雷之異韓琦臣伏聞陛下以災變頻數已降詔敕敷求讜言此乃陛下警悟天戒憂勞聖心普率之間不勝至幸臣備位諫列近因災變之發累上密封既愚且忠無敢畏避事頗明白未見裁納臣慮應詔而言者雖不即加之罪而言者亦不用其説則是與詔意相戾而於朝政何益哉臣欲望陛下應有臣寮應詔上言一一親垂聖覽事如可行即望早加聖斷或所見非長及辭涉詆訐亦望寛而不問庶成陛下引咎思政之德以期上穹順道為福之應臣前數有所陳伏惟陛下以一臣之言所見褊淺未能符合聖意臣愚不勝忠憤再貢狂直更不敢廣有引援煩瀆上聴但直述當今未便陛下可行者凡十事具别状實封進納又詔書以謂或政教未臻於理刑獄靡協于中在位有壅蔽之人效官有貪墨之吏仰諫官御史搢紳百寮密疏以言臣竊以四海至廣非一人耳目所能徧接若只許在朝臣寮論奏實恐言路未廣臣欲乞頒示天下亦許所在官吏依詔言事附遞聞奏别状臣伏聞降御札求讜言輒有狂鄙之見不敢文飾上瀆聖覽謹直述其事條列如右一政府大臣乞選用忠正有才識之人則紀綱自正陛下仰成而無憂如有不堪其任者望早加聖斷皆從免罷使時政日新天下咸悦一賞罰二柄本君上執之以馭天下若無功者受賞有罪者不罰是猶寒暑相違而望嵗功之可成也臣欲乞凡行賞罰務協中道或陛下聴斷之際知其可賞則賞之知其可罪則罪之使畏愛出於宸衷無令國之二柄專為臣下所持而任其威福一近日戚里之家多因入内之際或無功而望遷轉或無能而求錫賚唯圖僥倖殊無厭足況莊獻太后朝尚曽懲戒豈陛下睿明當宁而不抑其奔競欲望特降詔諭嚴行止絶如有譴犯乞重加貶責一今之國用不足者弊在於浮費不節所入者有限而所出者無涯遂令中外帑廪皆未充贍臣欲望凡百用度務令儉約及乞差公正才識近臣與三司詳定減省冗費一自茶法改更以來連年将銀絹配率河北人户坐此困竭明出却内庫物帛暗虧却舊額課利欲望選差公正近臣參定酌中之法以濟經用一朝廷備禦之急唯在西北二邊其如牧守将帥多非其材而士卒訓練未至修整亦望密諭兩府大臣常切體量二邊牧守将帥不堪其任者易之更用才畧武幹之人以壮國威御兵之法務從嚴整無令益其驕惰一竊以陛下萬㡬之暇當有宴飲之樂所以寛憂勞而慰游豫也然頻數則有妨政事無益聖躬亦望節之有度則天下幸甚一宮掖之間女御之衆豈無䌓冗徒在幽閉望選其無用之人放令出外以消陰盛之變一臣寮中有以言獲罪貶責者若心本獻忠非挾邪近詐之人欲望復其職任使言路彌廣人思盡誠一消變之法惟修德以禳之則天道感應自古皆然若齋醮道場實不可恃以求福亦望特賜開悟更思節減寶元元年正月上時為左司諫上仁宗論日食葉清臣臣聞王者上承天之所為而下以正其所為君政有治亂天應有災祥葢天人相與之際繋君德之感通奉天子民義實一體昌治之世未必無災欲治之主能以德應則變災為福衰亂之世未必無祥庸暗之主德不能堪則反祥為妖故治亂災祥不可常在德之厚薄耳仲尼修春秋記災異之大者日食地震為先班固述漢史記日食之對則變見三朝為尤異者今月正元日日有食之不幸昌治之辰遂有尤異之變豈合朔之會適當然耶意上天譴告有所屬耶伏惟陛下纘隆慶基謹守先訓兢兢業業十八年于兹四方底寧萬物咸遂百工修輔衆績咸熙信治世矣然而天變如是之大必有申警以啟聖神臣甞學舊史歴考前志日陽德也君道也月陰德也臣道也薄食必於朔望日月之交會也會而不食陽勝陰也其在詩曰彼月而食則唯其常此日而食于何不臧是則陽德君道或有所虧則日為之食又曰敬天之怒毋敢戲豫敬天之渝毋敢馳驅是則天變於上君變于下恬不為變其禍滋甚臣謂推筴之初逆知當食陛下宜出次徹膳伐鼓用幣百官守司為營救之禮庶㡬天悔其咎陰不為眚今謫已見救不可追則當亟下責躬之詔開敢諫之路使講求陰所以勝陽所以虧之理後増其所虧損其所勝猶冀萬一可厭天戒其在易曰君子終日乾乾夕惕若厲无咎凡言無者言本有咎以能補過故得無咎然習常茍諛之人必曰此常數也不足以為盛德之累茍内朝左右之臣以此安聖慮外廷進對之臣以此紓官責臣恐非敬天之怒而失補過之義前嵗河東地震頻年太白晝見考占辨應稍稍著驗今為此變豈妄發耶伏惟陛下深思災異之大博咨政教之闕舉賢良方正能直言極諫之士待以無諱使之極言言或切至采而行之此之謂能以德勝妖變災為福者臣幸以譾薄親逢盛旦職在詞掖官居諫省闚管有得敢不罄竭明者之擇庶可録焉天下幸甚康定元年正月上時為右正言知制誥上仁宗論久陰孫沔臣竊見經春已來時令失序沈陰不雨䝉氣連宵日景青昏天光慘翳按漢書所述洪範云皇之不極厥咎常陰必有下人竊議上者臣晝夜思之莫知所以天道雖逺災祥不欺人心至微氣志必應豈有變異昭著而終久無患者也伏惟陛下至明至聖察之謹之臣職當言事心所有疑不敢自隠兾愚者之盡慮也臣又聞臣者君之陰婦者夫之陰邪者正之陰若臣廹于君婦陵于夫邪害于正則有陰䝉之眚葢人事動於下則天變見於上矣今氣象如是在陛下專精勵意察事求端思所以致感之因行所以消復之道以答上穹降鑒之兆則天下幸甚伏諒陛下以喪子感傷宸心悲鬱又将廣嗣是念仇淑為意每於庭墀之下頗聞珠玉之音是沖和未融而結嗇未解也伏望全神省思養器加膳優游適性燕静端居節嗜欲之情戒寵嬖之盛罇俎之間衽席之上無俾過度兾盡防微保聖德于康寧發純剛之斷決察姦謀於臣下嚴左右於禁中若百事先覺則萬福來同庶可以克謹天戒永綏國家者也慶厯元年三月上時為右正言直諫院上仁宗論赤雪地震之異孫甫臣聞洪範五行及前代變驗曰赤雪者赤眚也人君舒緩之應舒緩則政事弛賞罰差百官廢職所以召亂也晉太康中河陰降赤雪時武帝怠於政事荒宴後宮每見臣下多道常事不及經國逺圖故招赤眚之怪終致晉亂地震者陰之盛也陰之象臣也後宮也戎狄也三者不可過盛則陰為變而動矣忻州趙分地震六七年每震則有聲如雷前代地震未有如此者也惟唐高宗本封于晉及即位晉州經嵗地震宰相張行成言恐女謁用事大臣陰謀宜制於未萌其後武昭儀專恣㡬移唐祚天地災變固不虚應陛下救舒緩之失莫若自主威福時出英斷以懾姦邪以肅天下救陰盛之變莫若外謹戎備内制後宮謹戎備則切責大臣使之預圖兵防􅌻計成敗制後宮則凡掖庭非典掌御幸盡出之以省浮費且裁節其恩使無過分此應天之實也慶厯三年河北降赤雪河東地震五六年不止十二月上此疏時為諌官上仁宗論赤雪地震之異係第二狀孫甫臣竊見景福内宮祖宗積經費之餘以備非常之用近嵗諸路物帛多入内庫中外盡疑宫中之私費唐置瓊林大盈二庫率供燕侈楊炎陸贄請罷之今日景福之積頗𩔖唐之二庫後宫之數臣雖不知但聞三司計肉食者千餘人又有私身當不啻數千人矣臣近聞染院計置染綾羅甚急以備宫中支用言至藏庫所積紅羅去冬已絶它物稱此則浮費可知也陛下省之立可感動人心以消災譴張修媛寵恣市恩禍漸以萌夫后者正嫡也其餘婢妾爾貴賤有等用物不宜過僭自古寵女色初不制而後不能制者其禍不可悔慶厯三年十二月上上仁宗論飛蝗蔡襄等臣等伏覩陛下以災變屢見飛蝗為孽責躬引過祈于天地宗廟社稷不令殃及萬方臣等伏念灾異之來實由人事政治闕失感動天地故古之人君或遇災異則避正殿徹常膳深自刻責思所以致之之由及改之之理以至特免三公者有之詔求直言者有之此皆消灾異召和氣之道也方今天下之勢至危矣夷狄驕暴陵脅中國盗賊縱橫驚劫州縣養兵至冗擇將不精科配頻繁公私匱竭内外之官務為辦事而少矜恤之心天下之民急於供億而有流離之苦治道至此未聞救之之術臣等伏見數年以來天戒屢至朝廷雖有警懼之意然循舊弊未嘗改更所以今日灾變頻數葢天意必欲朝廷大修人事以救其患乃可變危為安也救患之方莫若原其致灾之本由君臣上下之闕失也闕失之事臣等敢次第而言之陛下不專聴斷不攬威權使號令不信于人恩澤不及于下此陛下之失也持天下之之柄司生民之命無嘉謀異議以救時弊不盡忠竭節以副任用此大臣之過也朝有闕失而不能救民有疾苦而不能達陛下寛容少斷而不能規大臣循黙避事而不能斥百官邪正並進而不能辨四夷交結内侵而不能謀有顧避之心無力諍之節此臣等之罪也今陛下既有引過之言達於天地神祗矣伏乞陛下必踐其言必行其實踐言實之要莫若專聴斷攬威權號令信於人恩澤及于下則灾異消而和氣應矣其大臣不舉職之過伏乞陛下以致變之由赫然督責之若督責之又無近效則用灾異册免三公故事而去之别求賢能以救人患如臣等䝉陛下非次選擇不能稱職尚致陛下有如此之失大臣有如是之過臣等負罪至深伏乞朝廷遠加竄逐别求方正材識之人俾居諫職必能禆贊朝綱上副選擇臣等謹具狀待罪以聞慶厯四年七月同余靖上時為諫院上仁宗論飛蝗係第二状蔡襄等臣等伏見陛下以灾變屢見飛蝗為孽引咎責躬告于天地廟社臣等伏念致灾之本由君臣上下之闕失列其事而言之終以自劾乞朝廷遠加竄逐别求方正才識之士俾居諫職臣等待罪于今七日曽不得報憂媿益深不知所措竊以今天下之勢外有羌戎結連侵脅之憂内有邊陲守禦戰争之苦兵冗財竭賦斂暴興生民膏血掊取無極譬如投石入井到底乃止不幸有旱澇飢荒之變盗賊乘時而起將何以禦今日視前一二年國用民力固不如矣復且因循無有更改救弊之術後一二年還視今日又可知矣非獨不如今日其患至大縱有知者不能為謀臣等以諫名官見天下之勢至危如此既不能開廣陛下恩信以固民心又不能糾正大臣闕失以救時弊是致灾異頻數中外恐懼臣等上負陛下選擢之恩下負生靈困苦之望憂慮終日譏責滿身尚何顏面入出朝中臣等罪咎實深伏乞朝廷必加竄逐以謝天下慶厯四年七月同余靖上上仁宗論灾異後合行四事范仲淹臣近日屢聞德音以灾異數見畏天罪已此實聖帝明王至仁之體也天下幸甚昨日宰臣等再奉聖㫖不須謝過但自行事此又濟時責實之要也臣等敢不惶恐思竭誠志以副宵旰之意臣觀自古國家皆有災異但盛德善政及於天下人不敢怨叛則雖有災異而無禍變也如其德衰政暴兆民怨叛故災異之出多成禍變也陛下今既畏天戒上憂宗社下憂生靈固已得堯湯之心矣如更行堯湯之事使天下受賜其有災異適足増陛下之盛德臣待罪輔臣經年無状四方多事未敢引退恐負君親擢用之意臣竊觀自祥符年以至今日火不炎上之災已十數度又累有地震之異今夏蝗秋澇人多妖言雖陛下修德罪已自可以動天地感鬼神而今生民若不遑處臣請行此數事少助陛下救生民之萬一惟聖心裁擇一委天下按察使省視官吏老耄者罷之貪濁者劾之昏懦者逐之是去謬吏而糾慢政也至于激勸善政之術即未著明其官吏中有畏上位之威希意望進或矯修㢘節而争為猛政求集事之名者務為暴斂求盡分之稱者專用深文政尚虚聲人受實弊資産竭於科率舉動觸於刑憲生民困苦善人嗟痛此天下怨叛之本也秦以天下怨叛而亡漢以救秦之弊而興臣請詔諸路按察官除常程糾察舉薦外於轄下知州知縣縣令中别選潔已愛民顯有善政得百姓心如倚父母者各具的實事狀舉三兩人與改官再任或陞陟委用如此則天下官吏知陛下憂赤子之心各務愛民求理不為苛政足以息生民之怨叛也如所舉不實仰御史臺彈奏當議重行貶黜一天下官吏明賢者絶少愚暗者至多民訟不能辨吏姦不能防聴斷十事差失者五六轉運使提㸃刑獄但采其虚聲豈能徧閲其實故刑罰不中日有枉濫其奏按于朝廷者千百事中一二事耳其奏到案牘下審刑大理寺又只據按文不察情實惟務盡法豈恤非辜或無正條則引謬例一斷之後雖寃莫伸或能理雪百無一二其間死生榮辱傷人之情實損和氣者多矣古者一刑不當而三年大旱著於史䇿以戒來代非虚言也况天下枉濫之法寧不召災沴之應耶臣請詔天下按察官專切體量州縣長吏及刑獄法官有用法枉曲侵害良善者具事状奏聞候到朝廷詳其情理别行降黜其審刑大理寺乞選輔臣一員兼領以謹重天下之法令檢尋自來斷案及舊例去其謬誤可存留者著為例冊一今諸道常平倉司農寺管轄官小權輕主張不逮逐處提㸃刑獄多不舉職盡被州府借出常平倉錢本使用致不能及時聚糴每有災沴及其遣使安撫雖民委溝壑而倉廩空虚無所振發徒有安撫之名且無救恤之實又國家養民之政本尚務農因民之利而利之則朝廷不勞心而民自養之矣臣請選輔臣一員兼領司農寺力主天下常平倉使時聚糴以防災沴并詔諸路提㸃刑獄今後得替上殿並先進呈本路常平倉斛㪷數目方得别奏公事移任者亦須依此發奏後方得起離仰司農寺常切糾舉及委輔臣等速定勸農賞罰條約頒行天下一天下茶鹽出於山海是天地之利以養萬民也近古以來官禁其源人多犯法今又絶商旅之路官自行販困于運置其民庶私販者徒流兵稍盜取者絞配嵗月千萬人罹此刑禍是有司與民争利作為此制皆非先王之法也及以官販之利較其商旅則増息非多而固護之弊未能革者俟陛下之睿斷爾臣請詔天下茶鹽之法盡使行商以去苛刻之刑以息運置之勞以取長久之利此亦助陛下修德省刑之萬一也慶厯四年上時為參知政事上仁宗論定襄地震孟夏雷未發聲李京臣伏以陛下因天之戒恐懼修省避正殿減常膳故精意感格日當食而隂雲蔽虧雖商太戊之桑楮並生宋景公之熒惑退舎無以異也然臣區區竊有疑者自寶元初定襄地震壊城郭覆廬舎壓死者數萬人殆今十年震動不已豈非西北二虜有窺中國之意乎二月雷發聲在易為豫言萬物出地皆悦豫也八月收聲在易為歸妹言雷復入地避羣隂之害也今孟夏雷未發聲豈非號令之不信乎願陛下敇邉臣備夷狄戒輔臣謹出命以厭禍于未形又尚美人棄外館多年比聞復召入必有假媚道以蠱惑天意者宜亟絶之苗繼宗嬪御子弟乃縁恩私為府界提㸃宜割帷薄之愛重名器之分庶㡬不累聖政慶厯五年四月上時為言事御史上仁宗論地震張方平臣伏見諸路地震自荆湖川峽山東河北陜西至于嶺表相繼未止比者忻州地震于後兵難及今適當此際登萊山崖摧圮災異所示恐不徒然歴考前志之言葢地主陰陰者臣道也民也夷狄也推之今日凡任内外之重即無權彊之臣則今事之可憂者外備蠻夷而内撫民爾西北二虜朝廷以為大患故於守禦素為用心至如湖湘之間蠻徭作梗一方塗炭七年未解近日衝突稍及嶺外如或不即平殄事亦不可輕忽而又南海交趾氣燄漸張路接邕容頗連溪峒南方之事理須經畧昔唐室之盛屢有中原之難蕃戎再入京城而王室尋復寧定至懿宗時安南都護李瑑失於撫御蠻冦侵擾遂致用兵度支困於饋食方鎮疲於更戍因而有徐州龎勛倒戈之變天下縁此以至危亂則知事甞起於細微禍常成于所忽也至如京東西兩路中國根幹畿甸屏蔽緩急所資常須安静以鎮天下然每患冦賊淵藪其中所幸嵗得豐穰必不大至連結若因之以邊警加之以飢饉法不勝於姦宄亂必始于鄉閭何以言之自慶厯初遣朝臣分往京東西路等招刺彊壯弓手宣毅軍俄又聴其傭人自代于時臣知諫院固争此事朝議已行不為停罷今民力所以大困國用所以一空葢由此一舉之失也其諸州宣毅悉聚游惰不逞之民非有材力技勇之所程選也後縁光化軍賊竊發朝廷條約失體姑息過當如養驕子轉生怨懟臣比在審刑諸州奏到宣毅兵士文案無月不有大則謀官吏劫倉庫小則謀欲劫民户入山林多至三五十人少亦一二十數以告賞之科重故有謀輒被告發聞雖教閲乃同兒戲無益軍器坐竭官私不征不役居惟念亂脱乘釁間必有應響之勢此其亂階一也初㸃定彊壯已屢經教閲搶刀弓弩各常學習及後招刺之時既聴傭人充代而其彊壯本身並無身力例各不劭農業遂樂惰游攪擾里閭侵凌細弱趨坑冶以逐末販鹽茶而冒禁儻縁凶歉搆扇流民結為盗賊必先此𩔖唐之黄巢尚讓由此起者此其亂階二也又京東西之民多信妖術凡小村落輒立神祠蚩蚩之氓惑于禍福往往奔湊相從聚散遞相蔽匿官不得知惟知畏神不復憚法寖使滋蔓恐益成俗漢中平元年黃巾賊天下同日起凡三十六萬衆各有部帥由積妖而成也晉盧循輩乃歴代常有此事此其亂階二也所謂地震之異儻在民與蠻夷此其最可慮者潭州劉夔清素士也恐非應務之才邕桂長吏尤宜推擇才略宣毅冗兵漸謀消汰之術民之先在彊壯籍者其干法冒禁謂須别立峻防頗聞民間猶多當時所教兵仗亦合嚴降約束收納入官村落神堂令所在毁拆密加察捕民之習妖者此亦思患豫防之大畧伏冀採納施行慶厯六年十月上時為翰林學士權御史中丞宋名臣奏議巻三十九
