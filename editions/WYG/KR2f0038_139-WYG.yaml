body:
  text: 宋名臣奏議巻一百三十九宋趙汝愚編邊防門遼夏十一上哲宗乞以棄地易被虜之人范純粹臣自元豐元年在陜西路備員監司適當軍興之時至七年乃得還朝故於陜西邊事粗知始末昨蒙除授今任赴官過闕雖䝉特許朝覲累狀乞上殿奏禀職事尋准樞宻院劄子催發出門故欲敷奏職事了不獲陳今既到任身逺朝廷須至披露論析仰黷聖聽切以西夏之國効順歲乆邊隅無事夷夏晏然秪因种諤沈括數輩希功造事欺罔朝廷以謂夏國失勢衆怨親叛無甚勞費席巻可平或請覆巢長驅或請進築開拓致朝廷大舉戈甲諸路並興固嘗長驅而無功亦已進築而失利衆説並試一無所成徒致闗輔瘡痍公私困弊百姓流徙國兵殘耗雖諸路各有收復故砦廢州多非中國所利之地深在敵境剏為興修横添兵屯倍置器械加費金幣益耗芻糧盡闗輔公私之力曽不足以自支故日煩朝廷自内應副而邊防釁隙日在可憂彼夏國者深沉自居未即報應葢亦以頻年應敵部族疲勞横山之人失業良乆勢力未復舉動良難故但比時以來數數遣使跡如効順實乃有謀外則不議土疆内則不修常貢既形欵我之計又為自資之謀臣聞累畨使人貨販滋廣通約所得不減三數百萬其自資之謀亦可見矣諸路軍兵經累次凋瘵之餘雖將招填略充舊數而新人眇小未堪戰鬭朝廷但知兵籍數目而未知士卒之氣全未振奮臣未測朝廷謀畫所向但見近降朝㫖應因軍興増置兵將官吏及添戍軍兵並已抽還外議以謂朝廷晏然自以為無事人竊憂之則其欵我之計亦巳行矣常貢未修彼所以言邊事之未竟也疆土不議彼所以為將來舉事之端也理勢灼然無可疑者然則邊防大事未見成畫臣恐歲月滋乆彼力漸全待草豐榖實之秋當弓勁馬肥之際稱兵有請暴肆跳梁倉卒之間何以遣應若臨時欲議許可則國體有傷若至期復舉干戈則生靈被害惟編户之方困豈再籍之能堪臣心之憂言有不忍臣昨者既不得奏禀聖筭尋曽徃見執政大臣語此邊事雖所慮亦或切至而為謀未知所從如臣之愚亦何敢以此自任唯是思慮所得參訪羣言不敢内有所懐願陳其説臣切以謂諸路所取夏人之地固未足繫彼國存亡之機而彼之所以乘困而必争者盖以謂日侵月削而不敢校則小國之勢在所可憂故自保之計不得不然一國共謀豈不及此由是推之乃知必争之地未棄則邊釁無時而可除也夫中國者禮義之所自出也今彼之與我必争者顧禮義當如何耳臣竊觀近時之論邊事者獨以謂彼既困怠無所能為加以數年可期柔服臣竊以謂不然彼所以嘿嘿自處未有所請但為自全之計者乃所以養鋭待時也是豈終困之理哉謂新地自興復以來縻耗鉅萬斥棄為難殊不思前日之已費者不足復追而它日之未費者尚可救也臣伏覩陛下即位以來累降德音凡聚歛掊積之令有害民生者悉行蠲除四海兆民懽呼愛戴蒙被聖澤可謂盛矣臣竊思念天下之費莫大於饋邊若邊事未有措置他日一有調度帑藏空虛無以取濟則聚歛傷民之令恐不能輙已此又不可不慮者也臣願陛下静占徃鑒㫁自聖心因彼遣使再三而未有所請之時乘彼詞理㳟順而姦謀未露之日特降詔㫖槩述先帝所以問罪之意具道秉常所以復國之由嘉其忠藎之誠諭以逆順之理趣令先以前後戰陣虜陷官員使臣將吏丁夫悉歸朝廷其所削之地並從給賜如此則邊釁可期於止息生靈有望於安全亦足使四夷知朝廷前日興師之意在於拯患問罪而不在乎疆土之利也中國陷冦之人又知朝廷愛人而不愛地也神功偉績可謂難名臣非不知危言異議自速禍悔伏念不獨守邊之職理當建明重以事君之方義無可避臣於先帝臨御之日數論邊事屢竭迂淺伏䝉先帝曲賜優容每有稱可非敢獨於此日驟為首尾異同之論古人有言曰知予之為取者政之寶也取予之間正在今日伏望陛下察臣誠在憂國志切愛君以臣今言少闗聖慮如其粗有可採即乞宣付三省樞宻院令大臣共議事貴機速伏乞早賜處決庶不為朝廷異時之患則天下幸甚傳曰事君有犯無隠臣則無隠矣其如位卑言髙妄議朝廷機政實犯天憲不敢以誅竄自逃貼黃臣頃者或聞北㓂曽有文字到朝廷請勾下西邊兵馬臣昨充北朝國信使日其接伴虜使嘗語及夏國之事亦云曽有文字教南朝罷兵臣是時隨宜應對尋具奏聞臣以謂西北脣齒之國萬一北㓂狡慢或一日又以夏國所失疆土為言即朝廷至時却已難為處決今日機㑹恐不可忽此臣所謂事貴機速者也貼黄臣切見所得西夏舊城堡砦如河東路葭蘆吳堡鄜延路米脂義合浮圖環慶路安疆等寨皆係深在賊疆於漢界地利形勢略無所利而所費芻糧皆是倍價計值及歲歲勞煩稅戸逺入輸納至於運致錢帛器械置官遣戍一一艱苦今日若行斥棄委是並無闕害惟是鄜延路塞門一寨係當中路之衝平川廣濶去帥府地里甚近别無地利控扼之險自得塞門増逺四十餘里可為中路屏蔽粗為邊防之利兼此塞門一寨舊是漢城棄陷以來年歲未逺似與其餘城寨利害有殊朝廷若議存守則理或有名更係朝廷裁決所有蘭㑹之地耗蠧尤深如聞朝廷已遣使相視勘㑹更不敢縷細開陳元祐元年三月上先是司馬光建議還夏人侵地同知樞宻院范純仁請以地易陷蕃生口純粹守慶州上此奏七月二府議定詔夏人以永樂城陷沒將吏兵吏送歸中國當議除元係中國舊寨及順漢西蕃土境外委邊臣商量分畫給賜至四年六月夏國遣使入貢又詔永樂陷沒人口經隔歲乆慮其間實有死亡如將來送還到日依數交割支與賞絹仍將葭蘆米脂浮圖安疆四寨給賜十月純粹奏夏人以永樂人口百五十五人欲以十一月十日至界首交還却用同日受領四寨乞許令將棄地内人户官物遷移般運於交送人口日前畢事並依所乞上哲宗論息兵棄地韓維臣竊見先帝時大興甲兵西討夏國始以問罪為名既亦收其土地遂致夏人有辭違失㳟順夷狄之俗以不報仇怨為恥今其國力漸復必來攻取故地若不幸復為奪去則先帝累年勞師所得一旦失之巳為可恥若興師攻戰則邊隙自此復開兵連禍結未有已時臣切思兵之不可不息者三地之不可不棄者五請為陛下陳之伏惟皇帝春秋尚富太皇太后深處九重豈嘗習聞軍旅之事萬一冦兵犯寨調發兵應接不暇或恐震驚上心焦勞聖慮此兵之不可不息一也自靈州之役永樂之敗闗陜之力凋耗士風未復今若再興大役必有失律違命散而為盜賊者外虞方作内患又起臣恐朝廷之憂不在夏國此兵之不可不息二也綿地千里屯兵數十萬必藉沉謀重望之臣為之統御忠義英勇之將出當戰鬭幹事宣力之臣促辦錢糧歴數見在之臣復推近事之驗恐未足以充此任者又器械皆捐棄之餘帑庾有乏絶之憂此兵之不可不息三也先帝以秉常受朝廷爵命而圖安擅行囚廢故發兵問罪今梁氏已死秉常復位所為㳟順有蕃臣之禮若復其故地則神宗問罪之名不為虛語嗣皇賜地之意實成先志此地之不可不棄一也朝廷自得熙河之地嵗費緍錢五六百萬以上所得愈多所費愈廣拓地之無利亦已明矣此地之不可不棄二也議者或以為蘭州趍夏人巢穴至近最為形勝自餘亦有要害可以増置城壁棄之非便陛下欲再興師旅收復靈夏之地則存之可也若無此意勞人費財以奉空虛之地則是又添一熙河也陛下以清浄為心仁惠為政切恐此事不當更興於今日此地之不可不棄三也遼夏二國世有婚姻且有唇齒之勢萬一遼國移書援先帝興師之意以梁氏死秉常復位為其請所失之地則先得我之義理而奪我之機㑹矣此時朝廷欲與地則是聽遼國之命而恩歸於彼若不與則是彰先帝之過虧大國之信而邊患復興矣此地之不可不棄四也中國之所以為可貴者為有禮義恩信也夷狄之可賤者以其貪狼暴虐也今操可貴以臨所賤則中國尊與其所欲以成吾所不欲則夷狄服此地之不可不棄五也臣聞古公亶父居豳為夷狄所攻欲得地與民民皆怒欲戰古公不忍乃去豳而居於岐山之下邠人舉國扶擕老弱從公於岐山之下旁國聞古公行仁亦多歸之古公周之先也其後世因其仁愛得民至於文武遂有天下今乃奪人之地又欲殺人之父兄而守之與古公異矣陛下試計修德行仁之效與用兵拓地之利孰為多少誠能於此時特降明詔盡以向者所得之地賜還夏國則其君長荷陛下之恩意人民感朝廷之惠澤至於鄰敵聞中國之行仁政吾民與兵知人主之惜民命其懽忻之聲戴荷之心將有甚焉伏惟陛下鑒古公之修德亮愚臣之忠計發自誠心斷而行之臣料不獨夷狄感悦上天鑒德助順亦且福祐無疆矣書曰惟德動天又曰至諴感神矧兹有苖此皆前代帝王行之已有成効願陛下勿疑若夫計已徃之費恡難保之地耗金帛動兵甲以争不可知之勝負而且有後患皆世俗之常談豈足為陛下道哉元祐元年六月上時起知陳州召兼侍讀加大學士上哲宗乞因夏人納欵還其地蘇轍臣竊見先帝因夏國内亂用兵攻討於熙河路増置蘭州於鄜延路増置安疆米脂等五寨議者講求利害乆而不決其一曰蘭州五寨所在嶮逺饋運不便若竭力固守坐困中國其人得以養勇窺伺間隙要之乆逺不得不棄危而後棄不如方今無事而與之猶足以示國恩惠其二曰此地皆西邊要害朝廷用兵費財僅而得之聚兵積粟為金湯之固蘭州下臨黄河當西戎咽喉之地土多沃衍略置堡障可以招募弓箭手為耕戰之備自開拓以來平治經路皆通行大兵若舉而棄之熙河必有晝閉之警所謂借冦兵資盜糧其勢必為後患此二議者臣聞之乆矣然以夏戎倍畔雖屢有信使而未修臣職未請侵地則棄守之議朝廷無因自發今聞遣使賀登極歸未出境而使復至講和請地必在兹舉雖廟堂議論已得詳熟而小臣憂國不能嘿已輙嘗覈實其事以為前件棄守之議皆非妄言然而朝廷決從一議欲決此議當論時之可否理之曲直筭之多寡誠使三者得失皆見於前則棄守之議可以一言而決也何謂時之可否方今皇帝陛下富於春秋諒闇不言㳟黙思道太皇太后陛下攬政簾幃之中舉天下事属之輔相當此之時安静則有餘舉動則不足利在綏撫不利征伐今若固守不與西戎必至於争甲兵一起呼吸生變緩急之際何所咨決况陜西河東兩路比遭用兵之厄民力困匱瘡痍未復一聞兵事無不狼顧若使外患不解内變必相因而起此所謂時可棄而不可守一也何謂理之曲直西戎近歲於朝廷本無大罪雖梁氏廢放其子而夷狄外臣本不須治以中國之法先朝必欲弔伐但討其罪人存立孤弱則雖化外之人猶將伏以聽命今乃割其土地作為城池以自封殖雖吾中國之人猶知其為利而不知其為義也曲直之辨不言可見葢古之論兵者以直為壯以曲為老昔仁祖之世元昊叛命連年入冦邊臣失律敗亡相繼然而四方士民裹糧奔命惟恐在後雖捐骨中野不以為怨兵民競勸邊守卒固而中國徐亦自定無土崩之勢何者知曲在元昊而用兵之禍朝廷之所不得已也頃自出師西討雖一勝一負而計其所亡失未若康定寶元之多也然而邊人憤怨天下咨嗟土崩之憂企足可待何者知曲在朝廷非不得已之兵也今若固守侵地惜而不與負不直之謗而使闗右子弟肝腦塗地臣恐邊人自此有怨叛之志此所謂理可棄而不可守二也何謂筭之多寡棄守之議朝廷若舉而行之其勢必有幸有不幸然今所論於守則言其幸於棄則言其不幸以較利害之實今夫固守蘭州増築堡寨招置土兵方其未成而西戎不順求助北狄並出為冦屯戍日益飛輓不繼賊兵乘勝師喪國蹙蘭州不守熙河危急此守之不幸者也割棄蘭州專守熙河倉庾有素兵馬有備戎人懐惠不復作過此棄之幸者也二者臣皆不復言何者利害不待言而決也若夫固守蘭州増築堡寨招置土兵且耕且戰西戎懐怨未能忘争時出虜略勝負相半耕者不安餽運難繼耗蠹中國民不得休息此守之幸者也割棄蘭州專守熙河西戎據蘭州之堅城道熙河之夷路我師不利復以秦鳯為境修葺廢壘復置烽堠人力既勞費亦不小此棄之不幸者也夫守之雖幸然兵難一交仇怨不解屯兵饋糧無有休日熙河因此物價翔貴見今守而不戰歲費已三百餘萬貫矣戰若不止戍兵必倍糧草衣賜隨亦増廣民力不支則土崩之禍或不可測也棄之雖不幸然所棄本界外無用之地秦鳯之間兵民習熟近而易守轉輸所至如枕席之上比之熙蘭難易十倍有守邊之勞而無腹心之患與平日無異也夫以守之幸較棄之不幸利害如此而况守未必幸而棄未必不幸乎且朝廷以天地之量赦其罪惡歸其侵疆復其歲賜通其和市雖豺狼野心能不愧恥縱使酋豪内懷不順而國恩深厚無以激怒其民臣料一二年間其勢必未能舉動萬一不然而使中國之士知朝廷棄已得之地含垢為民西戎背恩彼曲我直人懷此心勇氣自倍以攻則取以守則固天地且猶順之而况於人乎故臣願朝廷決計棄此然後謹擇名將以守熙河厚養屬國多置弓箭手於熙蘭徃還要路為一大城度可屯二三千人以塞其入冦之道於秦鳯以東多置畨休之兵以為熙河緩急救應之備明勑將佐繕修守備常若冦至先為不可勝以待敵之至庶㡬可以無後患也臣自聞西使復來謹采衆議以三事參較利害反覆詳究理無可疑是以輙獻狂言惟陛下裁擇幸甚貼黄臣切見二聖臨御除去煩苛天下之人想見太平之風今西戎已有向化之漸若朝廷靳惜蘭州等處堅守不與激令背叛使邊兵不解百費復興則自前苛政皆將復用太平之期不可復望深可痛惜伏乞陛下與二三大臣詳議其事以天下安危為念勿争尺寸之利以失大計則社稷之幸也臣切聞議者或謂若棄蘭州則熙河必不可守熙河不守則西蕃之馬無由復至而夏戎必為蜀道之梗臣謂此皆刼持朝廷欲必守蘭州之説而非國之至計也臣聞熙河屬國强族甚多朝廷養之極厚必不願為西戎所有若帥臣能以恩信結之統之以戍兵貼之以弓箭手又於熙蘭要路控以堅城臣恐西戎未易窺伺而西蕃之馬何遽不至乎至於蜀道之虞自非秦鳯階成等處蕩然無城池兵馬之備則西戎豈敢輕為此計臣謂此說亦空言而已臣又聞說者謂韓縝昔與北朝商量河東地界舉七百里之地以畀之近者䑓諫以此劾縝由此罷相今朝廷議欲以蘭州等處復與西戎無敢主其議者臣謂蘭州等處與河東地界不可同日而語河東地界國之要地祖宗相傳誰敢失墜舉而與之非臣子之義至於蘭州等處本西戎舊地得之有費無益先帝討其罪而取之陛下赦其罪而歸之理無不可不得以河東地界為比也元祐元年六月上時為右司諌上哲宗乞棄蘭州孫覺臣頃在諌職嘗議蘭州可棄兩次奏聞未䝉賜可切聞西人在館以蘭州為請而朝廷大臣議論不一或以為可棄或以為不可臣切思之二者皆有所見非茍而已也以為不可者以戎人難保棄信忘義今日得地明日侵邊未可知也與其割要地以利之而不能已其侵冒孰與守其要害而坐制其弊哉以為可者則以為蘭州之地乃彼所素有吾雖得之増兵益戍未嘗有毫髮之益而歲縻一百七十餘萬羌人又嘗大舉圍閉乆之乃罷終為中國之患而生西人之隙恐西人今請不已用兵未有已時二者所見雖不同然皆為中國計慮憂深思逺有志之士也以臣觀之今者朝廷之於西羌幸可乗其無事保養三數年間亦可以休息邊人困苦之弊萬一西羌不如所請跳踉桀驁如元豐時則臣知廟堂之上憂未艾也臣以為棄之便凡臣所謂棄之者非謂直棄以與之而巳葢欲於未與之時先與之要約西界寨柵徃時所謂要害羌人取之而去者有㡬令西人先以還我約束既定乃議與之如此則吾所得者亦不少矣伏望聖慈因其來請特與之勿牽於異議拘於常守而失此機㑹也漢宣帝明主也趙充國良將也以宣帝之明充國之老練其論羌事徃返至於五六卒從其䇿而事乃集廣謀博議古之人不免要在明主擇而行之元祐元年上時為給事中上哲宗論西人請地王巖叟臣累月前嘗上疏論天下之大害曰莫如熙河蘭㑹之坐弊中國願陛下早圖之今聞西人入朝以請地為事陛下念生靈安樂逺乆之計深以此事屬謀國大臣而聞大臣議論參差無一定之策竊度聖心惑之未有以處臣以謂聽言之道必以事觀之則一言可決國家未開拓以前惟以信義為重夷狄之心不敢輕侮故邊患少邊患少故民力紓民力紓故人心安人心安故兵威彊兵威彊所以能坐制夷狄而不坐弊中國開拓以來以有限之財供無窮之費以無窮之費貪無用之地國力已困而不可支人心巳危而不可保兵威巳沮而不可恃於此時當修復信義為天下休息計豈可固執更増後日之患也昔漢桑𢎞羊輩請田輪臺之田以威西國武帝下詔深陳既徃之悔曰前有司奏請欲益民賦三十助邊用是重困老弱孤獨也今又請逺田輪臺是擾勞天下非所以愛民也今朕不忍聞乃封丞相車千秋為富民侯以明休息富養也今議者欲請留蘭皋而田之何以異此惟陛下鑒武帝之所以悔於終者早悔之幸甚至宣帝時魏相請罷車師之田元帝時賈捐之請棄珠崖郡唐相狄仁傑亦請棄四鎮立和斯婁為可汗又請棄安東却立髙氏李德裕亦請勿保安西是數人皆一時之賢豈不為國家惜威靈重棄其地哉葢不欲貪外耗内疲竭生靈徇虛名受實弊遺國家之患也今窮荒之地於國家之勢不以得為强不以失為弱識者皆曰去大患以自全乃所以彊耳夫得地不如養民防人不如守巳今因其有請而與之足以示懷柔之恩結和平之信又失此時後日兵連禍結中國厭苦而為腹心之患陛下雖欲舉而棄之將不能矣臣度議者不過曰十餘年間竭天下之力而得之寧忍一旦棄之乎此不知經逺者之論也夫已耗之民財已傷之民命既非悔可追矣而後日之患猶不處之於今則當何時而已耶又不過曰恐啓無厭之求益生邊患不如勿與此不知自處者之慮也夫彼求者無名則我報者有辭無名之求勢當自屈且彼雖夷狄既巳與之寧不知恩尚何無厭之請耶若有恩以結之猶恐其來則無恩以與之將如何哉臣聞開邊之初其費不可以數言罷兵之後歲歲常費猶不減數百萬一有騷動其將奈何陛下須念此皆出於中原生靈膏血夫中原者陛下據之以制四夷者也而以生靈膏血塗窮荒不毛之地欲為垂世長乆之計豈不誤哉此事萬萬無可疑惟陛下留神早賜睿㫁天下幸甚元祐元年七月上時為左司諌上哲宗乞不妄動以觀成敗之變范純粹准樞宻院劄子諸路探報自秉常身死梁氏族人侵擅國事遂致諸部酋豪徃徃不伏變亂交攻日相屠害雖不住據逐處奏報終未見的確事情縁自來賊中事宜多是歸順人口通說事必真實慮兩界近上酋首因此變亂離析各懐去就或欲據元有州城自守遥託朝廷應援或欲率其部族直謀歸漢願為近塞藩籬若從而開納即慮展轉生事難保成功若一切拒之又慮反為它國所有為國患轉甚未審於當今邊情合如何處置致不失事機右三省同奉聖㫖令河東鄜延環慶涇原秦鳯熙河蘭會路帥臣宻切指揮㳂邊官吏若有投來西人如審驗得委知次第即仰相度可否収留仍更切厚與賞物募人逺探所有西界首領若謀歸嚮中國仰詳前項所問各以目今邊情向去利害縷細詳究措置條畫實封入急逓聞奏親自収掌不得下司今劄付臣准此右臣除巳依朝命施行外伏詳詔㫖所問葢邊防機事而繫中外安危之本者如臣之愚顧何足以語此然臣蚤膺任使乆在邊陲採摭審料粗若有得伏見陜西諸路邊防自元豐用兵之後未即解嚴迺者秉常失職諸酋並奮相與吞噬未有寧日方其自顧之不暇尚能為中國患耶在朝廷正宜安不妄動用觀成敗之變今詔㫖以謂近上酋首或欲據元有州城自守遥託朝廷應援夫夷狄蟻聚鳥散盛衰無常先王列於荒服之外棄而不擾縻而弗絶御戎之䇿無以過此今彼酋豪於變亂艱危之時欲以内附為名而請朝廷為應援茍可而許之臣不知一日急難有請則朝廷將真應而援之乎應援之舉名正而理勝乎邊兵之衆樂援而悦行乎不為之援則害大信乎凡此數者皆不可不慮也聖朝方以安静治天下息兵止殺重農務本太平之迹始於今日尚何此䇿之議哉又詔㫖以謂或欲率其部族直謀歸漢願為藩籬昔漢武帝時降胡數萬仰給縣官天子出御府禁藏以贍之後日之害大不可救是知夷狄為欵附之名則中國受勞弊之實也今㳂邊諸路自元豐以來所納降羌無慮二萬口而老稚無用者十有七八増耗邊廪為害巳大其心之向背未可知故平日間有引而去者則警急之際安知其非謀也然則降羌之無益中國亦已明矣况彼之存亡興衰有未可知者異時彼事既定復有君長必曰前日某部某族某人之亡歸中國者我國叛人也奈何受之我今請之則朝廷將若為處乎豈不理屈而勢沮乎此又不可不慮也或謂彼既附我奈何不受何辭以却之臣以謂不然彼之部酋若有以梁氏之禍來告者若請兵於朝廷者若據地而願附者若挺身以降者朝廷當使邊臣諭之曰若主不幸爾乃臣子當盡死節之義善為若主討賊而巳尚何來告耶何但欲脱身而内附耶我之邊兵方備它盜而不為爾捕冦也夫如是則中國豈不甚尊而名體豈不甚正乎如此則彼於異時必曰我變亂患禍之中朝廷不乗我之不幸而存我有德接我有道尚得志而負之乎夫如是則朝廷之義豈不甚勝而彼之德我豈不甚重歟又詔㫖以謂若一切拒之慮為它國所有臣觀戎狄之性以種族為貴賤故部酋之死其後世之繼襲者雖雛稚之子亦足以服老長之衆何哉風俗然也惟秉常父子有國綿乆國人歸心焉今諸路諜者之言雖曰秉常之死不明梁氏之族侵擅國事此特目今之勢然耳若謂遂能滅李氏之宗而有其國則臣未之信也葢一國之衆豈無豪傑推李氏族子以繼後者乎豈遂甘心為梁氏屬乎臣以謂借使李氏遂有絶滅之禍尚當争奪反覆屠戮相仍曠日持久然後定也夫困獸猶鬭者冀其或生也彼有力者方互為争奪各將以衆自守乗隙而奮觀釁而動大必并小彊必吞弱縱未敢統一諸部豈不據一隅以自全固願束手為它國虜乎臣知它國未能遽有者㫁可識也借有亡命避患而它附者不過逋逃之餘種耳顧何足道哉夫夷狄相吞并者中國之利也若天祐聖世遂使此羌卒至離析凡力等而勢均者各據土地自為一部則於時庶㡬有思附大國者矣雖然大河之南横山之地必附於中國大河之北賀蘭之封必附於契丹酒泉武威之地必牽於西域葢勢力逺邇之異也昔呼韓裂為五單于匈奴分南北庭自是漢之邊候遂無匹馬之蹤我之所利正願如此故臣所謂在朝廷今日惟安不妄動用觀成敗之變者葢謂此也夫中國者禮義之所由出也臣願朝廷静占徃鑒處以禮義叅稽古昔無蹈後患深敕諸邊將吏使積粟養士勵兵戒嚴從容無為坐觀其變應夏國酋領及部族生口有欲歸漢者並依前降詔㫖一切約回決無收受以全中國尊大之體以破夷狄反覆之謀如此則詔㫖所謂目今邊情向去利害者臣愚妄意切以為盡之矣若夫一得一失小利小權私已喜功為國生事者非臣所知也伏惟聖慈特賜省察元祐元年十月上時以直龍圖閣判慶州上哲宗論前後致冦之由及當今待敵之要蘇軾臣切見近者熙河路奏生擒果莊百官稱賀中外同慶臣愚無知切謂安危之機正在今日若應之有道處之有術則安邊息民必自是始不然將驕卒惰以勝為灾亦不足怪故臣區區欲乞陳前後致冦之由次論當今待敵之要雖狂愚無取亦臣子之常分昔先帝用兵累年雖中國靡弊然夏人困折亦㡬於亡横山之地㳂河七八百里不敢耕者至二百餘里歲賜既罷和市亦絶虜中匹帛至五十餘千老弱轉徙牛羊墮壞所失葢不可勝數饑羸之餘乃始欵塞當時執政大臣謀之不深因中國厭兵遂納其使每一使賜予貿易無慮得絹五萬餘匹歸鬻之其民匹五六千其民大悦一使所獲率不下二十萬緍使五六至而累年所罷歲賜可以坐復既使㓂因吾資以德其民且飽而思奮又使窺我厭兵欲和之意以為欲戰欲和權皆在我以故輕犯邊陲利則進否則復求和無不可者若當時大臣因㓂之請受其詞不納其使且詔邊臣與之徃返商議所獲新疆取捨在我俟其詞意屈服約束堅明然後納之則㓂雖背恩反覆亦不至如今日之速也㓂雖有易我意然不得西蕃解仇結好亦未敢動鄂特凌古棟戬之賊臣也挾契丹公主以殺其君之二妻棟戬死匿喪不發逾年衆定乃詐稱嗣子偽書果莊温錫沁等名以請於朝當時執政若且令邊臣審問果莊等以鄂特凌古當立不當立若朝廷從其請遂授節鉞鄂特凌古真汝主矣汝能臣之如棟戬乎若此等無詞則是諸羌心服既立之後必能統一諸部吾又何求若其不服則釁自彼作爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近上使額命之果莊等各得所欲宜亦無患當時執政不深慮此專以省事為安因其妄請便授節鉞鄂特凌古自知不當立憂果莊之討也故欲借力於西夏以自重於是始有解仇結好之心而果莊亦不平朝廷之以賊臣君我也故怒而盜邊夏人知諸羌之叛也故起而和之此臣所謂前後致寇之由明主不可不知者也雖既往不咎然可為方來之鑑元昊本懐大志長於用兵諒祚天付兇狂輕用其衆故其為邊患皆歴年而後定今梁氏專國素與人多不協方内自相圗其能以喘殘呻吟之餘久與中國敵乎料其姦謀葢非元昊諒祚之比矣意謂二聖在位恭黙守成仁恕之心著於逺邇必無用武之意可肆無厭之求蘭㑹諸城鄜延五寨好請不獲勢脅必從猖狂之後求無不獲計不過此耳今者切聞朝廷詔諸路敇勵戰守深明逆順曲直之理此固今之急務而詔書之中亦許夏人自新臣切以謂開之太易納之太速曽未一戰而厭兵欲和之意已見乎外此復蹈前日之失矣臣甚惜之今既聞果莊之捷或漸有欵塞之謀必將㳟很相半之詞而繼之以無厭之請若朝廷復納其使則是欲戰欲和權皆在彼有求必獲不獲必叛雖媮一時之安必起無窮之釁故臣願明主㫁之於中深詔大臣密勑諸將若夏人欵塞當受其詞而却其使然後明敕邊臣以夏人受恩不貲無故犯順今雖欵塞反覆難保若實改心向化當且與邊臣商議茍詞意未甚屈服約束未甚堅明則且却之以示吾雖不逆其善意亦不汲汲求和也彼若非心服而來吾雖蕩然開懐待之如舊能必其不叛乎今歲涇原之入豈吾待之不至耶但使吾兵練士飽斥堠精明虜無大獲不過數年必自折困今雖小勞後必堅定此臣所謂當今待敵之要亦明主不可以不知者也今朝廷意在息民不憚屈巳而臣獻言乃欲艱難其請不急於和似與聖意異者然古之聖賢欲行其意必有以曲成之未嘗直情而徑行也將欲翕之必固張之將欲取之必固予之夫直情而徑行未有獲其意者也若權其利害究其所至則臣之愚計於安邊息民必久而固與聖意初無小異然臣之愚計切度朝廷之間似欲以畏事為無事臣切以為過矣夫為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人夫生事者無病而服藥也畏事者有病而不服藥也乃至鄂特凌古請人人知其不當與而朝廷與之以求無事然事之起乃至於此不㡬於有病而不服藥乎今又欲遽納夏人之使則是病未除而藥先止其愈㡬何臣於侍從之中受恩至深其於委曲保全與衆獨異故敢出位先事而言不勝恐悚待罪之至元祐二年九月上時為翰林學士上哲宗論禦戎之要范育臣切以禦戎之要防患在於無形制勝在於未然患至而後圖安未有不危者也兵交而後求勝未有不敗者也臣觀本路有無形之患其端巳具其憂甚大臣䝉朝廷假以方面之寄容身自謀依違不言使患至形成上貽朝廷憂下為一方害則臣上負明主不忠之罪大矣故臣敢極陳其説臣伏見近朝廷詔本路與夏人分畫疆界依綏德例非所賜城寨外以二十里為界通逺軍定西通西榆木等城寨朝廷指揮賛邊相照取直西人執以逐寨外取二十里蘭州智古星舒堡前日朝廷令常作守據之計本路按視合取二堡外立界西人指為非舊堡寨要自龕谷寨打量此二事若朝廷從夏人之請則於本路邊面形勢有無窮之大害若不從夏人必起兵争占有害今日和議而西兵未有可息之期臣請陳其故葢定西北與夏人接境通西榆木等處則賊境在東若皆取二十里則今日所棄邊面多者已三二十里所徙弓箭手已數百千户失膏腴之地數千畆又定西孤絶賊兵可從中㫁其歸路其勢決不可守則通逺之邊面所蹙不啻數十里而賊兵毎出可至通逺通逺受敵則熙河一路有扼吭不通之患矣蘭州向藉質孤勝如川地五十餘頃皆膏腴上田有水泉可以灌溉其收畆數斛無慮置弓箭手三千人昔之堡障未立不敢就耕而以名目占坐不去者已千有餘人若從龕谷二十里為界則二堡之地皆不可耕蘭州捨此北距河南介山東西境壤無餘其耕種之地既不足以自食其州粟日益貴費日益廣又况賊兵一出則立至州之西野増兵備無時而巳豈不危哉此所謂從夏人之請於本路邊面有無窮之大患者也臣訪聞定西一帶川原廣濶哈瑪爾所居西市夏人置倉以積穀智果星舒川偽號裕勒珠自歸本路土人皆走天都山及㑹州之境地瘠人貧未嘗一日不回思其地又聞夏人常使北方之人自謀争奪之計昨正月中西界所差分畫首領與邊臣議論不合而去今其再至探得集兵數萬屯於境上時出遊騎道不遜之語度其意葢將必争而後已雖至於用兵廢絶和事皆且不顧此所謂不從其請將見兵拏而不解未有可息之期者也以臣計之不與則用兵雖速而患小葢吾邊有易守之形也與之則用兵雖緩而患大葢吾邊有難安之勢也然此二者不可不慮也臣請終言之切聞青唐鄂特凌古以簒得國朝廷既行封爵常與夏賊伺謀冦邊賴朝廷威㫁邊將出兵生擒果莊㫁河橋以挫其鋒遂寢姦謀納質效順息數歲之邊患今聞卾特凌古常疑其下有怨讎之謀日圖誅殺易置首領且與夏賊結約甚懽遣人徃夏國詰其與漢和激其用兵之意葢夷狄氣𩔖既同其嗜欲既一犬羊之黨勢必相為而又鄂特凌古簒於前梁沁布簒於後昔也相視而成其謀今也同心而濟其惡理必然也臣恐二賊締交夏賊出兵通逺金城之郊本路嚴兵以禦之里賊又出兵河岷之郊則本路分兵而力不給朝廷方且益發兵増備不知㡬何而止也商者不得安於途耕者不得安於野則所仰之粟不知㡬何而足五州之境邊面二十餘里二賊據吾腹背嵗嵗不可弛備一日不可減兵備其東則西出備其南則北出左提右挈四面受敵朝暮相救不暇一有交兵則五州之勢岌岌乎皆有動揺之憂又况萬一至於敗撓不可支可不慮哉此臣所謂無形之大患可為朝廷之憂者也以臣愚計欲防此未形之患必制勝未然之術臣願朝廷垂聴無忽臣昨累經畫青唐邈川利害朝廷未賜俞允近鄂特凌古再召温錫沁愈懐疑懼邈川人情亦不安又殺廓羅族四人錮其囚首及勾嚨布恪克嘉首領托薩魯新族其人户不從遂拘執首酋致有五百餘户走河州界約欄未去自朝廷除結斡磋鎮州刺史勾在青唐拘留不還又勾界邊䇿巴克嘉勒亦留青唐其國人携二酋長憂懼愈甚於前又近探得鄂特凌古病甚或云死匿哀不發欲踵前日簒棟戬之迹此逆酋之暴虐與人情之怨叛較然可見矣臣觀夏賊之邈川地近而形勢便青唐情通而利害同彼兩地之動息夏人知之固熟徒以沁布始簒及疆議未決故遲遲計未發爾使其志得謀行移兵以舉邈川併青唐若振槁木之易其為西邊大患臣前日已嘗具奏於朝矣就其未能二賊方且合謀為患如臣所陳其勢必矣臣又聞古人善為謀者因禍而為福轉敗而為功今本路欲與夏人交議地界當賊兵之鋒而争口舌之勝臣未見其可也不若緩其所當争而出其所未發先為之計發夏賊之謀而絶其交乗青唐之變而定其國用臣前䇿納趙醇忠繼棟戬後醇忠既立忠順戴漢因撫諸酋悉皆内向則二賊之交絶矣棟戬繼世人心皆服虐亂既除國内舉安則青唐之變定矣夏賊失青唐之援則有背腹之憂本路得邈川歸順則有形勢之利彼之所恃者復在我吾之所患者復在彼如此則區區之夏賊將假息於巢穴而不敢窺吾邊鄙通逺金城之疆錫之則為朝廷之德不與則亦不敢争吾兵不用而可以制夏賊之猖獗平西賊之禍亂威行萬里義服四夷雖唐虞三代之禦戎不是過矣將見本路州民有卧鼓息鋒之安趣耕稼而成樂俗矣復何邊患之憂哉此所謂制勝於未然之術也臣伏思朝廷大計務欲安邊息民不用兵革臣為此謀其始惟䕶趙醇忠假兵力因其人心助其聲勢過此以徃更不煩兵其津遣趙醇忠鎮撫部族合措置事件如䝉朝廷賜可乞别具條析聞奏次臣雖述此利害或恐更有未盡事理朝廷若行詰問却致徃復已依近降朝㫖選差本司幹當公事种朴乗逓馬赴闕詣三省樞宻院禀議去訖伏乞朝廷檢㑹臣累狀及今奏事理早賜處置指揮元祐五年正月上時知熙州宋名臣奏議巻一百三十九
