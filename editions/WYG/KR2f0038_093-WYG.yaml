body:
  text: 宋名臣奏議巻九十三宋趙汝愚編禮樂門喪禮上上仁宗乞納后之禮稍緩其期余靖臣伏覩景祐元年八月十五日詔敕頃以中闈有虧善道降處次妃之位仍從别館之居郭氏宜令於外宅居止更不入内美人尚氏令於洞真宫披戴永不入内美人楊氏於别宅安置者此蓋皇帝陛下廣示憂勤擯去聲色割情斷愛以從典禮雖堯舜無以加之天下幸甚詔㫖又云長秋之重隂教是宣顧厥位以難虚必惟賢而是擇將行聘納式助烝嘗臣謹按春秋君舉必書以示後嗣固當謹重用存規法切以莊獻明肅皇太后預聞朝政託在母儀保佑聖躬安固宗社欽奉慈㫖備盡孝誠先太后登遐方踰祥練陛下雖行易月之制而心喪未除古者三年之喪自天子達于庶人其禮一也所有納后之禮乞候先太后服紀闋日然後審選世閥登進賢淑興理内教統領六宫必允衆望始議䇿立不宜頻有改易以駭四方乃陛下孝治天下之本也昔者魯文公居喪納幣以娶夫人春秋非之公羊傳曰娶在三年之外此何譏爾曰三年之内不圖婚也是皆孔子書之以為世法伏望陛下謹兹舉措以示後代稍緩其期則臣繾綣之願也景祐元年九月上時為秘書丞上仁宗乞納后之禮稍緩其期孫沔臣伏覩近降白麻選立皇后當禮院定到儀式取冬至日奉冊皇后位中宫事或必行義亦未喻伏自天聖以來十有餘載每下詔令必曰克奉慈闈敷宣達孝及山園肅事軺車發途陛下攬紼徒行掩袂號慟天下聞之雖虞舜之為心周武之為子無以過也今春百僚陳誠五上封表乞聽樂而陛下純仁之懐孺慕之意孝志不衰抑去未允是知百行之本一人克修三載之憂天下通制雖易月之詔臨政得於從權期年而渝在仁傷於有愛而况明王廣孝思及萬世也今建納皇后必展鴻規古禮交修官儀備舉慶賜兼行懽心内易奈何莊獻未及大祥哀樂相參切恐不可士庶違之則有踰制之刑公卿違之則負忘哀之責豈英明之君禮法之主可自踰防範以動風俗則前之下令皆為空言虧德損名無甚此舉雖以禁掖乆虚其位固匪朝廷將順之宜伏望陛下發慕往之情奉有終之孝追還近詔别擇慶辰竢過禫祥以成嘉㑹則禮行告廟史無媿辭刑以御邦孰敢不正伏乞與執政大臣更從公議定庶幾不顯於聞聽臣生居寒微不知國體惟恐史筆直書千載之後有虧陛下之全德爾干犯天威甘受斧鑕景祐元年五月上時為監察御史先是郭后之本因宰相吕夷簡以罷相事怨后與内侍閻文應謀譖后而廢之仁宗悔之有復后意八月甲子夷簡上表請立皇后九月甲辰立皇后曹氏靖等各上此奏自始廢后及議再立皆夷簡意也其詳見皇后門上仁宗論魏國夫人薨就第宣召兩府臣寮韓琦臣昨奉使還闕切聞朝廷自西事以來兩次非時就宅宣召兩府臣寮在外不測事宜人情驚駭當時物議以謂有失持重之體日近復知西京謠言虚驚煩於止遏昨日午後又聞就宅宣兩府臣寮入内搢紳士庶無不憂惑至晚方知只是魏國夫人薨謝陛下雖隆乳母之愛其如在禮止為緦麻三月之服若言乎親則非近也若言乎尊則不崇也此止可一中人傳詔于宰臣之第令議而奏之何必徧宣近輔震恐都人事往不追後當為戒臣欲望每有國家體大之議邊鄙機宜之急合與兩府臣寮商量處置者務從審宻以安人心不宜倉卒以動羣聽臣又以送終之厚前載所非今魏國夫人於陛下親服既踈葬禮亦當簡儉望陛下勿聽左右張皇過為奢侈况國家西鄙設備兵須未豐正宜節用聚財之秋不可更為無益之費言或可采幸賜納用寶元元年上時為右司諫諫院供職上仁宗乞權住豫王葬禮孫沔臣伏覩豫王以逡巡致疾奄棄妙齡人神共悲嘆戚何及况陛下以一人繼體之大慈父鍾愛之心變禮伸情追爵制服故四方知陛下思念之懐悲感之意亦已至矣使天下為父者足以仰仁慈之孝也竊聞欲取五月中葬於永定陵以春秋之義固為得禮蓋陛下以哀痛之深無以盡其意而欲飾終顯跡兾竭精志雖使死者有知亦無所益諒大聖至明無幽不照豈於此事更有所疑實以情所未忍遂起此議今左右大臣宗親中閫皆為皇眷軫悼未敢直請緩期切恐因仍成事難復救論臣職當建言故非獲已當君父痛切之際而復不能將順其㫖獲罪必矣臣豈惜一黜而誤陛下之逺謀朝廷之大計也然豫王未可葬者三悉數以陳願賜詳覽且一品之葬禮式甚煩百日之間工役難就啓土壠山驅人勞衆諸宫因此葬者亦多所費之財非五十萬未能畢事今三司力屈百計收斂邊鄙宿兵未得豐足豈宜以三嵗之恩忘四方之事此未可一也又京洛之間衝要之所自昊賊侵軼國家征討饋運粮草賫送甲兵往還騷擾民頗不聊配率科徭嵗無虛刻塋墓若此驟興州郡如何供給此未可二也復况西賊竊伺中國已僅數年以水旱不調謂得天時以將帥不和謂合人事巧揺百端思欲一决今若因我之憂起役之次或盡兵力以幸此災益啓戎心轉為邊患此未可三也臣所見至愚固未為得庶盡懇切上補聰明欲乞權且就近安殯俟西事稍定一二年間具禮改葬正合典儀伏望皇帝陛下以禮制情以義斷恩以祖宗社稷為心以安危休戚是念無執小節以妨永圖臣恭聞真宗皇帝年四十餘方長育陛下司牧羣生為世真主今陛下盛德形容始三十嵗受萬世無疆之福何患乎錫羡之嗣晚也伏乞養氣保神順時進膳特寛聖慮專斷邦畿則天下幸甚慶厯元年二月上時為右正言上仁宗乞權住豫王葬禮孫沔臣聞忠臣切言非欲被狂名於時在回君心而已聖人納善非以啓衆議之口在惜國體而已故帝王舉一事出一令有不便於時未合於衆必容三諫以達四聰實兾再思利害周察體宜一說中幾萬有䝉福破柔邪之謀開明哲之志不惟其大亦以為難臣非不知犯顔不若取媚趨險不若偷安茍人人自圖恐非國家之利恭惟皇帝陛下仁明同堯舜恭儉若文景大度包荒純誠愛物好善無厭從諫弗咈接臣下以從容形温潤於顔色是使至愚得以盡慮况臣非才叨備諫列豈可見事自隠以一言為供職遂與衆退黙起外廷竊議臣所不取也是敢再陳狂瞽上瀆聖明惟陛下察之聽之容之畢之而已臣若以此獲譴實亦無恨近以豫王卜葬曾上封奏細陳其事又前日崇政殿進對三復盡意雖言拙識淺不足以動天聽乃知聖心唯切思念故非確然意不可轉此恐隂陽術數之流左右纎佞之輩巧陳厭勝多說災祥上惑視聽以此未决臣伏願以天時人事國計未便者察之中春卜地盛夏起墳鑿土穿山六十餘穴損害生命役人勞衆數十萬工衝冒暑熱適在毒日流爍更或大雨霖潦修治橋路供億頓逓不害於民何以集事此天時未便者一也豫王最幼殤禮為下諸宫附葬族屬多長以卑動尊亦非順也邊方士卒衣食不足而藏寶於地下郡邑人民配率無數而勞生奉死者此於人事未便者二也西鄙屯戍三十餘萬省司嵗用百計不支鬻一廷尉官纔得九千斛免一里胥役不過數百貫調發已勞用度不給况南郊在今冬賞費千萬其為窘急故亦可知今一品儀仗尚用千人附葬諸喪各司執事車騎導從僅萬餘衆往復勞撓非五十萬緡恐未能畢事此於國計未便者三也此非獨臣言乃三事大夫有識者之言也陛下貴為天子以一幼子展送終之禮庶盡其愛亦未為過其為未便者以時有所妨爾蓋國家多事之際在陛下割慈忍愛克已復禮為天下蒼生計况西賊猖熾敗軍殺將人心憂危未有安䇿而重三嵗之念忽萬姓之苦陛下以為如何且天下安雖未有子亦不足為憂也若天下危雖有子得不為慮哉况其奉死者也臣又觀欲了葬者有三諸宫國戚一也中人監䕶二也司天隂陽三也皆旁集已事而利進身也今三事大夫有識者意有補益而未能囘上心者逺也國戚監䕶隂陽者事有所損而能伺上意者近也伏望陛下察逺近之言究損益之本則王之葬禮庶幾權止矣昨日又見敕㫖差朝臣減省費用此乃陛下所慮至微至悉之深也然恐此二人力未足為監䕶中貴大臣所信而能節制也不若俟一二年間中外稍安備禮改卜亦為王者之光而天下之幸也今陛下當悲悼之際微臣無將順之心而煩辭寡識干瀆天聽尚兾感囘暫息勞費則誅責之罪逃避何及慶厯元年二月上上仁宗論皇子服罷開宴用樂余靖臣伏見隂陽尅擇官狀申皇子故鄂王大殮破服並取今月初四日又伏見毎年正月五日紫宸殿開宴管領契丹賀正人使竊恐有司循故事申舉以戎使為重依例作樂開宴臣身為禮官故敢先事言之竊以故鄂王雖有襁褓是為無服之殤其如已賜爵命當同成人之例父子天性豈能無戚今日服之而明日宴樂情何以安且臣寮之家遭此喪尚當給假况萬乘之主因戎狄之使不得申其私恩深可痛也臣以為若不得已宣召與禮食而徹去聲樂親遣大臣告諭戎使以皇帝有嗣續之痛故罷去聲樂非有輕重於北朝也戎狄雖同禽獸不敢以此為恨昔周景王以子喪既葬而與宴春秋譏之以為失禮古者卿佐之喪雖在祭祀尚猶廢樂况其親父子乎臣不勝區區之至慶厯三年正月上時為集賢校理同知禮院上仁宗乞早葬荆王盡節浮費范仲淹臣昨日奉聖㫖令中書熟議荆王葬事者臣謂此議有三其一曰年嵗不利此隂陽之說也其二曰財用方困此有司之憂也其三曰京西冦盜之後不可更有騷擾此憂民之故也臣又别有四議乞陛下擇之其一曰諸侯五月而葬是自古不易之典今年嵗利之說非聖人之法言也其二曰天下財利雖困豈不能葬一皇叔耶陛下常以荆王是太宗愛子真宗愛弟雖讒惑多端陛下仁孝力能保全使得令終豈忍送葬之際却惜財用而廢典禮使不得及時而葬恐未副太宗真宗之意臣為陛下惜之豈不防天下之竊議哉更乞檢㑹先朝諸王之薨有無權厝之者其三曰自來敕葬多是旋生事節呼索無筭臣請特降傳聖㫖令宋祁王守忠與三司使副并禮官聚議合要物色務從簡儉畫一聞奏與降敕命依所定事件應副更不得於制外旋生事節枉費官物仍出聖意特賜内藏庫錢帛若干備葬事使有司易為應副如此則陛下孝德無虧光于史䇿其四曰自來敕葬枉費大半道路供應民不聊生臣請特嚴㫖荆王二子并左右五七人送葬外其餘婦人合存合放便與處分更不令前去自然道路易為供頓大減冗費既減得費耗又存得典禮此國家之正體也乞聖慈從長處分臣待罪政府不敢不盡慶厯四年上時為參知政事上仁宗論濮王在殯乞罷上元燕游吕公著臣竊以帝堯之聖始於明俊德以親九族然後協萬邦致時雍斯誠制治之道次序之節然也伏見舊制虜使到闕曲宴紫宸殿及上元節當遊幸諸宫觀御樓觀燈臣愚以為贈中書令濮王在殯雖天子絶期然宴樂以早則於情理有所未安昔智悼子未葬殯於絳晉平公飲酒以樂杜蕢譏之此蓋異姓之臣爾况濮王於宗戚之中親尊莫貳若陛下出於恩厚北使朝宴日特命去樂將來上元觀燈遊宴並從寢罷如此則親親之道可以率下而篤俗矣嘉祐四年十二月上時為同判太常禮院上仁宗論董充媛賜諡冊禮司馬光臣伏見充媛董氏薨追贈婉儀又贈淑妃陛下親為之輟朝掛服羣臣進名奉慰又命有司為之定諡及行䇿禮於葬日仍給鹵簿外廷之議皆以為董氏名秩本微病亟之日方拜充媛今送終之禮大為崇重臣按古者婦人無諡近世為皇后有諡及有追加䇿命妃嬪已下未之有也鹵簿本以賞軍功未嘗施於婦人唯唐平陽公主有舉兵佐髙祖定天下之功方給鼓吹後至中宗時韋后建議妃主葬日皆給鼓吹非明王之令典不足法也臣愚念陛下恭儉寡欲近嵗以來後宫之寵絶無太盛過分著聞於外者此四方之人所以􅢻嗟頌詠歸仰聖德也不意今兹以既没之董氏而有司諂曲妄崇虛飾以隳紊制度凟慢名器使天下之人疑陛下隆於女寵甚非所以益聖德也况禮數既崇則凡事所須用度益廣今明堂大禮新畢帑藏空虛賦斂日滋元元愁困誠不宜更崇大後宫之喪以横增煩費夫亡者雖加之虚名盛飾豈能復知而適足以仰累聖德臣竊惜之伏望陛下特詔有司悉罷議諡及冊禮事其葬日更不給鹵簿凡喪事所須悉從減損不必盡一品之禮以明陛下薄於女寵而厚於元元也嘉祐七年九月上時知諫院上英宗乞撤去福寧殿前尼女司馬光臣竊見仁宗皇帝梓宫在福寧殿自啓菆以來每日裝飾尼女置於殿前傅以粉黛衣之綺繡狀如俳優又𩔖戲劇臣不知其說何謂也羣臣見者無不駭異或嘆其失禮黙有譏誚黷嫚威神莫甚於此殆非所以禆助喪容觀示萬方伏望聖慈速令撤去孔子曰葬之以禮此孝之大者也臣願陛下因此特降聖㫖下有司應將來靈駕進發以至襄事凡儀仗送終之物有鄙俚無稽不合禮典如此𩔖者悉宜撤去無使四方之人有所觀笑嘉祐八年上時知諫院上英宗論遣奠盡哀司馬光臣聞禮為人後者為之子也孔子曰人未有自致者也必也親喪乎又曰喪事不敢不勉故天子即位之初天下所以瞻仰而歸心者唯在執喪禮而已矣恭惟仁宗皇帝舉天下而授之陛下明睿獨斷人莫能間父母能生陛下不能使陛下貴為天子富有四海至於萬世子孫永享天祿皆仁宗皇帝之厚德不可忘也今靈駕發引逺就山陵天長地乆永無還期痛毒惻怛無甚於此伏望陛下至日若聖體稍安行禮之際威儀容止動加矜謹擗踊哭泣過於哀毁以竭孝思之至報罔極之恩結四海之心聳萬民之望盛德本基盡在於是不可以不嚴畏也此雖聖明所自知然臣區區尚欲以塵露之微助山海之大庶幾萬一或有所益焉嘉祐八年十月上時知諫院上英宗乞親行虞祭司馬光臣聞禮既葬而虞安也柩既葬矣孝子不忍一日離其親恐精神彷徨無所依歸故祭以安之也然則虞者孝子之事人主當親其禮非臣下所得攝也臣竊見今月三日虞祭百官皆入就位而哭而陛下不親其禮使宗正卿攝事臣竊惑之伏以永昭陵距京師猶五頓木主還未至之時不可一日不虞故使羣臣攝事今木主已達京師近在内殿而有司不根禮意尚如塗中使羣臣行事於親踈之序有所不稱於哀恭之情有所未盡臣恐聞見之人不知有司之失而歸責於陛下今未至卒哭尚有三虞欲望來日以後陛下親行其禮嘉祐八年十一月上時知諫院上英宗乞親行虞祭司馬光臣昨日上言虞祭者孝子之事非臣下所得攝乞陛下親行其禮陛下不以臣言為輕以為得禮已降聖㫖依臣所奏今日禮儀既具百官在庭而陛下不出復使宗正卿攝事在列之臣無不悵然自失且昨日有司不為陛下設親祭之禮猶可謂之有司之失若今日之事則咎將誰歸此皆由臣惷愚以彰陛下之過臣之罪重惟陛下裁之臣聞易曰不逺復无祇悔元吉孔子曰過而不改是謂過矣伏望陛下來日雖聖體少有不康亦當勉强親行其禮以解中外之惑嘉祐八年十一月上上神宗乞罷遺留賜物韓維臣竊聞故事先聖當有留物分賜臣下臣伏思承平日乆用度無節以致公私財利匱乏又國家不幸四年之内兩遭大故營造山陵及支士卒優賞所費不可勝計今之府庫比於仁宗晚年又益朘削若用嘉祐之例厚行賜賚臣謂為損不少陛下若以為奉承先帝之心加惠羣臣不可罷止則望閱諸府庫取服用玩好之物以充用才足將意便可不須過為豐侈所有金帛諸物可以贍兵恤民者願賜愛惜以救當世之急弊治平四年正月上時知制誥上哲宗論喪服儉葬范祖禹臣謹按禮喪服斬衰父傳曰為父何以斬衰也父至尊也諸侯為天子傳曰天子至尊也君傳曰君至尊也先王制禮以君服同於父皆斬衰三年蓋恐為人臣者不以父事其君此所謂管乎人君也自上世以來未之有改至漢文帝遺詔始令吏民三日羣臣三十六日而除後世又為易月之制二十四日而大祥三日禫而釋服喪紀之數尤薄於漢焉自漢以來不唯人臣無喪君之服而人君遂亦不為三年之喪唯晉武帝以䟽素終三年其羣臣多以為非蓋諂諛之人習於流俗而不知禮也唐之人主無有為三年服者而三百年間諸議者亦未嘗及之蓋世無達禮之士而人不知事君之義也唯國朝自祖宗以來外廷雖用易月之制而宫中實行三年之服且易月之制前世所以難改者以人君自不為服故也今君上之服已如故典而臣下之禮猶依漢制是以大行在殯而百官有司皆已復其故常容貌衣服無異於行路之人無哀戚思慕之心豈人之性如此其薄哉由上不為之制禮也夫衰麻哭泣孝子仁人之所以表其衷也賢者無服則無以致其哀不肖者無服則遂忽而忘之是以禮義偷薄忠孝陵遲則由無以廣其情也素冠之詩刺不能三年蓋為是矣具其禮之失者臣請得以悉陳之今羣臣易月而人主實行喪制故十二日而小祥朞而又小祥二十四日而大祥再朞而又大祥夫練祥有不可二也既以日為之又以月為之此禮之無據者也古者再朞而大祥中月而禫禫者祭之名也非服之色也今乃為之慘服三日然後禫此禮之不經者既除服矣至葬而又服之蓋見梓宫不可以無服也祔廟而後即吉纔八月矣去山陵未乆也而遽純吉無所不佩此又禮之無漸者也臣伏見先帝之喪自三月十三日服至二十八日而除羣臣衰麻纔十六日遺詔易月因襲故事已行之禮不可追也臣愚以為過山陵宜令羣臣朝服如今日而未除衰至朞而服之漸除其重者再朞而又服之乃釋衰其餘則君服斯可也此非有所難行唯存其衰麻而已今之冠服非古之制也至於禫不必為之服唯未純吉以至於祥然後無所不佩則三年之制略於古矣夫衰裳不可以服勤斷以日月而易朝服以治事誠是也然既葬而遂除之臣竊以為太早矣孔子曰喪事不敢不勉又曰上好禮則民莫敢不敬伏惟皇帝陛下聖政之美四方風動上順天意下順人心書曰今王嗣厥德罔不在初於以革千餘嵗之弊正一代之禮教使天下知君臣之義其於風化非小補也如以臣言為然乞下有司考正其禮臣又聞儉葬者聖哲之訓也奢葬者世俗之失也宋華元厚葬其君君子以為不臣漢世山陵多藏金寶故有張釋之之言劉向之論世所明知也武帝在位嵗乆茂陵中物無所容霍光不達大體以厚葬為愛君無所減損從而益之故西漢之末唯霸陵獨全葬之厚薄禍福可睹矣臣誠知國家山陵送往儉於前代然猶以為言者欲於儉約之制損之又損使天下知其中無所有見其中無可欲則萬世之利也臣昔者伏見仁宗皇帝葬於昭陵有緘封皮匣納之方中者甚多皆出於禁中人莫得而知也臣愚以為如此之𩔖無益於先帝切恐㳂襲故事猶或藏之推此𩔖以損之必猶有可省也昔周太祖將終戒世宗曰昔吾西征見唐十八陵無不發掘者此無它唯多藏金玉故也我死當衣以紙衣斂以瓦棺勿作石羊虎人馬唯刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或違吾不福汝周祖生於五季之末非有前聖之識而其葬乃如太古此其智賢於秦始皇逺矣近事不逺即本朝所代也臣以為周祖懲唐奢葬故以儉薄矯之然以天子之喪而幾於臝葬則太陋而不可以為繼今唯於儉制之中加損約焉可也臣頃在書局未嘗敢越職言朝廷得失今非職而言者竊以先帝之服臣子所同也先帝之葬四海所共也臣身服先帝之服預先帝之葬知其不合於禮而不言憂其或過於厚而不以告臣所不能已也臣嘗采唐事為唐鑑數百篇欲獻之先帝屬先帝不豫未及上其中一篇論厚葬一篇論喪服輒不自揆謹録上進庶幾觀古以知今少禆萬一焉干冒旒扆臣無任惶恐俟罪之至元豐八年六月上時為祕書省校書郎上哲宗論司馬光薨乞罷紫宸殿稱賀吕希純臣謹按禮記檀弓衛有太史曰栁莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往春秋書仲遂卒于垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹以此見古之人君聞大臣之喪雖宗廟之祭皆廢今來宰臣司馬光其薨適在明堂散齋日内嚴父配天國之大典固不可廢至于御樓肆赦恐亦難罷唯是紫宸殿受賀一節縁是慶賀之事比之宗廟之祭為輕方聖情軫悼元臣而羣臣拜舞稱慶恐於禮義人情未為宜稱所有今來禮畢紫宸立班伏乞聖慈特賜詳酌指揮元祐元年九月上時為太常丞上哲宗論除喪不可特置一宴范祖禹臣伏見今月一日以後羣臣累拜表請聽樂所請愈數而批答愈緩以此見太皇太后陛下皇帝陛下仁心孝性深逺無窮發於至誠有所未忍今已批答允許臣竊恐有司請置宴樂不敢不先言之臣愚以為居喪則行喪禮在吉則行吉禮除喪之後如遇吉禮即可聽樂不當特置一宴以開樂為名君子之於喪服以為至痛之極不得已而除之若以開樂故特設宴則似除服而慶賀非君子不得已而除之之意也臣伏請雖至七月其開樂宴亦更不作唯因事則聽樂庶合先王禮意貼黄如以臣言為然乞候有司奏請只作聖㫖指揮元祐二年六月上時為著作郎兼侍講上哲宗論除喪不可特置一燕程頤臣伏覩有司排備開樂宴臣備員勸講職在經義輔導人主事有害義不敢不言夫居喪用喪禮除喪用吉禮因事而行乃常道也今若為開樂張宴則是特為一喜慶之事失禮義害人情無大於此雖曰故事祖宗亦不盡行或以故而罷或因事而行臣愚竊恐祖宗之意亦疑未安故也自古太平日乆則禮樂純備蓋講求損益而漸至爾雖祖宗故事固有不可改有當隨事損益者若以為皆不可改則是昔所未遑今不復作前所未安後不得復正朝廷之事更無損益之理得為是乎况先朝美事亦何嘗必行臣前日所言殿上講說是也故事未安則守而不改臣前言冬至受賀表是也臣前後累進狂言未嘗得䝉采用而言之不已者蓋職之所當不敢曠廢伏望聖慈特賜聽納自中降㫖罷開樂宴直候因事而用於義為安元祐二年七月上時為崇政殿說書上哲宗乞以魏王之喪罷秋燕蘇軾臣近准鈐轄教坊所闗到秋燕致語等文字臣謹按春秋左氏傳曰昭公九年晉荀盈如齊卒於戲陽殯于絳未葬晉平公飲酒樂膳宰屠蒯趍入酌以飲工曰汝為君耳將司聰也辰在子夘謂之疾日君徹燕樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之汝弗聞而樂是不聰也公說徹樂又按昭公十五年晉荀躒如周葬穆后既葬除喪周景王以賔燕叔向譏之謂之樂憂夫晉平公之於荀盈蓋無服也周景王之於穆后蓋朞喪也無服者未葬而樂屠蒯譏之朞喪者已葬而燕叔向譏之書之史册至今以為非仁宗皇帝以宰相富弼母在殯為罷春燕傳之天下至今以為宜今魏王之喪未及卒哭而禮部太常寺皆以為天子絶朞不妨燕樂臣竊非之若絶朞可以燕樂則春秋何為譏晉平公周景王乎魏王之親孰與卿佐逺比荀盈近比富弼之母輕重亦有間矣魏王之葬既以陰陽拘忌别擇年月則當准禮以諸侯五月為葬期自今年十一月以前皆為未葬之月不當燕樂不可以權宜郊殯便同已葬也臣竊以陛下篤於仁孝必罷秋燕不待臣言但至今未奉㫖揮縁上件教坊致語等文字今合於燕前一月進呈臣既未敢撰亦不敢稽延伏乞詳酌如以為當罷只乞自陛下聖意施行更不降出臣文字臣沗備侍從叨陪講讀不欲使人以絲毫議及聖明故不敢不奏元祐三年八月上時為翰林學士兼侍講宋名臣奏議巻九十三
