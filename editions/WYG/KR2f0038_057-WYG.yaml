body:
  text: 宋名臣奏議巻五十七宋趙汝愚編百官門給舍下上哲宗再論安燾除命王巖叟臣累言安燾之進不能恊公議不能重朝廷不能服四夷又告命不由門下書讀無以正法度無以持紀綱無以敕羣臣所繫甚大至今未䝉省納施行多士之論皆以皇帝陛下太皇太后陛下自聽政以來未嘗有一事不愜天下之心今乃因不才無狀之人致累吾君全美之徳非獨臣惜之天下愛君之人誰不惜之臣恐有獻言者誤陛下但謂巳行之命不可回不復陳義理當如何此非忠於陛下之言也非明於王體之論也自古及今唯苦口逆耳諫止君父使無過舉為天下後世所議乃忠臣也乃明於王體者也臣竊以明主惟義是從不以回已行之命為難請引仁宗朝一事以告陛下慶厯三年三月二十一日除夏竦為樞宻使四月八日用御史中丞王拱辰諌官歐陽脩等十一疏追竦樞宻使敕當時名儒石介作為聖徳頌以詠仁宗之美天下流傳至今稱為盛事伏望陛下法而行之不以改巳行之命為難而以聽諫為重天下幸甚臣志在愛君忘其再三之瀆惟陛下察臣之志臣死無恨元祐元三月上年上哲宗再論安燾除命朱光庭臣竊以自古人君致功徳巍巍與天地並者積衆善之效也夫以天下之廣萬幾之繁以一耳目兼聽周視欲事事中理其要道莫過於取善而已大凡好勝自古之公患茍不以事之善否而皆欲莫予違則拒人於千里之外矣夫舍已從人唐堯之盛徳也與人為善虞舜之盛徳也以數聖人之盛徳猶聞取人之善恭惟陛下臨御以來盛徳日新百度修舉求賢如不及從諫如轉圜與堯舜禹湯之盛徳無以異前日權給事中王巖叟封駮安燾知樞宻院不當陛下直令下吏部施行更不令給事中書讀臣竊以謂非取善之道也燾之不才無公望陛下又素知之今日聖政如此退大姦進大忠天下翕然咸稱有古聖帝明王之風在燾之躐等超陞一事何憚而不改耶且居陛下耳目之任者不敢不盡言蓋思所以稱陛下付委之意若俾燾却居舊職任用不為不重告命必須書讀紀綱方始不紊臣願陛下以堯舜禹湯盛徳取善為事則臣之職可以無媿伏望聖慈留神天下幸甚元祐元年三月上時為右正言上􅈒宗乞議經歴付受官吏之罪以正紀綱劉摯等臣等伏以御史臺肅正紀綱紏劾不法自朝廷至於州縣由宰相及於百官不守典法皆合彈奏今按中書省録黄除安燾知樞宻院事付門下省審給事中封駮不當奉聖㫖更不書讀門下侍郎省審並不執奏付尚書省吏部出告吏部具給事中不書讀事理申本省尚書省亦不執奏遂以不書讀告命降出所有門下省尚書省僕射侍郎左右丞及付受告命吏部等不守典法有損聖政乞付有司論罪以正朝廷紀綱謹具彈劾以聞元祐元年三月同吕陶孫升上上􅈒宗乞議經歴付受官吏之罪以正紀綱係第二狀劉摯等臣等累次論奏安燾知樞宻院不當其録黄不令給事中書讀及經歴受付官司並不覆奏乞寢罷追改正其罪今已數日未賜俞允臣等以謂朝廷高爵重位非有徳與功不可虚授若以恩禮假借則不協公議今安燾才望素輕備位樞府巳為忝幸一日驟有遷進躐過衆人士論紛然謂朝廷除拜樞府之長殊不遴選非所以鎮社稷服四夷也命令既出給事中不得書讀於法式未備而施行門下一省官存職廢紀綱紊亂此事尚書僕射左右丞皆無一言建明執奏遂付有司乃是上下廢法中外徇私何以訓治四方維持萬世所繫甚大極可駭嘆恭惟太皇太后陛下保佑聖徳以修正法度為急忽有此舉人皆惜之非獨惜安燾差除之過分蓋惜國家法度之廢失也伏望聖慈檢㑹臣等累次論列事并今來奏陳寢罷安燾除命所有經歴受付官司并乞早正其罪其范純仁録黄指揮仍乞由門下省書讀省審施行元祐元年三月上上􅈒宗乞議經歴付受官吏之罪以正紀綱係第三狀劉摯等臣等近以安燾除命未當及因給事中封駮遂不令書讀行下累具論列井彈劾門下尚書省經歴官司至今未䝉追改施行臣等待罪風憲見朝廷綱紀隳弛命令乖失茍不竭盡死力以救補之則陛下何用置言路臣等何顔在官次自陛下臨御以來以至公為心直道為政故凡見於施為者皆足以大服天下之心今忽然行此一事驚駭物聽與從來政事大異甚非所望於陛下者且安燾徳薄望輕不自卓立朋附章惇依阿其間今度越衆人無故進位已失公議而又制敕不循典故蹈襲斜封以避官司封駮不意聖明為此過舉此必有姦邪之論以誤陛下殊不知中書之宣奉行門下之省審讀乃歴代典章一有不備則不成書命燾等亦安敢受之哉夫聖人善於取人不能無過故六經不美堯之任已而美其舍巳不稱湯之無過而稱其改過今陛下追正事無甚難也於閤門取燾告身罷燾新命且令依舊同知外范純仁自從別制宣下其門下侍郎尚書僕丞及吏部等經歴奉行官屬皆不能建明執奏詿誤聖朝各付有司明正其罪使中外釋然知朝廷尊嚴典憲振肅以銷壓僥倖之望杜絶私邪之謀而成就陛下聽納之盛徳在陛下頥指一言而已何遲遲而不為邪臣等不勝聽命待罪激切之至貼黄陛下開奬言路多見聽納何獨於此一事不䝉開允縁朝廷正宜謹守綱紀審重命令今此差誤誠非小失臣等所以不避煩凟期於得請則已伏望檢㑹前後累狀付外施行元祐元年三月上上哲宗乞議經歴付受官吏之罪以正紀綱失名臣伏見安燾之命不送給事中書讀大於法非便臣與摯等巳嘗論奏拳拳之誠諒煩聖覧臣今為陛下反覆思慮此事實繫國體有不可者四須至再具奏陳冒浼天聽夫給事中之職主讀制敕許駮正奏覆陛下不使之讀是廢其職也朝廷設官任人而自廢其職無以訓四方示萬世今門下省録黄於給事中字不書臣某之名而書曰奉聖㫖不送給事中書讀尚書省遂受而付於吏部吏部出告亦如此書臣不知合何法式成何制命此一不可也小人之情巧偽險詐善窺朝廷之釁隙欲逞其志雖防閑禁約謹嚴周宻而猶有撓亂法度以僥倖者陛下儻謂此事已行難於更改不恤人言而遂行之他日或有權臣女謁干請希求非分之事攀援此例乞不付門下省施行臣恐陛下無以却其説蓋巳開之於前則難塞之於後此二不可也夫三省大臣皆與國家維持綱紀而同其休戚者今朝廷出令未合於法度而門下侍郎不駮正尚書僕丞亦不論奏唯黙奉行以付有司若萬一更有失事處置之間或不中於機㑹則誰為陛下救其失誤此三不可也自陛下臨政以來開廣言路臺諫所奏盡䝉聽納萬分有一可裨治道今以安燾之故獨不允從深恐言事之臣上畏天威自今以去不敢極論得失陛下聰明亦或因而壅蔽此四不可也夫舉一事而有四不可在陛下處之甚難以臣思之甚易何則改過不吝明王之盛徳耻過作非古人之深戒故曰人誰無過過而能改善莫大焉又曰君子之過如日月之食過也人皆見之更也人皆仰之且萬幾之繁親總獨斷不容無失能知其失而正之則為得矣其於聖政殊不為累今臺諌論列未已士大夫之議紛紛二人者必不敢受命陛下若令閣門繳納安燾范純仁告身續降指揮述其辭免之意除二人皆為同知院事由門下省施行則臺諫更不條奏士大夫之議帖然二人者不敢不拜上全國體下允公論此所謂甚易而不難處也况反汗之嫌小而廢法之失大願陛下權其輕重而行元祐元年三月上時為殿中侍御史上􅈒宗乞議經歴付受官吏之罪以正紀綱孫升臣竊以人主持利勢以兼制天下役使羣衆者有法制而已朝廷以一言而寵辱臣屬風動四方者布命令而已故法度紀綱上下維持不可有毫釐過失法制失則人主之勢去命令過則朝廷之言輕自古天下國家之所以亂亡未有不由此也近日朝廷除安燾知樞宻院事因給事中封駮不當奉聖㫖更不書讀門下侍郎並不執奏直送吏部施行吏部具事理申尚書省僕射左右丞並不執奏遂以不全告命降出且陛下私一非才除知樞宻院事臣且置而未論豈有朝廷維持紀綱執守法度大臣乃依違茍且不為陛下守法使朝廷出不全告命宣示於外棄絶公道虧損聖徳廢壞典法不足以傳示後世龜玉之毁過當在誰居朝廷紀綱之任不能紏劾大臣尚何面目出入陛下禁庭稱為御史伏望聖慈先正門下侍郎尚書省僕射丞不守法之罪或安燾有登用以來建明啓沃之謀猷廟堂帷幄之功業臣所不知者宣示臺諫布告在廷付門下省書讀省審而後行使陛下法制不失命令獲全然後坐臣妄言逆㫖重行黜削庶臺諫風節稍復嘉祐治平之時則臣雖被斥逐棄委溝壑死無所恨元祐元年三月上時為殿中侍御史上哲宗乞議經歴付受官吏之罪以正紀綱孫覺等臣等伏見朝廷差安燾知樞宻院給事中以為不當駮正封還陛下未信其言遂不送本官書讀施行臣等竊為朝廷惜之夫安燾之才不才差除之當與否自有天下之公論臣皆置而未議所惜者朝廷之法度爾且三省之設事相表裏勢相始終凡命令之出先自中書省一人宣之一人奉之一人行之次由門下省一人讀之一人省之一人審之茍有未當則許駮正然後由尚書受付施行紀綱程式其宻如此蓋以出命令而尊國體也或闕其一則於制敕不為全中外難以取信近日除吕公著為門下侍郎不由本省而下給事中范純仁力辨其事是也夫國家所以維持四海而傳之萬世者惟守法度而巳况當陛下諒闇之日簾聽之時正宜謹守法度不可毫釐差失今安燾之命不送給事中書讀施行乃是封駮一職遂為虚設制敕不全命令不重而法度不存矣斜封授官恐漸於此臣等所以為朝廷深惜也臣等竊度聖意必謂巳行之命難於追改且與序遷則是一舉而兩失矣為安燾者豈可受不全之制敕而處具瞻之地哉莫若因其辭免寢罷新命則君臣之際授受皆得其宜而法度不廢也况朝廷差除因臣下辭免或臺諌論奏而罷與改者多矣豈得於燾獨不改伏望聖慈追還安燾告命及詳覧臣等論列安燾文字別降指揮施行陛下遷進大臣若合公道何故不令給事中依條書讀臣等所論乃繫國體若陛下不賜改正臣須至再三論奏不敢自已元祐元年三月上時為右諫議上哲宗論安燾除命大臣宜以朝廷法度紀綱為意孫升臣竊以威福利勢人主既當獨執則法度紀綱上下所以相維自古法度廢紀綱壞而天下不亂者未之有也然則人主所以能擅四海之威福持天下之利勢者以有法度紀綱爾夫修法度正紀綱坐朝堂持公道决是非進賢退不肖使公卿大夫各得其職者執政大臣之事也日月之有食聖賢之有過君不以無過為徳而以改過為善是以先民詢及芻蕘而庶人得以議者聖人之善取諸人稽於衆而不自用也以天下之重器宗社之大業所以維持豈一人之力哉法度紀綱之所在雖人君且不敢有所私故詔令未出則論思之臣得以議之書讀之臣得以駮之詔令既行則諫諍之官得以爭之御史之官得以言之上下維持不可一日廢此朝廷所以分職任官之意也茍非其人不可使當其任既使居其任則不可廢其言廟堂之上以公忠自任平一為心是非判然邪正不亂黜陟惟允進退無媿期於上下無言則可矣不可必欲使之不言也若夫是非之不分邪正之不明而論思封駮之臣不獲伸其議諌諍彈劾之官不得盡其言不恤天下之公議以快意於一時若是則非所以明法度正紀綱上下相維為天下萬世治安之計也伏願陛下深思自古治亂興亡之戒而以朝廷法度紀綱為意宣諭執政大臣則天下幸甚元祐三年三月上上哲宗論告命不經門下辭同知樞宻院范純仁臣近以辭免恩命伏䝉聖慈累差中使封回劄子宣諭丁寜者愚賤之臣屢煩天聽再䝉遣使恩典過優固當勉勵疲駑上副任使然臣有危懇須合力陳竊聞臣今來告命不曽經門下審讀臣聞爵人於朝與衆共之所以昭示至公杜絶私門乃有司之職守為朝廷之典章此萬古不易之規而聖王之通道也今聞臺諌臣僚皆有文字論列而未䝉追改陛下必以謂進用輔臣已有成命不當因人之言輕有回改以示睿斷欲全恩禮臣之愚慮竊謂不然方今拔擢臣寮頒宣號令多因公卿宻啓或非陛下素知若不經歴有司必然難得審當今來臺諫官若俱有文字即是朝野公言其言當則人皆謂之忠賢其言不當則人皆謂之䜛黨各自係其名節豈肯輕易奏論非同一人私竊之言可以悞惑聖聽陛下當坦然聽信不必致疑彼皆陛下選用正直使為耳目之官豈有人不用耳目而可以視聽於天下也况陛下臨御以來聞善必納從諫如流今乃於臣告命特令不過門下言者必不肯巳㣲臣必不敢居乆鬰衆情恐失羣望不如因臣辭免特賜允從則上可以資陛下納諫之明下可以成愚臣安分之志而俾近臣得職言路開通廣帝堯舍已從人之風協成湯從諌弗咈之義一舉而數善皆得在聖明可不務乎與夫㣲臣叨被誤恩沮格公議利害相去逺矣伏望陛下察臣竭誠為國不為身謀特賜留神采納天下幸甚貼黄臣未曽得見告身只是傳聞廹於自陳不暇更候審實伏望聖慈憐察元祐元年三月上門下侍郎吕公著言安燾范純仁除命雖巳依中書發下而中外紛紛皆以為門下省失官若言者論奏不巳則恐轉難處置聞燾方固辭不敢受或因其請特賜俞允則朝廷命令不乖失其於待燾亦為得體尋有中札問公著不置知院官而兩貟並為同知院有故事乎公著既以故事對且言近例同知院有位左右丞上者時燾亦自言近䝉除知樞宻院事非才躐等不敢輙當至於舊職亦難安處望収還成命俾領近州尋詔安燾堅辭知樞宻院事特依所乞依舊同知樞宻院事仍令班左丞李清臣上范純仁告未經給事中書讀見在閤門可勾収別出録黄告身遍經門下省官施行上􅈒宗論顧臨不當補外梁燾臣伏聞誥命除給事中顧臨待制河北都轉運使清議頗為朝廷惜之臨昨任河東轉運使未乆陛下召入為給事中是知臨之用宜在朝廷顧臨論思獻納號為稱職未乆復出為轉運使士論以此疑之未有以識聖意之所在也竊以侍從之官親近主上其進退繫朝廷輕重不宜輙有改易今以轉運使求其在外者宜自有人以給事中求其内者如臨恐不易得伏望聖慈特賜指揮留臨依舊供職庶朝廷多得正人上下相維共守祖宗之法度紀綱助陛下求治之意元祐二年四月上時為右諌議大夫上􅈒宗論給事中張問孫升臣聞爵禄天下之砥石人主所以礪世磨鈍也故忠信爵禄所以勸士而唯名與器不可假人士夫忠義風節豈生而有之在陛下砥礪成就之耳茍爵禄不及於忠信而名器竊假於非人則天下之士孰知所勸而相勉為忠信節義之事乎臣嘗謂給事中門下之職法度號令所從出論思獻納之為先非偷合茍容養交安禄之所何以言之法度命令差失過當可以論議獻替於未下而諌官御史止能諌諍追救於已行命未下則其意易回事巳行則其勢難奪理固然也則給事之任豈可輕付非其人哉唐吕元膺自給事中除同州刺史及入謝憲宗問以時政得失元膺論奏甚激切上嘉其剛正翌日謂宰相曰吕元膺讜言直氣且欲留在左右使言得失卿等以為何如李藩裴垍進賀曰陛下納諫超冠前王乃宗杜無疆之福臣等不能廣求直士又不能數進直言辜負聖心合當罪責今請以元膺復為給事中以備顧問上悦而從之若李藩裴垍可謂不負大臣之責矣今顧臨張問為給事中顧臨慨然論議封駮聳動中外既以河事之重遣使北道侍臣有欲留之者大臣既不克從又不畫時選補忠鯁端良之人以慰士望而張問老謬無耻茍容尸禄為朝士大夫指笑御史論其不職乞與閑散以養衰殘而大臣姑徇人情恱其阿意既留而不去又使専給事之職備員素餐無所獻納則是可留者去之可去者留之使朝廷爵禄名器不足以礪世而忠信節義之人無以知勸執政大臣豈不負陛下委任責成之意有愧於李藩裴垍乎伏望聖慈詳察檢㑹臣前奏出自聖斷罷張問給事中別選有徳有識者任之以慰中外之望元祐二年五月上時為殿中待御史上徽宗論中書舍人不當書門下録黄曽肇臣伏見神宗皇帝大正官名始於三省詔令所出則自中書審覆駮正則繇門下受而行之則在尚書三省相成不可闕一中書則有舍人主行門下則有給事主讀尚書則有左右司郎官受付使之更相彌縫更相可否然後發號施令罔有不臧立政官人舉無過事此祖宗設官分職之本意也蓋三省各有分守不相侵踰而門下一職近取諸身則為咽喉逺取諸物則為門户所以駮正中書違失故自來舍人不兼給事之職伏見近日給事中封駮中書録黄三省進呈却令舍人書讀行下臣愚竊恐因此隳壞官制有損治體寖漸不已遂成大敝此臣夙夜熟慮不得不為陛下言之也伏望聖慈戒飭執政大臣謹守神宗所定官制勿使三省屬官得相踰越而中書詔令必由門下方得行出以明職分以正紀綱以為天下後世之法陛下留意毋忽元祐三年八月中批鄧洵武為史官給事中葉濤龔原封駮乃命中書舍人徐勣書門下録黄行出肇上此奏時為中書舍人上徽宗論行令不由門下龔原臣伏覩先帝建官設屬本以維持政事門下職在省審茍政令施行不便及黜陟不當無大小皆得以論駮今令行不由門下是廢法也况䘮制乃朝廷大政事豈可使不預聞非先帝設官之本意廢法失職由臣之愚上貽聖朝之失下取萬世之譏臣之罪也古者當官不得其職則去而臣罪若此願重黜臣以戒貪位元符三年九月三省引開寳故事請上周朞服吉既得請慮原必封還乃徑行下原上此䟽時為給事中詳見䘮制門上徽宗論龔原罷給事中曽肇臣伏聞給事中龔原以妄議政事罷職降官差知南康軍臣初聞之意謂原資性山野不善為辭犯天威自取黜逐陛下寛仁大度容直言初雖震怒終必矜赦傾聽數日未聞別有指揮臣愚竊有所懐不敢隠黙茍止惟陛下留神聽察臣伏見陛下即位之初深懲前日羣臣阿諛壅塞之弊収録廢錮召還朝廷又命近臣選舉臺諫官以補闕員仍下詔書許人直言時政闕失中外歡呼以謂堯舜之治指日可待故四方之士聞風踊躍爭獻所聞以裨聖政况於朝廷之上有官守言責之臣孰不激勵自奮欲以仰副陛下虚巳納善之誠哉是以朞月之間近者獻其明逺者通厥聰其有官守言責之臣則遇事輙發無所顧避比之前日論事之人其多何啻百倍非皆好黙於前而好辯於後其所以誘之者然也古人所謂主聖臣直豈非信哉矧如原者素以學行知名頗識事君之義昨䝉陛下取於踈逺之中驟置侍從之列其設心以謂非傾竭忠誠有犯無隠不足以當陛下㧞擢委任之意是以自入東省數有論列雖未必皆當聖意然比之前日偷安茍容以保禄位者則有間矣以陛下之明聖豈不察其用心以陛下之寛仁豈不容其冒凟遽然出逐實駭衆聽况當獨斷之初而近臣以言得罪臣恐在位之人自此以言為戒謇諤之風寖㣲阿諛之俗滋長小人觀望復萌僥倖之心所繫甚重不可忽也臣受陛下厚恩而以論思為職茍有所見輙以上聞毎䝉優容未賜誅斥今兹所論非獨為一龔原實以上繫國體伏望陛下少霽雷霆之威俯納芻蕘之議萬一可採乞出自中批寛赦原罪或令降官供職以責後效或別移在京差遣使之自圖去就庶免朝廷有因近臣論事遽行黜逐之名不勝幸甚元符三年九月上時為中書舍人上徽宗論先書空黄張叔夜臣竊惟神宗肇造三省以釐庶務有彛有倫各共乃事凡命令之出中書省宣奉行門下省省審讀然後付尚書省頒行而樞宻院被㫖亦必録送門下省蓋必欲致詳俾相闗預重謹如此今則急速文字無有經徧三省者矣而諸房復以空頭録黄用白帖子貼出事目謂之空黄先次書讀揆之職守自應不書然未有法禁茍或先書空黄則本省審讀殆成虚設欲望聖慈嚴立禁約所貴命令加謹政和八年四月上時為給事中詔先書空黄殆非法意可依所奏立法施行宋名臣奏議巻五十七
