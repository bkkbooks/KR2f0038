body:
  text: 宋名臣奏議巻一百一宋趙汝愚編財賦門理財上上仁宗乞减省冗費賈昌朝臣伏見西夏僭狂出師命將以遺朝廷之憂臣竊謂此固不足慮而國家用度素廣儲蓄不厚民力頗困是則可憂自天聖以來屢詔有司節省用度以至於今未聞有所施行古者四方無事則修政令務稼穡倉廪有積榖府庫有羡財節用愛人以戒不虞卒有水旱冦攘之至而無所憂自三代而下稱王業盛者唯漢爾文景以㳟儉故風俗厚財用足至于武帝務勤征伐始算緡錢𣙜酤以助軍旅之給而天下蕭然矣至昭帝議鹽鐵罷𣙜酤省徭役篤耕種凡侵蠧民利者一切寛貸之時賜租賦使民得以足衣食内則省宰夫樂工希文景之風以厚儲蓄數百年間四夷咸服百姓不厭漢徳者無他道也節用愛人崇本抑末之所致也宋受命八十載可謂治平矣然節愛之術有所未至邊陲雖寧而兵備不省徭役雖簡而農務不篤外厚幣聘而内豐廪藏自餘虚用冗費難以悉數天下諸道若京之東西財可自足陜右河朔嵗湏供饋所仰者淮南江東數十郡爾故田税不足重以𣙜禁凡山澤市井之利靡有厚薄悉入於公上而民不得售加以不耕不織游惰之俗蠶食為害都人士女燕安太平忘衣食艱難之患習尚奢侈重傷民力農所以困國之儲蓄所以不厚者職此之由夫國財民力靡於無用之日故當其有事不得不憂臣嘗治畿邑有禁兵三千而留萬戸賦輸僅能了足其三年賞給仍出自内府况他郡邑兵不啻此推是可以知天下虚實矣臣又嘗掌京廪計江淮嵗運糧六百餘萬以一嵗之入僅能充朝廷之用三分二在軍旅一在冗食所蓄聚不盈數天下太平已乆而財不藏於國又不在於民儻有水旱頻仍之災軍戎調度之急計将安出哉願陛下鑒已往之失察當今之務取景徳已來迄於景祐凡百用度靡有巨細校其所入所出之數約以祖宗舊制其不急者皆省罷之寳元元年上時為天章閣待制上仁宗乞减省冗費韓琦臣准敕以御史王素上言乞依賈昌朝所奏取景徳至景祐年凡百用度靡有巨細較計所入所出之數省罷不急等事䝉差張若谷任師中并臣與三司同共詳所奏定奪減省聞奏竊以臣先監左藏庫日朝廷亦曽差官於三司令將咸平景徳天聖景祐年支費比附其時三司巳檢尋天聖已前帳案不足遂下在京諸司庫務差人監勒檢尋亦是多不存在甚為騷擾臣輒上言若檢尋前項年分帳案得全比附見今來支費數多朝廷若不能節用乃是徒摭空文或勘會近年帳案但見得冗費即行減罷亦不湏見逺年文字䝉下三司檢尋終不齊足只將近年帳案勘會絶結了當今陛下崇㳟儉之本沛然垂詔以經費有度復議均節斯乃陛下興化致理愛養元元之深意也天下黎民實䝉惠福若又湏將景徳至景祐年逐月用度較計必是依前虚用勞費淹滯無成况今西鄙設備聚財實邉之費所宜移茲冗用以助兵需豈可遷延嵗時不求速效臣欲乞將三司逐案景徳年後來帳籍及照證文字勘㑹不必年分整齊但見得宫中支用顯有虚費即定奪減省聞奏臣伏覩古先哲王興儉以勸天下必以身先而後臣庻省分有司率職從上之令猶風靡而響應之也雖有僥倖覬覦之徒抑制其欲亦不敢興造怨語動惑衆心何則上躬行而下之所勸也臣愚欲望陛下飭宫掖之間先務節儉凡奢靡之飾竒巧之玩無名之賜無度取索一切罷之仍詔三司與臣等計㑹入内内侍省御藥院内東門司取先朝及今來賜予支費則例比附酌中定奪減省等定奪之後或有飛語流謗斷在宸衷屏而不聼如此則縣官之用可期充足且内藏宜聖景福等殿庫盖累蓄聚以備非常今或外用既節而不絶内帑支取即與外庫供億縻費一同亦望陛下深思祖宗經乆之制更務謹節臣又以出納之用名有攸司冗費之敝必能知悉仍乞特降敕命下三司委諸路轉運副使發運司逐處知州通判在京諸司庫務管當官員除官吏兵馬請給則例自來已有定制不在起請外如有諸般用度顯有虚費可以省減者即具利害擘畫聞奏降下依敕定奪三司人吏有所見亦聼經三司具狀陳述如顯然大段減省得宫中錢物其起請官吏即乞特行酬奨臣備員諌列誤被聖選不避衆怨罄竭上陳唯冀裁擇早賜進用寳元二年上時為右司諌上仁宗論三冗三費宋祁臣伏見西賊叛逆未即梟截申命將校警飭邊陲陛下日昃憂勤特軫調發内經聖慮旁咨羣謀臣誠不肖竊用感憤以為勇夫扞外儒者計内合為威略以行天誅則跳梁小醜指期烹醢故敢妄陳愚見以佐萬一臣聞兵以食為本食以貨為資在易聚人在書八政誠聖人所以一天下之具也以天下取之以天下用之量入為出故天子不得私焉傳曰足食足兵民信之矣今左藏無積年之鏹太倉乏三嵗之儲南方冶銅匱乏不發承平如此已自凋困其故何哉良由取之既殫而用之無度也臣不能悉知朝廷之經費且以臣素所見者言之何者大有三冗小有三費以困天下之財財窮而更欲興數十萬衆以事夷狄無謀甚矣陛下誠能超然逺覽燭見根本去三冗節三費專備西北之屯尚可曠焉髙枕無匱乏之患何謂三冗天下有定官無限員一冗也天下廂軍無任戰而耗衣食二冗也僧尼道士日益多而無定數三冗也三冗不去不可為國今陛下下詔於此斷自今日僧尼道士已受戒具者且使如舊其在寺帳為徒弟子者悉還為民勿復嵗度而州縣寺觀留若干所僧尼道士定若干人且令後來之數不過此此䇿一舉可得耕織夫婦五十萬人則一冗去矣今天下廂軍不擇孱小尫弱悉皆収配本不知兵亦且月費廪糧嵗費庫帛數口之家不能自庇於是相挺逃匿化為盗賊者不可勝筭朝廷每有夫役更藉農民以任其勞假如廂軍可令驅以就役方且别給口劵間望賜錢二端相率不便明甚陛下若敕天下廂軍今日以後除州軍湏要防禦别留三百人自餘更不收補已在籍者許備役作如此則中下之家悉入農業又得力耕者數十萬則二冗去矣國家郡縣素有定官譬以十人為額常以十二加之遷代罪謫足以無乏今則不然一官未缺十人競逐紆朱滿路襲紫成林州縣之地不廣於前而官五倍於舊吏何得不茍進官何得不濫除陛下誠能詔三班審官院内諸司流内銓明立限員以為定法自今以往門䕃流外貢舉之色實置選限稍務擇人俟有闕官計員補吏内則省息奉廪外則静一浮華則三冗去矣何謂三費一曰道塲齋醮無日不有若七日若一月若四十九日各挾主名未始暫停至於蠟蔬膏􅔇酒稲錢帛百司供億不可貲計而主者旁縁利於欺攘故奉行崇尚峻於典法皆以祝帝夀奉先烈祈民福為名欲令臣下不得開説臣愚以為陛下上事天地宗廟次事社稷百神醴酪粢盛犧牲玉幣使有司端委而奉之嵗時而薦之足以竦明徳於天極介多福於黔庻何必道塲齋醮希屑屑之報哉是國家抱虚以考祥小人誣神而獲利耳陛下若斷自聖慮取必不可罷者使略依本教以奉薫修開啓有時賜與一度則一費節矣二曰京師寺觀或多設徒卒或増置官司衣糧所給三倍他處帷幄謂之供養田産謂之常住不徭不役坐蠧齊民而又競飾神祠争修塔廟皆曰不費官帑自募民財此誠不逞罔上之尤者夫民藏於國國藏於民財不天來而由地出也役不使鬼而待人作也捨國取民其傷一焉伏望陛下切勑州縣普令罷止則二費節矣三曰使相節度不𨽻藩要貪取公用全濟私家跡夫節相之建或當邊鎮或臨師屯公用之役所以勞衆而饗賔也今則不然罷黜大臣率叨使相安民都邑普䝉公用取生人資力為無功之奉養坐糜邦用莫此為甚伏望陛下寳惜名噐使授受唯才自今地非邊要州無師屯者不得建節度已帶節度不得留近藩及京師則三費節矣三冗已去三費已節用度必饒臣又聞之人不率則不從身不先則不信陛下若能躬服至儉風示四方衣服醪膳無溢舊規請自乗輿始錦綵珠玉不得妄費請自後宫始然後天下響應民業日豐人心不揺師役可舉雖使風行電照飲馬西河蠢爾戎酋可玩之股掌中矣寧與今日誅求財用課鹽𣙜茗為戚戚之計者同年而語哉臣誠狂妄不曉禁忌輕進愚䇿惟陛下裁赦其辜寳元二年上時為三司度支判官上仁宗論民不可不恤財不可不通蔡襄臣伏覩陛下賜三司紬絹詔書曰使斂無暴横而公需足民無愁痛而國用登陛下視赤子有父子之慈臨萬物有天地之施不縁嗜愛而率斂於下毎因匱乏而資助於中有以見陛下克已㳟勤愛民切至徳音屢降聖慮軫深庻官所宜奉行百姓固當少息然而殘苛之吏未已供應之家轉勞陛下恤黎庶之心翻無實事海内仰朝廷之令悉是空言首尾乖違弊病安在臣以貧賤之迹叨耳目之官細民疾苦之情天子未聞之事俱合陳論伏自羌賊負恩天兵致討備禦之處數千里更戍之役五六年飛輓芻糧繕修噐械於是不時之斂作焉無名之賦興焉言利之臣出焉縁奸之利起焉配取相仍蠧傷滋甚供軍之利制作多門任土之求有無不一金榖之職轉遷靡常管庫之司給納是利前符未至後令已行州縣承風急於星火虐者先期集事曲施酷毒之威貪者與吏通謀力恣誅求之害以欺罔窮愚為智有作者茍得而必行以攘奪豪富為公當權者避嫌而不主破家流離之苦十室九空呼天告訴之詞萬人一口原其本末皆有因縁挾私讎者有之為身計者有之只如陜西𣙜鹽江南議鐵増添酒課採取銅苖移東就西指無為有或賜章服或改職名或與遷官或承奨詔所以争求目下錙銖之利不為日後乆逺之謀臣竊謂朝廷推賞不責其實之所致也倍添屋税鬻賣官田刷江淮見鏹上供欠商賈便錢不給配物於不産之所嚴程於可緩之期如此之𩔖三司之過也借買銀絹預折田苖逼抑之錢名為勸誘髙下物估官取贏餘如此之𩔖轉運使之過也貧富不均姦貪不禁妄為退剥故作滯留殺牛納皮仍科徒罪償官竭産更虐親鄰如此之𩔖郡縣之過也觸𩔖滋長不可殫論洶洶生民若在風濤之上嗷嗷四海偷為旦暮之安逺近之情若斯國家之患未巳臣聞民惟邦本本固邦寧又聞財聚則人散財散則人聚是知民不可不恤財不可不通若專奉公家不究民病所得則寡其失則多臣非不知吏員軍旅之繁郊廟宴錫之廣北有餌敵之費西有禦冦之湏常賦既不足充遺利必當悉取臣又非敢固興恤民之論務黜言利之人執髙古之虚文遺當世之切務所冀言利者上能資於國下不害於民饒益既多孰云不賞所可痛心者明知無利冒怨而行幸可寛期力為督廹自古剥下無厭而民不亂誅財無巳而國不危者未之有也昔漢武帝逺事征伐筭及舟車四方凋殘大業㡬喪以至下哀痛詔封富民侯雖僅安全而劉氏之不亡者如綫矣唐徳宗朝盧杞輩專為刻剥税椽僦櫃别檢促追掊虐平民都下尤甚涇兵乗怨徑入長安驅呼市人用此藉口臣竊思今日之事兵不得巳而用財不得已而求然漢唐致危亂之因種種略施行矣况復冦盗未平干戈未息或百姓之心揺動顧天下之計如何伏望陛下踐詔書之言推實事於下民不勝困在精擇郡縣撫養之人利不可遺在博求錢榖通流之術所入之賦有常而所責之數無極則去大冗而節煩費所得至薄而歛怨至深則去小利而存大惠上下相濟公私兩行伏惟祖宗不㧞之基全付陛下朝廷更張之事更待何時願陛下申戒大臣力求衆弊以幹家之術而憂國以恕已之誠而及人使百姓之心不揺則天下之計大定言先於事多為迂濶之謀事至而言無救阽危之禍臣憂深語切意拙文繁陛下儻賜詳觀於時實有裨補臣所言民間疾苦及處事有乖方列之於左臣所聞見民間疾苦不敢備載粗舉一二條所冀上逹宸覽知天下有如此事其間起請者乞賜施行慶厯四年上時知諌院中書批四月一十九日進呈奉聖㫖送三司相度以聞襄續上奏云數内一條臣所謂殺牛納皮仍科徒罪諸州造甲湏用牛皮作線穿聫自前條貫私家敢藏牛皮科罪更出賞錢所以民間牛皮多巳入官然官中不合湏要配百姓臣見潤州見配到甲數工匠至少計工三四年亦未了當本州郡計所用牛皮只限一月送納其皮只作甲線又定下濶狹尺數稍小者即退百姓浙中不産黄牛盡是過江收買程限急切至殺牛納皮稍小納不中官州縣捕捉又科殺牛之罪臣不知生民何辜受此苦毒中書批九月六日進呈奉聖㫖送三司並依所奏施行上仁宗論民力大困起於兵多張方平臣昨曽約計天下財利出入之籍知天下之所以困本於兵因勘㑹自寳元慶厯後内外増置禁軍嵗給錢帛糧賜等數進呈乞朝廷圖議其事有以弛張之伏以太祖皇帝取荆潭收巴蜀廣南江南備普冦禦西戎北敵計所蓄兵不及十五萬國初得周兵十二萬後平蜀㨂其精兵止留一百二十人及乾徳中選㨂中外之兵止存十萬盖極精鋭也後乃益増及十五萬兵爾太宗皇帝平太原備遷賊禦北敵科簡軍旅増修兵備志在收取燕薊然蓄兵不過四十萬人先皇咸平中備邉賊禦北敵蒐募戰士至五十餘萬人及契丹請和祥符以後稍稍銷汰弛牧馬地給耕民先帝嘗語宰臣曰天下兵馬之數雖不少精鋭者鮮且今之兵與古不同古者三時務農一時教戰民即兵矣今皆坐得衣食國家經費至廣不可不謹於選練向敏中曰軍額漸多農民轉耗近准詔㫖已住召募斥去疲老退減冗食帝曰卿等常宜講求務為經乆之要邊將占兵自固者輒罷之先帝常詔環慶路減神勇兵還營周瑩言當路兵數非多未敢便減上曰西邊雖得芻糧毎嵗役民輸運瑩無心惜民亦可知矣即以曹緝代之至於寳元㡬四十年可謂乂安矣向因夏戎阻命始籍民兵俄命刺之以補軍籍遂於陜西河北京東西増置保㨗武衛宣毅等軍保㨗一百八十五指揮武衛七十四指揮宣毅二百八十八指揮此其尢多者它不具載既而又置宣毅於江淮荆湖福建等路淮南三十二兩浙二十二江東十三江西十七湖北十七湖南十一福建十二指揮凡内外増置禁軍約四十萬餘人通三朝舊兵且百萬其鄉軍義軍州郡廂軍諸軍小分半分剩員等不列於數連營之士日増南畝之民日減邇來七年之間民力大困天下耕夫織婦莫能給其衣食生民之膏澤竭盡國家之倉庫空虚而此冗兵狃於姑息寖驕以熾漸成厲階然且上下恬然不圖云救唯恐招置之不多也且太祖訓兵十萬人以定天下今以百萬人為少此無他耳各茍及身之安莫為經乆之慮也夫茍且者臣下及身之謀經乆者陛下國家之計今負販之家猶汲汲於擔石之備安有慮不經乆而可以保天下者哉比嵗以來三路入中糧草度支給還價錢常至一千萬貫上下邊費如此何以枝梧臣較今大計加之百萬不為益減之百萬不為損而比來鬻官六千緡者與簿尉萬緡則殿直諸監筦塲務官凖課程以立賞格收贏至二三千緡即以次遷陟不知賣官遷官㡬何員數可供三路一嵗糧草之費是謂聚畎澮之微供尾閭之泄也淺陋之人更言遺利以裨經用末已夫財計盈虚國事安危繫諸兵而已矣景祐以前兵五十萬三司財用無餘及今而加一倍則何以得足臣近約度今年在京支計前已進呈只是凖擬常程用度圓融變轉僅以有備過此以往若更因之以横費加之以饑饉雖有智者亦恐難以善其後矣况臣之愚敢期克濟惟社稷之福祖宗之靈陛下至仁盛徳有以感格天地降之以善祥報之以有年則兆民之所頼也若觀諸人事臣愚竊甚寒心伏望令中書樞宻院檢會臣前奏審知計度聽於聖斷早為之所猶湏效在累年之後如救焚溺緩則益不及矣慶厯六年十二月上時權三司使上仁宗乞裁减内外費用張方平臣伏以天下承平為嵗深逺而國用不足民力益困今聚師境上調費寖廣倚於經入則財不給加以横賦則人不堪救茲火急特在陛下身先於率下惟事事乃其撙約而已臣竊惟陛下躬勤節用克自抑畏凡諸服御殊為菲薄而茲中外之論皆言用度之過臣竊疑之盖宫闈嬖昵左右近習假威恣横敢為欺誣仰恃仁慈縁為姦弊且禁中呼索輒稱聖㫖有司應奉皆為上供故外人不知其詳而譏議累乎盛徳國家帑藏之庫乃羣下侵牟之蠧也伏願陛下上念宗社之計下以生民為心彼婦人宦者何煩過為姑息超然逺慮斷自天心試取先帝之世及陛下臨御以來天聖之初官司帳籍如内東門之𩔖比較近年所費金帛則知増損豐儉之數以一言裁減之恩為萬方富庻之夲兆民所頼為幸實深先朝已前事恐難繼若天聖初體例夫豈逺哉因降詔書諭天下以陛下憂邊之心愛民之故則將卒聞之孰不奮勵以投命士民聞之孰不鼓舞以稱仁至於外諸司庫務凡百横費乞特置司局選用公平通敏諳曉時務之士三兩員條理之而以大臣一人監領其事其不便者唯是左右主掌之人爾誠陛下斷之不疑無容沮撓則上可以資徳美下可以施恩惠内可以集國計外可以成武功效速而利多事近而徳逺此當世之急務也慶厯六年十二月上時同賈昌朝等定奪上仁宗乞減冗雜節用度包拯臣伏見景徳祥符中文武官總九千七百八十五員今内外官屬總一萬七千三百餘員其未授差遣京官使臣及守選人不在數内較之先朝纔四十餘年已逾一倍多矣竊以唐虞建官惟百夏商倍之周設六官僚屬漸廣秦併六國郡縣益衆降自漢魏以至隋唐雖設官寖多然未有如本朝繁冗之甚也今天下州郡三百二十縣一千二百五十而一州一縣所任之職素有定額大率用吏不過五六千員則有餘矣今乃三倍其多而又三嵗一開貢舉每放僅千人復有臺寺之小吏府監之雜工䕃序之官進納之輩總而計之不止於三倍是食禄者日増力田者日耗則國計民力安得不窘乏哉臣謹按景徳中天下財賦等嵗入四千七百二十一萬七千匹貫石兩支四千九百七十四萬八千九百匹貫石兩在京嵗入一千八百三十九萬二千匹貫石兩支一千五百四十萬四千九百匹貫石兩慶厯八年天下財賦等嵗入一萬三百五十九萬六千四百匹貫石兩支八千九百三十八萬三千七百匹貫石兩在京嵗入一千八百九十九萬六千五百匹貫石兩支二千二百四十萬九百匹貫石兩况天下税籍有常數矣今則嵗入倍多者何也盖祖宗之世所輸之税只納本色自後以用度日廣所納並從折變重率暴斂日甚一日何窮之有且天下田土財用比之曩嵗虚耗漸以不逮豈於今而能倍之乎非天降地出但誅求於民無紀極爾輸者已竭取者未足則大本安所固哉臣以冗吏耗於上冗兵耗於下欲捄其弊當治其原在乎減冗雜而節用度若冗雜不減用度不節雖善為計亦不能救也方今山澤之利竭矣征賦之入盡矣幸而西北無事乃是可為之時若不鋭意而改圖但務因循必恐貽患將來有不可捄之過矣伏望上體祖宗之成憲下䘏生靈之重困謂設官太多也則艱難選舉澄汰冗雜謂兵太衆也則宜罷絶招募㨂斥老弱土木之工不急者悉罷之科率之出無名者並除之省禁中奢侈之僣節上下浮枉之費當承平之代建長安之䇿願陛下留神省察申命宰執條此數事而力行之則天下幸甚皇祐二年上時以户部副使知諌院宋名臣奏議巻一百一
