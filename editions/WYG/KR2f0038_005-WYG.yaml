body:
  text: 宋名臣奏議巻五宋趙汝愚編君道門帝學上上神宗論人主有髙世之資求治之意在成之以學孫覺臣聞人主患無髙世之資有有其資而無求治之意有有其意而無好學之實三者之備而治效不成者未之有也然此三者常若不可以兼備何也聰明睿智博達而䟽通者髙世之資也然或矜其才以天下之萬事爲不足爲若此者必無成蚤朝晏罷選用羣臣孜孜而不懈者求治之意也然或蔽於一曲而不見聖人之全因陋就寡而不本先王之意若此者雖安易危雖强易弱可以偷安於一時而不可傳之後世人主欲無此患其惟學乎夫學非篤好而審問謹思而力行則不足以攬道德之粹精極性命之㣲妙人主之學茍不深造於道德性命之際則無以應萬務之變知羣下之情以堯舜之聖而稱之曰若稽古夫古者人主之所當若又當稽也以孔子之聖而孟子稱之曰學不厭誨不倦夫已誨人矣然猶不忘於學學可以已耶陛下以髙世之資求治甚力好學而不倦可謂不世出之主矣然臣獨以爲未者竊觀朝廷之政未盡得先王之意而先後之序未盡合聖人之道也臣非以謂朝廷無賢臣左右無端士顧恐陛下於學問之道未能極髙明而道中庸政事之間未能先本務而後末業也陛下幸聽臣言以聽政之暇特召兩府大臣或從官之中素所親倚者虚心克巳問以上躬之所不逮時政之所過差使之具以條對必有能言之者矣陛下増益其所未至勉强其所不能救其所偏解其所蔽則臣將見陛下之治度越漢唐而比隆於三代矣熈寜元年上時爲右正言供諫職上神宗論誠明之學陳襄臣竊以帝王之德莫大於務學學莫大於根誠明之性而蹈乎中庸之德也生而不動之謂誠知而有爲之謂明正而不邪之謂中故誠者立善之本也明者致道之用也中庸者常德之守也三者立天下之能事畢矣聖人者先得乎誠者也因誠而後明必資乎學全静以居之神固以行之酬酢萬物而無失於曲當此之謂誠則明矣賢人者思誠也因明而後誠也者必擇乎善所謂善者可欲之謂也性也正而公者也所謂惡者有所不可爲之謂也情也邪而私者也存其所謂正而公者而去其所謂邪而私者此之謂擇善矣精一以守之中正以養之持循戒懼於不聞不覩之際此之謂謹獨而固執之矣乆而不息則形形而不息則明明而不息則動動而不息則化化而不已則神髙明博厚而配乎天地此之謂明則誠矣子思曰溥愽淵泉而時出之溥博如天淵泉如淵言其誠之篤也誠之者篤則其爲之者至是以其政不肅而行其教不言而諭其事不勞而成舉而措之天下之民無不從服而不知爲之者故曰凡爲天下國家有九經所以行之者一此之謂也是之謂誠明之學伏望留神省覧熈寧二年四月上時知明州被召除修起居注上神宗論君道之大在稽古正學程顥臣伏謂君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓爲必當從先王之治爲必可法不爲後世駁雜之政所牽滯不爲流俗因循之論所遷惑信道極於篤自知極於明任賢勿貳去邪勿疑必期致世如三代之隆而後已也然天下之事患常生於忽㣲而志亦戒乎漸習是故古之人君雖出入從容閒燕必有誦訓箴諌之臣左右前後無非正人所以成其德業伏願陛下禮命老成賢儒不必勞以職事俾日親便座講論道義以輔養聖德又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聽如是則聖智益明王猷允塞矣今四海靡然日入偷薄末俗譊譊無復㢘恥葢亦朝廷尊德樂道之風未孚而篤誠忠厚之教尚鬱也惟陛下稽聖人之訓法先王之治一心誠意體乾剛健而力行之則天下幸甚熈寧二年上時爲監察御史裏行上哲宗論學本於正心范祖禹臣不侍經席巳踰兩月陛下深居閒燕聖學日勤然臣等無由罄竭愚短輔助萬一昔唐憲宗不對學士兩月李絳奏曰爲臣等竊禄偷安之計則便矣其如陛下何今臣之愚竊欲陛下以學爲急故敢畧陳一二惟陛下留聽臣聞孔子曰學如不及猶恐失之揚雄曰學之爲王者事其已乆矣堯舜禹湯文武汲汲仲尼皇皇其已乆矣夫學者所以學治天下王者之事也故自堯舜禹湯文武之君皆汲汲於學仲尼雖聖亦皇皇有所不暇此聖人所以不可及也後世繼體守文之君生而驕逸不能務學忘其祖宗艱難累世之勤勞徒見天下無事以爲禍亂無從而生或荒耽于酒或盤于遊畋或窮奢極侈或輕用民力諂䛕日親忠正日踈人心離貳遂亡其國其所行之迹後世視以爲戒自古以来治日常少亂日常多推原其本由人君不學故也天下治亂皆繫於人君之心君心正則朝廷萬事無不正故天地順而嘉應降隂陽和而風雨時古者三公太師太傅太保論道經邦燮理隂陽無他術焉唯正君心而已保保其身體傅傅其德義師道之教訓皆所以正君心也如欲心正未有不由稽古好學而能致也臣竊考之前世揆之當今恭惟本朝累聖相承百有餘年四方無虞中外底寧動植之𩔖䝉被涵養德澤深厚逺過前世皆由以道德仁義文治天下人主無不好學故也太祖皇帝以神武定四方創業垂統日不暇給然而晚年尤好讀書嘗曰宰相須用讀書人陛下試思太祖此言宰相既用讀書人則自餘執政侍從之臣臺諌之職必皆文學之士然後可用外至州縣亦必由進士出身乃可委以親民刑獄之任是朝廷之士皆不可以無學也然則天子豈可以獨不知學乎太宗嘗謂近臣曰人君當澹然無欲形見於外則姦佞無自而入朕年老無他欲但喜讀書用鑒古今成敗耳眞宗之時益脩太宗之業仁宗在位四十二年問學未嘗少廢今邇英講讀乃仁祖之成規也英宗神宗皆遵守仁宗之法稽古好學陛下所知不幸先帝早棄四海累聖已成之業任大守重傳付陛下嗣位于今四年幸頼太皇太后以至仁盛德毋臨天下陛下垂拱無爲海内晏然當今之務莫如學問之爲急也陛下今日學與不學繫天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子皆欣慕願立於朝以直道事陛下輔助德業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取富貴而專權利矣君子專於爲義小人專於爲利君子之得位欲行其所學也小人之得位將濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召也凡人進學莫不在於年少之時陛下聖質日長龍德進升數年之後雖欲勤於學問恐不得如今日之專也臣竊爲陛下惜此日月願以學爲急則天下幸甚論語記聖人言行之要脩身治國之道無不在焉尚書言帝王政事人君之軌範也論語雖巳講畢望陛下更加詳熟尚書未講者亦望陛下先熟其文臣等以次講解及之則陛下聖意巳先有得矣臣不勝拳拳之愚元祐三年八月上時爲著作郎兼侍讀上哲宗論進學之時不可失梁燾臣聞自天子至於庶人皆以脩身爲本本亂而末治者未之有也故曰身脩而家齊家齊而國治國治而天下平古之聖人未有不以脩身而爲本者也書之稱堯曰克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍克明俊德者自明其德脩身之謂也九族既睦者家齊之謂也百姓昭明者國治之謂也恊和萬邦黎民於變時雍者天下和平之謂也其始則正心誠意而不出方寸之間其終則德業滂洋而徧滿天下是聖人之道所持者約而所致者廣也有天下者能知盡心致力於此而後可以奉天享國矣夫明德者孰先而能焉必曰學而巳矣禮曰大學之道在明明德謂人君有清明之德必由學以發之然後能光被四表格于上下以此知雖天子之尊而能成聖者其必由學乎說命曰王人求多聞時惟建事學于古訓乃有獲葢事不稽古從政則迷是君人者不可以無學也又曰惟學遜志務時敏厥修乃來允懐于兹道積于厥躬葢學之在身非一日而致由積善以成之是學之時不可以失也恭惟皇帝陛下受天明命早有萬國日就月將學以成聖此其時也願擇吉日詔開經筵優接勸講進讀之臣使從容反復治亂之事究先王之藴辨歴代之蹟無惜聖問再三詢考使聖心曉然無疑日新一日可底大成願加聖意無忽臣又願陛下萬機之暇留思經筵講讀羣臣所論之事以考政事之從違得失以裨皇帝陛下之聰明屏逺聲色造次不忘古訓博厚髙明與天地並德臣不勝拳拳懇切之至元祐五年上時爲御史中丞上宣仁皇后論皇帝進學之時梁燾臣恭惟陛下以大公至正之心保護皇帝周宻嚴謹委曲纎悉起居寢食之間無不留神而注意如天地乆於其道無一日之或怠也誠有大功於宗社有大德於天下矣陛下鍾愛皇帝如此其至然而特爲其愛之小者非所謂大愛也所謂大愛者在成其聖德爾成聖德者其必由學也仰惟陛下之聰明非不知其大愛之以成德而獨以爲皇帝沖眇而未暇學乎今皇帝聖年十五齒亦已長矣自古人君逺則十五而冠冠者謂有成人之道在庻人則爲童子在天子則爲成人何也謂王教之本不可以童子之道理焉故必責善而進之以成人是以古之學者十五入大學謂七八之數隂陽備而志明可以學矣志已明則當識其至善而逺其所不善故孔子曰吾十有五而志於學皇帝清明在躬天禀英異以聖人志學之時稽焉則不可以不學也以天子成人之道望焉則不可以多暇也伏願陛下當天春布德之元王正授政之始面勉皇帝早開經筵召見儒臣談經讀史從容賜對熟復古今宫中遴選茂俊之人以誘掖講說審擇謹厚之人以輔視興寢服勤道義爲聰明睿知之德踈逺紛華爲康寧壽考之資習之既乆乃如自然至若誠意喜書正心樂道終副海内聖神之望不貽宸𠂻宵旰之憂協成静治爲太平之眞主焉然則陛下他日退託深宫還辟自處保䕶之慈有始有卒佑我大宋萬世無疆之休而功德於此足矣誠清𠂻素所屬念者臣敢妄論以發之亦惟陛下亟行而無疑非獨臣之願乃天下之願非獨臣之幸乃天下之幸臣不勝惓惓元祐五年上時為御史中丞上哲宗論人主盡道在脩身脩身在正學彭汝礪臣聞之孟子曰欲爲君盡君道欲爲臣盡臣道二者皆法堯舜而已堯舜之治至矣上達日月星辰旁施草木蟲魚幽格鬼神外薄四海逺及于萬世其原則脩身而已書曰克明俊德以親九族九族既睦平章百姓百姓昭明恊和萬邦黎民於變時雍其本末施設次序可謂彰明較著而自漢迄唐千數百年有爲者衆而終不能窺其髣髴非聖人所爲終不可及葢後世爲之不至而已以區區千里之齊其君葢不過中人孟子之爲臣非其道不陳於前故其言曰不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孟子欺乎哉脩身無他在乎學而已大學之道始於誠意正心終於治天下葢古人以天下爲不可勝治故所治者一國而巳以一國爲不可勝治故所治者一家而已以一家爲不可勝治故所治者一身而已又以一身爲不可勝治故所治者一心而已心正故身正身正故無所不正此其守甚約而其施甚博其源甚近而其流甚逺其事甚難而其理甚易然心至㣲者也至危者也古人譬之槃水焉正錯勿動湛濁在下而清明在上則足以見須眉而察理矣㣲風過之湛濁動乎下清明亂乎上則不足以得夫形之正也心亦如是矣至虚而能受至神而甚察茍有蔽之則有不能别黒白矣蔽欺之言入則是非有不得其正私比之言入則喜怒有不得其正功利之言入則取與有不得其正便佞之言入則好惡有不得其正此學之大戒也恭惟陛下聖學所得固自拔於世俗之表惟加之意而已敷求碩徳以侑勸講容納正言以聞過闕思之至于謹辨之至于明問之至于博積之以漸要之以乆持之以不倦行之至于不已其本正矣事至而不惑物來而能名回環而觀惟陛下所欲爲而巳二帝三王之盛葢可跂而至也詩云俾爾彌爾性似先公酋矣性人所有也葢有不能充而成之者又曰學有緝熈于光明光明性所有也緝之熈之在學而已書曰學于古訓乃有獲葢學莫如師古又曰念終始典于學言學之不可一日巳也臣愚亡識惟陛下幸察汝礪元祐中上此疏而年月未詳上哲宗論黄帝堯舜養生禔身之道范百禄臣伏以陛下留心大學之道日就月將淵源精微積善成聖以至於髙明光大無所不通此乃宗廟社稷之休天地元元之福而太皇太后豐功盛德也臣千載之遇實與四方生靈同兹慶幸然臣區區管窺猶願有所獻焉者誠以爲聖主之學詩書禮樂之大道德仁義之實與夫一祖五宗之典法謨訓英謀睿烈既日陳於前而飫聞於上然猶有不可一日而離者葢又有黄帝堯舜之道存焉人主欲尊其慕尚必行三聖人之道儻未知師三聖人之所以養生禔身以永保天下生民之福以長固國家無窮之休則何以致行三聖人之遺心餘迹也哉凡三聖人所以養生禔身之要布在方冊詩書周易傳記百家燦然備載皆可參考臣願詔經筵講讀官討論採掇自古黄帝堯舜以來帝王養生禔身可法之言可行之事於雙日所進故實内時以一二上資聖覽或意義有所未顯亦宜雍容敷繹以聞願陛下觀其所以致福壽康寧之術取法而行之覽其反此而致不善者規警而戒之孔子曰少之時血氣未定戒之在色易頥之象曰君子以謹言語節飲食言語猶節而况其餘乎臣戇愚匹夫之慮不足爲陛下至計方出守外郡逺去闕庭臣子之心不勝悃愊伏惟留神省察元祐八年上時出知河中府上徽宗論帝王爲學之本鄒浩臣竊觀自昔才智之君固有務學以爲先者然而學非其本失所以學終不足以成帝王之髙致記曰欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物此學之本也又曰物格而後知至知至而後意誠意誠而後心正心正而後身脩身脩而後家齊家齊而後國治國治而後天下平此所學之效也揚子曰學之爲王者事其已乆矣堯舜禹湯文武汲汲夫堯舜禹湯文武皆萬世所仰以爲帝王之師者也尚汲汲於學而不敢怠爲人君者其可以忽此乎恭惟陛下天資聖神羣臣莫及方且延納名儒入侍講讀招來讜論用廣聰明固已卓然知所務矣所以爲學之本更望深賜察焉雖處宫闈之間常若對乎天地則知人安民自如帝堯能察邇言自如帝舜身爲法度自如大禹不邇聲色自如成湯卑服即康功田功自如文王垂拱而天下治自如武王其事豈不至約而其功豈不博乎陛下不以臣愚而廢其言不勝幸甚元符三年上時爲右正言上徽宗論治天下在好學廣問上官均臣聞人主之治天下一日萬幾不可勝察也而明君操術葢有至要可以不勞而治葢好學則知天人之道通古今之變好問則察羣臣之情達天下之政通古今而達事情物理豈有不燭注措豈有不善哉說命曰念終始典于學揚雄曰學之爲王者事其已乆矣此言人主之不可不好學也仲尼稱舜曰舜好問而好察邇言孟軻稱舜曰大舜善與人同樂取諸人以爲善仲虺之告湯曰好問則裕自用則小此言人主之不可不廣問也然而人主之學異乎人臣之學何則人臣之學或以文詞爲工或以博記爲能以文詞爲工則有不適用之患以博記爲能則有不燭理之蔽非所謂善學也人主之學在乎簡而知要達而適用知要在乎明道明道在乎味五經之㣲言適用在乎逺觀前世治亂盛衰之迹而近稽祖宗聖明相繼治天下之意因已然之迹而考其理亂因理亂而鍳其所以得失可謂知要而適用矣此人主之好學所以爲先務也天下之政有利有害百官之衆有邪有正非廣問而叅稽之則利害未易見邪正未易明利害未盡見則事或過舉邪正未盡明則姦佞之徒或乗間而害正此人主之好問所以爲政要也臣竊觀陛下寛仁而有斷中正而不偏清浄而寡欲温恭而盡下可謂有上聖之資矣臣願陛下退朝燕閒觀經閲史以明理義之大致達治亂之大體因進對之臣虚心下問以考政事之得失觀羣臣之志趣如此則天下之義理臣下之邪正判如白黒之辨矣臯陶之告舜曰在知人在安民禹曰知人則哲能官人安民則惠黎民懐之燭義理而辨邪正則能官人能安民矣堯舜之治天下不過於此矣建中靖國元年上時為給事中上欽宗論聖學以正心爲要胡安國臣聞明君以務學爲急聖學以正心爲要心者事物之宗正心者揆事宰物之權也自王迹既熄微旨載于六經時君雖或誦說得其傳者寡矣陛下心原澄静聖度虛明葢天祐大宋篤生眞主使撥亂反正建中興之業也臣竊意陛下昔在東宫潜德韜晦其於六經所載帝王制世御俗之大略必有所避而不欲問官屬之司勸講者必有所隱而不及陳今正位宸極日月葢已乆矣而成效未見其於古訓不可以不考若夫分章析句牽制文義無益於心術者非帝王之學也伏願陛下選擇名儒博通經術明於治國平天下之本者虚懐訪問以深發獨智繼文王克厥宅心之道以馭四海實天下大幸臣愚智識膚淺等於芻蕘惟陛下裁察靖康元年上時爲起居郎宋名臣奏議巻五
