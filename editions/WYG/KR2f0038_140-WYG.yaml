body:
  text: 宋名臣奏議巻一百四十宋趙汝愚編邊防門遼夏十二上哲宗論弃地非便上官均臣切聞春秋傳曰徳以柔中國刑以威四夷是知先王之治天下其待中國與四夷其道固異何則夷狄天性桀驁恃遠負險中國弱則先叛彊則後服專以恩養則倔彊難制其勢使然也臣切觀自陛下臨御以來懲前日邊臣拓地邀賞之弊而大臣采宋璟不賞邊功之說務以息兵養民為事德意可謂至渥矣然自朝廷納西夏貢使復與嵗賜恩禮不為不厚而戎人驕恣傲然無懷服之意遣使請地邀求無已乃知非恩之不至待之不勤其弊在於姑息之太過耳臣聞威過則怨恩過則驕怨則懷必死之心驕則有無厭之求昔先王之御夷狄知威之不可獨立故假惠以濟威知惠之不可獨行故須威以行惠然後夷狄且懷且畏無怨望輕侮之心今戎敵之情驕傲已見大臣務以息兵省事為意前日遽弃㳂邊四寨以塞其請而戎心無厭邀請益甚不知大臣為陛下計將與之乎將拒之乎與之則地日蹙而威日削適足増其虎狼之氣終不能使之屈懾柔服以聽命令漢鼂錯明於邊事嘗曰來而不能困使得氣去後未易服也又遺以土地以驕其氣乎臣聞兵以誅驕暴驕暴去則無所用兵政以治事事息則無所用政驕暴未去而遽寢兵事未治而欲無事是為畏事茍安之計其極必至於用兵多事勞弊内外而後已昔漢因循以成七國之禍唐厭兵以成藩鎮之彊此前事已然之驗也戎夷之情臣雖不知邊鄙之事臣雖未嘗習然士大夫自塞徼守官罷歸京師者訪聞非一皆如臣言又以古驗今戎敵之情宜不相遠故臣敢為陛下反覆陳之臣願陛下詔敕大臣虚懷訪問塞上罷官與知邊事之臣參伍稽考當得其實則羌人萬里之情可以坐見矣臣聞練兵選將積粟三者禦邊之急務厚賞重禄勸士之要術朝廷嘗敕邊郡為五年之蓄不知今日之積其數幾何不可以不預計矣夫犯彊敵冒白刃士卒不顧死者利厚賞也前日薄首級之賞務以息邀功之士而不知非厚賞不足以使衆此不可以不講也伏願陛下詔諭大臣簡略細務留意安邊大計却羌戎無厭之求講練兵選將積粟厚賞之術遣知邊事可信之臣按察塞徼以詳守禦得失之實儲蓄卒伍之數明誡邊吏以朝廷之意羌虜柔服則治兵積粟以備之桀驁侵軼則邀擊前後以挫之退不得畏縮以驕其氣進不得興兵以費吾財張大天威赫然示戎狄不可侵犯之意則士氣日奮戎心日消四夷無侵陵之患中國有泰山之安矣夫先患而謀則有餘後事而計則無及此天下大計惟陛下留神蚤加詳擇貼黃臣切聞西夏見今所爭蘭州塞地皆控扼戎馬要路若茍容目前無事全不計校輕以付與中外之議深恐戎人𢷬虚長驅煕河數郡孤立難守為害非細臣切意大臣之計務欲安靜無事故曲從其意若異時戎心無厭繼欲請熙河故地不知何詞以拒之臣訪聞㳂邊得替官員皆以為敵人之情驕則愈橫今以旁塞要地付與徒自去其藩扞長敵人彊悍之勢如傅虎以翼借冦以兵不唯無益適足為患為今之計不若治兵積穀選將厚賞畫地而勿與尺寸使戎心曉然知朝廷之意中國之彊不敢輕犯願陛下詢訪執政大臣今以塞地與之不知果能使西夏懷惠無異日之患否不可必則是徒失險阻為乆遠之累如夏人以故地疆界為言則邊將盍荅以靈州亦朝廷故土西夏若還靈州中國亦償以故土如此亦足以折其無厭之情兹邊陲安危之計宜博訪審慮庶無後悔貼黃臣愚所言非欲興兵生事蓋西戎驕倨請求無厭若不講飭邊備折其貪冒之意其勢必至侵犯塞郡勞師費用困弊中國伏乞陛下詔諭大臣以消未然之患元祐五年六月上時為殿中侍御史上哲宗論息兵失於欲速范純粹臣伏見熙延兩路與夏國所劃封疆至今未決外議謂朝廷務在息兵失於欲速故狂冦要索日益滋彰雖聖朝懷來四夷固為上策若邊臣不究利害但務委隨則國體事機不無虧失何以言之自二聖臨御之始夏人來朝繼而秉常訃哀乾順嗣立使者往返五六賈販貿易隨已豐富雖修好甚恭蓋亦為自資之計耳在朝廷固宜開納容彼自新然於處畫土疆未經決議當徐觀向背以察姦謀而朝廷即遣使人往加封冊欲速之意為賊所窺果致侮慢使人不即稱謝起兵入冦延渭被殘反覆不恭宜在誅絶後日復有所請但可一委邊臣與之要約示以閑暇使望望焉唯恐朝廷之拒而不納也則輕重之權豈不在我乎所謂要約者凡疆界之地與夫後日之可慮者皆當條畫具盡必使異日莫得而變也事既審決邊臣始以謝罪請盟之狀聞于朝廷然後明詔中外貸其既往之罪聽其乞盟之請歸吾陷賊之人賜汝既許之地如是則朝廷之體豈不甚尊而制冦之策豈不甚簡歟昨不為此計而聞其有請即許造朝此又欲速之意為賊所窺者也使人既至朝廷凡朝夕議論往復酬對寜不知皆廟堂謀臣之言乎是顧接太重而許可太輕此又欲速之意為賊所窺者也朝廷既許以陷虜之衆易新造之壘人有品色多寡之異地有形勢遠邇之差約當素明謀當素定必皆著見于書然後受人割地兩相付與而彼尚何能為乎今謀不素定約不素明彼以疲殘百餘人塞命而已我乃不復較問亟以四壘付之則彼計固已行矣聞四壘付之即已平徹而熙延二境始議畫疆固不晚乎欲速至是其理固然外議但見朝廷旌賞邊臣竊意朝廷謂事已平無足慮者豈以其目今貢奉不爽謂其無事乎彼貢奉不爽者是復為賈販計耳恐不足恃也前日事之已然者固不可追今日事之可為者若審計而徐圖之未晚也如聞夏賊於塞門金城之地重有邀求之請聲言與西隣為合從之謀將以動我外議恐朝廷不以為重而輕弃之信如是則欲速亦已甚矣朝廷所以謂金城塞門為不可弃者非以兩孤壘之為利也謂其形勢險阻足以藩籬邊徼土田沃壤足以贍給邊兵也利害所係它壘莫比故獨不在給賜之限今畫疆之議乃欲茍目前之小休弃形勢之要地舍數千戸已耕之土斷數百里斥堠之衝屏蔽無餘出門遇敵道路梗塞運餉難虞孤壘僅存我將安用譬猶欲保一身而捐去四體是大不可也然則前日詔旨所不予之地徒虚名耳且彼之所求我必與之臣不知真足以厭其所欲而不為他日之患乎失要害之地濟無厭之求虧國體勢墮賊計謀養虎開端不可不謹臣伏思邊隅設警迨今十有餘年不為不乆也朝廷不惜十年之費不憚十年之勞而務為堅守者何哉為形勢人民惜也今日之議信如所傳是能乆而不能近也前日諸路大舉雖覆巢之計尚能為之今安以待敵而屑就如此是能大而不能小也能大而不能小能乆而不能近弃前功於垂成開後艱於不測臣切為朝廷惜之臣願朝廷舍其淺近計於乆長其所取予並以元降詔書從事如其偃蹇置而不問但飭邊吏嚴備如昔希功造事則固所不可䕶邊待敵則宜無甚難以區區内亂之小羌尚能與中國乆抗乎期以嵗年決可竟事在朝廷不惑而已臣聞自陜以西議者靡不知此而莫有為朝廷言者是亦以出位為誡耳雖朝廷前此議論邊事專委鄜延它路邊臣無得干預而臣任忝帥寄職在論思今以所得衆人之論妄進狂說則亦未為出位也伏惟聖心採擇不勝大幸元祐五年七月上時為環慶路安撫使上哲宗論地界蘇轍臣前後四次論熙河處置邊事乖方乞移范育种誼差遣至今未蒙施行然臣前論止言見在措置之非未及已往根本之失若黙而不言切恐聖明尚有未燭再三煩瀆罪合萬死臣切觀朝廷指揮方夏人猖狂冦鈔未已則務行姑息恐失其心及夏人恭順朝貢以時則多行邀求茍欲自利以此凡所與奪多失其宜何者元祐三年朝廷遣使往賜策命而夏人公然桀傲不遣謝使再遣兵馬蹂踐涇原朝廷方務遵養不復誅討於四年始復遣使奏乞以所賜四寨易塞門蘭州朝廷雖不聽其所乞然即為改易前詔不俟分畫地界先以嵗賜予之仍令穆衍以三省樞密院意旨開喻來使及言所納永樂陷没人口既經隔嵗月或與元數不同並許據數交割及所立界至雖有自來遠近體例或山斜不等不許邊臣固執爭占凡此三事皆夏人奏請之所不及而朝廷迎以與之者也鄜延路乞依夏人所請用綏州舊例以二十里為界十里之間量築堡鋪十里之外並為荒閑近黃河者仍以河為界朝廷一一聽之臣切見先朝分畫綏州之日界至遠近責令帥臣相度保明往反審覆乃從其說今所畫界首起鄜延經涉環慶涇原熙河四路朝廷更不委逐路審覆即以延安一路所見便利指喻夏人號令一布無由復反至今夏人執以為據此則臣所謂朝廷方夏人猖狂冦鈔未已則務行姑息恐失其心者也至於熙蘭所請欲以蘭州黃河之北二十里為界臣切謂過河守把勢已艱難侵占蕃地理尤不可仰料朝旨必不敢依唯所言定西通西通渭等城外弓箭手耕種地遠者七八十里近者三四十里不可以二十里為界邊臣雖為此說然議者或謂蘭州每遣弓箭手耕種此地輒為夏人所殺若言已耕者則弓箭手必有名籍所得租課嵗入幾何二說相違理難遙度要須以此先與夏人商議各從逐路之便不可以二十里一概許之朝廷既失先事籌量及號令已行乃欲追悔先後皆失遂生厲階而熙河帥臣與其將佐乃敢不候朝旨於元請之外修星舒智古二寨二寨既於元豐五年廢罷具載九域圖志見今無使臣兵馬住坐而妄謂夏人舊繫守把朝廷從而助之以九域圖志為差誤以吏部見差管幹二寨弓箭手道路巡檢使臣為守把臣謂茍以此誑惑中朝士人可耳若欲以此塞夏人之口而伏其心恐未可也此則臣所謂朝廷方夏人恭順朝貢以時多方邀求茍欲自利者也然臣切妄料朝廷之意星舒智古二寨必難再修定西通西通渭三寨二十里以上界至亦無以取必於夏國蓋朝廷嵗賜既於無事之時空以與人及此緩急無以為重所謂差之毫釐繆以千里也然則地界之事要必相持不決遇有朝貢使介復來秋冬之交賊馬肥健時出冦略受侮夷狄何時已耶如臣愚見欲乞檢會前奏移降育誼置之它路别擇名將謹守大信且修邊備本路疆界之議實非見今守把者可推以與之以信前約其他則令推公心各具長乆計條列聞奏然後朝廷擇而行之則煕河尚可得而安也今臣觀朝廷初無定議方熙河邊釁之作也急召帥臣寘之戸部及臣言賞罰失當則急復遣育還帥熙河至如种朴本與育誼共造邊隙今乃移朴涇原獨留育誼若以召育為是則今遣之為非矣若以移朴為當則獨留育誼為失矣政令如此終安適從徒遣孫路穆衍之流往彼相度朝廷大計豈可取決衍等之口萬一敗事雖戮衍等何補於國臣前上言唐李徳裕議討劉稹同列有異議者徳裕請曰有如不利臣請以死塞責今中外皆謂守信固盟中國之利若大臣有欲專任育等不顧邊患者臣願陛下以徳裕之請要之若能如此即用其計事定之後案行賞罰今臣言巳竭勢不能回不審陛下嘗以臣前說要之否邊事至重安危未可知唯陛下留神而已臣以孤忠誤蒙拔擢不敢不盡所懷以孤任使然觸犯者衆死有餘責元祐五年八月上時為御史中丞上哲宗論不可失信夏人蘇轍臣聞善為國者貴義而不尚功貴信而不求利非不欲功利也以為弃義與信雖一快於目前而嵗月之後其害將有不可勝言者矣昔晉文公圍原命三日之糧原不降命去之諜者曰原将降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇民所亡滋多退而原降晉荀呉圍鼓鼓人或請以城叛呉弗許左右曰師徒不勤而可以獲城何故弗為呉曰吾聞諸叔向好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉使鼓人殺叛人而繕守備三月鼓人請降使其民見曰猶有食色姑脩而城軍吏曰獲城而弗取勤民而頓兵何以事君呉曰吾以事君也獲一邑而教民怠將焉用邑鼓人告食竭力盡而後取之克鼓而反不戮一人以世俗言之此二人者可謂踈於事情而怠於功利矣然要其終文公以霸天下荀呉以强晉國則信義之効見於乆遠如此臣切觀朝廷之所以御西夏者可謂異矣方元祐三年既受冊命不肯入謝再以大兵蹂踐涇原大臣畏之明年遣使請以所許四寨易蘭州塞門朝廷雖不許大臣務行姑息不俟其請而以嵗賜等事許之一嵗所賜凡二十萬夏人仰以為命雖以一嵗之入易蘭州塞門可也而奈何與之蓋自失嵗賜以來朝廷蕩然無復可以要結夏人者然此既往之事臣不復追咎矣頃者夏人既得嵗賜始議地界朝旨許以見今州城堡寨依綏徳城例以二十里為界十里外量置堡鋪其餘十里為兩不耕地約束既定大臣中悔又欲堡寨相照取直議猶未定而熙河將佐范育种誼欲於見今城堡之外更占智古星舒二堡大臣僥倖拓地之功不以育等為非從而助之尋為夏人所破所殺兵民皆不敢以實聞繼修城門再被焚毁其事至今未定然夏人迫於内患不敢堅抗朝命許以照直為界其言猶未絶口而大臣又悔欲以堡鋪之外對留十里通前共計三十里此命既出有識之士以為失信太甚非中國之體若使邊臣稍知義理必不忍自出反覆之言以彰不信幸而夏人終以内患未解不欲違拒黽勉從之十里之地得之不足為强失之不足為弱雖小人以為得計而君子謂之失策何者要約未定今嵗已添屯重兵前後十將有餘十將之衆凡五萬人使五萬人西食貴粟其費已不貲而夏人順否又未可必雖復暫順要之乆遠不信朝廷為患何所不至然此亦既往之事臣復何言哉臣之所憂但恐大臣狃於小利睥睨夏國便利田地貪求不已訪聞近遣穆衍與邊臣計議既欲取智古星舒兩城一帶良田凡數十里又欲與秦鳯路隴諾城與熙河路定西城照直地僅一百里規畫極大聞者驚愕若此謀復作夏人不堪其忿竊出作過我曲彼直何以禦之且先朝用兵所得四寨朝廷猶務息民弃而不惜况於其餘何足計較在兵法有之曰有其有者安貪人有者殘又曰利人土地寳貨者謂之貪兵貪兵者破今之所為正犯此禁臣切怪大臣皆一時儒者而皆弃所學貪求茍得為國生事一至於此外人皆言前後計畫皆出种誼誼本小人安知大慮而舉朝廷以從之乎要之不出數年此患必見患至而後言言雖易信而已無及矣伏乞陛下以社稷生民為念斷之於心止其妄作則天下幸甚貼黃添屯數目臣見陜西轉運使李南公言自元祐以來朝廷不起邊事凡自前邊臣欺罔殺略熟户計級受賞鹵掠財物私自潤入及邊民幸於擾攘買賤賣貴如此等事皆不得為故上下鼓唱願有邊釁凡此皆姦人自作身計非國之利也今星舒智古等處良田實西邊第一等膏腴豈我獨知以為利而夏人不知耶彼知愛之則不免於爭爭端一起則兵革不息此正墮邊臣之姦計矣臣訪聞夏國柄臣梁乙逋者内有簒國之心然其為人狡而多筭寛而得衆方欲内安豪酋外結朝廷竢内外無患然後徐簒取之所以朝廷近日打量地界前後要求反覆而乙逋一一聽從盖見議地界止於二三十里之間於彼國不繫利害故也今朝廷若見其易與因而别有大段求索使彼不能堪忍或至忿爭兵難一交必非朝廷所願至此而後返欲求和則所䘮多矣元祐五年十二月上時為御史中丞上徽宗論進築非便范純粹臣伏見陜西河東㳂邊諸路拓地深遠城守増多凡邊臣始議經營利害之實與夫朝廷處決之計臣固不得與聞而它路形勢之狀保明之計臣所未嘗親見者亦不敢輕議唯是河東一路臣忝領帥任雖止百有餘日而承乏鄜延亦既累月耳目聞見略已詳熟誠心所得義不蔽欺切惟兩路凋殘困於進築在公則所費金帛緡錢不知其幾千萬内外之力既已匱竭此朝廷固亦究見不待臣言而後知在私則大兵之後洊有凶年雖去嵗夏秋兩經豐穰而物價未甚減少如鄜延路新城堡砦今春糴買米斗猶有至一貫四百文者則一方艱食可以槩見春冬苦雪饑殍縱橫士卒疲羸鶉服過半其月得料錢不足充一飽之費民之窮弊從此可推唯是浮游贓貪之人欺天罔上盜竊名器大得所欲賤者既貴貧者既富閭閻小子略遂封侯之望而掉臂散去者又不知其幾千百人也所拓之地疆界遼絶由是封堠有去城砦一百五六十里去處必欲責巡捉人馬頻至境上則裹糧露宿曠日不返奔走疲弊衆情厭苦若欲休養士卒則新地之内無復人迹將士觀望不敢有言朝廷欲墾闢新疆毎路置提舉官招刺弓箭手以資兵備而所得多浮浪闕食之人唯幸借貸種糧牛具等錢而隨即逃亡臣在河東路勘會得一季之内逃亡至四分今至鄜延考究得提舉弓箭手官石杏所招人計六千九百五十一人内已逃亡過二千八十八人地未加闢而所失財用亦已多矣是未見得地之為利也鄜延一路前此頗以招納為事臣今契勘自紹聖三年後來計招到夏國人口共一萬一千五百餘人其中丁壯纔及三千自餘皆婦女老小之數並計日給食内已得班行名目人皆給料錢驛劵嵗費極廣錢粮浩博若謂可以分彼兵力則一國之衆豈以三千人為重輕若謂使可以致彼離叛則前後招納甚乆而未嘗小驗平日莫測心腹間輒叛去不唯出入之時決不敢保其為用而緩急之際内變可虞邊防機事靡不傳洩由是推之安知其非謀也哉是未見得人之為利也新地之内既有城堡之備莫非先計兵力今計鄜延一路新舊城砦二十七處合用守兵六萬三千然秖是依守禦之法計地步排立之人而出竒禦敵畨休固守者未在此數新壘守人既不可闕餘雖舊砦亦當足兵有如金明最是近裏廼者賊至屠戮無遺則知不問城堡之新舊舉不可乏人而後可以責其固守也自夏人納欵以來朝廷已將戍兵將吏十減六七今諸城堡砦守禦人數未及合用十分之四若將來稍有警急則兵備何以自全若萬一再遇凶年則嵗用何以取濟是城守之計為甚可憂也議者以謂夏人力屈情見既極恭順請命率職誠服不渝邊患封疆自此大定臣愚不善料敵未敢信然而日夜區區私憂國計何者在彼國勢恐尚惜諸路所取之地在人常情恐未忘積年所結之隙今雖修貢而未及疆議者良有以也乃養力待時聊以自欵耳蓋歲額賜予至于來朝商販所得甚厚而又諸路塞上博易公行度彼二三年間事定力全則必先以畫疆為請一語不契決復盜邊臣恐朝廷未可以今日之迹遂為奠枕之安虜情深狡為甚可憂也臣以謂開邊之初昔固神速善後之計今實艱為雖得地得人未見稍利而邊備實可寒心臣不敢茍無事於目前乃所願圖安於永乆若一路城守朝廷可以増足戍兵増戍之兵朝廷可以長足歲費則臣雖疲懦敢不竭心庶幾上遵廟謀聊可居職今守計不備而無兵可増縱有兵可增而財用方窘以此禦冦豈臣敢當它路事宜度不殊此措置宜先於機會豐凶難測於天時伏望聖慈曲賜軫惻内量國力外察邊情深詔大臣更為遠慮明降畫略以杜艱虞臣於神宗皇帝在御之時數陳兵議後於哲宗皇帝臨朝之日復論土疆或賜優容或因而坐廢有干典憲實出狂愚今者再被使令未忍便為緘嘿不唯身任憂責况復職在論思雖置散投閑固重覆車之戒而納忠叙事詎忘體國之心建中靖國元年五月上時以龍圖閣學士知延安府尋移知永興軍十月坐朝廷方選將治邊而不能飭兵務穀克謹邊備數於奏章有沮壞之議落職知金州上徽宗論進築非便張舜民臣伏以陜西河東自紹聖二年用兵至今首尾六年進築未畢覆軍殺將縻費錢糧不可勝紀每築一城自帥臣已下増秩賜金號為賞功竊按春秋之法凡稱城者謂既得其土地人民然後城之以宅人民耳今則輕師潛入三五十里以至百里乘敵人未覺之時數日之間茍脩草創亟聞朝廷盜取功賞然自城門之外依然賊境以一徑内通晝日挾兵張弓非百十人不敢行是真謂之城乎其初帥司制置經畫每一寨屯三千人守禦計置糧草厚破公使以來吏民不旬月間人兵復抽去草糧未盡計置公使亦遂裁減其已居官吏人民日夕憂恐不成家計亦有修築逾年至今未有人居止者其兵將吏民彼此相諭本不為修築開邊止為沽將帥之賞而已以致工作苦窳守禦繆悠若夏人一來不攻自破此皆邊人之語也朝廷髙遠詭冒百端上下相䝉以致如此昨元豐年五路出界既而回軍神宗皇帝欲自涇原路胡盧河川築十五堡以通靈州以其功賞浩大尋亦罷之五路入界所降御前劄子畫一指揮第一不得修築城寨深慮邊臣幸賞也李憲築蘭州雖不按法然勘劾逾時終亦不賞范育帥熈河築定逺城用錢糧五十七萬當時言者以為百萬論列紛紜二年不已今既河東陜西六路進築五十餘城亦何止涇原十五堡也其一寨之費何止定遠百萬耶又自軍興已來闗中嵗饑流亡莩餓十室九空鹽池之利居天下之半一旦失之夫以軍事方興值累年災歉而又失大利天意可見也故天時不如地利地利不如人和今三者皆不得其一而堅以罷將御老師役饑民争曠土而不變者未之有也煕寜中李復圭帥環慶因出軍散鞋錢以其半尅還舊欠衆兵喧呼潰叛而出闗中騷然者逾時不能定今則六年妄作曽無一人譁語此廟社之靈也毎一思之使人不寒而慄用是廟堂之上日進諛言蔽哲宗皇帝聰明以謂夏人之勢至衰至削中國六路進築而無敢有抗晏然自得不復計慮此尤可憂者也臣且以近事明之紹聖三年秋九月夏人大舉冦鄜延號一百八十萬破金明圍延安陵轢諸寨種落為之一空至四年便為衰弱不能舉豈今年一百八十萬而明年徑至衰弱如此者乎雖甚愚之人亦知之廟堂執政大臣亦知之姑為此說專欲蔽上之聰明也大抵夏人用兵皆本元昊之法先謀而後戰吝嗇財用愛惜人命與中國政相反中國六路進築天下困弊夏人坐觀不遺一鏃臣敢望陛下止以此觀之不問可知矣夏人謀深不同中國彼一旦謀成力辦揺尾南鄉凡新築之城創開之地未有能不失者臣未死可以服妄言之刑矣願陛下以三年待之河東之人自古不曽流移以其勤儉為生少經力役今則流徙太半長安陜華米斗一千鄜延麥麫一秤二貫三百皆足陌也自西京以封樁錢糴米運至鄜延每石為錢二十貫有畸古先有是乎闗中之民十無四五以今日之勢而猶貪無用之空土非賣國而何故臣今日之說敢望陛下速罷兵養士懷民也不然將有變矣不易帥不能罷兵不乆任漕司不能養士五年罷兵十年懷民恐瘡痕猶未合也古之善兵者其君莫如漢光武其臣莫如唐李光弼光武每發兵必増白鬚數莖光弼每臨陣常置短刀靴中人或問之光弼曰吾天子三公不可辱於賊手萬一敗北則當自裁也以光武光弼之飽戰知兵獨如此之難是何江湖書生足未嘗履邊塞目未嘗見兵革耳未嘗聞金鼓一旦輕率緫戎容易取敗貽憂君父殘害生靈曾不至於自焚者前所謂廟社之靈也紹聖三年秋臣赴任知潭州登對故嘗析陳於哲宗皇帝之前因及神宗皇帝感疾之由天顔顰蹙乆之屢蒙歎韙然當是時猶未至於如此其後卒不見施行為左右大臣所蔽也故善御者毋使窮其力善牧者毋使擾其羣力窮則車敗馬傷羣擾則瞻前失後靜思至此雖有智者不能善也方今天下之事大且急者無甚於此伏望留神三復考驗施行建中靖國元年上時為吏部侍郎上徽宗論河北備邊五事張舜民臣猥以衰疾繆塵聖選使待罪邊陲平時責任固已非輕况當遼人新舊之交河朔累年饑流之後使遼人盟好如昔無致渝變更不復論儻使有毫髪好惡不同前日便貽中國深憂以臣觀之今日河朔之勢正如陜西寳元康定之前將不知兵兵不知戰一旦倉卒不可枝梧邊臣若預為振舉則謂之張皇而朝廷亦自不容若依舊宴安號為無事則綱目日見頽廢有不勝舉之憂故凡議河朔之政者以今日為最難此臣所以不敢緘黙必為陛下陳之也其當急務者略有數端故曰選將兵擇郡守添兵額蓄財用謹探報數事修立則邊備之術已過半矣茍行之得策亦無張皇生事之患今臣輒有所請敢望陛下留神省覽特賜主張應副則事無不集若委之有司援條沮難則無復機事矣謹别具開析奏陳選將兵凡言河北軍事者必曰將驕卒惰將不知兵兵不知戰此上下所同知也或者欲為之整齊訓練之則必曰河北軍情不同也稍急則生變此中外所共患也又為將者多是膏粱子弟畏河東陜西不敢往盡欲來河北百年之間未嘗知有烽火之警雖有出屯不離本路唯是優游暇日安得不驕且惰也近日朝廷將河北將兵遣戍陜西甚得均勞之䇿臣欲乞陛下特賜指揮將河北將兵輪那出戍河東陜西却將東西京將兵專戍河北以補河北將兵出戍之闕仍比之他將少促代期所貴平時則知有道塗往還之勞緩急則知有出入戰陣之事擇郡守勘會河北㳂邊州軍自兩地講好以來迨今百年雖號為邊郡不知有戰陣守禦之事唯是飲食宴樂優游暇日而已以此凡智古公平竒特之士莫得而居之以至城壘器械凡所謂軍中之職不復講脩相習宴安乆已成俗臣伏乞陛下特賜指揮將河北㳂邊知軍州及將副選擇脚色内曽經三路㳂邊城寨將佐及累有戰功内知州軍曽實歴路分都監資序人充仍舉行自通和以來河北㳂邊知州軍條貫所貴緩急之際不致誤事添兵額本朝自南北通好已來定州路兵額常及十萬爾後日見銷耗至熙寜元豐以前定州猶不減二三萬人後因封樁禁軍闕額錢糧朝廷唯務封樁數多轉運司利於銷兵省費更不一切招填因致邊兵日少即今春秋大教盡數不及六七千人定州最為河北屯兵之處尚乃如此其它州軍即可知矣咫尺狄境聲迹相聞使形勢如此豈得安便皆由邊帥不思經乆利害憚於建明朝廷不復以緩急倉猝為慮定州馬步禁軍共三十一指揮近年每指揮減作四百人仍招填不足臣今乞將逐指揮人數却復舊額定州依乞元降朝㫖常令及二萬人仍乞於京東西路招刺添填專置官催促所貴稍遠北邊不致張皇蓄財用勘會河北累嵗災歉又以大河移徙生齒遷流民力凋弊公私乏絶臣訪聞本管定州即日人糧不至急闕唯是錢絹苦無見在堡寨以東糧食亦闕兼聞春衣至今有未曽支散去處定州一年約支錢二十二萬貫有零諸雜課利改錢祗得一十一萬有零其餘盡是轉運司添陪方了一年支計今轉運司那融不行屢曽千告朝廷已聞支撥見錢文鈔及借奉職等補牒河北州縣既屢經災歉流死公私乏絶豈有餘力買官至於見錢文鈔又專為愽買斛斗所以應用全闕定州一月諸般支使約萬緡軍資庫轉運司見錢秪有七百三十餘貫絹二百餘匹定武大藩猶且如此其餘列郡即可知矣咫尺北邊覘邏日交使知財力至此何以示威取重伏望陛下特賜指揮將給降見鈔如糧食足用處權許出賣見錢及諸州軍常平錢内借撥一二百萬貫赴轉運司應副急闕支用却責限歸還據今日窘急之勢儻朝廷不為講明救濟使人情窮濫緩急必致生事謹探報臣觀古之為將守邊第一必先覘邏茍得其術敵人之情可以坐制先人有奪人之功其此之謂也與夫戰攻而獲勝不可同日而語切聞河北邊上近年探事人徒有其名至於酬賞全然微薄以致覘邏之人不肯探伺既不知敵人情實則緩急何以枝梧况當新舊之交尤在精審訪聞即日安撫司所管回易本錢不多臣欲乞朝廷特降見錢文鈔一十萬貫添助回易如探伺得實則量添酬賞所貴激勸邊人虜情可得建中靖國元年上時除知定州上徽宗乞撫存北狄趙遹臣伏准今月十三日樞密院劄子奉御筆狄界為女真所侵兵勢瓦解切慮奔潰侵軼逼犯邊境仰河北諸路帥司依已降指揮團結兵馬編排器甲准備不測勾抽上邊使喚仍先具知委奏聞除已具知委及逐時探到北界事節次附入内内侍省逓奏聞去訖臣切詳北狄自澶淵既盟之後嵗省用兵之費國享重幣之利彼自知得計守盟修好皆其誠心然累年以來北酋失徳上下離叛人不為用女真勃海冦亂其國征伐不已敗衂相繼境土侵削士馬凋殘財力匱耗常疑中國密有窺伺左枝右梧困弊日甚恭惟陛下好生之徳深洽民心帝王之舉必度萬全况臣嘗親奉玉音屢被詔劄每念南北歡好力固祖宗盟誓謂非細事不可少有引惹造端生釁而彼殊不知聖神加惠兩國之意如此今兹睿㫖特慮他冦與奔潰之衆不測侵軼姑示備禦之計廟謨甚遠預為之防然臣叨承閫寄職所當言茍有管見豈敢緘黙伏覩邊報近者北酋獵於白水川女真掩其無備全軍陷没北酋不知存亡國中震擾未見所立若復調兵上邊彼將謂中國起乘其弊疑隙既開何可復釋唯當示之安靜致其懷服臣愚切謂耶律氏既有沙漠歴年甚多邊人習熟貴其種𩔖設有姦雄誰肯推服仰惟朝廷與酋兄弟之國共守盟好百有餘載今北酋叔兄子弟甚衆若北酋真遂不還願陛下用家人禮特遣重臣將命彼國推急難之義念外侮之虞慰諭其宗族臣下厚加拊勞勉以忠孝雪耻戡難就其北酋叔兄子弟取北酋之所愛國人之所慕擇賢立孤以主其衆隆其恩禮錫之封冊申結信誓以繼好息民俾之知戴中國遼既倚中國為重得存其宗社則中國有大造於遼也陛下雖不責報彼歸故地減嵗幣必有一以報陛下矣如是則中國不得汗馬之勞遺鏃之費萬無失一而安享大利機會之來間不容髪伏望聖慈特加採擇速奮睿斷施行實天下大幸貼黃臣愚切謂敵失其酋未知所立方疑中國乘間而攻之然陛下兼愛南北生靈務隆義好若即恤其禍難援立新酋當此孤遺乏助之時得倚朝廷以存其國名正言順勢無不從則恩歸于我必服彼心申固盟誓為利無窮若使彼新酋自立則恩非我出立而衆附則勢將復彊増戍縁邊過為隄備徒足生釁以啓戎心願陛下無遽増戍開先時之隙毋緩立孤貽不及時之悔孔子曰興滅國繼絶世天下之民歸心焉惟聖神亟啚之貼黃臣契勘女真蕞爾小夷自昔臣屬契丹勢不過遼之一大族其衆彊弱與遼不侔徒以北酋失徳乘其離心遂致以寡敵衆以弱凌彊者非女真之能皆遼所自取也然契丹大國其人素不畏女真女真今雖得志亦豈能乆橫行於北方哉遼之新酋既立得國人心事將反掌也陛下仁聖被於四海普天率土罔不臣妾若速於斯有以深結其心使之懷服自削其平日之貪傲今若止増戍之役收援立之恩敵以守盟存國之大義蠻貊革心固不難矣臣所謂用力少而見功多也宣和四年二月上時為真定府路安撫使宋名臣奏議巻一百四十
