body:
  text: 宋名臣奏議巻一百十二宋趙汝愚編財賦門新法四上神宗乞罷提舉常平倉官吏吕公著臣近兩具劄子言乞罷提舉常平廣惠倉官吏未䝉施行臣竊惟朝廷自頒行此法以來中外議者皆以為本非惠民實欲掊利人情憂懼物論沸騰朝廷以法令既行憚於改作直至取大臣所奏逐條疏駮巧為辨説敷告天下其餘中外官守或因有所論列或以不即奉行皆欲劾問專以朝廷之威杜塞衆口是以比日以來人情愈更不寧臣伏思陛下自即位之始慨然有大有為之志其規模固欲高視近古然今日所行纔一二末事頗已輕失人心縱使法意雖善其施設固亦未工况人無智愚皆以為不便伏望愽米公議盡罷諸路所遣提舉官委提刑或轉運司且於三兩路相度支散候見得於民無害則不獨此法可以推行其它處置皆足以取信於人若百姓終以為病朝廷亟為改之猶不至害及天下所有臣前奏伏乞檢㑹付外施行熙寧三年三月上時為御史中丞王安石讀公著奏于上前曰常平法何以致人情憂懼陛下即位以來詢采人言甚衆亦甞有言和買紬絹舊陜西青苖錢法害民否惟江西用鹽折和買絹錢即言者非一以此明青苖及和買不為百姓所苦今常平俵錢法取息皆薄於舊青苖和買其間防禦搔擾取人便利甚多何故乃至人情憂懼也又讀至取大臣奏疏逐條疏駁巧為辨説敷告天下上曰如此則韓琦安得不動心乎安石曰朝廷作有理之法令藩鎮逐條疏駁而執法乃不以為非方鎮作無理章奏朝廷諄諄曉諭而執法乃謂之巧為辨説即非理之政言事官當逐條辨論其非以開悟陛下之聰明可也今但言巧為辨説而不見辨説之不當則其情可見矣上神宗論新法蘇軾臣聞之益戒于禹曰任賢勿貳去邪勿疑仲虺言湯之徳曰用人惟已改過不吝秦穆䘮師于殽悔痛自誓孔子録之自古聰明豪傑之主如漢高帝唐太宗皆以受諌如流改過不憚號為秦漢以來百王之冠也孔子曰君子之過如日月之食焉過也人皆見之更也人皆仰之聖賢舉動明白正直不當如是耶所用之人有邪有正所作之事有是有非邪正兩言而足正則用之邪則去之是則行之非則止之此理甚明猶飢之必食渇之必飲豈有别生義理曲加粉飾而能欺天下哉書曰與治同道罔不興與亂同事罔不亡陛下自去歳以來所行新法皆不與治同道立條例司遣青苖使歛助役錢行均輸法四海騷動行路怨嗟自宰相以下皆知其非而不敢争臣愚惷不識忌諱廼者上疏論之詳矣而學術淺陋不足以感動聖明近者故相舊臣藩鎮侍從雜然争言不便以至臺諫二三人本其所與締交唱和表裏之人也然猶不免一言其非者豈非物議沸騰事勢迫切而不可止歟自非見利忘義居之不疑者孰肯終始膠固不自湔洗如蒲師孟乞免提舉胡宗愈不願檢詳如逃垢穢唯恐不脱人情畏惡一至於此近者中外讙言陛下已有悔悟意道路相慶如䝉大賚實望陛下於旬日之間渙發徳音洗蕩乖僻追還使者而罷條例司今者側聴所為蓋不過使監司體量抑配而已比之未悟所較㡬何此孟子所謂知兄臂之不可紾而姑勸以徐知鄰鷄之不可攘而月取其一帝王改過豈如是哉臣又聞陛下以為此法且可試之三路臣以為此法譬之醫者之用毒以人之死生試其未效之方三路之民豈非陛下赤子而可試以毒乎今日之政小用則小敗大用則大敗若力行而不已則亂亡隨之臣非敢過為危論以聳動陛下也自古存亡之所寄者四人而已一曰民二曰軍三曰吏四曰士此四人者一失其心足以生變今陛下一舉而兼犯之青苖助役之法成則農不安均輸之令出則商賈不行而民始憂矣併省諸軍迫逐老病至使戍兵之妻與士卒雜處其間貶殺軍人有同降配遷徙淮甸近若流放年近五十人人懷憂而軍始怨矣内則不敢謀於元臣侍從而專用新進小生外則不責成於守令監司而專用青苖使者多置閑局以擯老成而吏始解體矣陛下臨軒選士天下謂之龍飛榜而進士一人首削舊恩示不復用所削者一人而已然士莫不悵恨者以陛下有厭薄其徒之意也今議者又欲漸消進士純取明經雖未有成法而小人招權自以為功更相扇揺以謂必行而士始失望矣今進士半天下自二十以上便不能誦記注義為明經之學若法令一行則士皆懷廢棄之憂而人才長短終不在此昔秦禁挾書而諸生皆抱其業以歸勝廣相與出力而亡秦者豈有他哉亦以失業而亡所歸也故臣願陛下勿復言此民憂而軍怨吏解體而士失望禍亂之源有大於此者乎今未見也一旦有急則致命之士必寡矣方是之時不知希合茍容之徒能為陛下收板蕩止土崩乎去歳諸軍之始併也左右之人皆以士心樂併告陛下近者放停軍人李興告虎翼吏率錢行賂以求不併則士卒不樂可知矣夫謟諛之人茍務合意不憚欺罔者𩔖皆如此故凡言百姓樂請青苖錢出助役錢者皆不可信陛下以為青苖抑配果可禁乎不唯不可禁廼不當禁也何以言之若此錢放而不收則州縣官吏不免責罰若此錢果不抑配則願請之户後必難收索前有抑配之禁後有失陷之責為陛下官吏不亦難乎故臣以為既行青苖則不當禁抑配其勢然也人皆謂陛下聖明神武必能徙義修慝以致太平而近日之事乃有文過遂非之風此臣所以憤懣太息而不能巳也昔賈充用事天下憂恐而庾純任愷戮力排之及充出鎮秦凉忠臣義士莫不相慶屈指數日以望惟新之化而馮紞之徒更相告語曰賈公逺放吾等失勢矣於是相與獻謀而充復留則晉氏之亂成於此矣自古唯小人為難去何則去一人而其黨破壞是以為之計謀游説者衆也今天下賢者亦將以此觀陛下為進退之决或再失望則知㡬之士相率而逝矣豈皆如臣等輩偷安懷禄而不忍去哉猖狂不遜忤陛下多矣不敢復望寛恩俯伏引領以待誅殛熙寧三年三月上時為直史館開封府推官上神宗論新法范鎮臣伏以陛下以一人之尊而居天下士民之上所恃者綱紀也綱紀者上下之分而已今内則中書之政歸於條例司外則轉運提㸃刑獄及州縣之權奪於提舉常平廣惠倉司上下之分侵撓如此陛下之綱紀何恃乎且法者所以示信天下也陛下初詔云公家無所利其入今河北提舉司乃自第一等給錢有差皆令出三分利豈為公家無所利其入乎又云不願者不得抑配今上等人戸既令出息又令保任貧户豈不為抑配乎近詔諸路提㸃刑獄嚴加覺察又令開封府鞫問吕景諸路提㸃刑獄肯為陛下覺察乎法令如此而欲天下取信不可得也外議紛紛皆云自古以來未有天子而開課場者民雖至愚不可不畏伏乞檢臣前二奏罷青苗錢追還使者而歸農田水利差役於州縣以正綱紀以息民言而幸天下臣不勝區區之愚熙寧三年三月上時為翰林學士先是侯叔獻屢督提㸃開封府界縣鎮事吕景散青苗錢景以畿内諸縣各有屯兵毎歳課利錢僅能供諸軍請給無有贏餘條例司又別以買陜西鹽鈔錢十五萬貫為青苗錢景言府界人戸見倚閣貸糧五十餘萬石今又散青苖錢十五萬貫恐民力不能堪王安石怒令開封府鞫問吕景故鎮上此奏王安石曰鎮所言天子開課場若非陛下畧見周禮有此則豈得不以為愧恥前代人主幾人能以周禮决事此所以流俗之言常勝也然以周禮决事者學周公之次者也真學周公者仰觀天俯察地中考人事若於理可為則雖周公未嘗有此亦必為之此乃真學周公者也安石强辨飾姦大扺𩔖此上神宗論條例司畫一申明青苖事韓琦熈寧三年三月四日制置三司條例司言羣臣數言常平新法不便今畫一申明乞敕諸路安撫轉運提㸃刑獄提舉官曉諭所屬官吏使知法意一言者謂元敕云公家無所利其入今河北提舉官乃令取息三分失信於百姓本司今案周禮泉府之官乃云貸者取息有至二十而五凡國家之財用取具焉今常平新法豫給青苗錢但約熟時酌中物價熟時物貴即許量减市價納錢即是未定合納實數故河北約束州縣納錢不得過三分京西陜西等路大扺不過二分諸路所約惟河北最多然云不過三分即非定取三分之息若物價低平即有當納本色不取其息或止收一二分息時多少相補比周禮貸民取息立定分數巳不為多近又令預給價錢若遇物價極貴亦不得過三分既比周禮所取尤少於元條欲廣儲蓄量减時價指揮不相違戾固無失信之理又周禮國事財用取具於泉府之官賖貸之息今常平不領於三司専以振民乏絶比周公之法乃不以取具國事之財用故云公家無所利其入一言者謂上三等戸及城郭有物力戸即從來兼并之家今乃立定貫石許之貸借非抑兼并之意又河北毎保須上三等戸一人上等戸必不願請官吏既防貧戸不能送納豈免差充甲頭以備代陪又提舉官峻責州縣如民不願請即結罪申報若選官曉諭却願請即當別作行遣州縣官吏懼提舉官曉諭或須散配本司今案鄉村上三等城郭有物力戸亦有闕乏之時從人舉債豈皆是兼并之家今貸貧民有餘則以給此等戸免令就私家取一倍之息乃是元敇抑兼并之意河北毎保須上三等戸一人者蓋以檢防浮浪之人若有上戸肯保即非浮浪之人若無上戸肯保即不許支給何須更行散配若謂上三等戸必不願請須差作甲頭以抑勒違法今年開封諸縣甚有三等戸願請即非抑勒以近驗逺事理可知至於提舉司約束止関防因循避事壊法之人非廹脅須令抑配若提舉官或急於求利諷州縣抑配即諸路有安撫轉運提㸃刑獄其為朝廷委任皆在提舉官之上若有州縣官員故欲隳壊新法或曲徇提舉官意㫖抑勒百姓當糾舉依法施行及具事狀聞奏豈宜以官吏違法之故遂欲廢法一言者謂百姓各有本戸稅賦及豫買綢絹又加此一重豫給青苗錢則人戸不易本司今案百姓稅賦之外逐路承例科斂名目誠多然當闕乏時不免私家舉債出息常至一倍此所以貧者愈困也今貸與常平本錢廼齊其艱急又令約熟時斛斗物價貴賤然後令納見錢比元本不得過二分是免於兼并之家舉一倍息民戸有何不易一言者謂但躬行莭儉常莭浮費自然國用不乏何必使興利之臣四出以致逺近之疑本司今案先王之政未嘗不以食貨為始張官置吏大抵多為農事也近世以來農人尤為困苦朝廷但有徭役加之初無嵗時備助至有非泛用度或不免就上等戸强借錢物百姓典賣田産以供暴令今置提舉常平廣惠倉官兼管當農田水利差役事者凡以此而已固非使之朘削百姓以佐人主私費豈得謂之興利之臣而致逺近之疑一言者謂今常平千餘萬緡散作青苗錢民所欠負財力既竭加以水旱之災不得不為之倚閣因郊赦除之十年之後千餘萬緡散而不收矣常平舊法白合古制而無失䧟之弊不當變改本司今案常平新法豫給價錢並令公人識認又須十戸以上為一保如河北又須保内有三等戸一人自來関防未能備具如此乃不聞有拖欠除放則常平新法自非官吏故欲沮壞不容獨致失陷官物今新法之中兼存舊法但以舊法廣儲蓄抑兼并振貧弱之方尚為未備又無專領官司所以諸路例多糴貴價斛斗至有經數年出糴不行無補振救又糶糴之時官吏奸弊百端故須約周禮賖貸増修新法専置一司提舉覺察非廢舊法違古制也一言者謂新法不當示之條約明言利息本司今案周官貸民明言以國服為息蓋聖人立法惟示信於天下取之以道非以為私於理何嫌而不可明示條約一言者謂坊郭戸既無苗不可貸借本司今案常平舊法亦糶與坊郭之人今若給散農民冇餘仍不許坊郭之人貸借是令常平有餘積餘藏而坊郭之人獨不被朝廷振救之惠也周禮貸民之法無都邑鄙野之限今新法乃約周禮太平巳試之法非専用陜西豫散青苗條貫也今新法方行官吏不能體朝廷立法之意公共推行或以錢斛抑配與人或利在易為催納専貸與物力高强之戸或不及時給納故縱公吏乞取致百姓枉有縻費或不量民物力給與錢斛太多致難催納或不能関防辨察令浮浪之人為一保冐請官物致難催納或拖延不為及時催納自是州縣官吏弛慢因縁為奸不可歸咎於法乞令逐路安撫轉運提㸃刑獄提舉官常切覺察依條施行命官具案取㫖重行黜罰安撫轉運提㸃刑獄提舉官失於舉覺致朝廷察訪得實亦當量罸第行朝典從之臣近以河北路差官置司春夏放青苖錢明取三分之利有傷國體上下皆知不便而以制置條例司是大臣主領但人人腹誹不敢公言臣被顧三朝又職當安撫實不忍雷同黙黙遂詳陳利害本末乞加博訪所冀陛下洒然開悟亟更改使天下歌舞聖明不為盛徳之累老臣獻忠之心豈有他也今䝉制置司以臣所言皆為不當條件疏駮乞申敇諸路及直指揮進奏院以中書曉諭劄子頒行天下臣詳制置司疏駮事件多刪去臣元奏要切之語唯舉大概專用偏詞曲為沮難及引周禮國服為息之説文其繆妄上以欺罔聖聴下以愚弄天下之人將使無敢復言其非者臣不勝痛憤須至再有辨列欲望親覽然後降付中書樞密院看詳送御史臺集百官定議如臣言不當甘從竄殛若制置司處置乖方天下必受其弊即乞依臣前奏盡罷諸路提舉官只委提㸃刑獄司依常平舊法施行以慰衆心一制置司云周禮泉府之官民之貸者取息有至二十而五國之財用取具焉今常平新法比周禮貸民取息立定分數已不為多遇物價極貴亦不得過三分即比周禮所取尤少臣切以周公立太平之法必無剥民取利之理但漢儒以去聖之逺解釋或有異同按周禮泉府掌以市之征布歛市之不售貨之滯於民用者以其價買之物掲而書之以待不時買者各從其抵臣謂周制民有貨財在市而無人買或有積滯而妨民用者則官以時價買之書其物價以示民若有急求者則以官元買價與之此所謂王道也經又云凡賖者祭祀無過旬日喪紀無過三月鄭衆釋云賖貰也以祭祀喪紀故從官貰買物賈公彦疏云賖與民不取利也經又云凡民之貸與其有司辨之以國服為之息鄭衆釋云貸者謂從官借本賈也故有息使民弗利以其所賈之國所出為息也假令其國出絲絮則以絲絮償其國出絺葛則以絺葛償臣所謂周制有從官借本賈者亦不以求民之利但令變所貸錢使輸國服即以為息也此所謂王道也而鄭康成釋云以其於國服事之税為息也於國事受園㕓之田而貸萬泉者則期出息五百臣謂周禮園㕓二十而税一近郊十一逺郊二十而三甸稍縣都皆無過十二惟漆林之征二十而五漆林自然所生非人力所作故税重康成乃約此法謂從官貸錢若受園㕓之地貸萬錢者出息五百公彦因而疏解謂近郊十一者萬錢期出息一千逺郊二十而三者萬錢期出息一千五百甸稍縣都之民萬錢期出息二千臣謂如此則須漆林之所取貸萬錢息二千五百也然當時未必如此今放青苖錢凡春貸十千半年之内便令納利二千秋再放十千至歳終又令納利二千則是貸萬錢者不間逺近之地歳令出息四千也周禮至逺之地出息二千今青苖取息尚過周禮一倍則制置司言比周禮取息也已不為多亦是欺㒺聖聴且謂天下之人皆不能辨也且古今異制貴於便時周禮所載有不可施於今者其事非一若謂泉府一職今可施行則上所言以官錢買在市不售及民間積滯之貨俟民急求則依元買價與之民有祭祀喪紀就官中借物限旬日三月還官而不取其利制置司何不將此周公太平已試之法盡申明而行之豈可獨舉注疏貸錢取息之一事以詆天下之公言哉鄭康成又注云王莽時貸以治産業者但計贏所受息無過歳什一公彦疏解云莽時雖計本多少為定及其催科惟所贏多少假令萬金歳贏萬泉催一千贏五千催五百餘皆據利催什一臣謂王莽時官貸本萬錢歳終贏得萬錢止令納一千若贏錢更少則納息更薄比今於青苖錢取利尤為寛少而王莽之後上自兩漢下及有唐更不聞有貸錢取利之法今制置司遇堯舜之主不以二帝三王之道上禆聖政而貸錢取利更過王莽之時此天下不得不指以為非而老臣不可不辨也况今天下田税已重固非周禮什一之政則又隨畆更有農具牛皮鹽錢趜鞋錢之𩔖凡十餘名件謂之雜錢每遇夏秋起納官中更以綢絹斛斗抵估價值令民以此雜錢折納又毎歳散官鹽與民謂之蠶鹽折納絹帛吏有預買和買綢絹如此之類不可悉舉皆周禮田税什一之外加斂之物取利已厚傷農已深柰何更引周禮國服為息之説謂放青苖錢取利乃周公太平已試之法此則誣汙聖典蔽惑睿明老臣不得不太息而慟哭也一制置司云提舉官約束州縣納錢不得過三分二分蓋恐納時斛㪷倍貴州縣量減錢數不多若物價低平即有合納本色不收其息臣亦謂此論之不實也縁小麥最為不禁停蓄之物自來常平倉不糴蓋恐積留損壞今歳雨雪及時麥價必賤提舉官必不肯令民納本色蓋納下本色則無由變轉若於轉運司兑換價錢則諸處軍糧支小麥絶少必難兑換既難兑換則占壓本錢下次無錢散與民户臣以此知制置司提舉官本無令民納斛斗之意故開此許納見錢一門將來止令言民願納錢息不容納本色則民須至糶麥納錢豈不殃害百姓惟陛下早悟臣言一制置司云鄉村上三等及城郭有物業戸亦有闕乏之時從人舉債豈是兼并之家臣切以鄉村上三等及城郭有物業之戸非臣獨知是從來兼并之家此天下之人共知也今制置司以為非兼并之家者止欲多散青苖錢與之而得利亦多也其如敕意本務拯濟困乏却以錢放與此等戸則天下明知朝廷專以取利為意實傷國體制置司若謂周官有貸民之法取之以道於理无嫌在今兼并之家例開質庫置課場若恐取民倍息以傷貧細則所在皆可官自開置以抑兼并然自前世以來惡其大近衰削不忍為之今青苖錢一事無乃近於此乎又云毎保須上三等户一人者蓋以檢防浮浪之人此則抑勒之勢不假臣言而自明矣又云若謂上三等户必不肯請領至差作甲頭即自是抑勒違法此又殊不察事勢人情有不得已而為之者且青苖之法内有大臣力主事在必行外有專差之官唯以散錢數多為職辦州縣官吏徃徃變抑勒而為情願者蓋事勢不得不懼而人情不得不從也監司之官其於事勢人情亦何異此九重高逺豈得盡知惟陛下早賜辨察一制置司云先王之政未甞不以食貨為始張官置吏大抵多農事也近世以來農人猶為困苦朝廷非泛用度或不免就上等户强借錢物百姓典賣田産物業以供暴令今置提舉常平廣惠倉官兼農田水利差役使者凡以為此固非使之朘削百姓以佐人主私費亦豈得謂之興利之臣而致逺近之疑臣詳制置司明舉貸錢取利之法謂取之以道於理無嫌則非興利而何至於東南所差均輸之官亦皆興利之臣也且西川四路鄉村民多大姓一姓所有客户動是三五百家自來衣食貸借仰以為生今若差官置司更以青苖錢與之則客於主户處從來借貸既不可免又須出此一重官中利息其他百姓固不願請青苖錢又廣南路土曠人稀水鄉之俗粗足生計今亦置官司貸錢取利故於逺民尤為不便豈得不謂之致逺近之疑國家幅員至廣一方水旱時所不免然未甞不假貸糧種盡救荒之政以濟䘏之故能饑饉者復蘇流庸者復安自祖宗以來可謂仁政充洽矣而未甞就上等户强借錢物唯是英宗及陛下即位之初天下各有優賞朝廷自京師應副未及間故有三兩路州軍甞措借於坊郭富民然亦即時輦還今制置司指為暴令以頒布天下是唯知主張青苖之法而不顧毁讟之甚誠可駭也一制置司云常平舊法亦糶與坊郭之人周禮貸民無都邑鄙野之限今新法乃約周禮太平巳試之法即非專用陜西青苖條貫也臣詳制置司此説尤為不實蓋自來常平倉遇歳不稔物價稍高合减元價出糴之時郷村則下諸縣取逐鄉近下等户姓名印給闗子令執赴倉每户糴與三石或兩石坊郭則每日糴與浮居户毎口五㪷或一㪷故民受實惠甚濟饑乏即未甞見坊郭有物力戶乃來零糴常平倉斛斗者此蓋制置司以青苖為名欲多借錢與坊郭有物業之人以望得利之多假稱周禮太平已試之法以謂無都邑鄙野之限以文其曲説惟陛下深詳其妄一臣近以内藏庫絹二十萬匹為河北常平本錢轉運常平倉司遂申制置司募請人依青苖錢法制置司劄子依所申施行坊郭户願者亦聴真定府請絹三萬匹未及般取常平倉司差殿侍康承丙詣属縣催促真定以為張皇騷擾戒承丙毌下縣牒常平倉司追還牒臣照㑹臣遂録奏庶朝廷見其為害之深却准中書劄子康承丙本皮公弼等乞充差使幹當兼累令提㸃刑獄司覺察所散青苖錢不得勒令或有抑配便令止絶具當職官姓名奏劄與臣知臣勘㑹轉運司昨配賣絹與坊郭户毎匹估價錢一千五百三十理一千六百限半年納錢下等户猶有破賣家財方能貼納者今提舉官以絹二十萬匹毎匹上等作一千三百五十每千取利二分毎匹已是一千六百一十下等作一千三百并利亦是一十五百六十並隨税納是百餘日納足與轉運司賣價全不相逺即於農民豈不為害更差使臣督迫給散縣邑小官茍免過咎以抑配為情願何可辨明且制置司雖大臣主領然終是定奪之所今直指揮許散絹與鄉村戶依青苖法納錢及令坊郭戶願請者亦聴則自來未有定奪之司事不闗中書樞密院不奉聖㫖直可施行者如是則中書之外又有一中書也中書行事亦須進呈或候畫可未嘗直處分惟陛下察其專也如是則知在外守職臣寮誰敢不從願早賜辨察使事歸政府庶於國體為便熙寧三年三月上時判相州先是琦奏康承丙令事王安石以為朝廷差承丙令徃來幹當真定府不當擅止之知府呉中復當勘曽公亮等曰公弼不當遣指使預民事當勘今勘呉中復豈不倒置安石欲劄與公弼中復知公亮等曰此乃韓琦奏乞罪提舉官如何反劄與中復安石曰當劄與琦知公亮等以為不可陳次升曰人主當如天地豈當規規與人辨是非安石曰始中書以為公弼等當劾及陛下明見公弼無罪乃言曰人主不當辨是非辨是非但可施於公弼而不可施於韓琦亦何以為天地上卒從安石言劄送琦故琦復有此奏上神宗論條例司畫一申明青苖事孫覺臣竊見制置三司條例司畫一文字頒行天下曉諭官吏使知法意其凡有七至於論斂散出入之弊分城郭田野之民憂將來之陷失其利害灼然人人所能知者臣皆請置而不論至於援引經誼以傅㑹先王之典防微杜漸將以召怨賈禍者臣得極為陛下陳之其條有三謹具如後一新法云周禮泉府以謂民之貸者有至二十而五而曰國事之財用取具焉今者不過三分即此貸民取息已不為多今常平之物不領於三司比周公之法乃不以取具國事之財用故云公家無所利其入臣竊以謂周家綱紀天下其法至密小大詳略之設有條本末先後之施有序所治大者不領其詳所當後者不先於本故其法始於治地而其效至於天下無一人之獄此其積累乃自於文王武王周公三聖人者上取堯舜夏商之遺法損益彌縫之至是而始備嗚呼其亦難成矣哉周之法如此其詳且備矣民之養生喪死者既已無憾則又慮夫祭祀喪紀與夫不可知之乏絶故為之立賖貸之法以隂相之所以備民之艱難而示彌縫之至也以其時考之冝若四民皆有作而無一人得為惰游之民者今天官九職其九曰閒民無常職轉移執事則是周法雖密而先王亦恐其疎而或有脱焉者故又設閒民之職以待轉移之人亦猶賖貸之所以待非常也賖貸者不可以徒予必使以國服輸息蓋又寓勤生節用之意以俟其怠惰者耳若夫國事之財用取具者蓋謂泉府所領若市之不售貨之滯於民用有買有予并賖貸法而舉之焉若專取於泉府則冢宰九賦之𩔖將安用耶至國服之息説者不明先鄭後鄭各為一解康成曰於國事受園㕓之田而貸萬泉者期出息五百則是一歳之中貸錢十千而出五百之息是為一十而一矣又曰王莽時民貸以治産業者但計贏所得受息無過歳計什一則是莽時雖計多少為定及其科催唯據所贏多少假令所貸百千歳贏十千取一千五千取五百是計贏所得受息無過歳計什一也康成雖引載師園㕓為比然卒以莽時為據其意蓋為周制亦當爾也不應周公取息反重於王莽之時夫以王莽貪亂敗亡之法尚不至於以本計息柰何謂周禮太平之制而取息之厚乃至是耶况載師所任自園㕓二十而一至漆林二十而五其征五等而漆林之征最重以其末作妨農所以抑之使歸本邑今以農民乏絶將以補耕助斂乃欲二十而五以比漆林之征則是為本末者無以異與周禮之意相違甚矣况周官載治法甚詳必欲舉而行之宜有先於此者如賖貸之法劉歆行於新室已不效矣莽之亡雖不專以此然亦取亡之一道也故臣謂聖世講求宜講求先王之法章明較著已試而效者推而行之不當取疑文虚説茍以圖治焉一新法將以振乏絶抑兼并此誠為天下者之所慮然臣切以謂為此者有施設次第而其效不可以遽見若亂其紀綱倒其先後而徒以振乏絶抑兼并為意則其治必不成成必不久何以言之西漢之時所患者諸侯地大過制無不帝制而天子自為者擅爵人赦死罪甚者戴黄屋至逆節萌起内窺京師此其勢非止兼并之放恣貧弱之乏絶也然而賈誼處之不過欲衆建諸侯而少其力鼂錯不知出此以謫削諸侯之地而致七國之禍漢室㡬亡其後主父偃卒用誼䇿推恩分子弟國邑而諸侯銷弱京師以尊所謂安危之㡬豈不在謀蓋謂此也今以青苖細故招天下之議使老臣踈外而不見聴輔臣遷延而不就職門下執奏而不肯行諫官請罪而求去若此其事雖善難以必行况復疑文虚説若前之云云者哉臣聞夏之貢法其傳乃自堯舜以來可謂善矣及周之世不可行也則變而為助故傳曰治地莫善於助莫不善於貢若夫文武周公豈固棄毁先代之法哉蓋時有不可行人有不可强不得不舍先聖而從近世棄古法而徇人情以舜之世而有苖不率又以禹出兵而征之其勢如覆太山以壓卵然以益之一言則還師而修徳以舜禹之聖猶不能無過舉其所以為不可及者以其能舍已從人唯是之求也今賖貸之法用之於周不過如貢法之善論者之紛紛又非止益之一言然而牢閉固拒從而為之辭以必其所不必何也臣切憂姦邪之臣乗人情之洶洶争欲上章奏疏動揺朝廷外以鈎直取名内實結黨連伍小則希權位竊貴勢大或懷不可測之姦謀朝廷建法興事不與大臣正士為謀而務排其説黜其忠乃使姦邪小人得騁其志日夜増飾造作而幸其有變流傳四方駭動天下甚非國家之福也一新制以謂周禮國事財用取具於泉府之官賖貸之息今常平之物不領於三司專以振民乏絶比周公之法乃不以取具國事之財用故云公家無所利其入也臣切以謂箕子見象筯而歎曰必為玉杯其後果以奢泰亡國孔子以謂為芻靈者為善為俑者不仁蓋俑疑於人而後世有用殉者矣仁聖之防微慮逺其深矣乎今以泉府不明之法施於主上仁民愛物之時雖云取息二分將以廣施散利補助耕斂之乏絶然臣切亦私憂使者不皆得其人州縣不能深知朝廷之微意而並縁為姦聚斂希㫖則單弱之民或受其弊九重萬里何由察而知之今者朝廷清明法令備具而將漕之臣迫於財賦之不足州縣之吏畏憚監司之譴訶尚且公為掊斂百出千名朝廷明有取息之文俗吏不能通知經義則臣又切懷箕子之私憂與仲尼之逺慮也以陛下之睿明天姿仁恕推仁民愛物之心而創行新法臣恐萬世之後失其本真有剥膚椎髓應上之求者矣則為玉杯以亡國與用人而殉死可不深防其漸歟右臣所條三事非欲與建議之臣争勝負辭辨而已蓋内竭區區之愚忠外采衆人之正論不敢以虚辭濫説疑誤天聽伏望陛下㫁以不疑一朝罷去毋使天下疑朝廷之為利小人幸君子之道消徐講治法躋世太平非獨臣之幸甚實四海幸甚熙寧三年三月上時為右正言宋名臣奏議巻一百十二
