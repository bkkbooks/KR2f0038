body:
  text: 宋名臣奏議巻十二宋趙汝愚編君道門法祖宗上仁宗請改復祖宗舊制龎籍臣近因上殿面奉聖㫖令有事具實封進來者臣退量孱昧罔通政體誤膺詢訪茍有愚見敢不罄陳恭惟三聖垂統紀律大具陛下文明恭儉紹隆寳圖祗守先訓克臻至治臣竊見朝廷政令有漸異祖宗之制而宜改復舊貫者多矣略舉數事條之如左一進退輔臣最為大事非止一時褒貶盖欲垂戒後來祖宗舊制輔佐近臣罷免之例甚衆有因求退得請者有均以勞逸為名者有暴其顯過者有隱其罪名者然所授官秩輕重皆有區别伏見去年執政之臣最喧物議内有廢棄典法公營私寵者此最昭昭於天下也臣於去冬及今年正月七日所上書疏及劄子言之已詳昨者外聞鎻院衆謂必獲罪而退洎制命宣行大者得使相次者尋亦遷秩况使相請俸月踰千緡中常州郡一年之賦未足充其嵗給自非有功有徳何以克勝且登用未及一考而退之者是以譴罷也乃以使相及遷秩處之以此為戒臣恐來者不懼矣必曰當權之日雖壞國法營私恩亦不失作使相及遷秩矣臣欲望聖明令史臣撿尋祖宗以來進退輔臣體例著為篇部以備聖覧此後用為定凖如此則忠正者持衡之時務盡公理乞身之日得以禮退私曲者使之當權必懷畏懼茍至獲罪永為懲戒此事體大乞留至懷一前代職官之制皆有定貟使上下不得超越而進也國朝建官雖異於古然於貟數未聞過多近年以來漸異於此蓋是好進者務干求寵名執政者不堅守舊制故也今資政殿翰林侍讀學士貟數過多恐增之不已更無限局欲望凖約舊典以立定貟貟既有限求者自息矣一金紫者文臣之貴服也祖宗以來謹重賜與自前或因差遣上殿特恩賜之然多是已在升陟任使者近年伏見有差遣未出常調或祗是知縣之𩔖因公事上殿亦得改賜遂使三品之服漸成輕易臣欲乞愛重服章無及僥濫一竊知向來毎因南郊大禮添出諸般差遣名目多於舊日添一差遣則增一錫賜所以費用太廣實傷財力臣欲望將來郊禮令有司撿尋祖宗以來則例為定免至橫添名件廣耗官物臣智識愚下無裨聖徳實欲朝廷凡百政令率由舊章沮勸允明僥倖咸塞伏望聖造留心垂采明道二年上時為殿中侍御史上仁宗乞編𩔖三朝故典富弼臣歴觀自古帝王理天下未有不以法制為首務法制既立然後萬事有經而治道可必也宋有天下八十餘年太祖始革五代之弊創立法度太宗克紹前烈紀綱益明眞宗承兩朝太平之基謹守成憲近年紀綱甚紊隨事變更兩府執守便為成例施於天下咸以為非而朝廷安然奉行不思剗革至使民力殫竭國用乏匱吏貟冗而率未得人政道缺而將及於亂賞罰無凖邪正未分夷狄交侵冦盗充斥師出無律而戰必敗令下無信而民不從如此百端不可悉數其所以然者盖法制不立而淪胥至此也臣今欲選官置局將三朝典故及討尋乆來諸司所行可用文字分門𩔖聚編成一書置在兩府俾為模範庶幾頽綱稍振弊法漸除此守基圖救禍亂之本也慶厯三年九月上時為樞宻副使遂命王洙余靖孫甫歐陽修等同編修祖宗故事弼揔𩔖之上神宗乞兢兢寅畏以保祖宗基業曾鞏臣聞基厚者勢崇力大者任重故功徳之殊垂光錫祚舄奕繁衍乆而彌昌者盖天人之理必至之符然生民以來能躋登兹者未有如大宋之隆也夫禹之績大矣而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲既立不明周自后稷十有五世至于文王而大統未集武王成王始收太平之功而康王之子昭王難於南狩昭王之子穆王殆於荒服暨於幽厲陵夷盡矣及秦以累世之智并天下然二世而亡漢定其亂而諸呂七國之禍相尋以起建武中興然沖質以後世多故矣魏之患天下為三晉宋之患天下為南北隋文帝始一海内然傳子而失唐之治在於貞觀開元之際而女禍世出天寳以還綱紀微矣至於五代盖五十有六年而更八姓十有四君其廢興之故甚矣宋興太祖皇帝為民去大殘致更生兵不再試而粤蜀吳楚五國之君生致闕下九州來同復禹之跡内輯師旅而齊以節制外卑藩服而糾以繩墨所以安百姓禦四夷綱理萬事之具雖創始經營而彌綸已悉莫貴於為天子莫富於有天下而舍子傳弟為萬世䇿造邦受命之勤為帝太祖功未有髙焉者也太宗皇帝遹求厥寧既定晉疆錢俶自歸作則垂憲克紹克𩔖保世靖民丕丕之烈為帝太宗徳未有髙焉者也眞宗皇帝繼統遵業以涵育生養蕃息齊民以并容徧覆擾服異𩔖盖自天寳之末宇内版蕩及眞人出天下平而西北之虜猶間入闚邊至于景徳二百五十餘年契丹始講和好徳明亦受約束而天下銷鋒灌燧無雞鳴犬吠之驚以迄于今故於是時遂封泰山禪社首薦告功徳以明示萬世不祧之廟所以為帝真宗仁宗皇帝寛仁慈恕虚心納諫審注措愼規矩早朝晏退無一日之懈在位日乆明於羣臣之賢不肖忠邪選用政事之臣委任責成然公聽並觀以周知其情偽其用舍之際一稽於衆故任事者亦皆警懼否輙罷免世以謂得馭臣之體春秋未髙援立有徳付畀惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然殆古所未有其豈弟之行足以附衆者非家施而人恱之也積之以誠心民皆有父之尊有母之親故棄羣臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為宋仁宗英宗皇帝聰明睿智言動以禮上帝眷相大命所集而稱疾遜避至于累月自踐東朝淵黙恭謹無所言議施為而天下傳頌稱說徳號彰聞及正南面勤勞庶政毎延見三事省決萬機必咨詢舊章考求古義聞者惕然皆知其志在有為雖早遺天下成功盛烈未及宣究而明識大略足以克配前人之休故皇考之廟為宋英宗陛下神聖文武可謂有不世出之姿仁孝恭儉可謂有君人之大徳憫自晚周秦漢以來世主不能獨見於衆人之表其政所出大抵踵襲卑近因於世俗而已於是慨然以上追唐虞三代荒絶之跡修先王法度之政為其任在已可謂有出於數千載之大志變易因循號令必信使海内觀聽莫不奮起羣下遵職以後為羞可謂有能行之效今斟酌損益革弊興壞制作法度之事日以大備非因陋就寡拘牽常見之主所能及也繼一祖四宗之緒推而大之可謂至矣盖前世或不能附其民者刑與賦役之政暴也宋興以來所用者鞭朴之刑然猶詳審反復至於緩故縱之誅重誤入之辟盖未嘗用一暴刑也田或二十而稅一然嵗時省察數議寛減之宜下蠲除之令盖未嘗加一暴賦也民或老死不知力役然猶憂憐惻怛常謹復除之科急擅興之禁盖未嘗興一暴役也所以附民者如此前世或失其操柄者天下之勢或在於外戚或在於近習或在於大臣宋興以來戚里宦臣曰將曰相未嘗得以擅事也所以謹其操柄者如此而况輯師旅於内天下不得私尺兵一卒之用卑藩服於外天下不得專尺土一民之力其自處之勢如此至於畏天事神仁民愛物之際未嘗有須臾懈也其憂勞者又如此盖不能附其民而至於失其操柄又怠且忽此前世之所以危且亂也民附於下操柄謹於上處勢甚便而加之以憂勞此今之所以治且安也故人主之尊意諭色授而六服震動言傳號渙而萬里奔走山巖窟穴之氓不待期會而時輸嵗送以供其職者惟恐在後航浮索引之國非有發召而籯齎橐負以致其贄者惟恐不及西北之戎投弓縱馬相與祗服而戯豫東南之夷正冠束衽相與挾䇿而吟誦至於六府順序百嘉鬯遂凡在天地之内含氣之屬皆裕如也盖逺莫懿於三代近莫盛於漢唐然或三四世或一二世而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至於荒陬海聚無變容動色之慮萌於其心無援枹擊柝之戒接於其耳目故曰生民以來未有如大宋之隆也竊觀於詩其在風雅陳太王王季文王致王迹之所由與武王之所以繼代而成王之興則美有假樂鳬鷖戒有公劉泂酌其所言者盖農夫女工築室治田師旅祭祀飲尸受福委曲之常務至於兎罝之武夫行修於隱牛羊之牧人愛及微物無不稱紀所以論功德者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以歸美其上非徒薦告鬼神覺悟黎庶而已也書稱勸之以九歌俾勿壞盖歌其善者所以起其嚮慕興起之意防其怠廢難乆之情養之於聽而成之於心其所勸帝者之功美昭法戒於將來聖人之所以列之於經垂之為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以德猶武王成王而羣臣之於考次論撰列之簡􅁽被之金石以通神明昭法戒者闕而不圖此學士大夫之過也盖周德盛於文武而雅頌之作皆在成王之世今以時考之則祖宗神靈固有待於陛下臣誠不自揆輒冒言其大體至於尋𩔖取稱本隱以之顯使莫不究悉則今文學之臣充於列位惟陛下之所使至若周之積仁累善至成王周公為最盛之時而泂酌言皇天親有徳饗有道所以為成王之戒盖履極盛之勢而動之以戒懼者明之至智之盡也如此者非周獨然唐虞至治之極也其君臣相飭曰兢兢業業一日二日萬幾則處至治之極而保之以祗懼唐虞之所同也今陛下履祖宗之基廣太平之祚而世世治安三代所不及則宋興以來全盛之時實在今日陛下仰探皇天所以親有德饗有道之意而奉之以寅畏俯念一日二日萬幾之不可以不察而處之以兢兢使休光美實日新嵗益閎逺崇侈循之無窮至千萬世永有法則此陛下之素所蓄積臣愚區區愛君之心誠不自揆欲以庶幾詩人之義也惟陛下之所擇熈寧三年閏九月移知滄州過闕上殿上哲宗乞講筵開陳祖宗故事丁隲臣伏見本朝祖宗之德具在方􅁽威明仁厚不惟有益於當時皆可為法於後世竊惟陛下即位以來首延儒臣侍講禁中如論語孝經皆聖賢之言行固足以啓沃上心導明睿性臣愚欲乞既講罷經義更以祖宗故事一二端為陛下開陳仍乞曉諭侍講臣僚豫先編叙六聖典故可以取法於後來者以備講筵聽納庶幾前聖後聖所為所行如合符節威明仁厚之徳源源相繼天下幸甚元祐二年上時為右正言上哲宗乞法仁宗五事范祖禹臣掌國史伏覩仁宗皇帝在位四十一年豐功盛徳固不可得而名言所可見者其事有五畏天愛民奉宗廟好學聽諫仁宗能行此五者於天下所以為仁也陛下嗣位於今八年昧爽而聽朝旦書而講學風雨不易寒暑不倦可謂勤於進徳矣然而天𠂻淵黙聖度髙逺中外之人未知陛下睿意所好如仁宗之五者見於天下羣臣雖欲少裨萬一亦無所自而入方今四海顒顒想望太平臣願陛下深留聖思法象祖宗日新輝光昭示所好以慰荅羣生之望則天下幸甚元祐七年三月祖禹進讀此奏畢又言臣觀仁宗毎因事示人好惡皇祐中楊安國講直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可巻而懷之仁宗曰蘧伯玉信君子矣然不若史魚之直據孔子之言則史魚不若蘧伯玉之君子仁宗之言人君之言也人君惟欲臣下切直故言蘧伯玉不若史魚以開臣下切直之路由是天下知仁宗好直不好佞此聖人之大徳也如此之𩔖臣願陛下以仁宗為法上然之上哲宗乞專法仁宗范祖禹臣伏覩陛下近者郊見天地雪止風和景氣清霽神祗饗荅福應尤盛侍祠之臣以為前後未有都城之人瞻望玉色歡呼洋溢皆云陛下克𩔖仁宗臣觀天意人心如此實宗社無疆之福也然臣愚竊以聖人福至而益戒則能長享其福譽美而副之以實則能永保其譽惟兢兢業業不自暇逸乃可以荅天休衆之所欲因而從之乃可以副民望若一有滿假之意則今日之福乃他日危亂之基也不能副之以實則今日之譽乃他日怨誹之端也故臣願陛下既受天福又獲民譽益思戒慎唯勤修徳修徳之實唯法祖宗恭惟一祖五宗畏天愛民後嗣子孫皆當取法惟是仁宗在位最乆徳澤深厚結於天下是以百姓思慕終古不忘陛下誠能上順天意下順民心專法仁宗則垂拱無為海内晏安成康之隆不難致也臣承乏史官嘗采集仁宗聖政得數百事欲乞撰錄成書上進少資睿覧監觀成憲皆舉而行以副羣生之所願則天下幸甚元祐七年十二月祖禹時為翰林侍講學士尋采集仁宗聖政三百二十七事編錄成書名曰仁皇訓典凡六巻上之自紹聖以後章蔡倡為紹述之說而祖宗之法盡廢兹不復載詳見新法門宋名臣奏議巻十二
