body:
  text: 宋名臣奏議巻一百三十五宋趙汝愚編邊防門遼夏七上仁宗河北守禦十三䇿富弼臣伏以北狄自古為中國患黄帝時謂之獯鬻周時謂之玁狁秦時謂之胡漢時謂之匃奴唐時謂之契丹其名雖異其實則一也有民人而不知教化有土地而不出貨財寒無温麗之服饑無甘珍之食凡百所欲率皆不足只知有射獵之事禽䖝之獲食其肉衣其皮而巳矣於是見中國之盛萬物之富愛而不可得學而不可及貪惏之性復有趫武則不得不為邊鄙侵掠之患也然為患深淺係其强弱亦係中國盛衰焉或暫而入冦或連歲擾邊或散處中原或逐出漠北或費兵力而臣畜之或從權宜而亢禮之伏叛相倚勝敗不常歴代帝王知其若此不欲困百性而外事四夷故有曰比之蚉蝱敺之而巳復有曰接以禮譲羈縻不絶而巳又有或質其子或盟於天或啗之金帛以厭其欲或結之姻好以暱其心自古謀謨之臣運籌畫䇿相與争於廟堂之上者亦惟此數科而巳國家初得天下震耀威武太祖待北狄僅若一族每與之戰未甞不克太宗因親征之衂其勢遂驕頻年冦邊勝敗相半真宗嗣位之始專用文徳于時舊兵宿将徃徃淪沒敵騎深入直抵澶淵河朔大騷乗輿北幸於是講金帛啗之之術以結懽好自此河湟百姓㡬四十年不識干戈歲遺差擾然不足以當用兵之費百一二焉則知澶淵之盟未為失䇿而所可痛者當國大臣議和之後武備皆廢以邊臣用心者謂之引惹生事以搢紳慮患者謂之迂濶背時大率忌人談兵幸時無事謂彼不敢背約謂邊不必預防謂世常安謂兵永息恬然自處都不為憂西北之冦稔知朝廷作事如此之失也於是隂相交結乗虚有謀邊臣有奏敵中事宜則猶曰探候之人妄報所以希賞固未甞聽也蕃使每到朝廷悖慢則尚曰夷狄之人無禮是非異事固不之恤也但只自謾赫佯為包容其實偷安不肯為國家忘私任責畫乆長之逺經所以縱其姦謀飬成深患是致寳元元年元昊竊發數載用兵西人窮困未有勝筭又至慶厯二年契丹觀釁而動嫚書上聞中外倉黄不知為計不免益以金帛且茍一時之安此二邊所以敢然者盖國家向來輕敵忘戰不為預備之所致也臣深見二虜為患卒未寜息西乏則北助北靜則西動必欲舉事不難求釁通和則安享重幣交戰則必敗官軍叛而復和孰敢不許擒縱自在去住無梗兩下牽制困我中國有何大害而不為邊患有何後悔而長守懽盟渝盟擾邊我則遂困不幸凶荒相繼盜賊中起則彼二㓂所圖又甚大矣臣故曰二㓂為患卒未寜息臣上之所陳西北形勢乃唐室以前夷狄之事也其後契丹自得燕薊以北拓䟦自得靈夏以西所生英豪皆為其用得中國土地役中國人民稱中國位號立中國家属任中國賢才讀中國書籍用中國車服行中國法令是二冦所為皆與中國等而又勁兵驍将長於中國中國所有彼盡得之彼之所長中國不及我當以中國勍敵待之庶幾可禦豈可以古之夷狄待二冦耶前既輕敵妄戰不為預備致二冦結禍為朝廷深憂今又欲以茍安之勢遂為無事二冦各獲厚利退而飬勇不數年相應而起則無復以金帛可㗖而盟詛可約也臣向者累奉徳音令韓琦范仲淹專管西事命臣專管北事臣才識無取濫膺擢任退自循省何以塞責然敢不強勉夙夜揣摩今輙得守䇿凡六事禦䇿凡七事謹具如右一河北三十六州軍内縁邊次邊如北京雄覇祁深保瀛漠滄定鎮兾十二州廣信安肅順安信安保定乾寕永寕七軍總一十九城皆要害之地可以控制敵邊而不得深入矣定為右臂瀛滄為腹心北京為頭角此四城者河朔之所望也餘十五城為指爪支節乃四城之所使者定瀛滄各置一大帥餘十五城分属定瀛滄三路悉擇善将守之十九城都用三十萬定五萬滄瀛鎮各三萬冀二萬冀在要會之地諸路皆通故比餘郡蓄兵稍多保祁深廣信安肅各一萬保州廣信安肅當入冦之衝故三城鼎足相峙欲以交相會合以禦初入之鋒也祁在鎮定之東舊頗慢後來敵騎入邊以鎮定有重兵不肯趍鎮定路才過保州便從東南道出祁深往取冀路冦澶魏故祁深亦湏屯兵稍多雄霸漠順安信安保定乾寧永寜各五千北京五萬為諸路救援之兵今河朔平時有駐泊屯駐就粮兵十八萬本城五萬至用兵時増十萬人則戰兵足矣此三十萬兵非如景徳年閉門自守皆使出而接戰也當時城守不敢出所以冦兵堂堂直抵澶淵幾至渡河為京師患今若使良将帥守十九城分頭三十萬衆左右出入縱横救應閃誤逗誘衝䧟掩襲臣雖愚未信敵敢長驅而南也頃年大兵悉屯定州然閉門不使出戰者盖恐一敗塗地則無以救援且防中渡之變也今雖用兵三十萬而分置十九城右敗則左救縱失則横援豈更有昔時之虞邪其外十七城不復蓄兵只以本郡鄉兵堅守不使出戰一河朔州軍長吏最宜得人以備匈奴之變自來都不選擇贓汙不才年老昏昧者盡使為之又移替不定乆者不過一二年其間茍且之人只是幹尋常之務其經乆利害自知不及其身率皆不為前後相承積弊巳甚若不選人乆任以矯前失則異日虜有變故邉城不守浸滛深入為患不細其上件十九州軍在河朔尤為要害内定保雄霸滄五州廣信安肅順安信安四軍近巳得㫖選人差定見施行次北京巳有大臣自餘鎮冀瀛漠祁深六州保定乾寜永寜三軍北平一寨亦乞選差長吏並使乆於其任内績效著聞者優與就遷秩禄及厚加賜予使樂於邉寄亡所怨苦則悉心營職自甘乆處或廉勤可尚才有不足者罷之與内地合入差遣若故為乖繆欲違邉任及有罪不可留而法不至死者廢之終身如此則人知禍福必及孰敢不勉别有事件巳具進呈一除上件十九州軍長吏巳下並乞詔本路轉運提刑安撫部管鈐轄分擘舉充仍委樞宻院三班審官銓司選擇不許循入並湏三年一替所貴上下得人衆職皆舉用兵之際有可供使與夫臨時外求得失相萬也一屯兵備邉古今常制所患者民賦有限兵食多缺必湏廣為經度其間歲有㓙歉謀之不獲􅂉冦至益兵食常不足則暴歛横取何所不至民由是困盜由是起此歴代之所患也河北自石晉失燕薊之險無所固守是以蓄兵愈多積粟愈厚國朝踵之頗乆至景徳講和之後兵備漸弛粟亦隨減前年敵忽生變雖強與復和而終非悠乆之計自此邉釁巳兆向去未有寕歲尤宜謹備禦之䇿使乆而不匱臣輙得飬兵二條其一據守邉兵馬合留外屯駐駐泊就粮諸軍悉分屯於河南鄆齊濟濮等州以教以養况其地富實不營而足率三年一代遇有警急發符召之不旬日可到豈有後期不及者邪所以略省河朔誅歛以寛疲民使之安逸蘇息坐待冦至而用庶幾沛然師有餘力可以禦敵其二縁大河州軍起敖倉支移河南民稅及漕江淮粟以實之分屯近邉兵馬毎二歲一代亦足以寛河湟之困民二者可擇一焉或兼用亦善不然臣恐無事時河北已見殫竭一旦用武又重加歛民必怨叛則肘腋之下皆為仇讎豈暇禦外冦哉一河北最號勁兵之處若盡得精銳則無敵於天下况夷狄乎頃年朝廷未與匈奴講和敵每入冦惟懼北兵視南兵輕蔑之也我分南北兵各為一軍凡敵陣必先犯南兵南兵潰則并北軍累之而必敗懲此因有以南北兵混而戰者敗走北兵南兵尚多徒能張為虚聲而實不足用臣願自今河北增募土人為禁軍料錢不可過五百文每成一指揮即代南兵一指揮歸營不數年三十萬盡得北兵不教之精勇則匈奴自當畏服豈敢輕動哉恐議者謂不宜益兵則請於别路罷招以此易彼亡所増矣既得土兵勿戍他郡糧不足則願用臣前養兵二條一北冦風俗貴親率以近親為名王將相以治國事以掌兵柄而信任焉所以視中原用人亦如巳國向者燕王威望著於北冦知是皇叔又為王爵舉天下之尊無與二謂朝廷庶事皆決於王又疑王善用兵天下兵皆王主之嚴刑好殺無敢當者北冦疑此益所畏懼故燕薊小児夜啼輙曰八大王來也於是小児輟啼毎牽牛馬渡河或旅拒未進又曰必是八大王在河裏其畏服如此敵人毎見南使未甞不問王安否及所在朝廷以王之故亦見重於敵朝廷有如是親賢每欲妄動未必不畏王而止今春王薨識者亦憂之謂王之生則北冦以朝廷為重王之薨則北冦以朝廷為輕矣臣亦甞念國家將帥既未聞於夷狄而親王素有威望為匈奴所畏者又巳淪謝且不復更聞有皇親可以為朝廷屏翰者必謂王室孤弱無所扶助本根不固易以動揺此誠宜為夷狄之所窺測也臣願陛下親擇宗室中年長知書識理道曉人事者十數人為王畿千里知州慮宗室不達民政或有任性為事通判位下難規正宜擇方嚴公幹近上朝廷一人為同知州所貴勢均力敵可以共事而无所乖失俟歴一兩郡決知可以獨任則罷同知州只置通判又擇其次者數十人為千里内州郡鈐轄恐亦未練軍政職事不舉其都監監押未可減省宜擇亷幹歴事之人令共職仍選良守臣伺察而裁處之其年少官卑度其稍堪差使者為畿縣都監監押雖年少亦須二十歲巳上者亦擇良令長以譏正之並限二年一替亦用文武臣寮賞罰之法以勸沮之内有勤儉好學接寮属有曉習文法能治民事者量髙下等第或降詔奬諭或賜金帛或遷官秩有諸過者亦量大小等第或罰俸或贖金或降官甚者召還黜於宫宅俾之省過一二年復遣補外凡三省過而遂不改者終身使奉朝請如此教育之選試之善者必賞不善必罰臣知不數年當有賢宗室如前漢河間後漢東平二王者不為難矣内可以藩屏王室外可以威示四夷此有國家者之急務臣觀三代已後興王者今日得天下明日封建宗室至于襁褓之子亦皆為侯為王分割土地自成邦國所以分布枝葉庇廕根本張大王室壯觀天下使英豪無間辭無異意謂四海之内盡是一姓雖有凶謀變計不敢妄動此前代帝王制御天下長乆之䇿也布在簡牘驗之可信今則埋沒抑壓僅同豢飬縱其非僻殊不教訓雖有説書之官又實虚設是盡欲愚之而不令知善道為善人甚非帝王飬宗室之義也至於臣庶之家有子孫弟姪者無不孜孜誨誘使之成噐盖持門户主祭祀若子孫不肖則家道淪沒又有擔負之夫㣲乎㣲者日求升合之粟以活妻児尚每日那一二錢令厥子入市學謂之學課亦欲厥子讀書識字有所進益而嗣其家國家富有天下基業全盛實祖宗艱難而致所宜子子孫孫相承不絶為萬世之計豈可宗室滿宫而陛下都不教導任為過惡俾外夷輕笑是陛下自去枝葉而取孤根昜揺之患臣竊憂之臣又伏思陛下任李用和為殿前副指揮使任曹琮為馬軍副都指揮使是任親也用和與琮誠親矣然皆異姓異姓者尚可信之則宗室同姓與陛下是骨月之親反不可信之哉陛下不過謂宗室無人臣謂今則誠未見其人教之試之當自有人矣今惟朝會時羣行旅進青葢滿道士大夫見者方知有宗室但出得都城四門之外已不知宗室之有無况天下乎况四夷乎上古直至周世宗其間所歴何啻萬代而宗室不教不試不用㣲弱乏人未有如本朝之甚之極者也宜乎為識者之所憂而北狄之所輕也且如北狄有南大王蕭孝穆北大王蕭孝惠魯王惕隠楚王夷離畢是其近親者甚衆臣前嵗奉使盡與之接又詢其國人未必實皆才武而中原聞之莫不疑其人人皆良將也其故何哉盖聞其名而疑其有實爾今朝廷若能崇植宗室使聲名漸著聞於北狄亦謂南朝宗室有人根本牢矣藩屏固矣欲謀則息欲動則止古者有以實效濟務者亦有虚聲懾敵者兵尤重先聲而後實况臣之所説必能聲實相副願陛下行之無疑一景徳以前緣邊土兵無事時戍本州軍冦至則盡為逐路部管司抽起㳂邊缺人却以南兵屯守甚無謂也夫土兵居邉知其山川道路熟其彼中人情復諳敵兵次第亦藉其營䕶骨肉之心且又服習州將命令所以禦必堅戰必勝也若遷入内地則山川道路不知人情不熟敵兵不諳骨肉不在州將命令不習又為南兵怯弱所累則禦不必堅戰不必勝也北狄惟懼土兵每聞以南兵替入内地敵人大喜故來則勝而回前年河朔有警定帥復尋景徳故事盡抽邊兵守定州河湟之民大恐以謂官軍必敗幸而敵騎中止不見失律不然䘮師必矣臣願自此若敵入冦㳂邊土兵只在本處不復令部管司抽移若逐處土兵尚少即以南兵益之如其有餘方許部管司抽起况部管司自有近裏州軍土兵可以聚而為大陣矣臣上篇議十九城分領兵三十萬出戰餘十七城係近裏州軍只用鄉兵守之更不出戰其逐路部管可於十七城聚大陣兵矣邊兵勇悍不畏堅敵敵騎初入使當堂堂之鋒或得便可戰必能取勝則近裏州軍人心自壯雖南兵之怯亦自增氣茍以南兵在邊遇冦一敗敵騎乘勝而南則表裏震恐雖精銳盡在部管司亦巳沮䘮安能保其全勝哉一景徳以前匈奴冦邊多由飛狐易州界道東西口過陽山子度滿城入自廣信之西後又多出兵廣信安肅之間大抵敵騎率由西山之下入冦大掠州軍然後東出雄霸之間景徳前二州之間塘水不相接因名東塘西塘二塘之交蕩然可以為敵騎歸路遂置保定軍介於二州以當賊衝厥後開導不巳二塘相連雖不甚浩𣺌而賊路亦少梗矣然或窮冬冰堅或旱歲水竭亦可以濟未為必安之地雖然但少以兵控扼之則虜騎無以過矣自餘東從泥茹海口西至保州一帶數百里皆塘水瀰漫若用以為險可以作限只自保州以西至山下數十里亡塘水之阻敵騎可以平入敵若守盟不動則我無先發但用臣上篇屯兵之法足以固守萬一渝盟入冦用臣之䇿可以轉禍為福逞志泄憤矣何以陳之今敵若冦邊必由廣信西來敵騎初入境㳂邊州軍堅壁亦不得出兵敵必不顧而進將入鎮定亦堅壁敵必易我而懈於是令廣信安肅保州三城開壁㑹兵張虚聲而不與戰彼必分兵來禦巳而令鎮定互開壁復不與戰彼既前後受敵必未敢長驅而南於是我急從滄州取海上路以數十艘出輕兵三千趍平州入冦家口咫尺燕薊滄州至北界平地水路約五百里不數日登岸地肥水草美不必重齎計其日然後自雄霸之間即景徳年敵騎東歸之路也又出精兵直抵燕京㑹滄州兵𢷬其腹心破其聚積彼見兩下兵入則莫之為計矣燕地既亂入冦者必有歸心又為王師所牽而不能遂去於是乗其向背之際使㳂邊三城及鎮定兵合擊必大破之追奔及燕盡逐敵兵過山後敵兵入界則整若敗而出塞則紛然散走無復行陣易為驅除矣則敵騎無復南者因其妄動可以一舉而復全燕之地㧞數郡陷兵之俗平累朝切骨之恨臣自謂必無遺䇿矣既以兵守四關口外惟西山後有新開父牛鐡脚猪窠三口敵人以通山後八州之路然皆峻狹不容車馬敵人鑿山為徑只通人行險峻非兵行之道雖不加防守亦無所害或於口側少伏兵馬縱敵入冦發伏可以盡殺之假如陛下謹重未欲盡舉復燕之䇿即請冦入之後頓重兵於西山下敵騎有所掠而東出亡路進退不遂我於是以十九城之兵分布掩擊必使退敗保無深入之患敵勢既屈與戰則削與和則乆亦制匈奴之下䇿也一燕地割属契丹雖逾百年而俗皆華人不慣為匈奴所制終有向化之心常恨中國不能與我為主往往感憤形於慟哭臣前年奉使邊廷邊上往復數次邊人皆勸臣無重契丹以困民萬一入冦我㳂邊土人甚有豪傑每一豪傑可自率子弟數百人為官軍前驅願朝廷復取燕薊吾等却為華人死亦幸矣臣竊壯之慰謝而退朝廷之力未及外禦遂虚邊豪之請雖臣未甞忘懐思為異日之外用自後不輟尋訪所得邊豪頗多將來敵若冦境臣必能以所得邊豪令自率鄉户各成一隊或為嚮導或為内應或破陣或攻城大可以為王師之助矣其始去則質其家其成功則厚其賞臣不患其譎而反為害也一古者有外虞則以夷狄攻夷狄中國之利也朝廷西有羌人之患力足備禦不假求外援以自助惟是北冦強盛十倍羌人異日渝盟悉衆南下王師力若不給則禍未可涯宜求所以牽制之術使有後顧而不敢動則有所憚而不能盡銳以來我力足以禦之此不可不慮也今契丹盡服諸畨如元昊回鶻髙麗女真渤海烏弋鐡勒黙爾赫室韋達靼布希等弱者盡有其地強者止納其貢賦獨有髙麗不伏自謂夷齊之後三韓舊邦讀書禮義之風不減於中國契丹用力制之髙麗亦力戰後不得巳而臣之契丹知其非本意頗常勞於制御髙麗亦終有歸順朝廷之心臣伏見淳化年中其國王王治遭契丹兵入境遣使元郁來朝納欵太宗不從但婉順回荅又於咸平年中其國王王誦遣户部郎中李定古來使真宗不納但降優詔而巳又於祥符七年其國王王詢遣工部侍郎尹古貢表來使表稱今斷絶契丹乞歸附大國仍乞降正朔并皇帝尊號真宗又不許陛下即位後天聖二年復曽遣使來朝朝廷差栁植管接其事甚近可以按證前後髙麗四次遣使修貢每來必言不願附契丹而願歸朝廷終不允納雖然髙麗欵附之切如渇者望飲飢者望食無一日而忘也但畧遣人翹發則其來必矣來則善遇之許其歲朝京師賜與差厚於前以回其心優為詔命之辭以悦其意他時契丹復欲犯順以逞志我遣人使髙麗激之且約曰契丹往年無故侵髙麗三韓之地今又累興師深入誅求無厭髙麗甚苦之我先帝重惜民命不欲數與之鬭故歲遣厚幣於兹四十年矣今契丹又欲背施肆毒犯我邊境我軍民並怒皆願死戰我不敢違衆師行有日髙麗又舉兵相應表裏夾攻契丹敗則三韓之地及所得人民府庫盡歸髙麗我秋毫不敢有但止復所割故地爾髙麗素怨契丹侵其地又怨每歲歛取過重向者恨無大國之助以絶之聞今之説必然從命然則契丹不足破也或者疑其納髙麗則契丹可以為釁端不便臣荅曰前歲之隙豈為納髙麗興辭邪夷狄之性變詐多端茍欲背盟何説不可豈宜動自拘礙不敢有為直俟禍來坐受其弊愚者尚不肯如此况謀謨天下之事乎髙麗果入貢假契丹來問我當荅以中原自古受方國之朝獻矧髙麗素禀朝廷正朔但中有阻隔今却復舊好使我何辭阻絶之與契丹納諸國之欵一也契丹安能使我必不納髙麗之貢哉臣又思之若契丹寡弱不足為虞或能謹守盟誓無陵侵中國之志則何用逺納髙麗之欵而忽契丹之約今契丹盡呑諸蕃事力雄盛獨與中原為敵國而漸有慿陵之心况前歲已生釁隙自知不直謂朝廷偽增金帛後圖釋憾不乆又将先有以制我焉發而謀之則不及矣經營措置今及其時臣又甞聞契丹議曰我元昊與髙麗約連衡攻中原元昊取闗西髙麗取登萊沂密諸州又曰髙麗隔海恐不能乆據此數城但縱兵大掠京東官私財而去我則取河北三十六州軍以河為界臣聞此乆矣萬一果如斯説臣恐朝廷必無以制之外冦如此窺圖中國中國但因循日過一日臣不知終乆如何夫髙麗累年貢奉朝廷朝廷終不許遂決志事契丹所以為契丹用也契丹所使無令不從今朝廷能許髙麗進貢正遂其乆志則必反為我之用矣契丹何能使之耶臣熟知髙麗雖事契丹而契丹實憚之天聖三年契丹甞伐髙麗是年朝廷遣李維奉使髙麗敗契丹兵三十萬疋馬隻輪無回者自是契丹常畏之而不敢加兵朝廷若得髙麗不必候契丹動而求助臣料契丹必疑髙麗為後患卒未敢盡衆而南只此巳為中國之大利也臣願陛下行之無疑一鎮定西山有谷口十餘道盡通北界山後之路景徳巳前不甚迹熟盖溪澗峻狭林木擁遏故敵罕由兹路而入雖有來者亦必艱阻臣頃聞河朔人説契丹自山後斬伐林木開鑿道路直抵西山漢界而止今則來往通快可以行師臣亦細詰其由云契丹舊亦疑朝廷有復燕之志恐天兵渡界河直北趨燕京則敵人欲出我不意由山後進兵旁擊鎮定横行河朔牽制王師以解収燕之患也臣必料往年縁邊巳曾探報聞於朝廷今或契丹自廣信安肅入冦我必以重師禦其鋒若有西山别衆出於鎮定横行背擊官軍敗績則大事去矣兵家切務不可不知當得能幹而謹密者隂往經制如何屯戍如何捍禦必有可以勝之之術先事而定以待其來則保邊之道也一祁深二城舊非要郡宿兵至少故城壘迫而陋不甚修葺切聞契丹今復入冦知吾重兵屯鎮定不肯南面直走纔過保州便取東南路由祁深以來祁深二壘當廣而髙之以防攻逼誓書言不得創制城池若因而廣之則無疑又曰敵既憚鎮定而忽祁深必謂二城兵寡不戒而過我若乘其不偹使二城替出精兵首尾應而擊之必大得志此係於臨時非可預度然亦當知之俟其變則易為謀矣一漢唐以前匈奴入冦率由上郡鴈門定襄等路盖當時中國據全燕之地有險可守匈奴不敢由此路而來也自石晋割燕薊入契丹無險可守由是敵騎直出燕不復尋定襄等故道今朝廷若留意河朔邊鄙有偹冦不可得而入湏求别路以來路或雖可入冦苐取定襄等路為犄角之勢則河東不得不大為防或剏立城池或造作險阻何地可以設竒伏何路可以出牽制此湏預為經度素有隄備則臨時足以禦捍應卒不至倉皇使與河朔表裏相應冦不能逞其欲實邊防之急務也右守禦二䇿總一十三條是臣庚辰壬午二歲奉使契丹日於河朔往回十餘次詢諸縁邊土兵并内地故老博采參較得之甚詳及到邊廷議事又頗見其情狀以至稽於載籍質於時務用是裒聚撰述以副陛下委責之意即非臣任胷臆罔聖聴惟陛下令兩府㑹議可者速行之其未可者交相致詰而是正之臣必不敢持已徇私旁拒衆證兩府亦不得畏事養病而無所發明如此則庶幾謀行而患可弭矣臣聞古者人君遭患難則退修道徳可以無咎是故文王出羑里純任教化而終滅獨夫勾踐脫㑹稽厲精武事而卒破夫差又聞主憂則臣辱主辱則臣死是故陳主荅書悖慢而楊素下殿請死蔡賊䟦扈難制而裴度誓不兩全終之隋滅江南裴度平淮西有以見古之君臣所為各得其道無不建功立業聲流後世者也昨契丹背約呼索無厭朝廷以中國之尊凶醜敢爾陛下固未聞有文王勾踐復讎雪耻之心臣下亦未見有楊素裴度死難平賊之志如此而望排患解紛建功立業如古之君臣何可得也臣計北狄勢方強盛可以為冦而輙肯議和者有謀也謀而後舉以為萬全之䇿也又計中國之勢如人坐積薪之上而火巳然雖㷔未及其身可謂危矣北狄之強既如彼中國之危又如此而尚不急求所救之術是欲秦之魚爛梁之自亡耶臣備位樞府夙夜憂畏恨未得死所少紓國難願解臣密職與河朔一要郡得以效拙經營邊事雖未敢必謂無虞然料或可稍寛陛下北顧之憂矣伏惟早賜裁幸慶厯四年六月上時為樞密副使上仁宗論契丹不冦河東冨弼臣昨日垂拱奏事准宣諭今來北主雲州受禮恐於河東作過令兩府設備實由臣誤荷奬擢無所施設致此外冦上煩聖憂聞命震驚不遑啓處然退自思念僅得粗略竊謂契丹必不冦河東其事有九無名一也動稱王師不肯竊發二也河北平坦可以長驅必不由河東險阻而來易入而難出三也河北富實河南虚乏必不肯擊虚乏而令我備富實之地四也河北無備河東有備黠虜萌南下之心乆矣臨事必不肯捨無備而冦有備五也若欲乗我不測而入當行詭道出於倉卒必不肯先報雲州受禮六也契丹始與元昊相約以困中國前年契丹背約與中國復和元昊怒契丹坐受中國所益之幣因此有隙屢有怨辭契丹恐其侵軼於是壓元昊境築威塞州以備之而保族累殺威塞役兵契丹又疑元昊使來遂舉兵西伐騐之非詐今必無㑹合入冦之理七也契丹惜燕地如人惜心腹若冦河東豈不防我攻燕為牽制之術於今不聞備燕八也契丹自得燕薊不復由河東入冦九也臣驗此九事故知契丹不冦河東必矣臣今但論目下不為河東之患過此以徃則非臣所知臣謂契丹異日之禍必在河朔河東只可為牽制之地所以臣近奏河北守禦之䇿因乞守一要郡自行其事下二府議之未合只且令田況往彼按臣所説此乃平時悠悠所為非今來確乎至急之意也河朔二三年來雖名為設備其實未堪禦冦乃是張豫備之虚聲適足重敵人之姦計為患愈大不可不思臣前歲奉使契丹理當無所増賂盖為朝廷方盡力西郡未遑北事於是忍羞自屈歲益所入聊以欵兵緩禍而望雪耻於後也臣今欲乞必願俞允不住訓兵備敵以安元元至於身羞國耻庶幾可刷臣不勝大幸慶厯四年八月上於是命弼宣撫河北上仁宗論契丹請絶元昊進貢事丁度等臣等切謂契丹元昊相攻虛實未可知今來書大意且言以元昊不順朝廷之故遂成興兵恐深入討伐之後元昊理難拒絶則是不從北鄙之請堅納西人之盟得新附之小羌違乆和之北狄如聞契丹屯兵甲近在邊陲萬一得書違情生忿回戈我境有以為名夫患有遲速事有重輕此朝廷不可不審度也若阻契丹而納元昊則未有素備之䇿絶元昊而從契丹又失綏懐之信莫若以大義而兩存之臣等謂宜降詔與元昊言昨許再盟盖因契丹有書來言彼是甥舅之親朝廷乆與契丹結和不欲傷鄰國之意遂議開納今却知國中招誘契丹邊户虧甥舅事大之禮違朝廷納欵之本意當湏復順契丹早除嫌隙則誓詔封冊便可施行仍乞於契丹回書中言降詔與元昊若其悔過歸順貴國則本朝許其欵附若執迷不復則議絶未晚如此則於西人無食言之曲於北鄙無結怨之端從容得中不失大義惟陛下裁擇慶厯四年七月契丹遣延慶宫使耶律元衡來告將伐元昊其事略曰元昊負中國當誅故遣林牙耶律祥等問罪而元昊頑獷不悦載念前約深以為愧今議将兵討賊或元昊乞稱臣幸無亟許八月度同學士王堯臣吳育宋祁知制誥孫抃張方平歐陽修等御史中丞王拱辰侍御史知雜事沈邈等上度時為翰林學士承㫖同前余靖臣伏覩契丹人使耶律元衡今月二十四日朝見訖中外臣寮但聞報西征事又知河東邊奏甚急無不憂懼雖北邊事宜云征夾山部落且夾山小族而契丹舉國征之事勢甚大恐似别有謀者臣切思之朝廷於西北大事前後處置失錯所以戎狄乗釁肆其慿陵今者使來必此之故切縁元昊世稱藩臣一旦僣叛招擕出討當自圖之而乃屈中國之威假契丹之援借人之勢權在他人此謀始之失也臣去年在邊庭北主親與臣言梁適去時云伺西事了遣人來謝及以元昊表示臣俾知元昊畏服之意又與臣言乾元節信使回日請子細報來及臣歸朝首言此事只縁吕夷簡病退梁適差出便乃隠諱云無此言暨乾元節信使蕭忠孝來問舘伴張錫錫終不與言元昊商量次第朝廷當元昊叛時則遣使告之及其和約欲就則問而不對必疑朝廷有異議矣此始末不同之失也臣今月十六日曽具奏陳欵其所謀四事一曰借邊兵二曰借邊粟三曰假數年之物四曰絶元昊之和遥度虜情在此而巳必若假借財物拒之有詞惟與元昊絶和最難處置臣切計之遜詞以謝北冦緩詞以欵西戎茍紓歲月之禍誠當今可行之䇿也然臣愚慮兵之禍自此起不宜處置更有失錯今若徇北冦而絶西戎亦有兵禍納西戎而違北冦亦有兵禍二冦連謀共為矛盾之勢北人才去西人必來拒納之間動皆有礙擇禍就輕守之以信使曲不在我即得其要矣必若弃元昊以為外虞堅絶其約使北㓂不能反覆而邀功此最乆安之䇿恐謀者不能終之且元昊所以抗中國者僣尊號改年名不稱臣不奉表此其倔強之勢也今皆捨去而歸我矣三年謀之而一朝絶之及其既去契丹使至将又招之虎狼之性豈不懐忿此起兵之禍也契丹所以取重於中國者亦欲成和好之事專與奪之權也今西戎偃蹇而不從朝廷沈吟而不報及其使我絶之而遽即成之桀驁之氣豈不懐怒此亦起兵之禍也然而彼欲舉兵而使我絶約皆敵人之狡謀耳臣竊料北冦因弋獵之勢為舉兵之名欲邀成功以徳於我若報之曰天下之民一也本朝之兵尚不忍令其戰鬭以趍死傷之禍况鄰國之兵冒白刃而不憂其傷非所以兼愛南北寕失一小蕃不可煩兄弟之國蕭偕回日曽達此誠且未甞乞師無煩大舉若元昊自有釁隙違忤北朝今日出師非復預議又元昊使來每稱北朝之意早縁名體未順難以從之近者稱本朝正朔去羌人僣偽之號而稱臣矣只以事要乆逺故須往復商量今若事體准前固當拒絶但業巳許其每事恭順則受其來歸若來而拒之則似失信且中國以信自守故能與四海㑹同儻失信於西人誰復信其盟約若北朝怒其叛而伐之南朝因其服而捨之共成徳美亦春秋之義也冦雖桀傲固當聞此而悛心矣惟重幣輕使以結之使其有邀功之心則必緩圖我之患矣臣又聞前嵗北兵解甲後幽州亦遭刼掠財物迫奪婦女發掘墳墓燕人苦之今河東近邊恐有衝突須作隄備以戒不虞臣甞觀北㓂氣陵中國捃拾事緒以起釁端歸於强弩相射利劔相擊而巳不可不早備也惟陛下圖之慶厯四年八月上時為同修起居注朝廷以靖言為然即詔靖為回謝契丹使其略曰若以元昊於北朝失事大之禮則自宜問罪或謂元昊於本朝稽效順之故則無煩出師矧延州昨奏元昊巳遣楊守素將誓書入界儻不依初約猶可沮還若盡遵承則亦難却也上仁宗論元昊所上誓書富弼臣近見元昊所上誓書及表奏辭禮恭順一遵朝廷所約只是疆場上㣲有商量候楊守素等到闕乞與婉順商議示以必和之意使之深信不可為其恭順却於元約事外别有詰難邀勒所宜多方容納令無備我之心則必盡力與契丹相持若二冦自相殺伐两有所損此朝廷之福天所假也茍議絶和約或大叚拖延不成則元昊必復與契丹合而為患如故此必然之理也臣料契丹必未肯與朝廷絶好余靖此去保無他虞将來若遣謝使所齎謝物不可過數茍多無益更乞深加詳擇慶厯四年八月余靖等使契丹楊守素等未到闕邊臣先以西人誓書來上故又上奏上仁宗論元昊所上誓書余靖臣竊聞國書到闕議者紛紛以不請深入為敵中㣲詞不敢與元昊誓書緩行封冊之禮以觀其變此皆游談之過也臣昨在邊庭預聞書意彼主親與臣言如行封冊之請遣使深入軍前恐契丹軍馬到彼誤有殺傷即别無㣲意臣又詳觀二冦形勢惟有速行封冊使元昊得以專力東向與契丹争鋒二冦兵連不解此最中國之利設若二冦交兵雖有勝負契丹不能止我之和謀已先定故也假如契丹戰勝元昊伏罪則我與元昊通和契丹自以為功又如契丹戰敗則我與元昊通和在前自非觀望加以契丹意在讎賽元昊豈復妄怨於我此皆理之必然者也儻或朝廷懐猶豫之意謀不早定則事乆變生非我之利切以元昊天生凶狡非獨今日知之且以契丹强盛尚敢侮慢况於中國數戰屢勝徒誘於利乃肯和耳豈是心服若知我逗留以待其變則翻然屈伏於契丹而專力肆忿為患於我未必輕於契丹也臣之愚慮以為封冊元昊在二冦勝負未分以前則元昊有以為恩契丹無以為詞今若慮謀未定二冦交兵萬一契丹戰敗而遣使堅來止我之和則何詞以拒之不如先降敕命差定夏國封冊使俾其知之以堅西賊之心專敵北虜此則鬬二冦之䇿也惟早圖之慶厯四年九月上時朝廷議封冊元昊而契丹使來即遣靖報契丹而留元昊封冊未遣靖見契丹主於九十九泉還上此奏詔從靖言仍令延州先移文夏人十月始降誓詔上仁宗論河北七事冨弼臣伏以河北一路盖天下之根本也古者未失燕薊之地有松亭闗古北口居庸闗為中原險要以隔間匈奴不敢南下而歴代帝王尚皆極意防守未甞輕視自晉祖失全燕之地北方闗險盡属契丹契丹之來蕩然無阻况又河朔士卒精悍與他道不𩔖得其心可以為用失其心則大可以為患安得不留意於此而反輕視哉臣昨奉詔宣撫自渡河而北徧詢土人熟知祖宗以來邊防事機者觀其所説皆有條理太祖太宗之時契丹入冦邊兵或有䘮敗而不能長驅真宗初邊兵亦少失而有長驅之患者何哉盖太祖太宗時屢曽出師深入攻討及冦至又督諸将發兵禦戰敵騎雖勝知我相繼開壁援兵四至無退藏之懼是以怱怱出塞不敢長驅也洎真宗即位懲䘮師之衂遂下詔邊臣冦至但令堅壁清野不許出兵縱不得巳出兵只許依城布陣又臨陣不許相殺賊知我不敢出戰於是堅壁之下不顧而進一犯大名一犯澶淵是故雖無䘮師之失而有長驅之患真宗再駕河朔幸而講和不然事未可知也臣甞為史官竊覧國史以土人之説參驗之大略相合既得祖宗朝守禦利害又伏思今來事體不及祖宗朝其有七朝廷號令不一前後自相牴牾事有緩急四方不能遵行北兵茍動必有闕誤此號令不及先朝嚴明一也自西鄙用兵今七年大小凡經十餘戰每戰必敗官軍沮䘮望風畏怯此威令不及先朝震赫二也北狄之衆又非西賊可比茍有變動何由以威武取勝兩府大臣不敢主事設有所主斷然而行則横議羣興惑亂聖聽以此往往破壊暫行復止是故朝政不舉北狄茍動事繫安危誰敢為朝廷主行之四方多事此執政事者不及先朝大臣主斷三也天下之人恩信不及徭役重大攘肌及骨悲愁怨恨莫不思亂近年凡有盜賊應者如雲足見人心多叛北狄茍動大兵四集百姓必有觀釁而起者自憂内患不暇豈暇防外虞哉此民心不及先朝固結四也朝廷費用浩瀚財物殫竭取於民則民人巳困取於帑則内帑有限今河北諸州軍惟粮儲稍有凖備外其餘藏庫無不空虚北狄一動所費無涯今未有財用所出之計此財用不及先朝豐足五也外有強敵竊窺中國或攻或守須得健將今河朔止有一二人可充偏禆五七人可於陣中役使北狄茍動大兵畢集都未有将帥統領此将帥不及先朝有謀勇而經戰陣六也軍政隳弛士卒驕惰居常少有鈐束不過笞箠已謀殺害都将結扇逃背若急有調發使當矢石則豈無變亂與外冦合勢為孽昨保塞事起滄州兵欲刼瀛州漠州兵欲刼順安軍自餘至城下者無不白日刼人殊無畏憚其事甚近可以為驗此士卒不及先朝肅整七也上件七事盡臣目覩耳聞不敢緘黙恐係邊防大計伏望陛下特留聖念以先朝已試之效而革因循之弊奮自宸斷以為乆長之䇿不勝大幸慶厯五年正月上時為河北宣撫使宋名臣奏議巻一百三十五
