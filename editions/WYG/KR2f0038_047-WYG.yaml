body:
  text: 宋名臣奏議巻四十七宋趙汝愚編百官門宰執中上神宗論除授不經二府蔡承禧臣伏覩近日命趙卨為安南招討使李憲為之副外議紛紛皆云不自二府此雖陛下擇才之明亦必與大臣商議又曰憲所陳請多不經由二府徑批聖語下招討司此果有之乎是非之間臣未易以臆决風傳之事或難盡信然若無其由安得此語臣職居風憲義不可隠茍有聞見宜以悉陳臣竊以人君之職在知言以言任人既難偏用則先參驗其平日之素行又攷察其今日之所能凡所行所能巳先參攷則曰功曰效從可𩔖求自小官而至大吏自大吏而至大臣及夫參預政機圖囘樞要任既重矣察亦至矣故古之知治之君不以疑大臣為嘉謀以擇大臣為重事若夫道不足以簡人君之心行不足以孚天下之衆所措乖戾所為謟邪則敷告外廷去之可也至於使居其職而不責以所任之事使充其位而不責以所行之言内計定而外言得以轉移近習進而輔政之語得以侵奪或文符直行而不領屬於公府或論議陰進而不闗决於樞廷則㓕裂紀綱何莫由此諒朝廷以為事之大者必須僉謀巳令大臣詳論事之小者不欲迂滯祗使小臣開陳或患其宛轉而虚有留難或以其廹急而不暇詳問夫王言之出尤在謹微其初小不留神其後遂為故事某日某事稍繫政經巳嘗不下二府某日某事不繫國體何縁却闗外司樂便疾於一時忘幾㣲於後日一啓其漸寖難改更况於邉廷休戚至重且命大臣者所以同安危而繫休戚者也今至煩莫若邊鎖至重莫若將臣而有不預焉則大臣之能知其任者必皆自疑莫敢安其處矣既不敢安其處則同心同德之義虧矣大臣之罷軟者必曰勢位巳極矣上已為之而又以力争則獲專權之咎矣大臣之不勝其任者必曰此出於聖㫖我何預哉是與其能者為自疑之端不才者為容身之地積此而徃豈國家之利邪而又君逸臣勞勢自當爾主憂臣辱事皆固然未有君宵旰於上而使臣得燕安於其官主憂勞於中而使臣乃恬然於其下者也臣不必逺引古今以國朝言之章聖皇帝責謂李穆天旱如此盈車載俸於汝安乎可謂能知責輔弼之方矣太祖以王著醉於玉堂而悉逐御史此可謂能責彈劾之臣矣盖平日不侵其所職則後日可責以有成臣伏覩近世朝廷所以責臣下者至輕羣臣所以自任其責者尤鮮二府侵奪寺監之職寺監侵外任監司之職監司侵州縣之職方今之弊在所革除豈可相承上下如此則恐權綱一紊拯之則難臣欲乞除命大臣臺諫之外事無巨細非經二府者不得施行其乞不下兩府者悉傅以法其大臣或可疑若不堪其任者速令罷免如二府之論或有異同陛下總攬其成裁斷其可而後行庶盡帝王容下之羙大臣無諉上之咎人人自任其責君臣之間各盡其道熈寜九年正月上時為監察御史裏行上哲宗乞三省事同上奏禀呂公著臣伏覩周官三公三少掌論道經邦寅亮天地然皆分治卿職盖進則坐而論道退則作而行之此三代之明法也唐太宗用隋制以三省長官共職國政事無不緫不專治省事國朝之制毎使殿奏事止是中書樞宻院兩班昨來先帝修定官制凡除授臣寮及興革廢置先中書省取㫖次門下省審覆次尚書省施行毎省各為一班雖有三省同上進呈者盖亦鮮矣此盖先帝臨御嵗久事多親决執政之臣大率奉行成命故其制在當時為可行今來陛下始初聽政理須責成輔弼况執政之臣皆是朝廷遴選安危治亂均任其責正當一心同力集衆人之智以輔惟新之政譬如共輿而馳同舟而濟人無異心則何求而不得何為而不成伏望聖慈留神省察明降指揮應三省事合進呈取㫖者並令三省執政官同上奏禀退就本省各舉官制施行元豐八年七月上自元豐五年改官制後政柄皆歸中書省王珪以左相在門下拱手不復挍正王安禮毎憤懣不平欲正其事而力不能也至是公著除尚書右丞被命未受即為上陳之詔應三省合取㫖事及臺諌章奏並同進呈施行上哲宗論樞宻院侵紊政體劉摯臣准吏部牒十月十六日三省樞宻院同奉聖㫖唐淑問除左司諫等事又牒十月二十八日三省樞宻院同奉聖㫖陸佃等罷侍講事臣竊覩皇宋朝制及近降官制格凡差除有中書進擬者有樞宻院者有三省者有三省樞宻院同進擬者盖建官分職各有所治無相參也三省樞宻院同取㫖者似止於差除帥臣邉鎮大吏内臣近上差遣而巳今差諫官罷侍講不委樞宻院何為而預也外言籍籍皆以三省容縱宻院侵紊政體莫不疑異臣竊謂國家所恃者在紀綱大臣所宜守者在名分綱紀正於上則下無邪志名分治於下則政無多敗一有奪移何患不起况朝廷今日正當尊強君道謹守祖宗法制嚴臣下之分以消壓權僣之心今廢置官吏陛下大政而三省之事也樞宻院干非其職踰法出位横造議論公然犯分臣恐積㣲至著交亂官守漸行私意以害政事上則陛簾之等慢下則傾奪之患生杜漸防微實繫國體欲望聖慈特降詔㫖戒諭三省樞宻院臣寮凡以差除擬進者各依自來條制班次取㫖所貴正名定分事無侵踰以尊朝廷以正在位貼黄稱臣又慮上件差除諌官等事曽降聖㫖特許樞宻院同進借有特㫖乃是聖恩優禮執政欲合同衆論之意而大臣之節自當引義辭免惜朝廷紀綱以安分守不應乘便冒進漸恐隳失體例元豐八年十一月上時為侍御史上哲宗言大臣情志不同事多壅滯劉摯臣聞朝廷正則百官理又曰衆賢和於朝則萬物和於野今夫上之人誠能同德一心徇公憂國則必有和善之政而下無朋比之士茍人懷異意轉相非疑則必有僻違之政而下有向背之俗於是民被其害矣臣伏見昨者皇帝陛下太皇太后陛下聽政之初惠綏天下去民之所不安至於振淹滯絀貪利發政施命無有虛日故近自畿甸逺至海隅莫不鼓舞承風傾耳以聽太平而近者一兩月以來政事號令之見於施行者曠然稀闊中外顒顒無所聞見深求其故皆以謂執政大臣情志不同議論不一之所由致也有陰拱以坐觀者有陽合而内睽者有強横以肆情者有忍恥以懷咎者滯事積前相顧而不發故仁澤屯于上而不下庶事壅于朝而不行以至文書稽留人情隔塞聖人之化雖曰久於其道而後成然固有緩急之勢今事至輕小明有比例或止於一法令之増損一官吏之廢置猶不肯倡端而主論則方今邉鄙之大利害賦役之大是非天下百姓之困苦如在倒垂而望解者誰當任其責何時而議也幸遭聖明哀􅉖元元為廟朝大計而謀國之人方身是䘏方私是圖坐玩嵗月亦可謂不仁矣况今皇帝陛下以盛年居諒闇太皇太后陛下以埀簾而稱制於斯時也而輔弼不咸相勸激非獨政事壅積而巳誠恐疑貳漸深分曹固黨使傾險之士煽於其間上下乖戾何事不生此又臣之所為深憂也伏望聖慈深察事變防㣲杜漸特詔輔臣當務同寅恊恭相示以信去其貳志以濟國事應今來政事之稽滯未决者趣令條上取㫖則望聖明發自睿斷别白施行以幸天下元豐八年十二月上上哲宗乞五事論相之得失梁燾臣聞自古聖君賢主任用宰相必取天下公議之所在者得公議則人望得得人望則人心得得人心則四海歡欣交通而無事四海歡欣交通而無事則坐享太平之福隆太平之基矣伏惟太皇太后陛下嚴静仁明與天無私恭惟皇帝陛下孝敬聰哲嗣隆正統宜得老成道徳之臣以為宰相濟以二三耆哲同寅恊恭咸有一徳使聖賢事業相須而成康靖之功此宗社之福生靈之幸也夫天下之人所共尊敬依歸者人主也宰相不敢為欺蔽侮慢是與天下之人同心以事其上也以是而人心喜之公議從而歸矣以其盡忠盡公也宰相敢為欺蔽侮慢是不與天下之人同心以事其上也以是而人心怒之公議從而去矣以其不能盡忠盡公也當公議所歸人主雖欲不用之不可得也若不用之是抑天下人之喜心也邦國所以安者以人有喜心也喜心豈可抑之哉是雖欲不用亦不可得也况有用賢之志乎當公議之所去人主雖欲用之不可得也若用之是激天下之怒心也邦國所以危者以人有怒心也怒心豈可激之哉是雖欲用之亦不可得也况有去邪之志乎前世之主皆務崇用輔佐以興起治道然而一失所由流患後世初有害政之累終有難制之憂甚可懼也惟聖君賢主為能得之於是獲上天之敷祐洽四海之懽心其初至明甚易也臣輙言人主聽言受事之規摹以廣論相之得失惟陛下録其忠而裁擇焉宰相者患專權固位竊用人主之威福也夫持權久者習強矣未有不好其權者也居位安者貪寵矣未有不固其位者也好權則忌人為切固位則謀身為深公議之所不與也有以恭儉行已夙夜在公善則稱君過則稱巳不敢避所難不敢忽所易唯知尊主威而盡忠於上可謂不好權不固位矣是公議以為可任宰相者也宰相患在立朋黨以私㓕公相為傾危而䝉人主之聰明此公議之所不與也有以中立不倚孤忠自守進一士必以其公譽而不敢以私愛也既進之必曰主上之明以避其恩退一吏必以其公毁而不敢以私惡也既退之必曰朝廷之公以當其怨國家之事必正色直言力行而不回不委曲交結以避一身之危不俛仰顧忌以藉衆力之助唯知尊主威而盡忠於上可謂不立黨矣是公議以為可任宰相者也宰相者患在以權位妄自尊大以逼主勢上有輕易人主之心下有凌侮多士之氣此公議之所不與也有以謙虛冲約折節下士不恤巳之勞苦以君逸民安為急不恤巳之菲薄以君裕民富為先唯知尊主威而盡忠於上可謂不以權位妄自尊大矣是公議以為可任宰相者也宰相者患在不以正道事其君不恤是非利害唯君意之是成唯君欲之是從至於政疵民病而不為顯言依違因循而不為更張此公議之所不與也有以大公至正為心與人主同道一德慨然以立忠言奮然以行正事意在成國家之利而除生靈之害唯知尊主威而盡忠於上可謂以正道事其君矣是公議以為可任宰相者也宰相者患在務結私恩蔽善醜正誘集羣邪陽尊忠良陰結姦惡捍據要路相為死黨一倡十和表裏相應幸上之未悟得以肆行其志此公議之所不與也有以樂善好賢安君静民為事謂爵禄人主之柄也非臣下所敢專必公言於廟堂而請决於上使清明之恩平行而直流開張公道銷除姦朋唯知尊主威而盡忠於上可謂不結私恩矣是公議以為可任宰相者也凡此五者所宜辨也君臣之大要古今之先務也人主得之以為安榮失之以為憂悔故聖君賢主必明察而審擇獨㫁而力行也陛下如天大明無幽不燭真偽邪正判别白黑誠以曉然知公議之所在者自有人矣伏願自強明德任賢勿貳用公議所在早命宰相以慰人望以收人心自然陰陽和而風雨時矣一旦明制布告廷臣喜色相視國人歡聲相聞四方忠義咸歸一德天下之願也臣跡在踈逺接士民最近聞公議為真且熟輙敢布於天聽願陛下信其公議之在下者果如此也臣逺觀詔書近覩政事仰識聖意明目達聰欲通下情而盡公議樂聞直言不吝改作是正人端士千載㑹遇不可失之時故臣不敢苛舉細故上凂宸聰輙忘僣越論國家之大者逺者臣區區之誠以謂人主之職在論一相論相之得失安危之所以分干冒宸嚴臣不勝盡節竭誠激切之至元祐元年正月上時為太常少卿上哲宗論擇相不可不謹王巖叟臣竊觀詩書所載歴代傳記之所著其稱帝王能事莫大於知人知人所先莫先於輔弼輔弼得賢則百寮任職而上自處於無為之地矣至簡而全人君之羙不勞而收天下之功故臣區區愛君之心願陛下無失乎此也伏思陛下聽政方踰年而治道巳清四方巳寜人人之心驩欣交通而無所不足者陛下進賢退侫如指白黑之效也今輔臣缺位臣知陛下擇賢而任之必無所誤然中外之人莫不翹首拭目以觀陛下此舉臣不可不告陛下其戒之重之孔子曰衆好之必察焉孟子曰左右皆曰賢未可也諸大夫皆曰賢然後察之見賢焉然後用之陛下以孔孟所以不輕信之心而取之庶乎其無失矣陛下念公忠之臣得之難也不可不勞心於初以求之誠得其人則陛下逸矣念侫邪之人去不易也不可不精意於初以别之誤進一人則陛下憂矣自古以來世主之患患在喜髙名之士而陋少文之人曽不知髙名之下有姦才少文之中多重噐不可不辨也成天下之業敗天下之事常爭於辨與不辨毫釐之間耳賢者居廟堂則上可以尊天子重朝廷下可以安百姓鎮四夷一非其人則國事危而人心揺矣羣邪𩔖升百偽交作陛下雖欲奠枕而卧有不可得也陛下之憂實臣之憂敢於未然傾㵼肝膽庶幾有補萬一惟陛下采納幸甚貼黄竊以命執政大臣不與差除百官同也百官雖進若不合公議退之甚易執政既進朝廷便繫體貌雖陛下悔而欲罷亦有所不可所以不可不謹之者此也初若不謹後致人言則陛下傷知人之明矣元祐元年上時為左司諫上哲宗論宰相不當闗决細務上官均臣聞朝廷設官分職所以治事位有髙卑則事有煩簡事有煩簡則心有勞逸位尊者宜逸不逸則不足以謀天下之大務位卑者宜勞不勞則不足以理天下之庶事夫宰相之職弼諧人主運旋樞極其視百官位尊任重天下之事無所不總然而所該者衆則力有不逮致詳於小則大有不及此勢之必然也昔漢陳平為丞相文帝問以决獄錢穀之數陳平以為當責廷尉内史宰相者上佐天子理陰陽四時下遂萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得其職此可謂知宰相職任矣唐太宗嘗謂房喬曰公為僕射􅂇朕廣耳目訪賢才比聞閱視訟牒日數百豈暇求人哉乃敇細務屬左右丞大事闗僕射此言宰相不當親細務也臣竊見比年左右僕射毎至都省閱視訴牒多及百餘少不下三五十又省吏呈禀文書與夫常行細事不知其幾方陛下臨御之初講修百度左右大臣所宜虛心盡謀董正綱紀以副陛下求治之意今則視聽分於訴牒智慮勞於細務臣竊恐政教之大要生民之大利病人才之能否禦戎之操術繫天下之安危治亂者有不暇深思而詳講將有偏弊不舉之處臣竊為陛下惜之今之左右二丞與夫六曹尚書其於謀主體㫁國論分領列部委寄選任不為不重臣欲乞以省中事務𩔖分輕重某事為闗尚書某事為闗二丞某事為闗僕射尚書可以覽决者不必闗二丞二丞可以决者不必闗僕射如是則位愈髙者任愈大任愈大者事愈簡事愈簡者心愈逸事簡心逸則天下之大務得以熟慮而詳究長策逺馭建萬世之基業較省覽訴牒勞心細務利之小大固相逺矣元祐元年七月上時為監察御史僕射司馬光等入白劄子進呈言今欲應尚書省事舊有條例事不至大者並委六曹長官一面専决應奏上者奏上應行下者行下其有衝改條貫或應臨時特取㫖及事體大非六曹所能専决者即申都省常呈文字並只要左右丞一面批判指揮施行事體稍大及有所疑者方與僕射商量同批判所是諸色人辭状只委左右丞一面收接可留即留可退即退若六曹判㫁不當及住滯不决即别委不干礙官定奪是非及根究住滯因依若顯有不當及無故住滯其本曹官吏即行按劾所貴上下相承各有職分行遣簡徑事務辦集上哲宗乞合兩省為一司馬光臣等聞三王不相襲禮五帝不相㳂樂况國家設官分職張立治具上下相維修飾明備何所愧於漢唐何必事事循其陳迹而失當今之宜也謹按西漢以丞相總百官而九卿分治天下之事光武中興身親庶務事歸臺閣尚書始重而漢公卿稍巳失職矣及魏武佐漢初建魏國置祕書令典尚書奏事文帝受禪改袐書為中書有令有監而亦不廢尚書然中書親近而尚書踈外矣東晉以後天子以侍中常在左右多與之議政事不獨任中書於是又有門下而中書權始分矣降及南北朝大抵皆循此制唐初始合中書門下之職故有同中書門下三品同中書門下平章事其後又置政事堂盖以中書出詔令門下掌封駮日有争論紛紜不决故使兩省先於政事堂議定然後奏聞開元中張說奏改政事堂為中書門下自是相承至于國朝莫之能改非不欲分也理勢不可復分也曏日所謂中書者乃中書門下政事堂也唐末諸司使内臣領之樞宻使參預朝政始與宰相分權矣降及五代改用士人樞宻使皆天子腹心之臣日與議軍國大事其權重於宰相太祖受命以宰相主文事參知政事佐之樞宻使專掌武事副使佐之自是以來百有餘年官師相承中外安帖百司長官及諸路監司諸州長吏皆得專達或申奏朝廷或止申中書樞宻院事大則中書樞宻院進呈取㫖降敕劄宣命指揮事小則批狀直下本司本路本州本人故文書簡徑事無留滯神宗皇帝以唐自中葉以後官職䌓冗名器紊亂欲革而正之誠為至當然但當據今日之事實考前日之訛謬刪去重複去其冗長必有此事乃置此官不必一依唐之六典分中書為三省令中書取㫖門下覆奏尚書施行凡内降文書及諸處所上奏狀申狀至門下中書省者大率皆送尚書省尚書省下六曹六曹付諸案勘㑹檢尋文書㑹問事節近則寺監逺則州縣一切齊足然後相度事理定奪歸著申尚書省尚書省送中書取㫖中書既得㫖送門下省覆奏畫可然後飜録下尚書省尚書省復下六曹方符下諸處以此文字䌓冗行遣迃囬近者数月逺者踰年未能結絶或四方急奏待報或吏民辭訟求决皆困於留滯又本置門下省欲乞封駮中書省録黄樞宻院録白恐有未當若令舉職則日有駮正争論紛紜執政大臣遂成不恊故自置門下省以來駮議甚少又門下不得直取㫖行下雖有駮議必須却送中書取㫖中書或不捨前見復行改易又内批文字及諸處奏請多降付三省同共進呈則門下之官已經商量奏决若復有駁正則為反覆近日中書文字有急速者徃徃更不送門下省然則門下一官殆為虛設徒使吏貟倍多文書䌓冗無益於事臣等今衆共商議欲乞依舊令中書門下通同職業以都堂為政事堂毎有政事差除及臺諌官章奏巳有聖㫖三省同進呈外其餘並令中書門下官同商議僉書施行事大則進呈取㫖降勑劄事小則直批狀指揮一如舊日中書門下故事併兩省十二房吏人為六房同共㸃檢鈔狀行遣文書若有溢貟除揀選留住並特與减三年出職不及三年應出職者與减磨勘年限若政事有差失委給事中封駮差除有不當委中書舍人封還詞頭又兩省諫官皆得論列則號令之出亦不為不審詳矣如此則政事歸一吏貟不冗文書不䌓行遣徑直於先帝所建之官並無所變更但於職業㣲有修改欲令於事務時宜差為簡便其委曲條目並候得㫖允許續議修立元祐元年光作奏欲與吕公著韓維張璪同上㑹光薨四年八月光之子康始録進呈上哲宗論司馬光薨當謹於命相朱光庭臣竊以君臣之義均乎一體股肱或傷何痛如之司馬光天生正人為陛下出整齊法度惠養元元内則招俊又以在官外則鎮蠻夷而歛袵其精忠貫天地大節扶邦家正直格神明康濟逮黎庶佐佑聖政除去敝事十有八九朝廷巳清明矣天下巳安樂矣光雖疾病中疚心王事造次顛沛未嘗離去以至盡瘁没身至誠至公古人無與比可謂之真宰相矣陛下乍失良弼痛傷應深今司馬光身雖歿而孜孜為朝廷深意願陛下勿忘也司馬光之才業人或有之其愛君愛民之心求之天下未之見也愛君不敢欺愛民惟恐傷而今而後陛下毎見敢欺罔吾君者願以司馬光為法逐而勿用也然則欺罔者何以見之謂吾君不能居仁由義而又不能陳善閉邪惟能逢迎其惡者是乃欺罔者也毎見敢殘虐害民者願以司馬光為法逐而勿用也然則殘虐者何以見之厚歛以困其財勞役以竭其力窮兵黷武置之危地是乃殘虐者也此皆司馬光平生之深疾願陛下常存此心以察羣臣使公忠進而欺罔退豈弟興而殘虐亡則司馬光之死猶生之年也方今朝廷法度雖巳修而未全恵澤雖巳施而未浹正在陛下堅初志思至忠勿惑小人邪說而忘司馬光所以為朝廷孜孜之意不可變易巳行政事也明堂大禮巳畢張璪必當罷去陛下勿固留善退之可也命相陛下必有以處之執政中尚闕兩貟除授之際宜取天下之公望以忠厚公正器識宏逺可以勝大任者任之勿為近習所惑妄有所許則言者不敢負職事除授既得其人臣亦妄言矣伏望聖慈預深思慮擇任賢臣以幸天下元祐元年九月上時為左正言上哲宗論司馬光薨當謹於命相劉摯臣伏見左僕射司馬光薨逝朝野人情驚悲一詞皆曰天乎不憗遺一老以大濟我國家而奪之速此何理也臣恭惟陛下以至明至聖首識光忠置諸左右舉天下以聽之而光亦以大忠直道忘身徇國雖姦謀異心百端排沮而横身當之夙夜盡瘁以死圖報其純誠至公足以薦天地而貫神明真所謂社稷之臣矣然而非陛下信任之明仰成之篤則光亦安能自行其志故天下不獨美光事君之盡節而以陛下任賢不貳為難能也今光云亡兩宮車駕即日臨奠賻襚之典有加故常下至搢紳善士閭巷鄉野之人罔不為之哀嘆而唯是姦邪之黨醜正惡直之徒頗巳相與有竊喜之意蓋小人從來怏怏不便於新政藏情匿跡日夜窺伺常幸有非意之變以冀善治之不能成今其臆度以謂陛下既失光之助則前日求治之志必稍變懈遂可以乘便投隙熒惑而動揺此其所以喜也且陛下為政以來收㧞衆正布列上下制國之法除民之害雖節文潤色有未齊者至於大本巳定十之八九矣惟陛下益加之意常以辨别邪正保邦愛民為念堅守此指終始如一而巳行之令持循無變則治道成矣廟堂之上必有如光之事朝廷者臣實懼陛下悼光之後謂誰助我者而意稍有間則邪謀陰計或起而乘之此臣之所以為私憂而獻其說也抑臣又有過計之言盖今上宰虛位竊惟不日制詔命相矣此尤不可以不謹外論籍籍謂文彦博必代光之任臣固知不然然於萬一之中不可以不言彦博年逾八十爵位窮極於天下矣前日陛下假其威望以為朝廷之重其官則天下之師其職則平章軍國重事陛下之禮元老尊崇優佚可謂得其體也今若任之以為相三省有職守矣其成敗之責豈師臣之所宜當其䌓悉之務豈老人之所能辦殆非所以處彦博也又彦博於知人非其所長賢士大夫罕出其門近日有所薦論衆皆傳之為笑若居上相引用人物每毎如此今日引一二明日引三四積而至於百十常才列于朝路非小害也其人重其位髙有所薦者若陛下違其言則傷恩皆從之則害政又非所以安彦博也臣昨四月中巳曽建論此事矣故今日之命相實繫天下之安危與善政之成敗可不重哉伏望陛下詳考歴選得其人而任之以尊廟社以厭公議臣不勝隕越待罪之至惟陛下赦其愚而察其忠元祐元年九月上時為御史中丞上宣仁皇后論大臣輔政不當顧慮形跡范純仁臣近見執政議論以章子厚父年將九十因明堂恩霈之後欲請除一鄉郡使便其親臣但見其可裨仁化不慮其他遂共以為當然繼而聞三省奏上陛下即賜允許臣以陛下天地之仁念其埀老之親不録徃咎臣實喜不自勝遂於簾前仰賛聖徳以謂自古臣子無如今日遭逢繼聞諫官有言陛下遂寢前命亦是聖心從諫之美前日更䝉宣諭此事三省有失思慮戒其今後不得如此臣愚恐有言者以謂朝廷所怒之人不當遽有開陳又謂執政都徇人情必有主張之者致煩陛下宣敕戒諭丁寜㣲臣固宜佩服聖訓然有未盡之懇亦當罄竭敷陳方陛下急於求治之時是臣子知無不為之際豈宜顧慮形迹蓄縮周防今所用大臣多是老於患難陛下奬之使進尚恐立志不銳思慮太周若更戒使逺嫌則恐顧避保身自防不暇在陛下愛惜諸臣則為恩徳之厚若使輔翊聖政却恐事無所禆盖人臣以匪躬自信為難媕娿固寵為易若今容其所易沮其所難則其間希意顧望之人翻為得計甚非朝廷之福伏見仁宗皇帝唯委執政一無所疑凡所差除多便從允而使臺諌察其不當隨事諭奏小則旋行改正大則罷免隨之使君臣之恩意長行朝廷之綱紀自正是以四十餘年不勞而治况陛下方稽仁皇之治聖度如天從諌不倦任賢不疑紀人之功忘人之過皆是自古人君所難若更垂拱責成逸於委任臺諫紏其誤謬侍從罄其論思羣臣一徳一心陛下無為無事自然不須防慮百職具修坐致太平垂休萬世天下幸甚貼黄凡人於富貴功名皆願乘時早立近用二三執政年皆六十巳上或七十正是餘年無幾今幸遭逢陛下行堯舜之政擢居近輔可謂千載一時不於此時攀附神聖早立功名不知更待何日豈肯别懷顧望阿徇他人自取上疑以招危辱在常情且無此理况陛下以公望選擇之人哉其間或有進人不敢太速責人不敢太深者不過謂事當馴致不可黑白太明却恐扇成朋黨害陛下和平之政矣萬一因此恐有間言誤陛下不細又䝉宣諭譬如人家尊長所怒之人卑幼豈可輕易寛解臣愚以謂不然盖人主之量當如天地無所不包衆人所欲進退則人主從而行之所謂舍巳從人便無喜怒好惡之迹不使姦人測見意㫖别生讒間以惑聰明古今盡然商鑒不逺惟陛下稽測唐魏徴有毁其阿黨親戚於太宗者帝使温彦博責以不避形迹逺嫌疑徴謝曰臣聞君臣同心一體豈有置至公事形迹若上下共由兹路邦之興喪未可知也帝矍然曰吾悟之矣以此可見自古君臣之間不當更事形迹此陛下之所熟聞臣敢引而言之元祐元年十月上時同知樞宻院上哲宗論韓維不當罷門下侍郎呂公著臣伏思陛下自臨政以來慈仁寛大判别忠邪於輔弼之臣毎加優禮故得上下安樂人情恱服今來韓維必是進對之間語言乖謬上觸龍鱗然維昨與范百禄争論刑名等事若以為性強好勝則有之亦未見姦邪事迹若以奏劾臣寮當有章䟽則自來大臣造膝宻論亦未嘗須有章疏比來批語所罪恐未足以宣示四方兼維素有人望久以直言廢棄陛下始初清明方䝉收用忽然峻責罪狀未明慮必讎嫌之人飛語中傷以惑聖聽况五六十年來執政大臣不曽有此降黜恐中外聞之無不驚駭自此人情不敢自安臣又竊思皇帝陛下春秋方富正頼太皇太后陛下訓以仁厚之道調平喜怒以復仁祖之政若大臣倉猝被罪則小臣何以自保臣受陛下恩與常人不同意欲致君於堯舜措國於不傾以報陛下故今來雖當雷霆之怒不敢愛身以陷陛下於有過之地伏望少留聖慮其批降指揮見只在臣處收掌聽候聖㫖元祐二年十月上時為尚書左僕射上哲宗論韓維不當罷門下侍郎吕大防臣今據呂公著封送録到降付中書省御批指揮一件為門下侍郎韓維面奏范百禄不當可守本官分司南京及稱一面繳奏元降指揮臣竊詳韓維忠讜有素士望甚重陛下自初臨政擢維於沉滯之中委以柄用賢士大夫莫不稱頌盛德為之相慶一旦忽以奏事差失遽行譴責恐非所以風示四方開接衆正之體公著不令臣知一靣論列必巳竭盡至誠上裨聖治伏望天慈詳察特為開納况維所坐至細止是拙於奏陳未可加以重責若此命一出則人人有不自安之意繫今日治體之根本伏望深思而熟察之少息雷霆之威使全臣子進退之分臣不勝至懇至願元祐二年十月上時為中書侍郎上哲宗論韓維不當罷門下侍郎范純仁臣竊聞韓維有與外任指揮臣伏覩韓維公忠篤實禀於天性議論賞罰據理直前盡心國家不避嫌謗陛下用為執政可謂股肱之良伏惟陛下寛仁大度委任羣臣進退輔弼咸以至公今韓維未聞别有大過不候封章陳請遽然遂去必有姦人宻行譛愬上誤聖聰致陛下用賢不終使大臣失進退之節實恐正人失望有虧聖政伏望陛下深加睿思或因臣寮開陳却令追寢前命以成帝堯舍已從人之心以繼商湯改過不吝之美臣被恩殊異難以緘黙伏望聖慈深賜采察天下幸甚臣與韓維亦霑姻戚既欲上裨聖化難以避嫌自安更乞聖慈徧詢文彦博呂公著巳下諸大臣則知維之邪正若維果是正人則雖有些小過失全望陛下主張若以小過去之是使姦人得計恐非天下之福臣聞謗韓維者多言其引用親戚乞陛下將進用過韓維親戚徧問三省元是何人發意因與不因韓維自然有無阿私事狀明白庶不誤陛下至公懲戒之意元祐二年十月上時為同知樞宻院上哲宗論韓維不當罷門下侍郎王存臣昨日赴崇政殿上壽聞班列中口語籍籍云韓維罷知外州問之皆不知所因臣雖未審端的然衆聽驚駭若遇敇黄過省然後論列則徒紛紛無補闕政是敢不避冒死之誅罄陳誠欵唯陛下留聽伏見維秉心端亮有古大臣之風在熈寕元豐間以論事不合久斥外任陛下臨御首先㧞擢寘之經筵遂參柄用天下公論以為朝廷得人觀維辭氣慷慨亦自謂老年被遇君臣道合千載一時故每激厲思有補報至于刑名小事一一盡心議論之間多所詆忤人或謂維執滯而維以此自任原其用心本欲報國今來忽除外郡衆論忷忷皆不知其得罪之由若維有陰慝隱姦聖心獨知為人所指擿亦當明示中外使判然無疑若謂舉措失當則朝廷並是三省同共商量豈容維得專之今獨加罪於維其他豈可幸免大率賞罰貴在明白大臣進退君子小人消長所繫自元祐以來罷黜執政亦未見有如此暴者此中外所以駭且疑也臣自受命為丞轄之日被受德意今來進用出於太皇太后親選不由左右援引宜盡心報國臣仰服聖訓日夜惕勵思報萬一今覩中外疑駭之事而隠黙不言則有負陛下知奬臣亦何顔處此伏乞少留聖慮若維别無顯過伏乞聖度包容特寢今來指揮兼維曽以年老請外他日若賜允從即君臣之間恩義兩全元祐二年十月上時為尚書右丞上哲宗論韓維不當罷門下侍郎係第二狀曽肇臣前日輙違詔命妄陳所見退省僣冒恭俟刑誅不謂陛下赦其狂愚特賜詔札委曲誨諭如父訓子臣豈不知從命順㫖為得理逆命忤㫖為有罪然臣一門之内世受國恩陛下擢臣備位近侍保全長育德澤深厚臣儻貪於承命懷不盡之心致天下之論謂陛下聽决萬幾三年於此辨别忠邪賞罰功罪無不曲當而獨於此有過舉之累則臣之負國罪何可逃臣之報君義將安在此臣所以不避萬死之責傾冩肺肝兾有補於萬一也臣前奏乞令韓維指陳范百禄所為不正非欲令維與百禄較正是非止欲考覈維之欺君與不欺君爾若維所陳皆中百禄之病則是維為執政敢為朝廷别白邪正是非真得大臣之體雖案牘不具出於口奏豈可謂之欺哉若維所陳皆失事實則其欺君罔上事理灼然明正典刑人心自服盖執政大臣參預國論其於論議臧否人物不一一須形文字但顧所言當與不當推而行之人心服與不服爾豈以一無文字便謂之欺惟是百官有司有所陳列須具劄子奏狀自達非如執政大臣朝夕進見故不得不然也古者坐而論道謂之三公豈以具案牘為事哉今陛下責維徒口奏而巳遂以謂有欺君之意臣恐命下之日人心眩惑以謂陛下以疑似之罪而逐大臣恐於陛下盛德不為無損也執政大臣自此以維為戒無敢開口議論否臧人物君臣上下更為形迹恐非陛下推赤心以待大臣之誼亦非大臣展布四體以事陛下之道也夫執政大臣天子之所體貌所以共安危治亂者也古人以謂人主之尊如堂羣臣如陛陛亷逺地則堂髙又言二千石尊重難危乃能使下夫二千石盖一郡守爾猶不可輕易去之况陛下左右執政之臣有堂陛之勢者乎臣受陛下厚恩食朝廷重禄豈有私一韓維以負陛下然臣惓惓不能自巳者為朝廷惜進退大臣之體爾伏望陛下察臣心澄神熟慮儻䝉採録乞如前奏施行所有誥辭未敢修撰元祐二年十月上時為中書舍人宋名臣奏議巻四十七
