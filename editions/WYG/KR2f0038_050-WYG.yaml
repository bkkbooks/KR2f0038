body:
  text: 宋名臣奏議巻五十宋趙汝愚編百官門經筵上仁宗乞命臣僚等講無隱諱趙抃臣竊以人主之御天下也其聰明必欲廣聰明廣則禍福之鑒逺矣其尊威必欲重尊威重則上下之理明矣伏惟陛下承祖繼宗體堯蹈舜睿聖仁厚固四海稱頌之不暇何闕遺之有焉然臣備位諫垣朝慮夕思不敢循黙者庶㡬有補於未至萬分之一爾夫易之吉凶詩之美刺禮之汙隆樂之治亂春秋之善惡以至史𫝊之書先代得失存亡無不紀述今經筵侍講者講吉不講凶講治不講亂侍讀者讀得不讀失讀存不讀亡臣愚以謂非所以廣聰明之義也伏望發徳音命經筵臣寮臨文講誦無有隱諱至於吉凶治亂得失存亡之所由兆尤宜詳究鋪陳之使禍福之鑒日聞宗廟社稷無窮之福也夫帝王文章天子翰墨真圗書之祕寳實聖神之能事今夫輔弼左右之臣宦官近戚之家碑石挽詞佛榜僧號或上求御製或仰覬宸翰咸出非望多遂其請臣愚以謂非所以重尊威之道也伏望惜堂陛之崇秘奎璧之彩謹重命賜杜絶倖望上下之理從而益之朝廷中外莫大之幸也二者惟陛下留神察焉嘉祐五年上時為右司諫上英宗乞開講筵不可以寒暑為辭司馬光臣伏覩講筵所告報依乾興年故事講論語讀史記續奉聖㫖直候來春臣聞𫝊記曰王人求多聞時惟建事學于古訓乃有獲又曰念終始典于學厥徳修㒺覺然則學者帝王之首務不可忽也况今陛下初臨大寳所宜朝夕延訪羣臣講求先王之道覧觀前世之成敗以輔益聖徳緝熈大化不可但循近例以寒暑為辭如此使下情何以通四方何以觀望殆非所以廣聰明宣令名也伏乞依前降聖㫖指揮日開講筵嘉祐八年十一月上時為天章閣待制知諫院兼侍讀上英宗論既開講筵未宜遽罷司馬光臣伏覩講筵所告報奉聖㫖令自九月初五日後逐日開講筵至重陽節住講候將来開春别選日開講筵臣竊以國家夲設經筵欲以發明道誼禆益聖徳先帝時無事常開講筵近嵗因聖體不安遂於端午及冬至以後盛寒大暑之時權罷數月今陛下始初清明方宜鋭精學問之時而五日開講八日已罷臣恐議者以為陛下非有意於求道但欲循故事備外飾而已羣臣非有意於明道但欲塞職業求賜賚而巳若果如此臣竊為朝廷羞之且陛下近増置諸宫教授仍下詔戒勉宗室使之鄉學儻陛下不以身先之則宗室安肯奉詔哉臣愚以為陛下若别有所為未暇開講則宜俟他時亦未為晚若既開講筵則恐數日之間未宜遽罷治平元年九月上時為天章閣待制知諌院兼侍講上英宗乞御邇英詢問講讀臣僚韓維臣幸得以史官侍左右記言動竊見每開邇英閤召近臣講讀經史陛下未甞一發徳音有所詢問遂使執經者不得極其說秉筆者無所載其美已事而退莫不俛黙有不自得之意臣竊惑之臣聞傅說有言王人求多聞時惟建事事不師古以克永世匪說攸聞蓋治天下者必先於建事欲建事者莫重於師古欲師古者莫急於求多聞然則今之所謂講筵者陛下之所以求多聞也堯舜聖帝必先稽古三代令王皆有師傅之官坐論道義爾後徳薄不能如古然至於欲治之主亦莫不以此為急漢髙祖初得天下感陸賈之言知不可以馬上治之每奏新語帝輙稱善光武數引公卿郎將講論經理夜分乃寐唐太宗命學士杜如晦等十八人更直閣下降以温顔與之講論經義此數君者豈徇虚名者哉誠以治天下之要莫不出此故功業隆於當時聲名流於後世非其幸也其道有以致之也朝廷自宰相以及羣司率以職事進對所言皆目前常務而又迫於景晷不得詳盡其理唯邇英閤者陛下燕閒之所也侍於側者皆獻納論思之臣陳於前者非聖人之經則厯代之史也御閒燕則可以留漏刻之頃承對侍臣則可以極咨訪之博論經史則可以窮仁義之道禍敗之原鑑而行之則上可以為堯舜三代之君下不失為漢髙祖唐太宗也然而非從容降接則無以盡臣下之情非反復研究則無以見聖人之奥非力而行之則不足追前古之治陛下於此三者似未盡之此臣所以不得不惑也雖羣臣亦皆惑之議者又竊以為陛下鄉在亮隂唯于咨决政事有不得已而言爾其餘可得而畧也今禮制既終臣下傾耳以聽玉音語曰時然後言陛下之言此其時矣臣雖不敏請秉筆以俟治平二年七月上時為修起居注上哲宗乞於兩制以上選擇講讀官劉摯臣竊以聖人之徳其聰睿神智固天性之所自有然孔子曰吾非生而知之好古敏以求之者也孟子亦謂人皆有是四端猶火之始然泉之始達在乎充之而已茍不充之將失其本然則性雖聖人方其始也學問以達之範圍以成之者其可少哉昔者周成王㓜冲踐祚其師保之臣傅之徳誼道之訓教者周公召公太公其人也夫左右之人既如此則成王雖㓜其耳目所入蓋無有不正者矣我仁宗之初亦以盛年嗣服用李維晏殊為侍讀馮元孫奭為侍講唯兹數人皆名儒宿徳極天下之選是時方親庶政聽政之暇每於雙日召入侍講說經典或講祖宗故事盛明之政慶澤無窮恭惟皇帝陛下紹膺天命𫝊序統業夫以異禀之質夙成之善而又上有太皇太后陛下之至仁厚徳保護開祐所以成就者㒺不備至矣然方春秋鼎盛在所資養左右前後宜正人與居語黙見聞宜正事是接所以起善養源保㣲謹始尊徳性而長智習致廣大而熈光明則勸講進讀輔導之官其可不審擇也哉伏見兼侍講給事中陸佃蔡抃皆新進少年越次暴起論徳業則未試語公望則素輕使在此官衆謂非宜伏請罷其兼職以允公議仍欲望聖慈於内外兩制以上官内别選通經術有行義忠信孝悌淳茂老成之人以充其任遇非聽政之日便殿燕坐時賜延對使之執經誦說陳天下之義理今昔君臣父子之道以廣睿志仰副善繼求治之意元豐八年十月上時為侍御史得㫖佃抃皆罷遂命趙彦若兼侍讀傅堯俞兼講讀上宣仁皇后進經筵三劄子程頥臣昨日上殿面奉徳音除臣崇政殿說書臣雖瀝懇辭避不䝉俞允臣輙有愚誠昧死上聞天聽竊以知人則哲帝堯所難雖陛下聖鑒之明然臣方獲進對於頃刻之間陛下見其何者遽加擢任今取臣於􅅵畆之中驟置經筵蓋非常之舉朝廷責其報效天下之所觀曯茍或不當則失望於今而貽譏於後可不謹哉臣未敢必辭只乞再令臣上殿進劄子三道言經筵事所言而是則陛下用臣為不誤臣之受命為無愧所言而非是臣才不足用也固可聽其辭避如此則朝廷無舉動之過愚臣得去就之宜伏望聖慈特賜俞允第一臣伏覩自古人君守成而致盛治者莫如周成王成王之所以成徳由周公之輔養昔者周公輔成王㓜而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善教子弟者亦必延名徳端方之士與之居處使之薰染成性故曰少成若天性習貫如自然伏以皇帝陛下春秋之富雖睿聖之資得於天禀而輔養之道不可不至所謂輔養之道非謂告詔以言過而後諌也在涵養薫陶而已大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化徳器成就欲乞朝廷遴選賢徳之士以侍勸講講讀既罷常留二人直日夜則一人直宿以備訪問皇帝習讀之暇燕游之間時於内殿召見從容宴語不惟漸磨道義至於人情物態稼穡艱難積久自然通達比之常在深宫之中為益豈不盛大竊聞間日一開經筵講讀數行羣官列侍儼然而退情意畧不相接如此而責輔養之功不亦難乎主上冲㓜太皇太后慈愛亦未敢便乞頻出但時見講官乆則自然接熟大扺與近習處久熟則生䙝慢與賢士大夫處久熟則生愛敬此所以養成聖徳為宗社生靈之福天下之事無急於此貼黄臣竊料衆人之意必以為皇帝尚幼未須如此乃淺近之見夫㓜而習之為功則易發然後禁禮經所非古人所以自能食能言而教者盖為此也第二臣聞三代之時人君必有師傅保之官師道之教訓傅傅其徳義保保其身體後世作事無本知求治而不知正君知正過而不知養徳傅徳義之道固已疎矣保身體之法復無聞焉伏惟太皇太后陛下聰明睿哲超越前古皇帝陛下春秋之富輔養之道當法先王臣以為傅徳義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏謹之心臣欲乞皇帝左右扶持祗應宫人内臣並選年四十五以上厚重小心之人服用器玩皆須質朴應華巧奢麗之物不得至于上前要在侈靡之物不接於目淺俗之言不及於耳及乞擇内臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之有剪桐之戲則隨事箴規違持養之方則應時諌止調䕶聖躬莫過於此貼黄今不設保傅之官傅徳義保身體之責皆在經筵皇帝在宫中語言動作衣服飲食皆當使經筵官知之第三臣竊以人主居崇髙之位持威福之柄百官畏懾莫敢仰視萬方承奉所欲隨得茍非知道畏義所養如此其惑可知中常之君無不驕肆英明之主自然滿假此自古同患治亂所繋也故周公告成王稱前王之徳以寅畏祗懼為首從古以来未有不尊賢畏相而能成其聖者也皇帝陛下未親庶政方専學問臣以為輔養聖徳莫先寅恭動容周旋當主於此嵗月積累自成聖性甞竊聞經筵臣寮侍者皆坐而講者獨立於禮為悖欲乞今後特令坐講不唯義理為順所以養主上尊儒重道之心貼黄竊聞講官在御案旁以手指書所以不坐欲乞别令一人指書講官稍逺御案坐講臣竊意朝廷循㳂舊體只以經筵為一美事臣以為天下重任唯宰相與經筵天下治亂繋宰相君徳成就責經筵由此言之安得不以為重元祐元年三月上時除崇政殿説書未供職上宣仁皇后論經筵輔養之道程頥臣愚鄙之人自少不喜進取以讀書求道為事于兹幾三十年矣當英宗朝暨神宗之初屢為當塗者稱薦臣於斯時自顧學之不足不願仕也及皇帝陛下嗣位太皇太后陛下臨朝求賢願治大臣上體聖意捜揚巖穴首及微賤䝉恩除京西學官臣於斯時未有意於仕也辭避方再而遽有召命臣門下學者促臣行者半勸臣勿行者半促臣行者則曰君命召禮不俟駕勸臣勿行者則曰古之儒者召之則不往臣以為召而不往惟子思孟軻則然蓋二人者處賓師之位不往所以規其君也臣之㣲賤食土之毛而為王民召而不至邦有常憲是以奔走應命到闕䝉恩授館職方具表辭遂䝉召對臣於斯時尚未有意於仕也進之簾前咫尺天光未甞敢以一言及朝政陛下視臣豈求進者哉既而親奉徳音擢置經筵事出望外悚然驚惕臣切内思儒者得以道學輔人主蓋非常之遇使臣自擇所處亦無過於此矣臣於斯時雖以不才而辭然許國之心實已萌矣尚慮陛下貪賢樂善果於取人知之或未審也故又進其狂言以覬詳察如小有可用則敢不就職或狂妄無取則乞聽辭避章再上再命祗受是陛下不以為妄也臣於是受命供職而來夙夜畢精竭慮唯欲主上徳如堯舜異日天下享堯舜之治廟社固無窮之基乃臣之心也臣本山野之人禀性朴直言辭鄙拙則有之矣至於愛君之心事君之體告君之道敢有不盡上賴聖明可以照鑒臣自惟至愚䝉陛下特達之知遭遇如此願効區區之誠庶㡬毫髮之補惟陛下留意省覧不勝幸甚伏以太皇太后陛下心存至公躬行大道開納忠言委用耆徳不止維持大業且欲興致太平前代英主所不及也但能日謹一日天下之事不足慮也臣以為今日至大至急為宗社生靈乆長之計惟是輔養上徳而已厯觀前古輔養㓜主之道莫備於周公足為萬世之法也臣願廣髙世之見以聖人之言為可必信先王之道為可必行勿狃滯於近規勿遷惑於衆口古人所謂周公豈欺我哉周公作立政之書言常伯至於綴衣虎賁以為知恤者鮮一篇之中丁寧重複惟在此一事而巳又曰僕臣正厥后克正又曰后徳惟臣又曰侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽是古人之意人主跬歩不可離正人也蓋所以涵養氣質薫陶徳性故能習與智長化與心成後世不復知此以為人主就學所以涉書史覽古今也不知渉書史覧古今乃一端爾若止於如是則能文宫人可􅊀勸講知書内侍可充輔導何用置官設職精求賢徳哉大抵人主受天之命禀賦自殊厯考前史帝王才質鮮不過人然而全徳有道之君至少其故何哉皆輔養不得其道而位勢使之然也伏惟陛下天資粹美徳性仁厚必為有宋令主但恨輔養之道有未至爾臣供職以来六侍講筵但見諸臣拱手黙坐當講者立案傍解釋數行而退如此雖彌年積嵗所益幾何與周公輔成王之道殊不同矣或以為主上方㓜且當如此不知本之論也古人生子能食能言而教之大學之法以豫為先人之幼也知思未見所主便當以格言至論日陳於前雖未曉知且當使盈耳充腹耳目安習若固有之雖以他言惑之不能入也若為不豫及乎稍長私慮偏好生於内衆口辨言鑠於外欲其純全不可得也故所急在先入豈有太早者乎或又以為主上天資至美自無違道不須過慮此尤非至論夫聖莫聖於舜而禹臯陶未甞忘規戒至曰無若丹朱傲惟慢遊是好傲虐是作且舜之不為慢遊傲虐雖至愚亦當知之豈禹而不知乎盖處崇髙之位規戒之道不可不如是也且人心豈有常哉以唐太宗之英睿躬厯艱難力平禍亂年亦長矣始惡隋煬帝侈麗毁其層觀廣殿不踰七年復欲治乾元殿是人心果可常乎所以聖賢雖明盛之際不廢規戒為慮豈不深逺也哉况冲㓜之君閑邪拂違之道可少懈乎伏自四月末間以盛暑罷講比至中秋蓋踰三月古人欲旦夕承弼出入起居而今乃三月不一見儒臣何其與古人之意異也今士大夫家子弟亦不肯使經時累月不親儒士初秋漸凉臣欲乞於内殿或後苑清凉處召見當日講官俾陳説道義縱然未有深益亦使天下知太皇太后用意如此又一人獨對與衆見不同自然情意易通不三五次便當習熟若不如此漸致待其自然是輔導官都不為力將安用之將來伏假既開且乞依舊輪次直日所貴常得一員獨對開發之道蓋自有方時習之益最為至切故周公輔成王使伯禽與之處聖人所為必無不當真廟使蔡伯希侍仁宗乃師古也臣欲乞擇臣寮家子弟十嵗已上十二巳下端謹頴悟者三人侍上左右上所讀之書亦使讀之辨色則入昏而罷歸常令二人入侍一人更休每人擇有年宫人内臣二人隨逐看承不得暫離常情笑語亦勿禁止唯須言語必正舉動必莊仍使日至資善堂呈所習業講官常加教勸使知嚴憚年纔十三便令罷去嵗月之間自覺其益自來宰臣一月一至經筵亦止黙坐而巳又間日講讀則史官一人立侍史官之職言動必書施於親政時則然經筵講對之所乃燕處也主上方問學之初宜心泰體舒乃能恱懌今則前對大臣動虞有失旁立史官言出輙書使上欲遊其志得乎欲放于言敢乎深妨問學不得不改欲乞特降㫖揮宰臣一月兩次與文彦博同赴經筵遇宰臣赴日即乞就崇政殿講説因令史官入侍崇政殿説書之職置來巳乆乃是講說之所漢唐命儒士講論亦多在殿上蓋故事也邇英迫狭講讀内臣近三十人在其中四月間尚未甚熱而講官巳流汗況主上氣體嫰弱豈得為便盛夏之際人氣蒸薄深可慮也祖宗之時偶然在此執為典故殊無義理欲乞今後只於延和殿講讀後楹垂簾簾前置御座太皇太后毎遇政事稀簡聖體康和時至簾下觀講官進説不惟省察主上進業於陛下聖聰未必無補兼講官輔導之間事意不少有當奏禀使得上聞亦不可煩勞聖躬限以日數但旬月之間意適則徃可也今講讀官共五人四人皆兼要職獨臣不領别官近復差修國子監太學條制是亦兼它職事乃無一人専職輔導者執政之意可見也盖惜人才不欲使之閑爾又以為雖兼它職不妨講讀此尤不思之甚也又敢言告君之道只以告衆人言之夫告於人者非積其誠意不能感而入也故聖人以蒲盧喻教謂以誠化之也今夫鐘怒而撃之則武悲而撃之則哀意之感人也告人亦如是古人所以齋戒而告君者何謂也臣前後兩得進講未甞敢不宿齋豫戒潜思存誠覬感動於上心若使營營於職事紛紛其思慮待至上前然後善其辭說徒以頬舌感人豈不淺乎此理非知學者不能曉也道衰學廢世俗何甞聞此雖聞之必以為迂誕陛下髙識逺見當䝉聖鑒如以朝廷之大人主之重置二三臣専職輔導極非過當今諸臣所兼皆要官若未能遽罷且乞免臣修國子監條制俾臣夙夜精思竭誠専在輔道不唯事理當然且使天下知朝廷以為重事不以為閑所也陛下擢臣於草野之中蓋以謂讀聖人書聞聖人道臣敢不以其所學上報聖明竊以聖人之學不𫝊乆矣臣幸得之於遺經不自量度以身任道天下駭笑者雖多而近年信從者亦衆方將區區駕其説以示學者覬能𫝊於後世不虞天幸之至得備講説於人主之側使臣得以聖人之學上沃聖聰則聖人之道有可行之望豈特臣之幸哉如陛下未以臣言為信何不一賜訪問臣當陳聖學之端緒發至道之淵微陛下聖鑒髙明必䝉照納如其妄偽願從誅殛臣愚不任懇悃惶懼待罪之至元和元年六月上時為崇政殿説書上宣仁皇后辯顧臨所言非是程頥臣近言邇英講讀漸熱乞移就寛凉處貼黄稱如别無稳便處所只乞就崇政殿或延和殿竊聞給事中顧臨有言以延和講讀為不可臣本謂邇英熱恐於聖體非宜今聞修展邇英茍得寛凉則臣志願遂矣於臨之言在臣自不必恤然有所甚害不得不為陛下辯之若臨之言止於移惑太皇太后聖意臣官非諫諍不辯尚可也今以臨言為是則誤主上知見臣職當輔導安得不辯臣謂自古國家所患無大於在位者不學在位者不學則人主不得聞大道朝廷不得致善治不聞道則淺俗之論易入仁義之言難進人君功徳髙下一繋於此臣非敢以諛言悦陛下竊聞陛下博覽前史請陛下厯觀簡䇿前世母后臨朝有不壞紀綱者乎以至公為心孜孜為治為英主之事如陛下者乎此陛下所自知也陛下有簡䇿所無之盛徳則天下亦望陛下為簡䇿所無之功業不止維持嵗月俟人主長大而巳蓋望陛下致海内於治安詒孫謀於乆大詒謀致治之道當使聖徳日躋善功日新進徳在於求道圖治莫如稽古道必詢於有道之士古必訪諸稽古之人若夫世俗淺士以守道為迂以稽古為泥適足惑亂人主之聽近年以来士風益衰志趣汚下議論鄙淺髙識逺見之士益習以成風矣此風不革臣以為非興隆之道乃陵替之勢也大率淺俗之人以順從為愛君以卑抑為尊主以隨俗為知變以習非為守常此今日之大患也茍如是者衆則人君雖有髙世之見豈能獨任哉臣不知進道徳之言足以増益聖徳者有幾而損陛下之逺圖移陛下之逺意則有矣如顧臨之言是也臣料臨之心不過以講官不可坐於殿上以尊君為説爾夫殿上講説義理之意古昔所常行也臣不暇逺引只以本朝故事言之太祖皇帝召王昭素講易真宗令崔頥正講書邢昺講春秋皆在殿上當時仍是坐講立講之儀只始於明肅太后之意此乃祖宗尊儒重道之盛美豈獨子孫當以為法萬世帝王所當法也而臨以為非臨謂講官不可坐殿上則昭素布衣之士其不可更甚矣邇英講讀只自仁宗時亦從便爾非是避殿上也若避殿上則不應置崇政説書之職雖以殿名設職不必須在本殿説書然亦不肯於不可講説之處置説書官也臣毎進説未甞不規勸主上以祖宗美事為法如臨之意則是禁止主上不得復為優禮昭素之事及有崇政設職之意祖宗美事而使主上獨不得為若主上信以為然所損豈不甚大殿上説書亦是常事人主崇儒之道甚有重於此者臣今口未敢言然中心惟欲輔養主上重道之心如前代明王光輝史冊不止此一事而巳臨之見與臣之心何其異也且講經與飲宴孰重真宗仁宗時皆宴講讀官於崇政殿從來侍宴者皆在殿上而講經獨不得在殿上臣未諭其義也臨之意必曰彼一時之事爾曰常則不可夫於義茍當曰常何害義或不可一時亦不可也臣始言之執政大臣未以為非也及臨一言則是而從之以臣度之以臨之言為是者亦或有之若謂四五大臣皆以為是則必不然盖非難知之事不應四五人所見皆如是也特以陛下信臨之言而又迫於尊君之意故不敢言爾恐非以道事君之義今世俗之人能為尊君之言而不知尊君之道君唯道徳益髙則益尊若位勢則崇髙極矣尊嚴至矣不可復加也過禮則非禮强尊而不尊漢明帝於桓榮親自執業可謂謙屈也周宣帝自比上帝羣臣齋戒清身數日方得朝可謂自尊矣然以理觀之漢明帝賢明之君百世所尊也周宣帝昏亂之主百世所賤也如臨之見則必以桓榮為不能尊君以周宣之臣為能尊君矣不知道之人益進不合理之言日聞雖人主聖明習熟見聞亦恐不能無損爾後世功業益卑先王粹美之道不復見於世者正由淺俗之論易信而得行爾夫先王之美雖未能盡行然稽古之心不可無也猶學者於聖賢之事業雖未能盡行然希慕之心不可無也此乃進學求益之道今臨之意則以古先之事為不足法今日之事足矣不可更有進也此乃塞進善之門絶稽古之路方主上春秋之富進徳之際其所獻納如是勸講官稍思職業敢不辨乎若陛下以臣言為非則狂妄之誅不敢避也萬一以臣言為是則願陛下明示好古求道之意使朝廷在位皆知之雖鄙見之人見陛下聖慮髙明不喜淺近亦將勉思義理不敢任其卑俗之見懼獲鄙於聖鑒矣誠如是則將見道學日明至言日進弊風日革為益孰大於此臣職當辨明義不敢黙臣無任懇切惶懼待罪之至元祐二年三月上時為崇政殿説書上宣仁皇后乞遇六參日許講讀官上殿程頥臣竊以朝廷置勸講之官輔導人主豈止講明經義所以薰陶性質古所謂承弼厥辟出入起居者固宜朝夕納誨以輔上徳自來暑熱罷講直至中秋方御經筵數月之間講讀官無由進見夫以文武之齊聖欲旦夕承弼今乃數月不接儒臣甚非先王輔道養徳之意方主上春秋之富輔養之道豈可踈略如此臣欲乞未御講筵間毎遇六參日宰臣奏事退許講讀官上殿問聖體數日一對儒臣不唯有益人主在勸講之臣禮亦當然伏望聖慈特賜俞允元祐二年上宋名臣奏議巻五十
