body:
  text: 宋名臣奏議巻七十九宋趙汝愚編儒學門學校下上神宗答詔論學校貢舉之法蘇軾臣伏以得人之道在於知人知人之法在於責實使君相有知人之明朝廷有責實之政則胥史皁𨽻未嘗無人而况學校貢舉乎雖因今日之法臣以為有餘使君相無知人之明朝廷無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足夫時有可否物有廢興方其所安雖暴君不能廢及其既厭雖聖人不能復故風俗之變法制隨之譬如江河之徙移順其所欲行而治之則易為功强其所不欲行而復之則難為力使三代聖人復生於今其選舉養材亦必有道矣何必由學乎且天下固嘗立學矣慶歴之間以為太平可待至於今日惟有空名僅存矧今陛下必欲取徳行道義之士責九年大成之業則將變今之禮易今之俗又當發民力以治宫室歛民財以食游士百里之内置官立師獄訟聼於是軍旅謀於是又當以時簡其不帥教者屏之逺方終身不齒則無乃徒為紛亂以患苦天下耶若欲無大變改而望有益於時則與慶歴之制何異故臣以今之學校特可因循舊制使先王之舊法不廢於吾之世足矣至於貢舉之法行百餘年治亂興衰初不由此陛下視祖宗之世貢舉之法與今為孰精言語文章與今為孰優所得文武之長才與今為孰多天下之事與今為孰辦較此四者長短之議决矣今議者欲變改不過數端或曰鄉貢徳行而略文章或曰専取䇿論而廢詩賦或欲舉唐室故事兼採譽望而罷封彌或欲變經生朴學不用帖墨而考大義此數者皆知其一而未知其二者也臣請歴言之夫欲興徳行在於人君者修身以格物審好惡以表俗孟軻所謂君仁莫不仁君義莫不義君之所向天下趨焉若欲設科名以取之則是教天下相率以為偽也上以孝取人則勇者割股怯者廬墓上以亷取人則弊車羸馬惡衣菲食凡可以中上意者無不至矣徳行之弊至於如此自文章而言則䇿論為有用詩賦為無益自政事言之則䇿論詩賦均為無用雖知其無用然自祖宗以来莫之廢者以為設科取士不過如此而巳豈獨吾祖宗自堯舜亦然書曰敷奏以言明試以功自堯舜已來進人何嘗不以言試人何嘗不以功乎議者必欲以䇿論定賢愚决能否臣請有以質之近世士大夫文章華麗者莫如楊億使楊億尚在則忠清鯁亮之士也豈得以華麗少之通經學古者莫如孫復石介使孫復石介尚在則迂闊矯誕之士也又可施政事之間乎自唐至今以詩賦為名臣者不可勝數何負天下而必欲廢之近歳士人纂類經史綴緝時務謂之䇿括待問條目搜抉略盡臨時剽竊竄易首尾以眩有司有司莫能辨也且其為文也無規矩繩墨故學之易成無聲病對偶故考之難精以易學之文付難攷之吏其弊有甚於詩賦者矣唐之通榜故是弊法雖有以名取人厭伏衆論之美亦有賄賂公行權要請託之害且使恩去王室權歸私門降及中葉結為朋黨通榜取人又豈足尚哉諸科舉人多出三路能文者既已變為進士曉義者又已去為明經其餘皆朴魯不能化者也至於人才則有定分施於有政能否自彰今進士日夜治經𫝊子史貫穿馳騖可謂博矣至于臨政曷嘗用其一二顧視舊學已為虚器而欲使此等分别注䟽粗識大義而望其才能増長亦已疎矣臣故曰此數者皆知其一而未知其二也特願陛下留意其大者逺者必欲登俊良黜庸回揔攬衆才經濟世務在陛下與二三大臣下至諸路職司與良二千石耳區區之法何與焉然臣竊私憂過計者敢不以告王衍好莊老天下師之風俗陵夷以至南渡王縉好佛捨人事而修異教大厯之政至今為笑故孔子罕言性命以為知者少也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫性命之說自子貢不得聞而今之學者恥不言性命此可信也哉今士大夫至以佛老為聖人鬻書於市者非莊老之書不售也讀其文浩然無當而不可窮視其貎超然無着而不可挹此豈能真然哉盖中人之性安於放而樂於誕耳使天下之士皆能如莊周以齊死生一毁譽輕富貴安貧賤則人主之名噐爵禄所以厲世磨鈍者廢矣陛下亦安用之而况於實不能而竊取其言以欺世者哉臣願陛下明詔有司試之以實學博通經史者雖朴不廢稍渉浮誕者雖工必黜則風俗稍厚學術近正庻㡬得忠實之士不至蹈衰季之風熙寧二年五月上時為直史館判官誥院上神宗論上舍當罷糊名之法彭汝礪臣伏覩國子監考試上舍依銓試例臣伏念自王者之迹熄而學校敎養之法不明于天下學者以言而不及道於是其實㡬亡焉道之方行也陛下以天明命奮然震起而鼎新之放淫辭黜邪説造之以經術而學士大夫知所本矣然風俗靡靡未還忠厚豈獨俗之未成哉亦由吾所以取之者其私法未盡也且夫科舉之興乆矣相因於千嵗而欲革於一旦之近臣固自知其難也盖亦有漸焉今天下之士或聚或散而行能之實非可以遽察臣以謂當自庠序始法度之行自近及逺故又當自太學始考試官以行能為差雖未如古盖亦殆庶㡬焉今上舍尤所以風動四方比他時益當謹選而必用糊名之法似非朝廷所以養育徳義之本意也且朝廷罷詩賦廢制科欲取之以實也今如是則但察其詞而已何以異於以言也論選士學校不循科舉之常恐必非其人也今如是則不肖者亦可以僥倖何以異於科舉也今六經之説其明如日雖老夫小子皆得自託於義理之學文不足患也所虞者其實未應而已臣欲乞試内上舍皆以文行參考如辭理優長材行超卓為一等推恩行義無玷者為一等如有過闕文雖中不與焉夫上舍中其恩不過免解或遂得一命而使人人知所以自愛而興於徳所施者寡而所及者逺夫是之謂要術行之以漸待之以久古或可復矣臣嘗待罪學官稍詳本末如臣所論衆不能廢今所以用封彌謄録欲如内舍者恐物議難一不敢自任其責而朝廷所以如此者亦以私疑之也臣謂以陛下興起學校方將追還三代之美而立政造法乃無以異於後世之科舉則所失多矣夫行能有素非可以一朝一夕為之是非所繋者衆亦非一人之所能専也茍得其私第當竄其人而已不可以非其人而廢法也臣欲乞祗令𤨏宿考校庶㡬専一或以臺諌官一人臨之以防議論之私其它如試内舍體例則學校之興不至廢法之失矣熙寧九年上時為監察御史裏行上哲宗罷博士諸生不相見之禁劉摯臣竊以學校之制主於教育人材非行法之地也羣居衆聚帥而齊之則誠不可以無法然而法之為學校設者宜有禮義存焉可也比嵗太學屢起大獄其事一出於誣枉於是有司縁此造為法禁煩苛凝宻士之學其間者轉身舉足輙蹈憲網束濕愈於治獄條目多於防盗上下疑貳求於茍免先王之意禮義之㫖盖已盡矣且法有大可恠者博士諸生禁不相見教諭無所施質問無所從但博士月廵所𨽻之齋而已謂如此則請問者對衆足以為證左以防私請以杜賄謝嗟夫學之政令豈不大謬先王之意哉私請賄謝如是真可以絶之乎而又齋數不一不可以隨經分𨽻也故使人兼廵如周易博士或廵治禮之舍禮學博士復廵治詩之舍徃徃所至􅊀禮請問相與揖諾至或不交一言而退昔之設學校教養之法師生問對憤悱開發相與曲折反復諄諄善誘盖其意不如是之疎也其道不如是之戾也先王之於天下遇人以長者君子之道則下必有長者君子之行而報乎上者斯有禮也遇人以小人犬豕之道則彼將以小人犬豕自為而報乎上者不能有義也况夫學校之間哉太學自置三舍之法寥寥至今未嘗應令成就一人豈真無人也主司懲前日之禍畏罪避謗士雖有豪傑㧞萃之才誰敢題品以人物自任而置之上第哉則是先帝有興賢造士之美意而有司以法害之也臣愚欲望聖慈詳酌罷博士諸生不相見之禁教誨請益聽其在學徃還即私有干求餽受自依律勑仍乞先次施行外應太學見行條制委本監長貳與其屬看詳省其煩宻太甚取其可行便於今日者有所増損著為科條上之禮部本部再行詳定上之三省以聽聖斷元祐元年二月上時為御史中丞上哲宗乞擇名師主太學朱光庭臣竊以立國家太平之基本者莫急於人材養天下人材之成就者莫先於庠序朝廷務要廣求人材而不素為之養則何由而得今上庠與州郡學校雖名為興賢而無養人材之實所以然者盖無名師之故也夫所謂名師者其經術足以窮聖藴其行義足以為人表又能至誠以教養為已任者是也昔在仁宗朝詔胡瑗典太學當是時天下學者翕然向風所以成就人材為多至今未見其繼者豈國家之大四海之廣無其人患在不求之也今庠序之中不見以禮義教養唯見以苛禁繩治其所習經術所修行義孰為發明孰為觀法學官者區區自顧苛禁之不暇奚暇治禮義哉甚非所以為首善之地也今朝廷所去弊政㡬欲盡而所修善政未甚聞臣以謂所修善政莫先於置名師興學校以養人材首善自京師而風動天下伏望聖慈詔大臣博求真儒為天下所共推者使主太學以教養為已任罷三舍之弊法去一切之苛禁専務以禮義教養多士自然可以成就人材為陛下立太平之基本臣願陛下留神天下幸甚元祐元年閠二月上時為左正言上哲宗乞罷三舍法王巖叟臣聞法有為名則美而行之則艱事有用意則良而施之則戾者三舍是也三舍之法立雖有髙材異能未見能取而得之而奔竸之患起奔竸之患起而賄賂之私行賄賂之私行而獄訟之禍興獄訟之禍興而防猜之禁繁博士勞於簿書諸生困於文法非復渾然養士之體而庠序之風或㡬乎息此識者之所共嘆也臣竊謂庠序者所以萃羣材而樂育之以定其志業養其名譽優游舒徐以待其成今乃科舉之外别開進取之多岐以支離其心而激其争端使利害得失日交戰於胷中損育徳善道之淳意非所以篤教化成人材也臣愚乞鑒巳然之弊罷三舍法開先生弟子不相見之禁示學士大夫以義講解之餘止於公私試第髙下如昔時自足以奬材氣而厲風聲使多士欣欣於從學則上庠宜復有雍容樂易之美為四方矜式矣元祐元年四月上時為左司諌上哲宗三學看詳條制程頥一三學制看詳舊制公私試試上舍補内舍盖無虚月皆糊名考校排定髙下煩勞費用不可勝言於學者無所益學校禮義相先之地而月使之争殊非教養之道今立法改試為課更不考定髙下只輪畨請召學生當靣下㸃抹教其未至所貴有益學者不失庠序之體舊制考察行藝以不犯罰為行試在髙等為藝有注官免省試免觧三等旌擢今不用舊考察法只於内舍推擇才學行義為衆所稱者升為上舍上舍學行才器堪為時用者長貳狀其行能聞於朝廷一三學制看詳太學舊制博士二人同􅊰一經論語孟子又置學諭分􅊰聖人之道雖一而治經家法各不同二人同􅊰一經則學者所從不一今立法置博士十人六人分􅊰六經餘四人分講論語孟子􅊰大經終者却􅊰小經諸經輪互講説有専經者亦許通那一律學制看詳律學之設盖欲居官者知為政之方其未出官及未有官人且當専意經術並令入太學乃學古入官之義今立法到吏部人方許入律學一武學制看詳所治經書有三略六韜尉繚子鄙淺無取今減去却添入孝經論語孟子左氏𫝊言兵事一三學制看詳舊來條制有期親尊長服不許應舉後來改法雖祖父母䘮亦許應舉夫尊祖之義人道之本若許居䘮進取深害義理今立法學生遭祖父母䘮給長假行服貢舉條貫乞朝廷修改元祐元年五月上時為崇政殿説書有詔㫖看詳國子監太學條制同孫覺頋臨上上哲宗請用薦舉之士為學官乞罷試法王巖叟臣伏以砥名礪行以待用於世者士人之所以自處也養士人之節以成就其美而風天下之俗者朝廷之所以處士人也臣竊見内自太學外至州郡學官之制皆令就試四方之士區區於進巻屑屑於程文不憚奔馳之逺淹留之久者顧豈其心哉禄仕迫之有不得巳耳甚非所以重師道崇儒風惜士人之節也禮曰道尊然後民知敬學孟子曰人之患在好為人師今立法如此使人人自求為師欲天下之民知敬學恐不可得臣愚伏望聖慈令罷此法一用應詔薦舉之士為中外學官以重教導之選為天下勸貼黄如䝉特賜罷試用舉乞嵗令近臣并諸路監司各舉所知朝廷採察而用之其武學學官亦乞依此元祐元年七月上時為左司諫詔從之上哲宗乞循祖宗故事視學范百禄臣伏惟二聖臨御以來朝廷清明海内乂安邊隅弭兵革之災田里無狗吠之警耄老倪稚咸樂其生徳之休明治古何逺原其所以誠由舉措施設率循祖宗典故而然人無智愚莫不共知此説豐功美實何可殫陳獨有視學之行缺而未舉臣伏見太祖皇帝建隆元年正月二月四年四月太宗皇帝端拱元年八月淳化五年十一月真宗皇帝咸平二年七月皆幸國子監仁宗皇帝天聖二年八月幸國子監謁文宣王召從臣升講堂令直講馬龜符説論語一篇賜龜符三品服恭惟祖宗隆儒師古躬化天下之意如此今陛下天縱將聖日進於道光明緝熙體合自然聖學之積可謂勤而不倦矣然方領矩歩之士挾書觀光者四方萬里竭蹷而來遊於京師分處庠序未嘗一聞鑾輿之音而望屬車之塵意者陛下専事講筵遊心經史而祖宗以來至天聖故事猶有未遑暇者乎臣愚伏望陛下特詔有司檢舉祖宗視學故事以待萬幾之暇而賜臨觀焉令􅂄儒博士横經進説以示天下文明之化豈不盛哉伏惟聖慈留察恕其狂僣天下幸甚貼黄禮記文王世子曰天子視學大昕鼓徵所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司卒事反命注使有司攝其事舉常禮祭先師先聖不親祭之者視學禮耳非為彼報也元祐元年八月上時為翰林學士兼侍讀宋名臣奏議卷七十九
