body:
  text: 宋名臣奏議巻七宋趙汝愚編君道門帝學下親儒生上神宗乞擇經術耆艾之士以備顧問錢勰臣伏見漢制侍中左右曹諸吏常侍給事中皆加官多至數十人或得入禁中掌顧問應對唐制供奉學士以文學言語出入侍從因得參謀議納諌諍是皆人主所與燕見者也恭惟陛下天縱之資専意經術遴揀臺閣未嘗虛授妙選名儒以備要近然皆外領事務日有官守之責未恊盡規之義臣願陛下益選其間經術通明有守不畏魁磊耆艾之士兼取該貫史學通知古今可以謀王體斷國論者優以清閑引之親近使専意討論以備朝夕燕見紬繹顧問宻勿獻替少裨萬一則與夫事已施行而使言事者論列利害彰於羣聽勢相遼而所益廣惟陛下財擇熈寜四年八月上時為三司鹽鐡判官上哲宗論人主學問在擇人彭汝礪臣聞昔者周成王即位始謀於廟其言憂深思逺慄慄悼懼若方隕淵墜谷所以求其臣甚至而羣臣進戒乃反覆曲折獨以學問為先務其詩曰念兹皇祖陟降庭止於乎悠哉朕未有艾又詩曰維予小子不聰敬止學有緝熈于光明佛時仔肩示我顯徳行其君臣可謂知本矣是時周公畢公召公史佚實在左右前後伯禽唐叔實相與周旋而猶有管蔡之禍周之不亡者以此唐太宗取名儒為學士者十八人如房𤣥齡杜如晦之𩔖是也畨宿迭侍相與討論古今考前王之成敗雖閒燕飲食皆與於是在下之情無不達在上之失無不得二君卒為周唐賢君古今事不同體當使内外左右朝夕所以輔拂之者咸備其要則在擇人茍非其人猶不如不為之愈也元祐四年五月上時為中書舍人上哲宗論人主務學在親師友彭汝礪臣聞治亂之幾在於好惡好惡之端在於謹其始其始正無所為而不為正其始不正雖有智力不能善其後是以人主必務學學莫大於近正人陛下盛徳至行得於天者甚厚見於行事者甚善此非臣下所能窺度深淺也近侍進讀儒臣勸講見聞可謂甚博耆艾在前忠良在後其輔翼可謂甚衆夫學者非徒出於口耳之謂也聞乎其言將見於其行得乎其心將見乎其外今臣下所誦說陛下能昭然不疑乎能沛然有所得乎使誠無疑也使誠有得也固甚善若猶未也是為名而巳是為觀美而巳今延英之對邇英之講隔於内外見有不得而久限於上下言有不得而盡雖太皇仁聖所以擁䕶啓佑者甚至然天性之愛不可以責善乆矣然則陛下退而與處者其誰歟其使令者其誰乎其婦人乎輔拂之人寡順從之人衆學問之日少安閑之日多善或莫之告過或莫之諫臣甚懼所以輔成聖德者或未備也記曰三王四代惟其師詩曰自天子至於庶人未有不須友以成者然則師友不可無乆矣然則如之何曰尊有道者擇有德者不使柔邪權譎之士間厠於其間閒宴與俱言動使相接焉簡上下之分勢盡君臣之底裏問以所疑而無隱質之所欲而無間有善焉使必告告焉而必從有過焉使必諌諌焉而必改如是而不堯舜如者未之有也惟陛下留意無忽元祐四年五月應詔言事時爲中書舍人上哲宗乞召講官詢訪以進聖學朱光庭臣聞孔子曰吾十有五而志于學周頌曰日就月將學有緝熈于光明由此言之聖人未有不學而至于道也恭惟皇帝陛下生知之性天縱之聖聰明睿智與日増新然而正當孔子志學之年成王緝熈之旦彊勉學問則可以大就堯舜之德矣臣愚乞陛下每五日一次退朝之後清閑之燕召講官于便殿親發聖問詢訪人君之所先務古今之治亂可以爲法可以爲戒者三五事同召執政大臣坐而論道自來年正月爲始如此則聖學日進君道日隆堯舜之德不難至矣伏望太皇太后陛下日勸皇帝陛下專心聖道以致盛德元祐四年十二月上時爲右諌議大夫上哲宗乞選端良博古之士以叅諷議曽肇臣聞玉雖美追琢然後成珪璋金雖堅砥礪然後成利噐人主雖有自然之聖質必頼左右前後磨礱漸染所聞正言所見正行然後德性内充道化外行以之知人則無不明以之舉事則無不當故周公之戒成王自常伯常任至于虎賁綴衣趣馬小尹左右攜僕百司庶府必皆得人以爲立政之本穆王之命伯冏亦曰命汝正于羣僕侍御之臣懋乃后德交修不逮慎簡乃僚無以巧言令色便僻側媚其惟吉士下至西漢猶詔郡國歲貢吏民之賢者以給宿衛則虎賁之任也出入起居執噐物備顧問皆用士人如孔安國之掌唾壺嚴助朱買臣之專應對則左右攜僕之任也雖用人有媿于古亦一時之盛矣其後唐太宗平定四方有志治道則引虞世南等聚於禁中號十八學士退朝之暇從容宴見或論往古成敗或問民間事情每言及稼穡艱難則務遵勤儉言及閭閻疾苦則議息征徭以至諷誦詩書講求典禮咨詢忘倦或至夜分若夫軍國幾㣲時務得失則責之輔相悉不相干其上下相與之際如此是以後世言治獨稱貞觀惜其一時之士不以堯舜三代之道啓迪其君故其成就止此夫以貞觀之治猶須招集賢能朝夕親近然後成功又况有志於其大者乎伏惟皇帝陛下聰明慈惠有君人之德沉静淵黙有天下之度方且躬親聽斷勵精爲治其志大矣臣謂宜於此時遴選忠信端良博古多聞之士置諸左右前後以參諷議以備顧問陛下聽政之餘引之便坐講論經術諮詢治道不必限其日時煩其禮貌接以誠意假以温顔庶使人得盡情理無不燭於此増益聖學裨補聰明漸染磨礲日累月積循習既乆化與心成自然於道不勉而中於事不思而得非僻之習異端之言無自而入矣如是而施之任人則邪佞者逺忠直者伸以之立事則言而爲天下則動而爲天下法其於盛德豈曰小補之哉與夫深處法宫之中親近􅉏御之徒其損益相去萬萬唯陛下留意毋忽紹聖元年閏四月上時赴瀛州過闕上殿宋名臣奏議巻七
