body:
  text: 宋名臣奏議巻二十八宋趙汝愚編帝系門皇后下上仁宗論廢郭皇后段少連等臣因義激心以職獲譴天地容載䝉幸何深然理有所未伸情有所未達鬱悒之志敢不盡陳之初聞非時召兩府大臣議皇后入道一日之内都下喧然以為皇后母儀天下固無入道之理翊日又聞兩府列狀乞降后為淨妃臣與孔道輔范仲淹等恐詔命一行難於追復是以羣詣殿閤上疏而執政進說使臣等不獲面對止令就中書商量宰相雖知其誤然猶責臣等翻覆率易故道輔仲淹斥守外郡臣等例皆䝉罰伏以陛下親政以來進用直臣開闢言路天下無不懽忻一旦以諫官御史伏閤遽行黜責中外皆以為非陛下意盖執政大臣假天威以黜道輔仲淹而斷來者之説也望熟思其事使讒愬不行忠邪有别則天下幸甚又伏覩戒諭自今有封章宜如故事宻上毋得羣詣殿門請對且伏閤上疏豈非故事今遽絶之則國家復有大事誰敢旅進而言者况道輔仲淹端正敢言素為姦邪所忌以言事而黜之恐姦邪得志而翺翔方正望風而竄伏矣昔唐陽城王仲舒伏閤以雪陸䞇之罪崔元亮叩殿陛理宋申錫之寃當時稱之今陛下未忍廢出皇后而兩府列狀議降為妃諫官御史敢廢伏閤之事而黙黙乎陛下深惟道輔等所言為阿黨乎忠亮乎幸裁赦之明道二年十二月上時為殿中侍御史上仁宗論廢后有大不可者段少連臣聞髙明粹精凝德無累者天之道也然氛祲蔽翳晦明偶差乃陰陽之沴爾象天德者君之體也治陰陽者臣之職也陛下秉一德臨萬方有生之𩔖莫不浸涵德澤而氛祲蔽翳偶差晦明以累聖德者由大臣懷祿而不諫小臣畏罪而不言臣獨何人敢貢狂瞽哉誠以秉愛君之心竊痛陛下履仁聖之具美乏骨鯁之良輔因成不忍之忿又稽不逺之復臣是以􅅹肝膽披情素為陛下澄清氛祲蔽翳之累易曰夫夫婦婦而家道正正家而天下定矣詩云刑于寡妻以御于家邦若然則君天下修化本者必自内而刑外也昨者二府大臣忽然晚出民間喧傳皇后被譴而入道矣又傳降為妃而離宫廷矣臣與道輔等皆在言職以謂皇后母儀萬方非有大過而動揺則風教陵遲况聞入道降妃之議出自臣下且妃后有罪出則告宗廟廢則為庶人安有不示之於天下不告之於祖宗而陰行臣下之議者乎且皇后以小過降為妃則臣下之婦有小過亦當降為妾矣比抗章請對不䝉賜召豈非姦邪之人離間陛下邪臣等赴中書時執政之臣備言皇后有妬忌之行始議入道終降為妃兼云有上封者慮皇后不利於聖躬故築修髙垣置在别館臣等備言中外之議以為未可願速降明詔復中宫位號以安民心翌日詔出乃云中宫有過掖廷具知特示含容未行廢黜置之别館俾自省循供給之間一切如故臣未審黜置别館為后乎為妃乎詔書不言安所取信伏以陛下立后一紀有餘而輔臣倉卒以降黜之議惑於宸聽搢紳循黙無敢為陛下言者臣所謂氛祲蔽翳以累聖德者盖臣職有曠矣夫皇后動揺有大不可者二執政之臣獨不念之且内外臣寮以至戚里皆萌覬覦之心或進女口以希選納或巧事寵愛以結内援則使陛下惑女色而亂紀綱紀綱之亂變故以生社稷可得安乎易曰三人行則損一人一人行則得其友斯大不可者一也陛下舉事為萬世法茍因掖庭爭寵遂行廢后則何以書史策而示子孫况祖宗以來未嘗有廢后之事詩云無念爾祖聿修厥德斯大不可者二也臣竊恐姦佞之人引漢武幽陳皇后故事以諂惑陛下且漢武驕奢淫佚之主固不足踵其行事而為人臣者當致君堯舜豈當致君如漢武哉今皇后置在别館必恐懼修省且陛下仁恕之德施於天下而獨不加於中宫乎古人言曰一人向隅滿堂為之不樂今四方凶年民有愁嘆又聞中宫幽廢何啻滿堂不樂乎願詔皇后歸宫復其位號杜絶非間待之如初天地以正陰陽以和人神共歡豈不美哉陛下茍為邪臣所沮不行小臣之議臣恐髙宗王后之枉必見於他日宫闈不正之亂未測於將來惟聖神慮焉明道二年十二月上上仁宗論廢嫡后逐諫臣富弼臣聞右司諫秘閣校理范仲淹以上章諫廢后事貶睦州通判仍差人押出門臣不勝驚駭伏恐陛下行於倉卒未熟思慮輒敢冒天威犯斧鉞一陳愚懇惟陛下裁察之皇后自居中宫不聞有過陛下忽然廢斥物議騰踴自太祖太宗真宗撫國凡七十年未嘗有此陛下為人子孫不能遵祖考之訓而遂有廢后之事治家而尚不以道奈天下何仲淹為諫官所以極諫者乃其職也陛下何故罪之假使所諫不當猶須含忍以招諫諍况仲淹所諫大愜億萬人之心陛下又縱私忿不顧公議取笑四方臣甚為陛下不取也昔莊憲臨朝陛下受制事體大弱而莊憲不敢行武后故事者盖賴一二忠臣救䕶使莊憲不得縱其欲陛下可以保其位實忠臣之力也今陛下始獲暫安遂忘舊日忠臣羅織其罪而譴逐之陛下以萬乗之尊設廢一婦人甚為小事然所損之體則極大也夫廢后謂之家事而不聽外臣者此唐姦臣許敬宗李世勣諂佞之辭陛下何足取法陛下必欲廢后但可不納所諫何必加責以重已過今匹庶之家或出妻亦須告父母父母許然後敢出之今陛下貴為天子莊憲山陵始畢墳土未乾便以色欲之心廢黜后氏而不告宗廟是不敬父母也今陛下舉一事而獲二過於天下廢無罪之后一也逐忠臣二也此二者皆非太平之世所行臣實痛惜之莊憲太后臨朝以劉從德死恩典太重臺諫曹修古等四人連名上章極諫莊憲大怒陛下不得已遂貶此四人然心甚惜其去莊憲纔往陛下立行召命優與恩奬復處憲省修古雖死厚加贈典如此者盖陛下憐其忠鯁不避夫禍難爾今仲淹所諫又甚於修古等所陳修古等追用而仲淹黜棄陛下何所見前後之異也况仲淹以忠直不撓莊憲時論冬仗事大正君臣之分陛下以此自擢用之既居諫列或聞累曽宣諭使小大之事必諫無得有隠是陛下欲聞過失雖古先聖哲之主亦無以過此今仲淹聞過遂諫上副宣諭之意而反及於禍是陛下誘而陷之不知自今後何以使臣雖日加宣諭諫臣以仲淹為戒必不信矣諫臣不諫大非朝廷之福今百執事所為皆一司一局雖常才者皆能幹之是易為也如仲淹者乃為臣之難能者也令幹一司一局者皆坐取遷陟立居顯要而仲淹不惜性命為陛下論事而逺徙外郡臣恐百辟以此皆務為易者而不為難者也陛下一旦有難為之事不知何人為陛下為之居諫官者務要訐直乃號稱職依違者曠職今循黙者已居顯要而訐直者尚居散地茍如是不若廢諫官如不欲廢即循黙者可黜訐直者可用請陛下急圖之今天下凶歉盗賊如麻國用空虛人心惶擾姦雄觀此已有窺覦之心陛下當兢兢惕惕宵衣旰食日與臣寮講論安天下之計猶恐不及而乃自作弗靖廢嫡后逐諫臣使此醜聲聞於四方知陛下不納諫臣朝政不舉則姦雄益喜以謂中外皆亂事勢相符必有變事臣一念至此心寒骨顫此自然之兆固非臣之臆説也望陛下審思之明察之廢后已行雖未能悔過臣願陛下急且追還仲淹復其諫職減二過之一庶乎諫路不絶朝綱復振使姦雄不能窺陛下淺深此社稷之慶也明道二年十二月上時為將作監丞范仲淹到睦州謝表言廢后事臣昨聞中宫揺動外議喧騰以禁庭德教之尊非小故可廢以宗廟祭祀之主非大過不移初聞入道之言則臣遽上封章祈寢誕告次聞降妃之説則臣相率伏閤兾回上心議方變更言亦翻覆臣非不知逆龍鱗者掇韲粉之禍忤天威者負雷霆之誅理或當言死無所避盖以前古廢后之朝未嘗致福漢武帝以巫蠱事起遽廢陳后宫中殺戮三百餘人後及巫蠱之災延及儲貳至宣帝時有霍光妻者弑許后而立其女霍氏之釁遽為赤族又成帝廢許后呪詛之罪乃立飛鷰姊妹妬甚於前六宫嗣息盡為屠害至哀帝時理之即皆自殺西漢之祚由此傾㣲魏文帝寵立虢妃譛殺甄后被髪塞口而葬終招反報之殃唐髙宗以王皇后無子而廢武昭儀有子而立既而摧毁宗室成竊號之妖是皆寵衰則易揺寵深則易立也臣慮及幾㣲詞乃切直乞存皇后位號安於别宫暫選有年德夫人數員朝夕勸𨗳左右輔翼候其遷悔復於宫闈杜中外覬望之心全聖明終始之徳按仲淹當日奏疏世無傳本故附見其表上哲宗論瑶華之獄不當付閹宦之手陳次升臣伏覩詔書以皇后孟氏旁惑邪言陰挾媚道迨從究驗證左甚明而陛下斷以大義不牽私恩奉承兩宫慈訓廢皇后孟氏為華陽教主降詔以告中外命下之日士庶惶惑謂后無可廢之罪而陛下廢之咸相與為之咨嗟彈指良可歎也盖以所治之獄不經有司雖聞追驗證左而事迹祕宻朝臣猶不預聞士庶惶惑固無足怪臣竊謂后之廢立事體至重非若臣下一言一眚廢之逐之不足深恤自古推鞫獄訟皆付外庭未有宫禁自治髙下付閹宦之手陛下但見案牘之具耳安知情罪之虛實萬一寃濫為天下後世譏笑臣欲乞陛下親選在廷侍從或臺諫官公正無所阿附之人專置制院别行推勘庶得實情如后之罪在所不容雖廢之人自無言今事不經有司獄成閹宦此天下人心不能無疑也伏望聖慈特降睿㫖施行紹聖三年九月上時為殿中侍御史上哲宗乞追停賢妃劉氏冊禮别選賢族鄒浩臣聞禮曰天子之與后猶日之與月陰之與陽相須而成者也天子理陽道后治陰德天子聽外治后聽内職然則立后以配天子安得不謹今陛下為天下擇母而所立乃賢妃劉氏一時公議莫不疑惑誠以國家有仁祖故事不可不遵用之耳盖皇后郭氏與美人尚氏爭寵致罪仁祖既廢后不旋踵并斥美人所以示公也及至立后則不選於妃嬪必選於貴族而立慈聖光獻所以逺嫌也所以為天下萬世法也陛下以罪廢孟氏與廢郭氏實無以異然孟氏之罪未嘗付外雜治果與賢妃爭寵而致罪乎世固不得而知也果不與賢妃爭寵而致罪乎世亦不得而知也若與賢妃爭寵而致罪則并斥美人以示公固有仁祖故事存焉若不與賢妃爭寵而致罪則不立妃嬪以逺嫌亦有仁宗故事存焉二者必居一於此矣不可得而逃也况孟氏罪廢之初天下孰不疑賢妃必為后及讀詔書有别選賢族之語又聞陛下臨朝慨歎以廢后為國家不幸又見宗景有立妾之請陛下怒其輕亂名分而重賜譴責於是天下始釋然不疑陛下立后之意在賢妃也今果立之則天下之所以期陛下者皆莫之信矣載在史冊傳示萬世不免上累聖德可不惜哉且五覇者三王之罪人也其葵丘之㑹載書猶且曰無以妾為妻况陛下之聖髙出三王之上其可忽此乎萬一自此以後士大夫有以妾為妻臣寮糾劾以聞陛下何以處之不治則傷化敗俗無以為國治之則上行下效難以責人孔子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足名之不正遂至民無所措手足其為害可勝道哉尤不可不察也臣伏覩陛下天性仁孝追奉謨烈惟恐一毫不當先帝之意然先帝在位動以二帝三王為法斥兩漢而下不取今陛下乃引自漢以來有為五覇之所不為者以自比是豈先帝之意乎是豈繼志述事所當然者乎此尤公議之所未喻也臣觀白麻内再三言之者不過稱賢妃有子及引永平祥符立后事以為所咨之故實臣請論其所以然者若曰有子可以為后則永平中貴人馬氏固未嘗有子也所以立為后者以冠德後宫故也祥符中德妃劉氏亦未嘗有子也所以立為后者以鍾英甲族故也又况貴人之系實為馬援之女徳妃之時且無廢后之嫌其與賢妃事體逈然異矣若曰賢妃冠德後宫亦如貴人鍾英甲族亦如德妃則何不於孟氏罪廢之初用立慈聖光獻故事便立之乎必遷延四年以待今日果何意邪必欲以此示天下天下果信之邪兼臣聞頃年冬享景靈宫賢妃實隨駕以往是日雷作其變甚異今又宣麻之後大雨繼日已而飛雹又自告天地宗廟社稷以來陰霪不止以動人心則上天之意益可見矣陛下事天甚謹畏天甚至尤宜思所以動天而致然者攷之人事既如彼求之天意又如此安可不留聖慮乎夫成湯聖君也仲虺不稱其無過而稱其改過不吝髙宗賢君也傅説不告以拒諫而告以從諫則聖臣雖至愚不足以方古諫者常念唐太宗猶有恥君不及堯舜之臣况直可以為堯舜如陛下之聖而於身親見之乎是以不敢愛身冒犯天威圖報陛下親自識㧞天恩之萬一而區區血誠盡於此矣惟陛下俯從而改之不以為吝則萬世之下所以誦陛下之聖者亦將在成湯髙宗之上矣豈不美哉伏望聖慈深賜詔納不以一時改命為甚難而以萬世公議為足畏追停冊禮别選賢族如初詔施行庶幾上荅天意下慰人心為宗廟社稷無疆之計不勝幸甚元符元年九月上時為翰林學士宋名臣奏議巻二十八
