body:
  text: 宋名臣奏議巻五十三宋趙汝愚編百官門臺諫三上神宗論臺諫闕員宜速選用吕誨臣准學士院關報中書劄子奉聖㫖舉諫官二人者仰承詔命俯及外臣有以見宸衷虚竚樂聞過失中外均慶臣所以懽欣而不已也臣向以言事得罪雖居外補尚忝諫垣之任仍預舉官之數輒有誠言上禆衮闕惟其僭越之罪敢避死亡之誅臣聞國朝故事諫官除授一出於聖選蓋耳目機密之任不可繇他歧而進示至公於天下也御史乃付學士中丞保舉比來任人不次政府甄擇賢能除授或聞除選人李定御史定不持母服為有司劾奏舍人封還詞頭例皆奪職乃付禮官議定之罪夫行不為人所信已不足取如或有罪禮法固無容焉然求忠臣必於孝子之門者以其孝於親則忠可移於事君也以定充選其甄録之意可知矣既而公論不與遂以諫官御史並委兩省官保任臣竊以臺諫官所責甚重數年以來稱職者甚衆大言入則大罪之小言入則小罪之去者相望於道路來者遲疑不願就職以至諫院御史臺闕官日久中丞不補者半年三院為之一空言路梗塞一至於此朝政或闕下情不通則有所蔽焉用事者豈徒然哉臣竊計自詔降以來在京近臣所舉員數已多而未聞除授必候自外舉官畢集然後掄選或見任逺方比追還則曠日遲久言職幾廢徒有擇官之名而非開言路之實也兹所以未見至公副陛下虚求之意焉書云朝夕納誨以輔台徳是不可一日而虚也唐太宗三日不聞諫官言必責輔臣其聴納忘倦寤寐思之書於簡策後世為美陛下推廣是心非夙夕渴於正論歟臣以謂求之之博不若用之之速既用之則信任而必堅與之圖回於正道斯誠為治之術也如博求其人而信任不固言者既衆而黜之不已臣將恐來者艱阻鉗結自安忠臣義士遯逃巖穴公議消薄國家之大患也刳胎毁卵損傷至微其類猶或不至聖人所以為之深誡漢文帝受郎官之書其言是則用之非則置之乃除誹謗妖言之罪所以通治道而來諫者臣伏願陛下恢廣此度而行之則天下之福也仍乞於中外兩禁臣寮已舉官數内先擇三五人充諫官餘補御史闕員庶幾言職不為虚設副天下觀瞻宜有益於聖徳也臣待罪譴讁之中不當有言然愛君之義與日積深身雖補外而心在王室因被㫖舉官輒以上陳􅅹懇輸忠亦區區自信之效矣伏冀髙明特賜省納臣所舉諫官二員已具别狀熙寧三年上時誨已罷中丞以諫議大夫知鄧州上神宗論諫官當人主自擇楊繪臣聞天子有諍臣七人雖無道不失其天下謂三公四輔為七人之數今之諫官即古之三公四輔之職其任得非重哉擇之可不謹乎本朝諫院官多或至五六人少猶不下三人然皆出於清衷之自擇蓋天子既以事委宰相則天下之人悉趨附而無敢陳其不逮故置諫官以相維之其如位宰相者必不喜諫官之敢言理固然也不爾裴垍安得獨稱美於唐哉為宰相者則必自除附已者為之乃不如不置也徒自蔽於耳目而已陛下博通古今至於納諫昌拒諫危之說如唐太宗終始納諫而昌唐明皇不能終而危之事具布史䇿不假臣言也伏覩孫洙補郡後來官闕而不填者旬月得非難其人乎臣竊見李絳有云聖王選當代之人極其才分自可致治豈借賢異代治今日之人哉臣亦願陛下據在朝之臣擇其老成諳練典故之士而置之諫列以參聴其議論不無補於聖聰也勿委宰相除之若委而除之則必取新進之士不敢異論者不由檢正并條例而升則自編校與敕局而授矣願陛下兼聴而廣視之取資深淺之人雜用於以集衆才之美而濟天下之務幸甚熙寧四年六月上時為御史中丞上神宗論臺諫言事不當問得之何人彭汝礪臣近論都檢正俞充及開拆事初十日准中書省劄子奉聖㫖具析上言俞充事跡得於何人聞奏者臣不肖不足對揚陛下之命承詔震恐惶然失次臣伏念天下之才有正則有所謂邪有賢則有所謂不肖人君淵居嚴密無由自察之也於是有耳目之官御史亦因衆人而問焉凡臣之糾摘姦慝非有毫髮為其身謀也實自陛下使之衆人或為臣言亦非有所欲也迫於臣之誠心而已迫以至誠而得之及有所畏避而暴露之而投諸罟擭陷穽之中而臣乃獲安焉則臣不唯不容於人亦且得罪於有司夫廢一官吏非足為朝廷輕重也然官吏以漏言於臺諫而廢則衆皆以前車為戒而外之是非得失無復至於臣輩矣以臣之昏弱不肖而使憲臣盡不得聞知外之是非得失將無以照燭幽闇而彌縫其空缺臣之罪莫甚焉臣寧自刻不敢奉明詔充之材行如陛下知之為詳則臣之罪亦自見矣凡臣所居官職皆陛下所予願并納以易罪若猶未也願益察之縁臣論列非一狀御史中丞鄧潤甫裏行黄㢘亦各有疏乞詢於衆及委官盡公根究如有不實則臣為誣善為殄行竄流荒逺其又何辭臣無任懇切之至熙寧十年十月上時權監察御史裏行上哲宗乞選置臺諫罷御史察案吕公著臣聞古者天子聴政命百官箴王闕近臣盡規親戚補察然後事行而不悖故孔子曰天子有諍臣七人雖無道不失其天下唐太宗以髙世之資親定大業然猶克已從諫以致太平貞觀初孫伏伽始諫太宗恱而賞之有言賞太厚者荅曰朕即位以來未有諫者故特賞之爾他日嘗怒苑西監而皇太子驟諫太宗喜曰朕始得魏徴朝夕進諫徴亡而劉洎岑文本禇遂良馬周繼之兒在膝前見吾恱諫熟矣故太宗始以納諫致治而又以恱諫教其子孫宜乎功烈甚髙而鮮及也然至其裔孫徳宗惡諫諍之臣以為賣直取名當時北省閉闥累月南臺唯一御史不聞過失終致亂亡由是觀之好諫者帝王之髙致可不務哉恭惟太皇太后陛下自親庶政盛徳日新皇帝陛下臨朝恭黙未有過事然而天下至大萬務至廣方始初清明之際正是求賢納諫之時況先帝新定官制設諫議大夫司諫正言之官其員數甚備伏乞申敇輔弼選忠厚骨骾之人正直敢言之士徧置左右使掌諫諍無空要職益廣言路又御史之官號為天子耳目而比年以來専舉六察故事廢國家治亂之大計察官司簿領之細過況唐制湮没已乆别無分明稽據臣在樞府日常見先皇頗已厭其煩碎特因近臣獻言􅂓試其法耳伏乞盡罷察案只置言事御史四人或六人仍詔諫官御史並須直言無諱規主上之過失舉朝政之疵繆指羣臣之姦黨陳下民之疾苦言有可用不以人微而廢言令或未便不為已行而憚改所言無取姑亦容之以示明盛之世終不以言罪人若緘黙巽懦畏避不言者明正其罰如此則左右前後不能壅蔽嘉言罔伏庶績咸熙天下幸甚元豐八年六月上時初召至闕十月乃詔監察御史兼言事殿中侍御史兼察事上哲宗乞增諫員及許察官言事劉摯臣䝉恩過聴使備員御史固將竭盡愚論知無不言而竊惟陛下即位臨政之始其所先者宜莫若廣言路故臣今就職之日首獻其說蓋聖人以一心御萬事而無遺慮以一視周四海而無遺照非能身親而自得之也為能咨諏訪逮致人之言開闢其塗使無壅蔽上之公卿大夫百執事下之工瞽執藝下賤芻蕘負薪之鄙皆得輸意自竭雜然至前而聴吾之所擇唯懼乎言者之不能多也祖宗以來諫官御史張設員品罕不備足凡在職者皆有言責臣今伏見諫官止有大夫一員御史臺自中丞而下雖十員然止於中丞侍御史兩殿中於法得言事外監察御史六員専於察治官司公事文書之稽違者而不與於言則是在朝廷以言為官而任其責者裁此五人而已天下之大臣工之衆權僭之漸朋比之萌民之休戚政之利病其於獻納伺察誠恐耳目之未廣事或有不得盡聞於聖聴者非所謂明四目達四聰開衆正屈羣策者也臣欲望聖慈於諫院增置諫官員數本臺六察御史並許言事其所領察案自不廢如故所貴共盡忠力交輔聖政臣不勝惓惓元豐八年九月上時為侍御史上哲宗乞依六典備置諫官孫覺臣竊以後世諫臣為天子左右耳目之官三代以來官不常置孔子曰天子有諍臣七人所謂七人者三公四輔是也天子一言一動七人者在焉有過不及隨輒正之故人君之失不聞於外不見於下尚書曰予違汝弼汝無面從退有後言是也後世七人者不任其責始置諫官唐太宗每召宰相平章必遣諫官俱入小有頗失隨即箴規以此見諫官之職必待命令已行闕遺宣播然後從而救之亦已晚矣唐太宗雖不責宰相以七人之職猶使諫官與聞政事國家以來雖不盡用唐制然祖宗朝諫員亦不為少前後以言舉職見於國史磊落相望大抵於人主躬親聴決獨斷萬幾之際諫員常少先朝是也人主委任柄臣責成攬要之時諫員常多仁宗莊獻太后是也臣竊以今者皇帝陛下沖年嗣位太皇太后同攬政機此宜多設諫員以廣視聴庶幾有補萬一若其人庸下姦邪自宜加罪竄斥以肅百寮若其人直方無所附麗則其所言必有可采如六典諫大夫補闕拾遺凡兩員今臣獨員供職不惟駑蹇朴陋無所聞識又綿力寡助深恐不逮伏乞特賜指揮依六典備置諫官元豐八年九月上時為右諫議大夫十月詔倣六典置諫官具所置員以聞上哲宗乞令臺諫専對孫升元祐元年二月壬戌詔自閏八月垂簾日引一班御史中丞同侍御史或殿中監察御史一員諌議大夫司諫或正言一員同對臣竊觀嘉祐治平之間臺諫風節悚動天下比年以來茍容持禄養交之俗成而臺諫風節掃地盡矣伏以陛下臨御以來登用正人開廣言路發徳音以告中外下明詔以諭四方自古聖帝明王欲治求諫之意不過如此也臣竊惟陛下深居九重所與共天下之事者大臣而已大臣皆至公而無私處事無一不當於理猶當博延羣議杜漸防微若臺諫難於請對忠言不獲面陳樞機之發既虞於失身犬馬之心徒懐於嚮主下情未達壅蔽或生非社稷之福也臣近覩詔㫖許令臣寮請對此實盛徳之舉矣然條制未免曲為防阻者臣愚不避僭越之誅為陛下言之陛下隔日一視朝而一月之間休假居半聴政不過十數日日引一班而臺諫必待長官同對且臺諫之官十有餘員待其議論相同又須無不得次之日方一獲對若日有不得次之人而或議論各異則是有終不獲對者矣夫區區疎逺之臣竭誠欲望簾幃披􅅹肝膽不亦難哉有唐御史蕭至忠號為稱職嘗謂臺中無長官論事不須關白當時以為知言今法式若出於故事則自當隨宜增損若出於陛下之意則陛下方且至誠聴納乃為是形迹妨嫌何示天下不廣也若出於大臣之議則臺諫之對本為大臣而設而乃自下制上曲為防阻此尤大不可也伏望聖慈特出睿斷指揮許令臺諫専對如遇當日有不得次之人仍特引臺諫一班不獨章陛下至誠聴納之徳且以廣達聰明消除壅蔽之患則天下幸甚元祐元年二月上時為殿中侍御史上哲宗乞令臺諫専對王巖叟臣竊以納忠之道貴乎盡論事之體貴乎密不盡則不足以感動聖心不密則不足以成就機事人主待臣下雖無間而臣下自立不能無不同既不同則不能無忌礙而言有所不盡事有所不密言之不盡事之不密非有益於朝廷之道也古之人有以告於君者雖父子之間不以相語況可使他人聞之哉伏望聖慈察臣之言特賜指揮依乆來故事臺諫官只令一人上殿庶使各盡其忠而無不密害成之失且臺諫官天子耳目之任當使各盡其見聞以告主上豈可却使互相窺察常得志同道合之人則可若有懐私意持異見者如何與之共論於上前此不可不察也故事臺諫官論事不相通議亦不關白官長蓋欲以各盡其忠豈可上殿却使兩人同也六曹開封有司之事皆有定法所以官長與屬官同奏對今臺諫官須二人同上則似與六曹開封相類恐非體要如䝉允臣所奏只乞作出自宸衷批出指揮元祐元年二月上時為左司諫上哲宗乞收還給事中新命且在諫職孫覺臣竊聞有㫖除臣給事中聖恩深厚所不敢當然臣伏見前後執政大臣每臺諫臣寮言有及之者多遷官以寵之使罷言職尋即令人剔抉微細過差逐之使去以報其私忿言事官不顧大臣威勢斥言其罪乞行黜免者所以報主上之恩行言守之責也何至言未絶於口而身已擯於外不惟人主威福移於大臣之家又使上為朝廷不顧忌諱直節敢言之士慄慄危懼不保其身豈可不為朝廷惜哉臣近因見御史翟思在神宗朝論韓縝受人私饋馬先朝不為施行翟思為國子司業進神宗挽詞誤落韻亦小過耳言者及之謫守臨江軍御史黄絳言縝為相非才即遷絳國子司業罷其言職臣見仁宗朝言事臣寮為國盡忠於大臣無所避忌者仁宗終始保全之故言者敢肆直言以報國恩一時名臣多由此出如臣微眇流落於外十有五年神宗晚嵗始賜召還皇帝陛下太皇太后陛下臨政之始首䝉擢寘經筵去年七月中始供諫職如臣愚賤前後言事不合聖意者不可勝數宜在斥逐之日久矣今者䝉恩遷給事中於臣之私極為榮幸然臣前後論縝未䝉施行一日去職使縝得挾怨中傷臣實未知死所今日在得言之地尚可布露本末為陛下言之一日去職怨嫌已成如翟思黄絳有希縝意㫖中臣者臣雖欲自辨不可得也伏望聖慈特賜指揮收還給事中新命使臣且在諫職他日韓縝去位之後别有差遣臣不敢辭元祐元年閏二月上後二十日詔覺復為諫議大夫上哲宗乞今後凡有政令除改才到門下並令給事中即時關報臺諌朱光庭臣竊以諫諍之臣為天子耳目之任救正朝廷之事貴於其初凡政令未安於理除授或非其人於命未行之日俾先知之則獻納之間事體甚便近日朝廷所關報者皆是已行之事言者急思救止其道無繇又不免暴於人聴不若於命未行之前都無轍跡足以成朝廷之美故事諫臣許隨宰相入閤蓋當議論之初便思救補不俟命令已行然後攻其失也臣欲乞朝廷今後凡有政令除改才到門下並令給事中即時關報臺諫所貴先事為慮所補不細又足以成朝廷之美伏望聖慈詳酌施行貼黄臣竊聞議者欲將中書門下後省給舍與諫官直舍間斷以防漏泄臣竊以謂天下之事理當使諫官先知貴其救正於未行之前況故事諫官許隨宰相入閤即是事無所不預聞今却使不與給事同省以防漏泄豈不異哉兼將新修省闥析為異處亦非美事臣恐議者故為壅蔽以誤陛下伏望聖慈特賜罷止以廣聰明以重事體又朝廷若謂給事中難以如省部詳備關報臣欲乞將除授只節略職位姓名更改政令具事目大綱關報所貴簡便易於施行元祐元年十一月上時為左司諫上哲宗論隔截諫官直舍王巖叟臣伏覩近降聖㫖令隔截門下中書兩省諫官别開門出入不得與給事中中書舍人相通𫝊聞之初臣不敢以為信蓋既謂之同省豈有異户而出不相見之理及觀敕文乃是信然臣愚不諭朝廷此舉之意若以謂欲絶漏泄之弊則臣以謂漏泄在人不在門户門户之禁素已甚嚴今更加申敕足矣何必以隔異門牆為事哉所隔異者乃二三諫官而已諫官為陛下耳目陛下每不惜推赤心以與之奈何於其所舍反若置疑也儻其人為可疑也則斥而逺之使勿居其地為可親也則宜與之無間者也陛下不與諫臣為密而與誰為密乎臣固知陛下無此意然事行則終累陛下耳自古置諫臣以能彌縫朝廷之闕使不見乎外為美故彌縫不厭早早則為功易而所全者多矣且朝廷之事終能使諫臣不知乎禁之雖嚴不過緩一二日終當聞耳茍有所未善能禁其勿言乎既不能使之不知又不能使之勿言則不若令早知而論之為有補也臣以謂廟堂之上精慮而審發政令一出天下無可得而議此乃所以為密也今外人皆云非所以嚴制敇院也乃欲以限隔諫官使不聞省中事此聲流𫝊恐非朝廷美事臣竊為陛下惜之伏以陛下誠心好諫而樂聞有過故一言一動天下莫不歌美以為中理不可誤信此事使天下有疑於聖徳也伏望為國家愛惜大體以慰衆心特罷隔截兩省指揮且令仍舊幸甚貼黄陛下即位踰年兩省中未嘗有漏泄之事害成於朝廷何故今日改作以動論議伏望聖慈且令依舊則國體所全者多矣元祐元年十一月上時為侍御史上哲宗論隔截諫官直舍王覿臣近於十一月二十五日有封事言兩省擗截諫官􅈦出外隳壊法度乞行寢罷及十一月二十七日與諫官鮮于侁朱光庭列狀聞奏各未䝉施行臣竊以自古聖帝明王莫不有諫諍之臣蓋三代以前上自公卿次及百執事下至百工芻蕘皆可諫諍故雖不以諫諍名官而骾言直論常達於人主之聴及世衰道微言出於口而禍及其身者寖多故為人臣者若不以諫諍名官則鮮肯以諫諍為事於是秦漢以來乃始有諫大夫率皆列職清近日侍人主然嵗月綿逺其􅈦事之所在有不可考者唯隋唐事近𫝊說甚明諫官於隋屬門下省唐初因之亦嘗屬中書省後乃分别兩省終於有唐未之或改也夫御史與諫官均任言責然御史臺在外而獨諫官既為侍從又列於兩省者何也蓋御史専在糾正百官必在外然後百官趨赴􅈦事鞫獄為便諫官之職専在於論政事之過差補人主之闕失故不在政事之地則無以盡聞政事之過差不列侍從之班則無以盡知人主之闕失也自五代亂離隋唐法度無復存者本朝祖宗以來講復前代之法度十八九矣唯是兩省之闕典至神宗而後復然諫官雖已列於兩省政事之地猶未預於入閤侍從之班今乃防諫官漏洩政事而欲擗截􅈦事出外使不得在兩省亦異於設諫官之本意矣夫兩省若有幾密之事吏人可密者諫官豈不能密耶兼見今諫官雖在兩省於政事實不預聞況幾密哉昔魏省少府楊阜欲上疏省宫人召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密而與此等為密乎明帝聞愈憚阜後世以為美談臣常謂陛下聖徳比堯舜豈於此而不逮明帝耶臣常以臯夔稷契期執政豈於此而不逮楊阜耶且先帝孜孜講復隋唐數百年法度既合於古又宜於今乃一旦無故而壞之一不可也中書所謂制敕院者吏舍也迫逐天子之諫官以廣吏舍二不可也深信胥吏與之為密而過疑諫官以為漏洩三不可也使天下知朝廷有疑諫官之心有厭諫官之迹非所以廣聖徳於天下四不可也散騎常侍下執政一等爾今偶闕員不可謂終無其人也至於左右史亦陛下侍從之臣安可使中書吏人據其㕔事奪其正門而常侍諫官左右史乃屏置一隅穴垣牆而出入事體顛倒增長吏氣五不可也憎諫官者雖取快一時而五不可長之患歸於朝廷又使三省執政大臣皆受迫逐諫官之名為後世笑臣竊為陛下惜之臣愚暗不才陛下過聴擢為諫官若議論失當陛下罪之執政大臣惡之或一二日而罷或二三月而黜皆不可知也豈謂諫官可以久為而兩省可以安處哉蓋欲為朝廷長乆之計而已非臣謀身之計也若既憂得罪於陛下又慮見惡於大臣坐視法度之廢壊而緘黙不言則不唯有負陛下言責亦豈不自愧於心哉故不避冒凟聖聴而喋喋不已陛下或采其言或賜之斧鉞之誅唯聖慈裁擇貼黄臣竊聞今來擗截本因中書差除有豫先𫝊播出外者故執政大臣有制敕院之議遂欲擗截諫官㕔出外大凡差除既得聖㫖之後須有詞頭舍人方知之及文字到門下省給事中方知之此只是首尾一日内之事次日到尚書省下吏部則外人無不知者矣雖知之自已是朝廷宣布之事人知乃其宜也有何所害唯是未得㫖已前外人已知即於政體有害然未得㫖已前若非執政大臣自有漏洩給舍何縁得預外人何縁得聞既給舍與外人皆未得預聞即諫官何縁得知唯張璪在中書日務收恩凡差除纔經商量而未奏即多已漏洩於其所親自以謂恩出於我而已故差除有旬日半月以前先已𫝊播後果如其所𫝊者也今執政大臣皆先朝耆舊及陛下所自選擇全才重望之人但無若張璪收私恩者即何慮差除之漏洩耶不當歸咎於制敕院亦不當縁此限隔諫官而使之不得在兩省也諫官在兩省與不在兩省於諫官何所重輕但於朝廷法度有害耳臣區區所惜者朝廷法度而已唯聖慈詳酌元祐元年十一月上時為右司諫尋詔前降指揮不行上哲宗論不當於耳目之官置黨附之疑孫升臣聞古人有言曰武王諤諤而昌桀紂黙黙而亡夫以一士之謇諤豈足致成周之昌一人之循黙安能速夏商之亡積累然也何則謇諤之言達則壅蔽之患除壅蔽之患除則忠言日聞忠言日聞則變止於未然禍消於未兆詩曰濟濟多士文王以寧則其昌也不亦宜乎循黙之風長則壅蔽之患成壅蔽之患成則忠言不聞忠言不聞則變生於不測禍至於已然詩曰雖無老成人尚有典刑曾是莫聴大命已傾則其亡也不亦宜乎壅蔽之傷國其患如此是以秦之盛强金城千里子孫帝王萬世之業而趙髙咫尺以鹿名馬則四海九州之以亂為治以危為安以白為黑以賢為愚固無足怪是以民窮而主不恤下怨而上不知俗已亂而政不修此壅蔽之極而秦之所以亡也夫世之治亂係乎君子小人消長内外而已天下君子寡而小人衆君子常患乎在外而小人常患乎居内是以自古治世少而亂世多也然則朝廷之有君子可不貴哉恭惟二聖臨御以來首開言路登用正人天下所謂忠信端良之士豪傑俊偉之才俱收並用無有棄遺近世得人之盛未有如今日者也君子日進而小人日退忠正日長而邪慝日消在廷濟濟有成周之風此首開言路之效也臣愚不肖遭遇明時獲在言職嘗䝉賜對親承徳音使盡言無間雖有過差聖慈為之主張臣佩服訓辭以謂自古聖帝明王欲治求言之意不過如此而已伏惟皇帝陛下恭黙不言太皇太后陛下簾聴庶政一日萬幾之微四海九州之逺深居房闥與共事者元老執政大臣爾令此數人者皆至公而無私處事無一不當於理猶廣達耳目杜漸防微況未能皆至公而無私處事無一不當於理而陛下乃於耳目之臣論議之際置黨附之疑開小人之隙疑間一開讒巧必作則君子不可勝誅而言者不安其職矣言者不安其職則朋黨比周之說勝賣直掠美之言入則雖聖聴不能無惑聴惑則其弊必至於厭言言厭則循黙之風作壅蔽之患生忠言不復聞矣臣竊恐非朝廷之福也臣不勝大懼願陛下深思往古之明戒無替前日之訓詞除黨附之疑心待端良之君子無使循黙之風作壅蔽之患生則天下幸甚貼黄御史中丞傅堯俞厯事四朝白首一節端方重厚中外共知必不黨諫官以負陛下自汙平生操履也侍御史王巖叟剛勁不回超擢進用皆出聖知必不黨諫臣以負陛下自取棄絶也元祐元年正月上時為殿中侍御史宋名臣奏議巻五十三
