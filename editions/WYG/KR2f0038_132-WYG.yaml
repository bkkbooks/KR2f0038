body:
  text: 宋名臣奏議巻一百三十二宋趙汝愚編邊防門遼夏四上仁宗乞選用酋豪各守邊郡劉平臣聞五代之末中國多事四方用兵唯制西戎似得長䇿于時中國未嘗遣一騎一兵逺屯塞上但任土豪為衆所服者以其州邑就封之凡征賦所入得以贍兵由是兵精士勇將得其人而無邊陲之虞太祖掃清天下謂唐末諸侯跋扈難制削其兵柄收其賦入自節度使以下第其俸禄或四方有急則領王師行討事已兵歸宿衛將還本鎮雖為長䇿然當時大臣不能逺計亦以朔方李彞興靈武馮繼業移于内地自此靈夏漸敝中國命將出守發兵出屯千里就粮逺近騷擾十年之中兵民交困靈武既失守趙徳明以僻守一隅且懼問罪亟馳驛奏願備藩臣朝廷姑務息民即以靈夏兩鎮授之徳明潜治甲兵日滋邊患當時若止棄靈夏綏銀四州限山為界使徳明逺遁漠北則無今日之患既以山界蕃漢人户幷授之而鄜延環慶涇原秦隴嵗宿兵數萬今元昊僣逆恣行殺害衆叛親離復與罝勒斯賚相持已久結隙方深此乃天亡之時臣聞冦不可玩敵不可縦或元昊一旦為人殺戮酋豪代之與罝勒斯賚通和約契丹相為表裏則西北之憂未可測矣若以鄜延環慶涇原秦隴四路軍馬分為兩道益以蕃漢弓箭手歩騎得精兵二十萬比元昊之衆三倍居多乗人心離散與罝勒斯賚立敵之時沿邊州軍轉徙粮草二百餘里不出一月可坐致山界洪宥等州招集土豪授以職名給衣禄金帛自防禦使以下刺史以上次第封之以土人補將校勇者貪于禄富者安于家不期月而人心自定或授罝勒斯賚以靈武軍節度使西平王使逼元昊河北族帳復出鄜延石州蕃歩騎攻西河部族以厚賞招其酋帥其衆離貳則大軍進討以所得城邑而封之元昊不過竄身河外一窮寇爾今元昊倚山界洪宥等州蕃部為肘腋以其勁勇而善戰鬪若失之是斷其左右臂靈夏綏銀不産五穀蕃部馳騁不習山界道路每嵗供給資粮以贍之若收復洪宥限以山界憑髙據險下瞰沙漠各列保障量以戍兵鎮守此天險也彼靈夏綏銀千里黄沙本非華土往年調發逺戍老師費財官私疲弊以致小醜昌熾此謀之不臧也或朝廷貸元昊之罪更示含容宿兵轉多經費尤甚恐北狄謂朝廷養兵百萬不能制一小戎有輕中國之心然亦須議守禦之長計或元昊潜與契丹結為援以張其勢則安能減西兵以應河北譬如一身二疾不可並治必輕者為先重者為後也請召夏竦范雍與兩府大臣議定攻守之策令邊臣遵守寳元二年閏十二月上時為鄜延環慶路副都部管上仁宗論西邊事宜陳執中臣伏見元昊乗天下久不用兵而竊發西陲以㳺兵而困勁卒用甘言而悦守臣一旦連犯亭障延安㡬至不保范雍納詭詐之説失於戒嚴劉平任輕躁之心喪其所部上下紛擾逺近駭驚自金明李士彬族破而沿邊籬落大壊塞門至金明二百里須列修三城每城屯精卒千人招土民為弓箭手冦大至則入保城壘小至則自可驅逐每城選閤門祇候以上寨主都監別以諸司使為蘆闗一路都巡檢以填士彬之闕仍以兵二千人為三寨之援使上下應接左右相顧為不可攻之勢並邊熟羌久居漢地未嘗逃徙者委邊臣拊存之潛通賊謀反覆者破逐之至於新附黠羌尤為難信議者欲結西域諸國為天兵之援且戎狄貪而無親勝不相下恐徒耗金帛而終誤指縦涇原康奴滅蔵大蟲巉數族久居内地常有翻覆之情更轄戩以沿邊巡檢彼既不孝於父安肯納忠於國若交兵之際與賊互出首尾則疆場之憂百倍于前邊兵小屈皮膚之傷也民力既窮腹心之疾也凡軍須一出於民夫運而妻供父挽而子荷道路愁歎井落空虚今復徧修城池欲如河北之制及夏須成使神運之猶未及况民力乎當四路用兵之郊列城禦冦之地騎不並轡車不方軌唯涇州鎮戎軍似少平易若不責外守而勞内營誠取笑狂童未為上䇿大役既興春種不入食竭必亡力竭必亂嘯聚千百惡黨相従小則掠道路大則攻縣鎮賊兵外擾羣盜内侵臣恐宵旰之憂不在于一方矣請且修沿邊城池其次邊如延州之鄜同環慶之邠寧不過五七處量為營葺則科率既減民力稍蘇仍須土兵漸減騎卒盖土兵增則守禦有備騎卒减則轉餉可蠲優爵秩之科以誘兼并寛茶鹽之法以邀入中静守以驕其志蓄鋭以挫其鋒更須主張將臣使横議不及則忠臣得以盡節虎士得以忘生也康定元年上時同知樞宻院事上仁宗乞嚴邊城實闗内范仲淹臣聞兵家之用在先觀虛實之勢實則避之虚則攻之今縁邊城寨有五七分之備而闗中之備無三二分若昊賊知我虛實必先脇邊城不出戰則深入乗闗中之虛小城可破大城可圍或東阻潼闗隔兩川貢賦沿邊懦將不能堅守則朝廷不得髙枕矣為今之計莫若且嚴邊城使持久可守實闗内使無虛可乗西則邠州鳳翔為環慶儀渭之聲援北則同州河中府阨鄜延之要害東則陕府華州據黄河潼闗之險中則永興為都㑹之府各須屯兵三二萬人若冦至使邊城清野不與大戰闗中稍實豈敢深入復命五路修攻取之備張其軍聲分彼賊勢使弓馬之勁無所施牛羊之貨無所售二三年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上䇿也又聞邊臣多請五路入討臣竊計之恐未可以輕舉也太宗朝以宿將精兵北伐西討艱難嵗月終未收復縁大軍之行粮車甲乗動彌百里虜騎輕㨗邀擊前後乗風揚沙一日數戰進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也况今承平嵗久中原無宿將精兵一旦興深入之謀保難制之勝臣以謂國之安危未可知也然則唐漢之時能拓疆萬里者蓋當時授任與今不同既委之以兵又與之税賦而不求速効故養猛士延謀客日練月計以待其隙進不俟朝廷之命退不闗有司之責觀變乗勝如李牧之守邊可謂善破虜矣惟陛下深計而緩圖之康定元年五月上時為陜西都轉運使上仁宗論廟筭三事歐陽修臣伏見自元昊叛逆陕西用兵以来為國言事者衆矣臣切為三策以料賊情然臣迂懦不識兵之大計始猶遲疑未敢自信今兵興既久賊形已露如臣素料頗不甚逺故切自謂可以助萬一者謹條以聞惟陛下仁聖寛其狂妄之誅夫闗西弛備而民不見兵者二三十年矣賊萌亂之初蔵形隠計卒然而来當是時吾之邊屯寡弱城堡未修民習久安而易驚將非素選而易敗使其率衆来攻可以奮而深入然國威不屈民力未疲彼得城而居不能久守虜掠而去吾以邀擊其歸此下策也故賊知而不為戎狄侵邊自古為患其攻城掠野敗則走勝則来盖其常事此中䇿也故賊兼而用之若夫假僣名號以威其衆先擊吾之易取者一二悦其心然後訓養精鋭為長久之謀故其来也雖勝而不前不敗而自退所以誘吾兵之勞也或擊吾之東或擊吾之西乍出乍入所以使吾兵分備多而不得少息也吾欲速攻賊方新鋭坐而待戰彼則不来如此相持不三四嵗兵已老民已疲不幸又遇水旱之灾調歛不勝而盜賊羣起彼方奮其全鋭擊吾困敝可也使吾不堪其困忿而出攻決于一戰彼以逸而待勞亦可也幸吾苦兵計未知出遂求通聘以邀嵗時之賂度吾窘急不得不従亦可也是吾力益窘則賊謀無施不可此兵法所謂不戰而疲人兵者此上策也賊今方用之今三十萬之兵食于西者二嵗矣又有十四五萬之鄉兵不耕而自食其民自古以来未有四十五萬之兵連年仰食而國力不困者也臣聞元昊之為賊威能畏其下恩能死其人自初僣叛嫚書已上逾年而不出一出則鋒不可當執却蕃官獲吾將帥多禮而不殺其兇謀所蓄皆非倉卒者也奈何彼能以上䇿而疲吾吾不自知其巳困彼為久計以撓我我無長策以制之哉夫訓兵養士伺隙乗便用間出竒此將帥之職也所謂閫外之事而君不御者可也至于外料敵之謀内察國之勢知彼知此因謀制敵此朝廷之計也所謂廟筭而勝者也不可以不思今賊謀可知以久而疲我耳吾勢可察而西人已困矣誠能豐財積粟以紓西人而强國壯兵則賊謀沮而廟筭得矣夫兵攻守而已然皆以財用為强弱也守非財用而不久此不待言也試言其攻昔秦席六王之强資以事胡卒困天下而不得志漢因文景之富力三舉而纔得河南隋唐突厥吐蕃常與中國相勝敗擊而勝之有矣未有一舉而滅者然秦漢尤强其所難攻者今元昊之地是也自劉平陷没賊鋒熾鋭未嘗挫衂攻守之計未知所得天威所加雖期于掃盡然臨邊之將尚未得賊釁隙挫其兇鋒是攻守皆未有休息之期而財用不能為長久之計臣未見其可也四十五萬之人坐而仰食然闗西之地物不加多闗東所有莫能運致掊克細碎既以無益而罷去矣至于鬻官入粟而下無應者改㩁貨之法而商旅不行是四十五萬之人唯取足於西人何為而不困困而不起為盜者須水旱耳外為賊謀之所疲内遭水旱之多故天下之患可勝道哉夫闗西之物不能加多則必通其漕運而致之漕運已通而闗東之物不充則無得而西矣故臣以為通漕運盡地力㩁商賈三術並施則財用足而西人紓國力全而兵可以久以守以攻惟上所使夫小瑣目前之利既不足為長久之謀非旦夕而可效故為長久之計者初若迂愚而可笑在必而行之則其利博矣故臣區區不敢避迂愚之責上便宜三事惟陛下裁擇其一曰通漕運臣聞今為西計者皆患漕運之不通臣謂但未求之耳今京師在汴漕運不西而人之習見者遂以為不能西不知秦漢隋唐其都在雍則天下之物皆可至西也山川地形非有變易于古其路皆在昔人可行今日胡為而不可漢初嵗漕山東粟數十萬石是時運路未修其後武帝益修渭渠至漕百萬餘石隋文帝時沿水為倉轉相運致闗東汾晉之粟皆至渭南運物最多其遺倉之迹往往皆在然尚有三門之險自唐裴耀卿又尋隋迹於三門東西置倉開山十八里為陸運以避其險卒泝河入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米以實闗西後世言能經財利而善漕運者耀卿與晏為首今江淮之米嵗入于汴者六百萬石誠能分給闗西得一二百萬石足矣今兵之食汴漕者出戍甚衆有司不惜百萬之粟分而及之其患者在三門阻其中耳今宜浚汴渠使嵗運不阻然後按求耀卿之迹不憚十許里陸運之勞則河漕通而物可致且紓闗西之困使古無法尚當為之况昔人行之未逺今人行之而豈難哉按耀卿與晏初治漕時其得尚少至末年其得十倍是可久行之法明矣此水運之利也臣聞漢髙祖之入秦不由東闗而道南陽過酈析而入武闗曹操等起兵誅董卓亦欲自南陽道丹析而入長安是時張濟又自長安出武闗奔南陽皆自古用兵往来之徑臣嘗至南陽問其遺老自鄧西北至永興六七百里今小商賈往往行之初漢髙祖入闗其兵十萬夫能容十萬兵之路宜不甚狭而險也且自雒陽為都行者皆趍東闗其路久而遂廢今能按求而通之自武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽自南陽為輕車人輦而逓之募置逓兵為十五六鋪則十餘州之物日日入闗而不絶沿漢之地山多美木近漢之人仰足而有餘以造舟車甚不難也前日陛下深恤有司之勤内賜禁錢數十萬以給西用而道路艱逺輦運踰年不能畢至至于軍装輸送多苦秋霖邊州已寒冬服尚滯於路其艱如此夫使州縣綱吏逺輸京師復従京師轉冒艱滯然後得西豈若較南陽之旁郡度其道里入于武闗與至京師近逺等者與尤近者皆使直輸于闗西京師之用有不足則以禁帑出賜有司者代而充用其迂曲簡直利害較然矣此陸運之利也其二曰盡地利臣聞昔之畫財利者易為功今之言財利者難為術昔者之民賦税而已故其不足則煮海鑄山搉茶與酒征闗市而筭舟車尚有可為之法以茍一時之用自漢迄今其法日增其取益細今取民之法盡矣昔者賦外之征以備有事之用今盡取民之法于無事之時悉以冗費而縻之矣至卒然有事則無法可增然猶有可為者民作而輸官者已勞而游手之人方逸地之産物者耕不得代而不墾之土尚多是民有遺力地有遺利此可為也况歴視前世用兵者未嘗不先營田漢武帝時兵興用乏趙過為畎田人犂之法以足用趙充國攻西羌議者争欲出擊而充國思全勝之䇿能忍而待其弊至違詔罷兵而治屯田田於極邊以游兵而防鈔冦則其治田不為易也猶勉為之方曹操屯兵許下時强敵四面以今視之疑其旦夕戰争不暇然用棗祗韓浩之計建置田官募民而田近許之地嵗得穀百萬石其後郡國皆田積穀數百萬隋唐田制尤廣不可勝舉其勢艱而難田莫若充國迫急而不暇田莫如曹操然皆勉焉不以迂緩而不田者知地利之博而可以紓民勞也今天下之土不耕者多矣臣未能悉言請舉其近者自京邑以西地之不闢者不知其數非土之瘠而棄也蓋人不勤農與夫役重而逃爾久廢之地其利數倍於營田今若督之使勤以免其役則願耕者衆矣臣聞鄉兵之不便於民議者方論之矣充兵之人遂棄農業託云教習聚而飲博取資其家不顧無有官吏不加禁父兄不敢詰家家自以為患也河東河北闗西之鄉兵此猶有用若京東西者平居不足以備盜而水旱適足以為賊其尤可甚患者京西素貧之地非有山澤之饒民唯力農是仰而三夫之家一人五夫之家二人為游手凡十八九州以少言之尚可四五萬人不耕而食是相靡耗而重困也今誠能盡驅之使耕於棄地官貸而種嵗田之入與中分之如民之法募吏之習田者為之田官優其課最而誘之則民願田者衆矣太宗皇帝時嘗貸陳蔡民錢使市牛而耕真宗皇帝時亦用耿望之言買牛湖南而治屯田今湖南之牛嵗賈於北者皆出京西若官為買之不難得也又宜重為法以困所謂私牛之客私牛之客不容于民而樂為官耕凡民之已有牛者使自耕則牛無不足而官市者不多且鄉兵本農也籍而為兵遂棄其業今幸其去農未久尚可復驅還之田畝使不得羣遊而飲博以為父兄之患此民所願也一夫之力以逸而言嵗任耕廢田一頃使四五萬人皆耕而久廢之田利又數倍則嵗穀不可勝數矣京西之地北有大河南至漢而西接闗若又通其水陸之運所在積穀惟陛下詔有司而移用之耳其三曰榷商賈臣聞秦廢王法啟兼并其上侵公利下刻細民為國之患久矣自漢以来欲為法而抑奪之然不能也蓋為國者興利日繁兼并者趨利日巧其至甚也商賈坐而擁利其故非它由興利廣也夫興利廣則上難専必與下共之然後通流而不滯然而為今議者方欲奪商之利一歸于公上而専之故奪商之謀益深則為國之利益損前日有司屢變其法每一變則一嵗之間所損已數百萬議者不知利不可專但云變法之未當變而不已其損愈多夫欲十分之利皆歸于公至其虧少十不得三不若與商共之常得其五也今為國之利多者茶鹽耳茶自變法以来商賈不行一嵗之失數年莫補所在積朽棄而焚之前議者屢言三説之法為便有司既詳之矣今誠能復之使商賈有利而通行則上下濟矣解池之鹽積若山阜今宜暫下其價誘羣商而散之先為令曰三年將復舊價則貪利之商争先而凑矣夫茶者生于山而無窮鹽者出于水而不竭賤而散之三年十未減其一二夫二物之所以貴者以能資國之錢幣耳今不散而積之是惜朽壤也夫大商之能蕃其貨者豈必錙銖躬自鬻於市哉必有販夫小賈就而分之販夫小賈無利則不為故大商不妬販夫之分其利者恃其貨博雖取利少貨行流速則積少而為多也今為大國者有無窮不竭之貨反妬大商之分其利寧使無用而積為朽壤何哉故大商之善為術者不惜利而誘販夫大國之善為術者不惜利而誘大商此商賈共利取少而致多之術也又今商賈之難以術制者以其積貨多而不急故也利厚則来利薄則止不可以號令召也故每有司變法下利既薄小商以無利而不能行則大商方幸小商之不行適得獨賣其積貨尚安肯勉趨薄利而来哉故變法而刻利者適足使小商不来而為大商賣積貨也今必欲以術制商宜盡括居積之物官為賣而還之使其貨盡而後變法夫大小商以利為生一嵗不營利則有遑遑之憂彼盖不能守積錢而閑居得利雖薄猶將勉而来此變法制商之術也夫欲誘商而通貨莫若與之共利此術之上也欲制商使其不得不従莫若痛裁之使無積貨此術之下也然此可制茶商耳若鹽者禁益宻則冒法愈多而刑繁若乃縣官自為鬻市之事此大商之不自為臣謂行之難久者也誠能不較錙銖而思逺大則積朽之物散而錢幣通可不勞而用足也臣愚不足以知時事若夫堅守而扞賊利則出而擾之凡小便宜願且委之邊將至于積穀與錢通其漕運不二三嵗而國力漸豐賊鋭漸挫而有隙可乗然後一舉而滅之此萬全之䇿也願陛下以其小者而責將帥謀其大計而行之則天下幸甚康定元年十二月上時為太子中允館閣校勘上仁宗論夏賊未宜進討范仲淹臣聞昨賊界投来山遇嘗在西界掌兵言其精兵纔及八萬餘皆老弱不任戰鬭始賊衆深入盖為官軍以分地自守既不能獨禦賊鋒又不能併力掩殺彼得其便繼為邊患其虜刼生口牛羊亦不曾追奪故安然往来如蹈無人之境今延州東路合隄防之處已令朱吉與東路巡檢駐軍延安寨其西路亦委王信張建侯狄青黄世寧在保安軍每日訓練及令西路巡檢劉政在徳青寨張宗武在政縣宻令分布兵馬候賊奔衝放令入界會合掩擊之數路並入且併衆力禦敵或破得一處即便邀擊别路其環慶路已遣通判馬端往報總管司令一如鄜延路設備如此則可以乗勝而破賊也今須令正月内起兵則軍馬粮草動踰萬計入山川險阻之地塞外雨雪暴露僵仆使賊乗之所傷必衆况鄜延路已有㑹合次第不患賊先至也賊界春暖則馬瘦人飢其勢則易制及可擾其耕種之務縦出師無大獲亦不至有它虞自劉平陷沒之後修城壘運兵甲積粮草移士馬大為攻守全勝之䇿非為小利而動如重兵輕舉萬一有失將何繼之則必闗朝廷安危之憂非止邊患之謂也茍自今賊至不擊是臣之罪也兵法曰戰道必勝主曰無戰必戰可也戰道不勝主曰必戰不戰可也臣昨于九月末至鄜延路便遣葛懐敏朱觀入界掩襲族帳盖與今来時月不同非前勇而後怯今若承順朝㫖不能持重王師為後大患雖加重責不足以謝天下茍伺春暖舉兵尤未能失䇿且元昊稔惡以来欲自尊大必被奸人所誤謂國家太平日久不知戰鬭之事又謂邊城無備所向必破所以􅔤桀慢之心侵擾不已今邊鄙漸飭度其已失本望况已下敕招擕族帳首領臣亦遣人探問其情欲通朝廷柔逺之意使其不僣中國之號而修時貢之禮亦可俯従今鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷廣天地包荒之量存此一路令諸將勒兵嚴備賊至則擊但未行討伐容臣示以恩意嵗時之間或可招納如先行攻掠恐未能擒其聚落如白豹之功官軍既退戎𩔖復居狼心重報增其怨毒邊患愈滋無時敢暇若天兵屢動不立大功必為夷狄所輕臣又近召張亢到延州熟議亦稱願與戎人相見於界上臣所以乞存此一路者一則懼春初盛寒士氣愈怯二則恐隔絶情意偃兵未期若施臣之鄙計恐是平定之一端茍嵗月無效遂舉重兵取綏宥二州擇其要害而舉之屯田營田作持久之計如此則横山一帶蕃漢人户去昊賊相逺懼漢兵威逼可以招降或即奔竄則是去西賊之一臂拓疆制冦無輕舉之失也慶歴元年正月上時為陕西經畧安撫副使知延州先是康定元年閏十一月朝廷詔鄜延涇原兩路取正月上旬進兵入討西賊故仲淹上此奏上仁宗乞先修諸寨未宜進討范仲淹臣近准陕西都招討使夏竦牒連到朝廷指揮所有行軍所須令三司與韓琦等商量疾速擘畫應副者臣今據鄜延路部管葛懐敏等申所要軍須粮草共四狀繳連進王臣相度前項軍須粮草萬數不少必是一兩月辦集未得如令辦搬運上項隨軍輜重粮草又須用廂軍二三萬人必慮諸處廂軍數少起發不得或使駱駞騾子一二萬頭即山路險隘與兵馬三二百里轉難主管若多差人夫即恐有雨雪之變﨑嶇暴露稍有驚危便多逃散抛棄粮草為賊之資臣切見延州廢却承平南安長寧安逺寨門栲栳六寨之後自延州去賊界二程斥堠漸逺賊馬動息卒不可知又退却疆界賊轉深入又况延州東路廢却諸寨歸明弓箭手盡皆流移著業未得又諸寨側近蕃部亦多驚起在近裏與漢户雜居今春未有土田耕種若不修復舊寨其蕃部既無活路恐糾率打刼近邊人户走入横山賊界則其患不細臣又聞得横山蕃部散入巖谷多設堡寨控扼險處入界之時兵少則難近多則難行假使主將智勇能奪其險彼則逺遁我無所獲須過横山後方到平沙却無族帳可取其討伐之計須是將帥出竒兵従天落則有非常之功似今重累而行實憂不利臣雖宻奏朝廷留此一路未速討伐以示招来之意其邊界舊寨不可不謀乞作聖意指揮遣近上使命急至鄜延路令與臣催促諸將于二月半後出兵萬餘人於廢寨中揀有利處先次修復未須大段軍須只以隨軍運粮兵夫因便興工候著次序選驍㨗將兵以守之既逼近蕃界彼或㸃集人馬朝夕便知大至則閉壘以待隙小至則扼險以制勝彼或放散人馬亦朝夕便知我則運致粮草以實其備彼若歸順我已先復舊疆彼未歸順我已壓于賊境横山一帶在我目中强者可襲弱者思附此亦禦邊之一事然修復諸寨亦動軍民煩費不少比之入界勞弊則有經久之利而無倉卒之患且安存得東路熟户蕃部并歸明弓箭手乞聖慈裁酌慶歴元年二月上仲淹繼此又言臣所以不敢更執前議乞擇廢寨中有利者先次修復一則安存得上項熟戸弓箭手各著農畝無畔離之患二則遮障漢户且為籬落三則耕作地廣粮草易為四則城寨逼近蕃界之後賊為聚散朝夕便知易為設備五則將来委諸将在彼就近為謀賊大至則守小至則擊有間則攻使居不得安耕不得時然後可以降集可使逃遁此固撓賊之一策庻幾畏懼早思欵伏前後凡六奏事城承平等十二寨蕃漢之民相踵復集上仁宗論出界攻討未便龎籍臣伏以元昊父子受國大恩一朝反叛今朝廷定議討伐以正逆順實合大義然此時興舉須為萬全之䇿臣謂用兵之道必先度我將既良我士既鋭然後料敵之虛實乗其釁隙而一舉滅之去秋鎮戎之戰依城壁據根本以主待客而諸將或傷中而退或閉城不出其士卒旣無用命赴敵之心使賊殘毒人命剽刼財物從容進退如入無人之境可謂將不良士不鋭矣元昊君臣之間未有釁隙又間諜阻絶無由知其虛實而便出界攻討此不可不為朝廷憂也去春劉平等陷沒之後邊城人心日乆惴慄幸即時更張軍政比来士卒之氣漸振儻復一出不利則衆意愈慴必難再奮也况出界之後山川道路我軍素未經渉須以蕃部為鄉導則其姦詐不可不防若至險隘之處部伍輜重尾首遥逺忽有伏兵鈔掠則必至潰散况黄徳和敗手下潰兵不少至今招集未獲若數萬衆更潰而散不敢歸益生邊患不細臣切度廟謨以大兵屯聚已久上費國力下困生民欲決于攻取之計其餘將佐士卒未能如意或且為嵗月持守之備汰去冗兵只留精鋭在邊數少則費用日寛兵精則足禦捍賊地所産之物嚴法以絶之使不得與邊人市易既刼掠無所得兼貨利無所通其勢必日蹙如更益練將卒俟其釁隙可乗然後大舉庻㡬有萬全之䇿也慶歴元年二月上時為陕西轉運使上仁宗論攻䇿七不可田况臣伏見昨夏竦等為累奉詔以師老費財慮生它變令早為經畫以期平定故韓琦等入奏畫攻守二䇿以禀聖筭其守䇿最備可以施行不意朝廷便用攻䇿今一旦禀命不敢持兩端非有夙定之謀必勝之勢倉卒牽合殊無紀律昔繼遷屢擾邊陲太宗親部分諸將五路進討或遇賊不擊或戰衂而還又嘗令白守榮馬惟忠䕶送粮餉于靈州諸將多違詔自奮浦洛之敗死者數萬人今將帥士卒素已懦怯未甚更練又知韓琦尹洙所建之䇿恐未皇禀復臨事進退有誤大舉請以事驗之且行師有期便須恊力今鄜延路總管司葛懐敏等須索百端料必不能應副足以為辭此不可者一也議者以為賊嘗併力而来我嘗分兵以禦衆寡不敵多貽敗衂今若全師大舉必有成功此思之未熟爾夫三軍之命係於將帥之材智材有大小智有逺近以漢祖之善將不若淮隂之益辦况庸人乎茍徒知大衆可以威敵而不思將帥之材智此禍之大者也兩路之入十餘萬人庸將驅之若為舒巻賊若據險設伏邀截衝擊首尾前後勢不相援則奔潰可憂今邊臣所共奬者朱觀葛懐敏爾近于鎮戎軍界劉璠定川等兩川西賊境中生聚牛羊皆遷徙逺去惟空族帳守者二三百人輒来抗敵諸將奔走駭亂幾不自免部隊前後不復可齊兵甲械用大為攘奪今兩路齊入併擊劇賊若有不利則邊防莫守别貽後患安危之計決於一舉此不可者二也自西賊叛命以来雖屢乗機會然不敢深冦郡縣以饜其欲者非筭之少也盖以中國之大賢俊之盛甲兵之衆未易可測今我師深入若無成功大國威靈益為彼輕况或别墮奸計以至它虞此不可者三也議者又云將帥之間雖未足倚下流勇進或有其人自劉平石元孫陷没士氣挫怯未易勇奮今兵數雖多疲懦者衆以庸將驅怯兵入不測之地獨近下使臣數輩干賞圖利欲邀竒功未見其利此不可者四也議者又云非欲深絶沙磧以窮祅巢但淺入山界以挫賊氣如襲白豹城之比臣謂乗虛襲掠既不能破戎首拉兇黨但殘戮孥弱以厚怨毒誠非王師弔伐招徕之體然事出無䇿為彼之所為亦當雷震電逝往来輕速以掩其不備今興師十萬鼓行而西賊已巧為計謀盛設隄備清野據險以待我師何襲挫之有此不可者五也自其冦邊人皆知其誅賞明計數黠今未有間隙之可窺而暴為此舉計事者但欲決勝於一戰幸其或有所成否則願自比王恢以待罪勇則勇矣其如國事何此不可者六也昨延州范仲淹奏乞朝廷開包荒之量存此一路令諸將勒兵嚴備賊至則擊但未行討伐容示以恩意嵗時存問或可招納令尹洙到延州商量仲淹堅執前奏未肯出師若使涇原一路獨入則孤軍進退憂患不淺今諸處採到事宜多言昊賊竢我師諸路入界則併兵一處以拒敵與招来人杜文廣所説一同此正陷賊計中此不可者七也以臣所見夏竦韓琦尹洙同獻此䇿今若奏乞中罷則是前後自相違異殊無定筭欲果決進討則又仲淹執議不同或失期㑹乞召爾府大臣定議但令嚴設邊備若更有侵掠則須出兵邀擊以摧賊勢如復怯懦容賊殺掠當以軍法従事或探得賊界謹自守備不必先有輕舉恐落奸謀如此則全威制勝有功而無患也然自議攻討以来賊中呼集醜類廣為防守遷移勞擾未嘗少安至今却有通欵意亦不為無益至于驢畜軍須之物虛煩調發却欲罷兵亦是事之小者臨時分擘處置亦不為難所顧者安危大計爾乞密降朝㫖下總管司慶歴元年二月上時直集賢院陕西路經畧安撫判官上仁宗兵策十四事田况一曰自昊賊弄兵侵噬西蕃開拓封境僣叛之迹固非朝夕始于漢界縁邊山險之地三百餘處修築堡寨欲以收集老弱併驅壯健為入冦之謀初貢嫚書亦未敢擾范雍在延州屢使王文恩輩先肆侵掠規貪小利賊遂激怒其衆執以為辭王師伐叛弔民之體自此失之劉謙髙繼嵩等破龎諸族任福襲青諸族任福襲白豹城皆指為大功無不殺戮老弱以為首級彼民皆訴寃于賊以求復讐吾民受制異𩔖而又使無辜被戮毒貫人靈上下文移皆謂之打虜吁可媿也或謂國家久不用兵將卒未練欲使趨功騖利習於戰鬭爾然賊界諸處設備甚謹屢行打族俘獲無㡬陷没極多如郝仁禹打卾斡族亡三百四人無所獲任政打諾爾阿堡亡一百九十三人秦鳳部管司打隴波族亡九十六人各獲首一級麟府軍馬司入賊界牽制亡三百八十人斬馘十八人其餘大亡小獲無足言者以此計之實傷挫國威取賊輕侮自今宜且罷打族但嚴設備守以俟賊至然後别為之䇿以破奸謀二曰自昊賊冦邊王師屢戰不利非止人謀不善抑亦衆寡非敵近因好水川之敗士氣愈怯諸將既没牙隊之兵罪皆當斬朝廷普示寛貸欲為招輯伸恩屈法事非獲已軍中相勸以退走自全為得計陕西雖有近二十萬防戍城寨二百餘處所留極少近又欲於鄜延環慶涇原三路各抽減防守戍兵鄜慶渭三州大為屯聚以備賊至然今鄜延路有兵六萬六千餘人環慶路四萬八千餘人涇原路六萬六千餘人除留諸城寨外若逐路盡數那減屯聚一處更㑹合都監巡檢手下兵併為一陣極不上三二萬人賊若分衆而来猶須力決勝負或昊賊自領十餘萬衆我以三二萬人當之其勢固難力制議者但欲以寡擊衆幸於偶勝非萬全䇿也夫能以寡擊衆徼一時之勝者或得地利或發竒䇿非可恃以為常今必敗之形洞可前照而恬然坐視莫知更為計也議者又謂賊若併兵而入則率它路援兵以禦之且賊每入冦既有所得飈馳霧巻一夕而去他路固無所及矣或謂收保邊民持重以觀其勢可擊則擊不可則已賊不過破毁民生因食野積而歸爾此茍一日之不敗則可也深慮後患有異于斯臣去冬在都下嘗聞士大夫相與言謂小羌不足憂何則叛命之初我無邊備若兵隨檄至則闗中安危未可知此賊計之失也自劉平石元孫陷没中外震駭賊長驅而至誰能當之此二失也臣始聞此説亦誠謂此賊之易與也今觀其包蔵變譎圖全擇利乃知所謂失䇿者實賊之得計也且賊之未敢長驅亦猶我之未可深入所以然者主客異勢進退懐疑邊防之兵並出其後險要之地或斷其歸是決成敗于一舉豈勝筭哉自李彬被虜劉平等敗没延州之境蕩然一空日者山外之民殺掠奔潰已亡大半是渭川之境又漸空矣料賊今秋或来春猶且驅刼而已必使我藩籬盡空表裏可見然後攻城破邑漸謀長驅則無後顧之患臣所以謂闗中安危漸不可測願朝廷為勇斷之計也斷之勇者在乎發内帑之財募陕西河東强壯之民五七萬人分屯鄜延環慶涇原三路俯及防秋則以逐處弓手分畨戍守城寨而參以正兵每路及五六萬人以上精加訓練我軍既衆其氣自振也必曰募民兵則衆情不安增邊戍則大費不贍此循常拘近之論也且民兵之法祖宗所行迄今軍中餘老多在加之出錢選募非同㸃差其中必有樂于効用者且内帑之積祖宗本為用兵今乃其時也三曰用兵之法當先有部分部分進退于大將旗鼓常在中軍自西陲用兵每戰必敗好水川之戰任福實為大將而不能指麾統制以為已任乃自率一隊前當劇鋒矢盡勢窮而後陷没忠勇之節雖可嗟憫然論其才力止一䘚之用夫部分不明多則不能辦少則不能勝進無所勸退無所止一有紛亂則其勢北矣欲矯此弊在乎先求大將之才峻其威權而尊寵之如葛懐敏為鄜延部管張亢為鈐轄當以偏裨之禮奔走麾下若犯令即當誅之乃平牒往来動皆鈞禮韓琦范仲淹為經畧副使葛懐敏見之禮容極慢上下姑息三軍之士何所法耶夏竦陳執中不能身當行陣為士卒先至於選擇大將明定部分乃其職也乞朝廷降詔令更互巡邊采察邊臣中有材任大將者特與不次㧞擢其驕怯之將每自顧重不為國家盡力者奏罷之則部分立而功可冀矣四曰自古用兵未有不由間諜而能破敵者也昊賊所用諜者皆厚加賞賂極其尊寵故規我機宜動必得實今邊臣所遣刺事人或臨以官勢或量與茶綵止于熟户族帳内采道路之言便為事實賊臣變詐重成疑惑今請有入賊界而刺得實者以錢帛厚賞之賊將伊埓剛朗凌裕勒且之徒皆元昊親信分廂主兵俯近漢界出入従者不過一人若能募死士陷胷辟首是去賊之手足王㳂嘗欲用此䇿但朝廷不惜美官重賂則功豈難圖五曰唐置都䕶府掌撫慰諸蕃征討斥堠及行賞罰叙録勲勞其屬有長史録事功食户法諸曹得為開府之盛國朝承五代之後事歸邊防當西陲安輯時朝廷故無意及此今昊賊大肆殺掠沿邊屬户各顧家族心生向背又使奸人恣行誘脇以此賊勢轉盛而邊堠無復扞蔽今新置招撫蕃落司所謂招撫者非飲食不足以得其驩非賞賂不足以回其意非術數不足以鼓其動非刑誅不足以制其驕曩者曹偉在秦州誅賞並行戎落慴伏比涇原用韓質秦鳳用張僎皆韓琦隨行指揮使雖各有武勇至于招撫之術豈可倚耶環慶一路熟户未嘗經賊殘破部族全整人堪戰鬬若綏御有術可得精兵數萬請令都管舉官與王懐端恊力招撫仍只令韓琦王沿龎籍張奎同領之事之大者闗報都部管司其餘知州通判更不兼管以養正兵萬人一嵗之費為招撫之具則事無不濟自来熟戸販鬻青白鹽以来厚利今一切禁絶之欲以困賊然絶熟戸之利無以資其生太宗朝鄭文寳請禁青白鹽以困賊遷可不戰而屈人兵詔自陕以西市之者皆坐死其後犯法甚衆戎人乏食冦抄邊郡内屬萬餘帳歸繼遷命錢若水馳傳視之因詔盡復舊制戎人始漸歸附今日之勢若厚加招撫稍寛鹽禁則熟户無不用議者疑邊饋已窘而又興費不貲非至計也且國家通使罝勒斯賚欲誘以為用賜帛二萬以促其出師終無實報是捨熟戸近成之效而信西蕃逺妄之言豈至計耶自昊賊破犛牛城築瓦川㑹而罝勒斯賚逺竄歴精城偷安茍息其子滿濟扎卜轄戬自立皆為仇敵尚不能制矧能為昊賊輕重邪温博竒乃罝勒斯賚親信首領之豪其子一聲金龍有衆萬餘最為强盛乃與昊賊結姻罝勒斯賚曰益危弱今欲以為國家用非臣之所能知也以是論之招撫熟户不猶愈於彼乎六曰環慶路投来蕃部極多夏竦等懲延安之前失慮賊馬奔衝内應為患欲遷襄唐州界給曠土使就生業又皆不肯離往若驟加起遣則戎心動揺或致生事若招撫蕃落司得人令躬至族帳察其心之向漢者給沿邊閑田編于熟户或度其後必生變者徙之内地然恩威裁制其事百端茍非權謀未易集事也七曰蕃落廣鋭振武保捷皆是土兵材力伉健武藝精强戰鬬嘗為士卒先是昊賊擾邊以来惟土兵踴躍志在争功其如請給甚微不及東軍之下者振武料錢五百而二百五十為折支積數月一支又皆靡弊不堪之物如新添虎翼兵自南中選填材質綿弱而云不知戰鬬見賊恐死傳者皆以為笑朝廷但且以塞數為名而已若月添土兵請給事恐難行請遇特支比常優加其數或别定南郊賞例以激其心則其立功必不在東軍之後矣八曰沿邊屯戍騎兵軍額髙者無如龍衛聞其間有不能被甲上馬者况驍勝雲武武騎之𩔖馳走挽弓不過五六㪷每教皆望空發箭馬前一十二步即已墮地以賊甲之堅縦使能中亦不能入况未能中之請宻料邊兵益步卒而減騎軍但五分得一足矣以一騎軍之費可贍步兵二人而又寛市馬之煩擾違害就利莫善于兹也九曰西賊每至諸城寨不料衆寡並須出戰稍有稽違皆以軍法従事使趙奢李牧周亞夫授任於今日獲罪必先于諸將矣邊臣甘死事猶獲子孫之福不敢持重伺隙自取嚴誅今若遇冦大至且堅壁以守須㑹合諸路兵馬可以取勝則令出戰若賊衆不多而畏懦不即追討並行誅之十曰王將用兵非素撫而威臨之則上下不相附指令不如意西賊首領各將種落之兵謂之一溜少長服習如臂之使指既成行列舉手掩口然後敢食虜酋長遥見疑其語言其整肅如此昨任福在慶州蕃漢各已信服士卒亦已諳練一旦驟移涇原值賊至麾下隊兵逐急差撥諸軍將校都不識面勢不得不陷覆今請諸路將佐非大故毋得輕換易庻㡬責其成功十一曰古之良將以燕犒士卒為先所以然者鋒刃之下死生俄頃固宜推盡恩意以慰其心李牧備匃奴市租皆入幕府為士卒費趙充國禦羌戎亦日饗軍士太祖用姚全斌董遵誨抗西戎何繼筠李漢超當北㓂人各得環慶齊棣一州征租農賦市牛酒犒軍中不問其出入故得戎冦息不敢窺邊臣前通判江寧府因造紙甲得逺年帳籍見曹彬征江南日和州逐次起餉猪羊肉數千斤以給戰士近范仲淹在延州奏乞比永興軍秦州支米造酒有司之吝以為無例而罷今請渭延慶三州及諸路部管司並特支米造酒仍比都管司別給隨軍錢務令贍足除軍員外其餘士卒每一季或因都閲或值出入並須量有霑及以慰勞苦古者命將出師閫外之事無不專制財粮用度豈有異司今主兵主財者皆力敵權均紛然相制豈國家任人責功之大體邪十二曰功作器用中國之所長非戎狄可及今賊甲皆冷鍜而成堅滑光瑩非勁弩不可入自京齎去衣甲皆軟脆不足當矢石以朝廷之事力中國之伎巧乃不如一小羌乎由彼專而精我慢而畧故也今請下逐處悉令工匠冷砧打造純鋼甲鏃發赴縁邊先用八九㪷力弓試射以觀透箭深淺賞罰之聞太祖朝舊甲絶為精好但嵗久斷綻乞且穿貫三五萬聨均給四路亦足以禦敵也十三曰今春昊賊冦邊器械攻城之具極為拙鈍此特緩吾備也料賊年嵗間破盡縁邊籬落必驅迫漢民熟户使為先登以攻城邑邊城一有不守事故可憂今修築城寨雖漸完固其如軍民不知守城次第請下河北選守城卒三五十人諸處指教善治器用大為之備賊動必求全常顧後患若邊城堅守攻之不拔則亦未敢長驅而深入也十四曰昊賊蓄謀嵗深盡更漢法自作祅書恩信可以縻文令所能動若非天威振赫大挫姦鋒其勢未已漢界與賊山界相接人民繁庻每来入冦則科率粮草多出其間山界之民引弓甚勁與賊為戰所謂步奚此皆去賊地遥向漢甚邇若承戰勝之勢賊若皆散承其不備分路進兵而攻取之抗禦者誅殛降順者招徕老弱無辜係之南徙其間險要可守之地則築堅壘以據之所得土田給與有功熟戸必不可守則縦兵破蕩以弱賊勢若請命歸欵則裁割縦捨制之在我弭患如此則邊陲可安矣慶歴元年五月上宋名臣奏議巻一百三十二
