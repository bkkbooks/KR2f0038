body:
  text: 宋名臣奏議巻七十三宋趙汝愚編百官門重外任上真宗論重内輕外張知白臣竊覧方册見唐虞之制立四岳十二牧百工允釐百揆時叙又曰三載考績三考黜陟幽明漢史載宣帝為名盛之主美其任人責成知王道之根本常曰與我共治者其惟良二千石乎斯言也𫝊示不朽後之人孰不稱頌哉國家受命上穹光啓鴻業順考古道増崇慶基陛下聴政之初愛民在念煥彼宸範垂為政經授之守臣俾治黔首斯固踵唐虞之盛而稱首於百王矣昔唐李嶠嘗云安人之方湏擇郡守竊見朝廷重内官輕外任毎除牧伯皆避命致訴比遣外任多是貶累之人風俗不澄實由於此望于臺閣妙選賢良分典大州共康庶績臣請輟近侍率先庶僚鳯閣侍郎韋嗣立因而請行遂令以本官出領州郡伏見江浙州郡方切擇人茍有闕員俾之承乏臣雖不肖願繼前脩矧唐年非遥郡故事仍在儻以為允乞舉而行大中祥符四年七月上時為龍圖待制知審官院上英宗乞中外之臣出入更任吕誨臣竊以漢宣時悉出諌官補郡吏諌大夫蕭望之為平原太守内不自得因上疏召還守少府未㡬復為左馮翊憂畏移疾上遣使諭意盖知望之材任宰相欲詳試以政事故也唐陸贄亦言中外迭任誠為國求治之切務也臣伏覩臣僚有初任不曽厯外官後來嘗出國門致身高位者甚非公朝用賢詳試之道也而又此年二府用人除拜不出於京師重内輕外亦以明矣以此居内者安為倚附唯恐補外居外者乆而不復自謂絶陞進之望使盡賢於蕭望之亦未必能平于中也陛下即位之初馭臣之道冝使均平法漢宣詳試之術思任賢共理俾中外之臣出入更任考其績效責以名實以是取人得之必多太平之治不難致矣惟聖神留念天下之福也嘉祐八年上時為殿中侍御史上哲宗論人情樂内輕外顔復臣伏覩陛下求治之意安逺甚乎綏近今人臣事君之心治外懈于治内如此上下相戾欲治登休實而民無失所不可得矣何哉自二聖臨御以來敢有小違民情而幸利于國家者撤而去之唯恐不逮銷欎伊之氣召和順之祥指日以期太平之政由是知陛下視逺如邇夙夜軫懐則尤重于遐逺耳目之外也中都省臺寺監之属㳂歴代之名皆命以員四方之官監司守令郡縣官至筦𣙜邏徼之職鮮有無實而置者是以人情輕外而樂内居内之官疲者可以逭過才者可以育聲躁求徼進徃徃有踰分之得非自重而信道信道而安命安命而行志行志而愛民者不免有外官勤勞寡效之厭矣此而不革則將如唐之中世慕入都之官為登仙之勝如是則上違陛下欲治之心下有逺民無告之弊陛下孳孶益勤而治功益逺况上恩不孚而民志不申天下之患無大於此今天下最切于治人之官莫若監司守令監司之權乃古州牧之比而今人望而言曰此中都汰而至耶或不足取以在内耶望者不信其為而居者不勵其實如人一身首莊心忻而手足不運將安用之救今之弊願陛下覈天下監司守令公正愛民衆所共知小者勉以手札大者擢而躐進之充中都之美官則遐邈之臣知陛下以民為重孰不崇勸本豐末美上下志通施徳于民如置郵之速而雨露之溥不勞而天下治矣元祐元年上時為太常博士上哲宗乞由縣令然後居寺監由郡守然後至臺省畢仲㳺臣聞君子以名用人者為其信于衆也一人譽之不足以成名必衆人譽之然後可以成名則名者信于衆之謂也然士有依名而為利不思行巳之何如飬交取合亦足以成名者故君子之用人必索其寔孔子曰吾之於人也誰毁誰譽如有所譽者其有所試矣試者所以索其實也而太公亦曰其實中其聲者謂之端實不中其聲者謂之窽窽言不聴姦乃不生則名實者用人之大契君子所以配仁義而並行之公道也昔漢宣之治雖不及三代然刺史守相輒親見勞問觀其所由退而考察以質其言有名實不相應者必知其所以然公卿缺則選諸所表以次用之故漢世之良吏於孝宣時為多而龔遂黄霸之徒皆得以良吏自見於世元成而下孝宣之業雖衰然名實之法猶有存者故建武永平間郎官出宰百里尚書令僕亦為郡守而虞延第五倫鮑昱之徒更以郡守入為三公守令之重如此是以卓茂魯㳟皆以縣令為循吏茂亦卒至三公則孝宣名實非徒一時之稱盖得孔子試之之意而後世可以循用故也自唐以來官在内者重官在外者輕故張九齡欲重刺史縣令之權歴都督刺史然後入為侍郎列卿歴縣令然後入為臺郎給諌而法亦卒不克行本朝之制九品可以為縣令七品可以為郡守則是九品之賤已當漢郎官之選而七品之人已任漢令僕事矣持禄處内者既無治民之責而多進遷之門守法在外者則數出於俗吏而不見用就有用之者不過由縣令而居幕府由郡守而為監司所謂臺郎給舎令僕三公未有由此途而出則内官安得不重外官安得不輕是以名實相紛毁譽淆亂養交取合之人漸以得志則守令如龔遂黄霸卓茂魯㳟亦何道而進今當體其大意稍重郡守縣令之官通都大邑有善政者數加奬勵使必由縣令然後居寺監由郡守然後至臺省則人人樂于外官赴功治職齊民可受其賜而寺監臺省亦將得真材毁譽名寔無所紛亂又合孔子試之之意盖事有不召而自至者西漢重功名則權竒倜儻之士出東漢重名節則䧟難死義之臣衆有唐尚文詞則詩歌賦頌綴文之人亦出而不絶今果重在外之官使必由縣令而後居寺監由郡守而後至臺省則為良吏者亦將不期而自至名實之論惟所加慮紹聖二年上時為秘閣校理上徽宗論朋黨之患本于重内輕外葉夢得臣伏以陛下自親政以來凢擢士皆不以次用人之速古所未有將必得逺業大器以為社稷無窮之計士大夫䝉識擢初何嘗盡知此意其朝夕趨走大臣之門者僅志於得而已夫高爵厚禄人之所欲得而陛下之所有也一介匹夫崛起畎畝陛下不愛所有而與之人人皆得所欲反自認以為已物爭奪傾覆唯恐其失視國家事曽不一槩于心陛下不負羣臣而羣臣負陛下者如此殆為朋黨者勝也朋黨之患世孰無之而近日為尤甚者其原本于重内而輕外且今自外召入者茍有寸長計日可取貴顯又况阿附趨佞别以智巧得之一居要位非譴謫則不去而居外任者非被罪廢黜則孤寒無援之人也雖嘗為宰相執政者亦然夫以内為榮進之塗則茍可以安于内者人誰不營以外為譴黜之所則茍可以免於外者人誰不避此所以根株連結卒不可破祖宗時宰相罷歸班或補外未㡬皆復召用中世以後乃各帶節鉞崇職至於執政從官更出迭入未嘗有間夫使不慕居内不畏處外内外去來各適其志士大夫茍知自愛則亦何必捨彼而趨此謂之朋黨非大姦邪勢亦不得不自離今欲救之莫先於此然臣既為此言不可不以身先衆人願乞為郡大觀二年九月上時為翰林學士乆任上神宗論方靣之寄勿遽更易劉孝孫臣前日奏事延和論及乆任官吏之意臣竊謂設官分職以相經緯而不責悠乆一切代徙曽無常任皆自昔之公患比來朝廷思革前弊如監司使者稍稍任之乆而方靣之寄尚或遷易不常事大體重方幸得人要且勉狥吏民便安之意少息遞𫝊送迎之勞曲假嵗月使得盡所施設夫豈不美如留守大名府韓琦知成都府趙抃皆朝廷舊臣天下之所属望琦有大節抃有清徳所至誠服如其父母藩垣之外得斯人而任之則可以坐分宵旰之憂矣臣願陛下留神方靣遴揀名徳乆其時嵗勿遽更易雖心在王室臣子之志而無以公歸實厭輿望臣不勝區區熈寜五年上時為侍御史上神宗論守令許保明再任彭汝礪臣聞事有若緩而所主最大理有若迂而所闗最急者守令是也今之談治道者咸謂迂緩忽而不省然百里之命千里之寄財賦之繁彼寔尸之獄訟之重彼實任之向使一不得人則陛下雖有徳澤誰與達此百姓雖有沉寃誰與領此臣伏見陛下儲神政機勵精民務屢下徳音誕告中外峻刺舉之法嚴考課之令四方聳然咸知趣向以臣觀之今四海幅員之廣有學士大夫之衆所謂循良之長慈恵之師冝不難得然限以嵗月不足以程其功槩以資格不足以起其意臣今以為宜委按察官精覈部吏其有䆒心政理宜於其人有志功名善于其職者縣令許知州保明申監司知州許監司保明奏朝廷不限員數並許再任如任内别有功狀卓然可觀大者特賜詔除次者優加秩任其合關陞磨勘者並與就任陞改如此則能者得極其意奮迅于事功中材不忍自棄自勉于職業熈寜十年上時為監察御史裏行上哲宗乞中外官乆任文彦博臣以中外任官移替頻速在任不乆有如驛舎無由集事何以致治故累曽上言乞中外官各令乆任湏滿資考近日以來遷改尤為頻數盖由風俗躁競例欲速遷執政者或避怨謗不能鎮靜欲望中外治安未可期也臣欲今後凡差除中外官並具見在任官年月滿未滿湏令任滿方得交替如是急速藉才湏要其人則不拘此制其任滿得替之官湏具在任寔有勞績方與照會合闗陞差遣所貴官吏自此不敢茍簡欲速百職自然修舉貼黄臣累曽上言以吏户刑部官属主選大計刑罰并外任監司及親民之官並湏乆任此繋朝廷致治之本不可忽也今乞與三省更申明祖宗舊法遵守施行元祐二年上時為平章軍國重事上哲宗乞講求内外乆任之法上官均臣聞治天下莫急于政事政事之廢舉既繋在官之能否又繋任用之乆近任乆則於政事能詳知得失以盡其才而無滅裂之患遽易則略於職事不足騁其智術而有茍簡之弊此人情之所同也臣竊觀今日之内外百官唯常調之人在吏部差除或係堂除閑慢差遣方及二三年替罷其内任則六曹侍郎寺監長貳其在外則諸路監司及輔郡藩方率多屢易夫政事綱紀出於六曹寺監自六曹言之吏部户部職事最煩所繋尤重而監司大郡係一路千里之休戚甚重而不輕也明矣今既屢易則職事不及詳知才術不暇施設則為吏部者必滅裂於條令為户部者必滅裂於國計為刑部者必滅裂於奏議轉運使之於財賦提㸃刑獄之於刑兵常平藩郡之于民事必類皆茍簡不為三年之計况于乆逺之利乎天下政事莫大于數者而多為滅裂茍簡之政欲求法令振舉民被其利不可得也臣竊原數者屢易之意或出於職任之􅉍遷或出於人情之私出於􅉍遷如禮部之除户部户部之除吏部是也出于私情若從官之乞藩郡監司之自逺求近之類是也臣以為數者之弊去之無難夫六曹侍郎不過數人實繋朝廷之清選既為侍郎視其稱職而望重資乆者自可進為尚書不必以叙遷為進擢也夫設官分職所以為民不當縁人情私便而屢易其任則從官之於藩郡監司之求近地自當契勘某路到任如及二年則方與遷授則上下安便政事不至弛紊臣竊見陳潁近京數郡太守多止及半年即易他處太守以一郡為𫝊舎吏民以太守為使客送故迎新紛紛道路太守不暇整治其綱紀吏民豈有信服其政事耶臣以為奉行朝廷之法令而利澤天下者内則繋百官長貳外則繋監司郡守内外不得人則不足以稱職得人而屢易則不足以舉職職不舉則政事廢弛而下受其弊雖有才吏與不才者相去無㡬朝廷雖有良法美意是為徒法而已矣伏望陛下詔大臣講求乆任之法使官宿其業責以治效庶㡬人人悉心不敢懐茍且之意則天下之事豈有不治哉元祐五年上時為殿中侍御史上哲宗乞監司乆任王覿臣伏見諸路監司移易頻數坐席未暖已或有欲去之心職事不安豈能為經乆之計夫官不宿業古今之通患也今雖員多闕少乆任稍難然中外官司猶頗有三年之法至於監司豈可以責之速效而轉徙頻數比他官特甚大率一路之間郡縣百數廵歴經年未能周徧官吏之能否民間之利病非熟見而詳察之未易得其實也或數月而易或朞年而罷則雖有高才逺慮何暇施為甚者習為因循茍簡以幸替去弊事無所革汙吏不知畏長乆之䇿置而不問故轉運使財用日耗提刑司常平坊場之政浸以隳壊此不可以不恤也臣伏望朝廷立監司乆任之法明詔諸路監司以乆任之意使才高慮逺者有所施為因循茍簡者知其無以逃責則各思自竭而職事舉矣元祐六年上時為刑部侍郎上哲宗論邉帥屢易李之純臣伏以西戎未附邉鄙用兵守土之臣不冝屢易盖欲責其實效必湏假以嵗月况帥臣緫握中權指授規畫日乆而後士心信服料敵折衝立威制勝日乆而後敵心知畏未有嵗月淺近施設尚䟽而可立武事也近者慶渭二帥召還移替皆未成資若以䕶邉有功猶宜増秩以乆任若以備敵亡狀豈當免過而優遷欲望精選才臣付以閫外應機制變得以専行明示三載考績之限非以功進非以罪黜更不先期除代庶㡬邉事慗備而戎人欵服元祐八年二月上時為御史中丞宋名臣奏議巻七十三
