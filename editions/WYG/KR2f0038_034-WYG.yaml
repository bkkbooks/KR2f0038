body:
  text: 宋名臣奏議巻三十四宋趙汝愚編帝系門外戚上上仁宗論楊景宗恣横不恭韓琦臣厯觀方牘槩見后黨率從憑藉罕務檢修是故抑其勢則獲安縱其欲則招禍矧屬聖神御宇慈愛及親既務全恩誠宜杜漸臣竊以新授成州防禦使楊景宗起於寒悴本無勲績特緣戚里遂冒貴階薦警盜於列城復總戎於要地肆情犯法所在奏論矜貸實多豪暴無改近者莊惠皇太后上僊乗驛歸闕所宜哀號夙夜以極追懷而乃未及解裝遽思廣第丁謂故宅昔已賜給制度宏壯宇室延袤都畿之下鮮克倫比況乎左右民舍已從安處一旦驟令移徙不容尋卜所居遂至毁擊閭閻驚驅老幼悉令暴露咸使怨嗟復聞近於殿廷恣其忿誚輒成喧厲必達聖聰恭惟密禁至嚴清光甚邇臣下所履跼􅐲為常在于宫掖之間猶無畏忌使之州郡之内孰遏侵陵茍不舉劾其非誡勉於後是使無知之性且謂惡終可為若奉䕶莊惠梓宫祔于陵寢諒彼往來之際曷俊驕横之心必將動致張皇過求供億以至還奉朝請列居職任寖為小過謂親寵而不問稔成巨慝豈憲律之當捨是則有漸而故滋其蔓推恩而不保其終徒惻上仁足傷醲化臣欲乞詔下有司明按其罪或屈法以俾之嚮善或申罰以懲其不恭盡繫宸𠂻少塞輿議臣猥參諫職但罄所聞固不敢乗隙以傾人相時而言蓋欲陛下全外族而隆孝治存國體也景祐三年十一月上時為右司諫供諫職上仁宗論張堯佐不當與府界提㸃余靖臣竊聞巳降敇命差職方員外郎張堯佐提㸃府界諸縣鎮公事外議皆言堯佐識見淺近依託後宫嬪嬙之勢已得内降指揮改賜章服又從内批與省府差遣大臣依違不能堅執遂與府界提㸃伏惟陛下損節浮費放減後宮絶斜封之官無私謁之寵此皆日來親行至美之事安得更使人言籍籍如此臣深為陛下惜之大凡嬪御親姻但多與財帛足表恩意至如堯佐進士出身自當隨其才望與之差遣何必躐等待之以騰物議府界提㸃比省府判官固是降等其如呂公弼亦是辭三司判官就此差遣未及半年早已遷陟議者不論其才但言是故相之子所以進用太速將來堯佐若循此例昇進外議亦只謂是斜封私謁之𩔖竊恐上累聖德若陛下必欲愛之不若與有職田一近郡正以表陛下屈已從人之德於堯佐資序亦無所損也慶厯四年三月上時為右正言供諫職上仁宗論后族戚里非次改官何郯臣伏覩近日后族戚里非次改官稍多朝廷爵賞本以寵待勞臣非素有勲績即須循年考今横恩過寵輕授無度竊恐近戚之家迭相攀援人懷異望若各從所求即是名器髙下皆以恩授陛下至公在御凡一爵賞皆循典制推此恩澤必是近歲戚姻入内有所干求聖心念親親之故不欲拒絶所以致冒賞貪進之人衆而煩黷宸聽況舊有條約皇親命婦不許因入内投進文字求内批指揮差遣及非次改轉恩澤如有内批指揮即令樞宻院進呈具此條貫執奏不得輙便施行朝廷著令如此明白臣下尚不遵此若從而遂之即是啓僥倖之門塞公平之路此風寖行為害不細伏望聖慈以義斷恩特賜指揮其近戚干求非次改轉恩澤一切止絶所貴重惜爵秩以允公議慶厯八年上時為殿中侍御史上仁宗論連姻臣僚更不得除授典掌侍衞及樞要之任何郯臣伏聞祖宗典故宗室姻戚未嘗委之典禁兵及任要官近年因李昭亮授管幹殿前馬歩軍都指揮使公事郭承祐相繼被用遂成此例緣自先朝至今宗室諸院尚未有預領民事者今以兵權付之近戚竊恐競相扳援漸干國政至公任使雖無親疎然於防微杜漸之道固為逺慮伏望詔中書門下樞宻院稽求列聖故事自今與宗室連姻臣僚更不得除授典掌侍衞及樞要之任仍立為永制以絶後來非兾之人皇祐元年上時為侍御史知雜事上仁宗論不可令李璋管軍錢彦逺臣風聞閤門使李璋欲除京中職名竊以李璋本由戚屬恩澤入官三五年間坐躋顯仕未補邊防經歴事任加以人才懦弱别無勲勞委之師旅未協公議安危之本所繫非輕且諸將有久戍沙漠早立勲績者及外戚貴屬在李璋上者引李璋為比乞軍中職名則朝廷何以却之與之則恩賞失宜不與之則中心觖望可否之際措置頗難且李璋既主兵馬即須出屯疆場素無韜略之藴訓練之嚴萬一胡騎小出斯人何以捍禦本謂愛之實害之也或朝廷以李璋戚屬宜加恩禮不若俟其少有勲勞擢進官資則事體兩全名實相副欲乞出自聖意特賜寢罷李璋管軍指揮庶合中外公議皇祐元年上時知諫院上仁宗論張堯佐不可進處二府何郯臣伏見三司使禮部侍郎張堯佐慶厯三年冬從開州來是時猶作南宮散郎自頃至今不五六年間遂歴盡要近廼尹京邑乃司計籍緣堯佐雖由進士登第歴官無他過然驟被寵用人情皆以止緣後宮之親非復以才能許之況三司使位望任使為二府之亞跂歩便至今堯佐充三司使已踰年若大饗訖事衆議謂陛下以醻勞為名必當進用堯佐在兩府果如衆議命行之日言事之臣必以死爭當是之時陛下欲決用堯佐則當黜言者聽用言者即須罷堯佐酌之兩塗必難並立然用堯佐而黜言者則累德聽言者而罷堯佐則傷恩累德則損歸聖躬傷恩則怨起近戚欲聖躬無所損外戚無所怨莫如富貴堯佐而不假之以權如李用和處之正得宜也前古近戚成敗之間其鑒不逺崇寵過當則不免禍咎抑損得所則必能安全禍咎安全不唯其家繫之抑亦國隨而興衰也此書傳所載不可悉數陛下聰明固宜監觀往事以為社稷之計前歲陛下備禮冊命貴妃外廷紛紜已有物議然臣當時未嘗論列者蓋以天子列嬪妃之位明有典章若不干預政事置亦無害今用堯佐至三司使已是預政事況於進處二府則天下之議當以為如何堯佐進用與否固亦未測陛下之意然而已進用而後言縱能追罷在人臣頗獲直名於陛下已損盛德固莫若先事而言冀陛下審處其事使無過差則君臣上下之道兩得之矣臣以言責在陛下左右周旋四五年但事干朝廷大體及大姦大蠧無不論列䝉陛下多賜採納今以親老方將外補唯於堯佐一事心知不可而遂不建一言則異時臣負懷情不盡之責故於將行不敢黙黙而復布腹心焉伏望陛下幸採臣章俯從公議不徇一時之愛以全千古之名則雖盡南山之祝不足載德美之盛與夫寵一人而失天下之心者不同日而語也皇祐三年八月郯自侍御史知雜事出知漢州將行上此疏上仁宗論張堯佐除四使不當包拯臣伏覩陛下即位僅三十年奉承祖宗謨訓未有反道敗德之事陛下固知之乃五六年超擢張堯佐羣臣皆竊議于下然而迹其過不在陛下在女謁近習及執政大臣也何以言之蓋女謁近習動伺陛下之所為知陛下繼嗣未立而有所私莫不潜有趨向而附結之執政大臣不思䂓陛下以大義乃從諛順指髙官要職惟恐堯佐不滿其意使陛下有私昵後宮之過此豈愛君之心哉且以本朝故事言之昭憲皇太后誕生祖宗有基命之烈其諸弟杜審肇軰窮老纔有得一節度使者雷有終以工部侍郎討平西川得宣徽使李至於先朝有東宮之舊自工部尚書參知政事才用為武勝軍節度使錢若水任樞宻副使李士衡以尚書左丞為三司使以及陛下之朝李維為翰林學士承旨刑部尚書陳堯咨為翰林學士知開封府並止換觀察使夏竦歴兩府自三司使户部尚書止得散節度使後二年方加宣徽使鄭戬亦曽任樞宻副使以資政殿大學士知并州後方加宣徽使又一年乃除節度使今堯佐謂之親則孰若杜審肇兄弟乎謂之賢而功孰若雷有終李至錢若水乎而宣徽節度使并以與之若非内外協應䝉惑攘竊寧至此哉堯佐叨據如此慙羞不知真清朝之穢汚白晝之魑魅也況下制之日陽精闇塞氛霧繼起天道固於人事不逺伏望陛下斷以大義稍割愛情追寢堯佐過越之恩必不得已宣徽節度使擇與其一仍罷羣牧制置使之命畀之外郡以安全之如此則仰合天意俯順人情而重新盛德矣皇祐二年閏十一月巳未以三司使戸部侍郎張堯佐為宣徽南院使淮康軍節度使景靈宮使庚申又加同羣牧制置使癸亥拯率同列上此疏時知諫院上仁宗論張堯佐除四使不當王舉正臣伏覩張堯佐優異之恩無有其比竊以堯佐素乏材能徒以夤緣後宮僥倖驟進國家計府須材以辦經費堯佐猥尸其職中外咸謂非據近者臺諫繼有論列陛下雖罷其任使而復加崇寵轉踰于前併授四使又賜二子科名賢愚一詞無不嗟駭夫爵賞名數天下之公器不當以後宮踈戚庸常之材過授寵渥使忠臣義士無所激勸且堯佐居職物論紛紜固當引分辭避而晏然恃賴曾無一言自陳叨竊居位日覬大用及異恩既出復託以假告未祗受其意尚若不足繼有邀求不䖍君命莫甚於此者昔漢元帝時馮野王以昭儀之兄在位多舉其行能帝曰吾用野王後世必謂我私後宮親戚本朝太宗皇帝孫妃之父止授南班散秩蓋保全後宮戚屬不令事勢僣盛以取顛覆伏望陛下逺鍳前古美事近守太宗皇帝聖範追取堯佐新命除與一郡以熄中外之議伏以陛下自臨馭以來孜孜勤政無有失德今忽行此事有損聖明若濫賞必行則朝綱威柄由此隳紊四方駭任人之失二鄙萌輕國之心臣方叨司憲適覩除命事干國體不敢緘默望聖慈開納速降指揮或臣言之不行即乞罷臣憲司出補逺郡皇祐二年閏十一月上初執政希上旨一日除堯佐四使又以舉正重厚寡言同日授御史中丞朝議意舉正儒懦或迤邐退避動經旬浹則堯佐之命必行論諫弗及矣及舉正告謝上殿即上此疏不報後數日舉正留百官班廷諍復帥殿中侍御史張擇行唐介及諫官包拯吴奎陳升之於上前極言且於殿廡切責宰相上聞之遣中使諭旨百官乃退堯佐尋亦奏辭宣徽使景靈宮使乃詔學士院貼麻行下上仁宗論張堯佐除四使不當司馬光臣聞明主勞心力以求諫和顔色而受之士猶畏懦而不敢進又況震之以威壓之以重而望忠臣之至直言之入難矣臣之不忠言之不直而天下安萬事治者未之有也臣竊見臺諫官屢以張堯佐事上言而陛下執之益堅拒之益固前日臺諫官等守閣請對陛下却而不内中外之人莫不駭愕以為異事昔漢元帝欲用馮昭儀兄野王為御史大夫既而疑曰吾恐後世謂吾私於後宮遂不用今堯佐有野王之嫌而無其才陛下不次用之數年間自散郎至宣徽使彼雖實有可稱天下之人安可家至户曉使謂陛下不私後宮哉抑又聞之人有種𤓰而甚愛之者盛夏日方中而灌之𤓰不旋踵而萎種而愛之非不勤也然灌之不以其時適所以敗之也今陛下貴用堯佐逺過其分天下已側目扼腕而疾之又復摧折忠諫以重其罪是正日中而灌𤓰也臣竊為堯佐寒心而陛下獨不為之深思逺慮哉非獨如是而已前者臺諫官不得對之日隂霧冥冥跬歩相失寒冰著木終日不解臣謹按洪範五行傳聽之不聰是謂不謀厥咎急厥罰常寒又按京房書謂之䝉氣此皆隂氣太盛壅蔽陽明上下否塞疑惑不決之象天意昭然有如教語行道之人皆知其異陛下性資純孝嚴恭天命容納直言深明得失此非臣之諛乃天下所共知也獨奈何以堯佐之故忽天戒而不顧棄人言而不從輕祖宗之爵祿違古今之明鑒書之簡䇿使天下之人有以議聖德之萬一或累於光融髙大之美此臣所以日夜痛心疾首寢不能安食不能飽深為陛下重惜者也臣聞臣之事君猶子事父也豈有父獲大謗於外而子不以告且不諫哉惟陛下亟召諫臣使竭其所聞采納其言而慰安其意以厭上天之心解外廷之惑闢忠讜之路塞寵倖之門則天下歡然歌頌盛德豈有窮哉昔漢明帝作德陽殿鍾離意諫即時罷之後乃復作殿成謂羣臣曰鍾離尚書在此殿不成矣然明帝非不欲為殿也所以屈意罷之者欲全諫臣之節而開直言之端也今臺諫官前後言堯佐者數矣陛下曾不留神省察少為裁減以慰其心夫人主所欲為人臣豈能強變之哉顧自今以往事復有大於堯佐者在列之臣噤嘿拱手視之而巳矣此非朝廷之福也不然羣臣猶朽木陛下猶雷霆安可以力校哉惟陛下察之而已矣皇祐二年十二月具草未奏聞堯佐罷宣徽使遂不上時為殿中丞同知禮院上仁宗論張堯佐再除宣徽使王舉正臣近以張堯佐再除宣徽使三嘗論奏且人君御天下惟爵賞為大公受授非當則天下竊議堯佐本常才但以夤緣後宮叨據非分自去年冬罷三司使除宣徽使制命方出中外莫不駭聽其時臣與諫官御史至留班欲廷議而爭之尋罷宣徽使尚忝節度名品今四方多虞災異數見若非奨擢有功任用賢直則何以上荅天戒下慰民望哉堯佐自罷宣徽使方逾半年端坐京師以尸厚祿今復授之益増鄙誚此乃執政不念祖宗基業之重順顔固寵不能執奏制命既行有損聖德若陛下不納臣盡忠愛君之請必行堯佐濫賞竊位之典即乞黜臣以誡不識忌諱愚直之人皇祐三年八月上時為御史中丞上仁宗論張堯佐再除宣徽使包拯臣等伏見張堯佐除授宣徽南院使制命復下物議騰沸況臣等以言為職豈敢私自顧慮各為身謀哉直以誕告再行若固守前議復乞追奪於朝廷事體亦似未安所以進退皇惑不即論列雖然事體有必須裁制者不可不深察臣等不得不極陳也張堯佐怙恩寵之厚僥求覬望不知紀極始欲得宣徽使今訖行前命付與之矣雖出領外鎮將來必求入覲即圖本院供職以至使相重任名器之大者盡可階緣恩私無求而不獲必快已欲以熏灼天下此不可不深察也伏望思已然之失為杜漸之制特降詔旨申敕中書門下諭以堯佐比緣恩私不次超擢享此名位已為過越將來更不令處使相之任及不許本院供職仍趣赴河陽任所庶幾壓塞人情防杜間隙臣等不勝為國納忠激切之至皇祐三年八月上時知諫院上仁宗論張堯佐再除宣徽使包拯臣等伏以陛下凡事克已鮮有過舉止於堯佐厚甚不無衆口交非若厭物情理須裁抑然自去冬力爭此事幸賜開納天下皆仰聖度能虛懷而徇諫也今來重申前命所以不即論列乞行追奪者蓋為朝廷曲全事體爾其如大恩不可頻假羣心不可固違假之頻則損威違之固則兆亂伏望以國家至計為念檢㑹臣等前後劄子必賜施行不勝懇激之極皇祐三年正月上時知諫院自今張堯佐别有遷改恩命檢㑹此劄進呈執奏仍今後宣徽使不得過二員上仁宗論駙馬李瑋指使門客范鎮臣伏見駙馬都尉李瑋家指使小底已及四五十人至今不住傳宣差送又門下出入舉人皆豪室子弟僥倖無賴者又修建主第功役過甚伏以陛下只有公主一人其駙馬所宜愛之納之於善不可陷之於不善今李瑋年少正當向學而多使僥倖無賴之人在其左右修建居室復大僣侈非所謂納之於善也欲乞指揮約定指使小底人數量留外其餘人放令逐便所有出入舉人亦宜揀選免致將來倖求恩澤别招人言仍定居室之制以防僣侈之萌此皆愛惜李瑋之事伏惟必賜施行嘉祐元年上時知諫院上仁宗乞因祫享大慶恩恤先后之家江休復臣伏見陛下躬親大祫之禮祗見祖宗之靈所以崇祖妣之恩識昭穆之叙凡在宗屬莫不助祭至於配祔之坐母后之家年祀浸深子孫替墜薦奠之際其何以慰神靈之想哉臣竊見漢章帝詔曰四時陵廟無人助祭先后者朕甚傷之此肅宗所以發德音也今駿奔在廟者不過一二近戚至於杜賀之家宋符之族興微紹絶未有聞焉唐開元初除昭成皇后四從叔太子洗馬仍令檢校本宗子弟此亦前代之令典也昭憲皇太后誕育二聖為一代姜任今子孫失序宅宇蕩析唐旌直言尚猶贖第還付其家矧先后之近屬乎臣謂宜因祫享大慶應先后之家子孫替墜者糾合資贍隨材擢叙量其厚薄遞加恩恤臣茍有所見不敢緘黙嘉祐四年十月上時官職未詳上仁宗論李珣劉永年無功除授楊畋臣竊觀祖宗故事郭進戍西山董遵晦姚内斌守環慶與彊寇對壘十餘年未嘗有轉官之寵蓋謹重名器必須平寇難静邊隅然後俾之遷授今李珣等無尺寸裨補之功特以外戚故除之臣恐天下謂陛下忽祖宗謹重名器之訓開親戚僥倖之門曲緣私恩輕用王爵後有扞寇立功者復以何官而賞之是以不敢命詞嘉祐五年十一月知桂州均州防禦使李珣為相州觀察使單州團練使劉永年為齊州防禦使畋知制誥上此奏封還詞頭尋詔它舍人草制而范鎮言朝廷如以楊畋之言為是當罷所遷官儻以為非即乞却令元當制官命詞内批不許既而鎮復有論列遂罷之上仁宗論劉永年再除防禦使傅堯俞臣聞爵祿天下之砥石其所以礪世者非謂人人飽髙爵而厭重祿也蓋必當其勞則天下知勸茍異於是雖窮極班品不能滿貪冒之心而但啓僥倖之路不能為勤瘁之激而徒植營私之恩伏惟陛下留神而察之臣伏覩單州團練使劉永年除齊州防禦使臣竊思永年進因恩澤未著績用於榮寵固巳優渥況有舊條武臣正授巳上不許無勞叙進若此官用久次能得則建節緣日月可取至於餘人不得援例此語尤為未允惟以庸制祿不當有引例之嫌既廢令假人安可杜拔茅之勢事體明著不為難曉豈有它日約束不能限永年而今日指揮可以塞來者乎是不足昭信天下益取輕耳臣恐緣此煩聖聰者衆陛下無以拒之近錢晦知代州亦未嘗改官不識永年何以異於晦也伏望陛下追寢新命加謹名器使圖顯效然後遷擢則能者益奮而不能者知勉且俾條詔不為空文臣不勝懇激之至嘉祐七年五月上時為殿中侍御史裏行上仁宗論劉永年再除防禦使傅堯俞臣近嘗論列劉永年無勞轉官乞行追寢至今未䝉施行臣聞爵祿天下之公器法令王者之大柄既不能以大柄自持而以公器私於人方復區區誡之以不得援例此臣所以大惑也借使私於永年衆人可隔於陛下平均之德固巳虧損況衆人之不可隔乎茍不復計校率以例遷則天下之公器如何方今事不責實貪競尚多陛下不作法以抑僥倖廼廢成法保僥倖而為之地臣所以尤為陛下惜之且法自永年始而廢於永年又怪之甚者夫置言事之官使拾朝廷之闕者惟恐其不言今乃不然平居議論率常十格七八若壞法濫官章明較著如是之不疑者以列於陛下又置而不聽則安用言事者乎惟陛下必垂省察嘉祐十年五月上上仁宗論劉永年再除防禦使王疇臣聞為國之要號令必信賞罰必當而後治若號令雖具而不行爵賞雖行而不中欲求貴倖斂縮紀綱振舉不可得已近制武臣刺史以上非有功不得遷此實陛下謹守祖宗故事欲使爵賞之柄不濫而不私也今劉永年特以章獻太后故過推恩澤使餘人不得援例抑以條例為不足守而朝廷可以自作而自廢邪法令因公於一人而作之又私於一人而廢之何以取信於天下茍謂永年久次而當遷則刺史以上豈更無一人歲月稍深如永年者今日指揮但使孤寒之人隔在恩外不得與永年為比豈至公之意乎嘉祐七年五月上時為御史中丞詔永年復為單州防禦使上仁宗論妃不可同皇后皆贈三代司馬光臣伏聞學士院新定後宮封贈父祖制度皇后與妃皆贈三代臣竊以為不可夫禮之所謹在於尊卑之分别嫌明微故國君沐梁大夫沐稷士沐梁蓋以大夫貴近於君故推而逺之以防僣偪之端士賤逺於君雖與之同物無所嫌也況后妃之際實治亂之本聖人於此尤兢兢焉皇后敵體至尊母儀四海六宮之内無與等夷妃品秩雖貴而皇后猶為女君今封贈之典等而為一臣實懼焉雖陛下聖明宮閫之政貴賤有倫必無僣偪之憂然非所以别嫌疑防萌兆垂法度示子孫也昔漢文帝幸郎省慎夫人與皇后同坐中郎將袁盎引却慎夫人席曰陛下既巳立后慎夫人乃妾妾主豈可同坐哉文帝善其言彼少頃同席盎猶以為不可而犯顔力爭況著之典䇿以為百世之法乎臣謹按天聖中遇南郊大禮皇太后追贈三代太妃止贈二代然則妃贈三代乃近歲之失不可以不正也議者或謂外廷之臣凡入兩府者皆贈三代妃正一品禮不可以後之臣竊以為不然聖王制禮内外異宜不可均一自宰相樞宻副使名秩雖殊而比肩為臣共同職業但贈三代不足為嫌皇后與妃位次相亞而有妾主之分以此尤宜分别名器使之著明以防後世之有僣差不可鹵莽滅裂茍然而已也臣愚欲望陛下特降聖旨改定新制自今後惟皇后得贈三代自妃以下皆不過二代若以外廷之臣封贈太優則乞自今後唯宰相樞宻使得贈三代自參知政事以下止於二代庶幾得禮之宜嘉祐七年十二月上時知諫院上英宗論未可推恩后族司馬光臣竊聞陛下欲加曹佾使相皇太后再三不許又聞有聖旨令皇后本家分析親的骨肉聞奏亦與推恩臣愚以為皇太后既深執謙遜抑損外親則后族亦恐未宜褒進伏望陛下宣諭兩府后族恩澤並未可施行且俟他時徐議其事一則示人子恭孝之心不敢使后族先於母黨二則示人君即政之初不可以爵禄待賢之具獨私椒房之親其於聖德益有光榮治平元年五月上時知諫院上仁宗論向傳範除知鄆州楊繪臣竊以人主之於恩命不可不謹其源其源一開攀援其例者數十年猶汎濫而不可止矣向氏之宗於陛下為后族也髙氏之宗於陛下為母族也曹氏之宗於陛下為祖母族也伏覩差防禦使向傳範知澶州未行間外皆傳向傳範營亷車之命干東平之守臣獨不信之未幾果有改差雖不轉觀察使果知鄆州兼一路安撫使之任臣誠不諳國朝典故然耳目所接近制未省有防禦使知鄆州者亦罕記有防禦使兼一路安撫使者如果無之則是為不次之恩矣陛下始即位一年而后族中已有不次為雄職者若更五七年不惟向氏之宗而已矣設髙氏之宗有至防禦使者攀今日之例而乞之陛下其得不從乎或不從之是厚於后族而不厚於母族矣曹氏之宗有至防禦使者攀今日之例而乞之則陛下又不可以不從也如此則天下如鄆州者凡幾郡兼安撫使凡幾州而可以為外戚之地乎外戚之任皆據要藩於理得為便乎若曰傳範之用自以才者則他人何肯自謂不才乎臣忝諫職其敢畏避而不言也伏乞陛下謹其源塞其例勿徇一時之易而難於五七載之後幸甚治平四年十一月上時知諫院宋名臣奏議巻三十四
