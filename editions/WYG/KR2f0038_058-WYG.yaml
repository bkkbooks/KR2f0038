body:
  text: 宋名臣奏議巻五十八宋趙汝愚編百官門六部上哲宗論户部錢榖冝歸一司馬光臣竊以洪範八政食貨為先故古者國用必使冡宰制之祖宗之制天下錢榖自常平倉𨽻司農寺外其餘皆總於三司一文一勺以上悉申帳籍非條例有定數者不敢擅支故能知其大數量入為出詳度利害變通法度分畫移用取彼有餘濟此不足指揮百司轉運使諸州如臂使指朝廷遴選健吏精於理財者為三司官如陳恕林特李參之類皆稱職有名者也久於其任故能倉庫充溢用度有餘民不疲乏邦家乂安自改官制以來備置尚書省六曹二十四司及九寺三監各有職事將舊日三司所掌事務散在六曹及諸寺監應支用錢物五曹得以自専有司得符即時應副而户部不能制申發帳籍又不盡歸戶部户部既不得總天下財由盡知錢榖出納見在之數既不盡知何由量入為出又五曹及内外百官各具理財之法申奏施行戶部不得一一闗預無由盡䆒其間利害今之戶部尚書舊三司使之任也而左曹𨽻尚書右曹不𨽻尚書矣天下之財分而為二視彼有餘視此不足不得移用天下皆國家之財而分張如此無専主之者誰為國家公共愛惜通融措置者乎譬人家有財必使一人専主管支用若使數人主之各務已分所有者多互相侵奪又人人得而用之財有増益者乎故利權不一雖使天下財如江海亦恐有時而竭况民力及山澤所出有限制乎此臣所以日夜為國家深憂者也今縱未能大有更張欲乞且令尚書兼領左右曹侍郎則分職而治其右曹所掌錢物尚書非奏請得㫖不得擅支諸州錢榖金帛𨽻提舉常平倉司者每月亦須具帳申户部六曹及寺監欲支用錢物皆須先闗户部符下支撥不得一面奏乞應掌錢物諸司不見户部符不得應副其舊日三司所管錢榖財用事有散在五曹及諸寺監者並乞收歸户部若謂户部事多官少難以辦集即乞減户部冗末事務付閑曹比司兼領而通𨽻户部如此則利權歸一若更選用得人則天下之財庶可理矣元祐元年閏二月上時為門下侍郎上哲宗乞六曹長官専達司馬光臣等聞王者設官分職居上者所總多故治其大要居下者所分少故治其詳細此理勢之自然紀綱所由立也是以周官小宰以官府之六屬舉邦治大事則從其長小事則専達凡宰相上則啟沃人主論道經邦中則選用百官賞功罰罪下則阜安百姓興利除害乃其職也至於簿領之差失期㑹之稽違獄訟之曲直胥吏之遷補皆郎吏之任非宰相所冝親也故人有言察目睫者不能見百歩見百歩者亦不能見目睫言詳於近者必略於逺謹於細者必遺於大也今尚書省事無大小皆决於僕射自朝至暮省覽文書受接辭狀未嘗暫息精力疲弊於米鹽細故其於經國之大體安民之逺猷不暇復精思而熟慮恐非朝廷所以責宰相之事業也竊以六曹長官古之六卿事之小者豈可不令専達臣等商量欲乞今後凡有詔令降付尚書省者僕射左右丞簽訖官告黄牒之類已簽訖者更不簽分付六曹謄印符下諸司及諸路諸州施行其臣民所上文字降付尚書省僕射左右丞簽訖亦分付六曹本曹尚書侍郎及本㕔郎官次第簽訖委本㕔郎官討尋公案㑹問事節相度理道檢詳條貫下筆判云今欲如何施行次第通呈侍郎尚書若郎官所判已得允當則侍郎簽過尚書判决應奏上者直奏上應行下者直行下即未見允當者委侍郎尚書改判事之可否皆决於本曹長官更不經由僕射左右丞即改更條法或奏乞特㫖或事體稍大或理有可疑非六曹所能専决者聽詣僕射左右丞咨白或具狀申都省委僕射左右丞商議或上殿取㫖或頭簽劄子奏聞或乞入熟狀或直批判指揮其諸色人辭狀並只經本曹長官陳過尚書侍郎郎官次第簽押判决一如朝廷降下臣民所上文字次第施行若六曹不為收接及久不結絶或判斷不當即令經登聞鼓院進狀降下尚書省委僕射左右丞判付本省不干礙官員看詳定奪若本曹顯有不當即行紏劾所貴上下相承各有職分行遣簡徑事務易集元祐元年七月光為此奏未上光既薨其子康始録進之上哲宗乞令户部太府檢察内藏諸庫上官均臣聞財用出於一司則有無多少得以相通差繆攘盗得以稽察故財無妄出之費而國無不足之憂然後以裕民之財力而仁澤被於天下矣周之太府掌九貢九賦九功之貳受貨財之入所以待王之膳服賔客祭祀賜予玩好之類皆總于太府嵗終㑹財賄之出入可謂財用出於一故有無多少得以相通差繆攘盗得以稽察而國無不足之憂自漢及唐其理財設官不若周之條理詳備其計入為出不若周之法制全密則上下鰓鰓然常以不給為患不亦冝乎先朝自新官制葢有意合理財之局總于一司故以金部右曹案主行内藏受納寳貨支借拘催之事而奉宸内藏庫受納又𨽻太府寺然按其所領不過闗報寳貨之所入為數若干其不足若干為之拘催嵗入之數而已至於支用多少不得以㑹計文籍舛繆不得以稽察嵗久朽腐不得以轉貿總領之者止中官數十人彼惟知謹扃鑰塗牕牖以為固密耳承平嵗久寳貨山積多不可校至於陳朽蠧敗漫不知省又安能鈎考其出入多少與夫所蓄之數哉臣竊聞昨來内藏斥賣逺年縑帛每匹止二三百文夫自方郡之逺至内帑每縑之直須近二千餘斥賣之直止於十之一二此不知貿易移用之弊矣夫不知理府庫之財而外求於民不知節用之術而為多歛之計此有司之罪也臣以為冝因官制之意令户部太府寺於内藏諸庫得加檢察而轉貿其嵗久之貨弊則帑藏有盈衍之實而無棄敗之患國用足而民財裕矣元祐元年十月上時為監察御史上哲宗論户部三弊蘇轍臣以愚拙待罪户部右曹俛仰㡬嵗訖無所補竊嘗以祖宗故事考之今日本部所行體例既殊利害相逺恐合隨事措置以塞弊原謹昩死具三弊以聞其一曰分河渠案以為都水監其二曰分胄案以為軍器監其三曰分修造案以為將作監前件三監皆𨽻工部則本部所専其餘無㡬出納損益制在他司頃者司馬光秉政知其為害嘗使本部收攬諸司利權然當時所收不得其要至今三案之事猶為諸司所擅深可惜也祖宗參酌古今之冝建立三司所領天下事幾至大半權任之重非他司比推原其意非以私三司也事權分則財利散雖欲求富其道無由葢國之有財猶人之有飲食飲食之道當使口司出納而腹制多寡然後分布氣血以養百骸耳目頼之以為明手足頼之以為力若不専任口腹而手足耳目得分治之則雖欲求一飽不可得矣而況於安且夀乎今户部之在朝廷猶口腹也而使他司分治其事何以異此自數十年以來羣臣不明祖宗之意每因一事不舉輙以三司舊職分建他司利權一分用財無藝他司以辦事為效則不恤財之有無户部以給財為功則不論事之當否彼此各營一職其勢不復相知雖使户部得才智之臣終亦無益於筭矣能否同病府庫卒空今不早救後患必甚昔嘉祐中京師頻嵗大水大臣始取河渠案置都水監置監以來比之舊案所補何事而大不便者河北有外監丞侵奪轉運司職事轉運司之領河事也凡郡之諸埽埽之吏兵儲蓄無事則分有事則合水之所向諸埽趨之吏兵得以併功儲蓄得以併用故事作之日無暴歛傷財之患事定之後徐補其闕兩無所妨自有監丞據法責成緩急之際諸埽所有不相為用而轉運司始不勝其弊矣近嵗嘗詔罷外監丞識者韙之既而復故物論所惜此工部都水監為户部之害一也先帝一新官制並建六曹隨曹付事故三司故事多𨽻工曹名雖近正而實非其利昔胄案所掌今内為軍器監而上𨽻工部外為都作院而上𨽻提刑司欲有興作户部不得與議訪聞河北道頃嵗為羊渾脫動以千計渾脫之用必軍行乏水過渡無船然後須之而其為物才經嵗月必須蠧敗朝廷無出兵之計而有司營職不顧利害至使公私應副虧財害物若使専在轉運司必不至此此工部都作院為户部之害二也昔修造案掌百工之事事有緩急物有利害皆得専知今工部以辦職為事則緩急利害誰當議之朝廷近以箔場竹箔積久損爛創令出賣上下皆以為當指揮未幾復以諸處修造嵗有料例遂令般運堆積以分出賣之計臣不知將作見工幾何一嵗所用幾何取此積彼未用之間有無損敗而遂為此計此本部雖知不便而以工部之事不敢復言此工部將作監為户部之害三也凡事之類此者多矣臣不能徧舉也故願明詔有司罷外水監丞而舉河北河東及諸路都作院皆歸轉運司至於都水軍器將作三監皆兼𨽻户部使户部定其事之可否裁其費之多少而工部視其功之良苦程其作之遲速茍可否多少在户部則凡傷財害民户部無所逃其責矣茍良苦遲速在工部則凡敗事乏用工部無所辭其譴矣利出于一而後天下貧冨可責之户部而工部巧拙可得而考矣事在本職故臣不得不言如果可采伏乞付外施行貼黄三司帳設舊職今分𨽻膳部光禄寺雖所掌飲食帳設利害非大如臣所言可采亦當如上三案分𨽻户部元祐四年十一月上時為户部侍郎上哲宗乞責吏部薦拔才能彭汝礪等臣等以謂治天下之道在得人欲得人在知所以養之吏部總在選百官之籍審功罪資歴凡升黜之事以詔朝廷予奪自唐以來為任至重於今非古矣廢興進退條目具備凡所注擬吏挾法以前曰某人於法如此在所取某人於法如彼在所後長貳無所可否惟法之為聽雖知其人為賢否錙銖不能移輕重夫知人亦難矣今可以知之者莫若吏部觀其事而知名實聽其言而知好惡見其容而知厚薄察所舉而知所與斯亦過半矣臣以謂人才空乏今日為甚謂當稍責吏部薦㧞材能上于朝廷察之或賜以對或試之事籍之以待任使焉凡薦惟其人非其人而薦之為朋下以人君為可欺為㒺上朋下㒺上必誅無赦如此則士皆知自愛以待上之考察任其事者皆思為朝廷得人不敢為茍簡計此豈小補之哉然其要則在擇長貳而已若夫明好惡以示之隆學校以養之選師儒以敎之此惟陛下加之意而已紹聖元年五月上時為吏部侍郎上哲宗論内藏庫不𨽻户部太府寺蔡蹈臣伏覩近降聖㫖内藏庫見催索户部太府寺借欠出豁錢物不少依舊更不統轄者臣竊見國家分職設局所以舉官治而府藏出納尤冝參互鈎考以檢吏姦臣契勘元豐詳定官制事目格子太府寺掌庫藏項内有内庫拘催交納逐季㸃筭内庫申到納訖官物帳狀抄上勾銷内庫納訖名件之類凡八件格目甚明又太府寺案名稱内藏庫𨽻右藏案即是舊𨽻太府非無文據臣嘗聞真宗皇帝謂王旦曰内藏庫所貯金帛備軍國之用非自奉也顧外廷不知爾臣竊謂既通軍國之用則𨽻户部太府寺正其冝也惟禁漏泄見在物數其餘雜務事件如官制格子該載者委有闗防不可略去欲望聖慈省察元豐官制格子等特賜睿㫖令内藏庫復𨽻户部太府寺所貴百官庶府皆有統帥事歸一體紹聖元年上時為監察御史寺監上神宗論軍器監事不必謀及殿前馬歩軍司曽孝寛臣伏見朝廷必以武人習用器械故謀及殿前馬歩軍司然臣體問得逐司每准朝㫖送下定奪事件只是取責軍校文狀聞奏非獨務持舊說不肯改更又其智慮未必能知作器之意故凡外人所陳非已出者必不肯言是朝廷亦未嘗考其說之當否遂從而寢荀卿以謂工精於器而不可以為工師有人也不能此技可使治其官唯精於道者為然今陛下置監以除戎器不屬之介胄之武夫斧斤之巧匠而使臣等領其事則豈以臣嘗能此技而使之乎殆將以其薄燭道理而可使治其官者也臣辭不獲命遂受其職茍或自度不足以畢事則亦豈敢當故其器械必盡觀中外之所藏其法度必盡考古今之所説其制作必䆒良匠之所編其施用必問邊臣之所試而臣之愚慮亦以為可然後上聞而朝廷乃下此屬議之如聞前所定弓箭等習用故態亦只聚集軍校曹司共執舊説未知實否今軍器式様又從本監齎送往逐司定奪則是使臣等營之而其是否乃取决於此屬也非獨謀及之而已臣以從官預典監事於陛下則為論思謀畫之臣朝廷一日有四方之事若幸得使令於前當使此屬奔走以聽事今乃以其悉心并智之所為而使之議可否於今日之間臣固不敢自愛深恐武夫健卒輩有以窺朝廷之心膂謂其智慮乃决於我也以理言之竊恐為倒葢此屬既多出於行伍則其底裏淺深其下之所熟知而臣等雖不肖然上託陛下名器寵任之故猶冝見懾今又使有以窺之則不特於朝廷之體為輕而又非所以崇堂陛之勢而陛下經營四方又未能舍文臣而用此屬則其名分之定豈可無素雖政事之臣不慮及此而陛下豈不自愛國體也臣等以朝廷已行之命不敢言改乞從本監奏就一司同議熈寜七年正月孝寛同吕惠卿判軍器監上此奏詔遣管軍郝質赴監定奪施行上神宗乞御前製造悉付所司蔡承禧臣訪聞自昔軍器唯蒞二司胄案一局近嵗遂立軍器監以専之自昔修造之局唯蒞修造案而近嵗以將作監専之故三司之財用固已多為二局之所縻然以已成官局粗有條理日月浸深不可移改而又聞有鞍子所斬馬刀所御前生活所之類凡百司之所取索及衆工之所經營所蒞不領於外廷而所縻實難於㑹計訪聞其間不過製造軍器而已夫所謂御前者講道徳於上决邪正於下釐大工熈庶績乃其地也以今生活工巧而悉出於上則御前之所為何小兼小臣動以御前為名百司莫敢違拒工料過有罷勞斬馬刀之局殺監官者數矣葢由小臣獻議因令蒞之日趣工程不計勞弊臣伏乞授以法式悉付所司庶使課定之料皆有常限財不耗縻人寡勞怨熈寜八年上時為監察御史裏行上哲宗論寺監之職有當省者劉安世臣伏見先皇帝考古眡典建置治官天下之務分總於三省散𨽻於六曹循名責實大體雖善而措置法度未暇致詳此議者所以論官冗之弊而首及於寺監也伏惟陛下即政之初常賦之外一切蠲復所入有限則國用有不足之慮是以専置官局裁節浮費而膳部併於主客虞部入於屯田又量事之閑劇以定員之多寡六曹所減凡十九員而官無廢事人無異論者處之得其理也臣嘗觀先帝時寺監長貳多不並置亦有無卿少而丞簿行其事者今太僕鴻臚光禄太府各二卿軍器將作少府各二監丞簿官屬仍不預焉省曹所減止十餘員而寺監所増仍倍平昔前日省官之詔遂為空文損彼益此何補於治昔杜佑建議於唐以謂臯陶作士正五刑今刑部尚書大理卿是二臯陶也垂作共工利器用今工部尚書將作監是二垂也伯夷作秩宗典邦禮今禮部尚書禮儀使是二伯夷也伯益作虞掌山澤今虞部郎中都水使者是二伯益也舊名不廢新職日加空存虛稱皆無實事臣每愛其言最為切理今百司申陳必經寺監而長貳鮮敢予奪悉禀六曹不唯虛煩文字淹留旬月而又省寺指揮間多異同内外有司艱於遵守加以官吏猥衆縻耗廪禄非有釐革將不勝弊欲望聖慈參酌典故稽考名實凡寺監之職可以歸之六曹者冝盡省之或事務實繁及禮體所繫不可罷者亦冝裁為定員不使冗濫庶幾官得其人經費易給元祐三年二月上時為右正言宋名臣奏議巻五十八
