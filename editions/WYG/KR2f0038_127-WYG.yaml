body:
  text: 宋名臣奏議卷一百二十七宋趙汝愚編方域門河議上仁宗論修商胡口劉敞臣聞天有時地有勢民有力聖王之建功謀事者不與天分時不與地分勢不與民分力則功成而事立今朝廷以河决商胡議必塞之臣竊謂過矣乃者霖雨淫溢山谷發泄經川横潰或衝冒城郭此天時也澶魏之埽如商胡者多矣莫决而商胡獨敗此地勢也淮汝以西闗陜以東數千里之間罹於水憂者甚則溺死不甚則流亡夫婦愁痛無所控告略計百萬人未聞朝廷有以振業之也而議塞河强疲病之餘以極其力乗殘耗之後以略其財重為事而罰所不勝急為期而誅所不至上則與天爭時下則與地爭勢此臣所謂過也臣聞河之為患於中國久矣其在前代或塞或不塞塞之為仁不塞不為不仁此有時而否者也以堯為君以舜為臣以禹為司空十有三年而後僅能勝水患耳今朝廷之無禹明矣而欲以數月之間塞決河不權於時不察於民不亦甚乎議者以為不塞河則兾州之水可哀甚不然夫河未決之時能使水不病兾州則巳矣既決之後縣邑則巳沒矣人民則巳亡矣府庫則巳䘮矣雖塞河不能有救也今且縱水之所欲往而利導之其不能救與彼同而可以息民何嫌而不為詩云民亦勞止汔可小康惠此中國以綏四方夫中國者固四方之本也唯陛下與知道者慮之皇祐三年九月上時直集賢院上仁宗議開浚汴河馬遵臣竊聞本朝舊制每歲興功開浚汴河故水行地中而無濫溢填閉之患祥符中廵䕶使臣韋繼昇表請罷修一年以省物力又請今後三五年一浚徒見目前茍簡之利而不能思患於久逺故近年以來河底漸高口地數易水小則東南有漕運之阻水大則京師有隄防之虞歲習為常人恬不恠夫禍固藏於隱㣲而發於人所忽者暴水可為寒心雖使横流僅紓大患而所殘無數百姓可哀臣欲乞朝廷指揮自今每歲農隙之際檢計開淘以深快為限縱未能一切如舊積功數年可以濟集嘉祐元年上時為右司諫上神宗論併廢汴河張方平臣竊惟今之京師古謂陳留天下四衝八達之地者也非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐末朱温受封于梁因而建都至于石晉割幽薊之地以入契丹遂與强虜共平原之利故五代爭奮戎狄亂華其患由乎畿甸無藩籬之限本根無所庇也祖宗受命規模畢講不還周漢之舊而梁氏是因豈樂是而處之勢有所不獲巳者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立以食為命食以漕運為本漕運以河渠為主國初浚河渠三道通京城漕運自後立定上供年額汴河斛㪷六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運多是雜色粟豆但充口食馬料惠民河所運止給大康咸平尉氏等縣軍糧而巳唯汴河所運一色粳米相兼小麥此乃太倉蓄積之實今仰食于官廪者不唯三軍至于京師士庶以億萬計大半待飽于軍稍之餘故國家於漕事至急至重京大也師衆也大衆所聚故謂之京師有食則京師可立汴河廢則大衆不可聚汴河之於京城乃是建國之本非可與區區溝洫水利同言也近歲巳罷廣濟河而惠民河斛斗不入太倉大衆之命唯汴河是頼近歲陳說利害以汴河為議者多矣臣恐議者不巳屢作數更必致汴河日失其舊國家大計殊非小事惟陛下特廻聖鑒深賜省察留神逺慮以固基本熈寧六年上時知應天府上哲宗論回河朱光庭臣竊以君論一相相擇百官各任其職而天下治古今不易之道也今日朝廷内外無事唯治河為大役竊緣河之所以可治朝廷難以遙度責在水官任職而巳其所用物料所役兵夫水官既任責則朝廷自合應付將來成功則當不惜重賞設或敗事亦當必行重責如此則上有所取信而不致過舉下不敢欺罔而以實從事臣今日所聞則異於此朝廷只知河之當竭財力以應付而水官不任其責僥倖成功則自稱巳力以兾重賞以至敗事則推過朝廷茍免重責此不可之甚者也伏見此役非小役也其所責物料所役兵夫萬數不少若水官自不任責則朝廷何所取信而興此大役伏乞朝廷指揮下修河司取責水官委實可以迴復大河結罪狀庶使身任其責以實從事不至朝廷有所過舉所繫事軆甚大伏望聖慈早賜指揮貼黄臣近曽上奏乞朝廷法禹之治水行其所無事今朝廷以東流當治然聞都水官不自任則將來敗事推過朝廷豈可得也伏乞朝廷指揮令水官身任其責庶幾興役不敢有妄元祐二年三月知樞宻安撫兩奏疏言河泛溢西北抵境上不止則南岸遂屬虜界豈可便於治河而緩於設險太師文彦博議與燾合中書侍郎吕大防從而和之自此回河之役遂興光庭上此奏時為左司諫上哲宗乞詔大臣早决河議王巖叟臣伏以朝廷知大河横流為北道之患日益以深故遣專使命水官相議便利欲順而導之以拯一路生靈於墊溺甚大惠也臣竊意朝廷黙有定論必欲紓患矣然昔者專使未還不知何疑而先罷議洎致專使反命不知何所取信而議復興既勑都水使者總䕶役事調兵起工有定日矣巳而復罷數十日間而變議者再三何以示四方他日雖有命令真不可易誰將信之夫利害之際自古以來不能無二三之說必朝廷之上力主一議斷而必行乃克有濟不容一人言之輒興一人言之輒廢大事大議而易興易奪臣恐天下有以窺朝廷也今有大害者七焉不可不早為計爾北塞之所恃以為險者在塘泊若河堙沒勢雖退流猝不可濬浸失此塞險固之利一也使百萬生靈居無廬耕無田流散而不復二也乾寧孤壘危絶不足道而大名深兾腹心郡縣皆有終不自保之勢三也滄州扼北虜海道自河不東流滄州在河之南直抵京師無有限隔四也并吞御河邊城失轉輸之便五也河北轉運司歲耗財用䧟租賦以百萬計六也六七月之間河流交漲占沒西路阻絶虜使進退不能兩朝以為憂七也非此七者之害則委之可也緩而未治之可也且去歲之患巳甚於前歲今歲之患又甚焉則將奈何伏惟陛下深拱九重此事之可否必以仰大臣大臣固當為陛下審慮謹發而謹持之以救大患不可坐視而無所處也伏望聖慈深詔執政大臣早決河議而責成之實廟社生靈之幸臣不勝愚忠元祐二年四月上時為侍御史尋詔河北轉運使同水官限兩月講議的確利害以聞上哲宗論回河范純仁臣昨日伏覩内降指揮黄河未復故道終為河北之患王孝先所議巳嘗興役不可中罷宜接續工料向去决要囘復故道者臣聞聖人有三寳曰慈曰儉曰不敢為天下先言此三道人君當保而持之不失者也又曰惟天為大惟堯則之蓋天不言而四時成所以堯舜垂衣拱手而天下大治者用此道也且君欲如槃水常使平正無所趨向則免偏側傾覆之患蓋天下大勢唯人君所向羣下競趨如川之流如山之摧不以其道則非一力之可囘故居上者不可不審也臣今切詳所降指揮謂决要囘復故道似聖意巳有所向而為天下先矣臣聞先朝因人建議以謂夏國㣲弱若不早取必為北虜所兼偶先帝不出建議者之名但以御批令邊臣相度而希㫖生事之徒以為萬全必勝剋日可得遂興靈武之師後貽永樂之患致先帝獨當其憂羣臣無一人受其責者至今疲耗未復此陛下所親見不可不為深鑒也臣乞面諭執政前日降出文字卿等巳見但一面商量却使進入若别有所見亦須各自開陳如此則免希合之臣妄測聖意輕舉大役上誤朝廷所有黄河利病乞付之羣臣有司子細商議以求必當如此則聖心不勞而堯舜之治可致矣貼黄臣竊見自來邊事陛下多委樞宻院及邊帥如典禮亦委執政并禮官今來河事正與此同况利害尚在久逺不至倉卒可容詳熟商量元祐三年河議久不决既召到水官王孝先俞瑾等令陳述利害孝先等稱除孫村口外更无不近界河可以回河入海去處其孫村口欲作二年開修來春先下手開水河分减水勢十月詔差范百祿趙君錫躬親相視利害既受命未行大臣主議者乃宻啓從中批出指揮於是純仁等累疏論列尋有㫖收回批㫖再遣百禄等行純仁為同知樞宻院事上哲宗論回河蘇轍臣為户部右曹兼領金倉二部任居天下財賦之半適當中外匱竭不繼之時日夜憂惶常慮敗事竊見左藏見緍一月出納之數大抵皆五十餘萬略無贏餘其他金帛諸物雖小有羡數亦不足賴臣之愚怯常恐天災流行水旱作沴西羌旅距邊鄙繹騷河議失當賦役横起三者有一大計不支雖使桑𢎞羊劉晏復生計無從出矣而况於臣之駑下乎今者幸賴二聖慈仁恭儉天地垂貺諸道秋稼稍復成熟雖京西陜西災旱相接而一方之患未為深憂羌人困窮旋聞欵塞唯有黄河西流議復故道爭之經歲役兵二萬人蓄聚稍樁等物三千餘萬方河朔災傷困敝之餘而興必不可成之功吏民竊嘆勞苦巳甚而莫大之役尚在來歲天啟聖意灼知民心特召河北轉運司官吏訪以得失近聞回河大議巳寢不行臣平日過憂頓然釋去然尚聞議者固執開河分水之䇿雖權罷大役而兵工小役竟未肯休如此則河北來年之憂亦與今年何異今日小吳决口入地巳深而孫村所開丈尺有限不獨不能回河亦必不能分水况黄河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理哉縱使兩河並行不免各立隄防其為費耗又倍今日矣臣聞自古聖人不能無過過而能改善莫大焉故君子之過如日月之食更也人皆仰之朝廷舉動義當如此今議河失當知其害人中道而復本何所愧雖使天下知之亦足以明二聖憂民之深為之改過不吝今乃顧惜前議未肯曠然更張果於遂非難於遷善臣實為朝廷惜之然臣聞議者初建開河分水之䇿其說有三其一曰御河湮滅失饋運之利其二曰恩兾以北漲水為害公私損耗其三曰河徙無常萬一自虜界入海邉防失備凡其所以熒惑聖聦沮難公議皆以三說藉口夫河决西流勢如建瓴引之復東勢如登屋雖使三說可信亦莫如之何矣况此三說皆未必然臣請得具言之昔大河在東御河自環衞經北京漸歴邊郡饋運既便商賈通行今河既西流御河堙滅失此大利誰則不知天實使然人力何及若議者能復澶淵故道則御河有可復之理今河自小吳北行占壓御河故地雖使如議者之意自北京以南析而東行則御河堙滅巳一二百里亦無由復見矣此御河之說不足聽一也河之所行利害相半夏潦漲溢浸敗秋田濵河數十里為之破稅此其害也漲水既去淤厚累尺粟麥之利比之他田其收十倍寄居丘冡以避淫潦民習其事不甚告勞此其利也今河水在西勢亦如此逺為隄防不與之爭正得漢賈讓治河之意比之故道歲省兵夫稍芟其數甚廣而故道巳退之地桑麻千里賦役全復為利不貲安用逆天地之性移西流之憂為東流之患哉此恩兾以北漲水為害之說不足聽二也河昔在東自河以西郡縣與虜接境無山河之限邊臣建為塘水以捍胡馬之衝今河既西行則西山一帶胡馬可行之地無幾矣其為邊防之利不言可知然議者尚恐河復北徙則海口出虜界中造舟為梁便於南牧臣聞虜中諸河自北南注以入于海蓋地形北髙河無北徙之道而海口深浚勢無徙移臣雖非目見而習北方之事者為臣言之大畧如此可以遣使按視圖畫而知此河入虜界邊防失備之說不足聽三也臣願以此三說質之議者則開河分水之說誠不足復為矣又臣訪聞今歲四五月間河上役兵勞苦無告嘗有數百人持版築器械訪求都水使者意極不善賴防邏之卒擁拒而散盛夏苦役病死相繼使者恐朝廷知之皆於垂死放歸本郡斃於道路者不知其數若今冬寒凍來歲春暖復調就便興役則意外之患復當如前臣不知朝廷何苦而不罷此役哉今建議之臣恥於不效而堅持之於上小臣急於利祿不顧可否隨而和之於下上下膠固以罔朝廷其間正言不避權要纔一二人耳然事非本職亦不敢盡言臣以户部休戚計在此河若復緘黙誰敢言者惟斷自聖心盡罷其議則天下不勝幸甚元祐三年十一月上時為户部侍郎上哲宗論回河范祖禹臣聞周靈王之時穀洛水闘將毁王宫王欲壅之太子晉諌以為不可夫榖洛二水小川也王宫天子所居也小川水闘以妨王宫太子晉猶深陳禍福之戒言川不可壅壅必有禍以其違天地之性也今大河豈穀洛之比又無王宫之害以何理而欲塞之也六國之時鄰敵相傾則勸人以動衆役民韓聞秦之好興事欲疲之無令東伐乃使水工鄭國為之間以說秦令鑿涇水為渠溉田夫以一渠猶能疲秦使無東伐今回河之役不知幾渠而自困民力自竭國用又多殺人命不可勝言之害此乃西北二虜所幸也是以臣與傅堯俞極言論列實以河北數路生民休戚國家安危輕重所繫天地血脈巳北向九年必非人力所能遏絶今之河流方稍復大禹舊迹入界河趨海初無壅底萬壑所聚其來逺大必無可迴之理自古亦無容易塞河之事欲望陛下與執政大臣考臣等言之是非若臣等所言為是即乞以數路生民為念以國家安危朝廷輕重為急速賜指揮停罷修河今將大冬盛寒宜早降德澤免生民饑凍死亡正李偉等欺罔之罪如以臣等言為不然方冊中語皆不可信而河有必回之理不於他處决溢為州郡大患不至苦虐數路兵民力役以致逃亡起為羣盗及不至火急收買數千萬物料致非時斬伐林木殘害天地之所生科擾州縣鄉村坊邑人民鞭笞枷錮星火督責致百姓驚騷流離之苦又免枉費國家不貲之計以致公私匱乏倉庫空竭内則姦狡窺伺别致生事外則四夷傳聞萌心作過但令大臣保得必無上件數事回河必有成功則臣等所言顯為謬妄豈可但隱忍而巳須當正臣等所言不當之罪黜責以勵後來乃可以示朝廷典法今不試驗臣等所言是否以救朝廷過舉而章奏纔下未及累日即䝉優加美遷臣不知大臣此謀為國耶為身耶若為國則當公天下之言盡河之利害不當以官職姑息使人不言若為身則是唯欲人之同巳而不欲人之異巳豈惟國事不當如此為大臣身謀亦未為得也人臣官愈進則當憂國愈深寵益加則當愛君愈切臣聞命遂緘黙不言不唯臣心實有所愧有識之士必指臣為貪利無恥忘國不忠之人伏望聖慈宣問大臣臣等所言回河是否如上所陳數件事理必有必無别白是非明辨可否使如臣輩不得緘黙貼黄昨開第三第四鋪而第七鋪潰决殆非人意所料恐將來閉塞必有不測之患元祐四年朝廷用李偉之議再興回河之役復置修河司祖禹時為諌議大夫同傅堯俞各上疏論列十月四日除堯俞為吏部尚書祖禹為給事中祖禹遂連上二奏此係第二奏上哲宗論回河范純仁臣聞堯舜之治不過知人安民知人則不輕信安民則不妄動小人之情希功好進行險生事於聖明無事之朝則必妄説利害覬朝廷舉事以求爵賞朝廷若輕信其言則民不安矣國家之弊常必由此臣不敢逺引古昔只以近事言之國家自仁宗以前天下無事百姓安樂雖有元昊曾叛獨陜西應付不易未聞四方匱乏百姓有嗟嘆之聲也自王安石輕信小人之言勸先皇更改法令而後乗間妄作者紛然矣又用兵之謀至於勸興靈武之役而生民被害衆矣且以先帝聖明舉動固欲詳審然小人利口欺誤執政而致執政復誤朝廷也其勸更法令者則曰君臣千載一遇時不可失及勸興靈武之師者復曰將為北虜所并時不可失臣前在政府又見欲回復河者又曰河勢方東恐變改不定時不可失臣以前車之戒是以深畏其言故嘗屢有奏陳以謂百姓久勞方賴陛下安養不急之務不可遽興䝉陛下專遣范百祿趙君錫相度歸陳回河之害甚明尋䝉宸斷復詔大臣令速罷修河司臣預奉行詔㫖深以復見堯舜知人安民為慶三兩月來却聞孫村有溢岸水自然東行議者以謂可因水勢以成大利朝廷遂捨向來范百祿趙君錫之議而復興回河之役臣觀今之舉動次第是用時不可失之說而欲竭力必成臣更不敢以為難成雖成三五年間必有决溢為慮且以河水東流之後增添兩岸隄防鋪分大叚數多逐年防守之費所加數倍則財用之耗蠧與生民之勞擾無有巳時更望聖慈特降睿㫖再下有司預約回河之後逐年兩岸埽鋪防捍工費比之今日所增幾何及逐年錢物於甚處辦則利害灼然可見利多害少尚覬徐圖茍利少害多尤宜安靜臣受陛下不次㧞擢之恩雖養痾補外不敢自同衆人坐視成敗所以罔避僣越之愆而伸補報之萬一區區愚誠惟聖聦憐察元佑四年十一月上時知潁昌府上哲宗乞開舊日汴口梁燾臣愚嘗求世務之急得諸道路通汴之實始聞其說則可喜及考其事則可懼竊以廣武山之北即大河故道河常往來其間夏秋漲溢每抵山下舊來洛水至此流入於河後欲導洛以趨汴渠乃乗河未漲就嫰灘之上峻起東西隄闢大河於堤北攘其地以引洛水中間缺為斗門以通舟楫其實道河水助洛之淺涸也洛水本清而今汴常黄流是洛不足以行汴而所以能行者附大河之餘波也増廣武三埽之備竭京西所有不足以為支費轉運司毎每請於朝廷勢不能不為之應副竊計自縁清汴之費其夫無慮數百萬計從來上下習為欺罔之姦朝廷惑於安流之說稅屋之利恬不以為慮而殊不知新沙踈弱力不能制悍河水勢一則爛漫潰散將使怒流循洛而下直冒京師其患豈勝言耶此其大可懼者是甘以數百萬日增之費養異時京師萬一之患亦巳誤矣夫歲傾重費以坐待其患何若折其奔衝以終除其害哉為今日之計宜復為汴口依舊引大河一支啟閉以時還祖宗百年以來潤養生民之賜誠為得䇿汴口復成則免廣武潰注以長為京師之安省數百萬之費以紓京西生靈之困牽大河水勢以觧河北決溢之災便東南漕運以蠲重載留滯之弊時節啟閉以除蹙凌打凌之苦通江淮八路商賈大舶以供京師之饒為甚大之利者六此不可忽也唯坼去兩岸舍屋盡廢僦錢為害者一而不甚大所謂損小費以成大利也臣之所言特其大略爾至於考究本末措置纎悉在朝廷擇通習前後之臣付之無牽浮議責其成功伏望聖慈面詔大臣商擇而施行之事繫國體願留宸心元祐四年上先是元豐元年西頭供奉官張從惠上言去年七月黄河暴漲異於常年水落而河稍北去距廣武山麓有七里逺者退灘高濶可鑿為渠引洛水入汴為萬世之利范子淵時為都水監丞畫十利以獻於是遣梁燾等行視燾還言不便二年又命内臣宋用臣往經度宋用臣還言可為於是詔用臣都大提舉導洛通汴自四月起六月畢工勞民動衆費用不可計至是燾上此議時為御史中丞宋名臣奏議卷一百二十七
