body:
  text: 宋名臣奏議巻四十三宋趙汝愚編天道門災異十上神宗荅詔論彗星上三說九宜呂大防元豐三年七月二十五日詔中書朕以寡昧獲奉宗廟夙夜祇畏不敢康寧冀或仰當天心感格和氣以敷錫于庶民而太史占言謫見乾象乃孟秋癸未彗出西方災異之来厥有攸召夫豈朕徳弗𩔖刑政或謬於理歟吏之不良而民或失職歟永惟厥咎朕甚懼焉自今月戊子避正殿减常膳中外臣寮並許直言朝政闕失朕虚心以改庶㡬古先格王正厥事之意焉臣伏覩七月二十六日手詔以彗出西方責躬引咎敷求讜言以正厥事臣伏讀感欷以為天道難知不可隐度今聖心恐畏退託損抑有以見不諱之朝度越前古臣愚不肖雖吏守外藩不敢不布肝膈少禆萬一伏惟神明幸察臣竊以為方今政事之急謾為三說九宜上冒天聴一曰治本二曰緩末三曰納言治本之宜有三一宜養民漢之𫝊國至昭帝而六世藩臣之變外戚之禍數矣唐之𫝊國至明皇而六世如漢之變而又有巨盗之患今大宋之臨御而陛下之繼統世數與漢唐同而曽無一方之患其得人心可見矣茍非累聖徳澤涵養深厚視之如傷愛之如子則何以固結其心若此伏自陛下布行新政以来參酌古今著為良法便民者為不少矣而民情戚戚不以為安推原其端盖縁朝廷措置大率急於公家而緩於民事竊觀先王之政上之憂下也深則下之報上也厚故其詩曰駿發爾私終三十里上憂下之詩也雨我公田遂及我私下報上之詩也上下之情其相親如此則怨惡不順何由生乎其間哉故馬周之對太宗以為貞觀初匹絹易斗米而人不怨者知陛下憂之也五六年来匹絹易榖十數斛而民怨者知陛下不憂之也此言極要頗同今日之意臣試舉其一二免役錢本率衆以給傭公家無所利其入今所在猥積至有一縣之人出者半羸者半而取之不已遇水旱未嘗有所蠲减貧下未嘗有所貸免此民情戚戚之一也市易本以抑兼并便衆業而公利在其間民有艱急匱乏之期方之他取於富室則無倍稱之息然吏或不良乗民之急而掊克無已徒欲收贏取償而不顧事體之宜與法令之本意誘陷無賴子弟以隳産者有之予民者髙其物估以巧取息者有之一物也朝貴賣而夕賤買者有之此民情戚戚之一也保甲者先王什伍教民之法也不專為兵而已今有司惟以坐作進退射藝精粗為急而不問推行考察姦盗去惡奬善之意而又富者逸而貧者勞或遇饑饉則將有流散不可號召之虞此民情戚戚之一也凡此特法令之未備或吏奉法不謹之過以陛下之聖明而修正之宜無難者二宜教士舜九徳文王作人周公三物皆為先王教士之實今聞以才選者矣未聞以徳進也聞以文詞選者矣未聞以行進也臣竊以非大變其法則終不能得教士之實其變法謂何責之郡縣監司保任其才行以升於尚書各試其所知而命之則士勸於善不専以文詞設科則士業崇本凡此一改法令則天下從之矣以陛下之聖明而修正之不五六年必收其效二宜重糓自古國家之患未有不縁民飢而起也今縣官積錢所在貫朽而倉廪至無半嵗之實誠可憂也盖自常平之法行而羣司各計其利故轉運司唯有租稅征科之入而已其嵗入既不足以充費故于儲蓄之計雖欲賤糴而不暇為也常平雖有折納歛糴之法而吏多不能推行萬一水旱方千里則積鏹之饒將無用而民之彊者衆而為盗弱者流離溝壑而無以救矣臣近嘗上乗嵗豐積榖之議頗合事機而亦可行於乆逺伏望裁察凡此特法令之未備或吏奉法不謹之過以陛下之聖明而修正之宜無難者緩末之宜有二一宜緩治夷狄中國本也夷狄末也先王之政内諸夏而外夷狄夷狄之國聲教所暨故舜之命官猾夏者治之然則不為中國患者王者不治也或者謂夷狄之地可闢而郡縣之夷狄之民可冠帶而賦役之竊謂過矣以四海九州之廣而欲沙漠不毛之地以為富以兆民多士之盛而欲左衽鴂舌之人以為衆徒見有糜敝所重而未見其可也雖有前代䘮失之地茍非民情来附未足以用衆一宜緩治兵兵者先王所治而非所以為先也衛君問陳於孔子而孔子荅以俎豆之事盖禮教有所未修而先之以軍旅之事則語道非其序也今刑政雖講而未可謂盡中禮樂雖修而未可謂盡善教化雖布而未可謂盡行然則今日之政宜有急於兵者焉凡此非可廢之事特在陛下施為之有先後而已以陛下之聖明留意而條别之宜無不得其序者納言之宜有四一宜廣言路古者羣臣人人得諌故曰工執藝事以諌工尚諌則餘可知矣所謂争臣七人者在位皆諌諌而又當必争者有七人而後可今陛下虚心待下未嘗大聲以色而諌者未始有聞於天下諌而必争者未始見其人方唐太宗之時當亡隋之後人物寡少而諫者滿朝今陛下承累世文明之盛而遂使史筆無書諌諍之事亦可謂闕典矣二宜寛侵官之罰凡人臣之居外見不便於民有害於政者大者聞諸朝小者以其職而行之是也今一切禁止不使相侵則朝廷必有不聞之事而民庶必有失職之苦矣三宜恕誹謗之罪自古有為之君更制天下之事未有不被毁訾於世者以盤庚之明周公之聖而不免况其下者哉盖衆人者常情不達義理樂因循而憚改作改作之始未見其利而翕然非之聖人于此特恕其無知而寛之可也豈足以與之較量長短是非哉故漢文深知其意直除其罪以度容之而已茍設峻令以防之非不遽止然愚庸之情不自知語言之過而非其上矣四宜容異同之論古者衮服之飾必以黼者取其兩已相背而能成政也兩巳相背至銘諸躬而日服之以為監有以見人君御臣之深戒在于喜同而惡異也舜伐三苗禹以為可益以為不可然不害並為九官周公相成王召公不恱然不害同為十亂洪範謀及卿士則三公之論有不用焉周官詢及萬民則卿士之謀有不取焉夫然後可以通達衆志輔成大業茍取其所同而捨其所異則晏子所謂以水濟水孰能食之者也非特如此而已茍欲其同則必有誕謾詐欺以附同者矣茍惡其異則必有詭随面從以免異者矣使人臣皆懐誕謾詭随以事上殆非朝廷之利也竊聞議者必使廷臣無異論乃謂之一道徳為此說者似不思也夫一道徳以同俗者盖謂典常之教不可不同也今以政事之殊有可有不可有宜有不宜有損有益而必一而同之恐非聖人之意也所惡異論者豈非以其沮議害事而惡之耶茍導之使言而擇之在我則雖有沮議害事之言在吾所棄固不能為患也凡此無難改之勢而有速應之實盖在陛下為之而已如前所陳盖陛下政事之形容於外者臣得以揣度而陳之至如陛下聖性之淵㣲君徳之崇厚惟㡬以成天下之務惟深以達天下之志臣之愚陋莫得而測焉伏惟仰觀天心旁考古義絀竒論而用中道則天下幸甚元豐三年八月上時直舍人院上神宗荅詔論彗星上三說九宜邢恕臣恭惟皇帝陛下實天祚宋誕生明聖有超卓絶異之姿爰自毓徳宮闈仁心仁聞載在羣口及初嗣位動率禮法承順兩宮左右就養廢於誠孝逺近内外凡厥臣庶莫不矜式太皇太后厭世陛下號慟泣血百僚在位不覺隕涕入臨而出轉以相告有識咨嗟長老嘆息山陵復土外雖變禮從吉而陛下悲哀未怠宮中實服三年夙夜念治躬親政事小大之臣咸各率職十有四年未嘗一日少懈後宮燕遊聲色嗜好無所聞園囿弋獵輿馬馳騁無所幸方且闢闔乎乾坤而步驟乎帝皇其視天下如一家中國如一人其設心操術豈待問哉仍年以来威福自出惟所指顧莫不服從曽未謦欬莫不響應赫赫巍巍朝廷益尊四方萬里盗賊消戢閭里安堵陛下誠因此美即此善據此勢藉此時以之上當天心則可使寒暑平風雨時三光軌度以之下順地理則可使五榖熟庶草茂山川晏寧至於景星出卿雲見甘露降醴泉涌鳳凰麒麟可使皆在郊藪天人之際其形氣有以相通其變動有以相感格之以誠應之以實宻與道俱則其荅猶影響其合猶符節也如此則何災不可消何異不可去若夫祈禳小數豈足道哉昔宋景公一諸侯耳出人君之言三熒惑為之退舍况於陛下之仁聖智勇履席南面之勢不出殿堂之上而廣制海内尺地莫非其有一民莫非其臣者哉以誠感天曾不移刻以徳退星曾不旋踵此臣所以殫志畢慮不量其愚不避見嫉之嫌而願畢其惓惓也伏惟陛下留神加察焉踈逺小臣未嘗得日望清光奉承徳音也然而間從公卿大夫之後竊聴於進見下風者皆以謂陛下才髙天下智出物表既妙思六經而多識前載旁羅百氏典章制度律令敕式靡不淹洽工作器械算數米鹽無不精宻神機天辨變化無窮退而鮮不自失夫人心畏怯則智勇皆廢雖朝暮禁闥陟降殿陛宻近親習之臣猶且踧踖愧恐唯諾聴從之不暇無能有所開發建明以補助萬一况于單賤鄙逖之人乎雖天之髙不可階而升日月之可仰無得而踰性與天道不可得而聞然匹夫匹婦之於聖人有所與知一有不獲自盡民主罔與成功以大舜之智而自耕稼陶漁以至於為帝無非取人以為善以孔子之聖而獄訟文詞可與人共之者不獨有焉則所謂聖智者曷嘗掩衆人之所能而咸盖羣心之所知哉衆人所見而有以處之使各效其長羣心所知而有以擇之使必從其是竭天下之才力盡天下之思慮然猶有所不及而後聖人奮其智能則所以待之者盡矣其所得者博矣其所守者約矣已而有迹其長縁其是則天下之人莫不興起為之於其才力之所不給計之於其思慮之所不獲則天下之人莫不厭服何必耗血氣疲精神一切親事於法宮之中然後為得哉臣竊仰陛下之天徳常若太髙而或不下接朝廷之舉事常若太速而謀之常患不博雖陛下之聰明睿智百舉百中而愚者千慮之一猶恐有所遺也况或纎芥闕漏畧於彌縫而汗渙已施機張巳發則誰敢出身試臨不測而輕議於既往哉且夫履四海之盛位襲五世之極治又有冠古之稱絶俗之事此乃全盛光大之時君子之所以尚消息盈虛也意者陛下或有而矜之所謂日中則昃月盈則食盛衰損益之機其在是矣故易之明夷以莅衆既濟思患而預防此古先哲王所以安而不忘危存而不忘亡治而不忘亂日新厥徳以祈天永命也昔唐太宗自負其文武材畧以為實兼將相然不知帝王自有體下兼將相不足為能不若漢髙祖豁達面諭羣臣吾不如子房蕭何韓信也方是時彗星亦嘗變見而太宗悟焉曰吾自謂三王已來撥亂之主莫吾若故負而矜之輕天下士上天見變其謂是乎夫謂古人為莫吾若而輕時人則上下之情不通而無所不至惟太宗為能知悔而又有魏徴王珪劉洎馬周之徒更戒迭諌然後貞觀之治庶㡬三代之風而彗亦不能為災何况陛下盛徳至誠避殿損膳深自引咎以来讜言放出宮女以防隔塞虛心克已效於事實豈特太宗之比哉于以收視反聴澹然與神明俱而黙與造化為友端拱無營優游自得付物以能委任責成情偽之變事物之来有道以揆有節以察不勞而成不動而化兼享堯舜之名永保喬松之夀上以奉寧七廟慰釋皇太后之心下以幸恵羣臣而錫為蒼生福則何變異之足憂哉抑臣又聞惟徳動天無逺弗届而天地之大徳曰生董仲舒亦曰刑主殺徳主生則修徳者莫若好生也朝廷近嵗屢起詔獄深識逺見之士竊量陛下聖意之過欲大畏民志究盡事實及至便殿親决時亦有所縱舍郡府奏讞大辟𩔖率從生非必專欲求殺也然而治獄之吏典法之官但見追逮不絶恐不能無妄意朝廷便私自營冀徼盡力首公之名而規闊畧縱出之責則必至於滋蔓刻核失出葢鮮則失入有之及至上奏請决鍛鍊已成文致已白囚人雖有懐鬰抑而不得伸朝廷雖欲加寛厚而無所施則是豈國家之意哉臺寺深嚴自非事守相闗焉知其詳然法者設於有罪而使惡人知畏也今無罪者或不自保而善人亦懼矣此臣所以疑也臣知京師玩習乆安大抵懈弛而嚮者貴近狃於恩幸不知畏法方陛下勵精為治有以督過訓齊之誠是也然而矯枉者貴直矯枉過直則是曲而已孟子曰今之與楊墨議者如追放豚既入其苙又從而招之誠使百司自此莫不飭厲而貴近益遵約束然且求之不巳則是亦過直而招之之𩔖也書曰寛而有制從容以和在易之節曰苦節不可貞先王之所以䋲檢羣下未嘗無制也然必寛之使赴功有餘地從容而不廹遽故和樂而無憔悴節之為卦君子所以制數度議徳行然至於已甚過中苦而不甘不可以通行持乆失其所以為正是故先王議道自已制法以民也誠以陛下天縱之才日躋之徳慮靡不周而志罔或倦舉以程能課事而厚望之於羣臣磨以嵗月則鮮不破漏傾覆失其所操持行義有跌于繩墨之間而譴訶有軼於度量之表矣易曰窮則變變則通詩曰四牡騑騑六轡如馳臣意陛下洞達事機時措之宜必有以變而通之如王良造父御馬緩急控縱而歸和平固巳得之於精神之㑹心術之㣲然臣直以耳目所接言之不能無過計也獄吏法官制在陛下視以好惡惟所寛恤易若覆手至於興甲兵之大投民於鋒鏑之間措之矢石之下以其死争一跌而不振則雖有仁智之心不能救患於已然而消禍於既往是故帝王之師必出於萬全攻不必取不茍勞衆戰不必勝不茍接刃盖以養國威全人命也近者瀘南之舉師出不為無名以陛下之威武將吏皷勇軍士思奮校之以計若老成人之策孺子角其有餘不足若孟賁之拉侏儒檄馳鋒接萬全必勝而獨克然臣得之𫝊聞不知是否以謂蠻徼山林阻險道路狭隘溪澗隔絶吏士羊腸魚貫不輕得進地饒瘴疫令人頭痛身熱漚泄霍亂而中州之人不服習其水土使蠻稍桀黠聞大兵將至則逃遁而不出旅距而不可入曠日引乆留而不决士卒暴露疾病死亡者衆而餽餉或不給師老械敝浸成遷延不然逆𩔖醜徒上下救死為首尾之勢旁近種落相與唱和有唇齒之援舉熊羆之士而輕用其鋒以與猨狙之民角逐於﨑嶇偪束濘淖翳薈之間以幸頃刻之勝厮養下卒有一不􅇱於行間雖能梟馘其首領繫纍其徒黨猶不若多算逺御以全制其弊也如有師倦而歸蠻或連結諸種呼嘯並出蜀地狭而人稠雖遇大熟食猶不足比嵗錢積於官市用少而益貴米不加多而益賤則農人困矣蜀之所恃以界限蠻夷者山林也今承平日乆而虞衡之屬時禁不講界上之民私相交易往來往往有㣲徑潛通道路故號為險狭者今率行牛林木故可以為障塞者今皆盡行斤斧不幸而嵗饑食不足錢不可以多得本末俱困山林之阻故不設俻屬有姦民鄉導外冦表裏俱發郡縣又闕守備則唐之南詔前世之均順豈可以其無能哉古人有言兵者凶器一方有急四面皆從今蜀雖號富饒為朝廷外府以内外輕重較之則手足標末也五路天下之腹心根本也河北陕西河東又皆控帶戎虜率計義勇保甲籍勝兵不减七八十萬然則三路尤為天下之捍蔽祖宗寛假邉民稅或不及分河北特弛鹽禁誠知天下有急三路最持其重三路不可動揺則天下之勢常安而他皆坐受其利故切封疆捍壁壘輓齎奉饟數履危難之地者則急其力而緩其財守墳墓安鄉里不識戰鬬之事不知死亡之憂者則急其財而緩其力利害之相權勞逸之相均勇怯彊弱之相資多寡有無之相濟盖未有兼責而獨得者也祖宗初定天下所以任戰者皆黥面之兵固未有義勇保甲也猶且恤之若此况今日乎誠宜先擇三路之守令優為勸奬之法稍稱職者且使乆任俾得以拊循其民即安田里因其暇日𨽻習戰守捐其逋負寛其力役平居無追須勞苦之歎則緩急可責其效死果得民兵之實則西北之敵且畏威矣民誠效死敵誠畏威則邊鄙不聳兵刃不頓不過几席之上樽爼之間可以挫四夷因其亂亡之時踐其機投其隙皷之以道徳征之以仁義誘之以恩信則可簞食壺漿以迎王師扶老携㓜以歸聖徳鞭撻不施况血刃乎方天變之来陛下過意抑損即有以反求諸身又有以固結其民酌輕重之宜謹先後之施則夏遼異黨蠻貊荒忽可使歸命向化矧惟宮殿之内左右密勿常從宿衛之臣乎至若推廣象𩔖而修舉恩澤之政以導迎善氣惟陛下所擇非小臣所得一二言也臣屬近在輦轂之下首聞詔音猥先衆人而言陛下赦憐不誅使能言之士得以繼進則四海九州之博内外臣民之衆方九徳咸事之時安知不有指陳世故極於天人之分達於古今之宜足以上荅聖心抑塞星變者哉則是臣於國猶為有補也元豐三年八月上時為館閣校勘上神宗荅詔論彗星上三說九宜呂大鈞臣伏讀詔書寅畏天變引過罪已數求美言以新盛徳誠意惻怛發於心畫自以消變除慝况諌行言聽膏澤逮下必將感召和氣溢為嘉祥臣愚恨無精識奥學啟寤天聴徒有淺聞近見二事或可以少禆萬一伏惟聖主留神裁察幸甚臣聞詩書所稱古先哲王雖清明在躬俊乂在官猶孳孳不倦延禮臣下講求至道之要而推行之夫至道之要莫切於堯舜之言其言曰人心惟危道心惟㣲此言至簡至要古之人君莫能盡行故常為中材之所忽而獨上聖能勤行者也然則人心者人君之所日用時出以應萬務者也其神明恍惚其出入無時其作於中而見於外也邪正糾紛頃刻萬變其危如是安得不日夜存養寧息使之感物應變無所差失乎道心者人心之所黙識躬行以立大本者也凡有生之民無衆寡小大無彼我莫不體之以為吾心就其間涵容存養以生吾誠其道茫昧難以言諭惟忠信黙㑹庶㡬近之稍或不明則離而不一其㣲如是安得不閑暇燕處求索推明克已體物常使純一則仁義禮智油然根於中睟然見於外然後為得乎故言動之所發政令之所加始出於善而其終常流為不善凡此者皆人心不安而易變故也誠意之所存行義之所履始若充盡其終常至於天下不為一家中國不為一人凡此者皆道心不明而易失故也由是言之此二心者非有一物也特體用之殊耳使人心一於道心則自不危矣使道心一於人心則自不㣲矣今乗陛下勵精反巳之時謂宜博延徳義之士儲精垂思相與講求至道之實使浩然之氣充塞天地則何患濬哲不生而明徳不暢乎此臣之所謂淺聞者此也臣又聞天下衆人言謂陛下躬勤庶政日不遑暇而有司奉行多不盡理陛下逺略方外軍政修舉而將帥出征多不諭􅈲陛下勸奬人材揀拔倚注而或不得其人陛下優假言事之臣未嘗深譴而近日内外望風畏怯莫敢有言青苗免役所以寛民力而下戸凋瘵日甚常平儲峙錢榖所以足國用而有司經費日窘訓齊保甲所以禁暴而盗賊如故增置官局所以革敝而文書益煩異時嵗饉糴貴小民常取倍息之貴亦能自給今年豐官出輕貸而束手受困異時富商大賈豪奪細民而不甚為苦今市易均輸平凖而負益深凡此皆臣之近見者也然推見其本而求之豈有他哉惟知道心之實則見此時之敝矣𫝊曰惟道集虚陛下既明發徳音虛心待物則道豈難知哉古人謂顧力行何如者此在陛下一動心之間耳可不深念之乎元豐三年八月上時為宮邸教授上哲宗論亢旱劉摯臣伏見自入冬以来並無雨雪亢陽為沴被災甚廣羣情嗸嗸驚憂四顧考原經典可謂大異夫人之氣與天地隂陽之氣相為出入流通而往来者也人情和於下則天道順於上人事乖於此則天變效於彼是謂天人相與之際也故聖人之事天也知其在上不逺應以𩔖至則凡祈禳消災以為末節小數而専修政事以應之竊以陛下委國仰成與之均休戚同榮辱者不在三省樞宻院執政之臣乎今廟堂之上大臣八人情志乖暌謀謨不一無同心同徳之節有分曹懐貳之意故議政之際排拒依違相激相鬭其語往往播在中外所以政令壅隔而不下文書稽滯而不行官爵濫於無名而不應於典故公道遏於貴近而獨施於踈逺私邪朋比上下隔并况當皇帝陛下淵嘿諒闇之日太皇太后陛下制出房闥之時朝廷政權盡在大臣而大臣不協如此故天下但聞頗僻之事而不見和善之政政不和則人情不和人情不和則天地之氣繆戾而生此變也書曰肅時雨若五行𫝊以謂冬旱政舒緩之所致也今上下可謂不肅朝廷之政可謂驕慢廢弛號令可謂二三不振以古者災異水旱咎在燮理隂陽之官故策免三公以塞其譴今来嵗已窮盡旱暵如此宿麥在野無潤澤之入春氣相乗有疫癘之變生民一嵗之大命豈可不念之哉又一月以来日青無光風霾昏翳考之占騐皆非小變而上之人恬不以為怪此中外之所以恐懼而不寧也伏望聖慈深省上天儆告之意俯察朝廷乖戾之變特詔大臣修飭政事凡賦斂之害人者法令之未安者必觧而更張之至於决獄訟之私枉趣諸司之稽違進忠良退阿諛通壅蔽去疑貳務以至誠實事上塞天譴下救生民則和氣之應將不旋日而得之矣臣不勝惓惓之心貼黄外議皆謂朝廷自升祔後来政事懈弛不及日前此盖有以召之非虚言也元豐八年十二月上時為侍御史上哲宗論華山摧梁燾臣竊聞華州奏鄭縣界小敷谷山摧損覆居民者臣按春秋傳曰國主山川故山川之變聖人以為至戒而深懼然變之来也或考之人事而相符或稽諸君徳而不𩔖要之皆有天意顧世主所以應天意者何如耳應之得其道則轉禍而為福失其道則反安而為危詩曰百川沸騰山冢崒崩髙岸為谷深谷為陵此人事相符之變也然幽王曽不以為䘏故詩人哀之曰胡憯莫懲書曰湯湯洪水方割蕩蕩懐山襄陵浩浩滔天此君徳不𩔖之變也然帝堯自以為戒故命禹之辭曰洚水儆予臣竊伏思陛下即位以来尊用耆哲登崇雋良納天下之善常若不及革天下之弊惟恐不至以百姓之心為心撫而念之不啻父母之於赤子也四海内外物情人意和樂而舒徐巍乎太平之象矣宜乎美祥嘉瑞交至而迭應今反有山摧之異者何也臣見天心之仁愛陛下欲以篤佑聖治日新又新以盛無疆之休故於未然深示警告願陛下仰思天心而内自勵曰予臨兆民固懔懔乎無不懼矣豈尚有言動之際忽而不恭者乎公言直道固無間而上下交矣豈尚有詖辭邪說反易是非汨吾之明者乎正人君子固並進而朝廷清矣豈尚有不肖渾淆其間亂吾之真者乎天下固安矣豈尚有宿蠧深弊逺而難燭隐而不知或欲改而復存或已除而又作動人之憂者乎四疆固静矣豈尚有惜虚名而甘實弊以養後患未為至計者乎爵賞不為不謹也姑息以害公僭差而紊正者一能絶歟刑賞不為不平也當罪而縱宜直而枉者有不察歟政令不為不明也煩而寡要輕出而易反以惑民之聴者審於思歟力役不為不省也用而不切偏而弗均者究之至歟郡邑之治不為不飭也任非其人遏王澤而不流病吾民者知之盡歟仰願陛下因天之戒凡此𩔖者益加意焉臣愚不勝惓惓昔梁山崩晉侯以𫝊召伯宗伯宗以重人之言告而晉侯從之以自責春秋賢之夫晉侯列國之君而梁山一國之望耳其變也猶能亟召賢者而謀之况陛下有天下之大華山又五嶽之崇乎其可不畏天之威思所以應其變也伏惟陛下鑒周之失體堯之言采晉之善博資賢人之謀修飭政事以荅天戒社稷幸甚天下幸甚貼黄臣伏思華山西方之鎮國家倚之以安静者也今而崩摧必有天意願陛下深加省懼不以為忽天下幸甚元祐元年十二月同侍御史王巖叟上燾時為右諫議大夫上哲宗論旱為不肅之罰王覿臣聞書曰惟吉凶不僭在人惟天降災祥在徳夫人君之徳配乎天地而協乎隂陽者也故災祥之来皆随其徳古之人君每見災異則退而自省以修徳焉乃可以變災為祥轉禍為福伏見去嵗以来旱災屢作今春渉夏亢陽尤甚陛下焦勞惻怛精意祈禱靡神不舉而又傾倉廪之積以賑飢省土木之工以寛役親錄囚徒赦過宥罪宜可以致雨矣而雨猶未也然則天意亦必有在矣謹按洪範之五事一曰貌貌曰恭恭作肅見於休徴則曰肅時雨若也夫人君外既有恭莊以著於貌内必有肅欽以生於心然後施於政事一皆主於肅欽則百官羣吏四方萬里莫敢不肅而天應之以時雨此天人相與之際如影響也恭惟陛下春夏以来凡可以致雨者無所不講而雨猶未應意者肅欽之道或有所未備乎陛下起居語黙多在深宮之中非愚臣所得而見其見於政事者臣得以言之也夫中都之官雍容養望者多而紀綱浸隳諸司之吏驕慢玩法者衆而鞭笞罕及此京師官吏之不肅也監司妄意朝廷厭於督責者以茍簡為適時郡縣妄意朝廷主於寛大者以縱弛為得計此監司郡縣之不肅也國之凶人可誅竄以明國之刑者或阻格於大臣之言民之巨蠧可黜削以釋民之怨者或稽留於典吏之手此刑罰之不肅也令出惟行弗惟反今發號出令或數日而追或累月而變者此號令之不肅也廣西新州之役以兵將邀功無事受戮者千餘人逺方之民銜寃無訴矣而乆不正其罪此軍政之不肅也河北塘泊之險以大河横流漲為平陸者數百里敵騎之来將通行而無礙矣而莫有任其實者此邉吏之不肅也凡政事之不肅者𩔖如此而求所謂時雨順之不亦難哉夫仁恩豈不可致雨而肅欽乃可以致雨者何耶盖肅然後仁恩可行也朝廷不肅則小人肆而下有受其弊者矣政事不肅則萬事隳而民不保其生矣夫如是且將亂之不暇尚何仁恩之有况可以感天心而致雨乎惟肅欽然後政事修而仁恩行乃所以致雨之道也然則言動之不可以不肅者臣願躬行之政事之不可以不肅者臣願深圗之庶㡬乎雨可致也元祐二年四月旱甚覿言陛下必欲有以感天意即乞下詔責躬以其未能肅欽以致不肅之罰也然後詔三省以振朝綱去民賊詔樞宻院以嚴邉防治軍政詔六曹寺監以修職事戢胥吏詔御史臺以舉不職詔監司以察縱弛詔郡守以戒偷惰凡政事之不肅者皆修舉之如此而雨猶未降臣甘嚴誅以為妄言之戒不報繼上此奏時為右司諫上哲宗論水旱乞許羣臣面對言事蘓轍臣伏見二年以来民氣未和天意未順災沴荐至非水即旱淮南饑饉人至相食河北流移道路不絶京東困弊盗賊羣起二聖遇災憂懼傾發倉廪以救其乏絶獨此三路所散已近二百萬斛矣異時賑卹未見此比然而民力已困國用已竭而旱勢未止夏麥失望秋稼未粒數月之後公私無繼羣盗蜂起勢有必至臣未知朝廷何以待此臣竊見太皇太后陛下清身奉法與物無私皇帝陛下恭黙靖重動由禮義皇天后土照知此心而和氣不應深所未諭不審陛下嘗究其說否臣聞天氣下降地氣上騰隂陽和暢雨澤乃至君廣聴以納下臣盡言以奉上上下交㤗和氣乃至今二聖居幃箔之中所與朝夕謀議者上止執政大臣下止諫官御史不過十數人耳其餘侍從近臣雖六官之長皆不得進見而况其逺者乎臣以謂羣臣識慮深淺不同其心好惡亦異故須兼聴廣覽然後能盡物情而得事實今陛下聽既不廣則所行之事不得不偏聴狭事偏則隂陽亢隔和氣不效必然之理也臣觀祖宗故事百官有司皆得以職事進對從容訪問以盡其情今二聖臨御四方引領望治而謙恭退託踈逺羣臣不行人主之事遂使百官不敢以職事求見臣謂宜因此時明降詔書許百官面奏公事上以盡羣情之異同下以閲人才之賢否人心不壅天道必從則久旱之災庶幾可息臣蒙國厚恩比聞詔書引咎自責避正殿損常膳分命臣僚並起羣望私心踧踖不敢遑寧輒推天意人事影響之應庶幾有補萬一惟陛下恕其愚僭畧賜采擇元祐二年四月上時為中書舍人上哲宗論隂雪蘇轍臣伏見自去冬至今隂雪繼作罷民凍餒困斃道路聖心憂勞何所不至蓋嘗命有司發内庫之錢出司農之粟竭太府之炭以濟其急矣猶未也則釋犴獄罷役夫凡可以惠民之事無不為矣而天意不順雨雪如故臣竊惑之臣嘗觀先儒論五行之説以為聽之不聰是謂不謀厥咎急厥罰常寒故周之末世舒緩微弱政在臣下則天應之以燠煖秦之末世峻刑暴斂海内重足而立則天應之以寒慄是以周亡無寒歲秦滅無燠年信如此言則朝廷之政令豈失於急歟竊惟二聖臨御以來革弊去煩施惠巳責凡所措置雖未盡得而民獲其所欲者多矣茍以為急雖三尺童子不信也然則陰雪之應其咎安在臣聞商髙宗雉鳴於鼎其臣祖已告之曰惟先格王正厥事夫所謂正厥事者無常事也惟因其非而正之耳故臣竊推之古事以為天大雷電以風而成王應之以逆周公衞國大旱而文公應之以伐邢夫親任三公非所以止風而興師伐人非所以致雨彼既為之不疑而天亦報之如響者誠得其時當其事耳臣竊惟近者天地之變常半歲苦旱半歲苦陰陰陽之氣一有過差浸淫爛漫而不能反今雨雪既甚久不止則春夏之際又將復旱此其𩔖似有以致之者古之為政徳刑並用寛猛相濟使天下懐其惠而畏其威民氣充塞而天地從之故陽不過而陰不忒自頃年以來朝廷之政專以容悦為先務上下觀望化而為一監司之臣以不執有罪為賢郡縣之官以寛弛租賦縱釋酒税為優至于省臺寺監亦未聞有正身治事以辦集聞者也何者朝廷方兼容是非以不事為安静以不別白黑為寛大是以至此極也臣竊惟朝廷之意其始蓋欲以寛大治民耳而不知姦臣猾吏乗其間以侵虐細民其弊不可勝數名雖近寛而其實則虐也陛下誠欲消復此變宜訓敇大臣使之守法度立紀綱信賞必罰使羣下凛然知有所畏茍朝廷無偏甚不舉之政則陰陽過差浸淫爛漫往而不返之氣宜可得而止也不然雖空府庫竭倉廩以賑貧窮破囹圄焚鞭朴以縱罪戾臣恐上天之意未易回也臣待罪地官以簿書米鹽為職出位而言罪在不赦然陛下頃自疎外擢臣而用之二年之間致位於此豈欲責臣齪齪以吏事自效而巳哉是以冒萬死獻言惟陛下裁擇元祐二年二月上時為户部侍郎上哲宗論歲旱地震星隕劉安世臣伏見陛下即位以來于今五載承天順地仁民愛物徳澤洋溢施乎方外元元鼓舞歌頌不暇固宜陰陽順序風雨時若諸福協應百嘉蕃昌而歲比不登和氣湮鬰饑饉流徙災害頗衆今春乃旱暵為虐京畿西路二麥失望農民嗸嗸且又菜色雖陛下惻然軫念靡神不宗疎决繫囚降從寛典而沛然之澤終未告足又陜西河北屢聞地震大星晝隕其光燭天旬月之間巨異仍出臣聞天人之際精祲有以相盪善惡有以相推事作乎下象動乎上陰陽之理各應其感陰感則静者動陽蔽則明者晻水旱之災隨𩔖而至此皆天心之仁愛人君而先出災異譴告警懼使之兢畏修省而不至失道之敗也臣竊謂上天之體雖髙而聽卑明主所應惡文而尚實與其為祈禳之小數不若圖銷變之大方願陛下夙夜祇畏側身修行特下明詔以是罪已又許中外臣民極言政事之闕失專委近臣考求其當以施有政庶幾下情不至壅塞其諸路災傷州縣流民所至並委守令多方賑濟無俾捐瘠申勅縁邊帥臣及捕盗官吏常切警備以戒不虞今日巳前内外營造土木之役茍非要切並乞停罷分命監司按視留獄公卿輔弼同寅協恭以思天變開衆正之路塞羣枉之門誠備災之善經應變之至務也昔宋景公小國之諸侯爾有不忍移禍之誠出人君之言三熒惑為之退舍陛下之明聖發於誠心精意感通何求弗獲臣待罪諫列日聞焦勞輒效愚忠庶裨萬一惟冀聖慈少賜采納不勝幸甚元祐四年三月上時為左正言宋名臣奏議卷四十三
