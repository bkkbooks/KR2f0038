body:
  text: 宋名臣奏議巻一百四十八宋趙汝愚編總議門總議四上仁宗荅詔條畫時務張方平臣今日蒙召對資政殿賜手詔一道朝廷急務俾之條畫以聞臣以庸昧謬居近列論思獻納乃侍從之職不能孜孜夙夜拾遺補闕聖心焦勞躬垂清問闊宥循黙之罪開導淺陋之見敢不悉情極慮粗陳大體上冒衡石少補塵露臣子之分不勝至幸伏覩手詔云西陲禦備天下驛騷趣募冗兵急調軍食雖常賦有増而經用不給累嵗於兹公私匱乏此足以見陛下社禝之長慮憂民之深意也當康定之末慶歴之初朝廷議刺民兵増添軍籍之時臣忝諫官屢上章疏極言其害至於今日事務果然臣昨在三司計㑹天下財用出入之籍及建隆以來國家蓄養兵數乞朝廷速加圖議盖太祖取荆潭収蜀平廣南備河東禦西戎北㓂蓄兵不及十五萬人太宗朝平河東備遷賊禦北狄料兵閲馬志在収取燕薊然蓄兵不過四十萬人章聖朝備遷賊禦契丹蒐募戰士及契丹請和祥符已後稍稍消汰甞語輔臣曰今之兵與古不同古者三時務農一時教戰民即兵矣今皆坐待衣食國家經費至廣不可不謹於選練故住招募斥疲老以減冗食至於寳元㡬四十年天下可謂乂安矣向因西戎阻命宰相非其人慮害不深事失㡬先遂致大擾始籍民兵俄黥以補軍籍陞諸州廂軍以充禁旅増虛名以受實弊至於陜西河北京東西増置保捷一百八十五指揮武衛七十四指揮宣毅一百六十四指揮慶歴三年因王倫張海等狂賊數十人更於江湖淮浙福建諸路又添宣毅等二十四指揮凡内外増置禁軍約四十二萬餘人通三朝兵且八九十萬人其禁軍義勇州郡廂軍小軍小分半分剰員等不在此數軍人日多糧日少頃來七年之間天下大困生民之膏澤竭盡而國家之倉庫空虛三邊稅賦攴贍不足募客人入中糧草三司在京給還錢帛加擡則例價卒三倍以此度支大計日窘外則剗刷諸道之物中則侵用内帑之財厚賞聚斂之人賤立鬻官之令茍循目前之急莫為經乆之慮天下之事可憂者無大於此也凡此冗兵非唯困天下之財用方且成天下之禍階若不早圖後無及矣且景祐以前兵不及四十萬人三司嵗計不聞有餘今而八九十萬人則何以得足此雖愚者亦可見矣若更加之以横費困之以飢饉國家安危之計臣愚竊甚寒心臣兩曽具此事體敷奏而中書樞宻院未聞有所改為即今便有改為猶須效在累年之後如救焚拯溺緩則益不及矣然兹事體實大非君臣同心而上下協濟則事必難成伏望陛下先且將臣此言詳問兩府若别有長䇿豐財足食則非臣淺智之所及若量入以為出必無以善於後則乞嚴令天下禁止招募軍人令逐路轉運使提㸃刑獄更出分按所部州郡揀選疲老便與放停嵗須三兩次更互巡歴只依常程旋旋揀放無得宣露朝廷宻㫖若雖係禁軍其間羸弱憚於教閱願退就廂軍者亦聴從便委樞宻院㸃勘軍籍其人數少者即令團併以省軍員其馬軍無馬者即與召募如願補填步人者稍與補充近上衣糧優處軍分其有馬者即與團併足成指揮令堪教習準備使用仍詔諸路經略部營司使體知朝廷深意有專愎自任無體國之心者亦在陛下斷自聖心懲一足以警衆矣此其省兵之大略至於嘉謀宻議權術㡬微則有宥宻之司又非臣所得詳知者也手詔云承平寖乆仕進多門人浮政濫員多闕少滋長奔競縻費廩禄此又以見陛下深思官濫欲清化源之大指也臣不敢逺言前代及祖宗朝事請即以景祐年未有邊事之時較之即可知其浮且濫矣臣曽幹當三班院約計在院使臣景祐中四千餘員今六千五百餘員臣勘㑹學士院兩省巳上官景祐中四十餘員今六十餘員臣任御史中丞有本臺班簿㸃筭景祐中京朝官不及二千員今二千八百員臣判流内銓取責在銓選人畢竟不知數目大約三員守一闕略計萬餘人十年之間所増官員之數如此若更五七年後其將奈何員數既多賢愚同滯才不才又難分别勸罰不立士鮮全行此則天下之所以日不理也今略數入仕之門禮部貢院所放進士眀經外近例率以舉數編排别試名恩澤人每榜不下三數百人文臣兩制兩省少卿監以上每嵗奏廕子弟諸路轉運使提㸃刑獄正郎及帶職員外郎遇郊恩例得奏廕子弟武臣自諸司副使軍職大校以上至於宫掖嬪御内臣近職每嵗或遇郊恩奏廕皆有常例又文武官内職任或致仕遺奏及諸色特恩錄用者又諸班殿侍三司軍大將内外胥史牙校出職如此計㑹每嵗入官之路徼倖攀援日生新例不可勝數縻費廪禄煩擾吏民經營闕次因縁請託各為身計衣食之所迫逼奔競滋長勢使之然塞源培本在陛下命令而已乞令中書樞宻院各具逐年諸色入仕名目及人數取其徼倖弊濫尤甚者逐色别立條約稍加裁損其属三司殿前羣牧司等處酬奨條貫亦乞各委眀敏練事近上官員重行詳定臣聞先朝以前雖將相大臣之家子孫猶多白衣未仕者今自少卿監以上輙每嵗任一人不亦過乎如此之𩔖可謂徼倖弊濫尤甚者稍加裁損未為傷事也若只因循今日之例人浮政濫轉恐甚矣手詔云牧守之職以惠綏吾民而䍐聞奏最將帥之任以威服四夷而難於稱職豈制度未立不能變通於時耶豈簡擢靡臻不能勸勵於下耶此又以見陛下愛恤烝民不忘邊患之意也臣謹只以祖宗時事言之祖宗之時文武官不立磨勘年嵗不為陞遷資序有才用名實之人或從下位便見超擢無才用名實之人有守一官至十餘年不改轉者其任監當或知縣通判知州有至數任不得遷者故當時人皆自勉非有勞效知不得進故所在職任率多脩舉以上用人無令格惟才是用自祥符之後天下治平朝廷之議益循寛大故令自監當入知縣知縣入通判通判入知州皆以兩任為限又令守官及三年者與考課改轉後又不限在外在京在任不在任但累及三年即例得磨勘先朝行之人始知恩未見有弊及今嵗年深乆習以為常皆謂如此遷陞本分合得無賢不肖莫知所勸故牧守之職罕聞奏最此實制度不能變通於時者也陛下如欲變而通之合稍釐革此制其應磨勘叙遷者必有勞績可褒或朝廷特敕擇官保任者即與轉遷如無勞績又不因保任例更増展年考庻㡬乎人稍知勸勉於自效其保任之法不當一例應須選擇清望有才識之人如此則是委執政之臣舉清望官委清望官舉親民官也有闕員隨員數令舉又足以見聖恩急才愛民之意此亦小變今弊矣至於將帥之任尤宜駕馭得術仍宜乆於其職李漢超自太祖時任濟州防禦使兼闗南兵馬都監至太宗朝擢授應州觀察使仍守闗南通十七年胡虜畏服不敢窺邊止得一改官而巳太宗任郭進西山巡檢二十年賀惟忠守易州十餘年李謙溥守隰州十年姚内斌守慶州十餘年董遵誨守通逺軍十四年侯贇守靈州十餘年真宗任楊延昭守髙陽闗亦九年假之以事任闊略其細故不為間言輕有移易責其成効而已又不與髙官常令其志有所未滿不怠於為用也今則不然武臣指邊郡謂之邊任假之為發身之地歴邊任者曽無寸勞薄効不數年徑至横行刺史防團㢘察能飾厨傳熟於人事者即以為才而又移換改易地形山川未及知軍員士伍未及識吏民士俗未及諳已復去矣將何以服四夷而得稱職是由揀擢未得於理故下不知所以勸勵者矣願陛下鑒祖宗之故事重爵賞以待功勞責乆任以勸能效亦馭將帥之一節也手詔云西北多故敵態難常獻竒譎空言者多陳悠乆實效者少備豫不虞理當先物此可以見陛下安不忘危思患豫防之逺慮也國家自祖宗以來不急於四夷之功以愛民為務而已昔太祖但以豐財練兵保邊為事甞積帛内府謂左右曰北狄若敢似昔時犯邊我以二十匹絹募一胡人首料其精兵不過十萬我用絹二百萬匹北狄盡矣壯哉聖人之謀兵法所謂先為不可勝以待敵之可勝者臣前謂國家蓄養冗兵竭天下之力而且成禍胎矣今每嵗天下賦税之外只東南和買紬絹自是三百萬匹而衣賜諸用度猶不能給則公私安得不匱乏哉此乃不待戎狄之患而我固已先困矣備豫不虞理豈如此臣願陛下試羣臣前言減兵節用擇吏選將謹重賞罰以眀勸懲以春夏之月稍移邊兵就食内州稍減邊騎就牧内地邊費省則國計足民力寛然後外謹信誓内全守備悠乆實效無先於此竒譎空言又何足聴此亦先物之理也伏惟陛下至仁盛徳髙眀博大勞謙寅畏以求理要斯帝堯之詢於衆大禹之不自矜先格王之懿蹟陛下裕然而有之臣愧於頑疎不達治道據詔問所及謹以近事上對其詔㫖所不及者亦不敢僣易有陳也慶歴八年三月上時為翰林學士達朝㑹鎖院草制即條對所問夜半與制書俱上仁宗得奏驚異詰旦更賜手札問詔所不及者上仁宗荅詔條畫時務魚周詢臣伏以陛下患西陲禦備天下驛騷趣募冗兵急調軍食雖常賦有増而經用不給臣以謂唐季及五代彊臣專地中國所制疆域非廣及祖宗有天下俘吳蜀楚晉北捍獯鬻西服羌戎所謂甲兵所入租稅比之於今其數尚寡然而摧堅震敵府庫無空虛之弊縣官無煩費之勞盖賞信罰必將選兵精之效也近元昊背恩西邊宿師朝廷用空疎闒茸者為偏禆募游惰怯懦者備行伍故大舉則大敗小戰輙小奔徒日費千金度支不給賞官鬻爵淆雜仕流以鐡為錢隳壊圜法而又官立鹽禁駈民賫輦怨咨盈路去秋水旱繼作今春飢饉相属生靈重困於兹為劇今元昊幼子新立迺朝廷寛財用惜民力之時也速宜經制以紓匱乏願委安撫使與本路守邊掌計臣寮同議裁減冗兵節抑浮費禁止横斂廩假貧民去武臣之庸懦及守宰之貪殘仍冀特發宸斷出内帑錢助闗陜經費使通鹽商之利改錢幣之法宣布徳澤與民休息然後勸勉農桑隠括稅籍収遺利抑兼并則公有羨財私有餘力矣陛下患承平寖乆仕進多門人浮政濫員多闕少滋長奔競縻費廪禄臣以謂國家於制舉進士眀經之外嵗有任子流外之補負瑕釁服輿臺者又置於班列歴年既乆紛然塞路周行之内太半非才求人之際鮮堪適用而亟更數易交錯道塗員數有定詔除無限凡守一闕動踰再嵗預閨籍服武弁者坐費水衡之給虛計嵗考之期赴銓調守選格者居有困窮之嘆多隳㢘恥之行官冗之弊一至於此願陛下特詔進士先取䇿論諸科兼通經義中第釋褐無令過多其文武班奏薦并流外出官者權停五七年自然名器無濫奔競衰息矣陛下患牧守之職罕聞奏最臣聞漢宣帝勉勵二千石有治效者増秩賜金或爵至闗内侯公卿缺則以次用之故良吏為盛國家鑒諸侯專地之患一切用郡守治之而朝班寖冗序遷者衆迺有地處蕃宣秩為卿監而未歴省府提轉内重外輕何以求治改絃易轍正在此時願詔兩府大臣選委兩制臺諫官參舉如兩任通判可充知州軍依次除補若治狀尤異即升省府提轉其常例入知州及敕舉提刑並一切停罷則進擢得人牧守重矣陛下患將帥之任難於稱職臣聞晏子薦司馬穰苴曰文能附衆武能威敵是知將帥之材非備文武則不可為也我朝自二邊欵附乆不用兵近嵗有西北之警補授帥臣出於遽猝非自卒伍即恩澤侯無信義以結士心無莊嚴以正師律退則奔北進則被擒虧損威靈取侮夷狄命將之失未有若今之甚也謂宜擇名臣選舉深博有謀知兵練武之士不限資級試以邊任臨軒敦遺假以威權如祖宗起復邊臣李漢超輩閫外之事俾得專之無以謗讒輕有遷徙使其足以取重則安有不稱職之憂乎陛下患西北多故敵態難常獻竒譎空言者多陳悠乆實效者少備豫不虞理當先物臣聞國家和約北戎爵命西夏􅅯甲止戈踰四十年而守邊多任庸人不講武備因循姑息唯兾升平羌戎野心窺見表裏故景祐之末元昊猖狂慶歴之初耶律悖慢覆軍殺將以疲闗陜之民厚幣卑辭暫解幽薊之敵皆用茍安之謀殊無經逺之䇿此班固所謂不選武略之臣恃吾所以待冦而行貨賂割剥百姓以奉冦讎者也願陛下特議於三路減兵馬之駑冗者以紓經費以息科斂然後選將帥擇偏裨使戢肅驕兵飭利戎器識山川形勝用兵法竒正河朔曠平可施軍陣亦宜講求其法雖二邊有變異時侵軼將有所恃庶㡬無患矣慶歴八年三月上時為御史中丞上仁宗荅詔條畫時務係第二狀魚周詢臣巳奉詔條畫時務而陛下復躬親詢逮盖以諸臣所對未究根本故求可行之䇿臣不敢為文辭輙布愚直竊兾有所補焉所謂今之闕失者陛下聰睿髙出前古然聖慮所未至臣下所難言者唯責任不專用人猜忌為大也自昔年二府大臣及臺諫官有互為表裏者聖聰覺悟已行黜典遂以謂人皆朋比無復忠信今中外之臣每進對於前但敢攻過失即為公論若及忠良材能云可任用則慮聖意疑為朋黨故忠邪未盡分善惡未盡聞也所謂責任不專者今執政大臣心知某事可行某法可罷但拱黙自安不肯為朝廷當之致文武大政因循弛廢此又闕失之大者臣願陛下聴政之外選材識之臣獨對便殿訪諸臣能否曰某人疑可用某人不足用然後廣詢博采參驗異同俟其得實則行進對或上承聖問而情有詐欺憎惡則屏之逺方終身不齒何人更敢朋黨又任用之際責其成效果敢當事者則優與進擢因循形迹者則黜居散地何人敢不盡其心乎詔又患文武姦囘中外險詐者臣聞易曰㧞茅茹以其彚征吉言君子小人道同性合相引翼而進也今朝廷根本陛下股肱者二府大臣也安危治亂繫此數人在祖宗時用吕端李沆王旦馬知節及陛下即位之初用張知白王曽魯宗道輩持重處正深博有謀當時引薦擢任不聞有朋邪險詐者今陛下知二府或非其人不能奮然黜之使彚征之勢來者未已自古天子擇宰相宰相擇百官欲矯率此風不先正大臣則所謂形未端而求影之直源未澄而欲流之清也詔患州縣暴虐法令更張者祖宗積徳陛下好生失出者不為深罪失入者終身負責宜長人之吏上體寛仁愛育黎庶而或有暴虐者盖公家急於賦斂以嚴集事貪吏因縁生姦以威動衆使之然也夫法令者治世之銜勒宜守而勿失若祖宗法令可以經乆者不宜更易近樞宻院改内省條令似與曩者負罪之人預為復進之地中外喧然以為不可况内省者左右之近宻朝廷者四方之根本儻不能堅守法令則天下何以取信乎願遴選刺史縣令諭以愛民之意則州縣無暴虐之患矣裁抑權貴無使輕易條憲則法令無更張之失矣慶歴八年三月上上仁宗要務七事包拯臣非材備位諫職思所以為補報者惟言責而已然言不激切則不足開宸慮而補聖政謹條上七事皆當今要務詞理鄙直惟陛下畱神省察一事臣伏以陛下天縱寛仁海納謀議是者取而施用非者存而掩覆羣下見聖度閎博不問是非皆能容受故姦邪敢肆矯妄持難眀不然之事巧飾厚誣使人無由自辨而黙受排斥之禍致陛下眀有所蔽疑貳忠良率以此也夫忠良見疑則忠義之臣欲竭節盡忠補報陛下者皆懼讒畏禍不敢挺然當國家之事矣由是隂姦得計滋長敝病不唯有虧聖徳致害時政一旦緩急乏才賢以使陛下持大任將誰付之臣願陛下聴納羣下謀議之際畱神深察如有持難眀不然之事巧飾厚誣於人者請付有司責其眀辨使真偽不雜是非較然則忠邪自分天下庶㡬於理矣二事臣伏聞近嵗以來多有指名臣下為朋黨者其間奮不顧身孜孜於國奨善疾惡激濁揚清之人尤被姦巧誣罔例見排斥故進一賢士必曰朋黨相助退一庸才亦曰朋黨相嫉遂至正人結舌忠良息心不敢指言是非眀示勸誡此最為國之大患也夫聖眀在上未甞聞有朋黨朋黨之來大抵起於衰闇故漢之黨錮始安帝而極於威靈唐之朋黨由穆宗而甚於文武是皆衰闇之際以陛下用心圖治功同堯舜詎可如漢唐衰闇之際而有朋黨乎斯乃臣下務相傾軋自快其志加諸其人不顧破壊陛下事業者也在昔劉向進諫於漢元帝曰孔子與顔淵子貢更相稱譽不為朋黨禹稷與皋陶轉相汲引不為比周何則忠於為國無邪心也又曰賢人在上位則引其類而聚之於朝在下位則思與其類俱進臣謂劉向之言垂千餘年談者以為至當臣誠學向者也不忍以熙洽之朝有朋黨之說虧損至徳蔽塞大眀臣實痛傷不能已也臣願陛下端慮以臨下推誠以格物循名以核其實因迹以照其心使忠者邪者情偽畢見勿以朋黨為意則君子小人區以别矣三事臣伏聞頃嵗大臣專政頗惡才能之士有所開建則指譏其近名或云沽激欲求進達遂使才能之士莫敢自效縱能不顧忌諱指陳事理必困於沮撓無得而施用矣且名者聖賢之所貴也孔子曰君子疾沒世而名不稱焉賈子曰烈士徇名人不顧名何以趣善聖人所以貴也夫羣下雖衆然士有志於國家之急者甚少其能處心積慮圖報於上又困於近名之說是則志士仁人終無以施為矣豈陛下之心哉此皆頃嵗大臣之罪也臣願陛下但顧其事否臧而亟行之勿以近名沽激求進為念則人得以盡其心矣四事臣聞議者云陛下頗主先入之説臣以陛下通照於事務得情偽理必無之萬一或有臣止可過慮而議不可聞之而不言也臣謂帝王行事但顧理道之如何爾固不計於先入後陳也必若主先入者以為是邪則姦罔之人逞其敏捷或巧中人或隂圖事唯恐居其後矣得不惑亂於耳目哉臣願陛下采納羣議之際但顧其事之是非裁之以當則先入之患息矣五事臣伏見近日以來科禁多有疑下之意如舉御史須薦二員上自㸃定仍有在京與外任之拘及見任二府曽舉奏之人亦不詳論至於中書樞宻院止許旬假見客并禁止百官巡㕔臺諫官不得私謁與刑法官接見雪罪叙勞之人等事皆非帝王推誠盡下之美政也以陛下至徳難名待物不間方將擬跡堯舜固非漢武雄猜多忌之比也斯盡不識大體之臣過防謬論上誤陛下臣恐書之史冊取譏萬古願陛下速革近制推大信於羣下以景祐初年之政為法則盡美矣六事臣伏見近嵗以來災異備至天象謫見地理傾震蟲蝗為患兼水旱災沴連綿三數年未已而河北最甚其次利州東京西河東路循環皆被灾患矣以陛下焦勞求理恐一物失其所持此寅畏寧不感召和氣格上天之福禄乎然而􅃱如此者盖大臣不能同寅協恭知無不為切救時弊而陛下志慮亦或有疑沮未能委任忠賢以成垂拱之美也方今萬姓飢饉諸路流離府庫空虛財力匱乏官有數倍之濫廪無二年之蓄兵官驕惰夷狄盛强即不幸繼以凶年加之外冦則何人可以倚仗而枝梧哉臣所以夙夜怵惕思進苦言兾開悟陛下而不能自已也臣願陛下切畱宸慮宻察今之執政誰能盡心敢救天下之弊敢當天下之責者果得其人願陛下主張而委任之其隂媢循黙持禄取容妬嫉賢能以一已為計者宜速罷免毋俾乆塞要路則化危為安變難為易如反掌矣陛下固不可失此時而不為儻失此時而不為禍變一發則雖欲為而不可為矣惟陛下深存念之七事臣見近嵗以來多有竄逐之臣或以無罪或因小過或為隂邪排陷或由權要憎疾吹毛求其疵㸃洗垢出其瘢痕罪􅅈實繁刑網太宻甚傷清議大鬱輿情昔匹婦含怨三年亢陽匹夫懐憤六月飛霜近嵗竄逐之人詎止匹夫匹婦之倫也得不逆和氣召災沴乎陛下固宜矜體而深惟之傳曰使功不如使過盖負責之人自分廢絶不能振起一旦為眀主棄瑕録用則其自奮圖報倍萬常人願陛下詔近嵗竄逐之臣有才行效實而本無過累洎坐累獲罪之輕者或加牽復或加寵擢如此則聖造覆盖同天之仁使排陷憎嫉之風不敢復為矣皇祐三年上時為天章閣待制知諫院上英宗國論要目十二事蔡襄眀禮二帝三王相因作禮樂以正民性革其非心使之寡罪而逺刑通萬世之法也秦任兵刑而棄禮樂漢魏至晉日用干戈禮典殘缺至於民俗盡矣唐興四方治定欲有所為制作雖具朝廷之禮時亦修舉而風教習尚各隨其俗五代禍亂日不遑暇專以刑治之宋興百五十餘年太祖太宗平天下皆以兵威助治真宗皇帝與契丹結好之後遂至無事朝廷禮文罔不修舉仁宗皇帝好生恤刑澤及禽獸然四方之俗未聞由禮尚專用法法者網羅過咎而施刑耳臣請以一二事言之冠婚䘮𦵏禮之大者冠禮今不復議婚禮無復有古之遺文而䘮𦵏之禮盡用釋氏獨三年日月則𩔖古矣臣請集大儒鴻博之士約古制而立今禮使百官萬民皆有等夷便而易行逺罪省刑之一途也擇官聖人能無為而治天下天下之事至衆也何以無為而能治之百官無不為也百官修職則萬務舉矣何以􅃱百官之職畢舉在擇官也擇官在於取士今之取士所謂制科者博學强記者也進士者能詩賦有文詞者也眀經者誦經文而對題義者也是三者得善官至宰輔皆由此也資䕃以恩不問能否下至軍職以戰功流外吏胥以嵗月三班所入鞭扑刑戮之人無所不至取士之法淆雜至此一旦使之入官小者治一務大者治兵民欲其各得其理猶驅車而水行也然行之已乆不可畢革當漸節所取之路又於歴任察其材能稍旌奨之庶㡬可勸其為人害者去之而已安民古之治世百姓各安其所士農工商各得其分量取其力以供公上上使之以時而民不倦是故百姓上以奉天子下以養父母蓄妻孥其力有餘故安其所也不妄作為故得其分也然而學者不原其本不考其實以謂民飢則哺之寒則衣之天下之衆雖堯舜不得濟也是有憂世之意而民愈不安也臣謂今之民至無禁也太平日乆民有智能者乗時趨利為農則兼并為商則髙下取天時人力之失者遂以富强奢靡冒法出於王公之上此古所謂亂俗之民可誅者也而法莫之禁雖有禁者亦莫之信民相趣效不知紀極不貪不巳此民妄為而不安其分者也天時水旱堯湯不能免之然而民有備故不害也今天下郡縣水旱争發倉廪以濟之又曰振貸以假於民隨而倚閣經赦除放謂之恤民其意善矣其䇿疎矣古之治世役民不過三日其不役者出三日之庸此百姓所以奉公上也今百姓有幸有不幸其居瀕河嵗以丁役過重此不幸也天下生齒脱漏亦有不輸一錢以助官者至於水旱流移又出倉廪以濟之賦入有程散施無極國何得而不貧國既貧矣民又不安其所豈所謂安民哉臣故謂學者不原其本不考其實者以此必曰安民禁姦豪均民力使民各得其分而安其所是謂安民正陵慢賈誼之說曰人主之尊如堂人臣如陛陛髙則堂髙矣盖人主之於天下其勢漸髙至於極尊民不可得而慢者由其羣臣等級之差漸而至也先皇帝仁愛如天包容萬物雖有觸冒譏斥者多亦矜恕至有侮慢朝廷自以為直臣以謂人主開受直言盖盛徳之事若肆譏斥而無人臣之禮此不可恕也天子可得而慢其下宰臣百官復何等級之差借如兩府大臣陛下所尊禮而優待之也日於漏舍或雪罪之人或求恩賞所求不得如意詆訐譏刺務以為能大臣難與較是非也但隠忍容之以為常事京師寮属能侵長官天下州軍佐官能拒長吏皆以材名之風俗如此所謂下陵上者也又有甚於此者士大夫之有怨憎黨以相朋造作謗毁或為歌詩傳於都下或移書啟於言事之門隂幽暗昧被毁之人無由辨眀甚者揺動公卿以希貨賂古之所謂清議公論豈如此耶此在可嫉者也陛下少畱聖聴因事正之易如反掌辨邪佞知人則哲帝堯猶以為難堯聖人也曷難於知人曰人之難知雖聖人必審謹也進説之臣萬端人主以要道得之附隨人主之意而不論理道之是非此佞臣也附託權要之勢因事自媒其身此邪臣也多引前事之美專為髙論不顧今世難行此迂闊之臣也多取衆人之譽捨違公道不為國家乆計此姦詐之臣也其言忠其事實此骾直之臣也無所附依進退自守此公正之臣也陛下進一忠直退一邪佞則天下莫不慕忠正而醜邪佞矣惟陛下博訪問則天下幸甚廢貪贓傳曰㢘吏民之表今夫食禄而治官材與不材出於天性不材者不可强之使材雖廢職可恕也至於慿恃官威因縁為姦求取贓賄以曲為直上負朝廷之用下為百姓之害是其心豈復有所畏哉古之聖眀之主所深患之也近年之俗以容貪贓為長者視其虐民害物若無有也何則凡贓吏皆狡惡之人雖欲發摘其過惡必須下獄然後置之於法既斷之後彼贓吏必須稱寃理雪朝廷必於近郡别令鞫勘當時一獄之人盡須追呼或經時月禁繫對詞百姓已不勝其苦矣若只依前案彼贓吏者必又再雪朝廷又須别推劾一獄之人又須追擾如此百姓何以當贓吏之辨而受此苦毒例皆引虛自認或經赦宥纔得免脱是以百姓被害不死不休贓吏雪贓不盡不已監司之官以是莫敢輕發貪贓之吏自以為得意嗟乎百姓何罪惟陛下憐之貪吏何人惟陛下察之又有不敢贓求自為營利者臣自少入仕於今三十年矣當時仕官之人粗有節行者皆以營利為恥雖有逐錐刀之資者莫不避人而為之猶知恥也今乃不然紆朱懐金專為商旅之業者有之興販禁物茶鹽香草之𩔖動以舟車懋遷往來日取富足夫貪人日富而居有田宅嵗時有豐厚之享而清㢘刻苦之士妻孥飢寒自非堅節之士莫不慕之貪人非獨不知羞恥而又自號才能世人耳目既熟不以為怪管子曰禮義㢘恥國之四維今風俗之壊是四維不舉伏惟陛下察貪贓者廢之清㢘者奬之則㢘恥興矣强兵今天下大患者在兵禁軍七十萬廂軍約五十萬積兵之多仰天子衣食五代而上至秦漢無有也祖宗以來無有也真宗與北庭通和以後近六十年河北禁軍至今十五萬陜西自元昊叛増兵最多至今十九萬天下諸路置兵不少臣約一嵗總計天下之入不過緡錢六千餘萬而養兵之費總五千萬是天下六分之物五分養兵一分給郊廟之奉國家之費國何得不窮民何得不困然今之兵不可暴減固當有術以消之又當有術以精練之其説至多難以遽言陛下敕兩府大臣博求其弊漸講其術以為長乆之䇿今之為政此第一事富國或曰何以富國今天下之廣四維萬里可謂大矣農田商賈茶鹽酒稅銀銅金鐡之𩔖莫不𣙜之可謂察矣籠天下之利至纎至悉宜乎府庫充牣不可勝計然後為得今則每有支費常遣使諸路僅能自給者此何故耶曰養兵一百二十萬自古無有也嵗入日少而嵗出益多或曰何謂也曰兵日益多官日益冗財物有限而支費無涯此所以貧也然則富國有術乎必先用意於兵然後可言富國之術臣故曰今之為政强兵為第一事富國為第二事或曰為政止於此乎曰非也自此而始去冗治天下者如治家凡民之家隨其富貧視其族属㡬何一嵗之費㡬何賓客之資公上之須復用㡬何度其家之所入然後量力而出之如是乃可以為家計也不如是其家無以自給則族属不得其安矣今治天下乃不如是宰相不知兵樞府不知財用三司使守藏也嵗了一嵗便為辦事不幸有邊境之急必取於民譬之家計是不度所入不量所出國不富實陛下未得髙枕而優游臣故謂兵冗為大其次又有官冗今且以轉官一事言之太祖太宗朝仕宦者或有功勞或有譽望則㧞任其人人莫不勸然以孤逺守常之人湮沈不遷者有之真宗設三年磨勘之法然後孤逺守常之人與夫權要圖進之士無異也日月既乆漸以成俗雖有長材異能出衆人者有小過累未可遷也但能飲食言語於人無忤者數日必遷此三年一遷之法今為大弊也祖宗時卿監郎中無數十人觀今班簿姓名可見也天下州軍三百餘處合入知州軍凡㡬何人局少員多每至差除待闕須一二年通判知縣之𩔖率如此真宗時選人磨勘有遷京官者有不遷者仁宗時但無過咎無不轉官官冗如此豈有不思變更之術也哉去冗百端此二者最大願陛下深宻之漸求消冗之説原賞古之所謂賞者有大功則賞之臨兵戎者前死有榮退生有辱雖小功必賞以其履死地也今之臣一切務賞何謂賞所謂酬奬者是也守土之臣刺史縣令招徠逃户磨勘税賦皆其職所當為也不修其職罪當罰也今有為之者必自陳而求賞不立賞格則不為也天子斂生民之財以禄之分職位以寵之借威權以使之可謂至矣而於常事動即求賞天子豈與羣臣為市道哉至於茶鹽酒稅之局物物皆有賞格下至吏人百姓莫不皆然此為政之弊也戰功必賞也捕賊之法必賞也功異於常者可賞也其餘無名酬奬可漸罷之以正官守之法也任材凡人之材各有所能不一等也一人之智兼治數局時有不能也有文詞之職有吏治之職有兵戎之職有財利之職夫有吏治之材使之臨兵戎之事則時有不能也有財利之術使之論朝廷之事則時有不能也今世用人大率以文詞進大臣文士也近侍之臣文士也錢穀之司文士也邊防大帥文士也天下轉運使文士也知州郡文士也雖有武臣盖僅有也故於文士觀其所長隨而任之使其所能則不能者止其術莫善於還詞令之職還於文士講説之職還於文學典禮之職還於博士兵戎之職還於武士吏文之職還於法吏金穀之職還於財利臣所謂還者與其能者不以一人之智兼責之也若夫宰輔大臣必兼衆能文學之士皆其出身忠義之節皆其素立故不論也不眀法令不可也不知軍旅之情不可也不知邊疆夷狄之數不可也不知金榖利病不可也不知禮典之舊不可也是故其人陛下知其難也得人則愛重之又於羣臣詢諮而擇之臣故謂任材者眀天子之事也正刑聖人可謂愛民矣可謂謹􅆿矣殺人者可殺矣疑或貸其生者州郡有一誤殺人者一獄所干官吏停廢竄逐無有貸者古先帝王謹刑不過是矣原其所因好生之徳及於下也重刑誠審矣而刑之輕者罰及無罪天下之官皆得施杖笞於其部通判職官於州之吏民皆可笞扑由是觀之民無全膚可謂濫刑矣天下州縣有長吏京師百司有長官有罪之人可歸於長吏長官則不敢妄刑也律有監臨主司不合行罰敕許執衣白直得施小杖臣竊謂天下州縣官司京師百司唯執衣白直令依敕科罰其餘公事各隨所属長吏長官行之一嵗計之可減妄刑千萬人矣臣願陛下眀敕法官議之理當如何若律敕可行則行之必重其罰則不敢違也治平元年上時為三司使宋名臣奏議巻一百四十八
