body:
  text: 宋名臣奏議巻五十一宋趙汝愚編百官門臺諌一上真宗乞以賞罰責諌臣舉職任隨臣聞立國之本在乎得士得士之要在乎見情故仲尼以謂人情者聖王之田治道所由生也是則時之否泰事之損益萬化所繫必因人情人莫智於聖人資聖人之徳者實由於良輔故漢書曰明主不惡切諌以博觀忠臣不避重誅以直諌諌也者蓋所以達下情而求治致君道於無窮故為臣有五諌之名前代有七人之列陛下祗嗣丕圖秉持金鑑可封之俗既阜盛矣無疆之化亦馴致矣尚聞焦勞庻政待旦以視朝厯覽羣書乙夜而忘寐乃下賢良之詔旁求亮直之臣惟稽古之聖心軼前代之令典雖求諌之路已見於洞達而掌諌之臣未聞乎舉職今諌議大夫司諌正言數員但充位尸禄而已是致堯皷之設寂寥而無聲杜觶縱陳謇諤而無効箱箧謾藏於陳紙搢紳競寢於正辭罕遵及霤之風莫覩引裾之直願陛下擇賢士黜具臣垂賞罰之文示懲勸之道其兩省諫官並准有唐故事定其員數優其奉給限以遷官之年月責以供職之否臧其或獻替推誠彌縫勵節言事有禆於時政抗章不避於天誅進思盡忠有犯無隱則請行甄擢以勵衆焉其或尸利無慙弼違有闕務引腹非之咎多致面從之諛不啟心而沃心㒺危言而危行降黜以勵衆焉夫如是則賢者勸惰者激庸者奮懦者立俾朝廷之士咸願竭忠而報國矣景徳三年三月上時直集賢院上覽而嘉之降詔戒諭諫臣曰國家設諫諍之官廣詢求之路蓋欲彌縫闕漏啟廸聦明而處職者姑務因循罕聞謇諤兹為尸禄曷副虚懐自今冝竭節箴規悉心獻替賞罰之典斷在必行上仁宗論當今所切在納諌劉隨臣聞諌臣之廢置驗其隆替言路之開塞繋乎安危何則君為元首也大臣股肱也諌臣耳目也有人廢耳目而得聰明者未之有也故書稱明目達聰以防壅蔽也是以古之天子必置諌臣七人成湯至聖有好問則裕之言漢祖至明有從諌如流之美臣聞以古為鑑可以知興亡不敢逺稽前典且以近代言之唐太宗何如主也十八起義師二十四定天下二十九即帝位鑑情偽之理明治亂之由聖文神武髙於三代然猶每與大臣㑹議政事必令諌官憲臣史官預聞之茍詔令不便大臣不直刑賞不當邪正未分則諫官得諍之憲臣得彈之史官得書之是以上下無壅而君臣同徳太平之風可謂至矣及髙宗御圗永徽已後忠良獲罪姦邪恣行諌諍之風於時掃地中睿之世固不足云以至動干戈於禁掖危社稷於綴旒明皇纉承盡革前弊虚心納諌朝聞夕行開元之間可謂至治太平既久漸踈逆耳之言姦臣用事無復苦口之藥聽林甫之佞而卒相仙客不察子諒之忠致禄山之亂而越在草莽方憶九齡之語故曰諌臣之廢置驗其隆替言路之開塞繋乎安危厥後五代相仍亂離滋甚太祖皇帝乗時啟運拯救生靈太宗皇帝文徳懐柔混一區夏真宗皇帝紹二聖之丕祚得萬國之歡心夷夏大同草木咸若而猶廣開言路躬自采納縱有觸忤無不優容悲弓劒之上僊𫝊龜鼎於繼聖而賊臣丁謂包藏私志辜負國恩謂天髙而可欺謂地厚而可罔觀其用意鬼瞰何逃當先朝不豫之始使諫官絶班於冡宰擅權之時致無人論奏皇天睠命聖人道存特出宸𠂻逐其元惡正人之用天下咸寧所謂任賢勿貳去邪勿疑者也乃詢逺御之策將建不㧞之基雖股肱宣力致六合以為家而耳目未布慮一物之失所爰稽前事復致諫官臣最處庸愚獲預掄選凡闗理體敢不盡心唐志云左右拾遺掌供奉諷議今之正言則拾遺也品秩雖卑責任甚重禮曰有犯無隐𫝊曰知無不為是以王者有過則犯顔而進諌大臣有罪則直指而不忌其或賞不以功罰不以罪詔令不便興作無時或除拜之間不以才進或公忠之士濫被中傷或流放之人天下未知其罪或進用之者天下未見其能凡闗損益合具奏陳誘之以厚利而不動臨之以白刃而不懼此諫臣之職也然諫臣未必盡賢言事未必盡善用捨之際在聖君裁之而巳臣又聞天下之治亂由時政之公私也至公則天下合而治至私則天下離而亂且夫至公則正正則綱條舉綱條舉則公卿大夫各當其任而州郡承風夷狄嚮化矣使天下之勢如身臂之使指欲其不治其可得乎且夫至私則濫濫則綱條不舉綱條不舉則公卿大夫不當其任而郡縣失守夷狄不信矣使天下之勢如理絲而棼之欲其不亂其可得乎至公者何用正人也其徒常少而易為揺動至私者何用姦人也其徒常多而動相交結自古姦佞似忠亦不好亂其道乖殊所以召亂也用捨之際豈容易哉臣又聞國之大患在於不得聞諫且王者操生殺之柄有雷霆之威虚心延納猶恐失之其或拒之孰敢抵罪是大臣顧位而不肯言小臣畏罪而不敢言上下偷安茍容竊位自古危亡常由此也且王者有甚愛之事有甚愛之人將行之將用之而物議未允必屈已而寢之有甚惡之事有甚惡之人將廢之將罪之而物議未允必屈巳而寢之此致治之本也若以甚愛不顧物議而行之大臣唯唯而不言小臣黙黙而不論則物議喧騰天下疑懼紀綱漸壊乃危亡之道故曰國之大患在於不得聞諫是以國家舉一事發一令必自股肱大臣僉謀協同而後行之萬一不可則諌臣諍之於前御史糾之於後欲其敗事其可得乎今皇太后陛下聖智髙逺以至公治天下皇帝陛下聰明睿哲以至徳臨域中左右前後無非正人蠻夷戎狄無不率化綱條整肅天下乂安可謂治矣然治不忘亂安不忘危盖亂必生於治危必生於安既治且安而制之以公危亂之勢不得生矣唐憲宗嘗問侍臣時之所切侍臣對以納諫為切憲宗行之大復土宇臣亦謂之所切在於納諌其餘守常安靜而巳臣受命以來思有所補雖名侍從之列其實疎逺之官夫以疎逺之官當諌諍之職進難言之事有觸鱗之虞孔子曰未信則以為謗巳也今諌臣既置矣言路既開矣伏望思安危之大計念疎逺之難言使臣子得盡忠義之心九重得聞小大之事則天下幸甚天聖元年八月上時為右正言上仁宗乞顧問諫官劉隨臣伏念景徳天禧之間九域晏清四夷欵附生物咸遂祥瑞荐臻而猶下賢能之詔求諫諍之官豈不以萬機至繁慮措置之或爽八紘至廣非耳目之獨知是以雖居安而慮危思長轡以逺馭也其後唯得魯宗道劉􅂱二人充職精擇之難一至於此洎皇太后陛下受顧託之重皇帝陛下自臨御巳來萬國歡心百官承式而乃憂勤庶政修舉舊章復置諌官委以言事臣最為愚懦亦預揀求方竭駑鈆少伸補報旋因公累出領外官三年替還復命供職誓堅勤藎㒺避誅夷夫以品位甚卑責任甚重道君親之過失指權勢之非違冒雷霆之威掇姦邪之怒在於小臣固當難事若非恕其狂妄俾盡誠懐鉗口保身或孤任使臣欲詳觀先帝之詔上報兩宫之恩凡有侵紊朝綱干竊政柄姦憸冒寵賢俊乆沈憲網渉寃賞典過制蠹政之類知而必言言之中否唯聖人擇之而巳念臣塵諫職内外三年除朝請之外未嘗一登金殿略近天顔雖名侍從之官今為疎逺之跡唐初置拾遺補闕掌侍從諷諫日親旒冕凡事得以盡言盖是唐末巳後權臣阻絶雖不預於晏遊亦専司於諫諍洎太宗皇帝改為正言司諌精擇流品號為清華既為耳目之官宜審詢訪之端式期顧問願竭愚誠故不敢朋附班聮䝉昧日月有違詔㫖自速靈誅天聖三年上時為右正言上仁宗繳進天禧詔書乞防漏洩劉隨天禧元年二月七日詔敕中書門下朕大庇蒸民隆興至治彌綸闕政交属於庻僚寤寐忠規屢頒於明詔雖増虚佇未協翹思夫諫諍之臣本期述嘉謨而矯枉風憲之任亦當遵直指而繩愆既列清班宜傾亮節儻緘黙而自肆諒考績而曷觀况朕躬覽萬機親披封奏詳言百執素靡漏言舉職徇公有何所避保身鉗口詎至於斯将戒慢官先伸誕告仍加優異以勸傾輸自今兩省置諌官六員御史臺除中丞知雜推直外置侍御史已下六員並不兼領職務每月各賜添支錢十五貫三年内不得差出其或詔令不允官曹渉私措置失宜刑賞踰制征求無節寃濫未伸並仰諫官奏論憲臣彈舉每月須一員奏事或更有切務即許不依次入對雖言有過當必示曲全若事難顯行即令留内但不得潜為朋附故作中傷其諫官仍於諫院或兩省内選擇内事量置什器并令兩省輪差守闕三數人祗應候及三年或屢有章疏實能禆益特越常例别與升遷或職業無聞公言罔覩移授散秩仍遣監臨載念古賢不忘忠諌雖逢暴怒尚靡謟辭今則冲人渇聞讜論開懐而待好爵斯縻是為不諱之朝豈有犯顔之慮黜陟之典斷在於必行語黙之端亟從於自擇更資宰府宣布周行故茲詔示想宜知悉臣聞好問則裕成湯所以為聰明從諫如流漢祖於焉成帝業厯代聖主必有諫臣然念言之甚難聽之不易以疎逺而指貴近以至賤而干至尊言之得無難乎在難言而言之身常危以至賤疎逺之人貢訐直逆耳之説聽之豈云易也在難聽而聽之意必倦且直者邪佞所惡自然之理也撃一邪則羣邪怒其身不得不危罪一正則羣邪進王者不得不謹是以先帝焦勞寤寐思得正人至於再三未獲讜直遂下此詔増置一十二員月責諌疏明達耳目自後纔得四人諌官二人魯宗道劉􅂱御史二人劉平章穎其孜孜獻替者唯聞宗道而巳太后臨朝皇帝御極追繼先志復置諌官又得四員以充其位諌官二人臣及孔道輔御史二人曹修古王碩其間道輔頴秀已在清途修古稱職亦為外任王碩以他事黜免㣲臣近歸諌省補報無狀出入八年復思先帝詔㫖云况朕親披封奏素靡漏言此乃聖人極慮臣僚疑有漏洩而不敢盡言也周易云君不宻則失臣臣不宻則失身機事不宻則害成正謂此也天聖五年臣嘗言某等事舉朝官員誦其言語羣邪側目増惡結讎甚可畏也若非兩宫聖明深辨忠直則臣已竄逐遐方矣自古姦臣皆以貨賂厚結左右及宫掖之内是以動靜先知迎合上意李林甫二十年専政明皇不疑上官昭容權傾天下唐祚顛殞前代似此盖亦多矣國家傾敗常由此矣自兩宫御宇樂聞讜言然垂簾之日疑有潜聼封奏之人憂其漏洩是以人人懼禍而不敢盡言今則文武班列亦有議其得失諫官御史朝野譏其循黙伏乞聖慈念先帝漏言之誡思周易失臣之文凡有奏章藏收祕宻垂簾之日屏去左右則公忠之士得以盡言用廣聰明天下幸甚謹録先帝詔書頭連進納以聞天聖八年上時為右司諫上仁宗乞行諫臣之言孫沔臣竊以諫諍之臣畏避是耻知無不言始為稱職大則庭議小則上封不顧忌諱以廣聰明有唐則名列中省班隨宰臣庶於萬機之際或伸一得之慮今給事不専封駮舍人惟行詔誥至於遺補分為虚秩政事不得聞乘輿不得從其或命令出入無以究論訪問隂求頗同姦伺得自𫝊聞十無二三再窮端實已復後時先事則有輕發之機遂事則曰已行之命徒盡貢於封章實委煩於省覽濶略之務或見頒行要切體宜罕聞報可是使臣僚之内但作疵瑕政教之中莫資補益臣自叨承乏已及五旬雖少陳於淺識終莫副於虚懐稍形詆刺遂復遲留至㣲尚有所難設若論朋黨於中外撃姦邪於左右議公卿之非據指宦寺之作威則將何如哉臣若循黙自容是辜君賜臣若忤觸受戾又貽親憂方寸交戰啓處不惶俛首懐慙趨走朝末所以知守道之難而為義不易也伏望陛下明發無私斷在不疑凡言有利於國有補於時在陛下思而必行之况今政綱未甚舉邊方未甚寧災變未甚息人民未甚康尚仍舊貫一切示暇此非臣所能知也若陛下擇善執中雷動風行則事有大於此者將以助一日二日之機矣臣本非愽古妄進狂言上犯威顔甘俟竄逐康定元年七月上時為右正言上仁宗論諌官好名好進彰君過三説蔡襄臣伏見朝廷選用王素余靖歐陽修等増備諌官是三人者皆特立之士昔以直言觸忤權臣擯斥且乆今者一日並命人無賢愚萬口相慶皆謂陛下特發神斷擢任不疑盖陛下深憂政教未當責罰未明羣臣之邪正未分四方之利害未究故増耳目之官以廣言路此陛下為社稷生靈大計也臣竊思任諫非難唯聼諫為難聼諌非難唯用諫為難如素靖脩等忠讜剛氣著信於人况䝉陛下奬㧞之知必能箴闕政獻明謨擿回邪擊權倖思所以報効也羣邪惡之必有禦之之説不過曰某人也好名也好進也彰君過也或進此説正是邪人欲蔽天聰不可不察臣請為陛下陳之一曰好名夫忠臣務盡其心豈顧名哉若避好名之毁而無所陳則土木其人皆可備數何煩陛下選揀如此之至况名者聖人以之勵世俗分善惡豈可廢乎借使為善近名陛下試思今之人逺權利敦潔行以近名者亦有幾人哉二曰好進前古諌臣之難者遭遇昏世上犯嚴威旁觸勢要鼎鑊居側斧鑕在前死且不辭安得好進乎盖近來諫官進用太速故世人得以謂之好進今諫官有盡忠補闕之效陛下但乆而勿遷使其人果忠且義雖死於是官萬無恨矣三曰彰君過凡諌諍之官盖以司乎過舉也緩則宻諫急則過言期於必正若人主從而行之適以章乎從諫之美安得謂之彰君過乎然諫官亦有好名好進彰君過者異於此巧者之為諌臣事之難言者則喑而不言擇其無所忤者言之就令不行不復再議退而曰某事我嘗言之矣此可謂之好名也黙黙無所耻媿踐厯資序以登貴仕此可謂之好進也凡人主有過諌官最為近宻或不盡言人主何從而知且變更乎𫝊之當世垂之於後終以為過此可謂彰君過也臣向之所論乃忠臣巧者之分願賜省鑒今陛下出於聖慮自擢諌官必自主之若有陳述於理適當即賜施行無使天下之人謂朝廷有好諫之名而無好諫之實使其言語切亦願優假無為姦邪計間致有斥逐使天下之人指朝廷之失也臣迹逺言近不任兢惶激切之至慶歴三年三月上時為舘閣校正上仁宗乞令中丞舉屬官寛其資限蔡襄臣聞人主擇宰輔宰輔擇長官長官擇僚佐此至治之要至簡之術也周命太僕則曰謹簡乃僚漢之公府令自辟召唐陸贄論之詳矣又髙元祐為御史中丞上言御史紀綱之地官屬選用宜得實才其不稱者臣請黜之監察御史杜宣猷李瓌等並出為府縣之職此皆前世専任長官之明驗也國朝諸司省監悉非本官唯御史臺職不殊古制方今臺中條制如臺官不稱職者亦許糾舉近年臺官宰輔避嫌例不中除多令兩制參舉又限資考苛細多不得人盖由不寛資限不責長官之弊也近見御史中丞王拱辰奏舉楊紘等充臺官朝廷循執舊規下兩制參舉臣謂朝廷既任拱辰為中丞若實非才則當别擇才者而任之若才堪其任則所為属官可悉委之未為過也况拱辰於官属請去不才者是盡心於朝廷不避衆怨也今御史席平巳出知潤州若參舉之人又得軟懦傾險之士則何以處之臣故謂莫若專任長官寛其資限則責有所歸也臣乞御史臺官属只下御史中丞薦舉寛其資限之格資深者為御史官卑者為裏行若能稱職亦是官守之常不必過其升陟或不稱職可并舉者坐之在朝廷有責任之方風憲有得人之美慶歴三年三月上上仁宗乞諫官綴兩省班次田况臣聞有唐兩省自諫議大夫至拾遺補闕共二十人毎宰相奏事諫官隨而入有所闕失即時規正其實皆中書門下之属官也今諫議大夫無復職業自司諫正言知諫院皆違補之任而朝廷責其言如大夫之職矣而地勢不親位序不正在朝廷間與衆人同進退非所以表顯而異其分也今筦庫冗散之吏尚赴内朝豈諫諍之臣不得日奉朝請臣前任諫院每聞一事皆諸處采問比及論列或至後時今若令諫官得奉内朝之事兼王素歐陽修蔡襄皆以他官知諫院居兩省之職而不得預其列於體未便欲乞今後並令綴兩省班次所貴名體相稱副陛下選求之意慶歴三年八月上時知制誥上仁宗乞令中丞舉臺官或特選舉主歐陽修臣伏見御史臺闕近制令兩省并中丞輪次舉人遂致所舉多非其才罕能稱職如昨來蘇紳舉馬端却煩朝廷别有行遣臣謂今兩制之中姦邪者未能盡去若不更近制則輪次所及須令舉人近聞梁適舉王礪燕度充臺官其人以適在姦邪之目各懐愧醜懼其汚染風聞皆欲不就以此言之舉官當先擇舉主臣欲乞今後只令中丞舉人或特選舉主仍見官班中雖有好人多以資考未及遂致所舉非人者皆為且就資例可入仍先不限資考惟擇才堪者為之况臺中自有裏行之職以待資淺之人仍乞重定舉官之法有不稱職連坐舉主重為約束以防偽濫庶幾稱職可振綱紀慶歴二年五月上時知諫院上仁宗論臺諫論列貴在事初歐陽修臣竊聞近日為軍賊王倫事江淮州軍頻有奏報朝廷不欲人知召進奏官於樞宻院責狀不令漏洩㫖揮甚嚴不知此出於聖㫖或只是兩府大臣意欲如此以臣料之為近日言賊事者多朝廷欲人不知以塞言路耳臣謂方今多事之際雖有獨見之明尚須採善謀以求衆助豈可聾瞽羣聽杜塞人口况朝廷處事未必盡能合宜臣下獻忠未必全無可採至如王倫驅殺士民攻刼州縣江淮之上千里驚騷事巳若斯何由掩盖當今列辟之士極有憂國之人欲為人主獻言常患聞事不的况臺諫之官尤是本職凡有論列貴在事初善則開端惡則杜漸言於未發庶易囘改今事無大小常患後時或號令巳行或事迹巳布縱容論救多不能及若更祕宻不使聞知則言事之臣何由獻説今欲乞㫖揮進奏院凡事有非實封者不須祕宻臣因此更有起請事件畫一如後一竊見御史臺見有進奏官逐日専供報狀欲乞依御史臺例選差進奏官一人凡有外方奏事及朝廷詔令改除並當日内報諌院一竊見唐制諫臣為供奉之官常在天子仗内朝廷宻議皆得聞之今雖未能恢復舊例欲乞凡遇朝廷有大處置四方奏報事非常程及諌官風聞事未得實者並許詣兩府請問庶知審覆得以論列右件二事如允臣所請乞降指揮施行慶歴二年八月上上仁宗論臺官言事有㫖詰責胡宿臣聞聖主恱至言好崇諫所以廣治道防一切之未然也臣以螻蟻竊觀陛下特稟上聖之徳能聽大度之言數賞諫臣以擢臺職推誠含垢蓋盡君人之量堯舜之用心也近日聞臺官言事事涉後宫之親出於風聞有㫖詰責臣愚以謂諫官御史朝廷紀綱所寄雖有過繆可且優容昔漢文賢主也袁盎直臣也帝所親慎夫人盎常諫諍言渉不遜初雖怒之終不犯罪後慎夫人聞之復賜盎金五百金慎夫人所以能保榮寵者以能賞袁盎之直言也漢元帝時馮野王昭儀之兄也徳行髙妙推為第一時御史大夫缺公卿多薦野王為之帝曰吾若用野王為之天下必以為私後宫之親者徳宗謂李絳比諫官論奏不實欲黜其尤絳曰此非陛下意必憸人以此熒誤上心自古納諫昌拒諫亡君尊如天臣卑如地干不測之禍雖開納奬勵尚恐不至直士杜口非社稷之福也臣願陛下鑒觀前史開納至言臣不勝區區之情皇祐三年上時知制誥上仁宗乞闊略唐介之罪劉敞臣伏聞陛下以殿中侍御史裏行唐介言事狂妄責授春州别駕尋又聞陛下以春州險逺障癘之地憐其孤危將不生全改授英州此誠陛下聖徳厚恩容忍臣子萬萬無窮也臣竊觀詩書所載帝王之君徳莫盛於知過仁莫大於好生名莫榮於聽諫陛下皆踐之且唐介居下訕上至䧟於戻而陛下察其本心以忠信為之故曰知過既責介身投之逺方而復憂其不全故曰好生當介初得罪之時中外震動以言為戒及聞徙還英州人人懽忻知陛下無意殺之忠義者更思竭盡故曰聽諫臣不勝幸甚臣聞伊尹戒商王曰有言逆于汝心必求諸道有言遜于汝志必求諸非道此商所以保乂四海格于皇天者也臣所謂介之所言雖逆耳求之於道亦當有合者陛下幸寛不誅矣若復闊略其罪優游其身使得省過追咎復齒朝列於以開廣言路勸來者則盛徳無疆髙視上古臣不勝犬馬之心皇祐三年十月上時直集賢院上仁宗乞簿上臺諫章奏范鎮臣伏見先朝以御寳印歴紙給言事官令以時奏上所以課得失而殿最之也恭以陛下天資寛仁喜聞諫諍考於施用其實無幾深恐大臣不甚將明所以言者多見廢格臣欲乞據今御史諫官見員於禁中及中書樞密院人置一簿毎一章奏即簿上之在禁中者陛下時時觀覽以備遺忘以觀言者得失有可施行即敕大臣施行其在中書樞密院者亦令大臣為詳閱其巳行未行勾注毎季終録付史館庶使後世知陛下納諫求治之意仍令言者不敢妄有奏論至和三年八月上時知諫院上仁宗論宰相逐諫官乞與辨明馬遵臣聞御史中丞張昇累上殿論列為趙抃等昨乞外任奏章雖入朝㫖未從及宰相劉沆獨入文字指言抃等朋黨及罪惡條件因此除出則是成命雖自朝廷本意實由宰相所以外議喧嘩皆謂宰相逐諫官非厚誣也竊觀自古帝王皆以聽忠為賢拒諫為醜今頻年出臺官非朝廷美政損陛下聖徳若因張昇論列特與辨明四方聞之皆知臺官之出非陛下本意正朝廷之體全陛下之名在此一舉臣以當職須合力言為朝廷惜體為陛下惜名非特為諸臣而發之也臣無任區區納忠之至嘉祐元年十月上時為右司諫知諫院上仁宗論宰相逐諌官乞與辨明馬遵臣聞御史中丞張昇累上殿言宰相獨入文字除出臺官趙抃等不當若謂抃等素非善人不當除為臺官既為臺官而後有過亦當即時屏黜不可乆令在朝俟其求出而後言之即當行降責以正典刑不宜尚帯舊官猶専民政如其無過豈敢以空言止除小郡本末而言皆為未允若謂奉行條貫當出則中書條貫甚多未必盡能執守只如宣徽使明有定制不得過兩員今除四員矣如此之類不可條陳未聞别入文字特有條陳以此而言乃是意欲舉行即引為詞耳宜張昇再三辨明而不能巳也自來臺官多不為人所喜而權臣尤甚非權臣天性惡之勢使之然也若非聖君主張盡令權臣處置則諫垣憲省之中求過避禍之不暇豈復能為朝廷計哉陛下聖明必照此事伏乞英斷特賜指揮嘉定元年十月上宋名臣奏議巻五十一
