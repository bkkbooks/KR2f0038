body:
  text: 宋名臣奏議巻二十七宋趙汝愚編帝系門皇后上上英宗乞不汎於諸臣家為潁王擇妃韓維臣累日以來傳聞禁中汎至諸臣之家為潁王擇妃審如此者臣竊以為非便臣聞夫婦者居室之大倫將以正家則承宗祀以繼萬世之嗣故禮之用惟婚姻為兢兢兢兢者謹之至也坊記曰諸侯不下漁色故君子逺色以為民紀此言諸侯不得自於其國網取容色若捕漁然所以推逺女色為民之紀法也伏以皇子潁王孝友聦明動履法度方嚮經學以觀成德今卜族授室其繫尤重臣愚以為宜厯選勲望之家謹擇淑哲之媛考古納采問名之義以禮成之不宜茍取華色而已近世簡棄禮教不以為務婚娶之法自朝廷以達民庶蕩然無制故風俗流靡犯禮者衆賢士大夫未嘗不發憤歎息竊幸國家有以振之今陛下始初清明為元子求婦而姑出茍簡殆非所以矯世勵俗反之雅正且無以示潁王使知室家之道在德而不在色也傳稱尤物足以移人詩詠淑女幾以配上此誠智士仁人見㣲知終逺覽禍福之原為世戒也陛下不可不加聖意焉治平元年上時為諸王府記室參軍直集賢院治平三年三月始納故相向敏中孫女為皇子潁王婦即欽聖憲肅皇后也上英宗乞下太常禮院修撰潁王聘納儀範邵元臣伏覩皇子潁王天資卓茂婚婣及期方陛下即政之初而元嗣克家之日推之於禮莫重於斯臣等伏見國朝親王聘納雖開寳通禮具存舊儀而因循未嘗施行至有敲門羊酒鎮櫃錢銀乃里巷之常談盖搢紳之不道行於聖旦竊所未安欲乞降聖㫖下太常禮院博約舊典修撰潁王聘納儀範其故事非禮者一切罷之治平三年二月上時為潁王府翊善疏奏詔令禮院詳定聞奏禮院奏開寳通禮親王納妃有納采問名納吉納成請期親迎同牢之禮國朝所未嘗用今檢到國朝㑹要皇親婚禮物數請如㑹要故事從之上宣仁皇后乞蚤擇后而素教之彭汝礪臣竊以古者能治其國非獨修諸已者備也内亦有助焉后妃夫人能輔佐君子非獨天性然也教亦有素焉后妃人君之配也天下國家安危治亂宗廟社稷之禍福子孫之賢不肖是繫豈特其身哉此可謂甚重以天下之責以聖人之事望于一未笄之女子此可謂甚難然則擇之可不謹乎擇之必知所以教之自寒而暑非一日之積也則教之所以成物亦必有漸矣禮女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆菹醢禮相助奠詩曰后妃在父母家則志在於女功之事恭儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以婦道也古之人其教之也素故其成也至詩曰誰其尸之有齊季女祭祀婦事齊欽母道自其幼時婦事母道非其教之素曷能與於此周南之治盛以其志為巻耳其効為桃夭其化為兎罝其德為漢廣觀原反本固有所在臣以謂皇帝陛下春秋富盛宜蚤擇淑德之女以定后妃之位以明天下之教以正天下之本以對天之丕顯休命立師傅保姆嚴宫室車服制度環佩之節陳圖史之戒非正之聲音顔色使不得亂其視聽非正之玩好使不得至其前及其歸也凡所欲皆其所嘗聞之者也凡所享皆其所嘗安之者也凡所惡皆其所戒焉者也此可謂善矣以陛下之神明博大得賢妃之助其治天下國家何有詩曰天監在下有命既集文王初載天作之合文王嘉止大邦有子天立厥配受命既固周既受命至配立而後言固則人主所以待内助如此然則擇之豈可不謹教之豈可不早夫教之非豫也使得其人幸而已矣幸非可以為法也茍非其人禍莫甚焉凡臣之言稱其辭則小稽其事則緩察其㣲則甚切惟太皇太后陛下留意毋忽元祐四年五月上時為中書舍人上宣仁皇后論納后宜先知者四事范祖禹臣伏奉詔㫖皇帝納后六禮令翰林學士御史中丞兩省給舍與禮部太常寺官同共詳議臣竊伏思此乃國家大事萬世之福祚所繫風化所先自古聖王重之今陛下宜先知者有四不可不謹也臣謹稽之上古參之後世為陛下悉數而詳言之一曰族姓二曰女德三曰隆禮四曰博議所謂族姓者臣聞古之帝王所與為婚姻者必大國諸侯先聖王之後勲賢之裔不然則甥舅之國也不以㣲賤上敵至尊故其福祚盛大子孫蕃昌昔黄帝娶於西陵之女是為嫘祖為黄帝正妃其子孫皆有天下五帝三王皆黄帝之後也髙辛娶陳豐氏之女是生帝堯虞舜娶帝堯之二女釐降于媯汭遂有天下大禹娶於塗山是生夏啓天下歸之子孫享國四百七十餘年成湯娶于有莘氏子孫有天下六百餘年周之先祖后稷生於姜嫄世有賢妃太王娶太姜是生王季王季娶太任是生文王文王娶太姒其禮尤盛大雅歌之曰文王初載天作之合言文王之初有識天已生賢女為之配也又曰大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光自古婚禮未有如文王之盛也太姜炎帝之後也太任太昊之後也太姒大禹之後也太姒生十子武王周公皆聖人也其餘皆為顯諸侯周之子孫徧於天下太姒之德也詩人美文王之聖本由太任其詩曰思齊太任文王之母思媚周姜京室之婦太姒嗣徽音則百斯男又曰刑于寡妻至于兄弟以御于家邦言文王之化自家及國以正天下也周南關雎后妃之德人倫之始風化天下皆美太任太姒也武王亦娶于姜是生成王周有天下三十餘世八百餘年其基本盖由此也故族姓不可不貴所謂女德者臣聞禮本夫婦詩始后妃治亂因之興亡繫焉三代之興皆有賢妃其亡也皆有孽女夏之興也以塗山其亡也以妹喜商之興也以有娀其亡也以妲已周之興也以姜嫄其亡也以褒姒此皆聖賢所紀詩書所載垂之後世以為永鑒者也秦漢以後婚姻多不正無足取法惟後漢顯宗明德馬后唐太宗文德長孫后憲宗懿安郭后皆有后德出於勲賢之家其餘敗亂足以為戒而已恭惟本朝太祖皇帝以來家道正而人倫明厯世皆有聖后内德之助自三代以來未有如本朝家法也皇帝聖德明茂睿質純粹天監在下必生聖女以佑皇家惟陛下逺觀上古近鑒後世上思天地宗廟之奉下為萬世子孫之計選卜窈窕以母儀萬國表正六宫非有德孰可以當之然閨門之德不可著見必視其世族觀其祖考察其家風叅以庶事亦可知也昔漢之初大臣議欲立髙帝子齊王皆曰王母家駟鈞惡戾虎而冠者也代王母家薄氏君子長者乃立代王是為文帝文帝為漢之賢王亦由其母家仁善也故女德不可不先所謂隆禮者臣聞天子之與后猶天之與地日之與月陰之與陽相須而後成者也禮曰天子聽男教后聽女順天子理陽道后治陰德教順成俗内外和順國家理治此之謂盛德又曰天子修男教父道也后修女順母道也孔子對魯哀公曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也是故君子興敬為親舎敬是遺親也弗愛不親弗敬不正愛與敬其政之本與哀公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎又曰天地不合萬物不生大昏萬世之嗣也君何謂已重焉盖深非之也孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與禮又曰元冕齊戒鬼神陰陽也將以為社稷主為先祖後而可以不致敬乎又曰敬而親之先王之所以得天下也今臣與衆官討論講議皆約先王之禮叅酌其宜不為過隆願陛下勿以為疑進言者必曰天子至尊無敵於天下不當行夫婦之禮而荀卿有言天子無妻告人無匹也如此則是周公之典孔子之言皆不可信而荀卿之言可信也臣謹按禮冠昏唯有士禮而無天子諸侯之禮故三代以來唯以士禮推而上之為天子諸侯之禮盖以成人之與夫婦自天子至於士則一也臣竊聞親王宗室之間娶妻殊無齊體之禮敬而親之之義天下豈有獨尊而無配偶者哉至於鄙慝之禮或雜戎蠻之俗或習委巷之風下自士族上流宫禁有渉於此者願陛下一切屏絶之以正基本以先天下故禮不可不隆所謂博議者臣聞古者天子聘后上公逆之諸侯主之故春秋書祭公來遂逆王后于紀夫國有大事大臣不容不預聞也昔慈聖光獻之立也吕夷簡定其議故其詔曰覽上宰之敷言其冊曰宗公鼎臣誦言于朝先是茶商陳氏女亦預選擇王曽宋綬皆以為言大臣繼有言者遂罷陳氏仁宗所以為聖者能從衆也進言者必曰此陛下家事非外人所預自古誤人主者多由此言也天子以四海為家中外之事孰非陛下家事大臣無不可預之事亦無不當預之人且陛下用一執政進一近臣必欲協天下人望况立皇后以母天下乎臣恐陛下一日降詔云立某氏為皇后則大臣雖有所見亦難乎議論矣今陛下之所選擇莫若出其姓氏宣問大臣若聖志旣定而衆議僉同則卜筮協從鬼神其依天人之意無不同矣故議不可不博臣幸備勸講其職在以帝王之事禆益聖徳故敢獻其所聞臣之愚誠惟中宫正位之後四海之内室家相慶則宗社之福也狂瞽之言惟陛下留聽元祐五年十一月上時為給事中兼侍講上宣仁皇后論立后當采用德閥不當勘選吕希純臣竊以天子之與后猶日之與月陰之與陽相須而後成是以自古聖主有婚姻之始皆博訪令族參求有德然後昭告宗廟成以昏禮其敬謹重正如此詩人推原周家受命之本上陳姜嫄周姜太任太姒之賢皆聖賢之後大邦之子其盛德不回其徽音可繼故輔其君子世世修德昭受天命厯年長久未聞以聘納之際參以陰陽數術者也三代禮文雖不盡見然禮記及周禮儀禮述大昏之義列媒妁之職載六禮之儀稍為詳備畧無男女年命勘婚文以至漢唐而下史策所載亦無此制本朝制司天之官雖有婚書然自祖宗以來毎建中壼皆采用德閥不專以勘選為事且宣祖皇帝方在側㣲天作之合固未嘗集太史而議年命也然而昭憲太后實生太祖太宗為萬世福是豈勘婚之力哉其婚書詞義鄙淺及日官元不自信臣所慮者自降選后指揮已是逾歲誕聖年月其誰不知除日前供到家狀猶或可信外若今日以後更令餘家供析安知不改易女命以求附會雖盡合書法豈復可慿則恐論議遲遲徒為過謹曠日持久無益而已皇帝於后妃之議方當謙抑不言太皇太后推慈愛之念固欲盡衆美以副宸心然則股肱大臣亦宜以身任其責况即今公卿士大夫之家例不勘婚人雖有貴賤之殊其於親愛盖亦同爾乃敢斷然不用者豈非以勘合年命為難信畧去拘忌為安便邪為人臣者固當推巳之所安以事君上不可如卜祝之論姑以逃責而已故臣敢因緣職事輒貢瞽言伏惟聖慈少賜裁擇元祐六年上時為太常丞上哲宗論納后儀制范祖禹准中書錄黄三省樞宻院奏臣寮議到納后六禮文字令同共看詳擬定逐項合行儀制五禮命使今欲以都亭驛權為皇后行第發冊命使其日皇帝服通天冠絳紗袍御文徳殿命使奉迎皇帝臨軒與冊禮使副同日遣皇后入内皇帝服通天冠絳紗袍御福寧殿臣竊以都亭驛常為遼使館舍今納皇后以母天下而先居之於逺人之館恐非所以觀示四方為正始之道也臣愚欲乞詳酌以舊尚書省權為行第又臨軒發䇿命使奉迎及皇后入内皇帝皆服通天冠絳紗袍臣謹案古昏禮用冕服無他服之文通天冠絳紗袍本以代古皮弁之服唐開元禮國朝開寳通禮亦皆服衮冕發冊與奉迎同日將以為天地宗廟社稷之主繼先聖之後其可以不致隆乎伏請皇帝臨軒發冊命使奉迎及皇后入内並服衮冕以重大昏之禮伏望聖慈更下三省樞宻院參酌庶於國體為便合於先王經禮之意所有錄黃未敢行下謹具封還伏候勑㫖貼黃議者或謂昨來發太皇太后冊寳止服通天冠絳紗袍今納皇后服冕有踰尊之嫌臣謹案冕服祭服也弁服齊服也故南郊致齊服通天冠絳紗袍祭之日乃服衮冕冕服所以交神非所以事親也昏禮將以為天地宗廟社稷之主有鬼神陰陽之義故服祭服與事親之禮不同即無踰尊之嫌臣與鄧伯溫等議狀已備論之今服通天冠絳紗袍於禮無所據臣竊惜聖朝講明一代大典而於先王之禮無據則未足為法也伏乞更賜詳酌元祐六年八月上時為給事中兼侍講上哲宗進家人卦解義范祖禹臣近以權住經筵久不進講陛下今月一日已御邇英又先降聖㫖過端午不住講讀此見陛下好學之至也而臣自五月以後比郊奉祠未獲入侍伏覩中宫初建將行嘉禮實為正始之道王化之基恭惟本朝祖宗家法自三代以還盖未之有由漢以下皆不及也今陛下納后以承天地以奉祖宗内盡孝養外美風化將以為萬世法臣愚竊為陛下重之謹按周易家人之卦乃聖人所以定天下之端本臣輒不自撥敢撰集所聞先聖先賢遺言為解義一篇謹錄上進以代奉事伏望聖慈少賜省覽臣祖禹曰家人之道以内為主女正則家正矣故其利在女之貞彖曰家人女正位乎内謂六二也男正位乎外謂九五也六二以柔得位而居中九五以剛得位而居尊男子居外女子居内男不言内女不言外男女之正莫大於此此天地之義陰陽之分也禮曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽内職教順成俗外内和順國家理治此之謂盛德故天子之與后猶日之與月陰之與陽相須而後成者也其可以不正乎天子者天下之君也諸侯者一國之君也父母者一家之君也君不可以不嚴天子則天下之所嚴也諸侯則一國之所嚴也父母則一家之所嚴也故家人有嚴君焉父母之謂也父得父之道則慈子得子之道則孝兄得兄之道則友弟得弟之道則恭夫得夫之道則義婦得婦之道則聽如此然後家道正推而行之以治天下故正家而天下定矣舜文王是也舜事父母瞽瞍底豫而天下之為父子者定象憂亦憂象喜亦喜而天下之為兄弟者定釐降二女于媯汭嬪于虞而天下之為夫婦者定文王孝於王季太任刑于太姒友于兄弟以御于家邦大學曰心正而後身修身修而後家齊家齊而後國治國治而後天下平象曰風自火出家人何謂也離火也巽風也火在内而風在外家人之道由内以相成故文中子曰明内而齊外也君子之居家也言必有物行必有常所以為家人法也孔子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之所以動天地也可不慎乎初九曰閑有家悔亡何謂也處家之初治家之始故必防閑之然後悔可亡王弼曰凡教在初而法在始當治之於未變嚴之於未瀆也既變而後治之既瀆而後嚴之則悔矣孟子曰身不行道不行於妻子君子言有物行有恒無僻志無妄好所以閑家也昔者桀惑於妺喜故夏亡紂惑於妲己故商亡幽王惑於褒姒故周亡晉獻公惑於驪姬三世大亂唐高宗制於武后唐祚中絶中宗制於韋后身陷大禍皆不能閑之於初也閑之在於人心未變之時故象曰閑有家志未變也六二曰无攸遂在中饋貞吉何謂也坤之文言曰地道也妻道也臣道也地道无成而代有終也陰不為倡陽不為和故坤道柔順承天而時行妻道无攸遂在中饋則正而吉矣古者女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆苴醢禮相助奠后妃在父母家則志在於女功之事恭儉節用服澣濯之衣尊敬師傅故闗雎美后妃之德其職在於供荇菜備庶物以奉宗廟又當輔佐君子内有進賢之志而無險詖私謁之心闗睢之化行則諸侯之夫人采蘩于沼沚用之公侯之事大夫之妻亦采蘋藻盛之筐筥湘之錡釡以供祭祀之用皆无攸遂在中饋之事矣三代之亡皆以孽女亂政不修其職而預外事故武王數紂曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用詩人刺幽王曰哲夫成城哲婦傾城婦有長舌維厲之階亂匪降自天生自婦人又曰赫赫宗周褒姒烕之皆反此者也九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝何謂也以陽處陽居下卦之上為家人之長剛嚴者也王弼曰行與其慢寧過乎恭家與其瀆寧過乎嚴故家人嗃嗃至於其悔雖危猶不失吉婦子嘻嘻言笑無節終必有吝凡家之道主於嚴敬故象曰家人嗃嗃未失也婦子嘻嘻失家節也六四曰富家大吉何謂也以陰處陰體柔居巽少長有禮各得其序以聽於上故象曰順在位也富者非富以財而已家之富人之肥也禮曰父子篤兄弟睦夫婦和家之肥矣其大吉不亦宜乎九五曰王假有家勿恤吉何謂也陽居君位以家道治天下者也聖人以天下為一家以中國為一人故視天下如家視百姓如身愛人如愛身治天下如治家孔子曰身以及身子以及子妃以及妃君行此三者則愾乎天下矣大王之道也如此國家順矣孟子曰天下之本在國國之本在家家之本在身正身所以治人正家所以治天下也舜舉八元使布五教于四方父義母慈兄友弟恭子孝内平外成此以家道治天下而四海之内莫不交相愛也詩曰之子于歸宜其家人大學曰宜其家人而後可以教國人先王欲正天下必自家始此家人之盛也故勿恤而吉王弼曰王至斯道以有其家古之人有行之者舜文王者是也上九曰有孚威如終吉何謂也以陽居上處家之終誠發於中而著於外人皆信之故曰有孚治家之道初則閑之終則嚴之者所以常久也孔子曰君子不重則不威傳曰有威可畏謂之威揚雄曰貌重則有威又曰或問何如動而見畏曰畏人何如動而見侮曰侮人夫見畏與見侮無不由已又曰人必其自敬也然後人敬之君子之道本諸身故治家者始於修身終則反諸其身其身正而天下歸之矣身處威敬人亦畏敬之夫如是豈有不終吉者乎故象曰威如之吉反身之謂也元祐七年五月上時為禮部侍郎兼侍講宋名臣奏議巻二十七
