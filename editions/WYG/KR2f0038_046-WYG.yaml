body:
  text: 宋名臣奏議巻四十六宋趙汝愚編百官門宰執上上太宗薦張齊賢可任為相趙普臣叨受寵榮致招殃咎昨縈疾苦全是困危承聖主之憫憐切加救療念微臣之衰朽難以扶持近者雖獲朝參尚無氣力料兹病苦那得久長疑大限以非遥恨深恩之未報倘歸泉壤實負穹蒼臣是以斟酌物情體量時事今有合闗顧慮須至敷陳䖍傾無隠之誠願固太平之業况國家山河至廣郡縣尤多寰中之文軌雖同塞上之干戈未息勞民動衆寧有了期嵗久年深別憂生事防微逺慮必資通變之才定難扶危宜退謟諛之輩此時機務須藉正人去年强敵侵邉生靈受弊萬乗軫焦勞之慮千官無翊賛之功最是微臣偏懷愧恥即目同僚共事無非謹審清亷唯於獻替之時並執謙恭之禮稍存緘黙寧濟急須宜求抱義之人必有分憂之士臣竊覩工部侍郎張齊賢早居鄉曲流布令名開寶年中西京知府焦繼勲河南縣令盧振等當時同上奏章並以賢良稱舉從來履行本是真純後來御試登科遐方奉命親民涖事頗著亷平數年前特受聖知昇於密地公私識者盡謂當才不期嵗月未多出為外任臣在鄧州日雖聞消息未測縁由日來微有傳聞或云奏對過當凡言大事須有悔尤其如義士忠臣不顧身之利害姦邪正直久逺方知如裴度為相之日正色當朝捐軀佐國公家之事知無不為而能黜退姦邪不避權勢致其朋黨疾之如讐雖讒毁競生頻遭罷免而忠勤顯著轉重功名平蔡州五十年賊臣並因裴度之功李林甫居相位十七年不曽忤㫖唯將諂佞自固恩榮黨惡容姦承顔順意安禄山顯有悖逆並不隄防以至敗國亡家皆因悖逆所致林甫既死斵棺棄屍况明皇帝文武聰明唐朝英主良由委任非當為患實多唯有用人不可不謹則知抱忠良者豈肯依違懷謟佞者唯思茍且若非察言觀行何以知見否臧張齊賢素藴機謀兼全徳義從來差遣未盡器能慮淹經國之才堪副濟時之用伏乞皇帝陛下留居左右歴試艱難緩急之時堪期得力如當重委必立殊功臣所以潜貢管窺望垂天鑒更希詢訪免誤安排冀分宵旰之憂同建久長之䇿臣之此狀特乞留中所貴全繫君恩免貽衆怒僣踰之罪無以自逃端拱二年七月上時為太保兼侍中昭文殿大學士上太宗論宰相樞密接見賓客謝泌臣竊見王禹偁上言請自今宰相樞密並不得於本㕔接見賓客以防請託有詔從之仍令御史臺宣布中外臣以為如此是疑大臣以私也書云任賢勿貳去邪勿疑張說謂姚元崇外則疎而接物内則謹以事君此真得大臣之體今天下至廣萬幾至繁陛下以聰明寄於輔臣茍非接見羣官何以盡知外事若令都堂候見則羣官請見咨事無時是大臣常須候百執事於政事堂無解衣之暇古人有言曰疑則勿用用則勿疑若政在大夫禄去公室國祚衰季强臣擅權當此之時乃可為慮今陛下鞭撻宇宙總攬豪傑朝廷無巧言之士方面無姑息之人禮樂征伐自天子出書曰無偏無黨王道蕩蕩今日之謂也柰何疑執政為衰世之事昔孔光不言温室中樹顧雍封侯三日家人不知謝安石對客圍碁㨗書至而客不覺大臣當密慎如此雖妻子猶不得聞况他人乎使非其人當斥去之既得其人任之以政又何疑也設若杜公堂謁見之禮豈無私室乎塞相府請託之漸豈無官徑乎此非陛下推赤子心以待大臣展四體以報下之道也王禹偁昧於大體妄有陳述上累聖徳䝉蔽聰明狂躁之言不可聴用雍熙四年三月上上仁宗乞迭召中書樞密院臣僚坐論治道杜衍臣伏見中書樞密院之官是皆選自宸衷委之柄用領三事之職佐萬幾之劇古所謂坐而論道者也今乃毎遇剛辰得親丹扆外朝始罷延英次對中覆奉行祗循常務以天下之大民事之艱恐非數刻之中可盡研幾之理欲望聖慈當清閒之燕迭召中書樞密院兩府臣僚賜坐便殿一月之中只乞三兩次召對俾其極獻替之說酌古今之宜究治亂之源達幽隠之意上以成好問之裕下以申納忠之誠庶明良之歌上下同體是故平時而論可明其體要之變臨事而辨或近乎游說之嫌以虞舜之明而云好察邇言以漢文之達亦曰無甚髙論此實通國體用衆智之大端也至於米鹽之細務叢脞之末節如呈米麥布帛様及呈押㸃馬諸宫扶車子百姓司庫子補試人吏之𩔖此特有司之職事耳不當取決於宸斷宜詔所司科簡之庶其正小大之分適權義之中延納訏謨開益聖智提綱摠要叶大徳之不官造膝虚懷明為善之最樂臣猥以庸望輒罄愚𠂻干冒威嚴隕越無地景祐二年上時為御史中丞上仁宗乞令宰相兼樞密使富弼臣伏見自來兵機公事全委密院今邉鄙多故不同往時若無更張必有敗闕况事干治亂執政豈可不知文武二途自古一致臣竊觀周史宰相魏仁浦曽兼樞密使國初范質王溥亦以宰相參知樞密院事臣今欲乞依故事亦令宰相兼樞密使所貴同心恊力各無猜嫌共議安邉必能集事康定元年四月上時知諫院尋詔樞密院自今邉事並與宰相張士遜章得象參議之即不須僉撿上仁宗乞省樞密院歸於中書張方平臣竊以朝廷政令之所出萬事之本原一就於中書若樞密院則古無有也起於後唐權宜之制因循相承兵柄寖重乃與中書對秉衡軸至於分軍民為二體別文武為兩途宣敕並行議論難一事無任責更相顧望自古為理患在多門况今二府之中豈盡材猷之士朝綱内弛邉事日生西戎北狄交有憑陵中夏之志財用殫窘百職曠廢此時廟堂之上豈容非才夫欲朝廷尊邉事寧其要在乎揀别大臣才不才而已矣陛下若去不才之人又復誰當進用若使晏安朝列容身養望者優游備位則勞臣益解體武士益離心兹事體大實在詳察謂宜講求利害稽復古制省樞密院歸於中書若又重於改為則莫若通樞密院之職事於中書見任樞密使副才者留之不才者去之其諸房吏史且皆如舊措置施舎徐更圗議是足以一政事之本重賞罰之權汰冗濫之貟塞僥倖之望改而張之不傷體裁而成之不動衆陛下幸與一二宗臣舊老深圗此議有益於國願斷自聖心行之慶厯二年七月上時知諫院尋降制以宰臣兼樞密使上仁宗論宰相不進賢者為將來之資孫沔臣竊以直言指佞忠臣之亮誠革弊救時聖人之能事古之士有負鈇鑕趨鼎鑊不避死亡之罪以囘主上之心非不知愛身命保富貴身為安逸之計而奚取摧折之苦盖不敢以所損之小以忘所補之大也自祖宗有天下垂八十餘載其間正人直士未嘗以言廢者雖時犯顔獲罪要不過黜一官使居於外不踰年而已遷豈有若古之伏法流竄而殞絶其身者歟景祐已前綱紀未嘗廢猶有感激進說之士觀今日之政以驗今日之事㡬何不慟哭長歎息而反無人為陛下言者臣實恥之亦不敢逺引髙論唯以時之要務而陳之願少留宸聽夫州郡承風者吏也皆猥懦老耄縣邑禀令者牧守也皆昏戇罷軟制敕方下人咸以為不足信未踰月而數更奏請已行人咸以為不能久又隨時而改易利權反覆民力殫竭邉鄙久師而自敝戎狄伺隙以爭長事至危而陛下以為安人皆憂而臣下唯相目者何也由宰相多忌不能進賢者朝廷失䇿不能任正人之所致也先聖所以能致太平者求端方之士用諒直之人故臣之姦佞無不知民之疾苦無不聞知則隨而去之聞則擇而行之書諸史䇿不可備舉臣但見莊獻總政之年陛下恭黙之日有王曾張知白魯宗道李迪蔡齊薛奎以正直迭居兩府曺脩古李紘劉隨鞠詠孔道輔以亮節更任諫垣參用才智十年之間中外無大故然猶姦纎僥倖閽寺威福未能悉去亦不為害景祐已後丞相吕夷簡進當國政以承平可恃以功業可久連黜忠言㡬廢直道洎為使相出鎮許昌以王隨陳堯佐代其任才庸負重謀議不協忿爭中堂取笑多士政事寖廢即嵗罷免又引張士遜冠台席本非逺識致敗乃事戎狄始起於邉陲卒伍竊發於輦轂合轡徒行滅燭逃遁損威失體殊無慚愧尚得三師居第自奉盖執政不得人之效也豈不由丞相不進賢者為將來之資但用不如已者為自固之計故陛下思當今之才無若丞相之賢復召自大名再秉鈞衡於兹三年不更一事以姑息為安以避謗為智西州將帥連敗北虜脅取無厭兵殱貨悖天下空竭刺史守宰十不得一法令變易士民怨嗟隆盛之基忽至於此是由不能進賢退不肖為社稷大計也今夷簡以病求退陛下手和御藥親冩徳音恨不移卿之疾在於朕躬四方義士一聞詔書有泣下者丞相在中書二十年三冠輔弼所言陛下無不從所請陛下無不行終始顧遇而未嘗少衰可謂宋朝得君一人而巳未知以何道報聖人至深至厚推誠篤信之恩也噫庸常滿前誰階於此智慮未有居丞相之右者使陛下祗有夷簡而天下無某人也設遂請老何人自代今天下士大夫皆稱賢才而陛下不用者左右毁之也天下士大夫皆謂纎邪而陛下不知者朋黨庇之也天下士大夫皆謂不才而陛下任之謂丞相不知未之有也嗚呼天下重柄累聖相授豈可輕易哉夫貨殖之家有至寶之物猶當謹重扄鑰非博識者不得一觀豈可付之愚童騃吏終日戲玩不委諸地而毁之則盜斯奪之矣昔太祖以一旅興王業太宗以五路定天下真宗承經營之策數十年間遂至泰寧何嘗不選用宰相與平章大政為萬世業若屋之柱石身之手足手足委墜心體未有得安者柱石摧朽宫室未有得久者宰相非才天下豈有得致治者也方今北虜伺患以兵壓境而取財西賊數勝以使結鄰而請和二方之情偽難知中國之興衰所繫加之民人疲弊政事隳雜此實朝廷非常之時非更張革變則不能至於治平也臣觀在位之意無已然之見事急則錯置失宜既往則怡懌自若去嵗北戎有割地之請未及境而百役暴起晝夜不息遣將帥進官秩推轂輟衣委數十萬兵而遣之一日邀結舊好兵分勢解去無後慮將帥處於閒地不得一瞻天日之表示不復用兵何憂樂進退之易也如此今又聞西賊欵塞公卿忻忻日望和平此乃緩兵息民之一事耳若因此振綱紀修廢墜任賢使能節用養兵則景徳祥符之風當見於今日矣若恬然不顧遂以為安臣恐土崩瓦解不可復救也而丞相便為四方已寧百度已正欲因病黙黙而去無一言啓沃上心别白賢不肖雖盡南山之竹不足書其罪也若薦用賢才合天下公議俾士大夫厭服其心是失之於始而得之於終猶可寛天下萬世之責茍遂容身不救前過不合巳者舎之不順已者退之以柔而易制者升為腹心以姦而可使者任為羽翼以謟佞取人者為君子以愚懦無識者為長者使之在廊廟布臺閣上惑聖明下害生靈為祖宗計則必危為子孫計亦未可保於終若是張禹不獨生於漢林甫復見敗於唐可不謹哉可不懼哉臣官為侍從班近清列緘黙度日榮名可期何必多言自貽狂率上忤㫖意苦論宰輔盖不忍陛下受隠晦之名丞相書姦邪之迹為後世所賤也臣又聞天子擇宰相必觀立朝之本末採多士之僉論臨大事而有守秉諒節而不囘居外則有撫民之譽在内則有諍臣之風一日登庸萬方受賜落落然有大臣之器此庶㡬得矣若循資次補亦丞相素為之地安肯拔賢才於不次哉在陛下察之謹之况國家安危之勢在此一舉亦恐未有人為陛下如此言之也臣見數年前有論西北事者談兵畧者謟佞之輩必羣聚而非笑之觀方今之患非言者之過也竊恐臣今日之言亦前日之事也故非擺闔之辭離間之說悉士大夫有識之論也可以質於天地可以達於君親不愧於人不畏於後臣區區之心幸觀咫尺恥有見聞不盡愚忠雖異日為傾邪所害貶竄誅戮臣亦無悔伏望陛下念祖宗之基業奉社稷之威靈開日月之明奮雷霆之斷永信任於忠良去敗亂之敝事克復昇平在於此日則天下幸甚慶厯三年正月上時為起居舎人陜西轉運使過闕上仁宗乞延召大臣從容論議張方平臣竊見近日邉鄙兵興朝廷多務仰惟聖慮豈忘憂勞然逐日視朝御前後殿各不過數刻自兩地大臣以次進對急呈文書而罷至於論道經邦則未暇也今髙秋氣清宫殿凉爽臣願陛下燕閒之際延召大臣從容賜坐與之圗議天下之事則治亂得失盡在几席之上矣臣觀今天下之勢可與之安可與之危安危之勢顧陛下力行之何如爾且帝之體如天之行健不息如日之髙明然今深處宫禁自取蔽隔此隂沴諸變所以作也惟陛下特開睿鑒諒納愚衷慶厯五年八月上時為翰林學士上仁宗乞令中書樞密院依舊聚㕔議事張方平臣伏見宰相賈昌朝陳執中等乞解兼樞密使已降詔允所請自古已來歴代之前三公之職無所不總國初中書樞密院兩相兼領臣竊詳其時盖是後周世宗深意欲合二府以復唐舊及范質等罷其職遂致事體兩分謀議不一總於主斷實煩柄馭比以戎虜為患邉防多警始命宰弼闗決機務國論粗合習方為常今疆場雖即漸寧戍守未能解備蓄北虜如蓄虎飢則噬人養西戎如養鷹飽且颺去兩相既罷去此職退朝必更不聚㕔便如路人往來杜絶今雖有處分凡于軍國機要及邉陲事宜令依舊同共商量施行又縁朝廷舉動惜體中外人情易揺三邉忽有小虞兩地即須聚議便是非常之事逺動四方之疑合固易離離則難合今聖恩已聽昌朝等解罷使名即密院文書自不通僉諸房事務亦罷呈禀臣愚以為其邉防奏報軍馬機宜依舊常且聚㕔每事並皆同議於後或有警急庶㡬得以周知倘值有事商量亦免動人視聽若或聖心採納乞特宣諭施行慶厯五年十月上時為翰林學士上仁宗論宰相擇賢材而久其任何郯臣竊以唐虞三代成天下之治為日曠久不敗者非其時之易治由其君在位久歴年多爾然不唯其君在位歴年之久抑亦由任其臣專且久也虞之賢臣臯陶為冠夏之賢臣伯益為首舜禹任之與之始終故能成至治湯得天下以伊尹為輔不唯其身任之及其子孫亦任之太戊之在位其相伊陟而已髙宗之中興其相傅說而已皆終其世而未嘗聞一易人焉所以能享其名周武創王業唯周召之用不唯其身用之及其後王亦用之所以能成其功漢髙之取天下也以蕭何其治天下也亦以蕭何何之終繼以曺參亦不唯其身任之至於後嗣亦任之所以能大其業劉備之得蜀中晉元之得江左顧其業亦甚微矣然而能抗衡中夏延及數世者以任諸葛亮王導專久之致也唐太宗成貞觀之治非他也由其信房杜王魏長孫之篤而致也明皇致開元之治亦非他也委姚崇宋璟之固而致也東漢李固杜喬陳蕃時君亦知其賢而用之然用之不能終為邪險害之所以速衰危之患隋髙祖平天下由其任髙頴之功任之不能終以楊素承之所以無宏逺之業憲宗之平夏州破淮蜀由任杜黄裳裴度崔羣而致也任之不能終以皇甫鎛程异間之所以復有叛渙之患凡兹歴代任人之要任之不厭其久未始不致治任之不保其終未始不致亂為人君者必以是為監則庶㡬凛凛三代之際矣後漢治郡縣司倉庾皆官之輕者然而尚善其吏久而至子孫者為美况其任天下之事而欲朝受命夕成功未之有也伏惟陛下勵精致理擇賢為輔自始即位及今所命二府之臣巳數十人以三朝所任人較之皆不若今之多也然而亟用亟罷不能持乆其逺者五七年次者二三年下者又不及之唯吕夷簡在相位十數年中間兩罷而復用之李迪兩被進拜始任之數月其再也才逾年杜衍之拜甫及百日雖進退用舎聖慮所決必皆有為然而人情見陛下始用之不聞其盡賢既退之不知其有過其謂諸臣出入二府皆其常也但官重則可以補矣故近來仕至兩省官者人莫不皆有大用之望其望無他不過冀厚禄以温家族假官勢以榮子孫甚者謂一歴二府得書黄紙則以為榮此尤可怪也用二府之臣計非陛下茍用之必以其有稱天下之望者矣天下之人亦有望於諸臣焉自進用及今不累月而星變為異以前世之事為驗多謂於大臣不利天道幽逺災異之發固不虚應然不必在於一端也竊恐傾危之士縁以為言或以遇有災異則固當罷免或以使避禍患則退自安全陛下或所持不堅一為浮言所移諸臣又將不安其位也今之任者既不能自固後之來者亦未必能安也若是則二府無一定之任矣二府無一定之任而欲議天下之治其無日矣人君有聖明之資可樂也尚孳孳勞於求賢者亦與之圗致治之具使功業成於當年名號榮於後世爾以陛下聰明神聖其資於堯舜逺甚然在位僅三十年而政理文采未暇浸淫於漢唐之間由任大臣不久而人為茍且之計也夫國家之弊莫大於人臣茍且况大臣乎今日任大臣者可謂弊矣伏望陛下懲既往之失而圗將來之得其於二府大臣也必知其賢然後用之既用之必使久於職焉既久矣必待之以勿疑焉審處此數端曠日歴年而責其成功人雖中材荷陛下信任之固必將勉強為陛下宣力而講長世之謀况任得賢材而又乆則堯舜之治無難及矣皇祐二年上時為侍御史知雜事上仁宗論狄青為樞密使龎籍臣聞昔太祖時慕容延釗將兵一舉得荆南之地方數千里兵不血刃不過遷官加爵邑錫金帛不用為樞密使曺彬平江南擒李煜欲求使相太祖不與曰今西有汾晉北有幽薊汝為使相那肯復為朕死戰耶賜錢二十萬貫而已祖宗重名器如山嶽輕金帛如糞壤此陛下所當法也青奉陛下威靈殄戮兇醜克稱聖心誠可褒賞然方於延釗與彬之功不逮逺矣若遂用為樞密使同平章事則青名位極矣冦盜之警不可前知萬一他日青更立功欲以何官賞之且樞密使髙若訥無過若何罷之不若且與移鎮加檢校官多賜金帛亦足以酬青功矣皇祐四年六月以狄青為樞密副使左司諫定賈黯言臣伏見國初武臣宿將扶建大業平列國有忠勲者不可勝數然未有起兵間登帷幄者今其不可有五四夷聞之有輕中國心不可一也小人無知風聞傾動翕然嚮之撼揺人心不可二也朝廷大臣將恥與為伍不可三也不守祖宗之成規而自比五季衰亂之政不可四也狄青雖材勇未聞有破敵功失駕御之術乖勸賞之法不可五也皇祐五年五月又以青為樞密使籍時為宰相上此奏上仁宗論安危之㡬在於命相馬遵臣每讀唐書見宰相崔羣對憲宗論開元天寶中事未嘗不廢巻而歎以為知言其畧曰安危存亡繫所任明皇用姚崇宋璟張九齡則理用李林甫楊國忠則亂人皆以天寶十五年禄山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任姦臣李林甫理亂自此已分矣其切至明白如此豈不謂之知言乎盖人之用舎存乎前國之安危係乎後譬猶養身常須畏疾不可以覺痛之日始為受病之辰當審之厥初也竊聞弼臣累懇求退或慮聖慈重違其請則別須求之以付大柄今山摧別都之鎮日食正陽之朔大異仍見多事可虞伏望陛下深惟三聖基業之大四海生靈之廣采中外之公議斥左右之私言鑒開元天寶之理亂戒林甫九齡之用舎安危之㡬在此一舉間不容髮雖悔何追陛下擢臣冗職之中任之以言事之責日夜惟念無以補報若煩碎迂濶之論不敢上煩天聽惟中書政本命相用人最為急務與其後時而悔不若先事而言在職所宜雖死無恨惟陛下留神省覽則天下幸甚至和元年三月上時為言事御史上仁宗論諫爭乃大臣之任馬遵臣聞古者天子有諍臣七人盖左右前後丞弼之任故傳曰公卿比諫漢制國有過則三公得通議之故平津侯不肯面折廷爭汲黯數之且曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎唐太宗與房魏王珪輩議事十數往返歸當而後已故能成太平李絳欲論采擇一事同列李吉甫曰此嗜慾間事難言從它諫官上疏絳曰此難事豈可推與諫官且君為元首臣為股肱何事而不可得論也管仲曰大臣持禄而不敢諫小臣畏罪而不敢言此害霸也然則自古諫諍乃大臣之任不獲已而後至於言責之人盖事有本末勢有先後若大臣不能正之於前而使小臣救之於已然之後其難易不侔也又况王言如絲出而漸大國令如汗下而不返乎以此見言責之難為也且為忠臣不若良臣用直諫不如諷諫若無益事實自取空名豈愛君憂國之人哉伏惟陛下容覆如天地照臨如日月言無不從事無不察然猶並列臺諫以廣耳目此堯舜禹湯之用心也其如事闗近司禁防甚密先事而言或謂之輕發後時而議則謂之已行空言雖多成效甚少有臺諫之名無臺諫之實甚可惜也臣愚欲望陛下清閑之宴召對執政大臣以堯舜君臣相戒敕之義丁寧宣諭今後事有未便理有未安或踰祖宗之制度或失先王之典禮並須再三執奏不得一切奉行以歸當為限如此則諸妖不能勝徳大和可以致祥萬事不隳太平可致臣以言事名官不以全責自歸而敢扳援大臣者豈為自安之計哉盖古義如此時事當然臣言雖輕於事甚切惟陛下財擇臣不勝皇恐待罪之至至和元年上上仁宗乞中書樞密院通知兵民財利范鎮臣伏見周制冢宰制國用唐宰相兼鹽鐵轉運使或判户部或判度支然則宰相制國用從古然也今中書主民樞密院主兵三司主財各不相知故財巳匱而樞密院益兵不已民已困而三司取財不已中書視民之困而不知使樞密減兵三司寛財以救民困者制國用之職不在中書也而欲隂陽和風雨時家給人足天下安治不可得也欲乞使中書樞密院通知兵民財利大計與三司量其出入制為國用則天下民力庶㡬少寛大副陛下憂勞之心此非使中書樞密大臣躬親繁務如三司使之比直欲令知一嵗之計以制國用爾至和二年四月上時知諫院上仁宗乞罷狄青樞密之任歐陽修臣聞人臣之能盡忠者不敢避難言之事人主之善馭下者常欲聞難言之言然後下無隠情上無壅聽姦宄不作禍亂不生自古固有伏藏之禍未發之機天下之人皆未知而有一人獨能言之人主又能聽而用之則銷患於未萌轉禍而為福者有矣若夫天下之人共知而獨人主不知者此莫大之患也今臣之所言者乃天下之人皆知而唯陛下未知也今士大夫無貴賤相與語於親戚朋友下至庶民無愚智相與語於閭巷道路而獨不以告陛下其故何也盖其事伏而未發言難於指陳也臣切見樞密使狄青出身行伍號為武勇自用兵陜右已著名聲及捕賊廣西又薄立勞效自其初掌機密進列大臣當時言事者已謂不便今三四年間雖未見其顯過然而不幸有得軍情之名推其所因盖因軍士本是小人面有黥文樂其同𩔖見其進用自言我輩之内出得此人既以為榮遂相恱慕又加青之事藝實過於人比其輩流又粗有見識是以軍士心共服其材能國家從前難得將帥經畧招討常用文臣或不知軍或不閑訓練自青為將領既能自以勇力服人又知訓練之方頗以恩信撫士以臣愚見如青所為尚未得古之名將一二但今之士卒不慣見如此等事便謂須是我同𩔖中人乃能知我軍情而恩信撫我青之恩信亦豈能徧及於人但小人易為扇誘所謂一犬吠形百犬吠聲遂皆翕然喜共稱說且武臣掌機密而得軍情不唯於國家不便亦於其身未必不為害然則青之流言軍士所喜亦其不得巳而勢使之然也臣謂青不得已而為人所喜亦將不得巳而為人所禍者矣為青計者自宜退避事權以止浮議而青本武人不知進退近日以來訛言益甚或言其人應圖䜟或言其宅有火光傳說以為常談矣而唯陛下猶未聞也且唐之朱泚本非叛者倉卒之際為軍士所迫爾大抵小人不能成事而能為患者多矣泚雖自取族滅然為徳宗之患亦豈小哉夫小人陷於大惡未必皆其本心所為直由漸積以至蹉跌而時君不能制患於未萌故臣敢昧死而言人之所難言唯願陛下蚤聞而省察之爾如臣愚見則青一常才未有顯過但為浮議所喧勢不能容爾若如外人衆論則謂青之用心有不可知者此臣之所不能決也但武臣掌機密而為軍士所喜自於事體不便不計青之用心如何也伏望聖慈深思逺慮戒前世禍亂之迹制於未萌密訪大臣蚤決宸斷罷青機務與一外藩以此觀青去就之際心迹如何徐察流言可以臨事制變且二府均勞逸而出入亦是常事若青之忠孝出處如一事權既去流議漸消則其誠節可明永保終始夫言未萌之患者常難於必信若俟患之已萌則又言無及矣臣官為學士職號論思聞外議喧沸而事係安危臣言狂計愚不敢自黙至和二年上時為翰林學士上仁宗乞罷百官郊迎宰相仍許私第見客范鎮臣伏覩御史臺告報百官立班郊迎宰相文彦博富弼者誠隆禮也與夫隆之以虚禮孰若推之以至誠任之以實權自陛下用文彦博富弼為宰相中外皆謂得人然近日有詔兩制臣僚不得詣宰相居第百官不得間見宰相是不推之以誠不任之以權而以郊迎虚禮待之也伏乞罷百官郊迎而令兩制百官復得就第見執政以訪天下之事而以達陛下之聰明則御大臣之術兩得之矣至和二年七月翰林學士歐陽修言自今兩制以上非因公事不得與執政相見及不許與臺諫官往還如有公事許就白於中書樞密院鎮上此奏時知諫院上仁宗論兩省兩制官不得與兩府大臣相見及臺諌往來大臣非休假不得接見賔客馬遵臣伏覩近制兩省兩制官非公事不得與執政之臣相見及臺諫往來兩地大臣非休假不得接見賓客徒彰陛下有疑臣下之名而實無益於事已曽論列未奉指揮臣歴觀前代以及漢唐之盛小大之臣往來相見並不曽有禁止之文唯唐徳宗之時朝政多僻臣僚或相過從多令金吾伺察密奏故宰相不得於私第見客徒示猜嫌無補奉天之難及憲宗英斷不疑委任裴度遂除其禁得延英俊卒立淮西之功乃知馭臣之體在於明聽斷而不在於設防也陛下聖明必照此理若謂新制已行未欲便改臣請以先朝故事言之淳化二年用右司諫王禹偁奏請令兩府大臣不得於本㕔見客以防請託時有左正言謝泌上疏極陳其不可太宗覽奏即追前詔並令如舊乃知事茍未便何憚而不改邪切縁此事本為大臣若非陛下特賜指揮中書避嫌重於奏覆伏乞蚤賜聖斷以釋中外之疑嘉祐元年上時為右司諫上神宗論富弼入相久謝病不出范純仁臣聞股肱惟人良臣惟聖則君之倚良臣猶人之須手足也手足不可舉則無以為人大臣不任事則無以為國故虞舜作歌戒其臣曰股肱喜哉元首起哉是股肱之臣喜於任用則元首之徳日以興起也陛下即位以來審求輔相冢宰之位闕已踰年近得富弼委之大柄四方士民莫不鼔舞以謂聖主既得賢臣則徳澤日新太平可待而弼登用以來屢以舊疾謁告入則隨衆循舊不欲有為退則謝客杜門罕通人事雖陛下丁寧宣召而弼終未樂就職切以中書政事日有萬機朝夕之間賛襄是賴在陛下萬乗之尊尚以宗廟社稷之重惟日孜孜旰昃不暇而弼乃以養疴自便處之晏然臣逸君勞於義安忍或以謂陛下待弼恩禮雖厚而誠有所未至用弼雖重而任有所未專使弼不盡其才所以鬱鬱失職而迤邐求去也以臣思之竊謂不然且弼起自布衣仁宗擢為宰相先皇帝暨陛下以為宿徳元老四方士民望弼為賢臣碩輔在弼報稱之義自應如何况陛下懼災求治之時而弼位居冢席君臣之際不宜形迹當自任以天下之重盡陳其所欲為必曰方今何事可憂何人可任何利可興何弊可革何者為先務何者宜緩行然後審陛下用捨之意而弼之去就自明何必黽勉媕阿自為卷縮是非不欲明辨進退不敢顯言苐且移疾於家使人主厭於容養然後翻然決去方為善謀者哉臣必慮弼惑道家全神養氣之言狥曲士忘名忌滿之節不以天下之重易其愛身不以萬務之衆妨其養性恤已則深於恤物憂疾則過於憂邦但能早退自全即為明哲之術殊非聖人朝聞夕死之義而弼以為得此又弼之過計也且詩曰雖無老成人尚有典刑則是朝之老成過於典刑之重也易曰王臣蹇蹇匪躬之故則是人臣之分不以一身為恤也今弼若迤邐遂去則致陛下有不用老成之迹弼亦有不能竭節匪躬之名不用老成則於聖徳有虧不能匪躬則於臣節無取弼之處身致主兩皆失宜而望儀刑四方表率百辟難矣臣又自念弼與先臣素有契義在臣當有忠告之言而以待罪諫垣不敢私通書謁伏望聖慈將臣此奏宣示弼如臣妄詆大臣則乞重行貶責如臣言為是則弼宜恐懼修省不可更如前日倚疾自便速當靖恭厥位同寅戮力竭致主安民之慮講興治補弊之術延訪多士採擇羣才上以副陛下倚毗下以副士民屬望使虞舜之賡歌不獨見美於前世微臣不勝大願貼黄聞弼以足疾迎送有妨不見賓客則將何以詢訪事㡬别識人材竊計弼雖在家養疾不過安坐靜室賓客既知弼有足疾必不責其迎送之禮若只坐與之語於弼有何所損亦乞聖慈宣諭此意熙寧二年上時為知諫院上神宗論大臣皆以利進陳襄臣竊聞已有制命除韓絳樞密副使兼參知政事絳以才望序遷固未為過然朝廷所以用絳之意似乎不厚矣陛下始用王安石參預大政首為興利之謀先與知樞密院事陳升之同領制置三司條例司未㡬升之用是遷為丞相而絳又領之曽不數月今又以絳參預政事則是中書選任大臣皆以利進自古至治之朝未有此事也書曰兹為三公論道經邦爕理隂陽官不必備惟其人此輔相之任也太戊之興也則有伊陟臣扈格於上帝巫咸乂王家髙宗之興也則有甘盤傅說而商祀配天成王之立也則周公為師召公為保興作禮樂遂致太平之功不聞以利責之也唐憲宗剛明果斷能立事功以藩鎮漸平肆意侈欲程异皇甫鎛探知其㫖以誅剥財利說之故憲宗獨排物議而以异鎛為相裴度素所親信雖極言論列終亦不悟季年昏惑曽庸主之不若信乎利之蔽人也如此君人者之所任與其所好足以為戒矣今陛下執政之臣凡以利進者三人矣雖聖徳髙明不足以致惑亦不可以不謹也臣欲乞罷絳參知政事今後中書選任大臣必求道徳經術之賢以處之而不得以利進如陛下不欲追寢已行之命即乞將制置條例司與青苗補助之法只歸三司及責之守令相度施行庶不害於王政而足以全大臣之節矣熙寧三年四月上時為侍御史知雜事宋名臣奏議卷四十六
