body:
  text: 宋名臣奏議卷一百二十八宋趙汝愚編方域門營造上真宗乞罷營玊清昭應宫王曽臣伏聞朝廷設諌諍之官防政治之闕非其官而言者蓋表愚忠况當不諱之朝復忝非常之遇茍進思之無補懼竊祿以貽譏臣伏覩國家誕受殊祥薦膺秘籙祚洪圖於萬載超盛烈於百王陛下寅畏寳符陟封名岳功垂不朽澤浸無垠奉若之心斯為至矣而清𠂻濬發成命亟行就嚴城之北隅啟列真之秘宇式昭丕應特建嘉名自經始以來庀徒斯廣輦他山之石相屬於道途伐豫章之材逺周於林麓累土陶甓揮鍤運斤功極彌年費將鉅萬掩祈年之舊制踰槩日之前聞輟貴近以董臨假使權而領䕶如此則國家尊奉靈文之意不為不厚矣崇飾臺觀之規不為不壯矣然則臣之愚懇或異於斯既有見聞安敢緘黙臣以為今之興作有不便之事五焉雖鳩僝巳行未可悉罷茍或萬一采芻蕘之說省其功用抑其制度亦及民之大惠而憂國之逺圖也所謂五者之目請為陛下陳之且今來所創立宫規制宏大凡用材木莫非楩楠切聞天下出産之處收市至多般運赴宫尤傷人力雖云只役軍匠寧免煩擾平民况復軍人亦是黎庶此未便之事一也邇者方畢封崇頗煩經費今兹興造尤耗資財雖府庫之中貨寳山積輂築之下工徒子來然皆内帑費積代之蓄藏百物盡生民之膏血散之孔易歛之惟難雖極豐盈猶宜重惜此未便之事二也夫聖人貴於謀始智者察之未形禍起隠㣲危生安逸今雙闕之下萬衆畢臻暑氣方隆作勞斯甚所役諸雜兵士多是不逞小人其或䑕竄郊􅆵狗偷都市有一於此足貽聖憂此未便之事三也王者撫御寰區順承天地舉動必遵於時令財成不失於物宜靡崇奢侈之風罔悖隂陽之序臣謹按月令孟夏無發大衆無起土工無伐大木今肇基卜築衝冒鬱蒸俶擾厚坤乖違前訓矧復旱暵卒痒雷電迅風㧞木飄瓦温沴之氣比屋罹災得非以失承天地之明効歟此未便之事四也臣竊聆中間符命之文有清凈育民之戒今所修宫閣蓋本靈篇而乃過興剖掘之功廣務雕鎪之巧雖屢殫於物力恐未協於天心此未便之事五也伏望陛下思祖宗之大猷察聖賢之深戒遷思回慮懲往念來詔將作之官息勤勞之衆輯寧羣品對越髙穹如此則遐邇宅心人祗快望必若光昭大瑞須建靈宫將畢相勞聿爰成績則臣敢效愚計亦可必行但能損彼規模减其用度止崇樸素無取瑰竒唯將之以誠明仍重之以嚴㓗名數之際加等是宜實費之資節儉為要俾四海之内知陛下愛重民力之意豈不美歟昔太宗皇帝建太一上清等宫亦不使窮極壯麗臣謂陛下冝遵而行之取為法制以示不敢踰即鳴謙大德光於千古矣柰何特欲過先帝之制作乎并覩西京造太宗影殿東岳置㑹真之宫計其工庸亦皆不啻中人百家之産然於尊祖禮神則盛矣其於邦國大計則猶未足為當時之急務也臣料陛下必為海内承平邊隅清晏人康俗阜時和年豐縱或築宫無損於事則臣復謂其不然也方今疆場甫定虜廷有姑息之虞民俗茍安倉箱無紅腐之積况闗輔之地流亡素多近甸之氓農桑失望雖令有司安慰亦恐未復田廬秋冬之間饑歉是懼亟經營於神館慮稍鬱於輿情且往古廢興之端前王得失之事布在方䇿是足為商鍳者陛下覽之詳矣非假愚臣一二言焉試觀自昔人君崇尚土木孰若清靜無為者之安全乎願陛下留神垂聽無忽臣言則天下幸甚今雖上下之人皆知事理如此而人人自愛莫敢輕黷冕旈至於左右大臣則慮計之不從致見疎之悔中外百執則慮言之難達招妄動之尤使忠讜之謀未盡良為此也唯臣出自幽隱遭遇文明特受聖知度越流輩官為侍從身服簮裳粗識安危之機未申補報之効捐軀思奮今也其時又安敢循黙茍容不為陛下别白而論之乎是以輙率庸妄輕冒宸嚴感發於中無所顧避陛下寛其鼎鑊之罪矜其螻蟻之誠深監古先試垂採擇無謂増建靈宫為一細事而弗恤也臣以為興役動衆尤繫事機不可不察也當使鄉校之中豪奸之黨無所開竊議之口則㣲臣之望也天下之幸也大中祥符二年六月上時為知制誥上仁宗乞罷寳相禪院剏建殿宇韓琦臣竊聞右街寳相禪院見今移拆法堂剏盖大悲殿宇特命中官監領其事所役兵匠數千百人假以舟車資其輦運凡百用度悉從官給規模之盛功作甚崇臣計其興建之因恐非陛下之意也臣伏覩近者興國寺雙閣災延及大殿長廊俱為煨燼其寺舊安祖殿俯逼都市衆人之慮再有修葺而陛下亟降㫖命悉令停寢任其縁化使自營造斯所以重天戒而愛民力也稽諸載籍事實難行戴履之倫孰不欣幸何乃遽傷治體有損邦用起無名之役為不急之務者所謂恐非陛下之意斯可明矣又向者陛下崇務本之仁念維城之重即昭應之遺址建睦親之大第諸邸之聚三千餘間常度不充侵用南郊材植又且萬計復令出産州郡供補其闕物役之大從可知矣今者業巳成功焯為熙事何則厚宗枝而隆孝治豈無益之所為乎當時言事者猶比上封章願寢斯議蓋亦重改作而節浮費也臣以謂此役既終即凡土木不急之事一切宜停以緩財力夫崇采椽三等之制者唐堯之仁化也惜露臺百金之産者漢文之儉德也煥在方牘所宜規範伏望陛下俯從愚說逺紹前徽悟色相之非求本慈仁之足尚躋升壽域永底太平斯乃奉順祖宗愛養元元之本也其寳相院剏盖殿宇等臣欲乞詔下有司令悉停罷俾其營求施利得自修崇盖此殿若成則法堂未立加之廊宇制度悉求相稱必於間隙漸次申陳事既垂成理須從許如此則功費之廣倍於初矣利其成而規賞典者其徒亦繁矣且罷興國而營寳相則是休彼役而勞此功廢置雖殊耗蠹豈異臣又慮違陛下重天戒愛民力之本意故昧死陳述兾裨萬一景祐三年七月上時為左司諌上仁宗乞罷修萬春閣孫沔臣竊聞内中建起萬春閣破用至多役工不少方當仲春萬物發生昆虫起蟄按大禮月令故非興土木之時也况陜西宿兵三十萬經冬巳來抱戈被甲衝風冒雪受艱苦而爭性命數矣涉歲無一次特支以慰其懃瘁之節盡國家財賦闕乏未能豐冨於士卒今礲石鏤木􅂗朱帖翠非錢十萬不能成一閣而為優閑不急之務此諒非陛下之意必恐謟邪兾於僥倖立木上梁則獲賞賜畢工落成又遷官秩始謀之人得其利而使聖明受不恤四方之謗此義士所不忍聞也臣請罷營此閣且葺其舊制則可弭庻議而省虛費伏望陛下崇勤儉之風戒宴遊之樂節嗜慾之情養元和之氣保攝天機果斷政事則天下幸甚慶歴元年二月上時為監察御史裏行上仁宗乞罷修開寳寺塔蔡襄臣數日聞迎舍利歸開寳寺臣始疑之必以為無有此事屢以愚言乞賜寢罷不䝉聽納今又聞民間傳言皆謂陛下欲重修開寳寺塔伏念陛下必以邊事為憂必以蒼生為意豈有枉費施於無用然慮僧徒妄引靈恠以惑聖聦臣請悉推意而盡言之或以舍利有光引為靈騐臣謂浮屠舍利之所居不能䕶惜天火所焚一夕而盡豈可謂之神靈枯朽之物灰燼之餘或有光恠多亦妖僧之所為也或以此塔太宗皇帝所造理須修復臣謂昭應宫上清宫皆先朝所置天火一空巳不復修孰有非議若以禁中共出資財不費於官不擾於民臣謂一塔之費百萬緍一錢之資皆生民膏血當此多事匱乏之時豈可虛費若施於土木果有福利以之助軍須而寛民力此豈獨無福利哉况天火所焚大為警戒陛下當修人事以報之今大興工役是以人力而拒天意也伏惟陛下聖哲聰明必無此議人言不巳臣實憂疑所有開寳寺塔如有乞修復者伏望陛下特加深罪以絶欺妄慶歴四年六月上時知諌院上仁宗乞罷修寳相寺何郯臣伏聞朝廷近有指揮以寳相寺昨遭焚蕩許令寺僧緣化修葺盖朝廷重縻府庫之財又不欲遂廢其寺故有此處分以臣愚心思之其間尚有利害不可不具論列訪聞寺僧主事者素來豪猾頗善結託今既開端許其緣化彼將假朝廷之命以脇誘民庶多求財貨則京師騷然侵蠹蓋其意不唯以修寺為事將圖財用為奉身恣縱之資或民力不足則將因緣權倖復求朝廷出府庫之財以畢其事此必然之理也假使民力可辦於國家雖無所費亦不可許何者方今公私財力大屈凡起一事興一役未嘗不取於民外方之民巳困數歛唯京師之民幸而未加横賦緩急有事亦將不免固不可使之輕費家貲以奉土木不急之務朝廷頃年修寺舍佛閣巳費累巨萬一旦遂為煨燼况外議傳云寺僧常以婦人置於佛閣昨火發之際焚死者數人若傳者果信是朝廷廣費財以崇奉佛事適足為羣僧淫戲之所近日主首坐遺火罪止於奪師名紫衣寛假巳甚不可更啟其姦弊重耗民財臣按春秋或書災或書火其名雖殊然於變異之兆其實同歸定哀之間兩觀桓僖宫災漢儒皆謂天燔其所不當立今寺舍之災豈非以彫靡之過不當立而立天命燔之亦如兩觀等災以示勸戒若又重議修之非所以畏上天之譴告伏望陛下追觀前事之監深究異祥之來無興功以荅天戒其寺舍佛閣欲乞一切罷修用示聖懷抑畏之美臣以朴愚誤䝉擢進茍有聞見不敢不陳惟聖明不以狂妄廢其言則死生幸甚皇祐元年上時為殿中侍御史上仁宗論土木之功勞費歐陽修臣近者為京師土木興作處多乞行减罷尋准勑差臣與三司同共相度减定續具奏聞次今又聞聖㫖下三司重修慶基殿及奉先等屋宇臣伏見近年政令乖錯綱紀隳頽上下因循未能整緝唯務崇修祠廟廣興土木百役興作無一日暫息方今民力困貧國用窘急小人不識大計不思愛君但欲廣耗國財務為巳利恣侵欺於官物圖酬奨之功勞託名祖宗張大事體况諸處神御殿當盖造之初務極崇奉棟宇堅固莫不精嚴雖數百年必未損動近年巳來不住修換昨開先殿只因兩柱損遂換一十三柱前後差官檢計朝廷並不取信只慿最後之言遂至廣張工料蓋緣廣張得工料即多圖酬奬恩澤切以崇奉祖宗禮貴清靜今乃頻有遷徙輕瀆威靈要其所歸止為小人圖利臣見自古人君好興土木者自春秋史記歴代以來並皆書為過失以示萬世今小人圖一旦之利黷祖宗之威靈致人主於有過之地誰忍為之臣實痛惜臣因准勑减定於三司略見大槩開先殿初因修柱損今所用材植物料共一萬七千五百有零睦親宅神御殿所用物料又八十四萬七千又有醴泉福勝等處工料不可悉數此外軍營庫務合行修造者又有百餘處使厚地不生他物唯産木材亦不能供此廣費自古王者尊祖宗事神􅅘各有典禮不必廣興土木然後為能臣竊見累年火災自玊清昭應洞真上清鴻慶壽寧祥源㑹靈七宫開寳興國兩寺塔殿並皆焚燒蕩盡足見天意厭土木之華侈為陛下惜國力民財譴戒丁寧前後非一陛下與其廣興土木以事神不若畏懼天戒而修省其巳興作者既不可及其未修者宜速寢停况睦親神御殿於禮不宜作其事甚明别無禮典講求乞更不下太常便行寢罷其慶基殿如的有損漏只令三司差官整補不得理為勞績其奉先寺乞令寺家自修今垂拱殿是陛下常坐之殿近聞為無梁木且止未修諸皇親自火燒居宅後至今寄寓它居盖為將良材美木俯徇小人並於不急處枉費遂致合行修造處却致乏材伏望陛下追思累次大火常發於土木最盛處凡國家極力興修者火必盡焚且天厭土木而焚之又欲興崇土木以奉之以此福應未臻而灾譴屢降也伏乞上思天戒下察人言人言雖狂而實忠天戒甚明而不逺伏惟陛下聖德恭儉不樂遊畋凡所興修皆非嗜好但以難違小人一時之請自取青史萬世之譏實為陛下惜之伏望聖慈廣賜裁擇至和二年上時為翰林學士上英宗乞罷修感慈塔司馬光臣聞感慈塔巳有聖㫖折修五層竊以開封府界京東京西河北河東陜西西川等路自去冬少雪今春少雨麥田巳無所收昨得五月十三日雨方種秋田自後又經一月無雨萌芽始生隨復焦槁農民嗸嗸大率無食弃去鄉里流離道路雇妻賣子以接餱糧縣官倉廪素無蓄積贍給軍衆猶恐不足國無贏餘可以賑貸陛下當此之際所宜側身刻意降服損膳以救其患而更修此佛塔以費國用臣竊以為失緩急先後之務矣且此塔傾欹為日巳久借使更經數年不修於僧徒有何大患若百姓飢窮朝不及夕而國家不能收恤則老弱轉死溝壑壯者聚為盗賊當是之時雖有千塔將安用之夫府庫之財皆生民膏血茍非事不得巳安可輕費今有司既謟諛茍且曽不為陛下愛惜陛下又不以介意一皆聽之使四海蒼生果何所依仰臣愚欲望陛下親發徳音宣諭有司以今嵗旱灾且罷修此塔及其餘不急之費有似此𩔖者皆仰有司條奏以聞一切寢罷候年榖豐稔帑藏有餘然後徐議其事於聖政之初亦足以彰愛民之意為盛美之一事也治平元年五月上時知諫院上英宗論修内司乞添文臣一員吕誨臣伏以先帝臨御四十餘年未嘗崇宫室侈服玩事宴游儉徳之著天下共知臣竊見修内一司居常取索無度盖三司逐急應付物色亦無由㑹計以此因縁為弊耗蠹滋深以事騐之後苑曽修龍舡一隻費用不知紀極經今四年有餘尚未畢工先帝果為宴遊之備豈容數歲造一舡不成事何其久非但費用直恐成一時奢侈之事貽譏後世有累先朝之全德誠可惜也臣欲乞朝廷差官㸃檢龍舡修葺經今幾年㑹計所費錢物有無欺弊所有修内司自來係中官二人管幹伏乞减省一員以武官代之仍添文官一員委自三司保舉所貴拘轄官物不致枉有費用實為利便治平二年上時同知諫院兼侍御史知雜事上英宗論禁中修造司馬光臣伏見近日以來修造稍多只大内中自及九百餘間以至皇城諸門并四邊行廊及南薫門之𩔖皆非朝夕之所急無不重修者役人極衆費財不少此蓋陛下纉極之初禁廷之中誠有破漏不可居者陛下略命整葺理亦宜然而左右之臣便謂陛下好興土木之功遂廣有經度雖不至損壊之處亦毁拆重修務以壯麗互相誇勝外以希㫖求知内以營私規利萬一陛下更因此賞之則營造之端猝無窮巳國財必竭民力必殫臣切惟陛下新臨天下惠澤未孚於民而以好治宫室流聞四方非所以光益聖德也修造勞費不可勝數臣請具言諸州買木一事擾民甚多衙前富厚有産業之人毎遇押竹木綱散失賠填無有不破家者先帝躬履節儉宫室苑囿無有増飾故諸場材木皆有羡餘屢下赦恩放免買木以寛民力自頃修造倍多諸場材木漸成减耗有司於外州科買百端營致尚恐不足而工匠用之賤如糞土昔漢文帝惜十家之産罷露臺而不作今諸場前後所積竹木何啻十家之産陛下至仁若察其所從來得不為之愛惜乎况即今在京倉庫疎漏甚多皆以上件數處興功占使匠人物料未暇修葺致粟帛之𩔖大有損敗古者將營宫室宗廟為先廐庫為次居室為後今之所修緩急先後無乃未得其宜乎又皇子生而富貴年未及冠所宜示以樸素謹其所習今聞所修三位規模侈大又復過於祖宗之時皇子所居漢明帝曰我子何得比先帝子此恐非所以納之於義方也臣愚伏望陛下特降聖㫖應大内裏外舍屋即日不至大段損壊之處及不至要切如南薫門之𩔖並罷興修其皇子位只因舊屋夾截修整早令畢工不得過為宏麗且令那减匠人物料修倉庫之損壞者所有諸處監修之官自是本職更不與减年磨勘及轉官酬賞以塞泰侈之源使天下皆知陛下去奢從儉仁民愛物不亦美乎治平二年五月上時知諌院上哲宗乞罷中慜造寺張舜民臣備員宰屬無補歲月茍有所見不敢不言祖宗日逺淺聞狹見且以嘉祐治平及熙寧之初年揆之當嘉祐治平與熙寧之初在京寺觀幾何僧籍幾何今相距未三十年間創造修飾寺觀外來土居之僧徒無慮數倍之多也不唯其多愈見其侈彼百間不足居也我則以千楹彼丹雘不足觀也我則以金碧前恥不若後求勝之為朝廷則曰我一以官錢營造未嘗取民也為僧徒則曰我唯是化緣修建不敢仰於官也究而言之則財力是何從出哉皆百姓之膏血也漢文帝以露臺為中人十家之産罷而不為孫樵謂十農夫之耕十蠶婦之織終歲不能養一僧徒今一寺觀之興造又何止中人十家之産一僧徒之奉養又何止十農婦之耕織以古望今良可歎也尤不可忍者是以軍營地修造寺觀也祖宗開基有此都邑當其經始可謂勤勞罷方鎮之兵而聚之京畿其慮深矣漕輓金粟休養區處靜則雄中動則制外不畏一朝之警急熙寧併廢鞠為茂草有識視之猶或歎息今又委為寺觀其勢未巳太平日久兵愈消地愈空寺觀愈多茍有一朝之急則將驅僧道以禦之乎累朝勑令創造寺觀者徒二年造殿閣神祠者杖一百若殿閣有損壞而欲移修者申所屬驗實乃聽即不得以修造寺觀為名求化錢物此朝廷之法禁也非不明白外方州縣以時申明無敢慢易唯京師此法不行京師法令之所出乃猶不行前之日官造一寺觀後之日私起一殿閣疇敢誰何不知此俗何時而替也今所謂中慜者既為西塔又為東塔東塔未起又請造寺朝廷為之響應不知造寺何時而巳乎又安知今請之寺成而更不欲造寺修塔乎在國則以為蠧在巳則以為功於其起塔聚徒之處居處十數年之間返謂我為客寄棲泊簷廡之下備極恓惶此尤見罔上誕謾之甚也其居其處其飲其食享御凡百指呼王公大人有及之者乎不唯不及有似之者乎是欲窮極饜奪無有休已朝廷既許以空閑官地且京城之中何處有空閑之官地以待修寺者非居民則官府非官府則軍營民居官府既不可遷彼將不滿而再請則唯有空閑軍營可以從事矣此役一興上之宫邸衣冠之家下之閭閻商販小民又將征求割剥三五年間不得休巳比年巳來豐歉不常自冬徂夏雨淫為災京之東南千里𣺌瀰不止夏秋不成而復田廬漂沒今巳八月麥未施種闗中又以旱訴至于來歲尚未可知都市飲食儉薄小民失職衢巷之中稍有菜色遷流之民日有過者二聖焦勞軫惻分遣使臣賑恤之方未知攸濟豈可因之飢饉重以此徒蟊賊良民如水益深如火益熱其能賑濟唯在聖慈伏乞特賜指揮將八月四日指揮更不施行令中慜止居相國寺東塔或不自安即勒歸受業院舍仍乞申明勅令自此止絶修寺造塔之役不唯少阜於民財亦可仰消於天變貼黄成都歲作萬僧㑹近因臣寮上言巳有指揮止絶然在京一歲之間如萬僧㑹略有數十未聞朝廷略行呵止中慜作三春㑹日供萬人計其為費何止成都之百倍是國家之政令行於逺而不行於近伏乞朝廷申明禁約皆足增光聖政振起風俗元祐元年八月上時為右司員外郎宋名臣奏議卷一百二十八
