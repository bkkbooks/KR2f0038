body:
  text: 宋名臣奏議巻四宋趙汝愚編君道門君道四上徽宗論人君之要道三李朴臣聞天下有事不足憂無事深可畏人之情勞則思逸則肆故方其有事之時則憂懃恐懼之心能以危亂而至於治安及其無事之後則驕盈怠惰之氣亦能以治安而至於危亂舜之時七政齊於上百獸舞於下可謂安且治矣而君臣之間惴惴然常若憂危禍亂之將必至何也知治安之不足恃而驕盈怠惰且隨其後也臣竊觀國家聖作明述自古太平之盛未有乆於今日者此正天下所謂無事之時而臣所謂深可畏者也伏願陛下思創業之甚難懼守成之不易親睦九族風示萬邦好惡不留於心喜怒循理而動體仁愛之德而濟之以剛破險詖之論而平之以恕知君子所以致治而慮其難進則任之勿疑鑒小人所以致亂而防其易入則去之必速除心術之害然後可以育人材勵亷媿之節然後可以肅仕路辨嘗試之說然後可以來忠言師老而邊隙可慮莫若以自治爲守禦之䇿民困而國用不足莫若以節儉爲富庶之本觀俗化而通其變議政事而處其中執持權綱愛惜百姓日謹一日保其初心若是者皆聖政之所當急者也雖然所以致此者有本矣臣聞昔周成王即位召公爲之保周公爲之師朝夕輔導嘗致謹於起居言動之間唐太宗開文學選道德名儒十八人爲學士雖飲食遊宴十八人者未嘗不在其中退朝與討論古今所以成敗輙至日昃夜分故成王能光昭文武之業而太宗獨髙三代之後無他知所以自治而天下不足治矣臣誠知陛下聰明仁聖性所自得然而聖人者德配天地而志常不足不識陛下夙興視朝擁經左右詔德意志慮者誰乎陳前世廢興治亂請得據舊鑒新者誰乎退居深宫之中燕見間召所以備顧問者誰乎今縱未能逺法成周立師保之官宜且退倣唐制大開學館博選通儒耆德使侍經幄萬幾之暇孜孜與之講論正心誠意事天治人之道雖陛下聖性所自得者臣願益加聖學焉此臣之所謂本者也臣又聞人主不可求勝於天下不可廢天下之公議不可使心術失於毫釐之間此三者人主之要道也臣請爲陛下别白而言之所謂人主不可求勝於天下者何也臣聞自古有道之君不敢失一夫之心以天下者一夫所積耳是故爲其欲壽則與之輕刑爲其欲富則與之薄歛爲其欲逸則與之緩力凡上之禁令取舍惟恐一不當於天下之欲惡是以天下亦相與安之而巳也後世有若韓非商鞅者始道其君以勝天下之事其言曰權勢法制者人主之操術彼天下者必於我而聽命者也而屑屑若是是以天下爲匹夫役也故或勝之以擊斷或勝之以裒剥或勝之以戰鬭安忍自恣仇讎其民民不勝其害則相與合天下而勝之矣臣故曰人主不可求勝於天下一也所謂人主不可廢天下之公議者何也臣聞人主勢能生殺禍福人而不能變天下之公議堯舜三代之時則公議用於朝廷之上以賞功罰罪進賢退不肖而行於天下至其亂則廢於朝廷之上而竊竊然發於閭閻之間又其甚而設誹謗之法以杜天下之口則又不發於閭閻而鬱於人心最甚者莫若秦也立爲腹誹心謗之誅則欲併取其在人心者而去之也然且獨能禁於一時而卒大肆於後世何則所謂公議者其本與天地並立而是非出於人心之同然不可得而變者也知其不可得變而使或發於閭閻或鬱於人心或肆於後世孰若舉而用於朝廷之上行之天下乎臣故曰人主不可廢天下之公議二也所謂人主不可使心術失於毫釐之間者何也臣聞人主者天下之本也心術者人主之本也養之以道德仁義則終身而未足以爲功動之以回邪滛佚則一朝而不可勝其患是何歟道德仁義難全而回邪滛佚易溺也古語曰人主唯有一心而攻之者甚衆彼小人之欲禍天下必先敗壊其君之心術而後可以得志是故吾欲尚㳟儉彼則攻之以驕奢吾欲本仁恕彼則攻之以煩苛吾欲務厚下彼則攻之以聚歛吾欲用正直彼則攻之以佞柔彼其所以攻我者紛起並至人主又惡能以一心而保其所難全勝其所易溺者哉必主之以平照之以清持之以誠恐恐然若冦盜之將至而蚤杜其窺覦之漸也不然使之乗吾徘徊猶豫之時一投隙而得以自售則浸滛敗壊而終以不悟矣臣故曰人主不可使心術失於毫釐之間三也知此三者而大本立矣臣愚不勝惓惓之忠惟陛下留神省察以幸天下建中靖國元年因陳瓘薦賜對上殿上此劄上徽宗論豫戒六事陳次升臣噐非適用材不逮人夙䝉神考之誤知擢寘臺屬逮事哲宗皇帝又叨言責迄無善狀終以罪廢陛下即位之初捜羅人材振㧞淹滯起臣於煙瘴之地擢貳烏府今復除臣諫議臣自以天資樸拙學問迂踈辭章屢上天聽莫回拜命以來不遑夙夜思所圖報輙取古先哲王洎我祖宗之大猷作爲六事一曰體道二曰稽古三曰脩身四曰仁民五曰崇儉六曰用人以豫爲戒欲陛下念兹在兹使聖躬無過舉庶事無不治亦蒭蕘愛君之義也謹昧死上進體道臣聞天道運而無所積故萬物生帝道運而無所積故天下歸聖道運而無所積故海内服不可爲也不可執也無偏無黨而蕩蕩乎民莫能名是以先王揆才頒政量能授職設爲宰輔以經邦國以理隂陽以制卿士以撫四夷而又使夫通世務明治體多識前言往行者繩愆糾謬而議論之故能垂拱無爲而天下治彼昏不知或獨任宰輔或偏信諍臣或嘗推誠爲其所誤而兩棄之甚矣其惑也故書史特詳書爲萬世誡者如秦之李斯趙髙漢之王莽董卓唐之李林甫盧把皆其君之所獨任者至於姦佞滿前而不見大謀顚錯而不知名辱身危覆邦絶祀譬猶掩塞耳目而運股肱其可濟乎樊豐周廣之於孝安朱异之於梁武裴延齡韋渠牟之於德宗皆其君之所偏信者至於奪公輔之任挫宰相之威讒慝忠良稔禍社稷譬猶芟割其股肱而任耳目其可濟乎漢武以英雄之資即位五六年間號勝文景及其獨任田蚡也入奏事則語移日所言皆聽養成其罪遂致有吾亦欲除吏何不遂取武庫之怒爾後惟偏信嚴助朱買臣吾丘壽王主父偃之徒以辯論詘辱大臣至於交私諸侯潜藴譛訴刼殺親王訖未嘗有得其死者漢武之志豈以其嘗獨任宰輔者如彼偏信諍臣則又如此故兩踈之耶由是詭誕之士竒邪之術乗隙而進無正救者故窮奢極欲䌓刑重歛内侈宫室外事四夷信惑邪怪巡遊亡度哀痛之詔由是作矣臣聞仁宗之御天下也民到于今稱頌盛美而不置者豈有他哉不爲不執無偏無黨如天運之無積故民心歸而海内服也觀其用言者以罪范仲淹之黨及翻然而悟皆大用之唐介以彈文彦博貶未幾而復其官以衆言黜歐陽修因范鎮一言而留之機圎術妙可不務乎臣竊觀陛下即位以來獨任宰輔計行言聽莫之敢抗汲引黨與沸騰于朝臣恐其竊弄威柄而陛下厭之以致改轍而偏信諍臣以墮於漢武之失茍不出此若或委心腹寄耳目於近習則禍愈亟矣可不謹哉稽古臣聞堯舜之道載於二典者其目雖多而總其大美皆曰若稽古而巳而傅說之戒髙宗亦曰不師古訓于何其訓詩人之頌成王亦曰日就月將學有緝熈于光明夫帝王以一身而應萬有茍不該博古今以深究夫明君賢臣脩身治國之要雋功偉烈謀猷方畧之施與夫昏虐賊亂禍根罪首之由取是捨非執古道以御今其何以堪之哉是故堯舜之所以若而順稽而考髙宗之所以師成王之所以學者如斯而已矣若夫畧典墳之大道好雕蟲之小技競一韻之竒争一字之巧者此腐儒之所爲而藴德行志功名者鄙之况於帝王日有萬機而盡心於卉木之間極意於煙霞之表將焉用之隋煬帝尤善於文不欲人出已右薛道衡被誣而死則曰復能作空梁落燕泥否王胄之誅則曰復能作庭草無人隨意緑否又曰設令朕與士夫髙選亦當爲天子梁武帝父子尤刻意於文學乃至隂陽卜筮騎射聲律草𨽻圍棊無不精妙又何補於治適足致亂耳何則既騁此以爲智能矣則必恃此以驕慢天下故賢者由是解體而小人競學是以資嫵媚則向之所謂智能者翻爲亡身之具遺後世之所閔笑者臣聞陛下潜德藩邸時則已留意翰墨矣即位以來好爲詩曲以賜親幸鐫石鏤板傳播逺近臣愚過計恐天下之人不能盡知陛下由天縱之能不思而得肆筆而成妄以前代帝王之刓精竭慮於雕蟲篆刻之細爲比且曰天下之政未理而游心於是豈不爲盛德玷乎又恐用小人之能是者則士風靡矣臣願陛下痛屏浮華無用之文不使膠於心術惟一以切磨治道聽政之餘躬閲書史取其闗國家之興廢生民之休戚成者襲之敗者反之以資益聖治之道以懋稽古之德豈不偉歟脩身臣聞之詩曰鶴鳴于九臯聲聞于天鼓鐘于宫聲聞于外易曰行發乎邇見乎逺葢脩身之應也如此歴觀古之創業之君與夫中興之主承乎離亂之緒其俗其民乆已安於無治急之則怨緩之則偷賞之不勸刑之不變於斯時也而能肇造天命平滌九區恢廓宇宙致治之效可計日而待者豈有他哉葢明乎人可以誠感難以户說乃正其心以及身正其身以及國故道德由是而明風俗由是而美也何則人君之所恃以有天下者曰天命之民歸之賢者附之耳而天親有德民懐寛仁邦無道則賢者巻而懐之是三者皆非脩身則莫能致不然則昭昭之鑒可以矯飾僞行而欺之乎億兆之心可以輿金輦寳而召之乎有道之士可以髙爵厚禄而誘之乎非所聞也又况君者民之師表動静舉措發於中必形於外民影從矣將欲興崇禮義厚人倫而美教化者其可以言率之哉此孟子所謂君仁莫不仁君義莫不義也是故堯之民比屋可封桀之民比屋可誅豈民異習哉格之者異也魏武好法律而天下貴刑名魏文慕通達而天下賤守節豈士異尚哉格之者異也此皆前事之驗也其可忽乎仁宗嘗書無逸於邇英閤之屏歲乆而弊命王洙復書之且曰朕不欲背聖言乃置之左取孝經天子孝治聖治廣要道四章命蔡襄書以對於右欲使聖言時存乎顧眄雖以聲爲律而身爲度者何以尚兹其興事造業制度遺文獨超於百王之表宜矣臣願陛下遹追仁祖愼厥身修日新其德使百官有司相儆曰聖德如斯其可自怠巖谷之士相勉曰聖德如斯其可自棄黎民戒其子弟曰聖德如斯其忍犯上盜賊率其黨與曰聖德如斯其敢猖獗如是則成康之治可立而待也仁民臣聞天之視聽在乎民國之存亡繫于天王者之所以得天下者民歸之而天命之也所以失天下者民叛之而天禍之也是故民歸一德天乃命湯庻民子來天乃命周百姓弗堪天命殛桀民罔不欲䘮天訖商命黔首愁歎天亡秦祀百姓怨望天剪隋虐古人以水能覆舟朽索御馬爲戒者豈徒念民之孔艱則彊者爲盗賊弱者膏草野耶誠恐人君因之不免其身而毁辱及其宗廟困窮及其妻子也夫爲人父母而生靈塗炭爲人子孫而宗廟毁辱貴爲天子不能保其身以及其妻子豈宜忍哉是以盛王兢兢業業以圖治者誠畏此耳惟知畏此故惡衣菲食輕徭薄賦使民家給人足知禮義亷恥之尚舉天下而安樂之也頻年以來水旱屢作疾癘尤熾而兩河之民服役科須煩費愁苦而官司催科急於星火貪墨之吏從而誅求竊恐供者有限而取者無厭以有限供無厭天下一動變生無方此臣所以痛心疾首慄慄危懼也陛下雖屢形詔命備陳至誠惻怛憂民疾苦之意惠澤之下如置郵傳命今乃公然廢格是朝廷之恩奪於州縣可不痛哉自古所患者君澤壅而不下達民情鬱而不上通以致君勤恤而民不懐民愁苦而君不知至於離叛危亡者踵相及也臣願陛下申勑臺諫監司常切紏察嚴刑名以杜絶之如救焚拯溺以幸社稷崇儉臣聞禹卑宫室惡衣服克儉于家以有天下再傳而之太康則已色荒禽荒矣及桀之身竭百姓以爲傾宫而天下亡之唐明皇之初乗輿服御金銀器玩令有司銷毁以供軍國之用其珠玉錦繡焚於前殿及其晚節窮天下之侈不足以供其慾由是觀之創業之君昭儉以示子孫其末流猶入於滛靡始於克儉者其終猶至於驕奢况無以啓迪後人不謹其始者哉天下習安於侈靡乆矣於今爲甚貴介之族與夫兼并之家燕飲之物歌謡之具窮竒極巧以相傾勝銷金鋪翠旬翻月異一領之細至有千之直者此風其可長哉臣願陛下以道德爲麗仁義爲華以珍玩竒巧爲䘮國之斧斤以珠玉繡錦爲迷心之鴆毒芟夷藴崇之絶其根本痛自裁抑以禁之褒進朝士之約素清脩者貶退其滛荒驕奢者以敦薄俗顧不美哉昔孝文惜百金不爲露臺而天下衣食滋殖晉武焚雉頭裘而士敦朴素唐太宗以亡隋爲鑑而公私富給夫失節之嗟愚智同惡由恥不及其羣𩔖故勉强爲之以相髙耳人主儻能躬儉以率之其趣也孰禦臣聞僞蜀以珠飾溺噐太祖命碎之且曰以此奉身不亡何待嗚呼聖人之慮逺矣是豈特化當時之習使知其所尚哉用人臣嘗學稼於農矣凡播殖之宜耕鋤之功等則穫無或異茍隂陽之和雷風之動雨露之澤不時則與之同饑饉時則與之同豐穰由是而知天地之所以能成其大者豈非以其無私者耶是故先王法之其於用舎也能激天下之不善而使之退愧勸天下之良才而使之樂進以致治者抑亦法天地之無私故能成其私耳後世不該不徧之主鮮克由是其於用舎之際或崇勢地而抑寒門或任親宻而棄踈逺或採虚譽而廢卑賤或恱其才能而略歴試或重朝廷而輕四方或皆反是而益亂其故何也夫君子與小人所出不在於世禄與側㣲而言行非一事之可槩出處非一端之可見此愚智同知也奈何立賢而有方哉以謂必出於勢地與親宻耶而膏梁子弟至有不辨菽麥而髙車大馬以爲民上則版築之叟渭濱之漁何從致哉以謂必出寒㣲與踈逺耶而碌碌腐儒持方尺之紙書骫骳之文以享萬鍾則伊尹之伊陟周公之魯公何從致哉至或採虛譽而廢卑賤恱其才能而略歴試内外迭爲輕重是皆昏君之所爲可深戒者夫王者一視而同仁茍德義可尊無擇負販故管仲之舉二盗穆公之用由余齊威王以左右譽而烹阿大夫功成於當年名著於後世可謂明也已矣以舜之聖受命之初且猶歴試諸難况其他乎近古漢宣亦可謂急賢之主矣而蕭望之杜延年葢其所尤厚者或出而治民或出爲邊吏非惟煩使之以觀人才亦所以維持四方均内外勢也其治優於文景者不其然乎夫禄一不才爵一無功未病於國而終爲害者非惟其忌賢者進而害能者用也而賢能亦羞與同羣或恥居其下此其所以爲害也自古人君之於進賢也罔間親踈貴賤無有愛憎惟較其賢否耳故丁公於漢祖有活已之恩非徒不用而加誅焉唐太宗不恤秦王府官吏之怨嗟以爲朕與卿軰日所衣食皆取諸民者設官分職以爲民也當擇賢而用之豈以新舊爲先後哉臣願陛下稽古先王法天地之無私鑑漢祖唐宗之公正不以布衣寒士公卿子弟惟賢是用不及私暱無所偏徇庶幾賢者彚征以光左右建中靖國元年三月上時除左諫議大夫上欽宗論致太平在得民心陳公輔臣比縁奏對特䝉聖慈諭臣親自擢用之意令臣協心助成太平臣皇恐感激臣誠何人獲聞此語臣固當展盡底藴以補報萬分之一然臣自愧學術智識皆不逮人但有樸忠而巳惟陛下憐之臣嘗詢諸朝士大夫皆謂今日國家夷狄之患未除太平之治誠未易致也然以臣觀之所以勝夷狄者必在於治中國所以治中國者必在於得民心陛下無以臣言爲迂闊而不切於治也孟子嘗曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣然則民心烏可失哉臣嘗原先王所以得民心者無他莫先乎有德而已葢易感者羣心難忘者盛德唯聖人躬行於上者既有感民之盛德故百姓欣戴於下者斯有愛上之誠心非特如此因所欲而與之因所惡而去之皆所以得民之心者也是故善政者民之所欲也虐政者民之所惡也君子者民之所欲也小人者民之所惡也善政行之虐政除之君子用焉小人去焉此因所欲而與之因所惡而去之民心其有不得哉臣不敢逺引前古請以今日觀之陛下養德東宫十有餘年恭儉出於天性聰明本乎生知愛民之誠未占有孚動民之行不言而應盛德之至固足以感民心矣及乎一旦即位遂取其政之善者略施行之政之虐者略除去之忠良之君子以次召用姦惡之小人以次竄殛於是天下翕然莫不仰戴聖朝如重隂蔽天初見赫日如大暑執熱初濯清風豈有不得其心者故雖金冦之兵圍逼京師幾四十日而都城百姓咸願固守無一人有離心四方援兵不日皆集無一士有叛志以至於州縣之間人情帖然盜賊不敢乗間而起此何以致其然哉實有以得民之心而已陛下誠能効大禹之克勤體文王之節儉至誠以行之不倦以終之檢身不及從諌如流孜孜圖治日謹一日則其德愈盛而不替矣民心焉徃而不歸哉然後與宰執大臣相與講明求其善政盡舉行之凡所謂虐政蠧國害民者除之唯恐不盡擇其君子盡召用之凡所謂小人蠧國害民者去之唯恐不至則所以得民心者至矣夫民心既得則中國焉有不治中國既治則夷狄焉有不服哉此太平之功所以可圖也昔齊宣王畏諸侯之侵孟子曰臣聞七十里爲政於天下者湯是也未聞以千里畏人者也滕文公以小國間於齊楚孟子獨告之鑿斯池也築斯城也與民守之効死而民弗去孰謂陛下以一人之尊有天下之大尺地無非王土一民無非王臣區區以夷狄爲畏哉臣願陛下勉之但思所以得民之心彼誠不足畏矣靖康元年上時為左司諌上欽宗論君道本於民胡安國臣聞古者人君南面向明而治葢取諸離爲日至明之象也日食常數耳春秋每食必書何也日者人君之表茍有食之則暗而不明矣臣子倍君父則暗而不明妾婦乗其夫則暗而不明政權在臣下則暗而不明夷狄侵中國則暗而不明故春秋每食必書所以爲南面之大戒也昔漢元帝即位之初更制七十餘事以公田及苑振業貧民減樂府貟罷黄門狗馬除甘泉宫衛息角抵齊三服官節用愛民其稱甚美然紀綱日紊國祚日衰姦宄日彊黎元日困以知人不明失其操柄耳蕭望之社稷之臣而恭顯譛令引決於私室張猛忠正之士而自殺於公車劉向宗室之英也排擯詆毁令不得進用至於許史宦官則信任不疑大本既失雖有恭儉之小節何足以正紀綱隆國祚抑姦宄救黎元之困厄乎至如昭帝以齒則不逮孝元之長以文學則不如孝元之愽雅以奉身調度又未必如孝元之節儉也然能辨上官桀之詐信任霍光漢祚復安黎元按堵誠得君人之本耳陛下有温恭之德有儉約之行有憂勤願治之誠有好謀納諫之善過於漢元逺矣抑未知羣臣之邪正皆巳明白於胷中而不惑乎亦有疑焉而未之決也如其不惑則固善矣儻有疑焉而不決之於早則君子必逺小人必親天下之事去矣小人善窺人主之指意以求合君子則惟義之從而不茍是故古之明明德於天下者先正其心有所忿懥則不得其正有所好樂則不得其正有所憂患則不得其正有所恐懼則不得其正四者不除親小人逺君子必矣陛下誠能格物致知以誠意正心而鑒於春秋所書侵蝕之咎洞察正邪灼知忠佞如日中天臨照萬物則君人之本立而天下之事定矣靖康元年上時爲中書舎人宋名臣奏議巻四
