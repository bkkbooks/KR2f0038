body:
  text: 宋名臣奏議巻七十一宋趙汝愚編百官門薦舉上真宗論舉官當精擇舉主乃得其人李諮臣伏覩近降詔書應内職三司副使諸司使升朝官正言監察已上各於見任知州通判知縣縣令内奏舉一員者此蓋陛下順考古道啓廸鴻猷顧萬務之至繁思衆才之共理遂申命於執事俾各舉於所知冀英俊無沉陸之嗟而朝廷有得人之盛斯實治國掄材之要道也若乃舉不失徳式副於明揚如或稱匪其人曷資於委用㳟以詔㫖云升朝官正言監察已上即是南宫員外郎已上皆得舉官也伏以國家荷錫祚之珍符悟開先之寳系喬丘檢玉睢壤瘞牲修曠絶之上儀沛厖鴻之渥澤汪濊有同於雲露㴠濡靡間於蓼蕭絲綸併示於均禧簮紱盡令於進秩垂紳文陛雖謂於才升應宿仙曹或由於恩授亦有身居散地職異親民若令一槩舉官實恐未能作哲臣以謂舉官之道不如精擇舉主若得其人則所舉之官自然不謬矣昔鮑叔之薦管仲子桑之知孟明祁奚之稱解狐胥臣之任郤缺率皆成功立事垂範作則𫝊稱唯其善故能舉其類者葢謂此也臣欲乞自職諸司使及正言監察已上須歴任已來别無贓汚及不是見監臨場務者方得依所降詔勑舉官然後據其所舉之人載詢淑慝重覈幽明儻肆欺誣嚴行黜削如此則圭符之吏必獲於循良銅墨之官免貽於貪冒選衆責實或近於斯臣早以庸材遭逢亨㑹仰荷生成之施敢忘補報之心雖芻蕘之至微亦睿聖之攸擇天禧元年上時為禮部員外郎直集英院上仁宗論待制以上更不舉官事歐陽脩臣近准御史臺牒為臣寮上言待制以上舉省府推判官轉運副等事奉聖㫖去年勑命更不行用令臣知委者臣竊詳臣僚上言悉渉虚妄葢因近日陛下進退大臣改更庶事小人希合欺罔天聰臣試請辨之據上言者云若令兩制以上保舉則下長犇競之路方今上自朝廷下至州縣保舉之法多矣只如臺官亦是兩制以上舉以至大理詳斷審刑詳議刑部詳覆等官三路知州知縣通判選人改京官學官入國學班行遷閣職武臣充將領選人入縣令下至天下茶鹽場務㩁場及課利多處酒務凡要切差遣無大小盡用保舉之法皆不聞以奔競而廢之豈可獨於省府等官獨長奔競而可廢此其欺妄可知也上言者又云遂令端士並起馳騖且馳騖盡係小人豈名端士至如自來舉官之法多矣豈能盡絶小人干求况自頒新勑以來何人舊是端士頓然改節馳騖於何門而得舉乞賜推究姓名若果無之則見其欺妄可知也上言者又云不因請託人莫肯言此又厚誣之甚也今内外臣僚無大小曽受人舉者十八九豈可盡因請託而得自兩府大臣而下至外處通判以上人人各曾舉官豈可盡因請託而舉若云其他舉官不因請託只此敕舉官須請託即非臣所知也今兩制之中好人不少繁難要切之地皆已委信任用豈可不如外郡通判等不堪委任舉官况兩制之臣除此勑外亦更别許舉官豈可舉他官則盡公唯此勑則頓徇私請此其欺妄可知也又云每嵗舉一百五十人致人多而争差遣臣筭一人有三人舉主方敢望差遣一百五十人須一嵗内有四百五十員兩制為舉主今兩制不及五十人使人人嵗舉三人即纔各是一人舉主豈敢便争差遣况有不曽舉人者或舉不及三人者乞賜檢㑹去年終兩制以上舉到人數便可知其恣情欺妄也近日改更政令甚多唯此一事尤易辨明故臣不避煩言而辨者伏冀陛下因此深悟小人希合而欺妄也縁自去年陛下用范仲淹冨弼在兩府值累年盜賊頻起天下官吏多不得力因此屢建舉官之議然亦不是自出意見皆先檢祖宗故事請陛下擇而行之所以元降敇文首引國書為言是也當時臣僚並不論議近因仲淹等出外與朝廷經畫邊事䜛嫉之人見其不在左右百端攻擊不已此事朝廷不暇審察便與施行臣昨見冨弼自至河北縁山傍海經畫勤勞河北人皆云自來未有大臣如此其經畫所得事亦不少歸至國門臨入而出使河北官吏軍民見其盡忠而不知其罪狀小人惟務希合又不為朝廷惜事體凡事攻擊至今未巳况朝廷用人屢有進退豈有一人纔出便不問是非盡改所行之事若大臣一度進退政令一度改更如此紛紜豈有定制伏望陛下重察愛惜之私辨其虚實之說凡於政令更審改張臣檢察元降舉官敕意亦是於國書檢用祖宗所行之法今上言者却云因諫官論列致差遣不定而有更張事渉臣身不敢自辨然臣在諌省日言事無狀致今來臣寮皆以為辭豈可尚冐寵榮不能自劾請從黜罰以弭人言臣伏見陛下聖徳仁慈保全忠正之士進退之際各有恩意此所以能使忠臣義士忘身報國至死而不已也其今後臣僚希附上言攻擊前兩府所行之事乞賜辨明擇其實有不便者方與改更庶全大體則天下幸甚臣伏見去年八月二日元降勑命節文云比於國書擇諸治要見其官人之際尤重外臺之選又云然其進任必属近臣又云告示賞罰之命皆三朝之攸行此是元議舉官因依乞賜詳酌慶厯五年上時為龍圖直閣學士河北轉運使上仁宗乞在朝文武官舉州縣官二人為京官錢彦逺臣伏以祖宗以來慮天下人物沉滯孜孜蒐訪雖左右侍從亦許延拔俊良所以達幽隠而勸能否故敕命在朝文臣自知雜御史以上武臣自觀察使以上皆嵗得舉外任州縣官二人為京官而近年往往縁所舉之人或有改節踰矩刑罰并坐一切皆不論薦甚非詔書本意且唯賢知賢求士報國此古人勇為之事也茍不為權勢脅奪不為賄貨遷染操至公之心達天下之才彼當立効成功何由謫累能至皆因已不明乃謂無善可引致陛下恩澤之詔鬱而未宣為羣臣私計則精在國家逺圖甚失伏望聖慈令中書檢㑹先勑自文臣知雜御史武臣觀察使以上應合舉官臣寮職位姓名每季行牒移趣候舉奏訖即闗報御史臺如至嵗終不曽舉官並仰彈劾所貴英彦聚在本朝少廣得人之路皇祐元年上時知諌院上仁宗乞諸司長官舉寮屬傅堯俞臣伏覩兩制臣寮與御史臺審刑院大理寺等處更互舉逐司屬官頗為不便臣不敢委曲叙陳上煩天聽粗條一兩事伏乞詳擇頃者御史闕員凡一年半方得韓縝昨吕誨出臺又當學士院舉官填補逮今幾嵗而薦章未上葢縁人衆議論難合以一介之士須數人皆熟其材行其為留滯固無足怪使元勑日限遂為空文去年舍人院舉太常愽士李球充詳議官而審刑院乞選常歴法官者既而飛章論辨卒不復舉去就之間頗傷事體且諸司長官朝廷遴選其所付與固已非輕至於擇人獨不倚辨臣竊謂未為得也欲乞今後應諸司寮屬合舉充者一切委長吏自薦茍非其人及稍渉朋比重坐舉主則孰敢不盡其心况此事唐相陸贄論之詳矣儻䝉施行深愜公議嘉祐七年上時為殿中侍御史裏行上英宗乞以臣寮所舉官置簿親加選擇司馬光臣聞致治之本在於得賢天下至廣羣臣至衆人主不能徧知必資薦舉不得其實則邪巧並進官職耗廢是故設連坐之法以懲之此百王不易之道也伏見近降詔書令中外臣寮於文資官内不以職位髙下舉行實素著官政尤異可備陞擢任使之人又於諸司使以下至三班使臣内舉堪充將領及行陳任使之人此乃前世之令典當令之切務臣始聞之不勝慶抃既而議者皆言數年之前亦曽有此詔書所舉甚衆未聞朝廷曽有所陞擢今兹葢亦修故事飾虚名而已非有求賢之實也若果如此誠有何益臣愚欲望陛下盡將今來臣僚所舉之人隨逐人資叙各置一簿編其姓名留之禁中其副本降付中書樞宻院若遇文臣轉運使提㸃刑獄轉運判官知大藩府及武臣總管鈐轄路分都監知州軍等有闕除用舊資叙人外應係陞陟入上件差遣者並乞於今來舉官簿内次等資叙人中陛下親加選擇㸃定一人其不係今來薦舉之人不得差充上件差遣若陞陟以後他日職事敗闕不如所舉及犯贓私罪其舉主並依法施行雖見任兩府亦乞不以恩例特放凡係舉官不當降官及降差遣者未滿三年雖遇恩赦不得牽復如此則羣臣莫敢不盡公擇人天下賢才皆可得而官使矣治平元年十月上時知諌院上神宗乞令兩省官嵗各舉五人以備器使吕誨臣竊以用人不考其素舉類不責其實欲官清而事舉不亦難乎且如三院御史闕員例以本臺丞雜翰林學士連狀薦舉務在盡公其如類各不同議亦難合一有情弊害公尤甚臣欲乞朝廷委内外兩省官嵗舉五人録其所長隨而器使如風節可以充御史詞學可以備館職明敏可以剸繁劇循良可以為牧守武略可以任將領章上公車籍於二簿遇有員闕閱其所籍循名責實進擬數人御筆親㸃一名用之敢以匪人充薦者委有司彈紏重行黜責如不稱職正其保任之罪若此掄材有素一官闕則預擇之擇之詳矣而又絶其私徇之路進擢之恩一出於上宜其有補公朝任官舉能之術也熈寜二年上時為御史中丞上神宗乞詔内外之臣各舉所知范純仁臣聞唐虞之際俊乂在官成湯亦曰旁求俊彦詩稱濟濟多士文王以寜孔子論政則曰赦小過舉賢才是皆以舉擇人材為治道之先務也方今天下之廣士民之衆不減古昔而庶官得人不及前代良以舉用之道未能開廣選任既由政府多以資任采擇執政不過數人豈能徧知天下之士雖展轉採訪只亦得之私言未如公舉之審實也唐則天以僣竊之政務求多士以收人心廣令臣寮舉薦兼亦人得自舉選任之道固為太冗然猶多得賢俊下無遺材故姚崇宋璟之徒相繼而出開元之治實有頼焉况當陛下刻意勞心興滯補弊之際若不敷求賢才與之共政則何以致百揆時叙庶政惟熈者乎求才之術莫若特詔内外之臣各舉所知其大兩省已上於省府諸路職司之中舉堪充三路及臺閣清要庶寮之中舉堪充職司知州等人及諸監司臺諌省府舉堪充轉運判官知州等人亦許舉堪充清要之人各舉三員並於薦章之中終身保任一有不職與之同罪及前來應詔舉到未曽進用及臣寮所舉自代之人一處參較凡是庶官有闕便可選擇進用如此則俊傑彚進官無曠職上可以輔成聖政下可以激勸多士熈寜二年上時為同知諌院上神宗乞六部長貳自舉屬寮曽鞏臣伏以陛下本原周禮參之以有唐六典之書考諸當世之冝裁以聖慮更定官制以幸天下臣誠不自揆欲少助萬一雖無足取者亦足以致區區愛君之心竊觀於書其在堯典稱堯之徳曰平章百姓百姓昭明平其賢不肖功罪之分而章之以爵賞使百官莫不昭明者此人主之事也其在説命曰惟說式克欽承旁招俊乂列于庶位則承人主之志廣引人材進諸朝廷者此宰相之事也其在冏命穆王命伯冏為周太僕正其戒之曰慎簡乃僚無以巧言令色便辟側媚其惟吉士則使得自簡属僚以共成其任者此諸司長官之事也其上下之體相承如此所以周天下之務葢先王之成法也故陸贄相唐陳致理之具以謂百司之職至於副貳之官與夫兩省供奉之職請委宰臣叙擬以聞其餘臺省属僚請委長官選擇指陳材實終身保任其以舉授之繇各載除書之内得賢則有進考増秩褒升之賞失實則有奪俸贖金黜免之罰非特捜揚下位而已亦以閱試大官其所取之士既責行能亦計資望此贄於經畫之材近世未見其比其在相位所陳先務如此質之於古實應先王之法施之後世可以推行誠古今之通議也陛下隆至道開大明配天地立人極循名定位以董正治官千載以來盛徳之事也創制之始新命之官任之以彌綸所繫尤重其所更革著於甲令或差若毫髪四方受其弊或誤於須㬰累嵗不能救於選用之體尤不可假其非人且臺省長官僕射尚書左右丞侍郎御史中丞皆國之重任陛下所選擇而授今尚書既領天下之事員外郎凡二十四司用吏幾百員其餘属佐尚不在數中若使本司長貳之官自郎以下員有未備皆舉二人以聞以陛下之明其於羣臣材分無不周知取其所舉擇用其一其餘書之於籍以為内外之官選用之備庶幾為官得人足以上副陛下作則垂憲非常之大志且本朝著例御史中丞知雜至省府之長固得自舉其屬而館閣監司牧守之官亦嘗屢詔近位皆薦用所知名臣偉人往往由此而出則推而廣之求於故事實有已試之効其所薦之士采其一其餘書之於籍以備選擇猶舊闕御史一員聽舉一人其一不中選者亦以次甄進則稽諸累朝亦故事也伏惟陛下本周命太僕慎簡乃寮之意采陸贄臺省長官舉吏懇懇之論為本朝已試之法使先王之迹自陛下追而踐之如此則任衆之道隆進賢之路廣踈逺之士懐材者皆得彚征要近之臣奬善者皆得自達以陛下之臨照誰敢不應之以公以陛下之考覈誰敢不赴之以實既得其人授之以位然後陛下以公聽並觀分别淑慝以執中至信行其賞罰如此則允釐百工庶績咸熈可無為而致堯之平章百姓百姓昭明如是而已如臣之說為可采者其推行之法陸贄所陳惟陛下察其踈密詳加損益元豐二年十一月上時判三班院上哲宗乞以十科舉人司馬光臣竊惟為政之要莫如得人百官稱職則萬務咸治然人之才性各有所能或優於徳而嗇於才或長於此而短於彼雖臯夔稷契止能各守一官况於中人安可求備是故孔門以四科論士漢室以數路得人若指瑕掩善則朝無可用之人茍隨器授任則世無可棄之士臣誤䝉甄擢備位宰相遴選百官乃其職業而知識淺短見聞􅄶狹知人之難聖賢所重寰宇至廣俊彦如林或以恬退滯淹或以孤寒遺逸被褐懐玉豈能周知若専引知識則嫌於挾私難服衆心若止循資序則官非其人何以致治莫若使在位達官人舉所知則克恊至公野無遺賢矣臣不勝狂愚欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人此科亦許鈐轄已上武臣舉四曰公正聰明可備監司科舉知州以上資序人五曰經術精通可備講讀科有官無官人皆可舉六曰學問該愽可備顧問科有官無官人皆可舉七曰文章典麗可備著述科有官無官人皆可舉八曰善聽獄訟盡公得實科舉有官人九曰善治財賦公私俱便科舉有官人十曰練習法令能斷請讞科舉有官人應職事官自尚書至給舍諌議寄禄官自開府儀同三司至太中大夫職自觀文殿大學士侍制每嵗須得於十科内舉三人非謂每科各舉三人謂各隨所知某人充某科舉共計三人其狀云臣竊見某人有何行能並須指陳事實不得徒飾虚辭位在上者得舉在下之人位在下者不得舉在上之人臣今保舉堪充某科如䝉朝廷擢用後不如所舉謂如舉行義純固而身犯名敎節操方正而佞邪憸險智勇過人而愚懦致敗公正聰明而私曲昏闇經術精通而不能講讀學問該愽而空踈牆面文章典麗而鄙拙紕繆善聽獄訟而寃滯失實善治財賦而病民耗國練習法令而屢致出入及犯正入已􅂍臣甘伏朝典不辭候奏狀到日付中書省擇勤謹吏人專切收掌仍每科各置簿書時抄録年月日某官姓名别置合舉官臣寮簿嵗終不舉及人數不足按劾施行或遇在京外方有事須合差官體量相度㸃檢磨勘剗刷催促推勘定奪則委執政親檢逐簿各隨所舉之科選差令試管幹上件差使若能辦集即時别置簿記其勞績遇本科職任有闕謂若經筵或學官有闕即用行義純固經術精通學問該博等科人臺諌有闕即用節操方正科人之類則委執政親檢逐簿選名實相稱或舉主多或有勞績之人補充仍於本人除官勑告前盡開坐舉主姓名於後或不如所舉其舉主從貢舉非其人律科罪犯人正入已贓舉主減三等科罪者因受賄徇私而舉之罪名重者自從重法期在必行不可寛宥雖見為執政官朝廷所不可輟者亦須降官示罰即朝廷臨時因事特詔舉官謂若舉知河渠馬牧等之類不在十科之内者有不如所舉亦同此法所貴人人重惜所舉官皆得人元祐元年六月上時為尚書左僕射有詔從之上哲宗乞舉官限三日闗報御史臺上官均臣聞為國之道莫急於任賢求賢之術必資於薦舉所薦既愽則所得者多而四方之英才皆為國家之用天下豈憂不治哉自陛下臨御講修百度夙夜求賢以康庶務始詔侍從舉堪為諌官者各二人繼又詔薦中外之臣以充監司之選詔命始下從官人人皆務蒐擇端方謹厚之士以副朝廷旁求之意中外翕然號為得人近又詔侍從兩省左右司内外臺薦公明廉幹才堪理劇者俾治多盜縣邑其於求才可謂愽而詳矣然而愛惜好惡者天下之常情也好則相譽而忘其不善惡則相毁而忘其所可稱人情之所同也自侍從以及外臺固朝廷一時之選然捐私尚公以薦賢報國為已任者未必皆然也方陛下臨御之初人情未敢營私繆薦以取咎戾切恐法久弊生背公徇已之意作故舊則以情相望權勢則以力相軋薦舉之人唯權與舊則公路塞而真才棄矣昔仁宗嘗興孝廉之舉未幾薦者牽於私徇多非其人遽詔寢罷議者惜之檢㑹元豐令受勑特舉官者奏訖且以所舉官報御史臺近來報者絶少臣等不盡聞之考薦不實無由彈奏臣欲乞今後令章奏房及内外舉者奏狀到發限三日内闗報本臺庶幾臣等得以盡知薦舉非才職事􅈥廢與本臺監司考核有實者從中書籍記顯加譴罰每人三薦不實者特勑舉官不得參預如此則人人顧義畏法以妄薦為恥真才實行可坐而得而踈逺寒畯之士無不用之歎庶幾并謀合智以成太平之治實非小補元祐元年上時為監察御史宋名臣奏議巻七十一
