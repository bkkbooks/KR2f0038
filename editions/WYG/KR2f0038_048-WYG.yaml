body:
  text: 宋名臣奏議巻四十八宋趙汝愚編百官門宰執下上哲宗論吕大防劉摯范祖禹臣伏見陛下罷范純仁獨任一相古者三公官不必備盖充此位者未易得人陛下重惜如此古聖帝明王之意也然臣竊恐自此天下之事未免益勞聖慮太平之期未可望也何以言之臣觀今日大臣未有可副陛下任使倚信而不疑如司馬光吕公著者也吕大防未為執政以前人望不及純仁自居大位純仁頓失入望是以大防比之差少過失然其為人粗疎果敢好立崖岸簡於接物士大夫多不親附夫自六曹尚書侍郎兩省侍從皆朝廷所與共為治者也天子所頼者大臣大臣所賴者賢士大夫百官昔司馬光為相欲知選事問吏部欲知財利問户部凢事皆與衆人講求便者存之不便者去之此天下所以受其恵也比年以來未聞宰相召一人問以本職事亦未聞召一賢士大夫問以政事得失人民疾苦其監司知州自外來者亦未聞召一人問以州郡利害文書成於吏手官曹不敢爭執物情不接上下相蒙但聞専任吏人而已若有差失為害必甚臣望陛下時出聖㫁以儆飭輔臣無使大防得専制朝權無使臣下得乗間窺測聖意陛下深居帷幄皇帝未親庶政尤不可使宰相權重宜防其漸劉摯本以骾直敢言陛下所自拔擢自居中書人多言其有窺伺相位之心與同列論議多洩其語與言事官相表裡范純仁好用親戚摯不與之爭洩其語於言事官使攻之吕公著嘗與臣言摯若進徳修業何患不為宰相何湏如此摯之此心同列亦多覺之夫宰相者不得已而為之當以為憂若以此心得之必無善政矣然則朝廷何所賴天下何所望哉又識别人物更不及純仁純仁上則為大防所制下則數為摯所中懦而不立以至於罷夫陛下極天下之選取於千萬人之中得此數人而猶如此臣以此知人才之難也昔神宗以陳升之有才智既用為相問於司馬光光言升之才智誠如聖旨但恐不能臨大節而不可奪爾昔漢髙祖論相以陳平知有餘然難獨任真宗用王欽若丁謂亦以馬知節參之凢才智之人必得忠直之人從傍制之此明主用人之法也今陛下専任大防而劉摯有欲相之心必與大防協同此非相參之人也近用左右丞二人又皆人望素輕風節不立陛下臨御以來所用執政惟韓縝作相不合公論餘皆天下之望其間雖非全徳亦皆有可稱近所用二人殊不類前後差除以臣料之自此廟堂議論必無異同朝廷政事一决於大防與摯無有敢違之者如此則公道何由得立臣權安得不盛恐非國家至計此臣之所深憂也帷陛下稍自攬權綱無使威福之柄漸移于下臣非敢離間君臣陛下以諌官為耳目若有所聞見不以告陛下則上負任使若朝廷政事自此日勝一日豈特大防有賢相之名乃宗社生靈之幸萬一如臣所慮豈可不使陛下預知之哉臣不勝憂國惓惓之心貼黄又言蔡確罪惡初達朝廷大臣皆不以為意及諌官論奏陛下已怒然後大防奉而行之純仁與王存則固執前見議論立異此所以不同耳夫大臣乗人主喜怒以起立勢威則人皆畏之人主唯見其順已而不自覺權移于下古之強臣皆成於此惟陛下深謹喜怒無使臣下得乗其便而作威福也元祐四年七月上時為右諌議大夫上哲宗論執政事簡得留心逺業劉安世臣聞非至簡不足以待天下之至繁非至靜不足以制天下之至動故荀卿有言曰論一相以兼率之人主之職也又曰相者論列百官之長聴百事之要終嵗奉其成功以效於君推此言之則人主擇輔臣輔臣擇庶長庶長擇僚佐以次選掄不容虚受是以所任愈隆而所擇愈簡所擇愈簡而所得愈精此堯舜三代之君所以垂衣拱手不煩事詔而天下晏然以治者用此道也秦漢以來官失其守居宰相之位者或不知其任在庶長之列者或不専其守因循至今流弊日積臣請為陛下詳言之昔魏晉以後采擇庶官多由選部故晉之山濤為吏部尚書中外員品多所啓授宋以蔡廓為吏部尚書黄散以下皆得自用廓猶以為薄已遂不之官唐制五品已上宰相商議奏可而除拜者則以制敕命之六品以下則吏部銓材授職然後上言詔㫖畫聞無所可否謂之㫖授開元中吏部置循資格限自起居遺補及御史等官猶並列於選曹其後倖臣専朝舊典失序故陸贄抗論以謂捨僉議而重已權廢公舉行私恵是使周行品庶茍不出於時宰之意者則莫致焉此乃唐之弊風不可不革也臣伏見近來堂除差遣多取吏部之闕不問職事之輕重才品之優劣為人擇官殊失大體如承議郎王績堂除管幹左廂公事承奉郎劉秩堂差權河南知録若此之類名品至卑吏部選差固不乏使何煩廊廟一一柬求臣恐三省之事日益紛紜執政大臣汨於細務則朝廷安危之至計禮樂敎化之大原使天下回心而鄉道者將何暇以及之矣然則豈所以稱陛下圖任老成委任輔弼之意哉伏望聖慈明敕三省别議立法今後除兩制臺省之官寺監長貳以上并諸路監司㳂邉郡守之𩔖所係稍重者令依舊堂除外其餘一切歸之吏部所貴執政事簡得以留心於逺業而選部不致失職元祐四年上時為左諌議大夫上哲宗論宰相以禮去者可以復用梁燾臣伏見陛下眷遇大臣極其恩禮不忍聞其過惡輕奪其位使傷其進退之名所以委曲容覆真有天地之賜為大臣者何以副陛下之深仁乎祖宗之時宰相率二三年以禮去今之宰相率二三年以罪去禮去者顧義重雖有功而必去罪去者顧利重非有罪則不去以禮去者可以復用以罪去者不可以再來盖祖宗之大臣皆以名節自重一舉動必存大體必副人望不敢専寵禄以自愛不敢挾權勢以自强日思以得罪為憂以妨賢為懼故率二三年自引避位朝廷褒荅自有恩數其優者為使相其次猶湏超進數官為大學士其在位也名益重望益髙眷益厚一旦復用則中外之民莫不以為宜皆為朝廷助喜此所以朝廷重也其間亦時有貪鄙之人當去而不去以固位戀禄清議巳不容矣以之招致人言暴著過惡從而罷遣之殆不過一諌官一御史論之則巳不能安矣如臺諌合攻連擊者衆則終身不得復用故以禮去者多以罪去者少大臣既巳法小臣從而亷士大夫化之皆磨勵振㓗以節操相高風俗純美由此道也比年以來大臣皆以竊禄偷安為計寖以成風雖有大過猶巧自掩盖恐其失位一二人言之不知求去臺諌官共言之又不肯去至於紛紛不巳上不能止其言竟出其章疏然後請退聖恩因而聴之公議為之鄙薄私友為之歎惜䘮其節守敗其名譽冒其過咎終以疎絶朝廷雖以乏人而欲用之疑其姦心之不測畏其清議之不容卒不敢用既以有罪不可復用必用其以次者安得人材衆多而為用乎朝廷將無人可用矣此不可不思也祖宗之時輔相之材非不多也然而進者必以其賢退者必以其禮去而復來所以用之不足也臣近嘗建言乞陛下許吕大防以自請罷去相位者正為如此若蒙陛下許吕大防令以禮去不唯大防得其進退之道且掩覆其罪狀不為臣言之所指擿不為公議之所不容使之飬望於外它日用之必無敢議者設有議者其跡以無罪而去陛下主張之無累知人之明矣是於大防真有天地之賜足稱陛下眷禮之本意也非獨以安大防也又以示後來之人皆思以禮去位而漸以名節自重如祖宗之大臣也朝廷由是尊矣伏望聖慈以安危為計治亂為念以養大臣之譽望為意以勵搢紳之廉隅為術保全大防今日之去存全大防它日之用兢謝旱烈之譴銷厭愁怨之氣上敬天道下順民心中不失君臣之恩一舉而三善得豈不美歟伏惟聖神采納天下幸甚元祐三年四月上時為御史中丞上哲宗論劉摯蘓轍王巖叟臣伏見右僕射劉摯以人言避位于今累日中外之議惶惑不寜切以摯自陛下垂簾之初首當言路條陳政事排斥姦邪無所顧避天下知其忠故不次登用天下之人莫不以為當而大姦在外含怒蓄怨欲食其肉者非一二矣今朝廷清明天下安靜固出于兩宫虚心求治開誠納諌之效然一時戮力盡忠之臣摯居其最寔陛下同心一體可保終始無變之人也自非罪狀顯著衆所不容豈可因一二偏詞輕示遐棄臣恐適足快群姦之意而失衆正之心非所以為國家計也臣每患朝廷之上享陛下髙爵厚禄者雖多而與陛下同心協意者則少今就少之中又將退斥臣反復念慮竊以為憂蘓轍素有時名元祐以來排邪助正竭力亦多今若止因一舉官失當便行罷逐恐於陛下進退大臣之體有所未允况言者别有所懐未易可測臣不知披肝瀝膽事陛下之日乆者為可信邪足一踐言路未得其腹心者為可信邪安知其間無朋邪挾私而隂與群姦為地者陛下何不稍緩其事試加考察將必有所見知臣言之不妄古人有云天子重大臣則人盡其力輕去就則物不自安願陛下曲加含忍以全終始之遇且使小人不能有以闚陛下臣遭遇陛下非常之知不與衆人比既有所見不忍負恩黙黙自守臣本欲候來日垂簾面奏以當行事齋戒不獲登對湏至冒昧天威進此狂瞽惟陛下裁擇幸甚貼黄臣度言者欲盡塞衆正之口不過以朋黨加之先惑聖意然自古姦人之欲排䧟善良者莫不皆為此無形之説以肆誣罔陛下博覧書史必能深察元祐六年十一月上時為簽書樞密院事上哲宗論選用股肱須極天下精選范純仁臣昨日面奉徳音詢及將用之人臣愚雖不足以賛陛下則哲之明然不敢不竭心極慮仰副聖問湏至再三陳奏少補萬一伏縁聖政之初選用股肱正如舜舉臯陶湯舉伊尹湏宜譽望出衆才徳過人方可以倚辦國事化服羣心縱未能逺比古人亦湏極天下精選不宜參以中常之士上誤聖人之徳伏望陛下深垂聖念少察愚𠂻審推舉直之方以補安民之化元祐八年上時為左僕射上哲宗乞留范純仁張舜民臣聞物之危者莫甚于綴旈朝露事之急者莫過于拯溺救焚以今日朝廷之勢言之彼二事者猶未足喻也東朝在殯陛下初總萬機求助之心夙宵在疚天下之人傾耳拭目以觀盛徳日新之政而大臣不安小人得路數日巳來朝暮忷忷至於市井行路之人皆謂宰相爭議不叶出而避位在於平日已驚動耳目况大行太皇太后殯塗未乾股肱之間已見攜貳若不有小人乗㣲間諜亦未必至此又見已經雙日御殿别無宣押指揮使謂聖意已有厚薄純仁必不肯任浮論百端不可縷數然臣愚獨念大行太皇太后召范純仁於服藥之前而陛下聴其去於大殮之後不唯君臣去就之分如此之速小人間諜之謀由此得行使朝廷治亂之端自此遂分而於聖徳初政亦有深累在臣之愚與凢百姓在廷之士都邑四方之人寜不為陛下惜也嘗觀前代去留大臣所繫甚重近日劉摯蘓轍之行有如遺芥中外之人不知其由識者嘆駭疑惑至今未已今純仁又去安知居者之得自安乎一年再出相二年三出相非朝廷之美後雖有臯䕫稷契誰肯盡心竭誠以事陛下乎上則大臣自疑下則小人乘間朝廷之勢不言可知以臣之愚不若且留純仁仍乞陛下面戒二相使之叶力濟務勿聴間言内足以伐小人之謀外則以厭四方之望使天下之人咸曰純仁欲去陛下能留之小人有謀而陛下能伐之惟君知臣惟睿作聖寜不美哉臣職不在言路身非邇臣獨區區之誠見危急之㣲萌幩朋黨之傾扇痛東朝之委託憂陛下之孤惸伏思雪涕出位失言不勝迫切之至貼黄臣於元祐二年嘗備員御史上殿親聞大行太皇太后宣諭祗為官家年㓜臣寮且要盡公勿令小有朋黨今聖訓在耳仙遊未逺而朋黨巳成追誦徳音不勝摧痛元祐八年十二月上時為左司員外郎上欽宗乞復李綱舊職陳東等臣等聞任賢勿貳去邪勿疑者社稷之主也奮不顧身死生以之者社稷之臣也妬賢嫉善妨功害能者社稷之賊也陛下聦明英睿獨智旁燭賢邪判然天下戴以為社稷之主而在廷之臣奮勇不顧以身任天下之重者李綱是也所謂社稷臣也其庸繆不才忌嫉賢能動為身謀不恤國計者李邦彦白時中張邦昌趙野王孝廸蔡懋李梲之徒是也所謂社稷之賊也陛下斷然不疑㧞綱於九卿之中不一二日任為執政中外相慶知陛下之能任賢矣斥時中而不用知陛下之能去邪矣綱任而未専時中斥而未去復相邦彦又相邦昌自餘又皆擢用何陛下之任賢猶未能勿貳去邪猶未能勿疑乎今又聞復罷綱職事臣等驚疑莫知所以綱起自庶官獨任大事邦彦等疾如仇讎恐其成功因綱用兵小不利遂得乗間投隙歸罪於綱然一勝一負兵家常勢小勝固未足為喜而小挫亦未足為辱况示怯示強竒謀祕計豈可遽以此傾動任事之臣臣等竊聞邦彦時中等盡勸陛下他幸見事有急各陳乞親黨外任遣家属随之逺去豈身為大臣不能以一家死社稷之難其意止欲倉卒之際各保妻孥耳諸大臣一鼓而倡之百官有司群起而和之遂令京城之人閧然騷動弗安其居若非綱為陛下建言則乗輿播越在外宗廟社稷已為丘墟生靈已遭魚肉陛下將有棄宗廟社稷之名賴聰明不惑特從綱請中外聞之雖愚夫愚婦莫不舉手加額仰歎聖徳之盛綱之力豈曰小補之哉是宜邦彦等譛謗忌嫉無所不至臣等伏見邦彦等享高爵厚禄為日最乆坐視天下之弊未嘗肯發一言以圖補報至如王黼童貫蔡攸共興北師唯鄭居中力爭以為不可輕舉而王安中者力賛其役邦彦等軰略不可否於其間寔隂助黼以貽今日之禍陛下新即寳位遽有變亂之虞邦彦等不引咎歸已自求貶放而尚偃蹇固位忌賢嫉能陛下若聴其言斥綱不用則宗社存亡未可知且敵人既和之後尚敢縱兵肆掠屠我畿内桀驁之性急則走險緩則跳梁聞陛下任綱自知滅亡無日請和之意必更激切而邦彦等乃得藉口以沮成謀綱罷命一𫝊士大夫失色兵民騷動至于流涕相弔咸謂不日為敵擒矣則是陛下罷綱非特墮邦彦等計中又墮敵計中也聞邦彦等尚執前議必欲割地與之曽不知祖宗土地得之甚難又况河北寔朝廷之根本而三闗四鎮寔河北之根本若棄三關四鎮是棄河北若棄河北則朝廷復可都大梁乎自真宗仁宗兩朝以來北敵盖有割地之請矣朝廷寜屈已増幣以塞其欲至於土地一寸不肯與之今陛下即政之初邦彦等便欲棄祖宗境土不知割與太原中山河間以北十有餘郡之後邦彦等能使金人不復叛盟乎綱孤立無助天下共知其可以大用臣等請為陛下言其一二頃嵗京師大水自宰相大臣下及百官爭占舟船或結木栰為避水計獨綱慷慨為上言之至為姦臣譛逐數年不用前日邉報初至宰相骨肉盡皆出京獨綱妻孥未嘗遷徙陛下方深北顧之憂而左右無一人為陛下請行者綱獨奮然而以身任之綱之用心可見矣陛下何忍信朋邪之計而斥正人端士乎若以綱用兵小挫遂當廢罷則童貫創開邉隙以貽今日之禍近又引兵數十萬以事雲中之役㡬於匹馬隻輪無還者朝廷曽不議貫之罪何綱小挫而加罪乎一進一退在綱為輕在朝廷為甚重今日宗社安危在此一舉幸陛下即反前命復綱舊職以安中外之心付种師道以閫外之事陛下若以臣等之言為未足取信試御樓呼耆老一問之呼軍民一問之呼行道商旅一問之試咨有官君子使言之必皆曰綱可用而邦彦等可斥也用舍之際陛下不可不審靖康元年二月東為太學生上此疏上欽宗乞擇相雷觀臣為諸生時權臣務鉗天下之口臣之父兄師友聞引古論事小有激昻則必深戒力止以謂毋多言以取禍其後臣入太學九載具知權臣果能以身障言路恣其姦惡而臺諌官徒備員以進不聞一言使祖宗紀綱法度掃地殆盡天下之民咸不得其所致敵人内侵兵連禍結以成今日之釁者皆言路不通上下蒙蔽之失也善乎臣之友生高䦎之言曰天下之利害當使天下之人議之天下之人得以利害之言盡聞于上則當言之人雖欲緘黙取容不可得也言官得以盡其職則執政之臣雖欲擅權為姦不可得也陛下臨御之初即下求言之詔詔下踰月上封事者不減千數然未聞以某人言某事寔為利而行之某人言某事寔為害而罷之豈求言之詔徒有文具邪抑獻言者皆猥冗不足取邪無乃付之有司而執事者尚狥前弊沮遏而不行邪此獻言者不能無疑也當今所急止一言而已論相是也國家崇寜以來相非其人官以𩔖進私昵者官之惡徳者爵之賢能之士反斥逐不用目為姦黨其作亂不待今日而後見識者已分於崇寜之初矣雖欲正刑明辟以嚴誤國之誅固自無及言之復何益乎然不䆒其為亂之階則莫知其撥亂之道臣為陛下略指前日宰相姦術之大者言之假紹述二字而行已之作為假國是二字以主已之好惡假享上二字以逞已之私欲進直言者以狂妄斥立正論者以邪說禁善阿䛕者以純正用姦術既行無所忌憚敗壊法度紊亂紀綱靡所不為莫可勝舉致使强敵㡬危社稷而陛下受莫大之屈辱者皆前日相非其人之故也陛下即位以來見于施為慨然有求治之心而論相之職亦未為稱此臣所以謂為當今之急務也白時中老繆無用罷相之日公議稱快咸謂陛下必能擇賢而相之乃但逓遷李邦彦張邦昌爾士大夫皆言二人亦前日輔相之無狀者察其操術不過持兩可以固養恩寵而巳前日輔相之無狀姑置勿論第自陛下即位以來一二大事彼曽有慷慨一言乎敵所言者從之所欲者與之不聞有忠義一言奮然以折敵人之心其何以威撫四夷而使之畏服乎蠧國害民起戎招盗十數巨姦天下之人思食其肉不饜而二人初不敢誰何至因人言稍行罷黜詎能不畏彊禦而退不肖乎陛下知求言從諌而未知論相何先後緩急之失序邪臣又慮有為陛下言者必曰邦彦邦昌曩在政府亦嘗以燕雲不可圖童貫不可再遣今果如其説義當相之臣以謂不然二人在政府日果知如此則當力陳其不可之狀至不見聴則以死繼之縱未能死則宜引去然卒持禄不諍不過畏童貫之禍也今日之禍皆前日肉食者之過豈可不擇人而用之乎東漢陳龜曰三辰不軌取士為相四夷不㳟㧞卒為將今何等時而遞遷貴臣邪自祖宗以來相臣多因言官論列直指某人可相某人不可相無非天下之公議此最為我宋之盛典崇寜以來臺建一蒙時相㧞擢則多懐私恩無有直言者矣此亦不可不察也今日之相莫若陛下誠心廣求虚巳任用勿謂天下無其人也觀為太學生靖康元年二月上尋有㫖賜出身除館職上欽宗論卜天下安危在置相得失許翰臣嘗學易考觀否泰之象則知君子小人未嘗相無于天下雖堯舜在上世必有小人桀紂在上世必有君子其所以更為治亂相反如此者堯舜錯之得冝而桀紂置之失當也故錯之得宜則君子小人並受其福是以皆謂之泰置之失當則君子小人各窮于禍是以同謂之否所謂當與不當要在内外之間而巳夫泰内君子而外小人則其象内健而外順否内小人而外君子則其象内柔而外剛剛者君子之徳柔者小人之徳也使君子有為於内則内徤可以制天下使小人委聴於外則外順而天下從之何謂内外𫝊曰暌外也家人内也否泰反其𩔖也故人君則必與小人暌而以君子為家人者𩔖固相反雖然人君以一人之明而欲盡知天下之君子親之使為家人又欲盡察天下之小人暌而逺之則雖堯舜之世猶難于此然圖其易亦必有要矣舜選於衆舉臯陶則不仁者逺湯選於衆舉伊尹則不仁者逺故易曰君子有觧小人退也前日君子小人上下倒植内外逆施奸罔充斥臣未易遽論而猶竊恠陛下即位以來朝廷之間未見泰象臣是以請先論之如近日王孝廸之昏庸已汙翰苑而擢中書蔡懋之頑因以敗樞府而猶遷右丞四方聞知悵然失望此則陛下既悟而罷之矣今又相張邦昌於廟堂則是古之所外今之所内𩔖進之禍豈復勝言臣切謂陛下正始之時置相不可不謹譬如植木始得嘉木而植之則嘉木有種其後材將不可勝用始得惡木而植之則惡木日滋其極將至無復取材且君臣一體相待而成自昔未見有君無相而能成大業者也故陛下欲為漢文帝則相必有陳平周勃為唐太宗則相必有房元齡杜如晦欲為堯舜三代之君則必有堯舜三代之佐而後紛無不觧為無不成將前卜天下之安危在始觀置相之得失故願陛下考而謹之先王知人之道要在公聴並觀驗左右之言於諸大夫驗諸大夫之言於國人驗國人之言於其人可見之迹灼知其賢而用之此孟子用人之法而易所謂泰者故臣輙敢先陳之以為治本靖康元年二月上時為翰林學士上欽宗論將相當同心協謀余應求臣嘗謂自古人君出應帝王之運者必有同心一徳之臣以大公至正相與去私情由直道謀議雖異不害其為同趣操雖殊而不乖於用故能輔佐彌縫經綸圖回以定禍亂以寜邦家以立法度以施政教成莫大之功定可乆之業請舉古事以明之昔唐房杜之相太宗也元齡毎議事必曰非如晦莫能籌之及如晦至卒用元齡之䇿盖如晦長於㫁元齡善謀兩人深相知故能同心濟謀佐佑帝室姚宋之相明皇也崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸於治故能輔佐開元治隆中興夫三百年間輔弼者不少稱良相止四人非唯君臣遇合之難而輔佐之臣協心共謀者為尤難也其次又有武夫勲臣亦能體國徇忠釋私忘怨者若亷頗藺相如之於趙冦恂賈復之於漢郭子儀李光弼之於唐是也夫平居無事之時執政大臣猶欲其同心如此又况於艱難未定之時乎武夫勲臣猶能釋私忘怨體國徇忠如此又况儒學之士以道義相許以公忠相望以古人事業相期本無怨隙嫌疑也豈一旦各據勢位遂乖素願務狥其私而固為異同者乎㳟惟陛下以甚盛之徳撫中興之運時否而望泰法敝而望變民困而望息國危而望安夷狄四侵而兵未觧財賦乆匱而用益急賢否渾殽而未辨名器冗濫而未清綱紀已弛而未振號令數易而未孚焦心勞思忘寢與食其憂勞天下如此是冝執政大臣仰體至意如房杜姚宋同心相濟以圖治功之時必無宿憾私怨如亷藺賈冦郭李之所存也然而議論趣操不能無異要當公心正念以大公至正之道相與無置私情於胷中則善矣又况人之受才自有限量不可同也陛下今所注意而任用者不過一二大臣以臣觀之亦各有所短呉敏失之怯李綱失之果徐處仁失之苛失之怯者才不足也其弊則優柔懦弱而失事機失之果者器不足也其敝則勇銳於事而或過舉失之苛者識不足也其敝則煩碎伺察而失大體若能各去其短無任私情無昵私惡協心共謀才不足者去其怯而克㫁器不足者去其果而謹畏識不足者逺謀慮而務大體庶可安靖邉境為中興之助矣非特此也种師道姚古皆邉鄙老將有謀略威望可以倚任初召師道都人待之如望嵗焉陛下既加信任又畀姚平仲以節平仲失利非師道罪也及姚古至併與師道罷之誠謂兩家世為仇敵不可並用臣謂亷藺賈冦先國家之急而後私讎子儀光弼握手涕泣正在今日陛下何不以此義喻之而兩任之乎兵革方興老將氣沮謀格而不用非所以盡人謀也欲望聖慈下臣此章示將帥大臣儻皆能如臣所云陛下雖未能深居髙拱亦可少安矣陛下更冝留意論相以尊朝廷安中國以御逺夷非特為諸臣之幸寔宗廟社稷天下蒼生之幸也靖康元年上時為監察御史宋名臣奏議巻四十八
