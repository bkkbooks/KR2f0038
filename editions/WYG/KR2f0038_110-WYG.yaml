body:
  text: 宋名臣奏議巻一百十宋趙汝愚編財賦門新法二上神宗乞罷制置三司條例司吕公著臣竊以三代聖王之政至於乆則不能無弊在審所救云爾國家享天下逾百年凡當世舉可以修舊起廢興利除害者固非一日至於近日改更宗室法度省罷銀臺奏白減外親奏薦處置疲癃官吏之𩔖中外之論孰曰不然惟是制置三司條例一司本出權宜名分不正終不能厭塞輿論蓋以措置更張當責成於二府修舉職業宜倚辦於有司若政出多門固非國體宰相不任其責則坐觀成敗尤非制世御下之術兼臣昨來已曾論列所有制置條例一司伏乞罷歸中書其間事目有可付之有司者即付之有司熈寜二年十月上時為御史中丞初陳升之既拜相遂言制置三司條例司難以簽書欲令孫覺吕惠卿領局而升之與王安石提舉安石曰臣熟思此事但可如故無可改者曩時陛下使輔臣領此局升之今雖為宰相亦輔臣也則領之何為不可升之曰臣待罪宰相無所不統所領職事豈可稱司若制置百司條例則可今但制置三司一官條例則不可安石曰今中書支百錢以上物及轉補三司吏人皆奏得㫖乃施行至於制置三司條例何故乃以為不可上曰乃者陳升之在宻院今俱在中書倂歸中書如何安石曰令分為一司則事易商議早見事功若歸中書則待四人無異議然後草具文字文字成須遍歴四人看詳然後出至於白事之人亦須待四人皆許則事積而難集陛下既使升之與臣執政必不疑升之與臣專事而為姦况制置司所奏請事皆闗中書審覆然後施行自不須倂入乞降指揮今取索三司條例看詳具合制置事件聞奏則制置條例乃人主職業制置條例者所謂制度也禮記曰非天子不制度臣不知制置條例使宰相領之有何不可且升之自以為宰相當稱提舉臣有何故乃隨例如此名若令臣與孫􅁴吕惠卿為一等又非體也升之又欲令蘇頌及孫􅁴吕惠卿領局改為看詳或改為詳定安石曰此皆無義理不當改爭於上前日高不决乃皆退他日又對升之固以為不可置司上曰併歸戸房何如安石曰併歸戸房固當然今中書事已猥積遲留更合制置司事即恐倂制置事皆淹滯若事了却見在差役常平水利事乃併歸戸房未晚上以為然上神宗乞罷制置三司條例司吕公著臣近具劄子言乞罷制置條例司歸中書至今未䝉施行臣聞孔子曰名不正則言不順言不順則事不成今來制置一司上既不闗政府下又不委有司是以從初置局人心莫不疑眩及見乎行事物論日益騰沸蓋朝廷大事無不出於二府惟是今來制置條例實係國家安危生民休戚而宰相不得與聞若宰相以為可自宜與之共論以為不可亦不當坐觀成敗但事書敕尾而已至於倉場庫務瑣細利害又恐不必執政大臣然後能集臣又聞聖人之政貴乎顯仁藏用管仲霸者之佐耳及其為令猶曰法成而鄰國不知今朝廷處置實未能有利及民然而先置一司使天下疑惑愁怨至今不定恐非䇿之得者也乞檢㑹臣前奏施行熈寧二年十月上上神宗乞罷制置三司條例司陳襄臣竊以天下之道常存乎公議公議廢斯道或㡬乎熄矣夫人皆有是非可否之心蓋出於理義之性雖聖人無以異也方其是非可否之時茍其心不至乎有所好惡則其言未始不公雖匹夫匹婦之愚猶有可取而况士君子者乎彼君民者凡施一政立一事方且自謂吾思慮之甚精議論之甚熟聞其言而莫之省也且以為流俗之論亦不思之甚矣故天下之公議常起於好惡未發之前而失於是非相勝之後君人者不可不察乎此也已以為是而天下以為非已以為非而天下以為是焉未可知也必待天下之人皆以為非然後捨焉是衆人捨之也故其取於人也無貴賤戚疏賢愚惟恐其謀之者不多論之者不博道之所存議之所從也古者天子聽政使公卿至於列士獻詩瞽獻典史獻書師箴瞍賦䝉誦百工諫庶人傳語近臣盡規戚親補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖厲王暴虐使人監謗召公用是諫之而不聽遂至流亡之患宣王既立用方召以為輔相修文武成康之遺風而雅道復行故其政善者詩人美之若雲漢崧高之𩔖是也其不善者詩人亦或箴焉庭燎是也或規焉沔水是也或誨焉鶴鳴是也或刺焉祈父白駒之𩔖是也故天下諸侯復宗周而王室中興焉夫言之於人君其取捨興亡如此之明效也伏自陛下享國以來咨嗟求治惟恐一言之不獲一事之未聞親降詔書詢求闕政毎遇便殿延訪羣臣之言至于日昃仍命百寮轉對得以封事上聞求之前王未有若陛下兼收廣聽如此之勤也然而興事改作惟聖其難王安石近置條例一司失於過聽事不由於宰府謀不及於士民耆艾不與聞臺諫不得議所建議惟門生屬吏而已天下雖有是非之論一切不聽事行之日中外莫不悱然非之謂不可行此由責任太專而不取人言之過也易之蠱曰先甲三日後甲三日終則有始天行也者言有事之時人君欲創制申令必先審慮於始當圖成其終猶天道之行四時以成變化奈何獨以一二臣之臆見而議天下之法哉陛下雖欲從之其如天下何昔者子産相鄭鄭人有㳺鄉校以論執政者然明請毁鄉校子産止之曰夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之孔子聞之曰人謂子産不仁吾不信也韓愈為之頌曰誠率是道相天下君旁通交暢施及無垠蓋惜其不遇也又曰四海所以不治有君無臣誰其嗣之我思古人蓋傷今不復有斯人也伏望陛下復雅道以行宣王之政責近臣以子産之用心無任一人之私言無廢天下之公論舉一事必稽于衆施一政必順于民罷去誅求之法以安人心牽復放斥之臣以開言路使百工羣吏咸得以職事持議箴補主闕則可以無偏係過舉之患矣易曰同人于野亨利涉大川言所同者逺無所係吝則其道光亨可濟大事矣伏惟陛下留神聽納則天下之福也熈寧二年十一月上時為侍御史知雜事上神宗論新法蘇軾臣近者不度愚賤輒上封章言買燈事自知瀆犯天威罪在不赦席藁私室以待斧鉞之誅而側聽逾旬威命不至問之府司則買燈之事尋已停罷乃知陛下不惟赦之又且聽之驚喜過望以至感泣何者改過不吝從善如流此堯舜禹湯之所勉强而力行秦漢以來之所絶無而僅有顧此買燈毫髪之失豈能上累日月之明而陛下飜然改命曽不移刻則所謂智出天下而聽於至愚威加四海而屈於匹夫臣今知陛下可與為堯舜可與為湯武可與富民而措刑可與强兵而伏戎虜矣有君如此其忍負之惟當披露腹心捐棄肝腦盡力所至不知其他乃者臣知天下之事有大於買燈者矣而獨區區以此為先者蓋未信而諫聖人不與交淺言深君子所戒是以試論其小者而其大者固將有待而後言今陛下果赦而不誅則是既已許之矣許而不言臣則有罪是以願終言之臣之所欲言者三願陛下結人心厚風俗存紀綱而已人莫不有所恃人臣恃陛下之命故能役使小民恃陛下之法故能勝服强暴至於人主所恃者誰歟書曰予臨兆民凛乎若朽索之馭六馬言天下莫危於人主也聚則為君民散則為仇讐聚散之間不容毫髪故天下歸徃謂之王人各有心謂之獨夫由此觀之人主之所恃者人心而已人心之於人主也如木之有根如燈之有膏如魚之有水如農夫之有田如商賈之有財木無根則槁燈無膏則滅魚無水則死農無田則飢商賈無財則貧人主失人心則亡此理之必然不可逭之災也其為可畏從古以然茍非樂禍好亡狂易䘮志則孰敢肆其胷臆輕犯人心昔子産焚載書以弭衆言賂伯石以安巨室以為衆怒難犯專欲難成而孔子曰信而後勞其民未信則以為厲已也唯商鞅變法不顧人言雖能驟致富强亦以召怨天下使其民知利而不知義見刑而不見德雖得天下旋踵而失也至於其身亦卒不免負罪出走而諸侯不納車裂以徇而秦人莫哀君臣之間豈願如此宋襄公雖行仁義失衆而亡田常雖不義得衆而强是以君子未論行事之是非先觀衆心之向背謝安之用諸桓未必是而衆之所樂則國以乂安庾亮之召蘇峻未必非而勢有不可則反為危辱自古及今未有和易得衆而不安剛果自用而不危者也今陛下亦知人心之不恱矣中外之人無賢不肖皆言祖宗以來治財用者不過三司使副判官今經百年未嘗闕事今者無故又創一司號曰制置三司條例使六七少年日夜講求於内使者四十餘輩分行營幹於外造端宏大民實驚疑創法新奇吏皆惶惑賢者則求其說而不可得未免於憂小人則以其意度朝廷遂以為謗謂陛下以萬乗之主而言利謂執政以天子之宰而治財商賈不行物價騰踊近自淮甸逺及川蜀喧傳萬口論說百端或言京師正店議置監官夔路深山當行酒禁拘收僧尼常住減刻兵吏廩禄如此等𩔖不可勝言而甚者至以為欲復肉刑斯言一出民且狼顧陛下與二三大臣亦聞其語矣然而莫之顧者徒曰我無其事又無其意何恤於人言夫人言雖未必皆然而疑似則有以致謗人必貪利也而後人疑其盜人必好色也而後人疑其淫何者未置此司則無其謗豈去歳之人皆忠厚今歲之人皆虛浮孔子曰工欲善其事必先利其器又曰必也正名乎今陛下操其器而諱其事有其名而辭其意雖家置一喙以自解市列千金以召人人必不信謗亦不止夫制置三司條例求利之名也六七少年與使者四十餘輩求利之器也驅鷹犬而赴林藪語人曰我非獵也不如放鷹犬而獸自馴操網罟而入江湖語人曰我非漁也不如捐網罟而人自信故臣以為消䜛慝以召和氣復人心而安國本則莫若罷制置三司條例司夫陛下之所以創此司者不過以興利除害也使罷之而利不興害不除則勿罷罷之而天下恱人心安興利除害無所不可則何苦而不罷陛下欲去積弊而立法必使宰相熟議而後行事若不由中書則是亂世之法聖君賢相夫豈其然必欲立法不免由中書熟議不免使宰相此司之設無乃冗長而無名智者所圖貴於無迹漢之文景紀無可書之事唐之房杜傳無可載之功而天下之言治者與文景言賢者與房杜蓋事已立而迹不見功已成而人不知故曰善用兵者無赫赫之功豈惟用兵事莫不然今所圖者萬分未獲其一也而迹之布於天下已若泥中之鬬獸亦可謂拙謀矣陛下欲富國擇三司官屬與漕運使副而陛下與二三大臣孜孜講求磨以歲月則積弊自去而人不知但恐立志不堅中道而廢孟軻有言其進銳者其退速若有始有卒自可徐徐十年之後何事不立孔子曰欲速則不達見小利則大事不成使孔子而非聖人則此言亦不可用書曰謀及卿士至于庶人翕然大同乃底元吉若逆多而從少則靜吉而作凶今自宰相大臣既已辭免不為則外之議論斷亦可知宰相人臣也且不欲以此自汙而陛下獨安受其名而不辭非臣愚之所識也君臣宵旰㡬一年矣而富國之效茫如捕風徒聞内帑出數百萬緡祠部度五千餘人耳以此為術其誰不能且遣使縱横本非令典漢武遣繡衣直指桓帝遣八使皆以守宰狼籍盜賊公行出於無術行此下䇿宋文帝元嘉之政比於文景當時責成郡縣未嘗遣使至孝武以為郡縣遲緩始命臺使督之以至蕭齊此弊不革故景陵王子良上疏極言其事以為此等朝辭禁門情態即異暮宿州縣威福便行驅迫郵傳折辱守宰公私勞擾民不聊生唐開元中宇文融奏置勸農判官使裴寛等二十九員並攝御史分行天下招携戸口檢責漏田時張說楊瑒皇甫璟楊相如皆以為不便而相繼罷黜雖得戸八十餘萬皆州縣希旨以主為客以少為多及使百官集議都省而公卿以下懼融威勢不敢異辭陛下試取其傳讀之觀其所行為是為否近者均税寛䘏冠蓋相望朝廷亦旋覺其非而天下至今以為謗曽未數歲是非較然臣恐後之視今猶今之視昔且其所遣尤不適宜事少而員多人輕而權重夫人輕而權重則人多不服或致侮慢以興爭事少而員多則無以為功必須生事以塞責陛下雖嚴賜約束不許邀功然人臣事君之常情不從其令而從其意今朝廷之意好動而惡靜好同而惡異指趣所在誰敢不從臣恐陛下赤子自此無寧歲矣至於所行之事行路皆知其難何者汴水濁流自生民以來不以種稻秦人之歌曰涇水一石其泥數㪷且溉且糞長我禾黍何嘗言長我粳稻耶今欲陂而清之萬頃之稻必用千頃之陂一歲一淤三歲而滿矣陛下遂信其説即使相視地形萬一官吏茍且順從真謂陛下有意興作上縻帑廩下奪農時隄防一開水失故道雖食議者之肉何補於民天下乆平民物滋息四方遺利蓋畧盡矣今欲鑿空訪尋水利所謂即鹿無虞豈惟徒勞必大煩擾凡所擘畫不問何人小則隨事酬勞大則量材録用若官私格沮並行黜降不以赦原若才力不辦興修便許申奏替換賞可謂重罰可謂輕然並終不言諸人妄有申陳或官私悞興功役當得何罪如此則妄庸輕剽浮浪姦人自此爭言水利矣成功則有賞敗事則無誅官司雖知其踈豈可便行抑退所在追集老少相視可否吏卒所過雞犬一空若非灼然難行必須且爲興役何則格沮之罪重而悞興之過輕人多愛身勢必如此且古陂廢堰多爲側近冒耕歲月既深已同永業茍欲興復必盡追收人心或揺甚非善政又有好訟之黨多怨之人妄言某處可作陂渠規壞所怨田産或指人舊業以為官陂冒佃之訟必倍今日臣不知朝廷本無一事何苦而行此哉自古役人必用鄉戸猶食之必用五榖衣之必用絲麻濟川之必用舟楫行地之必用牛馬雖其間或有以他物充代然終非天下所可常行今者徒聞江浙之間數郡雇役而欲措之天下是猶見燕晉之棗栗岷蜀之蹲鴟而欲以廢五榖豈不難哉又欲官賣所在坊場以充衙前雇直雖有長役更無酬勞長役所得既微自此必漸衰散則州郡事體憔悴可知士大夫捐親戚弃墳墓以從官於四方者宣力之餘亦欲取樂此人之至情也若彫弊大甚厨傳蕭然則似危邦之陋風恐非太平之盛觀陛下試慮及此必不肯爲且今法令莫嚴於御軍軍法莫嚴於逃竄禁軍三犯廂軍五犯大率處死然逃軍常半天下不知雇人為役與廂軍何異若有逃者何以罪之其勢必輕於逃軍則其逃必甚於今日為其官長不亦難乎近者雖使鄉戸頗得雇人然至於所雇逃亡鄉戸猶任其責今遂欲於兩稅之外别立一科謂之庸錢以備官雇則雇人之責官所自任矣自唐楊炎廢租庸調以為兩稅取大歴十四年應干賦歛之數以定兩稅之額則是租調與庸兩稅既兼之矣今兩稅如舊復欲取庸聖人立法必慮後世豈可於兩稅之外生出科名萬一後世不幸有多欲之君輔之以聚歛之臣庸錢不除差役仍舊使天下怨毒推所從來則必有任其咎者矣又欲使坊郭第等之民與鄉戸均役品官形勢之家與齊民並事其說曰周禮田不耕者出屋粟宅不毛者有里布而漢世宰相之子不免戍邉此其所以藉口也古者官養民今者民養官給之以田而不耕勸之以農而不力於是有里布屋粟夫家之征而民無以爲生去為商賈事勢當爾何名役之且一歲之役不過三日三日之雇其直三百今世三大戸之役自公卿以降毋得免者其費豈特三百而已大抵事若可行不必皆有故事若民所不恱俗所不安縱有經典明文無補於怨若行此二者必怨無疑女戸單丁蓋天民之窮者也古之王者首務恤此而今陛下首欲役之此等茍非戸將絶而未亡則是家有丁而尚㓜若假之數歲則必成丁而就役老死而没官富有四海忍不加䘏孟子曰始作俑者其無後乎春秋書作邱甲用田賦皆重其始為民患也青苗錢自昔有禁今陛下始立成法每歲常行雖云不許抑配而數世之後暴君汙吏陛下能保之歟異日天下恨之國史記之曰青苗錢自陛下始豈不惜哉且東南買絹本用見錢陜西糧草不許折兊朝廷既有著令職司又每舉行然而買絹未嘗不折鹽糧草未嘗不折鈔乃知青苗不許抑配之說亦是空文只如治平之初揀刺義勇當時詔㫖慰諭明言永不戍邉著在簡書有如盟約于今㡬日議論已揺或以代還東軍或欲抵換弓手約束難恃豈不明哉縱使此令决行果不抑配計其間願請之戸必皆孤貧不濟之人若自有贏餘何至與官交涉此等鞭撻已急則繼之逃亡逃亡之餘則均之鄰保勢有必至理有固然且夫常平之為法也可謂至矣所守者約而所及者廣借使萬家之邑止有千斛而榖貴之際千斛在市物價自平一市之價既平一邦之民自足無操瓢乞匄之弊無里正催驅之勞今若變為青苗家貸一斛則千戸之外孰救其飢且常平官錢常患其少若盡數收糴則無借貸若留充借貸則所糴㡬何乃知常平青苗其勢不能兩立壞彼成此所䘮愈多虧官害民雖悔何逮臣切計陛下欲考其實必先問人人知陛下方欲力行必謂此法有利無害以臣愚昧恐未可憑何以明之臣在陜西見刺義勇提舉諸縣臣常親行愁怨之民哭聲振野當時奉使還者皆言民盡樂為希合取容自古如此不然則山東之盜二世何縁不覺南詔之敗明皇何縁不知今雖未至於斯亦望陛下審聽而已昔漢武之世財力匱竭用賈人桑𢎞羊之說買賤賣貴謂之均輸于時商賈不行盜賊滋熾㡬至於亂孝昭既立學者爭排其說霍光順民所欲從而予之天下歸心遂以無事不意今者此論復興立法之初其說尚淺徒言徙貴就賤用近易逺然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣然既已許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廪禄爲費已厚非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何縁而得朝廷不知慮此乃捐五百萬緡以予之此錢一出恐不可復收縱使其間薄有所獲而征商之額所損必多今有人為其主牧牛羊不告其主而以一牛易五羊一牛之失則隱而不言五羊之獲則指為勞績陛下以為壞常平而言青苗之功虧商稅而取均輸之利何以異此陛下天機洞照聖略如神此事至明豈有不曉必謂已行之事不欲中變恐天下以為執德不一用人不終是以遲留歲月庶㡬萬一臣竊以爲過矣古之英主無出漢高酈生謀撓楚權欲復六國高祖曰善趣刻印及聞留侯之言吐哺而罵曰趣銷印稱善未㡬繼之以罵刻印銷印有同兒戲何嘗累高祖之知人適足明聖人之無我陛下以為可而行之知其不可而罷之至聖至明無以加此議者必謂民可與樂成難與慮始故陛下堅執不顧期於必行此乃戰國貪功之人行險僥倖之說陛下若信而用之則是徇高論而逆至情持空名而邀實禍未及樂成而怨已起矣臣之所願結人心者此之謂也士之進言者為不少矣亦嘗有以國家之所以存亡厯數之所以長短告陛下者乎國家之所以存亡者在道德之淺深不在乎强與弱厯數之所以長短者在風俗之薄厚而不在乎富與貧道德誠深風俗誠厚雖貧且弱不害於存而長道德誠淺風俗誠薄雖强且富不救於短而亡人主知此則知所輕重矣是以古之賢君不以弱而亡道德不以貧而傷風俗而智者觀人之國亦以此而察之齊至强也周公知其後有篡弑之臣衛至弱也季子知其後亡呉破楚入郢而陳大夫逢滑知楚之必復晉武既平呉何曽知其將亂隋文既平陳房喬知其不乆元帝斬郅支朝呼韓功多於武宣矣偷安而王氏之釁生宣宗收燕趙復河湟力强於憲武矣銷兵而龎勛之亂起故臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富强使陛下富如隋强如秦西取靈武北收燕薊謂之有功可也而國之長短則不在此夫國之長短如人之壽夭人之壽夭在元氣國之長短在風俗世有尫羸而壽考亦有盛壯而暴亡若元氣猶存則尫羸而無害及其已耗則盛壯而愈危是以善養生者謹起居節飲食道引闗節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害則五臟和平而壽命長不善養生者薄謹節之功遲吐納之效厭上藥而用下品伐真氣而助强陽根本已空僵仆無日天下之勢與此無殊故臣願陛下愛惜風俗如䕶元氣古之聖人非不知深刻之法可以齊衆勇悍之夫可以集事忠厚近於迂闊老成初若遲鈍然終不肯以彼易此者知其所得小而所䘮大也曹參賢相也曰謹無擾獄市黄霸循吏也曰治道去泰甚或譏謝安以清談廢事安笑曰秦用法吏二世而亡劉晏為度支專用果銳少年務在急速集事好利之黨相師成風德宗初即位擢崔祐甫為相祐甫以道徳寛大推廣上意故建中之政其聲翕然天下想望庶㡬貞觀及盧杞為相諷上以刑名整齊天下馴致澆薄以及播遷我仁祖之馭天下也持法至寛用人有叙專務掩覆過失未嘗輕改舊章然考其成功則曰未至以言乎用兵則十出而九敗以言乎府庫則僅足而無餘徒以德澤在人風俗尚義是以升遐之日天下如䘮考妣社稷長逺終必賴之則仁祖可謂知本矣今議者不察徒見其末年吏多因循事不振舉乃欲矯之以苛察齊之以智能招來新進勇銳之人以圖一切速成之效未享其利澆風已成且天時不齊人誰無過國君含垢至察無徒若陛下多方包容則人材取次可用必欲廣置耳目務求瑕疵則人不自安各圖茍免恐非朝廷之福亦豈陛下所願哉漢文欲拜虎圈嗇夫釋之以為利口傷俗今若以口舌捷給而取士以應對遲鈍而退人以虛誕無實為能文以矯激不仕為有德則先王之澤遂將散微自古用人必須歴試諸艱有卓異之器必有已試之功一則使其更變而知難事不輕作一則待其功高而望重人自無辭昔先主以黄忠為後軍將軍而諸葛亮憂其不可以為忠之名望素非闗張之倫若班爵遽同則必不恱其後闗侯果以為言以黄忠豪勇之資以先主君臣之契尚須慮此况其他乎世嘗謂漢文不用賈生以為深恨臣嘗推究其㫖竊謂不然賈生固天下之奇才所言亦一時之良䇿然請為屬國欲以係單于則是處士之大言少年之銳氣昔高祖以三十萬衆困於平城當時將相羣臣豈無賈生之比三表五餌人知其踈而欲以困中行說尤不可信矣兵凶器也而易之正如趙括之輕秦李信之易楚若文帝亟用其說則天下殆將不安使賈生嘗歴艱難亦必自悔其說用之晚歲其術必精不幸䘮亡非意所及不然文帝豈弃材之主絳灌豈蔽賢之士至於鼂錯尤號刻薄文帝之世止於太子家令而景帝既立以為御史大夫申屠賢相發憤而死紛更政令天下騷然及至七國發難而錯之術亦窮矣文景優劣於斯可見大抵名器爵禄人所奔趍必使積勞而後遷以明持久而難得則人各安其分不敢躁求今若多開驟進之門使有意外之得公卿侍從跬步可圖其得者既不肯以僥倖自名則其不得者必皆以沈淪為歎使天下常調舉生妄心恥不若人何所不至欲望風俗之厚豈可得哉選人之改京官常須十年以上荐更險阻計析毫釐其間一事聱牙常至終身淪弃今乃以一人之薦舉而與之猶恐未稱章服隨至使積勞久次而得者何以厭服哉夫常調之人非守則令員多闕少久已患之不可復開多門以待巧者若巧者侵奪已甚則拙者迫隘無聊利害相形不得不察故近歲樸拙之人愈少巧進之士益多惟陛下重之惜之哀之救之如近日三司獻言使天下郡選一人催驅三司文字許之先次指射以酬其勞則數年之後審官吏部又有三百餘人得先占闕常調待次不其愈難此外管當發運均輸按行農田水利以振監司之體各懐進用之心轉對者望以稱㫖而驟遷奏課者求為優等而速化相勝以力相高以言而名實亂矣惟陛下以簡易為法以清淨為心使姦無所縁而民徳歸厚臣之所願厚風俗者此之謂也古者建國使内外相制輕重相權如周如唐則外重而内輕如秦如魏則外輕而内重内重之未必有姦臣指鹿之患外重之弊必有大國問鼎之憂聖人方盛而慮衰常先立法以救弊我國家租賦籍於計省重兵聚於京師以古揆今則似内重祖宗所以深計而預圖固非小臣所能臆度而周知然觀其委任臺諫之一端則是聖人過防之至計歴觀秦漢以及五代諫争而死蓋數百人自建隆以來未嘗罪一言者縱有薄責旋即超升許以風聞而無官長風采所繫不問尊卑言及乗輿則天子改容事闗廊廟則宰相待罪故仁宗之世議者譏宰相但奉行臺諫風旨而已聖人深意流俗豈知臺諫固未必皆賢所言亦未必皆是然須養其銳氣而借之重權者豈徒然哉將以折姦臣之萌而救内重之弊也夫姦臣之始以臺諫折之而有餘及其既成以干戈取之而不足今法令嚴宻朝廷清明所謂姦臣萬無此理然而養猫以去鼠不可以無䑕而養不捕之猫蓄狗以防姦不可以無姦而蓄不吠之狗陛下得不上念祖宗設此官之意下為子孫立萬世之防朝廷紀綱孰大於此臣自㓜小所記及聞長老之談皆謂臺諫所言常隨天下公議公議所與臺諫亦與之公議所擊臺諫亦擊之及至英宗之初始建稱親之議本非人主大過亦無禮典明文徒以衆心未安公議不允當時臺諫以死爭之今者物論沸騰怨讟交至公議所在亦可知矣而相顧不發中外失望夫彈劾積威之後雖庸人亦可奮揚風采消委之餘雖豪傑有所不能振起臣恐自兹以徃習慣成風盡為執政私人以致人主孤立紀綱一廢何事不生孔子曰鄙夫可與事君也歟其未得之也患得之既得之患失之茍患失之無所不至矣臣始讀此書疑其太過以為鄙夫之患失不過備位而茍容及觀李斯憂䝉恬之奪其權則立二世以亡秦盧杞憂懷光之數其惡則誤德宗以再亂其心本生於患失而其禍乃至於䘮邦孔子之言良不為過是以知為國者平居必有亡軀犯顔之士則臨難庶㡬有徇義守死之臣若平居尚不能一言則臨難何以責其死節人臣茍皆如此天下亦曰殆哉君子和而不同小人同而不和和如和羮同如濟水孫寶有言周公大聖召公大賢猶不相恱著於經典晉之王導可謂元臣每與客言舉坐稱善而王述不恱以為人非堯舜安得每事盡善導亦歛衽謝之若使言無不同意無不合更唱迭和何者非賢萬一有小人居其間則人主何縁得知覺臣之所願存紀綱者此之謂也臣非敢歴詆新政茍為異論如近日裁減皇族恩例刋定任子條式修葺器械閲習鼓旗皆陛下神算之至明乾剛之必斷物議既允臣敢有詞至於所獻之三言則非臣之私見中外所病其誰不知昔禹戒舜曰無若丹朱傲惟慢遊是好舜豈有是哉周公戒成王曰毋若商王受之迷亂酗於酒德成王豈有是哉周昌以漢高為桀紂劉毅以晉武為桓靈當時人君曽莫之罪書之史冊以為美談使臣所獻三言皆朝廷未嘗有此則天下之幸臣與有焉若萬一似之則陛下安可不察然而臣之為計可謂愚矣以螻蟻之命試雷霆之威積其狂愚豈可數赦大則身首異處破壞家門小則削籍投荒流離道路雖然陛下必不為此何哉臣天賦至愚篤於自信向者與議學校貢舉首違大臣本意已期竄逐敢意自全而陛下獨然其言曲賜召對從容久之至謂臣曰方今政令得失安在雖朕過失指陳可也臣即對曰陛下生知之性天縱文武不患不明不患不勤不患不斷但患求治太速進人太銳聽言太廣又俾具述所以然之狀陛下頷之曰卿所獻三言朕當思之臣之狂愚非獨今日陛下容之久矣豈其容之於始而不赦之於終恃此而言所以不懼臣之所懼者譏刺既衆怨仇實多必將詆臣以深文中臣以危法使陛下雖欲赦臣而不得豈不殆哉死亡不辭但恐天下以臣為戒無復言者是以思之經月夜以繼晝表成復毁至于再三感陛下聽其一言懷不能已卒進其說惟陛下憐其愚忠而卒赦之熈寧二年十二月上時為直史館權開封府推官上神宗論青苗李常臣伏見陛下焦勞旰食憂䘏黎元求所以富安休養之道而獻議之臣措置失當設法遣使布滿天下始稱補助耕歛終言利息分數致百姓疑懼騷然不寧不復信朝廷有愛民之心直謂巧為掊克而已陛下雖欲推不忍之至誠百姓何由而知之臣聞作法於涼其弊猶貪今作法於貪復何善之有臣深察物情博訪民俗皆謂雖一切取民之願尚不免悞其易於得財侈於妄費不計後日輸官之難臨時迫蹙况今官吏務為功效百端罔民其尤甚者使善良避請納之費虛認貫百以輸二分之息臣考之三代下至近古未聞欲求平治輔養元元而為法如此之弊者今百姓之室空匱已甚苛朘巧削日入於困窮困窮之至為盜而已矣陛下御天下之日未久德澤之所以浸漬生民未深而輔佐之臣作為此法使毒流海内小大驚扇疾視其上不蚤沮止恐非社稷之福此臣所以早夜憂懼惓惓不已累冒鈇鉞之誅上干天聽願一切寢罷以安輿情至今未䝉指揮伏望聖慈悉降臣前後論青苗錢劄子付有司施行熈寧二年十一月上時為右正言上神宗論青苗係第二狀李常臣謹按前漢書食貨志言王莽每有所興造必依古傳經文國師公劉歆言周有泉府之官收不讎與欲得即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有貸賖樂語有五均傳記各有斡焉今開賖貸張五均設諸斡者所以齊衆庶抑并兼也遂於長安及五都立五均官更名長安東西市令及洛陽邯鄲臨淄宛成都市長皆為五均司市稱師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱皆置交易丞五人錢府丞一人工商能采金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之又以周官稅民凡田不耕為不殖出三夫之稅城郭中宅不植蓺者為不毛出三夫之布民浮游無事出夫布一匹其不能出布者冗作縣官衣食之諸取衆物鳥獸魚鼈百蟲於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及它方技商販賈人坐肆列里區謁舎皆各自占所為於其所之縣官除其本計其利十一分之而以其一為貢敢不自占自占不以實者盡没入所采取而作縣官一歲諸司市常以四時中月實定所掌為物上中下之賈各自用為其市平毋拘它所衆民賣買五榖布帛紬綿之物周於民用而不讎者均官有以考檢厥實用其本賈取之毋令折錢萬物昻貴過平一錢則以平賈賣與民其賈低賤減平者聽民自相與市以防貴瘐者民欲祭祀䘮紀而無用者錢府以所入工商之貢但賖之祭祀毋過旬日䘮紀毋過三月民或乏絶欲貸以治産業者均受之除其費計所得受息毋過歲什一吏用苛暴立威旁縁犯禁侵刻小民富者不得自保貧者無以自存起為盜賊及莽未誅而天下戸口減半矣伏觀班固述王莽事其詳如此其所施置蓋皆畧本先王而其初為說非不美也及乎繆戾至使百姓無聊揺手觸禁富者不得自保貧者無以自存而起為盜賊卒以敗亡者何也志於利故也夫茍志於利雖純法三王其法則猶不可行况徒用其言以欺世耶孔子曰放於利而行多怨此明驗也今青苗法與王莽事無以異寖違愛民之初意一切以利為言而不顧此臣所以知不復可行而願罷也臣愚實懼陛下未盡省覽班固所載之始末謹繕冩其略不憚上煩天聽伏望聖慈萬幾之暇特賜反覆觀覽而深鑒之其青苗法伏乞早降詔㫖寢罷天下幸甚易曰不逺復無祗悔元吉此之謂也熈寧二年十二月上宋名臣奏議巻一百十
