body:
  text: 宋名臣奏議卷一百十三宋趙汝愚編財賦門新法五上神宗論青苗李常臣聞易曰何以守位曰仁何以聚人曰財理財正辭禁民為非曰義繇伏羲以來治天下者未有不以仁守位以財聚人以義理財者也知非仁不可以守位則凡法度之設號令之施茍不仁不可用矣知非財不可以聚民則夫家之衆鰥寡之窮食不足不可保矣知非義不可以理財則租賦之入斂散之方失其宜不可行矣自設網罟作耒耜至井牧田野十一而稅之其為法必本於仁其養民必厚於財其理財必主於義上下交足而治道成矣故孟子言為國必曰信仁賢有禮義然後有政事有政事則財用足然則政事不僉謀於仁賢不悉由於理義則不可以行也理財用而不由仁與義則上匱而下窮矣故古之人曰王人者將道利而布之上下者也後世聖人不作仁澤滅息暴君汙吏知厚上而刻下剝民以縱欲賦斂已重徭役已極不思公上用財之道日廣以自節損巧斂以求適志故自幽厲以來詩書所載莫不譏重賦懲過取主愛民以為言不患其不能益上而患其刻下也故曰百姓足君孰與不足又曰財散則民聚財聚則民散又冉求賦粟倍他日則孔子欲鳴鼓而攻之曰與其有聚斂之臣寧有盜臣昔者夏桀率遏衆力率割夏邑后世言暴斂者必稽之曰大桀小桀商紂厚賦稅以實鹿臺之財盈巨橋之粟周厲王用榮夷公專天下之利秦收太半之賦竭天下之資以奉其政其後漢桓靈下至隋唐其惡政弊法尚足道哉此皆法度號令不本於仁租賦稅斂不要於義而不能散利保民以取滅亡敗亂之明效也臣實至愚粗分義理但知阜俗厚下恤鰥寡助乏絶為先王之道不知罔民欺世事刻剝困生靈為治世之䇿而又愚昏不敏不敢以非義逆詐初不謂王安石以文學名世行義得君乃不本仁以出號令考義以理財賦而佐陛下為此病民斂怨之術詔命之始尚謂其誠有意於惻怛斯民稽古立法及其黨援掊克小人宣言取利分數方悟其略假先王之遺迹而志在聚斂臣始以朝廷好惡為憂而直議其法必不可行既而小大驚疑逺近騰沸日見其弊人得非之方是之時曽公亮陳升之趙抃皆位冠百寮身輔大政首主厥議曽無執守臺諫官或以職事隔絶或隂竊符同而四海萬里䝉毒莫訴陛下不以臣為不才置之諌爭之列不識欲其雷同結舌姑以備位耶抑亦使其竭誠畢慮救正闕失也臣於安石雖有故舊之義茍懷私而不言誰肯為朝廷言者今安石不思詩人刺掊克所以斂怨易象著益下所以民悅與夫强恕改過捨已從人之為君子之道而日與其徒吕惠卿等隂籌竊計欲文厥過思以頰舌取勝公議寧復以社稷安危為慮者切聞以正論者為同乎流俗憂國者為震驚朕師以百姓愁歎為出自兼并之言以卿士僉論為生乎怨嫉之口而又妄取經據傅㑹其說謂周人國事之財用取具於息錢而不知泉府實受㕓人之五布臣考之周官凡周所以佐國用者有九賦斂財賄有九貢致邦國之用又以九式均節之太府以關市之賦待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜豫而不言貸民之息待邦用者今曰周之國事取具息錢亦已罔矣上以惑陛下之聰明下以欺天下之耳目而貽笑後世可為痛悼可為太息抑臣觀周禮所以必貸民者蓋先王推至仁愛物回旋曲折之深意也所以使出息者不使其幸得而惰於業也周人井牧其田野其六鄉使五家為比則有比長五比為閭則有閭胥四閭為族則有族師五族為黨則有黨正五黨為州則有州長五州為鄉則有鄉士大夫六遂亦然其小大相臨上下相察使相保愛使相葬埋匹夫匹婦受田百畝鰥寡孤獨復有常餼又十一而稅之宜無一人不足者矣唯死喪疾病冠昏之類乃其不幸而不得濟者間有貧不能周於用於是命泉府之官掌其祭祀喪紀者有賖而服田者有貸方是之時民日被上之仁愛上悉知民之有無下如子之怙其父上如父之育其子鄉遂閭井之間不足而貸者歲亦無幾人嗚呼先王之於民回旋曲折之意可謂盡矣此所謂保民若赤子所謂無一夫不獲者也故孟子能具道平治時之事曰春省耕以補不足秋省斂以助不給又稱夏之諺曰吾王不游吾何以休吾王不豫吾何以助又知補助之仁不獨周為然也今則不然田無多少之限民無貧富之常吏不識其民民不信其上租稅之入非賄賂不可輸也催科之嚴非鞭笞不能辦也稅斂重數民畏公家如鳥獸之避網罟政令不一吏殘其民猶弋獵之待鳥獸離居散處非有比閭族黨之相伍也非有胥長師正之相統也而又愚瞽頑嚚不能逺計其貧下無賴習為逋逃之人知千百為羣十五為保執一紙之劵而空手得錢則不願者亦寡矣及其出賄賂齎糧食與市㕓博易妄用之外實能持錢至其家而致力於畎畝之間者亦無幾矣逮其償也百畝之收二稅徭役之外有支移有折變有配買有和市有貸糧有麥本今又出青苗之本利至時不足則賣其衣食之資又不足則賣牛具又不足則賣田疇又不足則賣妻孥或逃去鄉井或羣起為盜賊矣此臣前日劄子所以言雖一切取民便不免使其易於得財侈於妄費不計後日輸官之難而臨時迫蹙者也今取其願猶且如是况希合小人與畏罪之吏措置乖方者其為患百十倍於是與其貸於兼并者異也凡百姓所以貸於兼并者蓋皆其鄰里近村之人其來貸也誠皆窮乏飢餓不得已者也茍可以適朝昏備農事則不往貸矣其貸與之家亦皆日見其實為乏絶素有誠信真以贍妻孥資耕穫者也茍欲以侈口腹事飲博為利陷法之事則不貸之矣以是觀之歲貸於人者亦無幾也然則青苖之法適所以誤妄費不思之窮民爾今法言利之卒所以病之也昔者子産以乘輿濟人於溱洧之上孟子曰惠而不知為政以其人人而悅之也今為法不免於人人而病之可乎又况志在於蓄積者乎今黨蔽掊克小人公言利息紛如而欲天下之吏不希合而强民臣不信也王廣淵者昔條例司稱以為公幹才明之人也前日使試義倉之法乃至邀遮齊州輸稅之民使先詣義倉然後納稅於是冒言民便其法臣恐天下官吏上畏朝廷下畏使者或事希合置二稅而督青苖然後以鞭笞督其租賦蚩蚩之衆何以堪之臣恐不一再貸而天下潰矣古之人曰匹夫專利猶謂之盜王而行之其猶鮮矣孔子曰放於利而行多怨詩曰民之多僻無自立辟又曰民之貪亂寧為荼毒方今稅役苛重百姓空匱雖官廩有未充之憂公帑有不足之慮不思節用愛人重本抑末而欲矯誣以射利譬猶割膚體以啖口腹其不可明矣昔魏文侯租賦倍於常日或有以賀者文侯曰今戶不加多而租賦歲倍譬之反裘而負薪者徒惜其毛而不知皮盡而毛無所附矣此善諭也故書曰民惟邦本本固邦寧又曰怨豈在明不見是圖豫臨兆民凛乎若朽索之御六馬可不畏哉今陛下欲勸農桑興水利省徭役復常平此先王不忍之心也而獻議之臣直以此擾擾蔽惑天聽茍有志於朝廷社稷者莫不以為憂勤也詩曰民亦勞止汔可小康惠此中國以綏四方臣願陛下詔天下悉罷青苖法謹擇轉運使而久天下縣令之任俾諸路各上十數年之間為縣而有績狀在民者稍易今不才之令而授所謂農田水利徭役常平之法使各講求施設而寬假之淹以歲月而考課其績則四海萬里無不被陛下之德澤者抑臣聞之昔魯欲用田賦季孫使冉有訪諸孔子孔子曰若欲行其法則周公之典在若茍而行之又何訪焉臣之至愚其惓惓之義深冀陛下鑒觀先哲之言究察受敝之俗决以獨斷罷於一朝别講治道垂福黔首儻姑取其聚斂之意茍而行之則臣言為迂疏僻滯之甚者而妄譏時政擅廢朝參數違聖㫖罪釁大矣豈宜更使居位早行竄逐不勝幸甚熙寧三年三月上時為左正言上神宗論青苗吕公著臣纍具劄子言昨遣提舉常平廣惠倉官吏不當諸路散青苖錢違戾元降敕㫖未䝉施行臣聞易曰說以先民民忘其勞又曰感人心而天下和平自古有為之君未有不先人心而能立事者也亦未有脅之以朝廷之威勝之以頰舌之辨而能終得人心者也陛下以聰明睿智之資承祖宗積纍之後方其未有所為四方已自欣戴至於今所施設其事乃至淺末然而人情洶洶如此之甚則致之不為無由陛下固宜審察主議之臣乃以為流俗浮議不足恤臣切以人心惟危聖人所畏難安易動今日為甚若不幸有姦宄之謀窺伺間隙則於陛下威德必有所沮不可挽也且今之所謂豪俊多才布在顯要皆陛下與執政大臣平日所共精擇然而不謀同辭皆以此舉為謬豈有平日所謂賢者今則皆盡不肖由此觀之亦不可概謂之流俗浮議也借使朝廷處置皆已盡善尤當反覆惟慮求所以附順人心况今日紛紛實自朝廷致之且如轉運使提㸃刑獄官皆陛下選掄委以一路豈有一路之政皆所倚辦獨此數事不可信任縱其人不可任自當亟罷其職别擇能臣茍以為可任又不當别置提舉官此諸路監司所以離心者也况國家制法本欲便人然而使人心違怨一至於此尚曰善為政乎臣切觀陛下每延見羣臣講求政事常欲曲盡物情期於公當兼今來衆人所議實係國家安危若向去人情益擾陛下必不能力主惟是不逺而復庶幾害不及民况臣之所以區區者亦不獨惜此一事誠恐人心既已乖離陛下之志終必疑殆則向去朝廷難乎復有所為伏乞檢㑹臣纍奏早賜施行熙寧三年三月上時為御史中丞上神宗論新法張戩臣竊以天下之論難掩至公在於聖明動必循理無適無莫義之與比昔建議謂便而試行之今已知有害而改罷之是順天下之心而成天下之務也昔非今是何憚改為故曰毋意毋必毋固毋我又曰時行則行時止則止大易之義貴於隨時陛下何利之求惟義而已今則衆意乖戾天下騷然而王安石尤欲飾非所持甚隘信惑憸人力排正論此臣所以在於必諍雖死輒為義或難從勢無兩立也熙寧三年三月上時為監察御史裏行上神宗論新法程皓臣近纍上言乞罷預俵青苖利息及汰去提舉官事朝夕以覬未䝉施行臣切謂明者見於未形智者防於未亂今日事理顯白易知若不因機亟决必貽後悔悔而後改則為害已多蓋安危之本在乎人情治亂之機係乎事始衆心暌乖則有言不信萬邦和叶則所為必成固不可以威力取强語言必勝而近日所聞尤為未便伏見制置條例司疏駮大臣之奏舉劾不奉行之官徒使中外物情愈致驚駭是乃舉一偏而盡沮公議因小事而先動衆心權其輕重未見其可臣切謂陛下固已燭見事體究知是非在聖心非吝改張由柄臣尚持固必是致輿情大欎衆論益歡若欲遂行必難終濟伏望陛下奮神明之威斷審成敗之先機與其遂一失而廢萬方孰若沛大恩而新衆志外汰使人之擾亟推去息之仁况糶糴之法兼行則儲蓄之資自廣在朝廷未失於舉措使議論何名而沸騰伏乞檢㑹臣所上言早賜施行則天下幸甚熙寧三年三月上時為監察御史裏行上語及程皓疏安石曰皓至中書臣略諭以方鎮沮毁朝廷法令朝廷申明使知法意不得謂之疏駮大臣章奏皓乃言大臣論列事當包含此言尤為害理若不申明法意使中外具知則是縱使邪說誣民而令詔令本意更不明於天下如此則異議何由帖息上神宗論青苖孫覺臣昨自出貢院即具奏聞青苖新法中外人情不以為便此宜聖衷早有所定如或遲遲不議更改即將為國生事矣蓋臣愚忠以謂陛下上承祖宗之重兼有四海之富即位三年德澤未施於下而託惠民之虛名收取息之實利本末舛錯施置失當號令二三而中外益疑傅㑹經義而更成穿鑿以至大臣離心議臣扼腕近者建言而求去逺者抗章而請罪如此持久不已內外之言和附為一則陛下之法將格而不行誅之則不可勝誅不誅則法令廢而威權奪矣今建議者但欲法之必行而不顧遺患於後臣嘗謂陛下當以朝廷為心而無所偏則利害可一言而决矣異時諸路轉運使若范純仁之類必不肯行新法以應提舉官之命諸路安撫知州若韓琦之比必不自奪其議以徇制置司之欲諸州知縣若姜潛之流必不肯隳其素守以遂管當官之私諸路之中有一人二人為此者時議必翕然稱之矣好名者喜於立異中人又恥於不逮人人相慕而為此則陛下之法廢格而不行矣不知陛下將比比而誅之耶亦考其是非而行法耶若將考其是非則法有情願之文人不情願者我何敢强如此法不得而加則其勢必折而不可久以不可久之法加之民而不便之實又見於一年二年之後不知陛下何憚於速改而必待其自壞耶法至于自壞則所損於天下者豈少哉孟子曰愛人不親反其仁禮人不答反其敬今日之新法雖有善意然而人不親也不答也則亦宜自反而已矣傳曰未至豫言固常為虛及其已至又無所及臣愚區區於今日者正類此矣伏望陛下留神采納熙寧三年三月上時為右正言權修起居注是時知陳留縣姜潜之官才數月青苗息錢令下潜出錢榜其令於縣門又移之鄉村各三日無人至遂撤榜付吏曰民不願矣錢獨得不散府寺疑潜壅令使其屬案驗一皆如令潜知必不免稱疾去官上神宗辭免體量府界青苖錢孫覺臣准中書劄子奉聖㫖指揮同府界提㸃并提舉常平廣惠倉官於府界諸縣體量近散青苗錢係人戶情願請領或追呼抑配臣聞府界之民居近輦轂狃於幸恩曲赦夏秋二稅貸糧之類蠲放倚閣歲率有之故水旱災傷一二即已放免七八矣今青苖本錢雖聞多已俵散然其人情循習故常冀幸終見蠲免故雖請錢之初未見其害然催納之際必致鞭笞朴撻然後事集此必然之理也故府界之縣十七開封祥符户口略等然開封所散止三千餘緡而祥符及三千餘貫以此推之足見諸縣有能體朝廷之意以贍恤貧弱為務而又憂失陷之弊將來催驅難以辦集者則所給散當有節度也至於陳留不散一錢此又見百姓其實不願與官中交關非風諭召集則未有至者况大户本不闕乏徒以官中散錢使之保識下戶不敢不請下等細民多利得錢而又患無保識或有保識而所請不多道途之費給散之擾十已耗其二三而下戶所有之田不能百畝所出幾何而租賦之外更納青苖錢或至數石則所餘無幾矣若官許納錢迫以期限則麥價大减又當賤糶以價償官矣如此則下戶一歲之收曽不補其所負况府界積年貸糧舊缺四十餘萬石而去秋所催才及七十餘石麥租等錢一萬二千餘貫去秋才納六百餘貫以此見府界之民狃習恩貸其給甚易而其斂則難也今聖㫖指揮乃令體量人户情願請領或追呼抑配則臣前所引開封三縣其情可見矣况臣前後論列皆謂法不精所請使者非其人故屢引作俑之說以明將來之害今聖㫖乃使臣遍行諸縣又與提㸃提舉等官連書聞奏諌官備耳目之任凡所聞見得以開陳必欲按實罪狀正所謂干礙之官臣聞古者設官有言之者有行之者故言者不責其必行行者不責其能言臣備員諌省以言語為官矣其又能一二以行之乎伏望聖慈察臣區區之志臣之所言是邪則願陛下采而行之所言非耶固不逃於誅譴所有體量青苖指揮望賜寢罷謹具狀辭免以聞熙寧三年三月上初曽公亮陳升之趙抃等皆以為開封府界散常平錢實有抑配上欲遣李常吕惠卿出案其事公亮等以為不可乃已既而朝廷士大夫言抑配者十八九上復欲遣覺升之又固爭以為不可且曰覺不肯行王安石曰覺雖懷姦見事遲不為人所說諭則宜肯往上曰覺近在此朕今召問之公亮等奏事退至中書上批適已面諭孫覺極喜奉命遂詔覺同開封府界提㸃提舉官體量有無抑配以聞既而張戩等言不當遣覺覺亦奏疏辭行上批覺上殿稱敢不䖍奉詔命即日治行今乃反復如此付中書劾問已而王安石獨對言直可責降不須劾問初欲落修起居注令歸館供職安石謂不如與一小州或軍遂有廣德之命上神宗論不宜輕失人心吕公著臣竊惟祖宗承五季之亂撫有天下其間法度草創固亦未盡及古至於臨下以簡御衆以寬好生之德洽於民心則漢唐之盛無以加也是以有國百年民心欣戴雖凶年饑歲流離至死而無有背叛之心者良以仁恩厚德深足以固結其心唯是日月既久事或有弊此陛下所以臨朝奮然思欲懲革然而設施措置未得其術才及一二末事頗已咈戾衆心是以內外乖離人人危懼切以祖宗以來所以深得人心者艱難積纍固非一日今豈可以一二末事輕失其心人心一搖未易復收後雖有善政亦難行矣况上下危疑之際難安易動此臣所以為寒心也伏望陛下仰思先烈俯察物情凡所施為務在仁厚無致近薄以斂衆怨則人心悅而天意從矣熙寧三年三月上時為御史中丞上神宗論新法乞外任吕公著臣近兩具手奏為前後論事不䝉朝廷施行及多病早衰乞補外郡或管當南京留司御史臺一次准中書劄子奉聖㫖不允者臣切以臣之事君不可無義君之用人亦宜以禮臣雖愚陋陛下過聽以為御史中丞居言事之長若朝政不致乖戾於國體未有所損則豈敢輒有奏述遽言去就唯自權立制置條例司政出多門名分不正故識者皆已憂之然臣當時亦未敢再三言者猶冀因此或能有所興立自添差提舉官四五十人頒青苖法於天下條詔紛糾自相違戾人無智愚莫不譏議而廟堂之上欲必以威力勝之以至凌轢舊臣沮折言者聚斂之志形於四海奉公憂國之士莫不懷憤切嘆臣既當事任義不容默是以纍求進對連上奏封反覆開陳冀欲寢罷陛下雖心知其然依違終未能决臣言既不從又不能引避則事君之義豈不虧損或朝廷未賜矜從臣所請固不敢已直俟讒慝積深方行譴責則於陛下用人之禮得無過差况臣疲病之質不能堪任顯職伏乞檢㑹臣前奏早賜施行熙寧三年三月上上神宗乞罷條例司及提舉官趙抃臣近以制置條例司遣使四十餘人馳傳天下人情驚擾物論喧譁纍具奏陳并與宰臣等數嘗面奏乞罷諸路提舉官屬其常平等事一切責成監司信賞必罰孰敢慢者而王安石强辨自用動輒忿爭以天下之公論為流俗之浮議順非文過違衆罔民近制置司所差官如張次山吳師孟范世京等七八人懇辭勇退唯恐不得所請夫要職顯任人之所欲彼不願就者蓋知事悉乖戾不敢當之昨日安石再舉西川福建提㸃官四員其復如此而欲止煩言是所謂惡醉而强酒也近臣侍從臺諌官力言制置司不便司馬光因罷樞密副使之命中外人情莫不驚駭李常家居待罪多日孫覺張戩程皓三人各與安石論列於中書又悉嘗上殿乞罷言職今日吕公著范鎮俱請郡朝廷事有輕重體有大小以言乎財利於事為輕而天下之民心得失為重以言乎提舉官於體為小而禁近與耳目之臣用捨為大矣今夫不罷財利而失天下民心是去重而取輕也不罷提舉官而棄禁近耳目之臣是失大而得小也今中外人情洶洶如此更乞酌事之重惜體之大罷其輕者小者變禍為福易於反掌爾熙寧三年三月上時為參知政事初王安石家居求去上欲罷青苖抃乞俟安石參假自罷及安石入謝持之益堅抃大悔遂纍具論新法不便且乞罷遂以資政殿學士知杭州上神宗繳進擬御試䇿蘇軾臣准宣命差赴集英殿編排舉人試卷切見陛下始革舊制以䇿試多士厭聞詩賦無益之語將求山林朴直之論聖德廣大中外歡悅而所試舉人不能推原上意皆以得失為慮不敢指陳闕政而阿諛順㫖者又率據上第陛下之所以求於人至深切矣而下之報上者如此臣切悲之夫科場之文風俗所係所收者天下莫不以為法所棄者天下莫不以為戒昔祖宗之朝崇尚辭律則詞賦之工曲盡其巧自嘉祐以來以古文為貴則䇿論盛行於世而詩賦幾至於熄何者利之所在人無不化今始以䇿取士而士之在甲科者多以諂諛得之天下觀望誰敢不然臣恐自今以往相師成風雖直言之科亦無敢以直言進者風俗一變不可復返正人衰微則國隨之非復詞賦䇿論迭興迭廢之比是以不勝憤悶退而擬進士對御試䇿一道學術淺陋不能盡知當世之切務載所聞見將以推廣於聖言庶有補於一二將以開示四方使知陛下本不諱惡切直之言風俗雖壞猶可以少救其所撰䇿謹繕寫投進熙寧三年三月上時為直史館判官誥院擬御試䇿對臣伏見陛下發德音下明詔以天下安危之至計謀及於布衣之士其求之不可謂不切其好之不可謂不篤矣然臣私有所憂者不知陛下有以受之歟禮曰甘受和白受采故臣願陛下先治其心使虛一而靜然後忠言至計可得而入也今臣竊觀陛下先入之言已實其衷邪正之黨已二其聽功利之說以動其欲則雖有皋陶益稷為之謀亦無自入矣而况於疏逺愚陋者乎此臣之所以大懼也若乃盡言以招過觸諱以亡軀則非臣之所恤也聖䇿曰聖王之御天下也百官得其職萬事得其序臣以為陛下未知此也是以所為顛倒失序如此茍誠知之曷不尊其所聞而行其所知歟百官之所以得其職者豈聖王人人而督責之歟萬事之所以得其序者豈聖王事事而整齊之歟亦因能以任職因職以任事而已官有常守謂之職施有先後謂之序今陛下使兩府大臣侵三司財利之權常平使者亂職司守令之治刑獄舊法不以付有司而取决於執政之意邉鄙大慮不責帥臣而聽計於小吏之口百官可謂失其職矣王者之所宜先者德也所宜後者刑也所宜先者義也所宜後者利也而陛下易之可謂萬事失其序矣然此猶其小者若其大者則中書失其政也宰相之職古者所以論道經邦今陛下但使奉行條例司文書而已昔丙吉為丞相蕭望之為御史大夫望之言陰陽不和咎在臣等宣帝以為意輕丞相終身薄之今政事堂忿爭相扺流傳都邑以為口實使天下何觀焉故臣願陛下首還中書之政則百官之職萬事之序以次得矣聖䇿曰有所不為為之而無不成有所不革革之而無不服陛下及此言是天下之福也今日之患正在於未成而為之未服而革之耳夫成事在理不在勢服人以誠不以言理之所在以為則成以禁則止以賞則勸以言則信古之人所以鼓舞天下綏之斯來動之斯和者蓋循理而已今為政不務循理而欲以人主之勢賞罰之威而成之夫以斧析薪可謂必克矣然不循其理則斧可缺薪不可破是以不論尊卑不計强弱理之所在則成所不在則不成可必也今陛下使農民舉息與商賈爭利豈理也哉而怪其不成乎禮曰微之顯誠之不可掩也如此夫陛下茍誠心乎為民則雖或謗之而人不信茍誠心乎為利則雖自解釋而人不服且事有决不可欺者吏受賄枉法人必謂之贓非其有而取之人必謂之盜茍有其實不敢辭其名今青苖有二分之息而不謂之放債取利可乎凡人為善不自譽而人譽之為惡不自毁而人毁之如使為善者必須自言而後信則堯舜周孔亦勞矣今天下以為利陛下以為義天下以為貪陛下以為亷不勝其紛紜也則使二三臣者極其巧辨以解答千萬人之口附㑹經典造為文書以曉告四方之人豈如嬰兒鳥獸可以美言小數眩惑之哉且夫未成而為之則其弊必至於不敢為未服而革之則其弊必至於不敢革蓋世有好走馬者一為墜傷則終身徒行何者謹重則必成輕發則多敗此理之必然也陛下若出於謹重則屢作屢成不唯人信之陛下亦自信而日以勇矣若出於輕發則每舉每敗不唯人不信陛下亦不自信而日以怯矣文宗始用訓注其志豈淺也哉一經大變則憂沮喪氣不能復振文宗亦非有失德徒以好作而寡謀也謹重者始若怯終必勇輕發者始若勇終必怯乃者橫山之人未嘗一日而忘漢雖五尺童子知其可取然自慶厯以來莫之敢發誠未有以善其後也近者邉臣不計其後而遽發之一發不中則內帑之費以數百萬計而關輔之民困於飛挽者二年而未已雖天下之勇者不敢復言之也由此觀之則橫山之功是邊臣欲速而壞之也近者青苗之政助役之法均輸之䇿併軍搜卒之令率然輕發又甚於前日矣雖陛下不恤人言持之益堅而勢窮事礙終亦必變他日雖有良法美政陛下能復自信乎人君之患在於樂因循而重改作今陛下春秋鼎盛天錫智勇此萬世一時也羣臣不能濟之以謹重養之以淳朴譬如乘輕車馭駿馬冒險夜行而僕夫又從後鞭之豈不殆哉臣願陛下解轡秣馬以須東方之明而徐行於九軌之道甚未晚也聖䇿曰田疇闢溝洫治草木鬯茂鳥獸魚鱉莫不各得其性者此百工有司之事曽何足以纍陛下陛下操其要治其本恭已無為而物莫不盡其理以生以死若夫百工有司之事自宰相不屑為之而况於陛下乎聖䇿曰其富足以備禮其和足以廣樂其治足以致刑何施而可以臻此孔子曰百姓足君孰與不足兔首瓠葉可以行禮掃地而祭可以事天禮之不備非貧之罪也管子曰倉廩實而知禮節臣不知陛下所謂富者富民歟抑富國歟陸賈曰將相和則士豫附劉向曰衆賢和於朝則萬物和於野今朝廷可謂不和矣其咎安在陛下不反求其本而欲以力勝之力之不能勝衆也久矣古者刀鋸在前鼎鑊在後而士猶犯之今陛下躬蹈堯舜未嘗誅一無罪欲息衆言不過盡逐異議之臣而更用人耳必未忍行亡秦偶語之禁東漢黨錮之法則士何畏而不言哉臣恐逐者不已而爭者益多煩言交攻必甚於今日矣欲致和而廣樂豈不疏哉古之求治者將以措刑也今陛下求治則欲致刑此又羣臣誤陛下也臣知其說是出於荀卿荀卿好為異論至以人性為惡則其言治世刑重亦宜矣說者又以為書稱唐虞之隆刑故無小而周之盛時羣飲者殺臣請有以辨之夏禹之時大辟二百周公之時大辟三百豈可謂周治而禹亂耶秦及三族漢除肉刑豈可謂秦治而漢亂耶致之言極也天下幸而大治使一日未安陛下將變今之刑而用其極歟天下幾何不叛耶徒聞其語而懼者已衆矣臣不意異端邪說惑誤陛下至如此宥過無大刑故無小此用刑之常理也至于今守之豈獨唐虞之隆而周之盛矣所以誅羣飲者以為其意非獨羣飲而巳如今之法所謂夜聚曉散者使後世不知其詳而徒聞其語則凡夜相過者皆執而殺之可乎夫人相與飲酒而輒殺之雖桀紂之暴不至於此而謂周公行之歟聖䇿曰方今之弊可謂衆矣救之之道必有本末所施之宜必有先後臣請論其本與其所宜先者而陛下擇焉方今救弊之道必先立事立事之本在於知人則所施之宜當先觀大臣之知人與否耳古之欲立非常之功者必有知人之明茍無知人之明則循規矩蹈繩墨以求寡過二者皆審於自知而安於才分者也道可以講習而知德可以勉强而能唯知人之明不可學必出於天資如蕭何之識韓信此豈有法而可傳者哉以諸葛孔明之賢而知人之明則其所短是以失之於馬謖而孔明亦審於自知是以終身不敢用魏延我仁祖之在位也事無大小一付之於法人無賢不肖一付之於公議事已效而後行人已試而後用終不求非常之功也誠以當時大臣不足以與知人之明也古之為醫者聆音察色洞視五臟則其治疾也有剖胸决脾洗濯肺胃之變茍無其術不敢行其事今無知人之明而欲立非常之功解縱繩墨以慕古人則是未能察脉而欲試華他之方其異於操刀而殺人者幾希矣房琯之稱劉秩關播之用李元平是也至今以為笑陛下觀今之大臣為知人歟為不知人歟乃者擢用衆才皆其造室握手之人要結審固而後敢用蓋以為其人可與戮力同心共致太平曽未安席而交口攻之者如蝟毛而起陛下以此驗之其不知人也亦審矣幸今天下無事異同之論不過瀆亂聖聽而已若邊隅有警盜賊竊發俯仰成敗呼吸變故而所用之人皆如今日乍合乍散臨事解體不可復知則無乃誤社稷歟華陀不世出天下未嘗廢醫蕭何不世出天下未嘗廢治陛下必欲立非常之功請待知人之佐若猶未也則亦詔左右之臣安分守法而已聖䇿曰生民以來稱至治者必曰唐虞成周之世詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以榮一代之業雖未盡善然要其所以成就亦必有可言者其詳言之臣以為此不可勝言也其施設之方各因其時而不可知其所可知者必畏天必從衆必法祖宗故其言曰戒之戒之天維顯思命不易哉又曰稽于衆舍已從人又曰丕顯哉文王謨丕承哉武王烈詩書所稱大略如此未嘗言天命不足畏衆言不足從祖宗之法不足用也苻堅用王猛而樊世仇騰席寶不悅魏鄭公勸太宗以仁義而封倫不信凡今之人欲陛下違衆而自用者必以此藉口陛下所謂賢明忠智者豈非意在此等歟臣願考二人之所行而求之於今王猛豈嘗設官而牟利魏鄭公豈嘗貸錢而取息歟且其不悅者不過數人固不害天下之信且服也今天下有心者怨有口者謗古之君臣相與憂勤以榮一代之業者似不如此詩曰百人之聚未有不攻而破况天下乎今天下非之而陛下不回臣不知所稅駕矣詩曰譬彼舟流不知所届心之憂矣不遑假寐區區忠藎惟陛下察之臣謹昧死上對熙寧三年三月上上以軾所對䇿示王安石安石曰軾亦高才但所學不正今又以不得逞之故其言遂跌蕩至此數請黜之曽公亮曰軾但異論耳無可罪者宋名臣奏議卷一百十三
