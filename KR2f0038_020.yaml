body:
  text: 宋名臣奏議卷二十宋趙汝愚編君道門勤政上真宗論勤政韓援臣伏覩近詔舉行轉對在外文武羣臣未預次對者各許上章奏事此蓋陛下克勤念慮旁採芻蕘幅員之間蹈詠斯極伏惟陛下膺運圖大握樞御極行一事必遵典禮發一言必訪古今三載遏密之中過形哀毁萬機聽覽之後未嘗怠遑每春澤稍愆宿麥未秀必親臨祠觀備薦蕭薌減御膳以焦勞走使車而旁午並禱羣望盡降五刑昭感上穹必獲嘉應雖有祲沴安能為災然臣輒以葑菲窺測蒼昊退循僣越難避鼎鑊死罪近者微有亢旱頗傷稼政天其或者得無以太祖太宗二聖在天陛下春秋鼎盛兆民樂業萬國來王萬一聖心忽生驕佚故暫加災眚以警睿聰昔魏徴對唐太宗曰貞觀之初聞善若驚五六年間猶恱以從諫自茲厥後漸惡直言此蓋譏其漸怠於政也則知勤儉難守驕佚易生人之常情也𤣥宗開元十五年以後深居髙視倦于臨御內寵嬪嬙外事征伐連起詔獄無辜誅夷遂至大盜猖獗中原板蕩蓋亦升平之後驕怠致然也臣伏覩先帝福祚延洪享國長久孜孜勤儉未嘗一日曠於萬機自端拱以來益勵精為理臣嘗權鹽鐡判官得與本使上殿奏事一日先帝從容謂臣等曰大凡於職不可不勤朕每見殿庭兵卒能剩掃一席地剩汲一瓶水必記其姓字夫如是則有以見先帝勤勞庶政片善無遺願陛下守太祖之丕圖遵太宗之遺訓兢兢業業無怠無荒臣又聞之圖治者在乎遠佞人杜讒口書曰聖讒說殄行震驚朕師詩曰取彼讒人投畀豺虎臣觀今日朝廷自公相以下悉皆方正無邪佞之徒然事生隱微宜防未兆以陛下聰明神智必無驕佚之虞然願罔倦燭幽勿使小人乘間而進日謹一日雖休勿休居安慮危在治防亂則天下幸甚咸平三年十二月上時知兖州上真宗乞恭勤守治陳充臣竊以古先哲王嗣守大業遠則漢武帝近則唐𤣥宗英智天資聰明神授雖茂功克建而至德未周蓋以享國年深在位時久倦於勤儉或至怠荒不恤民人多耗國用子孫繼統無以取法令德方策布翰無以備書大猷覽其始終良可歎惜恭以皇帝陛下君臨寰宇富有春秋無一日晏坐朝無一時倦聽政言必合道動必由禮無聲伎之好無畋遊之娛未嘗興土木之功未嘗納珍竒之貢訓練士卒也務寧邊鄙不衒於武威編修典籍也用廣採掇思益於文德巍巍然蕩蕩然信無得而名者矣方今天下庶官錢穀刑獄兵農賦租咸遵詔條悉協程式至使小有壅遏自可懲革如人之腠理平適膚革充盈偶生微痾不患難療臣以為方今天下但恭勤而守之足彰社稷之慶黔黎之幸也然則日謹一日雖休勿休存諸格言斯用垂訓伏慮陛下以時當寧泰情有變遷安居九重倦覽萬務近習可畏間邪頗難尚書曰惟王不邇聲色道德經曰馳騁畋獵令人心發狂史記曰由余見秦宫室大奢歎曰使鬼為之則勞神矣使人為之則苦民矣尚書曰珍禽竒獸不育於國四者人君之大戒也其或小人乘此而競進聖治因茲而闕修則追思漢武帝唐𤣥宗英智聰明而至德未周以為前鑑乃小臣之所以愛君者也周易曰天行健君子以自强不息夫天道運行無有止息是以四時推移萬物生成也聖人之道宜取法上天勤而不息是以政教克舉華夏以寧者也臣伏讀敕命朝廷之闕遺朕躬之過失並形封奏得以指陳今者朝無闕遺君無過失豫伸忠欵必恕罪尤願陛下長採斯言靜思闕義治不忘亂安不忘危則九夷向化百世受祉無出於斯而巳矣至如指一小事以為利濟陳一短見以為周通臣所不為也景德三年上時以刑部貟外郎直昭文館上仁宗乞每旦親政振舉綱目孫沔臣伏聞隱憂而道著功成而德衰涉難則思深而圖全居安則志滿而自逸上自三王之世兩漢之主撥亂者咸臻於至治憂勤者多致於中興荒淫怠政喪亂相隨晉魏巳降虐懦無紀臣不敢遠引古義願以唐事明之文皇開基武定大難招籲羣儒確論理體閲弓矢則知政教之微諭金冶以來獻替之道房魏諸賢夙夜盡瘁貞觀之風終始無玷洎于髙宗藉此治平性務寬簡事稽裁決外綱隳而無忌遠黜內嬖盛而二張用事許李諂上禍厲是階二十餘年變周因武至於明皇治亂尤異開元之治內難方平久在民間深知國害濫官弊事思盡革去故任姚崇宋璟為相庶務畢舉遂致化成天寶之後聽斷稍怠寵幸勃興竒巧厭溺夷入亂華威不克愛故因林甫國忠盜位綱條不修以至奔幸此三王事跡一時龜鑑布在書傳可得知聞皆由世亂則思於恭勤時平則敗於逸樂勢使之然由來者漸故易曰亡者保其存者也亂者有其治者也詩曰靡不有初鮮克有終傳曰有始有卒者其惟聖人乎伏惟陛下纂紹寶圖務敦淵靜韜晦英謀竭伸孝愛而內闈輔政朝制弗經宦寺弄權海宇側目女謁交馳大道不行而陛下山藏無遺日覆不昭洎莊憲上仙萬幾獨斷躬親大政勵精為治投閹寺之臣黨罷內降之私恩升擢正臣黜退竊位每旦聽政舊邦惟新庭宇再清幅貟欣戴將以執之若金石行之為軏輗希陶唐之風襲文景之跡為一代之宏規冠千篇之良史豈不大哉比及周歲頗異曩時內寵艷興中宫傾易楊尚恃恩權勢特盛事由請行言自政出君子小人腹誹竊議幸賴陛下神明義斷廢黜外宫雖謹正家之道未遑經國之宜功業弗彰簡編安在恭聞昔者太祖應天奮陸救生民於塗炭太宗耀德開基平列國之干戈真宗修文守位下武和戎崇儒議禮封禪告成神德聖功形詩播樂三朝盛事萬祀流光今陛下自幹蠱十年豈常專巳歡言三載足以變風未聞可久傳被無窮纍嵗巳來和氣稍鬱水旱相仍螽螟屢生粟麥不登田疇幾廢九夏多寒三冬無雪星變上天河決東郡疾病流離生靈困憊民乏兼日之食廩無卒嵗之儲既庶而富曷其若是正當不足之時豈曰無為之化陛下不可謂時無兵革乃號太平政奉簡書便為端拱竊恐禍生所忽亡有其存漸至陵夷無時逸豫有唐天寶可謂覆車前春伏見詔書布下每旦親政故天下之民謂吾君為憂勤率仁之化翹足可待去秋以聖體愆和臣心啓沃愛君有從宜之制雙日伸不坐之請交泰之誠遽臻有喜宴安之戒豈可為常且一月之中適減其半慶辰嘉節休沐受釐三分之日復廢其一是則一歲之中率無百餘日視事宰臣上殿奏可待對止餘數刻天下萬務得不曠哉雖云漢帝五日一朝則有伏蒲入閣據厠與語示無間也唐制三日一坐則有便殿更畨浴堂延對信不怠也今退朝之後深宫之中侍左右者刀鋸虧殘之餘恱耳目者綺羅艷冶之色扄鑰九重呌閽千仞宸禁晝嚴乘輿天遠固未見欵召名臣清問外事詢祖宗之紀綱質朝廷之得失徒修簡易之名未益承平之化臣恐其未可也况今之政失於寬而蔽於姑息今之士弛於務而幸於因循是養其惰也夫天下之本者在民民之豪者皆兼并而貧者無置錐之業天下之大者在兵兵之下者負飢寒而驕者不敢役郡守縣令臧否無别冗食萬千蠧耗靡窮邪佞退而復興忠諌黜而未用此害之大者也設欲止之於未發救之於將然莫若振綱舉目杜漸防微勤儉為先剛斷為急權之一去安可再得豈宜崇尚寬大自從清宴若謂怡神養性之方且非耄期倦勤之際臣復以為不然也今陛下春秋鼎盛氣志如神釋習常之弊加致治之心勤禹湯克巳之規敷文武立教之旨振三祖之基為百世之法則垂鴻自我豈不盛歟願因歲首正朝之始霈然下令誕告多方每旦恭巳辨色居位推擇大臣講求古道降以溫顔俾之極論精思品藻督責賢否外則逐刺史縣令無狀老懦貪殘之輩以利於民內則罷公卿大夫不才諂佞詭誕之士以肅於朝掖庭之中簡去幽曠以來錫羡之慶宦寺之內抑損重任以防昵近之私發號施令必審其有害賞功罰罪必思其未平則可使教敦于上民恱于下足以招天地之協氣致國家之豐隆皆目前可見之事惟陛下力行而巳三王為可侔十聖未足擬何為恃當年而樂自足哉臣跡甚孤危言無忌諱妄陳愚瞽甘俟誅夷然念優處憲臺過受豐祿恩自上隆食出民力豈可偷安不思盡節茍一言而萬死實以為榮干犯天威臣無任激切待罪之至景祐元年十二月上時為監察御史裏行上仁宗乞勿以治平自怠宋綬臣聞自古守成之君率皆兢畏不忘顧省何者慮人心逸於久安而患害生於所忽故常立防於無事之始銷變於未萌之前若事至而應不已殆歟臣願飭勵羣司交修庶職勿以治平自怠勿以纎微不謹則可以保至尊而享洪業也又竊思馭下之道有三蓋臨事尚乎守當機貴乎斷兆謀先乎密夫惟能守則姦莫由移斷則邪莫由惑密則事莫由變是三者治亂安危之所繫願陛下欽之念之至若朝務清夷深居閒燕亦願陛下愛養玉體節宣所以順四時聲味所以調六氣勿至傷過乃克和平自然擁百靈之休享無疆之福豈不善哉景祐元年十二月上時為參知政事上哲宗論成於憂勤失於怠忽彭汝礪臣伏惟自古天下廢興存亡見於書者甚備其成未嘗不以憂勤其失未嘗不以怠忽陛下即位蒞政其仁民愛物之心發於詔令見於行事厚矣日月益久然終不能近古殆誠意未加而已聽言之道必觀以事今察于天地常寒星變河流未塞察於財用公私殫乏浮費益滋察於有司因循茍簡之弊日甚察於風俗廉恥忠厚之風幾喪役法既變民人益困邊備寖弛夷狄方侮選舉法壞士迷所向而進言者曰今大安且治是非欺即諛天下大器置之安則安置之危則危安危之幾一朝一夕一言一動之間而巳蓋自古人主饗國既久無至誠惻怛之心上下偷安趣過目前綿綿延延日月以甚固雖無惡政虐刑加於百姓而天下未嘗不亂此不可不察也陛下因仁民愛物之心加之以至誠在所可為而必斷在所可法而不惑在所可聽而必從在所可改而無咎如此則百官有司莫不奮勵承詔災異弊病非所患矣臣雖不肖猶日夜洗心以俟故以至誠之論終之元祐四年上時為中書舍人上哲宗論太平百年所當戒懼彭汝礪臣學不燭於理又不稔熟於時事雖冒昧自竭亦自知其無所補也臣竊念三代之盛莫如周周之盛莫如成康昭不克繼至穆幾於亡宣王中興然巳不純於文武矣髙祖取秦為漢一傳而有吕氏之變文景之際盛矣而亦有七國之亂武帝好大喜功兵出無虛歲海內為之騷然光武再有天下號令溫雅政教宣昭其克繼者顯肅而巳肅以下無譏焉神堯之功不及湯武太宗之治幾於成康至髙宗孱弱武后專制明皇之興又不克終唐日微矣下至五代中國裂為六七及真人出四海一而聖聖相續太平踰百年矣自三代以還未有如今日之盛也然萬物之變嘗相往復治則有亂之幾安則有危之幾則近時之旱荒凶札盜賊兵革亦數之所自有也觀之天變察之人事稽諸往古驗之來今以今天下之勢可以為大安亦可以為危可以為大治亦可以為亂惟願陛下加謹焉臣之不肖自顧無益陛下事陛下審察大臣以與政事選簡忠直以當言路庶幾利害邪正不壅於聞聽而天下終保於治安也臣不勝拳拳之至元祐四年五月上時為中書舍人上哲宗論守治至難梁燾臣過被聖恩驅策得侍清光親聞德音要使靜而不擾安而無危內惠中國外綏四方日隆廣問未嘗不及政事之得失臣同天下慶幸陛下聰明可謂知要矣如君臣同德共行此道數年之間必復見仁宗至治之時比觀朝廷之事似未副聖明之本意者臣甚惑之豈大臣不能將順德美究宣睿澤以廣為宗社長久安寧之計歟或者聖意稍怠姦人伺隙得進邪說以眩亂聰明歟臣早䝉知遇擢在言路納忠補報難同衆人不忍不為陛下一言也願陛下察臣之志少加聽焉臣聞論者曰致天下之治難守天下之治易臣獨曰致之為易而守之為難也蓋自古人主圖治之初莫不急於求賢渴於聞諌得一善惟恐未能行見一不善惟恐不能去潜心於萬事幽微之無形用意於衆人思慮之不到兢兢業業不敢暇豫終至於安樂而無事此天下之治所以致之為易也亦既治矣而放其心氣日益驕志日益怠謂賢者得矣而忽於求謂善言盡矣而厭於聽謂事之微者為不足慮謂患之隱者為不足防姦生而不察禍萌而不悟故終致於敗亂而莫之救此天下之治所以守之為難也易曰君子安不忘危治不忘亂又既濟卦之象曰君子以思患而豫防之蓋安有危之理治有亂之機既濟而猶思禍患之潜伏此皆聖人戒懼於治安無患之時者也恭惟陛下臨御七年于今進賢去佞協天下之公興利除害同百姓之欲刑罰清平賦斂均節姦宄已銷兵革略戢歲物豐穰民力寬暇可謂有治之漸矣守而勿失治道可成正是兩宫持守至難之際也恭惟皇帝陛下進學不倦臨政不忽無宫室之好無聲樂之玩無佛老之惑無用武之蔽所以守之者有道矣恭惟太皇太后陛下仁敬明謹濟以大公判别讒邪裁抑僥幸聽斷之間事理常盡照臨之下物無徇情此堯舜之用心也而臣之區區尚以為憂者竊恐陛下以未成之治為已大治以小康之俗為可久安苞桑之慮日懈于心朽索之畏不及於前蓋積纍而成者為至難怠忽而敗之者為至易臣區區之忠蓋已面陳伏望陛下不以臣言為愚審思而力行之臣屢蒙聖恩降旨開納臣未敢以為喜書曰知之非艱行之惟艱又曰戒哉警戒無虞願陛下必行可聽之言警戒無虞之事延洪無疆之休天下幸甚貼黃竊以政事之本在於用人朝廷人材純一則政事自然安靜但君子在內小人在外即是泰道如君子小人混而為一則泰道何緣得成君子小人不可並用猶冰炭之不可同器一長一消自然之理也此在人君常用意於進君子退小人則治道可成而天下受泰矣伏望聖明留意於此夫小人而無材者雖無足畏然亦不可也小人之性喜於嫉善良為朋邪是不材者使之得路必又將引用小人之有材者以濟其姦終為國家之害此其不可用也決矣願陛下察之竊以臣之為道在於盡忠忠之為字謂中心一則為忠也中心二則為患矣夫臣下有愛君憂國與上同德同心而能奮然當怨排難無慮顧室家之憂者可謂中心一矣陛下察其有是心矣豈不為忠也可踈之乎臣下有外示愛君憂國而其中不與上同德同心不肯當怨排難但務收恩買譽切切於營私者乃中心二也陛下察其有是心焉豈不為患可親之乎此用人之要也伏望深留宸念元祐六年十二月上時為翰林學士宋名臣奏議卷二十
