body:
  text: 宋名臣奏議卷一百三十一宋趙汝愚編邊防門遼夏三上仁宗論先正内而後制外龎籍臣伏自元昊背恩僭竊兇謀已露陛下憂恤邊事博采羣議選將遣師動挂宸慮復聞減息宴樂專精思慮此乃宗廟之福天下之幸也若陛下憂勞不已則羌戎小醜不足平也誠不可輕之易之耳當平靜無事之時言事之臣尚願陛下戒謹修省况逆虜已畔兵戎方興此臣下尤當竭謀慮忘忌諱之秋也况臣孤蹇之跡上頼陛下照明奬擢獲升近侍恨無才略仰報大恩茍有管穴之見敢不陳露夫欲建事功者在先正其内而後制其外也先正其内者在陛下專意而力行之臣願陛下執恭儉嚴紀綱也荀子曰恭儉者偋五兵又曰彊本而節用則天下不能貧故當今之急無先於恭儉也陛下試令有司計財賦之入必曰耗於先朝之時也計費用之數必曰廣於先朝之時也財賦日耗而費用日廣則安能使府庫豐積兵備足用也故願陛下節之又節以備用兵之乏應不急之務一皆止息專以備邊為念則功可立矣至於綱紀者其要在賞罰恩賞貴乎審當法令貴乎齊一伏見近年恩及僥倖而典憲稍縱夫賞所以勸功也僥倖無功之人坐獲殊寵後有臨敵効命立勲行陣者將何賞以足其望乎願陛下愛惜爵禄無及僥倖以待立功之臣申嚴憲法無使縱弛以威不恪之臣此又最切務也茍國富兵彊綱紀嚴肅則四夷畏服之不暇又何僭亂之敢為實在陛下正之於上大臣持之於下則誰敢不從矣所謂後制其外者方今邊要與元昊接境者廣矣昨遣二帥臣以分制之固當以防備為急若不得其要則費廣而功未可期自元昊僭逆以來調發兵馬已衆多矣輦運器物紛紜道路諸所營繕率及民力兵戍既集芻粮所費不知幾倍於常時矣兵久不散支用無極臣恐羌戎未至而公私先困矣安知非黠羌狡謀而困我哉前代時及平定則休兵罷戍養民審備以防不虞故事至而其用有餘國家自和戎之後邊戍未嘗休息支用未嘗減節一日兵興則其力易困夫兵冗而不精雖衆不可用也竊聞所發之兵皆不選練而遣之疲弱預行者亦多此徒有其數而可用者殊少臣謂兵卒壯勇者一可勝疲弱者五况餽運邊儲常為艱苦此尤宜重惜也欲望令漕運之臣與邊將選擇壯勇可用者留之於邊疲弱者或令還本營或置於近内多糧之地則邊郡兵精而費少矣晁錯有言曰器械不利以其卒予敵也卒不可用以其將予敵也是知兵戰者利器械訓士卒最先急也臣聞在京造兵甲之所近年以來多不擇監掌之官率皆勢要之人為之以自便其私也亦聞向來所造器甲多不精堅欲望朝廷擇勤幹之官諳知製作兵甲利鈍巧拙者令監轄工匠精心製造必令精堅可用仍加覆驗明示賞罰則兵甲堅利矣其外方造作兵甲亦乞嚴戒國家休兵久士卒漸惰加之都將威輕軍衆難制若一旦臨敵深可豫憂欲望宻詔二帥臣令經畫訓練之法統馭之術使將校知感愛之道士卒有禀畏之意然後時加訓告各使知主恩而勵臣節則臨事可用而功可期也寶元元年十月上時為天章閣待制上仁宗論外憂始於内患韓琦臣伏聞元昊狂謀僭命朝貢不修輕犯天謀人神共忿陛下雖寛詔厚澤姑務懐柔其如逆狀已然必為邊患今獻䇿陳事者大抵不過欲朝廷選擇將帥訓習士卒修利戈甲營葺城隍廣蓄資糧以待黠羌之可勝此乃安邊扞㓂之切務也然而凡人之慮皆能及之臣竊謂此特外憂而已雖漢唐全盛之際豈能使四夷常自竄伏而保不為盗哉若乃綱紀不立忠佞不分賞罰不明號令不信浮費靡節横賜無常務宴安之逸游縱宫庭之奢靡受女謁之干請容近昵之僥倖此臣所謂内患也且四夷内窺中國必觀釁而後動故外憂之起必始内患臣今為陛下計莫若先治内患以去外憂内患既平外憂自息譬若木之有本未有本固而枝葉不盛者也臣欲望陛下深惟祖宗所謂内患者盡革而去之則陛下威德逺暢外夷髙視於漢唐之上元昊小醜孰能為國家之患哉如外憂已兆内患更滋臣恐國家之慮非直元昊一㓙而已臣竊為陛下憂之臣猥備諫貟不敢循黙語涉狂直惟陛下憐其納忠貸其萬死寶元元年十二月上時為右司諫上仁宗論建立基本以銷未萌之患吳育臣切謂朝廷總制天下必建基立本以銷患於未萌若政令修綱紀立財用富恩信洽賞罰明士卒精將帥練則四夷望風自無異志一有未備則黠㓂乗間而生心方今天下少安人情玩習而多務因循居常有議及政令綱紀邊防機要則謂之生事或有警急則必至怱遽而莫知所為若稍且安靜又無人敢輙言且夏州久有人往來中國熟見朝廷因循之勢遂敢内蓄姦謀若以一時之事茍且支持或至爛額救焚揚湯止沸覆視前古厥鑒甚明伏望陛下從容延對左右大臣討論闕政博訪羣議修節用愛民之經求訓兵練將之䇿則一方小警不足慮也寶元二年三月上時為右正言直集賢院事上仁宗論元昊不足以臣禮責呉育臣聞聖人統御之䇿夷夏不同雖有戎虜之君向化賔服終待以外臣之禮覊縻勿絶而已或一有背叛來則備禦去則勿追蓋異俗殊方視如犬馬不足以臣禮責之今元昊若止是抄掠邊隅當置而不問若已見叛狀必須先行文告以詰其由若是同中國叛臣即加征討大凡兵家之勢征討者貴在神速守禦者利在持重况夷狄之性惟是剽急因而偽遁多誤王師武夫氣銳輕進貪功或䧟誘詐之機今但明烽候堅壁清野以挫剽急之鋒而徐觀其勢誠為廟堂之逺筭也寶元二年三月上上仁宗論西夏八事富弼臣竊聞去嵗十二月中趙元昊反自立為大夏皇帝改元稱制引兵犯邊遣使致書割地邀貨陛下召輔相於宴㑹不容食頃之間輔相馳車馬於康衢殊乖坐鎮之重變起倉卒事無凖繩朝議紛拏人心皇駭不逾旬浹傳布四方衆皆謂之忽然臣則知其有素請陳有素之狀其狀有六焉昔者徳明尚存元昊方幼常勸厥父勿事中朝安能舉我國家終久為人臣妾且謂所得俸賜只以自歸部落實繁窮困頗甚茍兹失衆何以守邦不若習練干戈杜絶朝貢小則恣行討掠大則侵奪封疆上下俱豐於我何恤徳明以力未甚盛不用其謀豈有身自繼立而不行其說耶此元昊反狀有素者一也自與通好略無猜情門市不譏商販如織縱其來往蓋示懐柔然而迹稔則容姦事久則生變故我道路之出入山川之險夷邦政之否臧國用之虚實莫不周知而熟察又比來放出宫女任其所如元昊重幣市之内之左右不唯朝廷之事為其備詳至於宫禁之私亦所窺測濟以㓙狡之性貪欲之謀豈肯固守盟約坐受覊制此元昊反狀有素者二也西鄙地多帶山馬能走險潮海彌遠水泉不生王旅欲征軍須不給窮討則遁匿退保則襲追以逗撓為困人之謀以遲久為匱財之計元昊恃此艱險得以猖狂復如先朝加兵於我而終棄靈夏况我彊盛百倍往時今若稱兵必能得志此元昊反狀有素者三也朝廷累次遣使元昊多不致恭或故作滯留而不迎或佯為怱遽而見迫或欲負扆而對或欲專席而居雖相見之初暫御臣下之服而送出之後便具帝者之儀蓋久已稱尊成其驕態忽下編於臣列深恥見於國人日講異圖自求足志此元昊反狀有素者四也頃年靈州屯戍軍校鄭美奔戎徳明用之持兵朝廷終失靈武元昊早蓄姦險務收豪傑故我舉子不第貧賤無歸如此數人自投於彼元昊或授以將帥或任之以公卿推誠不疑倚為謀主彼數子者既不得志於我遂奔異域觀其决䇿背叛發憤包藏肯敎元昊為順乎其效鄭美必矣此元昊反狀有素者五也西北相結亂華為虜自古聞之于今見矣頃者元昊援契丹為親私自交通共謀㓂難緩則指為聲勢急則假其師徒至有犄角為竒首尾相應彼若多作牽制我則困於分張蓋先已結大虜之强方敢立中原之敵此元昊反狀有素者六也是六者歲月已久中外共聞而天子不得知朝廷不為備養成深患遂至大騷此乃兩府大臣之罪也此外元昊大抵復知朝廷以久安自恃不悟邊鄙之防以無戰為常不求將帥之具士卒驕惰器用凋零無謀臣䇿士以經營四方無宏綱大紀以控制萬國以此故元昊敢以一方之衆抗我天下之師輙稱皇帝殊不忌憚其為小戎輕蔑也如此略遣數介平致尺書而大臣不知所為措置乖失以致調發軍旅塞滿邊陲戰陣未嘗一施儲饋已聞屢窘闗中大擾人心不寧而元昊宴安自居一毫無損坐觀其弊竊笑所為其為小戎侮玩也又如此臣雖賦性至昧語才不長然自聞騷繹常切憂憤况臣知元昊必為今日之患十年於兹矣懐不能已遂於景祐元年嘗進文數軸内閱將一篇頗叙其事當時朝廷方謂天下大定四夷無虞臣不敢極陳西戎不賔之由但述選將預備之䇿而已不見省納棄為空文今變故已成邊事為梗致陛下憂勞在念旰昃惟勤專委任於輔臣謀削平於㓂亂僅周歲序尚留天誅且自用武以來作事多失凡降一詔未嘗合朝廷之宜凡建一謀未聞協天下之望寛猛不中動靜皆違謂之徳則人不肯懐謂之威則人不肯懼徳威既弛夷夏何觀臣今略舉八條止為戎事未論其他伏惟聖明詳擇一事伏聞元昊遣使全擬虜庭部伍甚雄辭禮俱亢觀其勇悍難制强辯自髙若非使者請行即是元昊選差取其籌畫推為腹心必謂不敢加誅得以恣行彊暴以能揣敵情為有智以不辱君命為得賢我若察其所叛之謀知其所來之意存之則元昊遂其志誅之則元昊䘮其魄所宜始至之日盡斬都市事出不意乖其本謀即時宣聞遂行削奪或命將致討或發兵備邊上則可以示大邦不測之威下則可以杜小人好亂之漸豈不韙哉戎人必憚而失圖戰士必為之増氣而反逺從境上召至都下恣其貿易待以雍容重幣遣還優辭慰恤意者豈非冀其囘心易慮而伏義向化乎夫朝廷結以恩信幾四十載尚無懐感之意終至反常之禍豈兹姑息遂可悛移且以放還謂之懐柔邪則元昊悖逆之性何懐柔之肯馴謂之矜恕邪則元昊僭竊之罪何矜恕之可忍謂之他計率無可觀只是執事者巽懦自居優游不斷殺之恐其急擊囚之恐其有辭遂至放還優示寛貸向若未能加戮只宜境上交囘使其不測淺深猶可謂之良䇿召而復遣理有何長乃是大國之謀悉為小戎所料遂其所以能揣敵情之智成其所以不辱君命之賢况當時調發正當輦運相屬道路雜㳫民口沸騰使之往來盡得聞見謀事若此取侮之過也臣嘗觀前史見隗囂遣將髙峻據髙平光武使㓂恂往降之峻命皇甫文出謁辭禮不屈恂立斬之峻即日降諸將曰殺其使而降其城何也曰文者峻之腹心今者辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳又唐太宗初即位突厥入冦直至涇州突厥遣其腹心執失思力入朝為覘自張形勢云百萬之兵今且至矣乃請反命帝誚之曰我先戮爾蕭瑀封徳彛請禮遣之帝曰不然今若放還當謂我懼遂縛思力囚於門下勒兵欲戰突厥懼遂請和伏惟陛下觀冦恂唐太宗之所為復思今日元昊殊不悔過則當誅其來使果是邪非邪機㑹一失不可復得臣深念此痛惜萬萬也若事皆此𩔖禍未可知二事伏自元昊稱亂西鄙震驚或帥臣乞師或朝議遣使㳂邊要害宿兵猥繁雖與舊日不侔然亦不過一二十萬京師屯衞則差減天下禁旅則尚多起為應兵未嘗乏使竊見自去年十二月至今年四月末半年之内相繼三度揀軍皆遣使臣傳布宣命每至一郡無不張皇仍帶殿侍數貟番次押人赴闕村民恐懼未㸃鄉軍致有奔竄山林鑽鑿支體不顧傷毁茍避涅黥久乃知其非然其如終是已惑三揀兵士厥數臣則不知然觀此施為所獲必鮮若其事頻驚衆則莫甚於兹臣又伏思内則省庭外則轉運司以至州縣勤勞供職嚴峻用刑所急之須唯財是務盡農畆之稅竭山澤之利舟車屋宇蟲魚草木凡百所有無一不征共知困窮都為賦斂自來天下財貨所入十中八九贍軍軍可謂多財可謂耗矣今始用武遽稱乏人即不知向時所贍之軍何在所耗之財何益殊未戰闘已大驚擾萬一或至敗衂頻有殺傷須行補添别設應援至時又不知調發者何所揀選者幾番比之今來必大興作凡係兵籍既已不充所謂鄉軍豈免强配此時百姓所懼將來必有不虚若果行之為患非細三事伏見今年四月降中書省劄子稱臣寮上封財賦所出各有攸司由外以充内自下而奉上者也又曰仍取羡登用備供入乞戒諭諸路轉運司如用度或闕須管自擘畫支贍若的是圓融不出即許於隣道榖有剰處支那不得更似日前乞自京般請錢粮之𩔖徧行下者臣聞民者本也存心於民則邦國寧財者末也屬意於財則黎庶畔是以王者以天下之財養天下之民不聞誅求以害生靈蓄積以奉私欲易曰何以聚人曰財禮曰財散則人聚此經典之明文也伏以國家肇造之時疆境甚隘財賦至微而征伐不停用度亦足洎太祖盡取川蜀河東江南兩浙荆南湖南廣南閩粤之地何啻萬里不計逐方所積寶貨當時盡歸京師且以後來賦輸無不經度逐年只留實約軍費其餘每歲盡數上供民力所輸秋毫無隠不間逺邇不問炎涼輦運縱横水陸奔湊官司督責時無暫休凡天下如此者已七十年矣豈非由外以充内自下而奉上乎而又干戈不作華夏底寧唯是常須别無它費臣謂都下財貨固當在處如岡如阜有入無出莫知紀極諸路運司以逐州實約之費無多羡餘其間年歲有㓙殺則必蠲除朝廷有要索則必應副多行搜括裁可張羅若又分外督之不知出於何所朝廷既行誡諭運司不敢冒違無計以供唯民是取民若可出豈復行仁民又不禁必生怨怒虧損和氣馴致深憂是元昊擾邊陜西被苦士馬日濟芻粟頓竭繕治甲兵修築城壘百役興作萬倍艱難復阻旱災無收農賦中糴之入既不厚鬻爵所得又不豐數十萬兵何所仰給坐觀困弊不行救䘏而執事者尚曰財賦者由外以充内自下而奉上爾之不足爾自營求是何乖方之深也夫上下相維中外一體豈可豐上而刻下空外而實中下茍困則上豈得安外若揺則内豈能定况以七十年天下所入而救此日一方之急豈為難哉若但誅求取足人民無所逃避變亂豈有不生手足之患未除心腹之疾又作則臣深為執事者危之臣不敢逺引古事恐煩省察只以本朝事驗之竊聞太宗皇帝初實内帑嘗謂侍臣曰河東敵境甚邇吾必取之至時不免擾民今内帑所積以備調發戒重擾也其後皆如詔卒不擾下今元昊背畔闗中用兵要在安民圖共禦冦而反靳中府無用之物擾四方已困之民惜財費人大非太宗皇帝之所用心也臣又聞王者貴為天子富有天下藏於天下者天子之富也藏於國内者諸侯之富也藏於室廬篋笥者庶人之富也今執事勸陛下行庶人之事何示人不廣也且又云的是圓融不出許於鄰道支那夫鄰道貨財各有用度必難假輟徒費規求臣又敢以近日一事為證切見河北轉運司奏乞割河東五州十三縣稅賦充河北支用本路自奏一路之費悉賴五州之資若遂割移殆難供給尋具聞奏事已寢停鄰道支那徒虚語爾唯是朝廷逐急救濟乃為良圖矧向者居無事之時已行假貸豈今來當用武之際復致艱難前後不侔利害可見臣謂建此計者不姦則妄贊其說者非愚則諛惟陛下鑒之以明斷之以果則大事不失而帝業可保矣四事竊見去歲降詔令内外兩省官及諸司使副在邊者并軍職刺史等近百人各結罪保舉殿直京官已上委無贓私堪充邊任者臣聞有徳者然後知人之徳有才者然後識人之才無徳者見有徳必憎非才者見有才必忌唯憎與忌固非存公萬一才徳雖疎憎忌不作其如所見相戾所為相乖使之擇人何由得士切以兩省官及諸司使副雖名顯官豈必皆賢多由積累而陞亦有容易而得軍職刺史本是武夫校力則多語識全少盡令舉將帥之士便以委邊塞之權不問舉主之才徳如何安知所舉者善惡若忌憎已有所害乖戾復更相乗所舉之人豈堪任事臣又聞官大者徳未必大位髙者才未必髙京朝殿直之流固有可採借職選人之輩豈盡無能假有兩省官識一選人果有竒才又有諸司使副識一借職果有異術借可薦舉寘于邊陲而限以詔條須且棄置宛轉尋訪别得所聞久諳與旋擇固殊目覩與耳聞又邈限官而選得士為難臣又聞善任人者必適其所用善御物者不强其不能蓋以輪轅異宜鑿枘殊制茍只取其無過而不問其用之所有秪重其守廉而不究其謀之所存則臨事必隳當官必敗廉而無過者行也用而有謀者才也行則主於化導才則主於經營居治安之時宜乎化導以行在擾亂之日則當經營以才大凡處邊任者小則乗一障大則守一州或驅馳戰陣之間或出入戎狄之境或經度糧草或熟習山川或逞驍勇以䧺邊或行反間以疑敵或陳討伐之䇿或謀守禦之術如此數事皆湏藉才必求非常之人乃立非常之効若但取齪齪無過規規守亷施之邊方萬必無用不止無用必誤軍機徒令舉者易與而自便亦後有䘮師失律其若我何臣謂此詔舉官盖因循平日所行甚非今時之宜也臣伏望兩省官諸司使副或軍職刺史在邊者不可一例受詔宜令兩府精擇有才識公望卓然為人所稱者方令舉官仍宜不限品秩自借奉職選人巳上皆得充舉所保之事湏保堪任邊上重難任使如上之所陳或本人邊事不集並當同罪則人人自畏豈敢容易而舉哉十得十百得百不虚授不濫賞斷可知矣向有所累許其自新得出沉埋必有植立夫先擇舉主則所舉者不謬矣不限品秩則下位有才者不遺矣不免責罰則負犯者激勵而自奮矣利害甚煥可舉而用然湏能否既著賞罰必行國無虚辭人則皆勸五事竊聞鄜延路嘗與蕃兵接戰有一寨主為蕃兵所得及虜去軍民甚衆西頭供奉官閤門祗候馬遵引兵追戰即時奪回延帥范雍及副部署劉平奏乞酬奬朝命只遷東頭供奉官而已伏以元昊僣尊西陲被擾方勵武節以寧邊患其要在乎善惡必辨賞罰必明則人各有心孰不宣力賞若當則有功者愈勸罰若當則有過者自悛賞罰不明功過兩弛轉相敎告誰肯奮激武節不勵戎心益生有敗而無成有亂而無治漸漬不救淪胥以鋪蓋由乎辨之不早也夫馬遵者出死力突堅圍引既衂之兵入不存之地奪已擒之將士拔已䧟之師徒雖非大功亦可謂之竒節矣况范雍劉平者國家方大倚注保奏理合超遷只進一官殊乖輿論當兹始初用武尤在賞勸激人茍未得宜必難勵衆臣竊聞河北一都巡檢王守琪捉殺得獨流寨潰散兵士二三十人自禮賔副使轉供備庫使仍差知隴州又見京東都巡檢李知和捉得刼賊七人自内殿崇班轉供備庫副使此二賊徒者只是草竊之輩固非勍敵之人殺之不足震天威縱之不能成大患而王守琪則驟遷十餘級李知和亦超轉兩資至於馬遵者出境討賊不顧存亡援溺救焚皆得全活上可以壯朝廷之威下可以抑僭國之强比王李之功効則度越有餘比王李之遷酬則數倍不足邊臣見之失色元昊聞之長姦用人若斯致冦之道也六事近於七月中伏聞中書樞宻院同進呈募擒元昊科格遂告示天下者切以拓跋異𩔖西域諸羌自唐末亂離五代爭戰盜乃土宇侈其封疆時肆猖狂罕能懐服常致邊患每勞王師歴代以犬豕蓄之置諸度外國家引為宗屬付以節旄割賜名城世襲王爵廩給甚厚貿遷弗停其國富强皆我資用蠢彼戎醜變為華風則我於西夷恩徳豈不大哉盟誓弗渝始終無負而元昊不圖報效輒肆頑兇欺誣上天僭竊大號合行誕告速寘明誅庶伸征伐之權以快人神之憤况自西陲變動天下震驚聚目而觀攅耳而聴或謂朝廷有上䇿廟堂有竒兵豈容有臣敢行稱亂顒顒佇望以日繫時殆踰半年不聞下令久之乃舉削奪之罰行募賞之科何其隘哉夫始未有為人實莫測一旦告諭共知非謀孰不疑朝廷自怯未能加誅於元昊而又慮久無處置姑設賞募以厭天下之望乎適足示弱不足厭人示人以彊猶懼不振示人以弱其敝何勝故書曰安危在出令存亡在所任若謂元昊小戎無費民力但誅首惡足致和平則臣請終始陳之切聞自邊事初警即行調發師徒合雜器械堆盈官私俱勤道路如沸易置邊吏辦集軍糧闗輔大騷黎庶已困何民力之無費焉募令一施敵情愈秘知有竊發益自周防增置守衞之兵廣募禦侮之士寢食必以計出處必以權動則有謀大為之備何首惡之可募焉况夫募者起於亂秦用於末世三代已往不聞有此豈我太平之世天下一統偶有小醜背叛稽之典䇿自有討禦而執事者不為良畫遽勸陛下行亂秦末世之事乎既非至公之謀又匪常行之法然有不得已者亦或為之何則苦於用兵終未獲敵思為助兵之術則募之漢髙祖於項羽是也兵力驟敗敵勢轉盛内懐震懼計無所出則募之王莽於劉演是也用兵不一困於支離敵又相乗力不能應則募之梁太祖於劉知俊是也一夫跳走不知所從雖有兵甲之彊無以加討則募之楚平王於伍貟之𩔖是也募賞雖設無一獲者是募賞為無益不可全任明矣今元昊初叛未嘗大戰非苦於用兵也師旅屯聚空食邊陲非兵力驟敗也諸方不聳獨西鄙有警非用兵不一也元昊大據全夏擁衆不伏非一夫跳走不知所從也臣以此觀之甚非用募賞之時且以我大邦坐視小醜况我直彼曲奚所憚焉正朝廷之大刑副天下之公議舉不失體動則有辭欲征則征之足以示猛欲守則守之姑以示寛表以大御小之權行禁暴安民之道號令天下豈不偉哉何乃偷募茍求潛謀竊取似同盜法不敢公行謂之容則元昊之惡不可容謂之忽則元昊之謀不可忽謂之惜用則用已費矣謂之惜民則民已勞矣况又濟師已衆遣將已多邊境騷然曠日持久而反止於用募更無他圖倚之幸安謂已得䇿以此厭天下之望以此安君上之心臣深為執事者羞之兵既不行募又無得為此逗撓不減戍粮國用且殫民財是取怨叛必作表裏合攻臣亦甚為陛下憂之夫元昊既懐逆謀彼必大為禦備今聞上下募賞自知髙枕無虞夷狄之心畏强侮弱因而肆暴遂成深憂若誘之使來自有方略則非臣所知萬一執事者謀之不臧技止於此遷延玩冦姑息養奸禍已成而計窮敵已大而力屈則誰復為陛下圖之七事伏聞秋初夏守贇為樞宻使夫樞宻之任秉國大權起於有唐始用宦者降及後世更以武臣國家恩禮益隆委任尤重本天下之兵柄代天子之武威勢均中書號稱兩府茍為轉授不若闕官夏守贇早事先朝嘗參儲吏既緣攀附漸致顯榮惟事貴驕罔思畏謹每更劇任頗乏清名才術無聞公忠弗有一旦擢居衆賢之上俾贊萬務之機朝命則行人心不允又况元昊作梗西陲用兵上資睿聖之謀下取樞臣之畫庶臻泰定以安黔黎所宜妙擇才能削平禍亂而罔詢厥徳遽用斯人不問賢愚皆所輕笑夫樞宻者内陶鑄武臣外鎮撫夷狄無事則坐制機軸以修武備用兵則指畫方略以殄冦讎是四者皆非守贇所能知其髣髴而正當用武之際使踐論兵之職不悞國事復何為哉雖樞府之柄不專一人然大抵任賢豈當如是傳曰得賢則能為邦家立太平之基書曰罔有立政用憸人惟吉士用勱相我國家是則賢者可以立太平而憸人不可與於政也始陛下用守贇蓋以為賢者可立太平故用之茍知其憸人則必不用矣使陛下用而不知者執政緘黙之過也用之和平之日已曰濫官委於艱難之時尤為非據英傑為之解體姦雄為之生心唯是得賢乃能靜亂臣又聞為國家者得人則安失人則危得人則重失人則輕唐郭子儀係乎安危者也入則天下安出則天下危裴晉公係乎輕重者也進則朝廷重退則朝廷輕今守贇反是其在朝廷也雖未即致危亦可謂取輕矣亟宜罷免以重觀瞻所以示陛下不私於一人而蓋為萬世也臣又慮者以其嘗為攀附而謂之親信可使以其久厯寄任而謂之耆舊可尊以其官是節制而謂能知兵以其貌甚魁梧而謂能鎮俗是皆不然唯盡公者可以親信不主乎攀附之遇唯宿徳者可謂耆舊而不主乎寄任之多有才武而好學則能知兵不在乎官有器業而不佻則能鎮俗不在乎貌伏惟陛下察守贇之所立驗守贇之所為可謂盡公宿徳者乎可謂有才武而好學有器業而不佻者乎臣於守贇愛惡不相干聲迹不相接非有家世之隙禄位之嫌而進是說也但聞諸公議有足惜者區區之懇實願究陳八事伏聞西鄙用兵以来不住差移武臣往彼每有過闕下而求見者不多許見臣切詳所謂未見其宜謂之天子至尊不可令小臣浼瀆則非所以詢芻蕘而廣接納也謂之循守舊例未嘗許小臣求見則今用兵要在開通壅塞非循舊例阻絶人臣之時也謂武臣多鄙不可令容易而對則既已委任用為好人非宜鄙之也謂朝廷差除自有命令本職所管自有局分不必令對則用兵之際事與舊殊本職或有更張局分亦有規制何由聞達非以博究利病而翦除兇孽之意也以此四事求之臣故曰切詳所謂未見其宜今邊冦方興陜西大擾朝廷多發兵伍選任武臣雖則直禦冦戎蓋亦分備他盜凡有武臣求對必於邊事有聞陛下聽朝之餘何惜一見召於咫尺待以從容霽其威顔加之善誘使無懼慴盡日敷陳然後觀其奏對之是非察其趨嚮之邪正可者則奬激而遣之不可者亦優容而罷之如此則自謂官家知我姓名身心有所分付不患邊奏不省不憂權臣害能各盡所懐無不感恱勇銳而去罄竭為期刻志夷兇立功報主局分豈有不寧聖人所以感人心而天下和平者蓋用此矣又何憂乎叛冦何恤乎用兵陛下勤勞之心豈不至哉接納之禮豈不優哉聞見之事豈不博哉今却其所求不與之見奏對之是非無由辨趨嚮之邪正不得知彼又自謂朝廷雖然遣行官家未嘗識面但從職任罔察事情胷臆不伸括囊而去至則邊事擬奏而不敢奏兵機欲陳而不敢陳或慮聦明不聞或憂權臣見忌人皆懼禍誰肯盡心縱有疏聞豈如面奏陛下勤勞之心則怠矣接納之禮則疏矣聞見之事則隘矣禍不滋蔓已為大幸如望冦之速平兵之速弭則不可得也議者又謂臣曰此非主上怠於勤勞而疏於接納蓋執政者自知致冦常慮獲罪不欲許人非次上殿或論奏四方之事或有陳兩府之罪開悟聖人聰明則非已之利也故但奏云某人已有差使某人已與遷補所求入見不宜允從只欲徼望恩榮别希錫賜以此罔上上以為然意欲阻絶天下是非蔽塞天子耳目自以為安身之計也臣謂果有是事則非臣所知唯在陛下察其忠邪而進退之則蒼生之福也宗社無疆之慶也寶元二年九月上時直集賢院宋名臣奏議巻一百三十一
